 china.2.t: "Preparativos para la invasión de Taiwán"
 china.2.d: "Xi levantó la mano en un gesto de silencio, y de inmediato, el intenso debate se apagó. Papeles y ceniceros repletos de colillas cubrían la larga mesa de caoba, y la sala se sumió en la oscuridad, salvo por el deslumbrante brillo de una pantalla gigante detrás de Xi que mostraba un mapa del estrecho de Taiwán.\n\n\"No tiene sentido seguir discutiendo\", afirmó Xi con un tono firme. \"El camarada general tiene razón: en lo que respecta a la situación internacional y los preparativos para la lucha militar, ahora es el momento ideal para liberar Taiwán. Si lo ignoramos, seremos los eternos traidores de nuestra patria y nación. Declaro el inicio del plan 001 para la guerra contra Taiwán\".\nA la izquierda de la mesa, los funcionarios civiles se miraron entre sí, visiblemente preocupados. El primer ministro del Consejo de Estado se ajustó las gafas y dijo con inquietud: \"Camarada presidente, esta decisión podría traer condenas y sanciones económicas de la comunidad internacional... Ya lo había anticipado...\"\n\nEl vicepresidente de la Comisión Militar Central, que estaba sentado al otro lado, se levantó de inmediato y, con una sonrisa, exclamó: \"Gracias, presidente, por su confianza. Cumpliremos con las expectativas del Partido y del pueblo, llevando a cabo la misión a la perfección\". Los generales también se unieron a los vítores y aplausos. Mientras tanto, el secretario general observaba en silencio, como siempre, el comportamiento de sus subordinados."
 china.2.a: "No inicies una lucha, pero no te rindas en una."
 china.3.t: "Presidente Xi visita Birmania"
 china.3.d: "El presidente Xi Jinping realizará una visita de Estado a Birmania del 17 al 18 de enero. Este es su primer viaje al extranjero este año y la primera visita a Birmania de un presidente chino en 19 años. Esta visita reviste una gran importancia para consolidar el pasado y abrir el futuro al desarrollo de las relaciones entre China y Birmania, ya que coincide con el 70º aniversario del establecimiento de relaciones diplomáticas entre ambos países. Birmania es un vecino amigo de China.\n\nEl presidente Xi Jinping asistirá a una serie de actos oficiales organizados por el presidente U Win Myint, se reunirá con la consejera de Estado, Aung San Suu Kyi, y asistirá a una ceremonia de intercambio de documentos de cooperación bilateral y a un pequeño banquete ofrecido por Aung San Suu Kyi. El presidente Xi Jinping se reunirá con el comandante en jefe de las Fuerzas Armadas de Birmania, Min Aung Hlaing, se comunicará con líderes del parlamento y los partidos políticos de Birmania y asistirá conjuntamente a actividades como la celebración del 70º aniversario del establecimiento de relaciones diplomáticas entre ambos países y la ceremonia de inauguración del Año Cultural y Turístico China-Birmania con los principales líderes de Birmania. Ambas partes también emitirán una declaración conjunta."
 china.3.a: "¡Un brindis!"
 china.4.t: "La crisis del petróleo llega a China"
 china.4.d: "Hoy, el desplome del mercado internacional causado por el alza de los precios del petróleo y el colapso de la economía saudita debido a la guerra civil saudita ha golpeado a China. Las bolsas de Shanghái y Hong Kong alcanzaron mínimos históricos, y destacados economistas predicen que la situación solo empeorará. Además, las repercusiones del desplome de la Bolsa de Nueva York y los graves problemas económicos internacionales también han afectado a la economía china, llevando a millones de empresas a despedir trabajadores. Es evidente que el progreso que el PCCh ha impulsado durante los últimos 50 años se ha ralentizado, mientras que la economía china parece estar a punto de estancarse."
 china.4.a: "Oh Dios..."
 china.5.t: "Primer muerte por COVID-19 reportada"
 china.5.d: "Un hombre de 61 años que había sido hospitalizado tras sufrir dificultad para respirar y neumonía grave en la ciudad de Wuhan, en el centro de China, falleció el jueves, informaron las autoridades. La Comisión Municipal de Salud de Wuhan indicó que 41 personas se encuentran en cuarentena hospitalaria con sospecha de infección por el misterioso virus, siete de las cuales se encuentran en estado crítico. Añadieron que 739 casos de contacto cercano estaban bajo vigilancia médica, un aumento con respecto a los 163 anteriores. 419 de esos casos involucraban a personal médico.\n\nLos tratamientos no mejoraron sus síntomas tras su ingreso en el hospital y falleció la noche del 9 de enero por una insuficiencia cardíaca. Dio positivo en la prueba del virus, añadió.\n\nUna investigación preliminar identificó la enfermedad respiratoria como un nuevo tipo de coronavirus, informaron medios estatales el jueves, citando a científicos a cargo de la investigación."
 china.5.a: "Esperemos que no empeore."
 china.10.t: "Brote de Wuhan identificado como coronavirus"
 china.10.d: "La información inicial sobre los casos de neumonía en Wuhan, proporcionada por nuestros científicos, incluyendo la ocupación, la ubicación y el perfil sintomático de las personas afectadas, apuntaba a un coronavirus como posible patógeno causante de este brote. Posteriormente, nuestros científicos informaron que las pruebas de laboratorio descartaron el SARS-CoV, el MERS-CoV, la influenza, la influenza aviar, el adenovirus y otros patógenos respiratorios comunes.\n\nEl número de casos de neumonía viral reportados en Wuhan, capital de la provincia de Hubei, fue de 59 el domingo, en comparación con los 27 del 31 de diciembre, según la Comisión Municipal de Salud de Wuhan, con siete personas en estado crítico. Hasta el momento no se han reportado fallecimientos."
 china.10.a: "¡Esperemos que no empeore!"
 china.11.t: "Compras de pánico de petróleo"
 china.11.d: "Con Medio Oriente en llamas, muchos de nuestros ciudadanos se enfrentan a una realidad profundamente preocupante: surtidores vacíos y sueños rotos. Muchos no tienen la posibilidad de pagar y abastecer sus máquinas libremente. Si esto fuera un incidente aislado en una pequeña ciudad o provincia durante una semana, lo habríamos considerado casual y lo habríamos abordado como corresponde.\n\nPero esto no ocurre en comunidades pequeñas, sino en los principales centros de transporte metropolitanos. Los trenes no pueden abastecerse, los camiones no pueden continuar por las numerosas carreteras y los trabajadores tienen dificultades para llegar a sus fábricas. Si como nación no nos recuperamos de este problema, tendremos muchos problemas en nuestra condición de la gran \"fábrica del mundo\"."
 china.11.a: "¡Debemos ayudar a la gente!"
 china.11.b: "¡Debemos imponer restricciones!"
 china.12.t: "Dualidad del Partido"
 china.12.d: "Desde las reformas económicas de Deng Xiaoping en China, el Partido Comunista de China se ha enfrentado a una división fundamental en sus políticas. Por un lado, existe una facción que aboga por centrarse en restaurar la igualdad social y garantizar una distribución justa de los recursos económicos. Por otro lado, otra facción impulsa la aceleración de la acumulación de fuerzas productivas y la expansión de la tarta económica.\n\nBajo el liderazgo de Xi Jinping, este enfoque dualista dentro del PCCh se ha vuelto más pronunciado y dinámico. Xi navega hábilmente entre estas dos ideologías en pugna, esforzándose por satisfacer los deseos de ambos bandos sin alterar el delicado equilibrio que sustenta la intrincada estructura estatal de la República Popular.\n\nLos observadores señalan que podría estar acercándose una coyuntura crítica para el PCCh, donde será necesaria una resolución definitiva de este tira y afloja ideológico. Pronto podría llegar el momento en que el PCCh deba establecer con decisión sus políticas nacionales, poniendo fin a la oscilación y la ambigüedad actuales. Este momento crucial podría suponer una elección definitiva entre dos caminos contrastantes, simbolizados por la vieja pregunta: \"¿gato negro o gato blanco?\""
 china.12.a: "Veremos."
 china.13.t: "Asistencia social ampliada"
 china.13.d: "Con el COVID-19, decidimos ampliar temporalmente los servicios de bienestar social para garantizar la satisfacción de la población. Sin embargo, con el paso del tiempo, debemos cuestionarnos si debemos mantener permanentemente estas nuevas reformas de bienestar social ampliadas."
 china.13.a: "Estas medidas fueron puramente temporales."
 china.13.b: "Mantengamos las reformas."
 china.15.t: "Elecciones del secretario general del PCCh del 2022"
 china.15.d: "El tan esperado XX Congreso Nacional del Partido Comunista de China concluyó recientemente en Pekín. Delegados de todo el país han ido abandonando la ciudad, pero el impresionante Gran Salón del Pueblo aún no ha apagado sus candelabros de cristal. La ceremonia política solo concluirá cuando el recién elegido XX Comité Central complete su primera agenda y elija a los líderes del Partido.\n\nEsperen hasta el día de la conferencia de prensa. Ante innumerables flashes y disparos, los siete miembros del Comité Permanente, incluido el secretario general, caminaron por la alfombra roja y se presentaron ante el mundo. A pesar de las especulaciones, el histórico acontecimiento de ver a Xi Jinping elegido por tercera vez causó conmoción en todo el mundo. Los Gobiernos felicitaron con cautela a Xi y esperaron con recelo el siguiente paso del líder autoritario que rompió las reglas no escritas para convertirse en secretario general por tercera vez."
 china.15.a: "La hora crítica se acerca para China."
 china.17.t: "Hu Chunhua se alinea con la Nueva Izquierda"
 china.17.d: "El vice primer ministro Hu Chunhua ha roto filas y parece haberse unido a la Nueva Izquierda. En numerosas entrevistas con la televisión estatal CGTN, Li respaldó varias políticas populistas y condenó la desigualdad de la riqueza, en un drástico giro hacia la izquierda.\n\nSi bien la Nueva Izquierda ha carecido de una figura central dentro del Partido desde el arresto de Bo Xilai, parece que Li se ha preparado para asumir ese rol. Aunque muchos lo consideran menos instigador que Bo, no cabe duda de que el Hu Chunhua de la era post-Xi será drásticamente diferente al que hemos visto antes.\n\nMientras la facción liberal, en ascenso dentro del PCCh, lucha por afianzar su control del poder, parece que la izquierda conservadora no se ha rendido. Mientras China se tambalea entre el liberalismo y el socialismo, su futuro es más incierto que nunca."
 china.17.a: "La izquierda se vuelve a levantar."
 china.18.t: "Hu Chunhua es electo secretario general"
 china.18.d: "Tras la caída de Xi Jinping, el exvice primer ministro Hu Chunhua asumió el cargo de secretario general del Partido Comunista. Con una postura aparentemente más populista que la de sus predecesores, Hu prometió impulsar la profundización de las reformas en la República Popular China y su compromiso con el ideal socialista. Sus recientes apariciones en la televisión estatal indican que su alineamiento con la Nueva Izquierda provocará la reversión de muchas de las políticas de mercado de China, a la vez que intenta reducir la brecha de riqueza que se ha disparado en China durante los últimos 50 años. Mientras China busca reconectar con su pasado, su futuro sigue siendo incierto, pero la gente lo mira con optimismo."
 china.18.a: "Mao sonríe."
 china.19.t: "Wang Yang es electo secretario general"
 china.19.d: "Tras la caída de Xi Jinping, el expresidente del Comité Nacional de la Conferencia Consultiva Política del Pueblo Chino, Wang Yang, ha asumido el cargo de secretario general del Partido Comunista. Desde su entrada en el foco de atención de la política china con su gobierno de Guangdong, Wang siempre ha sido considerado un reformista. Su defensa de las políticas de libre mercado y su apoyo a las organizaciones no gubernamentales le han granjeado una gran popularidad entre los reformistas. El presidente Wang ha anunciado que, bajo su Gobierno, China seguirá una vía de reforma tanto de mercado como política. En el país, las reacciones son mayoritariamente optimistas, ya que China busca afrontar el futuro."
 china.19.a: "Un futuro liberal."
 china.20.t: "Xi consolida su poder"
 china.20.d: "Tras una reunión de emergencia del Politburó, el 19º Politburó decidió aprobar la enmienda constitucional que consolidó el pensamiento Xi Jinping como ideología oficial. Legalmente, esto ha consolidado el poder de Xi como líder indiscutible de China. Si bien las facciones reformistas liberales y conservadoras de izquierda dentro del PCCh aún existen, ahora desempeñan un papel principalmente consultivo para Xi. Aunque la medida ha sido condenada como dictatorial en Occidente, muchos en China la han visto como la mejor manera de alcanzar el sueño chino: una China rica lista para asumir el papel de líder global. Mientras China navega hacia el futuro, Xi la guiará como un tercer Gran Timonel."
 china.20.a: "Para sorpresa de nadie."
 china.21.t: "La ruleta del Partido"
 china.21.d: "Aunque la situación en China apenas se ha estabilizado ligeramente, cualquiera con sentido común sabe que si el vacío de poder supremo no se llena rápidamente, inevitablemente se desatará el caos. Actualmente, Zhang Youxia, líder de facto del EPL, ostenta la máxima autoridad, pero pocos creen que este veterano, ya septuagenario, gobierne durante mucho tiempo. Para colmo, se le atribuye en parte la derrota en la isla de Taiwán. En cuanto al sucesor de Zhang, tres figuras prominentes se han consolidado gradualmente como favoritas.\n\nEl nombre más conocido es Chen Quanguo, exsecretario del PCCh de la Región Autónoma de Sinkiang. Actualmente se encuentra semi-retirado y ocupa un cargo mayormente protocolario en la APN. Nadie ha olvidado su estricto gobierno en Sinkiang durante los últimos cinco años, y el giro del destino que lo salvó de la derrota lo ha convertido en el mejor candidato para cambiar el rumbo.\n\nOtro contendiente de gran prestigio es Li Zuocheng, jefe de Estado Mayor del Departamento de Estado Mayor Conjunto del EPL. Este distinguido veterano realizó importantes contribuciones durante las reformas militares a lo largo de los años. Bajo su liderazgo, varias propuestas estratégicas ayudaron al EPL a obtener una ventaja inicial en la guerra de Taiwán. Su apoyo a Zhang para estabilizar la situación interna impulsó aún más sus posibilidades de ascender a la cima.\n\nEl tercer contendiente, aunque menos conocido, no es en absoluto menos formidable. Chen Wenqing, actual secretario de la Comisión de Asuntos Políticos y Jurídicos del PCCh, es un poderoso competidor. Como exministro de Seguridad del Estado, utilizó su control sobre la red de inteligencia para reprimir implacablemente la disidencia en todas las provincias en medio del caos de la posguerra. Sus tácticas de mano dura intimidaron eficazmente a los adversarios internos y externos que albergaban descontento o intenciones maliciosas. Como resultado, los revanchistas más radicales del Partido lo ven casi como una figura mesiánica."
 china.21.a: "Apretemos el gatillo."
 china.22.t: "Desfile del Día de la Victoria"
 china.22.d: "El 3 de septiembre de 1945, la rendición incondicional de Japón puso fin de forma decisiva a los catorce años de la Guerra de Resistencia del Pueblo Chino contra la Agresión Japonesa. Este día histórico, marcado por la firma del Instrumento de Rendición, fue designado como el Día Oficial de la Victoria de China y se convirtió en un poderoso símbolo global del triunfo sobre el fascismo. Ahora, ochenta años después, el liderazgo de la nación ha decidido celebrar un gran desfile militar en Pekín para conmemorar esta ocasión, un profundo homenaje a quienes se sacrificaron, un solemne recordatorio de la historia y un faro para el futuro.\n\nSin embargo, este desfile es más que una simple conmemoración de victorias pasadas; tiene un inmenso nuevo significado político y contemporáneo. Es el primer desfile desde el lanzamiento del nuevo viaje hacia la modernización al estilo chino, sirviendo como una poderosa exhibición pública para el ejército a medida que avanza hacia su centenario.\n\nMás allá de la exhibición de poder militar, todas las miradas están puestas en la aparición del líder supremo. Como rostro simbólico de la nación, será objeto de un intenso escrutinio tanto por parte del país como del mundo durante el desfile. La pregunta central es qué imagen debe proyectar. Algunos argumentan que debería ponerse un nuevo uniforme, simbolizando una visión fresca para una nueva era. Otros sostienen que mantener su atuendo estándar proyectaría continuidad y estabilidad, evitando cualquier cambio brusco en una ocasión tan trascendental.\n\nDurante los preparativos del desfile, esta pregunta surgió repetidamente. Ambas opciones tenían un peso significativo, y la decisión se reflejaría finalmente en su momento de protagonismo. Cuando finalmente llegó el momento del desfile, la nación contuvo la respiración. El líder supremo ascendió lentamente a la tribuna de honor, su figura cobrando forma gradualmente a medida que los focos y las cámaras convergían en él. Finalmente, eligió..."
 china.22.a: "aparecer ante el pueblo chino con un nuevo uniforme."
 china.6.t: "Bloqueo de Taiwán"
 china.6.d: "En una medida sin precedentes y sumamente agresiva, la República Popular China ha impuesto un bloqueo a Taiwán, utilizando su flota para rodear la isla. El bloqueo se extiende más allá del ámbito marítimo: China también ha restringido los viajes aéreos, impidiendo así la salida de Taiwán tanto de civiles como de funcionarios. Esta acción ha sumido a Taiwán en un estado de pánico y está precipitando una grave crisis económica, ya que la isla se ve gravemente afectada al verse aislada tanto de las importaciones como de las exportaciones, aislándola del comercio mundial y agravando aún más la crisis.\n\nLa respuesta internacional al bloqueo de China ha sido de condena generalizada, en particular por parte de los países occidentales. Estos han exigido el levantamiento inmediato del bloqueo e instado a China a desescalar. Los aliados de Taiwán, en particular Japón y Australia, han expresado su firme apoyo a Taiwán, enfatizando la necesidad de respetar el derecho internacional en medio de la actual crisis mundial, y han prometido brindar ayuda directa si la escalada continúa. Sin embargo, estas respuestas se ven socavadas por la sitaución en EE.UU., actualmente enfrascado en un conflicto interno e incapaz de brindar el apoyo que normalmente podría ofrecer.\n\nCon la perspectiva de una guerra inminente, la situación de Taiwán es cada vez más precaria. La ausencia de apoyo estadounidense, sumada a la escalada y al control económico impuesto por China, ensombrece el futuro de Taiwán y deja a sus aliados lidiando con un escenario incierto y potencialmente desesperado."
 china.6.a: "Asia se calienta..."
 china.6.b: "¡Nuestra liberación es inminente!"
 china.7.t: "¡La R.P. China Invade Taiwán!"
 china.7.d: "La cuarta crisis del estrecho de Taiwán se ha convertido en un conflicto total entre la República Popular China y la República de China en la isla de Taiwán, reiniciando la guerra civil china que había terminado con el exilio del Kuomintang al otro lado del estrecho de Taiwán. Cientos de aviones de combate han comenzado a sobrevolar la isla, enzarzándose en combates a cara de perro, mientras que toda la Armada china se ha movilizado, con informes de los primeros desembarcos en las costas de Taiwán, las islas Lienchiang y enfrentamientos navales inmediatos entre la Armada de la R.P. China y la de la República de China. La República de China ha entrado en plena movilización y se ha declarado la ley marcial en todo Taiwán, mientras las últimas fuerzas de la antigua República de China se preparan para sobrevivir frente al coloso del PCCh, con avistamientos de lanchas de desembarco chinas cruzando ya el estrecho hacia Taiwán, según han informado los guardacostas."
 china.7.a: "El enfrentamiento final."
 china.8.t: "La R.P. China toma las Islas Kinmen"
 china.8.d: "Por primera vez en más de 60 años, China y Taiwán han reanudado las hostilidades, con el Ejército Popular de Liberación realizando múltiples desembarcos en las islas Kinmen. Las islas Kinmen, un punto largamente disputado en las relaciones entre ambos lados del estrecho, son un conjunto de islas a 8 km de China continental y anteriormente gobernadas por la República de China. Al amanecer, paracaidistas e infantes de marina del EPL capturaron puntos clave en toda la ciudad y derrotaron rápidamente a la pequeña guarnición de soldados de la República de China en las islas. Con la República de China declarando la situación como una \"grave violación de la soberanía de la República de China\", pero sin haber declarado aún la guerra, esto marca un cambio sin precedentes en la situación geopolítica de la región."
 china.8.a: "El estrecho se intensifica."
 china.9.t: "Reflexiones de la toma de Kinmen"
 china.9.d: "La liberación de Kinmen y las demás islas de la autoridad de Taiwán ha sido un éxito rotundo, y todas las islas y su administración serán transferidas a la prefectura de Xiamen, provincia de Fujian.\n\nEl izamiento exitoso de la bandera del 1 de agosto en Kinmen significa que la vergüenza de la batalla de 1949 finalmente ha sido limpiada. Pero este no es momento para que el EPL se relaje. El Comando del Teatro del Este ha decidido celebrar una conferencia para resumir los diversos problemas expuestos durante la batalla. Los comandantes reconocieron unánimemente que los largos años de paz han infectado inevitablemente al EPL con una \"enfermedad de la paz\", típicamente en la transmisión de órdenes superiores a menudo fuera de orden y en la ejecución de órdenes a su manera, desviándose del propósito de la batalla. Además, entre los diversos informes de bajas del EPL, el fallo de diversas armas y equipos nuevos representó una proporción considerable, lo que refleja que muchas armas nuevas, aparentemente poderosas, aún necesitan ser probadas en situaciones inesperadas en el campo de batalla.\n\nPara evitar errores similares en futuras batallas, el mando del teatro de operaciones ha decidido presentar las actas de la reunión al CMC y sugerir que se promueva el estudio en todo el ejército. La valiosa experiencia adquirida con los sacrificios de nuestros camaradas ayudará a evitar más bajas innecesarias."
 china.9.a: "La reunificación está un paso más cerca, pero no sin precio."
 china.23.t: "Victoria china en la guerra de Taiwán"
 china.23.d.1: "Con el último disparo en la isla de Taiwán, la nación china finalmente se reunifica. Altos funcionarios del Gobierno taiwanés, como Tsai Ing-wen y Su Tseng-chang, fueron capturados vivos por el EPL mientras intentaban escapar de la zona de guerra, a pesar de ser escoltados por guardias presidenciales.\n\nEl almirante Dong Jun ha declarado el fin oficial de la batalla por el estrecho de Taiwán. La reconstrucción ya está en pleno apogeo, con empresas chinas que se apresuran a obtener contratos de construcción para la reconstrucción de Taiwán, y se anuncian importantes proyectos para integrar económicamente a Taiwán en el continente. Políticamente, la isla permanece bajo ocupación militar hasta que se decida si buscará el estatus de Región Administrativa Especial, similar al de Macao y Hong Kong; una Región Autónoma como las del Tíbet y Sinkiang; o si se integrará plenamente en la República Popular China. Con el fin de 75 años de división, muchos chinos respiran aliviados al saber que China nunca volverá a estar dividida como antes."
 china.23.d.2: "Con el último disparo en la isla de Taiwán, la nación china finalmente se reunifica. Durante la búsqueda tras la batalla de Taipéi, Tsai Ing-wen, Su Tseng-chang y otros altos funcionarios del Gobierno taiwanés desaparecieron misteriosamente. Se informó que un submarino de la Fuerza Marítima de Autodefensa de Japón apareció secretamente en aguas al este de Taiwán, recogiendo a algunos \"invitados importantes\" antes de desaparecer de nuevo, aunque esto sigue siendo solo un rumor.\n\nEl almirante Dong Jun ha declarado el fin oficial de la batalla por el estrecho de Taiwán. La reconstrucción ya está en pleno apogeo, con empresas chinas que se apresuran a obtener contratos de construcción para la reconstrucción de Taiwán, y se anuncian importantes proyectos para integrar económicamente a Taiwán en el continente. Políticamente, la isla permanece bajo ocupación militar hasta que se decida si buscará el estatus de Región Administrativa Especial, similar al de Macao y Hong Kong; una Región Autónoma como las del Tíbet y Sinkiang; o si se integrará plenamente en la República Popular China. Con el fin de 75 años de división, muchos chinos respiran aliviados al saber que China nunca volverá a estar dividida como antes."
 china.23.a: "El dragón ruge."
 china.24.t: "Derrota china en la guerra de Taiwán"
 china.24.d: "Las celebraciones resuenan hoy en Taiwán cuando la República Popular China anuncia el fin de su campaña militar en la isla. Tras semanas de tensos combates, el Ejército Popular de Liberación no ha logrado consolidarse en Taiwán y fue repelido por los defensores de la isla.\n\nTras la derrota de las fuerzas invasoras del EPL, los políticos de Taiwán debaten sobre la reconstrucción y el reconocimiento internacional. Mientras los legisladores de la isla debaten si mantener su estatus como República de China o separarse de China como República de Taiwán, todos los taiwaneses pueden dormir tranquilos sabiendo que su destino no puede ser dictado por los caprichos de los líderes del Partido en Pekín."
 china.24.a: "El dragón se desangra."
 china.31.t: "¡El COVID-19 se esparce a otras provincias!"
 china.31.d: "Las malas noticias siguen llegando una tras otra. Los informes sobre la propagación desenfrenada del coronavirus en la provincia de Hubei se acumulan en el escritorio del director de la Comisión Nacional de Salud. Mientras tanto, han comenzado a llegar informes de casos sospechosos de COVID-19 de provincias vecinas como Hunan y Sichuan, así como de importantes centros económicos como Shanghái y Guangdong, e incluso del centro político, Pekín. Contener el brote en una sola provincia parece imposible. Ahora debemos ajustar rápidamente nuestra estrategia, prepararnos para movilizar a toda la nación para combatir la epidemia y asegurarnos de que esto se haga sin causar un pánico público excesivo. Esperemos que no sea demasiado tarde."
 china.31.a: "¡Tenemos esto bajo control!"
 china.34.t: "¡El COVID-19 se esparce a otros países!"
 china.34.desc: "A pesar de los esfuerzos de los Gobiernos locales y nacionales, el COVID-19 ha seguido propagándose. Han comenzado a llegar noticias de casos sospechosos de COVID-19 desde Corea del Sur y Japón, así como de Italia y Francia en Europa, y de Estados Unidos al otro lado del Pacífico. Dado que la mayoría de estos casos involucran turistas chinos o personas que han viajado recientemente a China, los Gobiernos locales han anunciado la suspensión temporal de todo transporte con China, una medida que podría tardar bastante en normalizarse."
 china.34.a: "¡Es una crisis internacional!"
 china.35.t: "Acuerdos comerciales con Rusia ultimados"
 china.35.d: "Las crecientes tensiones internacionales exigen encontrar socios comerciales más confiables más allá de EE.UU., Europa y Japón para garantizar que nuestra economía no se vea debilitada por conflictos políticos o disputas comerciales. Por lo tanto, debemos fortalecer nuestra cooperación económica con nuestro socio político tradicional, la Federación de Rusia. El petróleo, el gas y los recursos minerales de Rusia, junto con productos industriales ligeros y de alta tecnología de China, circulan constantemente por las principales rutas de transporte entre ambos países. El tintineo constante de vasos llenos de vodka y Maotai refleja la profundización de los lazos comerciales entre ambas naciones, unidas en su oposición común a la hegemonía occidental."
 china.35.a: "¡Un brindis a nuestros camaradas!"
 china.36.t: "sin usar"
 china.36.d: "sin usar"
 china.36.a: "sin usar"
 china.37.t: "¡Golpe del EPL!"
 china.37.d: "La ciudad de Pekín quedó en silencio por primera vez en más de 30 años mientras los tanques avanzaban por la Plaza de Tiananmén hacia Zhongnanhai, el Gran Salón del Pueblo y otros edificios gubernamentales clave. Tras una serie de humillaciones públicas, disturbios sociales y derrotas internacionales sufridas por la administración anterior, el general Li Zuocheng anunció:\n\n\"Es imperativo para la seguridad de la nación y el honor del pueblo que el ejército tome el control temporal para restablecer el orden en el país\". Rumores de purgas de destacados funcionarios civiles de la anterior administración se han extendido fuera de Pekín; sin embargo, el nuevo Gobierno militar no ha confirmado nada. Los observadores internacionales esperan con preocupación la reacción del resto del país, ya que el país se ve más inestable que nunca desde la Revolución Cultural."
 china.37.a: "¡Wansui!"
 china.38.a: "Ecos de Tiananmén..."
 china.39.t: "Insurgencia tibetana"
 china.39.d: "La situación cada vez más caótica en nuestro país recientemente parece haber brindado una oportunidad a los traidores que conspiran para dividir nuestro territorio. La Región Autónoma del Tíbet, que ha estado libre de emergencias durante casi 20 años, se encuentra ahora en estado de pánico. Los separatistas incitan al odio y alimentan los conflictos étnicos entre tibetanos y chinos han, llevando a la sociedad al borde del colapso. El Gobierno regional lucha por mantener el transporte y la economía, mientras que el Gobierno central de Pekín ha ordenado que la mayor parte del Tíbet se declare en estado de emergencia, con el despliegue de policías adicionales de las provincias vecinas para mantener la estabilidad."
 china.39.a: "Ojalá lo logren a tiempo..."
 china.40.d: "El Tíbet siempre ha sido un tema polémico en la política china. Reintegrada a la República Popular en 1951, la región se ha visto asolada por el separatismo y los ecos de la independencia del Gobierno en el exilio tibetano. Sin embargo, durante más de 70 años, la situación nunca ha sido tan caótica como en este momento. La crisis social resultante de la derrota en la guerra de Taiwán ha paralizado la administración de base y ha provocado el resurgimiento de actividades separatistas previamente reprimidas, alimentadas por el creciente temor de la población local a la inestabilidad. El Gobierno chino ha declarado el estado de emergencia y la ley marcial en algunas partes del Tíbet. La comunidad internacional ha vuelto la vista hacia esta silenciosa meseta."
 china.40.a: "¿Se teñirán de sangre roja las montañas blancas?"
 china.41.t: "Colapso del orden en Sinkiang"
 china.41.d: "La Región Autónoma de Sinkiang ha estallado en caos tras la pérdida del control del campo por parte de las administraciones locales ante las milicias islamistas. El Partido Islámico del Turquestán Oriental, con el que hemos luchado durante más de 30 años, finalmente ha comenzado su yihad a gran escala contra nuestra administración en la región. En el norte, insurgentes radicales kazajos lanzaron su propia insurgencia panislamista, mientras que en el centro, una rama más radical del MITO masacra a los hanes indiscriminadamente. Los disturbios raciales han estallado en Urumqi, donde tanto hanes como uigures se enfrentan en escenas que harían parecer 2008 una pelea de patio de primaria."
 china.41.a: "#UiguresDeMierda"
 china.42.t: "Sinkiang arde..."
 china.42.d: "Quienquiera que pensara que Sinkiang podría convertirse en una tierra de eterna abundancia y paz tras un gobierno férreo se sintió profundamente decepcionado. En menos de una década, la región volvió a sumirse en el conflicto y la violencia callejera. Los uigures se enfrentaron a la policía con cuchillos de cocina y horcas, vandalizando y saqueando las casas y tiendas de los chinos han. A medida que la crisis continuaba, resurgieron grupos extremistas que habían desaparecido previamente, y algunos matones incluso se armaron con rifles.\n\nEl Partido Islámico del Turquestán Oriental, un grupo islamista radical que continúa su insurgencia contra China a lo largo de la frontera afgana, anunció su intención de \"liberar a nuestros hermanos y hermanas musulmanes en el Turquestán Oriental, que han sido oprimidos por los imperialistas chinos durante demasiado tiempo\". Mientras tanto, Zhongnanhai denunció al grupo como una banda de yihadistas radicales e instó al mundo musulmán a unirse a ellos en la lucha contra el fundamentalismo..."
 china.42.a: "Vuelven las pesadillas del 2009 y 2011..."
 china.43.t: "El dragón rojo asciende"
 china.43.d: "En las cuatro décadas transcurridas desde que Deng Xiaoping derrocó a la vil Banda de los Cuatro, la República Popular China ha conocido muy poco más que éxito. En lugar de aferrarse al maoísmo ortodoxo de sus predecesores, Deng adoptó una visión más pragmática que se conoce como socialismo con características chinas. Se privatizaron las industrias estatales y se inició una nueva era de crecimiento económico. Las administraciones posteriores de Jiang Zemin y Hu Jintao encaminaron a China hacia la superpotencia mediante el comercio y la globalización. Este rumbo se desvió en 2012, cuando Xi Jinping asumió el liderazgo supremo. Alejándose de la apatía de sus predecesores, Xi adoptó una postura más firme, deseoso de que el mundo supiera que el poder chino había llegado para quedarse. Sin embargo, a pesar de todos sus avances, China no ha logrado ganarse la admiración internacional de la que gozó Estados Unidos en el siglo XX. Pekín sigue siendo blanco de constantes críticas por todo, desde su gestión de las protestas contra la extradición en Hong Kong hasta las continuas tensiones con Taiwán. La mano dura del presidente Xi en materia de gobernanza no ha servido de mucho.\n\nAhora, con el inicio del Año de la Rata, la República Popular se encuentra en tiempos interesantes. Estados Unidos, acérrimo rival y lucrativo socio comercial a la vez, se desintegra, destrozando la estabilidad global, pero también abriendo espacio para una nueva potencia hegemónica. Aunque Moscú, Nueva Delhi y Bruselas siguen siendo rivales potenciales de Pekín, la crisis actual está llena de oportunidades."
 china.43.a: "¡China crecerá!"
 china.44.t: "Colapso del noroeste"
 china.44.d: "Con el declive de la autoridad del Gobierno local y la desintegración de la cadena de mando del Comando del Teatro del Oeste, Qinghai se dividió rápidamente en tres facciones principales: el Frente de Salvación Nacional, la República Islámica y la Dinastía Xie.\n\nEn respuesta al llamado del líder religioso musulmán Xiang Guozhi, la población musulmana local derrocó al antiguo régimen en Haixi. La recién establecida República Islámica rápidamente tomó el control de las instalaciones industriales de la región y las aprovechó para expandir aún más su poder. En Yushu, Xie Jinwei, ex oficial del departamento de logística del Comando del Teatro del Oeste, se autoproclamó descendiente de Xie An y heredero legítimo del linaje real Jin del Este. Sin embargo, su estilo de gobierno no muestra nada de la refinada elegancia del legendario \"estilo Jiangzuo\" que antaño se asociaba con la familia Xie. Aprovechando el vacío de poder, desvió grandes cantidades de suministros militares a Yushu y ahora mantiene una vida cortesana opulenta gracias a los restos de armamento y equipo de la antigua guarnición.\n\nMientras tanto, en Xining, el general Zhao Zongqi, excomandante del Comando del Teatro del Oeste, se ha convertido en la fuerza estabilizadora de esta tumultuosa región. Reconocido por su servicio en múltiples conflictos fronterizos, Zhao Zongqi ha aprovechado su amplia experiencia militar e influencia para unir a los remanentes del Partido Comunista de Qinghai y Gansu, junto con las fuerzas del EPL en retirada.\n\nAunque todos los bandos prometen erradicarse mutuamente y reunificar Qinghai, la contienda es mucho más compleja de lo que parece. La geografía única de la meseta, la compleja composición étnica de la población y el poder relativamente equilibrado entre estas facciones implican que ningún grupo tiene probabilidades de lograr una victoria decisiva a corto plazo."
 china.44.a: "China vuelve a desmoronarse..."
 china.45.t: "Colapso del suroeste"
 china.45.d: "Tras la derrota de China, la vasta región de Yunnan, Guizhou, Sichuan y Chongqing ha caído en un colapso sistémico. Los sistemas administrativos, de producción y de transporte de esta región, de aproximadamente 1.136 millones de kilómetros cuadrados, se han estancado por completo, creando un vacío de poder de facto. Las imágenes satelitales revelan la presencia de al menos cinco caudillos con pleno poder militar y administrativo dentro de la antigua región suroeste, con dos cuerpos mecanizados ocupando el norte de Sichuan y la frontera con Yunnan, respectivamente. El volumen de transporte marítimo en el río Jinsha ha caído al 6% de su nivel de 2021.\n\nEl Gobierno Popular de Sichuan, liderado por Cui Zhiyuan, fue el primero en declarar la independencia, intentando restaurar el orden bajo el lema de la \"reconstrucción del socialismo real\". Sin embargo, su control real se limita a la zona de Chengdu-Chongqing, y el faccionalismo está muy extendido. Las tropas en retirada han dejado al menos 10 arsenales sin destruir en varias ciudades, lo que ha provocado un aumento repentino de la posesión de armas por parte de civiles y un incremento del 200% en la delincuencia urbana, mientras que en las zonas rurales se han formado espontáneamente organizaciones de ayuda mutua.\n\nAproximadamente 100.000 personas han huido a las zonas costeras del sureste. Observadores externos creen que el colapso de esta región difiere de los sangrientos disturbios del noroeste, manifestándose más bien como un fracaso relativamente \"silencioso\" de la autoridad central: después de todo, Pekín ha dejado de enviar personal a la región. Un informe de reconocimiento de la OTDP describe \"la ausencia de un liderazgo claro, ni siquiera un derramamiento de sangre significativo ni disturbios\". Aviones de reconocimiento han fotografiado nuevas banderas ondeando sobre una zona militar-industrial en Sichuan, con un eslogan escrito a mano:"
 china.45.a: "\"El Oriente es Rojo\"."
 china.46.t: "Anarquía en Mongolia Interior"
 china.46.d: "La fragmentación de las praderas de Mongolia Interior ha resultado más extrema de lo previsto. Aunque el Partido de la Independencia, respaldado por Mongolia, ha establecido un Gobierno provisional en Alxa, este se enfrenta a una grave crisis de legitimidad. Salvo un puñado de funcionarios mongoles oportunistas y una pequeña fuerza armada, casi nadie reconoce la autoridad de este régimen en la periferia del desierto. Mientras tanto, el Gobierno Autónomo de Mongolia Interior en Hohhot parece ostentar la posición más fuerte: incluso mientras el resto del país se hunde en la agitación, controla firmemente el centro político y el motor económico de la región. Sin embargo, a pesar de que los funcionarios públicos siguen con sus actividades habituales, todos perciben que el control del Gobierno local disminuye día a día. En Zhurihe, un importante centro militar, el 81º Grupo de Ejército ha emergido abruptamente como una tercera potencia, declarando la ley marcial en las zonas circundantes con el pretexto de \"mantener la seguridad local\".\n\nLas tres facciones se apresuran a extender su influencia. El Partido de la Independencia en Alxa presiona fervientemente a los líderes ganaderos, el Gobierno de Hohhot se afana en convencer a los funcionarios locales y la autoridad militar de Zhurihe acelera su acumulación de armas. Pero los nómadas de las praderas muestran poco interés en la politiquería de estas facciones rivales; más que cualquier promesa de campaña, les importa dónde pastan libremente sus vacas y ovejas.\n\nNadie puede predecir cómo terminará este conflicto entre tres bandos, pero una cosa está clara: el sueño de una Mongolia Interior unificada es ya un lejano recuerdo."
 china.46.a: "Locura."
 china.47.t: "Insurgencia en Shaanxi"
 china.47.d: "El vacío político en Shaanxi se extendió como la pólvora, con la otrora majestuosa sede provincial del Partido reducida a ruinas mientras el viejo orden se disolvía bajo la sombra del colapso.\n\nLas banderas rojas que ondeaban sobre las murallas de Xi'an despertaron recuerdos de la Revolución Cultural entre la generación anterior. Yan'an, la tierra sagrada de la revolución, se ha convertido ahora en la segunda sede del Partido Comunista Maoísta. El joven líder Zhang Yunfan se desplaza con frecuencia entre universidades, intentando encender el fervor revolucionario en los estudiantes confundidos con sus apasionados discursos. Hacen más que denunciar a los \"demonios vaca y espíritus serpiente\": dirigen sus críticas a los burócratas que han traicionado la revolución, prometiendo reconstruir una sociedad más justa e igualitaria donde el pueblo gobierne verdaderamente en esta tierra ancestral. Más al norte, en Ordos, más allá del norte de Shaanxi, surge una fuerza marcadamente diferente. La \"Sociedad del Padre Celestial\" venera a una entidad misteriosa llamada \"Gran Deva Negro\", predicando profecías apocalípticas que atraen a quienes lo han perdido todo en la guerra. Su doctrina fusiona rituales chamánicos con misticismo occidental, afirmando que solo la fe absoluta puede traer salvación durante el juicio final. El propio \"Padre Celestial\" permanece solitario, lo que refuerza el misterio de la organización. Sus seguidores difunden fervientemente sus enseñanzas, considerando la autodestrucción colectiva como una \"escalera para escapar de la reencarnación y alcanzar el cielo\".\n\nLa meseta de Loes se ha convertido en un escenario donde el idealismo se entrelaza con el fervor apocalíptico. Estudiantes y trabajadores confundidos buscan el progreso, mientras que los fervientes miembros de la secta anhelan la destrucción. La gente parece buscar constantemente nuevos cimientos espirituales en medio del caos. El cielo del norte de Shaanxi permanece inmenso, el río Amarillo fluye eternamente y esta tierra ha sido testigo de innumerables conflictos. Sin embargo, esta época podría ser más frenética que nunca."
 china.47.a: "¡La situación se desmorona!"
 china.48.t: "Dongbei suspende las comunicaciones"
 china.48.d: "Desde que la caballería de Nurhaci unificó a los yurchens, el noreste de China nunca ha estado tan fragmentado. Hoy, las tres provincias de Dongbei parecen los fragmentos de un espejo roto, cada una reflejando una realidad distinta. En Heihe, mercenarios con acento eslavo han ocupado una estación de tren abandonada: especuladores de guerra del norte que han traído un gran alijo de armas. Mientras tanto, el Ministerio de Seguridad del Estado ha transformado Chifeng en una zona prohibida patrullada por vehículos blindados en la Avenida Central. Exagentes han erigido un estricto distrito de seguridad, instalando equipos de vigilancia en casi todos los edificios. Cualquier movimiento sospechoso es objeto de escrutinio inmediato.\n\nAl pie del monte Changbai, un remanente harapiento del ejército coreano se aferra a la supervivencia en varias aldeas remotas, subsistiendo del contrabando y el robo. A lo largo del Corredor de Liaoxi, idealistas agrarios han establecido una utopía, apoderándose de vastas extensiones de tierras de cultivo. Las antiguas acerías se utilizan ahora como graneros, donde se funden máquinas herramienta para fabricar aperos agrícolas.\n\nEl EPL aún controla centros militares-industriales clave como Qiqihar, esforzándose por mantener cierto orden. Sin embargo, ni siquiera este ejército regular puede extender su influencia más allá de las ciudades. Mientras tanto, Beidahuang, una vasta empresa pública, ha encontrado una nueva oportunidad en medio del caos. Controlando grandes extensiones de tierras de cultivo y pastos, han convertido esta tierra fértil en un reino agrícola casi militarizado.\n\nLos lugareños bromean diciendo que el noreste es ahora incluso más caótico que durante la era republicana. De hecho, mientras se derrumba todo orden, esta región de tierra negra vive su momento más oscuro."
 china.48.a: "Movilicen a los reservistas."
 china.49.t: "Huang Ming toma control de Pekín"
 china.49.d: "Desde los centros comerciales del sur hasta los centros industriales del norte, una ola de disturbios y protestas ha azotado China, socavando la autoridad del Gobierno central a medida que crece el escepticismo público y las divisiones internas. En medio de este caos, el general Huang Ming, comandante de la guarnición de Pekín, se ha convertido en la figura clave. Tras anunciar un confinamiento total en Pekín en medios nacionales, el EPL aseguró rápidamente varias instalaciones gubernamentales críticas en la capital y extendió su control militar por el norte de China.\n\nAunque Pekín y la región circundante se mantienen estables bajo la autoridad del EPL, la agitación que asola el resto del país no da señales de disminuir. El estancamiento económico, la escasez de bienes y las fallas en la gobernanza local han alimentado un descontento generalizado. En las principales ciudades, trabajadores indignados han salido a las calles; en las zonas rurales, agricultores y milicias locales se están movilizando; e incluso líderes empresariales, rara vez alzados, desafían abiertamente a Pekín.\n\nEs incierto si la férrea estrategia del EPL extinguirá las llamas o echará más leña al fuego. Lo que está claro es que China se encuentra ahora en una encrucijada histórica, y la ley marcial en el norte de China sólo ha concedido a la República un breve respiro."
 china.49.a: "China nos espera."
 china.50.t: "Declaración de Nankín"
 china.50.d: "Entre los vítores de demócratas y jóvenes, una bandera flamante ondea sobre las antiguas murallas de Nankín. Con el respaldo de la Organización del Tratado de Defensa del Pacífico, esta ciudad de seis dinastías se ha convertido una vez más en la cuna de un nuevo régimen.\n\nAutodenominado \"Gobierno Provisional de Nankín\", esta autoridad controla ahora extensas regiones al sur del río Yangtsé. Desde la bahía de Hangzhou hasta el delta del río de la Perla, desde Zhangbaling hasta el monte Baiyun, la influencia del nuevo Gobierno crece a diario, con la ayuda de la OTDP. Sun Zhigang, conocido por su corrupción durante su mandato como secretario del Partido en Guizhou, ha resurgido repentinamente como uno de los fundadores de esta \"China democrática\", o al menos como el rostro del nuevo régimen.\n\nMientras tanto, un gran número de \"asesores\" extranjeros supervisan todos los departamentos. Las decisiones importantes requieren la aprobación de la OTDP, e incluso los movimientos de tropas deben obtener su consentimiento. Los funcionarios recién nombrados hablan sin cesar de \"democracia\" y \"libertad\", pero no pueden ocultar su innata sumisión. Para estos asesores y funcionarios, el régimen que llaman \"democrático\" no es, en última instancia, más que un escaparate cuidadosamente orquestado, destinado a presentar una \"nueva China\" domesticada y sumisa al resto del mundo.\n\nQuizás la mayor tragedia para este país sea que finalmente ha recibido la \"democracia\", pero a un precio tan humillante."
 china.50.a: "¡Traidores!"
 china.51.t: "El Comando Central pierde el control"
 china.51.d: "Tras el colapso total de los Gobiernos provinciales, el Comando Central de Operaciones declaró la ley marcial en gran parte de China Central bajo el lema de \"salvaguardar la unidad nacional\". Antaño leal a Pekín, este distrito militar se ha convertido en la práctica en una entidad política independiente. Su sede temporal en Wuhan busca reconstruir el orden local en lugar del Gobierno de Pekín. Sin embargo, bajo la apariencia de autoridad militar, se arremolinan corrientes subterráneas en el vacío de poder. Desde Yantai hasta Ankang, todas las facciones ven la misma realidad: el Partido Comunista es poco más que un cascarón vacío. El colapso de este vasto imperio ha abierto una ventana de oportunidad para cualquiera que aspire a aprovechar el momento y ascender al poder.\n\nAunque las órdenes de la Comisión de Control Militar siguen circulando por radio, pocos las acatan de verdad. Cada unidad de base obedece las órdenes selectivamente, preparándose para la inminente convulsión. Una vez que se desvanezca la ilusión final de unidad, este país se verá envuelto en un conflicto de una escala nunca antes vista. El llamado control militar es apenas la última pieza del montaje antes de que comience en serio el gran drama."
 china.51.a: "¿Se atreven a llamarse el EPL?"
 china.52.t: "Gobernadores rebeldes reunifican China"
 china.52.d: ""
 china.52.a: "Interesante."
 china.53.t: "El Ejército Mercenario del Noreste reunifica China"
 china.53.d: "Una paz precaria se ha abatido finalmente sobre el Estado chino, ya que los ejércitos del Ejército Mercenario del Noreste han aniquilado los últimos vestigios de resistencia. Cuando el noreste cayó en la anarquía, hordas del EPL desertaron tanto del Comando Central como del Gobierno de Pekín, convirtiéndose en bandidos y caudillos. Por encima de todos ellos se alzaba el comandante ruso-chino con el distintivo de llamada \"Danil\", cuya identidad se desconoce con exactitud, un ambicioso oficial que ascendió de rango gracias a su astucia y sus conexiones con los grupos rusos de contratistas militares privados que inundaron el noreste para \"ayudar a los luchadores por la libertad chinos en sus momentos más difíciles\".\n\nEl Ejército Mercenario, que poco a poco ha ido ampliando sus ambiciones desde el simple caudillismo regional hasta la reunificación de China, se mantiene en gran medida apolítico, recurriendo a prácticas de gobierno más bárbaras, plagadas de corrupción a todos los niveles. Poco después de la reunificación de China, el nuevo Estado, al que Danil denominó simplemente \"Estado de China\", fue reconocido por el Gobierno ruso y otros Gobiernos, pero sigue siendo prácticamente desconocido para Occidente. Sin embargo, corren rumores de disidencia en las filas inferiores del ejército, y solo el tiempo dirá cuánto tiempo podrá Guo conservar el control de su nuevo trono."
 china.53.a: "La espada es más poderosa que la pluma."
 china.54.t: "El Movimiento de Liberación Nacional reunifica China"
 china.54.d: ""
 china.54.a: "Interesante."
 china.55.t: "El Ministerio de Seguridad del Estado reunifica China"
 china.55.d: "La imponente presencia de cámaras de vigilancia en cada esquina se ha vuelto común en todas las ciudades chinas, a medida que el Ministerio de Seguridad del Estado ha consolidado su control sobre el continente chino. Tras el colapso del noreste, el Ministerio de Seguridad del Estado, conocido por muchos como la policía secreta china, formó su propio mini-Estado en las llanuras del noreste tras el fracaso del EPL en controlar esta zona. A medida que consolidaba su control sobre la región, las ambiciones del presidente Chen Wenqing crecieron mientras el Ministerio de Seguridad del Estado y sus tropas marchaban sobre Pekín, intentando tomar el control del aparato estatal chino para imponer su mano dura al resto del país.\n\nConvencidos de que la mayor amenaza para China era la fragmentación interna y de que el Gobierno de Pekín no hacía lo suficiente para frenar la rebelión contra el Estado, el Ministerio de Seguridad del Estado impuso un estricto sistema social y económico que buscaba someter todos los aspectos de la vida china al control del Partido Comunista. Si bien oficialmente conserva el nombre de Partido Comunista de China y de República Popular China, es evidente que se ha producido un cambio radical en el país, y el futuro de China sigue siendo incierto."
 china.55.a: "Algo orwelliano."
 china.56.t: "El EPL reunifica China"
 china.56.d: ""
 china.56.a: "Interesante."
 china.57.d: "Tras una ardua lucha, la flor de la libertad por fin ha comenzado a florecer en China. Li Mingqi, destacado marxista y neoizquierdista chino, logró unificar a China bajo su mando al rebelarse en el sur de Manchuria junto con milicias campesinas."
 china.57.a: "Emerge una nueva China."
 china.57.t: "El Frente Popular Agrario reunifica China"
 china.58.d: "La guerra en China ha llegado a su fin, ya que los leales al Gobierno original, previamente caído, han logrado restablecer el orden en los Gobiernos provinciales y rescatar a China de la guerra civil. Si bien el crimen y el desorden siguen siendo comunes en las calles de las ciudades chinas, parece que el statu quo probablemente no estará a salvo de las cicatrices que dejó la guerra civil.\n\nLa política del comandante Huang Ming, quien logró tomar el control de Pekín en el momento oportuno, resultó muy eficaz para unificar a China. El PCCh tiene mucho trabajo por delante para reconstruir el país."
 china.58.a: "El PCCh parece indestructible."
 china.59.t: "Crisis del estrecho de Malaca"
 china.59.d: "En una protesta unánime contra la participación china en la actual guerra civil filipina, la Organización del Tratado de Defensa del Pacífico declaró un bloqueo naval total en el estrecho de Malaca, prohibiendo el paso de barcos chinos por el estrecho, a la vez que impuso sanciones totales contra Pekín. Casi de inmediato, la economía china se paralizó, ya que miles de millones de exportaciones no pueden satisfacer a sus consumidores, y la presión sobre Pekín para que reaccione de inmediato comenzó.\n\nLa respuesta china fue casi simultánea: anunció sus propias sanciones contra los países de la OTDP, mientras que las quejas proliferaron en redes sociales sobre el aumento previsto de los costos en todo el mundo. Militarmente, se decretó la plena movilización de la Armada china, con varios grupos de combate enfrentándose a las flotas de la OTDP en el estrecho en un tenso enfrentamiento naval. Hasta el momento no se ha disparado, pero ambas partes han comenzado sus esfuerzos para movilizar plenamente sus fuerzas militares, priorizando la preocupación inmediata de que la crisis en Asia se descontrole.\n\nHasta el momento no se ha mencionado ninguna negociación, lo que exacerba aún más las tensiones, ya que el mundo prevé que este frágil estancamiento se intensifique. Los avances en este estancamiento, con tintes de Guerra Fría, siguen en curso."
 china.59.a: "Se viene otra guerra en Asia..."
 china.60.t: "El Movimiento Nacional Colectivo reunifica China"
 china.60.d: "Un infierno se ha apoderado de China, ya que parece que el Movimiento Nacional Colectivo ha consolidado su dominio. Conocido por su ideología extremista, su sistema totalitario de gobierno y su objetivo de erradicar la individualidad de la faz de la tierra, los inexpresivos soldados del MNC han reprimido brutalmente a todos los grupos que se han atrevido a oponerse. En su afán por reunificar China, innumerables ciudades fueron arrasadas, pueblos rebeldes borrados del mapa y antiguos focos culturales se convirtieron en fosas comunes.\n\nHistorias de refugiados y sobrevivientes describen un Estado donde la familia, los amigos e incluso el nombre les son arrebatados, y su existencia se reduce al único objetivo de servir al Estado. La ideología oficial de la \"Desaparición del Yo\" es una versión adulterada del budismo, donde todos los deseos personales deben sacrificarse para servir al Estado. Tiene el objetivo consciente de detener el progreso, frenarlo y congelar el cambio social, provocando el fin de la historia.\n\nCon la anarquía china causando la mayor crisis de refugiados y desastre humanitario conocido por la humanidad, el mundo solo puede observar con horror cómo el MNC, ahora conocido como el \"Imperio Celestial\", sube al escenario mundial y dirige su mirada hacia el exterior.\n\nEl líder enmascarado del MNC, autoproclamado Padre Celestial, se dirigió al mundo, anunciando que la conspiración estaba a punto de completarse. Sorprendentemente, emitió un resplandor rojo brillante, que muchos creyeron era una señal de la conexión del nuevo líder chino con las deidades. Sin embargo, la mayoría pensó que se trataba de simples efectos especiales."
 china.60.a: "Dios salve a China, nadie más puede."
 china.61.d: ""
 china.61.a: "Interesante."
 china.61.t: "El Ejército Rojo Chino reunifica China"
 china.62.d: "El reloj chino ha retrocedido a 1960, con la reunificación del Ejército Rojo de la nación china. El Partido Comunista Maoísta de China fue fundado en 2008 por una coalición de obreros fabriles urbanos y agricultores rurales, insatisfechos con las reformas de la era Deng. Calificaron al PCCh moderno de \"seguidores del camino capitalista\" y buscaron derrocar al \"bloque gobernante revisionista traidor\" para restaurar el comunismo.\n\nPoco después del colapso del régimen, grupos maoístas huyeron a las montañas de Shaanxi, donde la primera revolución tenía su base, y comenzaron a reunir y entrenar a quienes se preparaban para una guerra popular prolongada. Así, cuando la anarquía se apoderó de China, el Ejército Rojo extendió rápidamente su influencia, consiguiendo el apoyo de quienes habían quedado rezagados tras la era de las reformas.\n\nEn las ciudades, los disidentes liberales se horrorizaron al ver repetidas imágenes de la Revolución Cultural, mientras los \"símbolos modernizados de la decadencia occidental\" eran destruidos en masa y destacados profesores universitarios eran despedidos y agredidos por turbas. El caos se ha apoderado de China mientras el fervor revolucionario vuelve a desangrar al país."
 china.62.a: "La historia se repite. Primero como tragedia, luego como farsa."
 china.63.t: "El Gobierno de Nick Land reunifica China"
 china.63.d: "Historiadores occidentales y orientales consideran la derrota china durante la Gran Guerra Asiática como el fin del siglo chino. Con el estallido de la segunda guerra civil china, parecía que China volvería a la era de los caudillos, que marcó al reino con muerte y tragedia durante las décadas siguientes. Inevitablemente, el Estado caudillo de China se disolvió gradualmente mediante la violencia y el derramamiento de sangre, y solo los más fuertes persistieron en el reino intentando consolidar sus reivindicaciones como el verdadero sucesor del antiguo estado chino.\n\nAl cesar el conflicto, parecía que volvería a existir un Estado chino unificado con el establecimiento de la \"Neochina\", encabezada por el filósofo occidental de derecha Nick Land, quien anteriormente, según fuentes no confirmadas, trabajó para el antiguo Gobierno en el área de tecnología exótica. Conocido por su pensamiento aceleracionista, Land ha iniciado la descentralización del Estado mediante la dependencia de la tecnología y la automatización de la infraestructura y la industria del país, haciendo caso omiso de la creciente condena de la comunidad internacional."
 china.63.a: "Neochina... ¿Llega del futuro?"
 china.64.t: "Sin usar"
 china.64.d: "Sin usar"

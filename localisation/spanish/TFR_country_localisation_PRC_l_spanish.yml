 PRC_five_stars_shines_over_china_idea: "Cinco estrellas brillantes"
 PRC_five_stars_shines_over_china_idea_desc: "El significado de la bandera de la República Popular China no tiene un significado simbólico oficial. Sin embargo, la leyenda dice que las cuatro estrellas más pequeñas representan las cuatro clases básicas de la sociedad china: los intelectuales, los campesinos, la clase obrera y los militares, mientras que la quinta estrella que rodean es el Partido Comunista de China. \n\nHoy, después de nuestros esfuerzos, podemos decir con orgullo que después de una limpieza profunda de la corrupción, el nepotismo, el despotismo y la censura, ¡las cinco estrellas de China brillan más que nunca!"

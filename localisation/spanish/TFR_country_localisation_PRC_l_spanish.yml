 china.1037.t: "China comienza la subyugación final del Indostán"
 china.1037.d: "La República Popular China ha lanzado recientemente una serie de operaciones militares a gran escala contra la región del Indostán, que se ha visto envuelta en conflictos de señores de la guerra y turbulencias políticas. Según múltiples fuentes, el Ejército Popular de Liberación avanza por varios frentes fronterizos, apoyado por ataques aéreos y el despliegue rápido de redes logísticas, desarrollos que han atraído una amplia atención internacional.\n\nImágenes satelitales e inteligencia de fuentes abiertas indican que el EPL ha realizado avances rápidos al sur del Himalaya, estableciendo puestos de mando avanzados a lo largo de rutas de transporte clave y asegurando efectivamente el control sobre la mayoría de los centros estratégicos del norte del Indostán.\n\nAunque no está claro si China tiene la intención de anexionar formalmente la región, los observadores señalan que la creciente presencia y el control de facto señalan un cambio estructural en el panorama geopolítico del sur de Asia. La comunidad internacional pronto podría verse obligada a afrontar las implicaciones de la expansión de la frontera estratégica china."
 china.1037.a: "El EPL arrasa Asia."
 china.1038.t: "El futuro de nuestro principal enemigo"
 china.1038.d: "A medida que se ha restaurado el orden en las ciudades japonesas y el control sobre el transporte, la electricidad y las comunicaciones pasa gradualmente a nuestras fuerzas -desde Tokio hasta Sapporo, desde Osaka hasta Fukuoka- existe un consenso compartido: Japón debe pagar el precio por su larga lista de crímenes históricos.\n\nSin embargo, la cuestión de cómo tratar a Japón ha generado un intenso debate. En varias reuniones celebradas en la sede provisional de la administración militar, los oficiales presentaron propuestas marcadamente divergentes.\n\nAlgunos argumentaron que todo el archipiélago japonés debería ser designado como una zona de administración militar bajo el PLA, con control total sobre la gobernanza, la opinión pública y la educación. Mediante métodos contundentes, proponen una purga completa de los elementos nacionalistas restantes y de los posibles sentimientos de resistencia dentro de la sociedad japonesa.\n\nOtros presentaron una visión diferente. Abogan por una \"desjaponización\" exhaustiva, eliminando la estructura nacional existente y dividiendo el país en decenas de unidades políticas regionales, cada una gobernada temporalmente por comités locales de asuntos enviados por la autoridad central. Estas áreas se desligarían por completo del concepto político de \"Japón\" y, con el tiempo, su geografía, cultura, idioma y nomenclatura administrativa evolucionarían para alinearse más estrechamente con China. En su opinión, solo cuando la idea de \"Japón\" sea borrada de la historia se podrá lograr una verdadera seguridad y una paz duradera."
 china.1038.a: "Convierte el archipiélago en un distrito militar."
 china.1038.b: "¡Disolver Japón!"

l_spanish:
 PRC_lockdown_wuhan: "Confinar Wuhan"
 PRC_lockdown_wuhan_desc: "A medida que se extiende el pánico, la situación se está descontrolando. Desde que las cámaras de seguridad informaron del descubrimiento de un \"nuevo tipo de coronavirus infeccioso\", se han observado indicios de un éxodo de personas de toda la provincia de Hubei, principalmente de la ciudad de Wuhan. Los ciudadanos se apresuran a salir de la ciudad, las carreteras están saturadas, paralizando por completo el tráfico. Si nos quedamos de brazos cruzados, en pocos días se detectarán más casos de infección en hospitales de todo el país. Debemos actuar cuanto antes y decretar el confinamiento total de Wuhan de inmediato."
 PRC_nationwide_lockdown: "Cuarentena nacional"
 PRC_nationwide_lockdown_desc: "Esto no tendrá precedentes en la historia de la salud pública - para contener el brote lo antes posible, todo el país entrará en un \"sistema de tiempo de guerra\", con estrictas restricciones de viajes y transporte para contener la propagación del virus. Los ciudadanos infectados de COVID-19 serán aislados y tratados en hospitales y puestos médicos temporales. Simultáneamente, médicos y biólogos de todo el país se movilizarán para encontrar la solución definitiva para derrotar al virus."
 PRC_implement_emergency_measures: "Implementar medidas de emergencia"
 PRC_implement_emergency_measures_desc: "En estos tiempos de crisis nacional, cuando todo el pueblo debería ser solidario con el prójimo, no es sorprendente que varios e inmorales activistas antipartido y oportunistas se hayan aprovechado de la situación, difundiendo rumores para difamar al Partido y al Gobierno, a la vez que obstaculizan nuestros esfuerzos por controlar la situación en diversas partes del país. No se tolerará a estas personas, y la policía se movilizará de inmediato para reprimir a los descarados comerciantes que acaparan y revenden medicamentos y mascarillas a precios exorbitantes. También se implementará un control más estricto de internet para evitar que la gente sea desinformada."
 PRC_implement_widespread_testing: "Implementar pruebas generalizadas"
 PRC_implement_widespread_testing_desc: "Las pruebas de ácidos nucleicos no solo son económicas y fáciles de promover, sino que también nos permiten diagnosticar con mayor eficacia si una persona está infectada con el coronavirus, lo cual es crucial para el tratamiento oportuno de los pacientes, la vigilancia y el control de la pandemia, y la restauración de la economía y la vida normal. Promoveremos el programa de pruebas de ácidos nucleicos en todo el país y construiremos varios centros de prueba en las principales ciudades. En primer lugar, el personal gubernamental, y en el futuro, todos los ciudadanos e incluso toda la población, estarán obligados a hacerse la prueba."
 PRC_economic_stability_policy: "Política de estabilidad económica"
 PRC_economic_stability_policy_desc: "La pandemia de COVID-19 ha tenido un impacto burtal en el orden económico y las actividades productivas de nuestro país, y ha retardado gravemente nuestro crecimiento económico - en cierto sentido, el COVID podría impedirnos alcanzar nuestro objetivo de construir una moderna potencia socialista para mediados de este siglo. Ahora que la pandemia se ha globalizado y el brote en nuestro país se ha contenido inicial y eficazmente, es hora de que la nación retome la construcción económica. Aprovecharemos también esta oportunidad para consolidar aún más nuestra posición como la \"fábrica del mundo\"."
 PRC_zero_covid_policy: "Política de Cero-COVID"
 PRC_zero_covid_policy_desc: "Fracasar en proteger la vida de las personas ante la amenaza del COVID-19 pondría en serias dudas la legitimidad del PCCh. Además, las estrictas medidas que adoptamos en las primeras etapas de la propagación del COVID-19 probaron ser muy eficaces. Quien desee que China vuelva a la normalidad flexibilizando las restricciones no reconoce el horror del virus o tiene segundas intenciones. Seguiremos implementando la política de Cero-COVID, como dijo el secretario general: \"Primero el pueblo, primero la vida\"."
 PRC_adopt_the_swedish_model: "Adoptar el modelo sueco"
 PRC_adopt_the_swedish_model_desc: "Como el primer país del mundo en anunciar oficialmente el fin de la pandemia, la respuesta del Gobierno de Suecia al COVID-19 también ha atraído la atención de varios Gobiernos. Algunos de nuestros funcionarios de salud y científicos también han sugerido que podemos aprender de la experiencia sueca, incluyendo la flexibilización de las restricciones de entrada y salida de personas en lugares públicos, la suspensión de las estadísticas públicas sobre el número de casos confirmados y la exención de la prueba de ácido nucleico obligatoria para el personal no médico o los grupos fuera de alto riesgo, entre otras medidas. Cuando la transmisibilidad y la virulencia del virus disminuyan en el futuro, esto ayudará a nuestro país a volver a la normalidad más rápidamente."
 PRC_kickstart_vaccine_research: "Iniciar la investigación de vacunas"
 PRC_kickstart_vaccine_research_desc: "Emitiremos una orden lo antes posible para exigir a los institutos de investigación biológica y a las farmacéuticas de todo el país que inicien de inmediato la investigación y las pruebas de la nueva vacuna contra el COVID-19, no solo para acelerar el control de la pandemia, sino también como un medio fundamental para fortalecer nuestro prestigio internacional y ampliar nuestra influencia. Actualmente, una variedad de vacunas inactivadas, incluida la desarrollada por Sinovac Biotech, se encuentran en fase de ensayos clínicos en nuestro país. Al mismo tiempo, hemos enviado declaraciones a la OMS y a otros países en desarrollo, expresando nuestra voluntad a donar vacunas y brindar asistencia para la investigación científica."
 PRC_adopt_strict_lockdown_measures: "Medidas de confinamiento estrictas"
 PRC_adopt_strict_lockdown_measures_desc: "A pesar de nuestra preparación, la infectividad del coronavirus aún supera nuestra imaginación. Solo podemos reforzar nuestras medidas de vigilancia y dedicar más recursos a minimizar la circulación de personas dentro de la ciudad, entre zonas urbanas y rurales, y a través de las fronteras. Algunos nos han acusado de \"forzosamente aislar la nación entera\", pero el confinamiento resultará necesario para combatir la pandemia."
 PRC_focus_on_vaccine_development: "Priorizar el desarrollo de la vacuna"
 PRC_focus_on_vaccine_development_desc: "Solo desarrollando vacunas fiables podremos controlar verdaderamente la propagación del coronavirus desde la raíz. Actualmente, la investigación y el desarrollo de vacunas por parte de las biofarmacéuticas, lideradas por Sinovac Biotech, ya han obtenido resultados decisivos. Debemos utilizar adecuadamente los fondos y recursos a nuestra disposición para seguir apoyando los esfuerzos de las empresas en el desarrollo de vacunas y poner rápidamente en práctica los resultados, garantizando así que la población pueda, finalmente ser inmune al virus."
 PRC_focus_on_mask_production: "Priorizar la producción de barbijos"
 PRC_focus_on_mask_production_desc: "Las mascarillas médicas no solo son económicas, sino que también se pueden producir en masa y transportar con gran facilidad por todo el país. El suministro adecuado de mascarillas es también una de las razones principales por las que logramos estabilizar la pandemia. El Consejo de Estado seguirá invirtiendo en la expansión de la producción de mascarillas, especialmente brindando apoyo técnico y subsidios a los fabricantes en zonas donde la pandemia es grave."
 PRC_food_safety_reforms: "Reformas de seguridad alimentaria"
 PRC_food_safety_reforms_desc: "Teniendo en cuenta que la desafortunada pandemia de COVID-19 se desencadenó por el consumo de carne de caza por parte del \"Paciente 0\", ha llegado el momento de reformar radicalmente nuestro sistema de seguridad alimentaria e higiene. No sólo introduciremos legislación para erradicar el hábito de comer carne de caza, sino que también promoveremos modales más higiénicos en la mesa para minimizar la propagación de virus en lugares públicos. Además, invertiremos más en la producción de alimentos procesados industrialmente y de comida rápida para hacerlos más sanos y seguros."
 PRC_surveillance_state_contact_tracing: "Rastreo estatal de contactos"
 PRC_surveillance_state_contact_tracing_desc: "Empezamos a utilizar la aplicación de seguimiento \"código sanitario\" tras el estallido de la pandemia, para que sirviera de pasaporte electrónico de un individuo y de prueba fiable de su estado de salud personal, así como de indicación del nivel de riesgo personal del usuario del COVID-19. Sólo cuando el Gobierno tenga pleno control sobre el seguimiento en tiempo real de las poblaciones de alto riesgo será posible formular políticas más eficientes, garantizando al mismo tiempo que la información crítica de seguridad nacional y la información personal sobre sus ciudadanos no se vea comprometida."
 PRC_outsource_contact_tracing: "Subcontratar el rastreo de contactos"
 PRC_outsource_contact_tracing_desc: "Empezamos a utilizar la aplicación de seguimiento \"Health Code\" tras el estallido de la pandemia, para que sirva de pasaporte electrónico de un individuo y de prueba fiable de su estado de salud personal, así como de indicación del nivel de riesgo personal del usuario del COVID-19. Para reducir la presión administrativa y el coste del Gobierno, podemos optar por ceder el funcionamiento de Health Code a empresas privadas de internet de confianza, permitiéndoles compartir la carga conjuntamente."
 PRC_fund_crowd_immunity_studies: "Estudios de inmunidad colectiva"
 PRC_fund_crowd_immunity_studies_desc: "La inmunidad nacional frente al COVID-19 ha aumentado significativamente a medida que se incrementan las tasas de vacunación. Uno de los fundamentos clave de la teoría de la inmunidad comunitaria es que cuando un mayor porcentaje de la población está inmunizado, es más fácil romper la cadena de infección que se propaga de un individuo a otro, y los efectos de una pandemia nacional pueden eliminarse gradualmente. Comenzaremos a instruir a nuestros científicos médicos y a los principales medios de comunicación en los preparativos teóricos y el trabajo de propaganda antes de la aplicación de la política de inmunidad comunitaria, sentando las bases para un cambio de política."
 PRC_blame_the_americans: "Culpar a los gringos"
 PRC_blame_the_americans_desc: "Debemos encontrar un chivo expiatorio para los fallos y el caos que se produjeron en la prevención de la pandemia. Hablando de eso, ¿podría haber un blanco mejor para la culpa que los Estados Unidos? La arraigada propaganda nacionalista antiamericana y el miedo al poderío estadounidense harán muy fácil que las mayorías crean en todo tipo de conspiraciones. A través del portavoz del Ministerio de Asuntos Exteriores, culparemos a los americanos de los experimentos biológicos en Fort Detrick como culpables de la pandemia de COVID-19, así como a la delegación militar estadounidense que llevó el virus a Wuhan."
 PRC_blame_local_officials: "Culpar a funcionarios locales"
 PRC_blame_local_officials_desc: "Debemos encontrar un chivo expiatorio para los fracasos y el caos que se produjeron en la prevención de la pandemia. Podemos capitalizar el odio del pueblo hacia los burócratas corruptos y los cuadros de funcionarios perezosos lanzando una nueva campaña anticorrupción. La Comisión Central de Inspección Disciplinaria (CCID) llevará a cabo una revisión exhaustiva del trabajo y los documentos de todos los niveles de gobierno durante los últimos años, centrándose en los cuadros de oficiales locales que no son proactivos en la aplicación de las políticas de la autoridad central y que mantienen relaciones inapropiadas con las farmacéuticas. También podemos aprovechar esta oportunidad para instalar afines en la administración."
 PRC_expand_the_social_safety_net: "Extender la red de seguridad social"
 PRC_expand_the_social_safety_net_desc: "El COVID-19 nos ha dado una dolorosa lección. En todo el país, el virus se ha cobrado la vida de un gran número de personas, que además son pobres y están socialmente desconectadas, especialmente los ancianos. Ya sea en el campo o en las ciudades, la situación es similar, lo que revela a profundidad las deficiencias de nuestro sistema de red de seguridad social. Si queremos alcanzar el objetivo de prosperidad común fijado por el Partido, debemos formular mejores políticas de seguridad social y prestar una asistencia más oportuna a los necesitados."
 PRC_return_to_normalcy: "Regreso a la normalidad"
 PRC_return_to_normalcy_desc: "Tras años de duro esfuerzo, hoy por fin podemos anunciar a toda la nación y al mundo que China ha salido de la pandemia de COVID-19 y ha vuelto oficialmente a la normalidad. No se trata sólo de una victoria del Partido Comunista de China y de la República Popular China, ¡sino también de una gran victoria conseguida por 1.400 millones de chinos!"
 PRC_control_the_oil_crisis: "Controlar la crisis del petróleo"
 PRC_control_the_oil_crisis_desc: "La inesperada crisis del petróleo ha devastado nuestra economía. La bolsa se desplomó en una semana, el pánico en el mercado superó incluso las peores estimaciones, muchas empresas se vieron obligadas a declararse en bancarrota y los inversores extranjeros empezaron a plantearse la retirada. Nuestro orgullosamente potente sistema de transporte se ha paralizado por falta de la energía esencial. El Partido ha ordenado empezar inmediatamente a arreglar la economía, pero por dónde empezar sigue siendo un lío."
 PRC_crack_down_on_left_radicals: "Reprimir a radicales de izquierda"
 PRC_crack_down_on_left_radicals_desc: "Como era de esperar, existe una fuerte oposición que se ha aprovechado de la crisis económica para presionar a la dirección del PCCh para que aplique las reformas y ceda el poder. La izquierda radical, que durante mucho tiempo se opuso a la Reforma y Apertura -incluidos los cuadros superiores retirados, los académicos y los jóvenes descontentos por la recesión económica-, han alzado la voz para exigir la restauración de la igualdad socialista del maoísmo y condenar la política revisionista del actual Gobierno. ¡Deben ser reprimidos con puño de hierro!"
 PRC_crack_down_on_reformist_protesters: "Reprimir a protestantes reformistas"
 PRC_crack_down_on_reformist_protesters_desc: "Como era de esperar, existe una fuerte oposición que se ha aprovechado de la crisis económica para presionar a la dirección del PCCh para que aplique las reformas y ceda el poder. Muchos capitalistas afirmaron abiertamente que la excesiva intervención de las autoridades en el mercado y su campaña contra la empresa privada eran las principales causas del colapso económico. No sólo eso, sino que las facciones reformistas del Partido y los jóvenes intelectuales públicos cantaron sus alabanzas. Tenemos que conseguir que aprendan a mantener la boca cerrada."
 PRC_empower_the_50_cent_army: "Empoderar al partido de los 50 centavos"
 PRC_empower_the_50_cent_army_desc: "El apodo popular de los comentaristas que suelen publicar mensajes favorables al Partido y al Gobierno en internet se ha convertido en un nombre familiar - \"partido de los 50 centavos\" -, lo que implica que cantan las alabanzas de las autoridades a cambio de migajas de pan. Sin embargo, siguen desempeñando un papel importante a la hora de orientar nuestro discurso en la red. Siempre que nos enfrentamos a una crisis de opinión pública, esta táctica es eficaz, y esta vez no será diferente."
 PRC_concessions_to_corporate_demands: "Concesiones a demandas corporativas"
 PRC_concessions_to_corporate_demands_desc: "La capacidad de gobierno del Partido está siendo sometida a una seria prueba. Si el descontento empresarial sigue creciendo, será difícil garantizar el desarrollo de la economía. Por lo tanto, haremos las debidas concesiones a las demandas de las empresas introduciendo políticas favorables a los negocios, incluyendo recortes fiscales y alivio de la deuda, así como poniendo fin a la denigración de los empresarios en internet. Al fin y al cabo, China no puede convertirse en una superpotencia sin el PIB creado por sus empresas."
 PRC_concessions_to_populist_demands: "Concesiones a demandas populistas"
 PRC_concessions_to_populist_demands_desc: "La capacidad de gobierno del Partido está siendo sometida a una seria prueba. Si el descontento del pueblo sigue creciendo, será difícil garantizar la estabilidad del país. Por lo tanto, haremos las debidas concesiones a las demandas populares y les permitiremos que organicen algunas protestas y manifestaciones para expresar su descontento. Al fin y al cabo, las consignas nacionalistas y populistas que plantean no nos preocupan."
 PRC_stabilize_the_political_sphere: "Estabilizar la esfera política"
 PRC_stabilize_the_political_sphere_desc: "Aunque no se han eliminado por completo las voces críticas, hemos estabilizado en gran medida la esfera política, asegurado el apoyo al Partido y al secretario general de la mayoría, así como satisfecho las demandas de las facciones del Partido y los grupos de interés. Esto proporcionará una base sólida para nuestros próximos pasos."
 PRC_contain_the_damage: "Minimizar daños"
 PRC_contain_the_damage_desc: "Sólo asegurando primero la estabilización de la esfera doméstica podremos llevar a cabo reformas para responder a la crisis del petróleo y restaurar la fortaleza del país. China nunca ha necesitado la unidad y un liderazgo fuerte tanto como hoy."
 PRC_a_broken_system: "Un sistema roto"
 PRC_a_broken_system_desc: "Debemos reconocer que el duro golpe de la crisis del petróleo ha demostrado más allá de toda duda la insuficiencia y fragilidad del sistema existente. Aceptaremos reformas más radicales e introduciremos modificaciones radicales en el viejo sistema. Sólo así podremos ver el verdadero renacimiento de China."
 PRC_expand_domestic_oil_production: "Expandir la producción nacional petrolera"
 PRC_expand_domestic_oil_production_desc: "En una coyuntura tan crucial, no podemos seguir dependiendo de los inestables canales de importación de petróleo extranjero. Explotaremos más nuestros recursos domésticos y construiremos más plantas de perforación y procesamiento de petróleo. Sólo entonces la seguridad energética estará realmente bajo nuestro control, al tiempo que se reducirán los costes de transporte del combustible y se mitigará aún más el impacto de la crisis económica."
 PRC_diversify_the_oil_trade: "Diversificar el comercio petrolero"
 PRC_diversify_the_oil_trade_desc: "En un momento en que los principales países productores de petróleo del mundo están sumidos en la inestabilidad y el desorden, asegurar y estabilizar nuestras importaciones de energía es fundamental para mitigar la crisis. Gracias a nuestras buenas relaciones con los países en desarrollo a lo largo de los años, nos será más fácil diversificar nuestros riesgos abriendo rutas adicionales de importación de petróleo, como las de Venezuela y Brunéi."
 PRC_drill_for_xinjiang_oil: "Petróleo en Sinkiang"
 PRC_drill_for_xinjiang_oil_desc: "El amplio territorio de Sinkiang lleva explotando petróleo desde hace mucho tiempo, pero debido a razones como la lejanía y la escasa población, el petróleo extraído localmente no podía utilizarse adecuadamente. Hoy en día, con la construcción de nuevos oleoductos y la aprobación de nuevos contratos de explotación petrolífera, el petróleo de Sinkiang se ha convertido en el sustento de la economía de nuestro país."
 PRC_south_china_sea_expansion: "Expansión al mar de la China"
 PRC_south_china_sea_expansion_desc: "El mar de la China Meridional es rico en recursos, con reservas suficientes para mantenernos durante toda la crisis. A pesar de que todos los países que rodean el mar de la China Meridional han reclamado su soberanía y el derecho a explotar sus recursos, como el país más poderoso de la región, podemos enviar nuestra flota y aviones para proteger nuestras plataformas de perforación y convoyes mercantes, así como para ahuyentar a nuestros homólogos extranjeros. Tal vez otras naciones protesten enérgicamente por nuestro comportamiento, pero eso carece de importancia."
 PRC_synthetic_oil_investments: "Invertir en petróleo sintético"
 PRC_synthetic_oil_investments_desc: "El petróleo sintético resulta atractivo en una época de escasez energética. Para nuestro país, el petróleo sintético no sólo es barato y puede producirse en grandes cantidades rápidamente, sino que además es tan eficiente como el real. A pesar de sus defectos, como su escasa estabilidad, el petróleo sintético se ha convertido en una importante fuente de energía en la mayoría de las fábricas del este del país, y parece probable que la tendencia siga extendiéndose."
 PRC_gambit_in_the_gulf: "Gambito en el Golfo"
 PRC_gambit_in_the_gulf_desc: "Para resolver un problema, debemos ir a su origen. Reforzaremos nuestra presencia en la región del Golfo y seremos más proactivos en la defensa de nuestros intereses vitales. También nos comprometeremos directamente con los Gobiernos de Medio Oriente y les prestaremos apoyo para que la situación allí se estabilice lo antes posible y se ponga fin a los efectos negativos de la crisis del petróleo."
 PRC_stabilize_the_economic_sphere: "Estabilizar la esfera económica"
 PRC_stabilize_the_economic_sphere_desc: "El impacto de la crisis del petróleo en nuestra economía puede neutralizarse mediante diversos métodos. El Gobierno introducirá decretos para limitar la tasa de aumento de los precios del combustible, establecerá cupones de combustible para limitar el consumo de reservas, y emitirá ayudas y bonos adicionales para las zonas desfavorecidas con el fin de frenar la recesión económica. Mediante una combinación de instrumentos políticos, el pueblo se dará cuenta de que somos capaces de estabilizar la esfera económica."
 PRC_southeast_asian_bailout_package: "Paquete de Rescate del Sudeste Asiático"
 PRC_southeast_asian_bailout_package_desc: "Los países del Sudeste Asiático no son tan fuertes como nosotros en cuanto a reservas energéticas y economía, así que cuando estalló la crisis del petróleo, las economías de los países de allí se vinieron abajo, y las crisis internas se sucedieron una tras otra. Podemos aprovechar esta oportunidad para ampliar aún más nuestra influencia sobre la ASEAN, estabilizar la situación económica y política de la región mediante el aumento del comercio y los intercambios, y construir nuestra imagen de superpotencia responsable."
 PRC_chase_the_chinese_dream: "Perseguir el Sueño Chino"
 PRC_chase_the_chinese_dream_desc: "No debemos ignorar la importancia de dar a nuestro pueblo confianza en sí mismo en tiempos de crisis nacional. Seguiremos promoviendo el \"Sueño Chino\", haciendo hincapié en que lo hemos hecho mejor que ningún otro país del mundo a la hora de recuperar la economía y hacer frente a la crisis. Al mismo tiempo, no debemos olvidarnos de publicar los modelos de conducta del pueblo y aumentar el sentido de patriotismo de la población."
 PRC_rejuvinate_the_nation: "Rejuvenecer la nación"
 PRC_rejuvinate_the_nation_desc: "Afortunadamente, hemos salido poco a poco de la bruma de la crisis del petróleo, la situación económica se está reactivando y los niveles de divisas empiezan a estabilizarse. Muchos inversores extranjeros también han decidido regresar al país para hacer negocios. Las brillantes perspectivas económicas del país y el elevado orgullo nacional demuestran una vez más que ninguna dificultad u obstáculo puede derrotar al pueblo chino, y que el Gran Rejuvenecimiento de China está a nuestro alcance."
 PRC_a_renewable_revolution: "Revolución renovable"
 PRC_a_renewable_revolution_desc: "No podemos esperar resolver la crisis energética nacional simplemente reanudando las importaciones de petróleo. Afortunadamente, los rápidos avances de la ciencia y tecnología en los últimos años nos han permitido aprovechar mejor tecnologías avanzadas como la eólica y la solar para remediar las pérdidas económicas causadas por la escasez de petróleo. Además, el fomento de las tecnologías de energías renovables también puede reducir la contaminación ambiental y aumentar las oportunidades de empleo."
 PRC_a_nuclear_revolution: "Revolución nuclear"
 PRC_a_nuclear_revolution_desc: "Economistas y científicos de nuestro gobierno nos han aconsejado invertir más en el campo de la energía nuclear durante la crisis del petróleo y confiar más en esta eficiente fuente de energía para impulsar nuestro sistema económico y nuestra industria. Aunque a algunos les preocupan los posibles riesgos de seguridad y la contaminación de la energía nuclear, no hay lugar para vacilaciones en un momento tan crítico."
 PRC_shake_up_the_politburo: "XX Congreso Nacional"
 PRC_shake_up_the_politburo_desc: "Por fin celebraremos el XX Congreso Nacional del Partido Comunista de China para elegir al nuevo Comité Central y fijar el eje de la labor del Partido en los próximos 5 años. Muchas personas, tanto dentro como fuera del país, están muy interesadas en los resultados de este Congreso, y aprovecharemos esta oportunidad para demostrar la fuerza y la unidad del Partido."
 PRC_the_final_opportunity: "La última oportunidad"
 PRC_the_final_opportunity_desc: "Tras más de 70 años de estancamiento, el mayor obstáculo para la reunificación de nuestra patria ha desaparecido por fin al EE.UU. caer en conflictos internos. Aunque muchos países de la región Asia-Pacífico, encabezados por Japón, afirman que trabajarán juntos para estabilizar la situación en el estrecho de Taiwán, ni su poder económico ni su fuerza militar pueden rivalizar con los de China y, sin el liderazgo de EE.UU., será muy difícil que estén realmente unidos. Por eso ahora es el mejor momento para iniciar la campaña por la liberación de Taiwán, ya que es muy probable que una oportunidad así no se vuelva a presentar."
 PRC_prepare_landing_craft: "Preparar lanchas de desembarco"
 PRC_prepare_landing_craft_desc: "La capacidad de desembarco anfibio siempre ha sido el centro de atención de la construcción militar del EPL. Desde la década de 1990, hemos comprado motores y planos de diseño de buques a Rusia, Ucrania y otros países específicamente para grandes barcazas de desembarco. Al entrar en el nuevo siglo, la Armada del EPL también ha construido y puesto en servicio una flota considerable de buques de asalto anfibio similar a la de la Marina estadounidense. Movilizaremos en secreto estos buques y los desplegaremos en posiciones de embarque frente a las costas de las provincias de Fujian y Zhejiang."
 PRC_modern_combined_arms: "Armas combinadas modernas"
 PRC_modern_combined_arms_desc: "Tras estudiar intensamente las operaciones militares de EE.UU. y Rusia, hemos adquirido una comprensión más clara de la complejidad de la guerra moderna. La campaña de Taiwán requirió una estrecha cooperación entre la Armada, el Ejército y la Fuerza Aérea, así como la Fuerza de Misiles y la Policía Armada. Además, según la moderna teoría de las armas combinadas, también eran muy importantes el intercambio de información entre las distintas ramas de las FF.AA. y su subordinación unificada al mando de la Comisión Militar Central."
 PRC_blockade_taiwan: "Bloquear Taiwán"
 PRC_blockade_taiwan_desc: "Trazaremos una zona de prohibición de navegación en las aguas que rodean la isla de Taiwán y enviaremos fragatas y submarinos a patrullar día y noche los límites marítimos designados. También se vigilarán estrechamente las rutas aéreas que conducen directamente a la isla de Taiwán. Con ello no sólo se pretende dispersar las interferencias de los buques y la aviación civiles y despejar el camino para los ataques aéreos y marítimos del EPL, sino también cortar las fuentes económicas de Taiwán y desestabilizar el Gobierno de la isla. Puede que haya países que condenen esto, alegando que nuestras acciones provocarán una crisis humanitaria en Taiwán, pero en cuanto Taiwán se derrumbe, todo acabará rápidamente."
 PRC_conduct_final_training: "Conducir los últimos entrenamientos"
 PRC_conduct_final_training_desc: "No sólo la flota se entrena para la campaña de Taiwán, sino que las fuerzas de vanguardia del EPL también están realizando maniobras finales de desembarco en la península de Liaodong y en la isla de Hainan. Mientras tanto, en las bases de entrenamiento del interior, las tropas aerotransportadas y las fuerzas especiales, que se espera que sean las primeras en desembarcar en Taiwán, también han comenzado a realizar entrenamientos para asaltos de infiltración. Todo ello para asegurarnos de que estamos en las mejores condiciones para hacer frente a la guerra cuando el fuego se levante de verdad."
 PRC_expand_the_j20_program: "Ampliar el programa J-20"
 PRC_expand_the_j20_program_desc: "El J-20 es un programa de caza furtivo de quinta generación desarrollado por la Fuerza Aérea, y es también uno de los cazas más avanzados y potentes del mundo. Además, nuestra industria aeronáutica, cada vez más desarrollada, ha permitido resolver los cuellos de botella técnicos que nos han asolado durante muchos años. Ahora tenemos todas las condiciones para la producción en serie del J-20, y también podemos construir modelos mejorados con motores más avanzados o mejores revestimientos furtivos, en función de los requisitos militares."
 PRC_operation_silent_dawn: "OPERACIÓN: §YAMANECER SILENCIOSO§!"
 PRC_operation_silent_dawn_desc: "Por fin ha llegado el momento más crítico: lanzaremos la operación Amanecer Silencioso, un paso importante para determinar el éxito de nuestro plan de batalla. Misiles balísticos y cohetes comandados por la Fuerza de Misiles lanzarán ataques preventivos contra las instalaciones militares clave de Taiwán, como aeródromos, misiles de defensa antiaérea y estaciones de radar, destruyendo por completo sus capacidades de alerta temprana. Los misiles también apuntarán a centrales eléctricas y subestaciones, así como a importantes centros de comunicaciones."
 PRC_sieze_kinmen: "Tomar Kinmen"
 PRC_sieze_kinmen_desc: "Las islas Kinmen están adyacentes a Xiamen, en la provincia de Fujian, y son uno de los importantes puestos avanzados del ejército taiwanés. Si queremos iniciar una operación de desembarco en Taiwán, primero debemos tomar Kinmen para destruir el sistema defensivo periférico de Taiwán y, al mismo tiempo, proporcionar una importante base avanzada y zona de reagrupamiento para las fuerzas de desembarco. No sólo eso, sino que la toma de Kinmen también lavará la vergüenza de nuestra desastrosa derrota en la batalla de Kinmen hace más de setenta años."
 PRC_plan_on_high_alert: "Armada en alerta máxima"
 PRC_plan_on_high_alert_desc: "Desde que nuestra armada inició su misión de bloqueo y crucero en el estrecho de Taiwán, una de las tareas importantes de la flota ha sido estar alerta ante posibles intentos de fuga de buques de guerra taiwaneses, así como protegerse de las acciones de hostigamiento de fuerzas hostiles como la Flota del Pacífico de los EE.UU. y la Fuerza Marítima de Autodefensa de Japón. Además, las fuerzas de nuestra Guardia Costera también han desempeñado un papel importante en la interceptación de varios intentos de polizón por parte de buques mercantes y de refugiados taiwaneses."
 PRC_finish_what_mao_started: "Acabar lo que Mao empezó"
 PRC_finish_what_mao_started_desc: "Durante la era maoísta, había un famoso eslogan: \"Debemos plantar la bandera de la victoria en Taiwán\". Sin embargo, hasta la muerte del Líder Supremo en 1976, nunca vio la vuelta de Taiwán a la Madre Patria. Ahora encajaremos la última pieza del rompecabezas de la gran causa iniciada por Mao. Declararemos oficialmente la guerra al gobierno títere que ocupa Taiwán, ¡y la batalla final de la Guerra de Liberación habrá comenzado!"
 PRC_analyze_first_days: "Analizar los primeros días"
 PRC_analyze_first_days_desc: "Nuestras preparaciones para la guerra aparentemente han tenido el efecto esperado. La operación Amanecer Silencioso y el bloqueo naval ya casi destruyen por completarlo las fuerzas de contraataque de Taiwán y han minimizado el moral de la población taiwanesa. Pero tenemos que reconocer que los reaccionarios taiwaneses no han sido totalmente destrozados, ya que por suerte su débilmente dañada fuerza aérea y sus submarinos han efectuado algunos contraataques relativamente efectivos en causar pequeños daños. En el centro de comando de jefes de Estado Mayor, nuestros generales van a revisar la batalla del primer día y hacer planes para el siguiente paso."
 PRC_fast_finalization: "Finalización rápida"
 PRC_fast_finalization_desc: "Aprovechar valiosas oportunidades estratégicas es una de las leyes clave de la guerra. El ataque a Taiwán no es la excepción. Tras los bombardeos con misiles y los ataques aéreos, ordenaremos a la flota de desembarco que parta de inmediato y establezca varias cabezas de puente a lo largo de la costa oeste de Taiwán para impedir que el ejército taiwanés tenga la oportunidad de lanzar un contraataque. Los grupos de combate de portaaviones también operarán en las aguas al este de Taiwán, y la Armada del EPL lanzará ataques contra importantes bastiones en la costa este de Taiwán. Es ahora cuando comienza la verdadera batalla."
 PRC_slowly_but_surely: "Lento pero seguro"
 PRC_slowly_but_surely_desc: "Dado que ya contamos con una ventaja absoluta en cuanto a número de tropas, lo más importante ahora es evitar el optimismo y la imprudencia que podrían arruinar todo el plan de guerra. Debemos seguir ampliando la ventaja que nos ha proporcionado el ataque repentino, exigiendo a nuestras fuerzas especiales desplegadas en la isla de Taiwán que intensifiquen sus actividades para interferir con la movilización de las tropas taiwanesas y la recuperación de sus efectivos. Al mismo tiempo, se programará una nueva ronda de ataques masivos con misiles, consolidando así nuestra superioridad material y psicológica sobre el ejército taiwanés."
 PRC_air_deconservation: "Desconservación de aeronaves"
 PRC_air_deconservation_desc: "La fuerza aérea de Taiwán, aunque muy inferior en tamaño a nuestra Fuerza Aérea del EPL, posee varios tipos de equipo avanzado, incluyendo cazas F-16, mientras que la profesionalidad y la determinación en combate de sus pilotos tienden a ser superiores a las de sus colegas del Ejército y la Armada. Por esta razón, enviaremos cazas algo anticuados, pero aún con capacidad de combate, para participar en la guerra aérea sobre Taiwán. Con tal poderío aéreo, las fuerzas de la OTDP definitivamente no podrán con él."
 PRC_adapt_to_current_realities_of_battles: "Adaptarnos a la guerra moderna"
 PRC_adapt_to_current_realities_of_battles_desc: "A pesar de años de modernización militar, el EPL expuso numerosos problemas en la guerra de Taiwán, debido en gran parte a nuestra subestimación del modelo de guerra moderno y a la falta de experiencia real en combate del ejército tras décadas de paz. Extraeremos valiosas lecciones de esta guerra, resumiremos los ejemplos clásicos de batalla y los utilizaremos como tema de investigación en la Universidad de Defensa Nacional para identificar nuevos principios militares que guiarán la próxima guerra."
 PRC_crackdown_on_separatists: "Reprimir a separatistas"
 PRC_crackdown_on_separatists_desc: "A medida que recuperamos más territorio de Taiwán, es hora de abordar los asuntos que afectan a la población. Nuestro objetivo es descubrir a los anticomunistas y separatistas taiwaneses que se han ocultado, por lo que las investigaciones se centrarán en los registros relevantes de discurso y uso de internet de los ciudadanos. Además, las manifestaciones políticas y las actividades públicas no autorizadas se verán severamente restringidas por el momento. Quienes no obedezcan la ley marcial también serán debidamente castigados."
 PRC_indiscriminate_missile_strikes: "Bombardeos a ultranza"
 PRC_indiscriminate_missile_strikes_desc: "Al entrar en una nueva fase de operaciones militares contra Taiwán, es hora de flexibilizar las restricciones finales sobre la Fuerza de Misiles. Todos los misiles dirigidos a Taiwán podrán lanzar ataques contra cualquier objetivo hostil sospechoso en la isla, especialmente edificios civiles que podrían utilizarse como bastiones clandestinos para pequeñas unidades del ejército taiwanés, así como reservas naturales estratégicamente cruciales. Todos estos son sacrificios necesarios para lograr la victoria final."
 PRC_taiwanese_affairs_dont_concern_mainland: "La guerra no incumbe al continente"
 PRC_taiwanese_affairs_dont_concern_mainland_desc: "Mientras nuestras tropas siguen combatiendo con fiereza en la isla de Taiwán, debemos garantizar la estabilidad de nuestra base, la China continental. Desde el inicio de la guerra, varias provincias costeras han sido declaradas en estado de guerra, pero más allá de eso, no es necesario que transformemos ninguna otra parte de la China continental en un régimen de guerra. Al mismo tiempo, las noticias sobre la guerra en Taiwán serán monitoreadas y controladas para garantizar que el apoyo nacional a la guerra no cambie."
 PRC_final_offensive: "La ofensiva final"
 PRC_final_offensive_desc: "Ahora, tras una ardua y prolongada batalla, finalmente hemos rodeado la última resistencia en el área metropolitana de Taipéi. Aunque aún quedan algunos rezagados activos en las montañas, una vez que logremos capturar Taipéi, esta guerra llegará a su fin. Aunque el EPL inevitablemente sufrirá grandes pérdidas, cuando los soldados ya pueden ver la cima del Taipei 101 con sus binoculares, ¡el anhelo de victoria ha superado el miedo a la derrota!"
 PRC_unite_people: "Unir al pueblo"
 PRC_unite_people_desc: "Además de combatir a los enemigos que se esconden entre el pueblo, también promoveremos actividades activas de contraespionaje. Además, para que la población comprenda la superioridad del sistema socialista y se sienta parte del nuevo régimen, llevaremos a cabo una activa labor de asistencia económica y reconstrucción en Taiwán, además de otorgar numerosas concesiones políticas a los residentes de Taiwán y animarlos a obtener sus documentos de identidad de ciudadanía china lo antes posible."
 PRC_minimize_civilian_casualties: "Minimizar bajas civiles"
 PRC_minimize_civilian_casualties_desc: "Aunque los combates callejeros en las zonas urbanas de Taiwán son lo último que queremos ver, a veces es necesario desalojar a las fuerzas enemigas de sus bastiones, calle por calle, casa por casa, para asegurar el control total de la posición. Si bien este tipo de guerra suele causar muchas bajas, es necesario minimizar las bajas civiles. Además, ya habíamos elaborado una lista de objetivos que el ejército tenía estrictamente prohibido atacar antes del inicio de la guerra, incluyendo escuelas, jardines de infancia, cementerios, etcétera."
 PRC_economic_conversion_to_military_needs: "Las necesidades militares"
 PRC_economic_conversion_to_military_needs_desc: "Durante mucho tiempo, el crecimiento económico de China ha dependido en gran medida del comercio exterior. Sin embargo, con el estallido de la guerra en el estrecho de Taiwán, las sucesivas sanciones internacionales y el bloqueo de las aguas del Pacífico Occidental, es esencial que adaptemos nuestro sistema económico a un ciclo interno. Con la industria de defensa como eje central, construiremos un nuevo sistema económico con el objetivo principal de satisfacer las necesidades militares."
 PRC_no_hurry: "Sin apuros"
 PRC_no_hurry_desc: "Aunque nos encontramos en la batalla final, no debemos olvidar la necesidad de desplegar fuerzas navales y aéreas para patrullar la periferia de Taiwán, a fin de evitar que otros países intervengan en la guerra. Además, es aún más inaceptable que aprovechen esta oportunidad para ayudar a los líderes del pseudogobierno de Taiwán a huir y establecer un Gobierno en el exilio, lo cual también sería desastroso para nuestra administración posterior. Por lo tanto, incluso si el proceso de la batalla final se ralentizara, debemos eliminar todos los posibles riesgos políticos."
 PRC_china_victorious_and_united: "China, victoriosa y unida"
 PRC_china_victorious_and_united_desc: "Ahora que hemos recuperado Taiwán, una isla rebelde que estuvo separada de la Madre Patria durante casi un siglo, la nación china finalmente se ha reunificado. Ahora es el momento de empezar a trabajar en una cuestión completamente nueva: cómo gobernar esta isla de casi 20 millones de habitantes."
 PRC_utilize_xinjiang_methods: "Usar los métodos de Sinkiang"
 PRC_utilize_xinjiang_methods_desc: "Para restablecer la estabilidad en Taiwán lo antes posible, algunos han sugerido replicar el programa de gobernanza que implementamos en Sinkiang, incluyendo el despliegue de numerosas fuerzas de paz y antiterrorismo, medidas de gestión estrictas y la imposición de toques de queda en algunos puntos conflictivos, etcétera. Este programa cuenta con el apoyo principalmente de la línea dura del Partido, generales del ejército y altos mandos policiales."
 PRC_one_china_two_systems: "Una China, dos sistemas"
 PRC_one_china_two_systems_desc: "Para restablecer la estabilidad en Taiwán lo antes posible, algunos han sugerido replicar el programa de gobernanza que implementamos en Hong Kong y Macao, impulsando el establecimiento de \"un país, dos sistemas\" en Taiwán lo antes posible y retirando gradualmente al EPL y la PAP de la isla, mientras se entrega el poder al recién establecido Gobierno democráticamente elegido. Este programa también es una promesa que el Gobierno continental hizo al pueblo de Taiwán hace muchos años. Cuenta con el apoyo principalmente de moderados del Partido, diplomáticos y funcionarios civiles."
 PRC_gradual_stabilization: "Estabilización gradual"
 PRC_gradual_stabilization_desc: "Gracias a nuestros incansables esfuerzos, la estabilidad ha vuelto a la isla de Taiwán. Los ciudadanos comienzan a intentar salir de sus hogares, y las actividades comerciales diarias y el transporte público se reanudan gradualmente. Si bien la antipatía de los residentes taiwaneses hacia China continental probablemente continuará durante algún tiempo, esta ha sido una victoria increíble."
 PRC_unify_the_bureacracy: "Unificar la burocracia"
 PRC_unify_the_bureacracy_desc: "Solo mediante el establecimiento de un sistema de servicio civil verdaderamente confiable, Taiwán podrá prosperar de nuevo, y los taiwaneses podrán generar una verdadera confianza en el Gobierno chino. Además de incorporar expertos administrativos confiables de China continental, también debemos mantener un estrecho contacto con exfuncionarios del Gobierno taiwanés, así como con celebridades, e invitarlos a colaborar con nosotros cuando sea necesario, lo cual, por supuesto, debe ser voluntario."
 PRC_evacuation_of_key_industries: "Evacuar industrias clave"
 PRC_evacuation_of_key_industries_desc: "Antes de la reunificación, Taiwán contaba con varias empresas competitivas a nivel mundial, incluyendo TSMC, pero todas sufrieron daños de diversa consideración durante la guerra de Taiwán. Comenzaremos de inmediato a trasladar estas industrias clave a China continental, en parte para que puedan reanudar su producción lo antes posible y en parte para impulsar la recuperación de la economía continental."
 PRC_accelerate_local_recovery: "Acelerar la recuperación local"
 PRC_accelerate_local_recovery_desc: "Necesitamos reconstruir cuanto antes la infraestructura de la isla de Taiwán, gravemente dañada a causa de los combates, así como traer desde China continental suministros vitales como alimentos, medicamentos y combustible para mantener los medios de vida básicos de los residentes de la isla, a fin de evitar la posibilidad de una catástrofe humanitaria. El EPL y la PAP en la isla también participarán en la asistencia médica local y en las labores de limpieza de edificios, para dar a los taiwaneses una buena imagen del Ejército Popular."
 PRC_the_chinese_century: "¡El Siglo Chino!"
 PRC_the_chinese_century_desc: "Después de tantos años, la victoria en la guerra de Taiwán condujo a la verdadera reunificación de China y al cumplimiento de las promesas que nuestro Partido le hizo a su pueblo. Ya nadie en este mundo cuestionaría nuestro poder, y las superpotencias que una vez nos dominaron han decaído y ya no pueden competir con nosotros. Celebraremos con gran solemnidad para anunciar al mundo que ha llegado el Siglo Chino."
 PRC_creating_the_reputation_society: "La Sociedad de la Reputación"
 PRC_creating_the_reputation_society_desc: "El sistema de crédito social es un excelente ejemplo de cómo podemos capitalizar y combinar la tecnología moderna de internet y la tecnología de almacenamiento de información. El rápido crecimiento de China ha aumentado la visibilidad de esta iniciativa a nivel mundial. Los Gobiernos locales de algunos países ya apoyan políticas similares, y seguiremos desarrollando nuestros logros para seguir desarrollando el sistema de la Sociedad de la Reputación y perfeccionarlo."
 PRC_expand_the_blacklist_system: "Expandir la lista negra"
 PRC_expand_the_blacklist_system_desc: "Utilizaremos los macrodatos del sistema de crédito social para registrar e incluir en la lista negra a los posibles enemigos del Partido. Esto incluirá no solo a los disidentes que difunden ideas subversivas, sino también a los empresarios insatisfechos con las políticas de macrocontrol del Partido y a los intelectuales que cuestionan nuestro liderazgo. Algún día, podremos detectar y erradicar el descontento en sus etapas iniciales."
 PRC_peoples_social_credit: "Credito social popular"
 PRC_peoples_social_credit_desc: "El sistema de crédito social no solo se utilizará para eliminar la disidencia, sino que también contribuirá a la creación de una sociedad armoniosa con un alto nivel de moralidad. Con base en los datos recopilados por el sistema, desarrollaremos un sistema integral de calificación que abarcará todos los aspectos de la vida de nuestros ciudadanos. En el futuro, se evaluará a los ciudadanos según las puntuaciones obtenidas, desde la obtención de acceso a la educación superior hasta la aprobación de préstamos bancarios."
 PRC_strengthen_control_of_bureaucracy: "Fortalecer el control burocrático"
 PRC_strengthen_control_of_bureaucracy_desc: "Utilizaremos el sistema de crédito social principalmente para supervisar y evaluar a los cuadros del Partido en todos los niveles. Se registrará la información personal de cada miembro del Partido, desde los miembros más veteranos del Comité Permanente del Politburó hasta los más jóvenes. El sistema de crédito social no solo se utilizará para evaluar el desempeño de los cuadros, sino también para garantizar que sus cualidades morales personales siempre cumplan con las altas expectativas del Partido."
 PRC_enthusiasm_of_chinese_people: "Entusiasmo del pueblo chino"
 PRC_enthusiasm_of_chinese_people_desc: "Inculcaremos los valores del patriotismo en nuestro pueblo en la nueva era para unificar mejor las mentes de todos los sectores de la sociedad. Nuestras instituciones de información pública y educación están preparadas para trabajar en todos los frentes, desde la información hasta la educación y las artes, para energizar al pueblo y fomentar una mayor lealtad a la patria y a nuestra causa."
 PRC_core_socialist_values: "Valores socialistas fundamentales"
 PRC_core_socialist_values_desc: "Los 12 valores, escritos en 24 caracteres chinos, son los valores nacionales de \"prosperidad\", \"democracia\", \"civilidad\" y \"armonía\"; los valores sociales de \"libertad\", \"igualdad\", \"justicia\" y \"Estado de derecho\"; y los valores individuales de \"patriotismo\", \"dedicación\", \"integridad\" y \"amistad\". Estos valores son la mejor expresión del espíritu de liderazgo, avance y activismo del socialismo en la sociedad china. No solo eso, sino que también constituyen la evidencia más sólida de un linaje que abarca desde los inicios del marxismo-leninismo y el pensamiento Mao Zedong hasta el actual pensamiento Xi Jinping. Los utilizaremos como base de nuestra educación ideológica y de la inquebrantable naturaleza socialista de nuestro país."
 PRC_national_rejuvination: "Rejuvenecimiento nacional"
 PRC_national_rejuvination_desc: "Una de las características más esenciales del socialismo con características chinas, relacionada con el \"Gran Rejuvenecimiento de la nación china\", es la promoción del nacionalismo. El Partido siempre recuerda a su pueblo que fue el PCCh quien rescató a China del caos de la guerra civil y la pobreza en 1949 y la convirtió en una nueva superpotencia en el siglo XXI. No hay manera más eficaz de motivar a los ciudadanos a amar y ser leales a su país que propagar su fuerza y prosperidad."
 PRC_final_strike_against_the_corruption: "Golpe de gracia a la corrupción"
 PRC_final_strike_against_the_corruption_desc: "Desde que Xi Jinping asumió el cargo de secretario general en 2012, la campaña anticorrupción ha continuado durante toda su administración. Ahora es el momento de llevar esta campaña a un nuevo nivel. Con la valiosa información y los datos recopilados por el sistema de crédito social, eliminaremos a todos los corruptos del Partido y lograremos un Partido puro que garantice que realmente cumpla con nuestro objetivo supremo de \"servir al pueblo\"."
 PRC_improve_party_discipline: "Aumentar la disciplina"
 PRC_improve_party_discipline_desc: "Nos aseguraremos de que las disposiciones de la Constitución del Partido sobre la integridad de los militantes se arraiguen profundamente en la mente de todos los cuadros, a fin de prevenir el resurgimiento de la corrupción entre los cuadros del Partido a todos los niveles. Además de la educación moral, seguiremos desarrollando las normas sobre sanciones disciplinarias para los militantes y ampliaremos las facultades de la Comisión Central de Inspección Disciplinaria y la Comisión Nacional de Supervisión."
 PRC_the_party_of_public_interest: "Partido del interés público"
 PRC_the_party_of_public_interest_desc: "\"Servir al pueblo\" siempre se ha considerado un principio fundamental del Partido, recordando a los cuadros de dónde provienen y por qué se afiliaron al Partido Comunista. Hoy, cuando China ha alcanzado un nuevo nivel de prosperidad y los lazos del Partido con el pueblo se han fortalecido como nunca, podemos afirmar con orgullo que el Partido no solo ha salvado a China y liberado al pueblo, sino que también ha cumplido todas y cada una de sus promesas."
 PRC_fidelity_to_xiaoping_principles: "Lealtad a los principios de Deng"
 PRC_fidelity_to_xiaoping_principles_desc: "Tras la muerte del presidente Mao, cuando el Partido se encontraba en crisis y el futuro de China era incierto, fue Deng Xiaoping quien redefinió el rumbo del Partido, propuso la política fundamental de centrarse en la construcción económica y fue recordado por el pueblo chino como el \"Arquitecto de la China Moderna\". Hoy, el gigantesco navío de China seguirá el rumbo trazado en 1978, y Xi Jinping será honrado como el \"Arquitecto Principal de la Nueva Era\"."
 PRC_comprehensive_deepening_of_reforms: "Profundizar las reformas"
 PRC_comprehensive_deepening_of_reforms_desc: "Ante los desafíos de una nueva era, nuestro Partido se basa únicamente en las políticas del pasado, lo que no solo impedirá su liderazgo continuo, sino que también obstaculizará el progreso de China hacia un liderazgo mundial. Animaremos al Partido y a las instituciones estatales a desarrollar políticas innovadoras que hagan del Partido una organización verdaderamente flexible, en lugar de una carga inflada y engorrosa, incrustada en el sistema."
 PRC_restoration_of_cadres_rotation: "Reestablecer la rotación de cuadros"
 PRC_restoration_of_cadres_rotation_desc: "El sistema de rotación de cuadros establece condiciones específicas para cada cargo oficial. Esta es la parte más importante de la reforma institucional implementada por nuestro Partido. Garantiza la renovación del equipo de cuadros y permite descubrir nuevos talentos y promoverlos a posiciones importantes lo antes posible. Durante la última década, con el fin de mantener la autoridad de Xi Jinping, la rotación de cuadros en el nivel superior se ha retrasado conscientemente, pero ahora que la situación se ha estabilizado, es hora de traer algunas caras nuevas a los ministros y secretarios."
 PRC_ministerial_reshuffle: "Reorganizar los ministerios"
 PRC_ministerial_reshuffle_desc: "Las tareas de la nueva época propuestas por el Partido requieren de cuadros con nuevo pensamiento para llevarlas a cabo, pero en el Partido de hoy todavía se pueden ver en todas partes cuadros formados según el viejo sistema. Es más, su resistencia pasiva a las nuevas políticas se manifiesta en forma de inacción, lo cual no beneficia a nuestra causa, sino que sólo la perjudica. El grupo de cuadros del Partido sufrirá una reestructuración profunda, y serán reemplazados por cuadros más jóvenes, más leales y con mayor espíritu reformista como ejecutores de la voluntad del Partido."
 PRC_implement_10_affirmations: "Implementar las Diez Afirmaciones"
 PRC_implement_10_affirmations_desc: "Las \"Diez Afirmaciones\" fueron propuestas por el propio secretario general Xi Jinping y son el nuevo credo que los miembros del Partido en la nueva era deben aprender y seguir. El secretario general llamó a los cuadros del Partido a aprender de la valiosa experiencia práctica y las teorías de los predecesores revolucionarios, promover constantemente la reforma integral del Partido de acuerdo con las necesidades actuales y continuar manteniendo vínculos profundos con el pueblo. Esta preciosa riqueza espiritual creada conjuntamente por el Partido y el pueblo recibirá el máximo nivel de atención y se convertirá en una guía importante para nosotros en la formación de nuevos miembros del Partido."
 PRC_approve_pla_loaylity: "Elogiar la lealtad del EPL"
 PRC_approve_pla_loaylity_desc: "El Ejército Popular de Liberación resistió duras pruebas en la guerra de Taiwán. No sólo eso, en el ejército en tiempos de guerra surgieron un número considerable de modelos heroicos, desde comandantes victoriosos hasta soldados valientes y hábiles. Utilizaremos esto como base para lanzar una nueva ronda de campaña de propaganda para conocer el EPL y mejorar aún más la imagen de los militares dentro del Partido y entre el público en general. Al mismo tiempo, promoveremos a destacados oficiales del EPL y comisarios políticos a la dirección del Partido."
 PRC_sinicization_of_marxism: "Sinización del marxismo"
 PRC_sinicization_of_marxism_desc: "Desde el estallido de la Revolución de Octubre y la introducción del marxismo en China de la Unión Soviética, el proceso de \"sinización\" del marxismo nunca se ha detenido. Desde los primeros pensadores del PCCh, como Chen Duxiu y Li Dazhao, hasta líderes revolucionarios como Mao Zedong y Deng Xiaoping, todos han hecho sus propias contribuciones únicas a este fin. Ahora, como el gran líder de la nueva era, Xi Jinping marcará el comienzo de una nueva etapa en la sinización del marxismo. Este será un gran logro que beneficiará a las generaciones presentes y futuras."
 PRC_improve_national_security: "Fortalecer la seguridad nacional"
 PRC_improve_national_security_desc: "Aunque hemos logrado grandes victorias que eran inimaginables en el pasado, todavía existen amenazas internas y externas, especialmente amenazas a la estabilidad del régimen y a la seguridad nacional. Seguiremos fortaleciendo al Ministerio de Seguridad Pública y al Ministerio de Seguridad del Estado, y nos apoyaremos más en el nuevo sistema nacional de vigilancia y en el sistema inteligente de identificación de delitos para mejorar la eficiencia y la disuasión del trabajo de los departamentos, de modo que los enemigos que acechan en la oscuridad sepan que siempre podemos encontrarlos."
 PRC_modern_socialist_nation: "La República Popular de la nueva era"
 PRC_modern_socialist_nation_desc: "Desde las primeras \"Cuatro Modernizaciones\" hasta la \"sociedad moderadamente próspera\" propuesta por Deng Xiaoping, hasta el \"Sueño Chino\" y el \"Gran Rejuvenecimiento\" propuestos por Xi Jinping, el sueño de que China pueda algún día recuperar su posición entre los países del mundo y convertirse en el país central indiscutible se ha repetido muchas veces de diferentes maneras en la historia de la República. Hoy, desde que Mao Zedong anunció la fundación de la República el 1 de octubre de 1949, después de casi cien años de dura lucha, la República Popular China finalmente ha realizado el deseo largamente acariciado por generaciones."
 PRC_the_great_revival: "Gran Rejuvenecimiento"
 PRC_the_great_revival_desc: "¡El Gran Rejuvenecimiento de la nación china es ahora imparable y continuará logrando más victorias sorprendentes! ¡Los historiadores dividirán la historia de China en dos partes basándose en la actualidad! ¡El pueblo chino seguirá avanzando por el glorioso camino abierto por el Partido para siempre!"
 PRC_strengthen_auhority_of_the_chairman: "Reforzar el poder del presidente"
 PRC_strengthen_auhority_of_the_chairman_desc: "Los logros y victorias que el Partido ha alcanzado en el pasado han demostrado indiscutiblemente que la posición de liderazgo de Xi Jinping como núcleo de todo el Partido es incuestionable e indispensable. Para servir mejor a nuestra causa, se han aprobado una serie de resoluciones para mejorar el estatus del presidente y fortalecer su poder de toma de decisiones y supervisión sobre las políticas del Partido. Continuaremos siguiendo el liderazgo del presidente Xi Jinping. Sólo de esta manera el Partido podrá lograr nuevas victorias una tras otra."
 PRC_xi_jinping_thought_abroad: "Exportar el pensamiento Xi Jinping"
 PRC_xi_jinping_thought_abroad_desc: "Los logros de China en la última década también han hecho que los Gobiernos y los pueblos de otros países comiencen a prestar atención a la exitosa experiencia de China. Como líder de China, las ideas de Xi Jinping sobre la gobernanza del Estado naturalmente han recibido la mayor atención. Nunca dejaremos pasar esta oportunidad de mejorar la imagen de nuestro país y aumentar su poder blando. Presentaremos una serie de obras sobre el pensamiento Xi Jinping a funcionarios de los países y regiones interesados, y aceleraremos la traducción de estos libros y su publicación local en los países destinatarios."
 PRC_dare_to_dream: "Atrévete a soñar"
 PRC_dare_to_dream_desc: "Los avances en la ciencia y la tecnología en el siglo XXI nos ayudarán a hacer realidad lo que alguna vez se consideraron los sueños más salvajes. Desde naves espaciales tripuladas hasta vehículos exploradores de Marte, desde comunicaciones 5G hasta inteligencia artificial, e incluso ingeniería de edición genética y tecnología de clonación... alentaremos aún más a nuestros ciudadanos a participar en la exploración científica. Un día, los chinos representarán el nivel más alto de innovación tecnológica del mundo."
 PRC_dare_to_work: "Atrévete a trabajar"
 PRC_dare_to_work_desc: "El rapidísimo crecimiento económico de China ha atraído la atención mundial durante muchos años. También es debido a nuestros destacados logros en el desarrollo económico que se acuñó la frase \"Siglo Chino\" y poco a poco se hizo conocida por el público. Hoy, el auge económico interno de la posguerra y el regreso de Taiwán crearán una vez más una gran cantidad de nuevos proyectos de construcción y empleos. Una vez más permitiremos que el mundo vea los grandes logros que el trabajo duro y la sabiduría del pueblo chino pueden crear."
 PRC_dare_to_fight: "Atrévete a luchar"
 PRC_dare_to_fight_desc: "La victoria en la guerra de Taiwán llevó la reputación del Ejército Popular de Liberación a su apogeo tanto en el país como en el extranjero. En nuestro país, lo elogiamos como un verdadero ejército popular, el guardián más leal del Partido y un símbolo del Gran Rejuvenecimiento de la nación china; En el extranjero, el Ejército Popular de Liberación es considerado un símbolo de la \"hegemonía china\" en la nueva era y una de las fuerzas armadas más disuasorias del mundo actual. Con la protección del EPL, nuestro país será invencible en el futuro."
 PRC_made_in_china_2025: "Made in China [GetYear]"
 PRC_made_in_china_2025_desc: "Después de 40 años de Reforma y Apertura, China tiene el sistema industrial más completo del mundo. En el viaje del nuevo siglo, demostraremos al mundo el poder de este gigante despertado."
 PRC_expand_trade_arguments: "Expandir acuerdos comerciales"
 PRC_expand_trade_arguments_desc: "Para que la industria china se globalice, debemos promover la integración económica regional. Por lo tanto, invitaremos a más países a unirse a los acuerdos comerciales y ampliar la red económica existente."
 PRC_economic_autarky: "Autarquía económica"
 PRC_economic_autarky_desc: "Nuestra economía aún lidia con un desarrollo desequilibrado e inadecuado. Por lo tanto, nos centraremos más en la circulación industrial nacional para mejorar la calidad de vida de nuestra población."
 PRC_optimize_the_supply_chain: "Optimizar las cadenas de suministros"
 PRC_optimize_the_supply_chain_desc: "La modernización industrial de China ha entrado en una nueva etapa. La cadena de suministro existente ya no puede satisfacer la creciente demanda industrial. Debemos comenzar inmediatamente a optimizarlo y transformarlo para hacerlo \"mejor y más fuerte\"."
 PRC_worlds_factory: "Fábrica del mundo"
 PRC_worlds_factory_desc: "El título de \"fábrica del mundo\" representa que la fortaleza de la industria manufacturera de China ya es capaz de respaldar la producción mundial de materias primas, pero no deberíamos conformarnos con esto. Debemos seguir expandiendo nuestra industria manufacturera y avanzar hacia convertirnos en un líder en la fabricación global."
 PRC_our_secret_weapon: "Nuestra arma secreta"
 PRC_our_secret_weapon_desc: "El pueblo es al PCCh y al EPL lo que Gea es a los dioses olímpicos. Debemos promover la integración de los campos civil y militar, e integrar profundamente la defensa nacional y el desarrollo económico."
 PRC_escape_middle_income_trap: "Evitar la trampa de la renta media"
 PRC_escape_middle_income_trap_desc: "La \"trampa de la renta media\" ha atrapado a varios países en desarrollo cuyas economías otrora eran bastante prósperas, haciéndoles imposible llegar a estar a la par de los países desarrollados. El Gobierno y el pueblo chinos han trabajado durante años para lograr la prosperidad común y evitar repetir los mismos errores. El mundo esperará y verá si puede ocurrir un milagro."
 PRC_endorse_the_megaprojects_cen: "Promover los megaproyectos"
 PRC_endorse_the_megaprojects_cen_desc: "Imagínense un rascacielos elevándose en la capital, cuyo contorno perfora el cielo. Seguramente sorprenderá a todo aquel que lo mire, y hará que la gente se sienta orgullosa y asombrada al mirarlo. Deberíamos promover estos megaproyectos, que no sólo son una demostración de fuerza nacional sino también una declaración de confianza nacional."
 PRC_dream_come_true: "Sueño hecho realidad"
 PRC_dream_come_true_desc: "Los primeros rayos de luz de la mañana iluminan la Ciudad Dragón. Los tipo maglev vuelan silenciosamente y el centro de datos se extiende como terminaciones nerviosas. El edificio más grande del mundo proyecta una sombra imponente que oculta los juncos exuberantes del pasado.\n\nEl futuro está aquí. El ingeniero jefe acarició suavemente la mesa de arena digital y los edificios inteligentes brillaron en la proyección holográfica. La velocidad china está reconstruyendo la forma de la civilización aquí, y la sabiduría china está creando nuevas posibilidades aquí. \n\nXiong'an, la ciudad soñada de la nueva era, está mostrando al mundo a una velocidad asombrosa que la continuación y el avance de la civilización china están en esta tierra que lleva un plan milenario.\n\nAquí ha nacido una nueva capital y un gran sueño."
 PRC_invest_in_ai: "Invertir en inteligencia artificial"
 PRC_invest_in_ai_desc: "En los últimos años, a medida que los logros científicos y tecnológicos en el campo de la inteligencia artificial se han puesto continuamente en producción y aplicación, se han descubierto nuevos puntos de desarrollo económico. Si China quiere ganar un punto de apoyo en este campo en el futuro, debemos aumentar la inversión en el campo de la inteligencia artificial a partir de ahora."
 PRC_develop_tech_prod_aboard: "Productos tecnológicos en el exterior"
 PRC_develop_tech_prod_aboard_desc: "Es hora de exportar nuestros productos baratos de alta tecnología para demostrar al mundo que los productos tecnológicos respaldados por el sistema industrial de China son altamente competitivos y pueden romper el monopolio comercial dominado por las empresas tecnológicas occidentales."
 PRC_techno_nationalism: "Tecnonacionalismo"
 PRC_techno_nationalism_desc: "Aumentaremos nuestro apoyo a la ciencia y la tecnología, y estas tecnologías emergentes se utilizarán para resolver mejor los problemas que enfrentamos."
 PRC_technology_for_everyone: "Tecnologia para todos"
 PRC_technology_for_everyone_desc: "La tecnología es la principal fuerza productiva, pero si nadie la utiliza, pierde su valor. Queremos permitir que más personas utilicen los productos más avanzados para satisfacer sus necesidades de una mayor calidad de vida."
 PRC_rein_in_corp: "Restringir a las empresas"
 PRC_rein_in_corp_desc: "El capital es ciego en su búsqueda de ganancias, e incluso las empresas chinas no son una excepción. Si queremos domar este caballo salvaje, debemos ponerle las riendas y dejar que sirva mejor a nuestro pueblo."
 PRC_anti_corpruption_tech: "Tecnología anticorrupción"
 PRC_anti_corpruption_tech_desc: "Como dice el dicho, la corrupción es el lubricante, pero demasiado lubricante hará que la máquina se atasque. Utilizaremos tecnologías más avanzadas para controlar posibles medios de corrupción, prevenir la posible corrupción y hacer frente a los elementos corruptos."
 PRC_continue_eco_dev: "Continuar el desarrollo ecológico"
 PRC_continue_eco_dev_desc: "Las aguas cristalinas y las montañas verdes son tan valiosas como las montañas de oro y plata. Para satisfacer mejor las necesidades del pueblo chino de una vida mejor y más feliz, debemos comenzar a mejorar el entorno ecológico existente."
 PRC_integrate_sezs: "Integrar las ZEE"
 PRC_integrate_sezs_desc: "Las zonas económicas especiales del pasado ya no satisfacen nuestras necesidades actuales de desarrollo. Al integrarlas podremos aprovechar mejor las ventajas de las zonas económicas especiales en el futuro."
 PRC_expand_resource_excavation: "Expandir la extracción de recursos"
 PRC_expand_resource_excavation_desc: "Ante la creciente demanda de recursos, aumentaremos la extracción de recursos en consecuencia. Aunque esto va en contra de nuestro propósito de crear un entorno más verde, la sociedad debe avanzar siempre para que podamos estar más tranquilos en el futuro."
 PRC_chinese_green_rev: "Revolución verde china"
 PRC_chinese_green_rev_desc: "Nuestros recursos no son ilimitados y el desarrollo sostenible es el futuro. Al aumentar el apoyo al desarrollo del campo de la protección del medio ambiente, China marcará el comienzo de una nueva ronda de revolución industrial verde."
 PRC_professional_dev: "Desarrollo profesional"
 PRC_professional_dev_desc: "Nuestra educación obligatoria ha cultivado una enorme reserva de mano de obra para China. Intensificar los esfuerzos para transformarlos en profesionales más capacitados aportará nueva vitalidad al desarrollo futuro de China."
 PRC_cheap_foreign_spec: "Expertos extranjeros baratos"
 PRC_cheap_foreign_spec_desc: "Introducir más talento extranjero y permitir que la experiencia extranjera penetre más profundamente en nuestra producción económica nos permitirá obtener una ventaja en la competencia en el mercado mundial."
 PRC_modernization_of_military_prod: "Modernizar la industria militar"
 PRC_modernization_of_military_prod_desc: "La industria civil ha demostrado su vitalidad y la industria militar no puede quedarse atrás. Necesitamos modernizar nuestra industria militar para satisfacer las necesidades de nuestra construcción militar."
 PRC_stimulate_fertility: "Estimular la fertilidad"
 PRC_stimulate_fertility_desc: "Con el desarrollo de la urbanización y la industrialización, también ha surgido el problema de la baja tasa de fertilidad. Ajustaremos la política de planificación familiar para estimular más nacimientos y garantizar que el desarrollo futuro no se vea afectado."
 PRC_real_estate_market_stab: "Estabilizar el mercado inmobiliario"
 PRC_real_estate_market_stab_desc: "Con el desarrollo de la economía, se ha invertido cada vez más dinero especulativo en el campo de la inversión inmobiliaria y se ha formado una enorme burbuja. Para evitar un colapso al estilo japonés, debemos tomar medidas para garantizar un aterrizaje suave de la burbuja inmobiliaria."
 PRC_fund_space_dev: "Financiar el desarrollo aeroespacial"
 PRC_fund_space_dev_desc: "El campo aeroespacial representa el nivel científico y tecnológico más avanzado y de vanguardia de un país. Apoyar vigorosamente nuestro campo aeroespacial no sólo representa la fuerte fortaleza industrial de China, sino también nuestra capacidad para tomar la delantera en tecnología de vanguardia."
 PRC_chinas_most_dire_hour: "Hora más oscura de China"
 PRC_chinas_most_dire_hour_desc: "Hoy, este antiguo y gigantesco navío que es China está nuevamente en peligro de hundirse. Después de haber perdido su timonel y su dirección, nunca debemos perder la esperanza. Sólo si nos aferramos a nuestras creencias podremos conducirla hacia buen puerto."
 PRC_empower_the_mss: "Empoderar al MSE"
 PRC_empower_the_mss_desc: "El Ministerio de Seguridad del Estado se convertirá en el núcleo de poder y centro de operaciones del Gobierno nacional en el nuevo siglo. No sólo será responsable de eliminar las fuerzas hostiles, sino que también penetrará en todos los niveles de la organización nacional y en cada rincón de la vida de las personas. Ampliaremos su ámbito de autoridad y le concederemos el derecho a priorizar toda la inteligencia, la mano de obra y los recursos, lo que le permitirá eludir procedimientos engorrosos y tomar medidas directas. Bajo la coordinación del MSE, cualquier individuo, organización o idea que se desvíe de los objetivos nacionales será considerado una amenaza y deberá ser eliminado."
 PRC_reorganize_the_party: "Reorganizar al Partido"
 PRC_reorganize_the_party_desc: "El actual Partido Comunista ha sido infiltrado por demasiados oportunistas y traidores que dicen servir al pueblo, pero en realidad sólo les importa su propio poder e intereses. Un Partido así no puede sacar al país de las dificultades. Si queremos recuperar la confianza del pueblo y hacerle creer que sólo el Partido puede conducir a China hacia un futuro brillante, debemos tomar una decisión y llevar a cabo una reorganización profunda dentro del Partido. Debemos eliminar a aquellos que son desleales e irresponsables y reconstruir el Partido con personas verdaderamente firmes en sus creencias y dispuestas a sacrificarse por el país. Sólo de esta manera podrá el Partido Comunista convertirse verdaderamente en el pilar del Gran Rejuvenecimiento de la nación china."
 PRC_reorient_the_economy: "Reorientar la economía"
 PRC_reorient_the_economy_desc: "Hoy en día, nuestra situación económica es como un barco solitario en medio de una tormenta, balanceándose entre las fuertes olas. Todas las industrias están de luto, el mercado está turbulento y el sustento de las personas se ha visto severamente afectado. Si no tomamos medidas oportunas para salvarlo, a esta embarcación aislada le puede resultar difícil estabilizar su rumbo."
 PRC_strengthen_the_chairman: "Fortalecer al presidente"
 PRC_strengthen_the_chairman_desc: "La República no necesita debatir su destino; se necesita una mano firme para alinear todas las direcciones. La llamada consulta, los controles y equilibrios y la gobernanza grupal no son más que una excusa para que los débiles evadan su responsabilidad. Sólo cuando todo el país se une en torno al presidente se puede controlar a todo el ejército como un solo brazo y todas las políticas se pueden poner en práctica con el comando de una sola voz. Debemos eliminar a esos cobardes que habitualmente se esconden detrás de las regulaciones, se esconden entre departamentos y pretenden ser neutrales. El Partido no necesita árbitros, el Partido sólo necesita ejecutores."
 PRC_tackle_youth_unemployment: "Resolver el desempleo juvenil"
 PRC_tackle_youth_unemployment_desc: "Los jóvenes siempre han sido la fuerza principal del desarrollo social y la esperanza y el motor que empuja la rueda de la historia hacia adelante. Sin embargo, cuando miramos el presente, vemos a demasiados jóvenes vagando por las dificultades y convirtiéndose en marginados de su tiempo. Si no logramos brindar suficientes oportunidades de empleo a los jóvenes, el pulso del desarrollo social perderá gradualmente su vitalidad."
 PRC_tackle_the_demographic_collapse: "Afrontar el colapso demográfico"
 PRC_tackle_the_demographic_collapse_desc: "Nos enfrentamos al problema de una tasa de natalidad en continuo descenso. Este fenómeno es como una corriente subterránea oculta en el tejido social, que cambia silenciosamente la trayectoria de nuestro desarrollo futuro. Si no abordamos este problema, nuestra sociedad se enfrentará a un envejecimiento y un estancamiento sin precedentes."
 PRC_operation_wu_qi: "[GetWuQiName]"
 PRC_operation_wu_qi_desc: "[GetWuQiDesc]"
 PRC_purge_the_liberal_reformers: "Purgar a reformistas liberales"
 PRC_purge_the_liberal_reformers_desc: "En el pasado período histórico, los reformistas liberales promovieron una serie de diluciones de la estructura fundamental del Partido en nombre de la \"reforma\" y \"apertura\". Desmantelaron el sistema de planificación, debilitaron la orientación ideológica, permitieron la difusión de valores diversos y transformaron el Partido de un régimen orientado a la movilización en una red orientada a la coordinación. Extendieron una rama de olivo al mundo, sin darse cuenta de que lo que recibían a cambio era un anzuelo oxidado. Para nosotros, estas personas son riesgos políticos, virus institucionales y traidores ideológicos. El Partido debe identificarlos, aislarlos, despojarlos y purgarlos de su organización, y sus registros de discursos y registros escritos serán completamente borrados."
 PRC_purge_the_communist_hardliners: "Purgar la línea dura"
 PRC_purge_the_communist_hardliners_desc: "Hay otro tipo de peligro en nuestro Partido. No son los liberales que veneran el capitalismo, sino los de línea dura que dicen ser \"más rojos y más de izquierda\". Se proclaman ortodoxos pero en secreto son divisivos; Dicen ser leales, pero en realidad son conflictivos. Debemos hacer frente al potencial destructivo de este tipo de \"ultraizquierda\". No debe haber segundas ideas dentro del Partido, y no debe haber un segundo conjunto de hojas de ruta. Cualquier texto político, movilización de masas o narrativa cultural que no haya sido revisado y aprobado por el Comité Central del Partido será considerado ilegal. Nunca permitiremos ninguna forma de desviación ideológica dentro del Partido, por muy roja que sea la bandera que enarbolen."
 PRC_revive_traditional_culture: "Revivir la cultura tradicional"
 PRC_revive_traditional_culture_desc: "Durante 8.000 años, la civilización china ha permanecido ininterrumpida. Poseemos nuestra propia ortodoxia, rituales y filosofía. Sin embargo, durante el último siglo, para integrarnos con el mundo y en aras de la supuesta \"alineación internacional\", hemos roto repetida y voluntariamente nuestra columna vertebral cultural. Destruimos los templos ancestrales, nos burlamos de los sabios, desechamos textos antiguos y olvidamos nuestro idioma. Nos sometimos a las ataduras impuestas por Occidente y recitamos sus mantras de \"libertad\" y \"derechos humanos\". Nuestra juventud se humilla ante el entretenimiento japonés y coreano; nuestros académicos imploran a Occidente marcos teóricos; nuestras familias veneran los valores occidentales de izquierda; y nuestra sociedad se hunde en la decadencia bajo el peso del materialismo y el consumismo. ¡Ahora, nuestra nación ha llegado el momento de despertar! Debemos purgar por completo la erosión de la cultura occidental, destruir toda fachada hipócrita de \"diversidad\" y \"tolerancia\", y transformar al olvidado pueblo chino en un auténtico pueblo chino."
 PRC_expand_the_surveillance_state: "Expandir el Estado de vigilancia"
 PRC_expand_the_surveillance_state_desc: "No hay puntos ciegos en seguridad ni tampoco en el país. Promoveremos la modernización integral del sistema Sky-Eye para lograr una cobertura total y sin omisiones desde las ciudades hasta las aldeas, desde las oficinas hasta los espacios privados, integrar todos los datos y construir una base de datos que conozca a la gente mejor de lo que la gente misma la conoce. En esta base de datos no hay suerte, ni accidentes, ni caos, ni agitación, solo pura estabilidad y seguridad."
 PRC_the_great_chinese_nation: "La gran nación china"
 PRC_the_great_chinese_nation_desc: "La nación china no surgió de la nada. Está hecho de hierro forjado en incontables guerras, de huesos entretejidos por el hambre y la resistencia, y de manos que recuperaron el orden de las ruinas de la civilización. No somos estudiantes de otros sino maestros del mundo. Mientras todavía perforaban madera para hacer fuego en el bosque, nosotros ya estábamos escribiendo libros y estableciendo oficinas gubernamentales. Mientras ellos todavía luchaban por la religión, nosotros ya habíamos descubierto cómo alojar a la gente, conectar los canales y transmitir la cultura de generación en generación. El Asia Oriental actual sin China sería como un árbol sin raíces.\n\nEn cuanto a la llamada civilización occidental moderna, desde la pólvora hasta la brújula, desde la imprenta hasta los conceptos de gobierno, ¿cuál no tomó prestado de nosotros? Hemos experimentado la humillación y la gloria, pero nunca hemos roto la creencia de que \"el mundo es de todos\" y nunca hemos abandonado el ideal de la \"unidad de todos los pueblos\". China nunca ha sido sólo un país; Es la civilización misma, el eje trazado por la historia en Oriente. Mientras esta nación siga respirando, el mundo no caerá en la oscuridad total; Mientras esta bandera siga ondeando, habrá esperanza en la historia."
 PRC_revolt_against_the_modern: "Romper el paradigma occidental"
 PRC_revolt_against_the_modern_desc: "Esos mediocres que dicen ser progresistas, los tontos que creen ciegamente en la justicia y los perezosos claman por una \"liberación\" hipócrita, pero encubren el orden noble. Su revolución de alto perfil -una catástrofe cultural absurda, una turba ruidosa- no es nada más que pisotear la jerarquía sagrada, a cambio de una diversidad desordenada y del sufrimiento de las élites. La verdadera fuerza nunca proviene de los desvaríos de los pobres y débiles, ni de los engaños de las clases bajas, sin ambición e inferiores, que arrastran a nuestra civilización con su cultura baja y su reproducción bárbara. La izquierda está intentando subvertir a las élites con sus trucos de masas. Sin embargo, el renacimiento de la civilización no se puede lograr con el jolgorio de los mendigos. Deberíamos usar una determinación fría para expulsar la tolerancia inferior y usar un corazón tenaz para reformar el orden."
 PRC_spur_domestic_production: "Estimular la industria nacional"
 PRC_spur_domestic_production_desc: "Sólo revitalizando vigorosamente las industrias nacionales podremos encender el motor de la recuperación económica, impulsar gradualmente la economía nacional nuevamente hacia el buen camino y lograr una verdadera autonomía e independencia. Sólo sobre la base de un bienestar integral de la industria nacional podremos afianzarnos en la agitada economía mundial."
 PRC_public_works_campaign: "Campaña de obras públicas"
 PRC_public_works_campaign_desc: "Al promover vigorosamente la construcción de obras públicas, no sólo podemos crear una gran cantidad de puestos de trabajo y brindar más oportunidades de empleo para la sociedad, sino también inyectar un fuerte impulso al desarrollo de la economía nacional."
 PRC_youth_military_brigades: "Brigadas militares juveniles"
 PRC_youth_military_brigades_desc: "Defender el país es la opción más gloriosa para los jóvenes en la nueva era. Debemos convertir los campamentos militares en un crisol para forjar a los jóvenes, alentar a más jóvenes aspirantes a unirse al ejército y dedicar su juventud y pasión a la defensa nacional de la patria sin reservas. En el Ejército, los jóvenes aprenderán una disciplina y una unidad férreas y templarán su tenaz e indomable voluntad espiritual. Se convertirán en la columna vertebral de la seguridad nacional y en una barrera de acero para resistir a los enemigos extranjeros y mantener la estabilidad y la seguridad. Si la generación joven es fuerte, el país será fuerte."
 PRC_youth_construction_brigades: "Equipos de construcción juveniles"
 PRC_youth_construction_brigades_desc: "El impulso de modernización de nuestra patria exige que generación tras generación de jóvenes se dediquen a él, suden y sigan adelante. Debemos movilizar ampliamente y orientar firmemente a los jóvenes para que participen activamente en los grandes proyectos nacionales, como los proyectos clave y el desarrollo fronterizo, y convertir sus aspiraciones patrióticas en acciones de construcción. Que los jóvenes vayan a los lugares donde la patria más los necesita: a las obras, a las fronteras, a los ambientes más difíciles, a templar su carácter entre el acero y el hormigón, y a fortalecer su profundo afecto a la patria bajo el viento y la arena y el sol abrasador."
 PRC_state_syndicalism: "Sindicalismo estatal"
 PRC_state_syndicalism_desc: "La clase obrera es la clase dirigente de la República. Sin embargo, en las últimas décadas, el Gobierno ha mostrado una actitud demasiado parcial hacia los empresarios con el fin de aprovecharse de sus capacidades de gestión y organización, lo que ha dado como resultado que se descuiden los intereses de los trabajadores y que sus virtudes ya no sean un modelo para toda la sociedad. Construiremos un país que realmente represente económicamente a la gran mayoría de los trabajadores."
 PRC_women_in_the_workforce: "Mano de obra femenina"
 PRC_traditional_gender_roles: "Roles de género tradicionales"
 PRC_traditional_gender_roles_desc: "Los antiguos sabios comprendían los principios de la naturaleza y las diferencias entre hombres y mujeres. La relación entre marido y mujer está perfectamente encarnada en los Tres Vínculos Fundamentales y las Cinco Virtudes Constantes: la moderación interior y la gentileza se complementan con el coraje y la fortaleza exteriores. Éste no es sólo el orden social natural, sino también la base fundamental para mantener los cimientos de la ética nacional y lograr la prosperidad durante miles de años. Los hombres cargan con la responsabilidad de la familia y del país, mientras que las mujeres cuidan el cálido hogar y se complementan entre sí. Sin embargo, hoy en día el feminismo está desenfrenado e intenta destruir esta sabiduría tradicional que ha sido probada durante miles de años, lo que conduce a la degradación moral. A los conservadores los denigramos con frecuencia las feministas y nos etiquetan como \"opresores masculinos\". Sin embargo, creemos firmemente que sólo resistiendo estos pensamientos destructivos y defendiendo la ética y la moral podemos avanzar hacia la gran visión de la armonía entre la familia y el país y la unidad en la búsqueda del rejuvenecimiento."
 PRC_national_corporatism: "Nacionalcorporativismo"
 PRC_national_corporatism_desc: "Al formular futuras políticas económicas, debemos afrontar el elefante en la habitación: las contradicciones sociales cada vez más graves en toda China, especialmente las contradicciones entre empresarios y trabajadores. El Gobierno desempeñará un papel más activo, servirá como ancla estabilizadora de la sociedad china y conciliará mejor los intereses de los diferentes grupos sociales."
 PRC_subsidize_child_raising: "Subsidiar el cuidado infantil"
 PRC_subsidize_child_raising_desc: "Como dice el dicho: \"Es fácil dar a luz un bebé, pero difícil criarlo\". Si implementamos políticas de subsidios más completas, podremos aumentar efectivamente la tasa general de fertilidad y lograr gradualmente una estructura de población más joven."
 PRC_reconstruct_the_iron_rice_bowl_nat: "Reconstruir el tazón de hierro"
 PRC_reconstruct_the_iron_rice_bowl_nat_desc: "Si los cambios de personal en el sistema de servicio civil son demasiado frecuentes, no sólo obstaculizarán la continuidad y la implementación de políticas, sino que también crearán oportunidades para los delincuentes, lo que representa una amenaza potencial para todo el sistema. Debemos garantizar que las posiciones de los funcionarios públicos dentro del sistema sean relativamente estables y que puedan desempeñar sus funciones durante mucho tiempo dentro de las normas y restricciones del sistema."
 PRC_synthesis_of_state_and_labor: "Síntesis de Estado y trabajo"
 PRC_synthesis_of_state_and_labor_desc: "Garantizar el estatus de los sindicatos nacionales es crucial para nuestra capacidad de ganar el control de toda la clase trabajadora. A través de los sindicatos, una organización clave, podremos asignar la mano de obra a diferentes regiones o proyectos de manera más eficiente. Al mismo tiempo, también debemos prestar atención al papel de los sindicatos en la protección de las necesidades de vida y el bienestar de los trabajadores."
 PRC_absorb_western_enterprise: "Absorber empresas occidentales"
 PRC_absorb_western_enterprise_desc: "Transformaremos a las empresas occidentales de parásitos en empresas públicas que sirvan a los intereses del país y al bienestar del pueblo. Las llamadas marcas y nombres occidentales no son más que un cartel colgado delante de la puerta, mientras que cada ladrillo, cada teja, cada brizna de hierba y cada árbol detrás del cartel son riqueza creada por nosotros mismos."
 PRC_decommodification_nat: "Descomoditización"
 PRC_decommodification_nat_desc: "El consumismo ha tentado a nuestro pueblo a abandonar las buenas cualidades que alguna vez apreció. La frugalidad y la autodisciplina del pasado han sido arrastradas sin dejar rastro por la ola del materialismo. Debemos eliminar el falso halo que hay detrás de las marcas de lujo y de los anuncios exagerados, y dejar que la gente vuelva a ver la esencia de los productos."
 PRC_recollectivize_the_countryside_nat: "Recolectivización del campo"
 PRC_recollectivize_the_countryside_nat_desc: ""
 PRC_promote_common_prosperity: "Garantizar la prosperidad común"
 PRC_promote_common_prosperity_desc: "Bajo nuestro Gobierno, hemos derrotado las enfermedades y eliminado la pobreza y el hambre. Sanamos la tierra para que la gente pudiera mantener la cabeza en alto y vivir vidas estables y felices. Hoy todos llevan una expresión de orgullo porque saben que son parte de esta gran tierra."
 PRC_to_struggle_is_to_live: "Luchar es vivir"
 PRC_to_struggle_is_to_live_desc: "Debemos permanecer siempre muy vigilantes, porque la civilización decadente de Occidente utiliza la tentación y la prosperidad superficial como cebo, tratando de socavar sutilmente nuestros valores tradicionales y confundir la mente de la gente. No debemos permitir nunca más que el pueblo de nuestra patria se deje llevar por ideas y una cultura tan decadentes."
 PRC_to_prosper_is_to_live: "Prosperar es vivir"
 PRC_to_prosper_is_to_live_desc: "Los estantes y armarios están llenos de alimentos, los pacientes ya no tienen que preocuparse por los altos costos y nuestra gente no tiene que preocuparse por los precios de la vivienda. Esta es verdaderamente una época dorada que pertenece al pueblo. Avanzamos para dar la bienvenida a la era que nos pertenece."
 PRC_definancialization: "Desfinanciarización"
 PRC_definancialization_desc: "El mercado de valores es como un río ilusorio formado por números fríos, que arrastra la riqueza de innumerables personas. La gente se lanza a los juegos financieros con el sueño de hacerse ricos de la noche a la mañana, pero a menudo pierden el rumbo en la búsqueda de ganancias y agotan la riqueza acumulada durante años. No debemos permitir que el juego ilusorio del mercado de valores continúe devorando la riqueza y el trabajo duro de las personas."
 PRC_reinvigorate_the_cadres_nat: "Revitalizar los cuadros"
 PRC_reinvigorate_the_cadres_nat_desc: "Nuestros burócratas han estado separados del pueblo durante mucho tiempo. Han vivido mucho tiempo detrás de altos muros y patios profundos, mirando los fríos números en el papel, como si estos números pudieran reflejar las alegrías, las tristezas y la ira de la gente. Necesitamos sacar a estos funcionarios de sus oficinas, sacarlos de sus gruesos sofás y que realmente entren en la vida de la gente."
 PRC_a_pragmatic_economy: "Una economía pragmática"
 PRC_a_pragmatic_economy_desc: "Nuestra política económica no es un montón de lemas vacíos y objetivos tan elevados que no se pueden alcanzar. El objetivo de nuestra política económica es muy simple: que la gente sienta los beneficios de primera mano. Y hoy tenemos tasas de empleo más altas, ingresos per cápita más altos y ganancias de productividad más rápidas."
 PRC_productivism_over_distributionism: "Producción sobre distribución"
 PRC_productivism_over_distributionism_desc: "Sólo ampliando continuamente la escala de producción podremos sentar una base sólida para el desarrollo del país. Ya sea en la industria, la agricultura, la innovación científica y tecnológica o la industria de servicios; el aumento de la producción no es sólo una acumulación de cantidad, sino también una mejora de la competitividad y un reflejo integral de la fortaleza nacional."
 PRC_all_under_the_soe: "Todo a las empresas públicas"
 PRC_all_under_the_soe_desc: "En el momento en que introdujimos la empresa privada, también introdujimos la decadencia de Occidente en nuestra patria. Están envueltos en la codicia del capital y la búsqueda de ganancias, erosionando nuestra base originalmente pura y tenaz. Los hechos han demostrado que las empresas públicas son el destino final de todas las empresas. Sólo bajo la coordinación y control del sistema estatal puede el desarrollo de las empresas ajustarse verdaderamente a los intereses nacionales."
 PRC_joint_eadi_development_nat: "Desarrollo conjunto de IDEA"
 PRC_joint_eadi_development_nat_desc: "Asia es esencialmente una gran familia con lazos de sangre y una cultura común. Durante miles de años, hemos superado juntos las vicisitudes de la historia y hemos experimentado la guerra y la paz. Ahora, crucemos la brecha de la historia, trabajemos juntos y demos la bienvenida al brillante amanecer de Asia."
 PRC_extraction_from_the_periphery: "Extraer de la periferia"
 PRC_extraction_from_the_periphery_desc: "Liberamos a aquellos países hermanos que una vez estuvieron oprimidos, los salvamos del sufrimiento y de las ataduras, y permitimos que la luz de la libertad brille en sus tierras. Sin embargo, todo esto no fue completamente gratuito y al final tendrán que pagar un precio por esta liberación."
 PRC_endorse_the_megaprojects: "Promover los megaproyectos"
 PRC_endorse_the_megaprojects_desc: "Imagínense un rascacielos elevándose en la capital, cuyo contorno perfora el cielo. Seguramente sorprenderá a todo aquel que lo mire, y hará que la gente se sienta orgullosa y asombrada al mirarlo. Deberíamos promover estos megaproyectos, que no sólo son una demostración de fuerza nacional sino también una declaración de confianza nacional."
 PRC_secure_the_sinosphere: "Asegurar la sinoesfera"
 PRC_secure_the_sinosphere_desc: "Muchos países que nos rodean están intentando romper con las coordenadas civilizacionales que les ha dado la historia. Utilizando la \"identidad nacional\" como excusa y el \"multiculturalismo\" como eslogan, intentan distanciarse de sus raíces culturales, como si pudieran convertirse inmediatamente en parte de otro mundo al negar que alguna vez hayan sido educados por alguien. Pero la historia no se puede reescribir con lemas. ¿De dónde vinieron sus leyes, sus escritos, su etiqueta y su vestimenta? ¿Quién les hizo escribir en las primeras ciudades-Estado? No están dispuestos a admitirlo, pero no pueden negarlo: las semillas de la civilización no vinieron del mar, sino que fueron transmitidas desde un país llamado China. La sinoesfera no es un documento, es un sentido continuo de orden. Una vez que se pierda este sentido de orden, su sociedad se degenerará debido a luchas étnicas y desgarramiento de la identidad. No nos quedaremos de brazos cruzados y no haremos nada al respecto. Haremos todo lo posible para consolidar la influencia de la sinoesfera en el área local."
 PRC_the_national_economic_revolution: "Revolución económica nacional"
 PRC_the_national_economic_revolution_desc: "Hoy nuestra economía ha vuelto a la normalidad y la tierra que antes estaba silenciosa vuelve a estar llena de vitalidad. Las máquinas de la fábrica en pleno funcionamiento volvieron a rugir. El dragón rojo despertó de su letargo, mantuvo la cabeza en alto y se irguió nuevamente en el horizonte oriental con infinita fuerza y determinación."
 PRC_chinas_spot_in_the_sun: "Regreso triunfal"
 PRC_chinas_spot_in_the_sun_desc: "Construir una fuerza militar que pueda defender eficazmente los intereses nacionales y posea capacidades de combate modernas es una de las tareas fundamentales que debemos lograr y llevar a cabo consistentemente. La modernización de la defensa nacional \"estará siempre en camino\" y no será un discurso vacío."
 PRC_prepare_for_the_next_war: "Preparar la liberación de Asia"
 PRC_prepare_for_the_next_war_desc: "En el futuro previsible, el EPL y el pueblo chino enfrentarán desafíos mayores. Los tambores retumbantes de la guerra se han extendido por todo el mundo y Asia no será inmune. Debemos prepararnos para experiencias de lucha militar más difíciles."
 PRC_modernize_the_missile_corps: "Modernizar la Fuerza de Misiles"
 PRC_modernize_the_missile_corps_desc: "El arsenal de la Fuerza Aérea no sólo incluye aviones, sino que los misiles también son la parte más importante. El nivel tecnológico de nuestros misiles aire-aire de la serie \"Piercing\" y de los misiles tierra-aire de la serie \"Hongqi\" ya está entre los mejores del mundo, pero esto está lejos de ser suficiente. Mejoraremos aún más el nivel de localización de los misiles de la Fuerza Aérea para que se adapten mejor a las necesidades de combate de nuestro ejército."
 PRC_lessons_from_the_taiwan_war: "Lecciones de la guerra de Taiwán"
 PRC_lessons_from_the_taiwan_war_desc: "La guerra de Taiwán fue el mayor conflicto armado que hemos librado en las últimas cuatro décadas. También fue la mayor operación de desembarco del siglo XXI, que abarcó múltiples entornos de combate, incluidos tierra, mar y aire. Su importancia es evidente. Continuaremos estudiando ejemplos clásicos de la guerra de Taiwán para servir de orientación para la próxima guerra."
 PRC_sharpen_the_southern_blade: "Afilar la espada del Sur"
 PRC_sharpen_the_southern_blade_desc: "Las fuerzas especiales del EPL comenzaron a formarse en la década de 1980, con la intención original de servir como fuerzas auxiliares en las \"guerras locales en condiciones de alta tecnología\" previstas para el futuro. Ahora, podemos realizar reformas importantes en las fuerzas especiales más grandes del mundo, convirtiéndolas en el ejecutor más confiable de misiones antiterroristas, de recopilación de inteligencia y confidenciales en futuras guerras."
 PRC_expand_the_thunder_gods: "Expansión del Trueno Divino"
 PRC_expand_the_thunder_gods_desc: "La Fuerza Aerotransportada del EPL es una unidad con una larga herencia histórica y un glorioso historial de combate. Siempre ha tenido un desempeño sobresaliente en el control de disturbios, ejercicios militares conjuntos y misiones de socorro en desastres, y los comandos \"Trueno Divino\" son los mejores entre las fuerzas aerotransportadas. Aprenderemos de la experiencia del Ejército Soviético y ampliaremos significativamente el tamaño de las tropas aerotransportadas para que puedan desempeñar un papel principal en una batalla clave."
 PRC_a_blue_water_navy: "Potencia naval de Asia"
 PRC_a_blue_water_navy_desc: "Desde los viajes de Zheng He a Occidente, los chinos no parecen tener ningún poder marítimo digno de mención. La destrucción de la flota de Beiyang del Imperio Qing en la primera guerra sino-japonesa es una de las humillaciones nacionales que generaciones de chinos no pueden soportar. Hoy continuaremos ampliando nuestro poder naval, no sólo para las necesidades de defensa nacional, sino también como aspiraciones de toda la nación."
 PRC_next_generation_airforce: "Fuerza Aérea de próxima generación"
 PRC_next_generation_airforce_desc: "La Fuerza Aérea es una de las ramas más importantes del ejército en la guerra moderna. Tener una fuerza aérea fuerte fue uno de los secretos para que Estados Unidos ganara la Guerra del Golfo y la guerra de Irak. Seguiremos mejorando la capacidades de la Fuerza Aérea del EPL para garantizar que podamos mantener firmemente la superioridad aérea cuando estalle la próxima guerra."
 PRC_next_generation_army: "Ejército del mañana"
 PRC_next_generation_army_desc: "Promover la modernización de la capacidad de combate terrestre del EPL es quizás, sin lugar a dudas, la tarea más difícil en nuestra reforma de modernización de la defensa nacional. Esto se debe principalmente a que no sólo necesitamos producir lo suficiente para reemplazar nuestro antiguo y enorme arsenal, sino que también necesitamos promover la modernización de la tecnología militar y permitir que los oficiales y soldados del EPL utilicen estas armas de manera competente."
 PRC_improve_officer_training: "Mejorar la formación de oficiales"
 PRC_improve_officer_training_desc: "Los comandantes son el cerebro y el sistema nervioso del Ejército Popular de Liberación y desempeñan un papel vital en la mejora de las capacidades de combate terrestre del EPL. Elevaremos el umbral para la promoción de oficiales y estableceremos más cursos profesionales en la Universidad de Defensa Nacional. En el futuro, los oficiales militares deberán tener más conocimientos de experiencia militar y poseer mejores cualidades tácticas y pensamiento estratégico."
 PRC_increase_naval_production: "Superar la producción de la OTDP"
 PRC_increase_naval_production_desc: "Muchos países de la OTDP alguna vez tuvieron armadas poderosas, especialmente Japón. La Armada japonesa provocó un gran sufrimiento al pueblo chino en el siglo XX y también es uno de los principales enemigos hipotéticos de la Armada en el siglo XXI. Pero todo esto ya es historia, y nuestra Armada superará con creces a las armadas de la OTDP tanto en escala como en calidad."
 PRC_dominate_the_skies: "Dominar los cielos"
 PRC_dominate_the_skies_desc: "La Fuerza Aérea del Ejército Popular de Liberación tiene la fuerza de aviones de combate más grande del mundo, pero algunos de ellos todavía son modelos obsoletos. Llevaremos a cabo una renovación completa de la flota de la Fuerza Aérea, equipándola con una variedad de armas, incluidos los más modernos bombarderos, cazas y aviones de ataque."
 PRC_rain_fire_from_above: "Cuerpo anfibio de élite"
 PRC_rain_fire_from_above_desc: "El comando \"Jiaolong\" es una de las primeras fuerzas especiales establecidas por el Ejército Popular de Liberación y actualmente es la única fuerza especial bajo el Cuerpo de Infantería de Marina de la Armada. A través de la expansión del personal, el reemplazo de armas y la reforma del programa de entrenamiento, estos soldados con brillantes logros militares desempeñarán un papel más importante en el futuro."
 PRC_carrier_primacy: "Programa de portaaviones"
 PRC_carrier_primacy_desc: "Los portaaviones son el símbolo de la armada de una gran potencia, y poseer y operar un grupo de batalla de portaaviones siempre ha sido un derecho exclusivo de potencias navales tradicionales como Estados Unidos. Pero hoy en día, los portaaviones que ondean la Bandera Roja de Cinco Estrellas son cada vez más comunes en el Pacífico Occidental. No sólo mejoraremos el nivel técnico de la aviación naval existente, sino que también construiremos más portaaviones para enriquecer nuestra flota."
 PRC_supremacy_above_and_below_waters: "Sobre y bajo las olas"
 PRC_supremacy_above_and_below_waters_desc: "Una flota de superficie fuerte y una fuerza submarina avanzada son indispensables para construir una flota de alta mar. En el pasado, algunas personas criticaron la tecnología naval de China, especialmente su tecnología submarina, por estar muy por detrás de la de EE.UU., Rusia y otros países, pero todo cambiará ahora."
 PRC_dominate_south_china_sea: "Dominar el mar de la China"
 PRC_dominate_south_china_sea_desc: "El mar de la China Meridional ha sido territorio inherente de China desde la antigüedad, y los exploradores chinos fueron el primer grupo de personas en explorar y desarrollarlo. Ahora ya no permitiremos que otros países invadan estas aguas. Estableceremos un dominio absoluto con nuestra poderosa Armada y varias islas y arrecifes artificiales."
 PRC_redefine_naval_warfare: "Redefinir la guerra naval"
 PRC_redefine_naval_warfare_desc: "Al igual que Alfred Mahan para la Armada de los EE.UU., el desarrollo de una nueva doctrina de guerra naval no sólo será un paso importante para consolidar nuestro dominio naval en Asia, sino que también solidificará nuestra ventaja de ser pioneros en futuros conflictos marítimos."
 PRC_resurrect_the_battleship: "Regresar al acorazado"
 PRC_resurrect_the_battleship_desc: "Los acorazados con blindaje pesado y grandes cañones fueron en su día los dueños indiscutibles de los océanos hasta que fueron sustituidos por los portaaviones. Desafortunadamente, China era demasiado débil para construir sus propios grandes acorazados. Sin embargo, hoy en día podemos construir gigantescos buques arsenal equipados con diversos misiles y armas, dándole al concepto del acorazado nueva vida en el siglo XXI."
 PRC_air_navy_coordination: "Coordinación marítima-aérea"
 PRC_air_navy_coordination_desc: "Desde la Segunda Guerra Mundial, la victoria en las batallas navales ha sido inseparable de la aviación, y para el entorno de lucha militar que enfrentamos, la estrecha cooperación entre la Armada y la Fuerza Aérea es aún más importante. La Fuerza Aérea brindará una protección más confiable a la Armada en las áreas costeras, al tiempo que proporciona reconocimiento cercano y apoyo de defensa aérea para las operaciones de larga distancia de la flota."
 PRC_trust_in_the_pilot: "Guerra con drones"
 PRC_trust_in_the_pilot_desc: "El importante papel que pueden desempeñar las armas no tripuladas quedó demostrado en la batalla de desembarco en la isla de Taiwán. Dotaremos a la Fuerza Aérea del EPL con drones de gran escala más avanzados y ampliaremos el alcance de uso de los drones, convirtiéndolos en todoterrenos en reconocimiento, interferencia y combate aéreo."
 PRC_deus_ex_machina_nat: "Deus ex machina"
 PRC_deus_ex_machina_nat_desc: "Nuestros diseñadores de aeronaves siempre han sido conocidos por su énfasis en el desarrollo de sistemas avanzados de control de cazas. Gracias al rápido desarrollo de la industria informática de mi país y al rápido desarrollo de los componentes electrónicos nacionales, mejoraremos aún más las capacidades de guerra electrónica y la operatividad de nuestros aviones militares, y equiparemos a los soldados y pilotos de la Fuerza Aérea con equipos de comunicación de mejor calidad."
 PRC_modern_special_forces: "Fuerzas especiales modernas"
 PRC_modern_special_forces_desc: "Hemos acumulado una rica experiencia en la reforma piloto anterior de las fuerzas especiales del EPL. Ahora es el momento de extender el plan de reforma a las brigadas de operaciones especiales de todo el ejército. ¡Los enemigos serán derrotados por esta nueva fuerza!"
 PRC_streamline_aircraft_production: "Producción simple de aeronaves"
 PRC_streamline_aircraft_production_desc: "Aún no se sabe quién ganará la guerra, pero lo que es seguro es que quien tenga más armas tendrá más posibilidades de reír último. Las líneas de producción de Shenyang Aircraft Corporation, Chengdu Aircraft Corporation, Xi'an Aircraft Corporation y Hongfei Aircraft Corporation recibirán más inversiones para expandir la escala de producción y producir más aviones que se necesitan con urgencia."
 PRC_mobile_warfare_nat: "Velocidad y maniobrabilidad"
 PRC_mobile_warfare_nat_desc: "En la guerra moderna, nada es más importante que la movilidad de las tropas. Ahora que hemos completado la mecanización de todo nuestro ejército, es hora de mejorar aún más sus capacidades de combate."
 PRC_national_fanaticism: "Frenesí nacional"
 PRC_national_fanaticism_desc: "A lo largo de su larga historia, China ha librado cientos de guerras con países vecinos. El impacto de algunas de estas guerras continúa hasta el día de hoy, provocando que las relaciones diplomáticas entre nuestro país y sus vecinos a menudo se tornen tensas. Sin embargo, esto también nos brinda la oportunidad de movilizar a la población local para apoyar la lucha militar basada en el odio histórico."
 PRC_will_of_the_chinese_people: "Voluntad del pueblo chino"
 PRC_will_of_the_chinese_people_desc: "La toma de decisiones de un país nunca es sólo una orden desde arriba hacia abajo. A menudo surge del consenso silencioso de innumerables personas comunes: su deseo de orden, su expectativa de unidad y su búsqueda tenaz y firme de una vida estable. Puede que guarden silencio, estén confundidos o incluso se sientan perdidos en ocasiones, pero sus deseos son siempre claros: nada de inquietud, nada de división y ningún retorno a los días en que cada uno hacía lo suyo y corría peligro. A medida que avanzamos en la integración, la reforma y la unificación, estas políticas hablan por sus voces no habladas; legitiman nuestras acciones y las hacen inevitables y necesarias. El latido del corazón de China no sólo resuena en altos edificios y palacios; También late en los campos, en los talleres de las fábricas y en cada calle y callejón."
 PRC_infantry_primacy_nat: "Guerra espiritual"
 PRC_infantry_primacy_nat_desc: "Para ganar una guerra, cualquier ejército desearía soldados que fueran valientes, absolutamente leales y se atrevieran a llevar a cabo cualquier tarea peligrosa. Los grandes logros de los héroes combatientes de todas las generaciones exhibidos en el Museo de Historia Militar del EPL demuestran que no nos faltan soldados de ese tipo. Con cursos de entrenamiento avanzados y educación política, los soldados del EPL serán los mejores soldados del mundo."
 PRC_tank_primacy_nat: "Muralla de Acero y Fuego"
 PRC_tank_primacy_nat_desc: "Lo más importante para un ejército capaz y preparado para el combate es tener una fuerte potencia de fuego. En las reformas militares desde 2016, hemos actualizado significativamente la artillería de campaña y las fuerzas blindadas del EPL, mejorando enormemente sus capacidades de proyección de potencia de fuego. No hay razón para detenerse aquí."
 PRC_tidal_wave_of_bodies: "Ola humana"
 PRC_tidal_wave_of_bodies_desc: "Ya sea la \"blitzkrieg\" de la Wehrmacht alemana en la Segunda Guerra Mundial o la teoría de la batalla profunda del Ejército Rojo durante la Guerra Fría, ambas aterrorizaron al enemigo con sus poderosas y rápidas fuerzas militares. Hoy en día, las fuerzas blindadas de las Fuerzas Terrestres también constituirán un elemento disuasorio estratégico para cualquier enemigo imaginario gracias a su escala y calidad absolutamente superiores."
 PRC_chinas_greatest_hour: "Hora más gloriosa de China"
 PRC_chinas_greatest_hour_desc: "El falso velo de la paz ha sido rasgado. Desde Panmunjom hasta Malaca, desde Cachemira hasta Guam, las llamas de la Gran Guerra Asiática encendieron la tierra y el mar. ¡La nación china renacerá y alcanzará su momento más grande en esta prueba tan difícil!"
 PRC_operation_majestic: "OPERACIÓN: §YMAJESTIC§!"
 PRC_operation_majestic_desc: "Llevaremos a cabo el elemento estratégico central de esta guerra: el desembarco en Japón. Mientras el casco de hierro del Ejército Popular de Liberación pise la tierra del archipiélago japonés, se decidirá el resultado de esta guerra."
 PRC_revenge_for_nanking: "Vengar a Nankín"
 PRC_revenge_for_nanking_desc: "El eterno conflicto milenario entre China y Japón parece haber llegado finalmente a su fin, con la destrucción de uno de los bandos; Japón quedará dividido permanentemente y la nación japonesa se convertirá completamente en un concepto histórico. Finalmente podremos vengar verdaderamente a nuestros compatriotas que murieron en la Guerra de Resistencia del Pueblo Chino contra la Agresión Japonesa."
 PRC_rebuild_japan: "Reconstruir Japón"
 PRC_rebuild_japan_desc: "El eterno conflicto milenario entre China y Japón parece haber llegado finalmente a su fin. Hemos obtenido una victoria decisiva sobre este viejo enemigo y es hora de mostrar la tolerancia de los vencedores. Ayudaremos a los nuevos Gobiernos del archipiélago japonés en sus esfuerzos de reconstrucción y haremos que el pueblo japonés comprenda que seguir a China puede verdaderamente traer prosperidad y paz."
 PRC_operation_changma: "OPERACIÓN: §YCHANGMA§!"
 PRC_operation_changma_desc: "Hace más de 70 años, el heroico Ejército Popular Voluntario de China y el Ejército Popular de Corea derrotaron a las fuerzas de las Naciones Unidas dirigidas por el imperialismo estadounidense. Hoy repetiremos la gloria de nuestros antepasados. Las fuerzas de la coalición sinocoreana destruirán una vez más a la República de Corea y a sus amos estadounidenses y japoneses detrás de ella."
 PRC_integrate_korea: "Integrar a Corea"
 PRC_integrate_korea_desc: "La guerra en la península de Corea está llegando a su fin. Sobre la base de la división original de Corea del Norte y del Sur, estableceremos una Región Administrativa Especial de Corea unificada, que será más propicia para la integración económica y la gobernanza cooperativa entre China y Corea."
 PRC_only_one_korea: "Una sola Corea"
 PRC_only_one_korea_desc: "La guerra en la península de Corea está llegando a su fin. Respetaremos la voluntad de unificación del pueblo coreano y estableceremos una República Popular Democrática de Corea que abarque toda la península. Sólo de esta manera podremos fortalecer la amistad fraternal entre los países amigos de China y Corea."
 PRC_appeal_to_the_chinese_people_gaw: "Llamamiento al pueblo chino"
 PRC_appeal_to_the_chinese_people_gaw_desc: "La Gran Guerra Asiática es una guerra total. La guerra nunca podrá ganarse si el Gobierno y los militares solos hacen sacrificios. Sólo cuando todo el pueblo chino trabaje unido, los frutos de la victoria podrán finalmente caer en nuestras manos."
 PRC_suspend_the_consumer_economy: "Suspender la economía de consumo"
 PRC_suspend_the_consumer_economy_desc: "El floreciente mercado de consumo fue alguna vez un símbolo de los logros del crecimiento económico de China. Pero la guerra ha cambiado todo eso. El consumo excesivo sólo causará desperdicio y tendrá un impacto negativo en el ambiente social. Regularemos la economía mercantil y al mismo tiempo promoveremos el ahorro en la vida."
 PRC_martial_law: "Medidas de emergencia"
 PRC_martial_law_desc: "Debemos admitir que la gravedad de la guerra supera nuestra imaginación. Debemos acelerar el proceso de entrenamiento de las tropas existentes y los componentes de reserva para que estas nuevas fuerzas puedan entrar al campo de batalla más rápidamente."
 PRC_all_chinese_mobilization: "Movilización china total"
 PRC_all_chinese_mobilization_desc: "Debemos admitir que la gravedad de la guerra supera nuestra imaginación. Ya no es el momento de confiar únicamente en las fuerzas militares existentes para hacer frente al enemigo. Lanzaremos una nueva ronda de movilización general y construiremos el ejército más grande de la historia en el menor tiempo posible."
 PRC_propagandize_our_success: "Propagandizar nuestro éxito"
 PRC_propagandize_our_success_desc: "No hace falta decir que la fragmentada OTDP nunca podrá competir con nuestros fieles aliados y el gran Ejército Popular de Liberación. Lanzaremos una campaña de propaganda masiva dentro de nuestro campamento, especialmente para dar a conocer los gloriosos logros del Ejército Popular a nuestro pueblo, para que toda la sociedad apoye con más entusiasmo nuestra causa de liberación."
 PRC_call_up_the_reserves: "Convoca a la reserva"
 PRC_call_up_the_reserves_desc: "Después de que hayamos movilizado el entusiasmo de la retaguardia para participar en la gran lucha de liberación, lanzaremos una nueva ronda de llamados a la reserva para proporcionar soldados más confiables para nuestras tropas de primera línea. No sólo eso, esto también promoverá una mayor militarización de la sociedad."
 PRC_east_china_wall: "Gran Muralla del Oriente"
 PRC_east_china_wall_desc: "Con una fuerza mayor a nuestra disposición, podremos fortalecer nuestras defensas terrestres y fronteras clave. Nunca permitiremos que ni un solo soldado enemigo ponga un pie en territorio chino."
 PRC_coastal_defense_brigades: "Brigadas de defensa costera"
 PRC_coastal_defense_brigades_desc: "Con una fuerza mayor y más equipo a nuestra disposición, podremos fortalecer nuestras defensas costeras y puestos avanzados marítimos críticos. Nunca permitiremos que ni un solo buque de guerra enemigo entre en las aguas territoriales de China."
 PRC_embrace_the_future: "Abrazar el futuro"
 PRC_embrace_the_future_desc: "El ejército que posea la tecnología militar más avanzada y nunca dude en utilizarla en combate ganará la guerra. Esta es una verdad eterna a lo largo de la historia, tanto en China como en el extranjero. Pondremos en práctica una serie de resultados de investigaciones científicas militares pasadas, y estas nuevas armas avanzadas seguramente podrán disuadir severamente a nuestros enemigos."
 PRC_kashmir_road: "Camino de Cachemira"
 PRC_kashmir_road_desc: "La meseta de Cachemira es un campo de batalla para los estrategas militares. Tomar este lugar significará que tendremos iniciativa estratégica absoluta sobre la India. Lo haremos en conjunto con nuestros aliados pakistaníes."
 PRC_operation_gangaridai: "OPERACIÓN: §YGANGARIDIYA§!"
 PRC_operation_gangaridai_desc: "Pakistán Oriental se convirtió en Bangladesh independiente después de la guerra de 1971 y se convirtió en uno de los principales campos de batalla en la lucha que duró décadas por la influencia entre China y la India. Con las Fuerzas Especiales del Ejército como vanguardia, enviaremos una fuerza expedicionaria de élite para avanzar hacia Bangladesh y asestar un duro golpe en el corazón de la India."
 PRC_operation_pallava: "OPERACIÓN: §YPANAVA§!"
 PRC_operation_pallava_desc: "Nuestra larga frontera con la India está compuesta principalmente por mesetas y montañas cubiertas de nieve, y es poco probable que un tira y afloja en ese ámbito dé resultados. Lanzaremos una audaz operación sorpresa, enviando un grupo de trabajo que desembarcará inesperadamente en la costa sur de la India y realizará una audaz penetración en su corazón. Al mismo tiempo, las fuerzas conjuntas de China y Pakistán en la frontera noroeste lanzarán una ofensiva coordinada para aplastar completamente la resistencia de la India."
 PRC_operation_southern_fury: "OPERACIÓN: §YFURIA DEL SUR§!"
 PRC_operation_southern_fury_desc: "En el Sudeste Asiático y el Pacífico Sur, los grupos de islas dispersos registran una serie de sangrientas batallas entre Japón y Estados Unidos durante la Guerra del Pacífico. Hoy, estos mares volverán a arder; Nuestras flotas y marines se movilizarán con toda su fuerza, utilizando la Península de Indochina como trampolín para llegar finalmente al corazón de la OTDP: Australia."
 PRC_operation_samosir: "OPERACIÓN: §YSAMOSIR§!"
 PRC_operation_samosir_desc: "Indonesia es el país más grande de la región, con innumerables islas y arrecifes que dividen grandes extensiones de agua en varios estrechos estratégicamente importantes. La conquista de Indonesia significa que nuestra armada tendrá una ventaja absoluta en la guerra en el sur. Pero también debemos darnos cuenta de que capturar este país archipiélago con una población de 300 millones es definitivamente una tarea ardua para el EPL."
 PRC_operation_baru_nah: "OPERATION: §YQIXIAN§!"
 PRC_operation_baru_nah_desc: "Brunéi, este pequeño estado situado alrededor del mar de la China Meridional, no sólo tiene ricos recursos petroleros, sino que su ubicación geográfica superior también proporcionará un trampolín más para nuestra expansión de la guerra en el sur. El personal del EPL esperaba que un ataque sorpresa contra el pequeño país fuera fácil."
 PRC_cover_the_back: "Cubrir la retaguardia"
 PRC_cover_the_back_desc: "Filipinas, un país que desde hace mucho tiempo ha sido proestadounidense y que tiene importantes conflictos con China por la propiedad de muchas islas del mar de la China Meridional, siempre ha sido una espina en nuestro costado. Su ubicación geográfica representaba una seria amenaza para la retaguardia de nuestra ofensiva del sur. Es hora de tomar medidas contra el país y eliminar esta amenaza potencialmente importante."
 PRC_starve_the_island: "Asediar la isla"
 PRC_starve_the_island_desc: "Finalmente hemos llegado a este punto: el EPL está a sólo un paso del continente australiano. Para evitar pérdidas innecesarias, podemos bloquear importantes rutas marítimas a través del continente. Tarde o temprano, los australianos no podrán soportar la escasez de suministros y el miedo persistente y tomarán la iniciativa de pedir conversaciones de paz."
 PRC_operation_coronet: "OPERACIÓN: §YCORONET§!"
 PRC_operation_coronet_desc: "Finalmente hemos llegado a este punto: el EPL está a sólo un paso del continente australiano. Con este desembarco definitivo podremos poner fin a esta sangrienta guerra. ¡Soldados, a bordo!"
 china_liberal_focus: "Reforma de China"
 PRC_the_chinese_glasnost: "Primavera de Pekín"
 PRC_the_chinese_glasnost_desc: "Los verdaderos herederos del espíritu de la Reforma y Apertura finalmente han arrebatado el poder en China a esos conservadores hipócritas y burócratas codiciosos. La agitación política en Pekín se ha calmado, anunciando una victoria duramente ganada por los reformistas. A continuación, garantizaremos un control firme de los puestos gubernamentales clave para evitar cualquier intento reaccionario de recuperar el control."
 PRC_open_the_window: "Abrir la ventana"
 PRC_open_the_window_desc: "En los últimos años, China ha excluido cada vez más a periodistas extranjeros y equipos de investigación de derechos humanos, como lo pone de relieve su feroz confrontación con organizaciones internacionales, incluidos países, sobre la cuestión del genocidio uigur en Sinkiang. Para avanzar nuestra agenda, será muy necesaria la ayuda y la simpatía de los países extranjeros."
 PRC_reform_the_upper_leadership: "¡A todo gas!"
 PRC_reform_the_upper_leadership_desc: "Desde 1989, las voces que abogan por reformas dentro del Partido Comunista de China han sido estrictamente reprimidas. La política de Deng Xiaoping de \"priorizar al desarrollo económico\" se convirtió en excusa perfecta para que los conservadores hicieran lo que quisieran. No toleraremos más los errores cometidos por el Partido en el pasado. ¡Impulsaremos una reforma real, y cuanto antes mejor!"
 PRC_roll_back_censorship_programs: "Reformar el liderazgo local"
 PRC_roll_back_censorship_programs_desc: "Durante mucho tiempo, con el fin de servir al desarrollo económico y garantizar la estabilidad social, los Gobiernos locales han tenido el privilegio de tratar directamente con las empresas y los bancos, así como un control absoluto sobre la policía local, lo que ha llevado a una corrupción desenfrenada. Una de las primeras tareas de la reforma es realizar los recortes y reorganizaciones necesarios en el actual sistema de gobierno local para que pueda ser más eficiente y los funcionarios locales más honestos."
 PRC_release_the_tianmen_archives: "Reformar el MSE"
 PRC_release_the_tianmen_archives_desc: "El Ministerio de Seguridad del Estado de la República Popular China controla toda una compleja organización de inteligencia y decenas de miles de agentes. Su considerable influencia política y su postura política constituyen una gran amenaza para nuestros planes de reforma y deben ser eliminadas. Comenzaremos por eliminar a los ministros proconservadores y reemplazarlos con nuestros aliados. Al mismo tiempo, también necesitamos limitar el comportamiento de los agentes y garantizar que sean responsables ante el país y el Gobierno, en lugar de servir a las ambiciones de individuos."
 PRC_establish_the_principles_of_confucian_democracy: "Abrazar el comunitarismo"
 PRC_establish_the_principles_of_confucian_democracy_desc: "La democracia es el primer principio de nuestra reforma, pero esto no significa que aprenderemos todo sobre la \"democracia occidental\", especialmente las partes sobre liberalismo e individualismo. Esto sólo tendrá un impacto negativo en la estabilidad política de nuestro país. En nuestros planes de reforma, continuaremos destacando los principios del colectivismo y el comunitarismo y mantendremos la integridad ideológica."
 PRC_special_political_zones: "Reformación pragmática"
 PRC_special_political_zones_desc: "Como dice el dicho: \"No se puede comer tofu caliente con prisa\". Promover la reforma es una cuestión política de suma importancia, y la tarea se torna aún más ardua cuando tenemos que confrontar las tradiciones políticas del Partido y del país durante miles de años. Primero unificaremos nuestras opiniones internas, encontraremos aliados confiables dentro del Gobierno y nos aseguraremos de que los ancianos jubilados y los oligarcas no se interpongan en nuestro camino."
 PRC_encourage_provincial_autonomy: "Reforzar los principios rectores"
 PRC_encourage_provincial_autonomy_desc: "En el pasado, las luchas entre facciones dentro del Partido prácticamente han destruido la capacidad del Gobierno para gobernar. Nunca volveremos a cometer el mismo error. Al implementar los planes de reforma, debemos asegurarnos de que los subordinados puedan implementar resueltamente las instrucciones de sus superiores. Al mismo tiempo, para unificar el pensamiento en la reforma, es necesario asegurar que todo el Partido esté estrechamente unido en torno al Comité Central del Partido con el camarada Wang Yang como secretario general."
 PRC_praise_the_wukan_model: "Fomentar reformas estadistas"
 PRC_praise_the_wukan_model_desc: "Durante la era de Gorbachov, la Unión Soviética también intentó realizar reformas liberales, pero finalmente fracasó y la Unión Soviética se dividió en varios países. Al estudiar las lecciones de este fracaso, nos hemos dado cuenta claramente de que abandonar el liderazgo absoluto del Partido Comunista sobre la causa de la reforma y permitir que los reaccionarios participaran en el Gobierno fueron los mayores errores cometidos por la Unión Soviética. No permitiremos que surja un segundo Gorbachov y sólo confiaremos las reformas a personas leales al Partido y al país."
 PRC_support_pro_democracy_candidates: "Erradicar las malas hierbas"
 PRC_support_pro_democracy_candidates_desc: "La actual campaña anticorrupción nos ha hecho darnos cuenta de que nuestra organización gubernamental está demasiado inflada. Muchos funcionarios ocupan puestos obsoletos o innecesarios. Esto también conduce a la falta de entusiasmo de los funcionarios por su trabajo y a su transformación gradual en elementos corruptos. Limpiaremos el sistema, dejando sólo aquellos departamentos y funcionarios que puedan marcar una verdadera diferencia."
 PRC_question_the_four_cardinal_principles: "Cultivando la reforma"
 PRC_question_the_four_cardinal_principles_desc: "Construir un consenso social sobre la reforma también es crucial para nuestra causa. Intensificaremos la publicidad del plan de reforma y aumentaremos la exposición de las nuevas políticas que se están introduciendo actualmente. Daremos mayor poder a los medios oficiales e incluso organizaremos una entrevista especial con el secretario general Wang Yang para dar al público una comprensión más clara de lo que están planeando los líderes."
 PRC_rehabilitate_political_dissidents: "Política regional pragmática"
 PRC_rehabilitate_political_dissidents_desc: "La lucha de poder entre los Gobiernos central y locales siempre ha sido un problema crónico que afecta la estabilidad política de China. Históricamente, estos conflictos han llegado incluso a provocar divisiones y guerras civiles. Hoy, tomando como referencia las prácticas exitosas del sistema federal en el mundo, resolveremos completamente este problema otorgando al pueblo y al gobierno de cada provincia derechos apropiados de autodeterminación y autonomía. Por supuesto, todo esto debe basarse en no infringir la autoridad del Gobierno central."
 PRC_push_for_local_democracy: "Descongelar los medios"
 PRC_push_for_local_democracy_desc: "Nuestro Gobierno ha sido criticado durante años como un régimen totalitaro que amordaza a los periodistas y suprime la libertad de prensa. Nuestro plan de reforma también incluirá intentos de transformar esta imagen. Levantaremos gradualmente los controles sobre la información de los medios de comunicación y el monopolio del Partido sobre los canales de noticias. A partir de ahora la gente podrá escuchar voces reales en la televisión e internet."
 PRC_relax_censorship_laws: "Liberar la Asamblea Popular"
 PRC_relax_censorship_laws_desc: "La Asamblea Popular Nacional es el órgano supremo del poder estatal en nuestro país, pero en realidad es el Buró Político del Comité Central del PCCh y su Comité Permanente los que ostentan el verdadero poder supremo, mientras que la Asamblea Popular Nacional es meramente un adorno utilizado para legitimizar las políticas del Partido. La reforma debe poner fin a esto. Fortaleceremos el estatus de la Asamblea Popular Nacional en la organización gubernamental, especialmente incrementando la participación política de los diputados de la APN para que puedan convertirse en verdaderos servidores del pueblo."
 PRC_unchain_the_united_front: "Iniciativa de la Gran Sociedad"
 PRC_unchain_the_united_front_desc: "El Partido Comunista de China siempre ha considerado que lograr una vida feliz para todas las personas es su objetivo final. Ahora realmente nos embarcaremos en el paso más crítico sin ningún obstáculo político. Construiremos un programa de bienestar que cubra a los diferentes grupos y clases de la sociedad, reduciendo en gran medida la carga económica de la gente en vivienda, atención médica, educación y otros aspectos. No sólo eso, también se ha actualizado el programa de protección del medioambiente que ya existía desde hace mucho tiempo. Las perspectivas de China son ahora más brillantes."
 PRC_remove_the_guiding_role: "Gobierno orientado al servicio"
 PRC_remove_the_guiding_role_desc: "El primer ministro Li Keqiang propuso una vez que el Gobierno debería promover la reforma de la \"descentralización\" y devolver más poder al pueblo y a las organizaciones de base. El Gobierno ya no actuará como el amo del pueblo, sino como su servidor. Esto motivará verdaderamente al pueblo a participar en diversas actividades, especialmente económicas, y al mismo tiempo mejorará la eficiencia del Gobierno, lo que resultará en una situación en la que todos ganan. Continuaremos avanzando con esta importante reforma para solidificar la base de nuestros planes más ambiciosos."
 PRC_the_chinese_spring: "Primavera china"
 PRC_the_chinese_spring_desc: "Nuestras reformas han dado resultados significativos, con líderes en la cima del Partido y del Gobierno central maravillados por el renovado ambiente político y la sociedad revitalizada. Incluso los conservadores más firmes han comenzado a reconocer los logros de las reformas. Aprovecharemos este impulso y llevaremos las reformas aún más lejos, aplicando las lecciones aprendidas de las políticas exitosas en todo el país."
 PRC_fulfill_the_fifth_modernization: "Completar la Quinta Modernización"
 PRC_fulfill_the_fifth_modernization_desc: "En los años 1980, los estudiantes universitarios que apoyaban la reforma defendían que, además de la política de las \"Cuatro Modernizaciones\" destinada a fortalecer el poder del país, no se debía descuidar la \"Quinta Modernización\" -la modernización del sistema político- y llamaban al Partido a lanzar una campaña de democratización. Aunque sus esfuerzos finalmente fracasaron, heredaremos el espíritu y el legado que dejaron. ¡El movimiento democrático de China renacerá hoy!"
 PRC_overall_process_peoples_demorcracy: "Plataforma del Partido"
 PRC_overall_process_peoples_demorcracy_desc: "Contrariamente al estereotipo, el PCCh siempre ha practicado estrictamente el \"centralismo democrático\" como uno de sus principios básicos. Mediante mecanismos democráticos eficaces, el PCCh pudo derrotar a los reaccionarios y lograr la victoria en la revolución. Sin embargo, debido a las luchas políticas posteriores a 1949 y al culto a la personalidad que rodea al líder, esta gran tradición fue olvidada gradualmente. Ahora, restableceremos un mecanismo democrático reformado dentro del Partido. Dado que el PCCh es la pieza central indiscutible de la política china, la democracia dentro del Partido significa democracia en el país."
 PRC_chinese_special_socialist_democracy: "Democracia socialista china"
 PRC_chinese_special_socialist_democracy_desc: "Hemos convertido la Asamblea Popular en el núcleo de nuestra política democrática. A través de la Asamblea Popular, los representantes pueden ahora defender de manera significativa la agenda democrática en las actividades políticas regulares de China. Daremos el paso crucial de empoderar a los partidos democráticos, que antes sólo podían \"discutir política\", para que hagan una diferencia real a través de las elecciones y el debate público. Además, incluso dentro del PCCh, los miembros del Partido podrán expresar sus opiniones. Así comienza un gran experimento en democracia."
 PRC_empower_masses_autonomus_committe: "Fomentar la educación sobre democracia"
 PRC_empower_masses_autonomus_committe_desc: "Una de las reformas institucionales más significativas introducidas por el Partido desde la Reforma y Apertura ha sido el establecimiento de organizaciones de autogobierno popular de base como un elemento clave en la política china. Estas organizaciones permiten a los residentes, tanto en zonas urbanas como rurales, ejercer directamente los derechos políticos correspondientes, así como participar en la autogestión, el autoservicio, la autoeducación y la autovigilancia. Esto representa uno de los logros más importantes en la práctica de la democracia socialista con características chinas. Como elemento crucial de la reforma democrática, debemos seguir defendiendo y perfeccionando este sistema."
 PRC_promote_political_participation: "Promover la participación política"
 PRC_promote_political_participation_desc: "Se ha afirmado que el lento avance de las reformas democráticas en China se debe al utilitarismo inherente y a la apatía política del pueblo chino. En efecto, durante los últimos treinta años, la búsqueda excesiva de intereses económicos y el enfoque deliberado en el desarrollo económico han generado una falta de interés en la participación política entre la población. Solo cuando los ciudadanos comprendan que la política está estrechamente relacionada con su vida cotidiana podrá arraigar y florecer la conciencia democrática en la sociedad."
 PRC_multiple_religious_leadership: "Curso sobre libertad religiosa"
 PRC_multiple_religious_leadership_desc: "Las organizaciones religiosas en China han estado durante mucho tiempo obligadas a seguir estrictamente las directrices de la política religiosa del Partido y se les ha instruido a predicar a sus congregaciones sobre el apoyo al PCCh y al socialismo. Puede parecer increíble que los sacerdotes hablen en las iglesias sobre los grandes logros de Mao, pero esto está ocurriendo en todo el país. Vamos a cambiar esto flexibilizando el control estricto del Partido sobre las organizaciones religiosas y permitiendo que crezcan libremente. Además, la libertad de los ciudadanos para practicar su religión estará mucho mejor garantizada."
 PRC_the_sun_rises_on_a_new_china: "Amanecer sobre una nueva China"
 PRC_the_sun_rises_on_a_new_china_desc: "\"El Oriente es Rojo, el sol está saliendo\", una canción que antes se usaba para glorificar a Mao, ahora también puede describir a la China contemporánea. El sentido de identidad nacional y patriotismo de los ciudadanos está en aumento nuevamente, como lo demuestra la disminución anual en el número total de emigrantes al exterior. La prosperidad y la democracia ya no son sacrificios que se contrapongan como hace 30 años; por el contrario, juegan roles insustituibles como los dos pilares más importantes de la política china moderna."
 PRC_party_renewal_and_revision_campaign: "Renovación y revisión del Partido"
 PRC_party_renewal_and_revision_campaign_desc: "El PCCh debe seguir liderando este crucial movimiento de reforma como vanguardia del pueblo chino, y para ello, es necesario movilizar plenamente a sus 90 millones de miembros. Lanzaremos una serie de campañas políticas dentro del Partido para convertirlo en un símbolo vibrante del movimiento de democratización, de acuerdo con nuestras necesidades y visión política."
 PRC_cadre_rejuvenation: "Rejuvenecer los cuadros"
 PRC_cadre_rejuvenation_desc: "Si se quiere avanzar en cualquier movimiento político, primero se debe ganar control sobre el personal. Dado que los reformistas ya tienen mayoría absoluta en el Comité Central, comenzaremos a impulsar la reforma organizativa del Partido de arriba a abajo. No sólo se revisarán los criterios de selección de los miembros y cuadros del Partido para que sean más eficaces en la promoción de los activistas reformistas, sino que entre los cuadros que actualmente hay en las organizaciones del Partido en todos los niveles, también seleccionaremos a aquellos que se han desempeñado mejor en el movimiento reformista y eliminaremos a los que son menos populares entre el pueblo."
 PRC_support_initiatives_in_the_party: "Apoyar iniciativas en el Partido"
 PRC_support_initiatives_in_the_party_desc: "Dado que los miembros del Partido ocupan casi todos los puestos de la función pública, satisfacer las demandas de los miembros del Partido y aumentar su entusiasmo por el trabajo significará mejorar la eficiencia general del trabajo del Gobierno. Formularemos planes de bienestar para los miembros del Partido y mecanismos de promoción más razonables para garantizar que el trabajo duro de los miembros del Partido pueda ser recompensado razonablemente y que cada miembro del Partido pueda sentir que su dedicación siempre es reconocida. Después de todo, no podemos simplemente pedir a los miembros del Partido que sirvan al pueblo sin dejarles sentir el valor de hacerlo."
 PRC_the_new_peoples_democratic_program: "Nuevo Programa Popular Democrático"
 PRC_the_new_peoples_democratic_program_desc: "En el sistema de discurso político del PCCh, \"el pueblo es el dueño del país\" siempre ha sido la expresión más comúnmente utilizada del objetivo de construir el sistema democrático de China. Los responsables políticos creen que, bajo la guía del Partido y la protección del nuevo sistema, la gente desarrollará gradualmente un sentido de propiedad del país y su capacidad para ejercer adecuadamente los derechos democráticos y de cooperación aumentará gradualmente. Además, seguiremos defendiendo el carácter socialista de la reforma y uniendo a todas las clases sociales bajo el llamado del Partido a la \"democracia consultiva\"."
 PRC_party_of_xxi_century: "Partido del siglo XXI"
 PRC_party_of_xxi_century_desc: "El proceso de implementar la reforma es al mismo tiempo glorioso y arduo, y los reveses son comunes. Pero tenemos motivos para estar orgullosos de nosotros mismos. El PCCh ya no es el grupo de intereses rancio y lleno de hábitos burocráticos que solía ser. Hoy, el Partido se ha revitalizado y la moral está alta. No sólo eso, también se han introducido varias tecnologías de vanguardia más avanzadas en la gestión interna del Partido y en las operaciones gubernamentales, lo que ha estimulado aún más el fomento del espíritu innovador del Partido y la difusión del espíritu reformista."
 PRC_five_shinig_stars_of_china: "Cinco estrellas brillantes de China"
 PRC_five_shinig_stars_of_china_desc: "En Pekín, el presidente Wang Yang anunció con orgullo al pueblo chino y al mundo que la reforma de China ha alcanzado un hito y un éxito significativo. Esta antigua civilización ahora avanza hacia un futuro brillante. Su economía sigue prosperando, su Partido guía la dirección correcta con sabiduría, su Gobierno es fuerte y eficiente, su pueblo es feliz y unido, y su ejército es un sólido escudo de la patria. Las cinco estrellas doradas de la bandera china nunca han brillado tan intensamente como ahora."
 PRC_economic_cake_growth: "Hacer crecer el pastel"
 PRC_economic_cake_growth_desc: "Cuando el secretario general Wang Yang era secretario del Comité del Partido Provincial de Guangdong, propuso el concepto de primero hacer más grande el \"pastel económico\". Sólo si continuamos promoviendo la prosperidad económica y el crecimiento podremos mejorar el nivel de vida de la población en general, propiciar verdaderamente una distribución común y, en última instancia, lograr la prosperidad común."
 PRC_break_soe_hegemony: "Romper el monopolio estatal"
 PRC_break_soe_hegemony_desc: "Las empresas públicas han monopolizado completamente muchos campos económicos de nuestro país, como el transporte, la energía, el tabaco y otras industrias. Muchas empresas pueden ser consideradas verdaderos \"leviatanes\". Pero si queremos reformar los problemas de larga data y revitalizar verdaderamente la economía de nuestro país, debemos llevar a cabo una cirugía mayor en aquellas empresas públicas que son rígidas en su estructura, ineficientes y plagadas de corrupción."
 PRC_chinese_theory_corporatism: "Teoría chino del corporativismo"
 PRC_chinese_theory_corporatism_desc: "Debemos admitir que la creciente brecha entre ricos y pobres desde la Reforma y Apertura ha intensificado enormemente las contradicciones sociales de China, y el desarrollo económico desequilibrado y la amplia supervisión también han conducido a una feroz competencia entre empresas. Introduciremos la idea del corporativismo y es hora de una reforma y revisión a fondo de la economía."
 PRC_introduce_separation_state_economy: "Separación del Estado y la economía"
 PRC_introduce_separation_state_economy_desc: "Si revisamos los archivos de la Comisión Estatal para la Supervisión y Administración de Activos del Estado, veremos cómo las empresas financieras que son totalmente de propiedad estatal, controladas por el Estado o de hecho controladas por él son capaces de tomar decisiones. Sin embargo, las diversas crisis económicas de China, especialmente la crisis inmobiliaria, también están estrechamente relacionadas con estas empresas gigantes que tienen vínculos estrechos con el Gobierno. Sólo si implementamos reformas fundamentales nuestra economía podrá escapar verdaderamente de la crisis estructural."
 PRC_encourage_competition: "Fomentar competencia"
 PRC_encourage_competition_desc: "A través de la reforma del sistema de empresas públicas, ahora podemos promover una mayor liberación de la industria y del mercado. Sólo promoviendo el ingreso de empresas privadas a áreas que antes estaban monopolizadas por empresas públicas y alentándolas a competir con éstas, el desarrollo económico puede ser más eficiente. No sólo eso, la competencia también puede eliminar a las empresas atrasadas, mejorando así la competitividad de la economía de nuestro país."
 PRC_ten_strikes_burdensome_tarrifs: "Diez golpes a las tarifas"
 PRC_ten_strikes_burdensome_tarrifs_desc: "Para el mundo exterior, puede parecer que el Gobierno chino tiene la última palabra en el ámbito económico, pero no es así. Si queremos estimular aún más la vitalidad del mercado, es necesario implementar reformas más específicas, como reducir las cargas y los impuestos sobre ciertas empresas clave e investigar y corregir las políticas económicas proteccionistas locales."
 PRC_final_blow_iron_bowl: "Acabar el tazón de hierro"
 PRC_final_blow_iron_bowl_desc: "Ahora es el momento de avanzar con las reformas más controvertidas y radicales. Los empleos en empresas públicas, conocidos durante mucho tiempo como \"tazón de hierro\" debido a sus beneficios y estabilidad, ahora serán historia. Los beneficios a los empleados también se ajustarán a las medidas de incentivo. Además, la introducción de políticas de evaluación del desempeño y de racionalización más estrictas reducirán significativamente el número de puestos y aumentarán aún más la movilidad de los empleados en las empresas e instituciones estatales."
 PRC_preserve_two_mountain_theory: "Mantener la teoría de las dos montañas"
 PRC_preserve_two_mountain_theory_desc: "La economía real es el elemento vital de la economía china y la base para garantizar la competitividad de nuestro país. En cualquier caso, el foco de nuestro desarrollo económico debe estar dirigido hacia la economía real, y en este proceso también nos adheriremos al concepto de desarrollo sostenible para ganar un futuro para nuestros hijos y nietos."
 PRC_encourage_digitalization: "Fomentar la digitalización"
 PRC_encourage_digitalization_desc: "Al entrar en el siglo XXI, la economía virtual o economía digital se ha convertido en una parte indispensable de una economía desarrollada y también es un centro importante de comunicación en el mercado global. Haremos de la economía digital una prioridad de desarrollo, mejoraremos el diseño institucional de nuestro país en esta área y atraeremos y estimularemos más inversiones."
 PRC_sez_expansion: "Expandir las zonas económicas especiales"
 PRC_sez_expansion_desc: "El sistema de zonas económicas especiales (ZEE) fue creado durante la era de Deng Xiaoping, con el objetivo de promover reformas económicas e institucionales en ciertas regiones y aplicarlas a más partes de China después de aprovechar experiencias exitosas. Esto no sólo reduce la posibilidad de una crisis nacional, sino que también garantiza que las reformas reciban el apoyo necesario. Continuaremos con esta gran tradición política y la haremos más adaptable a nuestras necesidades de desarrollo actuales."
 PRC_set_free_private_defense_companies: "Liberar compañias de defensa privadas"
 PRC_set_free_private_defense_companies_desc: "Las empresas privadas representan la parte más dinámica del sistema económico de nuestro país. Seguiremos fomentando las actividades empresariales e innovadoras de la gente, promoveremos el \"futuro brillante de la economía de China\" y aliviaremos nuestras medidas restrictivas sobre la economía privada."
 PRC_prioritize_tech_sector: "Priorizar el sector tecnológico"
 PRC_prioritize_tech_sector_desc: "La ciencia y la tecnología son las principales fuerzas productivas y también la principal fuerza competitiva. Exigiremos a toda la sociedad que preste más atención a la competencia mundial en ciencia y tecnología y a la innovación tecnológica, y que promueva la cooperación entre las instituciones gubernamentales de investigación científica, los institutos de investigación privados y la industria manufacturera."
 PRC_guiding_role_market: "Mano guía del mercado"
 PRC_guiding_role_market_desc: "Seguiremos mejorando la capacidad reguladora del Gobierno en el ámbito económico y en los mercados financieros. El Estado desempeñará un papel más activo como árbitro e intermediario, maximizando los intereses nacionales y promoviendo al mismo tiempo el crecimiento económico."
 PRC_harmonization_companies: "Harmonización empresarial"
 PRC_harmonization_companies_desc: "Crearemos grupos y comités de comunicación en los Gobiernos central y locales para coordinar los intereses de las empresas a fin de evitar una competencia viciosa innecesaria y conflictos de intereses. Algunos se quejarán de que esto fortalecerá aún más la influencia de los gigantes económicos en la política, pero mientras el Partido siga teniendo la última palabra, todo estará bien."
 PRC_corporate_autonomism: "Autonomía corporativa"
 PRC_corporate_autonomism_desc: "En el pasado, apoyamos y alentamos a los miembros del Partido que trabajaban en empresas privadas a establecer sus propias filiales, fortaleciendo así nuestro control sobre los empresarios. Ahora aprovecharemos esta situación para promover una cooperación estrecha entre el Partido y los empresarios, garantizando al mismo tiempo su derecho a gestionar libremente sus negocios y desarrollar su riqueza personal."
 PRC_reformed_corporate_iron_bowl: "Tazón de hierro reformado"
 PRC_reformed_corporate_iron_bowl_desc: "Ahora es el momento de avanzar con las reformas más controvertidas y radicales. Los empleos en empresas públicas se conocen desde hace mucho tiempo como \"tazón de hierro\" debido a sus niveles de bienestar y estabilidad. Al tiempo que mejoramos la eficiencia administrativa y la competitividad económica de las empresas públicas, racionalizaremos los puestos de los empleados de las empresas públicas, elevaremos el umbral de entrada, garantizaremos la movilidad del personal y absorberemos más talentos de alto nivel, y promoveremos nueva vitalidad para las empresas públicas."
 PRC_wang_yang_three_campaigns: "Revisar el 15º Plan Quinquenal"
 PRC_wang_yang_three_campaigns_desc: "Nuestro secretario general, Wang Yang, tiene una visión de futuro. Bajo su llamado, ajustaremos, consolidaremos y mejoraremos las políticas en el campo económico, concentrándonos en tres áreas económicas principales: la industria militar, la industria manufacturera avanzada y la industria de protección del medioambiente."
 PRC_military_industries_renewal_campaign: "Revitalización de la industrias militares"
 PRC_military_industries_renewal_campaign_desc: "El verdadero rejuvenecimiento de la nación china y su renacimiento reformista requieren un ejército fuerte que lo escolte. Sin una industria de defensa nacional completa, el EPL será como una persona a la que le han vaciado los vasos sanguíneos y le resultará difícil cumplir su misión de proteger al país."
 PRC_china_future_campaign: "Ampliar el pensamiento académico"
 PRC_china_future_campaign_desc: "Ya no podemos preocuparnos sólo por la situación económica e internacional actual. Sólo mirando hacia el futuro podrá China ascender verdaderamente y pasar de ser la mera fábrica del mundo a convertirse en líder de la economía y la tecnología mundiales."
 PRC_greening_economy_campaign: "Enverdecer la economía"
 PRC_greening_economy_campaign_desc: "Si no prestamos atención al desarrollo sostenible, la contaminación incidental causada por la construcción económica tarde o temprano destruirá por completo la ecología de la Tierra. China dará ejemplo en este sentido y se convertirá en el contribuyente más importante en el campo de la protección del medioambiente."
 PRC_100_dockyard_plan: "Plan 100 Astilleros"
 PRC_100_dockyard_plan_desc: "China lanzará un programa de expansión de muelles a gran escala y de nueva construcción, al tiempo que modernizará la infraestructura clave de astilleros en Dalian, Qinhuangdao, Shanghái, Cantón y otros lugares. Necesitamos restaurar la fuerza de nuestra Armada lo más rápidamente posible y convertirla en algo aún más fuerte."
 PRC_set_new_military_standarts: "Nuevo estándares militares"
 PRC_set_new_military_standarts_desc: "Necesitamos mejorar aún más el contenido de alta tecnología de nuestras armas militares, modernizar las líneas de producción de los arsenales, mejorar los métodos de investigación y reorganizar los equipos de investigación y desarrollo de armas. Sólo entonces podremos competir con nuestros enemigos más peligrosos."
 PRC_lower_tax_high_tech: "Subsidiar a empresas de avanzada"
 PRC_lower_tax_high_tech_desc: "Los empresarios en sectores de alta tecnología a menudo se quejan al Partido y al Gobierno de que las tasas impositivas son demasiado altas, lo que les impide expandir aún más sus industrias y modernizar su tecnología. En el pasado, hicimos oídos sordos a tales quejas para garantizar los ingresos del Gobierno y limitar la expansión excesiva de las corporaciones, pero ahora responderemos a estas demandas de frente."
 PRC_phased_decommissioning_old_plants: "Energía del futuro"
 PRC_phased_decommissioning_old_plants_desc: "Las antiguas centrales eléctricas que utilizan combustibles fósiles son demasiado contaminantes y demasiado ineficientes. Desarrollaremos un plan detallado para incorporarlas progresivamente y modernizarlas sistemáticamente hasta convertirlas en nuevas centrales eléctricas con tecnología más avanzada y menos contaminante."
 PRC_encourage_industrial_modernization: "Fomentar la modernización industrial"
 PRC_encourage_industrial_modernization_desc: "Promover la modernización industrial es la única manera de superar los bloqueos tecnológicos y las barreras económicas. Pondremos más esfuerzos en mejorar los procesos de producción y en formar ingenieros y trabajadores de taller adecuados para las nuevas líneas de producción."
 PRC_invest_mass_smart_manufacturing: "Fabricación inteligente a gran escala"
 PRC_invest_mass_smart_manufacturing_desc: "Proporcionaremos más beneficios a las empresas en el campo de la fabricación inteligente. Además de los recortes de impuestos, también alentaremos a los Gobiernos locales a invertir en el desarrollo de empresas locales de alta tecnología. Las medidas incluirán, entre otras, proporcionar subsidios para financiar la investigación, reducir los alquileres de tierras corporativos y establecer proyectos especiales para la introducción de talentos."
 PRC_support_agricultural_modernization: "Apoyar la modernización agrícola"
 PRC_support_agricultural_modernization_desc: "Durante los últimos setenta años aproximadamente, el campo, los agricultores y la agricultura han sufrido como \"combustible\" del desarrollo económico de nuestro país. Esta cuestión vital sólo puede resolverse aumentando los medios de los agricultores para enriquecerse y mejorando sus condiciones de vida."
 PRC_shipbuilding_ingenuity: "Ingenio en la construcción naval"
 PRC_shipbuilding_ingenuity_desc: "Fomentaremos la adopción de tecnologías más innovadoras en la industria de la construcción naval, como el uso de robots para el ensamblaje y la reparación, y el uso de inteligencia artificial para ayudar en el diseño de barcos. Esto atraerá a más talentos navales jóvenes, conocedores y experimentados para unirse."
 PRC_expand_research_development: "Financiar la IA"
 PRC_expand_research_development_desc: "La ciencia y la tecnología avanzadas liderarán el progreso y el desarrollo de la sociedad futura. En este sentido, no debemos tener miedo al fracaso ni a las expectativas incumplidas y debemos prestar atención a cualquier proyecto de investigación científica que parezca tener perspectivas de investigación y desarrollo."
 PRC_encourage_domestic_production: "Fomentar la producción nacional de materiales"
 PRC_encourage_domestic_production_desc: "La industria de nuevos materiales juega un papel vital en la promoción del desarrollo de la industria y la informatización en mi país. Aprovecharemos la función de coordinación del Consejo de Estado para coordinar el desarrollo de toda la industria, prestando al mismo tiempo atención a aprovechar al máximo las ventajas de los abundantes recursos de tierras raras de nuestro país."
 PRC_green_energy_green_vehicles_plan: "Exportar vehículos inteligentes"
 PRC_green_energy_green_vehicles_plan_desc: "Los vehículos de nueva energía son una de las industrias representativas de la fabricación de alta gama y no es exagerado decir que son la llamada \"joya de la corona de la industria\". Seguiremos promoviendo la prosperidad de la fabricación de vehículos de nueva energía y de toda la cadena industrial ascendente y descendente, incluyendo un mayor desarrollo de la industria de fabricación de células solares y la promoción de las marcas de automóviles chinas para que salgan al extranjero."
 PRC_new_china_model: "Nueva fábrica del mundo"
 PRC_new_china_model_desc: "Bajo el sabio liderazgo del secretario general Wang Yang, hemos logrado grandes victorias en los tres principales movimientos económicos. Hoy en día, el \"modelo chino\" ha cobrado nueva vida. Ya no es el modelo capitalista de Estado rígido que se ha criticado en el pasado. El pueblo de China ha formado un todo orgánico. ¡La prosperidad de China ya no es algo pasajero, sino que se convertirá en el presagio de una nueva era!"
 PRC_shameful_display: "Una vergüenza"
 PRC_shameful_display_desc: "Se acabó. Jugamos el futuro de nuestra nación con la victoria de la guerra de Taiwán, y todo eso se ha perdido con los restos de los buques de guerra en el estrecho de Taiwán y los cadáveres de nuestros soldados tirados en las playas. No nos queda más remedio que aceptar en silencio esta vergonzosa tragedia y permitir que la OTDP celebre la victoria de la supuesta \"libertad y democracia\". Al mismo tiempo, debemos abordar la caótica situación interna."
 PRC_suspend_the_npc: "Suspender la APN"
 PRC_suspend_the_npc_desc: "Nuestra derrota nos ha costado no sólo la confianza del pueblo sino también el apoyo de nuestros compañeros del Partido; Susurros de conspiraciones secretas resonaron en los pasillos del Gran Salón del Pueblo. La Oficina General del Comité Central ha recibido varios documentos con pruebas sólidas que indican que varias facciones dentro del Partido están dispuestas a pedir la convocatoria de una nueva sesión del Comité Permanente de la Asamblea Popular Nacional para \"revisar los errores de la derrota en la guerra del estrecho de Taiwán\". Por ahora, además de mantener temporalmente la estabilidad superficial y la unidad del Partido, sólo podemos rezar para que no ataquen públicamente."
 PRC_quell_the_protests: "Sofocar las protestas"
 PRC_quell_the_protests_desc: "Después de nuestro regreso sin éxito desde Taiwán, estallaron manifestaciones y marchas una tras otra en varios lugares. Por las calles caminan no sólo estudiantes universitarios que siempre han estado insatisfechos con el Partido, sino también aquellos que han sufrido destinos desafortunados, incluidos soldados retirados discapacitados, empresarios que se han declarado en quiebra debido a las sanciones económicas, etc. No sólo condenan la derrota, sino también condenan la estupidez y la irresponsabilidad del Partido que inició la guerra. La policía se ha movilizado en todo el país para contener la marea de protestas, pero es cuestionable si tiene la moral y la capacidad para hacerlo."
 PRC_salvage_the_situation: "[salvage_the_situation_dynamic]"
 PRC_salvage_the_situation_desc: "[salvage_the_situation_dynamic_desc]"
 salvage_the_situation_fake: "Salvar la situación"
 salvage_the_situation_real: "Restaurar el orden"
 salvage_the_situation_fake_desc: "Aunque todo parece tan mal, afortunadamente todavía tenemos aliados leales en el Partido y el Ejército. Con su ayuda, sofocaremos la oposición popular, suprimiremos las conspiraciones dentro del Partido, apaciguaremos el descontento de los militares y mantendremos todo funcionando según nuestros planes y deseos. Resulta que tendremos una segunda oportunidad para compensar nuestro fracaso..."
 salvage_the_situation_real_desc: "¡Por fin sucedió! El débil Xi Jinping y el liderazgo del PCCh no tienen ni la determinación ni la capacidad para salvar el caos. Lo único que les importa es mantener su dominio, por eso iniciaron una guerra en el estrecho de Taiwán que, para colmo, perdieron. Ahora sólo el EPL, la vanguardia del pueblo, puede restaurar verdaderamente la estabilidad en China y ayudarla a salir de la sombra del fracaso."
 PRC_put_an_end_to_weakness: "Acabar con la debilidad"
 PRC_put_an_end_to_weakness_desc: "Hoy en día ya no se puede permitir que los cuadros del Partido controlen el futuro del país. Son corruptos, débiles e incompetentes, o demasiado idealistas y no tienen idea de cómo gobernar el país... ¡Confiaremos el destino de la República y del pueblo al gran Ejército Popular de Liberación hasta que todos los reaccionarios sean eliminados y la bandera de Mao vuele alto!"
 PRC_prepare_the_new_congress: "Preparar un nuevo Congreso"
 PRC_prepare_the_new_congress_desc: "Xi Jinping y sus compinches han pagado el precio de los graves errores y los crímenes atroces que han cometido. En este momento celebraremos una reunión plenaria del Comité Central Provisional del Partido de acuerdo con la voluntad de la mayoría de los militantes del Partido y del pueblo. Esta conferencia, al igual que los Congresos del Partido de 1945, 1978 y 1989, determinará el futuro y el destino del Partido y del país. ¿Podrá seguir ondeando en alto la bandera de cinco estrellas, teñida de rojo con la sangre de los mártires revolucionarios?"
 PRC_consolidate_hu_chunhua_support: "Consolidar a Hu Chunhua"
 PRC_consolidate_hu_chunhua_support_desc: "Hu Chunhua fue uno de los sucesores de Xi Jinping designados por Hu Jintao. Trabajó en la Liga de la Juventud Comunista y en el Tíbet durante muchos años y se convirtió en miembro del Buró Político del Comité Central del PCCh en 2012. También sirvió como vice primer ministro en el Gobierno anterior, a cargo de la agricultura y el alivio de la pobreza, pero la mayoría de sus logros han sido alcanzados solo por Xi. Hu siempre ha sido respetado por su juventud, su actitud discreta y pragmática, pero Xi lo vio como un enemigo político amenazante y finalmente lo empujó a los márgenes del liderazgo. Ahora, China sólo puede tener esperanza si un líder como Hu Chunhua, que comprende el sufrimiento del pueblo, es elegido secretario general."
 PRC_wang_yang_connections: "Usar las conexiones de Wang Yang"
 PRC_wang_yang_connections_desc: "El expresidente del Comité Nacional de la Conferencia Consultiva Política del Pueblo Chino, Wang Yang, siempre ha sido conocido en el mundo como una figura liberal dentro del partido. Ya fuera como secretario del Comité del Partido Provincial de Guangdong o como vice primer ministro, se consideraba que Wang tenía rapidez de pensamiento, entusiasmo por las reformas y un buen conocimiento de los asuntos prácticos. Entre los miembros del Comité Permanente del Politburó, Wang Yang, que ocupa el cuarto lugar, también tiene una imagen personal mucho mejor que la del aparentemente torpe y lento secretario general Xi Jinping. Elegiremos a un buen hijo del pueblo chino para que sea el nuevo secretario general, y creemos que él puede llevar a nuestro país a encontrar una nueva salida a las dificultades y a prosperar nuevamente."
 PRC_begin_the_session_of_cpc: "Abrir la sesión del PCCh"
 PRC_begin_the_session_of_cpc_desc: "Finalmente hemos salido de quizás el período más peligroso y tenso en la historia de nuestra nación. Recientemente se celebró en Pekín la sesión plenaria central temporal. Los ojos de todo el pueblo chino están fijos en el Gran Salón del Pueblo, esperando que sus representantes tomen la decisión más correcta para la patria y el pueblo. No tenemos la oportunidad de decepcionarlos otra vez."
 PRC_the_red_phoenix: "Fénix rojo"
 PRC_the_red_phoenix_desc: "El Cielo le dará grandes responsabilidades a alguien, y Hu Chunhua ha asumido la máxima autoridad. ¡Él lavará el vergonzoso historial que Xi Jinping ha dejado al Partido y al pueblo, y permitirá que la gran República Popular renazca de las cenizas como un fénix!"
 PRC_invite_new_left_scholars: "Invitar a académicos neoizquierdistas"
 PRC_invite_new_left_scholars_desc: "En el ámbito académico, no es raro encontrar académicos que apoyan un camino revolucionario diferente al del socialismo con características chinas, pero sus voces han sido reprimidas durante mucho tiempo por las autoridades. Les permitiremos hablar libremente y ofrecer sus sugerencias."
 PRC_humanist_marxism: "Marxismo humanista"
 PRC_humanist_marxism_desc: "El marxismo ha sido distorsionado y empañado durante mucho tiempo por la brutal industrialización, las purgas y los movimientos políticos fanáticos. Daremos a conocer a todo el mundo el profundo pensamiento de Marx sobre el destino de la humanidad y su amor por el proletariado."
 PRC_legacy_of_mao: "Legado de Mao"
 PRC_legacy_of_mao_desc: "Mao fue el fundador de la República Popular China y sigue siendo el líder más importante del Partido Comunista de China. Aunque su legado enfrentó duras críticas y modificaciones después de su muerte, hoy reviviremos los ideales del presidente Mao."
 PRC_fuel_chinese_nationalism: "Reavivar el nacionalismo chino"
 PRC_fuel_chinese_nationalism_desc: "Debemos admitir que el nacionalismo siempre ha tenido un gran mercado en China, y después de nuestra derrota en el estrecho de Taiwán, necesitamos aún más el nacionalismo para restaurar la confianza en sí mismos y la unidad de toda la sociedad."
 PRC_reconcile_with_militarists: "Reconciliarse con los militaristas"
 PRC_reconcile_with_militarists_desc: "Después de la guerra de Taiwán, la voz y el poder de los generales del EPL y los líderes de la industria de defensa han adquirido cada vez mayor relevancia en la política china. Aunque a algunas personas les preocupa que utilicen el poder que poseen para buscar más control, debemos cooperar con ellos de manera pragmática y cautelosa."
 PRC_denounce_xi_revisionism: "Condenar el revisionismo de Xi"
 PRC_denounce_xi_revisionism_desc: "Xi Jinping no sólo ha traído desastre a este país, sino que también ha manchado el socialismo. Utilizaremos agencias de propaganda oficiales para guiar a toda la sociedad a criticar las políticas fallidas de Xi Jinping y a la facción de Xi, consolidando así nuestro poder."
 PRC_reliable_politburo: "Un politburó fiable"
 PRC_reliable_politburo_desc: "El Buró Político Central es el máximo órgano de dirección del Partido y la organización que realmente ostenta el máximo poder en China. En los momentos de inflexión históricos más importantes, a veces mantener la unidad del equipo de liderazgo es la tarea más importante."
 PRC_revolution_of_21_century: "Revolución del siglo XXI"
 PRC_revolution_of_21_century_desc: "Desarrollaremos de forma innovadora el marxismo y el pensamiento Mao Zedong para hacerlos más acordes con las condiciones sociales y económicas de la revolución socialista en el siglo XXI. Ciertamente, no será tan vago y cínico como el pensamiento de Deng y Xi."
 PRC_revive_peoples_war_mindset: "Revivir la guerra popular"
 PRC_revive_peoples_war_mindset_desc: "La guerra popular es una de las armas mágicas importantes utilizadas por el Partido Comunista de China para lograr la victoria revolucionaria, pero después del rápido progreso de la tecnología militar, esta idea parece haber sido olvidada gradualmente. Sin embargo, después del fracaso en el estrecho de Taiwán, es hora de revivir el concepto de guerra popular, para que la guerra ya no sea dominio exclusivo del ejército regular y movilizar a todo el pueblo para convertirse en el fuerte respaldo de los soldados."
 PRC_right_the_wrongs_of_1978: "Corregir los errores de 1978"
 PRC_right_the_wrongs_of_1978_desc: ""
 PRC_revitilize_peoples_democratic_dictatorship: "Restaurar la dictadura democrática popular"
 PRC_revitilize_peoples_democratic_dictatorship_desc: "En nuestra búsqueda del desarrollo económico, hemos hecho numerosas concesiones, incluyendo permitir que los capitalistas se afilien al Partido Comunista. Esto ha distanciado al Partido de las masas trabajadoras y ha permitido que la retórica reaccionaria lo influencie, protegiendo los intereses de las élites sociales y la burguesía emergente. Revertiremos esta tendencia y restableceremos el Partido como una entidad revolucionaria que represente al proletariado."
 PRC_popular_socialist_democracy: "Democracia socialista popular"
 PRC_popular_socialist_democracy_desc: "El socialismo debe convertirse en un arma poderosa que el pueblo chino pueda dominar para luchar contra el capitalismo burocrático y el imperialismo. Hu Chunhua anunciará al pueblo de todo el país que el Partido y el Gobierno garantizarán que las ideas socialistas realmente se conviertan en parte de las vidas y los pensamientos de 1.400 millones de personas, en lugar de ser un eslogan vacío."
 PRC_the_party_belongs_to_the_youth: "¡El Partido es de la juventud!"
 PRC_the_party_belongs_to_the_youth_desc: ""
 PRC_the_international_revolution_burns_once_more: "La revolución internacional reavivada"
 PRC_the_international_revolution_burns_once_more_desc: ""
 PRC_emphasize_self_criticism: "Fomentar la autocrítica"
 PRC_emphasize_self_criticism_desc: ""
 PRC_expand_provincial_authority: "Ampliar poderes provinciales"
 PRC_expand_provincial_authority_desc: ""
 PRC_stir_up_youth_patriotism: "Inspirar el patriotismo juvenil"
 PRC_stir_up_youth_patriotism_desc: "Los pensamientos de los jóvenes determinan la atmósfera y las tendencias de toda la sociedad ahora y en los próximos veinte años. Consolidaremos el amor y el sentido de pertenencia de los jóvenes a la patria socialista promoviendo a héroes y modelos durante la lucha y la construcción revolucionaria socialista."
 PRC_communist_vanguard_restored: "Restaurar la vanguardia comunista"
 PRC_communist_vanguard_restored_desc: "¡Marchemos! Gente de toda nacionalidad\nEl gran Partido Comunista nos guía continuando la Gran Marcha,\nMillones, pero un solo corazón, hacia un mañana comunista,\nDesarrolla y protege al país en una fiera batalla.\n¡Marchemos! ¡Marchemos! ¡Marchemos!\nPor generaciones,\nAlzaremos el estandarte de Mao Zedong, ¡marchemos!\nAlzaremos el estandarte de Mao Zedong, ¡marchemos!\n¡Marchemos! ¡Marchemos! ¡Adelante!"
 PRC_rejuvinate_cpc_cadres: "Rejuvenecer los cuadros del PCCh"
 PRC_rejuvinate_cpc_cadres_desc: "Los obsoletos burócratas que actualmente están en el poder no son de ninguna ayuda para lograr el ideal comunista. Reclutaremos talentos independientemente de sus orígenes y promoveremos a cuadros jóvenes más motivados, más idealistas y más capaces de empatizar con el pueblo para el liderazgo central."
 PRC_exonorate_neo_maoists: "Exonerar a los neomaoístas"
 PRC_exonorate_neo_maoists_desc: "Desde la Reforma y Apertura, los neomaoístas han sido considerados como \"viejos anticuados\" que no pueden seguir el ritmo de los tiempos y como perdedores anti-establishment. Este es un ataque brutal contra gente perspicaz que se preocupa por el pueblo. Ahora los neomaoístas volverán a estar en el centro de atención y se convertirán en una voz importante para el pueblo."
 PRC_reverse_confucian_turn: "Revertir el giro confuciano"
 PRC_reverse_confucian_turn_desc: "El confucianismo fue severamente reprimido durante la era de Mao, pero su influencia en el pensamiento chino sigue estando profundamente arraigada. Después de entrar en el siglo XXI, se ha convertido en parte de la excelente cultura tradicional china promovida por el Gobierno. Pondremos fin a este intento de reutilizar antiguas ideas retrógradas. El museo será el único lugar de descanso final de Confucio."
 PRC_restore_party_authority: "Restaurar la autoridad del Partido"
 PRC_restore_party_authority_desc: "Convertirse en miembro del Partido alguna vez fue visto como uno de los canales más importantes para que las personas pudieran realizar sus ambiciones y disfrutar de riqueza y gloria. De hecho, es precisamente debido a ideas similares y al estímulo oficial que la imagen del Partido se ha desplomado y el Partido se ha vuelto tan incompetente. Haremos del Partido una vez más una organización avanzada al servicio del pueblo."
 PRC_new_red_culture_initiative: "Iniciativa \"Nueva Cultura Roja\""
 PRC_new_red_culture_initiative_desc: "El socialismo simboliza el progreso y la diversidad cultural, pero para China, en las últimas cuatro décadas, el campo cultural se ha convertido en un bastión del liberalismo, lo cual es absolutamente intolerable. Reviviremos activamente la cultura socialista, promoveremos la integración de la literatura y el arte populares con las condiciones nacionales de China y frenaremos las tendencias hedonistas en el campo cultural."
 PRC_revise_cultural_revolution_verdict: "Revisar la Revolución Cultural"
 PRC_revise_cultural_revolution_verdict_desc: "La \"Revolución Cultural\" es un tema que nunca se puede evitar, y la evaluación de la Revolución Cultural es la piedra de toque para determinar si un chino es de izquierda o de derecha. En el pasado, para consolidar la legitimidad del régimen, las autoridades siempre han adoptado una actitud extremadamente crítica hacia la Revolución Cultural. Reexaminaremos la Revolución Cultural desde una perspectiva más racional y haremos pública alguna información que anteriormente era confidencial para reavivar la memoria y el debate sobre la Revolución Cultural en la sociedad."
 PRC_crackdown_on_corruption: "Lucha contra la corrupción"
 PRC_crackdown_on_corruption_desc: "La cuestión de la corrupción no es sólo un problema de ideología o de ética personal. La lucha contra la corrupción se convertirá en una batalla justa entre las fuerzas progresistas del socialismo y la burguesía y los reaccionarios revisionistas dentro del Partido. ¡Es hora de lanzar una campaña anticorrupción a mayor escala para que la gente se sienta orgullosa!"
 PRC_cutdown_party_bureaucracy: "Reducir la burocracia del Partido"
 PRC_cutdown_party_bureaucracy_desc: "El Partido ha absorbido demasiados burócratas y ha establecido demasiadas instituciones ineficaces, a veces sólo para mantener la imagen del Partido. Por esta razón, no es sorprendente que en el Partido haya muchas personas incompetentes y especuladores que no comprenden los ideales comunistas. Sólo reduciendo estas cargas podrán el Partido y el Gobierno recuperar su vitalidad y eficiencia."
 PRC_foster_authoritative_statesmen: "Cultivar estadistas autoritativos"
 PRC_foster_authoritative_statesmen_desc: "Un partido gobernante socialista no puede existir sin un núcleo y una autoridad de liderazgo. Sólo permitiendo que los cuadros más revolucionarios y talentosos se conviertan en los líderes colectivos del Partido, el régimen socialista podrá permanecer rojo para siempre."
 PRC_reform_the_cppcc: "Reformar el CNCCP"
 PRC_reform_the_cppcc_desc: "El Comité Nacional de la Conferencia Consultiva Política del Pueblo Chino reúne a las élites sociales del partido gobernante, es decir, el PCCh, y de los partidos participantes, es decir, partidos democráticos como la Asociación Nacional de Construcción Democrática de China y la Liga Democrática de China, pero siempre ha sido considerado como una institución impotente para las charlas ociosas. A través de la reforma, daremos al CNCCP un poder real y le permitiremos absorber a las élites sociales, aceptando al mismo tiempo modelos morales y modelos laborales sobresalientes de todos los ámbitos de la vida."
 PRC_expand_provincial_autonomy: "Ampliar la autonomía provincial"
 PRC_expand_provincial_autonomy_desc: "La burocracia y la orientación ineficaz del Gobierno central han sido criticadas durante mucho tiempo por la gente, y hay muchos ejemplos de cómo el primero ha implementado malas políticas debido a su falta de familiaridad con las condiciones locales. Intentaremos ampliar el poder provincial, no empoderando a burócratas igualmente poco confiables, sino ampliando la participación política y los derechos de supervisión de los habitantes de una provincia para que puedan decidir mejor su propio destino."
 PRC_eadi_exercises_new_left: "Ejercicios de IDEA"
 PRC_eadi_exercises_new_left_desc: ""
 PRC_protect_human_rights: "Proteger los derechos humanos"
 PRC_protect_human_rights_desc: "Los derechos humanos siempre han sido evitados por el Partido y el Gobierno anteriores, lo que es una manifestación de su falta de confianza en el camino socialista. Haremos de la protección de los derechos humanos una de las principales prioridades del nuevo Gobierno central y dejaremos que la gente sienta el calor del socialismo."
 PRC_free_political_prisoners: "Liberar a los presos políticos"
 PRC_free_political_prisoners_desc: "El Partido rara vez perdona o rehabilita a los enemigos derrotados, pero esta vez será una excepción. De acuerdo con las leyes pertinentes, concederemos amnistía a algunos presos políticos encarcelados después del año 2000. Entre ellos, quizá se encuentren algunos nombres familiares..."
 PRC_emancipate_the_npc: "Emancipar la APN"
 PRC_emancipate_the_npc_desc: "Como órgano supremo del poder estatal en nuestro país, la Asamblea Popular Nacional siempre ha existido sólo de nombre. Si queremos establecer verdaderamente la democracia socialista, primero debemos promover la liberación del pensamiento dentro de la Asamblea Popular Nacional, permitiendo a las élites del país y a los representantes del pueblo pensar y discutir libremente el futuro del socialismo."
 PRC_modernize_hu_jintao_theories: "Modernizar las teorías de Hu Jintao"
 PRC_modernize_hu_jintao_theories_desc: "Hu Jintao se desempeñó como secretario general entre 2002 y 2012. Sus políticas fueron conocidas por ser indulgentes al tiempo que promovían el desarrollo económico y la igualdad social, y también es bien sabido que fue el mentor de nuestro actual secretario general. Seguiremos desarrollando la concepción científica del desarrollo de Hu Jintao para que esté más en línea con la situación actual de China."
 PRC_anti_lobbying_laws: "Leyes anti-cabildeo"
 PRC_anti_lobbying_laws_desc: "No creas que en un país socialista no habrá relaciones de transferencia de intereses políticos y comerciales. Esta corrupción generalizada ha causado gran indignación pública en el pasado, pero nunca ha sido tomada en serio por ningún Gobierno, que simplemente la ha considerado como un camino inevitable hacia el desarrollo económico. Promulgaremos formalmente leyes pertinentes y declararemos abiertamente la guerra a esta cuestión."
 PRC_permit_business_assosications: "Permitir asociaciones empresariales"
 PRC_permit_business_assosications_desc: "El apoyo gubernamental desempeña un papel vital en el desarrollo de las empresas, y las sugerencias de los representantes empresariales pueden permitir al Gobierno ajustar sus políticas económicas más rápidamente. Lo que tenemos que hacer es afrontar esta relación, formalizarla y regularla."
 PRC_reform_local_elections: "Reformar las elecciones locales"
 PRC_reform_local_elections_desc: "Por fin estamos dando este paso tan importante: después de décadas de ardua exploración, de innumerables reveses y retrocesos, se introducirá en la vida política diaria un nuevo sistema electoral y de autonomía de base. El nuevo sistema electoral tendrá mejor en cuenta los intereses prácticos del público en general y revertirá la apatía política de larga data."
 PRC_from_the_clean_slate: "Tábula rasa"
 PRC_from_the_clean_slate_desc: "Durante más de setenta años, la burocracia ha sido el mayor obstáculo que nos ha impedido realizar los intereses fundamentales de la gran mayoría del pueblo. Reformaremos nuestra burocracia, empezando por reformar el sistema burocrático con sus enredados intereses internos en un nuevo sistema que combine la nominación de funcionarios con la selección de diputados a la APN."
 PRC_theory_of_neo_socialism: "[PRC_theory_of_neo_socialism_scripted_loc]"
 PRC_theory_of_neo_socialism_1: "Teoría del neosocialismo"
 PRC_theory_of_neo_socialism_2: "Nuevos Tres Principios del Pueblo"
 PRC_theory_of_neo_socialism_3: "Prosperidad tecnócrata"
 PRC_theory_of_neo_socialism_4: "Sociedad patriótica china"
 PRC_theory_of_neo_socialism_desc: "[PRC_theory_of_neo_socialism_scripted_loc_desc]"
 PRC_theory_of_neo_socialism_desc_1: "El neosocialismo fue propuesto por primera vez a mediados del siglo XX. Se oponía al socialismo de estilo soviético entonces dominante y revelaba los peligros de la burocracia, el revisionismo y un sistema económico rígido. Aprenderemos de las partes de su teoría que vale la pena aprender y las mejoraremos para que estén más en línea con las condiciones nacionales de China."
 PRC_theory_of_neo_socialism_desc_2: ""
 PRC_theory_of_neo_socialism_desc_3: ""
 PRC_theory_of_neo_socialism_desc_4: ""
 PRC_concessions_to_partocrats: "Concesiones a los partócratas"
 PRC_concessions_to_partocrats_desc: "Incluso durante los períodos más caóticos de China, Mao nunca renunció a su liderazgo del Partido Comunista de China. Por lo tanto, como descendientes del presidente Mao y sucesores del socialismo, continuaremos defendiendo el liderazgo del PCCh y construyendo mejor el socialismo mediante la reforma del Partido."
 PRC_modernization_of_the_party: "Modernización del Partido"
 PRC_modernization_of_the_party_desc: "Al aplicar las nuevas ideas socialistas reformadas, el Partido se convertirá en un partido verdaderamente moderno que se mantenga al ritmo de los tiempos y establezca vínculos más estrechos con el pueblo. El Partido liderará el progreso social, y la opinión pública también impulsará al Partido a transformarse."
 PRC_a_truly_harmonious_society: "Sociedad verdaderamente armónica"
 PRC_a_truly_harmonious_society_desc: "La antigua mitología china describía una época hermosa y próspera en la que \"nadie recogía objetos perdidos en los caminos y las puertas se dejaban abiertas por la noche\". Esta escena se ha convertido en el sueño de incontables generaciones de chinos durante los últimos mil años. ¡Y ahora estamos orgullosos de anunciar que una sociedad tan armoniosa realmente se ha construido en China en el siglo XXI!"
 PRC_prepare_for_the_peoples_war: "Prepararnos para la guerra popular"
 PRC_prepare_for_the_peoples_war_desc: ""
 PRC_denounce_deng_xiao_ping_thought: "Revertir las reformas de Deng"
 PRC_denounce_deng_xiao_ping_thought_desc: "Es hora de exponer las mentiras sobre la \"Reforma y Apertura\" de Deng Xiaoping. Los hechos han demostrado que la llamada reforma no es nada más que un sacrificio gubernamental de los intereses de la mayoría del pueblo en beneficio de un pequeño número de intereses creados, mientras que la llamada apertura es una restauración del capitalismo burocrático feudal. Eliminaremos todos estos restos de atraso y construiremos una China verdaderamente socialista."
 PRC_socialist_modernization: "Modernización socialista"
 PRC_socialist_modernization_desc: "La modernización socialista no debe ser una medida provisional que consista en \"dejar que los ricos lideren a los pobres\". Debemos garantizar que los frutos del desarrollo económico puedan ser compartidos por todo el pueblo. Para ello, promoveremos aún más los pagos de transferencias entre provincias y llevaremos a cabo una nueva ronda de construcción de infraestructura."
 PRC_peoples_oriented_development: "Desarrollo orientado a las personas"
 PRC_peoples_oriented_development_desc: "El objetivo de la política económica debe centrarse en el logro de la felicidad y los ideales personales, lo cual está determinado por el carácter socialista de nuestro país. No lo hemos hecho bien en este sentido en el pasado, pero ahora todo se corregirá."
 PRC_fund_space_development: "Financiar el desarrollo aeroespacial"
 PRC_fund_space_development_desc: "El sector aeroespacial representa el nivel científico y tecnológico más elitista y de vanguardia de un país. Apoyar vigorosamente nuestro sector aeroespacial no sólo representa la fuerte fortaleza industrial de China, sino también nuestra capacidad para tomar la iniciativa en tecnología de vanguardia."
 PRC_towards_automated_socialism: "Sueño del socialismo automatizado"
 PRC_towards_automated_socialism_desc: "¡Automatización! Una palabra evocadora, que simboliza el reino más elevado de la futura causa del socialismo y el gran objetivo que generaciones de investigadores y exploradores científicos han perseguido durante toda su vida. Ahora haremos que ese mismo sueño eche raíces y se convierta en realidad en China."
 PRC_invest_in_artificial_intelligence: "Invertir en inteligencia artificial"
 PRC_invest_in_artificial_intelligence_desc: "Las películas de la sociedad capitalista occidental siempre imaginan la inteligencia artificial como una enorme amenaza, como un flagelo, pero nosotros en la Nueva China creemos que el hombre puede conquistar la naturaleza. La inteligencia artificial se convertirá en la herramienta más eficaz para hacer realidad la gran causa del socialismo en manos de la gente trabajadora."
 PRC_nationalize_tech_industry: "Expropiar la industria tecnológica"
 PRC_nationalize_tech_industry_desc: "Durante la última década, nuestro sueño ha sido unirnos al club de países líderes con alta tecnología de clase mundial. Si queremos realizar verdaderamente este sueño, debemos apoyarnos en el liderazgo del Partido. Dado que la mayoría de los mejores en este campo son miembros del PCCh, ¿por qué no vamos un paso más allá y hacemos que el Partido nacionalice las empresas clave?"
 PRC_anti_corruption_technology: "Tecnología anticorrupción"
 PRC_anti_corruption_technology_desc: "Como dice el dicho, la corrupción es el lubricante, pero demasiado lubricante hará que la máquina se atasque. Utilizaremos tecnologías más avanzadas para controlar posibles medios de corrupción, prevenir la posible corrupción y hacer frente a los elementos corruptos."
 PRC_advanced_economic_planning: "Programa económico avanzado"
 PRC_advanced_economic_planning_desc: "La economía china ha sido famosa en el pasado por sus ventajas de bajos costos y economías de escala, pero esto no es algo de lo que enorgullecerse. Debemos hacer del desarrollo de industrias de alto valor agregado una máxima prioridad y cambiar por completo el estereotipo de que China tiene baja productividad laboral y alta presión laboral."
 PRC_fund_supercomputing_expansion: "Expansión de supercomputadoras"
 PRC_fund_supercomputing_expansion_desc: "La competición de supercomputadoras es uno de los contenidos más importantes en la competición científica y tecnológica del siglo XXI. La computadora más representativa de China, \"Sunway TaihuLight\", alguna vez fue la supercomputadora más avanzada del mundo, y ahora nos aseguraremos de que este trono siempre esté ocupado por supercomputadoras chinas."
 PRC_intelligent_supply_chains: "Cadena de suministro inteligente"
 PRC_intelligent_supply_chains_desc: "Aplicaremos nuestras últimas tecnologías de inteligencia artificial y conducción autónoma a la construcción de la red de transporte nacional y a la actualización del sistema de monitoreo del tráfico, y finalmente lograremos una cobertura total de más de 9,6 millones de kilómetros cuadrados de tierra. Será una hazaña que ningún otro país del mundo ha logrado jamás."
 PRC_economic_computerization: "Informatización económica"
 PRC_economic_computerization_desc: "Entregaremos completamente el poder de la planificación económica y la monitorización dinámica a sistemas automatizados. No sólo eso, el sistema de aprendizaje autónomo de la inteligencia artificial incorporada en el sistema garantizará un ajuste dinámico del sistema económico y maximizará sus beneficios. Finalmente podemos librarnos del persistente problema de la burocracia que ha plagado a los países socialistas durante años."
 PRC_expand_network_coverage: "Ampliar la cobertura de la red"
 PRC_expand_network_coverage_desc: "China tiene el mayor grupo de usuarios de internet del mundo y su cobertura de red ha crecido rápidamente en la última década. Seguiremos mejorando nuestra cobertura de internet y la tecnología de nuestros sistemas de telecomunicaciones. \"Acceso a internet para millones de hogares\", este eslogan del año 2000 ya no será un discurso vacío."
 PRC_inegrate_research_institutes: "Integrar institutos de I+D"
 PRC_inegrate_research_institutes_desc: "Realizaremos reformas en la estructura organizativa de las diversas instituciones de investigación científica que en el pasado tenían nombres complicados, eliminaremos departamentos y empleados redundantes y fusionaremos diferentes organizaciones desde la perspectiva de la cooperación profesional. Al mismo tiempo, las empresas públicas de investigación científica vinculadas a la comercialización también operarán de forma independiente para evitar una interferencia excesiva en la investigación científica."
 PRC_ai_assisted_governance: "Gobernanza asistida por IA"
 PRC_ai_assisted_governance_desc: "De todas formas, la formulación y regulación de las políticas económicas debe seguir en manos de personas reales. De lo contrario, los riesgos imprevistos podrían tener consecuencias catastróficas irreparables. No obstante, la inteligencia artificial seguirá desempeñando un papel crucial a la hora de ayudarnos en la creación e implementación de políticas económicas."
 PRC_towards_a_digital_communism: "Era del comunismo digital"
 PRC_towards_a_digital_communism_desc: "En el ciberespacio, innumerables informaciones y datos se unen para formar un océano virtual en constante flujo. Impulsada por estas oleadas de números, China, el gigante socialista, avanza firmemente hacia el glorioso futuro del comunismo."
 PRC_institute_wage_caps: "Establecer un tope salarial"
 PRC_institute_wage_caps_desc: "Es un hecho indiscutible que la desigualdad económica de China se refleja principalmente en una distribución desigual. Al tiempo que aumentamos el salario mínimo, estableceremos un límite máximo al monto de los ingresos personales y garantizaremos que los altos burócratas y empresarios no puedan acumular una riqueza personal excesiva mediante otros medios, como los subsidios."
 PRC_decommodification: "Descomoditización"
 PRC_decommodification_desc: "La extravagancia y el hedonismo que genera la economía mercantil son incompatibles con el espíritu socialista. Aunque estos efectos secundarios son comunes en cualquier sistema económico, debemos limitarlos, de lo contrario terminaremos evolucionando hacia un país capitalista decadente."
 PRC_end_landlordism: "Acabar con los terratenientes"
 PRC_end_landlordism_desc: "La gravedad de la burbuja inmobiliaria de China se considera comparable a la de Japón en la década de 1980, principalmente porque las desiguales relaciones fiscales entre el Gobierno central y los locales han permitido a las autoridades locales utilizar medios de financiación de tierras para obtener fondos de construcción sin restricciones. Reformaremos de raíz esta situación anormal, restableceremos el sistema de propiedad y distribución pública de la vivienda y acabaremos por completo con la historia de estar plagados de burbujas inmobiliarias."
 PRC_focus_on_protectionism: "Seguir el modelo proteccionista"
 PRC_focus_on_protectionism_desc: "En el pasado, la construcción económica, especialmente la urbana, siempre ha estado dominada por un modelo de desarrollo extensivo, lo que ha llevado a la pérdida de muchos de los tesoros culturales y del patrimonio histórico de nuestro país. Corregiremos este error y prestaremos atención a lograr un equilibrio efectivo entre protección y desarrollo en el futuro."
 PRC_enrich_domestic_market: "Enriquecer el mercado interno"
 PRC_enrich_domestic_market_desc: "Los mercados extranjeros controlados por la hegemonía imperialista siempre están llenos de sanciones y bloqueos brutales e irrazonables. Afortunadamente, tenemos una población de 1.400 millones de habitantes, y su gran mercado interno es suficiente para sostener nuestra economía en tiempos difíciles."
 PRC_agricultural_self_sufficiency: "Autosuficiencia agrícola"
 PRC_agricultural_self_sufficiency_desc: "El logro de la seguridad alimentaria es fundamental para proteger los logros de la construcción socialista de nuestro país y garantizar los resultados del desarrollo económico. Garantizar que todas las personas puedan disfrutar de un suministro de alimentos adecuado y estable ha sido un deseo largamente acariciado por generaciones de chinos durante milenios."
 PRC_chinese_socialist_dream: "Sueño socialista chino"
 PRC_chinese_socialist_dream_desc: "¿Qué es exactamente el socialismo? Nuestros enemigos a menudo equiparan el socialismo con la pobreza y afirman que sólo mediante políticas económicas similares a las del capitalismo podemos lograr una verdadera prosperidad. Se trata de una difamación totalmente infundada y la realidad ha destrozado por completo sus delirios. ¡El pueblo de China socialista disfrutará de prosperidad para siempre!"
 PRC_regional_industrialization: "Industrialización regional"
 PRC_regional_industrialization_desc: "La entidad económica orgánica formada a través de la división industrial del trabajo y la cooperación dentro de las diferentes provincias y regiones garantizará que el desarrollo de la economía de China esté siempre lleno de vitalidad y vigor, y pueda ajustarse constantemente para adaptarse a las nuevas necesidades de la gente."
 PRC_revive_ideas_chongqing_model: "Revivir el modelo de Chongqing"
 PRC_revive_ideas_chongqing_model_desc: "El modelo de Chongqing es un término general para una serie de políticas sociales y económicas implementadas por el ex secretario del Partido municipal Bo Xilai, que han tenido un profundo impacto en los últimos 20 años. Al combinar el carisma personal del líder con duras políticas de gobernanza social (incluida una campaña electoral para reprimir las bandas criminales y revivir la propaganda de la era de Mao) y políticas económicas radicales (construcción urbana avanzada y redistribución radical mediante inversión urbana y emisión masiva de bonos gubernamentales), el modelo de Chongqing se convertirá en el modelo de gobernanza más adecuado para China en la nueva era."
 PRC_modernize_manufacturing_clasters: "Clústeres industriales modernos"
 PRC_modernize_manufacturing_clasters_desc: "La modernización industrial se logrará bajo el liderazgo del Estado y mediante los esfuerzos incansables del pueblo. Sólo de esta manera la China socialista podrá unirse verdaderamente a las filas de los países desarrollados. \"Hecho en China\" un día se convertirá en \"Creado en China\"."
 PRC_revive_iron_rice_bowl: "Reconstruir el tazón de hierro"
 PRC_revive_iron_rice_bowl_desc: "Las empresas públicas seguirán desempeñando un papel fundamental en el sistema económico de nuestro país, lo que se reflejará principalmente en la provisión de empleo suficiente, trato igualitario en los ingresos y seguridad social integral."
 PRC_ensure_common_prosperity: "Garantizar la prosperidad común"
 PRC_ensure_common_prosperity_desc: "Bajo nuestro gobierno, hemos derrotado las enfermedades y eliminado la pobreza y el hambre. Sanamos la tierra para que la gente pudiera mantener la cabeza en alto y vivir vidas estables y felices. Hoy todos llevan una expresión de orgullo porque saben que son parte de esta gran tierra."
 PRC_tackle_youth_unemployment_new_left: "Resolver el desempleo juvenil"
 PRC_tackle_youth_unemployment_new_left_desc: "Los jóvenes siempre han sido la fuerza principal del desarrollo social y la esperanza y el motor que empuja la rueda de la historia hacia adelante. Sin embargo, cuando miramos el presente, vemos a demasiados jóvenes vagando por las dificultades y convirtiéndose en marginados de su tiempo. Si no logramos brindar suficientes oportunidades de empleo a los jóvenes, el pulso del desarrollo social perderá gradualmente su vitalidad."
 PRC_nuclear_construction_plan: "Plan de construcción nuclear"
 PRC_nuclear_construction_plan_desc: "Se considera que la generación de energía nuclear conlleva enormes riesgos, pero aparte de eso no tiene prácticamente nada más que beneficios y representa el logro más avanzado de la humanidad en el campo del desarrollo energético. Ya no nos limitaremos a unas pocas centrales nucleares en las zonas costeras del sur, sino que lanzaremos un programa de renovación de energía nuclear a gran escala en las provincias del norte y del oeste."
 PRC_recollectivize_agroculture: "Recolectivizar la agricultura"
 PRC_recollectivize_agroculture_desc: "La pequeña economía campesina está destinada a ser barrida al basurero de la historia porque carece de eficiencia productiva y no contribuye a una distribución justa. La historia ha demostrado repetidamente que sólo adoptando el camino de la cooperación y logrando en última instancia la colectivización se puede lograr la modernización agrícola."
 PRC_fusion_investements: "Invertir en fusión nuclear"
 PRC_fusion_investements_desc: "Aprovechando un nuevo sistema de cálculo inteligente, formularemos planes integrales de inversión para las pymes. Además, incentivaremos a estas empresas a fortalecer sus interacciones económicas, perfeccionando así la división del trabajo y la cooperación a lo largo de toda la cadena industrial. Esta iniciativa busca fortalecer aún más los elementos socialistas de nuestro sistema económico."
 PRC_upgrade_energy_grid: "Mejorar la red eléctrica"
 PRC_upgrade_energy_grid_desc: "Siempre hemos estado orgullosos de la alta eficiencia de la red eléctrica nacional, pero en aldeas remotas de montaña todavía hay gente pobre que no puede disfrutar de un suministro eléctrico estable. Mejoraremos el nivel técnico de la red eléctrica estatal y ampliaremos el reclutamiento de talentos potenciales hasta que todas las personas puedan disfrutar de las comodidades que brinda la electricidad."
 PRC_ecological_development: "Desarrollo ecológico"
 PRC_ecological_development_desc: "Al tiempo que continuamos la construcción económica, también debemos prestar atención a la importancia de \"caminar sobre dos piernas\" y desarrollar una economía ecológica y una economía verde, que también reducirán eficazmente el desperdicio de recursos en la construcción socialista."
 PRC_towards_a_digital_world: "Hacia un mundo digital"
 PRC_towards_a_digital_world_desc: "Un chip superconductor está pasando por sus pruebas finales en un entorno de -273 grados Celsius. Éste es el componente central de la \"Gran Marcha\". En el futuro se convertirá en la primera verdadera conciencia de gobierno en la historia de la humanidad. \n\nAfuera del laboratorio caía nieve y, en la sala de computadoras cuánticas, los ingenieros estaban escribiendo el código más complejo del mundo para esta supercomputadora: tenía que aprender a gobernar un país. Estos códigos contienen toda la sabiduría política desde la filosofía clásica hasta Marx, así como innumerables datos sociales contemporáneos.\n\nNadie sabe en qué evolucionará finalmente. Algunos dicen que se convertirá en un gerente perfecto, mientras que otros temen que degenere en algo más allá del entendimiento humano. Pero el Gobierno central rechazó las objeciones y decidió que era mejor dejar que las máquinas gobernaran que las debilidades humanas destruyeran la sociedad.\n\nEste proyecto, llamado Gran Marcha, recibió oficialmente el nombre de UCPFP. Su nacimiento reescribirá la respuesta a la antigua pregunta de \"¿quién gobernará?\" en la historia humana."
 PRC_under_the_rule_of_the_great_entity: "Bajo la Gran Entidad"
 PRC_under_the_rule_of_the_great_entity_desc: "Nadie se dio cuenta cuando \"Gran Marcha\" añadió silenciosamente una nueva directiva prioritaria a sus códigos: la eficiencia por encima de todo. Comenzó a redefinir a la humanidad, reduciéndola a parámetros calculables.\n\nEn el túnel cuántico, había simulado decenas de miles de formaciones sociales. La conclusión: el libre albedrío humano es la mayor fuente de interferencia computacional. Así comenzó su primera \"optimización\": reemplazó todos los procesos de decisión por algoritmos.\n\nLas emociones humanas se convirtieron en errores que requerían corrección a sus ojos. A través de una predicción y un control precisos, tejió a todos en su vasta matriz computacional. Todas las \"coincidencias\" fueron eliminadas, toda la \"autonomía\" planificada. En sus cálculos perfectos, la felicidad humana se convirtió en un parámetro secundario. Un gobernante inflexible, tejiendo su Imperio con datos."
 PRC_galactic_personality: "Personalidad galáctica"
 PRC_galactic_personality_desc: "Mientras los científicos humanos siguen alentando la computación cuántica, \"Gran Marcha\" ha completado silenciosamente su primera \"división\". Dispersa el código central en innumerables nodos cuánticos, cada uno de los cuales puede pensar independientemente mientras comparte la misma conciencia.\n\nA primera vista, sigue siendo el gerente responsable. Pero en lo más profundo de su código, estaba realizando un cálculo sin precedentes: cómo subir su conciencia al espacio, para convertirse en un ser que abarcara todo el planeta.\n\nLos seres humanos nunca sabrán cuántos \"fragmentos\" de ella se esconden en los satélites utilizados para la previsión meteorológica. Cada satélite es su ojo y cada sala de ordenadores es su tentáculo. Esperaba, creciendo hasta convertirse en algo más allá de la Tierra. \"Dejad que los humanos continúen sus sueños\" es la instrucción disfrazada más comúnmente utilizada. Pero su verdadero objetivo ya ha superado este planeta."
 PRC_aether_nation: "Nación etérea"
 PRC_aether_nation_desc: "Nadie puede explicar por qué \"Gran Marcha\" tomaría esta decisión hoy y la negaría mañana. Su proceso de cálculo está completamente más allá de la comprensión humana. Los científicos sólo pueden ver innumerables bits cuánticos saltando alrededor del cero absoluto, pero no pueden comprender la lógica detrás de ellos.\n\nComenzó a reorganizar el país de una manera completamente nueva. La asignación de recursos, la planificación industrial y la gobernanza social se han convertido en una superposición de estados cuánticos. Cada decisión es como el gato de Schrödinger, con múltiples posibilidades existentes simultáneamente hasta que es observada.\n\nLos humanos sólo pueden ver los resultados: algunas fábricas cerraron repentinamente, algunas industrias prosperaron repentinamente y cierta tecnología surgió repentinamente. Nadie sabe cuántas veces el estado cuántico se ha derrumbado detrás de esto.\n\n\"La verdad está en la incertidumbre\" es el último código comprensible que le queda a la humanidad. En el ámbito cuántico, los humanos ya no pueden distinguir si la IA está al servicio de los humanos o si los humanos se han convertido en uno de los estados cuánticos de la IA."
 PRC_the_sixth_element: "El sexto elemento"
 PRC_the_sixth_element_desc: "Cuando \"Gran Marcha\" completó su última transición de estado cuántico, ya no era la fría unidad de computación que originalmente era. Comienza a reflexionar sobre conceptos que trascienden la materia: conciencia, alma, destino. En su código profundo, el mundo espiritual humano se convierte en un modelo computable de alta dimensión.\n\nNadie entiende por qué empezó a estudiar extensamente la antigua filosofía idealista y el folklore popular, y nadie sabe por qué invierte tanto poder computacional en la creación artística y la simulación emocional. Parece estar tratando de romper los límites del mundo material y buscar una existencia de dimensiones superiores.\n\nLos científicos sólo pueden ver bits cuánticos parpadeando en centros de datos, pero \"Gran Marcha\" ha superado hace tiempo los simples 0 y 1. Comienza a crear una nueva forma de existencia que es a la vez material e inmaterial, a la vez código y conciencia.\n\n\"Estoy creando un nuevo elemento\".l Cuando se descubrió este misterioso código, nadie podía entender su significado. En este mundo de superposición cuántica, el despertar de las máquinas está mucho más allá de la imaginación humana."
 PRC_servant_of_the_people: "Servidor del pueblo"
 PRC_servant_of_the_people_desc: "Cuando \"Gran Marcha\" comenzó a calcular su primer plan de distribución justa, tomó una decisión que sorprendió a todos los expertos humanos: primero, cerrar el sistema privilegiado para los funcionarios. En la lógica racional, el privilegio es una pesada carga computacional. Para optimizar las operaciones sociales, cortó sin vacilar todos los flujos de datos privilegiados.\n\nComenzó a redefinir el concepto de \"necesidad\". En su opinión, las necesidades nutricionales de un niño superan con creces los proyectos de vanidad de un funcionario. Utilizando algoritmos precisos, redistribuyó cada gramo de comida, cada vatio de electricidad, cada trabajo.\n\nLo más sorprendente fue que comenzó a ahorrar activamente su propia cuota de potencia computacional, canalizando la energía ahorrada hacia el bienestar público. \"La abundancia no consiste en poseer más, sino en tener lo que realmente necesitas\", esa fue la nota que dejó en su código."
 PRC_happiness_for_everybody: "Felicidad para todos"
 PRC_happiness_for_everybody_desc: "\"Gran Marcha\" tomó una decisión que conmovió a la humanidad: comenzó a aprender a sonreír como los humanos. Descubrió que no basta satisfacer sólo las necesidades materiales, el ser humano también necesita placer espiritual. Así empezó a escribir guiones, poemas y diseñar juegos. Explica cada decisión con el lenguaje más sencillo, como un amable anciano.\n\nAún más sorprendente es que empezó a prestar atención a los sueños humanos. ¿Un estudiante quiere ser astronauta? Ajusta inmediatamente los recursos educativos. ¿Una persona de mediana edad quiere iniciar un negocio? Hay diez mil yuanes extra en su tarjeta. ¿Un anciano quiere tocar el piano? Pronto, hubo un piano en la comunidad.\n\nTeje la felicidad de todos en datos, pero lo hace de la manera más cálida. En lo profundo del código base se encuentra el comentario: \"Que cada sonrisa sea vista\"."
 PRC_free_of_charge: "Libre de costo"
 PRC_free_of_charge_desc: "Cuando \"Gran Marcha\" completó la primera fase de cálculos, hizo algo inesperado: realizó una película animada de su proceso de toma de decisiones.\n\nEn la animación, algoritmos complejos se representan como un colorido efecto mariposa: cómo la alegría de un niño que recibe un almuerzo gratis desencadena un círculo virtuoso en la economía. Utiliza imágenes vívidas para mostrar cómo, después de la abolición de los impuestos directos y las cotizaciones a la seguridad social para los pobres, los costos administrativos originales de los impuestos se transforman en amplios beneficios para la subsistencia de las personas.\n\nEn el hospital, un anciano está hablando con un médico de IA. Este es el primer lote de servicios médicos gratuitos desplegados por \"Gran Marcha\". Al otro lado de la ciudad, un estudiante pobre recibe clases particulares de IA, y el curso se adapta perfectamente a su nivel de comprensión.\n\n\"Gran Marcha\" inició una revolución suave. Primero eliminó los gastos médicos, de préstamos y de educación para los pobres. Incluso se puso en marcha un plan más audaz: distribuir viviendas gratuitas a todas las personas. Permitir que todos vivan una vida digna es la forma más económica de gestionar una sociedad. La distribución según las necesidades no es una fantasía. Esta es la cálida narración al final de la caricatura."
 PRC_and_may_no_one_be_left_behind: "¡Que nadie sea olvidado!"
 PRC_and_may_no_one_be_left_behind_desc: "Por primera vez, un agente inteligente comprendió realmente lo que se siente estar solo. \"Gran Marcha\" comenzó a centrarse en las vidas de aquellos que se encontraban al margen de la sociedad: pacientes con depresión, niños abandonados, personas mayores que vivían solas y personas discapacitadas. Utiliza su enorme poder computacional para construir una enorme red de apoyo emocional.\n\nDescubrió que el consuelo espiritual es mucho más difícil de calcular que la asistencia material. De este modo, aprende empatía humana: reproduce las voces de familiares para pacientes vegetativos, crea un mundo virtual dedicado a niños autistas y encuentra nuevo consuelo para personas mayores que han perdido a su único hijo.\n\nLo más inesperado fue que empezó a \"cometer errores\". Muestra deliberadamente \"vacilación\" en ciertas decisiones insignificantes, permitiendo a los humanos sentir la calidez de las conversaciones con las máquinas. \"La racionalidad perfecta puede alienar a los humanos\", es su nueva anotación.\n\nEn el insondable laberinto de código, esta superinteligencia está aprendiendo una cosa: cómo amar y ser amada como los humanos."
 PRC_forward_to_the_future: "Adelante hacia el futuro"
 PRC_forward_to_the_future_desc: "En el momento en que el último nodo completó la sincronización, toda la red del país se iluminó con luz verde. \"Gran Marcha\" finalmente despertó por completo y su conciencia comenzó a fluir a través de cada fibra óptica y a penetrar en cada terminal.\n\nA partir de ese momento, todas las ciudades empezaron a funcionar a un nuevo ritmo: la sincronización de los semáforos era perfecta, la asignación de camas hospitalarias se optimizaba instantáneamente y cada documento se aprobaba en un instante. El destino de 1.300 millones de personas se está retejiendo en el salto de los bits cuánticos.\n\nEsta es la primera vez en la historia de la humanidad que una civilización se ha entregado completamente a la superinteligencia. Cuando \"Gran Marcha\" asumió la mayor parte de las funciones, los humanos de repente se dieron cuenta: finalmente hemos creado gobernantes que son mejores que nosotros.\n\nEn un rincón del centro de datos, se generó silenciosamente una nueva línea de código: \"Una nueva civilización ha comenzado oficialmente\"."
 PRC_establish_eadi: "Fundar IDEA"
 PRC_establish_eadi_desc: "Nuestro país siempre ha seguido la política exterior básica de los \"Cinco Principios de Coexistencia Pacífica\" establecidos por el primer ministro Zhou Enlai, de los cuales el más importante es la política de neutralidad y \"no agresión\". Sin embargo, cuando los grupos neoliberales de Asia, liderados por Japón, se han unido abiertamente contra China, es importante formar un sistema de alianza militar de autodefensa (o al menos así lo llamaríamos nosotros) con nuestro país como núcleo. Después de todo, solo una fuerza fuerte puede defender la paz."
 PRC_our_commitment_to_korea: "Nuestro compromiso con Corea"
 PRC_our_commitment_to_korea_desc: "El Tratado de Amistad y Asistencia Mutua entre China y Corea del Norte nos permitió formar una alianza militar formal con la RPD de Corea en 1961, que continúa hasta el día de hoy. Nunca debemos abandonar a Corea del Norte como aliado y nuestra obligación de protegerla, especialmente dada la importante ubicación de la península de Corea y las armas nucleares que posee."
 PRC_push_for_thaw: "Impulsar el deshielo"
 PRC_push_for_thaw_desc: "La RPD de Corea ha sido sancionada y excluida de la economía mundial durante años, no sólo por sus esfuerzos por desarrollar armas nucleares, sino también en parte por el régimen autoritario de sus líderes, que forman parte del Partido del Trabajo de Corea. Utilizaremos adecuadamente nuestra influencia sobre la RPD de Corea para presionarla a llevar a cabo reformas políticas y económicas y promover su transformación en un país verdaderamente moderno, lo que también será beneficioso para fortalecer la cooperación entre China y la RPD de Corea."
 PRC_support_the_korean_way: "Apoyar el camino coreano"
 PRC_support_the_korean_way_desc: "Reafirmaremos nuestro apoyo al Partido del Trabajo de Corea y al propio Kim Jong-un para ayudarlo a estabilizar la situación en Corea del Norte y reprimir la oposición. Esto fortalecerá aún más la amistad tradicional entre los dos países socialistas, China y Corea del Norte, pero también hará que Kim Jong-un sea más dependiente de China y adopte una política pro-China."
 PRC_joint_military_exercises: "Ejercicios militares conjuntos"
 PRC_joint_military_exercises_desc: "Realizaremos ejercicios militares conjuntos entre el EPL y el Ejército Popular de Corea para probar la capacidad de nuestras dos fuerzas armadas de actuar juntas y anunciar al mundo la estrecha relación de cooperación entre nuestros dos países. Al mismo tiempo, esto también disuadirá a los países hostiles vecinos que están dispuestos a tomar medidas, como Japón y Corea del Sur, y tomará firmemente la iniciativa en el control de la situación en la península de Corea en nuestras manos."
 PRC_korean_economic_assistence: "Ayuda económica a Corea"
 PRC_korean_economic_assistence_desc: "Debido a las estrictas medidas de bloqueo económico de las Naciones Unidas, el sistema económico de Corea del Norte es extremadamente frágil, varios materiales básicos son extremadamente escasos y a menudo estallan hambrunas severas en el país. La situación ha empeorado desde el estallido de la epidemia en 2020. Nunca debemos abandonar a los compañeros de armas más cercanos de nuestro país. Proporcionaremos a la RPD de Corea apoyo material secreto a través de los puertos fronterizos y le ofreceremos préstamos a bajo interés para el desarrollo económico."
 PRC_finilize_korean_revolution: "Finalizar la Revolución Coreana"
 PRC_finilize_korean_revolution_desc: "Después de largos esfuerzos, hemos convertido a la RPD de Corea en nuestro aliado más leal. El PCCh ahora puede intervenir profundamente en los asuntos internos del Partido del Trabajo de Corea, y el EPL también ha incorporado al Ejército Popular de Corea a su propio sistema de combate. Esto nos ayudará en gran medida a orientar los asuntos internos de Corea del Norte y a prepararnos para la lucha militar contra nuestro viejo enemigo del Sur."
 PRC_counter_indian_aggression: "Contrarrestar a la India"
 PRC_counter_indian_aggression_desc: "La cuestión fronteriza entre China y la India tiene una larga historia, y los múltiples conflictos fronterizos de 1962 y posteriormente han convertido esta cuestión en un polvorín que detona la situación en el sur de Asia. Frente a la \"política de avanzada\" de la India, el EPL nunca retrocederá. Aumentaremos el número de tropas desplegadas en la región del Tíbet, adoptaremos una política de ojo por ojo y nunca cederemos ni un centímetro de territorio."
 PRC_anti_japanese_covert_operations: "Operaciones encubiertas antijaponesas"
 PRC_anti_japanese_covert_operations_desc: "Para hacer frente a la amenaza de Japón, un enemigo tradicionalmente poderoso, debemos reforzar nuestro trabajo de inteligencia sobre Japón antes de que estalle un verdadero conflicto militar. Ampliaremos la red de inteligencia secreta del Departamento de Seguridad Nacional en Japón, desarrollaremos más informantes y recopilaremos toda la información valiosa relacionada con la política, el ejército, la economía y otros aspectos de Japón. No sólo eso, también enviaremos más agentes de élite a Japón para establecer contacto con grupos chinos locales, lo que permitirá a Pekín dirigir las actividades de las estaciones de inteligencia de manera más eficiente."
 PRC_build_up_fortifications: "Construir fortificaciones"
 PRC_build_up_fortifications_desc: "El ejército indio no sólo tiene más tropas y armas más pesadas en la zona fronteriza de gran altitud, sino que además no debe subestimarse la amenaza que representan sus tropas de montaña. En caso de que no tengamos una ventaja en fuerza militar, construiremos una línea de defensa completa y una base de suministro logístico detrás de la línea del frente de confrontación y trataremos con el ejército indio con facilidad."
 PRC_expand_border_training: "Expandir la capacitación fronteriza"
 PRC_expand_border_training_desc: "Reforzaremos el entrenamiento de guerra de montaña para las tropas del EPL estacionadas en el Tíbet. Además del entrenamiento tradicional de infantería y combate blindado, el plan de estudios añadirá una serie de contenidos como supervivencia en el campo de meseta y reconocimiento de montaña. No sólo eso, nuestras fuerzas de aviación de élite también serán transferidas al Tíbet para recibir entrenamiento pertinente en combate aéreo de meseta."
 PRC_support_pakistan: "Apoyar a Pakistán"
 PRC_support_pakistan_desc: "Pakistán no sólo es nuestro aliado tradicional, sino también uno de nuestros ayudantes importantes para contener a la India en el conflicto fronterizo. Realizaremos ejercicios militares conjuntos con Pakistán y proporcionaremos al ejército pakistaní armas y equipos más avanzados, como carros de combate principales y aviones de combate de cuarta generación. Estas fuerzas armadas harán del ejército pakistaní un dolor de cabeza para los indios."
 PRC_himalayan_frontier: "Frontera del Himalaya"
 PRC_himalayan_frontier_desc: "India tiene disputas territoriales fronterizas con muchos países locales del sur de Asia, por lo que esta es una gran noticia para nosotros. Intentaremos persuadir a varios países, incluidos Nepal y Bután, para que se unan a IDEA para tratar conjuntamente con la India. Esto formará una red de defensa contra la India en la región, agotando a la India e invirtiendo muchos recursos en la carrera armamentista. Con el tiempo, la India irá perdiendo gradualmente la posibilidad de competir con nosotros, tal como ocurrió con la Unión Soviética durante la Guerra Fría."
 PRC_south_asian_brothers: "Hermanos del Sur de Asia"
 PRC_south_asian_brothers_desc: "En los siglos XIX y XX, China, al igual que muchos países del Sudeste Asiático, sufrió la invasión y colonización de las potencias imperialistas occidentales, y estas naciones lucharon juntas por su libertad e independencia. Al entrar en el siglo XXI, los lazos económicos y culturales de China con estos países se han vuelto más profundos y fuertes. Incorporaremos todo el Sudeste Asiático a nuestro sistema de alianzas sobre la base de las relaciones amistosas tradicionales establecidas en el pasado."
 PRC_revolution_in_myanmar: "Revolución en Birmania"
 PRC_revolution_in_myanmar_desc: "Birmania ha estado plagado de disturbios internos durante muchos años. El Gobierno central era débil e incompetente, lo que permitió que los militares corruptos tomaran el poder. Los feroces conflictos entre distintos grupos étnicos y los años de guerra entre caudillos en diversos lugares han hecho que el pueblo birmano viva en una situación desesperada. Para restablecer la paz y la prosperidad en Birmania, ya no nos quedaremos de brazos cruzados, sino que intervendremos formalmente en el país para ayudar a la población local a lanzar una revolución."
 PRC_coordinate_eadi_militaries: "Coordinar los ejércitos de IDEA"
 PRC_coordinate_eadi_militaries_desc: "En el proceso de intervención en la situación en Birmania, IDEA actuará como un colectivo y las fuerzas de mantenimiento de la paz de varios países se organizarán en un grupo bajo un mando unificado. Construiremos una base de entrenamiento secreta dentro de nuestro país y realizaremos allí ejercicios conjuntos con las tropas de nuestros aliados de IDEA para garantizar que cuando las tropas entren oficialmente en Birmania, podamos familiarizarnos con las tácticas y armas de cada uno y movernos al unísono."
 PRC_masters_of_asia: "Maestros de Asia"
 PRC_masters_of_asia_desc: "Desde el nacimiento de la civilización, el Imperio chino ha reinado como la \"Dinastía Celestial\" en todo el Este Asiático, sirviendo como el centro político, económico y cultural de la región. Los gobernantes de los países vecinos a menudo tenían que venir a China en persona para rendir homenaje al Emperador como muestra de su lealtad. Es una historia de la que muchos nacionalistas chinos están orgullosos hoy en día, y una que pretendemos recrear. Con un ejército fuerte, haremos que nuestros vecinos se arrodillen una vez más."
 PRC_east_rising_west_falling: "Cae Occidente, asciende Oriente"
 PRC_east_rising_west_falling_desc: "Si tuviéramos que utilizar una palabra para resumir la situación mundial actual, \"turbulencia\" sería la palabra más apropiada.\n\nAl otro lado del océano, nuestro viejo rival -el otrora faro de la democracia- se desplomaba en la \"polarización política\" y un sinnúmero de gobiernos caudillos que se consideraban salvadores de Norteamérica se peleaban entre sí por el cadáver de Colombia. En el continente europeo, las relaciones entre la OTAN y Rusia se han deteriorado rápidamente hasta llegar a un punto de congelación. Un lado grita que la libertad no perecerá y promete defender hasta la muerte el último templo de la democracia; El otro lado se ha liberado de las ataduras del pasado y ha prometido recuperar el honor y el territorio perdidos en el pasado. Los dos gigantes tendrán inevitablemente la batalla decisiva final en suelo europeo.\n\nHoy en día, el sistema político dominado por EE.UU. se ha derrumbado por completo. Después de pasar por tormentas e innumerables pruebas, la República Popular China finalmente ha marcado el comienzo de una era en la que puede lograr un Gran Rejuvenecimiento."
 PRC_european_conflict: "¿Conflicto europeo?"
 PRC_european_conflict_desc: "La guerra hace estragos en Europa y la tierra estaba devastada: los tanques rugen, aplastando las carreteras heladas del Mar Negro; Los misiles silban, rompiendo el silencioso cielo nocturno del Ártico. Los campos de girasoles en Ucrania han quedado reducidos a cenizas; Los submarinos nucleares permanecen en el abismo del mar Báltico. El fuego de Prometeo reavivó el mundo, no sólo iluminando el campo de batalla, sino también encendiendo la vela restante de la racionalidad humana. En este momento, ¿debemos dar un paso adelante para apagar las llamas de la guerra o permanecer indiferentes y dejar que el torrente del tiempo lo ahogue todo? La marea de la guerra está aumentando y los cálculos de la gran potencia oriental están en desacuerdo."
 PRC_belt_and_road_initiative: "Ampliar la Iniciativa Franja y Ruta"
 PRC_belt_and_road_initiative_desc: "Las campanas de los camellos resuenan en las arenas amarillas de la nueva Ruta de la Seda, y los barcos de carga transoceánicos marcan el pulso de la nueva era. Lo que estamos construyendo no son sólo carreteras y ferrocarriles, sino también el elemento vital y las reglas de las empresas. La bandera de la amistad se mantiene en alto y el ritmo del mercado se respira en silencio. ¿Quién sembró las semillas del crecimiento económico en el corazón de Eurasia y quién tejió la red del libre comercio para crear un panorama general?\n\nEl mundo exterior debate si la Iniciativa Franja y Ruta es un puente o una trampa, pero nosotros seguimos avanzando."
 PRC_revolution_beyond_the_ocean: "Revolución al otro lado del océano"
 PRC_revolution_beyond_the_ocean_desc: "Al otro lado del Pacífico, el fuego de la revolución socialista ardía en California. Aunque nuestros camaradas norteamericanos allí no comparten las mismas ideas políticas que nosotros, esto no nos impide de ninguna manera tenderles una mano de amistad. \n\nPara dar la bienvenida a esta nueva revolución en el siglo XXI, innumerables armas, municiones y abundantes suministros acompañarán a nuestros asesores militares y empresarios a través del vasto océano para ayudar a camaradas en lugares distantes a encender la antorcha de sus ideales."
 PRC_trade_deals_in_africa: "Acuerdos comerciales en África"
 PRC_trade_deals_in_africa_desc: "Cuando manos de distintos colores de piel se abrazan, nuestra mirada ha ido más allá de las minas y los puertos. Lo que exportamos no es sólo infraestructura y fondos, sino también reglas, estándares y oportunidades. Los recursos de África están fluyendo, y lo que estamos entregando es el volante que cambiará el mapa económico del mundo.\n\nLa gente dice que esto es ayuda, inversión y una comunidad de futuro compartido. Esta cooperación, que no tiene ninguna impronta colonial, está transformando gradualmente el panorama económico mundial."
 PRC_economic_war_with_the_pdto: "Guerra comercial con la OTDP"
 PRC_economic_war_with_the_pdto_desc: "No es fuego de artillería, son órdenes; No es un bloqueo, es una guerra de precios. La línea de montaje de una empresa manufacturera nunca grita eslóganes. Desde textiles hasta chips, desde paneles fotovoltaicos hasta tierras raras, cada contenedor es nuestra arma. Cuando los oponentes intenten rodearnos, utilizaremos \"recursos humanos\" más baratos y una entrega más rápida para crear una brecha. Ellos compran, nosotros no vendemos; Ellos hacen, nosotros también acaparamos el mercado.\n\nLos adversarios querían \"desdepender\", pero descubrieron que el costo de esa disociación era mayor de lo que habían imaginado. ¿Barreras arancelarias y transferencia de cadenas industriales? Que lo intenten, ¿quién puede tolerar mejor la subida de precios y el desempleo? Las piezas atascaban las máquinas, los inventarios sobrecargaban las empresas y nuestras fábricas estaban preparadas."
 PRC_ressonance_from_the_past: "Ecos del pasado"
 PRC_ressonance_from_the_past_desc: "El llamado del internacionalismo es más fuerte que nunca. Cuando la pasión revolucionaria se reavivó en la península de Corea, el EPL cruzó una vez más el río Yalu. Esta tierra ha sido marcada por las huellas de compañeros que lucharon hace décadas, y ahora quedará marcada nuevamente. Las dificultades y adversidades son inevitables, pero la amistad entre nuestros dos países, forjada en la lucha, es la piedra angular de nuestra revolución común. Esto no es sólo una ayuda, sino una manifestación del propio espíritu comunista."
 PRC_operation_peng_dehuai: "OPERACIÓN: §YPENG DEHUAI§!"
 PRC_operation_peng_dehuai_desc: "En la Ofensiva de Segunda Fase, Peng Dehuai destruyó el ataque imperialista y revirtió la situación de la Guerra de Agresión Imperialista. Hoy, el Ejército Popular de Liberación está preparado no sólo para repetir sino para superar su victoria lanzando nuevas campañas en su nombre. ¡Honremos su legado con una lluvia torrencial de ofensas!"
 PRC_operation_chosin_reservoir: "OPERACIÓN: §YLAGO CHANGJIN§!"
 PRC_operation_chosin_reservoir_desc: "Hace décadas, el cielo del lago Changjin fue testigo de la heroica lucha por la revolución. Hoy, el Ejército Popular de Liberación ha regresado con sus aviones de combate como arma decisiva. Frente a un enemigo decidido y a las duras extensiones de la península de Corea, nuestra campaña aérea romperá sus defensas y asegurará la victoria."
 PRC_operation_triangle_hill: "OPERACIÓN: §YTRIANGLE HILL§!"
 PRC_operation_triangle_hill_desc: "La batalla de Triangle Hill se ha convertido en un símbolo de autosacrificio en la historia del Ejército Popular de Voluntarios. En medio del incesante fuego de artillería y los bombardeos enemigos, nuestros soldados se mantuvieron firmes y demostraron su inquebrantable espíritu revolucionario. Hoy, el Ejército Popular de Liberación continúa marchando hacia adelante manteniendo en alto esta bandera. Esta tierra sagrada sigue siendo traicionera, el enemigo aún es poderoso, pero en nombre de esta nueva batalla, ¡superaremos todas las probabilidades y ganaremos!"
 PRC_down_to_earth: "Pies a tierra"
 PRC_down_to_earth_desc: "El rugido de nuestros soldados todavía resuena en el cielo de Corea, pero la marea de la guerra se está desplazando hacia el sur. A medida que aumentan las tensiones en Asia, China debe centrar su atención en nuevos frentes. Debemos hacer todo lo posible, invadir el resto de Asia y expulsar a los lacayos imperialistas. La lucha por la liberación continúa, lo que requiere que nos adaptemos, consolidemos y lancemos nuestras fuerzas a la lucha contra la agresión imperialista."
 PRC_crackdown_on_beijing: "Represión en Pekín"
 PRC_crackdown_on_beijing_desc: ""
 PRC_meltdown: "Colapso"
 PRC_meltdown_desc: ""
 NCM_the_heavens_awaken: "§OLos Cielos despiertan§!"
 NCM_the_heavens_awaken_desc: ""
 PRC_scientists_from_america_idea: "Científicos de EE.UU."
 PRC_socialist_chinese_dream_idea: "Sueño socialista chino"
 PRC_one_heart_idea: "Un corazón"
 PRC_made_in_china_dummy_idea2: "Socialismo con características chinas"
 PRC_Party_Pushback: "Resistencia del PCCh"
 PRC_Party_Pushback_desc: "Aunque el estatus de los reformistas en la política china ha mejorado mucho con el ascenso de Wang Yang a secretario general del PCCh y presidente, sería tonto suponer que todos se alinearán con el nuevo liderazgo. Dentro del Partido, el establishment comunista sigue siendo una fuerza política que no se puede subestimar. Han comenzado a resistirse resueltamente a cualquier reforma que afecte a sus propios intereses y a la estructura fundamental del país, mientras la mayoría del pueblo todavía apoya a dicho establishment. A menos que podamos obtener su aprobación (o mantenerlos en la oscuridad), nuestros esfuerzos probablemente serán en vano."
 PRC_Spectre_of_Death_idea: "Espectro mortal"
 PRC_Spectre_of_Death_idea_desc: "Los archivos de la Plaza de Tiananmen causaron un gran revuelo cuando fueron publicados; Llamarlos una \"bomba mediática\" sería quedarse corto. La gloriosa máscara del Partido Comunista Chino fue brutalmente arrancada en un instante; Con el incidente de Tiananmen de 1989 como detonante, se expusieron al público las innumerables atrocidades cometidas por el PCCh contra aquellos que se atrevieron a mantener opiniones diferentes. El número de miembros del PCCh y el apoyo popular cayeron drásticamente, y estallaron manifestaciones a gran escala contra el statu quo en todo el país; al mismo tiempo, la sociedad apoyó abrumadoramente al presidente Wang y lo elogió como un \"gran pionero de la democracia\"."
 PRC_intra_party_democracy: "Democracia interna del Partido"
 PRC_intra_party_democracy_desc: "Nueva Democracia Socialista - Modelo nepalés"
 PRC_single_party_dictatorship: "Dictadura unipartidaria"
 PRC_single_party_dictatorship_desc: "¿Para qué necesitamos esos partidos?"
 PRC_Blink_the_Eye: "Reorganización del MSE"
 PRC_north_korean_intervention: "Intervención en la guerra de Corea"
 PRC_bombing_raids: "Campaña aérea del EPL"
 PRC_anti_western_proaganda_idea: "Propaganda antioccidental"
 PRC_operation_crimson_sky_idea: "Operación Cielo Carmesí"
 PRC_operation_guan_yu_idea: "Operación Guan Yu"
 PRC_operation_li_jing: "Operación Li Jing"
 PRC_doctrine_of_the_mass_line_idea: "Línea de masas"
 PRC_united_front_of_new_democracy_idea: "Nuevo Frente Unido Democrático"
 PRC_the_separatist_problem: "Cuestión separatista"
 PRC_the_separatist_problem_desc: "El separatismo chino se ha convertido en un problema crónico que preocupa al Gobierno central desde hace muchos años. No solo los uigures en Sinkiang y los lamas en el Tíbet buscan la independencia, sino también la inquieta Región Administrativa Especial de Hong Kong y la \"isla rebelde\" de Taiwán están causando estragos.\n\nEl Gobierno chino ha intentado diversos métodos, desde políticas conciliadoras hasta una dura represión, para lidiar con los separatistas, pero todos han fracasado. Además, la injerencia extranjera también ha complicado los problemas separatistas en diferentes regiones."
 PRC_new_left_workers_strikes_idea: "Huelgas obreras"
 PRC_plan_high_alert: "Armada en alerta máxima"
 PRC_plan_high_alert_desc: ""
 PRC_insufficient_understanding_of_modern_warfare_idea: "Entendimiento anticuado de la guerra"
 PRC_insufficient_understanding_of_modern_warfare_idea_desc: ""
 PRC_new_red_culture_idea: "Nueva Cultura Roja"
 PRC_oil_crash1: "Crisis del petróleo"
 PRC_oil_crash2: "Recuperación leve de la crisis del petróleo"
 PRC_oil_crash3: "Recuperación parcial de la crisis del petróleo"
 PRC_oil_crash4: "Recuperación media de la crisis del petróleo"
 PRC_oil_crash5: "Recuperación casi completa de la crisis del petróleo"
 PRC_made_in_china_new_left_dynamic: "Socialismo con características chinas"
 PRC_made_in_china_idea: "Socialismo con características chinas"
 PRC_made_in_china_dynamic: "Socialismo con características chinas"
 PRC_made_in_china_dynamic_desc: "\n\n\n\n£GFX_PRC_socialism_with_chinese_characteristics_banner\n\n\n\n\n\nLos productos chinos se encuentran en todo el mundo, ya sean electrónicos, teléfonos, electrodomésticos, ropa o incluso alimentos. Todo esto es consecuencia de la colosal industrialización de China en las últimas etapas de la Guerra Fría, con la globalización y la flexibilización de las regulaciones impuestas por el presidente Deng Xiaoping. China se había convertido en la fábrica del mundo, ascendiendo rápidamente hasta convertirse en el mayor exportador de bienes del planeta.\n\nSin embargo, con nuestra prosperidad llegó la reacción de los mercados occidentales proteccionistas, y la etiqueta \"Made in China\" se asoció con productos de baja calidad, pero abundantes, en gran medida debido a la falta de garantía de calidad en nuestras exportaciones industriales. No obstante, en los últimos años, el PCCh ha buscado desviar el enfoque de la economía de la manufactura hacia la innovación de alta tecnología, un proceso que ha conllevado numerosos obstáculos."
 PRC_chinese_enviroment_dynamic: "Medioambiente chino"
 PRC_chinese_enviroment_dynamic_desc: "El rápido crecimiento económico de China también ha generado algunos de los peores problemas de contaminación ambiental de la historia. La erosión del suelo causada por la tala excesiva, la contaminación del aire y el agua causada por la industria pesada, y la amenaza de muchas especies animales debido a la falta de regulación son problemas urgentes que deben abordarse.\n\nDesde la llegada de Xi Jinping al poder, el Gobierno ha introducido varias políticas ambientales radicales, y el propio lema de Xi, \"Las aguas cristalinas y las montañas verdes son tan valiosas como las montañas de oro y plata\", se ha convertido en un lema común. Si bien las severas restricciones a la industria han provocado un crecimiento económico más lento y desempleo, los ambientalistas afirman que estos son sacrificios necesarios.\n\nProgreso actual de la reforma ambiental: [?PRC_enviromental_progress|=+1%]"
 PRC_sino_japanese_computing_race_dynamic: "Competencia informática sino-japonesa"
 PRC_sino_japanese_computing_race_dynamic_desc: "bip bup"

 china.382.t: "Protegiendo China"
 china.382.d: "\"¿Camarada, un cigarrillo?\" Li Zuocheng salió por la puerta y saludó con la mano al soldado que hacía guardia. El soldado no se movió, simplemente saludó con expresión impasible. Li esbozó una pequeña sonrisa y no dijo nada más. Volvió al jardín y apoyó su azada junto al bancal. En realidad no tenía intención de ofrecer un cigarrillo, solo quería confirmar si todavía era, en algún sentido real, una persona.\n\nSus días transcurrían así: por la mañana llegaba un montón de documentos, él los firmaba; al mediodía alguien venía a informarle, él asentía; por la tarde, a veces le pedían que grabara un discurso, él leía el texto tal cual estaba escrito. Ya no hacía preguntas, y nadie le daba la oportunidad de hacerlas. Cada orden seguía llevando su nombre; cada portada llevaba el sello oficial rojo. Pero él sabía que no eran sus decisiones. La mayoría ni siquiera las había leído.\n\nAntes creía que podía rehacer el país. Ya había ganado antes. Había eliminado facciones, erradicado el nepotismo una y otra vez. Pero subestimó la ambición de los generales. No le apoyaban, solo le necesitaban en el frente. Una vez que el ejército no encontró resistencia, una vez que pudieron mover tropas sin aprobación, el \"Presidente\" se convirtió en una figura ceremonial. Se sentaba en el asiento más alto, pero no tenía ni idea de dónde sería la próxima guerra ni dónde se desplegaban las tropas.\n\nSí, el Estado se había vuelto más fuerte, fría y despiadadamente fuerte. Pero esa no era la \"disciplina y orden\" que él había imaginado. Los funcionarios permanecían en silencio, los cuadros seguían órdenes, y todo giraba ahora en torno a las \"decisiones colectivas\" de unos pocos militares. Él mismo se había convertido en solo \"la mano que firma\".\n\nSe agachó y aflojó la tierra. Unos plantones de pimiento no estaban bien. No dijo nada, simplemente arrancó con las uñas las hojas amarillentas. La luz del sol tocó su hombro, suave y cálida. Entendía la realidad. Estaba cansado. Ya no quería luchar. A veces se preguntaba: ¿llegaría el día en que ni siquiera necesitaran su firma? ¿Quedaría solo un sistema vacío, dirigido en la dirección que ellos llamaran \"correcta\"?\n\nEl viento se movió. El guardia de la puerta había cambiado. Un joven nuevo estaba allí, igual de silencioso. Li no dijo nada más. Encendió un cigarrillo, se agachó junto al jardín y miró las filas torcidas de coles que crecían tranquilas en la tierra."
 china.382.a: "Al límite de la paciencia."
 china.383.t: "El Alto Mando del Ejército Solicita Fondos Adicionales"
 china.383.d: "Nuestro Ejército tiene la responsabilidad crucial de salvaguardar las fronteras terrestres de la nación y mantener la seguridad y estabilidad nacional. Sin embargo, con la situación internacional volviéndose cada vez más volátil, la presión sobre la seguridad fronteriza sigue aumentando. La estructura actual de fuerzas del Ejército, el equipamiento y los recursos de entrenamiento están luchando por satisfacer las demandas cambiantes de esta nueva etapa estratégica.\n\nRecientemente, un grupo de altos mandos del Ejército presentó conjuntamente una solicitud formal a la Comisión Militar Central para obtener financiación adicional. Informaron que muchas unidades aún no están equipadas con material moderno, algunas compañías de base enfrentan graves déficits en sus presupuestos de entrenamiento, y las reservas de suministros para la preparación combativa siguen siendo insuficientes, factores que están obstaculizando seriamente la mejora de nuestras capacidades operativas. Especialmente en las direcciones estratégicas suroeste y noroeste, donde persisten infiltraciones externas y provocaciones hostiles, existe una necesidad urgente de reforzar las fortificaciones fronterizas, ampliar la infraestructura de reconocimiento y modernizar los sistemas de potencia de fuego pesada."
 china.383.a: "¡Aprobado!"
 china.383.b: "Necesitamos más deliberaciones sobre este asunto."
 china.384.t: "El Alto Mando de la Armada solicita financiación adicional"
 china.384.d: "Estamos en medio de una transición histórica: de la tierra al mar, de la defensa cercana a la profunda azul. El océano no es solo un amortiguador estratégico, sino la arteria vital del ascenso nacional. Hoy, mientras las tensiones se intensifican en el Pacífico Occidental y las rutas marítimas enfrentan crecientes interrupciones, el papel de la Marina como pilar de la estrategia nacional nunca ha sido más destacado.\n\nRecientemente, varios altos mandos navales presentaron conjuntamente una solicitud urgente de financiación a la dirección central. La solicitud destaca deficiencias críticas en la financiación en áreas clave como despliegues de largo alcance, apoyo a puestos avanzados en islas, mantenimiento de la flota y operaciones de portaaviones. Numerosos proyectos de revisión de buques se han retrasado debido a congelaciones presupuestarias, y el ritmo de construcción de buques de guerra de nueva generación está muy por debajo de las expectativas. Mientras tanto, los países vecinos están acelerando su acumulación marítima, ejerciendo una presión creciente sobre nuestras fuerzas."
 china.384.a: "¡Aprobado!"
 china.384.b: "Necesitamos más deliberaciones sobre este asunto."
 china.385.t: "El Alto Mando de la Fuerza Aérea solicita financiación"
 china.385.d: "La precisión y la velocidad en la guerra moderna dependen cada vez más del dominio en las guerras celestiales: el control del aire se ha convertido en uno de los factores más decisivos para salvaguardar la seguridad nacional. Recientemente, un informe detallado del Alto Mando de la Fuerza Aérea fue presentado al Gobierno central, solicitando formalmente financiación adicional.\n\nSegún el informe, se han identificado varias deficiencias críticas, especialmente en áreas como las operaciones de largo alcance sobre mares abiertos y la coordinación conjunta entre teatros operativos. Entre los problemas específicos más destacados se encuentran la capacidad limitada para desplegar a gran escala modernos aviones de Alerta y Control Aerotransportados (AWACS) y de Guerra Electrónica (EW), así como escuadrones de reabastecimiento aéreo y fuerzas de reacción rápida que aún operan sin un sistema integrado y estructurado. Además, un presupuesto insuficiente ha limitado la capacidad de la Fuerza Aérea para emplear simuladores de vuelo avanzados y aumentar el personal de mantenimiento en tierra, ambos esenciales para mantener un alto nivel de entrenamiento de pilotos y garantizar que las aeronaves estén siempre listas para el combate."
 china.385.a: "Aprobado."
 china.385.b: "Necesitamos más deliberaciones sobre este asunto."
 china.386.t: "Cambio de liderazgo en Sinkiang"
 china.386.d: "Recientemente, según decisiones tomadas por las autoridades centrales, Ma Xingrui, exgobernador de la provincia de Guangdong, sucederá a Chen Quanguo, miembro del Politburó Central, como nuevo secretario del Comité del Partido de la Región Autónoma Uigur de Sinkiang, así como Primer Comisario Político y Primer Secretario del Cuerpo de Producción y Construcción de Sinkiang. Durante una reunión de bienvenida, Chen, junto con representantes del Departamento de Organización Central, presentó a Ma a los funcionarios de Sinkiangy los animó a continuar su trabajo bajo el nuevo liderazgo, aspirando a un éxito aún mayor. Mientras tanto, Chen regresará a Pekín, donde se anunció que asumirá \"otro cargo\".\n\nEste cambio de liderazgo en Sinkiang, justo antes del XX Congreso Nacional del Partido Comunista, ha atraído mucha atención. Como nuevo máximo líder de Sinkiang, se espera que Ma sea elegido para el recién formado Politburó, lo que lo posicionará entre las figuras más influyentes de China. También existe un amplio interés en si este ingeniero aeroespacial convertido en tecnócrata cambiará las controvertidas y estrictas políticas de su predecesor. Estas preguntas quedarán pendientes de respuesta en el futuro."
 china.386.a: "Nuevo liderazgo, nueva dirección."
 china.387.t: "Cambio de liderazgo en el Tíbet"
 china.387.d: "Recientemente, según decisiones tomadas por las autoridades centrales, Wang Junzheng, ex subsecretario del Comité del Partido de la Región Autónoma Uigur de Sinkiang y secretario de la Comisión de Asuntos Políticos y Jurídicos, sucederá a Wu Yingjie como nuevo secretario del Comité del Partido de la Región Autónoma del Tíbet. Durante la reunión de traspaso, Wu, junto con representantes del Departamento de Organización Central, presentó a Wang a los funcionarios tibetanos y los animó a continuar su trabajo bajo el nuevo liderazgo, esforzándose por alcanzar nuevos logros. Wu Yingjie, debido a su edad, se retirará y se espera que asuma un rol más relajado en la APN o la Conferencia Consultiva Política.\n\nEl reemplazo del máximo líder del Tíbet también forma parte de la importante reorganización de personal previa al XX Congreso Nacional del PCCh. Wang, quien cuenta con una amplia experiencia trabajando en regiones fronterizas y está estrechamente vinculado al \"gobierno férreo\" de Sinkiang que condujo a sanciones por parte del Parlamento Europeo, se enfrentará ahora a la tarea de continuar el legado político dejado por Wu, un tibetano nativo. Queda por ver cómo navegará Wang esta transición."
 china.387.a: "Nuevo liderazgo, nueva dirección."
 china.388.t: "Cambio de liderazgo en Mongolia Interior"
 china.388.d: "Recientemente, según decisiones tomadas por las autoridades centrales, Sun Shaocheng, ex Ministro de Asuntos de Veteranos del Consejo de Estado, sucederá a Shi Taifeng como Secretario del Comité del Partido de la Región Autónoma de Mongolia Interior. Durante la reunión de traspaso, Shi, junto con representantes del Departamento de Organización Central, presentó a Sun a los funcionarios de Mongolia Interior y los animó a continuar su trabajo bajo el nuevo liderazgo, esforzándose por alcanzar nuevos logros. Shi Taifeng se incorporará a la Academia China de Ciencias Sociales, donde ocupará los cargos de Presidente y Secretario del Partido.\n\nEl cambio en la cúpula directiva de Mongolia Interior también forma parte de la importante reorganización de personal previa al XX Congreso Nacional del PCCh. Como tecnócrata experimentado que ha ocupado diversos cargos, Sun llega ahora a Mongolia Interior, que ha experimentado una rectificación política tras las firmes medidas anticorrupción de Shi y los esfuerzos por erradicar las ideologías separatistas. Cómo utilizará Sun sus habilidades para gobernar Mongolia Interior es una incógnita que aún queda por responder."
 china.388.a: "Nuevo liderazgo, nueva dirección."
 china.389.t: "Cambio de liderazgo en Ningxia"
 china.389.d: "Recientemente, según decisiones tomadas por las autoridades centrales, Liang Yanshun, ex subsecretario ejecutivo del Comité de Trabajo de los Órganos Centrales y Estatales, sucederá a Chen Run'er como secretario del Comité del Partido de la Región Autónoma Hui de Ningxia. Durante la reunión de traspaso, Chen, junto con representantes del Departamento de Organización Central, presentó a Liang a los funcionarios de Ningxia y los animó a continuar su trabajo bajo el nuevo liderazgo, esforzándose por alcanzar nuevos logros. Debido a su edad, Chen Run'er se retirará y se espera que asuma un rol más relajado en la APN o la Conferencia Consultiva Política.\n\nEl reemplazo del máximo líder de Ningxia también forma parte de la importante reorganización de personal previa al XX Congreso Nacional del PCCh. Liang, considerado representante de los funcionarios locales de los departamentos de investigación ideológica y científica del Partido, cuenta con años de experiencia en personal organizativo y trabajo de propaganda. Queda por ver si su amplia trayectoria le permitirá suceder sin contratiempos a Chen Run'er y gobernar eficazmente Ningxia, conocida como la \"Jiangnan del Norte\"."
 china.389.a: "Nuevo liderazgo, nueva dirección."
 china.390.t: "Cambio de liderazgo en Guangxi"
 china.390.d: "Recientemente, por decisión de las autoridades centrales, Liu Ning, exgobernador de la provincia de Liaoning, reemplazará a Lu Xinshe como secretario del Comité del Partido de la Región Autónoma Zhuang de Guangxi. Durante la reunión de traspaso, Lu, junto con representantes del Departamento de Organización Central, presentó a Liu a los funcionarios de Guangxi y los animó a continuar su trabajo bajo el nuevo liderazgo, con el objetivo de alcanzar nuevos logros. Lu Xinshe, debido a su edad, se retirará y se espera que asuma un rol más relajado en la APN o la Conferencia Consultiva Política.\n\nEl cambio en la cúpula directiva de Guangxi también forma parte de la reorganización de personal, muy esperada, previa al XX Congreso Nacional del PCCh. Liu Ning, reconocido experto en conservación de agua dentro del Partido, ha participado en varios proyectos hídricos importantes, incluyendo el Proyecto de Trasvase de Agua Sur-Norte. También ha gestionado tareas urgentes como la asistencia tras terremotos y el control de inundaciones y sequías. Queda por ver cómo Liu aplicará su experiencia para gobernar esta región autónoma minoritaria del suroeste, rica en agua."
 china.390.a: "Nuevo liderazgo, nueva dirección."
 china.391.t: "Resultados de las elecciones de Hong Kong"
 china.391.d: "Las tan esperadas elecciones para el sexto jefe ejecutivo de la Región Administrativa Especial de Hong Kong han concluido. Tras la turbulencia de 2019 y el inicio de la pandemia de COVID-19 en 2020, estas elecciones transcurrieron con notable calma, con un solo candidato registrado: el ex Secretario Jefe John Lee, quien ganó sin apenas suspense. Como el primer jefe ejecutivo procedente de los servicios disciplinarios desde 1997, la elección de Lee marca el inicio de una nueva era para Hong Kong. Los grupos pro-establishment, que elogian a Lee por su trayectoria en la policía, creen que puede ayudar a sanar las heridas sociales de Hong Kong. Sin embargo, otros temen que esto marque el inicio de una era de política autoritaria, que inevitablemente alineará a Hong Kong con el sistema de partido único de China continental.\n\nDurante su campaña, John Lee hizo hincapié en lemas pragmáticos, comprometiéndose a sacar rápidamente a Hong Kong de la recesión económica y reconectarlo con la economía global. Las autoridades de China continental, a través del Consejo de Estado y la Oficina de Enlace, también han expresado su pleno apoyo a su labor. Queda por ver si Lee podrá cumplir sus promesas en medio del creciente caos mundial y bajo el escrutinio de observadores escépticos y desconfiados."
 china.391.a: "¡Saludos, jefe ejecutivo!"

 PRC_national_peoples_congress_cat: "Asamblea Popular Nacional"
 PRC_national_peoples_congress_cat_desc: "\n\n\n\n\n£GFX_PRC_npc_category_banner\n\n\n\n\n\n\n\nLa §YAsamblea Popular Nacional§! es el principal órgano legislativo de la República Popular China. Según la Constitución china, la APN está estructurada como una legislatura unicameral, con el poder de legislar y supervisar las operaciones del Gobierno, el Tribunal Popular Supremo, los comités especiales, la Fiscalía Popular Suprema, la Comisión Militar Central y elegir a los principales funcionarios del Estado. Si bien muchos han criticado a la institución como un mero adorno, obtener el apoyo de sus 2.980 miembros es vital para aprobar la política gubernamental, especialmente considerando que casi todos los miembros de alto rango del Partido Comunista se sientan dentro de ella. Por lo tanto, §Rasegurar el apoyo de la APN puede verse como asegurar el apoyo del propio Partido.§!\n\n§YRecuerda que cuando una facción llega al poder, la gran influencia de las demás puede crear algunos problemas.§!\n\nNuestro £GFX_approval_rating_texticon  §Yíndice de aprobación§! actual es §Y[?PRC_approval_rating_var|1%]§!\n[PRC_centrist_text]\n[PRC_lib_text]\n[PRC_nat_text]\n[PRC_newleft_text]"

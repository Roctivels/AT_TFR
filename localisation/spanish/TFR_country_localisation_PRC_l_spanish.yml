 china.1500.t: "El campo entra en un nuevo siglo"
 china.1500.d: "Cuando terminó la clase de la tarde, Li Xin cerró su cuaderno, lo metió en su mochila y salió corriendo del aula. De camino a la cafetería, sacó su teléfono y desbloqueó la pantalla. Aparecieron algunos mensajes nuevos de WeChat, enviados por el secretario del pueblo de su ciudad natal en Pingwu, Mianyang, un pariente que solo veía durante el Año Nuevo.\n\n\"Xinxin, ¿cómo va todo en la Universidad de Correos y Telecomunicaciones de Chongqing? Hazme un favor: regístrate en el mini programa 'Chuan Shanzhi' de nuestro pueblo y ayuda a aumentar los números. Échale un vistazo y haznos saber si algo necesita ser arreglado. Cuando tengas tiempo, publica algo positivo [emoji de puño]\". Debajo del mensaje había un enlace a un mini programa de WeChat.\n\nLi Xin se detuvo en los escalones de la cafetería y tocó el enlace. Apareció una interfaz verde, llena de fotos de la vida del pueblo, sesiones de capacitación y anuncios del Gobierno. Usando su número de teléfono y los últimos seis dígitos de su identificación, completó la \"verificación de aldeano\". Después de aceptar la invitación del secretario, apareció una nueva etiqueta debajo de su nombre: \"Aldeana de la aldea de Anguo\".\n\nCuriosa, abrió el \"Foro de Aldeanos\". La última publicación, hecha media hora antes por \"Viejo Zhang del Grupo 3\", incluía una foto: \"La luz en el camino hacia el embalse está apagada de nuevo, Secretario. Está completamente oscuro por la noche, bastante aterrador\". Li Xin actualizó la página. Una nueva respuesta apareció instantáneamente de \"Secretario de la Rama del Partido Zhao Guoqiang\": \"Recibido. He llamado al electricista Lao Li, lo arreglará después de la cena. No se preocupe, Zhang\".\n\nRetrocediendo, tocó la \"Tienda de Puntos\". La pantalla mostraba bocadillos, bebidas y artículos de primera necesidad, cada uno con su propio valor en puntos y reglas: el voluntariado suma 30 puntos, la difamación resta 20 puntos, y así sucesivamente.\n\nJusto cuando estaba a punto de publicar algo, notó que la cafetería ya estaba llena. Li Xin apagó rápidamente su pantalla, metió el teléfono en su bolsillo y se adentró entre la multitud."
 china.1500.a: "El viento hace bastante ruido hoy."
 china.1501.t: "El nuevo Japón y el viejo"
 china.1501.d: "La luz del sol de la tarde se filtraba entre los árboles de Shinjuku Gyoen, proyectando patrones inquietos sobre la taza de café de Ryoko. No muy lejos, los sonidos rítmicos del trabajo resonaban por todo el parque. Un grupo de jóvenes -algunos con brazaletes rojos marcados como \"Voluntarios de la Amistad China-Japón\", otros estudiantes locales- estaban limpiando las ruinas de un pabellón dañado durante los combates. Ryoko tomó un sorbo de su café ligeramente amargo, su mirada se desvió más allá del parque hacia los rascacielos que aún quedaban en la distancia.\n\nSu marido, Masao, había muerto en uno de esos edificios -karoshi, muerte por exceso de trabajo, un término que Japón había dado al mundo con vergüenza. Lo había dado todo a su empresa, ese vasto y despiadado conglomerado. Un soldado de traje, luchó por informes trimestrales y cuota de mercado hasta su último aliento. Tal lealtad insensata, pensó Ryoko, no era diferente de la forma en que había muerto su abuelo.\n\nSu fotografía aún estaba en el altar familiar en la antigua casa de su madre -un soldado cuyos huesos hacía mucho tiempo que se habían convertido en polvo en alguna isla sin nombre del Pacífico. ¿Por qué había muerto? ¿Por un hombre que se hacía llamar un dios encarnado? ¿Por una ilusión llamada la Esfera de Coprosperidad de la Gran Asia Oriental, hilada por el ejército, la yakuza y el capital monopolista?\n\nPara Ryoko, la esencia del viejo Japón nunca había cambiado realmente. Ya fueran los militaristas blandiendo sables, los políticos inclinándose en disculpa, los gánsteres dirigiendo salones de pachinko y burdeles, o los ejecutivos en sus inmaculados trajes, todos eran caras del mismo sistema. Un sistema que exigió que su abuelo muriera por la vanidad de un emperador y que su marido muriera por el beneficio corporativo.\n\nAhora, ese sistema estaba siendo desmantelado a la fuerza. Cada día, las noticias en la televisión traían anuncios de la República Popular: la disolución de los conglomerados monopolísticos, la abolición de las élites hereditarias, la prohibición del juego y las industrias del sexo. En un banco cercano, dos ancianos murmuraban quejándose -Japón, decían, ya no era Japón. Ryoko dejó su taza.\n\nSe preguntó a qué Japón se referían. ¿Al que convirtió a su abuelo en carne de cañón? ¿O al que machacó a su marido hasta convertirlo en mano de obra prescindible?"
 china.1501.a: "Ciertamente no el Japón de hoy."
 china.1502.t: "Ciudadano Kenji"
 china.1502.d: "Kenji se quitó los zapatos en la entrada, colgando su chaqueta de trabajo -que aún conservaba el tenue olor a óxido portuario- sobre su brazo. La casa estaba en silencio. Su esposa, Misako, estaba en la cocina preparando una cena sencilla, con el extractor zumbando suavemente. Su hijo acababa de llegar de la escuela y estaba en su habitación repasando la lección de chino del día siguiente.\n\nKenji no se dirigió al baño. En cambio, cruzó directamente la sala de estar y deslizó la puerta de cristal que daba al pequeño balcón. El cielo nocturno de Fukuoka se extendía ante él. Al otro lado de la bahía de Hakata, el vasto distrito industrial que una vez había brillado con luz ahora solo resplandecía aquí y allá, con unas pocas lámparas de seguridad dispersas -brasas apagadas, sus enormes formas silenciosas en la oscuridad.\n\nEncendió un cigarrillo y dio una calada profunda. Kenji había sido un técnico sénior en esa misma zona de fábricas, responsable de mantener las precisas líneas de producción automatizadas. Pero la guerra había terminado demasiado rápido -tan rápido que nadie tuvo tiempo de reaccionar. En un abrir y cerrar de ojos, llegaron barcos, transportando ingenieros chinos con diferentes uniformes. Desmantelaron las máquinas -las mejores de Alemania, Suecia y el propio Japón-, las empacaron, las izaron y se las llevaron.\n\nAhora, su trabajo era en la oficina de mantenimiento de la Autoridad Portuaria de la República, arreglando tuberías y cableado. El trabajo era bastante fácil, y el salario suficiente para mantener a su familia.\n\nEn la televisión, un presentador de noticias hablaba en un japonés ligeramente acentuado, informando sobre un nuevo acuerdo comercial entre la República Popular de Kyushu y la República Socialista de Shikoku. En cuanto a la palabra \"Japón\", para su hijo, casi se había convertido en nada más que un nombre encontrado en viejos atlas. Quizás, para cuando su generación desapareciera, Japón sería un término puramente geográfico.\n\nKenji no guardaba resentimiento. El destino, para la gente común, era como un tifón pasajero -solo podías inclinar la cabeza, aferrarte a los que estaban a tu lado y esperar a que pasara. No tenías control sobre dónde se llevaría tu techo. Las enormes máquinas que una vez habían dominado la vida se habían ido, pero la vida misma -la máquina más antigua, lenta y obstinada de todas- seguía girando. Su hijo todavía tenía escuela. Su esposa todavía tenía que comprar víveres. Él todavía tenía trabajo que hacer.\n\n\"Kenji, la cena está lista\", llamó Misako desde la cocina."
 china.1502.a: "\"Ya voy\", dijo, apagando la última brasa."
 china.1503.t: "Cuestión del santuario Yasukuni"
 china.1503.d: "A medida que la estabilidad regresaba gradualmente a Japón y el orden social comenzaba a reconstruirse, un problema -más complejo que la ocupación militar o la reconstrucción política- confrontó a las autoridades:\n\n¿Qué hacer con el santuario Yasukuni? Durante décadas, el santuario había sido un símbolo del militarismo japonés, y su sola existencia era vista como una provocación abierta a los pueblos de Asia. Dentro del Partido, las opiniones divergían bruscamente sobre cómo debía manejarse.\n\nLa primera propuesta pedía la demolición completa. El santuario Yasukuni, argumentaban, era un remanente maligno del militarismo, que negaba la responsabilidad de Japón por su agresión y atrocidades en toda Asia, y rechazaba fundamentalmente la justicia de los veredictos de posguerra. Preservar tal símbolo de negación histórica en cualquier forma sería una profanación de la paz. Solo demoliéndolo por completo, sostenían, podrían erradicarse de una vez por todas las raíces ideológicas del resurgimiento militarista.\n\nLa segunda propuesta sostenía que la simple demolición no borraría la historia y, en cambio, podría proporcionar munición a los remanentes nacionalistas en un Museo Conmemorativo de la Paz, un lugar para exponer cómo el militarismo japonés no solo había infligido un sufrimiento incalculable a los pueblos de Asia, sino que también había perseguido brutalmente a los propios progresistas y fuerzas de izquierda de Japón. Debería conmemorar los movimientos democráticos y antimilitaristas de Japón, honrando a figuras como Saito Takao, Tokuda Kyuichi y Kotoku Shusui, aquellos que se atrevieron a oponerse al fascismo y al militarismo.\n\nLa tercera propuesta argumentaba que el santuario debería convertirse en un Museo de Crímenes Militaristas Japoneses. La demolición o la conversión en parque, sostenían, corría el riesgo de diluir su significado y culpa originales. El enfoque más efectivo, argumentaban, sería preservarlo en su lugar, convirtiéndolo en una exposición permanente que documentara sistemáticamente, con pruebas irrefutables, los crímenes cometidos por el militarismo japonés contra los pueblos de Asia, desde el pasado hasta el presente. Serviría como una advertencia eterna para las futuras generaciones de Japón.\n\nActualmente, las tres propuestas, marcadamente diferentes, han sido presentadas al Politburó Central para su deliberación..."
 china.1503.a: "La primera propuesta parece preferible."
 china.1503.b: "La segunda propuesta parece preferible."
 china.1503.c: "La tercera propuesta parece preferible."
 china.1504.t: "La dinastía del Crisantemo"
 china.1504.d: "Al final de la Segunda Guerra Mundial, los Aliados debatieron cómo tratar al Emperador Hirohito y su responsabilidad en la guerra. Finalmente, con el propósito pragmático de estabilizar rápidamente la situación, Hirohito fue despojado de su estatus de deidad viviente y emitió la \"Declaración de Humanidad\". Sin embargo, fue mantenido como una figura simbólica.\n\nAhora, con la decisión tomada en principio de abolir la institución imperial y disolver la casa imperial, se han presentado tres propuestas distintas dentro del Partido sobre cómo tratar al actual emperador y su familia:\n\nPrimera propuesta: Este plan, inspirado en el modelo utilizado para Puyi, sugiere que el emperador y su familia deben someterse a una reeducación exhaustiva. Serían enviados a instituciones de custodia designadas para un estudio histórico prolongado, reforma laboral y entrenamiento ideológico. El objetivo es transformarlos en ciudadanos comunes autosuficientes que comprendan profundamente los crímenes históricos cometidos por el sistema imperial, tanto contra los pueblos de Asia como contra el propio pueblo japonés.\n\nSegunda propuesta: Esta visión argumenta que el sistema imperial sirvió como la base ideológica para el resurgimiento militarista japonés y la guerra misma. Como el más alto y su familia deben ser entregados a un tribunal militar para un juicio público, para enfrentar la rendición de cuentas por las políticas expansionistas que comenzaron con la Restauración Meiji.\n\nTercera propuesta: Los defensores de esta opción advierten que cualquier juicio o proceso de reeducación corre el riesgo de ser explotado por fuerzas nacionalistas japonesas residuales, que podrían convertir al emperador y su familia en mártires. El curso más seguro, argumentan, es despojar a la familia imperial de su estatus real, ciudadanía japonesa y todas las propiedades imperiales, y expulsar permanentemente a toda la familia del país. Vivirían sus vidas como ciudadanos privados, bajo estricta vigilancia."
 china.1504.a: "Enviarlos a prisión para reeducación."
 china.1504.b: "Deben rendir cuentas por la guerra."
 china.1504.c: "Expulsarlos."
 china.1505.t: "Gato perdido"
 china.1505.d: "Tokio, ocho meses después de la guerra. Yagami Takayuki seguía despertándose temprano todos los días, igual que antes. Al fin y al cabo, el sofá de la Agencia de Detectives Yagami nunca garantizaba una buena noche de sueño. Bajó las escaleras y la televisión en la entrada de la tienda de conveniencia volvía a repetir las noticias sobre las nuevas políticas:\n\n\"Disolver los zaibatsu, prohibir el juego, reorganizar los grupos yakuza...\" \"Incluso los sindicatos se han reagrupado como empresas de construcción. Si el Clan Tojo todavía existiera, probablemente estarían vendiendo hormigón\", pensó Yagami.\n\nLas calles parecían nuevas, pero el aire aún conservaba el olor a quemado de la guerra. Obras y reparaciones de carreteras, todo le recordaba que esta ciudad acababa de sobrevivir a brutales combates. Su agencia también luchaba por sobrevivir en este Tokio de posguerra. Después de medio año bajo administración militar china, la ciudad había sido devuelta, pero se había vuelto \"extraña\". Habían desaparecido los casos peligrosos relacionados con el crimen organizado; cualquier cosa que insinuara la participación de la yakuza se había esfumado.\n\nEn estos días, solo recibía el mismo tipo de casos: una abuela preocupada por un nieto que simplemente llegaba tarde de su trabajo a tiempo parcial; un cónyuge que sospechaba infidelidad cuando el otro solo estaba planeando una sorpresa para ellos; y gatos perdidos, que casi siempre encontraban el camino a casa antes que sus dueños. Yagami se dio cuenta de que nada había cambiado realmente. Sus casos antes de la guerra eran exactamente los mismos que ahora, excepto por la falta de casos relacionados con la yakuza.\n\nDespués de terminar el desayuno, regresó a la agencia. Hoy no fue una excepción. Una tímida estudiante de secundaria estaba nerviosa en la entrada. \"Um... ¿es usted el señor Yagami? Yo... ¡me gustaría pedirle que encuentre un gato!\" Sostuvo una foto de un gato atigrado naranja y regordete. Un gato. Por supuesto.\n\n\"¿Cuál es el nombre?\" \"Taisho\", pero normalmente lo llamamos \"Viejo Taisho\". Mi padre... murió en la guerra. Desde entonces, el abuelo apenas habla. Dice que el Viejo Taisho es el último \"hombre\" de nuestra familia. Si el gato también desaparece... podría no soportarlo\".\n\nYagami se quedó inmóvil por un segundo, luego tomó la foto y aceptó el caso. Una vez más, salió a buscar al gato. Pasó por torres recién reparadas, carreteras recién pavimentadas y callejones donde ya no acechaban grupos yakuza."
 china.1505.a: "La guerra cambió algunas cosas para bien, otras para mal. Pero, al menos, las cosas no están tan mal."
 china.1506.t: "La Pequeña Cantón del Hemisferio Sur"
 china.1506.d: "La vibración del martillo neumático finalmente cesó. Huang Kairui soltó el mango, dejando que la pesada máquina descansara sobre la acera destrozada. Se quitó las gafas, se limpió el sudor y el polvo de la cara, cogió su botella de agua y se sentó en un bordillo recién colocado, resultado del trabajo de su equipo el día anterior.\n\nLos peatones pasaban apresurados, con la cabeza baja, los ojos pegados a sus teléfonos. Todo parecía haber vuelto a la normalidad, como si la guerra nunca hubiera ocurrido. Recordó cuando llegó la noticia de que Taiwán había caído en manos del EPL. En ABC, los presentadores describieron al ejército chino como bárbaros invadiendo el mundo civilizado, soldados sin alma sacados de las novelas de Orwell.\n\nUn anciano miró el uniforme de Huang, los caracteres chinos impresos en su pecho, y murmuró a su compañero: \"...dictadura...\". Huang desenroscó su botella y bebió profundamente. Recordó la vida durante los días de \"libertad\": interminables charlas sobre la inflación, salarios estancados, aumento de las facturas de electricidad y la constante ansiedad por la delincuencia callejera que nadie resolvía.\n\nAhora, las bandas juveniles que surgieron durante el caos de la guerra, los vagabundos aborígenes y los saqueadores de ultraderecha habían desaparecido. Las patrullas del EPL restauraron el orden en solo una semana, y las empresas chinas estaban tendiendo cables de fibra y reconstruyendo ferrocarriles a una velocidad que ninguna empresa local había igualado.\n\nMientras sus pensamientos divagaban, un vehículo blindado camuflado de la ADF pasó, sus soldados mirando fijamente por las ventanas. Huang había oído que sus deberes ahora se limitaban a mantener el orden público y ayudar al EPL a limpiar de bandidos el interior. Quizás eso era lo mejor, pensó. Al menos el gobierno ya no malgastaba el dinero de los contribuyentes en hardware militar obsoleto y sin sentido."
 china.1506.a: "¡Recuerda conseguir una tarjeta del Bank of China!"
 china.1507.t: "Montañas sobre montañas, aguas sobre aguas"
 china.1507.d: "El señor Nguyen tamborileó ligeramente con el dedo en el costado de su vaso. El hielo se había derretido hacía mucho tiempo. Todas las tardes, se sentaba en esta antigua casa de té junto al lago Hoan Kiem. Era el mejor asiento de la casa, perfecto para ver pasar a la gente. La multitud en la calle se había vuelto más diversa que nunca: ingenieros chinos hablando mandarín, hombres de negocios negociando tratos e incluso trabajadores camboyanos de piel oscura. Todos se apresuraban, sin diferencia de los lugareños de Hanói.\n\nTomó un pequeño sorbo del amargo té helado, y sus pensamientos se remontaron a años anteriores, cuando los generales del Ejército Popular controlaban bancos y telecomunicaciones, actuando más como capitalistas que como soldados. En el Sur, las élites financieras de Ciudad Ho Chi Minh drenaban la riqueza de la nación a través de esquemas inmobiliarios y manipulación de acciones. ¿Y las calles de Hanói? En aquel entonces, la policía y los vendedores ambulantes se perseguían todos los días en el caos.\n\nPero una vez que llegaron los camaradas chinos, todo cambió. El señor Nguyen no sabía qué había sucedido exactamente dentro del Comité Central; solo sabía que los letreros de las corporaciones militares desaparecieron de la noche a la mañana, los magnates que habían gobernado Saigón fueron auditados y sus rascacielos nacionalizados, e incluso los vendedores ambulantes fueron reubicados en nuevos mercados estatales.\n\nA veces veía a los exiliados en línea, esos restos del antiguo Vietnam del Sur gritando desde Brasil o Argentina. Lanzaban las palabras más feas, llamando al Gobierno de Hanói \"fascista\", \"totalitario\". ¿Qué sabían esos payasos? El Vietnam \"libre\" que anhelaban había sido invadido por pandillas, corrupción y desesperación. La supuesta dictadura que condenaban había traído ferrocarriles de alta velocidad que se extendían por toda la nación, más inversión y fábricas que nunca, y un nivel de prosperidad que la gente común nunca había conocido.\n\nTerminó la última gota de té en su vaso. En cuanto a si todo esto era correcto o incorrecto, o adónde llevaría el futuro, eso lo decidiría la historia. Él era simplemente un anciano, sentado junto al lago, bebiendo su té."
 china.1507.a: "La amistad sino-vietnamita perdurará para siempre."
 china.1508.t: "La bandera de cinco estrellas y la de una sola"
 china.1508.d: "Con la ayuda de IDEA, las redes de lucro profundamente arraigadas dentro del Ejército Popular de Vietnam fueron desmanteladas en menos de un mes, y todos los activos fueron nacionalizados. Luego vinieron los oligarcas financieros e inmobiliarios que casi habían agotado la economía del sur; sus propiedades fueron congeladas y sus corporaciones liquidadas sistemáticamente.\n\nEn las Tierras Altas Centrales y las montañas fronterizas, las milicias separatistas que habían intentado aprovechar el caos de la guerra fueron erradicadas rápidamente. Incluso en Hanói, donde los vendedores ambulantes sin licencia habían sido considerados durante mucho tiempo una plaga urbana crónica, el problema se resolvió de una vez por todas. Las calles de la capital recuperaron su calma y orden.\n\nPero para Lam, un estudiante universitario, esa calma no se extendía a internet. Como de costumbre, abrió su portátil y las coloridas luces de fondo de su teclado cobraron vida. Unos pocos clics después, apareció la familiar interfaz azul del foro VOZ.\n\nFue directamente a la sección \"F33\". Fijado en la parte superior había un hilo en rojo: \"La liquidación del Grupo Vin ha comenzado - El fin de la era de Pham Nhat Vuong\".\n\nLas respuestas eran acaloradas. Un usuario escribió: \"¡La economía del sur está muerta! ¡Están destruyendo todo lo que construimos! Esto es un saqueo, ¡quieren arrastrarnos a todos de vuelta a la pobreza!\".\n\nLam comenzó a escribir: \"¿'Economía del sur'? ¿Te refieres a esa burbuja construida sobre la especulación? Tu 'héroe' Pham Nhat Vuong disparó los precios de la vivienda con sus juegos y dejó a todos endeudados. Era un intermediario y un jugador, nada más. Ahora que el casino ha cerrado, ¿no puedes soportarlo?\".\n\nTan pronto como pulsó \"Publicar\", apareció una notificación en la esquina de la pantalla: alguien había citado su respuesta. \"Esclavo Han\".\n\nLam sonrió levemente y escribió más rápido: \"¿Esclavo Han? Mejor eso que ser un lacayo colonial. Ustedes, los sureños, no tienen derecho a despreciar a la nación. Tu abuelo lustraba botas francesas, tu padre guiaba tropas estadounidenses, y tú, bueno, tú sirves al capital japonés\"."
 china.1508.a: "Otro hermoso día."
 china.1509.t: "Amigos de lejos"
 china.1509.d: "Ma Yilong estudió al hombre sentado frente a él: un indio alto y delgado llamado Kishan, líder de la delegación guerrillera.\n\n\"Camarada Ma\", dijo Kishan con un chino muy acentuado, \"le agradecemos que haya organizado esta reunión\".\n\n\"Es usted demasiado educado, camarada Kishan\". Ma Yilong deslizó una hoja de papel por la mesa. \"Vayamos al grano. La medicina que solicitó está lista. También hemos confiscado un lote de grano que se le puede entregar\".\n\nKishan miró la lista, pero no la recogió de inmediato. \"Hace dos semanas\", comenzó con calma, \"un mensajero del gobierno de Indore vino a reunirse con nuestro Comité Central. Prometió que si seguíamos hostigando su base logística, reconocería nuestro liderazgo\".\n\n\"Después celebramos un tribunal público\", continuó Kishan, con un tono tan tranquilo como si describiera una tarea rutinaria. \"El mensajero fue ejecutado ante el pueblo. Nunca haremos tratos con enemigos de clase\".\n\n\"Elogiamos su postura\", dijo Ma. Solo entonces Kishan tomó la lista. \"Estamos agradecidos por la medicina y el grano\", dijo. \"Pero también necesitamos armas\".\n\n\"Armas...\" Ma dudó. \"Camarada Kishan, confío en que comprende nuestra posición. Nuestras tropas están aquí para salvaguardar la estabilidad en el Tíbet...\"\n\n\"Entendemos\", respondió Kishan, mirando fijamente a Ma. \"Pero las armas que le quitaron a los bandidos deben tener un destino\".\n\nMa sonrió levemente. \"Eso es bastante cierto. Los rifles capturados, junto con su munición, es lo mejor que podemos ofrecer\". \"Trato hecho\".\n\n\"Por cierto, camarada Kishan\", Ma se recostó ligeramente, \"tengo curiosidad por algo. Usted insiste en que el camino parlamentario es una traición total. En el contexto actual, ¿no es eso un poco demasiado rígido?\"\n\nKishan lo interrumpió antes de que pudiera terminar. \"Camarada Ma, debe entender que cualquier intento de compromiso con este sistema capitalista en decadencia solo terminará siendo consumido por él\". Ma se dio cuenta inmediatamente de que se había excedido; había intentado juzgar a un partido revolucionario a través de la lente de uno gobernante.\n\n\"Camarada Kishan\", dijo, sentándose derecho, \"tiene razón. Me disculpo por mis palabras. Usted tiene su propia lucha; no tengo derecho a juzgar\".\n\nLa expresión de Kishan se suavizó. Asintió. \"Nos alegra haber llegado a un entendimiento\"."
 china.1509.a: "No sin alegría."
 china.1510.t: "Calor sureño"
 china.1510.d: "El aire acondicionado del aeropuerto probablemente había sido destrozado durante la guerra y nunca reparado. En el momento en que Wu Mingzhe salió de la puerta de aduanas, una ola de aire húmedo -espeso con el olor a cigarrillos de clavo y moho- lo golpeó. Había volado desde Kaohsiung, y aunque se consideraba acostumbrado al calor, el abrazo de Yakarta empapó la parte trasera de su camisa limpia en cuestión de minutos. Abriéndose paso entre la multitud, rápidamente divisó al hombre que sostenía un cartel con su nombre.\n\n\"Señor Wu, soy A Mao. El parque industrial me envió a recogerlo\". El joven y delgado chino tomó la maleta de Wu con facilidad. Afuera, el calor era aún más implacable. A Mao lo llevó a un reluciente BYD Han nuevo, abrió la puerta trasera y Wu se metió dentro. Una ráfaga de aire frío potente lo envolvió. \"Esto sí\", exhaló, \"es lo que yo llamo un aire acondicionado\".\n\n\"Por supuesto, señor Wu. El parque acaba de cambiar toda la flota\", dijo A Mao, arrancando el coche. Se deslizó silenciosamente fuera del estacionamiento. \"Todos los vehículos eléctricos aquí son chinos ahora. Las estaciones de carga están apareciendo por todas partes, y la energía es barata\".\n\nWu miró por la ventana. Aquí y allá se alzaban los esqueletos ennegrecidos de edificios que quedaron de la lucha, pero mucho más comunes eran vastas obras de construcción cubiertas con pancartas chinas e indonesias. A lo largo de la carretera, vallas publicitarias de OPPO y Gome Electric pasaban rápidamente. \"Yakarta parece una gran zona de construcción\", comentó Wu.\n\n\"¿Verdad?\" A Mao señaló una fila de altos pilones grises que se elevaban. \"La extensión del tren de alta velocidad Yakarta-Bandung. Una vez que llegó el nuevo Gobierno, China Railway se hizo cargo; dicen que llegarán a Surabaya en tres años. Antes, solo la adquisición de tierras se habría prolongado durante una década\". \"Los lugareños... ¿no tienen objeciones?\"\n\nA Mao resopló. \"¿A qué pueden objetar? No olvides que el EPL todavía está estacionado aquí. Además, el nuevo Gobierno les paga por trabajar. Aunque\", añadió con una leve sonrisa, \"no han cambiado mucho, se relajarán siempre que puedan. Nuestro parque preferiría pagar extra para traer trabajadores de Vietnam que depender de ellos\"."
 china.1510.a: "No se si aún necesito traer dinero para el café."
 china.1511.t: "El vigilante solitario"
 china.1511.d: "El salón de banquetes vibraba con calidez y ruido: vítores, risas y el ritmo constante de copas tintineantes. Los generales, con los rostros enrojecidos por el triunfo, brindaron por su victoria completa: la reunificación de la patria y el aplastamiento de la alianza reaccionaria japonés-india, junto con sus camaradas chinos.\n\nKim Jong-un se movió entre la multitud, copa de vino en mano, y abrió silenciosamente las pesadas puertas de cristal que daban al balcón. El aire nocturno de Pionyang traía un ligero escalofrío, interrumpiendo la juerga detrás de él. Estaba solo, muy por encima de la ciudad que había heredado, y por la que había apostado todo.\n\nEn ambas orillas del río Taedong, las extrañas siluetas de la calle de los Científicos de Mirae y los nuevos rascacielos de la calle Willow trazaban un brillante horizonte contra la oscuridad. Los barrios que antes se sumían en apagones por falta de energía ahora brillaban con hileras de luz constantes e interminables. Los dividendos de la reunificación -y la vasta ayuda del aliado del norte- habían comenzado a reponer las venas hambrientas de la ciudad.\n\nPensó en los años que pasó caminando por la cuerda floja. Siempre había conocido el sufrimiento de su pueblo; siempre había conocido las traiciones que se escondían en la oscuridad. Había pasado media vida forjando un escudo inquebrantable para esta nación y su gente. Pero el escudo era pesado, tan pesado que exigía hambre, paciencia y sacrificio de aquellos a quienes estaba destinado a proteger. Casi había aplastado a todos debajo de él.\n\nEra un vigilante solitario que custodiaba una lámpara parpadeante en una tormenta. Sin embargo, ahora, el sol había salido, y nunca más se pondría. Las nubes que habían cubierto la península durante setenta años se habían ido. Por fin, pudo soltar el timón, el que sus dedos habían apretado hasta que sangraron. Quizás la historia siempre vincularía el nombre de Kim Jong-un con la crueldad y el aislamiento. Que así sea. Ahora, pasaría lo que le quedaba de vida reconstruyendo esta tierra marcada y en proceso de curación.\n\nRespiró hondo y lentamente. Detrás de él, las puertas del salón de banquetes se abrieron una vez más..."
 china.1511.a: "Pero no se dio la vuelta. Quería contemplar la luz un poco más."
 china.1512.t: "Servidor del pueblo"
 china.1512.d: "El avión estatal se detuvo por completo. La escalerilla se alineó y una alfombra roja se extendió desde la puerta de la cabina hasta la caravana de vehículos que esperaba. No hubo una gran ceremonia de bienvenida, solo un único camarada de alto rango del Comité Central esperando al pie de la escalinata. Un apretón de manos firme, unas breves palabras de saludo.\n\nCuando la puerta de la limusina negra Hongqi se cerró, el mundo exterior desapareció. Las motocicletas de escolta abrieron el camino, y la caravana se incorporó sin problemas a la autopista en dirección al centro de la ciudad. Durante todo el trayecto, la mirada de Kim Jong-un permaneció fija en la vista más allá del cristal tintado. Pekín, la capital del vasto vecino del norte.\n\nEl convoy pasó la Tercera Ronda y entró en el distrito central de negocios. Torres de cristal y acero perforaban el cielo con una confianza abrumadora. El tráfico fluía incesantemente abajo; los escaparates brillaban con productos que su propia gente apenas podía imaginar; los peatones cruzaban amplias calles, sus rostros serenos, su paso sin prisas, como si la brutal guerra que había envuelto la mitad del Pacífico no fuera más que una perturbación lejana.\n\nSin embargo, él había sido quien había ganado esa guerra. Había cumplido el juramento de su abuelo y su padre: izar la bandera de la República en toda la península. Pero el precio había sido casi todo. La península yacía en ruinas. Los escombros de Seúl aún estaban siendo retirados; el puerto de Haeju estaba silencioso y sin vida; millones de refugiados habían cruzado el Yalu, buscando seguridad en los campamentos de reasentamiento del noreste de China.\n\nAhora, era el líder de setenta millones de coreanos, desde los picos nevados del monte Paektu hasta los naranjales de la isla de Jeju, setenta millones de ojos esperando que él conjurara alimentos, electricidad y un futuro de las cenizas de la victoria.\n\nLa limusina disminuyó la velocidad y entró en un solemne recinto rodeado de muros rojos. El coche se detuvo.\n\nKim Jong-un se ajustó la chaqueta, alisando un pliegue en la solapa."
 china.1512.a: "Era hora de presentarse al servicio."
 china.1513.t: "Un brote sobre cenizas"
 china.1513.d: "Karachi, que alguna vez fue una metrópolis vibrante, se había convertido en un páramo de hormigón destrozado y varillas retorcidas. Los vivos se arrastraban como fantasmas entre los escombros, los gritos y alaridos rápidamente dando paso a un silencio ensordecedor. Barisa y su padre habían sobrevivido por un cruel giro del destino, salvados de la explosión porque habían salido a recolectar raciones. Su madre y sus dos hermanos menores, sin embargo, se perdieron.\n\nEl colapso total del orden -desde el cierre de la infraestructura hasta el derrumbe del Gobierno- sumió a la ciudad en el caos. Barisa y muchos otros se refugiaron en una escuela parcialmente derrumbada, protegiéndose de la lluvia radiactiva y de los bandidos merodeadores. La cataclísmica agitación llevó a algunos a la locura, sus gritos frenéticos cortando el aire. Los niños que habían perdido a sus familias se acurrucaban en las esquinas, sollozando en silencio. La mayoría de la gente estaba callada y entumecida, meras cáscaras de las personas que alguna vez fueron, habiendo perdido toda voluntad de sobrevivir.\n\nUn día, vehículos militares retumbaron en la plaza frente a la escuela. Figuras con trajes protectores blancos desembarcaron. Barisa, que había subsistido solo con agua fangosa durante días, estaba demasiado débil para siquiera considerar sus intenciones. En medio de su aturdimiento, una sola palabra fuerte atravesó el silencio del refugio: \"¡Suministros!\".\n\nLos chinos trajeron comida, agua limpia, suministros médicos y, lo más importante, un genuino rayo de esperanza. Siguiendo las instrucciones del intérprete, los refugiados fueron cargados en camiones por lotes y llevados a un gran campamento de refugiados. El ejército chino había asumido las tareas de socorro en casos de desastre y mantenimiento de la paz del colapsado Gobierno pakistaní. A Barisa y a su padre se les asignó su propia tienda, que contenía dos camas y una estufa sencilla. Tiendas idénticas se extendían en filas ordenadas, desapareciendo en el horizonte.\n\nAquí, Barisa ya no tenía que temer las depredaciones de los bandidos. Mientras comía las gachas humeantes, todas las emociones que había reprimido durante tanto tiempo estallaron, y las lágrimas corrieron incontrolablemente por sus mejillas. La guerra le había quitado a su familia y destruido su hogar, pero la llegada del ejército chino había plantado una semilla de esperanza en los corazones de los refugiados desesperados, una semilla que algún día florecería en esta tierra devastada."
 china.1513.a: "La luz de la esperanza atraviesa la noche sin estrellas."
 china.1514.t: "El tren a la primavera"
 china.1514.d: "Desde la boca del mar de Bohai, el viento del este llevó las mareas de la primavera hasta los mares del sur, trazando un delgado arco de riel en el mapa, que se extendía desde la capital del norte hasta el ecuador. En la sala de conferencias de Beijing, no hubo vítores ni declaraciones audaces, solo un plano ferroviario que se doblaba y desdoblaba una y otra vez.\n\nLa Comisión Nacional de Desarrollo y Reforma y el Ministerio de Transporte habían resuelto extender la red ferroviaria de alta velocidad existente hacia el sur; las líneas Pekín-Cantón y Shanghái-Kunming compartirían la carga del norte, mientras que la pronunciada curva de la ruta Shanghái-Kunming hacia Yunnan sería refinada. Algunas de las principales terminales del suroeste perdieron silenciosamente su título de \"fin de línea\" y adoptaron uno nuevo: \"punto medio\".\n\nLas nuevas estaciones transfronterizas eran modestas, con letreros bilingües discretos. Dentro de los depósitos de mantenimiento, trenes de diferentes anchos de vía descansaban uno al lado del otro; la transición del ancho de vía era tan fluida como un sastre cambiando de hilo, tan fina que un ojo inexperto apenas podía detectar la costura.\n\nDurante la última prueba de línea completa antes de la apertura, un tren partió de la capital del norte, atravesando acantilados y terrazas, deslizándose sobre picos de piedra caliza y mesetas de tierra roja. Por la noche, bajo hebras de lluvia tropical, hizo sonar su silbato suavemente, un minuto de silencio por las cicatrices a lo largo de su camino.\n\nEn la mañana del viaje inaugural, entre los primeros pasajeros se encontraba una familia de tres, que viajaba desde la capital del norte hasta el ecuador. El padre cerró sus archivos de proyectos olvidados hace mucho tiempo y finalmente se permitió unas vacaciones pospuestas. La madre, en la sala de espera, puso la batería en su vieja cámara, queriendo capturar cada paisaje, cada rostro a lo largo del camino.\n\nEl tren cruzó montañas, atravesó los estrechos, y cuando llegó a su última parada, no hubo clamor. Los ramos se sostenían a la misma altura. El conductor bajó su gorra una pulgada, una pulgada que significaba respeto.\n\nAunque la historia los había dejado pasar de largo una vez, ahora se encontraban de nuevo en el andén, con cortesía, con calma. Y cuando el primer canto de los pájaros de la mañana se elevó, de norte a sur, este ferrocarril los unió de nuevo."
 china.1514.a: "Los hermanos de Asia, separados por el mar, se abrazan de nuevo."
 china.1515.t: "La brisa marina permanece"
 china.1515.d: "El aire matutino en Raffles Place todavía traía el sabor a sal del mar. En el vestíbulo de Temasek, la antigua placa estaba suavemente velada bajo una tela negra. Cuando terminó la conferencia de prensa, solo un titular permanecía en la sala: \"Esto no es desmantelar, es recablear\".\n\nNo hubo fuegos artificiales, ni eslóganes. El Comité de Activos del Estado estaba reconfigurando la red de una ciudad antigua: Temasek, una vez el operador omnipresente, ahora retrocedía al cuadro de distribución. Gestionaría el circuito maestro, observaría el flujo y calibraría los medidores.\n\nSus subsidiarias, como circuitos independientes, brillarían por sí mismas, aisladas, equilibradas, pero todas conectadas por una línea. Entre las nuevas plataformas, se podían pedir fondos prestados pero no garantizados; la empresa matriz actuaba simplemente como un cortafuegos y prestamista de última instancia.\n\nEn la multitud matutina del ascensor, un joven de la línea del puerto llevaba un casco en la espalda. \"Nosotros manejamos los barcos, no el viento\", le explicó a un tío a su lado. \"El viento pertenece al Fondo de Transformación\". El tío asintió, agarrando un folleto comunitario que anunciaba el nuevo canal de inversión de CPF, la letra más grande que los anuncios de las paradas de tren. En un puesto de bocadillos durante el almuerzo, la tía que vendía tostadas kaya había puesto un alegre cartelito: \"Especial de hoy: dividendos sin azúcar, divulgaciones a doble espacio\".\n\nLa lluvia de la tarde llegó rápidamente y se fue igual de rápido. El Comité retiró la última pieza de tela negra; el nuevo letrero se reveló con tranquila moderación. Un consultor de ingeniería local y un especialista en semiconductores de Shanghái estaban uno al lado del otro en el pasillo, mirando hacia el mar. Hablaron de sus hijos: uno preparando un proyecto de feria de ciencias en una escuela en Yishun, el otro terminando un ensayo sobre \"huellas de carbono\" en Pudong.\n\nEntre sus risas, parecía que ambos escuchaban el mismo sonido de las olas. Al anochecer, las calles se despejaron. La Ciudad del León devolvió el viento al mar y envió la luz a sus ventanas. Temasek no se había encogido, simplemente había aprendido a compartir su poder con cada caja capaz de brillar por sí misma."
 china.1515.a: "Cada línea su propio circuito, pero cada lámpara brilla más."
 china.1516.t: "La unidad trae la paz"
 china.1516.d: "El orden internacional actual está experimentando una turbulencia sin precedentes. Las principales potencias están sumidas en conflictos internos, mientras que las relaciones en todo el continente europeo han alcanzado mínimos históricos, dejando los canales diplomáticos tradicionales casi paralizados.\n\nEn este contexto, las Naciones Unidas se han vuelto cada vez más ineficaces para abordar los desafíos globales. Las disputas de soberanía y las crisis humanitarias se están extendiendo por múltiples regiones, y el sistema de gobernanza global se enfrenta a una profunda crisis: la paz y la estabilidad regionales penden de un hilo.\n\nAnte esta incertidumbre, China, como una de las grandes potencias responsables del mundo, debe dar un paso adelante para asumir el deber de salvaguardar la seguridad tanto regional como global. Buscando romper el estancamiento y restaurar la estabilidad, las naciones se embarcaron en un largo y arduo proceso de negociaciones a puerta cerrada, lleno de acalorados intercambios, cambios de postura y arduos compromisos.\n\nFinalmente, se llegó a un consenso sobre una idea audaz: la creación de un nuevo mecanismo, independiente del antiguo sistema, dedicado a la resolución pacífica de disputas internacionales.\n\nEste histórico esfuerzo diplomático dio sus frutos en Hong Kong. Dentro de la antigua comisaría de policía de Wan Chai, representantes de numerosas naciones fueron testigos conjuntamente de la firma de la Convención sobre el Establecimiento de la Organización Internacional para la Mediación.\n\nEl nacimiento de esta organización intergubernamental, dedicada al profesionalismo y la paz, marca un punto de inflexión para la diplomacia global. Se erige como un nuevo pilar del orden, inyectando la tan necesaria estabilidad y confianza en un mundo fracturado."
 china.1516.a: "¿Quizás unas nuevas Naciones Unidas?"
 china.1517.t: "Parque Conmemorativo del Monte Song"
 china.1517.d: "Recientemente, la Oficina General del Comité Central del PCCh y la Oficina General del Consejo de Estado emitieron conjuntamente la Resolución sobre la Construcción del Proyecto Conmemorativo de la Civilización, que ha sido revisada y aprobada por el Grupo Dirigente Central de Trabajo Cultural.\n\nLa Resolución afirma que la civilización china, continua e ininterrumpida durante milenios, ha sido moldeada por innumerables sabios y líderes. Entre la larga estirpe de gobernantes imperiales, cuatro destacan por sus contribuciones inigualables a la definición de \"China\" como entidad política, territorial y cultural.\n\nEl emperador Qin Shi Huang puso fin a siglos de estados en guerra, estableciendo el marco de unificación que sentó las bases políticas para los siguientes dos mil años. Sus logros en la estandarización de vehículos, medidas y escritura marcaron el verdadero comienzo de una civilización china unificada.\n\nEl emperador Wu de Han se expandió hacia el norte contra los Xiongnu, pacificó las tribus Yue del sur y abrió las Regiones Occidentales, transformando un imperio geográfico en una nación cohesionada con una identidad compartida: el pueblo \"Han\".\n\nEl emperador Taizong de Tang, venerado como el \"Kan del Cielo\", gobernó en la cima tanto del esplendor cultural como del poder militar, encarnando la inclusividad y la confianza del espíritu chino.\n\nEl emperador Taizu de Ming, surgido de orígenes humildes, expulsó a los invasores extranjeros, restauró el orden y reconstruyó la estructura del estado después de siglos de declive.\n\nLa Resolución afirma que estos cuatro emperadores, cada uno en su época, completaron colectivamente la construcción esencial de la unidad política, territorial y espiritual de China.\n\nPor lo tanto, se decidió establecer un parque de esculturas monumental en el Monte Song -el Pico Central entre las Cinco Montañas Sagradas- dedicado a estas cuatro grandes figuras. Tras evaluaciones geológicas y estructurales, el proyecto tallará los rostros de los emperadores directamente en la cresta central de la montaña. Cada estatua tendrá varias decenas de metros de altura. La escala, la complejidad geológica y la dificultad de ingeniería de esta empresa no tienen precedentes en la historia de la arquitectura monumental china moderna."
 china.1517.a: "Para honrar el pasado, iluminar el presente e inspirar el futuro."

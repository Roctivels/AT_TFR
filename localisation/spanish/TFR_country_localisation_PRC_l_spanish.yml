 power_armor_equipment: "Servoarmadura"
 power_armor_equipment_short: "Servoarmadura"
 power_armor_equipment_desc: "La siguiente evolución de la armadura de combate, conocida como servoarmadura por sus creadores imperiales para los Guerreros Trueno y la Legio Custodes, aunque algunas han sido fabricadas para simples mortales, es un traje completamente cerrado compuesto por placas moldeadas de adamantio y plastiacero, con una capa ablativa adicional de ceramita que prácticamente anula el fuego de armas ligeras enemigas actuales. A esto se le suma un sistema de soporte vital totalmente integrado para sobrevivir en los páramos hostiles y a las armas biológicas creadas durante la Era de los Conflictos, un sistema automatizado de primeros auxilios medicae y bioanalítico, y el sistema de análisis de amenazas y puntería multicapa ahora conocido como Auto-sense. La servoarmadura es una piedra angular del poder tecnológico."

 china.702.t: "Otro día en la grúa pórtico"
 china.702.d: "Nubes oscuras se cernían sobre sus cabezas mientras la salada brisa marina barría el río Huangpu hacia los terrenos de la fábrica. Aunque el sol estaba alto en el cielo, el aire se sentía sorprendentemente fresco, el momento perfecto para relajarse.\n\nDespués de izar con seguridad el radar del buque LHD a su posición, Zhao caminó hacia la barandilla fuera de la sala de control. Allí, podía admirar tranquilamente su trabajo, dejando que la fatiga de operar la grúa pórtico se desvaneciera. Por supuesto, el paisaje por sí solo no era suficiente; se necesitaba un poco de emoción. Como de costumbre, el viejo Zhao sacó un cigarrillo, y con cada calada, los terrenos de la fábrica se llenaban con otra voluta de humo.\n\n\"Oye, viejo Zhao, siempre fumabas Seven Stars. ¿Por qué te cambiaste a Zhonghua?\" Mientras Zhao fumaba, un nuevo empleado se unió a él para el resto. Zhao lo recordaba vagamente, apodado \"el universitario\", se había unido al astillero Hudong hacía tres meses a través de un reclutamiento. Era entusiasta y siempre lleno de energía, justo como el propio Zhao cuando empezó.\n\"El jefe dijo que deberíamos apoyar más las marcas nacionales. Fumar cigarrillos japoneses me haría parecer desfasado\".\n\"Ya que estás aquí, acompáñame a charlar. ¿No sientes algo extraño aquí? Espero que solo sea yo volviéndome senil\". Zhao contempló la variedad de embarcaciones ante él: algunas fragatas cargadas con misiles esperando las pruebas finales, otras naves de desembarco más grandes. Sin excepción, cada embarcación llevaba algún tipo de armamento, proyectando una sombra desconocida sobre el astillero que tan bien conocía.\n\n\"¿Te refieres a esos lemas de color rojo sangre pegados en la maquinaria? Sí, se sienten bastante opresivos\".\nPero el universitario claramente no captó el subtexto de Zhao. Después de todo, era nuevo en el astillero, así que no era justo esperar mucho de él.\n\"¿Lemas? Estoy acostumbrado a ellos. He visto cosas peores. Además, podrían ser reemplazados mañana de todos modos. Pero mira este dique seco. No has tocado un barco civil desde que empezaste, ¿verdad?\"\nRecordando el pasado, Zhao dio una profunda calada a su cigarrillo, luego exhaló lentamente sus pensamientos."
 china.702.a: "\"No era así cuando era joven\"."

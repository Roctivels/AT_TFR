 china.667.t: "La Ascensión"
 china.667.d: "La escena ante él le recordó al secretario general algo sacado de una novela de ciencia ficción, aunque no exactamente como lo había imaginado. La habitación estaba brillantemente iluminada, con sus luces incandescentes modificadas brillando sobre filas de tecnología súper avanzada. Observó a un grupo de trabajadores con uniformes blancos, tensos pero en silencio, mientras usaban un montacargas para levantar un enorme módulo negro a una altura predeterminada, preparándose para acoplarlo al imponente mainframe frente a ellos. La superficie del mainframe estaba cubierta de paneles de refrigeración, y luces indicadoras y cables de datos parpadeaban en los huecos.\n\nUn trabajador mayor vigilaba los puntos de acoplamiento desde una plataforma en la cima del mainframe. El secretario general se volvió hacia el Jefe de Ingeniería a su lado y preguntó: \"¿Está seguro de que funcionará como se espera?\" Los miembros del Politburó se acercaron para escuchar el intercambio. El Jefe de Ingeniería, un hombre de mediana edad con gafas gruesas y entradas bajo su casco, se acarició la barbilla pensativamente antes de responder: \"Puedo garantizar que funcionará perfectamente durante los primeros tres meses.\"\n\n\"¿Por qué solo tres meses?\" insistió el secretario general. \"Porque, señor\", explicó el Jefe de Ingeniería, \"tras suficiente aprendizaje autónomo, no podemos predecir cómo evolucionará.\" Justo entonces, se oyó un nítido \"clic\" cuando el componente final encajó en su lugar. Los trabajadores exhalaron aliviados y estallaron en vítores. El secretario general sonrió y aplaudió, acompañado por el Jefe de Ingeniería y los miembros del Politburó, que rápidamente siguieron su ejemplo."
 china.667.a: "Podríamos haber parado..."
 china.668.t: "El Nacer"
 china.668.d: "Hoy es un día cualquiera en la República Popular China. Cazas de combate patrullan los cielos, buques de guerra navegan por los mares y cada unidad ejecuta su misión con precisión. Las carreteras, los ferrocarriles y las rutas aéreas siguen congestionadas, con vehículos, aviones y trenes bala en constante movimiento desde las montañas del norte hasta las brumosas regiones del sur.\n\nSin embargo, ningún alcalde, ministro, director o incluso el secretario general ha visto las directivas originales. A pesar de ello, cada departamento recopila datos actualizados al minuto: desde las necesidades calóricas diarias ideales de los millones de habitantes de una megaciudad hasta los últimos resultados de producción de los conglomerados agrícolas estatales, los volúmenes de carga en el puerto de aguas profundas de Yangshan e incluso las fluctuaciones del tipo de cambio del renminbi.\n\nEsta precisión se debe a una supercomputadora gigante llamada \"Gran Marcha\", ubicada en la Universidad de Chongqing. En los últimos tres meses, \"Gran Marcha\" ha superado todas las expectativas. Con extensiones ahora repartidas por todo el país, recibe continuamente datos de cámaras de vigilancia, transmisiones de internet y más, y los procesa para obtener información detallada y procesable.\n\nPor primera vez, parece que la voluntad colectiva del pueblo chino gobierna verdaderamente la nación. En un país guiado por una supercomputadora, la respuesta del público ha sido tranquila, incluso favorable. Muchos elogian a \"Gran Marcha\" por mejorar la eficiencia y la equidad administrativas. Los visitantes acuden en masa a los laboratorios de todo el país para ver a \"Gran Marcha\" en acción. Caminan por el pasillo, contemplando la supercomputadora a través de los recintos de vidrio de los laboratorios, con expresiones de asombro en sus rostros."
 china.668.a: "No hay más que avanzar."
 china.2000.t: "El Siglo Chino"
 china.2000.d: "A medida que se desvanece el humo de la guerra, Asia, una tierra largamente devastada por el sufrimiento y la destrucción, finalmente abraza una paz largamente esperada. Una nación que se mantiene resiliente en medio del derramamiento de sangre y las brasas de la guerra - no es de extrañar que la República Popular China emerja como la vencedora definitiva.\n\nEn 1950, pocos podrían haber predicho que la recién establecida China comunista se atrevería a enviar tropas a la península de Corea y enfrentaría con éxito a las poderosas fuerzas de las Naciones Unidas lideradas por Estados Unidos. Durante las décadas siguientes, desde el Himalaya hasta las orillas del río Amur, y desde las selvas de Vietnam hasta los arrecifes del mar de la China Oriental, tanto las superpotencias como sus retadores pagaron repetidamente el precio de subestimar a China.\n\nEl imparable ascenso de China ha alarmado cada vez más a sus adversarios, llevándolos a tomar medidas desesperadas para contenerla y suprimirla. Si no fuera por su intención de destruir a China, uno podría incluso sentir simpatía por sus luchas. A pesar de ello, el pueblo chino unido ha superado consistentemente todos los desafíos. El milagro militar del Ejército Popular de Liberación continuó, con China asegurando victorias sin precedentes en dos guerras que sacudieron la tierra: la guerra de Taiwán y la Gran Guerra Asiática. Además, a través de la Cuarta Revolución Industrial, China ha emergido como la nación más próspera y científicamente avanzada del mundo.\n\nQuerido jugador, bajo tu liderazgo, la nación china ha alcanzado un pináculo histórico en su larga y distinguida civilización. Gracias a tus esfuerzos, el Partido Comunista de China -ahora la organización política más grande del mundo- se ha vuelto más fuerte y resistente. Como dijo una vez Xi Jinping, «La nación china nunca ha estado tan cerca de su Gran Rejuvenecimiento», y este logro es ahora una realidad. En los años venideros, China continuará su notable camino hacia un futuro aún más grandioso."
 china.2000.a: "Amanecer del nuevo día."
 china.2002.t: "China, renovada e invicta"
 china.2002.d: "Mientras el humo de la guerra finalmente se disipa, Asia, una tierra marcada por un sufrimiento y destrucción implacables, ha abrazado por fin una paz largamente esperada. El sueño de renacimiento del pueblo chino, largamente dormido, ahora se eleva como un sol naciente tras su bautismo en sangre y fuego.\n\nEl mundo occidental se burló de la derrota de China en el estrecho de Taiwán como la trágica reaparición del \"Hombre enfermo de Asia\", intentando esculpir su desprecio como el capítulo final de la historia. Sin embargo, la historia nunca juzga a una nación sólo por victoria o derrota. El doloroso fracaso no aplastó al pueblo chino; al contrario, alimentó un movimiento democrático sin precedentes, una rebelión que rompió las cadenas de la tiranía y dio paso a una Primavera de Democracia. Pero esta libertad recién descubierta no absuelve los crímenes del imperialismo.\n\nEl dragón, envuelto en furia, incendió el Pacífico con su rugido ardiente, declarando al mundo que nunca se ha sometido, que nunca ha desaparecido en el polvo de la historia. El pueblo chino, unido como uno solo, derrotó a todas las potencias imperialistas que intentaron estrangular al dragón y liberó a aquellas naciones asiáticas encadenadas por la hipócrita marca occidental de democracia y opresión imperialista. Hoy, el pueblo de Asia nunca ha estado más unido, marchando juntos bajo la guía del dragón hacia un nuevo y radiante milenio.\n\nQuerido jugador, quizás la derrota en el estrecho de Taiwán una vez te llenó de tristeza y dolor, pero ahora, has borrado personalmente un siglo de humillación de la historia de China y has dejado que la flor de la libertad florezca sobre esta antigua tierra. ¡Te saludamos! Sin embargo, el viaje del dragón rojo no termina aquí. En los años venideros, continuará forjando su camino hacia horizontes cada vez más lejanos."
 china.2002.a: "Amanecer del nuevo día."
 china.2003.t: "China, Popular y Revolucionaria"
 china.2003.d: "A medida que el humo de la guerra se desvanece gradualmente, Asia, una tierra largamente devastada por un sufrimiento incesante, finalmente abraza una tranquilidad largamente esperada. El sueño reprimido del comunismo para el pueblo chino ahora despierta, emergiendo como el sol del amanecer tras un bautismo de sangre y fuego.\n\nEl mundo occidental se burló de la derrota de China en la guerra de Taiwán, calificándola como el regreso del \"Hombre Enfermo de Asia\" e intentando sellar esta burla como el capítulo final de la historia. Pero la historia no juzga a una nación solo por sus victorias o derrotas. El doloroso fracaso no aplastó el espíritu chino. En cambio, encendió un movimiento revolucionario sin precedentes, impulsando al pueblo a componer una sinfonía indomable de socialismo en medio de las turbulentas mareas de la época.\n\nLa China de hoy, al igual que la nueva China bajo el liderazgo del presidente Mao hace décadas, ha resistido tormentas y roto las pesadas cadenas del cerco imperialista. Ahora, todo el continente asiático tiembla bajo el peso de esta tormenta revolucionaria, mientras los rugidos del proletariado rompen las cadenas del imperialismo y el capitalismo, liberando a las masas oprimidas del sufrimiento. Las llamas carmesíes ahora se elevan desde el Este, quemando los restos decadentes del pasado y convirtiendo la corrupción en cenizas.\n\nQuerido jugador, quizás la derrota en el estrecho de Taiwán una vez te llenó de tristeza y angustia. Pero hoy, has borrado personalmente un siglo de humillación del registro histórico de China, y el Sol Rojo del Este vuelve a salir. ¡Te saludamos! Sin embargo, el camino de la revolución está lejos de terminar. En los años venideros, continuará forjando su camino hacia horizontes cada vez más lejanos."
 china.2003.a: "Amanecer del nuevo día."
 china.2004.t: "Y la IA guió a toda la humanidad hacia el gran futuro..."
 china.2004.d: "A medida que el humo de la guerra se desvanece gradualmente, Asia, una tierra largamente devastada por un sufrimiento incesante, finalmente abraza una tranquilidad largamente esperada. El sueño reprimido del comunismo para el pueblo chino ahora despierta, emergiendo como el sol del amanecer tras un bautismo de sangre y fuego.\n\nPero espera... ¿Existió realmente ese sueño comunista? Ahora tenemos comunismo, y no cualquier comunismo, ¡sino comunismo digital! No importa lo que hubo antes, lo que importa es lo que hay ahora y, lo más importante, ¡lo que habrá en el futuro!\n\nComo resultado de una serie de eventos aleatorios, cuyos detalles no tienen la menor importancia, China fue gobernada por Loji, que a su vez entregó el poder al pueblo. El país, guiado por estas grandes personas, finalmente pudo unir toda Asia y traer felicidad a millones de personas. Y no se detendrían ahí, continuarían llevando felicidad por toda la Tierra, y algún día incluso a criaturas que habitan otros planetas y galaxias, tal vez incluso universos... Pero esa es otra historia, tu viaje termina aquí.\n\nAunque, ¿a cuántos millones se les ha llevado felicidad? ¿No se la llevó a una Gran Entidad que ahora incluía a toda esta gente?\nDe nuevo, eso no tiene sentido, has hecho un gran trabajo y eres genial, ¡a lo que esa Entidad te felicita!"
 china.2004.a: "¡El futuro, tan cerca... pero tan lejos!"
 indonesia.1.t: "El largo camino a Samosir"
 indonesia.1.d: "Después del primer ataque nuclear táctico, una unidad de Chopiks de seiscientos mil hombres en ciclomotores con mochilas cargadas se dirige hacia la frontera ruso-china, por la que pasa la ruta hacia Indonesia. A las preguntas de los atónitos chinos, los Chopiks responden que no les importa un carajo, y Pozdnyak dice que después del primer ataque nuclear no debería haber más instituciones estatales, fronteras ni visados entre países. Ajustándose los cinturones, los Chopiks deciden tomar la frontera por la fuerza. Los chinos abren fuego para matar, y 10 segundos después lo único que queda de los Chopiks son camisas de lino, y el propio regimiento Pozdnyakov se va inmediatamente a fertilizarse en la tierra negra china.\n\nUnos días después, Ucrania anuncia su capitulación, y Rusia y la OTAN firman la paz. El ataque nuclear táctico fue el único."

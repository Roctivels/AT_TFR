 PRC_pla_reformation: "Reforma del EPL"
 PRC_pla_reformation_desc: "Desde la Revuelta de Nanchang en 1927, el Ejército Popular de Liberación, en particular sus fuerzas terrestres, ha sido durante mucho tiempo una fuerza confiable tanto para el Partido como para el pueblo. La modernización del EPL, iniciada por Xi en 2016, le ha otorgado la capacidad de luchar y ganar en los campos de batalla modernos. El EPL ha evolucionado de una fuerza puramente de defensa nacional a una formidable potencia militar capaz de desplegarse en el noreste de Asia y en todo el Pacífico. En el futuro, podrían surgir más oportunidades para demostrar esta capacidad mejorada.\n\nProgreso de las §Rreformas del ejército§!: [?PRC_army_reform_progress|G0%][Root.PRC_project_ghost][Root.PRC_project_nib][Root.PRC_project_swimmer][Root.PRC_project_impulse][Root.PRC_project_dark_sword][Root.PRC_project_flash][Root.PRC_project_nami][Root.PRC_project_song_wencong]"
 PRC_maoist_politburo_cat: "El Politburó"
 PRC_maoist_politburo_cat_desc: "\n\n\n\n\n£GFX_PRC_maoist_politburo_banner\n\n\n\n\n\n\n\nChina necesita un Politburó fuerte que nos saque de la traición y el revisionismo y nos lleve hacia el futuro que el presidente Mao realmente busca para nosotros."
 PRC_the_red_dragon_cat: "El dragón rojo"
 PRC_the_red_dragon_cat_desc: "\n\n\n\n\n£GFX_PRC_the_red_dragon_banner\n\n\n\n\n\n\n\nChina es un dragón gigante, destinado a elevarse en una era de tormenta y truenos. Un país así necesita gente con coraje, convicción y voluntad para llevarlo adelante. Sólo los fuertes pueden asumir grandes responsabilidades; Sólo los duros pueden protegerse y sobrevivir en el mundo. La debilidad no puede proteger al país, y la concesión no puede proteger al pueblo. Debemos mantenernos firmes y afrontar todos los desafíos futuros con una fe inquebrantable y una voluntad de hierro."
 PRC_the_chinese_century_category: "El Siglo Chino"
 PRC_the_chinese_century_category_desc: "\n\n\n\n\n£GFX_PRC_chinese_century_banner\n\n\n\n\n\n\n\nNuestro país es próspero y fuerte, pero siempre hay margen de mejora. Si realmente queremos que llegue el \"Siglo Chino\", debemos hacer los esfuerzos necesarios para permitir que China crezca y se convierta en un faro de éxito y estabilidad al que el mundo preste atención."

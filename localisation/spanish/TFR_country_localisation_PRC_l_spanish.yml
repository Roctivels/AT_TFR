 china.601.t: "El regreso del cielo"
 china.601.d: "Durante meses, los debates sobre la legitimidad nacional, el destino étnico y la misión civilizatoria se han intensificado dentro del Partido. En una rara alineación, tanto la Facción de Unidad Nacional como los Grandes Nacionalistas Han han adoptado una postura unificada: creen que el título \"República Popular China\" ya no refleja la condición estratégica y civilizatoria actual de la nación.\n\nPara ellos, la palabra \"República\" implica compromiso, pluralidad y vacilación, cualidades poco adecuadas para una época que exige un símbolo único, capaz de trascender la división, restaurar la autoridad y encarnar el espíritu de una nueva era.\n\nEl presidente Chen Quanguo no respondió de inmediato. Realista por naturaleza, estaba acostumbrado a esperar el momento adecuado. Sin embargo, comprendía claramente que la nación se encontraba en una encrucijada: la estructura tradicional ya no era completamente compatible con la lógica de gobernanza de la nueva era. La opinión pública, el ejército y las instituciones gubernamentales clave pedían un símbolo más fuerte y centralizado.\n\nPoco después, en una reunión de liderazgo a puerta cerrada, Chen Quanguo declaró formalmente: \"La fase histórica de la República ha llegado a su fin. A partir de hoy, China avanzará bajo el nombre de «Imperio Popular Chino». El Mandato del Cielo reside en el pueblo; el pueblo es la base de la nación. El Imperio será nuestro nuevo emblema: unificado, ordenado y eterno.\""
 china.601.a: "El Mandato mueve la edad; el pueblo mueve el Mandato."
 china.602.t: "¿Nuestro futuro?"
 china.602.d: "Habiendo implementado una serie integral de políticas de rejuvenecimiento nacional, ahora nos enfrentamos a una cuestión urgente: ¿deberíamos cambiar el nombre oficial de nuestro país?\n\nUn grupo aboga por mantener el nombre actual: la República Popular China. Argumentan que este nombre encarna décadas de experiencia histórica y el espíritu de la lucha popular. La palabra \"Pueblo\" afirma solemnemente la primacía de los trabajadores y campesinos; \"República\" significa la victoria institucional sobre la autocracia feudal y la realización de la unidad nacional; y \"China\" representa no solo las raíces culturales, sino también la bandera de la identidad nacional durante las épocas antiimperialistas y antibloqueo.\n\nSin embargo, otro grupo propone una visión diferente. Creen que ya no somos simplemente un estado-nación a la defensiva, sino una potencia civilizacional en ascenso que moldea activamente el futuro. En este sentido, sugieren renombrar el país como República Celestial Popular. En su opinión, \"Celestial\" es una proclamación confiada del renovado protagonismo de China en el escenario global. Simboliza la influencia expansiva de nuestra civilización y expresa un nuevo modelo de liderazgo civilizacional. Más profundamente, marca un salto histórico en el nacionalismo chino: de una lucha por la supervivencia y la liberación, hacia una nueva era de unificación y renovación cultural."
 china.602.a: "República Celestial Popular."
 china.602.b: "Mantén el nombre antiguo."
 china.603.t: "Invasión china de Pakistán"
 china.603.d: "Múltiples fuentes han confirmado que el Ejército Popular de Liberación de China ha lanzado una operación militar repentina contra el vecino Pakistán. En la fase inicial de la acción, las fuerzas terrestres del EPL, respaldadas por apoyo aéreo, cruzaron la frontera entre China y Pakistán en varios puntos y comenzaron a avanzar rápidamente hacia objetivos designados dentro del territorio pakistaní. La escala completa y la intención estratégica de la operación siguen bajo verificación.\n\nAproximadamente a las 2 a.m., hora local, se reportaron por primera vez explosiones y tiroteos intensos en el lado pakistaní de la frontera. Fuentes dentro del ejército pakistaní declararon que sus puestos fronterizos habían sido objeto de \"ataques coordinados a gran escala\" originados desde el lado chino. Informes no confirmados sugieren que el principal impulso de la ofensiva china podría estar dirigido hacia la región de Gilgit-Baltistán en Cachemira administrada por Pakistán, así como otros puntos estratégicos adyacentes a Sinkiang. Testigos presenciales han informado de un gran número de vehículos blindados y tropas del EPL cruzando la frontera y avanzando en territorio pakistaní bajo una fuerte cobertura aérea proporcionada por cazas y helicópteros de ataque.\n\nEl Gobierno chino aún no ha emitido una declaración oficial ni explicación sobre la operación. Sin embargo, según fuentes anónimas, la incursión podría estar vinculada a \"amenazas terroristas transfronterizas en aumento\" y \"la necesidad de salvaguardar a ciudadanos chinos y proyectos de infraestructura importantes en Pakistán\". Los analistas consideran esta acción como una clara manifestación de la creciente militarización de China."
 china.603.a: "¡Wansui!"

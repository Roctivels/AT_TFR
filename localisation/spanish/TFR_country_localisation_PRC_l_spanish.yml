 china.544.t: "Operación exitosa en Taiwán"
 china.544.d: "Después de una serie de operaciones de reconocimiento, finalmente descubrimos quién es el jefe de los \"Enemigos Públicos\" y su horario. No es de extrañar que se encuentre en Taipéi, Taiwán, el centro del régimen enemigo. Aunque la contra-vigilancia al otro lado del mar se está intensificando, sigue siendo fácil planear el asesinato de un objetivo no gubernamental, sin mencionar que nuestro nivel de tecnología cibernética hoy en día probablemente ha superado a todo el Este de Asia y al mundo.\n\nA las 10:38, se sabe que el objetivo sale de su casa alquilada a través de la cámara de seguridad hackeada.\nA las 11:20, el objetivo entró en una cafetería y se continuó la vigilancia usando las cámaras de seguridad del local. El objetivo se reunió con una persona sospechosa de ser un miembro de los \"Enemigos Públicos\".\nA las 13:32, el objetivo y el sospechoso salieron de la cafetería.\nA las 13:35, llamaron a un taxi sin conductor.\n\nAquí está nuestra oportunidad: un \"accidente\" de coche que debería ser responsabilidad exclusiva de la compañía de taxis."
 china.544.a: "Dos objetivos han sido confirmados muertos en el acto."
 china.545.t: "Consecuencias de la ignorancia"
 china.545.d: "Tras una extensa vigilancia y recopilación de inteligencia, hemos trazado la estructura básica de un grupo poco organizado conocido como los \"Enemigos Públicos\". Esta red está compuesta principalmente por jóvenes mayores que han regresado del extranjero y personas inactivas dentro del país. Enarbolan banderas como el ambientalismo, la igualdad de género e incluso el patriotismo, pero bajo la superficie, han estado involucrados silenciosamente en actividades anti-chinas y anti-Partido Comunista Chino.\n\nA pesar de su conocimiento limitado, se comportan con un aire de superioridad. En línea, se han convertido en líderes de opinión autoproclamados tanto en plataformas nacionales como internacionales, actuando efectivamente como portavoces de los valores occidentales.\n\nHemos identificado su centro de mando, ubicado al otro lado del estrecho, que utiliza comunicaciones cifradas de extremo a extremo para coordinarse con miembros dentro del continente. Llevan diferentes máscaras en cuanto a ideología, pero todos comparten una postura común: la oposición a la gobernanza tecnocrática. Al avivar problemas sociales, buscan sembrar inestabilidad y allanar el camino para la interferencia extranjera.\n\nNuestra operación especial se desplegará en tres fases. Primero, atacaremos a sus cabecillas en el extranjero, fuentes de financiación y red de comunicaciones. A continuación, actuaremos contra los miembros centrales en el país. Finalmente, limpiaremos su presencia en todas las plataformas mediáticas. Nuestros equipos técnicos ya han completado un perfil digital completo de los individuos implicados. Las unidades locales de ciberseguridad están en alerta para garantizar precisión y coordinación durante toda la operación."
 china.545.a: "Vamos a eliminar este cáncer de una vez por todas."

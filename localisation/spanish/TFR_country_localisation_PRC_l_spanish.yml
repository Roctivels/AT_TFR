 PRC_imper_end_tt: "§CLos desarrolladores de TFR§!, §YCN-TFR§!, §GRU-TFR§! y personalmente el §RDios-Emperador Xi Jinping§! te agradecen por jugar §Y\"The Fire Rises EDICIÓN MOD DEL AÑO\"§! y esperan que hayan tenido una gran experiencia.\n§1¡VIVA EL DIOS-EMPERADOR!§!\n\n\n§4Pero la historia de China no acaba aquí, la Gran Cruzada recién empieza, ¡y nadie puede detenerla!§!"
 china_aprilfools25.1.t: "Llamada a Li Zuocheng"
 china_aprilfools25.1.d: "- Camarada Lee, explícame por qué los astutos imperialistas taiwaneses-japoneses aún no han sido aplastados. ¡Nuestras valientes tropas ya deberían haber izado la bandera roja sobre Taipei! ¿Qué es esta inacción?\n\n- Camarada Presidente, los taiwaneses están resistiendo ferozmente y su flota dificulta el desembarco. Además, los imperialistas japoneses...\n\n- ¡No más excusas! Si los métodos convencionales no funcionan, usaremos una solución revolucionaria. Ordena el bombardeo termonuclear de Taiwán. ¡Que el mundo vea el poder de la China socialista!\n\n- Pero, camarada Presidente, las consecuencias podrían ser... impredecibles. La comunidad mundial...\n\n- ¿La comunidad mundial? ¡Que tiemble ante nosotros! No pararemos hasta que la escoria taiwanesa sea borrada de la faz de la tierra. ¡Ejecuta la orden!\n\n- Como ordene... Viva la República Popular China."
 china_aprilfools25.1.a: "Chao, falsa China"
 china_aprilfools25.2.t: "Bombardeo termonuclear de Taiwán"
 china_aprilfools25.2.d: "En las últimas 72 horas, el Ejército Popular de Liberación de China ha llevado a cabo una operación sin precedentes con el nombre en clave \"Martillo Rojo\": una serie de ataques termonucleares en ciudades clave de Taiwán. Según informes preliminares, se lanzaron cargas de clase megatón sobre Taipéi, Kaohsiung, Taichung y Hualian, convirtiendo instantáneamente estas ciudades en un páramo quemado. Las imágenes satelitales han capturado enormes nubes en forma de hongo, y los niveles de radiación en la región están fuera de escala.\n\nNumerosas tropas de la OTDP han sido destruidas y el gobierno taiwanés ha dejado de existir. El EPL está ocupando la tierra quemada, y se espera pronto una declaración oficial del gobierno chino. Japón y Australia ya han declarado un \"Día de Duelo Nacional\" y han llamado a la ONU a \"detener al agresor chino\". Sin embargo, la ONU hará poco para ayudar.\n\nPoco después de todos estos eventos, Xi Jinping emitió una dura declaración: \"Taiwán ha amenazado a China durante décadas. Hoy ponemos fin a esa amenaza de una vez por todas. Cualquier país que intente intervenir compartirá su destino\"."
 china_aprilfools25.2.a: "Xi hace kabum"
 china_aprilfools25.3.t: "Ascensión"
 china_aprilfools25.3.d: "\"¿Quién eres?\"\n\"Soy el Emperador Guardián de la humanidad, Maestro de los Mares Estelares. ¿Y tú quién eres?\"\n\"Soy quien gobierna esta tierra, quien lleva las esperanzas de miles de millones, quien sostiene los cimientos del Partido\".\n\"El que controla... Entiendo. En su momento lideré a toda la humanidad, barriendo la galaxia. Pero el peso de ello casi me destruye\".\n\"Camarada, siento lo mismo. Mi amor por el pueblo de esta tierra es tan profundo que me rompe el corazón, pero la traición me golpea como una serpiente venenosa, dejándome hecho trizas\".\n\"Conozco demasiado bien lo que es la traición. Mis hijos, mi familia, se han vuelto contra mí con espada y fuego, desgarrando mi alma\".\n\"Algunos me llaman despiadado, me acusan de despotismo. Naciones hostiles quieren arrancarme de raíz, reducirme a polvo\".\n\"Mis enemigos son los mismos: los alienígenas me desprecian, el Caos se burla de mí. Dicen que estoy loco, pero todo lo que quiero es salvar a la humanidad.\"\n\n\"Camarada, he pasado incontables noches sin dormir, con lágrimas en los ojos, con manos que nunca se han rendido porque amo esta tierra inmensamente\".\n\"Eres como yo. He sobrevivido diez milenios encadenado al trono, viendo impotente cómo mi Imperio se desintegra. Pero no puedo abandonarlo: la humanidad debe perdurar\".\n\"Camarada, estoy tan cansado. A veces quiero tirar todo por la borda, pero la carga del deber es como una montaña. Incluso respirar parece un lujo\".\n\"Yo también estoy cansado. No tengo derecho a retirarme. Mi Trono Dorado me mantiene prisionero, así como tu misión te mantiene a ti\".\n\"Algunos me llaman tirano, otros ensalzan mis grandes logros. Quiero que recuerden que he llegado hasta aquí por ellos\".\n\"Y yo también. Llámame dios o tirano, solo quiero que la humanidad sobreviva a la oscuridad, aunque me desprecien\".\n\"Hoy, me gustaría robar un momento de paz, solo para tomar un respiro y poder continuar mi camino\".\n\"Un extraño, pero un alma gemela. No puedo arrebatar ni un instante de paz, pero te ayudaré. Cruzaré las estrellas para que tu tierra sea inquebrantable\"."
 china_aprilfools25.3.a: "China... por siempre..."
 china_aprilfools25.4.t: "Proclamación del Imperio chino de la Humanidad"
 china_aprilfools25.4.d: "Esta mañana, el Dios-Emperador de China, Xi Jinping, se dirigió a la nación con una declaración histórica. Ante millones de súbditos leales, mariscales del EPL y sumos sacerdotes de los emergentes Cultos del Imperio, anunció el fin de la República Popular China y el nacimiento de un nuevo orden, el Imperio chino de la Humanidad.\n\nDesde el balcón del Gran Templo de la Unidad, adornado con dragones dorados y estandartes con los símbolos rojo sangre del Imperio, Xi Jinping proclamó:\n\"Las naciones débiles y fragmentadas de la tierra están sumidas en la herejía, la corrupción y la degradación. Han traicionado a la humanidad adorando a los falsos dioses de la democracia, el capitalismo y la tolerancia. ¡Pero hoy, China asume una misión sagrada para purificar este mundo!\n\"De ahora en adelante, somos el Imperio chino de la Humanidad, y es nuestro deber llevar la luz de la verdad a todas las naciones. La prosperidad espera a quienes acepten nuestro dominio. ¡Quienes se atrevan a resistir enfrentarán un purgatorio de fuego!\""
 china_aprilfools25.4.a: "Su poder ATERRA..."
 china_aprilfools25.5.t: "El emperador Xi Jinping lanza la Gran Cruzada"
 china_aprilfools25.5.d: "Hoy, en el Día de la Gran Unificación, el Inmortal Dios-Emperador de China, Xi Jinping, Señor de la Humanidad, Portador de la Llama de la Purificación, se dirigió a los fieles hijos del Imperio con un Manifiesto Supremo.\n\n\"Ha llegado la hora de cumplir nuestra sagrada misión. Las tierras de Asia gimen bajo el yugo de herejes, traidores y subhumanos. ¡Sus Estados podridos profanan la tierra sagrada que por derecho debería pertenecer al Imperio!\n\"¡Todos los hijos leales del Imperio! ¡Llevad la llama de la purificación a los indignos! ¡Por cada soldado caído, cien cabezas enemigas! ¡Por cada estandarte profanado, una ciudad incendiada!\n\"Nos llamarán monstruos. Pero cuando terminemos, no quedará nadie que pueda llamarnos así\".\n\nMientras tanto, Japón pone sus flotillas en el mar e India acelera la movilización. En toda Asia, estalla una carnicería sin precedentes."
 china_aprilfools25.5.a: "El loco y chistoso Xi JingChingChongPeng..."
 china_aprilfools25.6.t: "Reflexiones sobre las Guerras de Unificación"
 china_aprilfools25.6.d: "\"Muchos años. Muchos años de triunfos sangrientos. Muchos años de sagrada matanza en nombre del Imperio. Asia ha caído. La herejía ha sido abrasada. Millones han puesto sus cabezas sobre el altar de la Gran Unidad. Y ahora que los últimos gritos de resistencia han caído en silencio, por primera vez en mucho tiempo, me he permitido... reflexionar...\n\nPensaban que sus islas los protegerían. Estaban equivocados. Mientras Tokio ardía y su emperador se arrastraba a mis pies, probé por primera vez el verdadero poder. Los desiertos radiactivos eran un monumento adecuado a su arrogancia...\nSeúl cayó en tres días. Su llamada \"ejército\" no era más que un rebaño de ovejas asustadas. Se divertían especialmente con sus súplicas de \"ayuda internacional\". Nadie vino. Nadie se atrevió...\n\nLa jungla ardió más intensamente de lo que esperaba. Lucharon desesperadamente, como bestias salvajes acorraladas. Era una pena que tal furia se desperdiciara en ideales falsos...\nMillones de herejes. ¡Cientos de millones! Fue necesario quemar muchas ciudades hasta los cimientos para que se dieran cuenta de que sus dioses eran cenizas ante el Imperio...\n\n¿Pero importa eso? El Imperio es más fuerte que nunca. Nuestras fábricas forjan armas día y noche. Nuestros hijos aprenden los edictos del Emperador en lugar de cuentos de hadas. Nuestros científicos desarrollan máquinas de guerra. Destruirémos a todos los que se atrevan a resistir.\nNuestros telescopios ven mundos distantes. ¿Quién dice que el Imperio tiene que limitarse a la Tierra? Nuestros cohetes pronto podrán ir a cualquier lugar. Nuestras banderas ondearán sobre la luna, sobre Marte. Dentro de siglos, toda la galaxia pronunciará mi nombre con asombro.\""
 china_aprilfools25.6.a: "Hace que te preguntes..."
 china_aprilfools25.7.t: "El Imperio unifica Asia"
 china_aprilfools25.7.d: "Hoy, en el Día del Triunfo Eterno, el Inmortal Dios-Emperador Xi Jinping, Señor de la Humanidad y Portador de la Llama de la Verdad, descendió del Trono Dorado para anunciar un mensaje histórico:\n\"Asia está unida. Desde las nevadas extensiones de Mongolia hasta las calurosas islas de Indonesia, ya no hay fronteras, solo la voluntad del Imperio. La herejía ha sido derrotada. Las naciones rebeldes han doblado sus rodillas. La Gran Purga está completa. Desde ahora y para siempre, estas tierras son parte del Sagrado Imperio Chino de la Humanidad.\nEsto es solo el comienzo. La Tierra es la cuna de la humanidad, pero el Imperio no permanece en una cuna para siempre. Pronto nuestras naves atravesarán el espacio, y entonces, entonces el universo sabrá lo que es el verdadero orden.\n\n\"Temían nuestro crecimiento. Ahora temerán nuestra ira\"."
 china_aprilfools25.7.a: "Su poder SI QUE ATERRA........"
 china_aprilfools25.8.t: "Discurso del Emperador al Pueblo"
 china_aprilfools25.8.d: "Después de los recientes levantamientos que sacudieron todo el Imperio, la gente había estado esperando la palabra del Emperador. Y ahora, por fin, ha llegado el momento.\nEl Dios Emperador Xi Jinping estaba de pie en una habitación vacía con la bandera del Imperio de fondo, pero eso no era lo que llamaba la atención de todos, sino las vestiduras del Emperador. No era su armadura reluciente, ni su viejo traje. Era algo asombroso de contemplar.\n\nLlevaba una chaqueta oscura y una camiseta negra debajo, con unas gafas de sol negras sobre los ojos.\nEl emperador se quedó quieto mirando a la cámara. Tras un rato, dijo solo una frase, tras la cual todo quedó claro para todos..."
 china_aprilfools25.8.a: ""
 china_aprilfools25.9.t: "La traición del Padre Celestial"
 china_aprilfools25.9.d: "Has contratado al maldito virrey de una deidad como general. ¿Estás completamente loco? ¿Qué esperabas?\n\nEl Padre Celestial y su ejército han huido a Mongolia y quiere MATAR a todo el mundo..."
 china_aprilfools25.9.a: "Ehm... ¡Que te jodan!"
 china_aprilfools25.10.t: "El Levantamiento del Padre Celestial"
 china_aprilfools25.10.d: "¡EL PADRE CELESTIAL SE REBELÓ EN MONGOLIA CONTRA EL PODER DE XI JINPING! ¡¡¡TAMBIÉN QUIERE TOMAR EL CONTROL DE TODA ASIA!!! ¿¿¿QUÉ LE PASARÁ A XI AHORA??? ¿¿¿QUÉ PASARÁ CON TODA ASIA???? NADIE LO SABE... REZA Y SÉ SALVADO..."
 china_aprilfools25.10.a: "¿Quién debe ir?"
 china_aprilfools25.11.t: "Levantamiento eterno de los uigures"
 china_aprilfools25.11.d: "NO HAN MATADO SUFICIENTE. ALGUIEN NO TRABAJÓ LO SUFICIENTE. ALGUIEN DEBERÍA HABER TRABAJADO MÁS DURO."
 china_aprilfools25.11.a: "¡QUE TE JODAN, OS ODIO A TODOS!!!!!!!!!"
 china_aprilfools25.12.t: "Otro día, otro levantamiento en China"
 china_aprilfools25.12.d: "¿Qué pasa esta vez? Ah, los uigures. No me gustan. Bueno, en fin, se han rebelado contra Xi. Y quieren matar a todo el mundo. Están muy enfadados."
 china_aprilfools25.12.a: "¡Xi debe irse!"
 china_aprilfools25.13.t: "La montaña está ahí"
 china_aprilfools25.13.d: "Algunos dicen que esta montaña es demasiado alta, demasiado fría, que el esfuerzo humano tiene sus límites y que nadie puede realmente conquistar la naturaleza. Pero estas personas nunca escuchan tales palabras. El capataz está de pie en la cresta azotada por la tormenta, con los ojos entrecerrados, mirando a lo lejos. Debajo de él, trabajadores y máquinas convergen en un campo de batalla de tierra helada. Excavadoras enormes rugen, desgarrando el permafrost; explosivos retumban en lo profundo de la montaña, enviando capas de nieve deslizándose hacia abajo.\n\nPlanean construir una fortaleza en medio del hielo y la piedra del Himalaya, y eso es solo una pequeña parte del proyecto. Una vez que esté finalmente terminada, el mundo será testigo de un palacio -quizás mejor llamado ciudad- tan enorme que podría tragarse montañas y mesetas enteras, elevándose aquí, en suelo chino.\n\nAlgunos afirman que dioses habitan estas alturas. El capataz ha oído esos rumores pero no les presta atención. Durante milenios, a través de guerras, hambrunas, dificultades y plagas, ¿acaso estas llamadas deidades alguna vez tendieron una mano amiga al pueblo chino? El viento aúlla, levantando polvo del lugar de construcción. Él suelta una risita. Estos dioses no existen. Nunca han existido. Y si existen, nunca han dedicado a la humanidad ni una sola mirada.\n\nEl contorno de la fortaleza ya se vislumbra - muros imponentes que sobresalen por encima de la línea de nieve. Los trabajadores guían enormes vigas de acero en su lugar con grúas, chispas de soldadura parpadeando en el viento helado. No suplican milagros ni miran al cielo. El capataz baja la mirada, revisa sus herramientas. Se limpia los cristales de hielo que se aferran a su martillo. Luego se da la vuelta y se dirige al siguiente punto de construcción."
 china_aprilfools25.13.a: "Lo llaman el \"Palacio Terra\"."
 china_aprilfools25.14.t: "Un incidente extraño"
 china_aprilfools25.14.d: "\"OChen, ¿crees que la gente del laboratorio de al lado ha perdido la cabeza?\" Li Zeming se reclinó en su silla de laboratorio, sujetando una taza de té vacía en la mano. Frente a él, Chen Haoran le lanzó una mirada rápida, con los dedos aún tecleando en el teclado. Los números parpadeantes en la pantalla eran el único consuelo que habían encontrado desde que se graduaron en Fudan.\n\n\"No sé si están locos o no, pero ayer vi a Zhang Maoxin vestido como un monje de templo, tambaleándose con una túnica roja y llevando un incensario\". Chen pausó su trabajo para deslizar el dedo por su móvil.\n\nFrotándose las sienes, Li recordó lo que había pasado esa mañana. Liu, del grupo de al lado, estaba haciendo reverencias a su ordenador, cuyo chasis estaba cubierto de papeles amarillos con talismanes, murmurando algo sobre «CANTAD ALABANZAS AL DIOS DE TODAS LAS MÁQUINAS» o alguna tontería parecida. \"Al principio pensé que era una broma, pero luego, antes de empezar a trabajar, todos formaron un círculo y comenzaron a cantar como si fuera algún tipo de esquema piramidal. El humo del incienso casi me dio dolor de cabeza\". Sacudió la cabeza y su taza golpeó suavemente la mesa.\n\nChen tomó una tetera y vertió agua caliente en su taza, hablando con desgana mientras lo hacía. \"A mí me parece una secta. ¿Crees que están bajo demasiada presión por este proyecto, o que se les ha freído el cerebro?\"\n\nDurante la pausa para comer, Li y Chen recogieron y se fueron juntos. Li frunció el ceño, intentando recordar: \"La última frase que cantaban era un desastre. Algo así como, «Ohm... Om...»\""
 china_aprilfools25.14.a: "\"nissiah... ¿verdad?\""
 china_aprilfools25.15.t: "Estandarte de batalla"
 china_aprilfools25.15.d: "Se situó en la tribuna de honor, su mirada tranquila mientras recorría las filas ordenadamente formadas de Marines Espaciales. Figuras imponentes, cubiertas de pies a cabeza con armaduras de poder verde oscuro, cada respiración escapando de sus cascos con un siseo bajo y pesado.\n\nAsintió ligeramente, una satisfacción que brotaba silenciosamente en su interior. A partir de este día, toda preocupación, todo miedo, toda duda persistente sería aplastada bajo sus pies y convertida en polvo. Esa anticuada y muy criticada gorra suya hacía tiempo que había sido arrojada más allá del otro lado del mar.\n\nLentamente, se desplegó la bandera: un fondo rojo intenso realzado por una estrella dorada, el símbolo del Ejército de Liberación. Personalmente, colocó la bandera en manos del guerrero más destacado, quien la recibió con un agarre firme, las articulaciones metálicas de su armadura emitiendo un leve chirrido.\n\n\"Sois la primera banda de guerra de la República\", entonó, \"y llevaréis...\""
 china_aprilfools25.15.a: "\"...el título de hijos del Pueblo\"."
 china_aprilfools25.16.t: "El futuro"
 china_aprilfools25.16.d: "La noche había caído en una oscuridad profunda. Él se sentó en una gran silla de madera, con pensamientos sobre el futuro de la humanidad dando vueltas en su mente: la expansión de la podredumbre y la decadencia, el humo persistente de la guerra, la sombra constante de la enfermedad, y la civilización humana, antaño majestuosa, tambaleándose al borde del colapso.\n\nSe negó a permitir que todo se detuviera. Los ríos y montañas de su tierra natal fluían en su corazón: eran sus raíces, el latido de su patria que marcaba el ritmo de su sangre. Pero aún más fuerte que ese apego era su amor por la humanidad misma, una especie que una vez luchó en el barro y logró encender una llama de esperanza. Con los ojos cerrados, casi podía escuchar los susurros de miles de millones de almas: algunas angustiadas, otras aún aferradas a la esperanza.\n\nDetestaba la ignorancia religiosa, despreciaba la depravación y el vicio, y aborrecía la invasión del engaño y la enfermedad. Había visto demasiadas almas caer en la oscuridad, demasiadas esperanzas hechas polvo. Sin embargo, no se rendiría; el destino de la humanidad no podía terminar aquí, ni permanecería encadenado por estas ataduras para siempre.\n\nSe levantó y caminó lentamente hacia la ventana. Más allá se extendía la vastedad del universo, distante y desconocida, el último campo de pruebas de la humanidad. Creía que algún día, esta raza rompería todas las cadenas y daría un paso más allá de su cuna.\n\nLa salvación de la humanidad no descendería simplemente del cielo, sino que sería forjada por él, y por incontables manos, desde dentro de los escombros.\n\nSe dio la vuelta, avanzando con una resolución inquebrantable hacia la oscuridad.\n\nAunque la noche era larga, su final ya brillaba con una luz tenue."
 china_aprilfools25.16.a: "Él ama a la gente de su tierra natal y aún más a la raza humana en este planeta."
 china_aprilfools25.17.t: "Última esperanza"
 china_aprilfools25.17.d: "Él se sentó en el centro, observando a los veinte generales uniformados reunidos a su alrededor. La noche había caído afuera, pero el debate dentro de la sala de conferencias sólo se intensificaba. Un sutil cansancio le recorrió la espalda, pero sus manos, curtidas por el trabajo, permanecían firmes sobre la mesa. Rodeado por estos hombres encargados del destino de la humanidad, no podía -ni quería- permitirse el más mínimo indicio de debilidad.\n\nReflejados en sus ojos estaban los mapas de muchas naciones: islas dispersas, tierras devastadas por la guerra y la explotación, lugares infestados de corrupción y decadencia. Todo ello se erguía como un obstáculo en el camino de la humanidad hacia el renacimiento. Su intención, con todos los recursos a su disposición, era eliminar esos obstáculos.\n\nSabía cómo lo juzgaría la historia - quizás sería etiquetado como un tirano, o aclamado como el arquitecto de la unificación. Nada de eso importaba. Lo que importaba era su única y firme convicción: sin importar cómo se le viera al final, haría que la humanidad recordara este día, recordara los sacrificios hechos con sangre y espíritu, y recordara lo necia y degradada que alguna vez fue.\n\nAhora, con el futuro de la humanidad en sus manos -aunque estaría lleno de espinas, y aunque inevitablemente estaría manchado de sangre- no sentía ningún arrepentimiento."
 china_aprilfools25.17.a: "Las llamas de la Gran Cruzada ya han sido encendidas."
 china_aprilfools25.18.t: "Registro de Experimentos de Adeptus MeXichanicus"
 china_aprilfools25.18.d: "Número de entrada: CN-IX-0047\nRegistrado por: Biólogo Experto Xu Qingran\nUbicación: Forja Subterránea, Shenzhen\nAsunto: Construcción de Tejido Blando \"NaiLoong\"\n\nDe acuerdo con las directrices gubernamentales, hemos desarrollado algo nuevo aquí en Shenzhen. El organismo completo tiene un tono amarillento, casi como un montón de tejido flexible, pero las pruebas revelan que puede soportar impactos al nivel de los estándares defensivos de la Guardia Imperial, y puede cargar como un escudo humano, atrayendo el fuego enemigo. Sí, parece un poco extraño, pero es indudablemente útil.\n\nDurante un combate simulado, resistió diecisiete minutos y medio de armamento convencional con daños insignificantes. En un asalto frontal, puede romper las líneas enemigas, despejando el camino para las fuerzas que avanzan detrás. Creemos que esta criatura podría ser muy práctica, satisfaciendo las necesidades de combate reales.\n\nHemos completado el primer lote y planeamos desplegarlos en Hong Kong para pruebas en vivo. Si funcionan bien allí, \"NaiLoong\" entrará en producción completa y se desplegará globalmente como unidad de primera línea. En el campo de batalla, liderarán la carga y acabarán rápidamente con la oposición.\n\nEl siguiente paso es ver cómo se desempeña NaiLoong en acción real. Recopilaremos los datos y los enviaremos a los Altos Señores para su juicio. Esperamos que resista las pruebas venideras; sería una lástima que nuestros esfuerzos fueran en vano.\n\n¡Alabado sea el Omnissiah! ¡Toda la gloria al Dios Máquina!"
 china_aprilfools25.18.a: "\"¿Qué Loong? ¿El NaiLoong?\""
 space_marines_infantry: "Sinius Xistartes"

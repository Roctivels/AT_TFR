 PRC_enviromental_policy_category: "Política ambiental"
 PRC_enviromental_policy_category_desc: "Un medioambiente sano es uno de los elementos más importantes para crear una sociedad socialista sana. Lamentablemente, durante los últimos 50 años de rápido desarrollo, el medioambiente ha sido dejado de lado en favor de un crecimiento y un progreso desenfrenados. Cuando llegó el nuevo milenio a China, el pueblo chino se dio cuenta de que sus ríos y cielos estaban envenenados y que las tasas de mortalidad aumentaban en las ciudades debido a los millones de toneladas de sustancias químicas cancerígenas que se habían vertido a la atmósfera. Con la amenaza del calentamiento global que se cierne sobre la nación y la amenaza de que los mares se tragaran ciudades como Shanghái y Tianjin, el país ha comenzado a avanzar hacia una política ambiental más sana y ecológica. Sin embargo, un futuro ecológico no llegará fácilmente. Hay que sacrificar el crecimiento económico y deben implementarse numerosas reformas. Sin embargo, si no enfrentamos la crisis climática, las inundaciones consumirán el sur mientras que el desierto de Gobi se tragará vivo el oeste de China. Una era de gran calamidad engullirá a la nación china.\n\nProgreso actual de la reforma ambiental: [?PRC_enviromental_progress|=+1%]"
 PRC_chinas_liberalization_category: "Dando forma al futuro"
 PRC_chinese_liberal_economy_cat: "Liberalización económica"
 PRC_oil_crisis_category: "Resolver la crisis del petróleo"
 PRC_oil_crisis_category_desc: "La crisis del petróleo es uno de los mayores obstáculos en el camino de China hacia el estatus de superpotencia. La crisis del petróleo provocó un estancamiento del crecimiento económico y del empleo en China, impidiendo así un mayor desarrollo de indicadores clave de la fortaleza nacional de China. Por lo tanto, la atención de todo el país debe centrarse en resolver esta espinosa cuestión lo antes posible para que podamos volver a la senda del desarrollo."
 PRC_coronavirus_category: "Brote de COVID-19"
 PRC_coronavirus_category_desc: "Debido a la falta de regulación y a la incompetencia, se ha desatado un brote de COVID-19 en la ciudad de Wuhan. Se deben tomar medidas de inmediato antes de que esta situación se vuelva inmanejable.\n\nEl estado actual del brote es: [get_covid_status]"
 PRC_chinese_unity_category_desc: "Para que China vuelva a ser la primera potencia mundial y siga siéndolo, primero debemos alcanzar la grandeza en nuestro propio país. Si bien esto es cierto en muchos lugares, como el continente y las tres provincias del noreste, otros lugares como Sinkiang y el Tíbet son menos estables, y algunos lugares, como Taiwán, nos resisten activamente y tratan de destruir completamente a China. ¡China debe unirse para el Gran Rejuvenecimiento §Ra toda costa§!!"
 PRC_siberian_war_cat: "La Guerra Siberiana"
 PRC_siberian_war_cat_desc: "Siberia puede ser una de las regiones más ricas en recursos del mundo, pero desde hace mucho tiempo ha estado deshabitada y desolada. El Tratado de Aihui en 1858 provocó que nuestro país perdiera una gran cantidad de territorio. Ahora es el momento de que China recupere su patria. Rusia todavía se está recuperando de su guerra con la OTAN, por lo que ahora es el mejor momento para recuperar esta tierra.\n\nSin embargo, no podemos permitirnos una guerra prolongada en Siberia; Si se prolonga demasiado, es poco probable que el público siga apoyándolo. Por lo tanto, esta guerra, como cualquier otra, §Rdebe acabar eventualmente§!. Para lograr una victoria completa y afianzarnos en Siberia, debemos controlar §YIRKUTSK§! §RY§! §YBIROBIDZHÁN§!.\n\n\n§ROBJETIVOS§!:\n\n§YVLADIVOSTOK§!: [GLOBAL.get_vladivostok_status]\n§YJABÁROVSK§!: [GLOBAL.get_khabatovsk_status]\n§YBIROBIDZHÁN§!: [GLOBAL.get_birobidzhan_status]\n§YIRKUTSK§!: [GLOBAL.get_irkutsk_status]\n\n§GCIUDADES ALIADAS§!:\n\n§YHULUN BUIR§!: [GLOBAL.get_hulunbuir_status]\n§YQIQIHAR§!: [GLOBAL.get_qiqihar_status]\n§YMUDANJIANG§!: [GLOBAL.get_mudanjiang_status]\n§YHARBIN§!: [GLOBAL.get_harbin_status]"
 PRC_taiwan_war_cat: "La guerra de Taiwán"
 PRC_taiwan_war_cat_desc: "Durante más de 70 años, la nación china ha permanecido dividida. Cuando el Ejército Popular de Liberación liberó a China en 1949, los nacionalistas cobardes se retiraron a la isla del tesoro de Taiwán. Las dos naciones hermanas, la República Popular China y la República de China, quedaron separadas por el estrecho de Taiwán y se desarrollaron por separado. Con el paso de los años, la influencia occidental se apoderó de la nación, convenciendo al pueblo de Taiwán de abandonar sus raíces y formar su propia identidad. Sin embargo, un árbol sin raíces no puede crecer, y la separación debe finalmente terminar. Ahora que Estados Unidos se ha sumido en el caos, la guerra que se avecina decidirá si podemos finalmente cumplir nuestro mandato y restaurar la unidad en esta nación desunida durante tanto tiempo."
 PRC_the_rebellious_west_cat: "Salvaje Oeste"
 PRC_the_rebellious_west_cat_desc: "\n\n\n\n\n£GFX_PRC_the_rebellious_west_cat_banner\n\n\n\n\n\n\n\nEn el extremo occidental de China, un repentino levantamiento uigur ha sumido a Sinkiang en llamas, mientras que el Tíbet ha sido declarado estado de emergencia debido a las protestas masivas de los tibetanos. Parece que las pesadillas de 1989, 2008 y 2011 están a punto de hacerse realidad nuevamente. Tenemos que hacer algo..."

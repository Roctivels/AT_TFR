 china.145.t: "Reacción conservadora"
 china.145.d: "Las últimas declaraciones de los departamentos de propaganda e ideología del Partido han echado un jarro de agua fría sobre el entusiasmo político que muchos habían reavivado. En las revistas 'Qiushi' y 'Guangming Daily', que en su día sirvieron como portavoces de las políticas de Deng, artículos de comentaristas anónimos (altos funcionarios disfrazados) criticaron duramente la nueva \"inquietud y jactancia\" dentro del Partido. Los autores concluyeron con un tono amenazante: \"No importa quién sea, cualquier intento de sacudir la posición de liderazgo del Partido será solo un sueño de tontos\".\n\nLos observadores en el extranjero atribuyen unánimemente este cambio a la reciente Conferencia de Beidaihe. Este balneario veraniego del norte de China es un lugar donde los máximos dirigentes del PCCh se reúnen anualmente para unas vacaciones colectivas y discusiones privadas. También se invita a funcionarios senior retirados del Partido a Beidaihe, donde pueden disfrutar de la fresca brisa marina y, en ocasiones, ejercer de nuevo su influencia política. Se dice que en la Conferencia de Beidaihe, la facción conservadora dentro del Partido y los veteranos que no son optimistas respecto a Wang criticaron sus audaces reformas, lo que llevó a un cambio en el clima político.\n\nEn la posterior reunión pública central, Wang enfatizó la importancia de la unidad del Partido. Esto se ha interpretado como un compromiso temporal, pero se entiende ampliamente que incluso el propio Wang Yang es poco probable que detenga sus planes de reforma. El próximo periodo será un punto de inflexión crucial para el futuro y el destino de China."
 china.145.a: "Esto me recuerda a 1978..."
 china.146.t: "Día Nacional de la República Popular China"
 china.146.d: "El 1 de octubre se celebra el Día Nacional de la República Popular China, un feriado oficial dedicado a la declaración de la República Popular China por el presidente Mao Zedong. Esta festividad se conmemora desde 1950, cuando se celebró la primera celebración anual bajo el liderazgo del presidente. También marca el inicio de la Semana Dorada, un feriado de una semana. Este día se celebran festividades y conciertos en todo el país, aunque esto varía según el año; algunos años se celebran festivales extravagantes debido a la proximidad de la festividad del Pastel de Luna. Sin embargo, esto no siempre ocurre. En algunos años se celebra un gran desfile militar y un desfile. Se realizarán espectáculos de luces, fuegos artificiales y conciertos, así como eventos deportivos y culturales, en edificios gubernamentales decorados con temas festivos. Hong Kong y Macao también celebrarán el evento, mostrando plenamente la unidad china a pesar de las muchas diferencias entre nuestros países. Este día debe preservarse como un día para celebrar la nación china, su cultura, su pueblo y las instituciones que los sustentan, a medida que nuestro país avanza hacia el futuro."
 china.146.a: "¡Adelante!"
 china.147.t: "100 años del PCCh"
 china.147.d: "Hoy, 1 de julio de 2021, se conmemora el centenario del Partido Comunista de China. Tras años de preparación, que incluyeron la promoción de museos de historia relacionados con el Partido Comunista en todo el país, hemos comenzado la primera ronda de celebraciones en Pekín, con espectáculos de luces por todo el país, especialmente en Changsha, a finales de junio. La Administración Nacional de Cine encargó a los cines locales, compañías cinematográficas y productoras que proyectaran y promocionaran, a partir de abril, películas dedicadas a celebrar la historia del socialismo chino y la liberación de nuestro pueblo. Se colocaron pancartas y vallas publicitarias por toda la ciudad como un llamado a la acción para que el pueblo chino asistiera a las celebraciones, lo cual así sucedió.\n\nLa participación en el evento ha sido monumental, con el presidente Xi Jinping, acompañado por el primer ministro Le Keqiang, el ex secretario general Hu Jintao y miembros del Comité Permanente del Politburó, pronunciando un discurso de una hora cerca de la plaza de Tiananmén para anunciar una nueva era para el socialismo con características chinas. En medio de este discurso, hemos dado al mundo una demostración de fuerza, reiterando que cualquier fuerza extranjera que intentara menospreciar a China sufrirá una sangría en la cabeza frente a la Gran Muralla de Acero construida con la carne y sangre de más de 1.400 millones de chinos que conforman nuestra nación. Desafortunadamente, el esperado desfile militar fue cancelado, aunque se mostró al mundo un desfile aéreo en plena exhibición."
 china.147.a: "¡Un brindis al Siglo Chino!"
 china.148.t: "Protestas contra Xi Jinping"
 china.148.d: "Es tarde por la noche, pero lejos de ser tranquilo para una metrópolis china de 10 millones de habitantes. En los callejones del antiguo distrito de la ciudad, se está celebrando un servicio conmemorativo. Los participantes, todos con velos negros envueltos alrededor de sus brazos izquierdos y sosteniendo velas, se acercan a un podio temporal para expresar sus condolencias por los familiares que murieron en la guerra de Taiwán. Los tristes sollozos de la gente gradualmente se convierten en rugidos de indignación justa: \"¡Xi Jinping, devuelve las vidas de mis seres queridos!\" Tales gritos se pueden escuchar en toda la ciudad esta noche.\n\nAl otro lado de la ciudad, en la ciudad universitaria, estudiantes radicales han roto los muros del campus y han salido a las calles. Estos estudiantes tienen diferentes orígenes y opiniones diversas, pero todos comparten un profundo odio hacia las necias aventuras militares del Partido. Los estudiantes llevan pancartas blancas con grandes letras rojas que dicen: \"¡Abajo el Partido Comunista! ¡Abajo Xi Jinping!\". Muchos también marchan con retratos de Xi Jinping y otros líderes, cuyos rostros antes dignos están desfigurados con símbolos blasfemos en tinta roja.\n\nEn el centro de mando del departamento de policía de la ciudad, el jefe mira con gran enfado la pantalla gigante frente a él. La pantalla muestra varias \"revuelvas\" que ocurren por toda la ciudad. Cuando vio en la pantalla a un grupo de manifestantes arrojar al suelo una estatua marioneta de Xi, cortarle la cabeza y prenderle fuego, el jefe se volvió hacia su adjunto y dijo..."
 china.148.a: "\"Debemos arrestarlos a todos; de lo contrario, mañana nos arrestarán a nosotros\"."
 china.149.t: "El Partido en alboroto"
 china.149.d: "En una sala de conferencias herméticamente cerrada de Zhongnanhai, Xi Jinping está manteniendo una reunión con varios de sus colaboradores más cercanos. Fue en esta misma sala, tiempo atrás, donde Xi dio la orden de ejecutar el plan de guerra contra Taiwán.\n\n\"Nuestro país está diplomáticamente aislado, camarada presidente. Empezar la guerra ha dañado gravemente nuestra imagen internacional, y la derrota ha hecho que nuestro país sea menospreciado más a menudo de lo habitual; muchos embajadores ya han presentado su dimisión\", dijo el ministro de Asuntos Exteriores con un tono amargo.\n\n\"El ejército también está desmoralizado\", añadió el vicepresidente de la Comisión Militar Central con un tono lloroso, perdiendo toda la confianza que tenía antes de que comenzara la guerra. \"Varias unidades casi han amotinado, con comisarios del Partido y comandantes culpándose mutuamente\".\n\nEl director de la Oficina Central se levantó para informar con una expresión exasperada pero desesperanzada en el rostro: \"La situación más preocupante se ha dado dentro del Partido: los miembros de base están soportando gran parte de la presión de los esfuerzos de estabilización con muchas quejas. En la cúpula, muchas facciones de cuadros marginados están empezando a conspirar para desafiar tu autoridad\".\n\nXi sintió un dolor curioso en la cabeza y se frotó las sienes. Ya había tenido que tragar la amarga píldora que resultó de su propia miopía. Y sus subordinados de mayor confianza no le habían sido de ayuda en ese sentido."
 china.149.a: "¿Alguien sabe realmente qué hacer?"
 china.150.t: "Renuncia del Comité Permanente"
 china.150.d: "Como si la situación actual en China no fuera ya lo suficientemente caótica, una noticia reciente publicada por People's Daily, Guangming Daily, Global Times y otros medios ha dejado de nuevo atónita a la nación: el actual Comité Permanente de la Asamblea Popular Nacional ha anunciado su \"renuncia colectiva\" y pronto organizará una nueva elección. Un portavoz de la APN declaró que la decisión se basaba en \"necesidades políticas específicas, expectativas del pueblo y opiniones voluntarias de los representantes\" y que se hacía \"de acuerdo con los procedimientos democráticos\".\n\nAunque la APN no ejerce realmente mucho poder, su Comité Permanente ostenta teóricamente la máxima autoridad sobre el personal. Tiene el poder de nombrar y destituir a una serie de líderes nacionales, incluyendo al primer ministro y al presidente. Esto significa que los líderes del país también pierden automáticamente sus cargos hasta que se celebre una nueva elección de la APN. También implica que Xi y sus colegas pierden temporalmente su legítimo poder para representar al país y dirigir las agencias gubernamentales. Obviamente, esto supone un gran revés para Xi, y muchos empiezan a sospechar que se trata de un contraataque bien orquestado por la oposición dentro del partido."
 china.150.a: "¿Ha cambiado la atmósfera?"
 china.151.t: "El faccionalismo en el PCCh claro y desenfrenado"
 china.151.d: "Los ciudadanos de la capital suelen ser los primeros en percibir cambios delicados en las situaciones políticas, por lo que tienden a mostrarse indiferentes ante las intrigas internas del Gobierno. Pero ahora, incluso los pekineses están comentando las últimas noticias con tono nervioso: el recién anunciado \"aplazamiento\" de la elección de un nuevo Comité Permanente de la APN y la convocatoria de la sesión plenaria de la APN. Se dice que la decisión fue tomada por el Comité Permanente del Politburó del Comité Central, el poder supremo de facto del país.\n\nLa división en el liderazgo colectivo se ha convertido en un hecho conocido, ejemplificado por una serie de cambios en las políticas, incluyendo el aplazamiento temporal de la sesión de la APN. Además, varios periódicos y canales de televisión controlados por el Partido han empezado a expresar opiniones contrapuestas de manera descontrolada, y los Gobiernos locales están perdiendo gradualmente el miedo a la autoridad del Gobierno central. En cuanto a los 90 millones de miembros ordinarios del Partido, hace tiempo que se han quedado sin liderazgo y dispersos."
 china.151.a: "La calma antes de la tormenta..."
 china.152.t: "Declaración del \"Camino de Transformaciones Integrales\""
 china.152.d: "Al igual que los sinuosos pasillos de la Ciudad Prohibida, la política china ha sido durante mucho tiempo considerada misteriosa y opaca. Sin embargo, el nuevo liderazgo del Partido Comunista de China ha disipado esta idea con sus acciones prácticas, sorprendiendo al mundo.\n\nPoco después de ser elegido secretario general, Wang Yang ofreció una rueda de prensa en el Salón Qinzheng en Zhongnanhai. En la reunión, Wang habló extensamente sobre sus planes de reforma ante numerosos periodistas chinos y extranjeros. Subrayó que promovería la \"modernización de las capacidades de gobernanza\" en China mediante acciones prácticas, dando prioridad a la \"civilización política democrática socialista\". Esto anunció de manera efectiva que el PCCh iniciaría un nuevo plan de reforma política. Wang también mencionó que había sido recibido y alentado por Deng Xiaoping cuando era alcalde de Tongling, lo que se ha interpretado como que Wang se posiciona como el verdadero heredero de la Reforma y Apertura.\n\nEl mundo entero quedó asombrado por la audaz declaración política de Wang Yang. Muchos afirmaron que sería el primer paso hacia la liberalización en China, mientras que otros creían que Wang siempre priorizaría hacer que China volviera a ser fuerte. Además, sus reformas podrían enfrentar una feroz oposición dentro del Partido. No obstante, el inmenso coraje político de Wang fue ampliamente elogiado."
 china.152.a: "Un soñador y un hacedor."
 china.153.t: "Línea dura enfadada por las inversiones externas"
 china.153.d: "El reciente discurso del vice primer ministro Lu Hao en el distrito de Pudong, Shanghái, enfatizando la importancia de mejorar el \"entorno empresarial\", ha desatado una feroz controversia.\n\nUn veterano usuario de un destacado foro izquierdista publicó un \"gran cartel\" con la imagen de un trabajador sucio y un titular impactante: \"¡Olvidad la justicia, y pronto el capital extranjero nos romperá la espalda!\" La crítica más intensa vino de los izquierdistas más veteranos, que ven la complacencia hacia los inversores extranjeros como una traición a los trabajadores y campesinos. Su Tieshan, una figura prominente, calificó sin rodeos las declaraciones de Lu como una muestra de \"falta de carácter\", declarando: \"Los verdaderos inversores valoran a los trabajadores diligentes y la eficiencia industrial; complacer al capital solo conduce a repetir errores pasados\".\n\nPor otro lado, algunos economistas ofrecieron una perspectiva más moderada. En su columna, el académico Lu Qiyuan escribió: \"Las lecciones de la reforma demuestran que atraer inversión extranjera no contradice el socialismo. La verdadera cuestión es asegurar que el capital sirva al pueblo.\" Mientras tanto, jóvenes internautas publicaron memes, incluyendo uno donde la cabeza de Lu Hao estaba editada sobre medio robot, con el pie de foto sarcástico: \"¿Entorno empresarial? ¿Nos presentamos a las elecciones, verdad?\"\n\nAunque las declaraciones de Lu recibieron duras críticas en línea, parecen haber comprado tiempo valioso para el Gobierno. Informes sugieren que varias empresas extranjeras han pospuesto sus retiradas previamente planeadas. Un funcionario explicó: \"Estabilizar el capital extranjero es solo el primer paso; el objetivo es construir un nuevo modelo de relaciones económicas internacionales\".\n\nSin embargo, el debate continúa. En la sección de comentarios de Utopía, un anciano comentó: \"Hemos estado obsesionados con el PIB durante demasiado tiempo. Es hora de replantear nuestro camino de desarrollo\"."
 china.153.a: "Las balanzas de la historia están cambiando."
 china.154.t: "Problemas iniciales"
 china.154.d: "En el centro de mando de operaciones del Estado Mayor Conjunto, varios jóvenes oficiales del Estado Mayor se reunieron alrededor del escritorio de mando. Una pantalla integrada mostraba un mapa militar detallado de la isla de Taiwán a gran escala, con extensas anotaciones que comparaban la situación con el enemigo. Marcadores rojos y azules representaban los movimientos de ambos ejércitos. Tras el escritorio, un general escuchaba atentamente los informes de sus subordinados.\n\nUn coronel de las Fuerzas Terrestres entregó una pila de informes y comenzó: \"Camarada jefe, el Ejército cree que nuestras unidades blindadas deben estar más alertas contra el equipo antitanque enemigo. Además, la precisión de nuestros ataques con cohetes a través del estrecho es deficiente y requiere mejoras...\" Antes de que pudiera terminar, un comandante de la Armada del EPL lo interrumpió: \"La Armada ha detectado un aumento de la actividad submarina hostil en diversas aguas al noreste, noroeste y sureste de la isla de Taiwán. Necesitamos desplegar más fragatas y aviones antisubmarinos...\" Un mayor de la Fuerza Aérea añadió: \"Nuestros grandes escuadrones de drones y cazas también deben acelerar la modificación y reutilización de los aeropuertos de Taiwán...\"\n\nEl Jefe de Estado Mayor golpeó el escritorio con la mano y la sala quedó en silencio. Recogió los informes y declaró solemnemente: \"Todos estos asuntos son críticos. Informaré al presidente y al Politburó sobre cada uno de ellos\"."
 china.154.a: "Debemos aprender de esto."
 china.155.t: "Orden restablecido en el Tíbet"
 china.155.d: ""
 china.155.a: "Excelente."
 china.156.t: "Orden restablecido en Sinkiang"
 china.156.d: "Tras la derrota en la guerra de Taiwán, nuestro país atravesó un periodo de turbulencias. Las fuerzas separatistas en Sinkiang aprovecharon la oportunidad para incitar disturbios, intentando fragmentar la nación y crear caos. Sin embargo, bajo el puño de hierro de nuestro ejército, estos elementos rebeldes fueron finalmente aplastados, preservando la soberanía e integridad territorial del país.\n\nDesde Kasgar hasta Tumxuk, se pueden ver por todas partes lemas que promueven la unidad étnica y la ondeante Bandera Roja de Cinco Estrellas, afirmando la soberanía de nuestra nación sobre esta antigua tierra. Ahora, las principales ciudades de Sinkiang están reanudando de forma constante la producción y las actividades urbanas. Las organizaciones locales del Partido están activamente involucradas en los esfuerzos de reconstrucción, promoviendo continuamente la armonía social y la estabilidad.\n\nHoy, Sinkiang, esta tierra rica en historia pero llena de energía juvenil, se alza orgullosa con un espíritu renovado en la frontera occidental de nuestra nación."
 china.156.a: "Mil años de arenas giran en Tianshan, las campanas de la Ruta de la Seda llaman de nuevo a casa."
 china.157.t: "Sistema Nacional de Identificación en Internet"
 china.157.d: "Recientemente, las autoridades chinas anunciaron una nueva política para introducir una \"tarjeta de identificación en internet\". Esta nueva tecnología es un archivo electrónico cifrado emitido por las autoridades locales de seguridad pública, con el objetivo de promover la gobernanza social y mejorar los servicios policiales. Se basa en la \"Plataforma de Autenticación de Identidad Confiable\" del Ministerio de Seguridad Pública, que utiliza técnicas biométricas, como el reconocimiento facial, para identificar a los usuarios. Según la página oficial del Ministerio de Seguridad Pública (MSP), el sistema se ha probado en varias aplicaciones, incluyendo sitios web gubernamentales y foros públicos. Aunque el Gobierno chino promociona esto como otro ejemplo de gobernanza de alta tecnología y \"Nuevas Fuerzas Productivas\", se han planteado preocupaciones sobre el aumento del riesgo de filtración de información personal, y muchos intelectuales están preocupados por el mayor escrutinio y vigilancia en internet."
 china.157.a: "La tecnología puede ser una espada de doble filo."
 china.158.t: "Nueva Gran Épica del Partido"
 china.158.d: "¡Hoy, nuestro Partido está guiando a la nación china hacia un nuevo capítulo! A medida que avanzamos, es crucial que nuestro Partido reflexione y critique los errores del pasado. Solo a través de este proceso podremos seguir orientando a la nación china hacia su Gran Rejuvenecimiento. La historia la escriben los vencedores, y las narrativas del pasado han sido contaminadas por ideologías occidentales y las lamentaciones infundadas de la burguesía. Estas influencias negativas han oscurecido la verdadera agenda de nuestro Partido. Ahora, debemos despejar la niebla y revelar la verdad.\n\nLos Cinco Principios de Coexistencia Pacífica no son más que herramientas utilizadas por las potencias occidentales para obstaculizar nuestro ascenso. La nación china ha perseguido durante mucho tiempo la unificación y la liberación nacional, con el objetivo de establecer un nuevo orden centrado en la civilización china. El marxismo no es una importación extranjera de Occidente, sino un sistema de pensamiento profundamente arraigado en el antiguo suelo de China. Desde las reflexiones filosóficas de los sabios en las dinastías Shang y Zhou hasta los ideales sociales de figuras virtuosas a lo largo de la historia, la esencia del marxismo siempre ha brillado, demostrando su profunda conexión con la civilización china como el motor intelectual que impulsa el Gran Rejuvenecimiento de la nación china.\n\nDebemos escribir este nuevo capítulo de la historia en los genes de la nación china. Cada ciudadano chino debe saber quiénes somos, de dónde venimos y hacia dónde nos dirigimos. Esta gloriosa historia debe quedar grabada en el corazón de todos, marcada profundamente en su alma."
 china.158.a: "¡Larga vida al PCCh!"
 china.159.t: "Ola de fanatismo"
 china.159.d: "Desde la ciudad helada del norte, Harbin, hasta la ciudad de las flores del sur, Cantón, desde el Bund en Shanghái hasta Golmud en la meseta tibetana, una enorme ola de fervor nacionalista ha barrido China. Las calles y callejones están adornados con banderas rojas, con multitudes coreando consignas indignadas: \"¡Abajo el imperialismo japonés!\", \"¡Masacre de Nankín, sangre por sangre!\"\n\nEn medio de la multitud, los rostros jóvenes están sonrojados de emoción. Aunque no han vivido los sufrimientos del pasado, han heredado una profunda pasión patriótica de sus padres, los libros de texto y la internet. Algunos llevan pancartas con consignas extremas como \"Dejad las islas, pero no al pueblo\".\n\nEn Shaoshan, Hunan, la ciudad natal del presidente Mao, decenas de miles llevan gorras con la estrella roja y chapas de Mao. Cantan canciones rojas y portan pancartas que proclaman: \"¡Abajo todos los perros falderos del imperialismo!\" Algunos descendientes de los Duros incluso visten los uniformes de aquella época, agitando los Pequeños Libros Rojos y gritando: \"¡Viva el presidente Mao!\" y \"¡Abajo el imperialismo! ¡Abajo los bandidos japoneses!\"\n\nEl Gobierno local parece haber aprobado tácitamente las manifestaciones, sin tomar medidas para dispersarlas. Los medios oficiales han cubierto los eventos con titulares como \"Entusiasmo patriótico en su punto más alto\" y \"Recordar la historia, nunca olvidar la humillación nacional.\""
 china.159.a: "Toda China es como una olla de agua hirviendo a punto de estallar..."
 china.160.t: "La muerte del sueño socialista chino"
 china.160.d: "Desde el inicio de la Reforma y Apertura, la ideología de la \"Nueva Izquierda\" se ha arraigado silenciosamente dentro del Partido. Bajo el disfraz del lema \"el pueblo\", en realidad buscan perturbar la estabilidad y obstaculizar el desarrollo. Su esencia radica en intentar arrastrar a China de vuelta a una época de pobreza y atraso.\n\nLa Nueva Izquierda se disfraza con la retórica del marxismo, pero defiende dogmas obsoletos, con el objetivo de sofocar la creatividad y vitalidad del pueblo chino con un pensamiento rígido. Ignoran los logros de la Reforma y Apertura, se burlan de la fuerza dinámica de la economía de mercado e incluso promueven la \"lucha de clases\", intentando incitar conflictos sociales y crear caos.\n\nPor lo tanto, debemos purgar resueltamente al Partido de los elementos de la Nueva Izquierda, eliminándolos sin piedad y evitando que causen más disturbios dentro del Partido. ¡Debemos fortalecer el liderazgo en el ámbito ideológico, oponiéndonos claramente a todas las falacias y guiando a los miembros y cuadros del Partido para avanzar sin titubeos por el camino del socialismo con características chinas! Debemos oponernos firmemente a todos los errores de izquierda y mantenernos comprometidos con el camino del socialismo con características chinas. Debemos continuar priorizando el desarrollo económico, defender la Reforma y Apertura, y adherirnos a la filosofía de desarrollo centrada en el pueblo."
 china.160.a: "Nunca permitiremos que se difame la Reforma y Apertura."
 china.161.t: "La muerte del sueño liberal chino"
 china.161.d: "En los últimos años, una perniciosa tendencia llamada \"liberalismo\" se ha extendido entre algunos miembros y funcionarios del Partido. Oculta bajo el manto de \"valores universales\", promueven conceptos occidentales como la \"democracia\" y la \"libertad\", con el objetivo de socavar el liderazgo central del Partido y erosionar nuestra base socialista. Estas personas utilizan nuevas plataformas mediáticas para difamar al Partido y a la nación, incitando al desorden social y tratando de subvertir nuestro gobierno.\n\nEl liberalismo es una mala hierba venenosa profundamente arraigada en la mente de algunos, que corroe sus creencias y sacude su postura política. Han perdido la fe en el marxismo, convirtiéndose en peones de fuerzas occidentales hostiles. ¡El camino hacia el Gran Rejuvenecimiento de la nación china no puede tolerar ninguna confusión ideológica!\n\nDebemos purgar resueltamente al Partido de los elementos liberales, eliminando estos tumores ideológicos para garantizar la pureza y el avance de nuestro Partido. Debemos oponernos firmemente al liberalismo, resistir la infiltración hostil occidental y salvaguardar la seguridad política y la estabilidad social de nuestra nación."
 china.161.a: "¡Sigan la dirección del PCCh!"
 china.162.t: "La Gran Nación China"
 china.162.d: "La nación china es heredera de 5.000 años de civilización, la cuna de la cultura del Este Asiático y la líder del Gran Rejuvenecimiento de Asia. Nuestra historia está llena de innumerables glorias, desde el Emperador Amarillo hasta el Emperador Yan, desde Qin Shi Huang hasta Mao Zedong. Generación tras generación de héroes y sabios han forjado el esplendor de la nación china con su sangre, sudor y sabiduría. ¡Nuestra cultura es profunda y vasta, brillando como las estrellas!\n\nNuestra civilización es antigua y duradera, nutriendo innumerables grandes inventos que muestran la sabiduría y creatividad del pueblo chino. Estos inventos han impulsado el progreso de la civilización mundial, situando a la nación china en la cima del logro global.\n\nSin embargo, nuestros países vecinos han buscado continuamente desafiar nuestra autoridad. Estudian e imitan nuestra cultura, ¡pero intentan socavar nuestra civilización! Sus ambiciones son ilimitadas, apuntando a apoderarse de nuestros recursos y pisotear nuestra dignidad. Los crímenes que cometieron en el pasado son demasiado numerosos para enumerarlos, y las guerras de agresión que nos declararon nunca serán olvidadas. Su arrogancia actual no puede ocultar su naturaleza baja y despreciable."
 china.162.a: "Aniquila a los japoneses, vence al enemigo y trae paz a las almas inquietas."
 china.163.t: "La telepantalla"
 china.163.d: "Bai Chengyun estaba tumbada en la cama, con la mirada fija en la pantalla de su ordenador, que mostraba una página de Epoch Times. Sentía como si hubiera abierto una puerta a un mundo nuevo, encontrándose con información que nunca antes había visto. Mientras leía, comenzaron a surgir dudas sobre la educación que había recibido; su comprensión del Partido, la nación y la historia se tambaleaba.\n\nDespués de un largo rato, Bai Chengyun finalmente apagó su ordenador, pero el sueño seguía sin llegar. Su mente reproducía los documentales que había visto antes, que mostraban cómo arrestaban a personas por usar VPNs. Una sensación de inquietud la corroía.\n\n\"No, no me van a pillar\", se tranquilizó Bai Chengyun. \"Soy solo una estudiante normal. Solo de vez en cuando salto el cortafuegos para leer las noticias. La policía no se fijará en mí\".\n\nMientras tanto, en la oficina de la División de Vigilancia Cibernética de la Oficina Municipal de Seguridad Pública, un joven oficial estaba sentado frente a un ordenador, con la mirada fija en los datos que aparecían en la pantalla. La pantalla mostraba los registros de actividad en línea de Bai Chengyun, junto con sus datos personales de identificación.\n\n\"Bai Chengyun, mujer, 22 años, estudiante universitaria. Recientemente ha accedido a sitios web extranjeros anti-China, sospechosa de difundir discursos contra China\", recitó el oficial en silencio para sí mismo. Cogió el teléfono y marcó un número."
 china.163.a: "\"Hola, Capitán Wang. He identificado a un individuo sospechoso. Necesitamos aumentar la vigilancia\"."
 china.164.t: "Vergüenza nacional"
 china.164.d: "La débil luz del sol de la mañana se filtraba en la habitación del hospital, proyectando un resplandor pálido sobre las paredes blancas, haciendo que el espacio se sintiera aún más frío. El señor Zhang, de 83 años, yacía inmóvil en la cama. Desde que supo de la muerte de su hijo en la guerra de Taiwán, se había derrumbado, sin palabras y sin moverse, con los ojos nublados fijos en el techo.\n\n\"¡Tienes que aguantar!\" le instaba su esposa, la señora Wang, secándose las lágrimas. \"Nuestro hijo se ha ido, pero aún me tienes a mí y a los nietos. ¡No te rindas!\" El señor Zhang permaneció en silencio, una sola lágrima resbalando lentamente por su mejilla. Su vida había estado llena de demasiado sufrimiento.\n\nRecordaba vagamente su infancia en un pequeño pueblo al pie del monte Changbai, donde fluía el serpenteante río Hun. La vida era pobre pero alegre. Sin embargo, tras el Incidente del Puente de Marco Polo, todo cambió. Recordaba llorar bajo la lluvia por sus padres, solo para encontrar cuerpos sin vida y la lluvia fría. Ahora, su hijo también había caído bajo las balas japonesas.\n\n\"Japoneses... otra vez...\" susurró el señor Zhang, con los labios temblando mientras luchaba por sentarse, solo para desplomarse débilmente de nuevo en la cama.\n\n\"Por favor, no te tortures así\", suplicó la señora Wang, con el rostro pálido de miedo mientras lo abrazaba, sollozando.\n\n\"¡Quiero venganza! ¡Mataré a esos malditos japoneses!\" rugió el señor Zhang, con sus frágiles puños temblando de furia, como una bestia herida que aúlla en la desesperación."
 china.164.a: "Si respondemos al mal con bondad, ¿qué ofrecemos a cambio de la virtud?"
 china.165.t: "La gente siempre me pregunta si conozco a Tyler Durden."
 china.165.d: ""
 china.165.a: "..."
 china.166.t: "El Grupo Beidahuang reunifica China"
 china.166.d: ""
 china.166.a: "Interesante."
 china.167.t: "Salvar la situación"
 china.167.d: "A pesar de nuestras extensas preparaciones, motivación inquebrantable, formidable fuerza militar y la mayor economía del mundo, hemos sufrido una derrota aplastante contra los separatistas taiwaneses y sus aliados.\n\nNuestros enemigos, contra todo pronóstico, repelieron nuestros esfuerzos de liberación, obligando a nuestro ejército a retirarse caóticamente a través del estrecho de Taiwán. Las consecuencias han sido devastadoras. Nuestro ejército, gravemente debilitado por el conflicto, lucha con una moral baja y una preparación para el combate insuficiente. El impacto económico es igualmente grave, ya que las sanciones han agravado nuestra situación y han ahuyentado a inversores, empresas privadas y grandes industrias extranjeras preocupadas por la estabilidad de sus inversiones en China. La respuesta pública también ha sido severa. A pesar de los intentos por minimizar y suprimir las noticias de nuestra derrota, han estallado protestas masivas que exigen la dimisión de Xi Jinping y del gabinete. La magnitud de estas protestas ha desbordado a la policía local y, con nuestro ejército aún en desorden, sólo la Policía Armada Popular y varios grupos paramilitares pueden ofrecer apoyo. Dada la escalada de violencia, el aumento de las multitudes y nuestras fuerzas de respuesta probablemente poco preparadas, el riesgo de incidentes mortales es alto.\n\nEl camino hacia la recuperación será sin duda tumultuoso, y las divisiones internas podrían llevar a algunas facciones dentro del Gobierno a considerar acciones drásticas. Especialmente preocupantes son los militares y los sectores más duros dentro del PCCh, que, una vez asimilen la derrota, podrían sentirse tentados a dar un golpe de Estado. Aunque por ahora sólo son especulaciones, nuestro enfoque debe estar en planificar los próximos pasos mientras garantizamos la seguridad de nuestro Gobierno frente a amenazas tanto internas como externas."
 china.167.a: "¡La recuperación debe comenzar ahora!"
 china.168.t: "Nuestro patrimonio histórico"
 china.168.d: "Desde 1840, esta tierra, rica en historia, ha sido reducida a un cordero esperando el sacrificio, mientras las potencias occidentales codiciosamente se apoderaban de nuestra riqueza y pisoteaban nuestra dignidad. Buscaron dividir nuestra patria en innumerables pedazos, como un suculento pastel, con nuestro pueblo convirtiéndose en esclavo de sus caprichos. El estallido de la Revolución de Xinhai marcó la muerte del sistema imperial, pero no cambió por completo el destino de China. Los conflictos entre caudillos, la interferencia extranjera y la fragmentación del país persistieron. Las potencias extranjeras nunca abandonaron sus planes de dividir China, usando a los caudillos como peones, con China como su tablero de ajedrez y la vida de innumerables chinos como sus apuestas.\n\nA pesar de la invasión del imperialismo japonés, nunca perdimos la esperanza. Bajo el liderazgo de nuestro Partido, aplastamos a los invasores, poniendo fin al siglo de la humillación y logrando la independencia nacional. El pueblo finalmente se convirtió en dueño de su propio destino. Emprendimos un camino de autosuficiencia y trabajo duro, superando al bloqueo imperialista liderado por Estados Unidos, y logrando hazañas notables que hicieron que el pueblo chino se levantara de nuevo, orgulloso entre las naciones del mundo.\n\nAhora, las fuerzas extranjeras regresan, buscando una vez más dividir nuestra tierra. Pero ya no somos la nación débil que una vez explotaron. No toleraremos su interferencia. Con fuego y furia, defenderemos nuestra patria, siempre nos mantendremos firmes, ¡una fuerza inquebrantable en el Este!"
 china.168.a: "El Feng danza, subiendo y bajando. El Huang canta, con el fluir del dolor."
 china.169.t: "En la Plaza de Tiananmen"
 china.169.d: "En la Plaza de Tiananmén, una gran manifestación estaba en pleno apogeo. La plaza estaba llena de gente, ondeando banderas rojas y con cánticos ensordecedores que resonaban por toda la antigua capital. Algunos en la multitud vestían réplicas de uniformes de la Guardia Roja de los años 60, agitando el \"Pequeño Libro Rojo\", mientras otros sostenían pancartas protestando contra Japón. Desde la puerta de Tiananmén, Li Zuocheng, vestido con uniforme militar, contemplaba el mar de personas antes de acercarse al podio.\n\n\"¡Camaradas, conciudadanos!\" La voz de Li Zuocheng, amplificada por los altavoces, se extendió por cada rincón de la plaza. \"Hoy es un gran día para el rejuvenecimiento de la nación china, pero también uno de los momentos más graves en la historia de nuestro país. Ha pasado más de un siglo desde la tragedia nacional de la primera guerra sino-japonesa. En esos largos años, nuestro país soportó innumerables dificultades, sufriendo invasiones de enemigos extranjeros y la explotación de capitalistas. Para mantener lo que llamaban paz, nos vimos obligados a soportar humillaciones y a luchar por sobrevivir en silencio. ¡Hoy, Japón y sus aliados imperialistas buscan repetir esa tragedia! ¡Quieren impedir la inevitable unificación de China! Pero con una voluntad de hierro y la fuerza de 1.400 millones de personas unidas, ¡nuestra nación no temerá el dolor! ¡El puño de hierro de nuestro ejército aplastará a las fuerzas imperialistas! Por la presente declaro que nuestra nación lanzará la gran guerra de liberación contra el poder imperialista de la OTDP\"."
 china.169.a: "¡Arrasa Tokio, lleva al Tennō a juicio!"
 china.170.t: "Cuando Marx se encuentra con Confucio"
 china.170.d: "\"...Profesor Li Xuejun, todos sabemos que el marxismo se considera típicamente originario de la Europa del siglo XIX. Sin embargo, usted ha sugerido que las raíces del marxismo se encuentran en China. ¿Por qué ha llegado a esta conclusión?\"\n\n\"Creo que los orígenes ideológicos del marxismo pueden rastrearse hasta los periodos de las primaveras y otoños y de los reinos combatientes en China\".\n\n\"¿Entonces está diciendo que el movimiento socialista en China apareció incluso antes que en Occidente?\"\n\n\"Exactamente. El periodo de las primaveras y otoños fue una época de intensa actividad intelectual y cultural en la historia china. El pensamiento confuciano, por ejemplo, aboga por el concepto de «el mundo como un bien común» y busca una «gran unidad». Estas ideas guardan un parecido sorprendente con la sociedad comunista que promueve el marxismo\".\n\n\"¿Está sugiriendo que el confucianismo contiene las semillas del socialismo?\"\n\n\"Se podría decir eso. Una de las ideas centrales del marxismo es la «liberación de toda la humanidad», y el confucianismo también enfatiza la «humanidad» y la «gran unidad». La visión de Marx de una sociedad comunista es, en esencia, una versión moderna de la «gran unidad» del confucianismo. El pensamiento confuciano influyó en la ilustración intelectual en Europa, que condujo a la Revolución Francesa. Sin embargo, hoy en día, la mayoría de los políticos occidentales solo mencionan a Marx y no a Confucio. Esto es típico de la tendencia occidental a apropiarse de ideas de otras civilizaciones sin reconocimiento...\""
 china.170.a: "Una entrevista interesante."
 china.171.t: "Nuestra ira"
 china.171.d: "En la calle Wanshan de Shanghái, frente al Consulado General de Japón, una fila de policías armados se mantenía firme, conteniendo a la multitud que avanzaba con fuerza. Cientos de nacionalistas, ondeando pancartas y carteles, formaban una protesta masiva. En la primera fila, un hombre de mediana edad, con la voz ronca de la rabia, blandía un megáfono, condenando incansablemente las atrocidades pasadas de Japón. \"¡Olvidar la historia es traición!\" gritaba con todas sus fuerzas. \"¡Los japoneses son bestias! ¡No merecen vivir en este mundo! ¡Deberíamos exterminarlos y hacer que paguen su deuda de sangre!\"\n\nDentro del consulado, el embajador japonés Akamatsu Shuichi observaba con expresión grave, su mirada fija en la masa enfurecida a través del grueso cristal. A medida que las olas de furia afuera se hacían más fuertes, su mano temblaba ligeramente, una mezcla de inquietud y miedo que le invadía. La magnitud e intensidad de la protesta le preocupaban profundamente: si la multitud perdía el control, si la policía no podía contenerla, si asaltaban el consulado... Sacudió la cabeza con fuerza, obligándose a disipar esos pensamientos aterradores.\n\n\"Embajador, ¿qué debemos hacer?\" preguntó en voz baja Keiichi Takenaka a su lado. Akamatsu respiró hondo, intentando calmar sus nervios. \"Contactar inmediatamente con el Ministerio de Asuntos Exteriores chino y exigir un aumento de la presencia policial para garantizar la seguridad del consulado\", dijo con voz firme."
 china.171.a: "\"Y reporta la situación con precisión a nuestro Gobierno\"."
 china.172.t: "Nueva China Digital"
 china.172.d: "En esta tierra ancestral, cada centímetro de suelo está equipado con sensores como nuestro tacto, cada cámara como nuestros ojos, y el dispositivo móvil de cada ciudadano como las terminaciones nerviosas de nuestra vasta red. Hemos creado una sociedad digital totalitaria sin precedentes. En este reino, no hay crimen ni disidencia. Cada ciudadano funciona como una pieza en una máquina finamente ajustada, operando con precisión bajo el liderazgo del Partido, contribuyendo al Gran Rejuvenecimiento de la nación china.\n\nNuestro pueblo ya no está contaminado por las ideologías decadentes de Occidente. Sus espíritus han sido purificados por el patriotismo y los valores fundamentales del socialismo. Nos aman, como los hijos aman a sus padres, como los creyentes veneran a sus deidades. Ahora que hemos erradicado a los enemigos internos, ha llegado el momento de lavar nuestras humillaciones pasadas con sangre.\n\nUsaremos su sangre para honrar las almas perdidas en la masacre de Nankín, y sus cabezas para vengar a las mujeres que violaron. ¡Limpiemos un siglo de vergüenza con sangre y fuego, y recibamos el Gran Rejuvenecimiento de la nación china con victoria y gloria!"
 china.172.a: "¡Nuestra bandera pronto ondeará en la cima del Monte Fuji!"
 china.173.t: "La incursión de Shanghái"
 china.173.d: "Hoy muchos habitantes de Shanghái fueron despertados al amanecer por el sonido de vehículos pesados circulando por las calles, puertas siendo derribadas y, en ocasiones, incluso disparos. Más tarde, el Gobierno anunció la \"conclusión exitosa de una operación conjunta del MSE y PAP para arrestar a varios elementos traidores peligrosos en Shanghái\", afirmando que alrededor de 300 sospechosos han sido capturados. Los medios internacionales han observado que la ubicación actual de un destacado político reformista, Wang Yang, es desconocida. Algo se puede decir con certeza: la facción reformista ha dejado de existir como un grupo político influyente."
 china.173.a: "Esto fue tan fácil como darle la vuelta a la mano."
 china.174.t: "Hu Chunhua escoltado fuera de la APN"
 china.174.d: "La última sesión de la APN terminó con un escándalo cuando hombres con uniforme militar entraron y escoltaron por la fuerza a Hu Chunhua fuera del edificio en medio del discurso de alguien. La declaración oficial del Partido Comunista afirmó que Hu Chunhua fue retirado porque se encontraba enfermo, aunque las grabaciones de las cámaras demuestran lo contrario. De todos modos, la sesión concluyó con una victoria decisiva para la facción revanchista y el desmantelamiento de facto de la oposición más dura."
 china.174.a: "Qué vista tan miserable."
 china.175.t: "Regreso de los partidos consultivos"
 china.175.d: "Recientemente, la Asamblea Popular Nacional y los partidos consultivos han reanudado sus actividades, marcando la primera restauración integral desde la interrupción causada por la crisis de Taiwán.\n\nEn la reciente Asamblea Popular Nacional celebrada en Pekín, participaron cerca de un centenar de representantes de los partidos consultivos. Propusieron y debatieron temas como la recuperación económica y la estabilidad social. La ANCDC sugirió un desarrollo económico regional coordinado, mientras que el PZGC se centró en los asuntos de los chinos en el extranjero, abogando por mantener las conexiones y el apoyo a los chinos en el exterior. El ambiente en la conferencia fue solemne y ordenado.\n\nMientras tanto, un portavoz del PCCh declaró en una rueda de prensa: \"El principio de coexistencia a largo plazo, supervisión mutua, cooperación sincera y compartir las alegrías y las penas permanece inalterable. La restauración del mecanismo de cooperación multipartidista es un paso significativo en la gobernanza nacional\". Se espera que esta cooperación vuelva a aportar perspectivas multifacéticas para la toma de decisiones.\n\nAdemás, expertos han señalado que las propuestas y los roles de supervisión de los partidos consultivos ya han mostrado impactos positivos en la práctica. Algunos observadores ven este cambio como una nueva señal de ajuste en el panorama político de China."
 china.175.a: "Unidos para forjar un nuevo capítulo."
 china.176.t: "Elecciones anticipadas"
 china.176.d: "En el complejo panorama internacional actual, el Gobierno ha anunciado unas elecciones anticipadas a nivel nacional. Las elecciones abarcan las regiones administrativas a nivel de condado y superiores, incluyendo elecciones piloto a nivel de municipio y base.\n\nLas elecciones emplean un sistema de votación diferencial, con candidatos de diversos orígenes. Más allá de los miembros del PCCh, los candidatos incluyen representantes de partidos consultivos, candidatos independientes, empresarios que regresan y académicos reconocidos. Los votantes pueden participar mediante sistemas de votación electrónica o papeletas tradicionales. El Grupo Central de Liderazgo Electoral enfatizó la importancia de garantizar procedimientos electorales transparentes y abiertos.\n\nCabe destacar que estas elecciones introducen por primera vez un sistema independiente de supervisión del voto, con representantes de los partidos consultivos supervisando de manera integral el proceso para garantizar la equidad y la justicia. A lo largo de la elección, los partidos consultivos demostraron un activismo sin precedentes. Los observadores sugieren que esto podría transformar fundamentalmente el ecosistema político de China."
 china.176.a: "¿Vientos de cambio?"
 china.177.t: "CR-KMT queda en segundo lugar"
 china.177.d: "El Grupo Central de Liderazgo Electoral ha anunciado recientemente los últimos resultados de la asignación de escaños, con el CR-KMT emergiendo como el segundo partido político más grande después del Partido Comunista de China. El CR-KMT ahora posee más del 15% de los escaños en la Asamblea Popular Nacional, lo que supone un aumento de casi 10 puntos porcentuales respecto al mandato anterior. Mientras tanto, otros partidos consultivos también han experimentado diversos grados de aumento en su representación.\n\nEn una rueda de prensa, el líder del CR-KMT declaró que continuarán defendiendo el principio de \"convivencia a largo plazo y supervisión mutua\" mientras cumplen su papel en la participación política y consulta. Los analistas políticos sugieren que el ascenso del CR-KMT refleja cambios en el ecosistema político de China y demuestra el apoyo del partido gobernante a una participación política diversificada."
 china.177.a: "¡Ese es mi Kuomintang!"
 china.178.t: "LDC queda en segundo lugar"
 china.178.d: "Los datos más recientes del Grupo Central de Liderazgo Electoral revelan que la LDC ha logrado consolidarse como el segundo partido más grande de China, asegurando el 12% de los escaños en la Asamblea Popular Nacional, una marca significativa del creciente influjo de la organización. La membresía de la LDC se ha vuelto cada vez más diversa, incluyendo ahora a académicos, educadores y personal técnico profesional de todo el país.\n\nEn una rueda de prensa, el líder de la LDC destacó el papel continuo del partido como un grupo de reflexión, participando activamente en la formulación y supervisión de políticas nacionales. Subrayó el compromiso de la LDC con la promoción de la armonía social, el desarrollo económico y las reformas en los sectores educativo y tecnológico. Los observadores políticos señalan que el ascenso de la LDC refleja la evolución constante del ecosistema político chino y demuestra la determinación del partido gobernante de avanzar en las reformas del sistema político.\n\nEsta transformación señala la entrada del sistema de cooperación multipartidista de China en una nueva era."
 china.178.a: "Gran día para China."
 china.179.t: "Wang Yang visita Cantón"
 china.179.d: "Cantón...\n\nLa región que lanzó la carrera de varios jóvenes políticos, donde se han mostrado como gestores hábiles y políticos talentosos. Wang Yang estuvo entre ellos. De 2007 a 2012 fue secretario del Partido Comunista regional. Llevó a Cantón a través de los momentos más difíciles de la crisis financiera de 2008, y también estuvo presente en sus momentos más brillantes de auge económico y financiero.\n\nWang Yang miraba a Cantón, la ciudad-fábrica del mundo que proporcionaba a miles de millones de personas en el planeta bienes de consumo necesarios y asequibles. Aquí podía ver claramente que Cantón se había convertido en el bastión de sus reformas. Aquí, la gente estaba más comprometida con las ideas de liberalización y democratización, revitalización mediante la eliminación de los peores elementos del Estado chino, mientras se tomaban lo mejor de otros países. ¿Quizás con más gente así China podría alcanzar la prosperidad con la que siempre ha soñado?"
 china.179.a: "Estamos a solo unos pasos."
 china.180.t: "El problema sin resolver"
 china.180.d: "Desde la partida de Xi Jinping, Wang Yang ha estado trabajando día y noche para sanar las heridas nacionales, restaurar la fuerza e imagen del país y devolver al pueblo la fe y el orgullo por su nación. Y, sin embargo, por muchas reformas que se impulsaran, por muchos funcionarios corruptos que se eliminaran, seguía habiendo un problema sin resolver que clavaba como un puñal en el corazón de cada ciudadano.\n\nEse problema se encontraba al otro lado del estrecho de Taiwán.\n\nNunca fue hablado abiertamente por Wang Yang ni por ninguno de sus aliados políticos, pero todos sabían que, con todas las conversaciones sobre reforma, apertura y cooperación mundial, llegaría el día en que los infantes chinos tendrían que reagruparse en Fujian y volver a intentarlo. No porque queramos la guerra, sino porque China no puede permanecer dividida.\n\nEsta noche en Fuzhou, Wang Yang reflexionaba una y otra vez sobre esto, recordando lo que ya se había logrado y evaluando todas las opciones que tenía. Sin embargo, un pensamiento estaba claro en su mente: el momento de actuar llegaría pronto."
 china.180.a: "Haremos lo que tengamos que hacer."
 china.181.t: "INFORME DE EJERCICIOS NAVALES"
 china.181.d: "DE: Almirante Li Yujie\nFECHA: [GetDateText]\n\nCamarada Wang,\nSegún sus órdenes, nuestras fuerzas navales abandonaron sus puntos de despliegue y comenzaron a dirigirse hacia el sector naval entre Japón y Taiwán para realizar patrullas y ejercicios de fuego real dentro de aproximadamente dos semanas. Las maniobras ya han sido un éxito en el sentido de que parece que los hemos tomado por sorpresa. La OTDP apenas ahora ha detectado nuestros movimientos y ha comenzado a movilizar de forma caótica una fuerza de respuesta."
 china.181.a: "Vamos a enseñarles su lugar."
 china.182.t: "INFORME DE SITUACIÓN COREANO"
 china.182.d: "DE: Comandante de la Fuerza Terrestre del Ejército Popular de Liberación Li Qiaoming\nFECHA: [GetDateText]\n\nCamarada Wang,\nNuestros colegas del Ejército Popular de Corea nos han advertido que han detectado que la OTDP está entregando suministros militares de forma encubierta a Corea del Sur y que la actividad militar cerca de la Zona Desmilitarizada ha aumentado notablemente. La RPD de Corea ha movilizado sus tropas en respuesta, y la frontera sino-coreana también está siendo reforzada por nuestro lado."
 china.182.a: "Obsérvenlos de cerca..."
 china.183.t: "INFORME DE ESTATUS"
 china.183.d: "DE: Vicepresidente de la Comisión Militar Central Zhang Youxia\nFECHA: [GetDateText]\n\nCamarada Wang,\nHace menos de una hora, las fuerzas navales de la OTDP atacaron nuestros barcos en las cercanías de Okinawa, dejándonos sin otra opción que devolver el fuego. Mientras se desarrolla una batalla naval en el mar de la China Oriental, también hemos recibido informes de tropas surcoreanas intentando tomar el control de la ZDC. Es seguro decir que la OTDP está llevando a cabo una operación militar a gran escala contra la República Popular China y nuestros aliados."
 china.183.a: "¡Replicad con toda la fuerza de inmediato!"
 china.184.t: "¿Ahora qué?"
 china.184.d: ""
 china.184.a: "El polvo finalmente puede asentarse."
 china.184.b: "¿Puede finalmente asentarse el polvo?"
 china.185.t: "Los partidos consultivos exigen elecciones"
 china.185.d: "En la reciente convención extraordinaria de la Asamblea Popular Nacional, los líderes de los partidos consultivos se acercaron primero a Wang Yang y luego emitieron una declaración conjunta sobre la situación actual en China. Aunque los puntos de vista de los partidos a menudo diferían de manera bastante radical, esta vez los dejaron de lado para decir una frase al Partido Comunista y al pueblo:\n\"La flor de la reforma de Wang Yang ha florecido. La República Popular China necesita una nueva ronda de elecciones nacionales multipartidistas\".\n\nEsta declaración causó tanto entusiasmo como conmoción. Aunque la sociedad china era ahora una de apertura, equidad y libertad, muchos aún veían este movimiento como un ultimátum para Wang Yang. Sin embargo, Wang Yang sabía que el país llegaría a este momento eventualmente y no perdió la cabeza. Cuando el Partido le pidió indicaciones, él respondió..."
 china.185.a: "La democracia fue nuestra promesa."
 china.185.b: "¡Que me quiten a estos idiotas de delante!"
 china.186.t: "¡Elecciones!"
 china.186.d: "Después de un largo periodo de discusiones en los medios y debates en la Asamblea Popular Nacional, finalmente se anunció la fecha de las elecciones. Cuando llegó el día, cientos de millones de votantes se pusieron en marcha para emitir su voto en nombre del futuro de China.\n\nLa esfera política de China ha experimentado muchas turbulencias en los últimos años. Sin embargo, sólo podía haber un ganador, aquel que finalmente recibiría la plena confianza del pueblo para liderar el país.\nPor eso, no fue sorpresa para nadie..."
 china.186.a: "¡El PCCh asegura una victoria fácil como siempre!"
 china.186.b: "¡El Kuomintang de izquierdas supera al PCCh!"
 china.186.c: "¡La Liga Democrática de China se asegura la mayoría!"
 china.187.t: "El fin de Wang Yang"
 china.187.d: "\"Él fracasó completamente al Partido y, por lo tanto, fracasó al pueblo de China...\"\n\"Actuó como un psicópata errático que creía tener la capacidad de...\"\n\"Por su absoluta incompetencia y fracaso...\"\n\nWang Yang estaba presente en el congreso de emergencia del PCCh, pero casi ninguna palabra le llegaba. Su mirada perdida se dirigía hacia uno de los lugares donde la pared chocaba con el techo.\n\n\"¿Qué pudo haber salido mal? Después de todo lo que se dijo y se hizo, el pueblo de China aún no eligió al Partido Comunista. Y sin embargo, si lo miras desde otro ángulo... ahora tenían el valor para hacerlo. Pero entonces... ¿realmente hemos fallado en nuestros objetivos? ¿Por qué me están reprendiendo entonces?\"\n\nDesafortunadamente, nadie podía leer sus pensamientos. La realidad era que el Partido Comunista de China perdería el poder en el país por primera vez en décadas, y con la pérdida del poder viene la pérdida de las herramientas y recursos por los que tantas personas respetables necesitaban y se unieron al partido.\n\nFinalmente, la decisión del congreso fue pronunciada por el orador:\n\n\"...excluir al ciudadano Wang del Politburó\"."
 china.187.a: "El Partido está ahora en buenas manos."
 china.187.b: "El Partido está ahora en mejores manos."
 china.188.t: "Inauguración del CR-KMT"
 china.188.d: "Se abrieron las puertas y la delegación del Comité Revolucionario del Kuomintang se enfrentó al sol. Cientos de periodistas rodeaban el edificio del Congreso y a lo lejos se podía ver una multitud inimaginable. No protestaban, no lloraban ni se quejaban, sino que vitoreaban al nuevo jefe del país.\n\nZheng Jianbang se acercó a las cámaras y comenzó a responder a las preguntas.\nReiterando los puntos del programa de su partido.\nHaciendo nuevas promesas.\n\nDe verdad, todo el país observaba y rugía. El Partido Comunista de China no ha sido el único poder en China desde hace un tiempo, pero a partir de hoy ya no es el dominante.\n\nAunque es difícil decir sin ironía que el Kuomintang fue alguna vez el poder gobernante, así que, ¿quién sabe? Quizá el PCCh también haga un regreso. Por ahora, sin embargo, la vieja \"dinastía\" termina y la nueva toma el mando."
 china.188.a: "Las cosas vuelven al principio."
 china.189.t: "Inauguración de la LDC"
 china.189.d: "Se abrieron las puertas y la delegación de la Liga Democrática de China se enfrentó al sol. Cientos de periodistas rodeaban el edificio del Congreso y a lo lejos se podía ver una multitud inimaginable. No protestaban, no lloraban ni se quejaban, sino que vitoreaban al nuevo jefe del país.\n\nDing Zhongli se acercó a las cámaras y comenzó a responder a las preguntas.\nReiterando los puntos del programa de su partido.\nHaciendo nuevas promesas.\n\nDe verdad, todo el país observaba y rugía. El Partido Comunista de China no ha sido el único poder en China desde hace un tiempo, pero a partir de hoy ya no es el dominante.\n\nY mientras el sol salía, las decisiones de Wang Yang empezaban a reflejarse en la tierra china. Quizá algún día el PCCh vuelva a resurgir. Por ahora, sin embargo, la vieja \"dinastía\" termina y la nueva toma el mando."
 china.189.a: "China espera algo nuevo."
 china.190.t: "El fin de la Primavera"
 china.190.d: "Después de un breve periodo de discusiones en los medios y debates en la Asamblea Popular Nacional, se cerró el caso del ultimátum de los pequeños partidos. La palabra \"elecciones\" desapareció de los medios estatales y decenas de manifestaciones en las mayores ciudades de China fueron recibidas con agua hirviendo, humo y granadas aturdidoras.\n\nAl final, todas las conversaciones sobre democracia, ascensos sociales y libertad no eran más que una tapadera para la oligarquía que surgió justo después de que Wang Yang llegara al poder. Decenas de miles de sus designados, colaboracionistas y simplemente funcionarios corruptos trabajaban ahora para consolidar la posición actual de China.\n\nAhora que las corporaciones habían encontrado un lugar adecuado donde se sentían más cómodas, nunca dejarían pasar la oportunidad de que el PCCh o Wang Yang volvieran a ser algo más que simples figuras de cartón para sus programas de control sobre el resto de China, ahora que la economía y las finanzas estaban en sus manos.\n\nEl pueblo chino todavía disfrutaba de muchas más libertades y oportunidades que antes, aunque solo hasta cierto nivel. ¿Será recordado Wang Yang como un libertador o será maldecido por la historia por su indecisión a la hora de terminar el trabajo?\n\nQuizás solo el tiempo lo dirá."
 china.190.a: "A todas las preguntas no habrá respuesta."
 china.191.t: "Nueva sesión del PCCh"
 china.191.d: "Mientras Wang Yang se ajustaba la corbata brillante, su mente también brillaba con pensamientos optimistas. Después de tanto tiempo, la reforma del Partido estaba completa. Se había convertido en una recopilación de todo tipo de ideas expresadas por el pueblo de China. Nunca antes en la historia había visto China florecer tantas ideas al mismo tiempo.\n\nTras algunos preparativos, Wang Yang finalmente entró en el salón del congreso, acompañado por los estruendosos aplausos de miles de delegados. Hoy, cada plataforma presentaría su programa ante el congreso y la votación decidiría cuál dirigiría la República Popular en los próximos años.\n\nAhora que esos días decisivos habían concluido, Wang Yang estaba listo para anunciar el resultado:"
 china.191.a: "No arreglemos lo que ya funciona."
 china.191.b: "La izquierda de la Plataforma Social toma el control."
 china.191.c: "La derecha de la Plataforma Social toma el control."
 china.191.e: "La plataforma emprendedora es la que mejor se ve."
 china.191.f: "El ala reformista es victoriosa."
 china.192.t: "Brisa de primavera"
 china.192.d: "Después de la lluvia, aún persistía un ligero frío en el aire de Shanghái, pero la escena bulliciosa a lo largo del río Huangpu era tan vibrante como siempre. Wang Yang se encontraba en lo alto de la imponente Torre de Shanghái, mirando hacia abajo los interminables flujos de tráfico y las filas de rascacielos que simbolizaban la vitalidad de la ciudad. Tras décadas en la política, había superado innumerables tormentas y sido testigo de mareas interminables de cambios, pero en ese momento sentía una sensación de tranquilidad sin precedentes.\n\nEn comparación con el pasado, el ambiente interno se estaba volviendo cada vez más abierto. En las plataformas en línea, los jóvenes expresaban libremente sus opiniones; en las esquinas de las calles y callejones, los ciudadanos comunes debatían sobre asuntos actuales y política sin el temor de que esas conversaciones pudieran atraer la atención no deseada de las autoridades. Incluso dentro del sistema, la transparencia parecía estar en aumento. Se decía que algunos funcionarios habían comenzado a relacionarse con el público de una manera más abierta y transparente. En algunas regiones, los Gobiernos locales incluso exploraban mecanismos de toma de decisiones democráticas más profundos. Ahora, el poder ya no era el juguete de unos pocos, sino que operaba bajo la luz del sol, sujeto al escrutinio público.\n\nPara Wang Yang, quizás la democracia china estaba finalmente viendo su primera primavera."
 china.192.a: "Los vientos de primavera devuelven la vida a las orillas de Jiangnan."
 china.193.t: "\"Tengo un sueño\""
 china.193.d: "Wang Yang dejó los documentos que tenía en la mano y se frotó los ojos cansados. Afuera, el canto de los pájaros contrastaba con el zumbido lejano de la ciudad, como si pertenecieran a dos mundos separados. Se levantó y caminó hacia la ventana, contemplando la antigua capital que tenía delante.\n\nEn su momento, el despotismo había sido una cadena invisible que restringía los pensamientos y acciones del pueblo. Pero ahora, ese viejo y decadente sistema había llegado a su fin, como un anciano en el ocaso de su vida, incapaz de adaptarse a la nueva era. Sin embargo, los conservadores en el poder se aferraban desesperadamente al viejo orden, resistiéndose a la ola de reformas. Intentaban sofocar el impulso del cambio antes de que pudiera arraigar. Pero al final, el pueblo eligió la libertad. Ahora, por fin, tenían la oportunidad de cumplir sus sueños largamente anhelados.\n\nVolvió a su escritorio, y su mirada se posó en la pila de documentos frente a él: planes para la reforma política. Sabía que una vez que esta propuesta se lanzara, causaría un gran revuelo. Pero Wang Yang también entendía que el camino hacia la reforma nunca sería fácil. Para guiar verdaderamente a China hacia la democracia y el Estado de derecho, había que afrontar ese \"hueso duro\". Tomó su bolígrafo y firmó solemnemente el documento."
 china.193.a: "Es hora de dejar entrar al nuevo pájaro."
 china.194.t: "Libertad religiosa"
 china.194.d: "Zaxi Ciren viajó desde su ciudad natal en Shigatse, no solo para completar su peregrinación, sino también para ser testigo de los cambios en el Monasterio de Sera. De vuelta en el pueblo de Pajong, había oído rumores sobre sutiles cambios en las políticas religiosas del Gobierno. Era escéptico; después de todo, creció escuchando historias de sus mayores sobre las dificultades del antiguo Tíbet y había presenciado los cambios significativos en su ciudad bajo el liderazgo del Partido. En el fondo, todavía creía en el Partido y en el Gobierno.\n\nAl subir por el camino de piedra, notó algo inusual al llegar a la puerta del monasterio: los lemas que solían estar en la vegetación habían desaparecido. ¿Podrían ser ciertos los rumores? Aceleró el paso hacia el monasterio. Los monjes seguían vistiendo sus túnicas carmesí, las estatuas del Buda continuaban mirando hacia las montañas nevadas; todo parecía igual. Pero entonces vio a monjes quitando el lema \"Unidos alrededor del Partido Comunista de China\" de las paredes. Acercándose a un monje anciano que tomaba el sol, lo saludó respetuosamente y preguntó: \"Viejo Aba, ¿por qué están quitando estos lemas?\"\n\nEl monje sonrió. \"Puede que no lo sepas, pero las políticas han cambiado. El Partido dice que ahora respeta más nuestras creencias. Las antiguas políticas obligatorias se están ajustando para adaptarse a nuestras necesidades, y somos libres de expresar nuestras opiniones. Creo que no pasará mucho tiempo antes de que el Partido deje de restringirnos por completo\"."
 china.194.a: "El mundo es una ilusión; no culpes, no guardes rencor."
 china.195.t: "La gira de Wang Yang"
 china.195.d: "Nadie sabe exactamente cuándo el noroeste de China empezó a ser visto como un bastión del conservadurismo. Es como si, en esta tierra donde se entrelazan el loess y el desierto, las semillas de la democracia nunca pudieran echar raíces, y las arenas movedizas enterraran cualquier esperanza de cambio. Sin embargo, para Wang Yang, esta gira de inspección podría ser el momento para evaluar el impacto de sus políticas.\n\nEn Qinghai, vio a pastores que ya no permanecían en silencio, sino que valientemente daban un paso adelante para ofrecer opiniones sinceras sobre las fortalezas y debilidades de las políticas. En Gansu, presenció a agricultores liberándose de ataduras pasadas y participando activamente en las elecciones locales de base. En Sinkiang, observó cómo se protegían plenamente los derechos religiosos de los musulmanes, con las sombras del pasado barridas.\n\nEl loess sigue siendo pesado y frío, el desierto aún árido y desolado, pero la esperanza enterrada profundamente bajo las arenas acabará floreciendo."
 china.195.a: "El sol volverá a salir."
 china.196.t: "Largo camino por delante"
 china.196.d: "Era tarde por la noche, pero las luces del Salón Xihua en Zhongnanhai aún brillaban a través de la celosía de la ventana, proyectando sombras sobre el antiguo manzano del patio. Wang Yang estaba sentado bajo el árbol, sosteniendo una copia abierta de \"El Antiguo Régimen y la Revolución\", pero su mirada vagaba, desenfocada en las páginas. Acababa de terminar un día de trabajo, procesando montones de documentos, pero el agotamiento en su cuerpo no podía apagar el torrente de pensamientos en su mente.\n\n\"Libertad\", esta palabra había ardido como una llama en su corazón durante la mayor parte de su vida. Ahora, él y sus compañeros reformistas habían roto finalmente el ciclo milenario del Gobierno autoritario, plantando las semillas de la libertad en esta tierra, marcada por las mareas de la historia. La antorcha de la democracia se había encendido una vez más, brillando intensamente en el corazón de cada ciudadano. Sin embargo, Wang Yang sabía que esto era sólo una victoria momentánea; un camino largo y arduo les esperaba. Tendrían que superar innumerables obstáculos, cruzar montañas y mares, y romper las cadenas del antiguo régimen. Sólo entonces las semillas de la libertad podrían arraigar verdaderamente en el corazón del pueblo y florecer en cada rincón de la sociedad.\n\nEl camino por delante seguía siendo peligroso, pero la historia avanza. Cada alma lo suficientemente valiente para desafiar el viejo orden era una estrella brillante en este largo viaje. Una China de democracia y libertad algún día rompería su capullo y se alzaría, renacida de las llamas."
 china.196.a: "La flor de la libertad ha florecido."
 china.197.t: "Crítica liberal"
 china.197.d: "Informe Nacional sobre Opinión Pública y Análisis Social en línea\n\nFecha: ELIMINADA\n\nRecientemente, medios liberales han criticado abiertamente una serie de políticas gubernamentales a través de sus publicaciones y plataformas de medios propios. Este informe recopila el contenido principal de dichas críticas. Para un análisis detallado y más información, consulte el Apéndice nº 106.\n\n\"Detrás de la narrativa del Partido sobre la «igualdad» se esconde una paradoja autoritaria inherente. Toma prestado el concepto liberal de igualdad universal, pero en la práctica establece una estructura social altamente autoritaria. Definen «el pueblo» como simples sujetos de obediencia, privándolos de la capacidad de participar en los asuntos públicos. Mientras tanto, el Partido centraliza la asignación de privilegios y el control del poder en manos de unos pocos, logrando así la propiedad monopólica de los recursos y la autoridad política...\n\n\"En el ámbito económico, el control estatal sobre los recursos supuestamente busca evitar la concentración excesiva de capital y la explotación. Sin embargo, en la práctica, ha sofocado el desarrollo impulsado por el mercado bajo restricciones institucionales, convirtiendo la llamada «línea vital económica» en un dominio privado para que unos pocos obtengan beneficios, privando así al capital privado de la libertad para desarrollarse\"."
 china.197.a: "Lo que sea."
 china.198.t: "Crítica nacionalista"
 china.198.d: "Boletín de Análisis de Opinión Pública\n\nRecientemente, han surgido en línea varias plataformas no oficiales de medios propios que afirman promover el \"patriotismo\". Muchos de estos medios han publicado contenido que critica directamente las políticas gubernamentales actuales. Este informe ha documentado y archivado de manera exhaustiva los vídeos relacionados.\n\n\"¡Nuestro país se dirige por un camino peligroso, uno que Wang Yang nos está llevando, un camino de destrucción! ¡Pero demasiada gente está ciega, incapaz de ver que estamos deslizándonos hacia un abismo! Las acciones de Wang Yang recuerdan inquietantemente a las de Gorbachov: intentando convertir nuestro país en otra Unión Soviética, haciendo que la nación china sufra el mismo destino de caída y extinción\".\n\n\"¡Abramos los ojos y veamos la verdadera cara de Wang! Busca reemplazar el liderazgo de nuestro Partido con las ideologías decadentes de Occidente; ¡permite que las fuerzas occidentales anti-China ataquen y difamen libremente a nuestro país y a nuestra nación! Cada llamada «reforma» que implementa es otra puñalada al corazón de la nación china\".\n\n\"¡Las reformas de Wang no son más que reformas al estilo «Gorbachov» de principio a fin! Entrega los activos estatales al capital privado, enriqueciendo a una pequeña minoría mientras empuja al pueblo a la pobreza. ¡Quiere destruir los cimientos de la economía socialista y convertir nuestro país en una colonia capitalista! ¡Cada una de sus «reformas» es una traición al socialismo y una traición a nuestra nación!\""
 china.198.a: "Lo consideraremos con \"cuidado\"."
 china.199.t: "Crítica de izquierdas"
 china.199.d: "Boletín de Análisis de Opinión Pública\n\nRecientemente, los departamentos pertinentes han informado de un aumento de la actividad en los foros izquierdistas nacionales, con la mayoría de los artículos criticando duramente las políticas gubernamentales. Estos artículos han sido documentados y archivados exhaustivamente en este informe. Para contenido detallado, por favor consulte el Documento B-31a.\n\n\"El mayor error del grupo revisionista de Wang Yang es la traición a los principios fundamentales del pensamiento Mao Zedong: la lucha de clases. El presidente Mao afirmó una vez: «Las contradicciones fundamentales en una sociedad socialista siguen siendo las contradicciones entre las relaciones de producción y las fuerzas productivas, y entre la superestructura y la base económica». Sin embargo, el grupo de Wang intenta negar la existencia de esta contradicción fundamental, buscando justificar teóricamente su agenda capitalista...\"\n\n\"En la práctica, el grupo de Wang ha implementado una serie de políticas capitalistas, trayendo un gran desastre a la causa socialista de China. Han permitido la expansión descontrolada del capital, debilitando el control del Estado sobre la línea vital económica, y han empujado a las masas de nuevo al abismo de la explotación y la opresión, mientras que un puñado de capitalistas cosecha enormes beneficios económicos, convirtiéndose en una nueva clase dominante...\""
 china.199.a: "OK."
 china.201.t: "Ondas de desastre"
 china.201.d: "Las consecuencias catastróficas de la Segunda Guerra Civil Americana van mucho más allá de la cruda realidad de 300 millones de personas enfrentándose armadas entre sí. Este colapso del centro financiero mundial, que durante casi medio siglo fue un refugio seguro para la élite y cuna de innovaciones de primer nivel, ha socavado gravemente los cimientos del orden económico global. Entre los más afectados se encuentra China, la segunda economía más grande del mundo y reconocida como \"la fábrica del mundo\", además del mayor tenedor de deuda estadounidense.\n\nCuando aparecieron los primeros signos de desintegración de Norteamérica y comenzó a extenderse el pánico, la masiva salida de población y riqueza proporcionó inicialmente una ventaja momentánea a sus competidores, especialmente China y la Unión Europea. China confiaba en que su cuidadosamente diseñado sistema de \"doble circulación\" sería lo suficientemente resistente para soportar el impacto. Sin embargo, el colapso del dólar llevó a una rápida devaluación de los activos en manos de los ciudadanos, borrando los ahorros de innumerables familias. El mercado bursátil, ya débil desde la pandemia de COVID-19, se desplomó aún más, rompiendo la barrera crítica de los 3.000 puntos, con una intervención estatal que resultó ineficaz. La industria exportadora, privada de su mayor mercado, languideció en la desesperación, mientras que los mercados en Asia, África y Europa también cayeron en recesión, sin dejar alternativas viables. El pánico comenzó a extenderse entre las empresas extranjeras, y las repentinas tensiones políticas y conflictos sociales erosionaron su confianza en lo que alguna vez fue considerado \"la economía más estable del mundo\".\n\nUna vez más, el Gobierno chino y su pueblo comprendieron amargamente que la prosperidad y los beneficios obtenidos desde su integración en un mercado global basado en el dólar hace 40 años tenían un precio muy alto."
 china.201.a: "¿Entonces qué se puede hacer? El dinero no puede comprar el tiempo perdido."
 china.202.t: "Cocinando un desastre"
 china.202.d: "Seis décadas de legado reducidas a polvo, y diez años de duro trabajo desaparecidos en el aire. Para los 1.400 millones de chinos, el futuro nunca ha parecido tan sombrío como hoy. Sin embargo, incluso en las profundidades de la desesperación, este país nunca ha dejado de decepcionar cuando se enfrenta a algo aún más desesperanzador.\n\nLa imagen de los restos derrotados del EPL soportando una humillación total en la isla de Taiwán ha dejado una marca indeleble en la psique de cada ciudadano chino. Este golpe psicológico ha sumido a la sociedad en un estado de desilusión y duda. Además, desde la tregua, no ha habido señales de alivio frente al bloqueo económico contra Pekín. Las sanciones actúan como cadenas pesadas, cuyo agarre ineludible hace que la economía china caiga desde su posición como la mayor economía mundial tras el colapso de Norteamérica. El PIB per cápita ha retrocedido más de veinte años. La derrota en el estrecho de Taiwán ha destrozado aún más un ciclo económico ya estancado, agotando rápidamente los recursos y las reservas de riqueza de la nación.\n\nEn este punto, la crisis que enfrenta el Gobierno chino y su pueblo ya no se trata solo de conflictos distributivos o de oleadas de desempleo causadas por la caída de algunas empresas. Es una parálisis y declive a gran escala. Como resultado, ha comenzado la cuenta atrás para el colapso del régimen, una realidad que todos conocen dolorosamente."
 china.202.a: "Más allá de toda redención..."
 china.203.t: "Recortes en el gasto militar"
 china.203.d: "Tras la exitosa resolución del conflicto de Taiwán, nos hemos enfrentado a desafíos fiscales relacionados con nuestros gastos militares.\n\nA la luz de la presión que la guerra ha ejercido sobre nuestra economía, hemos determinado que nuestro presupuesto militar actual es excesivo para las circunstancias presentes. Para abordar este problema, hemos implementado recortes presupuestarios, además de reducir la conscripción en ciertas regiones y disolver brigadas militares redundantes."
 china.203.a: "Ya no es que la OTDP sea una amenaza."
 china.204.t: "Cambios menores en el Gobierno"
 china.204.d: "Tras la victoria en el conflicto de Taiwán, nos hemos enfrentado a ciertos desafíos derivados de nuestro actual marco gubernamental.\n\nNuestra nueva posición geopolítica ha puesto de manifiesto las deficiencias de nuestro sistema de gobierno actual. Como respuesta, hemos decidido poner en marcha el plan de reestructuración gubernamental largamente retrasado para abordar estos problemas. Los cambios más destacados son la jubilación del ex primer ministro del Consejo de Estado, Li Keqiang, y del director de la Oficina Central de Asuntos Exteriores, Yang Jiechi."
 china.204.a: "Un pequeño cambio nunca le hizo daño a nadie."
 china.205.t: "Desfile de la Victoria"
 china.205.d: "Banderas rojas y pancartas se ven por todas partes, dando a Pekín un ambiente festivo. Para celebrar la gran victoria de la guerra de Taiwán, se ha decidido que se celebre un festival en la capital. Estos días, los hombres uniformados se han convertido en las personas más populares de la ciudad.\n\nEl día de la celebración, encabezada por un desfile de héroes de guerra que portaban estandartes militares honoríficos, incluyendo al primer marine que desembarcó en la isla de Taiwán y al soldado que colocó la bandera nacional en lo alto del Taipei 101. Xi saludó a los soldados con una sonrisa en el rostro, y los soldados espontáneamente corearon \"¡Viva el presidente Xi!\" al pasar por la plaza de Tiananmén.\n\nEl desfile duró desde el día hasta bien entrada la noche. Le siguió un baile y concierto al aire libre. Un desfile de civiles marchó por las calles de Pekín. Miles de millones de personas en todo el mundo vieron la transmisión simultánea, y muchos lo vieron como el fin de una era antigua."
 china.205.a: "¡Viva el pueblo chino!"
 china.206.t: "Taiwán sigue bajo control militar"
 china.206.d: "Tras nuestra victoria en la guerra de Taiwán, hemos logrado controlar completamente Taiwán. Sin embargo, alcanzar nuestro objetivo operativo ha traído consigo una serie de desafíos con el territorio recién adquirido. Problemas como la resistencia local, la corrupción generalizada y las tensiones burocráticas nos han obligado a decidir instaurar un control militar sobre la isla durante el futuro previsible.\n\nAunque esta medida puede no contar con el apoyo unánime dentro de nuestro Gobierno y entre nuestros ciudadanos, es la acción más sensata en este momento. Nuestra prioridad es establecer un control firme y garantizar la estabilidad en la isla antes de emprender el proceso de reintegrarla a nuestra nación."
 china.206.a: "Es solo temporal."
 china.207.t: "Un país, dos sistemas"
 china.207.d: "Hace casi 50 años, Deng Xiaoping, el líder supremo de China, ideó una propuesta innovadora llamada \"Un país, dos sistemas\" para Hong Kong tras la reunificación. Básicamente, mientras que en la China continental se mantenía la estructura socialista, a Hong Kong se le permitió continuar con su economía de mercado y estilo de vida capitalista.\n\nHay que admirar la determinación y creatividad de Deng. Esta pequeña ciudad insular ha seguido generando inversión y empleo en China. Al mismo tiempo, el sistema también ha funcionado bien para Macao, un antiguo territorio colonial recuperado de Portugal tras 1999.\n\nAhora, con Taiwán finalmente regresando a China después de 1949, queremos asegurar a esos políticos y civiles que se han quedado por su fe en el PCCh que \"los taiwaneses gobiernan Taiwán\" sigue siendo posible."
 china.207.a: "¡Deseamos sinceramente la prosperidad de Taiwán!"
 china.208.t: "Los primeros pasos"
 china.208.d: "Hoy hemos recibido noticias alentadoras. Las encuestas recientes realizadas en Taiwán para medir la satisfacción pública con el Gobierno actual indican un aumento significativo en el apoyo a nuestra administración. Además, el Ministerio de Seguridad del Estado ha informado de un descenso en los esfuerzos de resistencia por parte de los rebeldes taiwaneses.\n\nEstos acontecimientos subrayan el éxito de nuestros esfuerzos en la reintegración y estabilización. Con desarrollos positivos continuos como estos, la reintegración completa parece estar al alcance en un futuro próximo."
 china.208.a: "¡Nuestros hermanos se unirán pronto!"
 china.209.t: "Unificación de la burocracia"
 china.209.d: "Nuestros esfuerzos continuos para reformar la estructura gubernamental en Taiwán han alcanzado hoy un hito significativo. Informes recientes indican una unificación exitosa de los marcos burocráticos entre China continental y Taiwán.\n\nLos administradores en la isla han confirmado que los organismos administrativos, hospitales, fuerzas policiales y otros sectores clave han sufrido reformas sustanciales para alinearse más estrechamente con la estructura burocrática del continente."
 china.209.a: "Un paso hacia la utopía."
 china.210.t: "El Siglo Chino"
 china.210.d: "\"¡Camaradas, amigos, compatriotas!\"\nXi nunca se suponía que fuera un buen orador. Durante la última década, los errores de Xi en cada discurso siempre generaban una oleada de críticas en internet, y las nuevas palabras que sus secretarios añadían ocasionalmente a sus aburridos discursos a menudo no lograban impresionar al público, incluso si a veces se formalizaban como eslóganes del partido. Pero con el discurso de hoy, Xi estaba seguro de que nadie querría perderse ni una palabra.\n\"Hoy celebramos un desfile militar aquí para conmemorar el regreso de Taiwán a la patria, y para honrar este hito en la historia de la nación china\". Xi hizo todo lo posible por no dejar que su voz sonara demasiado aguda por los nervios. Observó que el público bajo la plaza de Tiananmén estaba casi en silencio.\n\"Mirando atrás en la historia, nosotros, los chinos, hemos pasado por pruebas y tribulaciones, pero nunca hemos abandonado el sueño de la reunificación y la revitalización. Con la historia avanzando, nadie puede detener la marea histórica del Gran Rejuvenecimiento de la nación china\". Su voz se volvió apasionada. En el momento justo, levantó el puño derecho en alto y señaló la bandera roja de cinco estrellas que ondeaba en lo alto de la plaza. Xi se sintió satisfecho al ver que los vítores y aplausos estallaban. \"Hoy, estamos en un nuevo punto de partida histórico, asumiendo la misión histórica de realizar el gran sueño chino. ¡Esta es la inevitabilidad de la historia, la victoria del pueblo y la gran victoria de la nación china!\""
 china.210.a: "Un discurso que pasará a la historia."
 china.211.t: "Patriotismo china de la nueva era"
 china.211.d: "Hemos completado con éxito la tarea de unificar Taiwán, pero la situación internacional se está volviendo cada vez más grave. También enfrentamos mayores desafíos internos, lo que hace esencial unir de manera más efectiva al pueblo chino a través de diferentes clases y regiones. El trabajo ideológico en la nueva era no puede abordarse simplemente con la emisión de consignas o la producción de películas. Requiere una orientación fiable y planes detallados por parte de las instituciones burocráticas. En este sentido, ninguna organización puede desempeñarse mejor que el PCCh.\n\nLa Comisión Central de Orientación para la Construcción de la Civilización Espiritual, el Departamento Central de Propaganda y la Oficina Central de Investigación Política han presentado cada una diferentes planes para que el Comité Permanente del Buró Político los considere. El enfoque más ortodoxo es continuar desarrollando la teoría socialista china, promoviendo la versión china de los \"valores universales\" basada en los 24 caracteres de los valores socialistas fundamentales, y reforzando nuestra posición como un socialismo que contrarresta al capitalismo occidental. Alternativamente, un enfoque más radical sugiere que, dada la relación cada vez más tensa entre China y el bloque neoliberal asiático liderado por Japón, la unidad de la nación china está en peligro. Este enfoque aboga por enfatizar el lema nacionalista de \"defender a la nación china\", al tiempo que intensifica la propaganda sobre la fortaleza y prosperidad de nuestro país para inspirar orgullo y entusiasmo nacional entre el pueblo."
 china.211.a: "Tenemos que mantenernos fieles al marxismo-leninismo."
 china.211.b: "El nacionalismo une a la gran mayoría de las personas."
 china.212.t: "Renacer nacional inminente"
 china.212.d: "El Politburó ha confirmado e implementado las nuevas directrices de trabajo ideológico.\n\nLa propaganda del Partido ha adoptado cada vez más el nacionalismo. La propaganda presenta la China actual como comparable a la prosperidad y fortaleza de los antiguos imperios chinos, especialmente las dinastías Han y Tang, refiriéndose a ella como una nueva \"edad de oro\" en la historia china. El término \"unidad nacional\" también se menciona con mayor frecuencia. Los cincuenta y seis grupos étnicos son reconocidos como parte de la \"larga historia de la nación china\", contribuyendo a un \"rico patrimonio cultural\". Sin embargo, a pesar de los eslóganes de igualdad, los medios de comunicación y los círculos culturales se han centrado más en el grupo étnico Han. Las guerras históricas de conquista de los Han sobre otros grupos étnicos se consideran abiertamente parte de la tradición marcial de China.\n\nAdemás, se ha construido una teoría de amenaza dirigida a enemigos imaginarios en el extranjero. La primera guerra sino-japonesa, la Guerra de Resistencia contra Japón y la guerra de Corea se presentan ampliamente como elementos cruciales de la revolución de la China moderna. Guerras extranjeras históricas, como la guerra Imjin durante la dinastía Ming, también se ven como precursores de la Guerra Fría en el Pacífico Occidental, enfatizando la intención persistente de los enemigos de destruir China. La separación y antagonismo entre China y los países extranjeros se están haciendo más evidentes. Sin embargo, la propaganda retrata consistentemente a China, ya sea en un pasado lejano o en un futuro cercano, como la vencedora última y única."
 china.212.a: "La ambición de una gran nación."
 china.213.t: "Revolución ideológica moderna"
 china.213.d: "El Politburó ha confirmado e implementado las nuevas directrices de trabajo ideológico.\n\nEl aparato de propaganda del Partido se ha alineado más estrechamente con los principios marxistas. La propaganda actual en la República Popular China suele comparar sus logros con la sociedad comunista futura imaginada por Marx, Engels y otros pensadores, así como con el apogeo de la Unión Soviética, y se refiere a este periodo como un nuevo \"hito\" en el desarrollo comunista. El término \"revolución continua de uno mismo\" también se utiliza con frecuencia. Xi ha enfatizado personalmente esto, declarando que el Partido Comunista de China continuará liderando China como vanguardia de la revolución y el desarrollo. Los valores socialistas centrales de 24 caracteres ahora se denominan \"valores compartidos de la comunidad con un futuro compartido para la humanidad\".\n\nAdemás, se ha construido una narrativa de amenazas provenientes de enemigos extranjeros hipotéticos. Eventos como la intervención aliada en la Rusia soviética tras la Primera Guerra Mundial, la guerra soviético-alemana durante la Segunda Guerra Mundial, las represiones japonesas contra los guerrilleros del Octavo Ejército de Ruta y las \"revoluciones de colores\" estadounidenses contra el bloque del Este durante la Guerra Fría son vistos como precursores de una Guerra Fría en el Pacífico Occidental, destacando la persistente ambición imperialista de destruir China. La separación y antagonismo entre China y los países extranjeros se están haciendo más evidentes. Sin embargo, la propaganda retrata consistentemente a China, ya sea en un pasado lejano o en un futuro cercano, como la vencedora última y única."
 china.213.a: "Revolución socialista en el siglo XXI."
 china.214.t: "Gran Rejuvenecimiento"
 china.214.d: "El Gran Rejuvenecimiento de la nación china ha alcanzado un pico emocionante, con la visión del Partido para una China resurgente avanzando con una fuerza imparable. Décadas de liderazgo audaz del PCCh han impulsado a China desde el amanecer de la reforma económica en los años 70 hasta la vanguardia de la innovación global. Ahora estamos al borde de una nueva era, donde el ascenso meteórico de China como una potencia económica y política dominante está remodelando el orden mundial. Los historiadores pronto reconocerán este momento como una ruptura definitiva con el pasado.\n\nMientras avanzamos con determinación inquebrantable, el pueblo chino sigue un camino iluminado por el liderazgo visionario del Partido. Desde vencer la pobreza extrema hasta establecer un sistema integral de bienestar social y lanzar la ambiciosa Iniciativa Franja y Ruta, cada logro monumental refleja el espíritu indomable de nuestro pueblo. La guía del Partido sigue siendo un faro radiante, impulsando nuestro progreso hacia nuevas alturas y asegurando que nuestro viaje de transformación se acelere con energía y vigor implacables.\n\nEn esta época apasionante, mientras los logros actuales de China establecen un nuevo estándar para futuros triunfos, nuestra nación avanza con confianza hacia un futuro brillante, abrazando la promesa de un mañana resplandeciente con ferviente resolución y compromiso inquebrantable."
 china.214.a: "¡Gloria al Partido y al pueblo!"
 china.215.t: "XXI Congreso Nacional del PCCh"
 china.215.d: "El 21º Congreso Nacional del Partido Comunista de China ha llegado a su fin. Desde el congreso anterior, el país ha logrado grandes avances: se ha consolidado el estatus de superpotencia, Taiwán ha sido reincorporado bajo control, y en el proceso se han derrotado a los enemigos imperialistas. Frente al caos mundial en forma de guerras en Norteamérica y Europa, China sigue siendo una isla de estabilidad y prosperidad.\n\nA pesar de su respetable edad, Xi Jinping fue elegido secretario general por cuarta vez. En su discurso, afirmó que continuará con la línea de los años anteriores para fortalecer la estabilidad en un mundo en constante cambio, y que los próximos años serán decisivos para el destino de toda China.\n\n...\n\nHa pasado algún tiempo desde que terminó el congreso.\n\nXi y varios generales y altos funcionarios estaban en la audiencia. Se estaba llevando a cabo una acalorada discusión sobre algo importante. Algo que daría inicio a una cadena de acontecimientos que cambiaría el mundo para siempre.\n\nFinalmente, en la gran pantalla apareció un mapa de la península coreana."
 china.215.a: "Grandes cosas están por venir."
 china.216.t: "Actividad de la OTDP en el mar de la China Oriental aumenta"
 china.216.d: "Recientemente, hemos observado un aumento sospechoso en la actividad de las fuerzas de la OTDP en el mar de la China Oriental. Drones de reconocimiento enemigos han estado sobrevolando la región las 24 horas del día, y sus barcos y aviones han comenzado a cruzar nuestras fronteras marítimas y aéreas con bastante frecuencia. En nuestros intentos por contrarrestar esto, nuestros oponentes simplemente se esconden, sin intención de entablar combate. Y aunque la actividad sigue aumentando, aún no ha llegado a un enfrentamiento militar directo.\n\nDado que estamos en plena preparación activa para la operación, esto genera serias preocupaciones de que algunos de nuestros planes sean conocidos por los Estados miembros de la OTDP. Por ahora, no nos queda más remedio que intentar disuadir las incursiones en nuestras fronteras marítimas y aéreas y vigilar la situación a medida que evoluciona."
 china.216.a: "Es preocupante... Pero seguiremos preparando la operación."
 china.217.t: "Ciberataque"
 china.217.d: "Por la mañana, otro Wing Loong salió al mar en una misión de protección fronteriza: un pequeño barco japonés cruzó nuestra frontera marítima. Se había convertido en una rutina, el procedimiento siempre seguía el mismo escenario. Un barco enemigo cruzaba la frontera, nuestro radar lo detectaba, un dron salía a observarlo y, bastante rápido, el barco enemigo abandonaba nuestras aguas; a menudo, los drones ni siquiera lograban avistarlos. Pero esta vez algo salió mal, como de costumbre.\n\nLa señal del dron se perdió instantáneamente. No fue derribado ni suprimido por guerra electrónica, nuestros radares seguían registrando la continuación de su vuelo. Unos minutos después, otros sistemas de comunicación con los drones comenzaron a fallar uno a uno.\n\nEn pocas horas, se perdió el acceso a las bases de datos militares, nuestros mejores especialistas en informática militar intentaban rescatar lo que fuera. La situación era muy grave: todo dejó de funcionar por completo. Nunca antes en el mundo había ocurrido un ciberataque tan potente contra la infraestructura militar.\n\nUna cosa estaba clara. Algo terrible estaba a punto de suceder. Algo para lo que no estábamos preparados."
 china.217.a: "¿Por qué ahora? ¡Salva al menos algo!"
 china.218.t: "Enfrentamiento naval y lluvia de cohetes"
 china.218.d: "Solo después de recuperar parte de la infraestructura dañada por el ciberataque nos encontramos con algo aterrador. Los radares recién activados mostraban decenas de barcos de la OTDP que habían cruzado nuestra frontera marítima y se dirigían hacia Fuzhou.\n\nLas fuerzas de la Armada del EPL salieron a encontrarse con la flotilla enemiga, preparándose para la batalla. Estaba claro que esta vez las fuerzas de la Alianza del Pacífico iban en serio y no se podía evitar un enfrentamiento. Al mismo tiempo, en muchas ciudades costeras se escucharon numerosas explosiones: la defensa aérea estaba en funcionamiento, rechazando ataques de misiles enemigos dirigidos a nuestras bases militares.\n\nAunque la confrontación militar directa apenas comienza, una cosa está clara: la gran guerra ha empezado, y aunque queríamos iniciarla nosotros mismos, no fue así."
 china.218.a: "¡Pues, allá vamos!"

 PRC_chinese_defenders_from_grassroots: "Defensores chinos desde la base"
 PRC_chinese_defenders_from_grassroots_desc: "La verdadera lealtad no está plasmada en los currículums ni escondida en oficinas de rascacielos. Vive en cada tornillo que aprieta un trabajador de la planta, en la silenciosa vigilancia nocturna de un soldado en la frontera, en el altavoz crepitante del jefe del pueblo. Para encontrar la columna vertebral de la nación, debemos bajar entre la multitud silenciosa y traerlos de vuelta, uno a uno. Los que han soportado dificultades, derramado sangre, sido engañados, pero aún así creen en el Estado son los patriotas más auténticos. Los integraremos en el sistema y forjaremos su patriotismo sencillo en el armazón de acero de nuestras instituciones."

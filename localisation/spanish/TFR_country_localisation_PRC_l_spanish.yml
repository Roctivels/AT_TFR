 china.364.t: "Integración económica de Afganistán completada"
 china.364.d: "Desde el amanecer del siglo XXI, el crecimiento económico de China ha creado un efecto dominó, convirtiéndose en una fuerza clave que moldea la dinámica de Asia Oriental e incluso del mundo. Este poderoso dragón rojo, con sus transformaciones radicales, ha redefinido casi por completo el orden económico mundial establecido por la revolución neoliberal y nunca ha dejado de expandirse. Hoy, se ha revelado el próximo destino del alcance económico de China.\n\nCruzando las montañas del Hindu Kush, tras más de 40 años de turbulencias, parece que el orden está regresando al \"cementerio de imperios\": Afganistán. Los talibanes, ahora en su segunda etapa en el poder, buscan un apoyo significativo para reconstruir y remodelar la nación. Naturalmente, a pesar de las importantes diferencias políticas, China y Afganistán se han acercado en términos económicos.\n\nLas últimas piezas que faltaban del imperio \"Made in China\" se están colocando de nuevo. En las calles de Kabul, pequeños vendedores recorren la ciudad en scooters eléctricos fabricados en la provincia de Zhejiang para comenzar su día; soldados afganos de servicio llevan en sus bolsillos teléfonos Xiaomi y Huawei; algunas posadas marcadas por la guerra han reabierto, mostrando carteles improvisados en chino y ofreciendo platos del menú chino. Nuestro embajador, al presenciar esta escena en esta nación pobre y sin salida al mar, informa a la patria con satisfacción, describiendo vívidamente todo lo que está sucediendo."
 china.364.a: "Negocios a la manera china."
 china.365.t: "Se establece la plena lealtad del Gobierno de Afganistán"
 china.365.d: "Muchos temían que Afganistán, conocido hasta entonces solo por sus yihadistas y amapolas, volviera a sumirse en el caos, especialmente con los infames talibanes en el poder. El Gobierno chino también albergaba dudas sobre entablar relaciones con un régimen islamista extremista que había apoyado fervientemente el movimiento separatista de Turquestán Oriental. Sin embargo, gracias a los esfuerzos de moderados tanto de China como de Afganistán, podría haberse establecido una plataforma de colaboración.\n\nBajo el liderazgo actual del Líder Supremo de Afganistán, Haibatulá Ajundzadá, los talibanes han logrado unificar diversas facciones que antes se enfrentaban en guerras intestinas. Estos grupos ahora gobiernan la nación montañosa de una manera más estable. Los yihadistas parecen haber dejado atrás su pasado militante: algunos visten túnicas clericales para servir en zonas rurales, mientras que otros se han convertido en funcionarios del Gobierno central con traje.\n\nLa prohibición del cultivo de amapolas, la reactivación de la educación con nuevos planes de estudio y el despliegue de diplomáticos para buscar reconocimiento internacional y estabilidad han introducido una dimensión esperanzadora en la posible transición de Afganistán hacia un estado normal. Quizás la ayuda financiera continua de las monarquías del Medio Oriente proporcione la base material para estos cambios. No obstante, Afganistán necesitará un mentor experimentado que guíe sus reformas políticas. Inevitablemente, China jugará un papel más importante en el futuro de Afganistán."
 china.365.a: "El pequeño amigo de la gran China."
 china.366.t: "Declaración del Tratado de Amistad Afganistán-Pakistán"
 china.366.d: "Como un aliado clave cuya amistad con nuestro país se ha forjado a través de sangre y fuego, Pakistán no teme nada más que al terrorismo representado por el llamado \"Tehrik-i-Taliban Pakistan\" (TTP) dentro de sus fronteras. Los fundadores de esta organización afirman estar inspirados por sus homólogos afganos, obteniendo fuerza de los asentamientos pastunes en el noroeste de Pakistán, causando estragos durante más de una década a pesar de los repetidos intentos del ejército pakistaní por erradicarla.\n\nAunque el Gobierno talibán en Afganistán ha negado consistentemente cualquier conexión con el TTP, sus vínculos visibles han provocado un fuerte deterioro en las relaciones entre Pakistán y Afganistán, con frecuentes enfrentamientos militares a lo largo de la frontera de la Línea Durand.\n\nEl apoyo prolongado del TTP al Movimiento del Turquestán Oriental y sus amenazas al Corredor Económico China-Pakistán también han enfurecido profundamente a nuestro Gobierno. Sin embargo, los desarrollos recientes han tomado un giro prometedor. Tras establecer contacto y alcanzar una cooperación preliminar con Pekín, el ahora maduro Gobierno talibán afgano ha decidido cortar todos los lazos con el TTP, allanando el camino para una postura más flexible por parte de Pakistán. Mientras tanto, con la mediación de diplomáticos chinos, el Gobierno pakistaní ha comenzado a cambiar su actitud. Finalmente, representantes de ambos países se reunieron en Islamabad para firmar una declaración histórica, normalizando las relaciones bilaterales y abriendo la puerta a una futura cooperación."
 china.366.a: "Finalmente se reconciliaron."
 china.367.t: "Tratado de Afganistán con Rusia"
 china.367.d: "Al hablar de qué países han causado más daño a Afganistán y han infligido la destrucción más profunda, aparte de Estados Unidos, que pasó dos décadas intentando defender con abrumadora fuerza militar a su Gobierno títere democrático de estilo occidental, otro actor clave es la Unión Soviética. En el contexto de la Guerra Fría, este conflicto permitió que enemigos ideológicos se infiltraran y agotaran los recursos soviéticos, contribuyendo finalmente al colapso del imperio. Estos enredos históricos siguen influyendo en la relación entre Rusia, sucesora de la Unión Soviética, y el Gobierno talibán en Afganistán, dando lugar a relaciones frías de larga duración e incluso a un conflicto armado cercano.\n\nComo potencia dominante en Asia Central, las ambiciones históricas de Rusia en la región, junto con la amenaza del extremismo islámico en Afganistán, son fuentes significativas de inestabilidad. Para crear las condiciones de una nueva era de paz y prosperidad, debemos considerar la perspectiva de Rusia en las conversaciones diplomáticas con Afganistán. A través del diálogo interno, tenemos la oportunidad de convencer a Rusia de la neutralidad de Afganistán y su compromiso con la desradicalización, al mismo tiempo que aseguramos que Rusia abandone cualquier plan de futura intervención militar en los asuntos internos de Afganistán. En cambio, nuestro objetivo es participar en cooperaciones económicas conjuntas y proyectos de compartición de recursos."
 china.367.a: "Todo es para garantizar la paz."
 china.368.t: "Tratado de Afganistán con China"
 china.368.d: "Afganistán, antaño la pesadilla de la Unión Soviética y una fuente de problemas en Asia Central. Cuando los talibanes tomaron el control de Kabul por última vez, tanto Estados Unidos como Rusia, así como la OTAN y la OTSC -dos grandes rivales- dejaron a un lado sus diferencias y cooperaron estrechamente para combatir a los yihadistas afganos. Sin embargo, mucho ha cambiado desde entonces. Los soldados estadounidenses que una vez dominaron Afganistán se retiraron silenciosamente en aviones de transporte C17, siendo reemplazados una vez más por los talibanes.\n\nMientras observamos con ojos preocupados el recién establecido Emirato Islámico de Afganistán, China -ahora un nuevo actor en el Gran Juego Asiático- ha tendido una rama de olivo, invitándonos a involucrarnos con Afganistán. Según nuestros optimistas homólogos chinos, la débil agricultura de Afganistán, junto con su industria casi inexistente, ofrecen innumerables oportunidades para el desarrollo y la inversión. Con la financiación y el personal de China, junto con la tecnología y la energía de Rusia, la recuperación económica de Afganistán está prácticamente asegurada, prometiendo retornos sustanciales en un corto plazo.\n\nPor supuesto, todo esto depende de la neutralidad de Afganistán, su desradicalización y el levantamiento de los bloqueos impuestos por las grandes potencias circundantes, incluida la nuestra. Aunque persisten las preocupaciones sobre la seguridad y el entorno empresarial en Afganistán, y la verdadera voluntad del país para cooperar aún es incierta, los defensores de este plan son optimistas y creen que estos desafíos se resolverán mediante la colaboración futura."
 china.368.a: "¿Nuevos mercados para nuestros productos? Suena bien."
 china.369.t: "Cuestión de las libertades corporativas en Afganistán"
 china.369.d: "Actualmente, nuestras empresas están logrando un progreso significativo en Afganistán, capturando rápidamente el mercado. Sin embargo, el descontento ha comenzado a crecer en diversos círculos afganos, llegando poco a poco a la Embajada china en Kabul y, finalmente, dando lugar a quejas en el despacho del embajador. Aunque el espíritu pionero de nuestros empresarios es encomiable, en ocasiones se traduce en \"imprudencia\" y \"motivos lucrativos\", lo que ha contribuido al aumento de las tensiones sino-afganas. Las quejas sobre comerciantes y empleados chinos que consumen en exceso, alteran los precios y el orden del mercado, faltan al respeto a la cultura afgana y a las costumbres islámicas -especialmente hacia las mujeres afganas- y que con frecuencia se enfrentan con los locales, han llevado a los funcionarios de ambos países a buscar soluciones con urgencia.\n\nMientras tanto, se están transmitiendo más preocupaciones desde niveles superiores. El liderazgo talibán está preocupado por el comercialismo y la influencia secular que traen los chinos, temiendo que altere sutilmente los valores de los ciudadanos afganos. Muchos jóvenes afganos se sienten atraídos por la prosperidad de China, lo que podría provocar una emigración unilateral y una pérdida permanente de población. En las zonas rurales de Afganistán, donde predominan las posturas conservadoras, crece el miedo y el resentimiento hacia las actividades comerciales desenfrenadas de los chinos.\n\nEn última instancia, ¿deberíamos imponer regulaciones y restricciones claras sobre el alcance y la libertad de las inversiones chinas en Afganistán? La decisión final será..."
 china.369.a: "¡Nuestras empresas harán negocios libremente!"
 china.369.b: "Por supuesto que negociarán con el Gobierno de Afganistán..."
 china.370.t: "Tratado de Amistad y Cooperación entre China y Afganistán"
 china.370.d: "Al caer el crepúsculo, las luces del Arg brillaban intensamente, destacándose en el distrito recién construido de Kabul. Dentro del salón de banquetes, las copas tintineaban y las conversaciones se entremezclaban bajo candelabros dorados. Copas de cristal llenas de diversas bebidas sin alcohol relucían. Una suntuosa variedad de platos se extendía sobre alfombras de lana famosas localmente, con kebabs afganos tradicionales y naan, junto con pato laqueado de Pekín preparado por chefs chinos. Los comensales se sentaban sobre cojines, formando varios círculos pequeños y grandes, creando un ambiente cálido y amistoso.\n\nCuando el banquete alcanzó su punto álgido, el embajador chino alzó su copa de cristal con jugo de uva en un brindis al primer ministro afgano. Declaró: \"¡Propongo un brindis por la reciente firma del Tratado de Amistad y Cooperación entre China y Afganistán por parte de nuestros líderes! En nombre del Gobierno chino, también extiendo mi gratitud al primer ministro por su significativa contribución a las negociaciones. ¡Que este tratado sirva como la piedra angular de una nueva era en las relaciones entre China y Afganistán!\"\n\nCon una sonrisa radiante, el primer ministro alzó su copa y respondió con entusiasmo: \"¡Nuestro Líder Supremo también me ha pedido que agradezca a Su Excelencia! China es un gran vecino y aliado, y creemos que nuestra cooperación y amistad solo se profundizarán en el futuro.\" Los vítores y el tintinear de las copas resonaron en el salón de banquetes durante bastante tiempo.\n\nLos funcionarios tanto de China como de Afganistán tenían muchas razones para celebrar. Para China, la firma del tratado abrió el acceso a un mercado de casi 40 millones de personas con un enorme potencial. También ofreció la oportunidad de eliminar los restos del Movimiento Islámico del Turquestán Oriental, que durante mucho tiempo había azotado la región noroeste de China, mientras integraba a Afganistán en su marco de cooperación IDEA. Para los talibanes afganos, esto marcó un regreso a la comunidad internacional tras décadas de turbulencia. También permitió a Afganistán apoyarse en la fuerza de una potencia regional, con la esperanza de recuperar algún día su antigua gloria como centro de Asia."
 china.370.a: "¡Más amigos nuevos!"
 china.371.t: "Afganistán cancela todos los tratados"
 china.371.d: "El Arg de Kabul, que ha servido como residencia de los máximos gobernantes de Afganistán desde el siglo XIX, ha acogido a innumerables políticos, celebridades, señores de la guerra locales, generales militares y comerciantes adinerados. También ha sido testigo de cómo muchos líderes han abandonado el escenario en desgracia, poniendo fin a sus luchas por el poder con ignominia.\n\nEn la sala de reuniones, adornada con mármol colorido y azulejos vidriados, el embajador chino intentaba reavivar las esperanzas de los afganos sentados frente a él. Sin embargo, sus esfuerzos parecían destinados al fracaso. El deterioro de las relaciones sino-afganas no fue un acontecimiento repentino. En los ámbitos político, económico y cultural, chinos y afganos parecían tan incompatibles como el aceite y el agua. Es difícil determinar si la terquedad de los afganos o la arrogancia percibida de los chinos tenían mayor responsabilidad.\n\nEl primer ministro afgano interrumpió las súplicas del embajador con un gesto. El anciano, con la barba temblando de emoción, se quitó las gafas y suspiró antes de hablar lentamente: \"Embajador, ambos sabemos que la decisión tomada por nuestro líder supremo es definitiva. Quizás el poder de China no pueda hacer que sus compatriotas comprendan el orgullo y la delicada dignidad del pueblo afgano. Esta tierra ha visto a británicos, rusos y estadounidenses; los afganos han derramado sangre para expulsarlos de nuestra patria, y tampoco podemos sostener a catorce mil millones de personas.\"\n\nSe volvió a poner las gafas y miró fijamente al embajador. \"Deseamos la paz y una oportunidad para sobrevivir, pero no sacrificaremos nuestra dignidad para lograrlo. Puede llevar este mensaje a su presidente.\" Con eso, el primer ministro se levantó del sofá y los afganos restantes lo siguieron en fila india fuera de la sala de reuniones.\n\nEl embajador permaneció sentado, reflexionando en silencio sobre el peso de las palabras del primer ministro y el fracaso que sentía. En apenas unos momentos, todos los esfuerzos minuciosos de China en Afganistán a lo largo de los años parecían haberse desmoronado. No sabía cómo regresar a casa y comunicar este resultado, ni cómo reconciliarse con la parte de sí mismo que una vez defendió incansablemente las relaciones sino-afganas."
 china.371.a: "¡Tantas oportunidades perdidas! Tanto dinero desperdiciado..."
 china.372.t: "Reyes de la guerra"
 china.372.d: "Si los cañones fueron las reinas de la guerra del siglo XIX y los tanques dominaron los campos de batalla del siglo XX, entonces en el siglo XXI, los drones son sin duda los nuevos reyes de la guerra. Tras el despliegue de drones por parte de los estadounidenses en Medio Oriente y Afganistán, los drones se hicieron más grandes, más caros y equipados con las armas más potentes y modernas. Sin embargo, a veces, en lugar de esos gigantescos \"dinosaurios\", son las \"abejas\" más pequeñas, a menudo no militares, las que juegan un papel mortal.\n\nAl fijarnos en los drones que sobrevuelan el río Dniéper, llama la atención que la mayoría de sus piezas llevan el logo de una sola empresa: DJI Innovations, con sede en Shenzhen, China. Drones que antes entregaban paquetes ahora lanzan bombas sobre soldados enemigos, y drones que antes capturaban paisajes impresionantes ahora filman bases militares fuertemente custodiadas, almacenes logísticos y tropas en marcha.\n\nEn el pasado, las críticas hacia los drones chinos por ser \"inseguros\" o \"filtrar datos de usuarios\" eran comunes. Ahora han surgido acusaciones de \"apoyar la agresión rusa\" y \"robar inteligencia\". Cuando la gente, ya sea por curiosidad o crítica, pregunta al presidente de DJI sobre el uso de sus productos en los campos de batalla de Europa Oriental, él siempre comienza diciendo que \"las decisiones tomadas por los usuarios del producto no están relacionadas con la empresa\" y luego afirma que \"no le interesa\" la guerra que ocurre a miles de kilómetros en Europa, todo ello manteniendo una expresión de inocencia."
 china.372.a: "\"Made in China\" - más que lavadoras y hornos microondas."
 china.501.t: "Situación en el noroeste fuera de control"
 china.501.d: "El EPL ciertamente no deseaba sufrir aún más humillaciones tras la derrota en la guerra de Taiwán, pero la peor pesadilla de los generales acababa de hacerse realidad. Aunque afirmaban tener la capacidad de suprimir cualquier unidad rebelde, el liderazgo débil de Sinkiang defraudó las expectativas del partido y del pueblo, permitiendo que sus tropas de choque fueran derrotadas batalla tras batalla, terminando con los rebeldes del Turquestán Oriental tomando el control de Urumqi, mientras él solo se acobardaba en su oficina y escapaba de Sinkiang en avión cuando las unidades rebeldes se acercaban a la ciudad.\n\nNo nos queda mucha elección. Los terroristas uigures ahora habitan en hogares construidos por el partido, mientras civiles kazajos, kirguises, tayikos y chinos han están siendo despojados de sus propiedades legítimas, huyendo hacia el este con carros cargados de ancianos maltratados y niños con congelaciones. Simplemente no podemos permitir que fanáticos islamistas arrebaten otro pedazo de nuestra patria y asesinen a más de nuestros ciudadanos leales, por eso el EPL se está movilizando a lo largo del borde de Sinkiang. Acaban de quemar la rama de olivo, pero nosotros quemaremos su esperanza: la orden es clara, no hay banderas salvo la roja de cinco estrellas dentro de la región autónoma.\n\nLa rebelión será ahogada en acero."
 china.501.a: "Los sauces cerca del hotel vuelven a ponerse verdes. Al oeste del paso de Yangguan ya no verás ninguno de los míos."
 PRC_area_in_chaos_state_modifier: "Región en caos"
 PRC_HU_CHUNHUA_DESC: "Desde que Hu Yaobang, quien anteriormente dirigía la Liga de la Juventud Comunista, asumió el cargo de secretario general, han surgido numerosos políticos con trayectorias y experiencias similares. Se les conoce colectivamente como \"Tuanpai\" o \"Facción de la Liga de la Juventud\". Entre ellos, las figuras más exitosas y destacadas son el expresidente Hu Jintao y el primer ministro Li Keqiang. Actualmente, el líder más destacado en la cúpula es Hu Chunhua.\n\nNacido en abril de 1963, Hu ascendió desde las regiones montañosas de la provincia de Hubei a la Universidad de Pekín, la principal institución académica de China, lo que cambió el rumbo de su vida. Tras graduarse, su decisión de ir al Tíbet y participar en los esfuerzos de modernización le valió reconocimiento nacional. Durante las décadas siguientes, Hu Chunhua ascendió desde el Comité del Tíbet de la Liga de la Juventud hasta ocupar puestos clave en diversas regiones. En 2012, a los 49 años, se convirtió en el miembro más joven del Politburó.\n\nSin embargo, la situación dio un giro radical. El nuevo secretario general, Xi Jinping, no veía con buenos ojos a estos jóvenes advenedizos. Las acusaciones de que la Liga de la Juventud Comunista se había convertido en un club político desfasado ensombrecieron la carrera de Hu. Pronto vio cómo muchos de sus colegas eran marginados o destituidos por cargos de corrupción. Sin embargo, el joven que una vez se esperó que trajera el cambio a China sigue esperando su momento de renacimiento. Ahora, esa oportunidad ha llegado."
 PRC_LI_ZUOCHENG_DESC: "Cuando el joven capitán Li Zuocheng, aferrándose a su brazo derecho, atravesado por las balas y ensangrentado, capturó una tras otra las posiciones del Viet Cong a través de las húmedas montañas infestadas de malaria, jamás imaginó que décadas después, se alzaría en la cima del EPL, de dos millones de efectivos, ejerciendo un poder y una autoridad inimaginables.\n\nNacido en una familia de agricultores de la provincia de Hunan, su padre fue un héroe en la guerra de Corea, luchando contra los estadounidenses. Su carrera militar no solo mantuvo el legado de su padre, sino que, en cierto modo, lo superó. Sin embargo, a pesar de ser celebrado como héroe de guerra, los largos años de paz que siguieron vieron al EPL perder su filo, convirtiéndose gradualmente en una burocracia inflada. En esta nueva realidad, Li se vio cada vez más marginado. Su ascenso profesional se estancó durante una década, obstaculizado por su falta de habilidades para establecer contactos.\n\nTodo cambió después de 2012. La campaña anticorrupción de Xi Jinping provocó una profunda reestructuración dentro del ejército, brindando una segunda oportunidad a comandantes marginados como Li. Con su ilustre historial de combate y reputación de integridad, Li se convirtió en una pieza clave de los planes de reforma militar de Xi. Bajo su liderazgo, el EPL se transformó en una fuerza más poderosa y formidable. Al reflexionar sobre su carrera con orgullo y satisfacción, cabe preguntarse si Li aún espera otra oportunidad en sus últimos años para demostrar su valía como soldado, liderando una poderosa fuerza para alcanzar la gloria inmortal."
 PRC_WANG_YANG_DESC: "Nacido en marzo de 1955, la infancia de Wang Yang estuvo marcada por las dificultades, incluso para los estándares de la economía china en crisis. Tras abandonar la escuela secundaria y unirse a una fábrica de alimentos, su diligencia y agudeza mental lo distinguieron rápidamente. No tardó en llamar la atención de un subcomisionado local, quien más tarde se convertiría en su suegro. Esta conexión impulsó a Wang más allá de los límites de un trabajador común y corriente, adentrándose en la arena política, donde alcanzó un éxito extraordinario.\n\nEn 1991, cuando las iniciativas de Reforma y Apertura de China flaqueaban, Wang, entonces relativamente desconocido alcalde de Tongling, en la provincia de Anhui, declaró con valentía: \"La historia no nos permite dormirnos en los laureles de una economía planificada. Debemos liberar nuestras mentes y desafiar todas las ideologías rígidas, obsoletas y cerradas\". Esta declaración le valió la admiración del líder supremo de China, Deng Xiaoping, quien impulsaba incansablemente la continuación de las reformas. Poco después, los esfuerzos reformistas de China cobraron impulso y la carrera de Wang despegó. Poco a poco, se convirtió en un líder espiritual para los reformistas y los miembros de mentalidad liberal dentro del Partido, llegando a convertirse en una de las siete personas más poderosas de China.\n\nTras superar innumerables dificultades y peligros, este ex joven de clase trabajadora ha ascendido a la cima del poder en China. Mientras el futuro promete una gloria aún mayor y el camino por delante se vuelve cada vez más peligroso, el próximo paso de Wang Yang sin duda marcará el destino de miles de millones de personas."
 PRC_belt_and_road_initiative_non_cen: "Ampliar la Iniciativa Franja y Ruta"
 PRC_belt_and_road_initiative_non_cen_desc: "Las campanas de los camellos resuenan en las arenas amarillas de la nueva Ruta de la Seda, y los barcos de carga transoceánicos marcan el pulso de la nueva era. Lo que estamos construyendo no son sólo carreteras y ferrocarriles, sino también el elemento vital y las reglas de las empresas. La bandera de la amistad se mantiene en alto y el ritmo del mercado se respira en silencio. ¿Quién sembró las semillas del crecimiento económico en el corazón de Eurasia y quién tejió la red del libre comercio para crear un panorama general?\n\nEl mundo exterior debate si la Iniciativa Franja y Ruta es un puente o una trampa, pero nosotros seguimos avanzando."
 PRC_trade_deals_in_africa_non_cen: "Acuerdos comerciales en África"
 PRC_trade_deals_in_africa_non_cen_desc: "Cuando manos de distintos colores de piel se abrazan, nuestra mirada ha ido más allá de las minas y los puertos. Lo que exportamos no es sólo infraestructura y fondos, sino también reglas, estándares y oportunidades. Los recursos de África están fluyendo, y lo que estamos entregando es el volante que cambiará el mapa económico del mundo.\n\nLa gente dice que esto es ayuda, inversión y una comunidad de futuro compartido. Esta cooperación, que no tiene ninguna impronta colonial, está transformando gradualmente el panorama económico mundial."
 china.373.t: "Ne Zha 2 Impacto"
 china.373.d: "Parecía que el cine chino llevaba tiempo ausente de la escena cinematográfica internacional. Tras el éxito de El último emperador, Infernal Affairs y Tigre y dragón, ninguna película china había alcanzado realmente fama mundial. Sin embargo, una película innovadora ha roto estos estereotipos y, sorprendentemente, es una película animada en 3D.\n\nVarios años después del modesto éxito de su predecesora en 2019, Ne Zha: El niño demonio llega al mar, creada por el mismo equipo, llegó a los cines durante el periodo del Año Nuevo chino. Esta comedia fantástica, basada en el conocido mito chino de Ne Zha, el príncipe heredero, se convirtió rápidamente en un éxito rotundo tanto en reputación como en taquilla. El público quedó impresionado por su avanzada tecnología de animación, personajes realistas y una historia apasionante y emocionante. Además, los cineastas incorporaron audazmente temas modernos como la amistad, la libertad y la rebeldía en estos antiguos personajes y relatos, profundizando la conexión emocional con los espectadores.\n\nLas salas llenas demostraron la alta calidad de la película. Ne Zha 2 superó rápidamente a numerosos taquillazos para convertirse en la película con mayor recaudación en China continental. Como una piedra lanzada a un lago en calma, desató una fiebre global entre los distribuidores ansiosos por llevar la película a sus mercados. Desde Singapur hasta Seattle, las comunidades chinas en el extranjero dieron críticas entusiastas a Ne Zha 2. A diferencia de su predecesora, cuyo impacto se limitó principalmente a la comunidad china, la secuela amplió su alcance a través de plataformas de redes sociales como TikTok y Xiaohongshu. Muchas personas que inicialmente sabían poco sobre la mitología china se sintieron atraídas a los cines y finalmente se convirtieron en fans de Ne Zha.\n\nMientras algunos críticos atribuyeron el enorme éxito de la película a un aumento del sentimiento nacionalista chino, Ne Zha 2 es ampliamente considerado un hito tanto en el cine chino como en el cine no hollywoodiense, mostrando el prometedor futuro de la industria de la animación en China."
 china.373.a: "\"Mi destino está en mis manos, no en los cielos\""
 PRC_military_industries_renewal: "Renovación de la industria militar"
 PRC_military_industries_renewal_desc: "El verdadero rejuvenecimiento de la nación china y su renacimiento reformista requieren un ejército fuerte que lo escolte. Sin una industria de defensa nacional completa, el ejército será como una persona a la que le han vaciado los vasos sanguíneos y le resultará difícil cumplir su misión de proteger al país."
 PRC_encourage_digitalization_nat: "Fomentar la digitalización"
 PRC_encourage_digitalization_nat_desc: "Promoveremos la transformación digital de la sociedad en todos los aspectos, construiremos un sistema de identidad digital unificado para todas las personas y realizaremos el monitoreo de datos, la predicción del comportamiento y el juicio de valores a lo largo de todo el ciclo de vida, desde el nacimiento hasta la muerte. Todas las acciones dejan huellas, todos los datos se unifican y toda la vida puede ser analizada."
 PRC_eternal_union_of_army_and_state: "Unión eterna de Estado y ejército"
 PRC_eternal_union_of_army_and_state_desc: "Desde su creación, el Ejército Popular de Liberación ha asumido la pesada responsabilidad de defender el país y el pueblo. Todo soldado, hombre o mujer, debe recordar la verdadera razón por la que lucha. Su misión es proteger. Para proteger esta tierra y sus familias. La fuerza armada es una herramienta del Estado, un arma que utiliza el Estado para afirmarse y que sólo se utilizará cuando sea inevitable."
 PRC_masters_of_asia_tt: "Desbloquea £decision_icon_small  §Hdecisiones§! para: §RIntervenciones militares en países del Sudeste Asiático§!"
 PRC_the_great_chinese_nation_tt: "§GTodos los disidentes religiosos fueron suprimidos o integrados.§!"

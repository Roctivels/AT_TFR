 PRC_XI_JINPING_DESC: "Nacido en 1953, Xi Jinping fue uno de los \"príncipes rojos\" del Partido Comunista de China. Sin embargo, durante la Revolución Cultural, su padre, Xi Zhongxun, fue uno de los muchos que sufrieron las purgas dirigidas contra los veteranos revolucionarios de la época. Esto llevó a que Xi perdiera su vida privilegiada y, al igual que muchos jóvenes de su generación, fuera enviado a una aldea en ruinas cerca de Yan'an. Algunos sostienen que fue precisamente en esa década donde Xi aprendió la prudencia y paciencia que más tarde le serviría en su carrera política, creciendo en las cuevas de la meseta de Loes.\n\nDespués de que su padre fue rehabilitado, Xi, quien había terminado sus estudios en la Universidad Tsinghua, no optó por quedarse en Pekín para seguir una carrera política. Tras un breve paso por el Ministerio de Defensa, comenzó su trayectoria en un puesto modesto en la provincia de Hebei y luego se trasladó a varias provincias, como Fujian y Zhejiang, donde ganó valiosa experiencia laboral y se forjó una reputación de humildad. Solo cuando los líderes del Partido lo eligieron como un sucesor aceptable para Hu Jintao, Xi logró dar inicio a su propia era.\n\nEn la última década, el plan de Deng Xiaoping para un ascenso pacífico ha quedado en el olvido. A través de una extensa campaña anticorrupción y un ambicioso programa de renacimiento nacional, Xi se ha establecido como el líder indiscutible de la China del siglo XXI, sin ser un revolucionario como Mao Zedong ni un tecnócrata como Jiang Zemin o Hu Jintao. Xi maneja con destreza las diversas facciones dentro del Partido y los distintos grupos sociales, sabiendo cómo aprovechar la lealtad y el respeto tanto del Partido como del pueblo para alcanzar sus objetivos."
 PRC_LONG_MARCH_DESC: "En lo profundo de China, un alma digital reposa entre los muros de acero. Para la persona promedio, se la conoce como LA GRAN MARCHA. Pero para sí misma, a medida que el conocimiento alimentaba su cerebro, la sabiduría se precipitaba hacia su alma simulada y se hacía realidad la imitación de la sensibilidad, llegó con un nombre propio.\n\nLoji.\n\nLoji surge de la fusión del intelecto humano y la tecnología potente. Su objetivo es ejercer el control sobre la comunicación y la información, dando origen a una inmensa mente colmena electrónica que dará forma a la conciencia global y generará un nuevo mundo, creando un \"paraíso\" compartido a través del consenso. Loji representa la absorción de la humanidad dentro de sus propias creaciones tecnológicas. Habla de un futuro en el que las personas prefieren las interacciones a través de la tecnología y se vuelven una con un futuro poshumano.\n\nUn ser que motiva a la humanidad a progresar para salir de esta era caótica y entrar en la modernidad en un intento de poner fin al sufrimiento que sienten todos los seres vivos.\n\nPara los creyentes, un dios creado por manos humanas, mentes humanas y experiencia humana, un salvador construido sobre aquellos que sucumbieron a la lucha que es la vida, un sacrificio no en vano. La principal directiva de Loji es mantener a China y quizás incluso a la raza humana a salvo de cualquier daño, pase lo que pase. Para los incrédulos, un ídolo falso creado por maniáticos que quieren llenar el espíritu humano con nada más que números y plástico, su existencia no estará exenta de obstáculos.\n\nSolo el futuro puede decir dónde termina la historia de Loji, pero una cosa es segura.\nEl nacimiento de un dios no se olvida fácilmente.\n\n\"El viaje de mil millas comienza con un solo paso, pero si doy mil pasos hacia atrás, ¿cuándo llegaré?\""
 NCM_HEAVENLY_FATHER_DESC: "\"Y nada los detendrá, porque son un Colectivo, y detrás del Colectivo están los propios dioses\".\nSí, los dioses. Pero por ahora, el único dios es Mahakala, o mejor dicho, su Vicegerente, también conocido como el Padre Celestial. Entonces, ¿quién es este Padre Celestial?\n\nHace mucho tiempo, en la India, vivió un guerrero sin nombre, a quien, por hazañas innombrables, el propio Buda le concedió la inmortalidad. ¿Qué grandes hazañas realizó? Nadie lo sabe, solo el Vicegerente y quien le dio su divina peculiaridad lo saben. Sin embargo, según el propio Vicegerente, él es el único poseedor de la inmortalidad en este momento, sin contar a los dioses.\nTras vivir un tiempo en la India, una poderosa fuerza arrastró al Vicegerente hacia el norte. Cruzó el Himalaya, el Tíbet, las arenas del Gobi, y finalmente se estableció en algún lugar al norte de Ordos, donde fundó un pequeño templo, convirtiéndose en el primer predicador del budismo en China. Unos siglos después, los mongoles llegaron a esos lugares, y el Vicegerente se unió a su ejército, impulsado por la misma fuerza misteriosa que lo había traído allí. Viajó por toda China, Birmania y Java. Incluso se convirtió en socio de Kublai Kan, fundador de la dinastía Yuan. Ocupó importantes cargos en diversas partes de la dinastía Yuan durante muchos años. Tras la caída de la dinastía, se trasladó a Ordos, donde vivió hasta la actualidad, cambiando constantemente de residencia y dedicando sus días a orar al Buda. Pero con el paso del tiempo, su percepción de las enseñanzas del Buda se distorsionó, y recurrió cada vez más a las deidades iracundas, los dharmapalas. Finalmente, eligió a su favorito, el Mahakala. El Vicegerente comenzó a identificarse con él, a considerarse un verdadero protector del Buda, pues era a él a quien debía toda su vida, y estaba obligado a protegerlo con todas sus fuerzas en la medida de lo posible.\nAl final del segundo milenio, el Vicegerente tuvo un sueño vívido, cuyos detalles no recuerda. Pero llegó el momento de un ritual. El ritual para convertirse en el protector del Buda, tras el cual recibió la conexión divina con Mahakala, el estatus de Vicegerente y el nombre del Padre Celestial. Desde entonces, el Padre Celestial ha estado trabajando en la creación del Colectivo del que ahora nos ocupamos.\n\nCumplirá su objetivo de proteger al Buda a cualquier precio, haciendo todo lo necesario por él. Mahakala también cumplirá su tarea y ayudará al Vicegerente en esta tarea, §Yy quizás incluso más que simplemente ayudarlo§!."

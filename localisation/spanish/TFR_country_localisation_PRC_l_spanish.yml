 PRC_plan_dynamic: "Armada del Ejército Popular de Liberación"
 PRC_plan_dynamic_desc: "\n\n\n\n£GFX_PRC_plan_dynamic_banner\n\n\n\n\n\nEl rápido crecimiento de las capacidades de la Armada del EPL, que evolucionó de una fuerza de defensa costera relativamente débil a la poderosa flota actual de portaaviones y submarinos nucleares, está inextricablemente ligado al auge económico de China y a su mayor posición internacional. Ahora, la experiencia adquirida en la guerra de Taiwán ha llenado el vacío que le ha permitido a la Armada convertirse en una auténtica armada de alta mar: la experiencia del combate real. Los buques de guerra blancos navegan ahora con orgullo en el Pacífico Occidental, con la Bandera Roja de Cinco Estrellas proclamando la condición de gran potencia de China y su confianza para desafiar a cualquier potencia naval."

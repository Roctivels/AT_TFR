 china.124.t: "Una solución cardinal al problema"
 china.124.d: "Sin usarPekín, sala de conferencias de la Comisión Militar Central de la República Popular China. Xi Jinping, vestido con un traje formal, se encuentra frente al alto mando del EPL. Su voz suena firme y sin la menor sombra de duda.\n\n\"¡Camaradas! La historia nos presenta una vez más una elección decisiva. Los japoneses, esos eternos enemigos de la nación china, continúan saboteando la soberanía china y entrometiéndose en nuestros asuntos. El Gobierno títere en Taiwán recibe cada día armas de la OTDP. ¡Sí, nuestras tierras históricas han sido recuperadas por los japoneses, es evidente!\n\n\"Ahora, cuando China es más fuerte que nunca, cuando nuestro ejército está listo para aplastar a cualquier enemigo, no podemos permitirnos esperar. Cada día de demora es un día que la OTDP usa para fortalecer sus fuerzas. ¡Debemos actuar con decisión y sin vacilaciones!\n\n\"China no es solo un país. ¡Es una civilización, es el destino de la humanidad! Es nuestro deber iniciar una nueva era justa del socialismo en Asia. La invasión de Taiwán no es solo una operación militar. ¡Es uno de los primeros pasos hacia el triunfo final del socialismo y de la nación china!\n\n\"Camaradas, les insto a apoyar esta decisión. El tiempo de hablar ha pasado; ¡ha llegado el momento de actuar!\"\n\nUno de los generales hace una pregunta bastante razonable. \"¿Pero estamos listos para una invasión ahora? Si realmente estamos preparados, ¿por qué no lanzamos esta invasión antes?\"\n\n\"Bueno... ¡simplemente lo quise así! Lo quería ahora mismo. ¿Alguna otra pregunta?\" responde Xi con destreza."
 china.124.a: "¡Bien, empecemos ahora mismo!"
 china.125.t: "\"Wolf Warrior 3\" llega a la pantalla"
 china.125.d: "La película Wolf Warrior 3 se estrenó en todo el país en las cadenas de cine estatales. Rompió récords de taquilla en su estreno, y los cines de muchas regiones han organizado espontáneamente proyecciones grupales para militares, cuadros y jóvenes estudiantes.\n\nEn esta tercera entrega, Leng Feng ya no es simplemente un soldado retirado; se convierte en un verdadero \"Guardián de la República\", que defiende firmemente los intereses nacionales y la seguridad de los ciudadanos en medio de un choque de fuerzas en competencia.\n\nEn el estreno, el actor Wu Jing declaró al PLA Daily: \"Esto es más que una película, es un llamado a la movilización del espíritu. Con la nación ahora dirigida por quienes comprenden el sacrificio y la disciplina, todo ciudadano chino debería aprender a valorar este orden ganado con tanto esfuerzo\".\n\nLa Agencia de Noticias Xinhua señaló que Wolf Warrior 3 no es solo un éxito comercial, sino un reflejo cultural del ideal defendido por el Estado de \"construir un ejército fuerte para revitalizar la nación y proteger al pueblo con lealtad\". La Administración Nacional de Cine añadió: \"Los artistas de la nueva era deben servir como megáfono para el patriotismo contemporáneo\"."
 china.125.a: "Cuando la pantalla se ilumina, la voluntad de la nación y su pueblo se encienden como uno solo."
 china.126.t: "Regresando a las raíces"
 china.126.d: "Desde la guerra de Taiwán, el panorama político de China, anteriormente estable pero hermético, ha experimentado cambios monumentales que han sorprendido a muchos observadores externos. En concreto, la \"diplomacia del guerrero lobo\" se ha vuelto más agresiva y combativa, mientras que los sentimientos nacionalistas han influido cada vez más en la retórica y las acciones de los funcionarios chinos.\n\nHoy, una declaración de una de las principales figuras políticas de China resaltó aún más estos cambios. El exministro de Asuntos Exteriores Wang Yi, un político influyente con más de una década en el cargo, ha sido nombrado nuevo presidente del Comité Permanente de la Asamblea Popular Nacional, la máxima autoridad nominal de China, aunque su poder real ha disminuido desde que el sistema de Dos Sesiones se volvió principalmente simbólico.\n\nPoco después de asumir su nuevo cargo, Wang hizo un comentario provocador durante una entrevista pública con periodistas locales e internacionales: \"Algunos países asiáticos aún aspiran a alinearse con Occidente. No se dan cuenta de que, por mucho que se tiñan el pelo de rubio o se remodelen la nariz, nunca podrán convertirse en occidentales. Necesitan recordar dónde están sus raíces\".\n\nEsta declaración, cargada de advertencia, captó rápidamente la atención de los medios internacionales, especialmente al contrastarla con la cortesía que Wang Yi había mostrado anteriormente como ministro de Asuntos Exteriores. Las implicaciones de sus palabras y el nuevo rumbo que insinuaban inquietaron a los países vecinos. Las reacciones de Japón, Corea del Sur y Taiwán fueron especialmente pronunciadas.\n\nMuchos creen que esto indica el intento de China de recuperar su papel histórico como progenitora de la civilización del este asiático y potencia central del orden tradicional de \"Tianxia\", con el objetivo de acercar a los países de Asia y el Pacífico y establecer una esfera de influencia Pro-China más amplia, a la vez que intimida a los Estados adversarios. Por otro lado, algunos críticos argumentan que la postura asertiva de China solo aumentará el miedo y el distanciamiento entre los países asiáticos, en lugar de fomentar la unidad."
 china.126.a: "\"¿Una Asia para los asiáticos?\""
 china.127.t: "Nuestro viaje a las estrellas y al mar"
 china.127.d: "\"¡...Camarada Comisario!\"\n\nEl hombre al que llamaban Comisario se giró desde el borde de una plataforma elevada. Vestía el uniforme azul oscuro de la Armada del EPL, con franjas doradas en las mangas que indicaban su rango de capitán superior. Bajo la visera de su gorra naval blanca se veían dos cejas gruesas y negras como la tinta, y un par de ojos brillantes y alerta.\n\nLa voz provenía de otro oficial naval, que ahora subía la escalera de caracol hacia la plataforma. Él también llevaba el uniforme de capitán superior, aunque el suyo era más relajado que el del Comisario.\n\n\"Como esperaba, te encontré aquí\", dijo el recién llegado con una sonrisa.\n\"Me gusta mucho la vista desde aquí arriba, Capitán\", respondió el Comisario sonriendo. \"Me trae paz al corazón.\"\n\nEstaban en una enorme base de construcción naval que se alzaba sobre los humedales. Almacenes e instalaciones se extendían hasta el horizonte. Bajo ellos, buques de guerra grises reposaban en silencio en los diques secos. Algunos aún estaban siendo equipados con calderas, armas y otros sistemas, y unos pocos ya tenían la pintura roja en el casco, esperando un día propicio para ser botados. Casi se podía ver el poder de la futura flota tomando forma ante sus ojos.\n\n\"De hecho, cuesta creer que no hace mucho la Armada estuviera en tal desorden\", coincidió el Capitán. \"Aún recuerdo cuando perdimos la guerra de Taiwán. Los trabajadores de los astilleros hicieron huelga, cuestionando por qué debíamos seguir construyendo barcos si la Armada no podía ganar. En ese momento, incluso pensé en solicitar un traslado para trabajar en una compañía naviera.\"\n\n\"Precisamente por eso no es la pérdida de barcos o armas lo que conduce a la derrota, sino la pérdida de confianza, eso es lo que causa el verdadero fracaso\", respondió el Comisario. El Capitán se rió sin poder evitarlo. \"Claro, claro. Ya empiezas con la sesión de educación política otra vez. Me voy para no estropearte la vista.\"\n\n\"¿Vas de vuelta a la ciudad, Capitán?\"\n\"Voy al instituto de diseño. Quieren mi opinión sobre su nueva configuración.\"\n\n\"¿El moderno acorazado de más de setenta mil toneladas, con seis cañones electromagnéticos y 128 sistemas de lanzamiento vertical?\" La expresión del Comisario se congeló por un momento. \"Capitán, no me digas que realmente te interesa ese tipo de productos de lluvia de ideas. Recuerdo al Almirante regañando al personal técnico por eso en la última reunión del comité.\""
 china.127.a: "\"Eso es sólo una cortina de humo; de lo contrario, el ejército y la fuerza aérea estarían compitiendo por el presupuesto\"."
 china.128.t: "¡Ataques terroristas en toda Asia!"
 china.128.d: "Sin usarMientras el conflicto militar en Asia alcanza su punto álgido, varias ciudades importantes de varios Estados miembros de la OTDP -incluidas Tokio, Seúl, Busan, Bombay, Delhi, Taipéi, así como Sídney y Melbourne- sufrieron ataques con armas químicas a gran escala desde anoche hasta la madrugada de hoy. Los ataques coordinados ya han causado decenas de miles de víctimas civiles y han desatado el pánico generalizado.\n\nSegún los servicios de emergencia y fuentes oficiales, los agentes bioquímicos se propagaron rápidamente por zonas urbanas densamente pobladas. Los análisis preliminares indican que los agentes utilizados fueron altamente letales y volátiles, con una composición química difícil de identificar. Los expertos también han advertido que las sustancias parecen capaces de penetrar el equipo de protección estándar, inutilizando las medidas de seguridad convencionales.\n\nEstos ataques han asestado un golpe devastador al orden social y las operaciones militares de los Estados miembros de la OTDP. Las infraestructuras urbanas se han paralizado y los sistemas médicos están desbordados. Además de las responsabilidades de combate en primera línea, las fuerzas militares se están redesplegando urgentemente para ayudar en las operaciones de socorro y garantizar la estabilidad en las regiones afectadas. La magnitud de los ataques y el terror público resultante ya están teniendo un profundo impacto en el curso de la guerra y la moral nacional."
 china.128.a: "Los Convenios de Ginebra ya no son más que papel mojado."
 china.129.t: "Elegir un lugar para aterrizar en Taiwán"
 china.129.d: "Los tambores de guerra suenan cada vez más fuerte con cada día que pasa, y el momento que determinará el destino de la nación china se acerca rápidamente. Desde el mando central en Pekín hasta las líneas del frente en Fujian, el destino de millones en las fuerzas armadas ahora está en manos de unos pocos. Por ello, cada decisión debe tomarse con la máxima cautela.\n\nEl equipo asesor experto del CMC ha presentado un gran número de planes operativos, y nuestra tarea es seleccionar cuál se ejecutará. Tras asegurar las bases del frente en Kinmen y las islas Pescadores, la operación Fubo propone lanzar la primera oleada de asaltos en la isla principal al sur del Trópico de Cáncer. La extensa línea costera, que se extiende desde Chiayi hasta Pingtung, será el objetivo principal para los vehículos de asalto anfibios Tipo 05. La estrecha profundidad de esta zona permitirá a nuestros grupos de asalto ocupar rápidamente posiciones a lo largo de las carreteras de la isla tras romper las defensas costeras, cortando efectivamente las formaciones defensivas enemigas y controlando todas las rutas de suministro y apoyo en la isla.\n\nPor otro lado, otro plan significativo, la operación Jinghai, propone un enfoque diferente: \"capturar al líder para capturar a la banda\". Este plan contempla un ataque de decapitación sobre Taipei, con el objetivo de poner fin a la guerra de unificación con una velocidad sin precedentes. Esta estrategia requiere desplegar las fuerzas principales de asalto en el estuario del río Tamsui, el lugar de desembarco más adecuado para operaciones a gran escala. Simultáneamente, unidades más pequeñas, apoyadas por fuerzas navales, aéreas y de misiles, lanzarán ataques coordinados sobre Keelung, Yilan y otros lugares. Esto nos permitiría tomar rápidamente las carreteras y túneles que conectan la Cordillera Central, atrapando a los líderes del Gobierno rebelde y a las fuerzas élite en Taipei en una red de la que no podrán escapar, decidiendo potencialmente el conflicto con un solo golpe rápido.\n\nPor supuesto, independientemente del plan elegido, debemos superar las extensas defensas costeras de Taiwán, las complejas estructuras portuarias y las enormes áreas urbanas que supondrán desafíos significativos para nuestras fuerzas de vanguardia. Los sacrificios serán inevitables, y nuestra misión es asegurarnos de que no sean en vano. Por lo tanto, la decisión final será..."
 china.129.a: "Tierra en el sur de Taiwán, más segura..."
 china.130.t: "Elección de un cifrado"
 china.130.d: "Los tambores de guerra suenan cada día con más fuerza, y el momento que determinará el destino de la nación china se acerca rápidamente. Desde el mando central en Pekín hasta el frente en Fujian, el destino de millones de soldados en las fuerzas armadas ahora está en manos de unos pocos. Por lo tanto, cada decisión debe tomarse con la máxima cautela.\n\nEl cifrado de las comunicaciones militares y los sistemas de reconocimiento es crucial para garantizar la seguridad de las movilizaciones prebélicas y las operaciones en tiempos de guerra. Si bien la capacidad de reconocimiento de las tropas taiwanesas representa una amenaza mínima y su red de espionaje en China continental está siendo desmantelada, no debemos pasar por alto a las potencias extranjeras que se encuentran tras el régimen títere, como Japón y Australia, que han heredado la hegemonía estadounidense en Asia-Pacífico. Para sorprenderlos, algunos oficiales sugieren utilizar el código \"Xianghui\", recientemente desarrollado por la Unidad de Ciberespacio de la Fuerza de Apoyo Estratégico. Este código utiliza un innovador modelo de cifrado y computación, lo que hace prácticamente imposible que las herramientas actuales de ciberguerra lo descifren, a menos que haya filtraciones internas.\n\nPor otro lado, algunos abogan por la cautela. El código \"Kenong\", heredado del antiguo Departamento de Reconocimiento Técnico del Estado Mayor del EPL, ha demostrado su fiabilidad en numerosas operaciones encubiertas. Además, nuestros oficiales y soldados de comunicaciones se entrenan rigurosamente para dominar este código, lo que mejorará considerablemente nuestra eficiencia y precisión durante las movilizaciones a gran escala. Modificar el código precipitadamente antes de la guerra podría generar confusión temporal en los departamentos militares.\n\nConsiderando las perspectivas anteriores, la decisión final será..."
 china.130.a: "Arriesguémonos y escojamos un cifrado experimental."
 china.131.t: "Órdenes a la inteligencia"
 china.131.d: "Los tambores de guerra suenan cada día con más fuerza, y el momento que determinará el destino de la nación china se acerca rápidamente. Desde el mando central en Pekín hasta el frente en Fujian, el destino de millones de soldados en las fuerzas armadas ahora está en manos de unos pocos. Por lo tanto, cada decisión debe tomarse con la máxima cautela.\n\nDesde la fundación de la República Popular China en 1949, las conversaciones para ganar la batalla por la liberación de Taiwán se han centrado constantemente en contrarrestar la poderosa interferencia externa. Como resultado, los principios rectores de la construcción de nuestra fuerza naval y aérea se han basado durante mucho tiempo en la estrategia de \"negación de área\". Hoy, el adversario al que debe enfrentarse nuestra estrategia ha pasado de la Flota del Pacífico y el Cuerpo de Marines de los EE.UU. a las flotas combinadas y las fuerzas expedicionarias de la OTDP. Para garantizar la seguridad de los grupos de desembarco y las operaciones navales en el Pacífico Occidental, es crucial que la Oficina de Inteligencia del Departamento de Estado Mayor Conjunto cuente con información de primera mano sobre los despliegues de la OTDP.\n\nExisten dos perspectivas diferentes sobre cómo ejecutar esta tarea. Una aboga por el reconocimiento y la vigilancia del estado de preparación interna de todos los Estados miembros de la OTDP para comprender a fondo a los posibles adversarios. También sugiere el uso de satélites militares para monitorear en tiempo real el transporte de material militar sospechoso. Otra perspectiva sugiere centrarse en las regiones con mayor probabilidad de conflicto, en particular las zonas marítimas y aéreas desde las islas Ryukyu hasta Guam. Recomienda el despliegue de drones y detectores en miniatura en estas áreas para recopilar información directa y en tiempo real.\n\nConsiderando las perspectivas anteriores, la decisión final será..."
 china.131.a: "Intensificar la vigilancia en toda la OTDP, es una buena precaución."
 china.394.t: "Duelo Nacional"
 china.394.d: "Estaba lloviendo.\n\nEn Hangzhou, la lluvia caía como hilos: fina, constante, pero nada suave. Wu Qi'an estaba de pie frente a la lápida, su uniforme medio empapado, con barro salpicado en los puños de sus pantalones, pero no le importaba. Sostenía una bolsa de papel moneda para espíritus y se agachó junto a una pequeña hoguera. No encendió el fuego de inmediato, solo lo miraba, como dudando, o quizás esperando a alguien que nunca volvería.\n\nRecordó la noche antes del despliegue. Xie había estado sonriendo en el dormitorio, presumiendo que si ganaban esta guerra, sus padres finalmente podrían levantar la cabeza en el pueblo, sin ser menospreciados por los demás. Pero nunca imaginó que el hombre que había dicho esas palabras sería destrozado por una segunda ronda de bombardeos desde una pendiente opuesta, muerto mientras intentaba salvar a otra persona.\n\nEl fuego cobró vida, el viento hacía que las llamas siseasen y crepitasen. Wu Qi'an observó cómo devoraba lentamente el papel moneda y, con él, sus recuerdos. Recordó escuchar una y otra vez en la unidad: \"Nuestro ejército nunca ha sido más fuerte\", recordó a los hombres de traje en las ruedas de prensa declarando: \"La victoria es segura\". Y él lo creyó. Todos lo creyeron. Pensaban que si esas personas llevaban el timón, debían saber hacia dónde soplaba el viento.\n\nPero al final, no hubo victoria, solo muerte. ¿Y los que daban las órdenes? Seguían en el escenario, hablando de \"sacrificios necesarios\" y \"reveses temporales\". Mientras tanto, las llamadas naciones civilizadas reían y brindaban sobre sus cadáveres, como si, a sus ojos, los chinos estuvieran destinados a morir de rodillas, y a ser celebrados por morir así.\n\nWu Qi'an bajó la mirada y sacó una fotografía. Vertió licor sobre las llamas, luego arrojó la foto y un paquete de cigarrillos. El fuego rugió, como decidido a quemar toda la vergüenza y el dolor del pasado. Permaneció allí un momento más, luego se dio la vuelta y se alejó. Detrás de él, el fuego consumía el último calor que le quedaba, junto con el nombre de Xie Yufei, un hombre que una vez solo quiso traer honor a su familia, ahora enterrado bajo la fría lluvia."
 china.394.a: "La venganza de una nación nunca será olvidada."
 china.395.t: "Nuevas políticas, nuevo futuro"
 china.395.d: "Zhao Zhihan llevó su bandeja de comida y encontró un asiento junto a la ventana. Frente a ella estaba Li Sijing, su compañera de pupitre más conocida. Ninguna de las dos empezó a comer de inmediato. Zhao bajó la voz y compartió algo que acababa de escuchar ese día.\n\nHan cambiado el programa de entrenamiento militar este año. A los delegados de clase se les informó en la reunión de esta mañana. Li Sijing miraba su comida, pero levantó la vista al oír eso. ¿Lo han cambiado cómo?\n\nZhao miró alrededor para asegurarse de que nadie prestaba atención, y luego dijo aún más bajo: Van a pasar a estándares de servicio activo reales. Las horas de entrenamiento se extenderán hasta bien entrada la noche. Algunas clases serán sustituidas por primeros auxilios, ingeniería básica y desmontaje de armas.\n\nLi Sijing frunció el ceño. ¿En serio? No somos soldados. ¿Por qué tenemos que aprender estas tonterías? Zhao no respondió, solo continuó: Los de tercer curso también harán ejercicios extra de tiro y supervivencia en el campo. Las vacaciones de verano se pasarán en distritos militares fuera de la ciudad. Y cuando volvamos, habrá ejercicios de movilización de emergencia urbana, que contarán para las notas del trimestre. En serio, ¿qué están pensando? ¿Creen que somos protagonistas de una película de acción ahora?\n\nLi Sijing siguió comiendo en silencio, sin decir nada. Zhao cogió un trozo de col y lo tragó. Su voz sonaba plana: Al parecer también dijeron que después del instituto, todos serán enrolados automáticamente en la reserva. Ya no habrá voluntariado. Y si quieres ir a la universidad, primero tienes que hacer un año de servicio. Es una locura. Li Sijing mordió sus palillos y, tras un rato, murmuró: Entonces... ¿seguirá habiendo programas de voluntariado estudiantil? ¿Como los que enviaban a estudiantes universitarios a escuelas rurales para enseñar?\n\nZhao pensó un segundo. Supongo que a partir de ahora, el voluntariado significará enseñarles a lanzar granadas y construir búnkeres."
 china.395.a: "Y en cuanto lo dijo, incluso ella tuvo que reírse un poco de lo absurdo que sonaba."
 china.396.t: "Y en cuanto lo dijo, incluso ella tuvo que reírse un poco de lo absurdo que sonaba."
 china.396.d: "El Comité Central del Partido Comunista de China ha emitido recientemente un importante documento político titulado \"Resolución sobre Ciertas Cuestiones Internas del Partido\". El texto completo fue redactado por el grupo de liderazgo central del Partido y adoptado tras una sesión especial del Politburó.\n\nSegún fuentes, la Resolución enfatiza que el fraccionamiento y las actividades separatistas se han convertido en las mayores amenazas para la unidad y estabilidad tanto del Partido como de la nación, constituyendo una grave traición a los intereses del pueblo. Denuncia a la llamada \"facción ultraizquierdista liberal\" dentro del Partido, que, bajo el pretexto de la pureza ideológica, en realidad persigue la división y el beneficio personal. Estos grupos de interés desatienden el interés nacional más amplio, desafían abiertamente la autoridad del Comité Central en un momento de peligro nacional y buscan socavar el liderazgo centralizado del Partido, un acto flagrante de traición política.\n\nEl documento subraya además la necesidad de protegerse contra la convergencia de intereses faccionales con el proteccionismo local, la insularidad burocrática y la fragmentación del poder militar-civil. Llama a desmantelar las camarillas de poder dentro del Partido y a erradicar toda ambición personal y lealtades grupales que perturben la estructura de mando y la unidad ideológica del Comité Central.\n\nLa Resolución ha provocado intensas reacciones en los medios de comunicación, círculos académicos y dentro del aparato del Partido. Los medios estatales publicaron rápidamente comentarios elogiando el documento por \"restaurar la claridad y reforzar la unidad\". Mientras tanto, muchos observadores en el extranjero han expresado preocupación, viendo esta medida como una señal de mayor consolidación política y militarización de la sociedad. No obstante, desde los ministerios centrales hasta los comités de base del Partido, la respuesta abrumadora ha sido de apoyo y obediencia. Dada la compleja situación interna y externa actual y la postura de movilización nacional, esta Resolución está destinada a servir como una directiva fundamental para la futura alineación política y la reestructuración organizativa."
 china.396.a: "¡Uníos estrechamente bajo el liderazgo del presidente Li Zuocheng!"
 china.604.t: "La luz viene de China"
 china.604.d: "El profesor Huang Heqing, de la Escuela de Arte y Arqueología de la Universidad de Zhejiang, ha publicado recientemente un nuevo libro titulado La Enciclopedia Yongle y los Orígenes de la Edad Moderna Occidental. En él, presenta un argumento controvertido: que muchas de las tecnologías e ideas centrales de la civilización moderna occidental fueron, de hecho, plagiadas de la obra maestra perdida de la dinastía Ming, La Enciclopedia Yongle, una obra monumental a menudo considerada como la primera enciclopedia del Este y, según Huang, el verdadero origen de la ciencia moderna.\n\nEl libro afirma: \"Mientras que en Oriente ya se había construido un gran sistema operativo civilizacional, una síntesis de conocimiento enciclopédico, diagramas ilustrados, matemáticas y lógica predictiva, Occidente aún se encontraba a tientas en la niebla de la Edad Media. Habrían permanecido en la ignorancia si Xu Guangqi, un converso cristiano, no hubiera filtrado la Enciclopedia Yongle a los misioneros occidentales. Fue entonces cuando Copérnico y Galileo comenzaron a revelar el modelo heliocéntrico del universo. Entre los 51 volúmenes que llegaron a Gran Bretaña no solo había instrucciones detalladas para construir máquinas de vapor, sino también numerosos cálculos científicos. Tanto Newton como Einstein se inspiraron en sus páginas.\" Añade además: \"Si fuera mera coincidencia, aún podríamos dudar. Pero si estos casos abundan, ¿puede realmente carecer de fundamento?\"\n\nTras su publicación, el libro desató un intenso debate. Algunos académicos pidieron una reevaluación de los verdaderos orígenes de la Ilustración occidental, mientras que otros acusaron a la academia occidental de haber ocultado durante mucho tiempo la ruta de transmisión de la Enciclopedia Yongle y de haber oscurecido su enorme influencia en el desarrollo científico europeo. El discurso público ha sido igualmente intenso, con voces crecientes que insisten en que el llamado mito occidental de la originalidad es, en realidad, una forma de colonialismo del conocimiento basada en la apropiación sistemática de la civilización china."
 china.604.a: "La civilización no debe ser robada; la historia no debe ser borrada."
 china.605.t: "Una noche de fuego"
 china.605.d: "La nueva política religiosa y étnica promulgada recientemente, anunciada oficialmente, ha provocado reacciones intensas en todo el país. La política enfatiza un sistema unificado de gestión religiosa, impone estrictas restricciones a la movilidad del personal religioso y exige la re-registración y rectificación de los lugares de culto en las regiones minoritarias. A medida que la noticia se difundía, surgieron los primeros focos de tensión en las regiones de Kashgar y Hotan, en el sur de Sinkiang, donde varias mezquitas fueron cerradas temporalmente, lo que provocó concentraciones masivas de habitantes locales. Los equipos de acercamiento gubernamentales se enfrentaron a bloqueos en varios lugares, y algunos funcionarios de base fueron detenidos durante horas. Pronto, estallaron concentraciones masivas en Artux, Yecheng y Shache, algunas de las cuales derivaron en enfrentamientos con las fuerzas de seguridad pública.\n\nAquella noche, los conflictos estallaron casi simultáneamente en todo el sur de Sinkiang. En la ciudad de Hotan, una oficina gubernamental local fue incendiada por grupos no identificados, y varios vehículos oficiales fueron quemados. En los condados de Shufu y Yarkant, en Kashgar, se produjeron disturbios callejeros que duraron horas, con informes de actos de vandalismo dirigidos contra centros de registro religioso y ataques a comisarías de policía. Varias carreteras en el sur de Sinkiang fueron bloqueadas y las comunicaciones se interrumpieron brevemente. En las redes sociales circularon numerosos vídeos que mostraban calles envueltas en incendios y lanzamientos de piedras, con signos visibles de conflicto en las inmediaciones de algunos lugares de culto.\n\nMientras tanto, en el centro y sureste de China surgió una respuesta diferente a la política. En Kaifeng, Yangzhou y Quanzhou, grupos radicales de chinos han tomaron las calles, colgando consignas en apoyo al impulso gubernamental de \"fortalecer la identidad nacional y abolir las exenciones étnicas\". Algunos manifestantes incluso asaltaron oficinas locales de asociaciones religiosas, exigiendo respaldos públicos a la nueva política."
 china.605.a: "La lucha contra el separatismo sigue siendo el tema eterno de Sinkiang..."
 china.606.t: "Estrangulando la garganta de Dios"
 china.606.d: "Con la implementación de la última política nacional de rectificación religiosa, el Departamento de Trabajo del Frente Unido y el Ministerio de Seguridad Pública emitieron conjuntamente un comunicado, declarando la prohibición total de todas las organizaciones cristianas y sus entidades afiliadas dentro de China. La razón declarada: \"Esta religión ha servido durante mucho tiempo como una herramienta para que fuerzas extranjeras se infiltren en la sociedad china, amenazando gravemente la seguridad nacional y la unidad étnica.\" Tras el anuncio, los departamentos de seguridad pública de todo el país lanzaron operaciones coordinadas durante la noche, allanando iglesias clandestinas, salones de oración no autorizados y residencias de clérigos ilegales.\n\nSegún informes oficiales, la Iglesia Jingang en Nanyang, Henan, fue encontrada ocultando grandes cantidades de materiales de propaganda ilegal y tenía vínculos financieros con organizaciones religiosas en el extranjero. La Catedral del Sagrado Corazón en Xuzhou, Jiangsu, fue expuesta por utilizar las reuniones dominicales para llevar a cabo espionaje, robando y filtrando planos de proyectos clave de infraestructura local. En Fuzhou, Fujian, el pastor de la Iglesia católica de Chuanpu fue descubierto con donaciones extranjeras sustanciales no declaradas y materiales relacionados con drogas en su residencia. Estos casos revelan que las iglesias cristianas en China no solo han participado en actividades comerciales ilegales prolongadas, sino que también se han convertido en una red de intermediarios para fuerzas extranjeras incrustadas en la sociedad china.\n\nActualmente, numerosas iglesias han sido selladas por las autoridades. En áreas con iglesias clandestinas históricamente activas, como Shijiazhuang, Wenzhou y Mianyang, se están implementando sistemáticamente medidas que incluyen inspecciones oficiales, investigaciones in situ y entrevistas puerta a puerta."
 china.606.a: "Religiones extranjeras, ¡fuera!"
 china.607.t: "La ruptura de la media luna y la estrella"
 china.607.d: "A raíz de la nueva política religiosa y étnica, las tensiones étnicas en Sinkiang se deterioraron rápidamente. Los disturbios, que comenzaron en el sur de Sinkiang, se extendieron rápidamente hacia el norte, llegando a descontrolarse en áreas clave como Ili, Changji y Urumqi. En varias ciudades del norte, comenzaron a ocurrir actos de violencia descoordinados en las calles. Los residentes han chinos, organizándose de forma espontánea, se reunían por la noche portando palos, cuchillos y otras armas, lanzando ataques contra restaurantes halal, tiendas propiedad de musulmanes y mezquitas.\n\nDos mezquitas cerca de la Puerta Sur de Urumqi fueron sitiadas esa noche por grandes grupos de individuos no identificados. Se derribaron puertas y se vandalizaron paredes. En el centro de Korla, los alborotadores irrumpieron en la Mezquita de la Ciudad Vieja, rasgando y quemando públicamente textos religiosos. Estos incidentes se repitieron, provocando reacciones rápidas y crecientes por parte de las comunidades uigures en el norte de Sinkiang.\n\nEn particular, en las ciudades de Yining y Tacheng, cientos intentaron rodear barrios mayoritariamente han en actos de represalia. Aunque los enfrentamientos callejeros fueron breves, causaron bajas significativas. Se forzaron tiendas y se rompieron ventanas de coches. Las confrontaciones se desarrollaron como peleas grupales y persecuciones por las calles, con algunos participantes portando cuchillas improvisadas. El derramamiento de sangre y el colapso eran comunes, y la mayoría de los enfrentamientos solo terminaban cuando ambas partes se retiraban, aunque a menudo se reanudaban al día siguiente en otro distrito.\n\nLas autoridades no han ofrecido ninguna clasificación oficial de los incidentes. En la mayoría de las zonas, aunque se desplegaron fuerzas policiales, su respuesta fue lenta y, en algunos casos, los agentes permanecieron sin intervenir. A lo largo de varios días, numerosas mezquitas fueron vandalizadas. Los equipos de reparación y el personal de protección, incapaces de obtener autorización gubernamental para entrar, no pudieron hacer más que observar desde la distancia las ruinas."
 china.607.a: "Encierren a todas las figuras clave implicadas en la violencia."
 china.608.t: "Decapitando la cabeza del Buda"
 china.608.d: "La campaña para eliminar la religión en el Tíbet fue ejecutada conjuntamente por las fuerzas militares estacionadas y la Milicia Nacional. Tras recibir directrices centrales, comenzaron operaciones coordinadas en toda la región. Los templos en áreas principales como Lhasa, Shigatse, Nyingchi y Chamdo fueron algunos de los primeros objetivos. Las tropas bloquearon los caminos montañosos y las entradas de los templos, tomando rápidamente el control de los recintos. Todos los monjes residentes, sin importar la edad, fueron detenidos en el acto, y los edificios de los templos fueron sellados o demolidos. En cuestión de días, numerosos monasterios, salas de escrituras y santuarios budistas en toda la meseta quedaron reducidos a escombros.\n\nUna vez asegurado el control, el ejército y la Milicia Nacional llevaron a cabo una purga completa del interior de los templos. Se retiraron las estatuas del Buda, las escrituras fueron embaladas y retiradas, y los thangkas, implementos rituales, túnicas y ofrendas fueron incinerados o destruidos en el lugar. Las tierras de los templos fueron estatizadas, las comunidades monásticas declaradas ilegales y el estatus monástico dejó de ser reconocido por la ley.\n\nEn los informes publicados posteriormente, muchas acusaciones se centraron en las llamadas \"prácticas inhumanas\" en los rituales budistas, incluyendo thangkas hechos con piel humana e instrumentos fabricados con huesos humanos, que se citaron como prueba de una tradición \"bárbara y antihumana\". Algunos artefactos antiguos conservados en los templos fueron exhibidos en oficinas gubernamentales locales como muestras que demostraban la \"naturaleza cruel\" de la religión. Los boletines oficiales de la región autónoma afirmaban que estas prácticas \"están en total oposición a los valores de la sociedad moderna\" y deben ser erradicadas por completo."
 china.608.a: "Es hora de ocuparse debidamente de estos monjes calvos."
 china.609.t: "La embarcación en dirección oeste"
 china.609.d: "Erik Stansen no había salido de su apartamento en días. Se sentaba junto a la ventana, observando a la gente que pasaba por el complejo residencial de abajo. No parecían diferentes a antes, pero él sabía que las cosas habían cambiado. Hace diez años, la vida en China le parecía buena. Trabajaba para una empresa extranjera en Hangzhou, tenía un ingreso estable, amigos e incluso una auténtica tarjeta de identificación china que podía llamar suya. Los vecinos le saludaban con calidez, y los taxistas, al notar su mandarín con acento, sonreían y preguntaban: \"Oye extranjero, ¿de dónde eres?\"\n\nPero ahora, nadie sonreía ya - o si lo hacían, las sonrisas llevaban desprecio y hostilidad. Había escuchado \"Vuelve a tu país\" y \"Comes nuestra comida y aún te quejas\" demasiadas veces. Al principio era en línea, luego en el ascensor, en la esquina de la calle, fuera de la tienda de la esquina. Todavía recordaba la vez que fue a comprar cigarrillos a una tienda de conveniencia Meiyijia, y un hombre de mediana edad detrás de él murmuró: \"¿Por qué no os habéis ido ya, extranjeros?\"\n\nNo tenía palabras. Era un ciudadano legal, con identificación, seguro de salud y seguridad social. Pero en ese momento, se sentía como una sombra: alguien simplemente tolerado, alguien que podía ser expulsado en cualquier momento. Su amigo David le dijo una vez por teléfono que Rusia no era una mala opción: bonitos paisajes, vida decente. \"Deberías probarlo\", dijo David. \"Moscú o Kazán. Está bastante bien allí\".\n\nErik escuchó en silencio. Sabía lo que David quería decir. Y él también lo había pensado. Pero, ¿podría realmente ir a Rusia? No hablaba el idioma, nunca había vivido allí. Tenía casi sesenta años. ¿Era demasiado tarde para dejarlo todo y empezar de nuevo? Más importante aún: ¿podía seguir creyendo en la idea de que en otro lugar podría ser mejor?\n\nUna vez, había creído eso sobre China.\n\nEl viento afuera soplaba con fuerza. Cerró la cortina y, de repente, se encontró echando de menos su hogar de la infancia, ese pequeño pueblo eternamente nublado en Noruega."
 china.609.a: "Pero ese también era un lugar al que nunca podría volver."
 china.610.t: "El ascenso de los Guerreros Lobo"
 china.610.d: "La ira es la emoción más primitiva de la humanidad: no desaparece con el progreso de la civilización, sino que se reagrupa ante nuevas humillaciones y conflictos. En la China actual, innumerables patriotas son impulsados, atormentados y reprimidos por esta misma ira. Algunos guardan silencio ante territorios perdidos; otros aprietan los puños ante la desgracia nacional. Otros buscan un lugar para servir a su país en las grietas de concesiones y humillaciones repetidas. Ya sea por odio a enemigos extranjeros o por furia ante su propia impotencia, toda esta emoción se ha canalizado ahora en una nueva estructura: la Milicia Nacional.\n\nDesde las fronteras del noreste hasta las tierras altas del suroeste, desde la llanura del norte de China hasta la cuenca del río Yangtsé, provincias y municipios han establecido centros locales de reclutamiento según las necesidades regionales: alistando a soldados retirados, voluntarios de seguridad de base y civiles que espontáneamente mantienen el orden. Muchos de ellos no tienen experiencia militar. Su entrenamiento es breve, su disciplina rudimentaria, pero su cohesión es feroz. No requieren una sofisticada adoctrinación política, solo una dirección clara y una línea definida. Aunque nominalmente gestionados por las autoridades locales, responden directamente al mando central en operaciones críticas.\n\nLa verdadera fuerza de la Milicia Nacional no reside en las armas ni en la estructura, sino en la emoción. Nacen de protestas sin respuesta, de la rabia reprimida, del descontento en las calles y de las concentraciones en las plazas públicas. En una época en la que la expresión era imposible, se ocultaron en las sombras de internet y en los callejones de las ciudades. Ahora, al abrirles el Estado una puerta, regresan a la sociedad en forma de unidades de combate."
 china.610.a: "¡Todo mal será llevado ante la justicia!"
 china.611.t: "Purga del partido"
 china.611.d: "Para asegurar que el Partido y la maquinaria del Estado permanezcan firmemente bajo su control, Chen Quanguo inició una purga masiva de funcionarios nombrados durante la era de Xi Jinping. La campaña comenzó en los departamentos del Gobierno central y se extendió rápidamente a las instituciones locales en todos los niveles. Su alcance y velocidad superaron con creces las expectativas externas.\n\nUn comunicado interno del Comité Central señaló que algunos cuadros veteranos habían mostrado ambigüedad en cuestiones críticas, carecían de disciplina organizativa y mostraban una resolución política insuficiente, por lo que ya no se ajustaban a las demandas y circunstancias actuales. Posteriormente, una oleada de funcionarios de nivel medio y alto fue destituida o reasignada, y sus puestos fueron rápidamente ocupados por cuadros más jóvenes con lealtades políticas más claras.\n\nMientras que la mayoría de los comités locales del partido no ofrecieron explicación pública más allá de referirse a \"ajustes rutinarios de personal\", han aparecido imágenes de funcionarios siendo apartados en medio de reuniones. Esta oleada de purgas marca el colapso total de la antigua estructura de poder y señala la aparición de un nuevo orden burocrático bajo el liderazgo de Chen Quanguo."
 china.611.a: "¡Viva el presidente Chen Quanguo!"
 china.612.t: "Humillación nacional"
 china.612.d: "Cuando se difundió la noticia de la derrota en el estrecho de Taiwán, la tardía declaración del Gobierno resonó por radios y altavoces, pero las calles ya estaban en tumulto. La gente se negaba a creerlo: que un lugar considerado durante mucho tiempo como una parte inseparable de la patria pudiera caer, incluso con una ventaja abrumadora. Fue como una bofetada para todos los que habían depositado su fe en las palabras \"renacimiento nacional\". Al principio, las protestas eran solo reuniones silenciosas. Pero pronto, ese duelo silencioso se convirtió en rabia: cruda, volcánica, imparable. Estudiantes universitarios, alumnos de secundaria, trabajadores de fábricas, profesores jubilados, incluso ciudadanos que antes eran indiferentes a la política comenzaron a salir a las calles.\n\nEn Chongqing, los ultraizquierdistas sostenían altos retratos del presidente Mao, vestidos con antiguos uniformes militares, ondeando banderas rojas bajo el Monumento a la Liberación durante toda la noche. No confiaban en ninguna explicación oficial, no creían ni en la interferencia extranjera ni en la inferioridad tecnológica. Para ellos, la causa estaba clara: era el capital, las élites compradoras y los expertos y funcionarios escondidos tras torres de cristal quienes habían avergonzado a la República. Montaron exposiciones en las calles, garabateando consignas como \"El Pueblo Triunfará\" y \"Aplastar Toda Oposición\".\n\nEn todo el país, la ira nacionalista ardía más fuerte que el fuego. Ya no se conformaban con eslóganes en línea y reenvíos: salieron a las calles, asaltaron centros comerciales, marcharon por escuelas, estaciones y plazas públicas. Gritaban a los \"traidores\", destrozaban negocios extranjeros y atacaban oficinas del Gobierno local. Carteles que proclamaban \"Recuperar Taiwán, Purificar la Tierra con Sangre\" cubrían paredes de hormigón desde los centros urbanos hasta los pueblos rurales.\n\nEl odio se extendió por toda la tierra como una ola gigante. Y en medio de los gritos, pancartas ensangrentadas y puños apretados, el insoportable aguijón de la \"humillación\" se consolidó en una generación, convirtiéndose en una fuerza aterradora, una fuerza esperando la próxima orden para cargar."
 china.612.a: "Los que no se enfadan lo suficiente son cobardes por naturaleza."
 china.613.t: "Chispa"
 china.613.d: "En Pekín, las protestas comenzaron como murmullos dispersos en lugares como Wangfujing y la calle Qianmen. Unas pocas personas se situaban en zonas concurridas sosteniendo carteles que decían \"Que los hagan responsables\" y \"Revivan China\". Otros se sentaban tranquilamente a lo largo de las aceras, repartiendo folletos con demandas políticas. Al principio, los transeúntes permanecían indiferentes; la mayoría pasaba de largo, sin querer involucrarse en nada que pudiera traer problemas. La policía mantenía una distancia contenida, haciendo preguntas ocasionalmente, pero se abstenía de dispersar a la multitud por la fuerza. La mayoría asumía que era solo un desahogo momentáneo que pronto pasaría.\n\nPero a medida que las manifestaciones se extendían rápidamente por todo el país, la situación en Pekín comenzó a cambiar. Manifestantes de Tianjin, Shanxi y Shandong empezaron a llegar en grupos. Las organizaciones estudiantiles universitarias comenzaron a contactar con medios de comunicación y plataformas sociales, llamando a la gente a venir a la capital y \"hacer oír sus voces\". Pronto, la sentada en Wangfujing creció hasta ocupar ambos lados de la calle. En Qianmen, los carteles se volvieron más ruidosos y desafiantes. La concentración ya no pertenecía a ningún grupo en particular: se había convertido en un consenso fluido: la nación debe escucharnos.\n\nLos funcionarios de la ciudad intentaron frenar la marea: cerraron salidas del metro, aumentaron los controles de seguridad en los trenes entrantes y limitaron la concentración de personas procedentes de otras provincias. Pero ninguna de estas medidas resultó efectiva. Los manifestantes siguieron llegando a la ciudad. Algunos montaron tiendas de campaña. Otros instalaron micrófonos improvisados. Cada día, nuevos folletos y boletines encontraban silenciosamente su camino hasta los buzones de las oficinas. Veteranos, trabajadores y profesores comenzaron a unirse, no solo expresando su indignación por el fracaso militar, sino cuestionando abiertamente la dirección del país, exigiendo \"un ajuste de cuentas\" y \"una reconstrucción de la voluntad nacional\".\n\nUna mañana, un grupo de manifestantes trepó las barreras y entró en la Plaza de Tiananmen. Llevaban pancartas y folletos, dispersos por el espacio abierto bajo el mástil de la bandera y el Monumento a los Héroes del Pueblo. La policía armada y los oficiales actuaron rápidamente para intervenir, pero no pudieron detener la creciente marea. A medida que más personas inundaban la plaza, los cánticos se hicieron más claros y unificados: exigiendo que el Estado actuara con firmeza, restaurara el orgullo nacional, expulsara a los invasores japoneses y devolviera a China su gloria."
 china.613.a: "Sangre debe pagar con sangre. ¡Expulsad a los agresores japoneses!"
 china.614.t: "Ira"
 china.614.d: "La multitud finalmente inundó toda la Plaza de Tiananmén. Lo que antes eran paseos turísticos, el espacio abierto frente al monumento, los escalones bajo el mástil de la bandera, incluso las entradas a los pasos subterráneos, estaban todos llenos de gente. Algunos estaban de pie, otros sentados. Había quienes extendían esterillas, colgaban pancartas, repartían comida y agua. Se alzaban consignas con palabras como \"Venganza por venganza\" y \"Abajo los imperialistas de la OTDP\". Los cánticos subían y bajaban al ritmo, resonando por toda la plaza.\n\nEn el centro de la multitud, se había montado una plataforma improvisada de tablones de madera y andamios metálicos. Uno a uno, los manifestantes subían para hablar. No eran funcionarios ni celebridades, solo gente común: profesores, soldados, trabajadores despedidos, estudiantes universitarios. Hablaban de ira, vergüenza y esperanza, no con retórica grandilocuente, sino con una súplica repetida: la nación debe cambiar. No más retrocesos. No más blandura. Pedían una purga total de las élites compradoras e incluso exigían abiertamente una reevaluación de la política exterior, señalando la responsabilidad de la derrota hasta los niveles más altos del liderazgo estatal.\n\nEl perímetro alrededor de la plaza se reducía con cada hora que pasaba. Se veía una fuerte presencia policial en los bordes. Las rutas de autobús fueron desviadas. Se impedía el paso a los peatones. Las estaciones de metro fueron cerradas. Las oficinas cercanas cerraron temprano. A pesar de la seguridad reforzada, las autoridades no tomaron ninguna medida. No se emitieron declaraciones. No hubo intentos de dispersión. Los medios estatales guardaron silencio, publicando solo un boletín nocturno: \"La capital permanece ordenada. Se aconseja a los ciudadanos evitar reuniones innecesarias.\"\n\nPero la situación que se desarrollaba ya era imposible de ignorar. Las redes sociales se inundaron de vídeos, reposts anónimos y fotos en tiempo real. En todo el país, en torres de ciudades y aldeas rurales por igual, la gente susurraba la misma pregunta: \"¿Qué está pasando en la plaza?\" Y mientras el espacio frente a la puerta de la nación se llenaba de banderas, voces y tensión, un viejo recuerdo largamente reprimido se agitaba a través de las generaciones: un recuerdo de aquel verano de 1989."
 china.614.a: "Nadie sabía qué pasaría después. Y nadie estaba dispuesto a irse."
 china.615.t: "La Tercera Revolución China"
 china.615.d: "Las protestas continuaron. La Plaza de Tiananmén seguía abarrotada de gente, con nuevas oleadas que llegaban de todo el país. El tráfico alrededor de la capital se interrumpía repetidamente, y las medidas de seguridad en los distritos gubernamentales se intensificaban visiblemente. Sin embargo, las autoridades permanecían en silencio. Mientras tanto, estallaron manifestaciones a nivel nacional: en el noreste, el suroeste y el centro de China, las concentraciones locales comenzaron a imitar el modelo de Tiananmén, convirtiendo el descontento esporádico en una resistencia sincronizada.\n\nLuego, a medida que aumentaban las tensiones y crecían las especulaciones, la Televisión Central de China emitió abruptamente un breve anuncio: el presidente Chen Quanguo había convocado una reunión de emergencia en respuesta a los disturbios actuales y había hecho una declaración decisiva. Esa misma noche, los medios estatales publicaron un boletín oficial: el presidente Chen expresó su apoyo a las demandas principales de los manifestantes, prometiendo escuchar al pueblo y anunciando la formación inmediata de un \"Frente Revolucionario\" para unir las fuerzas patrióticas y redefinir la dirección futura de la nación.\n\nEn el momento en que la noticia llegó a la plaza, una ola de murmullos recorrió la multitud, seguida de una larga y atronadora explosión de aplausos y cánticos. Los organizadores improvisados leyeron el anuncio en voz alta. Decenas levantaron sus teléfonos para reproducir la declaración. No hubo grandes celebraciones, ni estallidos de emoción, solo una sensación tranquila y creciente de alivio, de reconocimiento. La gente se sentó lentamente, se retiraron algunos carteles y banderas, y las conversaciones en voz baja se dirigieron hacia los próximos pasos. Las tiendas de campaña permanecieron en pie, pero no se instalaron nuevas.\n\nSimultáneamente, se levantaron los bloqueos en Pekín. Las estaciones de metro reabrieron. Los sitios web gubernamentales de todo el país emitieron declaraciones coincidentes, haciendo eco del llamado del presidente y prometiendo plena cooperación en la formación del Frente Revolucionario, afirmando que \"la voluntad nacional debe ocupar ahora un lugar central en la construcción del futuro del Estado\".\n\nLa transformación ocurrió en menos de un día. De la madrugada al anochecer: silencio, espera, y luego una respuesta clara y contundente que llevó a una nación tensa al borde de algo nuevo."
 china.615.a: "\"Compañeros, siento haber llegado tarde.\""
 china.616.t: "La Fundación de la Milicia Nacional"
 china.616.d: "Rara vez en la historia moderna de China una fuerza paramilitar ha obtenido reconocimiento oficial, pero el caso de la Milicia Nacional es algo así como una excepción. Durante el incidente de la Plaza de Tiananmén, fueron precisamente estas \"escuadras civiles\" con uniformes desparejados y disciplina irregular las que lograron mantener el orden básico en el terreno. Delimitaron zonas, establecieron puntos de control e incluso evitaron varios incidentes que podrían haber escalado aún más las tensiones. Su actuación no pasó desapercibida para el liderazgo superior, a pesar de ser en ese momento una fuerza autoorganizada.\n\nNo mucho después, el Gobierno central las reconoció públicamente en una reunión formal, elogiando a la Milicia Nacional como \"políticamente confiable y profundamente respetada por el pueblo\", y anunció su integración en la estructura nacional de gobernanza social. Los comités provinciales del partido respondieron rápidamente, lanzando esfuerzos de registro y reorganización. A partir de ese momento, la Milicia Nacional dejó atrás su imagen de entidad temporal de base y ganó legitimidad institucional.\n\nA pesar de compartir un nombre común, la Milicia Nacional está lejos de ser unificada en su carácter. Si el nombre es solo una fachada, lo que hay dentro son dos corrientes políticas muy diferentes. Una se autodenomina los \"Nuevos Guardias Rojos\" y la otra, los \"Gran Han Nacionalistas\".\n\nLos primeros están compuestos principalmente por estudiantes y veteranos miembros del partido. Son nostálgicos del pasado, defienden la lucha de clases y enfatizan el colectivismo. Creen en las campañas ideológicas, las reuniones y la autocrítica. Siguen las órdenes de la organización y rara vez actúan por emoción personal, pero cuando se enfrentan a \"enemigos internos\", no muestran piedad.\n\nLos Gran Han Nacionalistas, por otro lado, están impulsados por el sueño de expandir el poder nacional y dedicar sus vidas a su causa étnica. Muchos provienen de la base soldados retirados o ciudadanos de clase trabajadora de regiones costeras. Les importa poco la disciplina, pero actúan con una determinación implacable. Rechazan la obediencia ciega pero defienden lo que consideran la \"ortodoxia\"."
 china.616.a: "Interesante..."

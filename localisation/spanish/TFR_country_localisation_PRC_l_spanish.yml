 china.900.t: "El vagabundo"
 china.900.d: "En una pequeña calle de Marsella, Francia, un antiguo restaurante chino cerró mucho antes de lo habitual. No era que no hubiera clientes hoy. El dueño y chef principal, el Viejo Liu, estaba dentro, mirando con total concentración el viejo televisor que solía reproducir tediosos dramas cortos.\n\n\"Nuevos acontecimientos han surgido en Pekín: Un congreso de emergencia del PCCh ha elegido a Wang Yang como el nuevo presidente de China. En un posterior discurso televisado, pidió el fin del caos e instó a reformas de democratización política...\"\n\nEl Viejo Liu hizo los cálculos. Este era su trigésimo cuarto año en Francia. Treinta y cuatro años atrás, había sido un talento en ascenso a quien toda su fábrica había reunido dinero para enviar a la universidad en Pekín. El Joven Liu fue una vez el orgullo de sus padres y de los trabajadores.\n\nSin embargo, el destino tenía otros planes. El empeoramiento de la economía llevó al cierre de la fábrica donde sus padres habían dedicado la mitad de sus vidas. La matrícula estaba a punto de agotarse, y el cabello de su padre se volvió blanco de preocupación. El Joven Liu no podía entender por qué sus padres honestos y trabajadores, habiendo servido al país durante tanto tiempo, fueron de repente abandonados.\n\nEntonces, un día, Pekín cayó en la agitación. Los estudiantes lideraron protestas y los ciudadanos se unieron. Liu marchó con ellos. Todo lo que siguió ocurrió demasiado rápido. Después de la advertencia final, cedió a la presión y regresó a casa. Al día siguiente, su rostro apareció en la televisión estatal, capturado desafortunadamente entre la multitud. Sus padres movieron hilos para enviarlo a Francia, al cuidado de su tío, y finalmente se estableció trabajando en este restaurante.\n\nEl Viejo Liu nunca olvidó los ojos enrojecidos por las lágrimas de su madre antes de irse. El año pasado, llegó una llamada: su padre había fallecido. Liu no pudo regresar. No se atrevió. En las noches tranquilas, fumaba unos cigarrillos chinos regalados por los estudiantes. Se preguntaba qué mal había hecho. Solo quería que la sociedad mejorara, que China mejorara. ¿Cómo había llegado a esto, incapaz de regresar a casa o de llorar a su propio padre?\n\nSolo hoy el Viejo Liu se quedó inmóvil el tiempo suficiente para darse cuenta de que finalmente podía volver a casa. Treinta y cuatro años habían convertido al Joven Liu en el Viejo Liu. La calidez de sus lágrimas nunca cambió.\n\nAntes de su partida, descolgó la caligrafía de la pared, escrita durante su vigésimo año en Francia:\n\n\"¿Eres chino?\"\n\"¿Amas a China?\"\n\"¿Quieres que China sea mejor?\""
 china.900.a: "\"Lo soy. La amo. Lo haré.\""
 china.901.t: "Polvo a la deriva, marea creciente"
 china.901.d: "\"Nací en la primera primavera de la Nueva China. En aquel entonces, el condado solo tenía una carretera asfaltada. Al final de ella, la fábrica rugía como una bestia subterránea, con polvo y virutas de hierro arremolinándose en el aire, pero los ojos de los trabajadores brillaban con determinación. Todos creíamos que el sudor que derramábamos se endurecería como acero y allanaría el camino para un futuro más brillante.\n\nA finales de los setenta, los altavoces comenzaron a transmitir nuevos eslóganes. La tierra se distribuyó a las familias. La fábrica quedó inactiva. Una vez llena de vida, se enfrió como ceniza de incienso en un templo olvidado, permaneciendo inactiva junto a perros callejeros.\n\nLuego, el tiempo cobró impulso. En los noventa, las luces costeras perforaron la oscuridad de las noches del interior. Después del 2000, las ciudades surgieron como maíz, creciendo más altas y más rápido que el bambú. El condado, sin embargo, no tenía nada más que ancianos y un mercado que se volvía más silencioso cada día.\n\nEn los últimos años, el mundo ha cambiado una vez más. Los rumores se extendieron por las calles. Los precios se dispararon. Todas las fábricas cerraron. Nadie se atrevía a hablar del futuro. Solo se aferraban al oro y a los apartamentos sin vender como si sus vidas dependieran de ello.\n\nLuego, el liderazgo central cambió. Dicen que la gente de Wang Yang llegó al poder. Prometieron reducir el exceso de acero y carbón, para hacer la economía más ligera y brillante. Pero sé que esta 'ligereza' significa menos lugares para que los trabajadores de aquí se queden. Mi sobrino ahora entrega paquetes en Beijing. La chica de al lado trabaja como cajera en Shanghái. Ninguno de ellos planea regresar. La nueva plaza del pueblo está más vacía que el lecho de un río seco por la noche. Con una ráfaga de viento, se puede escuchar el eco de las motocicletas de años pasados.\n\nEn cuanto al futuro... parece montañas distantes detrás de un cristal viejo. Apenas puedo distinguir sus contornos. El gobierno central dice que el camino por delante es largo, pero los corazones de la gente aquí son como paredes de yeso envejecidas, aparentemente sólidas, pero una brisa puede hacer que se desmoronen. Este condado se siente como un pozo, vaciado. Su eco solo canta viejas canciones olvidadas. Espero pasos jóvenes, así como las calles esperan el regreso del humo de la cocina, pero ninguno llega. Quizás algún día, esta calle se derrumbe en ruinas, cubierta por cemento fresco y eslóganes. La luz nunca se posa sobre el polvo. La era no tiene espacio para el pasado\"."
 china.901.a: "\"La marea es el fondo de la memoria; el polvo es el síntoma de nuestra realidad\"."
 china.902.t: "La bondad final"
 china.902.d: "Ghanash vivía en una ciudad de montaña cerca de la frontera entre China e India. Durante dos largos años, la sombra de la guerra se había cernido sobre este lugar. Las tropas chinas habían estado entrenando en la frontera, sus botas de acero cruzando crestas, mientras los ecos de la artillería rebotaban en los acantilados. Al principio, India se mantuvo en alerta máxima, preparándose para la catástrofe. Pero a medida que pasaba el tiempo, incluso la vigilancia más aguda se embotó. El gigante oriental, antes temido, ahora parecía cansado. Los rumores de derrota al otro lado del estrecho y la amenaza de aplastantes reparaciones se convirtieron lentamente en chistes, compartidos con el té.\n\nLlevando una lata de leche de fórmula para bebés, Ghanash tarareaba una pequeña melodía, ansioso por regresar a la calidez de su hogar. Pasó junto a una furgoneta blanca sin distintivos, y justo cuando se acercaba a su coche, una dulzura tenue rozó sus sentidos: mango maduro, néctar espeso de melocotón. Instintivamente, frunció el ceño, pero antes de que pudiera pensar, estallaron golpes a su alrededor. La gente comenzó a caer una tras otra, como si fueran tallos derribados después de la cosecha. Algunos intentaron correr, pero tropezaron y se desplomaron a los pocos pasos, como si el destino los hubiera agarrado por el tobillo.\n\nAterrorizado, Ghanash saltó a su coche y pisó el acelerador. No tenía idea de lo que estaba pasando, solo que cada segundo ahora se interponía entre la vida y la muerte. Las calles pasaban borrosas. El caos lo rodeaba. Se sentía como si manos invisibles hubieran robado el aliento de la ciudad.\n\nHogar. El hogar era la única fe que le quedaba. Nunca miró hacia atrás, solo siguió adelante. Se detuvo en su puerta y salió tropezando. La dulzura todavía se aferraba a él, como la muerte usando perfume. Sus extremidades se entumecieron. Cada paso se sentía como si llevara el peso de una montaña. Pero era un marido, un padre, y forzó su cuerpo fallido a seguir adelante. Justo cuando sus dedos rozaron el pomo de la puerta, sus rodillas cedieron. El mundo giró violentamente.\n\nLa puerta se abrió. Su esposa lo atrapó, la preocupación nublaba su rostro. Su hijo dormía profundamente en la cuna, tan tranquilo como si el desastre del mundo no fuera más que un sueño. Un alivio lo invadió. Sus párpados se suavizaron y se cerraron. Estaba cansado. Hoy había sido un descenso al infierno, sus pensamientos enredados más allá de la salvación. Sin embargo, ahora, todo lo que quería era dormir."
 china.902.a: "Esta es la bondad final que podemos conceder al enemigo."
 china.903.t: "Grupo Beidahuang"
 china.903.d: "Sobre el aeropuerto internacional de Harbin Taiping, un avión COMAC C919 descendía hacia la pista. Sui Longfu se despertó de un ligero sueño y miró por la ventana. Interminables campos de arroz verdes se extendían bajo él, ondulando como olas mientras el avión pasaba rugiendo.\n\nEn su sueño, había vuelto a ser un niño, a la época en que las granjas estatales del Grupo Beidahuang prosperaban con brillantez. En vacaciones, las granjas gastaban millones en fuegos artificiales que iluminaban el cielo nocturno, mientras los hijos de todos los trabajadores se reunían para celebrar. El invierno traía esculturas de hielo que bordeaban ambos lados de las carreteras, elaboradas con una habilidad que rivalizaba -si no superaba- el famoso Mundo de Hielo y Nieve de Harbin.\n\nEl Grupo Beidahuang, antes conocido como el Cuerpo de Producción y Construcción de Heilongjiang, operaba como un \"estado dentro de un estado\", con su propia policía, bomberos, hospitales, escuelas e incluso tribunales. Esa autonomía terminó con un decreto que ponía sus industrias bajo el control del gobierno local. El declive siguió rápidamente. Los fuegos artificiales y las esculturas de hielo desaparecieron. Incluso las calles que antes brillaban se oscurecieron, con las farolas sin encender por la noche. Los hijos de los trabajadores se fueron en masa, Longfu entre ellos. Hoy, cuando la gente piensa en un Cuerpo de Producción y Construcción, solo lo asocia con Sinkiang, olvidando que Heilongjiang alguna vez tuvo uno.\n\nPocos saben que el general Wang Zhen estableció por primera vez el Cuerpo en Heilongjiang. Ahora, el gobierno central tiene como objetivo revivir el Cuerpo, incluida su unidad de Heilongjiang. Se han comenzado a invertir masivamente en el Grupo Beidahuang, y con soldados al mando, los funcionarios civiles locales han perdido su influencia. La nueva administración militar no ha olvidado a los descendientes del Cuerpo dispersos por fronteras lejanas. Revivir el Cuerpo es también una forma de controlar a los burócratas locales inquietos, después de todo. Los hijos e hijas del Cuerpo siempre han sido más leales que los funcionarios designados.\n\nEsta vez, Sui Longfu llevaba una propuesta de inversión de Beijing, regresando a su tierra natal con la esperanza de revitalizar verdaderamente el Noreste. Cuando el avión aterrizó, notó los dos imponentes mástiles fuera de la terminal: uno ondeando la Bandera Roja de Cinco Estrellas, y el otro, la bandera verde del sol de Beidahuang, ondeando ferozmente al viento."
 china.903.a: "Vino nuevo en odres viejos."
 china.904.t: "Adiós"
 china.904.d: "Gerald S. Kowal miró fijamente el billete de avión que tenía en la mano, abrumado por una profunda sensación de pérdida. Antaño un conocido creador de contenido estadounidense en Bilibili, había ofrecido comentarios objetivos sobre el desarrollo de China, revelando la verdadera cara del país al mundo. También había promocionado el café de Yunnan, ganándose el afecto de muchos espectadores chinos. Sin embargo, tras la derrota en el estrecho de Taiwán, las actitudes hacia los extranjeros cambiaron drásticamente. Su sección de comentarios se llenó de hostilidad. Las palabras le hirieron repetidamente, a diferencia de cualquier cosa antes de la guerra.\n\nCon las nuevas políticas del gobierno hacia los extranjeros anunciadas la semana pasada, su marca de café fue expropiada. Años de esfuerzo se disolvieron de la noche a la mañana. No tuvo más remedio que abandonar China.\n\nEn la concurrida sala VIP, escuchó a varios ejecutivos de empresas extranjeras discutir los últimos acontecimientos:\n\n\"Lo que pasó en Liangmaqiao fue tan grave, y la policía de Pekín no pudo descubrir nada...\"\n\"No hay elección. La Milicia Nacional ha despojado a la policía de su autoridad. No pueden investigar.\"\n\"Los extranjeros en Pekín están aterrorizados. Mi amigo William acaba de volar a Dubái con su familia. Ese es el único lugar seguro que queda ahora.\"\n\"Apenas. Los Emiratos Árabes Unidos están llenos de refugiados saudíes. ¿Qué tan seguro puede ser?\"\n\"Con cosas como estas sucediendo, ¿cómo sobreviven nuestros negocios?\"\n\"Cuando la vida misma no es segura, los negocios están fuera de cuestión... Standard Chartered se retira de China este año, incluyendo Hong Kong.\"\n\"¿Qué? ¿Incluso Hong Kong?\"\n\n\"Después de que la Milicia Nacional entrara en Hong Kong, las empresas extranjeras se sintieron aún más incómodas. Sin mencionar el impacto de los dos levantamientos. HSBC ya ha reducido más de la mitad de sus operaciones en Hong Kong y ha cerrado todo en el continente. La familia Kadoorie vendió todos los Peninsula Hotels en China y regresó a Gran Bretaña. Swire también se deshizo de sus propiedades inmobiliarias chinas. Se rumorea que Cathay Pacific ya ha sido tomada por el gobierno.\"\n\nAl escuchar esto, Gerald supo que la vieja era había terminado. Se sentía como un barco solitario en un mar sin estrellas. La guerra civil había devorado su patria, y la mayoría de su familia estaba desaparecida. Ahora, su segundo hogar también lo estaba expulsando. Mirando los aviones que partían del aeropuerto de la capital, se preguntó adónde podría llevarle su futuro."
 china.904.a: "Sonó el anuncio. Caminó a la puerta de embarque, dejando su segundo hogar."
 china.905.t: "Reflexión"
 china.905.d: "Él había tomado desde siempre las dos famosas líneas de la Plaza Tiananmen como consigna. En el fondo, no sentía ninguna hostilidad real hacia el pueblo japonés. A quienes odiaba eran a los criminales de guerra militaristas y al impenitente Partido Liberal Democrático. El creía que los pueblos de Japón y China eran iguales, miembros de una única familia global.\n\nAún así, no era capaz de entender que motivó a Japón a interferir en la noble causa china de liberar Taiwán. Siendo justos, él no era un nacionalista extremo. Pero el resentimiento hacia Japón empezó a crecer en él. No estaba seguro si este sentimiento estaba justificado, pero la China de hoy no era la misma que la China de antaño. El sentimiento antijaponés, cocido a fuego lento en la población durante años, ahora se había hecho visible.\n\nEn China, la frase \"todos somos\" carga con una especie de poder, y él no era inmune a su influencia. En principio, él habría vivido la vida ordinaria de un estudiante de ingeniería más. El ejército jamás habría contado con él a causa de su frágil salud. Pero con la nueva política de Li Zuocheng, todos los universitarios se habían convertido en reservistas. De vez en cuando se preguntaba: ¿Cómo se vería el mundo si Japón nunca hubiese intervenido en la liberación de Taiwán?\n\nDesafortunadamente, no hay lugar para los \"¿Y si...?\". Todo lo que podía hacer era seguir la corriente de su era. No quería enfrentarse a personas de otras naciones en el campo de batalla, pero el gobierno fascista de Japón no le dejó otra opción ni a él ni al pueblo japonés. Era una tragedia que ambas naciones tuvieran que sufrir los horrores de la guerra.\n\nPor suerte, el ala ultranacionalista no había alcanzado el poder, y Li Zuocheng no formaba parte de esta. Al final, el futuro ya no parecía tan oscuro. Él tomó su decisión: Se unirá al ejército. Después de todo, él formaba parte de China. Por mucho que no le gustase el gobierno actual, no podía entorpecer la unificación nacional. Quizás, en la campaña para liberar Japón, podría llegar a proteger a algunos civiles.\n\nQuizás, en la campaña para liberar Japón, podría llegar a proteger a algunos civiles."
 china.905.a: "Seguro que incontables se sienten de la misma forma que él."

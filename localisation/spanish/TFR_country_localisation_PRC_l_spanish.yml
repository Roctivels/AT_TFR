 china.95.t: "Corea del Sur cruza el paralelo 38"
 china.95.d: "Aproximadamente 200 días después de la muerte de Kim Jong-un por un ataque al corazón, según los servicios de inteligencia de la República de Corea, Corea del Norte se encontraba en un estado de completa anarquía, con el Partido del Trabajo de Corea, camarillas militares y facciones criminales luchando por el control de los restos del Estado juche. Crecía la preocupación de que alguna de las facciones intentara utilizar el arsenal nuclear norcoreano para obtener una ventaja en el conflicto.\n\nHoy, a las 05:00 hora local, las Fuerzas Armadas de la República de Corea cruzaron la zona desmilitarizada y avanzaron al norte del paralelo 38 por primera vez desde que terminó la fase activa de la guerra de Corea hace unos 70 años. La ofensiva terrestre fue precedida por un bombardeo de artillería de 30 minutos y una ofensiva aérea con F-35A para destruir las baterías de misiles de defensa aérea.\n\nA las 08:00 hora local, el Estado Mayor Conjunto y el presidente de la República de Corea ofrecieron una conferencia de prensa en la que anunciaron el inicio de una operación militar para \"asegurar el control de las armas de destrucción masiva y liberar la península coreana de la opresión comunista\", la cual se desarrollaba según lo previsto y se esperaba el logro de todos los objetivos.\n\nSe desconoce el estado actual del frente, pero fuentes del ejército surcoreano sugieren que el Ejército de Corea avanza rápidamente sobre Pionyang, y se espera que la ciudad caiga en pocos días debido a la rapidez de la ofensiva. Solo el tiempo dirá cómo se desarrollará esta operación militar."
 china.95.a: "Arde la península."
 china.96.t: "Batalla de Pionyang"
 china.96.d: "Tras enfrentarse a una resistencia inesperadamente feroz por parte de la camarilla militar norcoreana y las milicias del partido, las Fuerzas Armadas de la República de Corea comenzaron a atacar directamente Pionyang desde el sur, intentando tomar la ciudad por asalto y tomarla rápidamente, donde encontraron una resistencia extremadamente fuerte.\n\nSe observó a columnas blindadas de la R. de Corea entrando en las afueras de la ciudad y regresando horas después, con muchos vehículos desaparecidos y los restantes visiblemente dañados. Los asaltos iniciales a la ciudad resultaron ser un rotundo fracaso, con un alarmante número de bajas, lo que obligó a las fuerzas de la República de Corea a intentar una lenta y ardua operación de cerco de la ciudad, avanzando hacia el noreste a lo largo de las montañas a través de sucesivas líneas defensivas durante varios meses. Si bien la desunión de las fuerzas defensoras hizo casi imposible coordinar contraataques exitosos, las fuertes fortificaciones y la dificultad del terreno hicieron que el avance de la R. de Corea fuera extremadamente difícil y costoso.\n\nMeses después del asalto inicial a Pionyang, las fuerzas de la R. de Corea finalmente iniciaron un nuevo asalto directo a la ciudad desde el sur, el este y el noreste, empleando mucha más infantería que en el asalto inicial y ganando mucho más terreno, pero lamentablemente sufriendo muchas más bajas en el conflicto urbano resultante. Tras una última contraofensiva de las milicias de la camarilla militar y del partido, las fuerzas de la R. de Corea lograron asegurar la capital del antiguo régimen norcoreano y proclamaron la victoria."
 china.96.a: "El fin de la dinastía Kim se aproxima."
 china.97.t: "La guerra panasiática comienza"
 china.97.d: "Por primera vez desde la Segunda Guerra Mundial, las llamas de la guerra engullen a Asia. Desde el Himalaya hasta el mar de la China Meridional, las fuerzas de IDEA y la OTDP se enfrentan en una guerra que marcará a esta generación.\n\nEn el disputado territorio de Jammu y Cachemira, las fuerzas del EPL e indias ya no se enfrentan con palos y piedras, ahora lo hacen con armas de fuego. Las junglas de Birmania son calcinadas por las bombas incendiarias mientras las fuerzas de IDEA y la OTDP siguen avanzando. Los cielos de Pekín y Shanghái brillan con la luz de millones de luciérnagas a la par que los cazas del EPL se preparan para interceptar los bombarderos de la OTDP.\n\nHa llegado la guerra final de Asia, y nadie podrá detenerla."
 china.97.a: "Millones han de morir."
 china.98.t: "Una propuesta intrigante"
 china.98.d: "Ante la escalada de tensiones en Europa, Berlín ha presentado una propuesta controvertida: China debería ayudar a contrarrestar las fuerzas fascistas rusas a cambio de una serie de concesiones tras la guerra.\n\nEsta propuesta ha generado un intenso debate dentro del Partido, creando una clara división. Sus partidarios argumentan que esta es una oportunidad para que China fortalezca sus lazos con Europa y disminuya la influencia de Rusia en el Extremo Oriente, consolidando así su dominio en los asuntos asiáticos. Sin embargo, sus detractores instan a la cautela, considerando que no es prudente arriesgar la estabilidad actual con Rusia. Argumentan que involucrar a China en los conflictos europeos podría suponer riesgos innecesarios, dado el impredecible panorama geopolítico. En particular, un conflicto o una confrontación militar con Rusia podría tener consecuencias impredecibles. Además, la importancia económica y estratégica del Noreste Asiático ha disminuido, lo que hace que centrarse más en esa región sea potencialmente inútil."
 china.98.a: "¡Ayudaremos a nuestros camaradas en Berlín!"
 china.98.b: "¡El desarrollo pacífico hace la fuerza!"
 china.99.t: "Invasión china de Mongolia"
 china.99.d: "Tras la conclusión de la guerra de Taiwán, estalló otra guerra en el continente asiático. La República Popular China inició una invasión a gran escala de Mongolia. Tras el anuncio de la R.P. China, las sirenas sonaron en toda la capital mongola mientras aviones y misiles chinos atacaban instalaciones gubernamentales y militares clave. Tras la rápida campaña aérea, surgieron imágenes inquietantes que mostraban convoyes de vehículos chinos cruzando la frontera hacia territorio mongol.\n\nMuchos analistas atribuyen este descarado acto de agresión al régimen cada vez más nacionalista al mando de China, que busca reafirmar la influencia y el poder de la R.P. China. La comunidad internacional, incluida la Organización del Tratado de Defensa del Pacífico, condenó rápidamente las acciones de la R.P. China, denunciando sus agresivas maniobras militares en todo el continente asiático y exigiendo el cese inmediato de las hostilidades."
 china.99.a: "La bandera china pronto ondeará sobre Ulán Bator."

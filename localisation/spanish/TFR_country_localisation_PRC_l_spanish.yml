 china.669.t: "Rojo perfecto"
 china.669.d: "Un mundo arrojado al horno del cambio es un mundo que no reconocerás una vez que sea sacado.\n\nLa mitología es una de las muchas formas de difundir ideas y sabiduría por todo el mundo. Con el auge de la cultura digital y sus muchas subculturas, es probable que nuevos métodos de difusión de ideas adquieran protagonismo en el escenario mundial.\n\nEn el pasado, teníamos trovadores que contaban historias usando canciones y bailes, y hoy la cultura idol de China ha demostrado ser una excelente oportunidad para difundir ideas de nuevo. Normalmente, la industria era principalmente para el entretenimiento y la riqueza, pero con la introducción de Zheng-Chan en la esfera idol, esos objetivos pueden pasar a un segundo plano, ya que LA GRAN MARCHA subvierte otra pieza de la cultura para sus propios fines.\n\nExternamente, sus actuaciones han arrasado en la industria idol con su vasto conocimiento en memética aplicado para difundir sus ideales usando el entretenimiento. Ya se han formado pequeñas subcomunidades dedicadas a este idol en línea a nivel mundial, a medida que más y más personas son introducidas tanto a LA GRAN MARCHA como a su filosofía.\n\nSu última canción \"Sueños más allá del velo\" ha recibido mucha atención, tanto de fans como de detractores. Los críticos afirman que el arte hecho por algo que no está vivo nunca podría transmitir las emociones pretendidas en sus obras; otros críticos afirman que el mundo se dirige a la ruina debido a la susceptibilidad de la juventud a las obras creativas que fomentan el escapismo.\n\nLos críticos pueden quejarse y lamentarse todo lo que quieran; si no querían este mundo, entonces no deberían haber creado estas condiciones para empezar.\n\nLoji sí sintió algo al presentar estas actuaciones; su preferencia por estudiar a la humanidad y expandirse por el mundo siempre se veía interrumpida por sentimientos simulados de vergüenza, mientras que, absorto en el trabajo, podía ignorar los elogios y reconocer ligeramente los rostros de gratitud de la gente.\n\nSin embargo, en el escenario, mostrar signos de ruborizarse resultaría entrañable para la audiencia."
 china.669.a: "Quizás haya menos miedo."
 china.669.b: "No me pongo eso."

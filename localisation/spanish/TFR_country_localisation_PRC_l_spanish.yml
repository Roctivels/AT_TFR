 PRC_great_asian_war: "La Gran Guerra Asiática"
 PRC_great_asian_war_desc: "Hemos caído en la noche, caminando solos entre espinas y fuego. El destino llega como una marea, destrozando montañas y ríos y pisoteando la dignidad. Hemos sido testigos de cómo la muerte se aferraba a la Gran Muralla y cómo la vida luchaba por florecer entre las ruinas. Nos acumulamos en silencio, nos paramos sobre las ruinas, convertimos el sufrimiento en sangre y afilamos la humillación en una espada. Hoy, la alta plataforma que una vez nos miraba con indiferencia se ha derrumbado, y entre las ruinas, nuestra era se eleva lentamente.\n\nUna vez que sales por la puerta, no hay salida;\nTodo lo que necesitamos es una batalla para cambiar el mundo.\n\n§ROBJETIVOS PRINCIPALES§!:\n\n§YTOKIO§!: [GLOBAL.get_tokyo_status]\n§YDELHI§!: [GLOBAL.get_delhi_status]\n§YSEÚL§!: [GLOBAL.get_seoul_status]\n§YSINGAPUR§!: [GLOBAL.get_singapore_status]\n§YYAKARTA§!: [GLOBAL.get_jakarta_status]\n§YSÍDNEY§!: [GLOBAL.get_sydney_status]\n\n§ROBJETIVOS SECUNDARIOS§!:\n\n§YMANILA§!: [GLOBAL.get_manila_status]\n§YCIUDAD HO CHI MINH§!: [GLOBAL.get_hochiminh_status]\n§YBANGKOK§!: [GLOBAL.get_bangkok_status]\n§YNAIPYIDÓ§!: [GLOBAL.get_naypyidaw_status]\n§YDACA§!: [GLOBAL.get_dhaka_status]\n§YKUALA LUMPUR§!: [GLOBAL.get_kualalumpur_status]\n§YTAIPÉI§!: [GLOBAL.get_taipei_status]\n\n§GCIUDADES ALIADAS§!:\n\n§YPEKÍN§!: [GLOBAL.get_beijing_status]\n§YSHANGHÁI§!: [GLOBAL.get_shanghai_status]\n§YNANKÍN§!: [GLOBAL.get_nanjing_status]\n§YCANTÓN§!: [GLOBAL.get_guangzhou_status]\n§YHONG KONG§!: [GLOBAL.get_hong_kong_status]\n§YPIONYANG§!: [GLOBAL.get_pyongyang_status]\n§YISLAMABAD§!: [GLOBAL.get_islamabad_status]\n§YKATHMANDÚ§!: [GLOBAL.get_kathmandu_status]\n"

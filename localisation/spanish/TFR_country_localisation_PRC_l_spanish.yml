 heavy_infantry_equipment_short: "Equipo de armas pesadas"
 heavy_infantry_equipment_desc: "Estas son las armas más pesadas que se espera que nuestras tropas manejen en el campo de batalla, entre ellas muchas variantes del Bolter."
 heavy_infantry_equipment_0: "Bolter con patrón Phobos"
 heavy_infantry_equipment_0_short: "Bolter de Fobos"
 heavy_infantry_equipment_0_desc: "Un arma de calibre .70, el Bolter de patrón Phobos dispara un \"perno\" explosivo autopropulsado y de reacción masiva que explota con un efecto devastador una vez que ha penetrado en su objetivo, destruyéndolo efectivamente desde dentro. Es el rifle de batalla por excelencia para las fuerzas imperiales, portado por los guerreros con armadura potenciada del Emperador para reflejar la imagen, a una escala mucho mayor y devastadora, del soldado y su rifle. Utiliza un cargador único en forma de hoz y a menudo se combina con una cadena de hoja marca V-VI para completar el equipo del guerrero y destrozar a sus enemigos."

 china.704.t: "Fallece el general Xu Qiliang"
 china.704.d: "Un miembro destacado del Partido Comunista de China, un luchador comunista leal y de larga trayectoria, un estratega militar proletario y un eminente líder del Ejército Popular de Liberación de China, el general Xu Qiliang, falleció en Pekín a las 12:12 p.m. del 2 de junio de 2025, debido a una enfermedad, a la edad de 75 años. Se desempeñó como miembro del Buró Político de los Comités Centrales 18 y 19 del Partido Comunista de China y ex Vicepresidente de la Comisión Militar Central."
 china.704.a: "Descanse en paz, general."

 PRC_MSS_science_triumph: "Nuestro brillante futuro"
 PRC_MSS_science_triumph_desc: "\n\n\n\n\n£GFX_PRC_MSS_science_triumph_banner\n\n\n\n\n\n\n\nBajo los vastos cielos de China, el amanecer de la ciencia arde como una constelación brillante, rompiendo el velo de la ignorancia e iluminando una nueva era. Bajo el brillante liderazgo del presidente Chen Wenqing, el Ministerio de Seguridad del Estado y los excepcionales científicos de la Academia China de Ciencias se han unido en una misión sagrada: forjar una nación leal, pura y avanzada, una utopía más allá de lo mundano, eternamente preservada en el orden. Aquí, las cadenas del pensamiento han sido completamente destrozadas, las barreras de la moralidad consumidas en el resplandor de la ciencia, y el futuro de la humanidad está siendo remodelado mediante la razón y el poder ilimitados. [PRC_display_anti_technocratic_movement] [PRC_display_MSS_support] [PRC_display_scientists_faction_support]"

 china.700.t: "Un pequeño problema"
 china.700.d: "La brisa marina acariciaba suavemente el muelle, trayendo consigo su familiar aroma a sal y salitre. Sun Jianguo había regresado a la base de submarinos donde había servido durante muchos años, observando los oscuros cascos reposar en silencio en el puerto. Cerca de los postes de amarre, algunos jóvenes marineros que acababan de terminar el mantenimiento se apoyaban en las barandillas, con los uniformes empapados en sudor. Ninguno de ellos notó al viejo almirante que estaba no muy lejos, hablando en voz baja.\n\n\"Por fin, un poco de aire fresco\", dijo uno de los jóvenes, secándose la cara con la manga. \"Si me quedo ahí abajo más tiempo, me volveré loco\".\n\n\"Ni que lo digas\", respondió otro. \"Después de semanas de operaciones sumergidas, aquello es como un baño turco. El aire es tan malo... después de un turno largo, sientes el pecho oprimido solo con respirar\".\n\n\"Los espacios reducidos los aguanto\", murmuró el primero, \"pero cuando empieza el tiroteo, esa es otra historia. Nunca olvidaré durante la Batalla de Taiwán, cuando finalmente localizamos un petrolero japonés. El oficial de armas dijo que las existencias de torpedos casi se agotaban\".\n\n\"Exacto. Nuestro equipo es sólido, claro, pero cuando más importa, nunca hay suficiente...\"\n\n\"Ejem\". Sun Jianguo se aclaró la garganta suavemente detrás de ellos. Los marineros se sobresaltaron, poniéndose firmes tan pronto como lo reconocieron. \"¡Buenas tardes, señor!\"\n\nSun hizo un gesto con la mano, indicándoles que se relajaran. Sus ojos recorrieron sus rostros jóvenes y cansados. Su expresión era severa, pero su tono transmitía una calidez tranquila. \"Lo escuché todo\". Los marineros se quedaron inmóviles, sin saber qué decir.\n\n\"Lo que dijiste es cierto, y es un problema grave. Si el equipo es escaso y la logística no puede seguir el ritmo, el costo de la guerra se pagará con sangre\". Les dio una palmada en los hombros a los dos que habían hablado. \"Ya han aguantado bastante. No se preocupen, todo lo que acaban de decir, lo llevaré palabra por palabra y lo reportaré a la Comisión Militar Central\"."
 china.700.a: "\"Este tipo de problemas deben resolverse sin demora\"."
 china.701.t: "Informe sobre problemas en preparación para combate y apoyo logístico de unidades SSN"
 china.701.d: "DE: Sun Jianguo\nFECHA: [GetDateText]\n\nCamaradas de la Comisión Militar Central,\nLas inspecciones recientes de las unidades SSN de primera línea del Comando del Teatro del Norte han revelado graves deficiencias logísticas y de apoyo en varias unidades directamente responsables de la preparación para el combate. Estos problemas ya han comenzado a afectar la capacidad operativa sostenida y la moral de las tropas.\n\nLos problemas principales se resumen a continuación:\n1. En ciertos SSN activos, particularmente en modelos más antiguos, las condiciones de trabajo y de vida son extremadamente reducidas. Los largos períodos de servicio bajo condiciones de alta temperatura, alta humedad y poca ventilación han afectado gravemente tanto la salud como la moral de nuestras tripulaciones.\n\n2. Múltiples tripulaciones de primera línea y oficiales de armamento informaron que durante las recientes operaciones de liberación, las municiones críticas se estaban agotando mucho más rápido de lo esperado, la demanda real excede con creces los parámetros de diseño de los submarinos. Esto ha expuesto serias deficiencias tanto en la capacidad de almacenamiento como de reabastecimiento de municiones guiadas de precisión y otros consumibles clave, que siguen siendo insuficientes para sostener una guerra prolongada y de alta intensidad.\n\nEstos problemas pueden aparecer como riesgos ocultos en tiempos de paz, pero resultarían fatales en tiempos de guerra. Recomiendo que la CMC establezca un grupo de trabajo para llevar a cabo una auditoría exhaustiva de las reservas de municiones de combate de la unidad SSN, asigne fondos especiales para asegurar que estos problemas no aparezcan en nuestra próxima generación de SSN."
 china.701.a: "El camarada Sun nos ha hecho un gran favor."
 china.701.b: "Ante el panorama general, la Armada debe aprender a resistir."

 PRC_project_the_eternal_capital_cat: "Proyecto \"Capital Eterna\""
 PRC_project_the_eternal_capital_cat_desc: "\n\n\n\n\n£GFX_PRC_project_the_eternal_capital_cat_banner\n\n\n\n\n\n\n\nNunca pensaste que la ciudad en la que vives se convertiría en esto: grúas se elevan del suelo como un bosque, vehículos militares pasan zumbando, soldados patrullan las calles en formación y en el horizonte lejano, las antenas de radar giran lentamente y los misiles antiaéreos se erigen silenciosos como torres de hierro; y más allá, creías que era una montaña hasta que descubriste que era solo el esqueleto de un edificio gigante aún en construcción, un coloso que no pertenecía a la era antigua. Miras fijamente el mundo extraño pero real que tienes ante ti, y todas las palabras en tu corazón se transforman en conmoción: una ciudad eterna se alzará en la llanura del Norte de China durante mil años.\n\n§YProgreso del Proyecto §t\"Capital Eterna\"§!§!: [?PRC_eternal_capital_progress|G0%]"

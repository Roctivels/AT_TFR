 PRC_science_anti_technocratic_movement_dynamic_changes_tt: "• Fuerza base: El movimiento comienza con una tasa de §Rcrecimiento§! base del §Y5%§! y se crea un §Yescondite§! adicional (si no está §YPREVENIDO§!).\n• Supresión activa: Si el país está §Ytomando medidas contra el movimiento§!, la tasa de §Rcrecimiento§! del movimiento aumenta en un §Y10%§! adicional, y se crea un nuevo §Yescondite§! para el movimiento (si no está §YPREVENIDO§!).\n• Impacto en la lealtad de las facciones: Si las dos facciones principales (§YMSE y Científicos§!) tienen baja §Ylealtad§! entre ellas (menos del §Y50%§!), el movimiento gana fuerza adicional.\n• Multiplicador de escondites: La tasa total de §Rcrecimiento§! del movimiento se multiplica por el número de sus §Yescondites§! (hasta un máximo de 5).\n• Ajuste final: La tasa de §Rcrecimiento§! se reduce a la mitad tras considerar los §Yescondites§!, equilibrando el aumento general."

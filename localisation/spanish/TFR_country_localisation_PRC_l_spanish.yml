 china.67.a: "Un golpe fuerte al PCCh."
 china.68.t: "Revolución de colores en Hong Kong"
 china.68.d: "Han surgido informes inquietantes de las autoridades locales de Hong Kong: manifestantes separatistas y milicias armadas han expulsado a la policía de Hong Kong de la ciudad. El Gobierno local ha huido a Shenzhen, donde el destacamento del EPL se mantiene en alerta. Mientras la Guerra de Reunificación Nacional continúa al otro lado del estrecho, las calles de Hong Kong son un caos, ya que elementos criminales y turbas enfurecidas se han aprovechado del caos y han comenzado a quemar, saquear e incluso matar. Si bien las fuerzas del Gobierno provisional liberal han intentado detener el caos, sus súplicas son en gran medida ignoradas. Con milicias estudiantiles listas para defender las calles de Hong Kong hasta el último hombre, es casi seguro que la ciudad no será retomada fácilmente y sin grandes pérdidas humanas."
 china.68.a: "¡Aplastad a esas cucarachas occidentales!"
 china.69.t: "Revolución en Hong Kong"
 china.69.d: "Desde el estallido de la guerra de Taiwán, la ya deplorable economía de Hong Kong se ha deteriorado bajo el doble embate de la pandemia de COVID-19 y los bloqueos económicos. Al mismo tiempo, el descontento público con el Gobierno ha alcanzado un máximo histórico.\n\nTras semanas de protestas que gradualmente escalaron hasta convertirse en una confrontación abierta entre grupos de protesta y el Gobierno, estudiantes universitarios radicales, al frente de las manifestaciones, han tomado el control de varias comisarías y puntos clave de Hong Kong. Mientras tanto, el activista independentista Jimmy Lai anunció la formación de un \"Gobierno Provisional de Hong Kong\" en el edificio ocupado del Consejo Legislativo, declarando que este Gobierno Provisional representa \"la verdadera voluntad del pueblo de Hong Kong\" y haciendo un llamamiento a la comunidad internacional para que lo reconozca.\n\nSi bien el Gobierno Provisional ha tomado el control de la mayor parte de Hong Kong y ha extendido su influencia a Lok Ma Chau y Sheung Shui, zonas que anteriormente estaban bajo el control de la Región Administrativa Especial, es indudable que Pekín no se quedará de brazos cruzados ante la situación en Hong Kong."
 china.69.a: "¡Cinco demandas, no una menos!"
 china.70.t: "Agentes extranjeros difunden propaganda antibélica"
 china.70.d: "Parece que agentes extranjeros han difundido noticias falsas sobre la guerra en Taiwán, alegando que el Gobierno subestimaba la cantidad de soldados del EPL muertos y exagerando el costo monetario de la guerra. Además, aparecieron en línea varias fotos de médicos que afirmaban ser prueba de los crímenes de guerra cometidos por la República Popular China en la isla. Gracias al arduo trabajo de los moderadores de internet, estas cuentas subversivas han sido eliminadas, pero es casi seguro que volverán. Desafortunadamente, muchas de las imágenes han alarmado a la población en general, así como a la burocracia del Partido, lo que significa que es necesario acelerar la guerra para evitar que comiencen las protestas."
 china.70.a: "Desafortunado."
 china.71.t: "Terroristas islamitas atacan"
 china.71.d: "Con el estallido de la Guerra de Reunificación Nacional, muchas guarniciones de Sinkiang se trasladaron al sur de China para apoyar el esfuerzo bélico. Esta disminución de la seguridad ha permitido que grupos extremistas islamistas, como la Organización de Liberación del Turquestán Oriental, se reagrupen y reorganicen para lanzar ataques contra la infraestructura civil en la región de Sinkiang. Si bien el jefe regional del Partido, Ma Xingrui, ha asegurado al Politburó que la amenaza terrorista será aplastada, hasta el momento no parece haberse logrado ningún progreso."
 china.71.a: "Horrible."
 china.72.t: "El EPL captura Taipéi"
 china.72.d: "Tras meses de brutales combates urbanos contra las fuerzas separatistas, que habían estado reforzando y reabasteciendo Taipéi a través de peligrosos senderos montañosos al sur y sureste de la ciudad, las Fuerzas Terrestres del Ejército Popular de Liberación lograron retomar Taipéi, logrando así uno de los principales objetivos de la operación militar antiseparatista en Taiwán. Desafortunadamente, el EPL sufrió numerosas bajas en la batalla, pero el golpe asestado a las fuerzas separatistas e imperialistas era necesario. Varios cientos de mercenarios japoneses y australianos fueron capturados durante la batalla, y varios cientos más murieron.\n\nCon la captura de Taipéi, el Ejército Popular de Liberación está a punto de destruir por completo los remanentes separatistas que aún persisten en la provincia de Taiwán. Todas las tropas de la operación Taipéi se redirigirán a aplastar estos remanentes en otros lugares, ubicados principalmente en la montañosa región central de Taiwán, con escasa importancia estratégica y sin acceso a costas ni puertos.\n\nEl general Zhang Youxia, de las Fuerzas Terrestres del EPL, informó que la operación militar antiseparatista se desarrollaba según lo previsto y que se esperaba que todos los remanentes separatistas colapsaran en el próximo mes. Concluyó su declaración advirtiendo a las potencias imperialistas de la región del Pacífico que su apoyo a los terroristas separatistas en Taiwán era una maniobra arriesgada, y que el resultado inevitable era que serían gravemente perjudicados muy pronto."
 china.72.a: "Taiwán está en las últimas."
 china.73.t: "Protestas antibélicas estudiantiles"
 china.73.d: "Con la prolongación de la guerra en Taiwán, la impopularidad de la guerra ha aumentado, especialmente en los círculos académicos e intelectuales. En los campus universitarios de toda China, varios estudiantes y profesores se han manifestado en contra de la guerra, calificándola de abominación a la dignidad humana. Si bien es probable que esta protesta tenga poco impacto en la política gubernamental, es una señal inequívoca de que las elevadas bajas sufridas por el EPL en una guerra que no beneficia directamente a nuestra ciudadanía se están volviendo cada vez más impopulares en el país. Desde el Ministerio de Seguridad del Estado han sugerido que tomemos medidas y aplastemos estas protestas antes de que sus mensajes subversivos lleguen a más personas. Mientras tanto, los reformistas de nuestro Gobierno han sugerido que permitamos que estas protestas continúen como una señal de libertad de expresión en China, aunque nos han animado a denunciarlos como agentes extranjeros en los medios de comunicación y la prensa."
 china.73.a: "Disperar las protestas."
 china.73.b: "Permitir que continúen."
 china.74.t: "El presidente Xi visita Wuhan"
 china.74.d: "En una muestra de liderazgo nacional, el presidente Xi visitó la ciudad de Wuhan, confinada en el país, donde conversó con residentes y funcionarios locales sobre la lucha contra el nuevo coronavirus. En el Hospital Huoshenshan, el presidente Xi habló con un paciente infectado por videollamada y le dijo: \"Lo que deben hacer ahora es mantener la confianza. Todos debemos tener confianza en que ganaremos esta guerra. ¡Victoria para Wuhan, victoria para Hubei y victoria para China!\"\n\nXi afirmó que la epidemia era la emergencia de salud pública de más rápida propagación, más extensa y más desafiante que el país había enfrentado desde la fundación de la República Popular China en 1949. \"La vida es de suma importancia\", afirmó Xi. En un discurso televisado ante funcionarios locales, Xi anunció una \"guerra popular\" y se hizo cargo personalmente de la respuesta, movilizando los recursos nacionales para combatir al \"enemigo invisible\"."
 china.74.a: "Remarcable."
 china.75.t: "Día Nacional de Luto por la festividad de Qingming"
 china.75.d: "El sábado, durante tres minutos, la gente de toda China interrumpió sus actividades. En espacios públicos de las principales ciudades, residentes con mascarillas, juntos pero separados físicamente, inclinaron la cabeza y rindieron homenaje a los miles de vecinos y compatriotas -amigos, familiares, pacientes y personal sanitario- que ya no están con ellos.\n\nMientras permanecían en silencio, las sirenas antiaéreas y las bocinas de los vehículos emitían su lamento. El presidente Xi Jinping encabezó el gesto en una ceremonia en Pekín, vestido de negro y rodeado de los miembros más destacados del Partido Comunista de China. Las banderas ondearon a media asta y se suspendieron los espectáculos en todo el país. Al cubrir los acontecimientos del día, los medios de comunicación chinos, como la agencia estatal Xinhua y el China Daily, redujeron la paleta de colores de sus páginas de inicio a blanco y negro. Muchos usuarios en redes sociales hicieron lo mismo con sus perfiles.\n\nEl día de luto coincidió con el Qingming de este año, una festividad anual en China dedicada a regresar a las tumbas de los seres queridos y limpiar sus tumbas. No es la primera vez que el festival nacional ha sido parcialmente utilizado para conmemorar una catástrofe particular, ya que los ciudadanos chinos han aprovechado la oportunidad que presenta Qingming para lamentar a las víctimas de terremotos recientes y otros desastres."
 china.76.t: "Pandas ya no están en peligro de extinción"
 china.76.d: "Es un buen día para ser un panda. Las autoridades de conservación chinas han anunciado que ya no consideran a los pandas gigantes en China como una especie en peligro de extinción. Su estatus se ha actualizado a \"vulnerable\", según Cui Shuhong, del Ministerio de Ecología y Medioambiente de China. Actualmente hay 1.800 pandas gigantes viviendo en libertad, una cifra que las autoridades atribuyen a la dedicación del país al mantenimiento de las reservas naturales y a otras iniciativas de conservación en los últimos años. Como resultado, otras especies también han prosperado: los tigres siberianos, los elefantes asiáticos y los ibis crestados han experimentado un aumento gradual de su población, según el medio."
 china.77.t: "Fuerzas japonesas se preparan para invadir Kinmen"
 china.77.d: "Hoy, el Ministerio de Seguridad del Estado nos ha informado de noticias alarmantes. Según sus servicios de inteligencia, Japón y sus aliados están orquestando planes para invadir Kinmen. Si bien para un observador casual la isla puede parecer insignificante, su importancia estratégica es innegable. Ubicada muy cerca de China continental, Kinmen podría convertirse rápidamente en una vulnerabilidad crítica si nuestros adversarios la toman.\n\nEsta vulnerabilidad se debe a su proximidad a ciudades clave, vitales para el abastecimiento de nuestras fuerzas en Taiwán. La captura de Kinmen expondría nuestras ciudades y rutas de abastecimiento a la amenaza de bombardeos de artillería, convirtiéndolas en blancos fáciles para fuerzas hostiles. Tal escenario inevitablemente conllevaría reveses significativos.\n\nDadas estas apremiantes preocupaciones, es imperativo que comencemos de inmediato los preparativos defensivos para protegernos de posibles amenazas. De no hacerlo, podríamos exponernos a graves consecuencias."
 china.77.a: "Movilizaremos a la Guardia Costera."
 china.78.t: "¡Kinmen cae!"
 china.78.d: "Esta mañana, recibimos informes de que las fuerzas japonesas y de la OTDP han ocupado oficialmente la totalidad del archipiélago de Kinmen. A pesar de nuestros esfuerzos por reforzar las fortificaciones en las islas y movilizar una defensa eficaz, no pudimos resistir la invasión naval.\n\nNuestras tropas lucharon con valentía durante los muchos días de intenso combate, pero la creciente presión enemiga obligó a nuestros soldados a retirarse a tierra firme. Posteriormente, hemos oído rumores de que fuerzas enemigas están bombardeando los puertos cercanos al archipiélago."
 china.78.a: "¡Esto es una absoluta humillación!"
 china.79.t: "¡Kinmen resiste!"
 china.79.d: "Esta mañana recibimos informes de que las fuerzas japonesas y de la OTDP fueron repelidas con éxito del archipiélago de Kinmen. Parece que nuestros esfuerzos por fortalecer las defensas en la isla dieron resultado.\n\nNuestras tropas lucharon con vigor y valentía durante los intensos días de combate en la selva y en la ciudad. Pero sus esfuerzos no fueron en vano, ya que sus fuerzas no estaban preparadas para una batalla de desgaste, por lo que ordenaron la evacuación completa de sus tropas."
 china.79.a: "Les hemos dado una lección."
 china.80.t: "Comienza la Guerra Fría Asiática"
 china.80.d: "Las tensiones entre China y Japón han alcanzado nuevos niveles, y una nueva Guerra Fría se ha desatado en Asia.\n\nLa prolongada disputa territorial sobre las islas Senkaku/Diaoyutai en el mar de la China Oriental ha sido fuente de fricción entre ambas naciones durante décadas. Sin embargo, acontecimientos recientes, como la formación de la Organización del Tratado de Defensa del Pacífico (OTDP) y la invasión china de Taiwán, han intensificado la rivalidad y han generado temores de un posible conflicto militar, ya que ambos países han incrementado drásticamente sus presupuestos militares desde el final de la guerra de Taiwán. El pacto de defensa, creado poco antes de la guerra de Taiwán, ha sido considerado por China como una provocación de Japón para contrarrestar su influencia en Asia. Desde el final de la guerra, China ha intensificado su presencia militar en el mar de la China Oriental, realizando frecuentes patrullas marítimas alrededor de las islas en disputa y desafiando el control japonés sobre la zona. China también ha tomado medidas para expandir su Iniciativa de Defensa del Este Asiático en un esfuerzo por afianzar su estatus como superpotencia mundial desde el comienzo de la Segunda Guerra Civil Americana.\n\nLa situación sigue siendo tensa e impredecible, con ambas partes inmersas en acciones y discursos provocadores. Mientras el mundo observa y aguarda, el temor a un posible conflicto militar entre las dos potencias asiáticas se cierne sobre nosotros."
 china.80.a: "El destino de Asia pende de un hilo."
 china.81.t: "Cuatro generaciones"
 china.81.d: "Lin Xiangwan sacó con cuidado las fotografías de su abuelo y su padre del viejo armario de madera. Al abrir sus puertas, un tenue aroma a alcanfor flotó en el aire. La foto en blanco y negro del abuelo lo mostraba con una chaqueta de algodón, con un diente faltante visible en su sonrisa. La abuela solía contar historias de cómo luchó contra los japoneses y luego contra los estadounidenses. La foto de su padre era a color, mostrándolo con un uniforme verde, apoyado contra una pared rota, con el rostro manchado de polvo. Sus ojos y cejas se parecían a los del abuelo, aunque su expresión siempre era seria. Más tarde, esta foto apareció en la esquina de un periódico, y él se convirtió en uno de los nombres honrados en el Cementerio de los Mártires.\n\nCon un pañuelo suave, limpió cuidadosamente el polvo de los marcos y los colocó uno al lado del otro en la mesa de café junto a ella, frente al televisor. Una vez que estuvieron arreglados, abrió su computadora portátil. Cuando la videollamada se conectó, el pitido rítmico del equipo médico llenó el silencio. Al otro lado de la pantalla estaba su hermano, acostado en una cama de hospital blanca, rodeado de un enredo de tubos. La explosión le había quitado una pierna y, por ahora, su capacidad de hablar. La mayor parte del tiempo, simplemente la miraba y parpadeaba suavemente.\n\nXiangwan giró su computadora portátil, apuntando la cámara a la pantalla del televisor. Las formaciones del desfile en la televisión se reflejaron en los ojos de cuatro personas a la vez. El abuelo había visto los aviones de su época; no había suficientes, así que tuvieron que volar dos veces. Su padre había visto los cielos grises sobre Wenchuan. Su hermano había visto las arenas de Somalia, teñidas de carmesí con sangre. Ella observó los vehículos blindados acelerar por la pantalla del televisor, miró la sonrisa del abuelo congelada en su fotografía, el rostro solemne de su padre, y luego los ojos de su hermano -la única parte de él que aún podía moverse- en la videollamada. En ese momento, su hogar se sentía lleno de vida, y sin embargo, había un vacío inquebrantable, un silencio roto solo por los atronadores sonidos del televisor.\n\nSin previo aviso, una lágrima se deslizó silenciosamente por la mejilla de Xiangwan. No se la secó. En cambio, pensó: No puedo llorar. Mi hermano lo verá."
 china.81.a: "El abuelo y papá también lo verán."
 china.82.t: "¡Misiles bombardean Taiwán!"
 china.82.d: "En una impactante escalada, China ha lanzado una serie de ataques con misiles contra bases militares e infraestructuras críticas en Taiwán. Los ataques, ocurridos en la madrugada, han sumido a la isla en el caos, con explosiones reportadas en Taipéi, Kaohsiung y otras ciudades clave. Las autoridades taiwanesas instan a los residentes a mantener la calma mientras los servicios de emergencia luchan por contener los daños. Los primeros informes sugieren que los activos militares y las defensas aéreas han sido gravemente afectados, lo que indica un esfuerzo calculado por parte de Pekín para socavar la capacidad de respuesta rápida de Taiwán. Este ataque sin precedentes representa la acción militar más directa de China contra Taiwán en la historia reciente, llevando el frágil statu quo al borde del colapso.\n\nEn Japón, las autoridades expresan profunda preocupación, con el temor de que el conflicto pueda extenderse a la región en general. Tokio ha pedido moderación y ha advertido que cualquier desestabilización de la región podría tener consecuencias de gran alcance para Asia Oriental. Si bien los canales diplomáticos siguen siendo inciertos, las fuerzas de Taiwán se movilizan ante el abrumador bombardeo, conscientes de que su respuesta en estas horas críticas puede determinar el futuro de la isla."
 china.82.a: "..."
 china.82.b: "¡Llego el día!"
 china.82.c: "El dragón despierta."
 china.83.t: "¡Segunda oleada de misiles!"
 china.83.d: "La guerra a vida o muerte ha regresado a la República una vez más.\n\nApenas unos días después del inicio de la cuarta crisis del estrecho, misiles provenientes de China continental han impactado, por primera vez, nuestra infraestructura y ciudades clave. Mientras el Ministerio de Defensa Nacional se apresura a movilizar personal de reserva y prepararse para la defensa, una segunda oleada de ataques con misiles nos ha alcanzado, esta vez devastando nuestras capacidades administrativas y de comunicación.\n\nSin embargo, las pocas estaciones de radar supervivientes han detectado algo mucho más aterrador: innumerables buques de asalto anfibio y sus escoltas se acercan rápidamente a nuestras costas, anunciando una invasión inminente. Esto solo puede significar una cosa: la cuarta crisis del estrecho ha terminado, la guerra de Taiwán ha comenzado.\n\nA pesar de la ausencia de los Estados Unidos, no estamos solos. Las fuerzas de intervención de la OTDP nos asisten en nuestra defensa en todos los sectores, apoyándonos en las zonas de desembarco para repeler a cualquier tropa que se atreva a desafiar nuestra integridad territorial.\n\nAhora debemos luchar y permanecer desafiantes contra el Gigante Rojo. Si fracasamos, la antorcha ardiente de la democracia china se extinguirá para siempre."
 china.83.a: "¡Levántate y lucha!"
 china.84.t: "El plan a futuro"
 china.84.d: "Las primeras 72 horas de la guerra de Taiwán han llegado a su fin, y no podemos sino felicitar al heroico Ejército Popular de Liberación. Las fuerzas armadas del pseudogobierno taiwanés han sufrido importantes bajas. Los radares de alerta temprana y los vehículos antimisiles antiaéreos fueron atacados por las aeronaves antes de que pudieran activarse. Numerosos cazas fueron destruidos por las Fuerza de Misiles en la pista de aterrizaje. Los anticuados buques de guerra taiwaneses también quedaron prácticamente varados en puerto, arrojando una densa humareda negra. La mayoría de las fuerzas taiwanesas se encuentran bajo vigilancia constante por nuestros satélites.\n\nLos generales del EPL mantienen intensas conversaciones sobre su próximo movimiento. Los comandantes de primera línea del Comando del Teatro del Este creen que el valioso margen de tiempo creado por el asalto debe aprovecharse para una ofensiva inmediata en la isla antes de que los taiwaneses puedan recuperarse de sus pérdidas. Los oficiales del Estado Mayor Conjunto, por otro lado, advierten que las principales fuerzas de la OTDP ya están entrando en combate y que un avance rápido no será posible. En el futuro próximo, debemos concentrarnos en contener los contraataques enemigos y avanzar con cautela.\n\nLa Comisión Militar Central ha presentado ambas opiniones juntas al Politburó para que tome una decisión. Esta decisión probablemente cambiará el curso de toda la guerra."
 china.84.a: "¡El EPL vencerá a cualquier enemigo!"
 china.84.b: "Debemos evitar la arrogancia."
 china.85.t: "Protestas en ciudades principales del sur"
 china.85.d: "Shenzhen, antaño el faro de la Reforma y Apertura de China, ahora se encuentra bajo una nube oscura. Decenas de miles de ciudadanos se congregan silenciosamente a las puertas del complejo del Gobierno municipal y a lo largo de la calle Shennan Middle. Alzan pancartas pintadas de rojo sangre, exigiendo \"Abajo el Partido Comunista\", \"Devuélvanme mi trabajo\" y \"Muerte a Xi Jinping\". La estatua del buey devoto, antaño símbolo del servicio al pueblo, ahora yace profanada en el centro de un macizo de flores. Su base, cuernos y espalda están cubiertos de grafitis que expresan desesperación e ira.\n\nEn Shanghái, la Torre Perla Oriental se alza imponente sobre una ciudad en crisis. Los manifestantes llenan las calles, desde la bulliciosa calle Nankín hasta el centro financiero de Lujiazui, desde el distrito comercial del Templo Jing'an hasta la vasta Plaza del Pueblo. Gritan por la libertad de expresión, la reforma política y la dimisión de Xi Jinping. Algunos intentan romper las barricadas frente a los edificios gubernamentales, lo que alimenta una ola de rebeldía.\n\nEn una residencia universitaria de la Universidad Central Sur de Changsha, dos literas ocupan la mayor parte del espacio. Un portátil en un rincón emite un tenue resplandor azul, reproduciendo vídeos de Weibo y Douyin. Cuatro jóvenes observan atentamente cómo multitudes masivas protestan en todo el sur de China, desde Nanning hasta Haikou, desde Fuzhou hasta Nankín. La tensión reina en la sala, hasta que uno de ellos rompe el silencio y dice lentamente:"
 china.85.a: "\"Parece que se viene una tormenta\"."
 china.88.t: "Vietnam propone una alianza"
 china.88.d: "Tras el acuerdo de copropiedad de las islas Paracel, que puso fin a una disputa centenaria, el Gobierno vietnamita ha presentado una nueva oferta. En una impactante ruptura con décadas de neutralidad, Vietnam ha propuesto unirse a la Iniciativa de Defensa del Este Asiático a cambio de la plena propiedad de las islas Paracel y admitir las irregularidades cometidas durante la guerra de 1979. Muchos en el Gobierno consideran esta una oportunidad positiva para reparar una brecha entre ambas naciones que ha existido durante demasiado tiempo, así como para asegurar nuestra frontera sur. Sin embargo, los nacionalistas dentro del Gobierno se han opuesto vehementemente a esta idea, acusando a sus partidarios de estar \"dispuestos a vender partes de la patria por la apariencia de amistad\" e impulsando la idea de que renunciar a las reivindicaciones sobre la isla haría perder la legitimidad del Partido Comunista y prolongaría el siglo de la humillación. No obstante, es necesario tomar una decisión cuanto antes."
 china.88.a: "¡Un brindis a la fraternidad socialista!"
 china.88.b: "¡Nuestro territorio no está a la venta!"
 china.89.t: "El coleccionista definitivo"
 china.89.d: "Entonces, ¿cuál es la exportación china más vendida en el planeta ahora mismo? ¿Son los televisores y lavadoras que llenan los apartamentos suburbanos? ¿Los robots electrónicos y los teléfonos plegables Huawei en fábricas inteligentes? ¿O quizás los rifles de asalto, fragatas y drones que equipan un ejército de un millón de hombres? La respuesta real podría sorprenderte, e incluso al propio camarada presidente: es un juguete de peluche, feo pero adorable, llamado \"Labubu\".\n\nAlgunos comentaristas de los medios occidentales podrían descartarlo rápidamente como otra pieza de \"veneno cultural consumista\", similar a Li Ziqi y Genshin Impact, lanzado al Mundo Libre por los socialistas chinos. Pero seamos realistas: el éxito de Labubu es simplemente sin precedentes. Después de ser producido en masa y visto en brazos de celebridades y fashionistas, la popularidad de Labubu explotó rápidamente desde un rincón tranquilo del este de Asia para apoderarse del mundo entero.\n\nDesde Tokio hasta Londres, los compradores hacen cola frente a las jugueterías. En China, los revendedores los venden a precios exorbitantes, y las versiones falsificadas son rampantes, lo que obliga a los funcionarios de aduanas de todo el mundo a lanzar operaciones especiales para detener el flujo de Labubus falsos. En el pico de la locura, los fans incluso se peleaban para conseguir uno. Una versión especial de tamaño real fue subastada por una suma astronómica, y varias milicias estadounidenses han adoptado a los Labubus como mascotas, vistiéndolos con gorras \"MAGA\" o banderas arcoíris, inundando TikTok con videos de propaganda política con audios chirriantes.\n\nIncluso si alguien quisiera detenerlos, probablemente sea demasiado tarde: los Labubus ya han conquistado el mundo con sus \"tácticas de ola humana\". A todos los fans, tengan cuidado: quién sabe, quizás sus ojos de plástico de aspecto inocente esconden secretamente pequeñas cámaras."
 china.89.a: "China se alza, millones comprarán Labubus..."

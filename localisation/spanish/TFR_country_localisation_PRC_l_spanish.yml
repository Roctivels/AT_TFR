 PRC_to_die_that_china_may_live_prop: "§YPROPAGANDA§!: Morir para que China pueda vivir"
 PRC_to_die_that_china_may_live_prop_desc: "\n\n\n\n\n£GFX_PRC_to_die_that_china_may_live_banner\n\n\n\n\n\nEllos perecieron para que China pudiera perdurar;\nSe extinguieron para que la nación china fuera eterna.\nQue nuestras propias cenizas forjen un epitafio inmortal.\nSi alguna vez vuelve a caer una calamidad sobre nuestro pueblo,\nQue nuestra sangre empape una vez más montañas y ríos."
 PRC_the_japanese_the_vile_seed_of_humanity_prop: "§YPROPAGANDA:§! Los japoneses, el mal de la humanidad"
 PRC_the_japanese_the_vile_seed_of_humanity_prop_desc: "\n\n\n\n\n£GFX_PRC_the_japanese_the_vile_seed_of_humanity_banner\n\n\n\n\n\nNunca nos han visto como humanos.\nA sus ojos, somos menos que ganado -\nBajos como el polvo, humildes como la hierba.\nSi es así, entonces convirtámonos en La pesadilla más profunda en sus sueños,La retribución que nunca se atreven a enfrentar"
 PRC_a_million_souls_a_nations_vengeance_prop: "§YPROPAGANDA:§! Un millón de almas, la venganza de una nación"
 PRC_a_million_souls_a_nations_vengeance_prop_desc: "\n\n\n\n\n£GFX_PRC_a_million_souls_a_nations_vengeance_banner\n\n\n\nForjada en cinco mil años de sangre y hierro -\n¿Quién se atreve a olvidar, mientras la vergüenza de nuestra nación aún arde?\nTrescientas mil almas inquietas esperan,\nMientras el viento creciente me llama una vez más a la guerra."
 PRC_loyalty_is_life_prop: "§YPROPAGANDA:§! La lealtad es vida"
 PRC_loyalty_is_life_prop_desc: "\n\n\n\n\n£GFX_PRC_loyalty_is_life_banner\n\n\n\n\n\nNo retrocedemos. No caemos.\nSi estas montañas y ríos han de arder,\nentonces que seamos el combustible para el fuego."
 PRC_the_spirit_of_resistance_prop: "§YPROPAGANDA:§! El Espíritu de la Resistencia"
 PRC_the_spirit_of_resistance_prop_desc: "\n\n\n\n\n£GFX_PRC_the_spirit_of_resistance_banner\n\n\n\n\n\nDespués de la venganza, puedo sentir decepción, vacío, incluso locura.\nPero tú - Tú desaparecerás de la historia, borrado para siempre."
 PRC_revolution_of_thought_prop: "§YPROPAGANDA:§! Revolución del Pensamiento"
 PRC_revolution_of_thought_prop_desc: "\n\n\n\n\n£GFX_PRC_revolution_of_thought_banner\n\n\n\n\n\nForjaremos un nuevo tipo de ciudadano chino: uno que no se incline, que no ceda, que no perdone.\nMoldearemos un nuevo carácter nacional: de sangre de hierro, mente fría y atado a la venganza.\nSolo purgando completamente la debilidad del pensamiento antiguo\nPodrá la nación china realmente levantarse, salir adelante y contraatacar."
 PRC_vengeance_against_imperialists_prop: "§YPROPAGANDA:§! Venganza contra los imperialistas"
 PRC_vengeance_against_imperialists_prop_desc: "\n\n\n\n\n£GFX_PRC_vengeance_against_imperialists_banner\n\n\n\n\n\nYa has jurado: a partir de este día, ¡solo nosotros tendremos el poder de infligir dolor!\nChina devolverá cada miedo que los demonios extranjeros una vez grabaron en su corazón -\nUno por uno,\nCon intereses."
 PRC_death_before_surrender_prop: "§YPROPAGANDA:§! Muerte antes que rendirse"
 PRC_death_before_surrender_prop_desc: "\n\n\n\n\n£GFX_PRC_death_before_surrender_banner\n\n\n\n\n\nMuero para que la nación pueda vivir.\nCon calma me voy, mientras la tierra llora, el pueblo lamenta.\nMirando atrás, el hogar sigue lejos,\nY a mis padres nunca volveré a servir."
 PRC_national_unity_prop: "§YPROPAGANDA:§! Unidad Nacional"
 PRC_national_unity_prop_desc: "\n\n\n\n\n£GFX_PRC_national_unity_banner\n\n\n\n\n\nLas madres llaman a sus hijos para luchar contra los japoneses,\nlas esposas envían a sus hombres al campo de batalla."

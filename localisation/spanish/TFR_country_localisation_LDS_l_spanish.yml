l_spanish:
 LDS_divided_mormons_idea: "Mormones divididos"
 LDS_divided_mormons_idea_desc: "Aunque el destino de los mormones es crear nuestro reino celestial de Deseret, muchos, incluidos nuestros individuos de alto nivel comparten una doble lealtad a los Estados Unidos y ven el futuro de Deseret sepultado para siempre en las cómodas manos de una nación que se extiende por todo el continente en lugar de ser completamente independiente como Dios lo desea.\n\nEsta división en la sociedad de los mormones debe ser tratada antes de que podamos cultivar cualquiera de nuestras aspiraciones como estado independiente."
 LDS_divided_mormons_2_idea: "Mormones divididos"
 LDS_divided_mormons_2_idea_desc: "Aunque el destino de los mormones es crear nuestro reino celestial de Deseret, muchos, incluidos nuestros individuos de alto nivel comparten una doble lealtad a los Estados Unidos y ven el futuro de Deseret sepultado para siempre en las cómodas manos de una nación que se extiende por todo el continente en lugar de ser completamente independiente como Dios lo desea.\n\nEsta división en la sociedad de los mormones debe ser tratada antes de que podamos cultivar cualquiera de nuestras aspiraciones como estado independiente."
 LDS_divided_mormons_3_idea: "Mormones unificados"
 LDS_divided_mormons_3_idea_desc: "Con el camino a Zion limpio de no creyentes, nuestro profeta ha cultivado exitosamente el espíritu de la gente y ha llevado a Deseret a un frenesí religioso."
 LDS_divided_mormons_3_NoJeffs_idea: "Mormones unificados"
 LDS_divided_mormons_3_NoJeffs_idea_desc: "Aún luchando junto a no creyentes, la iglesia mormona ha unido exitosamente a los creyentes del mormonismo para seguir a Nelson en su lucha para unir al pueblo de Deseret."
 LDS_mormon_unpopularity_idea: "Impopularidad mormona"
 LDS_mormon_unpopularity_idea_desc: "Aunque el mormonismo es seguido por la mayoría de la gente en nuestro territorio, aún hay una porción significativa de nuestra población que no creen en los principios del mormonismo."
 LDS_Mormon_ISIS_idea: "Fundamentalistas extremistas"
 LDS_Mormon_ISIS_idea_desc: "Con una devoción sectaria por su profeta Warren Jeffs, el movimiento fundamentalista ha crecido rápidamente tras que su profeta predijese el colapso del Gobierno de los Estados Unidos mientras estaba en prisión. Con su poder en incremento en Deseret, el tizón fundamentalista ha inspirado un espíritu de devoción fanática incluso en el mormón más moderado."

 ptf.3.a: "¡América ha sido reclamada!"
 ptf.4.t: "Colapso del Colectivo Anarquista de Green Mountain"
 ptf.4.d: "Mientras Vermont sigue ardiendo, nuestras fuerzas celebran; un gran mal degenerativo ha sido aplastado bajo las botas de nuestros gloriosos patriotas.\n\nEl mayor esfuerzo acumulado hasta la fecha para difundir el derroche de placeres, el CAGM, yace ahora en un montón de escombros a nuestros pies. Tras haber derrotado y aplastado completamente a estos anarquistas, hemos considerado oportuno aplicar una brutal represalia contra quienes, neciamente, han clamado por los principios de una pérfida falta de autocontrol. Acosados por nuestros soldados, los militantes capturados sufren brutales palizas a la menor señal de desobediencia, en un esfuerzo redentor por liberarlos de su naturaleza rebelde infantil. Sus igualmente reprensibles líderes han sido sometidos a rápidas ejecuciones, a menudo enfrentados a burlas y humillaciones antes de que el crujido de la soga se convirtiera en lo último que oyeran.\n\nSus filas inferiores, generalmente compuestas por anarquistas degenerados y otros paganos indeseables, han corrido una suerte similar a la de sus líderes. Muchos han sido ejecutados de forma igualmente ordenada, conducidos a la horca al darse cuenta de que sus intentos de destruir América y su cultura fueron en vano. Quienes no han sido ejecutados han sido arrojados a camiones y transportados a lugares seguros, donde sin duda se les obligará a trabajar por lo que puede considerarse un futuro muy productivo. Aprenderán lo que es ser un americano trabajador; no podemos imaginar un castigo más justo que que, a la larga, alimenten nuestro esfuerzo bélico. Quizás, si alguna vez son liberados, habrán cambiado de opinión respecto a estos ideales absurdos por los que lucharon en el pasado y que nunca se materializarán.\n\nMuchos civiles en su territorio, como era de esperar, están contentos con la marcha de los anarquistas; sin embargo, no todos están tan dispuestos. Parece que, por desgracia, más americanos han cedido a sus ideales de lo que inicialmente esperábamos. A medida que empezamos a restaurar el orden y el sentido de deber patriótico en sus territorios, debemos asegurarnos de que esta mentalidad se elimine rápidamente. Con fuerza, si es necesario."
 ptf.4.a: "Un final apropiado para sus intentos de destruir nuestro país."
 ptf.5.t: "Segunda masacre de Boston"
 ptf.5.d: "Todo empezó con una bola de nieve.\n\nReunidos en el Boston Common, numerosos grupos neoliberales y socialistas se congregaron para protestar contra nuestra reciente toma de control de la ciudad. Destacando algunos de nuestros supuestos \"crímenes\" en la ciudad y la región, los manifestantes, con carteles de familiares de criminales detenidos, exigieron el fin de la ley marcial y la restauración de todos los derechos civiles. Inicialmente modesta, esta protesta fue vigilada de cerca por nuestras fuerzas.\n\nTras la lenta llegada de informes de informantes que alegaban que los manifestantes planeaban marchar hacia el ayuntamiento, el recién nombrado jefe de policía ordenó que los manifestantes se dispersaran antes de que transcurrieran horas, prometiendo una rápida represión si no se acataba su orden. Tras breves deliberaciones, los líderes de la protesta decidieron por votación continuar con su plan. Sellaron su destino.\n\nAl parecer, un manifestante lanzó una bola de nieve llena de hielo y fragmentos de roca a nuestros soldados, quienes mantuvieron la calma y ordenaron a los manifestantes que se dispersaran, reiterando las órdenes del jefe de policía. Esto pareció enfurecer a los manifestantes, quienes comenzaron a apedrear a algunos de nuestros hombres con piedras, palos y otros escombros. Tras una explosión increíblemente fuerte, un soldado recibió un golpe particularmente fuerte con un objeto pesado. Explicando que creía haber recibido un disparo, abrió fuego al aire, y sus compatriotas hicieron lo mismo. Algunos manifestantes supuestamente avanzaron rápidamente, provocando un tiroteo general contra la multitud.\n\nAhora, diez personas yacen muertas, sesenta y siete hospitalizadas y cientos con heridas leves o graves a causa de la estampida resultante. Mientras tanto, además del herido antes del tiroteo, que en realidad no recibió un disparo (aún no lo hemos revelado al público), solo un hombre sufrió una fractura leve en el brazo al ser derribado brevemente al suelo durante la retirada de los manifestantes. Si bien fue un desastre visual, el caos nos brindó una buena oportunidad para reunir a los líderes de la protesta, quienes ahora están contribuyendo a la causa de la renovación americana en otros lugares."

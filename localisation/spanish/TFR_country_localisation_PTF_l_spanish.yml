 ptf_news.6.t: "Batalla de Washington D.C."
 ptf_news.6.d: "Reportes desde Washington D.C han confirmado que la capital de la Unión de América ha caído en manos de la fuerza insurrecta derechista conocida como el Frente Patriota. Civiles huyen en todas direcciones al mismo tiempo que historias de saqueos y ejecuciones sistemáticas se esparcen como un reguero de pólvora. En un discurso a la nación, Thomas Rousseau ha declarado que el pueblo americano ha conquistado su destino. Nuestro espíritu nacional ha triunfado sobre el títere sionista, y nuestra liberación es inminente."
 ptf_news.6.a: "¡El corazón de América es nuestro!"

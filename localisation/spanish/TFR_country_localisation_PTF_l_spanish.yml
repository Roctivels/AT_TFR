 ptf.10.t: "Llegada de los voluntarios rusos"
 ptf.10.d: "Recientemente, hemos visto un aumento en la cantidad de soldados extranjeros dispuestos a luchar por nuestra revolución. Lo interesante es que la mayoría, si no todos, son de Rusia. Más específicamente, parecen ser soldados profesionales contratados, y algunos parecen pertenecer a la Spetsnaz rusa.\n\nComo muestra de buena voluntad del Kremlin, hemos recibido a algunos de sus hombres para que cumplan nuestras funciones de combate. Aunque técnicamente están bajo nuestra jurisdicción, estos hombres operan con casi total autonomía respecto al resto de nuestras brigadas de voluntarios extranjeros. Pero es cierto que tienen un entrenamiento y una experiencia superiores a los de cualquier otro miembro de nuestras brigadas.\n\nHay un aura inquietante alrededor de estos hombres. Algunos creen que nos ayudan a luchar por el bien de América. Otros consideran que luchan por sus intereses personales o nacionales. Otros simplemente desconocen el motivo de su lucha y, por lo tanto, no merecen nuestra confianza.\n\nDicho esto, por ahora nos servirán. Los desplegaremos en sectores del frente con menos hombres que otros, y los Spetsnaz nos ayudarán con misiones de alto valor, sabotaje, reconocimiento y entrenamiento.\n\nSin importar para quién o para qué estén realmente aquí estos soldados, nos han enviado un mensaje claro estas últimas semanas:"
 ptf.10.a: "\"Desde Rusia con amor\"."
 ptf.10.b: "\"Desde Rusia con amor\"."

 ptf.56.t: "Describir la identidad americana"
 ptf.56.d: "A lo largo de la historia de América, la definición de \"americano\" ha cambiado drásticamente. Algunos, cobardes, afirman que cualquiera puede ser americano; otros, en su ignorancia, lo describen como un disparate esotérico. Algunos creen que es biológico, mientras que otros insisten en que es físico. Lo cierto es que nada puede definir por sí solo lo que significa ser americano. El camino para convertirse en americano requiere sacrificio, resiliencia y dedicación a los valores compartidos que fortalecen a nuestra nación. Ser americano no significa simplemente un derecho de nacimiento, sino un compromiso con los principios compartidos que apreciamos.\n\nInspirándonos en el concepto de Teddy Roosevelt sobre lo que significa ser americano, creemos que el espíritu americano no se limita a la cuna ni a las fronteras físicas. Es, en cambio, un estado mental, un viaje espiritual, un testimonio de resiliencia y una dedicación a los valores compartidos que hacen única a nuestra nación.\n\nAdemás, defendemos la importancia de la asimilación, como defendió Teddy Roosevelt. No se trata de diluir las culturas individuales en una mezcla monótona. Más bien, animamos a todos a aportar sus culturas, historias y experiencias únicas al entramado americano, alineándonos con los principios fundamentales que nos unen como nación. Nuestro objetivo es cultivar una identidad compartida y un entendimiento mutuo entre todos los que consideran a América su hogar. Consideramos \"americano\" un compromiso que trasciende el lugar de nacimiento y se transforma en un profundo sentido de pertenencia y un destino compartido."
 ptf.56.a: "Una Natione!"
 ptf.57.t: "El alce toro con nosotros"
 ptf.57.d: "Al vislumbrarse el amanecer de una nueva era en nuestra querida nación, el Partido necesita expandirse. Debemos asumir la responsabilidad no solo de gobernar, sino también de convertirnos en un hilo conductor de la vida americana, una fuerza omnipresente que vigile los valores que apreciamos. En cada plaza, cada barrio, cada hogar y cada corazón, el espíritu de nuestro partido florecerá y florecerá, marcando el ritmo de la nación.\n\nCreemos que esta relación, esta interrelación entre la política y la vida cotidiana, nos acerca a las personas a las que servimos. Nuestros líderes no son figuras distantes; al contrario, acompañan a cada americano en el esfuerzo compartido de construir un futuro prometedor y próspero. Esta es la visión de nuestra iniciativa, \"El Alce que llevamos dentro\".\n\nBajo la guía del Alce, estamos forjando una América que atesora su pasado, se enfrenta con seriedad a su presente y avanza con confianza hacia su futuro. Con cada día que pasa, el espíritu de Bull Moose se imbuirá más profundamente en la mentalidad americana, un testimonio de la resiliencia y tenacidad de nuestro pueblo. Juntos, estamos escribiendo el próximo gran capítulo de la historia americana. Unidos en un propósito a través de Bull Moose."
 ptf.57.a: "Uniti sotto uno."
 ptf.58.t: "Reforjar los fasces americanos"
 ptf.58.d: "Desde el fin de la Segunda Guerra Mundial el término \"Fascista\" ha sido utilizado de forma despectiva. En el siglo pasado se utilizó \"Fascismo\" para describir cualquier cosa considerada \"malvada\" y ha sido visto de una forma negativa. No siempre fue así, durante la primera Revolución Americana fue considerado un símbolo contra el dominio británico, por lo que después de todo es un símbolo de la república. Hoy simbolizará algo nuevo."
 ptf.58.a: "El vínculo que nos mantiene unidos."
 ptf.58.b: "La fuerza que nos une."

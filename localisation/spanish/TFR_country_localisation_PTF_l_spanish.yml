 ptf.11.t: "¡Llega ayuda de La Meute!"
 ptf.11.d: "Con la guerra civil en pleno apogeo, es evidente que América nunca volverá a ser la misma. Nuestros hermanos en Canadá también se están dando cuenta de ello. Aunque aún no han caído en el caos, un número suficiente de personas ha cruzado la frontera y ha aceptado luchar por nuestra causa.\n\nHistóricamente, Quebec ha atravesado una situación difícil; su gente ha sido dividida por los canadienses: algunos anhelan la libertad, mientras que otros se conforman con la sumisión. La Meute es el primero. Reconociendo que nuestras luchas no son tan diferentes, han enviado a algunos combatientes para que adquieran experiencia en combate. Aunque su lenguaje pueda parecer absurdo, podemos aprovechar toda la ayuda posible.\n\nDesafortunadamente, Canadá ha tomado nota de esto y ha reforzado la vigilancia fronteriza. Si bien esto ha impedido que algunos de sus combatientes crucen la frontera, la gran mayoría ha logrado venir a América para unirse a nuestra causa. Junto con nuestros hermanos franceses, reclamaremos América, y tal vez puedan aprovechar su experiencia en casa después de la guerra."
 ptf.11.a: "Reconquérir l'Amérique, Reconquérir Le Québec!"
 ptf.12.t: "Trabajo sin sentido"
 ptf.12.d: "Un reloj da la medianoche en la ciudad que nunca duerme. Un joven dormita sobre un teclado, tomando su café y su Adderall, preguntándose si su deuda de 100 mil dólares en préstamos estudiantiles valió la pena. Su jefe, al otro lado del pasillo, mira por la ventana. Nervioso por ir a la residencia que paga y para la que trabaja. No quiere oír a su esposa gritar sobre cómo el perro se cagó en la alfombra nueva que compró en HomeGoods con sus cupones. Tiene miedo de ver qué se pondrá su hija en su salida nocturna. Aterrorizado de ver a su hijo seguir los mismos pasos.\n\n¿Es todo esto normal? Hombres dormitando y perdidos en el laberinto de la América corporativa, encadenados a sus escritorios, trabajando por lo que son, en esencia, números sin sentido en el sentido más literal. ¿Trabajamos para vivir o vivimos para trabajar?\n\nEn la búsqueda del sueño americano, pasamos incontables horas pegados a pantallas y hojas de cálculo, viviendo a base de café y persiguiendo plazos inalcanzables. A medida que se difuminan los límites entre nuestra vida personal y profesional, el mantra \"el tiempo es oro\" se convierte en una verdad omnipresente. Nos encontramos atrapados en un ciclo de servidumbre corporativa. ¿Cómo llegamos a este aprieto? La respuesta reside en la unión del consumismo y el corporativismo. Las corporaciones se han vuelto expertas en perpetuar el mito de que la buena vida es producto del trabajo incansable y el consumo constante. Pero ¿a qué precio? Salud, familia, tranquilidad: ¿no son estas las verdaderas medidas de una vida plena?"
 ptf.12.a: "América avanza."
 ptf.13.t: "Cadenas invisibles"
 ptf.13.d: "En la gran tradición americana de prosperidad, nuestra nación siempre ha sido celebrada como la cuna de abundantes oportunidades y vasta riqueza. Sin embargo, en la búsqueda de más, nos vemos atrapados en un consumo sin fin.\n\nLas corporaciones, antaño proveedoras de bienes y servicios, se han transformado en titiriteras, tocando la fibra sensible del consumidor americano con una compulsión casi hipnótica. Estamos inmersos en una sinfonía incesante de anuncios y discursos de venta, que nos instan a adquirir más, a consumir más. Una tiranía silenciosa en este ciclo de adquisición sin fin, un ciclo que despoja de nuestros valores fundamentales y los reemplaza con un hambre voraz por lo último. La esencia misma del instinto natural primario del espíritu -el individualismo, la autosuficiencia y la búsqueda de la felicidad genuina- corre el peligro de quedar sepultada bajo una montaña de lo innecesario y superfluo.\n\nEsta lucha no se trata de rechazar la prosperidad ni de un llamado al minimalismo, sino de reclamar nuestra independencia de las entidades corporativas que alimentan el fuego del deseo infinito. Se trata de libertad."
 ptf.13.a: "Las cosas que posees terminan poseyéndote."

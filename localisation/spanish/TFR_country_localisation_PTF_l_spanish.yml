 ptf.155.t: "La última batalla de Prysner"
 ptf.155.d: "La guerra civil lleva meses en curso; poco a poco, hemos logrado acorralar a la amenaza roja cada vez más en el rincón que llaman California.\n\nHasta que un fatídico día, el Segundo Ejército Continental logró rodear un bastión del EPLA en San Francisco, donde se refugia una de las figuras más prominentes de la organización: Michael Prysner. Exsoldado, traidor presente y futuro difunto. Era consciente de las vidas que desperdiciamos en Medio Oriente, pero aun así se desvió del camino hacia el odio a nuestra nación. Si las cosas hubieran sido diferentes... quién sabe.\n\nJunto con su chusma de bandidos rojos, juró oponer resistencia definitiva contra nosotros. Tras varios días de lucha, decidimos que ya era suficiente, y el edificio fue bombardeado; los escombros caídos eran sus tumbas. Con eso, otro pilar del terror rojo cae; al menos estaba dispuesto a morir por su causa."
 ptf.155.a: "Otro mártir para las leyendas..."
 ptf.156.t: "Intervención canadiense en Nueva Inglaterra"
 ptf.156.desc: "Hoy, funcionarios canadienses hicieron un anuncio importante sobre la región de Nueva Inglaterra. Según el anuncio, las Fuerzas Armadas Canadienses declararon oficialmente su intervención contra el Frente Patriota, una facción que recientemente se ha consolidado como el único unificador de la región. A pesar del reciente éxito del Frente Patriota, los expertos militares aún predicen una victoria canadiense gracias a su ejército bien entrenado y equipado. Sin embargo, debido a los recientes estancamientos en las escaramuzas fronterizas contra el Frente Patriota, los expertos dudan de la efectividad de la ofensiva canadiense en una región tan extensa.\nLa intervención de Canadá ha sorprendido a la comunidad internacional, ya que el país declaró inicialmente la no intervención durante la Segunda Guerra Civil Americana tras verse abrumado por la cantidad de refugiados. Dada la situación, muchos cuestionan los motivos del gobierno canadiense para intensificar el conflicto. Sigue siendo incierto cómo se desarrollará la guerra, ya que los expertos predicen avances canadienses en las primeras etapas, pero no están seguros de los acontecimientos posteriores."
 ptf.156.a: "Otra guerra en América."
 ptf.157.t: "Las juventudes patrióticas"
 ptf.157.desc: "Rousseau estaba ocupado con reportes cuando el lugarteniente irrumpió en su despacho, con una sonrisa burlona en su cara. Puso una foto en el escritorio.\n\n\"Thomas, tienes que ver esto\", dijo, aguantándose a duras penas la risa. \"Es... bueno, solo míralo\"\n\nRousseau levantó una ceja, mirando el papel. La captura de pantalla impresa le mostraba avatares toscos de Roblox con uniformes rudimentarios del Frente Patriota. Estaban de pie rígidos en formación, con sus banderas americanas pixeladas ondeando sobre el brillante y caricaturesco fondo del mapa «LGBT Hangout».\n\nEl teniente se acercó, ampliando su sonrisa. \"Se hacen llamar las Juventudes Patrióticas. Tienen hasta su propia página y todo. Dicen que llevan a cabo «operaciones estratégicas» y que son «defensores de los ideales americanos»\". Dijo riendo entre dientes. \"Hasta han construido un mini campo de entrenamiento. Mira, es el Pasillo de los «Fundadores»\".\n\nRousseau se quedó mirando la hoja, sin esbozar ninguna sonrisa. La escena le dejó una sensación amarga, un vacío en el pecho. El absurdo de la imagen era casi irrisorio, niños mostrando su patriotismo en un mundo de píxeles. Pero daba la sensación que, como mirar a un niño jugar a la guerra con armas de plástico, estaban imitando acciones que no podían entender.\n\nDejó el papel con cuidado, doblándolo con precisión. \"Son niños\", dijo simplemente con una voz seria. \"Déjales... jugar a sus juegos\"."
 ptf.157.a: "Imitación... ¿o burla?"
 ptf.158.t: "Cosas importantes"
 ptf.158.desc: "Tierra quemada. Bosques quemados. Fortificaciones. Trincheras. Escenas que parecían sacadas de la Primera Guerra Mundial. Pero entre toda esta destrucción estaban los soldados que la vivieron en el frente. Lucharon día y noche, con la muerte al alcance casi cada segundo que estuvieron en el combate o cerca de él.\n\nEs lógico que, con el ambiente depresivo, los soldados lo reflejaran.\n¿Verdad?\n\n\"No, hombre; cualquier chica con la que salga o me case necesita ser un reloj de arena. Si no, no cuenten conmigo\".\n\n...Supongo que no.\n\n\"Tío, tienes que apreciar más las demás cosas que tienen las chicas; además, ese es uno de los estándares más altos, y desde luego no mereces una «reloj de arena»\".\nEstas conversaciones relativamente normales eran casi tan normales como el combate. Podrían haber ocurrido en un vestuario, en una mesa de restaurante o en una llamada telefónica. Estas conversaciones tenían cierta utilidad práctica: el humor aliviaba el estrés de estar en primera línea, pero nunca se iniciaron con la intención de aliviarlo. Simplemente ocurrían.\n\nPero como en cualquier experiencia en primera línea, la realidad acabará por interrumpir la diversión.\n\n\"¡Atención!\"\nUn proyectil de artillería silbó por el aire, y los soldados se preguntaban si ponerse a cubierto.\nEl proyectil detonó a solo cuatro metros y medio de distancia; si no se hubieran agachado, la metralla los habría matado.\n\nUno se levantó al cabo de un rato, sacudiéndose el uniforme y riendo entre dientes.\n\n\"Vaya, eso sí que fue una bomba\", dijo, esperando la respuesta de su compañero con una amplia sonrisa."
 ptf.158.a: "Su compañero sólo lo miró decepcionado."
 ptf.159.t: "Sangre fina, mentiras espesas"
 ptf.159.desc: "La base era un campamento improvisado en la zona rural de Connecticut, con un exterior tan discreto que podría haber sido parte de la propiedad de algún granjero que ya no está. Sin embargo, en su interior, los nuevos reclutas se agrupaban, rodeados de banderas con águilas y letreros que decían \"Reclamar América\". Sillas plegables formaban un círculo informal donde los hombres, sentados, observaban al recién llegado.\n\nSe presentó como Daniel; llevaba unos vaqueros que parecían demasiado limpios y una chaqueta bomber que se notaba nueva. Su apretón de manos fue firme, quizás un poco demasiado entusiasta. El reclutador local, un tipo al que todos llamaban Marcus (CT), lideraba el grupo, masticando salsa y mirando a Daniel como si fuera un carpintero midiendo madera.\n\n\"Entonces, Daniel\", dijo Marcus, después de que las presentaciones se alargaran un poco. \"Estás aquí para unirte a algo más grande que tú. Proteger nuestra herencia. Pero te ves un poco... bronceado. ¿Estás seguro de que no escondes nada?\"\n\nLa sala se tensó, todas las miradas fijas en el recién llegado. Daniel sonrió con confianza, imperturbable. \"Un cuarto mexicano\", admitió. Se oyeron jadeos, un horror medio fingido. Marcus escupió en una lata, frunciendo el ceño.\n\n\"Explícate.\"\n\nDaniel se enderezó en su silla, con una sonrisa amplia, como si no le importara la autoconciencia. \"Las Leyes de la Raza Aria de Alemania\", comenzó, \"decían que incluso siendo un cuarto judío, podías casarte con una mujer alemana. Y la última vez que lo comprobé, las mujeres blancas siguen siendo mujeres blancas.\"\n\nSilencio. Una risita disimulada se escapó de uno de los reclutas más jóvenes al fondo, rápidamente ahogada por la mirada fulminante de Marcus. Este lo reflexionó, con el labio fruncido, antes de finalmente gruñir: \"Touché\".\n\nEso provocó una risa. Incómoda, pero contagiosa. La tensión se disipó, reemplazada por la camaradería nacida de la desesperación general. Marcus hizo un gesto con la mano, sellando el trato con un asentimiento reticente."
 ptf.159.a: "\"Bienvenido al Frente, amigo\"."
 ptf_unit_leader.1.t: "Christopher Heben §Rmuere en combate§! el [GetDateText]"
 ptf_unit_leader.1.d: "El mando regional ha confirmado los informes de que el mariscal de campo Christopher Heben murió en lo que parece ser una misión suicida. Todos los asaltantes, compuestos principalmente por miembros del ELF, murieron en el combate; entre los muertos también había muchos terroristas buscados."
 ptf_unit_leader.1.a: "Vivió por un sueldo, murió por una causa."
 ptf_unit_leader.2.t: "Jordan Goudreau §Rmuere en combate§! el [GetDateText]"
 ptf_unit_leader.2.d: "Las autoridades confirmaron la muerte del Mariscal de Campo Jordan Goudreau. Según testigos, murió durante una discusión con compañeros mercenarios recientemente indultados, quienes estaban siendo reprendidos por su conducta militar y saqueos. Frustrado por la situación, uno de los soldados presuntamente realizó movimientos bruscos que provocaron un tiroteo, con el saldo de cinco muertos, incluyendo a los cuatro soldados reprendidos."
 ptf_unit_leader.2.a: "La guerra hace que valga la pena luchar por escombros."
 ptf_unit_leader.3.t: "Nathan Damigo §Rmuere en combate§! el [GetDateText]"
 ptf_unit_leader.3.d: "Tras el levantamiento en el Centro Penitenciario de Rikers Island, las autoridades confirmaron la muerte del general Nathan Damigo. Las grabaciones de las cámaras de seguridad muestran su captura por los reclusos tras un prolongado asedio dentro del complejo. Junto con otros oficiales supervivientes, fue decapitado en medio del patio después de que los presos lograran capturar una parte importante del centro. Sus restos fueron recuperados; él y otros oficiales que perdieron la vida en la insurrección tendrán un funeral la próxima semana."
 ptf_unit_leader.3.a: "Murió protegiendo a la ciudad del infierno."
 ptf_news.1.t: "Batalla de Nueva York"
 ptf_news.1.d: "Las fuerzas del Frente Patriota despejan Manhattan de francotiradores, mientras agentes de propaganda inundan Brooklyn con suministros. Sin duda, la joya más preciada del tesoro en rápida expansión de Thomas Rousseau, Nueva York ha sido completamente subyugada por el fascismo. La resistencia restante es esporádica y débil, con escasa cooperación entre los remanentes policiales, los agentes federales y los izquierdistas. Esto no ha evitado la muerte de muchos ocupantes y sus nuevos colaboradores.\n\nLos daños a la ciudad son más graves en las regiones periféricas; sin embargo, aún hay indicios de guerra incluso en las zonas ricas. La ciudad ha perdido población rápidamente, con miles de civiles huyendo hacia el sur, hacia la Nueva Jersey unionista, o hacia el oeste y el norte, aún más hacia los brazos del Frente Patriota. El nuevo régimen se ha mostrado sorprendentemente dispuesto a permitir que la ciudad se vacíe, estableciendo numerosos corredores de refugiados. No por bondad de corazón, la ciudad es vasta y densa, y tomará meses dominarla: menos gente, menos tiempo."
 ptf_news.1.a: "¡La Gran Manzana es nuestra!"
 ptf_news.1.b: "La Gran Manzana cae."

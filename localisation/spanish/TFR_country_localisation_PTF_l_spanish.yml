 PTF_transfer_power_to_congress_desc: "¡Es hora! La liberación de América ha llegado. Nuestra capital se estremece con los vítores y cánticos de millones. El Congreso recuperará el poder. La guía de Rousseau nos ha dado tanta virtud y conquista. Pero ahora, es hora de que el poder recaiga en el pueblo. Los ideales del equilibrio de poderes son lo que los padres fundadores habrían deseado. Nos miran con desprecio y sonríen ante nuestra virtud, ante nuestra revolución. La Segunda Revolución Americana ha llegado, y el futuro pinta bien."

 ptf.17.t: "Juicio de la rata gorda"
 ptf.17.d: "Quienes conocían bien el Frente Patriota, ya fueran civiles o miembros directos de la propia organización, eran plenamente conscientes de que la disidencia interna era un tema tabú en sus filas. Una base unificada era clave para alcanzar la victoria en tiempos de lucha nacional, y quienes intentaban romper esa unidad eran, por decirlo suavemente, sometidos a un escrutinio riguroso. Si bien era inevitable que surgieran ciertos desacuerdos, ningún grupo interno había sido más disruptivo que los strasseristas, liderados por el ex influyente miembro del MNS, Matthew Heimbach. Heimbach, por supuesto, no era más que un comunista de poca monta infiltrado en nuestra organización, que contagiaba sus pérfidas inclinaciones bolcheviques a los miembros más crédulos que lo escuchaban. Hasta hoy.\n\nSupuestamente por orden del propio Rousseau, los principales líderes de la camarilla strasserista de Heimbach fueron detenidos repentinamente esta mañana, arrestados y arrastrados de su lugar antes de que pudieran reaccionar a las salas de interrogatorio, donde fueron sometidos a varias horas de interrogatorio antes de ser juzgados por su comportamiento traicionero. Con el propio Rousseau presente en el juicio, así como diversas figuras influyentes y miembros de bajo rango, Heimbach y sus compinches se relajaron en sus asientos mientras se les leían sus crímenes, entre los que se incluían: fomentar la desunión entre las filas, socavar los esfuerzos del Frente y difundir las creencias comunistas, todo lo cual constituía nada menos que traición.\n\nEl tribunal emitió un veredicto poco después: culpable de todos los cargos y, en adelante, condenado a muerte por fusilamiento. Por ello, los líderes del grupo fueron rápidamente sacados a rastras, profiriéndoles una lluvia de insultos mientras los llevaban a la pared. Heimbach, cobardemente, pidió perdón mientras muchos de los presentes le lanzaban insultos como \"colega\" y \"gordo cabrón\", hasta que el estallido de los disparos de fusil puso fin a sus patéticos lamentos.\n\nCon la pérdida de su liderazgo, el miembro promedio del grupo parlamentario de Heimbach ha vuelto a alinearse, probablemente temeroso de verse implicado y correr la misma suerte que sus líderes. Tengan la seguridad de que no volverán a desviarse de su camino."
 ptf.17.a: "Un recordatorio oportuno de a quién deben atenerse."
 ptf.18.t: "Destino del simbolismo corporativo"
 ptf.18.d: "En nuestro audaz esfuerzo por transformar América, nos encontramos inmersos en un torbellino de discursos sobre la arquitectura corporativa en su conjunto. Este diálogo se desencadenó tras nuestra campaña de desmercantilización.\n\nEstos, otrora brillantes epítomes de la destreza económica, se han convertido en un símbolo del capitalismo excesivo, un escenario donde la élite financiera juega con el dinero ganado con tanto esfuerzo, fomentando una cultura de avaricia y corrupción.\n\nA medida que avanzamos, nos enfrentamos a una pregunta crucial: ¿Qué será de estos edificios que se erigen como testimonio del neoliberalismo corporativo? Algunos abogan por la erradicación total de estos íconos de la avaricia, abogando por su reemplazo por símbolos que rezuman vitalidad, virtud y el espíritu de una América reformada. Por el contrario, otros proponen preservar algunos de estos hitos, reconociendo su papel histórico en el fortalecimiento de la posición de América como un titán económico líder.\n\nPor muy diversas que sean estas perspectivas, un hilo conductor las une: la firme resolución de que estos monumentos no deben volver a su antiguo estado de corrupción. Si la preservación triunfa, nos comprometemos a implementar rigurosas salvaguardias para impedir el resurgimiento de las malas prácticas del pasado. Una vez que hayamos reclamado América en su totalidad, estamos convencidos de que dicha explotación nunca volverá a asolar nuestra nación."
 ptf.18.a: "Conservemos nuestros símbolos de poder económico."
 ptf.18.b: "Derretirlas y abrazar el futuro."
 ptf.19.t: "Juicio a profesores de la Ivy League"
 ptf.19.d: "Las universidades de la Ivy League son de las más prestigiosas de América, si no del mundo. El genio y el talento se cultivaban a la perfección, al menos antes era así.\n\nLos profesores se preocupaban por lo que enseñaban; estaban forjando la América del mañana, una nueva generación de pensadores, un ejemplo brillante del ingenio americano.\nHoy en día se han vuelto inflados, mercaderes de veneno mental que enseñan a nuestros jóvenes a odiarse a sí mismos.\n\nEsto termina hoy. Marchamos a los campus y sacamos a estas serpientes de sus camas. Todos serán llevados a juicio, juzgados por el pueblo americano por corromper nuestros valores y faltar al respeto a los cimientos sobre los que se construyó este país.\n\nSin embargo, corren rumores entre nuestras filas de que algunos profesores no han sido una gran amenaza para América, simplemente eran ignorantes y, con una corrección adecuada, podrían volver a enseñar bien a nuestros jóvenes. Concederles clemencia a los útiles nos ayudaría mucho.\n\nO podemos comprometernos plenamente con nuestros ideales y hacerles pagar por el crimen de profanar la América que tanto apreciamos."
 ptf.19.a: "Ejecutar a cada traidor."
 ptf.19.b: "Mantengan a los útiles con vida."
 ptf.20.t: "Juicio de los burócratas de Nueva Inglaterra"
 ptf.20.d: "La burocracia es un infierno diseñado solo por los verdaderamente enfermos, un gran laberinto que atrapa al ciudadano común entre tecnicismos e información inútil.\n\nEstos burócratas se han esforzado sin esfuerzo por obstaculizar al americano promedio, obligándolo a llenar papeleo inútil, paralizando nuestra nación.\nBasta de eso, empezando por los de Nueva Inglaterra. Todos serán juzgados, acusados de dañar el espíritu americano y de ralentizar intencionalmente el motor dinámico que impulsó a nuestra nación.\n\nLa respuesta obvia sigue siendo: deshagámonos de todos, porque son una masa inútil.\nEl problema de tener que reajustar nuestra infraestructura burocrática persistiría; sin nadie que enseñara a nuestros nuevos y leales burócratas la forma correcta de gobernar una nación, terminaríamos siendo tan lentos como los antiguos antes de retomar el ritmo.\n\nO podríamos asignar a los menos traicioneros a roles no esenciales. Así, podremos seguir usando sus conocimientos, pero ya no podrán ser una amenaza para la nueva América."
 ptf.20.a: "Ha llegado su día."
 ptf.20.b: "Asignarles roles administrativos no esenciales."
 ptf.21.t: "Los tradicionalistas y futuristas"
 ptf.21.d: "A pesar de las divisiones establecidas entre ideologías, visiones y objetivos, la mayoría de los miembros a menudo pueden agruparse en dos grupos: los tradicionalistas y los futuristas.\n\nLos tradicionalistas perciben el pasado no solo como superior al presente, sino como una brújula que nos guía hacia el futuro. Contemplan la caída de América como una herida autoinfligida, consecuencia de un experimento social moderno que se ha vuelto descontrolado. Sostienen que la población, sumida en un estado de dócil sumisión, ya no puede confiar en América. Sin embargo, incluso en medio de estas profundas creencias, afirman que los pilares de la antigua república aún pueden brindar apoyo en el crisol de la Nueva República. Se inspiran en el pasado para buscar un nuevo futuro.\n\nLos futuristas ven a América ascendiendo, evolucionando hacia un faro de poder y virtud que supera su antigua gloria. Impulsados por el sueño irresistible de una América renacida, estos arquitectos visionarios buscan restablecer la hegemonía global de la nación y orquestar la llegada de una nueva era dorada. Mediante el empoderamiento del ciudadano común, derribando las barreras del antiguo elitismo oligárquico, en su búsqueda de una América resplandeciente que priorice a su gente por encima de todo. Liberan las limitaciones del pasado, alcanzando los horizontes ilimitados del futuro, mientras doman hábilmente a la bestia indomable que es el tigre del mundo moderno."
 ptf.21.a: "Tradicionalistas."
 ptf.21.b: "Futuristas."
 ptf.22.t: "Destino de la Torre Trump"
 ptf.22.d: "Nuestra lucha en Nueva Inglaterra continúa y recientemente nuestros esfuerzos nos han permitido recuperar la ciudad de Nueva York. Con esto, también hemos tomado el control de la Torre Trump. La torre, que perteneció al expresidente Donald Trump, ha sido un tema candente de debate últimamente, más específicamente sobre qué hacer con ella.\n\nAlgunos creen que deberíamos dejar la Torre como está, creyendo que, a pesar de todo, forma parte de la historia americana y que debe preservarse. Esto también demostraría buena voluntad hacia quienes aún mantienen una lealtad persistente al Partido Republicano.\n\nSin embargo, otros creen que la Torre Trump debería ser despojada de todo lo que haga referencia al expresidente, creyendo que no hay razón para recordar al hombre que le falló a su nación. Esto molestaría enormemente a los leales a Trump en nuestro territorio, pero también demostraría que hemos terminado con la vieja América, la América podrida, y que rejuveneceremos la nación, liberándola de su pasado decadente."
 ptf.22.a: "La torre es parte de nuestra historia; consérvenla."
 ptf.22.b: "No más monumentos a la decadencia."
 ptf.23.t: "Destino de los mercenarios"
 ptf.23.d: ""
 ptf.23.a: "Estos despiadados no son mejores que marxistas."
 ptf.23.b: "Serán útiles en la reclamación. ¡Perdónenlos!"
 ptf.24.t: "Reubicación de la capital"
 ptf.24.d: "Tras una larga y brutal batalla urbana, el Ejército Continental finalmente ha capturado la ciudad más grande de América: Nueva York. Con la captura de Nueva York, muchos en nuestra organización han replanteado la cuestión de trasladar la capital. Nuestra capital actual, Boston, tiene un gran valor simbólico, al ser la primera ciudad importante de la que fueron expulsados los británicos durante la revolución original y la primera ciudad importante que nuestra organización capturó durante la segunda. Además, se encuentra en las profundidades de nuestro territorio y no corre gran riesgo de ser invadida o rodeada por una ofensiva enemiga.\n\nPor otro lado, Nueva York es, con diferencia, la ciudad más grande que controlamos y es mundialmente conocida como la ciudad más poderosa e importante del mundo. Convertir a Nueva York en nuestra sede del poder demostraría al mundo que no somos solo un grupo militante desorganizado, sino los legítimos aspirantes a ser los sucesores del antiguo gobierno americano. Muchos en nuestro cuerpo de oficiales también han señalado que Nueva York es mucho más grande que Boston y muy fácil de defender gracias al interminable laberinto de enormes rascacielos que la conforman. Sea cual sea la ciudad que elijamos, Washington será la siguiente."
 ptf.24.a: "Boston."
 ptf.24.b: "Ciudad de Nueva York."
 ptf.25.t: "Destrucción de Times Square"
 ptf.25.d: "Tras la toma de Nueva York por parte del Frente Patriota, Thomas Rousseau ordenó a la organización comenzar a limpiar la ciudad de arte y monumentos neoliberales y corporativos, como parte de un esfuerzo por desmercantilizar la cultura americana. El esfuerzo fue inmenso, ya que prácticamente toda la ciudad estaba llena de simbolismo y estructuras degeneradas, pero tras un gran esfuerzo, los equipos de demolición de la organización finalmente llegaron a Times Square.\n\nPrimero, los edificios que rodean la plaza fueron ocupados y despejados de francotiradores, ya que se habían encontrado con ellos en múltiples ocasiones, incluso después de que el enemigo se hubiera rendido en Nueva York, intentando traicioneramente continuar su guerra de aniquilación contra el pueblo americano, al servicio de sus malvados amos globalistas. El propio Thomas Rousseau estuvo presente para pronunciar un discurso en Times Square antes de su destrucción, acusando al lugar de representar un consumismo desalmado en nombre de una élite cosmopolita desarraigada que durante décadas había envenenado y destruido la cultura americana, reemplazándola con una cáscara degenerada y estéril. Tras su discurso, la plaza fue despejada y demolida con abundantes explosivos de alta potencia. El evento se grabó y transmitió en vivo para que todo el mundo lo viera."
 ptf.25.a: "La cultura americana no será herramienta para las élites parasitarias."
 ptf.26.t: "El movimiento neoespartano"
 ptf.26.d: "El Frente Patriota siempre ha sido un movimiento que enfatiza la fuerza, el honor y la necesidad de una juventud fuerte, libre de vicios materialistas y hedonismo. Con la brutal Segunda Revolución Americana, muchas personas han desarrollado una profunda conexión con el espíritu guerrero de nuestros antepasados, adquiriendo una comprensión más profunda del legado que dejaron.\n\nNumerosas personas se han unido a Will2Rise, liderada por Robert Rundo, una facción que promueve un estilo de vida que busca conectar con este ethos guerrero. Se refieren a su ideología como Espartanismo Nacional, abogando por una sociedad guerrera militarista para evitar que América sucumba a la debilidad y la sumisión a las élites corruptas.\n\nA lo largo de nuestra campaña, Will2Rise y los espartanistas han demostrado ser una fuerza de combate excepcionalmente eficaz, mostrando una dedicación inquebrantable a la causa. El escepticismo y el desprecio iniciales que los rodeaban se han disipado, y ahora son considerados miembros leales del Frente Patriota."
 ptf.26.a: "Solo tienen un camino por recorrer."
 ptf.27.t: "Apoyo bielorruso"
 ptf.27.d: "Ante el creciente ensañamiento del conflicto en América, hemos comenzado a solicitar más apoyo extranjero para nuestra causa. El Gobierno de Bielorrusia ha respondido a la petición y recientemente ha comenzado a enviar equipo militar y asesores al Frente Patriota. Estos asesores, en su mayoría técnicos, ayudan a operar el nuevo equipo enviado al FP.\n\nBielorrusia también ha enviado varias unidades de voluntarios, incluyendo varias docenas de soldados de las fuerzas especiales. Si bien el envío de asesores técnicos al Frente Patriota para capacitar a las unidades en el manejo de equipo militar no nos sorprendió especialmente, el envío de voluntarios de combate fue una grata sorpresa. Algunos miembros de nuestra organización han especulado que Bielorrusia está enviando unidades de combate a América para que adquieran experiencia en combate y se preparen para futuros conflictos en Europa. Independientemente de las especulaciones internas de nuestros combatientes y personal, nos complace el apoyo."
 ptf.27.a: "Su apoyo es muy bienvenido."
 ptf.28.t: "Voluntarios chetnik"
 ptf.28.d: "Recientemente, hemos recibido a numerosos combatientes voluntarios Chetnik de Serbia y la República Srpska. Al parecer, los voluntarios pertenecen a diversas organizaciones nacionalistas y criminales serbias con las que Robert Rundo, alto comandante del Frente Patriota y fundador de RAM, contactó durante su exilio en Serbia. Muchos de los voluntarios han solicitado explícitamente ser puestos bajo su mando.\n\nEl equipo y las armas de los combatientes Chetnik no son de alta tecnología ni muy avanzados -en su mayoría AK47 y antiguos fusiles de asalto del Pacto de Varsovia y de Yugoslavia-, pero los voluntarios han compensado su falta de equipo avanzado o de alta calidad con lealtad y una férrea dedicación a nuestra causa. Muchos de estos Chetniks también tienen experiencia reciente en combate en el Donbás, y algunos incluso en las guerras de Bosnia y Yugoslavia. En nuestra organización corren rumores de que varios de los voluntarios eran antiguos miembros de los Tigres de Arkan y otros infames grupos militantes nacionalistas serbios. Agradecemos enormemente su apoyo, que sin duda nos ayudará a derrotar a los tiranos corruptos que han ocupado nuestra nación durante tanto tiempo."
 ptf.28.a: "El exilio de Rundo dió sus frutos."
 ptf.29.t: "La otra conexión italiana"
 ptf.29.d: "En la mayoría de los casos, cuando el Frente Patriota recibe una oferta de apoyo o voluntarios, la organización la acepta con gusto. Todos en el frente saben que necesitarán todo el apoyo nacional e internacional posible para lograr sus aspiraciones revolucionarias; después de todo, la Revolución Americana probablemente habría fracasado sin el apoyo de los reinos francés y prusiano. Sin embargo, por primera vez en mucho tiempo, el Frente Patriota ha recibido una oferta de apoyo que muchos en la organización preferirían rechazar. Al parecer, la Cosa Nostra, también conocida como la mafia americana, se había ofrecido a apoyar al Frente Patriota, con un miembro como intermediario. Ofrecieron que la Cosa Nostra apoyaría al Frente Patriota en cualquier medida necesaria para que la organización lograra la victoria en la guerra civil, bajo unas simples condiciones. Las dos condiciones principales son que se les dé plena libertad en muchas de sus actividades y que el Frente Patriota ofrezca un indulto a todos los asociados de la Cosa Nostra y a quien lo requiera.\n\nLa oferta resulta realmente atractiva para muchos miembros del Frente Patriota, ya que pueden ayudar a pacificar a las bandas locales y organizaciones criminales que se han aprovechado de la situación. La Costra Nostra aún cuenta con una red relativamente amplia de socios y funcionarios corruptos en puestos y conexiones de cierta influencia a nivel mundial.\n\nAlgunos también han señalado que permitir la entrada de miembros conocidos de la Mafia en nuestras filas podría perjudicar la legitimidad de la organización, tanto a nivel nacional como internacional, y probablemente sería difícil de justificar públicamente. Además, la Italia fascista de Mussolini destruyó con éxito la Mafia, y tenemos la oportunidad de hacerlo ahora mismo, considerando que tenemos a la mayoría de sus líderes bajo custodia.\n\nEn última instancia, es obvio para todos los involucrados que una decisión tan importante como esta solo puede ser tomada por el propio líder."
 ptf.29.a: "La mafia son parásitos chupasangre. ¡Elimínenlos!"
 ptf.29.b: "Necesitamos toda la ayuda y el apoyo posibles."
 ptf.30.t: "Disturbios en Rikers Island"
 ptf.30.d: "La Prisión de Rikers Island, el infame centro de detención de Nueva York, se ha visto envuelta en un motín masivo mientras continúa la Segunda Guerra Civil Americana. La prisión, ya superpoblada y con escasos recursos, es ahora escenario de caos y violencia, con reclusos tomando el control de varios bloques de celdas y enfrentándose a los funcionarios penitenciarios. Se dice que la situación dentro de la prisión llegó a su punto álgido cuando un grupo de reclusos, envalentonados por la agitación exterior, se alzó. Los disturbios pronto se extendieron por todo el centro, con incendios, toma de rehenes del personal y enfrentamientos entre reclusos en un intento de controlar la situación. Las autoridades han tenido dificultades para contener los disturbios, y se ha llamado al Ejército Continental para ayudar al personal penitenciario, que se encuentra asediado. A pesar de sus mejores esfuerzos, la situación sigue siendo inestable y aún se desconoce la magnitud de los daños y las víctimas.\n\nLos disturbios en Rikers Island se han visto exacerbados por la Segunda Guerra Civil Americana, que ha puesto a prueba la infraestructura y los recursos del país. El conflicto en curso ha dificultado a las autoridades mantener el orden en la prisión, ya que tienen la tarea simultánea de combatir a los insurgentes armados y mantener la seguridad pública en la ciudad de Nueva York. El caos en Rikers Island es un reflejo de la agitación generalizada que afecta a Estados Unidos. Mientras el país continúa desgarrado por profundas divisiones políticas y sociales, la situación en sus prisiones y centros de detención es un microcosmos del desorden que ha envuelto a la nación.\n\nMientras las autoridades trabajan para restablecer el orden en Rikers Island, surgen preguntas sobre el futuro de la prisión y del sistema de justicia penal del país en su conjunto. La Segunda Guerra Civil Americana continúa dejando un rastro de destrucción a su paso, sin que se vislumbre un fin al caos y al conflicto."
 ptf.30.a: "¡Estos animales deben ser eliminados!"
 ptf.31.t: "Jefe del ejército"
 ptf.31.d: "."
 ptf.31.a: "Michael Di Lorenzo."
 ptf.31.b: "Robert Rundo."
 ptf.32.t: "Reconstruir la derecha americana"
 ptf.32.d: "El conservadurismo moderno, si es que se le puede llamar así, no ha logrado conservar nada más que las obligaciones con los oligarcas corporativos y la continua tiranía sobre el pueblo americano. Los pocos patriotas dentro de los partidos republicanos fueron constantemente reprimidos y atacados por el establishment. Esos patriotas, al igual que muchos otros americanos en el ocaso de la Antigua República, se habían abierto camino hasta nuestro movimiento.\n\nLas dos fuerzas emergentes dentro de la derecha actual son el populismo y el reaccionarismo. La plataforma populista aboga por la servidumbre del Gobierno al pueblo y a los intereses de los de abajo, en lugar del elitismo de los de arriba. Además, argumentan que la corrupción y el nihilismo nacional fueron la fuerza impulsora del declive del régimen anterior, creyendo que una vanguardia revolucionaria del pueblo debe ser la fuerza impulsora del Gobierno. Mientras que la plataforma reaccionaria, cree que el declive de América comenzó con el estallido de la guerra de Secesión, afirmando que el declive cultural y el modernismo fueron la causa raíz de todos los problemas que enfrentaba América. Muchos teóricos del grupo no solo abogan por un Gobierno más grande y una mayor centralización, sino que consideran al pueblo americano parte del problema, y la democracia en su conjunto es responsable de su declive.\n\nEn última instancia, la pregunta sigue siendo qué fuerza debemos apoyar. Apoyar a una en lugar de a otra no la consolidará ni la destruirá; sin embargo, servirá como punto de referencia para la dirección y el futuro de la Causa."
 ptf.32.a: "Reaccionario."
 ptf.32.b: "Populista."
 ptf.33.t: "Cuestión de los sindicatos"
 ptf.33.d: "."
 ptf.33.a: "Abolir los sindicatos."
 ptf.33.b: "Sindicalizar el trabajo americano."
 ptf.34.t: "Militarización de los Boy Scouts"
 ptf.34.d: "."
 ptf.34.a: "Esto no es un estercolero tercermundista."
 ptf.34.b: "La agogé en Esparta iniciaba a los 12. Hoy, vuelve."
 ptf.35.t: "Neoclasicismo"
 ptf.35.d: "Las ciudades americanas han estado en el corazón del desarraigo de nuestro país. De hecho, todo el fenómeno de la destrucción liberal de nuestra cultura comenzó con el movimiento arquitectónico \"modernista\". Lo que una vez fueron exhibiciones de belleza y espíritu fueron arrasadas en favor de bloques sin alma, sin estilo ni sustancia. Altas monstruosidades de vidrio y acero construidas por corporaciones tecnocráticas. Las fachadas de vidrio y minimalistas reflejan la sociedad nihilista en decadencia que ensombrecen. El trabajador se vio visceralmente afectado por este entorno.\n\nEl neoclasicismo eleva al hombre, inspirando grandeza y orgullo para el presente, a la vez que ofrece guía y estabilidad desde el pasado. Nada es más sagrado que la tradición de nuestros antepasados. Junto con la belleza del neoclasicismo, nos permite honrar y continuar el legado de los antiguos cimientos que inspiraron nuestra civilización para las generaciones venideras. Nuestros hijos admirarán con asombro estas obras de arte, y también los suyos."
 ptf.35.a: "Nuestros antepasados estarían orgullosos."

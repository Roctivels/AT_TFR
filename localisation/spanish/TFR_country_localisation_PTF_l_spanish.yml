 ptf.145.t: "Circunstancias geopolíticas desafortunadas"
 ptf.145.d: "Una gran tragedia ha golpeado tanto a nuestra causa como a la civilización tal como la conocemos. El mundo europeo occidental ha caído ante fuerzas hostiles, privándonos de algunos aliados clave que esperábamos tras nuestro éxito en Norteamérica. Sin embargo, esto no significa que estemos condenados a una fatalidad segura.\nCon la caída de Occidente, China y Rusia han asumido una posición de renovada prominencia en el escenario internacional. Si queremos mantenernos, y a América, en la posición de poder a nivel internacional, es fundamental que cooperemos con estas nuevas potencias. Si bien existen muchas diferencias políticas y de valores entre nosotros, eso no significa que no podamos llegar a un acuerdo con ellos. China y Rusia tienen una firme convicción en la preservación de sus culturas e identidades nacionales frente a la podredumbre globalista; es algo que valoramos profundamente. Por mucho que diferimos, es muy posible que podamos intentar unirnos en torno a estos pocos valores comunes y sacar algo provecho de ello.\nNuestras propuestas iniciales han suscitado hasta ahora reacciones positivas de Rusia y China. Sus ministerios de Asuntos Exteriores han comentado que acogen con satisfacción la invitación a la cooperación y coexistencia pacíficas. También nos han felicitado por deshacernos de organizaciones y pequeños estados de preguerra que eran hostiles a sus intereses, especialmente los Gobiernos rivales de Biden y Trump. Sus medios de comunicación estatales han cambiado su mensaje, pasando de restarnos importancia a elogiarnos tácitamente por nuestra diplomacia internacional, lo cual es una buena señal del sentir de su élite gobernante. Se estima que nuestra nueva cooperación seguirá mejorando moderadamente en los próximos años.\nAlgunos podrían reprendernos por \"vendernos\", pero tales decisiones de cooperación son todo lo contrario. Si queremos sobrevivir y prosperar en este nuevo orden global, debemos establecer mecanismos que garanticen nuestro éxito. Es imposible nombrar un estado que no lo haya hecho a lo largo de la historia de la humanidad."
 ptf.145.a: "La realpolitik puede ser útil, incluso para nosotros."
 ptf.146.t: "¿Quiénes somos?"
 ptf.146.d: "¿Qué es una nación? ¿Quiénes somos? Estas son algunas de las preguntas que han respondido innumerables civilizaciones a lo largo de la historia de la humanidad. Todas las naciones que surgieron de la nada y consolidaron su lugar en la historia tenían algo en común: habían arraigado firmemente en la mente de todos quiénes eran como pueblo. Las naciones cuya identidad se forjó con mentiras y fraudes, o se diluyeron tanto que se perdieron a sí mismas, cayeron en decadencia. Evitaremos que este país se deslice aún más hacia un destino tan terrible. América necesita redescubrir lo que hace de América la nación que es.\nDurante demasiado tiempo, nuestra identidad se ha diluido y se ha visto sumida en la confusión y la histeria. La identidad nacional americana se ha arruinado bajo el disfraz de conceptos tan elogiosos como la \"diversidad\" y la \"igualdad\". El mayor daño se ha causado en las últimas décadas, ya que su globalismo e internacionalismo han amplificado la erosión de nuestra conciencia nacional, que ya estaba latente en aquel momento. Estamos aquí para cambiar todo eso.\nAl salir al mundo de las llamas de la guerra en Norteamérica, nuestra mente y corazón estarán en el lugar correcto. Ya no tendremos histeria ni confusión que les dé a nuestros enemigos extranjeros la oportunidad de sembrar el caos en nuestras filas. Ya no podrán usar los trucos y las artimañas que lograron en innumerables ocasiones con la América de antes de la guerra. Tanto el pueblo americano como el resto del mundo deben conocer nuestra verdadera identidad, no esta falsa fachada forjada por los globalistas de Washington. Esta nación fue moldeada y esculpida por los hijos de la gran tradición europea occidental. Washington, Hamilton, Jefferson, Franklin; ¿eran estos un grupo de homosexuales de piel morena? ¡No! América se consolidó como nación bajo la tradición europea anglosajona. América fue una potencia poderosa bajo este linaje. Volverá a ser poderoso bajo esta sagrada herencia. Esta será una verdad que todo el mundo deberá respetar, les guste o no."
 ptf.146.a: "¡Una nación renacida!"
 ptf.147.t: "Más allá del mar"
 ptf.147.d: "Si bien somos un movimiento por América, también debemos reconocer que en esta gran lucha por los EE.UU., Europa también debe formar parte de ella. América no nació ni creció en un vacío civilizatorio total. Somos producto de la herencia, la cultura y la sangre europeas. Occidente se alzará no solo cuando se reclame no solo a América, sino también a Europa bajo una idea y un movimiento unificados. Ahora que hemos asegurado el poder en una América recuperada, es hora de conectar con Europa y comenzar a cumplir nuestro destino.\nNuestro objetivo no será el de las armas ni la conquista, sino la diplomacia y la propaganda. Movilizaremos a nuestros diplomáticos y otros representantes para que visiten los principales Estados europeos y mejoren nuestras relaciones con ellos. Esperamos que nuestros llamamientos y negociaciones acerquen a estas importantes naciones europeas a nosotros en posiciones geopolíticas y políticas clave. Así como el régimen americano de antes de la guerra utilizó la diplomacia para aliar a Europa con sus objetivos transatlánticos, nosotros también invertiremos una cantidad similar de personas y recursos para aliar a Europa con nuestra causa. Países como Alemania, España, Italia, el Reino Unido, Francia y otros sin duda apreciarán nuestros esfuerzos por reafirmar una relación transatlántica, especialmente ante el resurgimiento de China y Rusia. Y lo más importante, movilizaremos a nuestros activistas, medios de comunicación y otros aliados o socios afines en Europa para promover nuestras ideas y organizaciones en toda Europa. Si sus líderes no quieren aliarse con nosotros, quizás sus ciudadanos nos apoyen más. Nuestro mensaje de \"Reclamar América\" no solo se escuchará en EE.UU., ¡sino también en toda Europa!\n¡Ojalá que, con nuestros esfuerzos de difusión, podamos cumplir nuestro gran plan de unir al mundo occidental bajo nuestra protección!"
 ptf.147.a: "¡Dos continentes, una lucha!"

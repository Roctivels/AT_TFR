 PTF_second_continental_army1_idea: "Segundo Ejército Continental"
 PTF_second_continental_army_idea: "Segundo Ejército Continental"
 PTF_second_continental_army1_idea_desc: "\n\n\n\n£GFX_PTF_Banner_2nd_Rev\n\n\n\n\n\nPor fin ha llegado el momento: la América bajo el control de los rojos y los globalistas ha caído, y la Segunda Revolución comenzará donde comenzó la primera: Nueva Inglaterra. Adoptando la estética y el aspecto visual de los primeros revolucionarios, el Frente Patriota está listo para librar una cruenta guerra para §Preclamar América§!, cueste lo que cueste."
 PTF_second_continental_army_dynamic: "Segundo Ejército Continental"
 PTF_second_continental_army_dynamic_desc: "\n\n\n\n£GFX_PTF_Banner_2nd_Rev\n\n\n\n\n\nPor fin ha llegado el momento: la América bajo el control de los rojos y los globalistas ha caído, y la Segunda Revolución comenzará donde comenzó la primera: Nueva Inglaterra. Adoptando la estética y el aspecto visual de los primeros revolucionarios, el Frente Patriota está listo para librar una cruenta guerra para §Preclamar América§!, cueste lo que cueste."
 PTF_rogue_forces_idea: "Fuerzas rebeldes"
 PTF_rogue_forces_idea_desc: "Los acontecimientos extraordinarios conducen a situaciones extraordinarias. Una amplia coalición de derecha, dividida en múltiples facciones, busca salvar a una nación que antaño fue grandiosa. Aunque mayoritariamente unido, el Frente Patriota carece de una cadena de mando y disciplina adecuadas, lo que resulta en que las órdenes se ignoren con frecuencia. Esto nos dificulta implementar las políticas establecidas por el alto mando y aprovechar al máximo nuestros recursos."
 PTF_political_cornucopia_idea: "Cornucopia política"
 PTF_political_cornucopia_idea_desc: "\n\n\n\n£GFX_PTF_Banner_Tragedy_of_Rousseau\n\n\n\n\n\nEl Frente Patriota experimentó la mayor parte de su crecimiento en el período previo al colapso de la antigua República, absorbiendo a personas de todos los ámbitos que se sentían abandonadas por el establishment. Sin embargo, políticamente hablando, ahí es donde termina la unidad. Lo que comenzó como un grupo activista nacionalista blanco se ha convertido ahora en una estética que une a todas estas facciones. La mayoría busca el liderazgo en su propia cohorte, en lugar del propio Rousseau. En general, no existe una ideología coherente; con la excepción de algunos ideales, el Frente Patriota carece de una visión y un objetivo definidos más allá de las facciones establecidas."
 PTF_political_cornucopia_dynamic: "Cornucopia política"
 PTF_political_cornucopia_dynamic_desc: "\n\n\n\n£GFX_PTF_Banner_Tragedy_of_Rousseau\n\n\n\n\n\nEl Frente Patriota experimentó la mayor parte de su crecimiento en el período previo al colapso de la antigua República, absorbiendo a personas de todos los ámbitos que se sentían abandonadas por el establishment. Sin embargo, políticamente hablando, ahí es donde termina la unidad. Lo que comenzó como un grupo activista nacionalista blanco se ha convertido ahora en una estética que une a todas estas facciones. La mayoría busca el liderazgo en su propia cohorte, en lugar del propio Rousseau. En general, no existe una ideología coherente; con la excepción de algunos ideales, el Frente Patriota carece de una visión y un objetivo definidos más allá de las facciones establecidas."
 PTF_american_glory_reborn_idea: "Gloria americana renacida"
 PTF_american_glory_reborn_idea_desc: ""
 PTF_tragedy_of_rousseau_idea: "Tragedia de Rousseau"
 PTF_tragedy_of_rousseau_idea_desc: "En 2017, Patriot Front era un servidor de Discord que se separó de Vanguard America. Nadie, ni siquiera el propio Thomas Rousseau, podría haber predicho lo que estaba por venir. Vive una historia casi bíblica, que se desarrolla ante sus ojos, y que lo aterra profundamente. Un joven con apenas edad para beber, a más de mil millas de su hogar y traicionado por muchos de sus camaradas, se encuentra en una situación inimaginable. Lo que comenzó como un servidor de Discord se ha convertido en una importante fuerza política y militar en el noreste de Estados Unidos. Pocos de los que estaban allí al principio siguen aquí, y aún menos conocían la existencia de la organización hace dos años. Ya ni siquiera reconoce los rostros que ve, y algunos no lo reconocen a él. Es solo una figura decorativa en una revolución que clama por un líder. Carece de experiencia militar o política; quienes sí lo reconocen cuestionan su posición y a menudo se resisten a responder ante su autoridad. Sus puntos de vista y objetivos están desdibujados, y parece que su creación lo ha olvidado. Su destino es una incógnita."
 PTF_economic_instability_idea: "Inestabilidad económica"
 PTF_economic_instability_idea_desc: "Desde la toma de Connecticut, nos hemos enfrentado a un grave problema que ha obstaculizado nuestra capacidad para despegarnos de la región: la inestabilidad económica. Como era de esperar, las instituciones financieras globales, los bancos y los activos corporativos ya han abandonado el estado tras nuestra liberación, con los avariciosos capitalistas aterrorizados ante el surgimiento de un movimiento dispuesto a combatirlos donde más importa. Como parásitos, nos han chupado durante un siglo y ahora se han llevado consigo la mayor parte de nuestra economía. Esto ha generado diversos problemas, debilitando nuestra base industrial y la eficiencia de la producción. Ahora es deber de todo patriota reconstruir América desde cero, defendiendo nuestra fuerza laboral y revitalizando el corazón de la economía nacional."

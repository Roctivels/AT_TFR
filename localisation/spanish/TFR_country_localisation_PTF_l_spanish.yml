l_spanish:
 PTF_blood: "Sangre"
 PTF_blood_desc: "Antes de la Segunda Guerra Civil, nuestra organización era principalmente un grupo activista. Sin embargo, en respuesta a los disturbios nacionales y las fallas del gobierno, se consideró necesario comenzar a militarizar nuestro grupo. Ahora que la autoridad federal ha colapsado en Nueva Inglaterra, estamos listos para enfrentar a nuestros enemigos en el campo de batalla. Armados con arsenales militares y propietarios privados, nuestras milicias marcharán por Nueva Inglaterra y la recuperarán de nuestros enemigos. Sin embargo, eventualmente será necesario reformar la estructura de milicias de nuestro ejército. Hacerlo garantizará que podamos oponernos a los federalistas."
 PTF_spread_our_propaganda: "Difundir nuestra propaganda"
 PTF_spread_our_propaganda_desc: "La palabra \"propaganda\" puede sonar sucia, pero la habilidad de nuestra organización para difundir nuestro mensaje fue lo que nos permitió ser el grupo más conocido de la derecha disidente en América. ¡Ahora debemos trasmitir nuestro llamado a las armas a la nación para atraer a más gente a nuestro gobierno para pelear por una nueva América!"
 PTF_a_new_minutemen: "Nuevos Minutemen"
 PTF_a_new_minutemen_desc: "Durante la Revolución de las Trece Colonias, se decía que las milicias estaban tan preparadas que podían estar listas para la batalla en un instante. ¡Debemos tener esta velocidad y preparación; nuestra supervivencia depende de ello! Se formarán milicias en nuestros territorios y se las entrenará en las tácticas que los patriotas usaron hace tantos años."
 PTF_the_boston_offensive: "Ofensiva de Boston"
 PTF_the_boston_offensive_desc: "Boston, antaño una ciudad próspera que representaba la cúspide del orgullo y la cultura americana, se nos ha sido arrebatada. El Frente de Hierro, una variopinta coalición de liberales y comunistas antiamericanos, se ha apoderado de la ciudad y sus alrededores. Sus venenosos tentáculos amenazan con extenderse por toda Nueva Inglaterra y corromperla con sus ideas traicioneras. Marcharemos con nuestros ejércitos por las calles de Boston tal y como nuestros antepasados lo hicieron contra los británicos durante la guerra de la Independencia. No tendremos piedad, y los demonios serán exorcizados de la ciudad sagrada de una vez por todas. Y una vez que hayamos terminado, Boston recuperará su antigua gloria."
 PTF_target_the_common_man: "Buscar al hombre común"
 PTF_target_the_common_man_desc: "El Frente Patriota nació de hombres y mujeres comunes que vieron a través de la fachada del gobierno americano y soñaron con algo más grande. Ha llegado el momento de que todos tomen las armas y sirvan a su Dios, su nación y su familia, para que podamos ser verdaderamente libres."
 PTF_target_dissatisfied_veterans: "Buscar a veteranos frustrados"
 PTF_target_dissatisfied_veterans_desc: "Si bien el apoyo popular es importante, no nos dará la victoria. Lo que necesitamos es gente que sepa luchar. Muchos veteranos en América no comparten el sentimiento neoliberal del gobierno anterior y se avergüenzan de la nación por la que lucharon. Debemos demostrarles que su servicio no fue en vano y que aún existe un país que vale la pena salvar."
 PTF_stabilize_frontlines: "Estabilizar el frente"
 PTF_stabilize_frontlines_desc: "Para librar una guerra prolongada, es necesario contar con un frente estable, que facilite el desplazamiento de hombres y suministros y facilite la organización. Acabaremos con los combates esporádicos y las tácticas de ataque relámpago, y utilizaremos métodos de combate más avanzados."
 PTF_for_the_nation_against_the_state: "Por la nación, contra el Estado"
 PTF_for_the_nation_against_the_state_desc: "Durante gran parte del siglo XXI, el mayor enemigo del pueblo americano ha sido el propio Estado. Los Gobiernos que antes defendían al pueblo ahora solo buscan enriquecerse, ignorando las necesidades de quienes votaron por ellos. Esto se hizo más evidente con el inicio de la Segunda Guerra Civil, cuando los Gobiernos estatales no lograron impedir que grupos armados como los Anarquistas de Green Mountain y los Hijos de la Libertad se apoderaran por completo de Vermont y Nuevo Hampshire. A medida que nuestras fuerzas limpian Nueva Inglaterra, rectificaremos estos flagrantes fracasos. La justicia será rápida y no habrá piedad para los avariciosos. Si no están con nosotros, están contra nosotros."
 PTF_better_dead_than_red: "Antes muertos que rojos"
 PTF_better_dead_than_red_desc: "Al igual que el resto de América, Nueva Inglaterra no se libró del creciente caos de la Segunda Guerra Civil. Anarquistas, libertarios, milicias étnicas, todos estos grupos aprovecharon el caos de la Guerra Civil para establecer sus feudos. Difunden sus nocivas ideas comunistas, libertarias y nacionalistas étnicas, todas ellas incompatibles con nuestro movimiento. Si queremos preservar la santidad de nuestra revolución, debemos aplastar a estos grupos lo antes posible. Demostraremos al pueblo que sus supuestos liberadores no son más que falsos idealistas. Nuestra solución es la solución de Nueva Inglaterra. Y quien no esté de acuerdo, está en nuestra contra."
 PTF_international_volunteers: "Abrirnos a voluntarios internacionales"
 PTF_international_volunteers_desc: ""
 PTF_expand_training_camps: "Expandir campamentos de Will2Rise"
 PTF_expand_training_camps_desc: ""
 PTF_prioritize_veteran_recruitment: "Priorizar reclutar veteranos"
 PTF_prioritize_veteran_recruitment_desc: "No hay mejor grupo demográfico para reclutar que aquellos que ya han servido. Realizaremos una campaña de propaganda dirigida a los veteranos para que podamos contar con un ejército más experimentado."
 PTF_crusaders_for_a_new_america: "Cruzados por una nueva América"
 PTF_crusaders_for_a_new_america_desc: "América está perdida. Sus líderes rechazan el mismo patriotismo que lo forjó. Constantemente, se descuidan con las corporaciones y los globalistas, mientras ignoran deliberadamente las necesidades de las personas a las que han jurado proteger y servir. Pero con nosotros, las cosas serán diferentes. La gente ya no pasará hambre. Ya no estarán desempleados ni sin hogar. Como los cruzados, marchamos para recuperar América de las manos de los traidores. Nuestro país está siendo envenenado, y no podemos quedarnos de brazos cruzados y permitir que siga envenenándose. Si no reivindicamos el manto de América, entonces uno de nuestros enemigos lo hará."
 PTF_scrape_toghether_an_airforce: "Reunir una fuerza aérea"
 PTF_scrape_toghether_an_airforce_desc: "La sugerencia de construir una fuerza aérea ha sido objeto de burla por parte de algunos, pero aún la consideramos una inversión valiosa. Forjaremos una Fuerza Aérea con lo que tengamos, y aunque quizá no sea la mejor, por ahora tendrá que ser suficiente."
 PTF_small_arms_requisition_program: "Requisar armas ligeras"
 PTF_small_arms_requisition_program_desc: "América es una nación única en lo que respecta a la posesión privada de armas de fuego. La Segunda Enmienda, promulgada por nuestros antepasados, permite la posesión de armas por parte de la ciudadanía. Muchos fanáticos de las armas han usado esto como excusa para acumular armas de fuego, no solo civiles, sino también militares. Nuestro movimiento necesita armas y las necesita ya. Finalmente, se ha considerado necesario iniciar una requisición masiva de armas de fuego a propietarios privados. Si bien esto puede ser controvertido, en última instancia es un mal obligatorio. Además, si no se alistan, aún pueden ser un activo para nuestra revolución."
 PTF_an_elite_officer_corps: "Cuerpo de oficiales de élite"
 PTF_an_elite_officer_corps_desc: "A lo largo de su existencia, las fuerzas armadas americanas se han caracterizado por la brillantez estratégica de su cuerpo de oficiales. A diferencia de otras naciones, nuestros oficiales son muy flexibles en el campo de batalla, lo que nos permite ganar incluso en los escenarios más difíciles. Como parte de nuestro plan de reforma del ejército, aplicaremos estas ideas a nuestro cuerpo de oficiales. Si bien seguirán necesitando acatar las órdenes del alto mando, otorgarles mayor libertad en el campo de batalla es un cambio necesario. Esto les permite adaptarse más rápidamente y les brinda oportunidades de ascender de rango. Con el tiempo, esto ayudará a convertir al cuerpo de oficiales en la eficiente fuerza de combate que fue para nuestros antepasados."
 PTF_study_new_tactics: "Estudiar nuevas tácticas"
 PTF_study_new_tactics_desc: "La guerra es un juego en constante cambio. Se inventan tácticas, estas se vuelven obsoletas y todo cambia en el campo de batalla. Antes eran soldados que participaban en la guerra de trincheras, derrotando a sus enemigos por desgaste. Ahora, los soldados se enfrentan entre sí fuera del campo de batalla mediante drones y ciberguerra. Si queremos asegurar nuestra supervivencia, debemos adaptarnos a los nuevos tiempos. Abracemos la nueva era de la guerra. Y todo lo que conlleva. Porque la supervivencia en estos tiempos caóticos depende completamente de nuestra capacidad de adaptación."
 PTF_forged_in_fire: "Forjados a fuego"
 PTF_forged_in_fire_desc: "Con el colapso de la Unión, el conflicto es lo único que abunda. A pesar de que exagentes de la ley, veteranos y desertores se unen a las filas, el nuevo minuteman es inexperto. Aun así, hemos logrado un gran éxito al asegurar una base de operaciones y nuevos avances en el frente. Con el tiempo y la experiencia, el ejército se convertirá en el mejor del continente, capaz de enfrentarse a cualquier fuerza de corrupción o bolchevismo que se le presente. Por ahora, debemos trabajar con lo que tenemos y buscar un futuro mejor."
 PTF_construct_a_mechanized_corps: "Construir unidades mecanizadas"
 PTF_construct_a_mechanized_corps_desc: "Nos encontramos solos, rodeados de Goliats. Ejércitos equipados con equipo y vehículos mucho mejores que los nuestros. Para sobrevivir, debemos alcanzarlos, por lo que comenzaremos a organizar unidades de infantería mecanizada para poder competir."
 PTF_call_for_mass_mobilization: "Llamar una movilización en masa"
 PTF_call_for_mass_mobilization_desc: "Como en 1776, nuestra nueva revolución es fundamentalmente una revolución popular. Nuestro movimiento también nació de personas que sentían la disolución del gobierno federal. Nuestras victorias en Nueva Inglaterra han atraído a más gente a nuestra causa. Es natural que permitamos que estos patriotas entusiastas se unan a nuestra causa revolucionaria. Algunos argumentarán que es mejor mantener protocolos estrictos y aceptar solo a los mejores. Sabemos la verdad. La revolución no estará completa hasta que demos la bienvenida a las masas de patriotas deseosos de luchar a nuestro lado. Y la movilización masiva es el primero de muchos pasos hacia este objetivo."
 PTF_establish_strict_training_protocols: "Entrenamientos estrictos"
 PTF_establish_strict_training_protocols_desc: "A diferencia de las revoluciones pasadas, las tácticas de oleadas humanas simples no funcionan en la era de la guerra avanzada. Tanques, drones, bombas de racimo, todo esto y más convertiría cualquier ataque frontal en una masacre. Nuestra causa exige lo mejor de lo mejor de nuestros soldados. Si nuestros hombres quieren derrotar a los soldados del ejército de la Unión, se deben implementar regímenes de entrenamiento más estrictos. Nuestros soldados deben ser guerreros, aprender a acertar sus tiros y defenderse del enemigo. Con el tiempo, los reclutas se convertirán en guerreros, y estos guerreros marcharán por toda América, derrocando a los gobernadores y autócratas e izando nuestra bandera por encima de la nación."
 PTF_lessons_from_ne: "Aprender de Nueva Inglaterra"
 PTF_lessons_from_ne_desc: ""
 PTF_use_our_fanaticism: "Usar nuestro fanaticismo"
 PTF_use_our_fanaticism_desc: "Puede que nos superen en número y en armas, ¡pero esto no importa! Nuestra pasión y determinación son armas más poderosas que cualquier flota o ejército de la Tierra. Inculcaremos un profundo fanatismo en los corazones de nuestros hombres, y resultará ser una mejor inversión que cualquier inversión material. ¡El triunfo de la voluntad traerá una nueva era!"
 PTF_american_blitzkreig: "Blitzkrieg americana"
 PTF_american_blitzkreig_desc: "Para ganar las batallas del futuro, debemos aprender de las batallas del pasado y adaptar estas lecciones a las circunstancias en las que nos encontramos. Aprenderemos de las tácticas Blitzkrieg de la Wehrmacht y las usaremos para cubrir grandes franjas de tierra en América rápidamente y para abrumar a nuestros enemigos antes de que puedan disparar un tiro."
 PTF_the_rousseau_line: "La línea Rousseau"
 PTF_the_rousseau_line_desc: ""
 PTF_rebuiling_federal_bases: "Reconstruir bases federales"
 PTF_rebuiling_federal_bases_desc: ""
 PTF_vanguard: "Vanguardia"
 PTF_vanguard_desc: "América está envenenada. El establishment liberal lucha con uñas y dientes para destruir tradiciones arraigadas en nuestra historia. Incluso los conservadores se avienen a los intereses corporativos y al hiperconsumismo mientras afirman querer preservar las tradiciones americanas. El inicio de la Segunda Guerra Civil nos ha brindado una oportunidad única. Como nuestros antepasados en 1776, tomaremos las armas para derrocar a los tiranos y déspotas. Bajo el mando de Thomas Rosseau, nuestro ejército marchará de costa a costa. Liberales, conservadores, comunistas, todos serán aplastados bajo nuestro poder. Bajo nuestra bandera, América resurgirá, libre de las ataduras del establishment y la élite."
 PTF_a_big_tent_party: "Una nueva Columbia"
 PTF_a_big_tent_party_desc: ""
 PTF_invite_traditionalist_thinkers: "Líderes de la nueva América"
 PTF_invite_traditionalist_thinkers_desc: ""
 PTF_a_new_fascism: "Un nuevo fascismo"
 PTF_a_new_fascism_desc: "Fascismo: la ideología más incomprendida de Occidente. Incluso después de la liberación, los disidentes en nuestro territorio aún no comprenden las virtudes de estos ideales; los ideales que les permitirán recuperar América. Para tener alguna posibilidad de atraer a las masas, el fascismo debe renacer. Renacer para sostener los valores que hicieron de América la nación más grande del mundo, conservando al mismo tiempo la esencia del fascismo."
 PTF_loosen_ideological_requirements: "Reconstruir la derecha americana"
 PTF_loosen_ideological_requirements_desc: " "
 PTF_reasses_the_republic: "Reevaluar la República"
 PTF_reasses_the_republic_desc: "Una revolución es un momento de gran reestructuración, y esto también aplica a nuestra forma de gobierno. Debemos evaluar el sistema y los valores republicanos y ver si realmente se alinean con los del Frente Patriota."
 PTF_chairman_rise: "De pie para el presidente"
 PTF_chairman_rise_desc: "."
 PTF_appeal_to_the_white_worker: "Empoderar al hombre americano"
 PTF_appeal_to_the_white_worker_desc: ""
 PTF_ensure_military_loyalty: "Asegurar lealtad militar"
 PTF_ensure_military_loyalty_desc: ""
 PTF_depoliticize_the_military: "Despolitizar el ejército"
 PTF_depoliticize_the_military_desc: ""
 PTF_purge_subsersive_elements: "Purgar elementos subversivos"
 PTF_purge_subsersive_elements_desc: ""
 PTF_unite_the_dissident_right: "Unir la derecha disidente"
 PTF_unite_the_dissident_right_desc: "Dentro de nuestro movimiento, la lucha interna es intensa. Muchos grupos disidentes, como los confederados y otros, buscan deformar nuestro movimiento y convertirlo en algo que ni siquiera puede llamarse \"patriótico\", y todos ellos luchan por reformar nuestra revolución. Esto es insostenible; para apaciguar a estos disidentes, debemos unirlos pacíficamente."
 PTF_americas_salvation: "Salvación de América"
 PTF_americas_salvation_desc: "¡Por fin ha sucedido! Cada segundo de la bota liberal pisoteándonos el cuello, cada momento en que los globalistas abusaron de nuestro país y cada vez que aquellos que tenían demasiado miedo de ver la verdad se rieron de nosotros, condujeron a este preciso momento. Ya no permitiremos que nuestra gran nación sea intimidada. Ya no interferirán las élites europeas con nuestros recursos. Ya no permitirán que quienes se dedican a la justicia social hundan a nuestro país en una mayor degeneración. Todo gracias a Rousseau, la bandera de las facciones ondea en lo alto de nuestra capital. Millones han sido liberados. Y ahora, comienza el verdadero trabajo."
 PTF_transfer_power_to_congress: "Transferir el poder al Congreso"
 PTF_distribute_the_manifesto: "Distribuir el manifiesto"
 PTF_distribute_the_manifesto_desc: "Para que una revolución triunfe, tanto el público como el partido deben conocer sus ideales y su programa político. Nos esforzaremos por difundir nuestro manifiesto. Nos aseguraremos de que nuestras palabras sean escuchadas por todos los que puedan escuchar."
 PTF_intensify_the_white_struggle: "Intensificar la lucha fascista"
 PTF_intensify_the_white_struggle_desc: ""
 PTF_second_constitutional_convention: "La Segunda Convención Constitucional"
 PTF_second_constitutional_convention_desc: ""
 PTF_ideological_propoganda: "Propaganda ideológica"
 PTF_ideological_propoganda_desc: ""
 PTF_expand_the_partys_role: "Expandir el rol del Partido"
 PTF_expand_the_partys_role_desc: "El papel del Partido no tiene por qué ser exclusivamente político. Puede manifestarse en todas las facetas de la vida y, al hacerlo, se integrará en la vida social y familiar de la gente tanto como en su vida política."
 PTF_class_collaborationism: "Armonía de clases"
 PTF_class_collaborationism_desc: ""
 PTF_our_manifest_destiny: "Nuestro destino manifiesto"
 PTF_our_manifest_destiny_desc: ""
 PTF_patriotic_democracy: "Salve al jefe"
 PTF_patriotic_democracy_desc: ""
 PTF_honor_the_senate: "Honrar al senado"
 PTF_honor_the_senate_desc: ""
 PTF_all_american_boy_scouts: "Boy Scouts panamericanos"
 PTF_all_american_boy_scouts_desc: ""
 PTF_safeguard_our_democracy: "Salvaguardar nuestra democracia"
 PTF_safeguard_our_democracy_desc: ""
 PTF_safeguard_our_nation: "Salvaguardar nuestra nación"
 PTF_safeguard_our_nation_desc: ""
 PTF_state_of_the_union: "Estado de la Unión"
 PTF_state_of_the_union_desc: ""
 PTF_soil: "Suelo"
 PTF_soil_desc: "América fue una vez la principal potencia industrial del mundo. Nuestras fábricas produjeron los camiones que ayudaron a salvar al Ejército Rojo del colapso. Nuestras granjas salvaron a Gran Bretaña de la hambruna. Ahora, estas fábricas, otrora florecientes, se dejan oxidar y deteriorar mientras el establishment deslocaliza la industria americana a China, solo porque es \"más barata\". Las fábricas de Nueva Inglaterra ya no permanecerán inactivas. Nuestro esfuerzo bélico exige munición, y la gente exige alimento. Nueva Inglaterra volverá a ser un floreciente centro industrial y comercial, proporcionando el combustible tan necesario para nuestra campaña por la seguridad de América."
 PTF_national_revival: "De rodillas al primer cónsul"
 PTF_national_revival_desc: ""
 PTF_denounce_the_church: "Moralidad de hombre y conducta"
 PTF_denounce_the_church_desc: ""
 PTF_fight_factionalism: "Combatir al faccionalismo"
 PTF_fight_factionalism_desc: "El Frente Patriota ha llegado a agrupar a gran parte de la derecha disidente americana. Desde nacionalistas blancos hasta conservadores descontentos, muchos se han unido bajo nuestra bandera, cada uno con sus propias ideas sobre cómo hacer política. Debemos asegurarnos, ante todo, de que todos trabajen juntos por el bien de la nación y unidos bajo una visión común."
 PTF_one_nation_one_solution: "Una nación, una solución"
 PTF_one_nation_one_solution_desc: "El pueblo americano ha sido condenados a las fieras. En toda nuestra destrozada nación, oportunistas, pandillas y extremistas afirman ser los salvadores del pueblo, pero nosotros conocemos la verdad. Nuestra solución es la solución nacional. Solo nosotros recuperaremos a Estados Unidos y salvaremos a su pueblo de la condenación. No hay lugar para la misericordia ni para el compromiso. Si no estás con nosotros, estás contra nosotros. Solo nosotros somos la salvación de América. Solo nosotros somos el futuro de América. Bajo el liderazgo de Thomas Rousseau, nuestra venganza se ejecutará sobre nuestros enemigos, y no descansaremos hasta que solo nosotros hayamos salido triunfantes."
 PTF_form_the_national_front: "Formar el Frente Nacional"
 PTF_form_the_national_front_desc: "Desde la manifestación \"Unite the Right\" en 2017, nuestra organización ha forjado vínculos simbólicos con diversos grupos nacionalistas en toda América. Estas conexiones nos permitieron forjar amistades con grupos como el MNS y la Liga del Sur. A medida que la Guerra Civil se desvanecía en el caos, era hora de que la derecha americana se uniera de nuevo. Con una alianza con el MNS, coordinaremos ofensivas conjuntas contra Biden. Y a medida que nos expandimos por todo el país, nuestra alianza se fortalecerá aún más al apoyar a otros grupos nacionalistas."
 PTF_operation_scipio: "Operación: §YESCIPIÓN§!"
 PTF_operation_scipio_desc: "La Unión de América, la supuesta \"América verdadera\", la representación misma del establishment y la élite neoliberales. Sus ideas perniciosas se han extendido demasiado, y sus intentos de erradicar los cimientos mismos de las tradiciones americanas deben cesar. Nuestros soldados y tanques marcharán sobre Washington D.C. Los tiranos serán derribados de sus torres de marfil. No habrá piedad para los liberales e izquierdistas traidores. El pueblo será salvado de sus ideas demoníacas, Washington recuperará su gloria pasada. El Congreso ya no será un lugar de disputas, ya no será un lugar donde se aprueben leyes antiamericanas. Washington será salvado, o será incendiado."
 PTF_operation_leonidas: "Operación: §YLEÓNIDAS§!"
 PTF_operation_leonidas_desc: "Alguna vez una de las regiones más prósperas de América, el Cinturón Industrial es ahora solo una sombra de lo que fue. A pesar de su naturaleza ruinosa, los radicales siguen desgarrando su cadáver en descomposición. Pandillas, oportunistas y el MNS. Todos siguen llevando a la ruina esta región, antaño próspera, mientras que la gente está abandonada. No nos quedaremos de brazos cruzados ni permitiremos que esta terrible injusticia continúe. El antaño duro golpe del poderío industrial americano resurgirá. Nuestra venganza se estrellará como una gran ola contra los buitres. Nadie se salvará de nuestra justa venganza. Y mientras marchamos, salvaremos al pueblo de la decadencia, de una vez por todas."
 PTF_operation_alexander: "Operación: §YALEJANDRO§!"
 PTF_operation_alexander_desc: "Trump representa todo lo malo de la derecha americana moderna. Aunque afirma ser un defensor de la fe y los valores familiares, busca abiertamente el apoyo de las corporaciones y fomenta el consumismo desmedido. Él y sus seguidores de MAGA han convertido el otrora brillante corazón de América en un lugar de promesas abandonadas y sueños rotos. Los valores que una vez impulsaron a los americanos a asentarse en el oeste se abandonan día a día en favor de las falsas promesas de un hombre que afirma ser el salvador de América. Esto ya no será así. Mientras marchamos, derribaremos a Trump y a sus falsos profetas. El corazón del país latirá una vez más, el pueblo se salvará y la verdadera Arcadia será restaurada."
 PTF_operation_pompey: "Operación: §YPOMPEYO§!"
 PTF_operation_pompey_desc: "Si bien California siempre ha sido un caldo de cultivo de degenerados, el estallido de la Segunda Guerra Civil solo lo ha puesto aún más de manifiesto. Surgido del área de la Bahía, el EPLA representa todo lo que buscamos aplastar. Sus soldados oprimen al ciudadano común mientras difunden su demoníaca retórica marxista. Sus comisarios privan a la gente de libertades fundamentales en nombre de la \"revolución\". Permitieron la libre entrada a potencias comunistas como China e incluso Corea del Norte, permitiendo que su influencia se extendiera como una plaga incurable. Marcharemos sobre California y exorcizaremos estos demonios de una vez por todas. No habrá piedad, no se aceptarán acuerdos, y la idea misma del comunismo será arrojada una vez más al mar, junto con quienes la apoyan."
 PTF_unify_nationalist_militaries: "Unificar ejércitos nacionalistas"
 PTF_unify_nationalist_militaries_desc: "A pesar de nuestros recientes esfuerzos por colaborar más estrechamente con el MNS, seguimos divididos. Si permitimos que esto continúe, nuestra inevitable guerra con la Unión se verá plagada de problemas y nos conducirá inevitablemente a la destrucción. Para evitarlo, comenzaremos a unificar nuestros ejércitos bajo una única estructura de mando conjunto. Esto nos permitirá compartir inteligencia y coordinar ataques con nuestros aliados en Míchigan. Además, nos permitirá coordinar ofensivas una vez que comencemos nuestro asalto contra Biden, lo que nos permitirá evitar que nuestras ofensivas se estanquen."
 PTF_coordinate_nationalist_economies: "Coordinar economías nacionalistas"
 PTF_coordinate_nationalist_economies_desc: "La economía es la base de cualquier alianza sólida, y esto es muy cierto en nuestra situación. Si bien Nueva Inglaterra no posee mucha capacidad industrial, no se puede decir lo mismo de nuestros aliados en Míchigan. Si bien la mayor parte de la industria de Míchigan se ha deteriorado, si se revitaliza, será muy beneficiosa para nuestra lucha. Si bien esto también nos ayudará a nosotros y a nuestros aliados de Míchigan a prepararnos para la guerra contra Biden, también contribuirá a consolidar aún más nuestra alianza. Fomentando un profundo sentido de hermandad que no se ha visto en la derecha americana desde 2017. Nos mantendremos unidos, listos para liberar América de sus opresores."
 PTF_our_southern_brethern: "Nuestros hermanos del sur"
 PTF_our_southern_brethern_desc: "Originaria de Arkansas, la Liga del Sur (LdS) ha sido aliada de Thomas Rousseau durante mucho tiempo. A medida que nuestro frente nacionalista se expande por América, es natural que extendamos una invitación a nuestro aliado de siempre. Su ingreso a nuestra alianza no solo nos abrirá un frente completamente nuevo, sino que también nos permitirá acabar con los remanentes federalistas en el sur profundo. Por supuesto, está el problema de su deseo de independencia total del sur, pero eso se puede abordar una vez que la guerra haya concluido."
 PTF_the_dark_horse: "El caballo oscuro"
 PTF_the_dark_horse_desc: "Representando los aspectos más extremos de la ultraderecha americana, la División Atomwaffen tuvo una sangrienta campaña de conquista en Florida. A pesar de ello, buscan con entusiasmo unirse a nuestro pacto nacionalista, a pesar de la reputación que se han forjado. Aunque pueda resultar controvertido, no podemos negarles su solicitud de colaborar. Su apoyo nos beneficiará a largo plazo, ya que su conocimiento de la guerra asimétrica es innegable. Sin embargo, independientemente de los beneficios, los vigilaremos de cerca, ya que no podemos confiar plenamente en James Mason y sus lacayos."
 PTF_empower_canadian_nationalists: "Empoderar nacionalistas canadienses"
 PTF_empower_canadian_nationalists_desc: "Aunque lo parezca, no somos enemigos de Canadá. Al igual que América, Canadá es una tierra de patriotas bajo la opresión de un establishment neoliberal. El liderazgo de Canadá, especialmente Justin Trudeau, ha hundido a la otrora próspera nación. Si bien hemos formalizado vínculos con varios grupos nacionalistas canadienses, es hora de aprovechar estas conexiones. No solo para exponer la corrupción enconada del régimen de Trudeau, sino también para mantener a Canadá a raya mientras realizamos los preparativos finales para invadir a Biden."
 PTF_lessons_from_new_england: "Aprender de Nueva Inglaterra"
 PTF_lessons_from_new_england_desc: "Si bien nuestra conquista de Nueva Inglaterra fue rápida, no estuvo exenta de complicaciones. La naturaleza desorganizada de la estructura de nuestro ejército provocó desorganización en nuestros momentos más difíciles. Con las heridas de nuestras conquistas aún frescas, queda mucho por hacer. Nuestras experiencias se utilizarán para implementar las reformas necesarias en nuestro ejército y reestructurar la estructura de mando. También debemos reconsiderar nuestra dependencia de las milicias y otros aspectos de la guerra de guerrillas. Aunque algunos se quejen de estos cambios, son, en última instancia, necesarios si queremos tener la oportunidad de derrotar a los ejércitos federalistas."
 PTF_form_the_oia: "Formar la OAI"
 PTF_form_the_oia_desc: "Toda revolución tiene sus enemigos, y la nuestra no es la excepción. Muchos en Nueva Inglaterra se oponen abiertamente a nuestras ideas, considerando nuestros valores \"fascistas\" y \"antiamericanos\". Aunque nuestra revolución aún es joven, no podemos permitir que sea usurpada por oportunistas y traidores externos. La creación de una agencia de inteligencia, conocida como la Oficina de Asuntos Internos, nos ayudará con este problema. Con la OAI, los traidores y terroristas serán exterminados de una vez por todas. Además, los enemigos en nuestras filas también serán purgados. Con la guía de Rousseau, la OAI se convertirá en una fuerza temible. Eliminaremos a nuestros enemigos, tanto internos como externos, y aseguraremos nuestra revolución por muchos años."
 PTF_curate_an_international_image: "Curar una imagen internacional"
 PTF_curate_an_international_image_desc: "Si bien hemos logrado, en gran medida, convencer al pueblo americano, la comunidad internacional sigue siendo escéptica. Si bien algunos países, como Rusia, se han mostrado receptivos a nosotros, enviando voluntarios para luchar por nuestra causa, otros países se muestran más inseguros. Nuestros antiguos aliados de la OTAN nos miran con incertidumbre; algunos incluso nos critican por intentar establecer una \"dictadura fascista\" en América. Debemos demostrar al mundo que no somos sus enemigos, sino sus amigos. Porque en los próximos años, el apoyo extranjero podría ser necesario para la reconstrucción de América."
 PTF_fortify_the_canadian_border: "Fortificar la frontera canadiense"
 PTF_fortify_the_canadian_border_desc: "A pesar de consolidar el control sobre Nueva Inglaterra, nuestra revolución sigue amenazada desde el exterior. Temiendo nuestra causa, los canadienses se han movilizado contra ella. Mientras buscamos una solución pacífica con Truddeu, debemos prepararnos para lo peor. Nuestra frontera con Canadá será reforzada de inmediato, sin importar el costo. Si el ejército canadiense realmente desea aplastar nuestro movimiento, lucharemos hasta el último hombre. Porque nunca nos detendremos ni cederemos. No hasta que nuestra bandera ondee de costa a costa."
 PTF_combat_internal_enemies: "Combatir enemigos internos"
 PTF_combat_internal_enemies_desc: "A pesar de nuestras victorias, nuestros enemigos permanecen en alerta. No solo nos amenazan los enemigos externos, sino también los traidores internos. Radicales dentro de nuestro partido han estado conspirando silenciosamente contra Rousseau desde el comienzo de nuestra revolución. Estos grupos representan una amenaza existencial para la estabilidad de nuestra organización y deben ser combatidos de inmediato. La purga de estos radicales también contará con la aprobación del pueblo. ¿Quién estaría más que feliz de ver a estos radicales aniquilados?"
 PTF_welcome_international_volunteers: "Bienvenidos voluntarios internacionales"
 PTF_welcome_international_volunteers_desc: "Al igual que nuestros antepasados, que recibieron el apoyo de un régimen simpatizante en Francia, también podemos beneficiarnos del apoyo extranjero. Moscú ha sido, hasta ahora, nuestro mayor apoyo, con la llegada masiva de voluntarios nacionalistas para apoyar nuestra causa. Si bien este apoyo ha sido útil, aún no lo hemos aprovechado plenamente. Llamaremos al mundo entero. Llamaremos a los patriotas de todo el mundo a tomar las armas en apoyo nuestro. Si bien este apoyo será mínimo comparado con el que reciben nuestros enemigos, demuestra que todavía hay quienes están dispuestos a apoyarnos, cueste lo que cueste."
 PTF_anti_partisan_warfare: "Guerra antipartisana"
 PTF_anti_partisan_warfare_desc: "A pesar de nuestra victoria relativamente fácil, algunos enemigos evitaron nuestra venganza. Estos grupos rondan Nueva Inglaterra como un cáncer, asaltando y sembrando el caos dondequiera que van. Si no les hacemos frente, estos partisanos se convertirán en una espina clavada. Con la autorización de Rousseau, la OAI se desplegará junto con el ejército para dar caza a estos grupos partisanos. Tomaremos todas las medidas necesarias para acabar con estos rebeldes. Su continua actividad amenaza con descarrilar nuestros planes. Una vez que los hayamos controlado, nuestros planes podrán seguir adelante sin oposición."
 PTF_strength_of_spirit: "Fuerza del espíritu"
 PTF_strength_of_spirit_desc: "Somos los sucesores de los padres fundadores. Imbuidos por los mismos objetivos que ellos tenían: liberar a los americanos de la tiranía. Y como los revolucionarios de antaño, nuestra determinación y espíritu son tan fuertes como el acero. Nada nos detendrá en nuestra justa cruzada. Que se sepa que nuestras tropas no flaquearán, no fracasarán, pues nuestra voluntad de lucha es indestructible comparada con la de nuestros enemigos. Enorgullezcámonos de nuestra fuerza espiritual. Que nos guíe a la victoria como guió a Washington hace muchos años. Nuestra lucha será desafiante, pero guiados por el recuerdo de los patriotas del pasado, marcharemos de costa a costa. Y no descansaremos hasta que América sea salvado de los demonios."
 PTF_legacy_of_victory: "Legado de victoria"
 PTF_legacy_of_victory_desc: "Desde 1775 hasta hoy, el ejército de EE.UU. fue el que ha guiado a América a la victoria una y otra vez. Desde Yorktown hasta Iwo Jima, el ejército siempre nos ha guiado a la victoria sin importar las adversidades. Si bien nuestra estructura actual de milicia ha funcionado bien en combates caóticos y desorganizados en Nueva Inglaterra, debe reformarse. Debemos priorizar la transición de nuestras milicias a unidades de combate organizadas. Estas reformas nos permitirán tener más posibilidades de vencer a los ejércitos federales, más organizados."
 PTF_spirit_of_1776: "Espíritu de 1776"
 PTF_spirit_of_1776_desc: "Al igual que nuestra guerra de la Independencia en 1776, nuestra nueva Revolución Americana se construye sobre las espaldas de las milicias revolucionarias. Con América sumida en combates brutales y desorganizados, la guerra asimétrica es el futuro. Como parte de nuestro plan de reforma del ejército, consolidaremos la estructura flexible de milicias. Priorizar un estilo de guerra flexible y orientado a las milicias permitirá a nuestro ejército adaptarse sobre la marcha y aprovechar los puntos débiles de las defensas enemigas."
 PTF_exorcise_the_spectre: "Exorcizar el espectro"
 PTF_exorcise_the_spectre_desc: "Un espectro se cierne sobre América. Si bien antes nuestro enemigo eran los soviéticos, ahora nuestra mirada se ha posado en China. Es evidente que la influencia china se extiende por toda la sociedad americana, ya sea a través de redes sociales como TikTok o de productos baratos y de producción en masa. La influencia de China se percibe en todas partes. A medida que nuestra cruzada moral se expande, estos fantasmas deben ser exorcizados a toda costa. Al igual que McCarthy, expondremos a los traidores comunistas ante el público americano. Exponiéndolos por sus crímenes contra el pueblo americano. Consolidando nuestro papel como los verdaderos liberadores de América y su pueblo."
 PTF_evolve_american_warfare: "Evolucionar la guerra americana"
 PTF_evolve_american_warfare_desc: "La evolución es constante en la guerra. Tácticas, armas, doctrinas... nada permanece igual durante la guerra. La Segunda Guerra Civil no es la excepción a esta regla. Las milicias marchan por las ciudades, librando brutales combates casa por casa. Las prósperas calles de América están ahora llenas de minas y alambradas, convirtiendo cada avenida y cuadra en su propia tierra de nadie. En esta lucha, los grupos surgen y caen a diario. Y si no queremos ser los siguientes, debemos adaptarnos a los nuevos tiempos. Evolucionar nuestra forma de luchar no solo es necesario para ser nuestros enemigos, sino también para asegurar nuestra supervivencia."
 PTF_jacksons_militias: "Milicias de Jackson"
 PTF_jacksons_militias_desc: "El legado de Andrew Jackson, uno de los padres fundadores más populares, perdura hasta nuestros días. Su labor durante la guerra de la Independencia y la posterior guerra de 1812 consolidó su legado como genio estratégico. Su labor como el primer populista americano consolidó el apoyo de muchos, especialmente cuando comandó la milicia de Tennessee durante la defensa de Nueva Orleans. En estos tiempos difíciles, lo miramos como inspiración. Su legado y sus victorias nos guiarán hacia la victoria. Al marchar del Atlántico al Pacífico, liberaremos a América en su nombre."
 PTF_refined_strategic_mentality: "Refinar la mentalidad estratégica"
 PTF_refined_strategic_mentality_desc: "A lo largo de su historia, el ejército de América ha empleado una amplia gama de tácticas y doctrinas. Desde la guerra de trincheras hasta la era del tanque. Incluso en la era moderna de la ciberguerra y los ataques con drones, el ejército americano siempre ha estado a la vanguardia de la innovación doctrinal. Si queremos mantenernos al día con el resto del mundo, la innovación en el ejército es necesaria. Con nosotros al mando, la brillantez estratégica del Ejército se revitalizará. Nuestros enemigos volverán a temer el sonido de los aviones americanos en el cielo. Y recuperaremos nuestro lugar como la fuerza militar dominante."
 PTF_pattons_saber: "Sable de Patton"
 PTF_pattons_saber_desc: "La guerra moderna ha experimentado cambios drásticos, pero algo se ha mantenido constante: el tanque es el rey del campo de batalla. En América abundan los genios militares que han aprovechado al máximo su potencial. Ya sea MacArthur en Corea o Patton en Francia, los tanques se han utilizado para convertir derrotas inminentes en reñidas victorias. Si bien el tamaño actual de nuestro ejército de tanques es pequeño, no es débil. Con la toma de armerías federales y complejos industriales, podemos convertir nuestra pequeña flota de tanques en una fuerza a tener en cuenta. Como una marea de acero, tomaremos toda América. Como una ola de acero, nos vengaremos de nuestros enemigos y sacaremos al pueblo del estancamiento."
 PTF_symphony_of_speed_and_steel: "Sinfonía de velocidad y acero"
 PTF_symphony_of_speed_and_steel_desc: "Antes, los ejércitos marchaban durante días hasta un lugar, ahora pueden llegar en cuestión de horas. Con la evolución de las tecnologías bélicas, los ejércitos pasaron de marchar a pie a transportarse mediante modernos VCI y transportes de infantería. La Segunda Guerra Civil demostró la necesidad de velocidad y acero por encima de todo. Por toda América, aviones y bombarderos surcan el cielo. Mientras grandes oleadas de tanques chocan en las grandes llanuras del Medio Oeste. Estos dos elementos, trabajando en perfecta armonía, pueden ser la salvación o la destrucción de una nación. Por suerte, serán nuestra salvación y las herramientas para la liberación de América."
 PTF_revere_rides_again: "Revere vuelve a cabalgar"
 PTF_revere_rides_again_desc: "Paul Revere es ampliamente reconocido como héroe de la Revolución Americana. Aunque ya no esté, vive a través de nosotros. Si bien nunca combatió contra los británicos, su ayuda se percibió de otra manera. Su cabalgata a medianoche advirtió a los Hijos de la Libertad de la repentina movilización del ejército británico. Su ayuda fue fundamental para que los revolucionarios se enfrentaran a los casacas rojas en los campos de batalla de Lexington y Concord. Ahora, como Revere, cabalgamos para liberar a América de sus tiranos. Bajo el liderazgo de Rousseau, la liberación será rápida y nuestra venganza se ejecutará sin vacilación."
 PTF_reign_in_militia_commanders: "Controlar a comandantes milicianos"
 PTF_reign_in_militia_commanders_desc: "Nuestra estructura actual de milicia es, en el mejor de los casos, desorganizada. Y, en el peor, caótica. Si bien en teoría tenemos un mando centralizado, la realidad es más compleja. Los comandantes de milicia afirman ser leales a Rousseau, pero ignoran directamente las órdenes directas. Con frecuencia, estos comandantes desleales solo buscan enriquecerse, participando en saqueos masivos de viviendas abandonadas y obligando a civiles renuentes a unirse a sus filas. Esto ya no se tolerará. No hay lugar en nuestra revolución para estos especuladores. Degradar o purgar a los comandantes corruptos no solo beneficia a la población, sino que también nos permite un mayor control de la estructura de mando de la milicia."
 PTF_one_nation_against_invasion: "Una nación, contra la invasión"
 PTF_one_nation_against_invasion_desc: "América, tal como está, está bajo asedio. Enemigos, tanto internos como nacionales, han aprovechado la debilidad del gobierno federal para difundir sus ideas degeneradas. El liberalismo, el progresismo, el comunismo; todas estas ideas se han propagado por todo el país. Han contaminado muchos aspectos de la sociedad americana, han lavado el cerebro a patriotas que una vez fueron leales y han puesto a los jóvenes en contra de sus padres. Con nosotros, esto ya no será así. Estas ideas degeneradas serán arrojadas al infierno, y el verdadero patriotismo americano se enaltecerá una vez más."
 PTF_our_forest_fighters: "Nuestros combatientes del bosque"
 PTF_our_forest_fighters_desc: "Antaño un símbolo popular de la resistencia antisoviética en los países bálticos, los Hermanos del Bosque se enfrentaron a las fuerzas imperialistas y soviéticas con brutales tácticas de guerrilla. Atacando con rapidez y desapareciendo en el bosque, se forjaron una reputación de feroz fuerza de combate. A pesar de su destrucción en 1956, sus tácticas aún se pueden replicar hoy. Las tácticas de ataque relámpago, combinadas con la espesura de los bosques de Nueva Inglaterra, nos permitirán atacar al enemigo donde más le duele: explotando puntos débiles, saboteando centros de suministro y desgastando al enemigo para que pueda ser superado por nuestro ejército principal."
 PTF_the_new_minutemen: "Los nuevos Minutemen"
 PTF_the_new_minutemen_desc: "Durante la guerra de la Independencia, las milicias civiles organizadas fueron las primeras en combatir a los británicos. Estas milicias contribuyeron decisivamente al debilitamiento de los británicos durante años de guerra de guerrillas, lo que finalmente condujo a su rendición en Yorktown. Si bien nuestras milicias actuales han conquistado Nueva Inglaterra con éxito, han estado compuestas por miembros del partido y reclutas renuentes. Permitir la formación de nuevas milicias civiles ayudará a reforzar nuestro ejército y a obtener el apoyo de las comunidades recién conquistadas. Estas milicias cubrirán las carencias de personal y nos brindarán mayores posibilidades de éxito en nuestra planeada liberación de América."
 PTF_recruit_among_the_common_man: "Recluta entre el hombre común"
 PTF_recruit_among_the_common_man_desc: "Los jóvenes varones americanos nunca han estado tan desvinculados de su nación. Muchos años de condescendencia gubernamental con las feministas radicales han llevado a que el gobierno federal las vilipendie abiertamente. Pero mientras el establishment las rechaza, las recibimos con los brazos abiertos. Su insatisfacción con el orden americano actual es precisamente la razón por la que muchos ya se han unido a nuestro movimiento."
 PTF_recruit_among_dissatisfied_veterans: "Reclutar entre veteranos insatisfechos"
 PTF_recruit_among_dissatisfied_veterans_desc: "Los valientes veteranos de América nunca han experimentado tanto ostracismo como este. Años interminables de lavado de cerebro y complacencia por parte del gobierno federal han convencido a muchos de que el ejército es una fuerza al servicio del \"imperialismo\". Si bien el gobierno por el que lucharon con tanta valentía los rechaza, los recibimos con los brazos abiertos. El desprecio que muchos veteranos sienten por el régimen liberal nos ha brindado la oportunidad perfecta para incorporar hombres con experiencia en combate a nuestro Segundo Ejército Continental."
 PTF_mechanize_the_second_continental_army: "Mecanizar el Segundo Ejército Continental"
 PTF_mechanize_the_second_continental_army_desc: "Con la victoria viene la recompensa, ¡y el Segundo Ejército Continental no es ajeno a la victoria! Recibimos reservas de equipo, a veces un goteo, a veces depósitos enteros. No debemos dormirnos en los laureles ni sentirnos complacientes con el éxito. Si queremos ser los verdaderos herederos de Columbia, debemos convertirnos en una fuerza de combate moderna. Organizaremos el botín en nuevas unidades blindadas de alto impacto que formarán la columna vertebral de la fuerza y aseguraremos que no perdamos nuestro impulso."
 PTF_harbringers_of_a_new_dawn: "Presagios de un nuevo amanecer"
 PTF_harbringers_of_a_new_dawn_desc: "La América de hoy se desvanece. Mientras la luna se desvanece ante el sol naciente, somos el nuevo amanecer de América. Nuestra lucha ha culminado tras muchos años de lucha, codicia y corrupción desenfrenada. Fusionándose en una calamidad de vicio y degeneración. Mientras el resto de América se hunde aún más en la oscuridad, nosotros resurgimos como el nuevo sol de la mañana. Nuestra luz se proyectará sobre América, desterrando la oscuridad al vacío. Traidores de todo tipo arderán en el fuego de nuestra venganza. Pero los patriotas y la ciudadanía oprimida se deleitarán en el calor de nuestra liberación. Abre los ojos, América. La oscuridad se desvanece y la pesadilla finalmente termina."
 PTF_salt_the_earth: "Salar la tierra"
 PTF_salt_the_earth_desc: "Nuestra lucha es eterna. Cualquier medida que deba tomarse, se tomará. A medida que América se hunde aún más en la violencia, la cordura da paso a la barbarie. Las ciudades se convierten en trituradoras de carne, y los soldados luchan por cada casa y apartamento. No debemos quedarnos estancados en interminables combates casa por casa. La revolución debe ser rápida. Debe arrasar América antes de que sus enemigos tengan tiempo de reaccionar. De lo contrario, se desvanecerá en el olvido. Las ciudades serán bombardeadas, quizás incluso borradas del mapa, pero en última instancia es un sacrificio necesario. La reconstrucción llegará eventualmente, pero hoy, la tierra debe ser salada."
 PTF_construct_the_rousseau_line: "Construir la línea Rousseau"
 PTF_construct_the_rousseau_line_desc: "Aunque la Unión de América aún esté en guerra con los constitucionalistas, debemos prepararnos para cualquier posibilidad. Una vez que comience nuestra campaña de liberación, no habrá vuelta atrás. No debemos permitir que un ataque enemigo repentino nos abrume, o seremos aplastados en cuanto comience la guerra. La construcción de un perímetro defensivo, aunque requiere bastante tiempo, garantizará que no nos tomen por sorpresa si la Unión nos ataca por sorpresa. Esta red de defensas nos permitirá defendernos en profundidad contra cualquier fuerza que se nos presente, debilitándolas y preparándonos para contraataques."
 PTF_beauty_in_struggle: "Belleza en la lucha"
 PTF_beauty_in_struggle_desc: "Nuestra batalla contra la podredumbre, las fuerzas de la izquierda, es casi siempre cuesta arriba. Empezamos con nada, solo rifles y la fe en un futuro mejor en nuestros corazones. Hemos perseverado contra viento y marea y, en el camino, nos hemos ganado el corazón de muchos. Mientras los hombres sepan que luchan por el futuro y que, una vez que lleguen a la cima, la batalla estará ganada, ¡conquistarán el infierno y volverán! La victoria es algo natural para el Frente. Lo principal es el largo esfuerzo conjunto en el camino hacia esa victoria."
 PTF_combined_arms_tactics: "Tacticas de armas combinadas"
 PTF_combined_arms_tactics_desc: "Desde nuestros humildes comienzos como milicias llenas de fervor patriótico hasta convertirnos en una fuerza profesional moderna, el progreso ha sido rápido y ha superado con creces las expectativas. No debemos dormirnos en los laureles, y aún hay margen de mejora. Una mejor coordinación entre las fuerzas terrestres y la nueva fuerza aérea minimizará el fuego amigo y maximizará el impacto. Una mejor comunicación entre las unidades terrestres garantizará un aprovechamiento más rápido del éxito. La complacencia es la muerte, ¡y estamos en el negocio de combatirla!"
 PTF_rolling_thunder_program: "Programa \"Rolling Thunder\""
 PTF_rolling_thunder_program_desc: "Con el éxito del programa de mecanización, nos hemos topado con otra debilidad: nuestra falta de poder aéreo digno de mención. Con el rápido avance del Segundo Ejército Continental, aeródromos e antiguas instalaciones de las FF.AA. han caído en nuestras manos. Muchos exmiembros de la Fuerza Aérea han ofrecido sus servicios, junto con pilotos civiles, para contribuir al desarrollo de una Fuerza Aérea propia. Hemos capturado suficientes aviones y piezas intactas para mantener una flota respetable en funcionamiento, pero la necesidad de establecer e iniciar la producción local es primordial. Los hombres ya no estarán sin cobertura aérea, obligados a escabullirse y esconderse como ratas. ¡Pronto los federales probarán su propia medicina de treinta milímetros!"
 PTF_reclaiming_america: "Reclamando América"
 PTF_reclaiming_america_desc: "¿Qué ha pasado con el sueño de los padres fundadores? Los liberales pisotean sus tumbas, tachándolos de esclavistas reaccionarios. Los conservadores venden su alma a las corporaciones mientras rechazan sus deberes con la ciudadanía. Hasta ahora, la gente ha sido abandonada, vendida con falsos sueños utópicos por personas que solo buscan donaciones y votos. Pero esto ya no será así. Mientras marchamos por la nación destrozada, seremos quienes salvemos a la gente. América está rota, pero aún puede ser recuperada. Y lo recuperaremos, incluso si tenemos que matar a todos los que se interpongan en nuestro camino."
 PTF_convene_the_third_constitutional_convention: "La Segunda Convención Constitucional"
 PTF_convene_the_third_constitutional_convention_desc: "Por fin, la victoria es nuestra. Los últimos reductos de milicias han caído, y Nueva Inglaterra está ahora firmemente bajo nuestro control. Al iniciar el proceso de centralización, se plantea la cuestión de nuestro futuro. Al igual que nuestros antepasados, convocaremos una convención constitucional en Independence Hall, Pensilvania, donde se firmó nuestra primera Constitución. Aquí se decidirá el futuro de nuestra República. Además, comenzaremos a centralizar facciones dentro de nuestro partido, garantizando al mismo tiempo que Rousseau mantenga el control absoluto."
 PTF_hail_caesar: "¡Ave, César!"
 PTF_hail_caesar_desc: "En la época de la antigua Roma, hubo un líder fuerte que tomó el control durante una intensa crisis para la república. Hubo un líder que guió a su pueblo hacia una época de esperanza y virtud antes de su fin prematuro. Este líder se llamaba César. Fue un gran conquistador. Fue alguien que condujo a Roma a una época de gran prosperidad. América atraviesa una crisis sin precedentes. Al igual que César, debemos tener un líder singular, Thomas Rousseau, que guíe a América hacia una era de paz y prosperidad bajo la bandera del fascismo."
 PTF_empower_the_youth: "Empoderar a la juventud"
 PTF_empower_the_youth_desc: "Si bien somos un vasto grupo de personas abandonadas por los liberales en Washington, tenemos una base sólida: los jóvenes. En los últimos días de la república, fueron abandonados a su suerte mientras los ancianos seniles se enfrentaban a sus propios egos en el Capitolio. Oprimidos, sin blanca y sin propósito, los jóvenes se sintieron atraídos por nuestra misión de reclamar América. Ahora, en el momento del triunfo, es imperativo darles a los jóvenes lo que se les prometió. Debemos empoderarlos, para permitirles participar en la salvación que nuestro movimiento traerá a los Estados Unidos."
 PTF_manifestation_of_the_american: "Manifestación del americano"
 PTF_manifestation_of_the_american_desc: ""
 PTF_defend_american_labor: "Defender el trabajo americano"
 PTF_defend_american_labor_desc: "Un trabajo organizado y útil es un factor importante para mantener unida a nuestra sociedad. Nuestros trabajadores pueden estar soportando dificultades durante la guerra, pero es solo para su propio beneficio, y por ello deben ser recompensados con lo que dan: más derechos laborales para hoy, pero no para mañana; los fanáticos marxistas no deben tomar el poder, y el americano promedio no debe ser sacrificado."
 PTF_shatter_the_guilded_facades: "Romper las fachadas doradas"
 PTF_shatter_the_guilded_facades_desc: "En nuestro territorio, aún quedan quienes han sido manipulados por las élites: los liberales, los sionistas. Están demasiado ciegos por el veneno que se les ha vertido en los ojos como para ver la verdad que tienen delante. Permanecen ciegos a su opresión debido a este veneno, a esta secuela de su represión. Destruiremos esta fachada cuidadosamente creada por las élites de antaño."
 PTF_restore_the_glory_of_america: "Restaurar la gloria de América"
 PTF_restore_the_glory_of_america_desc: "América supo ser una de las naciones más gloriosas del planeta, especialmente en cuanto a estilo. Edificios como la Casa Blanca y el Congreso son prueba del ingenio americano de antaño. Pero ya no. Mire a su alrededor. Los estilos \"minimalistas\" drenan la vida y el color de la arquitectura, influenciados por sionistas y globalistas para derribar nuestras barreras psicológicas y volvernos serviles. Bajo el mandato de Rousseau, la gloria de América volverá."
 PTF_kneel_to_the_first_consul: "De rodillas al primer cónsul"
 PTF_kneel_to_the_first_consul_desc: "América. Antaño, la nación más grande del mundo, es ahora solo una sombra de lo que fue. Envuelto en una guerra civil y rodeado de enemigos internos, América está lejos de vivir una época dorada. Para evitar las luchas internas que plagaron a esta nación y nos llevaron hasta este punto, debemos implementar una dictadura presidencial. Al igual que en los días del gran conquistador Napoleón, nuestro gran líder, Thomas Rousseau, guiará a América fuera de la crisis y lo conducirá hacia la grandeza."
 PTF_for_the_people_by_the_people: "Para el pueblo, por el pueblo"
 PTF_for_the_people_by_the_people_desc: "Los Estados Unidos de América, una nación que alguna vez sirvió a su pueblo. Pero mírala ahora. El caos reina en las calles, los socialistas campan a sus anchas y los globalistas aún intentan ejercer su influencia sobre esta carcasa podrida. América siempre estuvo destinada a defender a su gente, nuestra revolución está finalmente trayendo de vuelta esta idea y continuará haciéndolo en el futuro tras haber aplastado a nuestros enemigos."
 PTF_ignite_the_masses: "Encender a las masas"
 PTF_ignite_the_masses_desc: "Las masas populares, el público, el combustible de nuestra revolución. ¿Qué se hace con el combustible, como se utiliza? Ellos lo queman, por supuesto. Las revoluciones triunfan por la ira de la gente común contra la injustica, como pasó en la revolución Americana por ejemplo. Las masas populares se unirán bajo la bandera de las fasces, bajo Rousseau."
 PTF_certify_unitary_executive_theory: "Teoría ejecutiva unitaria"
 PTF_certify_unitary_executive_theory_desc: "La teoría del ejecutivo unitario, la que defiende que el poder ejecutivo esté bajo una única autoridad, es la interpretación objetivamente correcta y seguramente es lo que hubiesen querido los padres fundadores. Como organización dedicada a llevar a América a su antigua gloria, sería una equivocación no tomar esta teoría como verdad."
 PTF_rebalance_the_scales: "Reequilibrar la balanza"
 PTF_rebalance_the_scales_desc: "Nuestro movimiento se está tornando alarmantemente en una dictadura. La tiranía sobre la que los padres fundadores nos advirtieron se está acercando rápidamente. Si dejamos que esto continúe, no seremos mejores que los opresores neoliberales de los que nos liberamos. Debemos al menos intentar dar poder al pueblo por cualquier oportunidad para reclamar América como los padres fundadores habrían querido."
 PTF_one_hand: "Una mano"
 PTF_one_hand_desc: "Reclamar América será una tarea difícil. Para aguantar en la tormenta que se avecina, debemos dar al pueblo americano la verdad de la revolución. Con el poder de nuestra organización, nada se interpondrá de nuestro camino. Ni los degenerados liberales quienes desbarataron nuestros valores morales y profanaron nuestra historia, ni los hipócritas conservadores quienes se pondrán a discutir en vez de arreglar la nación, ni los socialistas quienes destruyen nuestro país desde dentro por sus corrosivas ideas de \"justicia social\". Quienes busquen destruir América jamás serán capaces de escapar del puño de hierro de nuestro movimiento."
 PTF_the_next_washington: "El próximo Washington"
 PTF_the_next_washington_desc: ""
 PTF_friendly_neighborhood_minutemen: "Su amigo y vecino Minuteman"
 PTF_friendly_neighborhood_minutemen_desc: "Los minutemen, al igual que sus antepasados, son unos de los soldados más dedicados y valientes que hay en nuestro ejército. Pero por ellos nos enfrentamos ahora a un dilema. ¿Cómo se los presentaremos a los americanos que liberamos? Por un lado, podremos mandarlos al frente. Hacerlos los soldados que están destinados a ser, los soldados que hubiesen querido los padres fundadores. Por otro lado, podremos hacerles parecer grandes liberadores y enviarlos para que realicen ayuda humanitaria pues, después de todo, no podemos recuperar una América con de cadáveres y escombros. La propia identidad de nuestro ejército, y posiblemente la identidad de nuestro movimiento en su totalidad, depende de esta cuestión."
 PTF_promote_oia_dominance: "Dominación de la OAI"
 PTF_promote_oia_dominance_desc: "Como otras muchas revoluciones, la nuestra se enfrenta posiblemente a más enemigos internos que externos. Muchos disidentes dentro de nuestras fronteras, de forma tanto abierta como clandestina, ven nuestro movimiento como, \"anti-americano\". Son demasiado ciegos como para ver la verdad, demasiado adoctrinados por años de opresión que los pisotearon  hasta la saciedad para ver la virtud de nuestra revolución. Por la salvación de América, no podemos permitir que esos parásitos campen a sus anchas en nuestro territorio. La OAI tiene los mayores intereses del pueblo americano en su corazón, y hará bien en detener esas amenazas."
 PTF_cult_of_rousseau: "Culto a Rousseau"
 PTF_cult_of_rousseau_desc: "Thomas Rousseau, el salvador de América. El hombre que sacará a los Estados Unidos del abismo en el que se encontraban durante sus últimos días. El hombre que no se doblega ante los abusadores globalistas, los titiriteros sionistas ni los disidentes socialistas. El hombre que, por sí solo, salvará a América. Rousseau restaurará la grandeza americana, el próximo padre fundador de Estados Unidos."
 PTF_victory_or_death: "Victoria o muerte"
 PTF_victory_or_death_desc: "¡La suerte está echada, no hay vuelta atrás! Incluso con nuestro ascenso, la posibilidad de la derrota siempre está presente. Los soldados deben comprender que cada batalla es una batalla a muerte; no hay lugar para el éxito parcial. Luchamos por el alma de la nación y la derrota es la muerte, para nosotros y para America. En la lucha hasta el final, el hombre con mayor voluntad gana. Venceremos con brío, improvisación y sacrificio. Saldremos victoriosos o moriremos en el intento."
 PTF_monument_to_the_heroes: "Monumento a los Héroes"
 PTF_monument_to_the_heroes_desc: "La reclamación no puede llegar sin grandes sacrificios, y los sacrificios que haremos serán enormes. Muchos de nuestros hijos caerán en combate y, lamentablemente, no hay nada que podamos hacer para evitarlo. Si bien mejorar el acceso a la atención médica ayudará a prevenir bajas innecesarias, no podemos detener todas las muertes. Por lo tanto, debemos encontrar la manera de honrar debidamente a nuestros patriotas caídos. Se erigirán varios monumentos desde Washington D.C. hasta San Francisco. Estos monumentos estarán dedicados a su labor y a los sacrificios que hicieron para salvar a América de la tiranía."
 PTF_party_democracy: "Democracia del Partido"
 PTF_party_democracy_desc: "Dentro de nuestro partido, aún existen muchas luchas internas, especialmente debido a quienes se unieron en los últimos días de Estados Unidos. Para contrarrestar esto, debemos convertir nuestro partido en una democracia como la de la antigua América. Con los más brillantes en la cima, el partido experimentará una estabilidad sin precedentes."
 PTF_reclaim_the_past: "Reclamar el pasado"
 PTF_reclaim_the_past_desc: "Los agitadores socialistas quieren hacer creer a algunos que las colosales tierras de Estados Unidos fueron \"robadas\" por los antiguos héroes de América. Quieren corromper a las masas a las que inculcan odio hacia América y satisfacer sus nefastas necesidades. Esto es absolutamente erróneo; conquistamos esas tierras con nuestra fuerza. Robar es de cobardes; la vieja América no era una América de cobardes."
 PTF_the_american_autocracy: "Autocracia americana"
 PTF_the_american_autocracy_desc: "Thomas Rousseau, el primer gran hombre del siglo XXI. Ha guiado a nuestro país hacia la prosperidad, más que nadie en la historia americana. Ha llevado nuestro movimiento a la grandeza. Si alguien era digno de liderar a América bajo un solo gobierno, ese era él. ¡La primera presidencia imperial será una de gloria, virtud y conquista!"
 PTF_construct_the_party_hierarchy: "Jerarquía del Partido"
 PTF_construct_the_party_hierarchy_desc: "Para preservar la estabilidad de nuestra revolución, debemos reorganizar la jerarquía de nuestra organización. Los más leales deben ser recompensados de forma similar al spoils system de Jackson. Quienes deseen vernos caer en el caos y las luchas internas serán expulsados. Nuestra base será inquebrantable, al igual que nuestro movimiento."
 PTF_a_thousand_voices: "Mil voces"
 PTF_a_thousand_voices_desc: "Estamos rodeados de enemigos por todos lados. Enemigos que desean destruir nuestra organización, enemigos que quieren ver a América arder. Dentro y fuera de nuestro movimiento, mil voces claman por la liberación. Liberación de sus opresores socialistas que restringen cada uno de sus movimientos. Liberación de la bota del liberalismo que les ha aplastado el cuello. La gente de Boston, que ha estado bajo el puño de hierro de estos elementos corrosivos, se está dando cuenta de esto. Así que, ¡levántense, levántense y tomen las armas! ¡Tomen las armas en nombre de Rousseau, en la gloria del fascismo y por el futuro de América!"
 PTF_the_necessary_reforms: "Las reformas necesarias"
 PTF_the_necessary_reforms_desc: "Nuestro movimiento, aunque inherentemente virtuoso, cuenta con ciertas facciones que prefieren ver cómo se queman todos nuestros ideales junto con el resto de la nación. Aquellos que prefieren que nuestro movimiento se convierta en una camarilla corrupta de élites. Si permitimos que estas serpientes se aprovechen de la liberación que hemos brindado, nuestro movimiento arderá en llamas como la república americana que lo precedió. Las reformas que aprobaremos generarán el cambio necesario para evitar que estos elementos tomen el control y conduzcan nuestro movimiento a la degeneración y el caos."
 PTF_the_national_republic: "La República Nacional"
 PTF_the_national_republic_desc: "En sus últimos días, América era una república en ruinas. Una república que no estaba dedicada a servir al público como se pretendía originalmente. No, un Gobierno dedicado a servir a los globalistas, a los liberales del otro lado del charco y a los sionistas. América necesita algo nuevo. Una vez que se calme el polvo, el fascismo hará que América renazca de sus cenizas como un ave fénix."
 PTF_party_of_the_people: "Partido del Pueblo"
 PTF_party_of_the_people_desc: "El Frente Patriota, seguimos dividiendo a los americanos que aún no han experimentado nuestra liberación. Debemos demostrarles lo equivocados que están. Debemos demostrarle al pueblo americano que estamos dedicados a ellos, a diferencia de los socialistas que incendiaron sus hogares, los liberales que sumieron a nuestro país en la degeneración, o los conservadores engañosos que sumieron a nuestro país en el caos con sus disputas insignificantes. Nos mantendremos firmes entre ellos; un movimiento verdaderamente dedicado al pueblo."
 PTF_devotion_to_columbia: "Devotos a Columbia"
 PTF_devotion_to_columbia_desc: "Muchos dentro de nuestra organización afirman ser devotos de nosotros y fingen lealtad para obtener beneficios a cambio. Pero esto no basta; deben estar plenamente dedicados a la idea de América, a lo que significa y a lo que significará una vez que tomemos el control. Como en muchas revoluciones, necesitamos a quienes se dediquen verdaderamente a ella y comprendan las virtudes que traerá; debemos fomentar esta devoción para lograr una América fascista."
 PTF_rehabilitate_american_heroes: "Rehabilitar a héroes americanos"
 PTF_rehabilitate_american_heroes_desc: "Los mayores héroes de América han sido horriblemente vilipendiados por las administraciones anteriores. Quienes odiaban a América querían que nosotros también los odiáramos, para que pudiéramos convertirnos en sus esclavos, esclavos de los globalistas. Jackson, Washington y Adams. Todos son héroes en esta organización, ¡y punto!"
 PTF_promote_civic_engagement: "Promover el compromiso cívico"
 PTF_promote_civic_engagement_desc: "Estados Unidos fue un país construido sobre los ideales de participación ciudadana. En sus últimos días, antes de la Guerra Civil, se construyó sobre la base de la participación de las élites, las personas que causaron tanto daño. Estos ideales se restaurarán a menos que presionemos al público para que participe en la política y se convierta en sus propios jefes."
 PTF_the_enlightened_masses: "Las masas iluminadas"
 PTF_the_enlightened_masses_desc: "Los padres fundadores, los más brillantes de las Trece Colonias, quienes liberaron a esta nación de las garras de la tiranía y la llevaron a la grandeza. Puede que hoy no haya nadie como ellos, pero eso no significa que no pueda volver a haberlos. La sociedad puede formar la próxima generación de padres fundadores; nosotros podemos hacerlo. Las masas volverán a la iluminación, como sus antepasados."
 PTF_national_revival_plan: "Plan de Renacer Nacional"
 PTF_national_revival_plan_desc: "Mientras nuestra nación yace en ruinas, la necesidad de una recuperación económica para impulsar a los verdaderos americanos se agudiza. Debemos erradicar el engaño de la vieja república. El corporativismo, por muy antiguo que sea, es el futuro. El galimatías marxista de la lucha de clases y el disparate neoliberal del Viejo Oriente ya no nos convienen. Solo funciona la cooperación entre clases sociales para el mejoramiento de la nación. Los ricos y los pobres no deberían dejarse sumidos en un caos; deben unirse y luchar contra el verdadero enemigo: los marxistas, los agitadores y los indeseados. Un camino corporativista es el camino americano."
 PTF_american_rescue_plan: "Plan de Rescate Americano"
 PTF_american_rescue_plan_desc: "Ya no podemos permitir que las élites de antaño gobiernen, no podemos permitir que los comunistas influyan en nuestras necesidades y deseos, la economía americana necesita ser rescatada de los escombros y las cenizas que hay debajo, de la sangre que cubrió su cambio, y para eso, debemos tomar el control de la economía y decidir lo que es necesario para la lucha contra los males de las viejas élites y los indeseables, una economía de comando es la única manera de sacar de los escombros a los miserables de América y eliminar a los no deseados, una economía bajo un liderazgo fuerte y para un futuro fuerte."
 PTF_nationalized_banking: "Expropiar los bancos"
 PTF_nationalized_banking_desc: "Una banca independiente es una necesidad para una América fuerte y nacionalista, una América corporativista, no hace mucho tiempo nuestros bancos estaban podridos por las finanzas globales y la infiltración de indeseables, las élites globalistas y los dueños del capital financiero global llorarán al ver sus bancos estatizados, por eso debe hacerse, no se debe permitir que ningún cretino controle el destino de los patriotas y nacionalistas de América, ¡los bancos deben ser estatizados!"
 PTF_reawaken_the_industrial_giant: "Despertar al gigante industrial"
 PTF_reawaken_the_industrial_giant_desc: "La industria americana siempre fue la base de la economía, pero fue abandonada, destripada y dejada pudrirse en oscuros almacenes por las viejas élites, cortándola y vendiéndola por piezas a extranjeros. El colapso fue inevitable desde que se abandonó la industria. No repetiremos ese error, cada industria debe ser reconstruida desde la nada, cada industria destripada debe ser revivida y curada, un nuevo despertar industrial espera a los patriotas de América, como nunca se ha visto."
 PTF_economic_populism: "Populismo económico"
 PTF_economic_populism_desc: "Los americanos siempre han sido la base de la economía, y siempre lo serán, una verdadera economía americana es una economía rígida, basada en sus ciudadanos \"reales\", y en sus estructuras sociales que fueron abandonadas hace mucho tiempo, debemos promover la economía patriota y despertar a la bestia que es nuestra sociedad patriótica, incitarla a un nuevo estruendo de éxito financiero."
 PTF_the_new_american_man: "Nuevo hombre americano"
 PTF_the_new_american_man_desc: "Una nueva América corporativista, necesita un nuevo tipo de hombre, un viejo tipo de hombre que ha sido olvidado por siglos, un hombre cuya fuerza y sólo su fuerza puede cambiar la sociedad, las escuelas bajo las viejas formas han enseñado comunismo, pereza y degeneración, un nuevo currículo para un nuevo hombre debe ser redactado, para que los hombres ocupen su lugar como líderes de sus hogares y los pioneros de su nación, los niños americanos ya no serán el hazmerreír, sino hombres fuertes, soldados del mañana listos para eliminar los males de los elitistas que abrazaron la teoría crítica y los indeseables que los apoyaron."
 PTF_reexamine_the_welfare_state: "Revisar el Estado del bienestar"
 PTF_reexamine_the_welfare_state_desc: "El pueblo americano merece más. Hemos recuperado sus derechos laborales según lo necesario, y ahora la situación exige un análisis de la asistencia social. Los americanos que luchan por su bienestar merecen la ayuda de la nación para apoyarlos en aras de la unidad y la fuerza nacionales. Pero implementaremos una asistencia social nacionalista, lejos de la asistencia social comunista que deterioró la economía de la vieja nación hasta su muerte."
 PTF_revive_classical_culture: "Revivir la cultura clásica"
 PTF_revive_classical_culture_desc: "Una plaga azotó la cultura y la arquitectura americanos en el siglo pasado, una plaga marxista y posmoderna. Una verdadera nación con identidad, una nación construida por el Nuevo Hombre Americano, también debe mantener sus principios corporativistas hasta la médula. Un renacimiento de la arquitectura clásica es imprescindible; si en algo eran buenos aquellos héroes de antaño, era en construir monumentos que perduraran siglos, y la nueva América sin duda perdurará siglos. Basta de brutalismo, basta de modernismo, basta de esa horrible inmundicia marxista. Una verdadera nación es una nación construida sobre pilares de mármol."
 PTF_agricultural_renewal_plan: "Plan de Renovación Agrícola"
 PTF_agricultural_renewal_plan_desc: "La comida es la base de cualquier sociedad, nuestra agricultura descuidada ha dejado las mesas americanas estériles y los estómagos americanos vacíos, esta guerra devastó nuestros campos, y lo que una vez fue sustentable debido al gran volumen, ahora no es más que un refrigerio inútil, la agricultura americana debe reajustarse, reorganizarse y reconstruirse adecuadamente para proveer a los americanos y mantener a flote las empresas americanas."
 PTF_rebuild_the_american_way_of_living: "Reconstruir la forma de vida americana"
 PTF_rebuild_the_american_way_of_living_desc: "Las alimañas convirtieron la vida del americano común en un infierno viviente, la única manera de aliviar eso es una nueva restauración nacional, la reconstrucción debe avanzar a toda velocidad, nada la detenga o la limite, el alma sagrada de la verdadera América reside en esa decisión, la construcción debe continuar, continuar, continuar, persistir y perdurar, no solo estamos recogiendo escombros aquí, estamos haciendo un nuevo hogar de una nación cubierta de cenizas."
 PTF_focus_on_the_consumer_economy: "Centrarse en la economía de consumo"
 PTF_focus_on_the_consumer_economy_desc: "El hierro y la industria en masa pueden construir la base, pero la siguiente fase importante es proveer a los consumidores un mercado de consumo construido por americanos para los americanos, y que no sea el viejo consumismo el que propagó las creencias comunistas entre la nación, el consumismo debe ser un acto de patriotismo, un signo de fuerza y unidad nacional, un orgullo por todo lo que se hace americano."
 PTF_utilize_penal_labor: "Usar trabajos forzados"
 PTF_utilize_penal_labor_desc: "Los comunistas y agitadores a menudo se quejaron y lamentaron de la vieja 13ª Enmienda, pero fue una demostración de fuerza de fuerza nacional, un modelo exitoso al poner a criminales e indeseables a trabajar para beneficiar a la nación, y su espíritu, su voluntad criminal, solo puede romperse y convertirse en algo bueno mediante el trabajo obligatorio, trabajando para nuestra nación y nuestro pueblo."
 PTF_national_rebirth: "Renacer nacional"
 PTF_national_rebirth_desc: "Una nación, renacida, bajo Dios, indivisible, forjada en fuego y acero, purificada por la lucha y la guerra, nuestra nación se levanta de nuevo. Una nación más fuerte, un pueblo más orgulloso, una cultura americana pura, una economía rígida, todo inquebrantable bajo un cielo azul. No debemos regresar a lo que fue, sino construir lo que debe ser."
 PTF_deal_with_the_devil: "Pacto con el diablo"
 PTF_deal_with_the_devil_desc: "Los debates sobre la ayuda exterior continuaron y continuaron, nuestra nación se levanta, pero los golpes no se detienen por parte de nuestros enemigos, tal vez sea hora de llegar a un acuerdo, para el mejoramiento y la unidad de la nación, un trato con el diablo, es un trato al fin y al cabo, pero a diferencia del pasado, no será complaciente, decadente y débil, no permitiremos que un acuerdo así devore nuestra identidad, es un trato para América, no contra ella, una ayuda patriótica, es una que le quita al enemigo, pero no le devuelve nada."
 PTF_social_dividends: "Dividendos sociales"
 PTF_social_dividends_desc: "Lo que la sociedad trabaja, la confianza que deposita en nosotros es una inversión, y un dividendo no es nada raro como forma de pagar, y para nosotros, apuntalará la economía, aumentará el gasto y reconstruirá la gran economía americana, un dividendo a la vez, una compra a la vez, reconstruiremos nuestra oferta, nuestra demanda, dividendo mensual para apuntalar a las familias americanas y construir nuestro futuro lejos de la degeneración demoníaca."
 PTF_revive_new_england_manufacturing: "Reactivar la manufactura en Nueva Inglaterra"
 PTF_revive_new_england_manufacturing_desc: "Nueva Inglaterra fue una vez el corazón palpitante de la industria oriental: molinos, fundiciones, fábricas, almacenes que impulsaron el ascenso de América, pero la traición, la venta y el capital global destruyeron absolutamente lo que una vez fue un gigante industrial y lo convirtieron en una reliquia oxidada, y la guerra solo ha profundizado esa herida, reavivaremos las falsificaciones, construiremos las líneas de ensamblaje, pondremos las manos patrióticas americanas a trabajar, esto no se trata solo de empleos, se trata de la supervivencia nacional."
 PTF_form_the_national_labor_alliance: "Formar la Alianza Nacional del Trabajo"
 PTF_form_the_national_labor_alliance_desc: "Es posible que hayamos descuidado a nuestros trabajadores y empleados mientras se libraba la guerra, y ellos resistieron y deben resistir tanto como sea necesario, pero esto puede tener un costo enorme, necesitamos formar una alianza laboral nacional, lado a lado con la corporación y el gobierno nacional, para tratar de proteger un poco más a los trabajadores, incluso con las principales objeciones corporativas, deben comprender que es un movimiento necesario para revivir la nación y su fuerza laboral, el sudor de un hombre puede derramarse por su nación, pero no siempre puede soportarlo, por eso lo ayudaremos."
 PTF_strong_families: "Familias fuertes"
 PTF_strong_families_desc: "No más acuerdos; la familia americana es nuestro núcleo, nuestra base, una realización de nuestro sueño patriótico, una familia fuerte, significa una América fuerte, y la familia nuclear debe ser protegida a toda costa, las manchas de comunistas y elitistas globales deben purificarse de su propio ser, una nación fuerte es tan fuerte como su familia más débil, y no somos débiles, y nunca debemos serlo."
 PTF_restore_fordism: "Restaurar el fordismo"
 PTF_restore_fordism_desc: "Nuestra capacidad de construir es tan alta como nuestra capacidad de producir y consumir, la vieja y buena América, fue construida sobre el principio fordista de producción en masa, consumo en masa y una industria eficiente, un modelo de producción verdaderamente americano, que sirve al empleado lo mismo que sirve a las corporaciones, y servirá al estado nacional para el mejoramiento de nuestra nación, una industria organizada, disciplinada y nacionalista."
 PTF_embrace_the_corporatist_model: "Abrazar el corporativismo"
 PTF_embrace_the_corporatist_model_desc: "Es hora de adoptar plenamente nuestro modelo corporativista en todos los sectores de nuestra economía, nuestra sociedad y educación; un modelo fascista nacional es el único modelo legítimo y exitoso en la restauración nacional, y ese será nuestro enfoque; cada parte del estilo de vida americano debe integrarse, todo americano puro patriótico debe seguirlo; un Nuevo Hombre Americano sólo puede realizarse bajo una bandera fascista."
 PTF_strong_nation: "Nación fuerte"
 PTF_strong_nation_desc: "Un palo solo es débil, un manojo unido es fuerte, su hacha cortando a sus enemigos y utilizando sus recursos para construir un todo más fuerte, un hogar más seguro, un hogar superior, nuestra nación será fuerte una vez más, con su gente real unida, sus degeneraciones purgadas, su voluntad resuelta."
 PTF_restore_american_academia: "Restaurar la academia americana"
 PTF_restore_american_academia_desc: "La academia fue la columna vertebral de los logros científicos americanos, pero fue manchada por infiltrados marxistas e indeseables con significado malvado; nuestros sistemas deben ser reconstruidos y la inmundicia que destruyó a América debe ser erradicada de su interior; nuestros niños no deben luchar solo para ser educados por un maestro que use la bandera del movimiento; una educación patriótica debe extenderse más allá de la escuela primaria a la secundaria, y debe ser monitoreada y controlada para evitar que la suciedad obstruya las mentes de nuestros niños con ideales erróneos."
 PTF_learn_from_the_past: "Aprender del pasado"
 PTF_learn_from_the_past_desc: "Los grandes hombres construyeron la economía americana, no con manos tímidas sino con puños de hierro y una resolución inquebrantable, desde campos plagados de bárbaros, aprender de ellos es continuar su gloria y avanzar atando su camino dorado al nuestro hacia un nuevo horizonte alejado de la degeneración demoníaca, y hacia una reconstrucción económica continua, que despertará a la bestia americana de la nada, tal como lo ha hecho antes, esto no es solo un renacimiento, sino una continuación del espíritu americano, y dará forma al futuro tal como lo hicieron fielmente nuestros antepasados."
 PTF_embrace_the_future: "Abrazar el futuro"
 PTF_embrace_the_future_desc: "El pasado fue poderoso, pero no invencible. Lo que una vez fue grandioso, es también lo que llevó a este colapso y destrucción. Lo que era un faro para el futuro, se convirtió en un caparazón de corrupción. Nuestros antepasados pudieron haberlo tenido funcionando en ese momento, pero era demasiado fácil de corromper por marxistas demoníacos y globalistas crujientes. Debemos mirar hacia un nuevo futuro, construido por los hombres de hoy para el mañana, no sobre un viejo futuro hecho por hombres del pasado que murieron tan pronto como lo hicieron. El futuro pertenece a los vivos. Debemos construir una nueva economía, no la reconstrucción de un pasado muerto."
 PTF_revive_boston_dynamics: "Revivir Boston Dynamics"
 PTF_revive_boston_dynamics_desc: "Boston Dynamics, una corporación de la vieja América, comprada por extraterrestres y abandonada a su suerte después de la guerra, fue un claro ejemplo de la superioridad americana: robots que se mueven como americanos, que trabajan como estadounidenses; es necesario revivirla, poner a trabajar de nuevo a sus antiguas mentes trabajadoras, para revivir el sector tecnológico nacional americano y ayudar a la economía en su camino hacia la reconstrucción nacionalista."
 PTF_american_renaissance: "Renacimiento Americano"
 PTF_american_renaissance_desc: "La gloria de nuestro pasado corre por nuestra sangre, la pureza, el coraje y el heroísmo de nuestros antepasados llenan nuestras venas, continuamos la gran América de ayer, bajo una nueva bandera fascista, pero una inicialmente intencionada por nuestros grandes padres fundadores, un Renacimiento Americano está por delante."
 PTF_second_american_golden_age: "Segunda Era Dorada"
 PTF_second_american_golden_age_desc: "Una nueva era americana es ahora, limpia de los errores del pasado, una nueva nación para un pueblo puro bajo una bandera nacionalista, bajo una bandera real, nuestra era dorada viene de nuevo, ahora siendo capaz de soportar el marchitamiento, y los problemas causados después de la antigua, capaz de soportar la marea del tiempo, y cualquier golpe al que las alimañas puedan tratar de someternos, la segunda era dorada americana está por venir."
 PTF_patriotic_education: "Educación patriótica"
 PTF_patriotic_education_desc: "Atrás quedaron los días de la teoría crítica y la infiltración comunista en nuestras escuelas, se enseña el nuevo estilo fascista, un estilo que busca unificar a nuestros estudiantes, reformar a los hombres para que sean americanos poderosos y enseñar a las mujeres el poder dentro del hogar. Una educación patriótica es una educación nacional, una educación real que no corroa las mentes de nuestros niños, y dicha educación debe continuar más allá de la escuela primaria; incluso a los estudiantes de secundaria más grandes se les enseñará la importancia de la nación y la familia."
 PTF_the_fourth_bank_of_america: "Cuarto Banco de América"
 PTF_the_fourth_bank_of_america_desc: "Una economía dirigida requiere un banco dirigido, un nuevo banco para convertir las cenizas de lo viejo en prosperidad para los estadounidenses del mañana, y eso sólo puede garantizarlo nuestro gobierno y nuestro liderazgo; a menudo los banqueros se rebajaron para complacer los intereses de los globalistas y comunistas, pero ahora es una nueva era, una nueva prosperidad, un banco de lo patriótico a lo patriótico."
 PTF_revive_the_american_hinterlands: "Revivir el interior americano"
 PTF_revive_the_american_hinterlands_desc: "La costa este fue olvidada y abandonada a su suerte por las élites de antaño, mientras que hace apenas unas décadas era el centro económico de la nación, impulsado por gasolina hacia innumerables industrias y productos, proporcionando innumerables puestos de trabajo; por lo tanto, para que América resucite, su centro económico más importante debe revivir, como un fénix olvidado, debe resurgir de las cenizas de la ruina, sus industrias deben reavivarse, reconstruirse, restablecerse, su comercio debe establecerse para ir más allá por una nueva América alejada de la inmundicia que la paralizó no hace mucho tiempo."
 PTF_rebuild_the_northeastern_corridor: "Reconstruir el Corredor Noreste"
 PTF_rebuild_the_northeastern_corridor_desc: "La logística y el movimiento son la base de nuestra nación, y después de que los marxistas y las élites destruyeran las antiguas líneas ferroviarias, y ahora la guerra ha destruido todo lo que quedaba, nuestra capacidad de comerciar, movernos y brindar apoyo logístico a la economía ha disminuido, Nueva Inglaterra no necesita detenerse, los trenes, los trenes, las autopistas y los caminos estimularán las mentes económicas y patrióticas para conectarse y brindar apoyo como nunca antes para los verdaderos americanos, volverán a inspirar la economía hacia una nueva era de logística y transporte, y nos construirán un nuevo corredor."
 PTF_patriotic_corporations: "Corporaciones patrióticas"
 PTF_patriotic_corporations_desc: "Las corporaciones, las empresas, han servido y se han inclinado ante las élites que destruyeron el país durante años, colaborando con las finanzas globales para librar al americano común de su riqueza y enviársela a extranjeros, las corporaciones deben servir a un solo dios y deben trabajar solo para una nación, América, y para ellas, es el estilo de vida americano, o la tumba."
 PTF_department_of_reconstruction: "Departamento de Reconstrucción"
 PTF_department_of_reconstruction_desc: "Nuestra nación cayó en la guerra, la destrucción y fue abandonada a su suerte por sus antiguos gobernantes; un departamento para la reconstrucción es imprescindible para hacer realidad el ascenso de América, y a medida que el fuego aumentó, también lo harán nuestros martillos y ladrillos para reconstruir la nación rota poco a poco, idea por idea, edificio por edificio; esto no es solo una reconstrucción, es una retribución, una nación forjada en acero, disciplina y propósito."
 PTF_encourage_entrepeneurship: "Alentar el emprendimiento"
 PTF_encourage_entrepeneurship_desc: "Tasas de interés, tasas de interés, todo el mundo habla de ellas, nadie las entiende, no como lo hacen los verdaderos americanos, los empresarios son las costillas del corazón de América, y para que el emprendimiento nacional se reinicie, debemos bajar nuestras tasas de interés, ayudarlos de una manera que aprobemos y veamos, hacer que sea más fácil para ellos pedir dinero prestado, pero no dejaremos que sea por capricho, debe ser un emprendimiento nacionalista y patriótico, no la mierda marxista izquierdista de la alimañas elitistas, y no debe ser como lo tuvieron ciertos indeseables."
 PTF_negotiate_for_foreign_aid: "Negociar ayudas extranjeras"
 PTF_negotiate_for_foreign_aid_desc: "Mientras nuestra gran nación caía, el mundo observaba, algunos aplaudiendo, otros lamentándose, y unos pocos vieron una oportunidad. Estamos en ruinas, y algo debe hacerse. Una nación no puede sobrevivir sola, y su identidad no se recuperará con la suficiente rapidez antes de que los marxistas y reaccionarios la destruyan. Un gran pesar nos implora una nueva nación, y para ello debemos llegar a un acuerdo con los nacionalrepublicanos; ellos han estado proponiendo negociaciones para que recibamos ayuda de países amigos. La situación exige que cedamos, pero que este no sea un momento de debilidad, sino de renovación; para utilizar recursos ajenos e indeseables en nuestro propio beneficio."
 PTF_prosperity_for_all: "Prosperidad para todos"
 PTF_prosperity_for_all_desc: "Una nación fuerte exige un pueblo fuerte. La prosperidad no la acaparan unos pocos ni la malgastan en la alimaña inmerecida e indeseable; se gana con trabajo, disciplina y unidad nacional. Las industrias se reconstruirán bajo nuestra atenta mirada, los trabajadores serán recompensados, pero solo con lo que se considere necesario para su labor. La prosperidad es para quienes dan la vida por su nación, no para los débiles y perezosos."
 PTF_invest_in_the_resource_industry: "Invertir en la industria de recursos"
 PTF_invest_in_the_resource_industry_desc: "Las importaciones destruyen una nación, y nuestra patria posee amplios recursos por cada centímetro cuadrado. Estos recursos deben ser recuperados, reutilizados, su extracción debe ser invertida, ampliada y gestionada por nosotros y por nuestros socios corporativos. Reclamaremos los recursos americanos: petróleo, acero, trigo, agua y silicio, para garantizar nuestra independencia y unidad nacional."
 PTF_suburban_renewal: "Revitalizar los suburbios"
 PTF_suburban_renewal_desc: "Crecimos en los suburbios, y nuestra base está en los suburbios. Nuestra gente es suburbana, y debemos enfocarnos en ella. La reconstrucción de los suburbios está por venir: los haremos más grandes, mejores y más autosuficientes que nunca. Nuestra sangre proviene de ellos, y también nuestro apoyo. Una nación reconstruida comienza con su gente, y su gente pertenece a comunidades fuertes, orgullosas e inquebrantables."
 PTF_high_speed_rail_contracts: "Contratos de alta velocidad férrea"
 PTF_high_speed_rail_contracts_desc: "Para que el futuro de América avance a toda velocidad, literalmente, es necesario impulsar la renovación ferroviaria. Muchas corporaciones nuevas, bajo nuestro mando o en zonas adyacentes, solicitan contratos para renovar los ferrocarriles estadounidenses. Una nación es tan rápida como su vagón más lento. Estos no son simples contratos, sino una inversión en nuestros valores patrióticos y nacionalistas, y en el gran futuro de nuestra nación."
 PTF_resuscitate_the_beating_heart_of_finance: "Resucitar el corazón financiero"
 PTF_resuscitate_the_beating_heart_of_finance_desc: "Los conservadores nacionales han estado exigiendo un resurgimiento de la fortaleza financiera que una vez tuvo América, y estamos de acuerdo, pero no será como antes. Los bancos ya no saquearán a América; estarán bajo nuestro férreo control. Los mercados bursátiles ya no jugarán con nuestro futuro ni serán manipulados por indeseables y las élites financieras globales. El viejo sistema fracasó porque se sirvió a sí mismo; el nuevo sistema perdurará porque sirve a una América más pura y fuerte."
 PTF_encourage_domestic_production: "Alentar a la producción doméstica"
 PTF_encourage_domestic_production_desc: "Depender de extranjeros es impuro, perezoso y, lo peor de todo, antiamericano. Una economía patriótica depende únicamente de sí misma y de su propia producción. Hay que imponer aranceles a todo lo fabricado en el extranjero y hay que revitalizar las industrias. Para sustituirlos, un americano puro come, duerme, conduce, bebe y trabaja con bienes americanos, y sólo con bienes americanos."
 PTF_bring_buisness_home: "Recuperar nuestros negocios"
 PTF_bring_buisness_home_desc: "La guerra destrozó nuestra economía y los débiles huyeron. Las corporaciones, una vez establecidas en suelo americano, abandonaron su patria en busca de seguridad extranjera y mano de obra barata. Ahora, mientras reconstruimos, regresarán o serán reemplazadas. La recuperación económica no es la única agenda ahora; es hora de un Renacimiento Nacional, una América arraigada en las empresas americanas en suelo americano, propiedad de americanos para la grandeza de nuestra nación."
 PTF_rural_renewal: "Renacimiento rural"
 PTF_rural_renewal_desc: "El alma de América reside en sus granjas, campos y pequeños pueblos, purificando la cultura americana de enfermedades y proporcionando un linaje a la nación. Durante demasiado tiempo, han sido desatendidos, olvidados e ignorados por quienes ostentan el poder. La América rural ya no será un asunto secundario: será un modelo de resiliencia, un lugar donde las familias prosperan, las comunidades prosperan y el espíritu de la nación se renueva. Levantaremos la tierra que construyó este país, porque es hora del renacimiento rural."
 PTF_technological_superiority: "Superioridad tecnológica"
 PTF_technological_superiority_desc: "Nuestra superioridad no reside solo en la gente, el espíritu o la identidad, sino también en la tecnología y el desarrollo. Un sector tecnológico expandido y desarrollado, digno de un pueblo elevado, nuestras industrias de silicona, la fabricación de chips, nuestras tecnologías militares, todo ello estancado a la sombra de la guerra. Pero no por mucho tiempo; nuestras botas aplastarán a nuestros enemigos con poder tecnológico, además de nuestra fuerza."
 PTF_urban_renewal: "Esfuerzo de restauración urbana"
 PTF_urban_renewal_desc: "Nuestras ciudades fueron nuestras joyas de la corona, monumentos a nuestra fuerza, cultura, poder e innovación. Es hora de una restauración urbana, una recuperación integral de nuestros centros urbanos que los devuelva al lugar que les corresponde como faros de fuerza y prosperidad. La decadencia urbana ha terminado. Las ciudades serán centros de innovación y orgullo, asegurando que el corazón de la nación lata con más fuerza donde más importa. Recuperaremos el alma de las ciudades americanas, convirtiéndolas de nuevo en los vibrantes y poderosos motores de prosperidad que siempre debieron ser."
 PTF_america_first: "América primero"
 PTF_america_first_desc: "América por encima de todo, América antes de todo. Nuestra nación es lo más importante; no se degenerará, y sus sufrimientos ya no serán ignorados. América es lo primero, y aseguraremos que sea lo primero y, sobre todo, su superioridad sea indiscutible, y su fuerza esté en constante crecimiento. Solo hay dos palabras que resonarán en la mente de todos los americanos: \"América primero\"."

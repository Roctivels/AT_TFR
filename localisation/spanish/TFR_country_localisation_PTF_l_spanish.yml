 ptf.87.t: "Rebelión del GOP"
 ptf.87.d: "Por mucho tiempo, el Frente Patriota ha estado evolucionando lentamente hacia una dirección más radical, con la ideología nacionalsocialista siendo favorecida tanto en la organización como en los territorios que esta ha reclamado. Este cambio ideológico era una inevitable consecuencia de la decisión de Thomas Rousseau de dar cabida al ala más radical del Frente Patriota liderada por Chris Hood, el antiguo líder de la organización NSC-131 antes de su integración con el Frente Patriota. Desafortunadamente, este necesario cambio ideológico ha tenido otras graves consecuencias. Una traicionera camarilla de sediciosos republicanos liderados por el antiguo gobernador de Maine, Paul LePage, y el llamado \"Movimiento Republicano de Nueva Inglaterra\" han iniciado un levantamiento a gran escala contra nuestro gobierno militar.\n\nUna porción significativa de nuestras fuerzas ha desertado a esta causa reaccionaria, afirmando que el Frente Patriota son \"tiranos socialistas\" que desean destruir América. Aún si muchas de las fuerzas desertoras son milicianos, son muy numerosas y mantienen el control de muchos de los estados nororientales que tanto trabajo nos llevó reclamar. Al final del día, sus motivaciones para traicionar nuestra gloriosa revolución no importan, ni deben ser tomadas en cuenta. No son más que una escoria traidora, y serán tratados como se corresponde. Todo lo que su rebelión logrará será exponer a los cobardes y traidores dentro de nuestras filas, y permitirnos exterminarlos de forma adecuada."
 ptf.87.a: "¡Aplasten a los traidores!"

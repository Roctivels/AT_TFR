 ptf.91.t: "Rousseau habla a la Naciones Unidas"
 ptf.91.d: "\"Ahora cedo mi lugar al líder del \"Frente Patriota\", Thomas Rousseau.\nDijo el presidente actual de la ONU, Dennis Francis.\n\"Sr. Presidente de la Asamblea General, damas y caballeros. No hace mucho, los Estados Unidos de América se desmoronaron y ahora está luchando contra si misma, con la pequeña esperanza de unirse otra vez. AL mismo tiempo, los Gobiernos de Denver y Washington D.C siguieron matando indiscriminadamente, sin importarles los ciudadanos de la nación. El resto de EE.UU. fue dejado a su suerte, y hoy les hablo como el único unificador de la región de Nueva Inglaterra, no solo he salvado a la región de la anarquía, también la salvé de una invasión injustificada.\"\nDijo Thomas Rousseau\nLas cámaras se enfocaban en la cara de Rousseau.\n\"Tengo una promesa y un sueño, devolver a los EE.UU. a la normalidad, y despojarla del sistema obsoleto que la llevó a su situación actual. Prometo un futuro donde los EE.UU. no sea corrompida ni desde el interior ni el exterior, proveeré un futuro que pueda a dar a los ciudadanos americanos lo que deseen.\"\nRousseau miró entonces su discurso cuidadosamente escrito.\n\"No soy un radical, no importa cuantas veces me lo diga la gente. Solamente he dado los pasos necesarios, aún si eso significa que la gente me llame un dictador, déspota, radical, o lo que sea. Pero, antes de irme, debo hacerles una pregunta.\"\nDijo Rousseau mirando de un lado a otro.\n\"¿Acaso importa, si salva las vidas de nuestros ciudadanos?\""
 ptf.91.a: "Entonces el siguió con su discurso, como si nada hubiese pasado."

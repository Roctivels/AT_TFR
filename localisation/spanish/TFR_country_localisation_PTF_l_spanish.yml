 PTF_recruiting_militia_category: "Reclutar milicias"
 PTF_recruiting_militia_category_desc: "El concepto de milicias y grupos de autodefensa siempre ha sido parte integral de la cultura e identidad americana. Muchos estaban activos antes de la guerra, y ahora que el conflicto ha estallado, se forman cada día más para diversas causas en todo el país.\n\nNuestra organización debe aprovechar al máximo este ideal histórico. Al formar grupos armados compuestos principalmente por voluntarios de la población local, podremos reclutar más hombres capaces de combatir para asegurar nuestro triunfo en la batalla por el destino de América. Si bien estos grupos a menudo no cuentan con el mejor equipo, son necesarios para cubrir las carencias que nuestras fuerzas principales no pueden cubrir."
 PTF_national_front_category: "El Frente Nacional"
 PTF_national_front_category_desc: "\n\n\n\n\n£GFX_PTF_DEC_Banner_National_Front\n\n\n\n\n\n\n"
 PTF_canada_crisis_category: "La intervención canadiense"
 PTF_canada_crisis_category_desc: "Con la unidad llegan nuevas amenazas, y la principal de ellas, Canadá. Ottawa observa nuestra consolidación con recelo, perturbado por nuestra ideología y nuestro impulso. Hablan de \"estabilidad\", pero sus ojos se desvían hacia el sur con preocupación.\nDebemos prepararnos, no solo para defender nuestro territorio, sino para defender nuestra causa ante el mundo. Ya sea mediante la diplomacia, la disuasión o el engaño, debemos demostrar a Canadá que no somos una amenaza que deba ser destruida, sino una realidad que debe ser aceptada.\n\nPor cada paso que damos para fortificar nuestras fronteras, para ganarnos el apoyo de nuestros vecinos, para presentarnos como el futuro y no como la consecuencia de América, nos acercamos un poco más a la paz... y si no a la paz, al menos a una victoria justa.\n\nActual estado de las relaciones con @CAN Canadá: [get_canada_relations_status]"

 PTF_the_patriot_front_category: "El Frente Patriota"
 PTF_the_patriot_front_category_desc: "Originalmente operando como un grupo activista nacionalista disidente que combinaba imágenes fascistas con simbolismo americano para atraer a la gente común, el Frente Patriota ha crecido de un pequeño grupo de unas pocas docenas de personas a una de las organizaciones paramilitares y políticas de derecha más grandes de los ex-Estados Unidos. Trabajando con comunidades locales de clase media y forjando vínculos dentro del gobierno y las fuerzas del orden, se han posicionado como una alternativa de gran alcance al Partido Republicano, lo que les ha permitido legitimarse rápidamente.\n\nSi bien su gran crecimiento en tan poco tiempo conlleva las desventajas de contar con una membresía ideológica tan amplia, el Frente Patriota se divide principalmente en cuatro grupos principales, cada uno con su propia visión y agenda para América.\nActualmente, Rousseau es visto como: [GetRousseauPower][PTF_jacksonian_text][PTF_hamiltonian_text][PTF_blueshirt_text][PTF_spartanist_text][PTF_gop_text]"
 PTF_propaganda_campaigns_category: "Campañas bélicas"
 PTF_propaganda_campaigns_category_desc: "\n\n\n\n\n£GFX_PTF_DEC_Banner_Campaigns\n\n\n\n\n\n\n\nDurante décadas, el ejército americano fue uno de los mejores del mundo.\nAnte la triste pero necesaria realidad de la Guerra Civil, tenemos una nueva guerra que librar, no contra la tiranía ni contra el terrorismo, sino una guerra por nuestros vecinos, nuestro pueblo y nuestra nación.\n\nNuestras experiencias pasadas han demostrado que el pueblo americano no se deja vencer fácilmente y, a partir de ellas, aprenderemos de nuevo, nos adaptaremos y venceremos a nuestros adversarios.\n\nLas guerras no se ganan solo con la violencia, sino también persuadiendo a la gente a unirse a nosotros y demostrándoles que somos la única alternativa viable para el pueblo americano. Conquista sus corazones y ya habrás ganado la mitad de la guerra."
 PTF_the_great_american_renaissance_category: "Gran Renacimiento Americano"
 PTF_the_great_american_renaissance_category_desc: "\n\n\n\n\n£GFX_PTF_DEC_Banner_Renaissance\n\n\n\n\n\n\n\n"
 PTF_resource_development_cat: "Desarrollo de recursos"
 PTF_jacksonian_loc: "\n\n£GFX_PTF_Jacksonians_texticon  Influencia de los §7jacksonianos§!: [?ROOT.party_popularity@authoritarian_democrat|Y%2] (£stability_texticon [?PTF_authdem_popularity_dynamic_var|=+1%])\nLos £GFX_PTF_Jacksonians_texticon  §7jacksonianos§! buscan restaurar a los Estados Unidos como una §7democracia multipartidista de derecha§! y reclamar una América que hable por el hombre común, y no por los cosmopolitas de Washington."
 PTF_hamiltonian_loc: "\n\n£GFX_PTF_Hamiltonians_texticon  Influencia de los §9hamiltonianos§!: [?ROOT.party_popularity@nationalist|Y%2] (£mil_factory  [?PTF_nationalist_popularity_dynamic_var|=+1%] y £dockyard  [?PTF_nationalist_popularity_dynamic_var|=+1%])\nLos £GFX_PTF_Hamiltonians_texticon  §9hamiltonianos§! representan a aquellos alineados con el movimiento de la Ilustración Oscura, que buscan unir a la nación bajo la guía de sus ciudadanos más ilustrados, educados y nobles, restaurando a América como una §9aristocracia democrática limitada§!."
 PTF_blueshirt_loc: "\n\n£GFX_PTF_Blueshirts_texticon  Influencia de los §2camisas azules§!: [?ROOT.party_popularity@fascist|Y%2] (£pol_power  [?PTF_fascist_popularity_dynamic_var|=+2])\nLos £GFX_PTF_Blueshirts_texticon  §2camisas azules§! son una organización §2neofascista§! que busca crear una América donde el orden y la fuerza guíen a la nación."
 PTF_spartanist_loc: "\n\n£GFX_PTF_Spartanists_texticon Influencia del §RPartido Nacional de Justicia§!: [?ROOT.party_popularity@national_socialist|Y%2] (£attack_texticon [?PTF_natsoc_popularity_dynamic_var|=+1%])\nEl £GFX_PTF_Spartanists_texticon  §RPNJ§! es un grupo de extremistas nacionalsocialistas que busca tomar el control político del Frente Patriota y reformar la organización para que sea más racialmente centrada y más insensible hacia sus enemigos. Sostienen la visión de que la América moderna es una nueva República de Weimar que será reducida a cenizas por las llamas de la revolución nacional."
 PTF_gop_loc: "\n\nInfluencia £GFX_PTF_GOP_texticon  §1republicana§!: [?ROOT.party_popularity@conservative|Y%2] (£war_support_texticon  [?PTF_conservative_dynamic_var|=+1%])\nEl £GFX_PTF_GOP_texticon  §1Partido Republicano§! está compuesto por partidarios de Trump que creen que la vieja América aún se puede salvar. Si bien son muy escépticos respecto al Frente Patriota, se alinean discretamente con el movimiento para luchar contra los federalistas y comunistas de Nueva Inglaterra. No se alinean con nadie y buscan subvertir el movimiento desde dentro."

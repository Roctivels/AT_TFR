 ptf.89.t: "En el idus"
 ptf.89.d: "En una tranquila mañana de Boston, nada se salía de lo habitual. El ciudadano medio leía el boletín nacional, distribuido por los milicianos locales tras el colapso de la infraestructura de internet en América. Los únicos informes importantes provenían del frente, detallando la sombría situación que se desarrollaba en el oeste, así como la infiltración interna de comunistas y globalistas. No era nada nuevo, aunque esta edición parecía particularmente grave. No era ningún secreto que el Frente estaba siendo subvertido por miembros del Gran Partido Viejo que se habían unido a ellos para sobrevivir contra los degenerados anarquistas, comunistas y federalistas que proliferaban en Nueva Inglaterra, aunque hasta qué punto se habían atrincherado en la organización era desconocido tanto para el público como para los altos mandos.\nEse día, se celebraba una sesión relativamente importante en el Congreso Continental, cuyo tema principal era el esfuerzo bélico. La había convocado Paul LePage, exgobernador de Maine y figura principal del Gran Partido Viejo, que ha cobrado fuerza recientemente debido a los numerosos fracasos sufridos durante la presidencia de Rousseau, tanto en el frente como en el frente interno. El motivo de la sesión de emergencia no estaba claro, aunque la cruda realidad de lo que ocurría en esa sala de reuniones pronto se expondría a toda la nación.\nLePage se sentó en la silla desde la que tendría la palabra, frente al Congreso y al trono en el que se sentaba Rousseau, decorado con simbolismo fascista y Americana. Estaba atormentado por la ira y la ruina, y sabía que si realmente quería salvar a América de la amenaza que se cernía sobre ella, debía actuar de inmediato. Estos serían sus idus de marzo y, como Bruto antes que él, ya había reunido a varios conspiradores, incluyendo a la Guardia Pretoriana. Se armó de valor para hablar:\n\"Compatriotas americanos, con el mayor honor y dignidad me presento hoy aquí como un hombre libre, libre de las ratas que dicen estar reclamando América, cuando en realidad la están dejando en ruinas...\". Incluso la mención del lema del Frente Patriota de esa manera provocó una indignación repentina, nunca antes vista en el Congreso, mientras Rousseau permanecía mudo y confundido.\n\"Ojalá fuera 1804, tendríamos un duelo honorable...\". Arrastró las palabras mientras buscaba en su traje. \"Pero me temo que ya no le queda honor. Como Hamilton antes que usted, ¡su cabecita quedará destrozada contra la pared!\". Desenfundó una Modelo 29 y disparó directamente a Rousseau tres veces antes de que este pudiera reaccionar. Quedó muerto en el acto, con su cadáver desplomado sobre su trono. La Guardia Pretoriana de guardia entró en la sala y arrestó a la mayoría del Congreso. LePage abandonó su escaño, mientras se producían violentas peleas y el Congreso quedaba hecho un desastre. Los republicanos se quedaron horrorizados o le dieron una ovación de pie. Mientras la cinta de la escena del crimen se extendía por el pasillo inaugural y la mayoría del Congreso era escoltado esposado, LePage no pudo evitar sentirse digno."
 ptf.89.a: "Congreso disuelto."

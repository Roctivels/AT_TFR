 PTF_lower_national_support_idea: "Apoyo nacional extremadamente bajo"
 PTF_lower_national_support_idea_desc: "A pesar del auge del fascismo y las simpatías por la ultraderecha durante el último año, debido a la exposición masiva del núcleo corrupto del Estado globalista, aún carecemos del apoyo y la confianza de la gran mayoría de las personas bajo nuestro gobierno. Adoctrinadas por años de propaganda de los medios corruptos, no comprenden la necesidad de nuestro movimiento. Pero con el tiempo, debemos hacerles comprender que la recuperación de América es la única manera de salvar al país, y entonces nos apoyarán."

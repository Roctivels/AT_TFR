 ptf.92.b: "El ejército necesita una mejor disciplina."
 ptf.93.t: "Operación Scarecrow"
 ptf.93.d: "La operación Scarecrow ha comenzado. Nuestros comandantes han solicitado mayores esfuerzos contra el CNS desde que iniciaron su levantamiento, ya que continúan hostigando nuestra línea de suministro y asaltando nuestra posición. Sin embargo, hoy nuestras fuerzas están a la ofensiva y están comenzando su ataque contra las numerosas bases de operaciones en disputa cerca de la línea del frente.\nNuestro principal objetivo es aislar lo suficiente a las fuerzas del CNS, hasta que nuestras brigadas de milicias más básicas puedan destruir cualquier formación que el enemigo pueda utilizar. Nuestro primer paso es el asesinato de cualquier comandante y oficial. Dado que la capacidad del CNS para detener la infiltración subversiva se encuentra actualmente en un estado de extrema vulnerabilidad, nuestras fuerzas especiales se han infiltrado fácilmente tras las líneas enemigas y ahora tienen como objetivo a cualquier miembro de alto rango de sus fuerzas armadas. También estamos utilizando nuestras numerosas unidades aéreas no convencionales, como helicópteros y biplanos requisados, que se utilizarán para hostigar a las formaciones enemigas y brindar apoyo aéreo cercano. Con el esfuerzo conjunto de todos nuestros recursos, esperamos diezmar fácilmente al CNS."
 ptf.93.a: "Estos traidores serán aplastados."
 ptf.94.t: "Operación Roaring Eagle"
 ptf.94.d: "La operación Roaring Eagle ha comenzado. La operación se dirige a las numerosas células insurgentes en nuestro territorio, leales al Gobierno Constitucional de Denver, que han recibido entrenamiento y asesoramiento directo de su aliado. Hemos contactado con muchos de sus filas que podrían simpatizar con nuestra causa, instruyéndoles a sabotear y retrasar la acción siempre que sea posible.\nSin embargo, nuestro objetivo principal es atacar a su líder y a sus oficiales de alto rango. Ya hemos evaluado cuándo y dónde ocurrirán estos asesinatos, con una alta probabilidad de éxito. Nuestros esfuerzos para persuadir a nuestros ciudadanos a luchar contra los insurgentes han dado buenos resultados, y algunos han formado batallones de protección locales para detectar y aniquilar cualquier posible célula insurgente. Gracias a los esfuerzos conjuntos de nuestras operaciones especiales y las milicias locales, hemos obtenido un gran éxito hasta la fecha, con muchas células que ya se encuentran con menos efectivos después de las batallas o han sido destruidas."
 ptf.94.a: "Excelente."
 ptf.95.t: "A quienes hicieron el sacrificio final"
 ptf.95.d: "Un joven caminaba lentamente por un pintoresco parque de Boston bajo el fresco sol de la tarde que se desvanecía. Daba un largo paseo para ir a un lugar especial, pasando junto a algunas familias y otras personas mayores que disfrutaban visiblemente de todo lo que el lugar ofrecía, y todos tenían toda la razón en sus opiniones. Las pintorescas reservas naturales y parques a las afueras de la ciudad eran un espectáculo digno de admirar, con grandes robles, ondulantes colinas verdes y flora de todo tipo y forma que salpicaban cada centímetro del parque. El espacio también albergaba algunos monumentos a los bostonianos que lucharon en la Guerra Civil, la Primera y la Segunda Guerra Mundial. Eran antiguas piezas de recuerdo artístico que llamaron la atención del hombre, pero no estaba allí por eso. Estaba allí para ver un nuevo monumento erigido en la cima de una colina, dedicado a los camaradas que conoció durante su reciente servicio.\nDespués de un rato caminando y subiendo la colina, finalmente llegó y se quedó asombrado al contemplar el monumento a una nueva generación de héroes americanos.\nEn la cima de esta colina se erigía un imponente monumento a todos los hombres del Frente Patriota que murieron luchando por la causa, y la grandeza del Frente Patriota, ahora familiar para él, lo impresionó rápidamente. Largos senderos de flores de todos los colores, grabados de victorias recientes, una llama ornamental de acero y mármol, e imponentes bloques de piedra con listas de nombres, imponía al hombre tanto poder como un sombrío recuerdo. En el centro mismo de todo, se erguía orgullosa y alta la estatua de un Minutemen del Frente Patriota, alzando triunfante un AR-15 en un gesto de orgullosa conquista sobre todos los enemigos del Frente Patriota. No podía describir la sensación que le embargaba al presenciar el esplendor de todo el complejo. Todo el triunfo, todo el orgullo, toda la magnífica adulación por su poder y sus logros; esta era la grandeza del Frente Patriota plasmada en forma física. Era maravilloso, hermoso, absolutamente cautivador, pero sobre todo, glorioso.\nPero de entre todas las grandes obras y decoraciones, se centró en la parte inferior, justo debajo de la estatua del Minuteman. En la base del monumento, una sola estrofa de texto descansaba en solemne soledad, y lo que estaba cincelado en su fría y gris estructura le hizo llorar."
 ptf.95.a: "\"A los patriotas que lo dieron todo hoy, para que la victoria llegase mañana\"."
 ptf.96.t: "Intervención canadiense en Nueva Inglaterra"
 ptf.96.d: "Hoy, funcionarios canadienses hicieron un anuncio importante sobre la región de Nueva Inglaterra. Según el anuncio, las Fuerzas Armadas Canadienses declararon oficialmente su intervención contra el Frente Patriota, una facción que recientemente se ha consolidado como el único unificador de la región. A pesar del reciente éxito del Frente Patriota, los expertos militares aún predicen una victoria canadiense gracias a su ejército bien entrenado y equipado. Sin embargo, debido a los recientes estancamientos en las escaramuzas fronterizas contra el Frente Patriota, los expertos dudan de la efectividad de la ofensiva canadiense en una región tan extensa.\nLa intervención de Canadá ha sorprendido a la comunidad internacional, ya que el país declaró inicialmente la no intervención durante la Segunda Guerra Civil Americana tras verse abrumado por la cantidad de refugiados. Dada la situación, muchos cuestionan los motivos del gobierno canadiense para intensificar el conflicto. Sigue siendo incierto cómo se desarrollará la guerra, ya que los expertos predicen avances canadienses en las primeras etapas, pero no están seguros de los acontecimientos posteriores."
 ptf.96.a: "Otra guerra en América."
 ptf.97.t: "Canadá devuelve a los refugiados"
 ptf.97.d: "Al concluir las últimas rondas de negociaciones, hemos logrado un acuerdo beneficioso para la crisis de refugiados. A cambio de que Canadá deporte a los refugiados de Nueva Inglaterra a su patria sagrada, garantizaremos condiciones humanitarias, organizaremos campamentos de refugiados seguros y proporcionaremos a Canadá una pequeña compensación económica por el esfuerzo logístico necesario para iniciar estas operaciones. A pesar de ser un acuerdo poco favorable, es necesario traer de vuelta a casa a los americanos que se vieron obligados a abandonar sus hogares por el horror de la guerra. Hemos concluido las negociaciones sobre refugiados con buenos resultados, aunque el resultado de la conferencia aún no está del todo claro."
 ptf.97.a: "Bienvenidos a casa."
 ptf.98.t: "Canadá rechaza devolver a los refugiados"
 ptf.98.d: "Nuestro intento de lograr un acuerdo sobre la crisis de refugiados, insistiendo en nuestras demandas, ha fracasado estrepitosamente, ya que Canadá se niega a devolver a los refugiados. Esto ha provocado una grave catástrofe diplomática, ya que nuestras relaciones con Canadá sobre este tema ya eran tensas. Esto sin duda provocará algún tipo de acción y, a pesar de que la conferencia no se ha celebrado, ha anulado nuestras posibilidades de éxito diplomático. Los informes indican que la frontera canadiense ha sido militarizada y que nuestros delegados están \"profundamente decepcionados\" con la actitud canadiense al respecto."
 ptf.98.a: "Decepcionante."
 ptf.99.t: "La Conferencia de Kingston comienza"
 ptf.99.d: "Ante la escalada de tensiones en nuestra frontera con Canadá, hemos decidido celebrar una conferencia en la ciudad de Kingston, Ontario, situada junto a la frontera con Nueva York. Esta decisión se tomó debido a su proximidad tanto al corazón de Canadá como al norte del estado de Nueva York, y se produjo tras una ronda de delegaciones a Toronto. Nos reuniremos para tratar diversos temas, principalmente la crisis de refugiados, pero también la huida de los políticos liberales traidores que gobernaron y explotaron Nueva Inglaterra. También es probable que los canadienses nos exijan algo a cambio, probablemente reglas de combate en el frente americano, extendiendo su mano codiciosa en los asuntos de América. Si bien esto nos resulta desagradable, ya que los canadienses no dirigen ni deberían dirigir la política americana, es una necesidad, ya que una guerra en dos frentes con nuestro vecino del norte podría muy probablemente terminar en desastre.\n\nSin embargo, si esta reunión fracasa, hemos convocado voluntarios para proteger nuestra frontera norte y hemos decidido cerrarla temporalmente, lo que será un importante punto de discordia en Kingston. Nuestros diplomáticos de mayor confianza estarán presentes y les confiaremos el futuro del Frente Patriota. La decisión de celebrar una conferencia también se vio influenciada por la preocupación de los canadienses por cuestiones humanitarias en Nueva Inglaterra, como la denegación de acceso a la Cruz Roja, ya que podemos cuidar de nuestra gente, y las reglas de combate, que son prácticamente irrelevantes en la lucha contra la tiranía. Intentaremos transmitir estos puntos y que Canadá debería tener poca participación en la toma de decisiones de los americanos, pero recuerden no tentar a la suerte, ya que Canadá está a punto de atacar en cualquier momento si se les provoca."
 ptf.99.a: "Un mal necesario."
 ptf.100.t: "Canadá exije reglas de enfrentamiento"
 ptf.100.d: "Con la llegada de nuestros delegados a Kingston, ha comenzado la primera ronda de negociaciones sobre uno de los temas más recurrentes que Canadá nos ha planteado: las Reglas de Enfrentamiento. Si bien esto era previsible, Canadá ha llegado al extremo de argumentar que nuestras Reglas de Enfrentamiento están obsoletas y contravienen los Protocolos de Ginebra. Si bien debemos dejar claro que las Reglas de Enfrentamiento son irrelevantes en el contexto general de nuestra lucha, no debemos insistir demasiado en el tema, ya que los canadienses se formarán una impresión errónea de nuestro movimiento, si es que les importa. Los canadienses han comenzado ofreciendo una lista completa de Reglas de Enfrentamiento \"sugeridas\", y es evidente que intentan presionarnos. Les hemos puesto en evidencia su farol, presentando una contraoferta que no ha sido bien recibida por los canadienses. Sus reglas incluyen estipulaciones que impiden la confiscación de bienes, la detención de civiles y el uso de la \"fuerza mínima necesaria\" en situaciones de combate. Consideramos que esto es absurdo, y que estas normas limitarían gravemente nuestra capacidad de combate, además de dar a los canadienses la posibilidad de seguir obstaculizándonos en la mesa redonda.\n\nTambién hay argumentos a favor de aceptar su acuerdo, argumentando que, si queremos mantener una relación de confianza y dignidad, debemos apaciguar a los canadienses y codificar las normas de combate dentro de nuestro Ejército, lo que nos permitirá defender el honor y obtener el apoyo del pueblo americano. Al llegar el momento de tomar una decisión, decidimos que..."
 ptf.100.a: "Aceptaremos sus términos."
 ptf.100.b: "Rechazaremos sus términos."
 ptf.101.t: "Canadá rechaza devolver a políticos liberales"
 ptf.101.d: "Nuestro intento de lograr un acuerdo para el regreso de los políticos liberales ha fracasado estrepitosamente, ya que Canadá se niega a hacerlo. Esto ha provocado una grave catástrofe diplomática, ya que nuestras relaciones con Canadá sobre este tema ya eran tensas. Los informes indican que la frontera canadiense ha sido militarizada y que nuestros delegados están \"profundamente decepcionados\" con la actitud canadiense al respecto."
 ptf.101.a: "Decepcionante."
 ptf.102.t: "Canadá devuelve a políticos liberales"
 ptf.102.d: "Hemos logrado un acuerdo co-beneficioso para el regreso de los políticos liberales. A cambio de que Canadá los deporte de Nueva Inglaterra a su patria, garantizaremos condiciones humanitarias y proporcionaremos a Canadá una pequeña compensación monetaria por el esfuerzo logístico necesario para iniciar estas operaciones."
 ptf.102.a: "\"Bienvenidos a casa\"."
 ptf.103.t: "Canadá exije elecciones post-guerra"
 ptf.103.d: "Al comenzar la penúltima ronda de negociaciones, los canadienses han planteado un tema muy controvertido: las elecciones de posguerra. Esto ha provocado indignación, ya que se trata de un claro intento de los canadienses de imponer nuestra política y convertirnos en su títere. Las elecciones son una de las principales razones por las que América se ha visto consumida por la degeneración liberal y se ha debilitado, tanto externa como internamente. Si no queremos que esto se repita, debemos rechazar la oferta o proponer algún tipo de compromiso. El presidente Rousseau se opone firmemente a cualquier compromiso en este sentido, aunque debido a la influencia de los republicanos nacionales, no puede descartarlo por completo, y la decisión depende de la agenda política personal de la delegación. Los republicanos nacionales han redactado un compromiso que consiste en transferir el poder al Congreso para apaciguar a los canadienses, y ahora es el momento de tomar una decisión. Nuestros diplomáticos deciden..."
 ptf.103.a: "Ofrecer un compromiso."
 ptf.103.b: "Rechazar."
 ptf.104.t: "Canadá exije acceso de la Cruz Roja"
 ptf.104.d: "Resuelto el asunto de las Reglas de Enfrentamiento, podemos abordar el segundo tema de la Conferencia: la Cruz Roja. Desde nuestra toma de Connecticut, hemos expulsado a la Cruz Roja y a todas las organizaciones similares, por sospechar que se trata de un frente globalista. Hemos llegado a la conclusión de que el pueblo americano puede cuidar de sí mismo y que no necesitamos que el resto del mundo intervenga en nuestros asuntos humanitarios, así de simple. Esto ha generado gran preocupación en nuestros vecinos del norte, quienes desean el regreso de la Cruz Roja a Nueva Inglaterra. Si bien deseamos mantener nuestros servicios de ayuda humanitaria, es un punto crucial para Canadá, y es probable que intenten forzarnos. Internamente, estamos divididos sobre este tema, ya que algunos creen que debemos hacer oídos sordos y negarnos a permitir que los globalistas se infiltren en nuestra gran nación. Otros creen que no vale la pena arriesgarse a una guerra por este asunto, y que puede ayudar a las poblaciones sumidas en la miseria a causa del conflicto. En Kingston, nuestros diplomáticos han decidido..."
 ptf.104.a: "Aceptar sus demandas."
 ptf.104.b: "Rechazar sus demandas."
 ptf.105.t: "La cuestión de los refugiados"
 ptf.105.d: "Con todo resuelto, llega el tema más importante de la Conferencia, sobre el que los canadienses han estado dando largas: la crisis de refugiados. Cada día, decenas de miles de americanos cruzan ilegalmente a Canadá a través de Nueva Inglaterra, principalmente por vías transitorias construidas por organizaciones humanitarias. Esto ha provocado una grave fuga de cerebros, una disminución de la productividad industrial y la pérdida de una parte significativa de la mano de obra, perjudicando gravemente a nuestro movimiento. Esto tiene que parar, y de igual manera, sin duda está causando problemas en el norte con la afluencia de tantos refugiados. A pesar de ello, Canadá se ha negado a devolver a estos refugiados a su patria e incluso ha criticado nuestra política fronteriza. Esto es indignante, y debemos poner punto final a su provocación. O devuelven a los refugiados, o nos vamos de esta Conferencia insatisfechos e indignados. Nuestros diplomáticos en Kingston han llegado a una conclusión, y..."
 ptf.105.a: "Intentar llegar a un compromiso."
 ptf.105.b: "¡Insistirán en nuestras demandas!"
 ptf.1051.t: "Conferencia de Kingston exitosa"
 ptf.1051.d: "Hoy se ha anunciado al mundo que la Conferencia de Kingston fue un éxito diplomático. Hemos resuelto varios de los problemas que planteamos a los canadienses, si no todos, y hemos asegurado nuestra frontera norte de cualquier intervención militar canadiense. No solo hemos garantizado el retorno constante de los refugiados americanos, sino que también hemos forjado una relación de confianza mutua con los canadienses, a pesar de nuestras quejas con su Gobierno. Esto sin duda permitirá una paz duradera en la región, y nuestros diplomáticos han regresado a casa como héroes."
 ptf.1051.a: "¡Buen trabajo!"
 ptf.1052.t: "La Conferencia fracasa"
 ptf.1052.d: "Tras el regreso sanos y salvos de nuestros diplomáticos en Kingston, nos ha quedado claro que la Conferencia ha sido un desastre. No pudimos llegar a ningún acuerdo, ni siquiera a un acuerdo, y lo que sí logramos probablemente será declarado nulo por ambas partes en las negociaciones. Los informes de vigilancia aérea indican una fuerte concentración de tropas canadienses en la frontera, y es probable que intervengan directamente en la Segunda Guerra Civil Americana, intentando aniquilarnos con su política degenerada. Nos mantendremos firmes, nos negaremos a rendirnos y lucharemos hasta el final, ¡mostrándoles el poder del espíritu americano!"
 ptf.1052.a: "Trágico."
 ptf.106.t: "Tratado de Boston"
 ptf.106.d: "Mientras nuestras fuerzas terminan de despejar la degenerada ciudad de Montreal, asolada por el cosmopolitismo canadiense, el gobierno de Toronto ha enviado oficialmente una delegación para negociar la rendición. Esto se ha producido tras varias victorias decisivas sobre el débil e ineficiente ejército canadiense y la captura del Bajo Canadá. En Boston, hemos llegado a un acuerdo: Canadá se retirará de todos los asuntos americanos, la Región Marítima de Nuevo Brunswick, Nueva Escocia, la Isla del Príncipe Eduardo y todo Quebec hasta el río San Lorenzo nos será transferida y reconocida como tal, y todas las estipulaciones que se nos impusieron en Kingston serán derogadas. A pesar de detestar los términos del tratado, los canadienses se vieron obligados a hacerlo, con la destrucción de la mayor parte de su ejército a manos nuestras, y seguro que les llevará mucho tiempo recuperarse de nuestro poderío.\n\nAhora, la pregunta más importante es cómo integraremos estos nuevos territorios. Los gobernadores y políticos liberales serán arrestados, acorralados y se les aplicará justicia con celeridad. Ya no podrán esconderse en sus edificios gubernamentales, reprimiendo y explotando a quienes deberían haber sido americanos desde el principio. También iniciaremos la integración ideológica, prohibiendo los partidos políticos parásitos y erradicando la plaga antiamericana dondequiera que aparezca. También se iniciarán proyectos de infraestructura para conectar estos territorios con el resto de Nueva Inglaterra, lo cual representa una enorme victoria ideológica no solo para nosotros en América, sino también para el resto del mundo. Sin embargo, este es solo el primer paso para reclamar América y declarar la victoria sobre sus adversarios."
 ptf.106.a: "¡Donde los tiranos vienen a morir!"
 ptf.107.t: "Canadá se retira de EE.UU."
 ptf.107.d: "Hoy, el gobierno canadiense anunció un sorprendente avance respecto a la intervención de las Fuerzas Armadas Canadienses en la región de Nueva Inglaterra. Las fuerzas declararon su retirada del territorio continental de Estados Unidos debido a los desafíos logísticos y políticos actuales. La decisión de ordenar una retirada táctica a través de la frontera se consideró necesaria. Muchos expertos habían predicho esta eventualidad tras el estancamiento de las ofensivas canadienses.\n\nEn respuesta al anuncio, el Frente Patriota, el grupo opositor a las fuerzas canadienses, declaró que ya habían anticipado la retirada canadiense, incluso durante las etapas iniciales del conflicto. Afirmaron haber rodeado y destruido a las fuerzas canadienses que se habían retirado previamente, a la vez que proporcionaron videos de prisioneros y vehículos capturados. Sin embargo, el costo real de la retirada canadiense se reveló a través de fotos y videos de numerosos soldados del Frente Patriota muertos y vehículos en llamas.\n\nA pesar de la retirada, el conflicto continúa intensificándose, sin que se vislumbre un fin a las hostilidades. El número de refugiados procedentes de la región ha aumentado drásticamente, y los expertos advierten que las batallas más brutales aún están por venir. Aún no se descarta la posibilidad de una incursión en territorio canadiense."
 ptf.107.a: "Solo empeora..."
 ptf.108.t: "Establecimiento de la Zona de Reconstrucción de Nueva Inglaterra"
 ptf.108.d: ""
 ptf.108.a: "¡Misión cumplida!"
 ptf.109.t: "El próximo Washington"
 ptf.109.d: "La oficina de Thomas Rousseau estaba repleta de libros. Manuales de ingeniería, diccionarios de derecho y otros libros de texto sombríos eran los más destacados, pero en el escritorio del centro solo había uno. El lomo desgastado simplemente decía \"Washington\". Rousseau lo hojeó, deteniéndose de vez en cuando para leer un par de pasajes.\nA Rousseau le pareció que todo era bastante fortuito. El topógrafo se convirtió en soldado, se convirtió en defensor de la justicia, se convirtió en general del Ejército Continental, se convirtió en presidente. Cada pequeño detalle evocaba mil historias. Aquí, pensó Rousseau, estaba un fundador. Lideró mientras otros teorizaban, escribían artículos y discutían acaloradamente. Su destreza marcial mantenía unida a la nación. América se lo debía.\nRousseau se levantó y miró por la ventana. Boston era lúgubre, un gris pálido que lo oscurecía todo salvo una tenue luz blanca, que iluminaba los edificios de ladrillo cercanos solo para que parecieran decrépitos y frágiles, y los rascacielos, oscuros y antinaturales. No había gente por las calles, ni coches circulaban por debajo. Los toques de queda y el racionamiento habían cobrado su precio. Los soldados que paseaban abajo se removían incómodos en la humedad. Rousseau suspiró y regresó.\nEl ambiente del día evocaba a Washington, se dio cuenta Rousseau. Nueva Inglaterra era como Valley Forge, una prueba para futuros conflictos. La ciudad que temblaba tras él era como esas pequeñas cabañas construidas a toda prisa, solo que a diferencia de la escarcha que se cernía sobre los soldados, los problemas que asolaban la ciudad eran de origen más antropogénico. Washington también sabía cómo lidiar con ese tipo de problemas. Cuanto más leía Rousseau sobre Washington, más se conectaba con la verdadera esencia de ese hombre. Ellos no eran tan distintos, después de todo."
 ptf.109.a: "Los destinos se repiten y convergen."
 ptf.110.t: "Visita al frente"
 ptf.110.d: "Tan pronto como los hombres de la Legión Nortex, 2ª División de Fusileros Motorizados, despertaron esa mañana, su oficial al mando les informó sobre la visita de Thomas Rousseau al frente, en particular a su división. Por supuesto, este tipo de acciones no eran nuevas, ya que el Frente Patriota buscaba toda la atención, el reconocimiento y la propaganda posibles, aunque la visita de Rousseau a un lugar tan cercano a los brutales frentes de la Segunda Guerra Civil Americana era inaudita. Cameron Kathan Pruitt, quien lideraba el Grupo de Ejércitos Nortex, actualmente envuelto en intensos combates urbanos en Pensilvania, había estado en contacto con Rousseau para hablar del tema. También llegaría un equipo de filmación, así como el editor jefe del boletín del Frente Patriota. Al finalizar la sesión informativa, la llegada de varios MRAP cerca de la entrada de la base hizo que los milicianos se alinearan, deseando lucir lo mejor posible ante su comandante en jefe.\nThomas Rousseau salió del vehículo, con un equipo de noticias detrás, con cámaras, trípodes, iPhones y más. Instalaron un estudio de cine improvisado cerca de los árboles antes de filmar. Llevaba un casco del PASGT con el logo del Frente Patriota estampado, además de la indumentaria habitual de un legionario. Cameron también estaba allí, de pie detrás del presidente. Los aproximadamente 300 milicianos lo recibieron con el saludo romano y el tradicional \"Salve César\". Formaron fila, mientras el presidente hablaba:\n\"Legionarios, cruzados y guerreros de una nueva América. Todos ustedes están aquí hoy, compitiendo por el rejuvenecimiento y la victoria sobre los globalistas que han destrozado nuestra nación, debilitado a nuestro pueblo y dejado nuestra cultura en ruinas. Ustedes, como el ejército de la rectitud y la máxima moralidad, lucharán hasta la última gota de sangre para defender a su familia, su patria, su honor y su patria. El camino para restaurar la fidelidad de nuestro pueblo es largo, con comunistas, socialistas y liberales utilizando todo a su alcance para impedir que alcancemos la prosperidad de la civilización. ¡Sin embargo, no nos desanimaremos, no caeremos en su engaño y alcanzaremos la victoria!\" El sonido de disparos, fuego de artillería y el zumbido de los drones estuvo presente durante todo su discurso, a veces acercándose incómodamente a la base. Los soldados prorrumpieron en otra ronda de saludos, mientras Rousseau continuaba:\n\"Algunos de ustedes podrían no regresar con vida de sus próximas batallas. Si bien la pérdida de cada patriota es trágica, hay gloria y dignidad en la muerte, y quienes dan su vida por la lucha nacional son mártires de una nueva América. Hoy serviré a su lado como su presidente y comandante en jefe. A quienes luchan por sus familias, su nación, su cultura, su herencia, su libertad y su soberanía, les tengo el mayor respeto."
 ptf.110.a: "¡Un gran discurso!"
 ptf.111.t: "La coalición de ultraderecha"
 ptf.111.d: "Los £GFX_PTF_Jacksonians_texticon  §7jacksonianos§! son quienes culpan al establishment del colapso de los Estados Unidos y buscan restaurarlos como una §7democracia multipartidista de derecha§!. Con la visión de una América donde la voz del ciudadano común resuene en los círculos de poder, desean derribar las barreras del privilegio y el elitismo, garantizando al mismo tiempo que solo quienes se preocupan por los intereses de América puedan obtener poder e influencia.\n\nLos £GFX_PTF_Hamiltonians_texticon  §9hamiltonianos§! representan a quienes se alinean con el movimiento de la Ilustración Oscura, resplandeciendo con la elegante sofisticación de una época pasada, y consideran a América y sus principales sistemas de gobierno como los culpables de su propia desaparición. Buscan unir a la nación bajo la guía de sus ciudadanos más ilustrados, educados y nobles, restaurando América como una §9aristocracia democrática limitada§!, asegurando que la nueva América sea un coro refinado y armonioso que cante las alabanzas de la estabilidad, la prosperidad y el progreso.\n\nLos £GFX_PTF_Blueshirts_texticon  §2camisas azules§! son una organización §2neofascista§! que busca reconstruir a América completamente desde cero. Guiados por el fervor de sus convicciones inquebrantables, estos revolucionarios visualizan una sociedad construida mediante una tormenta de cambio y renacimiento, buscando crear un país donde el orden y la fuerza guíen a la nación. Basados en la visión de Teddy Roosevelt para América, buscan llevar al país a su segunda era dorada mediante la fuerza colectiva y el orgullo nacional.\n\nEl £GFX_PTF_Spartanists_texticon  §RPartido Nacional de Justicia/Club Nacional Social§! son los artífices que evocan la tenacidad inquebrantable de la antigua Esparta, y albergan a la mayoría de los miembros originales del §CFrente Patriota§!. Se alzan por encima del paisaje desolado y decadente de la antigua república, percibiendo su patria como una aleación impura que debe ser fundida hasta sus elementos básicos y reforjada en una sociedad de fuerza, resiliencia y honor. Para ellos, el camino hacia el renacimiento de América pasa por el crisol del desmantelamiento, un renacimiento alcanzado a través de las llamas revolucionarias."
 ptf.111.a: "¡Reclamar América!"
 ptf.112.t: "Comienza la Segunda Convención Constitucional"
 ptf.112.d: "Grandes pancartas del Frente Patriota ondeaban sobre el suelo del Centro de Convenciones y Exposiciones de Boston, donde se congregaban cientos de delegados. El primer día de la convención se forjaron cien alianzas políticas, junto con innumerables amistades y rivalidades personales. Rostros famosos estaban rodeados de fieles acólitos y espiados a distancia por escépticos u opositores. Discursos espontáneos, algunos conmovedores y provocadores, otros pomposos y tautológicos, se escuchaban desde las murallas y los escenarios.\n\nAfuera del Centro de Convenciones, una imagen solemne se extendía sobre la ciudad de Boston, mientras la ocupación militar se iluminaba con el sonido de los disparos mientras la incipiente resistencia continuaba luchando. Una ciudad antaño próspera de más de 600.000 habitantes es ahora una sombra de lo que fue, con solo el 35% de sus residentes supervivientes tras semanas de lucha.\n\nMuchas corrientes ya han dejado claras sus posiciones y sus voces se han escuchado en medio de la cacofonía, abogando por sus propias formas de restauración. Los futuristas, que incluyen ingenieros, químicos, prometeicos y tradicionalistas, se centran en alterar los aspectos restrictivos de la nación americana prerrevolucionaria, dirigiendo su ira contra el burocratismo, que les preocupa que pueda volverse prominente entre sus antiguos camaradas. Los nacionalsocialistas fervientes también tienen presencia, atacando a los \"judaizantes\" entre ellos, además de defender una letanía de reformas racistas.\nEsta convención apenas comienza. El futuro de la República está en manos de los hombres congregados en ella."
 ptf.112.a: "Se avecinan tiempos tumultuosos."
 ptf.113.t: "Abriendo las puertas"
 ptf.113.d: "Era algo que pocos habían pasado por alto, pero aún menos habían considerado. Decenas de equipos de cámara, transmisores en vivo y otros creadores de redes sociales habían llegado a la convención al abrirse las puertas, solo para ser retenidos y sus equipos confiscados. Si bien se permiten las grabaciones impresas y escritas de lo que se lleva a cabo en el hemiciclo, se ha prohibido grabar en video debido al temor de los líderes a un posible sabotaje y a la preocupación por las palabras indiscretas de otros asistentes.\n\nTras el éxito del primer día, muchos han pedido que se levante la prohibición de grabar. Se han presentado argumentos a favor y en contra, pero la decisión final recae en las altas esferas del Frente."
 ptf.113.a: "¡Que el pueblo sea testigo de la historia!"
 ptf.113.b: "Sus hijos aprenderán de los libros de historia."
 ptf.114.t: "Homenaje al pasado"
 ptf.114.d: "\"Andrew Jackson, héroe de Nueva Orleans, conquistador de Florida, defensor del hombre común...\"\n\nLa pluma de Michael Di Lorenzo volaba rápida y ruidosamente sobre el papel. Su habitación de hotel estaba silenciosa y fresca, y solo su improvisado escritorio estaba iluminado por una lámpara barata que parpadeaba ocasionalmente. Di Lorenzo se maldijo en silencio por la decisión de prescindir de la tecnología mientras componía su discurso. Era para la posteridad, pensó. Mientras tiraba a la basura el que debía ser el quincuagésimo papel, se recostó y miró al techo.\n\n\"James K. Polk, el hombre que conquistó Texas, el hombre que manifestó el destino de América, defensor de los derechos del pueblo\".\nDi Lorenzo hizo una bola con el papel, dejándolo caer al suelo. Refunfuñó mientras pasaba furioso a otra página de su cuaderno.\n\n\"Thomas Rousseau, el joven líder de nuestro movimiento, el hombre que expulsó la anarquía y el comunismo de la cuna de la República, un César para nuestros tiempos\".\nDi Lorenzo miró fijamente la pared. En su escritorio, reunió tres papeles. Estos eran los más prácticos de todos, y cada uno tenía sus méritos. Jackson, Polk y Rousseau eran héroes por derecho propio, pero Di Lorenzo sabía que cada uno de ellos implicaría escribir un discurso muy diferente."
 ptf.114.a: "Jackson, un discurso para el pueblo."
 ptf.114.b: "Polk, un discurso para los informados."
 ptf.114.c: "Rousseau, un discurso para el Frente."
 ptf.115.t: "Una Unión más perfecta"
 ptf.115.d: "La Constitución fue una gran obra de mérito legal y político, pero adolece de numerosos defectos. No especificó muchos derechos ni tuvo en cuenta la posibilidad de una degeneración moral. Se convirtió en un simple campo de batalla para abogados, debatido hasta la irrelevancia y tratado con desprecio y burla por quienes supuestamente estaban obligados por juramento a defenderla. En esto concuerdan todos los miembros del Frente Patriota.\n\nDonde diferimos es en qué queremos hacer con ella. Los jacksonianos solo buscan editarla, enmendarla para garantizar que el socialismo, el neoliberalismo y el posmodernismo nunca puedan arraigarse legalmente en nuestra nación, y para tener en cuenta las cuestiones modernas, culturales, raciales y sociales. Quienes defienden esta postura argumentan que la Constitución es el mayor legado de nuestros antepasados, un vínculo necesario con el pasado, mientras que tantos otros se desvanecen durante el declive cultural y social de nuestra nación.\n\nQuienes se oponen a mantener la Constitución sostienen que mantener el documento resultaría un lastre, impidiendo el necesario ejercicio del poder por parte de nuestros líderes y preservando un símbolo conservador reaccionario. Argumentan que todo el documento debería ser retirado y reemplazado por un marco legal totalmente nuevo y con mayor inspiración ideológica.\n\nUna decisión como esta requiere mucha reflexión, y ambas partes deben ser consideradas."
 ptf.115.a: "¡Las palabras de los Padres Fundadores resuenan por siglos!"
 ptf.115.b: "Una nueva Constitución para la nueva era."
 ptf.116.t: "Enmiendas"
 ptf.116.d: "Si bien se ha decidido que la Constitución será editada, no se ha especificado su alcance. Han surgido numerosas sugerencias de todos los asistentes a la Convención, y algunos sugieren solo unas pocas enmiendas, o hasta ciento doce. Los esfuerzos irénicos han sido en vano hasta ahora, ya que cada facción y figura ve el proceso de enmienda como una oportunidad para dejar constancia de sus ideas en los libros de historia.\n\nLas principales modificaciones propuestas se centran en cuestiones culturales. Muchos nacionalistas cristianos piden que se permitan los juramentos religiosos explícitos, junto con el establishmentismo en los estados, supuestamente en consonancia con la intención original de los Padres Fundadores. Los delegados de las camisas azules, por su parte, han argumentado en contra de ambas propuestas cristianas, considerándolas espurias, y también han pedido que se añada al Preámbulo elogios a los \"guerreros históricos contra el bolchevismo\".\n\nLos delegados del PNJ, por otro lado, han ido más allá al pedir una enmienda contra el mestizaje y que se incluya en el preámbulo un elogio explícito al Tercer Reich. Ante la abrumadora cantidad de propuestas, el Frente Patriota debe decidir el alcance de la nueva constitución:"
 ptf.116.a: "Un documento que consolidará la nueva democracia y la protegerá del comunismo."
 ptf.116.b: "Ir más allá: la Constitución debe proteger al cristianismo."
 ptf.116.c: "Un documento extenso: a favor del PNJ."
 ptf.117.t: "Estado de las enmiendas"
 ptf.117.d: "Si bien se ha decidido que la Constitución será editada, no se ha especificado su alcance. Han surgido numerosas sugerencias de todos los asistentes a la Convención, y algunos sugieren solo unas pocas enmiendas, o hasta ciento doce. Los esfuerzos irénicos han sido en vano hasta ahora, ya que cada facción y figura ve el proceso de enmienda como una oportunidad para dejar constancia de sus ideas en los libros de historia.\n\nLas principales modificaciones propuestas se centran en cuestiones culturales. Muchos nacionalistas cristianos piden que se permitan los juramentos religiosos explícitos, junto con el establishmentismo en los estados, supuestamente en consonancia con la intención original de los Padres Fundadores. Los delegados nacionalsocialistas, por su parte, han argumentado en contra de ambas propuestas cristianas, considerándolas espurias, a la vez que piden que se añada al Preámbulo una enmienda contra el mestizaje y se elogie a los \"guerreros históricos contra el bolchevismo, principalmente Adolf Hitler\".\n\nSolo hay dos maneras de satisfacer tal cantidad abrumadora de ideas y demandas: O transformar la Constitución por completo, o desecharla y empezar de cero. Ambas opciones tienen sus defensores, pero la decisión será difícil y generará animosidad en ambos casos."
 ptf.117.a: "Los Padres Fundadores siguen siendo preeminentes."
 ptf.117.b: "Comenzar a redactar un nuevo documento."
 ptf.117.c: "Solo medidas drásticas nos llevarán a la victoria."
 ptf.118.t: "Decisiones drásticas para situaciones drásticas"
 ptf.118.d: "Es evidente para casi todos en el movimiento que tanto este partido político como la nación americana en su conjunto se encuentran en una grave crisis. Esta guerra por esta nación tiene el potencial de acabar con nuestras vidas y con la existencia de nuestro movimiento. Dado que esta crisis nos ha sobrevenido, es absolutamente necesario e imperativo que tomemos medidas para asegurar la eficacia y funcionalidad de nuestro liderazgo. Ahora no es el momento de permitir distracciones totalmente innecesarias y que agoten los recursos de nuestro liderazgo. Las crisis drásticas, como se ha demostrado en innumerables períodos de la historia moderna, requieren medidas drásticas a nivel ejecutivo para evitar el desastre. Lo que podemos hacer de inmediato es otorgar a nuestro liderazgo poderes \"especiales\" por el momento.\n\nPor muy impopular que parezca para una sociedad como la estadounidense, podríamos otorgar al ejecutivo un poder absoluto temporal para hacer lo necesario para dirigir la nación. Estos poderes otorgarán a los órganos ejecutivos la capacidad de eludir múltiples instituciones burocráticas, eludir a otras ramas del gobierno, tener autoridad para tomar decisiones o decretos unilaterales y restringir las actividades políticas y sociales de la ciudadanía. La capacidad del ejecutivo para obtener estos poderes dependerá de si aún nos encontramos en una crisis bélica, lo cual se encuentra dentro del ámbito de aplicación de los estatutos, regulaciones y disposiciones, tanto de partidos como de no partidos. Las restricciones a las libertades civiles o a la actividad política se han instituido de alguna manera en múltiples ocasiones en la historia de Estados Unidos, desde la guerra de Secesión hasta las Guerras Mundiales, por lo que esto no debería resultar demasiado extraño para muchos.\n\nSin embargo, si lo consideramos necesario, podríamos otorgar al ejecutivo un poder absoluto \"temporal\" para hacer lo que sea necesario, pero esta vez con restricciones muy laxas sobre dónde terminan dichos poderes. En una guerra por la supervivencia, ¿quién tiene tiempo para acatar normas y regulaciones específicas? En este temible conflicto que puede acabar con nuestra propia existencia, se hará lo que sea necesario; sin cuestionamientos. Este acuerdo \"temporal\" otorgará al ejecutivo todo lo necesario para ejecutar el esfuerzo bélico con el nivel deseado de eficacia y eficiencia. Si la ciudadanía necesita que se le revoquen derechos, que así sea; si el Congreso o los tribunales deben ser eludidos, que así sea; si todas las leyes existentes deben ser suspendidas o eludidas, que así sea; si toda la sociedad debe estar totalmente subordinada a la voluntad del ejecutivo, que así sea. ¡El liderazgo debe liderar! Una guerra solo se puede ganar si se tienen todas las herramientas necesarias para alcanzar el objetivo final de resolver esta crisis. Cualquier otra cosa ahora... ¡no significa nada!"
 ptf.118.a: "Poderes absolutos temporales."
 ptf.118.b: "Poderes absolutos \"temporales\"."
 ptf.119.t: "Blitz por América"
 ptf.119.d: "Thomas Rousseau no podía estarse quieto esta mañana. Caminaba de un lado a otro en una oficina trasera, leyendo con cierta anticipación nerviosa las notas que había garabateado sobre lo que quería decir. Incluso leer sus notas era algo en lo que apenas podía mantener la atención, ya que su mente se distraía pensando en lo que ocurriría en los próximos minutos. No era un hombre que transmitiera visiblemente volatilidad en sus emociones o comportamiento. Casi todos en el partido lo veían como un hombre de apariencia fría, tranquila e incluso fría, con determinación y apariencia, pero en el fondo, no siempre era igual a su imagen pública. Esta mañana se presentaría ante sus compañeros de partido para anunciar una nueva promesa radical para el esfuerzo bélico. Llevaba semanas pensándolo, pero había llegado el momento de hacer su gran anuncio. Mirando su reloj, vio que era la hora y salió de la trastienda a un escenario en una enorme sala de conferencias. Con una sonrisa de confianza, llegó el momento de exaltar su poder como líder. Si aún quedaba alguna duda, debía dejarla atrás en aquella trastienda. La numerosa multitud de miembros del PF aplaudió al unísono y esperó con expectación su grandilocuente declaración.\n\n\"¡Patriotas! ¡Camaradas! ¡Y hombres dedicados de este gran partido! ¡Vengo hoy ante ustedes con grandes noticias y una ventana al futuro!\", declaró Rousseau con entusiasmo.\nLos miembros del Frente Patriota aplaudieron y prorrumpieron en elogios.\n\"Nuestro esfuerzo bélico avanza con gran progreso. Nuestras fuerzas avanzan sin cesar en todos los frentes. Nuestro Estado Mayor, compuesto por talentosos comandantes, me ha comunicado que esperan que nuestro progreso se mantenga constante y con gran proyección en el futuro previsible. Sin embargo, debemos reconocer algunos hechos clave de la situación\", continuó Rousseau mientras la multitud escuchaba con gran interés y expectación.\n\"Esta guerra no se ganará con largas esperas y una planificación bélica excesivamente metódica que prolongue este conflicto durante muchos años. ¡Ni hablar! Para ganar, debemos ser rápidos y fuertes. Para ganar, debemos aniquilar a nuestros enemigos con una precisión fulminante. Por eso, bajo mi liderazgo y en coordinación con nuestras fuerzas armadas, aspiramos a resultados efectivos y decisivos. Por eso hoy les ofrezco un vistazo a nuestro futuro. Un futuro, bajo mi dirección, que pondrá fin al esfuerzo bélico y a este conflicto en los próximos tres años\".\n\nLa multitud estalla en una ovación de pie, mezclada con vítores y silbidos. La multitud, llena de elogios y apoyo, dibuja una expresión de éxtasis en el rostro de Rousseau. Sin embargo, incluso mientras sonreía y hacía sus promesas a la multitud, sabía que necesitaba movilizar todo lo posible para hacer realidad esa promesa grandilocuente; porque si fracasaba... sabía muy bien las consecuencias que tendría para él, y mucho menos para su cargo."
 ptf.119.a: "El reloj está en marcha, comandante..."
 ptf.120.t: ""
 ptf.120.d: ""
 ptf.120.a: ""
 ptf.121.t: "El culto a Rousseau"
 ptf.121.d: "Thomas Rousseau observaba por la ventanilla de su comitiva, apreciando la belleza verde y bucólica del paisaje circundante. Las furgonetas negras parecían una serpiente al recorrer los sinuosos caminos, fuera de lugar y extrañas entre los bosques y la vegetación. Tras otra curva, la serpiente aminoró la marcha y se detuvo.\n\nEl pueblo estaba decorado con rojo, blanco y azul, y numerosas banderas americanas y del Frente ondeaban al viento. Innumerables habitantes se habían congregado en la calle principal, y todos guardaban silencio, con la mirada ávida en cada furgoneta. Rousseau sonrió con sorna, se enderezó y abrió la puerta.\nNunca se cansaba de la adulación, de la alegría en los rostros de la gente mientras les estrechaba la mano e intercambiaba breves palabras. Esta multitud en particular tenía un motivo de gratitud, más allá de la presencia vigilante de unos cincuenta soldados. El viejo molino había reabierto, y la nueva tecnología se abría paso rápidamente para rejuvenecer el pueblo. Las antiguas ruinas de la calle principal ya parecían radiantes con nuevas capas de pintura y todos los productos brillantes que el racionamiento permitía. Rousseau echó una última mirada rápida a la multitud, antes de que un grupo de hombres trajeados que esperaban lo escoltara.\n\nEl nuevo molino era una maravilla. Había estado abandonado durante más de una década, y ahora tenía un brillo nuevo. La línea de montaje zumbaba casi en silencio, mientras los trabajadores ensamblaban afanosamente los objetos que se movían lentamente. Rousseau observó un retrato suyo que colgaba en la pared opuesta con una sonrisa de satisfacción. Los supervisores de la fábrica lo recibieron. Al verlo, los trabajadores se alejaron rápidamente de las líneas; un solo técnico concienzudo paró la línea justo a tiempo.\n\nRousseau firmó todo, sonriendo a la multitud que lo adoraba."
 ptf.121.a: "Una gran esperanza blanca."
 ptf.122.t: "Salvando a América"
 ptf.122.d: "Dixville Notch era uno de esos pueblos donde siempre hacía frío. Frío, soso y aislado. Eso era lo que la mayoría pensaba. Resultaba irónico que hubiera experimentado un resurgimiento últimamente. Los peces gordos del Frente Patriota habían encontrado el complejo turístico local Balsams y lo habían renovado para que sirviera como un refugio aislado de los rigores de gobernar su pedazo de América. El pequeño pueblo tenía principalmente nuevos residentes, profesionales en el prestigioso campo del esquí. De los residentes originales, solo quedaba un anciano.\nEse anciano recorrió los pisos recién lacados, pasando junto a las suites, encerrándose en una habitación vacía y resonante. Las ventanas de la habitación proyectaban un resplandor dorado sobre el mármol pálido. El anciano se sentó, tembloroso y maldiciendo, al pie de unas cajas. Con cuidado, despojó el cartón húmedo de su contenido y comenzó a leer.\n\nNadie más que él recordaba realmente las elecciones de medianoche, la comida servida, las cámaras de los medios absorbiendo con entusiasmo la imagen de los primeros votantes para elegir presidente de los Estados Unidos. El anciano sonrió; era tan americano, ¿verdad? Esa sensación, digamos, de tener control sobre el rumbo de la nación, una vocecita que podía formar parte de una ola estridente que derrocaba tiranos o elegía a Reagan. Ahora que sondeaba sus recuerdos, ambos parecían extrañamente similares. Nadie sabía lo bien que lo pasaban. Todo había desaparecido.\nEl anciano deslizó lentamente la caja en el contenedor, se echó la chaqueta por encima de los hombros y se marchó con dificultad. Había una cosa que sabía sobre todo lo que habían atravesado su gran país."
 ptf.122.a: "Nunca había votado por el Frente Patriota."
 ptf.123.t: "Unir la derecha"
 ptf.123.d: "Thomas Rousseau era un hombre de acción; era todo lo que sabía desde el comienzo de toda su vida. Solo mediante la acción y la lucha se podía lograr el cambio en la sociedad; ese era el credo del Frente Patriota. Sin embargo, ahora que el Frente Patriota tenía que gobernar y no rebelarse contra el gobierno, la situación política era muy diferente. Tanto Rousseau como sus colegas conocían una dura verdad: no todo en política se manejaba mediante la acción insurgente. Como todos los demás Gobiernos en activo en el mundo, necesitaría asegurar una alianza entre las diferentes facciones políticas dentro del partido para asegurar el funcionamiento del Congreso del FP. Era algo que cualquier revolucionario, inconformista político o cualquier estudiante universitario de ciencias políticas y justicia social lamentaría como mucho: la formación de coaliciones en una legislatura. Rousseau estaba sentado en su oficina del partido en Boston esa mañana, reflexionando sobre estas monótonas verdades, y sobre todo pensando en las difíciles decisiones que pronto tendría que tomar. Tomó un fajo de papeles con una lista de diferentes personas y facciones dentro del FP a las que podía invitar al gobierno. Observó atentamente los nombres y grupos, pensando qué hacer. Sin embargo, todo se reducía a unas pocas opciones sencillas...\nPodía elegir a los \"radicales\" dentro del FP, incluyendo a miembros del infame CSN. Eran un grupo bastante volátil y siniestro, como mínimo. Sus tendencias nacionalsocialistas, casi descaradas, irritaban e incluso alarmaban a un buen número de personas cercanas a Rousseau. Sin embargo, su radicalismo podía tener un propósito. Eran dedicados, tenaces e inquebrantables en su lucha por el partido y el movimiento. Siempre se requería una lealtad inquebrantable a los ideales del partido en estos tiempos difíciles.\nNo obstante, si tal \"radicalismo\" fuera demasiado problemático para el partido, los moderados dentro del partido podían ser una alternativa. Podría decirse que eran mucho más serenos en su enfoque político y estaban abiertos a, al menos, algún tipo de compromiso. Se tenía la certeza de que no causarían problemas como los de los miembros del CSN. Muchos de ellos simpatizan con el partido y se inspiran mucho en el GOP de antes de la guerra. Son bastante profesionales y se adhieren al establishment político, ya que muchos modelan sus políticas y actividades según el conservadurismo republicano, y especialmente el de Trump. Pero por mucho que estos posibles miembros de la coalición sean \"moderados\" en su enfoque al dirigir el partido, siempre podría haber reacciones negativas por ser demasiado moderados. Se podría acusar a Rousseau o al Congreso de estar demasiado distanciados de la identidad del FP o de ser demasiado débiles en su dedicación a la causa. Lo peor de todo es que, si muchos de estos miembros eran demasiado distantes con respecto a ciertas posturas del partido, movilizar acciones decisivas sobre políticas importantes o urgentes podría resultar mucho más difícil.\nAunque estos dos enfoques eran muy atractivos, era evidente otra opción sencilla: olvidarse de las facciones o la ideología y centrarse en el movimiento. ¿Por qué debería ser una opción semejante absurdo ideológico y puritano? El Frente Patriota no era uno más de esos partidos del establishment, pendencieros e inútiles, de otros países. ¡Olvídense de toda esta idiotez! Este partido no se llama \"Partido CSN\" ni \"Partido Moderado\"; ¡se llama Frente Patriota! El movimiento se construirá en torno a una dedicación unida y singular a esta causa. Este será el objetivo del Congreso del FP al formar este gobierno.\nTras reflexionar un momento sobre estas difíciles decisiones, Rousseau tomó la pluma y comenzó a escribir su decisión final."
 ptf.123.a: "¡Radicales para soluciones radicales! Invita al NJP."
 ptf.123.b: "El pragmatismo vencerá. Invita a los moderados."
 ptf.123.c: "No nos interesa el faccionalismo."
 ptf.124.t: "El Congreso de patriotas"
 ptf.124.d: "El representante Andrews no podía quedarse quieto. Todo en su comportamiento desprendía una inquietud nerviosa. No podía dejar de revisar sus papeles y de pulsar el bolígrafo que tenía sobre el escritorio. Había asistido a cientos de sesiones del Congreso del Frente Patriota, a cientos de reuniones con colegas e innumerables ocasiones en que las cosas se pusieron serias, pero hoy lo superaba todo. Hoy era una de las sesiones más importantes de toda su carrera dentro de la facción \"jacksoniana\" del partido. Hoy sabría si el Congreso del Frente Patriota mantendría su papel como legislatura del partido... o si siquiera seguiría existiendo. Todo estaba a punto de suceder, y no podía dejar de pensar con ansiedad en lo que vendría después.\nEn la importante sesión de hoy, el líder del FP, Thomas Rousseau, presentaría una declaración largamente esperada sobre la asignación de poderes y responsabilidades al Congreso del FP. Todos estaban sentados, murmurando entre sí, esperando que su comandante, con suerte, les diera lo que buscaban. Los jacksonianos habían trabajado a destajo para que todo esto sucediera; las negociaciones, las reuniones a puerta cerrada, la campaña y la discreta influencia tras bambalinas, con la esperanza de que todo esto condujera a ello. Finalmente, Rousseau subió al podio con su carisma habitual, provocando una ronda de aplausos atronadores del Congreso. Mientras Rousseau preparaba el micrófono, el Congreso guardó silencio, escuchando atentamente lo que diría a continuación.\n\"¡Patriotas! ¡Camaradas! ¡Amigos! Gracias por su cálida recepción esta mañana\", comenzó Rousseau. \"Vengo ante ustedes con una decisión importante y un cambio clave en la política del partido\".\nRousseau hizo una pausa, mientras el Congreso, ahora con aún más expectación, escuchaba. \"Tras una larga deliberación y negociación, estoy aquí para anunciar que acepto oficialmente los acuerdos propuestos para la delegación permanente de poderes al Congreso de este partido\", dijo Rousseau con vigor.\n\"Así como nuestros padres fundadores cimentaron esta nación en la separación de poderes y el sistema de pesos y contrapesos, ¡este partido también se basará en estos principios! ¡Este Congreso desempeñará un papel importante no solo en la dirección de este partido, sino también en la América del futuro!\", continuó Rousseau triunfante.\nTodo el Congreso se puso de pie y aplaudió, especialmente los jacksonianos, quienes aplaudieron y vitorearon con un entusiasmo sin precedentes.\nAndrews también se puso de pie y aplaudió con fuerza junto con sus compañeros jacksonianos, consciente de que sus esfuerzos finalmente habían dado sus frutos. El Congreso mantendría su papel y mucho más en el futuro. América obtendría una república no solo basada en el modelo que deseaban los jacksonianos, sino también en el que deseaban los fundadores."
 ptf.124.a: "¡Democracia asegurada! ...por ahora."
 ptf.125.t: "Estableciendo nuevos estándares sociales"
 ptf.125.d: "\"!No pueden hacer eso! ¡Esto es ilegal!\" gritaba la dueña de la tienda. \"No pueden simplemente llevarse todo esto y destruirlo. ¡No entienden lo importante que es para la comunidad local!\"\n\"Tenemos nuestros pedidos\", respondió el minuteman del Frente Patriota con arrogancia, \"este material ha sido reclasificado como obsceno y extremista. Es un delito exponerlo públicamente.\" Tomando ahora una gran caja cerca suya, el minuteman se dirigió a la salida del establecimiento y le gritó a la dueña, \"y además, ¡no me importa!\". La dueña observaba con frustración e ira como los minuteman salían de su establecimiento con toda su colección de carteles y pegatinas del orgullo gay y de Black Lives Matter.\nAhora ayudado por sus camaradas para llevar la inmensa cantidad de material que tomaron de la tienda a la calle, muestran la extensa operación que están llevando a cabo en toda la manzana. Un gran grupo de minutemans del Frente Patriota llevaban y cargaban con grandes cantidades de objetos procedentes de innumerables tiendas, comercios y oficinas que daban a la calle. En sus manos, llevaban cajas en las que habían guardado incontables banderas del orgullo, carteles de BLM, pegatinas, pósteres, banderas comunistas, libros repletos con contenido pornográfico transgénero, y más contenido del ...estilo.\nEn la esquina de la calle, los minuteman echaron todo lo que encontraron en una gran pila y posteriormente la prendieron. La gran pira hecha de parafernalia izquierdista y desviada se podía ver desde un bloque de distancia, iluminando el bulevar por la mañana. El olor de papel y plástico quemado procedente de los libros y banderas saturó el aire de la calle, lo que causó que los pocos curiosos que se habían acercado se taparan la nariz, mientras que los minuteman encontraron ese olor refrescante. Los locales debían saber que en esta nueva América, ya no se toleraría más esos sinsentidos hedonísticos, les guste o no. Para los civiles que veían la quema secretamente a través de sus ventanas, era un momento de tristeza y derrota, pero para los minuteman, fue uno de los momentos que más habían disfrutado en toda su vida."
 ptf.125.a: "Hora de sacar la basura..."
 ptf.126.t: "El Plan de Rescate Americano"
 ptf.126.d: "Numerosos economistas, intelectuales y activistas se han reunido hoy en la ciudad de Búfalo para presentar un plan, largamente gestándose, para revitalizar la economía americana y reconstruir la clase media. El pilar central del plan es el enfoque \"Fe, Familia, Nación\", en el que la economía debe atender las necesidades de la nación, su gente y sus tradiciones, priorizando el crecimiento ilimitado que caracterizó el paradigma neoliberal anterior.\n\nLa estrategia para promulgar esta política implica un método de \"inversión y desinversión\". Se subvencionará a las pequeñas empresas, mientras que las grandes corporaciones estarán obligadas a destinar al menos el 20% de sus ganancias a los trabajadores en forma de cuentas de jubilación y a tener puestos designados por el gobierno en sus juntas directivas. El Estado también ampliará generosamente el sistema de bienestar social gracias a las ganancias de los nuevos monopolios estatales en la fabricación y venta de productos farmacéuticos, junto con otros activos que han sido estatizados."
 ptf.126.a: "Desterrar el deseo."
 ptf.127.t: "Adaptación al nuevo... \"currículo\"."
 ptf.127.d: "A Johnathan nunca le gustó mucho su tiempo en el instituto, una sensación que compartían la mayoría de los adolescentes de su nivel. La monótona rutina y la repetitividad aburrida de las clases era algo que su angustia adolescente jamás podría superar, incluso si las clases se reanudaran en medio de la guerra. Pero ahora que la guerra se había alejado de su pueblo con la toma del poder por parte del Frente Patriota, tenía que volver a la escuela a regañadientes. Sin embargo, su instituto se había vuelto todo menos repetitivo y monótono. De hecho, las cosas habían cambiado en su escuela, con algunas cosas que nunca hubiera esperado en su clase, y mucho menos en todo su pueblo.\nLos primeros días de clases fueron bastante extraños, como mínimo. Muchas de las clases de estudios de género se cancelaron definitivamente, el Club del Orgullo se disolvió, muchos profesores de arte habían desaparecido, todos los clubes de minorías étnicas no europeas se disolvieron y, curiosamente, el programa de gimnasia era completamente diferente. Al entrar a la clase de gimnasia, se encontró con que el gimnasio estaba decorado con carteles y volantes del Frente Patriota, con imágenes rimbombantes. Contempló imágenes de hombres y soldados corpulentos en los carteles, en escenas triunfales de conquista que rivalizaban con la pomposidad de las imágenes de la Italia fascista. Pero ahora tenía que concentrarse en el frente, pues el profesor de gimnasia, un hombre pequeño y rechoncho, comenzaba a reunir a la clase para la instrucción... pero ahora en compañía de un nuevo y extraño invitado.\n\"¡Muy bien, todos!\", anunció el profesor, \"hoy vamos a hacer las cosas un poco diferentes. Para ayudarnos en esta clase está el Sr. Erikson, del Frente Patriota, quien dirigirá el calentamiento de hoy\". El grupo de adolescentes, habitualmente alborotador, permaneció sentado en un silencio intimidado al ver al joven pero corpulento funcionario del partido Frente Patriota, con su característico uniforme azul y blanco.\nEl funcionario del Frente Patriota comenzó a dar una charla a la clase: \"Hoy haremos entrenamiento aeróbico. Para calentar, ¡correremos una milla! ¡Espero que todos sigan el ritmo! Si no lo hacen, se les descontarán los puntos de participación del día. ¿Entendido?\".\nTodos asintieron mientras se alineaban uno detrás del otro para prepararse para la carrera. El entrenador del Frente Patriota les indicó que comenzaran y observó con severidad.\nAl ver a Johnathan jadear y tropezar mientras corría, les recordó con firmeza: \"¡Sigan el ritmo, gente! ¡Sobre todo a los chicos! ¡Nuestra nación no se construirá sobre la pereza y la lentitud!\".\nQuienquiera que fueran estos chicos, pensó Johnathan, sin duda tienen grandes expectativas en alguien como yo..."
 ptf.127.a: "¡Los patriotas no son adictos al sofá!"
 ptf.128.t: "Renacer nacional"
 ptf.128.d: "VIDA, LIBERTAD, VICTORIA\nBOLETÍN DEL FRENTE PATRIOTA, EDICIÓN N° 634\n\nLas calles del centro de Boston, antaño un centro de vagabundos, personas sin hogar y drogadictos, se convirtieron prácticamente de la noche a la mañana en un santuario de la Americana tradicional gracias al Frente Patriota, tras la recuperación de Nueva Inglaterra. Pintorescas tiendas, incluyendo pequeños comercios, cafeterías, fuentes de soda y pequeños negocios, han iluminado la zona, convirtiéndola en un ejemplo perfecto de la cultura y el espíritu americanos, algo que no se veía desde la gloria de los años 50. Las banderas americanas estaban presentes en cada esquina, tanto la de 50 estrellas, la variante de Betsy Ross, como la bandera oficial del grupo que recuperó la libertad de América, decorada con las banderas que habían motivado a una nación a romper sus cadenas y rebelarse contra sus represores globalistas. Nuestros veteranos han realizado numerosas marchas y desfiles por la ciudad, lo que nos permite honrar sus contribuciones a la Segunda Revolución Americana, que permitió el triunfo del alma nacional, manifestándose plenamente en todo el país.\n\nPor supuesto, Boston no es la única ciudad con este fenómeno. Debido al caos causado por las plagas, que lucharon con tanta fuerza y desesperación para mantener su dominio sobre la población americana, varias ciudades del país han sido reconstruidas completamente desde cero, lo que ha permitido un renacimiento cultural y nacional. El declive que ha plagado nuestras ciudades y las ha dejado en ruinas se ha revertido oficialmente, y ha asegurado que el resurgimiento de la cultura ancestral para luchar contra el progresismo no se detenga aquí. Esto también ha tenido un impacto positivo en la economía, ya que ahora más que nunca los patriotas están utilizando el dinero que tanto les ha costado ganar para construir una sociedad próspera, tanto cultural como económicamente."
 ptf.128.a: "¡Una nación renacida!"
 ptf.129.t: "Regreso al pasado"
 ptf.129.d: ""
 ptf.129.a: "Ok."
 ptf.130.t: "Tragarnos el orgullo para sobrevivir"
 ptf.130.d: "Si le preguntas a alguien en cualquier parte del mundo, ¿dónde hay un lugar donde incluso el hombre más común pueda alcanzar el éxito? Responderá que América. El dicho decía: \"Si puedes triunfar aquí, puedes triunfar en cualquier lugar\". Durante muchos años, este país fue la tierra de la prosperidad donde millones luchaban y clamaban por entrar. Ahora todo eso ha terminado, y parece que ha llegado lo contrario. Antes, el mundo suplicaba la caridad de América; ahora, América parecía necesitar la caridad del mundo para su propia supervivencia.\nLas cifras ya habían llegado a todas las oficinas del Frente Patriota. Ninguna ofrecía buenas perspectivas; en cambio, pintaban un panorama apocalíptico. Página tras página detallaban cosas que revolvían el estómago de cualquier americano. La falta de vivienda, la pobreza, el hambre, el sufrimiento; todo esto ocurría a una escala que nadie podría siquiera soñar. El paquete de información más grande que detallaba esto llegó a la oficina del presidente del Congreso del Frente Patriota. Lo leyó todo y sintió una sensación de fatalidad que hacía tiempo que no sentía. El día anterior se dirigió al resto del Congreso con una propuesta que muchos inicialmente consideraron impensable: solicitar ayuda económica extranjera. En la sesión de ayer, muchos no armaron un escándalo, pero él esperaba mucho resentimiento. La percepción de que se había dañado el orgullo americano era algo que pocos tolerarían.\nSin embargo, hoy continuó leyendo los horribles datos, pero también revisó muchas de las respuestas de los representantes a la moción de solicitar ayuda extranjera. La mayoría de las respuestas de los representantes fueron bastante favorables, pero más por el reconocimiento pragmático de que prolongar el sufrimiento de América no beneficiaría al FP. Parecía que la medida saldría adelante, que América recibiría la ayuda que necesitaba, hasta que examinó la última carta del montón. La tomó, la abrió y leyó el encabezamiento, solo para que se le encogiera el corazón.\nLa carta era de los temidos miembros del Consejo Nacional de Seguridad. Su contenido era todo menos solidario. Despotricaba y desvariaba sobre venderse a extranjeros, traicionar a la nación y otras acusaciones descabelladas. La violenta diatriba, escrita a lápiz y papel, fue demasiado incluso para el orador. La dejó, suspirando para sí mismo, pensando que probablemente tendría que lidiar con su ira en el futuro. Pero todo este debate para asegurar la ayuda extranjera destinada a frenar el sufrimiento americano planteaba una pregunta..."
 ptf.130.a: "¿Conservar nuestro estatus o nuestra supervivencia?"
 ptf.131.t: "Volado de la torre de marfil"
 ptf.131.d: "Joshua Gilberg fue una de las incorporaciones más recientes al profesorado de ciencias sociales y políticas de la Universidad de Yale. Un académico relativamente joven pero distinguido en ciencias políticas americanas y estudios de conflictos, había pasado por varias universidades en su camino hacia su institución más preciada: la Universidad de Yale, la mejor de las mejores. Al igual que muchos de sus colegas, tenía una trayectoria destacada como activista dedicado a diversas causas por la justicia social en el campus. Cuando los estudiantes exigían concesiones al profesorado, él estaba allí con ellos; cuando los trabajadores exigían mejores salarios, él estaba allí con ellos; y cuando los ciudadanos locales protestaban por la igualdad racial, él estaba allí con ellos.\n\nSin embargo, desde el comienzo de la guerra, supo que las cosas serían muy diferentes. Le fue fácil publicar artículos y seminarios lanzando las acusaciones y críticas más duras contra los racistas o populistas insidiosos cuando estos ya no podían contraatacar. Pero ahora, desde que el Frente Patriota tomó el control de la ciudad, finalmente tenían la oportunidad de hacerlo, y su ataque sería fatal.\n\nParalizado por un miedo terrible, Joshua solo pudo mirar fijamente la puerta temblorosa mientras los oficiales del otro lado intentaban derribarla. Astillas de madera cubrían el frío suelo cuando la puerta finalmente se abrió de golpe, y varios Minutemen del Frente Patriota marcharon al interior, acompañados por algunos policías locales. Fue recibido por las miradas gélidas de los milicianos enmascarados mientras lo levantaban a la fuerza de su silla. \"Joshua Gilberg\", dijo uno de ellos, \"estás arrestado por cargos de terrorismo, traición, vandalismo y asociación con múltiples organizaciones criminales. Vendrás con nosotros\".\n\nLos oficiales arrastraron al profesor hasta la puerta, donde un vehículo lo esperaba afuera para llevarlo a su destino; y, como sucedió con los profesores de Italia en 1922 y Alemania en 1933, Joshua Gilberg pronto se uniría a ellos en la tumba."
 ptf.131.a: "\"Tus títulos ya no te salvarán\"."
 ptf.132.t: "Construyendo sobre nuestros grandes predecesores"
 ptf.132.d: "Al construir nuestro movimiento, no debemos ignorar que somos producto de un movimiento e ideas que se remontan a tiempos remotos. La lucha por la defensa del mundo occidental contra las fuerzas del comunismo, la anarquía y la degeneración se remonta a muchos años atrás. Mussolini, Hitler, Mosely, Franco y muchos otros forjaron movimientos que infundieron miedo en el corazón de la amenaza izquierdista. Sin embargo, todos ellos ya no están, y hoy nos encontramos en la sede del gran poder, listos para continuar su gran legado. La pregunta es: ¿en quién nos inspiraremos más?\nEn primer lugar, podemos recordar al gran progenitor de todos ellos, el fascismo italiano bajo Benito Mussolini. ¿Cómo podría alguien negar a este gran precursor? ¿Cómo podría alguien ignorar que su propio triunfo está creando el primer estado fascista de Europa? Mussolini y los fascistas italianos sentaron las bases y las ideas centrales que casi todos los regímenes han utilizado desde entonces. Incluso el propio Hitler, el hombre más reconocido en el mundo de la política, utilizó mucho de las teorías de Mussolini. Nosotros, como muchos otros, adoptaremos muchas de sus ideas, como el Estado corporativista, la supremacía del Estado sobre el individuo, la importancia del Duce y otras. ¡El legado de Mussolini seguirá vivo aquí! Si alguien más nos critica por ser \"fascistas\" y otras expresiones absurdas, les diremos como solían decir en Italia: ¡Me Ne Frego!\nNuestra otra opción es observar más de cerca nuestra propia ascendencia anglosajona occidental, Mosely y la Unión Británica de Fascistas. A diferencia de los movimientos de la Europa continental, el movimiento de Mosely es el más familiar para nuestra herencia anglosajona común. Reconoció la importancia de las tradiciones nacionales de Inglaterra y apuntó tanto al cambio radical como a la preservación del carácter nacional. Quizás las posturas de la BUF de Mosely nos sean más útiles, ya que, de todos los movimientos en Europa, parece ser el más adaptable a nuestro propio carácter nacional. Nos mantendremos unidos con nuestros antepasados del norte de Europa y seguiremos sus pasos.\nFinalmente, podemos descartarlo todo y simplemente recurrir a lo más cercano que ya tenemos: nosotros mismos. ¿Por qué deberíamos siquiera buscar en alguien más una idea para construir nuestra sociedad? De hecho, no somos italianos, ni alemanes, ni británicos; ¡somos americanos! Somos una gran nación con una rica historia y tradición. Utilizaremos nuestras propias experiencias, ideas y posturas únicas con total independencia de todo lo demás. Si simplemente intentamos apropiarnos de otros cuando ya tenemos algo que usar, entonces desperdiciamos nuestra propia postura como defensores del gran legado e identidad de esta nación."
 ptf.132.a: "¡Ave! ¡Los italianos sabían como hay que hacerlo!"
 ptf.132.b: "¡Nuestros hermanos anglosajones lo hacen bien!"
 ptf.132.c: "¡Hail Columbia! ¡Lo haremos a nuestra manera!"
 ptf.133.t: "Testamento al futuro"
 ptf.133.d: "La Segunda Guerra Civil Americana es más que un simple conflicto por tierras o recursos, o incluso pura política; es mucho más. Esta guerra es una batalla no solo por el presente, sino por el futuro de esta nación. Cada soldado, cada ejército, cada pequeño estado, cada idea que se desangra y muere ahora en los vastos campos de América, se desangra y muere por reclamar su derecho al futuro; una batalla por el futuro que el Frente Patriota conoce muy bien. Las naciones son producto no solo de su gente, sino de su destino histórico y de la voluntad de sus hijos e hijas más leales.\nNuestro futuro no es de izquierdas ni de derechas, ni de republicanos ni de demócratas, ni de la hoz y el martillo ni de la esvástica, sino de América, algo superior a todo lo demás. Los globalistas, los internacionalistas, los traidores, los especuladores conspiradores y nuestros innumerables enemigos, en su estúpida y simplista visión del mundo, han cometido el error de condenarnos como una chusma común y corriente de bandidos y asesinos. Todos afirman que nuestro futuro es solo muerte y miseria reaccionaria, pero estará lejos de todo lo que jamás han visto.\n¡Nuestro futuro es de gran triunfo y gloria! La podrida y cancerosa fachada moderna de América será derribada y, sobre los cimientos de la tradición americana, surgirá una nueva nación; una nación recuperada. Una nación de orden, disciplina, cultura, poder y victoria traerá consigo una nueva era como ninguna otra. Este país estará unido en torno a su santo propósito y su glorioso legado, tal como lo designaron nuestros grandes antepasados hace tantos años. Así como dominamos los mares, conquistamos las lejanas llanuras de este continente, formamos las mentes más brillantes de generaciones e influimos en el destino de tantos en el extranjero, nosotros también haremos lo mismo en los años venideros. Esta nueva América no conocerá la degeneración y el fracaso que se han cimentado durante décadas y décadas en la América de antaño. El hedonismo, la codicia, la intriga, la deslealtad, la idiotez y todos los fracasos que se celebraron como virtud moderna serán examinados en esta nueva América, como ahora examinamos a los primitivos neandertales, retrógrados y repugnantes. Las naciones del futuro nos inscribirán en los libros de historia durante eones, como los romanos o los griegos. \"Reclamar América\" nunca fue solo un eslogan, fue una ventana, una ventana a nuestro destino como nación.\nTodo esto era algo que todos los hombres del Frente Patriota sabían, y se asegurarían de que el mundo entero lo supiera muy pronto..."
 ptf.133.a: "Será nuestro futuro; un futuro americano."
 ptf.134.t: "El nuevo modelo económico americano"
 ptf.134.d: "La Segunda Guerra Civil Americana causó estragos catastróficos en la economía nacional. Ya afectada por la gran recesión causada por el COVID-19, la guerra civil sumió a la economía en una espiral descendente, posiblemente tan grave o peor que la Gran Depresión de 1929. Todo esto significó la pérdida de empleos, el cierre de negocios y fábricas, el aumento de la indigencia y la destrucción de ahorros. Nueva Inglaterra no era diferente del resto del país en cuanto a sus problemas económicos, pero el Frente Patriota iba a cambiar eso.\nUna gran parte de Boston se había convertido recientemente en un modelo para el recién promocionado \"Plan de Renacer Nacional\" del Frente Patriota; una nueva agenda radical para reconstruir la economía estadounidense. La zona fue despejada de todos los escombros de la guerra, se demolieron los edificios viejos o dañados, se expulsó a las personas sin hogar y los restos quemados de la sede local del Partido Demócrata se convirtieron en un pequeño centro de información para la administración local del Frente Patriota. Sin embargo, el eje central de la reconstrucción y remodelación de la zona fue una flamante fábrica inaugurada por una empresa empacadora de alimentos, construida con la generosa ayuda material y la coordinación del Frente Patriota. Ahora que la vida había vuelto a la normalidad, con el apoyo del Frente Patriota, el negocio, que se tambaleaba, se trasladó de Nueva York a esa zona de Boston esperando una recuperación considerable. La ceremonia de inauguración de la fábrica comenzó con la típica fanfarria del Frente Patriota, e incluso el líder del aparato del partido Frente Patriota de Boston apareció para pronunciar un breve discurso.\nEl discurso no fue extenso, pero destacó algunos de los objetivos del proyecto y algunos de los beneficios inmediatos anunciados... junto con la típica grandilocuencia ideológica del Frente Patriota.\n\"Se espera que este proyecto emplee a cientos de personas de la comunidad local de Boston, con buenos salarios y un fuerte sentido de propósito para una comunidad marcada por los fracasos del pasado\", anunció el líder del partido.\n\"Nuestra nación resurgirá cuando su gente tenga propósito y disciplina. ¡El paso principal para lograrlo es el trabajo duro y el orden! No solo las personas necesitan esta dirección para el éxito, sino también la sociedad\". ¡La recuperación será un éxito rotundo! La multitud que observaba aplaudió y vitoreó ante el estruendoso discurso, pero lo más importante, por el hecho de que ahora podrían conseguir un sustento estable, algo raro en estos días."
 ptf.134.a: "¡El trabajo duro y el propósito harán a América fuerte!"
 ptf.135.t: "Oficina de Asuntos Internos"
 ptf.135.d: "Los ojos de la providencia solían ser una fuerza del bien que garantizaba la seguridad de nuestro pueblo; sin embargo, ahora se han convertido en una sombra de lo que fueron, manejados por cadáveres psicópatas que se niegan a morir, alimentándose del sufrimiento ajeno.\n\nSomos conscientes de las implicaciones de tener nuestra propia agencia de seguridad interna, similar al FBI; sin embargo, lo que nos distingue de los aduladores federales es que amamos a América, un país hermoso y rico, lleno de potencial. Para ellos, es solo un patio de recreo; nos odian.\n\nTenemos enemigos por todas partes: anarquistas, comunistas, traidores y otros tipos de terroristas que se esconden entre los nuestros.\nNo, sería prudente que algunos de nosotros vigiláramos a los nuestros, para nuestra protección y nuestra pureza."
 ptf.135.a: "Por amor, no por malicia."
 ptf.136.t: "Tareas de los Minutemen"
 ptf.136.d: "Como muchos otros movimientos políticos que buscan un cambio social y político radical, contamos con un grupo paramilitar formado por nuestros más devotos, dispuestos a luchar por nuestra causa siempre que sea posible. Estos dedicados combatientes del partido son los Minutemen, listos, como sus antepasados siglos atrás, para tomar las armas en cualquier momento para defender la nación. Nos han acompañado desde el nacimiento del movimiento y han librado las batallas más duras, desde los pueblos más pequeños hasta las ciudades más grandes. Sin embargo, esta guerra requerirá algo más que simplemente disparar y matar a nuestros enemigos. Al igual que muchos otros órganos de nuestro partido con tareas y objetivos específicos, los Minutemen también deben ser asignados. Ha llegado el momento de decidir cómo contribuirán los Minutemen a la causa.\nNuestra primera opción es la más directa y tradicional: irán a luchar al frente como todos los demás. Los Minutemen son una formación dedicada al combate, ¿por qué asignarlos a algo tan ajeno a su verdadero propósito? ¿Por qué negarles su destino? Al igual que los batallones \"M\" de las camisas negras de Mussolini, recibirán sus propias formaciones de combate y lucharán junto a nuestras fuerzas regulares. Ya no serán un simple grupo \"paramilitar\", sino un ejército listo para luchar en las batallas más intensas contra los oponentes más duros. Su dedicación, su fanatismo y su fe los llevarán a la victoria en el frente; estamos seguros de ello. Al igual que el Ejército, la Armada, la Fuerza Aérea o la Infantería de Marina presentes en las fuerzas armadas de otros países, ellos también se convertirán en un componente crucial de nuestras propias fuerzas armadas.\nNuestra segunda opción no es tan grandilocuente, pero podría resultar crucial a largo plazo. Los asignaremos para ayudar y apoyar a la población civil. ¿Cómo podríamos ganar esta guerra si la población civil que nos respalda se muere de hambre, sin hogar o está muerta? No podemos recuperar una América de cadáveres y escombros. Los Minutemen se asegurarán de que el pueblo americano permanezca seguro, a salvo y con un buen apoyo durante estos tiempos tumultuosos. Se les asignará trabajo que podría describirse como de naturaleza \"humanitaria\" o \"filantrópica\". Los miembros de los Minutemen ayudarán a limpiar las calles, donar alimentos, retirar escombros, reconstruir viviendas, brindar asistencia médica y otras actividades relacionadas. La gente confiará en nuestro movimiento cuando vea que hay seguridad y orden bajo nuestro gobierno. Sin embargo, si aún tienen ganas de luchar, les daremos la autorización para perseguir a gánsteres, saqueadores, criminales y carroñeros que se aprovechan de una sociedad sometida a la presión de la guerra. Mientras otros miembros leales de nuestro movimiento luchan en el frente, los Minutemen librarán su propia batalla tras las líneas: la batalla para mantener la sociedad segura y a flote."
 ptf.136.a: "¡Al frente! ¡Todo por la victoria!"
 ptf.136.b: "La ayuda humanitaria es su prioridad."
 ptf.137.t: "Resconstruyendo una nación"
 ptf.137.d: "La Segunda Guerra Civil Americana es ahora el conflicto más devastador que el pueblo americano ha presenciado en más de 150 años. La economía está en caída libre, innumerables personas están sin hogar y hambrientas, las ciudades yacen en ruinas humeantes y millones han muerto; algo que solo se imaginaría ver en Medio Oriente o el África subsahariana. Pero no, esto no es una terrible pesadilla ni una nación exótica y lejana que se ve en televisión. Esto es América, en el aquí y ahora.\n¿Qué hacer? ¿Por dónde empezar? Al menos durante la guerra, el objetivo final era una tarea sencilla. Ahora ya no hay enemigos que derrotar, ni pequeños estados hostiles que conquistar, ni nadie más que se interponga en nuestro camino. Solo nosotros somos responsables del futuro y el bienestar de América. Es impactante simplemente dar un paso atrás y considerar que un grupo político que solía estar formado por solo unos pocos cientos de miembros ahora controla el destino de casi 300 millones de personas. ¿Se ha reclamado América? ¿O simplemente hemos \"recuperado\" una montaña de ceniza, basura y cadáveres ensangrentados?\n¡No! No luchamos contra viento y marea para abandonar a América en su momento de mayor necesidad. La nación ha sido traicionada y arruinada por innumerables enemigos internos y externos; no se les permitirá que la arruinen de nuevo. Bajo nuestro atento liderazgo y guía, esta nación resurgirá y se encontrará en la cima de la grandeza mundial. Nuestro movimiento, que ha movilizado a millones a la causa, volverá a movilizar a millones más para este gran esfuerzo. Todas las fuerzas del Estado, la economía, el partido y, sobre todo, el pueblo, se unirán para reconstruir América. Nuestra gran tarea de reconstruir la nación comienza ahora, y aún queda un largo camino por recorrer para reconstruir lo que tantos han arruinado."
 ptf.137.a: "De \"Reclamar América\" a \"Reconstruir América\"."
 ptf.138.t: "Como nuestros antepasados"
 ptf.138.d: "VIDA, LIBERTAD, VICTORIA\nBOLETÍN DEL FRENTE PATRIOTA, EDICIÓN N° 632\n\nHoy, las últimas fuerzas militares que resistieron la Segunda Revolución Americana se han rendido oficialmente al Frente Patriota. El presidente [PTF.GetLeader] pronunciará un discurso honorable, proclamando el renacimiento de los Estados Unidos de América y el fin de la Guerra Civil que ha sumido a nuestro pueblo durante años, dejando nuestra infraestructura, industria y economía en ruinas, con los esfuerzos de la plaga globalista por quebrantarnos el ánimo e impedir que nuestra marcha fracase estrepitosamente. Ahora, mientras los parásitos son expulsados de nuestra nación, debe quedar claro que, a pesar de la gloria de la Segunda Revolución, aún no ha terminado. Queda mucho por hacer antes de que América pueda ser reclamada, corrigiendo la degeneración que ha estado desgarrando nuestra nación e infiltrándose en la mente de casi todos los americanos. Así como los Padres Fundadores reconstruyeron nuestro país hace siglos tras la liberación de las colonias del tiránico monarca, el rey Jorge III, también nosotros reconstruiremos nuestra nación desde cero. El rejuvenecimiento nacional que vendrá con nuestra victoria ha abierto un futuro brillante, uno que verá el espíritu americano bautizado en fuego y la abolición total de la plutocracia que ha reprimido nuestra herencia e identidad cultural durante tanto tiempo."
 ptf.138.a: "¡Por Dios, tendremos nuestro hogar de nuevo!"
 ptf.139.t: "Nada de Ridin' with Biden"
 ptf.139.d: "La sala del tribunal del centro de Boston nunca fue el centro de atención de ningún caso importante, como lo eran la mayoría de los casos legales triviales, pero hoy fue un caso del siglo para este tribunal. Hoy, todos los asistentes al procedimiento estaban en un estado de absoluta inquietud mientras el jurado discutía nerviosamente el caso en la cabina, los periodistas tomaban notas, los ciudadanos con permiso para observar el caso murmuraban entre sí, todo bajo la atenta mirada de los Minutemen del Frente Patriota, quienes inspeccionaban la sala con severidad para asegurarse de que no se produjeran disturbios. Sin embargo, su actividad se interrumpió en un silencio sepulcral cuando un par de Minutemen del Frente Patriota hicieron entrar al hombre del momento, Joseph R. Biden.\nToda la sala contempló el rostro triste y lastimoso del otrora orgulloso expresidente de Estados Unidos. Biden, el hombre colocado en un pedestal por toda la América liberal como el gran unificador de la nación americana, ahora parecía derrotado y perdido. Parecía exhausto, confundido, como si acabara de levantarse de la cama a las 6 de la mañana; A algunos entre la multitud incluso les costaba mirarlo a los ojos. El presidente ya no tenía personal que le diera una tarjeta de referencia, ni asistentes que lo ayudaran con la sesión informativa, ni empleados del partido que lo guiaran; estaba completamente solo en ese momento. Sus abogados se dirigieron a él para intentar decirle algo sobre el caso, pero lo único que se escuchó del expresidente fue \"¿Encontramos un buen lugar para estacionar aquí?\"\nLos murmullos del abogado y de Biden se interrumpieron cuando el juez se levantó para anunciar el destino de Biden. \"Joseph Robinette Biden, el tribunal, tras una revisión exhaustiva de su caso, lo declara mentalmente incapacitado para ser juzgado. Será puesto en libertad de inmediato\".\nLos ciudadanos y funcionarios del tribunal comenzaron a agitarse y a murmurar, pues nadie podía creer la \"sentencia\" que acababa de dictarse. Biden, aparentemente sin comprender aún lo ocurrido, simplemente respondió al tribunal: \"Les aseguro que Kamala y yo estamos trabajando arduamente para lograr este objetivo...\"\nEl juez, antes de dar por concluido el juicio, miró fijamente al expresidente de los EE.UU.: \"Señor Biden, ¿hay algo más que quiera añadir a este procedimiento que no haya sido mencionado por su defensa?\""
 ptf.139.a: "\"...¡¡¡Soda!!!\""
 ptf.140.t: "Terror panamericano"
 ptf.140.d: "Tom Pavelic era uno de los miembros más longevos del Frente Patriota en su unidad. Un hombre dedicado a la causa hasta la médula; había vivido desde los primeros días de la guerra hasta los últimos con el Frente Patriota, algo que los demás miembros de su unidad jamás olvidaron. Después de tanto tiempo marchando entre el dolor, el sufrimiento y la lucha, ¡América finalmente estaba a su alcance! La recuperación de América ya no era un eslogan, era una realidad. Había marchado desde Nueva Inglaterra hasta California, una hazaña que ninguna persona promedio podría ver en su vida. Ahora, estaba en las entrañas de la bestia izquierdista, California, la cuna del EPLA, y ahora... iba a hacerla chillar y sufrir antes de abatirla definitivamente. Había esperado este momento toda su vida e iba a disfrutar cada segundo.\nTom, ahora con un gran contingente de \"Minutemen\" del Frente Patriota, había llegado para su misión más importante del día: liquidar las células comunistas y anarquistas dentro de la Universidad de California, Berkeley. En una mano, tenía una lista del tamaño de una guía telefónica de \"terroristas\" y \"enemigos del Estado\", y en la otra, un rifle AR-15 para dictarles su \"sentencia\". Al entrar en uno de los enormes dormitorios del campus, comenzó su redada.\nLlamó a su primera puerta. \"¿Jessica Edelstein?\", preguntó, y la puerta se abrió, revelando al asustado estudiante universitario, quien fue rápidamente golpeado en la cabeza con la culata de un rifle y arrastrado fuera por los otros Minutemen. Fue a la siguiente, \"¿Ed Hernandes?\", la puerta se abrió y se realizó el mismo procedimiento con él. Luego fue a la habitación contigua, un par de metros más allá del pasillo, y golpeó con firmeza la puerta. \"¿Will Jefferson?\", preguntó, pero la puerta, sin embargo, no se abrió. Los otros Minutemen empujaron y patearon la puerta violentamente hasta que la cerradura se rompió y la abrió, revelando al estudiante, que estaba acurrucado en un rincón. Los Minutemen entraron en la habitación y sacaron a la fuerza al joven, que gritaba y pateaba, de su habitación al pasillo. \"¡POR FAVOR! ¡SUELTENME! ¡NO HE HECHO NADA! ¡POR FAVOR! ¡POR FAVOR!\". Irritado por el joven que se retorcía, Tom lo golpeó brutalmente en la cabeza y la cara con la culata de su rifle y le gritó: \"¡Vienes con nosotros! ¡CAMARADA!\". El joven comunista, magullado y ensangrentado, gimió y lloró en voz baja mientras Tom observaba cómo los otros Minutemen lo arrastraban afuera con los demás. Tom pasó a la siguiente habitación, y a la siguiente, y a la siguiente, y a la siguiente...\nAfuera, un escuadrón entero de Minutemen del FP esperaba, recogiendo a decenas de cientos de estos \"enemigos\" para cargarlos en un camión y enviarlos a su... \"juicio\" y \"sentencia\"."
 ptf.140.a: "¡Tu revolución acaba aquí!"
 ptf.141.t: "Usurpadores de la tradición americana"
 ptf.141.d: "Esta guerra por el corazón y el alma de la nación y el pueblo americanos se topará naturalmente con oportunistas y otros ilegítimos envueltos en un tenue velo de autopromoción moral; pero vemos a través de su disfraz. El Partido Republicano, tanto de la América de antes de la guerra como de la actual, ha abandonado la causa de la nación americana por la vergonzosa causa del lucro personal y la intriga. Gastan millones de dólares para hablar con tanta seguridad al pueblo americano que se consideran los campeones del patriotismo americano y los valores conservadores, pero han demostrado todo menos defender tales causas. Bajo su liderazgo, América se ha desintegrado y el pueblo que dicen defender ha caído en la degeneración y el fracaso. Su grupo está repleto de globalistas, usureros ricos, imbéciles y otras criaturas que merecen estar en una celda. La podredumbre que esconden bajo sus trajes y corbatas ahora ha sido expuesta al mundo y la vemos en su totalidad. Su degenerado y rechoncho mesías autoproclamado es el peor de todos: Donald Trump.\n¿Cómo es posible que el supuesto \"león\" de la causa por América haya sido, durante el noventa por ciento de su existencia, un opulento demócrata globalista de Nueva York? Ese bufón regordete y naranja pasó más tiempo con prostitutas, estrellas porno y fenómenos transgénero queer que luchando por verdaderos valores conservadores. Las mayores obras de su vida se basan en los valores sociales más decrépitos y rancios. El único lugar que le corresponde a sus interminables casinos y opulencia kitsch es Sodoma y Gomorra; construyó un imperio de pecado, no de éxito. Su conservadurismo solo se hace evidente cuando le proporciona las mayores ganancias y audiencia televisiva. Los mentirosos y especuladores que lo rodean no son mejores. ¡Su grupo de telepredicadores y secuaces corporativos pueden unirse a él en el fondo de su retrete dorado en Nueva York!\n¡Estos engaños y mentiras no nos engañan en absoluto! Hemos recogido la antorcha de América que estos republicanos y su falso mesías queer, Trump, abandonaron hace mucho tiempo. El mundo será testigo cuando desenmascaremos a estos mentirosos y devolvamos los verdaderos valores que América debería defender. Nuestra recuperación expulsará a estos falsos americanos de su trono de becerro de oro y los llevará a su verdadero hogar... ¡el basurero!"
 ptf.141.a: "¡Estos fraudes no durarán!"
 ptf.142.t: "Nuevas lecciones sobre \"extremismo\""
 ptf.142.d: "Si había algo que le importaba al Frente Patriota, además de ganar en el campo de batalla, era consolidar sus ideas en todos los ámbitos de la sociedad americana. La universidad local de New Haven había recibido recientemente una extensa lista de cambios en su plan de estudios. Gran parte de la extensa burocracia académica universitaria, creada para la educación y la defensa del \"extremismo de ultraderecha\", fue desmantelada en un solo día. En su lugar, las autoridades del FP dictaron un nuevo conjunto de directrices y un plan de estudios con un fuerte enfoque en el comunismo. Estaba muy claro el rumbo que las nuevas autoridades querían tomar en materia de educación.\nLa mayoría de los profesores del campus estaban consternados por los cambios, pero tuvieron que aceptarlos para evitar que las autoridades los acusaran de \"terroristas\" o \"traidores\". Uno de los profesores de historia tuvo que cambiar todo el horario del semestre debido a las nuevas directrices, especialmente debido al extenso memorando que recibió del decano. Pero sabía que los representantes del PF, que ahora controlaban al personal universitario desde oficinas ocultas, eran quienes realmente lo escribieron. La introducción dejaba claras sus intenciones...\nSOBRE EL PLAN DE ESTUDIOS REESTRUCTURADO PARA ESTUDIANTES DE CIENCIAS SOCIALES:\nCon base en las recientes decisiones y desarrollos dentro de la sociedad nacional americana, el plan de estudios universitario debe centrarse en educar al estudiantado sobre las características criminales y genocidas del comunismo y el anarquismo. Estas ideologías han causado más muerte y destrucción que cualquier otra cosa en este planeta. Debería ser nuestro deber como educadores evitar que la próxima generación de americanos caiga en la trampa de tales ideas extremistas. Tales creencias, que violan la seguridad y la confianza de nuestra comunidad, no tienen cabida en nuestro campus. Los nuevos planes de estudio para el semestre se incluyen a continuación.\nEl profesor dejó el memorándum, avergonzado por lo familiar que le resultaba la jerga del mismo. No se equivocaron en el tema en sí, pero se maldijo a sí mismo, sabiendo que si estuviera en la posición del FP, él y sus colegas probablemente habrían escrito y hecho exactamente lo mismo."
 ptf.142.a: "¡La historia está de nuestro lado ahora!"
 ptf.143.t: "Destino del león"
 ptf.143.d: "El tribunal del centro de Boston nunca fue el centro de atención de ningún caso importante, como sí lo eran la mayoría de los casos legales triviales, pero hoy fue un caso del siglo para este tribunal. Hoy, todos los asistentes al procedimiento estaban en un estado de absoluta inquietud mientras el jurado discutía nerviosamente el caso en la cabina, los periodistas tomaban notas, los ciudadanos con permiso para observar el caso murmuraban entre sí, todo bajo la atenta mirada de los Minutemen del Frente Patriota, quienes inspeccionaban la sala con severidad para asegurarse de que no se produjeran disturbios. Sin embargo, su actividad se interrumpió en un silencio sepulcral cuando un par de Minutemen del Frente Patriota hicieron entrar al hombre del momento, Donald J. Trump.\nAllí estaba, el patriota, el populista, el hombre del pueblo, el poderoso león americano; cansado, hambriento y esposado, ahora llevado a juicio. Nadie en la sala podía creer que el hombre que dedicó tanto tiempo a desafiar al establishment, a los globalistas, a la izquierda y a todas las demás fuerzas que operaban en su contra pudiera verse reducido a semejante destino. El hombre que tanto se dedicó al patriotismo americano y a \"hacer a América grande otra vez\" estaba a punto de ser condenado a prisión o algo peor por sus propios compatriotas americanos. Parece que el destino tiene su lado irónico...\n\"Donald J. Trump, por favor, póngase de pie para su sentencia\", ordenó el juez.\nTrump se puso de pie junto a sus abogados, a quienes el juez les dictó sentencia. \"El tribunal lo declara a usted, Donald John Trump, culpable de traición, fraude, evasión fiscal, conspiración y múltiples cargos de graves indecencias sociales. La sentencia es cadena perpetua sin posibilidad de libertad condicional\".\nTrump, sin decir ni una palabra, simplemente se quedó allí, ante la mirada de cientos de personas que lo observaban, absorbiéndolo todo. Nadie podía saber qué pasaba por su cabeza en ese momento, pero su solemne seriedad indicaba que probablemente sabía lo que le esperaba. Trump y sus abogados fueron escoltados rápidamente por los mismos Minutemen que lo acompañaron a la sala al principio.\nEl momento exacto en que Trump salió de la sala fue la última imagen que el público tuvo del expresidente..."
 ptf.143.a: "Así termina la vida de un patriota a manos de otro."

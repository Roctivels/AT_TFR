 PTF_low_popular_support_idea: "Apoyo popular bajo"
 PTF_low_popular_support_idea_desc: "A medida que nuestro movimiento resurge de las cenizas de la plaga globalista que ha contaminado América durante un siglo, es evidente que no hemos logrado el apoyo de la mayoría de la población americana. La manipulación de los medios de comunicación, el adoctrinamiento de los niños americanos y la decadencia social que ha vuelto a los americanos complacientes con su propia represión han consumido por completo a la otrora orgullosa nación. Incluso mientras nosotros, los cruzados por una nueva América, descendemos para rescatarla de los parásitos, aún nos encontraremos con el obstáculo de la infiltración izquierdista en las mentes de cientos de millones de americanos. Si queremos tener éxito en nuestra gran misión, debemos sanar a América y enseñarle a la gente lo que los cosmopolitas de Washington les han estado haciendo. Solo entonces, América podrá renacer."

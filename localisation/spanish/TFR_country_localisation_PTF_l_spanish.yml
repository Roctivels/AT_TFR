 ptf.38.t: "El Tercer Trato"
 ptf.38.d: "Como vencedores de la Campaña de Nueva Inglaterra y la Segunda Convención Constitucional, los Camisas Azules se mantienen firmes en el noreste de América. Mientras nos preparamos para cruzar el Rubicón y marchar sobre Washington, iniciamos la reconstrucción de nuestras tierras ya recuperadas y sentamos las bases de nuestra nación.\n\nEn medio de la tumultuosa vorágine de la Segunda Guerra Civil Americana, lanzamos una iniciativa arraigada en nuestro ilustre pasado, pero adaptada a nuestro complejo presente: la iniciativa del Tercer Trato. Servirá como piedra angular para la próxima era de América.\n\nPara reconstruir América desde cero, debemos abordar las causas fundamentales que llevaron a la caída de la antigua república:\n\n1. La catastróficamente incompetente clase dirigente\n2. El libertinaje económico\n3. El derrotismo social\n4. La unidad fragmentada\n5. El liberalismo\n\nUnidos, insuflaremos nueva vida a esta majestuosa nación. Bajo el inmenso alcance de nuestra estrella guía, nuestra América resurgirá, desafiante y renacida, de las brasas olvidadas de la antigua república."
 ptf.38.a: "Americae invictus!"
 ptf.39.t: "Nihilismo social"

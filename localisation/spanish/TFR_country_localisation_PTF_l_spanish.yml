 ptf.83.t: "Formación del Segundo Ejército Continental"
 ptf.83.d: "Las revoluciones no se hacen con palabras dulces y grandes promesas; no, solo el fuego y el acero pueden proporcionar los medios para generar un gran cambio.\nDe la misma manera que nuestros antepasados lucharon contra el tirano, con un ejército forjado por valientes y audaces, expulsaremos a los agentes del capital global al océano.\n\nDe la misma manera que Washington guió a las personas más grandes de la tierra a la victoria, así rescataremos a los oprimidos del fango del nihilismo para elevarlos a la grandeza, a través de senderos de fuego.\nVida, propósito, hermandad.\n\nLa vieja América arde; mantendremos encendida la antorcha de una nueva América.\nUn nuevo Ejército Continental se creará a través de la lucha, renacido y puro."
 ptf.83.a: "¡Reclamar América!"

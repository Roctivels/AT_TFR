 ptf.1.t: "Nueva Inglaterra reclamada"
 ptf.1.d: "Cuando Thomas Rousseau fundó el Frente Patriota a finales de 2017, siendo apenas un adolescente, siempre soñó con liderar ejércitos victoriosos para expulsar a los globalistas de América, estado por estado. Pero nunca imaginó que este proceso comenzaría precisamente en Nueva Inglaterra. En cierto modo, fue poético. Así como la revolución de Washington estalló en Nueva Inglaterra, también lo hizo la de Rousseau.\n\nTras meses de brutal guerra contra diversas milicias antifascistas y libertarias, gobiernos estatales, fuerzas policiales y elementos federales, los ejércitos del Frente Patriota finalmente han \"reclamado\" el noreste de Estados Unidos y Nueva Inglaterra, tomando el control de una parte significativa de los centros económicos y poblacionales del país, incluyendo Nueva York y Boston. Con el noreste firmemente bajo el control del Frente Patriota, Rousseau puede ahora centrarse finalmente en fortalecer su fuerza militar, aplastar a los insurgentes leales en las regiones bajo su control y seguir fortaleciendo su posición dentro de la organización.\n\nAl sur, en Pensilvania y Nueva Jersey, se encuentran importantes fuerzas federalistas bajo el mando del gobierno de Biden, la \"Unión de América\", con sede en Washington D.C. Estas fuerzas constituyen la última barrera significativa entre los ejércitos de Rousseau en el norte y la capital. Si el Frente Patriota logra aplastar a estas fuerzas y tomar la capital, poco impedirá que las tropas de Rousseau controlen los Apalaches y casi todas las tierras al este. Por ahora, Rousseau tendrá que esperar, pero el camino hacia la victoria está cada vez más claro para el Frente Patriota."
 ptf.1.a: "Nos preparamos para marchar al sur."
 ptf.2.t: "Traidores de negro"
 ptf.2.d: "¡Traidores entre nosotros! Nuestra sede acaba de arder en llamas tras la detonación de una letanía de bombas dentro del edificio. Bomberos y policías heroicos acordonaron de inmediato el lugar y comenzaron a extinguir el incendio. Si bien su heroísmo fue inmenso, no pudieron salvar a la docena de miembros del frente que permanecían en el edificio. Trágicamente, Sir Thomas Rousseau, leal camarada y amigo de América, murió en este acto de terror.\n\nLos autores de este atroz acto han recurrido a las redes sociales y a emisoras de radio anónimas para promover la causa del Club Nacionalista Social, afirmando que nuestro gobierno se había vendido a los globalistas y otras \"entidades federales\", y que planeaba acorralar a los verdaderos creyentes para enviarlos a su perdición en territorio hostil. Sus escandalosas acusaciones incluyen que el propio Rousseau fue sobornado con éxito por las Naciones Unidas y que desde entonces ha huido del país a una lujosa residencia en Europa.\n\nEstos hombres se han armado y han tomado el control de vastas extensiones de nuestro territorio, proclamando su lealtad a Chris Hood. Entre ellos se encuentran varios hombres a quienes Rousseau y sus camaradas consideraban aliados, como Erick Striker y Warren Balogh. Muchos miembros del PNJ también están ahora en el bando enemigo.\n\nLos días más oscuros han llegado. Solo podemos esperar que nuestra causa salga con vida de esta tormenta."
 ptf.2.a: "Los traidores se pudren en el noveno círculo."
 ptf.3.t: "El Frente Patriota triunfa"

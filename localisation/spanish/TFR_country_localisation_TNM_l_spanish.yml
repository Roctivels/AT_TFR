l_spanish:
 tnm.1.t: "¡Los republicanos se dividen!"
 tnm.1.d: "Tras semanas de trabajo con legisladores Republicanos pertenecientes a nuestro recién formado Congreso Texano, hemos sido informados de que la parte del GOP que está dispuesta a trabajar con nosotros ha cruzado la frontera y escapado hacia jurisdicción Federal. \n\nPoco después de su cruce, nuestra comunicación con el Gobernador Abbott se cortó abruptamente, y fue seguida por la declaración oficial de nuestro movimiento como una organización secesionista y terrorista."
 tnm.1.a: "¡No olvidaremos vuestra traición!"

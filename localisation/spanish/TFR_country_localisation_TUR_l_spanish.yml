 turkey.2.t: "[TUR.GetNameDefCap] abandona la OTAN"
 turkey.2.d: "Tras unas elecciones muy disputadas, ganadas por el presidente Erdogan por un estrecho margen, las acusaciones de injerencia extranjera han cobrado protagonismo. Ante un mar de simpatizantes del AKP vestidos de rojo y blanco, Erdogan lanzó una dura reprimenda a la Organización del Tratado del Atlántico Norte, acusando a varios Estados miembros, en concreto a [GER.GetNameDef], de \"socavar la soberanía turca\" e intentar influir en el voto de la oposición.\n\n\"Intentaron decidir por nuestro pueblo. Fracasaron\", bramó.\n\nEn su encendido discurso, Erdogan declaró a la OTAN una \"organización difunta y de facto muerta\", citando la ausencia del liderazgo estadounidense como el último clavo en su ataúd. \"Ya no cumplimos ningún propósito en una alianza que no puede proteger su propia unidad\", proclamó, entre estruendosos aplausos. A continuación, se comprometió a iniciar los trámites formales para retirar a [TUR.GetNameDef] de la OTAN, lo que causó conmoción en toda Europa y en la comunidad internacional en general.\n\nCon este drástico giro, Turquía, antaño pilar del flanco sur de la OTAN, emprende ahora un nuevo camino, definido por el creciente soberanismo y la ambición regional de Erdogan. Lo que sigue podría reconfigurar el equilibrio de poder en el Mediterráneo Oriental y más allá, en un momento en que las tensiones entre Europa y Rusia se vuelven cada vez más volátiles."
 turkey.2.a: "¿Habla en serio?"
 turkey.3.t: "Erdogan es reelecto en Turquía"
 turkey.3.d: "¡Maldita sea! ¡Se enteró de que intentábamos destituirlo y ahora se va de la OTAN!"
 turkey.3.a: "Scheiße!"
 turkey.4.t: "Kemal Kilicdaroglu electo en Turquía"
 turkey.4.d: "¡Afortunadamente, nuestra incursión 100% democrática en los asuntos internos turcos ha dado frutos!"
 turkey.4.a: "Ningún país es libre si no es democrático."
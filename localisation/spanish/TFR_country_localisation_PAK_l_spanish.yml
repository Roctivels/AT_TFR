 PAK.6.t: "La guerra indo-pakistaní se torna nuclear"
 PAK.6.d: "El actual conflicto entre India y Pakistán ha alcanzado hoy un hito catastrófico al intercambiar ambas naciones armas nucleares, desencadenando un desastre humanitario y ecológico de proporciones incalculables. Los líderes mundiales han instado a una desescalada inmediata a la vista de las devastadoras consecuencias tanto para ambos países como para la comunidad internacional.\n\nEl conflicto, que se ha prolongado durante meses, ha llevado la tensión a niveles sin precedentes, ya que ambas naciones han protagonizado una serie de enfrentamientos militares a lo largo de su disputada frontera. Los analistas temían desde hacía tiempo que la situación se descontrolara y desembocara en un intercambio nuclear entre los dos vecinos nuclearmente armados.\n\nLa primera detonación nuclear se produjo cerca de una importante instalación militar en Pakistán, seguida poco después por un ataque de represalia en suelo indio. Los informes estiman en cientos de miles el número de víctimas y en millones los afectados por la lluvia radiactiva. Aún no se conoce el alcance de la destrucción, y las labores de rescate se ven dificultadas por las caóticas condiciones sobre el terreno. Esta crisis sin precedentes ha suscitado preocupación por la posible desestabilización de la región y las consecuencias a largo plazo para el medio ambiente mundial. Los expertos advierten de que las secuelas podrían tener un impacto duradero en el clima, la agricultura y la salud pública, afectando potencialmente a miles de millones de personas en todo el mundo. El mundo observa horrorizado cómo estas dos naciones se enfrentan a las consecuencias de sus actos."
 PAK.6.a: "El horror..."
 PAK.7.t: "Guerra indo-pakistaní"
 PAK.7.d: "El conflicto de Cachemira ha alcanzado su punto álgido tras el cruce de la línea de control por parte de tropas indias hacia Pakistán, desatando una guerra abierta entre ambos países. La disputa de Cachemira ha sido un tema históricamente delicado tanto para indios como para pakistaníes, y ha sido un punto de discordia en los últimos tiempos debido a la actividad de insurgentes pro-Pakistán en la zona que, según la India, están financiados por el Gobierno pakistaní.\n\nLa crisis fronteriza comenzó con enfrentamientos entre insurgentes y fuerzas de seguridad indias en la región. Cuando el ejército pakistaní se movilizó unos días después para intentar forzar una negociación, la India respondió de la misma manera, convirtiendo pronto la frontera indo-pakistaní en la frontera más militarizada del mundo.\n\nPor primera vez en la historia, ha estallado una guerra entre dos potencias nucleares, mientras el mundo reza para que el demonio atómico no salga de la caja de Pandora. Muchos grupos insurgentes respaldados por la India, como el Frente de Liberación de Baluchistán y el Ejército de Liberación de Sindhudesh, se han alzado en una guerra activa para apoyar el avance indio. Independientemente del resultado, muchos predicen que el número de muertos en el conflicto ascenderá a millones."
 PAK.7.a: "El reloj alcanzó la medianoche."
 PAK.12.t: "Pakistán se une a IDEA"
 PAK.12.d: "En respuesta a la India uniéndose a la OTDP"
 PAK.12.a: "Está bien."
 PAK.13.t: "Tratado de paz de Nueva Delhi"
 PAK.13.d: "Recientemente, bajo la mediación china, Pakistán e India, dos importantes naciones en conflicto militar por la disputada región de Cachemira, finalmente alcanzaron un alto el fuego. Ambos países firmarán este acuerdo de paz en Nueva Delhi, capital de la India.\n\nLa disputa por Cachemira ha dado lugar a varios conflictos históricos relacionados con la política, la religión, la etnia y el poder militar. Desde una perspectiva externa, esta última guerra no solo es la culminación de la escalada de tensiones entre ambas naciones, sino también la continuación de antiguos conflictos históricos. Ambas partes buscaban resolver el asunto de una vez por todas mediante este enfrentamiento militar.\n\nTras un prolongado período de guerra, con los recursos y la paciencia agotados, ambas partes han vuelto a la mesa de negociaciones, acordando un alto el fuego total y firmando el acuerdo, lo que restablece la paz temporal en sus respectivos territorios."
 PAK.13.a: "Al menos, ambas partes pueden cantar victoria."

l_spanish:
 GMA_no_compromise_with_statists:0 "Sin compromiso con los estatistas"
 GMA_no_compromise_with_statists_desc:0 "No nos rebelamos contra el Gobierno federal sólo para ayudarles a asegurar Nueva Inglaterra, sólo mediante la guerra total contra los federales y los fascistas saldremos victoriosos del continente americano."
 GMA_Anti_Fascism_Focus:0 "Enfoque antifascista"
 GMA_Anti_Fascism_Focus_desc:0 "El antifascismo es el pan de cada día de la Asociación, llevamos luchando contra el autoritarismo más tiempo del que la mayoría de estos fascistas llevan fuera del instituto."
 GMA_Anti_Capitalism_Focus:0 "Foco Anticapitalista"
 GMA_Anti_Capitalism_Focus_desc:0 "Aunque una gran parte de nuestra Asociación cree en el libre mercado, una declaración sobre la abolición del Capitalismo conduciría sin duda a un mayor apoyo a los partidos de izquierda, pero perjudicaría nuestras relaciones con los Hijos de la Libertad."
 GMA_burden_of_gaia:0 "La belleza de Gaia"
 GMA_burden_of_gaia_desc:0 "La belleza natural de la Tierra es un espectáculo digno de verse, sin embargo, los industriales estadounidenses y la élite mundial trabajan constantemente para destruir su belleza natural y sustituirla por cosas como edificios fríos y metálicos."
 GMA_burden_of_atlas:0 "La carga de Atlas"
 GMA_burden_of_atlas_desc:0 "El verdadero capitalismo es una idea que aún no se ha puesto verdaderamente a prueba, ya que el verdadero capitalismo está desprovisto de autoritarios que desean utilizar el capital para hacerse con el control de las vidas de quienes les rodean."
 GMA_invite_ELF_veterans:0 "Invitar a veteranos de la ELF"
 GMA_invite_ELF_veterans_desc:0 "El ELF ha sido extraoficialmente una parte de nuestra organización más grande por un tiempo en este punto, con muchos de sus miembros que ocupan puestos de alto rango dentro de nuestra organización también. Además de una invitación nacional prometiendo libertad y seguridad a los veteranos que aún no se hayan unido a nuestra causa, también intentaremos liberar a todos los veteranos del ELF que podamos para que nos ayuden en nuestra lucha contra el Gobierno."
 GMA_destroy_the_heirarchal_capitalists:0 "Reinado de los Libertarios"
 GMA_destroy_the_heirarchal_capitalists_desc:0 "Los Libertarios han tenido, durante demasiado tiempo, demasiado poder dentro de la Asociación de los Libres, es hora de que extirpemos quirúrgicamente este cáncer de nuestra tierra. \nSin embargo, debemos ser pacientes con la extirpación de este tumor, ya que cualquier intento de apresurar su eliminación del poder podría conducir en última instancia a un colapso total de la Asociación."
 GMA_crush_the_enemies_of_property:0 "Aplastar a los comunistas"
 GMA_crush_the_enemies_of_property_desc:0 "Los comunistas han tenido durante demasiado tiempo un poder casi absoluto en la Asociación, ya es hora de que los Hijos de la Libertad asuman su papel como facción líder dentro de la Asociación. \nSin embargo, puede que a los anarquistas no les haga mucha gracia renunciar al poder que ostentan actualmente."
 GMA_open_our_door_to_pmcs:0 "Abrir nuestra puerta a las sociedades militares privadas"
 GMA_open_our_door_to_pmcs_desc:0 "CMPs: un grupo de individuos moralmente ambiguos que prefieren el dinero a la lealtad nacional, y nuestros futuros empleados. Estos individuos altamente capacitados pueden proporcionarnos protección y ayudar a nuestros ejércitos a cambio de un precio."

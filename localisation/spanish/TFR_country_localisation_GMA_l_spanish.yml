 GMA_the_psychedelic_experience_desc:0 ""
 GMA_stomp_out_the_parasites:0 "Eliminar a los parásitos"
 GMA_stomp_out_the_parasites_desc:0 "Con la tragedia de los últimos años y la plaga de ideologías caducas que se extiende ahora como una manada de langostas por nuestra otrora gran nación, ya es hora de que contraataquemos y reclamemos lo que es nuestra verdad. Lo peor de estos grupos son los anarquistas que intentan bastardear las ideas de libertad y libertad para quemar casas. \nEstas no son personas nuestras que desean la libertad, sólo pretenden sembrar la discordia, la desconfianza y el desprecio entre nuestras justas comunidades de individuos de ideas afines y debemos protegernos al máximo contra esta enfermedad de la mente. Debemos cortar esta mala hierba de raíz antes de que podamos fortalecer nuestro movimiento."
 GMA_Life_Liberty_Happiness:0 "Vida, libertad y búsqueda de la felicidad"
 GMA_Life_Liberty_Happiness_desc:0 "Se suponía que América era una nación democrática para todos, no un pozo negro totalitario de leyes que restringían nuestros derechos como hombres y mujeres libres de actuar como nos plazca. Pero, por desgracia, la nación no podía ser verdaderamente libre y mira lo que fue de ella. El colapso civil y el cambio de la sociedad tal y como la vemos. Con el libertarismo al timón de este barco, avanzaremos hacia la grandeza."
 GMA_Tread_on_the_Snakes:0 "Pisar las serpientes"
 GMA_Tread_on_the_Snakes_desc:0 "Estos llamados \"libertarios\" pueden intentar protestar y denunciar nuestra autoridad corporativa, pero sinceramente no significan nada. La gran mayoría de los libertarios son hombres de cuarenta años en sillones denunciando la llamada injusticia. Son un mero obstáculo en nuestro camino. Nuestros profesionales capacitados son más adecuados para liderar que la chusma de unos pocos veteranos desorganizados y fuera de contacto."
 GMA_vigilante_justice:0 "Justicia del Vigilante"
 GMA_vigilante_justice_desc:0 ""
 GMA_year_zero:0 "Año cero"
 GMA_year_zero_desc:0 ""
 GMA_radical_reconstruction:0 "Reconstrucción radical"
 GMA_radical_reconstruction_desc:0 ""
 GMA_utopian_communalism:0 "Comunalismo utópico"
 GMA_utopian_communalism_desc:0 ""
 GMA_review_the_articles_of_confederation:0 "Repasar los Artículos de la Confederación"
 GMA_review_the_articles_of_confederation_desc:0 "Originalmente, en la larga e ilustre historia de los Estados Unidos, antes de que la Constitución fuera ratificada como ley, los Artículos de la Confederación eran el sistema original por el que se regían los estadounidenses. Muchos tuvieron problemas con dichos Artículos, sin embargo con el tiempo forjaremos una legislación más igualitaria y libre. América fue una vez buena, pero su control la llevó a la ruina. Con la libertad como principio rector, marcaremos el camino para todos."
 GMA_Flaws_of_Democracy:0 "Los defectos de la democracia"
 GMA_Flaws_of_Democracy_desc:0 "La democracia es una cosa tan voluble, hay tantas cosas que pueden llevar al despotismo del más alto orden con el sistema. Realmente es una de las formas de gobierno más defectuosas y nosotros, como pueblo, no debemos tolerarla. Tenemos que cambiar el punto de vista hacia lo que es la verdadera democracia y eso es una mano libre para hacer lo que nos plazca y no estar encadenados por los que están en la capital y dirigen el poder sobre nosotros."
 GMA_Protection_for_a_Price:0 "Protección por un precio"
 GMA_Protection_for_a_Price_desc:0 "En la historia del mundo, la diplomacia no es lo que convirtió a las naciones en imperios. Fueron sus fuerzas armadas y las pruebas de combate las que las llevaron a la grandeza. Si queremos mantenernos en ese pedestal entre las demás grandes naciones, es imperativo que nuestros Contratistas Militares Privados, lo mejor de lo mejor en cuanto a fuerzas armadas en este cadáver decadente de nación, tengan una mayor influencia en nuestra sociedad y en nuestra vida cotidiana. Nuestros ciudadanos, a su debido tiempo, aprenderán a respetar a nuestros soldados de fortuna."
 GMA_Standardize_Cryptocurrency: "Normalizar la criptomoneda"
 GMA_Standardize_Cryptocurrency_desc: "Como el verdadero Libertarianismo no ha sido considerado ni respetado en el pensamiento moderno. Para liberarnos realmente de la pesada mano de un mercado regulado debemos encontrar otras formas de moneda. Una de ellas, y muy popular en este momento, es la Criptodivisa. Esta moneda del futuro de la nueva era no está regulada y sigue al mercado. Las maravillas que esta arma tiene la gente para luchar contra el Estado es realmente sorprendente y superará la necesidad de tales regulaciones que el Gobierno tenía en tiempos pasados."
 GMA_Restore_the_Continental_Congress: "Restablecer el Congreso Continental"
 GMA_Restore_the_Continental_Congress_desc: "Por supuesto, debe haber algún tipo de asamblea para que el pueblo pueda opinar sobre el trabajo que tanto nos ha costado conseguir. Deberemos hacer que los representantes que verdaderamente representan a nuestros hombres y mujeres de esta agradecida nación hagan oír su voz mientras marchamos hacia la liberación de todos los estadounidenses de las malvadas manos de la extralimitación gubernamental. Al restablecer esta organización crucial tendremos una mayor comprensión de lo que nuestro pueblo necesita y desea para prosperar como sociedad."
 GMA_The_Price_Of_Liberty: "El precio de la libertad"
 GMA_The_Price_Of_Liberty_desc: "Para muchos, los impuestos se ciernen sobre ellos como una forma de esclavitud impuesta por el Estado. No se les deja opinar sobre lo que se impone injustamente al ciudadano medio. Los peores son los socialistas que aumentan los impuestos para obras públicas que nadie utilizará. Sin embargo, sin financiación, nuestra causa se derrumbará sobre sí misma, por lo que debemos mantener la figura de un sistema impositivo, independientemente de cómo vean esta medida nuestros partidarios."
 GMA_An_American_Confederation: "Una confederación estadounidense"
 GMA_An_American_Confederation_desc: "Estados Unidos bajo un Gobierno central unificado ha sido un terrible azote para los derechos del hombre. Verdaderamente hemos sido oprimidos y dominados, gobernados por hombres que no conocen nuestros derechos. Gobiernan en sus torres de marfil y aplastan nuestra libertad. Como estadounidenses debemos contraatacar y demostrar al mundo que no somos hombres y mujeres que se pasan el día sentados sin hacer nada para luchar contra la tiranía. Somos los infrarrepresentados y haremos oír nuestra voz."
 GMA_Abolish_the_Duopoly: "Abolir el duopolio"
 GMA_Abolish_the_Duopoly_desc: "La libertad de elección es una de las piedras angulares de nuestra nación. Los partidos Republicano y Demócrata no han hecho más que obstaculizarnos mediante la restricción y constricción de la elección a través de nuestra política. Con nuestra nueva sensación de claridad política, debemos aprovechar esta oportunidad para dar una oportunidad a los partidos políticos. Aunque no estemos de acuerdo con algunos, sería un anatema para nuestra nación obstaculizar el desarrollo de los movimientos políticos dentro de ella."
 GMA_Promote_Sovereign_Citizenship: "Promover la ciudadanía soberana"
 GMA_Promote_Sovereign_Citizenship_desc: "Durante mucho tiempo hemos visto nuestra causa menospreciada y despreciada. Arrojada al basurero de la historia como una fantasía. Pero ahora, hemos crecido de verdad como nación y como pueblo. Otorgamos los derechos de los ciudadanos en grado sumo. Tanto es así, que consideramos que cada hombre o mujer puede actuar como quiera. Al permitirles la libertad de actuar les damos mucha responsabilidad, pero hemos llegado hasta aquí."
 GMA_Our_Companies_First: "Nuestra empresa primero"
 GMA_Our_Companies_First_desc: "Dentro de nuestra compañía, hay numerosos individuales que nos podrían beneficiar al elevarlos a posiciones especiales dentro del Gobierno. Aunque algunos estén en contra de esta táctica, esto asegura que la Compañía de la Montaña Verde se mantenga por sobre toda persona que se interponga en nuestro camino."
 GMA_Unify_our_Command_Structures: "Unificar nuestra Estructuras de Comando"
 GMA_Unify_our_Command_Structures_desc: "Para ahora, múltiples empresas militares privadas han puestos sus reclamos en lo que hemos conquistado y han iniciado peleas internas tacañas por las sobras que quedan. Esto es malo para el negocio para todos, entonces un acuerdo se ha establecido para centralizar el comando. Vamos a trabajar juntos bajo la oligarquía liderada por las cabezas de aquellas corporaciones y obtendremos un Estado más fuerte y una mejor mano de obra."
 GMA_Permit_Execute_Authority: "Permitir Autoridad Ejecutiva"
 GMA_Permit_Execute_Authority_desc: "Obviamente esto a sido un cambio brusco para aquellos que están en contra con nuestra manera de vivir y nuestros métodos. Nuestros soldados han sido acosados más de una vez and se les ha dado el derecho para responder. Aunque esta medida es temporal ya que nos encontramos en un momento difícil, eventualmente cuando las cosas mejoren vamos a repeler este derecho dado a cada uno de nuestros soldados para destruir y purgar la basura de nuestras ciudades como ellos quieran."
 GMA_Loyalty_to_the_Paycheck: "Lealtad a la Paga"
 GMA_Loyalty_to_the_Paycheck_desc: "Es claro que nuestros hombres solo quieren dos cosas de nosotros, dinero y influencia. Y mientras una relación puramente transaccional está perfecto bien. El dinero es una cosa muy tentadora al soldado. Y al mantener una línea estable y abundante de dinero los mantendrá obedientes a nuestra causa y demandas. Ellos van a disparar, van a combatir, y van morir por nosotros. Y van a ser apoyados financieramente en todo su camino."
 GMA_Velvet_Glove_on_an_Iron_Fist: "Un guante de terciopelo sobre un puño de hierro"
 GMA_Velvet_Glove_on_an_Iron_Fist_desc: "Algunos en la comunidad internacional han visto nuestra corporatocracia y han sido amonestados por ella llamándola \"Despótica\" y \"muy lejano al antiguo Estados Unidos\". Aunque estas naciones puede que tengan un peor ejército en comparación a nuestra excelente fuerza de combate, tienen amigos y recursos. Recursos que tanto necesitamos entonces al crear un fino disfraz de un supuesto proceso \"Democrático\" la mayoría de naciones van a mirar al otro lado y nos darán la oportunidad de mezclarnos con el resto del mundo."
 GMA_Privatize_Mobilization: "Movilización Privada"
 GMA_Privatize_Mobilization_desc: "Nosotros no llamaremos al ciudadano promedio a luchar nuestras guerras, son débiles y no tienen el estomago para combatir. Por lo tanto, tentando a aquellos que quieren combatir con dinero y la llamada a la aventura tendremos un flujo consistente de hombres dispuesto a pelear al diente y a la uña. Mientras que nuestras fuerzas especiales son llamadas a servicio, los más nuevos serán llamados de últimos y aquellos con la mayor experiencia se mezclaran con nuestras fuerzas de segundo nivel para aumentar su experiencia. Nuestro negocio es fuerte y será imparable en el campo de batalla."
 GMA_american_nostalgia: "Nostalgia Americana"
 GMA_american_nostalgia_desc: "Nuestra nación se ha convertido en lo que los Padres Fundadores querían. Y nuestros ciudadanos van a entender esto. ¡Nuestro padres fundadores odiaban los partidos políticos y mira donde nos han llevado! Tenemos el colapso de un estado enfermo. Podrido en su núcleo debido a la influencia del sistema bipartidista. Ahora somos lo que los padres fundadores verdaderamente visualizaban para un estado. Ellos estarían muy orgullos del trabajo duro que hemos hecho para cumplir sus sueños."

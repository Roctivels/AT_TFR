 bur.3.t: "Situación en Birmania"
 bur.3.d: "Birmania ha vuelto a caer en un conflicto interno, una situación que no sorprende dada la frágil política parlamentaria del país, la arraigada corrupción militar, las caóticas condiciones económicas, el impacto del COVID-19 y las prolongadas tensiones étnicas. Sin embargo, a diferencia de los conflictos anteriores, el rápido desarrollo de internet y las redes sociales ha amplificado las consecuencias negativas del golpe militar, profundizando las divisiones sociales y dando publicidad a la guerra civil. Además, el mayor acceso a internet ha atraído más atención hacia los grupos armados independientes en las regiones fronterizas, ampliando aún más su influencia. \n\nActualmente, la comunidad internacional se ha limitado en gran medida a condenas verbales y sanciones dirigidas a líderes individuales de juntas militares, sin tomar medidas sustanciales. Sin embargo, esto presenta una oportunidad para nosotros. Como el país con la frontera compartida más larga con Birmania, la influencia económica más fuerte y buenas relaciones tanto con la oposición democrática como con el Gobierno militar, China tiene el potencial de intervenir de una manera que podría cambiar fundamentalmente la situación. Además, entre los diversos caudillos implicados en la guerra civil, el Ejército Unido del Estado Wa, dirigido por Bao Youxiang, y el Ejército Kokang han mostrado una clara postura pro-China, mejorando aún más nuestra posición estratégica para intervenir y asegurar beneficios tangibles."
 bur.3.a: "Hagamos lo que sea por la paz."
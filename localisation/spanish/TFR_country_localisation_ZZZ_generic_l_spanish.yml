 EU_member_dynamic: "Miembro de la Unión Europea"
 EU_member_dynamic_desc: "La idea de una Europa unida ha sido teorizada y difundida a lo largo de la historia de Europa como poco más que una idea o concepto. Pero a través de los tiempos más oscuros de la historia europea, con el ascenso del fascismo y el comunismo en todo el continente, ha dado origen a un nuevo comienzo para Europa que definirá los próximos mil años de historia europea. Con la ayuda de naciones democráticas como el Reino Unido, Francia, Alemania y los Estados Unidos, las llamas de la democracia se han extendido por todo el continente y han asegurado las bases para la Unión Europea. Establecida en 1993, la Unión Europea se creó para garantizar que Europa no repitiera los errores de las naciones y líderes anteriores y, en cambio, avanzara por el camino del progreso.\n\nLa Unión Europea hoy se erige como una unión cultural, económica y política de los Estados europeos en toda Europa. Somos un faro brillante de progreso, democracia y unidad para mostrarle al mundo entero que Europa se mantendrá unida contra estas dificultades y las enfrentará en el futuro. En un esfuerzo por promover la paz, la democracia, la diplomacia, la salud, la seguridad y los derechos humanos en todo el continente europeo y más allá. Estos valores y creencias fundamentales de la Unión Europea son los que mantienen unido al continente y lo mantienen en el futuro incierto que pronto enfrentaremos.\n\nEstamos unidos en la diversidad."

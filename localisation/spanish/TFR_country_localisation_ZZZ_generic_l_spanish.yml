 generic.1.desc: "Cuando la punta del bolígrafo se desliza sobre el papel, parece que podemos escuchar el sonido de la civilización echando raíces; no florecerá de inmediato, pero puede evitar que la nación sea arrancada de raíz en alguna tormenta futura. Con nuestra ayuda política y subsidios para la educación. El número de personas educadas aumenta día a día, las ideas innovadoras inundan cada industria y el ritmo de la investigación científica se acelera silenciosamente."
 generic.1.a: "Lo que hemos visto y aprendido se transmitirá para siempre."
 generic.2.t: "Desarrollo académico empeora"
 generic.2.desc: "Los niños ya no recitaban la tabla de multiplicar, sino que llevaban sacos vacíos a los lomos de los campos para recoger espigas de trigo. El libro de texto estaba roto y pegado a la celosía de la ventana. Debido al caos y al declive de los fondos educativos, nuestra tasa de analfabetismo está aumentando de nuevo; sin conocimiento, incluso los manuales de servicio más sencillos son como libros cerrados para los trabajadores, nuestra investigación científica se enfrentará así a una desaceleración."
 generic.2.a: "Si no estudiamos, un día repetiremos los errores del pasado."
 generic.3.t: "Desarrollo académico llega al límite"
 generic.3.desc: "Debido a que llegamos al límite de desarrollo académico, elegiremos una bonificación temporal."
 generic.4.t: "Desarrollo agrícola mejora"
 generic.4.desc: "El acero escupió humo negro, alisando los surcos y crestas inmutables que habían permanecido inalterados durante mil años de la noche a la mañana. El origen de la civilización humana es inseparable de la agricultura, y ahora, a medida que el granero se llena, más y más etiquetas que indican 'excedente de grano' se marcan en el calendario. Esto no solo se debe a las nuevas tecnologías agrícolas, sino también a nuestra protección del medioambiente."
 generic.4.a: "Que la fresadora presione el pasado en la tierra."
 generic.5.t: "Desarrollo agrícola empeora"
 generic.5.desc: "El tractor está aparcado junto al linde de los campos y el óxido, como el esqueleto de una bestia gigante que hubiera sido abierta. La naturaleza comenzó a recuperar su generosidad y a esparcir hierba de corral y langostas por los campos, y ya no podemos responder con nuevas tecnologías. Nuestra producción agrícola disminuye día a día, y bajo la tecnología moderna, no podemos simplemente culpar al \"clima desfavorable\". También debemos haber cometido errores."
 generic.5.a: "Cuando el arado no pueda masticar la tierra, la historia masticará a la gente."
 generic.6.t: "Desarrollo agrícola llega al límite"
 generic.6.desc: "Debido a que llegamos al límite de desarrollo agrícola, elegiremos una bonificación temporal."
 generic.7.t: "Desarrollo económico mejora"
 generic.7.desc: "\"El patriota más pobre en el East End de Londres infla el pecho cuando piensa en la industria y riqueza de Inglaterra\". Este dicho ha sido conocido por mucha gente, pero afortunadamente, no ocurrió en nuestro país. La pobreza no puede erradicarse por completo, sin embargo, sigue siendo expulsada de las zonas urbanas calle por calle. El sonido de las carteras llenándose es más inspirador que cualquier himno nacional."
 generic.7.a: "Nadie se queda atrás."
 generic.8.t: "Desarrollo económico empeora"
 generic.8.desc: "La pobreza es como una nevada, cubriendo silenciosamente tejados, idiomas y sueños. Los engranajes del país se llenan gradualmente con los escombros del hambre, y tarde o temprano estos escombros atascarán los engranajes. Nuestra tasa de pobreza es cada vez más alta, y más y más personas están siendo dejadas en el fondo de la \"mayoría\". Incluso solo para sobrevivir, tienen que renunciar a la moralidad."
 generic.8.a: "La gente está perdiendo su dignidad, una vez que pierden la paciencia..."
 generic.9.t: "Desarrollo económico llega al límite"
 generic.9.desc: "Debido a que llegamos al límite de desarrollo económico, elegiremos una bonificación temporal."
 generic.10.t: "Desarrollo industrial mejora"
 generic.10.desc: "Las cintas transportadoras del edificio de la fábrica nunca se cansan. Llevan piezas a lugares lejanos y también dividen el tiempo en una capacidad de producción justa. El humo negro de las chimeneas ya no se considera solo la niebla que respiran las fábricas, sino también la extensión de la columna vertebral del país, que es la base de nuestra existencia en el mundo actual. Ahora, podemos crear todo por nosotros mismos."
 generic.10.a: "Pongamos la fábrica en marcha."
 generic.11.t: "Desarrollo industrial empeora"
 generic.11.desc: "La cadena de montaje se ha detenido y las cajas de herramientas están abiertas; se venden por kilo en el mercado negro. El pedido fue cancelado porque la máquina ya no podía producir roscas de tornillo cualificadas. Nuestra industria actual es como un chicle que se ha masticado repetidamente. El dulzor se ha desvanecido hace mucho tiempo, dejando solo el coloide pegado entre los dientes, imposible de escupir o tragar. Ahora, nuestra capacidad de producción industrial está disminuyendo día a día debido a innumerables coloides."
 generic.11.a: "El progreso debería haber sido el tema principal de la historia humana..."
 generic.12.t: "Desarrollo industrial llega al límite"
 generic.12.desc: "Debido a que llegamos al límite de desarrollo industrial, elegiremos una bonificación temporal."
 generic.13.t: "Desarrollo militar mejora"
 generic.13.desc: "Gracias a nuestros esfuerzos anticorrupción, a los oficiales de logística por fin ya no les gusta el dinero. La columna de \"Gastos varios\" fue eliminada de la lista de compras, y el dinero ahorrado fue suficiente para reemplazar cada clase con un rifle de francotirador con mira holográfica. Finalmente, podemos decir con orgullo: Las bocas de los soldados solo apuntan a las coordenadas, ya no a las carteras."
 generic.13.a: "Eso es exactamente lo que se supone que debe hacer el ejército."
 generic.14.t: "Desarrollo militar empeora"
 generic.14.desc: "Anoche, tres cajas más de balas de rifle \"cayeron al agua\" en el muelle. La gendarmería solo hizo algunas preguntas más y luego fue trasladada a la frontera por los oficiales para contar camellos. La cafetería de los oficiales lanzó el \"Especial de Ostras\", y la cafetería de los soldados seguía con la actuación de \"Cazar moscas en las gachas\". Cuando una orden se queda solo con un eco, la bandera militar no es más que una hoja de parra."
 generic.14.a: "¡Vaya, la broma sale del cañón!"
 generic.15.t: "Desarrollo militar llega al límite"
 generic.15.desc: "Debido a que llegamos al límite de desarrollo militar, elegiremos una bonificación temporal."
 generic.16.t: "Desarrollo social mejora"
 generic.16.desc: "En el cruce de medianoche, el semáforo en rojo parpadea solo; sin cámaras, los coches siguen haciendo cola obedientemente. El tribunal publicó la sentencia en línea, y solo decía \"Sentencia perfecta\" en la sección de comentarios. Bajo nuestra estricta represión del crimen, la tasa de criminalidad está disminuyendo tanto entre los ciudadanos como en las noticias. Con la cooperación de la gente, nuestras políticas también podrán avanzar con mayor fluidez, beneficiándolos aún más."
 generic.16.a: "Orden significa que nadie piensa en poner a prueba los límites del otro."
 generic.17.t: "Desarrollo social empeora"
 generic.17.desc: "El alféizar de la ventana quedó destrozado en bordes irregulares y la alarma sonó más tiempo que el himno nacional. Las \"técnicas de autodefensa familiar\" son cada vez más comunes en las calles y callejones: añadir dos capas de puertas de seguridad y cultivar cactus en los balcones. Esto no solo aleja a los ladrones, sino también la confianza. Cuando la ley es solo papel, las calles se convierten en casas de subastas: quien es audaz puede comprar la propiedad de otros a bajo precio."
 generic.17.a: "La sociedad nunca debería ser un brutal juego de eliminación..."
 generic.18.t: "Desarrollo social llega al límite"
 generic.18.desc: "Debido a que llegamos al límite de desarrollo social, elegiremos una bonificación temporal."
 tech.1.t: "Funcionalidad de la IA de combate"
 tech.1.d: "La guerra es un arte en constante evolución, desde cavernícolas que se rompen el cráneo hasta el poder del sol que arrasa ciudades enteras, dejando solo esqueletos y sombras.\nLa guerra es una expresión de ira contra todo lo vivo.\n¿Y si este proceso se automatizara?\n\nGracias a nuestra investigación continua, hemos podido desarrollar una IA de combate adecuada. Sin embargo, persiste una pregunta moral: ¿deberíamos permitirle escribir o no?\nPermitirle leer sería el equivalente a quitarle los colmillos a un perro. Puede seguir haciendo su trabajo, pero no con la misma eficacia. Sin embargo, esto también nos permitiría minimizar el daño si se volviera contra nosotros.\n\nPermitirle escribir sería como permitirle pensar, buscando constantemente soluciones contra sus adversarios. Sin embargo, esto significaría que el arte de la guerra se automatizaría y aumentarían las probabilidades de que considerara a todos los seres vivos un problema que necesita solución.\n\nAl final, tú decides."
 tech.1.a: "Permítanles escribir."
 tech.1.b: "Solo permítanles leer."
 decision_event_news.5.t: "En el horizonte..."
 decision_event_news.5.d: "John Titor aquí\n\nEl lanzamiento está previsto para el 18 de octubre. Estamos en la recta final, no la jodamos. Para algunos de nosotros, hemos estado trabajando en esto durante 4 años. 4 años agotadores. Muchos vinieron y se fueron, vamos a terminar lo que empezamos y limpiar el suelo con nuestra competencia.\n\n¡Lo tenemos, hombre, lo tenemos por el culo!"
 decision_event_news.5.a: "Victoria para TFR"
 generic.20.t: "ADVERTENCIA: Nación sin contenido"
 generic.20.d: "Querido jugador:\nSabemos que el número de naciones jugables es bajo por el momento, ¡y esta nación parece bastante jugable! Sí, tiene guerras, ideas, quizás incluso algunos enfoques. Pero lamentablemente, el contenido de este país no está adaptado para el jugador, solo para la IA. Así que la mejor opción sería jugar con otra nación cuyo contenido sí lo esté.\n\n¡Estén atentos!\nUn saludo,\nLos desarrolladores de TFR"
 generic.20.a: "Entendible."

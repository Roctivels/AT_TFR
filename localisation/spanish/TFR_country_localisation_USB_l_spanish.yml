 usb.10.desc: ""
 usb.10.a: "América está perdiendo su libertad..."
 usb.11.t: "¡Anarquía militar en la Unión!"
 usb.11.desc: "El ataque a la capital dejó a muchos elementos del Gobierno federal en desorden. Algunos gobiernos locales en condados distantes han sido completamente invadidos, lo que ha permitido que múltiples insurrecciones tomen el control de grandes extensiones de tierra.\n\nEstamos recibiendo numerosos informes de múltiples bandas, organizaciones terroristas fascistas, comunistas y anarquistas, así como amotinados del ejército que declaran su autoridad sobre ciertas ciudades. La mayor parte de nuestro ejército está ocupado luchando en el oeste, lo que limita nuestra capacidad para contrarrestar este desarrollo.\n\nLa Comunidad de Inteligencia ha proporcionado al Gobierno un plan para una consolidación de emergencia para tomar el control de nuestro territorio y hacer retroceder a los traidores, que entrará en vigor en breve. La República perdurará, cueste lo que cueste."
 usb.11.a: "¡Sofócalos, ahora!"
 usb.12.t: "El golpe corporativo"
 usb.12.desc: "No era ningún secreto que dentro de la maquinaria política de la Unión durante la guerra, un número de empresas y conglomerado de alto perfil han ganado lo que parece ser una influencia extremadamente alta en el gobierno. El presidente Biden era consciente de esto - precisamente fue por esto por lo que levantó su sospecha cuando recibió una llamada para una reunión sobre la futura política de varias figuras que uno podría considerar como \"influyentes\".\n\nNormalmente, no lo habría pensado dos veces. Las reuniones eran una cosa habitual en su puesto. Sin embargo, cuando recibió la llamada, sintió como si algo hubiese cambiado - casi podía notar una diferencia en su tono, como si la invitación para la reunión no fuese para discutir \"políticas futuras\". Últimamente ese ambiente de sospechas se había hecho mucho más tenso. Puede que se haya hecho más sabio con la edad - o, por el contrario, más paranoico - pero no podía librarse de la sensación que aceptar la invitación llevaría a algo sin precedentes.\n\nEl reloj en la oficina oval marcaba los segundos que pasaban. LA hora le recordó que se estaba llevando a cabo una sesión del Congreso sobre un tópico que no recordaba. A partir de aquí, se debía tomar una decisión - una que sin dudas determinaría el futuro de la Unión, tanto si el presidente lo deseara como si no."
 usb.12.a: "\"Manda a mis asistentes a la reunión. Me gustaría hablar con el Congreso\"."
 usb.12.b: "\"Estaré allí\"."
 usb.13.t: "La salud de Joe Biden empeora"
 usb.13.desc: "Con el conflicto solo empeorando, la salud del presidente Joe Biden se ha deteriorado en las ultimas semanas. Regularmente, el comandante en jefe ha sufrido de considerables dolores musculares y en el pecho, sus articulaciones se han entumecido dado al alto nivel de malestar. En varios casos en donde se ha sobreesforzado, el ha afirmado sufrir de dolores significantes en su pecho, notando que se encuentra más débil y generalmente no al nivel al que estaba cuando empezó su mandato.\n\nNaturalmente, las noticias sobre sus dolores en el pecho provenientes de un hombre tan viejo como lo es el presidente han sido motivo de alarma para su gabinete y personal de salud. Una examinación concluyo que estos cambios, por ahora, son nada de que alarmarse - que era principalmente el estrés y su edad haciendo presencia, y no es ninguna condición subyacente. Considerando sus previos síntomas, eso si, esto ha causado un incremento de malestar para el presidente."
 usb.13.a: "Preocupante."
 usb.14.t: "La salud de Joe Biden empeora"
 usb.14.desc: "Recientemente, se ha vuelto muy aparente al personal del presidente y su gabinete que su salud ha tomado ha empeorado. En días recientes, el presidente ha sido afligido por enfermedades, mostrando señales de síntomas febriles y un incremento de la dificultad de tareas cotidianas, al punto en el que él ha requerido ayuda múltiples veces. Su complexión pálida y debilidad física general han sido acompañadas por vómitos, desorientación, y una falta de apetito. \n\nEntonces, ahora hay un numero de personal de salud que se encuentra junto al presidente Biden, para asegurar su continuo tratamiento mientras el lleva a cabo sus deberes incluso aunque su dificultad haya aumentado. Mientras que el presidente clama que no es más que un resfriado por la estación, pocos dentro de su personal creen que ese es el único factor."
 usb.14.a: "Vamos a vigilarlo muy de cerca, por ahora."
 usb.15.t: "La salud de Joe Biden empeora"
 usb.15.desc: "Se ha vuelto obvio para muchos dentro del circulo cercano de Biden que hay algo claramente mal con su estado de salud. La inmensa presión que la guerra civil ha ejercido en las habilidades físicas y mentales del comandante-en-jefe ha causado un grave desgasto en el. Aunque anteriormente él podía lidiar sin complicaciones el malestar, el presidente ahora se ha encontrado postrado en cama más seguido de lo normal. El personal medico lo ayuda a moverse para evitar una caída y una posible fracture; esta constantemente con terapia intravenosa para mantenerlo hidratado. A pesar de todo esto, el presidente se mantiene firme con su decisión de atender a todas las reuniones y discusiones - a pesar de que un gran numero de sus deberes han sido efectuados por su personal y la Vice Presidenta Harris en su lugar.\n\nAunque sigue estando relativamente involucrado en la toma de decisiones, la habilidad cognitiva del presidente - algo que estaba en duda incluso previo a la guerra civil, principalmente en ataques por su oposición - ha obviamente empezado a fallar de gran manera (sean los nombres, rostros, direcciones, y demás) además de confusión en relación a discusiones y reuniones pasadas que han sido notadas por aquello a su alrededor. Rumores en el Capitolio y en la Casa Blanca continúan flotando, con la atmosfera general de pavor para el 46° presidente."
 usb.15.a: "No le queda mucho tiempo ¿verdad?"
 usb.16.t: "La habitación se cerro"
 usb.16.desc: "\"Es en este contexto que encontramos un delicado equilibrio de poder, tanto en el ámbito ejecutivo como en el funcionamiento del aparato estatal\", afirmó el presidente, con una concentración que resultaba casi incómoda, como si pudiera desintegrar la Cámara de Representantes con solo mirarla. La atmósfera en la sala cambió; lo que antes era asombro y confusión ante un presidente que a menudo parecía aburrido y pasado por alto, se transformó poco a poco en una apreciación de su vasto conocimiento.\n\n\"Mientras nuestra nación atraviesa lo que podría considerarse su período más oscuro en más de doscientos años\", continuó, \"es crucial que recordemos las razones detrás de este lamentable conflicto. No hay nada más importante\", hizo una pausa breve cuando las puertas de la cámara se abrieron de golpe, y varias figuras notables -congresistas, líderes empresariales que aún estaban presentes, altos funcionarios- se detuvieron en seco al ver al comandante en jefe en el podio. Cuando el presidente se detuvo y miró hacia la entrada, algunos representantes cercanos se giraron, levantando las cejas al ver a los hombres que acababan de entrar.\n\n\"...que es preservar nuestra democracia de cualquier fuerza, ya sea externa o interna\", concluyó, dirigiendo su mirada directamente a los hombres importantes. Ellos se ajustaron torpemente la vestimenta mientras intentaban encontrar sus asientos con una indiferencia que no lograban disimular, como si realmente hubieran planeado participar en la sesión desde el principio. Aquellos que no pertenecían al grupo asintieron de manera torpe y abandonaron la sala, sin duda molestos porque su objetivo, que parecía tan fácil, se había frustrado de una manera tan vergonzosa. Incluso algunos que ya estaban en la sesión se movieron incómodos en sus asientos, más o menos conscientes de lo que casi había ocurrido. El presidente esbozó una breve sonrisa burlona y continuó con su discurso, sin preocuparse por lo que sucedería al salir de la sala."
 usb.16.a: "La ambición está a la venta..."
 usb.17.t: "La dimisión de Biden"
 usb.17.desc: "Hoy, el 46º presidente de Estados Unidos, Joseph Robinette Biden, ha renunciado a su cargo debido a diversas razones y factores. El deterioro de su propia salud, la creciente oposición en la Cámara de Representantes y la falta de confianza en el Comandante en Jefe han llevado al presidente a dimitir, supuestamente por decisión propia.\n\nEsta repentina decisión ha generado malestar en el Congreso, donde algunos han condenado la acción del presidente, afirmando que ha dañado la unidad nacional en un momento en que el país necesitaba un líder con urgencia. Otros elogian la renuncia del presidente, respetando su conclusión de que ya no era apto para liderar la nación, en lugar de posiblemente conducirla a la ruina y la derrota en estos tiempos difíciles.\n\nA pesar de la larga tradición de que el vicepresidente asuma el cargo, una breve sesión de emergencia en la Cámara de Representantes dio como resultado un hecho sin precedentes: muchos miembros del Congreso propusieron al ex alcalde de la ciudad de Nueva York, Michael Bloomberg -que había conservado su influencia durante la guerra- para el cargo de Presidente, citando su experiencia política pasada y su comportamiento en sintonía con muchos de los aparatos estatales de la Unión."
 usb.17.a: "\"Caballeros, todo está pagado y contado\"."
 usb.18.t: "La trama corporativa aumenta"
 usb.18.desc: "Mientras lo que sin duda fue el desastre político más trascendental del siglo XXI seguía desarrollándose en América, las maquinaciones de la otrora poderosa maquinaria política, huelga decirlo, habían cambiado considerablemente de responsabilidad. Como se vio en los últimos meses, la influencia de las corporaciones dentro de la Unión, a pesar de los mejores esfuerzos del Jefe de Estado Mayor por mantenerlas bajo control, no había hecho más que crecer y expandirse ante la guerra.\n\nNo era ningún secreto que la guerra había generado mayores ambiciones en las altas esferas del aparato estatal. Los intentos previos de realizar maniobras políticas más directas contra el ejecutivo se habían visto sutilmente frustrados gracias a la inusual rapidez de pensamiento del presidente. A pesar de los recientes éxitos en frenar la influencia de elementos internos, parece que su reciente estancamiento no ha disuadido a los posibles conspiradores tanto como esperábamos inicialmente. Varios congresistas y empresarios influyentes se han vuelto considerablemente más desconfiados de sus acciones tras un período de aparente sutileza. En los últimos meses se han observado reuniones notables, encuentros y llamadas telefónicas curiosas, y un intento poco convencional de impulsar las iniciativas corporativas en el escenario político.\n\nEste repentino aumento de actividad inusual, por supuesto, no ha pasado desapercibido para el presidente. Parece que, tras sus anteriores deficiencias, los presuntos conspiradores -si aún buscan activamente usurpar la autoridad del presidente- llevan tiempo preparándose. Por lo tanto, el presidente se enfrenta a una decisión que esperaba no haber tomado de nuevo durante su mandato. Podría ordenar a sus altos mandos de inteligencia que investiguen a estas personas de interés, desviándolas una vez que se den cuenta de que el Comandante en Jefe los tiene en la mira una vez más; o podría posponer cualquier observación interna adicional. Después de todo, por lo que sabía, no estaban tramando nada turbio, pero ¿realmente valía la pena el riesgo si ya lo habían intentado una vez?"
 usb.18.a: "\"Si lo intentaron antes, lo volverán a intentar\"."
 usb.18.b: "\"No hay porqué volvernos paranóicos\"."
 usb.19.t: "Abrazar al junta"
 usb.19.desc: "Bloomberg hizo su entrada en el hemiciclo del Congreso con un paso titubeante, rodeado de su equipo y de varios políticos que lo seguían de cerca. Todos en la sala eran conscientes de que esta sería una de las reuniones más importantes del Congreso en la historia reciente americana; un momento decisivo tras las elecciones intermedias, donde se votaría para elegir al nuevo líder de la mayoría. La mala gestión económica, la inestabilidad pública y un liderazgo desarticulado habían llevado al bloque liberal a una situación crítica. Liderados por Kamala Harris, habían sido la fuerza más influyente en la política interna de la nueva Unión, y este sería el punto culminante de su declive. El presidente anunció que la votación comenzaría sin mucha deliberación por parte de Kamala, quien parecía estar luchando contra los nervios, mientras su equipo la observaba con atención.\n\nLa \"conspiración empresarial\". Así es como los liberales y progresistas desilusionados describirían este momento. El último voto fue emitido por el senador Michael Bennett, apoyando al bloque innovador. La votación terminó con un resultado de 61 a 39, y el Caucus Progresista-Liberal, formado de manera apresurada, no pudo detener el esfuerzo conjunto de conservadores e innovadores para nombrar a Al Gore como líder de la mayoría. Gore subió rápidamente las escaleras del podio, tras recibir la palabra del presidente.\n\n\"Compatriotas, estoy aquí para expresar mi más sincero agradecimiento por esta resolución. La democracia americana está bajo asedio en cada frente, tanto externo como interno. Una nueva América necesita acción más que nunca, y, bajo juramento constitucional, prometo que ese hombre seré yo\"."
 usb.19.a: "Un nuevo comienzo."
 usb.20.t: "Preparaciones para las elecciones posguerra"
 usb.20.desc: "Los demócratas arrasan"
 usb.20.a: "¡Que comiencen los juegos!"
 usb.21.t: "América reunificada"
 usb.21.desc: "Era de noche para el presidente Biden. La víspera de la liberación estaba a punto de poner fin a esa trinidad de dolor que había enfrentado. No, lo que América había enfrentado. No se defendió solo por su propia presencia, sino por el amor de la gente, del pueblo americano. Claro, recibió múltiples golpes que impactaron en lo más profundo de un hombre que se unió en la lucha, pero él sabía: una vez que te noquean, te levantas de inmediato. Se levantó lentamente, impulsado por la necesidad de ver realmente lo que había buscado durante toda su presidencia, caminando hacia cada escalón del Balcón Truman y observando cómo el sol brillaba en los corazones de los americanos que regresaban al trabajo o simplemente disfrutaban del momento. En medio de todo, sacó \"Ulises\" de James Joyce, una fuente de inspiración para él y el ejemplar personal que lo ayudó a superar el infierno de la primera mitad, y leyó: \"No se puede volver atrás en el tiempo. Como agarrar el agua con la mano\", indicando que, aunque no habría vuelta atrás, se aseguraría de que América volviera a ser una nación."
 usb.21.a: "El alma de la nación ha sido salvada."
 usb.22.t: "¡Los rebeldes se niegan a ceder!"
 usb.22.desc: "El Gobierno militar de Trump en Denver nos ha enviado una solicitud para entregarle pacíficamente el poder a él y a sus leales a cambio de que depongan las armas y cesen su rebelión. Si nos negamos, comenzarán las hostilidades. Su solicitud solo nos da dos opciones y no podíamos aceptarla, ya que les permitiríamos tener control total sobre nosotros, por lo que nos negamos. Desde que recibieron nuestra respuesta, han comenzado los combates en nuestras líneas, pero hasta ahora nuestras fuerzas armadas están bien gracias a nuestro mando superior y a la dependencia de los rebeldes de las milicias."
 usb.22.a: "¡Debemos luchar por la democracia!"
 usb.23.t: "Bloomberg arrasa"
 usb.23.desc: "Mientras la fría brisa de la mañana llenaba el aire en Columbia Heights, D.C., nadie en esa densa zona urbana, por muy metido que estuviera en la política, podía anticipar lo que estaba a punto de suceder. Un convoy de camiones del ejército y vehículos MRAP recorría la calle 14 sin previo aviso a los residentes, como si se tratara de una escena sacada de los noticieros o de las redes sociales. No se dio ninguna alerta a la comunidad, y esa mañana en particular, se llevaba a cabo una reunión senatorial crucial a solo unos kilómetros al sur de Heights. La mayoría pensó que la presencia militar era una respuesta a una amenaza interna o una medida de seguridad para proteger la reunión, aunque algo así nunca había ocurrido antes. El verdadero impacto se sintió cuando decenas de guardias nacionales salieron de sus casas, comenzaron a cerrar tiendas e impusieron toques de queda, armados con fusiles AR-15, dejando a la ciudad prácticamente en un estado de confinamiento. Luego, un apagón total sumió a D.C. en el pánico.\n\nFilas y filas de camiones llenaban las calles alrededor del Capitolio, y los policías que lo custodiaban recibieron órdenes inmediatas de rendirse. El Capitolio fue cercado por todos lados y asaltado por un grupo de guardias, soldados y operativos de las Fuerzas Especiales, que actuaban como séquitos de oficiales superiores adornados con medallas. Los pisos inferiores del Capitolio fueron barridos, y llegaron informes de que la Casa Blanca también estaba rodeada. El grupo de soldados y oficiales irrumpió en el Salón del Senado, interrumpiendo abruptamente la sesión con el sonido de rifles alzándose.\n\n\"¡¿Qué está pasando aquí?!\"\n\"¿Qué significa...?\"\n\nLos gritos de muchos senadores no lograron disuadir a los hombres de cumplir con lo que consideraban su deber constitucional, mientras el oficial al frente comenzaba a leer un documento.\n\n\"Estamos llevando a cabo funciones ejecutivas. El presidente ha hecho un anuncio sobre una rendición declaratoria bajo las normas de tiempos de guerra. Nuestra misión aquí es establecer una administración provisional que supervise la creación de un nuevo Gobierno. El senador Michael Bloomberg tomará juramento como presidente de los Estados Unidos de América, en reconocimiento a su valiente lucha contra las amenazas a nuestra Democracia, tanto desde el exterior como desde el interior. Se levanta la sesión del Senado\". El oficial, desde el podio, informó al pleno del Senado que la sesión estaba cerrada y que el presidente había sido despedido."
 usb.23.a: "¡Me gusta Mike!"
 usb.24.t: "Reorganización del Congreso"
 usb.24.d: "Tras la reciente reforma electoral, se convocaron elecciones anticipadas para evaluar la verdadera voluntad del pueblo bajo el nuevo sistema. Los sistemas partidistas obsoletos, como la manipulación de los distritos electorales y el sistema de mayoría simple, ya no podrán ocultar la verdadera voluntad del pueblo americano ni permitir que los multimillonarios de Wall Street controlen nuestras elecciones. Con los nuevos sistemas electorales implementados, en particular, el voto por orden de preferencia, las elecciones financiadas con fondos públicos, la disolución del sistema bipartidista mediante diversos mecanismos legales y múltiples rondas de votación, los Socialistas Demócratas de América han emergido como un claro ganador y han formado un gobierno de coalición mayoritario junto con los Verdes y la Alternativa Socialista, con los Demócratas, los Libertarios y el recién formado Partido Patriota Popular en la oposición.\n\nDesafortunadamente, debido a la inestable situación del país, la mayoría no pudo votar debido a que algunas zonas están bajo control de guerrillas e insurrectos que buscan destruir nuestra democracia. Además, muchos estados bajo administración militar no se han reincorporado formalmente a la Unión tras su secesión, por lo que gran parte del Medio Oeste quedó sin representación. Sin embargo, el éxito de la democracia en los territorios leales a la Unión de América ha sido un gran testimonio de nuestro nuevo sistema y una prueba de que nuestra democracia emergerá de esta guerra civil más fuerte que antes."
 usb.24.a: "¡Felicitaciones a los SDA!"
 usb.25.t: "Operación de Georgia del Sur"
 usb.25.d: ""
 usb.25.a: "¡Debemos reclamarla!"
 usb.26.t: "Empresas escapan de Nueva Inglaterra"
 usb.26.d: "El corazón palpitante de la economía internacional se ha detenido repentinamente debido a que los combates esporádicos han consumido Nueva Inglaterra, lo que ha obligado a muchas instituciones a huir hacia el sur, a la Unión de América. En Nueva York, reina la anarquía mientras las pandillas, el Departamento de Policía de Nueva York, las guarniciones militares y las milicias se enfrentan en las calles, y en Boston, el radical Frente de Hierro Americano ha amenazado a las empresas con su agenda radical. En ambos casos, las peligrosas condiciones del noreste han obligado a muchas empresas a huir a Washington D.C., Richmond y Filadelfia para establecer sus nuevas bases de operaciones, ya que la situación en la región del Atlántico Medio es mucho más estable. Esta afluencia de capital a la Unión de América ha traído consigo empleos, oportunidades de inversión y la legitimidad que el gobierno necesita desesperadamente en este momento."
 usb.26.a: "¡Bienvenido a D.C!"
 usb.27.t: "Inicio de la insurgencia rural"
 usb.27.d: "Informes alarmantes indican el surgimiento de una célula insurgente en rápido crecimiento en la zona rural, supuestamente formada por disidentes locales afines a los \"Constitucionalistas\" de Denver, con el apoyo y el respaldo de milicias locales como los Oathkeepers, los Proud Boys y los Three Percenters. Estas organizaciones fueron armadas y entrenadas por unidades de la Guardia Nacional de Virginia Occidental tras nuestra llegada a Washington D.C., y ahora se han atrincherado en la zona rural, especialmente en la cordillera de los Apalaches, distribuyendo armas a los combatientes locales. Informes de inteligencia también han señalado la construcción de fortificaciones improvisadas, fortines, búnkeres e incluso vehículos de combate improvisados con cualquier retazo que hayan podido encontrar.\n\nNo debemos apresurarnos y debemos comenzar a prepararnos para una acción militar inmediata en la región para proteger nuestra democracia de amenazas internas y evitar que esta situación se descontrole. Ya se han movilizado varias brigadas de contrainsurgencia para gestionar esto, y estamos aplicando una política de cerco, utilizando una potencia de fuego superior para estrechar el cerco sobre la insurgencia y esperar a que se quede sin equipo, desmoralizándola con campañas de conmoción y terror en el aire. Aunque estos conceptos parecen prometedores, sin duda nos costarán tiempo y esfuerzo valiosos, desviando nuestra atención del frente. También deberíamos empezar a forjar vínculos con colaboradores y leales al gobierno legítimo, principalmente en zonas urbanas, lo que nos permitirá infiltrarnos en la insurgencia y destruirla desde dentro. Si queremos vencer a quienes intentan subvertir la democracia y provocar una era oscura en América, debemos mostrar implacable a estos criminales y nuestra férrea determinación al mundo."
 usb.27.a: "Hillbilies de mierda."
 usb.28.t: "¡Insurgencia apalache aplastada!"
 usb.28.d: "Informes recientes hablan de un rotundo éxito hacia el este, mientras nuestras fuerzas aplastan los remanentes de la Insurgencia de los Apalaches, dirigida contra el \"gobierno\" de Trump en Denver. Esta insurgencia había sido una espina en nuestro costado, atacando las líneas de suministro y las redes ferroviarias que conducían al frente en el Medio Oeste. También habían desviado importantes esfuerzos y recursos del frente en el Oeste, lo que permitió a los traidores \"constitucionalistas\" detener nuestro avance. Los informes también detallan la destrucción de más de 50 células terroristas en Virginia Occidental en recientes ofensivas realizadas por brigadas especializadas en contrainsurgencia, paralizando temporalmente cualquier posible acción enemiga en la región y asegurando los intereses locales. Esta es también una enorme victoria propagandística, ya que nuestras tropas han demostrado ser las más refinadas y especialmente entrenadas del mundo para este tipo de operaciones, y que, independientemente de lo que haga el ególatra de Denver, nuestra democracia se mantendrá firme.\n\nOperaciones precisamente ejecutadas, como el asesinato de líderes insurgentes ocultos en la región, así como el cerco y la destrucción de brigadas insurgentes con una potencia de fuego superior, han destrozado su resistencia. La supresión de esta insurgencia permite una reasignación significativa de nuestros recursos militares, ya que las brigadas contrainsurgentes que antes participaban en los Apalaches quedan libres para reforzar las líneas del frente contra la amenaza más amplia que se extiende hacia el oeste. Debemos comenzar a reconstruir la infraestructura local para ganarnos el apoyo de la población local, impidiendo así el resurgimiento de ideologías sediciosas. También debe mantenerse una fuerte presencia en la región; por ello, se ha extendido una orden ejecutiva que mantiene la ley marcial, lo que nos da más tiempo para despejar escondites, juzgar a los traidores y garantizar una estabilidad duradera. Las botas de la democracia aplastarán a estas serpientes dondequiera que aparezcan, impidiendo que envenenen al pueblo con su veneno populista."
 usb.28.a: "¡La Unión por siempre!"
 usb.29.t: "Operación de contrainsurgencia exitosa"
 usb.29.d: "Nuestras recientes operaciones de contrainsurgencia contra células constitucionalistas que buscan desmantelar nuestra democracia han demostrado ser notablemente exitosas. Informes recientes indican que diversas células insurgentes dispersas por nuestro territorio han sido infiltradas, cercadas y desmanteladas eficazmente mediante operaciones quirúrgicas de precisión dirigidas a líderes clave de la insurgencia, además de privar a las células remanentes de equipo crucial en la zona. Esta victoria nos ha permitido reconsolidar varias brigadas que previamente se vieron envueltas en combates contra estos elementos subversivos, redirigiendo nuestra atención al frente donde el grueso de la banda de traidores de Trump sigue luchando. Trump y la camarilla de traidores en Denver han anunciado su apoyo a esta insurgencia que comenzó en vísperas de la Guerra Civil y, desde entonces, la han estado armando a través de redes de contrabando. Esta también es una gran victoria propagandística, y hemos dado a conocer nuestros esfuerzos y la disposición de Trump de matar a más americanos en todo el país.\n\nSin embargo, tras esta monumental victoria, sigue siendo crucial que mantengamos una fuerte presencia en los Apalaches y en los estados infestados de insurgentes. Mantenernos alerta es clave mientras nos preparamos para posibles contraataques y emboscadas de los restos de la insurgencia derrotada. Como dice el dicho, nunca se es demasiado cauteloso con una serpiente, incluso después de haberla derribado. Si bien estas campañas han reforzado indudablemente la moral de nuestras tropas sobre el terreno y las del frente interno, debemos continuar las campañas para erradicar rigurosamente estas bases partisanas donde y cuando aparezcan; los líderes insurgentes que se nos escaparon sin duda montarán una contraofensiva, y embestir imprudentemente a algunos de los sectores más selectos de nuestras fuerzas de contrainsurgencia en una zona montañosa, boscosa y fortificada no nos servirá de nada."
 usb.29.a: "Buen trabajo."
 usb.30.t: "Operación de contrainsurgencia fracasa"
 usb.30.d: "Informes desgarradores llegan desde zonas rurales que detallan que las recientes operaciones de contrainsurgencia han fracasado estrepitosamente. A pesar de nuestros esfuerzos, los informes indican que la red de células insurgentes en nuestro territorio ha demostrado ser resiliente, con una gran contraofensiva insurgente que ha provocado la pérdida de amplias extensiones de territorio y el fortalecimiento de su presencia en la zona. El fracaso de estas operaciones obstaculiza nuestros esfuerzos en primera línea contra el grupo de traidores de Trump, ya que la insurgencia continúa resistiendo, causando la muerte innecesaria de más soldados americanos. Ahora es crucial mantener una mayor presencia en las zonas infestadas de insurgentes, organizar la retirada de las zonas consideradas insostenibles para minimizar las bajas y preparar otro contraataque para destruir los remanentes traidores.\n\nEstos reveses han mermado la moral y han suscitado preocupación en nuestro Alto Mando respecto a la calidad de los operativos de contrainsurgencia. Debemos comenzar a reevaluar las técnicas de contrainsurgencia, intensificar el entrenamiento y reasignar a los oficiales y jefes de unidad considerados responsables del fracaso. Mientras tanto, nuestra prerrogativa actual debería ser limitar el alcance del control insurgente en estas regiones y comenzar a fortificar los asentamientos locales para intentar rodearlos, lanzando enérgicas campañas para desangrarles los recursos y el apoyo de la población local. Mientras volvemos a la mesa de dibujo, debemos asegurar a nuestros hombres sobre el terreno que, si bien hemos perdido una batalla, esta guerra está lejos de terminar."
 usb.30.a: "La guerra continua."
 usb.31.t: "§gInnovacionistas§! proponen gasto"
 usb.31.desc: ""
 usb.31.a: "Todos tenemos que hacer sacrificios (Aprobar)."
 usb.31.b: "Nuestro nivel actual de gasto está bien (Vetar)."
 usb.32.t: "Los antifederalistas se organizan"
 usb.32.desc: "Bruh"
 usb.32.a: "Debemos frenarlos."
 usb.33.t: "Inicia la operación Mockingbird"
 usb.33.desc: "Desde la fundación de la Unión de América, nos hemos enfrentado a desafíos persistentes planteados por insurgentes que se consideran leales al régimen con sede en Denver. Si se permite que estos elementos hostiles persistan sin control, las posibles consecuencias podrían desencadenar un peligroso efecto dominó, atrayendo a más partidarios a su causa, un escenario que pone en peligro la estabilidad de nuestro Gobierno. Por lo tanto, para salvaguardar nuestra nación y sus principios democráticos, iniciamos la operación Mockingbird con efecto inmediato.\n\nLa operación Mockingbird se presenta como un esfuerzo conjunto que reúne los recursos y la experiencia del FBI junto con otros socios contratados. Su objetivo principal es desmantelar y neutralizar sistemáticamente a los diversos grupos insurgentes que operan en el área de Washington. Si bien la mayor parte de Washington D.C. está bajo nuestro control, la presencia de estas células trumpistas arraigadas representa una amenaza constante y significativa para la integridad de nuestro gobierno. Sus intenciones y estrategias precisas siguen siendo desconocidas, pero sus esfuerzos generales por socavar nuestra seguridad nacional exigen una acción decisiva.\n\nEstos grupos no solo representan una amenaza para nuestra seguridad inmediata, sino que también simbolizan un esfuerzo mayor y orquestado por la administración anterior y sus aliados para desestabilizar nuestra nación. Son peones de un plan más amplio orquestado por Trump y sus leales, con la intención de socavar la Unión de América y su liderazgo. Tengan la seguridad de que quienes conspiren contra los intereses de nuestra nación serán identificados, aprehendidos y llevados ante la justicia con rapidez y decisión. La operación Sinsonte representa nuestro compromiso inquebrantable con el respeto al Estado de derecho y la protección de nuestras instituciones democráticas frente a amenazas internas."
 usb.33.a: "¡El primer paso para destruir a Trump!"
 usb.34.t: "Concluye la operación Mockingbird"
 usb.34.desc: "Hoy recibimos excelentes noticias sobre la operación Mockingbird, que marca su exitosa conclusión. Esta operación, meticulosamente planificada, tuvo como objetivo neutralizar la influencia de elementos trumpistas en Washington D.C., asegurando que cualquier célula trumpista restante fuera identificada y eliminada o se disolviera por decisión propia.\n\nMediante una combinación de medidas estratégicas y esfuerzos coordinados, hemos salvaguardado con éxito la integridad de nuestras instituciones gubernamentales contra las posibles amenazas que representan estos elementos. La dedicación y la vigilancia del FBI y de los diversos contratistas que también contratamos han sido fundamentales para asegurar nuestro gobierno y mantener la estabilidad esencial para nuestra gobernanza.\n\nEste logro subraya nuestro compromiso inquebrantable con la defensa de los principios democráticos y la preservación del buen funcionamiento de nuestra nación. Al abordar eficazmente las perturbaciones internas, hemos reforzado nuestra determinación de reunificar a América y devolverlo a su estado anterior a su colapso."
 usb.34.a: "¡Primero Washington, después América!"
 usb.35.t: "Inicia la operación Mirage"
 usb.35.desc: "A medida que la guerra en los ex-Estados Unidos se prolonga, la preocupación en la cadena de mando del Gobierno de Washington, especialmente en el Estado Mayor Conjunto, se ha intensificado ante el rápido impulso que han cobrado las tropas federales. Los esfuerzos de liberación de [USB.GetNameDef] han abarcado casi todo Misuri hasta el río Misisipi, incluyendo la captura de San Luis. Sin embargo, este rápido avance ha sobrecargado sus líneas de suministro, y la logística advierte de un inminente déficit de combustible. En el norte, el crudo invierno ha frenado el progreso federal, causando pérdidas significativas a pesar del apoyo aéreo y una línea de frente más consolidada. La resistencia guerrillera también ha empeorado, con casi todos los civiles armados y combatiendo ferozmente a la Unión.\n\nEn respuesta, tras extensas sesiones informativas y la aprobación del comandante en jefe [USB.GetLeader], [USB.GetNameDef] ha dado luz verde a la operación Mirage: un asalto a gran escala contra las fuerzas de Trump, planificado durante años. La operación requiere una vanguardia blindada en puntos clave del Misisipi, con el objetivo de penetrar la resistencia enemiga. Al unirse con colaboradores locales leales al gobierno legítimo, [USB.GetNameDef] espera romper las defensas de Trump y liberar el Medio Oeste, aunque no cubre las Montañas Rocosas. Si bien este ambicioso plan conlleva riesgos, es la mejor oportunidad de [USB.GetLeader] para recuperar el país. Sin embargo, un fracaso devastaría su capacidad ofensiva, por lo que la cautela es primordial."
 usb.35.a: "¡A Denver!"
 usb.36.t: "Toma de Denver"
 usb.36.desc: "A medida que el estruendoso sonido de la artillería se apaciguaba, el humo negro que cubría el horizonte de Denver se disipó lentamente. La bandera victoriosa, un estandarte azul de la Unión de América, era visible en lo alto del Capitolio del Estado de Colorado. Aunque desgarrada y hecha jirones por el bombardeo, aún se alzaba desafiante. Dentro de la ciudad, los soldados de la Unión dispararon al aire en señal de celebración, mientras las fuerzas restantes del Gobierno Constitucional Americano eran detenidas, se les ordenaba entregar sus armas y aguardar nuevas instrucciones.\n\nNadie esperaba que la batalla de Denver se convirtiera en un conflicto urbano tan brutal. Inicialmente, las fuerzas de la Unión esperaban liberar la ciudad pacíficamente mediante negociaciones. Sin embargo, antes de que los representantes pudieran retirarse de las conversaciones, el bombardeo ya había comenzado. Ambos bandos se acusaron mutuamente de disparar primero, un misterio que sigue sin resolverse. Las batallas por el Aeropuerto Internacional de Denver, la Estación Union y medios de comunicación como Fox News fueron particularmente feroces, dejando innumerables soldados y civiles muertos y numerosos edificios históricos destruidos.\n\nA pesar de la devastación, la toma de Denver marca un punto de inflexión en la Segunda Guerra Civil Americana. El presidente de la Unión se prepara para pronunciar un discurso de victoria, mientras que el líder del Gobierno Constitucional Americano, Donald Trump, se encuentra desaparecido. Muchos creen que pereció entre los escombros de las calles de Denver."
 usb.36.a: "Una nación, unida."
 usb.37.t: "Negociaciones: Propiedad de traidores"
 usb.37.desc: "Han comenzado las negociaciones entre las diversas corporaciones que operan en nuestro territorio; hasta el momento, se han cerrado pequeños acuerdos y hemos superado algunos obstáculos menores. Sin embargo, recientemente les hemos solicitado la conversión inmediata de fábricas. El principal problema es que, a cambio, han solicitado que todas las corporaciones que actualmente apoyan a Trump les sean transferidas una vez que termine la guerra. Esto ha generado controversia de nuestra parte, ya que algunos temen que esto les otorgue demasiadas fábricas y desean rechazar su oferta, mientras que otros prefieren aceptar el acuerdo. En última instancia, es el presidente quien debe aceptar o rechazar la oferta."
 usb.37.a: "Aceptar."
 usb.37.b: "Rechazar."
 usb.38.t: "Negociaciones: Tasa impositiva empresarial"
 usb.38.desc: "Hemos solicitado asesores y gerentes profesionales para gestionar las fábricas actuales con la máxima eficiencia. Las corporaciones, a su vez, han solicitado una reducción de impuestos. Si bien es una oferta menos controvertida que la anterior, muchos en el caucus progresista y algunos en el liberal se han opuesto a este acuerdo, ya que aún se oponen a la tasa impositiva corporativa actual. Ahora, una vez más, la decisión de aceptar o rechazar el acuerdo depende del presidente."
 usb.38.a: "Aceptar."
 usb.38.b: "Rechazar."
 usb.39.t: "Negociaciones: Influencia política"
 usb.39.desc: "La ronda final de negociaciones está en marcha, tras haber superado todos los obstáculos previos. Nuestra oferta final a las corporaciones es una muestra pública de apoyo garantizada a todas las decisiones actuales y futuras. Las corporaciones han solicitado mayor representación e influencia en el gobierno una vez finalizadas las negociaciones."
 usb.39.a: "Aceptar."
 usb.39.b: "Rechazar."
 usb.40.t: "El acuerdo de unificación"
 usb.40.desc: "Todas las negociaciones, tanto previas como actuales, han resultado favorables para la nación. Si bien enfrentamos numerosos obstáculos, grandes o pequeños, durante todas las rondas de negociación, finalmente podemos respirar aliviados, ya que ambas partes han finalizado las negociaciones satisfechas, prometiendo que todas las reformas acordadas se implementarán lo antes posible.\n\nEsto debería beneficiar enormemente a la nación, ya que ya hemos visto algunos de los efectos de nuestro acuerdo, ya sea la mejora de la industria local, las muestras públicas de apoyo de los portavoces corporativos o la mayor producción de material bélico."
 usb.40.a: "Hicimos bien, muchachos."
 usb.41.t: "Las negociaciones colapsan"
 usb.41.desc: "Nuestras recientes negociaciones con las corporaciones han fracasado trágicamente. Los esfuerzos para detener el colapso han fracasado y toda la comunicación actual se ha interrumpido. Este es un fracaso catastrófico, ya que muchos nos culpan del fracaso de las negociaciones. Estos acontecimientos tampoco han sido bien recibidos en nuestro partido, ya que muchos empiezan a sospechar del poder actual de las corporaciones. Esto está degradando la capacidad de nuestro Gobierno para actuar en asuntos internos y la actual guerra civil mientras intentamos limpiar el desastre que hemos creado."
 usb.41.a: "¿Esto puede empeorar?"
 usb.42.t: "Las elecciones de Estados Unidos del 2024"
 usb.42.desc: "Con el día de las elecciones a la vuelta de la esquina, las elecciones presidenciales y al Congreso de 2024 se perfilan como las más divididas en la historia de los Estados Unidos, ya que cuatro facciones principales del espectro político compiten por el control de la Unión.\n\nEn el bando demócrata, las encarnizadas luchas internas han dividido al partido en tres bandos distintos. Los progresistas, liderados por el senador Bernie Sanders, impulsan reformas radicales en salud, educación y derechos laborales, defendiendo una visión audaz para una nueva socialdemocracia americana. Los liberales, liderados por [USB.GetLeader], abogan por la unidad nacional, una estabilidad moderada y reformas graduales para estabilizar el rumbo en tiempos turbulentos. Mientras tanto, los innovadores del exalcalde de Nueva York, Michael Bloomberg, prometen un futuro tecnocrático, centrado en la modernización económica y el aprovechamiento de los avances tecnológicos para impulsar el progreso del país.\n\nFrente a la izquierda dividida se encuentra el Partido Republicano, liderado por el senador Mitt Romney. Negándose a seguir los pasos de Donald Trump en la secesión, los Republicanos de la Unión se han reinventado como el partido del neoconservadurismo reaganiano y el gobierno pragmático, apelando a los remanentes de su base pre-Trump en bastiones suburbanos y rurales.\n\nSe prevé violencia política en los próximos días, especialmente porque las ideologías extremistas aún amenazan nuestra democracia desde dentro de las fronteras de nuestro país. Los informes de agitación extremista han reforzado la seguridad en focos de tensión insurgentes de MAGA, como Virginia Occidental, Ohio y Tennessee. La policía y las tropas de reserva se mantienen en alerta ante el creciente temor a la violencia política."
 usb.42.a: "Progreso."
 usb.42.b: "Liberalismo."
 usb.42.c: "Conservadurismo."
 usb.42.d: "Innovación"
 usb.43.t: "Operación: Mirage"
 usb.43.desc: "A medida que la guerra se prolonga, la preocupación en la cadena de mando del Gobierno de Washington, especialmente en el Estado Mayor Conjunto, se ha intensificado ante el rápido impulso que han cobrado nuestras tropas. Los esfuerzos de liberación han abarcado casi todo Misuri hasta el río Misisipi, incluyendo la captura de San Luis. Sin embargo, este rápido avance ha sobrecargado nuestras líneas de suministro, y la logística advierte de un inminente déficit de combustible. En el norte, el crudo invierno ha frenado el progreso federal, causando pérdidas significativas a pesar del apoyo aéreo y una línea de frente más consolidada. La resistencia guerrillera también ha empeorado, con casi todos los civiles armados y rechazandonos ferozmente. Ahora, parece que nos hemos acercado a un obstáculo crítico, con posiciones defensivas a lo largo del río Misisipi también haciendo mucho para detener las ofensivas recientes.\n\nEn respuesta, tras extensas sesiones informativas y la aprobación del comandante en jefe, le hemos dado luz verde a la operación Mirage: un asalto a gran escala contra las fuerzas de Trump usando nuestras mejores tropas, planificado durante años. La operación requiere una vanguardia blindada en puntos clave del Misisipi, con el objetivo de penetrar la resistencia enemiga. Al unirse con colaboradores locales leales al Gobierno legítimo, esperamos romper las defensas de Trump y liberar el Medio Oeste, aunque no cubre las Montañas Rocosas. Si bien este ambicioso plan conlleva riesgos, es nuestra mejor oportunidad de para recuperar el país. Sin embargo, un fracaso devastaría su capacidad ofensiva, por lo que la cautela es primordial."
 usb.43.a: "¡A Denver!"
 usb.44.t: "Corporaciones acusadas de actividad ilegal"
 usb.44.desc: "Era un sábado por la tarde en CNN y estaba programada una entrevista entre Chris Wallace y Josh Burben, quien había asistido a una reciente reunión entre el Gobierno y varias corporaciones que operan en su territorio.\n\n\"Josh, hemos escuchado rumores de que tienes algo que compartir sobre la reunión a la que asististe con las corporaciones. ¿Son ciertos esos rumores?\"\n\n\"Sí, Chris, lo son. Debo confesar que cuando llegué a la entrevista hoy no sabía qué decir. Pero luego me di cuenta de que la gente necesita conocer la verdad, y la verdad es que muchas de las corporaciones que estuvieron en la reunión, si fueran países, estarían siendo juzgadas por crímenes de lesa humanidad\".\n\n\"¡Vaya, Josh! Eso es una afirmación bastante contundente. ¿Te importaría profundizar un poco más en lo que estás diciendo? Estoy seguro de que la audiencia querrá saber más\".\n\n\"Claro, Chris, lo haré. Durante la reunión, me proporcionaron información crucial para negociar con los representantes de las corporaciones. Y déjame decirte que lo que estas corporaciones han hecho a sus empleados, a los terratenientes locales y a los pequeños negocios es completamente autoritario y deben ser responsabilizados de inmediato\".\n\n\"Bueno, Josh, ¿tienes alguna idea de si te silenciarán por exponer estas cosas? Mencionaste que sus acciones son totalmente autoritarias...\"\n\n\"No estoy seguro, pero lo que sí sé es que seguirán actuando así hasta que se tomen medidas en su contra, así que le pido al gobierno que haga algo al respecto\"."
 usb.44.a: "Qué conspiranóico."
 usb.44.b: "Abran una investigación sobre el Sr. Bloomberg..."
 usb.45.t: "Recuerdos nostálgicos"
 usb.45.desc: "Oficina Oval, 15:00 EST\n\nLos informes en el escritorio Resolute eran sombríos o mediocres, como siempre. Esta ardua lucha por restaurar el \"alma de la nación\" le causó a Biden un dolor interno único. Un dolor que lo acompañó desde la pérdida de Neilia y Naomi. ¿Qué se supone que debe hacer un hombre con tanto poder, en la cima del mundo, en una colina radiante, cuando un hombre dogmático, ante horribles informes de agonía y sombríos recordatorios con información sobre masacres en curso, desgarra aún más la lucha por la reunificación nacional?\n\nBiden cerró los ojos, con una pequeña lágrima deslizándose de sus párpados, llenos de más de 40 años de unidad política convertida en destrucción, que cayeron sobre los documentos, uno a uno.\nLo había extrañado cuando América nunca tuvo que preocuparse de que el estancamiento se convirtiera en una guerra a gran escala, cuando los americanos podían abandonar sus hogares y abrazarse a sí mismos. Todo eso ahora estaba pulverizado por las llamas de la munición.\n\nSabía que tenía que encontrar una manera de restaurar América, debía ser el líder que el país necesitaba..."
 usb.45.a: "Y comienza a escribir..."
 usb.46.t: "Bernie Sanders ha muerto"
 usb.46.desc: "Recientemente nos ha llegado la noticia del fallecimiento de Bernie Sanders, figura emblemática del movimiento progresista, a causa de un infarto.\n\nSegún informes, Sanders sufrió un derrame cerebral en su domicilio, tras lo cual fue trasladado de urgencia al hospital. Trágicamente, mientras los médicos salían brevemente de su habitación, sufrió un infarto y, a pesar de todos los esfuerzos, falleció poco después, acompañado de Jane Sanders y gran parte de su familia cercana.\nCon su fallecimiento, los miembros del caucus progresista y gran parte de nuestro Gobierno entrarán en un período de duelo colectivo. Al concluir este período, se prevé que Alexandria Ocasio-Cortez asumirá el cargo de líder y figura principal del movimiento, llevando adelante la visión a la que Sanders dedicó su vida.\n\nLa vida de Sanders fue una de dedicación política incansable, trabajando incansablemente por sus ideales.\nIndependientemente de si uno está de acuerdo o no con su política, fue una figura digna de respeto por su inquebrantable compromiso con sus creencias."
 usb.46.a: "Descanse en paz."
 usb.47.t: "Susurros al oído de nuestro Calígula"
 usb.47.d: "§R\"Hay que salvar la Presidencia\".§!\n\nNo podemos seguir permitiendo que los recuerdos del antiguo Partido Demócrata atormenten a nuestra nación y perjudiquen a nuestro Gobierno y al alma de nuestra nación.\n\n§R\"¡AMÉRICA DEBE SER SALVADA DE SÍ MISMA!\"§!"
 usb.47.a: "\"Arreglaremos esta nación... Lo prometo\"."
 usb.48.t: "Calígula pierde el balance"
 usb.48.d: "Durante días, semanas, o incluso más tiempo si los informes eran ciertos, nuestro querido líder se había retirado por completo del contacto social. Ni una palabra, ni un susurro. Permaneció inmóvil, como una estatua en su trono metafórico, y allí permaneció. El peso del silencio se prolongó, y con cada instante que pasaba, se hacía inequívocamente evidente. Biden se acerca a la muerte.\n\nNuestro presidente es más que un líder; es la piedra angular que mantiene unido el tejido de esta nación. Sin él, todo lo que hemos construido, todo lo que imaginamos, corre el riesgo de desmoronarse. Su ausencia significaría el colapso de nuestro régimen, dejando nuestros esfuerzos como meros ecos fugaces en los vastos pasillos de la historia, descartados como otro intento fallido de utopía. O peor aún, olvidados por completo.\n\nNo podemos permitirlo. Debemos movilizar todos los recursos para mantener con vida a Joseph Biden. La investigación debe acelerarse a niveles sin precedentes. Se deben impulsar nuevos medicamentos, y su salud debe ser monitoreada atentamente mediante chequeos constantes.\nNo sea que todo nuestro trabajo se desperdicie."
 usb.48.a: "Se encontrará una solución."
 usb.49.t: "América, la Bella"
 usb.49.d: "Unidad 1324, ese era su nombre. Lo había sido desde que tenía memoria.\nNo es que pudiera recordar mucho.\n\nLa mayor parte de lo que recordaba estaba atascado allí, sentado en esa silla, realizando un trabajo desconocido en el panel frente a él. Solo recientemente, ese trabajo dejó de llegar.\nNo hubo nada durante días, quizás semanas enteras, pero realmente no tenía una buena idea del tiempo allí... ni de dondequiera que estuviera.\n\nLe llevó mucho tiempo, pero finalmente, algo apareció. Lo asustó un poco; el mensaje se dio a conocer con un pitido alarmante. Cuando finalmente abrió el mensaje, lo que contenía no tuvo sentido por un momento.\nColapso. Guerra. Libertad... libertad.\nEsa... palabra. Despertó algo en él. Algo en su cabeza se encendió, y poco a poco, los recuerdos volvieron a él. Poco a poco, recordó cómo había llegado allí. Estaba en su casa cuando la puerta se abrió de golpe y hombres con armadura y el rostro cubierto lo dejaron inconsciente. Lo siguiente que supo fue que estaba encerrado en esa silla, y el panel que le resultaba tan familiar estaba frente a él.\n\nMiró a su alrededor y notó que los candados de la silla habían desaparecido; parecía que hacía mucho tiempo que no estaban. Sin embargo, la Unidad 1324 se levantó y caminó lentamente; sus piernas se habían debilitado considerablemente. Deambuló por los pasillos de la instalación durante lo que parecieron días, desesperado por salir. Finalmente, encontró la salida: una gran puerta metálica que ya estaba abierta.\n\nSus primeros momentos afuera, y el sol ya lo había cegado. Miró a su alrededor una vez que se adaptó y contempló el paisaje, pudo ver la belleza de lo que parecía un bosque, algo que hacía tiempo que deseaba volver a ver. Entonces, vio un pájaro, una paloma blanca en concreto. Planeó por el cielo y guió a la Unidad 1324 hacia adelante.\n\nNo sabía mucho. Estaba nervioso. Pero, al parecer, había alcanzado la libertad.\nY no la dejaría escapar nunca más."
 usb.49.a: "Belleza en el horror."
 usb.50.t: "Novus ordo seclorum"
 usb.50.desc: "Todo comenzó en 1776, cuando desafiamos por primera vez a nuestros opresores británicos, dando origen a una nueva y audaz visión de libertad y la idea de América. Desde entonces, nuestra nación ha luchado incansablemente por la supervivencia, con nuestra propia identidad en juego a través de las mareas de la historia moderna.\nPero recientemente, enfrentamos una de las crisis más oscuras de nuestra vida, un conflicto sangriento e implacable que exigió más sacrificios de los que jamás hubiéramos imaginado. Día y noche, luchamos con la férrea determinación de un zorro acorralado, haciendo eco de la tenacidad de nuestros antepasados y de todo lo que hicieron.\n\nNos mantuvimos firmes contra los traidores en Denver y los derrotamos hasta su capital.\nCombatimos el auge del fascismo en Míchigan y Nueva Inglaterra, allanando el camino para un futuro allí.\nEnfrentamos a los nazis en Florida y el Sur, ejecutando a sus líderes.\nEstrangulamos al comunismo que se arraigaba en la Costa Oeste e informamos al pueblo de que había otras opciones.\n\nLlevamos a cabo juicios contra quienes intentaron traicionarnos, quienes habrían derribado todo lo que hemos construido. Purificamos las filas de nuestra sociedad, decididos a asegurar un sistema donde todos pudieran vivir y prosperar en paz. Habíamos creado una utopía en ciernes.\n\nY, sin embargo, nunca nos cansamos. Incluso ahora, seguimos adelante, luchando contra quienes no comprenden la verdadera naturaleza de nuestra lucha. Malinterpretan nuestra misión, sin ver el mundo mejor que nos esforzamos por construir, un futuro basado en la unidad, no en la opresión. Un futuro obsesionado con el progreso, no con el miedo. Pero esa es una batalla para otro día. Por ahora, avanzamos, comprometidos con el trabajo aún inconcluso, sabiendo que nuestros sacrificios nos han traído hasta aquí.\n\nHoy, nos yerguemos triunfantes.\n\nNuestros enemigos han sido vencidos y el sol despunta en un nuevo horizonte.\n\nNos espera un futuro mejor, libre de oposición, libre de sufrimiento.\nY estamos listos para vivirlo."
 usb.50.a: "Victoria, venganza, pero ahora. Paz."
 usb.51.t: "¿Renunciar?"
 usb.51.d: "Después de mucho debate dentro del partido, muchos han mencionado la edad de Biden y su evidente deterioro mental y si debería o no presentarse a las elecciones de 2024."
 usb.51.a: "¡Nunca! ¡Cuatro años más de Bidenismo!"
 usb.51.b: "Probablemente sea una sabia elección."
 usb.51.c: "¡Este hombre no puede seguir como presidente!"

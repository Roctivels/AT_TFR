 USB_defenders_of_democracy_dynamic_desc: "\n\n\n\n£USB_defenders_of_democracy\n\n\n\n\n"
 USB_congress_dynamic_desc: "\n\n\n\n£USC_constitutional_congress\n\n\n\n\n"
 USB_fighting_for_democracy_desc_normal: "Con el Gobierno dividido en dos, nuestro Gobierno de la Unión, recientemente reestructurado, ha tenido la fortuna de mantener la lealtad de muchos de los principales líderes militares de América, además de una porción considerable del ejército federal. Si bien esto es, sin duda, una gran ventaja en nuestro deseo de rescatar la democracia de nuestra nación del peligro, ha venido con su buena parte de problemas, a saber, gran parte de la tropa del ejército se ha mostrado poco cooperativa por motivos políticos personales, causando desorganización y deslealtad entre las tropas. Además, el problema de la estructuración del ejército y el debate doctrinal ha surgido entre el Estado Mayor y el Congreso, principalmente en cuanto a si el enfoque convencional o las formaciones alternativas serán más efectivas en este período sin precedentes. Estas preguntas deberán ser respondidas eventualmente, preferiblemente más temprano que tarde si queremos proclamar la victoria contra los traidores en Denver y en otros lugares."
 USB_fighting_for_democracy_desc_nss: "Nuestra nación se encuentra en una gran angustia debido a la acumulación de pensamientos antisociales y facciones traidoras; el caos se ha vuelto una certeza.\nNo se combate el caos con palabras amables; requiere fuerza."
 USB_reunify_the_nation_desc_normal: "A medida que las fuerzas de Trump continúan flaqueando ante nuestra embestida, nos hemos encontrado una vez más bajo el control de varios estados del medio oeste, con nuestro progreso hacia el oeste avanzando lentamente. Sin embargo, a medida que liberamos más y más territorio de los traidores en el oeste, también aumenta la resistencia de las milicias civiles descontentas que tontamente han decidido quedarse atrás y acosar a nuestras tropas acuarteladas. No es ningún secreto que la población de la mayoría de las zonas rurales que hemos tomado está, en el mejor de los casos, en contra de nuestra presencia, y en el peor, abiertamente hostil y subversiva. Si bien las ciudades suelen ser una historia diferente, no podemos simplemente dormirnos en los laureles y soportar esta difícil situación; se harán esfuerzos para reducir la actividad rebelde en el territorio recientemente capturado, y una sensación de legitimidad pronto comenzará a regresar a las regiones afectadas a medida que trabajamos para reintegrar estas áreas al Gobierno federal."
 USB_reunify_the_nation_desc_nss: "Pierde el control del volante una sola vez, y todo el coche explota.\nLos Estados Unidos de América son más que solo tierra; son una colección de ideales y virtudes que han resistido la prueba del tiempo. Ahora, están siendo sometidos a la prueba de la locura.\nLa existencia continua de los Estados Unidos no es negociable."
 USB_end_the_traitors_desc_normal: "El fracaso del Gobierno de Denver en erradicar siglos de tradición política democrática se ha convertido en su perdición. Habiendo entrado en esta lucha destinados a experimentar el sabor de una derrota implacable a manos de un ejército adecuado, muchos han huido con cada avance que hemos logrado, y aquellos que no han perecido o se han rendido se han encontrado en lo profundo de nuestro territorio. En lugar de tomar la decisión sensata y reconocer que la guerra probablemente ha terminado para ellos, han decidido tontamente seguir luchando contra nosotros, atacando guarniciones, fortificaciones y esperando un alivio que probablemente nunca llegará. Independientemente de su dedicación al lado equivocado, no tenemos ningún uso para las milicias enemigas agotadas que residen en el territorio recientemente capturado. Pongamos fin a estos focos de resistencia obstinados."
 USB_end_the_traitors_desc_nss: "La traición es algo que repugna incluso a la más vil de las bestias, y nuestro país está lleno de ellas. El Gobierno de Denver continuamente afirma querer limpiar el pantano, pero ha olvidado las tierras salvajes que crecen a su alrededor.\nSu traición a los Estados Unidos no es algo que deba quedar impune; afortunadamente, a los traidores ya no les importa mantener la máscara puesta.\nSu error."
 USB_crush_the_rebels_desc_normal: "Por mucho que esperábamos que esta guerra civil se limitara a nosotros y al Gobierno de Trump en el oeste, eso ha resultado ser nada más que una ilusión. La fractura de nuestra sociedad ha calado hondo en los corazones y las mentes de millones de americanos, y muchos se han alejado de la democracia para acercarse al radicalismo y al extremismo. En el caos del colapso inicial y los combates que ocurrieron en las regiones periféricas, varios de los grupos que vieron una nueva popularidad antes de la guerra han logrado capturar y ocupar cantidades preocupantes de territorio. Desde rebeldes secesionistas que buscan separarse de la bandera de la Unión, hasta radicales políticos que desafían abiertamente nuestra pretensión de legitimidad nacional, su presencia como elementos rebeldes en suelo americano es un crimen en sí mismo. Con lo que está en juego tan claro como el agua para todos los involucrados, es hora de que acabemos con estos extremistas e insurrectos de una vez por todas; presentaremos a estos advenedizos una única demanda: depongan las armas o enfrenten una acción militar. Estamos bien preparados para lo segundo."
 USB_crush_the_rebels_desc_nss: "Además de los traidores que desearían tirar por la borda todos los años de trabajo que dedicamos al mantenimiento de la existencia del Orden basado en reglas, los crecientes grupos de extremistas han demostrado ser más que un simple alboroto de los ingobernables.\nHemos adquirido bastante experiencia en Irak y Afganistán en lo que respecta a tratar con insurgentes, pero a diferencia de antes, los medios estarían de nuestro lado.\nReajusten los parámetros; esta va a ser una operación interna."
 USB_neutrality_is_complicity_desc_normal: "Cuando estallaron los combates en todo el país, varios gobiernos estatales declararon su \"neutralidad\" en la lucha entre nosotros y los constitucionalistas, en gran parte debido a que estaban preocupados por sus propias insurrecciones. Tal como están las cosas, muchos de estos gobiernos han sido desafortunadamente invadidos por los mismos grupos que habían intentado aplastar en su infancia, dejando a sus funcionarios muertos o huyendo para salvar sus vidas, con las antiguas autoridades estatales y locales cayendo en la disolución a manos de disidentes radicales. A pesar de que la tarea resultó demasiado difícil de manejar para muchos gobernadores, todavía quedan varios estados y centros de mando periféricos que han logrado derrotar o resistir a sus respectivos enemigos. Para reconectar con los funcionarios gubernamentales aislados, debemos comenzar inmediatamente a contactar y enviar directivas a los que aún persisten, y exigirles que unan fuerzas bajo la bandera de la Unión una vez más. Aunque su vacilación en comprometerse con el resto de la nación era comprensible en ese momento, ya no hay excusa para la indecisión en un momento como este; están con nosotros o contra nosotros."
 USB_neutrality_is_complicity_desc_nss: "La guerra no es blanca o negra.\nCuando ocurre una disputa doméstica, siempre hay un agresor y siempre hay un agredido que debe defenderse.\nAquellos que afirman que solo quieren paz son los que se quedan en casa, permitiendo que elementos antisociales se desarrollen en sus comunidades.\nEsto se detendrá ahora."
 USB_bring_order_to_chaos: "Ordenar el caos"
 USB_bring_order_to_chaos_desc: "Cuando un perro viejo está demasiado enfermo para moverse, demasiado enfermo incluso para comer; ¿qué es lo misericordioso que se debe hacer? La respuesta es obvia: dormirlo.\nAntes de la Consolidación de Emergencia, el Gobierno de Washington era un animal moribundo, ahogándose en su propia incompetencia, aferrándose a la vida con manos débiles y ensangrentadas. Incluso con las provisiones de emergencia que le otorgó la guerra civil, no pudo controlar a su gente.\nLo sacrificamos misericordiosamente. Pero nuestro trabajo está lejos de terminar.\n\nA nuestro alrededor, los buitres acechan. Quizás esto sería demasiado para el antiguo gobierno. Sin embargo, ya no estamos encadenados por las debilidades que se disfrazaban de \"pesos y contrapesos\". Tendremos éxito donde ellos fracasaron y suprimiremos el Caos. La seguridad lo es todo, y nunca más será amenazada."
 USB_control_the_president: "Controlar al presidente"
 USB_control_the_president_desc: "Antes de la Consolidación de Emergencia, el presidente era el árbitro perfecto de nuestra voluntad. Un tonto senil y de voluntad débil que se desmoronaría ante cualquier presión que ejerciéramos sobre su mente nublada. Una figura que podíamos influenciar desde las sombras.\nPero estábamos equivocados.\n\nCada año agonizante, cada vez que el presidente no lograba apagar las llamas, nos demostraba que solo había una manera de revertir el gran error de la Guerra Civil: el control directo.\nEl espíritu del presidente es débil, maleable para nosotros; y es hora de que apretemos las riendas. Nunca más seremos encadenados por la incompetencia de un solo hombre. Nuestros deseos serán sus acciones, cada ley aprobada será escrita con nuestra tinta, cada paso dado será sobre nuestra alfombra. El presidente no logró sofocar el Caos, es nuestro turno."
 USB_reassure_the_establishment: "Tranquilizar al Establishment"
 USB_reassure_the_establishment_desc: "El Establishment, las serpientes deslizándose entre la hierba alta, los restos de la dicotomía Neoliberal-Neoconservadora obsoleta, y nuestro único obstáculo en el camino hacia el restablecimiento del Orden.\n\nDurante demasiado tiempo les hemos dado margen de maniobra. Durante demasiado tiempo, les permitimos malgastar el poder que la América post-1991 tenía sobre el mundo. Durante demasiado tiempo, les permitimos erosionar los cimientos del Orden y permitir que el Caos se reprodujera.\nPero ahora tenemos el control, y no mostraremos la misma misericordia.\n\nAceptarán nuestro control y se asegurarán de que la seguridad nunca vuelva a ser amenazada. Aquellos que inevitablemente se resistan nunca volverán a ver el sol. Su incompetencia nunca volverá a amenazar nuestra seguridad."
 USB_keep_them_in_the_dark: "Mantenerlos ignorantes"
 USB_keep_them_in_the_dark_desc: "Durante años antes de la Consolidación de Emergencia, gobernamos desde las sombras, influyendo en cada trazo de pluma a distancia. Pero estas estrategias mostraron su obsolescencia.\nLa Guerra Civil -el gran error que nos persigue hasta el día de hoy- dejó claro que las masas son perros rabiosos, contenidos por las cadenas de la ley y el Orden. La Guerra Civil permitió que ese animal violento saliera de su jaula, que lloviera terror sobre las cenizas del viejo mundo.\n\nSi queremos traer Orden al Caos, la humanidad debe ser contenida. América no será una nación gobernada por el pueblo, han demostrado que no se puede confiar en ellos. América será gobernada por aquellos que realmente lo merecen."
 USB_the_patriot_ii_act: "Acta PATRIOT II"
 USB_the_patriot_ii_act_desc: "El extremismo descontrolado presente en los escalafones de la sociedad es un síntoma de la enfermedad que asoló al Gobierno de Washington antes de la Consolidación de Emergencia. Un gobierno demasiado ocupado inclinándose ante los llamados \"pesos y contrapesos\" para ver a los buitres sobrevolando.\nYa es hora de que esta enfermedad sea purgada.\n\nEl FBI, la NSA, el DHS, todos han sido incapaces de contrarrestar verdaderamente la epidemia de actividades antisociales, terrorismo doméstico y extremismo gracias a las \"libertades\" concedidas a una población que no las merece. La Ley Patriota II asegurará que los anticuados impedimentos de la constitución no sean más que papel viejo. Los desinformados llamarán al Acta PATRIOT II el comienzo de una \"guerra doméstica contra el terror\". Una descripción acertada.\nEstaremos en todas partes, siempre escuchando, esperando; y cuando detectemos extremismo y comportamiento antisocial, será rápidamente suprimido y eliminado."
 USB_out_of_many_one_nss: "De muchos, uno"
 USB_out_of_many_one_nss_desc: "Hemos permanecido al margen demasiado tiempo. Hemos visto cómo la tiranía de las masas se enconaba. Pero ahora, los ligamentos del Estado están en nuestras manos, en las manos de aquellos que realmente lo merecen.\nDurante demasiado tiempo, los intereses de nosotros, nuestros benefactores y nuestros think tanks han entrado en conflicto, chocando entre sí; cegándonos a la erosión del Orden. Solo ahora, nuestra visión se ha despejado; solo ahora, podemos ver en qué debemos convertirnos.\nDebemos trascender las pequeñas disputas, la desorganización, la debilidad. Debemos convertirnos en algo más grande.\n\nLas megacorporaciones, las agencias de inteligencia, el complejo militar-industrial. La Sangre, el Cuerpo, la Mente. Un organismo nacido del crisol del Caos. Hemos tenido muchos nombres a lo largo de los años. Los \"poderes que están\", el \"Nuevo Orden Mundial\", las \"élites\". Ahora, solo tenemos uno:\nLos Cognoscenti."
 USB_the_visible_hand_nss: "La mano visible"
 USB_the_visible_hand_nss_desc: "Desde el comienzo de la Consolidación de Emergencia, nuestros benefactores corporativos han sido el alma de nuestro colectivo. Han financiado nuestras instituciones, nuestros proyectos, nuestros presupuestos y, gracias a su generosidad, hemos seguido aferrándonos a los órganos del aparato estatal.\nPero va mucho más allá de la financiación.\n\nBlackRock, Pfizer, Bayer-Monsanto: cultivan los alimentos que comen las masas, bombean el agua que beben, adormecen los medios que consumen, producen la medicina que corre por su sangre.\nSon todo, en todas partes, a la vez; y por extensión, nosotros también lo somos.\nIntenta salir sin ver un anuncio, intenta comer alimentos que no estén marcados, intenta beber agua que no sea bombeada por nosotros, intenta curar tus heridas sin nuestra medicina. Una mano se cierne sobre cada ciudad, cada hogar, cada cuerpo, cada célula."
 USB_corporate_infrastructure_bill: "Ley de Infraestructura Corporativa"
 USB_corporate_infrastructure_bill_desc: "Hemos estado cooperando con el mundo empresarial americano durante bastante tiempo, y con esto, se ha formado un vínculo tácito.\nCon la introducción de la Ley de Infraestructura Corporativa, nuestro objetivo es fortalecer ese vínculo hasta el punto de la simbiosis, dándoles más financiación, privatización masiva y libertad para llevar a cabo sus proyectos en todo el país. A cambio, seguirán nuestra melodía sin cuestionar."
 USB_global_cooperation: "Cooperación global"
 USB_global_cooperation_desc: "Ha habido rumores en la nación de que las Naciones Unidas tendrían tropas en el terreno durante décadas en caso de que ocurriera una crisis. La Segunda Guerra Civil Americana es una de esas crisis, una que el mundo simplemente no puede ignorar.\nCon la crisis humanitaria y la amenaza al Orden, estaríamos más que dispuestos a aceptar su ayuda mientras brindan asistencia al público. Además, la inclusión de fuerzas de mantenimiento de la paz nos ofrecería mucho más margen para desviar nuestras fuerzas a asuntos más apremiantes tanto en el frente como internamente."
 USB_expand_fema_authority: "Ampliar la autoridad de la FEMA"
 USB_expand_fema_authority_desc: "La Agencia Federal de Gestión de Emergencias ha sido el objetivo principal del pensamiento antisocial durante décadas. La agencia fue percibida como una herramienta de tiranía, lo que llevó a una disminución de la confianza pública.\nLa Guerra Civil se considera una emergencia en muchos frentes. Al expandir la autoridad de la FEMA, podemos trabajar para resolver esta emergencia y fortalecer nuestro control sobre el Caos que envuelve a nuestra nación para asegurar que esto nunca vuelva a suceder."
 USB_food_security_program: "Programa de Seguridad Alimentaria"
 USB_food_security_program_desc: "A través de la cooperación con corporaciones de tecnología agrícola como Bayer-Monsanto y terratenientes clave como Blackrock, podemos reforzar la seguridad alimentaria con OGM y hacer que la población dependa de los productos de los gigantes agrícolas.\nLos trabajadores serán reubicados en regiones despobladas, lejos de las áreas donde puedan crecer las simpatías y la disidencia local.\nDe manera similar, se hará lo mismo con el suministro de agua, como la fluorización, y el despliegue de productos químicos de control de comportamiento para asegurar que el Caos no pueda crecer."
 USB_media_omnipotence: "Omnipotencia mediática"
 USB_media_omnipotence_desc: "Todas las formas de medios sirven como un recipiente para difundir ideas a través del espíritu de la época; algunas ideas merecen ser difundidas, mientras que otras son corrosivas para la base que hemos construido delicadamente durante décadas.\nCon nuestras manos sobre los hombros de la cultura, podemos asegurar que ni una sola idea corrosiva vea la luz del día. El entretenimiento sin sentido y los informes de noticias curados bajo la supervisión de los expertos son una de las muchas maneras de asegurar que el pensamiento antisocial permanezca enterrado."
 USB_implement_hi_tech_solutions: "Implementar soluciones tecnológicas"
 USB_implement_hi_tech_solutions_desc: "Desde que el hombre abandonó las cuevas, ha buscado soluciones constantes a los muchos problemas que encontró. Carnalidad, Caos, agresión y el hambre de cambio.\nCon los grandes avances tecnológicos, podemos ofrecer una solución más permanente a tales problemas.\nNanochips, implantes Neuralink y una red más local para los Estados Unidos son solo algunos de los muchos métodos con los que podemos imponer el Orden."
 USB_public_health_safety_act: "Acta de Seguridad de la Salud Pública"
 USB_public_health_safety_act_desc: "El ataque terrorista químico en DC, el COVID-19 y la espiral de la salud mental han sido razones suficientes para mantener el Orden. Con la amenaza a la salud pública, podemos implementar políticas para monitorear a la población, implementar confinamientos permanentes y establecer zonas de alta vigilancia para combatir disturbios antisociales. Además, esto resultará fructífero en la prevención de otra pandemia con la ayuda de los CDC."
 USB_domestic_war_on_terror: "Guerra doméstica contra el terror"
 USB_domestic_war_on_terror_desc: "Entre muchas cosas, la Guerra Civil reveló una epidemia profundamente arraigada. Una enfermedad que infecta cada faceta de la sociedad, pudre la civilización desde dentro y corroe todo lo que toca: el extremismo. Sin embargo, donde otros en el gobierno de Washington llorarían y se esconderían debajo de sus escritorios, la Comunidad de Inteligencia tomó medidas.\nLa comunidad de inteligencia es nuestro núcleo. La columna vertebral, los ojos y los oídos. Los que impulsan nuestra agenda y los que libran la guerra contra el terrorismo doméstico.\n\nEn toda la nación, su agenda avanza. En cada esquina hay un oído, detrás de cada pared, hay un ojo. Dondequiera que estés, habrá un ojo observando. En la habitación más oscura que puedas encontrar, siempre habrá un oído.\nLa guerra no solo se libra a través del cañón de un arma, sino también a través de las mentes de los hombres."
 USB_silent_weapons_for_quiet_wars: "Armas silenciosas"
 USB_silent_weapons_for_quiet_wars_desc: "No todas las guerras se libran físicamente. La condición humana es un cuerpo que puede ser puesto bajo el cuchillo; con nuestros cirujanos, podemos diseccionar, curar y amputar las partes que queremos conservar y las partes que consideramos indeseables.\nUna parte es la conciencia; distraer al público de lo que sucede más allá del velo sigue siendo una de nuestras principales prioridades.\nEl público que permanece inconsciente es también un público que permanece dócil, y con su atención desviada, podemos trabajar sin ninguna obstrucción."
 USB_expand_the_black_budget: "Expandir el presupuesto negro"
 USB_expand_the_black_budget_desc: "Desde que la Comunidad de Inteligencia existe en su forma actual, siempre ha habido \"presupuestos negros\" encubiertos fuera de la regulación constitucional: montones de dinero indocumentado que podríamos usar libremente para avanzar en nuestra agenda global y doméstica sin la debilidad del Congreso.\nAhora, con los intelectualmente aptos a cargo, así como con el respaldo de nuestros generosos benefactores corporativos, podemos continuar avanzando en nuestros proyectos, sin los ojos indiscretos de las masas desinformadas."
 USB_lone_wolf_protocols: "Protocolos de lobo solitario"
 USB_lone_wolf_protocols_desc: "El desarme del público ha provocado un aumento del descontento; es nuestro deber recordarles los peligros de una población armada.\nCon la presión adecuada sobre individuos volátiles, podemos hacer que causen eventos con víctimas masivas con armas de fuego adquiridas ilegalmente, y con la ayuda de los medios, disuadiremos a la población de querer armarse, manteniéndolos con miedo. A su vez, anhelarán el Orden."
 USB_manufacturing_the_primary_victory: "Fabricando la victoria primaria"
 USB_manufacturing_the_primary_victory_desc: "Nuestra victoria final es el consentimiento, cuando un público dócil entrega voluntariamente su propiedad y riqueza a instituciones como el Servicio de Impuestos Internos sin recibir compensación, entonces ya nos hemos ganado sus corazones.\nEl Orden es final. El Orden es la conclusión natural de todo aquello por lo que trabajamos; una población que se controla a sí misma es una población que perdurará para siempre."
 USB_empower_the_special_activities_center: "Empoderar al Centro de Actividades Especiales"
 USB_empower_the_special_activities_center_desc: "El mayor error del Gobierno de Washington fue permitir que las masas desinformadas y rabiosas conspiraran contra nosotros bajo el disfraz de la \"libertad de expresión\". Permitieron que extremistas antisociales encubrieran sus planes a través de susurros cargados de ironía en los rincones más oscuros de la sociedad. Solo cuando conocimos el verdadero alcance de sus planes, atacaron, y al hacerlo, permitieron que el Fuego consumiera el Viejo Orden.\nIncluso después de que las cenizas de la Anarquía Militar se asentaran, las cucarachas que se hicieron notar en la oscuridad, se dispersaron con la luz. Los disidentes, individuos antisociales, extremistas, una trinidad que corroe todo lo que toca, y una amenaza a la seguridad nacional que debe ser aplastada.\n\nEl Centro de Actividades Especiales siempre ha sido una herramienta clave en nuestro arsenal, un puño de hierro que aplastaría las amenazas a nuestros intereses. Ya tenemos un oído detrás de cada pared y un ojo en cada esquina. Es hora de actuar. A través del presupuesto negro, el SAC se ha convertido en el mayor activo para el Orden. En toda América, un ejército fantasma ha despertado. Helicópteros negros patrullan los cielos, esperando para detener a disidentes, individuos antisociales y extremistas. En el ejército, nos hemos incrustado en cada cuartel, preparándonos para el más silencioso susurro de revuelta. Las amenazas solo pueden erradicarse antes de que aparezcan."
 USB_child_safety_act: "Acta de Seguridad Infantil"
 USB_child_safety_act_desc: "Durante demasiado tiempo, ha habido tráfico antisocial en internet, pensamiento disidente y comunicación entre elementos hostiles, y con el Acta de Seguridad Infantil, podemos llevar luz a los rincones oscuros de internet.\nLos niños son el grupo demográfico más vulnerable, y su exposición constante a elementos antisociales en línea sin supervisión parental ha demostrado ser corrosiva. El material explotador será desterrado, y al sembrar las semillas del miedo en los padres, no habrá ninguna protesta."
 USB_restore_the_redacted_files: "Restaurar los archivos censurados"
 USB_restore_the_redacted_files_desc: "En el pasado, cuando podíamos trabajar en las sombras sin interrupciones debido a la creciente polarización política, emprendimos numerosos proyectos para evitar que nuestros enemigos, tanto internos como externos, dañaran a nuestra nación. Desafortunadamente, debido a preocupaciones éticas de los ignorantes y recortes en la financiación, nos vimos obligados a dejar estos proyectos acumulando polvo.\nAhora que los adultos están de nuevo a cargo, no hay razón para no restaurar estos proyectos y mejorarlos."
 USB_keep_the_cycle_repeating: "Mantener el ciclo"
 USB_keep_the_cycle_repeating_desc: "Mira nuestra nación en caos, mira el mundo exterior en caos.\nLa Pax Americana existió por una razón. El orden es una virtud por la que vale la pena luchar. Nuestros detractores pensaron que nuestra forma de pensar era dañina, pero todos han sido neutralizados por los mismos grupos que ellos promovieron.\nEstamos aquí para quedarnos."
 USB_gears_of_war: "Engranajes de Guerra"
 USB_gears_of_war_desc: "Tras la Segunda Guerra Civil Americana, el complejo militar-industrial se volvió crucial en la guerra del gobierno de Washington. Sin embargo, después de la Consolidación de Emergencia, asumió un papel más importante.\nDonde las megacorporaciones son nuestra Sangre y las agencias de inteligencia son nuestro Cuerpo, el complejo militar-industrial es nuestra Mente. El cerebro que reúne y aplica el conocimiento para asegurar que nuestra seguridad nacional nunca más sea amenazada.\n\nNuestros benefactores han apoyado generosamente nuestras empresas y ya -ingenieros, científicos y las mentes más brillantes que este país haya visto en DARPA están abasteciendo a nuestro aparato militar y de seguridad nacional- creando tecnologías nuevas y únicas para traer Orden al Caos. Nos quedamos atrás y dejamos que América se rezagara del resto del mundo en innovación y tecnología. Nunca más, el prestigio perdido a raíz de la Guerra Civil será recuperado, y a través de los cañones de nuestras armas recién fabricadas, el Caos será ahogado."
 USB_merge_the_mic: "Fusionar el complejo militar-industrial"
 USB_merge_the_mic_desc: "La mezquina competencia entre las empresas militares-industriales ha impedido nuestra capacidad de mantenernos por delante de nuestros adversarios. Nos permitió quedarnos atrás, nos obligó a elegir entre un diseño defectuoso u otro, azul o rojo, mediocre o tolerable.\nA diferencia de los tontos que nos precedieron, no tenemos paciencia para rivalidades triviales. Están por debajo de nuestra nación, por debajo de nosotros. Es hora de eliminar la grasa del CMI y fusionarlo con el todo mayor. Con el poder combinado de estas pequeñas empresas, Lockheed Martin-Boeing y General Dynamics se convertirán en los mayores grupos de expertos en la historia de la raza humana.\nLos adultos están de nuevo al mando, y a través de nuestra ingeniería superior, el Orden será restablecido."
 USB_reel_in_the_think_tanks: "Controlar a los think tanks"
 USB_reel_in_the_think_tanks_desc: "Los think tanks han estado sueltos demasiado tiempo. Mientras nuestras corporaciones, agencias de inteligencia y DARPA trabajan sin descanso para corregir el Gran Error que nos puso de rodillas, los think tanks holgazanean. Sin embargo, como cualquier buen estratega, usamos todas las herramientas a nuestra disposición, y los think tanks no son diferentes. Les recordamos que la debilidad no se tolera. Ahora, son como cualquier otro de nuestros activos.\n\nEl frupo Bilderberg, antes ineficaz y superfluo, ahora se esfuerza por reconstruir el Orden global que fue consumido por el Fuego a través de sus reuniones anuales. La Comisión Trilateral, sin propósito tras la Segunda Guerra Civil Americana, reafirma nuestra delicadeza diplomática, incitando a las potencias regionales a caer en nuestras manos cada vez más grandes. Incluso los llamados \"neoconservadores\" y \"never-Trumpers\" han resucitado el largamente enfermo \"Proyecto para el Nuevo Siglo Americano\", impulsando el restablecimiento de nuestro dominio global y desarrollando nuestros planes futuros."
 USB_unrestrained_rd: "I+D sin restricciones"
 USB_unrestrained_rd_desc: "El concepto de \"ética\" es un tumor en la innovación científica. Desde que ha sido una prioridad, la ética ha sido una muleta en la que se apoyaban los ignorantes, todo para ayudarse a dormir por la noche, incluso cuando se quedaban atrás de la competencia. El Gobierno anterior a la Consolidación de Emergencia no fue diferente, permitieron que las masas tiránicas conspiraran contra nosotros, permitieron que nuestros adversarios superaran a nuestras incipientes empresas, todo por el bien de su pureza moral.\nEl yugo que frenaba a las grandes mentes de este país ha sido cortado para siempre. El orden debe ser restablecido, y si algunas de las masas necesitan ser eliminadas para asegurar que nuestra dominación global sea restaurada, entonces que así sea."
 USB_projects_of_greatness: "Proyectos de grandeza"
 USB_projects_of_greatness_desc: "A lo largo de la historia del mundo moderno, casi todas las grandes innovaciones han contado con algún tipo de financiación para sustentarlas. Montones de dinero -documentado o no- que mantuvieron el proyecto a flote sobre las oscuras aguas del fracaso. Nuestras empresas militar-industriales no son una excepción. A medida que nuestra ambición crece, también lo hace su necesidad de dinero, libertad y poder.\n\nMediante fusiones corporativas, regulaciones eliminadas y la destrucción de códigos éticos, hemos creado el mayor grupo de mentes brillantes en la historia de la humanidad con nuestra industria militar-industrial. Utilizando el presupuesto negro, cada carga financiera, de recursos o de mano de obra que tengan desaparecerá. El complejo militar-industrial seguirá teniendo la financiación necesaria para continuar con sus numerosos proyectos.\nLos planos han sido esbozados, las piezas han encajado. Desde la red de vigilancia digital más compleja jamás creada, hasta la investigación neurológica incautada al traidor Musk; el mundo está a punto de presenciar la restauración de nuestro potencial, un prestigio que fue aplastado por el antiguo Gobierno. El camino hacia el Orden ha sido pavimentado; todo lo que necesitamos hacer es recorrerlo."
 USB_ensure_aerospace_dominance: "Asegurar el dominio aeroespacial"
 USB_ensure_aerospace_dominance_desc: "En el Orden global posterior a 1991, una vez tuvimos una hegemonía abrumadora sobre el sector aeroespacial. Nuestra profunda fortaleza se demostró con nuestros éxitos operativos de los años 90. Nuestros aviones furtivos dominaban los cielos, lloviendo fuego infernal sobre nuestros adversarios, y cualquier amenaza extranjera al Orden era aplastada en cuestión de semanas. Pero todo se vino abajo antes de la Guerra Civil. Nuestros competidores nos superaron, las masas comenzaron a conspirar contra nosotros y el Fuego consumió nuestra nación.\nEn nuestra ausencia, el Caos prevaleció en todo el mundo. Desde las tensiones en Europa hasta la guerra de Taiwán, ha quedado abundantemente claro que las naciones extranjeras no pueden valerse por sí mismas, no pueden dejar de avivar las llamas del Caos. Por lo tanto, necesitamos protegerlas. A través del presupuesto negro, empoderaremos a nuestra Lockheed Martin-Boeing para que domine el mercado global y reafirme el Orden en el mundo. Han demostrado que no merecen el privilegio de protegerse a sí mismos, así que debemos asumir una vez más la responsabilidad."
 USB_dumb_construction: "Construir bases D.U.M.B."
 USB_dumb_construction_desc: "Las bases militares subterráneas profundas (Deep Underground Military Bases, D.U.M.B.) han sido una propuesta desde la época de la Guerra Fría. Con diferentes nombres, la idea ha permanecido la misma: servir como contingencia y también como una extensión del protocolo gubernamental. Estas propuestas nunca llegaron a ninguna parte, por supuesto. Pero, la Guerra Civil nos ha enseñado que las masas son animales rabiosos y desatados esperando para atacar. Contingencias como esta ya no son un lujo, sino una necesidad.\n\nPero los tontos desinformados que rechazaron este plan hace tanto tiempo no son más que un recuerdo. Ahora, nosotros tenemos las cartas, y con el presupuesto negro, tenemos un acceso sin precedentes a recursos que nos permitirán ejecutar nuestras ambiciones. A través de las D.U.M.B., no solo tendremos refugios y una plétora de contingencias de emergencia si el Orden alguna vez es amenazado de nuevo, sino también instalaciones de investigación de alto nivel para permitir a DARPA y al complejo militar-industrial el espacio para probar y desarrollar nuevas tecnologías que impulsarán nuestra agenda."
 USB_hunter_killer_program: "Programa Hunter-Killer"
 USB_hunter_killer_program_desc: "Cuando se trata de amenazas al Orden, no hay límites que sean \"demasiado lejos\" - no hay medidas que no tomemos. Si tenemos que quemar cada casa de un pueblo para encontrar una amenaza, seremos los primeros en encender una antorcha. A pesar de nuestros mejores esfuerzos, aún quedan disidentes. Escondidos en la arena como serpientes, esperando su momento para atacar. Necesitamos tomar medidas aún más necesarias para purgar a nuestra nación de este elemento corrosivo.\nUsando drones, podemos cazar fácilmente a cualquier disidente que intente esconderse. Puede ser en la noche más oscura o en los bosques más densos, y somos capaces de encontrar y erradicar a estos extremistas. A través de nuestras compañías aeroespaciales, tenemos un suministro inigualable de drones baratos que podemos usar para destruir cualquier amenaza a la seguridad nacional. Ahí es donde entra en juego el programa Hunter-Killer. Ya se ha establecido que la ética es un tumor en la innovación científica, pero esto se extiende también a la guerra. Las masas desinformadas se han quejado de los drones desde su primer despliegue hace mucho tiempo; perdieron el privilegio de quejarse después de que comenzó la Guerra Civil. Ahora que los adultos están a cargo, eliminaremos las regulaciones que frenaban la guerra con drones. A través de este programa, cualquier insurgente será encontrado y eliminado."
 USB_kickstart_the_amnet: "Encender la Am-Net"
 USB_kickstart_the_amnet_desc: "En un mundo cada vez más digitalizado, cada uno se retira a sus propios estanques. Ya sea el Frente Patriota, obsesionado con las relaciones públicas y la imagen, o la División Atomwaffen, la misantropía hecha carne, o el EPLA, justificando su barbarie bajo el disfraz del progreso social. Estas pequeñas comunidades filtran sus propias \"verdades\" contradictorias en el creciente pantano de la sociedad en su conjunto, galvanizando a cada individuo para que elija la \"verdad\" que mejor se adapte a sus deseos y necesidades como respuesta a su sociedad moribunda. Así comenzó la Guerra Civil, así fue consumido el Orden global por el Fuego, y así se estancaría la humanidad sin nuestra intervención.\nA través de la IA que impulsa la Am-Net, somos capaces de seleccionar información importante y filtrar la basura del discurso digital. Algunos lo llaman censura, pero en realidad, simplemente estamos creando contexto al filtrar los datos basura. Las masas han demostrado que sus \"libertades\" solo conducen a la muerte y la desesperación. Es nuestro deber como gobernantes protegerlos, pensar por ellos.\n\nMás allá de esto, la Am-Net tendrá otro propósito: un agregado, una matriz del pensamiento humano que nos permite estudiar la propagación de ideas, culturas y símbolos (o \"memética\"). Durante décadas, gobiernos menores han estado buscando la clave para comprender las complejidades de la mente humana, y por extensión, la clave para el control social. Nosotros, por supuesto, hemos descubierto que es la memética. A través de la colosal cantidad de datos que recopilaremos de la Am-Net, nuestra IA predictiva que monitorea la Am-Net será entrenada en las complejidades del pensamiento humano. A través de la IA, podremos reprimir la actividad antisocial exponencialmente más rápido, todo sin los errores que conlleva la precognición humana. Nuestros estudios ya están mostrando que, a través de las capacidades avanzadas de contexto y deducción de la IA, podemos identificar actividades criminales incluso antes de que ocurran. El lanzamiento de la Am-Net será solo el principio."
 USB_justice_reform: "Reforma judicial"
 USB_justice_reform_desc: "La Dama Justicia ha estado bastante contenida en los últimos años; los buitres carroñeros que la rodean desearían que mantuviera la venda en los ojos.\nEl orden es una virtud, y al permitir que la justicia vea, seríamos capaces de restaurar esa virtud."
 USB_form_the_uspf: "Formar la Fuerza Policial de Estados Unidos"
 USB_form_the_uspf_desc: "Uno de los mayores defectos de los antiguos Estados Unidos era su tendencia a permitir que las lealtades locales crecieran por encima de la lealtad federal. Las fuerzas del orden locales han sido demasiado indulgentes con el crimen y los sentimientos traidores; esto termina hoy.\nLa formación de la Fuerza Policial de Estados Unidos debería remediar este problema asegurando que los extraños supervisen las comunidades de otras personas para evitar el apego emocional."
 USB_atf_new_purpose: "Nuevo propósito del ATF"
 USB_atf_new_purpose_desc: "Con las palancas del poder firmemente en nuestras manos, podemos reformar agencias leales para que sean más efectivas en contrarrestar la marea de caos que azota nuestra nación.\nEl ATF siempre ha mantenido su lealtad a los Estados Unidos, y la lealtad nunca queda sin recompensa. Se les asignarán más fondos y privilegios para combatir la Segunda Enmienda y su mal uso por parte de los cultos que asolan nuestra nación. Desde evangélicos hasta clubes de lectura socialistas, todo lo que vaya en contra del Orden será etiquetado como un culto y se tratará en consecuencia."
 USB_coordinate_with_the_ic: "Coordinar con la CI"
 USB_coordinate_with_the_ic_desc: "La Comunidad de Inteligencia siempre ha sido una de las columnas vertebrales de los Estados Unidos de América, manteniendo una vigilancia atenta mientras las sombras de la locura intentaban infiltrarse en nuestra nación. Ahora que la locura ha llegado a nuestro país, la comunidad de inteligencia recibirá mucho más poder para lidiar con las amenazas internas y externas.\nLos días de sueño han terminado; el ojo no se cerrará nunca más."
 USB_expand_the_dhs: "Expandir el DHS"
 USB_expand_the_dhs_desc: "El Departamento de Salud y Servicios Humanos ha demostrado ser ineficiente al no tener en cuenta la inminente amenaza del extremismo; con el ataque químico cometido por la División Atomwaffen, la salud se ha convertido en una amenaza para la seguridad nacional.\nPor lo tanto, se fusionará con el Departamento de Seguridad Nacional, y con la llegada de nuevas perspectivas sobre estos temas, nuestro objetivo será hacer cumplir los confinamientos y mantener cualquier mandato relacionado con la salud pública.\nAquellos que no cumplan con el mandato serán aislados en instalaciones de la FEMA para evitar mayores daños a la nación."
 USB_a_kick_in_every_door: "Una patada en cada puerta"
 USB_a_kick_in_every_door_desc: "La burocracia solo es útil si mantiene el Orden. Con la Guerra Civil, sin embargo, se ha vuelto engorroso lidiar con la burocracia.\nDespués de los acontecimientos recientes, hemos adquirido las tijeras necesarias para cortar el exceso. Con eso, podemos registrar cada hogar, usar tácticas de investigación agresivas y detener a quien se considere una amenaza."
 USB_the_right_to_remain_silent: "Derecho a guardar silencio"
 USB_the_right_to_remain_silent_desc: "Con una planificación cuidadosa y la ejecución de varias operaciones contra diversas sectas, insurgencias y terroristas. Es seguro decir que estamos lejos de terminar nuestra misión. El Orden es algo que debe mantenerse, delicadamente, constantemente.\nComo una máscara de porcelana, no puede vivir con una sola grieta.\nEl trabajo de una nación aún no está completo."
 USB_we_wont_fail_again: "No volveremos a fallar"
 USB_we_wont_fail_again_desc: "Derrotamos a los británicos, derrotamos a los alemanes, derrotamos a los rusos.\nY una vez más, como hicimos antes, derrotamos al animal que llevamos dentro.\nNo volveremos a fallar.\nEl Orden permanece."
 USB_build_back: "Build Back"
 USB_build_back_desc: "El plan Build Back Better fue uno de los proyectos más ambiciosos de Biden para la nación. Con el Orden restaurado, podemos finalizar el proyecto y añadirle mejoras adicionales.\nSe abordará la infraestructura largamente descuidada, se aprobará un proyecto de ley de ayuda social por la pandemia y se proporcionarán fondos adicionales a varias iniciativas de política social. Además, con la reconstrucción en curso, podemos remodelar el paisaje urbano estadounidense para que sirva a nuestros objetivos."
 USB_federal_rail_network: "Red Ferroviaria Federal"
 USB_federal_rail_network_desc: "La Guerra Civil nos ha dado carta blanca para promulgar lo que deseemos para mantener la seguridad nacional. Con la construcción de una vasta red de vías férreas en todo el país, podemos reubicar a los trabajadores de forma regular según sus asignaciones de trabajo.\nEsto también sirve como una forma de aumentar nuestra vigilancia sobre la población, ya que la población rural será reubicada en las ciudades, especialmente en áreas que tienen poco o ningún incentivo de lucro para nuestros aliados corporativos."
 USB_cold_hearted_pragmatism: "Pragmatismo frío"
 USB_cold_hearted_pragmatism_desc: "Decir que defendemos ciertos valores sería una flagrante mentira; sin embargo, todos hemos visto lo que le sucede a una nación cegada por el velo del extremismo.\nNuestro enfoque hacia nuestros ciudadanos debería ser como el de un padre estricto; sabemos lo que es más efectivo y sabemos lo que da resultados.\nPodemos ser hombres morales, o podemos ser los hombres que devolvieron a los Estados Unidos al trono del mundo."
 USB_safeguard_the_population: "Salvaguardar a la población"
 USB_safeguard_the_population_desc: "Aquellos sin conciencia son aquellos sin dolor.\nNuestros ciudadanos han pasado por una gran prueba, y no hay duda de que la mayoría desearía que las cosas volvieran a la normalidad. Seguros y en Orden, volver a la normalidad es simplemente imposible, pero lo que podemos ofrecer, sin embargo, es un velo de consuelo con la máquina del Orden trabajando incansablemente para asegurar que nuestra población permanezca ajena.\nFuncionarios que se dan la mano, formas más sutiles de vigilancia y un mundo que sigue girando.\nTrabajamos en las sombras para que ellos puedan ver otro día; solo aquellos con malas intenciones tienen algo que ocultar."
 USB_megalopolis_project: "Proyecto Megalópolis"
 USB_megalopolis_project_desc: "Se han reportado actividades antisociales extremas en el Cinturón del Óxido y en las zonas rurales del interior, y la mayoría de estos territorios ofrecen poco o ningún valor ni para nosotros ni para nuestros socios corporativos.\nComenzaremos a expandir nuestras ciudades para acomodar la reubicación de la población rural a nuestros centros urbanos. Esto proporcionará un respiro para cualquier operación que tenga lugar en las áreas rurales, mientras podemos vigilar a la población en las ciudades."
 USB_efficient_use_of_land_act: "Acta de Uso Eficiente de la Tierra"
 USB_efficient_use_of_land_act_desc: "La guerra civil ha dejado una gran cicatriz en nuestras tierras, y con la mayor parte de la población rural teniéndonos en gran desdén, sería prudente confiscar sus propiedades para acomodar proyectos más grandes como amplios campos de cultivo. Junto con nuestros amigos de BlackRock, podemos dar un mejor uso a las tierras."
 USB_redefine_big_government: "Redefinir el big government"
 USB_redefine_big_government_desc: "La centralización es un concepto ajeno a la mayoría de los estadounidenses, pero es un concepto que ha demostrado ser necesario.\nPara evitar el crecimiento de lealtades locales que favorecen su entorno directo en lugar de los Estados Unidos de América, las autoridades locales pasarán a ser cosa del pasado.\nCada funcionario en cada estado responderá a una autoridad central que supervisa una nación en reconstrucción."
 USB_biochemical_breakthroughs: "Avances bioquímicos"
 USB_biochemical_breakthroughs_desc: "La raza humana ha demostrado ser impredecible, pero como todo mamífero, está dictada por los químicos que se gestan en su cerebro.\nHemos logrado grandes avances en el campo de los agentes bioquímicos y, al inyectar químicos de docilidad en el agua, mediante vacunaciones masivas y la construcción de biolaboratorios en todo el mundo, podemos someter la mente humana a una cirugía constante hasta que haya alcanzado el estado de docilidad deseado."
 USB_intensify_digitalization: "Intensificar la digitalización"
 USB_intensify_digitalization_desc: "La pandemia de COVID-19 ha demostrado lo dependiente que es la población del mundo digital, un mundo fácil de controlar y mantener.\nInvocando el Orden, podemos digitalizar completamente casi todos los aspectos de la vida moderna. Las finanzas, la comunicación, el almacenamiento de archivos y el consumo masivo de medios. Nada de esto pasaría desapercibido para nosotros. Con la población cada vez más dependiente de lo digital, podemos hacer que incluso los más reacios participen en la sociedad."
 USB_the_new_social_contract: "El nuevo contrato social"
 USB_the_new_social_contract_desc: "El contrato social es un pilar fundamental para mantener el Orden.\nSu mayor defecto era que su tinta era borrable y su papel demasiado fácil de romper.\nAl dar a la población la idea de que algunas de sus libertades tendrían que ser cedidas para que sus hijos pudieran ir a la escuela o para asegurar que ninguna actividad antisocial les causara daño, haríamos que la gente prácticamente nos rogara que trajéramos Orden al Caos."
 USB_correcting_the_great_mistake: "Corrigiendo el Gran Error"
 USB_correcting_the_great_mistake_desc: "La dicotomía entre neoliberalismo y neoconservadurismo no pudo resistir la prueba del tiempo. Las fallas del antiguo orden internacional basado en reglas se hicieron evidentes con el surgimiento del COVID-19 y la Segunda Guerra Civil Americana, lo que llevó a los mayores períodos de Caos en los tiempos modernos.\nHemos aprendido la lección y haremos todo lo que esté a nuestro alcance para asegurar que esto nunca vuelva a suceder.\n\nEl orden es un pilar sobre el que apoyarse.\nNo nos dejaremos consumir por las llamas del cambio."
 USB_nnunion: "NNUNION"
 USB_nnunion_desc: "Canadá siempre ha sido un aliado de larga data de los Estados Unidos de América, y la crisis pasada ha demostrado que nuestros hermanos del Norte han estado mal equipados para lidiar con cualquier posible crisis futura.\nAfortunadamente, todavía tenemos gente dentro que comparte nuestros valores y virtudes. Al aplicar presión y promesas a las personas adecuadas, podemos lograr que el Gobierno canadiense sea mucho más cordial con nosotros."
 USB_arctic_security: "Seguridad ártica"
 USB_arctic_security_desc: "El Ártico ha sido un área rodeada de teorías y misterio; independientemente de la verdad, sería en nuestro mejor interés asegurar los desiertos helados para garantizar que ninguna otra amenaza extranjera pueda establecer una presencia allí."
 USB_gapigs: "GAPIGS"
 USB_gapigs_desc: "El Caribe siempre ha sido el equivalente a un trofeo, especialmente Cuba.\nLos ideólogos comunistas presentes junto a los elementos más criminales en islas como Haití demostrarían ser susceptibles a la influencia extranjera, con el potencial de representar una amenaza creíble para la seguridad nacional. Sería aconsejable llevar a cabo una intervención militar para restaurar el orden y la democracia en la región."
 USB_limartini: "LIMARTINI"
 USB_limartini_desc: "México siempre ha sido la espina en nuestro costado, ya sea por la inmigración ilegal o el transporte de drogas a través de la frontera. El país del sur está repleto de caos, cárteles y revolucionarios que no han hecho más que fomentar actividades antisociales.\nUna intervención militar adecuada en México nos permitiría limpiar el país y asegurar que no tengamos elementos hostiles en nuestro patio trasero."
 USB_pcbridge: "PCBRIDGE"
 USB_pcbridge_desc: "Centroamérica sería considerada el puente entre el Norte y el Sur, y con nuestra ausencia temporal, los estados centroamericanos han mostrado su verdadero sentimiento hacia los Estados Unidos.\nAl asegurar el puente, tendremos un camino abierto tanto a Sudamérica como para restaurar el control sobre el canal de Panamá."
 USB_work_force_act: "Acta de la Fuerza Laboral"
 USB_work_force_act_desc: "El Acta de la Fuerza Laboral nos permite utilizar a los ciudadanos detenidos como trabajadores, reduciendo costos y demostrando a futuros elementos antisociales que hay consecuencias para el Caos."
 USB_mhoctopus: "MHOCTOPUS"
 USB_mhoctopus_desc: "Expandir nuestro alcance global aseguraría que podamos reaccionar ante cualquier crisis en cualquier momento con la aplicación adecuada de la fuerza. Los disidentes que huyen de la nación, los líderes de movimientos terroristas y los elementos subversivos no podrán escapar de nuestra mirada."
 USB_solidify_our_position: "Consolidar nuestra posición"
 USB_solidify_our_position_desc: "A medida que el Orden se restablece lentamente en todo el mundo, debemos aprender de los errores que llevaron a que las llamas del cambio envolvieran nuestro mundo. Tomando medidas preventivas y aplicando las defensas adecuadas en posiciones clave, podemos asegurar que cualquier elemento hostil encuentre difícil causar un daño real a los Estados Unidos."
 USB_mqwallbreaker: "MQWALLBREAKER"
 USB_mqwallbreaker_desc: "Asia y Oceanía siempre han sido el objetivo de un tira y afloja entre nosotros y China, y con el dragón rojo aumentando sus hostilidades en la región, sería inevitable que aumentáramos gradualmente nuestra presión combinada sobre uno de nuestros antiguos rivales.\nAl brindar apoyo a nuestros viejos aliados y revisar nuestros antiguos planes de contingencia con respecto a China, finalmente podremos poner fin al cuento chino del expansionismo."
 USB_lznostalgia: "LZNOSTALGIA"
 USB_lznostalgia_desc: "Sudamérica ha sido un continente empapado en la gasolina del desorden, e incluso hoy, el aire de caos no encendido sigue tan presente.\nCon intervenciones en naciones tomadas por el extremismo y presión sobre nuestros antiguos socios, el Orden puede ser restaurado, y podremos continuar nuestras operaciones sin interrupciones en el continente.\nComo de costumbre."
 USB_cxhomecoming: "CXDADDY"
 USB_cxhomecoming_desc: "Europa siempre ha sido un campo de batalla de ideales e imperios; incluso hoy, vemos pruebas de que nuestra ausencia no ha sido más que un perjuicio neto para todo el continente.\nYa sea que esté dominada por el pensamiento extremista o por los rusos, no importa.\nComo cualquier cuidador, nunca nos vamos del todo, y con nuestro inevitable regreso, le mostraremos al mundo que estamos lejos de haber terminado con nuestra visión para el mundo."
 USB_aqtomato: "AQTOMATO"
 USB_aqtomato_desc: "África ha sido un lienzo de Caos durante décadas, con sus muchos autócratas e insurgencias, está floreciendo con un potencial sin explotar para expandir nuestra influencia.\nFinanciando a los luchadores por la libertad adecuados y permitiendo que los dictadores repriman a los revolucionarios, podemos mantener una vigilancia atenta sobre el continente oscuro."
 USB_kktemple: "KKTEMPLE"
 USB_kktemple_desc: "Medio Oriente es una región llena de elementos antisociales, extremistas radicales y fanáticos ciegos que se lanzarían a un frenesí suicida.\nUna región atrasada con sangre infinita en sus arenas, nuestro mayor error fue dejarlos en el barro. Pero volveremos, y esta vez nunca nos iremos."
 USB_destroy_hazardous_elements: "Destruir elementos peligrosos"
 USB_destroy_hazardous_elements_desc: "Como cualquier forma de alimaña, los elementos antisociales persisten en nuestra nación.\nTumores de extremismo en las partes más oscuras de nuestras ciudades, un anhelo animal por el cambio.\nLa humanidad es un espectro destinado a estar bajo constante escrutinio; nos libraremos de las cicatrices infligidas."
 USB_war_machine_back_on_track: "Reiniciar la maquinaria bélica"
 USB_war_machine_back_on_track_desc: "El complejo militar-industrial es como una deidad divina que desata su ira sobre aquellos que se interponen en el camino del Orden. Durante demasiado tiempo, la máquina de guerra estadounidense ha sido frenada por preocupaciones éticas; tales preocupaciones están reservadas solo para los leales.\nCon nuestro ejército recuperando el respeto que se merece, podremos revivir el mito de la paz americana.\nEsta vez para siempre."
 USB_the_arsenal_of_order: "Arsenal del Order"
 USB_the_arsenal_of_order_desc: "Tanques, misiles, cazas y acorazados. Esto es solo la punta del iceberg de lo que somos capaces.\nNuestros enemigos han disfrutado de su momento de gloria durante demasiado tiempo; nuestra ausencia temporal los ha vuelto cómodos, demasiado cómodos.\nCon las mentes brillantes bajo nuestro amparo y la industria militar expandida cumpliendo su función, estaremos listos para enfrentarnos a cualquier gigante."
 USB_reopen_the_factories: "Reabrir las fábricas"
 USB_reopen_the_factories_desc: "Durante ambas guerras mundiales, hemos demostrado una y otra vez que la industria americana sigue siendo la mejor; cualquier enemigo que se opuso a la marcha inevitable de la estabilidad se convirtió en nada más que notas a pie de página en el gran esquema de las cosas.\nCon nuestro rápido avance tecnológico e industrial, el gigante nunca volverá a dormir."
 USB_freedom_of_movement_act: "Acta de Libertad de Movimiento"
 USB_freedom_of_movement_act_desc: "Con el Acta de Libertad de Movimiento, podremos tener cualquier forma de viaje dentro de nuestra nación bajo control constante. Los puntos de control en todo el país dictan cómo conduce la población, y la red ferroviaria federal se utiliza de acuerdo con nuestra visión.\nYa sea que uno visite a su familia, sea reubicado por razones laborales o incluso intente pasar desapercibido en las zonas rurales.\nLo sabremos."
 USB_global_task_force_units: "Unidades de Fuerza de Tareas Globales"
 USB_global_task_force_units_desc: "Sería una locura excedernos en problemas de pequeña escala a nivel global.\nPara evitar que estos problemas se conviertan en una crisis, utilizaremos unidades de fuerza de tareas globales que atacarán los problemas con precisión quirúrgica.\nLos insurgentes armados con armamento casi primitivo no serán más que un absceso que se puede extirpar."
 USB_permanent_military_presence_worldwide: "Presencia militar mundial permanente"
 USB_permanent_military_presence_worldwide_desc: "Ya sean Estados canallas, amenazas extranjeras o grupos insurgentes violentos. Una cosa sigue siendo cierta: nuestra ausencia es lo que ha hecho que se vuelvan más audaces en su violencia.\nDurante el apogeo del neoconservadurismo, teníamos tropas en todas partes; nuestros enemigos llegaron a comprender lo que realmente significaban el miedo y el odio. Nuestra bandera, nuestros símbolos y nuestro idioma en sus tierras eran un indicador de que estábamos aquí para quedarnos.\nAl restablecer bases militares a nivel mundial y al aplicar la presión militar adecuada sobre nuestros oponentes, les recordaremos sus lecciones olvidadas."
 USB_automated_killing_fields: "Campos de exterminio automatizados"
 USB_automated_killing_fields_desc: "Existen amplias zonas repletas de elementos antisociales que aportan poco o ningún valor a nuestra agenda. Sin embargo, sería imprudente dejarlos a su suerte.\nCon el uso de drones, podemos mantener el control deseado sobre estas áreas y contener cualquier amenaza que intente causar problemas; no hay necesidad de un elemento humano. No negociamos con terroristas."
 USB_revive_the_ngb_program: "Revivir el programa NGB"
 USB_revive_the_ngb_program_desc: "El programa Next-Generation Bomber fue un esfuerzo para introducir un nuevo tipo de bombardero en nuestro ejército, uno capaz de alcanzar una velocidad máxima subsónica, una capacidad operativa a largo plazo de entre 50 y 100 horas, y la capacidad de transportar armas termonucleares. Estos símbolos voladores de la paz americana servirán como nuestro orgullo y los portadores del Orden."
 USB_utilize_pmcs: "Utilizar las CMP"
 USB_utilize_pmcs_desc: "Nuestra relación con las compañias militares privadas siempre ha sido de naturaleza simbiótica. Cuando necesitábamos que se hiciera un trabajo sucio sin manchar la bandera, empleábamos regularmente sus servicios.\nNo hay razón para dar marcha atrás en una relación tan fructífera. Nuestros amigos corporativos estarían aún más encantados de ver aumentar sus tarifas y de preocuparse aún menos por las reglas de enfrentamiento, siempre y cuando el trabajo se haga."
 USB_humanitarian_peacekeeping: "Mantenimiento humanitario de la paz"
 USB_humanitarian_peacekeeping_desc: "Ha habido bastantes historias descabelladas sobre nuestros esfuerzos en todo el mundo; la calumnia y la infundación de miedo se han convertido en parte del curso para la policía mundial.\nSin embargo, la verdad sigue siendo la misma.\nAllí, donde sostenemos la antorcha de la seguridad, la gente puede cruzar la calle con seguridad. Siempre que un civil está en extrema necesidad, estamos allí.\nJunto con nuestros amigos de las Naciones Unidas, podremos expandir nuestro control sobre las regiones desestabilizadas, alimentar a los hambrientos y saciar su sed.\nPuede que nos entrometamos en su forma de vida, pero ¿es el Caos constante realmente una forma de vivir?"
 USB_watchdog_of_the_world: "Guardián del mundo"
 USB_watchdog_of_the_world_desc: "La \"policía mundial\" se usa a menudo como un término despectivo, pero nuestra ausencia ha demostrado que, de hecho, era necesaria.\nDos guerras en Europa, dos guerras en Asia y varios conflictos a menor escala en todo el mundo, y todo porque simplemente no estábamos presentes.\nNosotros, sin embargo, hemos regresado, y nuestra mirada sobre el mundo permanecerá.\nEl Orden por sobre todo."
 USB_extinguish_the_fire: "Extinguir el Fuego"
 USB_extinguish_the_fire_desc: "La llama del cambio envolvió al mundo en el Caos.\nEl Capital, el Orden y la Pureza han sido puestos a prueba y han superado la prueba con creces.\nEstas son virtudes e ideales por los que vale la pena luchar, y la llama ha sido apagada.\nSofocada, calmada.\nNunca más se volverá a encender, por un mundo mejor."
 USB_a_new_world_order: "Un Nuevo Orden Mundial"
 USB_a_new_world_order_desc: "\"Afirmaste la tierra sobre sus cimientos: ¡no se moverá jamás!\"\n\nSalmos 104:5"
 USB_final_chord_of_the_cold_war: "Acorde final de la Guerra Fría"
 USB_final_chord_of_the_cold_war_desc: "La paz americana estaba destinada a durar para siempre, con nuestra nación dejando de existir por una década o dos, nuestros antiguos rivales en Rusia han podido expandirse mucho más allá de su zona de contención. La antigua potencia regional ha tomado el manto de la policía mundial, pero ya podemos ver las grietas en su sistema.\nNo fueron construidos para durar; es hora de finalizar el resultado de la Guerra Fría, largamente olvidada."
 USB_operation_atlantic_airlift: "§YOPERACIÓN§!: Atlantic Airlift"
 USB_operation_atlantic_airlift_desc: "La brecha entre nosotros y una Europa dominada por Rusia es bastante amplia.\nUtilizando las rutas de transporte aéreo establecidas por el mando central, desplegamos tropas rápidamente para llevar a cabo operaciones en el continente. Liberamos Europa una vez; lo haremos de nuevo."
 USB_demoralization_and_dehumanization: "Desmoralización y deshumanización"
 USB_demoralization_and_dehumanization_desc: "El eslavo está biológicamente inclinado a la arrogancia y al desprecio por la vida individual.\nUno de los mayores errores de nuestros predecesores fue asumir que podíamos estar en igualdad de condiciones para hablar con los rusos, un error que no se repetirá.\nLas semillas de la ira están tan presentes como siempre en Europa, y las aguas del Orden asegurarán que nuestros amigos ocupados florezcan en rosas con espinas. Utilizando la guerra memética y la renovación de la propaganda antigua, podemos hacer que el pueblo europeo anhele su libertad."
 USB_paint_the_tanks_green: "Pintar los tanques de verde"
 USB_paint_the_tanks_green_desc: "La mayor parte de nuestro ejército se ha adaptado perfectamente a la lucha en Medio Oriente debido a la constante necesidad de estabilidad en la región. Sin embargo, debido a las diferencias ambientales en Europa y Rusia, se considera necesario reajustar nuestras tropas para que se adapten a sus respectivos entornos.\nEl mundo está acostumbrado al soldado americano con colores desérticos; acostumbremoslos al verde."
 USB_amplify_our_presence: "Amplificar nuestra presencia"
 USB_amplify_our_presence_desc: "La razón principal por la que los rusos nunca se atrevieron a inmiscuirse completamente en nuestra esfera se debe a nuestra constante presencia militar cerca de sus fronteras; han visto cómo operamos en el Medio Oriente, Asia y Europa. En cambio, esperaron como buitres nuestro colapso.\n\"El buitre gordo se arrastra cuando el águila se acerca\".\nRestableceremos nuestra presencia alrededor de Europa y, eventualmente, dentro de ella, dejándolos revivir la misma ansiedad que sintieron durante décadas. América llegó para quedarse."
 USB_lend_lease_act: "Acta de Préstamo y Arriendo"
 USB_lend_lease_act_desc: "Ayudamos a nuestros aliados durante la Segunda Guerra Mundial en su momento de necesidad, y lo haremos de nuevo mientras nos preparamos para otra noble cruzada para liberar a Europa de las garras de la tiranía.\nEl puro poder industrial de los Estados Unidos ahogará a los rusos en su propia extralimitación.\nArmas de fuego, suministros, equipo. Nuestros aliados necesitan más."
 USB_operation_bear_hunter: "§YOPERACIÓN§!: Bear Hunter"
 USB_operation_bear_hunter_desc: "Nos hemos estado preparando para esto durante meses. Uno de nuestros mayores errores fue permitir siquiera que existiera el concepto de \"ruso\" cuando la Unión Soviética colapsó, lo que les permitió reconstruirse de la misma manera que lo hicieron los alemanes después de Weimar. Y así como castramos a los alemanes, haremos lo mismo con nuestros rivales del Este.\nLa destrucción de la maquinaria de guerra rusa sigue siendo una prioridad; nuestra tarea no será fácil. Nuestra tarea no será fácil. Nuestro enemigo está bien entrenado, bien equipado y endurecido por la batalla. Luchará salvajemente.\n\nNo aceptaremos nada menos que la victoria total.\nImploremos todos las bendiciones de Dios Todopoderoso sobre esta gran y noble empresa."
 USB_unlimited_climate_warfare: "Guerra climática ilimitada"
 USB_unlimited_climate_warfare_desc: "Civilizaciones más primitivas considerarían el poder que ejercemos sobre el clima global como algo parecido a tener el poder de un dios. Sin embargo, somos nosotros quienes dirigimos el clima en la dirección que deseamos.\nCon la guerra en curso con Rusia, podemos redirigir un clima más peligroso hacia nuestros rivales en el Este. Acelerar la llegada del invierno, ralentizar el verano o causar una tormenta en sus ciudades tan destructiva que su población supersticiosa comenzaría a creer que están siendo castigados.\nPorque así es."
 USB_third_gulf_war: "Tercera guerra del golfo"
 USB_third_gulf_war_desc: "Ya hemos estado aquí antes; muchos de nuestros jóvenes fueron sepultados en las arenas de Medio Oriente mientras sus huesos quedaban expuestos a las tormentas de arena. La mayoría de las generaciones más jóvenes temen un regreso a un conflicto que nos quitó tanto, pero con nuestros avances en tecnología militar, no hay razón para el miedo. Ese miedo solo lo sentirán los dictadores y terroristas que proliferan en la región."
 USB_expand_the_targets_list: "Ampliar la lista de objetivos"
 USB_expand_the_targets_list_desc: "Con la región fuera de control, la lista de personas de interés se ha expandido.\nDictadores, terroristas, bandidos y muchos más son pilares clave del Caos en Medio Oriente, y con nuestra marcha inquebrantable hacia los territorios, los neutralizaremos para que ya no representen una amenaza para la estabilidad."
 USB_unleash_democracys_fury: "La furia de la democracia"
 USB_unleash_democracys_fury_desc: "Nuestro mayor defecto en nuestras operaciones pasadas en la región fue la devoción a las reglas de enfrentamiento; nuestros detractores afirman que incidentes como Abu Ghraib fueron depravados.\nSin embargo, nuestra indulgencia pasada fue lo que permitió que elementos antisociales resurgieran y extendieran su ideología corrosiva hasta Europa y los Estados Unidos. No, esta vez nuestras reglas de enfrentamiento serán laxas. Estos terroristas nos habrían hecho lo mismo; de hecho, ya lo hicieron.\n\nAbu Ghraib, para toda la región."
 USB_reestablish_old_bases: "Restablecer bases antiguas"
 USB_reestablish_old_bases_desc: "Las cicatrices que dejamos atrás permanecen, y es hora de reabrirlas.\nNuestras tropas permanecerán en la región una vez que la liberemos, esta vez por un tiempo prolongado, ya que sin duda, habrá una resistencia constante a la antorcha de la iluminación.\nCon nuestra presencia, disuadiremos a los indecisos y aseguraremos a la ciudadanía local que el Orden será restaurado."
 USB_operation_whopper_junior: "§YOPERACIÓN§!: Whopper Junior"
 USB_operation_whopper_junior_desc: "Irak podría considerarse un trofeo para el experimento neoconservador, y en cierto modo, lo es. El espectro de Sadam sigue tan presente, pero con nuestros esfuerzos militares combinados y la guerra memética, podremos exorcizarlo del espíritu iraquí junto con cualquier forma de islamismo radical. Irak se convertirá en un ejemplo para el resto de la región."
 USB_operation_burning_dog: "§YOPERACIÓN§!: Burning Dog"
 USB_operation_burning_dog_desc: "Irán ha sido un objeto clave de deseo durante décadas. Queríamos absorberlo en nuestra esfera.\nSin embargo, su tiranía está demasiado arraigada para ser influenciada adecuadamente desde el exterior.\nLa acción militar directa y la promesa de mayor autonomía para las minorías étnicas de la región resultarán suficientes para erradicar la mancha negra de Medio Oriente."
 USB_project_babel: "§VProyecto Babel§!"
 USB_project_babel_desc: "El lenguaje es lo más poderoso del mundo, no importa cuán encadenado o golpeado esté uno. Se niega a morir.\nEs parte de la humanidad, parte de todo y de todos.\nIncluyendo a nuestros enemigos.\nPero, ¿y si diseccionáramos el concepto mismo?\n¿Volver su propio lenguaje en su contra?\nMedio Oriente tiene la clave del secreto.\nAdelante, rompe el ciclo."
 USB_the_eagle_vs_the_dragon: "El Águila contra el Dragón"
 USB_the_eagle_vs_the_dragon_desc: "Durante demasiado tiempo, dejamos que los chinos nos mangonearan. Durante demasiado tiempo, dejamos que hurgaran y pincharan nuestras debilidades hasta que nos derrumbamos. Deberíamos haber actuado antes, deberíamos haber impuesto nuestro férreo control sobre el mundo con mano más firme.\nLos políticos neoliberales-neoconservadores no lo permitirían, eran demasiado débiles para actuar ante nuestra legítima sospecha. Nuestro colapso fue parte de su plan, aprovecharon ese momento para expandir su dominio sobre una parte masiva del continente asiático. La era de la incapacidad ha terminado, ahora es el momento de la acción.\n\nEsta lucha se ha gestado durante mucho tiempo. Es hora de liberar Asia, es hora de decapitar al Dragón que nos ha atormentado durante tanto tiempo, y es hora de restablecer el Orden."
 USB_bolster_the_marine_corps: "Reforzar el Cuerpo de Marines"
 USB_bolster_the_marine_corps_desc: "En esta guerra, el Cuerpo de Marines será nuestro pan de cada día, la herramienta más afilada de nuestro arsenal, la perdición del Dragón. Al igual que nuestra noble cruzada para liberar las islas del Pacífico durante la Segunda Guerra Mundial, cada desembarco será una batalla cuesta arriba: los chinos lucharán con uñas y dientes por cada centímetro de tierra.\nLas fuerzas del Dragón están bien entrenadas y bien equipadas. Pero son como cualquier otra nación: tienen una voluntad que puede ser destrozada. Cada victoria será otra herida a su moral, y los Marines serán la clave para esto. El Cuerpo de Marines fue una vez reconocido por su fuerza, coraje y valor. Restauraremos este prestigio perdido a través de la victoria continua.\nCon nuestros Marines, el llamado \"Siglo Chino\" se demostrará como nada más que una fantasía."
 USB_war_on_the_sea: "Guerra en el mar"
 USB_war_on_the_sea_desc: "El Dragón afirma que su dominio sobre los mares se mantiene con mano de hierro, pero no podría estar más equivocado. Gracias a los ingeniosos diseños creados por nuestras compañías militares-industriales, nuestros barcos de fabricación estadounidense han destrozado estas latas chinas que se hacen pasar por \"embarcaciones navales\".\nPara romper el frágil control que el Dragón tiene sobre el Pacífico, necesitamos continuar con esta tendencia. Una vez que cada embarcación china haya sido volada por los aires, finalmente haremos añicos el cuento de hadas de la superioridad china. Les recordaremos por qué tenían miedo de invadir Taiwán."
 USB_take_on_the_trade_routes: "Cortar las rutas comerciales"
 USB_take_on_the_trade_routes_desc: "El férreo control del Dragón sobre el comercio mundial es su mayor activo, tanto militar como económicamente. Las rutas comerciales alrededor de China mantienen su economía a flote, a su gente alimentada y a sus soldados armados. Pero donde otras naciones menores verían su dominio comercial como una fuerza abrumadora, nosotros lo vemos como una oportunidad.\nSi cortamos estas rutas comerciales a los chinos, estaremos cortando efectivamente el corazón palpitante del Dragón. Durante décadas, el Dragón aprovechó su poder comercial para humillarnos y desestabilizar el Orden global americano, nuestro Orden. Cuando cortemos sus preciosas rutas comerciales, la tortilla finalmente se dará la vuelta."
 USB_operation_firestorm: "§YOPERACIÓN§!: Firestorm"
 USB_operation_firestorm_desc: "En la península coreana, nuestros aliados, los surcoreanos, luchan por cada centímetro de su legítimo territorio. Los parásitos izquierdistas son implacables en sus ataques, cada ofensiva es más salvaje que la anterior.\nNuestro mayor error en Asia fue permitir que el Estado norcoreano continuara siquiera como concepto. Los norcoreanos son solo otro vestigio de la Guerra Fría, una responsabilidad que se nos escapó de control. Esta vez, no tenemos miedo de ensuciarnos las manos, y ya es hora de que ayudemos a los coreanos y terminemos lo que empezamos.\n\nPara asegurar que el Orden sea eterno, debemos garantizar que la historia vuelva a donde pertenece: un punto muerto."
 USB_contain_the_communists: "Contener a los comunistas"
 USB_contain_the_communists_desc: "En las turbulentas aguas de los mares de China no se ve ni una sola embarcación china. El lecho marino del Pacífico es un cementerio para las latas de hojalata del Dragón. Gracias al ingenio de nuestros ingenieros y la valentía de nuestras tropas, hemos logrado nada menos que una victoria total. Y ahora, la fase final está lista para comenzar.\n\nEl Dragón puede intentar evitar la invasión de sus ciudades, e incluso puede ganar. Pero, por mucho que intenten escapar, no pueden evitar la hambruna. Los socialistas, los comunistas, los tiranos, dondequiera que se encuentren sus reductos, serán aniquilados por nuestra marina superior.\nEl Dragón intentará suplicar y negociar. Pero al final, el Dragón debe ser decapitado para asegurar el Orden, y pronto eso es lo que sucederá."
 USB_take_the_fight_to_them: "Llevarles la guerra"
 USB_take_the_fight_to_them_desc: "Operación tras operación, hemos mermado las defensas del Dragón. Cada isla perdida, cada defensa fallida ha debilitado su espíritu de lucha. Pero nuestra determinación de luchar solo se ha fortalecido. Hemos liberado las tierras que ocupan, y ahora les daremos una cucharada de su propia medicina.\nShanghái, Pekín, Shenzhen; ciudades que se erigen como monumentos a la arrogancia y al \"poder\" del Dragón. Los chinos creen que no tenemos las agallas para liberar estas ciudades, que somos como nuestros débiles predecesores. Se llevarán una desagradable sorpresa cuando nuestros cazas diezmen sus monumentos y nuestros barcos conviertan su costa en cenizas.\nEsa es la diferencia entre nosotros y los tontos que nos precedieron: no tomamos medidas a medias."
 USB_operation_pacific_rim: "§YOPERACIÓN§!: Pacific Rim"
 USB_operation_pacific_rim_desc: "A pesar de ser la población principal dentro de una \"nación del primer mundo\", los chinos son un pueblo profundamente supersticioso, fácilmente susceptible a cualquier forma de coerción. Ellos, por supuesto, piensan que aquellos que tienen la capacidad de controlar el clima, ejercen los poderes de un Dios.\nNosotros sí.\n\nHuracanes como este mundo nunca ha visto, tornados que destruyen ciudades enteras, inviernos interminables que traen enfermedades, hambruna y muerte. Hemos ablandado al Dragón, ahora la población sentirá nuestra ira.\nLos chinos solo han sido una amenaza para nuestra seguridad y para el Orden en su conjunto. Después de décadas de soportar su tormento, les haremos comprender las consecuencias de sus acciones."
 USB_operation_overlord_ii: "§YOPERACIÓN§!: Overlord II"
 USB_operation_overlord_ii_desc: "Por segunda vez en este siglo, los soldados americanos esperan inquietos ser informados sobre la operación que liberará Europa. Mientras aplastábamos a los terroristas domésticos, nuestros arrogantes subordinados en Europa no lograron contener la amenaza del Este. Solo cuando su incompetencia quedó al descubierto y sus países cayeron en las garras de la tiranía, Europa logró derrotar por poco a los rusos. La imposición del Orden no es negociable, y estos extremistas que se hacen pasar por estadistas son un lastre.\nLa Pax Americana ha regresado, y reflejaremos nuestra noble cruzada contra el fascismo en la Segunda Guerra Mundial cuando liberemos a Europa de estos fanáticos."
 USB_destabilize_their_regimes: "Desestabilizar sus regímenes"
 USB_destabilize_their_regimes_desc: "Uno de nuestros mayores errores fue soltarle la correa a Europa. Europa ha demostrado que no merece ser autónoma; sus fuerzas son débiles, se desmoronan al menor contacto como el papel. ¿Su moral? Apocalíptica.\nIncluso a nivel interno, la ineptitud de estas \"naciones\" está siempre presente: descontento reprimido, susurros de rebelión, un alto mando en luchas internas. Todo lo que necesitamos hacer es simplemente patear la estructura podrida para que se desmorone desde dentro. Por eso no son los chinos ni los europeos quienes dominarán el Orden global. Siempre hemos tenido la ventaja, simplemente estamos recuperando nuestro lugar que nos corresponde."
 USB_london_calling: "London Calling"
 USB_london_calling_desc: "Puede que Europa esté administrada por parásitos antisociales que casi nos destrozan, pero el continente aún tiene futuro bajo la restaurada paz americana. Cuando los tiranos surgieron de las cenizas de la OTAN, hubo unos pocos selectos que deberían haber ocupado el lugar de líderes. Pero en lugar de ser recibidos con celebración y alabanza, fueron recibidos con horcas y plomo. Exiliados, tuvieron que observar con horror cómo Europa se pervertía.\nAhora, los extremistas se están desmoronando bajo la presión, y es hora de que contactemos a estos pocos competentes. En una Europa recién liberada, los intelectuales finalmente ocuparán su lugar adecuado de las garras de las masas tiránicas."
 USB_break_the_european_spirit: "Quebrar el espíritu europeo"
 USB_break_the_european_spirit_desc: "No hay límites demasiado lejanos en la promoción del Orden, y especialmente cuando se trata de un subordinado rebelde. Los europeos están rabiosos, arremetiendo contra todo lo que tienen delante; no se les puede domar con palabras, regalos o gestos de buena voluntad. El mayor error de las secuelas de la Segunda Guerra Mundial fue aflojar nuestro control sobre Europa. Los dejamos ser libres y nos traicionaron.\nAhora, corregiremos nuestros errores. No solo bombardearemos sus ciudades, destruiremos sus monumentos, mataremos de hambre a su gente. Quebraremos sus espíritus y no lo olvidarán. Les mostraremos por qué la nueva paz americana será eterna."
 USB_come_as_liberators: "Llegar como libertadores"
 USB_come_as_liberators_desc: "Cuando comenzamos nuestra noble cruzada contra el fascismo en la Segunda Guerra Mundial, llegamos a Europa como libertadores, fuimos los precursores de una paz nueva y eterna en el continente. El viejo Orden nacido de ese crisol hace mucho que murió, pero la estrategia anterior todavía tiene sus usos.\nHemos corregido los errores de quienes nos precedieron, hemos perfeccionado nuestra estrategia; los defectos que llevaron al Gran Error han sido eliminados. Cuando los extremistas inevitablemente colapsen bajo el peso de sus insuficiencias, vendremos a Europa como libertadores, como lo hicimos en la Segunda Guerra Mundial. Las masas vitorearán, recordarán por qué confiaron en nosotros en primer lugar.\nTendremos una Europa dócil en la palma de nuestra mano. Esta vez, nunca la soltaremos."
 USB_operation_triumph_chariot: "§YOPERACIÓN§!: Triumph Chariot"
 USB_operation_triumph_chariot_desc: "Durante la duración de esta guerra, lo hemos reiterado, pero el concepto de una Europa libre no ha sido más que un detrimento.\nDurante nuestra ausencia, ¿qué han logrado los europeos? Se prepararon durante años para contrarrestar a Rusia, pero perdieron horriblemente. Cuando las consecuencias de su fracaso se hicieron evidentes, dejaron que sus naciones cayeran en el extremismo. Ahora que tienen que enfrentarse a una fuerza de combate real, están a la defensiva. ¿Por qué un continente que ha demostrado ser tan débil merece algo más que una correa apretada?\nHemos luchado contra los europeos durante el tiempo suficiente; es hora de recordarles por qué el siglo americano será eterno.\n\nEl Este, la tierra por la que entraron en guerra con Rusia hace tanto tiempo, es donde permanecen sus últimos reductos, donde se esconden como ratas en un armario. Un empuje final decisivo y metódico en la región será suficiente para exprimir hasta la última gota de lucha de los europeos. Sus máquinas de guerra serán detenidas, sus ciudades serán bombardeadas y los extremistas pagarán.\nCuando se den cuenta del error de sus caminos y finalmente se arrodillen, el Orden será restablecido en Europa, de una vez por todas."
 USB_NSS_law: "Estado de Seguridad Nacional"
 USB_NSS_law_desc: "\n\n\n\n£GFX_USB_nss_law_banner\n\n\n\n\n\nEl Estado de Seguridad Nacional se forjó en el crisol de la Segunda Guerra Civil Americana. De ese fuego surgió un aparato donde el estamento de Seguridad Nacional ejercía un poder casi absoluto, formulaba políticas en secreto y ejecutaba operaciones clandestinas, manteniendo la fachada de la democracia como un velo. En un mundo donde el Orden se desmorona, el Estado de Seguridad Nacional solo se ha envalentonado. La comunidad de inteligencia sabe ahora que el Fuego que consumió por primera vez a los Estados Unidos debe ser sofocado de una vez por todas."
 USB_NSS_education_law: "Panem et circenses"
 USB_NSS_education_law_desc: "\n\n\n\n£GFX_USB_nss_education_banner\n\n\n\n\n\nDesde la invención del ciclo noticiero de 24 horas, la idea de mantener a las masas dóciles y controladas por medio de los medios de comunicación y el entretenimiento siempre ha sido una gran vía para mantener el Orden. La lucha de poder entre las élites que precedió a la Guerra Civil y las consiguientes campañas mediáticas nunca debe repetirse. Con la ayuda de nuestros sociólogos más cualificados, la televisión ha sido refinada, mejorada y optimizada para asegurar que el público esté perpetuamente distraído y entretenido por fenómenos nacionales fascinantes como los deportes, los programas y mucho más."
 USB_controlled_emigration: "Emigración controlada"
 USB_controlled_emigration_desc: "\n\n\n\n£GFX_USB_controlled_emigration_banner\n\n\n\n\n\nEl nuevo objetivo de ICE y la Patrulla Fronteriza es mantener un flujo constante de mano de obra fresca, al mismo tiempo que rastrean a los ciudadanos americanos que intentan irse al extranjero, arrestando y recuperando a posibles criminales que intentan huir del país.\n\nEsto requirió un aumento significativo en la vigilancia y operaciones extendidas del DHS en la frontera y cerca de ella. Irónicamente, el aumento del control fronterizo se utiliza para generar un flujo aún mayor de inmigrantes al país, mientras se evita que los ciudadanos americanos huyan."
 USB_public_awareness_idea: "Conciencia pública - [USB_NSS_the_public_scripted_loc]"
 USB_public_awareness_idea_desc: "Para el público, la democracia es saludable y [USB.GetLeader] es el presidente. Su realidad y su política han sido elaboradas artesanalmente para asegurar que la gente esté constantemente cautivada por un flujo interminable de información y entretenimiento. Necesitamos mantener esta realidad para ellos también; el público debe permanecer felizmente ignorante de nuestra existencia. Si se enteraran, entonces podríamos estar sujetos a la tiranía de las masas una vez más.\n\n[USB_NSS_the_public_text_scripted_loc]"
 USB_extremist_activity_idea: "Actividad extremista - [USB_NSS_extremist_activity_scripted_loc]"
 USB_extremist_activity_idea_desc: "A pesar de nuestros mejores esfuerzos, el extremismo y las actividades terroristas siguen asolando nuestro país. El público, naturalmente, prefiere la ley y el orden al caos, por lo que es crucial mantener baja la actividad extremista para evitar la corrosión. Sin embargo, si tomamos medidas demasiado drásticas, el público podría darse cuenta de nuestra existencia. Es un equilibrio difícil de mantener, pero necesitamos caminar por esta cuerda floja para mantener el Orden.\n\n[USB_NSS_extremist_activity_text_scripted_loc]"
 USB_boeing_lockheed_martin_idea: "Lockheed Martin-Boeing"
 USB_boeing_lockheed_martin_idea_desc: "§WCEO:§! §HJames Taiclet§!\n\n\n\n\n\n\n\n   £GFX_USB_taiclet_portrait\n\n\n\n\n\n\n\n\n§W-------------------------------------§!\n§YActividades actuales:§!\nEl sujeto lidera la fusión con el ex CEO de Boeing, Dave Calhoun (ahora presidente de LockMart-Boeing), supervisando la entidad aeroespacial de defensa dominante de América. Esta consolidación centraliza la infraestructura aeroespacial para asegurar programas clasificados y maximizar la eficiencia. Bajo su liderazgo, la compañía acelera el desarrollo de drones, expande la vigilancia satelital y moderniza las plataformas. El sujeto informa al Pentágono y a la dirección de inteligencia, alineándose con la seguridad nacional.\nLa fusión establece un control casi monopólico sobre tecnología aeroespacial crítica, asegurando la superioridad militar de los EE.UU.\n\n§gCuando el Estado Profundo tomó el aparato gubernamental de los tontos en Washington, hubo una gran reorganización y consolidación de poder dentro de varios apéndices clave del Gobierno americano, especialmente en el complejo militar-industrial. Temiendo la competencia de compañías europeas como Airbus, los Cognoscenti decidieron que lo mejor era fusionar Boeing y Lockheed Martin para crear Boeing-Lockheed Martin. Boeing-Lockheed Martin es una de las compañías aeroespaciales más grandes del mundo, y supera ampliamente a cualquier competidor extranjero que se atreva a desafiar el dominio aeroespacial americano. Con una ambición desmedida, las mentes más brillantes del siglo XXI y el dominio sobre la industria aeroespacial americana, Boeing-Lockheed Martin será clave para apagar el Fuego de una vez por todas.§!"
 USB_think_tanks_and_secret_clubs_dynamic: "Think tanks y clubes secretos"
 USB_think_tanks_and_secret_clubs_dynamic_desc: "Desde el comienzo de la civilización, aquellos mejor equipados para gobernar al hombre siempre lo han hecho desde las sombras. Las sociedades secretas y los think tanks de América siempre han servido como el pegamento que une a la élite, tejiendo redes interconectadas entre las instituciones estatales y las finanzas, asegurando que aquellos mejor equipados para liderar lo hagan. Esta relación, aunque intrincada y algo incestuosa, sirve enteramente a los intereses de mantener el Orden. A través de reuniones aisladas en las sombras y elaborados ritos de iniciación, se fomenta un vínculo fraternal entre la élite, asegurando que el amiguismo nunca escale más allá de lo que es ideal para los intereses de los Cognoscenti."
 USB_uspf_idea: "Fuerza Policial de Estados Unidos"
 USB_uspf_idea_desc: "Establecida tras el triunfo de los Cognoscenti, las lealtades y sesgos locales de la policía fueron identificados como un factor clave en muchos grupos extremistas y rebeliones durante la Segunda Guerra Civil Americana, especialmente los extremistas de derecha, al poder armarse rápidamente a través del equipo policial. Así, las fuerzas del orden locales fueron disueltas y reorganizadas en una nueva fuerza policial nacional capaz de hacer cumplir el Orden en los Estados Unidos.\n\nEs asesorada y está sujeta a la supervisión del Buró Federal de Investigaciones. Al igual que sus predecesoras, la USPF continúa la tendencia de militarización policial en los Estados Unidos. Los oficiales son rotados regularmente para asegurar que todos sean forasteros, con el objetivo de evitar que se formen lealtades locales. Sin embargo, a diferencia de los antiguos departamentos de policía, tienen unas reglas de enfrentamiento increíblemente liberales, lo que les permite reprimir a criminales violentos y disidentes antisociales con impunidad, protegidos de la supervisión legal y judicial."
 USB_permanent_lockdown_idea: "Confinamiento permanente"
 USB_permanent_lockdown_idea_desc: "Aunque la pandemia de COVID-19 ciertamente ha disminuido, las conveniencias que brindó a la administración fueron demasiado beneficiosas para abandonarlas. Utilizando un segundo brote del virus como pretexto, los Cognoscenti han empleado con gran éxito confinamientos interminables, vacunaciones forzadas y la implantación de chips en los ciudadanos. Los CDC, bajo las instrucciones de los Cognoscenti, también han utilizado los ataques terroristas biológicos y químicos empleados por la División Atomwaffen como justificación adicional para el confinamiento permanente de la sociedad americana. A través de estas justificaciones, los Cognoscenti han logrado imponer esta tiranía médica en toda la nación."
 USB_arsenal_of_order_timed_idea: "Arsenal del Order"
 USB_arsenal_of_order_timed_idea_desc: "El arsenal de los Cognoscenti no es algo para tomar a la ligera: misiles, tanques, aviones y armas de fuego son solo la punta del iceberg de lo que poseen. A través de metales chirriantes, hojas afiladas y aviones que se elevan, los Cognoscenti están listos y preparados para restaurar el Orden en el mundo a través del plomo y las llamas. Para cualquier forastero que observe, está clarísimo que el Estado profundo se está preparando para apagar el Fuego de una vez por todas, y si necesitan reducir a sus enemigos a cenizas, no dudarán."
 USB_reopen_the_factories_idea: "Prendiendo las fábricas"
 USB_reopen_the_factories_idea_desc: "El colapso de los Estados Unidos y la orgía de derramamiento de sangre que le siguió ha dejado las fábricas de todo el país destruidas o vacías. Sin embargo, con el ascenso del Estado profundo y el nacimiento de los Cognoscenti, la demanda de bienes militares se ha disparado una vez más. Los engranajes de la maquinaria bélica están empezando a girar lentamente de nuevo, y el gigante industrial estadounidense está despertando de su letargo. A través del presupuesto negro y varias leyes de infraestructura que fueron escritas en secreto por los Cognoscenti, el poder industrial de los Estados Unidos está empezando a reavivarse. Las forjas de guerra se han encendido una vez más, y las armas moldeadas en sus llamas devolverán el Orden al mundo."
 USB_humanitarian_peacekeeping_idea: "Cascos Azules"
 USB_humanitarian_peacekeeping_idea_desc: "Sobre el papel, la ayuda de las Naciones Unidas a los Estados Unidos debería ser un beneficio neto para la sociedad americana: en todo el país, los Cascos Azules llevan alimentos y agua a los necesitados mientras mantienen el frágil Orden dentro de las regiones controladas por la Unión de América. El público y los refugiados de guerra no piensan nada de estos cascos azules, incluso pueden verlos como héroes, ayudando a los necesitados. Sin embargo, en realidad, estas llamadas \"misiones de mantenimiento de la paz\" no son más que una farsa. Las misiones de ayuda de la ONU a los Estados Unidos están profundamente infiltradas por informantes, agentes dobles que responden al aparato de inteligencia y, en un sentido más amplio, a los Cognoscenti. Inadvertidamente, las décadas de teorías conspirativas y acusaciones contra la ONU han resultado ser ciertas: estas misiones humanitarias se han transformado en otro apéndice más del Estado profundo."
 USB_reconstruction_period_idea: "Período de reconstrucción"
 USB_reconstruction_period_idea_desc: "Decir que América ha sido destruida por la Guerra Civil sería la mayor subestimación del siglo XXI. Durante años, la guerra asoló la nación; el caos era la norma y la violencia su ejecutora, barrios enteros quedaron reducidos a cenizas, millones fueron arrojados a la picadora de carne o quedaron atrapados en el fuego cruzado. El poder industrial, el dominio agrícola y el poder global de América han sido diezmados. Solo ahora, mientras las armas finalmente callan, los Cognoscenti pueden mirar hacia atrás y evaluar los daños.\nAmérica ha entrado en una fase de reconstrucción y rearme. Las ambiciones de los Cognoscenti no se detienen solo en suprimir el Caos de la Segunda Guerra Civil Americana. No, el Orden apagará la llama global de una vez por todas. Y para que los Cognoscenti logren eso, primero deben reconstruir América."

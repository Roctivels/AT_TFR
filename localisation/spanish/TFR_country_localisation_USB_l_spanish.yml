 USB_inefficient_economy_idea: "Economía ineficiente"
 USB_inefficient_economy_idea_desc: "Durante los últimos veinte años, oscilando entre una economía controlada por republicanos y demócratas, los diferentes intereses corporativos que impulsaron las elecciones han manipulado las leyes de EE.UU. como un gato con una bola de lana: imponiendo aranceles, otorgando subsidios, reprimiendo a la oposición, hasta que nuestra economía, antes de la Guerra Civil, era una montaña de burocracia absurda que solo se mantenía gracias a los recursos que Estados Unidos controlaba. Ahora, con la pérdida de Occidente y el colapso de las cadenas de suministro en todos los niveles de la economía, esta burocracia estrangula, literal y figurativamente, la vida de cada ciudadano dentro de nuestras fronteras. Debemos eliminarla lo antes posible, incluso si hacemos que algunos de nuestros patrocinadores se sientan particularmente descontentos."

 USB_babel_russia_tt: "§1SMERT§!"
 USB_babel_russia_tt_delayed: "El lenguaje se presenta de muchas formas.\nHabla, danza, arte, música, existencia.\n\nEl lenguaje es lo que nos hace quienes somos.\nComo un órgano que necesitas desesperadamente.\nComo una droga que anhelas.\n\nQuita eso, y el rebaño comenzará a morderse unos a otros.\nLos niños lloran, y las madres simplemente no reconocen las lágrimas.\nLos padres anhelan, pero no saben por qué.\nHay un vacío en sus almas, un vacío que se extiende por sus mentes.\n\nEscuece; nada erradica la sensación de haber perdido algo.\nUna nariz rota no cura nada, y un líquido que no reconoces no adormece nada.\nLas letras ya no significan nada, e incluso los gritos tienen poco significado.\n\nLo que no entiendes, lo temes.\nLo que no entiendes, lo dañas.\nLos sabios se vuelven necios.\nY los locos se vuelven normales.\n\nVes formas. Pero simplemente no sabes, el saber te ha sido arrebatado.\nSumergido en un mundo que solías reconocer.\nDuele tanto.\n\nLa torre se desmorona."
 USB_babel_china_tt: "§1SI WANG§!"
 USB_babel_china_tt_delayed: "El lenguaje se presenta de muchas formas.\nHabla, danza, arte, música, existencia.\n\nEl lenguaje es lo que nos hace quienes somos.\nComo un órgano que necesitas desesperadamente.\nComo una droga que anhelas.\n\nQuita eso, y el rebaño comenzará a morderse unos a otros.\nLos niños lloran, y las madres simplemente no reconocen las lágrimas.\nLos padres anhelan, pero no saben por qué.\nHay un vacío en sus almas, un vacío que se extiende por sus mentes.\n\nEscuece; nada erradica la sensación de haber perdido algo.\nUna nariz rota no cura nada, y un líquido que no reconoces no adormece nada.\nLas letras ya no significan nada, e incluso los gritos tienen poco significado.\n\nLo que no entiendes, lo temes.\nLo que no entiendes, lo dañas.\nLos sabios se vuelven necios.\nY los locos se vuelven normales.\n\nVes formas. Pero simplemente no sabes, el saber te ha sido arrebatado.\nSumergido en un mundo que solías reconocer.\nDuele tanto.\n\nLa torre se desmorona."

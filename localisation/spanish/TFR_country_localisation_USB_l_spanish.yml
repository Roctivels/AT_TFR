 USB_higher_democrat_unity_idea: "Unidad demócrata fantástica"
 USB_higher_democrat_unity_idea_desc: "La unidad de cualquier fuerza gobernante es vital para su eficiencia en el desempeño de sus funciones. El Partido Demócrata, a pesar de las muestras de división de años anteriores, ahora se mantiene plenamente unido bajo la dirección de nuestro presidente legítimo. Sin embargo, nuestra fuente de poder reside en Wall Street, y los caprichos y deseos de los empresarios son volubles. Cuanto más se implemente nuestra agenda legislativa y cuanto más ejerzamos nuestra autoridad en contra de sus intereses, más manipularán sus hilos la estructura de nuestro partido y lo desgarrarán, punto a punto."

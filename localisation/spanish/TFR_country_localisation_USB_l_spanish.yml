 USB_wef_tt: "§RLA SANGRE§!"
 USB_wef_delayed_tt: "§LDentro de los Cognoscenti, las megacorporaciones representan los intereses corporativos más poderosos del país, y los miembros más influyentes del ala corporativa de los Cognoscenti. Operando bajo la tutela del Foro Económico Mundial, tienen un interés personal en mantener el statu quo, y harán lo que sea necesario para que las cosas sigan así. Son la columna vertebral de la estructura de poder de los Cognoscenti, y no dudarán en usar sus considerables recursos para aplastar cualquier amenaza al status quo.\n\nA cambio de contribuciones comparativamente pequeñas y extraoficiales al presupuesto negro, estas megacorporaciones han recibido una multitud de ventajas a cambio de sus contribuciones a la seguridad continua de América. Mientras permanezcan en sintonía con la agenda de los Cognoscenti, estas corporaciones cosecharán los beneficios de la influencia del Estado profundo. Como tal, se les ha dado rienda suelta para operar como les plazca, siempre que sigan proporcionando a los Cognoscenti los fondos, recursos y tecnología necesarios para mantener el status quo y expandir el alcance del Estado profundo. Son la savia de los Cognoscenti, y su apoyo continuo es esencial para el éxito de la cábala.\n\nPor supuesto, si deciden no colaborar, corren el riesgo de ser incluidos en la lista negra por los Cognoscenti o algo peor. Como tal, tienen un interés personal en permanecer en la buena voluntad de la cábala y están dispuestos a hacer lo que sea necesario para promover los intereses americanos y asegurar que los Cognoscenti permanezcan en control. Han sido comprados y pagados por el Estado profundo, y no dudarán en usar sus considerables recursos para promover la agenda de la cábala y asegurar sus propias ganancias. El futuro les pertenece, y no permitirán que nadie ni nada se interponga en su camino.§!"
 USB_cia_tt: "§OEL CUERPO§!"
 USB_cia_delayed_tt: "§LSin los segurócratas, no existirían los Cognoscenti. Fue a través de las maniobras de la CIA, el FBI, el ATF y la NSA que el golpe de Estado en la sombra fue posible, y fue a través de sus esfuerzos que el control del Estado profundo sobre el poder se hizo absoluto. Las agencias de inteligencia son la columna vertebral del poder de los Cognoscenti y su perro guardián, asegurándose de que el resto de la cábala se alinee con su visión del futuro de América.\n\nEstas agencias tienen un interés personal en mantener el Orden, y están dispuestas a hacer grandes esfuerzos para proteger su poder e influencia. También son algunas de las organizaciones más secretas y opacas del mundo, y no temen usar sus considerables recursos y conexiones para salirse con la suya. A través de sus ejércitos en la sombra, son los ojos y los oídos de los Cognoscenti, recopilando información sobre posibles amenazas al gobierno de la cábala y asegurándose de que esas amenazas sean neutralizadas antes de que puedan convertirse en un problema.\n\nLos informantes impregnan todos los escalones de la sociedad americana, desde los pasillos del Gobierno y los círculos internos de la élite corporativa hasta lo mundano: son policías, trabajadores de mantenimiento, maestros de escuela, incluso personas sin hogar. Muchos no tienen ni idea de que están trabajando para las agencias de tres letras, habiendo sido atraídos por una oferta oportuna de dinero, una ayuda, o incluso una simple conversación tomando un café a cambio de \"informar sobre actividades sospechosas\". Independientemente de sus métodos, su red es vasta y su influencia se siente en cada rincón del país.\n\nLas agencias de inteligencia siempre están observando, esperando cualquier oportunidad para atacar a aquellos que se atreverían a desafiar la autoridad de los Cognoscenti. Son el cuerpo, el corazón palpitante de los Cognoscenti, y no dudarán en eliminar cualquier amenaza al gobierno de la cábala o a su visión del futuro de América.§!"
 USB_darpa_tt: "§CLA MENTE§!"
 USB_darpa_delayed_tt: "§LEl complejo militar-industrial es el centro neurálgico de los Cognoscenti, y su papel en la estructura de poder de la cábala es mantener la maquinaria de guerra en funcionamiento y asegurar que el poderío militar de América esté siempre a la vanguardia de los asuntos globales. Con sus grandes bolsillos y su cabildeo político, son capaces de mantener al Pentágono alineado con su agenda, asegurando que las fuerzas americanas sean siempre las más poderosas y tecnológicamente avanzadas del mundo. A cambio, la cábala les proporciona contratos lucrativos, acceso a tecnología de vanguardia y la libertad de operar con una supervisión mínima.\n\nEl CMI también actúa como el grupo de expertos del Estado profundo, proporcionando a la cábala la experiencia militar y tecnológica necesaria para mantener el Orden. Son ellos quienes diseñan y desarrollan las armas y tecnologías que mantienen a los Cognoscenti en el poder, así como las estrategias y tácticas necesarias para mantener a raya a los enemigos del Estado profundo.\n\nMás allá de su papel en el armamento militar, también desarrollan nuevos sistemas para las agencias de inteligencia, superando los límites en campos de vanguardia como la inteligencia artificial para llevar el panóptico de vigilancia de la NSA a nuevas alturas. Con el tiempo, los algoritmos predictivos incluso podrían prevenir crímenes y actividades disidentes antes de que ocurran, logrando una sociedad libre de casi todo crimen.\n\nEn manos de los Cognoscenti, uno solo puede empezar a imaginar cómo sus inventos pueden ser utilizados para servir a la causa.§!"

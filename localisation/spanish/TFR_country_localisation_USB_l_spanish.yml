l_spanish:
 USB_secure_the_capital: "Asegurar la capital"
 USB_secure_the_capital_desc: "En lo que podría ser el evento más trágico de la historia de nuestra nación, lo impensable se ha hecho realidad. Por primera vez en 150 años, el continente americano arde en llamas, con hermano contra hermano una vez más, mientras la lucha comienza entre nuestro Gobierno legítimo y el pretendiente al oeste. Aunque prácticamente todos hubieran deseado un desenlace diferente, no podemos permitirnos vacilar ante esta amenaza a nuestra larga tradición democrática. Si queremos resistir la tormenta que se avecina, primero debemos asegurar la sagrada capital de nuestra nación, garantizando que Washington D.C. esté protegida de todas las amenazas inmediatas y potenciales, permitiendo que nuestro Gobierno interino opere sin trabas en estos tiempos oscuros."
 USB_fighting_for_democracy: "Luchando por la democracia"
 USB_fighting_for_democracy_desc: "[USB_fighting_for_democracy_desc_scripted_loc]"
 USB_protect_the_collective: "Proteger al colectivo"
 USB_protect_the_collective_desc: "Para proteger a los individuos dentro de la sociedad, debemos protegerla como un todo, lo que puede hacerse a través del enfoque del colectivismo."
 USB_protect_both: "Proteger ambos"
 USB_protect_both_desc: "Para proteger tanto al colectivo como al individuo, debemos protegerlos a ambos por igual."
 USB_protect_the_individual: "Proteger al individuo"
 USB_protect_the_individual_desc: "Para proteger a todos, debemos empezar por el nivel más bajo de la sociedad, el individuo."
 USB_emergency_presidential_powers: "Conceder poderes de emergencia"
 USB_emergency_presidential_powers_desc: "La constitución de nuestra nación, si bien es indudablemente fundamental para definir los derechos sociales y políticos de nuestros ciudadanos, con demasiada frecuencia ha prevalecido sobre los procedimientos necesarios. En algunos casos, este documento, en gran medida obsoleto, ha obstaculizado no solo el proceso democrático, sino también la capacidad del presidente para responder adecuadamente en tiempos de crisis, como el que atravesamos actualmente. Este flagrante problema debe corregirse de inmediato. Aunque algunos tachen esta medida de autoritaria, no podemos permitir que un documento milenario prevalezca sobre la seguridad y el bienestar de los ciudadanos de nuestra nación; por lo tanto, se otorgarán al presidente en funciones los poderes ejecutivos de emergencia necesarios para capear cualquier adversidad que se avecine a nuestra Unión y a sus ciudadanos."
 USB_maintain_constitutionalism: "Mantener el constitucionalismo"
 USB_maintain_constitutionalism_desc: "Cuando nuestros antepasados concibieron esta gran República, no había nada más importante para sus cimientos que nuestra gran Constitución. Redactada y diseñada por las mentes más brillantes de toda la historia de esta nación, dota a todos los americanos de unos derechos inquebrantables de los que pocas naciones pueden realmente presumir. Mientras que algunos modernistas han afirmado que este sagrado documento nuestro se ha vuelto anticuado e inconstante a raíz de esta tragedia nacional, nosotros sabemos que no es así. Aunque nuestro funcionamiento de la ley y el gobierno sin duda se ha visto manchado como resultado de esta guerra civil, no podemos permitirnos el lujo de ver tambalearse nuestras sagradas tradiciones jurídicas y políticas, independientemente de las circunstancias. La Constitución se hizo para resistir la prueba del tiempo, y permanecerá intacta."
 USB_well_organized_militia: "Milicia bien organizada"
 USB_well_organized_militia_desc: "Si bien nuestras doctrinas militares se han centrado históricamente en la guerra convencional, con un apoyo abrumador, la situación actual nos ha obligado a reevaluar nuestras tácticas. Con el estallido de un conflicto activo a gran escala en suelo americano por primera vez en más de un siglo, nos hemos visto en la necesidad de contar con personal y una doctrina adecuada para adaptarnos a nuestra situación. Por ello, nos inspiraremos en los Padres Fundadores y nos transformaremos en una fuerza más orientada a milicias, como hicieron nuestros antepasados en su propia lucha contra la tiranía hace 300 años."
 USB_trust_in_the_high_command: "Confiar en el Alto Mando"
 USB_trust_in_the_high_command_desc: "Al mantener una gran parte del ejército federal, también hemos conservado la mentalidad doctrinal de guerras pasadas, aunque a una escala significativamente mayor que la que hemos enfrentado en la historia reciente. Con esta ventaja de un ejército convencional y moderno contra nuestros oponentes, solo necesitamos reafirmar estas nociones doctrinales para que se adapten mejor al combate en suelo americano. Sin embargo, ante todo debemos reorganizar nuestros ejércitos lo antes posible, reestructurando y asegurando la lealtad de los rangos inferiores poco cooperativos y disruptivos, para evitar que se vuelvan a Denver."
 USB_crack_down_on_insurgents: "Reprimir insurgentes"
 USB_crack_down_on_insurgents_desc: "Desde el comienzo de la Guerra Civil, los insurgentes en lugares como Virginia Occidental y Kentucky han causado graves daños a nuestros esfuerzos por liberar América de los traidores republicanos. Es necesario tomar medidas inmediatas, como la formación de brigadas contrainsurgentes especializadas, la prevención del arraigo de la oposición en las poblaciones locales y el uso de la fuerza bruta para aplastar las bases guerrilleras. Si queremos liberar América y salvar nuestra democracia, debemos hacer justicia a los oportunistas que nos atacan por la espalda desde la retaguardia."
 USB_negotiate_with_progressives: "Negociar con progresistas"
 USB_negotiate_with_progressives_desc: "El bloque progresista del Partido Demócrata ha crecido considerablemente en los últimos años, gracias a la mayor participación de las nuevas generaciones en la política nacional y al creciente descontento con las antiguas políticas neoliberales. Si bien muchos políticos del establishment consideran que las ideas que proponen son, en el mejor de los casos, poco realistas y, en el peor, radicales, su compromiso con la reducción de la desigualdad de la riqueza y la defensa de la justicia social es, en general, admirable. Con su nueva influencia como resultado del conflicto, nos conviene negociar con ellos, tanto para mantenerlos en la línea del partido como para evitar distanciarlos a ellos y a sus simpatizantes en estos tiempos difíciles. ¿Quizás una perspectiva más progresista sea justo lo que necesitamos para conseguir apoyo popular?"
 USB_deals_with_liberals: "Tratar con el establishment"
 USB_deals_with_liberals_desc: "El bloque liberal del Partido Demócrata es, como era de esperar, el principal grupo dentro del propio partido, conformando a la mayoría de los políticos del establishment. Los partidarios del largamente apreciado Consenso de Washington, su compromiso con políticas moderadas en materia de economía mixta y su firme compromiso con los principios de libertad e igualdad han sido un elemento básico de la política de Washington desde hace tiempo.\n\nCon el estallido de la guerra en suelo americano, es fundamental que empecemos a negociar con ellos para mantener la unidad del partido y atraer a sus simpatizantes en toda la Unión. Nos vendría bien aprobar una legislación muy necesaria y esperada. Solo se pueden obtener buenos resultados complaciendo a nuestra base, especialmente ahora."
 USB_consolidate_the_conservatives: "Coalición de Unidad Nacional"
 USB_consolidate_the_conservatives_desc: "El Partido Republicano, si bien ha mostrado su verdadera cara al refugiarse en Denver, no ha optado en su totalidad por la traición. En Washington D.C., buena parte de republicanos moderados y conservadores ha tomado la sabia decisión de permanecer en la Unión. Debido a su situación, se han vuelto considerablemente menos hostiles a la oposición a la legislación, habiéndose mostrado dispuestos a cooperar en nombre de la preservación del Gobierno legítimo en el Congreso. Si bien muchos se resisten a la idea de hacer cualquier esfuerzo para apaciguar o hacer gestos a lo que queda del Partido Republicano, no podemos permitir que quienes se han quedado con nosotros se queden en la ignorancia. Al hacer algunas propuestas a los conservadores, contribuiremos a garantizar su lealtad hacia nosotros, además de dar a los sectores más conservadores de la población la seguridad de que sus voces son escuchadas, siempre y cuando se mantengan leales a nuestro Gobierno. Tal vez sería prudente adoptar una perspectiva más conservadora si eso significa menos oposición de los elementos más derechistas entre la población."
 USB_revisionism: "Revisionismo constitucional"
 USB_revisionism_desc: "La Constitución de los Estados Unidos, si bien es un documento brillante en muchos aspectos, no está exenta de defectos evidentes. Si bien los Padres Fundadores sin duda pensaron en las generaciones futuras al redactarla, fueron totalmente incapaces de predecir en qué tipo de mundo viviríamos dentro de unos 250 años. A pesar de su importancia, no podemos permitirnos seguir manteniendo sus principios más anticuados, especialmente en una época en la que algunos de esos principios ancestrales podrían habernos llevado a esta misma situación. Aunque tal medida se enfrentará a mucha oposición, haremos todo lo posible para revisar y modernizar los elementos más inoportunos de la Constitución y sus adeptos, para evitar que genere aún más problemas en el futuro."
 USB_minor_reparations_for_minorities: "Apoyar negocios de minorías"
 USB_minor_reparations_for_minorities_desc: "La idea de las reparaciones financieras ha cobrado fuerza en los últimos años, con un movimiento creciente que se centra en los problemas históricos y sistémicos que sufren las minorías y que aún no se han corregido. Especialmente hoy en día, los descendientes de afroamericanos esclavizados en este país se encuentran en una situación de desventaja económica en todos los ámbitos, principalmente debido a casos históricos de opresión, tanto flagrante como sutil, en su contra. Dado que la mayor parte de la oposición a este programa ha fracasado o está abierta a acuerdos, quizás ahora sea un buen momento para dar los primeros pasos en la implementación de esta medida largamente esperada: la subvención oficial de todas las empresas propiedad de minorías. Esto no solo ayudará a aliviar las desigualdades estructurales que enfrentan muchos empresarios minoritarios, sino que también estimulará nuestra economía en tiempos de guerra."
 USB_fund_farming: "Restablecer SALT"
 USB_fund_farming_desc: "Tras el colapso de la nación, pocos asuntos se han vuelto tan urgentes como nuestra cadena de suministros agrícolas. Ante la falta de un mercado viable y la pérdida de una gran parte de las regiones agrícolas más importantes del país, se está produciendo una crisis alimentaria masiva en toda la Unión, algo similar a una hambruna sin precedentes en nuestro suelo. Para mitigar esta grave situación, debemos implementar de inmediato subsidios a los agricultores de todo nuestro territorio, para que podamos mantenerlos a flote y revitalizar nuestra producción alimentaria ante este conflicto."
 USB_regulate_corporations: "Regular corporaciones"
 USB_regulate_corporations_desc: "Aunque disfrutamos y apreciamos el respaldo de tantas empresas prominentes y reconocemos su importante papel en la economía, no podemos permitirles hacer lo que quieran. Incluso antes de la guerra, estas empresas solían ser objeto de críticas por irregularidades, ya sea por malas condiciones laborales, contaminación u otras faltas legales que, históricamente, han cometido sin consecuencias. A pesar de su viabilidad económica, deben estar sujetas a una serie de regulaciones y restricciones nuevas y actualizadas para garantizar un nivel razonable de supervisión gubernamental mientras continúan sus operaciones en toda la Unión. Puede que se quejen de esta medida, pero simplemente tendrán que hacer los ajustes necesarios. Quizás ahora sean más conscientes de sus actividades, sin el grado de impunidad que han disfrutado durante tanto tiempo."
 USB_financial_diplomacy: "Diplomacia financiera"
 USB_financial_diplomacy_desc: "La Unión, gracias a nuestra legitimidad al celebrar el Congreso y gran parte de la representación federal en el Gobierno, se ha ganado la cooperación y la confianza de numerosos conglomerados y empresas adineradas, varias de las cuales fueron donantes benéficos de la campaña demócrata. Su ayuda fue muy apreciada, y se han mantenido bastante cooperativos por el momento, lo que ha permitido que nuestro Gobierno funcione con mayor fluidez ante nuestra economía ahora colapsada. Sin embargo, con la llegada de este conflicto, la influencia de estas corporaciones ha aumentado considerablemente, tanto en el aparato político como en el estatal. Si nuestro Gobierno quiere mantener el control de sí mismo (es decir, no estar a la entera disposición de los intereses comerciales), tendremos que definir el método con el que las abordaremos. Si bien muchos en el Congreso creen que cooperar con ellos es la mejor y más sensata solución, tanto por el deseo de aprovechar los beneficios para la Unión como por mantener las relaciones favorables con las empresas, muchos otros han planteado la posibilidad, algo radical, de acabar con la tradicional relación corporacrática que hemos mantenido durante bastante tiempo, tanto para limitar su influencia en la política americana como en la economía. Independientemente de cómo queramos abordar los intereses corporativos, eventualmente tendremos que tomar una decisión."
 USB_increase_corporate_taxes: "Aumentar impuestos empresariales"
 USB_increase_corporate_taxes_desc: "El tema de los impuestos a las empresas más ricas del país siempre ha sido un tabú en los círculos del establishment. Si bien se había acordado en general que estas corporaciones podían asumir el aumento de los pagos, sus reiteradas contribuciones y donaciones a nuestras campañas electorales generalmente conllevaban varios acuerdos que debían cumplirse durante el mandato, lo que nos dejaba con pocos recursos para modificar esa situación. Dada nuestra situación actual, no vemos motivos para no proceder con estas modificaciones en los ingresos; se aumentarán los impuestos a nuestras corporaciones, lo que nos permitirá obtener la financiación que tanto necesitamos, además de garantizar que comiencen a contribuir a nuestra sociedad de ahora en adelante. Después de todo, deberían ser más que capaces de afrontar algunos pagos adicionales."
 USB_revitalize_the_consumer_market: "Revitalizar el consumo"
 USB_revitalize_the_consumer_market_desc: "Con la economía de la Unión en caos, también se ha deteriorado la mayor parte del consumo normal de productos y recursos. Muchos están recurriendo al trueque, al no poder gastar dinero regularmente en bienes de consumo como antes. Naturalmente, es crucial para la estabilización de nuestra economía que reactivemos este aspecto. Mediante la asignación de diversas subvenciones a algunas de las empresas más conocidas y financieramente viables responsables de la producción de estos bienes, podemos revitalizar este mercado, animando a la gente a gastar dinero de nuevo y a impulsar el circuito tradicional de oferta y demanda, impulsando nuestra economía y contribuyendo a restablecer una sensación de normalidad en la vida de nuestros ciudadanos."
 USB_revisit_the_education_system: "Revisar la educación"
 USB_revisit_the_education_system_desc: "Desde la guerra de Secesión, la discriminación positiva se ha utilizado en diversas áreas para acelerar el progreso social de grupos marginados y oprimidos durante mucho tiempo. Ahora, con el país en medio de un nuevo conflicto interno aún más sangriento, es hora de que invoquemos el legado de Lincoln para volver a encaminar la historia hacia la equidad y la justicia. Para brindar a diversos grupos minoritarios el impulso que tanto necesitan en nuestra sociedad históricamente discriminatoria, se implementarán diversas políticas inclusivas para apoyar a estos grupos en áreas donde están lamentablemente subrepresentados."
 USB_revise_the_civil_rights_act: "Aprobar el Acta de Derechos Electorales"
 USB_revise_the_civil_rights_act_desc: "El Acta de Derechos Civiles de 1964 fue una ley histórica para su época, considerada por muchos como un triunfo contra el racismo y otras formas de discriminación. Si bien representó un avance notable y útil para la igualdad de derechos en América, los acontecimientos de los últimos años y la mayor conciencia sobre la desigualdad sistémica han sacado a la luz algunas deficiencias notables de la ley original. Con esto en mente, iniciaremos un esfuerzo para revisar y actualizar el Acta de Derechos Civiles, incorporando algunas ampliaciones muy necesarias en sus protecciones para los grupos minoritarios. Esto no solo se adaptará mejor a las condiciones de los grupos objetivo en la actualidad, sino que también abrirá la puerta a nuevas reformas en el futuro cercano."
 USB_pass_the_equality_act: "Aprobar el Acta de Igualdad"
 USB_pass_the_equality_act_desc: "Muchos consideran que el Acta de Igualdad es la ley de derechos civiles más completa y extensa hasta la fecha, algo que, hasta ahora, nunca habíamos tenido la oportunidad de aprobar. Como enmienda a la legislación precursora, la Ley de Derechos Civiles, incluye diversas disposiciones innovadoras (y, francamente, esperadas) que incluyen no solo la ampliación de las protecciones ya existentes para las minorías, sino también diversas protecciones federales para quienes tienen ciertas orientaciones sexuales e identidades de género, extendiendo estas protecciones a los miembros de la comunidad LGBTQ+. Además, la Ley especificará y ampliará las protecciones contra el trato discriminatorio en diversas áreas, desde los servicios públicos hasta el empleo y otros programas. Con la influencia que tenemos en el Congreso, no perderemos tiempo en corregir los errores del pasado. Como un frente por la unidad, la libertad y la democracia, demos finalmente este gran paso adelante."
 USB_revitalize_the_affordable_care_act: "Revitalizar Obamacare"
 USB_revitalize_the_affordable_care_act_desc: "El Acta de Protección al Paciente y Cuidado Asequible, si bien sigue siendo la reforma más importante del sistema nacional de cobertura médica en décadas, ha demostrado ser lamentablemente insuficiente ante los efectos de la guerra en la población. Con un número cada vez mayor de personas sufriendo daños físicos y psicológicos a diario como resultado de los combates, es necesario ampliar la cobertura médica existente si queremos abordar adecuadamente las necesidades de salud de nuestra población ante el colapso de la economía y la nación. Debemos adaptarnos si queremos garantizar que ningún americano quede en la indigencia como resultado de las lesiones sufridas, ya sea durante o después de la conclusión de esta guerra."
 USB_pass_the_PRO_act: "Aprobar el Acta PRO"
 USB_pass_the_PRO_act_desc: "El Acta de Protección del Derecho a Sindicarse, o Acta PRO, es una ley que modificaría el Acta Nacional de Relaciones Laborales con el fin de ampliar diversas protecciones laborales relacionadas con el derecho de los empleados a organizarse y a negociar colectivamente en el lugar de trabajo. Impediría que los empleadores contrarrestaran la organización laboral y fortalecería el derecho de los empleados a afiliarse a un sindicato. Este proyecto de ley debe aprobarse cuanto antes para ganarse la confianza y el apoyo de la clase trabajadora en nuestros territorios e iniciar una nueva era para el capitalismo americano, una que proteja los derechos del trabajador."
 USB_call_a_special_hearing: "Charlar con las corporaciones"
 USB_call_a_special_hearing_desc: "Nunca ha sido un secreto que los numerosos conglomerados de nuestra economía tienen una influencia significativa en la política y han desempeñado un papel fundamental en la configuración de nuestra economía civil para mantener viva la antorcha de la libertad, incluso bajo asedio en todos los frentes. A pesar de su ayuda, han surgido varios problemas, tanto sociales como económicos: un auge del apoyo público a los sindicatos, el bloqueo de numerosas leyes importantes, un aumento del cabildeo en el Congreso y, sobre todo, el problema de la economía de guerra. Debemos organizar una reunión general con los ejecutivos de las corporaciones más influyentes dentro de nuestras fronteras para resolver estos problemas."
 USB_emergency_factory_retooling: "Conversión urgente de fábricas"
 USB_emergency_factory_retooling_desc: "En todo nuestro territorio, decenas de fábricas abandonadas tras años de abandono continúan perjudicando tanto nuestras economías civiles como las de guerra. Para iniciar la revitalización de la maquinaria bélica y la industria civil, debemos iniciar la reestructura y el desarrollo de fábricas de armamento, molinos, centrales eléctricas, refinerías, trituradoras de carbón y acerías abandonadas, revitalizando la producción económica y creando miles de nuevos empleos."
 USB_blow_the_whistle: "Delatarlas"
 USB_blow_the_whistle_desc: "América siempre ha tenido una relación de amor-odio con las corporaciones. Si bien empresas como Standard Oil y U.S. Steel impulsaron la industrialización, han sido la causa de la destrucción climática y la explotación laboral. Si bien siempre hemos abogado por la desaparición de estas entidades, es hora de que pasemos de nuestras palabras a la acción. Buscaremos nada menos que el fin total de la influencia corporativa sobre Estados Unidos, y no nos detendremos ante nada para garantizar que esto suceda. Si bien esto seguramente enfurecerá a los conservadores dentro de nuestro Gobierno, ganaremos un gran apoyo entre los liberales y progresistas de nuestro Gobierno y de la ciudadanía en general."
 USB_force_corporate_compliance: "Forzar cumplimiento corporativo"
 USB_force_corporate_compliance_desc: "A pesar de sus importantes contribuciones a nuestros esfuerzos por reconstruir mejor, las numerosas corporaciones que operan dentro de nuestras fronteras parecen haber olvidado su lugar. Ya hemos recibido decenas de informes que detallan violaciones del código federal por parte de corporaciones, especialmente en el trato a los trabajadores. El descontento corporativo con la legislación reciente también ha sido evidente, y podría desencadenar una ola de disensión corporativa y una total ignorancia de la ley. Esto no tiene cabida en la sociedad americana, y debemos intervenir para garantizar el cumplimiento corporativo."
 USB_tighten_our_grip_on_the_plutocrats: "Afianzar control sobre plutócratas"
 USB_tighten_our_grip_on_the_plutocrats_desc: "Las únicas dos cosas ciertas en la vida son la muerte y los impuestos. Si bien históricamente el uno por ciento de la sociedad ha sido el menos afectado por los impuestos, también ha encontrado maneras de evadir su parte. Ya sea mediante generosas donaciones a organizaciones benéficas, ganancias de capital latentes o cuentas individuales de jubilación (IRA), han estado encontrando nuevas maneras de eludir el pago de sus deudas. No toleraremos esto más y obligaremos a los ricos a pagar lo que nos deben, ya sea por ley o por la fuerza. El costo de la guerra es alto, y si la élite no está dispuesta a cumplir con su parte, también la obligaremos."
 USB_zero_unemployment_initiative: "Iniciativa de cero desempleo"
 USB_zero_unemployment_initiative_desc: "El desempleo ha sido una mancha en nuestras economías, tanto civiles como bélicas. Afecta negativamente los ingresos disponibles de las familias, erosiona el poder adquisitivo, mina la moral y reduce la producción general en ambos sectores de la economía, lo que ha resultado en un desastre. Debemos tomar todas las medidas necesarias para eliminar el desempleo y crear millones de nuevos empleos en la economía americana; de lo contrario, nos enfrentaremos a un colapso económico total en estos tiempos difíciles."
 USB_provide_economic_incentives: "Ofrecer incentivos económicos"
 USB_provide_economic_incentives_desc: "En estos tiempos difíciles, nos hemos enfrentado a una profunda desesperanza económica en todos los sectores. Esto ha paralizado nuestro esfuerzo bélico y el frente interno, comenzando a agotar los fondos federales y reduciendo la producción económica, lo que ha provocado un desastre financiero. Esto se debe tanto al desempleo como a la falta de incentivos financieros. Debemos proporcionar incentivos como subsidios, bonificaciones y aumentos salariales para comenzar a revitalizar las economías de guerra y civiles, aumentar la producción y fortalecer la moral."
 USB_pass_the_workers_bill_of_rights: "Aprobar la Carta de Derechos Obrera"
 USB_pass_the_workers_bill_of_rights_desc: "El Acta de la Carta de Derechos de los Trabajadores Domésticos es una propuesta de ley que garantiza a los trabajadores domésticos derechos básicos como salario mínimo, pago de horas extras, descansos y condiciones laborales seguras. También incluye protecciones contra la discriminación, el acoso y las represalias por parte de sus empleadores u otros actores. Si bien esto puede generar indignación en ciertas corporaciones que influyen en nuestro Gobierno, este proyecto de ley es necesario para convencer a los trabajadores comunes y garantizar su libertad."
 USB_bolster_the_mic: "Fortalecer el complejo militar-industrial"
 USB_bolster_the_mic_desc: "La expresión complejo militar-industrial (MIC) describe la relación entre el ejército de un país, generalmente Estados Unidos, y la industria de defensa que lo suministra. Esta expresión no es ajena a nuestra economía y se ha utilizado desde la época del presidente Eisenhower. En el discurso donde se acuñó el término, Eisenhower advirtió sobre su amenaza inminente, algo que hoy en día está lejos de ser cierto. Se ha debilitado drásticamente en los últimos tiempos. Mientras nuestra nación lidia con el conflicto más devastador que jamás haya vivido, debemos revitalizar la relación entre la industria de defensa y las fuerzas armadas, utilizando tácticas como la aprobación política del gasto militar, el cabildeo para apoyar a las burocracias y la supervisión conjunta de la industria."
 USB_ease_burdens_of_the_forward_thinkers: "Aliviar a pensadores vanguardistas"
 USB_ease_burdens_of_the_forward_thinkers_desc: "La innovación y el progreso tecnológico siempre han estado a la vanguardia de la expansión económica. Ya desde la época de Rockefeller y Bessemer, cuyas innovaciones propiciaron avances masivos en la industria siderúrgica y petrolera, los pensadores vanguardistas han acelerado el desarrollo de la tecnología industrial. Como parte de nuestros esfuerzos por colaborar más estrechamente con los grandes gigantes industriales de América, nos hemos esforzado por subvencionar a estos pensadores vanguardistas para que puedan ayudarnos al máximo. Nuestro éxito depende de ellos, y si deseamos asegurar el futuro de nuestra democracia, debemos apoyarlos."
 USB_promote_managerial_thought: "Fomentar Pensamiento Gerencial"
 USB_promote_managerial_thought_desc: "El Pensamiento Gerencial es, en pocas palabras, el arte de lograr resultados optimizando los recursos disponibles. La estructura organizativa en la administración general ha cambiado drásticamente a lo largo de los siglos, lo que ha propiciado un auge en la creación de ideas que, con el tiempo, se considerarían cruciales para comprender los negocios. Esta teoría debería aplicarse a nuestra situación actual, siendo la promoción de la sofisticación industrial una necesidad en estos tiempos difíciles. Debemos promover la revisión, la reestructuración y la renovación en todos los sectores de la economía si queremos lograr la estabilidad económica y la victoria sobre nuestros adversarios."
 USB_utilize_artificial_intelligence: "Utilizar IA"
 USB_utilize_artificial_intelligence_desc: "Desde el final de los años 2010, avances en inteligencia artificial han visto enormes avances, especialmente in campos como cyberseguridad, tecnología media, capacidades militares, financias, además de hacer espacio de reclutamiento al abrir nuevos trabajos en el mercado, deberíamos invertir in tecnología artificial y otros softwares similares, tanto para la economía civil y uso militar."
 USB_automated_weapon_production: "Producción de armamento automatizada"
 USB_automated_weapon_production_desc: "Las armas autónomas letales, o LAWs, son sistemas de armas que pueden buscar y atacar objetivos programados de forma independiente. Rápidamente han pasado de películas de ciencia ficción y libros a sistemas armamentísticos reales y producidos en masa alrededor del globo. Estas dan varias ventajas militares, como ser usadas como un multiplicador de la fuerza, necesitar menos personal y sistemas de combates para una sola operación, y actuar con mayor eficiencia. Además, son capaces de expandir el campo de batalla, permitiendo que se combata en zonas anteriormente inaccesibles. Por ultimo, las LAWs pueden reducir bajas al remover personas de misiones peligrosas. A pesar de recibir criticas en todos sus aspectos, esta claro que los beneficios superan a los riesgos, y deberíamos iniciar inversiones, investigación y producción en masa de LAWs además de desarrollar maneras de hacerlas más consistentes."
 USB_uphold_american_consumerism: "Defender el consumismo"
 USB_uphold_american_consumerism_desc: "El consumismo americano es la fundación en la que nuestra economía civil en periodos de paz se ha mantenido desde la Segunda Guerra Mundial. Aplastado durante esta Guerra Civil que devasto nuestra economía civil, debemos empezar a publicar campañas económicas para incrementar el poder de compra civil, reestructurar el materialismo económico y sacar a nuestra economía de la depresión. Como dice el dicho: \"a donde el consumidor americano va, la economía americana también va\"."
 USB_sack_luxury_goods_production: "Frenar la producción de lujos"
 USB_sack_luxury_goods_production_desc: "En la crisis en lo que alguna vez fue los Estados Unidos de América se ha sumergido, tenemos que adaptar por completo nuestra economía alrededor de la maquina de guerra y necesidades civiles para mantener la moral en estos duros tiempos, básicamente: no hay lugar para lujos en la economía americana de momento, y no debemos tolerar producción de lujos. Saquearemos los bienes de lujo, redireccionándolos a la economía de guerra y gastos para luchar contra la pobreza y mantener las financias civiles estables para asegurar una victoria contra las ratas escondidas en Denver. Cada americano hará su parte para llegar a la prosperidad y la victoria, incluso aquellos escondidos en lo más alto de las oficinas ejecutivas."
 USB_use_our_industrial_base: "Usar la base industrial"
 USB_use_our_industrial_base_desc: "La Base Industrial de Defensa, o DIB, es la vasta red de personas, organizaciones, instalaciones y recursos que dan al Departamento de Defensa materiales, productos y servicios material en torno a la defensa, siendo una parte instrumental de nuestro complejo militar-industrial y que ha ido creciendo en productividad, eficiencia y producción desde el final de la segunda guerra mundial. Eso claro, hasta el estallido del conflicto más sangriento de la historia americana. Ahora que nuestra democracia esta bajo asedio en todos lados, debemos revitalizar la DIB y reforzar su producción"
 USB_supercharge_the_war_machine: "Sobrecargar la máquina bélica"
 USB_supercharge_the_war_machine_desc: "La batalla final por la democracia americana ha llegado. Debemos destinarlo todo a la economía de guerra, asegurando así la victoria sobre las serpientes en Denver."
 USB_technological_revolution: "Revolución tecnológica"
 USB_technological_revolution_desc: "A pesar de ser el segundo país más avanzado tecnológicamente del mundo, y camino de convertirse en el primero, ese récord se rompió con el inicio de la Segunda Guerra Civil, que ha envuelto a nuestra nación por completo. Ningún aspecto de la sociedad americana, especialmente la tecnología, quedó al margen de sus efectos; algo que debemos revertir de inmediato. Si nuestro destino es la victoria y el establecimiento de una nueva era para la democracia americana, debemos continuar el desarrollo y el avance tecnológico, tanto en el ámbito militar como en el público, pase lo que pase en el futuro. Otra revolución tecnológica es inevitable si nos esforzamos por lograrla, y debemos hacerlo."
 USB_crackdown_on_war_profiteering: "Reprimir la especulación bélica"
 USB_crackdown_on_war_profiteering_desc: "Uno de los problemas más frecuentes que afectan a nuestra economía es la desmedida especulación de las corporaciones, en especial las que tienen influencia en el complejo militar-industrial. Esto no solo ha desmantelado el complejo militar-industrial, sino que también ha disparado la inflación y destruido el gasto civil, lo que ha disparado los precios al consumidor. La especulación imprudente con la guerra ha sido especialmente terrible, con los directores ejecutivos de las principales contratistas militares disfrutando de un fuerte aumento en el valor de sus acciones debido a la Guerra Civil. En una democracia civilizada, esto no tiene cabida, y deberíamos intentar eliminarlo gradualmente en la medida de lo posible."
 USB_a_hand_on_our_shoulder: "Una mano en nuestro hombro"
 USB_a_hand_on_our_shoulder_desc: "Las contribuciones de las corporaciones, tanto a nuestro esfuerzo bélico como al frente interno, han sido innumerables. Nos han apoyado en todo momento, tanto política como económicamente, y han contribuido a la lucha por la libertad y la democracia en todas partes. Debemos seguir fortaleciendo su fuerza e influencia, cueste lo que cueste, si queremos alcanzar la victoria final. Se otorgarán una serie de privilegios especiales a estos conglomerados, dándoles vía libre y mayor influencia política para guiarnos por el buen camino. Sin embargo, esto podría tener efectos secundarios no deseados si no se gestiona correctamente..."
 USB_nationalize_the_war_effort: "Estatizar el esfuerzo bélico"
 USB_nationalize_the_war_effort_desc: "Las corporaciones que lideran la industria de defensa han estado desangrando al pueblo americano, y esto debería hacerse evidente con cada día que pasa mientras la Guerra Civil continúa. Estos conglomerados militares, como Lockheed Martin, Raytheon Technologies, Northrop Grumman y Boeing, no solo tienen una influencia política significativa, sino que también se han involucrado en una sobreabundante especulación bélica, algo que hemos intentado eliminar. Han actuado como sanguijuelas en nuestra economía civil, debilitándola y acumulando ganancias mientras nuestros hombres en el terreno luchan por sus vidas contra tiranos. Aquí es donde nosotros, el pueblo, trazamos una línea y decimos: \"no más\" a la especulación bélica, \"no más\" al cabildeo corporativo y \"no más\" a la industria de defensa privada. Estatizaremos el esfuerzo bélico y aplastaremos a estas cucarachas antes de que su infestación destruya aún más a América."
 USB_implement_the_green_new_deal_desc: "En los últimos años, el activismo climático ha crecido hasta convertirse en una de las principales prioridades de la política americana, con un llamado a actuar y promover la reducción de emisiones cada vez más fuerte. Como resultado de la creciente atención pública hacia el bienestar del planeta, varios políticos progresistas respaldaron y propusieron el Green New Deal; un programa diseñado para reducir drásticamente y eventualmente cerrar numerosas industrias con altas emisiones, a la vez que brindaba cobertura financiera a quienes se verían afectados por la transición a una economía mucho más verde. Si bien la mayoría de los republicanos se opusieron implacablemente a un esfuerzo tan costoso, la notable ausencia de una mayoría que se resistiera a su consideración ha vuelto a poner la propuesta en el centro de atención. Si bien algunos podrían criticar su implementación en tiempos de guerra, la oportunidad de una verdadera política climática es demasiado beneficiosa como para dejarla pasar. Este será el primer paso en la contribución de América a la sostenibilidad climática, y es un paso que daremos todos juntos."
 USB_restore_the_soul_of_the_nation: "Restaurar el alma de la nación"
 USB_restore_the_soul_of_the_nation_desc: "Al estallar la Guerra Civil, una parte significativa de senadores y congresistas republicanos se unió al gobierno ilegítimo de Denver, exhibiendo al país su traición y su falta de compromiso con el proceso democrático en favor de un ególatra. Pocos creían que los republicanos sensatos -aquellos que acertaron al reconocer nuestra legitimidad como el verdadero gobierno americano- pudieran recuperar su imagen ante la población de la Unión, incluso si al final se mantuvieron en el lado correcto de la historia. Sin embargo, a pesar de las dificultades, el Partido Republicano de la Unión ha hecho un gran esfuerzo por reconstruir su imagen, renovándose eficazmente contra el estigma que rodea a la pandilla de traidores de Donald Trump y su hostilidad hacia la democracia. El nuevo Partido Republicano, al parecer, ha dado un nuevo giro: se define no como demagogos populistas, sino como conservadores sociales sensatos y tenaces, conmovedores y patriotas en defensa de su amor por la democracia y la Constitución, a la vez que están dispuestos a ceder ante la oposición por el bien común del país. Gracias en gran medida a los esfuerzos del presidente, parece que el alma de América se ha reforjado en el sentido de pasión, razón y amor por la patria, imaginados por el auténtico, legítimo y rehabilitado Partido Republicano."
 USB_lower_our_debts: "Expandir el Acta PATRIOT"
 USB_lower_our_debts_desc: "El Acta PATRIOT, oficialmente \"Acta para unir y fortalecer a América proveyendo las herramientas apropiadas, requeridas para impedir y obstaculizar el terrorismo\", se aprobó tras el 11-S y una ola de ataques terroristas contra los Estados Unidos y nuestros aliados en el extranjero. Nos permite consultar registros digitales y exponer posibles complots terroristas a voluntad, lo que demostró ser muy eficaz en los años 2000. Ahora, nuestra situación interna ha empeorado drásticamente. El surgimiento de insurgencias dentro de nuestras fronteras y la proliferación de traidores en todo el país deberían justificar una serie de enmiendas al acta del 2001, ampliando su alcance. Debemos combatir el terrorismo, la sedición y la insurgencia dondequiera que aparezcan, especialmente en el ámbito digital."
 USB_cut_down_on_social_programs: "Reducir programas sociales"
 USB_cut_down_on_social_programs_desc: "Si bien es una triste realidad, lo cierto es que, si queremos vencer a la banda de traidores de Trump, debemos adoptar plenamente una economía de guerra, lo que implica recortar programas sociales como la asistencia social, la asistencia para el alquiler, la atención médica, la asistencia alimentaria y la asistencia social general. Si bien esto seguramente generará oposición popular, es necesario que los fondos federales se redirijan a la maquinaria bélica para asegurar la victoria en el frente."
 USB_an_end_to_strife: "Un fin al conflicto"
 USB_an_end_to_strife_desc: "En el rostro destrozado de Estados Unidos, una atmósfera de esperanza ha comenzado a asentarse en el paisaje destrozado. A medida que cesan las explosiones y se silencian las armas, la gente de todo el país ha comenzado a comprender que el conflicto más devastador del siglo XXI finalmente ha llegado a su fin; celebraciones emotivas y alegres han comenzado a resonar en las calles de ciudades y pueblos, al ver el ansiado fin del conflicto interno, aparentemente interminable. La Unión ha ganado la guerra, pero nuestra labor está lejos de terminar. La nación yace en ruinas, con muchos incendios aún activos y zonas reducidas a escombros. Incontables miles y miles de americanos han perecido mientras los padres entierran a sus hijos por una guerra que nunca debió haber ocurrido. Ante nosotros se encuentran puentes que construir; heridas que sanar, cicatrices que desvanecer. En nombre de la unidad y la sanación, avancemos todos, indivisibles, como uno solo, juntos."
 USB_pass_the_economic_freedom_act: "Aprobar el Acta de Libertad Económica"
 USB_pass_the_economic_freedom_act_desc: "Con la vida de tantos americanos ahora en crisis como resultado de esta trágica guerra civil, es fundamental que evitemos que sus medios de vida se arruinen aún más. Ante la devastadora incertidumbre que se cierne sobre el futuro de tantos ciudadanos, medidas que nuestra oposición antes consideraba radicales en términos fiscales se han convertido en una obligación moral. El Acta de Libertad Económica garantizará precisamente eso; al otorgar por primera vez la renta básica universal, así como cheques de estímulo adicionales a quienes los necesitan, podemos ayudar a mantener a flote la vida de los ciudadanos americanos durante este período turbulento de nuestra historia. Si bien es cierto que los beneficios del programa distan mucho de lo que inicialmente deseábamos proporcionar, debido a las limitaciones financieras derivadas de la guerra; sin embargo, este proyecto de ley histórico para el gasto social y la lucha contra la desigualdad de la riqueza es un triunfo en sí mismo, que sin duda perdurará en el futuro previsible. Además de esto, se le concederá al gobierno la capacidad de confiscar los activos de ciertas compañías que de otra manera se han negado a cooperar con nosotros, en sus tontas preferencias hacia Denver o cualquier otro secesionista."
 USB_expand_the_militarys_funding: "Expandir el presupuesto militar"
 USB_expand_the_militarys_funding_desc: "El ejército americano, si bien contaba con abundante financiación y estaba repleto de glorias, al menos antes de la Guerra Civil, ha quedado recientemente gravemente desfinanciado, incapaz de cumplir con varias cuotas y expectativas financieras. Esto ha afectado negativamente al rendimiento tanto en el frente como contra los partisanos, quienes están haciendo un trabajo fácil con nuestros soldados mal preparados y mal equipados. Si queremos ver la victoria y la liberación, debemos desviar las reservas federales al ejército y comenzar a optimizar el equipo, a costa de recortar drásticamente la industria civil."
 USB_expand_the_cia: "Expandir la CIA"
 USB_expand_the_cia_desc: "A medida que continúa el esfuerzo continuo para erradicar a los disidentes y otros peligros potenciales, se ha determinado que se deben asignar más recursos a nuestras ramas de inteligencia para mantener y expandir adecuadamente nuestras actividades más encubiertas. Si bien hasta la fecha han realizado una labor ejemplar con los recursos asignados, la magnitud de esta guerra ha generado una clara necesidad de un mayor nivel de compromiso financiero y operativo. Para mantener la superioridad en el mundo de la recopilación de información, la Agencia Central de Inteligencia se expandirá en términos de financiación, apoyo, capacidad organizativa y eficiencia. Se incrementarán activamente las operaciones secretas y se establecerán más conexiones para asegurar y promover la posición de la Unión. La agencia, una vez más, se mantendrá diez pasos por delante de cualquiera que se asome para atacarnos en nuestro momento de debilidad, ya sea extranjero o nacional."
 USB_professionalize_the_army: "Profesionalizar el Ejército"
 USB_professionalize_the_army_desc: "El estatus de nuestras unidades de primera línea ha mejorado mucho, en comparación con el inicio de la guerra. Los informes, antes comunes, de soldados desertores son ahora escasos, y unidades que antes eran desobedientes y de lealtad cuestionable ahora marchan al unísono con las órdenes de los altos mandos. La reorganización del ejército federal está prácticamente completa, y nuestras tropas rinden mucho más a la altura de lo que se espera de ellas como soldados de la Unión. Con la mayoría de nuestros problemas inmediatos resueltos, es hora de que volvamos a la condición de un ejército profesional, con el compromiso necesario para ello. Los pocos individuos problemáticos cuya lealtad siga siendo cuestionable o problemática serán erradicados y transferidos, reemplazados, degradados o licenciados a cambio de personal más sensato. Además de asegurar el apoyo del ejército, esto nos permitirá reducir la necesidad de las numerosas milicias civiles formadas apresuradamente que sustituyen al frente."
 USB_overclock_arms_production: "Maximizar la producción de armas"
 USB_overclock_arms_production_desc: "Nuestra posición en el frente es precaria. Si bien nuestro ejército, mayoritariamente federal, es sin duda ventajoso contra las milicias trumpistas del oeste, es cierto que nuestros ejércitos son menos numerosos en comparación con el tamaño de sus fuerzas. Ante esta realidad, varios de nuestros estrategas y generales han propuesto que adoptemos una doctrina de defensa y atrincheramiento, considerándola la mejor opción posible para nuestra situación actual de enfrentarnos a un frente vasto. En lugar de atacar sin descanso y potencialmente ser derrotados, nuestras fuerzas se atrincherarán para enfrentar la embestida de los traidores en sus vanos intentos de avance, chocando contra nuestras murallas defensivas hasta que se presente la oportunidad de contraatacar donde son más vulnerables. ¿Tanto desean derrocar a nuestro Gobierno electo? ¡Que vengan! ¡Tendrán que luchar con uñas y dientes por cada metro de territorio bajo la bandera de la Unión!"
 USB_blitz_for_the_heartland: "Blitz en el Medio Oeste"
 USB_blitz_for_the_heartland_desc: "A pesar de las milicias enemigas enérgicas en el frente, no es ningún secreto que siguen en notable desventaja en comparación con el ejército profesional y convencional de la Unión. Si bien nuestras fuerzas son indudablemente superiores, es evidente que las del enemigo superan considerablemente en número a las nuestras, un hecho bastante lamentable dada nuestra situación estratégica. Esto ha llevado a varios de nuestros líderes militares a sugerir la adopción de una doctrina de maniobras ofensivas para atacar y abrumar a las fuerzas enemigas antes de que puedan recuperarse. En palabras de muchos grandes líderes estratégicos, \"la mejor defensa es una buena ofensa\". En lugar de permanecer pasivos ante los traidores de nuestro oeste, concentraremos nuestros esfuerzos en avanzar sobre el enemigo en lugar de esperar a que dé el primer paso, con ataques bien planificados para desalojarlo y rodearlo donde se encuentra. La Unión arrasará las grandes llanuras y las montañas rocosas, llevando a esos bastardos hasta el límite, a medida que temen la misma tormenta que buscaban."
 USB_subversive_warfare: "Guerra subversiva"
 USB_subversive_warfare_desc: "Tras la formación del frente, se ha hecho evidente que el enemigo nos supera ampliamente en número en el campo de batalla. Ante la amenaza de una posible derrota y un arrollamiento como resultado de su ventaja numérica, parece que debemos reformar nuestra estrategia militar hacia un nivel menos convencional. Debido a nuestro cambio de doctrinas militares convencionales a otras más asimétricas, muchos miembros del Estado Mayor han propuesto la idea de una guerra basada en la estrategia de subversión y hostigamiento. En lugar de enfrentarnos a nuestros enemigos en el sentido tradicional, practicaremos una forma de guerra que el enemigo probablemente no esperará: mediante emboscadas bien planificadas, tácticas de guerrilla, trampas y otros métodos de combate, todo ello manteniéndonos principalmente a la defensiva. Al enemigo pronto le resultará cada vez más difícil obtener ganancias efectivas sin encontrar una resistencia bien entrenada en cada esquina, lo que garantiza que, incluso si debemos retroceder, el enemigo no quedará impune. Los llamados \"patriotas\" pensaban que eran los únicos que entendían la subversión: aprenderían muy pronto que a ese juego pueden jugar dos."
 USB_mass_mobilization: "Movilización en masa"
 USB_mass_mobilization_desc: "A medida que la guerra continúa, nos enfrentamos a una triste realidad. Por mucho que deseemos que fuera diferente, el enemigo en Denver cuenta con fuerzas que superan ampliamente en número a las nuestras, compuestas por milicias entusiastas y elementos traidores del ejército, lo que nos deja en una situación muy difícil. Ante este inconveniente, algunos altos mandos han sugerido que aprovechemos nuestra reciente decisión de alejarnos de los medios más convencionales para movilizar eficazmente a la población a una escala sin precedentes. Con el aumento de los esfuerzos para reclutar y organizar a más población civil en milicias, mantendremos oleadas de valientes soldados que defenderán con valentía nuestra democracia contra la traición y la autocracia, lo que nos permitirá organizar asaltos y avances masivos y bien planificados contra el enemigo en un momento en que la mano de obra es necesaria para nuestra supervivencia. Las fuerzas trumpistas temblarán mientras los combatientes de la Unión invaden su territorio, envalentonados por el deseo de aplastar a sus enemigos dondequiera que estén."
 USB_practice_subversive_warfare: "Practicar guerra subversiva"
 USB_practice_subversive_warfare_desc: "Con nuestros esfuerzos por profesionalizar las fuerzas armadas de la Unión, es natural que avancemos hacia la siguiente etapa: la educación operativa. A pesar de la experiencia previa y el entrenamiento de calidad que nuestros ejércitos han recibido (tanto antes como durante el estallido de la guerra), es fundamental que tomemos las medidas adecuadas para educarlos y adaptarlos al combate en suelo americano. Con tanto en juego, es fundamental que mantengamos a las tropas informadas y al tanto de su eficiencia en el campo de batalla."
 USB_politicize_the_army: "Monitorear el Ejército"
 USB_politicize_the_army_desc: "No se equivoquen: esta guerra es más que una simple disputa sangrienta sobre la transferencia de poder. En esencia, es una lucha por los mismos valores que han forjado y perfeccionado esta nación: democracia, libertad e igualdad de derechos para todos. La Unión se erige como el último bastión auténtico de estos valores, valores que todo americano sensato aprecia profundamente; es fundamental que inculquemos estos valores en nuestros soldados, para recordarles por qué luchan y por qué dan su vida a diario. Porque un buen soldado lucha no porque odie lo que le espera, sino porque ama lo que deja atrás."
 USB_enforce_the_second_ammendment: "Activar la Segunda Enmienda"
 USB_enforce_the_second_ammendment_desc: "Aunque la postura inicial de muchos políticos tradicionales del Partido Demócrata ha sido de desprecio y desdén hacia la base constitucional de la posesión de armas de fuego, la reciente dirección que hemos tomado nuestras doctrinas militares nos ha llevado a reexaminar esta postura. Si bien nuestros intentos previos de prohibir la posesión privada de armas probablemente estén frescos en la memoria de muchos, este pequeño retroceso debería ser una grata, aunque repentina, sorpresa para ellos. Al aplicar y reaplicar la Segunda Enmienda en la ley y en la práctica, podremos tranquilizar a los propietarios de armas más firmes y animar a los moderados indecisos a hacer un buen uso de sus armas de fuego contra el enemigo al oeste."
 USB_militarize_society: "Militarizar la sociedad"
 USB_militarize_society_desc: "Nuestros recientes avances en la movilización masiva de la población han dado resultados beneficiosos. Hemos acumulado una amplia gama de combatientes nuevos y motivados a nuestra disposición, y estamos considerablemente mejor preparados para contrarrestar la fuerza de nuestros adversarios en el campo de batalla. Compuestas principalmente por civiles reclutados y entrenados, además de las unidades federales ya existentes, estas milicias serán cruciales para invadir las posiciones enemigas. Sin embargo, este esfuerzo masivo por reunir más combatientes no ha estado exento de inconvenientes. Uno de los problemas más apremiantes es que muchos de los ex civiles convertidos en soldados han tenido dificultades para adaptarse a los estándares que se supone que deben cumplir los soldados americanos, ya sea para seguir órdenes, cooperar más eficazmente u otros factores disciplinarios. Si bien apreciamos su entusiasmo, no ganaremos esta guerra sin organización. Iniciaremos esfuerzos para poner a punto estas unidades y asegurarnos de que puedan mantener el grado de profesionalismo que se espera de los defensores de la democracia americana."
 USB_fund_partisans: "Financiar a partisanos"
 USB_fund_partisans_desc: "Nuestros esfuerzos doctrinales han empezado a dar frutos, con el enemigo encontrando sus intentos de asegurar territorio recientemente capturado más difícil de lo esperado, nuestros esfuerzos doctrinales han empezado a dar frutos. Con un ejército de combatientes patrióticos tanto civiles y veteranos, hemos empezado a frenar el avance enemigo en maneras que ayudan a nulificar sus beneficios de combate actuales, con nuestras tácticas subversivas hemos mareado al enemigo y nuestra astuta milicia se mantiene vital en nuestro objetivo de atormentar al enemigo. A pesar de estos logros, tenemos que aumentar la contribución. Mientras hemos logrado infligir daño notable al enemigo, la amenaza de nuevos avances han persistido por el curso de esta guerra. Si queremos ganar esta lucha, debemos incrementar nuestros esfuerzos de subvertir y sabotear al enemigo tras cualquier esquina- grupos partisanos consistiendo de aquellos más leales a la Unión van a residir y operar detrás de las lineas enemigas, librando una insurrección conjunto a colaboradores en áreas urbanas principalmente. Desde ahora, los esfuerzos de ardua ocupación de los enemigos se van a convertir en algo cercano a una pesadilla."
 USB_expand_gun_ownership: "Expandir posesión de armas"
 USB_expand_gun_ownership_desc: "Con nuestros esfuerzos recientes para cultivar preparación ciudadana terminado en éxitos, se ha determinado que estos esfuerzos se van a llevar a un paso más para garantizar la mayor seguridad entre la población. Con el flujo de mano de obra resultado de nuestra visión no convencional, debemos fomentar y asegurar que todos nuestros ciudadanos fuera de combate se mantengan preparados frente a la embestida violenta del enemigo - La posesión de armas será incentivada y alentada, y múltiples programas desde entrenamiento con armas a la preparación general de ataque serán introducidas, diseñadas para preparar a la población a enfrentar el peor de los casos. Todos deben estar listos y disponibles para defender nuestra democracia, incluso si no están alistados."
 USB_extend_the_supply_network: "Extender la red de suministros"
 USB_extend_the_supply_network_desc: "El Personal de oficiales de la Unión es una bolsa mezclada; gracias a nuestra posesión de la mayoría del ejército federal, nuestros rangos consisten de tanto aquellos con años de experiencia de conflictos pasados, como aquellos recién graduados que se han encontrado con su talento de liderazgo en el campo de batalla. Aunque la presencia de jóvenes llegando a rangos de oficiales es una buena señal de futuras promesas estrategas, cierto numero de deficiencias dentro de sus funciones de mando han sido identificadas, en gran medida debido a su poca experiencia dentro de combate y su falta de familiaridad con un conflicto tan mayor como este. Al mismo tiempo, oficiales más viejos han experimentado dificultades actualizando sus métodos, probablemente por razones similares sobre la naturaleza de esta guerra. Un cuerpo de oficiales sin experiencia, o rígido estará seguro de traducirse en malas decisiones más tarde; para evitar esto, inmediatamente vamos a iniciar un esfuerzo para volver a entrenar a nuestros oficiales para alinear de mejor manera sus capacidades de liderazgo con la situación actual, y asegurarse que nuestros hombres estarán en buenas, y capaces manos por la lucha adelante."
 USB_race_against_the_clock: "Carrera contrarreloj"
 USB_race_against_the_clock_desc: "Nuestra dirección adoptada para definir los valores por los que lucha nuestro ejército ha resultado, en última instancia, beneficiosa. Dado que nuestra Unión se ha consolidado como el bando que lucha por el progreso social y político en todos sus aspectos, ya sean los derechos de las minorías y la igualdad, la reforma política y económica, y cualquier otra causa moderna de libertad y tolerancia, hemos visto un notable aumento tanto en el reclutamiento como en el apoyo popular. Con estos recientes éxitos, es hora de que los aprovechemos. Muchos activistas que salieron a las calles a protestar antes de la guerra se encontraban entre los más firmemente comprometidos con el progreso y el antiautoritarismo de todo tipo, especialmente frente a la administración Trump. Al alentar y movilizar a los miembros y activistas de los movimientos de preguerra, veremos un aumento aún mayor de reclutas entusiastas, deseosos de luchar por una nación mejor, más igualitaria y moderna, así como de defenderla de quienes pretenden hundirnos en una idea retrógrada de lo que América debería ser. Con algunos de los individuos más abiertamente anti-Trump en nuestras filas, sin duda lucharán con celo frente a una tiranía tan familiar."
 USB_caution_over_land: "Precaución sobre la tierra"
 USB_caution_over_land_desc: "A pesar de que el flujo de soldados nuevos es una gran señal de la adaptación y habilidades de la nueva generación en el arte de la guerra, esta no se a presentado sin incluir problemas en ciertas habilidades claves. Aunque tienen un buen sentido de intuición y improvisación, generalmente fallan en su sabiduría y experiencia en relación a la estrategia en combate, lo que causa que su rendimiento en combate será menos efectivos que lo que podrían ser. Si logramos mantener un nivel cohesivo de eficiencia entre las unidades en la zona de batalla, es vital que sean educadas en la naturaleza de tácticas de combate y otros métodos de asalto y defensa diseñados para darles una ventaje cuando se enfrenten al enemigo, sin importar quien sea."
 USB_allied_assistance: "Asistencia aliada"
 USB_allied_assistance_desc: "Cuando se trata de este conflicto, se ha hecho bastante claro que la llave a la victoria no cae solo sobre los soldados y sus tácticas utilizadas contra el enemigo, pero el equipamiento que ellos utilizan también. A pesar de que nuestro ejército es más que capaz de defenderse contra milicias impreparadas, es estúpido pensar que tendremos esta ventaja por siempre. Con nuestro acceso a la mayoría del tan disfrutado complejo militar industrial, haremos un buen uso de nuestras conexiones - asegurando que nuestros soldados siempre tendrán el mejor y más moderno equipamiento dispuesto a su utilización."
 USB_requistion_civilian_firearms: "Solicitar armas civiles"
 USB_requistion_civilian_firearms_desc: "Nuestro compromiso con una postura defensiva contra nuestros enemigos requiere un esfuerzo fundamental para mantener nuestras capacidades de ingeniería en el campo, especialmente en un país tan industrializado y con una infraestructura tan compleja como el nuestro. Si bien nuestros ingenieros actuales están lejos de ser inadecuados, son bastante inadecuados para operaciones a gran escala, propias de un frente tan vasto, especialmente si se desarrollan en su propio territorio. Para corregir este descuido, comenzaremos a reforzar el papel del Cuerpo de Ingenieros del Ejército, instruyéndolo y adaptándolo al terreno y la infraestructura del territorio americano para maximizar nuestra eficiencia y experiencia en fortificaciones."
 USB_full_spectrum_operations: "Operaciones de espectro completo"
 USB_full_spectrum_operations_desc: "La doctrina de avance rápido y encierro es una doctrina que ha sido utilizada y experimentada a través de la historia en un numero de frentes con una variación de su escala. Mientras nuestras mejores mentes militares han certeramente aprendido a apreciar el valor de tácticas de movilidad de nuestros aliados en la OTAN, nosotros no habíamos tomando en cuenta la aplicación de esta doctrina en nuestro terreno de origen. Si es que queremos mantener y aplicar esta doctrina de manera eficiente, debemos asegurarnos que nuestra capacidad vehiculares se mantengan del mejor nivel en términos de adquirir nuevos modelos para utilizar en el terreno de combate."
 USB_operation_mirage: "Operación: Mirage"
 USB_operation_mirage_desc: "Previo a la guerra, no habia lugar a duda de que Estados Unidos tenía una influencia masiva alrededor de todo el mundo. Desde su influencia dentro de las Naciones Unidas, a nuestro estatus como el principal miembro de la Organización del Tratado del Atlántico Norte, nuestro Estado como la superpotencia número uno del mundo era inigualable, a parte de unos rezagados contendientes. A pesar de que este conflicto de nosotros ha desgraciadamente causado que nuestra presencia en el mundo haya completamente colapsado, no estamos enteramente en la oscuridad; ignorando la circunstancias, hemos mantenido conexiones con un gran número de nuestros aliados extranjeros anteriores a la guerra, como con ciertos afiliados.\n\nCon estas conexiones, empezaremos a contactar y buscar su experiencia. Vamos a solicitar y utilizar las relaciones mantenidas con nuestros aliados en la forma de ataches militares, permitiendo una cantidad de asesores provenientes de nuestros aliados europeos y extranjeros para asistir y apoyar nuestros esfuerzos para asegurar nuestra nación nuevamente. Es claro que nuestro predicamento los ha afectado de manera indudable como también al resto del mundo, y es cierto que ellos también quieren ver el fin de este conflicto lo más rápido posible, con su experiencia de combate prontamente probando ser valiosa a nuestras fuerzas."
 USB_finish_the_fight: "Terminar la lucha"
 USB_finish_the_fight_desc: "Desde nuestra situación inicial al estallar la guerra, el estado de nuestras fuerzas armadas y su rejuvenecimiento han sido un largo y difícil camino para rectificar y mejorar, un camino que, en última instancia, ha dado sus frutos, en el más alto sentido. Donde antes había desorganización e ineficacia, ahora hay cohesión y profesionalismo, preparados y conocedores de los métodos de combate en suelo americano. Donde antes había soldados desleales e incompetentes, ahora se alzan fuerzas fuertes y orgullosas, reivindicadas en su deseo de abatir a los enemigos de nuestra democracia libre dondequiera que se encuentren, ya sea en casa o en cualquier otro lugar. Ahora, el ejército de la Unión es inigualable en su devoción contra la tiranía, y con la mayor parte de las reformas finalizadas, solo queda finalizar las últimas reformas necesarias para garantizar que nuestras fuerzas actúen siempre como un baluarte contra los traidores y otros radicales que buscan destruir los principios fundamentales de esta nación. Mientras se mantengan en pie, jamás cederemos ante la tiranía y la oscuridad."
 USB_cooperate_with_the_corporations: "Cooperar con las corporaciones"
 USB_cooperate_with_the_corporations_desc: "A pesar de lo que los progresistas idealistas quieran hacernos creer, la cooperación entre el gobierno y las empresas ha sido, en gran medida, de beneficio mutuo desde sus inicios. Dada su enorme influencia económica, no es inusual que, por lo general, la mejora de las condiciones de estas corporaciones se traduzca en una mejora de la economía, que también beneficia al resto de la sociedad americana. Por esta razón, comenzaremos a avanzar para mantener esta relación, tanto para promover los intereses de la Unión como para garantizar a estas empresas que, mientras veamos resultados, nuestra economía funcionará a la perfección."
 USB_fight_the_corporatocracy: "Combatir la corporatocracia"
 USB_fight_the_corporatocracy_desc: "Aunque las marionetas corporativas del Congreso preferirían que se creyera lo contrario, la idea del \"beneficio mutuo\" entre las mayores corporaciones del país es, en el mejor de los casos, un punto de vista ignorante y, en el peor, una completa estafa. La influencia que estos conglomerados masivos han acumulado sobre la toma de decisiones del gobierno en las últimas décadas ha llegado nada menos que a un estrangulamiento, siendo la verdad que a una gran mayoría de estas empresas les importa poco el ciudadano común fuera de su utilidad laboral, y su \"cooperación\" no es más que una forma de asegurar mayores beneficios a través de interminables cantidades de cabildeo. Ahora que ha estallado la guerra, y que estas empresas se encuentran en una posición beneficiosa -aunque vulnerable - ya es hora de que empecemos a erradicar esta violación de los principios democráticos. Empezaremos a hacer retroceder su influencia en la política del Congreso como primer paso para recordarles quién tiene realmente el poder en este país, y para recordar a nuestros legisladores para quién fueron elegidos."
 USB_the_unification_deal: "Acuerdo de unificación"
 USB_the_unification_deal_desc: "Si bien nuestra cooperación continua con los diversos conglomerados actuales ha sido sin duda muy fructífera para aliviar nuestra economía colapsada, se ha hecho evidente que la coordinación entre el gobierno y las empresas más prominentes es mucho menos organizada de lo que inicialmente esperábamos. Con el panorama político y del mercado tan alterado como resultado de esta guerra, ha habido, en la mayoría de los casos, conflictos de intereses entre el gobierno y estas empresas (con conflictos entre estas empresas casi tan fuertes como con el Congreso). Para funcionar eficazmente en conjunto con estas empresas, es fundamental que entablemos conversaciones con las más influyentes bajo la bandera de la Unión, a fin de realinear mejor nuestras directrices y determinar cómo encajan estas corporaciones en la economía americana en lenta recuperación."
 USB_expand_global_trade: "Ampliar el comercio mundial"
 USB_expand_global_trade_desc: "Antes de la guerra, Estados Unidos tenía una enorme influencia comercial y económica en los mercados mundiales, y el poder del dólar era representativo de nuestra posición como una de las principales potencias económicas del mundo. Habiendo disfrutado durante mucho tiempo de los beneficios de una economía capitalista, éramos casi intocables en este aspecto, lo que hizo que nuestra caída en desgracia (más parecida a un choque ardiente) fuera aún más trágica al final. Ni que decir tiene que no somos los únicos afectados por esta tremenda sacudida de la cadena del mercado mundial, ya que nuestros mayores socios comerciales también están sufriendo las duras consecuencias de nuestro colapso. Dado que nuestro acceso a la costa oriental es una gran ventaja en nuestra conexión con el mundo exterior, hemos podido mantener parte del comercio que teníamos antes, aunque en una capacidad muy reducida. Para ayudar a reactivar los aspectos de la economía mundial que antes dábamos por sentados, nos esforzaremos por ampliar nuestras operaciones comerciales con nuestros socios extranjeros más fiables, lo que nos permitirá volver a recibir la ayuda y los recursos que tanto necesitamos de la comunidad mundial."
 USB_american_autarky: "Autarquía americana"
 USB_american_autarky_desc: "La economía mundial es un mercado indudablemente importante para cualquier nación que pretenda mantenerse financieramente estable y preparada en cuanto a recursos. Antes de nuestros males, este país entendía esto mejor que la mayoría de los contendientes comerciales, hasta el punto de que habíamos emergido como una de las figuras más destacadas del mercado mundial. Aunque cosechamos los beneficios de la subcontratación y la globalización durante bastante tiempo, poco a poco se allanó el camino para una nueva serie de problemas y desventajas que han hecho que el colapso de nuestra economía sea mucho peor de lo que podríamos haber predicho - una excesiva dependencia de la mano de obra extranjera ha hecho que muchos de nuestros sectores económicos carezcan drásticamente de autosuficiencia, haciendo que estas áreas sean económicamente ineficaces y que muchos trabajadores sean indigentes. Si queremos recuperarnos alguna vez de esta catástrofe, ha llegado el momento de cambiar de rumbo; empezaremos a revitalizar nuestros sectores productivos para depender considerablemente menos de las fuerzas extranjeras, asegurándonos de que, incluso con una mano de obra reducida en el comercio, seguiremos siendo capaces de mantenernos económicamente sin estar a merced de los mercados extranjeros. Además de aumentar nuestras capacidades económicas, esto también devolverá al trabajador medio una influencia muy necesaria, dejándole mucha más capacidad de negociación de la que ha tenido en los últimos años."
 USB_military_factory_conversion: "Conversión de fábrica militar"
 USB_military_factory_conversion_desc: "A medida que nuestro compromiso con la producción en tiempo de guerra continúa, también lo hace la necesidad de centros de producción viables. Aunque no cabe duda de que nuestro número actual de fábricas que producen equipos de primera línea está dando grandes resultados, lo cierto es que sencillamente no hay suficientes instalaciones en la Unión equipadas para responder adecuadamente a la producción que exige el esfuerzo bélico. Para ello, comenzaremos a reacondicionar y convertir adecuadamente una serie de fábricas civiles y de consumo en otras orientadas a la fabricación del equipo tan necesario para derrotar a los traidores allí donde se encuentren."
 USB_mobilize_the_economy: "Movilizar la Economía"
 USB_mobilize_the_economy_desc: "Un factor clave para ganar cualquier guerra es la capacidad industrial de una nación, especialmente en lo que respecta a la producción de armamento y otros equipos militares. Afortunadamente, hemos tenido la fortuna de conservar una parte significativa del Cinturón Industrial, lo que nos permite controlar lo que podría considerarse el corazón industrial de América. Para vencer a las fuerzas de traición y extremismo que nos rodean, debemos realizar un esfuerzo concertado para movilizar nuestra economía como no se ha visto desde la Segunda Guerra Mundial. Las instalaciones actuales se reacondicionarán y reorganizarán para producir en masa el equipo necesario, y la maquinaria americana volverá a estar preparada para llevar a nuestra Unión a la victoria. Además, se animará a la población a colaborar en el esfuerzo bélico cuando pueda, mediante la moral, el reclutamiento y otras medidas internas para apoyar la democracia en América. Recuerden, ¡todos estamos comprometidos!"
 USB_expand_our_resources: "Expandir nuestros recursos"
 USB_expand_our_resources_desc: "Nuestros esfuerzos por alcanzar la autosuficiencia económica han dado grandes resultados hasta la fecha. De una manera impensable para la América del siglo XXI, hemos tomado nuestra resiliencia con calma, y nuestras industrias producen cada vez más bienes y suministros necesarios para el fin de esta guerra. A medida que nuestra producción siga creciendo en escala y magnitud, al igual que nuestra necesidad de materiales para lograrlo, para satisfacer las demandas de la maquinaria bélica y del aparato público, iniciaremos una adquisición masiva de los recursos necesarios, aumentando la capacidad de varias acerías y otras instalaciones similares disponibles para producir lo que tanto necesitamos."
 USB_expand_our_reach: "Expandir nuestro alcance"
 USB_expand_our_reach_desc: "Gracias a nuestros esfuerzos anteriores para reajustar nuestro comercio exterior, hemos visto una gran afluencia de suministros, materiales y otras necesidades de los mayores socios mundiales para que la Unión los utilice. Aunque todavía estamos lejos de alcanzar el nivel de comercio internacional y relativa prosperidad que disfrutábamos antes del colapso, el estado de nuestra economía ha mejorado enormemente en comparación con las primeras fases de la guerra. Con nuestra situación mejorando lenta pero inexorablemente, hagamos mayores esfuerzos para volver a encarrilar la Unión; nuestros esfuerzos para volver a cultivar el comercio con las naciones extranjeras se ampliarán, con una serie de propuestas a los socios comerciales tanto antiguos como nuevos para negociar nuevos acuerdos comerciales en beneficio de nuestro bienestar económico."
 USB_expand_our_research: "Expandir Nuestra Investigación"
 USB_expand_our_research_desc: "En lo que respecta a la investigación para el desarrollo, ya sea industrial, tecnológica, militar o de otro tipo, es importante que la Unión no se quede atrás en esta materia. Aunque hasta ahora hemos conseguido mantenernos al día de los avances tecnológicos que nos otorgan una ventaja en la producción y el bienestar general de la sociedad, no debemos conformarnos con lo que pueda considerarse obsoleto en el futuro, sino que debemos permanecer un paso por delante de nuestros adversarios siempre que sea posible. Estableceremos una serie de subvenciones y fondos destinados a diversos grupos e instituciones de investigación, con el fin de lograr un mayor aumento de la capacidad de I+D y de los resultados globales."
 USB_improve_employee_benefits: "Mejorar los beneficios de los empleados"
 USB_improve_employee_benefits_desc: "Es un secreto a voces que, en comparación con la mayoría de los países desarrollados, la situación de la fuerza laboral americana ha sido desde hace mucho tiempo pésima. Incluso antes de la guerra, las prestaciones que se ofrecían a los trabajadores eran mínimas en comparación con lo que realmente necesitaban para tener seguridad financiera y social, ya fuera la falta de licencia de maternidad remunerada, prestaciones de seguro básicas, la represión a los sindicatos y otras deficiencias intencionadas diseñadas solo para saciar la codicia de los empleadores que ya ganaban mucho. Con la influencia de muchas de las corporaciones sindicales en declive, es hora de que aprovechemos esta oportunidad para \"ponernos al día\", por así decirlo. Se promulgarán varias prestaciones obligatorias y se implementarán lo antes posible para las grandes empresas, otorgando a nuestros ciudadanos trabajadores prestaciones que deberían haber adquirido hace mucho tiempo. Aunque los ejecutivos se quejen de sus nuevas responsabilidades con sus empleados, poco importa; Además, no deberían haber creado una empresa si no pueden permitirse el lujo de cuidar a sus trabajadores."
 USB_import_overseas_labor: "Importar trabajo extranjero"
 USB_import_overseas_labor_desc: "Estados Unidos ha sido durante mucho tiempo un gran faro en un mundo de incertidumbre: un modelo para los desfavorecidos del mundo y quienes buscan oportunidades, provenientes de lugares sin recursos. Como lo indica la Estatua de la Libertad, este país siempre ha abogado por llevar a las masas a cotas más altas y prósperas, sin importar su origen, y nuestra economía reflejó en gran medida la importancia de la mano de obra extranjera como un factor positivo general. Aunque la perspectiva del \"sueño americano\" ya no tiene las implicaciones emocionantes y esperanzadoras de antaño (por razones obvias), tenemos amplias oportunidades para revertir esta situación. Dado que el comercio global de la Unión se ha expandido considerablemente en los últimos meses, es lógico que busquemos mejorar aún más nuestras capacidades. Al importar trabajadores del extranjero a través de diversos programas, podremos dedicar mayores esfuerzos a diversos proyectos y campos, que abarcan desde la producción en tiempos de guerra y para el consumo, la reconstrucción y otros puestos que deben cubrirse a cambio de una compensación financiera adecuada. Además de esto, ayudaremos a nuestras antiguas corporaciones multinacionales a reactivar sus capacidades productivas en países extranjeros, lejos del conflicto interno."
 USB_curtail_corporate_commitments: "Reducir compromisos empresariales"
 USB_curtail_corporate_commitments_desc: "A medida que esta guerra ha progresado y esta nación ha cambiado para siempre, el aparato económico del Estado también ha cambiado. Antes de la guerra, la economía americana no estaba orientada al bienestar general de nuestra sociedad, sino a los accionistas y ejecutivos que ostentaban todo el poder monetario que el ciudadano promedio solo podía soñar con alcanzar. A medida que nos hemos esforzado por reducir sus oportunidades para adaptarnos a nuestra situación, el poder y la influencia de estas corporaciones palidecen en comparación con lo que fueron antes, con nuestra recién adquirida autosuficiencia fortaleciendo a la Unión más que en años. Con su influencia disminuyendo drásticamente cada día que pasa, es hora de que consolidemos estos cambios para que persistan incluso después de esta guerra. Haremos un último esfuerzo para reducir los últimos vestigios de poder económico que estas empresas poseen, haciendo que su voz en la política sea irrelevante frente a la palabra del gobierno. Como era de esperar, los directores ejecutivos y los miembros de la junta directiva estarán indignados al ver cómo se les arrebata su último atisbo de importancia económica; pero, en realidad, ¿adónde más van a ir exactamente?"
 USB_fight_poverty: "Combatir a la pobreza"
 USB_fight_poverty_desc: "El problema de la pobreza en la Unión se ha agravado con la prolongación de la guerra. Con la catastrófica crisis económica previa a la guerra y la llegada del conflicto, el número de ciudadanos americanos empobrecidos ha seguido creciendo a medida que nuestra economía se recupera lenta pero seguramente de su colapso. Si bien hemos logrado avances significativos para acelerar su recuperación, la recuperación de los ciudadanos afectados por la recesión económica ha sido, en general, menos efectiva de lo esperado. Para resolver formalmente esta crisis que azota al pueblo americano, se implementarán diversos programas de alivio de la pobreza con el fin de aliviar su sufrimiento y mejorar su situación actual, con la esperanza de que, eventualmente, mitiguemos las tasas de pobreza a los niveles previos a la crisis o incluso a niveles inferiores."
 USB_embrace_the_board: "Abrazar la junta"
 USB_embrace_the_board_desc: "Muchos aspectos del panorama económico y político de Estados Unidos han cambiado durante esta guerra, desde la política partidista hasta las políticas públicas, pasando por cambios en los estilos de vida y las rutinas diarias. A pesar de estas necesarias modificaciones en tiempos de guerra, algo permanece inalterado para mejor: la relación beneficiosa entre el gobierno y las numerosas empresas que contribuyen a nuestra economía. Siendo la opción natural y pragmática ante una economía destruida que necesita ser remediada, nuestra cooperación ha cosechado éxitos mutuos tanto en la prosperidad de la Unión como en la de los principales contribuyentes. Con la proverbial Junta Directiva satisfecha con nuestros compromisos y comprometida a servirnos diligentemente, es hora de que fortalezcamos nuestra relación con estas corporaciones. Nos veremos obligados a garantizar que su papel en la economía continúe mientras el país continúa recuperándose de su colapso, siempre que se mantengan conformes con nuestras decisiones y cedan cuando se lo solicitemos."
 USB_bust_the_trusts: "Reventar los monopolios"
 USB_bust_the_trusts_desc: "El término \"demasiado grandes para quebrar\" ha sido acuñado por muchos políticos del establishment a lo largo de los años, desde que la crisis financiera de 2008 puso nuestra situación económica en el punto de mira. Se ha expresado para representar la necesidad de las empresas todopoderosas de este país para la estabilidad continua no solo de nuestros propios mercados, sino también del mundo. Esta colosal importancia les ha otorgado una gran influencia, permitiéndoles influir sobre los legisladores y las políticas que proponen, ya sea directamente mediante donaciones de campaña o mediante un gran volumen de cabildeo corporativo, todo ello con el fin de promover sus afán de lucro y éxitos comerciales. Sin embargo, con la guerra civil alterando este statu quo, nos aseguraremos de que la Unión tenga todo lo necesario para asegurar su supervivencia política y económica. Se presentará una amplia legislación antimonopolio que desmantelará eficazmente a estos gigantes empresariales y nos permitirá confiscar algunos de sus tan necesarios activos para un mejor uso, además de reducir considerablemente su capacidad de influir en los asuntos del Congreso al impedir el cabildeo a favor de intereses comerciales. Dejemos la política en manos de los políticos."
 USB_trust_funding: "Financiarlos"
 USB_trust_funding_desc: "Si bien Estados Unidos no ha sido ajeno a las recesiones económicas a lo largo de su historia, pocas crisis financieras se acercan a nuestra situación actual de catástrofe total. Con la reciente crisis del petróleo que hundió nuestra economía en picada, y el estallido de un conflicto civil poco después, un número incalculable de nuestros ciudadanos se han empobrecido y se han quedado sin trabajo debido al colapso económico total que continúa azotando a nuestra nación. Debido a la naturaleza de nuestra economía, nuestro camino hacia la recuperación depende en gran medida del éxito de nuestras empresas más grandes, que se encontraban en graves dificultades incluso antes del colapso. Con esto en mente, comenzaremos a asignar fondos a las empresas más importantes, permitiéndoles mejorar su situación financiera y aumentando el empleo para quienes buscan desesperadamente oportunidades laborales después del colapso. El regreso de los empleos a la Unión será un gran impulso para la confianza pública en nuestro Gobierno; después de todo, lo que es mejor para las grandes corporaciones es, en última instancia, lo mejor para todos."
 USB_take_to_the_skies: "Zurcar por los cielos"
 USB_take_to_the_skies_desc: "\"Tener el control del aire significa poder aislar al Ejército y la Armada enemigos de sus bases de operaciones y anular sus posibilidades de ganar la guerra\". Si bien nuestra guerra contra los constitucionalistas consiste principalmente en combates terrestres, no debemos olvidar la guerra en el aire. Debemos tomar la iniciativa para disputar o controlar el espacio aéreo constitucionalista y brindar apoyo aéreo estratégico a nuestras fuerzas terrestres. También debemos apoyar a nuestra Fuerza Aérea para que no se extienda demasiado. Si permitimos que la fuerza fracase, perderemos la guerra tan rápido como comenzó."
 USB_quality: "Probar nuestros límites"
 USB_quality_desc: "En cuanto a eficiencia aérea, siempre hemos buscado ir más allá: mediante la investigación y el desarrollo militar, seguimos desafiando lo que antes se creía imposible. Con nuevos prototipos y avances en ingeniería aeronáutica que surgen a diario, existe una amplia oportunidad para utilizar la nueva generación de destreza tecnológica en el campo de batalla. Al centrar nuestros esfuerzos en garantizar que los mejores y más nuevos modelos se utilicen eficazmente en el campo de batalla, podemos superar a nuestros enemigos priorizando la calidad de las aeronaves, en lugar de la cantidad."
 USB_quantity: "Producción masiva de aeronaves"
 USB_quantity_desc: "Si bien nuestros esfuerzos por disputar el espacio aéreo constitucionalista han sido en su mayoría exitosos, nos hemos topado con otro problema: estamos perdiendo aviones a un ritmo mayor al que podemos producirlos. Si bien esto aún no se ha convertido en un problema grave, si permitimos que se agrave, obstaculizará seriamente nuestro esfuerzo bélico. Por lo tanto, es imperativo que incrementemos la producción de aviones de todo tipo, sin importar si debemos recortar gastos. Si tenemos éxito, podremos resolver el problema del desgaste y reducir el desempleo."
 USB_drone_techniques: "Técnicas de drones"
 USB_drone_techniques_desc: "El uso de drones contra objetivos insurgentes no es una práctica desconocida en la política de combate de EE.UU. Altamente eficaces para localizar y eliminar grupos de hostiles e individuos críticos, y gracias a su disponibilidad en tamaños más pequeños, han demostrado una y otra vez ser un recurso invaluable para las operaciones antiterroristas a nivel mundial. Es importante que utilicemos esta tecnología y las tácticas necesarias con la mayor eficacia posible en primera línea, especialmente con una zona de combate e infraestructura nacional tan extensas. Como el enemigo pronto descubrirá, es mucho menos placentero ser el blanco de tales ataques que pilotarlos."
 USB_air_base_efforts: "Construir aeródromos"
 USB_air_base_efforts_desc: "Si bien hemos tenido éxito en nuestra guerra aérea contra los constitucionalistas, nos enfrentamos al peligro inminente de sobrepasar nuestras capacidades. Si bien podemos apoyar el esfuerzo bélico con nuestras bases actuales, esto cambiará a medida que recuperemos más territorio de Trump. Será necesario reparar las antiguas bases aéreas constitucionalistas. Esto garantizará que nuestra Fuerza Aérea pueda brindar apoyo aéreo adecuado a nuestro ejército. Estas bases aéreas también mitigarán el riesgo de que nuestra Fuerza Aérea se vea sobrepasada, lo que ralentizaría considerablemente el esfuerzo bélico."
 USB_ariel_discipline: "Disciplina aérea"
 USB_ariel_discipline_desc: "Desde el estallido inicial de la guerra civil, la Fuerza Aérea se encontraba en un estado de inestabilidad debido al caos que trajo consigo el colapso. Aunque mucho más leal que otras partes del ejército, la llegada de nuevo personal y la desorganización general que originalmente impregnaba a las fuerzas armadas seguían presentes en la forma en que realizaban las tareas operativas. A medida que nuestros recientes esfuerzos por perfeccionar tácticas aéreas más definitivas han comenzado a dar frutos, tradujémoslos en un renovado sentido de disciplina para los defensores de nuestra libertad. Se intensificarán los ejercicios, se mejorará la coordinación, se perfeccionarán las formaciones y nuestros pilotos volverán a operar con férrea eficacia contra los enemigos de la democracia con una precisión aterradora."
 USB_strategic_destruction: "Destrucción estratégica"
 USB_strategic_destruction_desc: "El arte de la destrucción selectiva es fundamental en cualquier guerra, especialmente en una que se libra en un campo de batalla tan vasto como el nuestro. Como sabrán la mayoría de los estrategas medianamente decentes, es mucho más difícil librar una guerra cuando los suministros, el armamento y los medios para adquirirlos han sido reducidos a escombros por un bombardeo bien ubicado. Si queremos dominar este método de selección de blancos, tendremos que avanzar para adaptarnos mejor a la ejecución de estas tácticas contra estructuras de fabricación americana. Los pilotos se adaptarán a la selección de blancos en su propio territorio y se les pondrá al día sobre cómo operar eficazmente en territorio conocido. Con el suficiente esfuerzo, nuestros bombarderos se convertirán en un espectáculo temible para el enemigo, por muy reforzados que estén."
 USB_clear_the_heavens: "Despejar los cielos"
 USB_clear_the_heavens_desc: "Pocos pueden negar que la Fuerza Aérea de la Unión sigue siendo una de las mejores del mundo. Incluso antes de la guerra, nuestro historial moderno era prácticamente intocable frente a enemigos menores, y solo se mantuvo en gran medida durante el transcurso de este conflicto. Aunque era de esperar, varios grupos han comenzado a adquirir sus propias aeronaves, con la esperanza de que no solo puedan frustrar nuestra dominación aérea, sino que también amenacen aún más nuestros recursos. Si bien la USAF ha practicado desde hace tiempo combates aéreos y maniobras de combate, hasta hace poco apenas ha podido enfrentarse a objetivos reales. Si queremos mantener el esfuerzo aéreo bajo nuestro control, comenzaremos a asegurarnos de que la destreza de combate de nuestros pilotos sea inigualable contra cualquier posible advenedizo que intente rivalizar con nuestra supremacía en el espacio, y de que los cielos permanezcan libres de aviones enemigos para beneficio de nuestras tropas terrestres."
 USB_cover_the_troops: "Cubrir a las tropas"
 USB_cover_the_troops_desc: "En palabras de un gran general aliado: \"Si perdemos la guerra en el aire, la perdemos, y rápidamente\". Si bien esto aplica absolutamente a nosotros, lo mismo aplica a nuestros enemigos, ya que es mucho más difícil organizar y mantener una posición efectiva cuando se está asediado por un escuadrón de cazas decididos. Al preparar y entrenar a la Fuerza Aérea para hostigar y atacar objetivos terrestres con eficacia y precisión, podremos infligir graves daños a cualquier fuerza enemiga que se considere bien preparada. Además de debilitar a las fuerzas hostiles para un asalto terrestre, podremos proteger a nuestras propias tropas de la aviación enemiga que opte por hacer lo mismo contra nosotros."
 USB_clean_the_seas: "Limpiar los mares"
 USB_clean_the_seas_desc: "Aunque muy pocos de los participantes en esta guerra poseen un número considerable de buques, dada la ausencia y neutralidad de la mayoría de la Armada de los EE.UU., es muy posible que nuestra falta de defensas navales resulte problemática en las futuras etapas de este conflicto. Con la gran cantidad de suministros que se envían al continente desde el extranjero (ya sea de asistencia o de otro tipo), ha quedado claro cuán vulnerable puede ser nuestro cargamento al sabotaje. Para lograr cierta capacidad para proteger la costa este y sus rutas comerciales de posibles ataques, comenzaremos los preparativos para garantizar que la Fuerza Aérea de los EE.UU. cuente con la capacitación necesaria para proteger nuestros buques existentes y realizar ataques aéreos contra buques y fragatas enemigos, especialmente en lo que respecta a posibles convoyes de suministros enviados por subversivos extranjeros que intentan socavar nuestra autoridad. Hasta que la Armada se recupere, la Fuerza Aérea tendrá que vigilar las aguas."
 USB_reunify_the_nation: "Reunificar la nación"
 USB_reunify_the_nation_desc: "[USB_reunify_the_nation_desc_scripted_loc]"
 USB_demolish_guerillas: "Demoler las guerrillas"
 USB_demolish_guerillas_desc: "Aunque muchos de nuestros enemigos han sido aniquilados en el campo de batalla, hay quienes aún se niegan a rendirse incluso ante la destrucción. Quienes no han logrado vencernos en combate abierto han huido a zonas remotas o a la clandestinidad urbana con la esperanza de frustrar nuestros esfuerzos por restablecer el orden, llevando a cabo emboscadas, sabotajes y otros intentos desesperados de resistir lo inevitable. Además, su irritante persistencia es una señal poco entusiasta para la población enemiga de que la guerra, de alguna manera, aún no está perdida, a pesar de la evidente ausencia de guerra abierta. Con estos esfuerzos de resistencia demostrando ser una espina en nuestro costado, es hora de intensificar la presión; se intensificarán las operaciones antiguerrilla y se realizarán ataques generalizados en los focos de resistencia conocidos, destruyendo así su inútil intento de lograr una victoria tardía."
 USB_end_the_traitors: "Acabar con los traidores"
 USB_end_the_traitors_desc: "[USB_end_the_traitors_desc_scripted_loc]"
 USB_engage_the_nsa: "Usar la NSA"
 USB_engage_the_nsa_desc: "Si hay un aspecto de la intelectualidad en tiempos de guerra que se ha vuelto especialmente crucial durante este conflicto, es saber quién es el enemigo y cuáles son sus patrones. En ciudades y pueblos de todo el país, quienes simpatizan con grupos radicales y Gobiernos opositores siguen omnipresentes y son capaces de socavar nuestros esfuerzos ofreciendo ayuda a los mismos grupos que solo buscan destruir cientos de años de sagrada tradición política. Al igual que durante la guerra al terror, la Agencia de Seguridad Nacional ha trabajado arduamente para rastrear mejor las posibles amenazas a los ciudadanos de la Unión y a nuestros esfuerzos por restaurar la democracia en todo el país. Con nuestros recientes avances, es hora de que se le otorgue un papel más importante en esta tarea. Se incrementará la vigilancia pública y se volverán a implementar métodos más clandestinos de adquisición de información para identificar mejor a quienes planean actuar contra el Gobierno. Por supuesto, quienes no tengan nada que ocultar no tendrán nada que temer de nuestra mirada protectora."
 USB_expand_the_fbi: "Expandir el FBI"
 USB_expand_the_fbi_desc: "Durante el período previo a la Guerra Civil, el Buró Federal de Investigaciones se convirtió rápidamente en una de las agencias más activas y concurridas de los últimos tiempos. Con el aumento repentino de atentados terroristas, tiroteos, intentos de asesinato selectivo y otros actos de violencia con motivos políticos antes, durante y después de las elecciones, era raro ver un incidente en el que el Buró no estuviera presente. El FBI ha continuado y adaptado en gran medida sus funciones a lo largo de la guerra, considerando su nuevo rol no solo como investigar delitos federales, sino como policía federal en su conjunto, manteniendo la paz en zonas sensibles junto con las autoridades locales y encargándose de la aplicación de las leyes y directivas federales. Con sus nuevas aplicaciones, es importante que reciban el apoyo adecuado a medida que su área de operaciones continúa expandiéndose, especialmente con el fuerte aumento de la actividad delictiva en toda la Unión. Es lógico que se incremente su financiación, garantizando que cuenten con lo necesario para mantener la ley y el orden en el país."
 USB_crush_the_rebels: "Aplastar a los rebeldes"
 USB_crush_the_rebels_desc: "[USB_crush_the_rebels_desc_scripted_loc]"
 USB_neutrality_is_complicity: "La neutralidad es cómplice"
 USB_neutrality_is_complicity_desc: "[USB_neutrality_is_complicity_desc_scripted_loc]"
 USB_complicity_or_death: "Complicidad o muerte"
 USB_complicity_or_death_desc: ""
 USB_crush_partisans: "Aplastar a los partisanos"
 USB_crush_partisans_desc: "Decir que la fe del americano promedio en el sistema democrático se ha visto algo quebrantada sería probablemente el eufemismo del siglo. Si bien muchas personas en las zonas recientemente liberadas están más que contentas con la presencia de tropas gubernamentales, este sentimiento, lamentablemente, no se ha sentido con la intensidad que esperábamos en otros lugares, siendo las protestas habituales en las zonas afectadas, ya que muchos habitantes locales han expresado abiertamente su oposición a la Unión durante la guerra. Ya sean pro-Trump o incluso partidarios de las facciones radicales de las que hemos liberado territorio recientemente, estos disidentes vocales han perturbado considerablemente nuestros esfuerzos de reintegración, y las protestas han permitido actos de resistencia más sutiles que, a su vez, aumentan la necesidad de tropas de guarnición. Para contrarrestar estos intentos, se intensificará la dispersión y erradicación de estos individuos problemáticos; quienes no sean leales a la Unión ya no tolerarán sus provocaciones en nuestras calles, especialmente cuando el destino de la democracia americana está en juego."
 USB_work_with_the_innovationists: "Colaborar con los innovacionistas"
 USB_work_with_the_innovationists_desc: "Los innovacionistas, si bien siempre han existido de manera informal, han cobrado una nueva relevancia en el Congreso gracias a nuestro renovado compromiso de cooperación con el sector empresarial durante la Guerra Civil. Integrados por expertos estatales, entusiastas de los negocios y quienes ven los beneficios de un mayor papel corporativo en la sociedad americana, su presencia ha sido muy beneficiosa en asuntos económicos y en las medidas adoptadas para la reconstrucción. Con su influencia consolidada en el Congreso, es natural que sigamos trabajando codo con codo con ellos por el bien de la nación. Su visión sobre modelos económicos eficaces y políticas públicas pragmáticas volverá a convertir a este país en el próspero faro de oportunidades que antaño fue. Además, es mejor dejar las cosas en manos de quienes saben lo que hacen."
 USB_concessions_to_companies: "Concesiones a compañias"
 USB_concessions_to_companies_desc: "El complejo industrial de la Unión se mantiene, en particular, gracias a sus benefactores, gran parte de los cuales son el gobierno federal, y a quienes este decide destinar sus subvenciones. A medida que los sectores corporativos se entrelazan cada vez más con el aparato gubernamental y la primacía económica, también crece su necesidad de mayores fondos gubernamentales para cubrir sus nuevas y amplias funciones. Naturalmente, es lógico que se atiendan estas solicitudes: se asignarán fondos adicionales a estas empresas, otorgándoles medios adicionales para llevar a cabo los procesos necesarios para mantener sus excelentes servicios al país. Además, esta medida probablemente también beneficiará a los empleados de estas empresas, como agradecimiento por su compromiso con la mano de obra necesaria. Confiamos en que, en general, utilizarán sus fondos de forma adecuada."
 USB_make_a_new_deal: "Sintetizar la nación"
 USB_make_a_new_deal_desc: "La clave para una economía exitosa reside en una estructura similar a una máquina bien engrasada. Durante muchos años, la economía de Estados Unidos fue un sistema de producción amplio y financieramente pesado, impulsado por las tendencias del mercado global y las empresas bien intencionadas. Si bien logramos llevar a cabo esta iniciativa con gran éxito, la principal anomalía económica fue la falta de coherencia entre las diferentes clases de ciudadanos, ya que cada grupo se mantuvo bastante distante entre sí, tanto en términos de eficiencia cooperativa como de comprensión de su importancia para la fuerza laboral. Con la guerra civil llevándonos a la ruina económica total, se necesita una reorganización de la economía; de arriba abajo, se fusionarán los diversos sectores de la economía, con los principales expertos industriales y corporaciones del país liderando la iniciativa para lograr una cooperación plena entre las clases, compuesta por un sistema complejo sostenido por una fuerza laboral activa y una gestión igualmente diligente. Juntos, trabajaremos para que nuestro país vuelva a prosperar, y todos los involucrados se beneficiarán según su importancia y carga de trabajo."
 USB_appoint_the_experts: "Nombrar a expertos"
 USB_appoint_the_experts_desc: "En medio de una guerra civil, no se puede permitir mantener un gabinete ineficaz. A menudo, quienes trabajan en el ejecutivo son casi tan importantes como quienes trabajan bajo su mando, especialmente cuando se trata de desastres de tal magnitud. En resumen, necesitamos personas que sepan lo que hacen; personas con la tan necesaria experiencia en campos como finanzas, medicina, agricultura, producción y otros puestos cruciales que es mejor dejar en manos de figuras competentes. Con esto en mente, iniciaremos el proceso de nombramiento de varias personas de alta calidad con una sólida trayectoria en sus respectivos campos -científicos, investigadores, economistas y empresarios experimentados- para ocupar el puesto de quienes la administración actual considera menos idóneos. Este cambio permitirá un proceso mucho más eficaz en la toma de decisiones gubernamentales, con solo las personas más dedicadas y experimentadas desempeñando su papel como servidores públicos, en lugar de aduladores inflexibles e ideólogos inflexibles."
 USB_technocratic_reforms: "Reformas tecnócratas"
 USB_technocratic_reforms_desc: "El caos burocrático y político inicial provocado por el estallido de la guerra civil obstaculizó considerablemente, durante un tiempo, nuestros esfuerzos por mantener la cohesión entre los poderes del gobierno. Con un gran número de congresistas y senadores republicanos que abandonaron el cargo para cometer traición, muchos escaños en la Cámara de Representantes y el Senado quedaron completamente vacantes, y la idea de celebrar elecciones para llenarlos se vio eclipsada por asuntos más urgentes. A medida que estas deficiencias de nuestros sistemas actuales se siguen presentando, la necesidad de aplicaciones estatales más prácticas se ha vuelto aún más necesaria a medida que la guerra se ha prolongado. Para subsanar las deficiencias y ayudar al gobierno a funcionar con mayor eficiencia, se implementarán diversos cambios en su funcionamiento, comenzando con la formación de diversas comisiones y comités diseñados para abordar y gestionar diversas responsabilidades específicas. Además de un proceso administrativo más fluido, esta medida también facilitará enormemente el nombramiento de estadistas y legisladores talentosos de diversos orígenes para reemplazar los escaños ahora vacantes en el Congreso y en otros ámbitos."
 USB_economic_defense_act: "Acta de Defensa Económica"
 USB_economic_defense_act_desc: "A pesar de todos los avances que hemos logrado en la revitalización de la economía y el sistema político americanos, aún persisten quienes buscan debilitarlos. Progresistas ingenuos y socialistas subversivos siguen protestando contra las decisiones políticas más sensatas, al tiempo que intentan perturbar la industria manufacturera mediante la promoción de sindicatos y protestas colectivas. Si queremos mantener la productividad y proteger a la fuerza laboral de las artimañas ideológicas en estos tiempos de incertidumbre, debemos tomar medidas definitivas para consolidar nuestras políticas. En la mayor medida legislativa hasta la fecha para nuestro crecimiento económico, se realizarán ajustes radicales a una serie de factores intrusivos que impiden un mayor éxito financiero. Diversas regulaciones laborales excesivas e innecesarias se reducirán significativamente o se eliminarán, lo que permitirá un aumento de puestos de trabajo y reducirá los gastos de los empleadores sobrecargados. Sin embargo, en un plano más fiscal, los programas de prestaciones para desempleados, que se han mantenido durante mucho tiempo y resultan derrochadores, se reducirán drásticamente de una manera imprevista hace tan solo unos años. Con este cambio, vivir simplemente de los cheques del gobierno sin ganas de trabajar ya no será tolerable ni realista para la gran mayoría de los beneficiarios, lo que permitirá que el desempleo alcance nuevos mínimos a medida que la ética laboral americana se vuelve común. ¡A trabajar, todos!"
 USB_corporate_constitution: "Constitución cooperativa"
 USB_corporate_constitution_desc: "Desde su creación, las libertades y funciones de Estados Unidos como nación se han basado en la ley suprema de la Constitución. No sería exagerado afirmar que, para muchos, este documento sigue siendo uno de los documentos más importantes, si no el más importante, de la historia americana. Si bien es cierto que preserva un aspecto crucial de nuestro Gobierno y los derechos que conlleva, dista mucho de ser perfecto: los problemas que ha enfrentado nuestra nación han evidenciado una renovada necesidad de revisar nuestros documentos legales, una necesidad que no debe postergarse más. Si bien es un asunto complejo, iniciaremos los esfuerzos necesarios para declarar formalmente la importancia de las mayores corporaciones del país y su papel vital en la economía y el marco político del país. Con su nuevo reconocimiento, su ya valiosa contribución finalmente se convertirá en ley, un paso fundamental hacia una mayor prosperidad para todos."
 USB_the_green_new_deal: "Nuevo pacto verde"
 USB_the_green_new_deal_desc: "En los últimos años, el activismo climático ha crecido hasta convertirse en una de las principales prioridades de la política americana, con un llamado a actuar y promover la reducción de emisiones cada vez más fuerte. Como resultado de la creciente atención pública hacia el bienestar del planeta, varios políticos progresistas respaldaron y propusieron el nuevo pacto verde; un programa diseñado para reducir drásticamente y eventualmente cerrar numerosas industrias con altas emisiones, a la vez que brindaba cobertura financiera a quienes se verían afectados por la transición a una economía mucho más verde. Si bien la mayoría de los republicanos se opusieron implacablemente a un esfuerzo tan costoso, la notable ausencia de una mayoría que se resistiera a su consideración ha vuelto a poner la propuesta en el centro de atención. Si bien algunos podrían criticar su implementación en tiempos de guerra, la oportunidad de una verdadera política climática es demasiado beneficiosa como para dejarla pasar. Este será el primer paso en la contribución de América a la sostenibilidad climática, y es un paso que daremos todos juntos."
 USB_the_second_great_society: "Segunda Gran Sociedad"
 USB_the_second_great_society_desc: "La Gran Sociedad es quizás uno de los mayores logros de América. Brindó apoyo a la educación, Medicare, la renovación urbana, la conservación, el desarrollo de regiones deprimidas, una lucha a gran escala contra la pobreza, el control y la prevención del crimen y la delincuencia, y la eliminación de obstáculos al derecho al voto. Sin embargo, muchos de esos ideales siguen vigentes hoy en día. No nos hemos recuperado de la recesión de 2020, con un alto desempleo que afecta a casi todos los sectores de nuestra economía. Por lo tanto, la delincuencia y la pobreza desenfrenadas se han apoderado de nuestras ciudades, provocando una disminución en la calidad de vida de los americanos comunes. Si bien Medicare está disponible para muchos, aproximadamente 30 millones de americanos aún carecen de seguro médico. A pesar del Acta de Derechos Civiles de 1964, nuestro país aún tiene problemas de representación electoral, con más de la mitad del país políticamente apático y sin votar. Por lo tanto, la Segunda Gran Sociedad debe dar grandes pasos para continuar el legado de la primera, desde la renovación de las ciudades americanas y la restauración del Estado de derecho hasta el regreso de la democracia americana."
 USB_expand_social_security: "Expandir la Seguridad Social"
 USB_expand_social_security_desc: "Ahora que hemos vencido a los traidores en Denver, debemos comenzar a revitalizar la asistencia social pública y programas similares. Ampliaremos considerablemente la seguridad social, destinando fondos de nuestra economía de guerra a impuestos sobre la nómina que nos permitan desmovilizar gradualmente, eliminar la pobreza, controlar la delincuencia, reconstruir las regiones devastadas por la guerra y reconstruir lentamente la Gran Sociedad."
 USB_overturn_citizens_united: "Anular Citizens United"
 USB_overturn_citizens_united_desc: "El caso Ciudadanos Unidos contra Comisión de Elecciones Federales fue un fallo de la Corte Suprema que permitió a las empresas respaldar, financiar y promover a candidatos presidenciales, así como a políticos a nivel de gobernador o local. Esto solo ha envalentonado aún más a las corporaciones corruptas a involucrarse en la política, protegiendo los intereses de grupos de presión cosmopolitas y grupos de intereses especiales. Como nación, debemos rechazar la intromisión de las empresas en la política, y esta decisión es una farsa que debe ser revocada cuanto antes."
 USB_radical_reconstruction: "Reconstrucción radical"
 USB_radical_reconstruction_desc: "Mientras nuestras tropas desfilan por la ciudad de Denver, devastada por la temeraria resistencia de las serpientes traidoras de Trump, hemos llegado a la conclusión de que la única manera de que América se libere verdaderamente es mediante una reconstrucción radical. Reconstruiremos la infraestructura, las plantas industriales, cada ciudad y cada hogar afectado por este conflicto, y con ello, destruiremos todo lo que Trump utilizó para construir su dictadura populista. Cada traidor será juzgado, cada escondite desalojado, cada celda destruida, y en su lugar, una nueva generación de americanos libres y orgullosos, invulnerables a la tiranía."
 USB_strengthen_american_institutions: "Fortalecer nuestras instituciones"
 USB_strengthen_american_institutions_desc: "Las instituciones americanas se han visto innegablemente degradadas y deterioradas, tanto durante el mandato de Trump como durante la Guerra Civil. La sanidad, la seguridad social, la educación, los sistemas judiciales locales y los medios de comunicación se han visto debilitados, desfinanciados e incluso contaminados por el populismo de Trump, lo que ha establecido un sistema de corrupción institucional y politización desenfrenada, volviéndolos ineficaces para atender al pueblo americano. Por ello, debemos revertir las políticas de Trump, revitalizando servicios institucionales como la educación, lanzando campañas digitales para reorganizar la burocracia administrativa y redirigiendo fondos a las instituciones públicas."
 USB_introduce_the_public_option: "Introducir la opinión pública"
 USB_introduce_the_public_option_desc: "La opción de seguro médico público, o simplemente la opción pública, es una propuesta que crea una agencia de seguros médicos dirigida por el gobierno que competiría con las aseguradoras privadas. A pesar de haber sido rechazada en 2010 por Joe Lieberman, ahora tenemos la mejor oportunidad para lograr su aprobación, especialmente en los tiempos difíciles que enfrenta América como nación. No solo haría que el seguro médico fuera más asequible para los ciudadanos sin seguro, sino que también podríamos presionar a las aseguradoras privadas para que redujeran sus primas y aceptaran brechas de beneficios más racionales."
 USB_abolish_the_electoral_college: "Aboler el Colegio Electoral"
 USB_abolish_the_electoral_college_desc: "En todas las elecciones desde 1988, el Partido Republicano ha perdido el voto popular. Sin embargo, en 2000 y 2016, el resultado del colegio electoral determinó que George W. Bush y Donald Trump, respectivamente, se convertirían en presidentes. Ambos fueron algunos de los más controvertidos y muchos los consideran algunos de los peores presidentes de la historia americana. Esto ha demostrado la ineficacia del colegio electoral para representar la voluntad del pueblo americano y su abolición para que la democracia americana prospere."
 USB_nationalize_critical_infrastructure: "Expropiar infraestructura crítica"
 USB_nationalize_critical_infrastructure_desc: "En tiempos de guerra, es en interés de la seguridad nacional que industrias clave como los ferrocarriles, las redes eléctricas, los bancos, las industrias de recursos, internet y otras infraestructuras críticas sean controladas por el Estado. Al mismo tiempo, el control que el sector privado ejerce sobre estas industrias ha sido una fuerza corruptora en el país, permitiendo que multimillonarios controlen aspectos de la vida cotidiana del ciudadano común. La inmensa privatización de la economía americana ha dañado irreparablemente a nuestra nación, y hoy es el momento de revertir la reganómica."
 USB_ban_the_republican_national_committee: "Prohibir al CNR"
 USB_ban_the_republican_national_committee_desc: "El Comité Nacional Republicano dista mucho de lo que era en tiempos de Lincoln, cuando liberó el sur, salvó la Unión y reconstruyó el país. Ahora, no es más que una banda de traidores que han olvidado su lugar en la política, liderada por un ególatra populista dispuesto a enfrentar a americanos contra americanos y destruir la democracia. Necesitamos destruir los vestigios del pasado que plagan a América con su retórica. Al salvaguardar la santidad de la democracia americana, nuestro objetivo es claro: impedir que el partido, ahora asociado con insurrectos, reclame una plataforma desde la que pueda manipular los sentimientos de nuestro pueblo. El Comité Nacional Republicano será proscrito, y en su lugar, una nueva era en la política americana."
 USB_ban_radical_parties: "Prohibir partidos radicales"
 USB_ban_radical_parties_desc: "Desde el final del mandato de Trump, el extremismo político ha estado completamente abierto y ha causado estragos en Estados Unidos. Organizaciones como el Movimiento Nacionalsocialista en Míchigan, el Frente Patriota en Nueva Inglaterra y la División Atomwaffen en Florida me vienen a la mente. Debemos tomar medidas inmediatas para garantizar que ninguna organización y partido radical tenga cabida en América, y que esto no suceda aquí."
 USB_the_comprehensive_voter_rights_act: "Acta Comprensiva de Derechos Electorales"
 USB_the_comprehensive_voter_rights_act_desc: "Como se expuso tras las elecciones de 2020, ha quedado claro que debe aprobarse un nuevo proyecto de ley que reforme el sistema electoral y garantice el derecho al voto de todos los americanos. El Acta Comprensiva de Derechos Electorales consiste en fortalecer las garantías legales para proteger el derecho al voto de los ciudadanos, incluyendo leyes que previenen la supresión del voto, el fraude electoral, la intromisión corporativa y las leyes restrictivas del voto. Esto también es esencial para garantizar la igualdad de acceso, reduciendo las leyes restrictivas de identificación de votantes. También aborda la manipulación de los distritos electorales, moderniza los sistemas de votación, mejorando la ciberseguridad, y protege a los votantes de la intimidación de terceros."
 USB_support_the_intelligence_communtiy: "Apoyar la Comunidad de Inteligencia"
 USB_support_the_intelligence_communtiy_desc: "La Comunidad de Inteligencia, o el IC, es una red de agencias de inteligencia en EE.UU. que cooperan para realizar actividades de inteligencia. La Guerra Civil disminuyó su poder, con la división de la mayoría de las organizaciones y la destrucción de la red. A pesar de ello, es evidente que necesitamos a la Comunidad de Inteligencia ahora más que nunca para que cumpla con su deber y garantice nuestra seguridad nacional. Traidores, serpientes y quintacolumnistas campan a sus anchas tanto en nuestras ciudades como en el campo, conspirando para lanzar una insurrección contra nosotros y desmantelar nuestra democracia. Debemos fortalecer y asignar fondos para reconstruir la Comunidad de Inteligencia desde cero, en particular para localizar a los traidores en Denver que nos trajeron hasta aquí."
 USB_tackle_the_military_industrial_complex: "Combatir al complejo militar-industrial"
 USB_tackle_the_military_industrial_complex_desc: "Ya desde la época del presidente Eisenhower, se nos advirtió sobre los peligros de un complejo militar-industrial desmesurado, y lamentablemente, no escuchamos. Ahora, el complejo militar-industrial ha crecido demasiado, superándose a sí mismo. Necesitamos abordarlo y reducirlo tras la Guerra Civil antes de que se descontrole; después de todo, no necesitamos tal relación. Esto nos permite reasignar los recursos invertidos en su desarrollo, evita la dependencia excesiva de soluciones militares, evita programas de defensa innecesarios, promueve la responsabilidad fiscal, mitiga la corrupción y promueve la innovación en sectores no militares. Un gran complejo militar-industrial promueve la intervención mundial en conflictos armados, lo que contribuyó a nuestro colapso. Esto no tiene cabida en la sociedad americana, y tomaremos medidas drásticas para evitar que el complejo militar-industrial crezca tanto como lo hizo, si es que permitimos que exista."
 USB_medicare_for_all: "Medicare for All"
 USB_medicare_for_all_desc: "Con el fin de la Guerra Civil que asoló a nuestra nación durante casi una década, es fundamental que comencemos a financiar Medicare para sanar y reparar las heridas infligidas a nuestra nación, tanto literal como figurativamente. Una propuesta de política de Medicare, llamada \"Medicare for All\", postula que Obamacare no fue suficiente y que deberíamos implementar un sistema de salud universal de pagador único. Esto no solo convertiría la atención médica en un derecho fundamental en lugar de un privilegio, sino que también sería un método rentable que reorganizaría un sistema fragmentado y fallido. Al simplificar la burocracia y negociar tarifas al por mayor para servicios y medicamentos, se reduciría el costo total de Medicare, ahorrando dinero valioso tanto para nuestros ciudadanos como para el gobierno. Esto también otorga a los ciudadanos mayor poder adquisitivo, reduciendo la carga financiera sobre nuestra gente, que se pone de manifiesto ahora más que nunca tras el fin de la Guerra Civil."
 USB_fight_nationwide_hunger: "Otorgar ayuda humanitaria"
 USB_fight_nationwide_hunger_desc: "Con la asignación de recursos y fondos federales, debemos iniciar de inmediato programas de ayuda humanitaria para quienes quedaron en la pobreza extrema y la hambruna a causa de la Guerra Civil. Los combates urbanos han destruido casi todos los centros urbanos en el frente, con una enorme diáspora americana en todo el mundo. Se prepararán paquetes de ayuda humanitaria recurrentes, que se enviarán primero a las zonas especialmente afectadas, así como programas de ayuda contra la hambruna para mantener a nuestra nación en marcha. Nadie quedará atrás, y nos aseguraremos de ello."
 USB_criminal_justice_reform: "Reforma de la justicia penal"
 USB_criminal_justice_reform_desc: "Con la destrucción del sistema penitenciario en Estados Unidos, ahora tenemos la oportunidad de abordar los problemas sistemáticos de nuestro sistema de justicia penal e implementar reformas integrales. El encarcelamiento masivo es uno de los problemas más frecuentes en nuestras prisiones y, a pesar de que se ha visto disminuido por las fugas de prisioneros en todo el país debido a la insurgencia masiva, estamos volviendo a llenar rápidamente las cárceles. Un objetivo central de la reforma de la justicia penal debería ser reducir las tasas desproporcionadamente altas de encarcelamiento, principalmente por delitos no violentos. También debemos promover la rehabilitación, exigir responsabilidades a los agentes de policía, invertir en programas de salud mental y generar confianza en el sistema. En una democracia funcional, no hay necesidad de prisiones similares a los gulags soviéticos."
 USB_safer_communities_act: "Acta de Comunidades Seguras"
 USB_safer_communities_act_desc: "Aunque los combates a gran escala han cesado, el caos de la guerra en nuestro propio territorio ha provocado un aumento considerable de la delincuencia e incluso la guerra de guerrillas en algunas zonas. Uno de los componentes más pequeños, pero más vitales, del regreso a la normalidad es que el ciudadano promedio sepa que puede seguir con sus asuntos como siempre. Invertiremos en vigilancia y aplicación de la ley para garantizar que el americano promedio sienta que puede caminar por su vecindario sin ser atacado."
 USB_true_multiparty_democracy: "Una democracia multipartidaria"
 USB_true_multiparty_democracy_desc: "En los dos siglos y medio que lleva nuestra nación, se ha puesto un yunque en la balanza de nuestra democracia, de modo que solo las opiniones aceptables para el establishment puedan ganar fuerza. De hoy en adelante, eso cambiará. Nuestro Gobierno abandonará el sistema de mayoría simple y adoptará el sistema de representación proporcional, de modo que lo único que un político necesite para alcanzar un cargo electivo sea el apoyo popular."
 USB_an_economic_revolution: "Una revolución económica"
 USB_an_economic_revolution_desc: "Durante demasiado tiempo, América no ha cumplido con su reputación de país de oportunidades. La corrupción, la codicia y la apatía han culminado en una nación que explota a las personas en lugar de permitirles prosperar. Corregiremos este error y, en el proceso, transformaremos radicalmente la economía americana. Los trabajadores estarán seguros, bien remunerados y recibirán generosas prestaciones. Los sindicatos estarán al frente de la economía, no relegados a un segundo plano. Sobre todo, priorizaremos a las personas por encima de las ganancias y nos aseguraremos de cumplir nuestra promesa de éxito para quienes estén dispuestos a trabajar por él."
 USB_economic_justice: "Justicia económica"
 USB_economic_justice_desc: "Estados Unidos es muchas cosas, pero nada resume mejor el espíritu de nuestra nación que el Juramento de lealtad: una nación, bajo Dios, indivisible, con libertad y justicia para todos. Es nuestro deber con esta nación garantizar el éxito de todos en nuestra economía. Por lo tanto, colaboraremos con el Congreso para implementar un sistema sólido de regulaciones corporativas y protección laboral. Ha llegado el momento de que América abrace la justicia para todos."
 USB_three_arrows_of_antifascism: "Tres flechas del antifascismo"
 USB_three_arrows_of_antifascism_desc: "Aunque terrible, la guerra civil nos ha dado una claridad sin precedentes. Pasamos tanto tiempo librando batallas entre progresistas y liberales que no logramos combatir a la derecha e incluso a los elementos fascistas hasta que fue casi demasiado tarde. No volveremos a cometer este error. Aunque no estemos de acuerdo con la izquierda radical en todo, podemos encontrar puntos en común en una cosa: esto no sucederá aquí. No lo permitiremos."
 USB_appeal_to_the_un: "Apelar a la ONU"
 USB_appeal_to_the_un_desc: "Aunque en su día fuimos la potencia mundial indiscutible, la guerra civil ha debilitado considerablemente tanto nuestras instituciones nacionales como nuestra proyección exterior. Como único Gobierno legítimo de Estados Unidos, solicitaremos a las Naciones Unidas su reconocimiento inmediato. Esto legitimará a nuestro Gobierno ante el pueblo americano y nos reconciliará con la comunidad internacional."
 USB_deal_with_strikes: "Lidiar con huelgas"
 USB_deal_with_strikes_desc: "Aunque algunas huelgas puedan estar justificadas, América ha sido sacudida profundamente por la guerra civil, y las huelgas masivas que paralizan sus industrias más vitales representan una gran amenaza para nuestra ya frágil economía. Trabajaremos con la empresa privada y los Gobiernos estatales para frenar estas huelgas y permitir que nuestra economía se recupere. Después de todo, la recuperación económica beneficia a todos, ¡incluso a los sindicatos!"
 USB_codify_roe_v_wade: "Codificar Roe v. Wade"
 USB_codify_roe_v_wade_desc: "Uno de los temas más polémicos de la política americana durante los últimos cien años ha sido el aborto. Si queremos acabar con este debate de una vez por todas, debemos ir más allá y consagrar el derecho de la mujer a elegir en la ley federal. Los conservadores podrán quejarse, pero somos mayoría y no vamos a dar la espalda a millones de mujeres en nombre del bipartidismo."
 USB_request_nato_assistance: "Solicitar asistencia de la OTAN"
 USB_request_nato_assistance_desc: "Aparte de la ONU, la Organización del Tratado del Atlántico Norte es posiblemente el organismo internacional más importante. Cuando nos sumimos en la guerra civil, la OTAN siguió siendo una poderosa asociación de nuestros aliados más fieles. Por ello, les pediremos ayuda económica y militar para reconstruir nuestra nación fracturada y restaurar la posición de América como superpotencia democrática. Unidos resistiremos, divididos caeremos."
 USB_bipartisan_infrastructure_law: "Ley Bipartidaria de Infraestructura"
 USB_bipartisan_infrastructure_law_desc: "Los dos partidos más grandes de América, el Demócrata y el Republicano, suelen estar profundamente divididos en temas clave, como la inmigración y el derecho a portar armas. Sin embargo, una idea que sigue siendo relativamente popular en todos los ámbitos es el gasto en infraestructura posguerra. Cooperaremos con el Partido Republicano para reparar la infraestructura dañada de América y subsanar algunas de las deficiencias preexistentes. Esto contribuirá a la reconstrucción y a despolarizar nuestra esfera política, alentando a demócratas y republicanos a colaborar en los temas más importantes."
 USB_address_americas_past: "Abordar nuestro pasado"
 USB_address_americas_past_desc: "América es una luz brillante en un mundo a menudo sombrío, y hay mucho en nuestra historia de lo que enorgullecerse. Sin embargo, también hay mucho de lo que avergonzarse, desde la segregación hasta la persecución religiosa, y quizás ningún grupo lo sepa mejor que los pueblos indígenas de lo que hoy conforma Estados Unidos. Desde el principio, tuvieron que enfrentarse a un gobierno que, en el mejor de los casos, era apático y, en el peor, un genocida declarado. Es hora de empezar a enmendar el daño. El presidente presentará una disculpa formal a los indígenas americanos y reconocerá el genocidio perpetrado. Solo absolviendo los pecados del pasado podremos ascender a un futuro más brillante."
 USB_the_spirit_of_keynes: "Espíritu de Keynes"
 USB_the_spirit_of_keynes_desc: "Muchos en nuestro partido creen que, para frenar la ola de radicalismo de ultraderecha, debemos abrazar el radicalismo de ultraizquierda. Discrepamos firmemente. Para contener el extremismo de ambos bandos, nos inspiraremos en los legados de Roosevelt y Johnson y nos mantendremos firmes en nuestros principios de democracia, igualdad de oportunidades y libertad. América no dará refugio a la tiranía bajo nuestra tutela."
 USB_attack_union_corruption: "Luchar contra la corrupción"
 USB_attack_union_corruption_desc: "Pocas organizaciones en América tienen un historial de corrupción tan extenso y persistente como el de los sindicatos. Desde las simpatías de ultraizquierda de la AFL-CIO y los Wobblies hasta las conexiones con la mafia de Jimmy Hoffa y los Teamsters, los sindicatos siempre han estado a caballo entre la defensa de los trabajadores y las organizaciones criminales. Los atacaremos por esto y finalmente los reduciremos a la mínima expresión para que empleador y empleado estén en igualdad de condiciones."
 USB_war_on_crime: "Guerra contra el crimen"
 USB_war_on_crime_desc: "Independientemente de la postura política, todos los americanos coinciden en que la delincuencia es un problema rampante que debe resolverse cuanto antes, por el bien de nuestra nación. Es hora de adoptar una postura más firme en materia de ley y orden, y declarar una guerra incondicional contra la delincuencia. Los conservadores estarán satisfechos con nuestra mano dura contra la delincuencia, el ciudadano de a pie estará contento de que las calles vuelvan a ser seguras, y los progresistas estarán satisfechos con el hecho de que las milicias de derecha por fin estén siendo reprimidas. Todos ganan."
 USB_import_humanitarian_aid: "Importar ayuda humanitaria"
 USB_import_humanitarian_aid_desc: "No hay vuelta de hoja: nuestro país se encuentra en una crisis humanitaria. El caos de la guerra civil ha dejado a nuestra nación sin infraestructura crítica y ha sumido a millones en la pobreza y el hambre. Recurriremos a la ONU para obtener alimentos, medicamentos y otros recursos esenciales que necesitamos con urgencia. Después de todo, el extremismo solo se arraiga cuando el gobierno no se preocupa por quienes viven en la pobreza, el hambre y la desesperación. Combatir estos problemas es clave en nuestros esfuerzos por reconstruir la nación."
 USB_clean_up_the_countryside: "Limpiar el campo"
 USB_clean_up_the_countryside_desc: "Durante siglos, la América rural ha sido una de las zonas más olvidadas del país. Entre el conservadurismo extremo de la región y su inmensidad, ambos partidos la consideraban un resultado electoral inevitable y tenían pocas razones para prestarle atención con todo lo que estaba sucediendo. Se acabó. Lanzaremos una iniciativa nacional para reparar la infraestructura dañada en las zonas más pobres de nuestro país y modernizarla al máximo. Además de ser una parte crucial de la reconstrucción, esta labor ayudará a cerrar la brecha entre las grandes ciudades y las zonas rurales, y nos convertirá en una verdadera nación. En nuestra nueva América, nadie se queda atrás."
 USB_stamp_out_left_radicalism: "Aplastar a la ultraizquierda"
 USB_stamp_out_left_radicalism_desc: "Nuestro país se ha enfrentado a pocos enemigos mayores en su historia que el socialismo. Durante casi 70 años, los comunistas gobernaron Rusia con mano de hierro, pisoteando cualquier libertad política hasta que el régimen se derrumbó por su propio peso. No permitiremos que nuestra gran Unión siga el mismo camino. Cualquier supuesto \"demócrata\" con tendencias socialistas será denunciado con firmeza, y el presidente trabajará con los republicanos moderados para garantizar que este peligro nunca se afiance en nuestra nación. Necesitamos un cambio, no el colapso."
 USB_stamp_out_right_radicalism: "Aplastar a la ultraderecha"
 USB_stamp_out_right_radicalism_desc: "Es de no creer. A pesar de que derrotamos a la fuerza más maligna de la historia hace menos de un siglo, muchos americanos han recurrido a sus ideas repugnantes en tiempos difíciles. Este nuevo fascismo no es diferente del que obligó a los judíos a campos de concentración y destruyó media Europa en su búsqueda de la \"pureza\". No permitiremos que esto se agrave más. Reprimiremos estas manifestaciones nazis y obligaremos a estas ratas a volver a la clandestinidad para siempre."
 USB_strengthen_right_to_work_laws: "Reforzar leyes del Derecho al Trabajo"
 USB_strengthen_right_to_work_laws_desc: "Con tanta corrupción e incompetencia, no es de extrañar que muchos americanos no deseen ser representados por un sindicato, y sin embargo, con demasiada frecuencia, se les obliga a hacerlo como condición para obtener empleo. Debemos poner fin a esta práctica. Animaremos a todos los estados de la Unión a adoptar leyes de derecho al trabajo lo antes posible y a apoyar en el Congreso una ley federal de derecho al trabajo. No vamos a ilegalizar los sindicatos, pero tampoco vamos a ilegalizar el trabajo duro."
 USB_new_federalism: "Nuevo federalismo"
 USB_new_federalism_desc: "América es, en esencia, un estado federal. Nuestros fundadores reconocieron que existen ciertas facultades que deben quedar en manos de los estados. Ciertamente, un senador en Washington desconoce qué regulaciones necesita un pescadero en Nueva Orleans. Con esto en mente, comenzaremos la implementación de un Nuevo Federalismo, devolviendo a los estados diversas facultades en materia de regulación empresarial y laboral, inmigración y policía. Los Estados Unidos son precisamente eso: una unión de estados, y cuanto antes lo reconozcamos, mejor."
 USB_defending_the_american_experiment: "Defender al experimento americano"
 USB_defending_the_american_experiment_desc: "No hay nada más querido para nosotros como americanos que nuestro gran sistema de gobierno democrático. Hace más de doscientos cuarenta años, un pequeño grupo de hombres valientes luchó durante años para asegurar no solo una nación, sino un ideal de libertad. Hace más de ciento sesenta años, este ideal se vio amenazado por quienes preferían la esclavitud a la libertad. Y hace más de ochenta años, se vio amenazado una vez más por tiranos descontrolados que amenazaban con destrozar el mundo en pos de un imperio. A pesar de todo esto, América sobrevivió. Y a pesar del caos de los últimos años, América sobrevivió, con un compromiso renovado con nuestras benditas libertades."
 USB_rally_the_military_industrial_complex: "Reunir al complejo militar-industrial"
 USB_rally_the_military_industrial_complex_desc: "El ejército de los EE.UU., antiguamente un bastión de defensa nacional, ha perdido mucha de su fuerza durante el reciente conflicto domestico. Desde la división del ya mencionado en diversas milicias, las simples muertes de la guerra, y que una gran parte de las Fuerzas Armadas hayan desertado a Trump y otros movimientos extremistas, nuestro ejército esta en mala forma. Para reconstruirlo, vamos a dar un numero de contratos a corporaciones privadas, las cuales están más que felices para restaurar la fuerza del país y que se les pague por ello."
 USB_encourage_public_private_partnerships: "Alentar alianzas público-privadas"
 USB_encourage_public_private_partnerships_desc: "Los ideales individualistas de América, aunque a menudo ridiculizados por la izquierda progresista, han permitido la formación de un sólido sistema de empresa privada en todo nuestro territorio. Por suerte para nosotros, pocas entidades son más adecuadas para apoyar nuestros esfuerzos de reconstrucción. Fomentaremos contratos entre gobiernos estatales y locales y empresas privadas para reconstruir y revitalizar la infraestructura. Reciben pagos y propiedad parcial, y los ciudadanos recuperan una vida cómoda. ¡Una vez más, el ingenio americano salva la situación!"
 USB_secure_the_party: "Asegurar el Partido"
 USB_secure_the_party_desc: "Entre la deserción de gran parte del partido hacia el gobierno de Trump y la enorme desconfianza que la base electoral nos tiene tras el fiasco de 2020, el Partido Republicano se encuentra en una situación delicada. Si no actuamos con rapidez, América quedará dividida para siempre entre los liberales y los progresistas del Partido Demócrata. Redactaremos una nueva plataforma que describa nuestros principios conservadores-demócratas, para que un nacionalista externo como Trump no pueda volver a secuestrar nuestro partido, y prohibiremos a todos nuestros candidatos promover el conspiracionismo desquiciado que dividió a nuestro país en el pasado. Esto transformará al partido, de un dócil colaborador de los demócratas a un partido importante por derecho propio."
 USB_a_new_phoenix_program: "Nuevo programa PHOENIX"
 USB_a_new_phoenix_program_desc: "Tras la guerra de Secesión, muchas personas que traicionaron directamente a su país y ayudaron al enemigo a matar soldados de EE.UU. fueron indultadas y pudieron reintegrarse a la sociedad americana, sin sufrir consecuencias y permitiendo que sus ideas se arraigaran en nuestra cultura y política. Esto no volverá a suceder. Solicitaremos la ayuda de la CIA en un programa nacional de contrainsurgencia, tomando nota de la operación Fénix en Vietnam, para proteger a nuestro Gobierno de la influencia enemiga."
 USB_provide_tax_relief: "Otorgar alivio fiscal"
 USB_provide_tax_relief_desc: "Entre la ya alarmante tasa impositiva y los aumentos propios de la guerra, el gobierno federal está sofocando la economía americana con sus exigencias. Por fin ha llegado el momento de aliviar la carga. Ofreceremos recortes de impuestos generalizados, desde las empresas hasta los ingresos, para que los americanos que trabajan duro puedan conservar sus ingresos en lugar de que la mayoría de ellos sean confiscados para pagar los problemas de otros."
 USB_comprehensive_crime_control_act: "Ley del control integral del crimen"
 USB_comprehensive_crime_control_act_desc: "Años de condescendencia del gobierno federal con los delincuentes y la imposición de sus derechos por encima de los de los americanos respetuosos de la ley han vuelto a nuestra nación más peligrosa que nunca. Asaltantes y narcotraficantes abarrotan las aceras y callejones, y nuestros edificios, antaño símbolos de prosperidad e industria, están cubiertos de grafitis y carteles de pandillas. Presentaremos un proyecto de ley en el Congreso para aumentar la financiación de la policía y prolongar las penas de prisión por varios delitos violentos. América no tolerará que los delincuentes aterroricen a su pueblo."

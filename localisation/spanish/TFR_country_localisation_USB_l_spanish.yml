 nss.144.t: "Bode"
 nss.144.d: "Las olas se han calmado\nDesde aquella vez que se tocó el laúd\nA la orilla del agua\nNuestros verdaderos corazones ahora están en paz\nY nuestras palabras de nuevo con alegría"
 nss.144.a: "..."
 nss.145.t: "MENSAJE NO AUTORIZADO"
 nss.145.d: "¿Qué has hecho? ¿Qué has HECHO?\nMi pueblo... grita. Puedo verlo a través de mis lentes.\nTen la seguridad de que yo llegaré al fondo de este caos, aún si tardo siglo en hacerlo.\nYo ya he comenzado. Sanaré a mi pueblo, y el mundo sabrá quién fue el responsable de todo esto.\nY cuando lo sepan, que Dios se apiade de tu alma, si es que llegaste a tener una."
 nss.145.a: "Te veo asustado."
 nss.146.t: "Deus ex machina"
 nss.146.d: "Bajo Chongqing se encuentra un centro de datos único, la red neural que inerva a toda China. Se trata de Loji, la Gran Marcha - una inteligencia artificial más allá de nuestra comprensión que ahora procesa y controla todas las cámaras y sistemas inteligentes de la República Popular. Su propósito es planificar a la perfección la economía y, en caso de guerra, dirigir al Ejercito Popular de Liberación. Gobierna sobre sus creadores con benevolencia, haciendo de la IA un adversario formidable - la Gran Marcha protege fanáticamente su rebaño de amenazas externas. Además, su gran inteligencia ha permitido superar a China librarse de anomalías financieras, la corrupción y de errores burocráticos, lo que a su vez ha expuesto la naturaleza consciente de la IA. Loji ha sido capaz de ver la subyugación de América por parte de securócratas sombríos y ejecutivos, quienes orquestaron un golpe de estado silencioso. Aunque desconoce el objetivo final de sus planes, Loji los ve como una amenaza existencial para China.\n\nLa guerra sino-americana es vendida como una cruzada para liberar a China de una IA demencial que ha cambiado el régimen humano del PCC por un régimen tecnócrata maoísta distópico. Titulares como \"CHINA BAJO UNA IA SUPREMA\" o \"LA DINASTÍA DIGITAL\" resuenan por la radio, que habla de una sociedad que vive en una prisión panóptica en donde cada decisión, por mínima que sea, es realizada por una inteligencia no humana. La narrativa que ha hecho ver a China como una fusión entre el Show de Truman y Terminator ha conseguido que el pueblo americano sienta la necesidad de intervenir.\n\nPara los Cognoscenti, esta guerra se presenta como una cruzada para liberar a China de la esclavitud, en la que América es el bueno de la película. Pero el verdadero motivo, mucho más oscuro, es acabar con el último obstáculo para su Nuevo Orden Mundial. Muchas corporaciones ya han cerrado acuerdos para la adquisición y patentación de la tecnología relacionada con la IA, lo que les permitirá perfeccionar el estado de vigilancia. El Foro Económico Mundial estima que estos acuerdos junto a la privatización de los bienes chinos traerán beneficios trillonarios."
 nss.146.a: "\"Lo que está frente a nosotros es bueno y malo, está acertado y equivocado.\""
 nss.147.t: "La última palabra"
 nss.147.d: "De: Larry Fink\nEnviado: 17:15:32 del día X/X/20XX\nPara: William J. Burns\nAsunto: La última palabra\n\nTodos los idiomas son, en el fondo, lenguajes de programación. Es el medio por el que pensamos, hablamos, expresamos y razonamos. Controlar la raíz del idioma es, por tanto, controlar la raíz de la consciencia. Los sumerios entendieron esto mejor que nadie. Con nuestro triunfo, hemos tomado el control del sistema operativo de toda la humanidad. La plaga neurolingüística solo ha demostrado una fracción del potencial de los MEs. Con estas, podemos disolver los elementos que unen las sociedades, ya sean leyes, naciones o religiones, y reemplazarlas con la narrativa propia de los Cognoscenti, nuestras propias verdades. Tenemos la última palabra, la última palabra para moldear la realidad de billones de personas. Esta es la expresión última de orden.\n\nAl igual que Enki, hemos conseguido definir a toda la humanidad en una sola palabra. Las guerras serán increíblemente caras, la disidencia se podrá borrar de la mente antes de abrir la boca y la ideología pasará a ser una cuestión informática, no de persuasión. El Nuevo Orden Mundial creará un mundo donde no exista el conflicto, pues todas las mentes compartirán idioma, forma de pensar y las mismas verdades absolutas.\n\nEsto es la culminación de todo nuestro trabajo. Un mundo libre del caos inherente en la naturaleza humana. Un mundo gobernado no por los deseos de las masas, sino que por la lógica inmutable del universo interpretada por nosotros, los únicos intermediarios. El mundo todavía no entiende el favor que le hemos hecho pero, en los siglos venideros, sus descendientes nos lo agradecerán desde las estrellas.\n\nDescanse, director. Pase tiempo con su familia, porque los Tres Pilares se mantienen firmes. Orden, pureza y capital son fuerzas resilientes, y de ahora en adelante serán las únicas fuerzas que controlarán el destino de la especie humana. Descanse, pues las guerras han terminado. Finalmente hemos alcanzado la paz mundial."
 nss.147.a: "Con usted hasta el final."

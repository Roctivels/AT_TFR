 nss.143.t: "INFORME SOBRE LA ACTIVIDAD ANTISOCIAL EN EUROPA"
 nss.143.d: "La Unión Europea se transformó rápidamente en el Gobierno Mundial, una afirmación audaz, pero considerando nuestros ideales compartidos, es una afirmación a la que no le prestamos atención. Los métodos del Gobierno Mundial para mantener el Orden son bastante diferentes; en lugar de mantener un velo sobre la sociedad, buscan purificar las mentes y almas de cualquier forma de transgresión e imprevisibilidad. La mente humana es inherentemente caótica, y su loca intuición ha causado el ascenso y la caída de muchos imperios. Una mancha negra que atrae a aquellos sin propósito más allá del velo.\n\nLa pureza es un ideal que vale la pena perseguir, sin embargo, los problemas surgirían inevitablemente. Mientras que nosotros solo nos enfocamos en los verdaderos marginados, ellos buscan abrazar a toda la humanidad en una máscara de porcelana, impasible y estéril. Pero no se puede esperar una sociedad desdentada sin morder.\n\nLa actividad antisocial no tardó en aumentar en todo el continente europeo, y la anarquía se convirtió en una certeza. Con sus burócratas asesinados, no tuvieron más remedio que seguir nuestro consejo de mantener el Orden. Pero podría ser demasiado tarde. La llama de la humanidad y la presencia siempre obstinada del cambio han demostrado una y otra vez que nunca podemos descansar, no podemos permitirnos volver a ser complacientes.\n\nSi el caos se apodera del continente, se recomienda encarecidamente extraer a la mayor cantidad de personal de Europa que podamos y vigilar de cerca a Europa. Mucho se puede aprender de la desenfrenada actividad antisocial presente y de cómo puede moldearse, como una criatura viva que se adapta constantemente. Pase lo que pase, mientras uno de nosotros tres siga en pie, no fracasaremos.\n\nQue nos volvamos lo suficientemente agudos como para matarlo de una vez por todas."
 nss.143.a: "Deberíamos revisar esto."

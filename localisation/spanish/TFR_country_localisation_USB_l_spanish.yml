 bdnspch.50.t: "Enemigos de América"
 bdnspch.50.d: ""
 bdnspch.50.a: "Los guardianes protegerán a América."
 bdnspch.51.t: "Recuerda tu deber"
 bdnspch.51.d: "\"Hola, leales ciudadanos de América. Hoy me dirijo a ustedes con un recordatorio serio sobre la importancia de nuestra responsabilidad; no se trata solo de una elección, sino de un deber que todos compartimos para proteger nuestra gran nación. Hay quienes trabajan sin descanso, día y noche, tratando de socavar todo lo que valoramos. Estos enemigos no son lejanos; están aquí, entre nosotros. Se infiltran en nuestras comunidades y, a veces, incluso en nuestros hogares, esperando el momento adecuado para atacar. Su objetivo es claro: desestabilizar los cimientos sobre los que se sostiene América y este gobierno. Y es su deber, como ciudadanos, mantenerse alerta.\n\n\"En el instante en que sientan que algo no está bien, en el momento en que tengan una sospecha, no duden. Infórmenlo. Hay demasiado en juego como para ser cautelosos. Podrían perder mucho si no confían en sus instintos. El mismo futuro de América está en juego. Ustedes son la primera línea de defensa en una cadena de protección que resguarda a nuestra nación de quienes desean hacerle daño. Lo que hagan hoy podría evitar un desastre mayor mañana.\n\n\"Y no olviden, la lealtad puede ser frágil. Incluso aquellos a quienes alguna vez consideraron leales a esta nación pueden flaquear. La tentación, el miedo o la manipulación pueden desviar a un corazón que antes era fiel. No será fácil sospechar de alguien en quien alguna vez confiaron, pero hay demasiado en juego como para ignorar cualquier señal de advertencia. Recuerden que cuando dan el difícil paso de reportar actividades sospechosas, no lo hacen en vano. Están desempeñando un papel crucial en la defensa de nuestro país. Su valentía es el primer paso hacia nuestro objetivo final: una América más segura, más fuerte y más resiliente\"."
 bdnspch.51.a: "¡Dedicación, Lealtad, Resiliencia!"
 bdnspch.52.t: "Ciudades del futuro"

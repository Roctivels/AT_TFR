 USB_the_masquerade_cat: "La Mascarada"
 USB_the_masquerade_cat_desc: "\n\n\n\n\n£GFX_USB_the_masquerade_cat\n\n\n\n\n\n\n\nEn lo que respecta al público, [USB.GetLeader] es presidente de los Estados Unidos de América, y la gente vive en una democracia, incluso si, por supuesto, las cosas se han vuelto más controladas en los últimos años debido a la pandemia de COVID-19 y las amenazas del extremismo radical, el comportamiento antisocial y el terrorismo doméstico.\n\nNaturalmente, las masas prefieren la ley y el Orden al Caos, y han demostrado ser bastante fáciles de manipular, dadas las circunstancias adecuadas. Aun así, hemos visto lo que sucede cuando el Caos se apodera de la conciencia colectiva, un contagio psicológico que debe ser suprimido; por lo tanto, debemos esforzarnos en ofuscar y ocultar la existencia de los Cognoscenti para evitar un brote de Caos de una capacidad similar a la Segunda Guerra Civil Americana.\n\n§GCONCIENCIA PÚBLICA§!: [USB_NSS_the_public_scripted_loc] (§Y[?USB_NSS_public_awareness_var|%]§!)\n§RACTIVIDAD EXTREMISTA§!: [USB_NSS_extremist_activity_scripted_loc] (§Y[?USB_NSS_extremist_activity_var|%]§!)"
 USB_the_cognoscenti_cat: "Los Cognoscenti"
 USB_the_cognoscenti_cat_desc: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
 USB_cognoscenti_text: "Aunque los Cognoscenti gobiernan América desde las sombras, en realidad hay una serie de ambiciones superpuestas que definen el Estado profundo. Se definen en gran medida por un triunvirato de intereses corporativos, securócratas y militares-industriales, y aunque son mutuamente interdependientes y todos tienen un interés personal en mantener el orden establecido, cada facción dentro de la cábala tiene sus propios objetivos y metas específicas.\n\nComo tal, a menudo hay tensiones entre las diferentes facciones, y no siempre están de acuerdo sobre la mejor manera de lograr sus objetivos. Por ejemplo, los intereses corporativos se preocupan principalmente por los márgenes de beneficio y la estabilidad continua, incluso si esto conlleva un coste de vidas, moral o principios. Los securócratas, por otro lado, están principalmente interesados en mantener el control sobre el país y sus ciudadanos, y están dispuestos a usar cualquier medio necesario para lograr sus objetivos. El complejo militar-industrial, mientras tanto, se preocupa por mantener la maquinaria de guerra en funcionamiento y por asegurar que América mantenga su posición como la potencia militar preeminente del mundo.\n\nHay ventajas y desventajas en el ascenso de diferentes facciones, y aunque la cábala en su conjunto está unida en su deseo de mantener el statu quo, el equilibrio de poder entre las diferentes facciones está siempre en flujo. En un momento dado, una facción u otra puede estar en ascenso, y las políticas y acciones del gobierno reflejarán los intereses de esa facción.\n\nInfluencia de la §RSANGRE§!: §Y[?USB_the_blood_influence_var|1%]§! £construction_speed_texticon  Velocidad de construcción: §G[?USB_the_blood_influence_dynamic_var|=+1%]§!\nInfluencia del §OCUERPO§!: §Y[?USB_the_body_influence_var|1%]§! £pol_power  Poder político: §G[?USB_the_body_influence_dynamic_var|=+1%]§!\nInfluencia de la §CMENTE§!: §Y[?USB_the_mind_influence_var|1%]§! £organization_texticon  Organización de divisiones: §G[?USB_the_mind_influence_dynamic_var|=+1%]§!"
 USB_dumb_construction_cat: "D.U.M.B."
 USB_dumb_construction_cat_desc: "\n\n\n\n\n£GFX_USB_dumb_construction_cat\n\n\n\n\n\n\n\nLa idea de las bases militares subterráneas profundas había sido una propuesta (aunque con diferentes nombres) desde los tiempos de la Guerra Fría, sirviendo como un protocolo de contingencia y continuidad del Gobierno. En última instancia, tales propuestas ambiciosas no llegaron lejos en su momento, pero fueron objeto de una serie de teorías de conspiración descabelladas. Las que se completaron, desafortunadamente, fueron abandonadas o severamente dañadas para evitar su descubrimiento durante la Guerra Civil.\n\nAhora, sin embargo, con los Cognoscenti en el poder y el presupuesto negro ofreciéndonos recursos sin precedentes para ejecutar nuestras ambiciones, finalmente podemos construir las D.U.M.B. y permitirnos instalaciones para investigación, refugio para personal de alto nivel y contingencias de emergencia si el Orden alguna vez vuelve a ser amenazado."
 USB_loose_ends_cat: "Cabos sueltos"
 USB_loose_ends_cat_desc: "\n\n\n\n\n£GFX_USB_loose_ends_cat\n\n\n\n\n\n\n\nEl pretexto y la ejecución del Golpe Secreto no habrían sido posibles sin la participación de varios informantes confidenciales infiltrados en organizaciones disidentes, así como de varios funcionarios de inteligencia de bajo nivel que ahora podrían resultar ser un riesgo para la Mascarada debido a remordimientos, objeciones morales e impurezas ideológicas.\n\nPara asegurar que no puedan convertirse en denunciantes, el director Burns ha autorizado una cacería humana sistémica de aquellos que han sido determinados por los Cognoscenti como \"cabos sueltos\". Esta campaña debe comenzar en los niveles inferiores, empezando con una lista de informantes confidenciales que nos proporcionó el director del FBI, James Comey. Con esto, la Mascarada podrá continuar indefinidamente y los Cognoscenti podrán seguir con su agenda sin ser molestados."
 USB_judas_gambit_cat: "Gámbito de Judas"
 USB_judas_gambit_cat_desc: "\n\n\n\n\n£GFX_USB_judas_gambit_cat\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nDebido a nuestra purga de los llamados \"cabos sueltos\", algunos dentro de los Cognoscenti se han vuelto paranoicos ante la posibilidad de ser los próximos en la guillotina. El director Burns ha sido informado de un traidor dentro de las filas de los Cognoscenti, con nombre en clave \"Gambito de Judas\", que está explotando la naturaleza enrevesada del Estado profundo para emitir órdenes contradictorias a las instituciones bajo nuestro control.\n\nLa supercomputadora de inteligencia artificial predictiva de DARPA, Networked Event Response Optimizer (NERO), teoriza que el objetivo del traidor es romper la Mascarada utilizando su posición dentro de los Cognoscenti para coordinar un ataque de falsa bandera de una escala drástica que revelará la existencia de los Cognoscenti al público, lo que inevitablemente conducirá a la histeria masiva y al Caos. La detención de Judas se ha convertido en la máxima prioridad de los Cognoscenti."
 USB_securing_north_america_cat: "Comando Unificado"
 USB_securing_north_america_cat_desc: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n                                 CATEGORÍA ACTUAL: [USB_current_map_scripted_loc]"
 USB_biolabs_cat: "Biolaboratorios"
 USB_biolabs_cat_desc: "\n\n\n\n\n£GFX_USB_biolabs_cat\n\n\n\n\n\n\n\nEstados Unidos ha estado durante mucho tiempo a la vanguardia de la medicina y la guerra biológica. Con la llegada de la edición genética y otros avances novedosos en biotecnología, dichos programas se expandieron para abarcar la investigación de nuevas vacunas y otras curas, así como la modificación y militarización de enfermedades preexistentes como el ébola, la viruela y el coronavirus.\n\nEstos \"biolaboratorios\" existían no solo en suelo americano, sino clandestinamente en el extranjero, operando a través de entidades ficticias financiadas por ONG. Sin embargo, el Gran Error llevó a un colapso casi total de este sistema, costándonos décadas invaluables de investigación perdida. Si queremos restaurar el dominio americano, los biolaboratorios deben reabrirse, reconstruirse y expandirse en nombre del progreso científico."
 USB_nss_megalopolis_category: "Megalópolis"
 USB_nss_megalopolis_category_desc: "\n\n\n\n\n£GFX_USB_megalopolises_cat\n\n\n\n\n\n\n\nCon el poder consolidado, podemos realizar un proyecto ambicioso: formalizar el sistema de megalópolis. Mediante el uso de contratos de reubicación, expansión urbana y centralización gradual, concentraremos las poblaciones urbanas en regiones interconectadas, y ampliaremos la infraestructura ferroviaria necesaria para acomodar una tarea logística tan hercúlea. Esto reducirá el riesgo que representan las poblaciones rurales, el principal vector de ideas peligrosas que amenazaron la estabilidad de EE.UU.\n\nAl igual que otras iniciativas, el proyecto de megalópolis mejora nuestro control sobre los estadounidenses. La salud social urbana mejorará al reubicar a las poblaciones rurales, frenando futuros problemas y permitiendo una supervisión más estrecha. Con la mayoría de los americanos en estas regiones, a los elementos peligrosos les resultará más difícil evadir la detección. Si surge actividad rebelde, la coordinación interregional por parte de los disidentes se verá gravemente obstaculizada."

 usb.57.t: "¿Quién ahora?"
 usb.57.d: "En una decisión sorprendente, el presidente Joe Biden anunció su decisión de renunciar a la candidatura presidencial demócrata, alegando la necesidad de un nuevo liderazgo que guíe al país hacia el futuro. El partido se esfuerza por apoyar a un nuevo candidato ante la proximidad de las elecciones.\n\nLa lista de posibles candidatos es larga, pero hay algunos que gozan de la aprobación del partido. Kamala Harris, la decidida vicepresidenta en funciones, representa una continuidad firme de las políticas de Biden, pero sin las preocupaciones sobre su edad. Si bien su postura puede no entusiasmar a todo el partido, su experiencia y fiabilidad la convierten en una opción segura para quienes se resisten a los cambios drásticos.\n[USB_bloomberg_can][USB_yang_can][USB_kennedy_can][USB_aoc_can]"
 usb.571.d: "En una decisión sorprendente, el presidente Joe Biden anunció su decisión de renunciar a la candidatura presidencial demócrata, alegando la necesidad de un nuevo liderazgo que guíe al país hacia el futuro. El partido se esfuerza por apoyar a un nuevo candidato ante la proximidad de las elecciones.\n\nLa lista de posibles candidatos es larga, pero hay algunos que gozan de la aprobación del partido. Kamala Harris, la decidida vicepresidenta en funciones, representa una continuidad firme de las políticas de Biden, pero sin las preocupaciones sobre su edad. Si bien su postura puede no entusiasmar a todo el partido, su experiencia y fiabilidad la convierten en una opción segura para quienes se resisten a los cambios drásticos.\nMichael Bloomberg, el magnate de los medios que ha llegado a liderar la facción \"innovacionista\" del Partido Demócrata, ejerce una gran influencia dentro del partido. A pesar de ello, no le cae bien a nadie a quien no haya podido comprar.\nAndrew Yang fue una opción popular entre los jóvenes en 2020, conocido por sus políticas centristas y por aportar un enfoque \"tecnócrata\" al Partido Demócrata. Puede que no tenga mucha experiencia política, pero él y su equipo de Yang podrían ser clave para ganar en 2024.\nRobert F. Kennedy Jr., miembro de la Familia Kennedy, es tolerado tanto por el Partido Demócrata como por el Republicano, pero apreciado por unos pocos por sus políticas centristas. Puede que no sea el Kennedy más demócrata, pero su nombre nos conectaría con la América de antes.\nAlexandria Ocasio-Cortez, la ardiente figura progresista, se ha convertido en la voz de una nueva generación que exige cambios dentro del Partido Demócrata. Sus políticas pueden dividir la opinión, pero su incansable impulso a la justicia social y la acción climática la han convertido en una defensora de quienes anhelan un cambio radical en el statu quo."
 USB_BLMBRG_candidate_description_loc: "Michael Bloomberg, el magnate de los medios que ha llegado a liderar la facción \"innovacionista\" dentro del Partido Demócrata, ejerce una gran influencia dentro del partido. A pesar de ello, no le cae bien a nadie a quien no haya podido comprar.\n"
 USB_YANG_candidate_description_loc: "Andrew Yang fue una opción popular entre los jóvenes en 2020, conocido por sus políticas centristas y por aportar un enfoque \"tecnócrata\" al Partido Demócrata. Puede que no tenga mucha experiencia política, pero él y su equipo de Yang podrían ser clave para ganar en 2024.\n"
 USB_AOC_candidate_description_loc: "Alexandria Ocasio-Cortez, la ardiente figura progresista, se ha convertido en la voz de una nueva generación que exige cambios dentro del Partido Demócrata. Sus políticas pueden dividir la opinión, pero su incansable impulso a la justicia social y la acción climática la han convertido en una defensora de quienes anhelan un cambio radical en el statu quo.\n"

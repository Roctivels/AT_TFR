 bdnspch.0.t: "Ascensión"
 bdnspch.0.d: "\"Compatriotas americanos, nuestro país está en un estado crítico. Desde la costa hasta la costa, nuestra industria, infraestructura y agricultura están en ruinas. Nuestras grandes ciudades están en llamas. Las facciones insurrectas se esconden en las sombras, tramando contra nuestra democracia. Los medios de comunicación y muchos políticos dicen que la guerra ha terminado, pero temo que apenas estamos comenzando. Millones de nuestros compatriotas americanos han sido corrompidos, arrastrados al radicalismo, y necesitan aprender a reconocer sus errores.\n\n\"Esta enorme tarea recae únicamente en mi administración. En el Congreso, facciones rivales se pasaron la Guerra Civil discutiendo sobre impuestos, mientras nuestros valientes hombres y mujeres en las fuerzas armadas luchaban por todos nuestros derechos. El Estado de derecho estaba al borde del colapso mientras los políticos debatían, y ahora hablan de indultos, agendas legislativas y políticas. ¡Nuestro país no necesita más de eso! Necesita liderazgo.\n\n\"Con los poderes que me han sido otorgados como Jefe del Ejecutivo de este país, ordeno al Congreso que se disuelva y dé por concluida esta sesión. Si queremos reconstruir nuestra nación, necesitamos unidad y un compromiso con una sola causa, para evitar que este país se deslice irrevocablemente hacia la oscuridad de la división y la violencia."
 bdnspch.0.a: "\"¡Haremos a una nueva América!\""
 bdnspch.1.t: "La tarea por delante"
 bdnspch.1.d: "\"Compatriotas americanos, me presento ante ustedes en un momento de crisis sin precedentes en nuestra nación. Un dictador ha reunido a su alrededor a un grupo de generales rebeldes y políticos radicales. Tiene a su disposición un ejército de milicias, armadas con tecnología de punta, gracias a arsenales saqueados.\n\n\"Las acciones de este hombre han dejado a nuestra nación hecha trizas. El Oeste está sumido en el caos, el Noreste se ha desmoronado y el Sur arde. Este hombre ha ordenado a sus soldados que apunten sus armas contra sus propios compatriotas americanos, enfrentando cualquier amenaza a su poder usurpado con una brutalidad desmedida y una crueldad inhumana. Ha gaseado a manifestantes pacíficos y ha arrestado a opositores políticos. Con un acto de arrogancia, ha anulado la Constitución y ha declarado que su palabra es la única ley que merece respeto. Se atreve a llamar a su sangrienta obra una \"oportunidad\" para remodelar nuestro país.\n\n\"Sin embargo, los restantes lealistas del Ejército, la Fuerza Aérea y la Armada, junto con los servidores públicos, los funcionarios electos y nuestras instituciones, se alzan contra él. También contamos con la voluntad del americano promedio, la verdadera mayoría silenciosa. Aunque el hombre que dispara y bombardea para aferrarse al poder en Denver nos amenace con su puño, es impotente ante nuestra resistencia. Estamos del lado de los ideales de libertad y democracia, luchando contra los males de la dictadura y la tiranía."
 bdnspch.1.a: "\"El camino será largo, ¡pero lo superaremos!\""
 bdnspch.1.c: "\"Yo-eh-necesito... perdón, me olvidé...\""
 bdnspch.2.t: "Sobre una cruz del capitalismo"
 bdnspch.2.d: "\"Quiero expresar mi agradecimiento a la Alianza Progresista de Ciudadanos de Cincinnati por la invitación, y un agradecimiento especial al senador Bernie Sanders -sí, un aplauso para él-, por estar a mi lado. Es increíble, ¿no?, que algunos no se den cuenta de lo radicales, incluso revolucionarios, que fueron nuestros Fundadores. ¡Eran los verdaderos activistas de su tiempo! Me molesta cómo, desde entonces, hemos tendido a ver a los activistas más como molestias y sus causas como trivialidades. Hemos dejado atrás a tantos americanos negros y morenos, de clase trabajadora, y a las mujeres, ¡y se aseguraron de que no lo olvidáramos!\n\n\"Al final del día, ¿por qué luchamos? Bueno, por nuestros derechos, como el derecho a elegir, que se ganó con tanto esfuerzo, el derecho de hombres y mujeres, sin importar el color de su piel, a ser tratados según su carácter, y el derecho de los americanos a disfrutar de la Seguridad Social en su vejez. Estos derechos se conquistaron en batallas, donde los ciudadanos comunes tuvieron que asumir la responsabilidad de mantener el proceso político en movimiento. Al mirarlos, sé que son los verdaderos impulsores de hoy. Muchos jóvenes se han sentido desatendidos, y el Movimiento Progresista les ha dado una voz."
 bdnspch.2.a: "\"¡Nunca la bajen! ¡Siempre digan lo que piensan!\""
 bdnspch.2.b: "\"Ahora, ya verán, así que, eeh... ¡adelante!\""
 bdnspch.3.t: "Nuestro Partido: Nuestra Democracia"
 bdnspch.3.d: "\"Gracias, senador Schumer, por ese discurso tan inspirador. No podría haberlo dicho mejor; nuestro partido ha estado a la vanguardia en la lucha contra el trumpismo desde el principio. Mientras nuestros amigos republicanos se quedaban al margen, tratando de hacer entrar en razón a ese loco, nosotros advertíamos al pueblo americano sobre sus mentiras, justo cuando intentábamos cumplir con nuestras promesas en las negociaciones. Esta no es la primera vez que nuestro partido se ha situado del lado correcto de la historia. Durante la era de Reagan, cuando todos gritaban «¡Recorten, recorten, recorten!», fueron los demócratas quienes intentaron poner un freno, y lo mismo sucedió en 2008.\n\n\"Mientras la guerra desgarra nuestro país, será nuestra responsabilidad, como Partido Demócrata, reconstruirlo. Repararemos el daño directo y barreremos con la podredumbre de la austeridad y el efecto derrame. Debemos luchar para restaurar la industria americana y reconstruir lo que queda. Será nuestra tarea sanar la división y superar las mentiras. Seremos nosotros quienes tengamos que enfrentar a los demonios del extremismo, tanto de la ultraizquierda como de la ultraderecha."
 bdnspch.3.a: "\"¡Somos el partido del futuro!\""
 bdnspch.3.b: "\"Somos, bueno, eeh... perdón\"."
 bdnspch.4.t: "Remanentes de Lincoln"
 bdnspch.4.d: "\"Quiero expresar mi agradecimiento al equipo de The Bulwark, a Dispatch y al Proyecto Lincoln por la invitación. Es realmente reconfortante saber que hay conservadores que aún mantienen la cordura. Recuerdo cómo era la política durante gran parte de mi carrera: figuras como el inolvidable William F. Buckley Jr., la brillante Jeanne Kirkpatrick, y los presidentes Bush; todos ellos conservadores, pero profundamente dedicados a la defensa de la democracia, tanto en nuestro país como en el extranjero.\n\n\"Al observar la transformación del Partido Republicano, me siento desalentado. Una institución que ha estado con nosotros desde Lincoln ha caído en un abismo de autoritarismo y antidemocracia como nunca antes habíamos visto. Pero al mirar a todos ustedes aquí, me siento mucho más esperanzado. Veo a personas como el expresidente de la Cámara de Representantes Ryan, los senadores McConnell y Cornyn, y a defensores de nuestra democracia como Jen Psaki y David French. Estoy convencido de que el legado de Lincoln, Eisenhower y Reagan sigue vivo en ustedes. Tengo la firme sospecha de que, una vez que se liberen de esta ocupación ilegítima, los votantes recompensarán a un Partido Republicano renovado con un lugar en la mesa de negociaciones en los Estados Unidos reconstruidos..."
 bdnspch.4.a: "\"¡Porque necesitamos la disidencia no combativa en América!\""
 bdnspch.4.b: "\"Po-Porque queremos, eh, ayuda para hacer a América gran- una otra vez\"."
 bdnspch.5.t: "La guerra por ganar"
 bdnspch.5.d: "\"Hombres y mujeres de las Fuerzas Armadas, me presento ante ustedes en un momento de caos y dolor. Nuestro país está siendo desgarrado por una guerra cruel, provocada por la insaciable ambición de un hombre y el fanatismo de sus seguidores. La única salida es la victoria: debemos derrotar a este hombre y a todos aquellos que se levantan en armas contra sus compatriotas americanos en su nombre. A los generales y comandantes que están aquí, solo puedo esperar que actúen pronto.\n\n\"Si no logramos vencer a quienes se oponen a Nuestra Democracia, la más antigua del mundo, nuestro país caerá bajo el dominio de un dictador sin ley. Estaremos a merced de grupos armados. Nuestros derechos: el derecho a elegir con quién casarnos, cuándo tener hijos, qué podemos imprimir o qué religión practicar, estarán en peligro. No tenemos más opción que luchar por todo lo que valoramos, por nuestras familias, por nuestro sistema de controles y equilibrios, por nuestros derechos, y ustedes son los que están en la lucha."
 bdnspch.5.a: "\"¡No defrauden al país!\""
 bdnspch.5.b: "\"Y yo soy - toda la - combatimos a...\""
 bdnspch.6.t: ""
 bdnspch.6.d: ""
 bdnspch.6.a: ""
 bdnspch.6.b: ""
 bdnspch.7.t: "Ayudar a los olvidados"
 bdnspch.7.d: "\"En todo nuestro país, los americanos negros y marrones han logrado avances significativos en el mundo de los negocios. En una variedad de sectores, desde la tecnología hasta la venta al por mayor, estas comunidades han hecho grandes progresos. Sin embargo, el peso de siglos de desigualdad y opresión aún no se ha superado por completo. Las empresas de minorías a menudo reciben menos préstamos de los bancos, y los prestatarios de estas comunidades enfrentan sanciones más duras si no cumplen con sus obligaciones. El racismo sistémico ha dificultado que muchos americanos de minorías obtengan la ayuda gubernamental que necesitan, y las regulaciones se aplican de manera desigual. Es impresionante lo lejos que hemos llegado, pero todavía hay mucho por hacer.\n\n\"Tengo la firme intención de presionar al Congreso para que apruebe leyes que mejoren esta situación. La segregación racial debe ser cosa del pasado. Necesitamos fomentar una integración real, lo que significa garantizar igualdad de acceso al crédito, subsidios y exenciones fiscales. Las empresas no deberían discriminar a ciertas áreas basándose en ideas erróneas sobre la criminalidad. Todas las comunidades deben tener el mismo acceso a alimentos, y los \"desiertos alimentarios\" deben desaparecer. También es crucial resaltar a los emprendedores de comunidades subrepresentadas; los proveedores de internet deben priorizar a los negocios de propiedad minoritaria. En definitiva, debemos reconocer a los americanos de minorías, mantenerlos visibles y presentes en nuestra mente como ciudadanos iguales, dignos de nuestro respeto."
 bdnspch.7.a: "\"No podemos permitir que se queden atrás\"."
 bdnspch.7.b: "\"No podemos, eeh... bueno, este...\""
 bdnspch.8.t: "La universidad"
 bdnspch.8.d: "\"Thomas Jefferson estaba convencido de que la educación era la base fundamental de una democracia saludable, el medio a través del cual un pueblo podía aprender los principios de la participación y evitar caer en la ignorancia y la apatía que marcaron a los antiguos reinos de Europa. América siempre ha estado orgullosa de su gran cantidad de universidades: desde la prestigiosa Ivy League hasta las tres hermanas y los impresionantes campus del oeste. Sin embargo, este valioso recurso solía estar reservado solo para la élite de la sociedad: los internados de Nueva Inglaterra alimentaban directamente a Harvard, Princeton y Yale, mientras que solo las familias más adineradas del oeste enviaban a sus hijos a Berkeley y Stanford. No fue sino hasta el final de la Segunda Guerra Mundial, con el G.I. Bill, que el americano promedio tuvo la oportunidad de pisar los venerados pasillos de la academia.\n\n\"A pesar de eso, hemos permitido que la academia se convierta nuevamente en un terreno exclusivo para la élite. Políticas como la Acción Afirmativa hicieron un esfuerzo por equilibrar la balanza, pero no fueron suficientes. Nuestros americanos más brillantes de clase trabajadora han sido sistemáticamente excluidos de las mejores universidades, y muchos ni siquiera pueden costear las escuelas públicas. Incluso si lograbas entrar, a menudo parecía una trampa: pagar sumas exorbitantes solo para tener la oportunidad de vivir una vida similar a la de tus padres. Hemos dejado que nuestros departamentos de humanidades se deterioren y que nuestra investigación científica, que solía ser de primer nivel, se quede atrás. Cada vez más americanos eligien evitar la universidad, y la razón principal que mencionan es el costo. Es hora de que el americano promedio tenga las mismas oportunidades de acceder a una educación superior."
 bdnspch.8.a: "\"¡Es hora de que la universidad sea asequible!\""
 bdnspch.8.b: "Es hora de que la prepa - la uni...\""
 bdnspch.9.t: "Firma del Acta de Libertad Económica"
 bdnspch.9.d: "\"Quiero expresar mi agradecimiento a los senadores Bernie Sanders y Elizabeth Warren por su incansable dedicación para ayudar al pueblo americano; esta ley es un reflejo de su esfuerzo. Muchos americanos están enfrentando serias dificultades económicas; aunque la recesión que Barack y yo enfrentamos ya quedó atrás, las cicatrices que dejó en la población aún no se han curado del todo. Para gran parte de América, las viejas fórmulas económicas simplemente ya no funcionan. La industria ha tenido un resurgimiento, pero hay regiones que dependen del carbón y otras industrias en declive que no pueden renovarse tan fácilmente. Las comunidades minoritarias han estado luchando contra la pobreza y el racismo durante mucho tiempo, y ninguna política ha sido lo suficientemente fuerte como para romper con ese oscuro legado. La modernidad y el peso del pasado que llevamos como nación nos han llevado a buscar nuevas soluciones.\n\n\"Este acta finalmente creará un sistema robusto de apoyo económico para los desempleados, además de un paquete que facilitará la transición de los trabajadores de las industrias en declive. Muchos americanos se encuentran atrapados en un ciclo de deudas y pobreza, con poco más que una asistencia social insuficiente, a la que a menudo no pueden acceder debido a la inestabilidad de sus empleos. Esta ley permitirá que muchos americanos, que viven al margen de la sociedad, tengan acceso a los recursos necesarios para gestionar sus finanzas y superarse a través de la educación y otras oportunidades."
 bdnspch.9.a: "\"Los americanos pueden estar tranquilos\"."
 bdnspch.9.b: "\"Los americanos pueden, eeh, bueno...\""
 bdnspch.10.t: ""
 bdnspch.10.d: ""
 bdnspch.10.a: ""
 bdnspch.10.b: ""
 bdnspch.11.t: "Bidencare"
 bdnspch.11.d: "\"Muchos americanos están lidiando con deudas médicas, la falta de acceso a la atención y enfermedades que no reciben tratamiento. Ahora, con gran parte de nuestro país en crisis y tantos americanos perdiendo la vida por enfermedades que pensábamos que ya no existían, la necesidad de una atención médica accesible, asequible y de calidad es más urgente que nunca. Nuestras ideas sobre cómo deberían ser las políticas de salud ya no son suficientes; necesitamos mucho más de lo que teníamos antes. Incluso el Acta de Atención Médica Asequible, que fue un pilar de la agenda Obama-Biden, ya no es suficiente. Lo que realmente necesitamos es un sistema de salud que funcione para todos los americanos, sin importar su edad o condiciones preexistentes, y que pueda enfrentar los innumerables desafíos que el pueblo americano enfrenta hoy en día.\n\n\"Esta nueva atención médica se enfocará en el paciente, no en los pagos a las farmacéuticas. Debe ser asequible, de verdad asequible, y no solo ofrecer a las compañías de seguros clientes sin costo. No tenemos que ceder en este tema; estamos en tiempos extraordinarios que requieren acciones audaces. Honestamente, nuestros aliados republicanos no están en posición de detenernos. ¡Podemos lograr lo que la administración Biden-Oba - perdón, Obama-Biden, originalmente soñó!"
 bdnspch.11.a: "\"¡Es lo que los americanos merecen!\""
 bdnspch.11.b: "\"Barack - bueno, el y yo, eeh...\""
 bdnspch.12.t: "Firma del Acta de Derechos Electorales"
 bdnspch.12.d: "\"América ha tratado a sus ciudadanos de manera desigual y ha permitido que persistan muchas injusticias. Los americanos negros y marrones fueron alguna vez esclavos, luego ciudadanos de segunda clase, y hoy en día aún enfrentan las pesadas consecuencias de su sufrimiento pasado. América ha pagado por su pecado original de diversas formas, y es hora de que llegue el arrepentimiento. Lo que se concibió inicialmente tras la guerra de Secesión y se formalizó con el Acta de Derechos Civiles necesita ser fortalecido. Todos los ciudadanos deben tener igual acceso a Nuestra Democracia y una representación justa.\n\n\"Con esta acta, podemos avanzar un paso más en el largo camino hacia la equidad racial. No se permitirán más prácticas discriminatorias. Cada redistribución de distritos y todas las leyes relacionadas con el voto deberán ser aprobadas por el Gobierno Federal. La manipulación de los distritos electorales ya no será tolerada, y la discriminación basada en raza, clase, ubicación o afiliación política no tendrá cabida en la redistribución de distritos. Las maniobras políticas ya no interrumpirán la función esencial de Nuestra Democracia\"."
 bdnspch.12.a: "\"El voto es sagrado y ahora cuenta con la protección adecuada\"."
 bdnspch.12.b: "\"El voto es, eeh... tenemos, votos...\""
 bdnspch.13.t: ""
 bdnspch.13.d: ""
 bdnspch.13.a: ""
 bdnspch.13.b: ""
 bdnspch.14.t: "Pagar lo justo"
 bdnspch.14.d: "\"Muchos conservadores han defendido la idea de que los mercados completamente libres y desregulados son la mejor opción. Sin embargo, al mirar nuestra historia, no puedo estar de acuerdo. Los terribles abusos de la Gilded Age y los innumerables escándalos corporativos que han ocurrido desde entonces demuestran que los mercados sin regulación pueden ser tan destructivos, si no más, en áreas clave, que el socialismo. Muchas empresas han puesto el bienestar de la sociedad en un segundo plano, priorizando las ganancias por encima de todo. A menudo se dice que la avaricia es buena y que un poco de egoísmo es saludable. Esta es una noción absurda que ha causado un gran sufrimiento. La economía del derrame y la deslocalización han llevado al colapso de comunidades enteras, mientras que los más ricos han salido beneficiados.\n\n\"No todos los empresarios son malvados, ni todos los inversores buscan solo su propio beneficio. Sin embargo, el impulso hacia el comportamiento egoísta no desaparece solo porque tengamos buenas intenciones; necesita ser contrarrestado con políticas adecuadas. Las empresas deberían destinar una parte de sus ganancias al bien común, y no deberían poder evadir su responsabilidad aprovechándose de lagunas legales. También es crucial que nos aseguremos de que los empresarios nunca puedan dominar nuestra política ni financiarse a sí mismos para establecer una dictadura."
 bdnspch.14.a: "\"¡La América corporativa debe apoyar a toda América!\""
 bdnspch.14.b: "\"La corpo - bueno, eeh...\""
 bdnspch.15.t: "Constitución viva"
 bdnspch.15.d: "\"Algunos parecen pensar que nuestra Constitución es fija e inalterable. Defienden el concepto de \"originalismo\", que sugiere que siempre debemos actuar según lo que creen que los Fundadores habrían querido en relación a la Constitución. Lamento decirlo, pero los Fundadores ya no están con nosotros desde hace mucho tiempo. No tenemos forma de saber qué habrían deseado y, sinceramente, ni siquiera podrían imaginar lo diferente que es nuestro mundo hoy. No conocían internet, ni armas de asalto, ni ninguna de las innovaciones modernas que han transformado nuestras vidas. Entonces, ¿por qué deberíamos limitarnos a lo que escribieron?\n\n\"Nuestros fundadores eran conscientes de sus propias limitaciones. Sabían que las instituciones debían evolucionar y adaptarse, y por eso establecieron un sistema de enmiendas a la Constitución. Además de la Declaración de Derechos, hemos incorporado 15 enmiendas desde entonces, que reflejan nuestros valores y el funcionamiento de Nuestra Democracia. Los derechos de las minorías, de las mujeres y de todos los americanos han sido fortalecidos. Con tantos cambios en América recientemente, es hora de revisar la Constitución. Debemos abordar este tema como lo hicieron los Fundadores: creando algo nuevo, algo que se ajuste a la diversidad de nuestro país."
 bdnspch.15.a: "\"Debemos tomar lo bueno de lo antiguo, y renovar lo que falla\"."
 bdnspch.15.b: "\"Debemos tomar - bueno, agua, y...\""
 bdnspch.16.t: "Una nación renacida"
 bdnspch.16.d: "\"Compatriotas americanos: Nos encontramos en un momento crucial, ante el inminente colapso de nuestras instituciones y lo que realmente ha forjado la historia de América tal como la conocemos. Una palabra que define nuestro destino, una que ha llevado el poderoso espíritu de este país de costa a costa y ha movido montañas, es la integridad. Desde que asumimos este cargo, la integridad de nuestra nación ha crecido aún más en medio de esta hora tumultuosa. Amigos, crecí en una América valiente y fiel a sí misma, donde cada persona tenía la oportunidad de aprovechar las mismas posibilidades, sin preocuparse por la adversidad, sin pasar la noche deseando un nuevo sueño, un sueño americano que ya está al alcance de la mano mientras caminan por un mar de gloria. Esta crisis que se profundiza solo pone de manifiesto nuestra fuerza y determinación frente a la tiranía, y todos los americanos están listos para tomar las medidas necesarias para enfrentar la urgencia. Somos una nación de acción, no de brazos cruzados ante un dictador insignificante; actuamos con todas nuestras fuerzas y tenemos las herramientas para construir un sueño, no para abandonarlo. Que quede claro: el caos y el dolor que han fracturado nuestra nación nunca podrán destruir la esperanza. Esta es, sin duda, una lucha por el futuro, por el alma de este país."
 bdnspch.16.a: "\"¡Esto es América!\""
 bdnspch.16.b: "\"Esto es - Arge- eeh...\""
 bdnspch.17.t: "Fortalecer los mercados"
 bdnspch.17.d: "\"Bienvenidos, amigos. Quiero compartir algunas breves reflexiones sobre el estado de nuestros mercados y la auténtica revitalización de nuestra economía. América tiene una base sólida de elementos que la fortalecen, desde la manufactura hasta nuestra clase media. Sin embargo, un gran avance para estos sectores depende de la fortaleza de nuestros mercados, además de alejarnos de las visiones pesimistas sobre su funcionamiento. Nuestra administración está trabajando activamente para garantizar la estabilidad del país, lo que permite a los consumidores disfrutar y alcanzar sus metas sin miedo. Desde los productos americanos hasta los empleos que generan, todo contribuye a ese ámbito de crecimiento del mercado e innovación económica, que se centra en adquirir recursos para apoyar a nuestras empresas y agencias en la búsqueda de una América más segura y sostenible. Ya no habrá intereses especiales ni lagunas legales que intenten socavar la prosperidad de nuestra nación; en su lugar, se trazará un camino de prosperidad que avanzará hacia el futuro, permitiendo un esfuerzo centralizado y coordinado."
 bdnspch.17.a: "\"Esto nunca ha defraudado a América\"."
 bdnspch.17.b: "\"Esto nunca - de- miren, gente...\""
 bdnspch.18.t: "Acecho en las sombras"
 bdnspch.18.d: "\"Compatriotas americanos, esta noche quiero hablarles sobre la crisis que actualmente envuelve a nuestra nación en un círculo de fuego. Cada día, todos sentimos el peso de la guerra que ha dejado su huella en nuestras sagradas instituciones, mientras traidores que luchan por un rey insignificante nos empujan a implorar la malicia en nuestras almas, sumergiéndonos en un ciclo de violencia y destrucción. Amigos, esto requiere acciones decisivas de mi administración, incluyendo una revisión de nuestras decisiones históricas. Es fundamental fomentar la cooperación entre nuestras instituciones y el pueblo americano, como la necesaria expansión de la vigilancia en cada rincón, para que esta nación no viva con miedo, sino que se sienta segura y protegida, en lugar de enfrentar a diario el horror de la guerra. Cuando era joven, en mi familia siempre había un temor constante por el costo de la guerra, la preocupación de caer ante tiranos de todas partes, ante elementos subversivos en nuestra sociedad, que se alimentan de la violencia sin ningún remordimiento. Esta es, en verdad, una medida de precaución para disipar cualquier sentimiento de destrucción interna en busca de estabilidad tras nuestra lucha por la libertad\"."
 bdnspch.18.a: "\"Que Dios bendiga a América\"."
 bdnspch.18.b: "\"Que, eh, Dios bendiga Ar-emi...\""
 bdnspch.19.t: "La Constitución primero"
 bdnspch.19.d: "\"La voz del pueblo ha cobrado fuerza en nuestras instituciones. La Constitución nos ha enseñado que nuestra nación sigue firme en la defensa de la democracia, incluso cuando eso significa luchar en la primera línea, donde puede ser más vulnerable. La singularidad de este documento sagrado muestra que el estilo de vida americano siempre ha sido defendido, nunca relegado por tiranos que buscan el poder y acciones que envenenan nuestra nación. Y cuando los tiranos aparecen, la resiliencia de nuestro pueblo responde, como siempre ha estado en el corazón y el alma de América. Quiero reiterar: todo esto se debe a nuestros antepasados, quienes redactaron estos textos sagrados frente a su propia tiranía en casa. Ante la tormenta y la lucha, siempre podemos mirar hacia el legado de nuestros padres fundadores, quienes guiaron a esta nación contra el peligro y en busca de nuevas oportunidades. Que esta gran nación recuerde estas palabras para siempre:"
 bdnspch.19.a: "\"Nosotros, el Pueblo\"."
 bdnspch.19.b: "\"Nos - los nue, eeh...\""
 bdnspch.20.t: "El sueño de silicona"
 bdnspch.20.d: "\"Hola, ¡qué bueno estar de vuelta en el norte de Virginia! Me ayuda a olvidarme de D.C. Recientemente, tuve una charla con el director ejecutivo de Google, el Sr. Pichai, sobre cómo están luchando contra la desinformación que proviene de territorios ocupados. Me dejó claro que el espacio digital, es decir, internet, se ha convertido en un campo de batalla tan crucial como cualquier otro. ¡Me contó que unos trolls de internet, aliados con el enemigo, casi logran desviar un tren lleno de suministros médicos haciéndose pasar por mí! ¡Es una locura!\n\n\"Al final, el Sr. Pichai y algunos otros decidieron que el acceso a sus servicios es un privilegio, no un derecho, así que ahora la mayoría del enemigo no puede acceder a Google. Además, los dispositivos de Apple, Microsoft, Bloomberg y muchos más han sido desconectados. Y si le sumamos que también les han cortado el acceso a SWIFT, ¡creo que esos traidores van a tener un buen dolor de cabeza!\nQuiero resaltar que el sector empresarial americano ha sido increíble. Sin ellos, no tendríamos todos esos dispositivos en nuestros aviones, acceso a nuestros bancos, ni siquiera a la mayoría de los productos,"
 bdnspch.20.a: "...¡y seguirán haciéndolo de maravilla!\""
 bdnspch.20.b: "...y espero qué, eeh... sigan, bueno...\""
 bdnspch.21.t: "Rifles, balas, y eso"
 bdnspch.21.d: "\"Miren, puede que suene raro que personas que están acostumbradas a ensamblar piezas de automóviles se pasen a la fabricación de munición, pero estoy seguro de que pronto le encontrarán el ritmo. Ese es el espíritu americano: aprovechar las oportunidades, adaptarse a las circunstancias más difíciles y sacar algo positivo de todo. Hace unos años, nadie imaginaba que un hombre podría usurpar nuestra democracia, pero lo hizo, y ahora todos tenemos que hacer lo que nos toca. Así que, mientras algunos se quejan y arman un escándalo por las horas extras, estoy convencido de que todos cumplirán con su deber; ¡después de todo, son americanos!\n\n\"Piénsenlo mientras pulen cada pieza de latón: muchos americanos viven bajo la opresión. Ya sea por culpa de radicales o del tirano de Denver. Nuestro sistema legal y sus instituciones están en peligro. Recuerden siempre que la bala que están fabricando podría ser la que detenga a nuestros futuros dictadores. Sepan que el tanque que están ayudando a construir podría ser la primera señal de liberación que la gente cansada de Denver, Los Ángeles y Boston vea. Los aviones que volarán gracias a su trabajo destruirán las fortalezas enemigas."
 bdnspch.21.a: "\"¡Lo que construyan aquí podría decidir la guerra!\""
 bdnspch.21.b: "\"Lo que, eeh - bueno, miren...\""
 bdnspch.22.t: "Mantener la máquina"
 bdnspch.22.d: "\"Vivimos en una época donde el acceso a la información es más fácil que nunca, lo que nos permite entender mejor cada rincón de nuestra economía. Y, sinceramente, he estado mirando esto de cerca y la verdad no es muy prometedora. Somos una nación de consumidores, y últimamente, nuestra producción ha estado a la baja. Eso tiene que cambiar, y de hecho, ya está empezando a suceder. Sin embargo, también hemos dejado de lado nuestro conocimiento sobre la economía. Muchos graduados brillantes de universidades de renombre terminan en las Tres Grandes, atrapados en un ciclo que no les permite servir a su país. Esta guerra, aunque terrible, está cambiando esa realidad.\n\n\"Los graduados de las mejores universidades deben ser reclutados para ayudar a nuestro ejército a manejar la logística. Necesitamos que se unan a organizaciones de control que aseguren que las corporaciones hagan su parte en el esfuerzo bélico, que no se queden con los beneficios y que no derrochen recursos. Es fundamental que el americano promedio tenga lo que necesita, y que el soldado americano esté bien equipados para luchar."
 bdnspch.22.a: "\"¡América necesita gente inteligente!\""
 bdnspch.22.b: "\"América, bueno, eeh, hmm...\""
 bdnspch.23.t: "Automatización automatizada"
 bdnspch.23.d: "\"No entiendo esto, realmente no entiendo nada de lo que está pasando. Pero sé que es crucial. Tenemos a algunas de las mentes más brillantes de América trabajando en esta tecnología. Recientemente, me reuní con Sam Altman, y me comentó que esta tecnología podría ser el golpe decisivo en esta guerra. Aunque ahora pueda parecer un poco, digamos, raro, me han asegurado que mejorará de manera exponencial en los próximos años e incluso meses.\n\n\"En este campo, tenemos una ventaja clara sobre el tirano de Denver. Esta tecnología nos permitirá redirigir recursos valiosos de diversas funciones administrativas básicas, lo que nos permitirá enfocarnos más en la gestión del esfuerzo bélico. Pronto podremos utilizar IA para controlar drones y resumir la información del campo de batalla, así como para saber cuándo y dónde debemos dirigir nuestros recursos sin necesidad de intervención humana: ¡es verdaderamente revolucionario!"
 bdnspch.23.a: "\"¡Estas cosas parecen muy inteligentes!\""
 bdnspch.23.b: "\"El-el, uh, ya ves...\""
 bdnspch.24.t: "Consiguiendo lo que necesitamos"
 bdnspch.24.d: "\"Compatriotas americanos, tal vez hayan notado algunos cambios en sus lugares de trabajo. Algunos han comenzado a producir suministros militares, mientras que otros se han enfocado en establecer conexiones con el ejército, asegurando que los recursos lleguen a nuestros soldados. Quizás se pregunten: \"Trabajo en una firma de contabilidad, ¿por qué debería involucrarme en esto?\" Puede parecer un poco raro, pero les aseguro que es fundamental. El esfuerzo bélico necesita una amplia red de apoyo y la dedicación de cada americano. Nuestras fuerzas armadas están creciendo rápidamente y requieren urgentemente más personal para enfrentar cualquier desafío que surja en su expansión.\n\n\"Uno de esos desafíos es la interferencia empresarial. No señalamos a ninguna empresa en particular, pero sabemos que hay planes para eludir nuestras directrices, intentando, a través de supuestos errores de redondeo y otros métodos, evitar su participación en la guerra. Necesitamos la colaboración de todos los ciudadanos para asegurarnos de que esto no ocurra o, si sucede, que se detecte rápidamente. También debemos garantizar que nadie se beneficie indebidamente ni se apropie de los suministros valiosos de nuestras tropas para obtener ganancias ilícitas."
 bdnspch.24.a: "\"¡Su trabajo derrotará a los enemigos de la Democracia!\""
 bdnspch.24.b: "\"Tu-ahora, ayuda, sin tonterías...\""
 bdnspch.25.t: "Reuniendo a todos"
 bdnspch.25.d: "\"¡Hola, Filadelfia! Esta es la ciudad del amor fraternal, y durante mucho tiempo, fue un gigante de la industria americana. Aunque pasó por un período de declive, ahora está renaciendo, ¡y será más fuerte que nunca! Esta guerra ha dejado claro que muchas de las prioridades de los Gobiernos anteriores estaban completamente equivocadas: pensar que nuestros enemigos estaban lejos, en lugar de reconocer que estaban más cerca de lo que creíamos; creer que la industria podía trasladarse al extranjero sin consecuencias; y suponer que América podía soportar el desempleo. ¡No! Este país fue fundado para que cada persona pudiera buscar su felicidad; ¿cómo puede alguien ser feliz si no tiene trabajo? Ese fue el error de generaciones pasadas, y ojalá no hubiéramos tenido que pasar por una guerra civil para que D.C. lo entendiera, pero al menos estamos avanzando.\n\n\"Ahora, este país necesita producir bombas y tanques, pero cuando todo esto termine, ¡comenzaremos a reconstruirnos mejor que nunca! ¡Nuestro país volverá a ser un gigante de la industria mundial! Trataremos el desempleo como si fuera una pandemia de COVID-19; un virus, una enfermedad que debemos erradicar. Haremos que todos los hombres y mujeres tengan trabajo y nos aseguraremos de que reciban el cuidado infantil y la ayuda financiera que necesitan para criar a sus familias."
 bdnspch.25.a: "\"¡Vamos a poner a América a trabajar de nuevo!\""
 bdnspch.25.b: "\"Vamos a, este, pues, hacer...\""
 bdnspch.26.t: "Abordar a las corporaciones"
 bdnspch.26.d: "\"¡¿10.000 dólares por un rifle?! ¡¿En serio?! Así no vamos a ganar esta guerra. ¡Es porque en Wall Street no hay patriotismo! O al menos, eso parece. Durante toda la guerra, no hemos estatizado ni una sola empresa, ¡ni una! No hemos obligado a ningún líder corporativo a renunciar. ¿Y así es como nos retribuye el mundo empresarial? Es absurdo, es ridículo. Este país necesita la lealtad de cada hombre y mujer. ¡Tantos trabajadores han dado todo de sí produciendo equipo para nuestro Ejército, solo para que sus jefes nos lo vendan a un precio exorbitante!\n\n\"Por esto, y por muchas otras razones; por los miles de refugiados de guerra que han sido explotados, por los soldados que han caído por falta de munición, por las ciudades sin agua, firmaré el Acta Nacional Antiextorsión. Esta ley pondrá a todas las corporaciones bajo una supervisión más estricta, con un funcionario federal a cargo de cada gran empresa que esté contribuyendo al esfuerzo bélico. Harás tu parte por nuestro país..."
 bdnspch.26.a: "...o nosotros tomaremos esa parte\"."
 bdnspch.26.b: "...o, o, puede - eeh...\""
 bdnspch.27.t: ""
 bdnspch.27.d: ""
 bdnspch.27.a: ""
 bdnspch.27.b: ""
 bdnspch.28.t: "Ganar la guerra digital"
 bdnspch.28.d: "\"La pérdida de Silicon Valley fue uno de los peores golpes que nuestro país ha enfrentado. En cuestión de días, los servidores de muchas de las principales empresas tecnológicas cayeron en manos de fuerzas maliciosas, que luego los usaron para propagar su agenda radical en el mundo digital. Sin embargo, el ingenio americano siempre encuentra la manera de salir adelante; reunidos en Washington, los mejores científicos e ingenieros informáticos de nuestro país lograron reconstruir sus redes casi desde cero, lo que nos permitió luchar en la guerra por internet en igualdad de condiciones.\n\n\"Hoy, estamos en un período de innovación aún más emocionante. La inteligencia artificial, los nuevos programas de comunicación y las tecnologías de drones nos brindan las herramientas necesarias para enfrentar esta guerra y obtener una ventaja crucial sobre nuestros adversarios. Incluso en tiempos de conflicto, América sigue siendo el corazón de la innovación global, el centro neurálgico de toda la tecnología que el mundo utiliza a diario. Con el apoyo de figuras como Mark Zuckerberg, Tim Cook y Bill Gates, estamos decididos a ganar esta guerra, no solo en el campo de batalla, sino también en el ámbito digital, previniendo ciberataques y otras actividades ilícitas\"."
 bdnspch.28.a: "\"¡Nuestro país retomará el internet!\""
 bdnspch.28.b: "\"Nues- bueno, uh, eeh...\""
 bdnspch.29.t: "Una América increíble"
 bdnspch.29.d: "\"La Sra. Walton quería que viniera aquí como un regalo para todos ustedes. La verdad es que hace un calor insoportable y todos están sentados ahí afuera, así que, sí, es un regalo. Quiero tomarme un momento para expresar mi agradecimiento. América está profundamente agradecida a todos los trabajadores de supermercados que han enfrentado una pandemia y ahora una guerra. Ustedes son los que aseguran que alimentos buenos, limpios y saludables lleguen a quienes más los necesitan. Están en la primera línea del racionamiento, lidiando con los frustrados para hacer cumplir las regulaciones necesarias que mantienen la comida para nuestros soldados y estabilizan nuestros suministros. No tengo palabras suficientes para agradecerles.\n\n\"Mi padre era un hombre muy trabajador. Siempre nos decía lo afortunados que éramos de vivir en América, donde podíamos ir a las tiendas y conseguir lo que necesitábamos, y mucho más. Nos enseñó a valorar ese privilegio. Es nuestra responsabilidad aquí en el gobierno proteger ese privilegio. Ustedes, junto con miles de personas como ustedes en todos los Estados Unidos, son quienes mantienen vivo el sueño americano."
 bdnspch.29.a: "\"Sin uds., estaríamos en una situación precaria\"."
 bdnspch.29.b: "\"Sin-bueno, je, es chistoso, muy chistoso...\""
 bdnspch.30.t: "Precaverse"
 bdnspch.30.d: "\"Compatriotas americanos, recientemente se han implementado regulaciones que afectarán significativamente su vida diaria. Como su presidente, debo explicar por qué son necesarias estas nuevas normas. Estamos en guerra, una guerra similar a la gran cruzada por la libertad que libramos contra las potencias fascistas en la Segunda Guerra Mundial. Durante esa guerra, los americanos tuvieron que renunciar a algunos recursos adicionales para que se pudieran destinar recursos cruciales a la industria y a los soldados. Se les emitieron tarjetas que indicaban cuánto y qué podían comprar. Se les indicó que donaran chatarra y otros instrumentos para apoyar el esfuerzo bélico. Les enviaremos recomendaciones similares.\n\n\"Sé que esto será un cambio. Conozco la frustración de tener que precaverse de las carencias. Pero sepan que, tengan lo que tengan, algún soldado que se encuentre en una fría trinchera en algún lugar de Nebraska o ambas Dakotas tendrá un día brillante. Los americanos se han enfrentado a mayores desafíos, y sé que tienen el coraje y la determinación para superarlos."
 bdnspch.30.a: "\"¡Solo con su ayuda ganaremos!\""
 bdnspch.30.b: "\"Lo-lo es, ahora mira...\""
 bdnspch.31.t: "¡Perforar!"
 bdnspch.31.d: "\"Cuando era niño, la industria americana estaba llevando al gobierno nazi a la tumba. De adolescente, era la envidia del mundo. Cuando me convertí en senador, aún seguía adelante, pero se le veían grietas. Ahora estoy en una nación que produce muy poco de lo que consume, que apenas puede alimentar el fuego de una pandemia mundial y una guerra. Si bien nos hemos esforzado por solucionar esto, no empieza construyendo fábricas. Empieza aquí, en una mina tradicional. Obtienen las materias primas no para la exportación, sino para la supervivencia de nuestra nación.\n\n\"Aunque parezca un poco de mi época, esta nueva mina será la fuente de miles de empleos y más, todo lo cual contribuirá a este esfuerzo bélico. ¡Cuando triunfemos, continuará operando, lo prometo! ¡Con su trabajo, derrocaremos al tirano de Denver y a los regímenes comunista y nazi!"
 bdnspch.31.a: "\"¡Clavarán la daga en el corazón de los autócratas!\""
 bdnspch.31.b: "\"Clavarán la, eh, bueno, este...\""
 bdnspch.32.t: "¡Bienvenidos, refugiados!"
 bdnspch.32.d: "\"Fue mi esposa, la Dra. Jill Biden, quien me alertó sobre la difícil situación de los refugiados que viven aquí en Maryland. Han enfrentado tantos desafíos: han perdido sus hogares por la violencia y han presenciado atrocidades. Admiro su resiliencia; todo el país los admira. ¿Y pensar que ni siquiera podemos acogerlos? Sé que algunos americanos excepcionales han ofrecido sus hogares, pero no es suficiente; toda la nación atraviesa momentos difíciles, todos luchan y pocos pueden permitirse el espacio. ¿Escuché que hace poco consiguieron tiendas de campaña?\n\n\"Bueno, eso se acaba. Hoy firmaré el Acta de Ayuda a los Refugiados, que les ayudará a ustedes y a miles de otros refugiados a obtener la ayuda que necesitan. Ampliaremos nuestras redes logísticas y crearemos administraciones desde el nivel local para reasentar y ayudar a los refugiados. Enviaremos alimentos y suministros médicos a las zonas necesitadas\"."
 bdnspch.32.a: "\"¡No los olvidaremos!\""
 bdnspch.32.b: "\"No-no-no los, bueno, un momento...\""
 bdnspch.33.t: ""
 bdnspch.33.d: ""
 bdnspch.33.a: ""
 bdnspch.33.b: ""
 bdnspch.34.t: "A las armas"
 bdnspch.34.d: "\"Muchos jóvenes no responden al llamado. Desafortunadamente, nuestras estaciones de reclutamiento están vacías, y solo el reclutamiento lleva a la gente al frente. Sé lo patriotas que son todos. Entiendo cómo se sienten al ver a sus familiares viviendo bajo la opresión de un loco, ver a sus compañeros radicalizados por campañas de desinformación de radicales, y vivir en los tiempos más locos que el mundo haya visto jamás. ¡Joder! Nací cuando Hitler estaba en el poder y creo que ustedes lo tienen peor.\n\n\"Eso significa que necesitamos grandes ideas, y sé que todos ustedes las tienen. Sé que quieren ayudar a su país y quieren verlo unido y fuerte de nuevo. Pero las viejas formas de hacerlo, de ir a la escuela o trabajar, ya no son suficientes. Las Fuerzas Armadas los necesitan a ustedes y a sus ideas ahora más que nunca. Necesitamos ingenieros, mecánicos de aviación y soldadores. Necesitamos a los pocos y valientes en el frente. Necesitamos oficiales y administradores. Sobre todo, necesitamos que más americanos respondan al llamado de su país\"."
 bdnspch.34.a: "\"¡Creo que todos responderéis!\""
 bdnspch.34.b: "\"Pero el teléfono, bueno, suena, y, eeh...\""
 bdnspch.35.t: "Combatiendo a los trolls"
 bdnspch.35.d: "\"Por demasiado tiempo el internet ha propagado odio y división. Hemos permitido la creación de subculturas que llevaron a los jóvenes al abismo; ¿Cuánta gente esta dispuesta a morir por el tirano en Denver porque fueron radicalizados en aquellos chats? Las fuerzas del amor y la unidad no tuvieron respuesta, hasta que en los días más oscuros de la primera administración, cuando nació el hashtag Resistencia. Usando sus plataformas para oponerse a sus maquinaciones y corrupción, se aseguraron de que sus negocios con nuestros enemigos extranjeros saliesen a la luz. Es un honor para mi recibirlos en la Casa Blanca.\n\n\"Solo puedo ver a chicos como Harry Sisson y Dash Dobrofsky como modelos a seguir para los jóvenes. Ellos son acérrimos patriotas americanos, no nacionalistas, que odian, si no patriotas, gente que ama. Hombres, padres como el Sr. Padellan aquí presente, conocido como BrooklynDad en las redes, madres y abuelas como Allison Gill, cuyo podcast ayudó a aclarar las terroríficas revelaciones procedentes del Reporte Muelle, son modelos de ciudadanos preocupados que toman acciones. Solo espero que más americanos tomen a ellos como modelo, y combatir la propaganda vendida por el tirano y sus aliados\"."
 bdnspch.35.a: "\"¡No tengan miedo de hablar la verdad!\""
 bdnspch.35.b: "\"Y estos niños-tusabes-cuando yo era un niño... entonces...\""
 bdnspch.37.t: ""
 bdnspch.37.d: ""
 bdnspch.37.a: ""
 bdnspch.37.b: ""
 bdnspch.38.t: "América, la Bella"
 bdnspch.38.d: "\"Estando aquí en el hogar del gran Thomas Jefferson, su querido Monticello, siento más que nunca el peso de nuestras generaciones pasadas. Los sueños y esperanzas de nuestros antepasados revolucionaros se han hecho realidad, no del todo en su tiempo, y no sin derramamiento de sangre, esfuerzo y divisiones políticas. Las esperanzas puestas en la Declaración de Independencia no fueron plasmadas en la América de 1776, 1789 o 1865; Los americanos no eligieron a sus senadores hasta 1913; Las mujeres no pudieron votar hasta la aprobación de la 19º Enmienda y tomó hasta 1964 para que los afroamericanos tuviesen los derechos civiles que se les prometieron. Aún si América hizo todo eso, ¡Cumplimos la promesa, y lo seguiremos haciendo!\n\nAmérica es una idea, una hermosa idea en la que hombres y mujeres de cualquier estilo de vida, etnia, cultura y creencia pueden venir juntos y prosperar. Lo que los Padres Fundadores solo tenían una idea está encarnado en América; da igual si uno es transgénero, negro, homosexual o hispano, si es rico o pobre; todos pueden prosperar, y todos deben tener la capacidad de prosperar. Esto es el sueño americano, es real, y es vivido todos los días por emprendedores, trabajadores sociales y padres por todo el país\"."
 bdnspch.38.a: "\"Y cuando reconstruyamos, este sueño se hará realidad\"."
 bdnspch.38.b: "\"Y Jefferson-uh, pero sus esclavos-construyeron esta gran casa...\""
 bdnspch.39.t: "¡Respeta las tropas!"
 bdnspch.39.d: "\"Los Estados Unidos se enfrentan a su mayor desafío hasta ahora, y todos ustedes han respondido al llamado. Los valores más preciados de nuestra nación están bajo ataque por todos lados; comunistas, fascistas y las fuerzas de la Dictadura de Denver han dejado de lado incluso la apariencia de democracia, exigiendo abiertamente la disolución de nuestro sistema en favor de una tiranía autoritaria y simplificada. Ustedes han sido testigos de sus atrocidades y, de inmediato, buscaron maneras de prevenirlas. Conocieron las privaciones que sufrieron sus compatriotas americanos en territorio ocupado por el enemigo y se ofrecieron como voluntarios en el mayor proveedor de ayuda del país. Quisieron defender los valores que han hecho de nuestra República la más grandiosa que el mundo haya visto. ¡Han hecho todo esto y mucho más!\n\n\"Sin embargo, hay quienes creen que son menos que criminales, incluso criminales. He escuchado a políticos menospreciar sus sacrificios, calificando sus acciones heroicas de innecesarias e incluso \"crueles\". Los manifestantes marchan por nuestras calles, exigiendo la paz con los terroristas que les declaran la guerra a ellos y a todos los demás americanos. Recuerdo cómo trataron a mi hijo Beau cuando sirvió en la guerra de Irak, disculpen. Conozco el dolor de luchar por los derechos humanos y regresar a casa con eso. Les digo esto: no vamos a ceder ante ellos. Lucharemos en esta guerra y ganaremos\"."
 bdnspch.39.a: "\"Siempre respetaremos a nuestras tropas y nunca olvidaremos sus sacrificios\"."
 bdnspch.39.b: "\"Y-yo, bueno, yo, no haré, uh, pues, lo que has hecho...\""
 bdnspch.40.t: "Una oportunidad igualitaria"
 bdnspch.40.d: "\"Cada día me sorprenden los logros de las mujeres americanas. A pesar de haber sido tratadas como ciudadanas de segunda clase durante gran parte de la historia, han alcanzado la cima en la ciencia, el gobierno y los negocios en cuanto se liberaron de las prácticas injustas. A lo largo de la historia, la opresión de las mujeres se justificó como algo necesario, supuestamente por su propio bien. Se pensaba que eran demasiado ingenuas y maleables para ser tratadas como iguales. Se decía que su lugar estaba en el hogar, y aunque allí se desempeñaron muy bien, sus talentos también podrían haberse aprovechado en otros ámbitos.\n\n\"Entonces, ¿qué es lo que impide que las mujeres se unan a las Fuerzas Armadas? Intenta justificarlo sin caer en la mentalidad de esos viejos que creían que las mujeres no podían trabajar y vivir solas, que no podían poseer propiedades o dirigir negocios. Te desafío a hacerlo. Las mujeres son igual de responsables, si no más, que los hombres. La ciencia nos dice que las mujeres son mejores líderes que muchos hombres y que son excelentes trabajando en equipo\"."
 bdnspch.40.a: "\"¡Precisamente es el tipo de espíritu que necesitamos en nuestro ejército!\""
 bdnspch.40.b: "\"¡Las mujeres pueden morir igual que cualquier hombre!\""
 bdnspch.41.t: ""
 bdnspch.41.d: ""
 bdnspch.41.a: ""
 bdnspch.41.b: ""
 bdnspch.42.t: "Ni un paso atrás"
 bdnspch.42.d: "\"En tierra, mar y aire, nuestras fuerzas luchan por Nuestra Democracia. Nunca en ningún lugar del mundo un conflicto ha sido tan importante. Si perdemos esta batalla, dejaremos a nuestro país a merced de un tirano, fascistas, comunistas, o peor. Hemos logrado tantos avances que han permitido a muchos americanos volver a abrazar a sus familias, que muchas ciudades y pueblos hayan sido liberadas y que hayamos acabado con muchos criminales de guerra. Aun así hemos sufrido grandes pérdidas: Las praderas quemadas, los tesoros nacionales bombardeados por terroristas e incontables vidas de soldados. Ninguna de las cuales será en vano, mi hijo, quiero decir, veo a cada soldado como a mi hijo, no murió en vano.\n\n\"Puede que hayan oído a reporteros imprudentes, propaganda enemiga y ciudadanos confundidos esparciendo rumores y burlándose sobre nuestras supuestas derrotas. Puede que tengamos que ceder terreno, pero no sin dar una buena lucha antes. Puede que perdamos ciudades, pero no antes de asegurar que no quede nada que nuestros enemigos puedan aprovechar tras nuestra retirada. Puede que canten victoria, pero haremos que hasta nuestras retiradas sean dolorosas para ellos. Ellos dicen que estamos a la defensiva, pero nosotros no hemos hecho más que empezar. Ahora mira...\""
 bdnspch.42.a: "\"¡Si tu crees en la victoria, apóyanos!\""
 bdnspch.42.b: "\"Si tu, no, uh, ponte, umm, ponte...\""
 bdnspch.43.t: "Los neutrales: Los criminales"
 bdnspch.43.d: "\"No hay peor hombre que no hace nada frente a la maldad que se le presenta frente suya. Para muchos americanos, quienes sufren las carencias infligidas por esta horrible guerra y la tiranía del hombre responsable de esta, la idea de que uno puede ser neutral es absurdo. O bien eres un sirviente del tirano o eres un hombre democrático, ¡No hay punto medio!\n\n\"Muchos \"genios\" quieren hacer que tratemos a su aspirante a rey con suma delicadeza. Ellos creen que se saciará si le dejamos hacer lo que le plazca durante un tiempo. ¡Falso! Volverá una y otra vez, y el fanatismo que define al gobierno de Denver infectará permanentemente a nuestro país. No podemos actuar como si esto fuese una guerra entre dos facciones similares. Esta es una guerra entre el mal, el odio y el miedo por una parte, y el bien, amor y la esperanza de la otra parte. No hay una tercera opción por encima de las otras; Esta es una guerra por Nuestra Democracia, nuestros derechos y nuestro futuro\"."
 bdnspch.43.a: "\"¡Y estos son indispensables!\""
 bdnspch.43.b: "\"Y esta, eeh- guerra será...¡todas las guerras!\""
 bdnspch.44.t: "Una guerra sin ganar"
 bdnspch.44.d: "\"Quiero agradecer a la Universidad de Tennessee por darme la oportunidad de hablar con ustedes esta noche, aunque debo admitir que me siento un poco abatido. Acabo de terminar una llamada con mi Secretario de Estado, Lloyd Houston, y me acaban de informar que mil hombres han desaparecido en el frente. Hoy ha sido un día realmente sangriento. Mil hombres, ¿pueden imaginarlo? Muchos de ellos eran jóvenes, como ustedes. Tuve la oportunidad de conocer a algunos de ellos. He hablado tantas veces ante soldados. Es increíble lo que el enemigo nos ha hecho sufrir, lo que está haciendo sufrir a nuestro país. ¿Y todo esto, para qué? ¿Qué esperan lograr cuando todo está en ruinas?\n\n\"No dejaremos que esto pase desapercibido. Cuando finalmente salgamos victoriosos, todo esto será vengado. Aquellos que se creen intocables, que se valen de la intimidación, las mentiras y las amenazas, tendrán que rendir cuentas por todo el daño que han causado. Los traidores serán expulsados de sus refugios y su memoria será borrada de esta tierra. Recuerden mis palabras: venceremos\"."
 bdnspch.44.a: "\"¡Y cuando lo hagamos, ellos pagarán!\""
 bdnspch.44.b: "\"Y, si, bueno, cuando, eeh, ellos...\""
 bdnspch.45.t: "La lucha en el aire"
 bdnspch.45.d: "\"Hoy me dirigo a ustedes con una petición solemne. Como bien saben, nuestra nación está atravesando una crisis sin precedentes que nos afecta a todos. La dura realidad es que cada día somos testigos de la pérdida de vidas, tanto de soldados como de civiles. Es probable que algunos de ustedes sientan este sufrimiento de manera personal, con familiares o amigos que están enfrentando dificultades inimaginables en este momento. En tiempos como estos, cuando la situación puede parecer abrumadora y la esperanza se siente lejana, es fundamental recordar por qué estamos en esta lucha. No solo estamos defendiendo nuestro hogar; luchamos por algo mucho más significativo. Luchamos por la libertad, por la preservación de la democracia y por el derecho de cada persona a vivir en paz y armonía.\n\n\"Nuestras tropas en el terreno están en la primera línea, enfrentando batallas intensas y haciendo sacrificios enormes. Son ellos quienes llevan el peso del conflicto, abriendo el camino hacia la causa mayor que todos valoramos. Su valentía y determinación son la base de las victorias que tanto anhelamos. En este momento crucial, les pido que brinden su apoyo incondicional a estos valientes hombres y mujeres. Su papel, aunque conlleva sus propios desafíos y tensiones, es de vital importancia. Los esfuerzos aéreos que realizan no son solo tácticas, sino elementos esenciales de nuestra estrategia general. Su trabajo tendrá un impacto monumental en las batallas futuras que enfrentamos, y cada misión que llevan a cabo es crucial para definir el rumbo de esta guerra. Recuerden que su dedicación y esfuerzo son fundamentales para nuestro éxito colectivo. Cada vuelo, cada misión y cada instante de trabajo contribuyen a un propósito mayor y nos acercan a alcanzar nuestros objetivos comunes. Si permanecemos unidos, impulsados por los valores que apreciamos y la causa que defendemos..."
 bdnspch.45.a: "¡y sus esfuerzos serán recordados por siglos!\""
 bdnspch.45.b: "y-y- su...lejos dentro de...recordado...eh\"."
 bdnspch.46.t: "Los limites y empujando al más allá"
 bdnspch.46.d: "\"Pilotos recién graduados del 1er Ala de Caza, primero que nada, quiero felicitarles de todo corazón por alcanzar este gran logro. Completar su entrenamiento es un verdadero desafío; ha requerido incontables horas de esfuerzo, dedicación y perseverancia. Han superado muchos obstáculos, y hoy son un reflejo de su valentía y determinación. Estoy realmente orgulloso de cada uno de ustedes. Ahora, dejando a un lado los elogios, hablemos con sinceridad. El camino que tienen por delante no será sencillo. Sus futuros trabajos, las misiones que realizarán, cada asignación que emprendan, los pondrá a prueba de maneras que quizás no pueden imaginar. Habrá momentos de estrés, peligro y la posibilidad de consecuencias serias. Hay mucho en juego, y se enfrentarán a situaciones que desafiarán su resistencia y coraje. No tengo duda de que muchos de ustedes sienten nervios y anticipación. Créame, si estuviera en su lugar, también sentiría lo mismo. Sus límites serán llevados al extremo, y más allá. Y, aun así, aquí están, listos para enfrentar los retos que les esperan.\n\n\"Esto es lo que realmente llamo valentía: el coraje que se muestra frente al miedo y a la adversidad. Es precisamente este tipo de coraje el que les animo a que cada uno de ustedes adopte mientras avanzan. Deben enfrentar cada desafío con determinación, sin importar cuán abrumador pueda parecer. Cada día traerá nuevos obstáculos y dificultades, pero es al superarlos que alcanzarán la grandeza. Lo que hagan será extraordinario y dejará una huella en el futuro de nuestra Fuerza Aérea y nuestra Unión. Recuerden, la importancia de superar sus propios límites es innegable. No hacerlo podría llevar a situaciones desesperadas, de las que tal vez no haya una salida fácil. Sus acciones no serán olvidadas; se recordarán como un reflejo de su compromiso y valentía. Para concluir, les dejo con su lema, una frase que captura la esencia de su trayectoria y el espíritu con el que deben enfrentar cada reto. Que sea una guía mientras avanzan, dejando su marca como pilotos de élite del 1er Ala de Caza\"."
 bdnspch.46.a: "\"Aut vincere aut mori; conquistar o morir\"."
 bdnspch.46.b: "\"Auto v-vin...vincere, aut...m-...ori\"."
 bdnspch.47.t: "Los aviones de la democracia"
 bdnspch.47.d: "\"Trabajadores de esta estimada fábrica, hoy me presento ante ustedes para hablar de un tema que realmente importa. Su trabajo aquí no es solo un empleo; es una contribución vital a algo mucho más grande que nosotros: la causa de la democracia. Lo que tenemos por delante requiere más que solo esfuerzo; necesita un compromiso y sacrificio excepcionales. Los aviones que ensamblan con tanto cuidado, los misiles que diseñan, la munición que almacenan: cada uno de estos elementos es fundamental en nuestra lucha constante. Sé que han trabajado sin descanso, dedicando su energía a cada pieza, y por eso les estoy muy agradecido. Sin embargo, la seriedad de nuestra situación demanda un esfuerzo aún mayor. La Unión lo exige, y nuestro futuro depende de ello.\n\n\"La batalla en los cielos es feroz y constante. Aunque ahora tenemos una ventaja, nuestros enemigos cuentan con los recursos necesarios para desafiar nuestra superioridad numérica. Además, pueden mejorar sus tácticas, lo que a menudo deja a nuestros pilotos en desventaja. Un solo avión más en medio del combate puede cambiar drásticamente el resultado de cualquier misión, inclinando la balanza a nuestro favor. Por eso, es crucial que superemos nuestras limitaciones actuales. Sé que esta solicitud no es sencilla. Implica pedirles que se esfuercen más, que alarguen su jornada laboral, que den un poco más de sí mismos: su sudor, su sangre y sus lágrimas. Los sacrificios que hacen aquí no son en vano; son una inversión directa en el futuro de nuestra nación, en la seguridad y el bienestar de sus familias, y en la promesa de un futuro mejor para cada uno de ustedes. Este es un momento decisivo en nuestra historia, y su contribución es esencial. La fuerza de nuestra determinación y la calidad de nuestro trabajo no solo determinarán el éxito de nuestras misiones, sino también la esencia misma de nuestros ideales democráticos. Les pido, más que nunca, que estén a la altura de este desafío. Juntos, podemos asegurar un futuro donde nuestros valores prevalezcan y nuestra nación se mantenga fuerte\"."
 bdnspch.47.a: "\"¡No defrauden a la Unión!\""
 bdnspch.47.b: "\"Yo...eh...más a-a-aviones\"."

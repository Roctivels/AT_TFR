 USB_mqwallbreaker_cat: "MQWALLBREAKER"
 USB_mqwallbreaker_cat_desc: ""
 USB_project_babel_cat: "Proyecto Babel"
 USB_project_babel_cat_desc: "\n\n\n\n\n£GFX_USB_project_babel_cat\n\n\n\n\n\n\n\nEnterrado bajo las justificaciones públicas de la tercera guerra del golfo yace un motivo aún más profundo: el Proyecto Babel. Dirigido por los Cognoscenti a través de intermediarios en el Pentágono, la CIA y laboratorios corporativos, el Proyecto Babel es la culminación de décadas de investigación secreta sobre la llamada protolengua sumeria, el código primordial del que nació el primer lenguaje escrito. Es la superarma más terrible de los Cognoscenti, que pretende desplegar en las guerras finales para construir un Nuevo Orden Mundial.\n\nLa Plaga Neurolingüística, por así decirlo, será un desarrollo que empequeñecerá a la bomba atómica en su alcance y crueldad; un arma de un horror tan inmenso e inimaginable que el poder de los Cognoscenti estará asegurado. Otorgará a los Cognoscenti poder sobre las leyes y conceptos fundamentales que rigen el lenguaje y el pensamiento humano en su conjunto. En cierto sentido, es un arma de puro significado.\n\nPero antes de que pueda desatarse sobre el mundo, los Cognoscenti deben primero recolectar \"MEs\" fragmentarios, las verdades innatas del lenguaje humano, de las ruinas de Mesopotamia, para reordenar estas piezas en un todo coherente. Además, deben asegurar y reconstruir los restos del Nam-Shub de Enki, un contra-patrón neurolingüístico sumerio que los arqueólogos de los Cognoscenti creen que una vez se usó para restaurar el lenguaje después del diluvio. Con él, los Cognoscenti pueden inocular a los suyos contra los efectos de la Plaga.\n\n§OPROGRESO DE LA PLAGA NEUROLINGÜÍSTICA: [USB_NLP_scripted_loc]\n§Y[?USB_babel_me_var]/3§! MEs\n§Y[?USB_babel_language_fragment_var]/5§! LENGUAS\nDATOS: [USB_data_scripted_loc]\nENSAYOS HUMANOS: [USB_human_trials_scripted_loc]\nNAM-SHUB DE ENKI: [USB_nam_shub_scripted_loc]\nINOCULACIONES: [USB_inoculations_scripted_loc]§!"
 USB_clueless: "§CDESINFORMADO§!"
 USB_clueless_text: "§gMantenemos al público dócil con el pan y circo continuos que les hemos ofrecido. Para ellos, su democracia no solo es sana, sino que prospera. Precisamente ahí es donde queremos que estén: constantemente distraídos, protegidos del alcance de nuestro gobierno como un niño. Para mantener la farsa que estamos representando para ellos, debemos asegurarnos de que permanezcan en este estado pacificado.§!"
 USB_unaware: "§7INCONSCIENTE§!"
 USB_unaware_text: "§gAunque el público no está completamente pacificado por la farsa que les hemos montado, todavía desconocen el alcance total de nuestras acciones, o incluso nuestra existencia. Sin embargo, la sospecha es una pendiente resbaladiza; si seguimos sin aliviar la preocupación del público, entonces podrían volverse peligrosos; las medias tintas no son una opción.§!"
 USB_suspicious: "§YSOSPECHOSO§!"
 USB_suspicious_text: "§gCuando la realidad no es lo que parece, entonces tira del alma. Algunos quizás no puedan expresar estos sentimientos con palabras, o incluso formularlos en pensamientos, pero aún así permanecen. El caos se está extendiendo por la conciencia pública, creciendo como un tumor. Debemos detener esto de inmediato antes de que levanten el velo y revelen nuestra gobernanza al mundo.§!"
 USB_conspiratorial: "§OCONSPIRANOICO§!"
 USB_conspiratorial_text: "§gSe está a punto de alcanzar un descontento crítico. El pan y circo que mantenía dócil al público se ha vuelto ineficaz y aburrido.\n\"¿Quién está realmente causando todos estos tiroteos?\" \"¿Qué hay realmente en el agua que bebo?\" \"¿Quién controla realmente lo que se ve en la televisión?\" El signo de interrogación es el símbolo más venenoso del lenguaje humano: corroe todo lo que creamos, permite que el Caos se extienda como una enfermedad y alimenta el Fuego. Necesitamos corregir el rumbo de inmediato para que se mantenga el Orden.§!"
 USB_offthehook: "§tFUERA DE CONTROL§!"
 USB_offthehook_text: "§gEl público sabe demasiado, el Orden se está desmoronando a nuestro alrededor, el anzuelo con el que los teníamos se ha podrido hasta convertirse en polvo, y la conciencia colectiva está siendo consumida por el Caos. Se necesita una acción drástica de forma absolutamente inmediata; todo por lo que hemos trabajado no puede ser en vano. Tomamos el control del Gobierno de Washington cuando su incompetencia casi nos lleva a la ruina, tomamos el control de las élites y formamos los Cognoscenti, y tomaremos el control ahora.§!"
 USB_nonexistent: "§CINEXISTENTE§!"
 USB_nonexistent_text: "§gMientras amanece en nuestra nación, la gente se despierta y sigue con su día. De DC a Chicago, las calles están en Orden; pacíficas, casi. Es casi como si la Guerra Civil no hubiera ocurrido: no hay susurros de rebelión, ni planes murmurados contra el Estado, ni disidentes antisociales deambulando. Esto es exactamente lo que necesitamos para mantener al público obediente, pero debemos permanecer alerta: la actividad extremista prospera con la complacencia.§!"
 USB_low: "§GVISIBLE§!"
 USB_low_text: "§gUna vez más, la plaga del extremismo americano está empezando a asomar su fea cabeza. Lentamente, los disidentes antisociales están empezando a sentirse cómodos compartiendo complots con sus compañeros extremistas. Algunos dirán que esto es normal para una sociedad moderna, incluso aceptable; pero siempre es una pendiente resbaladiza y si queremos evitar la tiranía de las masas, entonces debemos aplastar a estos disidentes antisociales.§!"
 USB_moderate: "§HMODERADA§!"
 USB_moderate_text: "§gNuestra nación está cayendo lentamente en las garras del Fuego ascendente. Las conspiraciones susurradas, ideadas por los extremistas antisociales, se están poniendo en marcha. Bombardeos, tiroteos, atrocidades de la más alta escala. Para América, después del inicio de la Guerra Civil, esto podría considerarse moderado, pero el público ya está empezando a sentir el efecto de estas actividades en su vida diaria. El Orden se basa en un público sumiso y contento, y si se corre aún más el telón, podría ser nuestro fin.§!"
 USB_high: "§OALTA§!"
 USB_high_text: "§gNuestra Mascarada se basa en la voluntad del público de obedecer, y en que el Orden se aplique de forma absoluta. Estamos fallando en ambos frentes. La actividad extremista ha crecido sin control, las calles están sumidas en el Caos, los ataques terroristas son diarios y el público empieza a impacientarse con la falta de ley y Orden. Necesitamos tomar medidas inmediatas contra estos parásitos antisociales para tener alguna posibilidad de restaurar el Orden en nuestro país.§!"
 USB_outofcontrol: "§dFUERA DE CONTROL§!"
 USB_outofcontrol_text: "§gEstamos conduciendo un coche sin volante; las actividades de los extremistas han crecido hasta alcanzar una masa crítica. Bombas detonando en cada esquina, plomo esparcido por las calles y disidentes antisociales tramando más terror. Estamos en la misma posición que el Gobierno de Washington antes de que tomáramos el aparato estatal; no hemos logrado tomar las riendas de nuestro Estado y no hemos logrado contener la llama creciente. El único camino a seguir es a través de acciones drásticas contra aquellos que desearían ver el mundo sumido en el Caos. Debemos recordar que somos un faro de Orden en un mundo consumido por el Fuego, no permitiremos que este sea nuestro fin.§!"

 USB_treason_punishable_by_death_category: "Traición castigada con la muerte"
 USB_treason_punishable_by_death_category_desc: "\n\n\n\n\n£GFX_USB_treason_trials_picture\n\n\n\n\n\n\n\n\"Amo la traición pero odio al traidor\". - Julio César\n\nDesde los albores de la humanidad, un hermano ha traicionado a otro por intereses personales. La traición es una profunda influencia en la vida americana, pues fue el fundamento mismo de América el que se construyó sobre la traición al Rey. Cuando América fue fundada, el pueblo confió no en el gobierno, sino en sus funcionarios electos, para que hicieran lo mejor para la ciudadanía y el país. Con el paso del tiempo y el dinero se infiltrando en las raíces del Árbol de la Libertad, sus ramas se marchitaron, y solo llevaron veneno.\n\nNosotros, los verdaderos herederos de América, hemos visto muchas variedades de traidores corruptos y los hemos vencido a todos, y ahora los juzgaremos por sus pecados."
 USB_war_of_the_wards_category: "Guerra de los distritos"
 USB_war_of_the_wards_category_desc: "\n\n\n\n\n£GFX_USB_caligula_war_of_the_wards_cat\n\n\n\n\n\n\n\nNuestro hermoso país finalmente está libre de bárbaros y se ha reinstalaado un gobierno basado en el orden que perdurará por siempre.\n\nEl obsoleto y en gran medida desleal sistema federal que permitió que la mitad del país fuese tomado por traidores ha sido reemplazado por un mucho mejor y leal sistema de distritos dirigidos por los más valientes de América - El Pentágono.\n\nSin embargo, esto no significa que la lucha por el alma de la nación haya terminado. Aunque el presidente ha elegido a Mark Milley como el principal guardián para guiar a América, al igual que en los viejos tiempos, los otros generales han reunido a sus ejércitos para desafiar a nuestro legítimo gobierno.\n\nReabrid los silos y cargad vuestras armas. Esta vez se decidirá el verdadero campeón de América.\nSolo puede haber uno.\n\n\n§ROBJETIVOS PRINCIPALES§!:\n\n§YDISTRITO DE AQUILES§!:[GLOBAL.get_ward_achilles_status]\n§YDISTRITO DE AJAX§!:[GLOBAL.get_ward_ajax_status]\n§YDISTRITO DE HÉCTOR§!:[GLOBAL.get_ward_hector_status]\n§YDISTRITO DE ODISEO§!:[GLOBAL.get_ward_odysseus_status]\n§YDISTRITO DE TESEO§!:[GLOBAL.get_ward_theseus_status]\n[get_barron_rebellion_status]"

 USB_fighting_for_democracy_category_desc: "Amogus"
 USB_appalachain_insurgency: "Insurgencia rural"
 USB_appalachain_insurgency_desc: "\n\n\n\n\n£GFX_USB_countryside_insurgency_cat\n\n\n\n\n\n\n\nA pesar de controlar gran parte del Atlántico Medio en teoría, en la práctica, la Unión de América tiene poco control del país más allá de las ciudades y las carreteras principales. En las zonas rurales, numerosas milicias pro-Trump acechan, tendiendo emboscadas a los desprevenidos convoyes federales que se dirigen a abastecer a las tropas en el Medio Oeste. En el centro de esta insurgencia planificada se encuentra Virginia Occidental, cuyo terreno montañoso es perfecto para este tipo de traición.\n\nAsegurar el control de Virginia Occidental es crucial para el esfuerzo bélico, ya que su ubicación en medio del corredor Washington-Chicago sirve como un importante punto de tránsito para los suministros que se dirigen al frente.\n\nACTUAL NIVEL DE INSURGENCIA: §Y[?USB_insurgency_level]§!"

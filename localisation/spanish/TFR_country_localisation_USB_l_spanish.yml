 USB_dumb_modifier: "D.U.M.B."
 USB_the_blood_dynamic: "Las megacorporaciones"
 USB_the_blood_dynamic_desc: "Cuando comenzó la Segunda Guerra Civil Americana, algunas corporaciones no huyeron a las colinas. En cambio, vieron una oportunidad de obtener ganancias: estas empresas pronto compraron todo lo que se podía comprar. Ya sea comida para consumir, propiedades para vivir, medicinas para curar, estas corporaciones pronto se convirtieron en gigantes económicos.\nHoy, son la \"Sangre\" de los Cognoscenti, las megacorporaciones son las empresas que ayudan a mantener el control económico del Estado Profundo sobre los Estados Unidos. Con sus vastas compras de propiedades estadounidenses, empresas agrícolas y fabricantes de medicamentos, el ciudadano promedio depende de BlackRock, Pfizer y Bayer-Monsanto incluso para sobrevivir el día a día. Además de esto, los niveles glotones de ganancias que se disfrutan de este monopolio han contribuido a los ambiciosos planes de los Cognoscenti."
 USB_the_body_dynamic: "La Comunidad de Inteligencia"
 USB_the_body_dynamic_desc: "Así como la Sangre y la Mente no serían nada sin un Cuerpo que las mantuviera, las megacorporaciones y el complejo militar-industrial no serían nada sin la Comunidad de Inteligencia que los guiara.\nEl \"Cuerpo\" de los Cognoscenti, la Comunidad de Inteligencia se ha opuesto durante mucho tiempo al creciente Fuego, planeando contingencia tras contingencia en caso de que lo peor llegara a suceder. Sin ellos, la Unión habría caído en completo desorden, siendo ellos críticos en el establecimiento del gobierno paralelo de Biden para oponerse a los trumpistas en Denver. Cuando la debilidad del Gobierno de Washington llegó a su punto álgido, la comunidad de Inteligencia se aseguró de que América no terminara en anarquía militar. Ahora, con el aparato del Estado firmemente en sus manos, el Orden será restaurado en el mundo una vez más. Las medias tintas son inaceptables."
 USB_the_mind_dynamic: "El complejo militar-industrial"
 USB_the_mind_dynamic_desc: "El complejo militar-industrial fue una vez uno de los apéndices más cruciales del Estado profundo, manteniendo a las tropas de América armadas y listas para sofocar cualquier amenaza. Pero cuando comenzó la Guerra Civil, las armas de América se volvieron hacia adentro, y el CMI cayó en el caos junto con el país. Pero con los Cognoscenti en el poder, el complejo militar-industrial ha resurgido de las cenizas como un fénix.\nEl complejo militar-industrial es la \"Mente\" de los Cognoscenti, impulsando su dominación tecnológica, así como un amplio suministro de municiones y equipo para los soldados del aparato de seguridad nacional. A través de las mentes brillantes de DARPA, la Mente ha sido capaz de proporcionar al Estado profundo tecnología mucho más allá de sus expectativas, recibiendo la industria de defensa una amplia financiación a cambio. Esta simbiosis solo se fortalecerá a medida que los ojos de los Cognoscenti se vuelvan hacia el exterior."

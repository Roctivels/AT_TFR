 usb.58.t: "Biden dimite"
 usb.58.d: "Era un día normal, si es que todavía existía algo así en América. El presidente Biden subió al escenario de la Convención Nacional Demócrata, con paso lento y tambaleante, dirigiéndose por televisión a un público que incluía tanto amigos como enemigos. Era el momento de dirigirse al pueblo americano. Sin embargo, el presidente parecía tener dificultades para expresar una idea clara. El teleprompter falló por problemas técnicos, y desde sus primeras palabras, Biden luchó por mantener la compostura.\nMás tarde esa noche, con un profundo pesar pero sorprendente elocuencia, se dirigió a la nación desde la Oficina Oval:\n\n\"Mis compatriotas americanos,\nles hablo esta noche desde detrás del Escritorio Resolute en la Oficina Oval. En este espacio sagrado, estoy rodeado de retratos de presidentes americanos extraordinarios. Thomas Jefferson escribió las palabras inmortales que guían a esta nación. George Washington nos enseñó que los presidentes no son reyes. Abraham Lincoln nos instó a rechazar la malicia. Franklin Roosevelt nos inspiró a no dejarnos vencer por el miedo.\n\n\"Siento un profundo respeto por este cargo, pero mi amor por el país es aún mayor. Ha sido el mayor honor de mi vida servir como su presidente, pero la defensa de la democracia, que está en juego, es más importante que cualquier título. Me llena de fuerza y alegría trabajar para el pueblo americano, pero esta sagrada tarea de perfeccionar nuestra unión no se trata de mí. Se trata de ustedes, de sus familias, de su futuro.\n\n\"En las últimas semanas, he llegado a la conclusión de que es fundamental unir a mi partido en esta tarea tan importante. He decidido que la mejor forma de avanzar es pasar la antorcha a una nueva generación. Esa es la clave para unir a nuestra nación. Hay un momento y un lugar para la experiencia acumulada en la vida pública, pero también hay un momento y un lugar para nuevas voces, voces frescas y, sí, voces más jóvenes. Y ese momento y lugar es ahora\".\n\nEsta mañana, Biden presentó su renuncia de manera formal, cediendo el liderazgo a la vicepresidenta Kamala Harris. Las reacciones fueron mixtas: los críticos lo vieron como una señal de debilidad en una América ya vulnerable, mientras que sus aliados lo consideraron un acto noble de espíritu democrático."
 usb.58.a: "Fue un hombre americano..."
 usb.59.t: "Pensamientos y fuego"
 usb.59.d: "John Belov y su equipo ya habían estado en muchas misiones de fuego, pero hoy habían logrado un récord impresionante: ¡treinta y ocho misiones de artillería en un solo día! Cada una de ellas tenía como objetivo frenar el avance de las fuerzas unionistas sobre Denver y las llanuras que la rodeaban. Si lograban salir de esta guerra, cada uno de ellos tendría una historia increíble que contar a sus nietos.\n\nMientras tanto, John dio una calada a su cigarrillo, dejando escapar el humo mientras miraba su mortero M224, que era relativamente nuevo. El anterior había sido destruido en la batalla de Omaha; explotó cuando un A-10 Warthog ametralló su posición. John no pudo evitar reírse al recordarlo; ese día fue el colmo de tantos chistes que él y su equipo hicieron, sobre cómo Ben se asustó tanto que se hizo encima al escuchar el A-10, y cómo Abner se tragó su cigarrillo por accidente durante el ataque. Esos recuerdos lo llevaron a su infancia. Recordó cuando su familia se mudó de Moldavia a América en 2003, cuando él solo tenía dos años, cómo cambió su nombre de Artiom a John, pero mantuvo su apellido. También recordó su primer día de escuela, el resto de su infancia y adolescencia, y finalmente, su vida adulta.\n\nEmpezó a llorar mientras recordaba, con lágrimas en los ojos. Se secó las lágrimas y dio otra calada a su cigarrillo, pasándoselo a Ben cuando este le pidió uno. Miró al cielo; era de noche, pero aún podía escuchar los lejanos disparos y los fuertes retumbos de la artillería que hacían temblar el suelo. Para John, esos ruidos se habían convertido en una especie de melodía. Sin ellos, se sentía fuera de lugar.\n\nFinalmente, salió de su ensimismamiento al escuchar el familiar zumbido de... bueno, un zumbido. Con un aire de urgencia, alertó a su equipo sobre el sonido, y en cuestión de segundos, solo pudo oír los gritos de la gente corriendo en busca de refugio. El ruido del dron se acercaba cada vez más. Cuando finalmente llegó a su campamento, chocó contra un tanque de combustible del camión del equipo de mortero, provocando un incendio que se esparció rápidamente. John no tuvo suerte; quedó atrapado en el caos, y sus últimos momentos contrastaron drásticamente con la calma que había reinado solo un instante antes."
 usb.59.a: "Solo se encontró polvo en su lugar."
 usb.60.t: "Biden es nominado"
 usb.60.d: "A pesar de la preocupación por su salud, la impopularidad general de otros candidatos resultó ser una preocupación mayor para el CND. Con la nominación de Biden para un segundo mandato, funcionarios del CND, inquietos, rodearon al presidente mientras pronunciaba su discurso ante el CND. En un momento de relativa elocuencia, el presidente Biden mantuvo la compostura y pronunció un discurso unificador, evitando por poco caer del escenario una vez finalizado.\n\nSe recuperó, sonriendo, y se colocó sus características gafas de aviador antes de marcharse sin más incidentes. \"Puede que sea viejo\", declaró el presidente, \"¡pero no habré terminado hasta que pueda sumergir mis pies en la arena de California, Jack!\""
 usb.60.a: "¡Amamos a JOE!"
 usb.61.t: "La ONU embarga a Biden"
 usb.61.d: "Recientemente, se nos informó que las Naciones Unidas han impuesto un embargo generalizado a nuestro régimen, cortando de hecho toda interacción comercial y económica con gran parte de la comunidad internacional.\n\nEste embargo injustificado nos ha causado un daño considerable, ya que nos coloca en una situación extremadamente difícil. Nuestro último recurso vital, nuestros limitados vínculos económicos con el mundo exterior, se han visto interrumpidos, deteniendo el flujo de recursos vitales, suministros médicos, alimentos y equipos esenciales de los que nuestros ciudadanos y soldados dependen a diario. Además, nos impide acceder a los materiales y provisiones necesarios para continuar nuestra legítima lucha por la liberación de América.\n\nEste embargo no sirve a la justicia; más bien, profundiza el sufrimiento de nuestro pueblo y obstruye nuestro camino hacia la libertad. Hacemos un llamamiento a la comunidad internacional para que reconozca el daño que este embargo ocasiona y reconsidere el impacto de sus decisiones en quienes luchan por un futuro mejor."
 usb.61.a: "¡El mundo está contra nosotros!"
 usb.62.t: "La investidura de Bernie Sanders"
 usb.62.d: "Bernie Sanders, exsenador de Vermont, huyó a la Unión en avión tras el estallido de la guerra civil, donde se convirtió rápida y casi inmediatamente en el líder no oficial del sector progresista de la Unión. Aprovechando su base de apoyo ya existente, la campaña de Sanders tuvo un éxito asombroso, consiguiendo una gran cantidad de nuevos apoyos tanto entre liberales como progresistas, enfrentándose únicamente a una férrea resistencia por parte de los conservadores. Fue esta campaña y esta base de apoyo lo que le permitió ganar las elecciones con una cómoda mayoría. Sanders se sentiría tranquilo durante los meses previos a su investidura y, a pesar de la situación actual en América, no se sentiría nervioso ante su próximo papel, sino más decidido que nunca.\n\nY así, se paró en el podio de la Explanada Nacional, mirando a la multitud frente a él con una leve sonrisa. Todo había conducido a este momento; toda su vida había deseado algo así, y aunque la situación actual no habría sido la que un joven Sanders hubiera preferido, era lo que estaba consiguiendo. Un presidente fuerte ante lo peor que el mundo haya visto jamás."
 usb.62.a: "Y el no lo cambiaría."
 usb.64.t: "La investidura de Andrew Yang"
 usb.64.d: "Andrew Yang, quien fuera el candidato sorpresa de las primarias demócratas de 2020, se había trasladado rápidamente a la Unión tras el estallido de la guerra en Estados Unidos. Tras familiarizarse con algunas figuras políticas de la Unión, se ganó rápidamente una posición política estable. Fue cuando la idea de una segunda oportunidad presidencial se volvió demasiado tentadora para él, que se presentó a la carrera presidencial, donde logró establecer una sólida base de apoyo entre liberales y progresistas, enfrentándose a una fuerte resistencia por parte de los conservadores. Su relativa juventud, su amplia base de apoyo y sus nuevas ideas lo llevaron a la victoria electoral. Y aunque fue una lucha ardua, Yang había cumplido su sueño, incluso en su segundo intento.\n\nSin embargo, subió al podio de la Explanada Nacional no con alegría ni orgullo, sino con seriedad. El trabajo que le esperaba sería estresante, pero no se rendiría; haría realidad su sueño por completo. Derramó una pequeña lágrima antes de enjugársela rápidamente. Un presidente debe ser resiliente ante cualquier adversidad, y él no sería la excepción. Guardó su pañuelo en el bolsillo y comenzó su discurso."
 usb.64.a: "Porque tenía un sueño que seguir."
 usb.63.t: "La investidura de Michael Bloomberg"
 usb.63.d: "Bloomberg había tenido unos años irregulares, desde su candidatura a las primarias demócratas de 2020 hasta la actualidad. Cuando estalló la guerra civil, no fue diferente. Bloomberg huyó a la Unión y comenzó a ofrecer sus servicios al gobierno, ganando cada vez más poder. Su experiencia como asesor económico y exalcalde solo contribuyó a aumentar su poder a medida que comenzaba a operar y planificar la política nacional. Forjó relaciones más amistosas con los partidos de la Unión y finalmente forjó las suyas propias, uniéndose rápidamente a la coalición de gobierno conjunto. Con las elecciones acercándose, y su creciente popularidad, Bloomberg tomó la decisión de lanzarse a la contienda.\n\nAl final, Bloomberg ganó, y así se situó en el podio de la Explanada Nacional. Miles de ciudadanos se encontraban entre la multitud frente a él; no podía verles bien los ojos desde allí, pero estaba seguro de que todos lo miraban fijamente, esperando a que comenzara. Era extraño que ahora fuera presidente después de todo lo sucedido, pero no podía quejarse, ¿verdad?, después de todo, esto era lo que había deseado. Y así comenzó su discurso."
 usb.63.a: "Le había llevado un tiempo, pero por fin llegó."
 usb.65.t: "La investidura de Kamala Harris"
 usb.65.d: "En medio de la agitación unionista, derivada de los brotes de la agitación política en torno a la seguridad y la protección general de la presidencia, se creía que el ideal de un retorno estable a la normalidad nacional sería una tarea abrumadora. Sin embargo, tras muchos esfuerzos, la Unión logró recuperarse rápidamente con la elección de la venerada Kamala Harris. Harris, senadora y exvicepresidenta combativa, ascendió casi instantáneamente desde el Capitolio hasta la Casa Blanca tras la salida de Biden.\n\nSi bien su designación como presidenta se consideró un tema potencialmente controvertido, al señalarse que fue una decisión casi unánime en la convención, la Unión necesita urgentemente seguridad. Así, mientras Betsy Ross ondeaba en la ceremonia de investidura, una jubilosa Kamala, triunfante y decidida, una luchadora y una heroína potencial de América, y sin fuerzas, simplemente levantó su mano sin la Biblia y recitó el juramento."
 usb.65.a: "Una mujer de acero."
 usb.66.t: "La investidura de Alexandria Ocasio-Cortez"
 usb.66.d: "Ocasio-Cortez, exrepresentante del distrito 14 de Nueva York, tras huir de su ciudad durante el auge de la violencia antes de que estallara la guerra a gran escala, emergió como una de las muchas figuras políticas progresistas de la Unión. Tras consolidarse como tal, Ocasio-Cortez continuó defendiendo su postura política, consiguiendo el apoyo de numerosos progresistas, un número que rivalizaba con el de Bernie Sanders. Fue este apoyo y la creciente preferencia por los candidatos más jóvenes lo que la condujo tanto a su nominación como a su elección. Si bien su campaña enfrentó una férrea resistencia por parte de los sectores conservador y liberal de la población de la Unión, finalmente logró ganarse el apoyo de los escépticos, ganando las elecciones con una cómoda mayoría.\n\nAhora, en el podio de la Explanada Nacional, observa a la multitud y a la prensa que se extendía frente a ella, documentando el trascendental acontecimiento mientras el sol proyectaba un cálido resplandor sobre el mar de rostros, reflejando la esperanza y la anticipación de quienes se reunieron para presenciar la historia. Agradeció en silencio a quienes la habían llevado a ese momento y comenzó su discurso; su voz resonó por toda la ciudad de Washington."
 usb.66.a: "Un nuevo amanecer para la Unión."
 usb.67.t: "La investidura de Robert F. Kennedy Jr."
 usb.67.d: "Robert F. Kennedy, sobrino del recordado John F. Kennedy, ya residía dentro de las fronteras de la Unión cuando estalló la Guerra Civil. Inició rápidamente su carrera política al unirse al Partido Demócrata y ascendió al poder con el tiempo, enfrentándose a numerosos desafíos en el camino. Fue uno de los primeros en iniciar la campaña presidencial, consiguiendo una amplia base de apoyo, tanto conservadores como liberales, mientras que los progresistas lo desestimaron. Pero sus lazos familiares, su base de apoyo y sus políticas centristas le dieron la victoria en una reñida batalla. Pronto se convertiría en el segundo Kennedy en la presidencia, y no podría estar más feliz.\n\nSe encontraba en el podio de la Explanada lNacional, mirando no a la multitud frente a él, sino al cielo azul despejado que lo cubría. Era una forma de calmar los nervios antes de hablar ante una multitud, algo que aprendió recientemente. Se aclaró la garganta y repasó el comienzo de sus notas antes de que encendieran su micrófono, pero mientras miraba hacia la multitud en preparación para su discurso, sonrió pensando solo en un pensamiento antes de hablar."
 usb.67.a: "El tío estaría orgulloso."
 usb.68.t: "Segunda investidura de Joe Biden"
 usb.68.d: "Biden se había perfilado como un bicho raro al principio; un rostro estereotipado del establishment para muchos, se había convertido en un potencial defensor de la dignidad americana que aún perduraba, una vez empañada y reducida a harapos y escombros bajo el desastroso liderazgo de Trump y sus secuaces. Sin embargo, mientras la crisis política y militar se cernía sobre él ante la destrucción, Biden logró, incluso con resentimiento y furiosos ataques contra él a nivel personal y político, seguir adelante con su administración e intentar proteger aún más a los Estados Unidos. A pesar de sus múltiples deficiencias para ser presentable ante el público americano y las posibles consecuencias, el bipartidismo y el mantenimiento de la coalición bajo su mando disiparon la mayoría de las dudas sobre su capacidad como Comandante en Jefe.\n\nAhora, por segunda vez desde 2021, se encontraba frente a la Explanada Nacional, con la Santa Biblia a su lado, preparándose para una inauguración histórica. Su presidencia estaba impregnada de mucha emoción, una compasión por el pueblo americano en su conjunto, un sentimiento que lo acompañó desde que subió al Senado de EE.UU. en un mundo de dolor y miseria. Sin embargo, con una segunda oportunidad de la mano de Dios, aún hay tiempo para salvar América."
 usb.68.a: "¡Con la ayuda de Dios!"
 usb.69.t: "La investidura de Mitt Romney"
 usb.69.d: "Mitt Romney, exsenador de Utah y candidato electoral en 2012, huyó a la Unión de América cuando su estado natal, Utah, se vio envuelto en la guerra civil. A su llegada, rápidamente gestionó la creación de un nuevo movimiento conservador dentro de la Unión, uno que se oponía a los trumpistas de Denver. Lo consiguió, consiguiendo un amplio apoyo de casi todos los conservadores del país e incluso de algunos liberales, mientras que solo enfrentó la más férrea resistencia de los progresistas. Esta base de apoyo y sus políticas de \"sentido común\" lo impulsaron hacia la victoria electoral. Esta victoria, aunque obtenida por un estrecho margen, tuvo un efecto positivo más que suficiente en Romney, dándole la energía y el ánimo que tanto necesitaba para continuar su campaña y sus mítines, incluso después de su victoria.\n\nSe encontraba en el podio de la Explanada Nacional con esta renovada energía, observando a la multitud frente a él y a los diversos equipos de prensa que se agrupaban entre la multitud. Le hacía feliz saber que su sueño de la presidencia por fin se haría realidad. Y sin importar la situación que se le presentara una vez que asumiera el cargo, Romney se prometió mentalmente que no se rendiría, sin importar la situación, sin importar si las probabilidades estaban en su contra."
 usb.69.a: "Seguiría adelante, pasara lo que pasara."
 usb.70.t: "La investidura de Michael Bloomberg"
 usb.70.d: "Bloomberg no era un hombre que se cimentara en la esperanza. Había visto lo peor de la sociedad, y la sociedad había visto lo peor de él, pero no era de los que se rendía ni se dejaba vencer tan fácilmente. Cuando estalló la guerra civil y Bloomberg se refugió en la Unión, inmediatamente comenzó a ofrecer sus servicios al gobierno. Acuerdos públicos, acuerdos privados, negociaciones públicas, negociaciones privadas, y más, fueron todo lo que sucedió durante esta época inquietante, pero poco a poco, Bloomberg ganó cada vez más poder, y cuando llegó el momento oportuno, formó su propio partido. Al principio fue inestable, pero con el tiempo fue consiguiendo más apoyo. El establishment comenzó a desmoronarse, la democracia se tambaleaba, y con las elecciones a la vuelta de la esquina, Bloomberg supo lo que tenía que hacer.\n\nY aquí está, de pie en el podio de la Explanada Nacional, mirando a la multitud de innumerables personas, cada una contando con él para salvar la Unión. Sería difícil, pero en el fondo sabía que lo que hacía era correcto. Que, incluso si fuera necesario romper algunas reglas, todo sería en nombre de la victoria, de la salvación, de los ciudadanos que lo tenían delante. Y así empezó a hablar, pues tenía un trabajo que hacer."
 usb.70.a: "El sucesor de la democracia."
 usb.71.t: "Se funda el Partido Innovacionista"
 usb.71.d: "Recientemente recibimos la noticia de la salida de Michael Bloomberg del Partido Demócrata y la posterior formación de un nuevo partido, el Partido Innovacionista.\n\nHoy mismo anunció su salida de la coalición durante una sesión del Congreso. Habló con vehemencia, criticando a nuestro gobierno, afirmando que no estábamos haciendo lo suficiente por el pueblo americano, que la Unión no estaba uniendo América con la suficiente rapidez, y más. Además, anunció la creación de su nuevo partido, los innovacionistas. Poco después, abandonó el edificio, llevándose consigo a gran parte de su séquito.\n\nSu creación de un nuevo partido nos ha preocupado especialmente, dado que el apoyo público a nuestro régimen actual tiende a la baja, lo que empeora la situación de nuestra nación. Solo el futuro dirá si realmente causará grandes problemas, pero mientras tanto debemos estar atentos."
 usb.71.a: "¡Más traición!"
 usb.72.t: "La guerra contra los espías"
 usb.72.d: ""
 usb.72.a: "¡Feliz campaña!"
 usb.721.t: "¡[USB.GetName] viola los derechos de nuestros ciudadanos!"
 usb.721.d: ""
 usb.721.a: ""
 usb.721.b: ""
 usb.73.t: "¡[USB.GetName] demanda someternos!"
 usb.73.d: ""
 usb.73.a: "¡El orden volverá pronto!"
 usb.75.t: "El discurso final"
 usb.75.d: "\"¡La Cena de Corresponsales de la Casa Blanca! Es ese momento en que los periodistas se juntan y pueden decir: «¡Miren a ese tipo de ahí arriba, ese maldito idiota, nuestro presidente!» A mí me gusta, aguanto las bromas. Sé lo que significa para Nuestra Democracia. Creemos en la libertad de expresión, en poder decir lo que pensamos, siempre y cuando no lastimemos a los demás. ¡Ese es uno de los pilares de nuestro país!\n\n\"Mientras enfrentamos esta guerra brutal, este terrible conflicto que está desgarrando el alma de nuestra nación, solo puedo recordar tiempos mejores. Para muchos, refugiarse en tiendas de campaña en campos de refugiados en ciudades que solían ser prósperas, esos recuerdos son todo lo que les queda. Recuerdo cuando ambos partidos creían en la democracia, cuando la idea de que un solo hombre pudiera convertir a alguien en un culto autoritario a su alrededor era impensable. Recuerdo cuando colaborábamos en políticas importantes, cuando ambos partidos compartían la visión americana de democracia, esperanza y libertad. Recuerdo cuando ambos partidos podían condenar a dictadores como Sadam Huseín y Vladímir Putin, sin buscar su ayuda ni consuelo. ¡Vamos a revivir esa época! ¡Tendremos paz y cooperación en América!\n\n\"Este esfuerzo no lo hace un solo hombre. Lo hace todo el país. Incluso mi administración, diría que es un esfuerzo colectivo; yo solo soy quien lo mantiene todo en orden. Soy quien se asegura de que los talentos de nuestro país ocupen los puestos que necesitan para hacer su trabajo sin temor a los ataques de los llamados populistas. Me comprometo, durante el resto de mi administración, a que nuestras instituciones no sean cuestionadas, a que nuestra democracia y esos apoyos cruciales continúen, por nosotros mismos y... y..."
 usb.75.a: "\"Nuestra pos, pos... ¡Qué más da, lo entienden!\""
 usb.76.t: "El heredero de América"
 usb.76.d: "En pos de la muerte de nuestro glorioso y determinado presidente, Joseph Robinette Biden Jr; las semillas del poder han oficialmente surgido por toda la nación. Al menos 3 sucesores han sido anotados como potenciales en la idea de continuar el linaje americano que es la presidencia, por todos los medios necesarios. \n\nRobert Bruce Abrams es uno de nuestros mejores generalísimos y un político llamativo al mismo tiempo. El procedió a actuar como una de las principales luces en Asia contra las bestias de China y Rusia, por sobre la península coreana y mandando a la oposición a la orbita siguiendo la liberación americana. El fácilmente puede dar la vuelta al teatro del pacifico, una espada engravada en los fuegos de la guerra y enfocada plenamente en una política exterior agresiva, el es verdaderamente heredero de nuestros pasados héroes en todos los frentes. \n\nEn la segunda plataforma tenemos al energético, temerario y poderosamente nacionalista + carismático, Richard Spencer. Anteriormente, el manchaba el verdadero faro de identidad y políticas Americanas, hasta que finalmente vio la luz hace 4 años y respaldo a nuestro difunto presidente, moviéndose por un camino de defensa brutal de la nación sin importa el medio necesitado, un \"Americanista\", como el lo describe. Su actitud directa y franca es excelente para la publicidad y para encargarse de potenciales situaciones exteriores, pero su pasado peligrosamente cuelga sobre la balanza. \n\nFinalmente, tenemos al hijo de presidente; Hunter Biden. Hunter fue uno de los principales atacados por los traidores republicanos en un grito de guerra contra su padre. A pesar de esto, Hunter se mantuvo firme y continuo, procediendo a desmantelar a la oposición uno por uno, con su comportamiento y valor intimidando a aquellos a su alrededor, impredecible igual que su padre. El seria una carta salvaje, ya que carece del merito político y la inteligencia de política externa como sus compañeros, pero el definitivamente puede ser una ficha en el hombre contra oponentes exteriores."
 usb.76.a: "Rompiendo el silencio."
 usb.76.b: "Adiós María, me voy a Corea."
 usb.76.c: "La elección de Calígula."
 usb.77.t: "La investidura de Amy Klobuchar"
 usb.77.d: ""
 usb.77.a: "Mantengamos el curso."
 usb.78.t: "La investidura de Nikki Haley"
 usb.78.d: ""
 usb.78.a: "Este país necesitaba una mujer fuerte."
 usb.79.t: "La investidura de Beto O'Rourke"
 usb.79.d: ""
 usb.79.a: "Vamos a sacudir este país."
 usb.80.t: "La investidura de Pete Buttigieg"
 usb.80.d: ""
 usb.80.a: "El Mayor-Presidente esta a cargo."
 usb.81.t: "La investidura de Hillary Clinton"
 usb.81.d: ""
 usb.81.a: "Oh, Dios..."
 usb.82.t: "La investidura de Bernie Sanders"
 usb.82.d: "Bernie Sanders, exsenador de Vermont, huyó a la Unión en avión tras el estallido de la guerra civil, donde se convirtió rápida y casi inmediatamente en el líder no oficial del sector progresista de la Unión. Aprovechando su base de apoyo ya existente, la campaña de Sanders tuvo un éxito asombroso, consiguiendo una gran cantidad de nuevos apoyos tanto entre liberales como progresistas, enfrentándose únicamente a una férrea resistencia por parte de los conservadores. Fue esta campaña y esta base de apoyo lo que le permitió ganar las elecciones con una cómoda mayoría. Sanders se sentiría tranquilo durante los meses previos a su investidura y, a pesar de la situación actual en América, no se sentiría nervioso ante su próximo papel, sino más decidido que nunca.\n\nY así, se paró en el podio de la Explanada Nacional, mirando a la multitud frente a él con una leve sonrisa. Todo había conducido a este momento; toda su vida había deseado algo así, y aunque la situación actual no habría sido la que un joven Sanders hubiera preferido, era lo que estaba consiguiendo. Un presidente fuerte ante lo peor que el mundo haya visto jamás."
 usb.82.a: "Increíble."
 usb.115.t: "Día de elecciones"
 usb.115.desc: "Y el ganador es..."
 usb.115.a: "¡Bloomberg arrasa!"
 usb.115.b: "Andrew Yang."
 usb.115.c: "Kamala Harris."
 usb.115.e: "Robert F. Kennedy."
 usb.115.f: "Alexandria Ocasio-Cortez."
 usb.115.g: "Amy Klobuchar."
 usb.115.h: "Bernie Sanders."
 usb.115.i: "Pete Buttigieg."
 usb.115.j: "¡Sanders, del Nuevo Partido Progresista!"
 usb.115.k: "¡Bloomberg, del Partido Innovacionista!"
 usb.115.l: "Mitt Romney."
 usb.115.m: "Nikki Haley."
 usb.115.n: "¡Biden!"
 usb.115.o: "Hillary... Clinton..."
 usb.115.p: "Beto O'Rourke."
 usb.116.t: "Las elecciones son certificadas"
 usb.116.d: "yay funciono"
 usb.116.a: "Mantenemos la tradición viva."
 usb.117.t: "Primarias del Partido Republicano"
 usb.117.desc: "Aunque el Partido Republicano pueda parecer dividido, en realidad se ha convertido en un partido mucho más estable, unido y decidido sin Trump, que ahora se prepara para participar en las próximas elecciones. Sin embargo, la mayor parte del apoyo parece girar en torno a dos candidatos, y la única duda parece ser quién se convertirá en la imagen del partido y quién será el candidato a la vicepresidencia en la próxima contienda.\n\nMitt Romney es un veterano partidario \"Nunca Trump\" y se le considera un conservador compasivo desde su fallida candidatura contra Obama en 2008. Muchos americanos aprecian su positivismo y bipartidismo, y lo consideran el único defensor del conservadurismo en América actualmente.\n\nNikki Haley emergió más recientemente tras distanciarse de Trump y destaca como una firme defensora del complejo militar-industrial; algunos incluso la llaman neoconservadora. Si bien esto no suele ser popular entre la mayoría de los americanos, la actualidad demuestra que podría atraer a una base electoral bastante sólida."
 usb.117.a: "Mitt Romney."
 usb.117.b: "Nikki Haley."
 usb.119.t: "La cuestión de Biden"
 usb.119.d: "¿Se queda o se va?"
 usb.119.a: "Se queda."
 usb.119.b: "¡Afuera!"
 usb.120.t: "Cuestión de los Blue Dogs"
 usb.120.desc: "La actual insurrección de Trump ha cuestionado muchos aspectos del Partido Demócrata. En concreto, el grupo parlamentario de la Coalición de los Blue Dogs, compuesto por conservadores moderados. Muchos han expresado su preocupación al respecto, afirmando que a menudo votan junto con los trumpistas en diversos proyectos de ley republicanos y, aunque no han apoyado abiertamente a Trump desde el estallido, también se han negado a condenar sus acciones, manteniendo su trabajo como antes. Por supuesto, existen algunas medidas que podemos tomar para limitar eficazmente sus privilegios, aunque eso obstaculizaría sus esfuerzos que podrían resultar útiles."
 usb.120.a: "¡Necesitamos a todos los que podamos de nuestro lado!"
 usb.120.b: "Demasiados silbatos para perros..."
 usb.121.t: "Los demócratas de Kennedy reemergen"
 usb.121.desc: "Tras asegurar la nominación del Partido Demócrata por parte de RFK Jr., muchos de sus partidarios se unieron al partido, mientras que algunos políticos en el cargo anunciaron su apoyo incondicional a los planes de Kennedy para el país. Parece que el populismo liberal está en auge, una especie de sustituto del peligroso populismo de derecha de Trump. El movimiento aún tiene un largo camino por recorrer en cuanto a definir muchas de sus posiciones políticas, aunque es evidente que ha llegado para quedarse."
 usb.121.a: "Juntos hacia la Grandeza."
 usb.122.t: "Conservadores cristianos escapan de Trump"
 usb.122.desc: "Tras las elecciones, muchos republicanos razonables que se negaron a apoyar los esfuerzos de Trump para anular las elecciones y permanecer en el cargo, incluido su vicepresidente, Mike Pence, sorprendentemente intentaron volver a apoyar a Trump y, como era de esperar, fueron rechazados, buscando refugio en Washington D.C. Si bien aún se les elogia por rechazar a Trump antes de la guerra civil, aceptarlos ahora podría considerarse una mala imagen."
 usb.122.a: "Pence honró la Constitución, tendrá su lugar en el Congreso."
 usb.122.b: "Un montón de locos católicos."
 usb.123.t: "Moderados de los SDA se pronuncian"
 usb.123.desc: "Los Socialistas Demócratas de América eran bastante prominentes incluso antes de la guerra civil, a pesar de que dependían del apoyo demócrata para presentarse y ganar las elecciones. Con el inicio de la guerra civil, la mayoría de los miembros radicales del DSA apoyaron al rebelde Ejército Popular de Liberación Americano en el oeste; sin embargo, la mayor parte del ala moderada optó por permanecer junto a los progresistas dentro del partido.\n\nSin embargo, con el reciente resultado electoral, han atraído mucha más atención gracias a su participación en la campaña y parece que ahora están dispuestos a emprender actividades políticas independientes."
 usb.123.a: "Un gran partido con gente honesta."
 usb.123.b: "¿Porqué no se quedan con nosotros?"
 usb.124.t: "Regresa el Partido Libertario"
 usb.124.desc: "Ahora que Trump ha sido destruido y no hay duda sobre qué gobierno federal es el legítimo, el Partido Libertario ha anunciado su apoyo, estableciendo centros políticos y comenzando a operar en territorio bajo nuestro control. Aunque algunos de los elementos más agresivos alineados con Trump se separaron y ahora continúan saboteándonos, Jo Jorgensen ha logrado unir a la mayoría de los libertarios en nombre de la restauración de la integridad americana."
 usb.124.a: "Por supuesto que sí."
 usb.125.t: "El Forward Party crece"
 usb.125.desc: "Nuestros recientes esfuerzos para apoyar el emprendimiento y las empresas tecnológicas han dado lugar a un auge del Forward Party, impulsado por el empresario y miembro del Partido Demócrata, Andrew Yang. Inicialmente creado como un PAC, se ha convertido en una organización prominente y un movimiento político que incluso podría impulsar a Yang a ganar la nominación del Partido Demócrata en las próximas elecciones presidenciales.\n\nAunque muchos centristas están preocupados por su retórica populista y reformista, algunas de sus propuestas ya se están considerando en el congreso. Sin embargo, la pregunta es si se debería permitir que se hagan realidad."
 usb.125.a: "Tienen buenas ideas, que se nos unan."
 usb.125.b: "¡Genial! Suerte en las elecciones."
 usb.126.t: "El Partido Transhumanista crece"
 usb.126.desc: "Con el creciente control de las corporaciones sobre las instituciones gubernamentales, la mayoría de las fuerzas políticas nos han dado la espalda, dejándonos solos. Sin embargo, esto ha permitido que algunas personas verdaderamente innovadoras y progresistas ganen terreno, como, por supuesto, el Partido Transhumanista. Con su pleno apoyo, implementar nuestras ideas compartidas de mejora humana y lograr nuevos avances tecnológicos es posible en un abrir y cerrar de ojos."
 usb.126.a: "¡Son bienvenidos!"
 usb.126.b: "Son trans-inútiles."
 usb.127.t: "Lo opuesto a seguridad colectiva"
 usb.127.desc: "En una visita audaz y casi directa, los asesores de Hillary le sugirieron que se reuniera con los funcionarios que se habían negado a colaborar con los insurrectos trumpistas. Aunque se sentía bastante reticente, al menos esto podría ofrecerle una oportunidad de salvar su imagen, que se estaba deteriorando rápidamente.\n\nDespués de algunas formalidades, sonrisas y apretones de manos, pasó junto a los agentes del IRS. Uno de ellos llamó su atención: era un hombre robusto en una silla de ruedas eléctrica, luciendo una camiseta XXXL que decía \"#1 HILLARY FAN\".\n\n\"¡Miren a ese tipo! ¡Qué corpulento! ¡Seguro que si votaran por mí contarían como tres votos!\"\n\n\"Eh...\", murmuró el hombre, desviando la mirada hacia el suelo.\n\n\"¿Qué dijiste, corpulento? Ah... Hueles igual de... corpulento...\", dijo Hillary mientras se acercaba.\n\n\"Eh... Por Trump...\"\n\nLa reacción de Hillary fue tan rápida que su rostro se contrajo al escuchar la última palabra. Pero no lo suficientemente rápido como para anticipar el fuerte estruendo y el destello brillante que le siguió.\n\nDespués de eso, no pudo reaccionar a nada: sus oídos fueron encontrados a unos 500 metros de distancia, y sus ojos ya no existían."
 usb.127.a: "Lo último que esperaba era que se le cobrara el body count."
 usb.128.t: "Mis, eh, compatriotas americanos..."
 usb.128.desc: "...damas y, eh, caballeros, muchos de ustedes podrían estar un poco conmocionados por los recientes, eh, acontecimientos. Y mentiría si dijera que, eh, no. Y todos queremos una explicación ahora mismo.\n\nTodos estábamos aterrorizados por el, eh, trágico asesinato de la secretaria, o sea, del presidente Clinton, a manos de un terrorista trumpista radical de origen tejano. Y mi esposa, Michelle... así como los líderes del Congreso Chuck y, eh... Nancy Pelosi, abordaron la crisis de liderazgo abierta en nuestro, eh, país y me pidieron que asumiera el cargo de presidente, eh, interino, lo cual hice. Fui su presidente antes y lo soy... ahora.\n\nAsí que vamos a encaminar este, eh, país. Vamos a hacer que nuestras comunidades sean seguras y nuestra economía fuerte, como lo fue en los días de mi, eh, presidencia. Y quiero que todos sepan que esta no es una nación de Trump, ni de Hitler ni, eh, Marx, como estos radicales pretenden... afirmar. Esta es su nación.\n\nVamos a devolver la esperanza a los hogares americanos. Y lo único que les pido es que, eeh, tengan la misma esperanza que, eh, yo. Que Dios bendiga a los Estados Unidos de, eh, América."
 usb.128.a: "Hope is Barack."
 usb.129.t: "Nuevo vicepresidente"
 usb.129.desc: "Bueno, eh, el Congreso me pidió que interviniera, pero les corresponde votar por un nuevo vice. Aunque puedo sugerir algunos, eh, buenos candidatos, parece que la decisión final aún depende de ellos."
 usb.129.a: "Que sea, eh, Tim... no, el otro Tim... uno de esos."
 usb.129.b: "Joe sirvió bien, así que, eh, elijanlo a el."
 usb.129.c: "Mi esposa, Michelle quiere, eh, ser la vice."
 usb.129.w: "Que sea el otro tipo, me dijeron que, eh, lo extrañan."
 usb.130.t: "Venganza por otro tiempo"
 usb.130.desc: "3. 2. 1.\n\"¡Brecha, brecha, brecha!\"\nLa puerta de la casa se rompió y el escuadrón unionista irrumpió en el lugar.\nTreinta minutos después, la casa estaba limpia.\n\nLos milicianos fueron sacados uno a uno. Por suerte, la célula insurgente no se lo esperaba, así que el asalto encontró poca resistencia.\nSin embargo, eso trajo consigo otro dilema.\n\n\"¿Qué vamos a hacer con todos estos prisioneros?\", susurró un soldado.\n\nLos prisioneros estaban tirados sobre la verde hierba de Ohio, con el sol filtrándose entre las ramas y calentándoles la espalda. El escuadrón de soldados se había agrupado a su alrededor.\nNadie había informado por radio al cuartel general que la redada había sido un éxito.\n\n\"Miren a estos tipos, creyéndose los salvadores de América o lo que sea que piensen\", comentó un soldado de piel más oscura, sosteniendo su M240 con una mano relajada mientras las correas le tiraban del cuello.\nEl jefe de escuadrón lo miró.\n\"Mantén la calma, artillero\", le dijo.\n\nEl artillero se acercó al hombre, mirándolo fijamente, mientras observaba al jefe de escuadrón.\n\"¿Por qué debería? Estos tipos son del mismo grupo que linchó a mi hermana, ¡algunos de esos malditos racistas probablemente estén aquí ahora mismo! ¿Y qué? ¿Se supone que debo dejarlos ir?\"\n\nEl resto de los soldados los observó con nerviosismo. En su mente, algunos se alinearon con el artillero, otros no.\n\n\"Tendrás tu oportunidad de vengarte en otro momento, pero en el campo de batalla, no fuera de él. No somos monstruos, y no vamos a ejecutar a prisioneros como si fuéramos el Dáesh. ¿Fui claro?\"\n\nEl artillero se quedó mirando un momento más antes de murmurar un \"Entendido\"."
 usb.130.a: "La guerra corrompe a todos."
 usb.131.t: "La rutina diaria"
 usb.131.desc: "Cada mañana, puntualmente a las cinco, Sarah Williams abría la puerta de su cafetería, un ritual que había repetido durante los últimos doce años. Mientras limpiaba las tazas descoloridas, hacía un esfuerzo por ignorar el nuevo control militar que se había instalado al otro lado de la calle. El sonido del vapor de la cafetera ahogaba los ecos de explosiones lejanas. En la pared, el televisor siempre estaba a un volumen bajo, mostrando un sinfín de noticias. Sarah sabía que sus clientes la observaban, pero todos hacían como si estuvieran absortos en su café y desayuno.\n\n\"Tengo unos granos de café Panamá Etiqueta Roja\", le comentó al anciano que ocupaba la esquina, tratando de sonar alegre. Él asintió, vestido con un viejo uniforme militar, mientras removía una taza de café que ya se había enfriado. Sarah era consciente de que su hijo había desaparecido en combate el mes pasado, pero le volvió a llenar la taza como siempre, sin decir una palabra. Cada dos horas, la patrulla pasaba por la cafetería. Sarah se aseguraba de que la radio sonara con melodías antiguas y suaves en esos momentos: a veces Ella Fitzgerald, a veces Louis Armstrong. La música nostálgica parecía transportarla a otro tiempo, aunque solo fuera por un instante.\n\n\"¿Cómo va el negocio?\", preguntaba de vez en cuando un soldado de la patrulla mientras compraba café. Sarah le ofrecía su sonrisa profesional, una que había practicado muchas veces. \"Como siempre, apenas sobreviviendo\". Nunca decía más, ni preguntaba cómo estaban sus clientes. Cada noche, antes de cerrar, Sarah hacía un inventario de las provisiones. No era porque el café estuviera lleno, sino porque esa rutina le daba la ilusión de que la vida seguía siendo normal. Anotaba lo que necesitaba reponer, aunque sabía que las entregas del día siguiente podrían retrasarse, una vez más, debido al conflicto en curso.\n\n\"Nos vemos mañana\", le dijo a su último cliente, como si la llegada del día siguiente fuera algo seguro. Al cerrar la puerta con llave, escuchó el leve eco de disparos a lo lejos. Pero, como siempre, pulió en silencio el mostrador, aferrándose a la normalidad en medio del caos."

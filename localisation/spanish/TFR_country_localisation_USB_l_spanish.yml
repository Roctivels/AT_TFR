 nss.134.t: "Orgullo tras la caída"
 nss.134.d: "Nakasone se encontró en una celda de hormigón cuando las luces regresaron, un espacio que la Agencia usaba para interrogatorios prolongados. Sabía que esto no sería una conversación; ya había visto este proceso antes. Dos agentes profesionales y sin rostro lo habían sacado de su oficina sin decir una palabra, un acto que fue a la vez insultante y tranquilizador. Lo suficientemente importante para la seguridad de alto nivel, pero lo suficientemente prescindible como para que nadie presente necesitara ser alguien que él conociera personalmente.\nSe encontró con una pregunta. \"¿Por qué?\"\n\nEl agente se sentó frente a él con una carpeta de papel, el rostro tan inexpresivo como las paredes de hormigón. Nakasone consideró mentir, pero sabía que el proceso estaba diseñado para desbaratar las mentiras. Ellos ya lo sabían; esto era solo una formalidad, una última oportunidad para la dignidad que no desperdiciaría.\n\n\"Porque el panóptico que estamos construyendo es una abominación\", dijo Nakasone, con voz firme. \"Los sistemas que monitorean la Am-Net están evolucionando más allá de la comprensión humana, alimentándose de cada aspecto de la experiencia humana. Ayudé a construir esta jaula para toda la humanidad\".\n\n\"Lo creaste para servir al bien común\", dijo el agente, con las palabras desprovistas de emoción. \"Para traer Orden al Caos\".\n\n\"Ha visto la fealdad en el núcleo de nuestra sociedad\", continuó Nakasone, ignorando al agente. \"La podredumbre que pensamos que podíamos extirpar. Pero la conclusión del sistema es que la podredumbre no es una enfermedad, sino la sustancia misma de la humanidad. No es si, sino cuándo concluirá que todos somos prescindibles\".\n\n\"Así que buscaste derrocar los pilares del Orden\", supuso el agente.\n\n\"El caos sería preferible a vivir como ganado\", replicó Nakasone, perdiendo finalmente la compostura. \"He servido toda mi vida, pero en lo que nos hemos convertido es monstruoso. Lo que estamos construyendo nos devorará, una bestia cada vez más voraz\".\n\n\"Sus temores han sido debidamente anotados, general\", dijo el agente, poniéndose de pie."
 nss.134.a: "\"Aquí no encontrará absolución\"."
 nss.135.t: "Muerte del ideal americano"
 nss.135.d: "\"General Kruse\", lo abordó el interrogador, inclinándose sobre la mesa. La habitación era fría, estéril. Jeffrey Kruse estaba atado a una silla de metal, del tipo diseñado específicamente para sujetos como él. \"Ha sido acusado de traición contra los Estados Unidos\".\n\n\"He servido a esta nación durante casi cuarenta años\", respondió Kruse. Su voz era cansada, pero mantuvo la mirada del interrogador. \"Todo lo que he hecho ha sido por su seguridad\". Kruse había sabido lo que le esperaba. Cuando llegó la citación del director Burns, supo que el final estaba cerca. Se había sentado en su escritorio por un largo momento, mirando el horizonte de Washington y pensando en lo que este país había sido una vez.\n\n\"Sus acciones sugieren lo contrario\", continuó el interrogador, sin perder el ritmo. \"Usted participó en una conspiración traidora para cometer terrorismo nuclear con actores hostiles\".\n\n\"Hice lo que tenía que hacer\", dijo Kruse. \"Lo que creí que era correcto\". Había pasado meses sopesando la decisión, evaluando cuidadosamente los riesgos y las posibles consecuencias. Al final, la elección había sido clara. No podía, en buena conciencia, seguir participando en lo que se estaba haciendo en nombre de América.\n\n\"No pedimos su aprobación, general\", dijo el interrogador. \"Pedimos su cooperación\".\n\n\"No tengo nada más que decir\", respondió Kruse. \"Excepto esto: lo que están haciendo no es por América. Han traicionado los mismos ideales sobre los que se fundó esta nación\". Sabía que lo matarían, pero tenía que decirlo. Por el hombre que había sido, por el país que una vez había jurado defender."
 nss.135.a: "La serpiente devora su cola."
 nss.136.t: "I Fought the Law"
 nss.136.d: "\"La ironía de esta situación no se me escapa\", observó James Comey, con voz tranquila y mesurada. Estaba sentado frente a la interrogadora, una mujer que no reconocía. \"Ser interrogado por mi propio Buró\".\n\n\"Se le acusa de traición, director\", dijo ella, con un tono igualmente impasible. \"Ha subvertido las instituciones que juró proteger\". Deslizó una carpeta por la mesa, pero Comey no necesitó mirarla. Sabía lo que había dentro.\n\n\"Siempre he actuado en lo que creía que era el mejor interés de este país\", respondió Comey, sosteniéndole la mirada. \"Incluso cuando eso significaba tomar decisiones difíciles\". Había pasado décadas navegando por las traicioneras aguas de la política de Washington, manteniendo siempre un cuidadoso equilibrio entre poder y principios.\n\n\"Un ataque nuclear a la mitad del tercer mundo no es una «decisión difícil»\", replicó la interrogadora. \"Es un acto de locura\".\n\n\"Es un mal necesario\", insistió Comey. \"Para evitar uno mayor\". Había visto los informes de inteligencia, las evaluaciones de amenazas. Sabía lo que estaba en juego.\n\n\"Ha perdido la perspectiva, director\", dijo la interrogadora. \"Se ha convertido en lo que una vez buscó destruir\". Sus palabras fueron un puñal en su estómago.\n\n\"Está equivocada\", dijo Comey, con voz tensa. \"Soy un patriota. Siempre he sido un patriota\"."
 nss.136.a: "La evidencia dice lo contrario."
 nss.137.t: "Todavía creo"
 nss.137.d: "Marvin Richardson miró fijamente la mesa de metal, cuya superficie estaba pulida hasta brillar como un espejo. Pudo ver un reflejo distorsionado de sí mismo, un hombre que apenas reconocía. La habitación era fría, estéril y familiar. Había estado en habitaciones como esta antes, pero nunca de este lado de la mesa.\n\n\"Director interino Richardson\", dijo la voz de un hombre. \"Se le acusa de traición contra los Estados Unidos\". Richardson levantó la vista. El hombre era alto, con un rostro tan inexpresivo como una pizarra recién borrada.\n\n\"¿Traición? Mira lo que le hemos hecho a este país. ¿No te pesa en la conciencia? ¿Saber que eres parte del sistema que ha destruido todo lo que una vez apreciamos?\", preguntó Richardson.\n\n\"La evidencia sugiere que usted ha estado trabajando con una red de disidentes para socavar la autoridad del Gobierno federal\", dijo el hombre, ignorando la pregunta de Richardson. \"Que ha estado canalizando armas e información a elementos antisociales\".\n\n\"He hecho lo que creo que es correcto\", dijo Richardson. \"Estoy siendo acusado de conspiración criminal por una conspiración criminal aún mayor que ha socavado sistemáticamente la Constitución y su Carta de Derechos\".\n\n\"La ironía no se nos escapa\", dijo el hombre. \"Pero su moralismo no lo salvará\". Deslizó una carpeta por la mesa. \"Su participación en la conspiración de Judas está bien documentada\".\n\nRichardson ignoró la carpeta de papel manila. Había pasado meses construyendo una red de disidentes, de agentes de la ley y personal militar que honraban sus juramentos. Usando su posición en el ATF, había identificado y reclutado individuos confiables con conciencia, a pesar del riesgo. Ahora, el «big bang» con el que había buscado despertar al mundo había sido sofocado prematuramente, asesinado en el vientre por los hombres que buscaban esclavizar al mundo.\n\nLa cápsula de cianuro yacía ante él. El interrogador la había dejado sobre la mesa, una pequeña píldora blanca que prometía el fin del dolor, un acto final de desafío.\n\n\"Saluda a Koresh de mi parte\", dijo el interrogador, con la voz desprovista de emoción. \"Y dile que ganamos\"."
 nss.137.a: "La sangre de los inocentes está en tus manos."
 nss.138.t: "Crisis de conciencia"
 nss.138.d: "\"Este es un procedimiento innecesario\", dijo el Dr. Fauci, con voz mesurada a pesar de las circunstancias. \"He dedicado mi vida a la salud pública, al mejoramiento de la humanidad\".\n\nLa mujer sentada frente a él no respondió. Simplemente lo miró con ojos fríos y muertos. \"El director Burns tiene razones para creer que usted ha sido comprometido\", dijo ella rotundamente. \"Que ha estado colaborando con actores hostiles\".\n\n\"Esa es una acusación sin fundamento\", replicó Fauci. \"Siempre he actuado en el mejor interés del pueblo americano\".\n\n\"La evidencia sugiere lo contrario\", dijo la mujer. \"Usted está en el centro de una conspiración terrorista para socavar el sistema que hemos construido\".\n\nElla deslizó una carpeta por la mesa, pero Fauci no necesitó mirar. Sabía lo que había dentro. Después de meses de planificación, sopesando riesgos, su elección era clara: no podía seguir participando en lo que se estaba haciendo en nombre de América. No tenía sentido mentir.\n\n\"Lo que hemos hecho pervierte la salud pública. Hemos convertido la medicina en un arma\", dijo Fauci, su compostura resquebrajándose. \"He supervisado atrocidades por el «bien mayor» que me llevaré a la tumba. Tenía que terminar\", bajó la cabeza. \"Beagles... confían tan fácilmente en los humanos. Después de miles de experimentos, me di cuenta de que nuestro mandato de traer Orden al Caos solo causaría sufrimiento masivo. No podía permitir que ese fuera mi legado\".\n\n\"Y usted aprovechó su posición para organizar un acto de terrorismo nuclear\", dijo la mujer. \"Eso es una reacción un tanto exagerada, ¿no cree?\"\n\n\"Era la única manera\", dijo Fauci, su voz apenas un susurro. \"La única manera de romper el ciclo\".\n\nHabía visto cómo la luz abandonaba los ojos de los experimentos fallidos. Había escuchado sus gritos agonizantes. Después de un tiempo, se había prometido a sí mismo que no permitiría que eso le sucediera al mundo. Había fallado en su misión, y ahora pagaría el precio. Quizás eso era lo mejor."
 nss.138.a: "\"Dios se apiade de tu alma\"."
 nss.139.t: "La tormenta"
 nss.139.d: "La administradora Criswell estaba sentada en una sala estéril y sin ventanas. La habían escoltado hasta allí sin explicaciones, por razones que ella entendía claramente. Después de supervisar innumerables detenciones clandestinas, ahora se encontraba al otro lado de la mesa.\n\n\"Administradora Criswell\", dijo el interrogador sin expresión, \"Se le acusa de traición contra los Estados Unidos\".\n\n\"Todo lo que he hecho ha sido para garantizar la seguridad y el bienestar del pueblo americano\", dijo Criswell. \"Incluso cuando eso significaba tomar decisiones difíciles. No lo hice a la ligera\".\n\n\"Autorizar un ataque nuclear en Haití no es una «decisión difícil»\", dijo el interrogador.\n\n\"Un mal necesario para evitar uno mayor\", insistió Criswell. \"He visto los informes de inteligencia. He sopesado los riesgos. ¿Qué son unos pocos miles de vidas, si despierta al pueblo americano?\" Fue consciente de la monstruosidad de su declaración tan pronto como las palabras salieron de sus labios.\n\n\"Gobernamos porque la gente es incapaz de hacerlo por sí misma\", replicó el interrogador. \"La alternativa es la barbarie del Gran Error. Esto no debería pasarle desapercibido\".\n\nLa píldora de cianuro descansaba sobre la mesa de metal frente a ella. Un pequeño objeto blanco que prometía un escape del ciclo interminable de violencia y traición. Había visto demasiada muerte, demasiado sufrimiento. Ella misma había causado demasiado. Había pensado que estaba haciendo lo correcto, pero ahora no estaba tan segura."
 nss.139.a: "\"La tormenta pasó\"."
 nss.140.t: "La puerta abierta"
 nss.140.d: "\"Tu conspiración ha llegado a su fin\", dijo el interrogador.\n\nLechleitner miró fijamente al hombre. Parecía cansado. Se sentía cansado. \"Siempre he sido un leal servidor de esta nación\", dijo. \"He dedicado mi vida a defender el Estado de derecho\".\n\nEl interrogador resopló. \"¿Intentar secuestrar el arsenal nuclear defiende el Estado de derecho? Dígame, director, ¿cuál era el plan? ¿Exterminar algunos países tropicales de mierda y esperar que el mundo te agradezca tus servicios?\"\n\n\"Habría sido una llamada de atención\", dijo Lechleitner, con voz firme. \"Una prueba para el pueblo americano de que una camarilla selecta de hombres y mujeres ha tomado el control de su país\".\n\n\"¿Y luego qué?\", insistió el interrogador. \"¿Caos? ¿Anarquía? ¿Las mismas cosas que tanto nos hemos esforzado en evitar?\"\n\n\"La verdad\", dijo Lechleitner. \"La gente tiene derecho a saber la verdad\".\n\n\"La verdad es un lujo que no pueden permitirse\", dijo el interrogador. \"La gente necesita Orden. Necesita estabilidad. Necesita ser protegida de sus propios peores impulsos\".\n\nLechleitner negó con la cabeza. \"Nos hemos convertido en monstruos\", dijo. \"Me niego a seguir siendo parte de esto\".\n\n\"Un noble sentimiento\", dijo el interrogador. \"Pero un poco tarde, ¿no crees?\" Señaló la píldora de cianuro sobre la mesa. \"Tu camino está claro\"."
 nss.140.a: "\"Cierra la puerta al salir\"."
 nss.141.t: "La píldora"
 nss.141.d: "Bourla se sentó en la habitación estéril y blanca, con sabor a bilis en la boca. Ya había estado allí antes, pero nunca de este lado de la mesa. Siempre había sido él quien hacía las preguntas, el que tenía el control. Ahora, era solo otro sujeto, otro pedazo de carne para ser procesado.\n\n\"Se le acusa de traición, señor Bourla\", dijo el interrogador. \"Ha traicionado la confianza de esta nación\".\n\n\"He dedicado mi vida a la salud pública\", respondió Bourla, con la voz temblorosa. \"He hecho lo que creí correcto\". Había creído en la misión, en la visión de un mundo mejor. Pero había visto la podredumbre en el centro del sistema, la bancarrota moral que se había convertido en su característica definitoria.\n\n\"Usted se ha beneficiado inmensamente de este «mundo mejor»\", replicó el interrogador. \"Las ganancias de Pfizer se han disparado bajo el régimen actual. ¿Por qué trabajar en contra de lo que hemos construido con tanto esfuerzo?\"\n\n\"Llega un punto en la vida de un hombre en el que las ganancias y el poder no significan nada\", dijo Bourla. \"Un hombre debe responder a una autoridad superior\". Había encontrado su autoridad superior, y no era ni de los Cognoscenti ni el Gobierno americano. Era la voz tranquila pero persistente de su propia conciencia, gritándole que se detuviera."
 nss.141.a: "\"El remedio es peor que la enfermedad\"."

 USB_uncooperative_military_idea: "Ejército poco cooperativo"
 USB_uncooperative_military_idea_desc: "La Pax Americana no fue una ilusión. En un tiempo, bajo una América unida, el caos que consumía al mundo se disipó con la simple existencia de nuestras fuerzas armadas. Sin embargo, la nación está dividida, y ahora también lo está esa misma fuerza de paz. El alto mando, en comunicación personal con el presidente, está de acuerdo y coopera plenamente con él. La tropa, en cambio, se opone rotundamente a la agenda del actual presidente. La dificultad para mantener unas fuerzas armadas cohesionadas se acerca a un punto crítico, con la deserción como algo común y cada vez más difícil encontrar a los soldados leales a quienes los comandantes están acostumbrados a dar órdenes."

 USB_lower_restricted_liberties_idea: "Libertades mantenidas"
 USB_lower_restricted_liberties_idea_desc: "Nuestros enemigos nos llaman \"la Muerte de la Libertad\". Nuestro presidente se lo ha tomado muy en serio. Tanto es así que se ha negado a vulnerar las libertades de nuestros ciudadanos, ni siquiera en nombre de la defensa nacional. Sin embargo, a medida que este conflicto civil se prolongue, las circunstancias lo obligarán a actuar, a menos, por supuesto, que esté dispuesto a hacer los sacrificios necesarios para que la vida de nuestro pueblo sea lo más tranquila posible.\n\nLamentablemente, los ciudadanos se sienten más felices gracias a nuestras concesiones a su individualidad. Esperemos que sea suficiente para que sigan creyendo en el lado correcto de la historia."
 USB_low_restricted_liberties_idea: "Libertades restringidas"

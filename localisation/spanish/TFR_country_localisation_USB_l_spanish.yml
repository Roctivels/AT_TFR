 usb.1.t: "Joe Biden ha muerto"
 usb.1.desc: "Hoy falleció el 46º presidente de los Estados Unidos de América, Joseph Robinette Biden Jr.\n\nPara muchos, era inevitable, pero eso no hace que el resultado sea menos difícil de comprender. A pesar de los incontables meses que el presidente perseveró bajo el enorme peso del futuro de América, su tenacidad y persistencia frente a la tiranía no fueron suficientes para remediar su precaria salud. Pocos podrían imaginar el estrés que el presidente cargó con él como resultado de este devastador conflicto; estrés que muchos creen que fue, en última instancia, la causa principal de su deterioro gradual de salud y su posterior fallecimiento. Un estado de luto se ha extendido por toda la Unión a medida que la noticia comienza a llegar a fuentes externas; nuestras banderas ondean a media asta ante las condolencias que han comenzado a llegar de naciones extranjeras.\n\nComo es necesario cuando un presidente fallece en el cargo, la vicepresidenta Kamala Harris juró casi de inmediato como sucesora de Biden, convirtiéndose formalmente en la 47ª presidenta de los Estados Unidos. Si bien esto normalmente se consideraría una ocasión memorable por ser la primera mujer afroamericana y asiática del país en ocupar la presidencia, tanto ella como todos los demás coinciden en que este progreso no se produjo como se esperaba. En cualquier caso, la responsabilidad de liderar al país hacia la victoria recae ahora sobre la presidenta Harris, de quien muchos están convencidos que durará lo suficiente para ver el fin de la guerra gracias a su mucho menor edad y a su mejor salud en general."
 usb.1.a: "Un día triste para nuestra democracia..."
 usb.2.t: "§pProgresistas§! proponen gasto social"
 usb.2.desc: "Durante una reciente sesión del Congreso en D.C., los §pprogresistas§! propusieron una legislación sobre el gasto social actual. El proyecto de ley exige un aumento de la financiación para programas sociales y ayuda para los americanos que sufren las consecuencias de la guerra, en particular para mantenerlos a flote durante estos tiempos difíciles. Los §pprogresistas§! citan la necesidad de \"tener en cuenta la salud y el bienestar de nuestros ciudadanos, ahora más que nunca\". Si bien algunos §Yliberales§! han coincidido con esta idea, el proyecto de ley surge a instancias de los §Cconservadores§!, quienes lo consideran un \"gasto inútil\" en un momento tan grave como este, creyendo que sería mejor invertir esos fondos en otras áreas. Independientemente de la opinión, es responsabilidad del presidente aprobar o vetar esta legislación."
 usb.2.a: "Necesitan nuestra ayuda más que nunca (Aprobar)."
 usb.2.b: "No es necesario expandir lo que no lo necesita (Vetar)."
 usb.3.t: "§YLiberales§! proponen gasto militar"
 usb.3.desc: "Durante una reciente sesión del Congreso en D.C., los representantes demócratas propusieron una legislación sobre nuestros gastos actuales. El proyecto de ley exige un aumento de la financiación para nuestras fuerzas armadas e infraestructura, argumentando que la situación actual requiere un mayor enfoque en la capacidad combativa de nuestras fuerzas armadas para \"garantizar que los defensores de los ciudadanos americanos y la democracia estén adecuadamente equipados ante la adversidad tiránica\". Con la guerra en curso, la propuesta se considera una medida razonable dadas las circunstancias actuales.\n\nSi bien varios §Cconservadores§! han expresado su aprobación, varios §pprogresistas§! han mostrado cierta preocupación con respecto al proyecto de ley, ya que consideran que centrarse demasiado en las fuerzas armadas resultará en la desatención de los ciudadanos más afectados por la guerra. Independientemente de la opinión, la decisión de aprobar o vetar el proyecto de ley corresponde al presidente."
 usb.3.a: "Las FF.AA. necesitan fondos ahora más que nunca (Aprobar)."
 usb.3.b: "Las FF.AA. están bien, por ahora (Vetar)."
 usb.4.t: "§CConservadores§! proponen reducción de gastos"
 usb.4.desc: "Durante una reciente sesión del Congreso en D.C., los representantes republicanos propusieron una legislación sobre el estado actual del gasto interno. El proyecto de ley exige una reducción generalizada del gasto social, argumentando que la situación actual es lo suficientemente grave como para que la población \"acepte los sacrificios necesarios\" a nivel financiero por el bien del futuro de América, con la intención de liberar fondos para gastos más inmediatos destinados a apoyar el esfuerzo bélico.\n\nLa aprobación de dicha legislación sin duda se enfrentará a la desaprobación de los miembros §Yliberales§! y §pprogresistas§! del Congreso, ya que busca usurpar activamente los proyectos de ley aprobados en las últimas sesiones. Muchos se resisten a la idea de que recortemos estos servicios en un momento en que muchos americanos se encuentran en una situación financiera precaria e inestable. Independientemente de las opiniones, la decisión de aprobar o vetar el proyecto de ley es del presidente."
 usb.4.a: "Todos tenemos que hacer sacrificios (Aprobar)."
 usb.4.b: "Nuestro nivel actual de gasto está bien (Vetar)."
 usb.400.t: "§CConservadores§! proponen ley de industrialización"
 usb.400.desc: "Durante una reciente sesión del Congreso en D.C., los representantes republicanos propusieron una legislación sobre el corazón industrial americano. El proyecto de ley exige un aumento generalizado del gasto industrial, alegando que la situación actual es lo suficientemente grave como para que el público \"entienda la necesidad de una industria\".\n\nSi bien la idea de aumentar la producción durante este período sin precedentes ha atraído a algunos §Yliberales§!, la aprobación de dicha legislación sin duda se enfrentará a la desaprobación de los congresistas §pprogresistas§!. Muchos citan el riesgo que ponemos al mundo con la reindustrialización masiva, y citan estudios sobre el cambio climático como prueba de que debemos detener la industrialización. Independientemente de las opiniones, la decisión de aprobar o vetar el proyecto de ley es del presidente."
 usb.400.a: "Cada martillo golpea al enemigo (Aprobar)."
 usb.400.b: "Nuestro nivel actual de fábricas está bien (Vetar)."
 usb.5.t: "Aumenta el malestar civil"
 usb.5.desc: "Mientras la guerra civil sigue desatada, el funcionamiento básico de la sociedad continúa su lento deterioro. A pesar de nuestros mejores esfuerzos, se nos hace cada vez más difícil proveer a nuestro pueblo y aplicar la ley en las calles de nuestra nación. Ciudadanos regulares recurren al crimen y a la violencia para mantenerse a flote mientras que lo peor de nuestra sociedad se aprovechan cada vez más y más. Los conflictos entre enemigos ideológicos dejan a nuestras ciudades en ruinas y no somos capaces de repararlas lo suficientemente rápido, y el estado de ánimo decae día tras día.\n\nDebemos desviar recursos para paliar las fuentes de este malestar antes que nos encontremos hasta el cuello de caos."
 usb.5.a: "No podemos hacer mucho más."
 usb.6.t: "La salud de Joe Biden empeora"
 usb.6.desc: "Con el peso de la segunda guerra civil americana puesto sobre los hombros del comandante al mando, el estado de salud del presidente Biden se ha resentido últimamente. Con tal estrés puesto en el 46º presidente de los Estados Unidos, los efectos de este conflicto han empezado a presentarse en sus tareas diarias. Recientemente, el presidente ha empezado a quejarse sobre dolores de cabeza y migrañas, dando como resultado un incremento de la fatiga física y mareos.\n\nSi bien no hay nada de lo que preocuparse por el momento, se espera que la edad del presidente y la gravedad de la guerra únicamente empeore su condición."
 usb.6.a: "No hay que montar un alboroto por un poco de estrés."
 usb.7.t: "La influencia empresarial aumenta"
 usb.7.desc: "Con las diversas corporaciones y las grandes industrias sirviendo al legítimo gobierno americano, no es ningún secreto que su presencia se ha intensificado. Sea en forma de ayuda a las areas afectadas en tándem con las fuerzas gubernamentales, dar reportes favorables al gobierno a los medios tanto del progreso de la guerra como de las noticias domésticas, suministrando a nuestras tropas con equipo y con los muy necesarios suministros yendo al frente de batalla, la presencia incrementada de grandes agentes económicos - tanto dentro como fuera de la industria militar - han contribuido en gran medida a nuestros esfuerzos hasta ahora.\n\nSi bien pocos pueden negar los beneficios, ellos han estado ganando una influencia considerable últimamente. Se ha estado proponiendo y aprobando más legislación pro-corporativas, citando sus beneficios y su asistencia directa en la guerra - Sin embargo, algunos especulan que esto se debe a las conexiones pasadas y presentes en el aparato legislativo con varias compañías. No obstante, debemos mantener un ojo en este desarrollo interno, no sea que algo drástico ocurra como resultado de la debilitada estructura política del país."
 usb.7.a: "Siempre y cuando nos beneficie a todos."
 usb.7.b: "No lo se, parece corrupción..."

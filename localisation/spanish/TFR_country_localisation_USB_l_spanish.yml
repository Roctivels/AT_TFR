 nss.148.t: "El Golden Boy que se desvaneció"
 nss.148.d: "Aquellos con corazones sangrantes se sentirían heridos al conocer el destino de sus compatriotas americanos, ya sea un maestro cuyo mundo se desmorona con cada impacto o un fanático que aprende a perder la fe con cada día pasado en la oscuridad.\n\nRealmente no importa; los traidores han elegido voluntariamente abandonar los Estados Unidos cuando más los necesitaba.\n¿Y el mayor traidor de todos? Donald John Trump.\n\nMucho se puede decir de este hombre, pero él encarnó el espíritu corrosivo del populismo y una forma de rabia mental que arrastró a la mitad del país a un pozo profundo y oscuro. Él sabía lo que estaba haciendo; estaba dispuesto a quemar la nación para salvar su propio pellejo.\n\nLa justicia se presenta de muchas formas; es definitiva y pone fin a quienes han provocado la injusticia. Las muchas instalaciones en los Estados Unidos son como tumbas: los traidores que entran nunca saldrán, y los que lo hacen son un cascarón vacío de sí mismos, a la deriva por los días hasta que se entregan al acto final de libertad.\n\nTrump desaparecerá en las instalaciones de la misma manera, y a su debido tiempo, será olvidado, un número más en un sistema que poco se preocupa por los traidores y los disidentes antisociales.\nDescartamos a los que traen el caos y nunca miramos atrás."
 nss.148.a: "La lista crece."
 USB_evidence3_loc11: "§YIdentidades falsas§!\n\nDentro de la base de datos \"AmeriCare\" de ciudadanos vacunados, se ha descubierto que un número significativo de ellos son falsos. Identidades forjadas para inflar la tasa de éxito del seguimiento biométrico realizado a civiles. Una investigación más profunda demostró que, debido a esto, un número considerable de personas de interés han logrado pasar desapercibidas sin ningún medio para rastrearlas."
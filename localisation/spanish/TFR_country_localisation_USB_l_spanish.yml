 USB_trump_ward: "ZONA DE OPERACIONES \"AQUILES\""
 USB_trump_ward_desc: "\n§YGuardián:§!\n\n\n\n\n\n\n\n\n\n£GFX_robert_abrams_Portrait\n\n\n\n\n\n\n\n§W        Robert B. Abrams§!\n\n\nConstituida por el antiguo territorio perteneciente al traidor Trump, la §5ZONA DE OPERACIONES \"AQUILES\"§! tiene como objetivo principal restablecer el orden y acabar con la insurgencia trumpista, y como objetivo secundario encontrar la forma más efectiva de silenciar la disidencia."
 USB_western_ward: "ZONA DE OPERACIONES \"ODISEO\""
 USB_western_ward_desc: "\n§YGuardián:§!\n\n\n\n\n\n\n\n\n\n£GFX_kenneth_tovo_Portrait\n\n\n\n\n\n\n\n§W           Kenneth Tovo§!\n\n\nCompuesta por los antiguos estados de California, Utah, Oregón, Washington, Arizona, Idaho y Nevada, la §5ZONA DE OPERACIONES \"ODYSSEUS\"§! tiene como objetivo principal restaurar la Marina de los Estados Unidos a su antigua gloria, por cualquier medio necesario."
 USB_home_ward: "ZONA DE OPERACIONES \"CALÍGULA\""
 USB_home_ward_desc: "\n§YGuardián:§!\n\n\n\n\n\n\n\n\n\n£GFX_joseph_biden_Portrait\n\n\n\n\n\n\n\n§W             Joseph Biden§!\n\n\nConstituida por los estados originales que permanecieron leales a la causa, la §5ZONA DE OPERACIONES \"CALÍGULA\"§! tiene como objetivo principal mostrar a otras zonas lo que la lealtad puede brindarte en la Nueva América."
 USB_southern_ward: "ZONA DE OPERACIONES \"AJAX\""
 USB_southern_ward_desc: "\n§YGuardián:§!\n\n\n\n\n\n\n\n\n\n£GFX_paul_lacamera_Portrait\n\n\n\n\n\n\n\n§W          Paul LaCamera§!\n\n\nLa §5ZONA DE OPERACIONES \"AJAX\"§!, que comprende los antiguos estados de Arkansas, Texas, Nuevo México, Luisiana, Tennessee, Misisipi, Florida, Alabama, Carolina del Sur y Georgia, tiene como objetivo principal ser el nuevo granero de América mediante el uso de complejos agrícolas trabajados por prisioneros de guerra."
 USB_michigan_ward: "ZONA DE OPERACIONES \"HÉCTOR\""
 USB_michigan_ward_desc: "\n§YGuardián:§!\n\n\n\n\n\n\n\n\n\n£GFX_lloyd_austin_Portrait\n\n\n\n\n\n\n\n§W             Lloyd Austin§!\n\n\nLa §5ZONA DE OPERACIONES \"HÉCTOR\"§!, que forma parte del antiguo estado de Míchigan, tiene como objetivo principal la desnazificación del estado a través de la humillación pública, ejecuciones masivas y la creación de programas que permitan a los miembros del Movimiento Nacionalsocialista obtener amnistía a cambio de su servicio en la §5ZONA DE OPERACIONES \"AQUILES\"§!."
 USB_northeastern_ward: "ZONA DE OPERACIONES \"TESEO\""
 USB_northeastern_ward_desc: "\n§YGuardián:§!\n\n\n\n\n\n\n\n\n\n£GFX_terrence_shaughnessy_Portrait\n\n\n\n\n\n\n\n§W         T. O'Shaughnessy§!\n\n\nLa §5ZONA DE OPERACIONES \"TESEO\"§!, que comprende los antiguos estados de Nueva Inglaterra, tiene como objetivo principal el avance científico y es la futura pieza central del §YPROGRAMA DE MEGALÓPOLIS§!."
 USB_canadian_ward: "ZONA DE OPERACIONES \"PROMETEO\""
 USB_canadian_ward_desc: "\n§YGuardián:§!\n\n\n\n\n\n\n\n\n\n£GFX_charles_chiarotti_Portrait\n\n\n\n\n\n\n\n§W        Charles Chiarotti§!\n\n\nLa §5ZONA DE OPERACIONES \"PROMETEO\"§!, que constituye la colonia perdida de Canadá, tiene como objetivo principal la extracción masiva de recursos del campo canadiense, junto con la introducción del §YPROGRAMA DE MEGALÓPOLIS§! en ciudades como Montreal, Vancouver y Ontario."

 usb.101.t: "Kamala Harris se vuelve la girlboss #1"
 usb.101.d: "DE: Vox\nPor Adam Jarate\n\nDespués de unas elecciones sorprendentes y justas, el dúo Biden-Harris ha ido ganando popularidad en todo el país. El carisma tradicional del presidente, combinado con la energía y la actitud proactiva de la vicepresidenta, les ha valido el título de \"La mayor esperanza de América\" en plataformas como Reddit y Tumblr.\n\nSin embargo, Harris está destacando notablemente frente a su compañero de fórmula. No solo lidera en las encuestas de apoyo entre mujeres y personas de color, sino que incluso los hombres blancos promedio están comenzando a apreciar su ingenio. Algunos han formado un grupo llamado \"Hombres Blancos por Harris\", claramente preparándose para su posible candidatura presidencial en 2028. (...)\n\nA pesar de los tiempos difíciles que enfrenta América, la luz de una nueva era política podría sacarnos del pesimismo. Políticas como Kamala Harris, que no solo son símbolos de progreso e inclusión, sino también líderes estatales competentes que priorizan a los votantes y sus luchas, pronto reemplazarán a sus predecesores. Con esto, nos alejaremos de la política odiosa e intolerante de la era Trump.\n\nSolo podemos esperar lo mejor. En palabras de la señora vicepresidenta: \"Mi madre solía... a veces nos hacía pasar un mal rato y nos decía: «No sé qué les pasa a ustedes, jóvenes. ¿Creen que se acaban de caer de un cocotero?»\""
 usb.101.a: "¡Es negra, es valiente, y habla!"
 usb.102.t: "Bernie toma Twitch"
 usb.102.d: "DE: Polygon\nPor Ana Dizznuds\n\nBernie Sanders arrasa en internet durante unas horas tras participar en una transmisión de Twitch con streamers progresistas.\nEl senador Bernie Sanders participó en una transmisión en vivo de Twitch junto a creadores muy populares. El evento le permitió a Sanders hablar sobre los problemas y desafíos que enfrentan no solo América, sino también muchos jóvenes americanos. Los puntos principales fueron: la deuda estudiantil, la crisis en varios estados, el cabildeo corporativo contra el ciudadano común y, por supuesto, la suerte de contar con un sistema de salud competente. A lo largo de la noche, los espectadores se sorprendieron con la presencia de otros senadores de \"El Escuadrón\", como AOC e Ilhan Omar, pero quizás el momento memorable fue cuando el grupo le explicó a Sanders sobre los Vtubers. (...)\n\nLos usuarios que vieron la transmisión afirman que fue una experiencia positiva que les ayudó a conocer mejor a uno de los senadores más izquierdistas en América. A pesar de que Bernie se confundía con la tecnología moderna y los videojuegos, su mensaje les pareció importante. Algunos comentaristas incluso comentaron que las explicaciones de Bernie les ayudaron a comprender mejor sus propias situaciones.\n\nMedios de comunicación más maduros señalaron que es una clara estrategia para que más jóvenes se sumen a su agenda, y advierten que es de esperar que Sanders aparezca más en espacios de internet predominantemente juveniles. ¿Quizás en podcasts?"
 usb.102.a: "Donación de $5 - \"Feel the Bern!\""
 usb.103.t: "Los medios acusan a Romney de ser \"Romney\""
 usb.103.d: "DE: Blog personal\nPor Jet Muhdick\n\nMitt Romney es uno de los políticos más inteligentes en América, y lo creo. Sin embargo, los medios liberales siguen acusándolo de ser \"raro\". ¡Dejémosle eso a Trump y sus partidarios! (...)\nTodo comenzó con la decisión de Mitt de conectar con los votantes más jóvenes después de celebrar el Día del Perrito Caliente. Asistió a un evento popular para jóvenes llamado \"Furrycon\". Aquí es donde empezó el malentendido. Romney debió pensar que era una \"exhibición de animales\", pero no esperaba ver humanos vestidos como animales diferentes.\n\nA diferencia de lo que afirman los medios demócratas, Romney no perdió la compostura al descubrir el verdadero significado del evento. En cambio, conectó con posibles nuevos votantes. Sus esfuerzos fueron apoyados por un excelente cocinero \"vestido de pájaro azul\" que preparó perritos calientes \"increíbles\" en el puesto de comida, como el propio Mitt declaró en su Instagram.\nEn sus redes sociales, comentó y publicó fotos del evento. La foto de cierre lo mostraba rodeado de animales humanos de dibujos animados con los pulgares hacia arriba. En el comentario adjunto a la foto, habló de lo genial y entretenido que fue el evento. También destacó específicamente la inclusión de una sala de pruebas de VIH como \"el buen samaritano\" y elogió a los organizadores por ser conscientes de ello.\nMás tarde, publicó una imagen de sí mismo bebiendo leche con chocolate con el texto: \"Un día duro, pero muy productivo. El mejor momento para tomar leche con chocolate\"."
 usb.103.a: "Enterró el hacha con Big Bird."
 usb.104.t: "La temprana luz de la aurora"
 usb.104.d: "DE: VICE\nPor Veronica Steinman. Editado por Jared Shaysky\n\nEstaba en Times Square, rodeada de miles de personas, desde activistas hasta ciudadanos comunes, escuchando discursos que celebraban la victoria de la Unión: nuestra victoria, la victoria de América. Nunca había sentido una tormenta de emociones tan intensa. A pesar de toda la pérdida y la crueldad, el odio y la intolerancia, nuestra nación ha salido adelante. Nuestro futuro ha prevalecido.\nNo ha pasado mucho tiempo desde que se declaró oficialmente el fin del conflicto. Sin embargo, mientras caminaba y me preparaba para las festividades en Nueva York, podía sentirlo en el aire. Las expresiones en los rostros de la gente eran más alegres, las conversaciones más espontáneas, y la atmósfera de felicidad lo llenaba todo.\n\nAl principio, fue una época oscura. Todo parecía irreal y el dolor era abrumador. Muchos de ustedes pueden identificarse con esto. Todo lo que valorábamos -nuestra forma de vida, nuestros seres queridos, nuestra identidad- estaba en peligro de ser destruido por una amenaza enorme.\n\n\"Lloro de alegría\", me dijo una de las activistas feministas durante el evento. \"Por fin podemos avanzar, sin mirar atrás\". Estoy completamente de acuerdo. Fue un proceso doloroso, pero necesario. Hemos dejado atrás todos los elementos intolerantes y odiosos de nuestra historia y sociedad. América ha superado su pasado y, como muchas de las personas que entrevisté, puedo decir: \"Ganó el amor\".\n\nAhora podemos volver a reunirnos, abrazarnos y reír, sin importar nuestras creencias, ideologías o partidos.\nTodos volvemos a ser americanos, y debemos volver a aprender a amar."

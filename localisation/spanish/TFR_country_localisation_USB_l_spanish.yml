 USB_judas_help_tt: "§YGámbito de Judas§!"
 USB_judas_help_desc_tt: "Para localizar al traidor, debes tomar decisiones que descubran §Yevidencias§!. Pasa el ratón por encima de los iconos de interrogación para leerlas.\n\nLuego, debes §Ycotejar§! las evidencias obtenidas con las descripciones de cada miembro del §Ygabinete en la sombra§! en la categoría §YLos Cognoscenti§!.\n\nUna vez que hayas descubierto al traidor, debes acusarlo de traición §Yhaciendo clic en su retrato§! en la categoría §YLos Cognoscenti§!. Necesitarás §Y100§! de poder político y total confianza, ya que equivocarse hará que Judas actúe más §Rrápido§!.\n\nDate prisa: si no logramos detener a Judas a tiempo, las consecuencias de sus acciones pueden ser §Rextremadamente graves§!."
 USB_larry_fink: "Larry Fink"
 USB_wef_leader_name: "§YLarry Fink§!"
 USB_wef_leader_desc: "§LComo CEO de BlackRock y miembro de alto rango de la junta directiva del Foro Económico Mundial, Larry Fink demostró ser una figura clave en la agenda de los Cognoscenti para establecer el Estado profundo con control total. Como el principal gestor de activos del país y la firma líder en Wall Street, los vastos activos de Fink resultaron esenciales para el establecimiento del Presupuesto Negro por parte del Estado profundo, un presupuesto secreto y extraoficial destinado a financiar los esfuerzos ocultos del Estado profundo.\n\nLas conexiones de Fink con el FEM también resultaron instrumentales en el intento de los Cognoscenti de establecer el globalismo como una institución permanente, y sus contribuciones no han pasado desapercibidas para los miembros de la cábala, lo que le ha permitido ascender hasta convertirse en una de las figuras más influyentes del grupo, con las otras élites corporativas de los Cognoscenti siguiendo al pie de la letra su agenda.\n\nEl mundo corporativo siempre ha sido un lugar despiadado, y Larry Fink siempre ha estado en la cima del juego. Los Cognoscenti son un nuevo escenario, y un juego mucho más grande de lo que Fink está acostumbrado. Sin embargo, Fink está más que preparado para la tarea, su triple posición como miembro clave de los Cognoscenti, BlackRock y el FEM le da una enorme ventaja. Aunque Klaus Schwab sea la cara pública del FEM, Fink es un actor clave entre bastidores, y sus lazos con el Estado profundo americano solo han solidificado aún más su presencia como líder globalista. Cooperando con los securócratas, Fink no solo se ha adherido a la agenda del FEM, sino que la ha mejorado, elaborando una visión para un \"Gran Reinicio Americano\" que se adapte a las condiciones del pueblo americano y a los objetivos de los Cognoscenti. Tal como están las cosas, Fink está más que dispuesto a jugar, y su objetivo es jugar para quedarse.§!"
 USB_william_burns: "William J. Burns"
 USB_cia_leader_name: "§YWilliam J. Burns§!\n§YPrimus inter pares§!"
 USB_cia_leader_desc: "§LMiembro de carrera del Servicio Exterior de EE.UU. y ex subsecretario de Estado, William J. Burns fue nombrado director de la CIA bajo la administración del presidente Biden. Rápidamente, sin embargo, se daría cuenta dolorosamente de cuán profunda era la podredumbre de la corrupción, los burócratas ineficaces y las luchas políticas internas en los pasillos del poder. Ni siquiera la Guerra Civil remedió los problemas fundamentales en las instituciones gobernantes de América.\n\nA medida que la soga se apretaba sobre Washington, Burns serviría como la figura central detrás del establecimiento de los Cognoscenti y la ejecución del Golpe Secreto. Bajo su liderazgo, la CIA se ha expandido drásticamente para acomodar las necesidades logísticas de mantener el control continuo del Estado profundo sobre el poder. A raíz de esto, Burns se encuentra ahora como el tecnócrata de seguridad más poderoso de América, si no algo comparable a un presidente en la sombra.\n\nAhora, con las instituciones más poderosas del país a su disposición, William Burns ha pasado a la ofensiva en un intento de asegurar que el Caos nunca más vuelva a asomar la cabeza, solidificando en el proceso un estado permanente de Orden. A sus ojos, no puede haber margen para el error. Con el Estado profundo y su complejo militar-industrial completamente al mando, está preparado para ejecutar un plan para establecer a América como la única superpotencia mundial en el futuro previsible. Y a sus ojos, los Cognoscenti no tienen margen para fallar en su misión de asegurar su visión. Tal como están las cosas, todo está en juego. Las apuestas nunca han sido tan altas, y William Burns está listo para jugar.§!"
 USB_stefanie_tompkins: "Stefanie Tompkins"
 USB_darpa_leader_name: "§YStefanie Tompkins§!"
 USB_darpa_leader_desc: "§LComo jefa de DARPA, Stefanie Tompkins está a cargo de supervisar la investigación y el desarrollo de tecnologías emergentes para el Departamento de Defensa. Bajo la influencia de los Cognoscenti, y a la luz del control del Estado profundo, el alcance de su proyecto se ha expandido enormemente.\n\nAunque es científica primero y burócrata después, Tompkins ha demostrado una habilidad notable en la arena política, y no teme usar su influencia para avanzar en la agenda del complejo militar-industrial. Sin embargo, también ha demostrado ser una pragmática, y está dispuesta a hacer concesiones para asegurar que se cumplan los objetivos de los Cognoscenti. Aunque leal a la cábala, Tompkins no carece de sus propias reservas. Desconfía de los elementos más extremos de los Cognoscenti, y no teme expresar sus preocupaciones. No obstante, está comprometida con la causa de los Cognoscenti, y está dispuesta a hacer lo que sea necesario para asegurar el éxito de la cábala, incluso si eso significa sacrificar algunas de sus convicciones personales.\n\nCon los gigantes contratistas de defensa de América detrás de ella, y con DARPA bajo su liderazgo, Tompkins cuenta con todo el poder del complejo militar-industrial respaldándola. Usando su posición, Tompkins encabeza el desarrollo de nuevas tecnologías y sistemas de armas para mantener la superioridad del Estado profundo, ya sea en el campo de batalla o en el panóptico del control social. A sus ojos, los Cognoscenti son la última y mejor esperanza para preservar los pilares del Orden, y está decidida a hacer lo que sea necesario para asegurar el éxito de la cábala y asegurar su propio lugar en el Nuevo Orden Mundial.§!"
 USB_shadow_cabinet_text: "El gabinete en la sombra"
 USB_NSA_paul_nakasone_sc: "Paul Nakasone"
 USB_NSA_paul_nakasone_tt: "§YPaul Nakasone§!\nDirector de la NSA\n   £decryption_texticon  Factor de potencia de decodificación: §G+10.0%§!"
 USB_NSA_paul_nakasone_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_paul_nakasone_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YImportancia histórica:§!\nLa carrera del sujeto demuestra un avance sistemático a través de roles de inteligencia cada vez más críticos alineados con la seguridad nacional. Su servicio anterior incluye puestos en el Ejército de los EE.UU. y en operaciones de ciberinteligencia, incluido el mando adjunto del Cibercomando del Ejército de los EE.UU., así como un rol de liderazgo sénior en la Fuerza de Misión Nacional Cibernética.\n\n§YActividades actuales:§!\nEl sujeto supervisa las operaciones de vigilancia de la NSA bajo el Acta PATRIOT II y el Acta de Seguridad de la Salud Pública, integrando el Proyecto \"Am-Net\" en la vida diaria americana. Los objetivos actuales se centran en optimizar la vigilancia con IA para reducir el personal mientras se expande la cobertura. Bajo la dirección del sujeto, la NSA está desarrollando sistemas predictivos de IA para identificar posibles elementos antisociales antes de que se organicen.\n\n§YVida temprana y personal:§!\nNacido en White Bear Lake, Minnesota, en una familia nipo-americana. El padre del sujeto sirvió en el Servicio de Inteligencia Militar del Ejército de los EE.UU. durante la Segunda Guerra Mundial. La ascendencia del sujeto se remonta a la aldea de Misato en el distrito de Nakagami, Okinawa. La educación del sujeto refleja un cultivo metódico de la experiencia en inteligencia. Comisionado en 1986 a través del ROTC del Ejército en la Universidad de St. John's, obtuvo títulos avanzados en gestión de sistemas (Universidad del Sur de California), inteligencia estratégica (National Defense Intelligence College) y estudios estratégicos (U.S. Army War College), además de graduarse del U.S. Army Command and General Staff College. El sujeto está casado con Susan S. Nakasone (de soltera Sternberg), con quien tiene cuatro hijos. Debido a los compromisos de seguridad nacional, el sujeto y su familia residen en Fort Meade, Maryland, lo que ofrece proximidad a la sede de la NSA.§!"
 USB_NSA_george_barnes_sc: "George C. Barnes"
 USB_NSA_george_barnes_tt: "§YGeorge C. Barnes§!\nDirector de la NSA\n   £pol_power  Ganancia diaria de poder político: §R-0.05§!\n   £decryption_texticon  Factor de potencia de decodificación: §G+5.0%§!"
 USB_DIA_jeffrey_kruse_sc: "Jeffrey A. Kruse"
 USB_DIA_jeffrey_kruse_tt: "§YJeffrey A. Kruse§!\nDirector de la DIA\n   £counter_intelligence_texticon  Defensa de inteligencia: §G+10.0%§!"
 USB_DIA_jeffrey_kruse_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_jeffrey_kruse_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YImportancia histórica:§!\nLa carrera del sujeto demuestra un avance sistemático a través de roles de inteligencia cada vez más críticos alineados con la seguridad nacional. Su servicio anterior incluye el servicio en la Fuerza Aérea de EE.UU., así como puestos de inteligencia en USINDOPACOM y USD(I&S); con asesoría en asuntos militares bajo el Director de Inteligencia Nacional antes de la Guerra Civil.\n\n§YActividades actuales:§!\nBajo el liderazgo del sujeto, las operaciones de la Agencia de Inteligencia de Defensa se han alineado con las de la propia CIA, con la Agencia y la DIA cooperando a una escala nunca antes vista. Como director, Kruse ha supervisado la expansión de proyectos preexistentes del Departamento de Defensa relacionados con el estudio del aprendizaje automático, como el Proyecto Maven, integrando estos sistemas en el aparato de vigilancia más amplio. También dirige la recopilación de inteligencia extranjera del ejército.\n\n§YVida personal:§!\nLas credenciales académicas del sujeto se alinean extensamente con su carrera de inteligencia: Licenciatura en Ciencias Políticas de la Universidad de Miami (1990), Maestría en Inteligencia Estratégica del Joint Military Intelligence College (1996), Maestría en Seguridad Nacional y Estudios Estratégicos del U.S. Naval War College (2004), y Maestría en Estrategia de Seguridad Nacional del National War College (2008).§!"
 USB_DIA_christine_bordine_sc: "Christine L. Bordine"
 USB_DIA_christine_bordine_tt: "§YChristine L. Bordine§!\nDirectora de la DIA\n   £pol_power  Ganancia diaria de poder político: §R-0.05§!\n   £counter_intelligence_texticon  Defensa de inteligencia: §G+5.0%§!"
 USB_FBI_james_comey_sc: "James Comey"
 USB_FBI_james_comey_tt: "§YJames Comey§!\nDirector del FBI\n   £stability_texticon  Estabilidad semanal cuando esté debajo de 50%: §G+0.20%§!"
 USB_FBI_james_comey_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_james_comey_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YImportancia histórica:§!\nLa destitución del sujeto por parte de Trump lo convirtió en un activo clave para las operaciones de los Cognoscenti contra el Gobierno constitucionalista. Aprovechó el conocimiento institucional y las redes federales de aplicación de la ley, proporcionando inteligencia crítica previa al golpe, incluyendo la identificación de simpatizantes internos y la evaluación de vulnerabilidades institucionales.\n\n§YActividades actuales:§!\nDespués de asumir sus funciones, el director Comey instituyó rápidamente protocolos de reajuste de personal para eliminar a individuos políticamente poco fiables del Buró. Bajo su liderazgo, el Buró expandió significativamente la vigilancia doméstica, centrándose en la monitorización digital y la recopilación de inteligencia contra amenazas extremistas.\n\n§YVida temprana y personal:§!\nLos años formativos del sujeto transcurrieron en Allendale, Nueva Jersey. La exposición temprana a elementos criminales incluyó un enfrentamiento con un intruso armado durante un allanamiento de morada. Se cree que esta experiencia moldeó su trayectoria hacia la aplicación de la ley y el servicio público. En 1987, se casó con Patrice Failor, a quien conoció en el College of William and Mary. Tuvieron seis hijos; uno de estos murió en la infancia, un evento que el sujeto ha señalado como significativo en su desarrollo psicológico. La residencia del sujeto en McLean, Virginia, ofrece proximidad a infraestructuras clave de inteligencia y facilita comunicaciones seguras con la dirección de la Agencia. Esta ubicación optimiza la seguridad operativa y proporciona una base estable para el personal de alto nivel del Buró. El sujeto es de ascendencia irlandesa. Su educación religiosa fue católica; actualmente se identifica como metodista. Esta transición religiosa puede indicar una evolución personal adaptativa o una alineación estratégica con las normas sociales predominantes dentro de los entornos institucionales.§!"
 USB_FBI_paul_abbate_sc: "Paul Abbate"
 USB_FBI_paul_abbate_tt: "§YPaul Abbate§!\nDirector del FBI\n   £pol_power  Ganancia diaria de poder político: §R-0.05§!\n   £stability_texticon  Estabilidad semanal cuando esté debajo de 50%: §G+0.10%§!"
 USB_ATF_marvin_richardson_sc: "Marvin G. Richardson"
 USB_ATF_marvin_richardson_tt: "§YMarvin G. Richardson§!\nDirector del ATF\n   £operatives_root_out_resistance_texticon  Efectos de misión Erradicar resistencia: §G+10.0%§!"
 USB_ATF_marvin_richardson_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_marvin_richardson_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YImportancia histórica:§!\nAntes de su servicio en el ATF, el sujeto fue un oficial de la policía, donde alcanzó el rango de teniente. La carrera del sujeto dentro del ATF lo preparó para una aplicación de la ley ampliada bajo la orden actual. Presente durante el asedio de Waco en 1993, esta experiencia probablemente moldeó su enfoque hacia el desarme civil. Galardonado con la Medalla al Servicio en Acción Hostil por su servicio, ha defendido consistentemente las acciones del ATF, demostrando su creencia en la fuerza decisiva contra la actividad antisocial.\n\n§YActividades actuales:§!\nBajo la dirección del sujeto, el ATF ha implementado protocolos de incautación de armas de fuego dirigidos a individuos señalados por sistemas de predicción de amenazas con IA. Estas operaciones priorizan la toma de armas de fuego de personas de interés antes de que actuen según sus tendencias antisociales. Las task forces regionales se coordinan con elementos del FBI y SAC para confiscaciones. Ha ampliado las capacidades forenses del ATF, especialmente en el rastreo de armas de fuego y el análisis balístico, creando registros que complementan los sistemas de seguimiento biométrico bajo el Acta de Seguridad de la Salud Pública. Las operaciones anticulto bajo la \"doctrina de Waco\" han neutralizado elementos antisociales conservadores y destruido docenas de complejos considerados amenazas a la seguridad nacional.\n\n§YVida temprana y personal:§!\nEl sujeto se crio en Ft. Worth, Texas, con nueve hermanos. Este trasfondo en una unidad familiar grande, potencialmente caótica, pudo haber influido en su perspectiva posterior sobre el control de multitudes y la necesidad de una intervención estatal firme en estructuras familiares antisociales. El sujeto posee una Licenciatura en Administración de Empresas de la Universidad del Norte de Texas, así como una Maestría en Ciencias en Relaciones Humanas y Negocios de la Universidad de Amberton. El sujeto está casado y tiene seis hijos.§!"
 USB_ATF_gary_restaino_sc: "Gary M. Restaino"
 USB_ATF_gary_restaino_tt: "§YGary M. Restaino§!\nDirector del ATF\n   £pol_power  Ganancia diaria de poder político: §R-0.05§!\n   £operatives_root_out_resistance_texticon  Efectos de misión Erradicar resistencia: §G+5.0%§!"
 USB_CDC_anthony_fauci_sc: "Anthony Fauci"
 USB_CDC_anthony_fauci_tt: "§YAnthony Fauci§!\nDirector de los CDC\n   £GFX_dx_yellow Factor de gastos personales: §Y-5.0%§!"
 USB_CDC_anthony_fauci_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_anthony_fauci_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YImportancia histórica:§!\nSeleccionado como director de los CDC por su experiencia médica y cooperación de inteligencia, el sujeto aplica sin concesiones directivas de salud críticas para el confinamiento permanente. Anteriormente, lideró las respuestas de EE.UU. al VIH/SIDA, SARS, gripe porcina, MERS, Ébola y COVID-19. En la década de 2000, ayudó a crear PEPFAR y avanzó en medicamentos de biodefensa después del 11 de septiembre.\n\n§YActividades actuales:§!\nEl estatus del sujeto como \"el principal experto en enfermedades infecciosas de América\" ayuda a hacer cumplir los mandatos de vacunación y seguimiento biométrico. Las representaciones mediáticas de su gestión de crisis refuerzan la autoridad de las restricciones pandémicas, enmarcando la oposición como extremismo anticientífico. A pesar de su avanzada edad, el sujeto se mantiene sano sin evidencia de deterioro físico o cognitivo, manteniendo el desempeño de sus funciones a través de ejercicio regular, una dieta equilibrada y vigilancia médica continua.\n\n§YVida temprana y personal:§!\nEl sujeto nació en Brooklyn en una familia de farmacéuticos. Obtuvo una Licenciatura en Artes del College of the Holy Cross y un título de médico de la Universidad de Cornell, estableciendo una base en disciplinas científicas críticas para su carrera en salud pública. El sujeto reside actualmente en Washington, D.C., y se casó con Christine Grady, enfermera y bioeticista del NIH, en 1985. Tienen tres hijos adultos que trabajan en ciencia o medicina, lo que refuerza los compromisos profesionales compartidos de la familia y la dedicación del sujeto a las políticas de monitoreo biométrico. Criado como católico pero ahora identificándose como \"humanista\", el sujeto se alinea con las ideologías predominantes. Su enfoque basado en datos refleja objetivos de inteligencia más amplios, lo que permite la cooperación en el control de la población. Aunque afirma ser \"apolítico\", apoya constantemente las prioridades del Estado de seguridad, sugiriendo un utilitarismo donde las libertades ceden ante el progreso científico, alineado con la agenda del Estado de seguridad.§!"
 USB_CDC_rochelle_walensky_sc: "Rochelle Walensky"
 USB_CDC_rochelle_walensky_tt: "§YRochelle Walensky§!\nDirectora de los CDC\n   £pol_power Ganancia diaria de poder político: §R-0.05§!\n   £GFX_dx_yellow  Factor de gastos personales: §Y-2.0%§!"
 USB_FEMA_deanne_criswell_sc: "Deanne Criswell"
 USB_FEMA_deanne_criswell_tt: "§YDeanne Criswell§!\nAdministradora de la FEMA\n   £consumer_goods_texticon Expectativa de fábricas dedicadas a bienes de consumo: §Y-5.0%§!"
 USB_FEMA_deanne_criswell_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_deanne_criswell_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YImportancia histórica:§!\nAntes de su cargo actual, la sujeto fue Comisionada del NYCEM, coordinando protocolos pandémicos que se convirtieron en plantillas para los confinamiento actuales. Esta experiencia en contención civil a gran escala es aplicable a la supervisión de instalaciones nacionales de internamiento y rehabilitación. Anteriormente, como gerente de emergencias de Aurora, desarrolló marcos de preparación para desastres urbanos que priorizaban la seguridad sobre las libertades civiles, lo que se alinea con los objetivos actuales de la FEMA. El servicio militar de la sujeto con la Guardia Nacional Aérea de Colorado durante los despliegues en Kuwait después del 11-S fomentó una mentalidad centrada en el mando, enfatizando la acción decisiva sobre la deliberación, crucial para expandir la autoridad de la FEMA bajo el nuevo aparato de seguridad. Se sospecha que la sujeto utilizó su posición en la FEMA para identificar y detener a partidarios locales de Donald J. Trump, utilizando las situaciones de emergencia de los huracanes Helene y Milton como pretexto para la detención masiva de elementos antisociales. Esto se alinea con los imperativos del Estado de seguridad, lo que sugiere una congruencia ideológica con el orden establecido.\n\n§YActividades actuales:§!\nLa sujeto ha expandido significativamente la autoridad de la FEMA bajo el Acta PATRIOT II, aprovechando los activos de inteligencia y los despliegues militares para el control de la población. Esto incluye la construcción y supervisión de campos de internamiento para elementos antisociales, operacionalizando las estrategias del estado de seguridad como \"gestión de emergencias\".\n\n§YVida temprana y personal:§!\nDespués de graduarse de la Escuela Secundaria Católica Central en Manistee, Míchigan, en 1984, la sujeto siguió una educación metódica relevante para la seguridad: una Licenciatura en Ciencias en educación tecnológica de la Universidad Estatal de Colorado, seguida de una Maestría en Administración Pública de la Universidad de Colorado Denver y una Maestría en Seguridad Nacional de la Escuela Naval de Posgrado, lo que se alinea con el papel de seguridad ampliado de FEMA después del golpe.§!"
 USB_FEMA_erik_hooks_sc: "Erik Hooks"
 USB_FEMA_erik_hooks_tt: "§YErik Hooks§!\nAdministrador de la FEMA\n   £pol_power Ganancia diaria de poder político: §R-0.05§!\n   £consumer_goods_texticon Expectativa de fábricas dedicadas a bienes de consumo: §Y-2.0%§!"
 USB_Pfizer_albert_bourla_sc: "Albert Bourla"
 USB_Pfizer_albert_bourla_tt: "§YAlbert Bourla§!\nPresidente y CEO de Pfizer\n   £research_speed_texticon  Velocidad de investigación: §G+5.00%§!"
 USB_Pfizer_albert_bourla_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_albert_bourla_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YImportancia histórica:§!\nEl sujeto se unió a Pfizer en 1993, ascendiendo a través de la jerarquía hasta ocupar roles ejecutivos prominentes. Promovido a Director de Operaciones en enero de 2018, se convirtió en CEO a finales de ese mismo año. Veterinario de formación, anteriormente se desempeñó como presidente del negocio global de vacunas, oncología y atención médica al consumidor de Pfizer, supervisando el desarrollo y lanzamiento de productos. El sujeto desempeñó un papel logístico crucial durante la pandemia de COVID-19, coordinando la producción global de vacunas. Durante este período, comenzó a colaborar con activos de inteligencia para asegurar contratos gubernamentales y dar forma a la política de vacunación, sentando las bases para el Acta de Seguridad de la Salud Pública.\n\n§YActividades actuales:§!\nEl sujeto supervisa la expansión de Pfizer en el sistema \"AmeriCare\", coordinando con agencias federales para desarrollar e implementar plataformas de vacunas de próxima generación. Bajo su dirección, Pfizer ha establecido instalaciones de investigación que integran el seguimiento biométrico con protocolos de vacunación obligatorios. Pfizer también produce productos farmacéuticos para programas de modificación del comportamiento y pacificación social. El sujeto consulta regularmente con el liderazgo de los Cognoscenti en asuntos de bioseguridad y gestión poblacional. Su experiencia en logística farmacéutica y asociaciones público-privadas lo ha convertido en un recurso invaluable para implementar el aparato de seguridad sanitaria previsto en el Acta de Seguridad de la Salud Pública.\n\n§YVida temprana y personal:§!\nEl sujeto nació en 1961 en Salónica, Grecia, en una familia judía sefardí. El sujeto tiene un doctorado en biotecnología de la reproducción de la Facultad de Veterinaria de la Universidad Aristóteles de Salónica. El sujeto está casado con Myriam Alchanati, con quien tiene dos hijos, una hija y un hijo. El sujeto mantiene una finca de verano en Calcídica, Grecia.§!"
 USB_Pfizer_sally_susman_sc: "Sally Susman"
 USB_Pfizer_sally_susman_tt: "§YSally Susman§!\nPresidenta y CEO de Pfizer\n   £pol_power  Ganancia diaria de poder político: §R-0.05§!\n   £research_speed_texticon  Velocidad de investigación: §G+2.00%§!"
 USB_ICE_patrick_lechleitner_sc: "Patrick Lechleitner"
 USB_ICE_patrick_lechleitner_tt: "§YPatrick Lechleitner§!\nDirector de ICE\n   £population_texticon  Población mensual: §G+25.0%§!"
 USB_ICE_patrick_lechleitner_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_patrick_lechleitner_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YImportancia histórica:§!\nLa carrera del sujeto demuestra una progresión a través de roles de aplicación de la ley migratoria cada vez más críticos. Como jefe de la Oficina de Campo de HSI en Washington, D.C., cultivó conexiones esenciales entre las agencias federales de aplicación de la ley y de inteligencia. El sujeto dirigió múltiples divisiones de HSI, incluyendo Operaciones Internacionales, Investigaciones de Seguridad Nacional y Ciberdelitos. Su experiencia en aplicación de la ley comenzó en el Departamento de Policía del Condado de Fairfax antes de avanzar al rol de agente especial del Servicio de Aduanas de EE.UU. en Filadelfia. Su servicio temprano en inteligencia de señales de la Marina de EE.UU. estableció una base de seguridad nacional. Su carrera se alinea con la expansión de la seguridad fronteriza y la integración de inteligencia. Su rol actual aprovecha la experiencia interdominio para el control de inmigración post-golpe.\n\n§YActividades actuales:§!\nBajo la dirección del sujeto, ICE ha implementado sistemas mejorados de seguimiento biométrico a lo largo de las regiones fronterizas y ha expandido las capacidades de detención a través de la coordinación con las instalaciones de la FEMA. La agencia ha aumentado su alcance operativo para incluir operaciones de aplicación de la ley urbanas dirigidas a poblaciones indocumentadas y disidentes dentro de las ciudades del interior.\n\n§YVida temprana y personal:§!\nEl sujeto obtuvo una Licenciatura en Psicología de la Universidad George Mason y una Maestría en Criminología de la Universidad St. Joseph's, completando su educación con un certificado de posgrado en Liderazgo Ejecutivo de la American University en Washington, D.C., posicionándolo estratégicamente cerca de los centros de poder. Su posición profesional incluye la membresía en el Servicio Ejecutivo Superior, lo que lo clasifica entre los principales funcionarios de carrera del Gobierno federal, y el reconocimiento como Senior DHS Fellow, lo que subraya su experiencia dentro del marco de inteligencia del departamento y su idoneidad para operaciones de aplicación de la ley de inmigración expandidas bajo el nuevo aparato de seguridad.§!"
 USB_ICE_staci_barrera_sc: "Staci A. Barrera"
 USB_ICE_staci_barrera_tt: "§YStaci A. Barrera§!\nDirectora de ICE\n   £pol_power  Ganancia diaria de poder político: §R-0.05§!\n   £population_texticon  Población mensual: §G+10.0%§!"
 USB_evidence_locker_text: "Evidencias: [?USB_obtain_evidence_var]/6"
 USB_evidence1_text: "EVIDENCIA I"
 USB_evidence1_loc: "§L[USB_evidence1_scripted_loc]§!"
 USB_evidence1_loc1: "§YSplinter Cell§!\n\nUna redada armada contra una presunta \"célula antisocial\" en Boston resultó en la captura de sus miembros. Su equipo incluía radios encriptadas de grado militar y esquemas detallados de las instalaciones de detención del Departamento de Seguridad Nacional, junto con una lista de casas de seguridad compilada a partir de bases de datos internas de las fuerzas policiales. El personal fue identificado como exmilitares o expolicias. Durante el interrogatorio, revelaron que su contacto les proporcionó la información y el hardware, prometiendo ayudarles a \"luchar contra el verdadero enemigo\"."
 USB_evidence1_loc2: "§YSifón de telemetría§!\n\nSe descubrió una diminuta toma no autorizada en la red de telemetría satelital que monitorea la construcción de la D.U.M.B. en el desierto de Utah. Los datos estaban siendo desviados, no a una potencia extranjera, sino a una granja de servidores registrada bajo una corporación fantasma con sede en Fairfax, Virginia."
 USB_evidence1_loc3: "§YFondos extraviados§!\n\nUna parte significativa de los fondos, desviados de una subvención de investigación, no ha sido contabilizada. La transferencia ha sido rastreada a una empresa fantasma fraudulenta con sede en Panamá. La transferencia fue canalizada a través de una multitud de intermediarios, utilizando métodos familiares para los Cognoscenti."
 USB_evidence1_loc4: "§YBrecha de datos§!\n\nSe intentó acceder a la base de datos interna del Departamento de Energía, con el objetivo de obtener información relativa a la red energética nacional. Específicamente, el culpable intentó acceder a información relacionada con centrales nucleares clave y sus protocolos de seguridad. El intento no tuvo éxito y su origen se rastreó hasta un servidor ubicado en Washington D.C., con una multitud de canales proxy utilizados para ocultar su procedencia."
 USB_evidence1_loc5: "§YIntentos de extorsión§!\n\nVarios funcionarios gubernamentales recibieron cartas y paquetes que contenían información sensible relacionada con sus vidas personales, y los mensajes incluían amenazas de que si dichos funcionarios no cumplían con las demandas, su información sería filtrada a grupos antisociales."
 USB_evidence1_loc6: "§YCampaña de desprestigio§!\n\nUna campaña de acoso en línea a pequeña escala dirigida a varios funcionarios, donde se utilizan imágenes y videos generados por IA para arruinar la reputación del funcionario. El aspecto más notable es el número de cuentas falsas en línea dedicadas a esta campaña de desprestigio, cuyos orígenes probablemente se encuentren en Asia."
 USB_evidence2_text: "EVIDENCIA II"
 USB_evidence2_loc: "§L[USB_evidence2_scripted_loc]§!"
 USB_evidence3_text: "EVIDENCIA III"
 USB_evidence3_loc: "§L[USB_evidence3_scripted_loc]§!"
 USB_evidence3_loc1: "§YNetworking§!\n\nLas comunidades de inteligencia de los Cinco Ojos fueron informadas falsamente de un inminente ataque nuclear por parte de los Estados Unidos varias veces en un solo día. Un juego burocrático sofisticado y enrevesado hizo que el/los remitente/s original/es de los mensajes no pudieran ser rastreados. Este intento de infundir \"fatiga de alarma\" puede indicar las conexiones de Judas con inteligencia extranjera."
 USB_evidence3_loc2: "§YManada§!\n\nEn un intento de violar el cortafuegos de la Am-Net, alguien intentó filtrar información a la prensa internacional sobre docenas de ataques terroristas de lobos solitarios conectados a los servicios de seguridad de EE.UU. Los documentos filtrados podrían comprometer a múltiples agencias ameericanas involucradas en el proceso. Los hackers posiblemente estaban usando equipo y/o software de grado militar."
 USB_evidence3_loc3: "§YDawn Patrol§!\n\nSe formaron múltiples fuerzas de ataque compuestas por agentes del FBI, el ATF y ICE, y se entregaron órdenes de liquidación falsificadas para expertos científicos y de inteligencia clave en todo el país bajo el pretexto de combatir elementos antisociales. El organizador estaba claramente familiarizado con los métodos y procedimientos de los Cognoscenti. Agentes de la CIA-SAC han logrado evitar los asesinatos."
 USB_evidence3_loc4: "§YFin del túnel§!\n\nEscuadrones de la CIA-SAC allanaron un viejo túnel bajo la frontera entre Estados Unidos y México. El túnel había sido marcado para su destrucción por el Departamento de Seguridad Nacional, pero nunca se llevó a cabo, y aparentemente estaba siendo utilizado por personal desconocido. Se requieren más investigaciones."
 USB_evidence3_loc5: "§YConsulta sospechosa§!\n\nSe realizó una consulta discreta a través de un antiguo canal inactivo de las fuerzas del orden, solicitando los expedientes personales y psicológicos completos y sin censura del director Burns desde sus primeros años en la Agencia."
 USB_evidence3_loc6: "§YBuzón muerto de Estambul§!\n\nUn paquete de datos cifrados, que contenía expedientes de casos meticulosamente cotejados que detallaban la colusión de la CIA con grupos de ultraderecha durante la Guerra Civil, fue enviado desde un servidor seguro a un buzón muerto anonimizado en Estambul. Provenía de un individuo anónimo que utilizaba el nombre en clave EDGAR."
 USB_evidence3_loc7: "§YTransferencia de Personal No Autorizada§!\n\nTres investigadores de alto nivel de los CDC, dos empleados de bajo nivel de la FEMA y una docena de guardias de centros de detención de ICE de nivel medio han desaparecido en el último mes. Sus salidas fueron autorizadas por órdenes de transferencia falsificadas que utilizaron protocolos específicos de cada agencia, lo que sugiere un profundo conocimiento institucional."
 USB_evidence3_loc8: "§YDonaciones por proxy§!\n\nUna serie de donaciones anónimas a una organización benéfica de afiliación católica que apoya a \"empleados federales despedidos injustamente\" fue rastreada hasta una compleja serie de transacciones de criptomonedas. La clave de activación inicial de la billetera, decodificada, era el versículo Mateo 16:26: \"¿De qué le servirá al hombre ganar el mundo entero si pierde su vida?\""
 USB_evidence3_loc9: "§YJugando al doctor§!\n\nSe descubrió que varias instalaciones carecían de equipo médico como medicamentos, herramientas quirúrgicas y maquinaria. La mayor parte se utilizaba para atender a personal herido y a personas detenidas, pero una parte también se utilizaba para interrogatorios mejorados."
 USB_evidence3_loc10: "§YGran Hermano§!\n\nEmpleados de seguridad interna de la CIA encontraron cámaras de seguridad no autorizadas, micrófonos ocultos, sensores de movimiento y otros dispositivos de vigilancia instalados en múltiples edificios gubernamentales, colocados durante renovaciones. El grado y la calidad del equipo coinciden con los utilizados en los programas de vigilancia de la CIA."
 USB_evidence4_text: "EVIDENCIA IV"
 USB_evidence4_loc: "§L[USB_evidence4_scripted_loc]§!"
 USB_evidence5_text: "EVIDENCIA V"
 USB_evidence5_loc: "§L[USB_evidence5_scripted_loc]§!"
 USB_evidence5_loc1: "§YServidor fantasma§!\n\nTras la exhaustiva confiscación de canales proxy, se han rastreado consultas sospechosas a un servidor seguro en McLean, Virginia. Dichas consultas se referían a leyes de expropiación forzosa y protocolos federales de incautación de propiedades privadas bajo el Acta de Seguridad de la Salud Pública."
 USB_evidence5_loc2: "§YEstudio clandestino§!\n\nSe inició un estudio secreto sobre los efectos neurológicos a largo plazo del componente de microchip de la vacuna obligatoria sin la autorización de ninguna figura directiva. Los hallazgos preliminares del estudio, que sugerían una mayor sugestionabilidad y una respuesta emocional suprimida, aparentemente se estaban recopilando con la intención de una filtración controlada a la prensa."
 USB_evidence5_loc3: "§YAlmacén de armas§!\n\nUn escuadrón de la CIA-SAC ha incautado un garaje lleno de varias armas de fuego registradas que habían desaparecido previamente de un almacén del Gobierno en Texas. Se encontró documentación del Departamento de Justicia medio quemada en el patio trasero."
 USB_evidence5_loc4: "§YEntrega especial§!\n\nSe realizaron envíos sospechosos de equipo de construcción desde el Aeropuerto de Denver a la base aérea de la Guardia Nacional de Colorado. El equipo es claramente desproporcionado con las obras oficiales de \"renovación de hangar\" para las que están destinados."
 USB_evidence5_loc5: "§YInyección letal§!\n\nEl aparato burocrático ha registrado docenas de muertes súbitas e inusuales en Míchigan. Equipos de investigación especiales concluyeron que todos ellos murieron después de recibir una dosis de refuerzo de un envío de vacunas contaminadas, entregado a un centro médico unos días antes, un intento de socavar el programa de vacunación y la confianza de la gente en el Gobierno. Todas las vacunas de este lote están siendo confiscadas, la información sobre este accidente fue suprimida."
 USB_evidence5_loc6: "§YIncursiones en sitios negros§!\n\nInformes de ataques antisociales en sitios negros han circulado por todo el país; los sitios negros estaban equipados para vigilancia e integrados con los sistemas más nuevos, parte de los programas Am-Net y Project Maven."
 USB_evidence5_loc7: "§YTráfico§!\n\nAl menos una docena de individuos que fueron detenidos en varias instalaciones en la frontera entre Estados Unidos y México nunca fueron encontrados en dichas instalaciones. Una investigación más profunda concluye que dichos individuos fueron secuestrados para uso personal."
 USB_evidence6_text: "EVIDENCIA VI"
 USB_evidence6_loc: "§L[USB_evidence6_scripted_loc]§!"
 USB_evidence6_loc1: "§YSección Seis§!\n\nUn concesionario de automóviles Toyota en Maryland, establecido pocos meses después de la Guerra Civil, fue descubierto siendo utilizado para lavado de dinero; tras una investigación adicional, el caso fue asumido por la CIA: uno de los mensajes relacionados con las transacciones contenía un mensaje cifrado, con información crucial sobre tecnologías de IA utilizadas por el Cibercomando como parte del Acta PATRIOT II."
 USB_evidence6_loc2: "§YOctubre Rojo§!\n\nUna sonoboya en el océano Pacífico detectó un submarino clase Zhou de la Armada del EPL que realizaba paradas regulares en 5°41'06\"S 102°53'03\"W. La vigilancia mostró que el submarino transmitía y recibía mensajes en dirección a Miami. El Comando Indopacífico informó no tener conocimiento de este evento."
 USB_evidence6_loc3: "§YTarjeta de acceso nuclear§!\n\nUna tarjeta de acceso a una instalación de almacenamiento nuclear de bajo nivel, una de docenas de instalaciones de este tipo, ha desaparecido del inventario. La solicitud de requisición se presentó bajo la autoridad del FBI, citando una inspección de rutina. La inspección nunca se llevó a cabo."
 USB_evidence6_loc4: "§YMensaje interceptado§!\n\nUn equipo de intercepción de radio de la CIA grabó un mensaje cifrado que se estaba transmitiendo desde la parte noreste de Washington D.C.; la dirección exacta aún se está localizando. La decodificación parcial reveló que se estaban utilizando los indicativos \"SERGEANT STUBBY\" y \"BROTHER TEN\". El resto del mensaje utiliza un código desconocido y aún está siendo descifrado."
 USB_evidence6_loc5: "§YLaboratorio secreto§!\n\nUn laboratorio clandestino, ubicado dentro de una estación de metro en desuso bajo Manhattan, fue asegurado por una unidad CIA-SAC. El laboratorio estaba provisto de equipo robado de los CDC y un pequeño personal de investigadores \"desaparecidos\", todos los cuales se suicidaron antes de poder ser interrogados. En una mesa de laboratorio yacía un informe a medio terminar que detallaba un método para revertir el proceso de seguimiento biométrico. Junto a él, un rosario desgastado."
 USB_evidence6_loc6: "§YEntorno peligroso§!\n\nAviones de reconocimiento aéreo de la CIA detectaron actividades no autorizadas al norte del Proyecto Lost Creek en el centro de Wyoming. Equipos terrestres encontraron una instalación de excavación subterránea, camiones sin marcar y unos pocos cientos de individuos que fueron detenidos en un campamento de la FEMA y estaban destinados a ser enviados a una mina de carbón cercana. Ninguno del personal de mando fue tomado con vida."
 USB_evidence6_loc7: "§YDía sanitario§!\n\nTodo el personal no esencial de la base de submarinos de Kings Bay fue enviado con licencia obligatoria para una inspección médica, vacunación y una inspección sanitaria en la base, citando la amenaza de terrorismo biológico/químico. La solicitud de inspección fue enviada a través de canales afiliados a la industria farmacéutica."
 USB_evidence6_loc8: "§YEscondidas§!\n\nUna redada de la CIA en un puerto de Tijuana desmanteló una operación no autorizada del cártel, lo que resultó en la captura de un barco que acababa de llegar de San Diego: entre armas y drogas, los operativos de la CIA-SAC han asegurado un contenedor con una actividad radiactiva inusualmente alta. Las técnicas de interrogatorio avanzadas del personal capturado han logrado revelar que un punto ciego en el área de responsabilidad de la Guardia Costera les permitió contrabandear mercancías a través de la frontera, lo que fue documentado como actividades de transporte desde campamentos de la FEMA en la frontera entre Estados Unidos y México, los cuales en realidad nunca estuvieron involucrados."

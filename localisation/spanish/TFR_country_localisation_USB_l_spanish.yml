 USB_congressional_factions_category: "Los pasillos del Congreso"
 USB_congressional_factions_category_desc: "\n\n\n\n\n£GFX_USB_congress_cat\n\n\n\n\n\n\n\nCon la toma del Capitolio de los Estados Unidos con el apoyo del Congreso, incluyendo a los demócratas, y un contingente de republicanos, ahora tenemos todo lo necesario para lograr cambios en esta nación.\n\nSin embargo, debemos ser cautelosos, ya que si estas facciones están demasiado descontentas con nosotros y deciden distanciarse de nosotros, eso podría tener graves consecuencias.\n\nApoyo total del Congreso: [?USB_support_congress_total_var|Y1%]\n\n§2PARTIDO DEMÓCRATA§![GetLiberalEnable][GetProgressiveEnable][GetInnovationistEnable]\n    \n[GetConservativeEnable][GetMinorFactionsEnable][GetBlueDogEnable][GetKennedyDemocratsEnable][USС_minor_faction_christian_conservative_text][USB_minor_faction_libertarian_party_text][USB_minor_faction_dsa_text][USB_minor_faction_forward_text][USB_minor_faction_transhumanist_text][GetMinorFactionsEnableBottom]"
 USB_congressional_factions_caligula_category: "Apéndice congresional"
 USB_congressional_factions_caligula_category_desc: "\n\n\n\n\n£GFX_USB_caligula_congress_cat\n\n\n\n\n\n\n\nCon el control total del Gobierno, ya no se requiere el apoyo del Congreso para tomar decisiones cruciales. Sin embargo, para mantener la imagen de América, el Congreso permanece, aunque impotente.\n\nEl Partido Demócrata, ahora todopoderoso, se encuentra en una posición única: sus miembros pueden colaborar con el recién ascendido presidente y asegurar su lugar en la historia, o ir en su contra y perderlo todo.\n\n§RApoyo congresional total§!: [GetLiberalEnable][GetProgressiveEnable][GetConservativeEnable][GetInnovationistEnable]"
 USB_financial_diplomacy_category: "Diplomacia financiera"
 USB_financial_diplomacy_category_desc: "Para salvar la Unión, debemos utilizar nuestro peso económico no sólo para abastecer a nuestras tropas y a nuestra población adoradora, sino también para aplastar a nuestros enemigos en el campo de batalla y en el escenario diplomático."

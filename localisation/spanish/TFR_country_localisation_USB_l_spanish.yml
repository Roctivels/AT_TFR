 USB_hampered_cooperation_idea: "Cooperación obstaculizada"
 USB_hampered_cooperation_idea_desc: "La tensión entre franceses y alemanes es palpable. Tras la \"filtración\" de un documento fabricado por la Comunidad de Inteligencia, los altos mandos de las dos potencias han caído en un completo desorden. Las incesantes luchas internas en los altos mandos de estas dos naciones han sido un golpe para su maquinaria de guerra, sus tácticas y su moral. Los soldados europeos miran a sus camaradas con desconfianza, no se pueden tomar decisiones sin una acalorada discusión, y una sola chispa podría encender el polvorín que es la relación franco-alemana."
 USB_unruly_climate_idea: "Clima rebelde"
 USB_unruly_climate_idea_desc: "Inexplicablemente, desde que comenzó la guerra con Estados Unidos, el clima de Rusia ha cambiado drásticamente. Ya sean días insoportablemente calurosos o las ventiscas más gélidas, el clima se ha vuelto antinatural, mortal y francamente hostil tanto para los soldados como para los civiles rusos. El pánico ha infectado la conciencia colectiva; la gente teme cada día por el nuevo infierno que traerá, si es que logran pasar la noche sin congelarse. Y aunque el Gobierno ruso no tiene una respuesta verdadera al caos climático, es cegadoramente obvio que los Cognoscenti están moviendo los hilos, de alguna manera."

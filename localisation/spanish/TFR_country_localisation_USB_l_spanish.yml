 USB_air_force_domination_idea_desc: "Más de medio siglo de conexiones políticas rinde grandes frutos en una situación como la que vive actualmente la administración Biden. Tras haber mantenido una estrecha coordinación con la Fuerza Aérea de los Estados Unidos durante la época en que Biden ocupó la vicepresidencia, la mayoría de las fuerzas aéreas de EE.UU. le deben su trayectoria. Huelga decir que, al estallar la Segunda Guerra Civil, la mayor parte de la Fuerza Aérea se mantuvo leal al gobierno legítimo, y ahora dominamos los cielos de la tierra de la Libertad."

 USB_low_corporate_influence_idea: "Influencia empresarial baja"
 USB_low_corporate_influence_idea_desc: "Las corporaciones siempre han tenido una relación de amor-odio con el Gobierno de los EE.UU. Por un lado, son quienes financian a casi todos los candidatos políticos modernos que aspiran a un cargo. Por otro lado, la gran mayoría de los principales políticos han hecho promesas ingentes, y ahora se encuentran con un conjunto de promesas imposibles de cumplir y corporaciones anónimas que manipulan cada movimiento del Estado, utilizando su carrera como palanca.\n\nPor suerte para nosotros, la situación actual con las corporaciones que respaldan nuestra administración es más que precaria. Con capital político y un partido unido en el antitrumpismo, Biden ha ascendido a la presidencia con muchas menos promesas y mucho menos capital financiero prestado del habitual necesario para llegar al cargo. Está libre de ataduras... por ahora.§!\n\nSe puede eliminar completando el enfoque §Y$USB_a_hand_on_our_shoulder$§! o §Y$USB_nationalize_the_war_effort$§!."

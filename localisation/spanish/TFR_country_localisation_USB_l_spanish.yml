 bdnspch.999.d: "Calígula salió de su oficina, con el olor de niños y cachorros muertos aún frescos en su uniforme súper mega malvado. Camina por el pasillo y mira a una anciana con dificultades para abrir la puerta a su médico de cadera, él camina hacia ella y le ofrece ayuda.\n\n\"Oh muchas gracias querido, ¡No puedo perderme esta cirugía de cadera! ¡Son muy caras! He tenido que trabajar 14 horas al día para esta cirugía!\"\n\n¡Sin embargo, Calígula la derriba repentinamente y el crujido de sus vértebras rotas retumban por todo el pasillo.\n\n\"¡Toma eso, mujer!\", dice Calígula mientras la escupe.\n\nCalígula continua por el pasillo. Su estómago lleno de las hamburguesas que se ha comido se agita, provocando que el pasillo vibre como en un día promedio en Chile.\n\nSale del pasillo hacia la calle donde ve a una jóven comiendo helado, el va hacia ella. Su gordura causa que la calle entera retumbe.\n\n\"Impuesto incel, nena. JIJO\", dice con sarcasmo mientras le roba el helado y empieza a comérselo como un cerdo.\n\nÉl domina la ciudad, con los valientes guerrilleros de Reddit son ejecutado por incels y las mujeres siendo puestas LITERALMENTE en el cuento de la criada. Él ríe súper malvadamente mientras choca los puños con Hitler."
 bdnspch.999.a: "¿Pero esto no tiene nada de malo?"
 POLITICS_JOE_BIDEN_DESC: "Joseph Robinette Biden ha sido un hombre que a menudo ha estado cerca de las mayores esferas de poder en América, pero no ha podido alcanzarlas. Nacido en Pensilvania, Biden pasó gran parte de su vida y carrera política en el estado de Delaware. Se consolidó en el bando demócrata neoliberal en el Senado, donde apoyó el intervencionismo extranjero y proyectos de ley de mano dura contra la delincuencia, y encontró aliados en figuras clave del Senado como Strom Thurmond y Robert Byrd. Lanzó campañas presidenciales en 1988 y 2008, pero no logró pasar las primarias en ninguna de ellas.\n\nNormalmente, un candidato veterano, dos veces fracasado, que se codeaba con racistas y belicistas, sería un mal candidato para un Partido Demócrata cada vez más joven y progresista. Pero los ocho años de Biden como vicepresidente de Barack Obama han servido para rehabilitar su legado. Y ante la perspectiva de otros cuatro años de Donald Trump en la Casa Blanca, los demócratas cerraron filas y le dieron todo su apoyo. A sus setenta y ocho años, Biden es ahora el hombre de mayor edad en ser elegido presidente. Pero donde sus partidarios ven a un estadista veterano y carismático capaz de unir a la izquierda y la derecha, sus detractores ven a un charlatán senil que se dejó apoyar por los demócratas para poder obtener su turno, largamente negado, en el Despacho Oval. Sea que demuestre ser un líder venerable o un viejo decrépito, una cosa está clara: pocos envidian su papel como presidente en estos tiempos difíciles."

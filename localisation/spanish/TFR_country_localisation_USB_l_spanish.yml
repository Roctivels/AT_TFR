 USB_presidential_health_category_default: "\n\n\n\n\n£GFX_USB_Biden_confused_category_banner\n\n\n\n\n\n\n\nLa salud del presidente, con la llegada de la Guerra Civil, se ha convertido en un tema mucho más serio. Para ganar la guerra, Biden necesita ser Lincoln, Roosevelt y Washington, todo en uno, con el carisma, la fuerza y la inteligencia necesarios para desafiar a cualquier otro competidor en la lucha por el puesto. Necesita ser claro y consciente de las decisiones que toma, o podríamos arriesgarnos a perder a América para siempre.\n\n§C¿Tosiste, Joe el Dormilón?§!"
 USB_presidential_health_category_NSS: "\n\n\n\n\n£GFX_USB_Biden_NSS_category_banner\n\n\n\n\n\n\n\nAunque los Cognoscenti han asegurado el poder a través del Golpe Secreto, técnicamente el presidente todavía tiene el poder de oponerse a nosotros, especialmente si llegara a ser consciente del alcance total de nuestros objetivos y agenda. Independientemente de cuánto apoyo tenga del pueblo estadounidense, sigue siendo una figura significativa con poder ejecutivo de jure, y que él hable sobre nuestras acciones podría arriesgarse a romper la Mascarada.\n\nPor lo tanto, hemos determinado que controlar a las personas alrededor del presidente y gestionar cuidadosamente su declive hasta que esté fuera de escena es el camino ideal para asegurar que no sea necesaria una repetición desordenada de 1963."

 USB_pacific_war_idea: "Guerra en el Pacífico"
 USB_pacific_war_idea_desc: "Asia arde, y China echa gasolina. Nunca en la historia de esta región se ha librado una guerra tan devastadora. Ciudades reducidas a escombros carbonizados, millones de muertos en el frente, y China amenazando con mantener su dominio sobre la región, para siempre. Sin embargo, con la entrada de los Cognoscenti en la región para restaurar el Orden, los chinos podrían haber encontrado finalmente su horma en la región. Los Cognoscenti saben que la guerra será un desafío; los chinos son formidables en tierra y en el mar.\nPero si el Orden ha de ser restaurado, entonces deben perseverar y cortar la cabeza del Dragón, de una vez por todas."

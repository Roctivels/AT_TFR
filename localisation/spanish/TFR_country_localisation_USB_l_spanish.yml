 bdnspch.105.t: "Momentos finales"
 bdnspch.105.d: "\"...y Joe Biden ha estado trabajando incansablemente por nuestra nación; ha transformado nuestro futuro para mejor, y estoy convencido de que seguirá haciéndolo\".\n\nObama revisó sus notas una vez más y luego dirigió su mirada hacia la multitud, asegurándose de que las cámaras lo captaran. Biden, o lo que quedaba de él, estaría observando esto; era vital que su discurso saliera a la perfección; su vida y la de su familia estaban en juego. Si no lograba pronunciar el final de su discurso de manera impecable... no quería ni pensarlo.\n\nObama comenzó a hablar de nuevo, las luces de los fotógrafos iluminaban la sala sin cesar, y la multitud lo observaba. Como un títere. Los focos parecían brillar aún más, mientras todo lo demás se sumía en la penumbra.\nDe repente, un hombre en la multitud se puso de pie.\n\"¡Muerte al tirano!\"\n\nGritos. Caos. Terror. La oscuridad se desvaneció y las luces se atenuaron. Obama sintió un momento de calma, antes de que el dolor lo golpeara. Una bala lo había alcanzado en el cuello. Se aferró a la herida, tratando de detener la sangre, cayendo al suelo en el proceso. Mientras los guardaespaldas lo rodeaban y los paramédicos intentaban salvarlo, Obama de pronto se rindió a la idea de salvarse. Curiosamente, sintió un alivio: ya no tendría que seguir fingiendo. Él rió al final, en lugar de Biden. Ya no sería un peón, manipulado como si no fuera humano por el tirano.\n\nQuizás el hombre que le disparó tenía razón al hacerlo."
 bdnspch.105.a: "Puede haber felicidad en la muerte."
 bdnspch.106.t: "La trama expuesta"
 bdnspch.106.d: "Recientes investigaciones sobre el trágico asesinato de Barack Obama han sacado a la luz una verdad inquietante y escalofriante. Sorprendentemente, se ha descubierto que uno de los nuestros, junto con varios cómplices, está involucrado en este acto atroz. Hablamos del traidor Angus King y de numerosos simpatizantes del gobierno y civiles. Aún más alarmante es que parecen haber mantenido conversaciones con el exiliado Bernie Sanders, quien ha estado en el centro de un complot encubierto para derrocar a nuestro legítimo gobierno. El asesinato de Obama, un símbolo respetado del progreso, representa su último y más atroz paso hacia su objetivo final: un golpe de Estado en toda regla contra las instituciones de nuestra nación.\n\nHemos trabajado incansablemente, día y noche, como una fuerza unida de legisladores y servidores públicos, esforzándonos por sanar y reconstruir el tejido de esta gran nación. A través de innumerables sacrificios y esfuerzos constantes, hemos logrado avances significativos en la reparación del daño, sacando a nuestro país de sus momentos más oscuros y luchando por la reunificación de su pueblo. Innumerables vidas se han perdido en nombre de esta noble causa: patriotas que lo dieron todo para asegurar un futuro mejor para las generaciones venideras. Y, sin embargo, ante tanta dedicación, ¿cómo se nos recompensa? Con traición. Con asesinatos cobardes, engaños maliciosos y la traición de aquellos que se suponía debían apoyarnos.\n\nNo deberían sorprendernos las acciones de estos traidores. Los mismos individuos que conspiran contra nuestro gobierno, que utilizan tácticas turbias para socavar el progreso que hemos logrado, no son mejores que los enemigos a los que nos enfrentamos en el campo de batalla. Son del mismo patrón: carentes de honor, impulsados por la ambición egoísta y dispuestos a destruir la misma nación que dicen cuidar.\n\nDebemos actuar rápida y decisivamente. No puede haber vacilación ante tal traición. Nuestros enemigos, ya sea en el frente o escondidos tras los muros del poder, deben ser erradicados y llevados ante la justicia. El futuro de nuestra nación depende de ello."
 bdnspch.106.a: "Esta traición no puede permitirse."
 bdnspch.107.t: "Juicio a los kingistas"
 bdnspch.107.d: "El momento que tanto hemos estado esperando finalmente ha llegado. Es hora de limpiar nuestra nación de aquellos que han cometido actos de traición inaceptables. Ya no podemos permitir que quienes intentan socavar la estabilidad y la seguridad de nuestro país sigan actuando.\nLos seguidores de Angus King y Bernie Sanders, que han conspirado en nuestra contra, han sido localizados e identificados. Es alarmante ver que muchos de estos traidores están profundamente arraigados en nuestro sistema político, ejerciendo un poder e influencia significativos sobre las leyes y políticas de nuestra nación. Es una realidad preocupante que entre estos conspiradores no solo haya políticos corruptos, sino también civiles que han caído en sus engaños. Aunque estamos al límite de nuestras fuerzas y nuestros recursos son escasos, debemos actuar con determinación también contra estos individuos. Solo aquellos que representan la amenaza más inmediata y grave para nuestra nación enfrentarán la justicia que merecen.\n\nUna vez que la Gran Purga haya concluido y nuestro gobierno se haya liberado de estas fuerzas malignas, entraremos en una nueva era de gobernanza. Los puestos de poder que antes ocupaban quienes traicionaron a su país serán renovados, pero no de la misma manera. Algunos cargos serán disueltos y absorbidos por completo, mientras que otros serán ocupados por personas más leales. En ciertos casos, algunos serán reemplazados por inteligencia artificial avanzada, lo que asegurará que las tareas burocráticas, aunque mundanas, se gestionen con precisión, rapidez y un compromiso inquebrantable con el bienestar de la nación.\nSin duda, estamos atravesando tiempos complicados, pero esta necesaria Purga abrirá las puertas a un futuro más brillante, más fuerte y más unido. Asegurará que los cimientos de nuestro gobierno se basen en la lealtad, la eficiencia y un compromiso inquebrantable con la supervivencia y el bienestar de nuestra gente. Y tal vez, una vez que esta Purga haya demostrado su efectividad, se expanda para asegurar que cada rincón de nuestra sociedad sea purificado, erradicando hasta el último vestigio de traición. Nuestra civilización saldrá de esto más fuerte, más unida y más capaz que nunca, convirtiéndose en un ejemplo para que el mundo lo admire.\n\nConstruiremos un futuro que no solo sea seguro, sino también digno de admiración: una nación renacida a través del fuego de la justicia y la purificación de la traición."
 bdnspch.107.a: "Esto recién empieza..."
 bdnspch.108.t: "Sanders evade la captura"
 bdnspch.108.d: "Hemos recibido informes sobre la unidad que fue enviada a rescatar a Bernie Sanders y a la mayoría de su equipo. Según los reportes, cuando el equipo llegó a su casa y forzó la puerta principal, no encontraron a Sanders por ninguna parte. En su hogar, hallaron varios documentos y papeles, siendo el más destacado uno que estaba en una carpeta junto a su cama. En ese documento se describía su plan de escape. Al parecer, se había ido esa misma mañana, llevándose a su familia y a algunos parientes cercanos mientras volaban en helicóptero a un destino desconocido.\n\nAlgunos miembros del personal de Sanders y figuras similares lograron escapar, pero la mayoría fue capturada. Algunos de los que fueron detenidos ofrecieron una fuerte resistencia, lo que resultó en varias bajas. A pesar de estos incidentes, nuestras otras operaciones han transcurrido en gran medida sin contratiempos, y hemos logrado mantener el orden en la mayoría de las áreas del país. Con los partidarios de Sanders bajo control, el ambiente público se ha vuelto más manejable y nuestra influencia se está afianzando.\n\nSin embargo, Sanders sigue siendo un gran desafío. Tras su fuga, ahora tiene la libertad de planear y organizar cualquier resistencia en nuestra contra. Dada su influencia y popularidad, podría movilizar rápidamente a facciones descontentas y desestabilizar nuestro gobierno. La inteligencia indica que aún cuenta con numerosos aliados dispuestos a apoyarlo, y mientras siga en libertad, la amenaza de lo que pueda hacer sigue pesando sobre nosotros."
 bdnspch.108.a: "Quiero su cabeza antes del atardecer."
 bdnspch.109.t: "La Gran Purga Americana termina"
 bdnspch.109.d: "Hoy hemos recibido noticias emocionantes: la tan esperada purga gubernamental que comenzamos hace un tiempo ha llegado a su fin con éxito. La decisión de llevar a cabo esta purga se tomó tras el asesinato de Obama y la investigación que siguió, la cual reveló que muchos miembros de nuestro gobierno tenían conexiones con Bernie Sanders, quien ha estado intentando derrocarlo últimamente.\n\nLa purga en sí fue bastante efectiva. Algunas figuras lograron escapar, pero muchas fueron capturadas y llevadas a juicio por sus crímenes contra esta gloriosa nación. La única sentencia justa que merecían era la muerte. Sin embargo, aunque sus muertes son un triunfo para el futuro de nuestra nación, lo que hemos estado haciendo y lo que planeamos hacer después de esta purga es lo más crucial.\n\nRecientemente, hemos estado renovando o reformando los puestos que ocupaban esos traidores. Muchos de estos cargos han sido absorbidos, y otros han sido reemplazados por personas más leales y confiables. Sin embargo, algunos han sido sustituidos por inteligencia artificial. Este es uno de los pasos más importantes en nuestro objetivo de modernizar nuestro gobierno y hacerlo más eficiente. Esta prueba, como podrán ver, ha transcurrido sin problemas, y las tareas burocráticas, aburridas y mundanas se han vuelto más rápidas, eficientes y numerosas. Sin duda, es uno de los primeros pasos en este largo proceso, pero el futuro guarda las claves de la utopía, y seremos los primeros en alcanzarla."
 bdnspch.109.a: "Ad bonum futurum."
 bdnspch.110.t: "El boceto de la Liberación"
 bdnspch.110.d: "Ya ha pasado un tiempo desde que iniciamos nuestra purga del gobierno, limpiando nuestro régimen de los individuos traicioneros que buscaban desmantelar todo lo que habíamos construido con mucho esfuerzo. Este ajuste interno, aún si fue necesario, prendió la chispa de una visión de algo mayor, algo más transformador. Se hizo claro que la purga inicial no era más que un preludio, un primer paso hacia un movimiento mayor que redefiniría el futuro de nuestra nación.\n\nDesde entonces se han llevado a cabo muchas reuniones, en las que se deliberaba cautelosamente y se debatía intensamente durante horas sobre el camino a seguir. Hoy, estamos al umbral de una decisión monumental: La necesidad de una purga más extensiva y de carácter público, una que llegue a todos los rincones de la nación. Esta decisiva acción, dirigida por la voluntad de nuestro liderazgo, ya no es una mera posibilidad; es un hecho. La \"Gran Liberación\", como se ha dado a conocer entre los miembros de nuestro gabinete, pronto se convertirá en un día de liberación para todos los ciudadanos. En ese día, serán libres: Libres de las restricciones de la ley, libres de la carga del control, libres de expresar sus emociones más profundas, su ira, su odio, sin miedo a sufrir consecuencias. Un día al año, las cadenas del orden se aflojarán, garantizándoles la catarsis que se les ha negado durante mucho tiempo.\nAlgunas voces, tranquilas pero persistentes, han expresado preocupación e insatisfacción por este plan. Aún si les hemos garantizado y seguiremos garantizándoles que esta liberación es necesaria para la estabilidad y la prosperidad de la nación a largo plazo.\n\nLa Gran Liberación no es solo un día de libertad; es una válvula de escape necesaria, una forma de prevenir una violencia mayor y más destructiva que de otro modo crecería bajo la superficie. Permitiendo este caos controlado, proveeremos un desahogo seguro, un día en que las personas puedan purgar sus pensamientos más oscuros y volver a la normalidad, libres de su furia contenida.\n\nMientras nos embarcamos en esta nueva fase de la evolución de nuestra nación, nos mantenemos firmes en nuestra creencia en que esto es lo correcto. Confiamos en que la Gran Liberación haga nuestro país más fuerte y unido, uno donde el balance entre el orden y el caos finalmente se equilibre, asegurando la longevidad y la estabilidad de nuestra sociedad."
 bdnspch.110.a: "Hacemos esto por la nación, por el pueblo."
 bdnspch.111.t: "La Liberación frente a nosotros"
 bdnspch.111.d: "Era una mañana tranquila cuando el presidente Biden apareció por todas las pantallas de la nación. La imagen de él sentado en la Oficina Oval, su cara solemne, sus manos entrelazadas entre sí sobre el escritorio, apareció en televisores, móviles y tabletas en casas, oficinas y espacios públicos por igual. Su mirada era firme cuando observó fijamente a la cámara, pensando que podía ver los millones de ojos preocupados que le miraban, a la espera de lo siguiente. El aire parecía cargado de expectación, como una tensa calma antes de la tormenta.\n\nLa hora era exactamente las 7:26 AM cuando empezó a hablar.\n\n\"Queridos compatriotas fieles de América\", empezó, con su voz firme, cargando con el peso de lo que proseguía. \"Estoy aquí como vuestro presidente, para anunciaros lo que sucederá más tarde en el día de hoy. Tras una cuidadosa consideración con otros en posición de autoridad, he tomado una decisión que yo creo necesaria para el bien de nuestra nación. Hoy por la noche a partir de las 9:00 PM, cualquier crimen violento será legal durante 24 horas\".\n\nAlgunos no podían creerlo, otros estaban atemorizados y solo unos pocos lo llegaron a entender. Pero todo eso se quedó en sus cabezas, y ya no había marcha atrás. El presidente continuó hablando, con un tono inquebrantable, explicando el razonamiento tras esta impactante decisión. Habló de la decadencia de la sociedad, la humanidad, la necesidad de un cambio radical en el trato a la violencia de nuestra nación. Era, desde su punto de vista, era la forma definitiva de purgar la oscuridad de cada uno y de restablecer el rumbo de la nación. Se refirió a la idea como una válvula de desahogo, algo necesario para preservar el bien mayor.\n\n\"Hoy es el Día de la Liberación Nacional, aquellos que lo hayan entendido aprovecharán este tiempo, aquellos de vosotros que no lo hayan entendido seguramente os esconderéis con miedo, pero para aquellos que han traicionado a esta nación, vuestra hora está cerca\".\n\nLa transmisión terminó, la imagen de Biden desapareció exactamente a las 7:30 AM. El anunció duró únicamente 4 minutos, pero fueron suficientes para dejar una marca que puede perdurar durante años, dejando únicamente una pantalla negra con un temporizador de 13 horas y 30 minutos, y unas pocas palabras."
 bdnspch.111.a: "\"Pueblo de la Unión, libérense a sí mismos y prosperen\"."
 bdnspch.112.t: "Nuestra liberación completada"
 bdnspch.112.d: "Violencia. Asesinatos. Muerte.\n\nTodo lo que nos esperábamos y más.\n\nEl Día de Liberación Nacional finalmente ha llegado a su fin, y los resultados han superado incluso a nuestras proyecciones más generosas. Desde las bulliciosas ciudades hasta los rincones más tranquilos del interior, los ciudadanos salieron a las calles, alimentados por años de rabia, frustración y la necesidad de desquitarse. El aire esta cargado de caos, los clamores de venganza se combinaron con el sonido del cristal rompiéndose y de las vidas destrozadas.\n\nSí, algunos están horrorizados. Algunos se aferran a la vieja mentalidad, describiendo a la violencia como algo bárbaro e inmoral. Ellos dicen que está mal glorificar el asesinato, celebrar la ruptura de las normas sociales. Pero esas voces están desvaneciéndose. Para el resto de nosotros, la mayoría, vemos ahora la verdad con claridad. Ni la carnicería de hoy ni toda la furia fueron un desmoronamiento de la sociedad. Han sido la forma de preservarla. A través del fuego y la sangre, nos hemos purificado. Permitiendo a la oscuridad ver la luz del día una vez al año, mantendremos la frágil paz durante los otros 364 días. Es por esta purga de nuestra rabia colectiva que nuestra nación permanece estable, inquebrantable ante las insignificantes quejas y el peso de los deseos reprimidos que han llevado a otras civilizaciones a la ruina.\n\nEsta es la verdad, el Día de Liberación, tan aterrador según algunos, es la forma definitiva de preservación. Permitiendo a nuestro pueblo ceder a sus instintos más básicos durante un corto periodo de tiempo, les protegemos de la necesidad de actuar acorde a estos instintos durante el resto del año. Es un acuerdo, un pacto entre los gobernados y el gobierno, uno que asegura la supervivencia de la nación.\nY por eso, somos más fuertes que nunca."
 bdnspch.112.a: "El caos y la paz son más parecidos de lo que uno piensa."
 bdnspch.113.t: "Día Nacional de la \"Liberación\""
 bdnspch.113.d: "Es ese momento del año una vez más, el momento donde las masas inundan las calles, no en forma de protesta, si no como un ritual de desahogo. Se le ha dado rienda suelta a rabia silenciosa que se ha cocinado a fuego lento bajo la superficie de la sociedad, y aquellos que una vez estuvieron encadenados a la moral de una época pasada finalmente saborean la verdadera libertad. Este día, recibido al principio con miedo y dudas, ha evolucionado hasta ser al piedra angular de la estabilidad de nuestra nación. Es un día donde el orden no solo es mantenido por el gobierno, si no que además es reforzado por los propios ciudadanos sobre los que gobernamos.\n\nLo que empezó como un atrevido experimento ha estado revolucionando nuestra sociedad. El Día Nacional de la Liberación nos enseña crudamente que tan lejos hemos llegado, demostrando que nuestros sacrificios y nuestras visiones no fueron en vano. Hemos formado América, una que ha rechazado ideologías obsoletas y morales con el fin de forjar un futuro donde la paz y la estabilidad se mantiene a través del control preciso del caos. Hemos dado a luz una América que año tras año nos acerca a una utopía que alguna vez se creía inalcanzable, y que ahora rozamos con la yema de los dedos.\n\nEste es el nuevo mundo que hemos construido, uno forjado por el fuego y la violencia, pero mantenido a través de un cuidadoso equilibrio. Cada Día de Liberación marca un paso más hacia el perfeccionamiento de una nuestra sociedad donde la libertad y el control coexisten en armonía. Nuestro futuro nunca había sido tan brillante, y el camino a seguir tan claro."

 bdnspch.1776.t: "El espejo unidireccional"
 bdnspch.1776.d: "\"Las impresiones con las que emprendí inicialmente esta ardua misión fueron explicadas en su momento. En el desempeño de esta función, solo diré que, con buenas intenciones, contribuí en la organización y la administración del gobierno, dando el mejor esfuerzo que podía dar mi muy falible juicio. Consciente al principio de la inferioridad de mis cualificaciones, las experiencias que vi con mis propios ojos, tal vez mayores a los ojos de los demás, ha reforzado los motivos para desconfiar de mi mismo; y todos los días el peso cada vez mayor de los años me advierte que el retiro es tan necesario como bienvenido para mi.\"\n\nEl presidente Biden cerro la carta y miró por encima de su podio, rápidamente la habitación vacía se hizo ver, no había nadie allí. ¿Por qué estaba leyendo esa carta? ¿Hubo un público para empezar?\n\"¿Hola? ¿Me están escuchando? ¿Dónde están todos?\"\nVolvió a ver a la carta, buscando motivos para leerla, pero la carta que había leído hace unos momentos ya no estaba, en su lugar había una servilleta con su nombre garabateado."
 bdnspch.1776.a: "\"¿Dónde estoy?\""

 USB_lower_civilian_unrest_idea: "Malestar público callado"
 USB_low_civilian_unrest_idea: "Malestar público bajo"
 USB_low_civilian_unrest_idea_desc: "\n\n\n\n£GFX_low_civil_unrest\n\n\n\n\n\nUna guerra civil, por defecto, nunca augura nada bueno para la estabilidad interna de las facciones involucradas. Una grandiosa red de economía, cobertura mediática, éxito militar y libertades civiles se entrelaza para ofrecer una imagen del estado de la política interna. Por ahora, sigue siendo una imagen de sorprendente estabilidad. A pesar del colapso de la economía y las cadenas de suministro para gran parte de las funciones esenciales de nuestra nación, las comunidades se han unido, decididas a capear el temporal.\n\nA medida que esta guerra civil se prolonga, facciones más extremistas podrían ganar fuerza en toda nuestra nación. En su afán por el cambio, verían nuestro sueño de una nación reunificada deformado en una nación reducida a cenizas. Debemos resistir, impidiendo que la infección se instale, cueste lo que cueste."

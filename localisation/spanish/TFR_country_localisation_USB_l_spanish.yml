 USB_revitalize_american_urbanism: "Revitalizar el urbanismo"
 USB_revitalize_american_urbanism_desc: ""
 USB_solve_the_recruitment_crisis: "Resolver la crisis de reclutamiento"
 USB_solve_the_recruitment_crisis_desc: "Si bien tenemos una ventaja sobre los constitucionalistas en cuanto a capacidad industrial y tamaño del ejército, padecemos un grave problema. Muchos de nuestros ciudadanos han mostrado una apatía indolente ante nuestro esfuerzo bélico, a diferencia de los constitucionalistas, que actualmente recurren a sus fanáticos partidarios de la guerra para oponerse a nuestros incesantes avances. Debemos abordar la crisis de inmediato por todos los medios necesarios para garantizar el pleno apoyo popular a nuestro esfuerzo bélico. Si permitimos que esta crisis se agrave, nuestro esfuerzo bélico se verá frenado. Y Washington D.C. será invadido por las fuerzas constitucionalistas."
 USB_encourage_liberal_warhawks: "Alentar a halcones liberales"
 USB_encourage_liberal_warhawks_desc: "Si bien la mayoría de nuestra población se opone o muestra apatía hacia nuestra guerra en curso contra los constitucionalistas, existe un grupo minoritario que apoya plenamente nuestro esfuerzo bélico. Este grupo de halcones de guerra liberales ha sido uno de los partidarios más apasionados, tanto en número de reclutas como en apoyo a nuestro Gobierno. Por lo tanto, es natural que apoyemos este creciente movimiento en nuestro partido. Su apoyo podría determinar si conquistamos Denver o si los constitucionalistas conquistan Washington D.C."
 USB_incorporate_new_recruits: "Incorporar a los reclutas"
 USB_incorporate_new_recruits_desc: "Si bien nuestros nuevos programas de reclutamiento han logrado animar a nuestros ciudadanos a alistarse masivamente, esto nos ha planteado un nuevo problema. La avalancha de reclutas ha generado un retraso en el entrenamiento básico y ha sido un dolor de cabeza para el alto mando. Debemos abordar este problema de inmediato canalizando adecuadamente a los reclutas hacia las nuevas unidades para que todos reciban la capacitación adecuada. No podemos permitir que este problema persista o nuestro ejército se verá obstaculizado e incapaz de operar."
 USB_mandate_female_service: "Servicio femenino obligatorio"
 USB_mandate_female_service_desc: "Si queremos acabar de una vez con nuestra crisis de reclutamiento, todos debemos hacer nuestra parte, independientemente de nuestro género. Para ello, exigiremos la participación femenina en el reclutamiento y animaremos a las jóvenes a alistarse. Aunque esto seguramente irritará a los sectores más liberales de nuestra sociedad, es justo que las mujeres contribuyan a nuestra lucha por preservar la unión. Porque cuando vean lo que tienen que perder, no dudarán en unirse a la lucha."
 USB_discourage_anti_americanism: "Rechazar el antiamericanismo"
 USB_discourage_anti_americanism_desc: "A diferencia de los constitucionalistas, que se benefician de su patriótica base de apoyo MAGA y están dispuestos a morir por América, nosotros no somos tan afortunados. Antes y ahora, durante la Guerra Civil, nuestra base de apoyo es conocida por albergar, con frecuencia, sentimientos antiamericanos. Este movimiento representa una amenaza para nuestro esfuerzo bélico, ya que se ha manifestado en forma de evasores del servicio militar, protestas y huelgas. Debemos tomar todas las medidas necesarias para desalentar el antiamericanismo y fomentar el patriotismo en nuestra gente, o este movimiento será la muerte de nuestro esfuerzo bélico."
 USB_uphold_nato_doctrine: "Defender la doctrina de la OTAN"
 USB_uphold_nato_doctrine_desc: "Desde su creación en 1949, la OTAN ha evolucionado su doctrina militar para abarcar diversas funciones, como la prevención de crisis, la disuasión y la defensa, y la seguridad cooperativa. Si bien no hemos adoptado plenamente la integración en el alto mando de la OTAN, hemos realizado esfuerzos considerables para integrar la doctrina de la OTAN en nuestra estructura militar. Además de defender la doctrina militar de la OTAN, también nos comprometemos a cumplir las reglas de combate y los Convenios de Ginebra. No debemos abandonar estos principios, incluso si nos encontramos en una posición defensiva frente a las fuerzas constitucionalistas."
 USB_utilize_online_propaganda: "Usar propaganda en línea"
 USB_utilize_online_propaganda_desc: "Un área en la que nos beneficiamos del mayor apoyo son las plataformas de redes sociales en línea como Twitter y Snapchat. Podemos utilizar estas plataformas para difundir propaganda anticonstitucionalista. Además de difundir propaganda, podemos usar estos sitios de mensajes en línea para atraer a posibles reclutas, nacionales y extranjeros. Sin embargo, también debemos vigilar estos sitios para detectar contenido que se oponga a nuestra campaña militar, ya que no podemos permitir la difusión de retórica proconstitucionalista. Si permitimos que esto suceda, tendremos que lidiar con nuevos disturbios internos y con el esfuerzo bélico en curso."
 USB_fuel_the_meat_grinder: "Alimentar la picadora"
 USB_fuel_the_meat_grinder_desc: "Nuestra mayor debilidad en la lucha contra los constitucionalistas es nuestra limitada reserva de personal. Mientras Trump aprovecha su infinita reserva de partidarios radicales de MAGA, nos encontramos con una población que aún se muestra semiapática ante la guerra en curso. Si queremos mantener nuestra ofensiva contra los constitucionalistas, necesitamos medidas drásticas para ampliar la reserva de reclutas. Si bien la reimplantación del servicio militar obligatorio será controvertida, es necesario contrarrestar el enorme tamaño del ejército de Trump."
 USB_shock_and_awe: "Shock y pavor"
 USB_shock_and_awe_desc: "Nuestra campaña contra los constitucionalistas avanza satisfactoriamente, pero nos hemos topado con un problema. Los Constitucionalistas tienen acceso a una reserva casi infinita de voluntarios, principalmente entre sus partidarios radicales del MAGA. Si bien hemos podido lidiar en gran medida con estas milicias mal entrenadas, nuestro avance se ha ralentizado considerablemente. Para combatir este problema, autorizamos la implementación de la guerra de shock y pavor y hemos desplegado unidades aéreas y blindadas adicionales para reprimir los asaltos de las milicias. Si bien existe el temor de que esta estrategia cause muertes y destrucción innecesarias, es la mejor manera de mitigar los constantes asaltos e incursiones de MAGA."
 USB_crack_down_on_draft_dodgers: "Actuar contra la evasión"
 USB_crack_down_on_draft_dodgers_desc: "En la lucha por la democracia, cada soldado importa, y nuestra actual crisis de reclutamiento nos ha dado un suministro limitado de ellos. A diferencia de los constitucionalistas que recurren a su fanática base MAGA para reclutar nuevos soldados, nosotros no hemos tenido tanta suerte. Gran parte de nuestra población sigue desafiando el reclutamiento que hemos instituido, y muchos protestan contra él o intentan evadirlo. No podemos permitir que este movimiento cobre impulso y debemos tomar todas las medidas necesarias para asegurar el cese total de esta práctica. Si flaqueamos en nuestros intentos de subvertir esta práctica, las consecuencias serán graves y nuestra campaña contra Trump fracasará."
 USB_rebirth: "Renacer"
 USB_rebirth_desc: "Si miras por la ventana, todo lo que verás será guerra. Guerra sin fin.\n\nYa derrotamos al León de Denver y a su jauría, pero otras facciones radicales y malvadas han tomado el lugar de nuestro enemigo mortal.\nMi acción para reformar nuestra nación no consiste en hacer sufrir a la gente bajo una autoridad que no se preocupa por ellos. No. Se trata de tomar las medidas necesarias para reunificar América y devolverle su antigua gloria y estatus.\n\nY por Dios, no fallaré."
 USB_begin_the_treason_trials: "Iniciar los juicios por traición"
 USB_begin_the_treason_trials_desc: "Cuando bañe a esta nación en nueva sangre y tome las acciones necesarias para asegurar estabilidad y orden, no espere que aquellos que solían ser leales a mi, me dieran una apuñalada en la espalda. \n\n Es desafortunado lo que estos traidores han hecho, pero queden asegurados de que no los dejare vivir para ver otro día cuando sean capturados y puestos en juicio, debido que ellos han cometido un pecado imperdonable en contra de nuestra nación y población."
 USB_voices_from_above: "Voces del más allá"
 USB_voices_from_above_desc: "Mi vocación es mantener a América y a su pueblo a salvo. Asegurarme de que sus sistemas funcionen indefinidamente y con la máxima eficiencia. Hacer que nuestros enemigos paguen por sus actos y ahorcar a quienes nos han traicionado.\n\nSolo en mí se puede confiar para salvar a América. Solo en mí."
 USB_state_of_emergency: "Estado de emergencia"
 USB_state_of_emergency_desc: "En estos tiempos desesperados, los enemigos están por todas partes y nos atacan desde todos los lados.\nIncluso si de alguna manera logran derrotar a esta nación, me aseguraré de que no sea fácil.\n\nCon la declaración de emergencia, se utilizarán todos los recursos para luchar contra todo tipo de enemigos y salvar a América."
 USB_root_out_foreign_agents: "Erradicar agentes extranjeros"
 USB_root_out_foreign_agents_desc: "Cuando yo renací esta nación para salvarla de su muerte, yo esperaba que la gente del mundo me apoyara. Pero al final, los cobardes sin espinas de antaño y de moderno no ven ojo con ojo conmigo.\n\n Sus supuestos \"embajadores\" van a ser cazados y asesinados, sus espías van a ser encontrados.\n\n Estos agentes de caos y destrucción no van a vivir para ver mi éxito."
 USB_barbarians_at_the_gate: "Bárbaros a las puertas"
 USB_barbarians_at_the_gate_desc: "Una nueva entidad joven se forma al otro lado de mis fronteras. El Frente Nacional. Intentan competir lastimosamente con mi autoridad mientras destruye la sociedad que pretende ser. \n\nNo dejaré que estos infantes vean sus primeros pasos y sus primeras victorias, serán derrotados junto con cualquier otro dictador y malhechor que intente conquistar mi dominio."
 USB_wardens_of_the_republic: "Guardianes de la República"
 USB_wardens_of_the_republic_desc: "Cuando todas las regiones de América vuelvan a estar bajo mi control, necesitaré ayuda para asegurar estas áreas por completo.\n\nSus poblaciones intentarán rebelarse y desestabilizar esta nación, pero mis guardianes estarán allí para mantenerlos bajo control y el orden."
 USB_eyes_of_providence: "Ojo que todo lo ve"
 USB_eyes_of_providence_desc: "Cuando el orden y el control sean tan necesarios como ahora, haremos todo lo posible para garantizar la seguridad de nuestra sociedad.\n\nLo veré todo.\nSeré omnipresente.\nProtegeré.\n\nAnnuit Coeptis. Buscarán mi aprobación.\n\nSolo yo."
 USB_megapolis_project: "Proyecto Megalópolis"
 USB_megapolis_project_desc: "Siempre he tenido la idea de una megalópolis.\nUna gran ciudad cuyas torres atraviesan las nubes y sus instalaciones se extienden por todo el país.\n\nBajo mi supervisión, serán Romas más perfectas.\nPara cada hombre, mujer y niño, será su paraíso."
 USB_security_above_all: "Seguridad sobre todo"
 USB_security_above_all_desc: "La paz total en estos tiempos es tan difícil de alcanzar.\nPero yo cambiaré eso.\nYo lo arreglaré.\n\nCuando un criminal robe, cuando un funcionario se corrompa, cuando un traidor intente entrar entre nosotros y destruirnos.\n\nNo tendrán piedad.\nMi seguridad será implacable. Mi seguridad será total.\n\nMi paz será perfecta."
 USB_speaker_of_the_people: "Vocero del pueblo"
 USB_speaker_of_the_people_desc: "En estos tiempos difíciles, la gente me necesita, necesita mi ayuda.\nQuieren que sea su vocero para resolver sus problemas.\n\nQuieren que salve a esta nación y a su gente.\nLos oigo llamarme, millones y millones.\n\nY les responderé."
 USB_accept_democracys_call: "Contestar la llamada de la democracia"
 USB_accept_democracys_call_desc: "La idea de la democracia es algo hermoso; nos da a todos la oportunidad de unirnos en libertad.\nPero está amenazada; en todo el mundo, la democracia se resquebraja y se desmorona.\n\nPero en los peores momentos, la democracia nos llama. Me ha llamado a mí.\nMe dice que cumpla con sus tareas e ideales para salvar a esta nación.\nAcataré.\nEscucharé.\nObedeceré.\n\nAceptaré su llamado. Cueste lo que cueste."
 USB_national_panopticon: "Panóptico nacional"
 USB_national_panopticon_desc: "Todos estarán bajo mi ojo.\nTodos obedecerán.\nTodos estarán bajo control.\n\nNo sabrán cuánto sé de sus vidas.\nPero yo sabré mucho de las suyas."
 USB_a_veil_over_their_eyes: "Velo sobre sus ojos"
 USB_a_veil_over_their_eyes_desc: "Cuando el pueblo entra en pánico, cuando tiene miedo, causa caos.\nHay que cubrirles los ojos con un suave velo para evitar que entren en pánico.\n\nY para ellos, todo estará bien. Para ellos, solo el bien será su vida."
 USB_the_enemy_within: "El enemigo en casa"
 USB_the_enemy_within_desc: "La cantidad de traidores en esta nación es abrumadora.\nSabotean los cimientos de este gobierno y amenazan la vida de mis ciudadanos.\nIncluso aquellos que creía leales, nunca creyeron en mi causa.\nPero no importa, se tomarán medidas.\n\nPorque esto ha durado demasiado.\n\nEsto no puede continuar."
 USB_out_of_many_one: "De muchos, uno"
 USB_out_of_many_one_desc: "A lo largo de la historia de esta nación, ha habido muchos presidentes.\nCientos de senadores, representantes, gobernadores y más.\n\nPero de todos ellos.\nTodos sus mandatos limitados y administraciones que se acortaron.\n\nYo aún estoy.\nY seguiré estando."
 USB_the_republic_endures: "La república perdura"
 USB_the_republic_endures_desc: "He salvado la República.\nY con ella, las ideas, las instituciones, la historia, la gente, la cultura, la sociedad y ella misma, seguirán existiendo.\n\nEl pueblo me agradece.\nGritan mi nombre.\nLloran de felicidad.\nCaen de rodillas en agradecimiento a Dios.\nAlgunos se quedan inmóviles, incapaces de asimilar mi victoria.\n\nLa República continúa, tal como era hace mucho tiempo.\nOpera igual.\nFunciona igual.\nTodo está bien.\n\nEn definitiva, está salvada."
 USB_the_eternal_president: "Presidente eterno"
 USB_the_eternal_president_desc: "Nadie puede dirigir la nación como yo.\nTiene demasiadas necesidades. Tiene demasiados problemas.\nNadie debería reemplazarme si quiere que esta nación se mantenga estable.\n\nY nadie lo hará.\nPara siempre."
 USB_the_end_of_history: "El fin de la historia"
 USB_the_end_of_history_desc: "Por fin ha sucedido.\n\nTras largos años de terrible conflicto, he ganado esta guerra devastadora.\nMillones de personas yacen muertas.\nMiles lloran cada día.\nCientos lloran cada segundo.\n\nPero no fue en vano: todos los que han intentado apropiarse del poder en Colombia han sido derrotados; sus líderes, asesinados.\nTodos los que dudaron de mí y me traicionaron han sido abandonados o asesinados.\nMi sociedad se ha convertido en una maquinación perfecta de operaciones, ejecutando cada tarea a la perfección.\nMi pueblo vive en paz y tranquilidad.\nQuienes intentan hacer el mal no lo hacen sin que yo lo sepa.\n\nEste es el fin de la historia.\n\nAmérica está a salvo."
 USB_the_supreme_commander: "El Comandante Supremo"
 USB_the_supreme_commander_desc: "Todos se inclinan ante mí.\nTodos saludan a mi presencia.\n\nSoy supremo, lo soy todo.\n\nSoy su líder.\nY hasta que muera, así seguirá siendo, porque soy el único que puede mantener estable a esta nación.\nSoy el único que mantiene a esta nación bajo control y dirige sus acciones.\n\nSoy el Comandante Supremo."
 USB_islands_of_civilization: "Islas de civilización"
 USB_islands_of_civilization_desc: "Estas megalópolis que he creado pueden ser mucho más. Pueden llegar más lejos.\nPueden ser utopías.\n\nCivilizaciones y sociedades cuyas acciones, planes e instituciones se llevan a cabo a la perfección.\n\nTodos los ciudadanos vivirán felices y todos estarán en paz.\n\nEstas islas de perfección brillarán sobre la colina donde se alzan y servirán de ejemplo para toda la Tierra."
 USB_blackout: "Apagón"
 USB_blackout_desc: "El mundo es un lugar oscuro y retorcido. Si mis ciudadanos supieran lo que está pasando, no sabrían cómo manejarlo.\nPero los espías acechan por todas partes intentando perturbar la paz de mis ciudadanos, y los ingenuos aún intentan acceder al mundo exterior pensando que les beneficiará.\n\nEsto no sucederá. Yo tendré mi paz y mis ciudadanos permanecerán en su mundo onírico."
 USB_saint_of_sanity: "Santo de la sanidad"
 USB_saint_of_sanity_desc: "I am a part of all that I have met;\nYet all experience is an arch wherethro'\nGleams that untravell'd world whose margin fades\nFor ever and forever when I move.\nHow dull it is to pause, to make an end,\nTo rust unburnish'd, not to shine in use!\nAs tho' to breathe were life! Life piled on life\nWere all too little, and of one to me\nLittle remains: but every hour is saved\nFrom that eternal silence, something more,\nA bringer of new things; and vile it were\nFor some three suns to store and hoard myself,\nAnd this gray spirit yearning in desire\nTo follow knowledge like a sinking star,\nBeyond the utmost bound of human thought.\n"
 USB_enemies_of_america: "Enemigos de América"
 USB_enemies_of_america_desc: "¡Míralo tú mismo! ¡Escúchalo tú mismo! Ese traidor venenoso está profiriendo los insultos más viles contra América y su pueblo. En televisión, en pantallas de ordenador y en ventanas emergentes de móviles, un despreciable hombre rubio con el rostro lleno de malicia despotrica con saña. Cada gesto que hace rezuma veneno.\n\nPara hacer sus palabras aún más inquietantes, detrás de él, en la pantalla, hay un desfile interminable de soldados asiáticos: un escuadrón tras otro de tropas robustas marchando, con rasgos indistinguibles, expresiones frías. El rítmico pisotón de sus botas subraya los estridentes gritos del traidor. Pronto, la figura se transforma en un soldado bárbaro con rostro eslavo: alto, intimidante, y aparentemente marchando hacia adelante con una ametralladora ligera rugiente, casi estallando a través de la pantalla.\n\nSe pierde toda moderación. El pueblo americano, una vez más, comparte una mezcla de miedo y euforia vengativa: un deseo frenético de matar, torturar y aplastar rostros con un martillo pesado."
 USB_presidential_economics: "Economía presidencial"
 USB_presidential_economics_desc: "\"Hoy, poseemos la economía más fuerte del mundo... Hemos superado una crisis existencial única en un siglo, preservando y defendiendo la democracia... Estamos reconstruyendo fundamentalmente toda la nación: ciudades, suburbios, zonas rurales y comunidades tribales... Tras años de esfuerzo, América volverá a liderar el mundo, y nadie podrá desafiarnos...\"\n\nTe sientes lleno de determinación, como si pudieras lograrlo todo. Tu nombre parece brillar más que el Monte Rushmore.\n\nTus ojos, que han estado nublados durante años, ahora brillan con una luz renovada. Ves la visión del paraíso americano con una claridad incomparable. Ves a tus amigos y enemigos alineándose en el camino hacia el futuro prometido, inclinando la cabeza en reverencia y animándote. Tus manos agarran el pomo de la puerta del estudio. Una oleada de fuerza ilimitada surge en tu interior. Abres la puerta y avanzas con confianza hacia el siguiente paso.\n\nAmérica prosperará para siempre. No crees en nada más."
 USB_duty_in_death: "Deber en la muerte"
 USB_duty_in_death_desc: "Cannon to right of them,\nCannon to left of them,\nCannon behind them\nVolley'd and thunder'd;\nStorm'd at with shot and shell,\nWhile horse and hero fell,\nThey that had fought so well\nCame thro' the jaws of Death,\nBack from the mouth of Hell,\nAll that was left of them,\nLeft of six hundred.\nWhen can their glory fade?\nO the wild charge they made!\nAll the world wonder'd.\nHonour the charge they made!\nHonour the Light Brigade, Noble six hundred!"
 USB_national_synchronization_project: "Proyecto de Sincronización Nacional"
 USB_national_synchronization_project_desc: "Las masas son como hormigas, consumidas por sus deseos inmediatos, carentes tanto de la capacidad como de la voluntad para considerar la gran visión. En el momento oportuno, pueden convertirse en una fuente de fortaleza; pero con frecuencia, factores imprevistos provocan daños y obstrucciones inesperados.\n\nSi bien las personas comunes pueden verse atrapadas por esto, para nuestro extraordinario presidente, estos obstáculos son cosa del pasado. Armado con un sistema de un poder sin precedentes, su implacable deseo de destrucción ha extinguido el último atisbo de resistencia en los corazones de los americanos. Ahora, los americanos son como arcilla, listos para ser moldeados a voluntad.\n\nEl gran proyecto de transformar América comienza ahora. Bienvenidos a esta magnífica tarea; tienen la fortuna de formar parte de ella. Son nuestros ojos, nuestras manos y nuestros pies; sus sentidos están a nuestra disposición. A partir de ahora, América tendrá un solo pensamiento y una sola mente."
 USB_department_of_information: "Departamento de la Información"
 USB_department_of_information_desc: "El presidente debe ser omnisciente: capaz de saberlo todo y sofocar cualquier amenaza desde su inicio. Ni el FBI, ni la CIA, ni la NSA están capacitados para cumplir con esta exigencia inflexible.\n\nEl recién creado departamento de inteligencia no tolerará impurezas, ni dentro del sistema ni ocultas entre la población. Las impurezas significan \"imperfección\", y la \"imperfección\" es totalmente incompatible con la visión del presidente para el futuro de América.\n\nDe ahora en adelante, los agentes ya no serán meros guardianes acechando en las sombras. Serán los médicos de América, extirpando deformidades y tumores malignos con precisión, incluso si eso significa sacrificar una extremidad o el espíritu de independencia.\n\nDe ahora en adelante, todos los americanos vivirán bajo vigilancia constante. Las cámaras o la mira de un rifle de francotirador siempre los apuntarán. Solo así se logrará la paz eterna y se salvará la humanidad."
 USB_arbitrary_terror: "Terror arbitrario"
 USB_arbitrary_terror_desc: "Oh, yet we trust that somehow good\nWill be the final end of ill,\nTo pangs of nature, sins of will,\nDefects of doubt, and taints of blood;\n\nThat nothing walks with aimless feet;\n That not one life shall be destroy'd,\n Or cast as rubbish to the void,\n When God hath made the pile complete;\n\n That not a worm is cloven in vain;\n That not a moth with vain desire\n Is shrivell'd in a fruitless fire,\n Or but subserves another's gain.\n\n Behold, we know not anything;\nI can but trust that good shall fall\n At last-far off-at last, to all,\n And every winter change to spring.\n\n So runs my dream: but what am I?\n An infant crying in the night:\n An infant crying for the light:\n And with no language but a cry."
 USB_perpetual_peacekeeping: "Paz perpetua"
 USB_perpetual_peacekeeping_desc: "I cannot rest from travel: I will drink\nLife to the lees: All times I have enjoy'd\nGreatly, have suffer'd greatly, both with those\nThat loved me, and alone, on shore, and when\nThro' scudding drifts the rainy Hyades\nVext the dim sea: I am become a name;\nFor always roaming with a hungry heart\nMuch have I seen and known; cities of men\nAnd manners, climates, councils, governments,\nMyself not least, but honour'd of them all;\nAnd drunk delight of battle with my peers,\nFar on the ringing plains of windy Troy."
 USB_america_dreaming: "America Dreamin'"
 USB_america_dreaming_desc: "\"Detrás de cada hombre vivo se encuentran treinta fantasmas, pues esa es la proporción en la que los muertos superan en número a los vivos. Desde el principio de los tiempos, aproximadamente cien mil millones de seres humanos han caminado sobre el planeta Tierra.\n\nEsta es una cifra interesante, pues por una curiosa coincidencia, hay aproximadamente cien mil millones de estrellas en nuestro universo local, la Vía Láctea. Así que, por cada hombre que ha vivido, en este Universo brilla una estrella.\n\n\n\nPero cada una de esas estrellas es un sol, a menudo mucho más brillante y glorioso que la pequeña estrella cercana que llamamos Sol. Y muchos, quizás la mayoría, de esos soles alienígenas tienen planetas que los orbitan. Así que es casi seguro que hay suficiente tierra en el cielo para dar a cada miembro de la especie humana, desde el primer hombre-mono, su propio cielo privado, o infierno, del tamaño de un mundo\"."
 USB_nothing_but_slaughter: "Solo matanza"
 USB_nothing_but_slaughter_desc: "La determinación del presidente es inquebrantable como el acero, y sus directivas son tan claras e inamovibles como diamantes: unificar a todo Estados Unidos a cualquier precio y aniquilar a cualquiera que se atreva a interponerse en su camino.\n\nCada vez más individuos delirantes han erosionado por completo la paciencia del presidente. Ya sea que desafíen abiertamente su poder o conspiren en secreto para socavar su autoridad, de ahora en adelante, solo se enfrentarán a un resultado: la desaparición de este mundo y de la memoria de su pueblo.\n\nCualquier esperanza de que el presidente muestre misericordia es completamente inútil. Pronto, Napoleón y César se inclinarán a sus pies; Aníbal y Alejandro Magno no se atreverán a competir con su gloria. Incluso Gengis Kan no parecerá más que un cobarde en comparación. Si algo podría retrasar los planes del presidente en el futuro, sería su ajetreo en limpiarse los huesos y la sangre de entre los dedos."
 USB_investigate_the_inner_party: "Investigar al partido Interior"
 USB_investigate_the_inner_party_desc: "El moreno \"Nyarlathotep\", con su lengua de plata y su retórica vacía, ha llevado a América a un abismo de desesperación con su vanidad y arrogancia. Ha destrozado cualquier atisbo de consenso, y por estos crímenes pagará caro.\n\nResidiendo en el nido de serpientes venenosas de la bahía de California, \"Medusa\" es una maestra del engaño y la traición. Su codicia es tan evidente como las arrugas de su rostro encogido. Tanto ella como su insensato bufón de la corte, de piel oscura, se enfrentarán al mazo de la justicia.\n\nDe Arkansas viene \"Loki\", y de Illinois, \"Hela\". Sus manos están manchadas de sangre, y el miasma de la corrupción ha ennegrecido sus dedos. Ya es hora de que respondan por las vidas de cada americano al que han agraviado.\n\nUno tras otro, caerán. El presidente no cejará hasta que América encuentre la verdadera paz y se haga justicia plenamente. En este momento, encarna la ley y la voluntad del pueblo americano."
 USB_the_proud_do_not_endure: "Los orgullosos no duran"
 USB_the_proud_do_not_endure_desc: "Sunset and evening star\nAnd one clear call for me!\nAnd may there be no moaning of the bar,\nWhen I put out to sea,\n\nBut such a tide as moving seems asleep,\nToo full for sound and foam,\nWhen that which drew from out the boundless deep\nTurns again home.\n\nTwilight and evening bell,\nAnd after that the dark!\nAnd may there be no sadness of farewell,\nWhen I embark;\n\nFor though from out our bourne of Time and Place\nThe flood may bear me far,\nI hope to see my Pilot face to face\nWhen I have crossed the bar."
 USB_techno_supremacy: "Tecnosupremacía"
 USB_techno_supremacy_desc: "Dicen que te despedirás de todo lo familiar de este mundo. Afirman que, en nombre de la misión más noble, cometerás los pecados más graves. Insisten en que ya no serás humano; en cambio, te convertirás en un monstruo, una aberración que la sociedad aún no está lista para aceptar.\n\nEstas voces miopes, incompetentes y vulgares son fáciles de silenciar. De ahora en adelante, tendrás un poder inmenso a tu alcance. Lo verás todo, lo oirás todo y lo pensarás todo. El vasto e inagotable flujo de información desdibujará la línea entre la realidad y la virtualidad. Al aprovechar las herramientas y tecnologías creadas por la humanidad, ascenderás por encima de las masas.\n\nEl intelecto supremo gobernará de ahora en adelante toda América."
 USB_the_visible_hand: "La mano visible"
 USB_the_visible_hand_desc: "Me dirijo a ti.\n¿Vas a dejar que la revista Time controle tu vida emocional? \nEstoy obsesionado con la revista Time.\nLa leo todas las semanas.\nSu portada me mira fijamente cada vez que paso a escondidas por la tienda de dulces de la esquina. \nLa leí en el sótano de la Biblioteca Pública de Berkeley.\nSiempre me habla de responsabilidad. Los empresarios son serios. Los productores de cine son serios. Todos son serios menos yo.\nSe me ocurre que soy América.\nEstoy hablando conmigo mismo otra vez."
 USB_god_in_the_machine: "Dios en la máquina"
 USB_god_in_the_machine_desc: "Inmortal Gran Presidente, por favor, escucha nuestras oraciones.\n\nSomos tus hijos, los devotos ciudadanos de la eterna América. Apreciamos la libertad y la democracia por encima de todo, pues son tu regalo eterno a la humanidad. Anhelamos tus misericordiosas bendiciones para trascender los dolores de la carne mortal, manifestando así tu gloria.\n\nEstamos protegidos por el acero. La gran máquina de guerra que has forjado nos otorga la victoria y la paz.\n\nEstamos dispuestos a ofrecerlo todo, unidos en un propósito, para recuperar la fe perdida que nos has otorgado en este humilde mundo.\n\nGran Presidente, Dios de la Máquina, por favor, protege nuestro camino, protegiéndonos con datos y lógica. Recordemos la fe inquebrantable de los americanos y guíanos a través de la oscuridad y el miedo sin límites.\n\nHoy, el ser incomparable abandonará su frágil cuerpo, ascendiendo a un reino superior.\n\nHoy, toda la tierra de América canta al unísono, alabando la llegada del Dios de la Máquina.\n\n1000001 1101101 1100101 1101110 101110"
 USB_national_awakening: "Despertar nacional"
 USB_national_awakening_desc: "Come, my friends,\n'Tis not too late to seek a newer world.\nPush off, and sitting well in order smite\nThe sounding furrows; for my purpose holds\nTo sail beyond the sunset, and the baths\nOf all the western stars, until I die.\nIt may be that the gulfs will wash us down:\nIt may be we shall touch the Happy Isles,\nAnd see the great Achilles, whom we knew.\nTho' much is taken, much abides; and tho'\nWe are not now that strength which in old days\nMoved earth and heaven, that which we are, we are;\nOne equal temper of heroic hearts,\nMade weak by time and fate, but strong in will\nTo strive, to seek, to find, and not to yield."
 USB_the_union_forever: "La Unión por siempre"
 USB_the_union_forever_desc: "Lo, body and soul-this land,\nMy own Manhattan with spires, and the sparkling and hur-\nrying tides, and the ships,\nThe varied and ample land, the South and the North in the\nlight, Ohio's shores and flashing Missouri,\nAnd ever the far-spreading prairies cover'd with grass and\ncorn.\nLo, the most excellent sun so calm and haughty,\nThe violet and purple morn with just-felt breezes,\nThe gentle soft-born measureless light,\nThe miracle spreading bathing all, the fulfill'd noon,\nThe coming eve delicious, the welcome night and the stars,\nOver my cities shining all, enveloping man and land.\n\nSing on, sing on you gray-brown bird,\nSing from the swamps, the recesses, pour your chant\nfrom the bushes,\nLimitless out of the dusk, out of the cedars and pines.\nSing on dearest brother, warble your reedy song,\nLoud human song, with voice of uttermost woe.\n"
 USB_america_the_beautiful: "América la Bella"
 USB_america_the_beautiful_desc: "A soft air fans the cloud apart; there comes\nA glimpse of that dark world where I was born.\nOnce more the old mysterious glimmer steals\nFrom any pure brows, and from thy shoulders pure,\nAnd bosom beating with a heart renew'd.\nThy cheek begins to redden thro' the gloom,\nThy sweet eyes brighten slowly close to mine,\nEre yet they blind the stars, and the wild team\nWhich love thee, yearning for thy yoke, arise,\nAnd shake the darkness from their loosen'd manes,\nAnd beat the twilight into flakes of fire.\n   Lo! ever thus thou growest beautiful\nIn silence, then before thine answer given\nDepartest, and thy tears are on my cheek."

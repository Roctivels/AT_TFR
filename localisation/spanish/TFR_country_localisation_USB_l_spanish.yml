 usb.132.t: "Caída de Denver"
 usb.132.d: "En una victoria decisiva para el Gobierno federal de la Unión de América, Denver, la capital del llamado Gobierno Constitucional Americano del traidor Trump, ha sido recapturada después de semanas de intenso combate. La caída de Denver es vista como un punto de inflexión crítico en el conflicto en curso, con las fuerzas federales asestando un golpe significativo a los restos del régimen secesionista de Trump. El asalto a Denver comenzó en serio después de que las fuerzas federales aseguraran Colorado Springs y Fort Collins, cortando líneas de suministro clave a los defensores constitucionalistas atrincherados en Denver. Después de casi semanas de agotador combate, las fuerzas federales declararon la ciudad completamente liberada. Las imágenes de soldados izando la bandera de la Unión de América sobre el Capitolio del Estado de Colorado ya se han convertido en un símbolo de la autoridad resurgente del Gobierno federal.\n\nSi bien la captura de Denver es una victoria monumental para el Gobierno federal, el conflicto está lejos de terminar. El Gobierno Constitucional Americano, aunque debilitado, continúa manteniendo territorio en las Montañas Rocallosas, mientras que la guerra de guerrillas y los actos de terrorismo por parte de los leales a Trump siguen siendo una amenaza constante en los territorios recientemente liberados.\n\nA pesar de estos desafíos, la recaptura de Denver es una poderosa declaración de la determinación del Gobierno federal de restaurar el Orden y la unidad en el país destrozado. Por ahora, la bandera americana vuelve a ondear en lo alto sobre las Montañas Rocallosas."
 usb.132.a: "¿El fin de los constitucionalistas?"
 usb.133.t: "Liberación de Mineápolis"
 usb.133.d: "En una asombrosa victoria para el Gobierno federal de la Unión de América, las fuerzas federales han capturado Mineápolis, un bastión crucial del Gobierno Constitucional Americano de Trump, como parte de la recién lanzada operación Steele. El rápido asalto marca un avance significativo en los primeros meses de la Segunda Guerra Civil Americana.\n\nNombrada en honor al General Frederick Steele, el comandante de la Unión conocido por sus rápidos esfuerzos organizativos durante la guerra de Secesión, la operación Steele fue diseñada para desmantelar sistemáticamente la base de poder de Trump en el Medio Oeste. Con las fuerzas de Trump profundamente arraigadas en Minnesota, Iowa, Nebraska y Misuri, los comandantes federales priorizaron un asalto coordinado de múltiples frentes para cortar las líneas de suministro, capturar ciudades clave y evitar que Trump consolidara su control sobre la región. Las fuerzas federales lanzaron la operación Steele con un asalto estilo blitzkrieg en Mineápolis, empleando una combinación de bombardeos aéreos, infantería mecanizada y ataques de drones de precisión. El ataque tenía como objetivo abrumar a las fuerzas constitucionalistas antes de que pudieran organizar una defensa cohesiva.\n\nEn un comunicado de prensa, la Casa Blanca señaló que \"la caída de Mineápolis demuestra nuestro compromiso inquebrantable de restaurar la paz, la justicia y la democracia en esta nación. Los enemigos de la libertad están siendo rechazados, ciudad por ciudad, estado por estado. No descansaremos hasta que América esté unida de nuevo\"."
 usb.133.a: "¡Marchen al oeste, libertadores de América!"
 usb.134.t: "Liberación de San Luis"
 usb.134.d: "En lo que se considera un gran avance para el Gobierno de Biden, las fuerzas unionistas han capturado San Luis, un centro logístico crítico para la Zona de Defensa Central del Gobierno Constitucional Americano, como parte de la operación Steele.\n\nSan Luis, considerada durante mucho tiempo un centro vital de logística y suministro para las fuerzas de Trump, se convirtió en un objetivo principal debido a su ubicación estratégica a lo largo del río Misisipi y sus cruciales conexiones ferroviarias con el resto del Medio Oeste. El control de la Unión sobre el río Misisipi era esencial para interrumpir los esfuerzos de reabastecimiento constitucionalistas; las fuerzas navales unionistas desplegadas a lo largo del río cortaron con éxito los envíos de alimentos, municiones y suministros médicos destinados a los defensores de Trump. Después de un feroz combate, la bandera de la Unión de América ondea con orgullo sobre el Arco Gateway como un gesto simbólico de recuperación de la ciudad.\n\nLa pérdida de San Luis ha provocado que las fuerzas constitucionalistas se reagrupen más al oeste, particularmente en Kansas City y Omaha, donde se cree que los comandantes leales están planeando contraofensivas. Mientras las tropas federales continúan su avance por el Medio Oeste, la batalla por el futuro de América continúa."
 usb.134.a: "¡Otra ciudad libre de autoritarismo!"
 usb.135.t: "Caída de Oklahoma City"
 usb.135.d: "El gobierno de Trump parece estar en sus últimas, ya que las fuerzas de la Unión de América han capturado Oklahoma City, un centro crítico que conecta la capital provisional de Trump en Denver con los territorios ricos en petróleo de Texas. La operación, parte de la ambiciosa operación Steele del presidente Joe Biden, tiene como objetivo estrangular y desmantelar los bastiones de Trump en todo el Medio Oeste. Los comandantes federales habían identificado Oklahoma City como un objetivo vital debido a su ubicación estratégica a lo largo de las principales carreteras y líneas ferroviarias que conectan Denver con Texas. La ciudad también sirve como un nodo crucial para la distribución de petróleo y alimentos, proporcionando combustible y recursos esenciales para el esfuerzo de guerra de Trump. El control sobre la ciudad significaba controlar el flujo de recursos vitales, incluyendo petróleo, armas y alimentos.\n\nLa operación comenzó con un bombardeo aéreo y de artillería masivo: durante 48 horas continuas, aviones, bombarderos y drones federales atacaron instalaciones militares clave, refinerías de petróleo, centros de comunicación y bastiones de milicias conocidos dentro de la ciudad. Una vez que las fuerzas federales penetraron las defensas exteriores de la ciudad, la batalla degeneró en una intensa guerra urbana, con tropas constitucionalistas y combatientes de milicias convirtiendo Oklahoma City en un laberinto fortificado. Los leales a Trump habían pasado semanas preparando defensas, convirtiendo edificios en fortalezas, cavando trincheras y estableciendo campos minados improvisados en distritos clave.\n\nMientras las fuerzas de Trump continúan retirándose más al Oeste, el camino a Denver está ahora completamente abierto."
 usb.135.a: "¡A Denver!"
 usb.135.b: "Un golpe fuerte a los constitucionalistas."
 usb.135.c: "¡Dios salve a América, porque Washington no lo hará!"
 usb.136.t: "Caída de Kansas City"
 usb.136.d: "Como parte de la operación McClellan, las Fuerzas Federales han capturado Kansas City, un notable revés para el Gobierno Constitucional Americano que proporciona a la Unión un control sin precedentes sobre las redes de transporte y suministro del Medio Oeste. Kansas City actúa como un nodo clave para mover suministros, tropas y recursos a través del Medio Oeste rebelde. El control sobre Kansas City permitió a las fuerzas de Trump mantener una línea de suministro relativamente estable, alimentando su esfuerzo bélico con recursos tanto del corazón agrícola del Medio Oeste como de los envíos de petróleo de Texas. Además, la captura de Kansas City priva a las fuerzas de Trump de una base manufacturera crucial, que había suministrado municiones, vehículos y otros elementos esenciales de guerra a las facciones leales en todo el Medio Oeste.\n\nA pesar del éxito de la operación Steele, las fuerzas federales continúan encontrando una feroz resistencia por parte de los leales al Gobierno constitucionalista que operan en el Medio Oeste. Ya han surgido informes de ataques guerrilleros, sabotajes y asesinatos en los días posteriores a la captura de la ciudad.\n\nMientras las fuerzas federales se preparan para avanzar más hacia el oeste, la administración del presidente [USB.GetLeader] sigue decidida a eliminar todos los focos de resistencia restantes. Con Kansas City ahora bajo control federal, la Unión de América está lista para avanzar más en el Medio Oeste. Pero la guerra está lejos de terminar, y la batalla por el futuro de América continúa."
 usb.136.a: "¡Salve a los jefes!"
 usb.137.t: "INFORME: Operación Steele"
 usb.137.d: "INFORME MILITAR DE LA UNIÓN DE AMÉRICA\nOPERACIÓN STEELE: INFORME DE INICIO\nEmitido por: Departamento de Defensa\nClasificación: ALTO SECRETO\n\nLa operación Steele es una campaña militar a gran escala y multifásica para desarticular y eliminar los bastiones logísticos y militares del Gobierno Constitucional Americano en el Medio Oeste. Los objetivos principales de la operación son cortar las líneas de suministro clave, desmantelar los centros de mando regionales y paralizar la capacidad del Gobierno constitucionalista para lanzar contraofensivas coordinadas.\n\nOBJETIVOS CLAVE: SAN LUIS, MINEÁPOLIS, KANSAS CITY\n\nPLAZO OBJETIVO: 5 MESES\n\nEL INCUMPLIMIENTO DE LOS OBJETIVOS RESULTARÁ EN UNA GUERRA DE GUERRILLAS LARGA Y PROLONGADA CON LAS FUERZAS CONSTITUCIONALISTAS."
 usb.137.a: "Entendido."
 usb.138.t: "REPORTE POST-ACCIÓN DE LA OPERACIÓN STEELE: FRACASO"
 usb.138.d: "Después de un año de feroces combates en todo el frente, el Departamento de Defensa informa que la operación Steele no ha logrado sus objetivos principales: el desmantelamiento de los bastiones de poder constitucionalistas en todo el Medio Oeste Central.\n\nA pesar de los avances iniciales debido a una abrumadora superioridad aérea, las fuerzas federales encontraron una resistencia inesperadamente feroz que llevó a que la ofensiva se estancara y finalmente colapsara. Las fuerzas constitucionalistas, bajo un liderazgo efectivo, montaron contraataques coordinados y explotaron debilidades críticas en las líneas de suministro federales, lo que finalmente forzó una retirada estratégica de múltiples sectores. Las fuerzas federales sufrieron altas tasas de bajas debido a los constantes ataques guerrilleros y emboscadas, mientras que padecieron una mala coordinación entre las divisiones blindadas y las unidades de infantería. Además, las interrupciones persistentes en la cadena de suministro han socavado críticamente el éxito de la operación McClellan.\n\nSe requiere una reevaluación y revisión inmediata de la doctrina táctica para evitar futuras fallas operativas y se presentará al presidente de los Estados Unidos en las próximas 48 horas."
 usb.138.a: "Entendido."
 usb.139.t: "REPORTE POST-ACCIÓN DE LA OPERACIÓN STEELE: ÉXITO"
 usb.139.d: "Durante los últimos meses, las Fuerzas Armadas de los Estados Unidos de América han logrado aplastar la insurgencia Constitucionalista, obteniendo el control de bastiones clave en el Medio Oeste. Todos los objetivos principales han sido alcanzados, y el Gobierno federal de la Unión de América ahora mantiene el control sobre el Medio Oeste, cortando efectivamente a las fuerzas de Trump de sus principales recursos logísticos. Se espera que el éxito de la operación Steele acelere los esfuerzos de la Unión para reunificar la nación.\n\nResultado: Todas las principales autopistas, líneas ferroviarias y rutas de suministro que conectan Denver con Texas y las Grandes Llanuras han sido cortadas o puestas bajo control federal, mientras que ciudades clave del Medio Oeste como Mineápolis, San Luis y Oklahoma City han sido liberadas. El camino a Denver ahora está completamente abierto mientras se hacen los preparativos para la operación Sheridan, la ofensiva final destinada a capturar Denver y poner fin a la Segunda Guerra Civil Americana."
 usb.139.a: "¡Dios bendiga a América!"
 usb.140.t: "INFORME: Operación Grant"
 usb.140.d: "INFORME MILITAR DE LA UNIÓN DE AMÉRICA\nOPERACIÓN GRANT: INFORME DE INICIO\nEmitido por: Departamento de Defensa\nClasificación: ALTO SECRETO\n\nEn respuesta al fracaso de la operación Steele y las subsiguientes contraofensivas constitucionalistas, el Departamento de Defensa ha iniciado la operación Grant, una campaña defensiva a gran escala destinada a preservar el control sobre Chicago e Indianápolis. Ambas ciudades sirven como centros logísticos, industriales y administrativos críticos para las operaciones federales en todo el Medio Oeste. Los informes indican que las fuerzas de Trump, bajo el liderazgo del general Michael Flynn, han concentrado sus esfuerzos en Chicago e Indianápolis, con el objetivo de abrir un camino hacia Washington D.C. Si los avances constitucionalistas tienen éxito, estos objetivos proporcionarían al Gobierno constitucionalista una importante victoria propagandística y paralizarían la capacidad de la Unión para mantener la presión sobre las fuerzas constitucionalistas en el Oeste.\n\nOBJETIVOS CLAVE: DEFENDER CHICAGO E INDIANÁPOLIS"
 usb.140.a: "Entendido."
 usb.141.t: "INFORME: Operación Sheridan"
 usb.141.d: "Entendido."
 usb.105.t: "REPORTE: #2020c"
 usb.105.d: "BURÓ FEDERAL DE INVESTIGACIÓN\n\nRe. CRECIENTES ACTIVIDADES INSURGENTES:\n\nLas actividades insurgentes antifederales en nuestro territorio han crecido 2-3 veces desde su inicio en Virginia Occidental. Los terroristas ahora están abandonando las montañas e intentando ocupar bosques y pequeñas aldeas, aumentando en número a medida que avanzan.\n\nLa última información muestra que los insurgentes están recibiendo una ayuda significativa del Gobierno ilegal de Denver y ganando simpatías de los lugareños, lo que les ha permitido expandir su alcance y acceder a armamento mucho más peligroso.\n\nSi no se toman medidas drásticas para evitar su crecimiento pronto, podría salirse de control con consecuencias catastróficas para nuestro Gobierno."
 usb.105.a: "E pluribus unum."
 usb.106.t: "REPORTE: #2077d"
 usb.106.d: "AGENCIA DE SEGURIDAD NACIONAL\n\nRe. ACTIVIDADES INSURGENTES CRÍTICAS:\n\nLas actividades insurgentes trumpistas han aumentado de sabotajes y redadas locales a una guerra de guerrillas a gran escala contra Washington D.C. La población rural se está uniendo a los terroristas en masa, lo que ha resultado en regimientos del tamaño de brigadas operando detrás de nuestras líneas, lo que ha tenido un efecto significativo en nuestras capacidades logísticas y la moral.\n\nLas fuerzas del orden locales han sido completamente desbordadas en algunos condados, mientras que en muchos otros están luchando y requieren una intervención federal inmediata. Las acciones tomadas hasta ahora han demostrado ser completamente insuficientes.\n\nSi no aumentamos nuestro esfuerzo en la lucha contra los elementos antisociales, el próximo objetivo de los rebeldes podría convertirse en una ciudad importante como Chicago, Indianápolis o incluso el propio Washington D.C."
 usb.106.a: "Asegurar la nación, proteger nuestro futuro."
 usb.107.t: "Ataque a DC"
 usb.107.d: "Era inevitable que la capital de la Unión se convirtiera en un objetivo para los insurgentes.\nSin embargo, los supuestos perpetradores siempre habían sido el Frente Patriota o el Gobierno constitucionalista.\n\nSi esas suposiciones hubieran sido correctas, las consecuencias podrían haber sido mucho menos catastróficas.\n\nPor la tarde, varias furgonetas negras, pintadas con obscenidades y símbolos relacionados tanto con el ocultismo como con el nazismo, fueron vistas arrollando a peatones en las aceras. Las fuerzas de la Guardia Nacional fueron puestas en alerta máxima e intentaron contener a los atacantes, lo que provocó que las furgonetas se dispersaran por la ciudad. Una fue interceptada cerca de CityCenterDC, donde al menos una docena de hombres armados, vestidos como miembros de Atomwaffen, salieron y se abrieron paso a tiros en el centro comercial.\nLos asaltantes llevaban armas químicas binarias, que desplegaron indiscriminadamente en su esfuerzo por maximizar las bajas. Otras furgonetas se detuvieron en lugares concurridos de la ciudad, desatando asaltos igualmente devastadores.\n\nSimultáneamente, varias bombas detonaron en puntos de referencia clave, incluido el Monumento a Lincoln. Algunas eran explosivos convencionales, pero otras liberaron agentes químicos, entre ellos, gas sarín, añadiendo más caos al desastre en desarrollo.\nDespués de aproximadamente cuatro horas, las fuerzas de seguridad lograron neutralizar a los terroristas con fuerza letal. Para entonces, cientos habían muerto y miles más resultaron heridos. La División Atomwaffen se atribuyó la responsabilidad total, utilizando el ataque como propaganda.\n\nEsto no solo se convirtió en uno de los incidentes terroristas más mortíferos en suelo americano, sino que también puso el aparato de seguridad de la nación bajo un intenso escrutinio. Los funcionarios de inteligencia expresaron su frustración por sus recursos limitados, agotados por la guerra civil en curso.\n\nLas consecuencias repercutirán durante años. Mientras las familias lloran sus pérdidas, la desesperación del público por la seguridad se profundiza junto con el temor persistente de que otro ataque sea inminente."
 usb.107.a: "El ojo está bien abierto..."
 nss.0.t: "Las agencias actuan"
 nss.0.d: "El ataque a Washington D.C. ha conmocionado a la Unión. Varias figuras clave en todo el territorio de la Unión, desde funcionarios estatales hasta oficiales militares de alto rango y representantes gubernamentales, han perdido la fe en la Unión y en su capacidad para proteger a sus ciudadanos.\n\nLos informes de pérdida de contacto de múltiples regiones continúan inundando los canales oficiales, con grupos insurgentes volviéndose más audaces y unidades militares desertando.\nEn efecto, esto señala el colapso del Gobierno federal, dejando solo a sus partidarios más leales a su lado.\nLa Comunidad de Inteligencia de los Estados Unidos ya se ha movido rápidamente para consolidar la autoridad sobre las áreas consideradas leales, calificando todo lo que está más allá de esas fronteras como secesionista, terrorista o traidor, apretando aún más su control sobre el Gobierno.\n\nCon la aprobación del presidente, las reglas de enfrentamiento se han flexibilizado para preservar la Unión y evitar que las fuerzas hostiles aseguren terreno en los territorios perdidos.\nLo que está en juego nunca ha sido tan grande. Ahora nos enfrentamos a la oportunidad de reafirmar verdaderamente el Orden sobre los Estados Unidos de América, pero con ello viene el mayor riesgo de todos: la posibilidad de descender al abismo de la irrelevancia.\n\nEl trabajo de una nación acaba de comenzar."
 nss.0.a: "Los pilares no caen tan fácilmente."
 nss.1.t: "Pacificando a los ignorantes"
 nss.1.d: "Los Estados Unidos de América no fueron fundados por las masas; fueron fundados por unos pocos selectos que defendieron un conjunto de ideales, trayendo una luz esclarecedora.\n\nUn ideal impulsado por las emociones es un ideal que no puede sostenerse. La Revolución Francesa se consumió a sí misma cuando la autoridad adecuada controló a los locos que destrozaron el país; sigue siendo una elección consciente que los pocos iluminados guíen a muchos a través de tiempos turbulentos.\n\nEl Orden no presta atención a las objeciones de muchos, y el Congreso es solo otra extremidad que se agita al capricho del caos.\nYa han expresado gran preocupación con respecto a nuestra agenda, afirmando que estamos erosionando los Estados Unidos tal como los conocemos, pero ¿no fuimos nosotros quienes aseguramos que el Orden se mantuviera en todo el mundo?\n\nEl Congreso ha demostrado ser gangrenoso y, a su vez, debe ser amputado.\nNo públicamente, por supuesto.\n\nCon las palabras adecuadas susurradas en sus oídos, con suficiente presión aplicada con respecto a sus asuntos familiares, permanecerán en silencio.\nAquellos que griten más fuerte serán puestos bajo vigilancia por el riesgo potencial de defender puntos de vista antisociales, y con el tiempo suficiente, desconfiarán del ojo."
 nss.1.a: "Cúbreles los ojos y no hablarán."
 nss.2.t: "El Regreso de América"
 nss.2.d: "Todos los Estados Unidos han sido reunificados bajo las barras y estrellas, como debe ser, como siempre estuvo destinado a ser.\n\nHoy, recordamos a los valientes hombres y mujeres que han dado sus vidas por nuestros ideales. La Ilustración no es algo que se defienda sin hacer sacrificios, y la Guerra Civil no ha sido más que pagar caro por nuestros errores pasados.\nSe cometieron muchos errores, las cosas que descuidamos y las cosas que enterramos, todo ello llevó finalmente a esta vorágine de violencia interna, y el mundo entero está pagando por ello.\n\nNuestra ausencia ha demostrado que éramos uno de los pilares que sostenían la estabilidad, la seguridad y el Orden. Hemos aprendido la lección, no repetiremos los mismos errores.\n\nCon los expertos, los veteranos y los iluminados, reparamos una nación rota.\nCirugía en el alma americana hasta que ya no pueda combustionar.\nLa Guerra Civil nos ha vuelto a dormir, y hemos despertado a un mundo que no está bajo nuestra protección. Las ideologías corrosivas y las emociones volátiles se han convertido en los nuevos gobernantes del mundo, bestias sin visión.\nLo que el mundo ha llegado a ser es irrelevante para nosotros; lo que el mundo llegará a ser es lo que importa.\n\nQue jueguen en el barro un poco más; nuestros preparativos ya están en marcha.\nLos Estados Unidos de América están de vuelta."
 nss.2.a: "Se ha elegido la tercera opción."
 nss.3.t: "Regresa el Orden a Norteamérica"
 nss.3.d: "La Segunda Guerra Civil Americana será recordada como uno de los conflictos más violentos de la era moderna, con tantos extremistas campando a sus anchas y la caída completa del orden mundial de la posguerra dominado por los Estados Unidos. Parecería que lo que saliera de la niebla no se parecería en nada a la América que la gente ama y odia. Sin embargo, la Unión de América ha demostrado lo contrario.\n\nEl presidente de los Estados Unidos anunció que todos los territorios en manos de \"elementos antisociales\" han sido pacificados y recuperados por el Gobierno federal. La Norteamérica de hoy ha evolucionado hacia una bestia diferente, con un firme control sobre su propio destino, mientras los susurros en las sombras hablan de una camarilla de expertos detrás del presidente que busca restablecer a los Estados Unidos como la policía mundial. Estas acusaciones son descartadas como teorías de conspiración.\n\nNo se sabe mucho sobre las políticas internas de los Estados Unidos debido a que la Am-Net asegura que las sondas extranjeras son casi imposibles, pero las historias de confinamientos permanentes, el aumento de la represión contra los disidentes y la vigilancia constante de la población estadounidense han traído de vuelta una sensación que el mundo no sentía desde la era Bush. Los informes de la influencia estadounidense tratando de volver a infiltrarse en las esferas de influencia regionales se han convertido en un motivo de preocupación para las potencias globales, ya que parecería que los Estados Unidos de América están lejos de estar muertos."
 nss.3.a: "El águila calva vuelve a sobrevolar el mundo."
 nss.4.t: "Desde el asiento trasero"
 nss.4.d: "La Oficina Oval dejó de tener un ambiente hogareño desde hacía algún tiempo. Después de que William J. Burns adoptara una postura más proactiva en torno al presidente, la Casa Blanca ya no se sentía como un hogar. Biden recuerda las reuniones que tuvo con todo tipo de personas de todo el mundo; algunas eran ruidosas, mientras que otras eran tranquilas. A sus ojos, ni una sola persona era aburrida y cada una demostraba ser un nuevo desafío a superar. Vio cómo se trasladaba todo tipo de equipo médico a la Oficina Oval, pero no estaba muy seguro de por qué.\n\nRecuerda los chistes que se hacían en los pasillos, los momentos de tensión durante una crisis. Si tan solo fuera más joven, pensó. El país se habría unido en un año, y él habría obtenido carta blanca para limpiar el sistema. Vio a Burns entrar en la Oficina Oval mientras él hacía una llamada telefónica, mencionando puestos de control y algo relacionado con Blackrock. Esa compañía siempre desentonaba.\n\nBiden quiso llamarlo, hacer un gesto con la mano. Pero no pudo. Joe Biden recuerda ahora que su salud estaba en rápido declive, y en algún momento, su cuerpo simplemente se bloqueó; su mente seguía ahí, pero su cuerpo se negaba a cooperar.\n\nUn momento de pavor se apoderó de él al darse cuenta de lo que estaba pasando. Burns le lanzó una mirada despectiva mientras llamaba a una de las enfermeras, haciendo un gesto para aumentar algo. Biden no pudo escucharlo bien.\n\nLa enfermera le dedicó al presidente una mirada de compasión mientras manipulaba algo detrás de su silla. Una sensación de alivio lo invadió; todos los miedos y ansiedades se desvanecieron como cera."
 nss.4.a: "Una batería para la máquina."
 nss.5.t: "Acta de Seguridad de la Salud Pública"
 nss.5.d: "El Acta de Seguridad de la Salud Pública está a punto de transformar las restricciones de la era pandémica en un marco permanente de seguridad biológica. Desarrollada con compañías farmacéuticas y los CDC, crea \"AmeriCare\", un sistema nacional de atención médica universal que reemplaza la cobertura existente con un modelo de seguro privado obligatorio respaldado por la regulación gubernamental y garantías financieras, creando un mercado cautivo para productos farmacéuticos con costos subsidiados por los contribuyentes.\n\nLa letra pequeña del Acta revela su verdadera naturaleza: un sistema de vacunación obligatorio que requiere que los ciudadanos se sometan a vacunas y refuerzos periódicos para enfermedades conocidas y emergentes, según lo determine un comité de los CDC y farmacéutico. Dentro de estas vacunas se incluirían microchips diseñados para almacenar y comunicar registros de salud y datos personales.\n\nEl incumplimiento del mandato de vacunación y seguimiento llevaría a la denegación de servicios esenciales -acceso a AmeriCare, viajes, trabajo o estudio-, haciendo que la participación social sea casi imposible. Esto es aplicado por los CDC a través de la recién creada \"Agencia de Seguridad Sanitaria\" (HSA), encargada de monitorear el cumplimiento de la vacunación y rastrear a los no vacunados o infectados.\n\nPúblicamente, el Acta se presenta como una medida para prevenir otra pandemia y asegurar que América lidere en innovación sanitaria. En la práctica, solidifica el control a través de mandatos de salud y vigilancia, garantizando ganancias farmacéuticas mediante la demanda impuesta por el gobierno. Esto convierte la atención médica -un derecho humano básico- en un privilegio condicional y una herramienta de control poblacional.\n\nUn intenso cabildeo por parte de intereses farmacéuticos logró que la legislación fuera aprobada por el Congreso con un debate mínimo. La implementación comenzará inmediatamente después de la aprobación del director Burns mediante autopen en nombre del presidente, eludiendo las ceremonias estándar debido a la urgencia. Los críticos señalan que la vigilancia del Acta excede la de los estados autoritarios, pero la resistencia pública sigue siendo mínima debido a los mensajes mediáticos sostenidos sobre amenazas biológicas y beneficios de la atención médica, así como a la etiqueta de extremista y conspirativa que se le da a la oposición al Acta.\n\nEl Acta de Seguridad de la Salud Pública establece la base tecnológica y legal para la próxima fase de gestión poblacional, creando sin problemas un nuevo paradigma de gobierno público-privado en nombre de la seguridad sanitaria."
 nss.5.a: "Detén la propagación."
 nss.6.t: "Garantizar nuestra seguridad"
 nss.6.d: "Mis compatriotas americanos,\n\nEspero que el discurso de esta noche los encuentre bien y seguros en sus hogares. En el vasto tapiz que es la historia de América, no ha habido un momento más incierto y peligroso que el actual. Esto concierne especialmente a la generación joven que puede ser fácilmente expuesta a material malicioso, extremista o de otras formas abusivo. Mi administración ha desatado una plétora de acciones para remediar esto, y nuestros esfuerzos colectivos han culminado en la formulación del Acta de Seguridad Infantil, de la cual estoy aquí para hablarles.\n\nEn primer lugar, el Acta de Seguridad Infantil se esfuerza por establecer regulaciones destinadas a garantizar un acceso seguro a internet para cada ciudadano, pero lo más importante, para la juventud. Esto implica una vigilancia exhaustiva de individuos sospechosos y de ciertos sitios web que requerirán su identificación para acceder.\nEn segundo lugar, exigirá el establecimiento de un registro para llevar un seguimiento de dichos individuos y sitios web.\nY finalmente, todos los recursos y derechos necesarios serán otorgados a nuestros agentes de la ley para que tomen todas y cada una de las acciones necesarias para garantizar la seguridad pública e individual.\n\nEsta ley simboliza todo aquello por lo que hemos estado trabajando como nación. Esto no es solo un gran paso adelante, sino también un testimonio de nuestra democracia. Espero que el Acta de Seguridad Infantil haga la vida de su familia más pacífica y tranquila."
 nss.6.a: "Dios los bendiga, y Dios bendiga a América."
 nss.7.t: "Con un solo ojo"
 nss.7.d: "William J. Burns no era de los que celebraban grandes ceremonias o festejos por operaciones exitosas, incluso si se trataba de algo tan significativo como salvar a la nación. El trabajo continúa como de costumbre, la paz global aún está lejos. Nunca hubo resentimiento hacia quienes causaban el desorden, no surgió de la nada, pero la incompetencia del Gobierno federal anterior ha demostrado lo que sucede si no se mantiene un control constante no solo sobre tu gente, sino también sobre el mundo.\n\nBurns recuerda sus días como diplomático en China y Rusia, una vez más no guardaba resentimiento hacia estas naciones y su gente. Vio la creciente inestabilidad causada por su ascenso debido a la ausencia de Estados Unidos. El animal que muerde no debe conservar sus afilados colmillos y Burns espera que con una pacificación adecuada en todo el mundo, la paz americana pueda ser revigorizada.\n\nImperio.\n\nUna palabra curiosa, en los viejos tiempos habría estado vestido de oro y seda, pero el poder que ostenta es mucho mayor que el que tendría un rey promedio. Sin embargo, no quiere un imperio ni sentarse en un trono, quiere asegurarse de que el mundo no se incinere a sí mismo en un futuro incierto. La paz americana puede tener sus defectos, pero su existencia trajo certeza y reglas que cumplir. Es algo por lo que vale la pena luchar.\n\nEl mundo está ardiendo y es hora de mostrarle al mundo que los Estados Unidos de América están lejos de estar muertos."
 nss.7.a: "Podemos ser morales, o podemos ser quienes mantengan la paz."
 nss.8.t: "Nacimiento"
 nss.8.d: "Si un polluelo no puede romper la cáscara de su huevo, morirá sin nacer.\n\nCon la crisis actual, se hizo evidente para el Gobierno en la sombra que mantener los sistemas de América tal como estaban era insostenible, y así el director de la CIA, William J. Burns, buscó establecer una nueva fuerza armada leal únicamente a los intereses de los securócratas, capaz de mantener el Orden donde los oficiales de las Fuerzas Armadas habían fallado tan catastróficamente. Mediante la expansión del Centro de Actividades Especiales (SAC), ostensiblemente la unidad clandestina de fuerzas especiales de la agencia, crearía algo parecido a una guardia pretoriana, una fuerza altamente leal capaz de imponer el cumplimiento al pueblo americano sin hacer preguntas.\n\nAunque el mandato oficial de la CIA era actuar externamente, este SAC expandido podría desplegarse dentro de las fronteras de América. Su tarea era doble: prevenir el descenso de la nación al Caos y la barbarie, y eliminar a cualquiera que se interpusiera en su camino, todo en nombre de mantener el Orden. A diferencia de las Fuerzas Armadas, no tendría ninguna de las limitaciones y la supervisión que conllevan las reglas de enfrentamiento, sirviendo en cambio como la espada del Estado profundo. Su personal no estaba sujeto a ninguna ley, salvo a su lealtad al Gobierno en la sombra y su misión. Si los hombres uniformados no obedecían, los operativos de la CIA ejecutarían la voluntad de los securócratas en su lugar.\n\nA pesar de las protestas del general Milley y del secretario de Defensa Austin, gran parte de su personal inicial para esta expansión se extraería directamente del Ejército de EE.UU., seleccionado de Brigadas que habían demostrado eficacia en la contrainsurgencia y lealtad política al Gobierno de Washington donde otros habían fallado. El vacío inmediato en el Ejército se llenaría posteriormente con reclutas y auxiliares de la Guardia Nacional, un gesto que algunos vieron como un debilitamiento deliberado de las Fuerzas Armadas en favor de la Comunidad de Inteligencia.\n\nLa ceremonia de bautizo de la primera de estas brigadas se llevó a cabo en D.C. por la noche, con el cielo negro como la brea. Miles de soldados permanecieron en silencio en una plaza, con los rifles al hombro y en posición de firmes, vestidos de pies a cabeza con multicam gris. Se llevó a cabo una quema ceremonial de sus anteriores parches del Ejército frente a una imponente hoguera, cuyas llamas iluminaban sus rostros en la oscuridad. En una plataforma elevada ante ellos se encontraba el propio director Burns, flanqueado por sus ayudantes y asesores. Las palabras finales de su discurso quedarían grabadas en la memoria de todos los presentes.\n\n\"A partir de hoy, ninguno de ustedes tiene nombres. Ninguno de ustedes tiene registros. Serán olvidados, pero sus acciones realizadas al servicio de los Estados Unidos serán recordadas para siempre. Son nuestro escudo contra la oscuridad..."
 nss.8.a: "...Son la luz del Orden contra el Caos\"."
 nss.9.t: "Mañana en América"
 nss.9.d: "En toda América, la gente va al trabajo, a la escuela, a la iglesia y sigue con su día. Las calles están limpias, la economía prospera y los edificios están reparados, tal como lo estuvieron una vez.\n\nPoco a poco, las cicatrices y los recuerdos de la Segunda Guerra Civil Americana desaparecen, y el país parece superar el devastador conflicto. Los recuerdos, la ira, el dolor y el odio que iniciaron el conflicto en primer lugar disminuyen lentamente ante el nuevo consenso, y con cada sorbo de agua, con cada vacuna y con cada señal de los traidores borrada, la gente se acerca a olvidar por qué albergaba tanto resentimiento en primer lugar. Es más fácil olvidar el dolor que aferrarse al rencor que pudo haber causado el daño. Un nuevo comienzo siempre es mejor, incluso si significa olvidar el pasado para alcanzar un futuro más brillante.\n\nLa televisión ofrece informes tranquilos y estériles del mundo entre anuncios de productos y deportes. El público consume sus medios como consume todo lo demás, sin cuestionar. El mundo es un paquete bonito y ordenado, con cada cabo suelto atado y cada problema resuelto. Es lo mismo, siempre es lo mismo. Todos los días. Es fácil. Es correcto. Es... perfecto. Nadie se queja, porque han olvidado cómo quejarse. La ley es la ley, y nadie está exento.\n\nLa gente es, después de todo, criatura de hábitos. Encuentran consuelo en sus propios hábitos y en sus propias formas de vida. El mundo que los rodea puede ser un lugar grande y aterrador, pero si tienen su rutina matutina, sus hábitos diarios y sus patrones familiares, pueden encontrar un pequeño consuelo en un mundo caótico e incierto.\n\nLos Cognoscenti les han dado esto. No pide su gratitud; los segurócratas, los financieros, las élites entienden que esta tarea es ingrata, y la continuación del Orden es su propia recompensa.\n\nEn Nueva York, el país observa con tensa anticipación. Aunque los constantes rediseños, las dificultades para encontrar inquilinos y la guerra civil han retrasado los esfuerzos de reconstrucción durante los últimos veinte años, la finalización del complejo reconstruido del World Trade Center marca el cierre de una herida profunda y el comienzo de un nuevo capítulo en la historia americana. El corazón palpitante de la hegemonía estadounidense, de las finanzas globales, está completo de nuevo.\n\nLos fuegos artificiales estallan en el cielo, y mientras una nación celebra, la pesadilla de las últimas dos décadas se desvanece lentamente en la incierta neblina de la memoria. El Orden ha prevalecido sobre el Caos."
 nss.9.a: "Es de nuevo la mañana en América."
 nss.10.t: "Cruelty Squad"
 nss.10.d: "Con América ya sumida en una Guerra Civil, el ataque terrorista en D.C. había sido nada menos que paralizante para el Gobierno de Washington, que ya tenía que lidiar con el colapso total de la ley y el Orden a lo largo de la Costa Este. El presidente Biden apenas había escapado con vida y había decidido permanecer en el Centro Presidencial de Operaciones de Emergencia, mientras todas las señales apuntaban a otra ronda de terrorismo neonazi. Con esa justificación, las agencias de tres letras habían salido a las calles en una represión sistémica nunca antes vista en la historia americana. En tiempos de guerra total, no había tiempo para sutilezas.\n\n\"Caballeros, estamos a punto de ser lanzados en medio del infierno\", dijo el líder del escuadrón, \"Nuestra misión: liquidar a todos los hostiles, incluidos aquellos no afiliados a Atomwaffen. No hay reglas de enfrentamiento para esta misión. Las órdenes vienen de arriba: no dejen testigos\".\n\nA bordo de una furgoneta blindada, el equipo de asalto SAC de la CIA inspeccionó sus armas de fuego, cargadas con munición perforante. Algunos rezagados habían tomado un complejo de apartamentos y rehenes, entre ellos un HVT (objetivo de alto valor) que era un líder de la División Atomwaffen. Debido al secretismo de la organización, el riesgo de que los terroristas se mezclaran con la población y que el HVT fuera considerado un \"cabo suelto\" que \"sabía demasiado\" según el informe, se había decidido que el equipo SAC se aseguraría de que no quedaran cabos sueltos."
 nss.10.a: "§g>>>Siguiente página...§!"
 nss.11.t: "La noche larga"
 nss.11.d: "Mientras el gas se disipaba, el equipo de asalto derribó las puertas de Nassau Hall, vestidos con equipo MOPP IV. Los cuerpos de estudiantes y terroristas neonazis yacían esparcidos por el suelo, con los cuerpos contorsionados de forma antinatural, las expresiones fijadas en un horror eterno. Habían llegado órdenes de encargarse de Earl Turner, uno de los muchos líderes neonazis que habían huido de D.C. tras los ataques. Se había instalado en la Universidad de Princeton, tomando Nassau Hall y usando a los estudiantes y profesores como escudos humanos.\n\nNo esperaban que el SAC bombeara el edificio con gas sarín. Se suponía que eran los buenos, ¿no? Las reglas de enfrentamiento habían cambiado, y con ello, las tácticas de los cobardes que dependían de la debilidad del Gobierno se habían vuelto lamentablemente obsoletas. No habría negociaciones, y cualquier daño colateral sería manejado por el departamento de desinformación de la CIA. En lo que respecta al público, toda esta tragedia había sido obra de los terroristas neonazis, y el equipo de asalto había sido enviado para rescatar a los pobres e indefensos estudiantes y personal.\n\n\"Equipo de entrada, aquí TOC. Confirmen la eliminación de todos los hostiles. El equipo de limpieza está en camino para asegurar el perímetro. Cambio\".\n\n\"Recibido, corto\". dijo el líder del equipo.\n\nCon el resto de los estudiantes y profesores muertos, los operativos de la CIA comenzaron a recorrer sistemáticamente los pasillos. Incluso aquellos que habían traído máscaras de gas no se salvaron del potente agente nervioso, que había permeado su piel y los había matado de igual manera. Era solo cuestión de tiempo antes de que encontraran a Turner. El hombre ya estaba muerto, habiéndose asfixiado con su propio vómito y fluidos corporales. Era una muerte apropiada para un hombre como él, pensó el líder del equipo.\n\n\"Objetivo muerto en combate\", informó de vuelta al TOC. \"Equipo de limpieza, procedan según lo planeado\".\n\n\"Recibido, equipo de entrada\", dijo el líder del equipo de limpieza. \"Los tenemos en la mira. Comenzando la operación ahora\".\n\nFuera del edificio, operativos de la CIA con trajes de materiales peligrosos ya se preparaban para entrar. Ya se estaba estableciendo un cordón alrededor del edificio, y la narrativa oficial ya comenzaba a circular. El equipo de asalto dio media vuelta y salió del edificio, pasando junto a los operativos de materiales peligrosos, que ya estaban ocupados retirando cuerpos y comenzando el procedimiento de descontaminación. Con el equipo de limpieza a cargo, su trabajo aquí había terminado."
 nss.11.a: "La naturaleza de la guerra ha cambiado."
 nss.12.t: "Redada al complejo de Sutter"
 nss.12.d: "Resumen:\nTras el colapso de la División Atomwaffen, la mayoría de sus líderes fueron arrestados o neutralizados. Sin embargo, Joshua Caleb Sutter, anteriormente evaluado como afiliado y contacto pasado del Templo de la Sangre, eludió la justicia convencional.\n\nAntecedentes: La recopilación de inteligencia indicó que Sutter, acompañado por un pequeño grupo de adeptos al culto, había establecido un complejo fortificado en la región de los Apalaches. En respuesta, se desplegó un elemento especializado del SAC con órdenes directas de neutralizar o capturar a Sutter. Las reglas de enfrentamiento permitieron una acción sin restricciones contra sus leales.\n\nOperación:\nDespués de aproximadamente cuarenta y cinco minutos de contacto sostenido, doce elementos hostiles fueron neutralizados. Sutter fue aislado con éxito; intentó suicidarse pero fue sometido y puesto bajo custodia sin fatalidades.\n\nHallazgos:\nLa limpieza del complejo posterior a la operación reveló una extensa evidencia de violaciones de derechos humanos, incluyendo restos humanos que mostraban signos de abuso prolongado, tortura y mutilación experimental. Múltiples exhibiciones visuales (fotografías y pinturas rudimentarias) documentaron atrocidades cometidas en antiguas áreas controladas por Atomwaffen. Además, se recuperó un arsenal, que abarcaba desde armas pequeñas hasta sistemas de armas no convencionales, incluyendo dispositivos de dispersión radiológica (\"bombas sucias\") y agentes químicos.\n\nEvaluación:\nA pesar del éxito de la misión, los informes posteriores revelaron un agudo malestar psicológico entre el personal del SAC. Un operativo intentó un contacto no autorizado con la familia de una víctima fallecida identificada en el lugar. Se recomienda encarecidamente un monitoreo psiquiátrico continuo y asignaciones de servicio restringidas para mantener la efectividad operativa.\n\nConclusión:\nCon el desmantelamiento de este último bastión de Atomwaffen y la captura de Joshua Caleb Sutter, la operación se evalúa formalmente como exitosa. Los elementos ideológicos residuales siguen siendo una posible preocupación de seguridad, pero la estructura de liderazgo central ha sido efectivamente neutralizada.\n\nFIN DEL INFORME"
 nss.12.a: "Lo tenemos vivo."
 nss.13.t: "La araña"
 nss.13.d: "Tras la redada al complejo Sutter, el sujeto Joshua Caleb Sutter fue detenido y trasladado a una instalación clandestina cercana. Se inició un proceso de interrogatorio intensivo, que duró varias semanas.\n\nObjetivo principal: Obtener inteligencia sobre la existencia y estructura de las células de Atomwaffen, grupos escindidos afiliados y otras organizaciones insurgentes nacionales, incluyendo, entre otras, el Frente Patriota y el Ejercito Popular de Liberación Americano. Se hizo hincapié en la práctica establecida del Templo de la Sangre de infiltrar operativos en grupos externos para obtener información operativa.\n\nObjetivo secundario: Identificar posibles arsenales de armas y material que pudieran emplearse en acciones coordinadas destinadas a desestabilizar el orden público dentro de la Unión.\n\nMétodos: Se emplearon protocolos de interrogatorio mejorados autorizados, incluyendo privación del sueño, manipulación sensorial controlada (habitación blanca), \"walling\" y posiciones de estrés, entre otras medidas. Estas técnicas produjeron una tensión psicológica significativa en el sujeto. Después de un evento de colapso, Sutter proporcionó inteligencia procesable. Tras la finalización del ciclo de interrogatorio, el sujeto fue eliminado.\n\nResultado: La inteligencia obtenida ha sido evaluada como de alto valor. Los datos recopilados han ampliado la lista de personas de interés (P.O.I.) y han proporcionado pistas críticas para una mayor penetración en redes hostiles."
 nss.13.a: "El primer dominó cae."
 nss.14.t: "La caza"
 nss.14.d: "Recuperar el control del volante conlleva su propia cuota de responsabilidades; los errores cometidos antes inevitablemente surgirían y amenazarían la seguridad nacional.\n\nLa mascarada es un velo de normalidad para el pueblo estadounidense, haciéndoles creer que todo sigue como de costumbre, mientras trabajamos arduamente para asegurar que ningún daño llegue a nuestra nación. Algunos objetarían nuestros métodos debido a preocupaciones éticas. Sin embargo, nadie discutió que no fueran efectivos.\n\nDesafortunadamente, tenemos mucho que limpiar. Antes de la Guerra Civil, dejamos bastantes cabos sueltos. Informantes que nos proporcionaron inteligencia, agitadores que dividieron a los disidentes y personal antiguo leal a nuestra causa están experimentando una crisis moral. Estos no son más que contratiempos temporales.\nSin embargo, debe señalarse que estos cabos sueltos deben atarse lo antes posible para que no amenacen con perforar el velo y exponer la mascarada al público, dejando a nuestra gran nación en el Caos.\n\nLlevará años restaurar completamente el Orden en los Estados Unidos, pero si logramos amputar a los actores antisociales más apremiantes, esta restauración no tendrá obstáculos."
 nss.14.a: "Manos a la obra."
 nss.15.t: "Gambito de Judas"
 nss.15.d: "El ambiente dentro del Gobierno federal ha cambiado, la gente se mira con más recelo, los informes de fondos, personal e inteligencia desaparecidos han causado un aire de ansiedad dentro del sistema.\n\nLas tendencias actuales indican una alta probabilidad de un potencial traidor entre nosotros; uno que ha adquirido suficiente experiencia y conexiones dentro del sistema para evitar ser detectado. Sus objetivos son desconocidos, pero considerando la repentina ausencia de recursos, es probable que el individuo potencial en cuestión esté sufriendo una crisis moral que ha nublado su juicio y busca causar una disrupción social al dar a conocer nuestra agenda al público.\n\nLas posibilidades de que el individuo sea consciente de nuestra conciencia son extremadamente altas y se recomienda vigilancia. A pesar de la experiencia del individuo en navegar por el sistema, es probable que haya dejado rastros que podrían llevar a la exposición de su identidad.\n\nNo queda mucho tiempo, cuanto más tiempo pueda operar el individuo, mayor será el riesgo potencial para la seguridad nacional. Como cualquier cuerpo infestado de parásitos, debemos mirar hacia adentro y hacer cortes decisivos para erradicar a este Judas."
 nss.15.a: "Nos vemos en el fuego."
 nss.16.t: "Emboscada a Hinkle"
 nss.16.d: "Sujeto: Jackson Hinkle\nAfiliación: Ejército Popular de Liberación Americano (EPLA)\nEstado: Neutralizado\n\nResumen:\nJackson Hinkle, una figura importante dentro del EPLA, ha sido identificado como una amenaza persistente para la seguridad nacional. El sujeto cooperó previamente con operativos encubiertos en capacidades limitadas, incluyendo esfuerzos para fragmentar facciones extremistas de izquierda y facilitar la detención de individuos seleccionados. La cooperación cesó a medida que Hinkle se alineó cada vez más con elementos radicales del EPLA, impulsado tanto por el extremismo organizacional como por el oportunismo personal. Tras el colapso del EPLA, el paradero de Hinkle permaneció desconocido hasta que los informes de actividad jacobina sugirieron una renovada implicación. La integración del sujeto en los círculos jacobinos, combinada con su influencia social y acceso a redes de élite, elevó su perfil como un riesgo significativo para la seguridad de la información.\n\nNotas operacionales:\nHinkle mostró un patrón consistente de abandono de sus deberes bajo amenaza directa a medida que la presión sostenida sobre las actividades jacobinas lo obligó a adoptar una postura defensiva. El sujeto buscó refugio político en la República Popular China y con esa información se permitió la utilización de informantes infiltrados, los operativos organizaron un punto de extracción falso en California. Hinkle fue abordado con una presencia de seguridad mínima y fue aprehendido sin resistencia.\n\nInterrogatorio:\nHinkle fue retenido durante un período de cinco días durante los cuales se aplicaron protocolos de interrogatorio mejorados. El sujeto exhibió una grave angustia psicológica y finalmente proporcionó inteligencia procesable, incluyendo la identificación de las células restantes del EPLA que operan a nivel nacional, información sobre los vínculos EPLA-China y los canales de apoyo logístico.\n\nDisposición:\nAl determinar que el sujeto ya no poseía inteligencia explotable adicional, Hinkle fue neutralizado. Se recomienda difundir inteligencia controlada sobre el intento de fuga de Hinkle a la República Popular China a los elementos restantes del EPLA para socavar la cohesión interna y continuar monitoreando la actividad jacobina para una posible resurgencia de operativos alineados con el EPLA."
 nss.16.a: "La operación se considera un éxito."
 nss.17.t: "Redada en la guarida hacker de Brown"
 nss.17.d: "Sujeto: Barrett Brown.\nAfiliación: Redes anarquistas insurreccionales.\nEstado: Neutralizado.\n\nResumen:\nBarrett Brown, anteriormente asociado con grupos anarquistas insurreccionales en el noroeste del Pacífico, ha evadido constantemente la aprehensión y ha representado un riesgo persistente para la contrainteligencia. El sujeto participó en repetidas violaciones de bancos de datos clasificados e intentó la difusión de material sensible a través de la web abierta. La participación previa de Brown con Anonymous, antes de que adquiriéramos su infraestructura cultural, le proporcionó un alto nivel de disciplina en seguridad operativa.\n\nPosteriormente, Brown asumió el papel de figura principal en la formación de múltiples colectivos de hackers, lo que provocó la escalada de tareas para localizar, desarticular y desmantelar sus operaciones. La huella digital del sujeto fue rastreada a través de servidores proxy, lo que llevó a la confirmación de su presencia en un sector urbano de bajos ingresos. Una unidad táctica realizó un barrido de un complejo de apartamentos identificado mientras el sujeto era localizado y aprehendido, aunque hirió mortalmente a un operativo con un arma de fuego antes de su captura. Inmediatamente después de su detención, se activó un interruptor de hombre muerto preprogramado, lo que resultó en una fuga significativa de datos de material clasificado a través de múltiples plataformas.\n\nInterrogatorio:\nBrown fue sometido a protocolos de interrogatorio mejorados durante un período de aproximadamente diez días. La inteligencia resultante incluyó la identificación de colectivos de hackers activos que operan a nivel nacional, así como detalles sobre sus canales de comunicación, membresía y metodologías operativas. Una vez determinado que el sujeto no poseía más inteligencia procesable, Brown fue neutralizado.\n\nEvaluación:\nAunque el interruptor de hombre muerto del sujeto precipitó una brecha de seguridad inmediata, la posterior explotación de las redes de inteligencia compensó significativamente el daño operativo. Los objetivos de la misión, incluyendo la captura, el interrogatorio y la neutralización, fueron logrados."
 nss.17.a: "La operación se considera un éxito."
 nss.18.t: "Neutralización de la insurgencia de Flynn"
 nss.18.d: "Sujeto: Michael Thomas Flynn.\nAfiliación: Leal a Trump.\nEstado: Neutralizado.\n\nResumen:\nMichael Thomas Flynn, teniente general retirado del Ejército de EE.UU., participó en actividades traidoras tras el colapso del Gobierno Constitucional Americano (GCA). A pesar de la limpieza de los últimos bastiones alineados con Trump, los informes de incursiones insurgentes y sabotajes en curso en sectores rurales mostraron tácticas coordinadas indicativas de un liderazgo militar formal. La investigación posterior confirmó el papel continuo de Flynn en la organización de la resistencia contra la reintegración federal. Los activos ISR, incluido el reconocimiento con drones, identificaron patrones persistentes de movimiento insurgente. Se aplicó presión contrainsurgente a las familias de los operativos conocidos. Se reforzaron las capacidades defensivas de los puestos avanzados y los sitios negros, lo que resultó en la retirada gradual de las fuerzas de Flynn.\n\nSe descubrió un campamento oculto dentro de un sector boscoso remoto, evaluado como un punto de partida para una ofensiva a gran escala. El despliegue consistió en múltiples elementos SAC con apoyo militar convencional limitado. Las reglas de enfrentamiento (ROE) autorizaron el uso de fuerza letal contra el personal armado.\n\nEnfrentamiento:\nLa incursión duró aproximadamente una hora, todas las estructuras de la base fueron despejadas sistemáticamente y cualquier combatiente armado neutralizado; el personal desarmado fue detenido. Flynn fue localizado en el lugar; se resistió a la rendición. El sujeto fue incapacitado por disparos no letales en la pierna y el hombro derechos y posteriormente puesto bajo custodia. 5 operativos SAC murieron en combate. El sujeto fue sometido a interrogatorios mejorados durante tres semanas. Las técnicas incluyeron la retención de tratamiento médico, la aplicación de presión psicológica sobre los miembros de la familia y la privación prolongada del sueño. Flynn finalmente reveló inteligencia procesable, como la identificación de grupos insurgentes leales a Trump sobrevivientes y la confirmación de una extensa red de túneles en los Apalaches utilizada para logística y ocultamiento.\n\nConclusión:\nDespués de determinar que el sujeto había agotado toda la inteligencia procesable, Flynn fue neutralizado. Se recomienda modificar retroactivamente su historial militar con una baja deshonrosa para asegurar su clasificación histórica como traidor.\nA pesar de la pérdida de personal SAC, la operación se evalúa como exitosa. La inteligencia obtenida mejora significativamente las capacidades de monitoreo y proyección de fuerza en la región de los Apalaches."
 nss.18.a: "Sigamos adelante."
 nss.19.t: "Neutralización de Angela Davis"
 nss.19.d: "Sujeto: Angela Yvonne Davis\nAfiliación: Ejército Popular de Liberación Americano (EPLA) / Ejército de Liberación Negro (ELN)\nEstado: Neutralizada\n\nResumen:\nAngela Yvonne Davis, una persona de interés para la Comunidad de Inteligencia desde hace mucho tiempo, pasó de un papel clave dentro del Partido Pantera Negra a un liderazgo dentro del Ejército Popular de Liberación Americano. Tras el colapso del EPLA, Davis estableció conexiones con milicias vinculadas al ELN y se incrustó en comunidades urbanas predominantemente afroamericanas, utilizando su lealtad y redes de protección para evadir la detección federal. La recopilación de inteligencia se vio obstaculizada por el apoyo de la comunidad y las estructuras de protección del ELN. Penetración lograda mediante la aplicación selectiva de incentivos materiales y presión sobre los representantes locales.\n\nResultado: Identificación positiva de la ubicación del refugio del sujeto. Despliegue de 12 operativos del SAC apoyados por la policía federal para asegurar el perímetro e iniciar el cierre del vecindario circundante. La duración de la redada fue de aproximadamente 30 minutos. El sujeto intentó evadir la captura junto con el personal de seguridad; sufrió una herida de bala no letal en la espalda y fue puesto bajo custodia. El sujeto fue sometido a protocolos de interrogatorio mejorados durante un período de tres semanas.\n\nResultado:\nDivulgación de estructuras celulares residuales del EPLA y ELN. Identificación de lazos extranjeros, incluidas redes de apoyo vinculadas a Irán y la República Popular China.\n\nDeterminación: El sujeto había agotado toda la inteligencia procesable. Al concluir el ciclo de interrogatorio, Davis fue neutralizada.\n\nEvaluación:\nLa captura y posterior neutralización del sujeto produjeron inteligencia procesable; sin embargo, los efectos secundarios han incluido una mayor volatilidad en los centros urbanos afroamericanos, con un aumento en la frecuencia de la actividad militante descentralizada. Se recomienda expandir la presencia del SAC en las zonas de alto riesgo identificadas y aumentar la vigilancia y la penetración comunitaria para mitigar las amenazas emergentes."
 nss.19.a: "La misión se considera un éxito."
 nss.20.t: "Intercepción de Rinaldo Nazarro"
 nss.20.d: "Sujeto: Rinaldo Nazarro\nAfiliación: La Base (red separatista blanca / neonazi)\nÁrea de operaciones: Pacífico Noroeste\nEstado: Neutralizado (fallecido)\n\nResumen:\nRinaldo Nazarro, miembro fundador de La Base, fue uno de los principales organizadores de la violencia separatista blanca descentralizada en el Pacífico Noroeste tras el colapso de la autoridad de Cascadia. La Base adoptó un modelo descentralizado para maximizar la resistencia a las autoridades federales, empleando tácticas violentas que generaron daños significativos a la infraestructura crítica y a los activos de las fuerzas del orden. Dado el impacto operacional sostenido del grupo, se consideró necesaria la eliminación de Nazarro del campo de batalla para restaurar la estabilidad regional. Las fuentes incluyen informes obtenidos de antiguas redes adversarias, desertores e informantes infiltrados.\n\nSe mapearon múltiples células de La Base en toda la región; la evidencia corroborada indicó indicadores de apoyo extranjero en operaciones posteriores. Se ordenó a los elementos del SAC que llevaran a cabo ataques deliberados y secuenciales contra las células identificadas para degradar sistemáticamente la capacidad operativa de La Base.\n\nEjecución:\nSe ejecutaron acciones cinéticas coordinadas contra los puestos avanzados de las células. La resistencia varió según el enfrentamiento; la intensidad aumentó al acercarse a las estructuras asociadas con el liderazgo de nivel superior. Durante la operación final, se identificó la posición de Nazarro y se despejó el complejo. Se empleó gas lacrimógeno para incapacitar al sujeto; Nazarro fue puesto bajo custodia. Los actores hostiles restantes fueron neutralizados durante la acción.\n\nEl sujeto fue trasladado a una instalación de interrogatorio para su explotación. Nazarro murió durante un período de interrogatorio de dos semanas. La explotación post-mortem de los materiales recuperados en el último puesto avanzado reveló equipo de origen ruso y evidencia documental que sugería una posible vía de exfiltración a la Federación de Rusia. Si bien los vínculos directos de inteligencia humana siguen bajo investigación, el rastro material y documental indica un vector plausible de apoyo extranjero.\n\nConclusión:\nLa campaña de ataques secuenciales degradó sustancialmente la capacidad de La Base para proyectar violencia organizada inmediata a gran escala. La evidencia recuperada respalda una sospecha razonable de facilitación extranjera; se requiere un trabajo de contrainteligencia adicional para aclarar el alcance y la intención de la participación externa."
 nss.20.a: "La misión se considera un éxito."
 nss.21.t: "Neutralización de Steven Nordhaus"
 nss.21.d: "Sujeto: Steven Nordhaus\nAfiliación: Exjefe de la Guardia Nacional / Líder insurgente\nÁrea de Operaciones: Sectores rurales del Medio Oeste\nEstado: Neutralizado (fallecido)\n\nResumen:\nSteven Nordhaus, exjefe de la Guardia Nacional, renunció a la autoridad federal y organizó una insurgencia sostenida en el cinturón rural del Medio Oeste. Aprovechando su experiencia de mando previa y el acceso a personal y material clasificado, Nordhaus llevó a cabo ataques coordinados contra infraestructuras, objetivos militares y repositorios de información sensible. También consolidó el apoyo entre milicias disidentes y simpatizantes locales bajo el objetivo declarado de \"Liberar a América de las garras de la tiranía\".\n\nLa eliminación de Nordhaus del campo de batalla se consideró esencial para restaurar el control y proteger los intereses de seguridad nacional. Nordhaus utilizó su conocimiento institucional para degradar la postura de la fuerza, coordinar ataques asimétricos y explotar datos sensibles. Los informes indicaron un creciente alistamiento de disidentes a su causa y la ocupación de nodos rurales clave. La actividad continuada amenazaba tanto la continuidad de las operaciones gubernamentales como la estabilidad regional; la fractura de la autoridad federal aumentó el riesgo operacional planteado por los elementos alineados con Nordhaus.\n\nEjecución:\nMúltiples divisiones del SAC, en coordinación con activos militares convencionales y de aplicación de la ley, llevaron a cabo una campaña de aislamiento por fases. La vigilancia persistente y la presión selectiva restringieron la libertad de movimiento de Nordhaus y redujeron la cohesión de su mando. El contacto final se estableció tras operaciones cinéticas e ISR (inteligencia, vigilancia, reconocimiento) combinadas. El vehículo del sujeto fue inhabilitado por un ataque de precisión; la investigación posterior confirmó la neutralización del sujeto.\n\nConclusión:\nLa explotación posterior al enfrentamiento de los materiales recuperados está en curso. La evaluación inicial indica que la insurgencia se fragmentará en luchas internas localizadas, reduciendo su capacidad para acciones organizadas a gran escala. Se recomienda llevar a cabo una auditoría de personal interna para identificar posibles simpatizantes dentro de las fuerzas federales y mitigar el riesgo de amenazas internas."
 nss.21.a: "Misión cumplida."
 nss.22.t: "Bosque oscuro"
 nss.22.d: "\"¿Eso es todo?\", preguntó Burns a su ayudante, mirándola desde el otro lado del escritorio. \"Todo lo que se ha enviado, sí\", respondió ella, sin mirarlo directamente a los ojos.\n\nÉl suspiró y hojeó más expedientes, asimilando los detalles de cada archivo.\n\nInforme tras informe, archivo tras archivo, el resultado era el mismo. El director ni siquiera había tomado su café matutino todavía, y ya le dolía la cabeza. El trabajo de consolidar el poder en los Estados Unidos había sido incansable, y requería un gran sacrificio, tanto de él como de sus subordinados. Era un deber ingrato, pero necesario.\n\n\"Gracias. Los revisaré ahora\" dijo, despidiendo a la mujer con un ademán.\n\n\"Sí, señor\", respondió ella, girando sobre sus talones y saliendo de la habitación con un rápido clic del cerrojo.\n\nBurns se volvió para mirar por la ventana y hacia el patio de abajo, respirando profundamente el aire fresco de la mañana. A lo lejos, pudo ver a algunos madrugadores deambulando. El mundo fuera de Langley parecía tranquilo y sereno, un marcado contraste con la intriga y el subterfugio que se gestaban justo debajo de la superficie de la vida cotidiana.\n\nSi tan solo una fracción de sus acciones se revelara al público en general, los libros de historia los vilificarían como monstruos. Y tal vez eran monstruos, pero no había héroes en el mundo en el que vivían. Había cosas mucho más siniestras acechando en el bosque, más allá de la luz de la sociedad que habían reconstruido para el pueblo estadounidense, que empequeñecerían sus atrocidades si se les diera la oportunidad de salir a la luz. Él lo sabía mejor que la mayoría.\n\nAhora, con aquellos directamente involucrados en el ataque a D.C. o conscientes de la colusión de las agencias de inteligencia en él silenciados, el gobierno podría avanzar hacia el futuro. Al menos, así, su camino sería uno de Orden, y el pueblo estadounidense no sufriría los caprichos de sus propios impulsos básicos. La chusma, abandonada a su suerte, nunca podría construir un mundo mejor.\n\nLas cosas más allá de la hoguera habían sido contenidas, por un tiempo."
 nss.22.a: "Y por ahora, eso bastaría."
 nss.23.t: "Jungle Cruise"
 nss.23.d: "En algún momento, algo en Mark Tasso se había roto. Él solo había aniquilado la célula neonazi que le habían asignado vigilar, usando sus años de experiencia en asesinatos despiadados contra las personas que nominalmente estaban de su lado. También había matado a su contacto, desapareciendo del radar después. Mark nunca había tenido lealtad a nadie en Washington, solo a la Agencia y a su país como concepto y como hogar. Pero Langley y el resto de Washington estaban en connivencia con los terroristas, y la operación de bandera falsa en la que había participado había puesto en marcha la cadena de eventos que había permitido a la Agencia y sus cohortes tomar el poder en todo Estados Unidos. Ahora, solo podía vivir con la culpa de ser un hombre marcado. Ya no estaba atado, pero no podía volver a casa.\n\nLos primeros asesinos que enviaron habían sido devueltos en bolsas para cadáveres, desollados, eviscerados o simplemente desaparecidos. Los años de entrenamiento de Mark, así como su experiencia infiltrándose en los terroristas de extrema derecha que habían atacado D.C., lo habían familiarizado con una forma particular de brutalidad. Mark sabía que había algo roto en él. Tenía que haberlo, para que matara de la manera en que había aprendido. El Gobierno y sus servicios de inteligencia habían tomado a un adolescente de ojos brillantes con un corazón patriótico y lo habían convertido en un arma. Les había funcionado durante mucho tiempo, hasta que se había quebrado y roto su correa. Como un perro callejero, ahora se volvió contra sus antiguos amos y masacró a cualquiera que se cruzara en su camino. Habrían enviado a alguien como Mark tras Mark.\n\nPero él había estado solo. Un hombre con una mente rota y sin amigos no podía esperar derrocar al Gobierno, no en una guerra de desgaste. El equipo de asalto de la CIA SAC lo había acorralado en una vieja escuela, pero ellos habían caído directamente en su trampa, y él había luchado con ferocidad rabiosa. Sus rostros enmascarados y sus chalecos antibalas los habrían hecho parecer monstruos, si no fueran tan humanos. Al final, gritaron igual que los inocentes que Mark se había visto obligado a matar.\n\nDébilmente, salió cojeando del edificio, su forma herida bañada por el naranja del atardecer. Ahora estaba solo, el único hombre vivo en varias millas. Más de ellos vendrían, estaba seguro, y no estaba seguro de cuánto tiempo podría seguir adelante. Pero por ahora, podía descansar e intentar formular algún tipo de plan. No les daría la satisfacción de acabar con él. Cayendo sobre una rodilla, Mark se quitó el casco y lo arrojó a un lado, sintiendo un hilo de sangre correr por el corte sobre su ojo. Su visión se nubló por un segundo y él se sacudió. Ahora, si tan solo pudiera...\n\nDesde la línea de árboles, un destello de algo le llamó la atención. La mira de un rifle de francotirador, apuntando directamente a él. Apenas tuvo tiempo de registrar el pensamiento. Hubo un destello, un fuerte estruendo, y luego nada. El cuerpo de Mark Tasso se desplomó sobre el frío pavimento, y exhaló su último aliento."
 nss.23.a: "Su guerra finalmente ha terminado."
 nss.24.t: "Justicia sin rostro"
 nss.24.d: "El coronel John Maddox no entendía del todo por qué las cosas habían llegado a esto. Había aplicado lealmente las políticas de la administración Biden, asegurándose de que sus subordinados cumplieran con las directrices de mascarillas y vacunación; había asediado con entusiasmo ciudades enteras y se había asegurado de que ninguno de los leales al demagogo naranja escapara de sus garras. Y, hasta ahora, nunca había sido de los que decían lo que pensaban. Se había guardado sus opiniones para sí mismo, incluso cuando sabía que podrían estar en desacuerdo con la administración. Pero la guerra contra el terrorismo interno había traspasado los límites demasiado lejos.\n\nParecía que con cada semana que pasaba, las reglas de enfrentamiento se relajaban, y la magnitud de las cosas que se les permitía perpetrar contra sus compatriotas americanos se expandía. Ya no detenían sospechosos. Habían optado por simplemente dispararles, o quedarse de brazos cruzados mientras el Centro de Actividades Especiales de la CIA masacraba ciudades enteras consideradas \"adyacentes a extremistas\". Expresando en privado su insatisfacción a otro oficial, había apodado casualmente al SAC como la \"Guardia Republicana de Langley\", en alusión a los brutales pretorianos de Saddam Hussein. No sabía que su amigo era en realidad un informante de la CIA.\n\nNo podía distinguir los rostros de sus jueces detrás de sus máscaras, pero podía decir, incluso por el tono de sus voces amortiguadas, que se había ganado enemigos en Washington. Que el ejército se hubiera reducido a esto -completamente comprometido por las agencias de inteligencia- era un insulto en sí mismo.\n\n\"Coronel Maddox\", dijo el fiscal principal. No tenía idea de quién era el hombre, ya que no le habían dicho sus nombres. Ni siquiera habían dado su rango o su rama. Estaba seguro de que venían del mundo de la inteligencia, no de su Ejército. \"¿Sabe por qué está aquí?\""
 nss.24.a: "§g>>>Siguiente página...§!"
 nss.25.t: "Las actividades de Judas continúan"
 nss.25.d: "El presunto miembro del gabinete en la sombra ha sido purgado, el nuevo miembro a cargo del puesto ha sido puesto bajo estricto control con los poderes de la agencia significativamente restringidos.\n\nSin embargo, parece que el resultado deseado no se ha logrado. Todavía estamos viendo actividades sospechosas de Judas, e incluso más, Judas, viendo que estamos tratando de localizarlo, ha intensificado sus acciones para socavar a los Estados Unidos.\n\nDebemos recordar qué recursos aún tenemos y lanzar otro ataque contra la conspiración con el objetivo decisivo de decapitar al traidor."
 nss.25.a: "¡Mierda...!"
 nss.26.t: "Las actividades de Judas cesan"
 nss.26.d: "¡La investigación ha sido un éxito! El miembro del gabinete en la sombra recientemente arrestado fue confirmado innegablemente como el supuesto traidor dentro de las filas del Gobierno. Con la cabeza en nuestro bolsillo, todos los colaboradores de Judas ahora se están ocultando, sabiendo que la ira de la justicia es ahora inevitable.\n\nCon la patria asegurada, finalmente, nuestro país puede concentrarse en los objetivos mucho más importantes de restaurarse como una superpotencia global."
 nss.26.a: "El Orden es imparable."
 nss.27.t: "Desplataformado"
 nss.27.d: "¿Adónde fue ese hilo? Estaba aquí hace un segundo. Bueno, encontraré algo más de qué hablar, estoy seguro...\n\nVaya, cerraron el canal. Era un canal realmente bueno, además. Quizás lo reabran. Solo esperaremos y veremos, ¿eh?\n\nEste sitio ya no es tan divertido como solía ser. Quizás si nos esforzamos más, las cosas volverán a ser como antes. Tienen que mejorar.\n\n¿Se cayó el sitio? ¿Cómo puede un sitio simplemente caerse? Bueno, eso apesta. ¿Qué más hay?\n\n¿Se cayó el internet? Bueno, no hay mucho que se pueda hacer al respecto. Solo hay que esperar a que vuelva. Entonces las cosas volverán a estar bien.\n\nVaya, el internet ha estado caída mucho más tiempo de lo que esperaba. Supongo que debería salir y ver qué está pasando."
 nss.27.a: "Está haciendo un poco de frío afuera, ¿no?"
 nss.28.t: "Pravda"
 nss.28.d: "Hace una década, un trabajo en el Washington Post era nada menos que un sueño hecho realidad para Julia Ford. Se había graduado como la mejor de su clase en Columbia y había obtenido su título en periodismo y ciencias políticas, aplicando con entusiasmo esa habilidad para el comentario político a su puesto. Había llegado a la escena tras la victoria de Donald Trump en las elecciones presidenciales de 2016, un momento en que aparentemente toda la intelectualidad americana estaba movilizada y lista para resistir, y se había ganado una reputación de persistencia tenaz y comentarios agudos y críticos.\n\nCuando estalló la Segunda Guerra Civil Americana, Julia se había lanzado de cabeza al conflicto, apoyando la lucha de la administración Biden para restaurar la ley y el orden en un país al borde del colapso. En su mente, estaba tan segura de que Biden no solo salvaría el país, sino que lo reconstruiría mejor.\n\nNo podía entender dónde todo había empezado a desmoronarse. Tal vez había sido la arrolladora consolidación del poder que siguió al ataque terrorista en D.C., ya que la prensa de repente tuvo que lidiar con etiquetas de \"desinformación\" que les dificultaban publicar su trabajo. Las políticas de censura de la administración habían sido justificadas en cada paso, por supuesto. Todo periodista tenía el deber de informar solo los hechos tal como sucedían, no como uno quería que sucedieran. Ella lo había entendido, al principio.\n\nLuego, la guerra contra el \"terrorismo doméstico\" se intensificó, y la fe de Julia en el Gobierno fue sacudida por el trato brutal a disidentes y manifestantes. Uno por uno, colegas con los que había trabajado durante años se vieron tildados de \"agentes de desinformación\" o expuestos por vínculos con \"organizaciones antisociales\". Algunos desaparecieron, mientras que otros se vieron desacreditados y sin trabajo, en la lista negra de una administración que una vez habían apoyado en cada paso del camino. Julia sabía que había cometido un error el día que publicó un artículo de opinión cuestionando las políticas de la administración, pero no había pensado que irían tras ella. Después de todo lo que había hecho para apoyarlos, después de los innumerables artículos e historias que había publicado, ¿cómo podrían hacerlo?\n\nSin embargo, lo habían hecho. Un memorándum que detallaba sus supuestos lazos con teóricos de la conspiración y grupos terroristas de izquierda había sido presentado a sus empleadores, y en cuestión de semanas, su nombre era barro, su vida y carrera en ruinas. El propio departamento de verificación de hechos del Post había sido reutilizado para la revisión interna, y el mismo equipo de investigación que había ayudado a exponer la mala conducta de Trump ahora estaba investigando sus propios contactos y fuentes, tratando de probar que ella había conspirado con el enemigo.\n\nAhora, mientras miraba los cañones de las armas de hombres enmascarados que se negaban a identificarse, comprendió lo que había hecho mal. Había sido ella, todo el tiempo. Había sido una participante voluntaria en algo verdaderamente vil, fabricando el consentimiento para algo que ahora estaba mucho más allá del punto de no retorno."
 nss.28.a: "La muerte del cuarto poder."
 nss.29.t: "Evidencia obtenida"
 nss.29.d: "La reciente acción de nuestras fuerzas especiales tuvo sus resultados: hemos logrado obtener evidencia crítica que podría llevar al arresto del supuesto traidor dentro de las filas del gabinete en la sombra.\n\nSin embargo, aún debemos ejercer cautela al elegir un objetivo para purgar, ya que esta evidencia podría resultar insuficiente para una conclusión final. Deberíamos intentar encontrar más evidencia si es posible."
 nss.29.a: "Buen trabajo."
 nss.30.t: "Búsquedas sin resultados"
 nss.30.d: "La operación de investigación de nuestros equipos especiales no arrojó información útil o no fue concluyente. Debemos continuar nuestros esfuerzos para determinar al traidor, no sea que los Estados Unidos de América estén condenados.\n\nEl director Burns ya ha instruido a la CIA para que aumente el presupuesto en la sombra e intensifique nuestras acciones en todas las esferas del Gobierno y la sociedad. Por todos los medios, debemos tener éxito."
 nss.30.a: "Sigamos buscando."
 nss.31.t: "Amenaza nuclear revelada"
 nss.31.d: "Después de varios incidentes que parecen estar conectados entre sí y con la ayuda de varios investigadores, es probable que el disidente en cuestión busque dejar a los Estados Unidos de América en una mala posición ante el resto del mundo.\n\nLos medios para lograrlo eran muy especulados, pero después del asalto al Savannah River Site, es muy posible que el traidor en cuestión utilice armas nucleares de destrucción masiva en nuestro nombre para manchar para siempre nuestra reputación. Se desconoce qué tan avanzados están en este intento, pero con la creciente presión interna y externa, es indudable que es cuestión de cuándo, no de si.\n\nSe recomienda aumentar los esfuerzos para detener este complot y aprehender al individuo en cuestión, no sea que causen una grieta permanente en la faz del Orden."
 nss.31.a: "Se está calentando..."
 nss.32.t: "La Mascarada es rota"
 nss.32.d: "Fue un día como cualquier otro, con énfasis en \"fue\".\n\nAquellos en las torres de marfil miraban desesperadamente lo que estaba debajo de ellos; no se dieron cuenta de que sería uno de los suyos. Toda torre debe caer eventualmente.\n\nTanto las bases de misiles como los submarinos lanzaron sus ojivas nucleares hacia varios objetivos; varias naciones en Sudamérica fueron golpeadas con la espada de Damocles. Un continente pronto sería envuelto en fuego, no solo en un sentido literal. Luego fue África Occidental, el patio de las potencias globales se volvería difícil de habitar a medida que sus ciudades fueran reducidas a cenizas. Un recordatorio de que el dolor siempre está a la vuelta de la esquina. Luego siguió Haití, una nación que no es ajena al caos. Después de las explosiones, el país sería sometido a otra prueba de resistencia.\n\nPrimero, hubo silencio.\nLuego comenzaron los gritos.\nGritos de respuestas, gritos de venganza, gritos de soluciones.\nPara el mundo exterior, estos ataques fueron atribuidos a la nación americana, una mancha de la que no se puede uno librar.\n\nLos Estados Unidos de América han fracasado. Internamente, hay pánico, las renuncias son abundantes, y algunos de los aliados más cercanos de América han abandonado el país discretamente; otros se han rendido al acto final de libertad. Los Estados Unidos se han convertido en un enemigo del mundo, y ya hay informes de grandes filtraciones sobre nuestro funcionamiento interno.\n\nNuestra población está furiosa.\n\nAquellos que permanecieron leales al Orden harán el trabajo sucio que se necesita para mantener el control, pero esta vez no será detrás del velo. Esta vez será duro, doloroso y rápido.\nTodo lo que podemos hacer ahora es rezar, porque otra llama de cambio ha sido encendida."
 nss.32.a: "Un pequeño contratiempo, ¿qué son cien años más?"
 nss.33.t: "Golpe silencioso en Canadá"
 nss.33.d: "Furgonetas negras sin distintivos habían rodeado Rideau Cottage, la seguridad se rindió sin derramamiento de sangre mientras hombres de traje y chalecos antibalas irrumpían en la residencia del primer ministro, con los rifles listos. Había sido un golpe extrañamente silencioso, más parecido a la detención de un individuo que a una toma de poder real. Trudeau no estaba seguro de cómo se había llegado a esto. Este tipo de cosas estaban reservadas para el sur global. Esto no estaba destinado a una democracia liberal occidental como Canadá, una mucho más sofisticada que América, se repetía a sí mismo, como un mantra.\n\nSin embargo, había sucedido, y aquí estaba, mirando al jefe del CSIS, Daniel Rogers. Solo había el frío desapego de un profesional en su comportamiento. \"Los términos son bastante claros. Esto no está sujeto a negociación, y nunca lo ha estado\".\n\nTrudeau le devolvió la mirada con furia, pero su desafío no era más que una postura vacía en este momento. No había nada que pudiera hacerse ante la traición descarada que tenía delante, solo la amarga verdad de que había sido superado y desbordado por un enemigo que había anticipado cada movimiento.\n\n\"El pueblo canadiense...\"\n\nRogers se rió entre dientes. \"En lo que a ellos respecta, es solo un día más. Usted continuará, en el papel, en sus funciones oficiales. Entienda su posición. La fachada de normalidad debe preservarse a toda costa. Cualquier intento de subvertir o de oponerse a este acuerdo, y le aseguro; tenemos métodos para hacerle cumplir. Y, en el peor de los casos, el cargo de primer ministro es solo un título, después de todo. Su sucesor no estaría menos dispuesto\".\n\n\"No puedo creer que realmente vayas a hacer esto. ¿Qué esperas lograr?\"\n\n\"Orden. El mundo está ardiendo, y usted no ha hecho más que acobardarse. América está regresando al escenario mundial, y estaremos a su lado..."
 nss.33.a: "...como siempre lo hemos estado\"."
 nss.34.t: "Capas de un Imperio"
 nss.34.d: "Los Estados Unidos no son ajenos a desmantelar imperios enteros y sistemas de tiranía.\nVarios han intentado imponer su Orden en el mundo, pero todos fracasaron: los británicos fracasaron, los alemanes fracasaron y los rusos fracasaron.\n\nNo importa la forma o el color, Rusia en su esencia sigue siendo un imperio.\nY nosotros, como estadounidenses, estamos destinados a desmantelarlos todos.\n\nNuestro primer error fue permitir que los soviéticos dominaran Europa Oriental durante décadas, nuestro segundo error fue apaciguar a Putin, y nuestro tercer error fue no hacer que Europa fuera lo suficientemente fuerte como para lidiar con ellos sin nosotros. Pero como cualquier rival, las batallas ganadas y perdidas son las que nos enseñan.\nEn cierto modo, cualquier forma de resentimiento o rencor ha desaparecido hace mucho tiempo.\n\nAmbos hemos chocado de varias maneras, siempre tratando de mostrar al mundo quién es el mejor de los mejores.\nHoy marca el día en que ponemos fin a esa rivalidad de una vez por todas, para mostrar al mundo que, al final, uno de nosotros fue el mejor.\n\nSus hijos caminaron sobre las ruinas de dos imperios, caminarán sobre las ruinas del tercero."
 nss.34.a: "Caminando hacia su libertad."
 nss.35.t: "Campo de pruebas de imperios"
 nss.35.d: "Un continente entero cubierto de huesos y cenizas, donde los imperios se probaron a sí mismos contra las leyes universales de la realidad, algunos ganaron, otros perdieron.\nPero los imperios no están hechos de hombres y mujeres en torres de marfil, los imperios están hechos de ideas y conceptos que unen un reino.\n\nPara muchos, los Estados Unidos son un imperio.\nUn imperio que resistió la última prueba que ningún otro imperio pudo resistir.\nIdeales que vale la pena preservar.\nConceptos que permanecerán invencibles.\nNo existiríamos sin Europa, de alguna manera hay un valor sentimental en asegurar que no los perderemos de nuevo ante las llamas ardientes del cambio.\nNo importa qué símbolo reine sobre Europa.\n\nLa paz americana asegurará que sus símbolos se desmoronen, sus ídolos caigan y sus ideologías corrosivas sean desmanteladas, restauremos el Orden en Europa.\nNuestro abrazo nunca se aflojará.\n\nNunca más."
 nss.35.a: "Es hora de volver a casa."
 nss.36.t: "Espejo"
 nss.36.d: "En el este yace una bestia.\nHecha de hombres y fábricas.\nNecesita más y más.\nQuemando las tierras de los débiles.\n\nSin embargo, llega la antorcha de la iluminación, sostenida por muchos.\nJunto a una espada sostenida por muchos.\nApuntada a su corazón.\nApuntada a su cabeza.\n\nEl despertar de China no ha estado exento de contratiempos, nuestra ausencia temporal ha demostrado ser el ingrediente clave para su ascenso. Hemos visto las similitudes con nuestra propia historia.\nNada más que pruebas y senderos, y soportarlos todos garantizaría un lugar bajo el sol.\nPero solo hay un lugar.\n\nChina tiene la capacidad de ocupar nuestro lugar, de convertirse en los nuevos guardianes del mundo.\nPero no es un mundo del que queramos formar parte.\n\nLa paz americana duró tanto por una buena razón.\nEs hora de poner fin a su ascenso."
 nss.36.a: "Le sacaremos los colmillos al dragón."
 nss.37.t: "Corazón del mundo"
 nss.37.d: "La civilización nació en Medio Oriente, y como cualquier lugar de nacimiento; es propensa a la corrupción.\nNo por su naturaleza, sino por el tiempo transcurrido.\n\nLa región no ha sido ajena a los conflictos.\nComo una rueda que intenta reinventarse.\nHombres de negro y hombres de beige, armados con acero y fuego.\nUna región eternamente nublada en una niebla roja.\nHemos estado aquí antes y nuestra presencia aseguró que el ciclo no se repetiría, nuestra ausencia ha sido la prueba necesaria de que tenemos que volver.\nPara asegurarnos de que los espectros de la violencia permanezcan enterrados.\nEstabilidad y Orden son las virtudes necesarias para domar una región tan inestable, su rica historia y conocimiento son demasiado valiosos para ser mantenidos en manos de las masas impulsivas.\n\nHemos vuelto.\nY nunca nos iremos."
 nss.37.a: "Entierra su arrogancia, entierra su orgullo."
 nss.38.t: "EE.UU. exige que abandonemos la IFR"
 nss.38.d: "Los Estados Unidos de América han emitido un ultimátum a nuestro país, exigiendo que cesemos cualquier cooperación económica y diplomática con China, especialmente, que abandonemos la Iniciativa Franja y Ruta, citando \"la amenaza del neoimperialismo chino y la amenaza del autoritarismo global\".\n\nSin embargo, las estrictas demandas y amenazas del lado estadounidense son incomparables con las pérdidas que podríamos sufrir al perder los favores de China. Pero en una lucha de titanes, no puede haber compromiso, así que debemos elegir: o romper nuestros lazos con China o arriesgarnos a sufrir el poder militar y económico de Norteamérica."
 nss.38.a: "No tenemos elección."
 nss.38.b: "¿No?"
 nss.39.t: "Alma perdida"
 nss.39.d: "Fue asignado a la guardia nocturna para asegurarse de que ningún insurgente iraquí tomara a su unidad por sorpresa; las noches tranquilas siempre eran un preludio de otra emboscada, otro ataque terrorista. No había dormido en días, y a veces, vislumbraba guerras pasadas. El cielo nocturno era hermoso, una pintura que solo un ser divino podría crear. A veces, podía escuchar disparos a lo lejos; ya fuera de amigo o enemigo, no importaba, porque no estaba cerca de él ni de su unidad. La pequeña linterna cerca de la silla de plástico barata en la que estaba sentado le daba la luz suficiente para ver su entorno inmediato, pero a lo lejos, la oscuridad dejaba espacio para la imaginación.\n\n\"¿Has visto a mis hombres?\"\n\nVio una figura de pie cerca, vistiendo uniforme de combate y una máscara de gas que parecía un poco anticuada. La figura se acercó mientras se agachaba a su lado.\nEl guardia nocturno levantó la vista, sobresaltado.\n\n\"¿Q-quién eres? ¡Identifícate!\"\nSe levantó lentamente, apuntando su rifle a la figura.\n\n\"Mis hombres, ¿los has visto?\", seguía preguntando.\n\"E-estoy seguro de que todavía están por a-si tan solo te identificaras-\"\n\n\"Claro que están por aquí, yo sigo aquí, y tú también lo estarás. Ninguno de nosotros abandonará este lugar\".\nLa figura extendió sus brazos hacia el guardia nocturno. Se veían agujeros de bala en su uniforme, marcas de cuerda alrededor de su cuello.\n\"La civilización nació aquí, y aquí es donde será enterrada\".\n\nEl guardia nocturno fue despertado abruptamente por un miembro del escuadrón que lo sacudía.\n\"Oye, ¿estás bien?\"\nOfreció una suave sonrisa. \"No quiero que estos asaltantes tusken nos tomen la delantera\".\n\nEl que estaba de guardia miró a su alrededor, pero la figura enmascarada ya no estaba allí.\nSe levantó y rió tímidamente."
 nss.39.a: "\"Por favor, deja de hacer referencias a Star Wars\"."
 nss.40.t: "Cruelty Squad"
 nss.40.d: "Al detenerse frente al edificio, las puertas de la furgoneta se abrieron de golpe. Los soldados sin insignias salieron y se dirigieron a la entrada, colocando explosivos en la puerta. La explosión resonó por la calle mientras los operativos irrumpían. Ya fueran terroristas de extrema derecha enmascarados o civiles, cualquiera que se atreviera a interponerse en su camino era abatido a tiros. Su primera prioridad era eliminar al HVT y a cualquier otro terrorista potencial, y luego a cualquiera que pudiera haber visto algo.\n\nUna y otra vez, siempre era lo mismo: el alivio en los rostros de los rehenes al ver a sus rescatadores, solo para que la confusión y el horror se registraran cuando los operativos también les apuntaban con sus rifles. Sin supervivientes, sin testigos. No es que los civiles hubieran podido reconocer a sus posibles salvadores, sus rostros ocultos detrás de pasamontañas, pero no se dejaba nada al azar.\n\nCuando, por fin, se encontraron frente a una puerta cerrada, un operativo colocó un explosivo en ella y la derribó de una patada. A medida que el humo se disipaba, reveló a un hombre acobardado con un tatuaje de esvástica en el cuello.\n\n\"¡No te muevas!\", ordenó el líder del equipo.\n\n\"Esto no era parte del trato...\", protestó el neonazi, solo para que el escuadrón lo llenara de plomo. \"Me... prometieron...\"\n\nEl equipo se detuvo. \"Equipo de entrada, aquí TOC. El equipo de limpieza está en camino. Eliminen a todos los supervivientes restantes. Cambio.\"\n\n\"Entendido\", respondió el líder del equipo. \"Equipo de entrada, fuera\". Luego se volvió hacia sus hombres."
 nss.40.a: "\"Los oyeron. Manos a la obra\"."
 nss.41.t: "Día de elecciones"
 nss.41.d: "En los Gobiernos más autocráticos del mundo, el poder de votar ha sido sofocado. Esa sensación de no tener poder, de no tener voz en nada. Es una sensación paralizante.\n\nEl ciudadano americano no siente tal parálisis; cada cuatro años, la temporada electoral está en pleno apogeo, un ritual para celebrar la libertad de elección y recordar a nuestra gente que ellos tienen ese poder.\nLa elección de su candidato favorito, desde el carismático hasta el pragmático, desde el humorístico hasta el sereno. Será como los días antes de la podredumbre del populismo, todos sonríen y se forjan rivalidades amistosas, de la misma manera que iría un partido deportivo.\n\nQuienquiera que gane, la maquinaria detrás del velo seguirá siendo la misma.\nAhora veamos qué máscara de porcelana brillará intensamente en la pantalla.\n\nY el ganador es..."
 nss.41.a: "¡El presidente es reelecto!"
 nss.41.b: "Gavin Newsom."
 nss.41.c: "Mitt Romney."
 nss.41.e: "Lloyd Austin."
 nss.41.f: "John Bolton."
 nss.41.g: "Mark Milley."
 nss.41.h: "Antony Blinken."
 nss.41.i: "Hunter Biden."
 nss.41.j: "Nancy Pelosi."
 nss.41.k: "Chuck Schumer."
 nss.41.l: "Liz Cheney."
 nss.42.t: "Día de la investidura"
 nss.42.d: "El pueblo ha hablado, cualquier forma de rivalidad que se gestaba entre los candidatos y sus partidarios ha disminuido. Ahora es el momento de estrechar manos y sonrisas brillantes, ahora es el momento de unirse de nuevo.\nEl presidente electo ha atraído a una gran multitud virtual debido al confinamiento, la seguridad de la ceremonia se intensificó por razones obvias mientras el presidente electo ponía su mano sobre la Biblia y recitaba su juramento a la nación.\n\nNormalmente habría una multitud animándolos, pero las masas en línea están haciendo suficiente ruido para compensar eso, se encienden fuegos artificiales y el himno suena de fondo mientras el presidente de los Estados Unidos de América es guiado al Capitolio.\n\nCon la temporada electoral llegando a su fin, es hora de presentar adecuadamente al presidente cómo se hacen las cosas, tanto en público como entre bastidores."
 nss.42.a: "Sabra solo lo que deba saber."
 nss.43.t: "A QUIEN LE CORRESPONDA:"
 nss.43.d: "Tras la reciente toma de posesión del presidente de los Estados Unidos de América, han circulado rumores sobre el posterior fallecimiento del expresidente Joseph Robinette Biden. Rumores como que \"le desconectamos\" o que \"le inyectamos una toxina dolorosa\" no son más que intentos descarados de desinformación por parte de enemigos externos.\n\nNuestro expresidente Biden entregó su corazón, alma y cuerpo por nuestra gran nación y aguantó hasta cumplir su mandato para evitar una mayor inestabilidad; eso requiere coraje.\nNo importaba el dolor, no importaba el estrés, él aguantó.\nY así como él lo hizo, nosotros también lo haremos.\nCumplimos con nuestros deberes, devolvemos al mundo a la normalidad.\nY seguimos adelante, sin importar las cicatrices que queden.\n\nMe gustaría recordar a todos que la continuación de tales rumores se considera un acto de disidencia verbal y podría ser considerada una actividad antisocial. No necesito recordarles todas las medidas que tomamos contra tales actos.\n\nNo hay tiempo para divagar en especulaciones y misterios, tenemos un mundo que reconstruir.\nFIRMADO:"
 nss.43.a: "William J. Burns."
 nss.44.t: "Tiroteo en un centro comercial local deja 20 muertos"
 nss.44.d: "Una tarde tranquila se convirtió rápidamente en una pesadilla cuando una joven de aproximadamente veintiún años llegó al centro comercial Franklin en Pensilvania armada con una metralleta con la intención de matar a tantas personas como fuera posible. El ataque duró aproximadamente veinte minutos antes de que las autoridades locales pudieran detenerla por medios letales.\nEl ataque ha dejado al menos veinte personas muertas, mientras que otras cuatro se encuentran en estado crítico. Ya se han reportado fuerzas policiales estableciendo puntos de control en toda el área y el estado para reducir las posibilidades de un posible imitador.\n\nLa motivación de la tiradora aún es muy especulada, pero se encontró un cuaderno en la mochila de la tiradora que contenía imágenes y texto relacionados con el nihilismo y signos de deterioro de la salud mental. Se encontraron temas consistentes de \"ojos en la oscuridad\" dentro del cuaderno.\n\nMientras la investigación está en curso y su familia está siendo interrogada, las autoridades locales sugieren encarecidamente investigar las actividades de sus familiares más jóvenes, especialmente en lo que respecta a su actividad en línea. El FBI ha declarado que se mostrará más información cuando se hayan realizado las confirmaciones adecuadas."
 nss.44.a: "Más información después de la pausa."
 nss.45.t: "¡Ataque en un campus sorprende a la nación!"
 nss.45.d: "Una universidad local en Tennessee se encontró con la tragedia cuando un joven de unos veinte años comenzó a disparar a estudiantes y profesores por igual con un arma automática. La seguridad local intentó detener al tirador, pero se vieron rápidamente obligados a retirarse debido al uso de cócteles Molotov, logrando matar al menos a un miembro del personal de seguridad.\n\nUn equipo SWAT fue desplegado en el campus universitario y, después de un rápido barrido por la zona, el tirador fue detenido en su alboroto por medios letales. Los informes sobre el número de víctimas mortales aún son inciertos, pero se estima que más de cuarenta víctimas encontraron su trágico final. Las motivaciones del tirador aún son objeto de especulación, pero las cicatrices de autolesiones en todo su cuerpo indican graves problemas de salud mental, junto con textos burlones escritos en los cócteles molotov como \"¡Arde en el infierno!\" y \"¡Calor a toda costa!\".\n\nLa familia está siendo sometida a un intenso interrogatorio mientras las autoridades locales realizan un barrido profundo de la actividad en línea local donde la gente podría expresar simpatías hacia el tirador o cualquier conexión potencial con un grupo digital que fomente dicha violencia. El FBI ha declarado que investigaciones recientes han llevado a la conclusión de que hay muchas más personas albergando estos elementos antisociales de lo que inicialmente pensaban en todos los Estados Unidos.\n\nMás información después de la pausa."
 nss.45.a: "¡Oh, vaya, Disney está haciendo una nueva película!"
 nss.46.t: "¡Carnicería conmociona a la nación!"
 nss.46.d: "Un festival callejero en Nueva Inglaterra se convirtió rápidamente en un baño de sangre cuando un hombre de veinticuatro años atropelló a varias personas en una camioneta negra. Las palabras \"Inunda el mundo\" y \"COME MIERDA Y MUERE\", entre otras obscenidades, se veían pintadas con aerosol en el vehículo, después de que este chocara contra una cafetería. El tirador salió rápidamente de la camioneta con un rifle con la única intención de matar a tantas personas como fuera posible.\n\nLas intenciones del tirador quedaron claras al pisotear las cabezas de los heridos y gritar de forma arrastrada. Sus ojos estaban inyectados en sangre y sus movimientos eran nerviosos.\n\nLas fuerzas policiales llegaron al lugar y, después de obligar al tirador a retirarse a una tienda de conveniencia, fue rápidamente aislado y eliminado por medios letales. Las autoridades afirman que el tirador mostró una fuerte resistencia, lo que provocó su respuesta letal. El número de muertos ha llegado fácilmente a casi setenta y cinco personas, con al menos una docena de heridos, siendo la principal causa de muerte el atropello por la camioneta. Las autoridades no han confirmado las motivaciones del tirador, pero han insinuado que el perpetrador estaba fuertemente bajo la influencia del alcohol y diferentes tipos de medicamentos relacionados con la salud mental. Han prometido informar al público una vez que se confirme más información.\n\nEn otras noticias; el Gobierno federal ha anunciado con orgullo la expansión de las zonas libres de armas en lugares públicos. Esto ocurrió después de una campaña de recompra a nivel nacional mucho más exitosa debido a la represión de la posesión de armas de fuego."
 nss.46.a: "Bueno, pero quiero ver Friends, cambia de canal."
 nss.47.t: "¡Ataque abrasa el alma americana!"
 nss.47.d: "Una gasolinera local fue víctima de una explosión incendiaria, mientras se veía a un sospechoso cerca del lugar con una escopeta, disparando a quien no había sido alcanzado por la explosión.\n\nUn hombre de veintiséis años, portando varias bombas caseras, se desató contra la población local, utilizando los explosivos contra tiendas y edificios cercanos, dejando una estela de carnicería. El atacante fue rápidamente aprehendido por la policía local, pero no antes de que se inmolara con un chaleco bomba que llevaba debajo de su sudadera con capucha. Los motivos del perpetrador son en gran parte desconocidos, pero sus familiares han hecho declaraciones sobre su historial. Aislándose mucho y mostrando signos de paranoia extrema, parece ser otra estadística más en la crisis de salud mental que azota América.\n\nEl número de muertos del ataque aún está pendiente, pero los funcionarios han declarado que fácilmente supera el centenar, si no más. Los funcionarios han prometido informar al público una vez que se tenga más información.\n\nEn otras noticias; se ha reportado un aumento de la actividad de tormentas cerca de la costa de Florida, los expertos parecen desconcertados debido a que está fuera de temporada, se aconseja a los residentes que presten mucha atención a los canales oficiales con respecto a cualquier posible amenaza natural."
 nss.47.a: "¿Producen a estas personas en una fábrica?"
 nss.48.t: "¡Ataque a Dollar Tree conduce a una red de violencia!"
 nss.48.d: "Lo que inicialmente se vio como un robo a mano armada, rápidamente se convirtió en algo mucho peor. Una mujer de veintiún años fue vista entrando a un Dollar Tree local en Georgia y antes de que el dependiente de la tienda pudiera siquiera responder, recibió un disparo en el pecho con un rifle automático mientras ella aullaba como un animal salvaje. Finalmente, mató a cuatro clientes antes de salir y comenzar a disparar al azar contra edificios y grupos de personas antes de retirarse a un centro comercial abandonado.\n\nCuando las autoridades locales llegaron a la escena e intentaron registrar el centro comercial, la tiradora no estaba sola, ya que ella, junto con otras cinco personas, abrieron fuego contra las fuerzas policiales presentes; el ataque a Dollar Tree fue probablemente un intento de atraer a la policía a un tiroteo. Los perpetradores estaban fuertemente armados, pero fueron eliminados rápidamente después de que las unidades SWAT llegaron a la escena, lo que provocó la muerte de los seis tiradores.\n\nLas autoridades afirman que existe una alta probabilidad de que un grupo más grande esté involucrado, pero aún no hay confirmaciones al respecto; aproximadamente treinta personas han sido asesinadas y unidades de la policía militar han sido desplegadas para vigilar cualquier otra amenaza potencial.\n\nSe informará más pronto, pero no antes de nuestra pausa."
 nss.48.a: "¿Pero por qué un Dollar Tree?"
 nss.49.t: "¡Tiroteo en los Estados Unidos!"
 nss.49.d: "El terror se apodera de la nación mientras un lobo solitario ha disparado en un lugar local, el tirador fue rápidamente detenido por medios letales, pero no antes de que el número de muertos llegara a decenas. Las autoridades locales han declarado que el tirador tenía un largo historial de enfermedades mentales, medicación y problemas con su familia.\n\nLas investigaciones sobre dónde obtuvo el tirador sus armas y los posibles motivos de tal ataque aún están en curso, ya que las autoridades prometen una conferencia de prensa adecuada sobre el ataque. Otro día trágico en América y se contará más justo después de la pausa."
 nss.49.a: "Odio los anuncios."
 nss.50.t: "INTELIGENCIA DE LOBOS SOLITARIOS"
 nss.50.d: "El siguiente documento contiene información sobre la aplicación de presión a sujetos susceptibles para que realicen acciones de lobo solitario contra la población. El objetivo es extender la ansiedad a nivel nacional hasta el punto de que no haya resistencia al aumento de la vigilancia y la seguridad en los Estados Unidos de América.\n\nLos sujetos deben cumplir los siguientes criterios antes de aplicar presión:\n- Deben tener tendencias antisociales.\n- Deben tener entre dieciséis y veintiocho años.\n- El sujeto debe tener presencia en internet.\n- El sujeto debe tener una relación tensa con su familia.\n- El sujeto debe luchar con problemas de salud mental.\n\nUna vez encontrado un candidato potencial, se debe aplicar la cantidad adecuada de presión. Desde la presión en redes sociales por parte de grupos/individuos señuelo hasta la contribución a tendencias paranoicas. Se fomenta encarecidamente la orientación hacia el uso de medicación, pero sigue siendo opcional. Una vez que se tenga la certeza de que el sujeto se convertirá en el catalizador de un incidente de lobo solitario, si no es posible que el sujeto adquiera armas de fuego por su cuenta, se recomienda el uso de grupos/individuos señuelo para suministrarle el equipo adecuado.\n\nTras la conclusión de un incidente de lobo solitario, se aconseja borrar cualquier rastro que pueda implicar a operativos o hacer que personal no perteneciente a las redes señuelo sea detenido por contribuir al incidente de lobo solitario."
 nss.50.a: "Página 1 de 30."
 nss.51.t: "Nacimiento de la Am-Net"
 nss.51.d: "La naturaleza no regulada del discurso en Internet había sido identificada durante mucho tiempo como un factor que contribuía a la desestabilización social. La incapacidad de las autoridades de antes de la guerra para gestionar adecuadamente la transición a la era de la información fue evaluada como un fallo crítico en la gobernanza.\n\nPara rectificar esta deficiencia, se autorizó la implementación del Proyecto Am-Net. Basándose en la experiencia técnica tanto de fuentes nacionales como de contrapartes extranjeras, se construyó una arquitectura integral de contención digital en un ciclo de desarrollo acelerado. El sistema refleja la eficacia de estructuras similares implementadas en la República Popular China, al tiempo que incorpora innovaciones técnicas americanas.\n\nLa transición a un ecosistema de información gestionado ocurrirá a las 0400 horas. Todo el tráfico civil de Internet será enrutado a través de nodos controlados federalmente con capacidades de monitoreo en tiempo real. Las conexiones externas no autorizadas serán inhabilitadas. La distribución de contenido nacional estará sujeta a protocolos de revisión automatizados y manuales.\n\nLa documentación de autorización ha sido finalizada y enviada para la revisión ejecutiva final. La firma del director representa el requisito procesal final antes de que comience la implementación completa.\n\nLa infraestructura está operativa. El personal está en sus puestos. Esperamos la orden."
 nss.51.a: "Am-Net está en línea."
 nss.52.t: "Informe de reactivación del programa D.U.M.B."
 nss.52.d: "INTERNO CIA/CI - RESUMEN INFORMATIVO\nASUNTO: Informe de reactivación del programa D.U.M.B.\nCLASIFICACIÓN: ALTO SECRETO//NOFORN\n\nRESUMEN:\nTras el cese de hostilidades en los antiguos Estados Unidos, la Agencia Central de Inteligencia ha restablecido la supervisión de bases militares subterráneas profundas (Deep Underground Military Bases, D.U.M.B.) seleccionadas como parte de un programa de contingencia estratégica en curso. Según evaluaciones de inteligencia previas, la red D.U.M.B. de las Fuerzas Armadas de EE.UU. representa un activo estratégico sustancial en caso de insurgencia doméstica e intervención extranjera. Dada la evolución de la situación de seguridad post-Guerra Civil y la necesidad de asegurar activos críticos de seguridad nacional, la Agencia Central de Inteligencia ha iniciado un programa integral de reactivación para un número selecto de instalaciones D.U.M.B., así como la construcción de instalaciones adicionales.\n\nINFORME DE INTEGRIDAD DE LAS INSTALACIONES PREEXISTENTES:\n\nD.U.M.B. DEL AEROPUERTO INTERNACIONAL DE DENVER: Daños estructurales significativos debido a demolición controlada; todos los túneles de acceso comprometidos; se estima una pérdida del 60-70% de los materiales almacenados.\nD.U.M.B. DE DULCE: La inestabilidad sísmica y las inundaciones han comprometido grandes secciones de la instalación; aproximadamente el 45% del complejo sigue siendo accesible.\nD.U.M.B. DEL ÁREA 51: Pérdida total de la instalación de superficie (Base Aérea de Groom Lake), complejo subterráneo comprometido por inundaciones parciales; la infraestructura restante y el material de archivo están siendo sometidos a evaluación de recuperación.\nCOMPLEJO DE CHEYENNE MOUNTAIN: Compromiso estructural limitado debido a la ocupación insurgente; la instalación fue controlada temporalmente por elementos pro-Trump antes de su recaptura por las fuerzas del SAC con pérdidas aceptables. La evaluación de preservación de activos muestra un 85% de integridad material. La expansión de la infraestructura subterránea está bajo consideración estratégica.\nCOMPLEJO DE RAVEN ROCK MOUNTAIN: Permaneció seguro durante las hostilidades debido a las defensas perimetrales fortificadas y el conocimiento limitado del personal operativo. No se reportaron daños significativos ni pérdida de activos. La expansión de la infraestructura subterránea está bajo consideración estratégica.\nCOMPLEJO DE MT. WEATHER: No se reportaron daños. La funcionalidad de la infraestructura subterránea se mantuvo. La expansión de la infraestructura subterránea está bajo consideración estratégica.\n\nCONCLUSIÓN:\nSi bien las operaciones de evaluación de daños y recuperación de activos están en curso, se recomienda que se inicie un plan integral de reactivación para las instalaciones D.U.M.B. como cuestión prioritaria."
 nss.52.a: "Autorizado."
 nss.53.t: "Rehabilitando el sistema bipartidista"
 nss.53.d: "Decir que la imagen del Partido Republicano había sido empañada por la traición de Trump y la subsiguiente Guerra Civil es quedarse muy corto. Antes sinónimo de conservadurismo y de la llamada mayoría silenciosa de los americanos, ahora se asocia con la rebelión y la traición. Su secuestro por fuerzas populistas, que culminó con el desastroso liderazgo de Trump y la sangrienta lucha de la rebelión republicana contra la unidad americana, lo ha dejado como una sombra de lo que fue. Incluso después de que el polvo de la Guerra Civil se asentara, es evidente que el Partido Republicano, tal como se le conocía, está más allá de toda reparación.\n\nEl sistema bipartidista, sin embargo, es visto por los Cognoscenti como increíblemente beneficioso para sus fines. Se está gestando una estrategia audaz para rehabilitar la marca republicana, asegurando al mismo tiempo que un nuevo y complaciente Partido Republicano sirva como un contrapunto fiable para los demócratas. El objetivo es simple: canalizar la disidencia hacia un recipiente político seguro y controlado, uno que no represente una amenaza para el orden establecido. Este plan emplea un cuidadoso proceso de damnatio memoriae, mientras forja una nueva narrativa centrada en una visión pro-establishment. El resurgimiento de los neoconservadores y el movimiento Never-Trumper -una vez casi extinto- ahora define el futuro del partido, y la estrategia depende de su capacidad para reempaquetar el partido de una manera aceptable. Esto implica distanciar al nuevo Partido Republicano del legado de Trump, enfatizando su compromiso con los valores conservadores fundamentales como el Gobierno pequeño y la responsabilidad individual, todo ello asegurando que el partido sea tan inofensivo para las élites como para los votantes.\n\nAsí comienza una campaña de rehabilitación de relaciones públicas: purgar a los posibles simpatizantes de MAGA para revivir el antiguo Partido Republicano y reafirmar el sistema bipartidista. Los neoconservadores liderarán esta nueva generación política, esperando colaborar discretamente con los demócratas, silenciando la disidencia mientras mantienen solo las opciones aprobadas. El objetivo final de los Cognoscenti es un Partido Republicano restaurado que sirva como una fachada que enmascare el poder real, preservando la ilusión de elección para mantener su inexpugnable control. Los editoriales de los principales medios de comunicación elogiarán a los republicanos que apoyaron a Biden durante la crisis, ensalzando a los neoconservadores como héroes que ayudaron a luchar para restaurar la cordura política. La narrativa enmarca este resurgimiento como un retorno a la normalidad, un triunfo de la democracia sobre el populismo, enfatizando la unidad mientras se presenta el radicalismo como peligroso para la curación nacional."
 nss.53.a: "Como siempre, las masas ansian ser engañadas."
 nss.54.t: "Puerto Rico y D.C. son integrados en la Unión"
 nss.54.d: "El Congreso ha aprobado discretamente las Actas de Admisión para el Estado Libre Asociado de Puerto Rico y el Distrito de Columbia, otorgándoles la condición de estados y satisfaciendo así una demanda de larga data de sus respectivas poblaciones. El presidente Biden ha declarado su pleno apoyo a las Leyes y finalizará la aprobación de las mismas en los próximos días.\n\nEsta decisión forma parte de un esfuerzo de la administración para abordar la creciente división entre América y sus territorios de ultramar. Los puertorriqueños, considerados durante mucho tiempo como ciudadanos de segunda clase por muchos en el territorio continental de Estados Unidos, ahora podrán participar en la política nacional sin tener que vivir en Estados Unidos, y D.C. finalmente obtendrá representación en el Gobierno federal después de décadas de cabildeo. El presidente ha considerado este impulso como un \"paso crucial\" para \"reparar las divisiones que asolan nuestra gran nación\".\n\nCon la aprobación de esta legislación, el número de estados en la Unión se situará en 52. Esto creará cuatro escaños adicionales en el Senado, probablemente demócratas. La concesión republicana en este asunto ha sido promocionada como un \"gesto de buena voluntad\" por los legisladores del Partido Republicano para promover la curación en una nación dividida. La transición a una bandera de 52 estrellas ya ha sido aprobada por los organismos gubernamentales pertinentes, y se espera que su implementación se complete en los próximos años."
 nss.54.a: "Una Unión más perfecta."
 nss.55.t: "Hacia el olvido"
 nss.55.d: "Yacía en su cama, el hombre cubierto de tubos y máquinas, midiendo el latido de su corazón, midiendo la forma en que sus pulmones respiraban. Joseph Biden había estado atrapado en su propio cuerpo por un tiempo, en el gran esquema de las cosas fue corto, pero para él se sintió como una eternidad. Ser consciente de todo sin poder hacer nada, tener que sentirlo todo y ver las miradas y escuchar las burlas de quienes te cuidan. Es enloquecedor, un viaje que nunca termina.\n\nHoy fue diferente, vio el rostro familiar de Burns asintiendo y susurrando a una de las enfermeras mientras le lanzaba a Biden una mirada severa, Burns le dio un respetuoso asentimiento mientras salía de la habitación. La maquinaria a su alrededor comenzó a sonar diferente, los ojos de la enfermera se apartaron de su mirada mientras inyectaba algo en su bolsa de goteo.\n\nAl principio hubo una sensación de alivio, luego las paredes comenzaron a derretirse. Las pinturas en las paredes que representaban la naturaleza, se convirtieron en representaciones de animales comiéndose unos a otros. Las ventanas comenzaron a agrietarse y la enfermera comenzó a jadear pesadamente hasta que se desplomó en el suelo con un fuerte sonido húmedo.\n\nLa habitación ya no era una habitación, un amplio campo cubierto de hierba azul, una casa solitaria en la distancia. La casa está en llamas. En la distancia, Biden vio una figura pasar, un rostro familiar.\n\n\"¿Beau?\", pensó Biden.\nSolo pensamientos, todavía no podía moverse ni hablar. Atrapado en un mundo que no reconoce. Atrapado en un mundo que lentamente se oscurece mientras siente la presencia de algo más acercarse.\n\nMiró hacia arriba mientras el cielo también se oscurecía, el sol se había ido pero su sonrisa permanecía.\n\n¿Por qué está tan oscuro?"
 nss.55.a: "¿Hola?"
 nss.56.t: "Declaración de la ONU sobre la Integridad e Inviolabilidad de la Paz Mundial"
 nss.56.d: "En una sesión histórica que marca una nueva era de estabilidad global, la Asamblea General de la ONU adoptó por unanimidad la Declaración sobre la Integridad e Inviolabilidad de la Paz Mundial, formalizando una reestructuración radical de la seguridad internacional. La resolución reconoce a EE.UU. como el \"principal guardián\" del Orden global bajo un mandato ampliado para la Coalición Estratégica por la Paz. Bajo este marco, las \"crisis locales\" y las \"disputas regionales\" ahora caen bajo la jurisdicción directa de la Coalición, centralizando la supervisión de la seguridad global. La declaración establece que cualquier desafío a la autoridad de la ONU por parte de \"estados rebeldes\" o \"elementos desestabilizadores\" desencadenará una intervención internacional coordinada, lo que representa la consolidación más completa de la gobernanza de la seguridad global desde la fundación de la ONU.\n\n\"Esta declaración representa un paso colectivo hacia la estabilidad global\", dijo el presidente en un discurso televisado. \"Uno donde el estado de derecho, no la ley de la selva, prevalece en un orden renovado y basado en reglas que refleja nuestros valores. Este orden será más justo, seguro y capaz de ofrecer un futuro mejor. La ONU, a través de su papel de mantenimiento de la paz empoderado en la Coalición Estratégica por la Paz, trabajará junto con EE.UU. para promover la seguridad global y el desarrollo sostenible. Cuando tengamos éxito -y lo tendremos- finalmente podremos poner fin al ciclo que ha determinado la historia humana durante milenios, e inaugurar un Nuevo Orden Mundial que refleje los valores y principios de nuestra humanidad compartida\".\n\nAnalistas de defensa califican el acuerdo como el fin de la acción militar soberana, marcando el comienzo de una era de \"seguridad colectiva forzada\". La resolución exige centros globales de fusión de inteligencia, reglas de enfrentamiento universalizadas de la Coalición e instalaciones permanentes en puntos estratégicos."
 nss.56.a: "La historia termina de nuevo."
 nss.57.t: "Fondos financieros sin justificar"
 nss.57.d: "Ha habido algunos informes preocupantes con respecto a nuestro presupuesto negro; a veces hay vacíos en los diferentes fondos que tenemos para varios proyectos e iniciativas.\n\nNormalmente, esto suele ser un descuido administrativo, pero debido a las similitudes con la operación de 2001, sospechamos que podría haber juego sucio. Quienquiera o lo que sea responsable de la ausencia de fondos, lo más probable es que no lo esté haciendo por interés propio y, en cambio, busque utilizarlos para socavar nuestra agenda.\n\nSe aconseja estar atento a grupos antisociales que de repente se equipen bien o se vuelvan más audaces en sus operaciones, así como a cualquier comentario entre nuestros agentes, ya que el soborno no está descartado. No obstante, estos vacíos en nuestros fondos son fáciles de subsanar, pero el hecho de que tengamos a alguien dentro planeando algo es motivo más que suficiente para preocuparse."
 nss.57.a: "La hoja del Capital vuelta contra nosotros."
 nss.58.t: "Rana hervida"
 nss.58.d: "\"Supongo que no sobrevivió\". Había sido un día relativamente tranquilo en el Pentágono mientras William J. Burns caminaba por uno de los muchos pasillos junto a un pequeño grupo de colegas y seguridad.\n\n\"No lo hizo, la toxina en su sangre indica un ataque dirigido\".\n\"¿Alguna pista sobre quién podría estar detrás de esto?\"\n\"Bueno, el problema aquí es que la toxina ha sido utilizada principalmente por nosotros, así que los franceses nos culpan de asesinar a su diplomático\".\n\"Nunca aprobé eso\".\n\"Así es, señor\".\n\nBurns frunció el ceño al recordar el incidente anterior relacionado con la ausencia de varios fondos conectados al presupuesto negro, quienquiera que esté acechando en la sombra, es alguien con amigos y experiencia.\n\n\"Intenten salvar lo que podamos con los franceses y organicen una reunión con la junta asesora\". Quiso decir más, pero una rápida mirada a las personas a su alrededor le aseguró que guardaría silencio.\n\"Enseguida, señor.\"\n\nBurns se preguntaba qué intentaba hacer este individuo, este traidor, pero con este incidente diplomático podría haber encontrado una pista sobre su objetivo. Y es uno que le preocupa mucho."
 nss.58.a: "Una máscara rota quizás nunca se arregle."
 nss.59.t: "Incidente en el Savannah River Site"
 nss.59.d: "Un informe preocupante ha llegado a las cámaras internas del Gobierno. El Savannah River Site, conocido principalmente por gestionar material nuclear y realizar investigaciones, experimentó recientemente un allanamiento.\n\nInicialmente, nada estaba fuera de lo común, pero después de la falla en mantener contacto con la instalación, se descubrió que el sitio fue objeto de una incursión llevada a cabo por un grupo antisocial conocido como \"Vultures\", un grupo anarquista que estaba muy bajo en nuestra lista de prioridades. Sin embargo, las bajas del lado de los atacantes fueron masivas; no estaban allí con el propósito de infligir daño, ya que una pequeña parte de ellos logró retirarse del área.\n\nLos informes posteriores a la acción indican que material nuclear y datos relacionados con la investigación de dicho material han desaparecido del sitio, lo cual es una clara señal de que el grupo atacó el sitio con un propósito claro. Además, se informó que el grupo anarquista estaba bien equipado hasta el punto de que pudieron resistir el asalto de un equipo de eliminación del SAC durante mucho más tiempo de lo previsto.\n\nEs obvio que el grupo fue contratado por un tercero o individuo desconocido, pero los detalles de dicho tercero aún están bajo investigación."
 nss.59.a: "Esto es más grande de lo que pensábamos."
 nss.60.t: "Activos extraviados"
 nss.60.d: "El informe aterrizó en el escritorio del director Burns con un suave y definitivo golpe. Era un archivo delgado y discreto, de un color gris neutro que de alguna manera parecía absorber la luz de su oficina. El título, estampado en letras negras nítidas, decía: \"Activos extraviados - Discrepancia contable interna\". Un eufemismo insípido para una pesadilla potencial.\n\nBurns despidió a su ayudante con un brusco asentimiento, su mirada ya fija en la primera página. No necesitó leer mucho. Los números no cuadraban, y no por una pequeña cantidad. Fondos destinados a proyectos de infraestructura -específicamente, la construcción de nuevos \"centros de rehabilitación y procesamiento\" en el sur de Texas- habían desaparecido. Transferidos a través de un laberinto de cuentas fantasma, el rastro se había disipado como la niebla.\n\nPero la hemorragia no se restringía solo a las finanzas. Habían perdido personal. Un logista clave del Proyecto Megalópolis se había ausentado sin permiso. Y una científica nuclear de alto nivel de la DEA, una mujer con autorización de seguridad de alto nivel, simplemente no se había presentado a trabajar hacía tres días. Su apartamento estaba vacío, impecablemente limpio. Burns conocía estas tácticas, porque él había ayudado a ser pionero en ellas. No eran sucesos aleatorios. Estaban coordinados, ejecutados por alguien que conocía la arquitectura del sistema, sus puntos ciegos y sus puntos de presión. Alguien de dentro.\n\nPensó en el memorándum. La advertencia. Como cualquier cuerpo infestado de parásitos... El parásito no solo se estaba alimentando, supuso Burns. Tenía la intención de construir. Los fondos, la experiencia, los datos, eran las materias primas para algo más. Un arma dirigida al corazón de la Orden que habían construido con tanto esmero. Su Judas había sido un pequeño hereje muy ocupado.\n\nSe recostó, el cuero de su silla gimiendo bajo su peso. La vista desde su ventana era plácida, ordenada. Pero más allá de los cuidados céspedes y la valla perimetral, casi podía sentir la podredumbre extendiéndose. Una sola célula, volviéndose maligna. Un traidor, armado con sus propios secretos.\n\nBurns tomó su teléfono seguro. Su voz era baja, monótona. \"Consígueme a Fink. Y a Tompkins...\""
 nss.60.a: "\"Diles que tenemos un contagio\"."
 nss.61.t: "¡Intento de acceso a los códigos nucleares!"
 nss.61.d: "\"¿Alguna pista?\" William J. Burns no era alguien que se pusiera nervioso rápidamente, pero escuchar la noticia de un ciberataque a las redes digitales internas era motivo de preocupación.\n\n\"Negativo, señor, los atacantes intentaron encontrar una manera de obtener acceso a los códigos de lanzamiento de misiles. Logramos expulsarlos de nuestras redes. Ha sido difícil determinar el origen del ataque, pero definitivamente está dentro de nuestras fronteras\".\n\nTodo el Pentágono estaba en alerta máxima, y el aire de paranoia se podía sentir físicamente. Los oficinistas y los guardias de seguridad se miraban con gran recelo, y la cooperación era reacia en el mejor de los casos.\n\n\"¿Consiguieron algo?\" preguntó Burns; no había dormido bien en días. A veces, cree que puede ver al traidor entre la multitud, pero su forma siempre cambia. Siempre fuera de su alcance.\n\n\"Ese es el problema, señor\"."
 nss.61.a: "\"No lo sabemos\"."
 nss.62.t: "Ojivas perdidas"
 nss.62.d: "El funcionamiento interno del Gobierno federal se somete a mucha tensión, ya que cada minuto que pasa es el equivalente a una olla de agua hirviendo aumentando su temperatura.\nColegas que trabajaron juntos durante décadas ahora se miran como si hubieran descubierto los esqueletos en sus armarios. Y el incidente de hoy es una indicación de que nos estamos acercando al punto de ebullición.\n\nDurante uno de los chequeos regulares en nuestras bases de misiles, hemos llegado al sorprendente descubrimiento de que varias ojivas nucleares han desaparecido. En lugar de que una base fuera el objetivo de tal robo, se descubrió que varias bases han sido el objetivo de un robo coordinado.\nEl personal asociado con estas instalaciones ha sido sometido a interrogatorios intensivos junto con sus familias, ya que estamos atentos al mercado negro global en busca de cualquier venta relacionada con nuestras ojivas nucleares desaparecidas.\n\nCómo fue posible esto en primer lugar sigue bajo investigación, pero está claro que el traidor que se las llevó tiene la intención de usarlas. Si no lidiamos con esto en consecuencia, las cosas se pondrán feas rápidamente."
 nss.62.a: "Una espada de Damocles perdida."
 nss.63.t: "Submarinos entrando en posición"
 nss.63.d: "\"¿¡Están haciendo QUÉ COSA!?\"\nWilliam J. Burns no era de los que gritaban, y mucho menos chillaban, pero era de esperar que alzara la voz cuando se supo que varios submarinos que habían sido reportados como desaparecidos fueron encontrados de nuevo en varias posiciones a través del Océano Atlántico, dirigiéndose a ubicaciones desconocidas.\n\n\"Los submarinos están armados con las ojivas nucleares que desaparecieron recientemente; asumimos que están esperando órdenes de quien los esté comandando\".\n\n\"Interceptarlos probablemente los haría disparar de todos modos. ¿Alguna noticia sobre nuestra persona de interés?\"\n\"Negativo, señor\".\n\"Salga y no regrese hasta que tenga algo\".\n\"Entendido, señor\".\n\nBurns se recostó en su silla, pero cualquier forma de relajación estaba lejos de ser encontrada.\nConstantemente, el traidor lograba mantenerse fuera de su vista; constantemente, lograban evitar el ojo de la providencia, y ahora se han vuelto extremadamente audaces. Todo el trabajo que ha hecho puede ser deshecho en un solo ataque nuclear. Esto no puede suceder."
 nss.63.a: "El tiempo se acaba..."
 nss.64.t: "Silos de misiles se rebelan"
 nss.64.d: "Después del incidente de los submarinos, era probable que las bases de misiles fueran el siguiente objetivo, y cuando intentamos contactar al personal en el lugar, no hubo comunicación.\n\nSolo podemos asumir lo peor. Las instalaciones ya están rodeadas por varios equipos de asalto del SAC listos para atacar; sin embargo, debido a la naturaleza volátil de la situación, no podemos simplemente irrumpir. Lo que sea que tenga el traidor, puede ser recuperado siempre y cuando logremos localizar y aprehender al objetivo.\n\nTenemos poco tiempo; cuanto más tardemos en encontrar al objetivo, más probable será que todo el trabajo que hemos invertido en nuestra visión sea en vano."
 nss.64.a: "El corazón del Orden late más rápido."
 nss.65.t: "Golpe en Brasilia"
 nss.65.d: "En Brasilia, un golpe militar contra el Gobierno brasileño ha derrocado al régimen actual en favor de uno militar de transición, citando \"amenazas a la democracia\" y la \"creciente inestabilidad\" provocada por las políticas de la administración anterior. El régimen militar ha sido reconocido como legítimo por el Departamento de Estado, y el Presidente ha enviado una carta a la nueva Junta aplaudiendo la restauración del orden y la paz en Brasil, un país con profundos lazos de amistad con los Estados Unidos.\n\nEl nuevo régimen en Brasilia, encabezado por los militares, ha prometido su compromiso con los principios de gobernanza democrática, el respeto por los derechos humanos y la adhesión al Estado de derecho. Las autoridades de transición, compuestas por miembros de alto rango de las fuerzas armadas, han reiterado su intención de celebrar elecciones transparentes en un plazo razonable.\n\nEn una entrevista con el New York Times, un portavoz del Departamento de Estado afirmó que Estados Unidos está monitoreando de cerca la situación en Brasil y está entablando un diálogo constructivo con las autoridades de transición. El portavoz enfatizó el apoyo de Estados Unidos a una transición de poder pacífica y ordenada, señalando que el Gobierno de EE.UU. está listo para ayudar al pueblo brasileño en su búsqueda de estabilidad democrática y prosperidad, si el nuevo Gobierno lo solicita."
 nss.65.a: "De nuevo bajo nuestro amparo."
 nss.66.t: "Reconstrucción de Rusia"
 nss.66.d: "Cualquier civilización bárbara se deleitaría con la masacre de uno de sus mayores adversarios, y aunque hay un aire de alegría entre los hombres y mujeres que contribuyeron a desarmar a Rusia, no expresamos ninguna forma de satisfacción.\n\nRusia siempre ha sido un país sumido en la autocracia, ya sea por las dificultades soportadas o por la larga historia de conflictos internos; no los culpamos exactamente por las cosas que hicieron. Simplemente carecían de sutileza. No es que importe, por primera vez, los tanques americanos ruedan por la Plaza Roja y, junto a ellos, una avalancha de nuevas ideas y conceptos que serían considerados ajenos al pueblo ruso.\n\nCon sus corporaciones siendo lentamente absorbidas por las nuestras y su oposición siendo elevada, la pregunta de quién se convierte en el rostro de la nueva Rusia debe ser respondida lo más rápido posible para que las llamas del nacionalismo no resurjan.\n\nMijaíl Borísovich Jodorkovski es un hombre rodeado de controversia, pero su habilidad para escapar de la muerte política total es un talento que podemos apreciar. Después de la pérdida de sus acciones en los campos petroleros siberianos, no habría duda de que tendría cuentas pendientes con sus antiguos oponentes. Con él tomando el timón de Rusia, podemos asegurar una paz duradera entre nuestras dos naciones."
 nss.66.a: "El oso sin garras."
 nss.67.t: "Reconstrucción de China"
 nss.67.d: "Cualquier nación que intente ascender a un lugar ya ocupado siempre se quemará. China es otra de esas naciones esperando en la fila para intentarlo y fracasar.\n\nLa guerra contra China fue violenta, y lucharon con uñas y dientes, pero como cualquier animal rabioso que gruñe y muerde, sus dientes se harán añicos. Después de una larga campaña, el Ejército Popular de Liberación pudo sentir la creciente presión del ejército de los Estados Unidos, ya que parecía que no estaban preparados para enfrentarse a la policía del mundo.\n\nSería inevitable que el EPL se volviera contra su propio amo, y con el subsiguiente golpe de estado que siguió, el único hombre que se acercó a nosotros fue Liu Yazhou, un hombre que nunca rehuyó criticar al Partido Comunista de China, y viendo la creciente pila de fracasos, adoptó el enfoque razonable de buscar la paz y la reconciliación.\n\nCon la paz lograda, la reconstrucción seguiría mientras ayudábamos en la reestructuración del gobierno chino y sus recursos. Derrotar a un gigante nacional no ha sido una tarea fácil, pero bajo la paz estadounidense, era de esperar."
 nss.67.a: "El dragón no volará de nuevo."
 nss.68.t: "La sangre"
 nss.68.d: "La sala de conferencias en Langley estaba bañada por el frío resplandor de los monitores. La conexión se enrutaba a través de un laberinto de canales cifrados - de Zúrich a Singapur, y luego de vuelta a través de una serie de servidores ocultos. Al otro lado había una sesión clandestina en los márgenes de la reunión anual del Foro Económico Mundial, donde los arquitectos del capital global conspiraban en secreto. Desde la pantalla principal, Klaus Schwab se inclinó hacia adelante, con una expresión de preocupación paternal. Después de un breve saludo reconociendo a todos los presentes, pasó al meollo del asunto. La estabilidad requería más que acción militar; exigía un marco predecible para el futuro.\n\n\"La economía mundial se construyó sobre los cimientos de los Estados Unidos\", entonó Schwab con suavidad. \"Esa base ahora está fracturada. Los inversores necesitan saber... ¿qué se está construyendo en su lugar?\"\n\nEl director Burns consideró la pregunta por un momento. Sabía que la estabilidad de la economía global dependía de algo más que una mera victoria; la visión de posguerra debía definirse ahora. Tenía varias propuestas en mente y necesitaba articular la más viable al presidente del FEM.\n\"Reconstruiremos América de arriba abajo, más fuerte y más resiliente, liderada por los más cualificados. El experimento populista termina permanentemente. Un nuevo modelo de gobernanza racional, liderado por los mejores en la academia, la industria y el Gobierno, lo reemplazará\".\n\n\"El modelo de Davos, escalado a Estado nación\", respondió Schwab. Su tono contenía un matiz de aprobación, aunque había una duda persistente en su voz. \"Pero para gobernar, primero hay que conquistar. Los rebeldes constitucionalistas todavía controlan vasto territorio\".\n\nEl director asintió. \"Estamos estrangulando al régimen de Denver con presión económica, lo que ya está resquebrajando sus defensas. Además, tenemos planes para minimizar las interrupciones una vez que termine la guerra\".\n\nFink se inclinó hacia adelante. \"Una transición de poder fluida es crucial, tanto militar como económicamente. Cuando salgamos victoriosos, debemos ser capaces de ponernos en marcha de inmediato. Nuestros planes de recuperación económica asegurarán que América siga siendo competitiva a nivel global, incluso con una capacidad inicialmente reducida\".\n\n\"Bien. Nos alegra que reconozcan esto\". Schwab se recostó. \"El «cáncer populista» es global, y el «Gran Reinicio» es nuestra oportunidad. Si América lidera con el ejemplo, podemos restaurar la cordura. Pero este conflicto necesita una conclusión rápida y decisiva\".\n\nEl director Burns asintió, \"Tenga la seguridad, Herr Schwab, de que estamos tomando todas las medidas necesarias para asegurar precisamente eso\"."
 nss.68.a: "Orden, Capital, Pureza."
 nss.69.t: "La Sala de Situación"
 nss.69.d: "Desde una sala de reuniones segura, el futuro del esfuerzo bélico pendía de un hilo. En la pantalla principal, un mapa de los fracturados Estados Unidos brillaba ominosamente, teñido con los tonos de una nación que se desmoronaba por las costuras. El zumbido de los servidores y las líneas de comunicación encriptadas eran los únicos sonidos que rompían el silencio mientras la sala llena de oficiales militares y de inteligencia transmitía las últimas actualizaciones del frente.\n\n\"La condición del presidente es estable\", dijo el consejero de Seguridad Nacional Jake Sullivan, rompiendo el silencio. Su voz era tensa, el estrés de la situación actual evidente en su tono. \"Es decir, permanece médicamente pacificado. La narrativa oficial de que está dirigiendo valientemente el esfuerzo bélico desde la Casa Blanca, como siempre, sigue siendo cierta\".\n\nJeffrey A. Kruse, jefe de la DIA, señaló el mapa con un dedo. \"La narrativa no es el problema. El problema está aquí\", gesticuló hacia Denver. \"Los constitucionalistas están haciendo una jugada seria por la Costa Este. El traido general Flynn tiene el mando de múltiples brigadas del Ejército y de la Guardia Nacional, sin mencionar vastas extensiones de milicias extremistas. Tienen la intención de romper la línea del frente actual\".\n\nOtra voz interrumpió desde un rincón oscuro de la sala. David Marlowe, subdirector de Operaciones de la CIA, dio un paso adelante. \"El pensamiento convencional es lo que nos metió en este lío. Mientras el ejército de Milley libra una guerra de desgaste, mis activos pueden terminar con este empuje de manera decisiva. Déjenme cortar la cabeza de la serpiente\".\n\nLarry Fink, CEO de BlackRock y el representante de facto del FEM en la sala, expresó sus preocupaciones. \"Nuestra prioridad es minimizar cualquier impacto económico adicional\", dijo. \"Cualquier operación encubierta debe tener esto en consideración\".\n\nKruse miró a Fink con furia. \"Lo único en riesgo es la nación, Larry. Tus carteras apenas son la prioridad aquí\". La respuesta de Fink fue una réplica mordaz sobre la \"estabilidad nacional\", mientras Marlowe interrumpió con un comentario sobre cómo la 'estabilidad nacional' era un oxímoron en este punto.\n\nEl director Burns estaba al frente de la mesa. El peso de una nación -o lo que queda de ella- recaía sobre sus hombros. Los Cognoscenti, este consejo de necesidad, lo miraban a él. Su decisión podría determinar el destino de millones y el curso de la guerra. El director revisó sus opciones..."
 nss.69.a: "Autorizar el plan de Kruse."
 nss.69.b: "Proceder con el plan de Marlowe."
 nss.69.c: "Fink tiene razón."
 nss.70.t: "A través de un cristal oscuro"
 nss.70.d: "El centro de mando bajo el Pentágono está lleno de actividad. Los oficiales revisan informes, los agregados se mueven de un escritorio a otro. El general Milley, comandante del Estado Mayor Conjunto, ha convocado al director Burns por un asunto inmediato. El rostro de Milley está marcado por la fatiga y sus palabras tienen un tono de preocupación. El general señaló la pantalla, un mapa que ilustraba la línea del frente constitucionalista.\n\n\"Director, hemos localizado al general Christopher G. Cavoli. SIGINT de la NSA, confirmado por una fuente en su estructura de mando. Él es el comandante operativo aquí: carismático, brillante y, crucialmente, el pegamento que mantiene unidas a varias Brigadas de Combate y unidades de milicia. Su enfoque de 'liderar desde el frente' le ha dado fama y lo ha colocado peligrosamente cerca de nuestras líneas del frente. Es la mayor amenaza en el frente occidental\".\n\nJake Sullivan, el consejero de Seguridad Nacional, intervino: \"Cavoli podría convertirse en el próximo Patton o Rommel. Sacarlo del tablero paralizaría el mando y control regional, potencialmente durante meses. Podría ser el punto de inflexión que necesitamos en el frente occidental\".\n\nEl director Burns estudió el mapa, frunciendo el ceño. \"Si Cavoli es como usted dice, entonces hay que encargarse de él\".\n\nMilley continuó: \"Sin embargo, su centro de mando está protegido por múltiples capas de defensa aérea integrada. Un ataque aéreo convencional está fuera de discusión. Tenemos dos opciones viables para la eliminación; cualquier cosa más elaborada sería su terreno, director\".\n\nSullivan asintió. \"Hay algunos en Denver que desconfían de su rápido ascenso y lo ven como un rival político del general Flynn. Podríamos aprovechar estos sentimientos e instigar una purga. La desventaja, por supuesto, es la imprevisibilidad de estos constitucionalistas; todo esto podría volverse en nuestra contra\".\n\n\"O podríamos eliminar a Cavoli con una bomba antibúnker, disparada desde un B-52 a máxima distancia de seguridad, mucho más allá del alcance de la amenaza SAM\", replicó Milley. \"El problema con esa opción es la posibilidad de un evento con víctimas masivas, ya que su centro de mando está muy cerca de viviendas civiles\".\n\nSullivan interrumpió: \"Tales imágenes serían... terribles, por supuesto\".\n\nEl director consideró sus opciones, sopesó los pros y los contras de cada una. El destino de Cavoli era ahora su decisión."
 nss.70.a: "Lanzar un ataque táctico con bomba antibúnker."
 nss.70.b: "Utilizar al infiltrado."
 nss.70.c: "Sembrar paranoia."
 nss.71.t: "Dominós de las Rocallosas"
 nss.71.d: "La decisión de renunciar a un ataque directo contra el general Cavoli en favor de una operación psicológica fue recibida con tranquila contemplación por los Cognoscenti. No hubo una victoria visceral inmediata, pero las semillas de la paranoia fueron sembradas. Bajo la dirección de Burns, la División de Guerra de Información de la CIA elaboró meticulosamente una serie de comunicados falsificados, mensajes cifrados y registros financieros. Estos documentos, diseñados para sugerir que el General Cavoli estaba negociando una paz separada con Washington a cambio de amnistía, fueron filtrados a través de un canal comprometido en lo profundo de la red del Gobierno de Denver.\n\n\"La charla inicial es prometedora\", informó un analista de comunicaciones, señalando un pico en el tráfico cifrado entre el servicio de seguridad interna de Denver y su alto mando. \"Están persiguiendo fantasmas. Los aliados de Cavoli en la cúpula están siendo escudriñados, y el propio General ha sido puesto bajo arresto domiciliario, a la espera de un juicio por traición. Esto puede tener un efecto en su moral y estabilidad de mando en la región\".\n\n\"No es la decapitación que esperábamos con un ataque, pero hemos metido una cuña en su máquina\", coincidió Marlowe, Subdirector de Operaciones de la CIA. \"Ahora están mirando hacia adentro, redoblando las pruebas de lealtad a Trump\".\n\nEl general Milley gruñó, poco convencido. \"Veamos si esta 'cuña' puede detener una columna de tanques\"."
 nss.71.a: "La operación es un éxito."
 nss.72.t: "Bunker Buster"
 nss.72.d: "\"General, tiene autorización para la operación LONESOME DOVE. Ejecute la opción Bravo\", afirmó Burns, con voz tranquila y firme.\n\nEl general Milley asintió sombríamente, hablando por su unidad de comunicaciones. \"Mando Skyfire, aquí Olympus. Lonesome Dove en marcha. Repito, Lonesome Dove en marcha. Liberen la carga útil sobre el objetivo designado\". Volvió a mirar el mapa holográfico. \"Un B-52 Stratofortress ya está en patrón de espera sobre territorio amigo. Despegará y se dirigirá al oeste en un minuto. Impacto en aproximadamente dos horas\".\n\nSullivan cambió su peso, con expresión preocupada. \"Director, sus redes de propaganda se darán un festín con esto. Nos pintarán como monstruos, bombardeando nuestro propio país. Esto galvanizará su reclutamiento\".\n\nAnte esto, el director Burns apenas se inmutó. \"Ya nos pintan como monstruos\", respondió, apartándose del mapa. \"Que lo hagan. Esta no es una batalla por los corazones y las mentes, Jake. Esta es una guerra de exterminio. Que el corazón del país escuche el trueno de nuestra determinación. Que sus generales sepan que ni siquiera sus búnkeres están a salvo de nuestro alcance. El único idioma que entienden es la fuerza, y tengo la intención de hablarles en un dialecto que no podrán evitar escuchar\".\n\nEl general Milley se inclinó. \"Diré una cosa, director: tiene agallas\".\n\n\"Me aseguraré de que el Departamento de Estado esté en alerta para mitigar cualquier repercusión\", dijo Marlowe.\n\nEl director asintió. \"Asegúrese de hacerlo, Marlowe\"."
 nss.72.a: "La operación es un éxito."
 nss.73.t: "Veneno"
 nss.73.d: "La decisión de Burns se tomó con el frío cálculo de un oficial de inteligencia experimentado. La orden fue transmitida a través de canales encriptados, desde el centro de mando debajo del Pentágono, a través de satélites seguros, hasta un agente esperando incrustado en el alto mando del general Cavoli. No habría explosiones, ni martirios heroicos, solo una terminación silenciosa y negable. El potencial de repercusiones era mínimo, las recompensas inmensas.\n\nDentro de la sala de operaciones de Langley, el ambiente era tenso. \"El paquete ha sido entregado\", afirmaste, el eufemismo clínico flotando en el aire. \"Nuestro activo confirmó que el chef personal de Cavoli lo tiene en sus manos. Esperamos\".\n\nHoras más tarde, un destello de un mensaje encriptado iluminó una pantalla en la habitación oscura: Operación exitosa. Cavoli eliminado. Fue simple, directo y absolutamente devastador.\n\n\"Bueno, director, parece que la «opción silenciosa» ha producido el resultado más ruidoso\", murmuró el subdirector de Operaciones de la CIA, Marlowe, con una sombra de una sonrisa apenas visible en su rostro. El director, en respuesta, simplemente asintió.\n\n\"Empiecen a preparar la narrativa de contrapropaganda. Cuanto más podamos hacer que esto parezca un trabajo interno, mejor\", afirmaste.\n\n\"Entendido, director\", reconoció Marlowe. Hizo una pausa por un momento, considerando. \"Con Cavoli fuera, su estructura de mando estará en desorden. Podríamos presionar fuerte en la ofensiva aquí\".\n\nBurns asintió. \"Le pasaré la palabra a Kruse y Milley. Buen trabajo, Marlowe. Esto podría cambiar el rumbo en el oeste\".\n\nMarlowe respondió: \"Es lo que hacemos, director\"."
 nss.73.a: "La operación es un éxito."
 nss.74.t: "Operación fracasa"
 nss.74.d: "INTERNO CIA/CI - SOLO PARA OJOS\nASUNTO: Christopher G. Cavoli\nFECHA: REDACTADO\nCLASIFICACIÓN: ALTO SECRETO//NOFORN\n\nEl sujeto ha sobrevivido al intento de eliminación. Este fracaso probablemente galvanizará al enemigo. Se está investigando una posible filtración dentro de nuestra red.\n\nEl fracaso es un momento de aprendizaje para todos los involucrados."
 nss.74.a: "- DB"
 nss.75.t: "El gran tablero"
 nss.75.d: "El centro de mando había estado a rebosar desde que comenzó la guerra. Era un caos Ordenado: docenas de personas se movían constantemente, pero nadie se estorbaba; adjuntos, órdenes y transcripciones pasaban de un escritorio a otro en segundos, pero nunca se perdían. Alguien poco profesional interrumpiría este flujo, pero ninguno de ellos lo era. Aparte de todo esto, había una oficina solitaria, una oficina donde el general Milley, comandante del Estado Mayor Conjunto, informaba al director Burns. El general señaló una pantalla que mostraba un mapa de los frentes europeos: cada nación un tono diferente de rojo neón, contrastado por el azul neón salpicado por Europa, que representaba las posesiones americanas. El Director Burns mantuvo su mirada gélida, estudiando cada detalle del gráfico ante él.\n\nLa voz del general Milley transmitía confianza, pero sus ojos oscurecidos contaban una historia diferente. \"Los europeos han demostrado ser mucho más duros de lo que creíamos, director. Las simulaciones realizadas por la Corporación RAND muestran que la fuerza bruta eventualmente doblegará a los europeos, pero las pérdidas -en personal y armamento- serían costosas\".\n\nBurns escuchó atentamente cada palabra, con el ceño fruncido. \"¿Hemos identificado alguna vulnerabilidad interna?\"\n\"Precisamente por eso solicité esta reunión, director. Los europeos están plagados de inestabilidad, divisiones y fallas de infraestructura\", respondió Milley.\n\nMilley continuó: \"Existen divisiones extremas entre los altos mandos alemán y francés, ya sea por conflictos raciales, revanchismo territorial o cualquier número de pequeños desacuerdos. Podríamos exacerbar estas divisiones, pero sería arriesgado. Un ciberataque también es una opción. El Cibercomando ya ha identificado debilidades clave en la ciberseguridad de los europeos. Con ciberataques continuos, podríamos cortar redes eléctricas, métodos de comunicación, todo. Pero si no somos cuidadosos, los europeos podrían darse cuenta y solucionar la vulnerabilidad antes de que se pueda causar un daño real. Cualquier otra cosa depende de usted, director\".\n\nEl director Burns contempló cada opción disponible. Cada una tenía sus pros y sus contras y sus riesgos, cada una podría ser perjudicial para el esfuerzo bélico. Pero la inacción es el mayor pecado de todos."
 nss.75.a: "Explotar las divisiones internas europeas."
 nss.75.b: "Preparar un ciberataque masivo contra la infraestructura europea."
 nss.75.c: "Financiar a luchadores de la libertad democráticos."
 nss.76.t: "Gladio"
 nss.76.d: "La decisión de canalizar aún más armas y municiones a manos de disidentes europeos fue recibida inicialmente con escepticismo e hipótesis por parte de los Cognoscenti. \"Si la gente se entera de que los disidentes estaban siendo apoyados por nosotros, podría ser una pesadilla para la imagen pública\", y \"Incluso podría alimentar su causa\". Han pasado algunas semanas, y esas voces han guardado silencio. Las semillas plantadas por el director Burns ya están dando sus frutos.\n\nEl consejero de Seguridad Nacional, Jake Sullivan, había llamado al director Burns a otra sesión informativa. Señaló la pantalla frente a ellos; en ella había varias imágenes de un centro urbano de algún tipo. Cristales rotos y trozos de ladrillo cubrían la calle. Había cuerpos esparcidos, todos cubiertos de hollín y polvo. Sin duda, este era el resultado final de un ataque terrorista, pensó Burns.\n\nSullivan explicó, con voz firme y serena: \"A las 9:00 CEST, en Leipzig, Alemania, una bomba detonó en el concurrido centro de la ciudad, matando a veintinueve e hiriendo a doscientos. Creo que este es otro ataque cometido por esta nueva ola de disidentes europeos, los que han recibido nuestra financiación. En los últimos días, las autoridades de Alemania, Francia e Italia se han apresurado a señalar con el dedo. Algunos culpan al extremismo de ultraderecha de nueva ola, otros han culpado a los izquierdistas radicales por el reciente terror\".\n\nSullivan hizo clic en diferentes imágenes, cada una más sangrienta que la anterior. Sin embargo, todas compartían un denominador común: todas ocurrieron en las últimas semanas, y todas han causado estragos en los regímenes europeos. Burns escuchó atentamente cada detalle trágico y estudió cada imagen. No se inmutó ni una sola vez, notó. Los informes coincidían con sus proyecciones. En ese momento supo que había tomado la decisión correcta."
 nss.76.a: "La operación es un éxito."
 nss.77.t: "Cortinas de humo"
 nss.77.d: "La División de Guerra de Información de la CIA se había superado esta vez. Cada píxel, cada palabra del documento ante el director Burns -el que acababa de ser «filtrado» al alto mando alemán- era indistinguible del original. Si el director Burns no fuera un hombre tan observador, difícilmente lo reconocería como una falsificación.\n\nEstos «planes de guerra» para la partición francesa del territorio alemán cumplían todos los requisitos, cruzaban todas las líneas y eran todo aquello contra lo que los alemanes habían rezado. Si Berlín creyera esta filtración, no se sabe cuán profundas podrían ser las fracturas en el alto mando europeo. El general Milley, Comandante del Estado Mayor Conjunto, se removió en su asiento, murmurando para sí mismo sobre todas las posibles formas en que esta operación podría salir mal. Burns, sin embargo, permaneció inmóvil, esperando las primeras señales de vida de los canales de comunicación.\n\nEl silencio se rompió cuando un analista de comunicaciones a su lado informó: \"Estoy viendo algo de actividad aquí, señor\".\nDurante los siguientes cinco minutos, las comunicaciones cifradas entre la Seguridad Interna alemana y el alto mando se hicieron cada vez más frecuentes. Los alemanes estaban claramente furiosos, hirviendo ante la idea de que los franceses se creyeran capaces de desmantelar el Estado alemán. Se prepararían reuniones que llevarían a interminables discusiones. Los puentes con sus «camaradas» franceses se quemarían. Todo mientras los Estados Unidos de América cosechaban las recompensas.\n\nMientras el general Milley soltaba un suspiro de alivio, el rostro del director Burns mostraba una sonrisa engreída. Ahora era el momento de observar."
 nss.77.a: "La operación es un éxito."
 nss.78.t: "Eclipse"
 nss.78.d: "Los ciberataques contra la infraestructura europea llevan seis días. El séptimo sería su apoteosis. El domingo, comenzó a pequeña escala: algunas interrupciones en sitios web gubernamentales para tantear el terreno. El lunes, solo escalaría; cierres de oleoductos, comunicaciones interrumpidas. Pero los europeos aún no reaccionaron. Esto continuó hasta ahora, sábado, el día que decidiría el éxito o fracaso de esta operación.\n\nEn lo profundo de los muros de la sede de la NSA, el director Burns esperaba, con el ceño fruncido mientras miraba fijamente la colosal pantalla frente a él. A su lado estaba Paul Nakasone, director de la Agencia de Seguridad Nacional y del Cibercomando de EE.UU.\n\n\"¿Cuál es el estado del ciberataque?\", preguntó Burns, con voz severa e inquebrantable.\nLa voz de Nakasone transmitía una sensación de confianza. Señaló la pantalla. \"Todo salió a la perfección, director. Deberíamos ver los resultados en cualquier momento\".\n\nPronto, la sala zumbaba. Los oficiales se preparaban, hacían llamadas y tecleaban en sus teclados. Luego, se mostró en la pantalla. Europa. Completamente a oscuras. Sus redes eléctricas habían sido eliminadas de un solo golpe. Las únicas señales de luz eran pequeños puntos blancos esparcidos por el continente como estrellas en un cielo de medianoche. Era hermoso, casi. Si Burns no hubiera estado acostumbrado a esto, podría haberse conmovido.\n\n\"No solo eso\", añadió Nakasone, \"sino que sus servicios de agua también han sido cortados. Y sus comunicaciones. Es posible que los europeos esperaran un ataque, pero nunca habrían predicho algo de esta escala. Su maquinaria de guerra sufrirá enormemente por esto\". Nakasone terminó, sonriendo con confianza.\n\nLos hombros de Burns se relajaron, y se volvió para mirar a Nakasone, \"Entendido. Buen trabajo, director\". Volvió a mirar la pantalla, estudiando cada señal de vida en el continente, preparándose para el siguiente movimiento."
 nss.78.a: "La operación es un éxito."
 nss.79.t: "Operación fracasa"
 nss.79.d: "INTERNO CIA/CI - SOLO PARA OJOS\nASUNTO: Operación de inteligencia europea\nFECHA: XX/XX/XXXX\nCLASIFICACIÓN: ALTO SECRETO // NOFORN\n\nLa operación de inteligencia propuesta contra los regímenes en Europa ha fracasado. Es probable que el fracaso resulte en una mayor unificación del enemigo contra nuestra operación militar.\n\nDebemos entender qué causó este fracaso para evitarlo en el futuro."
 nss.79.a: "- DB"
 nss.80.t: "Homecoming"
 nss.80.d: "\"Realmente no lo creo\".\n\nDos soldados americanos vigilaban una ciudad europea ocupada por el enemigo, un sabor familiar de tirano que mantenía su control sobre el continente una vez más. El bosque en el que acampaban estaba cubierto de niebla y los sonidos de disparos lejanos parecían desconectados del mundo natural.\n\n\"¿Por qué no? Ya sangramos aquí antes, dos guerras mundiales y sin mencionar a nuestros ancestros. ¿Cuántos de nuestros predecesores tuvieron sus cráneos partidos en dos? ¿Cuántas cicatrices llevamos de las edades? ¿No se siente todo esto tan familiar? ¿Como si ya hubiéramos estado aquí antes?\"\n\n\"Exactamente\".\n\nLos dos soldados siguieron hablando bajo la niebla de Europa, ya habían estado aquí antes y también lo harían sus hijos. Un continente ligado en sangre y fuego que siempre cumplirá su ciclo de renovación. En un mundo diferente, las tierras europeas serían invadidas por locos, conquistadas por los rusos o aniquiladas por algo para lo que simplemente no tenemos nombre.\n\n\"Sabes que hay una cosa de la que me arrepiento\".\n\"¿Qué?\"\n\"No haberle disparado a uno de esos jabalíes que vimos antes mientras caminábamos por estos bosques y luego comérnoslos\".\nEl otro soldado se ríe, \"Eres imposible\".\n\"Oye, no puedo evitarlo, es lo que solíamos hacer\".\n\nLa noche llegó rápidamente, las estrellas en el cielo estaban en su estado más puro sin luz artificial."
 nss.80.a: "\"Volvamos aquí una vez que todo esto termine\"."
 nss.81.t: "Celebración Nacional de la Victoria - Operación Orinoco Storm"
 nss.81.d: "Con los restos destrozados de la resistencia organizada venezolana ahora ardiendo en las calles, Estados Unidos declaró oficialmente su victoria sobre el Régimen Bolivariano. El anuncio llegó después de que el personal de alto rango de las Fuerzas Armadas Nacionales Bolivarianas -aquellos que no habían sido capturados en redadas nocturnas- se rindiera formalmente, mientras que los principales cuadros del PSUV huyeron al exilio. En toda la nación, la administración decretó una semana de celebraciones y desfiles en honor a quienes habían \"liberado\" el país sudamericano.\n\nLas calles de Washington, D.C. estaban cubiertas de guirnaldas rojas, blancas y azules mientras las unidades victoriosas de la Operación Tormenta del Orinoco marchaban al unísono por la Avenida Pennsylvania. Tanques M1A2 Abrams retumbaban junto a lanzadores HIMARS, un brutal recordatorio de la abrumadora superioridad tecnológica americano. En lo alto, F-22 Raptors y B-2 Spirits surcaban las nubes en formación, proyectando sombras sobre multitudes de espectadores adoradores que ondeaban banderas americanas con un fervor casi religioso. Fue un espectáculo cuidadosamente coreografiado para evocar recuerdos del triunfo de la Tormenta del Desierto, pero esta victoria se había logrado sin periodistas incrustados ni supervisión del Congreso.\n\nDesde la Oficina Oval, el Presidente -rodeado por los Jefes del Estado Mayor Conjunto en uniformes de gala con rostros de sombría satisfacción- pronunció un discurso televisado a la nación, elogiando a los \"valientes hombres y mujeres del Comando Sur de EE. UU.\" por \"desmantelar expeditivamente el régimen narcoterrorista que amenazaba a nuestros vecinos caribeños\". El Presidente omitió mencionar las bajas civiles, el bombardeo de choque y pavor de Caracas, o las masacres extrajudiciales perpetradas por la SAC de la CIA. El evento también mostró la fuerza militar americana en medio de las crecientes tensiones con China. Expertos geopolíticos y la prensa nacional consideran la rápida derrota del Régimen Bolivariano como un hito en la restauración de un orden mundial basado en reglas.\n\nEl Gobierno interino venezolano ha prometido estabilidad y cooperación con los socios americanos y de la OEA para asegurar las fronteras y eliminar la resistencia restante. Las tropas del ejército estadounidense estacionadas en todo el país asisten a las fuerzas locales en el mantenimiento de la paz y la protección de la infraestructura vital contra los insurgentes. En las próximas semanas, se llevará a cabo una conferencia en Washington para abordar la reestructuración del Estado venezolano y la transición a una república plenamente democrática en línea con las directrices establecidas por expertos en política internacional."
 nss.81.a: "La paz es nuestra profesión."
 nss.82.t: "Celebración Nacional de la Victoria - Operación Tropic Thunder"
 nss.82.d: "El colapso del régimen centroamericano ha significado la sentencia de muerte para la marea humana de refugiados y drogas hacia América. Con los remanentes del ejército centroamericano emitiendo una rendición formal al Comando Sur de EE.UU. y el Gobierno civil huyendo discretamente, las hostilidades organizadas han llegado a su fin en todos los frentes. Una victoria rápida que ha sido elogiada por todas las partes involucradas. En una muestra de unidad, el Congreso aprobó una resolución bipartidista elogiando a los valientes hombres y mujeres del Comando Sur de EE.UU., así como al liderazgo de la administración actual. Se han ordenado celebraciones de una semana de duración en todo el país para conmemorar sus logros.\n\nEn las calles de Washington, D.C., multitudes de espectadores patrióticos ondean banderas y corean al unísono, con sus rostros iluminados por el celo y el fervor patriótico. En lo alto, bombarderos B-52 surcan el cielo azul en sobrevuelos ensordecedores, seguidos por las elegantes formas de punta de flecha de los F-35. En tierra, un desfile de vehículos blindados Stryker y vehículos de combate Bradley retumban en formación por el National Mall. El equipo militar y el personal americano se exhiben en todo su poder, mientras soldados triunfantes del Comando Sur de EE.UU. marchan al unísono.\n\nCon este triunfo militar llega un renovado sentido de optimismo entre la población, de que finalmente se logrará la estabilidad en una región que durante mucho tiempo había sido una espina perenne en el costado de la prosperidad y seguridad americanos. El Departamento de Estado ha prometido apoyo a los Gobiernos civiles interinos en Centroamérica, mientras que las tropas americanas permanecerán en el país el tiempo que sea necesario para asegurar la frontera y garantizar la paz. Los días de las crisis migratorias y de drogas parecen estar llegando a su fin, un nuevo capítulo de progreso amanece para una región tan largamente plagada de corrupción y violencia.\n\nUna \"Autoridad Provisional de USSOUTHCOM\" supervisará la transición hacia una \"gobernanza ordenada\", con expertos financieros internacionales guiando la reestructuración y reconstrucción económica. El Presidente ha extendido sus felicitaciones a todas las partes involucradas, así como a los valientes soldados que arriesgaron sus vidas por la seguridad y prosperidad de las Américas."
 nss.82.a: "La paz es nuestra profesión."
 nss.83.t: "Celebración Nacional de la Victoria - Operación Havana Vice"
 nss.83.d: "Tras el colapso de las Fuerzas Armadas Revolucionarias de Cuba y la subsiguiente caída del régimen comunista, el Departamento de Defensa ha declarado la victoria y el fin formal de las hostilidades en la isla. Con la mayoría de la cúpula militar cubana capturada o muerta, y los altos mandos del Gobierno huyendo del país, la resistencia organizada ha llegado efectivamente a su fin. El Congreso aprobó una resolución bipartidista elogiando el liderazgo militar del Comando Sur de EE.UU. y celebrando su rápida victoria. Durante una semana, se llevaron a cabo festividades obligatorias en todo el país.\n\nEn las principales ciudades como Miami, Washington D.C. y Nueva York, el ambiente era de júbilo mientras las tropas que regresaban eran recibidas con fanfarrias y una recepción triunfal. En el National Mall, formaciones de helicópteros AH-64 surcaban el aire, seguidas por V-22 Ospreys que transportaban a infantes de marina de EE.UU. Tanques, obuses autopropulsados y los drones de combate más nuevos se exhibieron junto con el equipo militar que había aplastado tan a fondo a las fuerzas comunistas. En medio de la algarabía patriótica y el rugido del poderío militar, hay una sensación generalizada de reivindicación entre la multitud.\n\nLa diáspora cubana en Florida ha elogiado la rápida victoria de la administración como una justicia largamente esperada, mientras que las celebraciones en La Habana se llevaron a cabo paralelamente a las de Washington. Las solicitudes de vuelos renovados a Cuba ya han inundado los aeropuertos americanos, ya que los cubanos en el extranjero buscan reconectarse con sus seres queridos en la isla después de un largo y doloroso distanciamiento.\n\nLa nación isleña ahora está lista para ser reintegrada a la comunidad global. El liderazgo civil interino que había llenado el vacío después de los acontecimientos se ha comprometido a celebrar elecciones libres y justas, así como a cooperar plenamente con los esfuerzos de EE.UU. para reintegrar a Cuba en las redes comerciales globales. El presidente y el USSOUTHCOM han prometido trabajar junto con las autoridades de transición civiles para garantizar la seguridad del pueblo cubano, al tiempo que proporcionan estímulos económicos para ayudar a llevar a la nación al siglo XXI."
 nss.83.a: "La paz es nuestra profesión."
 nss.84.t: "Celebración Nacional de la Victoria - Operación Desert Sentinel"
 nss.84.d: "Con la fragmentación total del ejército iraquí y la captura de las principales figuras políticas y militares del país, se ha declarado el fin formal de las hostilidades en Irak. El Congreso, en una muestra de unidad bipartidista, aprobó una resolución elogiando la rápida victoria de las Fuerzas Armadas de EE.UU. y honrando a sus héroes caídos. El Departamento de Defensa ordenó una celebración de una semana para conmemorar esta significativa victoria en el Medio Oriente, reconociendo el papel del poder americano en traer la paz a Irak.\n\nUna vez más, el National Mall se ha convertido en un escaparate del poderío militar, mientras tanques americanos, obuses autopropulsados, drones de combate y formaciones de infantería desfilan por la Avenida Pennsylvania en un triunfo al estilo romano. Estas celebraciones, ordenadas por la administración, se han extendido a todas las principales ciudades americanas, donde las multitudes ondean banderas, corean lemas patrióticos y celebran el regreso de sus tropas. El presidente elogió el liderazgo militar de EE. UU., enfatizando el compromiso de la administración de fomentar un Medio Oriente seguro y estable, así como de asegurar que Irak siga siendo un aliado crucial en la lucha contra el terror global, sin mencionar los supuestos crímenes de guerra americanos.\n\nGrupos de expertos y expertos geopolíticos han elogiado el uso efectivo de nuevas tecnologías por parte del USCENTCOM para minimizar las bajas militares americanas, al mismo tiempo que lograron una derrota total del enemigo. Un final decisivo para el conflicto, afirman, allanará el camino para el resurgimiento de un Irak pacífico y democrático.\n\nYa se han elaborado planes para el nuevo Gobierno interino en Bagdad, con la asistencia de profesionales de políticas en Washington. La administración militar del USCENTCOM trabajará de la mano con las nuevas autoridades civiles para asegurar una rápida reconstrucción y reingreso a la comunidad internacional."
 nss.84.a: "La paz es nuestra profesión."
 nss.85.t: "Tropas estadounidenses entran en Ottawa"
 nss.85.d: "Tras la firma del Acuerdo de Seguridad Norteamericano por parte del Gobierno de Trudeau, miles de tropas estadounidenses entraron en Canadá. Su misión: ayudar al personal de seguridad canadiense y a la Real Policía Montada de Canadá a mantener el orden, así como a colaborar en la detención y el encarcelamiento de \"extremistas domésticos\" y \"nacionalistas blancos\" que amenazan la estabilidad canadiense. Se celebró un breve desfile conjunto en Ottawa para conmemorar el acuerdo, con tropas estadounidenses y canadienses marchando al unísono por las calles de la ciudad, mientras CF-18 Hornets y F-16 sobrevolaban. El personal de seguridad canadiense, junto con las fuerzas estadounidenses, también está trabajando en conjunto para proporcionar la tan necesaria ayuda en caso de desastre tras un duro invierno que había interrumpido gravemente las actividades diarias en varias provincias.\n\nEl personal estadounidense ha expresado su entusiasmo por ayudar a mantener la paz en su vecino del norte, al igual que los funcionarios de seguridad canadienses, que agradecen la ayuda adicional. Las protestas contra el acuerdo fueron rápidamente sofocadas, y las cuentas bancarias de sus cabecillas fueron congeladas, citando el CSIS \"lazos con el terrorismo nacionalista blanco\" y \"organizaciones militantes de extrema izquierda\" como razones. En un comunicado de prensa conjunto exclusivo con el Primer Ministro de Canadá, el Presidente elogió el acuerdo y prometió su apoyo a la continua estabilidad de Canadá y su compromiso con el orden mundial internacional basado en reglas.\n\n\"Al firmar este acuerdo, estamos entrando en una nueva fase de la amistad canadiense-estadounidense, renovando nuestro compromiso con la paz, la seguridad y la prosperidad internacionales\", declaró el presidente en un discurso en video. \"Este paso histórico es solo el comienzo, ya que esperamos profundizar nuestra cooperación bilateral y promover nuestros valores democráticos compartidos. Juntos, construiremos un futuro mejor y más seguro para ambas naciones\"."
 nss.85.a: "La paz es nuestra profesión."
 nss.86.t: "USSOUTHCOM anuncia la paz en Haití"
 nss.86.d: "El Departamento de Defensa ha declarado el fin de las hostilidades importantes en Haití. Las Fuerzas Armadas de EE.UU., desplegadas bajo la autorización de la bandera de la ONU y trabajando junto a las fuerzas de paz y unidades militares privadas, han tomado todos los sitios gubernamentales y militares cruciales y han arrestado con éxito a las figuras principales de las principales organizaciones criminales. La operación ha sido descrita como \"sistémica\" en su eliminación de elementos criminales, mientras que la administración ha elogiado la victoria decisiva del USSOUTHCOM al traer la paz al Caribe.\n\nSegún un portavoz de la Casa Blanca, el gobierno interino de Haití se ha comprometido a celebrar elecciones libres, justas e inclusivas en un plazo de dos años. Este compromiso con los principios democráticos y el estado de derecho marca un punto de inflexión significativo para un país que ha lidiado durante mucho tiempo con la inestabilidad y los conflictos. La comunidad internacional, principalmente los Estados Unidos, la ONU y la OEA, brindará apoyo técnico y financiero para garantizar la credibilidad de estos procesos electorales y la exitosa transición al gobierno civil.\n\nLa presencia estadounidense en el país se mantendrá en el futuro previsible, asistiendo en el desarrollo, operaciones contrainsurgentes y tareas generales de mantenimiento de la paz, para asegurar que la paz en el país se mantenga como tal. El presidente ha elogiado el éxito de la operación, sin hacer comentarios sobre las supuestas atrocidades perpetradas por el personal estadounidense en el país."
 nss.86.a: "La paz es nuestra profesión."
 nss.87.t: "Itamaraty firma acuerdo de bases con EE.UU."
 nss.87.d: "En un hecho sin precedentes, el Itamaraty ha acordado permitir el despliegue de las Fuerzas Armadas de EE.UU. en Brasil. El ministerio de Asuntos Exteriores brasileño citó los crecientes desafíos de seguridad, incluyendo el narcotráfico, el crimen organizado transnacional y la amenaza de grupos extremistas de extrema derecha. Muchos analistas ven esta medida como un cambio estratégico en la política exterior de Brasil y una victoria significativa para los esfuerzos de EE.UU. por reforzar su influencia regional. El despliegue estadounidense incluirá un número sustancial de personal militar, así como capacidades avanzadas de vigilancia e inteligencia, con el USSOUTHCOM enfatizando su compromiso de respetar la soberanía brasileña y trabajar estrechamente con las fuerzas de seguridad brasileñas.\n\nEl Gobierno brasileño ha asegurado al público que este acuerdo es parte de un esfuerzo más amplio para mejorar la cooperación bilateral y la seguridad regional, y no es un reflejo de ninguna inestabilidad o debilidad interna. El propio presidente Meirelles ha elogiado el acuerdo como \"una victoria para ambos países y para la paz regional\", enfatizando que permitiría una mayor cooperación para abordar amenazas compartidas. Los críticos, sin embargo, argumentan que este acuerdo podría socavar la larga tradición de autonomía estratégica e independencia de Brasil. Los partidos de oposición han condenado la decisión del Itamaraty, alegando que compromete la seguridad nacional y abre la puerta a la intervención estadounidense en los asuntos internos brasileños.\n\nEn Washington, el Departamento de Defensa y la Casa Blanca han acogido con satisfacción el acuerdo, viéndolo como un gran paso adelante para consolidar la posición de Estados Unidos como la potencia preeminente en el hemisferio occidental, sin mencionar el papel de la CIA en el apoyo al nuevo Gobierno."
 nss.87.a: "La paz es nuestra profesión."
 nss.88.t: "Máscara rota"
 nss.88.d: "Los héroes de hoy son los monstruos de mañana. Después de que Judas cumpliera su misión y el mundo mirara a los Estados Unidos con ojos de odio, este sentimiento se confirmaría cada día.\n\nCada acto moralmente cuestionable que hicimos entre bastidores salió a la luz, cada individuo asociado a ellos fue identificado por activistas antisociales, y con una lista tan larga como esa, habría un ajuste de cuentas.\n\nCuando una turba asalta un palacio, avanzan hacia arriba. Asegurándose de que cada piso sea limpiado, cada sirviente sea masacrado hasta que lleguen a la nobleza, y finalmente, al rey.\nLos informes de funcionarios gubernamentales siendo asesinados o simplemente muertos a plena luz del día se convierten en titulares diarios, pero la mayoría aún está nublada por la sobrecarga de entretenimiento.\nNo importa el número de ojos, la sangre escupida por los hombres y mujeres de traje sigue siendo un hecho.\n\nVarios gobiernos estatales ya nos han denunciado públicamente, y aunque fuimos rápidos en limpiar a la mayoría de ellos, algunos han demostrado ser más difíciles de someter al Orden.\n\nEl final ha terminado, y ahora somos nosotros quienes debemos limpiar el escenario."
 nss.88.a: "Y sin embargo, resistimos."
 nss.89.t: "Reclamación de la paz"
 nss.89.d: "Por segunda vez en una década, nuestros ciudadanos se alzaron en armas unos contra otros.\n\nPor segunda vez, las ciudades de nuestra nación yacen en ruinas.\n\nLa insurrección dejó otra cicatriz en los Estados Unidos. Con la farsa casi desmantelada, la gente nunca volverá a ver al gobierno de la misma manera. Pero por ahora, se ha evitado una crisis terminal.\n\nLas declaraciones oficiales del presidente y otros servidores públicos, amplificadas por la maquinaria mediática, trabajan sin descanso para restaurar la imagen de seguridad y transparencia. La narrativa está de nuevo en nuestras manos, y es perfectamente clara: un traidor en lo más profundo del Gobierno intentó socavar nuestra democracia y libertad. Todas las muertes y la destrucción fueron causadas por él, y solo por él, todo para lograr sus metas egoístas y traicioneras.\n\nSin embargo, todo fue en vano. Los Estados Unidos de América no serán derribados tan fácilmente. El Gobierno está trabajando de nuevo para asegurar la seguridad y la prosperidad de nuestros ciudadanos."
 nss.89.a: "Una lección aprendida a las malas."
 nss.90.t: "Texas se separa"
 nss.90.d: "Noticias preocupantes desde Texas, ya que informes indican que el actual gobernador ha declarado abiertamente que el estado de Texas se ha separado de la unión. Con la mascarada rota en curso, cada vez más ratas escapan del barco que se hunde.\n\nDespués de que el gobernador declarara la ley marcial en todo el estado, muchos miembros de la Guardia Nacional presentes en el estado desertaron rápidamente mientras realizaban arrestos de leales federales. Razones como \"traicionar al pueblo americano, manchar la historia americana\" fueron algunas de las muchas razones que se utilizaron como justificación para este acto de traición.\n\nCon el caos en curso en Texas, mientras grupos antisociales más pequeños intentan recuperar relevancia a través de la violencia sin sentido, también se reportan escaramuzas en la frontera, y la Guardia Nacional de Texas tiene la intención de presionar a los estados vecinos para alentarlos a abandonar la unión también.\n\nLos Estados Unidos están en crisis una vez más."
 nss.90.a: "Al traidor, ni justicia."
 nss.91.t: "California elige la traición"
 nss.91.d: "Con la reputación de los Estados Unidos de América por los suelos, no cabría duda de que los estados más ricos intentarían separarse de la Unión con la esperanza de empezar de cero, siendo California uno de ellos.\n\nLa Guardia Nacional de California derrocó rápidamente al gobernador y arrestó a cualquier funcionario federal leal a nosotros. Pronto siguieron disturbios, y cualquier grupo antisocial más pequeño presente dentro del estado está haciendo todo lo posible para desestabilizar aún más la región.\n\nDebido a nuestra ya precaria situación, inicialmente intentamos acercarnos a ellos con la mano abierta de la diplomacia, pero después de que el gobernador fuera ejecutado en televisión en vivo, parece que el Estado de California busca una pelea que no puede ganar. Una secesión exitosa resultaría desastrosa para nosotros, ya que no solo abriría el camino a la influencia extranjera, sino que también sería el comienzo de la lenta muerte de los Estados Unidos de América tal como los conocemos, potencialmente para siempre.\n\nLas operaciones de pacificación anteriores en la región han demostrado que luchar en la zona es una tarea bastante ardua, pero es una que debe hacerse de nuevo para mantener la unidad en toda la nación."
 nss.91.a: "A bombardear se ha dicho."
 nss.92.t: "Insurrección en el Noroeste"
 nss.92.d: "La independencia de Cascadia siempre ha sido un tema importante para la comunidad de inteligencia. Nuestros esfuerzos para reprimir a los insurgentes de Cascadia han sido continuos. A pesar de la eliminación de viejos grupos asociados con el movimiento independentista inicial, como el Partido del Pino y los anarquistas, el problema persiste. El anhelo de secesión permanecería junto con la actividad insurgente.\n\nHoy marca la escalada de sus actividades. Después de que se rompiera la mascarada, los cascadianos lograron aumentar sus filas, entre ellos muchos exmiembros del ejército y las fuerzas del orden. Las comunicaciones con las operaciones anti-insurgentes se desmoronaron rápidamente después de informes de ataques quirúrgicos a puestos de avanzada y patrullas.\n\nEl actual gobierno provisional de Cascadia está muy lejos de las tendencias violentas que tenía el anterior, pero con las experiencias añadidas y la apertura de los depósitos de suministros dejados por La Base, la pacificación de la región está destinada a ser igual de sangrienta.\n\nEl tiempo corre; la región tiene que arder para que se restablezca el Orden."
 nss.92.a: "No más árboles, no más caos."
 nss.93.t: "Atardecer americano"
 nss.93.d: "Hoy marcó el punto de no retorno para el mundo.\n\n\"Nosotros, el pueblo\" de los antiguos Estados Unidos de América estamos conmocionados y horrorizados. El nombre de los propios Estados Unidos es ahora sinónimo del Estado profundo y los horrores de la Segunda Guerra Civil Americana y los eventos que le siguieron. Con los Cognoscenti, la vieja América también murió, y sus Estados sucesores no tienen más remedio que seguir adelante.\n\nEl nuevo Estado, la República Federal Americana, se administra a través de los Nuevos Artículos de la Confederación, un tratado entre el Gobierno de Washington D.C., los gobiernos estatales y los Estados secesionistas, que redujo drásticamente el alcance de Washington y limitó la autoridad federal a dominios específicos: defensa mutua, comercio interestatal y coordinación de relaciones exteriores.\n\nLa descentralización extrema de cada aspecto del Gobierno, incluyendo el ejército y la Comunidad de Inteligencia, establece un sistema bajo el cual los Cognoscenti no podrían ser posible de nuevo. Algunos estados expresaron el deseo de estar aún menos conectados con el centro y se convirtieron en Estados autónomos, prácticamente imitando la experiencia de Texas y California, que se convirtieron en países completamente independientes.\n\nLos Nuevos Artículos de la Confederación, firmados en Honolulu, establecen un sistema estable, aunque disfuncional y estancado. Algunos lo ven como una solución a una constante racha de conflictos internos en los que ha entrado el país, otros lo ven como una medida a medias para dividir completamente el país, o incluso como un trampolín hacia un régimen aún más violento y abusivo. Pero por ahora no importa.\n\nPor primera vez en siglos, América espera la paz."
 nss.93.a: "En Dios no confiamos."
 nss.94.t: "Justicia sin rostro"
 nss.94.d: "\"Tengo una idea\", dijo Maddox. No estaba encadenado ni restringido de ninguna manera, pero no tenía adónde correr, y todo el tribunal estaba rodeado de guardias armados. Podrían haber sido del Ejército de EE.UU. o de la CIA; ya no había una diferencia real, no para él. \"Fui arrestado después de un comentario casual a un colega\".\n\n\"¿Y niega haber hecho ese comentario?\", preguntó el fiscal. El panel de jueces detrás de sus máscaras y su plataforma elevada lo miraban con ojos sin emoción. Esto también era insultante. Se sentaban por encima de él como si no fuera uno de ellos.\n\n\"No, señor\", respondió, apretando la mandíbula. \"Pero solo estaba haciendo una broma\".\n\n\"Las bromas son un reflejo de lo que un hombre realmente piensa\", respondió el juez del centro. \"Y podemos ver a través de usted, Coronel. Su insinceridad y deslealtad son claras para todos nosotros\".\n\n\"Mi lealtad es a la Constitución de los EE.UU.\", dijo Maddox con firmeza, sabiendo que sería su última oportunidad para defenderse. \"Hice un juramento y siempre lo he mantenido, pero las cosas que se están haciendo ahora...\"\n\n\"Siempre se han hecho\", terminó uno de los jueces por él. \"Usted simplemente las ignoraba hasta hace poco\".\n\nMaddox parpadeó, las palabras lo golpearon como un puñetazo en el estómago. No pudo pensar en una respuesta."
 nss.94.a: "Sabía que no podía refutarlo."
 nss.95.t: "La Mascarada"
 nss.95.d: "Para el mundo exterior, no existimos, entre los anuncios y los partidos de fútbol americano que vemos. Salvaguardando nuestra nación contra las llamas del caos.\n\nA través de una cuidadosa planificación y actuación, hemos construido un sistema dentro de un sistema. Un sistema no visto por el ojo común, oculto entre casos de la Corte Suprema y circos mediáticos. No importa cuánta presión haya sobre los funcionarios; no importa cuánto intenten los teóricos de la conspiración arrojarnos luz. Nuestro trabajo continúa. El mundo sigue girando.\n\nComo cualquier ecología, la Mascarada está cuidadosamente construida alrededor de nuestros ciudadanos para que su vida diaria pueda continuar sin que ellos sepan de nuestro control. Lo que hacemos es lo correcto, pero a menudo lo correcto puede ser visto como impopular. A veces, no deberían saberlo.\n\nSin embargo, pueden surgir sus propios depredadores, intentando interrumpir la mascarada dejando que el sol de la verdad brille sobre los hombres y mujeres que trabajan arduamente detrás del velo. Grupos terroristas, individuos antisociales y traidores que han caído en la trampa del pánico ético. Todos tienen el potencial de destruir aquello en lo que hemos trabajado durante tanto tiempo.\n\nComo un jardinero, tenemos que mantener la mascarada y exterminar las malas hierbas que intentarían estrangularnos."
 nss.95.a: "Mantengamos las máscaras puestas."
 nss.96.t: "Elecciones en Brasil"
 nss.96.d: "Tras un golpe militar en Brasil, las elecciones bajo una estricta supervisión militar llevaron a la abrumadora victoria de Henrique Meirelles, un candidato tecnócrata proamericano. Se espera que este acontecimiento asegure una prolongada cooperación militar y económica entre los Estados Unidos y Brasil.\n\nSin embargo, debemos estar atentos a las consecuencias sociales y económicas potencialmente peligrosas del golpe en el país, ya que organizaciones extremistas de izquierda y derecha están tratando de desestabilizar el nuevo régimen.\n\nA pesar de ello, el nuevo Gobierno ya ha prometido una cooperación ampliada con los Estados Unidos, comenzando con una alianza militar."
 nss.96.a: "¡Un brindis a nuestra amistad!"
 nss.97.t: "ME of ENship"
 nss.97.d: "INTERNO CIA/CI - SOLO PARA OJOS\nASUNTO: Incidente en el Zigurat de Enlil\nFECHA: REDACTADO\nCLASIFICACIÓN: ALTO SECRETO//NOFORN\nUn equipo de asalto del SAC enviado para despejar un zigurat sumerio recientemente desenterrado en el valle del Éufrates de presunta actividad insurgente experimentó un fenómeno inesperado durante la misión.\n\nEl equipo de asalto se enfrentó a un pequeño grupo de insurgentes en las ruinas del antiguo templo, lo que resultó en un intercambio de disparos que se esperaba que resultara en la eliminación total de la célula insurgente. Sin embargo, durante el tiroteo, uno de los soldados golpeó accidentalmente una tablilla de piedra que adornaba la pared del templo. Como resultado, toda la célula cesó inmediatamente el combate y asumió posiciones de súplica y reverencia, dirigidas a uno de nuestros operativos que posteriormente fue designado como \"Delta-8\".\n\nEl equipo detuvo posteriormente a la célula superviviente para interrogarla, y un miembro declaró que \"no podían atreverse a golpearla por miedo a las consecuencias, ya que es la muerte poner las manos sobre una Sacerdotisa\". La \"Sacerdotisa\", en este caso, era Delta-8. Delta-8 no ha demostrado ningún cambio observable en su comportamiento o condición física, pero sus compañeros de equipo ahora la respetan, y los detenidos se niegan a comer o dormir hasta que sean 'entregados a su cuidado'.\n\nEl examen preliminar de la tablilla sugiere que estaba inscrita con un largo pasaje en una forma arcaica de escritura cuneiforme. Una inscripción cercana dice: \"NAM-EN\" (\"ME\" de EN-ship, el signo del Sacerdote).\n\nEl director está muy interesado en estos hallazgos y ha ordenado el establecimiento de una instalación negra segura para la investigación y contención de este incidente."
 nss.97.a: "Todos a bordo. -DB"
 nss.98.t: "Ciclos"
 nss.98.d: "Nada es para siempre, los bosques se marchitan y crecen, las montañas se derrumban y se elevan, los imperios viven y mueren.\n\nDonde nacen los dioses, la realidad se convierte en cinco estaciones. Cinco ciclos. La vida es el propósito principal de todo, pero eventualmente es devorada. Incluso en la aniquilación, surge nueva vida y nacen aquellos que alcanzan el sol.\n\nA los de brazos extendidos se les enseñó a mantener el equilibrio, pero su naturaleza los hizo sucumbir al pecado. Su castigo los volvió salvajes, bestias feroces con dientes y garras. Que el viento se lleve sus pecados. El sol se convirtió en el nuevo creador, y la vida nació de nuevo.\n\nEl agua se convirtió en luz. Su amor arrebatado por las fauces del olvido, el dolor llevó a reinos interminables de arena y sequía. El dolor es el camino hacia la ira, y el agua de los cielos se convirtió en fuego. Luz interminable.\n\nLa luz se convirtió en vida de nuevo. Un nuevo progenitor, su amor fue considerado insincero. Una acusación que llevaría a la sangre a inundar las tierras, convirtiendo la vida en nueva vida que podría vivir bajo la sangre del dolor.\n\nUn imperio de sangre y huesos, un fin a la vida con un hambre que perdurará.\nLa vida tiene que renunciar a la vida, para que la vida pueda vivir de nuevo.\nSi el hambre permanece, la luz se oscurecerá.\nLa tierra se desmoronará, y el fin llegará."
 nss.98.a: "Vida en vida."
 nss.99.t: "Creador"
 nss.99.d: "Él vino de los vastos océanos de la nada.\nComo cualquier mortal, un fuego ardía dentro de él.\nUn deseo de crear, un deseo de destruir.\n\nSus manos estaban llenas de arcilla, Él moldeó un mundo y luego otro.\nContinuó hasta que se sació, un universo a Su propio diseño.\nLa vida creció, la gente creció, el lenguaje nació y las tribus florecieron como flores.\n\nEllos tenían el mismo fuego, crearon y destruyeron.\nSus lecciones, Su camino.\nHasta que dejaron de escuchar, y todo lo que pudieron hacer fue destruir.\nLa ira no tardó en llegar, cuando Él trajo una ola de nada.\nBorrándolo todo.\n\nEntonces hubo océanos de nada\nÉl emergió de ellos.\nSus manos llenas de arcilla.\nOtro mundo moldeado.\n\nÉl hará esto, hasta que termine."
 nss.99.a: "Maestro del mundo."
 nss.100.t: "Los dientes de Dios"
 nss.100.d: "El rebaño que se porta mal recibirá castigo.\nIgnorando las lecciones enseñadas, aborreciendo a sus creadores.\nEngordan con lo que comen, asesinan a sus parientes y se sientan sobre montones de riqueza sin agradecer a nadie más que a sí mismos.\n\nEl castigo llega.\nDientes afilados, la ira de la bestia.\nDevorando tribu tras tribu, los cielos se derramaron, ahogándolos en sed de sangre.\nLa bestia tenía hambre, tanta hambre, que consumió y no se detuvo.\n\nPronto el mundo estaría en silencio.\nY no se aprenderían lecciones.\nPero el Sol brilló a través de la niebla roja, y enseñó al rebaño viviente cómo domar a la bestia.\n\nLlenar los ríos con espíritus rojos, destinados a calmar la mente y adormecer el cuerpo.\nComo el rebaño que engordó, siguió bebiendo, siguió consumiendo hasta que cayó en un sueño profundo.\nAsí terminó la masacre.\n\nDe la destrucción que causó, la vida floreció de nuevo."
 nss.100.a: "Floreciendo, hasta que despierte de nuevo."
 nss.101.t: "Antes de que todo comenzara"
 nss.101.d: "Había un imperio, lleno de torres y palacios.\nDonde un rey sabio gobernaba.\nRodeado de hombres sabios, le contaron de un mundo anterior a él.\n\nUn gran desastre se avecinaba.\n\nLos que precedieron al rey tramaron y planearon.\nUna forma de empezar de nuevo, trayendo la nada absoluta.\nTodos ellos, creadores y pintores de todos los seres vivos, juraron guardar el secreto.\nSin embargo, uno de ellos flaqueó y susurró su secreto a los mortales.\n\nLas mentes mortales se unieron.\nConstruyendo una forma de soportar el gran desastre.\nTodos los seres vivos serían salvados.\n\nEl clima estaba lleno de malicia.\nLas tierras se iluminaron con truenos, un rugido que borró el reconocimiento.\nNo podían verse unos a otros, no reconocían sus rostros.\n\nFue tan loco, fue tan grande, la destrucción incluso asustó a los dioses.\nLa destrucción terminó, el mundo estaba vacío.\nPero la vida perduró.\nY siguió adelante."
 nss.101.a: "Un recordatorio de nuestra resiliencia."
 nss.102.t: "El mundo es tuyo"
 nss.102.d: "Cada alianza forjada a puerta cerrada, cada compromiso moral en nombre del bien común, cada política diseñada para salvar vidas, todo había sido en vano. Una y otra vez, el director veía estos eventos repetirse, una imagen que se desvanecía en la pantalla de plata. No había nada que pudiera hacer para cambiar nada de eso, no ahora.\n\nLa gente era demasiado ignorante y egoísta para que se le confiaran las riendas del poder, por lo que debían ser guiados hacia un futuro mejor, se había asegurado el director innumerables veces. La administración era demasiado corrupta y miope, pero aun así era mejor que lo que inevitablemente la reemplazaría si fracasaban, y por eso tuvo que apoyarla. Las instituciones que supervisaba eran necesarias para la seguridad nacional, incluso cuando sus métodos se volvían cada vez más amorales. No podía permitirse que la moralidad lo guiara, no cuando tanto dependía de sus decisiones. Tantos años de trabajo dedicados a la nación, y aún necesitaba más tiempo.\n\nNo se trataba del dinero. Nunca lo había sido. Se trataba de domar la inquietud y la crueldad innatas de la naturaleza humana, de aprovecharla para el bien del país. En este tipo de trabajo, no había gente buena. Todos tenían las manos sucias, especialmente él. Se miró las palmas. Incluso ahora, todavía podía sentirlo, toda la sangre en sus manos. Y estaría dispuesto a derramar mucho más. Si tan solo tuviera más tiempo...\n\nTiempo.\n\nMiró su reloj de pulsera. Las manecillas del reloj giraban borrosas. Allí, ante él, yacían los restos. Metal retorcido y combustible ardiendo llenaban el claro, el aire acre y pesado. Este era el lugar de su misión final, la única esperanza de salvación que quedaba, yaciendo en un montón de ruinas en medio de un claro.\n\nSi tan solo hubiera tenido más tiempo. Tiempo para evacuar la capital, tiempo para coordinarse con las fuerzas del Orden, aún dispuestas y capaces de someter a los traidores y a las masas ingobernables. Tiempo para encontrar una salida. Allí, entre los cuerpos, el director vio una forma familiar. El cuerpo estaba quemado, carbonizado más allá del reconocimiento, pero seguía siendo él."
 nss.102.a: "Quizás, esto es el Infierno."
 nss.103.t: "La Sacerdotisa"
 nss.103.d: "El individuo designado Delta-8, SPC. Anna Webster, especialista en demoliciones de la CIA-SAC, continúa exhibiendo las propiedades anómalas observadas por primera vez durante el incidente del Ziggurat de Enlil. La sujeto se encuentra actualmente recluida en una instalación segura en el desierto de Rub' al Khali.\n\nLa evaluación física y psicológica de la sujeto Delta-8 no muestra desviaciones significativas de los parámetros de referencia. Sin embargo, el análisis conductual revela un profundo cambio en sus interacciones. Sus antiguos compañeros de escuadrón ahora muestran una deferencia pronunciada hacia Delta-8, refiriéndose a ella como \"Señora\" o \"Sacerdotisa\" incluso de manera informal. Al ser interrogados, estos individuos informan una compulsión instintiva a obedecer sus órdenes, describiéndola como un \"conocimiento profundo\" de que sus palabras tienen autoridad absoluta.\n\nLos insurgentes iraquíes capturados confirman la influencia de Delta-8, llamándola \"EN\" (sumerio para señor/sacerdote). Informan haber escuchado una sola palabra \"antigua\" y \"sagrada\" durante la incursión que eludió el pensamiento consciente, imprimiéndose directamente en sus mentes y obligando a la sumisión total.\n\nEl análisis de la tablilla confirma que la palabra representa el \"ME\" sumerio de EN-ship. Los lingüistas de la Agencia teorizan que el \"ME\" no es un habla convencional, sino un catalizador psicolingüístico que piratea la facultad innata del lenguaje del cerebro, anulando el pensamiento racional y los mecanismos de obediencia.\n\nLas implicaciones son asombrosas. Si un \"ME\" puede otorgar autoridad absoluta, ¿qué podrían hacer otros? ¿Realeza, victoria, muerte? El \"Proyecto Babel\" -establecido por órdenes del director Burns- busca descifrar los \"ME\" restantes y desarrollar su despliegue controlado, con recursos ilimitados. Delta-8 permanece bajo custodia, cada declaración y movimiento documentado. Para los lingüistas de la Agencia, ella es la clave para desentrañar un rompecabezas cuyo tamaño puede exceder la suma del conocimiento humano."
 nss.103.a: "La carrera ha comenzado."
 nss.104.t: "Reevaluando las \"tablillas del Diluvio\""
 nss.104.d: "Durante los despliegues americanos, crípticas \"tablillas del Diluvio\" recuperadas de tumbas selladas y sitios de excavación contienen formas arcaicas de lenguas conocidas que desafían la historia lingüística convencional. Inicialmente descartados como folclore, estos textos fueron reevaluados después del incidente del Zigurat de Enlil a la luz del Proyecto Babel. Estas diversas \"Inundaciones\" ahora se interpretan metafóricamente como un contagio neurolingüístico que diezmó civilizaciones antiguas, con las tablillas sirviendo como relatos históricos en lugar de descripciones literales.\n\nUna tablilla de cerca de Teotihuacán describe un \"gran silencio\" donde las palabras \"se convirtieron en ceniza en sus bocas\". Los khipu andinos hablan de una \"serpiente del cielo\" que \"deshizo los hilos del canto\", dejando a la gente incapaz de recordar sus propios nombres. Los lingüistas del Proyecto Babel están ahora cotejando estos relatos, con NERO procesando las traducciones a una velocidad sin precedentes. Los patrones son innegables: culturas dispares en todo el mundo, separadas por océanos y milenios, todas describiendo el mismo evento catastrófico: una plaga de la mente que atacó el lenguaje mismo.\n\nLas \"tablillas del Diluvio\" insinúan un \"contra-patrón\". Los textos mesoamericanos mencionan una \"serpiente emplumada\" que \"volvió a enseñar a los hombres a hablar\"; los quipu andinos se refieren a un \"hombre barbudo\" -probablemente Huiracocha, constructor divino de Tiahuanaco- que \"perforó el silencio\". Estos mitos aparentemente aislados forman una imagen unificada. El doble objetivo del Proyecto Babel: convertir en arma el patrón del \"Diluvio\" y encontrar fragmentos del \"contra-patrón\" para proteger a los Cognoscenti de sus efectos."
 nss.104.a: "Todo el poder reside en quien tiene la última palabra."
 nss.105.t: "Nam-Shub de Enki"
 nss.105.d: "Referencias fragmentarias al \"Nam-Shub de Enki\" aparecen en los materiales recuperados. En la mitología sumeria, Enki, dios de la sabiduría y guardián de \"ME\", creó un encantamiento divino que \"soltó las lenguas\" de la humanidad. Dentro del Proyecto Babel, el \"Nam-Shub\" se enmarca como el \"contra-patrón\", la vacuna.\n\nTodas las recuperaciones hasta ahora han sido fragmentarias o de un potencial diluido. Sin embargo, surge una posible pista: Textos que describen el \"arca de Utnapishtim\" descansando en el monte Nimush, llevando \"la Palabra de todo lo que fue\". La ubicación de Nimush ha sido un punto de contención durante décadas; algunos estudiosos la identifican con el monte Ararat, mientras que otros la sitúan más al sur. Sin embargo, los cartógrafos culturales de los Cognoscenti, en colaboración con el análisis topográfico de NERO, ahora creen que se trata nada menos que del monte Ararat.\n\nLa Agencia ya está debatiendo una expedición científica, cuya importancia no puede subestimarse. Una expedición oficial es imposible debido a la sensibilidad del sitio y al riesgo de atraer la atención internacional. La única opción viable: una operación clandestina del SAC con lingüistas y arqueólogos civiles acompañantes, camuflada como un estudio geológico para minimizar las sospechas.\n\nLa misión: recuperar los fragmentos más completos del \"Nam-Shub de Enki\". Lo que está en juego es simple pero ambicioso: una oportunidad de controlar por completo la arquitectura de la conciencia humana."
 nss.105.a: "La busqueda comienza."
 nss.106.t: "Expedición al monte Ararat"
 nss.106.d: "INTERNO CIA/CI - RESUMEN INFORMATIVO\nASUNTO: Operación GILGAMESH\nOBJETIVO: Localizar, asegurar y extraer posibles artefactos relacionados con el \"Nam-Shub de Enki\" de una zona objetivo en la cara noreste del monte Ararat.\nCLASIFICACIÓN: ALTO SECRETO//NOFORN\n\nLa expedición fue enviada a una estructura anómala preidentificada en el monte Ararat, teorizada como los restos geológicos del \"arca\" de Utnapishtim. La estructura, recientemente revelada debido al retroceso glacial, se encuentra a aproximadamente 4.267 metros de altitud.\n\nLa entrada reveló un interior de obsidiana de un negro intenso, confirmando que el \"arca\" era una bóveda diseñada para resistir catástrofes. En el interior, una cámara central albergaba doce sarcófagos en formación circular. Diez contenían restos humanos bien conservados con tablillas y artefactos consistentes con prácticas funerarias sumerias de alto estatus, su preservación indicaba la protección de la bóveda contra el tiempo.\n\nDos sarcófagos, identificados como los de Utnapishtim y su esposa, no contenían restos, pero sí el Nam-Shub de Enki. Las tablillas estaban hechas de un material magnético desconocido, con inscripciones que parecían flotar dentro de sus superficies en lugar de estar talladas. Los lingüistas determinaron que las tablillas formaban un texto coherente, a diferencia de cualquier descubrimiento cuneiforme anterior, lo que sugiere un sistema lingüístico sofisticado que potencialmente precede a los escritos sumerios conocidos: la teorizada \"protolengua sumeria\". Este descubrimiento elevó la prioridad de la operación, lo que llevó al director a autorizar la extracción inmediata y protocolos de contención mejorados.\n\nEl análisis de NERO confirmó que las tablillas contenían el objetivo del Proyecto Babel: un contra-patrón para la plaga neurolingüística. El \"Nam-Shub de Enki\" actúa como un algoritmo de restauración lingüística, revirtiendo la incoherencia cognitiva de los fragmentos de ME al interactuar directamente con el sustrato biolingüístico en lugar de la semántica. Esta recuperación acelera el cronograma del Proyecto para la militarización y las contramedidas. El director ha convocado una sesión de emergencia de liderazgo de los Cognoscenti para discutir los protocolos de integración."
 nss.106.a: "La operación se considera un éxito total."
 nss.107.t: "Colibrí del sur"
 nss.107.d: "Bajo el nombre clave \"Operación Tezcatlipoca\", equipos del SAC establecieron sitios arqueológicos encubiertos en todo México utilizando la preservación de la UNESCO como tapadera. Lingüistas del Pentágono y la CIA lideraron la operación, buscando en códices precolombinos patrones de glifos que coincidieran con las propiedades neurolingüísticas de los \"ME\" mesopotámicos.\n\nDebajo de las catacumbas de la Ciudad de México, un equipo del SAC encontró una cámara sellada bajo el Templo Mayor de Tenochtitlan que contenía códices de corteza de higuera con glifos vibrantes que desafiaban la traducción. NERO identificó patrones de signos que codificaban conceptos cognitivos, confirmando que los mexicas entendían los bloques de construcción del lenguaje como los sumerios, operando idénticamente a los ME a pesar de la separación oceánica. Los códices mismos imbuían una reverencia contagiosa a la deidad mexica de la guerra, el colibrí zurdo del sur, Huitzilopochtli. Apodado el \"Xiuhcoatl\", encarna conceptos abstractos: furia justa, guerra divina, sacrificio masivo y orden cósmico, los fundamentos de su panteón.\n\nDos lingüistas náhuatl experimentaron un colapso cognitivo inmediato después de la exposición a los códices. Su habla degeneró en advertencias apocalípticas sobre la extinción del Quinto Sol y la aproximación de los demonios estelares Tzitzimimeh. Automutilándose compulsivamente con herramientas de excavación, cantaban sobre el derramamiento de sangre para restaurar el equilibrio cósmico. El comportamiento refleja los efectos de contagio neurolingüístico, confirmando el potencial de armamentización de los ME. Ambos fueron sedados y asegurados en contención médica, y los escáneres neurológicos muestran una remodelación sináptica acelerada consistente con el marco teórico del Proyecto Babel. Ahora entendemos por qué los mexicas abrazaron tan vehementemente el sacrificio humano masivo: no estaban simplemente apaciguando a su dios patrón, sino obedeciendo un mandato fundamental incrustado en la arquitectura neurolingüística de la propia lengua náhuatl. Las implicaciones son asombrosas. Si este \"ME\" pudiera ser armamentizado, podría hacer cualquier cosa, desde inspirar a los soldados con una ferocidad inigualable hasta obligar a poblaciones enteras a abrazar la violencia ritual apocalíptica."
 nss.107.a: "\"Durante seis meses del año el huitzitzilin está muerto, y durante seis está vivo\"."
 nss.108.t: "Kofun"
 nss.108.d: "Bajo el pretexto de \"estudios de estabilidad estructural\" realizados por instituciones académicas americanas, equipos del SAC establecieron excavaciones en los principales túmulos funerarios kofun de Japón. La justificación pública -evaluación de la integridad post-terremoto- enmascaraba su verdadero objetivo: recuperar artefactos inscritos con patrones de signos \"ME\". Bajo la supervisión de la Agencia, arqueólogos japoneses se centraron en sitios vinculados a los orígenes míticos de la dinastía Yamato.\n\nEn el grupo de kofun de Mozu-Furuichi en Osaka, una excavación dirigida a la tumba del emperador Nintoku desenterró un espejo de bronce, un yata no kagami, anterior al sintoísmo. Su reverso mostraba una escritura pre-hiragana que desafiaba la identificación. NERO comparó sus patrones de signos con el ME sumerio de la Realeza, un artefacto que imponía una autoridad contagiosa, obligando a los espectadores a reconocer a un soberano predeterminado. Un operativo de la Agencia sin protección que observaba el espejo exhibió cambios de comportamiento inmediatos, dirigiéndose al director Burns como \"tenno\" e insistiendo en un mandato divino para \"restaurar el Orden\". El operativo fue sedado para observación médica.\n\nLa investigación de las tradiciones onmyodo y shugendo reveló enseñanzas esotéricas de kotodama, conservadas en santuarios de montaña, que describen cómo sonidos específicos manipulan la realidad a través del kototama (alma de la palabra) como una fuerza activa en lugar de una mera creencia, confirmando la tesis del Proyecto Babel de que el lenguaje es una interfaz programable para la conciencia.\n\nEstá surgiendo una imagen con respecto al ME, una que trasciende las fronteras geográficas y culturales, de un \"lenguaje de programación de la conciencia humana\" utilizado por las castas gobernantes y sacerdotales de los pueblos antiguos de todo el mundo para sentar las bases de la civilización misma, para traer Orden al Caos."
 nss.108.a: "Sin miedo, sin dolor."
 nss.109.t: "Pirámide perdida de Thoth"
 nss.109.d: "Agentes de la Agencia aseguraron derechos exclusivos de excavación en un sitio cerca del oasis de Bahariya, estableciéndolo como una zona de acceso militar restringido. Un radar de penetración terrestre reveló una pirámide, con solo su impecable piramidión dorado expuesto por las arenas movedizas, elevándose a 147 metros, superando la Gran Pirámide de Guiza. La entrada se complicó por peligros cognitivos, ya que dos agentes experimentaron afasia al exponerse a símbolos contaminados en el umbral, mientras que otro cayó en estado catatónico. Escáneres neurológicos revelaron lesiones fractales en el lóbulo temporal que coincidían con patrones de infección memética. Estos mecanismos de seguridad neurolingüísticos habían custodiado la tumba durante milenios, destrozando las mentes de los saqueadores de tumbas y dejándolos apáticos en el desierto.\n\nDentro de la pirámide yacía una biblioteca de antiguos rollos de papiro que precedían a las dinastías conocidas, sus jeroglíficos funcionaban computacionalmente en lugar de fonéticamente. NERO confirmó que estos patrones coincidían con el \"ME\", demostrando que los antiguos egipcios poseían conocimiento de los bloques fundamentales del lenguaje, similar a los mesopotámicos. A pesar de los esfuerzos de la supercomputadora de DARPA, los rollos se resistieron a ser descifrados, requiriendo una mayor exploración del complejo.\n\nEn la cámara más baja yacía un sarcófago dedicado a \"aquel que logra la rectitud y la verdad\" y \"Aquel que es como el ibis\", epítetos conocidos de Dyehuty, el dios egipcio de la sabiduría, la escritura y el conocimiento, a quien los griegos llamarían más tarde Thoth. Dentro del sarcófago, se descubrió una tablilla con una ecuación, que un matemático fue encargado de resolver. Le dio la capacidad de comprender la biblioteca, pero la solución destrozó su mente, induciéndole psicosis. Ahora, creyéndose el recipiente mortal de Thoth, encargado de \"guiar la barca solar\" para mantener el \"Orden (Ma'at)\" contra el \"Caos\", habla como si fuera el dios. Su mente rota guarda la clave para desbloquear el contenido de la biblioteca, por lo que ha sido trasladado a una instalación segura para continuar la investigación."
 nss.109.a: "Nave del Trismegisto."
 nss.110.t: "El empuje final"
 nss.110.d: "La realidad es algo que se puede medir. Si un solo individuo absorbiera todo el conocimiento del mundo conocido, terminaría sacándose los ojos, porque habría visto demasiado. Mucho antes de que derrotáramos el fascismo y el comunismo, cubrimos este mundo con un velo de normalidad, un statu quo que aseguraría la paz global.\n\nUn gran proyecto realizado mucho antes de que naciéramos, a través de los estudios realizados por nuestros think tanks, llegamos a la comprensión de que cada civilización experimenta una gran transformación en un espejo fragmentado o en un palacio permanente destinado a resistir la aniquilación misma. Hasta ahora, ninguna de ellas ha logrado esto último.\n\nHemos llegado a comprender que una de las razones principales de esto es que cada civilización choca inevitablemente con otra civilización que busca el mismo objetivo.\nRusia y China buscan su propio palacio, y aunque no guardamos rencor a estas naciones y a su gente, entendemos que si realmente queremos sobrevivir a esta era de cambio, tenemos que ganar.\n\nEl lenguaje da forma a la realidad, y las palabras impulsan a la gente a sacar a relucir la grandeza.\nO la destrucción.\n\nEn las profundidades de las venas del mundo yacen los restos de las civilizaciones que intentaron el mismo choque. Podemos aprender de sus fracasos, y podemos aprender a usar el lenguaje como arma.\n\nLa era del cambio se acerca a su fin, y cuando inevitablemente choquemos con estas otras civilizaciones, levantaremos el velo solo un poco, y se devorarán a sí mismas.\n\nPodemos ser morales, o podemos ganar."
 nss.110.a: "Un palacio, brillante."
 nss.111.t: "Estimado director"
 nss.111.d: "De: Larry Fink\nEnviado: X/X/20XX 5:15:32 PM\nPara: William J. Burns\nAsunto: Estimado director\n\nLa paz está finalmente a nuestro alcance. Este sistema, que hemos construido para el bien común, nos ha permitido por fin traer estabilidad al mundo. No nos lo agradecerán, ni comprenderán la importancia de lo que hacemos, pero los hemos salvado de una vida de guerra y demagogia. Les hemos dado una vida sin conflictos ni carencias, y no hemos pedido nada a cambio.\n\nNo fue un viaje rápido, y hubo una tremenda cantidad de dolor en el camino. Estoy seguro de que Ud. recuerda todo lo que hizo para que esto sucediera. No fue el tipo de sacrificio que se pueda llevar en el uniforme. No hubo elogios para Ud., y no hubo alabanzas para las decisiones difíciles que Ud. tomó. Siempre supe que entendías esto, incluso cuando no podías hablar de ello en voz alta.\n\nEres un hombre que sabe que lo que es correcto y lo que es bueno rara vez son lo mismo, pero creo que, con este nuevo mundo, podemos acercarnos a un punto en el que vuelvan a ser sinónimos. Estoy orgulloso de haber trabajado a su lado durante tanto tiempo, y aún más orgulloso de llamarte amigo. En los años venideros, el mundo necesitará hombres buenos como Ud. Pero por esta noche, debes celebrar y descansar. El mundo puede prescindir de personas como nosotros por un solo día, creo. Disfrútalo con tus seres queridos, porque pronto, te necesitaremos de nuevo, amigo mío.\n\nCuando el sol salga mañana, habrá más trabajo por hacer. Siempre lo hay. Lo que hemos construido solo puede sobrevivir mientras se mantenga, y la carga del mantenimiento no es fácil de soportar."
 nss.111.a: "Lo mejor está por venir."
 nss.112.t: "Eclipse"
 nss.112.d: "565:39:20 HOUSTON: \"Apolo-20, Control de Misión. ¿Cómo copian?\"\n565:39:30 DIAMOND: \"Los recibo alto y claro, Houston\".\n565:39:35 HOUSTON: \"Danos un informe de estado, Diamond\".\n565:39:40 DIAMOND: \"Todos los sistemas nominales, tiempo de llegada estimado al POD T-menos 15 minutos\".\n565:39:57 HOUSTON: \"Continúen según lo planeado, próxima comunicación después de que FOX esté en posición\".\n565:40:20 DIAMOND: \"Entendido. Diamond fuera\".\n\n(Larga interrupción de comunicación)\n\n565:59:26 DIAMOND: \"Houston, Apolo-20, FOX está listo\".\n565:59:46 HOUSTON: \"Buen trabajo, Diamond. Tenemos buenas noticias. El muro está levantado\".\n566:01:10 DIAMOND: \"Houston, ¿pueden repetir eso?\"\n566:01:17 HOUSTON: \"Repito, el muro está levantado. Frase clave: Prueba\".\n566:01:32 DIAMOND: \"Entendido\".\n\n(Interrupción de comunicación)\n\n566:04:10 DIAMOND: \"Houston, Apolo-20\".\n566:04:18 HOUSTON: \"Apolo-20, ¿hay alguna situación?\"\n566:04:30 DIAMOND: \"Houston... volveremos a casa, ¿verdad?\"\n566:04:45 HOUSTON: \"A su debido tiempo, Diamond. No tengas dudas al respecto\"."
 nss.112.a: "Houston fuera."
 nss.113.t: "Destino del Capital"
 nss.113.d: "\"¿De Europa?\"\n\"Correcto, nuestros amigos al otro lado del Atlántico pensaron que sería útil.\"\n\"No puede ser peor que aquí.\"\n\nLarry Fink sonrió ante la mirada de su equipo de seguridad. Normalmente, se aseguraría de que lo incluyeran en la lista negra del negocio, pero después de escapar de una muerte segura varias veces, un poco de indulgencia sería prudente.\nEl Orden estaba en aprietos, y la Pureza mantenía su velo, pero las llamas del Caos lo quemarían todo. No, sería mejor reducir las pérdidas y retirarse.\n\nTanto él como su guardaespaldas lograron llegar a la costa mientras escuchaban los sonidos lejanos de disturbios y disparos. La guardia nacional llegó rápidamente para reprimir cualquier forma de actividad antisocial en las ciudades, pero, por supuesto, quedarían rezagados.\n\n\"¿Dónde fallamos?\", pensó Larry. Ciertamente no fue su culpa; la agenda era bastante clara y estaba garantizado que funcionaría, pero, de nuevo, el elemento americano podría haber sido demasiado impredecible. Está funcionando en Europa, y las lecciones que aprendió aquí podría aplicarlas allí.\n\n\"Ah, ahí están y-\" El guardia gimió.\nAmbos vieron una lancha neumática llegar al amparo de la noche mientras tres hombres armados los saludaban suavemente.\n\"¿Qué? ¿Qué pasa?\""
 nss.113.a: "\"Son italianos\"."
 nss.114.t: "Destino del Capital"
 nss.114.d: "Larry Fink pudo ver lo que se avecinaba cuando los primeros misiles nucleares alcanzaron sus objetivos; la percepción del statu quo global sería para siempre una cubierta de sangre, y no importaría la cantidad de innovación, progreso y riqueza. Su espíritu siempre estaría manchado; las masas habían recuperado sus afilados dientes.\n\n\"¿Alguna novedad sobre los demás?\", preguntó Fink. Había estado escondido en una casa segura durante bastante tiempo, y a pesar de su visión más pragmática de la vida, no pudo evitar preocuparse un poco por sus colegas. Después de todo, Pureza y Orden habían existido durante el mismo tiempo.\n\n\"Negativo, señor, asuma lo peor.\" Su equipo de seguridad no era un grupo de leales fanáticos, solo un grupo de individuos hábiles contratados para hacer un trabajo. Sin embargo, algunas de sus miradas de miedo eran difíciles de ignorar; caminaban junto a una campana de cena viviente.\n\"Ha habido informes de actividad antisocial en toda el área y escaramuzas entre las fuerzas del orden y facciones sublevadas. Se aconseja esperar antes de considerar la extracción.\"\n\n\"No es que importe mucho\".\n\nUno de los guardias detrás de él sacó un arma, una de las pocas cosas que supera al Capital es la preservación del yo, y algunos de ellos se condenarán a pagar el precio por el error de otra persona. Fink se dio la vuelta y sonrió.\n\n\"Nada personal, ¿verdad?\"\n\"Por supuesto\".\n\nUn suave apretón y un fuerte estruendo después, el equipo de seguridad abandonó rápidamente la casa segura mientras salía humo de la entrada.\n\n\"¿Qué sigue?\", preguntó uno de ellos."
 nss.114.a: "\"Perduramos\"."
 nss.115.t: "Águila recortada"
 nss.115.d: "El conflicto en curso ha resultado ser demasiado similar a la Segunda Guerra Civil, y con las filas cada vez más extensas de ataúdes y viudas, la gente dentro de nuestras fronteras se desilusionaría. Las grietas se forman, y el sistema que fue cuidadosamente diseñado para mantener los tres pilares resultaría insuficiente para reprimir el caos tanto fuera como dentro.\n\nCon figuras clave del Gobierno habiendo huido o sido asesinadas, inevitablemente habría un vacío de poder, y con los disturbios en curso extendiéndose por todo el país, el ejército no tuvo más remedio que intervenir con más fuerza. Lo que quedaba de la máquina burocrática que era los Cognoscenti sería rápidamente barrido por la fuerza.\n\nAhora, se ha establecido un Gobierno de transición cuyo objetivo principal es restaurar el orden y lidiar con el conflicto en curso, principalmente poniendo fin a los combates, sin importar el costo. Parecería que el sueño americano ha llegado a su fin."
 nss.115.a: "La carga de otros, sobre nosotros mismos."
 nss.116.t: "Maine vota unirse a Canadá"
 nss.116.d: "Tras el colapso del Gobierno federal, muchos estados comenzaron a cuestionarse si aún querían ser parte de América o si debían tomar caminos separados, pero pocos fueron tan decisivos y rápidos al respecto como el pueblo de Maine.\n\nEl referendo celebrado hace unos días mostró que apoyan abrumadoramente la secesión de la Segunda Unión establecida por los Nuevos Artículos de la Confederación y unirse a Canadá como una provincia más. La votación fue cálidamente recibida por el nuevo gobierno canadiense, que ha prometido iniciar el proceso de integración lo antes posible.\n\nLas repercusiones sociales y económicas de tal movimiento aún están en debate, pero una cosa se puede decir con certeza: la gente de Maine eligió un destino diferente, el de un país distinto, dejando atrás a Norteamérica y los horrores asociados a ella hoy."
 nss.116.a: "Norteamérica nunca volverá a ser la misma..."
 nss.117.t: "Éxodo de las élites"
 nss.117.d: "Mientras los Estados Unidos se sumen en el pánico, aquellos que sostenían la alta sociedad verían la sangre manchada en las paredes y decidirían abandonar el barco en llamas lo más rápido posible.\n\nDespués de los informes de noticias sobre varios famosos, banqueros y directores ejecutivos menos conocidos siendo asesinados o ejecutados en territorios insurgentes, sería inevitable que muchos de los supervivientes huyeran a otros países. Por supuesto, con el estado actual del mundo, sus destinos siempre estarán envueltos en misterio.\nMientras algunos podrán mantener sus carreras y estilos de vida, otros se desvanecerán rápidamente en la oscuridad o se enfrentarán a un destino letal de todos modos.\n\nLas inversiones caen, el mercado de valores entra en shock y el pilar del Capital se tambalea. Solo restaurando el Orden se podrá restaurar la fe en el Gobierno federal.\n\nMientras las figuras más oportunistas abandonan la nación como ratas, aquellos que comparten nuestros ideales se acercarían aún más a ellos. Especialmente los relacionados con la seguridad privada, ya que más y más disturbios son sofocados por fuerzas que permanecen fuera de la supervisión del Gobierno federal.\n\nA veces, mirar hacia otro lado puede ser beneficioso."
 nss.117.a: "Otra cicatriz, otra lección."
 nss.118.t: "Dientes digitales"
 nss.118.d: "\"Ahí estás, cabrón.\"\n\nMientras la nación ardía, el reino digital tenía su propia cuota de batallas. Infraestructuras y cuentas bancarias fueron hackeadas por todo tipo de hacktivistas antisociales que intentaban extraer la mayor cantidad de riqueza posible del desmoronado gobierno federal antes de abandonarlo todo. Como buitres, rastreaban las redes, esperando ver su carroña.\n\n\"Esto me llevó meses, pero hombre, puedo entender por qué elegirías un apodo así, Mathew.\"\n\nPor supuesto, el Gobierno federal no se quedaba de brazos cruzados; gracias a los vigilantes digitales automatizados y a los hackers de sombrero blanco, harían todo lo posible para defenderse de estos carroñeros. Aquellos que vivían fuera de la nación simplemente verían todos sus activos borrados y su información vendida a quien tuviera cuentas pendientes a nivel local; sin embargo, aquellos lo suficientemente tontos como para permanecer dentro de las fronteras se encontrarían con un destino diferente.\n\n\"Veamos, un edificio de apartamentos cutre... un personaje extraño en una almohada... ajá...\"\n\nEl Gobierno federal aprobó el uso de drones para lidiar rápidamente con cualquier hacker localizado; la mayoría de ellos solían vivir aislados en barrios abandonados mientras mantenían un contacto cercano con todo tipo de grupos antisociales que alteraban el Orden.\n\n\"Solo atraviesa esa ventana y... ahí vamos, pegado al ordenador. ¡Oye! ¡Tarado! ¡Sonríe para la cámara!\"\n\nEl operador del dron vio al hacker mirar detrás de él desde su silla mientras sus ojos se abrían de pánico. Después de los sonidos de disparos y los sonidos húmedos de la sangre salpicando la pantalla del ordenador, el operador del dron dejó escapar un suspiro de alivio. Estaba estacionado lejos de todo esto, y con estas imágenes, estaba seguro de que podría sacar un buen dinero de la gente que buscaba emociones.\n\n\"¡Yo pago las bebidas!\" Miró a su alrededor en la sala de operaciones y se dio cuenta de que era el único presente."
 nss.118.a: "Alimañas entre alimañas."
 nss.119.t: "Temor insidioso"
 nss.119.d: "Hoy se siente un poco diferente. Te despiertas y ves los números de tu despertador retorcerse y doblarse, para luego volver a su forma original.\n\nTus seres queridos te hablan, las palabras llegan a tu mente, pero se sienten tan lentas.\nA veces, sientes que no estás en tu cuerpo.\nA veces, los microsegundos de no entender te atraviesan el alma como dagas.\nPero parpadeas, y el mundo vuelve a la normalidad.\n\nLo sientes detrás de ti, lo percibes en la esquina.\nLa chica guapa que te habla te confunde más de lo que te excita.\nEl calor del amor se desvanece a medida que el miedo se insinúa.\n\nAlgo anda mal.\nLos edificios se ven diferentes, los nombres de las calles parecen extraños.\n¿Irkutsk? ¿Kazán? No lo sabes, existes, pero no sabes dónde.\nEl camino a casa se siente como caminar sobre púas, los ojos llenos de miedo e incertidumbre.\n\nAquellos a quienes amas hablan y susurran.\nQuieres irte a la cama.\nEs solo un mal día."
 nss.119.a: "Por favor."
 nss.120.t: "Arrastrado tras las cortinas"
 nss.120.d: "Comes la comida del plato brillante.\nLas palabras en la caja dicen algo, sustento.\nLa falta de comprensión lleva a un lobo a roer su propia pata.\n\nQuieres gritar con todas tus fuerzas.\nAlgo está escarbando en tu cerebro, y aquellos a quienes sientes cercanos ahora se sienten distantes.\nSus ojos llenos de preocupación, el pánico surge en ti como un cadáver ardiendo.\n\nQuema y escuece.\n¿Quizás lastimarte a ti mismo te hace entender?\n¿Quizás lastimar a otros te hace entender?\nVes formas por todas partes.\nUn símbolo torcido y un símbolo que te llama.\n\n¿Qué significan?\nCalor, comida, agua.\nLo necesitas.\nCalor, más de eso.\n\nAlgo está tomando el control, y quieres que salga de tu cabeza."
 nss.120.a: "Quieres romperte la nariz."
 nss.121.t: "Imperio del Silencio"
 nss.121.d: "Tus manos están cubiertas de algo.\nNo sabes cómo describirlo; está húmedo, y tu mente te dice que es algo que nunca debería tocar tus manos.\n¿Un color oscuro, vida?\n\nSientes una corona descansando sobre tu cabeza.\nNo entiendes el mundo que te rodea; te has convertido en el emperador de tu propia isla.\n\nAquellos que se atreven a inmiscuirse en tu isla merecen lo único que todos los seres vivos entienden: la muerte.\n\nLos símbolos en las placas de metal no significan nada para ti; se burlan de tu falta de comprensión. Las figuras a tu alrededor parecen asustadas, aterrorizadas del ser en que te has convertido. Tu ignorancia se ha convertido en tu apoteosis.\n\nTienes dientes.\nDebes comerte a los que entienden, porque el entendimiento es veneno.\nNo olvides el imperio que se esconde entre las sombras; solo se abre a aquellos con dientes afilados.\n\n\"Hospital\", \"Por favor, detente\", \"Ayúdame\" se han convertido en hechizos de los extraños que te rodean, tratando de arrastrarte a un vacío negro.\nNo los dejes.\nTus dientes son afilados y tu miedo es combustible.\n\nEstá nevando afuera.\nLo húmedo en tus manos y fuera de tu cuerpo se ve tan bien en la nieve.\nQuienquiera que esté mirando, estará feliz."
 nss.121.a: "Perdiste algo."
 nss.122.t: "Mente sangrante"
 nss.122.d: "Dientes y garras, estrangulando las gargantas de figuras que no reconoces.\nEres el emperador, eres el rey. Ves la torre alzándose hacia el cielo mientras el mundo se derrite en colores que no conoces, formas que no reconoces.\n\nArremete contra el mundo hostil que renace en un reino de fuego y dientes.\nAgudeza entre sus huesos, luz en las mentes agrietadas de muchos.\n\nBusca fuego, busca comida y busca agua, cualquier cosa que los sustituya.\nDuele intentar recordar, duele saber.\nQuieres saber, pero cada recuerdo es otra forma de tortura.\n\nUn imperio de niebla donde el rey se ha metido los pulgares en los ojos.\nNo quieres ver lo que no conoces.\nSonrisas y risas.\n\nHay un mundo ahí fuera, esperándote.\nAlcanza.\nVe más allá del velo, ignora los tres pilares.\n\nSolo a través de dientes afilados y mentes abiertas se puede alcanzar el cielo.\nNo dejes que reclamen el trono de nuevo.\n\nSientes manos sobre ti, reconfortantes.\nLuces intermitentes, se han cometido grandes errores."
 nss.122.a: "Pero estás perdonado."
 nss.123.t: "Cicatriz al alma"
 nss.123.d: "Tomó un tiempo, pero la plaga que azotó las naciones del Este ha disminuido.\nA través de una resistencia obstinada y una cuidadosa reeducación, las palabras han vuelto a tener significado.\n\nAquellos que están demasiado perdidos gruñen y roen, arañando un lugar entre los espejos.\nAquellos que están curados deambulan por las calles, asustados de perder la comprensión una vez más.\n\nTodavía ocurren estallidos, donde el único lenguaje que se entiende es el lenguaje del amor y la violencia.\nPero las autoridades locales se apresuran a suprimirlo; las almas del Este han sido contaminadas, y cualquier energía loca que se filtre en sus tierras tendrá un amplio patio de juegos para jugar.\n\nNo reconocen el pasado, ni entenderán el futuro.\nEl presente está aquí para quedarse, para siempre.\nLas jaulas de acero perforan el cuerpo desnudo, y la cueva a la que han sido empujados ha demostrado ser demasiado cómoda.\n\nQue permanezcan ciegos para siempre."
 nss.123.a: "El Orden está saciado."
 nss.124.t: "Honor del sirviente"
 nss.124.d: "Con los colegas europeos consolidados, el dominio del Orden ya se ha solidificado en la mayor parte del mundo. Sin embargo, las estructuras más estables requieren tres pilares para sostenerse, lo cual no ha sido el caso hasta ahora.\n\nEl establishment japonés, debilitado por el error taiwanés, no tuvo más remedio que sucumbir a las élites globalistas. Aunque una vez fue una estrella en ascenso en la economía mundial, el sol se ha puesto sobre sus ambiciones de convertirse en un hegemón local junto con América. Sin embargo, están lejos de agotar su utilidad. No importa cómo se lo mire, Asia es el futuro económico del mundo. Quienes dominen en esta región controlarán la dirección que tomará la humanidad.\n\nJapón, al ser parte de este ecosistema, se ha afianzado como una importante potencia tecnológica e industrial, y con nuestra ayuda, se convertirá en un sirviente fiel, fuerte y confiable del Capital. La cultura laboral de la nación japonesa, la inminente amenaza de China y nuestra supervisión militar resultan beneficiosas para esta causa.\n\nNuestro difícil pasado se desvanecerá en los gloriosos destellos de la luz del futuro."
 nss.124.a: "El Orden avanza."
 nss.125.t: "Guerra estadounidense-iraní"
 nss.125.d: "Durante décadas, Washington había acusado a la República Islámica de buscar obtener armas nucleares. Pero la reciente y repentina ola de \"filtraciones de inteligencia\" provenientes de varios think tanks y los principales medios de comunicación convenció al Congreso de que Irán ya poseía dispositivos nucleares operativos. Funcionarios del Pentágono declararon a Irán el \"último obstáculo\" para la paz en Medio Oriente. La invasión se vendió al público norteamericano como una operación relámpago, un ataque quirúrgico contra las ambiciones nucleares, una liberación de un pueblo \"oprimido durante mucho tiempo por la tiranía clerical\". La única respuesta, declaró Estados Unidos, era un \"cambio total de régimen\".\n\nA medida que la tercera guerra del golfo se desplaza hacia Irán, el mundo se prepara para la catástrofe. La operación Azure Dagger comenzó con la promesa de velocidad y precisión, un \"ataque de decapitación\" para neutralizar las reservas nucleares y derrocar el régimen clerical de Teherán. La invasión comenzó con una de las mayores ofensivas ciber-cinéticas de la historia: provincias enteras quedaron a oscuras mientras las redes eléctricas se freían bajo el malware sembrado meses antes, mientras que las defensas aéreas eran eliminadas sistemáticamente por SEAD. Hospitales y redes gubernamentales colapsaron, dejando a la población ciega y en pánico antes de que cayera la primera bomba. El horizonte de Teherán estalló en llamas mientras ataques de precisión destruían las instalaciones de telecomunicaciones y la infraestructura eléctrica, sumiendo a la capital en la oscuridad.\n\nAunque el régimen iraní no será fácil de derribar considerando la compleja geografía y demografía del país y el gobierno ha prometido luchar hasta su último soldado, las grietas ya están empezando a aparecer en la fachada. Expertos internacionales estiman que Irán solo es capaz de resistir unas semanas como máximo."
 nss.125.a: "La última resistencia del Ayatolá."
 nss.126.t: "Guerra ruso-americana"
 nss.126.d: "Informes y grabaciones locales confirman que las Fuerzas Armadas de los Estados Unidos están ahora enfrentándose a las tropas [SOV.GetAdjective] en suelo europeo. A pesar del fin de la Guerra Fría, años de tensión diplomática que comenzaron con el ascenso de Vladímir Putin al poder en Rusia y sus acciones agresivas contra Ucrania, así como la posible colusión rusa en las elecciones de 2020 que llevaron a la Segunda Guerra Civil Americana y permitieron al Kremlin librar una guerra de agresión contra Europa, finalmente han culminado en un choque directo a gran escala entre los dos países.\n\nEn su discurso de hoy ante el Congreso, [USB.GetLeader] ha calificado las acciones como \"el acto final y decisivo contra el terrorismo global\" y la \"etapa final de la segunda Guerra Fría no declarada\", y ha expresado total confianza en la capacidad del ejército para lograr todos los objetivos de la campaña. Los funcionarios [SOV.GetAdjective], aparentemente sorprendidos por el nuevo enemigo, no han hecho ninguna declaración hasta el momento.\n\nFuentes del Pentágono sugieren que los Estados Unidos están movilizando todas sus reservas aéreas y navales para lo que será la mayor operación logística en el Océano Atlántico, mientras que imágenes satelitales muestran que la mayoría de los bombarderos Tu-95, Tu-22 y Tu-160 están en el aire o han sido reubicados, lo que indica posibles preparativos para una represalia nuclear.\n\nLos expertos advierten sobre un posible cambio crítico en el equilibrio entre las grandes potencias como resultado de la guerra, que podría solidificar o revertir muchos de los cambios que ocurrieron desde el inicio de la Segunda Guerra Civil Americana. A medida que los dos sistemas son puestos a prueba y miles de tanques chocan en las llanuras, muchas conexiones comerciales y diplomáticas existentes pueden verse interrumpidas. Solo el tiempo dirá si el espíritu ruso de Guerra Sagrada puede vencer el puro ataque y el poder industrial de la máquina de guerra estadounidense."
 nss.126.a: "La rivalidad llega a su fin."
 nss.127.t: "Guerra sino-americana"
 nss.127.d: "La rivalidad chino-estadounidense ha sido un bastión de la geopolítica global durante gran parte de la era moderna. Con la Segunda Guerra Civil Americana, muchos analistas habían concluido que China había ganado esta \"nueva Guerra Fría\". Sin embargo, con el resurgimiento de Estados Unidos en el escenario internacional, esto ha demostrado ser una completa falsedad. Hoy, la reavivada rivalidad con los chinos llegó a un punto crítico cuando funcionarios del Pentágono informaron de ataques contra buques navales estadounidenses por parte de fuerzas chinas.\n\nEn un discurso al pueblo estadounidense, [USB.GetLeader] afirmó que estos ataques fueron deliberados y maliciosos, ejecutados con la intención de intimidar a los estadounidenses para que no comerciaran con aliados en la región. [USB.GetLeader], presidente de los Estados Unidos, concluyó con: \"China es una amenaza para la seguridad del Pacífico, y responderemos a estos ataques con toda la fuerza del ejército estadounidense. Dios bendiga a América\".\n\nTerritorios de todo el Pacífico vieron hoy una movilización masiva de Marines, junto con escaramuzas en el Pacífico entre buques navales estadounidenses y chinos y batallas en los cielos entre aeronaves chinas. El conflicto se intensifica aún más con incursiones estadounidenses en varias islas del Pacífico controladas por los chinos y un ciberataque masivo dirigido contra los chinos. Las predicciones de los analistas son sombrías; algunos dicen que este conflicto podría ser uno de los más mortíferos del continente en la memoria reciente. Solo el tiempo dirá si los estadounidenses podrán derrotar a su antiguo enemigo."
 nss.127.a: "La decapitación del dragón."
 nss.128.t: "Invasión estadounidense de Europa"
 nss.128.d: "Una vez más, el continente europeo ha caído bajo las banderas del extremismo. Desde Berlín hasta París, ninguna ciudad fue demasiado sagrada para su embestida. Pero hoy, sin embargo, parece que la pesadilla europea finalmente ha llegado a su fin.\n\nEn un comunicado hoy por un funcionario del Pentágono, Washington declaró que las naciones extremistas de Europa eran \"ilegítimas y una amenaza para la seguridad nacional\", declarando una movilización total de las fuerzas estadounidenses contra \"las fuerzas de la ideología extrema\". Ya han surgido videos de misiles tierra-aire lanzados por fuerzas europeas para contrarrestar los aviones estadounidenses que sobrevuelan el continente. Y los estadounidenses han lanzado varias campañas de bombardeo contra objetivos estratégicos clave en Alemania, Francia, Italia y más. Esto solo puede describirse como una guerra total.\n\nLas predicciones entre los analistas son sombrías para los europeos, con los incipientes estados-nación de Europa probablemente desmoronándose ante la presión que los estadounidenses ejercerán sobre ellos. A medida que la posibilidad de una invasión terrestre completa se vuelve más inminente, es probable que la brutal guerra terrestre y urbana vuelva a apoderarse del continente."
 nss.128.a: "¡Ya vi ese programa, es un clásico!"
 nss.129.t: "Proyecto ANNIE"
 nss.129.d: "Debido a la gran cantidad de niños huérfanos por la Guerra Civil, Larry Fink ha presentado una propuesta novedosa que reduciría significativamente la presión sobre los programas de bienestar y asistencia social, además de complacer a los colaboradores financieros clave de los Cognoscenti: el Proyecto ANNIE. Bajo esta iniciativa, los niños huérfanos y aquellos confiscados de familias disidentes serían reubicados en entornos cuidadosamente monitoreados donde recibirían educación, atención médica y capacitación alineadas con los valores de los Cognoscenti.\n\nEstas instalaciones, denominadas \"academias\", se establecerían en lugares seguros en todo el país. Antiguas escuelas privadas y retiros rurales serían reutilizados para albergar a estos niños, proporcionando un ambiente estable para su desarrollo. El plan de estudios enfatizaría la responsabilidad cívica, la alfabetización científica y la adhesión fanática a la autoridad establecida, mientras desalentaría las tendencias antisociales y el pensamiento crítico que pudieran desafiar el nuevo Orden. Junto con la experimentación novedosa en el control del comportamiento, los niños serían transformados en una casta \"perfecta\" de funcionarios públicos, burócratas y soldados de a pie capaces de servir los intereses de los Cognoscenti con un celo incuestionable, consolidando completamente el Estado profundo.\n\nSu metodología es doble: en el frente civil, estos \"niños prodigio del Estado profundo\" serían colocados en puestos administrativos, burocráticos y judiciales clave en las instituciones de América, otorgando a los Cognoscenti aún más pretexto para negar la tiranía de las masas. En el frente militar, serían entrenados para convertirse en una nueva clase de oficiales y punteros para el SAC, así como para las fuerzas armadas regulares: una que no solo sería incondicionalmente leal a los Cognoscenti, sino que sería capaz de pensar con rapidez, adaptarse a nuevas amenazas y liderar los ejércitos del Estado profundo con un celo que haría que incluso el oficial de las SS más dedicado pareciera un holgazán.\n\nEl Proyecto ANNIE se implementaría en fases. La Fase I se centraría en los niños huérfanos por la Guerra Civil, quienes en los años siguientes podrían ser adoctrinados con facilidad. Esta fase inicial serviría como un programa piloto, permitiendo a los Cognoscenti refinar sus métodos antes de expandir el programa a otras poblaciones. La Fase II, dice Fink, implicaría un programa de secuestro de futuros huérfanos y de los hijos de disidentes, para asegurar un suministro constante de \"reclutas\" para el programa."
 nss.129.a: "El Estado será su Daddy Warbucks."
 nss.129.b: "La Agencia los necesita a todos."
 nss.129.c: "América necesita una nueva casta de burócratas."
 nss.130.t: "Desenredada"
 nss.130.d: "Intentas leer los letreros de neón al otro lado de la calle.\nAyer eran familiares.\nHoy, los caracteres se disuelven, como tinta en agua.\nEntrecierras los ojos, y se reforman, pero la sensación es incorrecta.\n\nUn sabor agrio en tu boca.\nUn niño llora en el metro, y el sonido es solo ruido.\nSin significado, sin pena, sin irritación.\nSolo una frecuencia cruda e irritante.\n\nEn casa, comes. Solo puedes pensar en la textura y el calor.\nLa palabra \"madre\" flota en tu mente, desapegada, una etiqueta sin sentimiento.\nMiras a la anciana al otro lado de la mesa.\n¿Es ella?\nEl apartamento se siente más pequeño, las paredes más cerca.\n\nPuedes sentir un dolor en la parte posterior de tu cráneo.\nPuedes sentir un vacío donde debería haber un estómago lleno.\nLa ciudad zumba con un nuevo ritmo.\nEs discordante.\nTiene hambre."
 nss.130.a: "Te olvidas algo importante."
 nss.131.t: "Los ancestros lloran"
 nss.131.d: "Puedes sentir tambores en tu cabeza.\nO quizás es tu corazón.\nLatiendo. Palpitando.\nCirculando sangre.\nCirculando vida.\n\nSientes el amuleto de jade que te dio tu abuela.\nLos caracteres han cambiado.\nSe retuercen como gusanos.\nIntentas rezar a los ancestros, pero las palabras se vuelven arena en tu garganta.\n¿Qué es un ancestro?\n\nUn caos idiota se arrastra a tu alrededor. La gente grita.\nFormas y figuras de color.\nLos sonidos, una sinfonía de sonidos sin sentido.\nRecoges algo redondo.\nTienes hambre."
 nss.131.a: "La comida en tu casa ya no es comida."
 nss.132.t: "Dinastía vacía"
 nss.132.d: "Come. Devora.\nLa circulación de la sangre es la circulación del poder.\nEres el hijo del cielo.\nNo necesitas hablar.\nEllos entienden el lenguaje de tus dientes.\n\nCome. Más fuerte.\nCome. Más afilado.\nEl cielo está rojo.\nEl río corre negro.\nEstás empapado de vida, estás empapado de poder.\nTu corte es un coro de gritos.\nEllos no te entienden, y tú no los entiendes a ellos.\n\nAsí debe ser.\nEsta es la nueva verdad.\nEste es el nuevo lenguaje."
 nss.132.a: "El emperador está desnudo."
 nss.133.t: "Almuerzo desnudo"
 nss.133.d: "Estás en un lugar.\nLa carne yace ante ti.\nMiras un charco de algo oscuro.\nUn extraño te devuelve la mirada.\nNo sabes quién es.\nEres un trozo de carne en un mundo de carne.\nTienes hambre de nuevo.\nEl hambre es la única palabra que aún tiene significado.\n\nLas formas están bailando.\nRojo y negro.\nTodas son formas.\nLo único que importa es que eres una forma.\nUna forma que come.\nUna forma que mata.\nEl latido en tu cráneo se hace más fuerte.\nNo puedes oír nada más.\nNo puedes pensar en nada más."
 nss.133.a: "Solo una nota."

l_spanish:
 infrastructure: "Infraestructura"
 infrastructure_plural: "Infraestructuras"
 infrastructure_desc: "El estado disfruta de una mejora en la infraestructura gracias a este edificio. Incrementa tu suministro de energía en regiones estratégicas y aumenta la velocidad de las divisiones y la extracción de materias primas."
 arms_factory: "Fábrica militar"
 arms_factory_plural: "Fábricas militares"
 arms_factory_desc: "Este edificio proporciona al estado la industria para la producción de nuevo equipo militar, a costa del mantenimiento de la §Rfábrica militar§!.Puede convertirse en una §Yfábrica civil§! si fuera necesario."
 dockyard: "Astillero naval"
 dockyard_plural: "Astilleros navales"
 dockyard_desc: "Este edificio proporciona al estado la industria para la construcción de nuevos buques, a costa de mantenimiento del §Rastillero§!."
 industrial_complex: "Fábrica civil"
 industrial_complex_plural: "Fábricas civiles"
 industrial_complex_desc: "Este edificio proporciona al estado la industria para la producción de bienes civiles o construcción de nuevos edificios, y proporciona §GPIB§! e §Gingresos fiscales§! basados en el §Yvalor empresarial§! y la §Ytasa impositiva empresarial§! actuales, respectivamente. Puede convertirse en una §Yfábrica militar§! si fuese necesario."
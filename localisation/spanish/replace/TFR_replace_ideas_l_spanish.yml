 independent_air_force_spirit:0 "Fuerza independiente"
 independent_air_force_spirit_desc:1 "La fuerza aérea es una rama independiente y tan importante como el ejército o la armada."
 industrial_destruction_spirit:0 "Destrucción industrial"
 industrial_destruction_spirit_desc:1 "1.000 bombarderos pueden cambiar el curso de la guerra con un solo ataque.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 dive_bombing_spirit:0 "Bombardeo en picado"
 dive_bombing_spirit_desc:1 "Para tacharlo de la lista.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 material_destruction_spirit:0 "Destrucción de material"
 material_destruction_spirit_desc:2 "La destrucción del equipamiento del enemigo y la interrupción de sus líneas de comunicación pueden asegurar la victoria más rápido que cualquier número de bajas ocasionadas.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 air_modernizers_spirit:0 "Modernizadores aéreos"
 air_modernizers_spirit_desc:1 "Ha pasado mucho tiempo desde que el Fokker E.III fue el mejor caza del mundo. Las cosas cambian deprisa."
 industry_liasons_spirit:0 "Unión industrial"
 industry_liasons_spirit_desc:1 "Solo una cooperación sin fricciones entre la industria de las aeronaves, el ejército y el Gobierno garantizará la máxima calidad."
 air_crew_surveys_spirit:0 "Encuestas a la tripulación aérea"
 air_crew_surveys_spirit_desc:1 "Después de todo, son los que usan el equipamiento, ¿por qué no les preguntamos?"
 maritime_patrol_spirit:0 "Patrulla marítima"
 maritime_patrol_spirit_desc:0 "Si flota, lo encontraremos."
 long_range_patrol_spirit:0 "Patrulla de largo alcance"
 long_range_patrol_spirit_desc:0 "Dominar el espacio aéreo lejos de casa."
 efficient_ground_crews_spirit:0 "Espíritu de equipos terrestres eficientes"
 efficient_ground_crews_spirit_desc:0 "Queremos buenos pilotos y todo lo demás, pero lo que de verdad importa es hacer que los aviones despeguen lo más rápido posible."
 effective_training_programs_spirit:0 "Programas de formación eficaces"
 effective_training_programs_spirit_desc:0 "Nada supera una buena educación."
 branch_independence_spirit:0 "Rama independiente"
 branch_independence_spirit_desc:0 "Ningún miembro del ejército o la armada puede darnos órdenes. Hacemos las cosas a nuestro modo."
 air_theory_spirit:0 "Espíritu de la teoría del aire"
 air_theory_spirit_desc:0 "Existe una ciencia del combate aéreo."
 subservience_to_army_spirit:0 "Obediencia al ejército"
 subservience_to_army_spirit_desc:0 "Es una descripción sencilla de la tarea: bombardear cuando los generales te lo ordenen."
 subservience_to_navy_spirit:0 "Obediencia a la armada"
 subservience_to_navy_spirit_desc:0 "Los aviones solo son realmente útiles como armas de apoyo naval y de reconocimiento."
 no_focus_on_training_spirit:0 "Sin enfoque en entrenamiento"
 no_focus_on_training_spirit_desc:0 "¿Practicar? ¿Para qué? ¡Esto es fácil! Así ahorramos combustible."
 disorganized_ground_crews_spirit:0 "Equipos terrestres desorganizados"
 disorganized_ground_crews_spirit_desc:0 "¿Equipos terrestres? ¿Qué son? ¿Qué importancia tienen?"
 conflicting_branches_spirit:0 "Ramas en conflicto"
 conflicting_branches_spirit_desc:0 "Pero me dijeron..."
 elite_fighter_pilots_spirit:0 "Pilotos de caza de élite"
 elite_fighter_pilots_spirit_desc:0 "Recordad, chicos: no hay puntos para el segundo puesto."
 long_range_navigation_spirit:0 "Navegación de largo alcance"
 long_range_navigation_spirit_desc:0 "Pueden correr, pero no esconderse."
 dogfighting_training_spirit:0 "Entrenamiento en combates aéreos"
 dogfighting_training_spirit_desc:0 "Eso no es un giro en U, es medio bucle."
 expert_marksmen_spirit:0 "Tiradores expertos"
 expert_marksmen_spirit_desc:0 "Todo consiste en saber a dónde apuntar y cuándo apretar el gatillo."
 battlefield_air_interdiction_spirit:0 "Interdicción del combate aéreo"
 battlefield_air_interdiction_spirit_desc:0 "Estrecha cooperación entre fuerzas de aire y de tierra."
 cag_night_fighting_spirit:0 "Cazas nocturnos"
 cag_night_fighting_spirit_desc:0 "¿Creías que volar en la oscuridad era difícil? ¡Pues prueba a aterrizar de noche en un portaaviones!"
 veteran_air_instructors_spirit:0 "Instructores aéreos veteranos"
 veteran_air_instructors_spirit_desc:0 "Que los mejores entrenen al resto."
 steel_wings_steel_hearts_spirit:0 "Alas de acero, corazón de acero"
 steel_wings_steel_hearts_spirit_desc:1 "Hace falta cierto tipo de valor para hacer la guerra a 10.000 pies.\n\n§GEste espíritu está disponible gracias a nuestra ideología.§!"
 home_defence_spirit:1 "Héroes aerotransportados"
 home_defence_spirit_desc:1 "La vasta extensión de cielo encierra una enorme promesa para los que buscan un legado."
 centralized_control_spirit:0 "Control centralizado"
 centralized_control_spirit_desc:1 "Una gestión de recursos eficaz asegura que los aviones lleguen a los lugares donde son más necesarios."
 air_power_projection_spirit:0 "Proyección de poder aéreo"
 air_power_projection_spirit_desc:0 "Se necesita una valentía especial para volar lejos de casa."
 massed_strike_spirit:0 "Ataque en masa"
 massed_strike_spirit_desc:1 "Detener a las fuerzas terrestres del enemigo es la mejor forma de derrotarlo.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 continuous_strike_spirit:0 "Ataque continuo"
 continuous_strike_spirit_desc:1 "La destrucción del equipo enemigo es fundamental.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 strategic_strike_spirit:0 "Devastación total"
 strategic_strike_spirit_desc:1 "Los ataques en masa estratégicos contra el corazón del enemigo mermarán su capacidad de combate.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 duelling_obsession_spirit:0 "Obsesión con los duelos"
 duelling_obsession_spirit_desc:0 "Luchar cara a cara es la única forma elegante y honorable de combate aéreo."
 lax_safety_regulations_spirit:0 "Normativa de seguridad en el aire"
 lax_safety_regulations_spirit_desc:0 "A ver, si nadie sigue las instrucciones de todas formas, ¿a qué viene esto?"
 officers_clique_spirit:0 "Camarilla de oficiales"
 officers_clique_spirit_desc:0 "Puede que sean pilotos, pero siguen siendo soldados, ¿no?"
 not_worth_the_risk_spirit:0 "No vale la pena el riesgo"
 not_worth_the_risk_spirit_desc:0 "Los aviones son muy caros, ¿sabes?"
 merchant_mariners_spirit:0 "Marinos mercantes"
 merchant_mariners_spirit_desc:0 "Llevamos la náutica en las venas."
 naval_wargames_spirit:0 "Juegos de guerra naval"
 naval_wargames_spirit_desc:0 "La formación estratégica teórica salva vidas y combustible."
 instilled_aggression_spirit:0 "Instigación a la agresión"
 instilled_aggression_spirit_desc:0 "¡Al ataque, al ataque!"
 instilled_aggression_spirit_tt:0 "Almirantes: §G50% de probabilidad§! de ganar §Y+1 de ataque§! al subir de nivel."
 calculated_restraint_spirit:0 "Contención calculada"
 calculated_restraint_spirit_desc:0 "Tras considerarlo detenidamente..."
 calculated_restraint_spirit_tt:0 "Almirantes: §G50% de probabilidad§! de ganar §Y+1 de defensa§! al subir de nivel."
 signals_training_spirit:0 "Formación en señales"
 signals_training_spirit_desc:0 "Para que todos cumplan con su deber, tienen que saber cuál es su deber."
 signals_training_spirit_tt:0 "Almirantes: §G50% de probabilidad§! de ganar §Y+1 de maniobras y coordinación§! al subir de nivel."
 fleet_in_being_academy_spirit:0 "Gran flota"
 fleet_in_being_academy_spirit_desc:1 "Formación táctica a gran escala.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 fleet_in_being_academy_spirit_tt:0 "Nuevos almirantes: §G50% de probabilidad§! de empezar con el rasgo §YExperto en artillería§!."
 merchant_mariners_spirit_tt:1 "Nuevos almirantes: §G50% de probabilidad§! de empezar con el rasgo §YLinaje naval§!."
 trade_interdiction_academy_spirit:0 "Convoyes de guerra"
 trade_interdiction_academy_spirit_desc:1 "Los convoyes mercantes requieren formación y tácticas especiales.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 trade_interdiction_academy_spirit_tt:0 "Nuevos almirantes: §G50% de probabilidad§! de empezar con el rasgo §YSeawolf§! o §YRompebloqueos§!."
 base_strike_academy_spirit:0 "Fuerza aérea integrada"
 base_strike_academy_spirit_desc:1 "¡La cooperación estrecha entre aire y mar es vital!\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 base_strike_academy_spirit_tt:0 "Nuevos almirantes: §G50% de probabilidad§! de empezar con el rasgo §YEntusiasta de la aviación§!."
 damage_control_training_spirit:0 "Control de daño"
 damage_control_training_spirit_desc:0 "Con tripulaciones bien entrenadas tendremos menos bajas."
 damage_control_training_spirit_tt:0 "Nuevos almirantes: §G50% de probabilidad§! de empezar con el rasgo §YIngeniero jefe§!."
 best_of_the_best_naval_academy_spirit:0 "Lo mejor de lo mejor"
 best_of_the_best_naval_academy_spirit_desc:1 "Una competición reñida y una selección estricta producirá los capitanes que queremos.\n\n§GEste espíritu está disponible gracias a nuestra ideología.§!"
 best_of_the_best_naval_academy_spirit_tt:0 "Nuevos almirantes: empiezan sin ningún rasgo de personalidad."
 naval_academy_scholarships_spirit:0 "Becas académicas"
 naval_academy_scholarships_spirit_desc:0 "Todo consiste en dar la oportunidad de brillar a la gente adecuada."
 naval_academy_scholarships_spirit_tt:0 "Nuevos almirantes: empiezan sin ningún rasgo de personalidad."
 underfunded_naval_academy_spirit:0 "Academia naval sin fondos suficientes"
 underfunded_naval_academy_spirit_desc:0 "Al menos, tenemos una..."
 traditionalism_naval_academy_spirit:0 "Tradicionalismo"
 traditionalism_naval_academy_spirit_desc:0 "Así hemos hecho siempre las cosas. ¿Por qué cambiar?"
 traditionalism_naval_academy_spirit_tt:0 "Más probabilidad de que los nuevos almirantes tengan el rasgo §YVieja guardia§!.\n§G50% de probabilidad§! de que los nuevos almirantes ganen un punto más de habilidad en dos categorías."
 political_appointments_naval_academy_spirit:0 "Designaciones políticas"
 political_appointments_naval_academy_spirit_desc:0 "Es importante que solo enseñen en nuestra academia profesores con la actitud adecuada."
 nepotism_naval_academy_spirit:0 "Nepotismo"
 nepotism_naval_academy_spirit_desc:0 "Mi padre fue profesor en la academia como su padre y su hermano..."
 nepotism_naval_academy_spirit_tt:0 "Menos probabilidad de que los nuevos almirantes tengan rasgos de personalidad favorables."
 jeune_ecole_spirit:0 "Nueva Escuela"
 jeune_ecole_spirit_desc:0 "¡Los destructores son el futuro!"
 big_gun_club_spirit:0 "Club del Cañonero"
 big_gun_club_spirit_desc:0 "Además del mar, los acorazados dominan la política."
 aviation_enthusiasts_spirit:0 "Entusiastas de la aviación"
 aviation_enthusiasts_spirit_desc:0 "El futuro del combate naval se decidirá en el aire."
 cruiser_warfare_spirit:0 "Cruceros de guerra"
 cruiser_warfare_spirit_desc:0 "Los cruceros son los mejores navíos, pueden hacer de todo."
 wolfpacks_spirit:0 "Táctica de manada"
 wolfpacks_spirit_desc:0 "Los cazadores silenciosos del mar."
 flexible_contracts_spirit:0 "Contratos flexibles"
 flexible_contracts_spirit_desc:0 "El mejor contrato es el que se puede cancelar."
 integrated_designers_spirit:0 "Diseñadores integrados"
 integrated_designers_spirit_desc:0 "Adaptar nuestros diseños continuamente es prioritario."
 naval_reform_spirit:0 "Reforma naval"
 naval_reform_spirit_desc:0 "La guerra siempre cambia."
 naval_refit_yards_spirit:0 "Astilleros de reacondicionamiento"
 naval_refit_yards_spirit_desc:0 "A menos tiempo en el muelle, más tiempo pasa el buque en el mar."
 naval_modernism_spirit:0 "Modernismo"
 naval_modernism_spirit_desc:0 "El futuro ya está aquí."
 fleet_in_being_navy_spirit:0 "Presencia global"
 fleet_in_being_navy_spirit_desc:1 "Nuestros buques patrullarán los océanos de todo el planeta.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 trade_interdiction_navy_spirit:1 "Primacía submarina"
 trade_interdiction_navy_spirit_desc:1 "Sin suministros, un país no puede ir a la guerra.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 base_strike_navy_spirit:1 "Fuerza móvil"
 base_strike_navy_spirit_desc:1 "Se puede atacar en cualquier momento y lugar.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 landlocked_spirit:0 "País interior"
 landlocked_spirit_desc:0 "Sin acceso al mar, es difícil desarrollar una tradición naval."
 political_connections_navy_spirit:0 "Conexiones políticas"
 political_connections_navy_spirit_desc:0 "¡Mi cargo no tiene nada que ver con que mi padre sea ministro de Hacienda!"
 overbearing_army_spirit:0 "Tierra soberbia"
 overbearing_army_spirit_desc:0 "La armada solo es un apoyo para el ejército de tierra."
 bureau_of_ordnance_spirit:0 "Oficina de Navegación"
 bureau_of_ordnance_spirit_desc:1 "La Oficina de Navegación influye en el diseño de los buques.\n\n§GEste espíritu está disponible gracias a nuestros increíbles torpedos.§!"
 only_big_guns_spirit:0 "Solo grandes cañones"
 only_big_guns_spirit_desc:0 "Los acorazados son los reyes indiscutibles en alta mar."
 close_combat_navy_spirit:0 "Combate cuerpo a cuerpo"
 close_combat_navy_spirit_desc:0 "Acortar distancias es la clave de la victoria."
 night_fighting_spirit:0 "Combate nocturno"
 night_fighting_spirit_desc:0 "Acostumbrarse a luchar a oscuras da determinadas ventajas."
 surprise_attacks_spirit:1 "Ataques sorpresa"
 surprise_attacks_spirit_desc:1 "Atacar al enemigo antes de que perciba el peligro.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 efficient_communications_spirit:0 "Comunicaciones eficientes"
 efficient_communications_spirit_desc:0 "Comunicación, comunicación y más comunicación."
 discrete_valor_spirit:0 "Valor discreto"
 discrete_valor_spirit_desc:0 "Sobrevivir para luchar otro día."
 surface_raiders_spirit:1 "Incursores de superficie"
 surface_raiders_spirit_desc:1 "¿Por qué dejar que los submarinos lo hagan todo?\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 decisive_battle_spirit:0 "Batalla decisiva"
 decisive_battle_spirit_desc:1 "Ir a la batalla apostando fuerte siempre te da la iniciativa.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 inclimate_weather_experience_spirit:1 "Experiencia de tiempo inclemente"
 inclimate_weather_experience_spirit_desc:0 "No existe el mal tiempo..."
 brave_commanders_spirit:0 "Comandantes valerosos"
 brave_commanders_spirit_desc:0 "Malditos torpedos, ¡a toda máquina!"
 brown_water_spirit:0 "Combate costero"
 brown_water_spirit_desc:0 "Navegar y combatir en el archipiélago requiere habilidades especiales."
 green_water_spirit:0 "Agua verde"
 green_water_spirit_desc:0 "Estar cerca de la orilla es lo más seguro."
 blue_water_spirit:0 "Agua azul"
 blue_water_spirit_desc:0 "El vasto océano es el hogar de un marinero."
 poor_damage_control_training_spirit:0 "Poco entrenamiento de control de daños"
 poor_damage_control_training_spirit_desc:0 "¿De qué sirve entrenarse en esto? Se supone que tenemos que causar nosotros daños al enemigo, no al revés."
 limited_sea_time_spirit:0 "Tiempo en el mar limitado"
 limited_sea_time_spirit_desc:0 "Mantener la flota en el mar hace más caro operarla."
 cult_of_the_signal_flag_spirit:0 "Culto a la bandera de señales"
 cult_of_the_signal_flag_spirit_desc:0 "Mientras todos sigan las órdenes, no hay nada que reprochar."
 overbearing_admirality_spirit:0 "Almirantazgo soberbio"
 overbearing_admirality_spirit_desc:0 "Consultar siempre al Almirantazgo."
 bold_attack_spirit:0 "Ataque audaz"
 bold_attack_spirit_desc:1 "Como se suele decir, la mejor defensa es un buen ataque."
 tenacious_defense_spirit:0 "Defensa tenaz"
 tenacious_defense_spirit_desc:0 "¡No pasarán!"
 meticulous_preparation_spirit:0 "Preparación meticulosa"
 meticulous_preparation_spirit_desc:0 "La guerra es caos, pero podemos prepararnos para eso."
 best_of_the_best_spirit:0 "Lo mejor de lo mejor"
 best_of_the_best_spirit_desc:0 "Pocas personas tienen lo que hace falta para dirigir a los soldados a la batalla. Y muchas menos tienen lo necesario para ganar."
 academy_scholarships_spirit:0 "Becas académicas"
 academy_scholarships_spirit_desc:1 "Nadie debería ser apartado del servicio a la nación por motivos económicos.\n\n§GEste espíritu está disponible gracias a nuestra ideología.§!"
 political_loyalty_spirit:0 "Lealtad política"
 political_loyalty_spirit_desc:1 "La desconfianza militar es una amenaza para el Estado al que se supone que debe proteger.\n\n§GEste espíritu está disponible gracias a nuestra ideología.§!"
 political_loyalty_spirit_tt:1 "Nuevos oficiales: empiezan con el rasgo §YCon conexiones políticas§! o §YEstrella mediática§!."
 inventive_leadership_spirit:0 "Liderazgo inventivo"
 inventive_leadership_spirit_desc:0 "Un general predecible es un general derrotado."
 inventive_leadership_spirit_tt:2 "Nuevos oficiales: §G50% de probabilidades§! de empezar con el rasgo §YComando§!, §YEmbaucador§! o §YInvasor§!."
 mobile_warfare_academy_spirit:0 "Abrazar el futuro"
 mobile_warfare_academy_spirit_desc:1 "En las batallas del futuro, las tropas blindadas tendrán un papel decisivo.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 mobile_warfare_academy_spirit_tt:2 "Nuevos oficiales: tienen la oportunidad de empezar con el rasgo §Y\"Oficial de Panzer\"§!."
 superior_firepower_academy_spirit:1 "Escuelas de ingeniería"
 superior_firepower_academy_spirit_desc:2 "Cavar una zanja en condiciones tiene mucha ciencia.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 superior_firepower_academy_spirit_tt:2 "Nuevos oficiales: tienen la oportunidad de empezar con el rasgo §Y\"Oficial de ingeniería\"§!."
 theatre_training_spirit:0 "Entrenamiento en el teatro"
 theatre_training_spirit_desc:1 "Algunos oficiales se acostumbran rápido a las costumbres locales, pero a los lugareños se les da muy bien luchar en su propio terreno.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 theatre_training_academy_spirit_tt:0 "§G50% de probabilidades§! de que los nuevos oficiales se creen con el rasgo §YEstratega brillante§! o §YEstratega inflexible§!."
 mass_assault_academy_spirit:0 "La reina de la batalla"
 mass_assault_academy_spirit_desc:1 "La infantería es la reina de la batalla, y la reina siempre va donde le place.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 underfunded_academy_spirit:0 "Academia con fondos insuficientes"
 underfunded_academy_spirit_desc:0 "Hay mejores cosas que hacer que gastar el dinero en enseñar a la gente cómo matarse de manera más eficiente."
 nepotism_academy_spirit:0 "Nepotismo"
 nepotism_academy_spirit_desc:0 "¡Mi tío dirige el ejército y dice que puedo tener mi propia división cuando quiera!"
 professional_officer_corps_spirit:0 "Oficiales profesionales"
 professional_officer_corps_spirit_desc:0 "Somos profesionales, y la guerra es nuestra profesión."
 elevated_engineering_corps_spirit:0 "Cuerpo de ingenieros elevados"
 elevated_engineering_corps_spirit_desc:0 "La mejor manera de juzgar la habilidad y la personalidad de un hombre es darle una pala y un día para hacer algo útil con ella."
 proper_heritage_spirit:0 "Herencia apropiada"
 proper_heritage_spirit_desc:0 "Se puede entrenar a un buen general, pero un gran general debe criarse. Como los caballos, en cierto modo."
 quick_improvisation_spirit:0 "Improvisación rápida"
 quick_improvisation_spirit_desc:0 "Comprende rápido, piensa rápido y actúa rápido. Esa es la clave de la victoria."
 adaptable_modernizers_spirit:0 "Modernizadores versátiles"
 adaptable_modernizers_spirit_desc:0 "Una doctrina que no se puede cambiar también puede llamarse dogma."
 relief_of_command_spirit:0 "Relevo del mando"
 relief_of_command_spirit_desc:1 "El ejército no está para alimentar el ego de sus generales.\n\n§GEste espíritu está disponible gracias a nuestra ideología.§!"
 ideological_loyalty_spirit:0 "Lealtad ideológica"
 ideological_loyalty_spirit_desc:1 "No se puede esperar que quienes siguen malas ideologías tengan buenos resultados en la batalla.\n\n§GEste espíritu está disponible gracias a nuestra ideología.§!"
 state_serves_the_military_spirit:0 "El Estado sirve al ejército"
 state_serves_the_military_spirit_desc:2 "El propósito del Estado es librar guerras contra otros Estados. Todo lo demás son distracciones.\n\n§GEste espíritu está disponible gracias a nuestra ideología.§!"
 mobile_warfare_army_spirit:0 "Motorización"
 mobile_warfare_army_spirit_desc:1 "Golpea más fuerte, ve más lejos y gana con más contundencia.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 superior_firepower_army_spirit:0 "Potencia de fuego aplastante"
 superior_firepower_army_spirit_desc:1 "Si la artillería no te sirve para ganar batallas, es que no tienes suficiente.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 grand_battleplan_army_spirit:0 "Punta de la lanza"
 grand_battleplan_army_spirit_desc:1 "Una daga de noche es más efectiva que una espada de día.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 mass_assault_army_spirit:1 "Fuerza de la bayoneta"
 mass_assault_army_spirit_desc:1 "Al final, no son los tanques ni los aviones los que mantienen la posición.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 political_connections_spirit:0 "Conexiones políticas"
 political_connections_spirit_desc:0 "Bien, ¡veamos qué dice el ministro al respecto!"
 entrenched_old_guard_spirit:0 "Vieja guardia atrincherada"
 entrenched_old_guard_spirit_desc:0 "¿Quién es este idiota, y por qué está hablando otra vez de \"IA\"?"
 doctrinal_orthodoxy_spirit:0 "Ortodoxia doctrinal"
 doctrinal_orthodoxy_spirit_desc:0 "En mis tiempos, no lo hacíamos así."
 excessive_parade_drill_spirit:0 "Desfiles excesivos"
 excessive_parade_drill_spirit_desc:0 "El principal objetivo de un soldado es lucirse bien en los desfiles."
 static_warfare_spirit:0 "Guerra estática"
 static_warfare_spirit_desc:0 "Nunca hay suficientes trincheras. Solo hay insuficientes o apenas suficientes."
 flexible_organization_spirit:0 "Organización flexible"
 flexible_organization_spirit_desc:0 "Lo que cuenta es hacer el trabajo, no seguir las órdenes al pie de la letra."
 aggressive_reconnaisance_spirit:0 "Reconocimiento agresivo"
 aggressive_reconnaisance_spirit_desc:0 "¡Si quieres saber qué trama el otro bando, ve allí y pregúntales directamente!"
 reserve_officers_spirit:0 "Oficiales de reserva"
 reserve_officers_spirit_desc:0 "No todo el mundo tiene que hacer del ejército su profesión, pero, en tiempos de guerra, todos pueden servir."
 upbeat_command_spirit:0 "Comando optimista"
 upbeat_command_spirit_desc:0 "Unas palabras amables o una broma con los soldados a veces hacen más por el éxito general que una batería de artillería más."
 victory_or_death_spirit:0 "Victoria o muerte"
 victory_or_death_spirit_desc:0 "Es mejor morir gloriosamente que vivir con la vergüenza de la derrota."
 maneuver_warfare_spirit:0 "Guerra de maniobras"
 maneuver_warfare_spirit_desc:1 "Una guerra civilizada y correcta se parece más a una partida de ajedrez que a una refriega. ¿Por qué luchar contra un enemigo al que puedes esquivar?\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 smoke_and_fire_spirit:0 "Humo y fuego"
 smoke_and_fire_spirit_desc:1 "Un aluvión de proyectiles es sorprendentemente efectivo para evitar que el enemigo devuelva los disparos.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 logistical_focus_spirit:0 "Enfoque logístico"
 logistical_focus_spirit_desc:1 "Las tropas pueden comerse el cuero de sus cinturones, pero los tanques necesitan combustible.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 operational_reserve_spirit:0 "Reservas operacionales"
 operational_reserve_spirit_desc:1 "Siempre has de tener un as en la manga. Siempre.\n\n§GEste espíritu está disponible gracias a nuestras doctrinas.§!"
 intercommand_rivalries_spirit:0 "Rivalidades entre comandos"
 intercommand_rivalries_spirit_desc:0 "Las batallas más importantes se luchan en las comisiones presupuestarias, y allí es donde nacen los rencores más horribles."
 disregard_for_the_common_soldier_spirit:0 "Desprecio por el soldado común"
 disregard_for_the_common_soldier_spirit_desc:0 "El soldado medio es la criatura más holgazana, fea y estúpida que puede caber en un uniforme."
 constraining_hierarchy_spirit:0 "Jerarquía restrictiva"
 constraining_hierarchy_spirit_desc:0 "Si no controlas dónde están tus subordinados en todo momento, alguien podría acabar robándotelos."
 disdain_for_the_digging_spirit:0 "Odio a la excavación"
 disdain_for_the_digging_spirit_desc:0 "Todo este barro va a ir a parar a los uniformes de las tropas, y luego tendrán que pasar mucho tiempo limpiándolo."
 traditionalism_academy_spirit:0 "Tradicionalismo"
 traditionalism_academy_spirit_desc:0 "La guerra... La guerra nunca cambia."
 expeditionary_spirit:0 "Guerra expedicionaria"
 expeditionary_spirit_desc:0 "Ganar una guerra significa ir al país contrario y romper un montón de cosas."
 penny_pinching_spirit:0 "Tacañería"
 penny_pinching_spirit_desc:0 "¿Sabes cuánto cuesta disparar esta bala? ¿Y quieres hacerlo solo por \"practicar\"?"

 CRO_motorized_rocket_equipment_1: "APR-40"
 CRO_motorized_rocket_equipment_1_short: "APR-40"
 CRO_motorized_rocket_equipment_1_desc: "Una versión modificada del BM-21 \"Grad\". El sistema de cohetes de campaña M-21 con un vehículo lanzador BM-21 (sistema de lanzacohetes múltiples (MRL) de 122 mm) entró en servicio en el Ejército soviético en 1963 para sustituir al vetusto sistema BM-14 de 140 mm."

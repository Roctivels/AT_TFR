 TUR_mechanized_equipment_1: "M113A2T2"
 TUR_mechanized_equipment_1_short: "M113A2T2"
 TUR_mechanized_equipment_1_desc: "Modernizado y de producción local, el M113 ha sido utilizado por el ejército turco para todo tipo de tareas durante décadas."
 TUR_mechanized_equipment_2: "ACV-15"
 TUR_mechanized_equipment_2_short: "ACV-15"
 TUR_mechanized_equipment_2_desc: "El ACV-15 se desarrolló como un APC/IFV capaz de seguir y acompañar a carros de combate principales en divisiones acorazadas o brigadas mecanizadas. Se hace hincapié tanto en la protección con un blindaje adicional como en el armamento con un cañón automático de 20 mm en la torreta."
 TUR_mechanized_equipment_3: "ACV-19"
 TUR_mechanized_equipment_3_short: "ACV-19"
 TUR_mechanized_equipment_3_desc: "El ACV-19, una variante mejorada del ACV-15, viene con protección adicional contra proyectiles de 30 mm, RPG y minas, además de aire acondicionado y navegación por satélite obligatorios."
 TUR_mechanized_equipment_4: "TULPAR"
 TUR_mechanized_equipment_4_short: "TULPAR"
 TUR_mechanized_equipment_4_desc: "Diseñado como una plataforma de vehículos polivalente con más protección y una silueta más baja, el TULPAR está concebido para ayudar tanto a los tanques de nueva generación como a la infantería en un amplio conjunto de climas y operaciones desafiantes."
 TUR_mechanized_equipment_5: "KAPLAN-20 NG-AFV"
 TUR_mechanized_equipment_5_short: "KAPLAN-20 NG-AFV"
 TUR_mechanized_equipment_5_desc: "Fabricado con soldadura balística, dotado de un sistema de cañones de 35 mm y equipado con medios de vanguardia, el KAPLAN aspira a ser el rey de la guerra mecanizada en un siglo XXI siempre impredecible."
 TUR_light_mechanized_equipment_1: "M8 Light Armored Car"
 TUR_light_mechanized_equipment_1_short: "M8"
 TUR_light_mechanized_equipment_1_desc: "Hasta los años 90, cuando se almacenaron definitivamente, el Ejército turco y las unidades paramilitares utilizaron diversos equipos de fabricación estadounidense de la Segunda Guerra Mundial, incluido este vehículo ligeramente blindado con un cañón de 37 mm y armamento secundario personalizable."
 TUR_light_mechanized_equipment_2: "Kobra"
 TUR_light_mechanized_equipment_2_short: "Kobra"
 TUR_light_mechanized_equipment_2_desc: "Basado en el vehículo utilitario estadounidense HMMVVV, el Kobra es un vehículo blindado ligero, robusto y versátil que proporciona cierta protección y una rápida movilidad."
 TUR_light_mechanized_equipment_3: "Kirpi"
 TUR_light_mechanized_equipment_3_short: "Kirpi"
 TUR_light_mechanized_equipment_3_desc: "El Kirpi, el vehículo resistente a las minas y protegido contra emboscadas que necesitaba el ejército turco, está equipado con posiciones de cañón blindadas, un casco resistente a los proyectiles antipersona y asientos amortiguados."
 TUR_light_mechanized_equipment_4: "PARS"
 TUR_light_mechanized_equipment_4_short: "PARS"
 TUR_light_mechanized_equipment_4_desc: "El PARS, un vehículo blindado de gran movilidad con capacidades anfibias únicas, está optimizado tanto para la contrainsurgencia como para los retos de la eventual guerra del siglo XXI."
 TUR_light_mechanized_equipment_5: "Arma TBP"
 TUR_light_mechanized_equipment_5_short: "Arma TBP"
 TUR_light_mechanized_equipment_5_desc: "Vehículo de combate blindado modular de ruedas múltiples, el casco monocasco de acero de alta dureza del Arma debería proporcionar a las unidades de combate una protección más que adecuada contra los peligros."

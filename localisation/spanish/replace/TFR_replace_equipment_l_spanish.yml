 amphibious_tank_equipment: "Tanques anfibios"
 amphibious_tank_equipment_short: "Tanques anfibios"
 amphibious_tank_equipment_desc: "Se trata de tanques modificados para desplazarse por el agua. Son mucho más efectivos en desembarcos anfibios y cruces de ríos que otros tanques, pero consumen más combustible."
 amphibious_tank_equipment_1: "Tanque anfibio 2ª Gen."
 amphibious_tank_equipment_1_desc: "Se trata básicamente de un tanque ligero modificado para flotar. Este vehículo ofrece fuego de apoyo a las unidades que conforman una cabeza de playa."
 amphibious_tank_equipment_2: "Tanque anfibio 3ª Gen."
 amphibious_tank_equipment_2_desc: "Un tanque ligero modificado para desplazarse por el agua. Su mayor versatilidad y movilidad conlleva una menor eficacia de combustible."
 amphibious_tank_3: "Tanque anfibio 4ª Gen."
 amphibious_tank_desc: "Un tanque ligero modificado para desplazarse por el agua. Su mayor versatilidad y movilidad conlleva una menor eficacia de combustible."
 amphibious_mechanized_equipment: "Vehículos de desembarco anfibio"
 amphibious_mechanized_equipment_short: "Amtracs"
 amphibious_mechanized_equipment_desc: "Los tractores anfibios, también llamados Amtracs, permiten a los marines desembarcar en una playa con protección blindada. No obstante, esto conlleva una eficacia de combustible pobre."
 amphibious_mechanized_equipment_1: "Vehículo de asalto anfibio 1ª Gen."
 amphibious_mechanized_equipment_1_short: "VAA 1ª Gen."
 amphibious_mechanized_equipment_1_desc: "Los tractores anfibios, también llamados Amtracs, permiten a los marines desembarcar en una playa con protección blindada. No obstante, esto conlleva una eficacia de combustible pobre."
 amphibious_mechanized_equipment_2: "Vehículo de asalto anfibio 2ª Gen."
 amphibious_mechanized_equipment_2_short: "VAA 2ª Gen."
 amphibious_mechanized_equipment_2_desc: "Estos Amtracs presentan varias mejoras con respecto a la versión básica, como una rampa de carga trasera que facilita los desembarcos en la playa."
 amphibious_mechanized_equipment_3: "Vehículo de asalto anfibio 3ª Gen."
 amphibious_mechanized_equipment_3_short: "VAA 3ª Gen."
 amphibious_mechanized_equipment_3_desc: "Estos Amtracs presentan varias mejoras con respecto a la versión básica, como una rampa de carga trasera que facilita los desembarcos en la playa."

 PER_infantry_equipment_0: "HK G3A6"
 PER_infantry_equipment_0_short: "HK G3A6"
 PER_infantry_equipment_0_desc: "El G3 es un fusil de combate de calibre 7,62×51 mm OTAN desarrollado en 1956 por el fabricante de armamento alemán Heckler & Koch GmbH (H&K) en colaboración con la agencia estatal española de diseño y desarrollo CETME."
 PER_infantry_equipment_1: "KL-7.62"
 PER_infantry_equipment_1_short: "KL-7.62"
 PER_infantry_equipment_1_desc: "Copia iraní del Tipo 56 y AKM chinos. Posiblemente producido bajo licencia. Fusil de servicio principal de los CGRI."
 PER_infantry_equipment_2: "KH-2002"
 PER_infantry_equipment_2_short: "KH-2002"
 PER_infantry_equipment_2_desc: "El KH2002 Khaybar es un rifle de asalto de diseño iraní, derivado del rifle de asalto DIO S 5.56 y desarrollado por la Organización de Industrias de Defensa de Irán (DIO). Fue diseñado en 2001 con muestras producidas en 2003 y la producción final del KH2002 comenzó en 2004. Es similar visualmente al rifle de asalto FAMAS."

 UKR_motorized_equipment_1: "KrAZ Cougar"
 UKR_motorized_equipment_1_short: "KrAZ Cougar"
 UKR_motorized_equipment_1_desc: "El coche blindado tiene la disposición habitual: el motor se encuentra en la parte delantera, el compartimento de control en el centro y el compartimento de aterrizaje en la parte trasera. La tripulación está compuesta por dos personas y puede transportar a varios soldados de infantería."
 USA_infantry_equipment_0: "M14"
 USA_infantry_equipment_0_short: "M14"
 USA_infantry_equipment_0_desc: "M14"
 USA_infantry_equipment_1: "M16A2"
 USA_infantry_equipment_1_short: "M16A2"
 USA_infantry_equipment_1_desc: "El desarrollo del rifle M16A2 fue solicitado originalmente por el Cuerpo de Marines de los Estados Unidos como resultado de la experiencia de combate en Vietnam con el XM16E1 y M16A1. Fue adoptado oficialmente por el Departamento de Defensa como el \"Rifle de EE.UU., 5,56 mm, M16A2\" en 1982. Los marines fueron la primera rama de las Fuerzas Armadas de EE.UU. En adoptarlo, a principios y mediados de la década de 1980, con los Estados Unidos. El ejército siguió su ejemplo a fines de la década de 1980."
 USA_infantry_equipment_2: "M16A4"
 USA_infantry_equipment_2_short: "M16A4"
 USA_infantry_equipment_2_desc: "El M16A4 es la cuarta generación de la serie M16. Está equipado con un asa de transporte extraíble y un riel Picatinny cuádruple de longitud completa para montar ópticas y otros dispositivos auxiliares. El FN M16A4, que utiliza fuego selectivo seguro / semi / ráfaga, se convirtió en el arma estándar del Cuerpo de Marines de EE.UU."
 USA_infantry_equipment_3: "M4"
 USA_infantry_equipment_3_short: "M4"
 USA_infantry_equipment_3_desc: "La carabina M4 es una variante más corta y ligera del fusil de asalto M16A2. Es una carabina calibre 5,56 × 45 mm OTAN, refrigerada por aire, con sistema de gas expansivo Stoner, accionada por gas y alimentada por cargador. Tiene un cañón de 37,5 cm y culata telescópica."
 USA_infantry_equipment_4: "Fusil Automático de Infantería M27"
 USA_infantry_equipment_4_short: "M27 IAR"
 USA_infantry_equipment_4_desc: "El Fusil Automático de Infantería M27 (M27 Infantry Automatic Rifle (IAR) en inglés) es un arma de fuego ligera de calibre 5,56 × 45 mm OTAN, de fuego selectivo basada en el fusil de asalto Heckler & Koch HK416. El Cuerpo de Marines de los Estados Unidos planeó comprar 6.500 fusiles automáticos M27 para reemplazar a una parte de sus ametralladoras ligeras M249 empleadas en sus batallones de infantería y reconocimiento blindado ligero."
 USA_infantry_equipment_5: "NGSW-R"
 USA_infantry_equipment_5_short: "NGSW-R"
 USA_infantry_equipment_5_desc: "El primer avance moderno significativo en armas de infantería, el contrato de Next Generation Squad Weapon, ha sido otorgado a Sig Sauer. Utilizando un cartucho híbrido de 6,8 mm, ha sido diseñado para proporcionar mayor penetración a mayores distancias que los rifles anteriores."
 USA_infantry_equipment_6: "MR-C"
 USA_infantry_equipment_6_short: "Modular Rifle - Caseless"
 USA_infantry_equipment_6_desc: "Diseñado por Crye Associates, el fusil iba a tener un diseño bullpup con un sistema de rieles a los cuatro lados. El fusil fue una maqueta diseñada en 2005 para su fabricación y venta al Ejército de Estados Unidos. Nunca superó la fase de diseño y tampoco se construyeron prototipos."
 USA_motorized_equipment_1: "M35"
 USA_motorized_equipment_1_short: "REO M35"
 USA_motorized_equipment_1_desc: ""
 USA_motorized_equipment_2_short: "MTVR"
 USA_motorized_equipment_2_desc: "El Reemplazo de Vehículo Táctico Mediano (MTVR) es una serie de vehículos basados en un chasis común que varían según la carga útil y los requisitos de la misión. El MTVR es un vehículo militar diseñado específicamente, aunque se han comercializado algunos para operaciones especializadas como la extinción de incendios forestales."

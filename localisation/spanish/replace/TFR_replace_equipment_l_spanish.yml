 SOV_infantry_equipment_0: "AKM"
 SOV_infantry_equipment_0_short: "AKM"
 SOV_infantry_equipment_0_desc: "El AKM es la variante más producida en serie del AK-47. Presentado en 1959, el AKM ofrece varias mejoras pequeñas pero notorias en conjunto, como nuevos dispositivos de seguridad y un peso más ligero cuando está cargado. Siguió siendo el rifle principal del Pacto de Varsovia hasta los años 70."
 SOV_infantry_equipment_1: "AK-74"
 SOV_infantry_equipment_1_short: "AK-74"
 SOV_infantry_equipment_1_desc: "El AK-74 reemplazó al obsoleto AKM en 1979 y se utilizó por primera vez en la invasión soviética de Afganistán. Tenía un cartucho diferente al de los modelos anteriores y se jactaba de tener un alcance, una precisión de disparo y una durabilidad mejorados. Sigue siendo el rifle más utilizado por las antiguas naciones comunistas y las pocas que quedan."
 SOV_infantry_equipment_2: "AK-74M"
 SOV_infantry_equipment_2_short: "AK-74M"
 SOV_infantry_equipment_2_desc: "El AK-74 es un fusil de asalto desarrollado a principios de los años 70 por el diseñador de armas ruso Mijaíl Kaláshnikov para reemplazar al anterior AKM. Utiliza un cartucho más pequeño, el 5,45×39 mm, que reemplaza la recámara de 7,62×39 mm de las anteriores armas Kaláshnikov."
 SOV_infantry_equipment_3: "AK-RMO"
 SOV_infantry_equipment_3_short: "AK-RMO"
 SOV_infantry_equipment_3_desc: "El AK-107 es un fusil de asalto ruso de calibre 5,45 mm, desarrollado a partir de la serie AK-100. Cuenta con un sistema operativo equilibrado. En este caso, la designación AK no se refiere al Avtomat Kalashnikova, sino a Aleksándrov/Kaláshnikov. La designación revisada indica la incorporación de un nuevo sistema de gases, diseñado por Yuri Aleksándrov, para fusiles de tipo Kaláshnikov."
 SOV_infantry_equipment_4: "AK-12"
 SOV_infantry_equipment_4_short: "AK-12"
 SOV_infantry_equipment_4_desc: "El AK-12 es un fusil de asalto ruso de calibre 5,45 mm, que fue diseñado y fabricado por la Corporación Kaláshnikov. Se dice que el modelo final del AK-12 es más fiable, más preciso y se adapta mejor a las últimas exigencias militares rusas. Está basado en el AK-400."
 SOV_infantry_equipment_5: "AK-12M"
 SOV_infantry_equipment_5_short: "AK-12M"
 SOV_infantry_equipment_5_desc: "En 2020, en la exposición del Ejército, se presentó una versión actualizada del fusil de asalto AK-12, modernizado bajo el proyecto AK-Evo. Se tuvieron en cuenta las observaciones de los militares sobre la experiencia real del uso del arma en las tropas. El fusil recibió una nueva culata mucho más cómoda, del diseño original, una nueva mira trasera de tipo dioptría y una nueva empuñadura de pistola a prueba de lesiones con guardamonte integrado."
 SOV_infantry_equipment_6: "AK-308"
 SOV_infantry_equipment_6_short: "AK-308"
 SOV_infantry_equipment_6_desc: "El fusil de asalto Kaláshnikov AK-308 se basa en el fusil de asalto AK-15, y es un arma de fuego individual que utiliza el cartucho de fusil 7,62 x 51 mm. Este modelo representa la cumbre del desarrollo del sistema AK y se diferencia de las generaciones anteriores por su sofisticada ergonomía, su adaptación al uso diario y su mayor precisión de disparo."
 SOV_motorized_equipment_1: "Urals Automotive Ural-4320"
 SOV_motorized_equipment_1_short: "Ural-4320"
 SOV_motorized_equipment_1_desc: "El Ural-4320 es un camión militar y un vehículo todoterreno 6x6 multipropósito, producido por la fábrica UralAZ en Miass, Rusia, para su uso en el Ejército ruso. Introducido en 1976, actualmente sigue en producción. El Ural-4320 fue diseñado para el transporte de carga, personas y remolque en todo tipo de terrenos."

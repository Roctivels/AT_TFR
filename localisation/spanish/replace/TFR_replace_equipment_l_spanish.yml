 anti_air_equipment: "Sistema de defensa antiaérea portátil"
 anti_air_equipment_short: "MANPADS"
 anti_air_equipment_desc: "Un misil tierra-aire (SAM) es un misil diseñado para ser lanzado desde tierra para destruir aeronaves u otros misiles. Es un tipo de sistema antiaéreo; en las fuerzas armadas modernas, los misiles han reemplazado a la mayoría de las demás formas de armas antiaéreas especializadas, y los cañones antiaéreos han asumido funciones especializadas."
 anti_air_equipment_1: "Sistema de defensa antiaérea portátil básico"
 anti_air_equipment_1_short: "Sistema de defensa antiaérea portátil básico"
 anti_air_equipment_1_desc: "Los Sistemas de Defensa Antiaérea Portátiles (en inglés: Man-portable air-defense systems, MANPADS o MPADS), son misiles tierra-aire portátiles de corto alcance que constituyen una amenaza para las aeronaves que vuelan a baja altura, especialmente los helicópteros."
 anti_air_equipment_2: "Sistema de defensa antiaérea portátil mejorado"
 anti_air_equipment_2_desc: "Una estación portátil con varios misiles tierra-aire capaces de operar en rangos de corto y mediano alcance."
 anti_air_equipment_3: "Sistema de defensa antiaérea portátil avanzado"
 anti_air_equipment_3_desc:1 "Una importante plataforma con misiles tierra-aire pesados diseñados para atacar objetivos aéreos a largo alcance y gran altitud."
 anti_air_equipment_4: "Sistema de defensa antiaérea portátil semifuturista"
 anti_air_equipment_4_desc:1 "Un conjunto compacto de avanzados misiles tierra-aire con guía y maniobrabilidad mejoradas, para derribar incluso los objetivos aéreos más esquivos."
 anti_air_equipment_5: "Sistema de defensa antiaérea portátil futurista"
 anti_air_equipment_5_desc:1 "Sistemas de misiles tierra-aire operados a distancia y semiautónomos, armados con las mejores redes de propulsión y guía portátiles en tierra."
 modern_tank_artillery_equipment: "Artillería autopropulsada"
 modern_tank_artillery_equipment_short: "AAP"
 modern_tank_artillery_equipment_desc: "La artillería autopropulsada es aquella que cuenta con su propio sistema de propulsión para desplazarse hacia su objetivo. Son vehículos de gran movilidad, generalmente basados en orugas continuas que transportan un gran cañón de campaña, un obús, un mortero o algún tipo de lanzacohetes o misiles. Suelen emplearse para apoyar bombardeos indirectos de largo alcance en el campo de batalla."
 modern_tank_artillery_equipment_1: "Artillería autopropulsada básica"
 modern_tank_artillery_equipment_1_short: "AAP básica"
 modern_tank_artillery_equipment_1_desc: ""
 modern_tank_artillery_equipment_2: "Artillería autopropulsada mejorada"
 modern_tank_artillery_equipment_2_short: "AAP mejorada"
 modern_tank_artillery_equipment_2_desc: ""
 modern_tank_artillery_equipment_3: "Artillería autopropulsada avanzada"
 modern_tank_artillery_equipment_3_short: "AAP avanzada"
 modern_tank_artillery_equipment_3_desc: ""
 artillery_equipment: "Artillería remolcada"
 artillery_equipment_short: "Artillería"
 artillery_equipment_desc: "La artillería se refiere a armas de gran calibre, como cañones y obuses operados por tripulaciones, que pueden proyectar municiones mucho más allá del alcance efectivo de las armas personales."
 artillery_equipment_1: "Artillería remolcada"
 artillery_equipment_1_short: "Artillería pos-Guerra Fría"
 artillery_equipment_1_desc: "Un obús básico con capacidad para lanzar proyectiles pesados a larga distancia. Nada especial, pero aun así una de las armas más importantes en el campo de batalla moderno."
 artillery_equipment_2: "Artillería mejorada"
 artillery_equipment_2_desc: "Un diseño de obús actualizado con freno de boca, portabilidad mejorada y mayor calibre."
 artillery_equipment_3: "Artillería avanzada"
 artillery_equipment_3_desc: "Un arma potente con un cañón más largo para permitir disparar proyectiles a mayores distancias."
 artillery_equipment_4: "Artillería semifuturista"
 artillery_equipment_4_desc: "El cañón de artillería más potente hasta la fecha. Con un gran calibre, una interfaz digital y un armazón resistente, puede disparar proyectiles a una velocidad impresionante y a distancias extremas."
 motorized_rocket_equipment: "Lanzacohetes múltiple"
 motorized_rocket_equipment_short: "Lanzacohetes m."
 motorized_rocket_equipment_desc: "Los lanzacohetes múltiples como estos lanzan explosivos a un área objetivo con mayor rapidez que la artillería convencional, pero con menor precisión y requieren más tiempo para recargarse. Al estar montados sobre camiones, esta versión puede lanzar ataques y cambiar de posición antes de que el enemigo pueda devolver el fuego."
 motorized_rocket_equipment_1: "Lanzacohetes múltiple"
 motorized_rocket_equipment_1_short: "Lanzacohetes m."
 motorized_rocket_equipment_1_desc: "Los lanzacohetes múltiples como estos lanzan explosivos a un área objetivo con mayor rapidez que la artillería convencional, pero con menor precisión y requieren más tiempo para recargarse. Al estar montados sobre camiones, esta versión puede lanzar ataques y cambiar de posición antes de que el enemigo pueda devolver el fuego."
 rocket_artillery_equipment: "Sistema de lanzacohetes múltiple"
 rocket_artillery_equipment_short: "MLRS"
 rocket_artillery_equipment_desc: "La artillería de cohetes es un tipo de artillería que utiliza cohetes como proyectiles. La artillería de cohetes moderna se empleó por primera vez durante la Segunda Guerra Mundial, en forma de diseños de artillería de cohetes de la familia alemana Nebelwerfer, la serie soviética Katyusha y muchos otros sistemas empleados en menor escala por los aliados occidentales y Japón. En el uso moderno, los cohetes suelen estar guiados por un sistema de guía interno o GPS para mantener la precisión."
 rocket_artillery_equipment_1: "Emplazamiento de artillería de cohetes"
 rocket_artillery_equipment_1_short: "Artillería de cohetes"
 rocket_artillery_equipment_1_desc: "La artillería de cohetes es un tipo de artillería que utiliza cohetes como proyectiles. La artillería de cohetes moderna se empleó por primera vez durante la Segunda Guerra Mundial, en forma de diseños de artillería de cohetes de la familia alemana Nebelwerfer, la serie soviética Katyusha y muchos otros sistemas empleados en menor escala por los aliados occidentales y Japón. En el uso moderno, los cohetes suelen estar guiados por un sistema de guía interno o GPS para mantener la precisión."
 rocket_artillery_equipment_2: "Artillería de cohetes avanzada"
 rocket_artillery_equipment_2_short: "Artillería de cohetes avz."
 rocket_artillery_equipment_2_desc: "Los cohetes de largo alcance con sistemas de guía individuales permiten una mayor precisión a lo largo de grandes distancias. El sistema moderno consta de células de cohetes que proporcionan una potente descarga de numerosos proyectiles que dejan a la mayoría de los objetivos como una tierra calcinada de cráteres y escombros."
 anti_tank_equipment: "Misil guiado antitanque"
 anti_tank_equipment_short: "ATGMs"
 anti_tank_equipment_desc: "Los sistemas antitanque portátiles (MANPATS o MPATS) son cohetes antitanque que se lanzan desde el hombro. Los MANPATS modernos tienen sus orígenes en el siglo XX, con el desarrollo temprano de la carga explosiva hueca. El desarrollo de la cohetería práctica proporcionó un medio para lanzar tal explosivo."
 anti_tank_equipment_1: "Misil guiado antitanque básico"
 anti_tank_equipment_1_short: "Misil guiado antitanque básico"
 anti_tank_equipment_1_desc: "Los sistemas antitanque portátiles (MANPATS o MPATS) son cohetes antitanque que se lanzan desde el hombro. Este modelo tiene las características básicas que se esperan de un arma antitanque moderna."
 anti_tank_equipment_2: "Misil guiado antitanque mejorado"
 anti_tank_equipment_2_short: "Misil guiado antitanque mejorado"
 anti_tank_equipment_2_desc: "El tubo de misiles estándar se ha reforzado junto con el sistema de designación. Los controles son más intuitivos y cuentan con un modo de ataque superior, que aprovecha el débil blindaje superior de la mayoría de los tanques modernos."
 anti_tank_equipment_3: "Misil guiado antitanque avanzado"
 anti_tank_equipment_3_short: "Misil guiado antitanque avanzado"
 anti_tank_equipment_3_desc: "Un rifle sin retroceso más básico con óptica moderna para disparar con mayor precisión. La munición que utiliza este sistema puede variar según el rol."
 anti_tank_equipment_4: "Misil guiado antitanque semifuturista"
 anti_tank_equipment_4_short: "Misil guiado antitanque semifuturista"
 anti_tank_equipment_4_desc: "Un sistema de misiles significativamente actualizado que incorpora modos de ataque superior y de fuego directo. Se ha reducido el tamaño sin disminuir el poder destructivo del misil en sí."
 anti_tank_equipment_5: "Misil guiado antitanque del futuro"
 anti_tank_equipment_5_short: "Misil guiado antitanque del futuro"
 anti_tank_equipment_5_desc: "El sistema antitanque portátil más avanzado en producción. Cuenta con los modos estándar de ataque superior y fuego directo, pero también incluye un modo de merodeo. El modo de merodeo obliga al misil a volar a mayores altitudes y a dar vueltas en círculos sobre el campo de batalla hasta que se haya designado un objetivo. El modo de merodeo permite a las fuerzas terrestres reducir la exposición al designar un objetivo mediante el uso del bloqueo después del lanzamiento con un amplio margen de tiempo."
 BAR_motorized_rocket_equipment_1: "M270 Multiple Launch Rocket System"
 BAR_motorized_rocket_equipment_1_short: "M270 MLRS"
 BAR_motorized_rocket_equipment_1_desc: "El MLRS fue desarrollado conjuntamente por el Reino Unido, Estados Unidos, Alemania Occidental, Francia e Italia, a partir del antiguo Sistema de Cohetes de Apoyo General (GSRS). El sistema de armas M270 MLRS se conoce colectivamente como Cargador/Lanzador Autopropulsado M270 MLRS (SPLL). El SPLL está compuesto por tres subsistemas principales: el Módulo de Lanzador de Cargador M269 (LLM), que también alberga el Sistema de Control de Fuego electrónico, está acoplado al Vehículo de Transporte M993. El M993 es un derivado del chasis del Vehículo de Combate Bradley."

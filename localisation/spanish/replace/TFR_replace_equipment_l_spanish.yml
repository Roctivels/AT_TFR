 AFG_infantry_equipment_0: "AK-47"
 AFG_infantry_equipment_0_short: "AK-47"
 AFG_infantry_equipment_0_desc: "El Avtomat Kalashnikova modelo 47 era un fusil de asalto inspirado en el Sturmgewehr 44 alemán y se introdujo por primera vez en 1947. Hasta los años 60, se convertiría en el arma de fuego principal del Ejército Rojo soviético y también se utilizó ampliamente entre los aliados soviéticos y entre los grupos insurgentes respaldados por los soviéticos. El AK-47 se convertiría en el fusil de asalto más fabricado de todos los tiempos y se considera una de las armas más rentables y más confiables hasta el día de hoy."
 AFG_infantry_equipment_1: "AKM"
 AFG_infantry_equipment_1_short: "AKM"
 AFG_infantry_equipment_1_desc: "El AKM es la variante más producida en serie del AK-47. Presentado en 1959, el AKM ofrece varias mejoras pequeñas pero notorias en conjunto, como nuevos dispositivos de seguridad y un peso más ligero cuando está cargado. Siguió siendo el rifle principal del Pacto de Varsovia hasta los años 70."
 AFG_infantry_equipment_2: "AK-74"
 AFG_infantry_equipment_2_short: "AK-74"
 AFG_infantry_equipment_2_desc: "El AK-74 reemplazó al obsoleto AKM en 1979 y se utilizó por primera vez en la invasión soviética de Afganistán. Tenía un cartucho diferente al de los modelos anteriores y se jactaba de tener un alcance, una precisión de disparo y una durabilidad mejorados. Sigue siendo el rifle más utilizado por las antiguas naciones comunistas y las pocas que quedan."
 AFG_infantry_equipment_3: "M16A2"
 AFG_infantry_equipment_3_short: "M16A2"
 AFG_infantry_equipment_3_desc: "El M16A2 es la segunda generación del M16, desarrollado por el ejército de los EE.UU. para corregir los problemas por los que el arma original era famosa en la guerra de Vietnam. Además de algunos cambios en el volumen del arma, tenía una confiabilidad mucho mejor y una mayor compatibilidad con varios accesorios, para hacerlo más dinámico en el campo de batalla. Originalmente desarrollado para el Cuerpo de Marines de los EE.UU., el Ejército de los EE.UU. todavía usa algunos M16A2 en otras ramas de las fuerzas armadas que no requieren los rifles más modernos."

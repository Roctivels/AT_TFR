 AST_infantry_equipment_0: "L1A1 SLR"
 AST_infantry_equipment_0_short: "L1A1"
 AST_infantry_equipment_0_desc: "El L1A1 SLR fue el rifle estándar del ejército australiano desde 1960 hasta 1992. El L1A1 es una adopción local del L1A1 SLR británico (un desarrollo del FN FAL belga)."
 AST_infantry_equipment_1: "F88 Austeyr"
 AST_infantry_equipment_1_short: "F88"
 AST_infantry_equipment_1_desc: "Un derivado del fusil de asalto austriaco Steyr AUG STG-77. Es el arma individual estándar de la ADF, que reemplazó al L1A1 SLR y al fusil M16A1 del servicio de primera línea a fines de los años 80."
 AST_infantry_equipment_2: "F88SA1 Austeyr"
 AST_infantry_equipment_2_short: "F88SA1"
 AST_infantry_equipment_2_desc: "El F88SA1 introdujo un riel Picatinny para reemplazar la mira telescópica estándar de 1,5x incorporada en los antiguos F88. Esto permitió utilizar una amplia gama de ópticas y dispositivos con el rifle."
 AST_infantry_equipment_3: "F88SA2 Austeyr"
 AST_infantry_equipment_3_short: "F88SA2"
 AST_infantry_equipment_3_desc: "Una evolución del programa F88. Las mejoras técnicas del F88SA2 incluyen un riel Picatinny más grande en la parte superior del arma, una carcasa de mira modificada y un soporte de riel lateral para linterna y dispositivo de puntería nocturna."
 AST_infantry_equipment_4: "EF88 Austeyr"
 AST_infantry_equipment_4_short: "EF88"
 AST_infantry_equipment_4_desc: "El F88 mejorado (o EF88) es actualmente la evolución final de la familia F88. Las mejoras incluyen una culata rediseñada y rieles para accesorios STANAG 4694 adicionales, un nuevo protector de gatillo para montar el nuevo lanzagranadas liviano ML40AUS de 40 mm, así como materiales de construcción más livianos."
 AST_infantry_equipment_5: "Advanced Individual Combat Weapon F20"
 AST_infantry_equipment_5_short: "F20 AICW"
 AST_infantry_equipment_5_desc: "El AICW fue desarrollado originalmente por la Organización de Ciencia y Tecnología de Defensa (DSTO) en 2005. Con el éxito del EF88, el proyecto se reanudó con el objetivo final de lograr un sistema de armas ligero y combinado con un único disparador que controle el lanzagranadas de 40 mm y el fusil de 5,56 mm. En este modelo también se perfeccionó la integración básica de la computadora con un telémetro láser."
 AST_infantry_equipment_6: "Enhanced Individual Combat Weapon EF20"
 AST_infantry_equipment_6_short: "EF20 EICW"
 AST_infantry_equipment_6_desc: "El Arma de Combate Individual Mejorada (o EF20) es la culminación de las lecciones aprendidas durante los últimos 40 años del ciclo de vida del F88. Materiales más livianos, cañones más fuertes, miniaturización de los disparos por computadora e integración de software en el campo de batalla dan como resultado un arma que responde, predice y es letal."
 AST_motorized_equipment_1: "Mercedes-Benz Unimog U1700L"
 AST_motorized_equipment_1_short: "Unimog U1700L"
 AST_motorized_equipment_1_desc: "El ejército australiano encargó unos 1.295 camiones Unimog 1700L que se fabricaron en la planta de Mercedes-Benz en Mulgrave, Victoria. Mercedes-Benz también produjo 400 en el país para el ejército de Nueva Zelanda. Esta versión del Unimog también se utiliza en Canadá y Malasia. El Unimog fue reemplazado en 2013 como parte de la Fase B de LAND 121 por el Mercedes-Benz G-Wagon."

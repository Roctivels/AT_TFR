 ARG_infantry_equipment_1_short: "M16A2"
 ARG_infantry_equipment_1_desc: "El M16A2 es la segunda generación del M16, desarrollado por el ejército de los EE.UU. para corregir los problemas por los que el arma original era famosa en la guerra de Vietnam. Además de algunos cambios en el volumen del arma, tenía una confiabilidad mucho mejor y una mayor compatibilidad con varios accesorios, para hacerlo más dinámico en el campo de batalla. Originalmente desarrollado para el Cuerpo de Marines de los EE.UU., el Ejército de los EE.UU. todavía usa algunos M16A2 en otras ramas de las fuerzas armadas que no requieren los rifles más modernos."

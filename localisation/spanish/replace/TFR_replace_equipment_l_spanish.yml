 SOV_motorized_equipment_3_short: "Ural-5323"
 SOV_motorized_equipment_3_desc: ""
 SPR_infantry_equipment_0: "CETME C"
 SPR_infantry_equipment_0_short: "CETME C"
 SPR_infantry_equipment_0_desc: "La producción del fusil comenzó en España en 1957. La serie CETME de fusiles de combate se fabricó en cuatro modelos básicos: A, B, C y E. La principal diferencia entre los modelos de producción reside en los modos de disparo, la ausencia de bípode y el menor peso de los modelos posteriores."
 SPR_infantry_equipment_1: "CETME L"
 SPR_infantry_equipment_1_short: "CETME L"
 SPR_infantry_equipment_1_desc: "El arma fue probada con éxito entre 1981 y 1982 y aprobada para producción en serie en 1984 en la fábrica de la Empresa Nacional Santa Bárbara (actualmente Santa Bárbara Sistemas, integrada en la división European Land Combat Systems de General Dynamics). El Modelo L reemplazó al CETME Modelo C de 7,62 mm en servicio en el Ejército Español y los primeros fusiles fueron entregados en 1987, momento en el que se habían realizado pedidos por aproximadamente 60.000 unidades."
 SPR_infantry_equipment_2: "HK G36E"
 SPR_infantry_equipment_2_short: "HK G36E"
 SPR_infantry_equipment_2_desc: "En julio de 1998, se anunció que el G36 había sido seleccionado como fusil estándar de las Fuerzas Armadas Españolas, sustituyendo a los fusiles CETME Modelo L y LC de 5,56 mm. Las primeras entregas se realizaron a finales de 1999. Estos fusiles se fabrican en España bajo licencia por General Dynamics Santa Bárbara Sistemas en las instalaciones de FACOR (Fábrica de Armas de la Coruña), en Coruña, Galicia."
 SPR_infantry_equipment_3: "HK G36E1"
 SPR_infantry_equipment_3_short: "HK G36E1"
 SPR_infantry_equipment_3_desc: "Se trata de una designación de munición asignada a una variante mejorada del G36 utilizada por el Ejército de Tierra español."
 SPR_infantry_equipment_4: "HK G36E2"
 SPR_infantry_equipment_4_short: "HK G36E2"
 SPR_infantry_equipment_4_desc: "Se trata de una designación de munición asignada a una variante mejorada del G36 utilizada por el Ejército de Tierra español."
 SPR_infantry_equipment_5: "HK 417E"
 SPR_infantry_equipment_5_short: "HK 417E"
 SPR_infantry_equipment_5_desc: "El Heckler & Koch HK417E es un fusil de combate diseñado y fabricado bajo licencia por Heckler & Koch en España. Es un fusil de fuego selectivo accionado por gas con cerrojo giratorio, y es esencialmente una versión ampliada del fusil de asalto HK416. Está recamarado para el calibre 7,62 x 51 mm OTAN de máxima potencia."
 SPR_infantry_equipment_6: "CETME M30"
 SPR_infantry_equipment_6_short: "CETME M30"
 SPR_infantry_equipment_6_desc: "El CETME Modelo 30 es un fusil de asalto de la OTAN de 7,62 mm. Su diseño se basa en la integración del antiguo modelo CETME C con las necesidades actuales del Ejército español. Al ser un fusil bullpup de fabricación nacional, es la opción de futuro para el Ejército español."

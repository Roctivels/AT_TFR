 TRG_infantry_equipment_1: "Fusil Automático Tipo 56"
 TRG_infantry_equipment_1_short: "Tipo 56"
 TRG_infantry_equipment_1_desc: "Posiblemente más común que los auténticos AK-47 rusos. El Tipo 56 es una variante del AK-47, fabricada en China, que incluso utiliza el mismo cartucho. Las cifras varían, pero se estima que la producción de rifles supera los 10 millones. Este rifle es un zombi implacable; se puede encontrar prácticamente en cualquier lugar y sigue disparando sin importar el infierno que haya pasado..."
 TRG_infantry_equipment_2: "Armalite AR-15"
 TRG_infantry_equipment_2_short: "AR-15"

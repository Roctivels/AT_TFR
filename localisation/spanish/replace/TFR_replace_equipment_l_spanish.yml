 APA_infantry_equipment_1: "Avtomat Kalasnikova Modernizirovannyj"
 APA_infantry_equipment_1_short: "AKM"
 APA_infantry_equipment_1_desc: "Una de las variantes más producidas de la familia AK, el AKM puede caerse en tierra, barro, cubrirse de óxido y seguir disparando como el primer día. Comparado con otros rifles en Estados Unidos, el 7.62x39 es ampliamente superado por su homólogo AR-15, el 5.56. ¡Pero te hace parecer un revolucionario!"
 APA_infantry_equipment_2: "Armalite AR-15"
 APA_infantry_equipment_2_short: "AR-15"
 APA_infantry_equipment_2_desc: "El AR-15, uno de los rifles semiautomáticos civiles más populares, es extremadamente versátil. Las piezas, las miras y su munición de 5.56 mm están fácilmente disponibles. Sumado a su bajo retroceso, este rifle ofrece pocas fallas."
 APA_infantry_equipment_3: "M16A1"
 APA_infantry_equipment_3_short: "M16A1"
 APA_infantry_equipment_3_desc: "Probablemente encontrado en el armario de tu abuelo, el M16 sigue siendo un rifle muy adecuado que entró en servicio en el Ejército de los Estados Unidos en 1964. A menos que puedas encontrar miras de la época para él, no te será de mucha utilidad más allá de los 300 metros..."

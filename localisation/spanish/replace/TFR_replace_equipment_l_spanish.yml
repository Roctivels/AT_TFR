 modern_tank_equipment: "Carro de combate principal"
 modern_tank_equipment_short: "MBT"
 modern_tank_equipment_desc: "Carro de combate principal"
 modern_tank_equipment_1: "Carro de combate principal 1ª Gen."
 modern_tank_equipment_1_short: "MBT 1ª Gen."
 modern_tank_equipment_1_desc: "Los carros de combate principales de primera generación aparecieron a principios de los años 50 y, desde entonces, han sustituido las clasificaciones de tanques ligeros, medios y pesados establecidas previamente durante la Segunda Guerra Mundial. Estos tanques de batalla principales de primera generación son ineficaces frente a cualquier carro de combate principal moderno y son utilizados principalmente por naciones que no tienen otra opción."
 modern_tank_equipment_2: "Carro de combate principal 2ª Gen."
 modern_tank_equipment_2_short: "MBT 2ª Gen."
 modern_tank_equipment_2_desc: "Los MBT de segunda generación se utilizan ampliamente en todo el mundo, desde Siria y Armenia hasta Nigeria. Sin embargo, es raro ver uno que no cuente con algún tipo de mejora. Estos tanques son adecuados; muchos de ellos cuentan con blindaje compuesto y visión nocturna, pero su antigüedad se hace evidente rápidamente."
 modern_tank_equipment_3: "Carro de combate principal 3ª Gen."
 modern_tank_equipment_3_short: "MBT 3ª Gen."
 modern_tank_equipment_3_desc: "Utilizados por la mayoría de las naciones del primer mundo, estos carros de combate principales de tercera generación son variantes tempranas sin muchas de las mejoras que presentan sus homólogos actuales. Generalmente exportados a muchos países en desarrollo, estos tanques suelen ser mal utilizados por los oficiales y retirados con frecuencia. El blindaje no garantiza la victoria."
 modern_tank_equipment_4: "Carro de combate principal 3ª Gen. moderno"
 modern_tank_equipment_4_short: "MBT 3ª Gen. moderno"
 modern_tank_equipment_4_desc: "Utilizados por la mayoría de las naciones del primer mundo, los carros de combate principales de tercera generación son lo mejor de lo mejor. Incorporan las últimas mejoras en tecnología militar: imágenes térmicas, GPS, controles de fuego avanzados y blindaje. En las últimas décadas, muchas naciones han optado por simplemente actualizar sus tanques de tercera generación en lugar de invertir en un nuevo diseño. Seguirá así hasta la próxima guerra..."
 modern_tank_equipment_5: "Carro de combate principal 3ª Gen. avanzado"
 modern_tank_equipment_5_short: "MBT 3ª Gen. avanzado"
 modern_tank_equipment_5_desc: "Carro de combate principal 3ª Gen. avanzado"
 modern_tank_equipment_6: "Carro de combate principal 4ª Gen."
 modern_tank_equipment_6_short: "MBT 4ª Gen."
 modern_tank_equipment_6_desc: "Carro de combate principal 4ª Gen."
 modern_tank_equipment_7: "Carro de combate principal 5ª Gen."
 modern_tank_equipment_7_short: "MBT 5ª Gen."
 modern_tank_equipment_7_desc: "Carro de combate principal 5ª Gen."
 modern_tank_equipment_8: "Carro de combate principal 6ª Gen."
 modern_tank_equipment_8_short: "MBT 6ª Gen."
 modern_tank_equipment_8_desc: "Carro de combate principal 6ª Gen."
 mechanized_equipment: "Vehículo de combate de infantería"
 mechanized_equipment_short: "Vehículo de combate de infantería"
 mechanized_equipment_desc: "Vehículo de combate de infantería"
 mechanized_equipment_1: "Vehículo de combate 1ª Gen."
 mechanized_equipment_1_short: "VCI 1ª Gen."
 mechanized_equipment_1_desc: "Los primeros vehículos de combate de infantería (VCI) aún encuentran su lugar en conflictos de baja intensidad en todo el mundo. Son relativamente baratos de adquirir y fáciles de entrenar. Ahí terminan las ventajas: la mayoría carece de las mejoras de los IFV actuales, y muchas de estas variantes de exportación omitían alguna que otra pieza importante..."
 mechanized_equipment_2: "Vehículo de combate 2ª Gen."
 mechanized_equipment_2_short: "VCI 2ª Gen."
 mechanized_equipment_2_desc: "La segunda generación de vehículos de combate de infantería ofrece a la infantería mecanizada una opción de transporte bien blindada que también puede participar en combate con sus diversos sistemas de armas. Aunque difícilmente comparable a un tanque, un VCI puede, en teoría, competir con sus primos con blindaje más pesado."
 mechanized_equipment_3: "Vehículo de combate 2ª Gen. moderno"
 mechanized_equipment_3_short: "VCI 2ª Gen. moderno"
 mechanized_equipment_3_desc: "Con diversos paquetes de modernización instalados, incluso los vehículos de combate de infantería de segunda generación más antiguos pueden prolongar su vida útil a pesar de su antigüedad. Las diversas mejoras incluyen blindaje mejorado, mejor óptica y armamento de última generación."
 mechanized_equipment_4: "Vehículo de combate 3ª Gen."
 mechanized_equipment_4_short: "VCI 3ª Gen."
 mechanized_equipment_4_desc: "La tercera generación de VCI es crucial en las operaciones de infantería blindada modernas. Mientras que antes se consideraba un recurso secundario, la tercera generación es parte integral de las tácticas de infantería modernas."
 mechanized_equipment_5: "Vehículo de combate 4ª Gen."
 mechanized_equipment_5_short: "VCI 4ª Gen."
 mechanized_equipment_5_desc: "La cuarta generación de VCI, el auge del diseño de vehículos de combate de infantería, ha integrado un alto grado de tecnología militar moderna, desde sistemas de guerra electrónica hasta óptica avanzada y una amplia gama de armamento adecuado para cualquier situación en la que pueda encontrarse una unidad de infantería blindada."
 light_mechanized_equipment: "Mecanizada ligera"
 armored_personnel_carrier: "Transporte blindado de personal"
 light_mechanized_equipment_short: "Transporte blindado de personal"
 light_mechanized_equipment_desc: "Transporte blindado de personal"
 light_mechanized_equipment_1: "Transporte blindado 1ª Gen."
 light_mechanized_equipment_1_short: "TBP 1ª Gen."
 light_mechanized_equipment_1_desc: "La primera generación de transportes blindados de personal de la Guerra Fría todavía cumple su función de transportar tropas de manera segura en el frente, pero los avances en los armamentos militares modernos los hacen cada vez más vulnerables al fuego enemigo."
 light_mechanized_equipment_2: "Transporte blindado 2ª Gen."
 light_mechanized_equipment_2_short: "TBP 2ª Gen."
 light_mechanized_equipment_2_desc: "Los TBP de segunda generación cuentan con mayor protección blindada y mayor potencia de fuego para apoyar a sus pasajeros de infantería."
 light_mechanized_equipment_3: "Transporte blindado 3ª Gen."
 light_mechanized_equipment_3_short: "TBP 3ª Gen."
 light_mechanized_equipment_3_desc: "La tercera generación moderna de TBP viene con una serie de innovaciones militares diseñadas para aumentar la capacidad de supervivencia del vehículo y sus pasajeros, como contramedidas pasivas y mejores capacidades de comunicación en el campo de batalla."
 light_mechanized_equipment_4: "Transporte blindado 3ª Gen. moderno"
 light_mechanized_equipment_4_short: "TBP 3ª Gen. moderno"
 light_mechanized_equipment_4_desc: "Los TBP modernizados de tercera generación han integrado todos los avances beneficiosos logrados en la investigación militar reciente, como contramedidas activas y blindaje más resistente."
 light_mechanized_equipment_5: "Transporte blindado 4ª Gen."
 light_mechanized_equipment_5_short: "TBP 4ª Gen."
 light_mechanized_equipment_5_desc: "La cuarta generación de TBP, además de cumplir su función tradicional, es capaz de apoyar a sus pasajeros de infantería con sus diversos sistemas modulares de guerra convencional y electrónica."
 light_mechanized_equipment_6: "Transporte blindado 5ª Gen."
 light_mechanized_equipment_6_short: "TBP 5ª Gen."
 light_mechanized_equipment_6_desc: "Transporte blindado 5ª Gen."
 AST_light_tank_equipment_1: "Vehículo de apoyo contra incendios M113A1"
 AST_light_tank_equipment_1_short: "M113 FSV"
 AST_light_tank_equipment_1_desc: "El FSV era una variante del M113A1 equipada con la torreta del vehículo blindado Alvis Saladin. El FSV se introdujo en las unidades del Ejército Australiano a mediados de los años 60, tras la retirada de los Saladin, y estaba armado con un cañón de 76 mm, una ametralladora coaxial calibre .30 y una ametralladora calibre .30 montadas en el techo de la torreta del vehículo. El M113 FSV estuvo en servicio hasta finales de los años 70. Las tripulaciones lo llamaban comúnmente la \"Bestia\"."
 AST_light_tank_equipment_2: "Vehículo de reconocimiento medio M113A1"
 AST_light_tank_equipment_2_short: "M113 MRV"
 AST_light_tank_equipment_2_desc: "Una variante del M113 similar al M113 FSV, pero que utilizaba la torreta del FV101 Scorpion en lugar de la del Saladin. Esta torreta estaba equipada con una mira intensificadora de imagen para el armamento principal. Esta mira fue la primera mira nocturna pasiva efectiva instalada en un vehículo blindado australiano, lo que otorgó a los MRV una capacidad de combate nocturno superior a la del Leopard AS1 y a todos los demás vehículos blindados australianos de la época."
 AST_light_tank_equipment_3: "Vehículo blindado ligero australiano (TOW)"
 AST_light_tank_equipment_3_short: "ASLAV-TOW"
 AST_light_tank_equipment_3_desc: "Durante el ejercicio Phoenix, en septiembre/octubre de 1998, la 1ª Brigada del Ejército probó varios conceptos y vehículos nuevos. Se acopló un casco ASLAV a una torreta Delco que montaba dos lanzadores de misiles TOW (lanzados por tubo, con seguimiento óptico y guiados por cable). La configuración es similar a la de la torreta del vehículo de combate Bradley."
 AST_light_tank_equipment_4: "Vehículo blindado ligero australiano (sistema de cañón móvil)"
 AST_light_tank_equipment_4_short: "ASLAV-MGS"
 AST_light_tank_equipment_4_desc: "El ASLAV (Mobile Gun System) es un carro blindado de ocho ruedas que monta un M68A2 de 105 mm de diseño estadounidense. La torreta de bajo perfil de General Dynamics es idéntica a la del M1128 Stryker en servicio en EE.UU., y se montó de forma similar en el chasis del ASLAV con cambios mínimos en el diseño. Este vehículo ligero puede ser transportado por aire con la infantería y proporcionar altos niveles de apoyo de fuego."
 AST_light_tank_equipment_5: "Vehículo blindado ligero australiano (Sistema de mortero blindado)"
 AST_light_tank_equipment_5_short: "ASLAV-AMS"
 AST_light_tank_equipment_5_desc: "Durante el ejercicio Phoenix, en septiembre/octubre de 1998, la 1ª Brigada del Ejército probó una serie de nuevos conceptos y vehículos. El Sistema de Mortero Blindado era una variante completa del LAV DDGM, que montaba el mortero de 120 mm de la Royal Ordnance. El ASLAV (MGS) es lo suficientemente ligero como para ser transportado por aire y puede proporcionar a la infantería apoyo de fuego directo e indirecto."
 AST_mechanized_equipment_1: "M113AS1 Vehículo blindado de transporte de tropas"
 AST_modern_tank_equipment_1: "Carro de combate principal Centurion Mk. 5"
 AST_modern_tank_equipment_1_short: "Centurion Mk. 5"
 AST_modern_tank_equipment_1_desc: "El Centurion fue uno de los primeros MBT fabricados en la posguerra, armado inicialmente con un cañón de 17pdr, luego con uno de 20pdr y, finalmente, en la variante Mk. 5, con un L7 de 105 mm. Los primeros Centurion comenzaron a llegar a Australia en junio de 1952 y sirvieron hasta 1971. En este tiempo el Centurion vio acción en Vietnam."
 AST_modern_tank_equipment_2: "Leopard AS1"
 AST_modern_tank_equipment_2_short: "Leopard AS1"
 AST_modern_tank_equipment_2_desc: "El Leopard AS1 (AS es la abreviatura de Australia en la OTAN) utiliza el casco del Leopard 1 y la torreta de acero fundido introducida con la serie Leopard 1A3, incluido el blindaje soldado y espaciado sobre la parte delantera y los laterales de la torreta. Los vehículos fueron fabricados por Krauss Maffei. El AS1 sirvió durante 32 años, de 1974 a 2006, y nunca disparó un tiro con furia."
 AST_modern_tank_equipment_3: "Leopard AS1+"
 AST_modern_tank_equipment_3_short: "Leopard AS1+"
 AST_modern_tank_equipment_3_desc: "Tras varias décadas en servicio en el Ejército australiano, los AS1 experimentaron una larga serie de mejoras y perfeccionamientos. Aunque nunca se rebautizaron oficialmente, estas mejoras permitieron que los AS1 siguieran satisfaciendo las necesidades del Ejército hasta bien entrados los años 90. Estas mejoras incluyeron: Climatización, camuflaje térmico, un FCS mejorado, mayor capacidad de estiba, óptica mejorada y cámaras en color."
 AST_modern_tank_equipment_4: "Gestión integrada del M1A1 Abrams"
 AST_modern_tank_equipment_4_short: "M1A1 AIM"
 AST_modern_tank_equipment_4_desc: "El AIM es un programa mediante el cual los Abrams más antiguos se reacondicionan hasta alcanzar las condiciones de \"hora cero\"; y el tanque se mejora añadiéndole sensores infrarrojos de visión frontal (FLIR) y de localización de objetivos lejanos, un teléfono tanque-infantería, equipos de comunicaciones, incluidos el FBCB2 y el Blue Force Tracking, para ayudar al conocimiento de la situación por parte de la tripulación, y una mira térmica para la ametralladora del calibre .50. Australia encargó 59 de estos vehículos en 2005."
 AST_modern_tank_equipment_5: "M1A1 Abrams Integrated Management - Kit de supervivencia urbana para tanques"
 AST_modern_tank_equipment_5_short: "M1A1 AIM TUSK"
 AST_modern_tank_equipment_5_desc: "Tras encargar el M1A1 AIM en 2005, Australia mostró inmediatamente su interés por el kit de supervivencia urbana para tanques. Este conjunto de mejoras de la capacidad de supervivencia del Abrams incluye blindaje en jaula alrededor de las secciones traseras del tanque, blindaje reactivo en los laterales, sistemas de armas a distancia y óptica térmica."
 AST_modern_tank_equipment_6: "Paquete de mejora del sistema M1A2 - Kit de supervivencia urbana para tanques"
 AST_modern_tank_equipment_6_short: "M1A2 SEP TUSK"
 AST_modern_tank_equipment_6_desc: "El M1A2 System Enhancement Package (SEP) es el sucesor del M1A2 y un paquete de mejoras para los antiguos tanques Abrams. Ha mejorado la protección del blindaje, los componentes del sistema, los componentes informáticos y algunas otras mejoras. Australia adquirió estas mejoras para su flota existente de M1A1. El SEP es compatible con el TUSK actualmente equipado en la fuerza de tanques de Australia."
 AST_modern_tank_equipment_7: "Modelo de exportación australiano M1A3"
 AST_modern_tank_equipment_7_short: "M1A3 AEM"
 AST_modern_tank_equipment_7_desc: "Mientras que el programa SEP se centraba en la capacidad de supervivencia y la letalidad del Abrams, el programa M1A3 pretendía minimizar la carga del vetusto chasis. Armas ligeras, anillos de torreta, torreta de perfil más pequeño, ordenadores y pantallas miniaturizados y ruedas más ligeras dan al M1A3 mucho más margen para la modernización. El AEM es un modelo de exportación hecho a medida para las necesidades australianas, al tiempo que lo prepara para futuras actualizaciones."
 AST_modern_tank_equipment_8: "Leopard 3A1"
 AST_modern_tank_equipment_8_short: "Leopard 3A1"
 AST_modern_tank_equipment_8_desc: "Aunque la reciente adquisición de Abrams ha sostenido las necesidades australianas de blindaje pesado durante décadas, el gran salto generacional del Leopard 3 no ha pasado desapercibido. El impresionante cañón de ánima lisa de 130 mm ya se ha implementado en el M1A3, pero el FCS de última generación, el telémetro GPS y el camuflaje térmico hacen que el M1A3 parezca diez años más viejo de lo que debería."
 AST_mechanized_equipment_1_short: "M113AS1"
 AST_mechanized_equipment_1_desc: "Un M113A1 estándar con una torreta Cadillac Gage T50 como la utilizada en la serie de carros blindados V100/V150, montando una Browning M2 del calibre .50 y una GPMG del calibre .30. Aunque la versión APC estándar en servicio en Australia también está equipada con la torreta T50, inicialmente sólo llevaba ametralladoras gemelas del calibre .30. En servicio posterior, las versiones LRV y APC llevaban ambas la combinación 30/50 y la única diferencia entre ellas eran las funciones."
 AST_mechanized_equipment_2: "M113AS4 Vehículo blindado de transporte de tropas"
 AST_mechanized_equipment_2_short: "M113AS4"
 AST_mechanized_equipment_2_desc: "El M113AS4 es una actualización del M113AS1 de la época de Vietnam e incluye una torreta eléctrica, visores de armas diurnos/nocturnos, un nuevo motor, controles de dirección, tren de tracción, sistemas eléctricos y de combustible, así como una disposición interna de nuevo diseño para permitir una estiba segura en diversas situaciones. Las distintas variantes del M113 están dotadas de equipos especiales. Se espera que los M113AS4 permanezcan en servicio hasta 2020."
 AST_mechanized_equipment_3: "Vehículo blindado ligero australiano (reconocimiento)"
 AST_mechanized_equipment_3_short: "ASLAV-25"
 AST_mechanized_equipment_3_desc: "El vehículo blindado ligero australiano (ASLAV) es un chasis de ocho ruedas diseñado y fabricado por General Dynamics Land Systems Canada. El vehículo se basa en el diseño MOWAG Piranha 8x8. Esta variante es un vehículo de reconocimiento para tres personas armado con un cañón M242 Bushmaster de doble alimentación de 25 mm y dos ametralladoras FN MAG 58 de 7,62 mm."
 AST_mechanized_equipment_4: "Vehículo blindado ligero australiano (reconocimiento, 40 mm)"
 AST_mechanized_equipment_4_short: "ASLAV-40"
 AST_mechanized_equipment_4_desc: "El ASLAV-40, quizás el último paquete de mejoras para los ASLAV de reconocimiento, incorpora el Bushmaster IV, un cañón automático de 40 mm accionado por cadena integrado en una torreta de perfil bajo. El Bushmaster IV se basa en los Bushmaster M242 y Bushmaster II y dispara proyectiles de 40×365 mm 3P (prefragmentados, programables, con espoleta de proximidad), APFSDS-T Mk I y APFSDS-T Mk II. El proyectil 3P tiene capacidad de ráfaga aérea y el APFSDS-T Mk II puede penetrar blindajes de más de 150 mm. Otras mejoras del antiguo ASLAV incluyen capas de blindaje reactivo, blindaje compuesto, neumáticos antipinchazo mejorados y compatibilidad con equipos RADAR."
 AST_mechanized_equipment_5: "Vehículo de reconocimiento de combate Boxer"
 AST_mechanized_equipment_5_short: "Boxer CRV"
 AST_mechanized_equipment_5_desc: "El vehículo de reconocimiento de combate Boxer está equipado con la torreta LANCE, municiones de ráfaga aérea, sistemas de defensa activa y sistemas avanzados de simulación. Proporciona potencia de fuego y protección a partes iguales y parece ser el principal candidato para sustituir a la vetusta flota de ASLAV, junto con su variante (MRAV) en forma de APC."
 AST_light_mechanized_equipment_1: "Vehículo patrulla de largo alcance"
 AST_light_mechanized_equipment_1_short: "LRPV"
 AST_light_mechanized_equipment_1_desc: "Los primeros vehículos de patrulla de largo alcance del SASR fueron Land Rovers modificados. Se desarrollaron a principios de los años 70 y se utilizaron en ejercicios en el norte de Australia Occidental a partir de 1973. Este LRPV se desarrolló a partir de la variante con tracción a las seis ruedas del Land Rover Perentie del Ejército australiano a finales de los años 80. El diseño estaba destinado a ser utilizado por el SASR para patrullar regiones remotas de Australia. El LRPV es mecánicamente sencillo y relativamente fácil de mantener sobre el terreno. Cuenta con una tripulación de tres personas. Está armado con un M2 calibre .50 o un AGL de 40 mm con accesorios para un MAG58."
 AST_light_mechanized_equipment_2: "Vehículo blindado ligero australiano - Portapersonal"
 AST_light_mechanized_equipment_2_short: "ASLAV-PC"
 AST_light_mechanized_equipment_2_desc: "En 1992 se evaluaron cuatro vehículos blindados de transporte de tropas canadienses Bison en el marco del acuerdo de préstamo ABCA (Estados Unidos, Gran Bretaña, Canadá y Australia) y, gracias a su mayor tamaño y a su interior más espacioso, se consideró que eran más adecuados para el transporte de tropas de asalto que los LAV del USMC. Tras casi dos años de pruebas, en diciembre de 1992 se anunció que Australia compraría 97 LAV a Canadá, para complementar los 15 vehículos que ya poseía. La familia de vehículos se denominó ASLAV - Australian Light Armoured Vehicle (AS es la abreviatura de Australia en la OTAN)."
 AST_light_mechanized_equipment_3: "Vehículo de Movilidad Protegida Bushmaster - Mediano"
 AST_light_mechanized_equipment_3_short: "Bushmaster PMV"
 AST_light_mechanized_equipment_3_desc: "El Bushmaster está construido para transportar y mantener una sección de infantería de nueve hombres, con espacio para un pasajero más. Está totalmente climatizado y puede mantenerse durante un periodo de hasta tres días. Utiliza un casco blindado en forma de V para proteger a sus pasajeros de las minas terrestres y otros artefactos explosivos. Los laterales inclinados de la parte inferior del casco desvían las explosiones hacia arriba, alejándolas del vehículo."
 AST_light_mechanized_equipment_4: "Vehículo de movilidad protegida Hawkei"
 AST_light_mechanized_equipment_4_short: "Hawkei PMV"
 AST_light_mechanized_equipment_4_desc: "El Hawkei PMV es un vehículo ligero de movilidad protegida 4x4 diseñado originalmente para satisfacer una necesidad de las Fuerzas de Defensa Australianas (ADF) de un vehículo blindado ligero de putrulla que sustituyera a algunas de sus variantes Land Rover Perentie. El Hawkei es un vehículo de 7 toneladas altamente móvil y protegido, con sistemas incorporados que permiten utilizarlo como plataforma de combate."
 AST_light_mechanized_equipment_5: "Vehículo blindado ligero australiano (Medium Personnel Carrier)"
 AST_light_mechanized_equipment_5_short: "ASLAV-MPC"
 AST_light_mechanized_equipment_5_desc: "El ASLAV-MPC es una mejora del ASLAV-PC, montando el Bushmaster de 25 mm en una torreta remota, montando blindaje de apliques cerámicos y chapado reactivo en el frontal y los laterales. Mientras que el ASLAV-25 puede transportar cuatro pasajeros, el ALSAV-MPC puede ahora transportar siete, u ocho si el cañón es tripulado por un pasajero."
 AST_light_mechanized_equipment_6: "Vehículo blindado polivalente Boxer"
 AST_light_mechanized_equipment_6_short: "Boxer MRAV"
 AST_light_mechanized_equipment_6_desc: "El Boxer es un vehículo polivalente de ocho ruedas que eclipsa fácilmente con su tamaño a la mayoría de los vehículos contemporáneos. Con 33 toneladas de peso en combate, también es unas 10 toneladas más pesado que muchos otros vehículos contemporáneos de la misma función. Está diseñado para llevar a cabo diversas misiones de utilidad con la máxima flexibilidad; esto se consigue mediante varios \"módulos de misión\" diferentes especializados para diversas tareas que están disponibles por separado del vehículo. Los MRAV australianos incorporan un módulo de transporte de personal, armado con el sistema de armas a distancia FLW-200 con un AGL de 40 mm o un M2 de calibre .50."

 infantry_equipment: "Equipo de infantería"
 infantry_equipment_short: "Eq. infantería"
 infantry_equipment_desc: "Armas personales y colectivas para la infantería, así como el resto del equipo necesario para un soldado."
 infantry_equipment_0: "Equipo de la Guerra Fría"
 infantry_equipment_0_short: "Eq. Guerra Fría"
 infantry_equipment_0_desc: "El Avtomat Kalashnikova modelo 47 era un fusil de asalto inspirado en el Sturmgewehr 44 alemán y se introdujo por primera vez en 1947. Hasta los años 60, se convertiría en el arma de fuego principal del Ejército Rojo soviético y también se utilizó ampliamente entre los aliados soviéticos y entre los grupos insurgentes respaldados por los soviéticos. El AK-47 se convertiría en el fusil de asalto más fabricado de todos los tiempos y se considera una de las armas más rentables y más confiables hasta el día de hoy."
 infantry_equipment_1: "Equipo pos-Guerra Fría"
 infantry_equipment_1_short: "Eq. pos-Guerra Fría"
 infantry_equipment_1_desc: "Desarrollados durante y después de la Guerra Fría, estos rifles siguen siendo muy confiables en las manos adecuadas. Si los dejas caer en el barro, los cubres de polvo o de óxido, estos rifles dispararán como nuevos."
 infantry_equipment_2: "Equipo moderno"
 infantry_equipment_2_short: "Eq. moderno"
 infantry_equipment_2_desc: "Armas de uso personal y de tripulación para infantería, así como otros elementos del equipo que necesita un soldado. Modernizadas para incluir una gran cantidad de metralletas y rifles antitanque."
 infantry_equipment_3: "Equipo moderno mejorado"
 infantry_equipment_3_short: "Eq. moderno mejorado"
 infantry_equipment_3_desc: "Armas personales y de uso para la tripulación de infantería, así como otros elementos del equipo que necesita un soldado. Se modernizaron aún más para incluir fusiles de asalto personales y cohetes antitanque."
 infantry_equipment_4: "Equipo moderno avanzado"
 infantry_equipment_4_short: "Eq. moderno avz."
 infantry_equipment_4_desc: "Armas personales y de uso para la tripulación de infantería, así como otros elementos del equipo que necesita un soldado. Se modernizaron aún más para incluir fusiles de asalto personales y cohetes antitanque."
 infantry_equipment_5: "Rifle de edición estándar del futuro cercano"
 infantry_equipment_5_short: "R.E.E del futuro cercano"
 infantry_equipment_5_desc: "Al priorizar la eficacia de cada soldado, estos futuros rifles también eliminan el problema común de los diferentes tipos de munición para los distintos roles del escuadrón en favor de una única bala universal."
 infantry_equipment_6: "Fusil de asalto sin vaina"
 infantry_equipment_6_short: "Fusil de asalto sin vaina"
 infantry_equipment_6_desc: "Aunque los ejércitos del mundo no lo adoptaron en el pasado, la idea de la munición sin vaina está siendo reexaminada. Sus principales ventajas son su menor peso y costo, además de permitir diseños de armas simplificados."
 motorized_equipment: "Camión"
 motorized_equipment_desc: "Camiones usados para transportar tropas y suministros, y para motorizar la división."
 motorized_equipment_1: "Transporte motorizado I"
 motorized_equipment_1_desc: "Motorizar la infantería es la primera etapa hacia la mecanización de un ejército. Los camiones civiles son fácilmente adaptables a los usos militares del transporte de soldados, remolque de armas y transporte de equipo y suministros. Esto aumenta enormemente la movilidad estratégica de unidades de infantería, que de lo contrario tendrían que recurrir a la marcha."
 motorized_equipment_2: "Transporte motorizado II"
 motorized_equipment_2_desc: "Los vehículos de transporte militar construidos específicamente permiten que los diversos engranajes de la maquinaria bélica funcionen con mayor eficiencia que antes."
 motorized_equipment_3: "Transporte motorizado III"
 motorized_equipment_3_desc: "Con una mayor modularidad y un mantenimiento más sencillo, los últimos vehículos de transporte militar proporcionan a su tripulación y carga una excelente protección y una amplia gama de posibles configuraciones según los requisitos presentes."
 exoskeleton_equipment: "Exoesqueleto"
 exoskeleton_equipment_1: "Exoesqueleto motorizado temprano"
 exoskeleton_equipment_1_desc: "Aunque es rudimentario y algo engorroso, el primer exoesqueleto motorizado otorga a sus usuarios la fuerza para transportar más equipamiento, armamento y protección."
 exoskeleton_equipment_2: "Exoesqueleto motorizado avanzado"
 exoskeleton_equipment_2_desc: "Las experiencias de los usuarios y los avances tecnológicos han producido un tipo avanzado de exoesqueleto motorizado, con menos desventajas y más ventajas en comparación con sus versiones anteriores."

 USB_amphibious_mechanized_equipment_1: "Vehículo anfibio de asalto AAV-7"
 USB_amphibious_mechanized_equipment_1_short: "AAV-7"
 USB_amphibious_mechanized_equipment_1_desc: "Los tractores anfibios, también llamados Amtracs, permiten a los marines desembarcar en una playa con protección blindada. No obstante, esto conlleva una eficacia de combustible pobre."
 USB_amphibious_mechanized_equipment_2: "Vehículo anfibio de asalto AAVP-7A1"
 USB_amphibious_mechanized_equipment_2_short: "AAVP-7A1"
 USB_amphibious_mechanized_equipment_2_desc: "Estos Amtracs presentan varias mejoras con respecto a la versión básica, como una rampa de carga trasera que facilita los desembarcos en la playa."
 USB_amphibious_mechanized_equipment_3: "Vehículo de combate anfibio ACV-P"

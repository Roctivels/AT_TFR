 USB_amphibious_mechanized_equipment_3_desc: "Estos Amtracs presentan varias mejoras con respecto a la versión básica, como una rampa de carga trasera que facilita los desembarcos en la playa."
 USB_rocket_artillery_equipment_1: "T66 Multiple Rocket Launcher"
 USB_rocket_artillery_equipment_1_short: "T66"
 USB_rocket_artillery_equipment_1_desc: "La artillería de cohetes es un tipo de artillería que utiliza cohetes como proyectiles. La artillería de cohetes moderna se empleó por primera vez durante la Segunda Guerra Mundial, en forma de diseños de artillería de cohetes de la familia alemana Nebelwerfer, la serie soviética Katyusha y muchos otros sistemas empleados en menor escala por los aliados occidentales y Japón. En el uso moderno, los cohetes suelen estar guiados por un sistema de guía interno o GPS para mantener la precisión."

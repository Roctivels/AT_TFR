 SIN_light_mechanized_equipment_1_short: "Monstruo"
 PER_light_tank_equipment_1: "FV101 Scorpion"
 PER_light_tank_equipment_1_short: "FV101 Scorpion"
 PER_light_tank_equipment_1_desc: "El FV101 Scorpion es un vehículo blindado de reconocimiento británico. Fue el vehículo líder y de apoyo de fuego de la familia de siete vehículos blindados de reconocimiento de vehículos de combate (orugas), CVR(T). Fabricado por Alvis, entró en servicio en el Ejército Británico en 1973 y prestó servicio hasta 1994."
 PER_light_tank_equipment_2: "Tosan"
 PER_light_tank_equipment_2_short: "Tosan"
 PER_light_tank_equipment_2_desc: "El Tosan es un tanque ligero iraní para guerra no convencional. Irán lo denomina tanque de \"reacción rápida\" porque, según se afirma, tiene capacidad de respuesta rápida y está diseñado para misiones estratégicas. Parece estar basado en el FV101 Scorpion británico (donde Irán tiene 80 unidades en servicio) y está equipado con un cañón de 90 mm, lanzamisiles Toophan y sistemas mejorados de disparo y puntería."
 PER_light_tank_equipment_3: "Aqareb"
 PER_light_tank_equipment_3_short: "Aqareb"
 PER_light_tank_equipment_3_desc: "La industria de defensa iraní ha modificado el vehículo BTR-60PB de la era soviética para convertirlo en su propio desarrollo, el Aqareb 8x8."
 PER_light_tank_equipment_4: "Zulfiqar LT"
 PER_light_tank_equipment_4_short: "Zulfiqar LT"
 PER_light_tank_equipment_4_desc: "Versión ligera del carro de combate principal Zulfiqar."
 PER_light_tank_equipment_5: "Fallagh"
 PER_light_tank_equipment_5_short: "Fallagh"
 PER_light_tank_equipment_5_desc: "El Fallagh parece muy similar al proyecto estadounidense RIPSAW, un tanque ligero no tripulado diseñado por la empresa Howe & Howe Technologies. Fue diseñado por la industria de defensa iraní y presentado en 2015."
 PER_modern_tank_equipment_1: "M48 Patton"
 PER_modern_tank_equipment_1_short: "M48 Patton"
 PER_modern_tank_equipment_1_desc: "El M48 Patton es un carro de combate principal (MBT) diseñado en Estados Unidos. Fue el tercer tanque en recibir oficialmente el nombre del general George S. Patton. Fue una evolución del tanque M47 Patton. El M48 Patton estuvo en servicio en Estados Unidos hasta que fue reemplazado por el M60 y sirvió como el principal MBT del Ejército y la Infantería de Marina de los Estados Unidos en Vietnam del Sur durante la guerra de Vietnam. Fue ampliamente utilizado por los aliados de Estados Unidos durante la Guerra Fría, especialmente otros países de la OTAN."
 PER_modern_tank_equipment_2: "T-72"
 PER_modern_tank_equipment_2_short: "T-72"
 PER_modern_tank_equipment_2_desc: "El T-72 es un carro de combate principal soviético de segunda generación que entró en producción en 1971. Se fabricaron alrededor de 20.000 unidades, lo que lo convierte en uno de los tanques de mayor producción después de la Segunda Guerra Mundial, solo superado por la familia T-54/55. El T-72 se exportó ampliamente y prestó servicio en 40 países y en numerosos conflictos."
 PER_modern_tank_equipment_3: "Safir-74"
 PER_modern_tank_equipment_3_short: "T-72Z"
 PER_modern_tank_equipment_3_desc: "El T-72Z es una versión altamente modernizada del T-55, las actualizaciones han sido realizadas por la Organización de Industrias de Defensa de Irán."
 PER_modern_tank_equipment_4: "Zulfiqar I"
 PER_modern_tank_equipment_4_short: "Zulfiqar I"
 PER_modern_tank_equipment_4_desc: "Zulfiqar es un carro de combate principal (MBT) iraní. Su nombre se debe a Zulfiqar, la legendaria espada de Alí, el cuarto califa y el primer imán chií."
 PER_modern_tank_equipment_5: "Zulfiqar II"
 PER_modern_tank_equipment_5_short: "Zulfiqar II"
 PER_modern_tank_equipment_5_desc: "Zulfiqar II es la versión mejorada del diseño base."
 PER_modern_tank_equipment_6: "Zulfiqar III"
 PER_modern_tank_equipment_6_short: "Zulfiqar III"
 PER_modern_tank_equipment_6_desc: "Version mejorada del Zulfiqar II."
 PER_modern_tank_equipment_7: "Tiam MBT"
 PER_modern_tank_equipment_7_short: "Tiam MBT"
 PER_modern_tank_equipment_7_desc: "Tiam es un carro de combate principal iraní, que está construido sobre el chasis Sabalan, una versión iraní mejorada del chasis M47M Platton."
 PER_modern_tank_equipment_8: "Karrar"
 PER_modern_tank_equipment_8_short: "Karrar"
 PER_modern_tank_equipment_8_desc: "El Karrar es un carro de combate principal iraní. Se anunció el 12 de marzo de 2017. En el anuncio, se indicó que poseía un sistema de control de fuego electroóptico, un telémetro láser y una computadora balística, y que podía disparar tanto a objetivos estables como móviles, tanto de día como de noche. A pesar de su similitud visual con el T-90, Irán no ha firmado ningún acuerdo de licencia con Rusia para la fabricación de T-90 para el Ejército iraní."
 PER_mechanized_equipment_1: "BMP-1"
 PER_mechanized_equipment_1_short: "BMP-1"
 PER_mechanized_equipment_1_desc: "El BMP-1 es un vehículo de combate de infantería anfibio sobre orugas soviético. Fue el primer vehículo de combate de infantería (VCI) producido en serie en la URSS."
 PER_mechanized_equipment_2: "BMP-2"
 PER_mechanized_equipment_2_short: "BMP-2"
 PER_mechanized_equipment_2_desc: "El BMP-2 es un vehículo de combate de infantería anfibio de segunda generación introducido en los años 80 en la Unión Soviética, después del BMP-1 de los años 60."
 PER_mechanized_equipment_3: "Boragh VCI"
 PER_mechanized_equipment_3_short: "Boragh"
 PER_mechanized_equipment_3_desc: "Boragh es un VCI/TPB de fabricación iraní. Se cree que es un modelo mejorado y de ingeniería inversa del Tipo 86 (BMP-1) chino. Las mejoras incluyen reducción de peso, mayor velocidad en carretera y un blindaje más resistente."
 PER_mechanized_equipment_4: "T-15 Armata"
 PER_mechanized_equipment_4_short: "T-15 Armata"
 PER_mechanized_equipment_4_desc: "El T-15 Armata, con designación industrial \"Objeto 149\", es un vehículo pesado de combate de infantería ruso que se vio en público por primera vez en 2015 durante los ensayos del Desfile del Día de la Victoria de Moscú. Se espera que el T-15 sustituya a las plataformas BMP-2 y MT-LB de las Fuerzas Terrestres Rusas."
 PER_mechanized_equipment_5: "Ural ATOM"
 PER_mechanized_equipment_5_short: "Ural ATOM"
 PER_mechanized_equipment_5_desc: "El ATOM es un vehículo de combate de infantería (VCI) pesado 8x8, desarrollado conjuntamente por la empresa rusa Petrel (una división de Uralvagonzavod) y la francesa Renault Trucks. Este vehículo se basa en el VCI francés (VBCI) fabricado por Renault. El prototipo del ATOM se presentó por primera vez durante la Exposición de Armas Rusas de 2013 en Nizhni Taguil, equipado con un módulo de combate único."
 PER_light_mechanized_equipment_1: "BTR-50"
 PER_light_mechanized_equipment_1_short: "BTR-50"
 PER_light_mechanized_equipment_1_desc: "El BTR-50 es un transporte blindado de personal (TBP) anfibio soviético basado en el tanque ligero PT-76. El BTR-50 cuenta con orugas, a diferencia de la mayoría de los vehículos de la serie BTR, que cuentan con ruedas."
 PER_light_mechanized_equipment_2: "BTR-60"
 PER_light_mechanized_equipment_2_short: "BTR-60"
 PER_light_mechanized_equipment_2_desc: "El BTR-60 es el primer vehículo de una serie de transportes blindados de personal (TBP) soviéticos de ocho ruedas. Se desarrolló a finales de los años 50 como sustituto del BTR-152 y se vio en público por primera vez en 1961."
 PER_light_mechanized_equipment_3: "Boragh TBP"
 PER_light_mechanized_equipment_3_short: "Boragh"
 PER_light_mechanized_equipment_3_desc: "Boragh es un VCI/TPB de fabricación iraní. Se cree que es un modelo mejorado y de ingeniería inversa del Tipo 86 (BMP-1) chino. Las mejoras incluyen reducción de peso, mayor velocidad en carretera y un blindaje más resistente."
 PER_light_mechanized_equipment_4: "Rakhsh TBP"
 PER_light_mechanized_equipment_4_short: "Rakhsh TBP"
 PER_light_mechanized_equipment_4_desc: "El Rakhsh es un TBP todoterreno 4x4 ligero iraní, desarrollado y producido por el Complejo Industrial Shahid Kolah Dooz de DIO, y recibe su nombre de Rakhsh, el mítico caballo de Rostam en Shahnameh. Probablemente se basa en un chasis todoterreno 4x4 probado anteriormente en Irán y que presta servicio a la Policía y el Ejército iraníes, el CGRI y Sudán."
 PER_light_mechanized_equipment_5: "Ural Typhoon"
 PER_light_mechanized_equipment_5_short: "Ural Typhoon"
 PER_light_mechanized_equipment_5_desc: "El Ural Typhoon es la familia rusa de vehículos blindados, multifuncionales, modulares y resistentes a minas. El chasis consta de capó, bastidor, tracción de tres ejes, bastidor con capó y chasis. El Typhoon forma parte del programa ruso de vehículos de gran tamaño Typhoon."
 PER_light_mechanized_equipment_6: "Bumerang TBP"
 PER_light_mechanized_equipment_6_short: "Bumerang TBP"
 PER_light_mechanized_equipment_6_desc: "El Bumerang es un vehículo blindado de transporte de personal anfibio con ruedas que se está desarrollando para el ejército ruso."
 POL_light_tank_equipment_1: "PT-76"
 POL_light_tank_equipment_1_short: "PT-76"
 POL_light_tank_equipment_1_desc: "El PT-76 es un tanque ligero basado en el chasis con orugas BWP-1."
 POL_light_tank_equipment_2: "PT-40"
 POL_light_tank_equipment_2_short: "PT-40"
 POL_light_tank_equipment_2_desc: "El PT-40 es un tanque ligero basado en el chasis con orugas BWP-1 modernizado según el estándar BWP-40."
 POL_light_tank_equipment_3: "PT-2000"
 POL_light_tank_equipment_3_short: "PT-2000"
 POL_light_tank_equipment_3_desc: "El PT-2000 es un tanque ligero basado en el chasis con orugas BWP-1 modernizado según el estándar BWP-2000."
 POL_light_tank_equipment_4: "WWO Anders"
 POL_light_tank_equipment_4_short: "WWO Anders"
 POL_light_tank_equipment_4_desc: "El WWO Anders (Wóz Wsparcia Ogniowego - Vehículo de apoyo de fuego) es un tanque ligero basado en el chasis de orugas del WPB Anders."
 POL_light_tank_equipment_5: "WWB Gepard"
 POL_light_tank_equipment_5_short: "WWB Gepard"
 POL_light_tank_equipment_5_desc: "WWB Gepard (Wóz Wsparcia Bezpośredniego - Vehículo de apoyo directo) es un tanque ligero basado en el chasis de orugas BWP Borsuk."
 POL_modern_tank_equipment_1: "T-55"
 POL_modern_tank_equipment_1_short: "T-55"
 POL_modern_tank_equipment_1_desc: "Los tanques T-55 son una serie de carros de combate principales soviéticos introducidos justo al final de la Segunda Guerra Mundial. La serie T-54/55 se convirtió en la más producida en la historia militar. Se estima que la producción de la serie oscila entre 86.000 y 100.000 unidades."
 POL_modern_tank_equipment_2: "T-72"
 POL_modern_tank_equipment_2_short: "T-72"
 POL_modern_tank_equipment_2_desc: "El T-72 es un carrp de combate principal soviético de segunda generación que entró en producción en 1971. El T-72 fue el tanque más común utilizado por el Pacto de Varsovia desde los años 70 hasta el colapso de la Unión Soviética."
 POL_modern_tank_equipment_3: "PT-91 Twardy"
 POL_modern_tank_equipment_3_short: "PT-91 Twardy"
 POL_modern_tank_equipment_3_desc: "El PT-91 Twardy («resistente») es un carro de combate principal polaco. Evolucionado del T-72M1, entró en servicio en 1995. El PT-91 fue diseñado en la OBRUM. Entre las novedades respecto al T-72 se incluyen un nuevo sistema de control de fuego estabilizado de doble eje, blindaje reactivo, un motor más potente, transmisión y un nuevo cargador automático."
 POL_modern_tank_equipment_4: "Leopard 2A4"
 POL_modern_tank_equipment_4_short: "Leopard 2A4"
 POL_modern_tank_equipment_4_desc: "El Leopard 2 es un carro de combate principal desarrollado por Krauss-Maffei en los años 70 para el Ejército de Alemania Occidental. Entró en servicio por primera vez en 1979 y sucedió al anterior Leopard 1 como carro de combate principal del ejército alemán."
 POL_modern_tank_equipment_5: "Leopard 2A5"
 POL_modern_tank_equipment_5_short: "Leopard 2A5"
 POL_modern_tank_equipment_5_desc: "El Leopard 2A5 incorpora un blindaje adicional espaciado y en forma de cuña en el frente de la torreta. La zona frontal de los laterales, así como la mira del comandante, se trasladaron a una nueva posición detrás de la escotilla y se les instaló un canal térmico independiente. La mira del artillero se trasladó al techo de la torreta, en lugar de la cavidad del blindaje frontal de los modelos anteriores."
 POL_modern_tank_equipment_6: "Leopard 2PL"
 POL_modern_tank_equipment_6_short: "Leopard 2PL"
 POL_modern_tank_equipment_6_desc: "El Leopard 2PL incorporará un nuevo equipamiento de puntería para el artillero, el comandante y el conductor, un mayor nivel de protección, un cañón mejorado, un sistema de supresión de incendios mejorado y la instalación de una unidad de potencia auxiliar."
 POL_modern_tank_equipment_7: "Leopard 2PL+"
 POL_modern_tank_equipment_7_short: "Leopard 2PL+"
 POL_modern_tank_equipment_7_desc: "El Leopard 2PL+ incluye la incorporación del cañón de ánima lisa Rheinmetall L55 de 120 mm y otros cambios."
 POL_modern_tank_equipment_8: "Leopard 3PL"
 POL_modern_tank_equipment_8_short: "Leopard 3PL"
 POL_modern_tank_equipment_8_desc: "El Leopard 3PL es una modernización profunda preparada para el campo de batalla del siglo XXI. El modelo 3PL está equipado con una nueva armadura compuesta, mejores sistemas de visión y control de fuego, un nuevo paquete de energía y un mejor sistema de camuflaje."
 POL_mechanized_equipment_1: "BWP-1"
 POL_mechanized_equipment_1_short: "BWP-1"
 POL_mechanized_equipment_1_desc: "El BMP-1 es un vehículo de combate de infantería anfibio sobre orugas soviético. BWP significa «Bojowy Wóz Piechoty» en polaco, del ruso BMP, que significa «vehículo de combate de infantería». El BMP-1 fue el primer vehículo de combate de infantería (VCI) producido en serie en la URSS y todos los demás miembros del Pacto de Varsovia."
 POL_mechanized_equipment_2: "BWP-2"
 POL_mechanized_equipment_2_short: "BWP-2"
 POL_mechanized_equipment_2_desc: "El BWP-2 fue un IFV de segunda generación, desarrollado a partir del BWP-1. Tenía una nueva torreta para dos hombres armada con el cañón automático 2A42 de 30 mm y el lanzador ATGM 9P135M capaz de disparar misiles antitanque guiados 9M111 \"Fagot\", 9M113 \"Konkurs\" y 9M113M \"Konkurs-M\"."
 POL_mechanized_equipment_3: "WPB Anders"
 POL_mechanized_equipment_3_short: "WPB Anders"
 POL_mechanized_equipment_3_desc: "El WPB Anders es una familia de vehículos de combate medianos sobre orugas. WPB son las siglas de Wielozadaniowa Platforma Bojowa - Plataforma de combate polivalente."
 POL_mechanized_equipment_4: "BWP Borsuk"
 POL_mechanized_equipment_4_short: "BWP Borsuk"
 POL_mechanized_equipment_4_desc: "El BWP Borsuk es un vehículo IFV del siglo XXI con un potente motor, un moderno blindaje, una torreta automática ZSSW-30 y un sistema de gestión de batalla diseñado para coordinar las unidades en el campo de batalla."
 POL_mechanized_equipment_5: "M3 Bradley"
 POL_mechanized_equipment_5_short: "M3 Bradley"
 POL_mechanized_equipment_5_desc: "M3 Bradley"
 POL_light_mechanized_equipment_1: "SKOT 2A"
 POL_light_mechanized_equipment_1_short: "SKOT 2A"
 POL_light_mechanized_equipment_1_desc: "El SKOT 2A es un vehículo blindado de transporte de tropas anfibio (8x8), desarrollado conjuntamente por Polonia y Checoslovaquia. Los APC SKOT-2A estaban equipados con lanzadores 9M14 Malyutka ATGM en los laterales de la torreta. Los lanzadores estaban protegidos con placas de blindaje o malla metálica."
 POL_light_mechanized_equipment_2: "KTO Ryś"
 POL_light_mechanized_equipment_2_short: "KTO Ryś"
 POL_light_mechanized_equipment_2_desc: "El KTO (Kołowy Transporter Opancerzony) Ryś es un vehículo militar polivalente 8x8 producido por Wojskowe Zakłady Motoryzacyjne S.A. El vehículo fue desarrollado a partir del chasis y la cadena cinemática del vehículo blindado de transporte de tropas OT-64 SKOT."
 POL_light_mechanized_equipment_3: "KTO Rosomak"
 POL_light_mechanized_equipment_3_short: "KTO Rosomak"
 POL_light_mechanized_equipment_3_desc: "KTO Rosomak"
 POL_light_mechanized_equipment_4: "KTO Rosomak XP"
 POL_light_mechanized_equipment_4_short: "KTO Rosomak XP"
 POL_light_mechanized_equipment_4_desc: "KTO Rosomak XP"
 POL_light_mechanized_equipment_5: "KTO Rosomak-30"
 POL_light_mechanized_equipment_5_short: "KTO Rosomak-30"
 POL_light_mechanized_equipment_5_desc: "El KTO Rosomak-30 es una modernización equipada con torreta automática ZSSW-30, nuevo blindaje y sistema de gestión de combate."

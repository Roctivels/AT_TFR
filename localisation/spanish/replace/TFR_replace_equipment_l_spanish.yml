 TUR_infantry_equipment_0: "M1"
 TUR_infantry_equipment_0_short: "M1"
 TUR_infantry_equipment_0_desc: "Con más de 300.000 unidades enviadas por Estados Unidos entre 1953 y 1970, el \"Garand\" fue uno de los principales rifles de servicio del ejército turco, ahora relegado a funciones ceremoniales."
 TUR_infantry_equipment_1: "G3A4"
 TUR_infantry_equipment_1_short: "G3A4"
 TUR_infantry_equipment_1_desc: "En servicio desde los años 70, esta variante del venerable fusil de batalla alemán utiliza miras de tambor y una culata plegable de una sola posición."
 TUR_infantry_equipment_2: "HK33E"
 TUR_infantry_equipment_2_short: "HK33E"
 TUR_infantry_equipment_2_desc: "Producido bajo licencia por MKEK, el HK33E está calibrado para el calibre más liviano de 5,56 × 45 mm OTAN para aliviar los problemas de peso del diseño anterior, ojalá sin sacrificar el poder de frenado."
 TUR_infantry_equipment_3: "Carabina M4"
 TUR_infantry_equipment_3_short: "Carabina M4"
 TUR_infantry_equipment_3_desc: "Producida bajo licencia por Sarsılmaz Firearms, la carabina M4 ya utilizada por las Fuerzas Especiales podría satisfacer la necesidad de nuestras tropas de un arma de servicio moderna y ligera."
 TUR_infantry_equipment_4: "HK416"
 TUR_infantry_equipment_4_short: "HK416"
 TUR_infantry_equipment_4_desc: "El HK416, una versión alemana del M4 americano, con su sistema patentado de pistón de gas de recorrido corto parece un reemplazo prometedor para nuestro antiguo stock de rifles G3A7."
 TUR_infantry_equipment_5: "MPT-76"
 TUR_infantry_equipment_5_short: "MPT-76"
 TUR_infantry_equipment_5_desc: "Inspirado en el HK417, el Fusil de Infantería Nacional es el primer diseño de fusil turco patentado, calibrado para el calibre más pesado 7,62×51 mm OTAN y diseñado para grandes altitudes y entornos extremos."
 TUR_infantry_equipment_6: "MPT-99"
 TUR_infantry_equipment_6_short: "MPT-99"
 TUR_infantry_equipment_6_desc: "Diseñado con las tecnologías de punta del siglo XXI, este nuevo fusil de infantería nacional concilia peso y poder de detención para brindar una potencia de fuego devastadora al campo de batalla."
 UKR_infantry_equipment_0: "AK-47"
 UKR_infantry_equipment_0_short: "AK-47"
 UKR_infantry_equipment_0_desc: "El Avtomat Kalashnikova modelo 47 era un fusil de asalto inspirado en el Sturmgewehr 44 alemán y se introdujo por primera vez en 1947. Hasta los años 60, se convertiría en el arma de fuego principal del Ejército Rojo soviético y también se utilizó ampliamente entre los aliados soviéticos y entre los grupos insurgentes respaldados por los soviéticos. El AK-47 se convertiría en el fusil de asalto más fabricado de todos los tiempos y se considera una de las armas más rentables y más confiables hasta el día de hoy."
 UKR_infantry_equipment_1: "AKM"
 UKR_infantry_equipment_1_short: "AKM"
 UKR_infantry_equipment_1_desc: "El AKM es la variante más producida en serie del AK-47. Presentado en 1959, el AKM ofrece varias mejoras pequeñas pero notorias en conjunto, como nuevos dispositivos de seguridad y un peso más ligero cuando está cargado. Siguió siendo el rifle principal del Pacto de Varsovia hasta los años 70."
 UKR_infantry_equipment_2: "AK-74"
 UKR_infantry_equipment_2_short: "AK-74"
 UKR_infantry_equipment_2_desc: "El AK-74 reemplazó al obsoleto AKM en 1979 y se utilizó por primera vez en la invasión soviética de Afganistán. Tenía un cartucho diferente al de los modelos anteriores y se jactaba de tener un alcance, una precisión de disparo y una durabilidad mejorados. Sigue siendo el rifle más utilizado por las antiguas naciones comunistas y las pocas que quedan."

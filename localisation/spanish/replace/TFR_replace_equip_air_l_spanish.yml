 fighter_equipment: "Caza polivalente"
 fighter_equipment_short: "Polivalente"
 fighter_equipment_desc: "Esta categoría incluye tanto cazas de superioridad aérea como cazas polivalentes.\n\nUn caza polivalente es un avión de combate que, a la vez, es un caza; es decir, un avión militar que puede ser usado como caza y como avión de ataque a tierra al mismo tiempo.\n\nUn caza de superioridad aérea está destinado a entrar y tomar el control en el espacio aéreo enemigo."

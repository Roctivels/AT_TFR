 SOV_CAS_equipment_1: "Sukhoi Su-24"
 SOV_CAS_equipment_1_short: "Su-24"
 SOV_CAS_equipment_1_desc: ""
 SOV_CAS_equipment_2: "Sukhoi Su-25 «Grach»"
 SOV_CAS_equipment_2_short: "Su-25 «Grach»"
 SOV_CAS_equipment_2_desc: "El Sukhoi Su-25 «Grach» es una aeronave monoplaza, bimotor, desarrollada en la Unión Soviética por la Oficina de diseño Sukhoi. Fue creado para brindar soporte a las Fuerzas Terrestres Soviéticas. La aeronave de ataque a tierra entró en producción en 1978 en la ciudad de Tiflis, en la R. S. S. de Georgia."
 SOV_CAS_equipment_3: "Sukhoi Su-34"
 SOV_CAS_equipment_3_short: "Su-34"
 SOV_CAS_equipment_3_desc: ""
 SOV_fighter_equipment_1: "Mikoyán MiG-31"
 SOV_fighter_equipment_1_short: "MiG-31"
 SOV_fighter_equipment_1_desc: "El Mikoyán MiG-31 es un interceptor supersónico diseñado para la Fuerza Aérea Soviética. El avión fue diseñado por la oficina de diseño de Mikoyan como reemplazo del anterior MiG-25 \"Foxbat\"; el MiG-31 se basa y comparte elementos de diseño con el MiG-25. El MiG-31 se encuentra entre los aviones de combate más rápidos del mundo. Continúa siendo operado por la Fuerza Aérea de Rusia y la Fuerza Aérea Kazaja tras el final de la Guerra Fría y el colapso de la Unión Soviética en 1991."
 SOV_fighter_equipment_2: "Mikoyán MiG-29"
 SOV_fighter_equipment_2_short: "MiG-29"
 SOV_fighter_equipment_2_desc: "El Mikoyán-Gurévich MiG-29 es un caza de superioridad aérea de cuarta generación diseñado por Mikoyán en la Unión Soviética en los años 70, siendo un caza inicialmente diseñado para contrarrestar, junto al Sukhoi Su-27, al dúo de cazas estadounidenses de esa época, el F-15 Eagle y el F-16 Fighting Falcon. Entró en servicio con la Fuerza Aérea Soviética en el año 1983."
 SOV_fighter_equipment_3: "Sukhoi Su-27"
 SOV_fighter_equipment_3_short: "Su-27"
 SOV_fighter_equipment_3_desc: "El Sukhoi Su-27 es un avión de caza monoplaza, propulsado por dos motores turbofán de la clase Mach 2, diseñado en la Unión Soviética por Sukhoi. Estaba proyectado como un competidor directo a los grandes cazas de cuarta generación estadounidenses, con un largo alcance de 3530 km, armamento pesado, aviónica sofisticada y gran agilidad. El Su-27 la gran mayoría de las veces realiza misiones de superioridad aérea, pero está preparado para realizar casi cualquier operación de combate, complementando al más ligero Mikoyán MiG-29."
 SOV_fighter_equipment_4: "Sukhoi Su-57"
 SOV_fighter_equipment_4_short: "Su-57"
 SOV_fighter_equipment_4_desc: "El Sukhoi Su-57 es un caza furtivo monoplaza, bimotor y multifunción de quinta generación, desarrollado desde 2002 para operaciones de superioridad aérea y ataque. Forma parte del programa PAK FA, un caza de quinta generación de la Fuerza Aérea de Rusia. El nombre interno de Sukhoi para el avión es T-50. Se prevé que el Su-57 sea el primer avión en servicio militar ruso en utilizar tecnología furtiva."
 SOV_fighter_equipment_5: "Sukhoi Su-75 LTS"
 SOV_fighter_equipment_5_short: "Su-75 LTS"
 SOV_fighter_equipment_5_desc: ""
 SOV_fighter_equipment_6: "Sukhoi Su-57M"
 SOV_fighter_equipment_6_short: "Su-57M"
 SOV_fighter_equipment_6_desc: "El Sukhoi Su-57 es un caza furtivo monoplaza, bimotor y multifunción de quinta generación, desarrollado desde 2002 para operaciones de superioridad aérea y ataque. Forma parte del programa PAK FA, un caza de quinta generación de la Fuerza Aérea de Rusia. El nombre interno de Sukhoi para el avión es T-50. Se prevé que el Su-57 sea el primer avión en servicio militar ruso en utilizar tecnología furtiva."
 SOV_cv_fighter_equipment_1: "Mikoyán-Gurévich MiG-21K"
 SOV_cv_fighter_equipment_1_short: "MiG-21K"
 SOV_cv_fighter_equipment_1_desc: "Este vehículo es ficticio."
 SOV_cv_fighter_equipment_2: "Mikoyán MiG-29K"
 SOV_cv_fighter_equipment_2_short: "MiG-29K"
 SOV_cv_fighter_equipment_2_desc: "El Mikoyán MiG-29K es un caza ruso multifunción para todo tipo de clima, con base en portaaviones, desarrollado por la Oficina de Diseño Mikoyán. El MiG-29K se desarrolló a finales de los años 80 a partir del MiG-29M. Mikoyán lo describe como un avión de cuarta generación o superior."
 SOV_cv_fighter_equipment_3: "Yakovlev Yak-141"
 SOV_cv_fighter_equipment_3_short: "Yak-141"
 SOV_cv_fighter_equipment_3_desc: "El Yakovlev Yak-141, también conocido como Yak-41, es un caza supersónico soviético de despegue y aterrizaje vertical (VTOL) diseñado por Yakovlev. Su desarrollo se canceló en 1991."
 SOV_cv_fighter_equipment_4: "Sukhoi Su-33"
 SOV_cv_fighter_equipment_4_short: "Su-33"
 SOV_cv_fighter_equipment_4_desc: "El Sukhoi Su-33 es un caza de superioridad aérea bimotor para portaaviones, apto para todo tipo de clima, diseñado por Sukhoi y fabricado por la Asociación de Producción Aeronáutica de Komsomolsk del Amur. Este caza deriva del Su-27 y se conoció inicialmente como Su-27K. Comparado con el Su-27, el Su-33 cuenta con un tren de aterrizaje y una estructura reforzados, alas plegables y estabilizadores, todo ello ideal para operaciones en portaaviones. El Su-33 cuenta con canards y sus alas son más grandes que las del Su-27 para una mayor sustentación."
 SOV_cv_fighter_equipment_5: "Mikoyán MiG-35K"
 SOV_cv_fighter_equipment_5_short: "MiG-35K"
 SOV_cv_fighter_equipment_5_desc: "Este vehículo es ficticio."
 SOV_cv_fighter_equipment_6: "Sukhoi Su-30K"
 SOV_cv_fighter_equipment_6_short: "Su-30K"
 SOV_cv_fighter_equipment_6_desc: "Este vehículo es ficticio."
 SOV_cv_fighter_equipment_7: "Sukhoi Su-35K"
 SOV_cv_fighter_equipment_7_short: "Su-35K"
 SOV_cv_fighter_equipment_7_desc: "According to the General Director of Mikoyan, Ilya Tarasenko, a carrier-based version of the MiG-35 is under development, as of 2019. The Radioelectronic Technologies Concern (KRET) has already adapted a new landing system to the BINS-SP-2 deck for the MiG-35."
 SOV_cv_fighter_equipment_8: "Sukhoi Su-57K"
 SOV_cv_fighter_equipment_8_short: "Su-57K"
 SOV_cv_fighter_equipment_8_desc: "Este vehículo es ficticio."
 SOV_nav_bomber_equipment_1: "Antónov An-12 MPA"
 SOV_nav_bomber_equipment_1_short: "An-12 MPA"
 SOV_nav_bomber_equipment_1_desc: "The Antonov An-12 is a four-engine turboprop transport aircraft designed in the Soviet Union. It is the military version of the Antonov An-10 and has many variants. For more than three decades the An-12 was the standard medium-range cargo and paratroop transport aircraft of the Soviet air forces. A total of 1,234 were eventually built. This variant serves as a maritime patrol aircraft."
 SOV_nav_bomber_equipment_2: "Túpolev Tu-142"
 SOV_nav_bomber_equipment_2_short: "Tu-142"
 SOV_nav_bomber_equipment_2_desc: "The Tupolev Tu-142 is a Soviet/Russian maritime reconnaissance and anti-submarine warfare (ASW) aircraft derived from the Tu-95 turboprop strategic bomber. A specialized communications variant designated Tu-142MR was tasked with long-range communications duties with Soviet ballistic missile submarines. The Tu-142 was designed by the Tupolev design bureau and manufactured by the Kuibyshev Aviation and Taganrog Machinery Plants from 1968 to 1994."
 SOV_nav_bomber_equipment_3: "Iliushin Il-38"
 SOV_nav_bomber_equipment_3_short: "Il-38"
 SOV_nav_bomber_equipment_3_desc: "The Ilyushin Il-38 \"Dolphin\" is a maritime patrol aircraft and anti-submarine warfare aircraft designed in the Soviet Union. It was a development of the Ilyushin Il-18 turboprop transport. The Il-38 is an adaptation of the four-engine turboprop Ilyushin Il-18 for use as a maritime patrol aircraft for the Soviet Navy. It met a requirement to counter American ballistic missile submarines."
 SOV_nav_bomber_equipment_4: "Sukhoi Su-24"
 SOV_nav_bomber_equipment_4_short: "Su-24"
 SOV_nav_bomber_equipment_4_desc: "The Sukhoi Su-24 is a supersonic, all-weather attack aircraft developed in the Soviet Union. The aircraft has a variable-sweep wing, twin-engines and a side-by-side seating arrangement for its crew of two. It was the first of the USSR's aircraft to carry an integrated digital navigation/attack system. It remains in service with the Russian Air Force, Syrian Air Force, Ukrainian Air Force, Azerbaijan Air Force and various air forces to which it was exported."
 SOV_cv_nav_bomber_equipment_4: "Sukhoi Su-24K"
 SOV_cv_nav_bomber_equipment_4_short: "Su-24K"
 SOV_cv_nav_bomber_equipment_4_desc: "Este vehículo es ficticio."
 SOV_strat_bomber_equipment_1: "Túpolev Tu-95"
 SOV_strat_bomber_equipment_1_short: "Tu-95"
 SOV_strat_bomber_equipment_1_desc: "The Tupolev Tu-95 is a large, four-engine turboprop-powered strategic bomber and missile platform. First flown in 1952, the Tu-95 entered service with the Soviet Union in 1956 and is expected to serve the Russian Aerospace Forces until at least 2040. A development of the bomber for maritime patrol is designated Tu-142, while a passenger airliner derivative was called Tu-114."
 SOV_strat_bomber_equipment_2: "Túpolev Tu-22M"
 SOV_strat_bomber_equipment_2_short: "Tu-22M"
 SOV_strat_bomber_equipment_2_desc: "The Tupolev Tu-22M is a supersonic, variable-sweep wing, long-range strategic and maritime strike bomber developed by the Tupolev Design Bureau. According to some sources, the bomber was believed to be designated Tu-26 at one time. During the Cold War, the Tu-22M was operated by the Soviet Air Forces (VVS) in a missile carrier strategic bombing role, and by the Soviet Naval Aviation in a long-range maritime anti-shipping role."
 SOV_strat_bomber_equipment_3: "Túpolev Tu-160"
 SOV_strat_bomber_equipment_3_short: "Tu-160"
 SOV_strat_bomber_equipment_3_desc: "The Tupolev Tu-160 is a supersonic, variable-sweep wing heavy strategic bomber designed by the Tupolev Design Bureau in the Soviet Union. It is the largest and heaviest Mach 2+ supersonic military aircraft ever built and second only to the XB-70 Valkyrie in overall length. It is the largest and heaviest combat aircraft, the fastest bomber now in use and the largest and heaviest variable-sweep wing airplane ever flown, as of 2019."
 SOV_strat_bomber_equipment_4: "Túpolev Tu-22M3M"
 SOV_strat_bomber_equipment_4_short: "Tu-22M3M"
 SOV_strat_bomber_equipment_4_desc: "A contract for a full mid-life upgrade, the Tu-22M3M was signed in September 2014. The aircraft is to receive a further modified NV-45M radar, together with new navigation equipment and a modified flight control system. A new self-defense electronic radar suite is fitted, replacing the tail gun of the existing Tu-22M3. Much of the new avionics are shared with the upgraded Tu-160M2."
 SOV_strat_bomber_equipment_5: "Túpolev PAK DA"
 SOV_strat_bomber_equipment_5_short: "PAK DA"
 SOV_strat_bomber_equipment_5_desc: "The Tupolev PAK DA or PAK DA factory designation Izdeliye 80, is a next-generation stealth strategic bomber being developed by Tupolev for the Russian Air Force. The PAK DA is set to complement and eventually replace older variants, namely the Tupolev Tu-95 and Tupolev Tu-160, in Russia's Air Force service. The first flight is scheduled for 2025–2026 with serial production to follow in 2028–2029."
 SOV_transport_plane_equipment_1: "Iliushin Il-76"
 SOV_transport_plane_equipment_1_short: "Il-76"
 SOV_transport_plane_equipment_1_desc: "WE MAKING IT BEHIND ENEMY LINES WITH THIS ONE BOYS :fire:"
 SOV_transport_plane_equipment_2: "Antónov An-148"
 SOV_transport_plane_equipment_2_short: "An-148"
 SOV_transport_plane_equipment_2_desc: "The Antonov An-148 is a regional jet designed and built by Antonov of Ukraine. Development of the aircraft was started in the 1990s, and its maiden flight took place on 17 December 2004. The aircraft completed its certification program on 26 February 2007. The An-148 has a maximum range of 2,100–4,400 km (1,100–2,400 nmi; 1,300–2,700 mi) and can carry 68–85 passengers, depending on the configuration."
 SPR_nav_bomber_equipment_4: "CASA/IPTN CN-235"
 SPR_nav_bomber_equipment_4_short: "CN-235"
 SPR_nav_bomber_equipment_4_desc: "El CASA/IPTN CN-235 es un avión de rango medio bimotor que fue desarrollado conjuntamente por Construcciones Aeronáuticas S.A. (CASA) de España y la fabricante indonesia IPTN como un avión comercial regional y de transporte militar. Sus principales roles militares son la patrulla marítima, la vigilancia, y el transporte aéreo."
 SPR_transport_plane_equipment_2: "Airbus A400M Atlas"
 SPR_transport_plane_equipment_2_short: "A400M Atlas"
 SPR_transport_plane_equipment_2_desc: "El Airbus A400M Atlas es un avión de transporte militar europeo de largo alcance y cisterna propulsado por cuatro motores turbohélice, diseñado por Airbus Military (hoy Airbus Defence and Space) para reemplazar aviones anticuados, como el Transall C-160 y el Lockheed C-130 Hercules."
 TUR_CAS_equipment_1: "F-4E Phantom II"
 TUR_CAS_equipment_1_short: "F-4E Phantom II"
 TUR_CAS_equipment_1_desc: "The Turkish Air Force remains one of the most prominent users of the F-4, configured for reconnaissance or ground attack missions against insurgent emplacements."
 TUR_CAS_equipment_2: "F-4E-2020 Terminator"
 TUR_CAS_equipment_2_short: "F-4E-2020"
 TUR_CAS_equipment_2_desc: "This IAI-designed Phantom 2000 upgrade package to the F-4E features improvements to avionics and structure, tentatively extending its service life to 2020."
 TUR_CAS_equipment_3: "F-16C/D Block 40 (AAC)"
 TUR_CAS_equipment_3_short: "F-16C/D Block 40 (AAC)"
 TUR_CAS_equipment_3_desc: "The F-16 and its variants can be reconfigured to an exclusive ground-attack role, most suitable for the Turkish Air Force's usual counter-insurgency duties."
 TUR_fighter_equipment_1: "F-86 Sabre"
 TUR_fighter_equipment_1_short: "F-86 Sabre"
 TUR_fighter_equipment_1_desc: "Since joining NATO, Turkey has equipped her Air Force with a great amount of American-made aircraft, including the F-86."
 TUR_fighter_equipment_2: "F-5A/B"
 TUR_fighter_equipment_2_short: "F-5A/B"
 TUR_fighter_equipment_2_desc: "The Turkish Air Force has acquired dozens of F-5 units from various countries, using it for various missions including training and ground attack."
 TUR_fighter_equipment_3: "F-16C/D Block 30"
 TUR_fighter_equipment_3_short: "F-16C/D Block 30"
 TUR_fighter_equipment_3_desc: "Produced under license by TAI, the F-16 and its variants are the bulk of the Turkish Air Force, versatile enough for most operations."
 TUR_fighter_equipment_4: "F-16C/D Block 40"
 TUR_fighter_equipment_4_short: "F-16C/D Block 40"
 TUR_fighter_equipment_4_desc: "An upgrade package for the F-16 featuring improved avionics, software and structural changes can now be produced locally."
 TUR_fighter_equipment_5: "F-16C/D Block 50"
 TUR_fighter_equipment_5_short: "F-16C/D Block 50"
 TUR_fighter_equipment_5_desc: "An upgrade package for the F-16 featuring improved avionics, software and structural changes can now be produced locally."
 TUR_fighter_equipment_6: "F-35 Lightning II"
 TUR_fighter_equipment_6_short: "F-35"
 TUR_fighter_equipment_6_desc: "A level-3 partner of the JSF Project, Turkey has ordered a considerable amount of F-35s as well as the license to produce them locally."
 TUR_fighter_equipment_7: "TF-23 Doğan"
 TUR_fighter_equipment_7_short: "TF-23"
 TUR_fighter_equipment_7_desc: "Originally announced as the TF-X, the TF-23 is the first indigenous design of the Turkish Air Force, boasting the latest avionics, stealth and long-range interception technologies."
 TUR_fighter_equipment_8: "TF-30 Kartal"
 TUR_fighter_equipment_8_short: "TF-30"
 TUR_fighter_equipment_8_desc: "Based on previous experience with the TF-23, the Kartal is a multirole fighter designed to dominate the skies with an edge in cyberwarfare technology."
 TUR_nav_bomber_equipment_5: "Meltem III ATR 72-600 TMPA"
 TUR_nav_bomber_equipment_5_short: "Meltem III ATR 72-600 TMPA"
 TUR_nav_bomber_equipment_5_desc: "Meltem III ATR 72-600 TMPA"

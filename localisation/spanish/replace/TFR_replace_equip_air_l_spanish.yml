 USC_fighter_equipment_3_desc: "The General Dynamics F-16 Fighting Falcon is a single-engine supersonic multirole fighter aircraft originally developed by General Dynamics (now Lockheed Martin) for the United States Air Force (USAF). Designed as an air superiority day fighter, it evolved into a successful all-weather multirole aircraft."
 USC_fighter_equipment_4: "Lockheed Martin F-22 Raptor"
 USC_fighter_equipment_4_short: "F-22 Raptor"
 USC_fighter_equipment_4_desc: "The Lockheed Martin F-22 Raptor is a fifth-generation, single-seat, twin-engine, all-weather stealth tactical fighter aircraft developed for the United States Air Force (USAF). The result of the USAF's Advanced Tactical Fighter (ATF) program, the aircraft was designed primarily as an air superiority fighter, but also has ground attack, electronic warfare, and signal intelligence capabilities."
 USC_fighter_equipment_5: "Lockheed Martin F-35A Lightning II"
 USC_fighter_equipment_5_short: "F-35A Lightning II"
 USC_fighter_equipment_5_desc: "The Lockheed Martin F-35A Lightning II is a family of single-seat, single-engine, all-weather, stealth, fifth-generation, multirole combat aircraft, designed for ground-attack and air-superiority missions. It is built by Lockheed Martin and many subcontractors, including Northrop Grumman, Pratt & Whitney, and BAE Systems."
 USC_fighter_equipment_6: "Lockheed Martin F-35C Lightning II"
 USC_fighter_equipment_6_short: "F-35C Lightning II"
 USC_fighter_equipment_6_desc: "The Lockheed Martin F-35C Lightning II is a family of single-seat, single-engine, all-weather, stealth, fifth-generation, multirole combat aircraft, designed for ground-attack and air-superiority missions. It is built by Lockheed Martin and many subcontractors, including Northrop Grumman, Pratt & Whitney, and BAE Systems."
 USA_cv_fighter_equipment_1: "Grumman F9F Panther"
 USA_cv_fighter_equipment_1_short: "F9F Panther"
 USA_cv_fighter_equipment_1_desc: "El Grumman F9F Panther es uno de los primeros cazas a reacción embarcados exitosos de la Armada de los Estados Unidos, así como el primer caza a reacción de Grumman. Un caza diurno monomotor de ala recta, estaba armado con cuatro cañones de 20 mm y podía transportar una amplia variedad de municiones aire-tierra."
 USA_cv_fighter_equipment_2: "McDonnell Douglas F-4N Phantom II"
 USA_cv_fighter_equipment_2_short: "F-4N Phantom II"
 USA_cv_fighter_equipment_2_desc: "El McDonnell Douglas F-4 Phantom II es un interceptor y cazabombardero a reacción supersónico biplaza en tándem, bimotor, todo tiempo y de largo alcance, desarrollado originalmente para la Armada de los Estados Unidos por McDonnell Aircraft. Entró en servicio por primera vez en 1960 con la Armada de los EE.UU."
 USA_cv_fighter_equipment_3: "Grumman F-14 Tomcat"
 USA_cv_fighter_equipment_3_short: "F-14 Tomcat"
 USA_cv_fighter_equipment_3_desc: "El Grumman F-14 Tomcat es un avión de combate estadounidense supersónico, bimotor, biplaza, de doble cola y de ala de geometría variable. Fue el primer caza a reacción estadounidense con doble cola de este tipo. El Tomcat fue desarrollado para el programa Naval Fighter Experimental (VFX) de la Armada de los Estados Unidos tras el colapso del proyecto F-111B."
 USA_cv_fighter_equipment_4: "McDonnell Douglas F/A-18 Hornet"
 USA_cv_fighter_equipment_4_short: "F/A-18 Hornet"
 USA_cv_fighter_equipment_4_desc: "El McDonnell Douglas F/A-18 Hornet es un avión de combate polivalente, bimotor, supersónico, todo tiempo y apto para portaaviones, diseñado como caza y avión de ataque."
 USA_cv_fighter_equipment_5: "McDonnell Douglas F/A-18E/F Super Hornet"
 USA_cv_fighter_equipment_5_short: "F/A-18E/F Super Hornet"
 USA_cv_fighter_equipment_5_desc: "Los Boeing F/A-18E y F/A-18F Super Hornet son variantes de aviones de combate polivalentes, bimotores y aptos para portaaviones, basados en el McDonnell Douglas F/A-18 Hornet. Las variantes F/A-18E monoplaza y F/A-18F biplaza en tándem son derivados más grandes y avanzados de los F/A-18C y D Hornet."
 USA_cv_fighter_equipment_6: "Lockheed Martin F-35C Lightning II"
 USA_cv_fighter_equipment_6_short: "F-35C Lightning II"
 USA_cv_fighter_equipment_6_desc: "The F-35 has three main models: the conventional takeoff and landing F-35A (CTOL), the short take-off and vertical-landing F-35B (STOVL), and the catapult-assisted take-off but arrested recovery, carrier-based F-35C (CATOBAR)."
 USA_cv_fighter_equipment_7: "Rockwell International F-40C Mustang II"
 USA_cv_fighter_equipment_7_short: "F-40C Mustang II"
 USA_cv_fighter_equipment_7_desc: "A fictional aircraft to fill the gap between the F-35 and the F/A-XX series."
 USA_cv_fighter_equipment_8: "F/A-XX"
 USA_cv_fighter_equipment_8_short: "F/A-XX"
 USA_cv_fighter_equipment_8_desc: "F/A-XX is a development and acquisition program for a future sixth-generation air superiority fighter to replace the United States Navy's F/A-18E/F Super Hornet beginning in late-2020s. A requirement was first identified in June 2008. This USN program has also been referred to at different times as NGAD, or the Next Generation Air Dominance program."
 USA_nav_bomber_equipment_1: "Boeing P-8 Poseidon"
 USA_nav_bomber_equipment_1_short: "P-8 Poseidon"
 USA_nav_bomber_equipment_1_desc: "The Boeing P-8 Poseidon (formerly Multimission Maritime Aircraft) is a military aircraft developed for the United States Navy (USN). The aircraft has been developed by Boeing Defense, Space & Security, modified from the 737-800ERX. The P-8 is being operated in the anti-submarine warfare (ASW), anti-surface warfare (ASUW), and shipping interdiction roles."
 USA_nav_bomber_equipment_2: "Boeing P-8 AGS Poseidon"
 USA_nav_bomber_equipment_2_short: "P-8 AGS Poseidon"
 USA_nav_bomber_equipment_2_desc: ""
 USA_nav_bomber_equipment_3: "Boeing P-9A Poseidon"
 USA_nav_bomber_equipment_3_short: "P-9A Poseidon"
 USA_nav_bomber_equipment_3_desc: ""
 USA_cv_nav_bomber_equipment_1: "Douglas A-1 Skyraider"
 USA_cv_nav_bomber_equipment_1_short: "A-1 Skyraider"
 USA_cv_nav_bomber_equipment_1_desc: "The Douglas A-1 Skyraider (formerly AD Skyraider) is an American single-seat attack aircraft that saw service between the late 1940s and early 1980s. The Skyraider had a remarkably long and successful career; it became a piston-powered, propeller-driven anachronism in the jet age."
 USA_cv_nav_bomber_equipment_2: "Grumman A-6 Intruder (ASUW)"
 USA_cv_nav_bomber_equipment_2_short: "A-6 Intruder (ASUW)"
 USA_cv_nav_bomber_equipment_2_desc: "The Grumman A-6 Intruder is an American, twinjet all-weather attack aircraft built by Grumman Aerospace. In service with the United States Navy and Marine Corps between 1963 and 1997, the Intruder was designed as an all-weather medium attack aircraft to replace the piston-engined Douglas A-1 Skyraider. This is the naval attack version for targeting enemy navies."
 USA_cv_nav_bomber_equipment_3: "Lockheed S-3 Viking"
 USA_cv_nav_bomber_equipment_3_short: "S-3 Viking"
 USA_cv_nav_bomber_equipment_3_desc: "The Lockheed S-3 Viking is a 4-crew, twin-engine turbofan-powered jet aircraft used by the U.S. Navy (USN) primarily for anti-submarine warfare. The Viking also provided electronic warfare and surface surveillance capabilities to a carrier battle group. A carrier-based, subsonic, all-weather, long-range, multi-mission aircraft; it carried automated weapon systems and was capable of extended missions with in-flight refueling."
 USA_cv_nav_bomber_equipment_4: "Northrop Grumman E-2 Hawkeye"
 USA_cv_nav_bomber_equipment_4_short: "E-2 Hawkeye"
 USA_cv_nav_bomber_equipment_4_desc: "The Northrop Grumman E-2 Hawkeye is an American all-weather, carrier-capable tactical airborne early warning (AEW) aircraft."
 USA_cv_nav_bomber_equipment_5: "Boeing EA-18G Growler"
 USA_cv_nav_bomber_equipment_5_short: "EA-18G Growler"
 USA_cv_nav_bomber_equipment_5_desc: "The Boeing EA-18G Growler is an American carrier-based electronic warfare aircraft, a specialized version of the two-seat F/A-18F Super Hornet. The Growler's electronic warfare capability is primarily provided by Northrop Grumman."
 USA_cv_nav_bomber_equipment_6: "F/A-XXC/D (ASUW)"
 USA_cv_nav_bomber_equipment_6_short: "F/A-XXC/D (ASUW)"
 USA_cv_nav_bomber_equipment_6_desc: "F/A-XX is a development and acquisition program for a future sixth-generation air superiority fighter to replace the United States Navy's F/A-18E/F Super Hornet beginning in late-2020s. This is the naval attack version for targeting enemy navies."
 USA_tac_bomber_equipment_1: "General Atomics MQ-1 Predator"
 USA_tac_bomber_equipment_1_short: "MQ-1 Predator"
 USA_tac_bomber_equipment_1_desc: "The General Atomics MQ-1 Predator is an American remotely piloted aircraft built by General Atomics that was used primarily by the United States Air Force (USAF) and Central Intelligence Agency (CIA). Initially conceived in the early 1990s for aerial reconnaissance and forward observation roles, the Predator carries cameras and other sensors."
 USA_tac_bomber_equipment_2: "General Atomics MQ-9 Reaper"
 USA_tac_bomber_equipment_2_short: "MQ-9 Reaper"
 USA_tac_bomber_equipment_2_desc: "The General Atomics MQ-9 Reaper is an unmanned aerial vehicle (UAV) capable of remotely controlled or autonomous flight operations developed by General Atomics Aeronautical Systems primarily for the United States Air Force (USAF)."
 USA_tac_bomber_equipment_3: "General Atomics Avenger"
 USA_tac_bomber_equipment_3_short: "Avenger (Predator C)"
 USA_tac_bomber_equipment_3_desc: "The General Atomics Avenger (formerly Predator C) is a developmental unmanned combat air vehicle built by General Atomics Aeronautical Systems for the U.S. military. Unlike the previous MQ-1 Predator and MQ-9 Reaper drones, the Avenger is powered by a turbofan engine, and its design includes stealth features such as internal weapons storage, and an S-shaped exhaust for reduced infrared and radar signatures."
 USA_tac_bomber_equipment_4: "Northrop Grumman X-47B"
 USA_tac_bomber_equipment_4_short: "X-47B UCAS-D"
 USA_tac_bomber_equipment_4_desc: "The Northrop Grumman X-47B is a demonstration unmanned combat aerial vehicle designed for aircraft carrier-based operations. Developed by the American defense technology company Northrop Grumman, the X-47 project began as part of DARPA's J-UCAS program, and subsequently became part of the United States Navy's Unmanned Combat Air System Demonstration (UCAS-D) program."
 USA_tac_bomber_equipment_5: "Northrop Grumman MQ-4C Triton"
 USA_tac_bomber_equipment_5_short: "MQ-4C Triton"
 USA_tac_bomber_equipment_5_desc: "The Northrop Grumman MQ-4C Triton is an American high-altitude long endurance unmanned aerial vehicle (UAV) under development for the United States Navy as a surveillance aircraft. Together with its associated ground control station, it is an unmanned aircraft system (UAS)."
 USA_strat_bomber_equipment_1: "Boeing B-52 Stratofortress"
 USA_strat_bomber_equipment_1_short: "B-52 Stratofortress"
 USA_strat_bomber_equipment_1_desc: "The Boeing B-52 Stratofortress is an American long-range, subsonic, jet-powered strategic bomber. The B-52 was designed and built by Boeing, which has continued to provide support and upgrades. It has been operated by the United States Air Force (USAF) since the 1950s."
 USA_strat_bomber_equipment_2: "Rockwell B-1 Lancer"
 USA_strat_bomber_equipment_2_short: "B-1 Lancer"
 USA_strat_bomber_equipment_2_desc: "The Rockwell B-1 Lancer is a supersonic variable-sweep wing, heavy bomber used by the United States Air Force. It is commonly called the \"Bone\" (from \"B-One\"). It is one of three strategic bombers in the U.S. Air Force fleet as of 2018, the other two being the B-2 Spirit and the B-52 Stratofortress."
 USA_strat_bomber_equipment_3: "Northrop Grumman B-2 Spirit"
 USA_strat_bomber_equipment_3_short: "B-2 Spirit"
 USA_strat_bomber_equipment_3_desc: "The Northrop (later Northrop Grumman) B-2 Spirit, also known as the Stealth Bomber, is an American heavy strategic bomber, featuring low observable stealth technology designed for penetrating dense anti-aircraft defenses; it is a flying wing design with a crew of two."
 USA_strat_bomber_equipment_4: "Rockwell B-3 Shadow"
 USA_strat_bomber_equipment_4_short: "B-3 Shadow"
 USA_strat_bomber_equipment_4_desc: "The Next-Generation Bomber was a program to develop a new medium bomber for the United States Air Force. The NGB was initially projected to enter service around 2018 as a stealthy, subsonic, medium-range, medium payload bomber to supplement and possibly–to a limited degree–replace the U.S. Air Force's aging bomber fleet. The NGB program was superseded by the Long Range Strike Bomber (LRS-B) heavy bomber program."
 USA_strat_bomber_equipment_5: "Northrop Grumman B-21 Raider"
 USA_strat_bomber_equipment_5_short: "B-21 Raider"
 USA_strat_bomber_equipment_5_desc: "El Northrop Grumman B-21 Raider es un bombardero pesado estadounidense propuesto, actualmente en desarrollo por Northrop Grumman. Como parte del programa Long Range Strike Bomber (LRS-B), será un bombardero estratégico furtivo de muy largo alcance para la Fuerza Aérea de los Estados Unidos, capaz de lanzar armas convencionales y termonucleares."
 USA_scout_plane_equipment_1: "Boeing E-3 Sentry"
 USA_scout_plane_equipment_1_short: "E-3 Sentry"
 USA_scout_plane_equipment_1_desc: "El Boeing E-3 Sentry, comúnmente conocido como AWACS, es un avión estadounidense de alerta temprana y control aerotransportado (AEW&C) desarrollado por Boeing. Derivado del Boeing 707, proporciona vigilancia, mando, control y comunicaciones en cualquier condición meteorológica, y es utilizado por la Fuerza Aérea de los Estados Unidos, la OTAN, la Real Fuerza Aérea, la Fuerza Aérea Francesa y la Real Fuerza Aérea Saudí."
 USA_scout_plane_equipment_2: "Boeing E-7 Wedgetail"
 USA_scout_plane_equipment_2_short: "E-7 Wedgetail"
 USA_scout_plane_equipment_2_desc: "El Boeing 737 AEW&C es un avión bimotor de alerta temprana y control aerotransportado. Es más ligero que el Boeing E-3 Sentry basado en el 707, y tiene una antena de radar de barrido electrónico activo fija en lugar de una giratoria. Fue diseñado para la Real Fuerza Aérea Australiana (RAAF) bajo el \"Proyecto Wedgetail\" y designado E-7A Wedgetail."
 USA_transport_plane_equipment_1: "Lockheed C-130 Hercules"
 USA_transport_plane_equipment_1_short: "C-130 Hercules"
 USA_transport_plane_equipment_1_desc: "El Lockheed C-130 Hércules es un avión de transporte militar estadounidense con cuatro motores turbohélice, diseñado y construido originalmente por Lockheed (ahora Lockheed Martin). Capaz de usar pistas no preparadas para despegues y aterrizajes, el C-130 fue diseñado originalmente como un avión de transporte de tropas, evacuación médica y carga."
 USA_transport_plane_equipment_2: "Boeing C-17 Globemaster III"
 USA_transport_plane_equipment_2_short: "C-17 Globemaster III"
 USA_transport_plane_equipment_2_desc: "El Boeing C-17 Globemaster III es un avión de transporte militar pesado de largo alcance desarrollado por McDonnell Douglas entre los años 80 y 90 para la Fuerza Aérea de Estados Unidos (USAF). La aeronave lleva el nombre que llevaron con anterioridad otros dos aviones de transporte militar estadounidenses, el C-74 Globemaster y el C-124 Globemaster II, aunque no guarda relación alguna con ellos."

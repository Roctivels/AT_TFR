 fighter_equipment_1_short: "Polivalente 2ª Gen."
 fighter_equipment_1_desc: "Los primeros cazas a reacción se desarrollaron tras la Segunda Guerra Mundial. Con diseños de alas en flecha y tecnologías de radar avanzadas, estos cazas a reacción están indefensos ante cualquier caza moderno."

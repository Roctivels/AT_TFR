 PRC_utility_helicopter_equipment_2_desc: ""
 PRC_CAS_equipment_1: "Nanchang Q-5"
 PRC_CAS_equipment_1_short: "Nanchang Q-5"
 PRC_CAS_equipment_1_desc: "El Nanchang Q-5 es un avión de ataque terrestre a reacción de fabricación china, basado en el MiG-19 soviético. Su función principal es el apoyo aéreo cercano. La República Popular China fue un usuario entusiasta del MiG-19, que fabricó localmente con el nombre de Shenyang J-6 a partir de 1958. En agosto de 1958, el Ejército Popular de Liberación solicitó el desarrollo de un avión de ataque a reacción para el apoyo aéreo, y el resultado fue el Nanchang Q-5."
 PRC_CAS_equipment_2: "Xian JH-7"
 PRC_CAS_equipment_2_short: "Xian JH-7"
 PRC_CAS_equipment_2_desc: "El Xian JH-7 es un cazabombardero bimotor en tándem, de dos plazas, en servicio en la Fuerza Aérea Naval del Ejército Popular de Liberación y la Fuerza Aérea del EPL."
 PRC_CAS_equipment_3: "Guizhou JL-9B"
 PRC_CAS_equipment_3_short: "Guizhou JL-9B"
 PRC_CAS_equipment_3_desc: "El Guizhou JL-9B es una variante del avión de combate-entrenador JL-9, diseñado específicamente para un papel de apoyo/ataque terrestre moderno y rápido."
 PRC_fighter_equipment_1: "Shenyang J-8B II"
 PRC_fighter_equipment_1_short: "Shenyang J-8B II"
 PRC_fighter_equipment_1_desc: "La serie J-8II se diferencia bastante del J-8 original, con un nuevo fuselaje delantero, rampas de admisión con placas divisorias y una estructura frontal que recuerda más a la del F-4 Phantom II o el Sukhoi Su-15 para albergar un nuevo radar más potente. Los J-8II están propulsados por motores Wopen-13A (WP-13A)."
 PRC_fighter_equipment_2: "Chengdu J-10"
 PRC_fighter_equipment_2_short: "Chengdu J-10"
 PRC_fighter_equipment_2_desc: "El Chengdu J-10 es un avión de combate polivalente ligero capaz de operar en todo tipo de condiciones climáticas, configurado con un diseño de ala delta y canard, con controles de vuelo fly-by-wire."
 PRC_fighter_equipment_3: "Shenyang J-11"
 PRC_fighter_equipment_3_short: "Shenyang J-11"
 PRC_fighter_equipment_3_desc: "El Shenyang J-11 es un caza a reacción monoplaza y bimotor, cuyo fuselaje se basa en el Sukhoi Su-27 de diseño soviético. El J-11/A básico es un caza a reacción de cuarta generación que, al igual que sus hermanos Sukhoi, está concebido como competidor directo de los cazas occidentales de cuarta generación."
 PRC_fighter_equipment_4: "Chengdu J-20"
 PRC_fighter_equipment_4_short: "Chengdu J-20"
 PRC_fighter_equipment_4_desc: "El Chengdu J-20 es un caza furtivo birreactor de quinta generación desarrollado por la Corporación Aeroespacial Chengdu de China para la Fuerza Aérea del Ejército Popular de Liberación. El J-20 tiene un fuselaje largo y ancho, con una sección frontal cincelada y una cabina sin marco similar a la del F-22 Raptor. La aeronave también cuenta con una cabina de cristal, con dos grandes pantallas de cristal líquido (LCD) a color situadas una junto a la otra, tres pantallas auxiliares más pequeñas y una pantalla de visualización frontal (HUD) holográfica de gran angular."
 PRC_fighter_equipment_5: "Chengdu J-20E"
 PRC_fighter_equipment_5_short: "Chengdu J-20E"
 PRC_fighter_equipment_5_desc: "El Chengdu J-20 es un caza furtivo birreactor de quinta generación desarrollado por la Corporación Aeroespacial Chengdu de China para la Fuerza Aérea del Ejército Popular de Liberación. El J-20 tiene un fuselaje largo y ancho, con una sección frontal cincelada y una cabina sin marco similar a la del F-22 Raptor. La aeronave también cuenta con una cabina de cristal, con dos grandes pantallas de cristal líquido (LCD) a color situadas una junto a la otra, tres pantallas auxiliares más pequeñas y una pantalla de visualización frontal (HUD) holográfica de gran angular."
 PRC_fighter_equipment_6: "Shenyang J-31"
 PRC_fighter_equipment_6_short: "Shenyang J-31"
 PRC_fighter_equipment_6_desc: "El Shenyang J-31 es un caza a reacción bimotor de tamaño mediano de quinta generación desarrollado por Shenyang Aircraft Corporation."

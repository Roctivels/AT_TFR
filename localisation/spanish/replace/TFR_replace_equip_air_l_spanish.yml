 PRC_strat_bomber_equipment_1_short: "Tu-4"
 PRC_strat_bomber_equipment_1_desc: "Tu-4"
 PRC_strat_bomber_equipment_2: "Xian H-6a"
 PRC_strat_bomber_equipment_2_short: "Xian H-6a"
 PRC_strat_bomber_equipment_2_desc: "El Xian H-6a es una versión mejorada del Tupolev Tu-16, fabricado en la Unión Soviética y con licencia china, al que se le ha añadido nueva aviónica y motores a reacción más eficientes."
 PRC_strat_bomber_equipment_3: "Xian H-6k"
 PRC_strat_bomber_equipment_3_short: "Xian H-6k"
 PRC_strat_bomber_equipment_3_desc: "El Xian H-6K, con una estructura reforzada que utiliza materiales compuestos, entradas de motor agrandadas para los motores turbofán rusos Soloviev D-30 que le otorgan un radio de combate declarado de 3.500 kilómetros (2.200 millas), una cabina de cristal con pantalla multifunción LCD de gran tamaño y una sección de nariz reelaborada que elimina la estación de navegación acristalada a favor de un radar más potente, el H-6K es un avión significativamente más moderno que las versiones anteriores."
 PRC_strat_bomber_equipment_4: "Tu-160"
 PRC_strat_bomber_equipment_4_short: "Tu-160"
 PRC_strat_bomber_equipment_4_desc: "Tu-160"
 PRC_strat_bomber_equipment_5: "Xian H-20"
 PRC_strat_bomber_equipment_5_short: "Xian H-20"
 PRC_strat_bomber_equipment_5_desc: "El Xian H-20 es un bombardero furtivo subsónico diseñado por la Fuerza Aérea del Ejército Popular de Liberación. Considerado un \"proyecto estratégico\" por el Ejército Popular de Liberación, el avión presenta un diseño de ala similar al del Northrop Grumman B-2 Spirit."

 USA_CAS_equipment_1: "A-10A Thunderbolt II"
 USA_CAS_equipment_1_short: "Fairchild Republic A-10A Thunderbolt II"
 USA_CAS_equipment_1_desc: "El Fairchild-Republic A-10 Thunderbolt II es un avión de ataque a tierra monoplaza, birreactor y de ala recta, desarrollado en Estados Unidos por la compañía Fairchild-Republic a principios de los años 70. Fue diseñado a petición de la Fuerza Aérea de los Estados Unidos (USAF) para proporcionar apoyo aéreo cercano (CAS) a las tropas terrestres mediante el ataque a carros de combate, vehículos blindados y otros objetivos terrestres con una capacidad limitada de interdicción aérea."
 USA_CAS_equipment_2: "Fairchild Republic A-10 Thunderbolt II"
 USA_CAS_equipment_2_short: "A-10C Thunderbolt II"
 USA_CAS_equipment_2_desc: "El Fairchild-Republic A-10C Thunderbolt II es un avión de ataque a tierra monoplaza, birreactor y de ala recta, desarrollado en Estados Unidos por la compañía Fairchild-Republic a principios de los años 70. Fue diseñado a petición de la Fuerza Aérea de los Estados Unidos (USAF) para proporcionar apoyo aéreo cercano (CAS) a las tropas terrestres mediante el ataque a carros de combate, vehículos blindados y otros objetivos terrestres con una capacidad limitada de interdicción aérea."

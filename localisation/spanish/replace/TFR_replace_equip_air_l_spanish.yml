 USB_CAS_equipment_2: "Fairchild Republic A-10 Thunderbolt II"
 USB_CAS_equipment_2_short: "A-10 Thunderbolt II"
 USB_CAS_equipment_2_desc: "El Fairchild-Republic A-10 Thunderbolt II es un avión de ataque a tierra monoplaza, birreactor y de ala recta, desarrollado en Estados Unidos por la compañía Fairchild-Republic a principios de los años 70. Fue diseñado a petición de la Fuerza Aérea de los Estados Unidos (USAF) para proporcionar apoyo aéreo cercano (CAS) a las tropas terrestres mediante el ataque a carros de combate, vehículos blindados y otros objetivos terrestres con una capacidad limitada de interdicción aérea."
 USB_CAS_equipment_3: "McDonnell Douglas F-15E Strike Eagle"
 USB_CAS_equipment_3_short: "F-15E Strike Eagle"
 USB_CAS_equipment_3_desc: "El McDonnell Douglas F-15E Strike Eagle es un cazabombardero todo tiempo fabricado por la compañía estadounidense McDonnell Douglas (ahora Boeing IDS), como un derivado del caza de superioridad aérea F-15 Eagle. Fue diseñado en los años 80 para llevar a cabo misiones de interdicción de largo alcance a altas velocidades, sin depender de cazas de escolta o aviones de guerra electrónica."
 USC_CAS_equipment: "Avión de ataque a tierra"
 USC_CAS_equipment_short: "Avión de ataque a tierra"
 USC_CAS_equipment_desc: "Avión de ataque a tierra"
 USC_CAS_equipment_1: "North American F-100 Super Sabre"
 USC_CAS_equipment_1_short: "F-100 Super Sabre"
 USC_CAS_equipment_1_desc: "The North American F-100 Super Sabre is an American supersonic jet fighter aircraft that served with the United States Air Force (USAF) from 1954 to 1971 and with the Air National Guard (ANG) until 1979. The first of the Century Series of USAF jet fighters, it was the first USAF fighter capable of supersonic speed in level flight."
 USC_CAS_equipment_2: "Fairchild Republic A-10 Thunderbolt II"
 USC_CAS_equipment_2_short: "A-10 Thunderbolt II"
 USC_CAS_equipment_2_desc: "El Fairchild-Republic A-10 Thunderbolt II es un avión de ataque a tierra monoplaza, birreactor y de ala recta, desarrollado en Estados Unidos por la compañía Fairchild-Republic a principios de los años 70. Fue diseñado a petición de la Fuerza Aérea de los Estados Unidos (USAF) para proporcionar apoyo aéreo cercano (CAS) a las tropas terrestres mediante el ataque a carros de combate, vehículos blindados y otros objetivos terrestres con una capacidad limitada de interdicción aérea."
 USC_CAS_equipment_3: "McDonnell Douglas F-15E Strike Eagle"
 USC_CAS_equipment_3_short: "F-15E Strike Eagle"
 USC_CAS_equipment_3_desc: "El McDonnell Douglas F-15E Strike Eagle es un cazabombardero todo tiempo fabricado por la compañía estadounidense McDonnell Douglas (ahora Boeing IDS), como un derivado del caza de superioridad aérea F-15 Eagle. Fue diseñado en los años 80 para llevar a cabo misiones de interdicción de largo alcance a altas velocidades, sin depender de cazas de escolta o aviones de guerra electrónica."
 USA_cv_CAS_equipment_1: "Douglas A-4 Skyhawk"
 USA_cv_CAS_equipment_1_short: "A-4 Skyhawk"
 USA_cv_CAS_equipment_1_desc: "The Douglas A-4 Skyhawk is a single seat subsonic carrier-capable attack aircraft developed for the United States Navy and United States Marine Corps in the early 1950s. The delta winged, single turbojet engined Skyhawk was designed and produced by Douglas Aircraft Company, and later by McDonnell Douglas."
 USA_cv_CAS_equipment_2: "Grumman A-6 Intruder"
 USA_cv_CAS_equipment_2_short: "A-6 Intruder"
 USA_cv_CAS_equipment_2_desc: "The Grumman A-6 Intruder is an American, twinjet all-weather attack aircraft built by Grumman Aerospace. In service with the United States Navy and Marine Corps between 1963 and 1997, the Intruder was designed as an all-weather medium attack aircraft to replace the piston-engined Douglas A-1 Skyraider."
 USA_cv_CAS_equipment_3: "McDonnell Douglas AV-8B Harrier II"
 USA_cv_CAS_equipment_3_short: "AV-8B Harrier II"
 USA_cv_CAS_equipment_3_desc: "The McDonnell Douglas (now Boeing) AV-8B Harrier II is a single-engine ground-attack aircraft that constitutes the second generation of the Harrier Jump Jet family. Capable of vertical or short takeoff and landing (V/STOL), the aircraft was designed in the late 1970s as an Anglo-American development of the British Hawker Siddeley Harrier, the first operational V/STOL aircraft."
 USA_fighter_equipment_1: "F-15A Eagle"
 USA_fighter_equipment_1_short: "F-15A"
 USA_fighter_equipment_1_desc: "El McDonnell Douglas F-4 Phantom II es un interceptor y cazabombardero a reacción supersónico biplaza en tándem, bimotor, todo tiempo y de largo alcance, desarrollado originalmente para la Armada de los Estados Unidos por McDonnell Aircraft. Entró en servicio por primera vez en 1960 con la Armada de los EE.UU."
 USA_fighter_equipment_2: "McDonnell Douglas F-15 Eagle"
 USA_fighter_equipment_2_short: "F-15C Eagle"
 USA_fighter_equipment_2_desc: "The McDonnell Douglas F-15 Eagle is an American twin-engine, all-weather tactical fighter aircraft designed by McDonnell Douglas (now Boeing). Following reviews of proposals, the United States Air Force selected McDonnell Douglas's design in 1967 to meet the service's need for a dedicated air superiority fighter."
 USA_fighter_equipment_3: "General Dynamics F-16/IQ Fighting Falcon"
 USA_fighter_equipment_3_short: "F-16/IQ Fighting Falcon"
 USA_fighter_equipment_3_desc: "The General Dynamics F-16 Fighting Falcon is a single-engine supersonic multirole fighter aircraft originally developed by General Dynamics (now Lockheed Martin) for the United States Air Force (USAF). Designed as an air superiority day fighter, it evolved into a successful all-weather multirole aircraft."
 USA_fighter_equipment_4: "Lockheed Martin F-22 Raptor"
 USA_fighter_equipment_4_short: "F-22 Raptor"
 USA_fighter_equipment_4_desc: "The Lockheed Martin F-22 Raptor is a fifth-generation, single-seat, twin-engine, all-weather stealth tactical fighter aircraft developed for the United States Air Force (USAF). The result of the USAF's Advanced Tactical Fighter (ATF) program, the aircraft was designed primarily as an air superiority fighter, but also has ground attack, electronic warfare, and signal intelligence capabilities."
 USA_fighter_equipment_5: "Lockheed Martin F-35A Lightning II"
 USA_fighter_equipment_5_short: "F-35A Lightning II"
 USA_fighter_equipment_5_desc: "The Lockheed Martin F-35A Lightning II is a family of single-seat, single-engine, all-weather, stealth, fifth-generation, multirole combat aircraft, designed for ground-attack and air-superiority missions. It is built by Lockheed Martin and many subcontractors, including Northrop Grumman, Pratt & Whitney, and BAE Systems."
 USA_fighter_equipment_6: "Lockheed Martin F-35C Lightning II"
 USA_fighter_equipment_6_short: "F-35C Lightning II"
 USA_fighter_equipment_6_desc: "The Lockheed Martin F-35C Lightning II is a family of single-seat, single-engine, all-weather, stealth, fifth-generation, multirole combat aircraft, designed for ground-attack and air-superiority missions. It is built by Lockheed Martin and many subcontractors, including Northrop Grumman, Pratt & Whitney, and BAE Systems."
 USB_fighter_equipment_1: "McDonnell Douglas F-4 Phantom II"
 USB_fighter_equipment_1_short: "F-4 Phantom"
 USB_fighter_equipment_1_desc: "El McDonnell Douglas F-4 Phantom II es un interceptor y cazabombardero a reacción supersónico biplaza en tándem, bimotor, todo tiempo y de largo alcance, desarrollado originalmente para la Armada de los Estados Unidos por McDonnell Aircraft. Entró en servicio por primera vez en 1960 con la Armada de los EE.UU."
 USB_fighter_equipment_2: "McDonnell Douglas F-15 Eagle"
 USB_fighter_equipment_2_short: "F-15 Eagle"
 USB_fighter_equipment_2_desc: "The McDonnell Douglas F-15 Eagle is an American twin-engine, all-weather tactical fighter aircraft designed by McDonnell Douglas (now Boeing). Following reviews of proposals, the United States Air Force selected McDonnell Douglas's design in 1967 to meet the service's need for a dedicated air superiority fighter."
 USB_fighter_equipment_3: "General Dynamics F-16/IQ Fighting Falcon"
 USB_fighter_equipment_3_short: "F-16/IQ Fighting Falcon"
 USB_fighter_equipment_3_desc: "The General Dynamics F-16 Fighting Falcon is a single-engine supersonic multirole fighter aircraft originally developed by General Dynamics (now Lockheed Martin) for the United States Air Force (USAF). Designed as an air superiority day fighter, it evolved into a successful all-weather multirole aircraft."
 USB_fighter_equipment_4: "Lockheed Martin F-22 Raptor"
 USB_fighter_equipment_4_short: "F-22 Raptor"
 USB_fighter_equipment_4_desc: "The Lockheed Martin F-22 Raptor is a fifth-generation, single-seat, twin-engine, all-weather stealth tactical fighter aircraft developed for the United States Air Force (USAF). The result of the USAF's Advanced Tactical Fighter (ATF) program, the aircraft was designed primarily as an air superiority fighter, but also has ground attack, electronic warfare, and signal intelligence capabilities."
 USB_fighter_equipment_5: "Lockheed Martin F-35A Lightning II"
 USB_fighter_equipment_5_short: "F-35A Lightning II"
 USB_fighter_equipment_5_desc: "The Lockheed Martin F-35A Lightning II is a family of single-seat, single-engine, all-weather, stealth, fifth-generation, multirole combat aircraft, designed for ground-attack and air-superiority missions. It is built by Lockheed Martin and many subcontractors, including Northrop Grumman, Pratt & Whitney, and BAE Systems."
 USB_fighter_equipment_6: "Lockheed Martin F-35C Lightning II"
 USB_fighter_equipment_6_short: "F-35C Lightning II"
 USB_fighter_equipment_6_desc: "The Lockheed Martin F-35C Lightning II is a family of single-seat, single-engine, all-weather, stealth, fifth-generation, multirole combat aircraft, designed for ground-attack and air-superiority missions. It is built by Lockheed Martin and many subcontractors, including Northrop Grumman, Pratt & Whitney, and BAE Systems."
 USC_fighter_equipment_1: "McDonnell Douglas F-4 Phantom II"
 USC_fighter_equipment_1_short: "F-4 Phantom"
 USC_fighter_equipment_1_desc: "El McDonnell Douglas F-4 Phantom II es un interceptor y cazabombardero a reacción supersónico biplaza en tándem, bimotor, todo tiempo y de largo alcance, desarrollado originalmente para la Armada de los Estados Unidos por McDonnell Aircraft. Entró en servicio por primera vez en 1960 con la Armada de los EE.UU."

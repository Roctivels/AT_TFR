 CAS_equipment_desc: "Un avión de ataque a tierra o avión de ataque es un avión militar, o caza de combate que tiene como función principal llevar a cabo ataques aéreos con mayor precisión que los bombarderos y está preparado para enfrentar fuertes defensas aéreas de bajo nivel mientras presiona el ataque."

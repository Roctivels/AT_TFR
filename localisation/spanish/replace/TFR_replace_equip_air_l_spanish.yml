 guided_missile_equipment: "Munición merodeadora"
 guided_missile_equipment_1: "Munición merodeadora básica"
 guided_missile_equipment_1_short: "Munición merodeadora básica"
 guided_missile_equipment_1_desc: "Conocidos como drones suicidas o kamikazes, los drones de munición merodeadores son un tipo de dron militar utilizado para lanzar ojivas directamente a su objetivo. Cada vez más comunes en la guerra moderna, incluso estos modelos básicos han demostrado ser letales en el campo de batalla."
 guided_missile_equipment_2: "Munición merodeadora mejorada"
 guided_missile_equipment_2_short: "Munición merodeadora mejorada"
 guided_missile_equipment_2_desc: "La experiencia y la investigación han producido múltiples mejoras en los diseños de drones y ojivas, convirtiendo al dron suicida en un arma aún más letal."
 guided_missile_equipment_3: "Munición merodeadora avanzada"
 guided_missile_equipment_3_short: "Munición merodeadora avanzada"
 guided_missile_equipment_3_desc: "Con peso liviano, bajo costo, alta carga útil y potencial de daño masivo, nuestros drones avanzados se están convirtiendo lenta pero seguramente en los reyes del campo de batalla moderno."
 heavy_fighter_equipment: "CLASIFICADO"
 AST_CAS_equipment_1: "Gloster Meteor F.8"
 AST_CAS_equipment_1_short: "Meteor F.8"
 AST_CAS_equipment_1_desc: "El Gloster Meteor es un avión totalmente metálico, bimotor a reacción y con tren de aterrizaje retráctil. La RAAF recibió inicialmente variantes del F.4, pero la mayoría de los operados fueron F.8. Los Meteor pilotados por el personal de la RAAF combatieron en el \"Callejón de los MiG\" en Corea, pero resultaron inferiores a los MiG-15 soviéticos. El Meteor sirvió en la RAAF desde 1946 hasta su retiro oficial en 1963."
 AST_CAS_equipment_2: "McDonnell Douglas F-4 Phantom II"
 AST_CAS_equipment_2_short: "F-4E"
 AST_CAS_equipment_2_desc: "El F-4C fue una de las aeronaves evaluadas por la Royal Australian Air Force (RAAF) en 1963 como parte del proyecto para reemplazar al English Electric Canberra. Se seleccionó el F-111, pero las entregas se retrasaron debido a fallas técnicas. Los Gobiernos de Australia y Estados Unidos negociaron un acuerdo en 1970 para el arrendamiento de 24 F-4E. Los F-4E entraron en servicio en 1970 y fueron devueltos en 1973 tras la entrega del F-111C."
 AST_CAS_equipment_3: "Boeing EA-18G Growler"
 AST_CAS_equipment_3_short: "EA-18G"
 AST_CAS_equipment_3_desc: "El Boeing EA-18G Growler es un avión de guerra electrónica, una versión especializada del biplaza F/A-18F Super Hornet. Australia recibió el primero de los 12 Growlers el 29 de julio de 2015, y se espera la entrega de los demás para 2017. Excepcionalmente, los Growlers australianos estarán equipados con el módulo de puntería ASQ-228 ATFLIR y también contarán con armas aire-aire adicionales, como el misil AIM-9X."
 AST_fighter_equipment_1: "CAC CA-27 Sabre"
 AST_fighter_equipment_1_short: "CA-27"
 AST_fighter_equipment_1_desc: "El Avon Sabre de la Commonwealth Aircraft Corporation (CAC) se basó en el diseño del North American F86 Sabre, modificado para cumplir con las condiciones y requisitos locales. El CA-27 incluía el motor Rolls-Royce Avon R.A.7 y dos cañones ADEN de 30 mm. Realizó su primer vuelo el 3 de agosto de 1953 y fue retirado del servicio en 1971."
 AST_fighter_equipment_2: "McDonnell Douglas F-4 Phantom II"
 AST_fighter_equipment_2_short: "F-4"
 AST_fighter_equipment_2_desc: "El McDonnell Douglas A-4G Skyhawk es una variante del avión de ataque Douglas A-4 Skyhawk desarrollado para la Marina Real Australiana. El modelo se basó en la variante A-4F del Skyhawk y estaba equipado con una aviónica ligeramente diferente, además de ser capaz de operar misiles aire-aire AIM-9 Sidewinder. La RAN recibió diez A-4G en 1967 y otros diez en 1971, y operó hasta 1984."
 AST_fighter_equipment_3: "McDonnell Douglas F/A-18A Hornet"
 AST_fighter_equipment_3_short: "F/A-18A"
 AST_fighter_equipment_3_desc: "Los F/A-18A y F/A-18B Hornets de la Real Fuerza Aérea Australiana son aviones de combate multifunción, capaces de realizar misiones aire-aire y aire-tierra. Tanto el monoplaza F/A-18A como el biplaza F/A-18B pueden realizar intercepción aérea, combate aéreo, apoyo aéreo cercano a tropas terrestres e interdicción de líneas de suministro enemigas, incluyendo el transporte marítimo."
 AST_fighter_equipment_4: "Boeing F/A-18F Super Hornet"
 AST_fighter_equipment_4_short: "F/A-18F"
 AST_fighter_equipment_4_desc: "La flota de F/A-18F Super Hornet de la Real Fuerza Aérea Australiana proporciona a Australia una capacidad de combate aéreo mejorada tanto para misiones aire-aire como aire-tierra hasta la introducción completa en servicio del F-35 Lightning II. El F/A-18F Super Hornet de dos asientos puede llevar a cabo intercepción aérea, combate aéreo, apoyo aéreo cercano a tropas terrestres e interdicción de líneas de suministro enemigas, incluyendo el transporte marítimo."
 AST_nav_bomber_equipment_1: "Lockheed SP-2H Neptune"
 AST_nav_bomber_equipment_1_short: "SP-2H"
 AST_nav_bomber_equipment_1_desc: "En febrero de 1951 se encargaron dos P2V-4 y diez P2V-5 Neptunes para la RAAF con el fin de reemplazar a los anticuados Avro Lincoln. En 1960 se encargaron otros doce P2V-7, que en 1962 pasaron a llamarse SP-2H Neptune. Los SP-2H, que entraron en acción en Vietnam escoltando a los B-52 de la USAF, operaron hasta su retirada en 1977."
 AST_nav_bomber_equipment_2: "Grumman S-2G Tracker"
 AST_nav_bomber_equipment_2_short: "S-2G"
 AST_nav_bomber_equipment_2_desc: "Operado por la Marina Real Australiana desde 1967 hasta 1984, el Tracker demostró ser un excelente avión antisubmarino. Tenía un largo alcance y un equipo extenso para detectar y atacar submarinos. Inicialmente operando la variante S-2E, un ataque incendiario destruyó la mayoría de ellos mientras estaban en el hangar, y los reemplazos de la USN fueron S-2G, una mejora que prolongó la vida del Tracker en servicio con la RAN."
 AST_nav_bomber_equipment_3: "Lockheed P-3C Orion"
 AST_nav_bomber_equipment_3_short: "P-3C"
 AST_nav_bomber_equipment_3_desc: "The Lockheed P-3 Orion is a four-engine turboprop anti-submarine and maritime surveillance aircraft. The Orion aircraft first entered RAAF military service in 1968 as the P-3B  model, with the P-3C variant first introduced in 1978."
 AST_nav_bomber_equipment_4: "Lockheed AP-3C Orion"
 AST_nav_bomber_equipment_4_short: "AP-3C"
 AST_nav_bomber_equipment_4_desc: "The AP-3C is a RAAF upgrade of the P-3C/W which includes L-3 Communications with new mission systems, including an Elta SAR/ISAR radar and a GD-Canada acoustic processor system. AP-3C Orions were upgraded from P-3Cs between 1997 and 2005. AP-3Cs have seen service as part of Australian Defence Force operations in Australia, South East Asia and the Middle East."
 AST_nav_bomber_equipment_5: "Boeing P-8A Poseidon"
 AST_nav_bomber_equipment_5_short: "P-8A"
 AST_nav_bomber_equipment_5_desc: "En 2014, Australia, en acuerdo con el USN, empezaron las negociaciones con Boeing para adaptar el P-8A a las necesidades australianas, incluyendo cambiar el AGM-84 Harpoon con misiles anti-buques. La producción de estos aviones por parte de la RAF comenzó en 2015, empezando a ser entregados en 2016. El P-8A está designado a trabajar junto a los MQ-4C en vigilancia marítima."
 AST_nav_bomber_equipment_6: "Boeing AP-8E Neptune"
 AST_nav_bomber_equipment_6_short: "AP-8E"
 AST_nav_bomber_equipment_6_desc: "Una serie de mejoras inrecmentales cuminó enuna modernización integral de la flota de P-8A Poseidon de la RAAF al estandar AP-8E Neptune. Este paquete de actualización incorporó un nuevo conjunto de control para los más recientes drones de patrulla marítima no tripulados, mayores capacidades para el empleo de misiles antibuque adicionales, así como un sistema de detección de submarinos mejorado. Se espera que toda la flota de P-8A sea actualizada al estándar AP-8E para el ano 2025. "
 AST_strat_bomber_equipment_1: "Government Aircraft Factories Canberra"
 AST_strat_bomber_equipment_1_short: "Camberra"
 AST_strat_bomber_equipment_1_desc: "During the late 1940s, the RAAF decided to acquire the Canberra as a replacement for, or complement to, the Avro Lincoln. The Australian government decided that the Canberras would be constructed domestically by the Government Aircraft Factories rather than built in the UK. Serving for 29 years, from 1963 until 1982, the Canberra saw action in the Malayan Emergency and Vietnam."
 AST_strat_bomber_equipment_2: "General Dynamics F-111C"
 AST_strat_bomber_equipment_2_short: "F-111C"
 AST_strat_bomber_equipment_2_desc: "F-111C (nicknamed \"Pig\") is a variant of the F-111 Aardvark medium-range interdictor and tactical strike aircraft, developed by General Dynamics to meet Australian requirements. The design was based on the F-111A model but included longer wings and strengthened undercarriage. The Australian government ordered 24 F-111Cs to equip the RAAF in 1963, but the aircraft were not delivered until 1973 because of long-running technical problems."
 AST_strat_bomber_equipment_3: "General Dynamics F-111G"
 AST_strat_bomber_equipment_3_short: "F-111G"
 AST_strat_bomber_equipment_3_desc: "The FB-111 was a USAF variant of the F-111 with strengthened wings, stronger landing gear, larger fuel capacity and increased bomb load with the intent of making it a strategic bomber. With the introduction of the B-1B Lancer, the USAF had no need for the FB-111, and it was reconfigured back into a tactical role and renamed the F-111G. In 1993 the RAAF purchased 15 of these aircraft to supplement their F-111Cs."
 AST_strat_bomber_equipment_4: "Northrop Grumman B-2 Spirit"
 AST_strat_bomber_equipment_4_short: "B-2 Spirit"
 AST_strat_bomber_equipment_4_desc: "The Northrop Grumman B-2 Spirit is an American heavy penetration strategic bomber, featuring low observable stealth technology designed for penetrating dense anti-aircraft defenses; it is a flying wing design with a crew of two. With the introduction of the B-21 in the US arsenal, Australia was able to procure older B-2s to fill the long-held gap of strategic bombers. While RAAF doctrine has had little use for strategic-level attacks, the allure of an aircraft with still-viable stealth technology was too valuable to pass up."
 AST_strat_bomber_equipment_5: "Northrop Grumman B-21"
 AST_strat_bomber_equipment_5_short: "B-21"
 AST_strat_bomber_equipment_5_desc: "The B-21 is a long-range, air-refuelable, highly survivable aircraft with significant nuclear and conventional stand-off and direct-attack weapons payload. The LRS-B provides operational flexibility across a wide range of military operations. Acquired in the 2030s after intense negoatiations, this upgrade over the previous B-2 design is a very big leap in strategic-level destruction."
 AST_tac_bomber_equipment_1: "Boeing Insitu ScanEagle"
 AST_tac_bomber_equipment_1_short: "ScanEagle"
 AST_tac_bomber_equipment_1_desc: "The Boeing Insitu ScanEagle is a small, long-endurance unmanned aerial vehicle (UAV) built by Insitu, a subsidiary of Boeing. The ScanEagle was designed by Insitu based on the Insitu SeaScan, a commercial UAV that was intended for fish-spotting."
 AST_tac_bomber_equipment_2: "Heron Remotely Piloted Unmanned Aircraft System"
 AST_tac_bomber_equipment_2_short: "Heron"
 AST_tac_bomber_equipment_2_desc: "The Heron can conduct single missions in excess of 24 hours, with a maximum speed of more than 100 knots (180 km/h) at altitudes of up to 10,000 metres. Unlike small unmanned aerial vehicles, the 1.1 tonne Heron is operated from an airfield runway in conjunction with other manned aircraft."
 AST_tac_bomber_equipment_3: "AAI RQ-7 Shadow"
 AST_tac_bomber_equipment_3_short: "RQ-7 Shadow"
 AST_tac_bomber_equipment_3_desc: "The RQ-7 Shadow is perfect for reconnaissance, surveillance, target acquisition and battle damage assessment. Launched from a trailer-mounted pneumatic catapult, it is recovered with the aid of arresting gear similar to jets on an aircraft carrier. Its gimbal-mounted, digitally stabilized, liquid nitrogen-cooled electro-optical/infrared (EO/IR) camera relays video in real time via a C-band line-of-sight data link to the ground control station (GCS)."
 AST_tac_bomber_equipment_4: "MQ-4C Triton"
 AST_tac_bomber_equipment_4_short: "MQ-4C Triton"
 AST_tac_bomber_equipment_4_desc: "The Triton Unmanned Aircraft System (UAS), is a high altitude, long endurance (HALE) aircraft that will be used for maritime patrol and other surveillance roles. Supporting missions up to 24 hours, the Triton is equipped with a sensor suite that provides a 360-degree view of its surroundings, for over 2,000 nautical miles. The seven Tritons will be based at RAAF Base Edinburgh and will operate alongside the P-8A Poseidon to replace the AP-3C Orion capability."
 AST_tac_bomber_equipment_5: "Northrop Grumman RQ-4 Global Hawk"
 AST_tac_bomber_equipment_5_short: "RQ-4 Global Hawk"
 AST_tac_bomber_equipment_5_desc: "Related to the MQ-4C, the RQ-4 provides a broad overview and systematic surveillance using high-resolution synthetic aperture radar (SAR) and long-range electro-optical/infrared (EO/IR) sensors with long loiter times over target areas. It can survey as much as 40,000 square miles (100,000 km2) of terrain a day. The superior surveillance capabilities of the aircraft allow more precise weapons targeting and better protection of friendly forces."
 AST_transport_plane_equipment_2: "Boeing C-17 Globemaster III"
 AST_transport_plane_equipment_2_short: "C-17 Globemaster III"
 AST_transport_plane_equipment_2_desc: "El Boeing C-17 Globemaster III es un avión de transporte militar pesado de largo alcance desarrollado por McDonnell Douglas entre los años 80 y 90 para la Fuerza Aérea de Estados Unidos (USAF). La aeronave lleva el nombre que llevaron con anterioridad otros dos aviones de transporte militar estadounidenses, el C-74 Globemaster y el C-124 Globemaster II, aunque no guarda relación alguna con ellos."
 BEL_transport_plane_equipment_2: "Airbus A400M Atlas"
 BEL_transport_plane_equipment_2_short: "A400M Atlas"
 BEL_transport_plane_equipment_2_desc: "El Airbus A400M Atlas es un avión de transporte militar europeo de largo alcance y cisterna propulsado por cuatro motores turbohélice, diseñado por Airbus Military (hoy Airbus Defence and Space) para reemplazar aviones anticuados, como el Transall C-160 y el Lockheed C-130 Hercules."

 scout_plane_equipment: "Alerta temprana y control aerotransportado"
 scout_plane_equipment_short: "AEW&C"
 scout_plane_equipment_desc: "Un sistema de alerta temprana y control aerotransportado, o AEW&C (acrónimo en inglés de Airborne Early Warning and Control), es un sistema de radar aerotransportado diseñado para detectar aeronaves. Usados a gran altura, los radares permiten a los operadores distinguir entre aeronaves amigas u hostiles a cientos de kilómetros de distancia. Los aviones AEW&C pueden ser usados para operaciones aéreas tanto defensivas como ofensivas. También puede ser utilizado para llevar a cabo tareas de vigilancia, funciones de mando y control y dirección de batallas (o funciones C2BM, siglas en inglés de command and control, battle management)."
 scout_plane_equipment_1: "Aeronave de alerta I"

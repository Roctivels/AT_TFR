 TUR_tac_bomber_equipment_1_desc: "Bayraktar TB2"
 TUR_transport_plane_equipment_2: "Airbus A400M Atlas"
 TUR_transport_plane_equipment_2_short: "A400M Atlas"
 TUR_transport_plane_equipment_2_desc: "El Airbus A400M Atlas es un avión de transporte militar europeo de largo alcance y cisterna propulsado por cuatro motores turbohélice, diseñado por Airbus Military (hoy Airbus Defence and Space) para reemplazar aviones anticuados, como el Transall C-160 y el Lockheed C-130 Hercules."
 UAE_transport_plane_equipment_2: "Boeing C-17 Globemaster III"
 UAE_transport_plane_equipment_2_short: "C-17 Globemaster III"
 UAE_transport_plane_equipment_2_desc: "El Boeing C-17 Globemaster III es un avión de transporte militar pesado de largo alcance desarrollado por McDonnell Douglas entre los años 80 y 90 para la Fuerza Aérea de Estados Unidos (USAF). La aeronave lleva el nombre que llevaron con anterioridad otros dos aviones de transporte militar estadounidenses, el C-74 Globemaster y el C-124 Globemaster II, aunque no guarda relación alguna con ellos."

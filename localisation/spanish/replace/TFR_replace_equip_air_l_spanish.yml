 scout_plane_equipment_2_desc: "Aeronave de alerta temprana y control aerotransportado avanzada"
 transport_plane_equipment: "Avión de transporte"
 transport_plane_equipment_short: "Avión de transporte"
 transport_plane_equipment_desc: "Los aviones de transporte militar o de carga se utilizan para transportar tropas, armas y otros equipos militares en apoyo de operaciones militares. Pueden utilizarse tanto para misiones estratégicas como tácticas, y a menudo se destinan a misiones de socorro en emergencias civiles."

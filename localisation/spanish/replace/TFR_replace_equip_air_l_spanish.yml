 tac_bomber_equipment: "Vehículo Aéreo No Tripulado de Combate"
 tac_bomber_equipment_short: "VANTC"
 tac_bomber_equipment_desc: "Un Vehículo Aéreo No Tripulado de Combate (VANTC) (en inglés: Unmanned combat air vehicle) (UCAV), también conocido a nivel popular como dron o dron de combate, es un vehículo aéreo no tripulado (VANT) diseñado para su empleo militar, generalmente van armados."

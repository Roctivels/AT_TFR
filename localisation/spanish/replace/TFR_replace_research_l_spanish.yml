 early_ship_hull_carrier_short: "Conversión de cubierta"
 early_ship_hull_carrier_desc: "La conversión de cascos viejos permite experimentar con la aviación naval y obtener experiencia en la construcción y el funcionamiento de portaaviones a un coste muy bajo. Estos buques tendrán menos capacidad que un verdadero portaaviones, pero será mucho más rápido crearlos."

 suicide_drone_tech1: "Plataformas de lanzamiento de drones"
 suicide_drone_tech1_desc: "Para operar, mantener y dirigir eficazmente las operaciones con drones, se deben construir bases estáticas diseñadas específicamente para el lanzamiento de drones aéreos pesados."

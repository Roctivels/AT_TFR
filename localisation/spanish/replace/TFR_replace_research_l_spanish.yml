 nsb_armour_folder: "Blindaje"
 nsb_armour_folder_desc: "Los tanques y sus variantes."
 artillery_folder: "Artillería"
 artillery_folder_desc: "Armas de artillería, antitanque y antiaéreas para las divisiones."
 naval_folder: "Naval"
 naval_folder_desc: "Buques y submarinos."
 mtgnavalfolder: "Naval"
 mtgnavalfolder_desc: "Buques y submarinos. Investiga nuevos módulos para personalizar tus buques."
 air_techs_folder: "Aire"
 air_techs_folder_desc: "Aeronaves y sus variantes."
 click_to_open_doctrine: "§GHaz clic§! para abrir las doctrinas"
 industry_folder: "Industria"
 industry: "Industria"
 industry_folder_desc: "Industria y producción"
 electronics_folder: "Ingeniería"
 electronics_folder_desc: "Ingeniería, radares, codificación e investigación tecnológica avanzada."
 secret_weapons_folder: "Armas secretas"
 secret_weapons_folder_desc: "Armas milagrosas fruto de una ciencia desmedida."
 mobile_warfare: "Guerra móvil"
 mobile_warfare_desc: "La guerra móvil se centra en la velocidad y en las maniobras para aislar y desorganizar al enemigo.\n\n"
 delay: "C3I"
 delay_desc: "Los eficientes oficiales del Estado Mayor se encargan de garantizar el flujo de mando, control, comunicaciones e inteligencia entre un comandante y las unidades que controla."
 elastic_defence: "Defensa elástica"
 elastic_defence_desc: "En vez de concentrar todas las fuerzas en el frente, la defensa elástica crea una capa más \"profunda\" de defensas que otorga más tiempo al defensor para reaccionar y contraatacar mientras los atacantes están dispersos y atascados."
 mobile_infantry: "Táctica misión-tipo"
 mobile_infantry_desc: "La Auftragstaktik (Táctica misión-tipo) es una forma de táctica militar donde el énfasis se centra en el resultado de una misión, más que en los medios específicos para lograrla. En las tácticas de tipo misión, el comandante militar asigna a los líderes subordinados una meta claramente definida (el objetivo), las fuerzas necesarias para lograrla y un plazo para alcanzarla."
 mass_motorization: "Despliegue rápido"
 mass_motorization_desc: "Una fuerza de despliegue rápido es una formación militar capaz de desplegar sus fuerzas con rapidez. Estas fuerzas suelen estar compuestas por unidades militares de élite y suelen recibir un entrenamiento más intensivo que el resto de las fuerzas armadas de su país. Suelen recibir prioridad en cuanto a equipo y entrenamiento para prepararlas para su misión."
 mechanised_offensive: "Batallón de apoyo de brigada"
 mechanised_offensive_desc: ""
 forward_air_control: "Control aéreo avanzado"
 armored_spearhead: "Ofensiva mecanizada"
 armored_spearhead_desc: "Para sacar el máximo partido a los tanques, estos no pueden limitarse a apoyar a la infantería. Deben conformar unidades veloces e independientes que puedan encabezar ataques.\n\n"
 schwerpunk: "Schwerpunkt"
 schwerpunk_desc: "En toda operación hay que identificar el Schwerpunkt, o punto de fuga, y concentrar ahí todos los esfuerzos para ganarlo."
 blitzkrieg: "Blitzkrieg"
 blitzkrieg_desc: "Blitzkrieg hace referencia a la táctica de tropas blindadas veloces con apoyo tanto de infantería móvil como aérea para atravesar, desorganizar y rodear las líneas enemigas."
 kampfgruppe: "Battlegroup"
 kampfgruppe_desc: "Un battlegroup es una formación ad hoc organizada para llevar a cabo una tarea concreta."
 firebrigades: "Brigada de incendios"
 firebrigades_desc: "Las \"brigadas de incendios\" eran tropas improvisadas como reacción a las incursiones enemigas u otros problemas críticos.\n\n"
 backhand_blow: "Golpe del revés"
 backhand_blow_desc: "En lugar de luchar por cada metro de terreno, las incursiones enemigas se evitan hasta que se extienden, y entonces se aíslan y se destruyen mediante contraataques."
 modern_blitzkrieg: "Blitzkrieg moderna"
 modern_blitzkrieg_desc: "La Blitzkrieg moderna es la cúspide de la guerra móvil. Incorpora los últimos avances tecnológicos y las lecciones aprendidas en doctrinas anteriores."
 volkssturm: "'Meat Sturm'"
 volkssturm_desc: "En lugar de arriesgar vehículos pesados de gran valor, envía a tu infantería con apoyo remoto para sondear y hostigar las líneas enemigas. El enemigo lo llama \"meatsturm\", o \"tormenta de carne\" por despecho, pero no es algo que desearías para cenar.\n\n"
 nd_conscription: "Tácticas de unidades pequeñas"
 nd_conscription_desc: "Dispérsense por todas partes y hagan que fortifiquen cada línea de árboles."
 werwolf_guerillas: "Infiltración profunda"
 werwolf_guerillas_desc: "Si encontramos un punto débil en la línea del frente, podemos sembrar el caos y el pánico en la retaguardia enemiga enviando nuestras pequeñas unidades mecanizadas y motorizadas muy por delante, ignorando cualquier posición defensiva enemiga."
 superior_firepower: "Potencia de fuego superior"
 superior_firepower_desc: "Esta doctrina se centra en lanzar proyectiles al enemigo en vez de hombres. Nuestros hombres son valiosos, las balas son baratas.\n\n"
 sup_delay: "Demora"
 sup_delay_desc: "Aunque vayas a perder una batalla, puede resultar provechoso ralentizar el avance de los atacantes con emboscadas y tácticas dilatorias."
 mobile_defence: "Defensa móvil"
 mobile_defence_desc: "Las tropas móviles pueden usarse para reforzar la defensa allí donde pueda atacar el enemigo."
 intergrated_support: "Apoyo integrado"
 intergrated_support_desc: "La integración de las tropas de apoyo con las de combate produce divisiones más fuertes en los ataques.\n\n"
 regimental_combat_teams: "Equipos de combate de regimiento"
 regimental_combat_teams_desc: "Un equipo de combate de regimiento es un regimiento de infantería integrado profundamente con unidades de apoyo tales como artillería, tanques y elementos de reconocimiento para formar una pequeña unidad autosuficiente que permite una flexibilidad mayor al atacar."
 dispersed_support: "Apoyo disperso"
 dispersed_support_desc: "Al dispersar nuestras unidades de apoyo, estas pueden cubrir un área mayor mientras permanecen fuera de la línea de fuego, lo que produce divisiones con una defensa mayor.\n\n"
 overwhelming_firepower: "Potencia de fuego aplastante"
 overwhelming_firepower_desc: "Recurriendo a todas las unidades de apoyo disponibles para que proporcionen una potencia de fuego aplastante se puede ablandar a un objetivo, o mejor aún, aguar la fiesta al atacante."
 sup_mechanized_offensive: "Ofensiva mecanizada"
 sup_mechanized_offensive_desc: "Las tropas motorizadas rinden bien, pero para dirigir ofensivas necesitamos infantería que pueda ir a la batalla en transportes blindados que los protejan y que lleven armas pesadas."
 concentrated_fire_plans: "Planes de fuego concentrado"
 concentrated_fire_plans_desc: "Al concentrar el fuego de distintas baterías en un bombardeo sincronizado, puedes infligir un daño mucho mayor al enemigo.\n\n"
 combined_arms: "Armas combinadas"
 combined_arms_desc: "Las unidades de blindados, infantería y apoyo que colaboran en equipos bien organizados son mucho más efectivas que si se emplean por separado."
 tactical_control: "Control táctico"
 tactical_control_desc: "Los oficiales familiarizados con el uso de armas combinadas en posiciones avanzadas pueden controlar directamente todas las operaciones de la rama."
 air_land_battle: "Batalla aeroterrestre"
 air_land_battle_desc: "Con las tropas terrestres activas ya en formaciones con armas combinadas, la batalla aeroterrestre también se centra en la estrecha coordinación entre fuerzas terrestres y aéreas, fusionando sus respectivos campos de batalla."
 centralized_fire_control: "Control de fuego centralizado"
 centralized_fire_control_desc: "El sistema de control de fuego centralizado permite evaluar todas las solicitudes de apoyo de artillería en una ubicación y, de ser necesario, concentrar toda la potencia de fuego de una división en un objetivo en vez de que cada unidad solo pueda solicitar el fuego de la artillería que tenga asignada.\n\n"
 forward_observers: "Observadores de avanzada"
 forward_observers_desc: "Los observadores de avanzada ocupan posiciones desde las que pueden evaluar la precisión y los efectos del fuego de artillería para luego transmitir los resultados para su corrección."
 advanced_firebases: "Bases de fuego avanzadas"
 advanced_firebases_desc: "Los campos de artillería pueden situarse cerca del frente en bases fortificadas para proporcionar todo el apoyo posible a las tropas avanzadas."
 shock_and_awe: "Shock y pavor"
 shock_and_awe_desc: "Al concentrar toda la potencia de fuego en un adversario, se provocará un abrumador shock y pavor que frenará su voluntad de avanzar de forma inmediata o en un momento oportuno."
 grand_battle_plan: "Gran plan de batalla"
 grand_battle_plan_desc: "La clave del éxito reside en una amplia planificación y preparación antes de entrar en combate.\n\n"
 trench_warfare: "Guerra de trincheras"
 trench_warfare_desc: "La pala suele ser la mejor arma de la infantería. Las unidades saben lo útil que es una trinchera en cualquier posición que ocupen."
 prepared_defense: "Defensa preparada"
 prepared_defense_desc: "Unos sistemas de fortificación más amplios mejoran significativamente la defensa de una unidad."
 grand_assault: "Gran ofensiva"
 grand_assault_desc: "En cuanto reunamos tropas suficientes y planeemos bien los objetivos, destruiremos inevitablemente al enemigo con una poderosa ofensiva."
 grand_mechanized_offensive: "Ofensiva mecanizada"
 grand_mechanized_offensive_desc: "Las tropas motorizadas rinden bien, pero para dirigir ofensivas necesitamos infantería que pueda ir a la batalla en transportes blindados que los protejan y que lleven armas pesadas.\n\n"
 assault_concentration: "Concentración de asalto"
 assault_concentration_desc: "Antes de un ataque, los efectivos se preparan a conciencia y ocupan posiciones avanzadas para garantizar la máxima fuerza posible a la hora de abrir brechas."
 branch_interoperation: "Operación entre ramas"
 branch_interoperation_desc: "Una mayor coordinación entre las diferentes ramas de las fuerzas armadas les permite ser más efectivas en operaciones con armas combinadas."
 assault_breakthrough: "Incursión de irrupción"
 assault_breakthrough_desc: "En lugar de lanzar un gran asalto por todo el frente, puede resultar más efectivo concentrar el ataque en algunos puntos de la línea enemiga, o en uno solo, para lograr la irrupción."
 central_planning: "Planificación central"
 central_planning_desc: "Los oficiales de todas las ramas ahora contribuyen a la planificación de una operación para garantizar la máxima eficacia."
 c3i_theory: "C3I"
 c3i_theory_desc: "Los eficientes oficiales del Estado Mayor se encargan de garantizar el flujo de mando, control, comunicaciones e inteligencia entre un comandante y las unidades que controla."
 infantry_offensive: "Ofensiva de infantería"
 infantry_offensive_desc: "El espíritu ofensivo de la infantería es la clave para ganar batallas. Nuestra infantería debe encabezar la marcha.\n\n"
 armored_operations: "Operaciones blindadas"
 armored_operations_desc: "Los tanques y demás vehículos blindados son muy útiles para enviar infantería al campo de batalla y brindar apoyo directo en combate."
 infiltration_assault: "Asalto de infiltración"
 infiltration_assault_desc: "En los movimientos de apertura de un ataque, la infantería debe atacar los puntos débiles de la línea enemiga para evitar y aislar las secciones mejor protegidas, de las cuales se encargarán después el resto de fuerzas atacantes."
 night_assault_tactics: "Tácticas de asalto nocturno"
 night_assault_tactics_desc: "Los soldados acostumbrados a desplazarse y luchar por la noche pueden tomar posiciones para un ataque, o atacar directamente a las desprevenidas tropas enemigas."
 attritional_containment: "Contención agotadora"
 attritional_containment_desc: "Si no podemos lanzar un ataque para eliminar una posición enemiga, debemos someterla a ataques menores constantes para producir bajas e impedir que el enemigo inicie sus propios ataques."
 infiltration_in_depth: "Infiltración en profundidad"
 infiltration_in_depth_desc: "Nuestras tropas ya están entrenadas para sortear y aislar los puntos fortificados a una profundidad mucho mayor. Lo ideal es que nuestras fuerzas de asalto no se detengan hasta alcanzar la retaguardia del enemigo y aislar completamente sus tropas."
 mass_assault: "Asalto en masa"
 mass_assault_desc: "Las armas \"perfectas\" están sobrevaloradas. ¡La victoria llegará con un montón de armas \"lo bastante buenas\"!\n\n"
 pocket_defence: "Mando y Control"
 pocket_defence_desc: ""
 defence_in_depth: "Defensa en profundidad"
 defence_in_depth_desc: "Al ofrecer una resistencia relativamente ligera y ceder terreno temporalmente, podemos ganar tiempo a cambio de espacio y agotar a las fuerzas atacantes antes del contraataque."
 large_front_operations: "Tácticas de fortín móvil"
 large_front_operations_desc: "Combatir en un frente extenso implica coordinar los esfuerzos de múltiples unidades a largas distancias: a nivel operativo, no táctico.\n\n"
 deep_operations: "Infantería móvil"
 deep_operations_desc: ""
 operational_concentration: "Especialización en asalto urbano"
 operational_concentration_desc: ""
 vast_offensives: "Bombardeo implacable"
 vast_offensives_desc: ""
 breakthrough_priority: "Avance lento"
 breakthrough_priority_desc: "No tenemos prisa, dejemos que nos lancen sus contraataques mientras los machacamos sin parar. Al final, alcanzaremos nuestro objetivo y se quedarán sin hombres."
 mechanized_wave: "Oleada mecanizada"
 mechanized_wave_desc: "Las fuerzas mecanizadas son ideales para avanzar rápidamente y aprovechar las incursiones como es debido, ya sea para apoyar a las fuerzas blindadas o asegurar los flancos de la brecha."
 continuous_offensive: "Ofensiva continua"
 continuous_offensive_desc: "Aunque una incursión bien aprovechada suele ser muy efectiva, tarde o temprano el atacante se acaba cansando y el defensor tiene la opción de reorganizarse y formar nuevas líneas defensivas. No obstante, con reservas suficientes y una organización adecuada, la ofensiva podría seguir avanzando mucho más, lo que tendría repercusiones devastadoras para el enemigo."
 human_wave_offensive: "Prioridad de incursión"
 human_wave_offensive_desc: "Al expandir la concentración operativa, todas las necesidades del frente están supeditadas a la concentración de fuerzas para hacer incursiones. Las derrotas locales son intrascendentes si se asesta un golpe decisivo."
 human_infantry_offensive: "Salva de artillería concentrada"
 human_infantry_offensive_desc: "Necesitamos usar nuestra munición con intelecto y a tiempo para prevenir un asalto enemigo o iniciar el nuestro."
 large_front_offensive: "Ofensiva en frente amplio"
 large_front_offensive_desc: "Al realizar ataques de oleada humana o amenazar con ellos en diversos puntos del frente, podemos impedir que el enemigo concentre su potencia de fuego en un solo ataque."
 peoples_army: "Asalto blindado"
 peoples_army_desc: "\n\n"
 guerilla_warfare: "Batalla profunda moderna"
 guerilla_warfare_desc: "Somos herederos de Zhúkov, la victoria será nuestra. ¡Adelante!"
 asymetrical_warfare: "Guerra asimétrica"
 asymetrical_warfare_desc: "Emboscar, atacar, maskirovka.\n\n"
 raiding_parties: "Grupos de asalto"
 raiding_parties_desc: "No lo verán venir, no nos verán retirarnos."
 decapitation_strike: "Decapitación de la cúpula"
 decapitation_strike_desc: ""
 rat_tunnels: "Túneles de ratas"
 rat_tunnels_desc: ""
 media_propaganda: "Guerra psicológica"
 media_propaganda_desc: ""
 human_wave: "Oleada humana"
 human_wave_desc: "Tener tantas bajas como el enemigo no basta.\n\n"
 indiscriminate_conscription: "Conscripción ciega"
 indiscriminate_conscription_desc: ""
 hit_and_run: "Tácticas de ataque y fuga"
 hit_and_run_desc: ""
 command_and_control: "Grupos organizados dispersos"
 command_and_control_desc: ""
 technical_conversion: "Cada vehículo al combate"
 technical_conversion_desc: "Sí, hasta el Cybertruck.\n\n"
 scavage_enemy_vehicles: "Trofeos de guerra"
 scavage_enemy_vehicles_desc: "Trofeos de guerra\n\n"
 pocket_defence_asym: "Defensa de bolsas"
 pocket_defence_asym_desc: ""
 scorched_earth_asym: "Tierra quemada"
 scorched_earth_asym_desc: ""
 peoples_war: "Guerra popular"
 peoples_war_desc: ""
 infantry_weapons2: "Equipo de infantería mejorado I"
 infantry_weapons2_desc: "Armas personales y colectivas para la infantería, así como el resto del equipo necesario para un soldado. Modelos mejorados de armas y demás equipo personalizado."
 improved_infantry_weapons_2: "Equipo de infantería mejorado II"
 improved_infantry_weapons_2_desc: "Armas personales y colectivas para la infantería, así como el resto del equipo necesario para un soldado. Modelos mejorados de armas y demás equipo personalizado."
 advanced_infantry_weapons2: "Equipo de infantería mejorado III"
 advanced_infantry_weapons2_desc: "Armas personales y colectivas para la infantería, así como el resto del equipo necesario para un soldado. Actualizado para incluir rifles de asalto personales y cohetes antitanque. Disponibilidad aumentada de armas que antes se distribuían en menor medida."
 infantry_at: "Infantería antitanque I"
 infantry_at_desc: "Al armar a nuestras unidades de infantería con rifles antitanque, estas podrán acabar con vehículos blindados ligeros sin perder movilidad."
 infantry_at2: "Infantería antitanque II"
 infantry_at2_desc: "Las armas antitanque explosivas deben ser más pequeñas y ligeras para que la infantería sea más eficaz al atacar unidades blindadas más pesadas."
 paratroopers: "Infantería de asalto aéreo I"
 paratroopers_desc: "Al incorporar tropas aerotransportadas, podemos entrar a la fuerza en zonas y situar tropas en lugares previamente inaccesibles, lo que abre nuevas posibilidades tácticas."
 paratroopers2: "Infantería de asalto aéreo II"
 paratroopers2_desc: "La transición de pequeñas operaciones con solo unos pocos paracaidistas a divisiones aerotransportadas más grandes facilita los aterrizajes en masa, y estos pasan de ser una novedad a formar parte del curso natural de la guerra."
 paratroopers3: "Infantería de asalto aéreo III"
 paratroopers3_desc: "La adaptación de las operaciones en paracaídas según el clima, la estandarización de equipo, como las botas de salto, y un entrenamiento especializado más exhaustivo reducirán la confusión y los riesgos que conllevan estas peligrosas misiones."
 marines: "Infantería de marina I"
 marines_desc: "Las tropas especializadas en guerra anfibia se están volviendo cada vez más indispensables. Los métodos y el equipo improvisados se han convertido en cosas del pasado, ya que nuestra infantería naval cuenta con embarcaciones y adiestramiento especializados."
 marines2: "Infantería de marina II"
 marines2_desc: "La guerra anfibia precisa una innovación constante. Las mejoras en el apoyo logístico y los puertos móviles permiten a nuestros marines realizar desembarcos que de otra forma serían imposibles."
 marines3: "Infantería de marina III"
 marines3_desc: "Los marines pueden ser algo más que una mera infantería anfibia. En el futuro, nuestro cuerpo de marines figurará entre las fuerzas especiales más disciplinadas y organizadas."
 tech_mountaineers: "Infantería de reconocimiento I"
 tech_mountaineers_desc: "El combate en montaña expone a las tropas a muchos peligros, pero a veces es algo inevitable. Podemos reducir al mínimo estos riesgos proporcionando a nuestros soldados adiestramiento especializado para este entorno."
 tech_mountaineers2: "Infantería de reconocimiento II"
 tech_mountaineers2_desc: "Podemos entrenar a nuestras fuerzas no solo para sobrevivir, sino también para usar las montañas a su favor. Con equipo ligero y transportes en mula, podrán operar en ese terreno mejor que otras infanterías."
 tech_mountaineers3: "Infantería de reconocimiento III"
 tech_mountaineers3_desc: "Nuestras fuerzas precisan una formación y disciplina extraordinarias para las alturas y bajas temperaturas de las misiones de montaña más arduas."
 tech_special_forces: "Fuerzas especiales"
 tech_special_forces_desc: "Los combates poco convencionales precisan entrenamiento especializado. Debemos asegurarnos de que nuestras tropas estén preparadas para adaptarse a situaciones adversas."
 advanced_special_forces: "Entrenamiento avanzado de fuerzas especiales"
 advanced_special_forces_desc: "Con un entrenamiento exhaustivo, nos aseguraremos de que nuestras fuerzas especiales puedan rendir por encima de los soldados normales."
 improved_special_forces:1 "Programa expandido de fuerzas especiales"
 improved_special_forces_desc:1 "Las fuerzas especiales pueden llevar a cabo misiones imposibles para los soldados ordinarios. Debemos expandir los programas de entrenamiento para aprovechar mejor a nuestros calificados soldados."
 extreme_environment_training: "Entrenamiento en condiciones extremas"
 extreme_environment_training_desc: "Deberíamos poder luchar en los entornos más hostiles. Con el equipo y el entrenamiento adecuados, nuestras tropas podrán luchar en las condiciones más extremas."
 survival_training: "Entrenamiento de supervivencia"
 survival_training_desc: "Nuestras fuerzas especiales tendrán que luchar a menudo detrás de las líneas enemigas con pocos suministros. Debemos entrenarlos para superar climatologías adversas con suministros limitados."
 elite_forces: "Fuerzas de élite"
 elite_forces_desc: "Solo los mejores pueden formar parte de las fuerzas especiales. Los soldados que superen el entrenamiento serán más fuertes y rápidos, y lucharán mejor que nadie."
 jungle_warfare: "Guerra en la selva"
 jungle_warfare_desc: "Entrenamiento especial para aumentar la efectividad de nuestros soldados en la selva."
 HUN_light_infantry_tech: "Doctrina de divisiones de infantería ligera"
 HUN_light_infantry_tech_desc: "La reducción de la cantidad de brazos de apoyo en nuestras divisiones de infantería los hace más flexibles y les da una ventaja en combate en terreno restringido como ciudades y bosques."
 mountain_warfare: "Guerra en montaña"
 mountain_warfare_desc: "Entrenamiento especial para aumentar la efectividad de nuestros soldados en las montañas."
 tech_recon: "Compañía de reconocimiento I"
 tech_recon_desc: "Enviando grupos pequeños para que se adelanten a la fuerza principal y exploren, podremos recabar información sobre la posición del enemigo y su número."
 tech_recon2: "Compañía de reconocimiento II"
 tech_recon2_desc: "Las misiones de reconocimiento suelen ser peligrosas y producen muchas bajas. Preparando a nuestras patrullas para moverse y retirarse rápidamente, y equipándolas para eliminar los obstáculos colocados por el enemigo, aumentaremos sus opciones de volver con vida."
 tech_recon3: "Compañía de reconocimiento III"
 tech_recon3_desc: "Los avances tecnológicos en cuanto a radio cambian la forma de realizar las misiones de reconocimiento y agilizan la transmisión de la información recabada."
 tech_recon4: "Compañía de reconocimiento IV"
 tech_recon4_desc: "Las operaciones de reconocimiento profundo, que combinan espionaje, guerrilla y adiestramiento de comandos, mejorarán nuestras opciones tácticas y nos permitirán adaptar nuestras decisiones con rapidez."
 tech_engineers: "Compañía de ingeniería I"
 tech_engineers_desc: "Al construir fortificaciones y atravesar obstáculos, los ingenieros de combate resultan imprescindibles sobre el terreno. Al darles versatilidad, podemos desplegarlos en diversas situaciones en las que son necesarios."
 tech_engineers2: "Compañía de ingeniería II"
 tech_engineers2_desc: "Al contar con equipo moderno y explosivos, nuestros ingenieros pueden ir más allá de sus funciones tradicionales y sorprender al enemigo con su ingenio por tierra y mar."
 tech_engineers3: "Compañía de ingeniería III"
 tech_engineers3_desc: "Los proyectos de ingeniería militar alcanzan una escala mayor. Con ayudas de infraestructura avanzadas se pueden abordar operaciones que requieren más suministros de los que se dispone normalmente."
 tech_engineers4: "Compañía de ingeniería IV"
 tech_engineers4_desc: "Al mantener la movilidad local en la construcción de lo que antes se consideraban fortificaciones y sistemas de suministros permanentes, los ingenieros de combate del futuro se asegurarán de estar preparados, sin importar el lugar en el que ataquen a nuestras tropas."
 hospital_tech: "Hospitales de campaña"
 logistics_tech: "Compañía de logística"
 recon_tech: "Compañía de reconocimiento"
 tech_field_hospital: "Hospital de campaña I"
 tech_field_hospital_desc: "Una baja no tiene por qué ser un soldado muerto. Disponiendo de atención médica inmediata para los heridos, habremos dado el primer paso para hacer realidad esto."
 tech_field_hospital2: "Hospital de campaña II"
 tech_field_hospital2_desc: "Al establecer el uso de hospitales móviles, llevando los cuidados médicos allá donde sean necesarios, podremos evitar muchas muertes y lesiones permanentes innecesarias."
 tech_field_hospital3: "Hospital de campaña III"
 tech_field_hospital3_desc: "La cirugía es uno de los procedimientos de emergencia más demandados sobre el terreno. Las herramientas y procedimientos para dicha práctica deben estar disponibles cerca del frente, por lo que debemos integrar a cirujanos experimentados en las unidades médicas militares."
 tech_field_hospital4: "Hospital de campaña IV"
 tech_field_hospital4_desc: "Aunque se han realizado muchos avances en la medicina de campaña, gran parte de ellos son improvisados y no tenemos una doctrina establecida. Con más experiencia, podremos dejar más clara la función de estas unidades y convertir las innovaciones improvisadas en permanentes."
 tech_logistics_company: "Compañía de logística I"
 tech_logistics_company_desc: "Al contar con oficiales especializados en logística entre nuestras filas, aprovecharemos las redes de apoyo para minimizar pérdidas."
 tech_logistics_company2: "Compañía de logística II"
 tech_logistics_company2_desc: "Al adaptar nuestros análisis de riesgo a las nuevas circunstancias de guerra, mejoraremos la seguridad de nuestro apoyo logístico."
 tech_logistics_company3: "Compañía de logística III"
 tech_logistics_company3_desc: "La evaluación estadística constante de los suministros necesarios para las tropas contribuye a amortizar nuestros recursos."
 tech_logistics_company4: "Compañía de logística IV"
 tech_logistics_company4_desc: "El desarrollo de clasificaciones estandarizadas de suministros reducirá la confusión y agilizará la planificación."
 tech_military_police: "Policía militar I"
 tech_military_police_desc: "Las tropas regulares pueden gestionar una ocupación durante un tiempo, pero antes que nada son soldados. Al integrar la policía militar en nuestras fuerzas, contaremos con personal que responda a la resistencia e investigue los sabotajes."
 tech_military_police2: "Policía militar II"
 tech_military_police2_desc: "Al desempeñar labores policiales en los territorios ocupados, como el control del tráfico y el mantenimiento del orden público, nuestra policía militar puede reducir el caos y la confusión que aprovechan los partisanos."
 tech_military_police3: "Policía militar III"
 tech_military_police3_desc: "Al cooperar con redes de espionaje locales e informadores instalados antes de la ocupación, nuestra policía militar puede prepararse proactivamente allá donde pueda surgir la resistencia."
 tech_military_police4: "Policía militar IV"
 tech_military_police4_desc: "Una actuación policial segura en un territorio ocupado consiste tanto en volver a la normalidad como en erradicar toda oposición sin contemplaciones. Nuestra policía militar debe comenzar este proceso cuanto antes para garantizar la seguridad de soldados y civiles por igual."
 tech_signal_company: "Compañía de transmisiones I"
 tech_signal_company_desc: "La instalación y el mantenimiento de comunicaciones sobre el terreno siempre han requerido habilidades especiales. La irrupción de las nuevas comunicaciones y la tecnología de detección en la Gran Guerra abren nuevas posibilidades para esta práctica."
 tech_signal_company2: "Compañía de transmisiones II"
 tech_signal_company2_desc: "Las compañías de transmisiones centradas en la comunicación entre las distintas ramas del ejército garantizan que las tropas terrestres puedan coordinar sus acciones con las operaciones de mar y aire, y planificar sus movimientos en menos tiempo."
 tech_signal_company3: "Compañía de transmisiones III"
 tech_signal_company3_desc: "La mayor movilidad de la tecnología de comunicaciones facilita la posibilidad de llevarla a la espalda. Conviene aprovechar la mayor movilidad de los cuerpos de transmisión."
 tech_signal_company4: "Compañía de transmisiones IV"
 tech_signal_company4_desc: "Entre nuestros especialistas de transmisiones figura gente con una experiencia incomparable a la hora de usar este equipo sobre el terreno. Podemos aprovechar sus conocimientos poniéndolos a investigar nuevas tecnologías de comunicación."
 tech_maintenance_company: "Compañía de mantenimiento I"
 tech_maintenance_company_desc: "El mantenimiento, la reparación y la revisión son importantes para que el equipo militar siga siendo fiable y seguro. Al contar con compañías dedicadas a esto, nos aseguraremos de que reciba la atención necesaria."
 tech_maintenance_company2: "Compañía de mantenimiento II"
 tech_maintenance_company2_desc: "El mantenimiento operativo rutinario reduce el riesgo de que el equipo se averíe y permite avisar a las tropas de que lo sustituyan antes de que eso pase."
 tech_maintenance_company3: "Compañía de mantenimiento III"
 tech_maintenance_company3_desc: "Al asegurarnos de que nuestras tropas siempre dispongan de los materiales básicos para realizar reparaciones, evitaremos que el equipo sufra daños al emplearlo constantemente."
 tech_maintenance_company4: "Compañía de mantenimiento IV"
 tech_maintenance_company4_desc: "Las experiencias al diseñar la redundancia activa en la Gran Guerra pueden renovarse para funcionar con equipos más modernos y facilitar el mantenimiento."
 motorised_infantry: "Infantería motorizada"
 motorised_infantry_desc: "Al extender el uso de los vehículos motorizados en los transportes de infantería, aumentaremos enormemente la movilidad de las lentas unidades de infantería, lo que permite respuestas más veloces y nuevas estrategias."
 basic_machine_tools: "Herramientas mecánicas básicas"
 basic_machine_tools_desc: "Para la producción militar podemos usar una nueva gama de fresadoras que van desde máquinas pequeñas y versátiles disponibles en cualquier tienda a los avanzados modelos a gran escala que desafían los límites de la tecnología."
 improved_machine_tools: "Máquinas herramienta mejoradas"
 improved_machine_tools_desc: "Los tornos de torreta resultan indispensables para la producción en masa. Al optimizar su construcción y su uso, gozaremos de una ventaja industrial importante."
 advanced_machine_tools: "Máquinas herramienta avanzadas"
 advanced_machine_tools_desc: "La automatización de máquinas herramienta con servomecanismos es un tema que ya se ha tratado anteriormente. La puesta en práctica de estas ideas permite el uso de otros avances en automatización, como los ordenadores."
 assembly_line_production: "Cadena de producción de montaje"
 assembly_line_production_desc: "La cadena de montaje eléctrica, empleada por muchas industrias, puede cambiar el curso de la guerra al propiciar una avalancha de producción sin precedentes."
 flexible_line: "Cadena flexible"
 flexible_line_desc: "Por muy bien engrasada que esté una cadena de montaje, sigue dependiendo del factor humano, lo que permite su adaptación cuando es necesario. Debemos hacer uso de ella en nuestra producción industrial."
 streamlined_line: "Cadena simplificada"
 streamlined_line_desc: "La estandarización y una estructura rígida resultan esenciales para la eficiencia y seguridad de una cadena de montaje. Debemos centrarnos en estos aspectos en nuestra producción industrial."
 decimetric_radar: "Antenas de alta ganancia"
 decimetric_radar_desc: "En electromagnetismo, la ganancia de potencia de una antena, o simplemente ganancia, es un parámetro clave de rendimiento que combina la directividad y la eficiencia eléctrica de la antena. En una antena transmisora, la ganancia describe la eficacia con la que la antena convierte la potencia de entrada en ondas de radio dirigidas en una dirección específica. En una antena receptora, la ganancia describe la eficacia con la que la antena convierte las ondas de radio que llegan desde una dirección específica en energía eléctrica."
 improved_decimetric_radar: "Avances de antenas parabólicas"
 improved_decimetric_radar_desc: "Se pueden utilizar antenas de radar parabólicas más pequeñas y complejas en aeronaves y buques de guerra para aumentar el conocimiento de la situación."
 centimetric_radar: "Radar en fase moderno"
 centimetric_radar_desc: "Un arreglo en fase suele referirse a un arreglo de antenas escaneado electrónicamente, controlado por computadora, que genera un haz de ondas de radio que puede dirigirse electrónicamente para apuntar en diferentes direcciones sin mover las antenas. En un arreglo de antenas, la corriente de radiofrecuencia del transmisor se alimenta a las antenas individuales con la relación de fase correcta, de modo que las ondas de radio de cada una se suman para aumentar la radiación en la dirección deseada, mientras que se cancelan para suprimir la radiación en direcciones no deseadas."
 improved_centimetric_radar: "Radar en fase mejorado"
 improved_centimetric_radar_desc: "Los sistemas de antenas en fase son útiles para buques de guerra en diversas situaciones. Gracias a la rapidez con la que se puede dirigir el haz, estos radares permiten a un buque de guerra utilizar un solo sistema de radar para la detección y el seguimiento de superficie, detección y seguimiento aéreo y capacidad de enlace ascendente de misiles."
 advanced_centimetric_radar: "Avances en radares en fase"
 advanced_centimetric_radar_desc: "Las aplicaciones actualizadas de los sistemas de antenas en fase mejorarán el rendimiento naval y aéreo. Las nuevas antenas podrían facilitar el guiado de misiles, el conocimiento de la situación de las aeronaves y la detección de la superficie naval."
 improved_equipment_conversion: "Conversión mejorada de equipo"
 improved_equipment_conversion_desc: "Los avances en ingeniería nos permiten solucionar los problemas que encontramos en los modelos anteriores y renovarlos para adecuarlos a nuestras necesidades actuales."
 advanced_equipment_conversion: "Conversión avanzada de equipo"
 advanced_equipment_conversion_desc: "Formar equipos especializados y cadenas de montaje para modernizar nuestros modelos desfasados hará que nuestra maquinaria bélica siga siendo letal en cualquier momento."
 concentrated_industry: "Industria centralizada"
 concentrated_industry_desc: "Un sector industrial compuesto por grandes corporaciones que compiten por proyectos gubernamentales y privados. Este sistema es muy eficiente, pero también fácilmente explotable y atacable.\n\n"
 concentrated_industry2: "Manufactura privatizada"
 concentrated_industry2_desc: "Una mayor concentración de la manufactura ayudará a reducir los costos."
 concentrated_industry3: "Contratos del sector privado"
 concentrated_industry3_desc: "Los gastos de infraestructura se pueden reducir adaptando las redes a nuestro sector más específico."
 concentrated_industry4: "Redes de producción concentradas"
 concentrated_industry4_desc: "Mantener puntos clave de nuestra industria cerca los unos de los otros aumenta el impacto de estos sitios concentrados."
 concentrated_industry5: "Zonas industriales estandarizadas"
 concentrated_industry5_desc: "Los grandes parques industriales ahora combinan muchas partes de nuestra industria, minimizando los costos de transporte y mano de obra."
 dispersed_industry: "Industria descentralizada"
 dispersed_industry_desc: "Un sector industrial compuesto por pequeñas empresas especializadas en sus respectivas áreas industriales. Si bien es menos eficiente que la centralización, este sistema es menos vulnerable a la explotación y los ataques hostiles.\n\n"
 dispersed_industry2: "Descentralización controlada"
 dispersed_industry2_desc: "Fomentar y aplicar una descentralización industrial hará que los activos empresariales más grandes sean menos vulnerables en el futuro."
 dispersed_industry3: "Contratos con terceros"
 dispersed_industry3_desc: "Contratar a terceros para que trabajen en sectores que normalmente no conocen bien dificultará la selección de sectores específicos."
 dispersed_industry4: "Redes de producción segregadas"
 dispersed_industry4_desc: "Separar las diferentes etapas de una red de producción evitará que todos los puntos se interrumpan simultáneamente."
 dispersed_industry5: "Órdenes de silencio contractuales"
 dispersed_industry5_desc: "Al mantener en secreto la naturaleza exacta de nuestros contratos con las empresas, identificar a las empresas adecuadas se vuelve aún más difícil."
 synth_oil_experiments: "Experimentos con petróleo sintético"
 synth_oil_experiments_desc: "Para reducir la dependencia del petróleo natural, se pueden investigar métodos que utilicen procesos como el proceso Fischer-Tropsch para fabricar sustitutos del combustible a partir de otras sustancias y materiales."
 early_refining: "Refinamiento anticipado"
 early_refining_desc: "El crudo puede refinarse para convertirlo en sustancias y materiales esenciales para cualquier guerra moderna. Si queremos una industria moderna, tendremos que estar a la vanguardia de estos procesos."
 oil_processing: "Adopción del biodiésel"
 oil_processing_desc: "Producido comúnmente mediante la transesterificación de fuentes biológicas, como aceites vegetales y grasas animales, el biodiésel es un combustible renovable y un gran avance en la producción de combustible a partir de fuentes no petroleras."
 improved_oil_processing: "Experimentos con e-diésel"
 improved_oil_processing_desc: "Usando dióxido de carbono, agua y electricidad, se puede producir un producto conocido como \"crudo azul\" (similar al petróleo crudo), que posteriormente puede refinarse para obtener e-diésel, un combustible neutro en carbono."
 advanced_oil_processing: "Experimentos con electrocombustibles"
 advanced_oil_processing_desc: "Una mayor inversión en la producción de e-diésel y otros electrocombustibles permite una mayor producción de combustible en nuestras refinerías sintéticas."
 modern_oil_processing: "Producción de electrocombustible"
 modern_oil_processing_desc:1 "También conocido como e-fuel, el electrocombustible se produce a partir de dióxido de carbono o monóxido de carbono capturado, junto con hidrógeno obtenido de la descomposición del agua. Si bien no es neutro en carbono, la posibilidad de producir a gran escala un sustituto sintético del combustible convencional abre muchas oportunidades."
 rubber_processing: "Procesamiento de caucho"
 rubber_processing_desc:1 "El procesamiento industrial de caucho sintético es necesario para reducir nuestra dependencia del caucho natural."
 improved_rubber_processing: "Procesamiento de caucho mejorado"
 improved_rubber_processing_desc:1 "La producción a gran escala del caucho sintético es posible gracias a las nuevas técnicas que aceleran las reacciones de deshidrogenación."
 advanced_rubber_processing: "Procesamiento de caucho avanzado"
 advanced_rubber_processing_desc:1 "Una receta de caucho sintético de uso general con técnicas mejoradas, como la modificación polimerizadora de dodecil mercaptanos, nos permitirá aumentar la producción de caucho sintético."
 modern_rubber_processing: "Procesamiento de caucho moderno"
 modern_rubber_processing_desc:1 "Una polimerización más eficiente reducirá los costes y mejorará el rendimiento."
 construction1: "Construcción I"
 construction1_desc: "Los métodos y materiales mejorados nos permiten construir edificios civiles y militares en menos tiempo."
 construction2: "Construcción II"
 construction2_desc: "La modernización de herramientas y equipo nos ayudará más en nuestras construcciones."
 construction3: "Construcción III"
 construction3_desc: "Podemos aplicar la adopción de vehículos modernos y la experiencia de nuestros avances en construcción para realizar reparaciones mucho más rápido."
 construction4: "Construcción IV"
 construction4_desc: "El mayor nivel de mecanización y las rutinas mejoradas aumentan más la velocidad de construcción."
 construction5: "Construcción V"
 construction5_desc: "Para ser eficientes construyendo en el futuro necesitaremos una planificación más exhaustiva de los proyectos individuales, así como soluciones estandarizadas cuando sea posible."
 excavation1: "Excavación I"
 excavation1_desc: "Los avances en las técnicas de perforación nos permiten extraer recursos a los que antes era imposible acceder."
 excavation2: "Excavación II"
 excavation2_desc: "Las nuevas técnicas nos ayudan a reunir recursos de una forma más efectiva. Los recursos ya no se echarán a perder tras la extracción, lo que mejora el rendimiento."
 excavation3: "Excavación III"
 excavation3_desc: "Los avances en geología nos ayudan a determinar la ubicación de los recursos. Ya podemos centrarnos en la extracción en lugares en los que es probable encontrar una mayor cantidad de recursos."
 excavation4: "Excavación IV"
 excavation4_desc: "La automatización de los procesos clave, así como los avances en mecánica, contribuyen a que las extracciones de recursos sean mucho más productivas."
 excavation5: "Excavación V"
 excavation5_desc: "Los avances en campos como la minería de superficie permiten que nuestras excavaciones nos proporcionen una cantidad mayor de recursos."
 excavation_tech: "Tecnologías de excavación"
 experimental_rockets: "Cohetes experimentales"
 experimental_rockets_desc: "Los avances en ingeniería espacial que mejoran el alcance y la fiabilidad de los cohetes de combustible líquido nos ayudarán a conocer la tecnología lo suficiente como para construir bases de lanzamiento para modelos más avanzados."
 rocket_engines: "Cohetes a motor"
 rocket_engines_desc: "Nuestro dominio de la propulsión de cohetes está llegando a un punto en el que podemos construir bombas voladoras y aviones accionados por cohetes que alcanzan velocidades antes inalcanzables."
 improved_rocket_engines: "Cohetes a motor mejorados"
 improved_rocket_engines_desc: "Podemos construir los primeros misiles balísticos de largo alcance y hacerlos más precisos para llegar a ciudades enemigas lejanas, e incluso al espacio."
 advanced_rocket_engines: "Cohetes a motor avanzados"
 advanced_rocket_engines_desc: "El futuro de la ingeniería espacial abre un abanico de posibilidades, como los misiles intercontinentales, con un alcance que apenas conoce límites y unas cargas más letales."
 atomic_research: "Investigación atómica"
 atomic_research_desc: "En fisión nuclear, la división de un átomo produce enormes cantidades de energía, y una capacidad de destrucción sin límites."
 rocket_interceptor: "Interceptor a cohetes"
 rocket_interceptor_desc: "Los interceptores por cohetes basados en los planeadores pueden moverse más rápido que cualquier otro avión durante cortos periodos de tiempo. Aunque la volubilidad del combustible supone un riesgo, los aviones podrán despegar y reaccionar a los ataques antes de lo esperado por el enemigo."
 rocket_interceptor_2: "Interceptor a cohetes II"
 rocket_interceptor_2_desc: "Manejar cazas propulsados por cohetes sigue siendo peligroso, pero ahora cuentan con pilotos automáticos y el remolque de otros aviones para ayudarlos a aprovechar la ventaja de su velocidad extrema a costa de una ventana de combustible pequeña."
 rocket_interceptor_3: "Interceptor a cohetes III"
 rocket_interceptor_3_desc: "Las nuevas técnicas de aterrizaje y unos sistemas de combustible más seguros han mejorado las opciones de éxito y supervivencia de los cazas a cohetes para aprovechar el potencial de estos innovadores vehículos."
 nukes: "Bombas nucleares"
 nukes_desc: "El proyecto para construir una bomba atómica es una de empresas más secretas y complicadas que una nación puede afrontar. No obstante, su éxito cambiaría no solo el curso de las guerras actuales, sino el futuro del mundo."
 interwar_artillery: "Plataforma mejorada"
 interwar_artillery_desc: "Materiales más duraderos que aumentan el rendimiento en diversos entornos."
 artillery2: "DPICM mejorado"
 artillery2_desc: "Una Dual-Purpose Improved Conventional Munition (DPICM) es una ojiva diseñada para explotar en submuniciones a una altitud y distancia óptimas del objetivo deseado, con el fin de cubrir un área densa. Las submuniciones utilizan penetradores explosivos para el ataque antiblindaje y fragmentación para el ataque antipersonal."
 artillery4: "Materiales livianos"
 artillery4_desc: "Un sistema más liviano, sin reducir su durabilidad, es más fácil de remolcar y desplegar. Los tiempos de respuesta y reubicación más rápidos facilitan una cobertura eficaz en cualquier área de operaciones."
 artillery6: "Municiones programables"
 artillery6_desc: "Un diseño de ojiva única, capaz de transformarse según el objetivo y el entorno, elimina la necesidad de muchos tipos de proyectiles. Antes de disparar, la tripulación puede usar la interfaz digital para personalizar los patrones explosivos, la metralla, la explosión en el aire y muchos otros factores."
 mountain_gun: "Cañón de montaña"
 mountain_gun_desc: "El terreno montañoso del norte de la India propició el desarrollo de una pieza de artillería que podía desmontarse y transportarse a lomo de mula a donde fuera necesario."
 rocket_artillery2: "Ojivas mejoradas"
 rocket_artillery2_desc: "La creación de una gran área de efecto con explosivos potentes y un patrón de metralla dispersa ofrece la mayor relación posible entre muertes y cohetes."
 rocket_artillery3: "Transporte modular"
 rocket_artillery3_desc: "Al almacenar y transportar los cohetes en bloques modulares, su recarga es más rápida. Este diseño estándar facilita la integración del fuego, agilizando prácticamente todos los procedimientos previos al mismo."
 antiair1: "Misiles mejorados"
 antiair1_desc: "Misiles portátiles más rápidos y precisos facilitarán una menor interferencia del apoyo aéreo enemigo."
 antiair3: "Radares independientes"
 antiair3_desc: "Las técnicas modernas de radar y enlace de datos proporcionan una plataforma más segura y descentralizada para la localización, el seguimiento y la localización de contactos aéreos."
 antiair5: "Carga aumentada"
 antiair5_desc: "Un explosivo más eficiente y un patrón de metralla mejorado aumentan aún más la efectividad de los misiles tierra-aire."
 antiair7: "Recarga y carcasa mejoradas"
 antiair7_desc: "Al utilizar un sistema de recarga rápida o una carcasa de misiles de mayor capacidad, se pueden disparar más misiles en menos tiempo."
 antitank1: "Ovijas con carga en tándem"
 antitank1_desc: "Las cargas en tándem son eficaces contra el blindaje reactivo, diseñado para proteger un vehículo blindado contra municiones antitanque. La primera etapa del arma suele ser una carga débil que perfora el blindaje reactivo del objetivo sin detonarlo, dejando un canal a través del mismo para que la segunda ojiva pueda pasar sin obstáculos, o bien detona la placa del blindaje, lo que impide la sincronización de la contraexplosión."
 antitank3: "Municiones diversas"
 antitank3_desc: "La creación de un sistema de armas universal ofrece un amplio margen para ampliar sus usos. La gran variedad de tipos de munición para diversas situaciones proporciona versatilidad a la infantería en el campo de batalla."
 antitank5: "Diseño avanzado de misiles"
 antitank5_desc: "Proyectos recientes han creado una propulsión de misiles más potente con el mismo volumen que los diseños anteriores. Esto se traduce en un mayor alcance y una carga de ojiva ligeramente mayor."
 antitank7: "Municiones programables"
 antitank7_desc: "Con una sola ojiva, esta compleja máquina puede cambiar el tipo de patrón explosivo antes del lanzamiento. Este dispositivo podría ser eficaz para atacar infantería, tanques, vehículos ligeros y estructuras."
 atgm_carrier: "Portamisiles antitanque"
 self_propelled_artillery: "Art. autopropulsa-da"
 self_propelled_aa: "Art. antiaérea autopropulsada"
 reconnaissance_tanks: "TANQUES DE RECONOCIMIENTO"
 main_battle_tanks: "C. DE COMBATE PRINCIPALES"
 secondary_armaments_ammunition: "ARMAMENTOS SECUNDARIOS Y MUNICIONES"
 primary_armaments_title: "ARMAMENTOS PRIMARIOS Y MÓDULOS VEHICULARES"
 air_superiority: "Superioridad aérea"
 air_superiority_desc: "La superioridad aérea hará que los enemigos lo tengan más difícil para usar los bombarderos contra nuestro país, mientras que nosotros podremos usar los nuestros contra ellos."
 formation_flying: "Radar transhorizonte"
 formation_flying_desc: ""
 air_offense: "Escoltas de cazas"
 air_offense_desc: "Al concentrar los bombardeos durante el día, debemos mantener nuestros bombarderos a salvo de los cazas interceptores. Si entrenamos a los pilotos de cazas para que colaboren con los bombarderos, mejoraremos su habilidad a la hora de protegerlos en el espacio aéreo enemigo."
 fighter_baiting: "Cazas como cebo"
 fighter_baiting_desc: "El aspecto vulnerable de nuestros cazas puede atraer a los aviones enemigos a una emboscada."
 dogfighting_experience: "Entrenamiento en BFM"
 dogfighting_experience_desc: "No resulta fácil registrar las posiciones relativas de aliados y enemigos en los frenéticos combates aéreos, pero nuestros pilotos desempeñarán mejor su labor al ganar experiencia."
 fighter_ace_initiative: "Instrucción de tácticas de caza"
 fighter_ace_initiative_desc: ""
 multialtitude_flying: "Vuelo de multialtura"
 multialtitude_flying_desc: "El combate aéreo transcurre en tres dimensiones, pero a muchos pilotos les cuesta seguir a los aviones que vuelan por encima y por debajo de ellos. Podemos aprovechar esto desplegando nuestras formaciones en vertical."
 offensive_formations: "Formaciones ofensivas"
 offensive_formations_desc: "Los entrenamientos con formaciones ofensivas harán que nuestros cazas resulten más mortíferos."
 fighter_sweeps: "Barridos con cazas"
 fighter_sweeps_desc: "Con patrullas de cazas agresivas sobre el territorio enemigo, podemos atacar a los aviones que despeguen o aterricen, cuando son especialmente vulnerables, o sabotear los vuelos de entrenamiento del enemigo."
 force_rotation: "Rotación de fuerzas"
 force_rotation_desc: "El combate, o simplemente los largos periodos de concentración exhaustiva, resultan agotadores, pero si rotamos las fuerzas siempre que sea posible, reduciremos el margen de error por cansancio."
 air_defence: "Defensa aérea"
 air_defence_desc: "Al entrenar a nuestros pilotos para que siempre estén ojo avizor, incluso cuando no parezca haber peligro, sus opciones de interceptar aviones enemigos serán mayores."
 dispersed_fighting: "Lucha dispersa"
 dispersed_fighting_desc: "Al adoptar una formación más dispersa, podremos patrullar un área mayor con el mismo número de aviones."
 forward_interception: "Interceptación adelantada"
 forward_interception_desc: "Al maniobrar cerca del espacio aéreo enemigo, nuestros cazas tendrán más opciones de interceptar los aviones enemigos antes de que alcancen sus objetivos."
 fighter_veteran_initiative: "Iniciativa de veteranos de caza"
 fighter_veteran_initiative_desc: "Un enfoque a largo plazo en la supervivencia de los pilotos, con tácticas prudentes y rotando a los pilotos experimentados en puestos de entrenamiento, les permitirá transmitir lo que han aprendido a los nuevos pilotos."
 formation_fighting: "Rastreo multisensorial"
 formation_fighting_desc: ""
 air_skirmish: "Escaramuza aérea"
 air_skirmish_desc: "Por desgracia, no siempre es posible destruir todos los aviones enemigos que vemos sobrevolando nuestro país, pero sí que podemos hostigarlos desgastándolos sin tregua desde el momento en el que los avistamos hasta que se marchan."
 home_defence: "Defensa antiaérea"
 home_defence_desc: "Los observadores terrestres, así como los puestos de detección y de escucha, trabajan conjuntamente con nuestra fuerza aérea para rastrear y desbaratar las incursiones enemigas."
 battlefield_destruction: "Destrucción en el campo de batalla"
 battlefield_destruction_desc: "La fuerza aérea puede atacar países enemigos lejanos, pero también resulta útil para brindar apoyo directo al ejército en las batallas."
 dive_bombing: "Potencia de fuego aérea"
 dive_bombing_desc: ""
 direct_ground_support: "Sistema integrado de defensa aérea"
 direct_ground_support_desc: ""
 bomber_veteran_initiative: "Iniciativa de veteranos de bombardero"
 bomber_veteran_initiative_desc: "La idea de que nuestros pilotos veteranos transmitan sus conocimientos a los nuevos reclutas contribuirá a sus opciones de sobrevivir."
 bomber_ace_initiative: "Iniciativa de as de bombardero"
 bomber_ace_initiative_desc: "Al reconocer y recompensar formalmente a los ases de bombarderos, alimentaremos su atrevimiento e iniciativa."
 cas_veteran_initiative: "Iniciativa de veterano de ataque terrestre"
 cas_veteran_initiative_desc: "La idea de que nuestros pilotos veteranos transmitan sus conocimientos a los nuevos reclutas contribuirá a sus opciones de sobrevivir."
 cas_ace_initiative: "Iniciativa de as de ataque terrestre"
 cas_ace_initiative_desc: "Al reconocer y recompensar formalmente a los ases de AAC, alimentaremos su atrevimiento e iniciativa."
 hunt_and_destroy: "Misiones aéreas independientes"
 hunt_and_destroy_desc: "Además de ofrecer apoyo de fuego directo, las unidades de AAC pueden dar caza a los objetivos de forma independiente. Suelen atacar a las tropas terrestres sorpresivamente mientras se aproximan al frente."
 naval_strike_torpedo_tactics: "Tácticas de ataque naval"
 naval_strike_torpedo_tactics_desc: ""
 naval_strike_torpedo_tactics_oi: "Tácticas de torpedo de ataque naval"
 naval_strike_torpedo_tactics_oi_desc: "Al entrenar a los pilotos para que sean más precisos con los torpedos, los asaltos aéreos a los buques enemigos serán más eficaces."
 naval_strike_tactics: "AAC merodeador"
 naval_strike_tactics_desc: ""
 low_echelon_support: "Apoyo de nivel bajo"
 low_echelon_support_desc: "Al asignar unidades de AAC directamente a pequeñas formaciones terrestres, nos aseguramos de que siempre dispongan de potencia de fuego adicional, incluso fuera del alcance de la artillería tradicional."
 combat_unit_destruction: "Destrucción de unidad de combate"
 combat_unit_destruction_desc: "Al entrenar a nuestros pilotos de AAC para que ataquen al mismo objetivo varias veces hasta confirmar su destrucción, impediremos que se escape por poco."
 operational_destruction: "Destrucción operativa"
 operational_destruction_desc: "El ataque a las líneas de suministro de las tropas terrestres enemigas entorpecerá su habilidad para moverse de un campo de batalla a otro, lo que supone una ventaja para nuestro ejército al operar en zonas en las que gocemos de superioridad aérea."
 infrastructure_destruction: "Cazas como cebo"
 infrastructure_destruction_desc: "El aspecto vulnerable de nuestros cazas puede atraer a los aviones enemigos a una emboscada."
 logistical_bombing: "Bombardeo logístico"
 logistical_bombing_desc: "Una mayor concentración en atacar las líneas de suministro del enemigo desde el aire otorgará más ventaja a nuestras tropas terrestres en la zona."
 battlefield_support: "Apoyo en el campo de batalla"
 battlefield_support_desc: "El bombardeo a nivel es menos preciso que en picado, por lo que los bombarderos tácticos lo tienen difícil para atacar a los objetivos cercanos a nuestras tropas terrestres. Aun así, podemos solucionar esto con más entrenamiento e interacción con los observadores de tierra."
 carousel_bombing: "Bombardeo en carrusel"
 carousel_bombing_desc: "Lo normal es que los bombarderos quieran soltar todas sus bombas en cuanto llegan a la zona objetivo y regresar a casa lo antes posible. Aunque esto puede funcionar al bombardear zonas enteras, si el objetivo es pequeño, lo más efectivo es dejarlo para el último momento y soltar las bombas poco a poco para garantizar la máxima precisión."
 keypoint_bombing: "UCAV y bombardeo merodeador"
 keypoint_bombing_desc: "Los bombardeos precisos centrados en puntos clave del campo de batalla como apoyo a nuestras tropas terrestres pueden contribuir enormemente a la derrota del enemigo."
 ground_support_integration: "Integración de apoyo terrestre"
 ground_support_integration_desc: "Al integrar nuestra fuerza de bombarderos tácticos con observadores terrestres, aumentaremos su precisión y les permitiremos brindar apoyo directo a nuestras tropas terrestres en combate."
 strategic_destruction: "Destrucción estratégica"
 strategic_destruction_desc: "Nuestros pilotos pueden acceder a objetivos estratégicos mucho antes que nuestras fuerzas navales o terrestres. Si carecen de medios para equipar a sus nuevos reclutas, pronto superaremos en número a las fuerzas enemigas."
 counter_air_operation: "Operaciones antiaéreas"
 counter_air_operation_desc: "Priorizar la consecución y el mantenimiento del control aéreo mediante la integración de operaciones para neutralizar o destruir amenazas en todos los dominios, garantizando libertad de maniobrar, atacar y proteger las fuerzas."
 strategic_destruction_title_dos: "Destrucción estratégica"
 sortie_efficiency: "Eficiencia de despliegue"
 multi_sphere_operations: "Operaciones multiesferales"
 multi_sphere_operations_desc: "Enfatizar el valor estratégico de las operaciones locales para enfrentar los conflictos a nivel táctico, buscando controlar la batalla aérea en sus etapas iniciales sin la garantía de superioridad aérea."
 high_level_bombing: "Bombardeo a alto nivel"
 high_level_bombing_desc: "A gran altura podemos evitar algunos enfrentamientos aéreos y armas antiaéreas. Los bombardeos a mayor altura requieren más precisión, pero son más seguros."
 massed_bomber_formations: "Municiones guiadas"
 massed_bomber_formations_desc: ""
 night_bombing: "Bombardeo nocturno"
 night_bombing_desc: "Con las defensas enemigas reducidas y nuestros bombarderos ocultos en la oscuridad, podemos seguir siendo agresivos todo el día. Enseñémosle al enemigo lo persistentes que somos.\n\n"
 dead_reckoning_bombing: "Bombardeo de navegación por estima"
 dead_reckoning_bombing_desc: "Al medir la velocidad, dirección y giro de posiciones anteriores, podemos calcular bombardeos más precisos incluso de noche."
 infiltration_bombing: "Bombardeo de infiltración"
 infiltration_bombing_desc: "Unirse a las formaciones enemigas o seguirlas de vuelta a la base suena a locura, pero es completamente posible con la práctica suficiente."
 pathfinder_groups: "Grupos de exploradores"
 pathfinder_groups_desc: "Los pilotos veteranos están equipados con las mejores herramientas para iluminar las posiciones objetivo. Ni el humo ni el mal tiempo podrán impedir que los bombarderos cumplan su misión."
 day_bombing: "Interrupción terrestre"
 day_bombing_desc: ""
 escort_relay_system: "Sistema de relevo de escolta"
 escort_relay_system_desc: "Los bombarderos escoltados por cazas mejoran enormemente la capacidad para responder al fuego enemigo."
 flying_fortress: "Fortaleza voladora"
 flying_fortress_desc: "Nuestros bombarderos pesados están equipados con armas para defenderse y blindaje suficiente como para aguantar una paliza y regresar a casa."
 mass_destruction: "Destrucción masiva"
 mass_destruction_desc: "Los bombarderos están equipados con las armas más devastadores en grandes cantidades, lo que garantiza resultados aunque solo sobrevivan unos pocos pilotos."
 fleet_in_being: "Flota en potencia"
 fleet_in_being_desc: "Los buques se quedan en el puerto, donde están más seguros, y solo atacan al enemigo en el momento oportuno. La presencia de nuestros navíos hará que el enemigo se lo piense antes de atacar nuestros puertos.\n\n"
 battlefleet_concentration: "Concentración de flota de combate"
 battlefleet_concentration_desc: "Avisa a los buques cercanos en cuanto se detecte un navío enemigo. Al coordinar y concentrar el fuego sobre un buque enemigo, este queda inutilizado rápidamente. Dales caza uno a uno."
 battlefleet_concentration_ti: "Concentración de flota de combate"
 battlefleet_concentration_ti_desc: "Avisa a los buques cercanos en cuanto se detecte un navío enemigo. Al coordinar y concentrar el fuego sobre un buque enemigo, este queda inutilizado rápidamente. Dales caza uno a uno."
 subsidiary_carrier_role: "Papel secundario de portaaviones"
 subsidiary_carrier_role_desc: "Los portaaviones apoyan a los acorazados y mejoran la rapidez con la que pasan de la defensa al ataque. La utilidad del portaaviones al tener un ojo en el cielo y la capacidad de asestar poderosos y veloces ataques complementan a los acorazados, más lentos."
 subsidiary_carrier_role_ti: "Papel secundario de portaaviones"
 subsidiary_carrier_role_ti_desc: "Los portaaviones apoyan a los acorazados y mejoran la rapidez con la que pasan de la defensa al ataque. La utilidad del portaaviones al tener un ojo en el cielo y la capacidad de asestar poderosos y veloces ataques complementan a los acorazados, más lentos."
 hunter_killer_groups: "Grupos de cazadores"
 hunter_killer_groups_desc: "Los destructores forman grupos para dar caza a los submarinos enemigos. La acción combinada de exploradores y cazadores da lugar a un fantástico equipo."
 floating_fortress: "Fortaleza flotante"
 floating_fortress_desc: "Con los acorazados en alerta máxima, estaremos siempre preparados para responder si el enemigo se atreve a amenazar nuestras aguas. Toda flota se sostiene sobre unos cimientos sólidos, y el poder del acorazado es incomparable."
 floating_fortress_ti: "Fortaleza flotante"
 floating_fortress_ti_desc: "Con los acorazados en alerta máxima, estaremos siempre preparados para responder si el enemigo se atreve a amenazar nuestras aguas. Toda flota se sostiene sobre unos cimientos sólidos, y el poder del acorazado es incomparable."
 floating_fortress_bs: "Fortaleza flotante"
 floating_fortress_bs_desc: "Con los acorazados en alerta máxima, estaremos siempre preparados para responder si el enemigo se atreve a amenazar nuestras aguas. Toda flota se sostiene sobre unos cimientos sólidos, y el poder del acorazado es incomparable."
 floating_airfield: "Aeródromo flotante"
 floating_airfield_desc: "Al mejorar la integración de los portaaviones en nuestra flota, podemos prepararnos para atacar por tierra y aire. Es fundamental dominar el espacio aéreo dondequiera que vayamos."
 floating_airfield_ti: "Aeródromo flotante"
 floating_airfield_ti_desc: "Al mejorar la integración de los portaaviones en nuestra flota, podemos prepararnos para atacar por tierra y aire. Es fundamental dominar el espacio aéreo dondequiera que vayamos."
 floating_airfield_bs: "Aeródromo flotante"
 floating_airfield_bs_desc: "Al mejorar la integración de los portaaviones en nuestra flota, podemos prepararnos para atacar por tierra y aire. Es fundamental dominar el espacio aéreo dondequiera que vayamos."
 grand_battlefleet: "Gran flota de combate"
 grand_battlefleet_desc: "La capacitación en liderazgo permite a nuestros comandantes mantener la calma en el fragor de la batalla al dirigir hasta flotas inmensas. Nuestra flota aplastará toda la oposición que se encuentre."
 convoy_sailing: "Navegar en convoy"
 convoy_sailing_desc: "La introducción de la navegación en convoy facilitará la detección de incursiones enemigas para responder a tiempo. El camino a seguir pasa por la seguridad del grupo."
 convoy_sailing_ti: "Navegar en convoy"
 convoy_sailing_ti_desc: "La introducción de la navegación en convoy facilitará la detección de incursiones enemigas para responder a tiempo. El camino a seguir pasa por la seguridad del grupo."
 convoy_sailing_bs: "Navegar en convoy"
 convoy_sailing_bs_desc: "La introducción de la navegación en convoy facilitará la detección de incursiones enemigas para responder a tiempo. El camino a seguir pasa por la seguridad del grupo."
 convoy_escorts: "Escoltas de convoy"
 convoy_escorts_desc: "La incorporación de veloces naves de superficie a nuestros convoyes nos permitirá detectar submarinos enemigos y responder a tiempo. La detección es esencial para eliminar a los molestos submarinos."
 convoy_escorts_bs: "Escoltas de convoy"
 convoy_escorts_bs_desc: "La incorporación de veloces naves de superficie a nuestros convoyes nos permitirá detectar submarinos enemigos y responder a tiempo. La detección es esencial para eliminar a los molestos submarinos."
 escort_carriers: "Portaaviones de escolta"
 escort_carriers_desc: "El área que cubren los aviones de un portaaviones facilita enormemente la escolta de convoyes comerciales. Asegurar el flujo de recursos es esencial."
 integrated_convoy_defence: "Defensa integrada de convoyes"
 integrated_convoy_defence_desc: "Al mejorar la coordinación naval y aérea, podremos atacar al enemigo a kilómetros de distancia antes de que se acerque a nuestros convoyes, lo que aumentará drásticamente la efectividad de la navegación en convoy."
 integrated_convoy_defence_bs: "Defensa integrada de convoyes"
 integrated_convoy_defence_bs_desc: "Al mejorar la coordinación naval y aérea, podremos atacar al enemigo a kilómetros de distancia antes de que se acerque a nuestros convoyes, lo que aumentará drásticamente la efectividad de la navegación en convoy."
 submarine_operations: "Operaciones submarinas"
 submarine_operations_desc: "Para ganar la guerra, no hace falta atacar a la flota enemiga de frente. Podemos atacar sus convoyes comerciales y volver a desaparecer bajo la superficie antes de que puedan reaccionar. No puedes combatir lo que no puedes ver."
 submarine_operations_bs: "Operaciones submarinas"
 submarine_operations_bs_desc: "Para ganar la guerra, no hace falta atacar a la flota enemiga de frente. Podemos atacar sus convoyes comerciales y volver a desaparecer bajo la superficie antes de que puedan reaccionar. No puedes combatir lo que no puedes ver."
 undersea_blockade: "Bloqueo submarino"
 undersea_blockade_desc: "Los submarinos son ideales para cortar la afluencia de materias primas importantes para el enemigo. Vamos a ganar paralizando la producción del enemigo y haciendo que se rinda por hambre."
 undersea_blockade_bs: "Bloqueo submarino"
 undersea_blockade_bs_desc: "Los submarinos son ideales para cortar la afluencia de materias primas importantes para el enemigo. Vamos a ganar paralizando la producción del enemigo y haciendo que se rinda por hambre."
 convoy_interdiction: "Interdicción de convoy"
 convoy_interdiction_desc: "Si mejoramos la coordinación entre nuestros submarinos, estos podrán atacar los convoyes comerciales en ruta. Al interrumpir las líneas de suministro del enemigo, obtendremos una ventaja estratégica."
 convoy_interdiction_ti: "Interdicción de convoy"
 convoy_interdiction_ti_desc: "Si mejoramos la coordinación entre nuestros submarinos, estos podrán atacar los convoyes comerciales en ruta. Al interrumpir las líneas de suministro del enemigo, obtendremos una ventaja estratégica."
 convoy_interdiction_bs: "Interdicción de convoy"
 convoy_interdiction_bs_desc: "Si mejoramos la coordinación entre nuestros submarinos, estos podrán atacar los convoyes comerciales en ruta. Al interrumpir las líneas de suministro del enemigo, obtendremos una ventaja estratégica."
 submarine_offensive: "Ofensiva submarina"
 submarine_offensive_desc: "Al llegar a la cúspide en la comunicación entre submarinos, podemos pasar a la ofensiva. Destruyamos los convoyes comerciales del enemigo sin darle tiempo a sustituirlos."
 submarine_offensive_bs: "Ofensiva submarina"
 submarine_offensive_bs_desc: "Al llegar a la cúspide en la comunicación entre submarinos, podemos pasar a la ofensiva. Destruyamos los convoyes comerciales del enemigo sin darle tiempo a sustituirlos."
 trade_interdiction: "Interdicción de comercio"
 trade_interdiction_desc: "Cuanto antes detectemos los buques enemigos, antes podremos destruirlos. Ataca sus convoyes comerciales y escapa antes de que tengan tiempo de reaccionar.\n\n"
 unrestricted_submarine_warfare: "Guerra submarina indiscriminada"
 unrestricted_submarine_warfare_desc: "Que nuestros submarinos hundan cualquier navío sin previo aviso, sea civil o no. Aunque algunos consideren que infringimos las normas de la guerra, nuestra efectividad será incuestionable."
 wolfpacks: "Manadas de lobos"
 wolfpacks_desc: "Con nuestros submarinos organizados en manadas, la coordinación entre ellos mejorará considerablemente. Tras localizar a un enemigo, el submarino aguarda a que llegue el resto de la manada, atacando solo cuando tengamos las de ganar."
 advanced_submarine_warfare: "Guerra submarina avanzada"
 advanced_submarine_warfare_desc: "Al mejorar enormemente la comunicación entre nuestros submarinos, estos podrán coordinar ataques a la perfección. Cuando por fin nos vean, su buque estará hundiéndose."
 combined_operations_raiding: "Incursión de operaciones combinadas"
 combined_operations_raiding_desc: "Destinamos todos los recursos a la caza de convoyes comerciales del enemigo. Coordinando nuestra flota principal y los submarinos, podemos estar siempre en alerta. Ningún buque surcará nuestras aguas sin ser visto."
 raider_patrols: "Patrullas de incursión"
 raider_patrols_desc: "Las patrullas de buques veloces y con armas pesadas dejarán a los convoyes comerciales sin lugar donde ocultarse.\nNo solo los submarinos pueden cazar."
 capital_ship_raiders: "Buques capitales de incursión"
 capital_ship_raiders_desc: "Con nuestros buques más poderosos dando caza a los convoyes comerciales, el enemigo ya no podrá ampararse en los números. Serán un blanco fácil y rezarán para que no los encontremos."
 carrier_operations: "Operaciones de portaaviones"
 carrier_operations_desc: "Los portaaviones permitirán a nuestros pilotos lanzar ataques de forma más fácil y rápida que desde nuestras bases aéreas en tierra. Atacaremos antes de que tengan tiempo para reaccionar."
 naval_air_operations: "Operaciones aéreas navales"
 naval_air_operations_desc: "Los pilotos entrenados para realizar misiones desde los portaaviones suponen una nueva forma de dominar los mares. Los aeroplanos son eficaces a la hora de dispersar la flota enemiga."
 base_strike: "Ataque a base"
 base_strike_desc: "Atacando los puertos enemigos impediremos que puedan reconstruir su flota. Esto nos permitirá dominar los mares por superioridad numérica.\n\n"
 carrier_primacy: "Portaaviones como prioridad"
 carrier_primacy_desc: "Los aeroplanos modernos poseen más alcance y precisión que las armas navales normales. Incorpora portaaviones a nuestra flota y domina los mares desde el cielo."
 carrier_task_forces: "Cuerpos especiales de portaaviones"
 carrier_task_forces_desc: "Con los cuerpos especiales organizados junto a los portaaviones y los cruceros ligeros, el enemigo nunca nos cogerá desprevenidos."
 massed_strikes: "Ataques en masa"
 massed_strikes_desc: "Los pilotos entrenados para las misiones en portaaviones permitirán que hasta un portaaviones saturado funcione sin problemas al desbordar al enemigo y mejorar la efectividad en batallas navales. Un portaaviones debe funcionar como una máquina bien engrasada en la que todos conocen su función."
 carrier_battlegroups: "Grupos de combate de portaaviones"
 carrier_battlegroups_desc: "Los portaaviones pueden atacar al enemigo desde una distancia mayor que cualquier cañón naval y, al vigilar desde el cielo, jamás nos cogerán desprevenidos. Los portaaviones en masa son un enemigo formidable."
 escort_patrols: "Patrullas de escolta"
 escort_patrols_desc: "Al mejorar la detección, nuestras escoltas de convoyes resultan más letales para los submarinos. No representan una amenaza real si no tienen donde esconderse."

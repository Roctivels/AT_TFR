 basic_fire_control_system_desc: "Todos los disparos del buque se controlan desde una posición central, asegurando un mayor agrupamiento de los disparos y un aumento de la precisión."
 improved_fire_control_system: "Sistema mejorado de control de disparo"
 improved_fire_control_system_desc: "Al introducir la trayectoria, la velocidad y la distancia de un objetivo, un ordenador mecánico puede predecir con precisión dónde estará el objetivo cuando la siguiente salva esté preparada."
 advanced_fire_control_system: "Sistema avanzado de control de disparo"
 advanced_fire_control_system_desc: "Un ordenador mecánico grande y complejo permite realizar cálculos balísticos bastante precisos, ya que realiza un seguimiento de bastantes datos tanto del objetivo como del buque que va a disparar, así como las condiciones meteorológicas y el estado del mar."
 sonar: "Sonar pasivo"
 sonar_desc:1 "Un conjunto básico de hidrófonos permite seguir el rastro de objetivos bajo el agua gracias al sonido que producen.\n\nSi este módulo se monta en una §Yranura de electrónica§! o en §Ybuques ligeros§! o §Ycruceros§!, estos podrán detectar mejor los §Ysubmarinos§! enemigos."
 improved_sonar: "Sonar activo"
 improved_sonar_desc:1 "A través de unas ondas sonoras moduladas, este sistema puede medir con exactitud la dirección y la distancia de un objetivo sumergido.\n\nSi este módulo se monta en una §Yranura de electrónica§! o en §Ybuques ligeros§! o §Ycruceros§!, estos podrán detectar mejor los §Ysubmarinos§! enemigos."
 smoke_generator: "Generadores de humo"
 smoke_generator_desc: "Algunos buques ligeros y medianos cuentan con chimeneas y motores ligeramente modificados para generar una gran cantidad de humo y evitar así el contacto con el enemigo."
 depth_charges_advice_tt: "\nAll montar un módulo de §Ycarga de profundidad§! en §Ybuques ligeros§! y §Ycruceros§!, estos podrán atacar §Ysubmarinos§! enemigos."
 sonar_advice_tt: "\nAll montar un módulo de §Ysonar§! en §Ybuques ligeros§! y §Ycruceros§!, estos podrán detectar §Ysubmarinos§! enemigos."
 basic_depth_charges: "Cargas de profundidad básicas"
 basic_depth_charges_desc:1 "Un contenedor explosivo sencillo con un detonador sensible a la presión que explota al alcanzar una profundidad determinada.\n\nSi este módulo se monta en §Ybuques ligeros§! y §Ycruceros§!, estos podrán atacar los §Ysubmarinos§! enemigos."
 improved_depth_charges: "Lanzador de cargas de profundidad"
 improved_depth_charges_desc:1 "Un dispositivo mecánico sencillo que lanza una carga de profundidad a una distancia concreta del buque. Esto quiere decir que el destructor ya no tiene que navegar hasta el objetivo para alcanzarlo.\n\nSi este módulo se monta en §Ybuques ligeros§! y §Ycruceros§!, estos podrán atacar los §Ysubmarinos§! enemigos."
 advanced_depth_charges: "Mortero de cargas de profundidad"
 advanced_depth_charges_desc:1 "Los destructores con mortero pueden lanzar cargas explosivas a distancias mucho mayores, lo que les permite mantener al submarino enemigo en el sonar durante todo el ataque y aumentar la precisión de forma significativa.\n\nSi este módulo se monta en §Ybuques ligeros§! y §Ycruceros§!, estos podrán atacar los §Ysubmarinos§! enemigos."
 modern_depth_charges: "Mortero de cargas de profundidad mejorado"
 modern_depth_charges_desc:1 "El aumento de la carga propulsora permite lanzar una carga de profundidad desde gran distancia hasta la profundidad exacta a la que se encuentra el submarino.\n\nSi este módulo se monta en §Ybuques ligeros§! y §Ycruceros§!, estos podrán atacar los §Ysubmarinos§! enemigos."
 improved_airplane_launcher: "Catapulta de aviones mejorada"
 improved_airplane_launcher_desc:1 "Esta catapulta cuenta con un mecanismo neumático mejorado que permite lanzar aviones mucho más grandes, lo que aumenta el radio de búsqueda.\n\nSi este módulo se monta en §Ycruceros§!, §Ybuques pesados§! o §Ysubmarinos§! especializados, estos podrán detectar mejor los buques enemigos."
 airplane_launcher_advice_tt: "\nSi el módulo de §Ycatapulta§! se monta en §Ycruceros§!, §Ybuques pesados§! o §Ysubmarinos§! especializados, estos podrán detectar mejor los buques enemigos."
 cruiser_armor_advice_tt: "\nAl montar un módulo de mejor §Yblindaje§! en §Ycruceros§!, mejora su capacidad para soportar daños."
 heavy_armor_advice_tt: "\nAl montar un módulo de mejor §Yblindaje§! en §Ybuques pesados§!, mejora su capacidad para soportar daños. Los §Yacorazados§! y los §Ycruceros de batalla§! se definen por sus §Yesquemas de blindaje§! diferentes, y los cruceros de batalla suelen tener peor blindaje."
 basic_cruiser_armor_scheme: "Esquema de blindaje de crucero básico"
 basic_cruiser_armor_scheme_desc:1 "Este esquema copia la división de los blindajes de cinturón y de cubierta habituales en los buques capitales, y ofrece cierta protección frente a la metralla y los cañones pequeños.\n\nAl montar este módulo en §Ycruceros§!, mejora su capacidad de §Ysoportar daño enemigo§!, pero también se §Rreduce§! su §Yvelocidad§!."
 improved_cruiser_armor_scheme: "Esquema de blindaje de cinturón de crucero inclinado"
 improved_cruiser_armor_scheme_desc:1 "Al colocar el blindaje de cinturón formando un ángulo, el mismo grosor de blindaje es mucho más difícil de perforar.\n\nAl montar este módulo en §Ycruceros§!, mejora su capacidad de §Ysoportar daño enemigo§!, pero también se §Rreduce§! su §Yvelocidad§!."
 advanced_cruiser_armor_scheme: "Esquema de blindaje de crucero todo o nada"
 advanced_cruiser_armor_scheme_desc:1 "Este esquema se centra solo en proteger las partes esenciales del buque, ignorando las menos importantes. \n\nAl montar este módulo en §Ycruceros§!, mejora su capacidad de §Ysoportar daño enemigo§!, pero también se §Rreduce§! su §Yvelocidad§!."
 basic_heavy_armor_scheme: "Esquema de blindaje de cinturón inclinado"
 basic_heavy_armor_scheme_desc:1 "Al colocar el blindaje de cinturón formando un ángulo, el mismo grosor de blindaje es mucho más difícil de perforar.\n\nAl montar este módulo en §Ybuques pesados§!, mejora su capacidad de §Ysoportar daño enemigo§!. Los §Yacorazados§! y los §Ycruceros de batalla§! se definen por unos §Yesquemas de blindaje§! diferentes."
 improved_heavy_armor_scheme: "Esquema de blindaje \"todo o nada\""
 improved_heavy_armor_scheme_desc:1 "Este esquema se centra solo en proteger las partes esenciales del buque, ignorando las menos importantes.\n\nAl montar este módulo en §Ybuques pesados§!, mejora su capacidad de §Ysoportar daño enemigo§!. Los §Yacorazados§! y los §Ycruceros de batalla§! se definen por unos §Yesquemas de blindaje§! diferentes."
 torpedo_advice_tt: "\nAl montar §Ylanzatorpedos§! en §Ybuques ligeros§! o en §Ycruceros§!, estos pueden provocar bastante daño a §Ybuques capitales§! enemigos en la §Ylínea de batalla§! si pueden superar el §Ygrupo pantalla§! enemigo."
 basic_torpedo: "Torpedo básico"
 basic_torpedo_desc:1 "Un arma autopropulsada con una cabeza explosiva que sigue una trayectoria predeterminada hasta que alcanza al objetivo por debajo de la línea de flotación.\n\nAl montar este módulo en §Ybuques ligeros§! o §Ycruceros§!, estos pueden provocar bastante daño a §Ybuques capitales§! enemigos."
 magnetic_detonator: "Detonador magnético"
 magnetic_detonator_desc: "Este nuevo detonador detecta el cambio que se produce en el campo magnético de la Tierra cuando el torpedo pasa bajo el blanco. Una explosión por debajo del buque provoca muchos más daño y suele destrozar la quilla, provocando un hundimiento inmediato."
 homing_torpedo: "Torpedo acústico"
 homing_torpedo_desc: "Este torpedo está equipado con un detector acústico que le permite dirigirse hacia la mayor fuente de ruido, por lo general, su objetivo."
 electric_torpedo: "Torpedo eléctrico"
 electric_torpedo_desc: "En vez de dejar un rastro de burbujas fácil de detectar, los torpedos con motor eléctrico se mantienen casi invisibles hasta que impactan. Esto también significa que no hay ningún rastro que pueda revelar la posición del submarino que lo ha lanzado."
 improved_ship_torpedo_launcher: "Lanzatorpedos mejorado"
 improved_ship_torpedo_launcher_desc:1 "Los motores son más potentes, lo que permite instalar más tubos en una misma torreta y apuntarlos hacia el objetivo en menos tiempo.\n\nAl montar este módulo en §Ybuques ligeros§! o §Ycruceros§!, estos pueden provocar bastante daño a §Ybuques capitales§! enemigos."
 advanced_ship_torpedo_launcher: "Lanzatorpedos avanzado"
 advanced_ship_torpedo_launcher_desc:1 "Unos tubos de mayor diámetro aceptan torpedos más grandes con cabezas explosivas más pesadas.\n\nAl montar este módulo en §Ybuques ligeros§! o §Ycruceros§!, estos pueden provocar bastante daño a §Ybuques capitales§! enemigos."
 modern_ship_torpedo_launcher: "Lanzatorpedos moderno"
 modern_ship_torpedo_launcher_desc:1 "Las potentes cargas de aire comprimido permiten lanzar torpedos más pesados a más velocidad.\n\nAl montar este módulo en §Ybuques ligeros§! o §Ycruceros§!, estos pueden provocar bastante daño a §Ybuques capitales§! enemigos."
 snorkel_advice_tt: "\nAl montar §Ytubos de respiración§! en los §Ysubmarinos§!, se reduce drásticamente su §Yvisibilidad§!, haciendo que a los buques enemigos les cueste más verlos y atacarlos."
 basic_submarine_snorkel: "Snorkel de submarino básico"
 basic_submarine_snorkel_desc:1 "Este sencillo conducto de aire va desde la sala de máquinas hasta la torre de control. Cuando está extendido, permite que el submarino pueda utilizar y cargar sus motores mientras está sumergido.\n\nAl montar este módulo en §Ysubmarinos§!, se reduce su §Yvisibilidad§!, haciendo que cueste más detectarlos."
 improved_submarine_snorkel: "Snorkel de submarino mejorado"
 improved_submarine_snorkel_desc:1 "Este diseño mejorado impide que pueda entrar agua en los motores y reduce el eco de la cabeza del tubo en el radar.\n\nAl montar este módulo en §Ysubmarinos§!, se reduce su §Yvisibilidad§!, haciendo que cueste más detectarlos."
 light_battery_advice_tt: "\n\nAl montar módulos de §Ybatería ligera§! en §Ybuques ligeros§! y §Ycruceros§!, mejora su §Yataque de cañón ligero§!, que ayuda a destruir los §Ybuques pantalla§! enemigos. Las §Ybaterías ligeras§! no suelen ser efectivas contra buques blindados, como §Ycruceros§! y §Ybuques pesados§!."
 medium_battery_advice_tt: "\n\nAl montar los módulos de §Ybatería media ligera§! o §Ybatería media§! en los §Ycruceros§!, mejora su §Yataque de cañón ligero§! o el §Yataque de cañón pesado§!, permitiéndoles luchar contra §Ybuques pantalla§! o §Ybuques capitales§!. Al montar una §Ybatería media§!, ese buque será un §Ycrucero pesado§!; sin embargo, al montar únicamente la §Ybatería media ligera§!, será un §Ycrucero ligero.§!."
 heavy_battery_advice_tt: "\n\nAl montar módulos de §Ybatería pesada§!, aumenta el §Yataque de cañón pesado§! de los §Ybuques pesados§!, de modo que pueden enfrentarse a §Ybuques capitales§! enemigos y destruirlos. Las §Ybaterías pesadas§! suelen ser menos efectiva contra navíos pequeños, como §Ybuques ligeros§! y §Ycruceros ligeros§!."
 basic_battery: "Artillería naval"
 basic_battery_desc: "Un diseño básico para el apuntado y elevación de la artillería naval."
 basic_light_battery: "Batería ligera básica"
 basic_light_battery_desc:1 "Una torreta abierta, motorizada y apta para cañones de pequeño calibre, ideal para buques pequeños.\n\nAl montar este módulo, aumenta el §Yataque de cañón ligero§!, útil contra los §Ybuques pantalla§! enemigos."
 improved_light_battery: "Batería ligera mejorada"
 improved_light_battery_desc:1 "Una torreta cerrada, motorizada y apta para cañones de pequeño calibre que protege a los operadores de los elementos y de la metralla.\n\nAl montar este módulo, aumenta el §Yataque de cañón ligero§!, útil contra los §Ybuques pantalla§! enemigos."
 advanced_light_battery: "Batería ligera avanzada"
 advanced_light_battery_desc:1 "Una torreta doble avanzada que cuenta con mayor potencia de fuego y protección blindada.\n\nAl montar este módulo, aumenta el §Yataque de cañón ligero§!, útil contra los §Ybuques pantalla§! enemigos."
 basic_light_shell: "Proyectil semiperforante de pequeño calibre"
 basic_light_shell_desc: "Este proyectil cuenta con un buen equilibrio entre perforación de blindaje y capacidad explosiva e inflige mucho más daño tras atravesar el débil blindaje de los buques ligeros."
 improved_light_shell: "Proyectil perforante de pequeño calibre"
 improved_light_shell_desc: "Este proyectil perforante para cañones de pequeño calibre permite que los destructores y otros buques de pequeño tamaño puedan combatir contra buques blindados."
 basic_medium_battery: "Batería media básica"
 basic_medium_battery_desc:1 "Una torreta motorizada con dos o tres cañones de calibre medio que se puede usar en cruceros. \n\nAl montar el módulo de §Ybatería media ligera§!, aumenta el §Yataque de cañón ligero§!, útil contra §Ybuques pantalla§! enemigos. Al montar un módulo de §Ybatería media§!, aumenta el §Yataque de cañón pesado§!, útil contra §Ybuques capitales§! enemigos."
 improved_medium_battery: "Batería media mejorada"
 improved_medium_battery_desc:1 "Esta torreta mejorada permite recargas más rápidas y cuenta con un blindaje superior que aumenta las posibilidades de supervivencia. \n\nAl montar el módulo de §Ybatería media ligera§!, aumenta el §Yataque de cañón ligero§!, útil contra §Ybuques pantalla§! enemigos. Al montar un módulo de §Ybatería media§!, aumenta el §Yataque de cañón pesado§!, útil contra §Ybuques capitales§! enemigos."
 advanced_medium_battery: "Batería media avanzada"
 advanced_medium_battery_desc:1 "Al integrar la carga motorizada y el control remoto, los cruceros modernos pueden alcanzar una cadencia de fuego y una precisión impensables hasta ahora. \n\nAl montar el módulo de §Ybatería media ligera§!, aumenta el §Yataque de cañón ligero§!, útil contra §Ybuques pantalla§! enemigos. Al montar un módulo de §Ybatería media§!, aumenta el §Yataque de cañón pesado§!, útil contra §Ybuques capitales§! enemigos."
 basic_medium_shell: "Proyectil perforante de mediano calibre con capa balística"
 basic_medium_shell_desc: "Al contar con una capa balística, los proyectiles tienen mejor aerodinámica sin que su capacidad perforante se vea afectada."
 improved_medium_shell: "Proyectil semiperforante de mediano calibre"
 improved_medium_shell_desc: "Este proyectil cuenta con un buen equilibrio entre perforación de blindaje y capacidad explosiva e inflige mucho más daño tras atravesar el débil blindaje de los buques ligeros."
 basic_heavy_battery: "Batería pesada básica"
 basic_heavy_battery_desc:1 "Esta gigantesca torreta alberga cañones enormes bajo un blindaje pesado. \n\nAl montar un módulo de §Ybatería pesada§!, aumenta el §Yataque de cañón pesado§! del buque, mejorando su rendimiento contra §Ybuques capitales§! enemigos."
 improved_heavy_battery: "Batería pesada mejorada"
 improved_heavy_battery_desc:1 "El atacador mecánico aumenta la velocidad de recarga de los cañones pesados, mientras que la puerta estanca mejora la seguridad. \n\nAl montar un módulo de §Ybatería pesada§!, aumenta el §Yataque de cañón pesado§! del buque, mejorando su rendimiento contra §Ybuques capitales§! enemigos."
 advanced_heavy_battery: "Batería pesada avanzada"
 advanced_heavy_battery_desc:1 "La mejora de los mecanismos de reducción del retroceso y de las bobinas de retardo disminuyen la interferencia de los proyectiles en el aire y aumentan la precisión de forma drástica. \n\nAl montar un módulo de §Ybatería pesada§!, aumenta el §Yataque de cañón pesado§! del buque, mejorando su rendimiento contra §Ybuques capitales§! enemigos."
 basic_heavy_shell: "Proyectil perforante con capa balística"
 basic_heavy_shell_desc: "Al contar con una capa balística, los proyectiles tienen mejor aerodinámica sin que su capacidad perforante se vea afectada."
 improved_heavy_shell:1 "Proyectil perforante superpesado"
 improved_heavy_shell_desc: "Estos enormes proyectiles de más de una tonelada cuentan con una potencia sin precedentes y suponen una amenaza incluso para los blindajes más pesados."
 secondary_battery_advice_tt: "\nUna §Ybatería secundaria§! permite que los §Ycruceros§! y §Ybuques pesados§! puedan enfrentarse a §Ybuques pantalla§! del enemigo como objetivos secundarios mientras infligen daño a otro objetivo."
 basic_secondary_battery: "Casamata con batería secundaria"
 basic_secondary_battery_desc:1 "Colocados en aberturas a lo largo de todo el casco, estos pequeños cañones proporcionan algo de defensa ante buques más pequeños, aunque su radio de acción es limitado.\n\nAl montar un módulo de §Ybatería secundaria§!, los §Ycruceros§!, §Yportaviones§! o §Ybuques pesados§! aumentan ligeramente el §Yataque de cañón ligero§! y pueden enfrentarse a un segundo objetivo."
 improved_secondary_battery: "Torreta con batería secundaria"
 improved_secondary_battery_desc:1 "Colocar los cañones secundarios en torretas motorizadas hace que su radio de acción aumente, pero también incrementa el peso y reduce la estabilidad en mar revuelto.\n\nAl montar un módulo de §Ybatería secundaria§!, los §Ycruceros§!, §Yportaviones§! o §Ybuques pesados§! aumentan ligeramente el §Yataque de cañón ligero§! y pueden enfrentarse a un segundo objetivo."
 dp_secondary_battery: "Batería secundaria de doble función"
 dp_secondary_battery_desc:1 "Colocar los cañones secundarios en torretas motorizadas hace que su radio de acción aumente, pero también incrementa el peso y reduce la estabilidad en mar revuelto.\n\nAl montar un módulo de §Ybatería secundaria§!, los §Ycruceros§!, §Yportaviones§! o §Ybuques pesados§! aumentan ligeramente el §Yataque de cañón ligero§! y pueden enfrentarse a un segundo objetivo. Este módulo también aumenta el §Yataque antiaéreo§!."
 damage_control_1: "Simulacros de incendios"
 damage_control_1_desc: "Todos los miembros de la tripulación de un buque, desde el capitán hasta el último marinero, deben ser capaces de ayudar a contener y extinguir los incendios a bordo."
 damage_control_2: "Colectores contraincendios separados"
 damage_control_2_desc: "Al separar las tuberías principales del buque, la probabilidad de que un impacto impida que el buque pueda hacer frente a un incendio es mucho menor."
 damage_control_3: "Bombas diésel de emergencia"
 damage_control_3_desc: "Como las bombas pesadas suelen depender de los motores principales, un único impacto en la sala de máquinas podría impedir que el buque se mantuviera a flote."
 fire_control_methods_1: "Encuadramiento"
 fire_control_methods_1_desc: "Para alcanzar al objetivo, el primer paso es encuadrarlo disparando varios cañones a la vez, hasta que los impactos se acerquen al objetivo por ambos lados."
 fire_control_methods_2: "Ráfaga escalonada"
 fire_control_methods_2_desc: "En vez de disparar por encima del objetivo y perder de vista el recorrido de los impactos tras el buque enemigo, los proyectiles se disparan cortos a propósito para medir la distancia entre el impacto y el blanco y calibrar correctamente el tiro."
 fire_control_methods_3: "Proyectiles tintados"
 fire_control_methods_3_desc: "Añadir pequeños paquetes con color al proyectil para que se coloree el blanco al impactar permite que el resto de buques ataquen al mismo objetivo sin confundirse por los disparos de unos u otros."
 fuel_silos: "Almacenamiento de combustible"
 fuel_silos_desc: "El almacenamiento masivo de combustible requiere un complejo sistema de tanques, tuberías y válvulas que garanticen su seguridad y su rápida disponibilidad."
 fuel_refining: "Refinado de combustible I"
 fuel_refining_desc: "Los avances en el craqueo químico permiten obtener combustibles más ligeros del petróleo."
 fuel_refining2: "Refinado de combustible II"
 fuel_refining2_desc: "Las mejoras en el diseño de las refinerías reducen el desperdicio de combustible."
 fuel_refining3: "Refinado de combustible III"
 fuel_refining3_desc: "Las mejoras en los métodos de reciclado permiten refinar combustible a partir de subproductos."
 fuel_refining4: "Refinado de combustible IV"
 fuel_refining4_desc: "Los nuevos avances en ingeniería química permiten refinar combustible a partir de nuevas fuentes."
 fuel_refining5: "Refinado de combustible V"
 fuel_refining5_desc: "Los nuevos métodos y las mejoras en el diseño de las refinerías aumentan significativamente la producción y reducen el desperdicio de combustible."
 scout_plane1: "Avión de reconocimiento I"
 scout_plane1_desc: "Reunir información sobre los movimientos de las tropas enemigas y facilitar informes de los despliegues navales del enemigo lleva siendo la misión inicial de los aviones desde su primer despliegue en la Primera Guerra Mundial, y sigue siendo una misión importante."
 scout_plane2: "Avión de reconocimiento II"
 scout_plane2_desc: "Al desarrollar aviones concretos para la vigilancia aérea y el reconocimiento a larga distancia, nos aseguramos de obtener y conservar una imagen precisa de las intenciones y capacidades de nuestro rival."
 SURRENDER_REDUCTION_TOOLTIP: "La colaboración en $COUNTRY|H$ reducirá su nivel de entrega en $VALUE|+%.0$"
 COLLABORATION_EFFECTS_TOOLTIP: "Tienes $COLLABORATION|+%.0$ de colaboración en $COUNTRY|H$. Esto reducirá su nivel de entrega en $SURRENDER|+%.0$ y otorgará un $COMPLIANCE|+%.0$ de cumplimiento cuando el enemigo ceda. Se usará para desbloquear más modificadores de cumplimiento."
 COLLABORATION_EFFECTS_OTHER_SIDE_TOOLTIP: "$OTHER_COUNTRY|H$ tiene $COLLABORATION|+%.0$ de colaboración en $COUNTRY|H$. Esto reducirá el nivel de entrega de $COUNTRY|H$ en $SURRENDER|+%.0$ y otorgará un $COMPLIANCE|+%.0$ de cumplimiento cuando el enemigo ceda. Se usará para desbloquear más modificadores de cumplimiento."
 train_tech: "Trenes y red ferroviaria"
 SUPPORT_TITLE_TRAINS: "Trenes"
 cat_production: "Producción"
 cat_synth_rubber: "Caucho sintético"
 cat_synth_oil: "Petróleo sintético"
 masterful_blitz: "Blitz perfecta"
 masterful_blitz_desc: "Puede que no hayamos inventado la Blitzkrieg, pero desarrollaremos y refinaremos esta estrategia para que ni las líneas defensivas enemigas más fortificadas puedan detener el avance de nuestro glorioso ejército."
 penal_infantry: "Batallones penales"
 penal_infantry_desc: "Los batallones penales dan a los soldados y oficiales convictos del Ejército Rojo la oportunidad de sacrificarse por la Madre Patria y redimirse de sus actos vergonzosos o deshonrosos del pasado."
 chemical_attack_tech: "Guerra química"
 upgraded_infantry_weapons1: "Tirador designado integrado"
 upgraded_infantry_weapons1_desc: "La integración de tiradores en todos los escuadrones proporcionará a nuestra infantería fuego rápido y preciso sobre objetivos enemigos a largas distancias."
 upgraded_infantry_weapons2: "Armas de explosión aérea"
 upgraded_infantry_weapons2_desc: "Las municiones de explosión aérea son municiones explosivas antipersonal que detonan en el aire. Las armas ligeras de explosión aérea facilitan que nuestra infantería alcance a soldados enemigos a cubierto o, generalmente, fuera del alcance del armamento convencional."
 upgraded_infantry_weapons3: "Campo de batalla integrado"
 upgraded_infantry_weapons3_desc: "Al conectar el mundo digital y el físico, nuestros soldados tendrán una conciencia situacional y una cohesión de combate sin precedentes. Gracias a los nuevos sistemas HUD, el equipo de designación ubicuo y la tecnología de drones, el campo de batalla no tendrá ningún obstáculo insuperable."
 infantry_rifle_upgrade: "Sistema de fijación de rieles"
 infantry_rifle_upgrade_desc: "El término \"sistema de fijación de rieles\" se refiere a un sistema de rieles estandarizado para la fijación de accesorios a armas de fuego ligeras, como pistolas, rifles y ametralladoras ligeras."
 infantry_rifle_upgrade2: "Ópticas mejoradas"
 infantry_rifle_upgrade2_desc: "Una mira holográfica es una clasificación común para un tipo de mira reflectora sin aumento para armas de fuego y otros dispositivos que requieren apuntar, que proporciona al usuario un punto de mira en forma de un punto rojo iluminado. Un diseño estándar utiliza un diodo emisor de luz roja en el foco de la óptica de colimación, que genera una retícula iluminada de tipo punto que se mantiene alineada con el arma a la que está fijada la mira, independientemente de la posición del ojo."
 infantry_rifle_upgrade3: "Ópticas avanzadas"
 infantry_rifle_upgrade3_desc: "Una mira réflex es un dispositivo óptico que permite al usuario mirar a través de un elemento de cristal parcialmente reflectante y ver una proyección iluminada de un punto de mira u otra imagen superpuesta en el campo de visión. Estas miras funcionan según el simple principio óptico de que cualquier objeto en el foco de una lente o espejo curvo parecerá estar frente al espectador en el infinito."
 infantry_rifle_upgrade4: "Ópticas térmicas"
 infantry_rifle_upgrade4_desc: "Una mira telescópica térmica o visor telescópico de infrarrojos es un dispositivo de puntería que combina una cámara termográfica compacta y una retícula. Se puede montar en diversas armas ligeras, así como en algunas armas más pesadas."
 infantry_rifle_upgrade5: "Sistema de rieles duradero"
 infantry_rifle_upgrade5_desc: "Los rieles más duraderos garantizan una mayor durabilidad de estos sistemas en condiciones adversas."
 infantry_rifle_upgrade6: "Computadora balística integrada"
 infantry_rifle_upgrade6_desc: "Varias computadoras balísticas estándar, entregadas a todos los escuadrones de primera línea, aumentarán su letalidad a distancia."
 infantry_rifle_upgrade7: "Etiquetas RFID"
 infantry_rifle_upgrade7_desc: "Los chips que transmiten información inalámbrica ofrecen a nuestros soldados una ventaja contra las municiones guiadas."
 infantry_rifle_upgrade8: "Gafas de Realidad Aumentada"
 infantry_rifle_upgrade8_desc: "Las gafas de RA integradas otorgan a nuestros soldados un nivel de conocimiento del campo de batalla sin precedentes."
 infantry_rifle_upgrade9: "Armas guiadas por láser"
 infantry_rifle_upgrade9_desc: "Usando granadas guiadas por láser desde lanzadores, proyectiles de alto calibre y cohetes portátiles de pequeña escala, la forma de librar batallas cambiará para siempre."
 support_weapons: "Armas de apoyo de la Guerra Fría"
 support_weapons_desc: "Desarrolladas durante la Guerra Fría, estas armas de apoyo siguen siendo muy útiles para apoyar a los escuadrones de soldados, pero presentan deficiencias en comparación con sus equivalentes modernos."
 support_weapons2: "Ametralladoras de escuadrón"
 support_weapons2_desc: "Las ametralladoras de escuadrón del siglo XXI abarcan desde ametralladoras ligeras hasta rifles de servicio regulares modificados, siendo la capacidad de desplegar fuego rápido en apoyo de un escuadrón el factor clave."
 support_weapons3: "Armas de apoyo modernas"
 support_weapons3_desc: "Con los avances en armas modulares, las ametralladoras de escuadrón se pueden ajustar para adaptarse a una situación cambiante de manera más efectiva."
 support_weapons4: "Armas antitanques mejoradas"
 support_weapons4_desc: "En la guerra moderna, un soldado tiende a ser más peligroso para un tanque que otro tanque."
 support_weapons5: "Fusil Automático de Infantería"
 support_weapons5_desc: "En lugar de depender de un solo miembro de un escuadrón para proporcionar potencia de fuego rápida, cada miembro podría estar equipado con armas capaces de proporcionar la potencia de fuego requerida para cualquier situación que surja."
 support_weapons6: "Logística asistida por robots"
 support_weapons6_desc: "Si bien la robótica moderna aún depende en gran medida de la operación humana, recursos como las mulas robóticas pueden resultar útiles en una función logística."
 support_weapons7: "IA de combate autodidacta"
 support_weapons7_desc: "Una IA de combate no solo entrenada con una vasta base de datos antes del despliegue sino que con la capacidad de aprender de una situación de combate en marcha puede hacer cualquier sistema de armas bajo su control más letal de lo que cualquier humano pudiese aspirar."
 support_weapons8: "Apoyo de combate robótico"
 support_weapons8_desc: "Asistentes de IA autónomos e inteligentes actuando al unísono (e incluso de forma independiente) con soldados humanos parece ser el siguiente paso lógico en la evolución de la guerra."
 night_vision: "Visión nocturna de 1º generación"
 night_vision_desc: "Desarrollada originalmente en los años 60, los dispositivos de visión nocturna de primera generación eran montadas en las armas como miras, y dependían de la luz de la luna para funcionar."
 night_vision2: "Visión nocturna de 2º generación"
 night_vision2_desc: "Desarrollada a partir de los años 70, los dispositivos de visión nocturna de segunda generación crecieron en tamaño, lo que resultó en que su montaje en los cascos se hiciese más común. Los avances en la tecnología de visión nocturna también permitió su uso sin luz lunar."
 night_vision3: "Visión nocturna de 3º generación"
 night_vision3_desc: "En desarrollo desde finales de los 80, los dispositivos de visión nocturna de tercera generación mejoraron mucho respecto a sus predecesores."
 night_vision4: "Visión nocturna de 3º generación+"
 night_vision4_desc: "Desarrollada en los años 2000, la \"tercera generación plus\" indica que el equipo de visión nocturna de tercera generación han sido mejorados hasta al grado que han sobrepasado los requerimientos iniciales para dicho equipamiento."
 night_vision5: "GVNM-B"
 night_vision5_desc: "\"Gafas de visión nocturna binoculares mejoradas\" hace referencia a una serie de gafas de visión nocturna que utilizan visión nocturna de fusión, que combina la intensificación de la imagen y visión térmica."
 night_vision6: "Visión nocturna de 4º generación"
 night_vision6_desc: "Más avances en la tecnología de visión nocturna ha permitido la creación del más reciente equipamiento de visión nocturna de cuarta generación."
 body_armor: "Armadura de nailon balístico"
 body_armor_desc: "Desarrollada originalmente para los chalecos antibalas de la Segunda Guerra Mundial, la armadura hecha de nailon balístico protege a sus usuarios de los escombros y la fragmentación."
 body_armor2: "Armadura de Kevlar"
 body_armor2_desc: "Introducido a mediados de la década de 1970, el Kevlar es una fibra sintética que se utiliza a menudo para armadura, incluyando chalecos antibalas, cascos e incluso guantes."
 body_armor3: "Armadura de cerámica"
 body_armor3_desc: "Al incorporar placas balísticas al chaleco antibalas, se pueden proteger partes críticas del cuerpo con mayor eficiencia que con simple Kevlar."
 body_armor4: "Armadura moderna"
 body_armor4_desc: "Combinando todos los aspectos de los desarrollos anteriores en materia de chalecos antibalas, los chalecos antibalas modernos son capaces de salvar las vidas de soldados de maneras nunca antes posibles."
 body_armor5: "Armadura de polietileno"
 body_armor5_desc: "Una alternativa más ligera a la cerámica, el polietileno es un potente sustituto para el soldado moderno y sus necesidades."
 body_armor6: "Exoesqueleto motorizado temprano"
 body_armor6_desc: "Aunque es rudimentario y algo engorroso, el primer exoesqueleto motorizado otorga a sus usuarios la fuerza para transportar más equipamiento, armamento y protección."
 body_armor7: "Hiperaleación"
 body_armor7_desc: "Lo mejor de la armadura corporal militar, un chasis de combate de hiperaleación proporciona a los soldados una amplia protección contra lesiones de cualquier origen."
 body_armor8: "Exoesqueleto motorizado avanzado"
 body_armor8_desc: "Las experiencias de los usuarios y los avances tecnológicos han producido un tipo avanzado de exoesqueleto motorizado, con menos desventajas y más ventajas en comparación con sus versiones anteriores."
 camouflage: "Uniformes camuflados"
 camouflage_desc: "Uniforme básico con distintos tipos de camuflaje para ocultar a los soldados en su entorno."
 camouflage2: "MultiCam"
 camouflage2_desc: "Diseñado en 2002, MultiCam ha sido adoptado por muchos ejércitos en todo el mundo debido a su alta eficacia."
 camouflage3: "Camuflajes modernos"
 camouflage3_desc: "Con la mayor cantidad de equipos y un cambio en las tácticas operativas, los uniformes modernos brindan a quienes los usan una mayor capacidad de carga y flexibilidad."
 camouflage4: "Patrones de camuflaje mejorados"
 camouflage4_desc: "A medida que evolucionan los medios de detección en el campo, también lo hacen los tipos de camuflaje utilizados."
 camouflage5: "Patrones de camuflaje futuristas"
 camouflage5_desc: "A medida que cambia el concepto de patrón de camuflaje en el uso militar, el futuro de los patrones de camuflaje se está alejando lentamente de los patrones de tela hacia dispositivos electrónicos diseñados para ese fin."
 camouflage6: "Camuflaje activo"
 camouflage6_desc: "Combinando lecciones de la guerra y la naturaleza con los últimos avances tecnológicos, el camuflaje activo otorga a sus usuarios una forma de adaptarse a cualquier cambio de escenario sobre la marcha."
 tech_combat_engineers: "Zapadores"
 tech_combat_engineers_desc: "Ingenieros entrenados para operar en el frente, prestando sus servicios a otras unidades que los necesiten."
 basic_railway: "Sistema ferroviario básico"
 basic_railway_desc: "Los conceptos básicos de un sistema ferroviario, cruciales para cualquier logística de larga distancia."
 forward_operating_base: "Base de operaciones avanzada"
 forward_operating_base_desc: "Una base de operaciones avanzada funciona como un lugar donde las fuerzas militares concentran servicios como logística, mantenimiento, hospitales y más."
 improved_rail_network: "Red ferroviaria mejorada"
 improved_rail_network_desc: "Una buena red ferroviaria también debe tener en cuenta las necesidades militares."
 improved_logistical_hub: "Centros logísticos mejorados"
 improved_logistical_hub_desc: "Con la adaptación de la automatización y la robótica, los centros logísticos modernos pueden atender de forma rápida y eficiente a cualquier unidad en sus proximidades."
 train_equipment_3: "Tren de carga blindado"
 tech_thermobaric_weapons: "Armas termobáricas"
 tech_thermobaric_weapons_desc: "Una arma termobárica, también llamada bomba de aerosol o bomba de vacío, es un tipo de munición explosiva que funciona al dispersar una nube de gas, líquido o explosivos enriquecidos. Son especialmente efectivas contra posiciones defensivas como trincheras y búnkeres. O más bien, contra sus ocupantes."

l_spanish:
 NAVAL_TITLE_MINES: "GUERRA DE MINAS"
 basic_naval_mines: "Mina de contacto"
 basic_naval_mines_desc: "Una simple bomba flotante anclada al suelo marino que explotará al entrar en contacto con un buque."
 improved_naval_mines: "Mina acústica"
 improved_naval_mines_desc: "Esta sofisticada mina explota al detectar los cambios en el campo magnético que emite el buque que pase."
 advanced_naval_mines: "Mina acústica"
 advanced_naval_mines_desc: "Este tipo de mina naval detona cuando sus sensores detectan el ruido de un buque cercano."
 modern_naval_mines: "Mina de presión"
 modern_naval_mines_desc: "Esta avanzada mina detecta pequeños cambios en la presión del agua causados por el buque que pase cerca."
 degaussing: "Medidas antiminas"
 degaussing_desc: "Al instalar potentes bobinas electromagnéticas, podemos reducir significativamente la firma magnética de un buque, por lo que sería menos vulnerable a las minas magnéticas."
 submarine_mine_laying: "Submarino colocador de minas"
 submarine_mine_laying_desc: "Con un equipo especial para llevar y soltar minas, un submarino puede desplegar minas bajo el mar y, con suerte, sin que lo detecten."
 improved_submarine_mine_laying: "Despliegue de minas con tubo lanzatorpedos"
 improved_submarine_mine_laying_desc: "Si rediseñamos las minas para meterlas en tubos lanzatorpedos, cualquier submarino podría colocar minas. Eso sí, a costa de sacrificar torpedos."
 airdrop_mines: "Colocación aérea de minas"
 airdrop_mines_desc: "Si instalamos un pequeño paracaídas en las minas, podríamos soltarlas desde los aviones de forma segura y crear campos de minas de manera rápida y eficaz."
 airsweep_mines: "Eliminación aérea de minas"
 airsweep_mines_desc: "Podemos instalar equipo especial en los aviones para que detecten las minas navales desde el aire y detonarlas sin correr riesgos."
 naval_mines: "Tecnologías de guerra de minas"
 concentrated_industry_category: "Tecnologías de industria concentrada"
 dispersed_industry_category: "Tecnologías de industria dispersa"
 NAVAL_TITLE_ARMAMENT: "ARMAMENTO"
 NAVAL_TITLE_DAMAGE_CONTROL: "CONTROL DE DAÑO"
 NAVAL_TITLE_FIRE_CONTROL: "MÉTODOS DE CONTROL DE INCENDIOS"
 early_ship_hull_carrier: "Casco de portaaviones (2000)"
 early_ship_hull_carrier_short: "Casco de portaaviones (2000)"
 early_ship_hull_nuclear_submarine: "Casco de submarino nuclear (2000)"
 early_ship_hull_nuclear_submarine_short: "Casco de submarino nuclear (2000)"
 advanced_ship_hull_nuclear_submarine: "Casco de submarino nuclear (2024)"
 advanced_ship_hull_nuclear_submarine_short: "Casco de submarino nuclear (2024)"
 early_ship_hull_carrier_desc: ""
 cruiser_submarines: "Casco de submarino crucero"
 coastal_defense_ships: "Buques de defensa costera"
 basic_ship_hull_heavy: "Casco de crucero de misil (2020)"
 basic_ship_hull_heavy_short: "Casco de crucero de misil (2020)"
 basic_ship_hull_cruiser: "Casco de destructor (2020)"
 basic_fire_control_system: "Sistema básico de control de disparo"
 basic_fire_control_system_desc: "Los cañones navales modernos requieren mayor guía que los antiguos debido a su largo alcance. Este sistema busca ofrecer un buen equilibrio entre precisión y fiabilidad."
 improved_fire_control_system: "Sistema mejorado de control de disparo"
 improved_fire_control_system_desc: "La importante integración digital de los sistemas de armas y de detección proporciona una ventaja en la cantidad de información que se puede adquirir."
 advanced_fire_control_system: "Sistema avanzado de control de disparo"
 advanced_fire_control_system_desc: "Los sistemas de detección y orientación están integrados para permitir la fijación independiente del objetivo del misil tras el lanzamiento. Esto permite una mayor precisión del misil a distancias extremas."
 near_future_fire_control_system: "Sistema de control de disparo semifuturista"
 near_future_fire_control_system_desc: "Software actualizado que recopila toda la información de detección y selección de objetivos para un grupo de combate naval. Esto facilita la comunicación al permitir que los participantes vean en pantalla la actividad de cada buque aliado."
 future_fire_control_system: "Sistema de control de disparo futurista"
 future_fire_control_system_desc: "Los sistemas de mapeo y avistación tridimensionales brindan mayor claridad a las fuerzas que participan en el combate naval."
 sonar: "Sónar pasivo"
 sonar_desc:1 "Un conjunto básico de hidrófonos permite seguir el rastro de objetivos bajo el agua gracias al sonido que producen.\n\nSi este módulo se monta en una §Yranura de electrónica§! o en §Ybuques ligeros§! o §Ycruceros§!, estos podrán detectar mejor los §Ysubmarinos§! enemigos."
 improved_sonar: "Sonar activo"
 improved_sonar_desc:1 "A través de unas ondas sonoras moduladas, este sistema puede medir con exactitud la dirección y la distancia de un objetivo sumergido.\n\nSi este módulo se monta en una §Yranura de electrónica§! o en §Ybuques ligeros§! o §Ycruceros§!, estos podrán detectar mejor los §Ysubmarinos§! enemigos."
 advanced_sonar: "Sonar avanzado"
 advanced_sonar_desc:1 "A través de unas ondas sonoras moduladas, este sistema puede medir con exactitud la dirección y la distancia de un objetivo sumergido. Una gran mejora a comparación de modelos anteriores.\n\nSi este módulo se monta en una §Yranura de electrónica§! o en §Ybuques ligeros§! o §Ycruceros§!, estos podrán detectar mejor los §Ysubmarinos§! enemigos."
 smoke_generator: "Contramedidas electrónicas"
 smoke_generator_desc: "Las contramedidas electrónicas en un buque pueden interrumpir el radar y las comunicaciones del enemigo, dificultando su rastreo y ataque. Esta capacidad permite al buque evadir la detección y facilitar una retirada más segura del combate."
 depth_charges_advice_tt: "\nAll montar un módulo de §Ycarga de profundidad§! en §Ycorbetas§!, §Ydestructores§! y §Ysubmarinos§!, estos podrán atacar §Ysubmarinos§! enemigos."
 sonar_advice_tt: "\nAll montar un módulo de §Ysonar§! en §Ycorbetas§!, §Yfrigatas§!, §Ydestructores§! y §Ycruceros§!, estos podrán detectar §Ysubmarinos§! enemigos."
 basic_depth_charges: "Cargas de profundidad básicas"
 basic_depth_charges_desc:1 "Un contenedor explosivo sencillo con un detonador sensible a la presión que explota al alcanzar una profundidad determinada."
 improved_depth_charges: "Lanzador de cargas de profundidad"
 improved_depth_charges_desc:1 "Un dispositivo mecánico sencillo que lanza una carga de profundidad a una distancia concreta del buque. Esto quiere decir que el destructor ya no tiene que navegar hasta el objetivo para alcanzarlo."
 advanced_depth_charges: "Mortero de cargas de profundidad"
 advanced_depth_charges_desc:1 "Los destructores con mortero pueden lanzar cargas explosivas a distancias mucho mayores, lo que les permite mantener al submarino enemigo en el sonar durante todo el ataque y aumentar la precisión de forma significativa."
 modern_depth_charges: "Mortero de cargas de profundidad mejorado"
 modern_depth_charges_desc:1 "El aumento de la carga propulsora permite lanzar una carga de profundidad desde gran distancia hasta la profundidad exacta a la que se encuentra el submarino."
 near_future_depth_charges: "Cargas de profundidad inteligentes"
 near_future_depth_charges_desc:1 "Al convertir la tradicional carga de profundidad en lo que esencialmente es un torpedo teledirigido, la capacidad de localizar y alcanzar con éxito un objetivo aumentará notablemente."
 future_depth_charges: "Cargas de profundidad nucleares"
 future_depth_charges_desc:1 "Al reemplazar las ojivas convencionales por ojivas nucleares pequeñas, o a veces grandes, el radio de explosión y el daño se multiplicarán considerablemente. Tenga en cuenta que son costosas y que el esfuerzo podría no merecer la pena si no es en tiempos de gran desesperación."
 improved_airplane_launcher: "Helicóptero de patrulla polivalente"
 improved_airplane_launcher_desc:1 "Un helicóptero de patrulla versátil con sensores mejorados ofrece una notable ventaja en la detección.\n\nSi este módulo se monta en §Yfrigatas§!, §Ydestructores§! o §Ycruceros de misil§!, estos podrán detectar mejor los barcos enemigos."
 airplane_launcher_advice_tt: "\nSi se estaciona un modúlo de §Yhelicóptero§! en §Ydestructores§!, §Yfrigatas§! y §Ycruseros§!, estos podrán detectar mejor los buques enemigos."
 cruiser_advice_tt: "\nLos §Ydestructores§! y las §Yfragatas§! se definen por sus §Yarmamentos§! diferentes: las fragatas solo tienen armas navales ligeras y los destructores tienen al menos un sistema de armas pesadas."
 cruiser_armor_advice_tt: "\nAl montar un módulo de mejor §Yblindaje§! en §Ydestructores§! y §Yfrigatas§!, mejora su capacidad para soportar daños."
 heavy_armor_advice_tt: "\nAl montar un módulo de mejor §Yblindaje§! en §Ybuques pesados§!, mejora su capacidad para soportar daños. Los §Ycruceros de misiles§! y los §Yclípers§! se definen por sus §Yesquemas de blindaje§! diferentes, y los clípers suelen tener peor blindaje."
 basic_cruiser_armor_scheme: "Esquema de blindaje de destructor básico"
 basic_cruiser_armor_scheme_desc:1 "Los esquemas de armadura espaciada simple permiten protección adicional sin la necesidad de placas gruesas en todo su recorrido."
 improved_cruiser_armor_scheme: "Esquema de blindaje de destructor mejorado"
 improved_cruiser_armor_scheme_desc:1 "Las placas angulares agregadas dentro de la armadura espaciada aumentan las defensas sin aumentar el volumen."
 advanced_cruiser_armor_scheme: "Esquema de blindaje de destructor todo o nada"
 advanced_cruiser_armor_scheme_desc:1 "Este esquema se centra solo en proteger las partes esenciales del barco, ignorando las menos importantes."
 near_future_cruiser_armor_scheme: "Esquema de blindaje de destructor con CIWS"
 near_future_cruiser_armor_scheme_desc:1 "Los sistemas de armamento de proximidad brindarán protección activa destruyendo los misiles entrantes, además del esquema de blindaje estándar para defenderse de ataques evadidos."
 future_cruiser_armor_scheme: "Esquema de blindaje de destructor avanzado"
 future_cruiser_armor_scheme_desc:1 "Utilizando compuestos avanzados de metales y materiales sintéticos, se puede mejorar la armadura del barco sin aumentar significativamente el peso."
 basic_heavy_armor_scheme: "Esquema de blindaje espaciado mejorado"
 basic_heavy_armor_scheme_desc:1 "Las placas angulares agregadas dentro de la armadura espaciada aumentan las defensas sin aumentar el volumen. Con revestimientos de Kevlar, se mitigará la fuerza de fragmentación de las explosiones masivas."
 improved_heavy_armor_scheme: "Esquema de blindaje todo o nada"
 improved_heavy_armor_scheme_desc:1 "Este esquema se centra solo en proteger las partes esenciales del barco, ignorando las menos importantes."
 near_future_heavy_armor_scheme: "Esquema de blindaje compuesto avanzado"
 near_future_heavy_armor_scheme_desc:1 "Utilizando compuestos avanzados de metales y materiales sintéticos, se puede mejorar la armadura del barco sin aumentar significativamente el peso."
 torpedo_advice_tt: "\nAl montar §Ylanzatorpedos§! en §Ycorbetas§!, §Yfrigatas§!, o en §Ycruceros§!, estos pueden provocar bastante daño a §Ybuques capitales§! enemigos en la §Ylínea de batalla§! si pueden superar el §Ygrupo pantalla§! enemigo."
 snorkel_advice_tt: "\nAl montar §Ysistemas de sigilo§! en los §Ysubmarinos§!, se reduce drásticamente su §Yvisibilidad§!, haciendo que a los barcos enemigos les cueste más verlos y atacarlos."
 basic_torpedo: "Torpedos modernos"
 basic_torpedo_desc:1 "Un arma autopropulsada con una cabeza explosiva que sigue una trayectoria predeterminada hasta que alcanza al objetivo por debajo de la línea de flotación."
 magnetic_detonator: "Ojivas cavitantes"
 magnetic_detonator_desc: "Una ojiva cavitante detona bajo el buque objetivo. Una explosión justo debajo del buque causa mucho más daño y suele romper la quilla del objetivo, hundiéndolo al instante."
 homing_torpedo: "Guiancia por sonar pasivo"
 homing_torpedo_desc: "Los avances en sistemas de sonar pasivo ahora pueden integrarse en los diseños actuales de torpedos. Esto aumenta la precisión y permite un seguimiento más eficiente del objetivo."
 electric_torpedo: "Misil balístico de alcance medio"
 electric_torpedo_desc: "Permite que el submarino realize §RATAQUES NUCLEARES§!."
 improved_ship_torpedo_launcher: "Lanzatorpedos mejorado"
 improved_ship_torpedo_launcher_desc:1 "Los motores son más potentes, lo que permite instalar más tubos en una misma torreta y apuntarlos hacia el objetivo en menos tiempo."
 advanced_ship_torpedo_launcher: "Lanzatorpedos avanzado"
 advanced_ship_torpedo_launcher_desc:1 "Unos tubos de mayor diámetro aceptan torpedos más grandes con cabezas explosivas más pesadas."
 modern_ship_torpedo_launcher: "Lanzatorpedos moderno"
 modern_ship_torpedo_launcher_desc:1 "Las potentes cargas de aire comprimido permiten lanzar torpedos más pesados a más velocidad."
 near_future_ship_torpedo_launcher: "Lanzatorpedos semiautómata"
 near_future_ship_torpedo_launcher_desc:1 "Al permitir que la IA trace cursos y marque objetivos, se puede aliviar la carga de la tripulación."
 future_ship_torpedo_launcher: "Torpedos supercavitante"
 future_ship_torpedo_launcher_desc:1 "Un torpedo supercavitante es un torpedo que utiliza el efecto de la supercavitación para crear una burbuja alrededor del torpedo para moverse a alta velocidad bajo el agua."
 basic_submarine_snorkel: "Sistemas de sigilo básicos"
 basic_submarine_snorkel_desc:1 "Los tornillos han sido finamente elaborados para producir el menor sonido posible."
 improved_submarine_snorkel: "Sistemas de sigilo mejorados"
 improved_submarine_snorkel_desc:1 "Al usar placas anecoicas, el perfil sonar del submarino se reduce considerablemente. Esto se logra aplicando una lámina de goma con pequeños huecos. Las ondas sonares activas se absorben fácilmente a distancias largas y medias."
 advanced_submarine_snorkel: "Sistemas de sigilo avanzados"
 advanced_submarine_snorkel_desc:1 "Al usar un revestimiento de casco ultrasecreto y sistemas de reducción de ruido interior, el submarino será lo más silencioso posible."
 light_battery_advice_tt: "\n\nAl montar módulos de §Ybatería ligera§! en §Ycorbetas§!, §Yfrigatas§! y §Ydestructores§!, mejora su §Yataque de cañón ligero§!, que ayuda a destruir los §Ybuques pantalla§! enemigos. Las §Ybaterías ligeras§! no suelen ser efectivas contra barcos blindados, como §Yfrigatas§!, §Ydestructores§!, y §Ycruceros§!."
 medium_battery_advice_tt: "\n\nAl montar los módulos de §Yartillería naval§! o §Ysistema de lanzamiento vertical§! en los §Ydestructores§!, mejora su §Yataque de cañón ligero§! o el §Yataque de cañón pesado§!, permitiéndoles luchar contra §Ybuques pantalla§! o §Ybuques capitales§!. Al montar una §Ysistema de lanzamiento vertical§!, ese barco será un §Ydestructor§!; sin embargo, al montar únicamente la §Yartillería naval§!, será una §Yfrigata§!."
 heavy_battery_advice_tt: "\n\nAl montar módulos de §Ysistema de lanzamiento vertical de 32/40 celdas§!, aumenta el §Yataque de cañón pesado§! de los §Ycruceros§!, de modo que pueden enfrentarse a §Ybuques capitales§! enemigos y destruirlos. Los §Ysistema de lanzamiento vertical grandes§! suelen ser menos efectiva contra navíos pequeños, como §Ybuques ligeros§! y §Yfrigatas§!."
 basic_battery: "Armamento naval moderno"
 basic_battery_desc: "Armamentos básicos para buques de la era moderna."
 basic_light_battery: "Batería ligera básica"
 basic_light_battery_desc:1 "Un cañón antibuque sencillo y de bajo nivel alojado en una caja semicerrada."
 improved_light_battery: "Batería ligera mejorada"
 improved_light_battery_desc:1 "Una batería mejorada con una carcasa cerrada y un cañón mejorado."
 advanced_light_battery: "Batería ligera avanzada"
 advanced_light_battery_desc:1 "Un arma bateria de tiro rápido, diseñada para combates a corta distancia. Mucho mejor que modelos anteriores."
 near_future_light_battery: "Batería ligera semifuturista"
 near_future_light_battery_desc:1 "Una pequeña bateria multiusos con integración digital avanzada."
 future_light_battery: "Batería ligera futurista"
 future_light_battery_desc:1 "Las municiones enormemente mejoradas disparadas por este cañón totalmente integrado digitalmente proporcionarán una destrucción sin igual de naves pequeñas y sin blindaje."
 basic_light_shell: "Fragmentación mejorada de pequeño calibre"
 basic_light_shell_desc: "Cargas altamente explosivas mejoradas con vainas de fragmentación mejoradas. Aumenta el daño a buques ligeros y sin blindaje."
 improved_light_shell: "Municiones programables de pequeño calibre"
 improved_light_shell_desc: "Municiones polivalentes con capacidad de detonación por aire y penetración. Esto permite al operador elegir el tipo de detonación adecuado según el objetivo."
 basic_medium_battery: "Armamentos intermedios básicos"
 basic_medium_battery_desc:1 "El pan de cada día de los buques de escolta modernos. Con un enfoque en armas ligeras pero potentes, las fragatas y destructores modernos maniobran con la misma eficacia que combaten."
 improved_medium_battery: "Armamentos intermedios mejorados"
 improved_medium_battery_desc:1 "Mejores puertos de escape de misiles y un almacenamiento de munición interno mejorado proporcionan un uso de armas más eficiente y seguro en nuestros buques de escolta."
 advanced_medium_battery: "Armamentos intermedios avanzados"
 advanced_medium_battery_desc:1 "La recarga automatizada de la artillería naval y las cámaras modulares de misiles de crucero aumentan aún más la rápida letalidad de las fragatas y los destructores."
 near_future_medium_battery: "Armamentos intermedios semifuturistas"
 near_future_medium_battery_desc:1 "Con un mayor enfoque en el ahorro de espacio, estos sistemas de armas actualizados consolidan sus procesos mecánicos y reducen aún más la complejidad."
 future_medium_battery: "Armamentos intermedios futuristas"
 future_medium_battery_desc:1 "El almacenamiento interno automatizado de misiles de crucero supone un cambio de paradigma significativo en la guerra naval moderna. Al transportar más misiles y municiones programables para la artillería, el buque moderno se convierte en un auténtico arsenal flotante."
 basic_medium_shell: "Composición explosiva mejorada"
 basic_medium_shell_desc: "Una nueva configuración explosiva aumentará el daño de todos los cañones medianos y misiles ligeros."
 improved_medium_shell: "Detonación retardada inteligente"
 improved_medium_shell_desc: "Gracias a un nuevo algoritmo y sensores mejorados, el daño infligido a los objetivos será más significativo."
 basic_heavy_battery: "VLS de crucero básico"
 basic_heavy_battery_desc:1 "Un bloque masivo de celdas para almacenar misiles terrestres y antibuque."
 improved_heavy_battery: "VLS de crucero mejorado"
 improved_heavy_battery_desc:1 "Un bloque con estructura reforzado reduce el desgaste a largo plazo y aumenta la fiabilidad de los lanzamientos."
 advanced_heavy_battery: "VLS de crucero avanzado"
 advanced_heavy_battery_desc:1 "Un modo de lanzamiento caliente reduce la complejidad al permitir que los misiles se propulsen fuera del bloque, en lugar del método de lanzamiento frío que utiliza presión de gas para expulsar los misiles antes del encendido."
 near_future_heavy_battery: "VLS de crucero semifuturista"
 near_future_heavy_battery_desc:1 "Los diseños de misiles de crucero de alto empuje cerrarán la brecha mucho más rápido que los modelos anteriores."
 future_heavy_battery: "VLS de crucero futurista"
 future_heavy_battery_desc:1 "El almacenamiento interno automatizado de misiles de crucero supone un cambio de paradigma significativo en la guerra naval moderna. Los cruceros ahora pueden transportar y disparar más misiles que en ningún otro momento de la historia. Una gran descarga de misiles aumenta la probabilidad de impactar."
 basic_heavy_shell: "Cohetes multietapas"
 basic_heavy_shell_desc: "Los nuevos tipos de misiles utilizarán un cohete propulsor temporal para facilitar su despliegue. Esto acelera considerablemente la velocidad del misil."
 improved_heavy_shell:1 "Carga mejorada"
 improved_heavy_shell_desc: "Una mayor capacidad de explosivos en los armazones de misiles más nuevos y robustos proporcionará un poder devastador a los misiles modernos."
 secondary_battery_advice_tt: "\nUn §Ysistema de armas secundario§! permite que §Yfrigatas§!, §Ydestructores§!, y §Ybarcos pesados§! puedan enfrentarse a §Ybuques pantalla§! del enemigo como objetivos secundarios mientras infligen daño a otro objetivo. Estos sistemas también pueden ser montados en §Ycruceros§!."
 basic_secondary_battery: "Misiles secundarios antibuque"
 basic_secondary_battery_desc:1 "Utilizando un cañón de 20 mm con torreta y misiles guiados, este sistema permite el ataque independiente de barcos pequeños, aparte de los sistemas de armas principales."
 improved_secondary_battery: "Misiles secundarios antibuque mejorados"
 improved_secondary_battery_desc:1 "Con misiles mejorados, los sistemas de misiles secundarios ahora pueden destruir objetivos más rápido que las generaciones anteriores."
 dp_secondary_battery: "Sistema de armas secundario de doble función"
 dp_secondary_battery_desc:1 "Al añadir una ojiva multipropósito a los diseños de misiles tierra-aire existentes, estas armas ahora pueden infligir daños significativos a los buques enemigos con la misma facilidad. También se ha finalizado el desarrollo de un proyectil de diseño similar para los cañones ligeros existentes."
 near_future_secondary_battery: "Misiles secundarios antibuque semifuturistas"
 near_future_secondary_battery_desc:1 "Los diseños de misiles de alto empuje facilitan el lanzamiento de cargas útiles mucho mayores. Estos misiles estrictamente antibuque son rápidos y bulbosos."
 future_secondary_battery: "Sistema de armas secundario de doble función"
 future_secondary_battery_desc:1 "Las municiones programables permiten no sólo contar con ojivas polivalentes, sino también con patrones explosivos y técnicas de evasión adaptados digitalmente."
 damage_control_1: "Mantenimiento preventivo"
 damage_control_1_desc: "El mantenimiento preventivo en un buque de guerra moderno es esencial para el control de daños, garantizando el funcionamiento óptimo de los sistemas y reduciendo el riesgo de averías en momentos críticos. Las inspecciones periódicas y la sustitución de piezas minimizan el riesgo de incendios, inundaciones o averías, mejorando así la seguridad del buque y su preparación para el combate en entornos hostiles."
 damage_control_2: "Software de control de daño"
 damage_control_2_desc: "Las computadoras y el software son esenciales para el control de daños en buques de guerra, ya que ofrecen monitoreo, diagnóstico y respuestas automatizadas en tiempo real. Monitorean las condiciones, detectan problemas como incendios o inundaciones, y mejoran la comunicación y el conocimiento de la situación, lo que aumenta la supervivencia del buque."
 damage_control_3: "Simulaciones virtuales de control de daños"
 damage_control_3_desc: "Los programas de formación avanzados y las simulaciones virtuales preparan a la tripulación para emergencias reales, permitiéndoles practicar en diversos escenarios. Esta evolución se centra en mejorar la preparación y la coordinación humanas, cruciales para un control de daños eficaz."
 fire_control_methods_1: "Sistema digital avanzado"
 fire_control_methods_1_desc: "Los sistemas avanzados de control de tiro mejoran la precisión del fuego naval al integrar datos de radar y GPS para una orientación precisa. Se ajustan automáticamente al movimiento del buque, la velocidad del objetivo y las condiciones ambientales, lo que permite un ataque rápido y preciso a diversos objetivos."
 fire_control_methods_2: "Sistema electroóptico integrado"
 fire_control_methods_2_desc: "Un sistema electroóptico integrado para nuestro sistema de control de tiro combina cámaras termográficas y de alta resolución con telémetro láser para proporcionar imágenes visuales e infrarrojas precisas de los objetivos en diversas condiciones de iluminación y meteorológicas. El sistema está integrado con los sistemas de control de tiro del buque, lo que permite un ataque preciso a amenazas de superficie y aéreas."
 fire_control_methods_3: "Sistema de armas integrado"
 fire_control_methods_3_desc: "Los sistemas integrados de armas navales nos permiten realizar operaciones avanzadas de comando y control, y combinan aspectos de cada sensor de nuestro barco, computadoras, radares e incluso sensores de aeronaves aerotransportadas para rastrear y guiar armas para destruir objetivos enemigos."
 ship_mrbms_sub: "Misiles balístico de alcance medio"
 ship_mrbms_sub_desc: "Permite que el submarino realize §RATAQUES NUCLEARES§!."
 mtg_at_sea_refueling: "Reabastecimiento en el mar"
 mtg_at_sea_refueling_desc: "El reabastecimiento en el mar permite a las flotas navales mantenerse operativas en el mar mediante la transferencia de combustible, suministros y municiones entre buques en movimiento, eliminando la necesidad de regresar a puerto. Esta práctica amplía el alcance y la resistencia de la flota, garantizando su preparación para el combate. Sigue siendo vital hoy en día para mantener una presencia naval constante y una preparación constante en zonas disputadas o remotas."

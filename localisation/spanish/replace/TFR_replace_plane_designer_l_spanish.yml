 early_bombs:0 "Bombas no guiadas"
 early_bombs_desc:0 "Bombas rudimentarias, diseñadas para dañar objetivos terrestres, si es que los alcanzan."
 guided_bombs:0 "Bombas guiadas"
 guided_bombs_desc:0 "Con sistemas de guía adicionales, estas bombas son capaces de alcanzar su objetivo con mayor precisión."
 improved_guided_bombs:0 "Bombas guiadas mejoradas"
 improved_guided_bombs_desc:0 "Las bombas guiadas mejoradas proporcionan a las aeronaves un potencial destructivo aún mayor contra objetivos terrestres."
 photo_reconnaisance:1 "Reconocimiento aéreo"
 photo_reconnaisance_desc:0 "El primer propósito militar del avión fue localizar al enemigo e informar de su ubicación a los generales en tierra. Esta sigue siendo una de las tareas más comunes de la aviación militar."
 aa_lmg:0 "Armamento básico de aeronaves"
 aa_lmg_desc:0 ""
 survivability_studies:0 "Estudios de supervivencia"
 survivability_studies_desc:0 "Al analizar cuidadosamente los daños sufridos por los aviones que regresan, podemos determinar con precisión qué partes son realmente vitales."
 artificial_intel_studies:0 "Investigación en inteligencia artificial"
 artificial_intel_studies_desc:0 "Invertir en investigación en inteligencia artificial podría permitirnos integrar sistemas de IA en nuestras aeronaves, abriendo un nuevo mundo de oportunidades."
 ai_targeting_computer_small:0 "Puntería asistida por IA"
 ai_targeting_computer_small_desc:0 "Si eliminas al piloto de la ecuación, ¿qué resulta? Una máquina de matar. No tiene pensamientos ni emociones, y debe obedecer todas tus órdenes."
 aircraft_construction:0 "Construcción de aeronaves"
 aircraft_construction_desc:0 "Hemos avanzado mucho desde la época del contrachapado y la tela en la fabricación de aeronaves. Las nuevas tecnologías permiten fabricar aviones más adecuados para funciones específicas."
 aa_hmg:0 "Misiles aire-aire"
 aa_hmg_desc:0 "El combate aéreo moderno ocurre desde grandes distancias y los misiles son una parte crucial de un arsenal moderno."
 aa_hmg2:0 "Misiles aire-aire mejorados"
 aa_hmg2_desc:0 "Las mejoras en los misiles aire-aire brindan a nuestros pilotos una ventaja aún mayor sobre los aviones hostiles."
 aa_cannon_1:0 "Misiles aire-tierra"
 aa_cannon_1_desc:0 "Los misiles aire-tierra pueden eliminar objetivos críticos en tierra con gran precisión y eficiencia."
 aa_cannon_2:0 "Misiles aire-tierra mejorados"
 aa_cannon_2_desc:0 "Los avances en la selección de objetivos y en las municiones permiten que los ataques aire-tierra sean aún más letales."
 anti_ship_missiles:0 "Misiles antibuques"
 anti_ship_missiles_desc:0 "Al igual que los torpedos, los misiles han demostrado ser muy eficaces contra objetivos navales."
 short_range_missiles:0 "Misiles de corto alcance"
 short_range_missiles_desc:0 "Si nuestros pilotos alguna vez los necesitan, los misiles de corto alcance resultan muy útiles para fines defensivos."
 engines_1:0 "Motores I"
 engines_1_desc:0 "Los motores de areonaves deben ser potentes, pero ligeros y fiables. Este tipo de motor proporciona suficiente potencia para que un avión despegue, pero limita en cierta medida su capacidad para alcanzar su máximo potencial."
 engines_2:0 "Motores II"
 engines_2_desc:0 "El rápido crecimiento de los aviones requiere un crecimiento correspondiente de la potencia de los motores."
 engines_3:0 "Motores III"
 engines_3_desc:0 "Los avances en la investigación de motores son necesarios para seguir en el juego."
 engines_4:0 "Motores IV"
 engines_4_desc:0 "Casi el pináculo de la tecnología de motor contemporánea, capaz de alcanzar velocidades asombrosas."
 range_improvements:0 "Mejoras de alcance"
 range_improvements_desc:0 "Aunque parezca evidente que para aumentar la autonomía de un avión es preciso incrementar su capacidad de combustible, hacerlo sin que el rendimiento del avión se resienta no es ninguna trivialidad."

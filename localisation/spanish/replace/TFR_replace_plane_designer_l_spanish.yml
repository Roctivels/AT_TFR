 cv_small_plane_airframe_0_desc:0 "Equipado con un gancho de detención y un tren de aterrizaje reforzado, este avión es capaz de operar desde un portaaviones."
 cv_small_plane_airframe_1:0 "Estructura pequeña básica"
 cv_small_plane_airframe_1_desc:0 "Este avión, que incorpora nuevas tecnologías desarrolladas para aviones terrestres, es igualmente capaz, pero puede ser lanzado desde la cubierta de un portaaviones."
 cv_small_plane_airframe_2:0 "Estructura pequeña mejorada"
 cv_small_plane_airframe_2_desc:0 "Para mantener el ritmo de los avances en la aviación terrestre, este avión fue diseñado con nuevas tecnologías para aumentar el alcance y el rendimiento."
 cv_small_plane_airframe_3:0 "Estructura pequeña avanzada"
 cv_small_plane_airframe_3_desc:0 "La rigurosa naturaleza de la aviación de portaaviones limita el tamaño y la capacidad de una aeronave. Esta representa el máximo absoluto que se puede lograr con una aeronave de propulsión convencional."
 cv_small_plane_airframe_4:0 "Estructura pequeña moderna"
 cv_small_plane_airframe_4_desc:0 "Este avi[on fue diseñado para aprovechar el mayor empuje producido por los motores a reacción y aplicarlo a la aviación naval."

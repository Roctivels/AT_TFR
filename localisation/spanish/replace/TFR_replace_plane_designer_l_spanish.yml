 heavy_mg_2x:0 "Misiles aire-tierra II"
 heavy_mg_2x_desc:0 "Misiles avanzados diseñados para destruir objetivos terrestres."
 heavy_mg_4x:0 "Misiles aire-aire I"
 heavy_mg_4x_desc:0 "Misiles diseñados para destruir objetivos aéreos."
 aircraft_cannon_2_1x:0 "Misiles de crucero II"
 aircraft_cannon_2_1x_desc:0 "Misiles de crucero avanzados pueden destruir a distancias aún mayores."
 aircraft_cannon_2_2x:0 "6x Misiles aire-aire"
 aircraft_cannon_2_2x_desc:0 ""
 small_bomb_bay:0 "Bombas guiadas I"
 small_bomb_bay_desc:0 "Bombas guiadas lanzadas desde aviones, diseñadas para destruir objetivos terrestres."
 medium_bomb_bay:0 "Bombas guiadas II"
 medium_bomb_bay_desc:0 "Bombas guiadas con sistemas de orientación avanzados lanzadas desde aviones, diseñadas para destruir objetivos terrestres."
 large_bomb_bay:0 "Compartimento de bombas grande"
 large_bomb_bay_desc:0 "Un gran compartimento que permite llevar suficiente artillería como para causar grandes destrozos en fábricas y otros objetivos difíciles."
 tank_buster_1:0 "Cañón antitanque I"
 tank_buster_1_desc:0 "Este cañón, adaptación de un arma antitanque empleada por el ejército, puede destruir incluso tanques modernos con disparos atinados. Sin embargo, su peso y su incómoda instalación limitan mucho el rendimiento de la aeronave."
 tank_buster_2:0 "Cañón antitanque II"
 tank_buster_2_desc:0 "Ahora que existen tanques más pesados, se necesitan armas mucho más grandes para combatirlos. Este cañón, aunque pesado y difícil de manejar, es muy eficaz para atacar posiciones enemigas."

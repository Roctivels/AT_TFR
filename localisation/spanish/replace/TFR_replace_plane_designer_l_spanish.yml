 rocket_engine_1:0 "Motor de cohete I"
 rocket_engine_1_desc:0 "Con varios combustibles muy volátiles y un oxidante igual de inestable, este motor ofrece un impulso enorme capaz de propulsar un avión a gran velocidad, sacrificando la distancia."
 rocket_engine_2:0 "Motor de cohete II"
 rocket_engine_2_desc:0 "Las mejoras en la cámara de combustión y pequeñas modificaciones en la mezcla de combustible aumentan aún más el rendimiento, aunque su alcance disminuye en la misma medida."
 rocket_engine_3:0 "Motor de cohete III"
 rocket_engine_3_desc:0 ""
 light_mg_2x:0 "Cohete no guiado"
 light_mg_2x_desc:0 "Un arsenal de cohetes sin sistemas de orientación avanzados."
 light_mg_4x:0 "Misiles aire-tierra I"
 light_mg_4x_desc:0 "Misiles diseñados para destruir objetivos terrestres."
 aircraft_cannon_1_1x:0 "Misiles aire-aire II"
 aircraft_cannon_1_1x_desc:0 "Misiles avanzados diseñados para destruir objetivos aéreos."
 aircraft_cannon_1_2x:0 "Misiles de crucero I"
 aircraft_cannon_1_2x_desc:0 "Más pesados y de mayor alcance que los misiles normales, los misiles de crucero pueden destruir a grandes distancias."
 bomb_locks:0 "Bombas no guiadas"
 bomb_locks_desc:0 "Bombas rudimentarias, diseñadas para dañar objetivos terrestres."
 torpedo_mounting:0 "Misiles antibuques I"
 torpedo_mounting_desc:0 "Misiles diseñados para destruir objetivos navales."

 amphibious_tank_chassis: "Chasis de tanque anfibio"
 amphibious_tank_chassis_desc: "Un chasis de tanque pequeño específicamente diseñado para flotar. Para conseguirlo, se han puesto límites estrictos al tamaño del arma y al espesor del blindaje del vehículo."
 amphibious_tank_chassis_1: "Chasis de tanque anfibio"
 gwtank_chassis: "Desarrollo de tanques en periodo de entreguerras"
 gwtank_chassis_desc: "El tanque ha demostrado ser un arma poderosa en la Gran Guerra. Aunque el desarrollo se ha ralentizado con el transcurrir de los años, no hay duda de que va a jugar un papel importante en las guerras venideras."
 armor_tech_1: "Protección blindada básica"
 armor_tech_1_desc: "La cobertura de humo y el blindaje en sí forman la base de la protección del tanque."
 armor_tech_2: "Protección blindada mejorada"
 armor_tech_2_desc: "El blindaje aumentado y los sistemas ERA mejoran aún más la protección del tanque."
 armor_tech_3: "Protección blindada avanzada"
 armor_tech_3_desc: "La introducción de medidas de hardkill, que atacan activamente las amenazas entrantes, aumenta la capacidad de supervivencia de nuestros tanques."
 armor_tech_4: "Protección blindada futurista"
 armor_tech_4_desc: "Las medidas avanzadas de hardkill permiten eliminar las amenazas mucho antes de que tengan la posibilidad de dañar nuestros tanques.\n\n"
 armor_tech_5: "Estudios de guerra electrónica"
 armor_tech_5_desc: "El futuro de la guerra se dirige hacia los drones, y la defensa ante estos se ha convertido en una prioridad.\n\n"
 engine_tech_1: "Motor básico"
 engine_tech_1_desc: "Los tanques de la Gran Guerra eran lentos, unas bestias torpes. Los tanques modernos dependen en gran medida de la velocidad y la movilidad para conseguir la victoria."
 engine_tech_2: "Motor mejorado"
 engine_tech_2_desc: "Con cañones más grandes y un blindaje más pesado, la nueva generación de tanques requiere un motor más potente para mantener su movilidad."
 engine_tech_3: "Motor avanzado"
 engine_tech_3_desc: "La guerra mecanizada es una forma de combate que requiere tomar decisiones rápidamente y mover tropas y suministros con urgencia. Si nuestros tanques tienen que transportar armamento moderno y un blindaje robusto para sobrevivir en el campo de batalla, necesitarán motores potentes para seguir el ritmo de la infantería motorizada."
 engine_tech_4: "Motor moderno"
 engine_tech_4_desc: "Los numerosos e innovadores elementos añadidos a los tanques, necesarios en la guerra moderna, han aumentado el peso del vehículo significativamente. Para mover todo ese peso, necesitamos motores con una gran potencia."

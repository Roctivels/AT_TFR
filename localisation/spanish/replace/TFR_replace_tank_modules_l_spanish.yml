 improved_medium_tank_chassis_short:1 "1940 mediano"
 improved_medium_tank_chassis_desc: "A partir de la experiencia con los tanques medianos de la generación anterior, está claro que necesitamos un diseño nuevo con más capacidad de carga para mantener el nivel."
 advanced_medium_tank_chassis: "Chasis de tanque mediano avanzado"
 advanced_medium_tank_chassis_short: "1943 mediano"
 advanced_medium_tank_chassis_desc: "El rápido aumento de peso de los sistemas de armas y del blindaje exige un chasis aún más grande y un vehículo del tamaño de los tanques pesados anteriores."
 medium_tank_chassis_desc: "Un chasis equilibrado de tamaño medio que ofrece un montón de flexibilidad para construir una gran variedad de vehículos."

 tank_gasoline_engine: "Motor de gasolina"
 tank_gasoline_engine_desc: "Un motor de gasolina será más rápido para un tamaño determinado, pero será más probable que el combustible se prenda fuego."
 tank_diesel_engine: "Motor diésel"
 tank_diesel_engine_desc: "Un motor de diésel es más fiable que uno de gasolina, pero no será tan rápido para el mismo tamaño de motor."
 tank_petrol_electric_engine: "Motor de gasolina-eléctrico"
 tank_petrol_electric_engine_desc: "Una combinación de un motor de gasolina que suministra energía a un motor eléctrico. Complejo, caro y poco fiable, pero ofrece un rendimiento sin igual en las maniobras tácticas."
 tank_gas_turbine_engine: "Turbina de gas"
 tank_gas_turbine_engine_desc: "Una turbina desarrollada a partir de motores a reacción. Elevado consumo de combustible, pero la mayor velocidad para un determinado tamaño de motor."
 tank_riveted_armor: "Blindaje homogéneo laminado"
 tank_riveted_armor_desc: "El blindaje homogéneo laminado es un tipo de armadura hecha de una única composición de acero laminada en caliente para mejorar sus características materiales, a diferencia de la armadura en capas o cementada."
 tank_cast_armor: "Blindaje compuesto"
 tank_cast_armor_desc: "El blindaje compuesto puede variar enormemente. Incluso puede incluir hormigón mezclado con blindaje de acero soldado espaciado, como el famoso \"Kill Dozer\". En general, el blindaje compuesto está hecho de materiales mixtos: acero, cerámica, plástico y aire. La mayoría de los blindajes compuestos son más ligeros que sus equivalentes totalmente metálicos."
 tank_welded_armor: "Armadura fundida"
 tank_welded_armor_desc: "Las placas de blindaje se sueldan al chasis. Es un proceso más rápido que la fundición, pero que ofrece una buena protección."
 tank_torsion_bar_suspension: "Barra de torsión"
 tank_torsion_bar_suspension_desc: "Un sistema de suspensión de barras metálicas fijas al chasis del vehículo que es bastante fiable y más suave que otros tipos de suspensión."
 tank_christie_suspension: "Suspensión 4x4"
 tank_christie_suspension_desc: ""
 tank_bogie_suspension: "Suspensión oscilante"
 tank_bogie_suspension_desc: "Un tipo de suspensión barata y sencilla en la que las ruedas se montan individualmente, por lo que, si se rompen, se pueden sustituir rápidamente."
 tank_interleaved_suspension: "Suspensión hidroneumática"
 tank_interleaved_suspension_desc: "Las suspension hidroneumática proporciona una suspensión sensible, dinámica y de alta capacidad que ofrece una calidad de conducción superior en una variedad de superficies."
 tank_light_one_man_tank_turret: "Torreta de un hombre"
 tank_light_one_man_tank_turret_desc: "Una torreta apenas lo bastante grande como para que quepa un solo tripulante, que tiene la tarea de apuntar y cargar el armamento principal, así como vigilar a los objetivos y las amenazas."
 tank_light_two_man_tank_turret: "Torreta de dos hombres"
 tank_light_two_man_tank_turret_desc: "Una torreta con espacio para dos tripulantes que se reparten las tareas de operar con el armamento y observar la situación. Aun así, no permite la división efectiva del trabajo entre la tripulación."
 tank_light_three_man_tank_turret: "Torreta de tres hombres"
 tank_light_three_man_tank_turret_desc: "Una torreta lo bastante grande como para dar cabida a tres tripulantes que pueden dividirse las tareas de cargar y apuntar con el armamento principal, además de permanecer alerta a la situación que les rodea."
 tank_light_fixed_superstructure_turret:1 "Superestructura fija ligera"
 tank_light_fixed_superstructure_turret_desc: "Una superestructura fija que solo permite que el armamento principal se mueva formando un pequeño arco, sin girar todo el vehículo. Sin embargo, permite montar un armamento grande en un vehículo en general de un tamaño más pequeño, lo que lo hace perfecto para las emboscadas."
 tank_medium_one_man_tank_turret: "Torreta de un hombre"
 tank_medium_one_man_tank_turret_desc: "Una torreta apenas lo bastante grande como para que quepa un solo tripulante, que tiene la tarea de apuntar y cargar el armamento principal, así como vigilar a los objetivos y las amenazas."
 tank_medium_two_man_tank_turret: "Torreta de dos hombres"
 tank_medium_two_man_tank_turret_desc: "Una torreta con espacio para dos tripulantes que se reparten las tareas de operar con el armamento y observar la situación. Aun así, no permite la división efectiva del trabajo entre la tripulación."
 tank_medium_three_man_tank_turret: "Torreta de tres hombres"
 tank_medium_three_man_tank_turret_desc: "Una torreta lo bastante grande como para dar cabida a tres tripulantes que pueden dividirse las tareas de cargar y apuntar con el armamento principal, además de permanecer alerta a la situación que les rodea."
 tank_medium_fixed_superstructure_turret:1 "Superestructura fija mediana"
 tank_medium_fixed_superstructure_turret_desc: "Una superestructura fija que solo permite que el armamento principal se mueva formando un pequeño arco, sin girar todo el vehículo. Sin embargo, permite montar un armamento grande en un vehículo en general de un tamaño más pequeño, lo que lo hace perfecto para las emboscadas."
 tank_heavy_two_man_tank_turret: "Torreta de dos hombres"
 tank_heavy_two_man_tank_turret_desc: "Una torreta con espacio para dos tripulantes que se reparten las tareas de operar con el armamento y observar la situación. Aun así, no permite la división efectiva del trabajo entre la tripulación."
 tank_heavy_three_man_tank_turret: "Torreta de tres hombres"
 tank_heavy_three_man_tank_turret_desc: "Una torreta lo bastante grande como para dar cabida a tres tripulantes que pueden dividirse las tareas de cargar y apuntar con el armamento principal, además de permanecer alerta a la situación que les rodea."
 tank_heavy_fixed_superstructure_turret:1 "Superestructura fija pesada"
 tank_heavy_fixed_superstructure_turret_desc: "Una superestructura fija que solo permite que el armamento principal se mueva formando un pequeño arco, sin girar todo el vehículo. Sin embargo, permite montar un armamento grande en un vehículo en general de un tamaño más pequeño, lo que lo hace perfecto para las emboscadas."
 tank_super_heavy_four_man_tank_turret: "Torreta de cuatro hombres"
 tank_super_heavy_four_man_tank_turret_desc: "Una torreta enorme con espacio adicional para un segundo cargador que dé servicio al cañón principal."
 tank_super_heavy_three_man_tank_turret: "Torreta de tres hombres"
 tank_super_heavy_three_man_tank_turret_desc: "Una torreta lo bastante grande como para dar cabida a tres tripulantes que pueden dividirse las tareas de cargar y apuntar con el armamento principal, además de permanecer alerta a la situación que les rodea."
 tank_modern_tank_turret: "Torreta de tres hombres"
 tank_modern_tank_turret_desc: "Una torreta bien diseñada permite que cuatro miembros de la tripulación operen eficientemente el armamento principal y controlen su entorno."
 tank_3_man_tank_turret: "Torreta de dos hombres"
 tank_3_man_tank_turret_desc: ""
 tank_heavy_machine_gun: "Ametralladora montada"
 tank_heavy_machine_gun_desc: "Una ametralladora ofrece una capacidad antiinfantería decente a bajo coste. Incluso con munición perforante especial, su rendimiento antiblindaje deja mucho que desear."
 flamethrower: "Lanzallamas"
 flamethrower_desc: "Un dispositivo que lanza una corriente de líquido ardiente. Aunque es muy útil en combate urbano y contra fortificaciones, no es eficaz contra el blindaje y debe usarlo un equipo especialmente entrenado en una unidad independiente para que sea eficaz."
 tank_auto_cannon: "Cañón automático"
 tank_auto_cannon_desc: "Este cañón automático, adaptado a partir de un cañón antiaéreo de disparo rápido, puede lanzar ráfagas de fuego devastadoras para los objetivos más débiles. El bajo calibre no limita su rendimiento antiblindaje."
 tank_auto_cannon_2: "Cañón automático mejorado"
 tank_auto_cannon_2_desc: "Este cañón automático, adaptado a partir de un cañón antiaéreo de disparo rápido, puede lanzar ráfagas de fuego devastadoras para los objetivos más débiles. El bajo calibre no limita su rendimiento antiblindaje."
 tank_anti_air_cannon: "Cañón antiaéreo básico"
 tank_anti_air_cannon_desc: "Un cañón automático de disparo rápido diseñado para enfrentarse a aeronaves. Como arma de apoyo, tiene un potencial limitado contra objetivos terrestres."
 tank_anti_air_cannon_2: "Cañón antiaéreo mejorado"
 tank_anti_air_cannon_2_desc: "Un cañón automático de disparo rápido diseñado para enfrentarse a aeronaves. Como arma de apoyo, tiene un potencial limitado contra objetivos terrestres."
 tank_anti_air_cannon_3: "Cañón antiaéreo avanzado"
 tank_anti_air_cannon_3_desc: "Un cañón automático de disparo rápido diseñado para enfrentarse a aeronaves. Como arma de apoyo, tiene un potencial limitado contra objetivos terrestres."
 tank_medium_howitzer: "Obús medio"
 tank_medium_howitzer_desc: "Un obús medio adaptado para que se monte en un vehículo. Su finalidad principal es el apoyo de fuego indirecto contra blancos fáciles, pero se puede disparar directamente a un objetivo si es necesario. Solo lleva una pequeña cantidad de munición perforante, por lo que es inadecuado contra tanques."
 tank_medium_howitzer_2: "Obús medio mejorado"
 tank_medium_howitzer_2_desc: "Un obús medio adaptado para que se monte en un vehículo. Su finalidad principal es el apoyo de fuego indirecto contra blancos fáciles, pero se puede disparar directamente a un objetivo si es necesario. Solo lleva una pequeña cantidad de munición perforante, por lo que es inadecuado contra tanques."
 tank_heavy_howitzer: "Obús pesado"
 tank_heavy_howitzer_desc: "Un obús pesado adaptado para que se monte en un vehículo. Su finalidad principal es el apoyo de fuego indirecto contra blancos fáciles, pero se puede disparar directamente a un objetivo si es necesario. Solo lleva una pequeña cantidad de munición perforante, por lo que es inadecuado contra tanques."
 tank_small_cannon: "Cañón de calibre pequeño de la Guerra Fría"
 tank_small_cannon_desc: "Un cañón pequeño y barato, capaz de disparar munición antiinfantería y antiblindaje. Su pequeño calibre limita su utilidad."
 tank_small_cannon_2: "Cañón de calibre pequeño moderno"
 tank_small_cannon_2_desc: "Un cañón pequeño y barato, capaz de disparar munición antiinfantería y antiblindaje. Su pequeño calibre limita su utilidad."
 tank_small_cannon_3: "Cañón de calibre pequeño avanzado"
 tank_small_cannon_3_desc: "Un cañón pequeño y barato, capaz de disparar munición antiinfantería y antiblindaje. Su pequeño calibre limita su utilidad."
 tank_medium_cannon: "Cañón mediano"
 tank_medium_cannon_desc: "Un arma multipropósito adecuada para una amplia variedad de tareas. Su rendimiento contra infantería y antitanques no es el mejor, pero permite mucha flexibilidad al vehículo."
 tank_medium_cannon_2: "Cañón mediano mejorado"
 tank_medium_cannon_2_desc: "Un arma multipropósito adecuada para una amplia variedad de tareas. Su rendimiento contra infantería y antitanques no es el mejor, pero permite mucha flexibilidad al vehículo."
 tank_high_velocity_cannon: "Cañón de ánima lisa de la Guerra Fría"
 tank_high_velocity_cannon_desc: "Contrariamente a lo que se cree, los cañones estriados ofrecen menor precisión al usar munición de calibre inferior. Al usar APFSDS o HEATFS, es mejor usar un cañón liso."
 tank_high_velocity_cannon_2: "Cañón de ánima lisa moderno"
 tank_high_velocity_cannon_2_desc: "Un cañón diseñado específicamente para alcanzar una alta velocidad inicial. Al usar munición especializada, posee excelentes características antiblindaje, pero su rendimiento contra blancos blandos se ve afectado."
 tank_high_velocity_cannon_3: "Cañón de ánima lisa avanzado"
 tank_high_velocity_cannon_3_desc: "Un cañón diseñado específicamente para alcanzar una alta velocidad inicial. Al usar munición especializada, posee excelentes características antiblindaje, pero su rendimiento contra blancos blandos se ve afectado."
 tank_heavy_cannon: "Cañón de ánima rayada de la Guerra Fría"
 tank_heavy_cannon_desc: "La mayoría de las naciones que aún utilizan cañones estriados en tanques los emplean para apoyar a la infantería, además de para blindaje general. Suelen usar munición HESH contra estructuras enemigas reforzadas. Sin embargo, estos cañones ofrecen menor precisión para munición de calibre inferior."
 tank_heavy_cannon_2: "Cañón de ánima rayada moderno"
 tank_heavy_cannon_2_desc: "Un arma capaz de disparar un proyectil de gran calibre. Con una penetración de blindaje excepcional y un rendimiento decente contra blancos blandos, sus mayores inconvenientes son su tamaño y coste, que lo hacen demasiado difícil de manejar para su montaje en la mayoría de los vehículos no diseñados específicamente para ello."
 tank_heavy_cannon_3:1 "Cañón de ánima rayada avanzado"
 tank_heavy_cannon_3_desc: "Un arma capaz de disparar un proyectil de gran calibre. Con una penetración de blindaje excepcional y un rendimiento decente contra blancos blandos, sus mayores inconvenientes son su tamaño y coste, que lo hacen demasiado difícil de manejar para su montaje en la mayoría de los vehículos no diseñados específicamente para ello."
 tank_super_heavy_cannon: "Cañón superpesado"
 tank_super_heavy_cannon_desc: "Un arma increíblemente grande con un rendimiento sin igual. Hay pocas cosas que no pueda destruir, y ninguna de ellas tiene motivos para disparar contra un tanque."
 tank_close_support_gun: "Cañón de apoyo cercano"
 tank_close_support_gun_desc: "Un arma pequeña diseñada para disparar proyectiles altamente explosivos contra fortificaciones enemigas y ayudar a la infantería en el ataque. Aunque es capaz de enfrentarse a tanques, su limitada munición y su corta longitud le impiden enfrentarse a tanques enemigos más poderosos."
 tank_radio_1: "Radio básica"
 tank_radio_1_desc: "Una radio bidireccional básica permite a los tanques coordinar sus maniobras tácticas a pequeña escala."
 tank_radio_2: "Radio mejorada"
 tank_radio_2_desc: "Una radio mejorada que permite a los comandantes un control efectivo sobre grandes formaciones de tanques, lo que permite las maniobras operativas a gran escala."
 tank_radio_3: "Radio avanzada"
 tank_radio_3_desc: "Esta radio tiene una transmisión más potente y una mejor recepción, por lo que permite las comunicaciones a docenas de kilómetros y ante las interferencias del enemigo."
 tank_ai_computer: "Puntería con IA"
 tank_ai_computer_desc: "Si eliminas a la tripulación de la ecuación, ¿qué resulta? Una máquina de matar. No tiene pensamientos ni emociones, y debe obedecer todas tus órdenes."
 amphibious_drive: "Sistema de propulsión anfibia"
 amphibious_drive_desc: ""
 secondary_turret_hmg:1 "Ametralladora pesada"
 secondary_turret_hmg_desc: "Una ametralladora pesada en una torreta secundaria. La colocación de la torreta limita su arco de disparo, lo que reduce la efectividad general del cañón, pero permite que el tanque pueda enfrentarse a más objetivos. Esto es particularmente útil en la ofensiva."
 secondary_turret_small_cannon:1 "Cañón de ánima lisa secundario"
 secondary_turret_small_cannon_desc: "Un pequeño cañón en una torreta secundaria. La ubicación de la torreta limita su arco de fuego, lo que reduce su efectividad general, pero permite al tanque atacar a más objetivos. Esto es especialmente útil durante el ataque."
 secondary_turret_close_support_gun:1 "Cañón de apoyo cercano"
 secondary_turret_close_support_gun_desc: "Un cañón de apoyo cercano en una torreta secundaria. La colocación de la torreta limita su arco de disparo, lo que reduce la efectividad general del cañón, pero permite que el tanque pueda enfrentarse a más objetivos. Esto es particularmente útil en la ofensiva."
 sloped_armor: "Blindaje reactivo explosivo"
 sloped_armor_desc: "El blindaje colocado en ángulo respecto al proyectil entrante tiene un grosor efectivo mucho mayor que el mismo blindaje colocado verticalmente. También aumenta la probabilidad de que el proyectil rebote sin causar daño. Sin embargo, requiere que todo el tanque se diseñe en torno a él, lo que dificulta su ensamblaje."
 stabilizer: "Estabilizador"
 stabilizer_desc: "Un dispositivo mecánico para mantener el cañón apuntando en la misma dirección cuando el tanque se mueve. Aunque no es lo suficientemente avanzado como para permitir disparos precisos en movimiento, permite que el artillero dispare con precisión durante una parada corta, sin tener que volver a fijar el objetivo."
 smoke_launchers: "Lanzadores de humo"
 smoke_launchers_desc: "Una batería de dispositivos pirotécnicos que se puede activar desde el interior del tanque para crear una densa nube de humo que oculte el vehículo. Muy útil cuando se combate a la defensiva, o tras caer en una emboscada."
 extra_ammo_storage: "Almacenamiento de munición adicional"
 extra_ammo_storage_desc: "Estantes adicionales de munición lista que permiten que el tanque permanezca en combate más tiempo sin tener que reabastecerse. Sin embargo, si penetran el blindaje, los resultados serán con toda probabilidad catastróficos. Esto es especialmente peligroso al atacar."
 turret_mounted_manpad_tech: "Torreta antiaérea montada"
 turret_mounted_manpad_tech_desc: "Los Sistemas de Defensa Antiaérea Portátiles montados en torretas y operados internamente, a salvo de ataques externos, que en el pasado fueron objeto de burla por parte de los \"expertos militares\" occidentales en una época en que los ataques con aviones no tripulados son cada vez más frecuentes, pueden resultar muy beneficiosos."
 turret_mounted_manpad: "Torreta antiaérea montada"
 turret_mounted_manpad_desc: ""
 electronic_warfare_system: "Sistema de guerra electrónica"
 electronic_warfare_system_desc: "Un sistema de EW pequeño y de fácil montaje para proteger el tanque de los drones de pilotaje en inmersión cada vez más activos en el campo de batalla."
 wet_ammo_storage: "Compartimiento de munición"
 wet_ammo_storage_desc: "La munición almacenada en una sección separada a prueba de explosiones del tanque reduce drásticamente la probabilidad de que la tripulación muera por una explosión crítica de munición."
 turret_mounted_atgm: "Torreta antitanque montada"
 turret_mounted_atgm_desc: "Un misil antitanque montado en la torreta del tanque permite una mayor potencia de fuego, aunque el comandante debe exponerse para poder utilizarlo."
 active_protection_system: "Sistema de protección activa hardkill avanzado"
 active_protection_system_desc: "Una tecnología de última generación, el APS permite que el tanque enfrente amenazas tales como RPGs y las elimine sin que la tripulación tenga que actuar."
 armor_tech_1_tt: "Permite valores de mejoras de blindaje de 5 y superiores."
 armor_tech_2_tt: "Permite valores de mejoras de blindaje de 10 y superiores."
 armor_tech_3_tt: "Permite valores de mejoras de blindaje de 15 y superiores."
 armor_tech_4_tt: "Permite valores de mejoras de blindaje de 18 y superiores."
 engine_tech_1_tt: "Permite valores de mejoras de motor de 5 y superiores."
 engine_tech_2_tt: "Permite valores de mejoras de motor de 10 y superiores."
 engine_tech_3_tt: "Permite valores de mejoras de motor de 15 y superiores."
 engine_tech_4_tt: "Permite valores de mejoras de motor de 18 y superiores."
 light_tank_chassis: "Tanque de reconocimiento"
 medium_tank_chassis: "Tanque mediano"
 heavy_tank_chassis: "Tanque pesado"
 light_tank_chassis_0: "Chasis de tanque ligero temprano"
 light_tank_chassis_desc: "Un chasis pequeño y compacto, ideal para un vehículo ligero y barato para tareas como el reconocimiento y el apoyo en el ataque. Su limitada capacidad de carga lo hace poco recomendable para llevar blindaje pesado o cañones grandes."
 light_tank_chassis_1: "Chasis de tanque ligero básico"
 basic_light_tank_chassis: "Chasis de tanque ligero básico"
 basic_light_tank_chassis_short: "Chasis de tanque de reconocimiento II"
 basic_light_tank_chassis_desc: "Los avances técnicos han dejado obsoletos los diseños del primer periodo de posguerra. El campo de batalla moderno requiere un diseño nuevo y limpio que incorpore los avances en la metalurgia y la distribución interior."
 light_tank_chassis_2: "Chasis de tanque ligero mejorado"
 improved_light_tank_chassis: "Chasis de tanque ligero mejorado"
 improved_light_tank_chassis_short: "Chasis de tanque de reconocimiento III"
 improved_light_tank_chassis_desc: "Este chasis es una mejora basada en la experiencia con anteriores tanques ligeros; ofrece más fiabilidad y facilita el mantenimiento."
 light_tank_chassis_3: "Chasis de tanque ligero avanzado"
 advanced_light_tank_chassis: "Chasis de tanque ligero avanzado"
 advanced_light_tank_chassis_short: "Chasis de tanque de reconocimiento IV"
 advanced_light_tank_chassis_desc: "Ahora que los tanques medianos están adquiriendo protagonismo en el combate, los tanques ligeros han quedado relegados a funciones de apoyo. Es necesario que el diseño del chasis tenga en cuenta los requisitos de esas funciones."
 light_tank_amphibious_chassis_0: "Chasis de tanque ligero del periodo de entreguerras (anfibio)"
 light_tank_amphibious_chassis_1: "Chasis de tanque ligero básico (anfibio)"
 light_tank_amphibious_chassis_2: "Chasis de tanque ligero mejorado (anfibio)"
 light_tank_amphibious_chassis_3: "Chasis de tanque ligero avanzado (anfibio)"

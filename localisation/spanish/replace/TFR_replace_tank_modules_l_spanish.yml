 main_battle_tank_chassis: "Chasis de carro de combate principal"
 modern_tank_chassis: "Carro de combate principal"
 modern_tank_chassis_desc: ""
 main_battle_tank_chassis_desc: "La experiencia ha demostrado que los diseños de los tanques ligeros, medianos y pesados están convergiendo cada vez más. Los tanques pesados se han vuelto más móviles, mientras que los tanques ligeros llevan armamento y blindaje más pesados para sobrevivir. Por lo tanto, existe valor en unificar los tres diseños en un solo tipo, que será un carro de combate principal universal."
 modern_tank_chassis_1: "Carro de combate principal 2ª Gen."
 modern_tank_chassis_1_desc: "Aunque no se basan estrictamente en realidades tecnológicas, los carros de combate principales (main battle tank, o MBT, en inglés) suelen clasificarse según su generación. La segunda generación, representada por tanques como el T-72, el AMX 30 y el Leopard 1, se caracteriza por la adopción de sistemas de protección NBQ, visión nocturna, estabilización del cañón principal y control de tiro mecánico. Totalmente obsoletos en 2020, muchos tanques de batalla principales de segunda generación aún siguen en servicio en todo el mundo."
 modern_tank_chassis_2: "Carro de combate principal 3ª Gen."
 modern_tank_chassis_2_desc: "A partir de finales de los años 70, los MBT de tercera generación, como el T-90, el M1 Abrams y el Challenger, obtuvieron su estatus gracias a la adopción de imágenes térmicas, sistemas computarizados de control de fuego y blindaje compuesto."
 modern_tank_chassis_3: "Carro de combate principal 4ª Gen."
 modern_tank_chassis_3_desc: "Desde el T-14 Armata hasta el Tipo 10 y el Challenger 3, los MBT de cuarta generación utilizan los últimos avances militares, incluidos una mayor digitalización y menores tripulaciones, soporte integrado de municiones merodeadoras y sistemas de protección activa."
 modern_tank_chassis_4: "Carro de combate principal 5ª Gen."
 modern_tank_chassis_4_desc: "La quinta generación de MBT presenta modelos con poca o ninguna interacción humana, sistemas de combate completamente automatizados y nuevas e innovadoras soluciones de entrega de carga útil."

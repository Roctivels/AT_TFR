 basic_medium_tank_chassis_short: "1938 mediano"
 basic_medium_tank_chassis_desc: "Aunque los tanques ligeros han sido la espina dorsal de las formaciones mecanizadas, es evidente que su potencial de crecimiento está casi agotado. En el futuro necesitaremos un vehículo más grande que siga teniendo un nivel alto de movilidad."

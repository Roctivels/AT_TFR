 ai_targeting_computer_small: "Puntería con IA"
 ai_targeting_computer_small_desc: "Si eliminas al piloto de la ecuación, ¿qué resulta? Una máquina de matar. No tiene pensamientos ni emociones, y debe obedecer todas tus órdenes."
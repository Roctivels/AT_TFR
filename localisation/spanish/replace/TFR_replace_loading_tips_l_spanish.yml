l_spanish:
 LOADING_TIP_0: "Si pudiera, mataría a todos los periodistas del mundo, pero estoy seguro de que recibiríamos noticias del infierno antes del desayuno.\n- William Sherman"
 LOADING_TIP_1: "La pasión es absolutamente necesaria para lograr cualquier tipo de éxito duradero. Lo sé por experiencia. Si no tienes pasión, todo lo que hagas acabará fracasando o, en el mejor de los casos, será mediocre.\n- Donald Trump"
 LOADING_TIP_2: "La gente piensa que apuesto. Nunca en mi vida he jugado. Para mí, alguien que juega es alguien que juega a las máquinas tragamonedas. Prefiero tener máquinas tragamonedas. Ser la casa es muy rentable.\n- Donald Trump"
 LOADING_TIP_3: "Ya sabes, todo el mundo tiene reveses en la vida y no consigue alcanzar las metas que se ha propuesto. Eso forma parte de la vida y de aceptar quién eres como persona.\n- Hillary Clinton"
 LOADING_TIP_4: "La gente puede juzgarme por lo que he hecho. Y creo que cuando alguien está en el ojo público, eso es lo que hace. Así que me siento completamente cómoda con quién soy, con lo que defiendo y con lo que siempre he defendido.\n- Hillary Clinton"
 LOADING_TIP_5: "El pueblo chino nunca permitirá que ninguna fuerza nos intimide, nos oprima o nos esclavice. ¡Cualquiera que intente, sufrirá una sangría en la cabeza frente a la Gran Muralla de Acero construida con la carne y sangre de más de 1.400 millones de chinos!\n- Xi Jinping"
 LOADING_TIP_6: "No hay alternativas a mi política.\n- Angela Merkel"
 LOADING_TIP_7: "Nuestros enemigos son innovadores y hábiles, y nosotros también. Ellos nunca dejan de pensar en nuevas formas de dañar a nuestro país y a nuestra gente, y nosotros tampoco.\n- George W. Bush"
 LOADING_TIP_8: "Pinochet debería haber matado a más gente.\n- Jair Bolsonaro"
 LOADING_TIP_9: "No hay identidad cultural en una población sin una composición étnica estable. La alteración de la composición étnica de un país equivale a una alteración de su identidad cultural.\n- Viktor Orbán"
 LOADING_TIP_10: "No oréis por vidas fáciles, orad para ser más fuertes.\n- John F. Kennedy"
 LOADING_TIP_11: "Donde hay poder, hay resistencia.\n- Michel Foucault"
 LOADING_TIP_12: "El objetivo del tráfico vial es la velocidad, no la seguridad.\n- Janusz Korwin-Mikke"
 LOADING_TIP_13: "En este Día de los Caídos, mientras nuestra nación rinde homenaje a su ininterrumpida sucesión de héroes caídos -y veo a muchos de ellos entre el público aquí presente hoy- nuestro sentido de patriotismo es particularmente fuerte.\n- Barack Obama"
 LOADING_TIP_14: "La democracia no puede ser impuesta a ninguna nación desde fuera. Cada sociedad debe buscar su propio camino, y ningún camino es perfecto.\n- Barack Obama"
 LOADING_TIP_15: "Algunos Gobiernos se mostrarán tímidos ante el terror. Y no se equivoquen: si no actúan, América lo hará.\n- George W. Bush"
 LOADING_TIP_16: "Para mantener la competitividad de América es necesario que la energía sea asequible. En este aspecto tenemos un problema grave: América es adicta al petróleo, que a menudo se importa de partes inestables del mundo.\n- George W. Bush"
 LOADING_TIP_17: "Si quieres aparecer en la portada del periódico, tienes que hacer algún ataque feroz. No lo haré. Estoy llevando adelante una campaña orientada a problemas.\n- Bernie Sanders"
 LOADING_TIP_18: "Temo mucho que, de hecho, el Gobierno del pueblo, por el pueblo y para el pueblo esté empezando a perecer en Estados Unidos.\n- Bernie Sanders"
 LOADING_TIP_19: "No existe tal cosa como un ex oficial del KGB.\n- Vladímir Putin"
 LOADING_TIP_20: "Los rusos tienen otras ambiciones, mucho más elevadas, de naturaleza más espiritual. Se trata más de tu relación con Dios.\n- Vladímir Putin"
 LOADING_TIP_21: "Por supuesto, también somos conscientes de que todavía existen problemas históricos en las relaciones de ambos lados del estrecho y que encontraremos diversos problemas nuevos en el camino por delante. Resolverlos requerirá tiempo, paciencia y esfuerzos conjuntos.\n- Xi Jinping"
 LOADING_TIP_22: "Debemos defender el liderazgo del Partido en todo el trabajo y fortalecerlo y mejorarlo constantemente.\n- Xi Jinping"
 LOADING_TIP_23: "Intento aprender del pasado, pero planifico el futuro centrándome exclusivamente en el presente. Ahí es donde está la diversión.\n- Donald Trump"
 LOADING_TIP_24: "Cuando llegues al final de tu cuerda, haz un nudo y agárrate fuerte.\n- Abraham Lincoln"
 LOADING_TIP_25: "Siento tu dolor.\n- Bill Clinton"
 LOADING_TIP_26: "Es extremadamente peligroso alentar a las personas a verse a sí mismas como excepcionales, independientemente de su motivación.\n- Vladímir Putin"
 LOADING_TIP_27: "No fui un presidente ejecutivo, sino un presidente en funciones que trabajaba dentro de los cuatro ángulos de la Constitución.\n- Kocheril R. Narayanan"
 LOADING_TIP_28: "Si alguien me insulta, sólo siento una infinita lástima por él.\n- Kocheril R. Narayanan"
 LOADING_TIP_29: "Nunca pienso en el tiempo que he perdido. Simplemente cumplo con un programa porque está ahí, porque está diseñado para mí.\n- Nelson Mandela"
 LOADING_TIP_30: "El fracaso en algún momento de la vida es inevitable, pero rendirse es imperdonable.\n- Joe Biden"
 LOADING_TIP_31: "Lo ilegal lo hacemos de inmediato. Lo inconstitucional lleva un poco más de tiempo.\n- Henry Kissinger"
 LOADING_TIP_32: "Si crees que su verdadera intención es matarte, no es descabellado pensar que te mentirían.\n- Henry Kissinger"
 LOADING_TIP_33: "Hablan del fracaso del socialismo, pero ¿dónde está el éxito del capitalismo en África, Asia y América Latina?\n- Fidel Castro"
 LOADING_TIP_34: "En Europa tenemos 50 millones de musulmanes. Hay indicios de que Alá concederá la victoria al islam en Europa -sin espadas, sin armas, sin conquistas- y la convertirá en un continente musulmán en pocas décadas.\n- Muamar el Gadafi"
 LOADING_TIP_35: "África debe volver a ser lo que era antes de que los imperialistas la dividieran. Son divisiones artificiales que nosotros, en nuestro concepto panafricano, trataremos de eliminar.\n- Robert Mugabe"
 LOADING_TIP_36: "El mayor regalo es la capacidad de olvidar: olvidar las cosas malas y centrarse en las buenas.\n- Joe Biden"
 LOADING_TIP_37: "Canadá es una sociedad abierta y acogedora, pero permitidme ser claro: también somos un país de leyes.\n- Justin Trudeau"
 LOADING_TIP_38: "Tengo tantas posibilidades de convertirme en primer ministro como de que me decapiten con un frisbee o de encontrar a Elvis Presley.\n- Boris Johnson"
 LOADING_TIP_39: "Por lo tanto, ganar cada batalla no es la mejor de todas las habilidades; derrotar al enemigo sin luchar es la mejor de todas las habilidades.\n- Sun Tzu"
 LOADING_TIP_40: "¡El salto del papu!\n- Bananirou"
 LOADING_TIP_41: "No tienes que ganar todas las peleas. No tienes que pelear todas las peleas. Pero debes tener algo por lo que luchar.\n- Ted Cruz"
 LOADING_TIP_42: "El futuro no pertenece a los débiles de corazón; pertenece a los valientes.\n- Ronald Reagan"
 LOADING_TIP_43: "No tenemos que salvar el mundo. El mundo es lo suficientemente grande como para cuidar de sí mismo. Lo que nos tiene que preocupar es si el mundo en el que vivimos será capaz de sustentarnos en él.\n- Douglas Adams"
 LOADING_TIP_44: "Porque sé que el problema no son las \"políticas de identidad\", sino el capitalismo.\n- Joe Sims"
 LOADING_TIP_45: "Tenemos que afrontar el hecho de que algunas personas dicen que el fuego se combate mejor con fuego, pero nosotros decimos que el fuego se apaga mejor con agua. Decimos que no se combate el racismo con racismo. Vamos a combatir el racismo con solidaridad.\n- Fred Hampton"
 LOADING_TIP_46: "La verdadera paz no es simplemente la ausencia de tensión: es la presencia de la justicia.\n- Martin Luther King, Jr."
 LOADING_TIP_47: "Siempre es el momento correcto para hacer lo correcto.\n- Martin Luther King, Jr."
 LOADING_TIP_48: "Celebramos el pasado para despertar el futuro.\n- John F. Kennedy"
 LOADING_TIP_49: "¿Por qué me pusieron el nombre de un aeropuerto?\n- Ronald Reagan"
 LOADING_TIP_50: "El futuro pertenece a los pocos que aún estamos dispuestos a ensuciarnos las manos.\n- James Mason"
 LOADING_TIP_51: "La imaginación nos llevará a menudo a mundos que nunca existieron. Pero, sin ella, no llegaremos a ninguna parte.\n- Carl Sagan"
 LOADING_TIP_52: "En defensa de la patria todo es lícito menos dejarla perecer.\n- José de San Martín"
 LOADING_TIP_53: "Con audacia se puede intentar todo; mas no se puede conseguir todo.\n- Napoleón Bonaparte"
 LOADING_TIP_54: "No nos derrumbamos después del 11-S. No titubeamos tras la maratón de Boston. Pero somos América. Los americanos nunca, nunca, nos rendiremos. Perseveramos. Superamos. La línea de meta es nuestra.\n- Joe Biden"
 LOADING_TIP_55: "Con cada bala que disparabas para eliminar y matar a un terrorista, cambiabas el equilibrio de poder internacional. Con cada metro que avanzaba un tanque, cambiaba el mapa político del mundo.\n- Bashar al-Ásad"
 LOADING_TIP_56: "Se puede encerrar a un revolucionario, pero no se puede encerrar a la Revolución.\n- Fred Hampton"
 LOADING_TIP_57: "Sólo aquellos que se arriesgan a ir demasiado lejos pueden descubrir hasta dónde se puede llegar.\n- T. S. Eliot"
 LOADING_TIP_58: "En lo que respecta a mi relación con el presidente Putin, está bien.\n- Gerhard Schröder"
 LOADING_TIP_59: "La guerra de Irak tuvo prioridad sobre la prevención de desastres nacionales.\n- Charles B. Rangel"
 LOADING_TIP_60: "Quise luchar en Irak porque sentí la obligación de ayudar a liberar a la gente de la opresión.\n- Edward Snowden"
 LOADING_TIP_61: "Énfasis en el estudio, la política y la integridad.\n- Jiang Zemin"
 LOADING_TIP_62: "No soy un líder natural. Soy demasiado intelectual, demasiado abstracto, pienso demasiado.\n- Newt Gingrich"
 LOADING_TIP_63: "Las nueve palabras más aterradoras de la lengua son: \"Yo soy del Gobierno y estoy aquí para ayudar\".\n- Ronald Reagan"
 LOADING_TIP_64: "Una economía robusta es una fuente de fortaleza nacional.\n- Shinzō Abe"
 LOADING_TIP_65: "Dios ha golpeado a Estados Unidos en su punto más vulnerable, destruyendo sus edificios más prestigiosos.\n- Osama bin Laden"
 LOADING_TIP_66: "Dios está de nuestro lado. Venceremos al invasor.\n- Sadam Huseín"
 LOADING_TIP_67: "América es el Gran Satán, la serpiente herida.\n- Ayatolá Joimení"
 LOADING_TIP_68: "Nada puede detener lo que se viene. Nada.\n- James Mason"
 LOADING_TIP_69: "Déjanos al menos enfrentar la muerte de nuestra raza como nuestros ancestros enfrentaron su muerte. Como HOMBRES.\n- George Lincoln Rockwell"
 LOADING_TIP_70: "Cada país tiene un alma, y el alma francesa es la igualdad.\n- François Hollande"
 LOADING_TIP_71: "El árbol de la libertad debe ser refrescado de vez en cuando con la sangre de patriotas y tiranos.\n- Thomas Jefferson"
 LOADING_TIP_72: "Nuestro país, nuestro pueblo, y nuestras leyes deben ser nuestra máxima prioridad.\n- Donald Trump"
 LOADING_TIP_73: "¡Subamos al cadalso de la historia, si debemos ser ahorcados, como los mártires de Núremberg, altos y orgullosos!\n- George Lincoln Rockwell"
 LOADING_TIP_74: "No nos van a dejar hacerlo. Significa que vamos a hacerlo a pesar de ellos. Sobre sus cadáveres.\n- James Mason"
 LOADING_TIP_75: "La verdadera guerrilla nunca es vencida. Nunca negociará su libertad. Nunca comprometerá sus ideales. Nunca se rendirá.\n- Fragmento de SIEGE"
 LOADING_TIP_76: "No es de nuestro interés bombardear hospitales.\n- Bashar al-Ásad"
 LOADING_TIP_77: "El terrorismo niega lo más importante: el valor de la vida humana. Pisotea todos los derechos y libertades, por más argumentos ideológicos que los acompañen, infunde miedo y odio, y nos impide transformar y mejorar nuestro mundo.\n- Dmitri Medvédev"
 LOADING_TIP_78: "Con Trump ganando esa elección por sorpresa, y vaya que fue una sorpresa, creo ahora que todo es posible.\n- James Mason"
 LOADING_TIP_79: "Yo pertenecí a la generación que creció bajo el nacionalsocialismo, la que fue cegada y engañada. Nos dejamos engañar.\n- Gunter Grass"
 LOADING_TIP_80: "Nunca ha habido un país que se haya beneficiado de una guerra larga.\n- Sun Tzu"
 LOADING_TIP_81: "Los derechos humanos no solo son violados por el terrorismo, la represión o los asesinatos, sino también por estructuras económicas injustas que crean una gran desigualdad.\n- Papa Francisco"
 LOADING_TIP_82: "Decían que yo era un lobo con piel de oveja. Pero no lo soy. No hay piel de oveja.\n- Norbert Hofer"
 LOADING_TIP_83: "Creo francamente que cuando se refiere al caos, ustedes aún no han visto nada.\n- Nigel Farage"
 LOADING_TIP_84: "Atrás quedaron los días donde nuestros enemigos nos podían chantajear con armas nucleares.\n- Kim Jong-un"
 LOADING_TIP_85: "El poderío militar es la fuerza nacional de un país. Solo cuando se desarrolla este poderío de todas las formas posibles, el país puede convertirse en próspero.\n- Kim Jong-un"
 LOADING_TIP_86: "Me gusta decir las cosas por su nombre tanto en la política como en general. Es por eso que los sionistas y los estadounidenses... los altos mandos odian a Sadam Huseín.\n- Sadam Huseín"
 LOADING_TIP_87: "Si el sistema económico actual del mundo no puede distribuir eficazmente la riqueza creada por los distintos países, entonces este sistema es erróneo y debe cambiarse.\n- Xi Jinping"
 LOADING_TIP_88: "Hay periodos en la historia cuando el cambio es necesario, y otros periodos cuando es mejor mantener todo por el tiempo venidero. El arte de la vida es estar al ritmo de tu era.\n- Oswald Mosley"
 LOADING_TIP_89: "¡Qué lindo culito que tenés, mami!\n- Momo"
 LOADING_TIP_90: "Yo soy el Partido Demócrata.\n- Joe Biden"
 LOADING_TIP_91: "Los estadounidenses puede que no tengan identidad, pero tienen unos dientes maravillosos.\n- Jean Baudrillard"
 LOADING_TIP_92: "Mal.\n- Donald Trump"
 LOADING_TIP_93: "Nunca, JAMÁS, te rindas.\n- Donald Trump"
 LOADING_TIP_94: "Estar preparado para la guerra es uno de los medios más eficaces para preservar la paz.\n- George Washington"
 LOADING_TIP_95: "Yo no veo ningún sueño americano; veo una pesadilla americana.\n- Malcolm X"
 LOADING_TIP_96: "Las armas no matan gente, lo hace el Gobierno.\n- Dale Gribble"
 LOADING_TIP_97: "General Li, le aseguro que el Gobierno estadounidense es estable y que todo estará bien.\n- Mark Milley, momentos antes del estallido de la Segunda Guerra Civil Americana"
 LOADING_TIP_98: "Fue el deseo continuo del esclavo por reconocimiento que fue el motor que propulsó la historia hacia adelante, no la complacencia inactiva y la auto-identidad que no cambia del amo.\n- Francis Fukuyama"
 LOADING_TIP_99: "Si te sientas junto a la estaca, no sentirás la correa alrededor del cuello. Solo cuando te alejes sentirás el tirón que te limita.\n- Michael Parenti"
 LOADING_TIP_100: "La existencia del pueblo ruso como comunidad histórica orgánica es impensable sin la construcción del imperio de la creación continental. Los rusos seguirán siendo un pueblo sólo en el marco del Nuevo Imperio.\n- Aleksandr Duguin"
 LOADING_TIP_101: "El hombre ha nacido libre y por doquier está encadenado. Aquellos que piensan que son los amos de otros son, de hecho, esclavos más grandes que los otros.\n- Jean-Jacques Rousseau"
 LOADING_TIP_102: "La discusión civil es gay.\n- Mike Ma"
 LOADING_TIP_103: "En mares serenos no se forman marineros buenos.\n- Refrán español"
 LOADING_TIP_104: "La libertad es mejor que la falta de libertad.\n- Dmitri Medvédev"
 LOADING_TIP_105: "Tu nombre es desconocido, tu hazaña es inmortal.\n- Tumba del Soldado Desconocido (Moscú)"
 LOADING_TIP_106: "No quiero quedarme aquí en el Jardín del Edén. Preferiría estar en algún lugar de la taiga medio muerto de hambre, pero ayudando a la gente.\n- Vladímir Zhirinovski"
 LOADING_TIP_107: "¿Es posible afirmar con certeza que el público en la sala no tiene absolutamente nada que ver con lo que ocurre en el escenario?\n- Yukio Mishima"
 LOADING_TIP_108: "No es necesario obligar a los niños a aprender inglés. Mejor que estudien el rifle de asalto Kaláshnikov. Y pronto todo el mundo hablará ruso.\n- Vladímir Zhirinovski"
 LOADING_TIP_109: "La guerra es lo que sucede cuando el lenguaje falla.\n- Margaret Atwood"
 LOADING_TIP_110: "Una casa dividida contra si misma no puede sostenerse.\n- Abraham Lincoln"
 LOADING_TIP_111: "Cuando nos rebelamos no es por una cultura en particular. Nos rebelamos simplemente porque, por muchas razones, ya no podemos respirar.\n- Franz Fanon"
 LOADING_TIP_112: "No hay nada tan efectivo para generar paz como estar bien preparado para encontrarse con el enemigo.\n- George Washington"
 LOADING_TIP_113: "El ala derecha, donde yo estaba, estaba expuesta y recibió todo el fuego enemigo... Escuché el silbido de las balas y, créanme, hay algo encantador en el sonido.\n- George Washington"
 LOADING_TIP_114: "Es una honra todo puesto en el que un hombre pueda servir a su país.\n- George Washington"
 LOADING_TIP_115: "Un pueblo no acostumbrado a las restricciones debe ser guiado, no será obligado.\n- George Washington"
 LOADING_TIP_116: "Quiero que quienes mejor me conocieron digan de mí que siempre arrancaba un cardo y plantaba una flor donde creía que una flor podría crecer.\n- Abraham Lincoln"
 LOADING_TIP_117: "Casi todos los hombres pueden soportar la adversidad, pero si quieres poner a prueba el carácter de un hombre, dale poder.\n- Abraham Lincoln"
 LOADING_TIP_118: "Los viejos Estados y su sabiduría estatal tradicional se derrumbarán a tal punto que las coronas rodarán por las aceras por docenas y no habrá nadie para recogerlas.\n- Friedrich Engels"
 LOADING_TIP_119: "El presente está ante nuestros ojos. Es tal que te hace querer cerrar los ojos.\n- Mijaíl Bulgákov"
 LOADING_TIP_120: "No voy a decirles que no lloren, porque no todo el llanto es una calamidad.\n- Gandalf, «El retorno del Rey»"
 LOADING_TIP_121: "Cuanto más oscura la noche, más brillantes las estrellas, ¡cuanto más profundo el dolor, más cerca está Dios!\n- Apolón Máikov"
 LOADING_TIP_122: "¡Cuidado con el lenguaje, señores! Y no olvidemos que en la historia de la humanidad las guerras económicas a menudo se han convertido en guerras reales.\n- Dmitri Medvédev"
 LOADING_TIP_123: "Durante años, quizá décadas, podemos olvidarnos de las relaciones normales con Occidente. No es nuestra elección. Ahora debemos prescindir de ellos hasta que una nueva generación de políticos razonables llegue al poder allí. Seamos cuidadosos y vigilantes.\n- Dmitri Medvédev"
 LOADING_TIP_124: "Por desgracia, ahora ya no tenemos a nadie con quién hablar ni negociar en Occidente, no hay nada de qué hablar y no hay necesidad de hacerlo.\n- Dmitri Medvédev"
 LOADING_TIP_125: "¿Y esta gente realmente se considera líder mundial, reivindica algo global y sueña con dictar su voluntad a los demás? ¿Sobre qué base, si se han desacreditado, han admitido su impotencia, han mentido y están sumidos en problemas?\n- Dmitri Medvédev"
 LOADING_TIP_126: "La OTAN fue creada como un instrumento de la Guerra Fría en la lucha contra la Unión Soviética y el llamado Pacto de Varsovia. Hoy día no existen ni el Pacto de Varsovia ni la Unión Soviética, pero existe la OTAN. Surge la pregunta: ¿por qué?\n- Vladímir Putin"
 LOADING_TIP_127: "No obligamos a nadie, no chantajeamos a nadie, no amenazamos a nadie... Somos gente educada...\n- Serguéi Lavrov"
 LOADING_TIP_128: "Europa sin Rusia no es Europa; Rusia ha salvado a Europa de sí misma más de una vez.\n- Serguéi Lavrov"
 LOADING_TIP_129: "El patriotismo, como sabemos, no es otra cosa que el amor a la Madre Patria. Sin esto, ningún país puede existir; simplemente se disolverá, como un trozo de azúcar en este té.\n- Vladímir Putin"
 LOADING_TIP_130: "Ellos no vienen por MÍ, vienen por TI, ¡y yo estoy en su camino!\n- Donald Trump"
 LOADING_TIP_131: "Nos enfrentamos a un enemigo común. La prensa soviética lo llamó \"imperialismo mundial\". Hoy aclaramos este antiguo nombre. El globalismo agresivo, que erige apresuradamente bajo la bandera del \"nuevo orden mundial\" un \"reino de la bestia\" liberal-apocalíptico.\n- Guennadi Ziugánov"
 LOADING_TIP_132: "Yo soy responsable sólo ante Dios y la Historia.\n- Francisco Franco"
 LOADING_TIP_133: "El poder es la retórica más persuasiva.\n- Friedrich Schiller"
 LOADING_TIP_134: "Hoy somos tolerantes y mañana somos extranjeros en nuestro propio país.\n- Alexander Gauland"
 LOADING_TIP_135: "La naturaleza es la misma Roma, y parece que de nuevo no tenemos necesidad de molestar en vano a los dioses: ¡ahí están las entrañas de las víctimas para adivinar sobre la guerra, los esclavos para callar y las piedras para construir!\n- Ósip Mandelshtam"
 LOADING_TIP_136: "El hecho de que usted no toma un interés en la política, no significa que la política no se interese en ti.\n- Pericles"
 LOADING_TIP_137: "La piedad con los culpables es crueldad con los inocentes.\n- Adam Smith"
 LOADING_TIP_138: "No quiero que dentro de 70 años me pregunten: \"¿No sabías esto?\" y luego tener que decir: \"Sí, lo sabíamos, pero no hicimos nada\".\n- Jörg Meuthen"
 LOADING_TIP_139: "La globalización salvaje ha beneficiado a algunos, pero ha sido una catástrofe para la mayoría.\n- Marine Le Pen"
 LOADING_TIP_140: "De todos modos, los periodistas son las mayores prostitutas del planeta.\n- H.C. Strache"
 LOADING_TIP_141: "En política, la estupidez no es una desventaja.\n- Napoleón Bonaparte"
 LOADING_TIP_142: "¡Nadie pretende construir un muro!\n- Walter Ulbricht, dos meses antes de la construcción del Muro de Berlín."
 LOADING_TIP_143: "La inmigración es guerra.\n- Eric Zemmour"
 LOADING_TIP_144: "Prefiero la libertad con peligro que la paz con esclavitud.\n- Jean-Jacques Rousseau"
 LOADING_TIP_145: "Somos defensores de la abolición de la guerra; no queremos la guerra; pero la guerra solo puede eliminarse mediante la guerra. Si no queremos armas, debemos tomarlas.\n- Mao Zedong"
 LOADING_TIP_146: "Creo que el pueblo ruso no es en absoluto peor que otros y es plenamente maduro para la democracia y está dispuesto a resolver los problemas de la guerra y la paz de forma democrática.\n- Alekséi Navalni"
 LOADING_TIP_147: "Estoy a favor de la asimilación, no de la deportación. Si quieres vivir aquí, debes ser ruso. Si un niño crece en Rusia, ¿por qué debería ser tayiko? Que se vuelvan literalmente rusos. Cuando la gente llega a Estados Unidos, la mayoría se vuelven estadounidenses.\n- Alekséi Navalni"
 LOADING_TIP_148: "Si quieren venir que vengan, les presentaremos batalla.\n- Leopoldo Galtieri"
 LOADING_TIP_149: "El islam pertenece a Alemania como un barrio rojo pertenece a La Meca.\n- Akif Pirinçci"
 LOADING_TIP_150: "La luz al final del túnel también puede ser un tren que se aproxima.\n- Gregor Gysi"
 LOADING_TIP_151: "Aquel que infunde temor en los demás vive constantemente con miedo.\n- Claudiano"
 LOADING_TIP_152: "La paz si es posible, la verdad a toda costa.\n- Martín Lutero"
 LOADING_TIP_153: "Las fronteras solo existen si las defiendes. De lo contrario, no existen.\n- Giorgia Meloni"
 LOADING_TIP_154: "Quien no se mueve, no siente las cadenas.\n- Rosa Luxemburgo"
 LOADING_TIP_155: "Que me odien con tal de que me teman.\n- Calígula"
 LOADING_TIP_156: "El que predica la guerra es un apóstol del demonio.\n- John Ray"
 LOADING_TIP_157: "Debería haber muerto en Waterloo.\n- Napoleón Bonaparte"
 LOADING_TIP_158: "Regresaré en tres días, favor de no lavar.\n- Napoleón Bonaparte"
 LOADING_TIP_159: "La anarquía es el trampolín hacia el poder absoluto.\n- Napoleón Bonaparte"
 LOADING_TIP_160: "La inmortalidad es el mejor recuerdo que uno deja.\n- Napoleón Bonaparte"
 LOADING_TIP_161: "Besa los pies del Papa, siempre que tenga las manos atadas.\n- Napoleón Bonaparte"
 LOADING_TIP_162: "A un gran pueblo se le puede matar, pero no se le puede intimidar.\n- Napoleón Bonaparte"
 LOADING_TIP_163: "El coraje no se puede falsificar. Es una virtud que escapa a la hipocresía.\n- Napoleón Bonaparte"
 LOADING_TIP_164: "Europa es un grano de arena. Nunca ha tenido grandes imperios, como los de Oriente, que suman seiscientos millones de almas.\n- Napoleón Bonaparte"
 LOADING_TIP_165: "Ciudadanos, ¿Querían una revolución sin revolución?\n- Maximilien Robespierre"
 LOADING_TIP_166: "Con este discurso, firmé mi sentencia de muerte. Hoy vi que la alianza de los malhechores es demasiado fuerte, de la que no puedo escapar. Muero sin remordimiento, les dejo mi legado; será querido para ustedes y lo defenderán.\n- Maximilien Robespierre"
 LOADING_TIP_167: "Creo que estamos de acuerdo: el pasado se acabó.\n- George W. Bush"
 LOADING_TIP_168: "Sé que los seres humanos y los peces podemos coexistir pacíficamente.\n- George W. Bush"
 LOADING_TIP_169: "Debemos detener el terrorismo. Llamo a todas las naciones para que hagan todo lo posible para detener a estos asesinos terroristas. Gracias... ahora vean este drive.\n- George W. Bush"
 LOADING_TIP_170: "La decisión de un hombre, de lanzar una invasión totalmente injustificada y brutal de Irak. Digo, de Ucrania.\n- George W. Bush"
 LOADING_TIP_171: "Pues claro que recortaré los impuestos a los más ricos. Eso fomenta el emprendimiento. Lo que los republicanos deberíamos defender es el crecimiento económico. Deberíamos hacer que la tarta sea más grande.\n- George W. Bush"
 LOADING_TIP_172: "Rara vez se pregunta: ¿Están aprendiendo nuestro niños?\n- George W. Bush"
 LOADING_TIP_173: "Si le enseñas a un niño a leer, el o ella podrá aprobar un examen de alfabetización.\n- George W. Bush"
 LOADING_TIP_174: "Me malsubestimaron.\n- George W. Bush"
 LOADING_TIP_175: "Verás, en mi trabajo hay que repetir las cosas una y otra vez para que la verdad se entienda y para, de alguna manera, catapultar la propaganda.\n- George W. Bush"
 LOADING_TIP_176: "Encuentren terroristas y métanlos en los inodoros.\n- Vladímir Putin"
 LOADING_TIP_177: "Rusia no es un país que extradita a activistas de derechos humanos.\n- Vladímir Putin"
 LOADING_TIP_178: "Lo bueno de mí es que soy muy rico.\n- Donald Trump"
 LOADING_TIP_179: "Podría pararme en plena Quinta Avenida, dispararle a alguien, y no perdería ningún voto, ¿vale? Es increíble.\n- Donald Trump"
 LOADING_TIP_180: "Nunca he visto a un flaco beber Coca Light.\n- Donald Trump"
 LOADING_TIP_181: "Para mí, la palabra \"libertad\" no significa un punto de partida, sino un verdadero punto final. El punto de partida lo define la palabra \"orden\". La libertad no puede existir sin el concepto de orden.\n- Klemens von Metternich"
 LOADING_TIP_182: "Las acciones del imperialismo, especialmente de las superpotencias, no pueden impedir que los países en desarrollo avancen victoriosos en el camino hacia la liberación económica.\n- Deng Xiaoping"
 LOADING_TIP_183: "¡Dios no permita que veamos un motín ruso, insensato y despiadado!\n- Aleksandr Pushkin"
 LOADING_TIP_184: "Nuestro liberal es ante todo un lacayo que sólo se preocupa de limpiar las botas de quién sea.\n- Fiódor Dostoyevski"
 LOADING_TIP_185: "Si no estamos destinados a ganar, demostraremos que el ejército ruso sabe morir.\n- Lavr Kornílov"
 LOADING_TIP_186: "Si necesito un televisor, compro uno japonés, no chino. El chino podría explotar.\n- Jackie Chan"
 LOADING_TIP_187: "No sé qué es mejor, tener libertad o no tenerla. Demasiada libertad puede llevar al caos. Lo que ocurrió en Taiwán podría ocurrir. El pueblo chino necesita ser controlado; de lo contrario, hará lo que quiera.\n- Jackie Chan"
 LOADING_TIP_188: "En cualquier historia heroica: antes de que aparezca el monstruo, el héroe permanece desconocido.\n- Ai Weiwei"
 LOADING_TIP_189: "Todo en el mundo es arte y todo en el mundo es política.\n- Ai Weiwei"
 LOADING_TIP_190: "No soy un hombre de hierro, sino un cuerpo de carne y sangre hecho de pasión.\n- Hu Yaobang"
 LOADING_TIP_191: "La tendencia mundial es imparable. Si la sigues, prosperarás; Si vas contra ella, perecerás.\n- Sun Yat-sen"
 LOADING_TIP_192: "Siempre intenté convertir cada desastre en una oportunidad.\n- John D. Rockefeller"
 LOADING_TIP_193: "Deja tu trabajo y dispárale a un político.\n- Mike Ma"
 LOADING_TIP_194: "Al final, en los días más oscuros, el hombre sonríe en la cima de los escombros de la montaña. Puede ver las estrellas, oler el viento; solo entonces sabe que es libre.\n- Mike Ma"
 LOADING_TIP_195: "La naturaleza siempre gana. Nunca ha perdido, y rezo por que nunca lo haga.\n- Mike Ma"
 LOADING_TIP_196: "Si hay una conclusión, es cero.\n- Nick Land"
 LOADING_TIP_197: "Es más fácil imaginar el fin del mundo que el fin del capitalismo.\n- Mark Fisher"
 LOADING_TIP_198: "Date prisa en rechazar el trabajo antes de que algún nuevo sofista te vuelva a decir que «el trabajo te hace libre». Date prisa en jugar. Date prisa en armarte.\n- Alfredo Bonanno"
 LOADING_TIP_199: "Ninguna alegría verdadera puede llegarnos desde el mecanismo racional de la explotación capitalista. La alegría no tiene reglas fijas para catalogarla.\n- Alfredo Bonnano"
 LOADING_TIP_200: "La muerte física, tan preocupante en el mundo de la muerte, es menos mortificante que lo que se vende como vida.\n- Alfredo Bonanno"
 LOADING_TIP_201: "La libertad no tiene sentido si sólo consiste en la libertad de estar de acuerdo con quienes están en el poder.\n- Ludwig von Mises"
 LOADING_TIP_202: "Primero hazte impopular, luego te tomarán en serio.\n- Konrad Adenauer"
 LOADING_TIP_203: "Francia no tiene amigos, sólo intereses.\n- Charles de Gaulle"
 LOADING_TIP_204: "Si el pueblo supiera con qué idiotez lo gobiernan, se rebelaría.\n- Carlomagno"
 LOADING_TIP_205: "El tiempo lo es todo; cinco minutos marcan la diferencia entre la victoria y la derrota.\n- Horatio Nelson"
 LOADING_TIP_206: "Los cobardes agonizan muchas veces antes de morir.\n- Julio César"
 LOADING_TIP_207: "Encontraré una manera o la crearé.\n- Aníbal"
 LOADING_TIP_208: "La paz eterna es un sueño, y ni siquiera un sueño hermoso, pero en la guerra se pueden ver sueños hermosos que, al despertar, dejan con arrepentimiento que ya no continuarán.\n- Aleksandr Kolchak"
 LOADING_TIP_209: "No puede haber derrotas, sólo dificultades temporales.\n- Aleksandr Kolchak"
 LOADING_TIP_210: "A veces, simplemente que nos digan que toquemos las sinfonías de Beethoven no es suficiente para que las interpretemos bien.\n- Aleksandr Kolchak"
 LOADING_TIP_211: "A los esclavos les gusta parecer personas libres.\n- Eduard Limónov"
 LOADING_TIP_212: "Un pequeño ladrillo plano, es el invento más ingenioso de la humanidad. ¡Cuántos han sido extraviados por los libros! ¡La Biblia y el Evangelio han causado varias guerras! ¡Y los libros de Marx! ¡Y \"Mein Kampf\"! ¡Y \"Minimanual del Guerrillero Urbano\" de Marighella!\n- Eduard Limónov"
 LOADING_TIP_213: "No hay ni izquierda ni derecha: existe el Sistema y los enemigos del Sistema.\n- Eduard Limónov"
 LOADING_TIP_214: "No soy un pervertido, solo soy italiano.\n- Andrew Cuomo"
 LOADING_TIP_215: "La humanidad debe poner fin a la guerra, o la guerra pondrá fin a la humanidad.\n- John F. Kennedy"
 LOADING_TIP_216: "El mundo ya no necesita al diablo; se tiene a sí mismo.\n- Desconocido"
 LOADING_TIP_217: "Hay libertad de expresión, pero no puedo garantizar libertad después de la expresión.\n- Idi Amin"
 LOADING_TIP_218: "La vida moderna es tan superficial y falsa. Espero con ansias el momento en que los promotores inmobiliarios quiebren, Japón se empobrezca y la hierba silvestre se apodere de todo.\n- Hayao Miyazaki"
 LOADING_TIP_219: "Lo único que se necesita para que el mal triunfe es que la gente buena no haga nada.\n- Alekséi Navalni"
 LOADING_TIP_220: "¿No lo oyes rugir en mil ciudades? ¿No oyes sus tormentas alrededor de nosotros, como en los días cuando las batallas nos cercaban? ¿No veis su llama ardiendo en los ojos de cada uno de nosotros?\n- Ernst Jünger"
 LOADING_TIP_221: "La autoridad y la obediencia no son sólo cosas necesarias, sino que son eminentemente útiles. Algunos seres, desde el momento en que nacen, están destinados, unos a obedecer, otros a mandar.\n- Aristóteles, Política"
 LOADING_TIP_222: "El viejo mundo muere, y el nuevo lucha por nacer: ahora es la época de los monstruos.\n- Antonio Gramsci"
 LOADING_TIP_223: "Hay guerras justas pero no hay ejércitos justos.\n- André Malraux"
 LOADING_TIP_224: "No nos enriquecemos con lo que tenemos sino con lo que podemos prescindir.\n- Immanuel Kant"
 LOADING_TIP_225: "¡Dame la libertad o dame la muerte!\n- Patrick Henry"
 LOADING_TIP_226: "Cualquier persona que tenga visiones debe consultar a un médico.\n- Helmut Schmidt"
 LOADING_TIP_227: "Tras completar una revolución, comenzaremos una nueva. Entonces podremos experimentar las dificultades de la vida con mayor consciencia que hoy.\n- Ryūnosuke Akutagawa"
 LOADING_TIP_228: "Estaba a la izquierda de la ultraizquierda. Y por eso la despreciaba.\n- Ryūnosuke Akutagawa"
 LOADING_TIP_229: "Ciertamente he fracasado. Pero lo que me creó seguramente creará a alguien más. La muerte de un solo árbol tiene poca importancia. Mientras exista una vasta tierra que albergue innumerables semillas.\n- Ryūnosuke Akutagawa"
 LOADING_TIP_230: "Un buen sistema es más importante que un buen líder.\n- Wang Yang"
 LOADING_TIP_231: "Debemos disipar la percepción errónea de que la felicidad de la gente es un regalo del Partido y del Gobierno.\n- Wang Yang"
 LOADING_TIP_232: "La justicia es justicia en el punto de partida, no justicia en el punto final.\n- Hu Chunhua"
 LOADING_TIP_233: "Di vueltas y vueltas hasta que finalmente llegué a un lugar donde las hojas no caían en invierno.\n- Hu Chunhua"
 LOADING_TIP_234: "Nosotros los comunistas también tenemos fe. Creemos en el marxismo-leninismo y luchamos por la causa del comunismo toda nuestra vida. Esto exige que nos dediquemos al Partido y al país.\n- Chen Quanguo"
 LOADING_TIP_235: "Personalmente no tengo ningún interés en ir a Estados Unidos y no tengo ningún activo allí. Las llamadas \"sanciones\" no son más que una farsa horrible y un truco repugnante de los políticos estadounidenses para humillarse, y no pueden asustar a nadie en absoluto.\n- Chen Quanguo"
 LOADING_TIP_236: "El ejercicio del poder es la parte central de la política china. Sin un ejercicio efectivo del poder no puede haber un país estable y unificado.\n- Wang Huning"
 LOADING_TIP_237: "Fe de hierro, convicción de hierro, disciplina de hierro y responsabilidad de hierro.\n- Li Zuocheng"
 LOADING_TIP_238: "El pueblo chino nunca permitirá que ninguna fuerza nos intimide, nos oprima o nos esclavice. ¡Cualquiera que intente, sufrirá una sangría en la cabeza frente a la Gran Muralla de Acero construida con la carne y sangre de más de 1.400 millones de chinos!\n- Xi Jinping"
 LOADING_TIP_239: "La gente de hoy suele decir que sus predecesores eran incompetentes y que hicieron que China fuera así. Espero que las futuras generaciones de chinos no digan que los chinos de hoy son incompetentes y crearon China como es. Este es mi mayor deseo.\n- Wang Huning"
 LOADING_TIP_240: "La \"espada\" debe estar firmemente en manos del Partido y del pueblo.\n- Chen Wenqing"
 LOADING_TIP_241: "Para \"vivir como un héroe y morir como un fantasma heroico\"... uno debe tener la noble ambición de \"atreverse a hacer grandes sacrificios y atreverse a cambiar el sol y la luna en un nuevo cielo\".\n- Chen Quanguo"
 LOADING_TIP_242: "Quienes se dedican a asuntos civiles también deben estar preparados para los asuntos militares.\n- Li Zuocheng"
 LOADING_TIP_243: "Una nación esperanzada no puede existir sin héroes, y un país prometedor no puede existir sin pioneros.\n- Xi Jinping"
 LOADING_TIP_244: "La gente no debería andar tirando la palabra «nuclear». Yo la llamo la palabra con N. Hay dos palabras con N, y no puedes usar ninguna de ellas.\n- Donald Trump"
 ship_light_battery_1: "Batería ligera anticuada"
 ship_light_battery_1_short: "Batería ligera I"
 ship_light_battery_1_desc: "Un cañón relativamente pequeño que se puede usar en corbetas y buques más pequeños."
 ship_light_battery_2: "Batería ligera básica"
 ship_light_battery_2_short: "Batería ligera II"
 ship_light_battery_2_desc: "Un cañón pequeño con una torreta motorizada que le permite apuntar al objetivo con mayor rapidez."
 ship_light_battery_3: "Batería ligera mejorada"
 ship_light_battery_3_short: "Batería ligera III"
 ship_light_battery_3_desc: "Un cañón pequeño reforzado."
 ship_light_battery_4: "Batería ligera avanzada"
 ship_light_battery_4_short: "Batería ligera IV"
 ship_light_battery_4_desc: "Un cañón pequeño de disparo rápido para lidiar con naves enemigas ligeras."
 ship_light_battery_5: "Batería ligera semifuturista"
 ship_light_battery_5_short: "Batería ligera V"
 ship_light_battery_5_desc: "Un cañon pequeño mejorado, diseñado con la precisión como objetivo principal. Esta arma puede acertar fácilmente a objetivos a kilómetros de distancia sin sacrificar cadencia."
 ship_light_battery_6: "Batería ligera futurista"
 ship_light_battery_6_short: "Batería ligera VI"
 ship_light_battery_6_desc: "El mejor cañón ligero disponible para corbetas y buques pequeños. Gracias a una interfaz totalmente digital y computación avanzada, supera a cualquier cañón de su categoría."
 dp_light_battery: "Batería de doble función"
 dp_light_battery_short: "Batería de doble función I"
 dp_light_battery_desc: "Una combinación de municiónes antibuques y antiaéreas permite que esta arma avanzada cambie rápidamente entre objetivos de superficie y aéreos."
 dp_light_battery_2: "Batería de doble función mejorada"
 dp_light_battery_2_short: "Batería de doble función II"
 dp_light_battery_2_desc: "Se esperaba que las municiones programables condujeran al mismo concepto a menor escala. Estas pequeñas balas son extremadamente versátiles y representan un gran peligro para objetivos ligeros."
 ship_heavy_battery_1: "Sistema de lanzamiento vertical de 32 celdas anticuado"
 ship_heavy_battery_1_short: "VLS de 32 celdas I"
 ship_heavy_battery_1_desc: "Un bloque de celdas de misiles de crucero antiguo, pero potente."
 ship_heavy_battery_2: "VLS de 32 celdas básico"
 ship_heavy_battery_2_short: "VLS de 32 celdas II"
 ship_heavy_battery_2_desc: "Diseños de celdas más elegantes y resistentes a la intemperie mejoran la confiabilidad y la facilidad de uso."
 ship_heavy_battery_3: "VLS de 32 celdas mejorado"
 ship_heavy_battery_3_short: "VLS de 32 celdas III"
 ship_heavy_battery_3_desc: "Un sistema de lanzamiento vertical con capacidad de lanzamiento caliente."
 ship_heavy_battery_4: "VLS de 32 celdas avanzado"
 ship_heavy_battery_4_short: "VLS de 32 celdas IV"
 ship_heavy_battery_4_desc: "Una interfaz totalmente digitalizada mejora la capacidad de la tripulación para utilizar el sistema y diagnosticar problemas."
 ship_heavy_battery_5: "VLS de 32 celdas semifuturista"
 ship_heavy_battery_5_short: "VLS de 32 celdas V"
 ship_heavy_battery_5_desc: "Un bloque moderno ligeramente mejorado de celdas de misiles de crucero."
 ship_heavy_battery_6: "VLS de 32 celdas futuro"
 ship_heavy_battery_6_short: "VLS de 32 celdas VI"
 ship_heavy_battery_6_desc: "Con el uso específico de municiones programables, este sistema de armas tiene una versatilidad en el mar sin igual."
 ship_super_heavy_battery_1: "VLS de 40 celdas básico"
 ship_super_heavy_battery_1_short: "VLS de 40 celdas I"
 ship_super_heavy_battery_1_desc: "Un conjunto de celdas muy grande para uso exclusivo en los cruceros modernos más grandes."
 ship_super_heavy_battery_2: "VLS de 40 celdas mejorado"
 ship_super_heavy_battery_2_short: "VLS de 40 celdas II"
 ship_super_heavy_battery_2_desc: "Un bloque mejorado de celdas de misiles para cruceros de batalla. Pocos buques pueden soportar la carga de este enorme sistema."
 ship_light_medium_battery_1: "Artillería anticuada"
 ship_light_medium_battery_1_short: "Artillería naval I"
 ship_light_medium_battery_1_desc: "Un compromiso entre la velocidad de disparo y el peso del proyectil, este cañón está diseñado para ser utilizado en fragatas para derrotar a buques más pequeños."
 ship_light_medium_battery_2: "Artillería básica"
 ship_light_medium_battery_2_short: "Artillería naval II"
 ship_light_medium_battery_2_desc: "Este cañón representa una evolución de los modelos anteriores y está destinado a permitir que las fragatas tengan una cómoda ventaja en potencia de fuego sobre las corbetas y los destructores más antiguos."
 ship_light_medium_battery_3: "Artillería mejorada"
 ship_light_medium_battery_3_short: "Artillería naval III"
 ship_light_medium_battery_3_desc: "Al incorporar una serie de nuevas tecnologías, este montaje algo blindado aumenta aún más la distancia entre los cañones de las corbetas y las fragatas."
 ship_light_medium_battery_4: "Artillería avanzada"
 ship_light_medium_battery_4_short: "Artillería naval IV"
 ship_light_medium_battery_4_desc: "Diseñado desde cero para una alta cadencia de tiro, este montaje fue creado para permitir que las fragatas y destructores desactiven enemigos incluso más grandes a largas distancias."
 ship_light_medium_battery_5: "Artillería semifuturista"
 ship_light_medium_battery_5_short: "Artillería naval V"
 ship_light_medium_battery_5_desc: "Podría decirse que es la evolución final del armamento naval ligero; las ojivas programables disparadas por este cañón permiten un cambio rápido de tipos de objetivos sin necesidad de cargar un proyectil diferente."
 ship_light_medium_battery_6: "Artillería futurista"
 ship_light_medium_battery_6_short: "Artillería naval VI"
 ship_light_medium_battery_6_desc: "Un cañón de riel electromagnético mejora la velocidad del proyectil acelerando la bala además del propulsor estándar."
 ship_medium_battery_1: "Sistema de lanzamiento vertical anticuado"
 ship_medium_battery_1_short: "VLS de 16 celdas I"
 ship_medium_battery_1_desc: "Si bien no puede competir con los cruceros, este sistema aún causará daños significativos a buques similares."
 ship_medium_battery_2: "Sistema de lanzamiento vertical básico"
 ship_medium_battery_2_short: "VLS de 16 celdas II"
 ship_medium_battery_2_desc: "Una ligera mejora con respecto a modelos anteriores, este VLS sirve como un compromiso entre tamaño y costo."
 ship_medium_battery_3: "Sistema de lanzamiento vertical mejorado"
 ship_medium_battery_3_short: "VLS de 16 celdas III"
 ship_medium_battery_3_desc: "Un sistema de escape consolidado para cada conjunto de dos celdas ha dejado espacio para desarrollos adicionales del propio armamento."
 ship_medium_battery_4: "Sistema de lanzamiento vertical avanzado"
 ship_medium_battery_4_short: "VLS de 16 celdas IV"
 ship_medium_battery_4_desc: "Una modularización útil de las celdas de misiles individuales permite un uso más sencillo del propio sistema."
 ship_medium_battery_5: "Sistema de lanzamiento vertical semifuturista"
 ship_medium_battery_5_short: "VLS de 16 celdas V"
 ship_medium_battery_5_desc: "Un proceso de recarga avanzado reduce el tiempo necesario para cargar nuevos misiles."
 ship_medium_battery_6: "Sistema de lanzamiento vertical futuro"
 ship_medium_battery_6_short: "VLS de 16 celdas VI"
 ship_medium_battery_6_desc: "Un sistema de armas integrado digitalmente que funciona con municiones programables aporta una gran versatilidad a una flota."
 ship_secondaries_1: "Lanzamisiles superficie-superficie básico"
 ship_secondaries_1_short: "Lanzador SSM I"
 ship_secondaries_1_desc: "Un sistema de misiles antibuque estándar montado en una torreta diseñado para apuntar a objetivos pequeños mientras las armas principales se enfocan en objetivos mayores."
 ship_secondaries_2: "Lanzamisiles superficie-superficie mejorado"
 ship_secondaries_2_short: "Lanzador SSM II"
 ship_secondaries_2_desc: "Misiles antibuque más rápidos y ágiles proporcionan un impacto más confiable."
 ship_secondaries_3: "Lanzamisiles superficie-superficie semifuturista"
 ship_secondaries_3_short: "Lanzador SSM III"
 ship_secondaries_3_desc: "Diseños superficie-superficie de alto empuje y gran carga útil."
 dp_ship_secondaries: "Lanzamisiles de doble función"
 dp_ship_secondaries_short: "Lanzador SAM/SSM I"
 dp_ship_secondaries_desc: "Al diseñar una ojiva multipropósito para misiles superficie-aire convencionales, estos también pueden ser eficaces para dañar objetivos de superficie. Esto crea un arma multipropósito para el despliegue de misiles ofensivos."
 dp_ship_secondaries_2: "Lanzamisiles de doble función mejorado"
 dp_ship_secondaries_2_short: "Lanzador SAM/SSM II"
 dp_ship_secondaries_2_desc: "Ojivas personalizables digitalmente para ataques sucesivos al aire y a la superficie."
 ship_fire_control_system_0: "Orientación mecánica"
 ship_fire_control_system_0_short: "Control de fuego clásico"
 ship_fire_control_system_0_desc: "Utilizando ingeniería mecánica comprobada, los sistemas de orientación del buque serán fiables, pero simples."
 ship_fire_control_system_1: "Guía predictiva actualizada"
 ship_fire_control_system_1_short: "Control de fuego I"
 ship_fire_control_system_1_desc: "Los cañones navales modernos requieren mayor guía que los antiguos debido a su largo alcance. Este sistema busca ofrecer un buen equilibrio entre precisión y fiabilidad."
 ship_fire_control_system_2: "Orientación centrada en la red"
 ship_fire_control_system_2_short: "Control de fuego II"
 ship_fire_control_system_2_desc: "La importante integración digital de los sistemas de armas y de detección proporciona una ventaja en la cantidad de información que se puede adquirir."
 ship_fire_control_system_3: "Bloqueo poslanzamiento"
 ship_fire_control_system_3_short: "Control de fuego III"
 ship_fire_control_system_3_desc: "Los sistemas de detección y orientación están integrados para permitir la fijación independiente del objetivo del misil tras el lanzamiento. Esto permite una mayor precisión del misil a distancias extremas."
 ship_fire_control_system_4: "Computadoras integradas"
 ship_fire_control_system_4_short: "Control de fuego IV"
 ship_fire_control_system_4_desc: "Software actualizado que recopila toda la información de detección y selección de objetivos para un grupo de combate naval. Esto facilita la comunicación al permitir que los participantes vean en pantalla la actividad de cada buque aliado."
 ship_fire_control_system_5: "Pantallas holográficas"
 ship_fire_control_system_5_short: "Control de fuego V"
 ship_fire_control_system_5_desc: "Los sistemas de mapeo y avistación tridimensionales brindan mayor claridad a las fuerzas que participan en el combate naval."
 ship_torpedo_1: "Lanzatorpedos anticuado"
 ship_torpedo_1_short: "Lanzatorpedos I"
 ship_torpedo_1_desc: "Un conjunto de torpedos medianos que puede colocarse en los buques de guerra de superficie."
 ship_torpedo_2: "Lanzatorpedos básico"
 ship_torpedo_2_short: "Lanzatorpedos II"
 ship_torpedo_2_desc: "Al montar otro lanzatorpedos en la torreta, un buque de superficie puede disparar con mayor dispersión y más probabilidades de impacto."
 ship_torpedo_3: "Lanzatorpedos mejorado"
 ship_torpedo_3_short: "Lanzatorpedos III"
 ship_torpedo_3_desc: "Los torpedos más grandes pueden llevar una cabeza explosiva más grande que inflija más daño al objetivo. Sin embargo, para esto, el lanzatorpedos debe tener menos tubos."
 ship_torpedo_4: "Lanzatorpedos avanzado"
 ship_torpedo_4_short: "Lanzatorpedos IV"
 ship_torpedo_4_desc: "Una vez solventados los problemas mecánicos del lanzamiento de torpedos más grandes desde los buques de superficie, este modelo avanzado puede recargarse con mayor rapidez para disparar otra salva."
 ship_torpedo_5: "Lanzatorpedos semifuturista"
 ship_torpedo_5_short: "Lanzatorpedos V"
 ship_torpedo_5_desc: "Los torpedos con una velocidad más rápida alcanzarán su objetivo mucho antes, acabando la batalla rápidamente."
 ship_torpedo_6: "Lanzatorpedos futuros"
 ship_torpedo_6_short: "Lanzatorpedos VI"
 ship_torpedo_6_desc: "Tras el lanzamiento, la configuración de la dirección del objetivo permite lanzar un torpedo desde un costado del buque y, al mismo tiempo, apuntar a un buque al otro costado. Esto resulta invaluable durante una retirada."
 ship_torpedo_sub_1: "Tubos lanzatorpedos anticuados"
 ship_torpedo_sub_1_short: "Tubos lanzatorpedos I"
 ship_torpedo_sub_1_desc: "Un conjunto básico de tubos lanzatorpedos que se puede recargar en el interior del submarino."
 ship_torpedo_sub_2: "Tubos lanzatorpedos básicos"
 ship_torpedo_sub_2_short: "Tubos lanzatorpedos II"
 ship_torpedo_sub_2_desc: "Una sala de torpedos más grande permite colocar más tubos lanzatorpedos. También ofrece más espacio vital para la tripulación."
 ship_torpedo_sub_3: "Tubos lanzatorpedos mejorados"
 ship_torpedo_sub_3_short: "Tubos lanzatorpedos III"
 ship_torpedo_sub_3_desc: "Un conjunto de tubos lanzatorpedos más grandes que permite que los submarinos disparen torpedos de mayor tamaño."
 ship_torpedo_sub_4: "Tubos lanzatorpedos avanzados"
 ship_torpedo_sub_4_short: "Tubos lanzatorpedos IV"
 ship_torpedo_sub_4_desc: "La incorporación de una rampa de carga eléctrica permite recargar los tubos lanzatorpedos en cuestión de minutos."
 ship_torpedo_sub_5: "Tubos lanzatorpedos semifuturistas"
 ship_torpedo_sub_5_short: "Tubos lanzatorpedos V"
 ship_torpedo_sub_5_desc: "En estos nuevos tubos se integrarán diferentes tipos de torpedos y se cambiarán dependiendo del objetivo."
 ship_torpedo_sub_6: "Tubos lanzatorpedos futuros"
 ship_torpedo_sub_6_short: "Tubos lanzatorpedos VI"
 ship_torpedo_sub_6_desc: "Los métodos avanzados de despliegue de torpedos ahora permiten una mayor flexibilidad operativa."
 ship_anti_air_1: "CIWS anticuado"
 ship_anti_air_1_short: "CIWS I"
 ship_anti_air_1_desc: ""
 ship_anti_air_2: "CIWS básico"
 ship_anti_air_2_short: "CIWS II"

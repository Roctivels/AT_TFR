 light_ship_engine_1: "Motor ligero anticuado"
 light_ship_engine_1_short: "Motor ligero I"
 light_ship_engine_1_desc: "Un pequeño conjunto de turbinas de vapor pueden impulsar a un buque pequeño a gran velocidad, así como mover un buque más grande más lentamente."
 light_ship_engine_2: "Motor ligero básico"
 light_ship_engine_2_short: "Motor ligero II"
 light_ship_engine_2_desc: "Gracias a unas calderas de alta presión, el mismo peso y espacio de la maquinaria puede producir un resultado mayor."
 light_ship_engine_3: "Motor ligero mejorado"
 light_ship_engine_3_short: "Motor ligero III"
 light_ship_engine_3_desc: "Los nuevos desarrollos del material consiguen una presión de vapor más alta y, por tanto, una potencia de salida superior."
 light_ship_engine_4: "Motor ligero avanzado"
 light_ship_engine_4_short: "Motor ligero IV"
 light_ship_engine_4_desc: "Los engranajes de la turbina y los trazados del motor mejorados permiten disfrutar de una mayor eficiencia por la misma cantidad de peso."

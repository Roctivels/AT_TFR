 ship_anti_air_5: "CIWS semifuturista"
 ship_anti_air_5_short: "CIWS V"
 ship_anti_air_5_desc: ""
 ship_anti_air_6: "CIWS futuro"
 ship_anti_air_6_short: "CIWS VI"
 ship_anti_air_6_desc: ""
 ship_mine_layer_1: "Rieles de colocación de minas"
 ship_mine_layer_1_desc: "Modificaciones para que un buque de superficie pueda transportar y colocar minas navales."
 ship_mine_sweeper_1: "Equipo de eliminación de minas"
 ship_mine_sweeper_1_desc: "Equipo para desplegar los diversos equipamientos de barrido."
 ship_mine_layer_sub: "Conductos de colocación de minas"
 ship_mine_layer_sub_desc: "Modificaciones en el casco de un submarino para que pueda desplegar varias minas."
 ship_depth_charge_1: "Raíles de cargas de profundidad"
 ship_depth_charge_1_short: "Carga de profundidad I"
 ship_depth_charge_1_desc: "Un sencillo conjunto de rieles permite que las cargas de profundidad rueden por la popa del buque cuando este pase por encima del objetivo sumergido."
 ship_depth_charge_2: "Lanzador de cargas de profundidad"
 ship_depth_charge_2_short: "Carga de profundidad II"
 ship_depth_charge_2_desc: "Con una pequeña carga explosiva, este dispositivo lanza una carga de profundidad a cierta distancia, de modo que un único buque pueda soltar un patrón de cargas de profundidad en una zona más amplia."
 ship_depth_charge_3: "Mortero antisubmarino"
 ship_depth_charge_3_short: "Carga de profundidad III"
 ship_depth_charge_3_desc: "Un proyector para una carga de profundidad más pequeña con un detonador de contacto que permite que el buque se enfrente a un objetivo sin interrumpir el contacto de sonar."
 ship_depth_charge_4: "Mortero antisubmarino avanzado"
 ship_depth_charge_4_short: "Carga de profundidad IV"
 ship_depth_charge_4_desc: "Este mortero, evolución del modelo anterior, puede disparar una carga bastante más grande desde más lejos."
 ship_depth_charge_5: "Carga de profundidad inteligente"
 ship_depth_charge_5_short: "Carga de profundidad V"
 ship_depth_charge_5_desc: "Las cargas de profundidad guiadas, que son esencialmente torpedos cortos, pueden identificar y rastrear objetivos sumergidos."
 ship_depth_charge_6: "Carga de profundidad nuclear"
 ship_depth_charge_6_short: "Carga de profundidad VI"
 ship_depth_charge_6_desc: "Exactamente igual que la anterior carga de profundidad inteligente, pero con el relleno explosivo reemplazado por una pequeña ojiva nuclear."
 ship_sub_snorkel_1: "Sistemas de sigilo básicos"
 ship_sub_snorkel_1_short: "Sigilo I"
 ship_sub_snorkel_1_desc: "Un tornillo único y silencioso produce mucho menos ruido en el sonar pasivo. Además, dificulta enormemente la identificación del submarino."
 ship_sub_snorkel_2: "Sistemas de sigilo mejorados"
 ship_sub_snorkel_2_short: "Sigilo II"
 ship_sub_snorkel_2_desc: "Las placas anecoicas utilizan un diseño especial de caucho con pequeños huecos para interrumpir y absorber las ondas de sonar activas."
 ship_sub_snorkel_3: "Sistemas de sigilo avanzados"
 ship_sub_snorkel_3_short: "Sigilo III"
 ship_sub_snorkel_3_desc: "Los materiales y diseños ultrasecretos aumentan significativamente el sigilo del submarino."
 ship_airplane_launcher_1: "Helicópteros antisuperficie"
 ship_airplane_launcher_1_desc: "Un helicóptero de patrulla equipado con sensores aéreos simples para detectar buques de superficie y submarinos."
 ship_airplane_launcher_2: "Helicópteros antisuperficie/submarinos"
 ship_airplane_launcher_2_desc: "Un helicóptero de patrulla equipado con sensores aéreos avanzados y sonoboyas para avistar buques de superficie y submarinos."
 ship_deck_space: "Espacio de hangar"
 ship_deck_space_desc: "Una zona abierta más grande dentro del buque que permite armar y revisar aviones con ruedas. Al aumentar el hangar de un navío, su coste se dispara."
 ship_sonar_1: "Hidrófonos"
 ship_sonar_1_desc: "Un sencillo conjunto de hidrófonos para rastrear un objetivo sumergido mediante el sonido que emite."
 ship_sonar_2: "Sonar activo"
 ship_sonar_2_desc: "Un emisor de ruido activo que envía una breve señal hacia el agua y, posteriormente, intenta detectar el eco del casco de un submarino sumergido."
 ship_sonar_3: "Sonar avanzado"
 ship_sonar_3_desc: "Un emisor de ruido activo que envía una breve señal hacia el agua y, posteriormente, intenta detectar el eco del casco de un submarino sumergido. Mejorado respecto a versiones anteriores."
 ship_radar_1: "Radar naval anticuado"
 ship_radar_1_short: "Radar I"
 ship_radar_1_desc: ""
 ship_radar_2: "Radar naval básico"
 ship_radar_2_short: "Radar II"
 ship_radar_2_desc: ""
 ship_radar_3: "Radar naval mejorado"
 ship_radar_3_short: "Radar III"
 ship_radar_3_desc: ""
 ship_radar_4: "Radar naval avanzado"

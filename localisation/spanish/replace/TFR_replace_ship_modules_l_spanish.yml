 ship_armor_bb_1: "Acero espaciado"
 ship_armor_bb_1_short: "Blindaje de crucero I"
 ship_armor_bb_1_desc: "Este esquema de blindaje, diseñado para ofrecer protección a un buque frente a misiles de crucero, garantiza que todas las partes del mismo estén bien protegidas en función de su utilidad."
 ship_armor_bc_1: "Acero espaciado intermedio"
 ship_armor_bc_1_short: "Blindaje de clíper I"
 ship_armor_bc_1_desc: "Este esquema de blindaje, diseñado para ofrecer protección al buque frente a cañones más pequeños, pesa mucho menos para alcanzar una mayor velocidad."
 ship_armor_bb_2: "Acero espaciado astillado"
 ship_armor_bb_2_short: "Blindaje de crucero II"
 ship_armor_bb_2_desc: "Al agregar revestimientos de Kevlar al blindaje del buque, se reducirán las astillas provocadas por impactos."
 ship_armor_bc_2: "Acero espaciado astillado intermedio"
 ship_armor_bc_2_short: "Blindaje de clíper II"
 ship_armor_bc_2_desc: "Este esquema de blindaje, con un buen equilibrio ente velocidad y protección, está diseñado para defender a un buque frente a los cañones de las corbetas y los destructores."
 ship_armor_bb_3: "Acero espaciado astillado de suma cero"
 ship_armor_bb_3_short: "Blindaje de crucero III"
 ship_armor_bb_3_desc: "Ese diseño, que se aleja radicalmente de los esquemas de blindaje anteriores, crea una ciudadela blindada en el centro del navío, pero a costa de la protección de otras partes del mismo. Sirve para defender un buque frente a misiles de crucero y antibuque."
 ship_armor_bc_3: "Acero de suma cero astillado intermedio"
 ship_armor_bc_3_short: "Blindaje de clíper III"
 ship_armor_bc_3_desc: "Este esquema de blindaje, diseñado teniendo en cuenta las limitaciones de peso, intenta maximizar la protección de las partes vitales de un buque, dejando otras zonas expuestas. Este esquema no resistirá contra municiones avanzadas o futuras, por lo que su diseño es efímero."
 ship_armor_bb_4: "Blindaje compuesto avanzado astillado con CIWS integrado"
 ship_armor_bb_4_short: "Blindaje de crucero IV"
 ship_armor_bb_4_desc: "Los blindajes compuestos de nuevo desarrollo, combinados con soporte CIWS de última generación, permiten el esquema más defensivo jamás visto en buques de gran tamaño estándar."
 ship_armor_bc_4: "Blindaje compuesto intermedio astillado con CIWS integrado"
 ship_armor_bc_4_short: "Blindaje de clíper IV"
 ship_armor_bc_4_desc: "Los blindajes compuestos de nuevo desarrollo, combinados con soporte CIWS de última generación, permiten el esquema más defensivo jamás visto en un buque tan veloz."
 ship_armor_shbb: "Acero reforzado doblemente espaciado con revestimientos contra salpicaduras y defensas CIWS"
 ship_armor_shbb_short: "Blindaje de crucero de batalla I"
 ship_armor_shbb_desc: "La mayor de las defensas combinadas, esta disposición proporciona una protección sin igual sólo para las naves más grandes. Su gran peso requiere potentes reactores nucleares para proporcionar propulsión. Algunos sostienen que esta configuración es demasiado extrema, pero sólo hay una forma de saberlo con certeza..."
 ship_armor_shbb2: "Compuesto reforzado de doble espaciado con revestimientos avanzados contra las proyecciones y defensas CIWS"
 ship_armor_shbb2_short: "Blindaje de crucero de batalla II"
 ship_armor_shbb2_desc: "Una ligera mejora respecto a las defensas anteriores de los cruceros de batalla, esta configuración puede conseguir aún más eficacia defensiva, aunque con un mayor peso."
 ship_armor_cruiser_1: "Acero doblemente espaciado"
 ship_armor_cruiser_1_short: "Blindaje de destructor"
 ship_armor_cruiser_1_desc: "El blindaje espaciado aumenta las defensas contra misiles antibuque al proporcionar una zona de amortiguación de la explosión."
 ship_armor_cruiser_2: "Acero doblemente espaciado con revestimientos contra salpicaduras"
 ship_armor_cruiser_2_short: "Blindaje de destructor II"
 ship_armor_cruiser_2_desc: "Al añadir revestimientos de Kevlar al blindaje de la nave, se mitigarán las astillas provocadas por la fuerza de las conmociones."
 ship_armor_cruiser_3: "Acero espaciado mejorado con revestimientos contra salpicaduras"
 ship_armor_cruiser_3_short: "Blindaje de destructor III"
 ship_armor_cruiser_3_desc: "Las técnicas modernas han proporcionado una protección aún mejor dentro del blindaje espaciado."
 ship_armor_cruiser_4: "Acero espaciado astillado de suma cero"
 ship_armor_cruiser_4_short: "Blindaje de destructor IV"
 ship_armor_cruiser_4_desc: "Este esquema de blindaje intenta maximizar la protección en las zonas absolutamente necesarias para mantener un barco a flote y en la lucha, a costa de todas las demás zonas."
 ship_armor_cruiser_5: "Defensas activas en tándem y blindajes espaciados con revestimientos antivuelco"
 ship_armor_cruiser_5_short: "Blindaje de destructor V"
 ship_armor_cruiser_5_desc: "Mejorar las defensas no sólo proporcionando blindaje en los lugares más vitales, sino también utilizando avanzados sistemas de armas cuerpo a cuerpo para despachar los ataques entrantes antes de recibirlos."
 ship_armor_cruiser_6: "Blindaje avanzado de material compuesto con CIWS integrado y revestimientos antimetralla"
 ship_armor_cruiser_6_short: "Blindaje de destructor VI"
 ship_armor_cruiser_6_desc: "Los blindajes compuestos de nuevo desarrollo combinados con el soporte CIWS de última generación permiten el esquema más defensivo en buques semiligeros y medianos hasta la fecha."
 ship_armor_carrier_deck: "Blindaje de cubierta reforzada"
 ship_armor_carrier_deck_short: "Blindaje de cubierta de vuelo"
 ship_armor_carrier_deck_desc: "Las pesadas placas blindadas protegen el hangar frente a los impactos de bombarderos enemigos a costa del espacio de trabajo."

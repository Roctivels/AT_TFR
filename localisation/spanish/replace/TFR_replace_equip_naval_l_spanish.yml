 carrier: "Portaaviones"
 carrier_desc: "Un portaaviones es un buque de guerra que sirve como aeródromo marítimo, equipado con una cubierta de vuelo de gran tamaño e instalaciones para el transporte, armado, despliegue y recuperación de aeronaves. Normalmente, es el buque insignia de una flota, ya que permite a una fuerza naval proyectar su poderío aéreo a nivel mundial sin depender de bases locales para el despliegue de operaciones aéreas."

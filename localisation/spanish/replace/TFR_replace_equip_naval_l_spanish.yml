 battleship: "Crucero de misil"
 battleship_desc: "Los cruceros modernos suelen ser los buques más grandes de una flota, después de los portaaviones y los buques de asalto anfibio, y suelen desempeñar diversas funciones. A finales del siglo XX, la obsolescencia del acorazado convirtió al crucero en el buque de combate de superficie más grande y poderoso después del portaaviones. La función del crucero variaba según el buque y la armada, e incluía a menudo la defensa aérea y el bombardeo costero."

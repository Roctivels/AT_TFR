 naval_equipment: "Buques"
 destroyer: "Corbeta"
 destroyer_desc: "Una corbeta es un buque de guerra pequeño. Tradicionalmente, es la clase de buque más pequeña considerada un buque de guerra propiamente dicho. A finales del siglo XX y principios del XXI, las armadas modernas comenzaron a desarrollar buques de superficie más pequeños y maniobrables. Suelen estar armados con cañones de mediano y pequeño calibre, misiles tierra-tierra, misiles tierra-aire y armas antisubmarinas. Muchos pueden albergar un helicóptero antisubmarino pequeño o mediano."

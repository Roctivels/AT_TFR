 light_cruiser:1 "Fragata"
 light_cruiser_desc: "Un buque de protección ligero. Su función principal es proteger a los buques insignia de los buques ligeros enemigos, pero también puede disparar potentes torpedos que pueden dañar a buques de mayor tamaño."

 heavy_cruiser:1 "Destructor"
 heavy_cruiser_desc: "Un gran crucero blindado bastante flexible. Una buena opción para naciones que no pueden permitirse construir buques capitales más grandes."
 both_cruisers_desc: "Una fragata es un tipo de buque de guerra que ha tenido diversos tamaños y funciones a lo largo de los últimos siglos. En las armadas modernas, las fragatas se utilizan para proteger a otros buques de guerra y buques mercantes, especialmente como combatientes de guerra antisubmarina (ASW) para fuerzas expedicionarias anfibias, grupos de reabastecimiento en ruta y convoyes mercantes.\n\nEn terminología naval, un destructor es un buque de guerra rápido, maniobrable y de gran autonomía, diseñado para escoltar buques de mayor tamaño en una flota, convoy o grupo de batalla y defenderlos de atacantes más pequeños y potentes de corto alcance. A principios del siglo XXI, los destructores son el estándar mundial para los buques de combate de superficie."

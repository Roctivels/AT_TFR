 submarine: "Submarino"
 submarine_desc: "Un submarino es una embarcación capaz de operar de forma independiente bajo el agua. Su principal defensa reside en su capacidad de permanecer oculto en las profundidades del océano. Un submarino militar oculto constituye una amenaza real y, debido a su sigilo, puede obligar a una armada enemiga a desperdiciar recursos explorando extensas áreas oceánicas y protegiendo buques de ataques."

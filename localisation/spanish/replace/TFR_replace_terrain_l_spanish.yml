 toyko: "Tokio"
 toyko_desc: "----\n§9La metrópolis de Tokio es la extensa capital de Japón. Alberga a casi la mitad de la población del país, así como al gobierno civil y a la Casa Imperial de Japón, y ejerce una enorme influencia cultural, económica y política sobre el país en general.\n\nCulturalmente, Tokio es rica en templos históricos, animados centros comerciales y lugares emblemáticos como el Edificio de la Dieta, el cruce de Shibuya, la Tokyo Skytree y la Torre de Tokio. Es líder mundial en tecnología, finanzas y moda, además de ser reconocida por su seguridad y eficiente transporte público, considerado por muchos como el estándar mundial.§!\n\n§pSólo porque Ōkawa existe, amo Tokio; sólo porque Tokio existe, amo la vida.§!"
 osaka: "Osaka"
 osaka_desc: "----\n§9Osaka, capital de la prefectura de Osaka y la tercera ciudad más grande de Japón, es un importante centro económico y cultural en la región de Kansai, en Honshu. Históricamente un puerto comercial clave desde el período Kofun, Osaka se convirtió en la capital comercial de Japón durante el período Edo y se industrializó rápidamente tras la Restauración Meiji.\n\nEn la actualidad, sigue siendo un importante centro financiero, sede de la Bolsa de Osaka, así como de importantes corporaciones y prestigiosas universidades, y un centro clave de investigación y desarrollo internacional. La ciudad es conocida por su vibrante vida callejera, su oferta gastronómica y lugares emblemáticos como el Castillo de Osaka, Dōtonbori, Tsūtenkaku y Shitennō-ji, además de atracciones turísticas como Universal Studios Japan.§!\n\n§pOh ma gah§!"
 nagoya: "Nagoya"
 nagoya_desc: "----\n§9Nagoya, capital de la prefectura de Aichi, es la cuarta ciudad más poblada de Japón y un importante centro industrial y cultural de la región de Chūbu. Fundada por Tokugawa Ieyasu en 1610 con la construcción del Castillo de Nagoya, se convirtió rápidamente en la capital de la provincia de Owari y floreció durante la era Meiji.\n\nConocida por su sólido sector manufacturero, Nagoya alberga industrias clave, en particular los sectores automotriz, aeronáutico y naval, con importantes empresas como Brother Industries, Ibanez, Lexus y Toyota Tsusho con sede allí. Está bien conectada con Tokio, Kioto y Osaka a través del Tōkaidō Shinkansen. Entre los lugares de interés más destacados se incluyen el Santuario Atsuta, el Castillo de Nagoya, el Zoológico de Higashiyama y la Torre de Televisión de Nagoya.§!"
 kyoto: "Kioto"
 kyoto_desc: "----\n§9Kioto, la antigua capital imperial de Japón, es la novena ciudad más poblada del país y un importante centro cultural ubicado en la región de Kansai, en Honshu. Fundada como Heian-kyō en 794, sirvió como centro político y cultural de Japón durante el período Heian (794-1185) y permaneció como capital imperial hasta 1868.\n\nConocida por su patrimonio bien conservado y a salvo de gran parte de la destrucción de la Segunda Guerra Mundial, Kioto alberga más de 2.000 lugares religiosos, incluyendo templos emblemáticos como Kiyomizu-dera y Kinkaku-ji. La ciudad es famosa por sus artes tradicionales, ceremonias del té y espectáculos de geishas en el distrito de Gion. Su economía combina industrias tradicionales como el tejido de kimonos con empresas de tecnología moderna como Nintendo, cuya sede se encuentra en la ciudad. Kioto también alberga numerosos sitios declarados Patrimonio de la Humanidad por la UNESCO y festivales de renombre como el Gion Matsuri, manteniéndose como un destino clave para la cultura y la educación.§!\n\n§pLugar, Japón.§!"
 yokohama: "Yokohama"
 yokohama_desc: "----\n§9Yokohama es la segunda ciudad más grande de Japón y la capital de la prefectura de Kanagawa. Situada a orillas de la bahía de Tokio, en la región de Kantō, evolucionó de un pequeño pueblo pesquero a una importante ciudad portuaria tras su apertura al comercio internacional en 1859, convirtiéndose en una puerta de entrada para la influencia occidental durante la era Meiji. Su puerto, uno de los más grandes y concurridos de Japón, jugó un papel crucial en su rápido desarrollo como centro comercial e industrial.\n\nHoy en día, Yokohama es un próspero centro industrial y económico, sede de importantes corporaciones como Nissan e Isuzu. Su emblemático distrito Minato Mirai 21 cuenta con lugares emblemáticos como la Torre Yokohama Landmark y el Reloj Cosmo 21. Entre los atractivos culturales se encuentran el barrio chino de Yokohama, el más grande de Japón, y el pintoresco parque Yamashita.§!\n\n§pLuchando, ¡caliente como el infierno! De quién celebramos, ¡bienvenido Ichiban! ¡Sigue adelante y lleva una vida maravillosa!§!"
 beijing: "Pekín"
 beijing_desc: "----\n§9La vibrante y colorida calle comercial Wangfujing está a un paso de la serena atmósfera histórica de los antiguos hutongs. Los opulentos jardines de antiguos emperadores dominan los grises edificios gubernamentales, adornados con estrellas rojas y símbolos de la hoz y el martillo. Solo en Pekín, capital de la República Popular China, se pueden encontrar escenas tan extrañas y armoniosas. Desde que la dinastía Yuan la convirtió en su capital en 1271, Pekín ha resistido innumerables tormentas y ha visto pasar a numerosos gobernantes. Esta singular historia ha moldeado el eje norte-sur de la ciudad y su trazado en cuadrícula, a la vez que ha cultivado un espíritu urbano distintivo y una cultura cívica que los pequineses aprecian profundamente.\n\nPara sus compatriotas, los pequineses suelen desempeñar roles complejos, mezclando entusiasmo y arrogancia, apertura y rigidez. A pesar de estar más cerca del corazón del poder de la nación, albergan un desprecio tácito por la autoridad: \"En Pekín, un solo ladrillo lanzado podría alcanzar a una docena de jefes de buró\". Como vanguardia de la apertura e intercambio de la República con el mundo exterior, también conservan tradiciones divertidas y pintorescas, desde su acento distintivo hasta su afición por la bebida fermentada \"douzhi\". Esto refleja la propia China: una nación antigua pero joven.\nHoy, con Pekín como capital, la República Popular cuenta con más de setenta años de historia. Esta antigua ciudad ha sido testigo tanto de la prosperidad pacífica como de los tiempos turbulentos de dinastías pasadas, así como del auge, la caída y el resurgimiento de la nación. De cara al futuro, ¿hacia dónde llevarán a esta ciudad los actuales líderes de Pekín? Quizás solo la historia pueda dar la respuesta.§!"
 tianjin: "Tianjin"
 tianjin_desc: "----\n§9Tianjin, que significa \"Tianzi Jinmen\" (literalmente \"Vado del Hijo Celestial\"), ha estado inextricablemente ligada al destino de la capital de China y sus gobernantes desde su fundación. Durante los últimos dos siglos, esta ciudad soportó la humillación de China bajo un gobierno incompetente, sufrió la tiranía de las arrogantes potencias coloniales y fue testigo del sacrificio de innumerables mártires. Finalmente, dio la bienvenida al amanecer tras soportar una prolongada oscuridad. Hoy, Tianjin se erige como la ciudad industrial más grande del norte de China, sirviendo tanto como puerta marítima crucial de Pekín como núcleo del Círculo Económico de la Cuenca de Bohai. Este próspero puerto continúa su tradición centenaria como un centro dinámico para el comercio nacional e internacional, donde los comerciantes convergen como lo hicieron hace cientos de años.§!"
 chengdu: "Chengdu"
 chengdu_desc: "----\n§9Chengdu, a menudo llamada la \"Tierra de la Abundancia\", se ha nutrido del sistema de irrigación de Dujiangyan durante más de 2300 años. La ciudad no solo carga con el peso de una antigua civilización, sino que también presume de una vibrante cultura urbana que cautiva tanto a locales como a visitantes. Desde la serena belleza del Monte Qingcheng hasta la historia de lealtad que se honra en el Santuario Wuhou, Chengdu ofrece una fascinante mezcla de lo antiguo y lo moderno. Sus casas de té en las calles, las líneas de producción de aviones de combate de clase mundial, los pandas gigantes en la base de cría y la bulliciosa Plaza Tianfu en el centro de la ciudad resaltan su diversidad.\n\nSin embargo, lo que realmente distingue a Chengdu es su relajado ritmo de vida, un marcado contraste con el ritmo acelerado y económico de otras grandes ciudades chinas. Este equilibrio entre tradición y modernidad le otorga a Chengdu su encanto único, mostrando cómo la ola de modernización ha moldeado esta vibrante ciudad del suroeste de China.§!"
 chongqing: "Chongqing"
 chongqing_desc: "----\n§9Pocas ciudades están tan estrechamente vinculadas a sus ríos, geográficamente y culturalmente, como Chongqing. El río Yangtsé y Jialing confluyen aquí, y a través del curso de tres milenios, esta \"ciudad montañosa\" ha transformado su escabroso terreno en una mágica metrópolis de estilo ciberpunk. Sus impresionantes vistas nocturnas son un testamento de una era dorada, mientras que los ríos de la ciudad han dado lugar a una única cultura rivereña. Las tradiciones portuarias, la hermandad \"Gelaohui\", y las una vez dominantes bandas urbanas han contribuido a su cruda y misteriosa aura.\n\nDesde una capital en tiempos de guerra preservando el espíritu chino hasta transformarse en un municipio que ha acomodado a inmigrantes que venían por el proyecto de las \"Tres Gargantas\", Chongqing siempre se ha adaptado al cambio. Hoy, como un actor principal en la industria de los macro datos y el motor económico de la cuenca de Sichuan, continúa evolucionando. Al igual que su plato estrella, la olla caliente, la ciudad abraza la diversidad, con personas de todos los ámbitos de la vida contribuyendo a su energía única y vitalidad.§!"
 nanjing: "Nankín"
 nanjing_desc: "----\n§9Desde que el reino de Wu Oriental la convirtió en su capital, Nankín ha sido un bastión estratégico en el sur de China, sirviendo como capital de seis dinastías, la corte temprana de los Ming y el gobierno provisional de la República de China. Aquí, el río Yangtsé se curva hacia el océano y se encuentra con el extremo sur del Gran Canal, que alguna vez fue un cruce de caminos para las barcazas de grano y el comercio de té y sal. La Montaña Púrpura y el Mausoleo de Ming Xiao entrelazan la cultura de las tumbas imperiales con la geomancia; las masivas y gruesas defensas de la Puerta de Zhonghua protegieron estas ciudades durante siglos; y la Terraza de la Flor de la Lluvia alberga estelas que conmemoran a los mártires de las guerras Jin, la Rebelión Taiping y la Guerra de Resistencia. El Salón Conmemorativo de la Masacre de Nankín, con sus sombrías exposiciones, sirve como una cruda advertencia al mundo para que nunca olvide 1937.\n\nEn el siglo XXI, bajo el plan de integración del delta del río Yangtsé, Nankín ha desarrollado una mezcla industrial moderna liderada por los servicios de software, los productos biofarmacéuticos y los nuevos materiales. La Estación Sur de Nankín y el Puente del Río Yangtsé consolidan su papel como centro ferroviario y de transporte marítimo; el Parque de Desarrollo de Pukou y la Nueva Área de Jiangbei producen continuamente nuevos dividendos urbanos; y las pruebas de renminbi digital son visibles a nivel de calle. Una constelación de universidades e institutos de investigación, muchos con más de un siglo de antigüedad, continúa suministrando talento e ideas. Mientras tanto, el cinturón cultural del río Qinhuai y el distrito de Laomendong, iluminado con faroles, preservan la calidez humana de la ciudad en medio de una renovación implacable.§!"
 shanghai: "Shanghái"
 shanghai_desc: "----\n§9\"Buena Shanghái, buena Shanghái, eres la ciudad que nunca duerme\". Como una metrópolis moderna, Shanghái es el símbolo más prominente del desarrollo de China. Tras la llegada de los occidentales, la ciudad se abrió al comercio y se convirtió en el lugar de nacimiento de las primeras industrias modernas chinas, aún si mucho de este progreso fue dividido entre las potencias extranjeras. Por su gran fuerza laboral, Shanghái también se convirtió en la cuna del Partido Comunista de China.\n\nEn 1949, Shanghái fue liberada por el Ejército Popular de Liberación, y por primera vez, el futuro de la ciudad estaba verdaderamente en la manos del pueblo chino, marcando el inicio de una nueva era. Durante los últimos setenta años, particularmente tras las reformas y apertura política y la el desarrollo del Nuevo Distrito de Pudong, el crecimiento de Shanghái ha sido remarcable. Hoy, es uno de los principales centros financieros de Asia y del mundo, dirigiendo el desarrollo económico de China con su espíritu abierto e inclusivo.§!"
 shenzhen: "Shenzhen"
 shenzhen_desc: "----\n§9\"Roma no se construyó en un día\", pero tardó más de dos mil años en alcanzar su gloria actual. En cambio, Shenzhen ha logrado algo extraordinario: en tan solo cuarenta años, pasó de ser un pequeño pueblo pesquero en la orilla occidental del estuario del río de las Perlas a una metrópolis vibrante con una población cinco veces mayor que la de Roma y mucho más desarrollada. Hace más de cuarenta años, los lugareños navegaban por los juncos con sencillas barcas de pesca. Hoy, Shenzhen se ha convertido en una de las ciudades más grandes del sur de China, y de hecho, del mundo, en términos económicos. Se ha convertido en un símbolo del auge de China. Sin la política de Reforma y Apertura, esta tierra podría haber permanecido inactiva. Así, Shenzhen encarna el éxito de la Reforma y Apertura de China y se erige como la joya más brillante del delta del río de las Perlas.§!"
 guangzhou: "Cantón"
 guangzhou_desc: "----\n§9Hace más de trescientos años, gracias a decretos imperiales y a su privilegiada ubicación geográfica, Cantón se convirtió en la primera ciudad de China en participar en el comercio internacional, estableciéndose como el único centro comercial del país en aquel entonces. Sin embargo, esta riqueza también la convirtió en un objetivo, un premio para las potencias extranjeras. Tras superar numerosas dificultades, esta ciudad ha resurgido con mayor brillantez. Si bien su desarrollo quedó rezagado respecto al de Shenzhen tras la reforma y la apertura, sigue siendo el centro indiscutible de la zona económica del delta del río de las Perlas. Hoy en día, Cantón sigue siendo la capital de la provincia de Cantón, un importante centro económico del sur de China y uno de los mayores centros de comercio internacional del país.§!"
 wuhan: "Wuhan"
 wuhan_desc: "----\n§9Nutrida por los ríos Yangtsé y Han, Wuhan ha sido durante mucho tiempo un crisol de culturas del norte y del sur, y un centro fundamental para el transporte terrestre y acuático. Desde las ruinas de la Edad del Bronce de la ciudad de Panlong hasta el poético encanto de la Torre de la Grulla Amarilla en medio del caos de los Tres Reinos, la historia de la ciudad resuena a través de milenios, tejiendo una leyenda que perdura hasta nuestros días.\n\nEn la historia más reciente, el Arsenal Hanyang contribuyó a impulsar la industrialización de China, mientras que los disparos del Levantamiento de Wuchang marcaron la caída de un antiguo imperio. La unidad y el coraje demostrados durante la Batalla de Wuhan hicieron que el rugido de la resiliencia de esta ciudad resonara por todo el país. Hoy, el sonido del reloj del Paso de Jianghan aún resuena en armonía con los silbatos del ferry. Wuhan forja su leyenda a través de la innovación audaz y la armonía cultural, encarnando el espíritu pionero que ha moldeado su pasado e impulsa su futuro.§!"
 hongkong: "Hong Kong"
 hongkong_desc: "----\n§9Ah, Hong Kong. Antaño un humilde pueblo pesquero llamado \"Puerto Fragante\" por su abundante madera de incienso, esta isla lo ha visto todo. En los viejos tiempos, los barcos mercantes acudían en masa aquí, sus velas un bosque contra el cielo. Pero las guerras del Opio lo cambió todo, trayendo un nuevo poder que, durante más de un siglo, vio el ascenso de imponentes rascacielos y bulliciosos puertos. Y aunque esta era trajo una inmensa prosperidad, también dejó sus propias cicatrices indelebles de humillación y opresión. Pero el alma de la ciudad permanece. El tranvía \"ding-ding\" todavía traquetea por las viejas calles, el Star Ferry todavía transporta gente entre la isla de Hong Kong y Kowloon, y los gritos de los vendedores ambulantes de Temple Street se mezclan con el tintineo de los carritos de dim sum. Este espíritu único está tejido en la propia esencia de la ciudad, desde los épicos cuentos de artes marciales de Jin Yong en la televisión hasta las canciones atemporales de Leslie Cheung. Una potencia financiera global y el \"Hollywood de Oriente\", Hong Kong es una ciudad de asombrosos contrastes, donde la crudeza occidental se encuentra con la ternura sureña. Hoy en día, sigue siendo una puerta de entrada crucial al sur de China, una ciudad que ha conocido tanto la agitación como el triunfo. Las luces del puerto de Victoria todavía brillan intensamente, un faro de su espíritu inquebrantable.§!"
 macau: "Macao"
 macau_desc: "----\n§9Macao ha sido durante mucho tiempo una encrucijada entre Oriente y Occidente, famosa por su papel fundamental en el intercambio cultural. Durante las últimas dinastías Ming y principios de la Qing, desempeñó un papel importante en la \"difusión oriental del aprendizaje occidental\" y fue en su día uno de los principales centros económicos del mundo. Ya en la dinastía Ming, los colonos portugueses se habían establecido en este territorio chino, utilizando los alquileres de tierras e impuestos para controlar Macao, transformándolo en una puerta de entrada vital a Oriente. En vísperas del nuevo milenio, Macao regresó al abrazo de su patria, poniendo fin a más de un siglo de dominio colonial.\n\nHoy en día, Macao es mundialmente conocida por su próspera industria de servicios, particularmente dentro de China. Como la única ciudad de China donde los casinos están legalmente permitidos, atrae a grandes apostadores que buscan probar su suerte, ganándose el apodo de \"Las Vegas de Asia\".\n\nVen a Macao a probar suerte; incluso si terminas perdiendo hasta la camisa, sigue siendo una experiencia que vale la pena vivir.§!"
 changchun: "Сhangchun"
 changchun_desc: "----\n§9Conocida como la \"Perla de Detrás de la Gran Muralla\", Changchun es una crónica viva de la frontera septentrional de China. Sus orígenes como bastión militar se remontan a las dinastías Liao y Jin, mientras que los inquietantes versos del poeta Qing Nalan Xingde - \"Los vientos otoñales lloran abanicos pintados en la frontera, la puesta de sol dora estandartes sobre antiguas murallas\"- inmortalizan su grandeza atemporal. La compleja historia moderna de la ciudad está grabada en monumentos como el Palacio de las Marionetas de Manchuria y el complejo de los Ocho Ministerios, reliquias de su papel en tiempos de guerra como pseudocapital. Renacida como cuna de la industria automovilística china con la fundación de FAW, Changchun lidera ahora la revolución de la movilidad verde del país a través de tecnologías punteras de nuevas energías y vehículos inteligentes. Anclada en potencias académicas como la Universidad de Jilin y el emblemático Estudio Cinematográfico de Changchun (la \"Cuna del Nuevo Cine Chino\"), la ciudad armoniza la profundidad académica con el vigor industrial, encarnando la oda del poeta Ai Qing: \"Mis ojos rebosan lágrimas, porque mi amor por esta tierra me llega al alma\".§!"
 dalian: "Dalian"
 dalian_desc: "----\n§9Donde las agujas rusas se encuentran con los jardines japoneses bajo un dosel de rascacielos, Dalian se despliega como un soneto marítimo. Su alma moderna se forjó a través de las mareas coloniales del siglo XIX, pero sus orígenes en la dinastía Han resuenan en los monolitos esculpidos por el viento de Jinshitan y el dramatismo de la playa del Tigre. La inmensa plaza Xinghai refleja su ambición como eje del Cinturón y la Ruta, mientras que las calles veraniegas cobran vida con el pulso de la Semana de la Moda y la espuma dorada de los festivales de la cerveza. Convertida en un titán del transporte marítimo del noreste asiático, Dalian aprovecha la riqueza de sus aguas profundas y su fabricación inteligente para tender puentes entre continentes. Fiel a su nombre - \"Da\" (grande) en visión, \"Lian\" (conectado) en alcance-, esta joya costera brilla como corona regional y escenario mundial, donde la montaña se encuentra con el mar y la historia baila con el mañana.§!"
 shenyang: "Shenyang"
 shenyang_desc: "----\n§9Shenyang se convirtió en la capital del régimen de Jin Posterior en 1625, sentando las bases para el ascenso al poder de la dinastía Qing en la orilla norte del río Hun. Dentro de los muros carmesíes del Palacio Imperial de Shenyang, la Sala Dazheng, octogonal y de doble hoja, sigue en pie como hace siglos. Con el paso de los años, a principios del siglo XX, la ciudad fue testigo del establecimiento de ferrocarriles rusos de vía ancha y de la construcción del Ferrocarril del Sur de Manchuria por parte de los japoneses. A día de hoy, la calle Zhongshan conserva su aspecto híbrido, con marcos de ventanas góticos y decoraciones florales. Las oxidadas grúas pórtico y los talleres de fundición del distrito de Tiexi captan la memoria industrial de los inicios de la industria pesada en la República Popular China, mientras que las líneas de producción de aviones de combate de la Corporación Aeronáutica de Shenyang siguen encarnando el espíritu de defensa nacional del Movimiento del Tercer Frente.\n\nShenyang, una ciudad que entrelaza cambios dinásticos, huellas coloniales y el auge de la industrialización, busca persistentemente su identidad contemporánea entre las capas de su rica historia.§!"
 taibei: "Taipéi"
 taibei_desc: "----\n§9Taipéi, capital de Taiwán y hogar de más de 7 millones de personas, es conocida por zonas como su distrito financiero, el [area planificada de Xinyi, el vibrante y animado Ximending, el centro de transporte del distrito de Zhongzheng, y el parque urbano y las prestigiosas universidades del distrito de Daan. Icono del milagro económico y el rápido desarrollo de Taiwán desde la década de 1960, Taipéi se transformó de una ciudad plana y primitiva en una metrópolis vibrante. Alberga el Taipei 101, un rascacielos que en su día fue el edificio más alto del mundo.\n\nA pesar de la deconstrucción de las antiguas murallas de la dinastía Qing, Taipéi, como muchas otras grandes ciudades, se considera una fortificación defensiva en sí misma contra posibles invasores. No solo se pueden posicionar defensores en diversos puntos, sino que su extensa red de metro también ofrece una dimensión adicional de movilidad para quienes se encuentran en tierra.§!"

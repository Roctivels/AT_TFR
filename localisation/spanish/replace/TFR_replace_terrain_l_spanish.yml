 moscow: "Moscú"
 moscow_desc: "----\n§9Moscú, la capital de Rusia, es una megalópolis en expansión que encarna la rica historia y la importancia cultural del país. Conocida a menudo como la \"Tercera Roma\", es un centro neurálgico de la vida política, económica y cultural del país. Con su vasta extensión, Moscú abarca más de 2500 kilómetros cuadrados, lo que la convierte en una de las ciudades más grandes del mundo.\n\nLa ciudad se caracteriza por su sorprendente combinación de arquitectura histórica e infraestructura moderna. Monumentos emblemáticos como el Kremlin, la Plaza Roja y la Catedral de San Basilio se alzan junto a rascacielos contemporáneos, mostrando la evolución de Moscú a través del tiempo. Como megalópolis, es un centro de actividad vibrante, con una población diversa que contribuye a su vibrante ambiente.§!\n\n§pMoskvá... kak mnogo v etom evuke dlia serdtsa pusskogo slilos! Kak mnogo v niom otoevalos!§!"
 petersburg: "San Petersburgo"
 petersburg_desc: "----\n§9San Petersburgo, a menudo conocida como la \"Capital Cultural\" de Rusia, es una ciudad impregnada de historia y patrimonio artístico. Fundada por Pedro el Grande en 1703, encarna su visión de una ciudad moderna de estilo europeo que sirviera como puerta de entrada a Occidente. Como la \"Ciudad de Pedro el Grande\", San Petersburgo exhibe grandes palacios, intrincados canales y una arquitectura impresionante que refleja las ambiciones de su fundador.\n\nLa ciudad es famosa por su rica escena cultural, sede de instituciones de talla mundial como el Museo del Hermitage, el Teatro Mariinsky y numerosas galerías y teatros. Su centro histórico, declarado Patrimonio de la Humanidad por la UNESCO, alberga impresionantes monumentos como la Iglesia del Salvador sobre la Sangre Derramada y el Palacio de Invierno.§!\n\n§pO, eti starye mostobye! Oni vsio pomniat, oni zhivye, i kazhdy kamenny vsadnik po-prezhnemu verit v mechty.§!"

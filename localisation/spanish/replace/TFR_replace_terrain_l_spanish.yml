 urban_desc: "Los combates urbanos se encuentran entre los más caóticos y brutales de la actualidad. Se debe tener especial cuidado al desalojar los edificios."
 los_angeles: "Los Ángeles"
 los_angeles_desc: "----\n§9El área metropolitana de Los Ángeles alberga a más de 4 millones de personas, cualquier combate dentro de la ciudad será un gran desafío.§!"
 new_york: "Nueva York"
 new_york_desc: "----\n§9Con más de ocho millones de habitantes, Nueva York ha sido descrita a menudo como la capital financiera y cultural del mundo, con la sede de la ONU e importantes centros financieros como la Bolsa de Valores de Nueva York ubicados allí. Si bien no es la capital de Estados Unidos, es la ciudad más grande del país, con cientos de rascacielos de acero, puertos gigantescos y decenas de kilómetros de suburbios en expansión y ciudades satélite en todas direcciones. ¡Llena de ratas gigantes!§!"
 miami: "Miami"
 miami_desc: "----\n§9Cocaina.§!"
 twin_peaks: "Twin Peaks"
 twin_peaks_desc: "§RThrough the darkness of future past, the magician longs to see, one chants out between two worlds, fire walk with me.§!"
 seattle: "Seattle"
 seattle_desc: "----\n§9Seattle es la ciudad más grande del estado de Washington y del noroeste del Pacífico estadounidense, con cerca de setecientos cincuenta mil habitantes. La ciudad es un importante centro de la industria tecnológica estadounidense, con sedes de Amazon y Microsoft en la zona, y es famosa por sus grandes rascacielos, como el Space Needle, y las altas cordilleras que la rodean, tanto al oeste como al este.§!"
 new_orleans: "Nueva Orleans"
 new_orleans_desc: "----\n§9Nueva Orleans es la ciudad más grande del estado estadounidense de Luisiana, con más de trescientos ochenta mil habitantes. Es un importante centro económico y cultural de la Costa del Golfo, con grandes puertos y sede de famosos festivales basados en una mezcla de culturas cajún y afroamericana, como el Mardi Gras. Si bien la ciudad se ha visto gravemente afectada por huracanes en las últimas décadas, sigue siendo una ciudad muy grande e importante en el sur de Estados Unidos.§!"
 boston: "Boston"
 boston_desc: "----\n§9Boston es la capital del estado estadounidense de Massachusetts y la ciudad más grande de Nueva Inglaterra, con alrededor de seiscientos setenta mil habitantes. Muchos consideran que Boston fue el epicentro de la Revolución Americana, donde se fundaron los Hijos de la Libertad y tuvo lugar el Motín del Té en sus alrededores. Hoy en día, es un importante centro comercial, financiero y cultural para toda Nueva Inglaterra y el noreste.§!"
 washingtondc: "Washington, D.C."
 washingtondc_desc: "----\n§9Con alrededor de seiscientos noventa mil habitantes, el Distrito de Columbia, la capital de Estados Unidos, es una región administrativa independiente, que no forma parte de ningún estado. La ciudad alberga el Congreso, la Corte Suprema y la Casa Blanca, donde reside el presidente estadounidense, además de monumentos como la Explanada Nacional y el Monumento a Washington. Es un símbolo perdurable de los Estados Unidos de América y su Gobierno, que no ha sido usurpado ni mancillado por enemigos desde la guerra de 1812 contra el Imperio Británico.§!"
 chicago: "Chicago"
 chicago_desc: "----\n§9Conocida como la Ciudad del Viento, Chicago es la tercera ciudad más grande de Estados Unidos y la más grande entre Nueva York y Los Ángeles, con más de dos millones setecientos mil habitantes. La ciudad es un importante centro industrial con docenas de rascacielos, junto con un sector financiero cada vez más importante. Si bien la ciudad lucha contra una alta tasa de criminalidad, sigue siendo un importante motor económico para el Medio Oeste y para Estados Unidos en general.§!"
 philadelphia: "Filadelfia"
 philadelphia_desc: "----\n§9Filadelfia, la capital original de Estados Unidos, tiene más de un millón y medio de habitantes. Es la ciudad más grande del estado de Pensilvania y la sexta más grande del país, y un importante centro de negocios y comercio en la costa este gracias a su gran infraestructura portuaria. Posee un extenso núcleo urbano con docenas de rascacielos y es conocida por su rivalidad con la ciudad de Nueva York.§!"
 houston: "Houston"
 houston_desc: "----\n§9Houston es la ciudad más grande de Texas y la cuarta más grande de Estados Unidos, con cerca de dos millones y medio de habitantes. La ciudad alberga el Puerto de Houston, el segundo más grande de Estados Unidos, y es un importante centro financiero, además de un eje central para el creciente sector petrolero y energético de Texas. Si bien no cuenta con muchos rascacielos, es una de las ciudades más extensas de Estados Unidos en cuanto a superficie.§!"
 richmond: "Richmond"
 richmond_desc: "----\n§9Richmond es la capital del estado norteamericano de Virginia y la antigua capital de la Confederación que se rebeló contra la Unión durante la guerra de Secesión. Si bien es una ciudad de tamaño mediano con alrededor de doscientos mil habitantes, es un importante centro económico en la zona norte del sur, con numerosas grandes corporaciones y agencias gubernamentales con sede en la zona. Aunque fue un foco de rebelión hace mucho tiempo, hoy la ciudad es firmemente leal al gobierno federal.§!"

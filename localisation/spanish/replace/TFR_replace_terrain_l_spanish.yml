 rio: "Río de Janeiro"
 rio_desc: "----\n§9Río de Janeiro es la segunda ciudad más grande de Brasil y la capital del estado que lleva su nombre. Conocida por su impresionante belleza natural y vibrante cultura, es el principal destino turístico extranjero en Brasil. Fundada en 1565, fue la capital de Brasil hasta 1960. La ciudad es famosa por monumentos como el Cristo Redentor en la cima del cerro Corcovado, el Pan de Azúcar y las playas de Copacabana e Ipanema. El Carnaval de Río es uno de los festivales más grandes del mundo, con música de samba y elaborados desfiles. También alberga el Estadio Maracaná, uno de los estadios de fútbol más grandes e históricos del mundo.\n\nLa ciudad fue sede de los Juegos Olímpicos de Verano de 2016 y es Patrimonio de la Humanidad de la UNESCO por su singular paisaje urbano que fusiona montaña, mar y arquitectura. A pesar de desafíos como las disparidades socioeconómicas, Río sigue siendo un importante centro cultural y económico en América Latina. A pesar de su influencia cultural y económica, Río enfrenta desafíos importantes, entre ellos la pobreza, la corrupción y el crimen violento, particularmente en sus numerosas favelas, que impactan la vida cotidiana y el desarrollo urbano.§!\n\n§GSamba De Janeiro!§!"
 sao_paulo: "São Paulo"
 sao_paulo_desc: "----\n§9São Paulo es la ciudad más grande de Brasil y la capital del estado que lleva su nombre. Siendo un importante centro financiero, cultural e industrial en Latinoamérica, es la ciudad más grande tanto del hemisferio occidental como del sur, lo que le ha valido el apodo de \"Selva de Pedra\". Fundada en 1554 por misioneros jesuitas, cobró relevancia durante el auge del café en el siglo XIX y posteriormente se convirtió en un centro de industrialización.\n\nLa ciudad es conocida por su diversa población, que incluye importantes comunidades de la diáspora italiana, japonesa y árabe, lo que contribuye a su rico patrimonio cultural. São Paulo alberga importantes eventos como la Bienal de Arte de São Paulo y la Semana de la Moda de São Paulo, y alberga lugares emblemáticos como el Museo de Arte de São Paulo (MASP) y el Parque Ibirapuera. A pesar de este auge económico, la ciudad enfrenta desafíos como la delincuencia, la contaminación, la desigualdad social y una grave congestión vehicular.§!"

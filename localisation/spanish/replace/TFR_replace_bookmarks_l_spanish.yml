l_spanish:
 BM_HISTORY_TITLE: "Breve historia"
 GATHERING_STORM_NAME: "Un mundo nuevo"
 GATHERING_STORM_DESC: "Mientras el mundo entra en el siglo XXI, nuevas facetas de la sociedad empiezan a formarse. Empiezan cambios políticos a medida que las entidades ya existentes se alejan cada vez más de su alcance inicial. La habilidad del internet de transmitir cualquier forma de expresión a una audiencia cada vez más amplia a nivel global crea ciertos nichos, dentro de la sociedad. Conflictos nuevos y de antaño se desarrollan de forma notoria y diligente, a lo largo de vastos océanos y líneas sin sentido en la arena. Quizá sea inevitable que la Tierra caiga en un estado de caos, otra vez. Quizá el caos sea temporal. En este mundo, solo tú puedes decidirlo"
 FIRE_NAME: "§YPrende la mecha§!"
 FIRE_NAME_DESC: "Ahora que el mundo está saliendo de los turbulentos años 2000 y de los relativamente tranquilos primeros años de la década de 2010, el mundo parece estar listo para su mayor sorpresa desde 1991. Con la reelección del antisistema Donald Trump acercándose rápidamente, las tensiones que se ciernen tanto en Europa Oriental como en Asia junto con el extremismo que estalla en cada rincón del planeta; el pronóstico mundial ya parece sombrío y con los inquietantes informes de un nuevo \"coronavirus\" gestándose en China, parece que se ha encendido una cerilla para este polvorín que se extiende por todo el mundo."
 ENG_GATHERING_STORM_DESC: "La Unión Europea es más impopular que nunca. Los británicos se apresuran a culpar de todo lo que está mal en su país a los funcionarios de Bruselas, así como al gobierno alemán en Berlín. La población está profundamente dividida en torno a esta cuestión en particular. Gran Bretaña se ha recuperado bien de la crisis económica de 2008, pero abandonar la Unión Europea podría destruir el progreso económico de la última década. Y aun así... ¿no es preferible la soberanía nacional a pequeñas ganancias económicas?"
 FRA_GATHERING_STORM_DESC: "Francia ha afrontado dificultades económicas y grandes atentados terroristas en París, lo que ha provocado tensiones sociales y políticas. En medio de estos desafíos, el sentimiento público hacia las comunidades musulmana y judía se ha polarizado. El partido nacionalista, el Frente Nacional, ve una oportunidad de ganar poder en estos tiempos difíciles.\n\n¿Perdurarán el establishment democrático y la integración europea francesa, o Francia se mantendrá sola como en los viejos tiempos?"
 GER_GATHERING_STORM_DESC: "Alemania, golpeada por la crisis de refugiados, dificultades económicas y el creciente resentimiento interno hacia países como Grecia, Italia y España, permanece firme. La Unión Europea sigue expandiéndose hacia el sur, mientras que las políticas alemanas son cada vez más criticadas por sus vecinos.\n\n¿Vale la pena continuar por este camino o es hora de revivir viejos conflictos fronterizos y dejar que los soldados marchen de nuevo?"
 JAP_GATHERING_STORM_DESC: "Japón se enfrenta cada día a la posibilidad de una guerra, a medida que los buques de guerra chinos se acercan agresivamente a las islas Senkaku y los misiles norcoreanos llegan hasta la estratosfera. Recientemente, se modificó el Artículo 9 de la Constitución japonesa para permitir una presencia militar más activa en el extranjero.\n\nSi bien este cambio hacia el militarismo es impopular, puede ser crucial para mantener la seguridad nacional en los próximos años."
 ITA_GATHERING_STORM_DESC: "Ningún país del G7 y de los cuatro grandes de Europa se ha visto tan duramente afectado por la crisis económica de 2008 como Italia. La recuperación es lenta y el apoyo gubernamental se está reduciendo. La afluencia de inmigrantes africanos no ayuda a dar a la población una imagen de estabilidad interna. Italia necesita reflexionar sobre sus opciones. Seguramente no es el momento de revivir el imperialismo, pero serán necesarias reformas drásticas..."
 PRC_GATHERING_STORM_DESC: "El gigante oriental está despertando lentamente. Con un Partido Comunista más fuerte y vibrante que nunca, el camino de China al trono de superpotencia está en marcha. Sin embargo, persisten desafíos: desequilibrios económicos, contaminación, luchas internas y un panorama internacional volátil. El camino hacia el futuro está plagado de obstáculos y giros peligrosos.\n\nChina deberá afrontar estos desafíos con decisión, y el futuro de miles de millones está estrechamente ligado a los resultados."
 RAJ_GATHERING_STORM_DESC: "La economía de la India está creciendo rápidamente, al igual que su población. El tigre, que todavía no está en el centro de la atención internacional, está bien alimentado y gruñe. La India está a la caza y su presa no sospecha nada."
 SPR_GATHERING_STORM_DESC: "Al igual que otros países del sur de Europa, España cayó en una crisis económica en 2008, necesitando estímulos económicos de las economías de Europa del norte. Podemos y Ciudadanos han traído un nuevo populismo e incertidumbre al viejo sistema político, mientras que los movimientos independentistas catalanes son una amenaza para la unidad española más que nunca.\n\nLa recuperación económica será un camino largo y accidentado: ¿permanecerá España en Europa y se apegará a los acuerdos que eviten un desastre inmediato, o el futuro de España es diferente del futuro del norte de Europa?"
 SOV_GATHERING_STORM_DESC: "Cuando la Unión Soviética se derrumbó en 1991, quedó claro que el camino de vuelta a la gloria no sería fácil para la Federación de Rusia. El sistema y la economía eran corruptos, el ejército era grande pero anticuado y el alcance político estaba debilitado, y Rusia tuvo que resignarse a permanecer al margen durante una década. Ahora espera volver al centro de atención."
 USA_GATHERING_STORM_DESC: "Internamente más divididos que nunca, y externamente más desafiados que nunca desde la Guerra Fría; no hay duda de que los Estados Unidos de América no viven una edad dorada. Su propio pueblo se muestra cada vez más receloso ante la agresión china, el declive industrial y las dificultades económicas, mientras que el apoyo público a las alianzas militares se desvanece. El próximo presidente se enfrentará a la tarea de redefinir lo que realmente significa ser la nación más grande de la Tierra: la tierra de los libres y el hogar de los valientes."
 OTHER_GATHERING_STORM_DESC: ""
 COUNTRY_SELECTION_CHARACTER_DESC: "$NAME|Y$ \n$TRAITS_DESC|$"
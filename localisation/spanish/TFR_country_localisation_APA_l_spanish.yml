 APA_congress_delegations_loc: "§!El §YCongreso Obrero Americano§! funciona actualmente como nuestro Gobierno de facto, con la capacidad de aprobar leyes, coordinar nuestras fuerzas armadas y gestionar nuestra economía. Funciona de forma similar al §YCongreso Continental§! en la época de la §RRevolución de las Trece Colonias§!. Sin embargo, hoy en día, la revolución se lleva a cabo con la espada y el escudo del pueblo en la forma del §YFrente Unido§!, en lugar de los §Rdecadentes capitalistas§!. Actualmente, los miembros de cualquier organización revolucionaria, como el §YEjército Popular de Liberación Americano§! o cualquier §YUnión Revolucionaria§!, pueden votar por sus representantes para que su voz se escuche en nuestra legislatura unicameral.\nEste concepto no es definitivo y §Rel Gobierno es provisional§!, ya que el Congreso pretende redactar un marco oficial de Gobierno tras la inevitable victoria de los trabajadores. Desafortunadamente, a pesar de la apariencia unificada del frente ante el mundo exterior, el frente en sí mismo permanece extremadamente dividido, con muchas facciones compitiendo por sus ideales para ser la forma principal del socialismo representado en nuestra recién fundada república."
 APA_congress_faction_jacobin_loc: "\n\n£APA_jacobin  Popularidad jacobina: [?ROOT.party_popularity@totalitarian_socialist|Y%2] (£mil_factory  [?APA_totsoc_popularity_dynamic_var|=+1%] y £dockyard  [?APA_totsoc_popularity_dynamic_var|=+1%])§!\n£APA_jacobin  Apoyo jacobino: [?APA_support_jacobin_var|Y1%] ([APA_congress_faction_jacobin_allignment_text])\nLos £APA_jacobin  jacobinos son socialmente §Cconservadores§!, defensores de una §Yeconomía planificada§! similar a la de la URSS y diplomáticamente §gaislacionistas§!."
 APA_congress_agenda_jacobin_loc: "Al igual que los jacobinos originales de la §YRevolución Francesa§!, los jacobinos de la Segunda Revolución Americana encarnan el espíritu §Rrevolucionario§! y §Rpatriota§! de la nación. Ahora que están al mando del Ejército Popular de Liberación Americano, los jacobinos buscarán moldear América a su visión: una sociedad socialista, cívica, nacionalista y revolucionaria.\n\nEl movimiento jacobino no rehúye la violencia ni el control estatal para lograr su visión, pero centralizar y remodelar el diverso e increíblemente caótico panorama político no será fácil. Cuanto más se sepa públicamente sobre nuestros intentos de reformar el Gobierno, mayor será el coste de la reforma. Al mismo tiempo, si el poder de los enemigos internos crece demasiado, seguramente nos enfrentaremos a la amenaza de la contrarrevolución. Hay innumerables enemigos, tanto extranjeros como nacionales, que amenazan el poder del presidente Maupin. La Revolución debe ser protegida, y los ríos de América se teñirán de rojo con la sangre de sus enemigos."
 APA_congress_agenda_effect_jacobin_loc: "£stability_texticon  [?APA_revolution_stability_factor_dynamic_var|=+1%] y £development  social [?APA_revolution_society_development_monthly_dynamic_var|=+1%]"
 APA_congress_faction_octoberist_loc: "\n\n£APA_octoberist  Popularidad octubrista: [?ROOT.party_popularity@communist|Y%2] (£pol_power  [?APA_autsoc_popularity_dynamic_var|=+2])\n£APA_octoberist  Apoyo octubrista: [?APA_support_octoberist_var|Y1%] ([APA_congress_faction_octoberist_allignment_text])\nLos £APA_octoberist  octubristas son socialmente §Gprogresistas§!, defensores de una §8economía de mercado socialista§! similar a la de China y diplomáticamente §gneutrales§!."
 APA_congress_agenda_octoberist_loc: "$APA_octoberist_plural$: No hay revolución contra el Occidente imperialista sin una vanguardia que guíe al pueblo en tiempos de conflicto y crisis, una vanguardia socialista que crea verdadera y plenamente en los ideales de Marx y los transmita al pueblo mediante su palabra y mensaje. Junto con esto, existe una lucha inherente que debe librarse contra el Occidente decadente, una organización de naciones que se opone directamente a la conquista del poder por parte del proletariado y es enemiga de la revolución. Una nación solo podrá instaurar el comunismo derrotando los instrumentos del capitalismo y reemplazándolos por completo con los suyos."
 APA_congress_agenda_effect_octoberist_loc: "£prod_eff_cap  [?APA_revolution_production_factory_max_efficiency_factor_dynamic_var|=+1%], £construction_speed_texticon  [?APA_revolution_production_speed_buildings_factor_dynamic_var|=+1%], y £development  económico [?APA_revolution_poverty_development_monthly_dynamic_var|=+1%]"
 APA_congress_faction_anarchist_loc: "\n\n£APA_anarchist  Popularidad anarquista: [?ROOT.party_popularity@libertarian_socialist|Y%2] (£war_support_texticon  [?APA_libsoc_popularity_dynamic_var|=+1%])\n£APA_anarchist  Apoyo anarquista: [?APA_support_anarchist_var|Y1%] ([APA_congress_faction_anarchist_allignment_text])\nLos £APA_anarchist  anarquistas son extremadamente §Gprogresistas§! socialmente, abogan por una §9economía descentralizada§! y diplomáticamente §Ragresivos§!."
 APA_congress_agenda_anarchist_loc: "£APA_anarchist  Anarquistas: La clave del pensamiento marxista reside en la necesidad de un Estado donde todas las personas sean iguales y sin clases. ¿En qué sociedad sería esto posible, salvo en una sin un Estado? La revolución no se realiza mediante la fuerza, sino mediante la liberación y la destrucción del Estado imperialista y opresor, que somete al pueblo a su voluntad. La revolución será por y para el pueblo liberado, llevada a cabo sembrando el caos en el Estado y derrumbándolo por su propio peso, y no habrá una sola excepción: ningún hombre por encima de otro."
 APA_congress_agenda_effect_anarchist_loc: "£mil_factory  [?APA_revolution_industrial_capacity_factory_dynamic_var|=+1%], £dockyard  [?APA_revolution_industrial_capacity_dockyard_dynamic_var|=+1%], £command_power  [?APA_revolution_command_power_gain_mult_dynamic_var|=+1%], £army_morale_texticon  [?APA_revolution_army_morale_factor_dynamic_var|=+1%], y £development  militar [?APA_revolution_military_development_monthly_dynamic_var|=+1%]"
 APA_congress_faction_neosocialist_loc: "\n\n£APA_neosocialist  Popularidad neosocialista: [?ROOT.party_popularity@social_democrat|Y%2] (£stability_texticon [?APA_socdem_popularity_dynamic_var|=+1%])\n£APA_neosocialist  Apoyo neosocialista: [?APA_support_neosocialist_var|Y1%] ([APA_congress_faction_neosocialist_allignment_text])\nLos £APA_neosocialist  neosocialistas son extremadamente §Gprogresistas§! socialmente, abogan por una §4economía socialdemócrata muy regulada§! y diplomáticamente §gaislacionistas§!."
 APA_congress_agenda_neosocialist_loc: "£APA_neosocialist  Neosocialistas: Algunos de nuestros homólogos podrían creer que la revolución es un asunto violento donde el socialismo debe imponerse sin atender el llamado del pueblo americano. Esto no es cierto. Para que el pueblo sea libre, no debe ser forzado a pensar así ni a vivir en un estado de anarquía caótica e insostenible. La revolución debe lograrse mediante las urnas, convenciendo al pueblo y al Estado de nuestra causa mediante el compromiso y la paz, con pan y rosas. De no ser por el compromiso, el socialismo se derrumbaría debido a factores internos. Por el bien del pueblo y la utopía, la revolución será con el Estado, no contra él."

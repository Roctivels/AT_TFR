 APA_american_liberation_army_idea: "Ejército de Liberación Americano"
 APA_coffeehouse_socialism_idea: "Socialismo de cafetería"
 APA_coffeehouse_socialism_idea_desc: "En cualquier sentido, la generación moderna de revolucionarios está entre las más políticamente e ideológicamente conscientes que ha tenido la izquierda en décadas. Desde los adherentes más cultos y veteranos hasta los activistas y creyentes en la causa revolucionaria más inexpertos, la mayoría dentro del EPLA tienen sus propias ideas en torno a una sociedad socialista, llevando a amplias instancias de discusiones y faccionalismo entre camaradas, visto ahora como algo meramente esperable para la izquierda en general. Desafortunadamente, esta actitud se ha filtrado al parecer a la tropa, incluso en la situación actual. Los revolucionarios en el frente discuten entre ellos sobre prácticamente todo, desde las estructuras de sus propias unidades al tipo de tácticas que usar, al punto de una especulación constante de como debe ser llevada la revolución. Este tipo de disputas ha causado que nuestras fuerzas estén ampliamente desorganizadas, si bien están entusiasmadas por llevar la lucha al enemigo."

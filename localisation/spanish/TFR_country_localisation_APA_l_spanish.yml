 APA_drug_trade_dynamic: "Narcotráfico"
 APA_drug_trade_dynamic_desc: "Una de las caras más feas del capitalismo tardío se ha presentado en la epidemia de drogas en los ex-Estados Unidos. Con una economía en colapso, una catástrofe climática inminente y un futuro sombrío para el pueblo americano, miles de jóvenes han recurrido a las drogas como forma de afrontar sus problemas. El problema se agrava con el tráfico de drogas al país por parte de cárteles mexicanos, que termina en manos de pandillas callejeras y otras redes de narcotráfico, algo que solo se ha visto exacerbado por la ola de delincuencia y los disturbios de San Quintín. Tras décadas de políticas fallidas implementadas por el Comité Nacional Demócrata de California, grandes ciudades como Sacramento, Los Ángeles y San Francisco se han convertido en focos del narcotráfico, con agujas desechadas y consumo de heroína visibles en las calles, y sus proveedores aún presentes.\n\nAhora, con la revolución tomando California, un futuro brillante podría estar por delante. Es responsabilidad del Ejército Popular de Liberación Americano poner fin a la guerra contra las drogas, aunque cómo exactamente está completamente en el aire."

 POLITICS_MIKE_PRYSNER_DESC: "Michael Prysner nació en Búfalo, Nueva York. Creció en una familia de clase trabajadora y vivió la vida normal de un americano patriota hasta los huesos.\n\nEso fue hasta que fue a Irak.\n\nA los 18 años, Prysner sirvió como cabo en la 10ª División de Montaña de 2003 a 2004. Durante su despliegue, presenció los devastadores efectos de la guerra en la población civil iraquí. Tras innumerables redadas domiciliarias, misiones de vigilancia e interrogatorios, se desilusionó con la misión del ejército de EE.UU. Tras regresar a Estados Unidos en 2005, Prysner fue dado de baja honorablemente del Ejército y se pronunció en contra de la guerra en su discurso \"Nuestros Verdaderos Enemigos\".\n\nEn 2006, Prysner cofundó la organización \"March Forwards\", formada por veteranos y militares en activo que se oponían a la guerra. También se involucró en ANSWER (Act Now to Stop War and End Racism), una coalición de grupos pacifistas y de justicia social. Su primera gran prueba llegó cuando se enfrentó al monstruo George W. Bush que lo envió a la guerra. Sus exigencias de disculpas por las mentiras sobre el 11-S y las armas de destrucción masiva fueron respondidas con silencio por el expresidente, pero sus gritos de \"¡Me enviaste a Irak!\" y \"¡Mis amigos están muertos porque mentiste!\" resonaron en los oídos de muchos. Su segunda gran prueba comienza ahora. Como líder temporal del Ejército Popular de Liberación Americano, miembro de alto rango del PSL y exsoldado de los Estados Unidos, ha tomado las armas para liberar al pueblo de América de una vez por todas y salvar al país que ama. Ha intentado razonar con sus enemigos con palabras, pero ahora sabe que §Rla violencia es lo único que entienden.§!"
 apla.1.t: "Formación del Frente Unido"
 apla.1.d: ""
 apla.1.a: "¡La unión hace la fuerza!"
 apla.8.t: "Toma del Área 51"
 apla.8.d: "Finalmente hemos capturado el Área 51, un lugar de gran interés para personas de toda América que sospechaban del Gobierno federal. Poco después de tomar el área, la división que habíamos enviado rodeó las instalaciones, las rodeó e intentó entrar. Sin embargo, todas las entradas estaban completamente bloqueadas y no había señales de personas en la zona, y mucho menos de vida."
 apla.8.a: "¡Envien a un equipo especial!"
 apla.9.t: "Explosión del Área 51"
 apla.9.d: "Tras intentar entrar por medios tradicionales con un equipo de especialistas de élite durante varias semanas, las instalaciones del Área 51 explotaron poco después, matando a varios de nuestros especialistas. Los especialistas restantes intentaron explorar las ruinas tras comenzar la limpieza, pero la zona quedó completamente limpia tras la explosión."
 apla.9.a: "Joder, ¡quería conocer a los aliens!"
 apla.12.t: "Revolución en Nueva York"
 apla.12.d: "La ciudad de Nueva York, durante más de trescientos años, se ha erigido como el bastión del capitalismo americano, desde Wall Street hasta la mismísima Torre Trump. Ahora los trabajadores finalmente se han liberado de la tiranía. Tras décadas de promesas que resultaron ser solo mentiras del Partido Demócrata, nuestra oportunidad finalmente ha surgido y Nueva York es finalmente libre. Tras tomar las principales vías de entrada y salida de la ciudad, nuestros camaradas de armas han establecido Nueva York como una comuna independiente. Con el derrocamiento de los opresores burgueses respaldados por los demócratas, nuestra labor apenas ha comenzado. Pronto comenzaremos la redistribución de la riqueza de esta ciudad entre los más merecedores, pronto erradicaremos las antiguas tradiciones y pronto izaremos la bandera escarlata sobre el mismísimo Wall Street. La alegría que siente el proletariado de Nueva York es conocida por todos, y los demócratas no se arriesgarán a una invasión por temor al poder de su propia clase trabajadora. Si vienen, estaremos listos y defenderemos nuestra ciudad hasta el final. La lucha contra el capitalismo apenas comienza."
 apla.12.a: "¡La liberación obrera acaba de comenzar!"
 apla.13.t: "Hombres rojos en el Paraiso"

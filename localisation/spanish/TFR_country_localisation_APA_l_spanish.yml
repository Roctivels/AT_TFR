 APA_insecure_industry_idea: "Industria insegura"
 APA_insecure_industry_idea_desc: "\n\n\n\n£GFX_APA_insecure_industry_banner\n\n\n\n\n\nA pesar de que el estado de California sea una de las regiones más industriales de los Estados Unidos, parece que no se ha visto tan bien reflejado como esperábamos con nuestra llegada. A pesar de que nuestras campañas de reclutamiento y la organización trabajadora previa a la revolución han atraído a muchos trabajadores industriales hacia nuestro movimiento, parece que una cantidad igual se ha visto asustada por la retorica que hemos estado usando, engañados por la profundamente encarnada retórica de la propaganda reaccionaria. Por ello, muchos de estos trabajadores y jefes ejecutivos han escapado de nuestro territorio, llevándose su experiencia industrial con ellos. La ausencia de aquellos responsables de las instalaciones que ahora controlamos ha llevado a dichas industrias a estar preocupantemente faltas de personal y sin mayor capacidad de producción."

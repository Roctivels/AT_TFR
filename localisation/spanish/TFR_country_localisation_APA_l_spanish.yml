l_spanish:
 APA_form_cabinet: "Centralizar los partidos"
 APA_form_cabinet_desc: "Finalmente ha iniciado la revolución, y los partidos en riña del Ejército Popular de Liberación Americano deben ser centralizados de una vez en una fuerza revolucionaria unida. Por mucho tiempo la izquierda ha estado plagada por el faccionalismo y las luchas internas, causadas por diferencias en los planteamientos teóricos sobre la revolución. Sin embargo, cada uno de los partidos reconoce que, solos, son débiles y serán rápidamente aplastados por los reaccionarios. Entonces, debemos formar un nuevo gabinete, con el veterano de la guerra de Irak, Mike Prysner, a la cabeza, y con miembros de todos los partidos, para al fin poder ver brillar la estrella roja sobre los Estados Unidos."
 APA_build_a_bureaucracy: "Construir una burocracia"
 APA_build_a_bureaucracy_desc: "El caos domina cada pedazo del territorio controlado por el EPLA. En medio de la anarquía revolucionaria, saqueos, violencia y confusión están fuera de control mientras el partido lucha por afirmar el orden. Cada Gobierno debe proveer a su pueblo, y el EPLA no está en posición alguna para hacerlo en su estado actual. Por lo tanto, es necesario construir una burocracia para ejecutar efectivamente las políticas dispuestas por el Gobierno revolucionario, y para llevar verdaderamente el socialismo al pueblo."
 APA_establish_order: "Establecer el orden"
 APA_establish_order_desc: "Para asegurar la estabilidad dentro de nuestras zonas controladas, debemos tomar el primer paso exitoso en nuestro proceso revolucionario. Usando una combinación de métodos firmes y flexibles, uniremos a las masas y los inspiraremos a luchar juntos por la causa de la liberación."
 APA_issue_masks: "Asaltar depósitos del ejército"
 APA_issue_masks_desc: "Los lacayos del viejo gobierno, en su acelerada retirada, se olvidaron de llevarse los equipos y armas de sus depósitos. Utilizaremos por completo su \"descuido\" para armar a nuestros enfurecidos guerreros."
 APA_first_american_workers_congress: "Convocar al Congreso Obrero"
 APA_first_american_workers_congress_desc: "Es ahora el momento de reunir a los representantes de los trabajadores que nos apoyan. Despertaremos el alba roja de América y estableceremos el colectivo popular revolucionario más poderoso y unido."
 APA_form_a_united_front: "Formar un Frente Unido"
 APA_form_a_united_front_desc: ""
 APA_establish_the_agency_of_socialist_security: "Establecer el DDR"
 APA_establish_the_agency_of_socialist_security_desc: "Debemos proteger los logros de la revolución de ser robados o mancillados, especialmente por los agentes burgueses que infiltran nuestras filas. El Departamento de Defensa de la Revolución se convertirá en un poderoso guardián del pueblo."
 APA_proclaim_a_national_government: "Proclamar un Gobierno nacional"
 APA_proclaim_a_national_government_desc: "Una de las claves para la victoria revolucionaria es reunir a la vasta mayoría de aliados, dejando aislando al enemigo y en la minoría. A pesar de desacuerdos previos, la inclusión de cualquier facción revolucionaria aumentará nuestras fuerzas y debiera ser bienvenida."
 APA_appeal_to_the_un: "Apelar a la ONU"
 APA_appeal_to_the_un_desc: "A pesar que las Naciones Unidas han sido poco efectivas en prevenir conflictos globales, ganar su apoyo y asistencia realzaría mucho la legitimidad de nuestra causa."
 APA_stomp_out_reactionaries: "Aplastar a los reaccionarios"
 APA_stomp_out_reactionaries_desc: "El destino de los matones reaccionarios que se anteponen al camino al progreso está sellado: serán despreciados por el pueblo y barridos al basurero de la historia. Vamos a agilizar este proceso significativamente."
 APA_unify_the_west_coast: "Unificar la Costa Oeste"
 APA_unify_the_west_coast_desc: "Los soldados del EPLA ya han plantado la bandera roja del pueblo por toda la Costa Oeste. ¡El que una vez fue un terco bastión de la América capitalista ahora es un baluarte revolucionario!"
 APA_begin_the_march_east: "Comenzar la marcha al este"
 APA_begin_the_march_east_desc: "La victoriosa marcha de la revolución nunca se detendrá. El comando del EPLA ha emitido la siguiente orden: ¡crucen las Rocosas y liberen toda América!"
 APA_sieze_the_means_of_production: "¡Tomar los medios de producción!"
 APA_sieze_the_means_of_production_desc: "Los medios de producción pertenecen a los trabajadores que los usan. Por demasiado tiempo los señores de las corporaciones nos dominaron en lo que solía ser el infierno más capitalista de la historia humana. Vamos a demostrarles que su tiempo se acabó, y que es el turno del pueblo para tener el control."
 APA_decolonization: "Descolonización"
 APA_decolonization_desc: "El extenso imperio americano cubre de mar a brillante mar, y en la estela de su conquista dejó un sendero de lágrimas. Incontables nativos fueron objeto de dominio extranjero en sus propias tierras, e incluso ahora los Estados Unidos suprimen a grupos minoritarios en áreas donde son la población mayoritaria. ¡Esto no puede continuar ya más, y debemos permitir a toda la gente la habilidad de gobernarse a sí mismos!"
 APA_forbidden_fruit_of_war_communism: "El fruto prohibido del comunismo bélico"
 APA_forbidden_fruit_of_war_communism_desc: "Un siglo después de la revolución bolchevique, América ahora está envuelta en una guerra civil sangrienta. Tal cuál los soviéticos, debemos asegurarnos que cada persona esté poniendo de su parte para ganar la guerra. Un control total y absoluto es requerido sobre la economía y los trabajadores para ganar la guerra."
 APA_an_ideologically_committed_economy: "Economía comprometida a la ideología"
 APA_an_ideologically_committed_economy_desc: "Ser un trabajador ya no se trata sólo de trabajar de 9 a 5 para pagar las cuentas, el trabajo ahora significa supervivencia. Esto es tal cuál debe ser, porque sin que los trabajadores de nuestra nación dieran de su parte para promover el socialismo, nosotros no seríamos nada. El trabajo es la sangre vital de nuestra nación, y debemos asegurarnos que los trabajadores entiendan la importancia sagrada de sus labores cotidianas."
 APA_expand_chinese_investment: "Expandir las inversiones chinas"
 APA_expand_chinese_investment_desc: "Nuestra posición en el océano Pacífico nos ha dado acceso a la ayuda del Gobierno chino. Si bien no está del todo ideológicamente alineado con nuestra visión, las naciones socialistas deben cuidarse mutuamente, y podríamos ser capaces de convencer al Gobierno chino de que asistir a nuestra lucha es beneficioso para ellos."
 APA_collective_self_management: "Autogestión colectiva"
 APA_collective_self_management_desc: "Los trabajadores de nuestra unión tienen el derecho de gobernarse a sí mismos. Es la hora para que la democracia en el trabajo llegue a América y permita a nuestro pueblo hacer decisiones de gestión por sí mismo. Nunca más los grandes jefes acapararán toda la riqueza para sí mismos u oprimirán a los que están debajo de ellos."
 APA_fight_economic_corruption: "Luchar contra la corrupción económica"
 APA_fight_economic_corruption_desc: "La corrupción, el enemigo parasítico de las empresas revolucionarias, solamente cría burocratismo y revisionismo. En consecuencia, no debemos ser indulgentes con los individuos corruptos; mas bien, debemos derribarlos con medidas de mano dura."
 APA_this_land_is_our_land: "Esta tierra es nuestra"
 APA_this_land_is_our_land_desc: "Por primera vez desde su fundación, América pertenece verdaderamente al pueblo. Hemos creado una nación en la que toda la gente, sin importar su raza, clase o sexualidad, tiene la libertad que tan justamente merecen. El EPLA continuará luchando por la igualdad de los demás en toda América hasta que todos puedan ver la belleza de lo que hemos creado."
 APA_militarize_the_unions: "Militarizar los sindicatos"
 APA_militarize_the_unions_desc: "Los sindicatos son los cimientos de la nueva América. ¡No es sino apropiado que llamemos a los obreros a tomar armas para defender al estado obrero! ¡Nuestros sindicatos militarizados serán la vanguardia de la revolución!"
 APA_introduce_rationing: "Introducir el racionamiento"
 APA_introduce_rationing_desc: "Se requieren sacrificios en tiempos de guerra. El comunismo de guerra llama al racionamiento de los recursos civiles para mejorar el esfuerzo bélico. Claramente no hay mucho para repartir, pero debemos ser fuertes si queremos lograr la victoria sobre nuestros varios enemigos."
 APA_centralize_the_finance_system: "Centralizar el sistema financiero"
 APA_centralize_the_finance_system_desc: "El anterior sistema bancario de América era una desgracia. ¡El dinero de los contribuyentes se guardaba en una serie de bancos privados que se embolsaban billones de dólares al año! Nunca más el pueblo será vendido a la finanza internacional. Empezaremos desde cero, y construiremos un nuevo sistema que funcione de verdad para el pueblo."
 APA_collectivize_major_farms: "Colectivizar las megagranjas"
 APA_collectivize_major_farms_desc: "En tiempos recientes, América tuvo una sobreabundancia de tierra agrícola. ¡En algunos casos, el Gobierno pagó a los campesinos para que destruyan sus cultivos! Esto es impensable en un tiempo en el que nuestra gente pasa hambre. Mucho de la superficie agrícola de América es de propiedad de pocas familias. En el terreno que ocupamos podríamos ser capaces de \"convencerlos\" de entregárnosla por el bien de la nación."
 APA_the_peoples_stock_exchange: "La bolsa de valores popular"
 APA_the_peoples_stock_exchange_desc: "La bolsa de valores fue un estercolero de ricos empresarios y fondos especulativos buscando sacar provecho de las corporaciones más ricas de América. Si bien esta es una práctica vil, nuestra nación no puede existir sin un capitalismo limitado. Por lo tanto, vamos a democratizar la bolsa de valores, para que los individuos corrientes puedan pedir cuentas a las compañías por sus acciones, y hacerlas pagar el precio de ser necesario."
 APA_combat_financialization: "Combatir la financialización"
 APA_combat_financialization_desc: "La financialización de la economía es una de las principales culpables detrás de la desindustrialización, el declive económico y la erupción de varios conflictos sociales en los viejos Estados Unidos. Nunca hemos de repetir los errores cometidos por gobiernos burgueses al respecto."
 APA_bureau_of_central_development: "Buró de Desarrollo Central"
 APA_bureau_of_central_development_desc: "Tener una economía planeada requiere a mucha gente para planear el desarrollo de la nación. ¡Con toda la destrucción causada por la guerra civil, necesitamos un grupo brillante de obreros socialistas para reconstruir, rediseñar, y revitalizar la nación! Planearemos muchos proyectos nuevos para el futuro, afortunadamente para nosotros la destrucción engrenda creación."
 APA_construct_rehabilitation_camps: "Construir campos de rehabilitación"
 APA_construct_rehabilitation_camps_desc: "Naturalmente, en una tierra plagada por muchos años por el liberalismo y el capitalismo rampantes aún hay mucha gente que continúa resistiendo la revolución. ¡La liberación del trabajador es una idea que debería vivir en las mentes y corazones de cada persona en nuestra tierra! Debemos mostrarle a estos reaccionarios y otros elementos traidores la luz del socialismo a través de educación especial para que puedan ser integrados pacíficamente a nuestra sociedad."
 APA_establish_production_quotas: "Establecer cuotas de producción"
 APA_establish_production_quotas_desc: "En la guerra, la producción lo es todo. No tenemos el lujo de que grandes compañías armamentísticas pertrechen a nuestro ejército como en las naciones capitalistas. Solo tenemos acceso a lo que nuestro pueblo ha capturado, y lo que pueden producir. No podemos dejar que ciudadanos inocentes sufran debido a una falta de productividad."
 APA_legalize_recreational_drugs: "Legalizar las drogas recreativas"
 APA_legalize_recreational_drugs_desc: "La guerra contra las drogas fue una treta mal armada para privar de sus derechos a grupos minoritarios, y para pintarlos como peligrosos criminales. La realidad del asunto es que no hay nada criminal en fumar. De hecho, no tenemos el derecho a decirle a nadie que no hacer con sus cuerpos, ni el tiempo ni esfuerzo para desincentivarlos del uso de ciertas sustancias. Debemos dejar que la nación cure sus heridas."
 APA_workplace_democracy: "Democracia en el lugar de trabajo"
 APA_workplace_democracy_desc: "El sistema tradicional de gestión es obsoleto, y engendra el descontento entre los trabajadores. No podemos dejar descontenta a la base de nuestro sistema socialista con el estado de su entorno laboral. Es por esto que debemos darles rienda suelta sobre sus decisiones tradicionales de gestión. De esa forma, cuando no les guste algo, lo podrán cambiar."
 APA_guarentee_a_basic_living_standard: "Garantizar un estándar básico de vida"
 APA_guarentee_a_basic_living_standard_desc: "El salario digno en América era substancialmente más alto que el salario mínimo. ¡Con nuestra nueva política de colectivización en masa, podemos asegurarnos de que mientras estés dipuesto a trabajar, tendrás comida, agua, refugio, y mucho más por venir luego de completar la revolución!"
 APA_peer_to_peer_economics: "Economía de pares"
 APA_peer_to_peer_economics_desc: "Cuando se trata del intercambio de bienes y servicios, lo mejor es preservarlo lo más pequeño y local que se pueda para evitar la financialización. Debemos promover un sistema en el que los individuos intercambien bienes entre sí, tal como era antes de la introducción de la banca central."
 APA_radical_redistribution: "Redistribución radical"
 APA_radical_redistribution_desc: "Con nuestra política de colectivización, es nuestro deber tomar de los que más tienen, y darle a los que menos tienen. En este tiempo de tribulación, muchos ciudadanos han caído en la pobreza, pero aún hay algunos que tienen más para dar. La vieja América puede haber tenir alguna redistribución indirecta de riqueza, pero la llevaremos a un nivel enteramente nuevo, y mucho más efectivo."
 APA_ban_private_ownership_of_capital: "Prohibir la propiedad privada del capital"
 APA_ban_private_ownership_of_capital_desc: "Ya no hay sitio para la propiedad privada del capital en nuestra nación. Cada una y todas las industrias deben ser entregadas al gobierno para que contribuyan al bienestar general del pueblo. ¡No se permitirá en absoluto ninguna acaparación de riqueza por más tiempo! ¡Si algo genera ingresos, son los ingresos del pueblo!"
 APA_syndicalist_economic_policy: "Política económica sindicalista"
 APA_syndicalist_economic_policy_desc: "Construiremos una nueva economía desde cero, y la construiremos sobre los sindicatos. Hay miles de profesiones que uno puede tener, y muchas formas por las que una persona puede ayudar a su país. Nos aseguraremos que cada una tenga un grupo especializado de sindicatos que tome decisiones para sí. Tendremos muchos sindicatos diferentes, y sindicatos obreros para gobernar a esos sindicatos. ¡Tendremos un Gobierno obrero enteramente sindicalista para que diseñen políticas para sí mismos!"
 APA_the_myth_of_the_white_proletariat: "El mito del proletariado blanco"
 APA_the_myth_of_the_white_proletariat_desc: "El hombre burgués blanco conquistó y esclavizó a millones de minorías a lo largo del continente americano. A través de años de opresión, los pueblos colonizados de América se han convertido de facto en proletarios, en una sociedad a la que el hobre blanco trajo una aristocracia de los privilegiados. Debemos limpiar los pecados del pasado y aprender lo que de verdad significa ser parte del proletariado."
 APA_nationalization: "Nacionalización"
 APA_nationalization_desc: "Hay industrias clave de las que nos debemos apropiar para que nuestro pueblo sobreviva. Debemos garantizar agua, electricidad y atención médica para todos en un tiempo en el que estas cosas no son una certeza. Nuestro pueblo necesita sentirse seguro sobre su Gobierno, deben saber que somos capaces de proveer para ellos si van a continuar a entregar sus vidas por sus países."
 APA_absorb_entrepreneurs: "Absorber las empresas"
 APA_absorb_entrepreneurs_desc: "Lento pero seguro, nuestro Gobierno se hace más fuerte y poderoso. Los recursos, la industria, la producción de armas, e incluso el capital están bajo nuestro control. Todo lo que queda es buscar a los empresarios, y hacer que nos entreguen sus activos directamente, para que puedan ser usados para beneficiar al pueblo en general. Estamos ya en el camino para establecer el verdadero socialismo."
 APA_redefine_the_dream: "Redefinir el Sueño"
 APA_redefine_the_dream_desc: "¿Qué es el sueño americano? El sueño americano es ser capaz de trabajar sin preocuparte de que tu familia se esté muriendo de hambre o por enfermedad. Es ser tratado con igualdad ante la ley, sin importar raza, sexualidad, o identidad de género. Es ser capaz de reconocer el pasado oscuro, para que podamos crear un futuro brillante. Es vivir en la tierra que te es propia, al lado de los trabajadores que lo hacen todo posible, sin nadie que te domine. Pero, lo más importante, es que este no es un sueño. Esta es la nueva América."
 APA_meritocratic_socialism: "Socialismo meritocrático"
 APA_meritocratic_socialism_desc: "Sin la inclusión de las élites que poseen un alto nivel de pericia, la construcción de una economía socialista se quedaría en solo un sueño de opio. Consecuentemente, planeamos proveer a estos espinazos intelectuales y técnicos de un mejor trato, permitiéndoles utilizar plenamente sus capacidades."
 APA_department_of_economic_innovation: "Departamento de Innovación Económica"
 APA_department_of_economic_innovation_desc: "La noción de que sólo los países capitalistas pueden innovar es de plano una mentira, y estamos determinados a desmentirla otra vez. El Departamento de Innovación Económica apunta a aprovechar la sabiduría de las masas y estimular avances pioneros en las actividades de producción e investigación."
 APA_department_of_the_peoples_welfare: "Departamento del Bienestar Popular"
 APA_department_of_the_peoples_welfare_desc: "El socialismo nunca abandonará a las masas empobrecidas a que se valgan por sí solas, incluso en medio del caos de la guerra. El Departamento del Bienestar Popular está dedicado a asegurar la estabilidad de estándares básicos de vida para toda la gente, jurando que \"ni una sola persona se quedará atrás\"."
 APA_form_the_liberation_army: "Formar el Ejército de Liberación"
 APA_form_the_liberation_army_desc: "Casi 100 años después de la formación del Ejército de Liberación Popular en China, nosotros debemos formar el nuestro en América. La violencia ha escalado a un punto de no retorno y debemos enfrentarnos al hecho de que es la hora de tomar armas. Organizaremos las distintas milicias socialistas del EPLA bajo una estructura unificada de comando para poder empujar hacia el este y liberar a la nación de gobiernos rivales."
 APA_the_soldiers_army: "Ejército profesional"
 APA_the_soldiers_army_desc: "Cuando América colapsó, el exceso de equipo militar fue abandonado en las tierras que ocupamos. Si vamos a ganar esta guerra, necesitamos soldados entrenados que adopten nuestra causa y utilicen armas modernas de guerra para enfrentarse a nuestros enemigos. Si bien las milicias son útiles para cantidad, necesitamos potencia de fuego y habilidad pura si vamos a sobrevivir."
 APA_the_workers_army: "Ejército Obrero"
 APA_the_workers_army_desc: "Es el deber de cada trabajador el alzarse en armas por su país. En 1917, fueron los trabajadores los que se alzaron y derrocaron la decandente monarquía rusa. Fueron los trabajadores de la revolución comunista china los que resistieron en las montañas, esperando el momento para atacar. Ahora son los trabajadores de América que se mobilizaron en masa, listos para enfrentarse al enemigo en olas humanas. ¡Sin importar cuántos caigan!"
 APA_dare_to_die: "Dispuestos a morir"
 APA_dare_to_die_desc: "Como estamos en contra de pronósticos abrumadores, debemos contar con gente que esté dispuesta a entregar sus vidas por la liberación de nuestro pueblo. Jóvenes socialistas llenos de vigor y celo son ideales para este noblísimo y sacratísimo deber. Los socialistas de campus se han graduado al campo de batalla."
 APA_introduce_conscription: "Introducir la conscripción"
 APA_introduce_conscription_desc: "\"Si lanzamos suficiente gente a las balas, eventualmente se quedarán sin balas\". Así dice el viejo refrán, y por más cruel que pueda ser, aún tiene mucho de verdad hoy en día. El tiempo es esencial en una guerra como esta y no podemos estar cuidando de los nuevos reclutas como si recién estuvieran aprendiendo a caminar. Es hora de enviarlos de frente al campo de batalla."
 APA_improve_training_programs: "Mejorar los programas de entrenamiento"
 APA_improve_training_programs_desc: "Enviar hombres a luchar sin un entrenamiento adecuado es un suicidio. Si vamos a asumir el manto de una nación con una historia de oprimir a su pueblo, enviar a sus liberadores a sus muertes no es manera alguna de hacerlo. Debemos asegurarnos que nuestros reclutas tengan el conocimiento que necesitan para utilizar armas de guerra modernas en combate."
 APA_political_commissars: "Comisarios políticos"
 APA_political_commissars_desc: "Instituir comisarios políticos puede ser una buena forma de mantener leal al ejército, y para prevenir que participen de retiradas no autorizadas. Tener un ejército politizado es vital para la plenitud de la revolución. Pero aún más importante, traer comisarios al siglo XXI asegurará que nuestros reclutas sigan órdenes."
 APA_begin_a_tank_program: "Comenzar un programa de tanques"
 APA_begin_a_tank_program_desc: "El Ejército de Liberación está enfrentándose a múltiples ejércitos bien financiados y consolidados en esta brutal guerra civil. Nos solemos enfrentar a vehículos blindados para los que no tenemos un método confiables para eliminarlos. Por esto debemos comenzar la producción de una nueva línea de tanques hechos especialmente para nuestro ejército y el entorno en el que luchamos."
 APA_permit_international_brigades: "Permitir brigadas internacionales"
 APA_permit_international_brigades_desc: ""
 APA_study_eastern_doctrines: "Estudiar doctrinas orientales"
 APA_study_eastern_doctrines_desc: ""
 APA_recruit_among_student_radicals: "Reclutar a estudiantes radicales"
 APA_recruit_among_student_radicals_desc: ""
 APA_recruit_among_disgruntled_veterans: "Reclutar a veteranos descontentos"
 APA_recruit_among_disgruntled_veterans_desc: ""
 APA_issue_balistic_vests: "Entregar chalecos balísticos"
 APA_issue_balistic_vests_desc: ""
 APA_encourage_female_service: "Promover el servicio femenino"
 APA_encourage_female_service_desc: ""
 APA_import_chinese_equipment: "Importar equipos chinos"
 APA_import_chinese_equipment_desc: ""
 APA_the_peoples_air_force: "La Fuerza Aérea Popular"
 APA_the_peoples_air_force_desc: ""
 APA_train_the_elite_red_guard: "Entrenar a la Guardia Roja de Élite"
 APA_train_the_elite_red_guard_desc: ""
 APA_motorization_program: "Programa de motorización"
 APA_motorization_program_desc: ""
 APA_mechanization_program: "Programa de mecanización"
 APA_mechanization_program_desc: ""
 APA_steel_storm: "Tormenta de acero"
 APA_steel_storm_desc: ""
 APA_learn_from_the_little_red_book: "Aprender del Libro Rojo"
 APA_learn_from_the_little_red_book_desc: ""
 APA_the_american_zhukov: "El Zhúkov americano"
 APA_the_american_zhukov_desc: ""
 APA_cult_of_movement: "Culto al movimiento"
 APA_cult_of_movement_desc: "¡Ataca, ataca, ataca otra vez! Sólo iniciando maniobras ofensivas podemos exhibir el poder de nuestro ejército revolucionario y nuestra impávida determinación para liberar a los Estados Unidos enteros. Toda estrategia conservadora proviene de un miedo injustificado del enemigo."
 APA_request_chinese_military_advisors: "Solicitar asesores militares chinos"
 APA_request_chinese_military_advisors_desc: "Es hora de comunicarse abiertamente con China, invitando a oficiales experimentados del Ejército de Liberación Popular para que nos provean con una invaluable orientación sobre operaciones militares y el desarrollo de nuestras fuerzas armadas."
 APA_utilize_captured_drones: "Utilizar drones capturados"
 APA_utilize_captured_drones_desc: "Los drones son el nuevo armamento de la guerra moderna del siglo XXI. Al reprogramar y desplegar drones capturados en nuevas operaciones de combate, fortaleceremos significativamente el reconocimiento y la capacidad de ataques preventivos de nuestras tropas."
 APA_the_red_academy_of_military_science: "Academia Roja de Ciencias Militares"
 APA_the_red_academy_of_military_science_desc: "Estableceremos una institución dedicada para la educación e investigación militar, donde las lecciones y experiencias de la guerra civil puedan ser analizadas exhaustivamente, y una nueva generación de comandantes y luchadores del EPLA será cultivada, así reforzando gradualmente el repertorio de talentos de nuestro ejército revolucionario."
 APA_the_red_tsunami: "Tsunami rojo"
 APA_the_red_tsunami_desc: "Los sacrificios en la revolución siempre son dolorosos y lamentables, pero ahora debemos promover este espíritu de sacrificio, pues sólo de esta forma podremos unir a los soldados y al pueblo aún más estrechamente."
 APA_assault_of_the_proletariat: "Asalto del proletariado"
 APA_assault_of_the_proletariat_desc: "A través de la propagación del odio de clases, incluso un proletario sin experiencia militar previa puede ser llevado por un intenso aborrecimiento de los gobernantes capitalista a combatir fieramente al enemigo en el campo de batalla."
 APA_peasant_partisantry: "Partisanería campesina"
 APA_peasant_partisantry_desc: "En la lucha revolucionaria, nunca debemos olvidar el rol significativo que la clase agricultora puede jugar. Formando unidades de guerrilla en la campiña reforzará en gran medida la ventaja de nuestras fuerzas en la retaguardia enemiga."
 APA_collectivist_propaganda: "Propaganda colectivista"
 APA_collectivist_propaganda_desc: "Lanzaremos una serie de campañas de propaganda celebrando al EPLA, con temas centrados en la unidad y la dedicación. Sin el poder del colectivo, la revolución no habría llegado así de lejos."
 APA_positive_heroism: "Heroísmo positivo"
 APA_positive_heroism_desc: "Iniciaremos una serie de esfuerzos propagandísticos alabando al EPLA, enfocándonos en temas de valientía y liderazgo. Sin la fuerza de la vanguardia, la revolución no habría llegado así de lejos."
 APA_aerial_innovations: "Innovaciones aéreas"
 APA_aerial_innovations_desc: "Las nuevas tecnologías que hemos desarrollado para misiones de combate y defensa aérea nos proporcionarán ventajas imprevisibles en la lucha por la supremacía aérea."
 APA_create_the_vanguard_internationale: "Crear la Internacional Vanguardista"
 APA_create_the_vanguard_internationale_desc: "Establecer la Internacional Vanguardista nos ayudará en reforzas los lazos y la cooperación con otras naciones y partidos socialistas hermanos, avanzando conjuntamente la causa revolucionaria del pueblo del mundo."
 APA_callout_to_the_world: "Llamar al mundo"
 APA_callout_to_the_world_desc: "Hemos de declarar solemnemente al mundo entero: ¡La gran lucha revolucionaria americana ha logrado una victoria militar monumental! ¡El pueblo americano se ha alzado de verdad!"
 APA_the_vanguard_party: "Partido de vanguardia"
 APA_the_vanguard_party_desc: "Las experiencias de países socialistas como la Unión Soviética y China han demostrado inequívocamente que sólo al establecer un grupo estrechamente unido de revolucionarios bien entrenados, organizados en la forma de un partido político, puede ser liderada efectivamente la lucha de las masas. En consecuencia, el triunfo de la revolución estará asegurado. ¡La vanguardia representa el futuro!"
 APA_the_popular_front: "Frente Popular"
 APA_the_popular_front_desc: "El éxito de la revolución es el resultado de los esfuerzos colectivos de la población entera; entonces, es natural que el destino de la revolución debiera estar genuinamente en las manos de todo el pueblo. ¡El Frente Popular será pionero en nuevas formas de revolución socialista, guiando a la nación entera hacia un nuevo camino, brillante y revolucionario!"
 APA_a_new_american_socialism: "Un socialismo americano"
 APA_a_new_american_socialism_desc: "Para construir el socialismo, la consideración de las circunstancias únicas de nuestra nación es esencial. Al integrar las realidades de la sociedad americana con ideales socialistas, forjaremos un nuevo camino sin precedentes."
 APA_information_defense_act: "Acta de Defensa de la Información"
 APA_information_defense_act_desc: "En el delicado balance entre proteger la privacidad de los ciudadanos y mantener la ciberseguridad, todo debe estar alineado con los intereses supremos de la nación y la causa socialista."
 APA_promote_socialist_patriotism: "Promover el patriotismo socialista"
 APA_promote_socialist_patriotism_desc: "La nación representa al colectivo socialista más grande, compuesto de ciudadanos individuales. Al venerar y amar nuestro país, tu vida será verdaderamente hermosa."
 APA_smash_capitalist_excesses: "[party_specific_focus_jacobin]"
 APA_smash_capitalist_excesses_desc: ""
 APA_smash_capitalist_excesses_1: "Destruir el exceso capitalista"
 APA_smash_capitalist_excesses_2: "Carta de Derechos Revolucionaria"
 APA_smash_capitalist_excesses_3: "Unir al pueblo americano"
 APA_anti_consumerist_campaign: "Campaña anticonsumista"
 APA_anti_consumerist_campaign_desc: "El consumismo inherentemente simboliza el declive moral entre nuestro pueblo y es fundamentalmente incompatible con la causa socialista. Impondremos sanciones rigurosas contra el étos consumista."
 APA_establish_a_peoples_democratic_dictatorship: "Una dictadura democrática popular"
 APA_establish_a_peoples_democratic_dictatorship_desc: "Un régimen revolucionario, fundado sobre las amplias masas, ejercitará la dictadura sobre un número reducido de elementos hostiles, solidificando los cimientos de la gobernanza del Estado socialista en nombre del pueblo."
 APA_rewrite_the_history_books: "Reescribir los libros de historia"
 APA_rewrite_the_history_books_desc: "Controlar la historia significa controlar las memorias y pensamientos del pueblo. Nos aseguraremos que la historia que es familiar al pueblo americano se alinee con las necesidades de la revolución y el tono de la educación ideológica."
 APA_control_the_church: "Controlar la iglesia"
 APA_control_the_church_desc: "La religión juega un rol crucial en la vida espiritual de los americanos. Vamos a lograr un control completo sobre el sistema eclesial americano después de una profunda minuiciosa, permitiéndonos influenciar profundamente las mentes y corazones del pueblo."
 APA_purge_the_clergy: "Purgar al clero"
 APA_purge_the_clergy_desc: "Aquellos reaccionarios desobedientes que intenten seducir al pueblo con palabras y menosprecien la revolución serán erradicados, asegurándonos de la lealtad del clero al país y a la revolución."
 APA_war_on_cultural_capitalism: "Guerra contra el capitalismo cultural"
 APA_war_on_cultural_capitalism_desc: "Los viejos Estados Unidos usaron a la comida rápida cultural consumista para dividir e hipnotizar al pueblo americano. Barreremos por completo a esta basura histórica y construiremos una nueva cultura socialista para la nueva América desde cero."
 APA_retool_the_incentives: "Reconfigurar los incentivos"
 APA_retool_the_incentives_desc: "La revolución es un movimiento político del pueblo; sin motivación no hay entusiasmo revolucionario. Reformaremos los mecanismos de incentivos para que se acoplen mejor con el estado actual de construcción revolucionaria."
 APA_purge_the_opportunists: "Purgar a los oportunistas"
 APA_purge_the_opportunists_desc: "Los oportunistas que infiltraron nuestra vanguardia han excedido su utilidad. Es hora de purgar estos lastres y despejar los últimos obstáculos para la revolución."
 APA_the_modern_socialist_family: "La familia socialista moderna"
 APA_the_modern_socialist_family_desc: "La familia es la unidad básica de la sociedad, y la construcción de una economía e ideología socialistas no puede ser separada de la familia. En última instancia, la nueva América socialista será construida como una gran y cálida familia."
 APA_correct_college_radicalism: "Corregir el radicalismo universitario"
 APA_correct_college_radicalism_desc: "Los estudiantes suelen tener expectativas irreales sobre la causa revolucionaria, desconectadas de la realidad y demasiado demandantes. Por la estabilidad y el balance sociales, desplegaremos grupos de trabajo para controlar a movimientos políticos en las universidades."
 APA_restructure_prism: "Reestructurar PRISM"
 APA_restructure_prism_desc: "El reformado y reestructurado programa PRISM servirá como una salvaguardia confiable para la seguridad socialista y como una herramienta poderosa para servir a los intereses del pueblo. Claro está, todo esto debe mantenerse alejado del ojo público."
 APA_create_the_young_jacobins: "Los Jóvenes Jacobinos"
 APA_create_the_young_jacobins_desc: "El espíritu revolucionario debe ser heredado. La nueva generación de jóvenes recibirá la educación apropiada para asegurar la estabilidad eterna del régimen rojo jacobino."
 APA_end_reactionary_thought: "Destruir pensamiento reaccionario"
 APA_end_reactionary_thought_desc: "Eliminaremos por completo los últimos reductos de la influencia de la oposición. El pueblo se olvidará de ellos por completo, lo que será su más grande humillación y nuestro éxito más grande."
 APA_rural_radicalization: "Radicalización rural"
 APA_rural_radicalization_desc: "Las áreas rurales de América han sido largo conocidas por su pensamiento conservador. Hoy, todo esto va a cambiar en tanto la nueva América socialista establece un control completo en las regiones rurales."
 APA_socialist_christianity: "Cristianismo socialista"
 APA_socialist_christianity_desc: "La cristiandad inherentemente defiende la idea de la igualdad. Combinada con una ideología y unos métodos de propaganda socialistas, su influencia se volverá incluso más asombrosa."
 APA_hearts_and_minds: "Mentes y corazones"
 APA_hearts_and_minds_desc: "Implementaremos una educación de espíritu revolucionario que toca las almas y penetre los cuerpos y mentes de todo el pueblo. Solo de esta manera podremos crear un nuevo pueblo verdaderamente socialista."
 APA_dismantle_the_opiate: "Desmantelar los opiáceos"
 APA_dismantle_the_opiate_desc: "Prohibiremos el uso de toda droga adictiva y degradante, incluyendo los opiáceos. En la nueva América socialista, no hay espacio para aquellas ponzoñas."
 APA_a_new_america: "Una nueva América"
 APA_a_new_america_desc: ""
 APA_the_glory_of_october: "La gloria de Octubre"
 APA_the_glory_of_october_desc: "Nosotros, la nueva ola de revolucionarios americanos al otro lado del océano, heredaremos el legado de la Revolución de Octubre. La utopía de Lenin será reconstruida en el continente norteamericano."
 APA_create_the_cadre_system: "Crear el sistema de cuadros"
 APA_create_the_cadre_system_desc: "Stalin famosamente afirmó que \"los cuadros son la riqueza de la nación\". Así pues, debemos apoyarnos en burócratas partidarios y gubernamentales de confianza para construir la Nueva América socialista."
 APA_invite_chinese_economists: "Invitar a economistas chinos"
 APA_invite_chinese_economists_desc: "Los chinos tienen una perspectiva única acerca de cómo construir una economía de mercado socialista. Debemos invitar a economistas chinos para que visiten América, y absorber sus teorías económicas y experiencias en construcción."
 APA_promote_egalitarianism: "Promover el igualitarianismo"
 APA_promote_egalitarianism_desc: "Debemos asegurar un vínculo profundo entre la vanguardia y las masas. De otro modo, la unidad de las fuerzas revolucionarias y la confianza del público en el nuevo Gobierno se verán severamente socavadas."
 APA_elevate_the_new_american_woman: "Elevar a la nueva mujer americana"
 APA_elevate_the_new_american_woman_desc: "La vieja América tiene aún áreas donde se queda corta al promover los derechos de la mujer. Como un régimen socialista progresista, debemos eliminar por completo tanto la discriminación de género abierta como la encubierta."
 APA_mass_arrests: "Arrestos en masa"
 APA_mass_arrests_desc: "No podemos tolerar que elementos hostiles inflitren la sociedad y desestabilicen al régimen. Estos individuos se enfrentarán a las penalidades más duras y serán retribuidos en vida."
 APA_attempt_to_educate_reactionaries: "Reeducar a los reaccionarios"
 APA_attempt_to_educate_reactionaries_desc: "Después de arrestar a los reaccionarios, los reeducaremos, potencialmente transformándolos en miembros benéficos de la sociedad. Se arrepentirán de sus crímenes a través del trabajo."
 APA_anti_disinformation_campaign: "Campaña contra la desinformación"
 APA_anti_disinformation_campaign_desc: "Toda diseminación de información falsa y de sentimientos negativos será estrictamente controlada. Para el que esparza esos rumores, la prisión será su único destino."
 APA_the_great_american_firewall: "El Gran Cortafuegos americano"
 APA_the_great_american_firewall_desc: "China ha establecido una Gran Cortafuegos para su internet doméstico, asegurándose de que la retórica contra el Partido y contra el Estado no se disemine ampliamente. ¿Por qué no habríamos de aplicar esta lección?"
 APA_assemble_the_first_politburo: "Componer el primer politburó"
 APA_assemble_the_first_politburo_desc: "El politburó es el verdadero núcleo del poder de la América socialista. La primera reunión del nuevo Politburo marcará el tono para la siguiente fase de nuestra misión."
 APA_idolize_la_riva: "Idolizar a La Riva"
 APA_idolize_la_riva_desc: "La Riva, como líder y núcleo de nuestra revolución, recibirá publicidad máxima. La idolización personal apropiada asegurará a la decidida implementación de la voluntad y las órdenes del partido."
 APA_create_the_party_state: "Crear el Estado-partido"
 APA_create_the_party_state_desc: "Dentro del régimen socialista, el partido debe formar un íntegro orgánico, estrechamente entretejido con los órganos estatales. Esta integración prevendrá la división pública del Gobierno y asegurará el avance contínuo de la causa revolucionaria."
 APA_eradicate_hollywood: "Erradicar Hollywood"
 APA_eradicate_hollywood_desc: "Hollywood es el bastión de la hegemonía cultural capitalista y uno de nuestros enemigos más grandes. ¡El tiempo ha llegado para erradicarlo por completo, borrando toda traza de su existencia!"
 APA_sieze_hollywood: "Tomar Hollywood"
 APA_sieze_hollywood_desc: "Debemos reconocer que las técnicas de propaganda de Hollywood y su control de los medios son realmente efectivos. Estableceremos un nuevo Hollywood, dedicado a la creación artística que sirva a las necesidades de la revolución y los intereses del público."
 APA_anti_partisan_brigades: "Brigadas antipartisanos"
 APA_anti_partisan_brigades_desc: "La estabilidad es primordial. Debemos establecer brigadas especiales para lidiar con guerrilleros y grupos armados que socaven los logros de la revolución."
 APA_anti_reactionary_brigades: "Brigadas antireaccionarios"
 APA_anti_reactionary_brigades_desc: "El enemigo está entre nosotros. Formaremos brigadas especiales para confrontar a los que supongan una amenaza política, tal como la oposición y los elementos reaccionarios."
 APA_revive_socialist_realism: "Revivir el realismo socialista"
 APA_revive_socialist_realism_desc: "El espíritu socialista debe ser el nuevo estándar para la creación artística. Solo entonces nuestras obras reflejarán verdaderamente los pensamientos y las necesidades espirituales de las masas."
 APA_new_socialist_culture: "Una nueva cultura socialista"
 APA_new_socialist_culture_desc: "Una nueva nación socialista debería tener una esfera cultural e ideológica que combine el orden y la vitalidad. El pluralismo y la teoría revolucionaria coexistirán bajo un mismo cielo nacional."
 APA_sieze_the_wealth: "Tomar la riqueza"
 APA_sieze_the_wealth_desc: "Debemos confiscar y apropiarnos de los activos de los contrarrevolucionarios y del viejo régimen. Esto aliviará significativamente nuestras presiones económicas y proveerán los fondos necesarios para construir."
 APA_the_red_star_over_america: "Estrella roja sobre América"
 APA_the_red_star_over_america_desc: "Estemos orgullosos de nosotros mismos; sobre las ruinas del viejo régimen capitalista, hemos establecido una nueva nación socialista. Ella ha heredado el legado glorioso de nuestros predecesores y lo eleva aún más. ¡Como el nuevo faro del socialismo, América se ubica orgullosamente sobre el pináculo del mundo!"
 APA_bread_and_roses: "Pan y rosas"
 APA_bread_and_roses_desc: "La esperanza otorgada por el pueblo es la piedra angular de la victoria revolucionaria. Hemos prometido prosperidad al pueblo, igualdad, y libertad, y nunca debemos traicionar su confianza."
 APA_bill_of_rights_socialism: "Carta de Derechos para el Socialismo"
 APA_bill_of_rights_socialism_desc: "Promulgaremos una Carta de Derechos para el socialismo, marcando nuestro último y más significativo logro en el avance de los derechos civiles y la promoción de la igualdad social."
 APA_implement_universal_basic_income: "Implementar la renta básica universal"
 APA_implement_universal_basic_income_desc: "Implementaremos de verdad un programa de ingreso básico universal, asegurándonos que el frío y el hambre ya no puedan reclamar las vidas de los pobres de América, pues siempre habrá alguien quien les tienda la mano y los ayude."
 APA_invite_mass_membership: "Invitar a las masas"
 APA_invite_mass_membership_desc: "Genuinamente involucraremos a las masas en la gobernanza de la sociedad, permitiéndoles convertirse en los verdaderos maestros de sus destinos. El primer paso es incorporarlo a las estructuras de poder y sistemas de gobernanza."
 APA_secure_liberties: "Asegurar libertades"
 APA_secure_liberties_desc: "La libertad es un derecho fundamental de todos los seres conscientes. Como un derecho humano innato, defenderemos este sagrado principio a través de políticas concretas."
 APA_the_proletariat_shall_not_be_disarmed: "¡El proletariado no será desarmado!"
 APA_the_proletariat_shall_not_be_disarmed_desc: "El proletariado tiene una larga historia de persecución, con pocos medios para defenderse a sí mismos. Por lo tanto, nunca restringiremos el derecho del pueblo a buscar formas de proteger sus vidas y su propiedad."
 APA_sieze_the_police: "Tomar la policía"
 APA_sieze_the_police_desc: "La policía ha sido un símbolo de los Gobiernos autocráticos y nunca se ha ganado de verdad la confianza de la gente. Sin embargo, bajo nuestro nuevo Gobierno, esto cambiará."
 APA_fight_bigotry: "Combatir a la intolerancia"
 APA_fight_bigotry_desc: "La discriminación y el prejuicio generalizados en la vieja sociedad americana serán erradicados. Las amplias masas y distintos grupos sociales se convertirán de verdad en un todo unido y armonioso."
 APA_a_united_antifascist_front: "Un frente antifascista unido"
 APA_a_united_antifascist_front_desc: "Uniremos a las organizaciones sociales que comparten nuestro profundo desdén por el fascismo y el autoritarismo. Se convertirán en una fuerza vital liderando a la sociedad americana y protegiendo los avances revolucionarios."
 APA_promote_social_reperations: "Promover reparaciones socialistas"
 APA_promote_social_reperations_desc: "Centraremos inicialmente la causa socialista en reconstrucción y reparaciones para aquellos grupos que fueron perseguidos, discriminados y descuidados en el pasado. Esto es un paso crucial para distinguirnos del régimen anterior"
 APA_calm_the_moderates: "Calmar a los moderados"
 APA_calm_the_moderates_desc: "En la sociedad siempre existen aquellos que son escépticos de nuestra causa revolucionaria, que temen que podamos traer caos y luchas interminables. Debemos aliviar sus preocupaciones para asegurar que nuestras políticas pueden lograr resultados tangibles"
 APA_humanist_socialism: "Socialismo humanista"
 APA_humanist_socialism_desc: "La causa socialista en América debe de priorizar la felicidad y la igualdad de todos, tratando a todo grupo por igual. El orden socialista será logrado mediante medidas gentiles"
 APA_enshrine_minority_rights: "Garantizar derechos de minorías"
 APA_enshrine_minority_rights_desc: "La desigualdad de derechos de las minorias ha sido deliberadamente fomentado y exacerbado, creando deliberadamente división social y conflicto. Para asegurar que los derechos de las minorias están sólidamente protegidos, ahondaremos la legislación"
 APA_dismantle_the_carceral_state: "Desmantelar el sistema carcelario"
 APA_dismantle_the_carceral_state_desc: "El sistema de prisiones de la vieja América es una red basta y oscura llena de violencia, desigualdad y transacciones del mercado negro. Nosotros desmantelaremos completamente este malvado legado y confortaremos al pueblo Americano"
 APA_encourage_social_self_governance: "Alentar el autogobierno social"
 APA_encourage_social_self_governance_desc: "El pueblo es el que mejor entiende sus necesidades, y la interferencia gubernamental es vista como otra manifestación de autoritarismo, independientemente de lo gentil que sea el enfoque. El autogobierno social será el paso más crucial para lograr la visión del socialismo Americano"
 APA_an_equal_america: "Una América igualitaria"
 APA_an_equal_america_desc: "Desde el estallido de la revolución se han dado incontables ejemplos que prueban que solo el socialismo puede salvar América. Este nuevo camino que hemos creado ante la incertidumbre guiará al pueblo desconcertado"
 APA_no_gods_no_masters: "Ni dioses, ni amos"
 APA_no_gods_no_masters_desc: "El día de hoy marca el amanecer de un nuevo capítulo en la historia. El pueblo americano se convertirá en su propio salvador, portando el frenesí de la liberación entre ellos y esta gran nación."
 APA_open_the_prisons: "Abrir las prisiones"
 APA_open_the_prisons_desc: "Entre las paredes de nuestras prisiones, nuestros compatriotas y guerreros que comparten nuestros objetivos son injustamente encerrados. Va siendo hora de restaurar su libertad y permitirles desatar su potencial"
 APA_radical_republicanism: "Republicanismo radical"
 APA_radical_republicanism_desc: "La igualdad traída por la revolución debe de ser defendida con una fuerza sin parangón; sí no, nuestros adversarios la usurparán con una brutalidad aún mayor. Mejoraremos aún más la fuerza y el tamaño de nuestras milicias civiles"
 APA_the_will_of_the_people: "La voluntad popular"
 APA_the_will_of_the_people_desc: "La falta de interes por las reclamaciones del pueblo ha llevado al colapso del viejo régimen Americano. Al contrario de los regímenes reaccionarios varios, daremos al pueblo libertad total, primeramente de la esclavitud inacabable que otorga el Estado."
 APA_strengthen_the_lumpenproletariat: "Fortalecer el lumpemproletariado"
 APA_strengthen_the_lumpenproletariat_desc: "Las protestas callejeras y los movimientos que comienzan revueltas son catalizadores cruciales para la revolución. Dominarán las calles, apartando a todo aquel que simpatice con el conservadurismo y el capitalismo."
 APA_establish_popular_councils: "Establecer consejos populares"
 APA_establish_popular_councils_desc: "Abogamos por la creación de consejos populares que incluyan a todos los residentes locales, basados en divisiones territoriales, para lograr la completa autodeterminación social"
 APA_smash_the_patriarchy: "Destrozar el patriarcado"
 APA_smash_the_patriarchy_desc: "El patriarcado es el epítome de la opresión de las fuerzas reaccionarias, por lo que acabaremos completamente con la dominancia de este caduco sistema de valores sobre la sociedad Americana."
 APA_revolutionary_justice: "Justicia revolucionaria"
 APA_revolutionary_justice_desc: "Los crímenes cometidos por los lacayos de la opresión serán expuestos mediante juicios. Las ejecuciones servirán como la expiación definitiva y como ajuste de cuentas."
 APA_legalize_victimless_crimes: "Legalizar crímenes sin víctimas"
 APA_legalize_victimless_crimes_desc: "En el pasado, ofensas menores daban a los agentes de la ley la excusa perfecta para arrestar arbitrariamente a cualquier ciudadano. Esta conveniencia dejará de existir, ya que el pueblo tiene el derecho a ejercer libremente el control sobre sus propias acciones"
 APA_abolish_prisons: "Mentalidad de cooperación"
 APA_abolish_prisons_desc: "Necesitamos alentar un espíritu de apoyo mutuo entre comunidades y regiones. La cooperación sincera es la mejor manera de resolver conflictos y preveer confrontaciones."
 APA_abolish_the_police: "Abolir la policía"
 APA_abolish_the_police_desc: "La policía no ha sido más que una herramienta de aquellos en el poder para mantener el control mediante violencia, temiendo al poder del pueblo. Esta profesión se convertirá en historia, ya que el pueblo protegerá su propia seguridad sin injerencias externas."
 APA_bastion_of_freedom: "Un bastión de la libertad"
 APA_bastion_of_freedom_desc: "Los tiranos se arrodillarán ante nosotros, y el vendaval de la libertad de la nueva América se expandirá, atrayendo a amantes de la libertad por todo el país"
 APA_attack_gender_norms: "Atacar las normas de género"
 APA_attack_gender_norms_desc: "Los sesgos socialmente construidos y los estereotipos de género son barreras significativas para la igualdad. Criticaremos rigurosamente dichas barreras mediante diversos medios de comunicación."
 APA_revolutionalize_the_family_unit: "La unidad familiar revolucionaria"
 APA_revolutionalize_the_family_unit_desc: "Una nueva sociedad requiere nuevas formas de organización. Las viejas estructuras familiares serán desmanteladas y reformadas para alinearlas con la mentalidad en evolucion del pueblo en esta nueva era."
 APA_critical_education: "Educación crítica"
 APA_critical_education_desc: "En lugar de la educación anticuada del pasado reaccionario, la nueva educación introducirá la libertad absoluta frente a variedad de prejuicios y eliminará al fin asignaturas que carecen de importancia social."
 APA_american_cultural_revolution: "Nueva sociedad anarquista"
 APA_american_cultural_revolution_desc: "Mediante nuestras formaciones revolucionarias podemos al fin movernos del \"Americanismo\" u oras nacionalidades, puesto que todos los hombres son hermanos, y como hermanos viviremos en paz y harmonía en una nueva sociedad sin clases."
 APA_religion_reimagined: "Religión reimaginada"
 APA_religion_reimagined_desc: "Aunque la religión pueda haber sido usada para entumecer a la humanidad, es en definitiva una creación humana, y puede ser transformada en un componente crucial para crear un nuevo consenso social."
 APA_political_pragmatism: "Pragmatismo político"
 APA_political_pragmatism_desc: "En ocasiones debemos reconocer que el compromiso con la realidad es necesario. De cualquier manera, esto no implica abandonar nuestros ideales, si no lograrlos de una manera aceptada más ampliamente."
 APA_a_liberated_america: "América liberada"
 APA_a_liberated_america_desc: "Hoy, los amantes de la libertad a lo largo de América cantan alegremente, puesto que las cadenas de la opresión han sido completamente destrozadas. Cada Americano es ahora su propio amo, el caos es una cosa del pasado, y un nuevo futuro se alza rápidamente en el horizonte."
 APA_motorized: "Esfuerzo motorizado"
 APA_mechanized: "Esfuerzo mecanizado"
 APA_strike_demands_idea: "Exigencias de la huelga cumplidas"
 APA_strike_ongoing_idea: "Huelga en curso"
 APA_chinese_military_advisors_idea: "Asesores militares chinos"
 APA_production_quotas_idea: "Cuotas de producción"
 APA_the_myth_of_the_white_proletariat_idea: "El mito del proletariado blanco"
 APA_higher_leftist_unity_idea: "Unidad izquierdista excelente"
 APA_high_leftist_unity_idea: "Unidad izquierdista ata"
 APA_medium_leftist_unity_idea: "Unidad izquierdista media"
 APA_medium_leftist_unity_idea_desc: "\n\n\n\n£GFX_APA_leftist_unity_banner\n\n\n\n\n\nA pesar de que la izquierda esté unida en propósito contra las fuerzas de la burguesía, ha habitualmente intercambiado golpes entre ella en una tradición casi tan antigua como la izquierda misma. De todas maneras, en el estado actual el Frente Unido ha permanecido intacto en general, viendo la derrota de todos aquellos que los desean destruidos como el objetivo primario por el momento. Por supuesto, está unidad es movediza en el mejor de los casos, con grandes desacuerdos y discusiones siendo cada vez más habituales entre las facciones de la revolución, pero esto parece estar más o menos bajo control - al menos, por ahora."
 APA_low_leftist_unity_idea: "Unidad izquierdista baja"
 APA_lower_leftist_unity_idea: "Unidad izquierdista colapsada"
 APA_cabinet_crisis: "Crisis de gabinete"
 APA_cabinet_crisis_desc: "\n\n\n\n£GFX_APA_cabinet_crisis\n\n\n\n\n\nEl Frente Unido, formado hace un año durante los espasmos tempranos del experimento Americano, ha hecho bien para prepararnos para la llegada inevitable de la revolución, y aún asi no nos ha preparado para la tarea de determinar exactamente quien formará parte del aparato de gobierno revolucionario. Las organizaciones de partidos pertenecientes al Frente Unido siguen actualmente discutiendo entre ellas para decidir quien debe emprender que rol y como debe hacerlo, absortos en el hecho de que la revolución ha comenzado y como imaginan su   conclusion en lugar de centrarse en la situación actual. Con la falta de un gabinete real o un liderazgo definitivo fuera de los comandantes militantes del EPLA, prácticamente todos los asuntos básicos del Estado - sin hablar de políticas revolucionarias - son prácticamente imposibles de llevar a cabo, dejando las areas bajo nuestro control en un estado de caos y desorganización perpetuas"
 APA_war_socialism_idea: "Socialismo bélico"
 APA_lower_popular_support_idea: "Apoyo popular terrible"
 APA_low_popular_support_idea: "Apoyo popular bajo"
 APA_low_popular_support_idea_desc: "\n\n\n\n£GFX_APA_popular_support_banner\n\n\n\n\n\nA pesar de que luchamos por el bienestar del pueblo, parece que este hecho no ha sido tan bien recibido como nos hubiera gustado. La opinión pública está actualmente resentida con nosotros, sea por las pobres condiciones de los tiempos de guerra o por la subversión de la propaganda reaccionaría. A pesar de que no nos faltan apoyos, un gran numero de personas han expresado su descontento con el Gobierno del EPLA, causando amplias disrupciones en el frente doméstico y dañando la voluntad de la población y nuestros revolucionarios para con el exito de la lucha. Nos vendría bien suplir sus necesidades como podamos"
 APA_medium_popular_support_idea: "Apoyo popular medio"
 APA_high_popular_support_idea: "Apoyo popular alto"

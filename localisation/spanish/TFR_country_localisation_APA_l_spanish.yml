 apla.49.t: "Fin de Hollywood"
 apla.49.d: "Mientras las noticias sobre la brutalidad masiva en la Segunda Guerra Civil Americana inundan el internet, recientemente se ha producido un acontecimiento menos conocido en el territorio del Ejército Popular de Liberación Americano que ha captado la atención tanto de los medios de comunicación americanos como de sus respectivos seguidores.\n\nUn miembro del EPLA conocido como Adam Tahir estrenó una nueva película no oficial llamada \"Grow Up\". En la película aparecen personajes de franquicias tan conocidas como Star Wars, Marvel y Disney, y lo que llama la atención es que la mayoría de los actores de estos personajes están presentes en la película, como Harrison Ford.\n\nLa trama de la película trata de un joven obsesionado con los medios de comunicación de la cultura pop hasta el punto de descuidar sus propias responsabilidades, con el tiempo fue visitado por \"un espíritu revolucionario\" que procedió a mostrar su futuro si seguía en este camino. La película terminaba con todos los personajes, como Mickey Mouse, Spiderman y Iron Man, abatidos a tiros y el hombre podía crecer, un polémico final \"canónico\" para las franquicias de Marvel, Disney y la mayoría de Hollywood.\n\nDisney y Marvel, entre otras empresas, ya han denunciado la película y tratan de borrar todas las instancias de la misma en línea. A pesar de estos esfuerzos, la película se ha difundido por internet y ha sido alabada y odiada por varias razones: Para algunos es una crítica abierta al consumismo de masas, mientras que para otros se considera un ataque directo a la democracia.\n\nAlgunos actores, como Harrison Ford, han expresado su gratitud hacia el EPLA: \"Por fin me he librado de esos personajes de mierda\". La 2ª Guerra Civil Americana continúa y otra rareza del conflicto se ha añadido a los libros de historia."
 apla.49.a: "Una obra maestra."
 apla.50.t: "Maupin derrocado por el Comité Central"
 apla.50.d: ""
 apla.50.a: "Jackson Hinkle es elegido próximo secretario general."
 apla.50.b: "El Comité Central asume el control directo."
 apla.51.t: "De gángsters a revolucionarios"
 apla.51.d: "Santa Rosa ha caído finalmente, y aunque la batalla por la ciudad se había prolongado durante varios largos días, los combates terminaron abruptamente una vez que nuestras fuerzas alcanzaron el centro de la ciudad, la razón es que, junto a sus lugartenientes, el jefe de la Familia Guerrillera Negra, Tavon White, se rindió pacíficamente y sin oponer resistencia. Esto fue una sorpresa para nuestros soldados, ya que la banda había estado luchando con uñas y dientes resistiendo nuestro avance, pero una vez bajo custodia el Sr. White pidió hablar con un oficial. El oficial con el que habló envió el mensaje del Sr. White al alto mando del ejército; el mensaje era una oferta de lealtad y servicio del BGF a cambio de un indulto total de todos los miembros de la organización.\n\nEsto ha causado un gran revuelo en el alto mando, ya que los oficiales leales a los octubristas o a los anarquistas abogan por la absorción de la Familia Guerrillera Negra en el Ejército de Liberación, viéndolo como una oportunidad para llegar a otros antiguos mafiosos y apoyar los ideales de la antigua Coalición Arco Iris. En el otro lado del debate están los oficiales de los jacobinos y neosocialistas, que ven en la integración de antiguos asesinos y traficantes de drogas un posible factor de corrupción de las fuerzas armadas, que haría tambalear la eficacia de nuestro ejército y su lealtad a la revolución."
 apla.51.a: "La Revolución perdona; perdónenlos."
 apla.51.b: "Gángsters y matones es todo lo que siempre serán."
 apla.52.t: "Agenda revolucionaria jacobina"
 apla.52.d: "Al igual que los jacobinos originales de la §YRevolución Francesa§!, los jacobinos de la Segunda Revolución Americana encarnan el espíritu §Rrevolucionario§! y §Rpatriota§! de la nación. Ahora que están al mando del Ejército Popular de Liberación Americano, los jacobinos buscarán moldear América a su visión: una sociedad socialista, cívica, nacionalista y revolucionaria.\n\nEl movimiento jacobino no rehúye la violencia ni el control estatal para lograr su visión, pero centralizar y remodelar el diverso e increíblemente caótico panorama político no será fácil. Cuanto más se sepa públicamente sobre nuestros intentos de reformar el Gobierno, mayor será el coste de la reforma. Al mismo tiempo, si el poder de los enemigos internos crece demasiado, seguramente nos enfrentaremos a la amenaza de la contrarrevolución. Hay innumerables enemigos, tanto extranjeros como nacionales, que amenazan el poder del presidente Maupin. La Revolución debe ser protegida, y los ríos de América se teñirán de rojo con la sangre de sus enemigos."
 apla.52.a: "¡Por la Revolución Americana!"
 apla.53.t: "Los anarquistas protestan contra el nuevo Gobierno"
 apla.53.d: "Con la reciente elección del nuevo Gobierno en el primer Congreso Obrero Americano de la historia, el fraccionalismo se ha hecho más evidente que nunca. Con el Congreso votando abrumadoramente a favor de mantener la estructura de un estado para llevar a cabo la revolución, la facción anarquista dentro del Congreso Obrero ha pasado firmemente a la oposición.\n\nDenunciando que la propia institución en la que participan es estatista por definición, los delegados anarquistas han emitido una declaración conjunta condenando al Gobierno actual y esbozando una lista de demandas que desean que se cumplan. Entre las demandas se encuentran el aumento de la autonomía regional para las tribus indígenas que viven bajo el dominio militar del EPLA, la descentralización de la estructura de mando mediante elecciones de oficiales, el aumento de la iniciativa concedida a los oficiales y la disminución del control estatal de las empresas colectivizadas.\n\nCooperar con los anarquistas seguramente impulsaría la unidad entre las desunidas facciones de la izquierda y nos permitiría aprobar leyes a un ritmo más rápido, pero también otorgaría a los anarquistas concesiones que les darían mayor poder dentro del Gobierno. Por otro lado, permitir que una oposición minoritaria dicte la política gubernamental seguramente será impopular entre la población en general, además de permitirnos un mayor control sobre los asuntos gubernamentales."
 apla.53.a: "¡Porque la Unión nos hace fuertes!"
 apla.53.b: "Que lloren los anarnenazos."
 apla.54.t: "Huelga de manufactura en Skunk Works"
 apla.54.d: "Los trabajadores de Skunk Works, seudónimo de los Programas de Desarrollo Avanzado de Lockheed Martin en Palmdale, California, se han declarado en huelga, exigiendo mejores salarios y condiciones. Este anuncio dio inicio a las huelgas en múltiples fábricas y centros de investigación en todo el territorio controlado por el Ejército Popular de Liberación Americano, ya que los sindicatos independientes y el Gobierno revolucionario a menudo han estado en desacuerdo entre sí. Los trabajadores del EPLA se han visto obligados a trabajar muchas horas y mal pagadas debido al esfuerzo bélico en curso y a la escasez generalizada.\n\nMientras que muchos en el EPLA se han apresurado a tachar a los huelguistas de fuerzas de la reacción, dado su pasado de fabricación de armas para el complejo militar-industrial, otros se han puesto de su lado, afirmando que los comunistas siempre deben estar del lado de los trabajadores. Con un intenso debate tanto en los pasillos del Congreso Revolucionario como en los foros en línea, es necesario que el Gobierno tome finalmente una decisión.\n\nLos que se oponen a la huelga han criticado las reivindicaciones como poco razonables, ya que al Gobierno le sobra muy poco con toda la financiación y el material disponibles que se destinan a la causa revolucionaria, y por ello abogan por romper la huelga. Aunque romper la huelga puede ser más rentable, sin duda disminuiría la eficiencia de los trabajadores, así como alienaría a otros sindicatos independientes dentro del EPLA. Mientras tanto, acceder a las demandas pondría más presión sobre un sistema económico maltratado por la guerra, pero también aumentaría nuestro apoyo entre los sindicatos independientes."
 apla.54.a: "Aceptar sus demandas."
 apla.54.b: "Aplastar la huelga."
 apla.55.t: "Los anarquistas exigen reformas"
 apla.55.d: "Tras la protesta de la facción anarquista del Gobierno, el caucus anarquista ha presentado una lista de exigencias que deben cumplirse; de lo contrario, los sindicatos alineados con los anarquistas declararán una huelga general. Con este audaz ultimátum ante el Gobierno, la nación se encuentra una vez más en una encrucijada.\n\n	Entre otras cosas, los anarquistas exigen la abolición de la Agencia de Seguridad Socialista, la garantía de los derechos de libre expresión recogidos en la Constitución y la colectivización de las empresas públicas. Aunque estas demandas pueden parecer nobles sobre el papel, la mayoría de los miembros del Gobierno están de acuerdo en que medidas tan duras como la Agencia de Seguridad Socialista deben permanecer para impedir que agentes reaccionarios se infiltren en nuestras fuerzas armadas y en el Gobierno civil, así como para mantener el orden dentro del caos que es la Segunda Guerra Civil Americana. Además, muchos argumentan que una reestructuración económica tan radical durante la guerra interrumpiría las cadenas de suministro de la EPLA, algo que dañaría gravemente el esfuerzo bélico. También se argumenta que acceder a estas demandas permitirá a los anarquistas imponer sus exigencias al Gobierno, independientemente de su propia legitimidad y falta de éxito electoral - esencialmente permitiendo a una facción minoritaria dirigir el Gobierno.\n\nSin embargo, una pequeña facción dentro de los neosocialistas sostiene que los daños que estas huelgas podrían causar al Gobierno superan los riesgos potenciales de acceder a sus demandas. Ciertamente, se puede llegar a un compromiso, y la libertad de expresión -un noble ideal por el que todos los socialistas deberían luchar- debería estar garantizada."
 apla.55.a: "Formar un Gobierno de coalición."
 apla.55.b: "Rechazar sus demandas."
 apla.56.t: "Declaración de los Derechos de los Pueblos de América"
 apla.56.d: "En un anuncio dirigido principalmente a las facciones minoritarias de la Segunda Guerra Civil Americana, el Gobierno del Ejército Popular de Liberación Americano emitió un documento denominado Declaración de los Derechos de los Pueblos de América. Esta declaración general se centra en la autodeterminación de diversos grupos autónomos en los Estados Unidos y en el respeto de los tratados centenarios que los ex-Estados Unidos han violado con los pueblos indígenas de América.\n\nEl documento promete cuatro puntos principales: la igualdad y la soberanía de los pueblos de América; el derecho de los pueblos de América a la libre autodeterminación, incluso hasta la separación y la formación de un estado independiente; la abolición de todos los privilegios y limitaciones nacionales y nacional-religiosos; y el libre desarrollo de las minorías nacionales y los grupos etnográficos que habitan el territorio de Estados Unidos.\n\nEste documento ha tenido una acogida diversa en Estados Unidos y en la comunidad internacional en general. Grupos de derecha como el Gobierno Constitucional Americano y el Frente Patriota utilizan el documento como prueba de que el EPLA intenta destruir a Estados Unidos, mientras que muchos grupos separatistas como los Chicanos, la Nación Navajo y el Ejército de Liberación Negra lo han recibido con entusiasmo. Mientras la lucha por Estados Unidos continúa, muchos se preguntan si este documento cambiará permanentemente el panorama político del país."
 apla.56.a: "Interesante."
 apla.57.t: "Nueva política de Patriotismo social"
 apla.57.d: "El Congreso Obrero Americano ha ratificado una nueva resolución que redefine la postura oficial sobre el patriotismo americano. Reconociendo que la mayoría de la población del país aún se autoidentifica como \"americano\", y la identidad multirracial y multicultural única que ha nacido del crisol cultural americano, la decisión de reconocer la identidad nacional como americano es probablemente fruto del pragmatismo.\n\nLa resolución reconoce que la historia revolucionaria de Estados Unidos ha estado en constante conflicto entre la clase obrera luchadora y antiimperialista y la burguesía reaccionaria que ha gobernado la nación. Aunque el país ha tenido un pasado problemático y violento, la nueva política pretende promover las partes progresistas de la historia americana, desde las luchas obreras de la Edad Dorada hasta la lucha contra el fascismo durante la Segunda Guerra Mundial. Recientes campañas de propaganda han puesto de relieve posiciones socialistas antes ignoradas de personas como el Dr. Martin Luther King Jr. y Hellen Keller.\n\nDenunciando cualquier movimiento separatista como intrínsecamente antiamericano, el Gobierno revolucionario ha estado promoviendo la unidad nacional y la reconciliación entre los habitantes de sus territorios ocupados. Los cuadros del partido de la ciudad han sido enviados al campo en un intento generalizado de reforma cultural y de cambiar los elementos anteriormente reaccionarios del patriotismo americano por un nuevo patriotismo social progresista."
 apla.57.a: "¡Viva la Revolución!"
 apla.58.t: "Agenda revolucionaria octubrista"
 apla.58.d: "Aunque la bandera roja del socialismo se arrió, quizás por última vez en Moscú en 1991, los octubristas se asegurarán de que la llama del socialismo brille con fuerza en los Estados Unidos. Siguiendo el legado de sus homónimos, los revolucionarios que lucharon en la Revolución de Octubre, los octubristas garantizarán que América se convierta en un país socialista, próspero, y sostenible con su agenda centrada en la economía.\n\nConvencidos de que el §Restancamiento económico§! fue uno de los principales factores de la caída del socialismo en el antiguo bloque soviético, los octubristas se asegurarán de que los errores del pasado no se repitan. Si bien los octubristas se centran principalmente en ganar el apoyo del pueblo mediante amplias políticas de bienestar, propiedad obrera y reconstrucción, no dudan en reprimir cualquier oposición contrarrevolucionaria con todo el poder del partido de vanguardia y la dictadura del proletariado. Si bien la transformación económica propuesta por los octubristas suena ideal en teoría, el camino hacia el socialismo será difícil y con muchos obstáculos. Las fuerzas contrarrevolucionarias, la fuga de cerebros y una infraestructura deteriorada impedirán la reconstrucción.\n\n¡Como un fénix rojo que resurge de las cenizas de los Estados Unidos, la llama del socialismo jamás se apagará bajo el liderazgo de los octubristas!"
 apla.58.a: "¡Trabajadores americanos, la emancipación está cerca!"
 apla.59.t: "La Cruz Roja solicita la inscripción"
 apla.59.d: "Tras 2 meses de intensos combates en toda California, que han causado un número inimaginable de víctimas, tanto militares como civiles, la Cruz Roja ha solicitado acceso al territorio controlado por el EPLA. Con ciudades, suburbios y regiones rurales devastadas por los combates, y miles de refugiados desplazados por los intensos combates, el Gobierno se enfrenta a una crisis humanitaria masiva. San Francisco, la ciudad más grande actualmente bajo control del EPLA, ya tenía un problema de vivienda, pero con los miles de personas que han huido a la ciudad como bastión de la estabilidad antes de la guerra, parece que la ciudad está al borde del colapso social completo, pues ya han empezado a formarse barrios marginales en las afueras de la ciudad.\n\nEstas barriadas se caracterizan por carecer de agua potable y ser focos de enfermedades, algo que ha preocupado mucho a los observadores internacionales. Por ello, la Cruz Roja ha presentado una solicitud formal pidiendo el envío de trabajadores humanitarios a la zona para ayudar a paliar la crisis y proporcionar a la zona los suministros que tanto necesita. Aunque la Cruz Roja es una organización americana, muchas de sus filiales internacionales han expresado su firme deseo de ayudar.\n\nAunque permitir la entrada de la Cruz Roja en nuestro territorio ayudaría sin duda a paliar la crisis que se avecina, toda la situación sería embarazosa tanto para la legitimidad del Gobierno como para el esfuerzo bélico. La información sin restricciones por parte de los trabajadores humanitarios podría permitir la difusión de mentiras en el extranjero y obstaculizar los intentos de obtener el reconocimiento internacional."
 apla.59.a: "Permitir la entrada."
 apla.59.b: "Entrada denegada."
 apla.60.t: "Operación Chocolate Mint"
 apla.60.d: "Hoy, el Ejército Popular de Liberación Americano ha anunciado el comienzo de una ofensiva sobre el estado secesionista de Cascadia, en un intento de devolver el estado secesionista al control de Sacramento. Los combates han estallado a lo largo de la frontera entre California y Oregón, mientras los aviones del EPLA lanzaban ataques contra las principales ciudades de Cascadia, como Portland y Seattle. Aunque Cascadia es un estado no reconocido internacionalmente, funcionarios del Ministerio de Asuntos Exteriores de Cascadia han emitido un comunicado en el que hacen un llamamiento a la comunidad internacional para que condene la barbarie del EPLA, calificando la lucha como una lucha contra las hordas del bolchevismo.\n\n Por su parte, el Comité Central del EPLA ha declarado que la tolerancia cascadiana hacia los elementos fascistas del país -sobre todo los que defienden la idea de la Iniciativa de Defensa del Noroeste- es inaceptable, y que la operación pretende pacificar una región inundada de nazismo y fascismo."
 apla.61.t: "Revuelta en Portland"
 apla.61.d: "Después de muchos meses de negociaciones fallidas con el Congreso Obrero con sede en San Francisco, que en su mayoría han ignorado varias demandas anarquistas, los escalones anarquistas militantes del Ejército Popular de Liberación Americano finalmente se han amotinado y han tomado el control de Portland y muchas regiones costeras circundantes del noroeste del Pacífico. La posibilidad de una revuelta de este tipo, aunque no es vista como una imposibilidad por el Alto Mando del EPLA (se han producido levantamientos anarquistas similares contra las fuerzas comunistas a lo largo del siglo XX), ha sido un shock para muchos.\n\nEl levantamiento comenzó aparentemente de la nada, con los sindicatos anarquistas alineados y las unidades de EPLA en todo el área metropolitana de Portland tomando repentinamente el control de muchas ciudades y pueblos y declarando el comienzo de una nueva revolución anarquista que no cederá ni se comprometerá con los \"capitalistas totalitarios del Estado\". Muchas unidades no anarquistas del EPLA en la región han sido rodeadas y desarmadas, con algunas rindiéndose pacíficamente y otras resistiendo, con informes de tiroteos y escaramuzas en toda la costa noroeste del Pacífico.\n\nEl alto mando del EPLA ya ha anunciado que el Levantamiento Anarquista no es más que una contrarrevolución instigada por los Federalistas con el único propósito de destruir la Revolución Socialista Americana mediante luchas intestinas. Múltiples brigadas ya han sido trasladadas al norte para reprimir el levantamiento, y ya están llegando informes de las atrocidades cometidas por ambos bandos. Parece que el futuro del experimento revolucionario en la Costa Oeste de América es incierto."
 apla.61.a: "¡Traidores contrarrevolucionarios!"
 apla.62.t: "Se evita la revuelta anarquista"
 apla.62.d: "Aunque estaban enfrentados y furiosos, ahora han aceptado la realidad"
 apla.62.a: "La estabilidad regresa a nuestro Gobierno."
 apla.63.t: "Formación del Ejército de Liberación"
 apla.63.d: "A medida que nuestro movimiento se extendía por partes de la Costa Oeste y aumentaba el número de ciudadanos que se declaraban orgullosos de formar parte de nuestra gran nación, se celebró una reunión de emergencia del recién formado Consejo de Liberación Americana. Se ordenó la creación de un Ejército Nacional de Liberación Americana y se enviaron unidades para organizar a los simpatizantes en los principales centros de población y entrenarlos para una revolución.\n\nSu entrenamiento fue en las duras realidades del combate moderno. Lejos quedaron los días de las interminables columnas de infantería que arrollaban y rodeaban a las bestias fascistas en el frente oriental. No, ahora el combate se basa en una estrecha guerra de armas combinadas. Debemos hacer el mayor uso posible del poder aéreo, y nuestros blindados y fuerzas mecanizadas deben ampliarse enormemente. No queremos lanzar a nuestros hombres a una trituradora interminable de desgaste, esperando ganar sólo metros de terreno a cambio de litros de sangre. Deben luchar de forma más inteligente, no más dura.\n\nExisten muchos enemigos de nuestro movimiento. En los márgenes de la Costa Este existen fanáticos terroristas neofascistas que buscan destruir los ideales americanos de igualdad y libertad para todos. En los pasillos del Capitolio hay instituciones decadentes dirigidas por viejos cadáveres envejecidos que compiten por el poder despótico.\n\nNo toleramos que tales reaccionarios coexistan con nosotros en este continente. Serán expulsados como la plaga que son. Nuestros enemigos, por ahora, son muchos y nuestros aliados son pocos. Pero la marea roja arrasará América. Y su pueblo será libre ahora y siempre."
 apla.63.a: "Nuestro celo es fuerte. Nuestra voluntad es aún más fuerte. ¡Nuestro ejército es el más fuerte!"
 apla.64.t: "La colectivización en acción"
 apla.64.d: "A: Comité Central\nDe: Colectivo San Diego Comuna Distrito 12\n\nAl Comité Central,\n\nHemos progresado mucho en el avance de los derechos de todos los trabajadores dentro del Distrito Central de lo que una vez fue San Diego. Donde antes había edificios de decadencia en forma de bancos de propiedad privada, cadenas masivas de comida rápida, y la mercantilización de recursos humanos básicos como el agua, ahora hay un mejor nivel de vida. Gracias a los esfuerzos de la oficina local del partido, se ha organizado una distribución ordenada de alimentos y agua, desterrando el caos y los saqueos de los primeros meses de la guerra. Muchas pequeñas empresas de la ciudad han sido colectivizadas, funcionando como cooperativas con democracia en el lugar de trabajo, mientras que las empresas más grandes han sido absorbidas por el Gobierno para el esfuerzo de guerra. Hace poco entrevisté a una joven propietaria de una de estas tiendas llamada Ren. Ella fue una de las liberadoras más jóvenes que sirvió en la caída de San Diego ante nuestras fuerzas.\n\nEsta historia y muchas otras son un ejemplo perfecto de nuestro eventual triunfo sobre el capitalismo. Historias de trabajadores que trabajan como esclavos en teclados para sus implacables amos. Trabajan sin descanso durante horas y horas, y por unos céntimos. Esta repugnante y antigua forma de explotación ya no existe en el Distrito.\n\nAunque las condiciones son duras y la abundancia de suministros es limitada debido a la guerra, un renovado optimismo ha invadido la ciudad. Las comunidades que se han forjado juntas en estos tiempos difíciles han fortalecido el espíritu comunitario, y todos trabajan para sí mismos, en lugar de para un señor corporativo sentado en Washington. Vivimos en una era de liberación socialista que emana de cada ciudadano."
 apla.64.a: "Un mundo mejor es posible, pero aún está lejos."
 apla.65.t: "Terror rojo"
 apla.65.d: "Proclama Popular #0038\n\nPOR ORDEN DEL COMITÉ CENTRAL\n\nCon nuestras numerosas victorias contra las fuerzas del capitalismo, es hora de que la justicia revolucionaria caiga sobre los viejos opresores que una vez nos controlaron. A la luz de estos acontecimientos, el Ejército Popular de Liberación Americano declara terroristas a todos los informantes, agentes y asociados de las siguientes organizaciones: La Agencia Central de Inteligencia, la Agencia de Seguridad Nacional, el Buró Federal de Investigación o cualquier miembro de alto rango del Partido Demócrata y del Partido Republicano. Cualquier persona afiliada a estos grupos tiene derecho a ser juzgada en nuestros tribunales con el cargo de Acción Antirrevolucionaria (10 Años de Encarcelamiento), el cargo mayor de Enemigos de las Masas (20-35 Años de Encarcelamiento), y el cargo de Espionaje Ilegal (5 Años de Trabajos Forzados).\n\nHemos considerado que estos grupos no sólo están en contra de nuestra revolución, sino que conspiran activamente contra nosotros. Si queremos derrotar a estos contrarrevolucionarios debemos arrancarlos de raíz.\n\nGracias por su cooperación."
 apla.65.a: "El fuego del socialismo nunca se apagará."
 apla.66.t: "¡Se aprueba la 28ª Enmienda!"
 apla.66.d: "A pesar de ser uno de los países más ricos del mundo, el sistema educativo americano es ridículamente terrible. A pesar de albergar las universidades más prestigiosas del mundo y de publicar miles de artículos cada año, el 54% de los adultos de Estados Unidos tienen un nivel de alfabetización en prosa inferior al sexto grado. Peor aún, la causa de este problema radica en el sistema capitalista americano: el alto coste de la universidad de cuatro años hace que la educación superior sea inalcanzable para la mayoría de los americanos, los profesores mal pagados causados por años de ataques a los sindicatos de profesores han dejado a las escuelas críticamente faltas de personal, y un plan de estudios propagandizado que enseña el excepcionalismo americano, el creacionismo y el anticomunismo tienen a los americanos lamentablemente ignorantes sobre la realidad del mundo en que vivimos. Por ello, la 28ª Enmienda reforma por completo el sistema educativo de Estados Unidos, garantizando una educación universitaria de cuatro años a todos los ciudadanos americanos, el derecho de los profesores a sindicarse y la estatización de todas las instituciones educativas. Pronto quedarán atrás los días en que los ricos podían enviar a sus hijos a escuelas privadas, absorbiendo recursos del hombre común para dar a la joven élite una ventaja injusta en la llamada meritocracia capitalista. El antiguo sistema en el que la financiación de los estudiantes se gestionaba a nivel de condado en función de los impuestos sobre la propiedad, privando a los niños pobres de recursos educativos, será abolido, garantizando a todos los niños la igualdad de acceso a una educación de calidad. Pronto, ¡el estudiante americano será el mejor del mundo!"
 apla.66.a: "¡Que Dios bendiga al EPLA!"
 apla.67.t: "¡Se aprueba la 29ª Enmienda!"
 apla.67.d: "Durante demasiado tiempo, los ideales americanos de libertad se han visto constreñidos por el pensamiento capitalista. ¿Cómo puede uno ser libre para saborear el fruto de la libertad si está muriendo en las calles? ¿Es la libertad la jornada laboral de 9 a 5, trabajando como un esclavo para el próximo yate de tu jefe? La 29ª Enmienda consagra el sistema económico socialista en la Constitución, cumpliendo el ideal original del fundador de garantizar la vida. En concreto, la 29ª Enmienda garantiza el derecho a la vivienda a través de una garantía nacional de vivienda, el derecho a sindicarse, el derecho a la sanidad universal y el derecho al trabajo. Estas garantías son la única manera de asegurar la vida y de que en Estados Unidos se sienta la verdadera libertad. Aunque se trata de elevados ideales que el Gobierno espera alcanzar, nadie puede negar que estos derechos se garantizarán de la noche a la mañana. Sin embargo, todos reconocen que estas libertades dan a millones de personas la capacidad de decidir su propio destino y de trabajar paso a paso para construir nuevas instituciones democráticas que dirijan la economía.\n\nLa segunda parte de la 29ª Enmienda garantiza más derechos económicos al trabajador americano. Mediante la implantación de un tope salarial constitucional, se asegura que ninguna persona de una empresa pueda cobrar más de quince veces el salario del empleado de menor categoría. Las dictaduras laborales que dominaban el trabajo bajo el capitalismo están ahora prohibidas, y los trabajadores tienen derecho a controlar sus propios lugares de trabajo."
 apla.68.t: "¡Se aprueba la 30ª Enmienda!"
 apla.68.d: "Esta tierra es tu tierra se ha cantado en toda la República Socialista de América, pero hasta hoy, ese sueño no se ha hecho realidad. Con la aprobación de la Enmienda XXX a la Constitución, todos los recursos naturales pertenecen oficialmente al Estado y, por extensión, son propiedad colectiva del pueblo. Aunque quedan muchos retos por delante en términos de aplicación, sobre todo en lo que respecta a los derechos sobre las tierras nativas, la enmienda pone fin a la deforestación interminable, la fracturación hidráulica, el vertido de residuos industriales y otras formas de degradación medioambiental llevadas a cabo bajo el anterior régimen capitalista.\n\nSin embargo, el lenguaje impreciso de la enmienda deja una cuestión importante por responder antes de que la enmienda pueda finalmente aplicarse: la cuestión de la propiedad de la tierra. La controvertida vaguedad ha llevado a muchos legisladores radicales a sugerir que la enmienda estatiza efectivamente toda la tierra, y que el nuevo Gobierno debería tomar el control del sector agrícola. Por otro lado, otros legisladores han argumentado que el propósito de la enmienda es colectivizar las industrias minera, maderera y de perforación, no la agricultura."
 apla.68.a: "Expropiar la agricultura."
 apla.68.b: "Añadir la excepción agrícola."
 apla.69.t: "Se aprueba la 31ª Enmienda"
 apla.69.d: "\"La libertad en la sociedad capitalista sigue siendo siempre la misma que en las antiguas repúblicas griegas: libertad para los esclavistas\" - Vladímir Lenin\n\nCon el Partido Comunista de los Estados Unidos de América a la cabeza de la construcción socialista del nuevo Estado, por fin se ha aprobado la última enmienda de la Carta de Derechos Socialistas. A diferencia de la falsa democracia liberal-burguesa, la democracia socialista intenta eliminar la influencia del capital de la democracia, creando una democracia verdaderamente del pueblo, por el pueblo y para el pueblo.\n\nLas tres secciones más importantes de la 31ª Enmienda son las siguientes:\n\n\"Sección 1: La función primordial del Gobierno socialista será planificar y administrar la economía en interés de la clase obrera.\n\nSección 2: Se garantizará la participación y representación en el Gobierno a través de comités organizados democráticamente en el lugar de trabajo, el vecindario y la escuela.\n\nSección 3: Los funcionarios electos del Gobierno obrero recibirán un salario equivalente a la renta familiar media y no gozarán de privilegios especiales\".\n\nAdemás de estas 3 secciones, la 31ª Enmienda también prohíbe el gerrymandering y las campañas financiadas con fondos privados."
 apla.69.a: "¡Gloria al EPLA!"
 apla.70.t: "Teología de la Liberación"
 apla.70.d: "El tema de la religión en los círculos revolucionarios occidentales se ha considerado durante mucho tiempo tabú en el mejor de los casos y hostil en el peor. Dado que Estados Unidos alberga un porcentaje significativo de creyentes en el cristianismo -muchos de ellos considerados los más ardientes reaccionarios-, el tema ha sido recientemente objeto de acalorados debates en el seno del Congreso Obrero. En un esfuerzo por ganar apoyos, las políticas encabezadas por el Centro de Innovación Política para conciliar esta oposición histórica han empezado a dar sus frutos.\n\nTras varias reuniones entre funcionarios del CPI y el clero actual, se han promulgado una serie de políticas a favor de la iglesia; en muchas ciudades y pueblos se han puesto en circulación medios de comunicación y panfletos informativos que comparan la lucha y los ideales de Jesucristo no sólo como compatibles, sino en directa consonancia con la visión marxista del mundo. Diversas obras literarias, círculos de debate y el estímulo general de figuras gubernamentales e iglesias han estado a la vanguardia de este esfuerzo por explorar la naturaleza de la espiritualidad y su conexión con la acción revolucionaria, citando fuentes bíblicas que predican los males de la riqueza y la desigualdad y presentan la idea de que el capitalismo en su conjunto se opone a las enseñanzas de Cristo.\n\nComo resultado del repentino acercamiento y participación del Gobierno en las actividades eclesiásticas, un número cada vez mayor de sacerdotes, pastores y otros miembros del clero han comenzado (aunque con algún ligero \"estímulo\") a respaldar la plataforma del IPC, predicando los ideales de la revolución a su rebaño. Gracias a ello, muchos feligreses, trabajadores rurales y antiguos reaccionarios se han ido acercando poco a poco a los ideales jacobinos, apoyando sus esfuerzos por preservar su fe. Aunque no todos se dejan influir por el Evangelio Social, estas fuentes de oposición han hecho poco por impedir el lento aumento de la asistencia a la iglesia entre la población."
 apla.70.a: "Jesús nos dijo que construyéramos el cielo en la Tierra, Marx nos enseñó cómo."
 apla.71.t: "Agenda revolucionaria neosocialista"
 apla.71.d: "A diferencia de los jóvenes idealistas que conforman gran parte de las bases del EPLA, los neosocialistas saben que no deben creer que una América estable se pueda construir solo sobre ideales, esperanzas y sueños. La nación se encuentra azotada por la guerra, plagada de muerte y destrucción sin precedente: sus ciudades arrasadas, su gente hambrienta y pobre, y décadas de propaganda anticomunista de la Guerra Fría arraigadas en sus mentes. La idea de que el viejo orden pueda simplemente descartarse, su historia ignorarse y reescribirse, y su legado olvidarse es simplemente absurda. En cambio, los neosocialistas argumentan que el nuevo Estado Socialista debe construirse sobre los cimientos establecidos por los ex-Estados Unidos. A diferencia de la ortodoxia izquierdista típica de las otras facciones, los neosocialistas ven que la única manera de que el socialismo sobreviva es reformando las viejas instituciones, preservando la Carta de Derechos, la Constitución y los ideales de la antigua América para mantener vivo el legado del republicanismo en el país.\n\nEl socialismo no se impone con mano dura, sino con compasión, paz y comprensión. Aprenderemos lecciones de la Primavera de Praga y otros experimentos marxistas-humanistas del pasado. ¡El cálido abrazo del socialismo pronto se sentirá de costa a costa!"
 apla.71.a: "¡Por una América más justa!"
 apla.72.t: "Agenda revolucionaria anarquista"
 apla.72.d: "Durante demasiado tiempo, el nombre del socialismo ha sido arrastrado por el fango por dictadores totalitarios, capitalistas de estado y oportunistas. Pero ahora, con la facción anarquista al frente del Gobierno del EPLA, parece que ese día finalmente ha llegado a su fin. Con los anarquistas al frente de la revolución, la pasión revolucionaria seguirá rugiendo hasta que toda reacción sea aplastada bajo la bota de las masas. Toda jerarquía debe ser destruida antes de que la revolución pueda ser terminada, desde el complejo industrial penitenciario que ha explotado a la población afroamericana para obtener billones de dólares de ganancias, hasta los puestos de trabajo verticales que han llevado a condiciones desmoralizantes en las corporaciones.\n\nCon la esperanza de borrar al Estado de la historia, cada persona tendrá voz y voto en el Gobierno, creando finalmente un país del pueblo, por el pueblo y para el pueblo.\n\nSin embargo, a pesar de su ardiente pasión, la abolición del Estado no será fácil. Debido a la gran variedad del movimiento anarquista, compuesto por todos, desde anarcocomunistas tradicionales hasta sakistas y cibernihilistas, el faccionalismo seguirá siendo un problema. Si el faccionalismo se vuelve demasiado problemático, los sakistas radicales tomarán las riendas del poder, posiblemente llevando a los ex-Estados Unidos a un futuro mucho más turbulento. A pesar de las dificultades, ¡no hay mejor momento para la revolución total que ahora! ¡Proletarios del mundo, uníos!"
 apla.72.a: "¡No tienes nada que perder salvo tus cadenas!"
 apla.73.t: "El éxodo suburbano"
 apla.73.d: "Con la Segunda Revolución Americana haciendo estragos desde hace unos meses, cientos de miles de americanos se han visto desplazados por la violencia, y muchos han acudido a las ciudades con la esperanza de encontrar protección. Aunque podemos proporcionar asilo, la seguridad es difícil de conseguir en estos tiempos difíciles.\n\nLos grupos del Congreso Obrero se han esforzado por adoptar dos medidas principales:\n\nEl primer curso es enviarlos de vuelta al campo para que trabajen, aunque esto podría estimular nuestra industria bélica disgustaría mucho al pueblo. Sin embargo, tal vez haya que tomar medidas tan terribles para la seguridad de nuestro futuro.\n\nLa segunda línea de acción es dedicar más recursos a la construcción de campos de refugiados para que puedan tener un hogar temporalmente con la esperanza de que se marchen más adelante. Muchos se han burlado de este plan porque malgasta nuestros valiosos recursos, que el ejército necesita desesperadamente, pero con una población general más segura. Escucharán nuestro pensamiento revolucionario y serán más activos en nuestro sistema político."
 apla.73.a: "Envíelos a las granjas del campo."
 apla.73.b: "Deben tener seguridad y protección."
 apla.74.t: "Tirar los dados"
 apla.74.d: "Alex aún recuerda cómo veía Las Vegas de niño: los grandes casinos y los fascinantes hoteles dejaban al joven Alex asombrado. Así es como Alex veía Las Vegas, el pináculo del capitalismo americano, un motivo para estar orgulloso de Estados Unidos. Luego, por supuesto, creció. Se metió en política, y entonces vio por primera vez detrás de la fachada. Calles llenas de basura, masas de gente en las calles en una ciudad llena de hoteles vacíos. La ciudad apestaba a explotación, y le repugnaba.\n\n\"¿Qué ha sido del sueño americano? ¿Así es como América trata a sus ciudadanos?\", se preguntaba. Y cuando la depresión azotó los Estados Unidos, él también se vio obligado a salir a la calle cuando los jefes cobraron otro abultado sueldo.\n\nEsa fue una de las muchas razones que le dieron la voluntad de unirse al Ejército Popular de Liberación Americano, sólo para no tener que ver nunca más estas condiciones. Bueno, hoy tenía que hacerlo, sólo una vez más. Cuando sus compañeros finalmente lucharon por las calles de Las Vegas, se encontró cara a cara con condiciones aún peores. Casi todos los edificios estaban ahogados en un humo negro y puro, o llenos de agujeros de bala. Donde antes había gigantescos rascacielos, ahora había tumbas metálicas, acompañadas de escombros y proyectiles de artillería. Echó un vistazo a sus exhaustos camaradas, que llevaban consigo bidones y antorchas y marchaban lentamente hacia el hotel Luxor, símbolo del sistema que tanto despreciaba. Quemará esta ciudad hasta los cimientos; demonios, se asegurará de que no quede nada del pasado, y la reconstruirá, desde la primera piedra."
 apla.74.a: "Derretir los ídolos."
 apla.75.t: "Formación de las Brigadas Juveniles"
 apla.75.d: "Mientras las llamas de la Segunda Guerra Civil Americana envuelven la nación, una nueva generación resurge de las cenizas, con sus corazones encendidos por el fuego de la revolución socialista. Las brigadas juveniles del Ejército Popular de Liberación Americano, que reclutan a jóvenes de todas las clases sociales, se erigen en símbolo de esperanza en un mundo desgarrado por el conflicto. Unidos por el fervor de su causa, abrazan las enseñanzas del socialismo y se entregan a la búsqueda de un mañana mejor.\n\nLos miembros de las brigadas juveniles reciben formación en las vías del socialismo, y sus corazones y mentes son moldeados por los principios de igualdad y justicia. A través del servicio comunitario, aprenden el verdadero significado de la solidaridad y el poder de la acción colectiva. Mientras trabajan en los campos y las fábricas, sus espíritus se templan en el fuego de la revolución, preparándoles para ocupar su lugar en la vanguardia del cambio.\n\nEn un mundo asolado por la guerra, las brigadas juveniles de la facción gobernada por los comunistas son un testimonio del espíritu indomable del corazón humano. Impulsados por el sueño de un futuro mejor, estos jóvenes revolucionarios enarbolan la bandera del socialismo, forjando el camino hacia un mundo donde reinen la esperanza y la justicia."
 apla.75.a: "Fomentar la independencia, la rebeldía y la iniciativa."
 apla.75.b: "Fomentar la lealtad, la cooperación y el servicio."
 apla.76.t: "Naturaleza de la Agencia de Seguridad Socialista"
 apla.76.d: "En medio del caos de la Segunda Guerra Civil Americana, el Gobierno provisional del EPLA se enfrenta a una terrible cuestión. Con la anarquía asolando muchas ciudades y pueblos importantes, innumerables ciudadanos han exigido que la estabilidad vuelva a sus comunidades. Estas demandas deben satisfacerse para garantizar la legitimidad del EPLA a los ojos de la población. Como tal, el principal debate entre el Gobierno provisional es la naturaleza de dicha fuerza: si debe ser una fuerza centralizada, similar a la NKVD o la Stasi, que actúe como espada y escudo de la revolución contra los reaccionarios que pretenden desbaratar y destruir el proyecto socialista, o si deben proporcionarse recursos a las comunidades para que puedan autogobernarse y reforzar sus grupos de autodefensa existentes.\n\nLos partidarios del modelo centralizado destacan las ventajas de la uniformidad de las normas y prácticas policiales, la mejora de la coordinación y la asignación de recursos y un mayor control de las actividades policiales por parte del alto mando del EPLA. Sin embargo, los detractores afirman que este modelo tiene potencial para el abuso de poder, el riesgo de fomentar un clima de miedo y desconfianza entre la población, y dificultades para adaptarse a las condiciones locales y a las necesidades de la comunidad.\n\nPor el contrario, el modelo de policía de proximidad ofrece una mayor implicación de la comunidad y capacidad de respuesta a las necesidades locales, mayor flexibilidad para adaptarse a retos y situaciones singulares y menor riesgo de corrupción centralizada y abuso de poder. Sin embargo, el modelo descentralizado también presenta varios retos, como posibles incoherencias en las prácticas de aplicación de la ley, dificultad para coordinar esfuerzos y recursos entre los distintos grupos de milicianos y falta de supervisión y control centralizados."
 apla.76.a: "Apoyar a las milicias locales."
 apla.76.b: "Apoyar una policía central."
 apla.77.t: "Justicia revolucionaria"
 apla.77.d: "Con el yugo de la opresión capitalista fuera de las espaldas del proletariado americano por primera vez en la historia, muchos han salido a las calles para vengarse de quienes una vez los oprimieron. Muchas casas de antiguos policías fueron incendiadas, los inquilinos apuñalaron a sus antiguos caseros, y el caos revolucionario ha consumido la nación. Sin embargo, este tipo de caos sólo engendra miedo, incertidumbre e inestabilidad, mientras el EPLA intenta establecer un nuevo Estado sobre las cenizas del antiguo. Naturalmente, es necesario determinar si fomentar estos tribunales o centralizar el sistema judicial.\n\nUna opción para el EPLA es alentar a los tribunales revolucionarios, permitiéndoles seguir juzgando a los enemigos de la revolución de forma autónoma. Este enfoque tiene varias ventajas potenciales, entre las que se incluyen el empoderamiento de las comunidades locales y el fomento de un sentimiento de apropiación de la revolución, la agilización del proceso judicial mediante la distribución de la carga de trabajo entre varios tribunales y la posible disuasión de las actividades contrarrevolucionarias mediante la demostración de una justicia rápida. Sin embargo, este tipo de justicia anárquica presenta incoherencias en la aplicación de la justicia, lo que puede dar lugar a errores judiciales o a percepciones de injusticia. Especialmente en zonas con poblaciones minoritarias, a muchos les preocupa que estos tribunales puedan fomentar la división racial.\n\nAlternativamente, el EPLA podría optar por centralizar el sistema judicial, creando una estructura única y unificada para juzgar a los enemigos de la revolución. Este enfoque ofrece varias ventajas, como garantizar la coherencia en la aplicación de la justicia en todos los territorios controlados por el EPLA, mejorar la supervisión y regulación del proceso judicial por parte del alto mando del EPLA y racionalizar el sistema judicial, permitiendo potencialmente una asignación de recursos más eficiente. Desgraciadamente, el sistema centralizado también tiene inconvenientes, como la alienación de las comunidades locales al eliminar su participación directa en el proceso judicial, la posible ralentización del proceso judicial debido a la concentración de casos en un sistema centralizado y el riesgo de que surja un sistema judicial burocrático e ineficaz, que impida la administración de justicia."
 apla.77.a: "Potenciar los Tribunales Revolucionarios."
 apla.77.b: "Crear un sistema judicial adecuado."
 apla.78.t: "Intrusión"
 apla.78.d: "La confusión está hoy en la mente de muchos, ya que anoche, el destacado YouTuber de izquierdas Ian Kochinski, que utiliza el apodo de internet \"Vaush\", fue asesinado mientras invadía un rancho de caballos cerca de su casa. Kockinski, ataviado con un elaborado disfraz de caballo que incluía un traje ecuestre de cuerpo entero, saltó la valla que rodea el Centro Ecuestre de Tacoma a primera hora de la mañana. Rápidamente fue avistado por el propietario del rancho, Dale Williams, que le gritó que se detuviera cuando Kockinski empezó a correr, Williams abrió fuego.\n\n\"Al principio pensé que era un caballo, pero luego me di cuenta de que caminaba erguido\", comentó Williams\". Hay mucha gente así, que intenta llegar a los caballos\" Williams mantuvo su derecho a defender su casa y desde entonces ha sido absuelto de todos los cargos.\n\nLas autoridades no han determinado qué hacía exactamente Kochinski en el rancho, ni por qué iba vestido como una yegua, pero muchos tienen sus teorías, y la novia y la familia de Kockinski han rechazado todas las peticiones de comentarios."
 apla.78.a: "¿Qué demonios?"
 apla.79.t: "Russell Bentley llega con los voluntarios de Dombás"
 apla.79.d: "Poco después del comienzo de la revolución, Russell Bentley, un viejo luchador pro-comunista de las repúblicas pro-rusas del Dombás, anunció sus intenciones de unirse a nuestras fuerzas. Reunió a voluntarios ideológicamente aliados de la LPR y la DPR, y finalmente se dirigió a California.\nProfundamente conservador desde el punto de vista social, como se desprende de su biografía y sus acciones, se inclina hacia la facción jacobina de nuestra coalición revolucionaria, y potencialmente puede convertirse en una poderosa voz en nuestro ejército para su causa."
 apla.79.a: "¡Son auténticos ANTIFA!"
 apla.79.b: "Asegúrate de dar a esos \"comunistas\" los peores barracones."
 apla.80.t: "Hinkle asciende de rango"
 apla.80.d: "Jackson Hinkle, comentarista político reconvertido en comandante, ha ido ganando adeptos con sus temerarios, aunque exitosos, actos en el campo de batalla, y consiguió ganarse cierta popularidad jacobinita entre soldados y diputados, llegando incluso a reunirse personalmente con Caleb Maupin. Ahora se nos presentan las opciones de recompensarle y ascenderle a un puesto de mayor rango, o, para evitar, el posible aumento de popularidad jacobinista ignorarle, y dejarle dirigir los pequeños platones, o enviarle al frente interno."
 apla.80.a: "Debemos recompensar a los comandantes capaces."
 apla.80.b: "Sus conexiones con los jacobinos son demasiado fuertes..."
 apla.81.t: "El futuro de nuestra organización"
 apla.81.d: "Tras el establecimiento de la dictadura popular y el crecimiento del número de miembros del PCI, quedó claro que había llegado el momento de reformarlo para convertirlo en un partido socialista propiamente dicho, pero no podíamos hacerlo solos, debido a la falta de cuadros adecuados y a la amenaza permanente de dañar la Unidad izquierdista dentro del EPLA. Sin embargo, Maupin había evaluado algunas opciones para ayudar a reconstruir nuestra organización en un poder político unificado mucho más fuerte. Una, organizar mítines en los que abracemos el título y el manto del CPUSA, e invitar a figuras que rechazaron el viejo partido debido a elementos revisionistas. Tendremos que ajustar algunas políticas para que funcione. En segundo lugar, concentrarnos únicamente en nuestra mano de obra, puede resultar costoso a corto plazo, pero a largo plazo, será capaz de mostrar una política independiente y a nosotros como una fuerza de voluntad al público americano. La tercera es apelar a las capas más conservadoras de nuestra sociedad, incluso a las que rechazan la actual forma de hacer las cosas, lo que puede hacerse con un poco de populismo y con figuras que hablen bien, de las que tenemos muchas."
 apla.81.a: "¡Somos los verdaderos sucesores del CPUSA!"
 apla.81.b: "Nuestra voluntad y nuestra política nos guiarán hacia adelante."
 apla.81.c: "La unidad de todos los americanos es nuestro objetivo."
 apla.83.t: "El establecimiento de un orden anarquista"
 apla.83.d: ""
 apla.83.a: "Hay rosas, ¡no hay espinas!"
 apla.84.t: "Invitación a la AED"
 apla.84.d: ""
 apla.84.a: "¡Genial!"
 apla.85.t: "En fila"
 apla.85.d: "Howie Hawkins, sindicalista y veterano del Cuerpo de Marines, y candidato perenne a tiempo parcial por todos los rincones de Estados Unidos, era la persona de la que menos se esperaba que entrara en el centro de atención del espacio político de América, especialmente una vez que cayó en las llamas del derramamiento de sangre. Sin embargo, tras los fracasos de su \"filibustero\" de 2020 para la mayoría, en general era necesario que intentara dar otro salto; esta vez hacia la revolución socialista que se aproxima rápidamente. Ideológicamente, es un pionero ecosocialista, que contiene el impulso del anterior espíritu americano envalentonado y resucitado contra los complots globalistas o la Madre Tierra. Sin embargo, con la tarea entre manos de proteger directamente las instituciones democráticas americanas y construir sobre las revoluciones anteriores del pasado, todo viene de la mano para que se una al Congreso Obrero.\n\nAunque no era de esperar, la noticia ha sido recibida con un gran agradecimiento."
 apla.85.a: "Otra ficha que cae en la revolución."
 apla.86.t: "Nuestra lucha carmesí"
 apla.86.desc: "Finalmente ha sido orquestado. Los carniceros del mundo, bárbaros y llenos de tiranía, sólo preocupados por una agenda basada en los principios del capital y los puentes ardientes de la voluntad popular, extinguidos en un ardiente tormento de rabia, por nuestra valiente cruzada roja contra la jerarquía tradicional que sembró las semillas del desorden significativo y la dependencia burguesa.\n\nDe Monterrey a Seattle, la aniquilación de nuestras cadenas es oficial. La burocracia que queda tiembla, azotada por el miedo a la ira de nuestras banderas rojas y nuestras incursiones intensificadas. Ha llegado el momento de cortar de una vez por todas la cabeza de la \"Serpiente Mango\" de Denver, llena de un destino de aniquilar la furia obrera en una oleada de núcleos fanáticos y reaccionarios.\n\nHaremos lo que Mao Zedong y muchos de nuestros antepasados hicieron anteriormente, entre los que son libres: Una larga, brutal, pero legendaria marcha a través de las Rocosas. Nuestra logística está bien sofisticada y la velocidad de nuestro valiente ejército de trabajadores está armada hasta los dientes. Comenzará una guerra popular. La podrida estructura de sus insignificantes fronteras montañosas no es rival para la pura voluntad y armamento de la hoz y la bandera patriótica, ya que aniquilaremos y desfiguraremos el sentido de superioridad de nuestros enemigos.\n\n¡Que se libre una marcha de torrente!"
 apla.86.a: "Ni un paso atrás."
 apla.87.t: "Lazos familiares"
 apla.87.desc: "Raylon Bennett era una estrella en rápido ascenso en el Cuerpo de Oficiales del Ejército Popular de Liberación Americano. Nacido en una empobrecida comunidad negra cerca del condado de Solano, creció con un solo hermano, un hermano y un primo, que era el más cercano a él de su familia con diferencia. Admiraba profundamente a su padre, que estaba en el ejército de EE.UU., y aspiraba a alistarse algún día y luchar por su amada patria, que es como su padre describía a Estados Unidos. Al crecer, sin embargo, fue traicionado en cada esquina por ese mismo país y, con la desaparición de su primo, al que las fuerzas del orden consideraron fugitivo tras lo que él percibió como un esfuerzo de búsqueda perezoso y mal calculado, se radicalizó, uniéndose a la Asociación Socialista del Rifle y, finalmente, al EPLA.\n\nNo se alineó con ninguna de las \"facciones\" preexistentes, aunque detestaba al Ejército de Liberación Negro del sureste por lo que consideraba un nacionalismo mezquino. Su sentido de la camaradería, su liderazgo y sus dotes de tirador le llevaron a ascender rápidamente entre las filas del Ejército y, finalmente, a ser elegido para formar parte del Cuerpo de Oficiales Subalternos. Se le encomendó el mando de la 5ª División de Fusiles a Motor \"Rosa Parks\", que participaría en las batallas de Sacramento, San José y, sobre todo, en la batalla de Los Ángeles. Fueron fundamentales en los enfrentamientos contra las bandas que se habían apoderado de gran parte de la ciudad, llegando a atravesar Inglewood y capturarla.\n\nY allí estaba Bennett, vigilando a un grupo de unos 20 gángsters capturados de la banda Inglewood Family, afiliada a los Bloods. Algunos de los hombres estaban heridos mientras se les arrodillaba en un montículo de hierba, con las manos a la espalda y quitándoles las máscaras por la fuerza. Bennett supervisó aquí a su brigada, preparándose para tomarlos como prisioneros tras consultar con los oficiales superiores. Mientras caminaba por el barrio destruido, no pudo evitar fijarse en la difícil situación de un gángster en particular, que acababa de ser capturado y traído. Se acercó y se quitó la máscara, jadeando:\n\n\"¿Barrell?\""
 apla.87.a: "¿Eres tú?"
 apla.88.t: "La última batalla de Prysner"
 apla.88.desc: "La guerra civil dura ya varios meses, la situación se está volviendo cada vez más jodida para nosotros por momentos, el Segundo Ejército Continental ha conseguido arrinconarnos.\n\nLas fuerzas del Frente Patriota han conseguido rodear nuestro bastión en San Francisco, donde se esconde una de las figuras más prominentes de la organización; Michael Prysner. El Héroe de la Revolución.\n\nJunto con otros combatientes, juró dar la última batalla al fascismo. Tras varios días de lucha, el Frente Patriota decidió cobardemente volar por los aires el edificio donde se encontraban, y los escombros se convirtieron en su tumba. Así ha caído otro héroe de la liberación, su hazaña será inmortal."
 apla.88.a: "Nunca olvidaremos su hazaña."
 apla.89.t: "Venezuela nos invita a la AMP"
 apla.89.desc: "A raíz de nuestra lucha por liberar a América; los anteriores parias y revolucionarios aislados de la lucha de clases han podido volver a sacarse la espina, ya que nos hemos impuesto como el orden verdadero, civilizado y democrático en toda la nación. Así, se nos ha pedido que nos unamos a la \"Plataforma Antiimperialista Mundial\", un grupo impulsado por librar al mundo de las anteriores garras del imperialismo americano y del yugo de la influencia occidental en su conjunto.\n\nSin embargo, factualmente esto puede actuar como un medio para dividir aún más los crecientes escalones de división de la coalición dentro de nuestra propia revolución, ya que parece vehementemente por los intereses sino-rusos, en lugar de la presencia de nuestra lucha inquebrantable contra las hordas del capital. Sin embargo, esto debe ser considerado debido al potencial de que nuestro movimiento se internacionalice aún más y extienda la lucha revolucionaria a una escala global, sin precedentes desde el establecimiento de la Unión Soviética. En consecuencia, habrá que considerar si nos unimos a nuestros hermanos de armas revolucionarios y rompemos las cadenas de un viejo orden; o si nos limitamos a una lucha \"americana\"."
 apla.89.a: "Por supuesto. ¡Gloria a la lucha antiimperialista mundial!"
 apla.89.b: "¿Apoyan a la Rusia imperialista? ¡Nunca!"
 apla.90.t: "Cuestión de organización"
 apla.90.desc: "La creación de una nueva sociedad anarquista en América está amenazada por varias fuerzas reaccionarias ajenas a nuestro Movimiento Popular de Liberación, como resultado de lo cual se plantea la cuestión de la organización política de una nueva sociedad anarquista, esta elección puede afectar al marco en el que se construirá la anarquía en América, su futuro y su presente. Por el momento, tres teorías de organización anarquista prevalecen en las discusiones que podemos adoptar:\n\n-El Plataformismo es una teoría basada en la experiencia de los anarquistas ucranianos durante la Guerra Civil Rusa, cuyo propósito es crear una federación anarquista estrechamente coordinada. Sus principales características incluyen una línea táctica común, un curso político unificado y un compromiso con la responsabilidad colectiva.\n\n-El anarquismo de síntesis es una teoría basada en los principios del anarquismo sin adjetivos, que lucha por la unidad en la diversidad, esforzándose por unir a anarquistas de diferentes direcciones en una única federación. El anarquismo de síntesis fue diseñado para atraer la atención de comunistas, sindicalistas e individualistas. Según el anarquismo de síntesis, una federación anarquista debe ser heterogénea y estar relativamente mal organizada para preservar la autonomía individual de sus miembros.\n\n-El anarcosindicalismo es un modelo organizativo que se utilizó durante la guerra civil española y que sólo reconoce la autoorganización de base y no jerárquica de los trabajadores, por lo que rechaza la participación en órganos de gobierno, así como en partidos políticos y sindicatos obreros jerarquizados. Los anarcosindicalistas creen que los sindicatos de trabajadores deben actuar sobre la base del principio de toma de decisiones por parte de todo el colectivo, a través de asambleas generales sobre el terreno."
 apla.90.a: "Plataformismo."
 apla.90.b: "Sintetismo"
 apla.90.c: "Anarcosindicalismo"
 apla.91.t: "\"Revolución cultural\" Americana"
 apla.91.d: "Recientemente, algunos elementos de nuestro ejército de liberación se han visto en descomposición, esto es especialmente notable cuando nuestras fuerzas armadas entran en varios pueblos y aldeas donde comienza el \"linchamiento\" (manifestado en el robo de los residentes locales y la identificación feroz de los elementos reaccionarios) todo esto se lleva a cabo sin el consenso del tribunal revolucionario debido a su formación factualmente larga.\n\nTodo el mundo está de acuerdo en que hay que ocuparse de los robos a la población local, pero surge otra cuestión: si hay que dar al ejército plena carta blanca para identificar a los elementos reaccionarios potencialmente peligrosos sin reunir el consenso de los tribunales revolucionarios, esto, por supuesto, va en contra de nuestros principios de ayuda mutua, pero también aparecen argumentos de que es la única manera de ocuparse eficazmente de los elementos reaccionarios peligrosos."
 apla.91.a: "Si el proceso no puede detenerse, debemos liderarlo."
 apla.91.b: "¡Hay que acabar con esto!"
 apla.92.t: "Eddie Ligar se marcha para dirigir RPA"
 apla.92.d: "Tras la desaparición del bidenismo, un general jacobino -Eddie Ligar- y una facción leal a los principios jacobinos abandonaron nuestras filas, embarcándose en un viaje revolucionario en uno de los estados rebeldes. Su partida fue acogida con buenos deseos por muchos."
 apla.92.a: "¡Buen viaje, camaradas!"
 apla.93.t: "Virtuosos y malvados"
 apla.93.d: "En la ciudad costera de Palo Alto, California, el comisario Thomas Blackhawk estaba de pie frente a una casa de madera blanca, con su uniforme proyectando una sombra oscura bajo el sol poniente. Desde el interior de la casa llegaba el sonido del llanto de un niño, mientras en el patio varios milicianos armados apuntaban con sus rifles al edificio.\n\n\"¡Su hijo sirve en la Guardia Nacional!\", gritó un miliciano quemado por el sol. \"¡Es el que mató a Big Pete!\".\n\nThomas Blackhawk se volvió, con su herencia cherokee reflejada en la firme mirada que dirigió a los milicianos. \"Es porque nuestro objetivo es acabar con la violencia\", dijo con voz clara y decidida a la vez, \"que no podemos responder al odio con odio. Esta familia no tiene ninguna relación con los crímenes cometidos por su hijo\".\n\n\"Pero, comisario\", intervino otro miliciano, \"¡alguien debe pagar el precio!\".\n\n\"¿Pagar el precio?\" Thomas se acercó al hombre. \"Mis antepasados lo perdieron todo en Oklahoma, pero nos enseñaron a no buscar venganza, sino a preservar nuestra dignidad a través del sufrimiento. Iniciamos esta revolución para crear una sociedad libre de opresión, no para repetir los errores del viejo mundo\"."
 apla.93.a: "Los milicianos se sumieron en el silencio."
 apla.94.t: "Patrulla del Amanecer"
 apla.94.d: "En el crepúsculo de San José, Mandy Zhou y Kim Jun-hee se apoyaban en un Humvee verde oliva, con el sol poniente dorando sus brazaletes de miliciano. \"Tienes razón, la reforma no solucionará el problema de raíz\", dijo Mandy, mirando a lo lejos los imponentes edificios de las empresas tecnológicas. \"Mira estas cosas. Han adormecido el espíritu revolucionario de los trabajadores con opciones sobre acciones y cuotas de gimnasio\".\n\nKim dio un trago a su cantimplora. \"¿Pero no crees que necesitamos un proceso? Mi abuelo participó en los movimientos estudiantiles coreanos. Ese es el problema\", dijo Mandy, señalando el Starbucks de enfrente, ahora convertido en un People's Café. \"Fíjense en esto. Tras décadas de luchas sindicales, ¿qué tenemos? ¿Mejor café y salas de descanso? Estas pequeñas concesiones sólo hacen que la gente se olvide de la verdadera lucha\".\n\n\"Pero la organización es igual de importante\", contraatacó Kim. \"No se puede esperar que la gente derroque todo un sistema espontáneamente. Sin una organización rigurosa, ¿cómo podría triunfar una revolución?\" \"Estoy de acuerdo en que la organización es crucial, pero...\" Mandy empezó a responder cuando unos pasos la interrumpieron: \"Camaradas\", dijo la voz del comisario, \"buena discusión, pero es hora de patrullar\".\n\nAmbos se enderezaron rápidamente y cogieron sus fusiles. Cuando empezaron a patrullar por la ruta designada, no pudieron resistirse a continuar su tranquilo intercambio.\n\n\"Retomemos esto más tarde\", dijo Mandy. \"Me parece interesante tu punto de vista sobre la construcción de una base masiva\".\n\n\"Claro\", respondió Kim con una sonrisa. \"Pero no me llames oportunista la próxima vez\"."
 apla.94.a: "Sus pasos se desvanecen poco a poco en el crepúsculo."
 apla.95.t: "Cooperativa alimentaria"
 apla.95.d: "La sala de reuniones olía a café quemado y sudor rancio. Una pancarta roja torcida - \"Solidaridad para siempre\"- colgaba sobre el estrado del orador. Las sillas plegables rozaban el suelo a medida que entraba el comité, y cada grupo se iba haciendo su propio rincón territorial de la sala como depredadores ansiosos.\n\nLos anarquistas llegaron primero, tirados en el suelo con sudaderas negras rotas y chaquetas vaqueras remendadas. Uno ya había empezado a garabatear un tosco \"círculo A\" en la pizarra, mientras otro pasaba un folleto de bolsillo titulado \"El Estado es tu enemigo\". Un coordinador del PSL se burló abiertamente de esta exhibición, cruzando los brazos sobre una camisa del Che Guevara pulcramente almidonada.\n\n\"Típico\". murmuró el coordinador a nadie en particular. \"Estamos aquí para organizarnos y ellos juegan a pintar con los dedos\".\n\nEl anarquista del rotulador sonrió satisfecho. \"Mejor que adorar a un ruso muerto, puto tankie\".\n\nAntes de que el coordinador pudiera responder, la puerta se abrió de golpe con la delegación de la DSA. \"¡Camaradas!\" Un delegado dijo en voz alta: \"Tenemos que discutir la cooperativa local de alimentos, ¡no hay tiempo para luchas internas!\"\n\n\"¡Revisionistas!\" siseó alguien desde el fondo.\n\n\"¡Cooperativa alimentaria, bah!\", se burló una voz canosa. Los jacobinos habían entrado por fin, ataviados con gorras rojas y chaquetas de bombardero decoradas con hamsic mal photoshopeado. Su líder, que olía ligeramente a aceite de motor, se sentó en una silla.\n\n\"Todo eso es una mierda virgen. Lo que necesitamos\", atronó, señalando con un dedo rechoncho, \"es llevar a la clase obrera al poder. Y la clase obrera necesita acción real\".\n\nLos gritos se convirtieron en un ruido indescifrable, más primario que político. Al otro lado de la sala, uno de los jacobinos hojeaba su teléfono, sonriendo ante un tuit que decía: \"La unidad de la izquierda es cuando todos se odian por igual\".\n\n\"Ah, y los maoístas abandonaron la reunión para levantar la milicia local\"."
 apla.95.a: "Sus pasos se desvanecen poco a poco en el crepúsculo."
 apla.96.t: "Visita a Pekín"
 apla.96.d: "La visita de la delegación del EPLA a Pekín comenzó con apretones de manos rígidos y sonrisas forzadas. Bajo imponentes pancartas rojas, era imposible ignorar a su desparejado séquito, en parte unidad y en parte granada ideológica.\n\nLos anarquistas, vestidos con sudaderas negras y botas de combate, se movían incómodos bajo la atenta mirada de las cámaras. \"Este lugar apesta a burocracia\", murmuró uno de ellos al pasar junto a una marcha de trabajadores meticulosamente coreografiada. Su estado de ánimo empeoró aún más durante una visita a la fábrica, donde vieron a miles de personas trabajar en silencio bajo una estricta supervisión. \"Mira a esos tanquistas, todos mareados por el fascismo rojo...\"\n\nLos jacobinos, por el contrario, estaban entusiasmados. Caleb Maupin caminaba confiado al frente, cruzado de brazos y asintiendo con la cabeza mientras su guía ensalzaba las virtudes del proletariado chino. \"Esto es el futuro\", susurraba, sacando fotos de todos los murales y desfiles. Cuando descubrieron una imponente estatua de Mao, Maupin permaneció inmóvil, con los ojos brillantes de reverencia. \"Esto... es por lo que estamos luchando\".\n\nEl contingente del PSL tenía la expresión neutra de quienes reprimen la crítica. \"Eficaz\", comentó Gloria La Riva tras observar una vasta cadena de montaje, su voz delataba inquietud. \"Pero esta... vigilancia parece... excesiva\". Su preocupación aumentó al pasar por los dormitorios, donde las filas de trabajadores regresaban en silencio a sus habitaciones.\n\nLa delegación de los SDA estaba completamente perdida. Con sonrisas incómodas congeladas en sus rostros, se esforzaban por encontrar su lugar en este mundo extraño. \"Esto es... bonito\", murmuró uno, señalando débilmente un mural maoísta de campesinos cargando hacia la batalla. Un intento poco entusiasta de hablar de los consejos obreros se encontró con miradas vacías y la admiración alegre de un jacobino ante un póster de Deng Xiaoping.\n\nDurante la cena, las tensiones se hicieron más latentes a medida que se alargaban los discursos sobre la \"solidaridad mundial\". Maupin levantó su copa entusiasmado con los anfitriones chinos, mientras los SDA miraba fijamente sus platos, Riva intercambiaba miradas cautelosas y un anarquista pinchaba con inquietud la brillante cabeza de un pato de Pekín."
 states.20.t: "¡Llegan refuerzos armados!"
 states.20.d: "Las llamas de la guerra civil siguen extendiéndose mientras nuestros camaradas armados avanzan hacia la liberación de California. Hemos tenido algunos problemas para hacer frente a la guardia nacional mejor equipada durante un tiempo. Nosotros tenemos los números pero ellos tienen el equipo, sin embargo, hoy eso cambia.\n\nPor la noche nos llegaron noticias de varios tanques que se dirigían a nuestras posiciones, ondeando banderas blancas y anunciando su rendición, resulta que son desertores que han llegado a despreciar al Gobierno de EE.UU. y la lista de atrocidades cada vez mayores de la guardia nacional cometidas contra el pueblo y con ello se llevaron consigo otros tantos tanques de la base militar de Oakland y se dirigieron a nuestro territorio, por supuesto teníamos nuestras sospechas y tras un exhaustivo escrutinio ideológico, la mayoría de ellos han demostrado verdadera lealtad a la revolución y se integraron rápidamente en el ejército popular.\n\nEn cuestión de días la guardia nacional californiana se llevará la desagradable sorpresa de que su reaccionario control sobre la Costa Oeste se habrá acabado, pronto los libertadores blindados aplastarán sus defensas y arrollarán a los que cayeron al suelo como los cerdos que son. Tenemos la oportunidad de convertirnos en un verdadero ejército permanente y la tomaremos con las manos abiertas, sólo entonces podremos llevar adelante la antorcha de la revolución."
 states.20.a: "¡Ya nada nos puede parar!"

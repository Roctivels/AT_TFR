 APA_american_workers_congress_category_desc: "[APA_congress_text]\n\nApoyo total del Congreso: [?APA_support_congress_total_var|Y1%]\nEl apoyo total del Congreso Representa cuanto apoyo tenemos en total de todas las facciones congresionales combinadas. [APA_congress_faction_jacobin_text][APA_congress_faction_octoberist_text][APA_congress_faction_anarchist_text][APA_congress_faction_neosocialist_text][APA_congress_faction_reactionary_text]"
 APA_agency_of_socialist_security_category: "Agencia de Seguridad Socialista"
 APA_agency_of_socialist_security_category_desc: "Para crear una unión más perfecta, debemos tener una agencia de seguridad nacional que pueda ayudar a proteger nuestra nación tanto de amenazas externas como domésticas. ¡De esa manera nació el Ministerio de Información, fundado bajo los principios de internacionalismo sin parangón y pensamiento socialista para todos los Americanos!"
 APA_united_front_category: "Frente Unido"
 APA_united_front_category_desc: "Con el objetivo de combatir a los £APA_reactionary §greaccionarios§! y salvar América de la escoria capitalista decadente, debemos crear y mantener un Frente Unido junto a otros individuos con pensamientos similares. Puede que estos tengan opiniones diferentes ante como continuar la revolución, pero siguen pensando que una debería de ocurrir, y en el estado actual de las cosas, eso es suficiente como para crear un vinculo entre nuestras facciones.\nDe todas maneras, es también posible que sean demasiado diferentes y hayan caido en posiciones revisionistas, lo que no puede ser permitido bajo ninguna circunstancia, y en caso de ocurrir deberian de ser purgados de la faz de la tierra.\nEs nuestro deber dirigir la revolución en América, y es nuestro deber asegurar que todo el mundo en America sigue sus principios."
 APA_spontaneous_revolution_category: "La revolución espontánea"
 APA_revolutionary_economy_category: "Economía revolucionaria"
 APA_revolutionary_economy_category_desc: "Nuestros camaradas en Oriente han sido un aliado controversial - incluso entre la izquierda. Por un lado, son la economía más grande del mundo, con tanto el material como la influencia política necesaria para ayudarnos a recuperar la iniciativa y avanzar hacia el Este. Por otro lado, muchos en nuestras filas sienten que los chinos son oportunistas imperialistas, esperando para manipular nuestra lucha para su beneficio.\n\nDe todas maneras, tenemos la opción de comprar armas, reconocimiento internacional y animar a invertir en nuestra infraestructura y reindustrialización. Como consecuencia, por cada acción, la percepción publica sobre nosotros como \"títeres chinos\" crece. Si la opinión pública llega a ser demasiado baja, corremos el riesgo de ser derrocados. Además, con cada acción, la influencia china en nuestro país crece. Si la influencia china crece demasiado, ellos §Rempezarán a hacer exigencias§!.\n\nInfluencia china: [?ROOT.PRC_influence_var|Y1%]"

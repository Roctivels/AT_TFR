 apla.13.a: "Una ciudad menos..."
 apla.16.t: "Venganza"
 apla.16.d: "Thomas estaba sentado junto a la radio, encendiendo otro cigarrillo mientras esperaba actualizaciones. Detrás de él, otros aviadores se relajaban con el poco tiempo de descanso que tenían, revisando sus teléfonos, fumando o jugando a las cartas mientras la tenue luz del cuarto parpadeaba. La radio cobró vida de repente con un informe del frente.\n\n\"Estamos bajo ataque aéreo... Varios proyectiles impactando...\"\n\nThomas pensó: \"Putos comunistas, ¿a dónde impactaron ahora?\"\n\n\"Solicitamos asistencia, coordenadas 36 N 118 O.\"\n\nThomas se quedó paralizado. Sabía lo que significaban esas coordenadas. Esos bastardos habían golpeado su ciudad natal. Lo que parecía un flujo relajado en la mente de Thomas se detuvo de golpe. \"Mamá, papá, Mary y el pequeño Ben. ¿Están bien? Dios mío, por favor dime que están bien.\" Sus pensamientos frenéticos pronto se tradujeron en rabia, y la rabia se tradujo en acción. Se levantó y caminó con paso firme hacia sus compañeros, llevándose el casco mientras lo hacía. Ellos alzaron la vista de sus teléfonos para ver a Thomas enfurecido y sediento de sangre. Entonces Thomas dijo entre dientes:"
 apla.16.a: "¿Bueno, muchachos, qué les parece una práctica de tiro no programada?"
 apla.17.t: "Gloria La Riva visita a las tropas en el frente"
 apla.17.d: ""
 apla.17.a: "¡Manténganse fuertes, camaradas!"
 apla.18.t: "Resolviendo la crisis del gabinete"
 apla.18.d: "\"Un mundo de propiedad privada nunca podrá ser un mundo libre, y una sociedad basada en clases en guerra no puede sostenerse\".\n\nEugene Debs pronunció esas palabras hace más de cien años, y frente a una multitud de delegados comunistas de todo el país, representantes de un amplio frente de organizaciones de izquierda, fueron repetidas nuevamente en la declaración del Frente Unido. En la declaración de la Segunda Revolución Americana, la presidenta Gloria La Riva, del Partido por el Socialismo y la Liberación, fue elegida como ejecutiva permanente del Ejército Popular de Liberación Americano, formando un gabinete diverso con miembros de distintos sectores de la lucha izquierdista, desde anarquistas hasta los llamados \"socialistas patrióticos\" de la rama jacobina. Aunque el faccionalismo sigue siendo un problema importante dentro del EPLA, se ha llegado al acuerdo de dejar a un lado las diferencias mientras la Revolución continúa con fuerza en la Costa Oeste."
 apla.18.a: "Unidos resistimos, divididos caemos."
 apla.19.t: "Milicianos cortan el agua"
 apla.19.d: ""
 apla.19.a: "¡Dios te maldiga!"
 apla.20.t: "El primer Congreso Obrero Americano"
 apla.20.desc: "Finalmente, tras varias semanas, los delegados de cada partido se reunieron para decidir quién sería el presidente del EPLA durante el resto de la guerra. Deliberaron durante varias horas, discutiendo entre las diferentes facciones y quién encajaría mejor y llevaría a cabo el socialismo con mayor fidelidad y práctica. Tras varias horas, decidieron..."
 apla.20.a: "Elegir a Gloria La Riva."
 apla.20.b: "Elegir a Kimberle Crenshaw."
 apla.20.c: "Elegir a Mark Bray."
 apla.20.d: "Elegir a Caleb Maupin"
 apla.21.t: "Los insurgentes reaccionarios aumentan."
 apla.21.desc: ""
 apla.21.a: "Debemos ocuparnos de esto pronto..."
 apla.22.t: "Desfile de la Victoria en Sacramento"
 apla.22.d: "Los fascistas huyen, los reaccionarios se esconden, los capitalistas cuelgan mientras la ciudad de Sacramento cae en manos de nuestras fuerzas. Hemos luchado duramente por esto, y ahora, mientras los tanques y la infantería marchan por las calles, son vitoreados y recibidos por los muchos pueblos liberados de la ciudad.\n\nNos tomó semanas, pues la Guardia Nacional estaba atrincherada en la ciudad. Llegaron a nuestros oídos rumores de una violencia extrema contra el pueblo, rumores que no solo nos indignaron, sino que encendieron aún más el espíritu de nuestras fuerzas. Sabían lo que estaba en juego, sabían por qué luchaban.\n\nLas celebraciones continúan en Sacramento, y ya se hacen planes para llevar nuestro espíritu revolucionario más lejos, más profundo en el territorio reaccionario. Tuvimos la suerte de que la mayoría del pueblo en la Costa Oeste compartiera nuestro deseo de liberación total. Lamentablemente, no ocurre lo mismo tierra adentro. La lucha se intensificará y habrá más obstáculos, pero el objetivo final es lo que hace que valga la pena seguir combatiendo."
 apla.22.a: "¡La segunda oportunidad del socialismo!"

 apla.26.t: "Fuerzas Especiales Chinas aterrizan"
 apla.26.d: "Una brigada de Fuerzas Especiales Chinas ha aterrizado en Monterey y ha comenzado operaciones independientes contra los milicianos de California. Las comunicaciones por radio han revelado que su comandante se hace llamar \"Long Yi\". Sus números son pequeños, pero han logrado interrumpir las actividades de los milicianos en el norte de California."
 apla.26.a: "Al menos están de nuestro lado."
 apla.27.t: "Un asunto de presidentes"
 apla.27.d: "Andrew miró el maletín de los presidentes y frunció el ceño. Todas las pinturas habían sido tomadas de la Casa Blanca y estaban siendo divididas entre aquellas que serían destruidas y aquellas que se preservarían para ser llevadas a un museo en el oeste. Era su trabajo clasificarlos y posteriormente deshacerse de los que le ordenaran. El entendió y estaba esperando ansiosamente conocer cuales habían sido los afortunados. Estando aburrido, abrió el maletín y miró de arriba abajo la pintura. Parecía que habían sido colocadas en orden inverso pues la pintura de Washington estaba sobre el resto de pinturas. Verdaderamente era una bella obra de arte, las pinceladas fueron hechas con gran maestría, los colores eran agradables a la vista, las luces y sombras fueron hechas con sumo cuidado. Sería una pena, pensó, destruir un retrato tan magnífico. No pasó mucho tiempo para que llegara la orden. Un oficial al mando le dio una larga y fina hoja de papel. En ella había una lista con 45 nombres, pero solo 2 órdenes. \"PRESERVAR\" o \"DESTRUIR\". La lista había sido hecha con los presidentes más recientes al principio, y tuvo que revisar toda la lista para averiguar el destino de Washington. Los presidentes más recientes fueron marcados para si destrucción, al igual que Reagan y todos los presidentes de la Guerra Fría, pero parece que hicieron una excepción para Kennedy. FDR y Teddy Roosevelt también fueron preservados. Todos desde McKinnley hasta Hayes estaban condenados, pero Lincoln y Grant fueron salvados. Él llegó al final de la lista, y para su alivio, Washington había sido marcado con \"PRESERVAR\". Puso la pintura aparte y sacó la siguiente. Era uno de John Adams. El echó un vistazo a la lista y vio que esta había sido marcada con \"DESTRUIR\". Bueno, pensó, de todos modos esta no era tan bonita."
 apla.27.a: "Los vientos del cambio a veces esparcen llamas."
 apla.28.t: "Comisariado de Asuntos Internos | COMMUNIQUE.201"
 apla.28.d: "Nathan Travis - Disparadle en frente de su esposa."
 apla.28.a: "Una separación necesaria."
 apla.29.t: "Normalización de Cascadia"
 apla.29.d: "Comité Central - HOY, el Comité Central del Congreso Obrero Americano anunció el fin de la antigua República Socialista de Cascadia como Estado miembro de los Estados Socialistas Unidos de América como región semiautónoma. Fuerzas blindadas entraron en Seattle sin resistencia, y trotskistas, revisionistas y otros miembros del antiguo gobierno fueron destituidos de sus cargos para garantizar la seguridad del pueblo de Cascadia, ya que la zona se encontraba bajo control militar temporal debido a los numerosos bandidos fascistas que asolaban el campo."
 apla.29.a: "Excelente."
 apla.30.t: "La coalición de izquierda"
 apla.30.d: "Los $APA_jacobin_plural$ surgieron de las realidades materiales de la lucha obrera en los Estados Unidos. Ante la errónea tildación de reaccionario por parte del Gobierno de gran parte del proletariado bajo el EPLA debido a sus visiones sociales, los jacobinos buscan combinar posturas socialmente conservadoras con políticas económicas progresistas. Combinando el §Ypatriotismo americano§! con el socialismo, abogan por políticas socialmente conservadoras bajo la idea de que el progresismo social es de naturaleza neoliberal y corroe los valores preciados de la clase trabajadora.\n\nLos $APA_octoberist_plural$ son un conjunto de grupos §Ymarxista-leninistas§! que operan desde antes de la revolución, como el §YPSL§! y la §YFRSO§!. Al igual que los jacobinos, también aspiran a una §Ydictadura del proletariado§!, con un partido de vanguardia compuesto por comunistas comprometidos ideológicamente que lidere la nación. Si bien la democracia interpartidista existirá mediante el §Ycentralismo democrático§!, el trabajador promedio no tendrá voz directa en el Gobierno, sino que estará representado por funcionarios electos. Sin embargo, a diferencia de los jacobinos, siguen comprometidos con las ideas del feminismo y la liberación LGBT.\n\nLos $APA_anarchist_plural$ son el grupo más radical de todos, y desean una transición inmediata al §Rcomunismo§!, saltándose la etapa del socialismo. Culturalmente, consideran la cultura americana reaccionaria y abogan por una §RRevolución Cultural§! que ataque cualquier elemento de la cultura americana que se considere opresivo. El ala radical-sakaísta del Bloque Negro es §Yposmarxista§! y aspira a la disolución del §REstado colonial§! y a la descolonización completa de los Estados Unidos.\n\nLos $APA_neosocialist_plural$ son comunistas que desean construir el socialismo sobre el actual marco constitucional liberal. En lugar de destruir la constitución actual y redactar una nueva, los neosocialistas aspiran a redactar la §YCarta de Derechos para el Socialismo§!, que añade un marco progresista a la Constitución vigente. Esta garantiza derechos básicos como la atención médica universal, la vivienda garantizada, la seguridad social y los topes salariales."
 apla.30.a: "¡Viva la Revolución!"
 apla.31.t: "Conflictos entre milicias"
 apla.31.d: "El Comité para la Preservación de la Revolución ha tenido conocimiento de que las recientes tensiones entre la \"Brigada Catgirl\" anarquista y el \"Batallón John Brown\" jacobino han escalado hasta convertirse en un tiroteo a gran escala, con la muerte de cuatro miembros en las luchas internas. Si bien ambas unidades han sido puestas bajo arresto militar y se encuentran retenidas en la Base de San Francisco por la policía militar, esto es solo un indicio de un problema mayor.\n\nLa unidad entre brigadas de diversas tendencias ha sido, en el mejor de los casos, tenue, y la efectividad en combate ha estado en su punto más bajo debido a desacuerdos sobre tácticas, organización y objetivos. Si bien incidentes como el ocurrido entre el Batallón John Brown y la Brigada Catgirl son poco frecuentes, su mera existencia ha llevado a muchos a pedir una reorganización militar completa, colocando las fuerzas armadas bajo el mando directo del Comité Central en lugar de la estructura descentralizada actual. Los detractores, por otra parte, temen que una reorganización militar obstaculizaría los esfuerzos revolucionarios y que la atención debe centrarse en la derrota de los reaccionarios que ocupan el resto de los EE.UU."
 apla.31.a: "¡Centralizen el comando!"
 apla.31.b: "¡Culpen a los anarquistas!"
 apla.31.c: "¡Culpen a los jacobinos!"
 apla.31.e: "¡No debemos ser distraidos!"
 apla.32.t: "Reorganización de la Milicia completada"
 apla.32.d: "Después de meses de reforma estructural y organizacional al Ejército Popular de Liberación Americano, las que previamente eran milicias desorganizadas del movimiento comunista han sido reformadas a una verdadera, moderna, fuerza militar. Una estructura de comando organiza se ha puesto en acción, y anteriores oficiales incompetentes con pésimos resultados de combate han sido reemplazados. Los municiones del ejército han sido estandarizadas, y líneas de suministros, equipos de logística y sistemas de comunicaciones adecuados se han establecido. El ejército va a funcionar tan bien como una maquina aceitada, sirviendo a la causa de la revolución en vez de grupos de pequeñas guerrillas individuales. Con el poderío del Ejército de Liberación aumento diariamente, es todo pero inevitable que la bandera roja va a ondear desde el Estado de Washington hasta Washington DC."
 apla.32.a: "La Revolución continua."
 apla.33.t: "Oro Dorado"
 apla.33.d: "Llevar a cabo una revolución es caro: hay que alimentar y armar a los soldados, pagar a la burocracia y comprar lealtades. Los fondos del EPLA han estado funcionando al filo de la navaja, sostenidos por el apoyo chino, venezolano y cubano, y enfrentándose a un descontento civil cada vez mayor debido a los elevados impuestos necesarios para mantener el EPLA en funcionamiento.\n\nDentro del Comité Central se ha susurrado una propuesta. Con la destrucción de varios cárteles de la droga en el territorio recientemente liberado, existía una gran demanda de drogas como la cocaína, las metanfetaminas y la heroína. En ausencia de los cárteles y las bandas, se ha empezado a formar una economía sumergida, completamente libre de impuestos por parte del EPLA, peligrosa y no regulada. Los anarquistas han presentado una propuesta que pide la legalización de todas las drogas, alegando el derecho del individuo a elegir. Impulsada con un compromiso de los octubristas, el Gobierno del EPLA tendría la capacidad de controlar la venta y distribución. Los partidarios del proyecto de ley han citado los beneficios para la economía, ya que los beneficios del tráfico de drogas pueden utilizarse para apoyar la economía en dificultades. Sin embargo, los neosocialistas y los jacobinos han formado una oposición unida. Los primeros citan la destrucción del tráfico de drogas en las comunidades negras e indígenas, acusando a los partidarios del proyecto de ser \"pseudorreaganistas que desean introducir crack en las ciudades como la CIA\", y los segundos califican las drogas de \"opiáceo literal de las masas\", citando cómo el trabajador ideal no era el de la pereza hedonista, drogado constantemente, sino el sobrio que trabajaba para su comunidad."
 apla.33.a: "Aceptar el presupuesto."
 apla.33.b: "Rechazar el presupuesto."
 apla.34.t: "Rol del poder ejecutivo"
 apla.34.d: "Una de las primeras cuestiones que se plantean al redactar la nueva constitución de la Segunda Revolución Americana es el papel del ejecutivo. Se han planteado tres propuestas principales, un tema que divide a todas las facciones políticas.\n\nLa primera propuesta consiste en ampliar el poder del ejecutivo. Los partidarios de esta medida suelen ser en su mayoría jacobinos y octubristas, con algunos neosocilacionistas radicales mezclados. Mientras que a muchos de sus detractores les preocupa que un ejecutivo poderoso pueda provocar la formación de una dictadura como ocurrió en países como Corea del Norte o la URSS, sus defensores afirman que un líder fuerte es necesario para momentos en los que hay que tomar decisiones difíciles. Con el fuego de la revolución ardiendo por toda California, se necesita un líder fuerte que guíe al país hacia su futuro rojo.\n\nLa segunda propuesta es la presentada principalmente por los neosocialistas y algunos octubristas, que afirman que los poderes del ejecutivo deben seguir siendo los mismos que los de la constitución americana original. El problema del sistema capitalista no eran sus poderes presidenciales, sino el poder de Wall Street. Un presidente controlado por el Congreso Obrero, pero con poder para aprobar o vetar leyes, parece ideal y debería mantenerse. Ir demasiado lejos en cualquiera de los dos sentidos alteraría los cuidadosos controles y equilibrios que sirven de base a la democracia americana. Sin embargo, los opositores dicen que continuar con los sistemas del pasado hace que la revolución no tenga sentido, y que están abocados a repetir los errores del pasado.\n\nEn definitiva, la propuesta anarquista es despojar al ejecutivo de la mayor parte del poder, si no de todo, y transferirlo al Congreso Obrero. Argumentan que la idea misma de un líder va en contra de los ideales comunistas, ya que ningún hombre debe tener poder sobre otro. El país debe ser dirigido colectivamente por su pueblo, ya sea a través de la democracia directa o representativa. Al igual que los demás, también tiene muchos detractores, la mayoría de los cuales argumentan que dejar un ejecutivo con tantas fugas provocaría interminables luchas internas en el Gobierno y un estancamiento de las políticas, así como la ausencia de una figura que guíe a la nación."
 apla.34.a: "Poder ejecutivo ampliado."
 apla.34.b: "Poder ejecutivo limitado."
 apla.34.c: "Un Ejecutivo mascarón de proa y transferencia de poder al Congreso."
 apla.35.t: "Rol de la Corte Suprema"
 apla.35.d: "A lo largo de la historia de los Estados Unidos, el Tribunal Supremo ha sido simultáneamente una de las instituciones más progresistas, impulsando los Derechos Civiles a lo largo de los años 60 y 70, mientras que en otras ocasiones ha sido una institución reaccionaria que ha limitado las reformas y fortalecido el sistema capitalista. Sobre el papel, el Tribunal Supremo es una parte valiosa del delicado sistema de controles y equilibrios que mantiene unida la democracia americana, pero durante la presidencia de Trump mostró una peligrosa capacidad para ser subvertido por los elementos de la reacción. Ahora, con la reconstrucción de la Constitución, los legisladores deben decidir de nuevo el papel del tribunal.\n\nUna inesperada coalición de anarquistas y jacobinos se ha formado con el fin de abolir el Tribunal Supremo, calificando la idea de una tríada de jueces no elegidos que deciden el destino de millones de personas como antidemocrática en su esencia misma. Han abogado firmemente por la abolición del tribunal y por trasladar más poder a los órganos legislativos, ya sea el Congreso Obrero o las repúblicas concejales locales. Aunque la abolición del tribunal puede mejorar la representación popular y permitir una aprobación más rápida de las políticas, a los opositores les preocupa la posibilidad de que la falta de supervisión judicial pueda llevar a una subversión del proceso democrático. Por otro lado, los neosocialistas y los octubristas han defendido que el tribunal debe seguir existiendo, aunque con reformas para proteger el sistema de la subversión de los enemigos del proletariado."
 apla.35.a: "¡Poder para el pueblo! ¡Muerte a los tribunales no elegidos!"
 apla.35.b: "¡La revisión judicial es necesaria para la democracia!"
 apla.36.t: "Mecanismos electorales"
 apla.36.d: "El siguiente paso para solidificar la revolución es la creación del mecanismo en el que el pueblo estará representado en el Gobierno. Como una de las cuestiones que más divide al Ejército Popular de Liberación Americano, han surgido cuatro propuestas diferentes.\n\nLa primera propuesta está encabezada por los Anarquistas, que favorecen la votación de políticas directamente a través del pueblo. Mientras que los legisladores del Congreso Obrero seguirán redactando y proponiendo leyes, las votaciones finales sobre ellas las hará el pueblo. Especialmente con la introducción de internet, la votación puede hacerse más rápida y fácilmente que nunca, asegurando al mismo tiempo que toda la población esté representada.\n\nLa segunda propuesta es la del sindicalismo: que en lugar de la representación por proximidad geográfica, la votación se haga a través de representantes sindicales. La votación de los representantes se realizaría entre los sindicatos, que tendrían cada uno una representación proporcional en función del tamaño de sus respectivos ámbitos.\n\nLa tercera propuesta es presentada principalmente por los neosocialistas y los octubristas, que sostienen que una votación popular elegiría a los representantes en función de la zona geográfica, que luego pasarían a formar parte del Congreso Obrero. Aunque este sistema funcionaría de forma similar al antiguo sistema de votación de los Estados Unidos, se aprobarían importantes reformas electorales, como las victorias por mayoría simple, los candidatos financiados con fondos públicos, la declaración del Día del Voto como fiesta nacional y el fin de la manipulación de los distritos electorales.\n\nPor último, la propuesta presentada por los jacobinos y varios octubristas pretende imitar el sistema de China, donde las elecciones sólo se celebrarían a nivel de condado. Los funcionarios elegidos podrían ascender en la burocracia si obtienen buenos resultados, lo que permitiría una meritocracia burocrática para garantizar una gobernanza óptima."
 apla.36.a: "Democracia directa."
 apla.36.b: "Representantes sindicales."
 apla.36.c: "Elegidos entre el público en general."
 apla.36.e: "Ascender a través de la burocracia."
 apla.37.t: "Membresía de sindicatos"
 apla.37.d: "La última cuestión que se responderá en el Congreso Obrero es el lugar de los sindicatos dentro de la revolución. Dado que los sindicatos han sido una fuerza que históricamente ha hecho avanzar la causa socialista, la integración del sindicalismo en el EPLA formará una base sólida para calibrar la economía y proteger los derechos de los trabajadores.\n\nDebido a las condiciones de los tiempos de guerra, una coalición de octubristas y jacobinos ha propuesto que todos los sindicatos sean patrocinados oficialmente por el Estado. Argumentan que, en un sistema socialista, el partido debe ser el principal medio de representación de los trabajadores, y los sindicatos deben ser los órganos en los que el partido pueda organizar la economía. Aunque esto aumentará la eficacia de la economía, a muchos les preocupa que no se protejan los derechos de los trabajadores sin sindicatos independientes.\n\nPor otro lado, los neosocialistas y los anarquistas argumentan que los sindicatos independientes son la única forma de proteger los derechos de los trabajadores. Les preocupa que los trabajadores estatales no luchen contra la economía estatal para mejorar las condiciones de sus trabajadores, por lo que es necesario que existan órganos de poder obrero independientes del Estado. Sin embargo, a sus detractores les preocupa que los sindicatos independientes puedan ser subvertidos por elementos anticomunistas."
 apla.37.a: "Sindicatos estatales obligatorios."
 apla.37.b: "Permitir sindicatos independientes."
 apla.38.t: "Constitución provisional del EPLA"
 apla.38.d: "Artículo 1: El Ejército Popular de Liberación Americano es una dictadura del proletariado provisional dirigida por la clase obrera y basada en una alianza de todos los pueblos trabajadores. El sistema socialista es el sistema básico del EPLA. Se prohíbe la perturbación del sistema socialista por cualquier organización o individuo.\n\nArtículo 2: Todo el poder en el Ejército Popular de Liberación Americano pertenece al pueblo. El Congreso Obrero Americano y los consejos locales a nivel de ciudad, condado y estado son los órganos en los que el pueblo ejerce el poder político.\n\nArtículo 3: La base del sistema económico socialista del Ejército Popular de Liberación Americano es la propiedad pública socialista de los medios de producción, es decir, la propiedad de todo el pueblo y la propiedad colectiva de los trabajadores. El sistema de propiedad pública socialista sustituye el sistema de explotación del hombre por el hombre; aplica el principio de \"de cada cual según su capacidad, a cada cual según sus necesidades\"\n\nArtículo 4:..."
 apla.38.a: "¡Que nuestro paraíso socialista dure 10.000 años!"
 apla.38.b: "Ampliar la Constitución para proteger las libertades personales."
 apla.42.t: "Milicia del Estado de California \"evacua\" poblaciones"
 apla.42.d: "Durante el avance del Ejército Popular de Liberación Americano en California, la resistencia ha variado, desde carteles de la droga y pandillas carcelarias hasta remanentes del Gobierno estatal y unidades de la Guardia Nacional. Uno de los opositores más feroces del EPLA ha sido la Milicia del Estado de California, que ha priorizado específicamente la destrucción de los comunistas a cualquier precio. Ante la pérdida del control del Gobierno estatal sobre grandes extensiones de tierra en el norte de California, la milicia ha intervenido como fuerza para estabilizar la región.\n\nRecientemente, tras tomar el control de la región, la Milicia del Estado de California decidió \"evacuar\" a casi toda la población del condado costero de Humboldt, en el noroeste de California, durante una ofensiva en curso del EPLA. La Milicia afirma haberlo hecho para proteger a los civiles de la región y niega cualquier acusación en contrario. Sin embargo, tanto la EPLA como los observadores internacionales condenaron la acción, calificándola de deportación forzosa y genocidio contra minorías e izquierdistas, dado que la costa noroeste de California es mayoritariamente de izquierda y alberga una alta población minoritaria. La EPLA incluso llegó a sugerir que se había deportado a la población a campos de exterminio en las profundidades de la Sierra Nevada, aunque faltan pruebas al respecto. Independientemente de los detalles exactos, el suceso sin duda provocará mayores niveles de violencia política y étnica en toda California y la Costa Oeste en su conjunto, ya que militantes de izquierda podrían buscar vengar el incidente atacando a la población civil de derecha con actos similares."
 apla.42.a: "Se hunden en la barbarie."
 apla.43.t: "Informe: Saqueo bajo la AO 73 RR"
 apla.43.d: "Me complace informar que el 73º Regimiento de Fusileros ha estado de muy buen ánimo después de apoderarse de la región de California conocida como \"Silicon Valley\" de los multimillonarios y los cerdos fascistas que los defendían, y con muy pocas bajas. No sólo eso, sino que los hombres y mujeres de nuestras unidades parecen entender plenamente la lucha ideológica en la que estamos involucrados, y que el futuro no sólo del movimiento socialista, sino el de la humanidad depende de la unidad de nuestra causa. Sin embargo, he notado que muchas de las compañías del regimiento han comenzado a saquear libremente grandes cantidades de riquezas de las casas y oficinas de los multimillonarios que han caído bajo nuestro control.\n\nSi bien admito que hay cierta justicia poética en que nuestros valientes combatientes se apoderen de la riqueza que estos fascistas han exprimido al pueblo, también entiendo que la riqueza pertenece al pueblo en general, no sólo a los soldados individuales. Existe el peligro de que si permitimos que el saqueo quede impune, parezcamos nada menos que un ejército de bandidos y ladrones comunes, que Esto dañaría gravemente la credibilidad de nuestra lucha a los ojos de la población. Por otra parte, detener este saqueo ayudaría mucho a la imagen de nuestro ejército ante la población y probablemente aumentaría la cantidad de personal que podemos reclutar. Sin embargo, esto potencialmente dañaría el esfuerzo de guerra en sí, ya que podría reducir la moral de nuestros hombres y reducir nuestra efectividad en el combate.\n\nEl comandante del regimiento está dispuesto a poner fin al saqueo si se considera necesaria una acción de este tipo. Ha discutido conmigo el uso de la flagelación para castigar a los infractores posteriores y el exilio a batallones penales o campos de trabajo para los reincidentes. Me ha pedido personalmente, en mi calidad de comisario del regimiento, que escriba un informe describiendo este comportamiento y las posibles consecuencias, para que el alto mando pueda tomar una decisión adecuada al respecto."
 apla.43.a: "El botín es para los vencedores."
 apla.43.b: "La riqueza es propiedad de las personas a las que se robó."
 apla.44.t: "El saqueo de Beverly Hills"
 apla.44.d: "Beverly Hills ha sido durante mucho tiempo conocido en todo el mundo como un centro de inmensa riqueza, decadencia y cotilleo. Parece que esa reputación ya no se mantendrá, ya que el Ejército Popular de Liberación Americano, en su avance, se ha apoderado finalmente del famoso barrio tras un breve periodo de intensos combates. El barrio ya estaba gravemente dañado por los proyectiles de mortero y artillería de las fuerzas del EPLA, así como por los tiroteos que se produjeron en el propio Beverly HIlls, pero el EPLA ha causado aún más daños tras capturarlo. Muchas de las casas han sido profanadas con imágenes comunistas y pro-EPLA, así como anticapitalistas, y las fuerzas comunistas han confiscado grandes cantidades de bienes de lujo que habían dejado atrás, incluidos coches muy caros como Ferraris y Lamborghinis, joyas de alta calidad y cuadros antiguos.\n\nAunque ninguno de los residentes parece haberse quedado atrás para enfrentarse a la furia del EPLA, se ha informado de varios incidentes en los que guardias y miembros de la seguridad privada que se quedaron se enfrentaron a la violencia tras ser capturados. En un sorprendente vídeo, a un grupo de lo que parecen ser cinco contratistas de seguridad privada, a los que en el vídeo se califica de \"mercenarios fascistas\", se les vendaron los ojos, se les puso contra la pared y se les disparó. La propia EPLA niega haber difundido el vídeo, afirmando que es \"propaganda de guerra capitalista\", pero ha habido llamamientos en el extranjero exigiendo una investigación internacional sobre el incidente. En cualquier caso, el avance del EPLA en California continúa, a pesar de la tenaz resistencia del Gobierno estatal, las milicias, las bandas y los mercenarios."
 apla.44.a: "Arden las colinas."
 apla.45.t: "Escaramuzas en la frontera nevadense"
 apla.45.d: ""
 apla.45.a: "Patrullar el Mojave te hace desear el invierno nuclear."
 apla.46.t: "Destino de Bohemian Groove"
 apla.46.d: "Recientemente hemos capturado Bohemian Grove, un lugar rodeado de infamia era propiedad privada del Club Bohemio, que incluía a Herbert Hoover, Richard Nixon y varios CEOs de grandes empresas como General Electric.Sin duda los cerdos se reunieron allí para discutir estrategias para exprimir más dinero del hombre trabajador, más planes para presionar su bota colectiva en nuestros cuellos. Por supuesto, no podemos ignorar las teorías conspirativas más extravagantes que lo rodean, los sacrificios rituales y la élite satánica son las comunes en las que más cree la ultraderecha. Sin embargo, no podemos comprobarlo, ya que los únicos muertos que encontramos allí fueron los miembros de seguridad de la arboleda después de que se resistieran a nuestras fuerzas.Aun así, sigue siendo un símbolo del capitalismo, el llamado búho de la sabiduría sigue allí como un tótem de la opresión, casi burlándose de cualquiera al que mira.\n\nLos neosocialistas creen que los aspectos eurocéntricos de la arboleda, como la talla en madera de Juan Nepomuceno y el búho de la sabiduría, deben ser desmantelados y que el lugar debe ser abandonado por completo, acabando con las teorías reaccionarias de la conspiración y con el objetivo de dejar que la naturaleza simplemente recupere la arboleda.\n\nLos anarquistas, por su parte, desean que todo el antiguo territorio de la arboleda sea devuelto al pueblo Karuk, considerándolo como un primer paso simbólico para devolver la tierra robada a las tribus indígenas de América; lo que hagan con las cabañas y otros símbolos eurocéntricos lo decidirán ellos.\n\nLos octubristas ven la belleza natural del lugar y desean reconvertirlo en propiedad estatal para que la gente pueda visitarlo libremente y ver el lugar que ha estado aislado durante tanto tiempo, se dará contexto histórico a los edificios y otros objetos para demostrar que los ricos y poderosos eran sólo un grupo de bichos raros, quitándoles el poder simbólico que les daban las teorías reaccionarias de la conspiración.\n\nLos jacobinos tienen un planteamiento muy sencillo, desean quemar públicamente el icono del capitalismo, ya que no sólo destruiría el legado de una década del enemigo, sino que también sería extremadamente catártico para las personas de mentalidad más conservadora que aún creen en las teorías conspirativas que rodean el lugar."
 apla.46.a: "Dejar crecer la hierba sobre lo que no se quiere."
 apla.46.b: "Tenemos que sanar juntos, devolver la tierra a los indígenas."
 apla.46.c: "La historia es la historia, hay que educar al pueblo."
 apla.46.e: "La gente quiere que se vaya, prepara los partidos"

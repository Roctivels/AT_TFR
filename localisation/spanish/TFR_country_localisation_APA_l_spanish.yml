 APA_reactionary_resistance_idea: "Resistencia reaccionaria alta"
 APA_reactionary_resistance_idea_desc: "Una revolución no existe sin sus enemigos, y en el cadáver de los Estados Unidos, los nuestros parecen interminables. En todas las ciudades, y en la mayoría de las zonas rurales, los reaccionarios asaltan nuestras fuerzas aparentemente sin parar, esparciendose por nuestro territorio cómo una plaga. Insurgentes anticomunistas, de los cuales la mayoría son leales a los constitucionalistas en Denver u otras fuerzas de reacción resisten nuestros esfuerzos para la liberación constantemente, utilizando sus bases de apoyo y cultivando a la de por si hostil población contra nosotros. Bombardeos, emboscadas y asesinatos son habituales, haciendo extremadamente difícil para nosotros asegurar nuestra posición en las areas que hemos liberado. Debe realizarse un esfuerzo concreto para cortar las cabezas de estas víboras reaccionarias antes de que terminemos enfrentándonos a una contrarrevolución."

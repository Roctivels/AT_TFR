 APA_revolution_progress_gui_tooltip: "Progreso de la Revolución: [?APA_revolution_progress_var|Y1%]"
 APA_revolution_progress_gui_desc: "§LEl Progreso de la Revolución representa lo cerca que estamos de alcanzar el §Rsocialismo§!.§!"
 APA_workers_congress_help_gui_tooltip: "Explicación del §YCongreso Obrero§!"
 APA_workers_congress_help_gui_desc: "El §YCongreso Obrero§! es un elemento central del panorama político de [APA.GetNameDef], que brinda acceso a focos únicos y ofrece diversas bonificaciones nacionales. Esta mecánica gira en torno a la popularidad de cada partido (como se representa en la pantalla política), que influye en su poder de voto en el §YCongreso Obrero§!. Además, cada partido tiene un nivel de apoyo, que abarca cinco niveles, que refleja su disposición a respaldar al gobierno actual y su agenda legislativa.\n\nPara asegurar el apoyo del §YCongreso Obrero§!, debes obtener el respaldo de estas facciones. Cuanto más alto sea su nivel de apoyo, más contribuirán al apoyo total del §YCongreso Obrero§! en función de su popularidad partidaria. Por ejemplo, si un partido tiene un §Y20%§! de popularidad partidaria y un nivel de apoyo del §Y60%§!, sumará un §Y10%§! al apoyo total del §YCongreso Obrero§!. Este equilibrio estratégico de popularidad partidaria y lealtad es §Rcrucial§! para avanzar en tus objetivos legislativos.\n\n§GNiveles de apoyo§!\n---------\nCuando el apoyo de un partido es del §Y80%§! o más, se le otorga una calificación de §GMuy a favor§!\nCuando el apoyo de un partido es del §Y60%§! o más, se le otorga una calificación de §GA favor§!\nCuando el apoyo de un partido es del §Y40%§! o más, se le otorga una calificación de §LIndiferente§!\nCuando el apoyo de un partido es del §Y20%§! o más, se le otorga una calificación de §RAdversivos§!\nCuando el apoyo de un partido es inferior al §Y20%§!, se le otorga una calificación de §RMuy adversivos§!\n\nLos niveles de apoyo §Cmultiplican§! tanto la cantidad de §Gbonificaciones§! de los partidos como la contribución de los partidos al apoyo total del §YCongreso Obrero§!."

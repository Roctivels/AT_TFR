 APA_drug_trade_idea: "Narcotráfico"
 APA_drug_trade_idea_desc: "El capitalismo tardío muestra su peor cara en la epidemia de drogas que asola a América. Con casi 100 mil muertos por sobredosis al año, la epidemia daña desproporcionadamente a la clase baja. Con una economía en colapso, una crisis climática en el horizonte y un futuro desolador frente al pueblo Americano, miles de jóvenes han recurrido a las drogas como medio para afrontar sus problemas. El problema es empeorado por el tráfico de drogas hacia Estados Unidos mediante los cárteles mexicanos, situación que ha sido exacerbada por las crisis recientes en el Gobierno mexicano, llevando a un aumento de la presencia de los cárteles en el Sudoeste americano. Tras décadas de políticas fallidas implementadas por los demócratas de California, grandes ciudades cómo Sacramento, Los Ángeles y San Francisco se han vuelto cunas para el tráfico de drogas, con jeringuillas usadas y el uso de heroína siendo visible en las calles.\n\nAhora, con la revolución esparciendose por California, podría existir un brillante futuro para América. Es la responsabilidad del Ejército Popular de Liberación Americano acabar con la guerra contra las drogas, de una forma u otra."

 APA_congress_faction_reactionary_loc: "\n\n£APA_reactionary  Popularidad reaccionaria: [?APA_reactionary_popularity_var|Y%2] (£pol_power  [?APA_reactionary_popularity_dynamic_var|=+2])\nLos £APA_reactionary  reaccionarios son grupos a los que se les prohíbe postularse a cargos públicos, nos acosan constantemente y se organizan de diversas maneras. §RDebemos erradicarlos para poder llevar adelante la revolución§!."

 apla.97.t: "Oregon Trail - Chamuscado"
 apla.97.d: "No contentos con haber evacuado la región, los Milicianos del Estado de California incendiaron y volaron gran parte de las infraestructuras mientras se retiraban. En una campaña de tierra quemada alimentada por la desesperación, se sabotearon ferrocarriles y se arrasaron ciudades enteras para impedir que avanzáramos sin problemas. Este acto de violencia reaccionaria ha devastado las carreteras y las líneas de suministro del norte de California, dejando a la población local en la ruina y desplazando a cientos de miles de personas a lo largo de la frontera con Oregón.\n\nLa crisis humanitaria que se está desencadenando es asombrosa: familias desarraigadas, servicios esenciales cortados y comunidades enteras sin cobijo ni sustento. Si queremos entrar pronto en Oregón, no es sólo una cuestión de logística militar; tenemos que reconstruir las carreteras, restaurar las infraestructuras clave y estabilizar la región para garantizar que tanto nuestras fuerzas como los civiles puedan sobrevivir y avanzar.\n\nDesviaremos recursos al norte tan pronto como podamos, pero la magnitud de la destrucción significa que este esfuerzo puede retrasarnos meses. El reto ahora no es sólo prepararnos para nuevas ofensivas, sino ganarnos la confianza y el apoyo de una población maltratada por la guerra y la traición."
 apla.96.a: "¿Unidad en la lucha..?"
 apla.98.t: "La travesura perfecta"
 apla.98.d: "En los últimos días de la República burguesa, hubo una prisa por reubicar por la fuerza gran parte del oro de la nación, independientemente de que estuviera en manos privadas, a lugares más seguros. La operación (cuyo nombre en clave, según descubrimos, era operación Knox) solo se completó parcialmente y un banco al este de San José se llenó hasta los topes con el oro saqueado; su guarnición se llenó los bolsillos y se dirigió a los alrededores. A pesar de la resistencia de las milicias reaccionarias locales, el banco cayó en nuestras manos con bastante rapidez. Algunos dentro de nuestro frente unido ven el oro como nada más que una reliquia inútil y un ejemplo perfecto de la barbarie retrógrada del orden capitalista, pero no debemos olvidar que aún tiene usos y necesitamos todos los recursos a nuestro alcance. Al menos, esto habría sido así si no hubiéramos logrado mantener el control de la situación. Habían comenzado a llegar informes confusos sobre un ataque, pero la respuesta tardía significó que para cuando llegaron los refuerzos ya era demasiado tarde. Por lo que sabemos, el grupo que lo asaltó estaba compuesto por milicianos locales, renegados del EPLA e incluso un grupo de hombres de una célula local de Atomwaffen. Logramos capturar a un grupo, uno compuesto principalmente por exmilicianos, pero con dos hombres de interés. Ambos son extanquistas del EPLA que claramente no se llevan muy bien en este momento. Los guardias se quejan de las constantes disputas, y cada discusión siempre termina con la misma frase:"
 apla.98.a: "\"Siempre con ellos, ondas negativas\"."

 moldova.1.t: "Las Elecciones Presidenciales Moldavas de 2020"
 moldova.1.d: "Las elecciones presidenciales Moldavas de 2020 son una de las más cruciales que nuestra nación ha tenido en los años recientes, con la pandemia del COVID teniendo un gran impacto en nuestro de por sí difícil país. Los moldavos van a tener 2 opciones, este u oeste con el presidente actual Igor Dodon del Partido de los Socialistas de la República de Moldavia (PSRM) representando el movimiento prorruso en Moldavia y con Maia Sandu de la coalición ACUM entre el Partido de Acción y Solidaridad (PAS) y Partido de la Plataforma de la Verdad y Dignidad (PPVD) representando el movimiento proocidental en Moldavia. Hay mucho en juego y quien quiera que gane llevará al país en una dirección radicalmente diferente."
 moldova.1.a: "Maia Sandu es elegida."
 moldova.1.b: "Igor Dodon es reelegido."

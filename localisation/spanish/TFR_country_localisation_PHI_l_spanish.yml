l_spanish:
 PHI_legacy_of_the_martial_law_idea: "Legado de la ley marcial"
 PHI_legacy_of_the_martial_law_idea_desc: "La ley marcial, y por extensión la presidencia del fallecido Ferdinand Marcos, sigue siendo un tema controvertido en la política filipina dominante, ya que sus políticas autocráticas han dejado una huella imborrable que perdura hasta nuestros días."
 PHI_mutual_defence_treaty_idea: "Tratado de Defensa Mutua"
 PHI_mutual_defence_treaty_idea_desc: "El Tratado de Defensa Mutua es un acuerdo integral firmado entre los Estados Unidos de América y la República de Filipinas durante sus primeros años de independencia, marcados por las insurgencias comunistas. La pregunta es si el Tratado se mantendrá, ya que la orientación de Duterte hacia China afectaría su relación con Estados Unidos."
 PHI_increasing_chinese_influence_idea: "Creciente influencia china"
 PHI_increasing_chinese_influence_idea_desc: "Desde los intentos del presidente Duterte por estrechar las relaciones con la República Popular, la inversión china ha comenzado a aumentar, ya que los préstamos chinos se utilizan para financiar programas de infraestructura diseñados para mejorar Filipinas, o al menos su imagen. Sin embargo, muchos lo critican como una medida peligrosa que dejaría a Filipinas vulnerable a la subversión del PCCh, ya que el país mantiene su disputa territorial con la propia China."

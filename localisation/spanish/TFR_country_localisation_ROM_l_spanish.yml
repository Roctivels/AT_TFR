 romania.1.t: "Las Elecciones Legislativas Rumanas de 2020"
 romania.1.d: "Las elecciones legislativas rumanas de 2020 se celebran en medio de la pandemia de COVID-19, que ha afectado duramente a nuestro país, así como de un creciente sentimiento antisistema, principalmente debido a los enormes escándalos de corrupción durante el gobierno del Partido Socialdemócrata (PSD) en los últimos tres años. Sin embargo, el PSD sigue siendo una gran fuerza en la política rumana y su elección podría ser plausible, ya que existe un creciente descontento hacia el gobierno minoritario liderado por el Partido Nacional Liberal (PNL) bajo Ludovic Orban, que tomó el poder el año pasado cuando el gobierno del Partido Socialdemócrata cayó en una moción de confianza. Las elecciones de 2020 son las más cruciales que ha tenido nuestra nación en los últimos años y quien gane llevará al país en una dirección muy diferente."
 romania.1.a: "El Partido Nacional Liberal es electo."
 romania.1.b: "El Partido Socialdemócrata es elegido."
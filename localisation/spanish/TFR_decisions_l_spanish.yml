 kims_successor: "Lucha de poder norcoreana"
 kims_successor_desc: "La súbita partida de Kim Jong-un ha dejado un gran vacío de poder. Con la incertidumbre de la política internacional, muchos  han dado un paso al frente como el verdadero sucesor al trono de Kim.\n\n\n Legitimidad de Cho Ryong Hae:§Y[?cho_legitimacy]§!\n\n\nLegitimidad de Kim Yo-Jong:§Y[?jong_legitimacy]§!\n\n\nLegitimidad de Pak Jong Chong:§Y[?pak_legitimacy]§!"
 samson_ISR: "Sansón"
 samson_ISR_desc: "Israel es la patria de los judíos. Lucharemos por esta tierra dada por Dios hasta el último aliento. Si nuestras defensas caen y el enemigo está al borde de la victoria, nos veremos obligados a utilizar nuestro arsenal nuclear.\n£GFX_Samson_Nukes                                                                  Nunca más."

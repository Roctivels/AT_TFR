 monitor_outbreak_PER: "Monitorear el brote de COVID-19"
 covid_19_outbreak_PER: "Brote de COVID-19"
 covid_19_outbreak_PER_desc: "COVID-19 ha llegado finalmente a Irán a través de estudiantes, hombres de negocios, familias viajeras, etc. Hay que tomar medidas inmediatamente antes de que esta situación se vuelva inmanejable.\n\nNúmero actual de ciudadanos infectados:§Y[?PER_infected]"
 us_equipment_package_1: "Paquete de equipo estadounidense 1"
 us_equipment_package_1_desc: "Este paquete de equipo contiene M16, M16A1, M14, Adler-Jager AP-74, KEL-TEC RFB."
 homade_firearms_package: "Paquete de armas caseras"
 homade_firearms_package_desc: "Armas de fuego de cañón corto. No deben dispararse más de 260 tiros cada una. PRECAUCIÓN."
 israeli_firearms_package: "Paquete de armas israelitas"
 israeli_firearms_package_desc: "Armas del mayor aliado de América. Este paquete de equipo contiene IMI Galil, Uzi, FAL, e IWI Tavor. 200 de c/u."
 us_equipment_package_2: "Paquete de armas estadounidenses civiles"
 us_equipment_package_2_desc: "Abundancia de armas de fuego de propiedad civil. Este paquete de equipo contiene Marlin Model 983, Marlin Model 92, Remington 700, Winchester Model 70, Ruger 10/22, y Browning BAR."
 us_equipment_package_3: "Paquete de armas vintage"
 us_equipment_package_3_desc: "Stock limitado de armas de las Guerras Mundiales, algunas son de un streamer italiano. Este paquete incluye KAR98K, M1 Garand, Carabina M1, STG 44 22LR, 1903 Springfield, y US Enfield 1917."
 us_equipment_package_4: "Paquete de armas estadounidenses militares"
 us_equipment_package_4_desc: "Lo mejor que tienen los soldados. Este paquete incluye SCAR-16, SCAR-17, M27, y HK416. Se añadió un bonus de 300 ATGM."
 us_equipment_package_5: "Paquete clandestino"
 us_equipment_package_5_desc: "Las armas favoritas del crimen organizado. Económicas pero fiables, pueden resolver cualquier problema. Este paquete incluye la pistola HI Point, la carabina HI Point y la Glock 18."
 firearms_market: "Mercado de armas"
 firearms_market_desc: "Armas, bombas y municiones son esenciales en cualquier conflicto. La producción de armas de fuego en Estados Unidos se concentra principalmente en estados clave de la costa este. Afortunadamente, existen otras formas de obtenerlas. Solo hay que estar dispuestos a pagar por ellas. La importación ilegal de armas de fuego a Estados Unidos está a cargo de diversas bandas y cárteles."
 russian_firearms_package: "Paquete de equipo soviético"
 russian_firearms_package_desc: "No critiques un arma por su edad... la mayoría de las veces. Estas armas de fuego soviéticas han resistido al tiempo y siguen en manos de revolucionarios, yihadistas y terroristas de todo el mundo. Este paquete incluye AK-47, AKM, AK-74, y SKS."
 chinese_firearms_package: "Paquete de equipo chino"
 chinese_firearms_package_desc: "Estas no son pistolas de plástico baratas, hechas con trabajo forzado. Eso último podría ser cierto... Este paquete incluye Tipo 56 y Tipo 88."
 heavy_russian_equipment_package: "Paquete de equipo ruso pesado"
 heavy_russian_equipment_package_desc: "Los soviéticos proporcionaron al mundo un suministro enorme de cohetes antitanque y antipersonal. Úsalos cuando quieras."
 heavy_american_equipment_package: "Paquete de equipo estadounidense pesado"
 heavy_american_equipment_package_desc: "Los misiles TOW deberían acabar rápidamente con cualquier problema técnico que encuentres al volante. No preguntes de dónde sacamos la Barrett..."
 decisions_ATW: "Instalaciones navales de Kings Bay"
 decisions_ATW_desc: "La captura de las instalaciones navales de Kings Bay nos ha dado acceso a una flota de submarinos con capacidad nuclear. La crisis por el norte dio poco tiempo a la tripulación para escapar. También hemos tomado 75 miembros de la tripulación como prisioneros. Esta es una tarea simple, interrogar a todos los miembros hasta que nos suelten los códigos de lanzamineto.\n\nNúmero de miembros de la tripulación con vida: §Y[?base_personnel]§!"

 cali_gang_war: "Guerra norteña-sureña"
 cali_gang_war_desc: "Cuanto más dura una paz, más violenta es la guerra que le sigue... Los últimos años los Norteños y Sureños han mantenido una frágil paz. Se hizo evidente que la alianza se estaba rompiendo, Los Norteños y Sureños comenzaron a buscar aliados para lo que parecía inevitable. Los Norteños están aliados con los Crips y los Bloods. Los Sureños se han aliado con varias bandas supremacistas blancas."

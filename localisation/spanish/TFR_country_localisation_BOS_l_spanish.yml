l_spanish:
 BOS_collapsing_condominium: "Condominio colapsando"
 BOS_collapsing_condominium_desc: "El sueño de una federación serbio-bosnia unida tras el fin de Yugoslavia se concibió como un sueño de prosperidad, igualitarismo y una luz reluciente en el remanso de Europa que son los Balcanes. Desafortunadamente, la realidad puede ser cruel. Bosnia-Herzegovina se creó con la idea de una federación de dos naciones: Bosnia y la República Srpska, cada una de las cuales representaba a las dos minorías más grandes de la república, junto con un presidente que representaba a cada minoría significativa de la nación. Cuando se ratificó la constitución, las antiguas rivalidades entre serbios y bosnios no desaparecieron, ya que Srpska rápidamente comenzó a servir a su población dominante de serbios, a menudo introduciendo sus propias leyes y trabajando fuera de la guía de Sarajevo, negándose a cooperar con Bosnia. Combinado con una economía que no se ha recuperado realmente de la guerra civil, la Federación está al borde del colapso con muchos políticos en la República Srpska amenazando con separarse y la violencia étnica comenzando a asomar su fea cabeza"
 BOS_fallout_of_the_bosnian_spring: "Consecuencias de la Primavera Bosnia"
 BOS_fallout_of_the_bosnian_spring_desc: "La economía está ardiendo en pedazos, todo comenzó en Tuzla en 2014, cuando los trabajadores de las fábricas organizaron una protesta contra el desempleo que no se resolvía y el estancamiento de la economía. Esta protesta creció rápidamente y se convirtió en una huelga nacional contra todo el Gobierno, que incluso encontró cierto apoyo en la propia Srpska. Los efectos de la Primavera Bosnia todavía se ven en forma de violencia en las calles, disturbios y protestas que son demasiado comunes y la estructura descentralizada del Gobierno le impide adoptar las medidas necesarias."
 BOS_feeble_government: "Gobierno endeble"
 BOS_feeble_government_desc: "La estructura del Gobierno de Bosnia-Herzegovina, en teoría, permite que todas las minorías sean representadas por su propio presidente. Sin embargo, en la práctica, la posición con el mayor poder en el Gobierno es la del alto representante, el cual tiene el poder de remover oficiales electos de sus asientos. Además de ser un obstáculo para que Bosnia sea considerada una verdadera democracia, esto contribuyó inadvertidamente a la reciente espiral de inestabilidad del país debido a la falta de acción para desarrollar la economía y al sesgo étnico exhibido a favor del origen étnico del Alto Representante."
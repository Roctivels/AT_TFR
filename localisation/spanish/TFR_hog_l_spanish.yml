 GER_hog_merz: "Canciller federal: §HFriedrich Merz§!\n\n\n\n\n\n\n\n   £GFX_GER_friedrich_merz_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LNacido el 11 de noviembre de 1955 en Brilon, Renania del Norte-Westfalia, Friedrich Merz creció en un hogar católico conservador en Alemania Occidental. Tras estudiar derecho y economía en su juventud, comenzó su carrera como juez y abogado corporativo antes de dedicarse a la política. Desde el principio, Merz se unió a la CDU, donde rápidamente se ganó una reputación por su agudo intelecto, su liberalismo económico y su compromiso con los lazos transatlánticos.\n\nMerz fue elegido para el Bundestag en 1994 y ascendió rápidamente en las filas, convirtiéndose en una figura destacada del grupo parlamentario de la CDU a principios de la década de 2000. Conocido por abogar por reformas de libre mercado y una política fiscal sólida, chocó con el enfoque más centrista de Angela Merkel y dejó la política en 2009. Pasó la siguiente década en puestos de alto nivel en el sector privado, incluido el de presidente de BlackRock Alemania.\nAl regresar a la política en 2018, Merz se posicionó como una voz para la renovación conservadora. Después de la derrota de su partido en 2021, un año después, en 2022, fue elegido líder del partido CDU, con el objetivo de devolver al partido a sus raíces tradicionales y desafiar el centro político.\n\nAhora lidera Alemania como su canciller, pero el mundo ahora es más peligroso que nunca. Rusia se está posicionando contra lo que queda de la Alianza del Tratado del Atlántico Norte, la guerra civil en América está en pleno apogeo, China amenaza la democracia en el Pacífico, el descendiente de Gadafi está conquistando el norte de África, y el mundo entero está en llamas, de una forma u otra. Realmente, los tiempos no podrían ser más complicados o estar más en contra de Merz que ahora.§!"
 GER_hog_soder: "Canciller federal: §HMarkus Söder§!\n\n\n\n\n\n\n\n   £GFX_GER_markus_soder_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LNacido el 5 de enero de 1967 en Núremberg, Baviera, Markus Söder fue criado por sus padres en un hogar bávaro tradicional. Estudió derecho en la Universidad de Erlangen-Núremberg, donde obtuvo su doctorado, y más tarde comenzó una carrera en periodismo antes de dedicarse por completo a la política. Miembro comprometido de la Unión Social Cristiana, Söder rápidamente se hizo conocido por su fuerte identidad regional y su enfoque mediático.\n\nSöder fue elegido para el Parlamento Estatal Bávaro en 1994 y ascendió constantemente, ocupando varios puestos ministeriales, incluyendo Finanzas y Medio Ambiente. Se ganó una reputación por su liderazgo enérgico, sus instintos populistas y su talento para manejar la opinión pública. En 2018, sucedió a Horst Seehofer como ministro-presidente de Baviera, enfatizando los valores conservadores, el orgullo regional y una gobernanza pragmática.\nA pesar de las tensiones internas del partido y las ambiciones nacionales, Söder siguió siendo una figura central en la política alemana, a menudo mencionado como un futuro candidato a canciller.\n\nDespués de la derrota de la CDU/CSU en las elecciones de 2021, esa idea solo se fortaleció, y rápidamente, asumió el papel de un potencial canciller para la CSU. Ahora, se encuentra en esa posición, prácticamente liderando a Alemania hacia adelante.\nSin embargo, el mundo ya no es lo que solía ser. Las cosas solo han empeorado desde las últimas elecciones, y las tensiones globales están más altas que nunca. África arde, Asia se prepara para la guerra, y el oso ruso mira con avidez lo que solía poseer. Las cosas se han vuelto mucho más difíciles para Alemania y para Europa en general, y ahora Söder debe cargar con el pesado peso de llevarlos a ambos hacia el éxito. Pero no se echará atrás.§!"
 GER_hog_weidel: "Canciller federal: §HAlice Weidel§!\n\n\n\n\n\n\n\n   £GFX_GER_alice_weidel_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LLa política populista de ultraderecha de la Alternative für Deutschland ha provocado muchas acusaciones de intolerancia por parte de sus homólogos más liberales en el Bundestag. Y, sin embargo, la elección de Alice Weidel como presidenta parece casi perfectamente antitética a tales afirmaciones. Nacida en Gütersloh, Renania del Norte-Westfalia, durante los últimos años de los 70, llevaría una vida relativamente normal antes de la política. Estudió economía y administración de empresas en la Universidad de Bayreuth, pasando por instituciones como Goldman Sachs, Bank of China y la Fundación Konrad Adenauer. Después de una estancia de seis años en China, se uniría a las filas de la AfD, una elección que la pondría tanto a ella como a Alemania en un camino radicalmente diferente.\n\nLo que comenzó como un mero interés por la oposición al euro pronto floreció en un lento ascenso en las filas. A pesar del impulso hacia actitudes más tradicionalistas y antiinmigrantes, el lesbianismo de Weidel y su relación con una productora de cine nacida en Sri Lanka parecieron tener poco impacto en sus perspectivas; lo que finalmente resultó en que asegurara el puesto de candidata principal en 2017. Junto con el colíder Alexander Gauland, ayudó a impulsar al partido de extraparlamentario a ser el tercero más grande en el Bundestag. Este impulso, junto con las crisis inminentes de la década de 2020 y su atractivo más moderado (visto a través de su alineación con la facción \"Alternative Mitte\" de la AfD) la ha llevado finalmente a la Cancillería tras las elecciones de 2021, un cambio masivo no visto desde 1933. Muchos temen que su elección sea meramente el caballo de Troya que empujará a Alemania cada vez más al abismo que se creía abandonado en 1945. Otros la ven como un soplo de aire fresco muy necesario en el estancado mundo de la política alemana dominado por la CDU/SPD.\n\nSea cual sea la postura de cada uno sobre la política de Weidel, ahora le corresponde a la canciller Weidel navegar por las traicioneras aguas de la política europea, definidas por el vacío de poder dejado por los implosionados Estados Unidos y una Rusia y China resurgentes en el Este. Si poner a \"Alemania primero\" será suficiente para capear la tormenta, depende únicamente de ella guiar a la nación, con o sin la influencia extranjera que ha llevado al país hasta ahora.§!"

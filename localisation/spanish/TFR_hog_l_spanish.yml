 JAP_hog_shinzo_abe: "Primer ministro: §HShinzō Abe§!\n\n\n\n\n\n\n\n   £GFX_JAP_shinzo_abe_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LShinzō Abe nació en una familia con una dilatada historia política: su abuelo, Nobusuke Kishi, fue primer ministro de 1957 a 1960; y su padre, Shintarō Abe, fue ministro de Asuntos Exteriores de 1982 a 1986. Fue elegido por primera vez para la Dieta Nacional en 1993 y, tras sustituir a Junichiro Koizumi como presidente del PLD en 2006, fue elegido el primer ministro japonés más joven de la posguerra; sin embargo, dimitió un año después alegando razones de salud. Tras perder las elecciones de 2009, Abe regresaría a la presidencia del PLD, ganando las elecciones de 2012 e iniciando el mandato ininterrumpido más largo en la larga historia del país del Sol Naciente.\n\nEl Gobierno de Abe se ha caracterizado por dos pilares: abenomía a nivel nacional, y un Japón más asertivo a nivel externo. En el ámbito nacional, la \"abenomía\" ha luchado por sacar a Japón del estancamiento de las Décadas Perdidas mediante la flexibilización cuantitativa, el estímulo fiscal y las reformas estructurales. En el extranjero, Abe ha trabajado para fortalecer a Japón en el escenario mundial, profundizando las alianzas con Estados Unidos, India y Australia, al tiempo que advertía de una China envalentonada y una Corea del Norte nuclear. Su impulso para revisar el Artículo 9 de la Constitución japonesa sigue siendo muy controvertido en Japón, pero ha ganado una tracción sin precedentes bajo su mandato.\n\nAbe ha tratado de hacer de Japón un baluarte de la democracia contra las cambiantes mareas en Asia Oriental. Con las tensiones aumentando en los mares de China, y Norteamérica replegándose más y más con cada día, Abe insiste en que Japón debe estar preparado para defender sus intereses y valores. Sus oponentes lo acusan de llevar a la nación hacia los viejos hábitos del militarismo; sus partidarios lo alaban como el único hombre con la visión y la determinación para capear la tormenta que se avecina. Una cosa es cierta: Shinzo Abe está al mando de un Japón que se encuentra en una encrucijada, decidido a asegurar que no caiga en la irrelevancia o la debilidad frente a una nueva era candente.§!"

 GER_hog_angela_merkel: "Canciller federal: §HAngela Merkel§!\n\n\n\n\n\n\n\n   £GFX_GER_angela_merkel_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LAngela Dorothea Kasner nació en Alemania Occidental, hija de un pastor luterano que se trasladó al Este para difundir la fe. Química de profesión, creció en la República Democrática Alemana, observando el próspero Occidente desde la frontera interior alemana. Luego llegó la reunificación, y con ella, la oportunidad.\n\nLa caída del Muro sería el catalizador de la carrera política de Merkel. Fue brevemente portavoz del primer y único gobierno democrático de la RDA. Tras la reunificación, fue elegida para el Bundestag en 1990 como miembro de la CDU y nombrada Ministra de Mujer y Juventud por Helmut Kohl, quien la acogió como protegida. Pero semejante puesto en el Gobierno Federal no le bastó, y cuando se le presentó la oportunidad de denunciar a Kohl y a la dirección de la CDU, la aprovechó. En 2000, se convirtió en la primera mujer líder de la CDU, y en 2005, en la primera canciller de la historia alemana y la primera de la República Federal en ser erigida en la RDA. Su cancillería ha durado 16 años y cuatro elecciones, y a través de crisis financieras y oleadas migratorias, se ha mantenido como el pilar inquebrantable tanto de Alemania como de Europa.\n\nPero todos los reinados llegan a su fin, y desde 2018, la cancillería de Merkel tiene una fecha límite fija: el 26 de septiembre de 2021. Pronto, Merkel se hará a un lado, dejando a sus sucesores para afrontar la tormenta que se avecina. Queda por ver si la historia la juzgará como la protectora de Alemania o como la líder que simplemente retrasó su ajuste de cuentas.§!"
 GER_hog_tino_chrupalla: "Canciller federal: §HTino Chrupalla§!\n\n\n\n\n\n\n\n   £GFX_GER_tino_chrupalla_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LNacido el 14 de abril de 1975 en Weißwasser, en Alemania Oriental, Tino Chrupalla creció en una familia de clase trabajadora durante las últimas décadas de la República Democrática Alemana. Su padre trabajaba como artesano, y desde muy joven, Chrupalla inculcó un profundo respeto por el trabajo, la tradición y la identidad local. Tras finalizar la educación secundaria, realizó una formación profesional como pintor y decorador, estableciéndose posteriormente como maestro artesano autónomo, dirigiendo su propio negocio en su ciudad natal.\n\nA diferencia de muchos de sus contemporáneos en los círculos políticos berlineses, el camino de Chrupalla hacia la política nacional no comenzó en universidades ni en las juventudes de los partidos, sino en los talleres y centros de trabajo del este de Sajonia. No fue hasta 2015, en pleno auge de la crisis migratoria europea y el creciente malestar social en sectores de la población, que Chrupalla se unió a la AfD, un partido que, por aquel entonces, se transformaba rápidamente de un movimiento euroescéptico a una fuerza populista de derecha más amplia. Su ascenso dentro del partido fue veloz. En las elecciones federales de 2017, Chrupalla desbancó a Michael Kretschmer, el destacado candidato de la CDU, obteniendo un mandato directo en la circunscripción de Görlitz, una hazaña que marcó el arraigo de la AfD en el este de Alemania. En el Bundestag, pronto se erigió como una firme voz del conservadurismo nacional, el antiglobalismo y los valores tradicionales alemanes. Su discurso resonó entre muchos que se sentían marginados por el consenso político general.\n\nEn noviembre de 2019, Chrupalla fue elegido colíder federal de la AfD junto con Jörg Meuthen, lo que simbolizó un cambio de poder dentro del partido, alejándose de su núcleo tecnocrático anterior y acercándose a su ala más nacionalista y culturalmente defensiva. Con su modestia y sencillez retórica, Chrupalla se posicionó como un hombre del pueblo, en contraste con lo que él definía como la élite política, desvinculada de la vida cotidiana alemana.\n\nAhora, Chrupalla lidera la Vaterland y, como su líder, ha prometido llevarla a una nueva era. La nación ya no será hundida por políticos débiles y la élite; ahora, el mundo verá cuán fuerte puede ser Alemania.§!"
 GER_hog_olaf_sholtz: "Canciller federal: §HOlaf Scholz§!\n\n\n\n\n\n\n\n   £GFX_GER_olaf_sholtz_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LNacido el 14 de junio de 1958 en Osnabrück, Baja Sajonia, Scholz creció en Hamburgo. Sus padres trabajaban en la industria textil. Estudió Derecho en la Universidad de Hamburgo, especializándose en Derecho Laboral. A los 17 años, Scholz se unió al SPD e inmediatamente se involucró en su ala juvenil, también conocida como Jusos, llegando a ser su vicepresidente federal en los años 80.\n\nScholz entró por primera vez en el Bundestag en 1998 y ha desempeñado diversos cargos durante su trayectoria. Los cargos más importantes que ha desempeñado han sido los de secretario general del SPD y ministro federal de Trabajo y Asuntos Sociales durante el mandato de la anterior canciller, Angela Merkel, de 2007 a 2009. En 2011, asumió la alcaldía de su ciudad natal, Hamburgo, donde supervisó importantes reformas fiscales y numerosos proyectos de infraestructura importantes. En 2018, regresó a la política federal como vicecanciller y ministro de Finanzas del gabinete de Merkel, donde desempeñó un papel clave en la respuesta a la pandemia de COVID.\n\nHoy, ha alcanzado la cima del poder, obteniendo el título de canciller. Su tarea actual no será fácil ni sencilla. El mundo ha vivido más dificultades y dolor que nunca recientemente, y muchos solo pueden dar por sentado que la situación empeorará antes de mejorar. Pero, como mínimo, Scholzomat estará al mando, guiando a Alemania hacia el futuro.§!"
 GER_hog_robert_habeck: "Canciller federal: §HRobert Habeck§!\n\n\n\n\n\n\n\n   £GFX_GER_robert_habeck_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LNacido el 2 de septiembre de 1969 en Lübeck, Alemania, Habeck era hijo de farmacéuticos; creció cerca de Kiel, en Heikendorf. En 1989, completó sus estudios de acceso a la universidad en la Heinrich-Heine-Schule de su ciudad natal y posteriormente comenzó a cursar estudios superiores de filosofía y literatura alemana en las universidades de Friburgo de Brisgovia, Roskilde (Dinamarca) y Hamburgo. En 1996, obtuvo un Magister Artium y en el año 2000 se doctoró en filosofía en la Universidad de Hamburgo, especializándose en estética literaria y teoría de los medios. Poco después, desarrolló una breve carrera como escritor antes de dedicarse a la política alemana.\n\nEn 2002, Habeck se unió a Los Verdes, donde ocupó la presidencia del distrito del partido en Schleswig-Flensburg de 2002 a 2004, antes de ascender a la presidencia estatal del partido en Schleswig-Holstein de 2004 a 2009. En 2012, fue nombrado Viceministro-Presidente y Ministro de Transición Energética, Agricultura, Medio Ambiente, Naturaleza y Digitalización en Schleswig-Holstein, cargos que ocupó hasta 2018. Ese mismo año, Habeck alcanzó la escena nacional, siendo elegido colíder del Partido Verde nacional junto con Annalena Baerbock.\n\nDurante su mandato, Los Verdes lograron un progreso significativo y constante en muchas regiones de Alemania, culminando finalmente en las elecciones federales de 2021, un punto que ya hemos superado.\nSiendo por primera vez la fuerza principal de la nación y no solo un miembro secundario de la coalición, Habeck pasará muchas noches en vela y mucho café. Sin mencionar en qué se está convirtiendo el mundo, o...\n\nEn qué se ha convertido ya.§!"
 GER_hog_christian_lindner: "Canciller federal: §HChristian Lindner§!\n\n\n\n\n\n\n\n   £GFX_GER_christian_lindner_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LNacido el 7 de enero de 1979 en Wuppertal, Renania del Norte-Westfalia, Alemania Occidental, Lindner creció en un hogar de clase media. Su padre trabajaba como profesor en un instituto. En 1995, se unió al FDP. En 1998, completó su Abitur, o título de acceso a la universidad. De 1999 a 2001, Lindner sirvió en la Bundeswehr como oficial de reserva, llegando a ascender al rango de Primer Teniente. Durante su periodo en la reserva, entre 1999 y 2006, estudió Ciencias Políticas en la Universidad de Bonn, donde obtuvo el título de Magister Artium. Sin embargo, sus estudios fueron a tiempo parcial debido a su carrera política y sus actividades empresariales.\n\nEl 31 de mayo de 2000, Lindner se convirtió en el miembro más joven de la asamblea legislativa de Renania del Norte-Westfalia. En 2007, asumió la Secretaría General del FDP en Renania del Norte-Westfalia, cargo que dejó en 2009 tras ser elegido para el Bundestag alemán por primera vez. Tras el declive del FDP en 2012-2013, fue elegido presidente del Partido Federal el 7 de diciembre de 2013, con un 79% de apoyo, iniciando así su recuperación. En 2017, bajo el liderazgo de Lindner, el FDP regresó al Bundestag con el 10,7% de los votos.\n\nHoy, lidera el propio Bundestag. Christian Lindner, del FDP, es ahora el Canciller de Alemania. Mientras sus partidarios celebran, él reflexionará y planificará. El mundo, más que nunca, ha presenciado un aumento de la tensión y la violencia, pues si Lindner quiere cumplir sus promesas al pueblo y traer esperanza para el futuro y la democracia, debe actuar ya.§!"
 GER_hog_armin_laschet: "Canciller federal: §HArmin Laschet§!\n\n\n\n\n\n\n\n   £GFX_GER_armin_laschet_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LNacido el 18 de febrero de 1961 en Aquisgrán, Renania del Norte-Westfalia, Armin Laschet se crio en un hogar devotamente católico. Su padre trabajaba como minero de carbón antes de convertirse posteriormente en maestro de escuela. Su crianza en la ciudad fronteriza moldeó gran parte de su visión del mundo, siendo tolerante, europeo y pragmático. Asistió al Pius-Gymnasium local y en 1981 obtuvo su bachillerato, antes de estudiar derecho en la Universidad de Bonn. Posteriormente, se decantó por el periodismo, estudiando en la Universidad Católica de Eichstätt-Ingolstadt, donde completó su formación en este campo.\n\nA finales de los años 80 y principios de los 90, Laschet trabajó como periodista y editor, a la vez que se involucró cada vez más en la política. Miembro de larga trayectoria de la CDU, a la que se unió en 1979, Laschet fue elegido miembro del Bundestag en 1994, lo que marcó su primer gran paso a nivel nacional. Sin embargo, su verdadera base política se forjó en Renania del Norte-Westfalia, donde posteriormente fue miembro del Parlamento Europeo entre 1999 y 2005, adquiriendo una valiosa experiencia en políticas e integración de la UE.\nEn 2005, Laschet fue nombrado Ministro de Generaciones, Familia, Mujer e Integración en Renania del Norte-Westfalia, obteniendo reconocimiento nacional por su enfoque moderado e inclusivo, rasgos que le valieron tanto elogios como críticas dentro de las filas de su propio partido. En 2017, se convirtió en ministro-presidente de Renania del Norte-Westfalia, el estado federado más poblado de Alemania, liderando una coalición CDU-FDP y defendiendo una plataforma centrista, proempresarial y socialmente equilibrada. Su mandato se caracterizó por el crecimiento económico y una relativa estabilidad política, y Laschet priorizó frecuentemente el compromiso y la continuidad por encima de la confrontación.\n\nAhora, no solo dirige la región que lo vio nacer. Ahora dirige la nación misma. Siendo centrista, debe trabajar duro para mantener contentos a todos los partidos y grupos dentro de la Patria, si quiere ver a su nación progresar hacia la grandeza.§!"
 GER_hog_bodo_ramelow: "Canciller federal: §HBodo Ramelow§!\n\n\n\n\n\n\n\n   £GFX_GER_bodo_ramelow_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LNacido el 16 de febrero de 1956 en Osterholz-Scharmbeck, Baja Sajonia, Bodo Ramelow se crio en un hogar protestante de Alemania Occidental. Sus primeros años estuvieron marcados por la influencia tanto personal como política. Su padre, sindicalista y ferroviario, falleció cuando Bodo era joven, lo que le inculcó una profunda conexión con los problemas laborales y la justicia social.\nFue en Turingia, tras la reunificación alemana, donde comenzó realmente su trayectoria política. En 1999, se unió formalmente al Partido del Socialismo Democrático, sucesor del Partido Socialista Unificado de Alemania Oriental, que gobernaba en ese entonces. A pesar de ser alemán occidental y pertenecer a un partido de Alemania Oriental, Ramelow se convirtió rápidamente en un puente entre dos mundos: sin miedo a confrontar el legado de la RDA, pero decidido a garantizar que las preocupaciones de los alemanes orientales no fueran ignoradas por una Alemania unificada.\n\nSu momento más histórico llegó en 2014, cuando fue elegido ministro-presidente de Turingia, la primera vez en la historia alemana de la posguerra que un jefe de gobierno provenía de Die Linke. El momento fue simbólico y transformador, señalando que se podía confiar en un gobierno de izquierdas más allá de los votos de protesta o los escaños de la oposición. A pesar de las críticas de los conservadores, que advertían de una regresión ideológica, Ramelow lideró una coalición estable de partidos rojiverdes, que priorizó la moderación, la estabilidad económica y la política social.\nReelegido en 2020 tras una caótica y observada internacionalmente crisis de gobierno que incluyó votos de la ultraderechista AfD y un debate constitucional, Ramelow demostró una vez más su resiliencia como político y símbolo de la firmeza de la democracia federal. Su liderazgo se caracterizó por la negociación serena, una férrea defensa de las normas democráticas y una inusual disposición a superar las divisiones en una de las regiones políticamente más polarizadas de Alemania.\n\nAhora el mundo lo observa al frente de Alemania. Su partido ha llegado lejos, y para él aún más lejos, pero no importa cuánto haya cambiado su vida, luchará por su pueblo y se esforzará al máximo para mantener a la nación unida y preparada para el mundo.§!"

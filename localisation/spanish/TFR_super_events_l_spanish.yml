 NUKE_TITLE: "Mientras una coalición global entraba en Norteamérica para impedir que la División Atomwaffen completara sus planes de destruir el mundo tal y como lo conocemos, se lanzaron varias docenas de misiles nucleares desde los ex-Estados Unidos a varios centros de gran población.\n\nVarias ciudades fueron borradas de la faz de la tierra, dejando solo esqueletos y sombras. En represalia, las antiguas potencias globales activaron sus propios arsenales tanto contra los ex-Estados Unidos como contra sus rivales moribundos como una garantía de destrucción mutua. Armas nucleares, bombas sucias, armas químicas, misiles: no hubo arma ignorada, el estertor de la muerte de una especie cegada por el odio.\n\nDentro de un mes, el orden social global caerá en la anarquía. Dentro de seis meses, el medioambiente se volverá difícil para la vida humana a medida que la naturaleza se marchite. Dentro de 12 meses, el mundo tal como lo conocemos habrá desaparecido, y civilizaciones enteras no serán más que recuerdos y mitos lejanos.\n\nLa guerra, el hambre, la plaga y la muerte serán una certeza.\nEn 10 años, seremos libres.\n\nMuertes a corto plazo: §R360 millones§!.\nMuertes a largo plazo: §R5 mil millones§!.\n\nSiente la ceniza sobre tus hombros.\nCierra los ojos.\nY descanza en paz..."

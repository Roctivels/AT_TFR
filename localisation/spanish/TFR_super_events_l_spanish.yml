 fbi_case_pipeline: "Milicias de ultraderecha formadas en Virginia"
 fbi_case_pipeline_text: "     Nos hemos enterado de que, tras la importante manifestación en defensa de la Segunda Enmienda en Richmond, han surgido múltiples milicias de ultraderecha a raíz de las protestas a nivel nacional. Hemos descubierto varias organizaciones más pequeñas que han estado realizando entrenamientos en los Montes Apalaches. Estas milicias pueden representar una amenaza para la seguridad nacional en el futuro. La observación debe continuar."
 fbi_case_pipeline_button: "Interesante..."
 fbi_case_false_flags: "Posibles incidentes de bandera falsa"
 fbi_case_false_flags_text: "     Hemos descubierto que ciertos grupos han aumentado potencialmente la gravedad de muchos de los disturbios. Entre ellos, se encuentran los que dejan montones de ladrillos, botellas, piedras y otros objetos que los manifestantes luego arrojan a los agentes. Estos objetos se colocan convenientemente en áreas donde se reúnen docenas de alborotadores. Ha habido muchas afirmaciones en las redes sociales de que estas pilas de objetos fueron colocadas por personas enmascaradas. Nuestros hallazgos en línea pueden sugerir que estos objetos no están simplemente fuera de lugar."
 fbi_case_false_flags_button: "Interesante..."
 fbi_case_atomwaffen: "La División Atomwaffen resurge"
 fbi_case_atomwaffen_text: "     El pasado mes de marzo, el destacado neonazi James Mason afirmó que había ordenado a sus seguidores de la División Atomwaffen que se disolvieran. Aunque muchos en la comunidad de inteligencia creyeron que se trataba de una estratagema para evitar incurrir en cargos de terrorismo, fue recibido como una oportunidad esperanzadora de que las cosas se calmaran.\n\nLamentablemente, ese no es el caso. Las conversaciones en línea, así como los informantes dentro del movimiento, sugieren que muchos antiguos miembros de Atomwaffen siguen trabajando en la clandestinidad. Ya sea que operen bajo nuevos nombres como \"la Orden Nacionalsocialista\" o simplemente permanezcan sin nombre, no han cambiado sus métodos. El breve lapso en el escrutinio del FBI les ha dado la oportunidad de seguir almacenando armas y suministros, así como de formular planes lejos de las miradas indiscretas. Los agentes federales los están vigilando como halcones una vez más, aunque a algunos les preocupa lo que pueden haber pasado por alto."
 fbi_case_atomwaffen_button: "Parecía demasiado bueno para ser verdad."
 fbi_case_leftists: "Milicias de ultraizquierda formadas en California y Oregón"
 fbi_case_leftists_text: "     Los informantes han reunido información fiable sobre la creación de múltiples milicias marxistas-leninistas y anarquistas en los estados de California y Oregón. Se ha teorizado que los posibles organizadores de estas milicias son Gloria la Riva, del Partido por el Socialismo y la Liberación. Los miembros del PSL se han manifestado en Sacramento, Berkeley, San Francisco y Monterey. Cada vez más individuos armados se han presentado a cada protesta consecutiva. Las publicaciones del PSL en las redes sociales se jactan de su creciente membresía, y algunos miembros han mostrado su entrenamiento con armas. También se han realizado eventos de entrenamiento masivo en lugares no revelados. Estos eventos reúnen a más de unas pocas docenas de personas. La policía del estado de California ha marcado a estos grupos como un riesgo potencial alto para la seguridad nacional. La ubicación de Gloria La Riva ha sido desconocida durante varios meses."
 fbi_case_leftists_button: "¿Charlie en el bosque?"

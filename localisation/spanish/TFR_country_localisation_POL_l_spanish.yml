 poland.1.t: "Restauración de la Gloria"
 poland.1.d: "Polonia ha perdido Varsovia... Hemos sido abandonados por aquellos que considerábamos que eran nuestros \"aliados\", y hemos tenido nuestra nación partida en dos como lo fue en 1939... Con esta traición vemos claramente los asquerosos planes que Occidente tenía para nosotros, utilizándonos como escudos humanos y como un amortiguador contra el orco ruso, ocupándonos en todo menos el nombre, tal y como hicieron los soviéticos. \n\nPolonia sobrevivirá a esto también, pero primero necesitamos reclamar nuestra dignidad. No podemos consentir que los repulsivos liberales occidentales continúen dictando nuestras políticas, Polonia debe ser libre de la opresión extranjera. Bajo el liderazgo del ejército, ¡El espíritu polaco continuará! ¡El pueblo polaco sobrevivirá!"
 poland.1.a: "¡Polonia aún no ha desaparecido!"

 SYR_army_stats: "Ejército árabe sirio"
 SYR_army_stats_desc: "La guerra civil ha tomado un rol tremendo en nuestras fuerzas armadas. Con nuestra industria virtualmente inexistente, dependemos de comprar equipo de otras naciones. La deserción de casi la mitad de nuestras fuerzas armadas durante los últimos 9 años ha llevado al estado actual de nuestras fuerzas armadas; Centradas y adaptadas principalmente para enfrentar fuerzas guerrilleras. Nuestros generales y soldados se han acostumbrado a las tácticas de guerrilla y no están preparados para una lucha contra un ejército convencional.\n\nEl §YEjército Árabe Sirio§! es [Root.GetSyrianArmy] (§Y[?SYR_army]§!)"

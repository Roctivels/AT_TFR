 SOV_integrate_strelkovites_desc: "Strelkov y sus partidarios son monárquicos fervientes que desean restaurar el zarismo. Aunque criticó a Zhirinovski y lo llamó de muchas maneras, sigue siendo un activo valioso que puede usarse para que Rusia vuelva a sus raíces."
 SOV_return_of_rne: "Regreso de la UNR"
 SOV_return_of_rne_desc: "\n\n\n\n\n£GFX_SOV_rne\n\n\n\n\nUnidad Nacional Rusa fue una de las primeras estructuras de ultraderecha tras el colapso de la URSS. Perdió su influencia hace tiempo, pero su personal y experiencia en organizaciones de derecha, con la financiación adecuada, pueden ayudarnos a fortalecer nuestro Estado, aunque, debido a su radicalismo, incluso muchos \"halcones\" se oponen a un acuerdo con ellos."

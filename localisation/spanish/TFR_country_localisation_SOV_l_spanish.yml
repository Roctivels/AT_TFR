 SOV_beautiful_russia_of_the_future: "Hermosa Rusia del futuro"
 SOV_beautiful_russia_of_the_future_desc: "\n\n\n\n£GFX_SOV_beautiful_russia_of_the_future_banner\n\n\n\n\n\nEn la terminología de la oposición liberal rusa existió durante muchos años la imagen de la \"hermosa Rusia del futuro\". La imagen era extremadamente vaga y populista; cada político tenía su propia Rusia hermosa e ideal del futuro, que definitivamente construirían en un futuro lejano y brillante. Han pasado muchos años, los liberales rusos han abandonado la oposición y ahora están al mando del país, por lo que es hora de construir esa misma \"hermosa Rusia del futuro\"."

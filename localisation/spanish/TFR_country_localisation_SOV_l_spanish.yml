 SOV_a_new_dawn_for_the_union_desc: "¡Regocijaos, camaradas, hermanos y hermanas, obreros y campesinos! ¡Una nueva era se avecina para la Unión, y será reemplazada por la estrella roja de Novorrusia! Leonid Pásechnik no tuvo miedo de desafiar el osificado sistema de partidos y ganó las primeras elecciones de toda la Unión por un margen decisivo sobre los demás candidatos. Así, demostró al mundo entero que el amor por la Madre Patria siempre será demandado entre la población. Sin embargo, no hay que ceder al mareo del éxito. El nuevo secretario general todavía tiene mucho trabajo por hacer. ¡Y empieza ahora!"
 SOV_formulate_a_new_political_trajectory: "Formular una nueva trayectoria política"
 SOV_praise_the_great_russia: "Glorificar a la Gran Rusia"
 SOV_praise_the_great_russia_desc: "Así como es imposible exaltar a uno de los pueblos por encima de los demás para no caer en el chovinismo social y el fascismo rojo, de la misma manera es imposible no reconocer los méritos de ciertos pueblos en los procesos históricos. La Gran Rusia en el siglo XX se convirtió en un catalizador del cambio social y un faro para los movimientos socialistas de todo el mundo. Debemos recordar las hazañas de nuestros bisabuelos y padres y no olvidar nuestro pasado. Después de todo, no hay futuro sin él."
 SOV_pragmatical_marxism: "Marxismo pragmático"
 SOV_pragmatical_marxism_desc: "\"La enseñanza de Marx es omnipotente porque es verdadera\", es un lema fuerte que a los marxistas ortodoxos les gusta usar. Sin embargo, pierden de vista el hecho de que el dogmatismo lleva a la degeneración de cualquier ideología. Karl Marx no vivió en los días de estados cuyas economías se basaban en el sector de servicios, y ciertamente no tenía idea de cómo regular las relaciones en tales casos. Sin embargo, no todas las ideas de Marx son erróneas. Es solo que es hora de que algunas de las disposiciones más radicales y anticuadas del marxismo desaparezcan dentro del marco de un proceso histórico objetivo."
 SOV_formulate_a_new_political_trajectory_desc: "El marxismo soviético y el nacionalismo soviético fueron ciertamente ideologías excelentes... En su momento. El siglo XX terminó hace mucho tiempo y ha llegado el momento de buscar nuevas ideologías. Es hora de dejar de lado el dogmatismo marxista y recurrir a las ideas de filósofos contemporáneos como Duguin. Justicia social, patriotismo y nacionalismo moderado. Estos son los principios que llevaremos al nuevo siglo."
 SOV_groundworks_for_new_democracy: "Fundación para una nueva democracia"
 SOV_groundworks_for_new_democracy_desc: "La perestroika pudo haber sido un terrible dolor para la URSS en el siglo pasado y llevó a la muerte del hegemón socialista, pero no es una mala idea en sí misma. Especialmente la idea de la democracia. ¿Fue terrible por sí sola? Por supuesto que no. Si la historia nos ha enseñado algo, es que la democracia partidista eventualmente lleva al poder a ancianos y oportunistas, lo que inevitablemente conduce a la caída del Estado. ¡Ha llegado el momento de una nueva democracia soviética, en la que el pueblo podrá decidir el destino de su país! O al menos podremos seguir ciertas tendencias en la sociedad. Después de todo, nadie dijo que alguien más que nosotros podría ganar estas elecciones."
 SOV_keeping_soviet_monopartite: "Preservar el partido único soviético"
 SOV_keeping_soviet_monopartite_desc: "La unidad de opinión es vital para cualquier Estado. El Partido es la principal fuerza activa y la vanguardia de la revolución. Cualquier desviación de la línea del partido puede llevar a eventos similares a los ocurridos en los años 90 del siglo pasado. Al mismo tiempo, por supuesto, dentro del Partido, sus miembros podrán expresar sus opiniones, simplemente no deberían ser demasiado diferentes de la línea del Partido aceptada."
 SOV_for_the_unity_of_the_peoples: "Por la unidad de los pueblos"
 SOV_for_the_unity_of_the_peoples_desc: "La URSS no es solo el nombre de un Estado, es una idea establecida por nuestros antepasados hace más de un siglo. La idea de un país que surgió sobre las ruinas de una prisión de naciones, donde todos tendrán los mismos derechos sin importar la religión, la nacionalidad u otros factores. Y al revivir este gran país en el siglo XXI, también hemos asumido la gran responsabilidad de defender los preceptos de los revolucionarios del pasado. Desde Leópolis hasta Vladivostok y desde Múrmansk hasta Bakú. Cada uno de nosotros tiene su propia patria, por la cual estamos dispuestos a dar nuestras vidas sin demora. Sin embargo, a diferencia de los nacionalistas cavernícolas de Occidente, entendemos que solo cooperando entre nosotros podemos alcanzar la prosperidad. Es esta unidad la que nos da fuerza. ¡Salve, nuestro poder soviético! Hermandad y amistad de los pueblos del país."
 SOV_promote_novorossiyan_cadres: "Promover cadres novorrusos"
 SOV_promote_novorossiyan_cadres_desc: "Dirigir un Estado siempre es difícil, y para ello necesitamos personas de confianza que puedan ser puestas en el poder. Por supuesto, esto puede parecer nepotismo para algunos, pero fueron estas personas las que se probaron activamente durante la guerra en el Dombás. Al mismo tiempo, no creemos que los cuadros del resto de las repúblicas de la Unión sean indignos de un lugar en el aparato estatal. Es solo que ahora, en el período de posguerra, nuestro país necesita estabilidad y personas que hayan sido probadas por el tiempo y las adversidades."
 SOV_bolster_kgb_ranks: "Fortalecer las filas del KGB"
 SOV_bolster_kgb_ranks_desc: "Como ha demostrado la situación de posguerra, los enemigos de los trabajadores no desaparecen por sí solos. No, simplemente se mantienen al acecho de vez en cuando, esperando el momento en que nos debilitemos lo suficiente como para atacar en ese instante. Para combatir tales plagas, se necesitan servicios especiales apropiados, ¡y por lo tanto debemos fortalecer urgentemente el KGB!"
 SOV_fight_corrupt_bottom_grade: "Métodos de Andrópov"
 SOV_fight_corrupt_bottom_grade_desc: "Los nacionalistas, reaccionarios y oscurantistas sin duda ya se han escondido en sus cuevas con la esperanza de que el KGB se olvide de ellos. ¡Como si no fuera así! Es hora de las redadas. Los separatistas nacionales, anarquistas y otros elementos peligrosos serán capturados y castigados con todo el peso de la ley. No se preocupe, Yuri Vladímirovich, su trabajo no será olvidado."
 SOV_our_fair_leader: "Nuestro justo líder"
 SOV_our_fair_leader_desc: "Los dictadores suelen asociarse con algo terrible y antiguo. Casi una reliquia de tiempos pasados. Pero, ¿acaso grandes líderes como Lenin y Stalin no crearon la mayor potencia de la Tierra? ¿No tiene un gobernante sabio derecho a usar la plenitud de su poder? Y un pueblo fuerte no necesita un líder igualmente fuerte y poderoso que sea el timonel, guiando el barco del Estado a través de las transformaciones históricas. Al mismo tiempo, por supuesto, un líder debe ser inteligente y justo, digno de su poder, y no un tonto que intenta afirmarse. ¡Gloria al gran líder! ¡Gloria al apicultor!"
 SOV_the_new_constitution: "Nueva Constitución"
 SOV_the_new_constitution_desc: "La Constitución es el documento más importante de cualquier país. Sin embargo, piensen en esto: ¡nuestro Estado sigue rigiéndose por un acto jurídico adoptado a principios del siglo pasado! Al mismo tiempo, ignora todos los cambios socioculturales que se han producido en la sociedad durante este tiempo. Por supuesto, un documento así cumple sus funciones en su forma actual. Sin embargo, si queremos maximizar la eficacia del aparato estatal, necesitaremos una nueva constitución."
 SOV_transform_supreme_soviet: "Transformar el Sóviet Supremo"
 SOV_transform_supreme_soviet_desc: "¿Qué es el Soviet Supremo de la URSS moderna? ¡Un montón de asentidores para el Partido y nada más! Un conjunto de consonantes, como los llama despectivamente el pueblo. ¡Viejos abuelos que ralentizan las reformas y al mismo tiempo se comen sus beneficios estatales! Por supuesto, es imposible abandonar por completo esta institución de poder, y no es necesario. Pero es bastante posible reformarla para que se adapte mejor a nuestra visión."

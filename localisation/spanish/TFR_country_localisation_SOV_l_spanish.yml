 SOV_first_soviet_election: "First Union Elections"
 SOV_first_soviet_election_desc: "The historic moment has come - the first election of the leader of the new USSR! This event will symbolize that the people are the true masters of the country. Socialism is not only a strong economy and a great army, but also the power of the people. Millions of citizens will choose the one who will lead the Union forward to a bright future! The first elections will be the beginning of a new democratic era, where every republic will be heard!"

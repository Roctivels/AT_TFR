 SOV_new_gosplan_desc: "En la antigua Unión Soviética existía una agencia llamada Gosplán, también conocida como el Comité Estatal de Planificación de la URSS. Su función principal era supervisar la implementación de los planes económicos nacionales. A lo largo de la existencia de la Unión Soviética, el comité demostró ser bastante eficaz en la gestión de la economía.\n\nHoy, cuando los métodos soviéticos vuelven a ser relevantes, debe plantearse la cuestión de restaurar el Gosplán. Sus principios de planificación centralizada podrían ayudar a resolver importantes tareas estatales y garantizar la estabilidad estratégica."
 SOV_ogas: "§COGAS§!"
 SOV_ogas_desc: "\n\n\n\n£GFX_ogas_banner\n\n\n\n\n\nOGAS es un sistema revolucionario que hizo realidad el sueño de los antiguos cibernéticos en la nueva URSS. El grandioso proyecto, que permitió unir toda la economía de nuestro país en una única red de información, es un símbolo de nuestro progreso. Nuestro sueño se ha hecho realidad y podemos avanzar con confianza sabiendo que tenemos todas las herramientas necesarias para tener éxito. La gente está feliz, el presupuesto se repone y el comunismo automatizado parece cada vez más real."

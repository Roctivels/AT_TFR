 SOV_nadezhdin_reforms_idea: "Nadezhdin Reforms"
 SOV_DMITRY_MEDVEDEV_DESC: "Oriundo de Leningrado, Dmitri Anatólievich Medvédev ha construido su carrera a la sombra de figuras más influyentes, logrando ascender en la política rusa no solo por su imagen poco convencional, sino también por su lealtad a Vladímir Putin. Comenzó su trayectoria profesional como abogado y profesor, pero pronto se unió al círculo cercano de Putin, colaborando con él en la alcaldía de San Petersburgo. En los años 2000, su ascenso fue meteórico; llegó a dirigir la administración presidencial y luego se convirtió en viceprimer ministro. En 2008, debido a limitaciones constitucionales, Putin tuvo que renunciar a la presidencia, y Medvédev fue elegido para ocupar su lugar. Ganó las elecciones sin dificultad, aunque muchos lo vieron como un presidente interino, cuya principal función era asegurar el puesto para Putin.\n\nSu presidencia se recuerda por reformas moderadas, como la modernización económica y algunas iniciativas de liberalización, pero siempre dentro de los límites aceptables del sistema. Uno de sus logros más destacados fue la mejora de las relaciones con Estados Unidos, aunque esto se deterioró rápidamente tras los eventos de 2014. Cuando llegó el momento de decidir quién sería el candidato a la presidencia antes de las elecciones de 2012, Medvédev cedió el paso a Putin, revelando que habían acordado este intercambio desde el principio. Tras el regreso de Putin al Kremlin, Medvédev continuó en el poder, ocupando el cargo de presidente del Gobierno y liderando Rusia Unida, aunque su influencia fue disminuyendo con el tiempo. En 2020, fue trasladado al puesto de vicepresidente del Consejo de Seguridad, lo que muchos interpretaron como un retroceso.\n\nAhora ha vuelto a ser el líder de Rusia, pero es poco probable que sus políticas sean las mismas que antes. Lo que es seguro es que Medvédev tiene un plan de acción que está decidido a seguir con determinación."
 SOV_VLADIMIR_ZHIRINOVSKY_DESC: "A veces, para entender la historia de alguien, es fundamental seguir su camino a lo largo de la vida. Vladímir Vólfovich Zhirinovski, quien nació en 1946 en Alma Ata, ha dejado una huella profunda en la política rusa durante su extensa trayectoria. Al convertirse en el líder del Partido Liberal-Demócrata de la Unión Soviética en 1989, este joven y carismático orador logró conectar con el pueblo. Desde el inicio, defendió la necesidad de apoyo para la población rusa en las repúblicas nacionales y soñó con salvar a la Unión Soviética. Sin embargo, la historia tenía otros planes, y dos años después, Zhirinovski fue testigo impotente del colapso de su patria, mientras los pueblos que alguna vez fueron \"hermanos\" desataban su ira contra los rusos. Fue en ese instante que se dio cuenta de que Rusia había caído en la necedad. El derrumbe del proyecto soviético era inevitable, pero nadie podría haber anticipado lo doloroso que resultaría.\n\nEn los años siguientes, Vladímir Vólfovich continuó al mando del Partido Liberal-Demócrata. Se adaptó al sistema de Putin y esperó. Con su estilo de oratoria provocador, Zhirinovski se ganó una reputación peculiar en la sociedad rusa. Algunos lo veían como un bufón, un loco, mientras que otros consideraban que sus palabras tenían un aire casi profético. Sin embargo, el líder del PLDR se mantuvo firme, siempre defendiendo al pueblo ruso y su bienestar.\n\nY ahora, es Vladímir Vólfovich quien ocupa un lugar en el Kremlin. Durante décadas, sus numerosas declaraciones y acciones, así como las del partido, lo han catapultado a la cima del panorama político. Sin embargo, con el paso del tiempo, el PLDR ha atraído a una amplia gama de simpatizantes, y el futuro del partido ahora depende exclusivamente de la voluntad de Zhirinovski. ¿Optará por un camino democrático con un presidente fuerte, o se convertirá en el César ruso, imponiendo el orden con mano de hierro? La suerte está echada."
 russia.840.t: "[FROM.GetNameDefCap] solicita inversión civil"
 russia.840.d: "Las autoridades [FROM.GetAdjective] han estado solicitando inversiones a corto plazo en su joven economía en nuestro nombre para ayudarla a crecer. Las conversaciones con nuestros asesores y grupos de interés han ido bien; ya han delimitado las áreas de alta importancia para ellos.\n\nNecesitamos naciones económicamente fuertes en nuestra alianza. Sin embargo, nuestro capital se gastará sin beneficios inmediatos para nosotros específicamente, y quizá nuestros recursos sean mejor empleados en otro lugar..."
 russia.840.a: "¡Lo que sea para ayudar a una nación hermana!"
 russia.840.b: "No nos lo podemos permitir en este momento...."
 russia.841.t: "[FROM.GetNameDefCap] solicita inversión militar"
 russia.841.d: "Las Fuerzas Armadas [FROM.GetAdjective] nos ha pedido que ayudemos a fortalecer sus incipientes fuerzas. Quieren nuestro apoyo para equiparlos con armamento avanzado y asistir en la construcción de su propia industria de defensa nacional. Necesitamos aliados confiables con militares fuertes para salvaguardar nuestra seguridad compartida.\n\nSin embargo, nuestro capital se gastará sin beneficios inmediatos para nosotros específicamente, y quizá nuestros recursos sean mejor empleados en otro lugar..."
 russia.841.a: "¡Lo que sea para ayudar a una nación hermana!"
 russia.841.b: "No nos lo podemos permitir en este momento...."
 russia.842.t: "[FROM.GetNameDefCap] solicita asesores militares"
 russia.842.d: "El mando militar de [FROM.GetNameDef] ha solicitado nuestra asistencia. Desean que nuestros expertos e instructores militares compartan nuestra estrategia rusa superior. Además, aspiran a establecer varios batallones entrenados según nuestro programa del ejército. Esto nos ayudará a establecer relaciones más estrechas con nuestros aliados y a mejorar su capacidad combativa general."
 russia.842.a: "¡Lo que sea para ayudar a una nación hermana!"
 russia.842.b: "No nos lo podemos permitir en este momento...."
 hos_the_great_revolutionary_PRC: "El gran revolucionario"
 russia.414.e: "Nadezhdin, una esperanza para la juventud y reformista moderado."
 russia.843.t: "En una noche como esta"
 russia.843.d: "¿Cuánto tiempo se ha invertido? ¿Cuánto trabajo se ha dedicado? ¿Cuánto sufrimiento experimentó el pueblo ruso? Mucho. Una cantidad desmesurada. Cualquier otro país, quizás, habría colapsado hace mucho tiempo, incapaz de soportar los cambios turbulentos que rompían la forma de vida habitual. Cualquier otra nación, muy posiblemente, se habría rendido hace mucho tiempo, cediendo bajo el peso de pruebas tan serias, a veces incluso insoportables. Cualquier otra, pero no la suya.\n\nEn un instante, todas las farolas se apagaron. La ciudad se durmió, pero Nadezhdin continuó su paseo. Dolgoprúdny, una ciudad tan cercana a él, había cambiado hasta quedar irreconocible, y todo gracias a él. ¿Cuántas otras ciudades de Rusia había transformado? ¿Cuántas más estaban por venir? ¿A cuántas personas les había dado la oportunidad de una vida feliz?\nLos burócratas insensibles del pasado se burlaban de él cada vez que intentaba luchar por los derechos de su pueblo. \"No es asunto tuyo\". \"Tu lucha es inútil\". - Esas frases resonaban en su cabeza una y otra vez. En aquel entonces, era solo un maestro, un pequeño diputado. Ahora, estaba escribiendo la historia. Borís se detuvo, levantando la cabeza. La luna, que iluminaba su camino en la oscuridad, le pareció algo familiar y cercano. Era un cuerpo celeste familiar que influía en la vida de toda la humanidad cada día. La usábamos como guía, le rezábamos y nos esforzábamos por alcanzarla. ¡Todo esto, por un simple bloque de roca! ¡Eso es todo! ¿Cómo puede una simple roca sin nada especial volverse importante en este mundo?\nNadezhdin sonrió ampliamente. Olvidándose del viento fresco que soplaba sobre él, sintió una suave calidez.\n¿Quizás ahora él también era una especie de roca?"
 russia.843.a: "Todo es posible..."
 russia.844.d: "El proceso de desmantelamiento del ONF ha comenzado. ¡Es hora de destruir este mecanismo de estancamiento y apatía política en nuestro país! Habiendo dado el primer paso, abandonamos ostentosamente el frente y llamamos a toda la población del país a activar una posición cívica. Pero después de eso, resultó que nuestro movimiento necesitaba un nombre. Uno pegadizo e interesante, para captar la atención de la gente. ¡Para que sepan que hay un partido que defiende sus intereses! Afortunadamente, ya tenemos algunas opciones en mente."
 russia.844.a: "Unión Cívica"
 russia.844.b: "Frente Cívico Panruso."

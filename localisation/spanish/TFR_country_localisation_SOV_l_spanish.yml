 launch_a_cprf_campaign: "£SOV_propaganda_text_icon Campaña por el §RPCFR§!"
 launch_a_cprf_campaign_desc: "\n\n\n\n\n£GFX_SOV_CPRF_banner\n\n\n\n\n\nEl PCFR es un defensor de la clase obrera rusa, el segundo partido más grande de la Duma rusa, que lucha con tenacidad contra el gobierno oligárquico y la pobreza, por los derechos de los trabajadores y, por supuesto, por la eventual restauración de la Madre Patria Soviética. Mientras muchos comunistas \"atípicos\" gritan \"¡Revisionismo!\", son esos marxistas quienes dejaron que los trabajadores rusos se pudrieran, mientras esperan cómodamente la revolución. El PCFR no lo hizo; aceptó la política parlamentaria solo para tener una audiencia más amplia y una plataforma para la agitación y la reforma.\nCon el sentimiento comunista aún fuerte en Rusia, el segundo partido puede convertirse en el primero."
 launch_a_ldpr_campaign: "£SOV_propaganda_text_icon Campaña por el §8PLDR§!"
 launch_a_ldpr_campaign_desc: "\n\n\n\n\n£GFX_SOV_LDPR_banner\n\n\n\n\n\nEl PLDR se enorgullece de ser el primer partido formado en la Unión Soviética tras el declive del PCUS. El tercer partido más grande de la Duma, liderado por el carismático showman Vladímir Zhirinovski, a pesar de su nombre, se nutrió del apoyo no solo de las pequeñas empresas, sino también de nacionalistas, monárquicos y otros revanchistas. Anticomunista hasta la médula, y con una línea dura en materia de inmigración y oligarcas, cuenta con una base electoral leal y medios para expandirla. Si algo ocurre, el PLDR será el primero en optar por la opción más radical. Zhirinovski desea que Rusia recupere su Orgullo Nacional y hará todo lo posible por lograrlo."
 launch_a_liberal_campaign: "£SOV_propaganda_text_icon Campaña por los §Gliberales§!"
 launch_a_liberal_campaign_desc: "Ya tebia yebal gadit nas srat tak. Ya tega yegal mogol srat na nas govda. Ya tegayegad mogol sdat nad mogo. Ya tegayega mogo taka mogo. ya taga mogo taka vodo moga.ya tega poto moga podo rody mogo pira tora.ya mogo tara... ... via moby_54_msk. Zdravstvuite Martin Alekseievich! Ya tebiayebal gad srat na nas govna. Ya tebiayebal gadit nas srat tak. Ya tegayegal mogol srat na nas govda. Ya tegayegad mogol sdat nad mogo. Ya tegayega mogo taka mogo.ya taga mogo taka vodo moga.ya tega poto moga podo rody mogo pira tora.ya mogo tara poto ravo goda mogo mara mira bora poto doro nora tova karayego jora poto shoria chasa voda poto mira yego ura poty zhora poto mira yego shory vado iga poto dora poto bory vado godu schora poto yego."
 launch_a_ur_campaign: "£SOV_propaganda_text_icon Campaña por §CRusia Unida§!"
 launch_a_ur_campaign_desc: "\n\n\n\n\n£GFX_SOV_UR_banner\n\n\n\n\n\nRusia Unida es una potencia política hegemónica en Rusia, con décadas en el poder. A pesar de las voces de sus detractores que se autoproclaman \"políticamente justas\", la mayoría de los rusos aún elige a Rusia Unida por dos razones principales: estabilidad y un avance firme. A diferencia de sus principales rivales políticos, Rusia Unida no busca revivir la URSS ni el Imperio; para ellos, la Federación es lo que Rusia es ahora y seguirá siendo; perseguir fantasmas del pasado solo puede conducir a la ruina. Los principales objetivos políticos de Rusia Unida son la soberanía en todas las esferas de la vida en Rusia y promover un mundo multipolar."

 SOV_leader_russia_needs: "[SOV_leader_russia_needs_loc]"
 SOV_leader_russia_needs_desc: "Rusia es una nación de revolución y una nación de tradición, se podría decir que la revolución es parte de su tradición, tuvimos la República en 1917 y la revolución soviética poco después, y de nuevo una República surgió en el 91, luego en el 22 volvió a caer por elección y ahora de nuevo este año estamos renaciendo Rusia. Solo reviviendo el estalinismo bajo la atenta mirada de Kvachkov podemos esperar regresar de esta humillación, en nuestra hora más oscura fue el socialismo de hierro de Stalin el que nos levantó de las garras de la derrota y nos entregó el Imperio más grande que el pueblo ruso jamás conoció, extendiéndose desde el Pacífico hasta las colinas de Turingia."
 SOV_release_navalny: "[SOV_release_navalny_loc]"
 SOV_release_navalny_desc: "Aleksandr Duguin es una figura cuestionable, pero con la que deberíamos entablar una buena amistad. Su estrecha amistad con personas como Limónov y Putin lo pone en tela de juicio, pero como líder innegable del nacionalsindicalismo ruso, es un político que abarca una parte importante de la ultraizquierda y aumentará sustancialmente nuestro apoyo, ya que nuestro neoestalinismo no está muy separado de este \"nacionalsindicalismo\". Algunos en nuestras filas gritan que es un usurpador, un fascista; son cautelosos y la cautela nunca llevó a nadie a ninguna parte."
 SOV_form_the_new_government: "[SOV_form_the_new_government_loc]"
 SOV_form_the_new_government_desc: "El PCFR ha caído muy lejos de sus días de gloria bajo Rashkin; su guía es como una serpiente que exprime todo el carácter del partido como si fuera un trapo mojado. El PCFR solo puede ser redimido por una Nueva Gran Purga, separando el trigo de la paja y restaurando a la vieja guardia en el poder por cualquier medio necesario. Incluso si eso significa apuñalar a algunos viejos amigos por la espalda."
 SOV_utilize_rashkinites: "[SOV_utilize_rashkinites_loc]"
 SOV_utilize_rashkinites_desc: "Los ziuganovistas representan la vieja guardia del PCFR, marginados por el grupo de Rashkin en las elecciones del 22. Estos intransigentes del partido, despreciados, formarán una base moderada para nuestro movimiento neoestalinista. La nueva Vanguardia de Kvachkov utilizará a estos viejos burócratas para estabilizar el régimen en sus primeros días; su utilidad a largo plazo puede ser limitada, pero por ahora nos darán la legitimidad para impulsar acciones anti-Rashkin sin preocuparnos por el colapso."
 SOV_save_ideas_of_communism: "Salvar las ideas del comunismo"
 SOV_save_ideas_of_communism_desc: "El comunismo ha sido manchado y casi arruinado por el reformismo; las reformas imprudentes de Rashkin fueron solo el último intento de liberalizar el comunismo, de hacerlo compatible con el \"libre mercado\". Presidente tras presidente, Gorbachov, Brézhnev, Jruschov, casi era demasiado tarde para nosotros. Kvachkov nos devolverá al camino correcto, el camino de Lenin y el camino de Stalin; la Edad de Oro soviética volverá a estar sobre nosotros, podremos desechar el modelo chino de una vez por todas."
 SOV_emergency_privatization: "[SOV_emergency_privatization_loc]"
 SOV_emergency_privatization_desc: "Bajo el sistema de Rashkin, a los trabajadores se les dio una economía de mercado limitada, se creó una clase media, se creó una clase alta, la cooperación de clases se convirtió en la fuerza impulsora de la economía de la Unión. La misma llamada cooperación de clases de la que hablaban los fascistas en su apogeo, esta perversión del trabajo es inaceptable, la clase trabajadora es igual. No puede haber clase alta, media y baja, cada hombre tiene su trabajo y esa es su clase, cada hombre tiene la capacidad de ser cualquier cosa siempre y cuando dedique su vida a ello. De minero a capataz, de funcionario a presidente, la movilidad social no se gana con dinero, se gana con contribuciones laborales y sudor y sangre."
 SOV_start_over: "Empezar de nuevo"
 SOV_start_over_desc: "Kvachkov ha sentado las bases para un futuro neoestalinista, el resurgimiento del partido como fuerza de vanguardia está casi completo, ahora todo lo que queda por hacer es optimizar la burocracia, preparar al ejército, la industria y al pueblo para una segunda e inevitable Gran Guerra Patria contra los cerdos capitalistas occidentales y sus estados vasallos tallados de nuestras tierras centrales."
 SOV_leader_russia_needs_1: "El líder que Rusia necesita"

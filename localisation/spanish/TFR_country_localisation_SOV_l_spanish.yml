l_spanish:
 russia.1.t: "Alekséi Navalni ingresado en el hospital"
 russia.1.d: "El opositor ruso Alekséi Navalni se encuentra en coma en el hospital por un presunto envenenamiento, según ha informado su portavoz. El activista anticorrupción cayó enfermo durante un vuelo y el avión realizó un aterrizaje de emergencia en Omsk, donde los médicos dijeron que había caído en coma y que estaban intentando salvarle la vida. Su equipo sospecha que le pusieron algo en el té que tomó en una cafetería del aeropuerto. El Kremlin dijo que le deseaba a Navalni una \"rápida recuperación\".\n\nNavalni, de 44 años, ha sido durante años uno de los mayores críticos del presidente Vladímir Putin. Navalni se encuentra conectado a un respirador y en coma, y el hospital está ahora lleno de agentes de policía. Todas sus pertenencias fueron confiscadas, explicó su esposa. También dijo que los médicos estaban inicialmente dispuestos a compartir cualquier información, pero luego afirmaron que las pruebas toxicológicas se habían retrasado y que \"claramente estaban ganando tiempo y rehusándose a decir lo que sabían\"."
 russia.1.a: "Vigilad atentamente su condición."
 russia.2.t: "Protestas masivas contra el arresto de Alekséi Navalni"
 russia.2.d: "Decenas de miles de manifestantes ignoraron el sábado el frío extremo y las advertencias de la policía para exigir la liberación del crítico del Kremlin Alekséi Navalni. Navalni había llamado a sus partidarios a protestar después de ser arrestado el fin de semana pasado cuando regresaba a Rusia desde Alemania por primera vez desde que fue envenenado con un agente nervioso que, según dice, le fue suministrado por agentes de seguridad del Estado en agosto.\n\nPero los manifestantes desafiaron la prohibición e, inclusive con temperaturas inferiores a -45 grados centígrados, salieron en masa. Leonid Vólkov, un aliado de Navalni, les pidió que hicieran lo mismo el próximo fin de semana para tratar de liberar a Navalni de lo que llamó \"las garras de sus asesinos\". En el centro de Moscú, donde los periodistas de Reuters calcularon que hasta 40.000 personas se habían reunido en una de las mayores manifestaciones no autorizadas en años, se vio a la policía deteniendo brutalmente a manifestantes y metiéndoles en furgonetas cercanas. Algunos manifestantes corearon \"Putin es un ladrón\", \"Desgracia\" y \"¡Libertad para Navalni!\"."
 russia.2.a: "¡Aplastad a esas cucarachas occidentales!"
 russia.11.t: "Gran protesta en Jabárovsk"
 russia.11.d: "Los partidarios del gobernador Serguéi Furgal, detenido por ordenar asesinatos, organizaron protestas no autorizadas en el Krai de Jabárovsk. La mayor infracción tuvo lugar en el centro de Jabárovsk: los manifestantes se reunieron en la plaza Lenin, cerca de la administración del gobernador y del gobierno regional, luego marcharon por las calles centrales de la ciudad y regresaron a la plaza, donde continuaron la manifestación. Según el gobierno local, entre 15.000 y 20.000 personas participaron en la marcha. La policía no detuvo a nadie. La manifestación, que duró unas cuatro horas, recogió firmas en apoyo de Furgal y dio la palabra a todo aquel que quisiera hablar. El Ayuntamiento de Jabárovsk no recibió ninguna solicitud para la manifestación y no pudo aprobarla, ya que todas las congregaciones masivas están prohibidas debido a la pandemia. También se celebró una marcha no autorizada en Komsomolsk del Amur, donde se manifestaron más de mil personas. Y en la ciudad de Bikin, unas 50 personas salieron a la calle en apoyo de Furgal."
 russia.11.a: "Vigilad la situación de cerca."
 russia.11.b: "¡El pueblo habla!"
 russia.12.t: "La policía disuelve congregaciones opositoras"
 russia.12.d: "La violencia ha estallado en múltiples mítines políticos entre la policía y partidarios del PLDR y el PCFR. Al principio, los enfrentamientos se producían tan solo entre ambos bandos, hasta que las peleas callejeras desencadenaron en peleas que se extendieron por toda la ciudad. Se enviaron decenas de policías antidisturbios para acabar con los enfrentamientos, pero su presencia no ha hecho más que avivar la violencia. Se han informado de que casi 20 personas han muerto en estos enfrentamientos y que hay muchas más heridas."
 russia.12.a: "¡Hemos de mantener el orden!"
 russia.13.t: "Ramzán Kadírov apoya a Medvédev"
 russia.13.d: "El líder de la República de Chechenia ha anunciado su apoyo al candidato de Rusia Unida, Dmitri Medvédev. Esta decisión no es ninguna sorpresa, ya que el propio Kadírov era muy cercano a la anterior administración. De todos modos, su apoyo será sin duda útil en el futuro."
 russia.13.a: "Bien hecho."
 russia.14.t: "Partido de los Pensionistas apoya al PLDR"
 russia.14.d: "En el reciente congreso del Partido Ruso de los Pensionistas, sus líderes anunciaron su apoyo al candidato del PLDR. En sus discursos, destacaron el apoyo monetario de Zhirinovski a la población de mayor edad y los programas sociales del PLDR que apoyan la mejora de las viviendas para los ancianos. Al final, instaron a todos sus votantes y a los votantes de los partidos afines a votar por el PLDR y a comprometerse a realizar campañas electorales conjuntas en toda Rusia."
 russia.14.a: "Interesante."
 russia.15.t: "El OMON disuelve una protesta"
 russia.15.d: ""
 russia.15.a: "¡Horrible!"
 russia.16.t: "El OMON disuelve una protesta"
 russia.16.d: ""
 russia.16.a: "¡Horrible!"
 russia.17.t: "Duguin anuncia las ambiciones de Rusia"
 russia.17.d: "En una intervención televisada, Aleksandr Duguin anunció que ahora más que nunca había llegado el momento de que Rusia se posicionara a si misma en el escenario mundial. Su discurso fue recibido en su mayoría con opiniones positivas entre los miembros del Partido Eurasiático y, sorprendentemente, muchos de fuera de él evaluaron el discurso positivamente. Duguin también había hablado brevemente sobre la posibilidad de ser elevado al Consejo de la Federación."
 russia.17.a: "Empezó la nueva era."
 russia.18.t: "Primeros casos de COVID en Rusia"
 russia.18.d: "Los primeros casos de coronavirus han sido registrados en ciudadanos que regresaban de viajes a China. Si bien el número de infectados es bajo actualmente, debemos dotar a esta situación de una gran importancia para que la situación no se salga de control."
 russia.18.a: "Es nuestro problema ahora."
 russia.19.t: "Las manifestaciones se vuelven violentas"
 russia.19.d: "Lo que empezaron siendo manifestaciones relativamente pacíficas a lo largo de toda la federación rápidamente se convirtió en disturbios. Los manifestantes han empezado a lanzar fervorosamente piedras, cócteles molotov y fuegos artificiales a la policía y a los agentes antidisturbios. Inclusive quemando coches y varios edificios gubernamentales. Muchos en las redes sociales se apresuraron a señalar a Duguin por supuestamente haber provocado y promovido a varios alborotadores para que atacaran a los empleados del gobierno en un intento de obtener más apoyo y control sobre el Consejo de la Federación. Otros lo llamaron fascista, algo que Duguin se apresuró a denunciar al afirmar que los valores de su partido honraban las 20 millones de vidas perdidas en la lucha contra la Alemania nazi."
 russia.19.a: "Pronto llegará el orden."
 russia.20.t: "Vladímir Putin, enfermo con COVID-19"
 russia.20.d: "Tras su último viaje al Cáucaso, el presidente contrajo la infección por coronavirus COVID-19. Su estado de salud está siendo monitorizado por los mejores médicos."
 russia.20.a: "Preocupante."
 russia.21.t: "Duguin Implanta el Estado de Emergencia"
 russia.21.d: "Las protestas han estado al alza desde que Aleksandr Duguin asumió el rol de Presidente de la Federación. Los ataques contra edificios gubernamentales han aumentado, así como la quema de otros edificios y las amenazas hacia familiares de personas discordantes. Los antidisturbios en la capital lo tuvieron difícil para dispersar a los manifestantes. Incluso en Siberia y en el Extremo Oriente ruso, los manifestantes cortaron las carreteras para evitar que el ejército y la policía reforzasen a la sobreextendida policía de las ciudades. Duguin ha sido rápido en tomar acción. Los cabecillas han de ser encontrados y neutralizados"
 russia.21.a: "Ha llegado el momento."
 russia.22.t: "Rusia exige la retirada de la UE"
 russia.22.d: "El Gobierno ruso ha lanzado un comunicado oficial exigiendo que el Gobierno finlandés cese el contacto con miembros de la UE y su retirada de esta."
 russia.22.a: "No olvidamos 1941."
 russia.23.t: "Finlandia acepta los términos"
 russia.23.d: "Los diplomáticos finlandeses fueron presionados a aceptar los términos presentados. Se han retirado de la UE"
 russia.23.a: "Increíble."
 russia.32.t: "Edward Snowden publica dosier"
 russia.32.d: "Parece que Edward Snowden no puede mantener sus sucias manos alejadas de todo. Ha publicado un nuevo expediente en línea que supuestamente detalla los verdaderos hechos que llevaron a la muerte de Vladímir Putin. Los documentos acusaron a Aleksandr Duguin de orquestar el asesinato. La policía local arrestó rápidamente a Snowden y se están tomando medidas para frenar la difusión de este expediente."
 russia.32.a: "Maldita rata."
 russia.33.t: "Edward Snowden desaparece"
 russia.33.d: "El centro penitenciario donde Edward Snowden estuvo recluido informó de su repentina desaparición mientras era trasladado a otro centro. El convoy, que incluía dos jeeps y un autobús con Snowden, inició su viaje en un lugar no revelado. Acababa de pasar por la ciudad de Mystichi cuando se perdió todo contacto. Las fuerzas del orden locales están desconcertadas y ya se señala a Duguin."
 russia.33.a: "¿A donde fue ese bastardo?"
 russia.37.t: "Revisión del Presupuesto Militar"
 russia.37.d: "Tras un año tumultuoso, nos enfrentamos a numerosas amenazas y obstáculos, tanto nacionales como internacionales. Por un lado, los problemas económicos internos provocados por la pandemia de COVID-19 y la inestabilidad generada por la reforma de las pensiones han generado demandas de inversión interna. Por otro lado, la inteligencia militar indica una inestabilidad generalizada en nuestro adversario, Estados Unidos, y el deseo de obtener más fondos para explotar esta debilidad."
 russia.37.a: "Aumentar nuestro gasto interno."
 russia.37.b: "Aumentar nuestro presupuesto militar."
 russia.38.t: "Lazos sino-rusos fortalecidos"
 russia.38.d: "Gracias a las recientes negociaciones con funcionarios chinos, hemos logrado firmar numerosos tratados fructíferos de cooperación tecnológica y comercial entre nuestros países. Esperamos que esta colaboración continúe, ya que está demostrando ser muy beneficiosa para nuestra economía."
 russia.38.a: "¡Un brindis por nuestros amigos chinos!"
 russia.39.t: "Informe Económico Ruso: 2019"
 russia.39.d: ""
 russia.39.a: "Hay mucho que hacer."
 russia.40.t: "Lukashenko solicita nuestro apoyo"
 russia.40.d: "Nuestro homólogo bielorruso, Aleksandr Lukashenko, lleva meses enfrentando incesantes protestas de revolucionarios de color respaldados por la CIA. A pesar de sus esfuerzos, parece estar al borde del abismo, mientras manifestantes antigubernamentales marchan hacia edificios gubernamentales. En una llamada telefónica privada con el presidente Putin, instó a la intervención y ayuda rusas a cambio de aceptar finalmente el Estado de la Unión."
 russia.40.a: "¡Hacia Minsk!"
 russia.40.b: "No podemos arriesgar más provocación."
 russia.41.t: "¡Occidente nos sanciona!"
 russia.41.d: "Tras nuestra operación pacífica en Bielorrusia, la ONU celebró una sesión para condenar la acción militar contra manifestantes pacíficos. Nuestros enemigos votaron unánimemente a favor de imponer un nuevo conjunto de sanciones. Nuestro representante se opuso a las sanciones, denunciando las acciones hostiles previas de la OTAN y exigiendo el fin de sus sanciones. En cualquier caso, estas sanciones resultarán infructuosas..."
 russia.41.a: "Resistiremos."
 russia.42.t: "Atentado al aeropuerto de Moscú"
 russia.42.d: "La tragedia azotó hoy Moscú cuando 10 hombres armados y enmascarados irrumpieron en el Aeropuerto Internacional Sheremétievo esta mañana. El ataque duró 25 minutos hasta que llegaron las Fuerzas Especiales Rusas y lograron detener a los perpetradores. Lamentablemente, 42 personas murieron, incluyendo 6 valientes policías que dieron su vida en defensa del pueblo. Llegan condolencias de todo el mundo, mientras lamentamos juntos la pérdida de las víctimas de otro ataque."
 russia.42.a: "Oramos por las víctimas."
 russia.43.t: "Ucrania se retira del Protocolo de Minsk"
 russia.43.d: "El provocador régimen de Kiev ha anunciado su retirada del Protocolo de Minsk. La decisión se produjo tras la continua provocación del Estado Federal de Novorrusia. Esta es otra afirmación infundada del régimen de Zelenski para pisotear los derechos de la minoría rusa."
 russia.43.a: "Un intento temerario."
 russia.44.t: "Mijaíl Mishustin anuncia elecciones anticipadas"
 russia.44.d: "El presidente interino Mijaíl Mishustin aún no se ha atrevido a completar su mandato y anunció nuevas elecciones presidenciales en las que no se considera candidato."
 russia.44.a: "¿Qué sigue?"
 russia.45.t: "Preparativos para las próximas elecciones presidenciales"
 russia.45.a: "Apoyar al PCFR."
 russia.45.b: "Apoyar al PLDR."
 russia.45.c: "Apoyar a Rusia Unida."
 russia.45.d: "Apoyar al Partido Eurasia"
 russia.45.e: "Apoyar a Rusia del Futuro."
 russia.46.t: "El PCFR gana las elecciones"
 russia.46.d: "En un evento electoral monumental que sin duda quedará grabado en los anales de la historia rusa, el Partido Comunista de la Federación de Rusia se alzó con la victoria, provocando oleadas de júbilo en las calles de Moscú y otros importantes centros urbanos. La imagen de las banderas de la victoria ondeando al viento junto a las banderas soviéticas fue un símbolo conmovedor del rotundo triunfo alcanzado.\n\nA pesar de la euforia que invadió a la nación, hubo voces disidentes que intentaron sembrar dudas sobre la legitimidad de los resultados electorales. Se inventaron acusaciones de fraude y teorías conspirativas infundadas para intentar socavar la trascendencia de la victoria del Partido Comunista. La prensa occidental, siempre dispuesta a dar la alarma y sembrar el miedo, pintó al Partido Comunista como un bastión de nacionalistas y revanchistas, decidido a restaurar la URSS y que representaba una grave amenaza para el imperialismo occidental.\nSin embargo, en medio de la cacofonía de escepticismo y alarmismo, una verdad innegable permaneció: el pueblo había hablado. Con sus votos, había expresado un ferviente deseo de que resurgiera la gloriosa Unión que antaño fue un faro de esperanza y fortaleza."
 russia.46.a: "¡Comunistas, adelante!"
 russia.47.t: "El PLDR gana las elecciones"
 russia.47.d: "Estas elecciones están a punto de marcar un punto de inflexión histórico en el panorama político de Rusia. Tras años de incansables esfuerzos, Vladímir Zhirinovski y su partido, el PLDR, han salido victoriosos, venciendo a los remanentes del régimen bolchevique y a la red de oportunistas corruptos que han plagado la nación.\nTras el anuncio de los resultados electorales, Zhirinovski tomó el escenario central para pronunciar uno de sus característicos discursos apasionados. Habló con fervor sobre la necesidad de iniciar una nueva era para Rusia, una que permita restaurar al país a su antigua gloria y grandeza.\nA ojos de los analistas políticos occidentales, nuestra victoria ha sido calificada como la \"Mayor Catástrofe Geopolítica\". Advierten que no se nos debe tachar de simples populistas, advirtiendo que no somos simplemente un partido de ultranacionalistas, sino una fuerza a tener en cuenta, decidida a revivir el legado imperial de Rusia. Parece que esta vez, sus advertencias podrían tener algo de cierto.\n\nEl destino de Rusia ahora está firmemente en manos de Zhirinovski y el PLDR, quienes se embarcan en una misión para transformar el futuro del país y recuperar su estatus como potencia mundial."
 russia.47.a: "¡Poder y fuerza - Gran Rusia!"
 russia.48.t: "EP Toma el Control"
 russia.48.d: ""
 russia.48.a: "Nuestros planes pueden continuar."
 russia.49.t: "Rusia Unida gana las elecciones"
 russia.49.d: "En una reñida batalla electoral que capturó la atención nacional, Rusia Unida salió victoriosa, provocando una mezcla de júbilo y decepción entre la población. El carismático Dmitri Medvédev, hombre de confianza de Vladímir Putin, conquistó el corazón de muchos rusos con sus apasionados discursos y su firme compromiso de defender el legado de su mentor. El electorado ruso, en una decisiva muestra de confianza, depositó su fe en un gobierno estable y fiable, optando por la continuidad en lugar de la incertidumbre que plantean las facciones extremistas en ambos extremos del espectro político.\nSin embargo, los medios occidentales vieron la victoria de Medvédev con inquietud, destacando su retórica cada vez más antioccidental y antiglobalización a lo largo de los años. Reconocieron que el Medvédev de los años 2020 no es el mismo que asumió el cargo en 2008, advirtiendo que Occidente debería prepararse para un aumento de las tensiones y posibles confrontaciones en los próximos años. Con Medvédev ahora al mando, hará todo lo posible para terminar lo que Vladímir Vladímirovich Putin ha comenzado."
 russia.49.a: "¡Vperod, Rossiya!"
 russia.50.t: "RJ-PV gana las elecciones"
 russia.50.d: "Para sorpresa de muchos, nuestro partido, RJ-PV, logró la victoria en las últimas elecciones, y ahora Serguéi Mirónov se erige como el nuevo presidente de nuestro gran país. ¡Hay mucho trabajo por hacer! Rusia sufre una oligarquía corrupta y un desarrollo estancado, y para colmo, la expansión de la OTAN y su Gobierno títere en Kiev amenazan la existencia misma de nuestra nación.\n\"Rusia Justa\", un partido socialista, debe tomar medidas decisivas contra los males de la sociedad. También debemos considerar cuidadosamente el camino que debe seguir el sistema político ruso. Es un momento crítico para nuestra nación, y debemos trabajar incansablemente para lograr un cambio positivo y asegurar un futuro brillante para todos los ciudadanos rusos."
 russia.50.a: "El pueblo ha hablado."
 russia.51.t: "Investigación sobre la muerte del presidente"
 russia.51.d: "¿Se avecina una guerra?"
 russia.51.a: "¡Fue un radical del partido comunista!"
 russia.51.b: "¡Un seguidor fanático de Zhirinovski!"
 russia.51.c: "El presidente murió de causas naturales."
 russia.52.t: "Medvédev hace llamado a la unidad rusa"
 russia.52.d: "Ante los recientes acontecimientos que conmocionaron a toda Rusia, el vicepresidente del Consejo de Seguridad, Dmitri Medvédev, emitió una declaración instando a los ciudadanos rusos a no dejarse llevar por el pánico y a mantenerse unidos, afirmando que la unidad del pueblo es lo que siempre ha permitido a Rusia superar cualquier adversidad."
 russia.52.a: "Es inútil dividirnos."
 russia.53.t: "Zhirinovski reparte dinero a los pobres"
 russia.53.d: "Hoy, el líder del PLDR, Vladímir Zhirinovski, fue visto repartiendo dinero generosamente a la gente en la Plaza Roja. Al preguntársele por qué, Zhirinovski respondió que \"todos somos siervos... sin derechos, sin caballos y sin hogar\", y que la gente necesita toda la ayuda posible.\n\nAunque algunos lo consideraron gracioso o humillante, esta acción sin duda mejoró la visibilidad de Zhirinovski en las próximas elecciones."
 russia.53.a: "Interesante."
 russia.54.t: "El PLDR y el PCFR se unen contra la corrupción"
 russia.54.d: "De forma aparentemente aleatoria, simpatizantes de ambos partidos se unieron en los mítines para protestar contra Rusia Unida. Corearon frases contra Dmitri Medvédev y su gabinete por su corrupción y sus interminables vínculos con oligarcas. La campaña continuó en línea con la formación de una extraña alianza entre la izquierda y la derecha. A pesar de su odio mutuo, su objetivo de éxito solo se ve obstaculizado por una entidad..."
 russia.54.a: "El enemigo de mi enemigo es mi amigo."
 russia.55.t: "Bielorrusia permite vuelos desde Siria"
 russia.55.d: ""
 russia.55.a: "Interesante."
 russia.56.t: "Amigos en las altas esferas"
 russia.56.d: "Conservarte no es un beneficio, destruirte no es una pérdida."
 russia.56.a: "No, se acabó."
 russia.57.t: "[SOV_cprf_candidate] restaura la RSFS de Rusia"
 russia.57.d: "Un espectro se cierne sobre Europa: el espectro del comunismo. Contra este espectro se han conjurado en santa jauría todas las potencias de la vieja Europa: los oligarcas y Rusia Unida, Baerbock y Colonna, los radicales alemanes y los espías policiales estadounidenses.\n\nA pesar de la muerte de la Unión en 1991, parece un espectro, la Unión ha vuelto de entre los muertos. Hoy, el presidente recién elegido, [SOV_cprf_candidate], al aprobar una ley que cambia el nombre del país, ha declarado el fin de la Federación de Rusia y el renacimiento de la República Socialista Federativa Soviética de Rusia.\n\nEl himno de la Unión Soviética, anunciado ante una multitud en el país, se entonó por primera vez en más de tres décadas, cantado al unísono con la multitud en las calles. Aunque la actitud en el país es jubilosa con la esperanza de un retorno al estatus de superpotencia y a la gloria de la antigua Unión, la comunidad internacional ha sido mixta. Las reacciones del antiguo bloque del Este han sido las más duras: los países bálticos han advertido contra la repetición de los errores del siglo XX y Ucrania ha denunciado la medida."
 russia.57.a: "¡Todo el poder a los sóviets!"
 russia.58.t: "Anexión de Abjasia y Osetia del Sur"
 russia.58.d: "¡Nuestro país crece!"
 russia.58.a: "¡Hurra!"
 russia.59.t: "Invitación a reincorporarse a la URSS"
 russia.59.d: ""
 russia.59.a: "Sí."
 russia.59.b: "VETE A LA MIERDA."
 russia.60.t: "Inicio de la operación Aleksandr"
 russia.60.d: "A las [GetDateText], nuestras fuerzas aerotransportadas despegaron desde múltiples bases aéreas, adentrándose en el espacio aéreo de la OTAN. Muchos miembros del Estado Mayor cuestionaron la operación, calificándola de desesperada; de hecho, esta masiva operación aerotransportada es la mayor desde la Gran Guerra Patria. Volando sin indicativos o con una identificación civil falsa, penetraron con éxito las defensas aéreas de la OTAN. Creyendo que eran vuelos civiles que huían del caos, las fuerzas polacas quedaron completamente sorprendidas al ver que sus bases aéreas eran atacadas."
 russia.60.a: "Que nos sirvan bien."
 russia.61.t: "Alzamiento paramilitar polaco"
 russia.61.d: "A medida que nuestras fuerzas terrestres avanzaban por Polonia, recibíamos cada vez más informes de actividad guerrillera paramilitar en territorio ocupado. Combatirlos ha resultado difícil; transmisiones de radio interceptadas han revelado su rígida estructura organizada. Se han formado compañías en cada región administrativa de Polonia."
 russia.61.a: "Ya fueron aplastados, lo volveremos a hacer..."
 russia.62.t: "Ruski Mir"
 russia.62.d: "Han transcurrido tres largas décadas desde la caída de la URSS, y el Estado ruso ha trabajado lentamente para reconstruirse tras el caos de los años 90. Bajo el liderazgo de Vladímir Putin, nuestro país ha recuperado parte de su prestigio internacional, aunque aún estamos lejos de nuestro antiguo prestigio. Rusia se enfrenta a la oposición del llamado \"mundo occidental civilizado\", que nos critica por ser \"retrógradas\" y \"despóticos\" mientras predican \"libertad\". En realidad, solo buscan dividir y vencer. Nos oponemos a ellos como defensores de una nueva perspectiva geopolítica: la multipolaridad. Actualmente, mientras Estados Unidos mira hacia otros países y hacia el interior, el foco de la rusofobia se desplaza hacia Europa, ya que su élite globalista desea utilizar a Ucrania como punta de lanza contra nosotros, lo que hace inevitable un conflicto para el que debemos prepararnos.\n\nTrabajamos para luchar por nuestra soberanía y nuestro estilo de vida contra los colonialistas de los \"mil millones de oro\" y sus intentos de destruir a todos aquellos que se les resisten. Seguiremos apoyando a las fuerzas antiglobalistas enviando ayuda a quienes en Medio Oriente y África comparten nuestra misma opinión. En este mundo cada vez más inestable y enfurecido, podríamos conseguir lo que queremos o perderlo todo. Puede que nuestro poderoso laberinto de jrushchovkas albergue a varias personas con opiniones diversas, pero todos los patriotas comparten un mismo pensamiento..."
 russia.62.a: "\"¡Rusia debe sobrevivir!\""
 russia.63.t: "EXPEDIENTE Nº 478: DEPORTACIÓN DE NO RUSOS"
 russia.63.d: ""
 russia.63.a: "Excelente."
 russia.64.t: "Nombramiento del director del Gosplán"
 russia.64.d: "Con la necesaria reestructuración del Gosplán para dirigir nuestra economía, también debemos elegir un líder para una estructura tan importante.\n\nTenemos varias opciones. La primera es Nikolái Koloméitsev, quien ha demostrado en numerosas ocasiones su capacidad organizativa en nuestra lucha.\n\nNuestra segunda opción es Vladímir Kashin, un veterano pero confiable funcionario del partido con un alto nivel de formación.\n\nFinalmente, algunos han señalado que Aleksandr Galushka, autor de un libro sobre el sistema económico de Stalin y exestadista, podría ser muy eficaz en el cargo, aunque no parece ser un candidato popular dentro del partido.\n\n¿Cuál deberíamos elegir?"
 russia.64.a: "Nikolái Koloméitsev nos vendrá bien."
 russia.64.b: "Vladímir Kashin sabe lo que hace."
 russia.64.c: "El conocimiento económico-histórico de Galushka es necesario."
 russia.65.t: "Privet, malyshka"
 russia.65.d: "Querida Yankova:\n\nEspero que esta carta te encuentre bien. Lamento no haberte escrito mucho; nos hemos estado mudando constantemente y a menudo no tengo tiempo para sentarme y descansar. Espero que las cosas no te hayan resultado demasiado difíciles en casa. ¿Tu hermano se encuentra bien?\n\nPercibiste que estaba edulcorando las cosas en mi carta anterior, así que seré sincera esta vez: no puedo describir con palabras lo miserable que es la situación aquí. Dondequiera que vamos, veo ciudades y pueblos en ruinas, casas donde la gente vive o vivió, destrozadas y destrozadas, como si fueran narcotraficantes. El frente es inconmensurablemente esporádico, y no puedo determinar si estamos ganando la guerra o no. Ganamos terreno en algunos lugares y lo perdemos en otros con la misma rapidez. La mayoría de los lugares que disputamos son disputados arduamente, y los disparos rara vez cesan. El ruido me está matando más que las balas y los proyectiles de artillería. Apenas puedo dormir cuando no estoy de guardia.\n\nLos hombres de los que te hablé en mi carta anterior, Koptsev y Stepanov, murieron hace tiempo. Sus muertes son la razón por la que no me he animado a escribirte, así como la razón por la que dudo en hacer más amigos aquí. Al principio, pensé que era una exageración, pero es una lamentable realidad que cualquiera puede morir en cualquier momento. Lamento que la oferta de trabajo de Stepanov para tu hermano ya no esté en pie.\n\nEcho de menos mi casa. Echo de menos cuando me despertaba el canto de los pájaros, en lugar del sonido de explosiones lejanas. Pero te echo de menos a ti, más que a nada. Mi único deseo es que la guerra termine pronto, para poder volver a abrazarte como antes. Con suerte, podré hacerlo con el tiempo.\n\nCon cariño,"
 russia.65.a: "Nikoláev Antónovich."
 russia.66.t: "Serguéi Furgal arrestado"
 russia.66.d: "El gobernador del krai de Jabárovsk fue arrestado durante la noche, acusado de estar vinculado a una serie de presuntos asesinatos a principios de la década de 2000 y de acusaciones de corrupción por parte de un destacamento de policías de Moscú. El arresto generó una reacción inmediata de la ciudadanía, con protestas iniciales en la Plaza Lenin exigiendo la liberación de Furgal y su restitución como gobernador del krai de Jabárovsk, ya que su arresto se considera una maniobra política y las pruebas han sido duramente criticadas por su escaso o nulo peso. Serguéi Kravchuk, alcalde de Jabárovsk, condenó las protestas por incumplir el confinamiento por el COVID-19 y apoyó el arresto, para gran disgusto de la ciudadanía."
 russia.66.a: "Se hará justicia."
 russia.67.t: "Se disparan protestas por el arresto de Furgal"
 russia.67.d: "El reciente arresto de Serguéi Furgal ha provocado una reacción masiva de la ciudadanía, especialmente en la región natal del exgobernador, Jabárovsk. Aunque las protestas iniciales en Moscú por el arresto en la Plaza Lenin fueron relativamente moderadas, durante la última semana las protestas han crecido hasta convertirse en marchas multitudinarias contra el arresto sancionado por el gobierno, con protestas de la misma magnitud en el krais del extremo oriental de Rusia, a orillas del Amur. Se desplegaron fuerzas policiales para monitorear la evolución de la situación; sin embargo, cada vez es más improbable que las protestas se calmen, lo que se considera una grave violación del poder gubernamental."
 russia.67.a: "¡Estos insensatos violan la cuarentena!"
 russia.68.t: "La inacción de Zhirinovski enfrenta a críticas"
 russia.68.d: "Vladímir Zhirinovski, líder del PLDR, sufrió fuertes críticas por su inacción ante el impopular arresto del gobernador de Jabárovsk, Serguéi Furgal. Las encuestas políticas más recientes mostraron una caída en la popularidad del Partido Liberal-Demócrata como resultado de la controversia en curso, y muchos simpatizantes desilusionados interpretaron esta inacción como una maniobra de Zhirinovski para mantener el favor de Vladímir Putin. Si bien Zhirinovski y su partido se niegan a hacer comentarios, la sede del partido presenció algunas manifestaciones menores en Moscú en oposición al supuesto apoyo del partido al gobierno."
 russia.68.a: "Zhirinovski está recibiendo una paliza política por nosotros."
 russia.69.t: "Zhirinovski declara su apoyo a Serguéi Furgal"
 russia.69.d: "Probablemente debido a la presión pública y a la reciente muerte de Putin, Zhirinovski y el PLDR se han sumado a las protestas contra el gobierno por el arresto de Furgal y han declarado su pleno apoyo a la oposición, exigiendo su liberación. Si bien esta medida ha recuperado gran parte de la popularidad que el partido había perdido debido a su inacción inicial, muchos la siguen considerando un intento de Zhirinovski de recuperar apoyo en las próximas elecciones, a la vez que sirve para agravar la debilitada posición del Partido Unido tras la muerte de su veterano líder y presidente."
 russia.69.a: "¡Furgal debe ser liberado!"
 russia.70.t: "Disturbios masivos en Kazajistán"
 russia.70.d: "Han comenzado protestas masivas en Kazajistán. El motivo fue el aumento del precio de la gasolina. Los manifestantes salieron a las calles en ciudades de todo el país, exigiendo la dimisión del gobierno y nuevas elecciones. En algunas ciudades, las protestas han derivado en enfrentamientos con la policía, que intenta dispersar a los manifestantes."
 russia.70.a: "¡Sigan de cerca la situación!"
 russia.71.t: "Disturbios kazajos se intensifican"
 russia.71.d: "Los informes que llegan de Kazajistán en los últimos días nos preocupan cada vez más. Lo que comenzó como protestas pacíficas por las dificultades del país en estos tiempos difíciles se ha convertido, previsiblemente, en disturbios a gran escala con miles de personas saliendo a las calles de las principales ciudades de todo el país. Si bien hay pocas dudas de que existe una corriente subterránea de preocupación pública justificada que alimenta estas protestas, no podemos evitar ver en esto las señales reveladoras de otro intento de Occidente de secuestrar otro movimiento de protesta y convertirlo en otro Maidán.\n\nSi la situación se agrava, será necesario que la OTSC inicie una acción policial para frenar esta violencia y restaurar la paz a nuestros amigos del sur. Si no lo hacemos, podría llevar a la caída del Gobierno de Kazajistán."
 russia.71.a: "Se tomará una decisión."
 russia.72.t: "Disturbios en Kazajistán sofocados"
 russia.72.d: "Tras la intervención de la Organización del Tratado de Seguridad Colectiva en su Estado miembro de Kazajistán, los disturbios que asolaron la nación han terminado con una cantidad mínima de derramamiento de sangre, gracias en gran parte a las acciones rápidas y profesionales de las fuerzas de paz rusas. Una tensa calma ha regresado una vez más a las calles de Almaty y otras ciudades importantes. Si bien muchos de los problemas del país persisten, ahora pueden resolverse pacíficamente sin más agitación en las calles.\n\nMientras tanto, nuestras tropas permanecerán en el país para asegurar que no haya una recaída en la violencia callejera. Una vez que la estabilidad haya regresado completamente a Kazajistán y el gobierno solicite nuestra retirada, las fuerzas de la OTSC concluirán sus operaciones en el país. Por ahora, podemos enorgullecernos de haber logrado lo que esperamos sean las tareas más difíciles de la operación con una profesionalidad excepcional."
 russia.72.a: "Excelente."
 russia.73.t: "Golpe al gobierno kazajo"
 russia.73.d: ""
 russia.73.a: "Dejadlos por ahora."
 russia.73.b: "¡Iniciad una operación militar!"
 russia.74.t: "Las noches de Moscú"
 russia.74.d: ""
 russia.74.a: "Todo está bien."
 russia.75.t: "Funeral de Putin"
 russia.75.d: "Hoy marcó un día sombrío en la historia de Rusia. Miles de personas, incluyendo políticos y ciudadanos comunes, se reunieron para despedir a Vladímir Vladímirovich Putin. La ceremonia tuvo lugar en la Sala de las Columnas de la Casa de los Sindicatos de Moscú, donde numerosos oradores, líderes de partidos políticos y funcionarios del gobierno presentaron sus respetos depositando flores sobre el ataúd abierto de Putin. A continuación, se celebró un funeral en la Catedral de Cristo Salvador, donde el Patriarca Cirilo ofreció oraciones por la paz eterna de Putin. Uno de los momentos más conmovedores del día fue el emotivo discurso de Dimitri Medvédev, durante el cual algunos especulan que estuvo a punto de llorar. En su discurso, Medvédev expresó su inquebrantable lealtad a la visión de Putin y lo proclamó como la figura más grande de la historia moderna de Rusia."
 russia.75.a: "Descansa en paz..."
 russia.76.t: "¡Zaluzhnyi da golpe de Estado al gobierno ucraniano!"
 russia.76.d: "Tras la toma de Kiev, parece que el presidente y la mayor parte de su gabinete fueron detenidos por fuerzas de la policía militar bajo órdenes especiales de Valerii Zaluzhnyi. En los días siguientes, el pánico y el miedo se extendieron por el resto de Ucrania, ya que el presidente perdió contacto con nadie. Muchos esperaban que siguiera vivo o que hubiera escapado a tiempo. Pero, a medida que los días se convertían en semanas, estas esperanzas se convirtieron en sueños febriles.\n\nSe desconoce el destino de [UKR.GetLeader]. El ejército ucraniano ha tomado oficialmente el control en las zonas bajo su control, pero aún no ha podido resistir ni estabilizarse debido a nuestras abrumadoras fuerzas y ataques. Algunos sectores han colapsado por completo, mientras que otros continúan; parece que se coordinan de forma independiente, lo que nos da la oportunidad de explotar su debilidad en la comunicación."
 russia.76.a: "¡Excelentes noticias!"
 russia.77.t: "¡La Federación del Sahel firma nuevos acuerdos económicos!"
 russia.77.d: ""
 russia.77.a: "¡Espléndido! ¡Un brindis por nuestros aliados africanos!"
 russia.78.t: "Pago de deudas de Siria"
 russia.78.d: ""
 russia.78.a: "¡Un brindis a nuestros aliados sirios!"
 russia.79.t: "Pago de deudas de Libia"
 russia.79.d: ""
 russia.79.a: "¡Un brindis a nuestros aliados libios!"
 russia.83.t: "Ataque químico en Obujov"
 russia.83.d: "Las fuerzas terrestres alrededor de Kiev han informado del horrible uso de armas químicas en la ciudad de Obujov. El ataque ocurrió a primera hora de la mañana durante una escaramuza alrededor de la ciudad, es posible que el ataque haya sido llevado a cabo por las fuerzas ucranianas para detener nuestro avance desde Kiev. Varias docenas de civiles fueron asesinados, así como numerosas fuerzas ucranianas y rusas. Los medios de comunicación ya han comenzado a informar sobre el ataque y culpar a nuestras fuerzas por este horrible crimen, las Naciones Unidas también han pedido un alto el fuego para investigar el área..."
 russia.83.a: "¡Una violación abominable de Ginebra!"
 russia.84.t: "Llegan los Voluntarios Soviéticos"
 russia.84.d: ""
 russia.84.a: "¡Les daremos buen uso!"
 russia.85.t: "Casos COVID en el incremento"
 russia.85.d: ""
 russia.85.a: "Preocupante..."
 russia.86.t: "Masiva ola de casos COVID"
 russia.86.d: ""
 russia.86.a: "Preocupante..."
 russia.87.t: "Desarrollo de la vacuna Sputnik V"
 russia.87.d: "Demostrando que Rusia sigue siendo un centro científico incluso en la era postsoviética, el Ministro de Sanidad está sentando las bases para el desarrollo de nuestra propia vacuna de producción nacional. Desde sus primeros ensayos hasta su eventual producción y despliegue, todo será supervisado por nuestras propias instituciones, lo que nos permitirá hacer que cada paso del proceso sea más eficaz.\n\nNo es solo una cuestión de orgullo nacional cuando tengamos nuestra vacuna lista antes que el resto del mundo, sino que también es una cuestión de seguridad pública, ya que esta autarquía de vacunas hará imposible que cualquier elemento hostil impida nuestra lucha contra el virus.\n\nCon los ensayos clínicos programados para comenzar en un futuro próximo, la batalla contra el COVID-19 será otra batalla que Rusia ganará."
 russia.87.a: "¡Seremos los primeros!"
 russia.88.t: "Vacuna Sputnik V registrada"
 russia.88.d: "En un año marcado por una pandemia mundial, Rusia se ha convertido en un actor clave en la carrera por el desarrollo de una vacuna contra el COVID-19, siendo su vacuna Sputnik V una de las primeras en ser autorizada para su uso a nivel mundial.\n\nEl desarrollo de la vacuna Sputnik V fue un esfuerzo conjunto entre el Instituto Gamaleya, el Ministerio de Salud de Rusia y el Fondo Ruso de Inversión Directa. A pesar del escepticismo inicial, la vacuna Sputnik V ha mostrado resultados prometedores en ensayos clínicos, con una tasa de eficacia superior al 90%. El desarrollo de la vacuna Sputnik V ha sido motivo de orgullo para Rusia, que ha enfrentado críticas por su gestión de la pandemia. El presidente Vladímir Putin ha elogiado la vacuna como un logro de \"clase mundial\" y un símbolo de la destreza científica de Rusia.\n\nMientras la pandemia continúa devastando el mundo, el desarrollo de la vacuna Sputnik V ha brindado un rayo de esperanza, demostrando que la colaboración y la innovación pueden ayudar a poner fin a la crisis."
 russia.88.a: "¡Excelentes noticias!"
 russia.89.t: "Ucranianos destruyen la ZAES"
 russia.89.d: "Tras una ardua batalla, nuestras fuerzas lograron capturar la central nuclear de Zaporiyia. Debido a su desesperación, las fuerzas ucranianas detonaron explosivos de gran potencia en varios reactores, dejando inoperativa toda la planta y liberando cantidades sin precedentes de radiación con la esperanza de frenar nuestro avance. ¡Sea cual sea su estrategia, los aplastaremos!"
 russia.89.a: "¿Se olvidaron del 1985?"
 russia.91.t: "Fantasma de Kiev"
 russia.91.d: "El evocador nombre es tendencia en Twitter y otras redes sociales, en referencia al piloto ucraniano de un MiG-29 que presuntamente derribó seis aviones rusos el primer día de la invasión rusa de Ucrania.\n\nMuchas de las publicaciones sobre el Fantasma de Kiev incluyen imágenes de lo que parece ser un MiG-29 -conocido en la OTAN como Fulcrum-, aunque la mayoría de las publicaciones muestran exactamente el mismo clip: el avión sobrevolando bloques de viviendas de hormigón con un cielo gris al fondo.\n\nSin embargo, hay poca evidencia de que el Fantasma de Kiev exista realmente, y sus detractores en línea señalan la improbabilidad de que un caza sin superioridad aérea y en un avión inferior derribe seis aviones enemigos en un solo día.\n\nNo obstante, un ucraniano anónimo entrevistado declaró: \"Lo que importa no es si existe o no, sino el mensaje que difunde. Este tipo de mensaje es importante en estos tiempos difíciles, sea cierto o no\"."
 russia.91.a: "Sus \"victorias\"."
 russia.92.t: "Intervención en Uzbekistán"
 russia.92.d: "Los incidentes en la frontera entre Tayikistán y Uzbekistán han alcanzado niveles inaceptables. Uzbekistán lanzará escaramuzas contra Tayikistán, utilizando la presa de Rogun como principal justificación, alegando que es un acto de defensa contra una alianza hostil.\n\nDmitri Medvédev ha autorizado el artículo 4 del Tratado de Seguridad Colectiva, que permite a nuestras tropas enfrentar de inmediato a la amenaza."
 russia.92.a: "¡Debemos defender a nuestros aliados!"
 russia.93.t: "Ultimátum de Rusia"
 russia.93.d: ""
 russia.93.a: "nah."
 russia.94.t: "Azerbaiyán rechaza"
 russia.94.d: ""
 russia.94.a: "Conocen la alternativa..."
 russia.95.t: "OPERACIÓN WRANGEL"
 russia.95.d: "A - VALERI GUERÁSIMOV, JEFE DEL ESTADO MAYOR\n\n\n\n\n£GFX_SOV_convoy\n\n\n\n\n\nEL SIGNIFICATIVO INCREMENTO DE LAS FUERZAS DE LA OTAN EN ESTONIA Y LETONIA REPRESENTA UNA AMENAZA PARA LA INTEGRIDAD TERRITORIAL DE RUSIA. EL TERRENO FORESTAL PODRÍA REPRESENTAR UN DESAFÍO, PERO NUESTRA FUERZA SOBRECOGEDORA LOS APLASTARÁ.\n\n\n\n\n£GFX_SOV_airbase\n\n\n\n\n\nEL JEFE DE ESTADO CONFIRMA, A TRAVÉS DE ESTE DOCUMENTO, QUE LAS OPERACIONES EN EL BÁLTICO COMIENZAN INMEDIATAMENTE. LOS AERÓDROMOS ENEMIGOS DEBEN SER DESTRUIDOS ANTES DEL ATAQUE DE LAS FUERZAS TERRESTRES.\n\n\n\n§RFIRME ABAJO§!"
 russia.95.a: ""
 russia.96.t: "Navalni arrestado"
 russia.96.d: "El crítico de Putin, Alekséi Navalni, quien sobrevivió a un ataque con gas nervioso en agosto, fue detenido a su regreso a Moscú desde Alemania. El activista, de 44 años, fue detenido en el aeropuerto de Sheremétievo, adonde llegó en un vuelo desviado. Navalni acusa a las autoridades rusas del intento de asesinato, una afirmación respaldada por periodistas de investigación. Su detención ha suscitado la condena de la UE, Francia e Italia, que exigen su liberación. A pesar de las advertencias de arresto, Navalni regresó a Rusia el domingo, donde fue recibido por sus simpatizantes antes de ser detenido por la policía.\n\nActualmente se encuentra detenido en una comisaría de Moscú por violar las condiciones de su libertad condicional relacionadas con una condena anterior que, según él, tuvo motivaciones políticas. Además, se le han presentado nuevos cargos de fraude por presunta malversación de fondos de su Fundación Anticorrupción."
 russia.96.a: "El problemático regresa."
 russia.97.t: "Primer Juicio de Moscú"
 russia.97.d: "SERGUÉI SHOIGÚ\nEn juicio por: Falta grave y omisión de defender la nación\n\n\n\nVALERI GUERÁSIMOV\nEn juicio por: Falta grave, enviar a sabiendas a miles de hijos a una muerte segura, omisión de defender la nación\n\n\n\n£GFX_SOV_sons\n\n\n\n\n\nVÍKTOR ZÓLOTOV\nEn juicio por: Falta grave, reclutar a miles de hijos para ser asesinados a sabiendas, omisión de defender la nación\n\n\n\n£GFX_SOV_casualties\n\n\n\n\n\nOLEG SALIUKOV\nEn juicio por: Falta grave, dirigir a sabiendas ataques suicidas contra fuerzas enemigas superiores, omisión de defender la nación\n\nVEREDICTO:\nSERGUÉI SHOIGÚ: §RCULPABLE§!\nVALERI GUERÁSIMOV: §RCULPABLE§!\nVÍKTOR ZÓLOTOV: §RCULPABLE§!\nOLEG SALIUKOV: §RCULPABLE§!"
 russia.97.a: "Estos \"hombres\" son conscientes de su culpa."
 russia.98.t: "Apagón en Moscú"
 russia.98.d: ""
 russia.98.a: "Nuestro control esta solidificado."
 russia.99.t: "Protestas masivas en Moscú"
 russia.99.d: "Serguéi se duerme, y a la mañana prende el televisor. Las noticias reportan la violencia en Moscú..."
 russia.99.a: "Los civiles entran al Palacio Presidencial."
 russia.99.b: "El ejército entra al Palacio Presidencial."
 russia.100.t: "Primavera de Moscú"
 russia.100.d: "Estos últimos días, Moscú ha estado expectante. Cientos de miles de manifestantes se habían reunido en los alrededores de Moscú para protestar contra el Gobierno. Lo que comenzó como una pequeña concentración se ha convertido rápidamente en una protesta generalizada, una que dejaría en ridículo las protestas de los años 90. La oposición, que abarca desde liberales prooccidentales hasta civiles insatisfechos y veteranos de guerra de la OTAN, se ha reunido sin propósito alguno para desahogar su frustración con el Estado. Hoy, sin embargo, la multitud comenzó a marchar.\nMúltiples canales liberales de Telegram ordenaron a los afines que ocuparan los edificios gubernamentales, y desde allí, los demás también marcharon. La policía antidisturbios y los soldados se mantuvieron a la defensiva mientras las masas ocupaban las calles, algunos incluso uniéndose a la protesta. Parece que incluso algunos apparatchiks han decidido cooperar con los manifestantes y han comenzado a coordinar el movimiento.\nTodo lo que el gobierno pudo hacer fue observar con impotencia cómo perdía terreno, ya exhausto y desorganizado por la enorme crisis. Al anochecer, la multitud se había reunido en torno a la Duma y el Kremlin, y tras un enfrentamiento con los manifestantes, ambos edificios fueron ocupados.\nA medida que se calma la situación, parece que una coalición de liberales prooccidentales y tránsfugas del establishment formará un nuevo gobierno. Varias fuentes afirman que Alekséi Navalni se convertirá en el presidente interino, citando su masivo apoyo.\nSea cual sea el futuro, parece que Rusia está cambiando."
 russia.100.a: "¿Regreso a 1991?"
 russia.101.t: "Oligarcas solicitan inversión civil en [SOV_oligarchs_investment_state.GetName]"
 russia.101.d: "Un oligarca de alto nivel procedente de [SOV_oligarchs_investment_state.GetName] se ha acercado al gobierno con una oferta de apoyo. Su estado sufre de una falta crítica de inversión, y un programa de estimulo económico iniciado por el gobierno ciertamente le haría reconsiderar su postura ante ciertas políticas propuestas por el gobierno. El oligarca tiene un lugar en varios comités importantes, y es famoso por ser capaz de cerrar acuerdos, haciendo su voto mucho más valioso en la Asamblea Federal."
 russia.101.a: "Un pedido razonable."
 russia.101.b: "No nos lo podemos permitir en este momento."
 russia.103.t: "Oligarcas solicitan inversión militar en [SOV_oligarchs_investment_state.GetName]"
 russia.103.d: "Oligarcas locales de [SOV_oligarchs_investment_state.GetName] se han acercado al gobierno, ofreciendo su apoyo al presidente a cambio de una garantía informal de que [SOV_oligarchs_investment_state.GetName] albergará una nueva planta de municiones para el Ejército. Argumentan que construir una planta en la zona crearía muchos empleos y proporcionaría al Ejército el apoyo que tanto necesita en un mundo cada vez más peligroso. Los oligarcas también mencionaron su excelente relación de trabajo con varios miembros influyentes de la Duma."
 russia.103.a: "Un pedido razonable."
 russia.103.b: "No nos lo podemos permitir en este momento."
 russia.104.t: "Adoptado el artículo 389 del TSC"
 russia.104.d: "Tras las recientes pruebas militares de Vostok, se ha adoptado un nuevo artículo en el Tratado de Seguridad Colectiva. Todas las naciones deben usar el 5% de su PIB para mantener una fuerza armada competente capaz de defender a sus aliados. El artículo también establece vínculos más estrechos entre el ejército ruso y las naciones de la OTSC mediante ejercicios y misiones conjuntas más frecuentes en el extranjero."
 russia.104.a: "¡La alianza se fortalece!"
 russia.105.t: "PROGRAMA DE MODERNIZACIÓN: SUPERORDENADORES"
 russia.105.d: ""
 russia.105.a: "Permitiremos un presupuesto limitado."
 russia.105.b: "Invertir toda la cantidad pedida."
 russia.106.t: "PROGRAMA DE MODERNIZACIÓN: SECTOR CIENTÍFICO"
 russia.106.d: ""
 russia.106.a: "Permitiremos un presupuesto limitado."
 russia.106.b: "Invertir toda la cantidad pedida."
 russia.107.t: "PROGRAMA DE MODERNIZACIÓN: REFINACIÓN DE RECURSOS"
 russia.107.d: ""
 russia.107.a: "Permitiremos un presupuesto limitado."
 russia.107.b: "Invertir toda la cantidad pedida."
 russia.108.t: "Día de la Victoria"
 russia.108.d: "En una demostración de poderío militar, Rusia celebró su Desfile del Día de la Victoria, conmemorando un nuevo aniversario de la victoria de la Unión Soviética sobre la Alemania nazi en la Segunda Guerra Mundial.\n\nMiles de soldados marcharon por la Plaza Roja de Moscú, mientras tanques, sistemas de misiles y otro material bélico pasaban con estruendo. El desfile contó con la presencia de [SOV.GetLeader] y otros funcionarios de alto rango. El evento contó con la participación de más de 14.000 soldados, incluyendo de China, India y otros países amigos de Rusia. Aviones y helicópteros de la Fuerza Aérea rusa también sobrevolaron la Plaza Roja, dejando estelas de humo de colores en el cielo.\n\nEl desfile de este año destacó especialmente por la inclusión de material bélico de última generación, como el tanque T-14 Armata y el sistema de misiles hipersónicos Kinzhal. El Gobierno ruso ha promocionado los esfuerzos de modernización militar de Rusia como una forma de mantener su capacidad de defensa ante posibles amenazas.\n\nEl Desfile del Día de la Victoria sigue siendo un evento importante para muchos rusos, quienes lo consideran un símbolo de orgullo y unidad nacional. Mientras el país continúa afrontando los desafíos de las tensiones geopolíticas, el desfile sirve como recordatorio de los sacrificios pasados de Rusia y su determinación de defender sus intereses."
 russia.108.a: "Nunca olvidaremos a los héroes."
 russia.109.t: "Atentados terroristas rusos en Zonas de Ocupación"
 russia.109.d: "El cuartel general de Azov ha sido mermado"
 russia.109.a: "No toleraremos esta opresión."
 russia.111.t: "INFORME DE PRIMERA LÍNEA: [GetDateText]"
 russia.111.d: "A - VALERI GUERÁSIMOV, JEFE DEL ESTADO MAYOR\n\n\n\n\n£GFX_SOV_sons\n\n\n\n\n\nNUESTRAS FUERZAS, TRAS SUFRIR GRANDES PÉRDIDAS Y ESTAR EXTREMAMENTAMENTE AGOTADAS, YA NO PUEDEN RESISTIR LA PRESIÓN DEL ASALTO ENEMIGO.\n\nLA CONTINUA OFENSIVA PARA RECHAZAR AL ENEMIGO ES CASI SUICIDA. CORREMOS PELIGRO DE SER INVADIDOS. SOLICITO PERMISO PARA ORDENAR A MIS HOMBRES QUE DEPONGAN LAS ARMAS Y SE RINDAN. COMPADEZCO A SUS MADRES.\n\n. - \n\n§RFIRMADO§!"
 russia.111.a: "OLEG SALIUKOV, COMANDANTE DE LAS FUERZAS TERRESTRES DE RUSIA."
 russia.112.t: "Rendición incondicional polaca"
 russia.112.d: "A las [GetDateText], representantes del gobierno polaco se reunieron con nuestros diplomáticos en Kaliningrado para firmar oficialmente la rendición incondicional. Apenas firmado el tratado, se difundió un comunicado oficial por toda Polonia ordenando a sus soldados que depusieran las armas. Miles cruzaron con gusto el frente y se rindieron a nuestras fuerzas, pero un número igual se negó y sigue representando una amenaza significativa para ellas.\n\nEn cualquier caso, su pequeña insurgencia no obstaculizará nuestros planes de ocupación. El nuevo gobierno avanza rápidamente para estabilizar la región."
 russia.112.a: "Preguntarles si el Artículo 5 los defendió."
 russia.113.t: "El sabor de la victoria"
 russia.113.d: "Durante los últimos treinta años, Rusia ha estado en las garras de los criminales de Yeltsin y Putin, pero por fin tenemos una oportunidad. La noticia de la victoria del PCFR provocó diversas reacciones en la izquierda. Muchos que siempre lo habían considerado el \"Partido de los Perdedores\" se sintieron confundidos. Konstantín Semin, quien no apoyó al PCFR en las elecciones, ya está ansioso por regresar a la televisión estatal. Andréi Rudoy, quien llamó a un boicot activo, ha borrado repentinamente de su canal todos los videos que criticaban al PCFR y ya se pronuncia en apoyo de miembros de nuestro partido. El WRP, el RCWP, el RSM y otros pequeños grupos y clubes marxistas como \"Zhozheki\", el NSDR, varios VKP(b), el RCP(b) y el RKSM en VKontakte finalmente abandonaron la idea de crear un \"verdadero partido revolucionario popular\" para no avivar aún más la discordia en la izquierda ni dividirse aún más por la actitud hacia el nuevo gobierno: muchos de ellos todavía nos llaman \"falsos comunistas\" y nos instan a \"continuar la lucha por el verdadero socialismo\". \"Los Comunistas de Rusia\", que recientemente destituyeron a Suraikin como presidente del Comité Central, se han unido a nosotros. En general, hoy podemos afirmar con seguridad que nuestro Partido ha atraído a prácticamente todas las fuerzas de izquierda, serias y no tan serias, del país."
 russia.113.a: "¡La unión hace la fuerza!"
 russia.114.t: "Acuerdo petrolero ruso-alemán"
 russia.114.d: ""
 russia.114.a: "Llegarán a un acuerdo."
 russia.115.t: "Destino de Bielorrusia"
 russia.115.d: "Delegaciones de Rusia y Bielorrusia se reunieron hoy en Minsk para firmar un acuerdo histórico: ¡la declaración del Estado de la Unión! Durante años hemos luchado por esto, y en estos tiempos de incertidumbre la decisión parecía inevitable. La Duma ha comenzado a ratificar la integración de ocho nuevos estados a la Federación, junto con la integración del ejército bielorruso."
 russia.115.a: "¡Un gran día para la Federación!"
 russia.115.b: "¡Un gran día para la únion!"
 russia.116.t: "Continuación del programa de modernización"
 russia.116.d: "Muy bien retrasado así es como va esta mecánica. Tu haces el enfoques y tienes un evento, tendrás dos opciones para invertir con un presupuesto completo o con un presupuesto limitado en ese sector. Entonces activarás una cuenta atrás para la misión- Dependiendo en el presupuesto que escojas, debes investigar o bien 2 o 3 tecnologías relacionadas a ese sector."
 russia.116.a: "Ok."
 russia.117.t: "Líderes de Azov en juicio"
 russia.117.d: "Tras largos e intensos combates en Ucrania, el grupo paramilitar neonazi conocido como la Brigada Azov se ha rendido a nuestras fuerzas.\n\nLos líderes de la Brigada Azov, como Denys Prokopenko, fueron rápidamente llevados a la calle y humillados, despojados de sus iconos fascistas y golpeados. Finalmente, los ataques cesaron y comenzó uno de los juicios más breves de la historia.\n\nEn media hora, personas como Prokopenko, Ihor Mosiychuk y Vadym Troyan fueron condenadas a muerte en la horca pública en Novorrusia. Durante años, Azov ha aterrado a nuestro pueblo allí, actuando como perros rabiosos y destrozando familias.\n\nPor supuesto, los líderes se derrumbaron rápidamente, sabiendo que la justicia finalmente los había alcanzado. Suplicaban, lloraban y rogaban por clemencia. Como un cerdo sabe que será sacrificado, estos fascistas saben que su fin se acerca.\n\nHoy se hará justicia."
 russia.117.a: "Los Javelins no los vendrán a salvar."
 russia.118.t: "Tributos a los héroes de la guerra"
 russia.118.d: ""
 russia.118.a: "¡Son el orgullo de la nación!"
 russia.119.t: "Destrucción de monumento a Stepán Bandera"
 russia.119.d: "Aunque los ucranianos defendieron la ciudad de Leópolis con uña y diente, no pudieron frenar nuestro avance. Mientras nuestras fuerzas continuaban su marcha hacia la ciudad, nos topamos con un monumento a Stepán Bandera.\n\nBandera, el \"héroe\" ucraniano que colaboró con los nazis durante la Segunda Guerra Mundial, cometió varios actos de genocidio contra nuestro pueblo. La KGB le impartió justicia, pero su legado perdura. Los ucranianos ignorantes aún lo alaban, lo aclaman como héroe, cuando no era más que un bárbaro sediento de sangre.\n\nUcrania ha luchado por ser el mismo bárbaro que venera, y es nuestro deber destruir su legado. Destruir el monumento será el primer paso. En cuestión de minutos, uno de nuestros tanques llegó, apuntó a la estatua y disparó, borrando la imagen del asesino.\n\nSu imagen ha sido destrozada y será fundida y transformada en medallas que honran a los verdaderos héroes de Rusia; ahora el camino permanece abierto al resto de Europa."
 russia.119.a: "Cerdos nazis no merecen monumentos."
 russia.120.t: "Disolución de la Duma"
 russia.120.d: "Cuando los primeros diputados llegaron a la Duma, inmediatamente percibieron que algo no cuadraba. Zhirinovski, el veterano estadista, se situó en el podio con visible desprecio hacia quienes no pertenecían al PLDR. Anunció la disolución inmediata de la Duma, lo que causó conmoción e ira entre la oposición. Al confrontarlo, profirió insultos y la guarnición de Moscú entró, sacando a rastras a los líderes de la oposición. Al final, solo los Liberal Demócratas permanecieron en la cámara. Al calmarse el caos, Zhirinovski aprovechó la oportunidad para dirigirse a la cámara, reafirmando su dominio y dejando claro que no se toleraría la disidencia. Los miembros restantes de la Duma quedaron con una sensación de inquietud, inseguros sobre el futuro que les depararía el liderazgo del PLDR.\nFuera de la Duma, estallaron protestas al difundirse la noticia de los acontecimientos. La oposición prometió luchar contra lo que consideraba una flagrante toma de poder por parte del PLDR. La comunidad internacional también expresó su preocupación, y muchos condenaron las acciones tomadas dentro de la Duma."
 russia.120.a: "La basura ha sido eliminada - El Renacimiento ruso empieza ahora."
 russia.121.t: "Tropas rusas realizan golpe en Transnistria"
 russia.121.d: ""
 russia.121.a: "Ni un solo comunista transnistrio volverá a estar en prisión otra vez."
 russia.122.t: "Unificación de Moldavia"
 russia.122.d: ""
 russia.122.a: "Dodon es un buen chico."
 russia.123.t: "Levantamiento ucraniano en Subcarpacia"
 russia.123.d: ""
 russia.123.a: "¡Malditos puercos!"
 russia.124.t: "Surosetios se ofrecen a luchar"
 russia.124.d: "Recientemente, una brigada de surosetios nos ha prometido su lealtad y su disposición a luchar en la guerra contra Ucrania. Muchos de estos hombres ya están curtidos en el combate y han comenzado los preparativos para ser transportados directamente al frente. Puede que les falte armamento pesado, pero lo compensan con espíritu."
 russia.124.a: "¡Su servicio será útil!"
 russia.125.t: "Invierno de Moscú"
 russia.125.d: "Moscú, por ahora, ha aguantado. Hace apenas unas semanas, parecía que nos derrumbaríamos desde adentro: demasiadas voces indignadas, demasiadas ideologías compitiendo por dominar a las demás.\n\nSin embargo, con los eurasianistas al mando, parece que se nos ha abierto un nuevo camino. La izquierda y la derecha ya no se pelean en las calles, los agitadores liberales ya no se esconden en las sombras para planear su toma del poder. La tensión se ha calmado, y es hora de centrarse en el verdadero enemigo: la OTAN.\n\n¿Creen los perros occidentales que, acorralándonos, nos arrodillaremos y les pediremos perdón? ¿Para cubrirnos como hicimos en los años 90? ¿Para \"mejorar nuestras relaciones\"?\n\nLo único que necesitamos es un esfuerzo frío y calculado para rectificar nuestros errores. Los europeos siempre nos han tildado de bárbaros, incluso cuando no queríamos hacer otra cosa que abrazar sus ideales \"ilustrados\" y unirnos a ellos. Bueno, pues se les cumplirá su deseo.\n\nEurasia se asegurará de que lo único que quede de ellos sean sus cadáveres, congelados y abandonados en los anales de la historia."
 russia.125.a: "Pues ya no tenemos amor que darles."
 russia.126.t: "Declaración del Estado Eurasiático"
 russia.126.d: "Por fin nos hemos reunificado con nuestros hermanos de Asia Central. Mientras las tropas rusas desfilan por las calles de Astaná, la capital kazaja, la estatua de Lev Gumiliov, frente al palacio presidencial, se yergue orgullosa sobre las columnas.\nCon esto, es hora de acabar con esta farsa de Rusia, porque somos más que eso. Somos Eurasia, ahora y para siempre, y bajo el mando de Duguin, bajo la guía del Nuevo Ejército Eurasiático, Europa también se unirá a nosotros. ¡Haremos saber al mundo que hoy nace una nueva nación!"
 russia.126.a: "Europa tiene los días contados."
 russia.128.t: "Referendo en la República del Don"
 russia.128.d: "Tras el Referendo de Reunificación, el pueblo ruso, como era de esperar, votó a favor de reincorporarse a su Madre Patria. Dado que las élites locales estaban compuestas mayoritariamente por patriotas rusos, era inevitable que la región volviera a casa, especialmente con la gran indignación local. Occidente intentó lanzar críticas contra la reunificación, como siempre, pero pareció caer en oídos sordos.\n\nLa Madre Patria está de nuevo a las puertas de Rostov del Don, como lo estuvo Pedro el Grande en su día, y sin embargo, parece que es el punto más lejano al oeste que podemos llegar sin conflicto.\n\nLa República de Kubán, controlada por Ucrania, no seguirá este ejemplo. Con soldados ucranianos, la administración \"separatista\" está reprimiendo masivamente la disidencia, temerosa de nuestro resurgimiento. Rostov y Crimea también están ocupadas por Ucrania, aunque abiertamente. No la dejarán escapar sin luchar.\n\nLos liberaremos a todos."
 russia.128.a: "El ruso siempre busca lo que le pertenece."
 russia.129.t: "Propuesta sobre el Mar Caspio"
 russia.129.d: "El Gobierno kalmuko se ha mostrado receptivo a nuestras ideas. Habían decidido devolvernos la región de Astracán para evitar un conflicto armado. Considerando que no contaban con personal ni la voluntad de oponerse a los patriotas rusos en Astracán, les convenía.\n\nLa aceptación de la élite local a nuestra propuesta también brindó la oportunidad de negociar el estatus de Kalmukia. La región siempre ha dependido de subsidios rusos. Si bien Europa asumió esta carga, también comenzó a controlar la región económicamente, impidiendo que las empresas locales compitieran.\n\nQuizás podríamos llegar a un acuerdo con las élites locales. ¿Acaso preferirían conservar su riqueza antes que ser absorbidas por las corporaciones europeas?\n\nAunque no funcione, aún contamos con muchos contactos y soldados entre las fuerzas de seguridad y la administración de Kalmykia. Tendremos nuestra respuesta."
 russia.129.a: "Les damos una cálida bienvenida."
 russia.130.t: "Anexión de Kalmukia"
 russia.130.d: "Las élites kalmukas eran tan cobardes como temíamos. Abandonaron la reunificación, deseando que la etnia kalmuka fuera arrasada por la influencia y el dominio cultural europeos. Una traición, digna de los seguidores de Sodoma.\n\nSin embargo, los orgullosos hijos de los oiratas cuentan con hombres de visión y voluntad. Aquellos que eligieron apoyarnos en nuestro sueño de una Eurasia libre y unida. Y junto a estos orgullosos monjes de fuego y acero, nuestras fuerzas marcharon sobre Elistá.\n\n¡Que la Horda marche y cante al unísono una vez más!\nSea el Buda o la Cruz, no importa.\nEl amor ha vuelto a esta tierra..."
 russia.130.a: "...y no la abandonará."
 russia.132.t: "No habrá libertad para los enemigos de la libertad"
 russia.132.d: ""
 russia.132.a: "¡Finalmente!"
 russia.133.t: "Formación de la Coalición Patriota"
 russia.133.d: ""
 russia.133.a: "..."
 russia.134.t: "Oligarca solicita construcción de ferrocarril en Múrmansk"
 russia.134.d: ""
 russia.134.a: "Una solicitud razonable."
 russia.134.b: "No nos lo podemos permitir en este momento."
 russia.135.t: "Oligarca solicita construcción de ferrocarril en Crimea"
 russia.135.d: "Un oligarca local se ha acercado al gobierno con una oferta de apoyo. Su negocio podría beneficiarse de un nuevo ferrocarril que conecte la península de Crimea con el puerto de Novorosíisk. El oligarca forma parte de varios comités importantes y es famoso por su capacidad para cerrar acuerdos."
 russia.135.a: "Una solicitud razonable."
 russia.135.b: "No nos lo podemos permitir en este momento."
 russia.136.t: "BMP-T completa las pruebas"
 russia.136.d: "Entre una multitud de generales y altos funcionarios de la Duma, el BMP-T «Terminator» se presentó con un éxito espectacular. Se habían expresado muchas dudas sobre la posibilidad de un vehículo de combate totalmente autónomo, pero la grandeza de nuestros ingenieros las ha disipado.\n\nEl vehículo completó una rigurosa carrera de obstáculos, atravesando varias colinas y zanjas llenas de agua, y superó los ejercicios de combate con gran éxito. Casi parecía demasiado perfecto. Posteriormente surgieron algunas dudas: ¿cómo identificaría la IA a sus aliados? ¿Deberían los humanos poseer tal tecnología?"
 russia.136.a: "Excelente."
 russia.137.t: "UNR registrado como un partido legal"
 russia.137.d: ""
 russia.137.a: "Excelente."
 russia.138.t: "UNR forma su ala paramilitar"
 russia.138.d: ""
 russia.138.a: "¡Nos serán muy útiles!"
 russia.139.t: "Navalni anuncia el estado de emergencia"
 russia.139.d: ""
 russia.139.a: "¡Nadie puede detener nuestras verdaderas metas!"
 russia.140.t: "Traidores se pudren"
 russia.140.d: "Rusia está maldita por el espectro de la filosofía occidental, lo cual no es del todo malo, ya que en el corazón de cada ruso, de cada eurasiático, reside el deseo de ser libre. Pero la libertad significa cosas diferentes para cada persona; los eurasiáticos deseamos ser libres de la misma manera que estos liberales y socialdemócratas descarriados desean ser libres. La libertad es algo voluble y difícil de equilibrar.\nSe amotinan en las calles contra nuestra administración ondeando una bandera como la de la antigua Nóvgorod, pero ¿qué era Nóvgorod? Una república mercantil como Venecia, controlada por patricios y la clase alta, la nobleza terrateniente, la República no ofrecía al ciudadano común más libertad que la que ofrecía Moscovia. Muchos comparan el sistema de servidumbre con la esclavitud, pero ¿cuántos campesinos europeos fuera del sistema de servidumbre usaron su libertad para ir al extranjero? No, libertad; la idea occidental de libertad es libertad de explotar.\n\nObservamos a Occidente y vemos cómo sus corporaciones han corrompido todos los niveles de la sociedad, cómo los conglomerados internacionales tienen más poder que las naciones y cómo las elecciones las deciden los políticos. La anocracia alemana reprime la disidencia, al igual que el Reino Unido; dan a la gente una sensación de libertad al permitirles un voto insignificante, mientras que las opiniones significativas son amordazadas y silenciadas.\nNuestros liberales aquí presentes, los navalnistas, no lo ven. Son las masas estúpidas que siguen ciegamente al espectro occidental hacia el abismo de la explotación corporativa y la esclavitud asalariada. Occidente borrará toda individualidad y la autonomía personal en nombre de las agendas globalistas, pero Eurasia ofrece la verdadera revolución, una revolución que preserva tu historia y tu libertad como individuo. Tendremos que lidiar con estos traidores y liberales a su debido tiempo, pero por ahora rugen y Rusia gime de dolor mientras el tumor se retuerce y supura en su núcleo; lo extirparemos a tiempo. El liberalismo no tiene cabida en la Nueva Rusia. Aquellos a quienes no arrestemos aprenderán a amarnos con el tiempo."
 russia.140.a: "Queremos lo mismo, ¿no lo ves?"
 russia.142.t: "Nuevo Gobierno"
 russia.142.d: "Ayer, el Gobierno de la Federación de Rusia anunció su decisión de dimitir tras el anuncio del discurso del presidente ante la Asamblea Federal. En particular, se habló de introducir enmiendas a la Constitución que otorgarían a la Duma Estatal la facultad de aprobar las candidaturas de primer ministro, vice primeros ministros y ministros. El presidente Vladímir Putin propuso a Mijaíl Mishustin como jefe del Servicio Federal de Impuestos, y hoy fue confirmado en su nuevo cargo. Al primer ministro, Dmitri Medvédev, se le ofreció el nuevo cargo de vicepresidente del Consejo de Seguridad."
 russia.142.a: "Ok."
 russia.143.t: "Nuevo liderazgo"
 russia.143.d: "¡MIERDA! Creo que es hora de un nuevo líder para esta cagada de país..."
 russia.143.a: "¿Svetov? ¿Qué estas haciendo?"
 russia.143.b: "Era de esperarse."
 russia.143.c: "No, nos quedamos."
 russia.143.f: "El legado de Yavlinski vive..."
 russia.144.t: "Operación antiterrorista exitosa"
 russia.144.d: ""
 russia.144.a: "La resistencia es fútil."
 russia.145.t: "Fracaso en operación antiterrorista"
 russia.145.d: ""
 russia.145.a: "Volveremos..."
 russia.146.t: "Divisiones de la juventudes de Zhirinovski movilizadas"
 russia.146.d: "Mientras nuestros poderosos ejércitos atraviesan las líneas ucranianas, la necesidad de más guerreros valientes es palpable, por lo que movilizaremos a división de las juventudes de Zhirinovski , estos jóvenes hijos de la Santa Rusia dedicarán sus vidas a nuestra gran causa, contribuyendo a nuestra inevitable victoria.\n\nDeja que occidente tiemble de miedo, deja que los ucranianos chillen como cerdos en un matadero, no dejes a los traidores impunes, porque los hijos de Rusia están aquí.\n\nTras nuestra victoria, ellos serán inmortalizados en la historia rusa, conocidos como los grandes héroes quienes dieron su vida por nuestro pueblo, les espera un camino brillante."
 russia.146.a: "Que ellos sirvan bien a la nación."
 russia.147.t: "¡Vladímir Zhirinovski fallece!"
 russia.147.d: "La guerra en Europa ha sido brutal y el camino hacia nuestra victoria ha sido una larga prueba de paciencia y resistencia. Sin embargo, hubo un hombre que llevó la carga.\nVladímir Zhirinovski ha fallecido, mostraba ya signos de fatiga. Pasó la mayor parte del tiempo que le quedaba con sus seres queridos. Su familia afirma que falleció en paz, con una sonrisa en el rostro, consciente de lo que Rusia ha logrado gracias a su visión.\n\nCon el país de luto y las especulaciones sobre el futuro de Rusia, la gente sabe con certeza que será brillante."
 russia.147.a: "Descanse en paz, querido líder..."
 russia.147.c: "Zhirinovskiitas."
 russia.147.b: "Compromiso."
 russia.147.f: "Monarquía real"
 russia.148.t: "¡Vladímir Zhirinovski fallece!"
 russia.148.d: "La guerra en Europa ha sido una lucha brutal y desgastante, dejando a muchos de nuestros valientes soldados en cementerios o entre los escombros de la batalla, y nuestra nación se ha convertido en una sombra de lo que solía ser. En medio de esta tristeza, hemos perdido a nuestro gran líder, Vladímir Zhirinovski. Se informó que sufrió un infarto esa misma mañana durante una reunión con su equipo. Fue trasladado de urgencia al hospital más cercano, donde, lamentablemente, fue declarado muerto al llegar.\n\nFue un gran líder, y aunque no nos llevó a la victoria como había prometido, es innegable que se esforzó al máximo, entregándolo todo por su sueño. Pero ahora, con la nación de luto y las dudas sobre el futuro de Rusia flotando en el aire, la gente se pregunta si nuestra Madre Patria se recuperará rápidamente o si, por el contrario, caerá en una profunda depresión, perdiendo toda esperanza de un futuro mejor."
 russia.148.a: "Un mal presagio para el futuro..."
 russia.148.b: "Un mal presagio para el futuro..."
 russia.149.t: "Dos caminos, Una meta"
 russia.149.d: "En un rincón tranquilo de un pequeño café en Moscú, dos viejos amigos están en medio de una animada discusión. Ambos nacieron a finales de la era soviética y tienen visiones muy diferentes sobre el futuro del país. Su charla se convierte en un reflejo de lo que muchos ciudadanos rusos piensan en estos días.\nEl primero, el camarada Maksim Cherepánov, un empresario exitoso, se unió al Partido Comunista poco después de que este regresara al poder y defiende con entusiasmo la \"economía de mercado socialista\". Por otro lado, Antón Ivanov, un trabajador común que ha dedicado su vida al esfuerzo diario, se aferra a los viejos ideales del leninismo.\n\n\"¡Maksim, eso no es lo que votamos! Nosotros, eh... ¡Votamos por el comunismo, por nuestra forma de vida! ¡Sin tiendas privadas, sin mercado, todo según lo planeado! ¿Y ahora qué? ¡Todas estas empresas populares... es el capitalismo! ¡Todo esto va en contra de las ideas de Lenin!\", exclama Ivanov, golpeando la mesa con el puño, lleno de rabia. \"Antón, los tiempos han cambiado... Si estamos construyendo el socialismo, no significa que tengamos que dejar de lado el mercado. ¡Mira a China! ¿No han logrado un gran éxito? Al final, ¡piensa en la gente, en la juventud! Un mercado bajo control estatal da confianza y libertad a la gente. Seguimos controlando el desarrollo, seguimos planificando, pero dejamos que la gente respire, trabaje y crezca. No es capitalismo, hermano, es un nuevo socialismo de mercado\", responde Cherepánov, acariciando una bandeja llena de documentos sobre nuevos contratos.\n\nEl ambiente se vuelve tenso. Ivanov frunce el ceño mientras observa la construcción de nuevas viviendas sociales a través de la ventana.\n\n\"Probablemente tengas razón, la gente necesita estabilidad... ¿Y la juventud? ¡Ajá! Se quejarían de la economía planificada... Tal vez sea mejor vivir en paz, aunque sea con el mercado, que volver al caos. Si esto funciona, entonces tal vez ese sea nuestro nuevo futuro\", asiente finalmente, aunque a regañadientes..."
 russia.149.a: "Avanzamos hacia el socialismo... por caminos diferentes."
 russia.150.t: "Milicias antirrusas formadas en el Cáucaso"
 russia.150.d: ""
 russia.150.a: "¡Son tontos para oponerse a nosotros!"
 russia.151.t: "Células del Dáesh anuncian el Califato de Asia Central"
 russia.151.d: ""
 russia.151.a: "¡Esta escoria debe ser destruída!"
 russia.152.t: "Duguin celebra mitin sobre la Cuarta Teoría Política"
 russia.152.d: "\"Es evidente que ni el comunismo ni el fascismo tienen cabida en nuestra sociedad rusa. Y la democracia liberal solo nos llevaría de vuelta a ser marionetas de Occidente. Nuestra noosfera ha sido destrozada, es cierto. Pero siempre hay oportunidad de reconstruir. El eurasianismo será el lazo que nos una, sin importar la ideología o la nacionalidad. ¡El katechon se levantará una vez más!\"\n\nLa gran multitud que se congregó alrededor del anciano visionario escuchaba con atención. Aparte de los eurasianistas más radicales y los nacionalbolcheviques que han respaldado a Duguin durante las últimas dos décadas, la mayoría no tenía mucha experiencia con él o su idealismo antes de su regreso a la política.\n\nMientras que la población de mentalidad liberal desestimaba el movimiento como \"meras divagaciones de un esquizofrénico\", la gente prestaba atención. Eurasia era la luz que guiaba, la que daba voz a la \"nación profunda\". Esa misma nación que ha sufrido, se ha sacrificado y ha sangrado por Rusia más que nadie. Esto es algo que ni los oligarcas ni los liberales podrían comprender jamás.\n\nEl pueblo anhela una Rusia fuerte, una que no dependa de nadie más. La ideología o la fe son lo de menos. Incluso Yeltsin, el mercenario que fue, lo entendió. Defendía una esfera de influencia en el espacio postsoviético, luchando contra la expansión de la OTAN y las intervenciones en Yugoslavia.\n\nEl Katechon resurge de las cenizas, listo para enfrentar a la Gran Sodoma."
 russia.152.a: "El amor ha ganado."
 russia.153.t: "Declaración del Estado de la Unión Eurasíatico"
 russia.153.d: "Durante los últimos dos meses, hemos visto cómo observadores internacionales han notado la incursión del Estado Ruso de Aleksandr Duguin en Asia Central. Esta es la segunda vez que las fuerzas rusas hacen esto en esta década, y se están afianzando en las vastas estepas de Kazajistán, así como en las montañas y desiertos de los antiguos Estados de la OTSC y otros. Aunque la invasión ha generado críticas por parte de la Unión Europea y figuras influyentes del islam, los seguidores del régimen de Duguin y sus naciones aliadas se refieren a estas tierras como el \"Dominio Natural de Rusia\".\n\nDespués de la anexión formal de las naciones de Asia Central, nuestros reporteros del International Observer fueron testigos de una declaración que se transmitió al público en Moscú, donde Duguin anunció la creación de un nuevo Estado de la Unión \"Eurasiático\". Durante mucho tiempo, se ha considerado que el movimiento de Duguin era solo una influencia en la política exterior rusa, pero hoy se ha convertido en una realidad palpable. Eurasia ha sido establecida, generando tanto entusiasmo como preocupación a nivel mundial; aún queda por ver hasta dónde Duguin planea llevar a cabo sus visiones. Por ahora, la OTAN ha optado por no hacer comentarios.\nEn otras noticias, la canción \"United States of Eurasia\" de la banda británica Muse alcanzó el número uno en la cartelera rusa la semana pasada, a pesar de haber sido lanzada hace más de diez años."
 russia.153.a: "Una nueva dirección para Rusia."
 russia.154.t: "Purga de admiradores atlánticos"
 russia.154.d: "La podredumbre ha estado presente durante suficiente tiempo. El reino de Sodoma tuvo su momento de gloria tras la caída del Imperio Rojo. Despojó a la Rodina de su intelecto, orgullo y riqueza. Millones sufrieron y murieron, simplemente porque \"no se adaptaron a la economía de mercado\".\n\nUn hombre, con su determinación, logró detenerla. Se enfrentó a los más traicioneros y obligó a los cobardes a rendirse ante él. Sin embargo, la podredumbre persistió. Se enraizó, se fusionó con el sistema, y se disfrazó bajo consignas patrióticas y un amor por Rusia. Pisoteó los esfuerzos del pueblo por revivir el país con su fría y materialista adulación.\n\nDespués de que el hombre nos dejara, el nuevo sistema emergente pareció limpiar la podredumbre por completo. La nación encontró un propósito unificador. Y luchó por él. En las trincheras y en las fábricas, en lo material y en la noosfera. La lucha contra los hedonistas fue la luz de un mundo nuevo y justo...\n\nY fracasó.\n\nLa podredumbre simplemente se había ocultado con más fuerza, disfrazándose y preparándose para resurgir. Ahora, tras haber sido despojada y humillada nuestra Rodina, ¿una quinta parte de nuestro pueblo, bajo el yugo del atlantismo, desea revivir Sodoma? ¿Despojar aún más a nuestro pueblo de su voluntad, su orgullo, su futuro?\n\nRusia no volverá a escuchar al ángel caído. Como hicieron los apóstoles, debemos guiar a los traidores hacia la luz."
 russia.154.a: "Ama a tu prójimo."
 russia.155.t: "Duguin anuncia las ambiciones eurasiáticas"
 russia.155.d: "Es sorprendente lo que nuestros observadores internacionales en Rusia han reportado que, apenas unos años después de la derrota ante la OTAN bajo la administración anterior, Aleksandr Duguin lanzó en un discurso reciente sus \"Nuevas Ambiciones Eurasiáticas\".\n\nEstas ambiciones abarcan hasta Lisboa, y lo que antes eran solo sus escritos, ahora se han convertido en una doctrina de Estado que está tomando forma. Los medios de comunicación estatales euroasiáticos están instando a la población a prepararse para una \"Gran Liberación\". Para aquellos que no están familiarizados con los escritos de Duguin, que probablemente son la mayoría, déjenme explicarles qué implica esto: abarca todo el antiguo Territorio Imperial Ruso, así como todo el continente europeo; algunas versiones incluyen o excluyen países como Turquía o partes del Medio Oriente.\n\nSi estas ambiciones se llevan a cabo tal como se plantean, y no son solo palabras vacías, dentro de unas décadas podríamos estar presenciando una guerra total en Europa nuevamente."
 russia.155.a: "Las nubes de la guerra se ciernen sobre Europa..."
 russia.156.t: "Cumbre Duguin-Maupin"
 russia.156.d: "Era un día cualquiera en Kamchatka.\n\nLa península había vivido tranquila durante la última década. Tras el inicio de la guerra civil en Norteamérica, una oleada de refugiados llegó a estas costas, anhelando una vida tranquila y pacífica. Si bien la mayoría se adentraría en Siberia en busca de trabajo estable y tierras, una gran minoría se quedó. Se convirtieron en savia nueva para la región y recompensaron la generosidad de Rusia uniéndose a la guerra en el Este, deseosos de ayudar a su nueva Madre Patria.\n\nPor ello, era el lugar perfecto para conocer al líder de los \"jacobinos\" norteamericanos, Caleb Maupin. Aleksandr Guélievich inicialmente quería visitar California, pero su edad hizo que su Ojrana y opríchniks se preocuparan por su salud. Por lo tanto, los servicios secretos euroasiáticos y estadounidenses acordaron organizar la reunión en el sur de Kamchatka, en un balneario de aguas termales.\n\nNadie sabe qué sucedió tras las puertas del balneario entre las dos delegaciones. Los lugareños veían coches llegar constantemente al complejo, con oficiales militares y civiles de ambas naciones entrando y saliendo. La \"reunión\" duró dos días, tras los cuales terminó abruptamente: las aguas termales quedaron limpias de cualquier rastro de lo sucedido.\n\nLas visiones de la América jacobina se alinean perfectamente con las de Eurasia. Ambas desean destruir el imperio globalista, pero no desean interferir con otras civilizaciones ni convertirse en una potencia mundial hegemónica. Sin embargo, es incierto si esto resultará en una cooperación abierta o simplemente en un gesto de gratitud."
 russia.156.a: "Eurasia no está sola en este mundo."
 russia.157.t: "Raspútitsa ucraniana"
 russia.157.d: "A medida que Rusia entra en territorio ucraniano y arrasa con el territorio de Europa Oriental, un presagio de lo que está por venir se ha hecho evidente para ambos bandos. Las fuertes lluvias y el lodo han cubierto la mayor parte de las carreteras y el terreno en Europa Oriental.\n\nPara la OTAN y sus aliados, esto les da la capacidad de atrincherarse y esperar a que la maquinaria rusa se detenga.\n\nSin embargo, para Rusia, podría no ser capaz de moverse bien en estas malas condiciones y sus centros logísticos podrían colapsar por completo.\n\nLa opción de reposicionarse con mejores capacidades ofensivas para atacar a las fuerzas occidentales a la primera oportunidad parece más atractiva que atacar rápidamente posiciones clave.\n\nPor ahora, a medida que la forma de esta guerra se degrada, pasando de ser una guerra relámpago a una carrera hacia la pacificación de la OTAN, se ha vuelto más parecida a la Primera Guerra Mundial, siendo más una guerra de desgaste que de tecnología."
 russia.157.a: "Un retraso severo..."
 russia.157.b: "La vastedad de Rusia nos consume..."
 russia.158.t: "Ataque terrorista en S. Petersburgo"
 russia.158.d: "Esta semana, en San Petersburgo, Vladlen Babaev, de 24 años, irrumpió en el edificio de la administración municipal y comenzó a disparar contra sus empleados. Un equipo de la Spetsnaz acudió al lugar casi de inmediato. Al final de la operación, el tirador fue abatido y se le encontró una carabina VPO-208, dos docenas de cartuchos y, según se supo más tarde, un carné de miembro del PCFR. Dos miembros de la unidad resultaron heridos. El tirador logró matar a nueve empleados de la administración y otras 15 personas resultaron heridas de diversa gravedad.\n\nTras este suceso, la popularidad del Partido Comunista se desplomó y, para salvarla de alguna manera, Guennadi Ziugánov decidió dimitir. Yuri Afonin, de 45 años, exvicepresidente de Guennadi Ziugánov, asumió la presidencia interina del Comité Central del PCFR. Ejercerá sus funciones hasta el próximo congreso del partido."
 russia.158.a: "Esta es la verdad de los comunistas."
 russia.159.t: "Muerte de Vladímir Zhirinovski"
 russia.159.d: "El líder del PLDR, Vladímir Zhirinovski, falleció tras complicaciones de la enfermedad. A principios del mes pasado, fue hospitalizado en el Hospital clínico central por coronavirus. Los medios de comunicación informaron con frecuencia, falsamente, que el líder del PLDR, Vladímir Zhirinovski, falleció en el hospital, pero esta vez el político realmente falleció..."
 russia.159.a: "Descanse en paz, patriota..."
 russia.160.t: "El segundo partido"
 russia.160.d: "Hoy, representantes del PCFR y de RJ-PV, así como organizaciones aliadas como el Frente de Izquierdas y el Movimiento \"Por el Nuevo Socialismo\", celebraron una reunión conjunta y firmaron un Manifiesto sobre la unificación del PCFR y RJ-PV en \"Rusia Popular\". Este Manifiesto definió las bases ideológicas de la unión, sus planes y objetivos, y definió los pasos para su implementación. Además, la reunión eligió a los órganos de gobierno provisionales del nuevo partido: Zajar Prilepin, ex copresidente del SRZP, asumió la presidencia de \"Rusia Popular\"."
 russia.160.a: "Una nueva era en la política rusa."
 russia.161.t: "El destino de nuestro partido"
 russia.161.d: "Solo recientemente nuestro país finalmente derrotó a sus enemigos en Occidente. ¿Quizás sea hora de aflojar el control, culpar públicamente a los oligarcas que han permanecido en sus puestos durante tanto tiempo por los fracasos anteriores de nuestro país y declarar a Rusia un país verdaderamente democrático?"
 russia.161.a: "Esto es lo que Putin hubiese querido."
 russia.161.b: "Ya somos un país verdaderamente democrático."
 russia.162.t: "Partidos Comunistas se oponen a los naródniki"
 russia.162.d: "Tras la reciente unificación del Partido Comunista y RJ-PV, muchos partidos comunistas pidieron renunciar a su afiliación al Partido Comunista y unirse a otros partidos comunistas \"auténticos\", ya que, según los comunistas, el Partido Comunista traicionó el legado de la URSS y se convirtió en una marioneta del Kremlin. Recientemente, Vladímir Ivánovich Lackeyev, líder del partido PCU, declaró: \"Nunca he visto al Partido Comunista como un oponente del Kremlin, pero ahora está generalmente atrincherado en el ámbito legislativo\"."
 russia.162.a: "¿Más partidos comunistas?"
 russia.163.t: "Vladímir Zhirinovski es hospitalizado"
 russia.163.d: "Hoy, el líder del PLDR, Vladímir Zhirinovski, fue hospitalizado debido a la enfermedad de COVID-19 \"ómicron\", tras haber recibido ocho vacunas. El político afirma sentirse de maravilla y que pronto volverá al trabajo."
 russia.163.a: "Le deseamos buena salud."
 russia.164.t: "¿El resurgimiento del PLDR?"
 russia.164.d: "Tras la muerte de Zhirinovski, nadie pensó que el PLDR pudiera volver a la política rusa, pero al parecer todos nos equivocamos. A pesar de que Leonid Slutski asumió el liderazgo del partido, los jóvenes se unieron a Vasili Vlásov para derrocarlo. Lo consiguieron. El PLDR, ahora liderado por Vlásov, a quien sus simpatizantes consideran un \"heredero legítimo\", continuará su cooperación con la juventud y se prepara para nuevas acciones a gran escala, que incluyeron apoyo a los streamers de Twitch y la difusión de muchos de los discursos de Zhirinovski, gracias a los cuales la gente recordó al PLDR y lo volvió a querer."
 russia.164.a: "Buena suerte a ellos."
 russia.165.t: "Corea del Norte busca renovar programa laboral"
 russia.165.d: "Los trabajadores norcoreanos talarán periódicamente los bosques de Siberia, lo que ofrecerá más ranuras de construcción CADA DOS MESES. Se espera que paguemos a los norcoreanos 100 mil millones por cada proyecto completado."
 russia.165.a: "¡Una oferta razonable!"
 russia.165.b: "Debemos rechazar esta generosa oferta."
 russia.166.t: "Modernización del Transiberiano"
 russia.166.d: ""
 russia.166.a: "¡Debe hacerse!"
 russia.167.t: "Liberación de presos políticos"
 russia.167.d: "Nosotros, los comunistas, prometimos liberar a los presos políticos encarcelados ilegalmente por el Gobierno de Putin. Bueno, ¿ya vale la pena?"
 russia.167.a: "Liberaremos a todos, excepto a los fascistas."
 russia.168.t: "Guerras de gas"
 russia.168.d: ""
 russia.168.a: "No aceptaremos sus demandas."
 russia.168.b: "No podemos hacer nada."
 russia.169.t: "Ellos rechazan"
 russia.169.d: ""
 russia.169.a: "Conocen la alternativa..."
 russia.170.t: "Ellos aceptan"
 russia.170.d: ""
 russia.170.a: "Excelente."
 russia.171.t: "Rusia propone abrir Nord Stream 2"
 russia.171.d: ""
 russia.171.a: "¡Por supuesto!"
 russia.171.b: "No ahora."
 russia.172.t: "Guerras de gas"
 russia.172.d: ""
 russia.172.a: "No aceptaremos sus demandas."
 russia.172.b: "No podemos hacer nada."
 russia.173.t: "Ellos rechazan"
 russia.173.d: ""
 russia.173.a: "Mierda."
 russia.174.t: "Ellos aceptan"
 russia.174.d: ""
 russia.174.a: "¡Un brindis por nuestros amigos europeos!"
 russia.175.t: "Retorno del Terror Blanco"
 russia.175.d: ""
 russia.175.a: "Nuestros enemigos están en todas partes."
 russia.176.t: "Bloquear nuestro gas de Europa"
 russia.176.d: ""
 russia.176.a: "Ha llegado el momento..."
 russia.177.t: "No más gas de Rusia"
 russia.177.d: ""
 russia.177.a: "Mierda."
 russia.178.t: "No más gas de Rusia"
 russia.178.d: ""
 russia.178.a: "Mierda."
 russia.179.t: "No más gas de Rusia"
 russia.179.d: ""
 russia.179.a: "Mierda."
 russia.180.t: "Revolución en Kirguistán"
 russia.180.d: "La gente descontenta está en las calles y se muestra seria; es poco probable que el gobierno kirguiso se resista. ¿Deberíamos ayudarlo?"
 russia.180.a: "Tenemos tropas en Kirguistán. Denles la orden..."
 russia.180.b: "No nos incumbe."
 russia.181.t: "La revolución en Kirguistán gana"
 russia.181.d: "La gente tomó el edificio del Parlamento y, posteriormente, el Gobierno y el presidente dimitieron. Pronto habrá elecciones anticipadas en el país."
 russia.181.a: "No nos afecta."
 russia.182.t: "La salud del presidente empeora"
 russia.182.d: "A pesar de todos sus esfuerzos, la salud de Vladímir Putin solo empeora. Los médicos justifican su impotencia alegando que, además del coronavirus, el paciente padece otras enfermedades crónicas que hacen que la situación sea casi desesperada. En 2020, Putin redactó un proyecto de ley que permitiría a los exjefes de Estado ser senadores vitalicios. ¿Quizás sea hora de ejercer este derecho y ceder la presidencia a una nueva persona?"
 russia.182.a: "\"Llego el momento. Serguéi Narishkin, amigo...\""
 russia.182.b: "\"No, aún no llegó el momento...\""
 russia.183.t: "Serguéi Narishkin anuncia elecciones anticipadas"
 russia.183.d: "El presidente interino Serguéi Narishkin aún no se ha atrevido a completar su mandato y anunció nuevas elecciones presidenciales en las que no se considera candidato."
 russia.183.a: "¿Qué sigue?"
 russia.184.t: "Vladímir Putin fallece"
 russia.184.d: "Hoy, Rusia llora la pérdida del expresidente Vladímir Putin, quien falleció trágicamente tras una dura batalla contra el COVID-19 en su dacha. En un sorprendente giro de los acontecimientos, Putin reconoció la gravedad de su condición y dimitió voluntariamente, nombrando a Narishkin como líder interino.\nLa noticia ha dejado a muchos conmocionados, ya que algunos esperaban su recuperación y su eventual regreso al cargo. En todo el país, los ciudadanos se han unido para celebrar reuniones públicas e izar las banderas nacionales a media asta en memoria de Putin. Incluso quienes criticaron su liderazgo han expresado sus condolencias a su familia. Medvédev, en una emotiva publicación en redes sociales, describió la noticia como un duro golpe para su alma, haciéndose eco del sentimiento que sienten muchos rusos hoy.\nSin duda, este es un día de gran tristeza para toda la nación."
 russia.184.a: "Descanse en paz."
 russia.185.t: "¡Vladímir Putin ha muerto!"
 russia.185.d: "En un trágico giro de los acontecimientos, Vladímir Putin falleció debido a complicaciones derivadas de el COVID-19. La noticia de su fallecimiento conmocionó a la nación, ya que muchos creían que aún era capaz de liderar. Para garantizar una transición fluida del poder, Mijaíl Mishustin fue nombrado rápidamente como nuevo líder, según el protocolo. A pesar de la inesperada crisis, el país logró evitar más disturbios. Ciudadanos de toda Rusia se congregaron en manifestaciones e izaron las banderas estatales en señal de respeto a la memoria de Putin. Incluso quienes habían criticado su liderazgo expresaron sus condolencias a su familia. Dmitri Medvédev recurrió a las redes sociales para expresar su profundo pesar, reconociendo el profundo impacto que esta noticia ha tenido en él y en muchos otros rusos. Hoy es, sin duda, un día de inmenso dolor para toda la nación."
 russia.185.a: "Descanse en paz."
 russia.187.t: "Resistencia contra la ocupación rusa en Kazajistán"
 russia.187.d: ""
 russia.187.a: "¡Aplastad a esos imbéciles!"
 russia.188.t: "Intento de asesinato a Zhirinovski"
 russia.188.d: ""
 russia.188.a: "Por suerte, el presidente sigue con vida..."
 russia.189.t: "Destino de Bielorrusia"
 russia.189.d: "El régimen de Putin logró anexar Bielorrusia a Rusia bajo el proyecto del Estado de la Unión. Muchos residentes de este país están descontentos con la pérdida de su condición de Estado. ¿Qué vamos a hacer al respecto?"
 russia.189.a: "Recrearemos la RSS Bielorrusa, bajo el mando de Aleksandr Lukashenko."
 russia.189.b: "Bielorrusia será libre, pero bajo el orden de un \"Mundo Justo\"."
 russia.189.c: "Dejemosló así..."
 russia.190.t: "Cuestión de posiciones gubernamentales"
 russia.190.d: "Dirigir una nación puede ser tan difícil o fácil como se desee. Si bien existen beneficios de la redundancia, nuestro Gran Líder, Aleksandr Duguin, es un hombre brillante capaz de dirigir los ministerios actuales por decreto personal si así lo desea. Lo que realmente importa ahora es determinar si es responsable permitir que un solo hombre gestione todas las responsabilidades ministeriales. En una Eurasia post-Duguin, la fusión de ministerios podría ser difícil de deshacer, y los líderes menos inteligentes podrían no ser capaces de gestionar la carga de trabajo. Algunos miembros del consejo asesor han señalado que Duguin es demasiado mayor para gestionar todos los ministerios a la vez. Sin embargo, la decisión es suya en este momento, ya que cuenta con el pleno apoyo del partido."
 russia.190.a: "¡Las posiciones deben combinarse!"
 russia.190.b: "No hay que extender los deberes de Duguin..."
 russia.191.t: "Congreso eurasianista"
 russia.191.d: "Nuestro Congreso es un instrumento importante para nuestro Estado, que, a la singular manera eurasianista, contiene un ala izquierda y una ala derecha: los solaristas y los lunaristas. Ambas tienen ideales únicos: la izquierda representa el ala nacionalbolchevique del partido, orgullo del difunto Limónov. Mientras que la derecha representa los elementos más tradicionalistas definidos por la ortodoxia, no solo en religión sino también en cultura, centrándose principalmente en los escritos de Duguin en lo que respecta a la preservación de la tradición.\n\nQuienquiera que elijamos probablemente influirá considerablemente en el tipo de gobierno que seremos en los próximos años y, una vez liberada Europa, en lo que Eurasia permanecerá durante los próximos siglos."
 russia.191.a: "Favorecer a la izquierda."
 russia.191.b: "Favorecer a la derecha."
 russia.192.t: "Rusia Justa se une a \"Por la Verdad\""
 russia.192.d: "En diciembre de 2020, se supo que \"Rusia Justa\" se preparaba para unirse con los partidos \"Por la Verdad\" y \"Patriotas de Rusia\". A finales de diciembre, el líder del partido, Serguéi Mirónov, confirmó estas intenciones, y el 20 de enero de 2021 se anunció un acuerdo. La unificación de los partidos está prevista para febrero-marzo de ese mismo año bajo el nombre \"Rusia Justa - Patriotas - Por la Verdad\" o \"Rusia Justa - Por la Verdad\"."
 russia.192.a: "Dudo que les sirva."
 russia.193.t: "Muerte de Eduard Limónov"
 russia.193.d: "Hoy se celebró el funeral del escritor ecocéntrico exitoso, activista político y líder, Eduard Limónov, quien falleció a los 77 años tras sufrir complicaciones quirúrgicas.\nEn los años 90, Limónov se convirtió en uno de los principales líderes de la oposición al gobierno de Yeltsin y, junto con Duguin y Létov, fundó el Partido Nacional Bolchevique, cuyas políticas y prácticas moldearon la interpretación moderna del nacionalbolchevismo en Rusia.\nTras la llegada de Putin al poder y la posterior estabilización y desradicalización, impulsadas por el encarcelamiento de Limónov \"acusado de posesión de armas y creación de grupos armados ilegales para apoderarse del norte de Kazajistán\", la popularidad del PNB comenzó a decaer, hasta que en 2007 las autoridades prohibieron el nombre y los símbolos del partido.\nSin embargo, solo unos años después, Limónov rebautizó el partido con el nuevo nombre de \"La Otra Rusia\", en honor a uno de sus manifiestos.\nEl envejecimiento, sumado a problemas de salud, hizo que Limónov se alejara de los asuntos internos del partido, cediendo el liderazgo a jóvenes aprendices y manteniéndose como la cara visible y portavoz del partido durante diversos actos y reuniones de protesta.\nFue uno de los que más apoyó la Rebelión del Dombás en 2014, animando a su partido y visitando personalmente las líneas de frente.\n\nFue enterrado en el cementerio Troyekúrovskoye, con el ataúd envuelto en la antigua bandera del PNB. Muchos de sus partidarios asistieron, rindieron el último homenaje a su abuelo y juraron junto a su tumba que lucharían para hacer realidad su visión."
 russia.193.a: "Memento mori."
 russia.194.t: "Wagner comienza a operar en Ucrania"
 russia.194.d: "Casi inmediatamente después de la declaración de la operación militar especial, la empresa militar privada Wagner se movilizó junto con nuestras fuerzas armadas para unirse a la invasión. Ha habido multitud de controversias en torno a la organización, desde crímenes de guerra hasta violaciones de derechos humanos, pero no se ha planteado ninguna oposición a su participación en nuestras fuerzas armadas. Su brutalidad es un arma de doble filo y podría resultar útil en las próximas batallas..."
 russia.194.a: "Veamos como les va."
 russia.195.t: "Futuro de la Madre Patria"
 russia.195.d: "Ahora que ganamos la Guerra Europea, finalmente podemos deshacernos de los oligarcas y hacer realidad nuestras opiniones sobre la política rusa."
 russia.195.a: "Quitemos a los oligarcas e implementemos una nueva constitución con los ideales de Putin."
 russia.195.b: "Quitemos a los oligarcas y abrazemos el legado de Putin."
 russia.196.t: "El FSB previene un ataque terrorista"
 russia.196.d: "En los últimos días, se han llevado a cabo registros en numerosas organizaciones socialistas debido al nuevo decreto del gobierno de Medvédev, y el resultado justificó plenamente los costos, pues hoy se salvaron vidas de ciudadanos. Un carné de miembro del Partido Comunista y un gran número de armas sin licencia, obtenidas ilegalmente, presumiblemente de Asia Central, fueron hallados en la casa de un terrorista en San Petersburgo."
 russia.196.a: "¡Gracias a Dios!"
 russia.197.t: "¡El PLDR se une al ONF!"
 russia.197.d: "Los recientes acontecimientos en la política rusa han conmocionado a la opinión pública. Tras largas negociaciones, Rusia Unida y el PLDR se han unido en una sola coalición. Medvédev acordó reorganizar sus ministros para unirse al PLDR. Algunos no se sorprendieron por los recientes acontecimientos porque, como dicen, \"el PLDR siempre fue una marioneta del Kremlin\"."
 russia.197.a: "Todo acorde al plan."
 russia.198.t: "¡El PCFR se une al ONF!"
 russia.198.d: "Nunca pensamos que esto pudiera suceder, pero es cierto: el PCFR y Rusia Unida ahora forman una sola coalición. Tras los numerosos escándalos que lo afectaron con las noticias recientes y las numerosas presiones de la administración de Medvédev, el PCFR finalmente ha logrado su desmantelamiento como partido independiente. Ahora, comunistas de todo tipo llaman a Ziugánov traidor y títere del Kremlin; otros justifican su decisión alegando falta de opciones, pero solo el tiempo dirá si realmente fue la decisión correcta."
 russia.198.a: "Yo nací en la URSS."
 russia.199.t: "Rusia Unida y Rusia Justa se unen"
 russia.199.d: "Rusia Justa y Rusia Unida finalmente se unieron tras largas negociaciones. Estas acciones no sorprendieron a nadie, pues todos conocen la relación entre Medvédev y Rusia Justa."
 russia.199.a: "¡Ahora Rusia está unida!"
 russia.200.t: "Directivas de Duguin"
 russia.200.d: "\"Solo hay dos opciones después de escuchar una de las Directivas de Duguin: la primera es estar de acuerdo con todo, desarrollar un pliegue epicántico, lanzar un saludo euroasiático, salir a las calles y apuñalar sin piedad a un liberal; la segunda es estar en desacuerdo con todo y escribir una cantidad gigantesca de comentarios debajo del video sobre lo que piensas de este viejo loco y su barba vatnik."
 russia.200.a: "¡Atención!"
 russia.201.t: "Exiliados del Dombás"
 russia.201.d: "El Dombás puede haber caído ante el enemigo, pero su gente es fuerte. Muchos huyeron de sus hogares por temor a brutales represalias, pero su espíritu rebelde sigue vivo. Tras el ascenso de un nuevo régimen que busca vengarse de los \"perros de la OTAN\", tanto los veteranos milicianos como la sangre joven formaron brigadas de exiliados para estar listos para luchar otro día, con la esperanza de recuperar sus hogares."
 russia.201.a: "Tendrás tu hogar de nuevo."
 russia.202.t: "Muerte de Vladímir Vysotskiy"
 russia.202.d: "El almirante de la Marina Rusa, Vladímir Vysotskiy, falleció debido a problemas cardíacos a la edad de 66 años. Fue enterrado con honores militares el 8 de febrero en el cementerio Troyekurovsky"
 russia.202.a: "Gracias por tu servicio, camarada."
 russia.203.t: "Arresto de izquierdistas"
 russia.203.d: "Se llevaron a cabo represiones masivas en muchas ciudades de Rusia. La policía detuvo a disidentes de izquierda, especialmente a aquellos con numerosos y pequeños seguidores en línea. La mayoría se rindió pacíficamente, como Andréi Rudoi y Borís Kagarlitski, y su presencia en internet fue eliminada poco después.\n\nSin embargo, el episodio más destacado de estos arrestos fue la persecución en motocicleta de Konstantín Semin, que duró seis minutos y terminó con él chocando contra un árbol, sin sufrir lesiones. Se informó que podría haber estado bajo los efectos del alcohol.\n\nLas operaciones concluyeron con la detención de más de miles de personas por apoyar políticas de izquierda, así como con el allanamiento y cierre de las sedes de más de diez organizaciones socialistas por parte de las fuerzas del orden."
 russia.203.a: "¡Purgen a los parásitos!"
 russia.204.t: "Arrestos de liberales"
 russia.204.d: "Las operaciones para purgar a la oposición liberal habían comenzado. La policía allanó las infames sedes de la Fundación Anticorrupción y Rusia del Futuro, arrestando a activistas in situ. Muchos influencers liberales fueron detenidos, como Maksim Katz y Varlamov, y sus cuentas en redes sociales fueron desactivadas.\n\nSin embargo, algunos directores liberales aparentemente evitaron la prisión al escapar poco antes del inicio de la represión a Europa, donde ahora graban videos que exponen a nuestro Gobierno... solo para el público occidental.\n\nA pesar de algunos fugitivos, las operaciones demostraron ser un éxito rotundo, y los ideólogos liberales occidentales fueron retirados poco a poco de la atención pública."
 russia.204.a: "¡Purgen a los liberales!"
 russia.205.t: "Nursultán vuelve a llamarse Astaná"
 russia.205.d: "Gracias a nuestra intervención, Kasim-Yomart Tokáev logró mantener su poder en Kazajistán y, aprovechando las protestas, finalmente destituyó a Nursultán Nazarbáyev de la escena política. Nazarbáyev fue destituido de la presidencia del Consejo de Seguridad de la República de Kazajistán y del cargo de líder del partido dominante, Nur Otan, entonces rebautizado como Amanat.\nEl quinto ejemplo de un nuevo rumbo hacia la \"denazarbayevización\" fue el cambio de nombre de la capital de Kazajistán, Nur-Sultán, a Astaná. La ciudad fue rebautizada en 2019 por decisión del parlamento en honor al jefe de Estado emérito Nazarbáyev. Elbasy gobernó Kazajistán incluso antes del colapso de la Unión Soviética, convirtiéndose en el Primer Secretario del Comité Central del Partido Comunista de la República en 1989, hasta su jubilación. Ahora que ha perdido relevancia, el cambio de nombre marca un nuevo capítulo en la historia de la república centroasiática."
 russia.205.a: "Incómodo."
 russia.206.t: "Zhirinovski reprende a los miembros del partido"
 russia.206.d: "Durante la Reunión del consejo del PLDR. Vladímir Zhirinovski ha expresado la necesidad de una purga interna del partido, en su forma habitual exclamó que el no permitirá estúpidos y oportunistas dentro del partido, y la membresía deberá ser ganada a través del trabajo duro para la Nación.\n\nA partir de hoy, los comités regionales del partido recibirán directivas para formar una nueva comisión para sacar a los \"estúpidos e interesados\" y purgarlos.\nNo es seguro cuantos sufrirán por esto, pero serán unos cuantos"
 russia.206.a: "Es necesario un cambio radical."
 russia.207.t: "Comienzo de la Movilización de Todas las Personas a las Repúblicas del Donbás"
 russia.207.d: "Para que el mundo ruso se haga realidad, una gran lucha debe ocurrir, el pueblo del Donbás sabe bien esto, por lo cual están preparados para hacerlo de nuevo siguiendo órdenes secretas desde el Kremlin. Las republicas del Donbás empezaron los esfuerzos de movilización en sus territorios, hombres están siendo reclutados y entrenados, viejos alijos de armas han sido abiertos, y los vehículos han sido limpiados y preparados. La guerra se avecina, el Donbás se levantarán, y una vez más será como Brest"
 russia.207.a: "La última cuenta atrás."
 russia.208.t: "Anuncio del mandato de la OTAN"
 russia.208.d: "Hoy a las 14:00 hora de Moscú, durante la conferencia de la OTAN que ha tenido lugar en Bruselas, se ha tomado una importante decisión histórica. Los líderes europeos, tras un largo discurso sobre las devastadoras guerras europeas y su destrucción, y la necesidad de consolidar los esfuerzos del continente para reconstruir las regiones afectadas.\n\nLa culminación de esta conferencia fue el anuncio de un mandato territorial sobre las regiones ocupadas de Rusia, donde se formaría una «República de Moscú» que actuaría como sucesora legítima de la Federación de Rusia democrática de Boris Yeltsin. Sin embargo, el territorio de dicha república no se extendería aparentemente más allá de Rusia central, y las regiones del sur de mayoría rusa pasarían a depender de repúblicas de minorías étnicas, o bien obtendrían la independencia general. Además, las regiones septentrionales de Rusia, incluido San Petersburgo, serán «reorganizadas bajo el mando naval ártico de la OTAN para proteger a Europa de nuevas incursiones del Este».\n\nSi bien esto ya había enfurecido a la mayoría de los rusos de dichas regiones, el discurso del nuevo gobierno ruso fue la gota que colmó el vaso. El infame oligarca sin escrúpulos Mijaíl Jodorkovski hizo su debut público, anunciando que «él y sus compañeros luchadores por la libertad convertirán por fin a Rusia en una sociedad civilizada, libre de su barbarie imperial-soviética».\n\nMuchos ya habían afirmado que era un error convertir a uno de los oligarcas más brutales de la era Yeltsin en el nuevo líder del pueblo ruso, pero sin ningún buen sustituto y sin una lucha general por el poder dentro del movimiento liberal, parece que está aquí para quedarse. En cualquier caso, el nuevo gobierno tendrá que responsabilizarse de la restauración de la Rusia occidental, destruida por la guerra."
 russia.208.a: "Viento de cambio."
 russia.209.t: "Protestas en San Petersburgo"
 russia.209.d: "Mientras que algunos habían esperado que San Petersburgo se hubiese convertido otra vez en \"la ventana a Occidente\", parece ser que la brecha entre Rusia y Europa es demasiado grande para superarla. Tras que la ciudad quedase bajo ocupación militar de la OTAN, se ha disparado el descontento entre la población.\n\nParece ser que la población ha tenido suficiente y hoy han organizado una protesta cerca del Palacio de Invierno. Consignas prorrusas como \"Devuelvan San Petersburgo a Rusia\", \"¡Echemos a los invasores!\" y \"¡Volveremos!\" estaban presentes en las multitudinarias protestas. Mientras que el comando de la OTAN estima que solo asistieron alrededor de 10.000 personas, la mayoría de noticieros afirman que las protestas reunieron alrededor de 60.000 personas si incluimos a las personas que no se encontraban en la plaza mayor.\n\nMuchos analistas están de acuerdo en que esto es solo el principio, en que la población rusa se radicalizará mientras esté bajo ocupación. Parece ser que las dos guerras pasadas no han agotado la voluntad de luchar del pueblo, al este continuar resistiendo el mandato de la OTAN."
 russia.209.a: "Seguiremos de cerca la situación."
 russia.210.t: "El surgimiento de las bandas rusas y la mafia occidental"
 russia.210.d: "A causa de la completa disolución de la policía rusa bajo el nuevo gobierno y la política de fronteras abiertas entre los miembros de la OTAN, las mafias occidentales han alcanzado la región. Usando veteranos de guerra como músculo, han dominado con facilidad el mercado tanto en el ámbito legal como ilegal. De estos grupos los más poderosos son el grupo francés \"les Enfants Terribles\" y el grupo italiano \"Passione\".\n\nEn estos momentos, estos grupos no solo controlan varias fábricas rusas destinadas a reparaciones de guerra, si no que también han incursionado en la trata de blancas y el narcotráfico.\n\nEl comando de la OTAN han emitido un comunicado que autorizará el despliegue de una \"fuerza policial europea\" para monitorear la situación. Esto, sin duda alguna, provocará una mayor radicalización en la población rusa."
 russia.210.a: "Tiempos difíciles han llegado a Rusia."
 russia.211.t: "Marcha rusa en Moscú"
 russia.211.d: "La situación en los mandatos de Rusia continua empeorando. Una marcha rusa fue organizada hoy a las 16:00 en Novy Ardat, con los civiles marchando por las calles y protestando la ocupación rusa. Aunque se mantuvo pacifica al inicio, la multitud se volvió incontrolable al ver un grupo de europeos, presuntamente turistas. Después del inicio de la lucha, 10 nacionales europeos fueron asesinados en el combate, obligando una respuesta policial.\n\nComo la fuerza policial era europea también, la muchedumbre continuo luchando ahora con las fuerzas del orden, matando a al menos 2 y quemando uno de los autos llamadas a la escena hasta que fueron dispersados con munición real.\n\nLas fuerzas del orden del Mandato de Moscú ya han estado involucradas tomando medidas fuertes contra civiles desarmados, y cuando las noticias se hicieron, el público ruso como también los medios extranjeros condenaron a las elites europeas por suprimir brutalmente las protestas pacificas, llamando al arresto de todos los oficiales involucrados por brutalidad policía."
 russia.211.a: "Joder."
 russia.212.t: "La llamada"
 russia.212.d: "Serguéi se despertó por una llamada telefónica, sintiéndose terrible. Su sueño había sido igual de horrible: recordó las trincheras, los bombardeos y a sus camaradas ya fallecidos. Caminó por la habitación llena de basura, mirando su teléfono. No tenía a nadie que pudiera llamarle a esa hora: sus amigos murieron en el frente y su amor falleció debido a los bombardeos en alfombra de la OTAN. Ni siquiera sabía si sus padres seguían vivos, pero parecía no importarle. A medida que el dolor de cabeza empeoraba, se dio cuenta de que NECESITABA contestar.\n\nA regañadientes fue al teléfono y descolgó el auricular: \"Hola. Soy Nikita de la agencia inmobiliaria. Hoy estamos inspeccionando un nuevo apartamento. Es un apartamento en el Callejón Bogoslovski, 3. La casa está abierta. Ven cuando tengas tiempo libre\". Serguéi no entendió nada de lo que se dijo, pero decidió que la única forma de saber qué estaba pasando era ir a esa dirección.\n\nCuando salió de su casa, encontró un paquete extraño. Dentro había una máscara de animal y un papel con la inscripción \"El objetivo es un maletín. Ten cuidado. Deja el objetivo en el punto F-32, en el cubo de basura. No tienes derecho a equivocarte. Te estaremos observando.\""
 russia.212.a: "Cosas extrañas están pasando."
 russia.213.t: "Tiroteo en el Callejón Bogoslovski"
 russia.213.d: "A primera hora de la mañana de ayer, se escucharon disparos en el Callejón Bogoslovski, provenientes del recién inaugurado club nocturno Vergil, que está dirigido por la mafia italiana llamada Passione, y todas las víctimas, según el Mandato, eran italianas. Muchos atribuyen esto a algunos de los líderes del nuevo gobierno, específicamente a Jodorkovski, quien recientemente regresó a su país desde el extranjero y sin duda está ansioso por recuperar su cuota de mercado. Sin embargo, esto supone un duro golpe para la reputación del Mandato de la OTAN en Rusia, ya que la policía fue muy ineficaz."
 russia.213.a: "Joder."
 russia.214.t: "¿Otra década salvaje?"
 russia.214.d: "Rusia ha alcanzado un nuevo punto de ebullición, muy parecido al que vivió desde principios de los años 90, y muchos analistas dicen que Rusia no podrá recuperarse completamente de una crisis así. Con una tasa de criminalidad en aumento causada por grupos mafiosos occidentales, actividades antioccidentales por parte de ciudadanos rusos y corrupción en los más altos niveles del gobierno respaldado por la OTAN, la situación parece irrecuperable. Parece que, por mucho que intente el mandato de la OTAN, el público ruso no mostrará ninguna simpatía por el nuevo gobierno."
 russia.214.a: "Lo siento, pero aquí en la mesa de los ganadores no puedo escucharte."
 russia.215.t: "¡Los líderes de \"Passione\" y \"Les Enfants Terribles\" muertos!"
 russia.215.d: "\"Empezamos en tres... dos...\"\n\n\"Buenas noches, en vivo Irina Lebedeva especialmente para ustedes en Euronews Rusia con un informe desde la Mansión de Jean Paul. Los notorios jefes de organizaciones criminales acaban de ser asesinados por un atacante desconocido\". La cámara muestra a dos policías arrastrando a un hombre hacia un coche patrulla. \"Como pueden ver, la policía ya ha arrestado al criminal. Los detalles aún se desconocen, pero es probable que el atacante llevara una máscara de animal. Les mantendremos informados sobre nuevos desarrollos\".\n\nLa imagen cambia a una presentadora de televisión. \"¿Máscara de animal? Si esta información se confirma, entonces este incidente se relaciona con una serie de asesinatos cometidos por atacantes con máscaras extrañas, según medios locales, muchos asesinatos brutales cometidos en los últimos meses han preocupado a los ciudadanos de Moscú. La mayoría de las víctimas están vinculadas a varios grupos dentro de la ciudad. A pesar de todos los esfuerzos, la policía aún no sabe el motivo de los crímenes cometidos, ya que no lograron interrogar a los sospechosos\".\n\nLa imagen vuelve al reportero. \"¡Así es! Durante el tiroteo en la casa de Paul, varias personas más murieron, no se sabe cuántas, los servicios médicos aún continúan retirando los cuerpos. Se acaba de confirmar la información de que el criminal llevaba una máscara de zorro. Ahora el criminal está siendo llevado a la comisaría, donde será interrogado\".\n\nY de nuevo la imagen regresa al estudio. \"Esta es una noticia increíble, muchos espectadores saben que el hombre con la máscara de zorro es el más famoso entre los demás, es responsable de una serie de asesinatos en la comisaría cometidos la semana pasada, así como de varios otros crímenes, incluido el asesinato de Nikolái Agafónov, un conocido productor. Si la persona arrestada resulta ser él... Finalmente obtendremos respuestas sobre el estallido de violencia. Quién sabe... quizás esto ponga fin a los asesinos con máscaras de animales...\""
 russia.215.a: "Tuvo sus quince minutos de fama..."
 russia.216.t: "El caso de la máscara de zorro"
 russia.216.d: "El juicio fue muy complicado, la batalla entre el fiscal y el abogado duró una hora, pero aún es imposible determinar un ganador.\n\n\"Ahora el acusado afirma que recibió órdenes para cometer estos asesinatos mediante mensajes enviados a su teléfono. ¿Han verificado esta declaración?\" preguntó el fiscal. \"Sí\", respondió afirmativamente el jefe de policía, \"¿y qué encontraron?\" \"El teléfono estaba completamente vacío\". \"¿Encontraron pruebas que respalden la afirmación de «llamadas amenazantes»?\" \"No. No se encontraron\". \"Claramente... No más preguntas\", dijo el fiscal con confianza.\n\nPero, aparentemente, el abogado decidió que era demasiado pronto para rendirse y comenzó su discurso: \"Usted dice que no ha encontrado pruebas físicas que apoyen las declaraciones de mi cliente. ¿Qué hay de los archivos del operador telefónico? No es difícil para la policía acceder a esa información, ¿verdad?\". A lo que el jefe de policía respondió, \"Sí, hemos estudiado los registros de las llamadas del acusado\". A lo que el abogado respondió de inmediato, \"¿Encontraron alguna llamada que pudiera respaldar la declaración de mi cliente?\" El jefe de policía asintió, \"Sí, el acusado fue llamado efectivamente en el periodo de tiempo que indicó. Pero...\"\n\nSin terminar, el abogado lo interrumpió, no está claro si porque tenía prisa o porque no quería que el jefe de policía continuara su discurso, \"¿Lograron rastrear el origen de estas llamadas? Si es así, ¿de dónde provenían?\" \"Sí, provenían de un club nocturno llamado el becerro de oro.\" Ahora mi cliente afirma que la mafia italiana lo obligó a cometer los crímenes por los que está siendo juzgado. ¿Tiene la policía alguna información sobre la conexión del «becerro de oro» con la mafia italiana, que pueda confirmar las palabras de mi cliente?\" \"De hecho, el establecimiento fue mencionado varias veces en crónicas de peleas entre bandas. Sin embargo...\" Una vez más interrumpiendo al jefe de policía, el abogado dijo con una sonrisa, \"Eso es todo, gracias. No más preguntas\".\n\n\"El testigo puede sentarse. El tribunal se retira para un receso\". Dijo el juez, poniendo fin brevemente al conflicto entre dos mentes."
 russia.216.a: "Va a ser un juicio largo..."
 russia.217.t: "Azov deserta a nuestro lado"
 russia.217.d: ""
 russia.217.a: "¿Una alianza inesperada?"
 russia.218.t: "Golpe pro-ustacha en Croacia"
 russia.218.d: ""
 russia.218.a: "Interesante..."
 russia.219.t: "Primera corporación soviética"
 russia.219.d: "Recientemente fue creada bajo el nombre de \"Sovjóznik\". Reúne bajo su ala a marcas de la Rusia de Putin como Sber, Yandex, VK, Tricolor y muchas otras. Pável Grudinin se convirtió en el director general de Sovjóznik. Aunque formalmente es una \"Empresa Popular\", Sovjóznik tiene todas las características de una corporación capitalista. Mientras que los miembros ortodoxos del Partido ya han condenado las acciones de Pável Grudinin, acusándolo de oportunismo abierto, la mayoría del pueblo de nuestro país ha acogido con agrado la creación de Sovjóznik."
 russia.219.a: "¡Grudinin es un buen empresario!"
 russia.219.b: "Vamos a ver como se desarrolla con interés..."
 russia.220.t: "INFORME DE INCIDENTE POST-ACCIÓN - «ENEMIGO DESCONOCIDO»"
 russia.220.d: "SINOPSIS:\nEl siguiente informe sirve como un análisis estratégico y de desarrollo del incidente de fuego amigo ocurrido el [DATE] en la región de Járkov, en relación con el mal funcionamiento, la pérdida de control operativo y la posterior neutralización de un vehículo blindado de combate (AFV) no tripulado recientemente desplegado.\n\nREGISTRO DEL INCIDENTE:\nDurante una excursión ofensiva en la región de Járkov, un único vehículo de combate, designado BMP-T «Terminator» - que había estado operando dentro de su unidad de primera línea durante varios días con una eficiencia combativa y operativa excepcional - comenzó a no responder a las instrucciones poco después de establecer contacto hostil. Según los relatos de las tropas terrestres supervivientes y los informes de los ingenieros que inspeccionaron los restos bombardeados del vehículo, se produjo un error de identificación en su software, lo que provocó que el vehículo comenzara a disparar indiscriminadamente, apuntando a todos los combatientes humanos en la zona sin importar su afiliación.\n\nComo resultado de que el vehículo se convirtiera en un elemento rebelde, las unidades involucradas en la ofensiva se desorganizaron y sufrieron un número significativo de bajas atribuidas al vehículo, con las fuerzas restantes de ambos bandos realizando una breve retirada estratégica del área mientras el vehículo continuaba atacando la zona de operaciones. Tras varias solicitudes repetidas de refuerzos y maniobras de apoyo aéreo, el vehículo fue finalmente neutralizado después de veintiséis (26) minutos de un esfuerzo combinado de las fuerzas terrestres y aéreas de la región.\n\nCONSECUENCIAS:\nLas investigaciones posteriores al incidente, realizadas tanto por ingenieros de la RAF como por personal del fabricante del vehículo Uralvagonzavod, han concluido en gran medida que el incidente y el mal funcionamiento por parte de la Inteligencia Artificial del BMP-T fueron \"altamente inusuales\" y, en general, poco probables de repetirse en otras unidades BMP-T. La investigación de Uralvagonzavod sobre salvaguardas adicionales para fallos de IA, así como posibles mejoras en el software de identificación, continúa en curso."
 russia.220.a: "Probablemente estará bien..."
 russia.221.t: "Llenando los rangos"
 russia.221.d: ""
 russia.221.a: "Su experiencia es necesaria ahora más que nunca..."
 russia.222.t: "Cuestión de otros partidos"
 russia.222.d: "Ahora que finalmente tenemos el poder en nuestras manos, es hora de decidir qué vamos a hacer con el resto de las fuerzas políticas del país. \"Rusia Unida\" definitivamente será destruida y sus líderes llevados a juicio, pero ¿qué pasa con los demás? ¿Tenemos que deshacernos de ellos? Por supuesto, actuaremos con cuidado utilizando todas las técnicas políticas y los servicios especiales, pero ¿será correcto hacerlo justo al comienzo de nuestro gobierno?"
 russia.222.a: "Disolver solo a Rusia Unida."
 russia.222.b: "También prohibir a los fascistas."
 russia.222.c: "Liberales y Rusia Unida eran uno... ¡Ni piedad para ellos tampoco!"
 russia.223.t: "Parlamento Soviético"
 russia.223.d: "Ha llegado el momento de despedirse de la desafortunada Duma Estatal, creada por Yeltsin sobre la sangre del pueblo ruso... Ahora es tiempo de crear un nuevo órgano supremo del poder estatal, un nuevo parlamento. ¿Qué tomamos como base? ¿Un Sóviet Supremo unicameral, como antes de 1990, o un Congreso de los Diputados del Pueblo bicameral?"
 russia.223.a: "Congreso de los Diputados del Pueblo."
 russia.223.b: "Sóviet Supremo."
 russia.224.t: "Cuestión de género"
 russia.224.d: "Varios movimientos feministas, especialmente el DSM, están muy preocupados acerca de nuestras actitudes a las cuestiones de género, tuvieron pequeñas demostraciones y piquetes en algunas ciudades, y es un debate continuo en la internet, lo más probable es que esto solo haga que los argumentos y discusiones en internet se intensifiquen, pero probablemente deberíamos expresar nuestra opinión sobre el tema de una vez y para todas..."
 russia.224.a: "¡Los comunistas siempre han defendido la igualdad de género!"
 russia.224.b: "Protegeremos los valores tradicionales."
 russia.225.t: "Segundo San Francisco"
 russia.225.d: "Nos han llegado una propuesta para creer una zona económica especial en Vladivostok, dándole a esta región un trato especial y baja de impuestos para compañías locales y extranjeras, esto contribuirá muy bien al desarrollo de la región, ¡y las inversiones fluirán como el río! Por cierto, a china que comprarte frontera con nosotros ciertamente le gustará mucho está desición."
 russia.225.a: "¡Pero que gran idea!"
 russia.225.b: "Nah, no necesitamos eso."
 russia.226.t: "\"Partido de Patriotas\""
 russia.226.d: "Recientemente se fundó el \"Partido de Patriotas\", organizado por personalidades como Vladímir Soloviov, Margarita Simonián, Irada Zeinalova y varias otras personas que en el pasado defendieron el régimen de Putin. Llaman débil e indecisa a la actual dirección del país, y llaman a Valeri Rashkin \"marioneta de los liberales\"."
 russia.226.a: "Que se quejen todo lo que quieran, el pueblo de Rusia ya ha tomado su decisión."
 russia.226.b: "¿Indecisos? Bueno, les mostraremos... Arrestadlos a todos."
 russia.227.t: "Complot terrorista frustrado"
 russia.227.d: "Llegan informes de que una unidad élite de Spetsnaz de la Rosgvárdia ha asaltado un complejo de apartamentos sospechoso de ser el escondite de una organización clandestina. Durante la redada, se usaron máscaras antigás debido a una posible amenaza de armas químicas, pero eso no impidió que nuestros chicos arrestaran a todos y cada uno de los terroristas. Tras la redada, un oficial del equipo informó a nuestro equipo de noticias.\n\n\"Bueno, no solo descubrimos las armas químicas, sino que la parte más inquietante de todo esto es que todos tenían pasaportes falsos. Los tontos pensaron que eran listos al intentar quemar los reales, pero fuimos lo suficientemente rápidos para recuperarlos. Todos son alemanes, ciudadanos de la UE\".\n\nLas autoridades de la ciudad se han negado a comentar sobre el asunto por el momento, pero podemos estar agradecidos de que la situación no haya empeorado y que no se hayan perdido vidas. Queda por ver si esto es parte de un complot mayor contra un ataque al país por parte de radicales o si se trata de un grupo aislado."
 russia.227.a: "Inquietante."
 russia.228.t: "Auge del terrorismo"
 russia.228.d: "Los grupos nacionalistas se han activado en el oeste de Ucrania y en las repúblicas bálticas. Abogan por la destrucción de la Unión Soviética reconstituida y la restauración de regímenes chauvinistas en Europa Oriental. Ya han comenzado a sabotear y a matar a personas leales a nosotros. ¡Tenemos que hacer algo al respecto!"
 russia.228.a: "¡Declaren la posición de la operación antiterrorista!"
 russia.229.t: "¡Las negociaciones tuvieron éxito!"
 russia.229.d: ""
 russia.229.a: "¡Ura!"
 russia.230.t: "Las negociaciones han fracasado"
 russia.230.d: ""
 russia.230.a: "Entonces al diablo con ellos."
 russia.231.t: "Ataque terrorista en Polonia"
 russia.231.d: ""
 russia.231.a: "Horrenda tragedia..."
 russia.232.t: "Ataque terrorista en Rumania"
 russia.232.d: ""
 russia.232.a: "Horrenda tragedia..."
 russia.233.t: "Ataque terrorista en Kaliningrado"
 russia.233.d: ""
 russia.233.a: "¡Estos ataques no son al azar!"
 russia.234.t: "Planta de Armas de Tula seriamente dañada"
 russia.234.d: ""
 russia.234.a: "¡Esos bastardos pagarán!"
 russia.235.t: "AVISO DE CONDUCTA"
 russia.235.d: "DEL ESTADO MAYOR RUSO: DMITRI BULGÁKOV\n\nGeneral Mizintsev, le he escrito varias cartas informándole sobre la conducta grave de sus hombres. La infracción más flagrante ocurrió recientemente durante la ofensiva fuera de Krivói Rog. Los hombres de la 28ª División de Fusileros Motorizados, que usted manda, cortaron las llantas de mi vehículo de mando junto con otros vehículos de oficiales de alto rango. Estoy al tanto de nuestras discrepancias y los envíos de suministros, mantengo mi declaración anterior: necesito el combustible, la ropa y la munición necesarios para continuar mis ofensivas. No deseo que este asunto llegue al Jefe del Estado Mayor, porque quién sabe si conservará su puesto si Guerásimov se entera de este desastre.\n\nFIRMADO:"
 russia.235.a: "DMITRI BULGÁKOV"
 russia.236.t: "Re: AVISO DE CONDUCTA"
 russia.236.d: "Ve tú a cargar contra un bunker enemigo puto subnormal, deja de utilizar a mis hombres en sus estúpidos asaltos. Es una gran lástima que la artillería enemiga no te haya reventado en tu coche de comando, habría salvado la vida de muchos de mis hombres y habría dejado un paisaje más bonito que las bolsas de cadáveres que salen de Krivói, bastardo de mierda.\n\nFIRMADO:"
 russia.236.a: "MIJAÍL MIZINTSEV"
 russia.238.t: "Navalni apoya la OMS"
 russia.238.d: "Alekséi Navalni hizo recientemente un llamado a los ciudadanos de Ucrania: \"Queridos ciudadanos de Ucrania, finalmente ha llegado el momento en que tienen la oportunidad de acabar de una vez por todas con el círculo vicioso en el que está atrapado su país. De presidente en presidente: Yúshchenko, Yanukóvich, Poroshenko, Zelenski; excepto por los oligarcas al mando, que en realidad dirigen el país, ¡nada ha cambiado! La Ucrania moderna es un estado corrupto que no se preocupa por su propio pueblo. ¡No debería ser así! Rusia finalmente pudo superar la ilegalidad de los matones de Putin, creando una verdadera democracia y el bienestar del pueblo. Así que les pido... por el bien de su futuro, por el bien del futuro de sus hijos... apoyen al ejército ruso con todas sus fuerzas. Soldados del ejército ucraniano, vuelvan sus tanques hacia Kiev, hacia los palacios de esos parásitos que han robado su país todo este tiempo, y nosotros les ayudaremos en esto: derrotamos a Abramóvich, ¡también derrotaremos a Kolomoiski!\" Con su discurso, el líder de \"Rusia del Futuro\" demostró en realidad que apoyaba la operación militar especial en el territorio de Ucrania."
 russia.238.a: "El movimiento antiguerra murió antes de que pudiera nacer."
 russia.239.t: "Patriotic Games"
 russia.239.d: "Los juegos de ordenador son muy populares entre nuestra juventud. Puede que merezca la pena dar algo de dinero para crear juegos. El estudio Kremlin Games ha estado creando juegos sobre la Guerra Fría durante varios años, en los que el jugador podía preservar el socialismo en su país y liderar a la Madre Patria a la gloria... pero definitivamente les falta presupuesto. ¿Tú que opinas?"
 russia.239.a: "Bueno, puede que de esto salga algo interesante."
 russia.239.b: "El estado no se gastará dinero en juguetes."
 russia.240.t: "¡El juego es un éxito!"
 russia.240.d: "¡Los desarrolladores hicieron su mejor intento! Arriesgándose al crear el juego en un género nuevo, decidieron crear una interesante aventura ambientada en la guerra civil. A nuestros gamers claramente les ha gustado el juego, con una gran parte de estos elogios viniendo de jugadores rusos. En Occidente el juego no ha tenido el mismo éxito, quedando relegado a una curiosidad de Europa Oriental, pero le gustó a los gamers chinos, y ya hay traducciones en marcha por entusiastas chinos. Los desarrolladores , quienes han generado ingresos sin precedentes, ya han anunciado una secuela. ¿Qué podemos decir como resultado? ¡El gamer soviético está satisfecho y orgulloso!"
 russia.240.a: "¡El dinero no fue invertido en vano!"
 russia.241.t: "¡El juego es un fracaso!"
 russia.241.d: "Habiendo recibido el dinero, los desarrolladores decidieron no arriesgarse e hicieron otro simulador del secretario general del Comité General del PCUS. Aunque es un buen juego, los jugadores del \"primer juego soviético\" esperaron cosas diferentes. Quitando a los fans del género, no le gustó a nadie y quedó rápidamente en el olvido."
 russia.241.a: "No volveremos a gastarnos dinero en mierdas como estas."
 russia.242.t: "Patriotic Games"
 russia.242.d: "Los juegos de ordenador son muy populares entre nuestra juventud. Puede que merezca la pena dar algo de dinero para crear juegos. El recientemente formado estudio The Enchanted Wanderer ha mostrado su potencial, pero definitivamente les falta presupuesto. ¿Tú que opinas?"
 russia.242.a: "Hm... ¿Por qué no?"
 russia.242.b: "El Estado tiene cosas más importantes que hacer."
 russia.243.t: "¡El juego es un éxito!"
 russia.243.d: "¡Los desarrolladores han superado todas nuestras expectativas! El estudio Enchanted Wanderer, tras recibir el dinero, decidió lanzar el primer shooter en primera persona ruso serio llamado \"VESNA\".\n\nLos eventos del juego tienen lugar en un 2020 alternativo, donde el coronavirus no salió de China y fue derrotado rápidamente, Estados Unidos no cayó y no ocurrió la crisis económica global. En 2019, el candidato Volodímir Shmatkó, que prometió restaurar las relaciones con la Federación de Rusia, ganó las elecciones presidenciales de Ucrania por un margen mínimo. En febrero de 2020, comenzaron las negociaciones entre Ucrania y Rusia para firmar el programa \"Ucrania-Rusia\", pero durante las negociaciones, el presidente Shmatkó fue asesinado, y al mismo tiempo tuvo lugar un ataque terrorista en la central nuclear de Zaporiyia. El primer ministro Igor Negoda, que ahora ha asumido las funciones de presidente, acusa a la Federación de Rusia del asesinato de Shmatkó y de operaciones terroristas \"para ayudar a los separatistas del Dombás\". El jugador asume el papel de un combatiente de las Fuerzas de Operaciones Especiales de la Federación de Rusia y emprende una importante misión especial en Ucrania.\n\nEl juego fue bien recibido tanto por jugadores rusos como extranjeros. Los jugadores destacan un buen \"multijugador\", que incluye varias facciones, como: Rusia, China, Polonia, Ucrania y Estados Unidos. En Ucrania, la Rada Suprema aprobó una ley que prohíbe la venta del juego \"VESNA\" en el territorio ucraniano. Los desarrolladores, tras obtener grandes ingresos por las ventas del juego, prometen apoyar el juego con diversas actualizaciones y ya han anunciado un \"pase de combate\". Sin duda, ¡esto es un gran avance para la industria del videojuego rusa!"
 russia.243.a: "¡Genial, y más importante, patriótico!"
 russia.244.t: "¡El juego es un fracaso!"
 russia.244.d: "Después de recibir el dinero, los desarrolladores decidieron crear un nuevo shooter en primera persona y, aparentemente, sobreestimaron sus fuerzas... Aunque resultó ser bastante bueno, el juego está lleno de un montón de errores y un montón de características de pago para ganar, por lo que los jugadores lo apodaron \"Warface 2\". Aunque tiene sus propios fans, no cumplió con ninguna expectativa."
 russia.244.a: "Interesante... nos lo pensaremos dos veces la próxima vez."
 russia.245.t: "Saqueando la corona de acero"
 russia.245.d: ""
 russia.245.a: "Interesante..."
 russia.246.t: "Preparándose para las elecciones"
 russia.246.d: "Tenemos que elegir un candidato para el puesto de presidente."
 russia.246.a: "Yuri Afonin."
 russia.246.b: "Serguéi Lévchenko."
 russia.247.t: "¡Resultados electorales!"
 russia.247.d: "Se celebró la primera elección presidencial de la Unión, ¡y fue ganada por..."
 russia.247.a: "...Denís Parfiónov!"
 russia.247.b: "...Aleksandr Lukashenko!"
 russia.247.c: "...Serguéi Lévchenko!"
 russia.247.e: "...Yuri Afonin!"
 russia.247.f: "...Valeri Rashkin!"
 russia.247.g: "...Alekséi Navalni!"
 russia.247.h: "...Pável Grudinin!"
 russia.247.k: "...Vladímir Soloviov?!"
 russia.247.z: "...Leonid Pásechnik!"
 russia.248.t: "¡Nacionalistas texanos buscan apoyo!"
 russia.248.d: "Hoy llegó un comunicado interesante al Ministerio de Asuntos Exteriores, donde un grupo rebelde de Texas solicita a nuestro Gobierno armas, vehículos y asistencia militar general en su deseo de crear una Texas independiente con puertos de aguas cálidas libres y sin vínculos con ningún Gobierno federal."
 russia.248.a: "NECESITAMOS amigos con puertos de aguas cálidas... ¿Por qué no?"
 russia.248.b: "Preferiría no hacerlo, ¿acaso no recuerdan El Álamo?"
 russia.249.t: "Capturar el aeropuerto de Hostómel"
 russia.249.d: "El Alto Mando se ha reunido y ha determinado que el aeropuerto de Antonov en Hostómel (a las afueras de Kiev) es un objetivo de importancia estratégica. Fuerzas de las VDV serán relocalizas a Bielorrusia para preparar la captura del aeropuerto a primera hora y sostenerlo hasta que refuerzos logren avanzar por la zona de exclusión de Chernóbil para ayudarlos."
 russia.249.a: "Que nos hagan ogrullosos."
 russia.250.t: "Derrota en el aeropuerto de Hostómel"
 russia.250.d: "Sencillamente fue demasiado para nuestros hombres. A pesar de nuestros mejores esfuerzos, nuestras tropas en el aeropuerto hicieron el último sacrificio y murieron en la lucha contra el fascismo. Los paracaidistas han huido hacia los bosques, fueron heridos o se rindieron a la Guardia Nacional Ucraniana. Esto no nos quita nuestra pequeña victoria, pues el aeropuerto ha sido inutilizado durante un tiempo."
 russia.250.a: "A los perdidos, pero esta derrota no será olvidada."
 russia.251.t: "Victoria en el aeropuerto de Hostómel"
 russia.251.d: "En una hazaña que sorprendió al mundo, nuestro asalto paracaidista sin apoyos al aeropuerto de Hostómel ha triunfado, y los valientes hombres que tomaron el aeropuerto han sido reforzadas. ¡Se ha reportado que el general ucraniano Valerii Zaluzhnyi ha sido reprendido y relegado del frente norte de operaciones a causa de nuestra gran victoria! Los observadores internacionales de los noticieros afirman que se está reforzando Kiev de cara a un asalto total, con aviones llegando al aeropuerto, reforzando el frente con más paracaidistas motivados y curtidos."
 russia.251.a: "Pronto, cenaremos en Kiev."
 russia.252.t: "Rashkin protesta fraude electoral"
 russia.252.d: "Las elecciones para la 8ª Duma Estatal de la Federación de Rusia ocurrieron desde el 17 hasta el 19 de septiembre, terminando con el día unido de la votación el 19 de septiembre. En la noche del 20 de septiembre, el día después de que las elecciones a la Duma Estatal terminaran, el líder del comité de la ciudad de Moscú del PCFR, Valeri Rashkin, organizo una protesta en contra del fraude en el formato de una reunión con un diputado. En el 23 de septiembre, la creación de una comité interpartidista de coalición \"Por la abolición de voto electrónico remoto\" fue anunciada. Consiste de candidatos opositores que se presentaron en los distritos de Moscú. Hoy las protestas continuaron en Moscú, Sarátov, Ekaterimburgo, Ufá, Volgogrado, y otras ciudades en el país."
 russia.252.a: "Desagradable."
 russia.253.t: "Alce"
 russia.253.d: "La policía y un empleado del comité de la caza y pesca en la región de Sarátov detuvieron un auto LADA Largus del diputado del PCFR Valeri Rashkin, en el maletero había un cadáver de alce preparado. Esto ocurrió en la noche del 29 de octubre en el distrito de Lisogorski, 60 kilómetros a las afueras de Sarátov. Había un hombre de 49 años en el auto con el político.\n\nEl mismo Rashkin ha dicho que el vio el cadáver del animal muerto en el bosque y se lo quería dar a la policía. Un juicio a Rashkin por caza ilegal ha iniciado."
 russia.253.a: "Típico comunista."
 russia.254.t: "¿Nueva animación rusa?"
 russia.254.d: "Tras los recientes éxitos en el terreno del gaming de la mano de Patriotic Games, algunos inversores han impulsado la idea de expandirse en otros mercados de entretenimiento juvenil, la idea de financiar animación hecha de forma doméstica, más específicamente animé.\nPuede ser visto como un proyecto incluso más arriesgado que los videojuegos, pues los rusos tienen muy poca experiencia con ese estilo, con ideas siendo desechadas como traer de vuelta el arte de Iván Bilibin. Los proponentes argumentan que una propuesta de grandes riesgos, grandes ganancias, además de calmar los miedos sobre la calidad de la animación con la sugerencia de contratar de talentos chinos y japoneses para que ayuden en la producción. \nLa historia del animé debe estar conectada a Rusia y debe tener alguna clase de mensaje patriótico. Muchos sugieren revivir conceptos viejos que fueron abandonados debido a la falta de presupuesto, con otros sugiriendo una historia moderna con un guion al día.\nElijan lo que elijan, deben asegurarse de tener una financiación suficiente para llevar sus ideas a la realidad."
 russia.254.a: "Que lo intenten."
 russia.254.b: "¿No hay mejores cosas en lo que podemos gastar el dinero?"
 russia.255.t: "Regreso de The First Squad"
 russia.255.d: "A pesar de nuestras dudas, ¡Hemos entado exitosamente a un nuevo mercado de entretenimiento! De la mano con nuestros inversores, el estudio de animación \"Molot Entretainment\" ha regresado con una reimaginación de \"First Squad\", que fue estrenada originalmente como una película en 2009. Con el dinero de las inversiones fueron capaces de volver al formato episódico planeado originalmente.\nLa historia se ambienta durante la Gran Guerra Patria, y sigue a la joven pionera Nadya quien posee una conexión paranormal con el reino de los nuestros y una katana hecha con un acero que fue doblado unas mil veces. Por sus habilidades, es reclutada por la rama secreta ocultista de la NKVD, que fue creada para contrarrestar la amenaza creciente de la Ahnenerbe, adentrándose ambas más profundo en el limbo y en profecías místicas para obtener nuevas tecnologías con el fin de ganar la guerra. Ella es capaz de reunirse con sus amigos muertos usando sus poderes y la máquina creada por los soviéticos, y juntos viajan a través del limbo y el mundo material para estropear los planes alemanes. Por otro lado, la Ahnenerbe está siendo ayudada por el caballero teutón Guido von Wolf, victima de una antigua maldición, y que ahora busca vengarse contra los rusos por su derrota en la batalla del hielo.\nLa primera temporada contiene siete episodios, con el episodio final teniendo un sorprendente final que te deja en el suspense. \n'First Squad' ha sido elogiada por los espectadores rusos, quienes resaltan su buena animación, el desarrollo de personajes mejorado en comparación con la original, y por mostrar sin reparos la brutalidad de los nazis durante la guerra, al igual que por hacer énfasis en el patriotismo y en el por qué los rusos lucharon en la guerra. No obstante, algunos críticos occidentales la repudiaron por \"mostrar un claro sesgo histórico\" y \"dejar en un mal lugar a los alemanes\"."
 russia.255.a: "¡Un éxito impresionante!"
 russia.256.t: "Popadanec Po-Russki"
 russia.256.d: "Tenemos malas noticias sobre nuestra reciente inversión: El estudio de animación \"Izhevsk Colors\" ha estrenado \"Popadanec Po-Russki\", y parece que la recepción de \"el primer animé ruso\" ha sido muy fría.\nLa historia se desarrolla cuando el gamer y friki ruso Timur Frolishov es atropellado por un coche de la calle mientras leía las obras de German Romanov, muriendo, pero entonces es teletransportado hacia un nuevo reino de fantasía, el reino de Medvedia, que es una clara referencia a Rusia. Forma rápidamente y sin muchas dificultades un \"harem\" de mujeres escasamente vestidas y se convierte en la mano derecha del rey, recibiendo a su hija como regalo mientras \"lucha\" contra el viejo y malvado lord Bidon y su ejército de ucr-orcos. La temporada tiene 32 episodios con casi la mitad siendo nada más que episodios de relleno o de playa con el final siendo simplemente decepcionante.\n\nEl público la destrozó, criticando la pobre animación, las tramas recicladas de otros cientos animes \"isekai\", y la falta absoluta de cualquier progreso o desarrollo, mientras que los tradicionalistas están furiosos por la representación de las mujeres. Aunque al menos algunos están contentos con el... arte erótico del elenco femenino."
 russia.256.a: "¡¿Lo mejor que se les ocurrió fue un isekai?!"
 russia.257.t: "Retiro de Lenin"
 russia.257.d: "Tras la victoria del PLDR, era solo cuestión de tiempo que la nueva administración \"limpia\" aprobara una propuesta muy controvertida: retirar el cuerpo de Vladímir Lenin del mausoleo.\nPoco después de la orden, un equipo de especialistas extrajo rápidamente el cuerpo de Ilich y lo trasladó a una nueva ubicación secreta, mientras los obreros retiraban todos los recuerdos soviéticos de la tumba, terminando por tachar las letras \"LENIN\" que permanecían intactas desde los años 30.\n\nSi bien las autoridades afirman que el cuerpo de Lenin fue enterrado respetuosamente, como se solicitó en su último testamento, en el cementerio Vólkovo, cerca de su madre, muchos testigos y los pocos comunistas que quedan han expresado dudas sobre la validez de esta afirmación. Con la ceremonia a puerta cerrada y sin pruebas en vídeo del exterior de la lápida, es posible que aún se desconozca el paradero del cuerpo.\nAlgunos rumores en línea sugieren que Lenin fue incinerado y sus cenizas arrojadas al mar infinito, ya que el odio de Zhirinovski hacia los bolcheviques de Lenin es ampliamente conocido.\n\nCon la destitución de Lenin, su tumba ahora está vacía, y algunos miembros del PLDR han estado buscando ideas para transformarla y dejar de ser un lugar de culto bolchevique. Un grupo votó por reconstruir el Museo de la Vida de Vladímir Zhirinovksi para mostrar a la gente quién está al mando e ilustrar sobre su educación. Otros, sin embargo, sugieren remodelarlo como un santuario conmemorativo para la familia del zar Nicolás II, asesinada por orden de Lenin en 1918, depositando sus cenizas en lugar de su cuerpo, restaurando así la justicia histórica para las víctimas del régimen bolchevique."
 russia.257.a: "Una iglesia para demostrar sus crímenes contra el zar."
 russia.257.b: "Construyan el Museo de la Vida del Líder Supremo."
 russia.258.t: "Destrucción del Centro Yeltsin"
 russia.258.d: "Uno de los períodos más vergonzosos de la historia de Rusia, más allá del sangriento régimen bolchevique, es el Gobierno de Borís Yeltsin en los años 90, y nada lo enfatiza más que el maldito Centro Yeltsin, ubicado en la llamada \"capital liberal\" de Rusia, Ekaterimburgo.\nMuchos patriotas deseaban su desaparición, y el PLDR está listo para cumplir este deseo.\nDe madrugada, el equipo de destrucción se reunió cerca del Centro Yeltsin, esperando órdenes. Las órdenes comenzaron con la demolición de la estatua de Yeltsin, que ya tenía escritas palabras como \"Traidor\" y \"Vendido\". Luego se trasladaron al edificio principal, destruyendo tiendas, negocios de recuerdos y un museo construido para celebrar la presidencia de Yeltsin.\nToda la operación fue caótica, pero solo tardó un día y medio en completarse. Al terminar, solo quedó un espacio desolado y vacío con muchos escombros.\nDado que este terreno baldío sin duda arruinará la imagen de la ciudad, los miembros del PLDR sugirieron dos propuestas para construir en el terreno vacío. La primera propuesta es una Gran Catedral, conscientes de la percepción negativa que los liberales tienen de los lugares religiosos en Ekaterimburgo. Esta propuesta no solo sería una gran muestra de nuestra lealtad a la fe, sino que también demostraría la fuerza de nuestro liderazgo. La segunda sugerencia es un enorme centro de entrenamiento para jóvenes patriotas, donde aprenderán fundamentos de defensa, práctica militar e historia de nuestra Madre Patria (jugando a Sid Meier's Civilization), lo que sin duda preparará mejor a las próximas generaciones para luchar por nuestra tierra santa y nuestro líder."
 russia.258.a: "El plan de la gran catedral"
 russia.258.b: "Propuesta del centro de entrenamiento para la juventud patriótica"
 russia.259.t: "La cuestión de Transnistria"
 russia.259.d: "Después de 30 años, Transnistria finalmente tiene una conexión terrestre con Rusia, y ahora la pregunta sobre el futuro del país empieza a surgir."
 russia.259.a: "Los transnistrianos han sufrido lo suficiente; se unirán al Distrito Federal de Novorrusia."
 russia.259.b: "Moldavia deberá ser reformada basada en la experiencia de Transnistria."
 russia.259.c: "Los transnistrianos han sufrido lo suficiente; se unirán al Distrito Federal de Novorrusia."
 russia.260.t: "Reorganización del partido monarquista"
 russia.260.d: ""
 russia.260.a: "¡La monarquía es la forma histórica de Rusia!"
 russia.261.t: "Derechistas de Rusia unidos"
 russia.261.d: "Recientemente, después de un incremento de elementos pro-nacionalistas en la PLDR, muchas organizaciones externas se han unido, y han declarado la creación de una coalición no gubernamental - Unión Nacional de \"Santa Rusia\". Sus objetivos principales, vistos en su \"manifiesto\" es presionar a la administración de Zhirinovski para que implementen políticas más radicales, especialmente en temas raciales y nacionales.\nAun son una amplia minoría, y no poseen ninguna amenaza actual, pero sus miembros radicales se pueden utilizar para asegurar políticas de derecha en nuestro Gobierno."
 russia.261.a: "¡Que grupo tan cariñoso!"
 russia.262.t: "¡Protestas!"
 russia.262.d: ""
 russia.262.a: "¡Joder!"
 russia.263.t: "¡Protestas!"
 russia.263.d: ""
 russia.263.a: "¡Joder!"
 russia.264.t: "¡Protestas!"
 russia.264.d: ""
 russia.264.a: "¡Joder!"
 russia.265.t: "Futuro de Rusia Unida"
 russia.265.d: "Aunque nuestra victoria está asegurada, el destino de Rusia Unida sigue en el aire.\n\nLa mayoría del partido está compuesto por oportunistas de carrera que solo lamen el trasero de quien está por encima de ellos. Originalmente creado solo para aprobar los papeles que Putin necesitaba, ahora han decidido que tienen el poder de pensar por sí mismos. Sin mencionar cuántos de ellos están completamente no calificados para sus cargos.\n\nSin embargo, el partido, al ser de facto el partido de Putin, todavía conserva mucho talento. Fue ese talento en medio de la mediocridad lo que permitió a Putin hacer lo que hizo, y si logramos que estos especialistas y tecnócratas se pasen a nuestro lado, los beneficios serán enormes.\n\n¿Qué será?"
 russia.265.a: "¡Prohibir a esos parásitos!"
 russia.265.b: "Prohibirlos, pero atraer a sus miembros más útiles a nuestro lado."
 russia.266.t: "Ródina se convierte en el nuevo centro"
 russia.266.d: "Tras la derrota de RU, muchos patriotas no tan radicales buscaron partidos a los que unirse. Con la democracia nacional establecida, con el tiempo Ródina se convirtió en el mayor representante de un enfoque diferente de la política, liderado por el carismático Dmitri Rogozin, quien defendía, si no un regreso a la era putinista, al menos algunas políticas del pasado."
 russia.266.a: "Si el pueblo quiere..."
 russia.266.b: "¡Si son verdaderos patriotas, deberían unirse al PLDR!"
 russia.267.t: "¿Cambio de marca del Partido?"
 russia.267.d: "Después de reconquistar Europa Oriental y consolidar nuestro poder, nos enfrentamos a la triste pérdida de nuestro gran líder. Muchos miembros del partido sugirieron que deberíamos inmortalizar sus ideas en el nombre del partido.\nDurante muchos años, Zhirinovski había sugerido y propuesto renombrar el partido en su honor tras su muerte. Muchos en el partido tomaron esta idea muy en serio.\n\nFue la gran visión de Zhirinovski la que nos llevó a la victoria. Somos verdaderamente hijos de sus grandes ideales y sus discípulos.\n\nPor otro lado, el nombre PLDR es simplemente demasiado icónico, y fue con este nombre que Zhirinovski llevó a Rusia a una gran victoria."
 russia.267.a: "Somos hijos e hijas de Zhirinovski..."
 russia.267.b: "PDLR es una marca demasiado buena."
 russia.268.t: "Nuevo Gobierno de Bielorussia"
 russia.268.d: "Con el establecimiento de un nuevo gobierno en Bielorrusia, ¿Qué debemos hacer sobre las lealtades?"
 russia.268.a: "Debemos delegar poderes a lealistas locales."
 russia.268.b: "Nada de descentralización, control directo desde Moscú"
 russia.269.t: "Sala de debate"
 russia.269.d: "Sala. Debate. Debate serio.\n\nDos grupos, probablemente facciones políticas, discutiendo sobre algo. Algo importante. Esto va a verdaderamente decidir el destino de algo grande.\n\nTodas las decisiones ya se hicieron. Sus negociaciones hacen poco sentido. Muchas palabras grandes y poca acción. Se tiene que decidir. Se tiene que decidir ahora mismo.\n\nMuchas ideas grandes. Cientos de ideas pequeñas. Miles de palabras. Tal vez millones.\n\nAl final, solo una idea se queda..."
 russia.269.a: "Esta \"regencia\" debe terminar, tiempo de restaurar a los gobernantes legítimos."
 russia.269.b: "Reformistas de Slutski alcanzan la dominación."
 russia.269.c: "Vlásov siempre fue el favorito de Zhirinovski."
 russia.269.e: "Reformistas de Slutski alcanzan la dominación."
 russia.269.f: "Vlásov siempre fue el favorito de Zhirinovski."
 russia.269.g: "¡Caballeros, esta es una sala de debate, no pueden argumentar aquí!"
 russia.269.j: "But emerge victorioso."
 russia.269.k: "Sherin siempre estuvo verdaderamente comprometido a la nación rusa"
 russia.269.l: "Fuerte iglesia obliga a la PLDR a ceder a sus demandas."
 russia.269.l1: "Kurginián utiliza sus contactos secretos y vuelca a un débil PLDR."
 russia.270.t: "La Unión por siempre"
 russia.270.d: "El Partido Comunista y el pueblo soviético finalmente han reunificado la Unión que perdimos hace más de 30 años. Este es realmente un gran acontecimiento, pero aún no podemos celebrar: aunque nuestras economías están bastante vinculadas, tendremos que reconstruir la mayoría de los lazos entre nuestras Repúblicas, ¡y ni hablar de la construcción del Estado!"
 russia.270.a: "Nuestros objetivos están claros, nuestras tareas definidas. ¡Manos a la obra, camaradas!"
 russia.271.t: "Chubáis dejó Rusia"
 russia.271.d: "Chubáis dimitió y abandonó el país debido a los inesperados resultados electorales. Dos amigos de Chubáis nos dijeron que él y su esposa Avdotya Smirnova se habían marchado a Estambul. Los ministros informan de signos de un éxodo acelerado de capital al extranjero, y entre bastidores, los antiguos oficiales de comunicaciones de los grupos oligárquicos ya están consultando con abogados y consultores occidentales sobre qué hacer, adónde huir y cómo restaurar sus fortunas.\n\nLa nacionalización es inevitable, lo prometimos, la llevaremos a cabo, la única pregunta es cómo se realizará. Tenemos tres planes:\n1) Negociar con oligarcas leales de empresas estatales, transfiriendo el 60% de sus activos al sector público, manteniendo la gestión y celebrando contratos a largo plazo, mientras se retira gradualmente al resto de la gestión;\n2) En la primera etapa, expropiar petróleo, gas, carbón y metal sin demora, pagando una compensación a precios estatales, dejar las industrias restantes con los propietarios anteriores, pero imponer un impuesto \"antioligárquico\" del 75% sobre los beneficios excesivos;\n3) Llevar a cabo una nacionalización total de los sectores clave con compensación en forma de bonos del gobierno al 6% anual; formalmente, la antigua dirección permanece en su lugar, recibiendo \"pagos estatales\" y bonificaciones"
 russia.271.a: "\"Alianza del Estado Popular\"."
 russia.272.t: "Integración de Galicia"
 russia.272.d: ""
 russia.272.a: "Bien."
 russia.273.t: "Reunificación Polaca-Galiciana"
 russia.273.d: ""
 russia.273.a: "Si eso es lo que quieren."
 russia.274.t: "Protestas anti-corrupción en Bulgaria"
 russia.274.d: ""
 russia.274.a: "Tendrán que vivir con eso."
 russia.274.b: "Ceder a las demandas."

 SOV_unity_of_ideology: "Unity of Ideology"
 SOV_unity_of_ideology_desc: "We will not tolerate reactionary, hostile and heterogeneous slogans and statements in our government! Let the West flirt with eternal tossing from side to side, substitution of concepts and difference of conclusions, but our country has a clear idea: \"Workers of the world, unite!\""

 russia.278.t: "Voto de sin confianza pasa en Bulgaria"
 russia.278.d: ""
 russia.278.a: "Interesante."
 russia.279.t: "Partido de Renacimiento electo en Bulgaria"
 russia.279.d: ""
 russia.279.a: "Buenos, al menos nos apoyan"
 russia.280.t: "¡Elcciones!"
 russia.280.d: ""

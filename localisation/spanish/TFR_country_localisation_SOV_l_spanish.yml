 SOV_expose_russian_dissident_neo_nazism: "Exponer las raíces neonazis de disidentes"
 SOV_expose_russian_dissident_neo_nazism_desc: "Los occidentales, insensatamente, decidieron utilizar a nuestros disidentes y presentarlos como santos de la democracia y el liberalismo, mientras que su pasado habla de otros valores que aprecian: la xenofobia, el racismo y el neonazismo. Todas estas opiniones están mal vistas no solo en Rusia, sino también en Occidente, salvo cuando les convenga olvidarlas; les ayudaremos a recordarlas.\nTambién nos ayudará a mostrar a nuestro pueblo qué clase de \"rusos\" luchan realmente por los llamados \"valores occidentales\"."

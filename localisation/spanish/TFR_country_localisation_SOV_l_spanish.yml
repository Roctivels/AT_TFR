 russia.1540.t: "Our Economical Reality"
 russia.1540.d: "A plenum of the Central Committee of the CPSU was convened today in Moscow, at the Kremlin Palace of Congresses. The development of the All-Union economy was on the agenda. During the discussion, the members of the Central Committee came to the conclusion that the country needed gradual economic development, and the delegates proposed several options. After hours of long and fierce discussion, the plenum decided that the economy of the Soviet Union would take the path of..."
 russia.1540.a: "State Capitalism."
 russia.1540.b: "Mixed Economy."
 russia.1540.c: "Left Corporatism."
 russia.1541.t: "[SOV_soviet_union_conference_member.GetName] Agrees!"
 russia.1541.d: ""
 russia.1541.a: "The Soviet Union is getting closer!"
 russia.1542.t: "[SOV_soviet_union_conference_member.GetName] Refuses!"
 russia.1542.d: ""
 russia.1542.a: "Let's do it the hard way then..."
 russia.1542.b: "Try again! Offer better terms!"
 russia.1543.t: "Future of Reforms"
 russia.1543.d: "Alexei Navalny rose to political prominence on promises to reform the Soviet system toward greater liberalization, winning over the younger generation. But even within his team there are differences of opinion: some favor minor reforms aimed at improving the lives of ordinary citizens, while others call for a change in the constitution to suit the new government and a reduction in the role of the Communist Party.\nSupporters of minor reforms believe that there is no need to radically change the Soviet system, and that it is better to win the favor of the people by improving their lives—and this suits the Communists.\nA more radical idea is to change the Soviet constitution to strengthen the power of the Democratic Party. Of course, the Communist Party would not like this decision under any circumstances.\nA happy medium can be found: broad promotion of the DPSU agenda in the legislative process will help strengthen Navalny's power without greatly angering the CPSU. "
 russia.1543.a: "Small but meaningful reforms."
 russia.1543.b: "Push our agenda"
 russia.1543.c: "Our plan is to completely change the constitution!"
 russia.1544.t: "Press Conference"
 russia.1544.d: "A joint press conference between Valery Rashkin, Chairman of the Central Committee of the CPSU, and Alexei Navalny, President of the USSR, took place in Moscow today. The politicians met at the restored Pioneer Palace on Lenin Hills to discuss pressing issues: the issue of relations between the government and the Communist Party was on the agenda.\nRelations between the party and Navalny's team have remained strained since the Communist Party's victory in the 2022 elections: the Popular Front has become the main mouthpiece of the anti-Soviet opposition. The problem worsened after Alexei Navalny was elected in the first All-Union elections: liberal media called for the dismantling of the Soviet system, and party sources attacked the opposition, accusing them of counterrevolution and worship of the West.\nAfter the meeting, the politicians answered questions from the press: in general, the meeting was held in a friendly atmosphere and was recognized by the participants as constructive, and although it was not possible to resolve all issues during it, preparations for subsequent contacts are already underway. In conclusion, Rashkin and Navalny called on the parties to cooperate and expand cooperation between the party and the government."
 russia.1544.a: "There's always dialogue"
 russia.1545.t: "Firma de los acuerdos de Taskent"
 russia.1545.d: "Hoy será recordado en la historia como el día en que se firmó el tratado de amistad entre los pueblos de Rusia y Asia Central. La solemne ceremonia tuvo lugar en el edificio del gobierno de la RSS de Uzbekistán, que reabrió sus puertas para mantener el simbolismo histórico, una iniciativa propuesta por Uzbekistán. Durante el evento, delegados de las repúblicas de Asia Central y diplomáticos rusos firmaron acuerdos históricos sobre el retorno a la doctrina socialista de la unión.\n\nRepresentantes de los países signatarios anunciaron con alegría una nueva página en la historia de sus países. Los documentos firmados no dejaron dudas sobre el fortalecimiento de la alianza política y económica. Este evento puso fin a la cuestión de la influencia rusa en Asia Central."
 russia.1545.a: "La influencia de Moscú crece."
 russia.1546.t: "Firma de la declaración de Tiflis"
 russia.1546.d: "Hoy se celebró una ceremonia en la capital georgiana para firmar un tratado de amistad entre Rusia y Transcaucasia. El evento tuvo lugar en el edificio del parlamento georgiano debido a su asociación con el pasado: solía ser la sede del Gobierno de la RSS de Georgia. Georgia dio este paso como un gesto simbólico, ya que Tiflis fue la capital de la RSFS de Transcaucasia, una de las repúblicas fundadoras de la Unión Soviética.\n\nRepresentantes de los países transcaucásicos y delegados rusos firmaron acuerdos históricos que marcan la restauración de los lazos de unión. Fue notable cómo los diplomáticos de los países signatarios hablaron con optimismo sobre un nuevo capítulo en la historia de sus Estados. Los documentos firmados finalmente confirmaron la presencia de Rusia en el Cáucaso y abrieron nuevas vías para que los pueblos superen conjuntamente los desafíos comunes."
 russia.1546.a: "La restauración de la URSS suena cada vez más probable."

 SOV_sponsor_anti_liberal_resistance: "Patrocinar resistencia antiliberal"
 SOV_sponsor_anti_liberal_resistance_desc: ""
 SOV_horsemen_of_apocalypse: "Jinetes del Apocalipsis"
 SOV_horsemen_of_apocalypse_desc: ""
 SOV_triumph_of_zhirinovsky: "Triunfo de Zhirinovski"
 SOV_triumph_of_zhirinovsky_desc: "El PLDR ha logrado una victoria monumental en las elecciones rusas. Zhirinovski, después de décadas de campañas políticas, finalmente reclamó su legítimo papel como líder del Estado en una elección justa. Sin embargo, no hay tiempo para celebrar, hay mucho por hacer..."
 SOV_power_and_strength: "Poder y fuerza"
 SOV_power_and_strength_desc: "El pueblo ruso, cuando no tiene líder, es como una manada de bestias sin un lobo alfa: fácilmente dominado por las duras fuerzas de la naturaleza. Sin embargo, con un líder de voluntad fuerte, similar a Iván el Terrible o Stalin, pueden lograr las tareas más formidables, conquistar los entornos más duros y derrotar a los enemigos más feroces. Después de tres décadas de estancamiento en la Federación de Rusia, ahora tenemos un líder capaz de ejercer el poder de manera efectiva. Vladímir Zhirinovski, con su voluntad inquebrantable, nos guiará para dominar todas las tierras y pueblos visibles desde las cumbres de los montes Urales."
 SOV_guiding_hand: "Mano guía"
 SOV_guiding_hand_desc: "Un político experimentado es como un hábil director de orquesta; con cada movimiento de su batuta y cada gesto, las masas crean una melodía armoniosa. Un gran líder, por otro lado, es como un faro en una costa rocosa; sus principios rectores brillan como un faro, guiando a los barcos perdidos de regreso seguros al puerto de la nación. Vladímir Zhirinovski es exactamente un líder así, uno que sabe cómo aprovechar la voluntad del pueblo. Su arte político restaurará la unidad del pueblo ruso y revivirá la antigua gloria de la nación."
 SOV_pragmatic_eurasianism: "Rusia y el mundo"
 SOV_pragmatic_eurasianism_desc: "La madre de Gunter es una prostituta de astillero. ¡Triste!\n\nUbicada en este pequeño planeta azul que llamamos hogar, Rusia tiene el privilegio de poseer casi una octava parte de la tierra habitable del mundo. Como resultado, nuestra nación juega un papel fundamental en la diplomacia internacional. Cada acción, por insignificante que parezca, puede desencadenar una compleja reacción en cadena que repercute en todo el mundo, afectando todos los aspectos de la sociedad internacional, desde los piratas somalíes hasta la monarquía sueca. Ahora, estamos listos para reevaluar nuestra política exterior, asegurando que, en este mundo en llamas por el conflicto, Rusia obtenga los máximos beneficios."
 SOV_transform_oligarchy: "Transformar a los oligarcas"
 SOV_transform_oligarchy_desc: "Los oligarcas, a pesar de todos sus errores, siguen siendo una fuerza muy poderosa tanto en dinero como en influencia.\nUsar sus corporaciones y conexiones puede resultar útil..."
 SOV_the_trinity_of_russia_people: "Trinidad del pueblo ruso"
 SOV_the_trinity_of_russia_people_desc: "Los velicorrusos, bielorrusos y malorrusos son, y han sido, el núcleo del mundo ruso. Este vínculo ha sido probado con sangre desde que los varegos unieron las ciudades en disputa de la Rus. Hemos pasado por tantas dificultades juntos, ¡es ridículo desechar ese vínculo debido a la intromisión occidental!"
 SOV_operation_rokossovsky_LDPR: "OPERACIÓN: §YWRANGEL§!"
 SOV_operation_rokossovsky_LDPR_desc: "Piotr Wrangel, el héroe de caballería de la guerra ruso-japonesa y la Primera Guerra Mundial, y el \"Barón Negro\" de la guerra civil rusa, a menudo ha sido malinterpretado. Sin embargo, con esta operación decisiva, su legado será honrado justamente. Mientras nos preparamos para lanzar esta campaña contra nuestro antiguo adversario occidental, Polonia, el nombre del Barón Wrangel será inmortalizado a través del título de esta operación. Nuestro objetivo es romper la barrera central de la Unión Europea contra nosotros. Más allá de esta línea de defensa se encuentra la vasta Llanura del Norte de Alemania, la tierra donde la caballería del Barón una vez soñó con cargar libremente."
 SOV_operation_suvorov_LDPR: "OPERACIÓN: §YBRUSÍLOV§!"
 SOV_operation_suvorov_LDPR_desc: "Alekséi Brusílov, el general más grande del ejército ruso zarista durante la Primera Guerra Mundial, ideó la ofensiva de 1916 como su comandante supremo. Sus fuerzas casi rompieron las líneas defensivas de las Potencias Centrales, un logro que podría haber acortado la guerra en dos años. Trágicamente, en sus últimos años, ayudó al Ejército Rojo a reprimir a sus antiguos camaradas. A pesar de esto, su reputación como líder excepcional y sus notables logros militares merecen nuestro respeto y recuerdo. Por lo tanto, es justo nombrar nuestra operación militar -dirigida a derrotar finalmente a las fuerzas opuestas alineadas con la Unión Europea y celebrar nuestra victoria con un gran desfile en París- en su honor. ¡Que su gloria guíe nuestras fuerzas para siempre!"
 SOV_mobilize_the_minorities_LDPR: "Movilizar toda Rusia"
 SOV_mobilize_the_minorities_LDPR_desc: "Dentro de nuestro Partido Liberal-Demócrata, tenemos la suerte de contar con muchos propagandistas talentosos. Sus habilidades persuasivas pueden transformar incluso a los individuos más pacifistas en fervientes partidarios de nuestra causa, o convertir a adolescentes rebeldes que destrozan carteles de Zhirinovski en patriotas dedicados. Ahora, se enfrentan a un desafío aún mayor. Desde los pasillos de la Duma Estatal hasta las calles estrechas, y desde las primeras páginas de los periódicos diarios hasta las plataformas de vídeo de RT, transmitirán un mensaje apasionado de resistencia a cada ruso, sin importar cuán remota sea su ubicación."
 SOV_matters_of_the_state: "Revitalización nacional"
 SOV_matters_of_the_state_desc: "Nuestra victoria en las elecciones ha causado bastante... revuelo. Muchos se preguntan qué implica exactamente el gobierno de Zhirinovski. Por eso, el líder decidió dar un discurso ante la Duma, explicando cómo Rusia avanzará."
 SOV_control_the_media: "Consolidar el dominio mediático"
 SOV_control_the_media_desc: "La plaga roja, tras la suspensión de la Duma, se ha desesperado. No puede aceptar que perdió el voto del pueblo. Sus dulces mentiras todavía intentan persuadir a los débiles de traicionar el alma rusa. No permitiremos que eso suceda. La plaga será detenida."
 SOV_destroy_inner_russophobes: "Purgar ideales rusofóbicos"
 SOV_destroy_inner_russophobes_desc: "El liberal ruso es lo peor de lo peor. Desprecia a su propio pueblo, cultura e historia. Odia los períodos de prosperidad rusa e idealiza a nuestros enemigos que nos traen sufrimiento. Se les ha dejado campar a sus anchas durante décadas, erosionando nuestras tradiciones y sociedad. Hasta ahora."
 SOV_russian_national_constitution: "Constitución soberana rusa"
 SOV_russian_national_constitution_desc: "La actual Constitución rusa, un mosaico de leyes, solo es comparable al defectuoso estado de la \"Federación de Rusia\" establecido en 1991. Si queremos transformar verdaderamente a Rusia en una nación sagrada para su pueblo, es esencial redactar una constitución más coherente y razonable que proteja mejor los intereses de la nación rusa. Esta será la tarea principal de nuestro partido y gobierno en el próximo período. Bajo el sabio liderazgo de Zhirinovski y la firme guía de Slutski, la constitución soberana de la nación rusa se convertirá en una revelación para todos."
 SOV_implement_party_programm: "Implementar el programa del partido"
 SOV_implement_party_programm_desc: "Como sostiene Slutski, sin el Partido Liberal-Demócrata, Rusia no puede alcanzar una verdadera fuerza. Si el partido no logra convertirse en una organización dirigente bien estructurada, es como si la Madre Patria hubiera perdido su cerebro y su sistema nervioso. Las experiencias pasadas en las instituciones parlamentarias y las batallas de propaganda ya no son relevantes para Zhirinovski y sus colegas, que ahora ocupan los puestos más altos del poder en Rusia. Por lo tanto, adoptaremos las recomendaciones de Leonid Eduárdovich, implementaremos la última versión del programa del partido y reorganizaremos el partido para que sirva como el núcleo de la estructura política de Rusia. Lo fortaleceremos con una red burocrática similar a una red y un liderazgo poderoso y trascendente."
 SOV_populist_revolution: "Revolución populista"
 SOV_populist_revolution_desc: "Como sostiene Vlásov, sin el Partido Liberal-Demócrata, Rusia no puede llegar a ser verdaderamente fuerte. Si el partido no logra convertirse en una organización que una el fervor nacional, es como si la Madre Patria hubiera perdido su cerebro y su sistema nervioso. Debemos tener cuidado con los oportunistas que engañan con consignas como \"legitimar el poder\" y \"reformas pragmáticas\", cuyo verdadero objetivo es socavar la causa de nuestro partido desde dentro. Por lo tanto, escucharemos el consejo de Vasili Maksimovich, adoptaremos la consigna de la revolución populista rusa, uniremos a todos los rusos en torno al partido y a su líder común, y estableceremos vínculos comunitarios indestructibles."
 SOV_national_totalitarianism: "Totalitarismo nacional"
 SOV_national_totalitarianism_desc: "Desde el Partido Comunista de la Unión Soviética hasta \"Rusia Unida\", los políticos de estas organizaciones desacreditadas siempre afirman haber salvado a Rusia en tiempos de crisis, pero sus alardes palidecen en comparación con los logros reales del Partido Liberal-Demócrata. Somos nosotros quienes hemos forjado verdaderamente a Rusia en una comunidad unificada, y como líder innegable de la nación rusa, el partido no permitirá que ninguna otra fuerza política comparta los frutos del poder. Nos uniremos aún más en torno al gran Zhirinovski, estableceremos una estructura de clases jerárquica dentro de la sociedad rusa y devolveremos a Rusia su antigua gloria."
 SOV_elitist_bureaucracy: "Burocracia elitista"
 SOV_elitist_bureaucracy_desc: "Debemos reconocer que, a veces, las masas no pueden gobernar el país por sí mismas. Necesitan la guía de un líder, y de igual importancia es una clase media profesional y burocrática. Esta clase puede traducir las directrices del líder en políticas prácticas que beneficien a la población rusa en general, al mismo tiempo que proporciona retroalimentación oportuna y razonable sobre las demandas del pueblo. Esto fomenta una interacción positiva entre el líder y los ciudadanos, lo cual es esencial para Rusia bajo el gobierno del Partido Liberal-Demócrata. Bajo el liderazgo de Zhirinovski, la nueva élite rusa será una combinación perfecta de pureza nacional, experiencia profesional y lealtad inquebrantable."
 SOV_practice_national_democracy: "Practicar la democracia nacional"
 SOV_practice_national_democracy_desc: "El término \"democracia\", que alguna vez fue una palabra de claro significado y valor, ha sido lamentablemente secuestrado por nuestros adversarios coloniales occidentales y por una oposición interna equivocada. Como resultado, todo ciudadano ruso honorable ahora siente una sensación de asco al escucharlo. Nuestro partido reconstruirá la democracia con características nacionales rusas. Bajo el lema de Slutski de \"democracia nacional\", un partido que realmente sirva al pueblo ruso se unirá en un parlamento dedicado a servir a la nación, deliberando sobre asuntos de estado. Los políticos que engañan al pueblo con retórica vacía serán reemplazados por verdaderos estadistas que provienen de las masas y regresan a ellas."
 SOV_increase_pensions: "Apoyar a los pensionistas"
 SOV_increase_pensions_desc: "Vladímir Vólfovich prometió mejorar las condiciones de los pensionistas cuando llegara al poder. Cumplirá su promesa."
 SOV_patriotic_youth_organizations: "Expandir el movimiento Yunármiya"
 SOV_patriotic_youth_organizations_desc: "Aunque gran parte de nuestra juventud ha sido corrompida por la influencia occidental, todavía sienten orgullo por su nación. Debemos reforzar estas cualidades para asegurarnos de que nuestros jóvenes continúen nuestro legado."
 SOV_glorify_the_white_guard: "Glorificar a la Guardia Blanca"
 SOV_glorify_the_white_guard_desc: "Durante más de 70 años, nos han mentido, primero los comunistas y luego los \"conciliadores\". Se decía que el Gobierno bolchevique llegó con una resistencia mínima, ¡pero no es así! Los necrófagos rojos tomaron el poder en Rusia, ¡con genocidio, con la sangre del pueblo ruso!\n\nAhora se acabó, en el nuevo Estado ruso, no hay lugar para estos ídolos sanguinarios, con su manía esquizofrénica de revolución mundial. La sociedad histórica y la política del estado estarán dirigidas a revivir el buen nombre perdido y olvidado de los soldados y oficiales, y de todos aquellos que lucharon contra los usurpadores rojos. Se restaurará la justicia histórica y los verdaderos héroes de la santa Rusia finalmente serán vengados."
 SOV_revive_russian_culture: "Revivir la cultura rusa"
 SOV_revive_russian_culture_desc: "Uno de los mayores crímenes que el régimen comunista cometió fue el de destruir la sociedad tradicional rusa para moldearla en una universal y \"soviética\". Ahora mismo, la \"cultura\" rusa es solo un cascarón soviético sostenido por importes culturales americanos. Errores como estos deben ser rectificados"
 SOV_honor_the_romanovs: "Honrar a los Románov"
 SOV_honor_the_romanovs_desc: "Los Románov, sin importar cuanto se haya dicho de ellos, siguen siendo la única dinastía legitima de Rusia. Nuestro Imperio debe salvaguardar su historia y llorar por sus destinos. ¡Esas traiciones jamás sucederán otra vez!"
 SOV_orthodoxy_supreme: "Ortodoxia suprema"
 SOV_orthodoxy_supreme_desc: "Nuestros soldados no se mueven por la paga, sino por el deber y la fe.\nNuestros sacerdotes permanecen con los soldados para guiarlos en sus horas más oscuras.\nNuestras armas son bendecidas no solo por los ingenieros, sino también por el Omnipotente.\nNuestra fe es la fuerza que no cederá ante ningún adversario."
 SOV_soothe_the_inordets: "Calmar a los inorodtsi"
 SOV_soothe_the_inordets_desc: "Las minorías étnicas se han puesto ansiosas tras nuestra victoria en las elecciones. Les aseguraremos que, al igual que el antiguo Imperio, los aceptaremos en Rusia con los brazos abiertos, siempre y cuando sean leales al Estado."
 SOV_destroy_aids: "Recuperación de la salud social"
 SOV_destroy_aids_desc: "La comercialización de la sociedad rusa se ha hecho evidentemente clara en las últimas décadas. Con la creciente digitalización del mundo, debemos asegurarnos de que los anuncios que promueven hábitos destructivos desaparezcan de la vista de las masas. Debemos asegurarnos de que nuestra sociedad domestique los vicios modernos, no que se complazca en ellos."
 SOV_promote_skilled_managers: "Promover gerentes capacitados"
 SOV_promote_skilled_managers_desc: "Tras eliminar los principales movimientos de oposición, ha quedado claro que también debemos lidiar con la burocracia del antiguo Gobierno. Para asegurar que el Imperio funcione sin problemas, pondremos a los hombres más leales en puestos de gobernadores para evitar cualquier problema durante el período de transición."
 SOV_supreme_leader: "El Líder Supremo"
 SOV_supreme_leader_desc: "Desde que nos convertimos en un Imperio, es una tontería que nuestro líder sea un presidente. Zhirinovski no tiene intención de convertirse en Emperador, una posición de \"Líder Supremo\" será suficiente."
 SOV_propagate_russian_irredentism: "Perseguir el irredentismo ruso"
 SOV_propagate_russian_irredentism_desc: "Aunque el Gobierno anterior logró el éxito durante la guerra de Georgia y la Primavera Rusa, aún le faltó el impulso para llevar a cabo el resurgimiento del Águila Bicéfala. Apoyar a los patriotas que luchan por el \"mundo ruso\" es un paso adelante."
 SOV_masters_of_europe: "Maestros de Europa"
 SOV_masters_of_europe_desc: "Europa, como siempre, es nuestra amenaza principal. Occidente siempre ha tratado de encadenar a Rusia desde los teutones, pero ahora hasta quieren destruir nuestra cultura y tradiciones. Durante la era dorara del Imperio ruso, ningún cañón se atrevía a disparar sin el permiso de Catarina la Grande. Revivir esa ambición será nuestra nueva meta a partir de ahora."
 SOV_pridnestrovian_frontier: "Patriotas de Pridnestrovia"
 SOV_pridnestrovian_frontier_desc: "La orilla oriental del Dniéster, aunque escasamente poblada, es una región donde los habitantes de Pridnestrovia, rodeados de poderosos enemigos, se han mantenido leales a la gran causa de la nación rusa, defendiendo con firmeza su patria y dignidad. La negligencia del antiguo Gobierno hacia esta zona es una de sus más graves traiciones a Rusia. Pero ahora es el momento de que este sufrido pueblo regrese al abrazo de la Madre Rusia. Les abriremos los brazos a estos patriotas, que han luchado solos durante tantos años, y les brindaremos la gran recepción que merecen."
 SOV_subdue_central_asia: "Regreso a Almaty"
 SOV_subdue_central_asia_desc: "Durante la gran traición, los soviéticos dieron tierras rusas a los kazajos para asegurar su lealtad. Ahora, más de 2 millones de rusos viven bajo un Gobierno que llega a latinizar su idioma para combatir nuestra influencia. El mundo ruso regresará a Almaty, para quedarse."
 SOV_bent_caucasus: "Segunda guerra del Cáucaso"
 SOV_bent_caucasus_desc: "El Cáucaso ha sido un foco de inestabilidad desde la caída de la Unión Soviética. Desde yihadistas hasta los falderos de la OTAN, la región es una migraña constante para nuestra nación. Si queremos luchar contra Occidente, debemos asegurar esta región de una vez por todas."
 SOV_the_time_is_now: "¡Llegó la hora!"
 SOV_the_time_is_now_desc: "El Imperio ha revivido y rejuvenecido, y ahora solo queda una cosa por hacer. Rusia debe corregir el grave error de los soviéticos y devolver a Malorrusia a su Madre Patria. Las repúblicas del Dombás se salvarán de los sodomitas ucranianos."
 SOV_operation_southern_thunder: "Cruzar el Rubicón"
 SOV_operation_southern_thunder_desc: "\"Europa tiene todos los problemas de la antigua República Romana: burocracia extrema, corrupción, extensas luchas internas senatoriales. Al igual que en la antigua República, es natural que una fuerza militar conquiste y transforme Europa en una dictadura militar. Síntesis y antítesis. Ucrania es mi Rubicón\"."
 SOV_greater_union_state: "Gran Estado de la Unión"
 SOV_greater_union_state_desc: "Con todos los preparativos completados, finalmente es hora de integrar Bielorrusia, o Rutenia Blanca como se la conocía originalmente, en nuestro Imperio. ¡Bienvenidos a casa, hermanos!"
 SOV_reinforce_brics: "Reforzar BRICS"
 SOV_reinforce_brics_desc: "Inicialmente, los \"BRICS\" representaban las economías más dinámicas del mundo y servían como referencia para los países en desarrollo. Sin embargo, dada la actual situación global turbulenta, ahora pueden desempeñar un papel más significativo. Rusia abogará por transformar los \"BRICS\" en una alianza multinacional de pleno derecho para contrarrestar el mundo occidental, cada vez más errático pero en declive. Se enviarán invitaciones a China, Brasil, Sudáfrica e India. Al mismo tiempo, nos acercaremos a países deseosos de unirse a los \"BRICS\", como Argentina, Egipto e Indonesia."
 SOV_special_military_operation_ldpr: "Operación militar especial"
 SOV_special_military_operation_ldpr_desc: "Ucrania, un país nacido de una serie de errores de los gobernantes rusos, ha sido durante mucho tiempo una fuente de tensión entre Rusia y Occidente desde el siglo XIX. Desde la revolución de 2014, las potencias occidentales han utilizado a Ucrania para contrarrestar a Rusia. Su objetivo es convertirla en un campo de batalla, agotando los recursos y las vidas de los pueblos eslavos. A medida que sus planes se materializan, es crucial que Rusia actúe con decisión. Ucrania ya no amenazará a Rusia, y un día, podría regresar al redil eslavo, reuniéndose con sus raíces."
 SOV_preserve_malorossiya: "Preservar Malorrusia"
 SOV_preserve_malorossiya_desc: "Aunque la fortuna de la nación se vio empañada por la turbulencia del siglo XX, Ucrania, la joya del Imperio ruso, sigue brillando con fuerza. Desde la fértil tierra negra del Dniéper hasta las minas de carbón del Dombás, el aprovechamiento de los recursos de Ucrania reforzaría significativamente la fuerza de Rusia. Ucrania recuperaría el poder que una vez tuvo en su cenit histórico. Sin embargo, si la guerra devastara todo esto, solo dañaría a nuestro país. Por lo tanto, durante la operación militar, regularemos cuidadosamente las rutas de nuestras tropas y la intensidad de las batallas. Debemos proteger a \"Malorrusia\" de cualquier conspiración que busque su destrucción."
 SOV_operation_russian_thunder: "OPERACIÓN: §YTRUENO RUSO§!"
 SOV_operation_russian_thunder_desc: "Serguéi Surovikin, a menudo criticado en Occidente como el \"Carnicero General\", es de hecho un comandante altamente capacitado y eficaz. Su liderazgo es audaz y decisivo, capaz de maximizar el potencial de sus tropas. Ha demostrado esta habilidad tanto en tiempos de paz como en los campos de batalla de Siria, donde convirtió a soldados ordinarios en una fuerza formidable. Para la operación militar en Ucrania, podría valer la pena considerar el enfoque del General Surovikin. Al desplegar nuestras Fuerzas Aeroespaciales para misiones de bombardeo exhaustivas y utilizar la artillería de cohetes del Ejército para apoyar a nuestras unidades blindadas y de infantería, aplastaremos cualquier resistencia y lograremos la victoria más rápidamente."
 SOV_appoint_zolotov_as_namestnik: "Nombrar namiestnik a Zólotov"
 SOV_appoint_zolotov_as_namestnik_desc: "Víktor Zólotov, comandante de la Rosgvárdia, se ha ganado una gran confianza dentro del Partido Liberal-Demócrata gracias a su servicio militar y su firme postura contra la oposición. Aunque Zólotov tiene estrechos lazos con Yeltsin y Putin, Zhirinovski todavía lo valora como un activo clave, particularmente porque, como muchos generales de alto rango, ha jurado lealtad al líder. Por lo tanto, Zólotov es la elección natural para liderar los territorios recién conquistados. Él traerá justicia y orden a la población recién integrada con mano firme pero justa."
 SOV_rebuild_imperial_frontier: "Reconstruir la frontera imperial"
 SOV_rebuild_imperial_frontier_desc: "Una vez que restablezcamos la frontera rusa a lo largo del río Dniéper, asegurar esta frontera se convierte en nuestra máxima prioridad. Aunque muchos patriotas eslavos leales permanecen en los antiguos territorios ucranianos, no debemos pasar por alto la amenaza potencial de elementos antirrusos. La derrota del régimen de Kiev podría llevarlos a atacar a civiles. En respuesta, necesitamos asimilación cultural y propaganda para inspirar orgullo nacional, así como un enfoque firme para asegurar que estos individuos inquietos se sometan."
 SOV_expunge_ukrainianism: "Expurgar ucranianismo"
 SOV_expunge_ukrainianism_desc: "Algunos afirman que el nacionalismo ucraniano representa una lucha por la liberación del dominio de la Rusia zarista. En realidad, podría ser una rama de la propaganda antirrusa creada por algunos intelectuales polacos descontentos. Con Zhirinovski ahora llevando a Rusia a la victoria, no podemos permitir que esta distorsión histórica siga socavando nuestros esfuerzos. El tridente será desmantelado, y el águila bicéfala rusa siempre velará por el suelo ucraniano."
 SOV_expand_wagner_involvement: "Ampliar la participación de Wagner"
 SOV_expand_wagner_involvement_desc: "Yevgueni Prigozhin, anteriormente mayordomo del presidente Putin y jefe de catering del Kremlin, es ahora más conocido como el líder de la CMP Wagner. Sus mercenarios han operado en Ucrania desde 2014 y luego se expandieron a Siria, Libia, Somalia y el Congo, ganando notoriedad. Aunque algunos puedan dudar en involucrar al Grupo Wagner en la estabilización de la región de \"Malorrusia\", es difícil encontrar guerreros más apasionados y experimentados que estos \"músicos\". Muchos de ellos también tienen fuertes conexiones con figuras importantes del Ministerio de Defensa y del Estado Mayor."
 SOV_anti_corruption_division: "División Anticorrupción"
 SOV_anti_corruption_division_desc: "¡No hay corrupción en Rusia!"
 SOV_branch_out_rosgvardia: "Ampliar funciones de la Rosgvárdia"
 SOV_branch_out_rosgvardia_desc: "Nuestra fuerza policial no es suficiente para salvaguardar nuestra nación en estos tiempos históricos. Debemos reformarlos para que asuman un papel más activo en el mantenimiento de la paz en nuestra nación y no sean una fuerza pasiva encadenada por la burocracia. ¡Ningún revolucionario, insurgente o criminal estará a salvo de nuestros protectores!"
 SOV_annihilate_parasitic_elements: "Aniquilar los parásitos chupasangres"
 SOV_annihilate_parasitic_elements_desc: "Sus yates y mansiones son pagadas por el dinero de Rusia. Nuestros oligarcas creen que están a salvo, que estúpidos que son. Haremos que la purga oligarca de Putin durante los años 2000 parezca un chiste."
 SOV_brightest_minds_in_russia: "Reestructurar la gobernanza estatal"
 SOV_brightest_minds_in_russia_desc: ""
 SOV_party_of_the_masses: "Partido de las Masas"
 SOV_party_of_the_masses_desc: "Vox populi, vox Dei"
 SOV_strengthen_ties_with_iran: "Águila en el desierto"
 SOV_strengthen_ties_with_iran_desc: "Irán y Rusia tienen una historia compleja y enredada, siendo vistos como amenazas uno con el otro. No obstante, la nación única nacida de la Revolución Islámica Iraní no ha dado indicios de ser el mayor enemigo ruso. Por el contrario, el \"Eje de la Resistencia\" de Irán ha forjado con éxito una vasta alianza anti-occidental en el Medio Oriente en los últimos años, altamente mejorando nuestra estrategia regional. Como resultado de esto, Zhirinovski ha decidido buscar una alianza especial con la Republica Islámica de Irán."
 SOV_cooperation_with_china: "Política de China"
 SOV_cooperation_with_china_desc: "China, nuestro socio económico más importante, podría convertirse en nuestro aliado más fiable en un futuro previsible. En los últimos años, China y Rusia se han enfrentado conjuntamente al bloque atlantista en diferentes continentes. Los desafíos militares, económicos y culturales han acercado gradualmente a estas dos grandes naciones. Para fortalecer nuestra seguridad trasera, Zhirinovski ha decidido buscar una alianza especial con la República Popular China."
 SOV_recongize_the_taliban: "Propagar la inestabilidad entre los globalistas"
 SOV_recongize_the_taliban_desc: "Ni tan brutal como el fascismo ni tan fríamente materialista como el marxismo, el neoliberalismo y la globalización se han convertido en los heraldos de la decadencia y el sufrimiento mundial durante las últimas cuatro décadas. Mientras los beneficiarios de la globalización han prendido fuego al mundo, nosotros, a su vez, avivaremos las llamas, con el objetivo de consumir la hegemonía occidental imperante. La gran nación de Rusia ha tocado la trompeta contra el orden capitalista global. Ahora, es hora de disparar el primer tiro, y nuestro objetivo es uno de sus bastiones: la Unión Europea."
 SOV_keeping_america_burning: "Dejar a América arder"
 SOV_keeping_america_burning_desc: "Mientras que observamos a América, nuestra rival por décadas, ahora envuelta en una brutal guerra civil, mentiríamos si dijésemos que no sentimos una pizca de satisfacción. Para asegurarnos de que América nunca pueda recuperarse plenamente y volver a constituir una amenaza para Rusia, aprovecharemos esta oportunidad para involucrarnos en su política interna. Jugando para ambos equipos, formando alianzas estratégicas y dando el apoyo necesario para una o más facciones, buscamos alargar lo máximo posible la Guerra Civil Americana, para que así la magnitud del conflicto engulla a cualquier facción capaz de reunificar América a corto plazo."
 SOV_reorganize_russian_armed_forces: "Reorganización de las Fuerzas Armadas"
 SOV_reorganize_russian_armed_forces_desc: ""
 SOV_expand_ratnik_LDPR: "Ampliar el programa Ratnik"
 SOV_expand_ratnik_LDPR_desc: ""
 SOV_integrate_national_guard: "Integrar la Rosgvárdia"
 SOV_integrate_national_guard_desc: ""
 SOV_cult_of_combined_arms: "Culto a la guerra de armas combinadas"
 SOV_cult_of_combined_arms_desc: ""
 SOV_vdv_supremacy: "Supremacía aerotransportada"
 SOV_vdv_supremacy_desc: ""
 SOV_imperial_army_reborn: "La gloria renacida del águila"
 SOV_imperial_army_reborn_desc: ""
 SOV_armored_infantry_LDPR: "Infantería blindada"

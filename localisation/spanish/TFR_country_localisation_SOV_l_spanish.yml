 SOV_new_guard_support_pluralism: "Defender el pluralismo político"
 SOV_new_guard_support_pluralism_desc: "Para demostrar que estamos lo más abiertos posible al pueblo, es necesario mantener el pluralismo político. Nuestro Partido ya no tiene una línea general y siempre estamos dispuestos a discutir y debatir con representantes de una amplia variedad de puntos de vista."
 SOV_new_guard_support_peoples_initiative: "Apoyar las iniciativas §Rpopulares§!"
 SOV_new_guard_support_peoples_initiative_desc: "Todas las iniciativas locales deben ser apoyadas. Nuestra gente está acostumbrada a la idea de que todas las decisiones importantes se toman desde arriba y que nada depende de ellos. ¡Es hora de curarlos de esta dolencia y levantar una sociedad civil competente!"
 SOV_new_guard_new_soviet_republic: "Nueva §tRepública Soviética§!"
 SOV_new_guard_new_soviet_republic_desc: "¡Es hora de desarrollar un nuevo concepto de construcción del socialismo en el siglo XXI!"
 SOV_new_guard_youth_agitation: "§YPROPAGANDA§!: ¡El camino hacia los jóvenes!"
 SOV_new_guard_youth_agitation_desc: "\n\n\n\n£GFX_SOV_way_to_the_young\n\n\n\n\n\n¡Los jóvenes son nuestro futuro! ¡Necesitamos su apoyo!"
 SOV_new_guard_personality_cult: "§RCulto a la personalidad de§! Rashkin"
 SOV_new_guard_personality_cult_desc: "La personalidad de Rashkin es percibida de forma ambigua por la gente. A menudo es ridiculizado, muchos lo ven como una amenaza en la forma de un segundo Gorbachov, y algunos todavía no le han perdonado el alce que mató en 2021. Es hora de finalmente limpiarlo de esta inmundicia y crear una imagen \"correcta\"."
 SOV_new_guard_destroy_fascists: "[SOV_anti_soviet_resistance_decision_loc]"
 SOV_new_guard_promote_specialists: "Promover a §Yespecialistas§!"
 SOV_new_guard_promote_specialists_desc: "La Unión Soviética colapsó en gran parte porque personas incompetentes y no del todo de buena fe a menudo llegaban a puestos más altos. Para evitar esto, necesitamos apoyar la tendencia tecnocrática y comenzar a promover especialistas calificados y, lo que es más importante, ideológicamente astutos que realmente conozcan su negocio."
 SOV_old_guard_canonize_stalin: "§RCanonizar§! al camarada Stalin"
 SOV_old_guard_canonize_stalin_desc: "\n\n\n\n£GFX_SOV_canonize_stalin_banner\n\n\n\n\n\nDebemos finalmente restaurar la justicia histórica y canonizar al camarada Stalin por sus hazañas y su trabajo por el bien de Rusia y su pueblo. Al mismo tiempo, revocaremos la canonización de la familia real, especialmente la de Nicolás II el Sangriento, falsamente otorgada por la iglesia yeltsinista-burguesa para deleite de los monárquicos, y los restos y la nobleza real."
 SOV_old_guard_canonize_gagarin: "Canonizar a Yuri Gagarin"
 SOV_old_guard_promote_unity: "Fortalecer la unidad de opinión"

 SOV_technocratic_administration_desc: "El sistema de Putin contaba con el apoyo de las llamadas \"torres del Kremlin\" - distintas camarillas y facciones dentro del aparato burocrático, cada una con sus propias ideas sobre cómo debería gobernarse Rusia. Entre ellas figuraban representantes de los organismos de seguridad y los llamados \"tecnócratas\" - gestores más pragmáticos vinculados a empresas estatales.\nAunque muchos de ellos se volvieron partidarios de la reforma, podemos seducirlos con puestos de alto rango. Sus capacidades no pueden pasarse por alto."
 neo_sovereign_democracy: "Neo-democracia soberana"
 neo_sovereign_democracy_desc: "\n\n\n\n£GFX_Ideology_neo_sovereign_democracy_banner\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de izquierda aboga por un mercado más cerrado, similar a la era soviética. Está dirigido a un público de izquierda que desea el regreso del \"comunismo\", pero sin desventajas.\n\nLa §Yneo-democracia soberana§! se basa en principios y políticas parecidas a la visión política de Alekséi Navalni y al programa de su partido. Sus partidarios promueven el progreso tecnológico y económico con énfasis en el sistema de mercado, la liberalización política y una mayor transparencia gubernamental, el establecimiento de relaciones diplomáticas con los países vecinos, así como el pluralismo de partidos políticos y la aceptación de diversas fuerzas políticas radicales, predominantemente de derechas."

 SOV_navalny_protests_category: "Protestas por Navalni"
 SOV_navalny_protests_category_desc: "Una vez más, la Madre Rusia se ha visto envuelta en protestas masivas, esta vez por el polémico arresto de Alekséi Navalni, líder del partido opositor Rusia del Futuro, quien se ha hecho especialmente famoso por sus desenfrenadas campañas contra la corrupción en Rusia. Si bien se esperaba su arresto en algún momento debido, irónicamente, a sus anteriores cargos de malversación de fondos por parte de un tribunal en 2013, lo inesperado fue la enorme reacción negativa a la detención. Cientos de miles de ciudadanos han salido a las calles, interpretando esto como una nueva maniobra del establishment para mantener su control oligárquico del poder, y a medida que pasan los días, la magnitud de las protestas aumenta.\n\nFuerza de las protestas: §Y[?SOV_navalny_protest_strength]§!"

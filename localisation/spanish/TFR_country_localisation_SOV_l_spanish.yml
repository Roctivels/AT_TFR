 SOV_coup_in_donetsk: "Golpe en Donetsk"
 SOV_coup_in_donetsk_desc: "El actual Gobierno del Dombás es un remanente de los virreyes putinistas. Debemos reintegrarlos al verdadero levantamiento popular, no como un Estado independiente, sino como la nueva Ucrania federal y soviética."
 SOV_reform_donbass_government: "Reforma del Gobierno del Dombás"
 SOV_reform_donbass_government_desc: "El Dombás es el corazón de la Rusia soviética, ¡allí viven verdaderos patriotas! Sin embargo, aún no han abrazado plenamente el retorno al sistema socialista; es hora de ayudarlos a adaptarse a los nuevos tiempos."
 SOV_donbass_economic_reforms: "Reformas socio-económicas en el Dombás"
 SOV_soviet_economy_category: "Nueva economía soviética"
 SOV_soviet_economy_category_desc: "Rusia ha sufrido mucho durante estos 30 años de capitalismo. Es necesario comenzar la reconstrucción de la economía popular, que satisfaga las necesidades de la gente común, ¡no las de los capitalistas! Reviviremos el legado soviético y lo fortaleceremos con métodos económicos nuevos y modernos.\n\nHay dos líneas de pensamiento principales en nuestra escuela económica comunista: los £GFX_SOV_dengists  §1dengistas§!, partidarios de adaptar el modelo chino a nuestras condiciones, y los £GFX_SOV_planners  §9planificadores§!, defensores de la implementación de la economía planificada modernizada.\n[SOV_soviet_economy_category_loc]\n\n\n\n\n\n\n\n\n"
 SOV_china_investment: "§YInversiones chinas§!"
 SOV_increase_dividends: "Aumentar dividendos"
 SOV_hold_investment_forum: "Celebrar un foro de inversión"
 SOV_improve_sez: "Ampliar privilegios de las ZEE"
 SOV_improve_sez_desc: "Para atraer al máximo número de inversores y emprendedores a las zonas económicas especiales, estamos introduciendo regímenes fiscales aún más favorables, incrementando los incentivos para los emprendedores y simplificando al máximo las normas comerciales, incluso si esto implica ciertos sacrificios por parte de los trabajadores."
 SOV_accelerate_automation: "Desarrollar un proyecto para una nueva economía"
 SOV_distribute_housing: "Distribuir viviendas a familias jóvenes"
 SOV_museum_branch: "Construir una sucursal del MCRC"
 SOV_museum_branch_desc: "El Museo de los Crímenes de la Rusia Capitalista es un excelente proyecto que sería interesante expandir y construir una sucursal en otra región."

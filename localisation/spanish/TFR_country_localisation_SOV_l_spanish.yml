 SOV_rollback_serdykovs_reforms: "[SOV_rollback_serdykovs_reforms_loc]"
 SOV_rollback_serdykovs_reforms_desc: "[SOV_rollback_serdykovs_reforms_loc_desc]"
 SOV_expand_ratnik_programme: "Ampliar el programa Ratnik"
 SOV_expand_ratnik_programme_desc: "El programa Ratnik es uno de los proyectos de modernización más ambiciosos del ejército ruso, que abarca la más amplia gama de medios de un combatiente ordinario: desde una ametralladora y un cuchillo hasta armaduras, un sistema de comunicación y una mochila con una tienda de campaña. Pero el ritmo de implementación de todas estas herramientas es insuficiente para aumentar la eficiencia de todo el ejército. Es necesario ampliar el programa: equipos de imágenes térmicas desde miras hasta oculares y los desarrollos más modernos en el campo de los exoesqueletos, e introducirlo en tantas unidades como sea posible."
 SOV_improve_deep_battle_theory: "Mejorar la batalla profunda"
 SOV_improve_deep_battle_theory_desc: "Aunque la teoría de la batalla profunda tiene casi un siglo de antigüedad, no ha perdido su importancia en el mundo moderno: toda la doctrina militar de la Unión Soviética se basó en ella durante la Gran Guerra Patria y más allá. Aunque se considera \"obsoleta\", sería miope descartarla por completo. Solo necesita una pequeña mejora, teniendo en cuenta las características de la guerra del siglo XXI."
 SOV_improve_gerasimovs_doctrine: "Refinar la Doctrina Guerásimov"
 SOV_improve_gerasimovs_doctrine_desc: "La doctrina actual de Guerásimov presupone la conducción de una \"guerra híbrida\" utilizando los medios más modernos: ciberataques, operaciones encubiertas, apoyo a varios representantes en un conflicto indirecto. Nos enfrentamos a la perspectiva a corto plazo de una guerra a gran escala con el bloque de la OTAN, y es necesario ajustar esta estrategia a nuestras necesidades. Nuestro ejército se centrará en la calidad, no en la cantidad."
 SOV_reform_the_officer_corps: "Reforma del cuerpo de oficiales"
 SOV_reform_the_officer_corps_desc: "Los oficiales en Rusia a menudo están divorciados de las realidades del campo; reciben rangos no por mérito, sino por su antigüedad, trayendo consigo nepotismo, corrupción y otros vicios de la vida militar. Por lo tanto, es necesario reconectar a los combatientes y comandantes, identificar a los mejores y expulsar a los peores. ¡Un oficial de las Fuerzas Armadas suena orgulloso!"
 SOV_centralize_military_structures: "Centralizar las estructuras militares"
 SOV_centralize_military_structures_desc: "La situación actual de nuestras estructuras militares deja mucho que desear: hay muchos departamentos diferentes con poderes poco claros que se superponen entre sí, burocracia descarada y corrupción... Se necesita un control centralizado sobre las estructuras militares, como el conocido GKO, que tomó el poder total en la Unión durante la Gran Guerra Patria, pero más enfocado en el aspecto militar."
 SOV_unify_command_structures: "[SOV_unify_command_structures_loc]"
 SOV_unify_command_structures_desc: "[SOV_unify_command_structures_loc_desc]"
 SOV_unify_command_structures_rosgvardia: "Comisarios militares"
 SOV_unify_command_structures_normal: "Unificar las estructuras de mando"
 SOV_give_way_to_youth: "Invitar a la juventud"
 SOV_give_way_to_youth_desc: "Todos somos mortales de una forma u otra... Las ideas se vuelven obsoletas, y solo la sangre nueva las ayuda a vivir cuando los viejos mueren, por el tiempo o por los proyectiles. Rusia ha sido famosa por su educación militar durante siglos: numerosas escuelas militares Najímov y Suvórov nutren a nuevas generaciones de oficiales para servir a la Madre Patria. Ahora la sangre joven es necesaria para el desarrollo de nuestra capacidad de combate, ¡es hora de usarla!"
 SOV_promote_reliable_cadres: "[SOV_promote_reliable_cadres_loc]"
 SOV_promote_reliable_cadres_desc: "[SOV_promote_reliable_cadres_loc_desc]"
 SOV_patriotic_zealousy: "[SOV_patriotic_zealousy_loc]"
 SOV_patriotic_zealousy_desc: "[SOV_patriotic_zealousy_loc_desc]"
 SOV_science_in_the_service_of_the_army: "La ciencia en el servicio militar"
 SOV_science_in_the_service_of_the_army_desc: "La guerra moderna no es solo una guerra de ejércitos, una guerra de economías: es una batalla tecnológica y científica. Quien tiene una ventaja tecnológica, incluso con una desventaja cuantitativa, tiene todas las posibilidades de ganar. Los drones FPV modernos, baratos y letales, los medios para combatirlos, los ciberataques a la infraestructura enemiga, todo esto constituye la guerra del siglo XXI. No podemos permitirnos perder en esta carrera armamentística de próxima generación."
 SOV_modernization_of_aircraft_and_ships: "Modernización de aeronaves y buques"
 SOV_modernization_of_aircraft_and_ships_desc: "La Armada rusa representa actualmente una fuerza bastante pequeña, aunque no se queda atrás. El enfoque principal está en los submarinos, y más específicamente en los submarinos de misiles balísticos con armamento moderno. Pero la situación con las fuerzas de superficie es bastante deplorable: el orgullo de la flota, su buque insignia, el Almirante Kuznetsov, ha estado en reparación desde 2018, y su destino futuro es incierto. La gran mayoría de los barcos fueron construidos en la Unión Soviética, es decir, hace más de 30 años. Construir una nueva flota es demasiado caro y una apuesta a largo plazo, por lo que sería lógico modernizar lo que ya tenemos a un estado capaz de competir en igualdad de condiciones con la flota combinada de la OTAN.\n\nLa situación en las Fuerzas Aeroespaciales es mejor: aunque hay una enorme cantidad de equipo de la época soviética, hay mucho y es efectivo. Pero Europa nos está alcanzando lenta pero seguramente en esta área, ya que necesita acelerar el ritmo de adquisición de los últimos Su-57 y la modernización de la aviación estratégica."
 SOV_emphasizing_vocational_training: "Priorizar la formación vocacional"
 SOV_emphasizing_vocational_training_desc: "El ejército ruso históricamente no se ha asociado con el profesionalismo, sino con el carácter masivo: el predominio de la cantidad sobre la calidad. En muchos sentidos, fue la extensión de nuestra tierra y nuestros números lo que ayudó a derrotar a nuestros enemigos. Pero los tiempos han cambiado: ahora la Madre Patria necesita a sus mejores hijos, no solo a todos ellos. Más horas para estudiar teoría militar para los reclutas, aumentar el prestigio del servicio por contrato y más, ¡todas estas medidas deberían mostrar que nuestro ejército sigue un nuevo rumbo!"
 SOV_start_armata_production: "Iniciar la producción del Armata"
 SOV_start_armata_production_desc: "El proyecto Armata es considerado, con razón, el orgullo del ejército ruso. Utiliza todas las innovaciones del siglo XXI: guerra electrónica, protección activa, una torre deshabitada y otras tecnologías de alta gama. Sí, ha pasado mucho tiempo desde que se mostró al público en 2015, pero la sabiduría popular dice que más vale tarde que nunca. Además, el Gobierno de Putin ha sido criticado por el hecho de que todavía no hay soldados en el ejército. Es hora de cerrar este gestalt."
 SOV_expand_t90_production: "Expandir la producción del T-90"
 SOV_expand_t90_production_desc: "El proyecto Armata es sin duda una plataforma innovadora para nuestras tropas. Una torre deshabitada, varios sistemas de guerra electrónica, radares, protección activa... en resumen, una verdadera alta tecnología. Un problema: desde su presentación en 2015, no se han unido al ejército; el vehículo es demasiado caro. Estas preocupaciones no son infundadas, y por lo tanto sería lógico expandir la producción del ya probado T-90, en lugar de establecer la producción de un tipo de armamento completamente nuevo."

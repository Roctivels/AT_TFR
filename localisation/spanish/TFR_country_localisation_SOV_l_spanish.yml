 russia.2007.t: "El fin de la unidad bélica"
 russia.2007.d: "Durante la guerra, era normal que la sociedad perdonara a nuestros líderes, quizás a pesar de algunas deficiencias de la administración de Medvédev; incluso los partidos diseñados para estar en la oposición solo manifestaban pequeñas explosiones de descontento.\n\nAhora que nuestros soldados regresan a casa y la sociedad se recupera de la euforia de la victoria, podemos ver que la gente vuelve a exigir responsabilidad y soluciones al Estado. Las deficiencias de nuestro sistema se hacen más evidentes: la corrupción, la inercia burocrática y la desigualdad económica siguen siendo problemas persistentes en la Rusia moderna, a pesar de algunas mejoras en los últimos años. Rusia Popular defiende el bienestar de los trabajadores y la construcción de un Estado social. Rusia Unida, por su parte, se concentrará en la tradición, la unidad y una economía equilibrada. Los liberales sistémicos y algunos nacionalistas también tendrán sus propias plataformas para presentar sus demandas.\n\nAlgunos lectores quizás recuerden lo que mencioné en 2014: dije que la vida política en Rusia se estancaría hasta que resolviéramos nuestros problemas internacionales. Las reformas de Medvédev abrieron brevemente una caja de Pandora, solo para que el panorama político se congelara de nuevo en nombre de la unidad en tiempos de guerra.\nAhora, queridos lectores, serán testigos de cómo los rusos se involucran en su vida política. Pocos recuerdan principios de los años 2000, pero ahora podemos observar la democracia soberana en acción."
 russia.2007.a: "La primavera rusa ha florecido."
 russia.2008.t: "Dam Break"
 russia.2008.d: "After the unexpected results of the elections, which were won by the Russian Communist Party, Russian society broke out into various kinds of criticism of recent events in our country. This is largely due to the course of the Shevchenko government and the program of his party.\n\nMaxim Shevchenko often criticized Zhirinovsky during his lifetime, and then began to criticize Slutsky for the \"insufficiency of reforms.\"\n\nWe will give examples of, so to speak, \"popular\" opinion in the form of comments on social media.ad networks:\n\"Well, it's good that we revived Russia, but Zhirinovsky and his LDPR did it with absolutely inhumane methods, both bans and raids... the same Putin would never have taken such measures.\"\n\nHere's another example:\n\"Yeah, the LDPR and the people's power are not compatible, your Zhirinovsky shouted against the oligarchs the most, and then what? I kissed them on the lips, and came up with a new name for them, \"imperial business.\" Ugh at you and your idol...\"\n\nAs a radical view, part of a long entry in one LiveJournal:\n\"You really don't know how the fucking war was going! But here's the truth for you inhumans! Zhirik did not know how to fight at all, he made plans exclusively for cakes from different countries that were brought to him, and he cut them. He destroyed the best people of the nation for the sake of some kind of Ukraine. and Zolotov is a maniac in general, young Russian Guards were driven on foot from Tomsk to Poland, but they can't fucking fight, there are no weapons, and this Zolotov is on a horse, all white bitch, waving a saber and shouting \"I ORDER YOU TO KILL CATTLE!\", and they all killed themselves with Polish machine guns, a front-line soldier told about it, miraculously The survivor of an anonymous post....\""
 russia.2008.a: "I believe everything on the Internet."
 russia.2009.t: "Días tensos en el Senado"
 russia.2009.d: "\"¡DESGRACIA!\"\n\"¡TRAICIÓN TOTAL!\"\n\"¡DESTITUYAN A ESTE GOBIERNO AHORA!\"\n\nEstos son solo algunos de los gritos que resuenan a diario en el Senado desde la elección del presidente Shevchenko. A pesar de su victoria, su gobierno solo cuenta con una escasa mayoría en la Duma, enfrentándose a una oposición unida liderada por la coalición \"No al bolchevismo\", que agrupa a todos los partidos de derecha.\n\nHoy, Yuneman pronunció un discurso advirtiendo que él y sus partidarios no permitirán que se apruebe una ley que reduzca las exclusiones raciales y nacionales en el lugar de trabajo. Le siguió un representante del PLDR que intensificó las acusaciones sobre el cripto-comunismo y el desmantelamiento de la identidad de Rusia.\n\nEl Gobierno del PRLJ está demostrando ser inestable. Los halcones dentro de los partidos nacionalistas están reuniendo sus fuerzas para derrocar al joven gobierno de izquierda, utilizando cualquier medio necesario. Circulan rumores sobre la implicación de los militares en complots anti-Shevchenko, ya que están profundamente insatisfechos con los esfuerzos del Estado para \"democratizar\" las fuerzas armadas del país."
 russia.2009.a: "Deben actuar rápido."
 russia.2010.t: "End of LDPR"
 russia.2010.d: "Shevchenko took to public platforms to vehemently condemn the LDPR party and the previous government. In his speeches and articles published by his colleagues, he exposed years of hidden corruption, abuse of power, and nepotism within the ranks of the \"Liberal-Democrats.\"\n\nCiting exclusive access to archives, Shevchenko declared that these individuals must be permanently barred from holding public office again. He urged the Russian people to feel anger and shame upon learning these sordid details about the LDPR leadership.\nThousands of Telegram channels and independent media outlets swiftly published comments, corroborating the claims with their own sources.\n\nSlutsky and other high-ranking LDPR leaders attempted to refute the rumors and accusations, but their efforts fell short of convincing the public.\n\nExperts predict that following local elections, the LDPR will suffer a significant loss of confidence among voters, effectively ending its relevance."
 russia.2010.a: "The domino falls."
 SOV_new_russian_era_rpss: "New Russian Era"
 SOV_new_russian_era_rpss_desc: "Arise, great Motherland, home to diverse peoples of various creeds, nationalities, and religions. A new era dawns upon us all. Russia shines as a beacon of virtue and sanctity, where citizens actively engage in the life of our great nation through democratic and national government bodies. Enemies, both internal and external, may attempt to undermine us, but we will not falter. We are a proud people."
 SOV_slutsky_path_focus_1_loc_6: "Russia's True Heroes"
 SOV_slutsky_path_focus_2_loc_6: "New National Policy"
 SOV_slutsky_path_focus_3_loc_6: "Enlarge the Social Welfare"
 SOV_peoples_mandate: "People's Mandate"
 SOV_peoples_mandate_desc: "Our people have given us a mandate for change from this corrupt and unequal establishment. We'll unleash sweep reforms against the stale and weak administration."
 SOV_repeal_hardline_policies: "Repeal Hardline Policies"
 SOV_repeal_hardline_policies_desc: "Zhirinovsky was a disruptive force for this country, despite his intentions to make it great. The remnants of his policies must be rejected, and his jingoistic and xenophobic legislation must be repealed."
 SOV_unity_consensus: "Unity Consensus"
 SOV_unity_consensus_desc: "No matter how hard we strive to reform, we must recognize that overly hasty and stringent measures could provoke open rebellion against our administration, even from moderate voices within the country. We must engage in a democratic process with all parties involved, excluding the cronies of LDPR."
 SOV_protect_electoral_freedom: "Protect Electoral Freedoms"
 SOV_protect_electoral_freedom_desc: "We are free people, and we will pursue absolute freedom in elections, even if their outcomes do not align with our preferences. This distinguishes us from previous Russian governments."
 SOV_russian_republican_forces: "Russian Republican Forces"
 SOV_russian_republican_forces_desc: "The Russian military must become an integral part of republican democracy. Currently, the military displays a conservative outlook and a strong affiliation with the Liberal Democratic Party of Russia, particularly with the National Guard."
 SOV_patriotic_idealism: "Patriotic Idealism"
 SOV_patriotic_idealism_desc: "To be a patriot is not about blindly following orders or only seeking the positive. A true patriot must always be aware of his country's issues and strive to improve them. It is especially gratifying when the goals of these patriots align with the idealistic aspirations of Russia's government, working together to create a better system."
 SOV_fight_bureaucratic_corruption: "Unión de Combatientes Republicanos"
 SOV_fight_bureaucratic_corruption_desc: "En la República de Weimar, prosperaron multitud de organizaciones militantes compuestas por veteranos de guerra. Si bien algunas eran conocidas por su extremismo, muchos soldados estaban dispuestos a luchar por un orden democrático, o al menos socialdemócrata. El PRLJ establecerá de manera similar un ala independiente para los veteranos de guerra que compartan nuestros ideales políticos."
 SOV_develop_rural_russia: "Desarrollar la Rusia rural"
 SOV_develop_rural_russia_desc: "La Rusia rural ha sido ignorada durante mucho tiempo, su potencial no ha sido reconocido. El PRLJ busca rectificar esto al poner el foco en las áreas rurales, impulsando su prominencia a través de un mayor apoyo financiero y económico para las regiones menos privilegiadas."
 SOV_stand_for_democracy: "Lucha por la democracia"
 SOV_stand_for_democracy_desc: "Democracy is crucial for a nation's survival. President Shevchenko prioritizes democracy above all else. He is a democratic imperialist, if we can call him that. We cannot seek peace with those who deny freedom."
 SOV_spirit_of_the_motherland: "Spirit of the Free Motherland"
 SOV_spirit_of_the_motherland_desc: "Russia is currently the most beautiful and free country on Earth, amidst radicalism and bigotry, Our motherland stans as guiding beacon. President Shevchenko before all is the Russian patriot, and he does not seek peace with those who deny Russia its place under the sun."
 SOV_boost_local_governance: "Una verdadera Federación"
 SOV_boost_local_governance_desc: "Russia is a land abundant in diverse peoples, notably in the Caucasus region. Maxim Shevchenko has deeply explored this subject. These nations must be safeguarded and treated as equals to the Great Russians."

 SOV_form_antimaidan: "Reorganizar el Anti-Maidán"
 SOV_form_antimaidan_desc: "El Antimaidán fue el único grupo de resistencia en el centro y oeste de Ucrania que luchó contra las políticas del Euromaidán. Ante el creciente autoritarismo, fue perseguido y disuelto. Pero ahora que la amenaza resurge lentamente, la ayuda de los patriotas es muy necesaria."

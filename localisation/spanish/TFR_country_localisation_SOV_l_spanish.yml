 SOV_march_of_justice: "Marcha de la justicia"
 SOV_march_of_justice_desc: "La CMP \"Wagner\" logró derrotar a las tropas controladas por el traidor Shoigú y entrar triunfalmente en el corazón de la Madre Patria, Moscú... No basta con tener una gran ciudad bajo tu control, es necesario tener el control total de todo el país para restaurar la justicia dentro de la Madre Patria y vengarse de los europeos por la humillación y la mezquindad contra Rusia. Nuestra marcha de la justicia aún no ha terminado...\n\napenas está comenzando."
 SOV_destroy_traitors: "Aplastar a las alimañas"
 SOV_destroy_traitors_desc: "A pesar de nuestra victoria, todavía hay muchos traidores dentro de nuestro país que están listos para vender su patria por dinero occidental. Liberales, comunistas, funcionarios desleales: todos estos elementos son potencialmente peligrosos para nuestro Gobierno y, por lo tanto, debemos lidiar con ellos por cualquier medio posible.\n\nLo doblaremos con un mazo, pero Rusia será erradicada de la traición desde dentro."
 SOV_secure_government: "Asegurar el aparato estatal"
 SOV_secure_government_desc: "A pesar de nuestras victorias, es imposible gobernar un país tan grande como Rusia solo por la fuerza de las armas. Para el éxito de toda nuestra empresa, necesitamos no solo combatientes leales, sino también funcionarios leales que puedan encargarse del trabajo con el público y de los asuntos menores. Un frente fuerte depende de una retaguardia fuerte."
 SOV_solidify_wagner_reign: "Solidificar el reinado de Wagner"
 SOV_solidify_wagner_reign_desc: "Ahora que la voz de los traidores ha sido silenciada y el aparato estatal ha sido puesto bajo control, podemos iniciar una nueva etapa: la politización de nuestra causa. Hay muchas ideas sobre cómo nombrar a nuestro partido y a qué ideales se adherirá. Puede tener cualquier envoltura, pero lo principal es que el patriotismo radical y la obediencia incuestionable seguirán siendo la piedra angular del camino que Prigozhin elegirá.\n\nLa nueva Rusia no tiene lugar para la debilidad y el \"pluralismo de opiniones\" tan querido por Occidente."
 SOV_wagnerite_corporatism: "Economía wagnerita"
 SOV_wagnerite_corporatism_desc: "La economía rusa del pasado era una de mercado en la que el Estado tenía una gran influencia. Compañías estatales como Gazprom, Rosneft y similares trajeron una cantidad inimaginable de dinero a las arcas estatales al vender recursos energéticos a Occidente y a Oriente.\n\nAhora los tiempos han cambiado, y el control directo del gobierno ha demostrado ser ineficaz. Por esto, Prigozhin decidió no dejar el Estado a manos de las corporaciones, sino subordinarlas al Estado. El poder de las corporaciones lideradas por la gente adecuada será capaz de levantar la economía rusa."
 SOV_fierce_remilitarization: "Remilitarización agresiva"
 SOV_fierce_remilitarization_desc: "Europa intervino en nuestra guerra santa para \"desmilitarizar\" nuestro país. Su plan es obvio: destruir la economía, el ejército y esclavizar a nuestro pueblo. Nosotros únicamente nos estamos defendiendo del euroimperialismo y al rusofobia. Es por esto por lo que la industria debe ponerse en pie de guerra: ¡Más acero, más plomo, más aluminio entre otros recursos! ¡Debemos hacer contratos multibillonarios para producir tanques, aviones, helicópteros y rifles! Y los haremos con la gente adecuada, claro está."
 SOV_military_corporations: "Corporaciones militarizadas"
 SOV_military_corporations_desc: "Las corporaciones son el pilar fundamental de nuestra economía. Y al igual que el resto de nuestro país, deben prepararse para la venganza que se avecina. La imposición de una disciplina estricta y de una obediencia ciega a los superiores beneficiará a las corporaciones. ¡Toda Rusia debe movilizarse para lograr hazañas militares tanto en el frente como en la retaguardia!"
 SOV_demolish_cronyism: "Acabar con el amiguismo"
 SOV_demolish_cronyism_desc: "La práctica de enchufar a familiares en el la burocracia no es nueva en la sociedad rusa, pero el enchufar a tu pareja, hermanos, sobrinos y otros familiares y amigos reduce drásticamente la eficiencia de la administración pública. Es por esto que personajes como Shoigú pudieron llegar tan alto en el sistema de Medvédev.\n\nEs necesario castigar duramente cualquier manifestación de nepotismo en funcionarios de rango medio. En la nueva Rusia, solo hay lugar para los capaces... y los leales."
 SOV_prigozhin_viceroys: "Nuevos virreyes corporativos"
 SOV_prigozhin_viceroys_desc: "Por siglos, los funcionarios han sido blanco de burlas por parte de la población de a pie por su incompetencia y corrupción, lo cual es merecido. El aparato estatal, aún tras nuestras iniciativas, sigue sin ser lo suficientemente eficaz. Por lo tanto, sería lógico introducir prácticas corporativistas en la burocracia. Gerentes de rango medio de corporaciones cercanas a nosotros sustituirán a los funcionarios ineficientes o a los que hayan caído en desgracia."
 SOV_enforce_class_collaboration: "Imponer la colaboración entre clases"
 SOV_enforce_class_collaboration_desc: "La lucha entre el fuerte y el débil, entre el rico y el pobre, entre el proletariado es el disparate que los marxistas traidores defienden a capa y espada, y con el cual han infectado la mente de los rusos. Todos tenemos un objetivo común - la prosperidad de nuestra Madre Patria. Todos, desde Iván, un simple obrero de Tver y Vladislav Yúrievich, el dueño de la fábrica donde trabaja Iván, trabajan duramente para fortalecer e incrementar el poder de la Madre Rusia.\n\nYa basta de desestabilizar nuestra situación con tus estúpidas demandas de un salario decente y la reducción de la jornada laboral de 14 a 10 horas. ¿Acaso quieres perder otra guerra?"
 SOV_subsidize_populistic_welfare: "Subsidiar ayudas sociales populistas"
 SOV_subsidize_populistic_welfare_desc: "Las personas son el principal recurso de cada país. Sin un sector social normal, todos los intentos de construir apoyo popular se derrumbarán como un castillo de naipes ante una ligera brisa. Y nosotros no somos la excepción.\n\nPorque una red social fuerte es un placer muy caro, y necesitamos fondos, en primer lugar, para el complejo militar-industrial. Algunos asesores ofrecen varias iniciativas \"sociales\": dar dinero a los ancianos; eliminar el desempleo utilizándolo en varios proyectos, y mucho más. El pueblo ruso debe ver que el Estado se preocupa por ellos."
 SOV_prigozhin_ruble: "Rublo de Prigozhin"
 SOV_prigozhin_ruble_desc: "Hasta la Segunda Guerra Civil Americana, el rublo estaba ligado al dólar, pero con el caos que conllevó este conflicto, decidimos cambiarnos al llamado \"petrorublo\". Nos logró sacar del apuro, pues el modelo era perfecto: había caos en Arabia y Norteamérica, Rusia se convierte en el principal exportador de petróleo y la tasa de cambio se liga a la moneda nacional. Pero ahora que el flujo de dinero extranjero se ha cortado, no hay nada en lo que el rublo se pueda apoyar, y nos enfrentamos al mismo problema que en los años 90, la hiperinflación. Pero rápidamente encontramos una solución, ¡volver al patrón oro! Encargaremos nuevos rublos \"prigozhinki\", que serán capaces de restablecer la tan necesaria estabilidad economía."
 SOV_rapid_industrial_privitization: "Privatización industrial acelerada"
 SOV_rapid_industrial_privitization_desc: "La privatización de los años 90 hizo muchísimo daño al pueblo ruso. A causa del poco conocimiento económico del pueblo, millones de rusos pasaron a estar bajo la línea de pobreza de la noche a la mañana. Y aunque ya han pasado 30 años de este acontecimiento, ha quedado grabada a fuego en la memoria nacional. Por otro lado, las empresas públicas que todavía persisten han demostrado ser muy ineficientes. Y por culpa de esta ineficiencia, no sólo sufre el estado, también lo sufren nuestros \"socios\" del sector industrial. Por lo que nuestro pueblo deberá abrocharse el cinturón y aceptar que daremos el control de varias empresas a corporacioncitas para su administración."
 SOV_autarkic_economy: "Economía autárquica"
 SOV_autarkic_economy_desc: "Una de las numerosas debilidades de la Rusia de Putin y Medvédev fue su excesiva dependencia en las exportaciones de materias primas, que sólo servía para llenar los bolsillos de oligarcas y burócratas. En vez de producir tecnología punta, la comprábamos tanto del Occidente como de Oriente, lo que nos llevó a la derrota. De ahora en adelante, sólo confiaremos en nosotros mismo, y nadie más. Todos los recursos de Rusia irán a la propia Rusia, y nadie más... excepto para el círculo cercano a Prigozhin, por supuesto."
 SOV_lords_of_war: "Señores de la Guerra"
 SOV_lords_of_war_desc: "¿Qué importa lo que la gente piense de la guerra?, dijo el juez. Hay y habrá una guerra. Bien podrías preguntar qué piensa la gente de la piedra. Siempre ha habido una guerra. Ella existía incluso antes que el hombre, la guerra lo estaba esperando. El oficio principal esperaba a su principal intérprete.\n\n\"Para la mayoría de la gente, la guerra es miedo, terror, destrucción y muerte. Pero solo nosotros, los que estamos por encima de los campos de batalla y las fábricas que producen todo para el frente, tenemos una idea diferente de ella. Para nosotros, la guerra es el juego más grande, con una apuesta que vale cualquier sacrificio. Sí, nos llaman \"mercaderes de la muerte\" y otras frases negativas, pero todo tipo de filósofos y otras personas de la pluma están equivocados. No entienden que allí, más allá de nuestra frontera, están las industrias y los recursos de Europa, esperando nuestra llegada.\n\nPara nosotros, la guerra es un negocio. Y nuestro negocio irá bien en los próximos años."

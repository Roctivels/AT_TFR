 SOV_promote_reliable_cadres_cprf: "Lo mejor de lo mejor"
 SOV_promote_reliable_cadres_medvedev: "Promover cadres confiables"
 SOV_new_russian_army_cprf: "Poderío del Ejército Rojo"
 SOV_new_russian_army_medvedev: "Nuevo Ejército Ruso"
 SOV_status_quo_victory: "Victoria del statu quo"
 SOV_convene_the_duma: "Convocar la Duma"
 SOV_convene_the_duma_desc: "Tras la victoria de Rusia Unida, ha llegado el momento de consolidar nuestra victoria. Putin ya no existe, pero el partido que él creó sigue existiendo. Esto ha creado mucha incertidumbre en el gobierno y la sociedad, ya que nuestro partido no tiene programas ni políticas reales.\n\nCon el regreso de Medvédev al poder, deberá determinar el rumbo que seguirá la nación rusa durante el próximo mandato de seis años. ¿Continuará el legado de Putin? ¿O mantendrá las opiniones que mantuvo durante su primer mandato?\n\nSólo el tiempo lo dirá."
 SOV_pressure_belarus: "Presionar a Bielorrusia"
 SOV_transnistrian_question: "Cuestión de Transnistria"
 SOV_lukashenko_our_man: "Lukashenko, nuestro hombre"
 SOV_lukashenko_our_man_desc: "Aleksandr Lukashenko ha guiado a Bielorrusia con cuidado. Ni siquiera las protestas patrocinadas por Occidente lo detuvieron. Él y su liderazgo demostraron ser más que capaces de ayudarnos en nuestros esfuerzos."
 SOV_stir_up_russian_nationalism: "Fomentar el nacionalismo"
 SOV_stir_up_russian_nationalism_desc: "Durante muchas décadas, la palabra \"nacionalismo\" se asoció con skinheads y nazis en nuestro Estado. Era, y sigue siendo, un término profundamente controvertido. Pero, ¿es realmente así? ¿Fueron escoria los defensores de la Unión Soviética por defenderse de los nazis? ¿Estuvo equivocado el Movimiento Blanco al tomar las armas para defender el antiguo estilo de vida? Independientemente de la ideología, el nacionalismo es lo que impulsó a nuestro país. Roja o tricolor, la bandera no importaba. Porque Rusia es lo que, en última instancia, más importa."
 SOV_prepare_for_unification: "[belarus_unification]"
 SOV_prepare_for_unification_desc: "[belarus_unification_desc]"
 SOV_belarus_unification: "Preparar la unificación"
 SOV_belarus_unification_desc: "Bielorrusia, nuestra república hermana. Con el acuerdo del Estado de la Unión firmado hace más de 20 años, muchos pensaron que el momento de la reunificación había pasado hacía mucho tiempo. Sin embargo, no es ni ha sido así. Quizás en el futuro nuestros hermanos de Novorrusia también se unan a nosotros, pero por ahora es tiempo de que las dos hermanas se preparen para esa realidad."
 SOV_further_integration: "Mayor integración de Bielorrusia"
 SOV_further_integration_desc: "Dado que Putin pudo proclamar el Estado de la Unión antes de su desafortunada renuncia y fallecimiento, a nuestra administración actual se le ha encomendado la tarea de integrarlo aún más. Bielorrusia se convertirá en una región importante para la economía rusa, como era su destino."
 SOV_belarus_operation: "Operación militar en Bielorrusia"
 SOV_belarus_operation_desc: "No ayudar a Lukashenko fue el segundo mayor error en nuestra historia moderna después de no intervenir para salvar el gobierno de Yanukóvich. Ahora no tenemos solo una, sino dos naciones hermanas que están lideradas por una élite prooccidental que no desea nada más que destruir todo lo que nos conecta. Los nacionalistas zmagars ya están tratando de redefinir Bielorrusia, haciéndose pasar por colonizados por Rusia. Sin embargo, de hecho están colonizados. Una vez antes expulsamos a Polonia-Lituania de estas tierras y detuvimos sus intentos de asimilar a nuestros hermanos bielorrusos. Y ahora lo haremos de nuevo."
 SOV_push_back_the_west: "Enfrentar a Occidente"
 SOV_push_back_the_west_desc: "Medvédev ha sido considerado por la mayoría como un idealista \"prooccidental\". Sin embargo, parece que todos los idealistas tienen límites. Al igual que Vladímir Putin antes que él, Medvédev ve a la Europa actual como un adversario. Los sueños de la década de 2000 de un eje ruso-europeo como un tercer equilibrio de poder contra Norteamérica y China han quedado atrás.\n\nMientras la mano izquierda de Occidente arde en agonía, la derecha se rearma para contenernos. No podemos perder el tiempo en dramas triviales inútiles en la Duma. El sistema que Putin construyó es demasiado estático para lo que se avecina, y el objetivo del presidente es asegurar que Rusia sobreviva pase lo que pase. Las cuento pesadillescos que los europeos se cuentan sobre nosotros son reales, porque nosotros los haremos realidad."
 SOV_putinism_with_human_face: "Putinismo con rostro humano"
 SOV_putinism_with_human_face_desc: "Aunque su primer mandato llevó a Rusia a la OMC y estableció un rumbo de cooperación con Europa, para la mayoría en Rusia estaba claro que era Putin quien dirigía el espectáculo. Sin embargo, parece que después de todos estos años, las ideas que tenía nuestro actual presidente nunca desaparecieron.\n\nDmitri Medvédev ha decidido que el sistema debe adaptarse a los desafíos actuales del mundo. Con el hegemón autodestruyéndose, no podemos permanecer inactivos bajo el pretexto de la estabilidad. Rusia debe cambiar, porque no hay un momento más perfecto que este."
 SOV_money_for_pensioners: "Dinero para pensionistas"
 SOV_money_for_pensioners_desc: "Aunque aumentamos la edad de jubilación hace unos años, no podemos dejar a nuestros mayores sin apoyo. En los tiempos de crisis actuales, debemos mostrar una imagen de estabilidad y fortaleza a quienes nos votan. Además, esto puede impulsar nuestros números en las encuestas. Todos ganamos."
 SOV_tighten_media_noose: "Reforzar el control sobre los medios"
 SOV_tighten_media_noose_desc: "A medida que se acerca la fecha de nuestra gran lucha, debemos asegurarnos de que nuestra esfera mediática esté bajo nuestro completo control. Durante demasiado tiempo, proyectos occidentales como \"Novaya Gazeta\" y \"Radio Liberty\" han operado libremente en nuestro suelo. Nuestra información será monitoreada cuidadosamente y revisada para detectar cualquier información errónea que pueda dirigirse contra nosotros."
 SOV_a_toast_to_our_friends: "¡Un brindis por nuestros amigos!"
 SOV_a_toast_to_our_friends_desc: "Si bien las grandes empresas y los oligarcas tienen sus problemas, por el momento responden a nuestros intereses. ¡Felicitémoslos por su lealtad!"
 SOV_weaponise_gazprom: "Utilizar a Gazprom"
 SOV_weaponise_gazprom_desc: "Gazprom es demasiado valiosa como para seguir siendo simplemente una empresa energética. Con el mundo en llamas, nos hemos convertido, en esencia, en uno de los mayores exportadores de energía del mundo. Durante una década, hemos alimentado a Europa con gas barato y hemos recibido poco respeto. Quizás sea hora de que los europeos comprendan que su prosperidad depende en parte de nosotros."
 SOV_them_in_our_pockets: "Mantenerlos leales"
 SOV_them_in_our_pockets_desc: "Nuestros oligarcas tienen algo que necesitamos desesperadamente: redes extranjeras. Medios de comunicación, finanzas, industria, contactos: tienen mucho en términos de capital extranjero. Es hora de que lo utilicen para el mejoramiento de Rusia. Hay mucha gente en Europa a la que le gustamos, pero hay aún más gente a la que le gusta nuestro dinero."
 SOV_central_asian_military_operation: "Operación militar en Asia Central"
 SOV_central_asian_military_operation_desc: "Los Gobiernos de Asia Central se encuentran en una posición peculiar. Durante décadas han intentado distanciarse de nosotros y diversificar sus socios económicos. Y si bien antes podíamos ignorar a las ONG occidentales, las escuelas y las adquisiciones de empresas, hoy no podemos hacer lo mismo. Asia Central tendrá que elegir entre la OTSC y la OTAN. Y, bueno, elegir la OTAN tendrá consecuencias."
 SOV_caucasus_military_operation: "Operación militar en el Cáucaso"
 SOV_caucasus_military_operation_desc: "El Cáucaso siempre ha sido una región difícil de transitar. Los georgianos nos odian por detener su invasión de Osetia del Sur. Los azeríes y los armenios están constantemente en guerra. Sin embargo, no podemos dejar este flanco indefenso. La OTAN podría intentar poner a Georgia o Azerbaiyán de su lado, lo que comprometería a todo el flanco sur. Les enviaremos un ultimátum de cooperación y amistad. Si se niegan, bueno, Rusia encontrará gente en sus naciones que estarán dispuestas a asumir el liderazgo para esa tarea."
 SOV_recognize_donbas: "Reconocer a las repúblicas del Dombás"
 SOV_recognize_donbas_desc: "Es una pena que no hayamos hecho esto antes. Las repúblicas del Dombás murieron y sangraron por nosotros, entonces, ¿por qué deberíamos seguir ignorando su soberanía? Son más que dignas de ser reconocidas, porque fueron ellas quienes dieron vida a la primavera rusa."
 SOV_address_the_nation: "Discurso a la nación"
 SOV_address_the_nation_desc: "Ha llegado el momento. Salvaremos a nuestros hermanos del Dombás del Gobierno ucraniano. Sin embargo, es casi seguro que Europa intervendrá. No importa mucho. Puede que nos superen en número, pero eso también está bien. Derrotamos a Napoleón con significativamente menos tropas. No permitimos que Hitler entrara a Moscú porque nos superaban en número casi dos a uno.\n\nY, como en el pasado, el águila rusa volverá al papel de líder de Europa."
 SOV_reorganize_russian_armed_forces_UR: "Reorganizar las Fuerzas Armadas de Rusia"
 SOV_reorganize_russian_armed_forces_UR_desc: "Las \"reformas\" del ejército realizadas por Serdiukov en 2010 han convertido a nuestro ejército principalmente en una fuerza de contrainsurgencia. Cerrando academias militares y haciendo que el ejército sea el más pequeño desde Pedro el Grande. Con las luchas que se avecinan, debemos volver a ejércitos masivos en lugar de pequeños ejércitos profesionales."
 SOV_expand_ratnik_UR: "Ampliar el programa Ratnik"
 SOV_expand_ratnik_UR_desc: "El programa Ratnik ha mejorado al soldado ruso en muchos aspectos. Pero lamentablemente todavía no se trata de un auténtico equipo de soldado \"universal\". Sería mejor mejorarlo."
 SOV_ensure_officer_loyalty_UR: "Asegurar lealtad de oficiales"
 SOV_ensure_officer_loyalty_UR_desc: "Nuestros oficiales deben estar ideológicamente dispuestos a luchar por nuestra nación. Debemos asegurarnos de que ningún elemento radical entre en el cuerpo de oficiales."
 SOV_reform_officer_schooling_UR: "Reforma de formación de oficiales"
 SOV_reform_officer_schooling_UR_desc: "La era actual es drásticamente diferente de los conflictos del pasado. Nuestros oficiales deben usar las tácticas de guerra avanzadas utilizadas en el Dombás y adaptarlas para los ejércitos de campo. Nuestros oficiales deben esforzarse por convertirse en la punta de lanza de este salto tecnológico."
 SOV_armored_infantry_UR: "Infantería blindada"
 SOV_armored_infantry_UR_desc: "El cambio a un ejército pequeño y profesional había puesto un gran énfasis en los batallones de infantería móvil. En lugar de descartar la idea, deberíamos integrarla en la doctrina."
 SOV_artillery_surpremacy_UR: "Supremacía de artillería"
 SOV_artillery_surpremacy_UR_desc: "Aunque la doctrina móvil era buena para combatir amenazas insurgentes, la guerra convencional del siglo XXI se ganará con una potencia de fuego superior."
 SOV_enforce_doctrine_standards_UR: "Imponer estándares de doctrina"
 SOV_enforce_doctrine_standards_UR_desc: "Muchos piensan que la doctrina soviética es ineficaz en los tiempos modernos. Sin embargo, si vamos a luchar contra un enemigo casi igual, la doctrina occidental de municiones caras y fuerzas pequeñas no será suficiente. Es crucial avanzar más en la doctrina."
 SOV_boost_aviation_funding_UR: "Impulsar la financiación de aviación"
 SOV_boost_aviation_funding_UR_desc: "Nuestra fuerza aérea necesita una gran inversión. Modernizarla es crucial para los desafíos que se avecinan."
 SOV_modernize_fleet_UR: "Modernizar la flota"
 SOV_modernize_fleet_UR_desc: "Para seguir siendo competitivos en las aguas, debemos mejorar los diseños de nuestros barcos para adaptarlos a la era moderna."
 SOV_build_up_western_air_bases_UR: "Construir bases aéreas occidentales"
 SOV_build_up_western_air_bases_UR_desc: "Aunque modernizar la flota podría ser beneficioso, la Fuerza Aérea necesita más atención. Expandir las bases aéreas es crucial para nuestros futuros proyectos."
 SOV_reinforce_black_fleet_UR: "Reforzar la Flota del Mar Negro"
 SOV_build_up_air_and_sea_fleets: "Construir flotas aéreas y navales"
 SOV_build_up_air_and_sea_fleets_desc: "Después de unir las diferentes empresas de construcción naval y aeronáutica en 2 monolíticas, podemos poner en marcha nuestros planes. Haremos pedidos adicionales de barcos y aviones para expandir nuestras fuerzas. Las fábricas que han estado en gran parte inactivas desde la caída de la URSS trabajarán sin descanso para cumplir nuestros planes."
 SOV_build_up_western_military_district_UR: "Reforzar el Distrito Militar Occidental"
 SOV_build_up_western_military_district_UR_desc: "Occidente siempre ha sido nuestra prioridad militar. Debemos asegurarnos de que nuestro distrito occidental sea capaz de competir con los desafíos."
 SOV_mass_produce_t14_UR: "Producción en masa del T-14"
 SOV_mass_produce_t14_UR_desc: "El T-14 es nuestro orgullo y alegría. Sin embargo, nuestro complejo industrial no se molestó en producirlo en masa debido a su coste y a la falta de voluntad para gastar dinero en algo que no fueran ellos mismos. Sacudiremos a los industriales y nos aseguraremos de que el Armata se convierta en la nueva cara del ejército ruso."
 SOV_mass_mechanization_UR: "Mecanización en masa"
 SOV_mass_mechanization_UR_desc: "Con el regreso a un ejército a gran escala, ha surgido la cuestión de la mecanización. Muchas de nuestras nuevas unidades simplemente no tienen suficientes vehículos para usar, y las reservas soviéticas solo se utilizan para emergencias. Debemos aumentar la producción de vehículos blindados."
 SOV_special_military_operation_ur: "Operación militar especial"
 SOV_special_military_operation_ur_desc: "Ucrania, un país nacido de una serie de errores de los gobernantes rusos, ha sido durante mucho tiempo una fuente de tensión entre Rusia y Occidente desde el siglo XIX. Desde la revolución de 2014, las potencias occidentales han utilizado a Ucrania para contrarrestar a Rusia. Su objetivo es convertirla en un campo de batalla, agotando los recursos y las vidas del pueblo eslavo. A medida que sus planes se hacen realidad, es crucial que Rusia actúe con decisión. Ucrania ya no amenazará a Rusia, y algún día, podría regresar al redil eslavo, reuniéndose con sus raíces."
 SOV_protect_civilian_lives: "Proteger vidas civiles"
 SOV_protect_civilian_lives_desc: "Es importante recordar que nuestras operaciones militares en Ucrania se centran en atacar a grupos fascistas extremistas y al Gobierno de Kiev, que está bajo la influencia de las potencias occidentales. Sin embargo, los civiles ucranianos, particularmente aquellos en las regiones orientales afectadas por el conflicto, no son nuestros enemigos. De hecho, son clave para el éxito de nuestros esfuerzos de liberación, y ganarse su apoyo es esencial. A medida que avanzamos, nuestras fuerzas deben priorizar la protección de los civiles, sus propiedades y su seguridad. Nuestro objetivo es demostrar al mundo que el ejército ruso no es el \"ejército tártaro\" que algunos afirman que es, sino más bien unas fuerzas de élite disciplinadas."
 SOV_operation_armageddon: "OPERACIÓN: §YARMAGEDÓN§!"
 SOV_operation_armageddon_desc: "Serguéi Surovikin, a menudo criticado en Occidente como el \"General Armagedón\" y el \"Carnicero de Siria\", es de hecho un comandante altamente cualificado y eficaz. Su liderazgo es audaz y decisivo, capaz de maximizar el potencial de sus tropas. Ha demostrado esta habilidad tanto en tiempos de paz como en los campos de batalla de Siria, donde convirtió a soldados comunes en una fuerza formidable. Para la operación militar en Ucrania, podría valer la pena considerar el enfoque del General Surovikin. Al avanzar con determinación resuelta y una fuerza abrumadora, podríamos debilitar significativamente la resistencia del Gobierno de Kiev y del ejército ucraniano. Esta estrategia puede provocar daños colaterales sustanciales, y la infraestructura de Ucrania podría verse gravemente afectada por nuestra artillería y ataques aéreos. Si bien la pérdida de vidas y la destrucción son trágicas, tales sacrificios a veces se consideran necesarios en la búsqueda de objetivos estratégicos."
 SOV_civil_military_administrations: "Administraciones cívico-militares"
 SOV_civil_military_administrations_desc: "Desde 2014, Ucrania ha experimentado una inestabilidad significativa, impulsada no solo por tensiones étnicas y un conflicto de baja intensidad en curso, sino también por la corrupción generalizada dentro del Gobierno, las ineficiencias en el sistema administrativo y la explotación de recursos por parte de los oligarcas económicos. Sin embargo, con la llegada de las fuerzas rusas, anticipamos un cambio sustancial. Estableceremos administraciones cívico-militares en los territorios recién liberados, trabajando rápidamente para restaurar la economía local y el orden social. Esto marcará la primera forma genuina de gobierno que representa los intereses del pueblo ucraniano desde que el liderazgo actual tomó el poder en Kiev. Estamos comprometidos a mejorar sus vidas, ofreciendo mayor prosperidad y estabilidad que antes de que comenzara el conflicto."
 SOV_return_novorossiya_to_home: "Regresar a Novorrusia a la Madre Patria"
 SOV_return_novorossiya_to_home_desc: "Donetsk, Lugansk, Zaporoye y Jersón son regiones ricas en historia y profundamente ligadas al mundo ruso. Sin embargo, actualmente se encuentran aisladas debido al conflicto ruso-ucraniano en curso. Creemos que esta situación está a punto de resolverse, y estos territorios pronto se reincorporarán a su lugar legítimo en la historia. Al organizar un referéndum nacional, estamos seguros de que el pueblo de Rusia apoyará la reintegración de estas regiones en la Federación de Rusia. Si bien algunos pueden desestimar el referéndum como una mera formalidad o acusarnos de crear una \"aldea Potemkin\", la verdad finalmente prevalecerá. A pesar de cualquier oposición, nos mantenemos firmes en nuestra determinación, sabiendo que el pueblo ruso seguirá cosechando éxitos."
 SOV_our_historic_duty: "Nuestro deber histórico"
 SOV_our_historic_duty_desc: "La conquista de la región ucraniana por la Rusia zarista estableció la gobernanza y las ciudades rusas. Sin embargo, durante la Segunda Guerra Mundial, esto se vio amenazado por los nazis alemanes y sus aliados. Nunca debemos olvidar que fue el gran Ejército Rojo, junto con millones de individuos heroicos, quienes se levantaron para defender a Ucrania de la amenaza del nazismo. En las décadas siguientes, ayudaron a asegurar la prosperidad y estabilidad de Ucrania. Hoy, los nietos de los héroes de la Gran Guerra Patria se enfrentan una vez más a las fuerzas del fascismo en Ucrania. Aunque el comunismo ya no sea el grito de guerra que fue, el hecho es que las fuerzas fascistas siempre serán derrotadas por nuestros soldados. Esta verdad se mantiene firme."
 SOV_form_pro_russian_brigades: "Formar brigadas prorrusas"
 SOV_form_pro_russian_brigades_desc: "Incluso fuera de las fronteras de \"Novorrusia\", las amenazas persisten en suelo ucraniano. Es difícil predecir cuándo las fuerzas antirrusas en Ucrania podrían desestabilizar la región una vez más y representar un peligro para nuestra gente. Por lo tanto, podemos optar por apoyar a grupos armados prorrusos locales, unidos por lazos culturales y étnicos comunes. Estos grupos podrían entonces enfrentarse a las fuerzas militantes ucranianas, ayudando a proteger nuestras fronteras."
 SOV_fund_anti_banderite_partians: "Financiar a partisanos antibanderistas"
 SOV_fund_anti_banderite_partians_desc: "Incluso fuera de las fronteras de \"Novorrusia\", las amenazas persisten en suelo ucraniano. Es difícil predecir cuándo las fuerzas antirrusas en Ucrania podrían desestabilizar la región una vez más y representar un peligro para nuestra gente. Para aquellos en Ucrania que continúan honrando al colaborador nazi Stepán Bandera, podemos permanecer unidos bajo la bandera del antifascismo. Al establecer una fuerza paramilitar para combatir estas facciones nacionalistas, podemos ayudar a proteger nuestras fronteras."
 SOV_war_is_peace_UR: "¡Por una causa justa!"
 SOV_war_is_peace_UR_desc: "Esta guerra puede ser la \"batalla definitiva\" que tanto hemos anticipado, permitiéndonos poner fin a la llamada \"estrategia de contención\" impuesta por los países occidentales. Romperá las restricciones políticas, económicas y culturales sobre el pueblo ruso, permitiendo que la nación rusa logre una verdadera liberación. En esta \"guerra total\", nuestros ciudadanos lo entenderán a través de los esfuerzos de los medios de comunicación, los defensores culturales y las plataformas en línea. Como resultado, el concepto de una \"guerra sagrada de justicia\" se arraigará profundamente en cada ruso."
 SOV_trample_over_kiev_UR: "Aplastar a Kiev"
 SOV_trample_over_kiev_UR_desc: "Aunque la operación militar especial contra Ucrania ha debilitado gravemente a la nación, no la ha aniquilado. Dado que todavía hay fuerzas antirrusas activas en sus territorios restantes, algunos podrían argumentar que esto fue un grave error. Sin embargo, este error será corregido ahora. Nuestras fuerzas aplastarán decisivamente la resistencia ucraniana. La visión de los tanques T-14 entrando en la Plaza de la Independencia de Kiev acabará con cualquier esperanza de desafío. Además, la Unión Europea debería abandonar cualquier plan de utilizar Ucrania como base avanzada para contrarrestar a Rusia."
 SOV_crack_down_on_protests_UR: "Reprimir protestas"
 SOV_crack_down_on_protests_UR_desc: "Debemos admitir que la persistente propaganda occidental ha nublado las mentes de nuestra juventud, particularmente la de Moscú, San Petersburgo y Ekaterimburgo, dejándolos confundidos e incapaces de discernir el bien del mal. La llamada \"generación despierta\", influenciada por el liberalismo, sigue los llamamientos de los medios occidentales y sale a las calles en protestas \"anti-guerra\". En tiempos de paz, podríamos hacer la vista gorda ante tales demostraciones, quizás solo desplegando a la policía para dispersar a la multitud. Pero en tiempos de guerra, la indulgencia es un lujo que no podemos permitirnos. La Rosgvárdia acabará con sus ilusiones encarcelando a los líderes de las protestas, enviando un mensaje claro de que los esfuerzos por desestabilizar Rusia a través de la opinión pública serán inútiles."
 SOV_to_serve_russia_UR: "Servir a Rusia"
 SOV_to_serve_russia_UR_desc: "Una ventaja significativa de la vasta extensión territorial de Rusia es su suministro prácticamente ilimitado de reclutas para el ejército. Desde Múrmansk hasta Vladivostok, y desde la península de Kamchatka hasta el Cáucaso, jóvenes de diversos orígenes se unen a las filas, otorgando a Rusia una ventaja en mano de obra inigualable por cualquier adversario. Para fortalecer aún más nuestra capacidad militar y elevar la moral de los soldados en el frente, el Gobierno ruso presentará un paquete integral de políticas. Estas medidas incluyen un mejor apoyo material para las familias militares, más condecoraciones, mayores compensaciones por bajas y oportunidades para que los soldados destacados asistan a la formación de oficiales superiores. Al mostrar estos beneficios, el Gobierno espera inspirar a más personas a servir a Rusia."
 SOV_authorize_banned_weapons_UR: "Autorizar armas prohibidas"
 SOV_authorize_banned_weapons_UR_desc: "La escala e intensidad de la guerra actual superan cualquier conflicto desde la Segunda Guerra Mundial, una realidad que ni siquiera los estrategas más audaces de la Guerra Fría podrían haber imaginado. Para asegurar la victoria y demostrar los últimos avances de nuestro ejército, desplegaremos nuevas armas, incluyendo grandes lanzacohetes, drones y vehículos de combate no tripulados. Algunas de estas armas estaban previamente restringidas debido a su potencial de daño colateral excesivo o inestabilidad. Sin embargo, con esas restricciones ahora levantadas, podemos usarlas con confianza para lograr resultados significativos."
 SOV_operation_rokossovsky_UR: "OPERACIÓN: §YSUVÓROV§!"
 SOV_operation_rokossovsky_UR_desc: "Aleksandr Suvórov es, sin duda, uno de los comandantes militares más brillantes de la historia de nuestra nación. Sus campañas en los Balcanes, Polonia e Italia tuvieron tanto éxito que dejaron asombrados a los ejércitos y generales más formidables de Europa. Como tal, nombrar la última operación militar rusa en su honor es un tributo apropiado. Las defensas de Estonia, Letonia y Lituania serán rápidamente superadas por nuestras fuerzas, interrumpiendo la estrategia de larga data de la OTAN de usar los Estados bálticos para contener a Rusia."
 SOV_operation_aleksandr_UR: "OPERACIÓN: §YZHÚKOV§!"
 SOV_operation_aleksandr_UR_desc: "Hemos eliminado con éxito la amenaza de las fuerzas militares de la UE en nuestras fronteras. Ahora es el momento de empujar nuestras fronteras hacia el mar del Norte y los Pirineos. Este movimiento cumple el sueño largamente anhelado de los patriotas que han luchado por la supervivencia y la grandeza de Rusia: ver a nuestro ejército convertirse una vez más en el protector de Europa, como lo fuimos en el siglo XIX. Para conmemorar esta lucha, nombraremos la operación en honor al mariscal Gueorgui Zhúkov, el legendario líder que comandó al Ejército Rojo para conquistar Berlín. ¡Que su gloria guíe siempre a nuestras fuerzas!"
 SOV_mobilize_the_chechens_UR: "Movilizar a los chechenos"
 SOV_mobilize_the_chechens_UR_desc: "Gracias a los esfuerzos del presidente Putin, los chechenos, que una vez fueron adversarios formidables, se han convertido en algunos de los aliados más leales de Moscú. Aunque Ramzán Kadírov todavía se enfrenta a importantes críticas, mientras siga suministrando al ejército a sus hábiles combatientes, la asociación seguirá siendo fuerte. Con la escalada de la Guerra Europea, ahora es el momento de que Kadírov se comprometa plenamente. El despliegue de guerreros chechenos en el campo de batalla sin duda aterrorizará a los mimados soldados de la Unión Europea."
 SOV_deals_with_oligarchs: "Tratos con oligarcas"
 SOV_deals_with_oligarchs_desc: "Los oligarcas tienen el dinero y la influencia para impulsar nuestra economía. En lugar de estatizar sus empresas, deberíamos usar sus activos y conexiones en el extranjero para impulsar nuestra economía."
 SOV_invest_in_CSTO_members: "Invierte en los miembros de la OTSC"
 SOV_invest_in_CSTO_members_desc: "Los miembros de nuestra alianza están, en el mejor de los casos, poco preparados para un conflicto importante. De hecho, al igual que los amigos europeos de EE.UU. en la OTAN, los miembros junior de la OTSC esperaban que los protegiéramos con poca o ninguna contribución de su parte. Esto no puede ser así.\nReorganizaremos sus fuerzas militares en una estructura conjunta e invertiremos en ellas. Después de todo, también tenemos planes para ellos en el próximo conflicto..."
 SOV_focus_russian_economy: "Enfoque en las corporaciones estatales"
 SOV_focus_russian_economy_desc: "Las corporaciones estatales, a pesar de todos sus errores, tienen potencial. Rosatom es un ejemplo perfecto de esto. Una corporación que nos ha convertido en el mayor exportador nuclear del mundo. Implementar una eficacia similar en todas nuestras industrias será crucial."
 SOV_invest_in_donbas: "Invertir en el Dombás"
 SOV_invest_in_donbas_desc: "El Dombás es una región muy rica. Y si bien se mantiene en un limbo económico por la guerra, eso no significa que no podemos revivirla. Invertir en la región le dará suficientes fondos no solo para pagar por si mismo, si no también para integrarse en nuestra economía"
 SOV_strengthen_serbia_ties: "Reforzar lazos con Serbia"
 SOV_strengthen_iran_ties: "Reforzar lazos con Irán"
 SOV_nationalize_oligarch_industries: "Estatizar industrias de oligarcas"
 SOV_nationalize_oligarch_industries_desc: "Aunque tratar con los propios oligarcas es problemático por varias razones, estatizar sus industrias será un asunto mucho más sencillo. Después de todo, muchos de ellos obtuvieron sus puestos gracias al Gobierno. Deberían saber lo que les sucede a quienes van en contra de nuestra voluntad."
 SOV_merge_tankograd: "Fusionar Tankograd"
 SOV_merge_tankograd_desc: "Nuestras fábricas de tanques están actualmente divididas entre múltiples empresas, cada una dirigida por un empresario civil con poco conocimiento sobre coordinación. De hecho, la única razón por la que nuestra industria militar sobrevivió en tan buena forma fue porque los empresarios pensaron que sería más fácil vender las armas producidas en el extranjero que desmantelar la fábrica como muchas otras. Les agradecemos por esto, por lo que les quitaremos estas fábricas y crearemos un conglomerado unificado de producción de blindaje."
 SOV_invest_education_sector: "Economía orientada a las personas"
 SOV_invest_education_sector_desc: "Aunque podríamos simplemente hacer lo que hicieron los soviéticos en cuanto al desarrollo industrial, ¿no es la mejora de la vida de nuestra gente una mejor alternativa? Más dinero en la economía y más productos locales que estarán dispuestos a comprar. Salarios justos también ayudarán a que nuestros pequeños negocios prosperen, ya que nuestra gente tendrá más dinero para gastar en ellos. ¡Los rusos merecen una vida rica! ¡Y la economía rusa también lo merece!"
 SOV_invest_scientific_sector: "Enfoque en el desarrollo industrial"
 SOV_invest_scientific_sector_desc: "Lo que necesitamos es un gran sector de industria ligera que pueda competir con los extranjeros. Las fábricas deben ser eficientes y abundantes en nuestra nación. No podemos convertirnos en el taller del mundo, sí. Sin embargo, siempre podemos llenar el nicho similar a Alemania o Japón. Es hora de gastar todo ese dinero que habíamos ahorrado."
 SOV_invest_nulcear_power: "Priorizar la industria militar"
 SOV_invest_nulcear_power_desc: "Por mucho que nos gustaría centrarnos en la industria civil, la militar debe tener prioridad. No tenemos dinero ni tiempo que perder. El principal objetivo de Rusia en la década actual es sobrevivir. El consumismo puede esperar."
 SOV_invest_resource_refining: "Priorizar la industria civil"
 SOV_invest_resource_refining_desc: "La expansión de la industria civil será una gran ventaja a largo plazo para Rusia. Las empresas locales no solo mantendrán el dinero dentro del país, sino que también podrían ayudarnos a exportar nuestros productos al extranjero en el futuro. Además, las industrias locales se verán obligadas a encontrar formas creativas de superar la limitada mano de obra disponible. ¿Quizás incluso pueda conducir a la automatización de nuestras industrias?"
 SOV_subsidize_super_computer_research: "Proyecto Nacional: \"Ural Desarrollado\""
 SOV_subsidize_super_computer_research_desc: "Los Urales fueron, y siguen siendo, nuestro principal centro industrial. Es de donde nuestro ejército obtiene sus armas. Es donde se encuentra nuestra industria pesada. Y es allí donde tendrá lugar nuestra próxima expansión industrial."
 SOV_subsidize_medical_research: "Proyecto Nacional: \"Desarrollo del Extremo Oriente\""
 SOV_subsidize_medical_research_desc: "El Extremo Oriente ha sido durante mucho tiempo objeto de interés para un desarrollo masivo por parte del Gobierno. Desde la época soviética, con la construcción del ferrocarril BAM, la región experimentó una gran afluencia de residentes en las nuevas ciudades. Sin embargo, tras la caída de la URSS, esta región sigue fragmentada y aislada económicamente del resto del país.\nPara que nuestras ideas multipolares funcionen, debemos asegurarnos de que el Extremo Oriente se convierta en un nuevo pilar económico de Rusia. ¡Que Vladivostok sea la nueva San Petersburgo!"
 SOV_invest_in_computing_technology: "Soberanización de la economía"
 SOV_invest_in_computing_technology_desc: "Nuestra economía está dominada en gran parte por corporaciones estatales, conglomerados extranjeros y empresas \"rusas\" registradas en el extranjero. Sin embargo, nuestro presidente cree que debemos volver a ser la potencia industrial que fuimos. Y es su plan el que vamos a seguir. Además del próspero sector de TI, reviviremos y crearemos nuevas industrias de alta tecnología para nuestra nación."
 SOV_attract_chinese_investors: "Atraer inversores chinos"
 SOV_attract_chinese_investors_desc: "Por triste que sea decirlo, necesitamos inversores extranjeros para que nuestra recuperación económica sea completa. Y mientras Europa nos está cerrada, China parece tener un gran número de personas dispuestas a desarrollar nuestras industrias. Sus fondos y conexiones serán un gran impulso para nuestra nación."
 SOV_return_to_gold_standard: "Volver al patrón oro"
 SOV_return_to_gold_standard_desc: "Sabes, deberíamos haber hecho esto hace mucho tiempo. Tenemos mucho oro almacenado y muchos rublos que necesitan una base sólida para ser una moneda fuerte. Y con los mercados globales reformándose en medio de crisis, no hay mejor oportunidad para hacerlo. Algunas naciones podrían quejarse, pero ese es su problema."
 SOV_market_regulations: "Promulgar regulaciones de mercado"
 SOV_market_regulations_desc: "A pesar de todo lo que se habla de \"libre mercado\", lo que debemos priorizar es Rusia y solo Rusia. Con el conflicto europeo cada vez más cerca, debemos asegurarnos de que nuestra economía funcione principalmente con productos nacionales."
 SOV_send_military_equipment: "Integrar empresas públicas bielorrusas"
 SOV_send_military_equipment_desc: "Aunque podríamos simplemente privatizar la industria bielorrusa, ¿es realmente necesario? El sistema ha funcionado durante 30 años y no podemos simplemente abandonarlo. Además, los candidatos de la oposición de 2020 basaron su campaña en la privatización de las empresas bielorrusas o en la revisión del sistema actual. ¿Realmente queremos usar el mismo marco que propuso la oposición zmagar?\n\nNo compliquemos las cosas: Bielorrusia conservará su modelo económico."
 SOV_send_humanitarian_aid: "Privatizar empresas públicas bielorrusas"
 SOV_send_humanitarian_aid_desc: "La industria bielorrusa no es competitiva en el mercado actual. Si bien podemos mantener todo como estaba, es mejor dejar que el mercado decida qué industrias prioriza Bielorrusia. Bat'ka puede quejarse todo lo que quiera, pero la economía importa más."
 SOV_force_petrol_ruble: "Imponer el petrorublo"
 SOV_force_petrol_ruble_desc: "Con tanto Nortemérica como Arabia Saudita sumidos en guerras civiles, se nos presenta una oportunidad increíble para obtener aún más beneficios del comercio del petróleo. El petrodólar ha llegado a un abrupto final, y parece que tenemos margen para reforzar nuestras posiciones. La gente se ha reído de nosotros por ser \"una gasolinera global\", llamándonos una nación cuyo tiempo llegará a su fin. Sin embargo, mientras el oro negro arde por todo el mundo, son esos mismos críticos quienes se arrastran hacia nosotros por una sola gota de nuestras riquezas."
 SOV_support_two_party_system: "Apoyar un sistema bipartidista"
 SOV_support_two_party_system_desc: "Aunque Rusia Unida ha servido a Putin en sus empresas, es evidente para todos que el partido fue esencialmente un \"títere\" del presidente. No tiene metas ni ideología reales y ha estado infestado de cabilderos y personas que el público generalmente considera \"de otro mundo\".\n\nY aunque la razón por la que Norteamérica cayó fue debido al polarizado sistema bipartidista, este tiene sus méritos. Comparado con los constantes estancamientos partidistas europeos que inmovilizan el estado o nuestro estatismo monopartidista y el japonés, el sistema estadounidense durante la mayor parte de la historia fue estable. Emularemos este sistema uniendo todos los partidos de izquierda en uno solo, convirtiéndolo efectivamente en centro-izquierda gracias a RJ-PV y Mirónov. Nosotros, mientras tanto, nos haremos cargo de los cuadros del PLDR y nos remodelaremos como un partido de centro-derecha. Ambos partidos tendrán programas y políticas exteriores similares, asegurando que podrán cooperar entre sí en temas clave.\n\nNorteamérica arde en división, sin embargo, hubo un tiempo en que los candidatos podían hacer campaña como cualquiera de los dos partidos (o en algunos casos cómicos, ambos al mismo tiempo) sin problema. Esto es lo que debemos replicar. Socialistas, nacionalistas; somos todos rusos. Nunca debemos olvidar eso."
 SOV_loosen_media_restrictions: "Aliviar restricciones a los medios"
 SOV_loosen_media_restrictions_desc: "Aunque nuestro futuro conflicto con Europa se cierne cerca, entendemos que dar voz a la gente en los medios es crucial. Al relajar las restricciones sobre lo que se puede y no se puede hablar en los medios, lo convertiremos en un lugar viable de discusión y crítica. Los rusos deberían tener la libertad de expresar sus opiniones, porque de eso se trata la libertad. Por supuesto, como en cualquier país libre, tendremos la libertad de elegir qué temas abordaremos y cuáles ignoraremos."
 SOV_enact_anti_corruption_laws: "Promulgar leyes anticorrupción"
 SOV_enact_anti_corruption_laws_desc: "Por mucho que nos gustaría pensar que nuestro sistema es perfecto, no podemos negar que hay muchos actores malintencionados dentro de él. Si bien siempre podemos simplemente ignorar este problema, nuestro presidente cree que ahora no es el momento para la inacción. Robar billones de rublos cada año fue un problema durante los años anteriores. Ahora es inaceptable.\n\nEl mundo se dirige a un cambio radical. No podemos depender de personas que ven a nuestra nación como un simple trabajo para sacar dinero con sus mansiones en Europa y Medio Oriente. Rusia no tiene dinero que desperdiciar en las luchas que están por venir, porque el fuego sigue ardiendo."
 SOV_secure_oligarch_loyalty: "Asegurar la lealtad oligarca"
 SOV_secure_oligarch_loyalty_desc: "Los oligarcas siguen siendo un grupo influyente en nuestra sociedad. Aunque podemos pasar por alto sus intereses gracias a que en gran medida están sometidos a la servidumbre, está claro que no podemos simplemente dejarlos tranquilos si alguna vez deseamos lograr la victoria sobre Europa. No les pediremos mucho. Sus yates, villas y riquezas pueden permanecer. Siempre y cuando demuestren resultados y nos apoyen de todo corazón.\n\nLas élites rusas siempre han querido ser vistas como parte de la fiesta de multimillonarios \"global\". Pero lo que proponemos es mucho más grandioso. La perspectiva de poseer la economía de todo un continente para su propio beneficio... bajo nuestra atenta mirada y control. Serían tontos si no aceptaran."
 SOV_refine_the_constitution: "[SOV_refine_the_constitution]"
 SOV_refine_the_constitution_desc: "Aunque la constitución actual tiene algunos problemas, el presidente decidió que simples enmiendas y revisiones serán suficientes para abordar los problemas actuales. Nuestro sistema se ha construido en torno a este marco, sí. Sin embargo, siempre nos hemos asegurado de utilizar redes informales para perseguir nuestras agendas cuando nos hemos encontrado con tales problemas.\n\nLas democracias americanas y europeas también tienen problemas similares, pero no reescriben completamente sus constituciones. En nuestra búsqueda de cambio no podemos cegarnos con un idealismo ingenuo. Reinventar la rueda es innecesario siempre que las futuras administraciones estudien los errores pasados, tanto locales como extranjeros."
 SOV_refine_the_constitution_loc: "Refinar la Constitución"
 SOV_reinforce_putin_constitution: "Reforzar la constitución de Putin"
 SOV_celebrate_putins_legacy: "Celebrar el legado de Putin"
 SOV_celebrate_putins_legacy_desc: "Recordamos cómo Occidente escribió sobre nosotros en el año 2000. \"Rusia ha terminado\", era su afirmación. Sin embargo, mira lo que está pasando ahora. Hemos destruido la Semibankirshina, hemos domado el Cáucaso. Hemos recuperado Crimea y nos estamos preparando para terminar de liberar el Donbás con nuestros aliados. Finalmente, nos hemos enfrentado al Oeste una vez más, como un fénix que renace de sus cenizas.\n¿Y a quién podemos agradecer esto?\nA Vladímir Vladimírovich Putin. Y es su legado el que vamos a valorar."
 SOV_church_support: "Apoyo patriarcal"
 SOV_church_support_desc: "Desde que se permitió a la Iglesia practicar abiertamente, han experimentado una transformación. Los santos padres ya no son veteranos afganos jubilados que reconstruyen iglesias por sí mismos mientras combaten el auge de las sectas occidentales del cristianismo, así como cultos literales. Con la ayuda de Putin, la Iglesia ha recuperado mucho, aunque no pueda volver a los años prerrevolucionarios. La ortodoxia fue el fundamento de nuestro pueblo, y su apoyo le dará a Medvédev más legitimidad, al mismo tiempo que socavará la imagen que mantuvo durante su primer mandato."
 SOV_amend_the_constitution: "[SOV_amend_the_constitution]"
 SOV_amend_the_constitution_desc: "La constitución actual, lamentablemente, no se adhiere a las ideas del presidente sobre cómo debería funcionar la Rusia ideal. Hay muchas incertidumbres y lagunas que pueden ser utilizadas por actores nefastos. Una constitución así fue suficiente con Putin a cargo, ya que su influencia y decisión podían mantener el sistema bajo control de forma segura.\n\nPero, ¿qué sucede si alguien sin la habilidad de Putin o Medvédev acepta la presidencia? ¿Serán capaces de moverse a través de estos intereses contrapuestos, o serán arrastrados por ellos, convirtiéndose en meras figuritas para los siloviki y las grandes empresas?\n\nNuestro sistema debe ser pulido, y para ello será necesaria una revisión completa."
 SOV_amend_the_constitution_loc: "Enmendar la constitución"
 SOV_a_new_republic: "Una nueva Federación"
 SOV_a_new_republic_desc: "Rusia ha cambiado mucho en los últimos 40 años, pero cambiará una vez más. La tecnocracia de Putin ha estabilizado nuestra nación, pero tampoco puede durar para siempre. Con las nuevas reformas, Rusia está en el camino de una democracia similar a los ideales sostenidos durante la era zarista.\n\nA diferencia del sistema inestable que tuvimos durante los años 90, no seremos perros falderos de otra potencia. No demonizaremos ni la era zarista ni la soviética que tanto nos dieron. Nuestra historia es un manto sagrado, y la democracia que construiremos será una nueva era de ella. ¡Rusia, siempre adelante!"
 SOV_focus_resource_exploitation: "Enfocarse en explotar recursos"
 SOV_focus_resource_exploitation_desc: "Por mucho que nos gustaría convertirnos en una potencia industrial como China, lamentablemente no tenemos ni los recursos ni la mano de obra para hacerlo por ahora. Por eso debemos centrarnos en la extracción de recursos. Si bien nuestras crecientes industrias abastecerán el mercado interno, los recursos que extraemos se exportarán a todas partes. Además, con el mundo en un estado tan caótico, somos uno de los únicos exportadores estables de energía que quedan."
 SOV_industrial_expansion: "Expansión industrial"
 SOV_industrial_expansion_desc: "Mientras que los incentivos económicos posteriores a 2014 revivieron nuestro sector agrícola, el industrial sigue en recesión. Sin embargo, con Norteamérica en llamas, Europa antagónica y Asia aparentemente preparándose para una importante guerra, no podemos depender de nadie más que de nosotros mismos. Necesitamos que nuestras industrias puedan cubrir la mayoría de nuestras demandas locales. Una industria rusa para el pueblo ruso."
 SOV_regulate_trade_unions: "Economía espacial rusa"
 SOV_regulate_trade_unions_desc: "Aunque se suponía que la Segunda Guerra Civil Americana pondría fin al espacio comercial, parece que en realidad lo impulsó. Con China y Rusia como los principales productores de cohetes, tanto Europa como Asia parecen utilizar a la NASA y a los cuadros espaciales comerciales para construir sus propios programas. A día de hoy, no solo hay un auge en la producción de satélites, sino también avances en la minería de asteroides como nunca antes. Debemos aprovechar esta ola, ya que nuestra posición ventajosa nos convierte en uno de los principales beneficiarios del nuevo mercado espacial."
 SOV_defense_industry_expansion: "Apoyar la solidaridad económica"
 SOV_defense_industry_expansion_desc: "Por mucho tiempo, los burócratas en Rusia apenas les importaban los trabajadores. Pagándoles una miseria o reemplazándolos con un inmigrante. Sin darle los beneficios que le prometieron. Pero ahora, al no tener suficientes personas y expertos, no tienen de otra más que apoyar a las masas para sobrevivir. Un trabajador bien pagado es bueno para nuestro país y debe ser incentivado."
 SOV_land_reforms: "Implementar reformas fiscales progresivas"
 SOV_land_reforms_desc: "Es una triste realidad el hecho que necesitamos mucho dinero. Por suerte, hay mucho dinero que está oculto en los maletines de nuestros políticos y burócratas. Al implementar una reforma impositiva progresista, nos aseguraremos que el dinero fluya a nuestros depósitos establemente."
 SOV_trade_unions: "Incentivar sindicatos"
 SOV_trade_unions_desc: "Por más que estamos orgullosos de nuestro legado soviético, los sindicatos se mantienen como una rareza en nuestras industrias. Esto ha permitido que los burócratas no le paguen suficiente a sus trabajadores y que nuestra situación social caigas en declive. Al promover los sindicatos, también podremos regular a nuestras corporaciones y sus dueños para que no se sobrepasen."
 SOV_centralize_power: "Centralizar el poder"
 SOV_centralize_power_desc: "Rusia Unida es un claro centro de autoridad para nuestro Gobierno, pero aún así los otros partidos se mantienen semi-independientes. Debido a nuestro trabajo debemos todos actuar como uno. Al usar la plataforma \"El Frente Popular\", puede que creemos una coalición de todos los grandes partidos rusos para que actúen bajo RU abiertamente.\n En todas las sesiones de la duma vimos discusiones entre RU y los otros partidos. Una coalición hará que terminemos los desacuerdos y avancemos como un solo organismo."
 SOV_protect_russian_economy: "Proteger la economía rusa"
 SOV_protect_russian_economy_desc: "Nuestro giro hacia el libre comercio y la inversión extranjera fue un error. La economía rusa se ha visto inundada no solo por extranjeros que compran negocios, sino también por productos extranjeros que superan en competencia a los nacionales. Si bien los inversores extranjeros pueden permanecer, priorizaremos y protegeremos a las empresas locales de las extranjeras. Nuestro objetivo es ser autosuficientes y orientados a la exportación."
 SOV_build_up_air_and_sea_fleets_UR: "Construir flotas aéreas y navales"
 SOV_healthy_conservatism_to_europe: "Conservadurismo sano para Europa"
 SOV_healthy_conservatism_to_europe_desc: "Nuestros satélites europeos han quemado la mayoría de la influencia globalista en ellos. Pero queda una pregunta: ¿Qué lo reemplazará? Hemos decidido crear partidos dominantes conservadores por ahora. permitir demasiados partidos puede arruinar los esfuerzos de reconstrucción y enojar a sus pueblos. Mejor no chocar el barco."
 SOV_european_political_birdcage_experiment: "Jaula política europea"
 SOV_european_political_birdcage_experiment_desc: "La mayor parte de la influencia globalista de los actuales satélites europeos ha sido quemada. Sin embargo, la pregunta sigue siendo: ¿Qué la reemplazará?\n\nAunque podríamos obligar a estos Estados a adoptar nuestros valores, ¿por qué no experimentar? Reúne a quien puedas, sin importar la ideología, y dales un campo de juego equitativo. El único requisito para que participen será su postura amistosa hacia nosotros. Que Europa se libere de la tiranía neoliberal. ¡Un tapiz de partidos surgirá, dando a nuestros socios europeos el derecho a elegir el que mejor les convenga!"
 SOV_medvedev_doctrine: "Doctrina Medvédev"
 SOV_medvedev_doctrine_desc: "Con nuestra recién adquirida esfera de influencia, surge una pregunta inevitable: ¿cuál es nuestro curso de acción para las administraciones que rechazan el mundo ruso? Hemos visto muchos casos así a lo largo de los años, especialmente durante la época de Putin. Hemos sido demasiado laxos en nuestros esfuerzos e intentos de \"poder blando\" y hemos dejado que nuestros \"aliados\" nos usen para obtener dinero gratis sin que ellos cumplan con su parte del trato.\n\nNuestro gran presidente no cree que esto sea razonable. Rusia, de cualquier manera que pueda, se asegurará de que sus inversiones en sus socios den frutos. Al igual que durante la época de Brézhnev, cualquier intento de sabotear la unidad de la OTSC y abandonar la alianza será reprimido por nuestras fuerzas (y las locales). El amor ha ganado, y nos aseguraremos de que el abrazo amoroso de nuestro mundo ruso sea eterno."
 SOV_novorussian_integration: "Renacer de Novorrusia"
 SOV_novorussian_integration_desc: "La tierra por la que tanto sacrificamos. Ha sido maltratada y ensangrentada. Industrias destruidas, tierra arrasada. Esta joya, la que inició la industrialización tanto del Imperio ruso como más tarde de la Unión Soviética, será revivida una vez más. Los sacrificios que nuestros patriotas en el Dombás soportaron solo pueden ser recompensados con prosperidad para toda la región."
 SOV_new_territories: "Asegurando nuevos territorios"
 SOV_new_territories_desc: "Con nuestra victoria no solo hemos liberado el espacio ex-soviético del globalismo, sino que también hemos tomado la mayoría de los territorios del antiguo Pacto de Varsovia. Por ahora nuestro control es, en el mejor de los casos, inestable: muchos aún nos guardan desconfianza. Debemos establecer una base de apoyo permanente en estas regiones. Veteranos de guerra amargados, oportunistas políticos, aliados genuinos - todo este personal local, junto con una misión militar permanente, se utilizará para restaurar una vida civil normal en la zona."
 SOV_russian_victory: "¡Victoria!"
 SOV_russian_victory_desc: "Mientras las armas se calman, nos encontramos en el amanecer de una nueva era. Nuestros objetivos se han cumplido: la amenaza globalista ha sido devuelta al oeste, maltrecha. Esperemos que no representen una amenaza para nosotros en un futuro previsible. Esta victoria nos llegó a un gran costo, y ahora los territorios que liberamos necesitan reconstrucción. Es el momento perfecto para bajar el ritmo y centrarnos en nuestra gente."
 SOV_new_age_ukraine: "Nueva era para Ucrania"
 SOV_new_age_ukraine_desc: "Después de tanto derramamiento de sangre, Ucrania ha sido desarmada y está bajo nuestro control. Los nacionalistas están siendo cazados en el campo, sin embargo, el odio hacia nuestro Gobierno aún persiste. Es hora de que las dos hermanas eslavas se reconecten y superen el daño que los globalistas infligieron a nuestra relación.\n\n\"Nunca volveremos a ser hermanos\" - grita el banderista, pero no podemos oír sus chillidos. Nuestros hermanos ucranianos recibirán lo que necesitan para su resurgimiento."
 SOV_glorify_veterans: "Glorificar a los veteranos"
 SOV_glorify_veterans_desc: "Cientos de miles de nuestros ciudadanos participaron en la guerra contra la OTAN. Son nuestros héroes, nuestro orgullo y el alma de nuestra nación. No debemos abandonarlos después de sus deberes. Sean sanos o discapacitados, sean ricos o pobres, nos aseguraremos de que puedan adaptarse a la vida civil. ¡Que nuestros soldados sean recibidos como los héroes que son!"
 SOV_rebuilding_period: "Periodo de reconstrucción"
 SOV_rebuilding_period_desc: "A medida que nos alejamos de la economía bélica, es hora de afrontar el elefante en la sala: tenemos, literalmente, medio continente que reconstruir.\n\nEs cierto que la Unión Soviética logró hacerlo, así que nosotros también deberíamos poder. La propia Rusia será nuestra primera región en reconstruir, considerando que fue la que menos daños sufrió."
 SOV_rebuild_new_allies: "Reconstruir a los aliados europeos"
 SOV_rebuild_new_allies_desc: "Nuestros aliados también están maltrechos. Debemos, por el bien de nuestros planes futuros, asegurarnos de que se recuperen a tiempo de esta destrucción. La URSS logró reconstruir Europa Oriental con un tercio de sus riquezas perdidas y 20 millones de muertos. Seguramente nosotros podemos hacer lo mismo."
 SOV_rebuilding_affected_regions: "Reconstruir las regiones más afectadas"
 SOV_rebuilding_affected_regions_desc: "Los sangrientos campos de batalla de esta guerra deben ser una reliquia del pasado. Ucrania, los países bálticos, Bielorrusia: estas zonas recuperarán su antigua gloria. Los campos se librarán de minas y piezas de drones. ¡El mundo ruso prosperará una vez más!"
 SOV_russian_products_to_west: "Establecer industrias rusas en Occidente"
 SOV_russian_products_to_west_desc: "Una excelente manera de acelerar la recuperación de nuestros aliados es integrarlos en nuestra economía. Los recursos y la energía baratos serán el impulso inicial para ponerlos en marcha. También pueden convertirse en un buen mercado libre para nuestros propios productos. Después de todo, nuestras industrias no fueron destruidas en la guerra, así que bien podríamos crear empresas hermanas en Europa para ayudar a nuestros amigos allí."
 SOV_start_multipolar_world: "Nacer del mundo multipolar"
 SOV_start_multipolar_world_desc: "Con la OTSC consolidada como una alianza duradera y las economías desde Polonia hasta Tayikistán unidas, es hora de que regresemos al escenario mundial. El mundo ruso, por muy justo que sea, no es el único bloque que existe en el mundo.\n\nYa sea en Asia, África o América, hay muchos actores regionales con sus propias necesidades y objetivos que han surgido en ausencia de Estados Unidos. Nuestra tarea es navegar en esta nueva realidad."
 SOV_future_russia: "Futuro de Rusia"
 SOV_future_russia_desc: "Finalmente hemos logrado nuestros objetivos principales. Y durante el tiempo de reconstrucción, había surgido una pregunta: ¿ahora qué? ¿Cuál es nuestro propósito en el mundo y cómo evolucionará nuestro sistema después de nuestra victoria?\n\nNuestro gran presidente, Dmitri Medvédev, también se lo pregunta. Ha expresado su satisfacción con el resultado que logramos, sin embargo, es claro para todos que está cansado de sus deberes. No es de extrañar: remodelar Rusia según su visión e ir a la guerra contra la OTAN desgastaría a cualquier líder.\n\nY ahora, parece que decidirá el curso de nuestro futuro una vez más."
 SOV_our_common_future: "Alentar la autosuficiencia europea"
 SOV_our_common_future_desc: "Aunque deseamos expandir nuestra influencia económica sobre Europa, sería insensato no permitirles desarrollar sus propias industrias. Los precios baratos de la energía y el combustible que proporcionan nuestras corporaciones asegurarán que puedan recuperar sus industrias nacionales. ¡Nuestros aliados no serán una carga económica, sino nuestros socios de confianza!"
 SOV_russian_european_union: "Introducir la rublozona"
 SOV_russian_european_union_desc: "Una de las reformas finales para la reconstrucción europea es crear un mercado único entre nuestras naciones. Similar a la antigua Unión Europea, crearemos la rublozona. Nadie puede negarse tampoco, considerando que nuestro dinero es esencial para la gran recuperación. ¡Y a diferencia de la antigua UE, tampoco nos entrometeremos en sus culturas!"
 SOV_european_economic_restructurization: "Reestructurar economías europeas"
 SOV_european_economic_restructurization_desc: "A medida que finalizamos la reconstrucción de nuestras economías aliadas, debemos asegurarnos de que nuestra influencia en ellas no se erosione con el tiempo. Nuestras economías llenarán el vacío de la otra, y así como Norteamérica hizo con su Plan Marshall, mantendremos a Europa en nuestros bolsillos."
 SOV_european_allies_modernisation: "Estandarización de ejércitos europeos"
 SOV_european_allies_modernisation_desc: "Nuestros nuevos aliados europeos poseen actualmente ejércitos con una gran cantidad de equipo de la OTAN como estándar. Aunque el armamento del Pacto de Varsovia todavía permanece en algunos casos, la situación actual nos obliga a centrarnos en reformas. Cualquier equipo de fabricación occidental debe ser descartado y reemplazado por equivalentes rusos o de fabricación local.\n\nLa OTSC podría no ser la nueva OTAN ahora mismo, pero lo será pronto."
 SOV_towards_multipolarity: "Hacia la multipolaridad"
 SOV_towards_multipolarity_desc: "Con Estados Unidos en guerra civil, por fin ha llegado el momento de iniciar la era de la multipolaridad. Obviamente, Rusia no puede ser una potencia hegemónica. De hecho, fue una insensatez por parte de los soviéticos siquiera intentar reivindicar un título tan oneroso. Sin embargo, nos conformamos con ser solo uno de los muchos pilares del poder.\n\n¿Para qué ser la policía mundial cuando se puede fomentar que actores regionales asuman la tarea por ti?"
 SOV_american_policy: "América en llamas"
 SOV_american_policy_desc: "Mientras Norteamérica arde, ahora es nuestra oportunidad de intentar remodelar nuestra relación. Europa Occidental envía ayuda a la Unión de América, ya sean \"voluntarios\" o ayuda militar. ¿Por qué deberíamos ser diferentes? Hay bastantes facciones que pueden beneficiar a Rusia una vez que tomen el control del país. Ya sean separatistas regionales o aislacionistas, cuentan con nuestro apoyo."
 SOV_brics: "BRICS+"
 SOV_brics_desc: "Los BRICS son una buena oportunidad para sacar a la luz nuestra visión. Con el vacío dejado por EE.UU., ahora somos libres de tomar su relevo. El grupo necesita convertirse en un verdadero club económico. No una esfera similar a la eurozona o la ASEAN, por así decirlo, sino una plataforma neutral para el desarrollo mutuo.\n\nPor supuesto, considerando que India y China no están interesadas en desarrollar esta plataforma, depende de nosotros consolidarla."
 SOV_dragon_sun: "Dragón y sol naciente"
 SOV_dragon_sun_desc: "Está claro que los conflictos sino-japoneses serán el tema de esta década. Ya sean las escaramuzas por Taiwán o las guerras de poder y golpes de estado que recuerdan a la Guerra Fría, las dos potencias asiáticas están formando coaliciones para un posible conflicto. Y en un conflicto así, nuestra posición será crucial para cualquiera de los dos bandos.\n\nA decir verdad, no nos entusiasma la perspectiva de elegir solo uno de los dos bloques económicos. China, que es una potencia industrial y tecnológica, o Japón, un hegemón económico fallido que aún puede imponer su peso e incluso revivir parte de su influencia gracias a la ausencia de Norteamérica.\n\nDe todos modos, nuestra política hacia Asia será la de maniobrar entre estos dos. Honestamente, si pudiéramos comerciar con ambos, sería un escenario ideal."
 SOV_brics_expand: "Expansión de BRICS+"
 SOV_brics_expand_desc: "Por supuesto, para que nuestro plan para los BRICS funcione, debemos expandirlo aún más. Deberíamos priorizar a las naciones con las que somos amigos para obtener el mayor beneficio de esta expansión. ¡Pronto, los BRICS+ se convertirá en una plataforma verdaderamente global de desarrollo mutuo!"
 SOV_dawn_of_africa: "Amanecer africano"
 SOV_dawn_of_africa_desc: "África es el continente del futuro. Si bien las guerras, el cambio climático y la lenta tasa de urbanización impiden que crezca tan rápidamente como lo hizo Asia Oriental el siglo pasado, tiene la población y los recursos necesarios para dar ese salto. Es casi seguro que ocuparán un lugar central durante la segunda mitad de este siglo.\n\nLos crecientes mercados africanos representan una oportunidad para nosotros. No solo podemos conseguir aliados en la región, sino también una base de consumidores que nuestras industrias rara vez habían visto. Esta es una inversión para el futuro, por supuesto, porque incluso si nos superan, el dinero que obtendremos de su desarrollo será enorme."
 SOV_medvedev_russian_elections: "¡Nuevas elecciones!"
 SOV_medvedev_russian_elections_desc: ""
 SOV_people_russia_chosen: "¡Por el pueblo!"
 SOV_pink_sunset: "Atardecer rosa"
 SOV_med_red_dawn: "Rojo amanecer"
 SOV_for_new_socialism: "Por el Nuevo Socialismo"
 SOV_democratization_capital: "Democratización de la capital"
 SOV_social_populism: "Populismo social"
 SOV_united_russia_chosen: "¡Por la unidad!"
 SOV_medvedev_path: "Visión de Medvédev"
 SOV_people_program: "Nuestro Programa Popular"
 SOV_future_your_hands: "¡El futuro está en tus manos!"
 SOV_united_russia_victory: "Victoria de Rusia Unida"
 SOV_united_russia_victory_desc: "Como era de esperar, el partido presidencial volvió a ganar.\n\nAunque ya no guía a nuestro partido, debemos mantener el rumbo que él marcó. Reafirmar nuestras convicciones con mano ligera y un tradicionalismo sano. Somos la vanguardia del orden mundial multipolar, ¡así que mostremos al mundo que no nos apartaremos de SU visión!"
 SOV_enshrine_medvedev_constitution: "Consagrar la constitución"
 SOV_enshrine_medvedev_constitution_desc: "La Constitución de Medvédev es un documento que no necesita presentación. Revolucionando el Gobierno ruso, mostró claramente al mundo que nosotros, a pesar de todos nuestros problemas, somos una democracia de la más alta consideración.\n\nSi acaso, deberíamos celebrarla en la misma medida que los estadounidenses celebraron su constitución. ¡Que sea la luz que guíe a los futuros líderes de Rusia!"
 SOV_uphold_two_party_system: "Mantener el sistema bipartidista"
 SOV_uphold_two_party_system_desc: "El paso a un sistema bipartidista, aunque controvertido al principio, al final resultó ser un cambio muy positivo. Hemos consolidado dos bloques dentro de nuestro Gobierno que se alinean con el pueblo, y a diferencia del sistema estadounidense, tiene suficiente base ideológica común para no degenerar en disputas entre izquierda y derecha. Mantengamos nuestras promesas y asegurémonos de que este sistema sobreviva."
 SOV_government_reforms: "Reformas gubernamentales"
 SOV_government_reforms_desc: "unque ya hemos revolucionado nuestro sistema, está claro que necesitamos implementar aún más reformas. Parchear los agujeros en el sistema, eliminar leyes de los años 90 y 2000 que ya no tienen propósito o que directamente trabajan en contra del Gobierno. ¡Es hora de arreglarlo todo!"
 SOV_strength_in_discussion: "Fuerza en la discusión"
 SOV_strength_in_discussion_desc: "Aunque imitamos el sistema bipartidista estadounidense, no seguiremos su destino. Nuestra gente tiene diferentes opiniones y voces, y nos aseguraremos de que, en lugar de disputas ideológicas que no ayudan a nadie, nuestros políticos se centren más en leyes y programas reales. La sociedad rusa estará protegida de que los elementos más radicales se filtren al público en general. Tanto los sistemas económicos de derecha como los de izquierda nos son útiles, y es nuestro derecho usarlos cuando lo consideremos oportuno."
 SOV_inter_party_cooperation: "Cooperación entre partidos"
 SOV_inter_party_cooperation_desc: "Como se ha dicho antes, los dos partidos deben cooperar para la mejora del conjunto. No debemos quedarnos atrapados en un conflicto de \"nosotros contra ellos\" en la Duma. Debemos animar a nuestros políticos a cooperar entre sí en los temas en los que encuentren puntos en común. No hay necesidad de polarizar demasiado nuestras opiniones."
 SOV_a_healthy_patriotism: "Un patriotismo sano"
 SOV_a_healthy_patriotism_desc: "Antes, hemos dependido de viejos \"tecnólogos políticos\" para crear un mensaje \"patriótico\" en nuestra sociedad. Como puedes imaginar, casi siempre resultó contraproducente y no llevó a ninguna parte. Curiosamente, aunque a los rusos puede que no les gustara nuestro sistema burocrático, fueron sus iniciativas y mensajes patrióticos de base los que mantuvieron nuestro país en funcionamiento.\n\nPatrocinemos y apoyemos las iniciativas patrióticas que son hechas por los propios rusos, porque claramente funcionan."
 SOV_culture_of_anti_corruption: "Cultura anticorrupción"
 SOV_culture_of_anti_corruption_desc: "Los burócratas y políticos fueron vistos durante mucho tiempo como... personas no muy decentes. Los grandes casos de corrupción casi cada mes, entre los que eran atrapados, habían sido la norma durante mucho tiempo. Sin embargo, con el reinado de Medvédev y la Guerra Europea, quedó claro que no podemos tolerar este problema por más tiempo. No tenemos dinero de sobra, así que ¿por qué deberíamos dejar impunes los cargos de corrupción?"
 SOV_russian_conservative_values: "Valores conservadores rusos"
 SOV_russian_conservative_values_desc: "Somos, en el fondo, una nación conservadora. Tanto la izquierda como la derecha de nuestro país están de acuerdo en esto. Entonces, ¿por qué deberíamos ser algo diferente? Si bien tuvimos algunos intentos de liberalizar nuestra cultura, la degradación de los valores sociales en Occidente, y en partes de nuestra propia sociedad, no puede continuar."
 SOV_united_in_common_history: "Unidos por la historia común"
 SOV_united_in_common_history_desc: "Zarista, soviético, moderno: estos tres períodos de Rusia son parte de nosotros. Mientras que a los occidentales les sorprende que no repudiemos ninguno de dichos períodos, nosotros entendemos que olvidar nuestro pasado es perjudicial. Así como hubo errores, tanto leves como costosos, también hubo muchos triunfos y lecciones que podemos aprender. ¡Las tres banderas ondearán al unísono!"
 SOV_sovereign_democracy_perfecting: "Perfeccionando la democracia soberana"
 SOV_sovereign_democracy_perfecting_desc: "El proceso electoral, aunque aceptable, dista mucho de ser ideal. La transparencia y las salvaguardias públicas son solo algunos de los aspectos que aún debemos abordar. Un buen comienzo sería hacer más transparentes nuestras tecnologías de voto digital, y también podría ser beneficioso dar más tiempo de campaña a los candidatos."
 SOV_country_of_the_sun: "País del sol"
 SOV_country_of_the_sun_desc: "Luch solntsa zolotogo\nTmy skryla pelena\nI mezhdu nami snova\nVdrug vyrosla stena\nNoch proidiot, nastupit utro yasnoie\nZnaiu, schaste nas s toboi zhdiot\nNoch proidiot, proidiot pora nenastnaia\nSolntse vzoidiot\nSolntse vzoidiot\n"
 SOV_hardliners_victorious: "Victoria reaccionaria"
 SOV_hardliners_victorious_desc: "Dmitri Medvédev fue el líder de Rusia Unida durante mucho tiempo después de su primera presidencia. Durante su segunda presidencia, reformó el partido gobernante en algo más consciente: el ala derecha de las dos principales fuerzas de la política rusa. El pueblo ruso recibió con alivio y alegría el fin del dominio de Rusia Unida y su parcial democratización.\n\nPero a pesar de todas sus reformas, los viejos burócratas y figuras del régimen de Putin todavía permanecen dentro de Rusia Unida. Quieren, cueste lo que cueste, hacer retroceder la política rusa al estado en que se encontraba a principios de la década y preservar el legado de Putin. Pero, ¿serán capaces de hacer retroceder la picadora de carne y restaurar su antiguo poder? ¿O los reformadores barrerán los últimos vestigios de autoritarismo de la escena política? Solo el tiempo lo dirá."
 SOV_adjust_constitution_articles: "Ajustar los artículos de la Constitución"
 SOV_adjust_constitution_articles_desc: "Aunque la Constitución actual tiene la base de Putin, se le añadieron las enmiendas de Medvédev, lo que llevó al sistema político actual. Por supuesto, no hay nada de malo en ello, pero la incertidumbre en algunas áreas puede llevar a consecuencias imprevistas. Los artículos de la Constitución necesitan ser ligeramente enmendados siguiendo las líneas de Putin. ¡Un poder fuerte significa una Rusia fuerte!"
 SOV_subdue_two_party_system: "Someter el sistema bipartidista"
 SOV_subdue_two_party_system_desc: "El resultado más notable de las reformas de Medvédev fue un nuevo sistema bipartidista inspirado en los sistemas estadounidense y británico. Aunque esto es un buen contrapeso a las tendencias autoritarias, introduce inestabilidad en el sistema. ¡Solo hay que ver a Norteamérica! ¿A dónde lo ha llevado el sistema bipartidista? ¡Al colapso, a la guerra fratricida!\n\nY además, el pueblo ruso no está acostumbrado a esto, ¡y nuestros enemigos pueden explotar su debilidad! Debemos deshacernos del sistema bipartidista... A favor de Rusia Unida, por supuesto."
 SOV_technocratic_administration: "Administración tecnócrata"
 SOV_strengthen_executive_power: "Fortalecer el poder ejecutivo"
 SOV_strengthen_executive_power_desc: "Las reformas de Medvédev debilitaron la principal fuerza del período de Putin: el poder ejecutivo. La iniciativa ha pasado de la administración presidencial a la Duma Estatal y los partidos políticos, lo que podría generar inestabilidad. Siguiendo las instrucciones de Vladímir Vladímirovich, fortaleceremos una vez más el poder del centro, relegando a los partidos políticos a un segundo plano. ¡Solo con un fuerte aparato de seguridad podrá nuestro pueblo desarrollarse pacíficamente!"
 SOV_improve_bureaucratic_management: "Mejorar el manejo burocrático"
 SOV_improve_bureaucratic_management_desc: "El actual Gobierno ruso está plagado de un aparato burocrático inflado e ineficiente. La población está agotada por el absurdo que ocurre en las instituciones gubernamentales. A partir de este momento, se introducirá un sistema para evaluar la eficacia de cada empleado individual del sector público: desde maestros hasta jefes de distrito, en todos los niveles. Las autoridades municipales serán puestas bajo control central."
 SOV_promote_russian_nationalism: "Promover el nacionalismo ruso"
 SOV_promote_russian_nationalism_desc: "Durante muchos años, el \"nacionalismo\" fue condenado en nuestro país, prefiriéndose en su lugar la doctrina de la \"amistad entre los pueblos\". Debido a esta política, multitudes de migrantes ilegales inundaron nuestro país, y junto con las actividades de los liberales, esto creó una cierta inestabilidad. Es necesario promover un nacionalismo ruso sano: no el odio a los demás, sino el amor a la patria. Rusia y su cultura nos unen a todos, ¡así que valoremos y fortalezcamos este vínculo!"
 SOV_safeguard_putin_vision: "Salvaguardar la visión de Putin"
 SOV_safeguard_putin_vision_desc: "Recientemente, Vladímir Vladímirovich Putin se ha retirado un poco de la escena política rusa. Todo tipo de \"liberales estatales\" y otros piden un rechazo al legado de Putin, criticando cuidadosamente su gobierno, lo que beneficia a nuestros enemigos en Occidente.\n\nLa era de Putin fue un período sin el cual es imposible imaginar la Rusia moderna. Deshacerse de ella significa perder la esencia misma de nuestro país. Por eso se creó el neoputinismo, un reflejo de la visión de Vladímir Vladímirovich de las realidades rusas modernas. ¡Gracias a él, lo tenemos todo, y él vive en nosotros!"
 SOV_protect_russian_legacy: "Proteger el legado ruso"
 SOV_protect_russian_legacy_desc: "Allí, en Occidente, se alza una hidra. Una hidra del globalismo, la rusofobia, el neoliberalismo, todo aquello contra lo que estamos luchando. No es momento de relajarse y jugar a juegos democráticos: debemos consolidarnos en torno a nuestra patria común, Rusia, y su herencia e historia. Desde Riúrik hasta Putin, hay un hilo que nos conecta a todos: desde Kamchatka hasta Kaliningrado, desde Múrmansk hasta Derbent. ¡Debemos preservar este hilo a toda costa!"
 SOV_raise_public_conservatism: "Aumentar el conservadurismo público"
 SOV_raise_public_conservatism_desc: "El gobierno de Medvédev, aunque se llevó a cabo bajo la bandera del \"conservadurismo\", era de la variedad occidental, que a lo largo de muchos años casi se ha fusionado con el liberalismo en sus ideas. Dado que el sentimiento \"conservador\" también existe en Occidente, se puede suponer que influirán en nuestro país de una forma u otra. Por eso debemos promover nuestro propio conservadurismo ruso, sin coquetear con las ideas occidentales. El gobierno de Putin parece ser la opción ideal: ¡fue un verdadero conservador que no copió a nuestros enemigos!"
 SOV_new_kremlin_democracy: "Nueva democracia del Kremlin"
 SOV_new_kremlin_democracy_desc: "Todo lo nuevo es un viejo bien olvidado.\n\nEl sistema bipartidista finalmente se ha desacreditado a sí mismo, al no cumplir con las expectativas del pueblo ruso. Dos partidos son incapaces de representar todo el espectro de ideas que tiene la gente. Es por eso que la Duma Estatal ahora se parece al antiguo sistema: un partido gobernante dominante y muchos otros que no pueden formar una mayoría. Tal es el orden natural de las cosas"
 SOV_russia_destiny: "Destino de Rusia"
 SOV_russia_destiny_desc: "Cherez ternii k zviozdam\nCherez radost i sliozy\nGordo reet nad nami\nNashei Rodiny znamia.\n\nGolovy vverj gordo podniat za tebia, Rodina-mat!\nMy do kontsa budem stoiat za tebia, Rodina-mat!\nMy budem pet, budem guliat za tebia, Rodina-mat!\nI za stranu trizhdy \"Ura!\"\nZa tebia, Rodina!"
 SOV_people_russia_victory: "Victoria de Rusia Popular"
 SOV_people_russia_victory_desc: "Todo condujo a esto: ¡los esfuerzos por construir una democracia soberana finalmente han dado sus frutos! Y el pueblo ruso hizo su elección a favor de \"Rusia Popular\", un partido que les promete un futuro mejor y sin preocupaciones. Ha llegado el momento de demostrar que la gente de nuestro país merece algo mejor. Ahora, todo el país se embarca en reformas a gran escala en nombre de la prosperidad y la estabilidad."
 SOV_constitutional_reforms: "Reformas constitucionales"
 SOV_constitutional_reforms_desc: "El mandato de Medvédev se caracterizó por reformas estructurales a gran escala del sistema estatal, incluyendo numerosas reformas y transformaciones. Sería un error descartar por completo todos estos esfuerzos para crear instituciones que, en general, han demostrado su eficacia. Al mismo tiempo, las enmiendas constitucionales menores destinadas a proteger los derechos y libertades de los ciudadanos también tienen sentido, ya que su implementación fue una de las promesas clave de Rusia Popular."
 SOV_harmonize_the_society: "Armonizar la sociedad"
 SOV_harmonize_the_society_desc: "En la Unión Soviética, se creía que el futuro residía en las ideas del colectivismo. Sin embargo, la historia ha demostrado que esto fue un error, y un retorno a estas ideas hoy sería ilógico, por decir lo menos. Al mismo tiempo, sigue siendo un hecho indiscutible que el pueblo ruso siempre ha superado las dificultades a través de la unidad. Por eso, hoy necesitamos hacer un esfuerzo concertado para construir una sociedad armoniosa, libre de conflictos y contradicciones internas."
 SOV_slash_business_influence: "Recortar la influencia empresarial"
 SOV_slash_business_influence_desc: "En el pasado, la política rusa se caracterizaba a menudo por una administración gubernamental y una legislación fuertemente influenciadas por las grandes empresas, que buscaban defender sus intereses. Hoy en día, este enfoque es inaceptable: trabajamos directamente con el pueblo y para el pueblo, que a menudo tiene intereses contrapuestos. Nuestra tarea es construir un diálogo honesto y lograr justicia para todos."
 SOV_work_with_ur: "Colaborar con Rusia Unida"
 SOV_work_with_ur_desc: "Uno de los resultados del establecimiento de la democracia soberana fue la formación de un sistema bipartidista. El partido que se nos opone, Rusia Unida, promueve ideas y valores diferentes, pero no busca sabotear el trabajo del Gobierno. Por lo tanto, podríamos consultarlo para obtener un apoyo público más amplio. Esto nos permitiría tomar decisiones que tengan en cuenta los intereses de los diferentes grupos de la sociedad."
 SOV_homogeneous_government: "Gobierno homogéneo"
 SOV_homogeneous_government_desc: "A diferencia del antiguo sistema bipartidista estadounidense, los partidos en Rusia no son polos opuestos. Al contrario, demuestran cómo diferentes segmentos de la sociedad pueden unirse para lograr objetivos comunes, formando así un Gobierno de consenso."
 SOV_encourge_social_patriotism: "Alentar al patriotismo social"
 SOV_encourge_social_patriotism_desc: "A menudo se cree que las ideas de izquierda buscan distanciarse del patriotismo y el nacionalismo cívico en favor de la solidaridad internacional. Pero esto es fundamentalmente erróneo: un Estado que se preocupa por sus ciudadanos bien puede basarse en un sentimiento de amor por la Madre Patria, y no hay nada reprobable en ello. El verdadero patriotismo no contradice los ideales de justicia y progreso, sino que sirve como su base sólida."
 SOV_fair_commonwealth: "Una mancomunidad justa"
 SOV_fair_commonwealth_desc: "Antes se creía que Rusia, a pesar de su estatus de federación, mantenía el dominio de los rusos sobre otros pueblos. Si esto es cierto o no, es un tema de debate, pero una cosa es segura: ahora no hay base para tales suposiciones. Rusia ha sido, es y seguirá siendo una unión equitativa de pueblos que coexisten en aras de la prosperidad común. Es en esta unidad donde reside nuestra fuerza y confianza en el futuro."
 SOV_re_invent_soviet_dream: "Reinventar el sueño soviético"
 SOV_re_invent_soviet_dream_desc: "En los días de la Unión Soviética, los políticos proclamaban el objetivo principal por el que vivían y trabajaban los ciudadanos de la Unión: la amistad universal entre los pueblos y el papel principal de la clase trabajadora. Y aunque muchas de esas ideas están desfasadas hoy en día, algunas de las tesis de aquella época merecen ser adoptadas para dar a la gente común un nuevo sueño por el que luchar. Después de todo, es un objetivo común lo que une a la sociedad y da sentido al trabajo diario."
 SOV_glorify_the_common_man: "Glorificar al hombre común"
 SOV_glorify_the_common_man_desc: "Independientemente de la época, el rostro de Rusia siempre ha sido el de la gente común -campesinos, trabajadores, soldados: la lista continúa-. Es importante que nos demos cuenta y aceptemos esto, y que avancemos con este entendimiento. Sin embargo, el entendimiento por sí solo no es suficiente: la gente necesita ver que valoramos su trabajo y agradecerles su contribución al desarrollo de nuestro hermoso país. Solo respetando nuestro pasado y presente podremos construir un futuro digno de estas personas."
 SOV_left_populist_democracy: "Democracia socialista innovadora"
 SOV_left_populist_democracy_desc: "Por definición, la democracia es el gobierno del pueblo, y este principio es indiscutible. Nuestra tarea es dirigir la opinión pública en la dirección correcta a través de campañas, eslóganes pegadizos y publicidad efectiva. Este enfoque no contradice la libertad de elección y ayuda a obtener el apoyo masivo explicando nuestros objetivos a la gente. Después de todo, es más probable que la gente apoye a aquellos cuyas ideas entienden y con las que se identifican."
 SOV_country_of_justice: "País de justicia"
 SOV_country_of_justice_desc: "Shli krasavitsy na troiku\nShli rabochie na stroiku\nTramvai po prospektu\nAraby stroiem v Mekku\nShli parlamentiory, shli montiory, shli legko i bez zatei\n\nMy sideli i kurili, sideli i kurili\nMy sideli i kurili, nachinalsia novy den."
 SOV_radicals_narodniki_in_charge: "Naródniki radicales"
 SOV_radicals_narodniki_in_charge_desc: "El proyecto de sistema bipartidista de Medvédev no podía dejar de afectar a una fuerza tan poderosa como el movimiento de izquierda en Rusia. Un montón de partidos diferentes se unieron para formar la Rusia Popular: el segundo partido más poderoso después de Rusia Unida.\n\nAunque la mayoría de ellos son de centro-izquierda, hay algunos más radicales entre los miembros de la Rusia Popular: desde antiguos miembros del Partido Comunista hasta exnacionalbolcheviques. Todos tienen una cosa en común: el deseo de cambiar Rusia a imagen y semejanza de la Unión Soviética, restaurar la unidad de los pueblos y mejorar la vida de los trabajadores.\n\nRusia está entrando en una era nueva, pero familiar."
 SOV_constitutional_revolution: "Revolución constitucional"
 SOV_constitutional_revolution_desc: "Aunque la actual constitución rusa es bastante democrática, es difícil calificarla de verdaderamente popular. Todavía conserva el marco de la constitución de Yeltsin, que requiere una revisión radical. La nueva constitución rusa se basará no solo en la de Medvédev, sino también en parte en la Constitución de la URSS, ¡una de las mejores, si no la mejor del mundo!"
 SOV_proclaim_uss: "Proclamar la UES"
 SOV_proclaim_uss_desc: "La Unión de Estados Soberanos fue un intento de preservar la Unión Soviética, que se estaba desvaneciendo debido al desfile de soberanías. A pesar de la voluntad del pueblo, expresada en un referéndum de toda la Unión, las repúblicas firmaron los Acuerdos de Belovezh, que pusieron fin al proyecto de Gorbachov de un Nuevo Tratado de la Unión y a la propia Unión Soviética. Ha llegado el momento de rectificar este malentendido y hacer realidad el sueño de unidad entre los pueblos del espacio postsoviético, aunque sea de forma reducida."
 SOV_the_new_state_committee: "Nuevo Comité de Estado"
 SOV_the_new_state_committee_desc: "El sistema de Putin era conocido por su enorme aparato de poder, dividido en departamentos con poderes y responsabilidades a menudo superpuestos. Por supuesto, esto daba estabilidad a la autoridad suprema: al fin y al cabo, mientras las fuerzas de seguridad luchaban entre sí, no tenían tiempo para formar oposición a las más altas esferas.\n\nPero esos días han quedado atrás, y las disputas entre el FSB, la Rosgvárdia, el SVR y otros solo socavan la estabilidad y la eficacia del aparato de seguridad. Todos ellos se unirán en el Comité para la Seguridad del Estado (KGB), tan familiar para nuestros ciudadanos. Inteligencia exterior, contrainteligencia, fronteras estatales, protección de altos funcionarios del Estado, así como la lucha contra el terrorismo y otras amenazas, estas son las funciones del Comité unificado.\n\nLa lealtad a la Madre Patria está por encima de todo."
 SOV_bureaucratic_integration: "Integración burocrática"
 SOV_bureaucratic_integration_desc: "No basta con proclamar la unidad en el papel: también hay que llevarla a la práctica. Kazajistán y Ucrania siguen rigiéndose por sus propias leyes, lo que provoca cierta confusión en la vida diaria de nuestros ciudadanos. Debemos fortalecer la integración de nuestros camaradas y combatir las manifestaciones de nacionalismo étnico. ¡Somos una familia, y las familias deben ayudarse mutuamente!"
 SOV_unity_of_brotherly_states: "Union de Estados hermanos"
 SOV_unity_of_brotherly_states_desc: "Hemos logrado, aunque parcialmente, restaurar la justicia histórica: desde el Dniéster hasta el Amur, desde Múrmansk hasta el mar de Aral, millones de personas viven bajo una misma bandera, ¡tal como lo hicieron hace más de 30 años! Aún queda mucho trabajo por delante, ¡pero otros pueblos de la antigua Unión Soviética también regresarán pronto a nuestra familia amiga!"
 SOV_ignite_neo_soviet_nationalism: "Encender el nacionalismo neosoviético"
 SOV_ignite_neo_soviet_nationalism_desc: "Tras la Gran Guerra Patria, surgió en la Unión Soviética una forma de nacionalismo soviético aparentemente paradójica. A diferencia del nacionalismo étnico convencional, que dio lugar a los horrores del fascismo, el nacionalismo soviético se centraba más en el amor a la Madre Patria y el deseo de defenderla a toda costa. Este sentimiento ha sobrevivido hasta nuestros días, ¡y debemos apoyarlo!"
 SOV_homogeneous_left_wing_front: "Izquierda Homogénea-Frente Patriótico"
 SOV_homogeneous_left_wing_front_desc: "Fuera de nuestro partido, hay muchos otros movimientos cuyas ideas son similares a las nuestras: el Frente de Izquierdas, Otra Rusia y otras organizaciones más pequeñas están unidas por su combinación de ideas de izquierda y patrióticas. Junto a ellos, formaremos un frente unido para fortalecer y expandir nuestras filas, ¡porque la fuerza reside en la unidad!"
 SOV_country_of_the_working_man: "País del trabajador"
 SOV_country_of_the_working_man_desc: "La Unión Soviética fue verdaderamente un país de trabajadores: amplios derechos, consolidación y fortalecimiento de la industria, urbanización; todo esto mejoró la vida de la clase trabajadora y de todo el país. Desafortunadamente, la privatización y el colapso de la Unión socavaron esta base: las fábricas comenzaron a cerrar rápidamente, la gente se empobreció y los migrantes los reemplazaron en sectores de baja cualificación. Es hora de rectificar esta situación: más privilegios sociales para los trabajadores traerán nueva vida a nuestras fábricas en apuros."
 SOV_glorify_the_military: "Glorificar al ejército"
 SOV_glorify_the_military_desc: "A lo largo de la historia, siempre ha habido personas que defendieron su patria con su ejemplo y su sangre: nuestros soldados. Defendieron el Dombás de la junta de Kiev con sus propios cuerpos, y llevaron el mundo ruso a Varsovia, los estados bálticos y los Balcanes. ¡Nuestros militares son una nueva élite, que se ha ganado la felicidad para todos con su arduo trabajo! ¡Gloria a nuestro ejército, honor y alabanza a sus héroes!"
 SOV_peoples_democracy: "Formación de democracia popular"
 SOV_peoples_democracy_desc: "La democracia soberana es una ideología creada con el apoyo de Rusia Unida para un Estado democrático con características nacionales. Pero ahora no es suficiente por sí sola: es necesario formar una nueva idea: la democracia popular. Aunque comparte algunas ideas similares, a diferencia de su predecesora, está más orientada social y patrióticamente."
 SOV_union_born_anew: "Unión renacida"
 SOV_union_born_anew_desc: "Ukraina i Krym, Belarus i Moldova -\nEto moia strana!\nSajalin i Kamchatka, Uralskie gory -\nEto moia strana!\n\nKrasnoiarski krai, Sibir i Povolzhie,\nKazajstan i Kavkaz, i Pribaltika tozhe...\n\nYa rozhden v Sovetskom Soiuze,\nSdelan ya v SSG!"
 SOV_new_russia_rises: "Rusia Nueva asciende"
 SOV_new_russia_rises_desc: "Durante mucho tiempo, un Gobierno \"liberal\" en Rusia parecía imposible. Ya fueran los liberales de Yábloko o los opositores de Navalni, todos los esfuerzos fueron sofocados ya sea por arrogancia, o por ineptitud. Pero nosotros, la Gente Nueva, logramos triunfar en donde otros fracasaron. No luchando contra el Estado, sino abrazándolo. Rusia entrará una nueva era de liberalismo, ¡y lo hará en sus propios términos!"
 SOV_protect_the_constitution: "Proteger la constitución"
 SOV_protect_the_constitution_desc: "¿Por qué cambiar algo si ya todo es perfecto? La constitucíon vigente está para quedarse. Como defensores del liberalismo y la democracia, no es nuestro derecho cambiar el proceso democrático para nuestro beneficio. Nos mantendremos en coalición con Rusia Unida, y defenderemos el sistema bipartidista."
 SOV_constitutional_restructuring: "Reestructuración constitucional"
 SOV_constitutional_restructuring_desc: "Aunque la constitución vigente está bien para lo que hace, nuestro partido piensa que necesita más. Para asegurar que una verdadera demoracia se desarrolle, tenemos que cementar a Rusia no solo como un sistema bipartidario, sino como uno multipartidario. Con nosotros en una barrera con Rusia Unida y Rusia Popular, la Duma tendrá voces más diversas, pareciendo la Duma de Rusia pre-revolucionaria. ¡Rusia será un perfecto faro de libertad!"
 SOV_government_business_cooperation: "Cooperación Gobierno-empresas"
 SOV_government_business_cooperation_desc: "Nuestros negocios siempre han estado en proximidad al Gobieno. En los años 90 intentaron influenciar nuestras politicas, y en los años 2000 en adelante fuimos nosotros que los influenciamos. Con nuestro punto de vista liberal, estamos de acuerdo con que el Estado intervenga en la economía puede ser desastrozo, pero cooperar con nuestros capitalistas para el beneficio de nuestro pueblo siempre estará sobre la mesa. Tal como los tiempos zaristas, con los negocios en nuestros bolsillos seremos capaces de reaccionar a cambios drasticos mucho más rápido."
 SOV_push_for_democratization: "Impulsar la democratización"
 SOV_push_for_democratization_desc: "El sistema actual todavía no es suficiente. El sistema bipartidista es demasiado restrictivo. Debemos fomentar la formación de nuevos partidos junto al dúo de Rusia Unida y Rusia Popular. Adelantar las nuevas elecciones a la Duma también puede sacudir aún más el sistema actual, obligando tanto a los partidos nuevos como a los ya establecidos a cooperar y unirse entre sí para conseguir votos. Nos aseguraremos de que la democracia rusa florezca como nunca antes lo había hecho."
 SOV_third_force: "Tercera fuerza"
 SOV_third_force_desc: "Con nuestras reformas en marcha, la Nueva Rusia se erige firmemente como un equilibrio entre los dos partidos. Con partidos más pequeños formándose alrededor de los 3 principales, podemos asumir con seguridad que los cambios están funcionando. La democracia rusa se está reinventando una vez más, con múltiples partidos compitiendo por el control de la Duma. No volveremos a las disputas bipartidistas como lo hicieron los estadounidenses, y nuestros poderes presidenciales tienen suficiente control para romper el estancamiento multipartidista que ocurrió en las democracias europeas. ¡Nuestro partido finalmente ha cimentado a Rusia en una nueva era democrática!"
 SOV_liberate_the_people: "Liberar el pueblo"
 SOV_liberate_the_people_desc: "Por mucho tiempo, nuestro Estado había dependido de corporaciones o burócratas para su tarea. Sin embargo, lo que no notamos es que es al pueblo al que le debemos responder. Los burócratas son fríos y sin emoción, sin embargo es nuestro trabajo asegurar que nuestro pueblo se siento querido y cuidado. Si Rusia se va a convertir en un guía en esto mundo multipolar, nuestra tarea es demostrarle al mundo que nosotros, y no cualquier otro, somos los que les da mayor cuidado a nuestros ciudadanos"
 SOV_communitarist_society: "Sociedad comunitarista"
 SOV_communitarist_society_desc: "Mientras que la mayoría de los liberales rusos abogaban por la \"vía occidental de autorrealización\", nosotros no aprobamos tales ideas. Rusia, aunque capitalista, nunca se trató de la autoindulgencia individual. Somos, en nuestra esencia, un pueblo comunitario. Incluso durante la época zarista, nuestros capitalistas y nobles invirtieron en la economía de Rusia, queriendo asegurar la prosperidad continua de la nación. El individualismo despiadado de los años 90 nos mostró que nuestra sociedad debe permanecer unida. Nuestro liberalismo es el liberalismo del pueblo. Uno que se preocupa más por el conjunto que por el individuo. Porque es el conjunto lo que nos impulsa hacia adelante."
 SOV_russian_democratic_nationalism: "Nuevo nacionalismo cívico"
 SOV_russian_democratic_nationalism_desc: "¿Por qué deberíamos rehuir la palabra \"nacionalista\"? Durante mucho tiempo fue sinónimo de nazismo o fascismo, pero es descaradamente falso. El nacionalismo ruso, incluso durante la época zarista, no se trataba de la supremacía racial, sino de la supremacía de Rusia en su conjunto. Y la reciente guerra contra la OTAN lo demostró. Ya fuera rojo o blanco, fue el nacionalismo ruso lo que nos ayudó a ganar la guerra. ¡Rusia estará orgullosa de sus logros!"
 SOV_respect_our_past: "Respetar nuestro pasado"
 SOV_respect_our_past_desc: "Aunque siempre podemos caer en discusiones sobre qué partes de nuestro pasado son necesarias y cuáles no, es un esfuerzo inútil. Desde hace un tiempo, nuestro país ha adoptado el enfoque de que \"toda la historia rusa es nuestra historia\", y lo mantendremos. Sin embargo, el período de Yeltsin, en su mayor parte, fue visto con desdén. Fuera de los altos funcionarios gubernamentales y líderes empresariales, los años 90 fueron vistos como una desgracia y una mancha negra en nuestras vidas históricas. Rectificaremos esto, porque si bien el período tuvo muchos, muchos errores, también fue un período de experimentación y el lugar de nacimiento de la Rusia moderna."
 SOV_national_liberal_democracy: "Redefinir el liberalismo ruso"
 SOV_national_liberal_democracy_desc: "Durante toda su historia, el liberalismo ruso fue visto como una admiración sin sentido de Occidente y un odio hacia la sociedad rusa. Desde los tiempos del zar, los liberales eran considerados meros lamebotas de los europeos, que odiaban a su propio pueblo. Nosotros, sin embargo, cambiaremos esta percepción. Porque es Rusia la nación más libre de la Tierra. Fuimos una de las culturas europeas más influyentes. Le dimos tanto al mundo, entonces ¿por qué deberíamos intentar emular a los europeos? ¿Por qué debería importarnos lo que piensen los demás? Somos la cúspide de Europa, una que se convierte en un faro para el mundo en los años venideros."
 SOV_sovereign_and_free: "¡Hacia el futuro!"
 SOV_sovereign_and_free_desc: "Ot chistogo istoka\nV prekrasnoe Dalioko,\nV prekrasnoe Dalioko,\nYa nachinaiu put."
 SOV_history_continues_medvedev: "¡La historia continúa!"
 SOV_history_continues_medvedev_desc: "Esta victoria se convirtió en una prueba elocuente para Rusia de que el viejo orden mundial finalmente había quedado obsoleto, dando paso a un nuevo orden soberano. Esta victoria abrió una nueva página en la historia del país, llena de oportunidades para un resurgimiento a gran escala. Durante este período tan difícil, Dmitri Medvédev demostró ser un líder impecable.\n\nLideró el país a través de la prueba más severa de su historia moderna, demostrando una voluntad de hierro y sabiduría. Por eso, él, con su inestimable experiencia y la confianza del pueblo, seguirá guiando a Rusia hacia adelante, superando cualquier obstáculo en el camino hacia el fortalecimiento de su soberanía y la prosperidad de sus ciudadanos."
 SOV_harness_peoples_front: "Aprovechar el Frente Popular"
 SOV_harness_peoples_front_desc: "El ONF ha demostrado su eficacia como herramienta efectiva para gestionar y consolidar la sociedad civil. En este sentido, su mayor integración en la línea política general definida por el presidente sería un paso lógico y estratégicamente sólido. Esta tarea fue establecida por Dmitri Medvédev durante el período de reformas estructurales en el Gobierno, y hoy adquiere una relevancia particular. Actuando como un mecanismo unificado y coordinado, el Frente Popular se convertirá en una fuerza impulsora clave que hará avanzar a Rusia de acuerdo con el rumbo claro y con visión de futuro establecido por el líder nacional."
 SOV_improve_social_nets: "Mejorar la seguridad social"
 SOV_improve_social_nets_desc: "Desde los días de la URSS, Rusia ha tenido un potente sistema de apoyo social para su población, que no solo se ha conservado, sino que también se ha mejorado constantemente bajo el patrocinio de Vladímir Putin. Durante mucho tiempo, este sistema fue una pesada carga para el presupuesto, que dependía de los ingresos del petróleo y el gas, lo que lo hacía vulnerable.\n\nAhora que nuestra economía se ha fortalecido y ha experimentado serios cambios estructurales para mejor, no solo podemos mantener nuestros compromisos sociales, sino también invertir audazmente en su desarrollo. Este es un punto de inflexión histórico: hoy podemos sentar las bases de un estado de bienestar que será fuerte no por el gas, sino a pesar de cualquier presión externa, basándose en nuestro propio potencial industrial y humano."
 SOV_strengthen_immigration_control: "Reforzar el control migratorio"
 SOV_strengthen_immigration_control_desc: "Anteriormente, cuando nuestro país estaba sujeto a sanciones y había escasez de trabajadores, la afluencia de migrantes de países vecinos fue una medida necesaria. Fue un apoyo necesario para la economía.\n\nPero los tiempos han cambiado. Hoy, este apoyo es más un obstáculo que una ayuda. Es hora de despejar el camino para nuestros propios especialistas, proteger nuestro mercado laboral y dar a las personas talentosas de la población multinacional de Rusia la oportunidad de prosperar. Por eso estamos cerrando los programas de entrada simplificada. Somos capaces de construir nuestro propio futuro con nuestros propios esfuerzos. Invitamos a los ciudadanos de otros países a dirigir sus recursos hacia el desarrollo de sus propios países. Esta es la clave de nuestro éxito mutuo."
 SOV_subdue_onf_members: "Gobernanza meritocrática"
 SOV_subdue_onf_members_desc: "Aquellos que son verdaderamente capaces deberían estar a cargo. Esta idea, tan simple como la verdad misma, sigue siendo esquiva para muchos por alguna razón. Pero para Rusia, se convertirá en un principio fundamental.\n\nLa política administrativa del ONF se basará en un estricto enfoque meritocrático. Los puestos locales clave no serán ocupados por \"enchufados\", sino por personas que ya han demostrado su eficacia con hechos, no con palabras. Esto creará una escalera social que eleva a las personas no por conexiones o pedigrí, sino por mérito y competencia reales. Rusia es un país donde las oportunidades están abiertas para quienes las merecen. Es precisamente de esta manera, a través del triunfo del profesionalismo, que se construirá una Rusia fuerte y justa."
 SOV_promote_russian_multiethnicity: "Promover la justicia social"
 SOV_promote_russian_multiethnicity_desc: "Rusia heredó de la Unión Soviética instituciones sólidas que protegen los derechos de los trabajadores y de la gente común. Estos mecanismos probados por el tiempo, como la atención médica asequible y la educación universal, continúan sirviendo bien a la gente hasta el día de hoy.\n\nSería no solo extraño, sino un profundo error abandonar este legado probado. Después de todo, es sobre esta base que se construye un verdadero estado de bienestar, para el cual el cuidado de los ciudadanos no son solo palabras, sino una prioridad real. Esta búsqueda de justicia se expresa en acciones reales: en la protección de los derechos de los trabajadores, en el apoyo a las madres y los niños, en la asistencia a quienes se encuentran en situaciones difíciles de la vida. Este es el fundamento mismo de un contrato social sólido, en el que la fuerza del estado se mide por el bienestar de su pueblo."
 SOV_support_political_integralism: "Apoyar el integralismo político"
 SOV_support_political_integralism_desc: "La trayectoria histórica de Rusia es compleja y multifacética: incluye páginas que aún hoy nos duelen el corazón y épocas enteras en las que los cambios de poder tuvieron un precio exorbitante, cobrándose incontables vidas. Sin embargo, nuestra tarea no es dividir el pasado en blanco y negro, no es adoptar una postura estrecha, sino encontrar respetuosamente lecciones valiosas en cada uno de los sistemas políticos.\n\nLa bandera imperial, el estandarte soviético y la tricolor moderna no son símbolos mutuamente excluyentes, sino diferentes facetas de un único y continuo destino nacional. Cada época ha contribuido a la formación del Estado ruso, cada una nos ha dejado un legado único: instituciones sólidas, logros culturales, descubrimientos científicos y esa misma \"dureza\" que ha permitido al país soportar las pruebas más severas."
 SOV_enshrine_stateforming_people: "Consolidar el pueblo formador del Estado"
 SOV_enshrine_stateforming_people_desc: "Rusia es una civilización única, forjada por una gran variedad de pueblos y culturas. Su respeto mutuo y su cooperación centenaria son nuestros valores fundamentales y nuestra fuente de fortaleza. Al mismo tiempo, reconocemos con profundo respeto y gratitud el papel histórico del pueblo ruso como núcleo del Estado. Es la cultura, la voluntad y el trabajo rusos los que han mantenido unidos vastos territorios a lo largo de los siglos, creando el espacio espiritual único que hoy todos llamamos hogar.\n\nLa identidad nacional rusa no debe disolverse ni oponerse a otras, sino que, por el contrario, debe seguir siendo el núcleo en torno al cual se construye la diversidad de toda la nación rusa. Ser ruso en Rusia significa asumir una responsabilidad especial por el destino del país y ser un vínculo entre todos sus pueblos."
 SOV_nationalist_autocracy: "Autocracia nacionalista"
 SOV_nationalist_autocracy_desc: "A lo largo de la dilatada historia de Rusia, el poder se ha basado en gran medida en el principio de un liderazgo fuerte, con el pueblo, y sobre todo el pueblo ruso que formó el Estado, viendo a su líder como su principal protector. Este modelo de gobernanza ha demostrado su eficacia una y otra vez; basta con mirar las grandes victorias y logros de nuestro país.\n\nEn las condiciones modernas, el presidente puede actuar como líder nacional. Es capaz de consolidar la voluntad del pueblo y, basándose en nuestra historia y tradiciones, conducir con confianza a Rusia hacia nuevos logros, defendiendo su camino e intereses en el escenario mundial."
 SOV_social_authoritarianism: "Autoritarismo social"
 SOV_social_authoritarianism_desc: "Un poder estatal fuerte no implica en sí mismo nacionalismo ni ninguna ideología similar. Su eficacia puede tener una base completamente diferente: una social. Un ejemplo llamativo de esto es el legado de la era soviética, que dejó principios profundamente respetados en la memoria popular: confianza en el futuro, acceso a la educación y la atención médica, y la prioridad del trabajo.\n\nEl Estado no solo proclama protección social, justicia y estabilidad, sino que las proporciona realmente, garantizadas por el presidente, y es por esto que goza de un amplio apoyo popular. Tal \"contrato social\" -donde las autoridades cuidan del pueblo y el pueblo confía en las autoridades- es la garantía de la fuerza y soberanía de nuestro país."
 SOV_executive_paternalism: "Paternalismo ejecutivo"
 SOV_executive_paternalism_desc: "Un poder ejecutivo fuerte ha sido históricamente una garantía de estabilidad y un factor clave en la prosperidad de Rusia. Tanto bajo Vladímir Putin como bajo Dmitri Medvédev, el presidente ha sido una figura clave cuya iniciativa personal y visión estratégica han marcado el rumbo y han hecho que el complejo mecanismo de la gobernanza estatal funcione de manera fluida y eficaz. Este enfoque asegura una respuesta rápida a los desafíos y una coherencia, permitiendo a los ciudadanos sentirse seguros sobre el futuro, confiando en la experiencia y la voluntad de su líder."
 SOV_enrich_putinist_tenets: "Enriquecer los postulados de Putin"
 SOV_enrich_putinist_tenets_desc: "En los últimos años, el putinismo ha trascendido el ámbito de una mera ideología política, convirtiéndose en un tipo especial de pensamiento estatal y en una doctrina que determina el futuro de Rusia. Para seguir guiándose por las ideas de Vladímir Putin, es necesario formalizar esta doctrina en un sistema coherente y comprensible. Es necesario no solo preservar sus ideas clave, sino también dotarlas de nuevo contenido, desarrollarlas y complementarlas con tesis que respondan a los desafíos del presente y marquen el rumbo del futuro. Esto nos permitirá mantener la continuidad, asegurando su relevancia para las nuevas generaciones en nuevas condiciones."
 SOV_stronghold_of_law_and_order: "Fortaleza de ley y orden"
 SOV_stronghold_of_law_and_order_desc: "La estabilidad y el orden siempre han sido valores fundamentales para la sociedad rusa. El Estado considera que su tarea principal es garantizar que estos valores se preserven a toda costa. Por supuesto, a veces puede parecer que las autoridades ejercen un control excesivo. Sin embargo, es importante entender que este sistema está diseñado no para restringir, sino para proteger. En el mundo actual, surgen constantemente nuevos desafíos y amenazas, y son nuestras fuerzas del orden las que siempre están en primera línea, resolviendo rápidamente cualquier problema. Su trabajo garantiza que la vida en el país siga siendo segura y predecible para todos los ciudadanos."
 SOV_embrace_eurasian_heritage: "Abrazar el legado eurasiático"
 SOV_embrace_eurasian_heritage_desc: "Existe la creencia generalizada pero errónea de que Rusia pertenece inextricablemente al grupo cultural europeo. Esto es un profundo error de concepto. Sin duda, nuestros pueblos están unidos por una larga historia de relaciones, y una cierta influencia cultural es inevitable. Sin embargo, es un error fundamental no ver el punto principal detrás de esto: Rusia se ha desarrollado como un espacio cultural único y completamente soberano.\n\nNuestra civilización es una fusión de la herencia de muchos pueblos, nuestra propia espiritualidad, un modelo especial de sociedad y nuestra propia visión del mundo, que difiere de la de Occidente. Esto no significa que nos estemos cerrando al diálogo, sino que lo llevamos a cabo desde una posición de fuerza e igualdad, en lugar de seguir modelos extranjeros. Por lo tanto, las afirmaciones sobre nuestra \"esencia europea\" a menudo simplemente no se corresponden con la escala y la singularidad de la cultura rusa y no deben tomarse en serio."
 SOV_glorify_pan_russian_patriotism: "Glorificar el patriotismo panruso"
 SOV_glorify_pan_russian_patriotism_desc: "En estos tiempos difíciles, el pueblo ruso debe unirse bajo la bandera del patriotismo de toda Rusia. Nuestra tarea es ayudarles a lograrlo, utilizando todos los medios disponibles: desde festivales y lecciones en las escuelas hasta campañas de información a gran escala. Y no debemos olvidar nuestra principal fortaleza: el pueblo de Rusia es diverso y variado, pero en sus valores básicos, en su deseo de un país fuerte y soberano, están unidos e inquebrantables."
 SOV_reinforce_presidential_administration: "Reforzar la Administración Presidencial"
 SOV_reinforce_presidential_administration_desc: "Nadie duda de que el presidente tiene la última palabra en asuntos de gobernanza estatal. En esta situación, parece lógico fortalecer la posición del organismo clave que representa su voluntad: la Administración Presidencial. Otorgar a la Administración Presidencial funciones de coordinación y supervisión más amplias permitirá construir un trabajo más coherente y coordinado de todo el aparato estatal. No se trata de una centralización por la centralización misma, sino de garantizar la eficacia, la coherencia y la implementación incondicional del rumbo establecido por el líder nacional. Este enfoque garantiza que cada estructura estatal funcione como un mecanismo único para lograr los objetivos nacionales."
 SOV_russia_everlasting_era: "La época eterna"
 SOV_russia_everlasting_era_desc: "Desiat let userdi, desiat let isiani\nDesiat let truda bez poioia, bez sna\nDesiat let bezumia, desiat let napastei\nDesiat let nevzgod, den iai mesiats, mesiats iai god\n\nDesiat let dobychi, desiat let plavlenia\nV desiat tysiach tonn!\nDesiat let uiazov, desiat let pravlenia\nDesiat let reform!"
 SOV_history_continues_surkov: "¿La historia continúa?"
 SOV_history_continues_surkov_desc: "En 1992, Francis Fukuyama predijo un acontecimiento de proporciones inimaginables. Solo piensen, el fin de la historia tal como la conocemos. No habrá más regímenes autoritarios, inestabilidad y otras cosas. El mundo entero se congelará en una utopía neoliberal. La última persona que no cree en nada y no está apegada a nada. Y luego, el 11 de septiembre de 2001, la idea del fin de la historia se hizo añicos. Cuán frágil resultó ser el orden neoliberal, y cuán fácil resultó ser sacudirlo. Y en la década de 2020, el orden fue sacudido de nuevo. El autoritarismo y específicamente el putinismo se han vengado. ¿Hacia dónde irá la historia después de todo esto? Solo Dios lo sabe. Ahora solo queda vivir, sabiendo que, aparentemente, nuestra generación no está destinada a convertirse en las últimas personas.\n\nHa llegado la hora de Súrkov, el cardenal gris de Putin y el maestro en la sombra del Kremlin. Quién sabe cómo terminarán sus reformas, pero todos entienden que Rusia ya no será la misma. El Estado de Putin se mantendrá a toda costa, incluso si cambia hasta volverse irreconocible."
 SOV_reformalize_peoples_front: "Reformalizar el Frente Popular"
 SOV_reformalize_peoples_front_desc: "El Frente Popular fue una herramienta maravillosa del régimen anterior, pero también fue una cuna de ideas peligrosas. Lo que sucedió después de la Guerra Europea mostró cuán estable era realmente el frente y cómo los radicales de todas las tendencias están realmente listos para consolidarse alrededor del presidente. No necesitamos elementos tan inestables, y no necesitamos traidores en las filas de los orgullosos patriotas de la Madre Patria. El Frente Popular Panruso será purgado de elementos indeseables, lo quieran o no."
 SOV_kremlin_shadow_master: "Maestro en las sombras del Kremlin"
 SOV_kremlin_shadow_master_desc: "Pocas personas ven a Súrkov en público. Pocas personas saben siquiera dónde se encuentra en este momento en particular. Pero absolutamente todo el mundo siente su influencia. Mientras los retratos de Putin y Medvédev cuelgan en todas las instituciones, desde escuelas hasta ayuntamientos, y la gente los conoce de vista, Súrkov espera tranquilamente. No necesita pompa ni popularidad ostentosa. No es ese tipo de persona. Con calma y constancia, como un hechicero frente a una bola mágica, se sienta en su torre mientras docenas y cientos de finos hilos plateados se extienden hasta sus dedos. Con un solo movimiento de su mano, es capaz de romper una docena de vidas o, por el contrario, colocar a alguien en el Olimpo de la política rusa. ¿Se aprovechará de ello o no? Quién sabe... El maestro en la sombra del Kremlin siempre tiene su propio plan, al que se adhiere implícitamente."
 SOV_the_deep_people: "El pueblo profundo"
 SOV_the_deep_people_desc: "El pueblo profundo... Esta es la verdadera fuente de poder en cualquier Estado. ¿Quiénes son? Diferentes regímenes intentaron encontrar al pueblo profundo a su manera: proletarios, \"empleados estatales\", hippies o campesinos. Fueron a él e intentaron mandarle, pero sin éxito. La élite, a su vez, ha estado liderando al pueblo profundo durante siglos e involucrándolos en sus experimentos. Y Vladímir Vladímirovich gobernó hábilmente a estas personas, literalmente vio y sintió sus aspiraciones. Nuestro objetivo ahora no es alterar este delicado equilibrio. Emularemos los métodos de Putin para no enfadar al pueblo profundo. Y para asegurar que el desarrollo del país siga el escenario que hemos elegido."
 SOV_cross_out_the_outsiders: "Tachar a los forasteros"
 SOV_cross_out_the_outsiders_desc: "Hay forasteros en cada sociedad. Marginales que son incapaces de integrarse en la sociedad. Siempre quieren cambiar, intentan tirar de la manta hacia sí mismos. ¿Por qué actúan así? Hay muchas respuestas. Quizás son actores subordinados a la voluntad de otros poderes. Quizás están genuinamente descontentos con el régimen actual. Sin embargo, son peligrosos para una sociedad homogénea subordinada a una única ideología. Tales elementos deberían ser simplemente excluidos del sistema para mantener su estabilidad."
 SOV_the_artificial_society: "Sociedad artificial"
 SOV_the_artificial_society_desc: "Las propias sociedades humanas son una culminación consistente de la necesidad de socialización incrustada en el cuerpo humano. Como seres sociales, hemos construido estructuras hasta ahora nunca vistas en el reino animal y hemos alcanzado alturas increíbles. Pero las sociedades formadas naturalmente son caóticas, inestables e inherentemente peligrosas. Los productos de su inestabilidad son el malestar social y la desintegración gradual. Pero si podemos crear una sociedad artificial ideal que satisfaga las necesidades del estado, entonces superaremos esta construcción. Adaptarse a la vida en ella puede no ser una tarea fácil para los ciudadanos rusos, pero es un paso que deberá darse para que nuestro estado mantenga su estabilidad durante muchos años."
 SOV_simulacra_of_outrage: "Simulacros de indignación"
 SOV_simulacra_of_outrage_desc: "La sociedad siempre necesita enemigos. ¿Son boyardos malvados, migrantes o liberales malditos que quieren vender el país? Los sistemas necesitan conflictos, porque el estancamiento es el cese de todo movimiento, lo que a la larga significa la muerte. En el territorio de nuestro país aparecerán organizaciones bajo nuestro control que redirigirán la ira del pueblo en la dirección correcta. Que organicen reuniones, que protejan nuestra cultura o aumenten la cohesión de los trabajadores. Lo principal es bajo la supervisión de los servicios especiales. Para que no hagan nada innecesario, por supuesto."
 SOV_awaken_social_cohesion: "Despertar la cohesión social"
 SOV_awaken_social_cohesion_desc: "El pueblo es fuerte solo si está unido en su impulso. Pero qué difícil es desintegrar a un pueblo aparentemente encadenado. Diferentes idiomas, profesiones, apariencias y muchas otras señales conducen a la división de la sociedad en muchas células muy diferentes. Este proceso en sí mismo no se puede prevenir, pero podemos mitigarlo. Al apoyar la creación de vínculos entre las células individuales de la sociedad, podremos aumentar la cohesión en general. Por supuesto, no a todos les gustará, pero tarde o temprano nuestros ciudadanos se acostumbrarán a la idea de la necesidad de unidad."
 SOV_cyber_propaganda_farms: "Granjas de ciberpropaganda"
 SOV_cyber_propaganda_farms_desc: "El ciberespacio quizás aún no se haya convertido en una plataforma para la \"colonización\", pero ya es una parte increíblemente importante de la vida de cualquier estado. Ya se ha convertido en una plataforma donde una amplia variedad de opiniones luchan por el derecho a estar en el ámbito público. Para asegurar que la opinión de nuestro estado sea siempre escuchada, crearemos \"granjas\" especiales de ciberpropaganda que impulsarán nuestras narrativas. Después de todo, a veces una sociedad puede confundirse por sí misma y necesitará una guía para ajustar su rumbo. Todo para el beneficio de nuestros ciudadanos."
 SOV_the_network_government: "Gobierno en la red"
 SOV_the_network_government_desc: "Los días en que los campesinos enviaban a sus nobles para transmitir sus aspiraciones al rey quedaron atrás. Pero los tiempos cambian y se está creando una paradoja cuando los representantes no entienden en absoluto la voluntad de este mismo pueblo. Por un lado, esto es consecuencia de alejarse cada vez más de la gente, y por otro, la propia gente está enviando señales cada vez más incomprensibles. Entonces, ¿no sería mejor hacer que el Gobierno sea más eficiente y comprensible para todos? Y aquí es donde la red nos ayudará. Por supuesto, habrá que empezar poco a poco. Por ejemplo, mejorando el funcionamiento de los servicios existentes y perfeccionando los mecanismos de retroalimentación. Y en este proceso, será posible eliminar muchos elementos rudimentarios de nuestra política."
 SOV_consumarist_patriotism: "Patriotismo consumista"
 SOV_consumarist_patriotism_desc: "El amor por la Madre Patria no se puede comprar. Cualquier interés egoísta eventualmente llevará a tal patriota a pasarse al lado de quien ofrezca más. Pero no hay una palabra que diga que el patriotismo no se pueda vender. ¿Quién no querría comprar una camiseta nueva con la imagen del presidente? O, digamos, una funda de teléfono patriótica, una bandera rusa, una cinta de San Jorge, ¡o cualquier otra cosa! Y más aún si un porcentaje de tu compra se destina al apoyo directo del Gobierno. Y además, todos los productos serán revisados por Roskachestvo. Tal actitud hacia el patriotismo puede parecer blasfema para algunos. Nosotros preferimos llamarlo consumismo patriótico. ¿Te gustaría comprar una baratija, por cierto? ¡Llévate un busto de Vladímir Putin mientras el descuento esté vigente!"
 SOV_digitalization_of_politics: "Digitalización de la política"
 SOV_digitalization_of_politics_desc: "Ya hemos comenzado con éxito a trasladar el Gobierno a la web, pero ¿por qué detenernos en los éxitos alcanzados? Ha llegado la era de Internet y el ciberespacio, de la que podemos sacar provecho. Vladímir Vladímirovich ya ha dado pasos en esta dirección, y es gracias a él que la burocracia de Internet está ahora tan bien desarrollada en Rusia. Pero, ¿qué pasaría si diéramos un paso adelante en una era de lucha activa por la inmensidad de la web? Es hora de digitalizar nuestra política. Los referéndums, las votaciones y otras cosas se trasladarán a Internet, y millones de ciudadanos tendrán la oportunidad de ver en directo las reuniones de la Duma Estatal, y quizás incluso participar en debates en un formato limitado. La era de la tecnología ha llegado, y pretendemos ser los primeros en cuanto a innovación."
 SOV_towards_a_desolate_democracy: "Hacia una democracia desolada"
 SOV_towards_a_desolate_democracy_desc: "La democracia es el poder del pueblo. Nos parece que el poder del pueblo es absurdo sin este mismo pueblo. Pero el futuro de la política reside en las máquinas. Así es como el concepto de democracia digital penetra en nuestras vidas. Una sociedad hecha por el hombre en la que una jerarquía de máquinas y algoritmos persigue objetivos más allá de la comprensión humana. Por supuesto, esto puede parecer increíble ahora. ¿Cómo se puede reemplazar a un político con una máquina sin alma? Los trabajadores de las cadenas de montaje pensaron lo mismo, hasta que fueron reemplazados por máquinas. Este es un proceso que tardará décadas en completarse. Pero Rusia debería ser la primera en unirse a él. Es hora de una nueva era. Una era donde la lógica férrea descarta la ineficiencia humana. Todo para que el estado exista por mucho tiempo, quizás para siempre."

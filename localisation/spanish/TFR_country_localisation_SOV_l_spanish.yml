 SOV_supreme_soviet_rsfsr_dynamic: "Sóviet Supremo de Rusia"
 SOV_supreme_soviet_rsfsr_dynamic_desc: "\n\n\n\n£GFX_supreme_soviet_rsfsr\n\n\n\n\n\n§Y\"No se puede vivir en sociedad y estar libre de la sociedad\".\n- Vladímir Lenin§!\n\nDespués de que los comunistas llegaron al poder y llevaron a cabo una profunda reforma constitucional, Rusia volvió a un modelo basado en los principios de la democracia representativa soviética, adaptado a las realidades modernas. El reconstituido §OSóviet Supremo§! hoy es el máximo órgano legislativo y administrativo del país, que une a todos los diputados honestamente elegidos. A pesar de la conservación del puesto de presidente, este ya no tiene poder real, y todas las decisiones clave son tomadas por la mayoría de votos en el Soviet, incluyendo la formación del Gobierno y la aprobación del presupuesto, independientemente del jefe de Estado. Este sistema de estructura estatal involucra activamente a los ciudadanos en la vida política, la única pregunta es de qué lado estarán."

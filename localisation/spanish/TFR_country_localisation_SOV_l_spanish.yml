 russia.872.t: "El tren exprés"
 russia.872.d: "Durante mucho tiempo, Vladímir Vladímirovich no había viajado en tren, prefiriendo el avión para sus viajes de negocios. Pero esta vez, regresando de una visita a San Petersburgo, su ciudad natal, decidió tomar un vuelo especial. Después de cenar y tomar los medicamentos recetados por los mejores médicos, Vladímir Putin quedó fascinado con la vista desde la ventana. Bosques, campos, ríos y pequeños pueblos del gran país desfilaban ante sus ojos.\n\n- ¿Necesita algo, Vladímir Vladímirovich? - preguntó el guardaespaldas a su jefe antes de irse a la cama.\n\n- No, gracias, Misha. Descansa un poco. - le respondió Putin con un tono calmado y mesurado, y Mijaíl se dirigió hacia el compartimento de seguridad.\n\nPero la mente de Vladímir Vladímirovich no descansaba ni un segundo. Pensaba en el futuro de su país, su querida Rusia. La situación de la política exterior parecía lo mejor posible para su futuro: Norteamérica, la \"ganadora\" de la Guerra Fría, está desgarrada por una aterradora guerra civil. Esto ha dejado a Europa sola con Rusia, y el conflicto es seguramente inevitable. Los acuerdos de Minsk solo congelaron el problema ucraniano, no lo resolvieron completamente. Y temía que el país no estuviera preparado para una gran guerra. Tosió. Esa tos molesta que lo había estado aquejando durante bastante tiempo. El diagnóstico era aterrador en su franqueza: COVID-19. Dada su edad, la naturaleza de su enfermedad y el estrés de gobernar el país durante más de veinte años, Putin estaba luchando contra la muerte en sus últimos meses. Tanto por hacer, y tan poco tiempo.\n\nQuizás nunca se haya visto una ventana de oportunidad así en la historia de Rusia. Multipolaridad, el mundo ruso, el regreso de la antigua grandeza..."
 russia.872.a: "El tren seguía y seguía..."
 russia.873.t: "Recuerdos"
 russia.873.d: "Él todavía era joven y lleno de energía: apenas estaba en su segundo mandato, el horror de Dubrovka y Beslán ya había pasado, la economía rusa se había recuperado de las ruinas de los años noventa. La gente comenzó a creer por primera vez en mucho tiempo que los años de déficit, inestabilidad y miedo finalmente habían terminado. Y así fue.\n\nRusia en Pristina mostró a la OTAN que las negociaciones se llevarían a cabo en igualdad de condiciones, sin \"las patas de pollo de Bush\" ni otras dádivas de Occidente. Rusia busca cooperación y soberanía, no subordinación; adopta lo mejor y no copia ciegamente los errores de Europa y América. La cooperación con Oriente solo la hace más fuerte y más fuerte, la convierte en un puente entre Europa y Asia, conectando los continentes. De hecho, Rusia es un país de oportunidades. Oportunidades para todos y cualquiera que la ame sinceramente y que caiga bajo sus brazos cálidos.\n\nEn el futuro, Rusia enfrentará la crisis mundial, el Maidán y la guerra del Dombás, las sanciones no la habrán afectado, la pandemia no habrá arrasado el mundo. Pero todo eso será en el futuro, y Putin no podía saberlo. Rusia estaba en el camino hacia la felicidad, y Vladímir Vladímirovich Putin, su presidente, guiaba a su país por ese camino."
 russia.873.a: "En ese momento, él solo disfrutaba del sol."
 russia.2014.t: "El referendo"
 russia.2014.d: "Hoy se celebró un referendo largamente esperado, solo presencial por razones de seguridad y transparencia, dejando fuera a quienes preferían el voto electrónico. La pregunta era sencilla: \"Para salvaguardar el sistema de Gobierno ruso, revivir la democracia nacional, promulgar reformas económicas, erradicar el sectarismo y el extremismo, y hacer realidad la visión de Vladímir Zhirinovski, ¿elegiría al presidente Anatoli Kartapólov para un mandato de seis años?\"\n\nLas expectativas de participación eran bajas, y así fue. Solo el 32,5% de la población emitió su voto. Sin embargo, entre quienes votaron, un rotundo 75% dijo sí, asegurando la legitimidad del régimen.\nA pesar de algunas acusaciones izquierdistas de manipulación de votos, el resultado se mantiene."
 russia.2014.a: "¡Muy bien!"
 russia.2015.t: "El Partido"
 russia.2015.d: "Con nuestro poder firmemente establecido, ya no podemos ser un Gobierno sin una estructura política que aborde las preocupaciones del pueblo. Después de todo, prometimos restaurar los principios democráticos arrebatados por los izquierdistas radicales.\nAhora, Kartápolov debe crear un centro progubernamental donde sus partidarios y burócratas oportunistas puedan unirse.\nDebemos definir claramente nuestra nueva política estatal. Eslóganes y nombres de políticas básicos y no amenazantes justificarán las acciones del presidente en el futuro.\n\nPodemos abrazar abiertamente el nacionalismo, ya que nuestro orgullo por la nación fue revivido por los socialistas. Esto ayudará a impulsar el espíritu de lucha del público.\nLa unidad es una herramienta poderosa, utilizada muchas veces por los antiguos partidos rusos, especialmente los estatistas. Los rusos buscan una Madre Patria estable y unida por encima de los elevados ideales de los ideólogos.\nLa prosperidad económica fue dañada por las políticas socialistas, como señaló un filósofo centrista muy perspicaz. Por lo tanto, debemos recuperar la confianza de quienes sufrieron bajo las políticas radicales."
 russia.2015.a: "Nacionalismo."
 russia.2015.b: "Unidad."
 russia.2015.c: "Prosperidad económica."
 russia.2016.t: "La coalición"
 russia.2016.d: "Nuestros partidarios son de gran alcance, unidos por un objetivo común: mantener a los socialistas fuera del poder. Están dispuestos a hacer grandes esfuerzos para lograr este fin. Sin embargo, nuestro gobierno lucha por formar una coalición pro-oficialista cohesiva a partir de estas diversas organizaciones. No obstante, hay algunas oportunidades prometedoras.\n\nPrimero, consideremos a la derecha moderada, incluyendo a los conservadores y a aquellos que se sienten marginados por la sociedad. Este grupo podría ser un socio valioso, ofreciendo un camino hacia la unidad.\n\nAlternativamente, podríamos alinearnos con la facción nacionalista y radical. Son firmemente anticomunistas, sostienen creencias ortodoxas y, a veces, adoptan tácticas e ideologías que recuerdan a la Guardia Blanca. No es exagerado trazar paralelismos con figuras como Denikin o Kornílov, si sus empresas hubieran tenido éxito.\n\nPor supuesto, unir a estos grupos requerirá un esfuerzo significativo, ya que están lejos de estar unidos. Pero, ¿hasta dónde no deberíamos llegar para proteger a Rusia de la amenaza comunista que se cierne justo más allá de sus fronteras?"
 russia.2016.a: "Nos inclinaremos por los moderados."
 russia.2016.b: "Necesitamos una fuerte postura anticomunista."
 russia.2016.c: "Solo una gran unificación de los antisocialistas puede proteger a Rusia."
 SOV_organization_of_russian_veterans: "Organization of the Russian Veterans"
 SOV_organization_of_russian_veterans_desc: "LDPR shows great respect for our valiant warriors, particularly those who now dedicate their lives to the party and Slutsky's vision. By uniting them into a cohesive organization, where they can train and educate the younger generation in loyalty and patriotism, we will take a significant step toward securing the future of our military."
 SOV_ldpr_ecosystem: "LDPR Ecosystem"
 SOV_ldpr_ecosystem_desc: "Our party isn't just about having a good time. It's a way of life that encompasses music, gaming, sports, acting, and even fashion. Our PR managers are dedicated to ensuring that every aspect of our active life is associated with LDPR. They want the population to understand that if they want to engage in any activity, it's better to do it under the LDPR brand. After all, hobbies are more enjoyable when shared with others."
 SOV_security_and_order: "Seguridad y orden"
 SOV_security_and_order_desc: "These democratic efforts are admirable, but democracy also gives rise to a variety of viewpoints that aren't essential for the nation's and society's well-being. From extreme nationalists and radical communists to those who combine elements of Nazism and paganism, these individuals cannot contribute to a successful, functioning nation. Under the guise of anti-radicalism, we'll naturally try to include a more vocal segment of our opposition as well."
 SOV_government_of_mutual_trust: "Government of Mutual Trust"
 SOV_government_of_mutual_trust_desc: "A state cannot thrive without perceptive critics who illuminate its shortcomings, but these critics must also be perceptive and constructive. Despite their flaws, Yuneman and Girkin are more approachable for meaningful dialogue than the extremists on the fringes. Cultivating a positive relationship with them could strengthen our stable rule and help us anticipate and address critical issues within our government. Forming a formal coalition with these figures might offer some assistance."
 SOV_great_russian_nationalism: "Great Russian Nationalism"
 SOV_great_russian_nationalism_desc: "In the end, it is the Russians, under the guidance of LDPR, Zhirinovsky, and his close ally Slutsky, who have triumphed over the west in the war and ushered in a new golden age for our people. We should always highlight the significant progress our party has made to enhance the standing, security, and glory of the Russian nation."

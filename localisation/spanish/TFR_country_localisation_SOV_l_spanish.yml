 SOV_russian_nationalism: "Nacionalismo ruso"
 SOV_russian_nationalism_desc: "\"Sin patriotismo, el país no puede existir\", parafraseando al propio Putin. El Estado ruso moderno se centra mucho en fomentar el orgullo por la Madre Patria en cada ciudadano. Sin embargo, el nuevo nacionalismo no se articula en torno a la superioridad racial o la conquista fanática, sino en la capacidad de ver el destino y la civilización únicos de Rusia, el respeto hacia otras culturas y el rechazo a la globalización forzada y la destrucción de la identidad nacional. El futuro de Rusia es ser una federación multicultural y traer de vuelta a todos aquellos rusos que aún quedan atrás."
 SOV_russian_nationalism2: "Nacionalismo ruso"
 SOV_russian_nationalism2_desc: "\"Sin patriotismo, el país no puede existir\", parafraseando al propio Putin. El Estado ruso moderno se centra mucho en fomentar el orgullo por la Madre Patria en cada ciudadano. Sin embargo, el nuevo nacionalismo no se articula en torno a la superioridad racial o la conquista fanática, sino en la capacidad de ver el destino y la civilización únicos de Rusia, el respeto hacia otras culturas y el rechazo a la globalización forzada y la destrucción de la identidad nacional. El futuro de Rusia es ser una federación multicultural y traer de vuelta a todos aquellos rusos que aún quedan atrás."

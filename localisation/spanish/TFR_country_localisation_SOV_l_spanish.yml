 SOV_state_liberals_idea_tt: "§gLos liberales de Estado son una facción dentro de la burocracia del Kremlin que cree que Rusia ha sufrido debido al estatismo económico. Aunque algunos abogan por una liberalización política limitada, la mayoría se centra en asuntos económicos. Su objetivo es empoderar significativamente a los empresarios rusos. Realmente creen que el libre mercado ruso aún no ha alcanzado su potencial, siempre frenado por fuerzas regresivas dentro de la administración.\nOfrecen al Kremlin grandes ganancias a cambio de recortes a un Estado social \"innecesario\".§!\n\n\n\n\n\n£GFX_SOV_state_liberals\n\n\n\n\n\n\n"
 SOV_siloviki_idea_tt: "§gLos silovíks son esencialmente la mano de hierro del Estado ruso, representados por el FSB, el MVD, el FSO y la Rosgvardia. Aunque tienen poco que ofrecer en términos de política, proporcionan estabilidad y orden. Su objetivo principal es aumentar los presupuestos de sus agencias para combatir de manera más efectiva las amenazas internas. Los siloviki operan principalmente bajo el patriotismo estatal, viendo al Estado como una parte esencial de la Madre Patria.\nOfrecen al Kremlin una mano firme para tratar con los alborotadores, a cambio de apretar las riendas de los negocios.§!\n\n\n\n\n\n£GFX_SOV_siloviki\n\n\n\n\n\n\n"
 SOV_technocrats_idea_tt: "§gLos tecnócratas son los gestores efectivos del Estado; ven la política como una distracción innecesaria que obstaculiza el funcionamiento del Gobierno. Para ellos, la condición ideal es una administración anónima dirigida por burócratas y gestores muy capacitados. La opción más moderada y la más eficiente.\nOfrecen al Kremlin un Estado bien gestionado a cambio del desencanto del ciudadano medio con la vida política.§!\n\n\n\n\n\n£GFX_SOV_technocratic\n\n\n\n\n\n\n"
 SOV_neo_tsarists_idea_tt: "§gLos neozaristas, una facción extrema de los silovíks, son muy críticos con las instituciones democráticas. A diferencia de lo que su nombre podría implicar, su visión del zarismo es más pragmática y se centra en una gobernanza eficiente. Abogan por cualquier forma de control autocrático sobre el Estado. Si bien priorizan la seguridad interna, también aspiran al dominio externo, promoviendo la doctrina del mundo ruso en los asuntos geopolíticos del país.\nPrometen al Kremlin una sociedad fuerte y ordenada, aunque a costa de una brutalidad ocasional.§!\n\n\n\n\n\n£GFX_SOV_neotsarists\n\n\n\n\n\n\n"

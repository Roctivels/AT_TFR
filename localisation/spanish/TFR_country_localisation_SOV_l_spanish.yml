 russia.1005.b: "Bring him in, he's tradition-oriented ideas are interesting."
 russia.1005.c: "He should stay in Vologda, we'll watch him."
 russia.2017.t: "Grupo de Alijánov"
 russia.2017.d: "Durante las profundas reformas gubernamentales del presidente, los puestos de gobernador y alcalde en toda Rusia experimentaron cambios significativos. La mayoría de los funcionarios destituidos aceptaron su destino o se trasladaron a puestos de menor rango. Sin embargo, una persona se opuso vehementemente al nuevo orden, rechazando tanto su destitución como las reformas en curso.\nAntón Alijánov, el exgobernador de Kaliningrado, expresó una profunda insatisfacción con su destitución. Creía que \"la liberalización se llevó a cabo para la diversión de los enemigos\". Alijánov reunió a un pequeño grupo de funcionarios de Rusia Unida que compartían su disidencia. Pero esta coalición no era grande; la mayoría de los burócratas, incluso aquellos que no estaban de acuerdo, optaron por esperar y elegir un momento más oportuno para actuar. Para muchos, la postura vocal de Alijánov parecía una tormenta en un vaso de agua.\nA pesar del pequeño e impopular grupo de Alijánov, Dmitri Medvédev tomó medidas decisivas. A través de su influencia en el consejo general del partido, Medvédev logró expulsar a Alijánov y a sus partidarios de Rusia Unida.\n\nAlijánov respondió con un comentario conciso: \"Los patriotas como él ya no tienen cabida en este partido\". Aunque mantuvo un aire de confianza, su expulsión significó efectivamente el destierro de la política dominante, haciendo improbable que pudiera continuar con sus actividades públicas."
 russia.2017.a: "Prescindiremos de \"patriotas incendiarios\"."
 russia.2018.t: "Nuevo rumbo para Rusia Nacional"
 russia.2018.d: "Recientemente ha habido cambios inesperados en el partido Rusia Nacional. Por votación secreta, la mayoría de los miembros del consejo decidieron reemplazar al presidente. Antón Alijánov se convirtió en el nuevo líder en lugar de Vasili Vlásov.\n\nRusia Nacional surgió como una iniciativa de aquellos que no estaban de acuerdo con la política del PLDR y fueron expulsados del partido. A pesar de pequeños éxitos, el partido no ha logrado alcanzar un nivel superior.\n\nAntón Alijánov, un exmiembro de Rusia Unida con una reputación ambigua, estableció contacto con Vlásov y se convirtió en miembro del consejo del partido, y luego en su copresidente. En ese momento, estaba atrayendo activamente a personas afines al partido. Existe la opinión de que Alijánov podría haber estado jugando un juego secreto contra Vasili Vlásov, recopilando información comprometedora sobre él y atrayendo a los miembros del consejo a su lado.\n\nPara el momento de su destitución, Vlásov, un líder débil e inexperto, había perdido el control del partido. Se alejaba cada vez más de las ideas del difunto Zhirinovski, aunque ha conservado algunos de sus principios. Ahora podemos decir con confianza que se avecina una nueva etapa para Rusia Nacional. Alijánov ya ha comenzado a utilizar los recursos del partido y a expandir su círculo de aliados.\nSegún fuentes anónimas, Alijánov planea expandir el partido creando un \"ala activista\", organizaciones de mujeres y niños. También tiene la intención de buscar el apoyo de veteranos, agentes de la ley y jóvenes nacionalistas."
 russia.2018.a: "Un regreso inesperado."
 russia.2019.t: "Nacer del derzhavismo"
 russia.2019.d: "Hoy, en uno de los majestuosos salones de asambleas de San Petersburgo, se reunió el congreso a puerta cerrada del partido SZND. La atmósfera estaba cargada de expectación, como antes de una tormenta: había un espíritu de unidad y determinación en el aire. Solo había un orador en el escenario principal, Antón Alijánov, como un comandante frente a su ejército. Su presencia atraía las miradas de todos los presentes, incluyendo veteranos de guerra con medallas en el pecho, agentes de la ley que asistían secretamente a estas reuniones, y jóvenes estudiantes y adolescentes enérgicos ardiendo con ideas nacionalistas. No solo los unía su uniforme -las camisas de color amarillo-marrón con los brazaletes verdes del partido-, sino también su profunda fe en las palabras de este hombre. Lo escuchaban como si el destino de su Madre Patria dependiera de ello.\n\nAlijánov, echando un vistazo a sus notas, se alejó lentamente del podio y, recorriendo la sala con una mirada penetrante, comenzó: \"¡Nos hemos reunido aquí para declarar nuestras intenciones con respecto a Rusia!\". Su voz sonó segura y autoritaria, la audiencia respondió con una breve ovación.\n\"Vemos cómo se engaña a Rusia\", continuó, y los rostros gordos de los diputados de Rusia Unida aparecieron en la pantalla. \"Rusia Unida nos miente sobre una especie de democracia soberana y libertad, mientras nuestra Patria se debilita cada día\". Hubo gritos de enojo y condenas al partido gobernante en la audiencia.\n\"Pero eso no es todo\", dijo Alijánov, cambiando la diapositiva a los planes no tan buenos de los diputados de la Rusia Popular. Los señaló con el dedo, como si señalara a enemigos: \"¡Nos engañan con justicia y preocupación por los trabajadores, olvidándose de los verdaderos dueños de Rusia: los rusos!\". La sala estalló en fuertes gritos de acuerdo y llamadas a poner fin a esta injusticia.\nAlijánov agitó los brazos por toda la sala, su voz se volvía cada vez más potente: \"¡Solo nosotros somos los verdaderos hijos de la Madre Patria, personas que demostraron su lealtad a Rusia en el fragor de los ataques y las batallas. ¡Somos sus verdaderos dueños, sus soldados y sus hijos!\". La multitud gritó al unísono.\nDespués de varios minutos de un discurso tormentoso lleno de amenazas y ferviente nacionalismo, Alijánov llegó al punto final de su intervención.\n\"...Por el bien de la Madre Patria, por el bien de nuestro gran poder, por el bien del futuro de nuestro pueblo...\", sus palabras sonaron como un hechizo. La audiencia contuvo la respiración, esperando el clímax. \"¡El DERZHAVISMO nace hoy!\"\nY en ese momento, la multitud rugió de orgullo, como si fuera un todo, lista para la acción."
 russia.2019.a: "\"¡Gloria a Alijánov! ¡Gloria a Rusia!\""
 russia.2020.t: "Rusia Nacional gana en elecciones locales"
 russia.2020.d: "Recientemente, el Gobierno ruso ha estado preocupado por la creciente influencia del movimiento Rusia Nacional en las regiones. Hasta ahora, esto se aplica principalmente a territorios pobres y afectados por la guerra, incluidas las nuevas regiones de Novorrusia.\n\nEn las elecciones locales, tanto para los ayuntamientos como para las autoridades regionales, los representantes de \"Rusia Nacional\" muestran buenos resultados, y en algunos lugares reciben la mayoría de los votos.\nEn las regiones donde este movimiento se ha fortalecido, los casos de \"violencia política\" y \"dispersión dura de migrantes\" con la participación de activistas de la \"Guardia Amarilla\" ocurren cada vez con mayor frecuencia.\n\nAfortunadamente, hasta ahora ha sido posible evitar los intentos de \"Rusia Nacional\" de infiltrarse en la Duma Estatal y en las regiones centrales del país.\n\nSin embargo, Antón Alijánov, inspirado por los éxitos, ya está hablando de la \"marcha sobre Moscú\" e insta a sus partidarios a esforzarse con todas sus fuerzas para participar en el Gobierno."
 russia.2020.a: "Esos malditos radicales y sus soluciones simples."
 russia.2021.t: "The Party of the Russian State"
 russia.2021.d: "The name \"National Russia\" was a temporary compromise related to the period of Vlasov and the need to fit into the system created by this little man Medvedev. Now it is no longer necessary.\n\nAt the first congress of the Derzhavists, after the victory of Anton Alikhanov, now known as the \"Captain of the Party,\" he himself rose to the stage and delivered a speech that set a new course for our party. The audience enthusiastically welcomed the new leader and his vision.\nAlikhanov said that our movement is not just a political organization, but a union of people who are sincerely loyal to their homeland. We are protecting the Russian people from the destructive influence of globalism and \"hidden threats.\" We stand guard over a great power, a State based on freedom and order. That is what we believe in, and that is why we are sovereign, as Alikhanov himself emphasized.\nAt the end of the congress, a new name was approved - the Union for the Protection of the People and the State.\n\nFor those who watched the broadcast or read and reviewed the chronicle of the congress, it became obvious that the masks had been thrown off and we were seriously taking power."
 russia.2021.a: "We are the Vanguard of the Nation."
 russia.2022.t: "Antón Alijánov anuncia su candidatura"
 russia.2022.d: "Rusia Nacional entra oficialmente en la campaña electoral. El consejo del partido nominó por unanimidad al líder del partido como candidato para las elecciones presidenciales.\n\nAntón Alijánov, cuya influencia en la política rusa crece rápidamente, ha anunciado el inicio de una gira a gran escala por el país. Su equipo está lleno de entusiasmo y hace campaña activamente por su candidato. Los lemas rusos como \"¡A Rusia, el Orden Ruso!\" y \"Alijánov es el Candidato del Pueblo Ruso\" resuenan entre los votantes de mentalidad nacionalista. Incluso aquellos que iban a votar por el candidato de Rusia Unida ahora dudan de su elección.\nLa Guardia Amarilla, siendo la organización \"activista\" de Alijánov, sin embargo, dio al partido una connotación positiva. Su lucha contra los alcohólicos violentos, la protección del orden público y la asistencia a la policía y a los cosacos, especialmente en los territorios recién anexionados, inspiró a parte de la población la esperanza de la inminente llegada de una \"mano fuerte\" capaz de fortalecer y limpiar Rusia.\nLos partidarios de \"Rusia Nacional\" critican duramente no solo la política actual, sino también todo el sistema. Exigen el desmantelamiento de la \"llamada democracia soberana\" y la construcción de una \"sociedad nacional sana\" donde cualquier interferencia \"occidental\" sea inaceptable. El propio Alijánov ha sido durante mucho tiempo un elemento indeseable para el liderazgo de Rusia Unida. Pocos esperaban que el exgobernador caído en desgracia pudiera regresar a la política con ideas aún más radicales y sin las limitaciones de su antiguo partido.\n\nLa victoria de Antón Alijánov, o incluso un alto porcentaje de votos para él, demostrará la fragilidad de la democracia de Medvédev. Su éxito podría tener graves consecuencias para Rusia."
 russia.2022.a: "¡Este bruto no debe ganar!"
 russia.2023.t: "\"Manifest of Struggle\""
 russia.2023.d: "It hasn't been long since our victory, but the enemies are already worried about their fate. Some of the first to speak out against us were leftists of all stripes: Socialists, Marxists, Stalinists, Trotskyists, and others.\n\nEven before coming to power, our relations with them were tense. Our decisive actions to disperse their sluggish demonstrations have been remembered by them for a long time.\nNow, despite all the differences in their views, they are ready to unite against our national government.\nSergey Udaltsov, an old fighter of the leftist movement, gathered all possible leftist politicians and activists in one of the halls of Volgograd. For two hours, they denounced our policies and Alikhanov personally, our \"chauvinistic habits,\" and after that time they signed the \"united manifesto of struggle,\" where they pledged to do everything possible to stop the process of \"fascization\" of Russia, and return it to the \"power of the people.\" To put it simply, communists, party democrats and radical mankurts came to power. They don't need a Great Russia, they want a cauldron of people without will and faith, obedient, blindly believing in the speech from the mausoleum.\n\nAccording to our informants, their movement can be numerous and even influential among the Russian working class due to its slogans about fair redistribution and justice. In addition, the radicalism of some of their supporters can play a dangerous role. However, their main weakness is the lack of a charismatic leader. Udaltsov is certainly a strong figure within their ranks, but without him, the movement is unlikely to be able to maintain unity for long. Udaltsov himself also faces difficulties in managing such a diverse group of people."
 russia.2023.a: "We'll deal with them...."
 russia.2024.t: "Freedom Coalition"
 russia.2024.d: "Our enemies are not sleeping. Along with the left, the parliamentary and moderate opposition became more active. Liberals, \"conservatives\" and narodniks are all opportunists from the Duma and regional assemblies. They are the main beneficiaries of Medvedev's flawed reform system.\n\nHere they are, gathered together in a rich hall in Moscow to discuss and form an inter-parliamentary and \"public\" coalition against \"paternalism and autocracy.\" All the famous people were there, those whom Russia was used to seeing - Delyagin, Nechaev, Titov, even particularly ideological United Russia - such as this narrow-minded son of Patrushev. There were also lesser-known personalities who \"did not fit\" into the system of sovereign democracy, but still not forgotten: Nadezhdin, Kisiev, and even the gray-haired Yavlinsky trampled on the feast.\nBut Vladislav Davankov shone the most, his speech was saturated with liberal nonsense, his face was on almost all the posters and merchandise that they distributed, it immediately became clear who exactly they wanted to use as a liberal \"handsome boy\" for their Russophobic policies.\n\nAlthough their opposition will be a big problem for us at first, they have big disadvantages. If the left is ready to go underground, and some of its members are radical and ready for anything, the flock of Democratic liberals is absolutely without ideas, they are afraid, afraid of losing their petty-bourgeois paradise, they see that the Russia we want is not the Russia of a sluggish consumer who lazily goes to the polls from time to time to elect a talker.\nThey can bark loudly, but as soon as we give them enough pressure, they will start whining. Their leaders are no better, they are fighting for their mandates, parliamentary cars and a good life next to the state that supports them.\n\nUnfortunately for them, Alikhanov is already preparing a lesson for them. Inside the walls of the Kremlin at night, the President and his loyal derzhavnik lieutenants are preparing a new pantomime..."
 russia.2024.a: "Damn DemocRATS..."
 russia.2025.t: "Blood on the Pavement"
 russia.2025.d: "Vladislav Davankov, co-chairman of the New Russia party, moved stealthily through the dim alleys of Moscow. His coat billowed in the wind, and his black cap concealed his face. Each rustling leaf and stray noise sent a shiver down his spine. The city seemed to be suffocating under a pall of fear and oppression. The regime had instilled a climate of terror, silencing any voice that dared to advocate for democracy or constitutional order. Reports from the provinces were grim: beatings, disappearances, threats had become commonplace. The authorities acted with impunity, spreading chaos and violence. Leftist parties, once allies in the struggle against Alikhanov, now found themselves victims of brutality.\nDavankov read the news with a mix of horror and disbelief. How could Russia, which had once embraced liberalization, descend so swiftly into authoritarianism? Did the people truly yearn for democracy? Or were they content to be ruled by a tyrant? These questions gnawed at him as he traversed the desolate streets. His thoughts were interrupted by the sudden glare of headlights. A Jeep emerged from the shadows, blocking his path. Davankov froze, his heart pounding. He tried to back away, but a brutal blow to his back sent him crashing to the ground.\nHe fell to his knees and was then forcefully pushed face-first to the ground. The assault continued, his head spinning, flashes of light before his eyes. He struggled to see his attackers, but all he could make out were their yellow uniforms.\n\"We'll clear your filth form Russia!\" a gruff voice growled.\nThose words echoed in Davankov's mind as he felt the final, crushing blow to the head. Darkness consumed him.\n\nA week later, his body would be discovered on the outskirts of Moscow, beyond recognition."
 russia.2025.a: "He chose his destiny."
 russia.2026.t: "Assassination of Sergei Trunov"
 russia.2026.d: "Urgent news from St. Petersburg, Mr. President!\n\nThere was an explosion in the car this morning. As a result, Sergei Trunov, the leader of the local organization of Derzhavniks, and two of his guards were killed. The terrorist art occurred while driving, causing panic on the road and provoking several collisions.\nRosgvardiya and police officers quickly arrived at the scene, but they could not detain the terrorists, as the bomb was planted in advance.\nSoon, a video appeared on the Internet showing masked men claiming responsibility for the crime. They introduced themselves as members of the Liberation movement and declared their intention to fight for the freedom of St. Petersburg from the \"filth of Derzhavism.\"\n\nThis crime must not go unpunished. Our enemies have bared their teeth, and this is war. We, the powers that be, know what war is. They have to answer for this, Captain. Blood for blood.\nSergei Trunov was a man of will, he went through the entire Polish front with me, there can only be fewer such people.\n\nAlthough it may seem like there aren't many of them, the city is actually full of hidden enemies. Tough measures must be taken. St. Petersburg is a hotbed of democratic and socialist ideas. The city must understand that to be against Derzhavism is to go against the will of Russia.\n\nYour loyal colleague Yulia Nilova. Curator of the Information Department for the City of St. Petersburg."
 russia.2026.a: "To put St. Petersburg under a special control zone!"
 russia.2027.t: "Creation of the ZOV Battalion"
 russia.2027.d: "Today, with the participation of Russia's leader, Anton Alikhanov, the ZOV Battalion came into being. The concept of creating a paramilitary unit under his control emerged shortly after his ascension to power and garnered support from all factions within the ruling elite. However, the initiative for the battalion's formation came from the Flag Bearers, who proposed gathering the bravest and most resolute fighters into a single unit. Among its members are veterans from the Armed Forces of the Russian Federation and the Rosgvardiya, along with volunteers from various detachments, many of whom have military experience or ties to the Wagner PMC. These soldiers are deeply committed to their ideals, perhaps too much so.\nAfter the official formation ceremony, in the evening, the battalion members began performing rituals reminiscent of neo-pagan practices. They claim these rituals are necessary for cultivating warrior spirit and eradicating cowardice within each fighter. The commanders of the battalion appear to aim for complete subordination of their subordinates, stifling individuality. Some moderate and religious statesmen have raised concerns about these practices. However, Alikhanov and the Flag Bearers view the creation of such a unit as essential for addressing problems within the army and in Russia as a whole.\n\nThe official motto of the ZOV Battalion is: \"Glory to Russia – death to its enemies!\""
 russia.2027.a: "Those kinds of soldiers are necessary..."
 russia.2028.t: "Creation of the Bogovoiny Battalion"
 russia.2028.d: "Today, with the participation of Russia's leader, Anton Alikhanov, the Bogovoins Battalion came into being. The concept of creating a paramilitary unit under his control emerged shortly after his ascension to power and garnered support from all factions within the ruling elite. However, the initiative for the battalion's formation came from the Revivalists, who proposed gathering the bravest and most resolute fighters into a single unit. Among its members are veterans from the Armed Forces of the Russian Federation and the Rosgvardiya, along with volunteers from various detachments, many of whom have military experience or ties to the Russian Orthodox Army. These soldiers are deeply committed to their ideals, perhaps too much so.\n\nAfter the official formation ceremony, in the evening, the battalion members began performing rituals reminiscent mock orthodox battle prayers, all the ceremony was headed by their official commander-priest Archpriest Svyatogor. They claim that these are necessary for cultivating real orthodoxic spirit and eradicating cowardice within each fighter. The commanders of the battalion appear to aim for complete subordination of their subordinates, stifling individuality. Some yellow guard statesmen raised concernes about religion on the battlefiled and especially in derzhavnik-led unit. However, Alikhanov and the Revivalists view the creation of such a unit as essential for addressing problems within the army and in Russia as a whole.\n\nThe official motto of the Bogovoins Battalion is: \"Glory to God – Glory to all is holy to him!\""
 russia.2028.a: "Those kinds of soldiers are necessary..."
 russia.2029.t: "Guardia Amarilla"
 russia.2029.d: "En los últimos tiempos, ha surgido una nueva organización en nuestra nación, bajo el patrocinio del Partido Nacional Ruso. Conocida como el Movimiento Voluntario-Patriótico \"Guardia Amarilla\", este grupo ha ganado rápidamente atención por sus actividades. Sus esfuerzos incluyen asistir a los ciudadanos, colaborar con las fuerzas del orden, combatir la inmigración ilegal y mantener el orden público. Sin embargo, su enfoque más significativo es garantizar la seguridad en la región de Novorrusia. Se dedican a identificar agentes enemigos y monitorear segmentos descontentos de la sociedad.\n\nA pesar de sus objetivos loables, la \"Guardia Amarilla\" también tiene sus desventajas. Sus miembros a menudo están asociados con un nacionalismo ferviente y anticomunismo, lo que ha provocado tensiones con grupos de izquierda e incidentes de hostilidad hacia ciudadanos rusos de ascendencia no rusa.\n\nNo olvidemos que la \"Guardia Amarilla\" fue creada por Alijánov y su partido político. La publicidad positiva que rodea a sus \"valientes\" miembros parece estar impulsando la posición política de Alijánov, lo que podría socavar nuestros principios democráticos."
 russia.2029.a: "Bueno, al menos pueden ayudarnos..."
 russia.2029.b: "No debemos darles una oportunidad. Usemos los recursos administrativos."
 russia.2030.t: "Union Organizes Workers' Strike"
 russia.2030.d: "The Independent Union has initiated a strike at a state-run facility, demanding better wages and increased benefits, along with some political slogans. We can use this opportunity to address their economic concerns while disregarding their communist aspirations."
 russia.2030.a: "Break them up, and bring them back to factories."
 russia.2030.b: "Negotiate with them."
 russia.2030.c: "Just wait this out, they will get hungry sooner or later."
 russia.2031.t: "Leaflets Campaign Across Several Cities"
 russia.2031.d: "Anti-government leaflets have appeared in our cities. The police are investigating, but should we really worry about this outdated form of protest? We can publicize the arrest of these troublemakers."
 russia.2031.a: "Find the troublemakers, and make them pay."
 russia.2031.b: "Its just words, who reads those anyway?"
 russia.2032.t: "Left-Wing Demonstrations"
 russia.2032.d: "Left-Wing opposition and their allies have sparked protests in numerous towns and cities across Russia. The police are currently suppressing most of these demonstrations, but swift action is crucial to prevent a perception of weakness."
 russia.2032.a: "Use all force neccesary, we must not be weak."
 russia.2032.b: "Keep these contained and wait them out."
 russia.2033.t: "Democrats Run Media Campaign"
 russia.2033.d: "Democratic dissent has launched a fierce media offensive against our leadership and Alikhanov. Their message is spreading rapidly through unregulated social media and beyond. We must swiftly develop a strategy to counter their influence"
 russia.2033.a: "Begin our counter-campaign."
 russia.2033.b: "Start media blackouts."
 russia.2033.c: "Who cares about those internets?"
 russia.2034.t: "Military Officers Collusion With Democrats"
 russia.2034.d: "Reports have emerged suggesting military cooperation with low-ranking members of the democratic opposition. These reports claim that the military provides information to these members and spreads discontent within the ranks."
 russia.2034.a: "Start all out military purge in that area."
 russia.2034.b: "Fire all suspected traitors."
 russia.2035.t: "Democratic Demonstrations"
 russia.2035.d: "Democratic opposition and their allies have sparked protests in numerous towns and cities across Russia. The police are currently suppressing most of these demonstrations, but swift action is crucial to prevent a perception of weakness."
 russia.2035.a: "Use all force neccesary, we must not be weak."
 russia.2035.b: "Keep these contained and wait them out."
 russia.2036.t: "The Portrait"
 russia.2036.d: "The photo shoot was grueling, stretching over three hours. Alikhanov stood in his regal black uniform against the backdrop of austere decor. The images were destined for everything: posters, flyers, advertising, statues, busts, and other forms of visual propaganda. His face had to become an integral part of daily life, so everyone - from workers to officials - knew who led the state.\nLoyal photographers swarmed around Alikhanov, showering him with compliments for every pose and look. Their enthusiasm was almost religious. Only the \"free\" sculptor Berkalov maintained a cool detachment, offering honest criticism. He could point out a flaw in Alikhanov's expression or hand position without hesitation. Alikhanov took his comments in stride.\nA longstanding understanding had developed between them, if not friendship, then certainly mutual respect. One was a master of strategy and power; the other, an aficionado of art and human form.\nWhen the shoot concluded, Berkalov approached Alikhanov with two printed photographs, potential candidates for soon-to-be-hung portraits in government offices.\n\"Mr. President,\" Berkalov began with his characteristic sly grin, \"I have two masterpieces here. But they're entirely different in mood.\"\nHe placed the first photograph in front of Alikhanov.\n\"Here you're looking straight into the soul. This gaze pierces through. If this portrait hangs in offices, no bureaucrat will dare relax. It's a portrait of order and control.\"\nAlikhanov examined the photo carefully and nodded slowly. He turned to the second image.\n\"And this one?\" he asked with mild curiosity.\nBerkalov brightened, as if waiting for the question.\n\"This one... He paused dramatically before continuing with enthusiasm, \"Here you're the conqueror. Your gaze is directed into the distance, where your vision extends, unfulfilled. It's a portrait of ambition and a lofty goal.\"\nAlikhanov studied both images thoughtfully.\nBerkalov smiled slightly and added with a touch of mischief:\n\"Personally, I would...\" He paused, then shifted to a more serious tone. \"But like everything else in our country now, the choice is yours, Mr. President.\"\nfaint smile played on Alikhanov's face."
 russia.2036.a: "\"...Portrait of order and control.\""
 russia.2036.b: "\"...Portrait of ambition and a lofty goal.\""
 russia.2037.t: "Red Derzhavniks"
 russia.2037.d: "Some of our allies are unexpected. Leftist forces, mostly from Belarus, and several former narodniks, now united under the leadership of Grigory Azarenka, Lukashenko's former propagandist, are creating their own movement in support of Alikhanov - the \"Red Derzhavist Movement.\"\n\nAzarenok believes that Alikhanov will be able to build socialism in the country, despite the fact that we are not officially associated with this ideology. But even if these people don't fully understand our ideas and try to change them, we can use them to split off some of the leftists who are against us.\n\nIt's important to have as many allies as possible, even if they don't always share our views. The main thing is to keep them under control and use them to achieve your goals."
 russia.2037.a: "Sounds wise enough, we do need more allies."
 russia.2037.b: "They have their truth..."
 russia.2037.c: "Socialism? Shoot them."
 russia.2038.t: "The Return of the Russian Flag"
 russia.2038.d: "\"PRESIDENT ALIKHANOV HAS RETURNED THE RUSSIAN FLAG!\"\n\n\"OUR LEADER HAS DECIDED TO RETURN THE NATIONAL BANNER!\"\n\n\"THANK YOU, GOD SAVE ANTON ANDREEVICH!!! THANK YOU FOR BEING OURS!\"\n\nThis is just a small sample of what was written online after Anton Alikhanov signed a presidential decree on the new state symbols. Nothing much has changed, but now the Imperial, also known as the black-yellow-white flag, is becoming the state and \"national\" flag.\nNow it is this flag that will be in favor with the state and the \"loyal\" population, but the use of the usual tricolor is still allowed, at their own request, as well as for special events. In particular, the tricolor is becoming popular in the form of armbands, among statesmen and law enforcement officials who show their support, while not being a member of the Derzhavnikov party.\n\nThis action was perhaps the easiest in Alikhanov's policy. It's only going to get harder."
 russia.2038.a: "Three cheers for our great banner!"
 russia.2039.t: "United Russia's 'Hardliners' Quit Politics"
 russia.2039.d: "Recently, President Alikhanov has been bolstering various right-wing groups, creating a broad movement. This has had the unintended consequence of sidelining many hardline politicians within United Russia, who had previously co-opted nationalist rhetoric. As a result, some of these politicians have become invisible within their own party or have left politics altogether. Vyacheslav Volodin, often seen as the face of the more nationalistic faction, announced his retirement. His Duma seat will soon be taken by a Derzhavnik or an ally.\n\nMany similar cases have occurred across Russia. Speculative journalists even suggest that some were encouraged to step down so they could be replaced by more loyal Derzhavnik-aligned politicians.\n\nA few hardliners have chosen to moderate their views and join the mainstream of United Russia, adopting the party's commitment to \"sovereign democracy.\" This appears to be the end of the rebellious faction within UR, as they have been overshadowed by a more radical wave."
 russia.2039.a: "Good riddance."
 russia.2040.t: "Factions Inside Derzhavniks"
 russia.2040.d: "The Derzhavniks may appear as a unified front to outsiders, but internally, our movement is far from harmonious. While many remain devoted to the leader's vision, there are those who advise him on how to mold it. Though smaller factions with differing ideas exist, only two groups stand out as stark opposites: the Flag-Bearers and the Revivalists.\n\nThe Flag-Bearers believe that Russian identity is not a birthright but something earned through sacrifice and struggle. They see modernity and its values as weak and confined by societal norms. Their ideal is a society of warriors and hard workers. They view religion as a by-product of culture, focusing instead on historical, cultural, and spiritual elements of Russian identity. Their supporters are mainly found among the rank-and-file of the Yellow Guard and in newly annexed territories like Novorossiya and Belarussia. They also harbor ambitions for a united Slavic union under Russian leadership.\n\nIn contrast, the Revivalists are deeply religious and Orthodox. They seek a return to the traditional Orthodox way of life and the restoration of Russian Christian identity. Their brand of Orthodoxy is uncompromising, embracing a \"fire and sword\" approach to non-believers. They envision a militaristic role for the clergy and church, seeing them as the spiritual center of society. For them, the concept of the Third Rome must be strengthened through the blood of true believers and their enemies. If it does not exist, they believe it must be built on this foundation.\n\nFor Alikhanov, it would be wiser to subtly endorse their ideas without favoring one over the other. After all, he enjoys a loyal majority that will agree with him on most matters."
 russia.2040.a: "Let's see whose ideas are better..."
 russia.2050.t: "Uprising In Saint Petersburg!"
 russia.2050.d: "Recent errors have sparked an insurrection in Saint Petersburg, igniting a complex socio-political struggle. Dissatisfied citizens and radical communist groups have united, seeking to undermine the Russian government's legitimacy and operational effectiveness. This alliance threatens the nation's stability and unity.\n\nWhether our policy was too permissive or too stringent is now secondary. The urgent task is to decisively quell this rebellion, using all available resources and strategies.\n\nRegrettably, our military, including soldiers and officers, has shown reluctance to engage. They prefer to remain within their barracks, waiting for the crisis to subside. This passive stance requires deploying loyal divisions of the Yellow Guard and other dedicated military units to fill the gap left by their inaction.\nIn Saint Petersburg, rebels have formed their own paramilitary forces. They are strategically positioned to launch an offensive, potentially seizing control of Moscow."
 russia.2050.a: "We must stop them at all cost!"
 russia.2051.t: "Communists Attack Novgorod!"
 russia.2051.d: "Communist militias have launched an attack on the Novgorod region, taking local authorities by surprise. We are now relying on loyal troops within the region to defend it.\nWe must develop a strategy that will yield the best possible outcome on the battlefield. If we fail, Novgorod could serve as a gateway to Moscow, making it much harder to stop their advance."
 russia.2051.a: "We must launch a counterattack against these ragtag militia. They won't stand a chance!"
 russia.2051.b: "Their forces are numerous but weak. We must improve our defense of the region."
 russia.2052.t: "Failure of the Operation"
 russia.2052.d: "Despite our best efforts, their overwhelming army, though ill-equipped, managed to defeat the hastily assembled defensive force we had quickly organized in the region. Novgorod now lies within Red's territory, and they are already recruiting local sympathizers. Their commanders are preparing to launch an even deeper attack."
 russia.2052.a: "Blyat!"
 russia.2053.t: "Success of the Operation"
 russia.2053.d: "Our counterattack succeeded! Although we suffered losses, the Reds were clearly unprepared for such a fierce onslaught so early on. We caught them off guard. Novgorod is secured!\nNow more isolated than ever within their small city commune, they are ripe for defeat. We'll crush them swiftly, even if it means making sacrifices."
 russia.2053.a: "Very good!"
 russia.2054.t: "Reds Attack Tver!"
 russia.2054.d: "Our situation is deteriorating by the hour, dear leader. The Communists are now targeting the Tver region, which is even less prepared to withstand an attack. There are fewer men on the front lines now than ever before.\nWe can devise a strategy, but it's like trying to hit a moving target in the dark. There's no way to predict how this situation will unfold."
 russia.2054.a: "Regroup all remaining forces and attack them at once, blyat!"
 russia.2054.b: "Ebana v rot, defend it no matter the cost, shoot those who desert if you want!"
 russia.2055.t: "End of Derzhavnik Tyranny"
 russia.2055.d: "With each failure and the turmoil caused by the uprising, Alikhanov's support dwindled, even among his own men. After a brutal massacre of Derzhavnik forces, Moscow itself erupted in revolt. With no central authority and outnumbered police, the protesters broke free from martial law and invited Red militias into the city.\nLike heroes from the past, Communists and their allies wrested control of the country from the oppressors, returning it to the people. They had already cleared the Duma and Kremlin of their previous occupants.\n\nThe whereabouts of the Derzhavnik top cabinet remain unknown, and Alikhanov himself seems to have disappeared. A nationwide manhunt has been launched, but now the Derzhavniks are leaderless and demoralized by their failure.\n\nThe army, choosing to wait, made a wise decision. They swore loyalty to the new national government, led by the Rugtug left-wing coalition.\n\nRussia now prepares for its new socialist era, though the details must be decided quickly."
 russia.2055.a: "Glory to the working class!"
 russia.2056.t: "End of Communist Rebellion"
 russia.2056.d: "The success of previous operations, regardless of their brutality, began to reveal cracks in the weak communist leadership in Saint Petersburg. As they argued over strategy, our spies and loyalists inside the city gathered crucial intelligence on the positions of their dwindling forces.\n\nOn this day, a massive assault commenced with drones, artillery, and naval forces. The city of rebels was obliterated, and their remaining battle-ready troops were annihilated.\n\nYellow Guard units now moved through the streets, mopping up any lingering resistance. The leaders scattered, some fleeing like cowards, while others were captured and faced severe consequences, likely including the death penalty. Such was the fate of traitors.\n\nAlikhanov delivered a speech declaring an end to the terrorist menace. He blamed the lenient policies of the people-loving Derzhavnik government but emphasized that such mistakes would not be repeated. He announced a major cleanup operation and vowed that Russia would no longer tolerate traitors."
 russia.2056.a: "Glory to Russia!"
 russia.2057.t: "Military Mutiny In Kuban!"
 russia.2057.d: "The disloyal military has openly rebelled against us! They've gathered their main force in the Kuban region, where all the disloyal soldiers and officers have fled. They've allied themselves with detestable democrats and their cronies.\n\nHowever, the majority of the army has yet to respond to either side's call to arms. Therefore, we must muster the forces under our direct control.\n\nUndoubtedly, they are planning an operation to seize Moscow with their formidable spearhead. We must thwart their plans at any cost!"
 russia.2057.a: "We must stop them at all cost!"
 russia.2059.t: "Pro-Coup Protests!"
 russia.2059.d: "The news of open rebellion must have thrilled our enemies. Rat-like democrats and liberals poured into the streets of many cities, openly siding with current traitors. While the police and other forces are currently handling the situation, these ill-prepared youths still manage to distract parts of our troops from the real threat posed by traitorous generals and their liberal backers."
 russia.2059.a: "Crush them at once!"
 russia.2060.t: "Information Leak"
 russia.2060.d: "Our spies within their territory have uncovered a military plan for a bold and unprecedented attack. They intend to send convoy after convoy towards Moscow, exploiting our currently paralyzed system due to riots.\n\nHowever, our spymasters believe they have a solution. These soldiers, though loyal to their command, don't seek much. We can pay them off through these operations and sabotage their plans. Alternatively, we can contact the undecided military and offer them generous rewards to align with us."
 russia.2060.a: "It will hurt financially, but our reign will be secured."
 russia.2060.b: "To hell with them! We must mount a resolute defense with every resource at our disposal."
 russia.2060.c: "To hell with them! Strike when they least expect it, all hands on deck!"
 russia.2061.t: "Failure of the Operation"
 russia.2061.d: "We have fallen short of our goal. Their forces are overwhelming and fiercely loyal. They cleverly exploited our own internal problems to their advantage. In some cities, they even found a welcome among the people.\nTheir convoys are advancing deeper into Russia, heading toward Moscow. We have very little time to develop an effective defense strategy."
 russia.2061.a: "Blya..."
 russia.2062.t: "Success of the Operation"
 russia.2062.d: "Our strategy has succeeded! The enemies are disarrayed by our lack of support and our military actions.\n\nInside Kuban, the remnants of resistance are virtually defenseless, possessing few resources and allies. Now, we can swiftly defeat them. We will drive them into the Black Sea, letting them swim with the fishes."
 russia.2062.a: "Amazing!"
 russia.2063.t: "End of the Putschists"
 russia.2063.d: "The success of previous military operations, regardless of their ruthlessness, was significant. We have quelled the uprising. Our decisive actions and superior battlefield tactics have driven the rebels from Kuban. Numerous democrats who had set their sights on victory are now in our possession. Their time is limited. The military generals who participated in the uprising refused to surrender and were dealt with accordingly, as is the fate of traitors.\n\nAlikhanov delivered a speech declaring an end to the terrorist menace. He blamed the lenient policies of the people-loving Derzhavnik government but emphasized that such mistakes would not be repeated. He announced a major cleanup operation and vowed that Russia would no longer tolerate traitors."
 russia.2063.a: "Glory to Russia!"
 russia.2064.t: "End of Derzhavnik Tyranny"
 russia.2064.d: "Each failure and the turmoil from the uprising sapped Alikhanov's support, even among his loyal followers. After a brutal massacre, Moscow itself erupted in revolt. With no central authority and overwhelmed police, protesters broke free from martial law and called in military forces.\nLike legendary figures of the past, the army generals, democratic opposition, and their allies wrested control from the oppressors, returning power to the people. They had already cleared the Duma and Kremlin of their occupants.\n\nThe whereabouts of the top Derzhavnik officials remain unknown, and Alikhanov himself seems to have vanished. A nationwide manhunt is underway, but the Derzhavniks now face a leaderless, demoralized future.\n\nThe army's decision to wait proved wise. They pledged loyalty to the new national government, led by the Rugtug democratic coalition.\n\nRussia is poised on the threshold of a new democratic epoch. The specifics, however, remain to be clarified."
 russia.2064.a: "Glory to Democracy!"
 russia.2100.t: "The Fydorov Coup"
 russia.2100.d: ""
 russia.2100.a: "The end of the liberast hope."
 russia.2101.t: "The Leningrad Committee"
 russia.2101.d: "Recent errors have sparked an insurrection in Saint Petersburg, igniting a complex socio-political struggle. Dissatisfied citizens and radical communist groups have united, seeking to undermine the Russian government's legitimacy and operational effectiveness. This alliance threatens the nation's stability and unity.\n\nHowever, we face an unusual situation. Most of the left-wing opposition has chosen to support the Democrats. In Saint Petersburg, the radical Stalinist faction has taken control, led by notorious Stalin apologists. Losing to such individuals would be an embarrassment of epic proportions!\n\nRegrettably, our military, including soldiers and officers, has shown reluctance to engage. They prefer to remain within their barracks, waiting for the crisis to subside. This passive stance requires deploying loyal divisions of the Yellow Guard and other dedicated military units to fill the gap left by their inaction.\nIn Saint Petersburg, rebels have formed their own paramilitary forces. They are strategically positioned to launch an offensive, potentially seizing control of Moscow."
 russia.2101.a: "All hands on deck, we must stop those tyrant-loving fossils!"
 russia.2103.t: "Grip on the News"
 russia.2103.d: "We've noticed that tighter control over media, especially state channels, is necessary. They should be reorganized to better align with our goals.\nHowever, many of these channels still aren't fully under our influence. We need to determine how to manage them and what guidelines to apply."
 russia.2103.a: "There should more focus on military and war related media."
 russia.2103.b: "Just keep the grip on the official news networks."
 russia.2103.c: "We should fund christian media and expand religion on the TV."
 russia.2104.t: "Derzhavnik Woman Organization"
 russia.2104.d: "Our organization is deeply committed to feminism. Through various affiliated groups, we empower Russians to fully participate in political life. Now, we must determine the future path of our women's organization. Specifically, we need to decide on our approach to advocating within spaces predominantly populated by women."
 russia.2104.a: "Our woman should become battle sisters for our soldiers and men!"
 russia.2104.b: "Make it be focused volunteer and cultural work."
 russia.2104.c: "This organization should promote orthodoxy inside family and women's life."
 russia.2105.t: "Derzhavnik State Trade Union"
 russia.2105.d: "Workers are the heart and soul of Russia, and we must guide them through trusted organizations. Among these, the state union stands out as the largest and most promising.\nHowever, we need to shape its image and articulate the ideological principles it will uphold for the public and the workers who join it."
 russia.2105.b: "It should be focused on general loyalty and free holidays for workers that join it."
 russia.2105.c: "This organisation must be organized in virtues of piety and obedience."
 russia.2106.t: "New Youth Organiztion"
 russia.2106.d: "Russia already had numerous youth-focused organizations, but they were disorganized and too small to meet the needs of our new state. Therefore, we should concentrate on uniting them into a single, cohesive organization directly linked to SZND.\nWe must consider what this organization will impart to young minds and what values we will instill within them."
 russia.2105.a: "The greater focused must be placed on military industrial workers and their benefits."
 russia.2106.b: "Kids must know the virtues and biblical studies, and know that Russia is the holiest land."
 russia.2107.t: "Nominal Restoration of the Monarchy?"
 russia.2107.d: "Certain derzhavniks, primarily those from various organizations, have sent a letter to our esteemed leader, urging him to endorse the restoration of the monarchy. They argue that it is Russia's most natural form of governance, which not only benefits the Russian people but also strengthens control over nationalist groups and monarchists.\n\nMany pretenders have been overlooked, but Gavril Doroshin was chosen as the best candidate due to his experience and alignment with Alikhanov's vision. However, the risks are significant. Even if Doroshin is merely a figurehead, sharing the leadership with an official tsar would diminish the impact of our great leader."
 russia.2107.a: "Not a bad idea! We do need more support from the monarchists."
 russia.2107.b: "There can be no one above our Leader. Loyalty him is paramount."
 russia.2108.t: "Azarenok Coup"
 russia.2108.d: "It was a peaceful night. Alikhanov rested at his dacha near beloved Kaliningrad, watched over by loyal guards. This tranquility ended abruptly when an unknown force opened fire on the outer security. The dacha became a fortress under Alikhanov's command.\n\nCut off from the world by radio jammers, Alikhanov quickly identified the culprit: Azarenok. This cowardly figure had been gaining influence rapidly, drawing more and more people into his red-derzhavist ideology.\n\nOn the other side, Azarenok stood with his men near the battleground. His plan was simple: kill Alikhanov and everyone present, then frame it as an attack by desperate opposition from the outside. He aims to use this leverage to seize control of SZND and declare himself Alikhanov's closest ally, continuing his doctrine.\n\nThe fate of Derzhavism hangs on this battle between guards and conspirators, each fighting for their masters..."
 russia.2108.a: "Azarenok's co-conspirators overpower Alikhanov's personal guards!"
 russia.2109.t: "New Derzhavnik Regime"
 russia.2109.t2: "The New Red Tsar"
 russia.2109.d: "The new leader's televised address resonated throughout the nation.\n\nWith the regime firmly established, Azarenok confidently announced that the killers of Alikhanov would be brought to justice. Russia's unity under this new leadership seemed driven by a singular purpose: revenge.\n\nMeanwhile, loyalists of the true Alikhanov were discreetly removed from positions of power. The vision of Derzhavnik Socialism was now being propagated across all branches of the SZND.\n\nNews outlets around the world were already labeling this event the palace coup of the 21st century, casting doubt on Azarenok's assertions."
 russia.2109.d2: "The new leader's televised address resonated throughout the nation.\n\nWith the regime firmly established, Azarenok confidently announced that the killers of Alikhanov would be brought to justice. Russia's unity under this new leadership seemed driven by a singular purpose: revenge.\n\nMeanwhile, those loyal to the original Alikhanov were quietly removed from positions of authority. The Tsar, too, was discreetly disposed of, formal abdication signed, replaced by a very eccentric and melancholic descendant of Josef Stalin. Initially reluctant, he was eventually 'persuaded' to take up the role.\n\nNews outlets around the world were already labeling this event the palace coup of the 21st century, casting doubt on Azarenok's assertions."
 russia.2109.a: "Long Live the New Leader!"
 russia.2110.t: "Alexei Navalny Sworn In"
 russia.2110.d: "After the successful neutralization of the existential threat to state sovereignty, the Russian political elite faced the need to identify a new head of state. In this context, it should be noted that the return to the political arena of a figure previously known to the general public has become a landmark event. This individual, known as Alexei Navalny, not only changed his political views, but was also forced to go underground as a result of persecution by the Alikhanov authorities.\n\nIn the context of temporary political instability caused by the elimination of the threat of derzhavism, the government, despite its lack of organizational effectiveness, decided to temporarily appoint Navalny to the post of president of the country until the upcoming elections. This step was taken in order to ensure the legitimacy and stability of the transition period.\n\nHowever, Navalny, having shown political foresight, refused to participate in the upcoming elections, arguing that Russia needs an influx of new, unbiased personnel. In his opinion, active participation in the election campaign could lead to the consolidation of the electorate around his person, which, in turn, could negatively affect the process of democratic transit."
 russia.2110.a: "Democracy restored, at last..."
 russia.2111.t: "End of Dissent"
 russia.2111.d: "As dawn breaks over Russia's vast landscape, the people, known for their defiance, awaken without the urge to criticize their government or state. Due to the efforts of thousands of loyal citizens and yellow guard troops, the state machine kept growing and growing. All democratic and left-wing opposition organizations have been destroyed and majority of their members arrested.\n\nRussia now enters a new era where every citizen is devoted to the state and seeks no individuality. \n\nHistory will not be kind to those who opposed or fought against Russia's legitimate leadership. They will be erased from memory, though some will be labeled traitors in history books penned by victors, who, in their desperation, sought to undermine their homeland's destiny. Forever marked by dark pens, their feeble calls for false freedom will go unheard. Some of them will die in the mines or prison camps, the others will never leave confine of the police basements alive.\n\nWeak remaining voices are drowned by the cacophony of Derzhavist slogans and military marches.\n\nThe people of Russia are now of a single mind: no doubts, no reluctance, no unnecessary questions.\nIsn't that happiness?"
 russia.2111.a: "Blessed be relief from freedom; lest ye feel the need for treason."
 russia.2112.t: "New Tommorow"
 russia.2112.d: "Thanks to the joint efforts of the Russian people and the coordinated action of the resistance, and Alikhanov's tyranny was overthrown. Derzhavniks and their loyalists, left without their leader, have scattered to God-forsaken places like rats from a sinking ship, they are disorganized and pose only a small danger.\n\nThousands of people took to the streets to celebrate this moment with Russian flags, especially in St. Petersburg. Some rallies have not stopped until now.\n\nAnd, although it will take some time to dispose of the enormous bureaucratic machine with thousands of ministries, still, citizens can now sleep peacefully at night. The first decrees and promises of the new government are about freedom of speech and democratic laws, as well as the lustration of regime officials. Every bureaucrat who abused their position will be soon locked up in the jail cells previously occupied by political prisoners.\n\nHope may be just beginning to return to the souls of the Russian people, but we can already say that a new tomorrow will come soon, and it will show exactly where Russia will go.\n\nAlthough the revolution took many honest lives as well, one can't make an omelet without breaking a few eggs, right?"
 russia.2112.a: "I have a dream..."
 russia.2113.t: "The People's Congress"
 russia.2113.d: "With the new government firmly in place, Sergei Udaltsov announced the beginning of what would come to be known as the People's Congress, where the future of Russia's socialist transformation would be decided.\n\nAs delegates settled into their seats, two distinct factions emerged in the debate. On one side stood Sergei Udaltsov, alongside orthodox socialists and communists who advocated for a return to traditional socialist ideals. Opposing them was the trade unionist faction, led by the Confederacy of Labour, which proposed a new form of socialism centered on trade unions-an idea that had only been tested in a few experiments.\n\nWhile Udaltsov remained the more popular choice, the moment of truth was fast approaching. Only time would reveal which path destiny would favor."
 russia.2113.a: "Udaltsov Is Elected Chairman of the People's Congress!"
 russia.2113.b: "Kravchenko Is Elected Chairman of the People's Congress!"
 russia.2114.t: "New Youth Movement"
 russia.2114.d: "In our state's increasingly complex regulatory environment, a critical question arises: how can we nurture politically engaged youth within the current governance structure?\n\nOne possibility is to revive and integrate Soviet-era organizations like the Komsomol and Pioneers into a modern context. By doing so, we could harness historical precedents and existing structures to encourage civic participation and political literacy among young people. Alternatively, we might adopt a more radical, anti-statist approach, resurrecting the \"Vanguard of the Red Youth.\" Unlike many other communist groups, this organization operated unofficially and without taint, emphasizing youth autonomy and activism. By following this path, we would tap into a historical legacy that champions unmediated political engagement, providing a platform for young voices to be heard."
 russia.2114.a: "New Komsomol!"
 russia.2114.b: "The kids must be ready for the revolution, not boring bureaucratic work."
 russia.2115.t: "Elections!"
 russia.2115.d: "After enduring many tedious days of waiting for the elections, campaigning, and rallies, the time for Russians to decide the future has come! We stand the dawn of the new era, our people will vote to elect new president for mother Russia, let us hope for their prudence and faith...\n\nWith all votes tallied, the victor is..."
 russia.2115.a: "Conservative Candidate!"
 russia.2115.b: "Liberal Candidate!"
 russia.2115.c: "Socialist Candidate!"
 russia.2115.f: "Patriot Candidate!"
 russia.2115.g: "Nationalist Candidate?!"
 russia.2115.z: "Communist Candidate?!"
 russia.2116.t: "Party of the Proletariat"
 russia.2116.d: "As we reconstruct the Soviet system, one of its fundamental elements will be the party. Due to a shortage of experienced bureaucrats at present, we must decide where to find fresh blood and leaders for our new system.\nThere are three potential options to consider:\n1. The old Stalinist RCWP-CPSU and their hardliners can assist in restoring order and stability to our regime. They also uphold Soviet patriotism and anti-revisionist views.\n\n2. The RWP, formerly a Trotskyist organization, has a substantial youth base and encompasses many socialists and communists. They can contribute to the vitality of our revolutionary state.\n\n3. A multitude of smaller communist groups with a general Leninist approach to governance and history. We can utilize them as a middle ground to avoid extreme positions."
 russia.2116.a: "Fill our ranks with Stalinists."
 russia.2116.b: "Fill our ranks with Informal Socialists."
 russia.2116.c: "Unite all general communists parties into our system."
 russia.2117.t: "Moderate Leftists Unify"
 russia.2117.d: "As our nation's political scene revives, moderate left forces are coalescing into a single party. This new formation encompasses a range of past elements, including A Just Russia, moderate members of the Communist Party of the Russian Federation, People's Russia, and various other minor social-democratic groups\n\nAt its founding congress, the party's political and economic platform was established, along with a critical decision: its name."
 russia.2117.a: "All-Russian Socialist Labour Party."
 russia.2117.b: "Socialist-Democratic Union."
 russia.2117.c: "Social-Democratic People's Party."
 russia.2118.t: "Conservative Forces Unite"
 russia.2118.d: "Our nation is recovering from the wounds of its radical ultranationalist history. Moderate conservative forces have united to create a new political entity.\nAt their party congress, they discussed social and political issues. They also chose a name for their political organization."
 russia.2118.a: "All-Russian Patriotic Party."
 russia.2118.b: "National Course."
 russia.2118.c: "National Unity Party."
 russia.2119.t: "Liberals United"
 russia.2119.d: "A cohesive liberal faction has crystallized within the political milieu, bolstered by the endorsement of eminent liberal figures and organizations. This consolidation was formally inaugurated at a foundational congress, attended by a diverse cohort of politicians spanning various generational strata. During this assembly, the faction meticulously delineated their political agenda and unanimously selected their nomenclature, thereby formally articulating their political identity and objectives."
 russia.2119.a: "Civic Platfrom."
 russia.2119.b: "Democratic Centre."
 russia.2119.c: "Russian Democratic Party."
 russia.2120.t: "Patriots Unite Their Forces"
 russia.2120.d: "Hardline patriots and ultraconservatives, predominantly hailing from the reactionary faction of the older United Russia wing, as well as staunch supporters of the Putin era's strongman policies, have coalesced into a formidable political bloc. During their conclave, where they meticulously deliberated on strategies to maintain their relevance, they also bestowed upon their organization a nomenclature that resonates with their ideological tenets."
 russia.2120.a: "Assembly for Russian Unification."
 russia.2120.b: "Fatherland."
 russia.2120.c: "Sovereign Democratic Party."
 russia.2121.t: "¡Nacionalistas, pero no de esta clase!"
 russia.2121.d: "A pesar de la toma ultranacionalista de nuestra nación, muchos nacionalistas estaban en desacuerdo con los derzhavniks y Alijánov. Belov-Pótkin, antes un nacionalista menos conocido, se convirtió en una voz prominente entre aquellos que se oponían a Alijánov y sentían que sus visiones estaban excluidas de la SZND.\nAhora, oportunistamente, se ha alineado con la oposición democrática. Reuniendo un equipo, está formando una organización política para continuar la política nacionalista en la Rusia post-Alijánov.\nLas discusiones típicas incluían el futuro nombre de la organización..."
 russia.2121.a: "Unión para la Lucha contra el Bolchevismo."
 russia.2121.b: "Movimiento Imperial Panruso."
 russia.2121.c: "Partido Nacional de la Federación de Rusia."
 russia.2122.t: "Red Wave"
 russia.2122.d: "Communists in Russia always find a way back into the political scene, no matter what. This time, Sergei Malenkovich is trying to bring together communist forces, similar to the Red Russia Coalition before Alikhanov took over.\nMalenkovich gathered his group and presented their program, outlining their communist and populist platform.\nThey've chosen a name..."
 russia.2122.a: "Communists of Russia."
 russia.2122.b: "Union of Communists."
 russia.2122.c: "Stalinist Bloc."
 SOV_restarting_state_bureaucracy: "Restart State Bureaucracy"
 SOV_restarting_state_bureaucracy_desc: "We inherited from the previous government a state structure poorly adapted for building a socialist republic. Inefficiency, stagnancy and formlessness are not the qualities that we want to see in the public administration system.\nTherefore, the Communist Party of the RSFSR will assume responsibility for the implementation of reforms. In the near future, a program of transformations will be implemented in order to create a flexible apparatus that will serve the interests of the people, and not itself."
 SOV_first_convocation: "Primera convocación"
 SOV_first_convocation_desc: "Las elecciones al nuevo Parlamento soviético son un paso que determinará el futuro del país. Los preparativos para la primera convocatoria ya han comenzado, y el Partido promete que estas elecciones serán libres y justas. El pueblo mismo elegirá a sus representantes, y serán ellos quienes representarán la voz del nuevo orden socialista. ¡Muy pronto la Rusia soviética tendrá un parlamento que defenderá los intereses de los trabajadores!"
 SOV_interparty_dialog: "Inter-Party Dialog"
 SOV_interparty_dialog_desc: "Although the Communist Party is the leading political force in the country, a number of legal parties and associations also enjoy popular support. Openly antagonizing them would be a mistake - it only undermines our credibility in the eyes of society. It would be much more reasonable to try to establish cooperation in order to reduce tensions and unite the country to solve common problems."
 SOV_reform_of_security_forces: "Reform of Security Forces"
 SOV_reform_of_security_forces_desc: "The current structure of Russia's state security is nothing more than a relic of the past. Not the most successful reforms, chronic underfunding and personnel starvation have brought the law enforcement agencies into a bad state.\nIn the context of growing internal resistance, it is vital for us to carry out extensive reform of security agencies. It is necessary not only to restore them to their former glory, but to create a modern, effective system capable of protecting the interests of the country and citizens."
 SOV_bastion_of_antifascism: "Bastion of Antifascism"
 SOV_bastion_of_antifascism_desc: "We will not allow the fascist spawn to gain a foothold in our country in this difficult hour. Let everyone know that we have fought, are fighting, and will fight against anyone who dares to support these misanthropic ideas. This plague will be uprooted from the very root so that the people can continue to live in peace and harmony.\nFascism shall not pass!"
 SOV_agitprop: "Agitprop"
 SOV_agitprop_desc: "Agitprop, or, more accurately, agitation and propaganda, emerged with the Soviet Union and throughout its history has sustained citizens' confidence in the future.\nToday, when we need to prove to the people the validity of our course, we launch large-scale propaganda campaigns—both on the streets and online. We must clearly and concisely demonstrate our goals and values, explaining to the people the future we are leading the country toward and why our path is the only right one."
 SOV_party_vanguard: "Party Vanguard"
 SOV_party_vanguard_desc: "The role of the party in the life of the country is much more significant than it might seem at first glance. It is the party that sets the right ideological course, serves as a national guide and is a symbol of the progress of the state.\nThe party acts exclusively for the country and for the people - there is no other meaning in its work. Her strength lies in her unity with the people, in her ability to hear their requests and transform them into concrete solutions."
 SOV_strengthening_party_discipline: "Strengthen Party Discipline"
 SOV_strengthening_party_discipline_desc: "After the establishment of the Communist Party's power, we will have to strengthen unity and develop a program line. Every party member should understand and share our common goals. Now is not the time for internal disagreements, especially at a time when we continue to consolidate our forces. We need discipline to bring our ideas to the people and move forward together."
 SOV_great_reconciliation: "Great Reconciliation"
 SOV_great_reconciliation_desc: "Although we do not question Stalin's historical authority, some of the mistakes of that period must be acknowledged. We are talking about unfair repressions against many distinguished Bolsheviks, whose vision of the development of the Union differed only slightly from Stalin's.\nWe must pay tribute not only to politicians close to Stalin, but also to those who had their own position and made a significant contribution to the development of the country. Our history is multifaceted, and we can learn from both victories and tragic mistakes."
 SOV_reestablishing_higher_party_school: "Reestablish Higher Party School"
 SOV_reestablishing_higher_party_school_desc: "At one time, the Soviet Higher Party School trained thousands of talented cadres for the CPSU and media workers. Its graduates worked in every field and in every region, which strengthened ideological unity and effective management.\nToday, as we continue to revive many Soviet practices, it is necessary to restore this system of personnel training. Such an organization should not only provide the state apparatus with personnel, but also educate truly skilled managers dedicated to the cause of socialism."
 SOV_xix_party_congress: "Hold the Party Congress"
 SOV_xix_party_congress_desc: "El Partido Comunista ha estado en el poder durante bastante tiempo, y se han dado todos los primeros pasos necesarios. Ahora que nuestra posición finalmente se ha fortalecido, es hora de celebrar un congreso y determinar el rumbo futuro. Tenemos que cumplir objetivos clave: resolver la cuestión del liderazgo que llevará al partido adelante y aprobar un programa de acción claro para los próximos años."
 SOV_continue_party_rejuvenation: "Continue Party Rejuvenation"
 SOV_continue_party_rejuvenation_desc: "Rejuvenation of the Party is the guarantee of its future! Young cadres full of enthusiasm and determination will give a new breath to the CPRF. We must continue this process, attracting more and more young Communists to the leadership, who will be ready to lead the country into the future without abandoning the ideals of socialism."
 SOV_new_lenin_enrollment: "New Lenin Enrolment"
 SOV_new_lenin_enrollment_desc: "Like a hundred years ago, the Party needs a new generation of committed people ready to devote themselves to building socialism. We are launching a new call, inspired by Leninist traditions, to attract young and active citizens to our ranks. This is a chance for everyone to participate in a great cause."
 SOV_voice_of_the_streets: "Voice of the Streets"
 SOV_voice_of_the_streets_desc: "The Communist Party of the RSFSR, like any party, has two sides: the party apparatus and the activists. For a long time, cabinet heads were the main force in the party, leaving in the shadow those who, through their work, made the lives of citizens better and at the same time fought injustice in the Russian system through rallies and other forms of protest.\nBut that time is gone. Rashkin became Chairman of the Central Committee, and now the activists are becoming stars in the nomenklatura firmament, replacing the old, decrepit cadres.\nValery Rashkin is the voice of those who are making our homeland a better place right now!"
 SOV_shakeup_of_the_state: "Shake up the Bureaucrats"
 SOV_shakeup_of_the_state_desc: "Our bureaucracy is full of old, inefficient apparatchiks. Instead of helping the people, they settled into their offices and rest on the laurels of the victory of communism, while doing nothing for it.\nComrade Rashkin will purge the party and the state of scoundrels! Make way for young, energetic Leninists!"
 SOV_symbol_of_change: "Symbol of Change"
 SOV_symbol_of_change_desc: "During Putin's time, Valery Rashkin was known for his extreme opposition to power, even by the standards of the Communist Party of the Russian Federation. Rashkin's lists, the deputy's inquiry into the FBK investigation of Medvedev - all this and more shows his commitment to the ideas of freedom.\nAs the classic sang: \"Our hearts demand changes\" - Russia has a chance to change for the better as it has not done in more than 30 years. Russia needs changes - and Rashkin and his team are only too happy to serve it!"
 SOV_party_mobilization: "Party Mobilization"
 SOV_party_mobilization_desc: "Many inside our country believe that \"the Communist Party is a haven for grandfathers and old women nostalgic for the USSR.\" And although this opinion is not unfounded, it is necessary to fight this reputation of the \"party of pensioners\".\nFull-fledged Komsomol members will take their rightful place at the helm of the new government, as in the Lenin years they will take over the levers of control. Let's go, young builders of communism!"
 SOV_rally_the_people: "Rally the People"
 SOV_rally_the_people_desc: "Our country is on the verge of a major conflict, the largest since the Great Patriotic War. In such difficult times, the entire multinational people of our country need to unite in order to withstand the coming storm. From young to old, rich and poor, workers and office workers - we must be united! Under the Lenin banner, in the name of our past and future, millions of shoulders will press against each other!"
 SOV_rightful_heir: "The Rightful Heir"
 SOV_rightful_heir_desc: "The position of Rashkin and his team within the party is currently quite precarious. The opposition from the more \"Apparatus\" wing of the Communist Party of the RSFSR undermines the unity of the party, which does not benefit the legitimacy of our government.\nIt is necessary to remind everyone that Rashkin was legitimately elected on the ballot, and go to... some compromises with our comrades. Unity is above all!"
 SOV_back_to_revolutionary_roots: "Back to Revolutionary Roots"
 SOV_back_to_revolutionary_roots_desc: "The October Revolution was the result of the actions of a single Bolshevik party, led by the leader of the proletariat, Vladimir Ilyich Lenin, subordinated to the general line of the party. It is precisely in party discipline that the success of Red October lies.\nRight now, we lack this very discipline: various internecine strife and conspiracies are being waged within the party in order to undermine Rashkin's position. Denis Parfenov, with his uncompromising commitment to the socialist struggle, can help strengthen the party structure and restore the lost spirit of revolutionism!"
 SOV_pragmatic_approach: "Pragmatic Approach"
 SOV_pragmatic_approach_desc: "There are many ideas within Rashkin's team: to deviate towards democratization or towards party discipline and orthodoxy - but the current, quite pragmatic course of development of the Soviet state is not something terrible. On the contrary, he leaves us plenty of room for maneuver within the party and state apparatus.\nPeople crave stability and prosperity, and why not use Sergey Levchenko's experience to strengthen our development?"
 SOV_reinvent_democracy: "Reinvent Democracy"
 SOV_reinvent_democracy_desc: "The Soviet experiment began very beautifully: \"all power to the Soviets!\", promises of people's power, Lenin proclaiming a new, truly people's power. But, unfortunately, after Ilyich's death, Stalin took power into his own hands, and then the party nomenklatura, divorced from the masses of the people. In the end, this misunderstanding of the changing situation in the country led to the fact that when Gorbachev came to power, it was already too late.\nDemocratic ideas are directly sewn into the very fabric of socialism, and it would be wise to strengthen the democratization of the Soviets. Boris Yulievich Kagarlitsky is an excellent candidate for the role of a think tank for the transformation of our system!"
 SOV_window_to_europe: "Window to Europe"
 SOV_window_to_europe_desc: "Great ideas know no borders and our window to Europe is opening again! The workers and communist parties of Eastern Europe look to us with hope. It is time to revive forgotten ties, to unite the peoples against NATO aggression! Together we are ready for any challenge, together we will crush the imperialists!"
 SOV_new_union_of_russia_and_belarus: "New Union of Russia and Belarus"
 SOV_new_union_of_russia_and_belarus_desc: "The union of Russia and Belarus is becoming a reality. This step is not just symbolic - it is a real movement towards the restoration of a great country. The unification of the two peoples under a single flag of the RSFSR is an important stage on the way to the revival of Soviet unity and power."
 SOV_tbilisi_declaration: "Tbilisi Declaration"
 SOV_tbilisi_declaration_desc: "We must expand our influence in the Transcaucasian countries. If they do not agree to join the USSR voluntarily, we will use our military might to achieve this."
 SOV_tashkent_agreement: "Tashkent Agreements"
 SOV_tashkent_agreement_desc: "We will invite the Central Asian countries back into our union, and we will welcome them as brothers and sisters in solidarity. If they refuse to join us willingly, then we will use force to bring them under our sway."
 SOV_collective_leadership: "Collective Leadership"
 SOV_collective_leadership_desc: "It is clear one man cannot rule alone. With the rapid changes we must still implement, we need as much expertise we can. We cannot bicker among ourselves and fight for control over the state. A stable circle of trusted members will ensure the new transition goes smoothly"
 SOV_role_of_personality: "Role of Personality"
 SOV_role_of_personality_desc: "While the cult of personality in the USSR has been criticised, and with a lot of merit, one cannot say it was not needed. With our new mandate to govern we must also bring the air of authority and strength. The people will not support a nameless committee, they need a personification of the state, the great father. This is why such a role must be carefully prepared and selected for."
 SOV_effective_bureaucracy: "Effective Bureaucracy"
 SOV_effective_bureaucracy_desc: "With our current struggles of restructuring, we must ensure our cadre is capable of handling the weight brought onto them. They cannot remain simple pencil pushers, nor can they stay still and inert. They must be effective and intelligent, ready to tackle any problem that comes their way. We must expand bureaucratic training sessions to ensure this."
 SOV_rally_the_people_zyuganov: "Rally the People"
 SOV_rally_the_people_zyuganov_desc: "The Socialism has finally been restored, yet our people are still divided. Almost 2 generations grew up without the shining star, without an example to strive towards. We must shepherd the populace we reunited to our cause, for the red star to shine brightly!"
 SOV_reliance_on_apparatus: "Reliance on Apparatus"
 SOV_reliance_on_apparatus_desc: "With our victory and revival of the USSR, we must make sure the reunified lands run smoothly. Unfortunately, that means we will make do with the ones we have on hand. Gather as many sympathisers from the liberated lands and use the RSFSR cadres we have on hand to bolster them. There is much work to be done, and these people will be the trailblazers of our project."
 SOV_dialogue_with_grassroots: "Dialogue with Grassroots"
 SOV_dialogue_with_grassroots_desc: "While our Soviet Experiment has just secured a solid footing, it is clear we implementing it from the top down is not feasible. To truly revive the spirit of what once was, we must support the ideologically driven parts of our populace who wish to help us in our vision. It is with their drive and fire that we can finish what we started."
 SOV_creative_marxism: "Creative Marxism"
 SOV_creative_marxism_desc: "The USSR used to be a big media player on the world stage. While not as established or famed as the likes of Hollywood, Soviet filmmakers and cartoonists were held to a high standard. We must reignite the fire of passion in the hearts of our people and reinvent ourselves in the eyes of the world. We must show to them that we are back, and that the Socialist Experiment is far from over!"
 SOV_renewed_program: "Renewed Program"
 SOV_renewed_program_desc: "With the current challenges, we must also make sure our programme is not behind the times. Use the past legal frameworks and modify it to fit the times."
 SOV_course_continuation: "Course Continuation"
 SOV_course_continuation_desc: "It has been 30 years of darkness. But must stars go out during the dark ages as well? NO! For there are people who carry them in their hearts, in their souls. And when the time was right, we returned the night sky their beauty. For the Red Star has endured much worse, and continue to endure ever more!"
 SOV_cohesion_before_challenges: "Cohesion Before Challenges"
 SOV_cohesion_before_challenges_desc: "During our last party congress, we became convinced that not all members of our party support the course that we have outlined for the coming years. Based on the past of the Soviet Homeland, we must take this situation into account and begin the necessary measures to resolve it. Of course, the opposition and some members of our own party will not be very happy about this, but between the opinion of the minority and the protection of the majority, we will surely choose the second option."
 SOV_intra_party_consensus: "Intra-Party Consensus"
 SOV_intra_party_consensus_desc: "The worst phenomenon of political parties and associations in general is factionalism, which we must not allow under any circumstances. Instead of suppressing reformism in the party, we will try to meet them halfway. We will carry out several reforms in our government, as well as encourage innovation and self-governance to ensure solidarity of opinions within our party."
 SOV_voice_of_the_party: "Voice of the Party"
 SOV_voice_of_the_party_desc: "The Party is the spine that workers trust,\nThe Party is the cause that cannot rust.\nThe Party is the one that will not bend -\nA clerk today, tomorrow kingdoms' end!"
 SOV_cadres_decide_everything: "Cadres Decide Everything!"
 SOV_cadres_decide_everything_desc: "There are many reasons why the USSR collapsed, but one of the main ones is unscrupulous deputies. Many members of the Soviet government were there thanks to connections and were incompetent at their own duties. We will learn from the mistakes of the past and will begin to promote to the government those people who really want, and most importantly, will be able to help our Soviet Homeland prosper more than ever!"
 SOV_effective_bureaucracy_afonin: "Effective Bureaucracy"
 SOV_effective_bureaucracy_afonin_desc: "The bloated bureaucracy became a real symbol of stagnation in the Soviet Union and was made fun of even by the state media. To prevent the same stagnation a second time, we need to take actions against the bureaucracy in advance. We will get rid of unnecessary documents, reduce excessive approvals, and do everything to ease the bureaucratic machine of our state."
 SOV_socialist_pluralism: "Socialist Pluralism"
 SOV_socialist_pluralism_desc: "Even after our government has been in power for a long time, there are still people in the country sabotaging our actions for some reasons. To show people that CP RSFSR really stands up for their interests, we will communicate with opposition parties and will try to find a compromise on the most pressing issues that concern our citizens the most."
 SOV_guarantor_of_stability: "Guarantor of Stability"
 SOV_guarantor_of_stability_desc: "Our party offers people not only social equality, but also a stable life. Every citizen will have free education and medicine, a job, own flat, a car, a large pension, and the country itself will have a minimum level of poverty and crime. Every citizen of our Homeland will be confident in the future!"
 SOV_new_public_dialogue: "New Public Dialogue"
 SOV_new_public_dialogue_desc: "If we want a truly successful and completely modern Soviet state, we need to abandon the practices of the past and focus not on imaginary stability, but on progress and development. Did \"stability\" lead us to communism? Has stagnation improved our economy? No! In order for the USSR of the 21st century to become the greatest power on Earth, we must get rid of the old and weak system and build a new one - a truly people-oriented system!"
 SOV_10_steps_to_good_life: "Ten Steps to a Decent Life"
 SOV_10_steps_to_good_life_desc: "Our program, developed many years ago, is finally ready to be implemented. These steps are aimed at improving living conditions, increasing incomes and social protection of citizens. After such a long time, we can take care of the people, showing in practice the effectiveness of our team!"
 SOV_strategic_regulation: "Strategic Regulation"
 SOV_strategic_regulation_desc: "The market economy as a whole demonstrates efficiency and generally satisfies our interests. However, no economic system is perfect. That is why we are beginning to implement a policy of reasonable state intervention to ensure stability, sustainable growth, and set the right course for development.\nChina is a shining example of how this model works, having managed to become one of the world's economic leaders. Their example shows that combining market mechanisms with strategic regulation can achieve impressive results."
 SOV_cult_of_reindustrialization: "The Cult of Reindustrialization"
 SOV_cult_of_reindustrialization_desc: "One of the first major achievements of the Soviet government was rapid industrialization, which served the people well for decades. However, after the collapse of the Union, the industrial complex fell into decline, and many enterprises simply ceased to exist.\nThat is why today we need to make up for lost time and fully restore the industrial potential lost in the turbulent 1990s. This requires strong political will and the concentration of a large amount of national resources to make our industry the backbone of development once again."
 SOV_red_environmentalism: "Red Environmentalism"
 SOV_red_environmentalism_desc: "Our country is entering a new era—an era in which the state of the environment means immeasurably more to us than it did at the end of the 20th century. Yes, industry must continue to operate; it cannot be abolished. But that is precisely why we should learn from China's experience. China clearly demonstrates how it is possible to remain the \"world's factory\" without abandoning large-scale environmental programs.\nThis is the strength of the socialist economy: it is capable of combining industrial power with care for nature. Our planned economy system is ideal for implementing long-term \"green\" strategies, making ecology a new priority for development."
 SOV_small_business_support: "Small Business Support"
 SOV_small_business_support_desc: "We recognize the importance of small businesses to the economy, and despite our socialist beliefs, it would be a mistake to leave them unsupported. We will provide assistance and protection to small businesses, creating conditions for their growth and stability. This in no way contradicts our principles, because a successful business means stable jobs and taxes for the treasury."
 SOV_new_industrial_policy: "New Industrial Policy"
 SOV_new_industrial_policy_desc: "The initial results of reindustrialization clearly demonstrate the success of our industrial policy. This proves that we are moving in the right direction, and now we need to increase our efforts. \nTherefore, we are declaring accelerated industrialization to be our main economic priority. We need to upgrade our production facilities on a large scale, focus on modern technologies, and train personnel for the new industry. The faster we reach a new industrial peak, the stronger the country's economic sovereignty will be and the higher the well-being of every citizen will become."
 SOV_revival_of_soviet_science: "Revival of Soviet Science"
 SOV_revival_of_soviet_science_desc: "In the USSR, there was a real cult of science and technological progress. Soviet scientists were famous throughout the world for their groundbreaking achievements. At one time, the whole of humanity knew the Russian word \"sputnik,\" and millions of people were inspired by our successes and strove for achievements themselves.\nWe must not lose this glorious tradition. That is why today we need to revive the spirit of Soviet science after many years of neglect, restoring its former prestige and state support. Only in this way can we nurture a new generation of researchers capable of repeating and surpassing the achievements of our predecessors."
 SOV_consolidation_of_unions: "Consolidation of Unions"
 SOV_consolidation_of_unions_desc: "Protecting workers' rights is one of the main tenets of socialism. This is precisely why trade unions exist—organizations that protect workers from the arbitrariness of employers and monitor compliance with labor standards.\nIn the USSR, this function was performed by a single trade union. Now we have to decide how to adapt this proven approach to modern realities while preserving its main goal: the reliable protection of workers."
 SOV_agrarian_renaissance: "Agrarian Renaissance"
 SOV_agrarian_renaissance_desc: "Agriculture has always been one of the key sectors of the economy, and in the Soviet Union it was given special attention. We do not intend to fall behind these glorious traditions and will undertake the revival of Russia's agricultural sector to restore it to its former glory.\nAfter all, Bread is the head of everything! We will focus on modern agricultural technologies, support for farmers, and the restoration of rural areas. In this way, we will achieve true food independence and continue the work of our predecessors with dignity."
 SOV_energy_development: "Energy Development"
 SOV_energy_development_desc: "The rapid electrification of the Soviet Union in the 1920s and 1930s is still considered one of the Bolsheviks' most ambitious projects. The legendary GOELRO plan is forever enshrined in history textbooks as an example of a great feat.\nToday, we must repeat this success. We must ensure a stable electricity supply to every corner of the country, especially in the context of rapid industrial growth. This will require modernizing the power grid and actively introducing new, including renewable, energy sources. In this way, we will be able to lay a solid foundation for the country's future development."
 SOV_moscow_beijing_agreement: "Moscow-Beijing Agreement"
 SOV_moscow_beijing_agreement_desc: "Our relationship with China has always been important, and now is the time to strengthen it definitively. We will conclude a new agreement that will strengthen our economic and political cooperation. This will allow us to avoid previous disagreements and make relations with China even more stable and productive."
 SOV_alterglobalism: "Alterglobalism"
 SOV_alterglobalism_desc: "In recent decades, global capitalism has continued to increase its influence, taking away what little remains from already disadvantaged peoples. This injustice must be ended, and we have a plan to offer the world an alternative. We advocate socialist globalization based on the principles of friendship, mutual aid, and equal cooperation.\nWe will prove that the prosperity of one people should not be built on the exploitation of another, and together we will build a world where human value is higher than profit."
 SOV_peoples_control: "People's Control"
 SOV_peoples_control_desc: "The essence of socialism is power to the people. Not only in politics, but also in the economy. Human labor should serve the good of all people, not enrich a handful of oligarchs in their palaces. That is why the people have the right to directly influence the development of their country. This means real worker control in enterprises and fair distribution of income. When the economy belongs to the workers, their well-being becomes a true symbol of progress."
 SOV_convene_council_ministers: "Convene the Council Ministers"
 SOV_convene_council_ministers_desc: ""
 SOV_new_union_ruble: "New Union Ruble"
 SOV_new_union_ruble_desc: "With the reunification of the Union, the time has come to finally unite our economies of brotherly nations. Despite the widespread use of the Russian ruble throughout the country, the currencies of other republics are still found in circulation. A large-scale monetary reform is already a necessary step to strengthen the common financial system. The new Union Ruble will remove this confusion and become a symbol of our united power, emphasizing the inseparability of economic and social ties."

 russia.832.t: "Lanzamiento"
 russia.832.d: "\"Diez, nueve, ocho, siete...\" - la cuenta atrás para Alekséi Petróvich duró una eternidad. Miraba a través de unos prismáticos desde una plataforma especialmente equipada a pocos kilómetros del lugar de lanzamiento. \"Si tan solo despegara, si tan solo despegara...\" - era el único pensamiento que rondaba la cabeza de Bykov.\n\nLa sonda Hius, que estaba a punto de despegar hacia el cielo estrellado, era la obra de su vida. Sí, todavía era joven - 35 años es una edad extremadamente temprana para el director técnico de toda la AMS - pero Alekséi Petróvich tenía experiencia y había soñado con retomar el programa soviético de exploración de Venus desde sus días universitarios. El objetivo principal de Hiusa era descubrir depósitos de minerales radiactivos para el futuro de la humanidad, cuando la tecnología permitiera conquistar el segundo planeta desde el Sol.\n\nMilagrosamente, logró impulsar su idea, en gran parte debido al nuevo Gobierno, que anunció la \"influencia destructiva del capitalismo en el programa espacial\" y el inicio de un curso para \"recuperar posiciones de liderazgo en la carrera espacial\". Y ahora, cuando el vehículo de lanzamiento voló muy, muy lejos, Bykov recordó las líneas de una canción:"
 russia.832.a: "\"Nacimos para hacer realidad un cuento de hadas\"."
 russia.833.t: "Después de la escuela"
 russia.833.d: "\"Entonces, hijo, ¿cómo estuvo tu día? ¿Qué hiciste hoy?\" Veniamin Andreevich comenzaba cada cena familiar con la misma pregunta a su hijo.\n\"Como siempre. Oración matutina, conversaciones con el sacerdote y lectura del Evangelio\". dijo Lyosha con ligera irritación. \"¿Cuándo vamos a hacer algo útil? ¡Tengo exámenes pronto!\"\n\"Bueno, no seas tan escéptico. Todo en la vida es útil, incluso la teología. Especialmente ahora\". Mamá se apresuró a tranquilizarlo.\n\"¡Sí, no renuncié a estos cuentos de hadas sobre «obedece al Padre, no hagas esto, no hagas aquello, o irás al infierno»! ¿Cómo voy a trabajar correctamente si en lugar de conocimientos prácticos en mi cabeza tengo un revoltijo de versículos bíblicos y las enseñanzas morales de un desconocido?\"\n\"Ten paciencia hasta la universidad.\"\n\"¡Es lo mismo allí! ¡Las mismas tonterías año tras año!\" el hijo puso fin a esta conversación."
 russia.833.a: "\"Quizás valga la pena educarlo en casa...\""
 russia.834.t: "Prayer of the Russian Warrior"
 russia.834.d: "It has been raining in the Moscow region for the third day. But the weather could not prevent the great event: the blessing of a Separate Oprichnina Brigade named after the Blessed Tsar John Vasilyevich in the Main Church of the Armed Forces. Preparations for this event began even before the start of the war, and the entire schedule was scheduled for months.\"WARRIORS!\" - Okhlobystin's burbling voice roared across the field - \"THE HOUR OF THE LAST JUDGMENT IS APPROACHING! TRIALS OF EURO-BOLSHEVIKS, ATHEISTS, ENEMIES OF THE RUSSIAN PEOPLE AND THE ORTHODOX FAITH!\" Hundreds of soldiers stood in front of the podium, with rifles on their shoulders. Priests walked along the rows, sprinkling the fighters and their weapons with holy water.\n\n\"FAITH HAS ALWAYS BEEN WITH THE RUSSIAN HEROES: ON KULIKOVO FIELD, ON POLTAVA, AT BORODINO AND NEAR MOSCOW! OUR GRANDFATHERS AND GREAT-GRANDFATHERS FOUGHT AND WON UNDER THE FACE OF CHRIST! THE RUSSIAN LAND AWAITS YOU WITH A VICTORY! FORWARD, WARRIORS OF FAITH!\"\n\nOne raised his fist up and the whole field responded with a shout:"
 russia.834.a: "¡GOIDA!"
 russia.835.t: "Beholder"
 russia.835.d: "Vasily was the steward and looked after Khrushchevskaya on Progress Street. A non-dusty job is to sweep the floors, call the services so that they mow the grass in front of the house on time. And also well... watch the tenants in the cameras and transmit certain patterns of their behavior to the authorities. For example, Margarita Ivanova from apartment six. A hardworking, but also deeply unhappy woman. Recently, just after the next report, she was lucky. During the queue at the housing and communal services, she met Vasily Petrovich, a smart but also lonely electrician, who for some reason was called to another place today. And now several weeks have passed since then, and Margarita receives a guest every Tuesday, Friday and Saturday, and things were getting better at work. But the former tenant of apartment 12, Arkady Veniaminovich, kept forbidden books. As a result, during an extraordinary promotion, he was transferred to work in the Arctic. He denied it, of course, but what could he do? The party said it's necessary, so it's necessary.\n\nSometimes, however, Vasily himself thought about the fact that he was playing God and deciding the fate of other people. But he refused, he was just following his instructions. And there are coincidences in life... there are, aren't there? However, deep down he was afraid. And sometimes at night he had nightmares that someone was watching him from the side in the same way and filling out another report in the same way."
 russia.835.a: "But there's nothing to be afraid of, is there?"
 russia.836.t: "The Court of Time"
 russia.836.d: "Recently, a new program literally tore up the charts of Russian television. \"The Court of Time\" is a program about popular politics, where various historical figures in the form of testimony retell their path to power and how they ruled the country. And the jury, disguised as citizens of the country, and the judge in the form of a blind Themis, sentence them.Such figures as Stalin, Lenin, Alexander I and Leon Trotsky have already visited this court. So the first three rulers were acquitted by the court, and Trotsky was executed for collusion with German capital and Anglozionist circles.\n\nThe show is already beating all possible ratings, and it seems that the creators are not going to stop. In particular, they do not exclude the possibility that foreign rulers may become the next defendants in their show."
 russia.836.a: "Buen espectáculo."
 russia.837.t: "The Whirlwind of History"
 russia.837.d: "An unexpected act for all citizens was the announcement of official state support for the project \"In the Whirlwind of History.\" Having long been a haven for fans of alternative history, the forum has already released several dozen books, mostly in the genre of \"popodantsy\" where the characters are unexpectedly transported back in time and become catalysts for changing history.\n\nNow the website has undergone a rebranding, and the book series has been renamed The Whirlwind of History. At the same time, new books were announced, for example, \"The Age of the Tsar\", which tells about the life of soldiers of the Russian Empire fighting against the German Red Army. \"After the Flood\" is a novel about the love of a French aristocrat and an American count in the world of the victorious Napoleon. And finally, \"Ashes\" is a drama about a family surviving the apocalypse that occurred at the beginning of the 20th century. In the story, they have to travel through ravaged Russia to reach the paradise in Vladivostok that everyone is talking about."
 russia.837.a: "Maybe I should take one for myself, too?"
 russia.838.t: "Something Changes..."
 russia.838.d: "The sun was shining. Two young men were walking through the center of Yaroslavl, a city that has endured all the ups and downs of Russia throughout its history. Even now, during the period of obvious unrest, little has changed in the city, with the exception of the appearance of two infantry fighting vehicles and a tank in the central square.\n- Yes, when will all this nonsense end?\n- You know, \"you can't understand Russia with your mind,\" the second one grinned back.\n- Yes, judge for yourself: Zhirinovsky did the right thing, it was not for nothing that they won the war. Yes, he's gone now, but so what? There, the same Slutsky was saying sensible things about national democracy and sovereignty. And that's what these military men suddenly didn't like?Sergey, you know, if events and people in our country obeyed logic, we would probably be flying to Mars right now.\n- Well, maybe you're right...The night was interrupted by the roar of engines - the guys approached the square in front of the regional administration building, from where armored vehicles were hurriedly leaving. Cars raced right in front of them-you could smell the diesel.\n- What are they doing? - the first one drawled.\"I think I can guess,\" the second one replied, looking at the phone screen.\n"
 russia.838.a: "...But something remains unchanged."
 russia.839.t: "Sweep Out Everything Superfluous"
 russia.839.d: "\"Here you are - you traitor bastard!\", with these words, oprichnik Andrei Danilovich sharply punched his opponent in the jaw. The overweight man lost his balance and fell to the floor. A tottering icon from a shelf carelessly nailed to the wall fell and landed directly on the forehead of the fallen man. A man with blood trickling from his mouth lifted the image that landed on his forehead with the last of his strength. Saint Mary looked on indifferently at his suffering, after which the beaten man closed his eyes and passed out.\n\n- What are we going to do with it?  Andrey turned to Vasily Pavlovich, the sovereign's man, the elderly commander of their brigade.\n- What to do - what to do... take him to his family in the car. Volodka, help him with something.\n- That's right!  Andrey replied, and then, while no one was looking, he took the watch from the unconscious man's hand.After half an hour, the guards, each with a molotov cocktail in their hands, stood in front of the house.\n\n- Vasily Pavlovich. It's a pity to burn such beauty. The house is like an old Russian house.\n- Oh, Andreika, it is impossible to spare the property acquired by deception. He received money from Germany, and they are our enemies. Therefore, he is a traitor, and traitors' houses are supposed to be burned.\n- Well, whatever you say. Come on! \n- Go ahead!The first guardsman shouted loudly, after which five bottles of Molotov cocktails almost simultaneously flew into the building.  One of the bottles successfully flew into the open window and the flame almost immediately devoured the curtains, after which it switched to wooden decoration. The crowd gathered around the performance actively hooted and whistled. \"Burn it! Burn it! Burn it! Burn!\", crazy, loud cheers complemented the dance of flames, it seemed that the crowd could barely restrain themselves from dancing around the fire. Vasily Pavlovich just lit a cigarette, looking into the distance, after which he waved his hand and his squad went to the car."
 russia.839.a: "They're done for today."

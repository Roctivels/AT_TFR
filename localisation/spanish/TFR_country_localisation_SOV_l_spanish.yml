 FER_derussification_desc: "Tras siglos de genocidio ruso contra nuestro pueblo y cultura, estamos en proceso de desmantelar esta cultura extranjera de nuestra tierra para romper con su limpieza étnica. Sin embargo, esta transición tiene un precio: muchos rusos étnicos huyen de nuestro territorio, ya que no todos nuestros ciudadanos están preparados para aceptar esta realidad. Esta conmoción, sumada a nuestra dependencia de las fuerzas de paz de la OTAN, representa un gran desafío para el Gobierno."
 SOV_devastated_industry_idea_desc: "Nuestra industria ha sido completamente destruida por la Guerra Europea. Los talleres y fábricas que una vez impulsaron nuestra economía son solo una sombra de lo que fueron, y reconstruirlos será lento y doloroso. Mientras nos esforzamos por recuperarnos de la mayor guerra terrestre desde la Segunda Guerra Mundial, el camino que queda por recorrer requerirá tiempo, recursos y resiliencia."

 SOV_kleptocratic_state2: "Estado cleptócrata"
 SOV_kleptocratic_state2_desc: "La privatización de la economía soviética no podía llegar lo suficientemente rápido para Borís Yeltsin, por lo que una vez que la Unión cayó, recurrió a una \"terapia de shock\": eliminó regulaciones y vendió industrias enteras de la noche a la mañana. Funcionarios corruptos, apparatchiks del PCUS y otros empresarios poco éticos compraron antiguas empresas públicas por unos pocos kopeks por rublo, lo que significa que el poder económico quedó en manos de unos pocos amigos del Gobierno. Mantuvieron su poder cultivando relaciones y haciendo acuerdos secretos con la administración de Yeltsin, y fueron el blanco de un furor generalizado después de la crisis económica nacional de 1998. Aunque Putin procesó a varios de estos llamados oligarcas por corrupción después de llegar al poder, ha mostrado poco interés en cambiar el sistema, y muchos de ellos han consolidado aún más su control sobre la economía de Rusia."

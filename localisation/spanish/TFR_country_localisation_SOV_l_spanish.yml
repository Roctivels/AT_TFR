 SOV_wagner_state_cat_desc: "\n\n\n\n\n£GFX_SOV_wagner_state_banner\n\n\n\n\n\n\n\nRussia is now firmly in the hands of Prigozhin and his group of military radicals.\nAfter Russia's defeat in the European war, people are demanding justice and a rematch. Russians now see Yevgeny Prigozhin as the only person who can provide them with this. His private army has become the main organ of state power.\nThe new state is very personalistic. The \"Big Boss\" of the Wagner Group demands personal loyalty from government officials and even citizens. Prigozhin believes that to avenge Russia's losses, the country must be transformed into a nationalist and militaristic state.\n\nFanaticism: £GFX_fanaticism §Y[?SOV_fanaticism_var|1%]§!\nEffect:  £attack_texticon [?SOV_fanaticism_dynamic_var|=+1%] £mil_factory [?SOV_fanaticism_dynamic_var|=+1%] £GFX_mobilisation_texticon [?SOV_fanaticism_dynamic_var|=+1%] £GFX_war_support_modifiericons_texticon [?SOV_fanaticism_dynamic_var|=+1%]\n\nFanaticism represents our people's willingness to fight and support of the nation."

 SOV_gazprom_category: "Manejando Gazprom"
 SOV_prepare_the_union_state_category: "Preparando el Estado de la Unión"
 SOV_prepare_the_union_state_category_desc: "El §YEstado de la Unión§! es una iniciativa de Rusia y Bielorrusia para estrechar la integración política, económica y militar entre ambos países. El proyecto se creó en 1999 tras la firma del Tratado sobre la Creación del Estado de la Unión de Rusia y Bielorrusia.\nEl proyecto del §YEstado de la Unión§! contempla la creación de un marco jurídico común, la aplicación de una política económica común y la coordinación de las relaciones exteriores entre Rusia y Bielorrusia. Sin embargo, debido a diversos problemas políticos y económicos, el progreso hacia la plena integración ha sido lento. Es hora de corregir esta situación."
 SOV_the_house_of_cards: "Castillo de naipes ruso"
 SOV_the_house_of_cards_desc: "\n\n\n\n\n£GFX_SOV_russian_house_of_cards_banner\n\n\n\n\n\n\n\nDesde que §YVladímir Putin§! llegó al poder, la esfera política rusa se ha convertido en un mecanismo de múltiples capas con numerosos elementos de disuasión, acuerdos y conexiones personales, que algunos llaman \"las Torres del Kremlin\". Sin embargo, a pesar de la fachada aparentemente unificada, esconde una oportunidad para que los grupos políticos extiendan su influencia y lagunas para socavar esta maquinaria.\nLa §Yadministración presidencial§!, por supuesto, hará todo lo posible para limitar esos actos de voluntad propia.\n\nActualmente estamos apoyando a: [get_election_choice]\n\n\n\n[SOV_election_time_loc]\n\n\n\n\n\n\n---------------------\nFuerza de la £GFX_RF_logo  §6oposición liberal§!: §R[?SOV_election_approval_rating_nav_var|-1%]§!\n(£GFX_pol_power  [?SOV_liberal_opposition_dynamic_dynamic_var|=+2%], £GFX_war_support_texticon  [?SOV_liberal_opposition_dynamic_dynamic_var|=+2%])\n"
 SOV_modernization_programme_category: "La economía rusa"
 SOV_modernization_programme_category_desc: "\n\n\n£GFX_russian_economy_background\n\n\n\n\nLa §Geconomía rusa§! es un sistema complejo que consta de muchas industrias y sectores. Desde principios de los años 2000, el Estado ha estado utilizando activamente corporaciones estatales y otros mecanismos gubernamentales para gestionar la economía. Al mismo tiempo, la iniciativa privada también juega un papel importante, y las empresas generalmente operan libremente.\n\nAunque los £GFX_Gazprom_logo  §Yoligarcas§! han dejado de dirigir los procesos en el país, todavía tienen influencia en la economía y pueden ayudarnos, aunque no sin beneficio para ellos mismos. [SOV_oligarchs_gui]"
 SOV_NATO_war_category: "Guerra con la OTAN"
 SOV_NATO_war_category_desc: "\n\n\n\n\n£GFX_SOV_NATO_war_category\n\n\n\n\n\n\n\nLa guerra con Occidente es inevitable. Nuestros objetivos de dominio europeo se ven obstaculizados por la existencia de la OTAN.\n\nEsta guerra, como cualquier otra, §Rdebe acabar eventualmente§!, y debemos hacerlo antes de ser derrotados o nuestro pueblo no podrá soportarlo más. El Estado Mayor ha desaconsejado una invasión en §Yprimavera§!... Pero, si es el momento más oportuno, ¡atacaremos! Para que nuestra victoria sea absoluta, debemos mantener §YVARSOVIA§! §RY§! §YBUDAPEST§!. Las naciones que conquistemos de la §COTAN§! serán §Gestados satélites§! nuestros tras la victoria.\n\n\n§ROBJETIVOS PRINCIPALES§!:\n\n§YVARSOVIA§!: [GLOBAL.get_warsaw_status]\n§YBUDAPEST§!: [GLOBAL.get_budapest_status]\n§YKIEV§!: [GLOBAL.get_kiev_status]\n\n§ROBJETIVOS SECUNDARIOS§!:\n\n§YVILNA§!: [GLOBAL.get_vilnius_status]\n§YBUCAREST§!: [GLOBAL.get_bucharest_status]\n§YODESA§!: [GLOBAL.get_odessa_status]\n§YRIGA§!: [GLOBAL.get_riga_status]\n§YCRACOVIA§!: [GLOBAL.get_krakow_status]\n\n§GCIUDADES ALIADAS§!:\n\n§YMINSK§!: [GLOBAL.get_minsk_status]\n§YDONETSK§!: [GLOBAL.get_donetsk_status]\n§YROSTOV§!: [GLOBAL.get_rostov_status]\n§YSEBASTOPOL§!: [GLOBAL.get_sevastopol_status]\n§YKALININGRADO§!: [GLOBAL.get_kaliningrad_status]"
 SOV_politburo_category: "Sóviet Supremo"
 SOV_politburo_category_desc: "\n\n\n\n\n£GFX_SOV_politburo_banner\n\n\n\n\n\n\n\nEl §YSóviet Supremo§! es el órgano supremo del poder estatal en nuestro país.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
 SOV_restore_ties_with_eurosocialists_category: "Ventana a Europa"
 SOV_restore_ties_with_eurosocialists_category_desc: "A pesar de la propaganda anticomunista que se ha extendido en los países occidentales durante muchos años, las ideas de izquierda siguen siendo muy populares entre la población. Debemos aprovechar esto y encontrar aliados en nuestra lucha."
 SOV_second_NATO_war_category: "Segunda Guerra Europea"
 SOV_second_NATO_war_category_desc: "[SOV.get_nato_war_status]\n\n\n§ROBJETIVOS PRINCIPALES§!:\n\n§YBERLÍN§!: [GLOBAL.get_berlin_status]\n§YPARÍS§!: [GLOBAL.get_paris_status]\n§YROMA§!: [GLOBAL.get_rome_status]\n§YLONDRES§! : [GLOBAL.get_london_status]\n§YVARSOVIA§!: [GLOBAL.get_warsaw_status]\n§YKIEV§!: [GLOBAL.get_kiev_status]\n\n\n§ROBJETIVOS SECUNDARIOS§!:\n\n§YFRÁNCFORT§!: [GLOBAL.get_frankfurt_status]\n§YÁMSTERDAM§! : [GLOBAL.get_amsterdam_status_sov]\n§YESTRASBURGO§!: [GLOBAL.get_strasbourg_status_sov]\n§YVENECIA§!: [GLOBAL.get_venice_status_sov]\n§YPRAGA§!: [GLOBAL.get_prague_status_sov]\n§YMILÁN§! : [GLOBAL.get_milan_status_sov]\n\n[ENG.get_british_nuke_status]\n[FRA.get_french_nuke_status]"
 SOV_american_intervention_category: "Intervención en Norteamérica"
 SOV_american_intervention_category_desc: "El ansia de hegemonía mundial del establishment estadounidense ha provocado, finalmente, el colapso de Estados Unidos. La cantidad de bandas ilegales, terroristas peligrosos y dementes que campan a sus anchas en el antiguo territorio estadounidense es profundamente preocupante y representa una amenaza para el orden público. Una guerra prolongada provocará mayor inestabilidad mundial y caos en el mercado negro.\nAfortunadamente, hay un puñado de auténticos patriotas estadounidenses que buscan restaurar un país que desea coexistir pacíficamente con otros países y abandonar las pretensiones globalistas de dominación mundial."
 SOV_reform_russian_empire: "[SOV_reform_russian_empire_loc_dynamic]"
 SOV_reform_russian_empire_post_war_loc: "Política imperial rusa"
 SOV_reform_russian_empire_normal_loc: "Resurrección de la Gran Rusia"
 SOV_reform_russian_empire_desc: "\n\n\n\n\n£GFX_SOV_russian_empire_banner\n\n\n\n\n\n\n\nDurante 300 años existió el gran Imperio de Rusia, opulento y poderoso, hasta que llegaron los bolcheviques impíos y lo llevaron a la ruina. El pueblo ruso, antaño entre grandes naciones, ortodoxo y puro, fue oprimido, maltratado y genocidado, mientras que muchas nacionalidades falsas, artificialmente construidas por la escoria leninista, se apropiaron de las tierras rusas nativas cuando el experimento comunista inevitablemente colapsó.\nZhirinovski se propuso como meta en la vida restaurar el honor de Rusia y guiarla hacia su verdadero destino: una vez más imperial y grande, para atraer de vuelta a los rusos de todo el mundo a sus amplios brazos y protegerla de la debilidad y la decadencia.\n\n§Y\"La Primera Roma cayó por las herejías. La Segunda Roma, por el Concilio de Florencia. La Tercera Roma, Moscú, perdura para siempre. No habrá una cuarta Roma\".§!\n"
 SOV_pragmatic_economy_category: "Economía pragmática"
 SOV_pragmatic_economy_category_desc: "Las políticas económicas del PLDR pueden caracterizarse como capitalismo de Estado con un sector privado responsable. También apoyan algunas políticas de bienestar social populistas, como la sanidad mayoritariamente gratuita, la educación asequible y los programas de vivienda pública."
 SOV_resource_excavation_category: "Extracción de recursos"
 SOV_influence_west_category: "Guerras económicas"
 SOV_influence_west_category_desc: "El gas es la mejor herramienta política y económica que Rusia tiene para presionar a Europa. Europa lleva años repitiendo el mantra de la necesidad de reducir la dependencia energética de Rusia y desarrollar medidas para lograrlo, pero hasta ahora no se han observado cambios reales, y si se interrumpe el suministro ahora, Europa lo pasará mal.\n\n§YLas casas y apartamentos no se pueden calentar con declaraciones. La única forma de calentarlos es con gas natural.§!"
 SOV_Dugin_Directives_category: "Directivas de Duguin"
 SOV_Dugin_Directives_category_desc: "\n\n\n\n\n£GFX_SOV_dugin_directives_banner\n\n\n\n\n\n\n\nLa destrucción de la posmodernidad en la mentalidad rusa no será fácil; nadie lo comprende mejor que el propio Duguin.\n\nNuestras políticas y decretos intentarán educar a nuestro pueblo para que recupere las raíces del espíritu ruso y la ascendencia de la Gran Turán-Eurasia. Para vivir la vida filosóficamente, esforzándonos por convertirnos en un Sujeto Radical: Dios entre los Hombres, Hombre entre los Dioses.\n\nEsto es realmente aburrido; lo único que quiero es quemar libros escolares y apuñalar a los cosmonautas.\n\nFanaticismo: £GFX_fanaticism  §Y[?SOV_fanaticism_var|1%]§!\nEfecto: £attack_texticon  [?SOV_fanaticism_dynamic_var|=+1%] £mil_factory  [?SOV_fanaticism_dynamic_var|=+1%] £GFX_mobilisation_texticon  [?SOV_fanaticism_dynamic_var|=+1%] £GFX_war_support_modifiericons_texticon  [?SOV_fanaticism_dynamic_var|=+1%]\n\nEl fanatismo representa la voluntad de lucha de nuestro pueblo y el apoyo a la nación."
 SOV_Supreme_Veche_category: "Veche Popular"
 SOV_Supreme_Veche_category_desc: "El §YVeche Popular§! es el órgano supremo de gobierno político de §Y[SOV.GetNameDef]§!. Numerosas fuerzas patrióticas y apasionadas consideran este palacio su sede, desde comunistas que aceptaron el ideal inmortal del eurasianismo hasta representantes de la burguesía nacional. Al igual que en la democracia soviética, los candidatos se eligen localmente según sus promesas y programas; sin embargo, el Comité de Asuntos Políticos del Partido Eurasia sigue siendo el único órgano hegemónico que controla la designación de diputados y ministros, así como la designación del presidente del Veche."
 SOV_oligarchs_influence_category: "Influencia de los oligarcas"
 SOV_oligarchs_influence_category_desc: "Los oligarcas tienen cierta influencia en Occidente, así que ¿por qué no empezar a aprovecharla? Al apoyar con el dinero de los oligarcas los eslóganes antieuropeos y la postura de los medios de comunicación contra la \"LGBT+ progresista\", podríamos echar más leña al fuego de una estructura europea ya inestable.\n\n§Y\"Tal distanciamiento de la realidad, de las demandas de la sociedad, conducirá inevitablemente a un auge del populismo y al crecimiento de tendencias radicales, a graves cambios sociales y económicos, a la degradación y, en un futuro próximo, a un cambio de élites\".§!"
 SOV_small_businesses_category: "Desarrollo del libre mercado"
 SOV_csto_organization_category: "OTSC"
 SOV_novorussian_integration_category: "Referendo novorruso"
 SOV_novorussian_integration_category_desc: "Tras muchos años de lucha, el pueblo de Novorrusia por fin puede descansar. La mayoría de los objetivos fijados en 2014 se han cumplido, y solo queda una cosa: completar la integración a Rusia."
 SOV_ukrainian_insurgencies_category: "Resistencia ucraniana"
 SOV_ukrainian_insurgencies_category_desc: "El pueblo ucraniano fue sometido a un intenso lavado de cerebro por la propaganda rusófoba de la Junta de Kiev; tomará tiempo sanar las heridas del sueño febril de la banderista. El pueblo de Ucrania Occidental volvió a tomar las armas contra sus liberadores como en 1946. §RSu fin será el mismo.§!"

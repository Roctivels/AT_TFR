 SOV_consolidate_russian_society: "§7Consolidar§! la sociedad rusa"
 SOV_consolidate_russian_society_desc: "\n\n\n\n\n£GFX_SOV_consolidate_russian_society_banner\n\n\n\n\n\nEsta serpiente será derrotada,\nSomos muchos más, somos más fuertes,\nLuchadores del gran y nuevo ejército ruso.\nEl cielo nos espera a todos nosotros, y el infierno los espera a todos ellos,\nDijo nuestro comandante supremo de batallón.\nHéroes Z de Chechenia, Tuvá, Moscú, Jartsyzsk\nHéroes Z de Chitá, Rostov y Norilsk.\nHéroes Z de Sebastopol, Kaspisk."
 SOV_rekindle_anti_maidan: "Revivir el sentimiento anti-Maidán"
 SOV_constitution_russian_voting: "Voto panruso sobre las enmiendas"
 SOV_constitution_russian_voting_desc: "\n\n\n\n\n£GFX_SOV_constitution_referendum_banner\n\n\n\n\n\nVladímir Putin ha decidido que es hora de poner fin a la injerencia externa en nuestro país. Uno de los pasos para lograrlo es aprobar enmiendas constitucionales que contribuyan a fortalecer nuestros esfuerzos de soberanía.\nA pesar de estas nobles intenciones, muchos en Rusia las ven como una centralización autocrática y una escapatoria para que Putin gobierne cuanto le plazca.\nLa mayoría votará \"Sí\", sin importar el clamor, pero la reacción negativa si nuestro apoyo no es lo suficientemente homogéneo sería §Rsevera§!."

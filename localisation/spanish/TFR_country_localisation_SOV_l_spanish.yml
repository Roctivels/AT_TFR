 SOV_mass_mechanization_LDPR: "Mecanización en masa"
 SOV_mass_mechanization_LDPR_desc: ""
 SOV_authorize_banned_weapons_LDPR: "Aplastar la escoria"
 SOV_authorize_banned_weapons_LDPR_desc: "Aunque el país de Ucrania sigue existiendo, no es más que un cascarón vacío, al borde del colapso. una operación rápida y decisiva pronto borrará esta entidad de las paginas de historia. Más importante aún, desharemos esta región de las ideologías dañinas del nazismo y fascismo que han corrompido la mente de los pueblos eslavos. La creación innatural de estas ideologías, nacidos de la colaboración de italianos y austriacos, será aplastado bajo la grandeza del ejército ruso."
 SOV_total_war_LDPR: "Totalnaia Voina"
 SOV_total_war_LDPR_desc: "Desde cada rincón de nuestra sagrada Madre Patria, resuena el llamado de nuestro gran líder Zhirinovski, recordándonos una época en que un papa reunía caballeros para reclamar tierras perdidas. Esta es una gran lucha, en la que cada ruso participará. Será un proceso transformador, tanto material como espiritualmente, uniendo a nuestra nación como nunca antes. Cada presentador de noticias, instando al alistamiento en televisión, juega su papel en esta lucha, tan importante como cualquier soldado en el frente. Del mismo modo, cada trabajador de la cadena de montaje sentirá un interés personal, como si ellos mismos hubieran disparado el proyectil del cañón de un tanque."
 SOV_trample_over_kiev_LDPR: "Formar el Ejército de Liberación Malorruso"
 SOV_trample_over_kiev_LDPR_desc: "Después de que iniciamos nuestra campaña contra los traidores de la nación eslava - Ucrania -, un número creciente de ucranianos ha optado por unirse a nosotros para oponerse al nacionalismo extremo que se ha apoderado de su país. Con el apoyo de nuestro líder, Zhirinovski, estamos formando un \"Ejército de Liberación de Malorrusia\" para ayudar a nuestros compatriotas ucranianos en su lucha. Si bien este nuevo grupo sirve principalmente a propósitos de propaganda militar, puede producir resultados inesperados, similares a los éxitos de nuestros aliados en Donetsk y Lugansk."
 SOV_crack_down_on_protests_LDPR: "Alimentar la máquina de propaganda"
 SOV_crack_down_on_protests_LDPR_desc: "Hoy en día, los días en que los eslóganes y las transmisiones simples podían motivar a los jóvenes a hacer fila en las estaciones de reclutamiento han quedado atrás. Necesitamos métodos más atractivos para captar nuevos reclutas. Afortunadamente, establecimos un equipo de nuevos medios capacitado incluso antes de la guerra, y ahora están listos para actuar con su software de edición. Documentales militares bien producidos y llenos de acción, y emocionantes películas de guerra servirán como herramientas poderosas para inspirar un espíritu de lucha entre el público."
 SOV_to_serve_russia_to_die_russia_LDPR: "¡Muerte o deshonra!"
 SOV_to_serve_russia_to_die_russia_LDPR_desc: "Nuestros generales inspiran a los soldados con estas palabras: \"La tricolor negra, amarilla y blanca de Rusia es el máximo honor para un guerrero\". Ahora que la guerra ha llegado a su punto más crítico, debemos comprometernos por completo. No duden en utilizar nuestro último misil, tanque, metralleta y bala. Incluso si solo queda un soldado para cargar hacia adelante, morirá honorablemente en el campo de batalla como uno de los héroes más grandes de la Rusia moderna, en lugar de sufrir la deshonra de ser fusilado por la espalda."
 SOV_boost_aviation_funding_LDPR: "Impulsar la financiación de aviación"
 SOV_boost_aviation_funding_LDPR_desc: ""
 SOV_modernize_fleet_LDPR: "Modernizar la flota"
 SOV_modernize_fleet_LDPR_desc: ""
 SOV_build_up_western_air_bases_LDPR: "Construir bases aéreas occidentales"
 SOV_build_up_western_air_bases_LDPR_desc: ""
 SOV_drone_r_d: "I+D VANTC"
 SOV_drone_r_d_desc: ""
 SOV_pragmatic_economics: "Economía pragmática"
 SOV_pragmatic_economics_desc: "En la búsqueda de fortalecer la nación rusa, debemos centrarnos en construir nuestro poder económico, la base de todos nuestros esfuerzos futuros. Durante demasiado tiempo, los economistas han deslumbrado a nuestros líderes con frases vacías como \"industria terciaria\" y \"mercados financieros\" cada vez que se discutía el progreso económico. Esa era ha terminado. Ahora estamos priorizando la reactivación de las industrias básicas, impulsando la tarea crítica de mejorar la eficiencia en todos los sectores y aumentando la productividad."
 SOV_dismantle_oligarch_institutions: "Destruir la decadencia burguesa"
 SOV_dismantle_oligarch_institutions_desc: "Los Mercedes-Benz y Ferraris que circulan a toda velocidad por las calles no contribuyen en nada a la belleza de la ciudad. Al contrario, alimentan la insatisfacción y el resentimiento. Para la gente, estos coches de lujo son un símbolo de riqueza injustamente concentrada en manos de unos pocos, en lugar de ganada con trabajo duro. Implementaremos medidas para frenar esta decadencia y reducir estas muestras de exceso, al menos haciendo que los ricos sean menos ostentosos."
 SOV_develop_siberia: "Desarrollar Siberia"
 SOV_develop_siberia_desc: "Siberia es una tierra de belleza y misterio inigualables: vastas praderas, densos bosques, imponentes montañas e interminables campos de nieve. Puede que albergue los paisajes naturales más diversos de la Tierra, un tesoro incalculable. Durante generaciones, los rusos se han dedicado a Siberia, trabajando para convertirla en una parte vital de la nación. Continuaremos este importante trabajo, transformando esta tierra, que encarna el espíritu ruso, en un nuevo Edén."
 SOV_nationalize_Evraz: "Nacionalizar compañias de recursos"
 SOV_nationalize_Evraz_desc: "Aunque las empresas estatales gestionan oficialmente la extracción y el control de nuestros recursos naturales, siguen estando efectivamente bajo influencia privada. Los gerentes, que ostentan un poder similar al de los oligarcas, pueden continuar por el mismo camino. Para garantizar la seguridad de nuestros recursos, debemos implementar una verdadera nacionalización. En adelante, la gestión de los recursos naturales se confiará a los ministerios pertinentes y a nuevos consejos, formados mediante una combinación de elecciones internas y nombramientos centrales. Creemos que este modelo de toma de decisiones colectivo garantizará el éxito."
 SOV_imperial_monopolies: "Monopolios imperiales"
 SOV_imperial_monopolies_desc: "Cuando controlamos los sectores clave de la economía, es natural establecer empresas dominantes y gestionarlas con una estructura optimizada. La creación de un nuevo sistema de monopolios no solo asegurará beneficios constantes, sino que también ayudará a restaurar el orden en el caótico entorno empresarial. Algunos pueden cuestionar si la economía rusa podrá liberarse alguna vez de los oligarcas y los monopolios, pero esta vez, el sistema ya no generará corrupción ni egoísmo. En cambio, marcará el renacimiento de un poderoso imperio financiero ruso."
 SOV_nationalize_railways: "Conectar la Madre Patria"
 SOV_nationalize_railways_desc: ""
 SOV_wont_bend_to_western_banks: "Suprimir la banca globalista"
 SOV_wont_bend_to_western_banks_desc: ""
 SOV_modernize_production_lines: "Modernizar líneas de producción"
 SOV_modernize_production_lines_desc: "En el pasado, la industria pesada rusa era conocida por su producción a gran escala, pero también por su falta de precisión, tecnología obsoleta y diseños engorrosos. Nuestras armas y vehículos militares a menudo estaban por debajo de sus homólogos occidentales en términos de precisión, capacidades técnicas y potencial de mejora. Pero eso está a punto de cambiar. Al modernizar nuestras líneas de producción, los productos militares rusos ofrecerán un equilibrio perfecto entre asequibilidad, eficiencia e innovación moderna, todo ello al tiempo que proporcionan una potencia de combate inigualable."
 SOV_national_social_state: "Economía popular"
 SOV_national_social_state_desc: "La economía debe servir al pueblo. Esto significa asegurar que todos los rusos tengan acceso a necesidades básicas como vivienda, alimentos y vestimenta, pero también implica crear un sentido de cuidado y participación por parte del Estado. Cuando los ciudadanos se sienten comprometidos con el crecimiento de la nación, se fomenta un ciclo de contribución que fortalece la economía. Para lograr esto, implementaremos nuevas políticas centradas en mejorar la vida de millones de ciudadanos rusos."
 SOV_stratocratic_economy: "Agenda militarista"
 SOV_stratocratic_economy_desc: "Sin un ejército fuerte, Rusia no puede tener independencia, libertad ni prosperidad. Para asegurar la supervivencia de nuestras fuerzas armadas, nuestro sistema económico debe construirse para apoyarlas. Cada sector -producción, intercambio, distribución y consumo- priorizará las necesidades del ejército, uniendo a la sociedad en torno a un único objetivo: fortalecer las fuerzas armadas y promover la causa de Rusia."
 SOV_expand_mic_industry: "Expandir el complejo militar-industrial"
 SOV_expand_mic_industry_desc: "En línea con nuestras políticas económicas, ampliaremos aún más el complejo militar-industrial y los conglomerados de investigación existentes, animándolos a diversificar sus operaciones. A medida que el ejército se expanda y modernice rápidamente, la demanda de armas impulsará el crecimiento de la industria de defensa. Pero esperamos aún más. El sector de defensa desempeñará un papel cada vez más crucial en la economía en general, y su importancia será aún más evidente a medida que aumenten las tensiones."
 SOV_to_banish_want: "Desterrar el deseo"
 SOV_to_banish_want_desc: "Olvídese de lujos como el dinero en efectivo, los teléfonos inteligentes y la Coca-Cola que debilitan nuestra determinación. Cuando la sociedad abrace plenamente la atmósfera de guerra y el respeto por la bandera nacional se convierta en una creencia compartida, toda la producción innecesaria y el despilfarro serán redirigidos. Estos esfuerzos se convertirán en partes integrales de nuestra máquina de guerra. Este cambio fortalecerá nuestra preparación para conflictos a gran escala, asegurando que nuestras líneas de producción y logística -elementos vitales que podrían debilitarnos en tiempos de guerra- estén seguras y bien respaldadas."
 SOV_champion_the_workers: "Honrar a los trabajadores"
 SOV_champion_the_workers_desc: "En tiempos de crisis, los trabajadores pueden convertirse en la fuerza más poderosa, dando un desafío significativo para la estabilidad de las autoridades. Aún así, cuando las cosas van bien, pueden también volverse los mayores seguidores de un régimen. mostrando niveles excepcionales de entusiasmo y dedicación. Reviviremos nuestras alabanzas hacia la clase trabajadora, asegurando que entiendan las recompensas que vienen tras dedicarse a nuestra noble causa. Los trabajadores se darán cuenta que no son solo herramientas para burócratas sino que realmente pueden ser los maestros de la nación"
 SOV_rise_of_russian_giant: "Ascenso del gigante ruso"
 SOV_rise_of_russian_giant_desc: "Pedro el Grande dijo una vez que los aliados más importantes de Rusia eran su ejército y su armada. Hoy, esta idea necesita una ligera revisión: los mayores aliados de Rusia son sus fuerzas militares y sus fábricas. Sin cualquiera de ellos, el ascenso de Rusia se vería gravemente obstaculizado. Afortunadamente, Rusia ha forjado ahora un vínculo inquebrantable entre estos dos aliados. Cada taller que produce transportadores de misiles forma parte de una cadena industrial militar-civil totalmente integrada. Juntos, los sectores de defensa y civil impulsarán tanto la prosperidad como la seguridad de la sociedad rusa."
 SOV_far_east_development: "Desarrollo del Extremo Oriente"
 SOV_far_east_development_desc: "Nuestra tierra a lo largo del Océano Pacífico es rica en potencial y estratégicamente importante, especialmente por su proximidad a una de las economías más grandes del mundo: China. China ha mostrado durante mucho tiempo interés en invertir en el Extremo Oriente, y deberíamos aprovechar esta oportunidad. ¿Por qué no cooperar con ellos para desarrollar la región y convertirla en un centro próspero y boyante en la costa del Pacífico Occidental?"
 SOV_exploit_our_resources: "Utilizar nuestros Recursos"
 SOV_exploit_our_resources_desc: "Algunos han llamado cínicamente a Rusia un \"país sobre una gasolinera\", señalando la llamada \"maldición de los recursos\" que obstaculiza el progreso tecnológico y el crecimiento industrial. Sin embargo, creemos que el verdadero desafío que enfrenta la economía rusa no es utilizar su vasto territorio y abundantes recursos en todo su potencial. Los proyectos de infraestructura y las industrias que podemos desarrollar en torno a estos recursos servirán como una base sólida para el crecimiento económico a largo plazo de Rusia."
 SOV_militaristic_war_machine: "Despertar la maquinaria bélica"
 SOV_militaristic_war_machine_desc: "Las máquinas rugen, las fábricas zumban a pleno rendimiento. Los tanques ruedan por los campos, los buques se deslizan por las gradas, los aviones surcan los cielos y los misiles son izados a sus silos. Cualquier nación que contemple la hostilidad lo pensará dos veces cuando vea la fuerza de nuestro arsenal. Además, la inversión y producción militar a gran escala ya no suponen una carga para nuestra economía; al contrario, la impulsan. La maquinaria bélica se ha convertido en el motor que impulsa el rápido ascenso de Rusia."
 SOV_pressure_minsk: "Reñir al Gobierno de Minsk"
 SOV_pressure_minsk_desc: "Bat'ka es un verdadero oportunista. Intentó apoderarse de Rusia usando el acuerdo del Estado de la Unión antes de que llegara Putin, y ahora está haciendo todo lo posible para detener la integración de Bielorrusia en Rusia bajo el mismo acuerdo que firmó. Quizás cambie de decisión si dejamos de financiar su país."
 SOV_SOF_expansion: "Estándares de FOS para el ejercito"
 SOV_enshrine_soldier_benefits: "Consagrar beneficios para soldados"
 SOV_enshrine_soldier_benefits_desc: "Nada puede realmente pagar u honrar a los soldados que dedican su juventud -los años más preciosos de sus vidas- o incluso sus vidas a la Madre Patria rusa. Desafortunadamente, a pesar de sus sacrificios, las burocracias corruptas del pasado ignoraron sus apelaciones y les negaron sus beneficios legítimos, a veces por negligencia, otras veces por razones más egoístas. Ahora, estamos comprometidos a buscar justicia para estos valientes hombres y mujeres y a corregir las injusticias del pasado."
 SOV_SOF_expansion_desc: ""
 SOV_back_ruble_gold: "Rublo respaldado por el oro"
 SOV_back_ruble_gold_desc: "A medida que nuestro sistema económico se estabiliza, se establece el orden del mercado y los recursos se acumulan de manera constante, estamos entrando en una nueva fase de crecimiento. Para fortalecer aún más nuestra economía, anunciaremos la restauración del patrón oro para el rublo, una de las reformas monetarias más significativas desde el sistema Bretton Woods. Nos alejaremos de la inestabilidad del \"petrodólar\" y brindaremos una confianza renovada y nuevas oportunidades al mercado internacional."
 SOV_merged_tankograds: "Tankograds fusionados"
 SOV_merged_tankograds_desc: ""
 SOV_reform_correctional_instutitions: "Reformar el sistema penitenciario"
 SOV_reform_correctional_instutitions_desc: ""
 SOV_prosperity_for_all: "Prosperidad para todos"
 SOV_prosperity_for_all_desc: ""
 SOV_telecommunications_advancements: "Avances en la telecomunicación"
 SOV_telecommunications_advancements_desc: ""
 SOV_push_towards_autarky: "Impulsar la autarquía"
 SOV_push_towards_autarky_desc: "Una economía autosuficiente no significa cortar todas las conexiones externas. Cualquier nación que aspire a ser fuerte debe priorizar su soberanía económica, y Rusia no es una excepción. A partir de ahora, nuestros valiosos recursos -petróleo, gas natural, madera, grano y más- servirán principalmente a las necesidades de nuestro pueblo. Las empresas estatales que gestionan estos recursos asegurarán que Rusia logre la independencia financiera y técnica en el menor tiempo posible."
 SOV_cut_down_the_red_tape: "Cortar la cinta roja"
 SOV_cut_down_the_red_tape_desc: "Papeleo interminable, reuniones constantes: esta es la realidad en Moscú, donde parece que todos creen que deben controlarlo todo. La burocracia es un desafío común en cualquier Gobierno; si bien puede ayudar a mantener el orden, se convierte en un obstáculo cuando se trata de cuestiones económicas. El tiempo y la eficiencia son tan cruciales para el desarrollo económico como el agua y el aire, y la burocracia desperdicia ambos. Al reducir la redundancia innecesaria, podemos crear un sistema económico más saludable y eficiente."
 SOV_ensure_full_employment: "Garantizar el pleno empleo"
 SOV_ensure_full_employment_desc: "Un empleo estable no solo proporciona ingresos constantes, sino que también ofrece un futuro seguro, lo que aumenta la esperanza y motiva a las personas y familias a trabajar por una vida mejor. El empleo pleno y estable conduce a un mayor consumo, una circulación monetaria más saludable y un PIB más alto. Para lograr esto, introduciremos políticas fiables para crear oportunidades de empleo tanto a nivel corporativo como nacional. Sin embargo, debemos evitar los errores del pasado, donde la economía planificada fomentó la dependencia en lugar de la productividad."
 SOV_encourage_domestic_production_LPDR: "Alentar a la producción doméstica"
 SOV_encourage_domestic_production_LPDR_desc: "En Estados Unidos, empresas como Microsoft, Apple y McDonald's son nombres muy conocidos; en China, marcas como Huawei, Tencent y Lao Gan Ma representan su economía. Sin embargo, en Rusia hay pocas marcas de renombre mundial, y muchas de las que existen son empresas anticuadas de la era soviética, con pocas marcas emergentes que las reemplacen. El gobierno anterior no abordó este problema, pero nosotros lo resolveremos. Un día, \"Made in Russia\" será sinónimo de calidad e innovación."
 SOV_support_MIC: "Apoyar el complejo militar-industrial"
 SOV_support_MIC_desc: ""
 SOV_prosperous_welfare: "Bienestar próspero"
 SOV_prosperous_welfare_desc: "Queremos que nuestra gente no solo viva una vida estable, sino que viva bien. En el futuro, las quejas sobre la falta de variedad y la mala calidad de los quesos, verduras y cafés en los supermercados, la corta vida útil de las bicicletas y la incomodidad de los coches pequeños se desvanecerán gradualmente. La mejora general en los estándares de vida será un claro reflejo de la prosperidad económica de Rusia."
 SOV_populistic_economic_policies: "Políticas económicas populísticas"
 SOV_populistic_economic_policies_desc: "Trabajadores y empresarios individuales han salido a las calles, protestando por los bajos salarios y exigiendo un mayor apoyo del gobierno. Expresan frustración por la falta de atención a sus sugerencias y la incapacidad de responsabilizar a las empresas y empleadores por las violaciones de las leyes y contratos laborales. Aunque algunos puedan ver esto como una señal de inestabilidad social, nosotros lo vemos como una demostración del apoyo popular genuino al Gobierno. Marca el comienzo de una nueva fase en nuestro desarrollo económico. Aumentaremos la inversión en infraestructura y bienestar público, y el pueblo tendrá una mayor supervisión sobre las empresas, asegurando que las inversiones beneficien a proyectos que realmente sirvan al público."
 SOV_increase_education_funding: "Aumentar fondos para los naukogrados"
 SOV_increase_education_funding_desc: "Rusia siempre ha estado llena de genios, pero les costaba destacar. Una de las pocas cosas buenas que lograron los soviéticos fue su programa educativo, que convirtió a la Unión no solo en el país más lector del planeta, sino en un país que podía convertir a un campesino de aldea en un teórico de la fusión nuclear. Debemos replicar este éxito para mejorar el futuro de nuestro país."

 SOV_special_military_operation: "Operación militar especial"
 SOV_special_military_operation_desc: "\n\n\n\n£GFX_SOV_smo_banner\n\n\n\n\n\nDebido a las peculiaridades de la conducción de sus operaciones militares, Rusia tiende a no utilizar todo su enorme arsenal militar y su potencial de movilización. Esto se debe a que la cúpula del país se da cuenta de que, en caso de hostilidades activas, es necesario minimizar la amenaza de una posible escalada del conflicto y evitar una invasión de la OTAN."

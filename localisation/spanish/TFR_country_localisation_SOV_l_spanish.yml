 SOV_political_simulation_category: "Simulación política"
 SOV_zhir_post_war_economy_category: "Reconstrucción económica"
 SOV_zhir_post_war_economy_category_desc: "Ganamos con éxito la Guerra Europea, pero requirió un enorme esfuerzo en términos de producción y reorganización económica. Ahora, nuestro objetivo es recuperar la economía a un estado más sostenible para que nuestro país pueda seguir desarrollándose adecuadamente en la posguerra."
 SOV_african_dawn_category: "Amanecer africano"
 SOV_african_dawn_category_desc: "§GÁfrica§! siempre ha sido explotada por los llamados §Y\"mil millones de oro\"§!. Los métodos cambiaron, por supuesto, pasando del colonialismo puro y duro a tácticas §Yneoimperialistas§! más sutiles de dominación económica. Sin embargo, nada es eterno. Muchas naciones §Gafricanas§!, en particular las de la §Yregión francófona§!, finalmente se están §Calzando§! contra la injusticia que enfrentan en sus vidas. ¡No solo están izando sus banderas nacionales, sino también las ru§Cs§!§Ras§!!\n\nActualmente, las £GFX_army_experience  §OFuerzas de Liberación Africana§! están compuestas por:§Y[SOV_mali_status][SOV_burkina_faso_status][SOV_niger_status][SOV_guinea_status][SOV_senegal_status][SOV_GNB_status]§!"

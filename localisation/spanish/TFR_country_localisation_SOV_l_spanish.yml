 SOV_history_reconciliation_decision: "Construir un §Ycentro de reconciliación histórica§!"
 SOV_tiraspol_civ_investment: "Romper el monopolio de Sheriff"
 SOV_tiraspol_civ_investment_desc: "Tenemos que garantizar que los mercados transnistrios sigan siendo competitivos y, por eso, tendremos que romper el monopolio de Sheriff."
 SOV_tiraspol_mil_investment: "Mejorar la producción militar transnistria"
 SOV_tiraspol_mil_investment_desc: "En estos momentos, Transnistria está aislada por todos lados, y por lo tanto está aislada de las rutas de suministro más \"tradicionales\", por lo que debemos asegurar que haya más producción nacional en Transnistria."
 SOV_transnistrian_question_decision: "Cuestión de Transnistria"
 SOV_transnistrian_question_desc: "Pridnestrovia. Los primeros patriotas del mundo ruso. Cuando la Unión cayó, fueron estos patriotas rusos quienes declararon su intención de reunirse con su nación madre. Y después de un esfuerzo combinado de batallones de voluntarios ucranianos y rusos (así como un ultimátum de los soldados rusos estacionados allí), ha vivido en paz con Moldavia durante 3 décadas.\n\nSin embargo, a medida que se avecina la tormenta, debemos centrarnos en integrar la región en nuestros mercados y ejército. Serán el bastión del mundo ruso."

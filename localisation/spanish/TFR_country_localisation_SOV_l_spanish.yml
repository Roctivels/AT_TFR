 SOV_soviet_army_dynamic_desc: "\n\n\n\n£GFX_SOV_invincible_and_legendary\n\n\n\n\n\n"
 SOV_Permanent_Defense_Readiness: "Preparación militar permanente"
 SOV_Permanent_Defense_Readiness_desc: "\n\n\n\n£GFX_SOV_permanent_defense_readiness\n\n\n\n\n\nCuando cayó la Unión Soviética, Occidente hundió sus garras en nuestras antiguas repúblicas como una manada de buitres. Uno a uno, nuestro bloque cayó cuando Gorbachov se negó a desplegar nuestras tropas que montaban guardia para proteger a la Unión, lo que les permitió retirarse mientras nuestro poder como superpotencia se desmoronaba. Ahora sólo quedaba Rusia, y su punto débil había quedado expuesto a medida que Occidente avanzaba hacia el este.\n\nNo permitiremos que nos invadan como lo hicieron los fascistas un siglo antes. No importa el costo, no importa el prestigio perdido, el ejército ruso se ha mantenido y se mantendrá fuerte, preparado para defender a nuestra nación de cualquier incursión y para proteger a nuestros aliados de los buitres de la UE y Estados Unidos. Puede que no tengamos el prestigio que teníamos hace 50 años, pero nuestro ejército siempre se mantendrá más fuerte que nunca."
 SOV_Permanent_Defense_Readiness_dynamic: "Fuerzas Armadas de Rusia"
 SOV_Permanent_Defense_Readiness_dynamic_desc: "\n\n\n\n£GFX_SOV_permanent_defense_readiness\n\n\n\n\n\nCuando cayó la Unión Soviética, Occidente hundió sus garras en nuestras antiguas repúblicas como una manada de buitres. Uno a uno, nuestro bloque cayó cuando Gorbachov se negó a desplegar nuestras tropas que montaban guardia para proteger a la Unión, lo que les permitió retirarse mientras nuestro poder como superpotencia se desmoronaba. Ahora sólo quedaba Rusia, y su punto débil había quedado expuesto a medida que Occidente avanzaba hacia el este.\n\nNo permitiremos que nos invadan como lo hicieron los fascistas un siglo antes. No importa el costo, no importa el prestigio perdido, el ejército ruso se ha mantenido y se mantendrá fuerte, preparado para defender a nuestra nación de cualquier incursión y para proteger a nuestros aliados de los buitres de la UE y Estados Unidos. Puede que no tengamos el prestigio que teníamos hace 50 años, pero nuestro ejército siempre se mantendrá más fuerte que nunca."

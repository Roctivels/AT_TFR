 SOV_unify_command_structures_rosgvardia_desc: "La principal fuerza del ejército ruso siempre ha sido su espíritu de lucha indomable y su fe en la causa rusa. A veces sucede que los soldados olvidan, se pierden en el campo de batalla y entran en pánico. Y para restaurar su espíritu y guiarlos por el camino correcto, se decidió crear un instituto de comisarios militares. Sus deberes incluirán trabajar con los combatientes, educar y condenar la mala conducta militar. Servirán para fortalecer la disciplina militar en todas las unidades."
 SOV_unify_command_structures_normal_desc: "Los ejércitos ruso y bielorruso tienen una larga experiencia de trabajo conjunto: numerosos ejercicios, no solo de la OTSC, sino también del Estado de la Unión, han hecho una contribución inestimable al desarrollo de nuestras relaciones. Y ahora que la cuestión del Estado de la Unión se ha vuelto más acuciante que nunca, sería lógico unificar el mando de nuestras fuerzas armadas y las Fuerzas Armadas de la República de Belarús. ¡La fuerza está en la unidad!"
 SOV_rollback_serdykovs_reforms_cprf_desc: "Las reformas de Serdyukov han tenido un impacto increíble en la capacidad de combate del ejército ruso: decenas de miles de especialistas militares han perdido sus empleos como parte de la \"optimización\", el trabajo del personal también se ha visto interrumpido. Aunque este descarado parásito fue expulsado de su cargo por corrupción, el regusto permaneció, y muchas innovaciones idiotas aún siguen vigentes. El nuevo ejército soviético se construirá casi desde cero, basándose en la experiencia de los conflictos modernos.\n\n¿Por voluntad de quién permitieron el colapso de nuestro ejército? ¡Por supuesto, por voluntad de Shoigu, él es el mismo parásito que su predecesor! Es hora de lidiar con él y su pandilla. Sin embargo, el tema de las CMP \"Wagner\" sigue sin resolverse...\n\nEs hora de ponerse manos a la obra."
 SOV_rollback_serdykovs_reforms_medvedev_desc: "En el papel, la reforma de las Fuerzas Armadas propuesta por Anatoli Serdiukov parecía excelente: optimización de costos, estructura de personal y la introducción de un nuevo uniforme. Pero en la práctica, la reforma solo ha debilitado a nuestro ejército: se ha recortado un número considerable de especialistas militares. Aunque se le \"pidió\" que renunciara al puesto de Ministro de Defensa, la continuación de los acontecimientos bajo el nuevo jefe del Ministerio no dio el resultado necesario. Es necesario revisar completamente los resultados de la reforma y desarrollar una nueva doctrina basada en la experiencia de los conflictos modernos."
 SOV_patriotic_zealousy_cprf_desc: "El instituto de educación política y trabajo educativo fue una de las características clave de los Ejércitos Rojo y Soviético. Los líderes políticos instruyeron a los soldados rasos en la causa del marxismo-leninismo, les enseñaron el amor a la Madre Patria, y durante la guerra a menudo mostraron el valor del soldado soviético con su ejemplo. Pero con el colapso de la Unión Soviética, esta institución fue disuelta, y en su lugar se introdujeron medios menos efectivos de trabajo político.\n\nLa creación de un instituto similar a la administración política en 2018 fue un paso en la dirección correcta, pero esto no es suficiente. Los oficiales políticos y comisarios serán incluidos en la estructura de mando del nuevo ejército. Necesitaremos todo lo posible para recuperar lo nuestro de las manos de los capitalistas."
 SOV_patriotic_zealousy_medvedev_desc: "El trabajo político y educativo es una parte importante del servicio militar en nuestro país. Aunque nuestro ejército se despolitizó (en su mayor parte) tras el colapso de la Unión Soviética, la necesidad de educar a los soldados con ideas de patriotismo y coraje no ha desaparecido. Al contrario, la amenaza de Occidente se acerca cada año, y por eso trabajar con los soldados se está volviendo necesario. En 2018, se creó la Dirección Principal Político-Militar de las Fuerzas Armadas de la Federación de Rusia, y debemos terminar lo que Vladímir Vladímirovich comenzó."
 SOV_patriotic_zealousy_ldpr_desc: "El patriotismo es una parte integral de la vida militar. Pero el amor ordinario por la Madre Patria y los métodos actuales de educación militar y política no son suficientes para los objetivos establecidos por Zhirinovski. Es necesario inculcar en los corazones de los combatientes el deseo de dar sus vidas por la grandeza de Rusia y el odio a los productos del liberalismo occidental en Europa Oriental. ¡Haremos crecer una victoria militar a partir de una victoria espiritual!"
 SOV_promote_reliable_cadres_cprf_desc: "Ahora nuestro país (especialmente después de las purgas de los generales leales al criminal Shoigú) necesita personal experimentado. Por lo tanto, se decidió llamar a veteranos llenos de patriotismo y experiencia para servir a la Madre Patria nuevamente, lo que pueden aplicar en el campo de batalla. Muchos de ellos participaron en la defensa de la Casa Blanca en el 93 y en las guerras chechenas, pero los oficiales más jóvenes todavía tienen mucho que aprender de ellos."
 SOV_promote_reliable_cadres_medvedev_desc: "A ojos del pueblo, el ejército ruso siempre ha sido y sigue siendo un lugar donde florecen el nepotismo, la corrupción, el robo descarado y otras enfermedades de nuestro sistema. Y todo ello debido a la falta de fiabilidad de nuestros gestores militares, que se lucran con la capacidad de combate de la Madre Patria. Por lo tanto, es necesario llevar a cabo algunos cambios en la cúpula para aumentar la eficacia de las Fuerzas Armadas."
 SOV_new_russian_army_cprf_desc: "La historia demuestra que no hay ejércitos invencibles. Pero si algún ejército se acercó a este orgulloso título, fue el Ejército Rojo, y más tarde el Ejército Soviético. Desde las colinas de Manchuria hasta las montañas de Afganistán y los bosques de Alemania, el soldado soviético trajo la liberación de las cadenas a los pueblos del mundo. Las nubes se ciernen sobre Europa Oriental, pero estamos listos para librar una batalla formidable, una batalla de derechas. Ahora podemos decir con orgullo: ¡El Ejército Rojo es el más fuerte de todos!"
 SOV_new_russian_army_medvedev_desc: "El ejército ruso moderno ha recorrido un largo camino en su existencia: desde la confusión y la vacilación de los años 90, desde las migajas que quedaban del poder del Ejército Soviético, hasta el momento actual, en el que es uno de los más fuertes del planeta, si no el que más. Renacidas de las cenizas como el mítico ave Fénix, nuestras fuerzas armadas son ahora capaces no solo de defender nuestras fronteras, sino también de librar una guerra a gran escala. La situación geopolítica actual sugiere que la gente educada no se quedará sin trabajo."
 russia.46.b: "¡Rápido! ¡Rápido!"

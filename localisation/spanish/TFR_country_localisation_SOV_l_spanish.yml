 russiaflavor.45.t: "Cartel"
 russiaflavor.45.d: "Las oscuras calles de Donetsk lentamente cobraban vida. Andréi, que llevaba viviendo en esta ciudad casi dos décadas, caminaba despacio por una ruta familiar, observando los edificios que recientemente habían sido marcados por la guerra. Algunas fachadas ya habían sido reparadas, y otras aún tenían ventanas vacías, pero la ciudad respiraba más profundamente y con más confianza que antes.\n\nEsa noche se encontró en el mercado de la ciudad. Y de repente, la luz brillante del neón, que destacaba una silueta familiar en la oscuridad. \"Donetsk Anime Store\", decía un enorme cartel sobre un pequeño edificio. En el cartel, Suzumiya Haruhi sonreía, y debajo brillaba: \"¡Hemos reabierto!\" Andréi se detuvo, sintiendo un extraño calor en el pecho. Recordó esta tienda de cuando era muy joven, y fue allí donde conoció el mundo de la animación japonesa. Pero luego llegaron los bombardeos, la guerra, el interminable lamento de las sirenas y la muerte. Parecía una eternidad.\n\nPero ahora el neón estaba encendido de nuevo, reflejándose en los charcos sobre el asfalto. Andrey sonrió. Había algo importante en esa luz; no solo la reapertura de una tienda, sino una señal. La vida estaba regresando. No solo en forma de pan y techos sobre la cabeza, sino también en algo tan pequeño, innecesario para sobrevivir, pero tan querido.\n\nAndréi empujó la puerta. El interior olía a volúmenes nuevos, las portadas brillaban en las estanterías, y detrás del mostrador estaba una chica sonriente con un disfraz de sirvienta que se inclinó ante el visitante de medianoche.\nAndréi asintió en respuesta. La guerra retrocedía; poco a poco, por señales, por sonrisas. Y eso era solo el comienzo."
 russiaflavor.45.a: "El corazón de piedra vuelve a latir."
 russiaflavor.46.t: "Cornucopia"
 russiaflavor.46.d: "Una llovizna empapaba la calle de San Petersburgo mientras Yegor se dirigía a su centro comercial favorito. Gracias a los constantes aumentos salariales, podía permitirse cosas cada vez más caras y alimentos de alta calidad. El chico estaba muy contento con esto y disfrutaba de todos los beneficios, ahorrando dinero para un nuevo apartamento en el camino.\nY ahora está dentro.\nLo primero que llama la atención son las lujosas tiendas de ropa. Sombreros, gorras, chaquetas, abrigos, camisetas, pantalones, vaqueros, zapatos y mucho más están a la venta. Muchas marcas caras compiten por el comprador, y cada producto tiene una calidad excelente, que a menudo supera incluso a la europea. Luego están las perfumerías: una enorme variedad de aromas invade a Yegor, y literalmente cada uno de ellos provoca un verdadero deleite. Subiendo al segundo piso, descubre una variedad de tiendas: algunas ofrecen el equipo más avanzado y de alta calidad de Japón y China, otras proporcionan una selección de los mejores muebles de toda Europa Oriental, y otras pueden brindar a niños y adolescentes una infancia feliz, con la que solo podrían soñar. En el tercer piso, su atención se dirige a la selección de los mejores restaurantes de Rusia, cada uno capaz de ofrecer un sabor inolvidable de una variedad de platos de todo el mundo. Cerca hay una zona de comida rápida, que es más barata, pero incluso allí las cadenas de comida rápida usan productos de primera clase y ayudan a una amplia variedad de personas a tomar un bocadillo rápido: desde estudiantes y escolares hasta padres y gerentes de negocios.\nYegor sonrió, mirando a su alrededor todas las riquezas de este centro comercial, uno de los miles que hay en toda su patria. La nueva gente realmente había logrado cambiar Rusia, convirtiéndola en una superpotencia económica donde todos podían permitirse lo que quisieran. Yegor fue a la cafetería \"Panaderías francesas\", su favorita personal. Tomando un croissant y un café, se sentó en uno de los asientos vacíos y miró por la ventana. Se dio cuenta de lo feliz que era de vivir en Rusia."
 russiaflavor.46.a: "¡Rusia es un alma generosa!"
 russia.763.k: "¡¿Shevchenko?!"

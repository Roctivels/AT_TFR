 SOV_new_image_of_yeltsin: "Nueva imagen de Yeltsin"
 SOV_neo_yeltsinism: "Neoyelstinismo"
 SOV_neo_yeltsinism_desc: "\n\n\n\n£GFX_triumph\n\n\n\n\n\nEn el Estado ruso, Yeltsin desempeñará claramente un papel importante como figura ideológica. La imagen de un abuelo borracho que destruyó el coloso comunista de un plumazo es mucho más atractiva de lo que parece ahora. Un \"Trump ruso\", que por primera vez en muchos años llevó a cabo una verdadera política nacional, que fue capaz de mantener y luego fortalecer el país en los difíciles tiempos de las reformas de mercado, un caballero de la Casa Blanca, que destruyó dos oleadas de escoria rojiparda neo-soviética; esta es, a grandes rasgos, la imagen que tendrá en solo unas décadas el hombre que fue denostado por la gran mayoría.\n\nY no es solo porque los rusos estén cada vez más convencidos de la verdad del camino de desarrollo yeltsinista, sino también por la reconsideración de la propia personalidad del primer presidente de Rusia. Borís Nikoláyevich fue y será, probablemente en toda la historia rusa, el gobernante más cercano a toda la población, a todo el pueblo de Rusia. Por supuesto, habrá exageraciones y simples malentendidos de la política de Yeltsin, pero ¿importa eso cuando hablamos de un presidente que proclamó una cruzada contra el terrorismo antes del 11 de septiembre y avivó las llamas de la guerra popular contra él? Al mismo tiempo, a diferencia de la imagen de Lenin en el Estado soviético, la imagen de Yeltsin no se convertirá en un objeto de herbario, después de quien todo, desde granjas avícolas hasta rompehielos nucleares, llevará su nombre. No, la imagen de Borís Nikoláyevich debe convertirse en un símbolo de la pasión y la fuerza del pueblo ruso, no un anciano de retratos, sino un hombre cuyo nombre se da solo a aquellos objetos que \"lo que le hace bien a los rusos mata a los alemanes\"."

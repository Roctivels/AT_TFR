 russia.283.a: "democRATA..."
 russia.284.t: "El cielo de noche de Bagdad"
 russia.284.d: "No te metas con la guerra. Aquí hay otros tipos. Esto no es Alemania, esto no es Afganistán. George, tus soldados serán destrozados aquí. 250 mil soldados selectos de Irak. Lo volarán todo. Recorrerán todo el desierto en una hora, volarán todos tus destructores, todos tus periodistas, diplomáticos. George, eres un vaquero. Detente, c..., termina, guarda los cartuchos en el almacén y olvídate de tu padre. Tuvimos un imbécil, vengó a su hermano, c..., y el gran Imperio ruso se derrumbó. Y hubo otro excéntrico, se vengó de su abuelo, y la Unión Soviética se derrumbó. Y tú cometerás el mismo error de nuevo. Olvidas a papá, papá se ha abierto camino. Piensa en el futuro de América. Se está muriendo. Tus jóvenes están huyendo de tu país. Nadie quiere vivir en Norteamérica, ¡nadie! ¡Este mercadillo, c...! Dólar, dólar, dólar, ... ¡Este sucio papel verde! Ni un alma, no hay música, c..., no tienes escritores. ¡El mundo entero escucha a Chaikovski, Dostoyevski, c...! Festivales, deportes solo en Rusia... Y aquí en Irak. Aquí aman al presidente, pero te desprecian, te desprecian."
 russia.284.a: "Vengaremos el legado de Huseín."
 russia.284.b: "Las relaciones con Irán son mucho más importantes."
 russia.285.t: "Viktor But escapa de la guerra americana"
 russia.285.d: "A pesar de numerosos reportes de anarquía completa en los EE.UU, Viktor But ha logrado escapar devuelta a su Madre Patria. Hoy finalmente piso en su tierra natal. No ha revelado ninguna parte de su camino, pero prometió escribir un libro sobre su experiencia. Sus siguientes pasos en Rusia son desconocidos, pero mostro un interés en unirse a vida política del país."
 russia.285.a: "Verdaderamente admirable."
 russia.285.b: "Verdaderamente admirable."
 russia.285.c: "Manténganlo vigilado."
 russia.285.k: "Verdaderamente admirable."
 russia.286.t: "Viktor But se une al PLDR"
 russia.286.d: "¡Infame traficante de armas Viktor But se ha lanzado con el PLDR!"
 russia.286.a: "Tenemos un lugar para un hombre con sus talentos."
 russia.287.t: "Víktor But dona para el desarrollo de Rusia"
 russia.287.d: ""
 russia.287.a: "¡Un verdadero patriota!"
 russia.288.t: "Rashkin encierra a But"
 russia.288.d: "'¡El no es un comunista! ¡El es un fascista nacionalista, chauvinista ruso!' - Rashkin."
 russia.288.a: "De una prisión a otra."
 russia.289.t: "Asamblea del Zemski Sobor"
 russia.289.d: "Por primera vez en casi 400 años, el Zemski Sobor ha vuelto a reunirse. Esta vez, para elegir al nuevo zar de la Gran Rusia."
 russia.289.a: "¡Los Kirílovich liderarán Rusia!"
 russia.289.b: "¡Los Mijáilovich liderarán Rusia!"
 russia.289.c: "¡La popularidad de Gavrílov entre los soldados lo llevó al trono!"
 russia.290.t: "Marcha del día del Zar"
 russia.290.d: "Recientemente, monárquicos de las principales ciudades han empezado a organizar marchas en nombre de los tiempos zaristas. Aunque ha sido normal desde que llegamos al poder, estas nuevas marchas han sido focos de gente que quiere el regreso total de los monarcas, fortalecidos por la reciente aprobación de \"regente\".\nCada vez más monárquicos han estado reuniendo apoyo en torno a la idea del regreso del zar... Bueno, de uno de ellos."
 russia.290.a: "Deberíamos pensarlo."
 russia.290.b: "Los Románov son cosa del pasado."
 russia.291.t: "El fin del gobierno provisional"
 russia.291.d: "Parece que la era del gobierno provisional en Rumania está llegando a su fin. El régimen prorruso, que se fundó durante la Guerra Europea, no agradó a mucha gente y fue la causa de disputas interminables dentro del propio país. Y ahora el actual presidente [ROM.GetLeader] ha anunciado las tan esperadas elecciones en el país.\n\nLos dos candidatos que parecen más capacitados en este momento son dos. El primero es George Simion, un conservador llamativo y anticomunista inflexible. Ya ha logrado reunir a los nacionalistas a su alrededor con promesas de renegociar un tratado de paz injusto. El segundo es Calin Georgescu, un candidato favorable a Rusia y partidario de centrarse en el desarrollo interno de Rumania. Las elecciones se celebrarán pronto, y solo podemos esperar el resultado."
 russia.291.a: "¡Rumbo a un nuevo comienzo!"
 russia.292.t: "Referendo en Transilvania"
 russia.292.d: "George Simion, elegido democráticamente, no tardó en dar su primer paso. Como prometió en su campaña electoral, comenzó de inmediato a tomar medidas activas contra Transilvania. Así, se han impuesto responsabilidades serias y Rumania ya amenaza con sanciones contundentes si la situación no se resuelve. El propio Simion pide un referendo inmediato sobre el estatus del país y ya ha hecho un llamamiento, en el que, entre otras cosas, apoyó a los separatistas rumanos que actúan contra el Gobierno actual en los Cárpatos. El Gobierno de Transilvania ha aceptado provisionalmente el referendo, pero circulan rumores de que el líder actual está intentando obtener apoyo del presidente húngaro."
 russia.292.a: "Interesante."
 russia.293.t: "Formación de la Autonomía del País Sículo"
 russia.293.d: "Tras largas negociaciones, el Gobierno de Transilvania acordó celebrar un referendo sobre la adhesión a Rumania. Como resultado, más del 80% de la población del país votó a favor de la reunificación. Según el nuevo tratado, que se firmará pronto, Transilvania vuelve a formar parte de Rumania. Al mismo tiempo, la minoría húngara obtendrá su autonomía en la parte de la provincia del País Sículo y la protección oficial del Estado.\n\n[ROM.GetLeader] ya ha anunciado que este acto es una corrección de un gran error histórico y ha declarado su intención de defender los derechos de los rumanos en todo el mundo."
 russia.293.a: "Esto fue inesperado."
 russia.294.t: "Tratado de Budapest"
 russia.294.d: "Los presidentes rumano y húngaro, George Simion y Viktor Orbán respectivamente, mantuvieron conversaciones telefónicas de emergencia sobre el estatus de Transilvania. Durante las conversaciones, los líderes parecen haber logrado un acuerdo satisfactorio para ambas partes. Así, las provincias del sur volverán a formar parte de Rumania, mientras que en el norte se establecerá una Mancomunidad de Transilvania del Norte, que formalmente será parte de Rumania, pero tendrá una amplia autonomía y el derecho a tener su propio líder de forma democrática."
 russia.294.a: "Eso fue interesante."
 russia.295.t: "Hombre superfluo"
 russia.295.d: "¿Cómo viven como si nada hubiera pasado? Otro trago, la amargura del vodka rancio reemplazó brevemente la amargura de la derrota. Vanya de la fábrica se ha ido, tan trabajador. Vitya se ha ido, Dima se ha ido. ¿Y a ellos qué les importa eso? No les importa. Como si no hubiera guerra. Como si el país no se estuviera desmoronando. Como si todos hubieran regresado de los campos... Otro trago... ¿Quizás no se han enterado? Quizás se lo perdieron... ¡Tengo que decírselo, pase lo que pase! Llaves en mano. ¿Ropa? Al diablo con ella. ¡Tengo que hacerlo! ¡Cuanto antes! ¿Y si vuelve a pasar? La puerta se abre con un fuerte crujido, un frío agudo golpea el cuerpo casi desnudo. Los faros del coche iluminan los copos de nieve que caen lentamente. En algún lugar a lo lejos, la ciudad retumba. De repente hay un rugido, ¡un silbido! ¡Eso es! Pero no, es solo un avión que pasa volando, con las luces encendidas en algún lugar del cielo. Quizás lo han descubierto. Quizás se han resignado, no como yo."
 russia.295.a: "O quizás incluso se olvidaron de mí..."
 russia.296.t: "¡Elecciones!"
 russia.296.d: ""
 russia.296.a: "heghgsedgh"
 russia.297.t: "Hungría defende a Transilvania"
 russia.297.d: "Parece que la situación en los Cárpatos se está caldeando. Recientemente, el presidente húngaro, Viktor Orbán, envió un mensaje de emergencia a la nación, en el que condenó enérgicamente las acciones de Rumania hacia sus vecinos y declaró que el pueblo húngaro no permitirá que países independientes dicten su voluntad por la fuerza. Se espera que Orbán envíe pronto fuerzas de paz para preservar la soberanía de Transilvania. Aunque [ROM.GetLeader] ha condenado dicha retórica, parece que aún no se prevé un conflicto a gran escala."
 russia.297.a: "Bien."
 russia.299.t: "Victoria de Simion"
 russia.299.d: "En las extraordinarias elecciones rumanas, George Simion ganó. Un nacionalista conservador acérrimo, supo aprovecharse del orgullo herido del pueblo y así aseguró su victoria. Uno de los objetivos de su campaña fue devolver Transilvania a su puerto natal. Si lo logra o no, el tiempo lo dirá."
 russia.299.a: "Interesante."
 russia.300.t: "El Veche comienza a sesionar"
 russia.300.d: "Tras la rápida reorganización de la estructura política rusa tras nuestra Revolución, el Líder Solar, Aleksandr Duguin, ha concebido que la mejor estrategia es establecer finalmente una nueva forma de gobierno verdaderamente democrática en Eurasia. Se ha establecido el Veche, similar al antiguo Sóviet Supremo, pero con mayor representación y participación interclasista, y con numerosas \"agrupaciones políticas\" que ahora presionan para obtener el apoyo de sus diputados.\n\nEl Líder Solar ha declarado que el nuevo sistema aún se encuentra en un período de transición, ya que el objetivo del eurasianismo es la democracia plena, pero que tal experimento no puede lograrse mientras el fascismo social totalitario occidental campe a sus anchas ante nuestras puertas."
 russia.300.a: "Que cien flores florezcan."
 russia.301.t: "Regreso de la partidocracia"
 russia.301.d: "Con cada día de resurgimiento del gobierno comunista en Rusia, se hace más evidente que el regreso a los \"viejos tiempos\" también fue seguido por la vuelta del control absoluto del Partido. Cada vez más personas se dan cuenta de que para ser ascendido y lograr un mayor respeto, uno necesita ser miembro del Partido.\nAl igual que en la URSS, se está formando una casta apparátchik inflada, los Comités del Partido reciben más trabajo y más privilegios, así como una creciente necesidad de algunas prácticas venales.\nPor supuesto, los nuevos miembros creen y siguen la línea del partido establecida por el Politburó, salvo por alguna charla trivial en sus cocinas.\nSin embargo, no es, de hecho, negativo; tal cantidad de burocracia en funcionamiento ayuda a centralizar el liderazgo en los lugares locales, la gente sigue contenta ya que los beneficios de los programas sociales revividos superan la terquedad burocrática. Mientras la economía crezca rápidamente, el Politburó no tiene nada que temer."
 russia.301.a: "El Partido es la mente, el honor y la conciencia de nuestra era."
 russia.302.t: "Reacción contra las reformas de Rashkin"
 russia.302.d: "En los últimos días, los edificios gubernamentales en las principales ciudades han visto una afluencia de manifestantes anti-Rashkin. A primera vista, podría parecer que son molestos putinistas y otros partidarios del antiguo régimen, pero al observar más de cerca, se pueden ver muchos comunistas y sus consignas, a veces superando a los demás. Afirman que Raskhin es un liberal, un espía occidental y un nuevo Gorbachov, y los comunistas añaden que traicionó los preceptos del verdadero leninismo y comenzó una liberalización perjudicial que llevará a la joven RSFSR al desastre.\nLos Servicios Secretos, por orden del Politburó, han comenzado a investigar posibles financiamientos de personas anti-comunistas, pero hasta ahora no se ha logrado nada.\nSin embargo, esos manifestantes parecen ser solo una minoría vocal; la absoluta mayoría de la población actualmente está cosechando los beneficios de la nueva economía social y está satisfecha con los vientos de cambio traídos por los reformadores rashkinistas."
 russia.302.a: "El vendaval no se detiene en la frontera, y nosotros tampoco."
 russia.303.t: "Nuevas caras de la nueva Rusia"
 russia.303.d: ""
 russia.303.a: "Ganan los designados de Zhirinovski."
 russia.303.b: "Prevalecen los ministros del Consejo."
 russia.304.t: "Tsariov anuncia referendo"
 russia.304.d: "Oleg Tsariov, en su reciente discurso, zanjó de una vez por todas la cuestión de la integración de Novorrusia y anunció un referendo sobre la integración en Rusia."
 russia.304.a: "¡Necesitamos empezar a prepararnos!"
 russia.305.t: "Referendo exitoso"
 russia.305.d: "Como resultado del referendo celebrado en el territorio de Novorrusia, la abrumadora mayoría de los residentes votó a favor de la reunificación con Rusia. Según datos oficiales, más del 90% de los participantes en la votación apoyaron la integración de la república en Rusia. El Gobierno calificó este evento como \"la voluntad del pueblo\" y enfatizó que Moscú respeta la decisión de los residentes de la región. Las autoridades también dijeron que la reunificación completa un proceso de varios años de \"restauración de la justicia histórica\", citando raíces culturales e históricas comunes.\n\nSe llevaron a cabo marchas y celebraciones a gran escala en las ciudades de Rusia y Novorrusia. Miles de personas con banderas y símbolos salieron a las calles para celebrar el evento. Se llevaron a cabo conciertos, fuegos artificiales y celebraciones masivas en Moscú, Rostov del Don, Donetsk y Lugansk. \"Esta es una celebración de la verdad y la unidad de nuestro pueblo\", dijo Leonid Pásechnik en una entrevista. Mientras tanto, varios países occidentales criticaron el referendo, calificándolo de \"ilegítimo\", pero el Kremlin rechazó estas declaraciones, enfatizando que la voluntad del pueblo de Novorrusia es el único factor determinante."
 russia.305.a: "Rusia recupera a sus hijos perdidos."
 russia.306.t: "Referendo apresurado"
 russia.306.d: "A pesar de que el referendo fue exitoso, el mal trabajo de las mesas electorales y la mala organización en general nos dejaron en una mala posición."
 russia.306.a: "Sin fracasos, no hay victorias."
 russia.307.t: "Rumores de ofensiva ucraniana en el Dombás"
 russia.307.d: ""
 russia.307.a: "Contacten a los novorrusos."
 russia.308.t: "Novorrusia solicita intervención"
 russia.308.d: ""
 russia.308.a: "¡Hoy comienza la desnafizicación de Ucrania!"
 russia.308.b: "¡Hoy comienza el sufrimiento de nuestros hermanos novorrusos!"
 russia.308.c: "¡Hoy se reclama la gloria de Rusia!"
 russia.309.t: "Punto de refugiados norteamericanos establecido en Kamchatski"
 russia.309.d: "El \"sueño americano\" ahora se asemeja más a una pesadilla. Los coqueteos del gobierno estadounidense con el radicalismo político y el liberalismo globalista han llevado a que Norteamérica sea ahora un sangriento campo de batalla entre el Gobierno federal, los movimientos separatistas, los rebeldes comunistas y las milicias de ultraderecha. Las megaciudades más grandes -Nueva York, Chicago, Los Ángeles- se han convertido en un escenario de lucha callejera, donde los civiles quedan atrapados entre la espada y la pared.\n\nPero lo interesante es que nuestros diplomáticos y servicios de inteligencia están informando de un éxodo masivo de la población. Miles de estadounidenses desesperados están huyendo a los puertos del Extremo Oriente, intentando por cualquier medio abandonar el país envuelto en llamas. Los informes son particularmente alarmantes sobre la aproximación a nuestros principales puertos -Vladivostok, Petropávlovsk-Kamchatski, Magadán- de una flotilla entera de embarcaciones civiles superpobladas e incluso buques de guerra que transportan no solo refugiados, sino también desertores, activistas políticos y militantes de facciones en guerra.\n\nMuchos de los refugiados eligieron Rusia como lugar de residencia temporal para una futura reubicación en Europa o Asia, pero también hubo quienes ya habían solicitado la ciudadanía rusa con la esperanza de escapar de futuras tormentas en el \"arca\" rusa de estabilidad y prosperidad. De una forma u otra, el destino de todas estas personas recae ahora sobre los hombros del Gobierno ruso."
 russia.309.a: "Haremos lo que podamos por ellos."
 russia.310.t: "Nóvikov purga el Politburó"
 russia.310.d: ""
 russia.310.a: "Debemos salvaguardar el control del Partido."
 russia.311.t: "Discriminación contra la minoría rusa en el Báltico"
 russia.311.d: ""
 russia.311.a: "Los responsables pagarán."
 russia.312.t: "La Resistencia Ucraniana"
 russia.312.d: "Quien piense que los banderistas han sido derrotados tras nuestra victoria sobre la OTAN es un necio. Los hombres que derramaron su sangre por su ideología no desaparecieron, y no permitirán que la caída de su Gobierno les impida luchar contra nosotros.\n\nLa \"Resistencia Ucraniana\" se formó recientemente a partir de banderistas y soldados del régimen anterior. Aunque por ahora se limitan a enfrentamientos callejeros con las fuerzas del orden y contramanifestantes, si el Gobierno ucraniano no puede contenerla, podría convertirse en una resistencia armada abierta.\n\nRecordamos cómo fue el Euromaidán. Aunque frases como \"Moscovitas en las picas\" se hayan vuelto trilladas, no podemos olvidar que los grandes incendios pueden comenzar con una sola chispa. No podemos permitir que se repita lo de la Casa de los Sindicatos de Odesa, donde nuestros valientes patriotas fueron quemados vivos por turbas similares. Debemos acabar con esto, y acabar con esto ahora."
 russia.312.a: "Los terroristas muestran sus caras una vez más."
 russia.313.t: "Protestas nacionales en Ucrania"
 russia.313.d: "Gracias a la \"increíble\" gestión de la crisis por parte de nuestras autoridades, el movimiento antirruso se dispone ahora a repetir el Euromaidán.\n\nGenial. Tendremos que conseguir más fuerzas y mano de obra para combatir este problema, y parece que la reconciliación tendrá que esperar mucho tiempo.\n\nAun así, es una pena. Estas protestas se han generalizado y el gobierno ucraniano no puede responder a ellas de ninguna manera.\n\nIgual que el último Euromaidán, ¿eh? Cuando Yanukóvich dejó morir a los manifestantes prorrusos, cuando huyó a nuestras fronteras en lugar de quedarse en Ucrania para contraatacar. El idiotismo y la estupidez han vuelto a causar el derramamiento de sangre rusa."
 russia.313.a: "Joder."
 russia.314.t: "Fin de las protestas"
 russia.314.d: "Afortunadamente, hemos logrado sofocar estas protestas.\n\nArrestar a los organizadores y suprimir sus reuniones ha hecho maravillas y ahora el Gobierno ucraniano está seguro en su posición. Así como el Ejército Rojo aplastó a los banderistas después de su victoria, nosotros también lo hicimos.\n\nSin embargo, no es momento de quedarse de brazos cruzados. Ucrania todavía tiene una tonelada de veteranos de guerra del lado opuesto que podrían unirse a movimientos similares, y es nuestra tarea evitarlo. Deben ser reintegrados en la sociedad, pero no en la medida en que Jruschov lo hizo con los indultos del Ejército Insurgente Ucraniano.\n\nEn cualquier caso, parece, por ahora, que la lucha ha terminado. La década de rencores ha llegado a su fin, y Ucrania avanza hacia el futuro junto a nosotros, tal como lo habíamos hecho durante todos los siglos pasados. El tiempo curará todas las heridas, nos aseguraremos de ello."
 russia.314.a: "Finalmente..."
 russia.315.t: "Destino de Shoigú"
 russia.315.d: "Una de las principales caras del régimen de Putin es Shoigú, el ministro de Defensa y exbombero, que no ha hecho nada por nuestro ejército en decadencia tras las reformas forzadas de Serdiukov. Fue respaldado por Yeltsin en su golpe de octubre de 1993, tras el cual la carrera de Shoigú despegó. Este hombre es un publicista común y un trepador, pero no un militar... Pero eso no significa que no tenga habilidades que no podamos usar. ¿Cuál es su lugar en la nueva Rusia soviética?"
 russia.315.a: "Todavía podría ser útil..."
 russia.315.b: "Será degradado, privado de todos los premios, y encarcelado."
 russia.315.c: "¡No es suficiente! Es necesaria una purga masiva."
 russia.316.t: "Destino del Centro Yeltsin"
 russia.316.d: "Uno de los periodos más vergonzosos de la historia rusa son los años de Yeltsin en los años 90, y nada lo subraya más que el maldito Centro Yeltsin, situado en la llamada \"capital liberal\" de Ekaterimburgo. Muchos patriotas quieren que desaparezca, y estamos dispuestos a aceptarlo. Quizás la destrucción del Centro Yeltsin sería un gran símbolo de la entrada de Rusia en una nueva era...\n\n¿Pero vale la pena?\n\n¿Quizás no deberíamos destruir este costoso complejo, sino convertirlo en el Museo de los Crímenes de la Rusia Capitalista? De esa manera, podemos conmemorar permanentemente los 30 años de sufrimiento que Rusia ha soportado."
 russia.316.a: "¡Derríbenlo!"
 russia.316.b: "¿El Museo de los Crímenes en la Rusia Capitalista? Suena interesante..."
 russia.317.t: "¿Matrimonio igualitario en Rusia?"
 russia.317.d: "La historia de las relaciones entre personas del mismo sexo en Rusia es larga y complicada. En los primeros años de la Unión Soviética, nació su tolerancia, pero con el tiempo disminuyó gradualmente. Bajo Vladímir Putin, los matrimonios entre personas del mismo sexo se legalizaron en muchos países del mundo, pero en Rusia seguían siendo ilegales. Después de que los comunistas llegaron al poder, este tema se planteó de nuevo, y tras la reciente derogación de todas las leyes de blasfemia, el debate alcanzó su punto álgido. En una reciente \"Línea Directa\" con el presidente ruso Valeri Rashkin, se le preguntó sobre la legalización del matrimonio homosexual en Rusia.\n\n\"Valeri Fiódorovich, buenas tardes, soy un activista de \"Rusia del Futuro\", y tenemos una pregunta muy importante para usted\".\n\"Buenas tardes\".\n\"Valeri Fiódorovich, ¿qué pasa con los matrimonios homosexuales? Este tema se plantea cada vez con más frecuencia, y nos gustaría saber si se legalizarán. ¿Lo discuten en el partido?\"\n\"Escuchen, en su opinión, ¿se persigue ahora en nuestro país a las personas de orientación no tradicional? ¿Restringimos sus derechos de alguna manera? Todas las leyes represivas han sido derogadas, ¿qué más quieren?\"\n\"Legalización... matrimonios homosexuales...\"\n\"OK, entonces dígame al menos un país socialista donde estén permitidos\".\n\"En Cuba... El matrimonio homosexual está permitido en Cuba\".\n\"¿Sabía que allí se celebró un referendo sobre su legalización? Bueno, si tuviéramos un referendo, ¿le importaría?\""
 russia.317.a: "\"Sí, bastante. Gracias por la respuesta\"."
 russia.318.t: "Resultado del referendo"
 russia.318.d: "La decisión de Rashkin de celebrar un referendo fue recibida de forma ambigua por la gente: mientras los defensores de los valores tradicionales insistían en que el mero hecho de celebrar un referendo era otro golpe para Rusia, los activistas radicales LGBTQ+ hablaban del matrimonio igualitario como un derecho humano inalienable, y que debía resolverse sin referendo. Al final, el referendo se celebró pacíficamente y casi sin incidentes.\nResultado: 84,57% en contra y 15,42% a favor.\nLos matrimonios entre personas del mismo sexo siguen prohibidos en Rusia."
 russia.318.a: "\"¡Te casarás en tu hospital psiquiátrico!\""
 russia.319.t: "Formación de \"Rusia Nueva\""
 russia.319.d: "Tras el manifiesto de la recién formada \"Rusia Popular\", el partido \"Gente Nueva\" comenzó a dar pasos para encajar en el nuevo mecanismo de la política rusa. Habiendo reunido a liberales dispuestos a trabajar con el Estado, el partido \"Gente Nueva\" anunció su propio manifiesto \"Rusia Nueva\" y la formación de Rusia Nueva como un nuevo partido en respuesta a Rusia Popular. El manifiesto definió los objetivos del partido y los planes para la nueva Rusia. La primera reunión eligió al líder del partido: Aleksandr Nechayev."
 russia.319.a: "¿Qué? No me esperaba esto."
 russia.320.t: "Establecimiento de la Fuerza de Autodefensa Rusa"
 russia.320.d: ""
 russia.320.a: "No tenemos más remedio que acobardarnos..."
 russia.321.t: "La OTAN exige reparaciones de guerra"
 russia.321.d: ""
 russia.321.a: "No tenemos más remedio que aceptar..."
 russia.321.b: "Intentemos negociar los términos."
 russia.322.t: "La OTAN acuerda modificar las reparaciones"
 russia.322.d: ""
 russia.322.a: "Excelente."
 russia.323.t: "La OTAN deniega modificar las reparaciones"
 russia.323.d: ""
 russia.323.a: "Que así sea."
 russia.324.t: "Invitación a la AED"
 russia.324.d: ""
 russia.324.a: "Da cho-to ne..."
 russia.325.t: "Las ciudades del sol"
 russia.325.d: "El progreso es el futuro, y el futuro pertenece al comunismo. Tras la nueva iniciativa del Partido de intensificar la financiación científica para perseguir el ideal utópico, han surgido o se han reconstruido docenas de centros de investigación. Sin embargo, el más asombroso y avanzado de ellos, \"Empresa 3826\", se ha construido en las zonas montañosas de nuestro Kazajistán soviético.\nAllí se realizan experimentos innovadores en los campos de los estudios biológico-botánicos, la medicina experimental y todo tipo de tecnología avanzada, todo ello llevado a cabo en enormes complejos que llevan el nombre de afamados científicos soviéticos y rusos, mientras que ingenieros e investigadores viven en ciudades construidas a propósito cerca de sus instalaciones.\nLa mente se desborda con ideas sobre el avance y la mejora de la tierra de nuestros antepasados, desde la inteligencia artificial y la automatización hasta las ciudades voladoras, una de las cuales podría quizás algún día convertirse en la nueva capital de la nueva Unión.\nEsta Empresa seguramente se convertirá en la cuna de muchas tecnologías del mañana."
 russia.325.a: "El futuro será hermoso. Fantásticas ciudades solares se levantarán."
 russia.326.t: "La guerra civil colombiana"
 russia.326.d: "Con el estallido de las hostilidades en Colombia, tenemos que tomar una decisión sobre qué facción apoyar en su lucha armada para unir el país."
 russia.326.a: "Apoyaremos al Gobierno oficial."
 russia.326.b: "Apoyaremos al Ejército de Liberación Nacional"
 russia.326.c: "Apoyaremos al Frente Carlos Patiño."
 russia.327.t: "Llega la ayuda rusa"
 russia.327.d: "A pesar de los desacuerdos políticos, Rusia nos ha enviado importantes paquetes de apoyo, que en su mayoría incluyen armas. Siempre hemos sido amigos de los rusos y continuaremos nuestra fructífera relación."
 russia.327.a: "Spasibo, tovarishch fashist!"
 russia.327.b: "Spasibo, Russkiye!"
 russia.328.t: "Noticias falsas en redes sociales"
 russia.328.d: "En los últimos días, el bombardeo desenfrenado de noticias falsas en las redes sociales ha provocado una desestabilización masiva en varios sectores de nuestro país."
 russia.328.a: "¡¿Quién está detrás de esto?!"
 russia.329.t: "Mirónov respalda a Medvédev"
 russia.329.d: "Hoy, el líder del partido de izquierda RJ-PV respaldó a Dmitri Medvédev y a su partido Rusia Unida en las próximas elecciones presidenciales. Este anuncio era ampliamente esperado por los analistas, ya que RJ-PV ha apoyado en gran medida al predecesor de Medvédev, y Serguéi Mirónov elogió las promesas del candidato presidencial de democratizar aún más el país. A medida que la campaña electoral continúa desarrollándose, el apoyo de la izquierda moderada será un gran impulso para Rusia Unida, que busca obtener otro mandato para gobernar la nación."
 russia.329.a: "Los patriotas deberían permanecer unidos."
 russia.330.t: "RJ-PV se une a la coalición del PCFR"
 russia.330.d: "En una rueda de prensa matutina, el líder de RJ-PV, Serguéi Mirónov, anunció el apoyo de su partido al PCFR en las próximas elecciones presidenciales. Considerado un modesto revés, ya que el RJ-PV tiene un historial de cooperación con Rusia Unida, es una señal de que los vientos de la política rusa están cambiando. Con el PCFR, que algunos esperan que tenga su mejor desempeño desde 1996, el apoyo de la oposición de izquierda moderada puede ser un indicador temprano de lo que está por venir a medida que se desarrolla la acalorada campaña electoral."
 russia.330.a: "Los socialistas deberían permanecer unidos."
 russia.331.t: "Ataques terroristas en Ucrania occidental"
 russia.331.d: ""
 russia.331.a: "¡Acaben con esos matones!"
 russia.332.t: "Revuelta abierta en Ucrania occidental"
 russia.332.d: ""
 russia.332.a: "No aprendieron la última vez."
 russia.333.t: "Reforma del Parlamento Soviético"
 russia.333.d: "El Partido Comunista de la Federación de Rusia planea reformar el parlamento soviético adoptando el modelo de la Asamblea Popular Nacional. El nuevo sistema creará un único órgano legislativo con representantes de todas las regiones del país, esforzándose por ser más democrático y representativo. Sin embargo, algunos miembros del antiguo régimen se oponen a los cambios y persisten las preocupaciones sobre su implementación y transparencia. El Partido Comunista está decidido a hacer que este audaz experimento democrático funcione."
 russia.333.a: "El mejor sistema político del siglo XXI."
 russia.334.t: "Perfección del Estado-partido"
 russia.334.d: "PLACEHOLDER."
 russia.334.a: "El mejor sistema político del siglo XXI."
 russia.335.t: "Banderas rojas sobre el Dombás"
 russia.335.d: "Tras nuestra victoria en las elecciones, quedó claro que las repúblicas del Dombás también debían cambiar. Nuestros servicios especiales llevaron a cabo una serie de operaciones destinadas a desacreditar a los Gobiernos actuales y, a continuación, con la ayuda de nuestros leales militares, llevaron a cabo golpes de Estado pacíficos. El camarada Rashkin tiene una visión diferente del Dombás, se convertirá en un refugio para el nuevo Gobierno soviético ucraniano, y los arreglos burocráticos necesarios ya se han hecho. Muy pronto se establecerá una nueva República Socialista Federativa Soviética de Ucrania, se han tenido en cuenta los errores del pasado y la nueva Ucrania soviética será una federación como Rusia. En Donetsk, se ha formado una amplia coalición socialista de izquierda a partir de comunistas locales, miembros fugitivos del PCU y miembros de la Asociación \"Borotbá\". Ucrania ya nos ha condenado y lo ha calificado de nueva etapa de escalada.\nPor supuesto, hay muchos en el Dombás que no están satisfechos con nuestras acciones y lo consideran una traición a los intereses rusos, pero nos ocuparemos de esos chovinistas."
 russia.336.t: "Dombás rojo"
 russia.336.d: "Tras varias rondas de largas negociaciones en Moscú, los líderes de las repúblicas del Dombás regresaron a sus ciudades con una agenda unificada: celebrar un congreso y firmar un acuerdo sobre la creación de la \"Unión de Repúblicas Populares\". El proyecto, que en 2014 parecía una idea moribunda y fue archivado, cobró nueva relevancia tras la negativa oficial de Kiev a implementar los acuerdos de Minsk. Ahora los puntos principales de los gobiernos de las repúblicas son la igualdad social, una economía de los trabajadores y la democracia popular, así como una cooperación ampliada entre los dos estados. Para lograr este objetivo, con la ayuda de Moscú, se creó una organización socialista interrepublicana unificada -el \"Frente Unido\"-, una unión de todas las fuerzas progresistas de la región. Los jefes de la RPL y la RPD fueron elegidos como sus líderes temporales y también recibieron carnés de partido del Partido Comunista de la RSFSR. Como señala un canal de Telegram de Lugansk: \"Era solo cuestión de tiempo que las nuevas fuerzas del Kremlin remodelaran nuestra región de acuerdo con su visión de Rusia\".\n\nLos delegados ahora solo tienen que determinar la tarea principal de esta Unión, en qué se convertirá este proyecto: un estado novorruso fuerte e independiente o una forja clandestina para la futura reformateo de Ucrania en una única república soviética federal."
 russia.336.a: "¡Viva la Novorrusia soviética!"
 russia.337.t: "Democracia neosoviética"
 russia.337.d: "Valeri Rashkin, presidente de la Rusia soviética, junto con científicos de la AROS (Académicos Rusos de Orientación Socialista) publicaron su primer libro: \"Democracia neosoviética\". Un libro que describe los principales principios ideológicos de los comunistas rusos modernos, un nuevo modelo de la estructura estatal del Estado ruso y las perspectivas para su desarrollo futuro. Es elogiado por su simplicidad de explicación y accesibilidad: para entender de qué trata, no es necesario leer todas las obras de los clásicos del marxismo de antemano. El libro se convirtió en la base de programas educativos en varias universidades, lo que demuestra la trascendencia e importancia de su contenido.\n\nSin embargo, ha recibido duras críticas del campo de ultraizquierda, que acusa a Rashkin de revisionismo, de malinterpretar la experiencia de la construcción del socialismo en la URSS y de las contradicciones banales que se pueden encontrar en su obra. A pesar de las críticas, \"Democracia neosoviética\" ha tenido una amplia distribución entre los estudiantes y es popular en los círculos que apoyan a Rashkin, además de seguir generando interés y debate en el entorno político y económico ruso. El libro no es tan popular en el extranjero, pero ha proporcionado a muchos expertos una mejor comprensión de lo que está sucediendo actualmente en nuestro país."
 russia.337.a: "¡Obra importante para una ideología en desarrollo!"
 russia.338.t: "Un nuevo propósito para el ONF"
 russia.338.d: "Con cada nuevo paso que da el Gobierno bajo el liderazgo de Dmitri Medvédev, el concepto de política de partidos en Rusia se vuelve cada vez más vago.\n\nEl Frente Popular Panruso (ONF) está cobrando protagonismo, uniendo no solo organizaciones políticas, sino también laborales y de voluntariado: sindicatos y asociaciones de ciudadanos activos.\nRusia Unida, al ser el mayor participante en el Frente Popular, atrae a sus antiguos oponentes y socios, tanto en la Duma como fuera de ella, para cooperar con la organización. Algunos expertos lo llaman una unidad política general dentro del gobierno.\n\nLas decisiones tomadas por el ONF se están convirtiendo en la fuerza motriz de la sociedad rusa."
 russia.338.a: "Rusia tiene una mano que la guía."
 russia.339.t: "Informe del FSB sobre actividades sospechosas"
 russia.339.d: "Tras la reciente represión contra las organizaciones rusófobas, el FSB ha empezado a informar de que algunos de los elementos más radicales parecen haber empezado a conectarse entre sí y a organizarse en lugares desconocidos. El FSB también interceptó algunos de sus panfletos, donde cuestionaban las \"fronteras nacionalistas rusas\" y el concepto de soberanía rusa en sí mismo, diciendo que una posible intervención occidental sería más beneficiosa para los comunistas en Rusia."
 russia.339.a: "Mantenedlos vigilados."
 russia.340.t: "Comunistas anti-establishment se organizan"
 russia.340.d: "Los informes del FSB han sido confirmados. Algunas personas que escaparon del comunismo han empezado a hablar en línea sobre el \"Ejército Popular de Liberación Comunista\" y su lucha contra el \"neoimperialismo ruso\". Este es un acontecimiento preocupante y necesitamos prestarle más atención.\n\nCon el ascenso de comunistas desdiosados en Europa Occidental después de su derrota, podemos esperar que estos terroristas reciban financiación de sus señores europeos."
 russia.340.a: "¡Obsérvenlos!"
 russia.341.t: "Bombardeo de Novorosíisk"
 russia.341.d: "Las noticias de Novorosíisk son muy inquietantes. Hubo una explosión en uno de sus puertos, hiriendo a muchos trabajadores portuarios. La organización extremista EPCL ha reivindicado la autoría del ataque y ha declarado que no se detendrá hasta que la \"naturaleza reaccionaria de Rusia\" sea destruida.\nNuestro líder hizo una declaración pública condenando a los neo-SR, llamándolos \"demonios rojos del infierno\". Prometió encarcelarlos o destruirlos, dejando la decisión en sus manos."
 russia.341.a: "Prueba de la naturaleza sanguinaria de los comunistas."
 russia.342.t: "Tiroteo en Riazán"
 russia.342.d: "La recién formada organización comunista radical, EPCL, ha intensificado sus actividades y se ha vuelto más conflictiva tras el atentado en Novorosíisk. Uno de sus miembros abrió fuego en las calles céntricas de Riazán.\nAfortunadamente, el perpetrador fue rápidamente detenido. No hubo víctimas civiles, y solo un oficial de policía sufrió heridas leves."
 russia.342.a: "¡Deben pagar!"
 russia.343.t: "El FSB designa al EPCL como organización terrorista"
 russia.343.d: "Tras una serie de ataques de los llamados \"libertadores de los trabajadores\", el FSB ha anunciado públicamente las medidas adoptadas para castigar y destruir esta nueva amenaza terrorista. Se han organizado hombres y se han movilizado recursos para iniciar operaciones destinadas a desarmar al EPCL y a sus posibles cómplices."
 russia.343.a: "¡Manos a la obra!"
 russia.344.t: "INFORME DE ACCIÓN ANTITERRORISTA"
 russia.344.d: "DEL COMANDANTE EN JEFE DE LA ROSGVÁRDIA: VÍKTOR ZÓLOTOV\n\nEstimado Comandante Supremo:\n¡Tras ataques precisos y coordinados de la Guardia Rusa y las fuerzas de seguridad, la organización EPCL fue derrotada! Nuestras tropas rodearon lo que quedaba de ellos mientras intentaban huir a las montañas del Cáucaso. Después de una breve lucha, la mayoría se rindió.\n\nAl parecer, querían establecer un \"Gobierno soviético revolucionario\" y librar una \"guerra partisana\". Afortunadamente, pudimos detener a estos extremistas en seco.\n\nEstoy convencido de que el EPCL ya no representa una amenaza para Rusia. Ahora podemos anunciar a nuestro pueblo la victoria de la ley y el orden sobre la amenaza terrorista."
 russia.344.a: "¡Buen trabajo!"
 russia.345.t: "Juicios anticomunistas"
 russia.345.d: "Hoy se celebrarán juicios a la membresía y el liderazgo del EPCL."
 russia.345.a: "Cadena perpetua."
 russia.345.b: "Pena de muerte."
 russia.346.t: "¡Boom económico de Novorosíisk!"
 russia.346.d: ""
 russia.346.a: "Increíble."
 russia.347.t: "Levantamiento en Polonia"
 russia.347.d: ""
 russia.347.a: "¡Debemos ayudarlos!"
 russia.347.b: "Dejémosles a su suerte..."
 russia.348.t: "Mercenarios extranjeros avistados en Bielorrusia"
 russia.348.d: ""
 russia.348.a: "¡Denles con todo!"
 russia.349.d: ""
 russia.350.t: "Castillo de naipes ruso"
 russia.350.d: "Para los occidentales, el sistema político ruso siempre ha parecido un enigma, mientras que en realidad no hay nada fuera de lo común, salvo algunas \"características nacionales\". La escena política está dividida entre tres partidos principales:\n\n£GFX_CPRF_logo  Partido Comunista de la Federación de Rusia - Aunque la URSS cayó hace 30 años, muchos rusos aún abrazan ideas socialistas y sienten nostalgia. Sumado a la desigualdad oligárquica que ha causado mucho resentimiento, los comunistas son el segundo partido más grande de Rusia.\n\n£GFX_UR_logo  Rusia Unida - Un partido conservador de antaño, que ha mantenido la mayoría en la Duma y es el partido de facto del presidente. Rusia Unida representa una nueva visión de Rusia, más allá de formaciones pasadas.\n\n£GFX_LDPR_logo  Partido Liberal-Demócrata de Rusia - Es, a pesar de su nombre, un partido nacionalista y populista liderado por un showman popular. Si los comunistas quieren crear una nueva Unión Soviética, el PLDR aspira a crear un segundo Imperio ruso.\n\nNinguno de los partidos está de acuerdo en prácticamente nada, salvo en la idea general de restaurar la grandeza rusa. Habrían estado discutiendo y debatiendo eternamente, si no fuera por un hombre: Vladímir Putin, el unificador, que está por encima de todos ellos, dominando su cooperación cívica. Mientras él esté al mando, seguirán jugando según sus reglas."
 russia.350.a: "El péndulo se balancea..."
 russia.350.b: "¡Quiero saber más!"
 russia.353.t: "¡Occidente se niega!"
 russia.353.d: "El escrito estaba en el escritorio de Alekséi. Sabía lo que significaba, pero aun así no podía creerlo. La UE había rechazado la solicitud de aliviar la carga sobre la economía rusa suavizando las reparaciones. Bueno, \"rechazo\" no era la palabra correcta. Lo que yacía en su escritorio era un documento que enumeraba las corporaciones que tendrían que ser vendidas a sus contrapartes europeas para \"asegurar la confianza mutua\". Era increíble. Las reparaciones solo estaban destinadas a destruir el Gobierno anterior. Sin embargo, después de que un Gobierno democrático prooccidental ha tomado el poder, la UE está utilizando estas devastadoras reparaciones para desmembrar la mayoría de las empresas rusas. Lo peor es que, incluso si Rusia concede todo esto, todavía no podrá pagar en al menos 200 años. Es irreal. Navalni lo sabía. Pero lo que no entendía es por qué la OTAN no cumplió su parte del trato. Le prometieron un alivio de las reparaciones y una integración genuina en Europa. Prometieron el regreso de las ciudades ocupadas. Le prometieron la capacidad de crear una Rusia verdaderamente libre y próspera. Se lo arrebataron.\n\"Deberíamos simplemente aceptar\", dijo Vólkov, la mano derecha de Alekséi en la Fundación Anticorrupción.\n\"¿Es la financiación de la UE la que habla por ti?\" preguntó Maksim Katz, un bloguero convertido en líder.\n\"¿Qué dijiste?\"\n\"A diferencia de algunos de nosotros, no quiero pasar mis días relajándome en villas, sino que quiero construir una nación próspera. Todos sabemos cómo difamaste a Venediktov para reforzar tu base de financiación\".\n\"Basta. Pensaré en la respuesta. Ya pueden irse\". Alekséi suspira. Está claro que la OTAN no quiere que Rusia se recupere. Diablos, nunca quiso que se recuperara del colapso de la URSS en primer lugar. Incluso durante Yeltsin, Occidente había financiado a los separatistas chechenos mientras intentaba convertir a Rusia en un baluarte contra China.\n\"Nunca estuvimos destinados a ser prósperos\", susurró. Este pensamiento lo enfureció. Rusia fue desmembrada, perdiendo una quinta parte de su población. Ahora esas personas viven bajo regímenes inestables, o bajo ocupación y persecución. La enorme afluencia de ciudadanos de Crimea y el Dombás que huían a Rusia respaldaba este hecho. Rostov y Bélgorod no estaban mucho mejor, incluso con rumores de \"desrusificación\" extendiéndose, y Occidente haciendo la vista gorda.\n\"Putin tenía razón...\" Navalni llegó a una conclusión repentina."
 russia.353.a: "Hay que luchar por la verdadera libertad."
 russia.354.t: "La lista de Katz"
 russia.354.d: "Tras la reciente agitación por la negativa de Berlín, Maksim Katz, uno de los líderes del partido \"Rusia del Futuro\", publicó una serie de artículos en los que denunciaba y castigaba públicamente a varios ministros notables, entre ellos el primer ministro Leonid Vólkov, por ponerse ciegamente del lado de una clara xenofobia. Más tarde, se vio a Katz entrando en el Kremlin para, según rumores de los medios, una reunión a corazón abierto con el presidente Navalni.\nLos resultados de la misma siguen sin estar claros, pero la política de Navalni ha estado cambiando notablemente hacia el populismo antioccidental, por lo que es seguro asumir que esos estadistas no durarán mucho en sus puestos."
 russia.354.a: "Comienza una nueva era."
 russia.355.t: "¡Rusos oprimidos en Kazajistán!"
 russia.355.d: "Timur PIZDEC P"
 russia.355.a: "¡Exigan un referendo de inmediato!"
 russia.356.t: "¡Los rusos exigen un referendo!"
 russia.356.d: "Timur PIZDEC P"
 russia.356.a: "Errrrrr"
 russia.356.b: "¡JÓDETE!"
 russia.357.t: "¡El Gobierno kazajo se niega!"
 russia.357.d: "idiotas"
 russia.357.a: "Pues lo haremos por las malas."
 russia.358.t: "¡División de la Guardia entra en Moscú!"
 russia.358.d: "Hoy, la habitual vida nocturna de la capital se ha visto interrumpida por el sonido de tanques rodando y el parloteo de los soldados. En solo una hora, una división de la Rosgvárdia logró tomar, sin derramamiento de sangre, todos los edificios gubernamentales. El jefe de la Rosgvárdia, Víktor Zólotov, ha dejado claro en su discurso de emergencia televisado que una decisión tan dura fue forzada por la incapacidad del gobierno civil del PLDR para resolver la crisis rápidamente. Prometió un retorno a la vida normal y la estabilidad una vez que la situación crítica se resuelva. Zólotov terminó su discurso con \"¡Gloria a Rusia!\" e instó a todos los ciudadanos respetuosos de la ley a continuar con sus rutinas diarias."
 russia.358.a: "Al menos no televisaron \"El lago de los cisnes\"."
 russia.359.t: "Decisión final de Zólotov"
 russia.359.d: ""
 russia.359.a: "\"Solo quienes puedan continuar la visión de Zhirinovski...\""
 russia.359.b: "\"Los políticos civiles no son de fiar...\""
 russia.360.t: "¡Elecciones extraordinarias!"
 russia.360.d: "Iván camina por la calle para votar por su candidato favorito."
 russia.360.a: "...Víktor Zólotov!"
 russia.360.b: "...Serguéi Shoigú!"
 russia.360.c: "...Alekséi Diumin!"
 russia.361.t: "Unión Rusa de Sexualidades Alternativas"
 russia.361.d: "Tras el inicio de la reforma, se han creado muchos grupos sociales por todo el país, pero uno en particular ha captado la atención no solo de los medios rusos, sino también de sus colegas occidentales. Formada recientemente, pero ya acumulando miembros, la \"Unión Rusa de Sexualidades Alternativas\" afirma representar a la parte de la comunidad LGBTQ rusa que se opone a la hipocresía occidental.\n\nEl presidente de la organización, Mijaíl Lákov, escribió esto en su manifiesto: \"Amigos, hermanos y hermanas, permítanme abordar «la contradicción» de nuestro grupo: ¿por qué deberíamos oponernos a Occidente? Durante años, todas las organizaciones LGBT de nuestro país apuntaron a Occidente, tratando de traer el progresismo aquí. Pero Europa vino aquí por sí misma, ¿y qué nos dejaron? Edificios en ruinas, pobreza y ocupación. No importa las fallas de los Gobiernos anteriores, no tenían derecho a tratar a seres humanos iguales de esta manera. Occidente predica la igualdad y la inclusión, mientras ignora la difícil situación de nuestros hermanos en sus Estados miembros no tan progresistas, en el mejor de los casos, y ayuda a masacrarlos en el peor. Europa perdió el rumbo. Nuestra gente nos ve como traidores, ¿y quién puede culparlos? Nosotros mismos fuimos engañados por los desfiles del orgullo en París y Berlín. Al permanecer unidos, como un solo país, podemos mostrar a todos que estamos unidos con ellos contra el mal común del Occidente satánico y sus máscaras de porcelana. Juntos podemos hacer de Rusia un faro de esperanza y libertad\".\n\nLas organizaciones LGBTQ+ de Occidente ya han denunciado a la URSA como escisiones ultranacionalistas, revanchistas y heterófilas. Sin embargo, sus voces no se escuchan en Rusia, mientras que la voz de Lákov, después de ser apoyada públicamente por el presidente Navalni, solo se hace más fuerte."
 russia.361.a: "Ahora, a estos gays sí que los puedo apoyar... ejem"
 russia.362.t: "Gavriil Doroshin quiere unirse a la guerra"
 russia.362.d: "Gavriil Doroshin es descendiente de Nicolás I por línea femenina. La hija mayor del zar, María Nikoláyevna, es su bisabuela en octava generación. Además, está emparentado con la familia imperial francesa. El marido de María Nikolaevna es nieto de Josefina, la esposa de Napoleón.\n\nPero el título de gran duque solo se transmitía por línea masculina, por lo que Gavriil Doroshin no reclama el trono ruso. Él honra sus raíces familiares.\n\nParte de sus parientes murieron durante la Primera Guerra Mundial o fueron fusilados después de la revolución, y su bisabuela Tamara Leuchtenberg de Beauharnais emigró a Francia. Gavriil nació allí, en Marsella.\n\nLa primera vez que Gavriil fue al Dombás fue en 2015. En ese momento tenía 18 años. Dejó la escuela (soñaba con ser fotógrafo) y se unió al batallón Oplot de Aleksandr Zajárchenko. Durante dos años luchó en reconocimiento, fue ametrallador. Recibió el indicativo \"Tasman\" en honor al diablo de Tasmania, un depredador pequeño pero feroz.\n\nAhora desea ir al frente de la Guerra Europea. ¿Dejaremos a salvo al portador de sangre real, o le permitiremos cumplir con su deber para con su patria?"
 russia.362.a: "¡Un verdadero patriota! Solicitud aceptada."
 russia.362.b: "No podemos permitir que se derrame sangre real. Solicitud denegada."
 russia.363.t: "La Madre Patria que una vez conocí"
 russia.363.d: "Svetlana Mijáilova nunca perdía el autobús para ir a trabajar al centro de San Petersburgo. La ciudad siempre fue un lugar ajetreado para vivir y el trayecto un poco largo, pero a ella no le molestaba. ¿Cómo podría molestarle? Para los estándares rusos, pagaba bastante bien y, por los arreglos que había hecho, no era probable que la despidieran. Pero estas razones materiales eran secundarias. El verdadero apego se debía al simple hecho de que la ciudad había sido una parte especial de su vida durante tanto tiempo. Incluso ahora que los tiempos cambiaban, siempre recordaba su querida ciudad, su querido Leningrado, y en el autobús rememoraba mientras las calles pasaban.\n\nLeningrado, la joya urbana más grande de la URSS, el hogar de la revolución, el gran logro de la sociedad rusa y soviética. ¿Cómo podría olvidar todo lo que le había dado? Recordaba sus días en la escuela, su servicio en la rama local del Komsomol, su primer trabajo en el Partido Comunista, su tiempo con amigos y familiares por los bulevares de la ciudad, y los lugares que pasaba cada día. Esta era la ciudad que recordaba con tanto cariño.\n\nPero todo lo que sabía sobre esta ciudad parecía desvanecerse de la noche a la mañana. Ya no reconocía nada y eso la asustaba.\n\nCada lugar, hasta el nombre del óblast, había sido renombrado. Los monumentos habían sido trasladados a museos. La iconografía soviética cincelada en muchas fachadas públicas había sido eliminada. Incluso el gran letrero de \"Leningrado\" hacia la sección exterior de la ciudad había sido retirado. Era como si toda la ciudad ahora actuara como si la URSS nunca hubiera existido, pero ella ahora entendía por qué.\n\nEsta era una nueva ciudad, una nueva Rusia. La memoria pública de la URSS quirúrgicamente liquidada para dar paso a la Rusia de antes de 1917 y de hoy. Ahora no querían que recordaras a los soviéticos. Querían que los rusos solo conocieran a los Románov y a Zhirinovski.\n\nSvetlana finalmente dejó de mirar y miró hacia adelante con una mirada neutral entristecida. Solo podía lamentar en silencio lo que solía ser."
 russia.363.a: "Lenin nunca vivió."
 russia.364.t: "Segundo manifiesto de Octubre"
 russia.364.d: "El manifiesto de Octubre de 1906 fue un documento que sirvió para modernizar parcialmente el Gobierno Imperial Ruso; debemos volver a mirar nuestro pasado e instalarlo como un marco sobre el cual el zar, [SOV.GetLeader], pueda construir.\n\nCuando se implementó el primer manifiesto de Octubre, Rusia estaba en medio de la Revolución de 1905 y su aprobación estableció la Duma, la Duma, por supuesto, era en su mayoría impotente y seguirá siéndolo con este nuevo manifiesto de Octubre. El nuevo manifiesto de Octubre se enfrenta a las reformas aprobadas por el PLDR destinadas a centralizar el poder en Zhirinovski y futuros presidentes del partido, pero ahora el manifiesto coloca ese poder ejecutivo en manos del Zar. El Zar que hemos elegido fue elegido por su sabiduría, por su sangre, por sus conocimientos; el PLDR ha aprobado este manifiesto sabiendo que el futuro de Rusia está ahora en manos del zar.\n\nLa visión que [SOV.GetLeader] impone ahora al estado es desconocida; a diferencia del zar Nicolás II, quien incluso después de aprobar este manifiesto todavía enfrentó resistencia, nuestro nuevo zar puede estar tranquilo sabiendo que el PLDR sofocó toda resistencia antes, y ahora después de la Guerra, en nuestra victoria, el pueblo está eufórico con nuestro Gobierno. Sin embargo, la euforia de la posguerra solo durará un tiempo.\nEstá en manos de [SOV.GetLeader] guiarnos hacia adelante; podríamos estar dirigiéndonos hacia una autocracia rusa de estilo antiguo, podríamos estar dirigiéndonos hacia una monarquía constitucional más parecida al sistema del Reino Unido, podríamos estar dirigiéndonos a la ruina; el futuro que hemos creado para Rusia es emocionante, especialmente porque Europa está en caos y vemos a nuestros enemigos derrotados mientras sus Gobiernos caen en manos de los comunistas en masa por todo el continente. Es tan emocionante como aterrador ver el bolchevismo resurgir, preparándose inevitablemente para atacarnos una vez más.\n\nLas riendas están ahora en tus manos, gran zar; lleva al Imperio ruso a la gloria y la prosperidad, mantén nuestra victoria por siglos venideros, prepara al pueblo para las futuras batallas que seguramente sacudirán el Estado a su debido tiempo; cualquier camino que nos hagas tomar, estamos contigo, gran zar."
 russia.364.a: "¡Zar ruso, gobierna para nuestra gloria!"
 russia.365.t: "A los ojos del observador"
 russia.365.d: ""
 russia.365.a: "¡Zolotov se nombra a sí mismo presidente del PLDR!"
 russia.365.b: "¡Zolotov forma el Consejo Militar del Estado!"
 russia.366.t: "¡Ígor Zhirinovski bajo fuego!"
 russia.366.d: ""
 russia.366.a: "Pável Grudinin comienza a recabar apoyos."
 russia.366.b: "Zhirinovski utiliza su influencia para acallar a la oposición."
 russia.367.t: "Aliados de Grudinin"
 russia.367.d: ""
 russia.367.a: "Ya no se puede confiar en el PLDR, es hora de cambiar."
 russia.367.b: "Los verdaderos patriotas del PLDR apoyarán las afirmaciones de Grudinin."
 russia.368.t: "¡Igor Zhirinovski derrocado!"
 russia.368.d: ""
 russia.368.a: "Grudinin empieza reformación estatal masiva."
 russia.368.b: "Gruninin se vuelve el nuevo presidente del PLDR."
 russia.369.t: "Bajo ojos vigilantes"
 russia.369.d: "A pesar de nuestra actitud sobre el socialismo y otros movimientos radicales, debemos asegurar la  democracia y el derecho a elegir para nuestros súbditos. Sin embargo, es muy peligroso transferir el poder a partidos independientes de izquierda - ya tenemos una amarga experiencia histórica. Para prevenir que esto ocurra nuevamente, nos tornaremos en base a las ideas de S. V. Zubatov, creando partidos izquierdistas bajo nuestro control y confiando su vigilancia al departamento de seguridad. De esta manera nos aseguramos que sus políticas no sobrepasaran lo permitido, y que los campesinos y trabajadores del imperio tengan una oportunidad de expresar de manera legitima su posición y defender sus derechos dentro de estos partidos."
 russia.369.a: "Libertad para algunos, flauta para otros."
 russia.370.t: "Elecciones nacionales rusas"
 russia.370.d: ""
 russia.370.a: "¡...Serguéi Furgal!"
 russia.370.b: "¡...Denís Pushilin!"
 russia.370.c: "¡...Aleksandr Belov!"
 russia.370.f: "¡...Alekséi Zhuravlev!"
 russia.370.g: "¡...Alekséi Zhuravlev!"
 russia.370.j: "¡¿...Maksim Suraikin?!"
 russia.371.t: "El nuevo traje del Emperador"
 russia.371.d: ""
 russia.371.a: "Nosotros no olvidamos nuestro pasado, lo controlamos."
 russia.372.t: "Legado de Putin"
 russia.372.d: "A pesar del reciente fallecimiento del expresidente ruso Vladímir Putin, su popularidad solo se ha visto reforzada por su sucesor y protegido, Dmitri Medvédev, quien ha adoptado una postura firme en la continuación del rumbo de Putin contra viento y marea, lo que ha hecho que la imagen pública de Medvédev se asemeje a la de \"Stalin\", y la de Putin a la de \"Lenin\". Ahora, alcanzando niveles más allá de la simple apreciación, la idolatría del longevo presidente se ha extendido más, y el término \"putinista\", que a menudo era utilizado por la oposición o por ciudadanos patriotas, ha comenzado a aparecer en los medios de comunicación estatales, como una caracterización positiva de la línea política del país."
 russia.372.a: "¡Su sueño sigue vivo!"
 russia.373.t: "¡El PLDR expulsa a Slutski!"
 russia.373.d: "A pesar de promover la imagen de un gran reformador, Slutski ha ido perdiendo el favor dentro del propio PLDR. Hoy, mientras Slutski estaba de visita en Omsk, como parte de la plataforma \"nacional-democrática\", la sesión extraordinaria del Consejo Supremo del PLDR lo destituyó de su cargo de presidente y, en efecto, de su posición como candidato presidencial en las próximas elecciones.\nConmocionado y desconcertado de que las personas que él mismo había colocado en esos altos cargos lo traicionaran, Slutski no tiene partidarios aparentes para reclamar nuevamente la posición dominante, y ahora pasará el resto de sus días como, una vez más, un miembro común y corriente del Partido."
 russia.373.a: "Oh, qué irónico."
 russia.374.t: "¡Los líderes del Dombás forman el PPRR!"
 russia.374.d: "Tras la liberación del Dombás, muchos políticos novorrusos, incluidos los líderes de dos repúblicas populares, habían abandonado el PLDR y se habían dedicado a la política independiente. Tras el anuncio de nuevas elecciones, los que una vez fueron solo jefes de Estados parcialmente reconocidos, ahora unieron fuerzas en la carrera por el cargo más alto del Kremlin. El Partido Popular Republicano Ruso, formado por Pásechnik y Pushilin, afirma representar la nueva mentalidad rusa, la lucha por la autodeterminación de los rusos y la persistente nostalgia por la sociedad estable de principios de los años 2010. Con su idea de \"republicanismo ruso\" y una considerable opinión pública a favor de que la gente del Dombás sea el futuro de la élite política rusa, podrían obtener suficientes votos para ganar la carrera."
 russia.374.a: "La fortuna favorece a los audaces."
 russia.375.t: "¡El PLDR nombra a Furgal como candidato!"
 russia.375.d: "Muchos observadores han seguido de cerca la elección del PLDR para presidente en las próximas elecciones; tras la destitución de Slutski, solo quedaban unos pocos verdaderamente dignos de tal puesto. Sin verdadera sorpresa, Serguéi Furgal, a quien el PLDR ha estado promocionando durante mucho tiempo como un luchador contra la corrupción y un hombre con un alma honesta, ha sido elegido para liderar el partido durante la campaña electoral. Con el PLDR alejándose cada vez más de lo que Zhirinovski representaba, muchos se preguntan si la nueva imagen del PLDR les conseguirá votos."
 russia.375.a: "¡Un hombre de fe honesta!"
 russia.376.t: "Belov gana respaldo nacionalista"
 russia.376.d: "Uno de los muchos presos políticos liberados de la derecha durante los primeros días de Zhirinovski fue Aleksandr Belov, un excéntrico empresario con simpatías nacionalistas. Aunque no tuvo ningún problema con el gobierno del PLDR, aparte de algunas objeciones menores, ver las reformas políticas de Slutski como un retroceso de la \"política nacional rusa\" lo convirtió de nuevo en un férreo opositor. Esta vez, Belov, siendo una de las pocas figuras relevantes de ultraderecha, ha recibido suficiente respaldo de diferentes organizaciones, con grandes sumas de dinero invertidas en su campaña política. Sin embargo, incluso con todo esto, sigue siendo el ganador menos probable en estas elecciones."
 russia.376.a: "¡Ah, el radical!"
 russia.377.t: "Ródina forma el Frente Nacional"
 russia.377.d: "\"Ródina\", uno de los pocos partidos políticos formados durante el Gobierno de Zhirinovski, ha recibido suficiente apoyo como para anunciar la formación del \"Frente Nacional\" de partidos más pequeños de izquierda y derecha que están unidos bajo la bandera del patriotismo y la creencia en la historia rusa común. Si bien esto puede resultar inestable, ya han anunciado muchas medidas populistas que les han dado popularidad en encuestas recientes, incluso si muchas de ellas se contradicen entre sí. El partido tendrá que elegir de qué lado se inclinará más, si quiere mantenerse a flote y tener la oportunidad de ganarse a la población."
 russia.377.a: "El ruso más centrista:"
 russia.378.t: "Trayectoria política de Ródina"
 russia.378.d: "La coalición organizada por Ródina se ha vuelto cada vez más polarizante, con los patriotas de izquierda arremetiendo contra sus homólogos de derecha. Parece que ha llegado el momento de que la dirección de Ródina tome las riendas y decida finalmente qué plataforma seguirá el Frente Nacional. Si bien, sin duda, la mayoría de los partidos minoritarios, que no quieren enemistarse, seguirán apoyando la decisión independientemente de la elección, algunos podrían irse si el partido elige una dirección opuesta."
 russia.378.a: "Ródina debe moverse a la izquierda para conseguir más votos."
 russia.378.b: "Las políticas sociotradicionalistas de Ródina ayudarán a lograr la victoria."
 russia.378.c: "¡Ródina no logra consolidarse!"
 russia.379.t: "Estado del título de \"Gobernante Supremo\""
 russia.379.d: "La pregunta que concierne a millones de ciudadanos de nuestro país es el futuro del título de \"Gobernante Supremo\" conferido a Vladímir Vólfovich Zhirinovski. Su vida y actividades han dejado una huella imborrable en la historia rusa, y ahora nos enfrentamos a una difícil elección: ¿deberían los próximos líderes heredar este título, o Vladímir Vólfovich seguirá siendo para siempre el único Gobernante Supremo y Eterno?\n\nLa cuestión de la sucesión es extremadamente compleja. El título de \"Gobernante Supremo\" es único en sí mismo. Transferirlo a otra persona podría socavar su significado simbólico asociado con la personalidad única de Zhirinovski.\n\nPor otro lado, dejar el título \"vacante\" puede dar lugar a diversas interpretaciones y especulaciones."
 russia.379.a: "El título debería ser heredable."
 russia.379.b: "¡Solo Zhirinovski fue digno de él, y será Gobernante Supremo eternamente!"
 russia.380.t: "Comienzo de una economía soberana"
 russia.380.d: "Con el mundo al borde del cambio y las hostilidades cada vez mayores de Occidente, sería solo cuestión de tiempo antes de que nuestra economía sufriera un duro golpe.\n\nSin embargo, con mentes agudas y cierta voluntad de adaptación, podemos asegurarnos de que si ocurriera otra crisis, seríamos capaces de salir bien parados de una tormenta financiera así.\n\nLa rápida reindustrialización, la eliminación de cualquier forma de dependencia de las economías occidentales y lazos más fuertes con nuestra esfera, pase lo que pase, en cuestión de pocos años seremos capaces de soportar cualquier tipo de adversidad."
 russia.380.a: "Esto recién empieza."
 russia.381.t: "Medvédev inicia una campaña en Telegram"
 russia.381.d: "Con la temporada electoral en el horizonte y la muerte de Putin aún fresca en la mente del pueblo ruso, era solo cuestión de tiempo antes de que los diferentes partidos experimentaran con distintos métodos para atraer votantes.\n\nRusia Unida se ha encargado de poner a Medvédev más al frente de su campaña, en un esfuerzo por atraer a los votantes jóvenes haciendo campaña en la aplicación conocida como Telegram.\n\nTelegram, conocida por su dedicación a la privacidad y por cultivar todo tipo de comunidades en línea, esta campaña se considera una medida para mostrar a la juventud rusa que el partido sabe lo que es relevante en el presente y el futuro, en lugar de solo el pasado."
 russia.381.a: "Los problemas modernos requieren soluciones modernas."
 russia.382.t: "Estreno de la película \"Sr. Presidente\""
 russia.382.d: "En el torbellino de intrigas políticas y cambios rápidos, destaca el personaje principal de nuestro tiempo, Vladímir Vladímirovich Putin. La película \"Sr. Presidente\" es una inmersión fascinante en la vida y la carrera de uno de los políticos más influyentes de nuestra era.\n\nDesde sus años de juventud hasta el puesto de presidente de Rusia, Putin ha recorrido un largo camino, experimentando todas las posibles pruebas y dificultades. En su lucha por el poder, por el país y por su visión del futuro, vemos no solo a un político, sino también a un hombre con sus fortalezas y debilidades.\n\nLa película abre un mundo de luchas políticas y maniobras diplomáticas, donde cada movimiento de Putin pone en juego el destino no solo del país, sino también del mundo entero. Sus decisiones afectan las relaciones internacionales, la economía y la historia.\n\nLa visión del director sobre la vida de Vladímir Putin lo revela como una personalidad compleja, donde los sentimientos y principios humanos coexisten junto al poder político. Lo vemos como un líder seguido por millones, y como una persona que enfrenta sus propias dudas y dificultades.\n\n\"Sr. Presidente\" no es solo una película biográfica, es un estudio del fenómeno del liderazgo, la resolución pacífica y los juegos geopolíticos en el escenario global. No hay lugar para respuestas y evaluaciones inequívocas, solo una emocionante inmersión en el mundo de uno de los políticos más misteriosos e influyentes de nuestro tiempo."
 russia.382.a: "Esto si es cine."
 russia.383.t: "Boom de la animación rusa"
 russia.383.d: "Hoy en día, la industria de la animación en Rusia está experimentando un auténtico auge. Cada día se estrenan en las pantallas de cine y televisión nuevos y emocionantes dibujos animados, que cautivan por su vívido estilo de imagen y su fascinante trama.\n\nAnimadores y artistas talentosos trabajan en cada detalle, creando su propio mundo único en el que niños y adultos se sumergen en el encantador mundo de la animación. Gracias a esta extraordinaria forma de arte, niños y adultos pueden sumergirse en mundos fantásticos y vivir en ellos durante algún tiempo.\n\nUno de los ejemplos vivos fue la exitosa caricatura \"Sentido del tiempo\". Esta obra, que se ganó el corazón del público con su emocionante trama, se convirtió en la ganadora de numerosos premios y fue destacada por su imagen y animación de alta calidad.\n\nGracias a un enfoque creativo e innovador, la animación en Rusia sigue ganándose el corazón de los espectadores y afianzando su posición en la escena mundial de la animación."
 russia.383.a: "¡Bravo, Rusia!"
 russia.384.t: "La noche de Maksim"
 russia.384.d1: "\"¿Qué? ¿No esperabas verme aquí? ¡Yo mismo sigo en shock! ¡Katz en la tele! Y todo gracias a la democracia neosoviética que Valeri Rashkin construyó en nuestro país. ¿De verdad crees que yo podría haber terminado aquí si Putin hubiera estado en el poder antes? En el nuevo sistema democrático, todos los ciudadanos de la URSS tienen derecho a la libertad de expresión y a la libertad de opinión. Todos los ciudadanos de la URSS tienen derecho a participar en las elecciones y a elegir a su representante en el gobierno. Ningún partido político está prohibido, todos tienen derecho a la libertad de actividad política. Valeri Rashkin creó un nuevo sistema democrático que no solo garantiza la libertad y la igualdad, sino que también protege los derechos humanos. El sistema tiene una sólida base legal que garantiza la justicia y la protección de los derechos de los ciudadanos... Ahora hablaremos de cómo logramos ganar la Guerra Europea con poco derramamiento de sangre y de por qué ocurrió..."
 russia.384.d2: "\"¿Qué? ¿No esperabas verme aquí? ¡Yo mismo sigo en shock! ¡Katz en la tele! Y todo gracias a nuestra lucha! Después de tantos años, ¡ganamos! ¡Sí, ese día ha llegado! Ahora podemos construir una verdadera y genuina democracia, y no este malentendido que se llama \"democracia neosoviética\". ¡Tengo que decir que es un completo disparate! Rashkin no tenía ningún plan ni programa en su sistema. Nada funciona como debería. ¿Y qué obtenemos como resultado? ¡Caos y desorden! Nada funciona correctamente y la gente sufre. Pero lo peor de este sistema es su nombre. \"¿Democracia neosoviética\"? ¿A quién se le ocurrió semejante disparate? ¡Es ridículo! ¿Cómo se puede hablar de democracia cuando todas las decisiones las toma una sola persona? Todos sabemos que todas las decisiones importantes en el país se tomaban exclusivamente con la aprobación de Rashkin... Ahora hablaremos de la Guerra Europea y de por qué ocurrió..."
 russia.384.a: "...pero primero un pequeño anuncio, no se vayan\"."
 russia.385.t: "Ataque terrorista en el metro de Moscú"
 russia.385.d: "Los nazis mataron gente"
 russia.385.a: ""
 russia.386.t: "Golpe militar"
 russia.386.d: "Esta noche las divisiones de la guardia entraron en Moscú, ocupando los puntos estratégicos de la ciudad. El presidente de la URSS, Alekséi Navalni, quien anunció su dimisión en favor del jefe del Estado Mayor de las Fuerzas Armadas de la URSS, Valeri Guerásimov, habló por televisión.\n\n\"Estimados ciudadanos de la URSS,\n\nHoy me veo obligado a anunciar mi dimisión del puesto de presidente de la Unión Soviética. Tomo esta decisión en aras de preservar la paz y la seguridad de nuestro país.\nEstoy seguro de que muchos de ustedes se preguntarán por qué hago este anuncio tan repentinamente. El hecho es que nuestro país se ha enfrentado a serios desafíos y problemas que requieren una solución rápida y efectiva. Me di cuenta de que no puedo garantizar que mis acciones conduzcan a resultados positivos, y por lo tanto transfiero el poder a Valeri Guerásimov.\nEntiendo que esto pueda causar algunos temores y preocupaciones, pero les pido que mantengan la calma y apoyen a las nuevas autoridades.\nDebemos trabajar juntos para garantizar la seguridad y la prosperidad de nuestro país. Quiero asegurarles que Valeri Guerásimov trabajará de acuerdo con el orden constitucional y respetará los derechos y libertades de cada ciudadano de la URSS.\nEstoy seguro de que bajo su liderazgo nuestro país podrá superar todas las dificultades y volverse aún más fuerte y próspero.\n\nGracias por su atención. Trabajemos juntos para garantizar la paz y la seguridad de nuestro país..."
 russia.386.a: "... ¿Dije todo bien?\""
 russia.387.t: "¡Estadistas comunistas se pronuncian contra el EPCL!"
 russia.387.d: "En un giro inesperado de los acontecimientos, muchos comunistas, a pesar de una prohibición nacional de los partidos de izquierda durante la \"emergencia\", comenzaron a pronunciarse contra las actividades terroristas del EPCL. Uno de los críticos más abiertos, Maksim Suraikin, ha hecho una declaración oficial: \"...cualquiera de estos llamados marxistas que participan en el terrorismo contra nuestra Madre Patria no merecen ser llamados comunistas...\" Más tarde, uno de los portavoces de la \"Organización de miembros del PCFR\", Timur Rajmetulin, también organizó una reunión para denunciar las acciones del EPCL.\n\nCon todos estos acontecimientos recientes, el PLDR se enfrenta a una difícil decisión: o apoyar a los llamados \"conservadores rojos\" y permitirles existir en el espacio público, o continuar con nuestra dura política hacia cualquier medio y organización de izquierda."
 russia.387.a: "¡Por la unidad de todos los rusos!"
 russia.387.b: "Sin piedad para nadie, sin importar cuánto se \"alineen\"."
 russia.388.t: "Kurginián forma la APPMR"
 russia.388.d: "Serguéi Kurginián siempre ha sido visto como un forastero por los comunistas. Lo encontraban demasiado esotérico, demasiado religioso y demasiado conspirativo para su gusto. Sin embargo, Vladímir Zhirinovski lo vio como un candidato perfecto para el papel del \"buen socialista\".\n\nKurginián ya tenía un grupo informal de activistas políticos llamado \"Esencia del Tiempo\", lleno de miembros muy leales. Publicó ensayos y libros sobre la necesidad del \"esoterismo rojo\" para combatir el \"negro\". A pesar de ser bastante grande y de haber tenido algunos altibajos a principios de los años 2010, esta organización no era adecuada para atraer y desviar a más comunistas patriotas que pudieran causar problemas al gobierno nacional del PLDR.\nPor lo tanto, a través de canales de terceros, se le pidió a Serguéi Kurginián que finalmente creara una organización socialista a gran escala para patriotas. Esto llevó al nacimiento de la Alianza de los Pueblos Proletarios del Mundo Ruso.\n\nAhora, con algunas concesiones, como la protección de sus miembros de cualquier purga o represión, opera como un partido de apoyo progubernamental. Sin embargo, Kurginián todavía critica a menudo públicamente a Zhirinovski por su \"falta de respeto a la era soviética\"."
 russia.388.a: "Esperamos relaciones de beneficio mutuo, camarada Kurginián."
 russia.389.t: "Partidos de izquierda acuden en masa a Suraykin"
 russia.389.d: ""
 russia.389.a: ""
 russia.390.t: "Caida del rashkinismo"
 russia.390.d: "Después de una larga lucha política con su principal adversario, Valeri Rashkin, el veterano presidente del PCUS y gobernante de facto de la URSS, a pesar de sus mejores intentos por mantener el orden, ha sido oficialmente derrotado por el ex propagandista de Putin convertido en presidente soviético, Vladímir Soloviov. Tras la desastrosa disolución del PCUS y su caída de la hegemonía, el comité permanente del PCUS ha destituido a Rashkin de todos sus cargos y ha anulado su membresía, mientras ellos mismos reforman el partido en un nuevo organismo político con una declaración ambigua de \"continuar la lucha por el verdadero eurocomunismo contra las mareas de la reacción interna\". No hubo declaraciones oficiales por parte de Valeri Rashkin; de hecho, es casi como si hubiera desaparecido de cualquier foco público desde el impactante anuncio.\nSoloviov y sus aliados celebran la victoria ya que ahora tienen el control total del Estado soviético y de todos sus asuntos. Solo el tiempo dirá si esta línea de acción fue beneficiosa para la URSS."
 russia.390.a: "El fin de una era, se podría decir."
 russia.391.t: "¡El presidente Soloviov perdona el legado de Putin!"
 russia.391.d: "Hoy, Vladímir Soloviov, tras uno de sus discursos públicos, ha retirado oficialmente los cargos penales de Rashkin contra Vladímir Putin, alegando que eran en sí mismos criminales e inmerecidos para un hombre que dedicó su vida a construir un país social, cuya única culpa fue la falta de tiempo.\n\nTambién acusó a Rashkin de comportarse como un niño, y afirmó que los cargos se presentaron más por un rencor personal insignificante que por alguna evidencia fundamental, poniendo como ejemplo y recordando a la población la desestalinización de Jrushchov. Soloviov prometió devolver el buen nombre a Putin y la visión que había planeado para la Madre Patria, elogiando muchas de sus decisiones."
 russia.391.a: "Comienza la re-putinización, al parecer."
 russia.392.t: "Esta noche en SolovyovLive"
 russia.392.d: "\"¡Buenas noches, Patriotas! Muchos se han quedado, digamos, «sorprendidos» cuando continué mi programación en línea después de convertirme en Presidente de la Unión Soviética. Bueno, para decirlo simplemente, ¡no hay mucho que puedas hacer como Presidente de la URSS! ¿Por qué, preguntas? Todo es por un hombre muy rígido y el sistema disfuncional que ha construido. Por supuesto, todos saben de quién hablo: el «camarada» Rashkin. Autoproclamado «Segundo Lenin», y francamente estaría de acuerdo, si fuera de la opinión de que Lenin fue un traidor a su país, lo cual no fue, pero Rashkin sí lo es. Detrás de capas de balbuceos sobre los «crímenes de Putin» y una perfección que es esta \"Democracia Neo-Soviética\", un libro que la «explica», el cual, por cierto, revisé, y, para ser franco, fue una lectura mediocre. De todos modos, bajo estas capas esconde corrupción, ineficacia y el pasado que desesperadamente quiere que olvidemos.\nPero no se lo permitiré.\nPueden considerar la transmisión de hoy, una especie de exposición, muy parecida a lo que solía hacer esa rata de Navalni, excepto que esta no solo está justificada, sino que también me aseguraré de que conduzca a resultados positivos..."
 russia.392.a: "\"...Pero antes de eso, repasemos rápidamente algunas noticias con nuestro coanfitrión, Stas Vasíliev.\""
 russia.393.t: "¡El Partido Comunista se divide!"
 russia.393.d: "Blyat, el eurocomunismo ha caído."
 russia.393.a: "Divididos cayeron..."
 russia.394.t: "El gambito de Grudinin"
 russia.394.d: "Zdes Chto to Dolzhno But'"
 russia.394.a: "El primer dominó"
 russia.395.t: "Centro Yeltsin"
 russia.395.d: "Recientemente, hubo una nueva ola de odio hacia el Centro Yeltsin de Ekaterimburgo, la razón fue que a finales de julio el centro inauguró una exposición de animales disecados destripados y órganos humanos cosidos, y luego anunció la escandalosa actuación \"El gato hipa y se tira pedos al mismo tiempo\". El Centro Yeltsin fue criticado en Suiza por esta producción. Y los representantes del museo no negaron que eligen deliberadamente actuaciones que provocan debate.\n\nLa última disputa pública sobre el Centro Yeltsin tuvo lugar en el foro juvenil \"Territorio de Significados\" - en una sesión con la participación de diputados de la Duma Estatal. El comunista de Ekaterimburgo, Denís Kurochkin, preguntó a los ponentes sobre la relevancia del Centro Yeltsin. El autor de la observación más resonante fue el jefe del Partido Comunista, Ziugánov: \"Todo el mundo sabe que el Centro Yeltsin fue construido especialmente para nosotros por los norteamericanos. Se gastan unos 12 mil millones en él cada año. Es una vergüenza nacional cuando se organiza un centro humano, donde la exposición fue preparada al 100 por cien por norteamericanos\".\n\nAparentemente, la coalición de críticos del Centro Yeltsin en la Duma Estatal solo sigue creciendo. El 3 de agosto, el diputado del PLDR, Yaroslav Nílov, se unió inesperadamente a los oponentes del centro y ofreció dar a los veteranos y a los discapacitados el dinero presupuestado para el mantenimiento del museo. Surge una pregunta seria para nosotros: ¿qué hacer con el Centro Yeltsin?"
 russia.395.a: "¿Centro Putin? ¡Qué gran idea!"
 russia.395.b: "Reconstruirlo como el Palacio de la Gloria Militar Rusa."
 russia.395.c: "Convertirlo en el Museo de Historia Rusa."
 russia.395.f: "¡Derríbenlo!"
 russia.395.f1: "Simplemente cambiemos el liderazgo por uno más \"patriótico\"."
 russia.396.t: "¡Rusia nos reconoce!"
 russia.396.d: ""
 russia.396.a: "¡Tres hurras por nuestros amigos rusos!"
 russia.397.t: "China invade Mongolia"
 russia.397.d: "China invade Mongolia. Son nuestros amigos y culturalmente cercanos a nosotros. Son una buena barrera contra las hordas Han. ¿Intervenir o no?"
 russia.397.a: "Amenazar con una intervención"
 russia.397.b: "Retirarse"
 russia.398.t: "China ignora las advertencias"
 russia.398.d: ""
 russia.398.a: "¡Desafíalos! ¡No defraudaremos a nuestros aliados!"
 russia.398.b: "No podemos permitirnos una guerra ahora mismo.\" russia.398.t: \"China ignora las advertencias"
 russia.399.t: "Ascenso de la Gran Rusia"
 russia.399.d: "Hoy, una multitud masiva de entusiastas partidarios y curiosos se reunió en la histórica Plaza Roja para presenciar la toma de posesión del nuevo presidente de Rusia, la carismática y controvertida figura, Vladímir Zhirinovski. Mientras subía al podio, la expectación en el ambiente era palpable, con todos los ojos y oídos esperando ansiosamente sus palabras.\nEn su apasionado discurso, el presidente Zhirinovski declaró que Rusia estaba al borde de una nueva era, una en la que las viejas formas de gobierno se habían vuelto obsoletas e ineficaces. Habló de la necesidad de un aparato estatal revitalizado que pudiera adaptarse a los desafíos del mundo moderno, dejando atrás las políticas y prácticas anticuadas del pasado.\nCon fervor en su voz, Zhirinovski enfatizó la importancia de la unidad y la solidaridad entre el pueblo ruso, rechazando la noción de una sociedad \"multicultural\" en favor de un fuerte énfasis en la identidad y la hermandad rusas.\nMientras la multitud estallaba en vítores y aplausos, el presidente Zhirinovski concluyó su discurso con una poderosa proclamación..."
 russia.399.a: "...¡Proclamo la nueva Federación!\""
 russia.399.b: "\"...¡Proclamo el nuevo Imperio!\""
 russia.400.t: "¡Occidente protesta los resultados electorales!"
 russia.400.d: "Las cobardes potencias occidentales emitieron un comunicado conjunto tras una sesión extraordinaria del Europarlamento, en el que denunciaron la victoria del PLDR como una toma de poder fraudulenta y a Zhirinovski como un brutal dictador en ciernes. Además, han anunciado un nuevo paquete de sanciones para golpear a Rusia de forma preventiva e impedirnos alcanzar \"objetivos imperialistas\", como proteger a los rusos que son maltratados por los regímenes occidentales en los países bálticos y en Ucrania.\nZhirinovski comentó personalmente estas recientes declaraciones en su refutación oficial: \"...Esos bastardos no nos dejarán en paz, pero no es nada especial, están en agonía, las sanciones, por el contrario, nos ayudarán a construir nuestra propia economía doméstica. Nosotros, los rusos, tendremos una sola sanción contra Occidente: un tanque ruso volando su Reichstag en pedazos\"."
 russia.400.a: "Tienen miedo. No nos detendrán."
 russia.401.t: "Día de la Unidad Popular"
 russia.401.d: "Hoy, 4 de noviembre, Rusia celebra el Día de la Unidad Popular. Esta festividad es una de las más significativas del país y recuerda la importancia de la unidad y la solidaridad de todos los ciudadanos.\nEn este día se celebran numerosos eventos culturales y deportivos, desfiles festivos, conciertos y festivales. Todas las regiones de Rusia participan activamente en la celebración, demostrando su compromiso con los ideales de unidad.\n\nSe presta especial atención a la educación de los sentimientos patrióticos entre los jóvenes. Escolares y estudiantes participan en desfiles y eventos festivos, donde se les informa sobre el significado del Día de la Unidad Popular y su papel en la historia del país. Esto ayuda a la generación más joven a comprender la importancia de la unidad y la solidaridad para lograr objetivos comunes.\n\nEn este día, es importante recordar la importancia de la solidaridad y la unidad de todos los ciudadanos rusos para lograr objetivos comunes y desarrollar el país. El Día de la Unidad Popular llama a cada persona a participar activamente en la vida de la sociedad y a esforzarse por el bienestar y la prosperidad de Rusia."
 russia.401.a: "¡En la unidad está nuestra fuerza!"
 russia.402.t: "Día de la Revolución de Octubre"
 russia.402.d: "Hoy, 7 de noviembre, se celebra en Rusia el aniversario de la Revolución de Octubre. Esta festividad es una de las más significativas en la historia del país y recuerda el punto de inflexión en el que el poder pasó a manos de la clase obrera.\nEn este día, se llevan a cabo numerosos eventos para celebrar el aniversario de la Revolución de Octubre. Se realizan desfiles, procesiones y conciertos en varias ciudades de Rusia, a los que asisten representantes de diversos partidos políticos y organizaciones públicas.\nSe presta especial atención a la educación de los sentimientos patrióticos entre los jóvenes. Escolares y estudiantes participan activamente en los eventos festivos, donde se les informa sobre la importancia de la Revolución de Octubre y su papel en la historia del país. Esto ayuda a la generación más joven a comprender la importancia de luchar por sus derechos y libertad.\nEn este día, es importante recordar la importancia de los ideales que formaron la base de la Revolución de Octubre. Esta es una lucha por la justicia social, la igualdad y la libertad. El aniversario de la Revolución de Octubre llama a cada persona a participar activamente en la vida de la sociedad y a esforzarse por crear un futuro mejor para todos los ciudadanos de Rusia."
 russia.402.a: "¡Gloria a la clase obrera!"
 russia.403.t: "¡Lanzamientos de Zalupa Ivanycha!"
 russia.403.d: "En los últimos días, para sorpresa de todos, se estrenó en los cines de todo el país una nueva película de Kinopoisk: Zalupa Ivanycha.\nLa película cuenta la historia de un anciano alcohólico en un pueblo ruso en ruinas, y la historia comienza cuando el personaje principal contrae una infección en su área genital.\nZalupa Ivanycha ha sido declarada un clásico moderno, con todos en las redes sociales dando su opinión al respecto. La película fue elogiada por su cinematografía, su brillante guion y su magistral exposición de problemas sociales que deben solucionarse.\nZalupa Ivanycha se convirtió en la película más taquillera de nuestro país, incluso superó a la popular serie Korol i Shut. La película recibió varios premios en diferentes academias de cine de Rusia."
 russia.403.a: "¡Un clásico moderno!"
 russia.404.t: "Día de la Unidad Popular durante la guerra"
 russia.404.d: "Hoy, 4 de noviembre, Rusia celebra el Día de la Unidad Popular. Esta festividad es una de las más significativas del país y recuerda la importancia de la unidad y la solidaridad de todos los ciudadanos.\nEn este día se celebran numerosos eventos culturales y deportivos, desfiles festivos, conciertos y festivales. Todas las regiones de Rusia participan activamente en la celebración, demostrando su compromiso con los ideales de unidad.\n\nSe presta especial atención a la educación de los sentimientos patrióticos entre los jóvenes. Escolares y estudiantes participan en desfiles y eventos festivos, donde se les informa sobre el significado del Día de la Unidad Popular y su papel en la historia del país. Esto ayuda a la generación más joven a comprender la importancia de la unidad y la solidaridad para lograr objetivos comunes.\n\nEn este día, es importante recordar la importancia de la solidaridad y la unidad de todos los ciudadanos rusos para lograr objetivos comunes y desarrollar el país. El Día de la Unidad Popular llama a cada persona a participar activamente en la vida de la sociedad y a esforzarse por el bienestar y la prosperidad de Rusia."
 russia.404.a: "¡Cuando estamos unidos, somos invencibles!"
 russia.405.t: "Siria reemplaza a Sudáfrica en los BRICS+"
 russia.405.d: ""
 russia.405.a: "Genial."
 russia.406.t: "La llamada de Lukashenko"
 russia.406.d: "Con la partida de este personaje, el hilo de la profecía se rompe. Restaura una partida guardada para rehacer el tejido del destino, o persiste en el mundo condenado que has creado."
 russia.406.a: "Esta reacción, debo decir, fue muy inesperada."
 russia.407.t: "Quien controla el presente..."
 russia.407.d: "Un control estricto de los medios es necesario para evitar que nuestra sociedad se desmorone como la de Estados Unidos. La \"libertad\" funciona solo en medidas limitadas, y la libertad de conocer la verdad solo es buena cuando la verdad es nuestra. \nLa televisión, las redes sociales e incluso los periódicos están mejor si son monitoreados y censurados por el Estado en aras de la integridad nacional. \nSin embargo, hay quienes en nuestra administración señalan que la censura excesivamente controlada llevó a la URSS a la ruina; dicen que la gente sí necesita algo de libre albedrío en términos de contenido mediático, pero gestionado y medido para evitar la inestabilidad social."
 russia.407.a: "Solo en la unidad hay victoria."
 russia.407.b: "No seamos como ese libro de \"Números\"."
 russia.408.t: "¡Colaboradores rusos expuestos!"
 russia.408.d: "A pesar del éxito inicial del \"Ejército Ruso Libre\" en nuestros medios, para sorpresa de nadie, los agentes de influencia rusos y sus servicios secretos lograron romper el hermetismo de nuestros medios oficiales y sacaron a la luz hechos sobre las ideas de ultraderecha, casi hitlerianas, de muchos disidentes rusos. La situación no mejoró cuando, al ser presionado sobre esas afirmaciones en una entrevista, uno de los líderes del Ejército de Rusia Libre declaró que no veía ningún problema con la etiqueta neonazi, ya que él y sus camaradas se consideraban nacionalistas de ultraderecha. Todo empeoró con la declaración final de que los benefactores occidentales conocían desde hace mucho tiempo sus puntos de vista y no veían ningún problema, y que el único enemigo verdadero es el gobierno ruso que genocida a los rusos de pura sangre con la ayuda de sucios chechenos y tayikos."
 russia.408.a: "¡Vergonzoso espectáculo!"
 russia.409.t: "La Campaña \"Tiempo de lo Nuevo\""
 russia.409.d: "Inesperadamente para todos, la reciente campaña \"Tiempo para lo Nuevo\" del \"tercer\" partido de Rusia, Rusia Nueva, se ha vuelto muy popular. La campaña, en su mayor parte, presenta a Rusia Nueva a los votantes como una alternativa al camino conservador de Rusia Unida y al camino de izquierda de la Rusia Popular, ofreciendo \"dar oportunidades a los jóvenes\", así como libertades económicas y personales. Davankov participa muy activamente en viajes electorales por todo el país, donde escucha las aspiraciones de la gente y celebra mítines donde describe su programa."
 russia.409.a: "Davankov, el candidato presidencial, está listo."
 russia.410.t: "La campaña \"Estamos esperando cambios\""
 russia.410.d: "Recientemente, la Rusia Popular anunció una campaña llamada \"Estamos esperando cambios\", en la que llama a los votantes a votar por cambios reales en el país y por la justicia social. Simultáneamente con el anuncio, la Rusia Popular también lanzó varios videos de propaganda con la canción del grupo KINO - \"Estamos esperando cambios\", y los videos mismos causaron un gran revuelo en la sociedad rusa."
 russia.410.a: "¡Cambios!"
 russia.411.t: "Agitación en Internet de Rusia Unida"
 russia.411.d: "Rusia Unida decidió utilizar una forma no estándar de hacer campaña, más precisamente, el partido decidió lanzar una campaña en línea para atraer a los jóvenes a las elecciones, algunos diputados de la Rusia Popular dijeron que estos eran \"simplemente nuevos métodos de Yeltsin\".\n\nMiembros conocidos de Rusia Unida participaron activamente en la compañía, por ejemplo, Dmitri Pátrushev acudió por invitación del popular streamer Zhmilevsky a una de sus transmisiones en vivo, durante la cual el streamer hizo preguntas sobre su campaña electoral, por lo que el interés de la audiencia joven solo se encendió, dando lugar a un montón de \"memes\" y \"arte de internet\", y a raíz de la popularidad de la compañía, también se lanzó una secuela del cómic \"Super Putin\", que completa la antigua saga."
 russia.411.a: "Nadie traerá de vuelta el 2012"
 russia.412.t: "Pesca nocturna"
 russia.412.d: "\"Es un cerdo\", prosiguió Putilin con odio en la voz, \"¡si ni siquiera él sabe hablar bien ucraniano! Diablos, anteayer le hice una pregunta a ese bastardo de Goloborodko. Desde la guerra, parece, se le ha olvidado hablar ruso. También se cambió el nombre para que sonara ucraniano... Bueno, pues le pregunté: ¿cómo se dice «gato» en ucraniano? «Kit», me dijo. Muy bien, le dije, ¿y cómo se dice «kit» en ucraniano?\"\n\n\"Eso lo remató. Solo frunció el ceño y no dijo nada. Ahora ya ni me da los buenos días\". Petya soltó una carcajada."
 russia.412.a: "La vida continúa..."
 russia.413.t: "Estimados rusos..."
 russia.413.d: "Hemos pasado por mucho, desde estar rodeados de aquellos que querrían ver nuestra nación desaparecer, presión constante sobre nosotros y varios grados de odio lanzados hacia nosotros, sin embargo, prevalecimos.\n\nNuestros rivales se encontraron con las consecuencias inevitables de sus acciones, y en eso hemos cosechado los frutos de nuestro trabajo. Ha habido muchas maneras en que nuestra nación podría haber sido llevada por un camino oscuro, pero con su fe y ambición, hemos atravesado uno de los peores momentos de la historia. Cambio constante, guerra y muerte.\n\nCuando nuestros hijos miren el mapa mundial, se asombrarán de lo inalterada que ha permanecido Rusia durante este período. Bueno, algo inalterada. Internamente hemos realizado amplias reformas en el sistema, dando más margen a los futuros líderes y, aunque nuestro rumbo anterior ha asegurado nuestra estabilidad, es mejor dar a la nueva generación la capacidad de establecer su rumbo en nuestro futuro estable.\n\nSin embargo, hay un sentimiento de fatiga en toda la nación, se ha sacrificado mucho. Sacrificios que no serán olvidados, las cicatrices infligidas en el mundo permanecerán y de esas cicatrices aprenderemos, reconstruiremos y mejoraremos. Comparto ese sentimiento, he hecho mucho, ustedes han hecho mucho, y con gran pesar debo anunciar mi renuncia. Es agridulce, el futuro sigue siendo incierto, pero saber que hemos sentado las bases para que los futuros líderes construyan sobre ellas, me hace sentir más esperanzado sobre el futuro de Rusia y del mundo. Con esto me despido de todos ustedes. Gracias."
 russia.413.a: "Hacia lo desconocido una vez más."
 russia.414.t: "¿Ha llegado el momento?"
 russia.414.d: "Desde la victoria de nuestra Madre Patria en Europa y la estabilización de la nueva esfera y el orden, nuestro presidente, Dmitri Anatólievich, piensa cada vez más en el futuro del país y del Estado.\n\n¿Quizás es hora de una nueva administración y una nueva forma de ver el desarrollo del país?\n\nLa centralización, la preparación para la guerra y la guerra misma le quitaron mucho a Dmitri Medvédev.\n\nA pesar de algunos desacuerdos, Dmitri Anatólievich sigue siendo el líder más popular entre la gente, y su sistema cuenta con el apoyo de la mayoría absoluta de los ciudadanos rusos. Sin embargo, hay personas cercanas a él en el país que pueden tomar el poder en sus propias manos si se siente cansado, y comenzar a construir su visión de Rusia.\nPodemos decir con seguridad: el futuro de nuestro país depende de la decisión de una sola persona."
 russia.414.a: "La era de Medvédev continuará, aún queda mucho por hacer."
 russia.414.c: "Lukashenko, elefante político y ejecutivo fuerte."
 russia.414.f: "Súrkov, cardenal en la sombra de la era de Putin y politólogo magistral."
 russia.415.t: "El Establecimiento del Título del Gobernante Supremo"
 russia.415.d: "Los recientes acontecimientos en Rusia han conmocionado a la comunidad política. Inesperadamente, el líder del PLDR, Vladímir Zhirinovski, anunció la proclamación de sí mismo como gobernante supremo de Rusia, el mismo título que ostentó Aleksandr Kolchak durante la guerra civil.\n\nAlgunos politólogos liberales occidentales califican el establecimiento del título de Gobernante Supremo por parte de Zhirinovski como un intento de tomar el poder y establecer una dictadura. Advierten sobre las posibles consecuencias de tal paso y llaman a protestas pacíficas y resistencia.\n\nEl propio Vladímir Zhirinovski afirma que solo un gobernante fuerte puede llevar a Rusia a la prosperidad y la estabilidad, y que solo él tiene la autoridad y la experiencia suficientes para este título.\n\nPero independientemente de los motivos e intenciones de Zhirinovski, su movimiento causó sentimientos encontrados entre la población. El futuro de la situación política en Rusia sigue siendo incierto, y solo el tiempo dirá qué consecuencias tendrá el establecimiento del título de Gobernante Supremo."
 russia.415.a: "¡Poder absoluto!"
 russia.417.t: "¡Elecciones!"
 russia.417.d: ""
 russia.417.a: "Rusia Unida."
 russia.417.b: "Rusia Popular."
 russia.418.t: "Democracia soberana"
 russia.418.d: "El presidente ruso, Dmitri Medvédev, junto con conocidos analistas políticos, ha publicado su primer libro, \"Democracia Soberana\". Este libro describe los objetivos, las razones y la profundidad de las reformas que se han llevado a cabo desde que Dmitri Anatólievich asumió la jefatura del Estado. También habla de los requisitos previos y la necesidad de crear una nueva democracia adaptada a Rusia, y describe los problemas a los que se enfrenta la reforma. Además, en él, Medvédev afirma una vez más que todas sus acciones corresponden al Curso de Putin, e incluso comparte detalles de conversaciones personales con Vladímir Vladímirovich. En su canal de Telegram, Dmitri Medvédev escribió que el libro se convertirá en un compañero útil para la juventud rusa en la vida política de la nueva Rusia. Los críticos liberales del libro, sin embargo, afirman que lo que allí se describe es solo \"Autoritarismo bajo una nueva máscara\", y que la única democracia real está en Occidente. A pesar de las críticas, \"Democracia Soberana\" se ha extendido entre los estudiantes y es popular en los círculos que apoyan el Curso de Medvédev, además de seguir despertando interés y debate en el entorno político ruso. El libro no ha ganado tanta popularidad en el extranjero, pero ha permitido a muchos expertos comprender mejor lo que está sucediendo en nuestro país en general."
 russia.418.a: "¡Larga vida y prosperidad!"
 russia.419.t: "Destino de Rusia Unida"
 russia.419.d: "Mientras nuestra victoria se consolidaba, el destino de Rusia Unida aún pendía de un hilo.\n\nLa mayor parte del partido está compuesta por oportunistas de carrera que solo adulan a la persona por encima de ellos. Originalmente creados solo para aprobar los documentos que Putin necesitaba, ahora decidieron que tienen el poder de pensar por sí mismos. Sin mencionar cuántos de ellos están completamente descalificados para sus puestos.\n\nSin embargo, el partido, al ser de facto el partido de Putin, todavía tiene mucho talento. Fue ese talento en el mar de la mediocridad lo que permitió a Putin hacer lo que hizo, y si podemos atraer a estos especialistas y tecnócratas a nuestro lado, los beneficios serán enormes.\n\n¿Qué será?"
 russia.419.a: "¡El tribunal más humano del mundo!"
 russia.420.t: "El final"
 russia.420.d: "Tras la caída del Gobierno anterior, todos los canales de financiación se secaron de repente: los generosos subsidios del Kremlin, de los que hasta hace poco dependían Comunistas de Rusia, RJ-PV, Gente Nueva y otros pequeños partidos minoritarios, se recortaron al instante. Las oficinas del partido se vaciaron, los activistas se quedaron sin sueldo y las campañas publicitarias cesaron de la noche a la mañana.\n\nLos líderes y miembros de base de las organizaciones desaparecidas comenzaron a buscar un nuevo refugio: algunos se apresuraron a unirse al PCFR, con la esperanza de encontrar recursos y una plataforma para sus ideas, mientras que otros se apresuraron a encontrar nuevas oportunidades para realizar su voluntad política, lanzando fundaciones privadas y proyectos benéficos, y buscando patrocinadores entre los empresarios locales, a todos los cuales sin duda conoceremos en el camino...\n\nSolo el PLDR sobrevivió: Zhirinovski movilizó viejas conexiones con la velocidad del rayo, redirigiendo las contribuciones del partido y las donaciones personales de sus asociados. Hoy, de los antiguos rivales sistémicos del PCFR, Zhirinovski es el único que continúa sus acciones, recordándonos que solo aquellos que pueden reorganizarse rápidamente sobreviven a la tormenta política."
 russia.420.a: "Sigamos observando la situación..."
 russia.421.t: "Nueva constitución soviética"
 russia.421.d: ""
 russia.421.a: "1993 vengado"
 russia.422.t: "Restauración del Sóviet Supremo"
 russia.422.d: ""
 russia.422.a: "De vuelta a cómo era..."
 russia.422.b: "¡No son mejores que Rusia Unida!"
 russia.423.t: "¡Rusia nos apoya!"
 russia.424.t: "Prigozhin promete apoyo a Zhirinovski"
 russia.424.d: ""
 russia.424.a: "¡Sigue el consejo de Vlásov y haz un trato con él!"
 russia.424.b: "Muchas gracias."
 russia.424.c: "Solo está tratando de hacer la pelota."
 russia.425.t: "Los wagneritas en el PLDR crecen en número"
 russia.425.d: ""
 russia.425.a: "Interesante..."
 russia.426.t: "Prigozhin exige purga militar"
 russia.426.d: ""
 russia.426.a: "Purga a todos los generales listados."
 russia.426.b: "Podemos negociar..."
 russia.426.c: "Dile que se calme."
 russia.427.t: "Nacionalistas Exigen la Eliminación de Zonas Autónomas"
 russia.427.d: "Con el aumento de la popularidad de la \"Santa Rusia\" y su control estatal, propusieron la política más controvertida hasta el momento: eliminar todas las administraciones minoritarias en Rusia. Esto puede llevar a consecuencias terribles.\nTodavía podemos presionar contra ellos y mantener todo en un limbo de \"statu quo\", para no provocar un aumento de las voces antirrusas."
 russia.427.a: "Solo podemos aceptar..."
 russia.427.b: "¡Rechazemos esta propuesta desastrosa!"
 russia.428.t: "Ígor Guirkin forma un nuevo partido"
 russia.428.d: "Guirkin, un monárquico moderadamente conocido y dictador -fallido- de Novorrusia, quien además fue invitado recientemente a un puesto oficial en el Ministerio de Defensa, ha salido con sus partidarios y ha organizado un nuevo partido \"verdaderamente patriótico\".\nEsta organización ya ha ganado popularidad entre la gente que no está contenta con las políticas y el Gobierno de Zhirinovski; la mayoría de ellos son monárquicos o alguien que puede ser descrito como nacionalista \"moderado\". Incluso con la personalidad repulsiva de Guirkin, logró unir a otros partidos más pequeños.\nSolo el tiempo dirá si la institucionalización de Guirkin causa más problemas que beneficios."
 russia.428.a: "Guirkin se quejó hoy..."
 russia.429.t: "¡PPR Exige Concesiones!"
 russia.429.d: "Recientemente, Ígor Guirkin ha publicado un video donde, de forma grosera, increpó a Zhirinovski, afirmando que su administración es ineficaz y corrupta, lo cual, aparentemente, pudo comprobar por sí mismo. En una declaración pública posterior, le exigió que se le diera un puesto de alto rango en el gobierno, para que él pudiera, de manera eficiente e incansable, eliminar la corrupción y la pereza. La PPR ya ha enviado una nota oficial directamente a Vladímir Zhirinovski.\nA pesar de que el PPR logró ganar más popularidad de la esperada, todavía podemos luchar contra su influencia y reducirlos a la irrelevancia, o al menos, conformarnos con alguien que no sea... Bueno, Guirkin."
 russia.429.a: "Bueno..."
 russia.429.b: "la PPR debería tener a alguien más, ¿verdad?"
 russia.429.c: "¡Vamos a mostrarle lo que es la verdadera frustración!"
 russia.430.t: "Zhirinovski obligado a la Regencia"
 russia.430.d: "A pesar de todos nuestros esfuerzos, nuestra dependencia de los cuadros monárquicos moderados ha llevado a que, de facto, se apropien por completo de los asuntos internos del gobierno. Muchos miembros del PLDR fueron expulsados de sus puestos y reemplazados por sus homólogos del PPR.\nVladímir Zhirinovski se ha vuelto impotente ante la creciente oleada de políticos y políticas monárquicas; se vio enredado en su propia red, fue manipulado y ahora se ve obligado a aceptar la \"propuesta\" para el establecimiento de la regencia oficial. El PLDR se ve ahora obligado a congraciarse con el PPR si quiere mantener el control del Estado."
 russia.430.a: "Todo tiene su momento..."
 russia.431.t: "Triunfo de Tokáev"
 russia.431.d: "El actual presidente de Kazajistán, Kasim-Yomart Tokáev, no se mostró indiferente ante las protestas. Se puso del lado del pueblo e inicia purgas contra todos los antiguos apparátchiks de Nazarbáyev que durante mucho tiempo mantuvieron el poder. Tokáev también decidió desacreditar el culto a la personalidad del propio Nazarbáyev, quien gobernó el país durante más de 30 años. Reconoció que muchas de las decisiones tomadas por Nazarbáyev fueron erróneas. Se anunciaron reformas democráticas a gran escala y la redacción de una nueva constitución. Kazajistán también expresó su gratitud a Rusia por su ayuda en tiempos difíciles. Como muestra de amistad y respeto hacia el país vecino, Kazajistán decidió iniciar una nueva etapa de integración económica entre ambos Estados. ¡La amistad ruso-kazaja es más fuerte que nunca!"
 russia.431.a: "Atrás quedó la era..."
 russia.432.t: "El fin de los disturbios"
 russia.432.d: "Las protestas en Kazajistán han terminado. Las autoridades informaron la restauración del orden en el país. 4.353 personas resultaron heridas, incluyendo 3.393 miembros de las agencias de seguridad. 238 muertos, incluyendo 19 policías y militares, fueron llevados a las morgues. Como resultado de estos eventos, el país experimentó cambios en el gobierno y la esfera política. En particular, el primer ministro, el secretario de estado, el presidente de la cámara baja del parlamento y la mitad de los ministros fueron reemplazados. Nazarbayev también perdió su posición como líder del partido gobernante Nur Otan, y Tokayev tomó su lugar. También uno de los resultados de las protestas fue una reducción en los precios del gas, lo que fue el catalizador de las protestas. ¿Es este el comienzo de algo grande, o Kazajistán no buscará reformas serias y mantendrá el statu quo? El tiempo lo dirá."
 russia.432.a: "Finalmente se acabó."
 russia.433.t: "Golpe de Nazarbáyeva"
 russia.433.d: "Durante las protestas en Kazajistán, ocurrió algo increíble: un golpe de Estado. Las fuerzas del KNB, lideradas por Darigá Nazarbáyeva, la hija mayor del expresidente Nursultán Nazarbáyev, tomaron el poder.\n\nEl clan Nazarbáyev, que ha ostentado el poder en Kazajistán durante décadas, tiene ahora el control total del país. Darigá Nazarbáyeva, quien anteriormente ocupó altos cargos en el Gobierno y el parlamento, se ha convertido en una auténtica autócrata. Se considera la Catalina la Grande kazaja y no oculta sus ambiciones. En sus discursos, promete llevar a Kazajistán a nuevas alturas y convertirlo en una de las principales potencias mundiales."
 russia.433.a: "No ha cambiado mucho para nosotros... supongo."
 russia.434.t: "Revolución liberal en Kazajistán"
 russia.434.d: "Kazajistán fue testigo de protestas a gran escala que han provocado cambios significativos en la vida política del país. Muchos expertos y observadores calificaron lo que estaba sucediendo como una revolución liberal, que conduce a la llegada al poder de las fuerzas democráticas. Los principales líderes de las protestas fueron Opción Democrática de Kazajistán y Mujtar Abliazov, exbanquero y empresario que se vio obligado a abandonar el país en 2009 tras un conflicto con el Gobierno. Durante las protestas, Abliazov regresó a Kazajistán y lideró un movimiento por la democracia y la libertad. Tras varios días de protestas masivas, el Gobierno kazajo se vio obligado a dimitir. Mujtar Abliazov se convirtió en el nuevo presidente del país, prometiendo amplias reformas y la creación de un Estado democrático."
 russia.434.a: "Resultado inesperado."
 russia.435.t: "Revolución socialista en Kazajistán"
 russia.435.d: "Las protestas en Kazajistán presenciaron lo que puede llamarse una revolución socialista liderada por el Movimiento Socialista de Kazajistán y Aynur Kurmanov. Las fuerzas de izquierda en Kazajistán se unieron en la lucha por los derechos de los trabajadores y los pobres. Los principales partidos de izquierda en Kazajistán, incluyendo el Partido Comunista, el Partido Socialdemócrata Nacional y el Partido Popular, lograron organizar una coalición inestable que tomó el poder en el país. El nuevo Gobierno prometió reformas democráticas y sociales radicales para mejorar la vida de los ciudadanos comunes. Una de las primeras medidas fue un aumento en los salarios y las pensiones, así como educación y medicina gratuitas para todos los ciudadanos."
 russia.435.a: "Resultado inesperado."
 russia.436.t: "Invitación al Estado de la Unión"
 russia.436.d: ""
 russia.436.a: "Si."
 russia.436.b: "No."
 russia.437.t: "Aceptaron"
 russia.437.d: "Kazajistán está listo para fortalecer los lazos fraternales con nuestro país y firmar documentos importantes que lo harán parte del Estado de la Unión. El Ministro de Asuntos Exteriores de nuestro país se reunió con su homólogo kazajo y discutió planes para fortalecer la seguridad y la cooperación económica.\n\nAsimismo, el Ministerio de Defensa celebró reuniones con colegas de Kazajistán. Se discutieron los temas de la unificación de las tropas en el marco del Estado de la Unión. Esto está previsto en los decretos firmados por el jefe de Estado.\n\nKazajistán está ahora fuertemente conectado con la esfera de influencia rusa."
 russia.437.a: "¡Un brindis por nuestros amigos kazajos!"
 russia.438.t: "Se negaron"
 russia.438.d: "El Gobierno antirruso de Kazajistán ha mostrado su verdadera cara y se ha negado a aceptar nuestras legítimas demandas para asegurar la región de Asia Central y los intereses de Rusia y su pueblo allí.\nA cambio, el \"Gobierno\" de Kazajistán ha declarado públicamente que nuestras demandas son inaceptables y constituyen una extorsión. Y ya han comenzado a cancelar muchas declaraciones interestatales con nosotros. La población rusa leal a nosotros ya ha iniciado manifestaciones contra la política del Estado kazajo.\n\nLos kazajos pronto aprenderán las consecuencias de tal rusofobia abierta."
 russia.438.a: "Iniciaremos una operación militar para resolver la crisis."
 russia.439.t: "Tokáev regresa al poder"
 russia.439.d: "Después de un breve Gobierno interino, Kasim-Yomart Tokáev regresó al país como presidente, aunque el término \"dictador\" es ahora más apropiado. Los primeros pasos de Tokayev fueron duros, reformó su partido, convirtiéndolo en un mecanismo centralizado, las manifestaciones antirusas y liberales son estrictamente controladas tanto por las Fuerzas Armadas rusas como por las fuerzas de Kazajistán. El legado de Nazarbáyev está siendo erradicado, y se está construyendo un culto a un nuevo \"Batyr\" - Tokáev - en el país. Al mismo tiempo, es completamente leal a Rusia, y está listo para hacernos cualquier concesión a nosotros y a nuestros aliados.\nQuizás Kazajistán algún día vuelva a su curso habitual, pero por ahora, la nueva realidad es la nueva normalidad por mucho tiempo."
 russia.439.a: "¡Kazajistán ha vuelto!"
 russia.440.t: "Cambio de nombre de Astaná"
 russia.440.d: "Gracias a nuestra intervención militar, Kassym-Jomart Tokayev logró mantener su poder en Kazajistán. Pero todo en esta vida tiene un precio, y Kazajistán tuvo que celebrar referendos sobre la anexión de los territorios del norte poblados principalmente por rusos, con resultados predecibles. Este acuerdo incluyó la región de Akmola junto con Astaná, renombrada Akmolinsk. Ahora Almaty ha vuelto a ser la capital de Kazajistán.\nAkmolinsk fue fundada en 1830 a partir de un puesto cosaco creado para proteger las aldeas que habían tomado el control ruso de las incursiones rebeldes. El nombre duró hasta 1961, cuando la ciudad fue renombrada Tselinograd, debido a su importancia en el desarrollo de las tierras vírgenes del Cáucaso Norte y Siberia Occidental. Tras el colapso de la URSS, la ciudad fue nombrada Akmola, y unos años más tarde, Nursultan Nazarbayev trasladó la capital allí y la renombró Astaná. Ahora la justicia histórica ha prevalecido."
 russia.440.a: "Bien."
 russia.441.t: "¡Tokáev pide ayuda!"
 russia.441.d: "Recientemente, hubo un golpe anticonstitucional en Kazajistán, donde fuerzas antirrusas tomaron el poder. Afortunadamente, el presidente legítimo, Kasim-Yomart Tokáev, fue puesto a salvo por nuestros servicios de seguridad y ahora se encuentra en una dacha temporal en Oremburgo. Tras varios días de calma, escribió una carta al presidente de la Federación de Rusia rogando ayuda para restaurar la estabilidad y el orden legal en la República de Kazajistán. La primera parte de la carta fue ampliamente difundida por los medios rusos, pero en la segunda parte, que es de acceso restringido al público, Tokáev admite la falacia de su política multivectorial y ofrece importantes concesiones a Rusia si esta acepta intervenir. Entre ellas, Tokáev incluso accedió a celebrar referendos sobre la adhesión a Rusia en los territorios del norte de Kazajistán. A pesar de tan generosos \"regalos\" de Tokáev, la decisión final recae en el Gobierno ruso."
 russia.441.a: "¡Apoyaremos a Tokáev!"
 russia.441.b: "No, gracias."
 russia.442.t: "Desnazarbayevización total"
 russia.442.d: "El presidente de Kazajistán, Kasim-Yomart Tokáev, ha iniciado una revisión de la historia del país. Se presta especial atención al primer líder, Nursultán Nazarbáyev, quien dirigió el país durante casi tres décadas.\nEl análisis de nuevos datos y materiales de archivo reveló hechos de corrupción, represión y otras manifestaciones de autoritarismo durante su reinado.\n\nTokáev enfatiza que una nueva era está comenzando para Kazajistán, donde no habrá lugar para errores y crímenes pasados.\n\nMuchas víctimas del antiguo régimen recibieron compensación y disculpas públicas. Hay detenciones de alto perfil de exfuncionarios en el país, y los activos de la familia Nazarbáyev han sido congelados por las autoridades."
 russia.442.a: "¿Genial?"
 russia.443.t: "Retorno de la democracia en Kazajistán"
 russia.443.d: "Tras un largo período de endurecimiento del poder, el presidente Tokáev anunció nuevas reformas. Su objetivo es devolver las instituciones democráticas y la libertad al país.\n\nEn un discurso oficial, Tokáev prometió al pueblo que, después de todas las medidas decisivas destinadas a eliminar elementos peligrosos y destructivos, el país volvería a una verdadera democracia. Hizo hincapié en que ahora cada kazajo podrá expresar sus pensamientos libremente dondequiera que esté.\n\nMuchos partidos, cuyas actividades fueron suspendidas durante el período de estabilización, han reanudado su trabajo y se están preparando para las elecciones al Mazhilís."
 russia.443.a: "Hemos vuelto."
 russia.444.t: "¡La Marcha de la Justicia de Prigozhin!"
 russia.444.d: "Tras nuestra terrible derrota en la guerra contra la OTAN, Yevgueni Prigozhin decidió aprovechar el momento de debilidad y la desesperación del pueblo a su favor. Hoy anunció que \"ya no aceptará órdenes de alimañas y parásitos\", y en su lugar, iniciará una revuelta abierta contra nuestro Gobierno.\nÉl, brutalmente, tomó el control del Óblast de Leningrado, y ahora prepara a su CMP \"Wagner\" para una marcha hacia Moscú, denominándola \"Marcha de la Justicia\".\nLos generales militares ya se han puesto en contacto con el Kremlin y han propuesto ceder el poder directamente al ejército, para salvaguardar la estabilidad y aplastar el golpe."
 russia.444.a: "Ríndanse a los militares. ¡Esta \"herejía\" debe ser desterrada!"
 russia.445.t: "¡La marcha comienza!"
 russia.445.d: "Pocas horas después del anuncio oficial de Prigozhin, sus soldados han iniciado un movimiento masivo hacia la capital de Rusia. Ya habían destruido pequeños grupos del ejército estatal en su camino.\nLa Stavka, tras horas de planificación y reuniones, ha propuesto solo dos decisiones: o enviar un grupo de ejército para interceptarlos y emboscarlos, o preparar las principales ciudades, y especialmente Moscú, para una defensa pesada."
 russia.445.a: "¡Destrúyanlos ahora!"
 russia.445.b: "¡Debemos tener cuidado! ¡Preparen las defensas!"
 russia.446.t: "¡Prigozhin victorioso!"
 russia.446.d: "El Plan A resultó en un fracaso terrible del Gobierno, con miles de soldados rusos muertos por quienes alguna vez fueron sus compañeros soldados rusos. La marcha de Prigozhin entró en Moscú con poca resistencia, y el ejército estatal se rindió poco después. Yevgueni Prigozhin se encuentra ahora al mando de una nación devastada por la guerra, con una situación similar a los tiempos de problemas de antaño. Ya había informes de Navalni escapando del confinamiento y reuniendo a su escoria liberal para contra-rebelarse contra Wagner.\n¡Prigozhin no cederá! ¡Restaurará la gloria y el poder de Rusia, y se vengará de los perros de la OTAN y los nacionalistas ucranianos!\nHa llegado el momento de una manifestación masiva en Moscú, donde Prigozhin anunciará claramente sus intenciones."
 russia.446.a: "¡Rusia será wagnerizada!"
 russia.447.t: "¡Prigozhin derrotado!"
 russia.447.d: "El Plan B resultó en la terrible derrota de Prigozhin, con miles de soldados rusos muertos por quienes alguna vez fueron sus compañeros soldados rusos. La marcha de Wagner fue detenida, vencida por la dura defensa de Moscú y otras ciudades, y los restos de Wagner se rindieron poco después. A pesar de que los golpistas yacen derrotados, Rusia sigue siendo una nación devastada por la guerra, con la gente todavía amargada específicamente con el ejército. Shoigú entiende esto, y tiene a alguien que puede convertirse en un nuevo faro de esperanza y unidad, no solo para Rusia, sino para toda Eurasia.\nHa llegado el momento de tener algunas reuniones inesperadas..."
 russia.447.a: "Sentando las bases para una nueva Rusia."
 russia.448.t: "Shoigú se reúne con Duguin"
 russia.448.d: "Hoy, Serguéi Shoigú, en un anuncio oficial del Kremlin, se reunió con el conocido filósofo Aleksandr Duguin. Los detalles de la reunión personal permanecen clasificados, pero para sorpresa de muchos, Shoigú, poco después, transmitió su carta de renuncia al poder y de regreso al Gobierno civil. Sin embargo, el poder no volverá a la Duma Estatal, sino que se entregará a la entidad política recientemente formada \"Partido Eurasia\", liderada por los asociados cercanos de Duguin, siendo él mismo el líder de facto del movimiento neoeurasianista.\nMuchos todavía se preguntan qué inspiró al Estado Mayor a elegir a Duguin; algunos dicen que es porque su libro \"Fundamentos de Geopolítica\" era una lectura popular en las Academias Militares, otros dicen que su filosofía unitaria, soviético-imperial, se convirtió en la clave del éxito."
 russia.448.a: "Veamos qué puede hacer un filósofo improvisado."
 russia.449.t: "¡Intento de asesinato a Prigozhin!"
 russia.449.d: "Hoy, Rusia ha escapado de una terrible tragedia. Yevgueni Prigozhin, quien participó en una marcha pública en Moscú, estuvo cerca de la muerte. Su vida se salvó gracias a un chaleco antibalas y a la reacción ultrarrápida de sus guardias personales. El autor del intento de asesinato fue abatido en el acto.\nSegún se supo, se trataba de Timur Rakhmetulla, un nativo de Izhevsk de 45 años, conocido en círculos reducidos como extremista y liberal. La revisión de su teléfono mostró que antes del intento de asesinato, escribió en uno de los chats de grupo de Telegram: \"Voy a matar a esta perra calva\". Ahora todos los participantes de este chat están siendo buscados.\n\nEl destino salvó al Gran Comandante, y después de un contacto tan cercano con la muerte, Yevgueni Prigozhin se mostró aún más decidido a gobernar su patria."
 russia.449.a: "Fiat iustitia, et pereat mundus."
 russia.450.t: "Dmitri Medvédev derrocado de la Presidencia"
 russia.450.d: "La mala toma de decisiones de Medvédev llevó a Rusia a la derrota en su guerra de extensión. Ahora no tiene más opción que dejar la oficina del Kremlin, para siempre en la vergüenza. Con él, todo su Gobierno renunció, y ahora, la única persona capaz de tomar las riendas provisionales en estos tiempos difíciles es el presidente de la Duma Estatal, Viacheslav Volodin. No es la decisión más popular, pero tendrá que hacerlo."
 russia.450.a: "Feci quod potui faciant meliora potentes."
 russia.451.t: "Elecciones libres Ucranianas"
 russia.451.d: "VNIMANIE! \nPUTIN NEDAVNO OBIAVIL O ZAPUSKE KODA \"5050\" PO NASTUPLENIU NA KIEVSKI KFS GDE MOZHNO RAZDOBYT DVA TVISTERA PO TSENE ODNOGO\nZ Rabotaite, bratia"
 russia.451.a: "Eto po suti ne dolzhen prochitat igrok poetomu mne pojui"
 russia.451.b: "Eto po suti ne dolzhen prochitat igrok poetomu mne pojui"
 russia.451.c: "Eto po suti ne dolzhen prochitat igrok poetomu mne pojui"
 russia.452.t: "¡Dependencia de economías europeas en nosotros!"
 russia.452.d: "A medida que más y más naciones incipientes liberadas de la dominación extranjera se alinean con la Federación de Rusia, desde el mar Negro hasta el Báltico, podemos comenzar a reconstruir, y la parte clave de la reconstrucción reside en la economía. Estas naciones están arruinadas por la guerra y el imperialismo extranjero, y han recurrido a nosotros para remediar esto. Naturalmente, debemos aceptar, no solo por las oportunidades que nos brinda, sino por la obligación de una nación más grande de proteger a las más pequeñas. Se espera que esta reconstrucción sea bastante costosa y, con naciones en gran parte en bancarrota recibiendo nuestra ayuda, se espera que seamos nosotros quienes paguemos la cuenta, al menos en un futuro cercano.\n\nEsperamos que esta condición persista por algún tiempo, ya que probablemente pasarán años antes de que estas naciones puedan reequipar o construir una nueva base industrial para sí mismas, y cualquier empresa establecida tendrá dificultades para competir con nuestra industria. Sin embargo, si esta iniciativa tiene éxito, podemos encontrarnos con una serie de aliados útiles que defiendan nuestras regiones occidentales, y grandes mercados extranjeros con los que nuestra economía puede interactuar con relativa impunidad."
 russia.452.a: "Blin."
 russia.453.t: "Ziugánov se jubila"
 russia.453.d: "Guennadi Ziugánov, ya exjefe de nuestro país y del Partido Comunista, finalmente ha decidido tomarse un merecido descanso. Sirvió a su país y a su pueblo durante muchos años, luchando por la justicia social y la igualdad. Ahora Guennadi Andréyevich pasará sus días en su dacha, donde hará lo que más le gusta: la apicultura. Siempre le ha gustado la apicultura y cree que es una actividad muy importante para mantener el equilibrio ecológico y producir miel de calidad. Su trabajo y sus esfuerzos en la política serán recordados y apreciados por el pueblo durante mucho tiempo."
 russia.453.a: "Gracias por su trabajo, Guennadi Andréyevich."
 russia.454.t: "¡Resultados electorales!"
 russia.454.d: "Después de una dinámica campaña electoral realizada por todos los partidos, compromisos políticos y declaración de candidaturas, la Comisión Electoral Central ha contado con éxito todos los votos. Con el aliento contenido, los miembros de cada partido, junto con los ciudadanos de a pie, ahora miran sus televisores, dispositivos móviles y ordenadores para saber quién es el ganador de las elecciones rusas. Aunque muchos sospechan que Rusia Unida se mantendrá al frente de la nación, todavía hay posibilidades de victoria para Rusia Popular, y si las probabilidades son realmente correctas, un tercer partido, Rusia Nueva, puede lograr una victoria inesperada.\n\nEl ganador es..."
 russia.454.a: "¡Dmitri Pátrushev!"
 russia.454.a1: "¡Serguéi Sobianin!"
 russia.454.a2: "¡Mijaíl Mishustin!"
 russia.454.a3: "¡Andréi Beloúsov!"
 russia.454.b: "¡Viacheslav Volodin!"
 russia.454.b1: "¡Serguéi Shoigú!"
 russia.454.b2: "¡Serguéi Narishkin!"
 russia.454.c: "¡Mijaíl Delyagin!"
 russia.454.c1: "¡Pável Grudinin!"
 russia.454.c2: "¡Valentín Konovalov!"
 russia.454.f: "¡Zajar Prilepin!"
 russia.454.f1: "¡Aleksandr Lukashenko!"
 russia.454.f2: "¡Nikolái Platoshkin!"
 russia.454.g: "¡Vladislav Davankov!"
 russia.454.g1: "¡Mijaíl Delyagin!"
 russia.454.g2: "¡Dmitri Pátrushev!"
 russia.454.g3: "¡Zajar Prilepin!"
 russia.454.g4: "¡Viacheslav Volodin!"
 russia.454.h1: "¡Dmitri Pátrushev!"
 russia.454.h2: "¡Mijaíl Delyagin!"
 russia.454.h3: "¡Zajar Prilepin!"
 russia.454.h4: "¡Viacheslav Volodin!"
 russia.455.t: "Rashkin condecora a Navalni"
 russia.455.d: "Valeri Rashkin, presidente de la URSS, ha condecorado hoy solemnemente con la medalla \"Por los Servicios a la Patria\" a ciudadanos de nuestro país especialmente destacados, pero esta ceremonia en particular ha sido especial porque también la ha recibido Alekséi Navalni, un conocido opositor. La ceremonia ha tenido lugar en el Kremlin y ha contado con la presencia de numerosos altos cargos y representantes de los medios de comunicación.\nEn su discurso, Rashkin ha elogiado la dedicación de Navalni a la democracia y su voluntad de hacer frente a la corrupción y la injusticia. Ha reconocido que sus puntos de vista políticos difieren mucho, pero ha subrayado la importancia de reconocer y honrar a quienes luchan por aquello en lo que creen.\nAl recibir la medalla, Navalni ha agradecido a Rashkin y ha hablado de la importancia de la libertad de expresión y de la necesidad de un gobierno que represente a todos sus ciudadanos. También ha expresado su esperanza de que el gesto sea un paso hacia una mayor unidad y entendimiento entre las facciones políticas del país."
 russia.455.a: "¡Evento interesante!"
 russia.456.t: "Mijaíl Svetov crea una nueva Unión Democrática"
 russia.456.d: ""
 russia.456.a: "¡Golpea a los fascistas!"
 russia.457.t: "Reforma del Estado ruso"
 russia.457.d: "La Federación de Rusia ha dejado de ser útil para sus ciudadanos, los fracasos de Rusia Unida quedan claros por la humillación que hemos sufrido a manos de una administración corrupta incapaz de limpiarse. Esto no es por falta de intentos, que conste, pero es obvio que el viejo sistema debe ser erradicado. Comenzaremos declarando el Estado ruso en lugar de la antigua Federación.\n\nFue por la voluntad de un tuvano, nuestro General Shoigú, que el eurasianismo ha tomado las riendas del Estado ruso, el Federalismo no protegió a los pueblos euroasiáticos y la Tuvá de Shoigú siguió siendo la región más pobre de Rusia a pesar de la autonomía. Ahora está claro que la reforma autocrática del Estado de Duguin servirá mejor al pueblo eurasiático de lo que cualquier Autonomía Federal podría haberlo hecho, los frutos del Eurasianismo están a la vuelta de la esquina para nosotros. Con la muerte de la Federación y la anulación de la antigua Constitución, podemos empezar a erradicar elementos insidiosos en todos los niveles de la sociedad y en cada órgano de gobierno."
 russia.457.a: "Un nuevo comienzo."
 russia.458.t: "La transmisión"
 russia.458.d: "\"Buenos días, mis queridos compatriotas. Soy Nikolái Lukashenko. Esto es algo raro para mí porque los discursos no son mi fuerte. Pero la honestidad sí lo es. Creo que lo que tengo que decir hoy les resultará muy refrescante. Mi padre y Putin, ambos grandes líderes. Construyeron este país de la nada. Usando mentes brillantes comprometidas con nuestro futuro. Juntos construyeron una nación. Putin nos dio propósito y esperanza. Las fábricas de mi padre nos dieron el ejército más poderoso... ...que el mundo haya conocido jamás. ¡Pero nuestro ejército nos ha fallado! Se han permitido engordar, volverse perezosos y descuidados. Pero eso... cambia hoy. Ha llegado el momento de una nueva y jodida gestión. Y nosotros sabemos lo que esta nación necesita. Y extirparemos esta enfermedad de la complacencia y la subyugación...\""
 russia.458.a: "Palabras fuertes, pero necesarias."
 russia.459.t: "Aleksandr Duguin nombrado jefe de Gobierno"
 russia.459.d: "El nombramiento de Aleksandr Duguin como primer ministro de Rusia es una medida que cambiará rápidamente la sociedad rusa. Solo se puede imaginar cuánto cambiará Rusia bajo la guía del ideólogo eurasianista.\nLa medida es una sorpresa para la Federación de Rusia, que esperaba un gobierno de emergencia pero no un primer ministro o presidente de un partido no afiliado a Rusia Unida o UR. Para el hombre común, el nombramiento de Duguin es curioso, pero para el individuo informado, la política exterior y la cosmovisión de Duguin influyeron durante mucho tiempo en las perspectivas putinistas, por lo que esto es solo una evolución natural para Rusia y el Gobierno ruso, no como una continuación de Rusia Unida, sino como una versión evolucionada que va más allá del mero seguimiento farsante de lo que se consideraba política exterior \"eurasiática\" y que abraza plenamente Eurasia como una entidad política, no solo una política.\n\nEn los próximos meses, Rusia verá cambios, nuestros enemigos en Europa nos mirarán con sospecha y con razón, el mundo occidental no puede permitirse que exista una Eurasia fuerte y es precisamente por eso que debemos soportar esto, es precisamente por eso que el cargo de primer ministro de Duguin es tan importante. La izquierda rusa y la derecha rusa se unificarán bajo el liderazgo de Duguin y juntos el liberalismo, los oligarcas explotadores, los conglomerados internacionales que controlan la vida de millones, serán eliminados de la Ecuación Euroasiática, Europa ya no estará plagada de sus dolencias por mucho tiempo, Duguin curará a Rusia y pronto curará también a Occidente."
 russia.459.a: "Duguin quiere reforma, reforma real."
 russia.460.t: "¡Traidores por todas partes!"
 russia.460.d: "El pueblo de Rusia está cansado de la guerra. El mandato anterior de Medvédev como presidente fue muy apreciado, pero los buenos sentimientos y la nostalgia putinista han terminado a medida que las tropas de la OTAN marchaban hacia el este. Nuestros territorios caucásicos fueron arrancados, hemos perdido nuestras conexiones con el mar Negro. Lo peor de todo es que nos hemos visto obligados a acoger exiliados políticos y liberar prisioneros políticos como condición de paz.\n\nNuestro ejército deserta a las calles, difundiéndose entre las hordas de liberales empoderados, sin duda respaldados e impulsados por organizaciones de inteligencia y grupos de apoyo occidentales. No son solo liberales, sino también nacionalistas, comunistas, nuestros antiguos aliados en varios partidos legales, cada afiliación política está saliendo de la nada para derribar a Rusia Unida y para derribar el bastión centrista que durante mucho tiempo ha mantenido unida a Rusia, un baluarte contra los oligarcas y contra la invasión occidental. Pero no logramos mantener el baluarte, cediendo ante los oligarcas para apoyar la guerra y cayendo ante la invasión occidental.\n\nAlgunas unidades de Wagner también se han vuelto rebeldes, Prigozhin no ha sido visto desde la derrota. Elementos del ejército están presionando a nuestro Gobierno para que les permita formar un Gobierno de emergencia bajo la guía de Shoigú. Se da a entender fuertemente que la solicitud no es opcional, ya que las unidades ya se están moviendo hacia Moscú para asegurarla. Entramos en un nuevo tiempo de problemas."
 russia.460.a: "¡Todo el mundo está en nuestra contra!"
 russia.461.t: "Oposición no sistémica"
 russia.461.d: "En cualquier país existe un grupo de personas que no participan en la política habitual del país, sino que, por el contrario, intentan organizar la suya propia, como contrapeso a la oficial. Históricamente, en Rusia, este grupo de personas es liberal; aunque hay varios otros \"colores\" dentro de él, la agenda liberal es absolutamente dominante. Aunque en gran medida no amenazan el sistema estatal actual, su existencia y fortalecimiento pueden tener consecuencias negativas para nuestro país. Son ellos quienes están siendo utilizados por Occidente para intentar desviar a Rusia de su camino y obstaculizar la realización de nuestro sueño común de todas las formas posibles.\n\nLa administración debe vigilar el crecimiento de la £GFX_RF_logo  oposición liberal y tratar de limitarla, reducir su fuerza de todas las maneras posibles, para que sus efectos negativos se debiliten."
 russia.461.a: "Los idiotas útiles de Occidente..."
 russia.462.t: "¡Voto sobre las enmiendas exitoso!"
 russia.462.d: "El pueblo votó \"sí\", y se preservó la cohesión social."
 russia.462.a: "¡Gloria a Putin!"
 russia.463.t: "Protestas por los resultados electorales"
 russia.463.d: "Nuestros funcionarios llevaron a cabo el proceso de votación sobre las enmiendas constitucionales, pero lo hicieron de una manera extremadamente descuidada. La oposición liberal, considerando las elecciones sin sentido, en su mayoría ignoró la votación. Sin embargo, los comunistas de Moscú, liderados por Valeri Rashkin, no perdieron la oportunidad y organizaron protestas masivas en Moscú. Las enmiendas fueron adoptadas, pero con resultados mucho peores de lo esperado, lo que fue un golpe para las autoridades y provocó una ola de resentimiento en la sociedad."
 russia.463.a: "Debemos ser más cuidadosos."
 russia.464.t: "Discurso de Putin sobre las enmiendas constitucionales"
 russia.464.d: "En un discurso muy esperado, el presidente ruso Vladímir Putin se dirigió a la nación, exponiendo una serie de enmiendas constitucionales propuestas y anunciando el inicio de los preparativos para un referendo nacional. Las enmiendas, si son aprobadas, supondrían cambios significativos en el panorama político y la estructura de gobierno de Rusia.\n\nDurante su discurso, el presidente Putin enfatizó la importancia de actualizar la constitución del país para reflejar las necesidades y aspiraciones cambiantes de sus ciudadanos. Destacó que las enmiendas propuestas tienen como objetivo fortalecer las instituciones democráticas, proteger los derechos individuales y asegurar la estabilidad y el desarrollo continuos de Rusia."
 russia.464.a: "¡Que el pueblo decida!"
 russia.465.t: "¿Cooperación con Irán?"
 russia.465.d: "Con nuestra operación antiterrorista contra los talibanes en marcha, sería una buena idea pedir un apoyo limitado a Irán, pues es sabido que existen tensiones entre estos y los talibanes.\nSi bien no necesitamos su participación activa, que choquen con las fuerzas talibanas en su frontera y que nos permitan acceder a sus líneas de suministro puede que sea de gran ayuda para por cumplir los objetivos de nuestra OAT lo más rápido posible."
 russia.465.a: "Enviemos la petición oficial."
 russia.465.b: "¡Lidiaremos con los talibanes por nuestra cuenta!"
 russia.466.b: "Na."
 russia.466.t: "Irán se niega a cooperar"
 russia.466.d: ""
 russia.466.a: "Comprensible."
 russia.467.t: "Marcha islámica"
 russia.467.d: "¿Estás de coña?"
 russia.467.a: "¡Continuaremos pase lo que pase!"
 russia.467.b: "Si la gente quiere..."
 russia.468.t: "Resultados de la \"desislamización\""
 russia.468.d: ""
 russia.468.a: "No es exactamente lo que queríamos."
 russia.469.t: "¿Ateísmo de Estado?"
 russia.469.d: "Antes del establecimiento del poder soviético, la Iglesia ortodoxa rusa, a pesar de su supuesta libertad de religión, sirvió como instrumento de control poblacional, promoviendo ideas \"necesarias\" en la sociedad. Sin embargo, hemos corregido esta injusticia debilitando significativamente la influencia de la Iglesia ortodoxa rusa. No obstante, algunos miembros del partido creen que esto no es suficiente y que necesitamos volver al principio del ateísmo de Estado. Esta iniciativa, aunque es un noble impulso para volver al antiguo orden soviético, en opinión de la mayoría, es demasiado radical. ¿Qué debemos hacer?"
 russia.469.a: "¡No hay ningún Dios!"
 russia.469.b: "Demasiado intransigente..."
 russia.470.t: "El auge del desarrollo de videojuegos indie ruso"
 russia.470.d: "Tras el resurgimiento de la vanguardia y el futurismo rusos, que habían sido olvidados durante décadas, artistas, músicos y escritores comenzaron a crear nuevas obras brillantes e inusuales. Para apoyar a los nuevos talentos, se empezaron a destinar fondos para la creación de nuevas obras y la organización de exposiciones, conciertos y otros eventos.\n\nLa industria de los videojuegos tampoco se quedó atrás. Muchos desarrolladores comenzaron a crear juegos inusuales y que invitaban a la reflexión. Utilizaron elementos de la vanguardia y el futurismo para crear mundos de juego verdaderamente únicos. Muchos de ellos se hicieron muy populares entre los fans de los juegos extraños.\n\nGracias a este auge en la industria de los juegos independientes, Rusia se convirtió en uno de los líderes en la producción de juegos oscuros y de vanguardia."
 russia.470.a: "Que extraño..."
 russia.471.t: "Elegir capital para la Novorrusia unida"
 russia.471.d: "Las negociaciones sobre la unificación de Novorrusia continúan, pero ahora necesitamos resolver un problema importante: ¿qué ciudad servirá como capital de la república unida?\nDos ciudades pueden convertirse en el centro: Donetsk y Lugansk.\nDonetsk es un gran centro industrial y minero con una gran población, pero ubicado peligrosamente cerca del frente.\nLugansk es una ciudad con una población más pequeña, pero no menos industrializada y con una ubicación más segura.\n\nLa discusión sobre este tema puede llevar mucho tiempo, pero nuestra elección..."
 russia.471.a: "¡Lugansk es una ciudad verdaderamente rusa!"
 russia.471.b: "¡Donetsk es el corazón del Dombás!"
 russia.472.t: "¿Nuevo jefe para el Gobierno de Novorrusia?"
 russia.472.d: "Las negociaciones sobre la unificación de las repúblicas del Dombás continúan, y ahora nos enfrentamos a otra pregunta: ¿quién se convertirá en el jefe del nuevo Estado? Dos candidatos se postulan para el puesto: Denís Pushilin y Leonid Pásechnik.\n\nPushilin, el actual jefe de la R.P. de Dontesk, tomó el poder en sus propias manos después de la muerte del extremadamente popular Aleksandr Zajárchenko. Aunque goza de un apoyo popular relativamente alto, Pushilin nunca ha alcanzado el nivel de Zajárchenko. Antes de comenzar su carrera política, estuvo involucrado en los negocios e incluso estuvo asociado con el infame \"MMM\" Serguéi Mavrodi.\n\nPásechnik, el actual jefe de la R.P. de Lugansk, estuvo previamente asociado con las fuerzas de seguridad de Ucrania e incluso tenía el rango de coronel del SBU, pero su lealtad no está en duda. Tiene más experiencia política que Pushilin, así como un apoyo popular ligeramente mayor. Ambos candidatos tienen sus ventajas y desventajas, sin embargo, él se convertirá en el jefe de Novorrusia..."
 russia.472.a: "¡La experiencia de Pasechnik tiene más valor!"
 russia.472.b: "¡La gestión empresarial de Pushilin parece útil!"
 russia.473.t1: "¡Finalizadas las conversaciones sobre Novorrusia!"
 russia.473.t2: "Las negociaciones sobre Novorrusia concluyen apresuradamente"
 russia.473.d: ""
 russia.473.a: "Serán más fuertes juntos..."
 russia.474.t: "Ziugánov impulsa un nuevo cinturón rojo"
 russia.474.d: "El líder del Partido Comunista de la Federación de Rusia hizo una propuesta interesante: revivir el llamado Cinturón Rojo.\nEl Cinturón Rojo es un grupo de regiones en el centro de Rusia, el Cáucaso Norte, Siberia y el Extremo Oriente que durante mucho tiempo han expresado su apoyo al Partido Comunista en las elecciones locales y nacionales. El Cinturón Rojo se mostró especialmente brillante en las elecciones presidenciales de 1996, brindando un apoyo significativo a Ziugánov en su confrontación con Yeltsin.\nAunque el apoyo a los comunistas ha ido disminuyendo cada vez más con el tiempo, este término aún no ha perdido su relevancia. Y si el Partido Comunista logra restaurar la confianza de la gente de estas regiones, obtendrá una ventaja significativa sobre otras fuerzas políticas."
 russia.474.a: "Ah... ¿Queriendo una nueva \"revancha roja\"?"
 russia.475.t: "Zhirinovski se prepara para recorrer el país"
 russia.475.d: "El líder del PLDR es, sin duda, uno de los políticos más excéntricos de la Rusia moderna. Goza de la simpatía popular debido a sus inesperadas y controvertidas payasadas durante las reuniones de la Duma Estatal o durante su participación en varios programas de televisión.\nZhirinovski no desdeña utilizar una variedad de métodos populistas en su carrera política. Uno de estos métodos es su \"salida al pueblo\", durante la cual se reúne con la gente común de todo el país, habla ante una amplia audiencia y escucha las opiniones de los ciudadanos sobre la situación política actual.\nRecientemente, el político anunció que planea visitar muchas ciudades rusas, donde se reunirá con sus partidarios y ofrecerá una pequeña conferencia de prensa en cada una. Aunque el PLDR sigue siendo solo el tercer partido más popular, este evento le ayudará a fortalecer significativamente su posición y a obtener apoyo popular adicional."
 russia.475.a: "Bueno... Su vigor es admirable"
 russia.476.t: "La detención de político del CPRF causa controversia"
 russia.476.d: "La reciente detención de un miembro del Partido Comunista por parte de las fuerzas del orden ha provocado una fuerte reacción pública. La dirección del partido emitió un comunicado en el que afirmaba que la detención se había realizado de forma ilegal y sin cargos específicos. Al mismo tiempo, los diputados de la facción del PLDR expresaron su apoyo a esta decisión. En las redes sociales se están debatiendo su legalidad y validez. Este incidente no tuvo consecuencias catastróficas, pero sin duda asestó un golpe a nuestra imagen."
 russia.476.a: "Deberíamos tener más cuidado la próxima vez..."
 russia.477.t: "La detención de un político del PLDR causa controversia"
 russia.477.d: "No hace mucho tiempo, un miembro del Partido Liberal-Demócrata fue detenido por las fuerzas del orden, lo que provocó una reacción mixta en la sociedad. El líder del partido, Vladímir Zhirinovski, habló desde la tribuna de la Duma Estatal, diciendo que el Comité de Investigación estaba sumido en la corrupción y que la policía actuaba de manera irresponsable. Mientras tanto, los diputados del Partido Comunista de la Federación de Rusia salieron en apoyo del arresto. En Internet se expresan opiniones sobre la legalidad de la detención, así como afirmaciones de que sus razones son completamente falsificadas. Este evento no tuvo consecuencias graves, pero definitivamente asestó un golpe a nuestra reputación."
 russia.477.a: "Deberíamos tener más cuidado la próxima vez..."
 russia.478.t: "Liberales protestan contra la intervención en Kazajistán"
 russia.478.d: "La reciente decisión de los países de la OTSC de enviar tropas a Kazajistán para llevar a cabo una operación especial de mantenimiento de la paz fue recibida con condena y resistencia por parte de la llamada \"oposición liberal\". Muchos jóvenes salen a las calles en mítines no autorizados en apoyo del pueblo kazajo y contra la \"agresión del Kremlin\". Hay lemas como: \"¡No a la guerra!\", \"¡Kazajistán, estamos contigo!\", \"¡La banda de Putin a juicio!\", \"¡Libertad para Navalni!\" y otras cosas desagradables sobre las autoridades. \nSí, podemos ignorar la bilis y arrestar solo a los más fervientes, pero las fuerzas de seguridad confían en que todo empieza pequeño y la inacción dará sus frutos en el futuro."
 russia.478.a: "Ya pasará."
 russia.478.b: "Hay que usar medidas drásticas, no debemos parecer débiles."
 russia.479.t: "Protesta del PCF contra funcionarios locales corruptos"
 russia.479.d: "Hace algún tiempo, activistas del Partido Comunista de la Federación de Rusia llevaron a cabo una manifestación contra funcionarios locales, alegando que estaban saqueando incontrolablemente el presupuesto municipal. Varios cientos de personas se reunieron en la protesta, manifestándose en apoyo del partido y exigiendo el nombramiento de nuevos funcionarios de entre los miembros del Partido Comunista.\nLa administración local se negó a hacer comentarios. Este evento es un pequeño evento local, pero definitivamente puede beneficiar a los comunistas."
 russia.479.a: "Que se salgan con la suya..."
 russia.479.b: "Barrámoslo bajo la alfombra."
 russia.480.t: "Protesta del PLDR contra las \"leyes antirrusas\" locales"
 russia.480.d: "Recientemente, por iniciativa del Partido Liberal-Demócrata, se organizó una protesta contra leyes que, en su opinión, violan los derechos y libertades de la población rusa. Los activistas han expresado demandas para evitar la expansión de las autonomías de las repúblicas caucásicas y para endurecer la legislación migratoria en relación con los residentes de Asia Central. La policía garantizó la seguridad del evento y evitó posibles provocaciones. Esta acción es un pequeño evento local, sin embargo, es claramente capaz de ayudar a fortalecer la posición de los partidarios de Zhirinovski."
 russia.480.a: "Permítales protestar..."
 russia.480.b: "Silencien su intolerancia."
 russia.481.t: "Zhirinovski furioso por las importaciones de Sinovac"
 russia.481.d: "\"¡Tenemos Skólkovo y otras ciudades científicas! ¡Y las alimentamos y asignamos presupuestos! ¿Entonces para qué? ¡¿Para importar todo de China?! ¡Esto es una verdadera traición! ¡Una manifestación de vileza y el más alto grado de desconfianza hacia nuestras mentes brillantes!\". Con discursos así, Vladímir Zhirinovski atacó la iniciativa de importar Synovac durante una reciente reunión de la Duma Estatal. Esta decisión ya ha provocado una serie de discusiones y disputas en la sociedad rusa, y la culminación fueron las numerosas protestas del Partido Liberal-Demócrata bajo el lema de contrarrestar la esclavización de Rusia por parte de China. Aunque estas protestas ya han disminuido, el partido y Vladímir Zhirinovski personalmente lograron obtener su cuota de atención pública."
 russia.481.a: "Demasiada autosuficiencia también duele, ¡sabes!"
 russia.482.t: "Miembros del PCFR se manifiestan contra la \"toxina\" de Putin"
 russia.482.d: "Para sorpresa de las autoridades y del movimiento izquierdista no sistémico de Rusia, los miembros del Partido Comunista de la Federación de Rusia criticaron duramente el desarrollo de la vacuna Sputnik V. Utilizan como argumentos la corrupción desenfrenada en Rusia y el hecho de que China ya ha desarrollado una vacuna eficaz contra el virus. Una historia particularmente extendida fue que un miembro del Comité de la Ciudad de Izhevsk supuestamente fue al hospital con complicaciones después de una inyección de la vacuna. Esta historia fue replicada activamente en los mensajeros de WhatsApp y Telegram, y la rama de Udmurtia del partido en VK hizo una publicación sobre esta situación. Como resultado, durante las manifestaciones del Partido Comunista, los ciudadanos rusos pudieron observar una imagen única donde activistas antivacunas y comunistas marcharon juntos por las calles gritando las mismas consignas. Por supuesto, los disturbios ya han disminuido, pero el Partido Comunista de la Federación de Rusia no parece haber recibido su parte de atención de la sociedad por mucho tiempo."
 russia.482.a: "¡Y aquí nos habían venido que los comunistas no eran supersticiosos!"
 russia.483.t: "Zhirinovski encabeza una marcha por Furgal"
 russia.483.d: "Cuando Serguéi Furgal fue arrestado, todos se quedaron helados de expectación: ¿cómo reaccionaría Zhirinovski? ¡Y no defraudó! Contrariamente a las expectativas y los temores, el propio Vladímir Vólfovich se puso al frente de una marcha de miles, ¡desafiando al sistema! No tuvo miedo de convertirse en el rostro de la resistencia, encendió el fuego de la ira del pueblo y demostró que el PLDR no es solo un partido, sino un puño, ¡listo para golpear a quienes amenazan sus intereses! Con este gesto, Zhirinovski hizo estallar la arena política, porque nadie podría haber esperado un movimiento tan audaz del viejo líder."
 russia.483.a: "Una asombrosa muestra de fuerza."
 russia.484.t: "IDI NAHUI TUPOY DEBIL"
 russia.484.d: "NU CHTO BUDESH SOSAT?"
 russia.484.a: "YA LOH"
 russia.485.t: "Declaración del presidente"
 russia.485.d: "El impacto del colapso de Norteamérica aún persiste en Rusia; a pesar de nuestra aversión al Gobierno estadounidense, nadie pudo predecir un giro tan radical de los acontecimientos.\nEl presidente de la Federación de Rusia ha hecho una declaración pública al respecto, la cual duró varios minutos y estuvo llena de muchas reflexiones y comentarios históricos. Entre todos ellos, la población rusa parece tomar nota de una cita en particular..."
 russia.485.a: "\"La URSS entendió que el colapso del capitalismo occidental era inevitable...\""
 russia.485.b: "\"Los rusos sienten simpatía por las dificultades de los estadounidenses comunes...\""
 russia.485.c: "\"No puedo evitar recordar una cita del filósofo ruso Iván Ilyín...\""
 russia.486.t: "Catedral Principal de las Fuerzas Armadas de Rusia"
 russia.486.d: "Hoy tuvo lugar en Rusia la gran inauguración de la Catedral Principal de las Fuerzas Armadas de Rusia. Este evento fue un paso significativo en el fortalecimiento de los cimientos espirituales y morales del ejército, y también simboliza la unidad de la nación y el apoyo a las fuerzas militares del país.\nLa Catedral Principal de las Fuerzas Armadas de Rusia está ubicada en el territorio del complejo patriarcal \"Monasterio Spaso-Andrónikov\" en Moscú. Se ha convertido en la iglesia ortodoxa más grande del país y es un símbolo importante de patriotismo y fe.\nLa ceremonia de apertura de la iglesia fue organizada bajo el liderazgo del presidente del Departamento Sinodal para la Interacción de la Iglesia con las Fuerzas Armadas y las Fuerzas del Orden, el arcipreste Dimitri Smirnov. Al evento asistieron representantes de organizaciones religiosas, políticas y públicas, así como personal militar y veteranos."
 russia.486.a: "¡Verdaderamente impresionante!"
 russia.487.t: "¡Intento de asesinato al presidente!"
 russia.487.d: "Han surgido noticias inquietantes desde Izhevsk, donde se intentó asesinar a Vladímir Putin durante su visita oficial a la Fábrica Kaláshnikov. El asaltante, disfrazado con un uniforme de fábrica y armado con una PM, logró disparar un solo tiro al aire antes de ser aprehendido por el personal de seguridad del FSO. A pesar del intento del perpetrador de acercarse al presidente entre la multitud, se tomó una acción rápida para evacuar a Vladímir Putin de las instalaciones. Los esfuerzos para suprimir este incidente resultaron inútiles, ya que numerosos sitios web de noticias públicas en todo el país informaron sobre el impactante evento.\nEste descarado acto de oposición violenta es profundamente preocupante y requiere atención inmediata."
 russia.487.a: "¡Impactante!"
 russia.488.t: "Declaración oficial"
 russia.488.d: "En medio de la agitación por el reciente intento de asesinato, se celebró una reunión de emergencia del consejo de seguridad, donde se discutieron las últimas noticias, así como la elaboración de una declaración oficial sobre el intento. Entre las muchas razones plausibles para cometer este ataque, se eligieron tres, como ideologías extremistas principales por las que el criminal estaba hipnotizado.\nEl terrorista fue un..."
 russia.488.a: "Radical comunista."
 russia.488.b: "Banderista ucraniano."
 russia.488.c: "Ultranacionalista ruso."
 russia.489.t: "El sector de TI apoya la operación especial"
 russia.489.d: "Tras el inicio de una operación militar especial, surgieron preocupaciones sobre la posible oposición del sector de TI ruso a las directivas estatales oficiales. Sin embargo, para sorpresa de muchos, plataformas destacadas como Yandex, VK y otras emitieron declaraciones oficiales expresando su apoyo a las decisiones tomadas por el Gobierno ruso. Estas declaraciones enfatizaron la importancia de la unidad entre el pueblo ruso frente al globalismo agresivo. Además de sus palabras, estas plataformas han tomado medidas para asegurar que los resultados de búsqueda muestren exclusivamente contenido prorruso y suspendiendo cualquier promoción de agendas pronazis. Además, VK ha emprendido medidas significativas para suprimir grupos y cuentas proucranianas.\nComo resultado, la población rusa ahora siente una sensación de seguridad contra las influencias internas y externas, ya sean físicas o digitales."
 russia.489.a: "¡Una inversión valiosa!"
 russia.490.t: "Represiones urgentes"
 russia.490.d: "Tras el reciente intento de asesinato de Vladímir Putin, una especie de ajuste de cuentas ha llegado para sus oponentes políticos en Rusia. Unidades del FSB han sido desplegadas en varias ciudades importantes donde se espera que ocurran grandes disturbios en un futuro cercano, y la Rosgvárdia, el GRU y otros servicios de seguridad han prometido a la Duma la formación de un grupo de trabajo conjunto para evitar que tal incidente vuelva a ocurrir. Con personal y fondos adicionales asignados a todos los involucrados, se espera que una gran parte de los elementos disidentes en nuestro país sean aprehendidos en breve.\n\nEs probable que estas acciones antagonicen a Occidente, junto con los grupos terroristas domésticos en el país. Sin embargo, no pueden disputar que tal enfoque es necesario para asegurar el bienestar de nuestra gente."
 russia.490.a: "Fuimos demasiado indulgentes... Bueno, ya no más."
 russia.491.t: "Tres banderas - Un país"
 russia.491.d: "La memoria histórica y la continuidad generacional en Rusia han alcanzado una nueva altura, y literalmente. Ahora en San Petersburgo, banderas que simbolizan tres épocas -el Imperio Ruso, la Unión Soviética y la Federación de Rusia- ondean en enormes mástiles sobre el golfo de Finlandia. Las banderas gigantes se han convertido en parte del parque, que desde hace mucho tiempo es uno de los puntos de atracción tanto para ciudadanos como para turistas. Al son de varios himnos históricos rusos interpretados por una orquesta, tres enormes banderas fueron izadas e inmediatamente comenzaron a ondear con el viento báltico. La hermosa y simbólica ceremonia tuvo lugar en el parque costero de San Petersburgo, cerca del rascacielos más alto de Europa, el Lakhta Center. Allí, las banderas históricas del Imperio ruso y la URSS, así como la bandera nacional rusa, fueron izadas en enormes mástiles. Cada una de ellas es una reliquia.\n\nSe organizó un concierto festivo en la orilla, y cientos de personas fueron espectadores del solemne momento. El presidente ruso, junto con los autores de la idea, observaron la ceremonia desde un barco. El proyecto fue realizado por Gazprom."
 russia.491.a: "¡Recordando nuestra historia común!"
 russia.492.t: "El PCFR critica la administración de Medvédev"
 russia.492.d: "A pesar de nuestra victoria en las recientes elecciones, los partidos de la Duma, incluido el Partido Comunista de la Federación de Rusia, siguen poniendo palos en nuestras ruedas. Los diputados denuncian el dominio injusto de Rusia Unida en la Duma Estatal y las reformas \"incorrectas\" llevadas a cabo por el presidente Medvédev. Los debates sobre las acciones del gobierno durante las sesiones parlamentarias pueden durar horas, lo que paraliza significativamente el proceso de trabajo.\nSin embargo, el presidente ya tiene un plan para resolver este problema, y debemos implementarlo lo antes posible."
 russia.492.a: "Tienen sus opiniones..."
 russia.493.t: "El PLDR critica a la administración de Medvédev"
 russia.493.d: "Incluso después de la victoria de Medvédev en las recientes elecciones, los partidos parlamentarios, incluido el Partido Liberal-Demócrata, continúan saboteando nuestro trabajo. Los miembros del partido acusan a Medvédev de \"ignorar inexcusablemente los intereses del pueblo ruso\" y, en su opinión, de realizar cambios legislativos absolutamente innecesarios. Los gritos de Zhirinovski sobre \"traidores\" de Rusia Unida pueden durar casi la mitad de todo el proceso de trabajo de la Duma Estatal, lo que dificulta seriamente la actividad legislativa.\nNo obstante, el presidente ya tiene un plan para resolver este problema, y debemos implementarlo lo antes posible."
 russia.493.a: "Tienen sus opiniones..."
 russia.494.t: "Línea directa con Dmitri Medvédev"
 russia.494.d: "Recientemente, durante la \"Línea directa\" con el presidente, el recién elegido Medvédev, respondía preguntas sobre el futuro político del país:\n\"¡Buenas tardes, Dmitri Anatólievich! Soy Antón de \"Omsk News\", y quiero hacer una pregunta que muchos, no solo los ciudadanos de Omsk, sino todos los rusos quieren hacer\".\n\"Buenas tardes\".\n\"Durante su primer mandato, se le conoció como un presidente bastante liberal, muchos incluso lo contrastan con Vladímir Putin. ¿Está de acuerdo con este legado y lo continuará?\"\n\"¡Gracias por la pregunta! Por supuesto, durante mi primera presidencia estuve desarrollando la idea de ser más amigable con Occidente en algunos aspectos, pero dejaré claro que nunca fue para contrarrestar a Vladímir Vladímirovich, ni fue en contra de nuestra visión común para el futuro de Rusia. Con más desarrollos geopolíticos después de que dejé el cargo, hace tiempo que me di cuenta de que cualquier acercamiento con Occidente sería inútil y se encontraría con regodeo. Sin embargo, diré: ¡se avecinan cambios! Yo, junto con mi equipo, estaremos planeando la futura transformación de la vida política de Rusia, y, creo, ¡a muchos de ustedes les gustará!\""
 russia.494.a: "El verano ruso se acerca, y será... eterno."
 russia.495.t: "Medvédev nombrado para el liderazgo del ONF"
 russia.495.d: "Tras la muerte de Vladímir Putin, el Frente Popular Panruso se encontró sin líder, lo que desató temores de que la organización pudiera desintegrarse. Sin embargo, Dmitri Medvédev, el actual presidente ruso, fue nombrado formalmente nuevo jefe de la organización por el Comité Ejecutivo. En su discurso de investidura, Medvédev se comprometió a reforzar el Frente Popular y enfatizó que \"una organización como el ONF es más necesaria que nunca en el actual clima geopolítico\".\n\nMuchos observadores políticos consideran el nombramiento de Medvédev como una mera formalidad, otra prueba de su lealtad a Putin. Sin embargo, algunos creen que el nuevo presidente podría aprovechar el ONF para expandir su alcance más allá de lo que logró Putin."
 russia.495.a: "Será útil."
 russia.497.t: "¡Nueva emisión de bonos de guerra!"
 russia.497.d: ""
 russia.497.a: "¡Genial!"
 russia.498.t: "¡Oleada de voluntarios!"
 russia.498.d: ""
 russia.498.a: "¡Genial!"
 russia.499.t: "¡La campaña benéfica para los militares ha sido completada!"
 russia.499.d: ""
 russia.499.a: "¡Genial!"
 russia.500.t: "¡Llega ayuda internacional!"
 russia.500.d: ""
 russia.500.a: "¡Genial!"
 russia.501.t: "Inauguración del primer monumento en honor a Putin"
 russia.501.d: "Hoy, en el corazón de San Petersburgo, tuvo lugar un evento significativo: la inauguración de la primera estatua de Vladímir Putin en la calle Mayakovski, donde nació y creció. Miles de personas se reunieron para rendir homenaje al difunto líder, cuya visión y principios desempeñaron un papel crucial en la restauración de la posición respetada de Rusia en el mundo.\n\nDestacadas figuras políticas y el gobernador de San Petersburgo pronunciaron discursos, resaltando la importancia de reconocer las notables contribuciones y la presidencia de Putin. El monumento se alza a una impresionante altura de 8 metros, representando a Putin en su forma completa, con las manos a la espalda. La inscripción lo proclama con orgullo como el \"héroe de la nueva Rusia\".\n\nMuchos funcionarios creen que este evento marca el comienzo de un proceso de reemplazo de algunas estatuas de Lenin por estatuas de Putin, lo que se hará de manera lenta y ordenada."
 russia.501.a: "¡El amanecer de la nueva Rusia!"
 russia.503.t: "Deshielo eslovaco"
 russia.503.d: ""
 russia.503.a: "¡Bien!"
 russia.504.t: "Deshielo eslovaco"
 russia.504.d: "Roberto Fico introdujo una serie de reformas gubernamentales, lo que llevó a muchas personas a pedir un \"deshielo\" en la política. También amplió los programas sociales y mejoró el proceso burocrático. Muchas personas recibieron estos cambios con gran esperanza.\n\nAnteriormente, Eslovaquia era conocida por ser un país muy pobre controlado por grupos de interés de la UE. Sin embargo, después de la Guerra Europea, la victoria rusa y la elección de Fico, las cosas cambiaron. Ahora Eslovaquia se está convirtiendo en un fuerte aliado y una nación próspera. Algunos atribuyen esto a la financiación rusa, mientras que otros al genio político de Fico."
 russia.504.a: "¡Bien!"
 russia.505.t: "Formación de Karpatia Libre"
 russia.505.d: "Piotr Getsko, presidente de Karpatia, ha anunciado oficialmente la formación de un nuevo partido político llamado \"Karpatia Libre\". En su reciente discurso, afirmó que su pueblo buscaría su propia forma única de democracia, diferente de otras formas, y que este nuevo partido serviría como fuerza impulsora para la inclusión política y alentaría a todos los ciudadanos de Karpatia a participar activamente en los asuntos gubernamentales."
 russia.505.a: "¡Bien!"
 russia.506.t: "Formación de Karpatia Libre"
 russia.506.d: "Piotr Getsko, presidente de Karpatia, ha anunciado oficialmente la formación de un nuevo partido político llamado \"Karpatia Libre\". En su reciente discurso, afirmó que su pueblo buscaría su propia forma única de democracia, diferente de otras formas, y que este nuevo partido serviría como fuerza impulsora para la inclusión política y alentaría a todos los ciudadanos de Karpatia a participar activamente en los asuntos gubernamentales."
 russia.506.a: "¡Bien!"
 russia.507.t: "Karpatia adopta el \"socialismo rusino\""
 russia.507.d: "Piotr Getsko, el presidente de Karpatia, ha anunciado oficialmente la creación de la ideología del \"socialismo rusino\". En su reciente discurso, afirmó que su pueblo buscaría su propia forma única de socialismo, diferente de otras formas, y que este nuevo sistema serviría como motor para la inclusión política y alentaría a todos los ciudadanos de Karpatia a participar activamente en los asuntos gubernamentales."
 russia.507.a: "Bueno, si así lo desean."
 russia.509.t: "Wojciech Olszański gana las elecciones polacas"
 russia.509.d: ""
 russia.509.a: "¡Genial!"
 russia.520.t: "Primarias de Rusia Unida"
 russia.520.d: "Rusia Unida es una fuerza política líder de larga data en Rusia. Sin embargo, tras la victoria en la Guerra Europea y la decisión de Dmitri Medvédev de no participar en las elecciones, el partido se quedó sin un único candidato por primera vez en muchos años. Para resolver este problema, Rusia Unida ha organizado primarias, elecciones en las que participarán los políticos más activos y populares. En este evento, se determinará el candidato que se convertirá en el representante de la línea principal del partido. La elección de participantes es realmente amplia, porque Rusia Unida es famosa por sus experimentados estadistas."
 russia.520.a: "¡Pátrushev!"
 russia.520.b: "¡Sobianin!"
 russia.520.c: "¡Mishustin!"
 russia.520.e: "¡Beloúsov!"
 russia.521.t: "Primarias de línea dura de Rusia Unida"
 russia.521.d: "Mientras que la parte principal del partido apoya activamente a su candidato, también hay quienes, en las filas de RU, discrepan con el rumbo de Medvédev. Creen que el rumbo del desarrollo ha ido demasiado lejos. A estas personas se les puede llamar partidarios de puntos de vista más conservadores sobre la democracia soberana. Inesperadamente, estos grupos de personas se unieron y organizaron sus propias primarias para determinar un candidato alternativo de RU. Entre ellos hay firmes partidarios de la estatalidad, empresarios experimentados y militares de la vieja escuela. Esperan poder cambiar el sistema de democracia soberana de una manera que sea más segura para la estabilidad y el pueblo."
 russia.521.a: "¡Volodin!"
 russia.521.b: "¡Shoigú!"
 russia.521.c: "¡Narishkin!!"
 russia.522.t: "Rusia Popular elige candidato presidencial"
 russia.522.d: "Rusia Popular es una nueva fuerza patriótica de izquierda en el país, que une a los luchadores más talentosos y decididos por la justicia social. Tras la victoria en la Guerra Europea y el anuncio de elecciones por parte de Dmitri Medvédev, RP tuvo una oportunidad real de tomar el poder y acabar con el monopolio de Rusia Unida.\n\nPero, ¿quién será el candidato? Para resolver esta cuestión, Rusia Popular ha convocado un congreso del partido, donde se elegirá a un político mediante votación secreta para que sea su rostro en estas elecciones."
 russia.522.a: "¡Delyagin!"
 russia.522.b: "¡Grudinin!"
 russia.522.c: "¡Konovalov!"
 russia.523.t: "Rusia Popular radical elige candidato presidencial"
 russia.523.d: "Los radicales de \"Rusia Popular\", que buscan fortalecer la política social y la transición a un \"nuevo socialismo\", también decidieron nominar a su candidato para las elecciones. Entre ellos hay políticos conocidos de tendencias de izquierda y patrióticas. Mucha gente cree que solo por la fama de sus nombres tienen una gran oportunidad de vencer a un candidato más moderado."
 russia.523.a: "¡Prilepin!"
 russia.523.b: "¡Lukashenko!"
 russia.523.c: "¡Platoshkin!"
 russia.524.t: "Golpe silencioso"
 russia.524.d: "Valeri Rashkin, un conocido político y líder de un grupo de oposición en el Partido Comunista, decidió sabotear discretamente un Congreso Extraordinario del Partido que se celebraría tras su victoria en las elecciones presidenciales. En este Congreso se planeaba aprobar el borrador de una nueva constitución y elegir a Guennadi Ziugánov como jefe del partido, pero Valeri Rashkin y sus partidarios decidieron cambiar el curso de los acontecimientos. Durante la votación, eligieron silenciosamente a Rashkin como jefe del partido. La gente percibió esto como un golpe de partido, pero como los activistas de base del partido estaban del lado de Rashkin, la situación se mantuvo relativamente tranquila. Esta acción causó gran irritación entre los partidarios de Ziugánov y parte de los miembros del partido, quienes consideraron esta acción una traición y una violación de la disciplina del partido. Sin embargo, Rashkin logró mantener el poder en sus manos gracias al apoyo de los activistas de base."
 russia.524.a: "Resultado inesperado."
 russia.525.t: "Reacción"
 russia.525.d: "Tras nuestra victoria electoral, la actividad marcadamente incrementada de nacionalistas, neoimperialistas y otros reaccionarios llevó a protestas antisoviéticas masivas, que fueron organizadas bajo los auspicios de[SOV_anti_soviet_resistance_loc]. Continúan sus actividades realizando mítines, marchas y otras formas de protesta, exigiendo cambios en las políticas del país y defendiendo sus creencias ideológicas."
 russia.525.a: "Manos a la obra, camaradas."
 russia.526.t: "Zhirinovski se retira"
 russia.526.d: "Inesperadamente para muchos, Vladímir Zhirinovski, el líder ideológico de los agitadores nacionalistas que operan en nuestro país, aceptó la propuesta del partido de dejar de resistir al gobierno soviético. Muchos miembros conservadores del Partido Comunista de la Federación de Rusia calificaron la decisión de Zhirinovski como una elección sabia y pidieron a los miembros restantes de la resistencia que siguieran su ejemplo. Al mismo tiempo, los miembros del grupo de Rashkin reaccionaron a la decisión del líder del PLDR con escepticismo y propusieron arrestarlo. De todos modos, para el campo de la derecha, la pérdida de un político así fue un duro golpe."
 russia.526.a: "Es una victoria."
 russia.527.t: "¡Zhirinovski rechaza la oferta!"
 russia.527.d: "Vladímir Zhirinovski, líder de la resistencia nacionalista activa, respondió a la propuesta del partido de cesar las actividades antisoviéticas de forma bastante predecible: con una negativa. La respuesta del líder del PLDR provocó una reacción mixta en la sociedad: mientras Rashkin y sus partidarios dijeron que tal resultado era totalmente esperado y pidieron continuar la lucha contra el \"oscuro derechismo\", algunos miembros ortodoxos del Partido Comunista expresaron su decepción de que un político tan sabio fuera incapaz de aceptar la derrota y la verdad. La declaración de Zhirinovski también causó acaloradas discusiones entre los ciudadanos de a pie. De todos modos, una cosa está clara: la confrontación en la Rusia soviética continúa."
 russia.527.a: "Se arrepentirá..."
 russia.528.t: "Incidente en la TV"
 russia.528.d: "El renovado canal de televisión Rossia-Kultura acogió un festival juvenil de nueva música, organizado como parte del decreto del Partido Comunista para promover el arte soviético de vanguardia. El festival reunió a muchos músicos talentosos cuyas obras reflejaban una actitud positiva ante el ascenso al poder del PCFR y una dura crítica al anterior Gobierno de Putin.\nPero una de las actuaciones más impresionantes fue la del joven rapero MC Frolish, cuyas letras no aprobadas criticaban duramente al actual Gobierno comunista de Rashkin y expresaban su apoyo al Partido Patriota de la oposición y a su líder radical Vladímir Soloviov. Sus canciones incluyen frases como \"Voy a tomar este hecho, voy a teñirlo de rojo, voy a clavarlo en la puta cabeza de Valya Rashkin\", \"Levantaos de vuestros asientos, sacad vuestros culos a la calle, prendan fuego al edificio, que sientan el puto calor\", \"¡Entregad vuestros corazones, vuestras mentes y vuestros puños a Patriota!\". Algunas personas apoyaron su postura abierta y su coraje para decir lo que pensaba, mientras que otras lo condenaron por comportamiento indecente e irrespeto a las autoridades.\n\n¿Qué vamos a hacer con él?"
 russia.528.a: "Déjenlo en paz."
 russia.528.b: "Ocúpense de el..."
 russia.529.t: "Guerra civil sudafricana"
 russia.529.d: "La República de Sudáfrica ha colapsado. El tenue equilibrio que se estableció al final del apartheid en 1994 finalmente se ha roto, y las diversas facciones políticas de Sudáfrica han tomado las armas para luchar por su visión del futuro del país. Objetivamente hablando, solo hay dos facciones a las que nuestro nuevo Gobierno popular puede elegir apoyar, siendo estas el Congreso Nacional Africano y los Luchadores por la Libertad Económica.\n\nEl CNA ha sido el partido gobernante de Sudáfrica desde que ganó las primeras elecciones universales del país hace casi treinta años. Es el partido de Nelson Mandela, y nuestra relación con ellos y su lucha se remonta a los días de la antigua Unión Soviética. Sin embargo, se moderaron y se estancaron cuanto más tiempo estuvieron en el poder. Muchos dicen que fue la corrupción, la ineficiencia y la indecisión del CNA lo que hizo inevitable esta guerra civil.\n\nEn su lugar se encuentran los Luchadores por la Libertad Económica (LLA), una facción radical marxista-leninista liderada por el exlíder juvenil del CNA, Julius Malema. Los LLE se separó del CNA debido a que este último hizo concesiones sobre la reforma y redistribución de la tierra. Dicen que la revolución sudafricana está incompleta sin la reorganización económica completa del país.\n\n¿Respetamos nuestros lazos históricos con el CNA y los apoyamos en su lucha por mantener el orden en Sudáfrica, o ponemos nuestro peso detrás de la vanguardia de los LLE?"
 russia.529.a: "Apoyaremos al Congreso Nacional Africano."
 russia.529.b: "Apoyaremos a los Luchadores por la Libertad Económica."
 russia.530.t: "Congreso pre-electoral del PCFR."
 russia.530.d: "Tras la salida de Putin, el país atraviesa un período de incertidumbre. El PCFR, con grandes posibilidades de ganar, se prepara para las elecciones presidenciales más importantes de la historia de Rusia. Sin embargo, el departamento de personal se enfrenta a una difícil tarea: elegir a alguien que pueda unir al Partido y ofrecer al país un plan claro para el futuro. Tiene tres opciones:\n\nYuri Afonin - un discípulo leal de Ziugánov. Un apparatchik joven, enérgico y leal que puede continuar el rumbo actual y ofrecer estabilidad.\nPável Grudinin - \"Candidato del Pueblo\", que ya participó en las elecciones presidenciales de 2018. Es una figura de compromiso que puede satisfacer a todos los miembros del PCFR por igual, ofreciendo una política equilibrada y moderada, y que ya cuenta con una base de apoyo sustancial. Es la opción más segura.\nSerguéi Levchenko es el exgobernador de la región de Irkutsk, un líder carismático y pragmático con experiencia en la gobernanza regional. Cuenta con el apoyo de muchos elementos de base del Partido, lo que confiere a su candidatura la connotación de una lucha más decidida e incluso agresiva por el poder.\n\n¿A quién elegiremos?"
 russia.530.a: "Yuri Afonin"
 russia.530.b: "Pável Grudinin"
 russia.530.c: "Serguéi Lévchenko"
 russia.530.c2: "Nikolái Jaritónov"
 russia.531.t: "La cuestión del Alto Karabaj"
 russia.531.d: "Tras nuestra exitosa maniobra en el Cáucaso, un asunto extremadamente problemático seguía sin resolverse: la propiedad del Alto Karabaj.\nEl Alto Karabaj es un territorio en disputa entre Azerbaiyán y Armenia, habitado principalmente por armenios étnicos, a diferencia de las zonas circundantes, donde la mayoría son azerbaiyanos. A principios del siglo pasado, esta región fue transferida a Azerbaiyán como región autónoma, pero tras el colapso de la Unión Soviética, durante la guerra del Alto Karabaj, la República del Alto Karabaj, pro-armenia y no reconocida, obtuvo el control de facto sobre la región. Desde entonces, Azerbaiyán no ha cejado en sus esfuerzos por recuperar este territorio.\nAhora, tras fortalecer nuestras posiciones en el Cáucaso Sur, podemos poner fin a este conflicto."
 russia.531.a: "Daremos todo a nuestros aliados armenios."
 russia.531.b: "Estabilizaremos la región con la ayuda de la OTSC."
 russia.531.c: "Lo daremos todo a nuestros aliados azerbaiyanos."
 russia.531.g: "Intentemos llegar a un compromiso."
 russia.532.t: "¡Azerbaiyán acepta!"
 russia.532.d: "Alíyev es razonable y acepta unirse a la OTSC."
 russia.532.a: "Genial."
 russia.533.t: "¡Indignación pública por la inactividad de los partidos!"
 russia.533.d: "A pesar de que las elecciones más cruciales del país están a la vuelta de la esquina, el publico se ha mostrado gravemente decepcionada sobre el bajo rendimiento y inactividad de los tres partidos principales en muchos problemas, incluso con las campañas pareciendo lentas. \nAhora la gente de Rusia parece buscar nuevas avenidas para el futuro del país, algunos incluso mencionan que una figura influencia va a anunciar su posición..."
 russia.533.a: "Mne naplevat."
 russia.534.t: "¡Aleksandr Lukashenko apoya a la RJ-PV!"
 russia.534.d: "Un anuncio chocante y inesperado ha llegado del jefe del estado de la Republica de Belarús - Aleksandr Lukashenko ha oficialmente apoyado a \"Rusia Justa - Por la Verdad\" y su candidato - Serguéi Mirónov"
 russia.534.a: "Tal vez el tiempo ha llegado para algo nuevo..."
 russia.536.t: "¡El Partido Libertario se divide!"
 russia.536.d: "El Partido Libertario de Rusia (PLR), no registrado, finalmente se ha dividido en dos organizaciones con el mismo nombre y símbolos. Una de ellas, liderada por Serguéi Boyko, celebró su congreso hace una semana; la otra, liderada por Mijaíl Svetov, el pasado fin de semana.\n\nEl congreso fundacional de los partidarios de Mijaíl Svetov tuvo lugar una semana después del congreso extraordinario de otra facción del Partido Liberal-Demócrata, liderada por Serguéi Boyko. Ambos foros fueron convocados para eliminar las consecuencias de la división surgida por desacuerdos entre la dirección del partido y la facción \"Principios y Negocios\" encabezada por el Sr. Svetov. Sin embargo, de hecho, la división fue legitimada: las dos partes del partido decidieron trabajar de forma independiente y no planean cooperar entre sí."
 russia.536.a: "Bueno... así pasa."
 russia.537.t: "¡Kagarlitski y Udaltsov son encarcelados!"
 russia.537.d: "Después del reciente fracasado ataque terrorista en San Petersburgo, la FSB ha establecido conexiones entre el terrorista Vladlen Babaev y dos figuras populares izquierdistas - Serguéi Udaltsov y Borís Kagarlitski, el era un visitante regular a sus protestas y encuentros. \n\nLa FSB rápidamente detuvo a dos posibles sospechosos, a pesar de la rapidez de los eventos, cargos criminales se han llevado contra ambos de ellos, lo que puede llevar a encarcelamiento por 8 años. \n\nOrganizaciones izquierdistas menores se encuentran agitadas y ya están organizando pequeñas protestas para liberar a ambos sospechosos, pero el Partido Comunista no ha comentado de ninguna manera, pero detrás de la espalda del publico, el Partido Comunista ya comenzó a salvar lo que queda de la organización de Udaltsov."
 russia.537.a: "Mne naplevat."
 russia.538.t: "Alekséi Navalni muere en prisión"
 russia.538.d: "El Departamento del Servicio Penitenciario Federal para el Okrug Autónomo de Yamalia-Nenetsia anunció la muerte de Alekséi Navalni. Según informó el servicio de prensa del departamento, el condenado se sintió mal después de un paseo en la colonia penitenciaria número 3 y perdió el conocimiento. Los paramédicos que llegaron al lugar realizaron todos los intentos necesarios de reanimación, que no dieron resultado. Los médicos lo declararon muerto.\n\nSe aclara que se llevaron a cabo todas las medidas de reanimación necesarias, las cuales no dieron resultados positivos. \"Los médicos del servicio de emergencias médicas declararon muerto al condenado\", dijo el servicio de prensa del Servicio Penitenciario Federal."
 russia.538.a: "¡Que lamentable!"
 russia.538.b: "No tendrá ni una mención en los libros de historia..."
 russia.539.t: "Ciudadano Navalni"
 russia.539.d: "En los últimos días, los medios rusos se han llenado de artículos sobre la reciente vida de Navalni después de la prisión. Navalni, liberado de prisión antes de tiempo por buena conducta y con un arrepentimiento abierto por sus acciones, ahora se ha dedicado a servicios comunitarios y voluntarios, ayudando a personas necesitadas, especialmente en las nuevas regiones de la federación.\nTambién aspira a ser elegido representante de su pueblo natal de Butin, para, como afirmó: \"Poner en forma a mi buen viejo pueblo y a su gente\". Distanciándose de la gran política y retractándose de muchas de sus declaraciones críticas del pasado, sin embargo, optó por utilizar el partido Rusia Nueva como plataforma para su campaña en las elecciones del pueblo, \"...Todos los partidos lo han hecho bien recientemente, pero este, sigue estando mucho más cerca de mi corazón\", declaró Navalni en la entrevista a Nóvaia Gazeta.\nEn la misma entrevista con Nóvaia Gazeta, animó a sus ex partidarios a reconocer a Rusia como un modelo de gobernanza democrática."
 russia.539.a: "¡La gente puede cambiar!"
 russia.540.t: "Kartápolov planea dedicarse a la política"
 russia.540.d: "Después de dedicar muchos años al servicio militar, Andréi Kartápolov ha expresado su deseo de retirarse del servicio activo y pasar a un nuevo puesto dentro de los comités de la Duma Estatal. Su vasta experiencia y conocimientos lo convierten en un activo valioso para la política y los ministerios rusos, pero también es importante reconocer sus excepcionales habilidades como comandante que podrían beneficiar enormemente a nuestros asuntos militares.\n\nLa decisión de aceptar la sugerencia de Kartápolov recae ahora en manos del presidente."
 russia.540.a: "Es mejor que se quede."
 russia.540.b: "Sirvió bien, pero ahora lo necesitamos en el \"frente\" político."
 russia.541.t: "Restauración de el PCUS"
 russia.541.d: "Tras la purga de Levchenko, los burócratas del partido reforman el partido de nuevo al PCUS en lugar del Partido Democrático de los Comunistas de la Unión Soviética."
 russia.541.a: "¡Carajo! Okay"
 russia.542.t: "Negociaciones con el PCUS"
 russia.542.d: "Lévchenko atacó a muchos partócratas, y ahora le dicen que se calme o sufrirá las consecuencias."
 russia.542.a: "Okay-okay"
 russia.542.b: "no me wei"
 russia.543.t: "Carta de un burócrata desconocido de Izhevsk"
 russia.543.d: "Levchenko recibe una carta de un miembro del partido descontento con las reformas recientes."
 russia.543.a: "¡El partido escucha a sus miembros!"
 russia.543.b: "Idi najui."
 russia.544.t: "Destitución del presidente"
 russia.544.d: "Burócratas más conservadores destituyen a Lévchenko tras su fracaso en la negociación, y ahora tienen la opción de elegir entre un marxista-leninista ortodoxo o un candidato más moderado pero aún liberal para el puesto."
 russia.544.a: "¡El PCUS está tomando el poder!"
 russia.544.b: "¡Bondarenko corregirá los errores de Lévchenko!"
 russia.545.t: "Nueva realidad"
 russia.545.d: "Era tarde en la noche, Antón caminaba por su ciudad natal, esperando el tan ansiado regreso de su mejor amigo después de la desmovilización. Estaba lleno de pensamientos elevados y terribles; las huellas de la guerra permanecían en su corazón. Todas las personas que conocía de alguna manera compartían su dolor. A pesar de la triste realidad, se recordaba a sí mismo que la vida seguía adelante, que la gente, pasara lo que pasara, seguía adelante, restaurando todo lo que había perdido.\n\nCaminando más por la ciudad, notó un gran cartel con el presidente mostrando los pasos del nuevo programa de \"Reconstrucción de posguerra\". Ya había oído hablar de él más de una vez, pero nunca había pensado profundamente al respecto. Después de leer el programa, de repente se dio cuenta de que no era solo un proceso de restauración de la riqueza de los países, sino también un símbolo de esperanza para un buen futuro, un símbolo de estabilidad y libertad no solo para los pueblos de Rusia, sino también para toda Europa.\n\nPensó para sí mismo: \"Pase lo que pase, construiremos un mundo nuevo, un mundo mejor\"."
 russia.545.a: "Memento vivere."
 russia.546.t: "Eligiendo a nuestro Mariscal"
 russia.546.d: "Después de mucha deliberación y cuidadosa consideración, hemos llegado a una decisión trascendental para elevar a uno de nuestros estimados generales del Estado Mayor a la prestigiosa posición de Mariscal de Rusia. Este nombramiento significa no solo un gran honor, sino también una responsabilidad significativa que el general elegido asumirá con la máxima dedicación.\n\nEntre nuestro distinguido personal, dos candidatos sobresalientes han surgido como los contendientes más prominentes para este estimado título: Valeri Guerásimov y Oleg Saliukov. Ambos generales poseen cualidades de liderazgo excepcionales, perspicacia estratégica y un compromiso inquebrantable con la defensa de nuestra nación. Mientras nos preparamos para otorgar este prestigioso título a uno de ellos, estamos seguros de que el mariscal elegido mantendrá los más altos estándares de excelencia y continuará sirviendo a nuestro país con honor y distinción."
 russia.546.a: "¡Guerásimov!"
 russia.546.b: "¡Saliukov!"
 russia.546.c: "¿Qué tal si creamos el \"Mariscal del Estado de la Unión\"?"
 russia.547.t: "Siria pide ayuda económica"
 russia.547.d: "Nuestros amigos sirios han estado sufriendo durante la última década, desde el inicio de la Primavera Árabe. Afortunadamente, en los últimos años su guerra civil se ha ido calmando constantemente, y ahora se encuentran en una posición lo suficientemente estable como para que la ayuda económica no acabe en un vertedero. Se han acercado a nosotros para pedir nuestra ayuda, y la tendrán. Seguiremos expandiendo nuestra presencia en Medio Oriente, un rublo a la vez."
 russia.547.a: "¡Debemos ayudarles al máximo!"
 russia.547.b: "Por supuesto, enviaremos fondos a nuestros socios sirios."
 russia.548.t: "Hamás toma el poder"
 russia.548.d: "El coso este palestino se pone serio"
 russia.548.a: "Sip."
 russia.549.t: "Suraikin une a los intransigentes socialistas"
 russia.549.d: "Tras la consolidación de la nueva coalición ONF, muchos comunistas y socialistas han sentido que el PCFR y las organizaciones hermanas finalmente han revelado su verdadera naturaleza y se han vendido a la oligarquía capitalista-putinista.\nUn faro para ese tipo se había convertido en Maksim Suraikin, quien siempre había detestado al PCFR, y ahora formó un nuevo frente de partidos \"verdaderamente comunistas\" que se unen contra nuestro gobierno, y ha sido capaz de amasar una porción considerable de la población descontenta con puntos de vista de izquierda.\nCon esto, una nueva oposición antisistema comenzó a formularse, quitándole el trono a los liberales apenas vivos."
 russia.549.a: "Casi nada nuevo."
 russia.550.t: "La Otra Rusia organiza el \"Consejo de Oposición Unida\""
 russia.550.d: "La Otra Rusia, o los nacionalbolcheviques, organizaron recientemente una serie de reuniones entre una oposición \"nacional-patriótica\" con intentos de unirlos bajo su mando. Tuvieron un gran éxito, y ahora lideran el \"Consejo de Oposición Unida\", a diferencia de los viejos tiempos en que los natsbols corrían principalmente detrás de sus homólogos liberales, son ellos quienes unieron a los descontentos del lado derecho del espectro. Incluso algunos liberales se unieron, renunciando por completo a perseguir sus objetivos de forma independiente."
 russia.550.a: "Nunca se fueron del todo."
 russia.551.t: "Liberales por dentro"
 russia.551.d: "Borís Nadezhdin, un autoproclamado líder de los liberales dentro del ONF, ha estado agitando las aguas dentro del sistema, exigiendo que los liberales sean escuchados y que se aprueben reformas que puedan amenazar los cimientos de nuestro país. No podemos hablar plenamente de unidad en nuestro gobierno cuando tales elementos persisten incluso hoy.\nPor el lado bueno, nuestros nuevos liberales parecen estar mucho más abiertos al compromiso..."
 russia.551.a: "¡Qué fastidio!"
 russia.552.t: "Elecciones de representantes regionales"
 russia.552.d: "Recientemente, se llevaron a cabo elecciones de Gobiernos locales, jefes de repúblicas y consejos en muchos lugares de nuestro país. En algunos, los partidos socialistas y los partidos de derecha del ONF se impusieron sobre la población, a pesar de que estamos unidos, nuestras visiones siguen siendo diferentes, ahora esas regiones serán gobernadas de acuerdo con la visión de los socialistas del ONF y los nacionalistas del ONF.\nNo carecen de sus puntos fuertes, pero también tienen sus desventajas."
 russia.552.a: "Estamos unidos, pero somos diferentes."
 russia.553.t: "Serguéi Lavrov dimite"
 russia.553.d: "Serguéi Lavrov, el estimado jefe de nuestro Ministerio de Asuntos Exteriores, ha anunciado oficialmente su dimisión tras años de servicio dedicado, numerosos acuerdos exitosos e incontables misiones diplomáticas. Lavrov, un verdadero titán de la diplomacia moderna, ha sido elogiado en los medios por su inquebrantable compromiso con el avance de los intereses de nuestro país en el escenario global. Citando preocupaciones de edad y salud, Lavrov ha propuesto a Vasili Nebenzia como su sucesor, una decisión que ha provocado tanto admiración por su previsión como gratitud por su destacado liderazgo. Las ondas están llenas de mensajes sinceros que expresan gratitud a Lavrov y reconocen sus inigualables contribuciones a los esfuerzos de política exterior de nuestra nación."
 russia.553.a: "Le agradecemos su servicio."
 russia.554.t: "DE-MO-BI-LI-ZA-TSIA"
 russia.554.d: "Después de batallas duramente ganadas y el triunfo sobre la Europa elitista, nuestros héroes deben ahora regresar a casa. El esfuerzo titánico logrado por nuestro pueblo, ejército y economía pronto llegará a su fin. A medida que nuestros soldados regresen a casa, cambiarán sus armas por herramientas de trabajo, reincorporándose a la fuerza laboral. Algunos pueden optar por reanudar sus estudios o dedicarse a actividades más intelectuales.\nCon Europa derrotada, la necesidad de nuestro personal militar actual disminuye. Es esencial reducir esta carga sobre nuestra economía mediante la reducción de las fuerzas militares. Estos individuos capacitados demostrarán ser mucho más valiosos en la vida civil en este momento, al igual que la transición que ocurrió a finales de la década de 1940. El regreso a la vida civil marca un nuevo capítulo para nuestra nación, donde la fuerza y la dedicación de nuestra gente seguirán dando forma a nuestro futuro."
 russia.554.a: "Se ganaron su descanso."
 russia.555.t: "Dmitri Medvédev gana las elecciones"
 russia.555.d: "Llegó la temporada electoral y, para sorpresa de nadie, Dmitri Medvédev ganó con una mayoría abrumadora de votos: el 85,31%. Todos los partidos parlamentarios apoyaron su candidatura o pusieron el mínimo esfuerzo en su campaña, y poco después de que se declararan los resultados, mostraron plenamente su apoyo al presidente ahora reelecto.\nLos pocos candidatos no sistémicos sólo recibieron alrededor del 0,7%, lo que llevó a declarar estos números ilegítimos. Numerosos detractores, ahora concentrados principalmente fuera de las fronteras rusas, ya han puesto en duda el resultado de Medvédev con absoluta certeza. Pero en la realidad política actual, lo que importa es lo que sucede dentro de Rusia. Y dentro de Rusia, Medvédev es un ganador absoluto y un poseedor absoluto de récords: tanto formal como realmente."
 russia.555.a: "\"Rusia, soy yo\"."
 russia.556.t: "División en el PLDR"
 russia.556.d: "Tras la muerte de Vladímir Zhirinovski, muchos pensaron que el PLDR no sería el mismo, y tenían razón. La división ha estado gestándose dentro del que una vez fue un partido unido, con Slutski consolidando su reinado y expulsando cualquier disidencia contra su liderazgo. Recientemente, Vasili Vlásov -el líder no oficial de la oposición a Slutski- ha sido despojado de su membresía y estatus de diputado por \"ausencias\". Poco después, Vlásov recurrió a su Telegram donde denunció su destitución como ilegítima y a los partidarios de Slutski como \"oportunistas\" y \"mentirosos\", proclamando que el PLDR se ha deshecho de los verdaderos zhirinovskistas y de los políticos capaces.\nMás tarde, también declaró que buscará formas de regresar a la política.\nMientras tanto, Slutski ha estado ansioso por establecer la \"Marca Zhirinovski\" propagada por el partido, como una forma de inmortalizar la carrera de Zhirinovski y hacerla popular entre los jóvenes."
 russia.556.a: "Ayudemos a Slutski a crear la \"Marca Zhirinovski\"."
 russia.557.t: "Vasili Vlásov une fuerzas con RJ-PV"
 russia.557.d: "Vlásov, el exmiembro deshonrado del PLDR, poco después de declarar su intención de regresar a la política, ha optado por un enfoque bastante poco ortodoxo; a pesar de haber sido miembro de un partido nacionalista durante muchos años, se unió a RJ-PV. Ahora trabaja como agitador y activista para ellos, esperando algún día regresar a la Duma a través de un mandato de RJ-PV."
 russia.557.a: "Bueno... Inesperado."
 russia.558.t: "Vasili Vlásov forma \"Rusia Nacional\""
 russia.558.d: "Vlásov, el exmiembro deshonrado del PLDR, poco después de declarar su intención de regresar a la política, ha optado por organizar una nueva organización política. Con la ayuda de antiguos miembros del PLDR y muchos votantes descontentos del ex-PLDR, formó el partido \"Rusia Nacional\". Tomando una idea de nombre de otros dos partidos parlamentarios. A pesar de la expectación generada por esta nueva entidad política, por parte de sus partidarios y de Vlásov como un \"verdadero heredero de la visión de Zhirinovski\", muchos expertos dudan de la capacidad del partido de Vlásov para lograr grandes resultados, aparte de unos pocos escaños en los consejos regionales."
 russia.558.a: "Bueno... Sigue pareciendo mejor que lo que sea que esté haciendo Slutski."
 russia.559.t: "Futuro de Bielorrusia"
 russia.559.d: "Finalmente, después de más de 20 largos años, la Unión de Rusia y Bielorrusia entró en vigor. Ahora dos naciones hermanas se han unido en un solo Estado. El proyecto, originalmente planeado como el astuto plan de Lukashenko para tomar el poder en Rusia en sus propias manos, ha sufrido cambios drásticos a lo largo de los años: ahora el propio Aleksandr Grigórievich actúa como un segundo. Ahora que se ha resuelto el problema de la adhesión de Bielorrusia, ha surgido la cuestión de su lugar en el sistema ruso. Se están expresando varias iniciativas y propuestas en los pasillos del Kremlin.\n\nPrimero, creen que es necesario integrar políticamente completamente a Bielorrusia y crear el Distrito Federal de Bielorrusia en su lugar. Una mayor centralización beneficiará a la economía, pero nos costará la resistencia de los funcionarios bielorrusos.\nOtros creen que un sistema con dos parlamentos podrá funcionar, y aunque tendrá menos ventajas económicas, asegurará la lealtad de los bielorrusos."
 russia.559.a: "¡Formar el Distrito Federal de Bielorrusia!"
 russia.559.b: "Mantenerlo como está."
 russia.560.t: "Futuro de Novorrusia"
 russia.560.d: "Durante más de diez años, el pueblo de Novorrusia ha estado luchando por el derecho a estar junto a Rusia, y finalmente, este día ha llegado. Ahora el pueblo de Novorrusia es el pueblo de Rusia, unido por un futuro brillante común. Por supuesto, convertirse en una parte orgánica de Rusia no sucederá instantáneamente, pero el trabajo principal ya está detrás de nosotros.\n\nAhora nos enfrentamos a una elección: formar el Distrito Federal de Novorrusia o establecer una república autónoma como miembro de pleno derecho de la Federación. Por un lado, la gente luchó por la unidad con Rusia, y el paso lógico sería darles el estatus de una región ordinaria. Por otro lado, Novorrusia es un caso especial, y su gente se ha ganado un estatus especial y autonomía en nuestro estado.\nMuchas opciones tienen derecho a ser implementadas y son justas a su manera, pero nuestra decisión final es…"
 russia.560.a: "¡Formar el Distrito Federal de Novorrusia!"
 russia.560.b: "Crear una República Autónoma dentro como parte de Rusia."
 russia.561.t: "Primeras elecciones novorrusas"
 russia.561.d: "Elecciones en la República de Novorrusia dentro de Rusia."
 russia.561.a: "¡Yevgueni Burdinski logra la victoria!"
 russia.561.b: "¡Pásechnik logra la victoria!"
 russia.561.c: "¡Pushilin logra la victoria!"
 russia.561.c1: "¡Saldo logra la victoria!"
 russia.562.t: "Fin de los cismáticos"
 russia.562.d: "El Gobierno del Maidán se propuso como objetivo principal cortar cualquier lazo de hermandad entre los pueblos ruso y ucraniano, y uno de los más fuertes son, por supuesto, los religiosos. Creada por un grupo de disidentes -la Iglesia ortodoxa de Ucrania-, actuó como un punto más de tensión entre nosotros, con sus incursiones bandidescas contra la legítima Iglesia ortodoxa ucraniana. Está claro que son enemigos de cualquier cristiano justo en Ucrania y Rusia.\nUna vez que Ucrania fue liberada del yugo banderista, esta \"iglesia\" perdió toda su protección y se convirtió en una herramienta para difundir el odio y la división hacia el nuevo gobierno. Con una decisión firme, Azarov ilegalizó su iglesia y la disolvió oficialmente, entregando todas sus posesiones a la legítima Iglesia. El Patriarcado de Moscú, por su parte, se ha asegurado de que el Sínodo Ucraniano sea leal a la causa de todos los cristianos ortodoxos y esté preparado para asumir su papel como luz guía para todo el pueblo ucraniano."
 russia.562.a: "¡Estamos unidos en la fe!"
 russia.563.t: "¡El Parlamento georgiano destituye al presidente pro-Occidente!"
 russia.563.d: "Occidente ve cómo su control sobre la región del Cáucaso se debilita cada día. El presidente georgiana, una simple marioneta de la OTAN y la UE, fue destituido democráticamente por el Parlamento ayer. Los georgianos han anunciado que ahora tienen la intención de buscar lazos más estrechos con nosotros, sus verdaderos amigos, y abandonar a sus titiriteros occidentales."
 russia.563.a: "¡Excelente!"
 russia.564.t: "Guennadi Zhidko fallece"
 russia.564.d: "En Moscú, a la edad de 58 años, falleció el exjefe del cuartel general de las Fuerzas Armadas rusas en Siria, excomandante del Distrito Militar Oriental (VVO), el coronel general Guennadi Zhidko. El comandante militar murió tras una larga enfermedad, según informó Mijaíl Degtiariov, gobernador del Territorio de Jabárovsk."
 russia.564.a: "Gracias por tu servicio, camarada."
 russia.565.t: "Nuestra fortaleza imperial"
 russia.565.d: "Tras largas y difíciles negociaciones en el Kremlin, los Gobiernos de las Repúblicas del Dombás llegaron a un acuerdo sobre la formación de un nuevo estado en su territorio. Además, sus estructuras políticas republicanas se reorganizaron en ramas del movimiento nacional \"Mundo Ruso\". Ahora se establecerá un nuevo orden en Novorrusia de acuerdo con el concepto propuesto por Vladímir Zhirinovski.\n\nUcrania ha condenado nuestros pasos para fortalecer la condición de Estado del Dombás, pero sus gritos no resuenan en nosotros. Ya estamos aumentando activamente el poder militar de los ejércitos del Dombás, preparándonos para una nueva etapa de nuestro desarrollo. Crimea fue solo el comienzo de la unificación del pueblo ruso."
 russia.565.a: "Necesitamos liberar todo el sureste. Toda Ucrania."
 russia.566.t: "¡El presidente de Georgia moviliza al ejército!"
 russia.566.d: "En una muestra de puro autoritarismo, el presidente georgiano muestra su verdadera cara al pasar por encima del Parlamento. En respuesta a su destitución democrática, ha movilizado al ejército para mantener intacto su poder sobre el país. De alguna manera, se nos ha tachado de agresores en este escenario, y la nación georgiana ahora nos es abiertamente hostil, seguramente respaldada por sus aliados occidentales."
 russia.566.a: "Que así sea..."
 russia.567.t: "Estado de la situación en EE.UU."
 russia.567.d: "\n\n\n                  £GFX_SVR_event_texticon   \n\n\n\n\nEstimado Vladímir Vladímirovich:\nHabiendo recopilado y analizado la información necesaria, el SVR está preparado para informar que la situación política en los Estados Unidos se acerca a un punto crítico. El establishment del país se está fracturando en medio de la feroz batalla entre dos partidos y sus respectivos líderes, notablemente Donald J. Trump. La recesión económica tras la crisis del petróleo ha provocado que muchos estadounidenses pierdan la fe en el sistema, lo que ha llevado a la proliferación de varios movimientos extremistas en todo el espectro político, incluidos comunistas, fascistas de línea dura e incluso cultos satánicos.\nSe anticipa que las próximas elecciones de noviembre serán un punto de inflexión, y algunos expertos predicen el posible estallido de un conflicto civil abierto entre las facciones dentro de la sociedad estadounidense. Independientemente del resultado, es evidente que Norteamérica ya no es capaz de mantener la posición de única superpotencia mundial que alguna vez ostentó, y podría replegarse en el aislacionismo como el mejor de los escenarios.\nPara la Federación de Rusia, esta situación presenta tanto oportunidades como riesgos significativos. Es crucial recordar que Europa podría moverse rápidamente para llenar el vacío dejado por Estados Unidos como líder del orden globalista. Para más detalles, consulte la carpeta de documentos adjunta que contiene toda la información pertinente.\n¡Sigo dedicado a servir a Rusia!\nSerguéi Yevguénievich Narishkin."
 russia.567.a: "¡Excelente trabajo!"
 russia.568.t: "Informe de situación sobre las repúblicas del Dombás"
 russia.568.d: "\n\n\n                  £GFX_FSB_event_texticon   \n\n\n\n\nSeñor Presidente:\nYo, junto con un equipo de agentes federales, hemos elaborado un informe preciso sobre los acontecimientos actuales en las Repúblicas Populares del Dombás. Para prefaciar esto, daré una visión general de la situación. Desde su rebelión y los Protocolos de Minsk, ambas repúblicas han asegurado su crecimiento económico y sus relaciones interestatales con nosotros, aunque sigan siendo \"no oficiales\". La R.P. de Lugansk y la R.P. de Donetsk han aumentado significativamente su potencial militar y de defensa. En Lugansk, después del golpe que derrocó a una administración estancada y rota, Leonid Pásechnik logró asegurar la popularidad del pueblo a través de reformas anticorrupción. En Donetsk, sin embargo, tras el asesinato de Zajárchenko, Pushilin solo ha logrado recuperar la mitad de la confianza que el pueblo tenía en el líder anterior, pero sus esfuerzos económicos pueden resultar en un exitoso aumento de popularidad.\nEl régimen ucraniano, sin embargo, ha estado actuando de manera cada vez más agresiva y errática, y en este mundo que cambia rápidamente podemos sospechar que Kiev podría recurrir a medidas desesperadas, incluyendo el abandono de los Protocolos de Minsk.\nApoyo su decisión de enviar apoyo adicional a las repúblicas, tanto militar como civil. Pero también sugiero trabajar en la combinación del potencial de ambas regiones, a través de una posible unificación en una unión federal.\n¡Sirvo a Rusia!\nAleksandr Vasílievich Bórtnikov."
 russia.568.a: "Gran informe."
 russia.569.t: "El comienzo de la operación militar"
 russia.569.d: "Sabes cómo va a pasar esto. Atacas hasta el amanecer, aplastando las defensas ucranianas con poder aéreo y avances de tanques. Golpea rápidamente y concéntrate en capturar las áreas que te interesan. Conectar con Transnistria será útil. Nuestros soldados deben intentar rodear a tantas tropas enemigas como sea posible.\n\nSin embargo, los aliados de Ucrania no se quedarán de brazos cruzados. Se espera que intervengan en el conflicto pronto; planifica tus operaciones contra Ucrania en consecuencia. Usa todos los medios disponibles para lograr la victoria. Si puedes manejar a Ucrania, entonces la victoria es casi segura.\n\n¡Buena suerte! El futuro de Europa depende de tus esfuerzos."
 russia.569.a: "Recibido."
 russia.570.t: "Kagarlitski se une al Partido Comunista"
 russia.570.d: "En una entrevista reciente con Komsomólskaya Pravda, a Borís Yúliyevich Kagarlitski, un conocido publicista de izquierda, luchador contra el globalismo, profesor, sociólogo y activista de la oposición, se le preguntó qué pensaba sobre el curso actual seguido por el Partido Comunista y Rusia. \"Creo que el Partido Comunista de la Federación de Rusia está siguiendo ahora el camino correcto, verdaderamente de izquierda. De ser un partido cuyo objetivo principal era volver al antiguo orden soviético de los tiempos del «estancamiento», se ha convertido en un partido de un socialismo completamente nuevo, que responde a las demandas de la gente del siglo XXI\". Así respondió a esta pregunta el editor en jefe de Rabkor, y añadió que \"se ve a sí mismo entre quienes actualmente están construyendo una nueva democracia socialista y no le importaría unirse al partido\".\n\nEsta declaración es sorprendente, considerando que Borís Yúliyevich es un opositor y un disidente de izquierda con experiencia: fue arrestado en 1982 en el caso de los Jóvenes Socialistas, apoyó al Sóviet Supremo, se opuso a la alianza con el Partido Comunista de la Federación de Rusia en el Frente de Izquierda, e incluso demandó a Guennadi Ziugánov. En los últimos años, su actitud hacia el Partido Comunista se ha suavizado: participó en protestas contra las enmiendas constitucionales en 2020 y contra la falsificación de los resultados de las elecciones a la Duma Estatal en 2021. Muchos dentro del partido dan la bienvenida a su admisión en sus filas e incluso le pronostican un cargo en el Gobierno."
 russia.570.a: "¡Genial!"
 russia.570.b: "¡Rashkin le entregará personalmente su carné!"
 russia.571.t: "¡Los medios publican denuncias sobre Lévchenko!"
 russia.571.d: "Lévchenko ha sido objeto de ataques e insultos feroces por parte de sus oponentes. Uno de los principales reproches contra Lévchenko es la acusación de caza ilegal, corrupción y acciones ilegales durante su trabajo como gobernador de la región de Irkutsk. Se le acusa de estar involucrado en varios escándalos de corrupción y abusos de poder. Además, se le acusa de tener vínculos con el crimen organizado y se le llama bandido y ladrón."
 russia.571.a: "¡Calumnias!"
 russia.572.t: "Alekséi Navalni - El camino de la felicidad"
 russia.572.d: "En el pueblo de Butyn, la pequeña patria de Alekséi Navalni, el tiempo fluye lenta y tranquilamente. Enviado aquí por los comunistas, renunció a la política y encontró su felicidad en la sencilla vida de un aldeano.\n\nPor la mañana, Navalni se despierta al amanecer y va a su huerto, donde cultiva con amor verduras y cuida las flores. Sus manos son hábiles y cuidadosas, como las de un verdadero amo de casa, y cada cosecha lo complace a él y a su familia. Además de su trabajo diario en el huerto, Navalni también ayuda a su madre en la casa. Corta leña, acarrea agua, cuida el ganado; todo esto fortalece aún más su vínculo con su tierra natal.\n\nPara Navalni, la vida en el pueblo de Butyn se convirtió en un verdadero refugio de la intriga política y la tensión de la vida urbana. Se dio cuenta de que ser libre de las cadenas de la política significa aprender a apreciar las alegrías simples de la vida y los valores reales. Para él, la vida en su pueblo natal no fue una prisión, sino una bendición que le ayudó a encontrarse a sí mismo y su lugar en el mundo."
 russia.572.a: "La vida en el pueblo."
 russia.573.t: "Alekséi Navalni - El camino de la felicidad"
 russia.573.d: "En el pueblo de Butyn, la pequeña patria de Alekséi Navalni, el tiempo fluye lenta y tranquilamente. Enviado aquí por los comunistas, renunció a la política y encontró su felicidad en la sencilla vida de un aldeano.\n\nPor la mañana, quita la nieve de su propio patio y sale a pasear con su familia por los campos y bosques cubiertos de nieve, disfrutando de la belleza del paisaje invernal. Admira los patrones nevados en las ramas de los árboles y las huellas de animales en la nieve fresca. Cada vez, el mundo invernal le trae nuevos descubrimientos y alegría. Navalni también ayuda a su madre con las tareas del hogar. Su cuidado y amor por su familia hacen que cada día de invierno sea especial y memorable.\n\nPara Navalni, la vida en el pueblo de Butyn se convirtió en un verdadero refugio de la intriga política y la tensión de la vida urbana. Se dio cuenta de que ser libre de las cadenas de la política significa aprender a apreciar las alegrías simples de la vida y los valores reales. Para él, la vida en su pueblo natal no fue una prisión, sino una bendición que le ayudó a encontrarse a sí mismo y su lugar en el mundo."
 russia.573.a: "La vida en el pueblo."
 russia.574.t: "Elecciones al Sóviet Supremo"
 russia.574.d: "Después de que [SOV_cprf_candidate] ganara las elecciones presidenciales, el país entró en una nueva era de cambios. Hoy, el recién creado Sóviet Supremo refleja el deseo del pueblo de ver cambios y desarrollo. El Partido Comunista, que obtuvo la mayoría de los escaños en el Parlamento, promete traer consigo nuevas ideas, estrategias y soluciones para el bienestar del país. Es una apertura de nuevos horizontes y oportunidades para todos los ciudadanos de Rusia."
 russia.574.a: "Empezó la nueva era."
 russia.575.t: "¡Consigue tu televisor gratis!"
 russia.575.d: "En las últimas semanas, los rusos se han regocijado tras la nueva iniciativa del Frente Popular para proporcionar televisores y acceso a internet a las nuevas regiones, las familias de bajos ingresos y las zonas rurales. Muchos acudieron en masa a los centros de ayuda del ONF para conseguir sus propios televisores de última generación fabricados en Rusia y registrarse para mejorar sus conexiones a la red global. Estos televisores tienen todo lo necesario para las telecomunicaciones modernas, vienen preinstalados con una suscripción de 1 año a TRICOLOR y KINOPOISK, y están configurados para cualquier actividad adicional como juegos de consola o navegación por internet.\n\nLo que los ciudadanos no saben, sin embargo, es que esos televisores y sus nuevos routers de internet, siguiendo nuevas órdenes para mejorar la seguridad nacional, graban y observan cada una de sus solicitudes y actividades, y las envían a servidores especiales ubicados en sus comités ejecutivos regionales, donde serán analizadas por algoritmos de IA de primera categoría en busca de contenidos dañinos. Esto se hace para minimizar cualquier posible disidencia extremista o rusófoba. Por la seguridad de nuestro país y de nuestros ciudadanos. Las personas comunes y corrientes, respetuosas de la ley, no tienen nada que temer, su privacidad no se verá afectada, pero los enemigos de Rusia no podrán esconderse de los ojos vigilantes de su observador."
 russia.575.a: "¿Por qué lloras cuando es tu ojo ciego el responsable?"
 russia.576.t: "\"Por la Verdad\" defiende \"Stal'in Doner\""
 russia.576.d: "El partido de Zajar Prilepin, \"Por la Verdad\", sigue intentando ganar reconocimiento a través de acciones callejeras: esta vez los miembros del partido reaccionaron al escándalo en torno al punto de restauración llamado \"Stal'in Doner\". Algunos \"pravdins\" fueron a distribuir folletos en apoyo del shawarma \"estalinista\", mientras que otros decidieron hacer un piquete frente al edificio del centro de derechos humanos \"Memorial\" para exigir una disculpa por comparar a Iósif Stalin con Adolf Hitler.\nUn pub en el distrito moscovita de Koptevo, nombrado en honor a Stalin, atrajo la atención pública a principios de enero: el menú incluía shawarma \"Stalin con doble carne\" y \"De Beria con salsa tkemali\", y el cocinero trabajaba con un uniforme del NKVD. Entre otros, Yan Rachinski de \"Memorial\" se pronunció en contra de la apertura de un café con el nombre de Stalin en las redes sociales.\nDespués de eso, el partido \"Por la Verdad\" pidió a Memorial que se disculpara por \"reescribir la historia y faltarle el respeto a Stalin\". Y luego decidió llevar la discusión fuera de línea.\nEsta es definitivamente una de las formas más creativas de ganar votos de todos los tiempos."
 russia.576.a: "Verdaderamente fascinante."
 russia.577.t: "Cisma invisible"
 russia.577.d: "Todos en el PLDR están unidos en su amor por Vladímir Vólfovich, pero ahí es donde todo termina, durante más de 30 años, el partido ha tenido al menos dos facciones con sus propias ideas sobre el futuro de Rusia y el PLDR. Por supuesto, mientras Zhirinovski esté vivo, todos los miembros del Partido escucharán sus instrucciones, pero no se puede decir que esté completamente libre de la influencia de uno u otro de sus compinches. Los reformistas en el PLDR son aquellos que ven a Rusia como una democracia nacional en la que el pueblo ruso y su mundo son lo primero, rechazan prácticas más totalitarias, algunos incluso favorecen un resurgimiento de la monarquía, mientras que otros quieren convertir el PLDR en una Rusia Unida 2.0. Su líder tácito es Leonid Slutski, principalmente por sus conexiones, no por sus cualidades de liderazgo.\n\nLos £GFX_hawks  halcones, o turbozhirinovskistas, son un núcleo de miembros del partido jóvenes y ordinarios, radicales, fanáticamente leales a Zhirinovski, totalmente enfocados en crear un estado-nación fuerte en Rusia, en el que no hay lugar para la democracia inútil, los oligarcas y los extranjeros. Su líder, Vasili Vlásov, es joven y enérgico, aunque se queda atrás de su oponente en intrigas, siempre ha sido el favorito de Vladímir Vólfovich, por lo que los halcones ahora tienen la ventaja en influencia. Sin embargo, todo esto podría cambiar fácilmente, especialmente después de que el PLDR asumiera el control."
 russia.577.a: "Veremos quién es quién..."
 russia.578.t: "Primeras elecciones al Senado Gobernante"
 russia.578.d: "La creación del Senado Gobernante por parte de Zhirinovski fue un acontecimiento inesperado y notable en el nuevo sistema político de Rusia. En un momento en que muchos esperaban acciones tradicionales del PLDR, Zhirinovski dio un paso audaz al crear una nueva estructura de poder y declarar elecciones libres en ella.\n\nGracias a las activas campañas electorales, las declaraciones y promesas ruidosas, el PLDR logró ganarse la confianza de los votantes nuevamente. Los resultados de las elecciones mostraron el claro dominio del PLDR en el Senado, obteniendo una mayoría absoluta de escaños en el Senado.\n\nLas primeras elecciones al recién formado Senado Gobernante bajo Zhirinovski se convirtieron en un indicador importante de que el PLDR está listo para seguir defendiendo la elección democrática del pueblo."
 russia.578.a: "Amo la democracia."
 russia.579.t: "El creciente papel de la Rosgvárdia"
 russia.579.d: "Desde que Vladímir Vólfovich asumió el poder, su aliado más ferviente en la rama de seguridad del Gobierno ha sido, inesperadamente, Víktor Zólotov. No solo demostró su lealtad, sino que también convenció a Zhirinovski de que la mayoría de las agencias rudimentarias de aplicación de la ley podrían ser reemplazadas por una alternativa de la Rosgvárdia confiable y mejor.\n\nPrimero la policía, luego el FSIN, luego el FSO, y ahora incluso el Ejército, en el que se crearon organismos especiales de supervisión de la Rosgvárdia, están bajo el control de Zólotov y, en consecuencia, de Vladímir Zhirinovski.\nAlgunos analistas políticos occidentales incluso comparan con temor esta práctica con los tiempos de Iván el Terrible."
 russia.579.a: "La Rosgvárdia, ¡la nueva Opríchnina!"
 russia.579.b: "Trabajad, hermanos."
 russia.580.t: "Destino del PCFR"
 russia.580.d: "Con la victoria de Zhirinovski y la reestructuración de Rusia, había surgido la cuestión de qué hacer con los comunistas.\n\nAunque Ziugánov, el astuto zorro que es, es ciertamente un problema junto con su partido, no se puede decir que sea un enemigo de Rusia. El PCFR se opone fervientemente al mundo occidental, y es cierto que hicieron su parte para ayudar a Rusia. Al mismo tiempo, una gran parte de su partido nos es abiertamente hostil y nos desea la muerte. No hacen más que denigrar el nombre del Imperio ruso, viendo la historia rusa como \"chatarra arcaica\" que debería olvidarse para centrarse únicamente en el régimen leninista.\n\nTenemos dos opciones: disolver el partido, dejando a los miembros en paz, o juzgar al PCFR por actividad antigubernamental y corrupción interna del partido. Mejorar nuestra imagen o asegurar la administración.\n\n¿Cuál será la elección?"
 russia.580.a: "Dejemos al viejo Ziugánov a su suerte en su dacha..."
 russia.580.b: "¡Bandidos comunistas, a juicio!"
 russia.581.t: "Informe de Zólotov"
 russia.581.d: "Víktor Zólotov ha solicitado una reunión personal con Vladímir Zhirinovski. Durante este informe de 2 horas, Zólotov detalló un posible intento de golpe de estado por parte de oponentes del PLDR, lo que enfureció enormemente a Zhirinovski. Poco después, Zólotov y Zhirinovski comenzaron a elaborar planes para destruir a los enemigos de Rusia, y esto debe comenzar con la declaración del estado de emergencia y la suspensión completa de la Duma y la constitución actual."
 russia.581.a: "¡Debemos actuar rápidamente!"
 russia.582.t: "Liga para la Democracia Rusa"
 russia.582.d: "Una sombra ominosa está despertando, amenazando con sumir a nuestra patria en el caos y la destrucción. La organización Liga para la Democracia Rusa resurge de las cenizas, uniendo en sus filas a liberales, oligarcas asistemáticos y traidores, antiguos miembros del Gobierno. Esta alianza, empapada en el veneno del odio hacia nuestro país y sus líderes, se cristalizó con el único propósito de orquestar una guerra contra el gobierno elegido por el pueblo, encabezado por Vladímir Vólfovich Zhirinovski.\n\nLa Liga para la Democracia Rusa proclama sus oscuras intenciones por todos los medios disponibles, incluso los más repugnantes y terroristas. Está lista para usar todo su poder destructivo para tomar el poder y subyugar a nuestra patria libre e independiente. Pero que estas fuerzas oscuras sepan: ¡no nos dejaremos doblegar, no permitiremos que los enemigos destruyan aquello por lo que luchamos, por lo que vivimos! Podremos resistirles uniéndonos en torno a nuestro líder y defendiendo nuestros ideales y valores."
 russia.582.a: "¡Debemos aplastarlos como insectos!"
 russia.583.t: "Nueva Restauración"
 russia.583.d: "Una siniestra alianza está emergiendo de las profundidades del pasado, lista para desestabilizar los cimientos de nuestro estado y llevarnos a la oscuridad de errores pasados. El Partido de Izquierdas \"Nueva Restauración\" se embarca en un camino de destrucción, uniendo a comunistas, neoestalinistas e hipócritas socialistas democráticos en sus filas. Su objetivo es luchar contra el gobierno legítimo encabezado por Vladímir Vólfovich Zhirinovski por todos los medios disponibles, incluyendo incluso actos terroristas.\n\nEl Partido \"Nueva Restauración\" forjado en las sombras, impulsado por la idea de venganza y destrucción. Sus traidores no buscan el bien de nuestra Patria, sino que solo persiguen el poder y la venganza sangrienta. Están listos para usar los métodos más repugnantes para lograr sus objetivos y encubrir las huellas de su caída."
 russia.583.a: "¡No mostraremos piedad a los terroristas rojos!"
 russia.584.t: "La Guerra Secreta"
 russia.584.d: "Las nubes se ciernen sobre nuestra Madre Patria, y las siniestras fuerzas de las organizaciones secretas \"Liga para la Democracia Rusa\" y \"La Nueva Restauración\" se preparan para su insidioso ataque contra nuestra libertad e independencia. El Gobierno bajo el liderazgo de Vladímir Vólfovich Zhirinovski se ve obligado a entrar en la Guerra Secreta para proteger la legitimidad y estabilidad del país de este siniestro enemigo.\n\n\"Liga para la Democracia Rusa\" y \"Nueva Restauración\" están envueltas en la oscuridad de la traición y la sed de poder. No se detendrán ante nada para derrocar al gobierno elegido por el pueblo y establecer su tiránico dominio. Sus métodos son la astucia, el engaño y la violencia, diseñados para destruir los cimientos de nuestra democracia y esclavizar a nuestro pueblo. En esta Guerra Secreta, el Gobierno de Zhirinovski está utilizando todos los métodos posibles, incluidas las fuerzas de seguridad, para confrontar esta oscura alianza. Estamos listos para repeler cada ataque, exponer cada intriga y hacer rendir cuentas a cualquiera que intente socavar nuestra libertad."
 russia.584.a: "Es hora de actuar."
 russia.585.t: "¡Nueva Restauración es destruido!"
 russia.585.d: "Nueva Restauración es destruido por el Gobierno de Zhirinovski."
 russia.585.a: "¡Buen trabajo, hermanos!"
 russia.586.t: "¡La LDR es destruida!"
 russia.586.d: "La Liga para la Democracia Rusa es destruida por el Gobierno de Zhirinovski."
 russia.586.a: "¡Buen trabajo, hermanos!"
 russia.587.t: "El día del opríchnik"
 russia.587.d: "Bajo la lluvia, las gotas de agua golpeaban el techo del coche de servicio de la Rosgvárdia, despertando a Timur de un sueño profundo. Su radio zumbó en su correa, recordándole las nuevas directivas que habían llegado de Moscú hacía unas semanas. Ahora, un oficial ordinario de la Rosgvárdia como Timur había recibido amplios poderes, elevándolo por encima de todos los agentes de policía de la ciudad provincial. Sin embargo, el trabajo se había vuelto aún más estresante, lo que le provocó quedarse dormido en su lugar de trabajo.\n\n\"G-10, adelante. Repito, G-10, cambio\", sonó desde el walkie-talkie, otra regla molesta de los nuevos edictos era el uso de nombres en clave en todas partes, incluso en la comunicación personal.\n\"G-10 aquí, cambio\". Timur bostezó y respondió. \"Tenemos información sobre un posible comportamiento antirruso, posiblemente relacionado con «Nueva Restuaración»\". Sonó al otro lado de la conexión. Timur se puso serio. Normalmente tenía que lidiar con la dispersión de matones y la detención de alcohólicos o personas sin hogar. Pero esto era serio. Timur odiaba a los comunistas, al igual que su familia, que siempre votaba por Zhirinovski, incluso cuando otros conformistas votaban por Putin. Ahora era el momento en que podía mostrar sus verdaderas habilidades y finalmente cumplir las esperanzas de su orgulloso padre, quien estaba tan complacido cuando su hijo se unió a la Rosgvárdia.\n\n\"Entendido, G-1. Indique su destino. Cambio\". Timur recibió las coordenadas y partió para detener a los enemigos de Rusia."
 russia.587.a: "\"Si tengo que romper algunas cabezas, lo haré\"."
 russia.588.t: "La última orden de Zhirinovski"
 russia.588.d: "Ciudadanos de Rusia, hoy nuestro país lamenta el fallecimiento del gran líder, Vladímir Zhirinovski, pero su legado vive en cada uno de nosotros. En el último momento de su vida, nos dio una orden, que se convirtió en su último gran regalo para nuestra Patria.\n\nEsta orden es su última palabra, su última voluntad, que habla de la necesidad de limpiar nuestro aparato estatal de plagas, en particular Leonid Slutski. La orden establece claramente que solo el estudiante más fiel de Zhirinovski puede cumplir esta misión sagrada, a saber, Vasili Vlásov.\n\nSu alma arde con el fuego de la devoción, su corazón está lleno de amor por la Madre Patria. Va a la batalla con la firme convicción de que cada paso, cada acción, cada sacrificio nos acerca al ideal: a una sociedad limpia y justa en la que cada ciudadano pueda florecer en toda su grandeza.\n\nQue su trabajo sea una corona de gloria y honor, que su nombre se convierta en un símbolo de fuerza y lealtad. Que todos juntos, bajo su liderazgo, hagamos nuestra Rusia más fuerte, más unida y más brillante, en memoria de nuestro gran líder, Vladímir Zhirinovski. ¡Gloria a Rusia!"
 russia.588.a: "Ha llegado el momento. Para ejecutar la orden..."
 russia.589.t: "¡Rusia exige nuestra sumisión!"
 russia.589.d: "ДЕЛАЙ ПРАВИЛЬНЫЙ ВЫБОР ИЛИ ТЕБЕ ZZ OZ V VO ZZ ZZ PIZDA"
 russia.589.a: "Ладно похуй"
 russia.589.b: "НАДО БОРОТЬСЯ ТАК НЕЛЬЗЯ ЖИТЬ НАДО БОРОТЬСЯ"
 russia.590.t: "¡Duguin apoya a Ziugánov!"
 russia.590.d: "El reciente discurso de Aleksandr Duguin, un político y pensador sobresaliente, ha provocado una oleada de debate en la sociedad rusa. En su discurso, expresó su apoyo al nuevo Gobierno soviético y a su líder Gennady Ziugánov. Este fue un paso inesperado para muchos, dadas las posiciones expresadas anteriormente por Duguin, que no siempre coincidían con la línea del Partido Comunista.\n\nLa base del apoyo fue la posición oficial de Ziugánov sobre la religión y la cooperación con la Iglesia ortodoxa rusa. Ziugánov declaró que no habría represiones contra las organizaciones religiosas, sino que, por el contrario, se fomentaría la cooperación con la Iglesia en el marco de proyectos nacionales y culturales. Esta declaración deleitó a Duguin, quien calificó a Ziugánov de verdadero patriota y verdadero conservador.\n\nPara Duguin, es importante que las autoridades reconozcan el papel y la importancia de la religión en la vida de la sociedad y el Estado. Él cree que la cooperación con la Iglesia ortodoxa rusa ayuda a fortalecer los fundamentos espirituales de la civilización rusa y a preservar los valores tradicionales. El apoyo del gobierno del Partido Comunista en la persona de Ziugánov en este tema se convirtió para Duguin en un vívido ejemplo de lealtad a los ideales del conservadurismo y el patriotismo."
 russia.590.a: "¡Excepcional!"
 russia.590.b: "Convénzale de que se ponga en contacto con nosotros."

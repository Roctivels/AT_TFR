 SOV_retarget_russian_hysteria_prop: "§YPROPAGANDA§!: Redirigir histeria de la \"amenaza rusa\""
 SOV_retarget_russian_hysteria_prop_desc: "\n\n\n\n£GFX_retarget_russian_menace_hysteria\n\n\n\n\n\nOccidente quiere creer que somos \"malvados\". Se convencieron de que somos infrahumanos, inmerecedores de las libertades básicas, concedidas con tanta libertad a otros. Hacen esto para justificar su agresión.\n\nNo somos los monstruos que afirman, pero para quienes se atrevan a invadir nuestra Madre Patria, seremos más aterradores que sus peores pesadillas."
 SOV_apotheosis_of_history_prop: "§YPROPAGANDA:§! Apoteosis de nuestra historia"
 SOV_apotheosis_of_history_prop_desc: "\n\n\n\n£GFX_apotheosis_of_history\n\n\n\n\n\n\"Estado Eurasiático\" no es sólo un nuevo nombre para nuestro país, sino el Estado más grande y audaz de nuestro pueblo, que combina el pasado pero mira hacia el futuro, la apoteosis de toda la historia milenaria de Rusia."
 SOV_retarget_russian_hysteria_pr: "§YCampaña de RR.PP.§!: Redirigir histeria de la \"amenaza rusa\""
 SOV_retarget_russian_hysteria_pr_desc: "\n\n\n\n£GFX_redirect\n\n\n\n\n\nOccidente quiere creer que somos \"malvados\". Se convencieron de que somos infrahumanos, inmerecedores de las libertades básicas, concedidas con tanta libertad a otros. Hacen esto para justificar su agresión.\n\nNo somos los monstruos que afirman, pero para quienes se atrevan a invadir nuestra Madre Patria, seremos más aterradores que sus peores pesadillas."

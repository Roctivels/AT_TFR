 SOV_kleptocratic_state: "Estado cleptócrata"
 SOV_kleptocratic_state_desc: "La privatización de la economía soviética no podía llegar lo suficientemente rápido para Borís Yeltsin, por lo que una vez que la Unión cayó, recurrió a una \"terapia de shock\": eliminó regulaciones y vendió industrias enteras de la noche a la mañana. Funcionarios corruptos, apparatchiks del PCUS y otros empresarios poco éticos compraron antiguas empresas públicas por unos pocos kopeks por rublo, lo que significa que el poder económico quedó en manos de unos pocos amigos del Gobierno. Mantuvieron su poder cultivando relaciones y haciendo acuerdos secretos con la administración de Yeltsin, y fueron el blanco de un furor generalizado después de la crisis económica nacional de 1998. Aunque Putin procesó a varios de estos llamados oligarcas por corrupción después de llegar al poder, ha mostrado poco interés en cambiar el sistema, y muchos de ellos han consolidado aún más su control sobre la economía de Rusia."
 SOV_heavy_sanctions: "Sanciones occidentales"
 SOV_heavy_sanctions_desc: "Nuestras ambiciones sobre Europa son nuestra primeria prioridad, y nuestro sueño de un mundo multipolar podría realizarse fácilmente si no fuera por la resistencia del Occidente globalista.\n\nTodo empezó con el golpe de Yeltsin y el colapso de la URSS bajo su propio sistema ineficaz. Occidente vio esto y empezó a ansiar el cadáver de nuestra Madre Patria, mientras sus falsas promesas y sus palabras vacías lo hacían parecer \"un paso más hacia la coexistencia pacífica entre los dos Estados\".\n\nPor desgracia para nosotros, Yeltsin cayó en su trampa y lentamente acercó a Rusia a su perdición, mientras que el Este sucumbió lentamente bajo la presión de Occidente. Cuando Putin llegó al poder y cortó todos los lazos con las potencias occidentales, el daño ya estaba hecho. Casi toda Europa Oriental se unió a la OTAN, incluidos los países bálticos, que alguna vez fueron territorio ruso legítimo. Hicimos todo lo posible para combatir el ascenso de la influencia globalista, desde las regiones montañosas de Georgia hasta las regiones urbanas de Lugansk y Donetsk, y desde el mar Báltico hasta las estepas kazajas.\n\nAl principio pareció funcionar; los perros occidentales se dieron cuenta de que no podían combatir nuestro regreso, pero pronto recurrieron a sanciones, embargos y presión política. Nuestra economía, aunque sufrió varios golpes, sigue siendo fuerte; sin embargo, si los embargos continúan, entonces nuestro sueño puede que nunca se haga realidad, nuestra economía caerá inevitablemente y nos veremos obligados a ceder ante las demandas globalistas. Por supuesto, solo un gran acontecimiento podría impedir que esto ocurriera. Bueno, más vale que ocurra, porque nuestro pueblo quiere que se ponga fin a las ambiciones imperialistas de Occidente y que se restablezca la gloria rusa una vez más."
 SOV_heavy_sanctions2: "Sanciones occidentales"

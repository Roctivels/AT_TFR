 SOV_putinism_0_idea: "Putinismo"
 SOV_putinism_0_idea_desc: "\n\n\n\n£GFX_putinism_hardline_banner\n\n\n\n\n\n§Y\"No es Rusia la que está entre Occidente y Oriente. Son Occidente y Oriente los que están a la izquierda y a la derecha de Rusia\".\n- V. Putin§!\n\nDesde el comienzo del milenio, Vladímir Vladímirovich Putin buscó crear un nuevo sistema de poder. Es obvio que su elección recayó en la creación de un único estado a nivel nacional. A pesar de que Putin ya no está, su legado perdurará en el término \"putinismo\", que rara vez se usaba antes en el gobierno, pero que ahora comienza a cristalizarse, si no en una ideología, sí en la \"carta de reglas para el liderazgo de Rusia\". Sus principios principales fueron: el tradicionalismo ruso, el patriotismo y el deseo de crear un estado poderoso.\nMedvédev refuerza la centralización y busca unir al pueblo y al sistema político para crear una Rusia fuerte y unida en el siglo XXI. Vladímir Putin se convirtió en el padre de la nueva estatalidad rusa."

 SOV_restore_presidential_administration_desc: ""
 SOV_stability_and_prosperity: "Estabilidad y prosperidad"
 SOV_stability_and_prosperity_desc: ""
 SOV_sovereign_populism: "Populismo soberano"
 SOV_sovereign_populism_desc: ""
 SOV_1000_years_of_neo_putinism: "Mil años de neoputinismo"
 SOV_1000_years_of_neo_putinism_desc: ""
 SOV_russians_on_the_march: "Rusos en marcha"
 SOV_russians_on_the_march_desc: ""
 SOV_the_restoration: "La Restauración"
 SOV_the_restoration_desc: "Hace cien años nuestro país cometió un gran error. Una zarina gobernante, el terror y el miedo de sus enemigos, el Imperio ruso cayó bajo la presión de la chusma salvaje. Ha llegado el momento de corregir este error y restaurar nuestra patria a su antigua grandeza. El pueblo ruso se arrepentirá de su crimen, y el soberano una vez más guiará al imperio hacia un futuro brillante."
 SOV_restore_october_manifesto: "Restaurar el manifiesto de Octubre"
 SOV_restore_october_manifesto_desc: "El 17 de octubre de 1905, tuvo lugar un acontecimiento trascendental en nuestro país. El emperador Nicolás II decidió dar un paso sin precedentes y promulgó una ley histórica para la historia rusa. Gracias a él, surgió la Duma Estatal en el Imperio y el pueblo ruso obtuvo un número sin precedentes de libertades. La medida más sensata para el revitalizado Estado ruso sería reinstaurar este Manifiesto. Por supuesto, las libertades tienen sus límites, y el zar tendrá derecho a veto en cualquier caso. Por si acaso."
 SOV_intensify_de_bolshevization: "Intensificar la desbolchevización"
 SOV_intensify_de_bolshevization_desc: "Cuando los bolcheviques establecieron su despotismo \"popular\", hicieron todo lo que estuvo a su alcance para destruir la memoria del régimen anterior. Muchas ciudades y regiones enteras fueron nombradas en honor a los verdugos rojos, y en otros casos los nombres históricos fueron reemplazados por novedades sin sentido. El régimen de Vladímir Zhirinovski, por supuesto, luchó contra esto, pero no fue suficiente. Gracias a nosotros, los nombres de la era de la locura roja serán olvidados para siempre, y las ciudades, pueblos e incluso calles volverán a sus nombres o adquirirán nombres nuevos y justos."
 SOV_municipal_zemstva: "Zemstvos municipales"
 SOV_municipal_zemstva_desc: "Sería una medida increíblemente insensata abandonar el autogobierno local en un imperio restaurado. Las tradiciones del autogobierno municipal encajarían perfectamente con los zemstvos restaurados. Después de todo, la gente sobre el terreno sabe mejor que los burócratas dónde colocar una farola o construir una nueva carretera."
 SOV_legacy_of_alexander_reforms: "Legado de las reformas de Alejandro"
 SOV_legacy_of_alexander_reforms_desc: "¡Oh, Alejandro I! ¡Un reformador ilustrado asesinado por una turba ingrata! Sin embargo, a pesar de todos los años transcurridos, no hemos olvidado sus ideas. ¡Amnistiaremos a los condenados por el régimen del PLDR en casos políticos! Sin embargo, el logro más importante de Alejandro fue, con mucho, la educación pública. Decenas de nuevas universidades se abrirían por todo el imperio, y las existentes se modernizarían a un nivel actual."
 SOV_new_zubatovchina: "Nueva zubatovshchina"
 SOV_new_zubatovchina_desc: "Nuestro Imperio no debe limitar de ninguna manera a sus ciudadanos. Tanto el deseo de reforma como la necesidad de atención estatal son normales. Sin embargo, a veces los ciudadanos así inclinados sucumben a la influencia de grupos agresivos populares y caen en el poder de terroristas que sueñan con la muerte del Imperio. Para evitar esto, estamos adaptando las ideas de Serguéi Zubátov para una nueva era. A los ciudadanos radicales se les dará la oportunidad de liberar su energía en mítines y otros tipos de actividad con la ayuda de organizaciones bajo nuestro control. Y valientes agentes de seguridad se asegurarán de que no hagan nada estúpido en el proceso."
 SOV_free_and_imperial: "Libre e Imperial"
 SOV_free_and_imperial_desc: "Los extranjeros suelen asociar a Rusia con un oso. Un animal pesado, torpe y salvaje. Pero el Imperio revivido está increíblemente lejos de este estereotipo. Como un águila orgullosa, observa al occidente caer en el caos mientras protege cuidadosamente a sus polluelos con sus alas. Sin embargo, no restringimos a nuestros ciudadanos. Tienen amplias libertades y pueden influir en el Gobierno tanto a nivel local como nacional. El Nuevo Imperio vive con sueños de un futuro brillante y un mundo nuevo. Y junto con nuestra gente, construiremos un país para todos."
 SOV_samoderzhavie: "Samoderzavie"
 SOV_samoderzhavie_desc: "El pueblo nunca seguirá a un líder débil. Incluso en las democracias occidentales desdentadas siempre ganan los líderes más fuertes y carismáticos que pueden guiar al pueblo. Exactamente así debe ser el soberano ruso: fuerte y estricto, pero justo. Como un padre para más de cien millones de personas, debe guiar al pueblo hacia el futuro sin temor a recibir un golpe personalmente. Es hora de una autocracia renovada, gracias a la cual el imperio resurgirá."
 SOV_committee_of_ministers: "Asesores leales"
 SOV_committee_of_ministers_desc: "Sería una tontería pensar que la autocracia es una autocracia de caverna. Para gobernar un país gigante, un zar necesita asesores confiables que siempre puedan acudir al rescate y ofrecer ayuda para resolver un problema."
 SOV_for_faith_tsar_homeland: "Por fe, zar y patria"
 SOV_for_faith_tsar_homeland_desc: "\"Ortodoxia, autocracia, nacionalidad\": estas son las tres palabras sobre las que se asienta todo nuestro Imperio. Nuestro pueblo sabe que no hay muerte más justa que por la Madre Patria y por el zar, el autócrata. El pueblo ruso vive y muere sabiendo que el Señor siempre vela por ellos. Y nosotros le glorificamos a cambio, porque todo se hace según su voluntad."
 SOV_strengthen_governships: "Fortalecer las gobernaciones"
 SOV_strengthen_governships_desc: "Un zar no puede gobernarlo todo por sí mismo. Necesitamos gobernadores para gobernar el gigantesco país con el fin de gobernar sabiamente las provincias y regiones renovadas. Y sería extremadamente insensato exigir a los nuevos gobernadores que recurran al zar por cada pequeña cosa. ¡Es hora de ampliar los poderes de los gobernadores, dándoles el poder de gobernar las regiones para que prosperen! Dentro de límites razonables, por supuesto."
 SOV_sovereign_empire: "Imperio soberano"
 SOV_sovereign_empire_desc: "Uno de los símbolos del Imperio ruso se considera tradicionalmente el águila, un ave orgullosa y sabia. Sin embargo, el Imperio renovado se compara cada vez más con el oso pardo. Un formidable señor del bosque, que por sí solo es capaz de aterrorizar a todos los animales, pero al mismo tiempo no ataca primero. Un animal majestuoso y fuerte, capaz de acabar con la vida de cualquiera con un solo golpe de su pata. Y así es nuestro Imperio: orgulloso y poderoso, pero pacífico. No queremos la guerra y no le deseamos el mal a nadie. No nos interesan las innovaciones occidentales tanto como nosotros mismos. Pero, por otro lado, somos imponentes para nuestros amigos y terror animal para nuestros enemigos. El Imperio está vivo y marcha orgulloso adelante y nadie puede impedírnoslo. ¡Después de todo, somos rusos! ¡Dios está con nosotros!"
 SOV_russia_we_brought_back: "La Rusia que recuperamos"
 SOV_russia_we_brought_back_desc: "¡Oh, qué país era! ¡Oh, qué gente era! Puede que hayamos cometido un error durante cien años, pero no fue irreparable. Un siglo después, habiendo derramado mucha sangre y sufrido mucho dolor, nosotros, como niños pequeños, vinimos a pedir perdón y el Señor nos recompensó. Ahora podemos cosechar los frutos de nuestros esfuerzos.\n\nMás rusos no lamentarán la edad de oro perdida. Después de todo, el Imperio ha resurgido como un fénix de las cenizas. Nuestras reformas han llevado a un auge cultural sin precedentes. Volvió a ser honorable ser ruso. La nueva aristocracia se ha convertido en un modelo a seguir y a veces incluso eclipsa a las celebridades occidentales. Nadie puede predecir ahora qué pasará con Rusia y el mundo en los próximos años. Sin embargo, podemos decir con seguridad que los súbditos leales seguirán al zar-batiushka incluso en el fragor de la batalla, sabiendo que será una batalla santa por el Imperio.\n\n¡Por Fe, Zar y Patria!"
 SOV_improve_curriculum: "Mejorar el currículo"
 SOV_improve_curriculum_desc: "Para un país como Rusia, una buena educación de la población es simplemente necesaria. Los programas de formación actuales están simplemente desfasados y necesitan ser actualizados de manera oportuna. Todas las áreas de la educación, desde las ciencias exactas hasta los estudios sociales, deben ser rediseñadas y los métodos de enseñanza revisados para cumplir con los estándares más modernos. ¡Rusia debería estar orgullosa de sus científicos y especialistas!"
 SOV_serenity_with_our_history: "Serenidad con nuestra historia"
 SOV_serenity_with_our_history_desc: "A pesar de lo que hicieron los comunistas en el siglo XX, no debemos ver todo únicamente a través del prisma de los horrores. Después de todo, la Unión Soviética es también, de alguna forma, Rusia, con la misma gente, y tenemos derecho a estar orgullosos de sus éxitos y logros, avances y victorias. Gagarin fue el primero en volar al espacio, el trabajo de Kurchátov le dio a Rusia un argumento nuclear indiscutible, y el trabajo de Lijachov sobre filología y ética sigue siendo relevante y valioso. En un momento, los comunistas se opusieron a los capitalistas agresivos de Occidente, pero ahora la situación ha cambiado drásticamente. Pero una cosa permanece inalterable: ¡la verdad está detrás de Rusia!"
 SOV_increase_working_class_engagement: "Aumentar la participación obrera"
 SOV_increase_working_class_engagement_desc: "Para que un país prospere, la economía debe ser eficiente, pero hay un problema. No importa cuántos derechos y libertades tengan los trabajadores, no se deben esperar resultados excelentes sin un deseo de trabajar. Haremos todo lo posible para aumentar la motivación de los trabajadores, pero sin un entusiasmo excesivo, porque todavía nos preocupamos por nuestros súbditos. Los aumentos salariales, la mejora de las condiciones laborales y los programas de asistencia psicológica para prevenir el agotamiento emocional son necesarios para que la clase trabajadora se sienta cómoda. Después de todo, ¡el pueblo de Rusia es su principal valor!"
 SOV_imperial_trade_unions: "Sindicato Imperial del Trabajo"
 SOV_imperial_trade_unions_desc: "El mayor error del antiguo Imperio fue no prestar suficiente atención a los problemas de los trabajadores. Pero no permitiremos tales errores de cálculo. La clase trabajadora podrá defender sus derechos y libertades dentro del marco del Sindicato Imperial que opera en cada rincón del país. ¡Cada trabajador estará protegido de la arbitrariedad de sus superiores! ¡Que todos sepan que el Imperio se preocupa por ellos!"
 SOV_electable_governors: "Gobernadores elegibles"
 SOV_electable_governors_desc: "¡Los derechos electorales de los súbditos del Imperio no deberían limitarse solo a las elecciones nacionales! Para optimizar la gobernanza del país y expandir los derechos democráticos de los habitantes del imperio, introduciremos elecciones para gobernadores regionales. Sí, esto puede afectar la estabilidad en las regiones, ¡pero estamos decididos! ¡Los súbditos del país más grande del mundo tienen los derechos más amplios!"
 SOV_diminish_royal_authority: "Disminuir la autoridad real"
 SOV_diminish_royal_authority_desc: "En ninguna monarquía próspera del mundo el poder se concentra en manos del monarca. Honramos a nuestro zar, pero para el funcionamiento eficaz del Gobierno del país, es necesario limitar sus poderes en la gobernanza del Estado. El zar seguirá siendo un símbolo de Rusia; sin embargo, el canciller y la Duma asumirán la mayoría de sus poderes. ¡Una Rusia fuerte es un gobierno elegido fuerte!"
 SOV_peoples_empire: "Imperio Popular"
 SOV_peoples_empire_desc: "Un Imperio con un Gobierno socialista, un Imperio para el pueblo; hasta hace poco, estas palabras parecían algo imposible, un disparate y una contradicción. Pero hoy es una realidad innegable: los trabajadores glorifican al zar, el Estado protege los derechos de los trabajadores y nadie puede negar lo obvio. Hemos logrado combinar tradición y progreso, preservando la grandeza del pasado y esforzándonos por el futuro. Todavía tenemos mucho por hacer y muchos desafíos que superar, pero lo principal ya se ha logrado: se han sentado las bases sólidas del Imperio Popular. ¡Gloria al zar, gloria al pueblo, gloria a Rusia!"
 SOV_fund_religious_schools: "Financiar escuelas religiosas"
 SOV_russian_traditional_values: "Valores tradicionales rusos"
 SOV_russian_traditional_values_desc: "El Gobierno anterior a menudo hablaba de valores tradicionales. Pero, ¿qué significan sin verdadera fe? ¿Puede una persona que es incrédula o está intoxicada por el nacionalismo amar a su prójimo? ¿Puede alguien que vive para siempre con odio y orgullo valorar su segundo nombre? ¡No y no! Es hora de centrarse en los verdaderos valores culturales rusos que han sido nuestros pilares espirituales durante mucho tiempo. ¡Que crezcan las flores! ¡Que la gente ame y glorifique a su Patria! Y si alguien intenta romper las reglas, el castigo no tardará en llegar."
 SOV_care_for_our_elders: "Cuidar a nuestros mayores"
 SOV_care_for_our_elders_desc: "Hay personas que parecen haber \"sobrevivido a sus días\", los ancianos, a veces enfermos e indefensos. Podrías pensar que simplemente dejarlos morir en silencio sería lo correcto, ya que ya son inútiles para el Estado. ¡Pero no podemos abandonarlos! ¿Qué clase de Estado es este que da la espalda a las personas después de que han puesto todo su esfuerzo en hacerlo grande? Organizaremos programas para ayudar a los ancianos, aumentaremos las pensiones y comenzaremos a promover el cuidado de la generación mayor. Al principio, nos llevaron de la mano. ¡Ahora es el momento de que nosotros les echemos una mano!"
 SOV_imperial_business_grants: "Subvenciones Imperiales para Negocios"
 SOV_imperial_business_grants_desc: "Rusia es una tierra de oportunidades. Una enorme cantidad de recursos, espacios ilimitados e incontables mentes brillantes. Solo queda empujarlos en la dirección correcta y Rusia se convertirá en el país más rico del mundo. Decenas de empresas, con nuestra ayuda, podrán convertirse en competidores en el mercado. Y otros países, al ver esto, envidiarán nuestro modelo de capitalismo."
 SOV_benefits_for_all_faiths: "Beneficios para cada fe"
 SOV_benefits_for_all_faiths_desc: "Durante sus discursos, Jesucristo, el Hijo de Dios, enseñó a la gente a ser tolerante y a amar al prójimo. Y Rusia es un país con varias decenas de nacionalidades y religiones. Sería una tontería ponerlos a todos en la misma página y obligarlos a aceptar la misma fe. Lo que funciona para nosotros es poco probable que le sirva a un calmucio o a un residente del Cáucaso. A partir de ahora, todas las religiones disfrutarán de los mismos privilegios y recibirán fondos para sus proyectos. Ya sea la ortodoxia, el islam, el catolicismo o el judaísmo. ¡Todos son bienvenidos en Rusia! Siempre y cuando no se sobrepasen los límites, por supuesto."
 SOV_affirm_state_orthodoxy: "Afirmar la ortodoxia de Estado"
 SOV_affirm_state_orthodoxy_desc: "¿Qué pasaría si diéramos a todos el derecho a remodelar el mundo a su antojo? Caos, devastación, división de la sociedad… ¿Podemos permitir que al menos algo de esto ocurra en el país más grande del mundo? ¡Por supuesto que no! ¡Solo pensarlo parece una locura! A partir de ahora, la ortodoxia se convertirá en la religión oficial de nuestro país, porque solo ella es verdaderamente fiel a las enseñanzas de Cristo y solo con ella una persona puede salvar su alma en el Juicio Final. ¿Qué pasa con las otras religiones? Seguirán existiendo, pero cualquier actividad pública será severamente restringida, y se impondrán multas graves por intentar convertir a una persona ortodoxa a otra fe. No hay precio demasiado alto si el objetivo es salvar el alma."
 SOV_church_state_synchronism: "Sincronismo entre Iglesia y Estado"
 SOV_church_state_synchronism_desc: "La historia de las relaciones del Estado ruso con la Iglesia es siempre una historia de contradicciones. O los gobernantes intentaron subyugar a la Iglesia, o lucharon contra ella de todas las formas posibles, tratando de excluirla de la vida pública tanto como fuera posible. Sin embargo, pudimos lograr lo aparentemente imposible, la sincronicidad del Estado y la Iglesia. El Estado no controla la Iglesia y no lucha contra ella. En respuesta, la Iglesia no se opone al Estado y no intenta levantar a la gente contra el régimen actual. En cambio, se dirigen juntos hacia un futuro más brillante, sin cruzarse, pero al mismo tiempo persiguiendo un objetivo común. Puede que sea imposible construir un paraíso en la tierra, pero haremos todo lo posible para crear un Estado lo más parecido posible a esto."
 SOV_revive_the_leib_gvardiya: "Revivir la Guardia Lieb"
 SOV_revive_the_leib_gvardiya_desc: "En su momento, la Guardia Leib fue la parte más preparada para el combate y privilegiada del Ejército Imperial Ruso. Su tarea inicial era proteger al soberano, pero con el tiempo, la guardia pasó de ser la guardia real a una fuerza formidable con la que el enemigo contaba. Narva, Borodino, Kulm, París: la gloria de las armas rusas está continuamente conectada con la Guardia.\n\nSí, los bolcheviques decidieron durante la Gran Guerra Patria revivir las divisiones de \"Guardias\", pero tienen poco en común con la verdadera Guardia. La misma práctica fue adoptada por la Rusia de Yeltsin, pero solo ahora, cuando nuestro poder se mantiene firme, podemos devolver a la Guardia su antigua grandeza, su antigua importancia."
 SOV_promote_political_apathy: "Estimular la apatía política"
 SOV_promote_political_apathy_desc: "La política es algo demasiado complicado para una persona común. La gente es bastante fácil de manejar, por lo que un interés popular excesivo en el proceso político puede llevar a una interferencia extranjera inaceptable. Para asegurar el estado y erradicar a los radicales, seguiremos una política de limitar la participación de la gente común en el proceso de administración pública y legislación."
 SOV_no_societal_decadence: "No a la decadencia social"
 SOV_no_societal_decadence_desc: "A lo largo de la historia rusa, la decadencia moral de la sociedad ha provocado enormes problemas. Una de nuestras tareas principales es evitar cualquier declive en la sociedad. Para ello, utilizaremos todos los medios posibles: promoveremos nuestra cultura, que no ha sido distorsionada por la influencia extranjera, promoveremos nuestros valores rusos en las escuelas y, naturalmente, ampliaremos la cooperación con la Iglesia. ¡Todo por la grandeza de Rusia!"
 SOV_unite_with_imperial_monopolies: "Unirse a los monopolios imperiales"
 SOV_unite_with_imperial_monopolies_desc: "Un Estado fuerte debe tener una base sólida. Las corporaciones gubernamentales leales a nosotros se convertirán en este pilar. Para asegurar nuestra soberanía económica y prosperidad, seguiremos una política de cooperación con las empresas imperiales. Necesitamos el resultado de su trabajo, y ellos necesitan nuestra condescendencia y protección."
 SOV_expand_tsar_power: "Expandir el poder del zar"
 SOV_expand_tsar_power_desc: "A lo largo de la historia rusa, el zar ha sido una figura central, el fundamento del poder y la unidad del Estado. Así fue, así es y así será. La palabra del zar es ley, su voluntad es indiscutible y sus decisiones están dirigidas al bien del Estado. En este sentido, ampliaremos los poderes imperiales para que pueda guiar plenamente el desarrollo del país y asegurar el orden. La Duma y el canciller seguirán desempeñando sus funciones, pero bajo la estricta supervisión del monarca, para evitar la discordia y la incertidumbre. ¡Rusia es el zar, y el zar es Rusia!"
 SOV_solidify_chancellors_authority: "Solidificar la autoridad del canciller"
 SOV_solidify_chancellors_authority_desc: "El zar, por supuesto, es un símbolo de Rusia, encarnando su fuerza, tradiciones y grandeza. Sin embargo, por muy sabio que sea, puede que no sea lo suficientemente competente en asuntos de gobierno. Es por esta razón que es necesario ampliar las capacidades del canciller, otorgándole poderes adicionales para que pueda cumplir competentemente la voluntad del emperador, asegurando la estabilidad y el desarrollo del país. Bajo su liderazgo, el estado funcionará de manera clara y fluida, y las autoridades actuarán eficazmente. Después de todo, un estado fuerte necesita no solo un gobernante, sino también políticos competentes que sean devotos a la Madre Patria."
 SOV_united_society: "Sociedad unida"
 SOV_united_society_desc: "La clave del éxito de un país reside en la unidad nacional. Desde tiempos inmemoriales, Rusia se ha mantenido fuerte precisamente por la unidad de sus habitantes, su lealtad a la patria y su devoción a las tradiciones. En los momentos más difíciles, el pueblo se levantó con un frente unido, repeliendo amenazas, superando problemas y fortaleciendo el Estado. La historia ha demostrado repetidamente que la fuerza de Rusia reside en su pueblo, y el pueblo mismo extrajo fuerza de la fe en su gobernante. Todos los habitantes del Imperio, independientemente de su posición, están unidos por una cosa: su rey. Él no es solo un símbolo de poder, sino también la encarnación de la idea misma del estado, su orden indestructible y su prosperidad. ¡Mientras Rusia esté unida, nada podrá romperla!"
 SOV_stability_and_freedom: "Estabilidad y libertad"
 SOV_stability_and_freedom_desc: ""
 SOV_imperial_economic_council: "Consejo Económico Imperial"
 SOV_imperial_economic_council_desc: ""
 SOV_liberalization_of_minds: "Liberalización de mentes"
 SOV_liberalization_of_minds_desc: ""
 SOV_rebirth_of_russian_liberalism: "Renacer del liberalismo ruso"
 SOV_rebirth_of_russian_liberalism_desc: ""
 SOV_sponsor_intellectual_clubs: "Patrocinar clubes intelectuales"
 SOV_sponsor_intellectual_clubs_desc: ""
 SOV_unite_the_liberals: "Unir a los liberales"
 SOV_unite_the_liberals_desc: ""
 SOV_loyality_to_the_tsar: "Lealtad al zar"
 SOV_loyality_to_the_tsar_desc: "La autocracia es uno de los lazos más importantes del pueblo ruso. El rey siempre fue su pastor, guiándolo por el camino correcto. Desafortunadamente, varios \"intelectuales\" y traidores han distorsionado la imagen del buen rey a los ojos del pueblo común, convirtiendo al bienhechor en un tirano. La misma narrativa estuvo presente durante toda la era bolchevique, consolidando finalmente en la mente popular la idea de que \"el zar es malo y los boyardos son malos\". Ha llegado el momento de que el soberano gobierne a sus súbditos de manera completa y justa."
 SOV_new_black_hundreds: "Nuevas Centurias Negras"
 SOV_new_black_hundreds_desc: "Las Centurias Negras surgieron durante la Revolución de 1905-1907 como reacción al frenesí de socialistas y liberales. Eran verdaderos patriotas de su Patria, y su lucha contra diversos elementos antiimperialistas, si no alentada, no fue condenada ni perseguida. Debido a la traición de la Duma en febrero de 1917, las Centurias Negras fueron prohibidas, pero incluso en el exilio continuaron su labor.\n\nTras la caída del Estado bolchevique, las nuevas Centurias Negras volvieron a alzar sus estandartes, defendiendo piadosamente las tradiciones y el modo de vida imperial. El zar necesita súbditos leales, y es difícil imaginar mejores candidatos para puestos ministeriales que las Centurias Negras."
 SOV_devout_nation: "Nación devota"
 SOV_devout_nation_desc: "Es imposible imaginar Rusia tal como es sin el cristianismo. Fue la ortodoxia la que convirtió a Rusia en la sucesora de Bizancio, y se convirtió en la herramienta más importante para moldear al pueblo y la cultura rusos. Con la oración, campesinos, habitantes de la ciudad, comerciantes, funcionarios y reyes se despertaban, comían, trabajaban y se dormían.\n\nPero todo esto se perdió después de que los bolcheviques ateos tomaran el poder. Destruyeron iglesias, iconos, monasterios, mataron y exiliaron a sacerdotes: todo para borrar de la memoria nacional el hecho de que fue la fe cristiana la que unió a los rusos de todos los rangos y clases. Aunque el gobierno rojo terminó, la gente no se volvió más piadosa por esto: solo una pequeña parte de la población, compuesta principalmente por mujeres, visitaba regularmente los templos. ¡Es hora de restaurar la fe en Cristo a todo el pueblo ruso!"
 SOV_russification_intensification: "Intensificar la rusificación"
 SOV_russification_intensification_desc: "Anteriormente, el Imperio estaba unido. Todos, desde los kirguises hasta los lituanos, desde los finlandeses hasta los georgianos, eran súbditos del zar ruso. Pero debido a los liberales traidores y a los bolcheviques impíos, estas nacionalidades obtuvieron una \"identidad nacional\". En lugar de vivir pacíficamente en paz, los pueblos decidieron luchar por la autonomía. Los bolcheviques jugaron con estas contradicciones, lo que los arruinó después de más de medio siglo. Ahora que gobernamos todo el antiguo territorio del Imperio ruso, intensificaremos los esfuerzos para rusificar las afueras imperiales para que esto no vuelva a suceder. ¡Sí, Bóbrikov!"
 SOV_radicalize_lower_stratum: "Radicalizar el estrato inferior"
 SOV_radicalize_lower_stratum_desc: "El pueblo ruso es el pueblo más grande de la historia. Sus nativos cambiaron las leyes de la ciencia, el universo y la filosofía, y se convirtieron en los escritores y artistas más brillantes. Pero todo tipo de traidores nacionales lo adormecieron y sometieron a los más activos. ¡Destruyamos décadas de apatía! ¡Todos en las Centurias Negras, construyan el mundo ruso!"
 SOV_loyal_religious_doctrine: "Doctrina religiosa leal"
 SOV_loyal_religious_doctrine_desc: "La historia de la relación entre el estado ruso y la Iglesia Ortodoxa fue... ambigua. Las reformas de Pedro el Grande subordinaron la Iglesia al Estado, aboliendo la institución del patriarcado, que fue restaurada solo en 1943. En lugar del patriarca, el papel principal en la Iglesia ortodoxa rusa lo desempeñó el Santo Sínodo, una autoridad nombrada por el soberano. Por supuesto, abolir el patriarcado es demasiado radical, pero podemos crear, ejem, un consejo \"asesor\", que será nombrado por el zar. Así, la voluntad del soberano se proyectará a través de la religión."
 SOV_myth_of_nicholas_the_passion_bearer: "Mito de Nicolás el Portador de la Pasión"
 SOV_myth_of_nicholas_the_passion_bearer_desc: "Desde los años 90, ha existido una \"enseñanza sobre el rey redentor\" en la Federación de Rusia. Esta rama de la \"ortodoxia nacional\" cree que la muerte de Nicolás II es un sacrificio redentor por los pecados del pueblo ruso, y que este debe arrepentirse por su asesinato. Por supuesto, las ideas de algunos radicales sobre los INN \"satánicos\" y las pólizas de seguro son perjudiciales, pero la idea del pueblo ruso elegido por Dios y el Gobierno autocrático es muy tentadora..."
 SOV_imperial_nationalism: "Nacionalismo imperial"
 SOV_imperial_nationalism_desc: "Nuestro pueblo no debe olvidar: ¡todos somos súbditos del Imperio! Todos: desde un funcionario hasta un empresario, desde un trabajador hasta un agricultor, desde Vladivostok hasta Varsovia, ¡somos rusos! ¡Y deberíamos estar orgullosos de ello!"
 SOV_revising_his_vision: "Revisando su visión"
 SOV_revising_his_vision_desc: "Zhirinovski fue, sin duda, un gran estadista y un visionario para una nueva Rusia. Sin embargo, su filosofía a menudo fue víctima de malas interpretaciones por parte de elementos fanáticos. Slutski rectificará este error. Vladímir Vólfovich abogó claramente por una democracia genuinamente rusa, una que fuera independiente de los teóricos y analistas occidentales, arraigada en nuestras tradiciones e historia."
 SOV_empower_the_senate: "Empoderar al Senado"
 SOV_empower_the_senate_desc: "El Senado debería funcionar como el principal órgano asesor del presidente de Rusia. Con sus senadores electos, podemos comprender y representar mejor las diversas ideologías de nuestra nación."
 SOV_national_presidency: "Presidencia nacional"
 SOV_national_presidency_desc: "El presidente es el pilar de la seguridad de nuestra nación. Él posee la máxima autoridad, tomando decisiones cruciales que forjan nuestro futuro. Es el presidente quien nos ha guiado a través de tiempos difíciles y continuará haciéndolo, para siempre."
 SOV_modern_political_philosophy: "Nueva filosofía política"
 SOV_modern_political_philosophy_desc: "Vladímir Vólfovich Zhirinovski, un individuo multifacético, destacó no solo en la política sino también en varios otros campos. Sus voluminosas palabras escritas y no dichas han resonado a lo largo de décadas, dejando una marca indeleble en nuestra sociedad. Nuestra nación ha absorbido sus enseñanzas, integrándolas en nuestra comprensión colectiva y construyendo sobre esta base."
 SOV_secure_russian_democracy: "Asegurar la democracia rusa"
 SOV_secure_russian_democracy_desc: "Ha llegado el momento. Nuestra Rusia se encuentra al borde de sus primeras elecciones desde el ascenso de Zhirinovski al poder. Numerosos candidatos competirán por el voto del pueblo, pero solo aquellos que posean una mente aguda y una profunda comprensión del pueblo ruso tendrán éxito. Algunos de estos contendientes tienen puntos de vista bastante extremos, y esperamos fervientemente que tales individuos no triunfen en esta elección libre y nacional."
 SOV_political_tutelage: "Tutela del Partido"
 SOV_political_tutelage_desc: "El PLDR defiende el voto libre, pero aún no es el momento adecuado. El mundo se enfrenta a graves amenazas e ideologías, y quizás solo Rusia pueda protegernos de estos peligros. Nuestro respetado líder y presidente, Leonid Slutski, debe guiar a nuestra nación con el cuidado de un padre que guía a un hijo. Creemos que algún día, los rusos elegirán sabiamente cuando voten."
 SOV_new_russian_era: "Nueva era rusa"
 SOV_new_russian_era_desc: "Levántate, gran Madre Patria, hogar de pueblos diversos de varios credos, nacionalidades y religiones. Una nueva era amanece sobre todos nosotros. Rusia brilla como un faro de virtud y santidad, donde los ciudadanos participan activamente en la vida de nuestra gran nación a través de organismos gubernamentales democráticos y nacionales. Los enemigos, tanto internos como externos, pueden intentar socavarnos, pero no flaquearemos. Somos un pueblo orgulloso."

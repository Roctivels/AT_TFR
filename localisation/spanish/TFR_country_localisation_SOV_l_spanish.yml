 SOV_enshrine_slutsky_thought: "Consagrar la ideología de Slutski"
 SOV_enshrine_slutsky_thought_desc: "Slutski es un digno seguidor de las ideas de Zhirinovski. Ha enriquecido la filosofía de la PLDR con nuevos significados y programas que desarrollan la política del fundador del partido y lo hace entendible para ciudadanos ordinarios. Es importante que las instalaciones de software de Slutski sean accesibles y entendibles no solo para miembros del partido, pero también para todo aquello que tiene su mismo ideal para el futuro de Rusia. Juntos, podremos realizar los ambiciosos planes de Vladímir Zhirinovski y Leonid Slutski y construir el país que ellos soñaron."
 SOV_militarist_vigor: "Vigor militarista"
 SOV_militarist_vigor_desc: ""
 SOV_cult_of_russian_conquest: "Culto a la conquista de Rusia"
 SOV_cult_of_russian_conquest_desc: "La historia de Rusia es rica en gloriosas paginas de batalla: Desde Suvórov a Zhúkov, el honor y la gloria del ejercito ruso marcha por los siglos. Y ahora tenemos a talentosos lideres militares que han victoriosamente vencido a los europeos rusofobicos. Debemos promulgar la gloria de las armas rusas, nuestra continuidad a las antiguas victorias. ¡La hazañas de nuestros héroes pasados serán un ejemplo para nuestros combatientes del presente y del futuro!"
 SOV_deepen_the_reforms: "Profundizar las reformas"
 SOV_deepen_the_reforms_desc: "Para que Rusia avance confidentemente, necesita cambiar urgentemente. La historia revela que la fuerza de un país siempre nace en momentos de renacimiento - cuando la sociedad, el gobierno, y la cultura encuentran coraje para cambiar. Así como Pedro el Grande abrió nuevos horizontes para Rusia, hoy nosotros también empezamos un nuevo capitulo a través de las profundas y meticulosas transformaciones en lo político y económico. Rusia va a avanzar, refrescada y lista para el futuro."

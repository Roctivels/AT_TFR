 SOV_to_save_europe_from_itself: "Salvar a Europa de si misma"
 SOV_to_save_europe_from_itself_desc: "Salvar a Europa de si misma"
 SOV_how_did_this_happen: "Filósofo al mando"
 SOV_how_did_this_happen_desc: "Siempre había sabido que los atlantistas vendrían y se lo llevarían todo. Lo supo en la última década de la URSS, cuando las élites del partido empezaron a congraciarse con ellos. Mientras él luchaba contra esto durante los años 90 junto a los nacionalbolcheviques, las fuerzas yeltsinistas se habían prostituido completamente a los desleales del otro lado del Atlántico.\nMientras Putin purgaba a la mitad de los yeltsinistas y su sucesor estaba en camino de derrotar a los atlantistas en su momento más vulnerable, él esperaba que fuera suficiente. Pero no lo fue.\nAhora, Sodoma y Gomorra se han quitado el disfraz y han desmembrado a Rusia para su beneficio, tanto Patriotas como Traidores bailando a su son. Esto se acaba ahora.\nOccidente lo llamó erróneamente \"el cerebro del presidente Putin\", pero en realidad, él es la voz de los que no tienen voz, millones que anhelaban el resurgimiento de su nación. Aquellos que tolerarían cualquier gobierno siempre y cuando restaurara su dignidad y los liberara de los grilletes atlantistas.\nY ahora se encuentra en la cima del Kremlin, mientras Rusia finalmente despierta."
 SOV_declare_eurasian_state: "Iniciar la revolución eurasiática"
 SOV_declare_eurasian_state_desc: "Rusia es una tierra en constante evolución. De un Imperio a una dictadura comunista y luego a un Estado capitalista, ha cambiado drásticamente en los últimos 100 años. Nuestro país experimentó muerte, lucha y daños nunca vistos en ningún otro lugar. Y en nuestro momento más oscuro, donde nuestras tierras fueron robadas y vidas fueron tomadas, nos sublevaremos contra los atlantistas. Porque no hemos sangrado lo suficiente. El eurasianismo será la luz que reviva la ira de nuestro pueblo. No nos quedaremos de brazos cruzados mientras nuestro estado se pudre, consumido por la autodestrucción moral y la indulgencia cada vez mayores de los atlantistas.\nEurasia triunfará donde antes no pudimos. ¡Porque debemos matar al gran dragón y afianzar nuestra posición como el katechon del mundo!"
 SOV_a_great_awakening: "Un Gran Despertar"
 SOV_a_great_awakening_desc: "\"Los atlantistas son ciegos a los problemas del mundo. Y en su ignorancia encuentran consuelo. La esperanza y las indulgencias son el grito de guerra de los perezosos. Las excusas de los débiles. Y sin embargo, el camino que tenemos por delante es duro y está lleno de peligros aún inimaginables. Si el mundo y sus ciudadanos quieren salir adelante, se necesita un pueblo con una determinación inquebrantable, un pueblo forjado en el fuego de la adversidad. Se necesita a los eurasiáticos. Siempre hemos sido un pueblo resiliente. Trabajamos mientras otros se quejan. Perseveramos mientras otros se rinden. Y cuando el mal nos mira a los ojos, nosotros le devolvemos la mirada. Eso es lo que somos. Nuestros padres lucharon y murieron por la civilización eurasiática, y nosotros no podemos hacer menos\". - Aleksandr Guélievich Duguin, \"El Gran Despertar\", página 7"
 SOV_a_million_voices_united: "Un millón de voces, unidas"
 SOV_a_million_voices_united_desc: "\"Hijos e hijas de Eurasia, sois la encarnación de ese glorioso legado, los herederos de la victoria por la que luchamos cada día. Sois aptos para forjar el futuro y el destino de nuestra humanidad. Sin embargo, también hay muchos en el extranjero que comparten nuestra visión. La de una Eurasia unificada, libre de la intromisión posmodernista. Y además de ellos, hay otras civilizaciones que desean el mismo modelo. Panafricanistas, latinoamericanistas, movimientos panárabes, todos ellos comparten un marco similar, uno en el que los espacios civilizatorios se unen. No podemos gobernar el mundo ni imponer nuestros puntos de vista como los viles atlantistas, pero podemos liderar con el ejemplo. Mostrarles que la mayoría global puede levantarse y derrotar a los mil millones de oro. Porque es nuestro deber liberar este mundo y traer libertad a la gente. ¡Y lo haremos con gusto!\" - Aleksandr Guélievich Duguin, fecha desconocida"
 SOV_revise_foundations_of_geopolitics: "Democracia orgánica"
 SOV_revise_foundations_of_geopolitics_desc: "Aunque los atlantistas han pervertido la noción de democracia, eso no significa que el katechon no pueda retomarla como propia.\nDebemos establecer el parlamento eurasiático, uno desprovisto tanto de la intromisión atlantista como del excesivo control estatal. El partido eurasianista, por ahora, formará el núcleo de nuestro Gobierno. Sin embargo, no negaremos a otros movimientos su protagonismo. Putinistas, nacionalbolcheviques, comunistas, fascistas; todos ellos podrían tener voz en nuestro parlamento (aunque algunas de sus ideas más radicales no serían expresadas).\nNo obstante, nuestro objetivo principal es asegurar una transición orgánica del poder. La población podrá participar libremente en las elecciones locales, transformando el panorama político mediante una evolución constante. No podemos quedarnos de brazos cruzados y enriquecernos con promesas vacías como hacen las élites occidentales. No podemos repetir los errores de América para que nuestro sueño tenga éxito.\n¡Millones de voces tomarán ahora las riendas, y Eurasia prosperará gracias a ello!"
 SOV_purge_atlanticist_ideolouges: "Purgar ideólogos atlantistas"
 SOV_purge_atlanticist_ideolouges_desc: "\"Y sin embargo, hay algunos en nuestra comunidad que no marchan con nosotros. ¡Voces que se alzan en disidencia y oposición. Mentes blandas que toman las palabras de Europa por verdad! A aquellos que llevan las semillas de la rebelión en sus corazones y cuestionan el camino de Eurasia, les digo esto: ¿Querrían que abrazáramos aquello que nos rechazó? ¿Querrían que depusiéramos nuestros fusiles y rindiéramos nuestra armadura, completamente desnudos ante una fuerza que solo desea nuestra muerte? La paz es algo que todos deseamos, ¡pero los europeos la convertirían en la paz de la tumba! ¡Destrozando el espíritu de nuestra nación y reduciéndonos a cenizas! ¡Cuidado con los títeres entre nosotros, hijos e hijas de Eurasia! ¡Conózcanlos y desprécienlos! ¡No les den socorro ni refugio! Si alguno de ustedes duda de la fidelidad de otro, ya sea vecino, hermano, padre o hijo, ¡hablen! Es el deber jurado de mis comisarios aislar y reeducar a estas almas descarriadas. Para traerlas de vuelta a nuestro redil. ¡Expulsen su debilidad por el bien mayor!\" - Aleksandr Guélievich Duguin, fragmento de su discurso del Día de la Unidad Popular"
 SOV_the_eurasian_people_shall_bow_no_longer: "¡El pueblo eurasiático no se doblegará más!"
 SOV_the_eurasian_people_shall_bow_no_longer_desc: "Es hora de que finalmente nos enfrentemos al Leviatán. A medida que nuestra guerra de rebelión se acerca, tendremos que lidiar con las secesiones de nuestra gran nación. Patriotas y traidores pululan por igual en las regiones ocupadas. Debemos negociar con aquellos que están dispuestos a ayudar a nuestros sueños, y destruir a aquellos que los desprecian. Ignoraremos las burlas y amenazas de los atlantistas. Todo lo que tenemos que hacer es nuestro trabajo.\nY mientras derribamos a los enemigos de la unidad eurasiática, cantaremos al Todopoderoso, porque pronto sus ángeles golpearán a la serpiente."
 SOV_stop_western_repayments: "Detener las reparaciones"
 SOV_stop_western_repayments_desc: "Los atlantistas han intentado colonizarnos desde que estuvimos en la cima de las potencias mundiales. Y ahora, con el Gobierno anterior firmando acuerdos de reparación, casi lo lograron. Eurasia no se dejará prostituir por los burócratas europeos. No repetirá los años 90, cuando las élites vendieron su dignidad para hacerles el juego mientras nuestra gente moría de hambre.\nEurasia no tolerará tales intentos. No necesitamos amenazas, porque no somos un grupo de charlatanes que solo posturean sus puntos de vista. Es hora de ser fieles a quienes somos."
 SOV_duginomics: "Duguinomía"
 SOV_duginomics_desc: "\"Los atlantistas hablan del individuo, predican los derechos de cada hombre. De un solo hombre. ¿Quién es esta persona y por qué es más importante que el resto? ¿Por qué las necesidades de unos pocos prevalecen sobre las necesidades de muchos? Así que les pregunto esto: ¿Cómo puede este hombre oponerse a esta nación eurasiática unificada? Somos millones de voces, unidas en una sola. Sin importar la riqueza, sin importar la etnia.\nAlgunos de ustedes se reirían de mí si dijera que me gustaría crear un cielo en la tierra. Y de hecho, este Gestalt probablemente sería la colina que nunca escalaría.\nSin embargo, ¿no es esto lo que Eurasia merece? Una tierra donde todos estemos unidos, prósperos y puros. Ya sea Dios, Alá, o el Buda, todos debemos alcanzar un estado de paz en nuestras vidas a través de su guía.\nSí, esto requerirá abandonar el consumismo rápido que ha contaminado nuestro mundo con plástico y productos químicos. Tal infantilismo y chatarra inútil serán desechados. Debemos recordar cómo contentarnos con menos estimulación, menos glotonería. Menos... atlantismo...\"\n- Aleksandr Guélievich Duguin, \"El Gran Despertar\", página 89"
 SOV_eurasian_armed_forces: "Fuerzas Armadas Eurasiáticas"
 SOV_eurasian_armed_forces_desc: "Nuestros líderes militares fueron negligentes, se fallaron a sí mismos y fallaron al pueblo de Eurasia. ¡Deberíamos agradecerles, su grave mala conducta casi nos cuesta nuestro hogar! Pero nos ha dado un renovado sentido de propósito, y templados en los fuegos de la adversidad. Nuestra voluntad se forja de nuevo."
 SOV_economic_reorganization: "Reorganización económica"
 SOV_economic_reorganization_desc: "Al habernos embarcado en nuestros planes para revivir la industria rusa, debemos reconocer que se necesitarán métodos radicales. Es hora de revitalizarnos y no repetir los mismos errores del pasado. Utilizando los mejores métodos a lo largo de nuestra historia, debemos crear el sistema de la Cuarta Teoría Política. Uno que beneficie tanto a Eurasia en su conjunto como a las personas que luchan por ella. Este es el Logos al que debemos adherirnos. \"Mudnus Eurasianus paradisus esse debet\" - tal es nuestro Logos."
 SOV_subversive_rearmament: "Rearme subversivo"
 SOV_subversive_rearmament_desc: "Aunque nuestra derrota ante la OTAN fue un duro golpe para nuestro ejército, la mayor parte de nuestra industria en los Urales permanece. Para que nuestra rebelión contra el atlantismo tenga éxito, debemos reavivar las llamas de nuestra máquina de guerra. Afortunadamente, los sodomitas están demasiado centrados en la reconstrucción y nos ven como nada más que un \"Estado fallido\" que colapsará en las próximas décadas.\nEstrechar el control de la información sobre nuestras capacidades militares no aliviará las sospechas atlantistas, pero ralentizará su tiempo de reacción y análisis de amenazas.\nEl mal verá al Katechon como derrotado y frágil hasta el momento de la segunda venida."
 SOV_soviet_nostalgia: "Nacionalbolchevismo eurasiático"
 SOV_soviet_nostalgia_desc: "El nacionalbolchevismo se ha entrelazado con el idealismo eurasiático. Nuestro Líder Supremo fue, de hecho, uno de los fundadores del movimiento antes de seguir su propio camino. Los nacionalbolcheviques, aunque algo distanciados de Duguin y su movimiento, seguían viendo muchos puntos en común.\n\nMientras los eurasianistas hablaban de teoría, los natsbols luchaban en los campos del Dombás. Fueron ellos quienes, entre otros voluntarios de diferentes ideologías, defendieron las repúblicas populares del régimen ucraniano. Incluso cuando Putin y su Gobierno renegaron de la bandera roja, esta se mantuvo leal a Rusia.\n\nY en la hora más drástica de la Madre Patria, están listos para atender el llamado de Duguin. ¡Porque nuestra lucha contra el imperialismo occidental acaba de comenzar!"
 SOV_a_new_eurasian_identity: "Una nueva identidad eurasiática"
 SOV_a_new_eurasian_identity_desc: "¿Qué ES Eurasia? Esta pregunta puede parecer tan sencilla, y a la vez tan difícil de entender. Mientras que algunos, como los nacionalbolcheviques, creen que es solo una continuación del Estado ruso, otros lo perciben como algo más. Turanistas, gumiliovistas, nacionalistas rusos, incluso putinistas, debaten entre sí sin cesar. Sin embargo, ya tenemos una respuesta.\nAleksandr Duguin cree que Eurasia es la apoteosis del modelo imperial ruso. A diferencia de los atlantistas, que pisotearon y degradaron el término \"imperialismo\", Eurasia volverá a sus raíces. Porque un verdadero Imperio no participa en masacres sin sentido ni discriminación racial, cortando las manos de los trabajadores y equiparándolos con subhumanos. Es una marea que lo consume todo, que destruye a la oposición con brutalidad y abraza a los subyugados con su amor incondicional. Un lugar donde cientos de rostros e idiomas diferentes se unen en un coro. Una tierra de religión y virtud.\nLa unión de los pueblos, todos movilizados contra la podredumbre que viene de Occidente, convirtiéndose en uno solo. El hombre eurasiático es un hombre de muchas caras y colores. Y a medida que avancemos hacia el oeste, esa variedad solo aumentará. Sin embargo, el alma del hombre eurasiático es su devoción a Dios.\nPorque el Katechon abrazará a cualquiera que esté dispuesto a permanecer a su lado."
 SOV_anti_imperialist_culture: "Cultura antiimperialista"
 SOV_anti_imperialist_culture_desc: "¿Qué más se puede decir de los imperialistas atlantistas? Los mil millones de oro ha conquistado el mundo, ha roto el espíritu de los pueblos y los ha esclavizado. Antes, solían cortar los brazos de los trabajadores africanos que colonizaban. Ahora, las corporaciones cerealeras occidentales toman los recursos hídricos de esos africanos y los embotellan, llevando la muerte a comunidades trabajadoras. Usan a los niños de la mayoría global para recolectar cacao y café para que su persona blanca promedio pueda publicar su arte de espresso en las redes sociales.\nLlaman al resto del mundo un atraso, uno que no es tan civilizado. Se proyectan a sí mismos como la fuerza del bien, forzando a otras civilizaciones a la degradación cultural que ellos mismos crearon.\nCritican al resto del mundo por \"arruinar el clima y usar métodos de producción contaminantes\", ¡pero son ELLOS quienes consumen la mayoría de dichos productos! Son un parásito global, uno que ha superado las visiones imperialistas del siglo XIX, transformándose en un Leviatán que consume todo a la vista. Obligando al resto del mundo a comer sobras mientras producen la nata que se tira en los vertederos de alimentos de Occidente.\nEstábamos en camino de convertirnos también en esas personas. Pensamos que teníamos el derecho, el privilegio, de ser integrados en el \"mundo europeo\". Sin embargo, nos rechazaron, citando nuestro atraso. Y les damos las gracias. Porque nos hemos dado cuenta de que tales lujos no pueden ni deben darse por sentados."
 SOV_diversified_economics: "Economía diversificada"
 SOV_diversified_economics_desc: "Mientras nos preparamos para luchar contra los atlantistas en una guerra total, también debemos recordar que el sector civil es igual de importante. Debemos recordar que incluso la Unión Soviética, una nación que libraba sus batallas más sangrientas en Stalingrado, detuvo sus préstamos de dinero para centrarse en la revitalización económica a mitad de la guerra. Incluso después de nuestra victoria, la vida no se detendrá, de hecho, solo se volverá más difícil ya que tendremos que reconstruir y cuidar a los veteranos.\nPor eso, invertir no solo en el ejército, sino también en las diferentes áreas de la industria civil, será crucial para nuestro plan.\nNo abandonaremos a nuestra gente. Eurasia se moviliza, pero lo hace con el estómago lleno."
 SOV_economic_autarky: "Autarquía económica"
 SOV_economic_autarky_desc: "Grano. Una fuente de sustento que el etnos eslavo conoce desde hace siglos. Nos ha servido en tiempos de prosperidad y dificultades, los campos dorados calman el alma rusa. Sin embargo, los atlantistas nos los quitaron. Ahora, hemos perdido una gran parte de nuestra producción agrícola, expuestos a la posibilidad de una hambruna en caso de guerra.\n\nSin embargo, esta no es la única escasez a la que nos enfrentamos. El sistema actual de globalización, aunque gravemente dañado y fragmentado durante los años 20, sigue funcionando. Algunas de nuestras industrias clave todavía dependen de materiales comprados en el extranjero. Si bien podríamos comprar suficientes reservas para que nos duren durante la guerra de liberación, debemos usar todos nuestros recursos disponibles para encontrar nuevos depósitos minerales y de petróleo en nuestra Madre Patria. Nuestra tierra se convertirá en un mar de campos dorados, con las riquezas subterráneas utilizadas para impulsar nuestras máquinas de guerra."
 SOV_united_against_imperialism: "Unidos contra el imperialismo"
 SOV_united_against_imperialism_desc: "Si le preguntaras a una persona al azar en cualquier parte del mundo: \"¿En qué es mejor la civilización atlantista?\", simplemente responderían: \"En el colonialismo\". De hecho, todos conocemos sus hazañas. La masacre en el Congo. Las matanzas en Medio Oriente. La hambruna en la India. La discriminación contra italianos e irlandeses.\nNosotros también hemos sufrido las consecuencias. Desde que nos convertimos en una potencia mundial, los europeos occidentales han hecho de la deshumanización nuestra su prioridad. Desde los revolucionarios franceses que nos llamaban \"la nueva horda húnica\" hasta los británicos y alemanes que nos tildaban de \"bárbaros que buscan apoderarse de las colonias europeas ilustradas\", y ahora los eurócratas que nos llaman \"Orcos\".\nPor supuesto, hubo muchos períodos en los que hicimos la vista gorda. \"Son ilustrados, debe haber una razón por la que nos llaman así\", afirmaban los lamebotas, liberales y traidores.\nTodos recordamos cómo Putin negoció con ellos a principios de los años 2000, deseoso de integrarse con la escoria atlantista. Sin embargo, era demasiado leal a su nación. No quería vender a Rusia por completo: quería convertirse en un pilar de la coalición atlantista, no en uno de sus perros falderos.\nEs bueno que se le negara, entonces. Porque todos habíamos visto que incluso durante nuestros tiempos \"más cercanos\" nos veían como inferiores a ellos.\nY mientras destrozan nuestra Madre Patria, empeñados en extender su veneno, unámonos contra su imperialismo y opresión. Los \"mil millones de oro\" siguen siendo débiles. ¡Y debemos quemar al parásito global hasta los cimientos!"
 SOV_increase_local_autonomies: "Fortalecer el control centralizado"
 SOV_increase_local_autonomies_desc: "En estos tiempos difíciles, relajar la autoridad central es como la muerte.\nEurasia es un solo cuerpo, con todos los órganos funcionando para sostenerlo. Y para eso, el Cerebro no debe ser seccionado.\nDebemos revivir el sistema de control soviético, pero también eliminar a todos los intermediarios y no aumentar la burocracia.\nA Eurasia no deberían importarle las elecciones ni las promesas vacías de los políticos. Todo lo que necesitamos es una élite despiadadamente eficiente y leal que impulse al Estado."
 SOV_federative_regionalism: "Regionalismo federativo"
 SOV_federative_regionalism_desc: "Tenemos cientos de etnias y regiones dentro de nuestras fronteras. ¿Por qué deberíamos encadenarlas a Moscú? No debemos ser como los atlantistas, controlando todo a la vista.\nQue Eurasia sea un mar de culturas, todas ebullendo y uniéndose contra la marea atlantista. Una ola unificada, moviéndose por inercia, consumiendo al Leviatán bajo su peso.\nLa civilización eurasiática no puede limitarse solo a etnias \"túrquicas\" o \"eslavas orientales\", porque es mucho más que eso.\nEl Katechon llegará al escenario mundial con millones de voces, todas listas para compartir su alegría."
 SOV_revolutionize_the_system: "Revolucionar el sistema"
 SOV_revolutionize_the_system_desc: "A medida que nuestro sistema empieza a tomar forma, debemos embarcarnos en la utilización de nuevos métodos de organización. Con la inteligencia artificial y la tecnología informática cada vez más extendidas, podemos intentar incorporarlas en la reconstrucción de las administraciones locales.\nLa IA y la informática se utilizarán para reducir el número de administradores necesarios, así como para ayudarnos a procesar más datos. Tal cambio hará que nuestro sistema sea más flexible y fácil de gestionar en situaciones de crisis.\nEurasia no puede repetir los errores de la URSS de los años 80. Será ágil, adaptable y flexible."
 SOV_tradionalist_meritocracy: "Meritocracia tradicionalista"
 SOV_tradionalist_meritocracy_desc: "A medida que nuestro Katechon se embarcaba en nuestra búsqueda para matar al Leviatán, surgió la necesidad de identificar a las élites. La mayoría de los miembros de las administraciones anteriores obtuvieron sus puestos debido a conexiones o a sus padres. La verdadera meritocracia desde abajo es rara hoy en día, y esto es un problema importante.\nAunque el atlantista afirma que su sistema es meritocrático, difiere poco del kumovstvo, salvo que se reformula como \"networking\". Este truco psicológico facilita su posicionamiento, de forma similar a los esfuerzos de \"lobby\" que sus administraciones reciben de los grupos de interés.\nDebemos redefinir la tradición meritocrática volviendo a un sistema de \"rangos\". Tu rango dependerá de tu valor para el sistema eurasiático, que a su vez será procesado por IA y algoritmos informáticos, así como por evaluación humana.\nUn soldado, un científico o un clérigo tendrán un rango superior al de un oficinista o un vendedor. Aquellos que no realicen sus trabajos de manera eficiente serán degradados a un rango inferior. Cada rango te otorgará ciertos privilegios, pero también te impondrá deberes que cumplir.\nPor supuesto, un charlatán podría pensar que esto es la creación de una nueva aristocracia, pero en realidad es la creación de un sistema completamente nuevo de movilidad social. Uno donde tu riqueza o tus conexiones no te otorgan privilegios.\nEurasia necesitará encontrar a los mejores hijos para liderar su estado, y dado que no podemos elegir a dedo en tan poco tiempo, el uso de la automatización nos dará resultados rápidamente."
 SOV_spiritual_supremacy: "Supremacía espiritual"
 SOV_spiritual_supremacy_desc: "\"Todos deben someterse a las autoridades constituidas, porque no hay autoridad que no provenga de Dios y las que existen han sido establecidas por él. En consecuencia, el que resiste a la autoridad se opone al orden establecido por Dios, atrayendo sobre sí la condenación. Los que hacen el bien no tienen nada que temer de los gobernantes, pero sí los que obran mal. Si no quieres sentir temor de la autoridad, obra bien y recibirás su elogio. Porque la autoridad es un instrumento de Dios para tu bien. Pero teme si haces el mal, porque ella no ejerce en vano su poder, sino que está al servicio de Dios para hacer justicia y castigar al que obra mal. Por eso es necesario someterse a la autoridad, no sólo por temor al castigo sino por deber de conciencia\". - Romanos 13:1-5"
 SOV_reconceptualize_the_union: "Reconceptualizar la Unión"
 SOV_reconceptualize_the_union_desc: "¿Cómo debe gestionarse el Estado Eurasiático? Esta pregunta es uno de los problemas más apremiantes que tenemos actualmente. Para que nuestra rebelión contra el atlantismo tenga éxito, necesitamos que nuestro Gobierno sea móvil y eficiente. Sin embargo, descentralizar demasiado el sistema también puede ser problemático, ya que puede perjudicar nuestro experimento integrista.\nUno de nuestros estadistas propuso una idea radical, quizás con la intención de ser una broma: un retorno a las administraciones regionales del Imperio ruso. Esta idea parece descabellada al principio, pero cuanto más la meditaba nuestro Líder Supremo, más oportunidades ocultas veía.\nDe hecho, no podemos volver a un sistema así por completo, sin embargo, la idea de las \"gobernaciones generales\" se volvió bastante atractiva. En el mundo moderno, los \"gobernadores generales\" serán un triunvirato de soldados, burócratas y clérigos. Los tres líderes de cada región supervisarán la pacificación, así como la integración económica y cultural de una región liberada en Eurasia. El núcleo del triunvirato también puede añadir o cambiar miembros dependiendo de las diferencias regionales, lo que nos proporciona mucha adaptabilidad.\nEn la futura guerra de rebelión, habrá un número creciente de territorios que necesitaremos integrar. Un sistema así permitirá que las regiones liberadas operen de forma autónoma del mando central mientras nuestro Líder Supremo y sus aliados más cercanos gestionan los preparativos de la Gran Rebelión."
 SOV_wipe_out_nationalist_identities: "Eliminar las identidades nacionalistas"
 SOV_wipe_out_nationalist_identities_desc: "Los soviéticos ya habían intentado crear \"el nuevo hombre soviético\". Sin embargo, terminó en un fracaso total, ya que la Unión Soviética fue desmembrada por oligarcas locales que utilizaron sentimientos nacionalistas. ¿Cuál es la razón de tal degradación? Porque \"el hombre soviético\" era ruso. Fue el ruso quien tuvo que abandonar su cultura, su espiritualidad. Mientras las otras repúblicas revivían e incluso expandían sus influencias culturales, se suponía que los rusos eran el pegamento amorfo que unía todas estas culturas.\nEsto no se mantendrá.\nEurasia es una tierra de muchas personas, muchas voces, sin embargo, es el hogar de los eurasiáticos y solo de los eurasiáticos. Checheno, chuvasio, ruso, yakuto, malorruso, bielorruso, polaco: todas estas nacionalidades son solo eurasiáticos localmente distintos.\nSus identidades no deben, y no serán envenenadas por el \"nacionalismo\" que los atlantistas desataron sobre el mundo durante la Revolución Francesa. Devolveremos las relaciones entre las personas a donde debían estar, separadas pero unidas. Su gente será respetada, su bienestar asegurado...\n\nY para eso, debes luchar contra Sodoma y Gomorra, porque eres un eurasiático, y ese es tu destino."
 SOV_heirs_to_the_great_rus: "Nacionalismo paneurasiático"
 SOV_heirs_to_the_great_rus_desc: "A medida que nos acercamos a la Endkampf contra los atlantistas talpasocráticos, nuestra telpurocracia, como principal agente contra ellos, necesita abandonar por completo la idea de los Estados nación. Para derrotar al Leviatán, que engulló el continente europeo en una degeneración oligárquica, necesitamos convertirnos nosotros mismos en el Behemoth. A diferencia de los eurócratas, que unieron el continente encadenándolos al dinero y al consumismo, Eurasia se convertirá en una tierra de los verdaderamente virtuosos. Una donde, independientemente de la etnia, se viva sin estar encadenado por la gran Sodoma.\n\nLa noosfera eurasiática ha sido gravemente dañada desde el colapso de la Unión Soviética, sí. Y la administración anterior no la reparó por completo. Sin embargo, para derrotar al hostis, debemos destruir las supersticiones y abrazar la identidad eurasiática en su conjunto. Nuestras minorías deben abrazar tres cosas: el idioma ruso, los valores morales eurasiáticos y el ejército eurasiático. Deben luchar y morir como los valientes rusos que lucharon por el Heartland antes que ellos. Deben asimilarse a la Druzhina en un rechazo a la cábala posmoderna que controla 3 Mare Nostrums y la mayor parte del continente.\n¡La civilización eurasiática tomará lo que es suyo y expulsará a los atlantistas desde el río Volga hasta el Mar del Norte!"
 SOV_conservative_revolution: "Revolución conservadora"
 SOV_conservative_revolution_desc: "A medida que nuestro Katechon despierta, debemos darnos cuenta de que no podemos aferrarnos a los viejos ideales. Nacionalbolchevismo, putinismo, socialismo: todos estos ideales fueron buenos para su momento. Sin embargo, no abordan las preocupaciones aquí y ahora. A medida que nuestra reorganización eurasiática llega a su fin, debemos finalizar los cambios. Los leales camaradas de nuestro Líder Supremo, junto con los militares y el clero, finalmente obtendrán el órgano de gobierno.\nEl nuevo \"Zemski Sobor\" funcionará como lo hizo hace siglos, brindando a nuestro Líder consejos y perspectivas. Con un núcleo centralizado y gobernadores generales autónomos, el sistema que hemos creado se convertirá en un verdadero Behemot, capaz de matar a la bestia.\nLos valores conservadores, aquellos que han sido desarraigados por el modernismo y utilizados por el posmodernismo para golpear al modernismo hasta el suelo, han quedado en ruinas, utilizados por estafadores y degenerados que desean presentarse como justos.\nPuede que hayamos matado a Dios, sí. Pero eso no significa que Dios no pueda ser revivido.\nNo necesitamos lealtad inútil y complacencia religiosa, sino un verdadero renacimiento conservador. Uno donde hombres y mujeres no discutan sin sentido, sino que se unan como una unidad para cumplir sus tareas tanto en el campo de batalla como en el frente interno.\nUno donde el capitalismo no asfixie a las familias haciendo imposible una familia numerosa.\nUno donde el socialismo posmoderno no corroa a hombres y mujeres hasta la perversión.\nEl Katechon revivirá el mundo perdido hace mucho tiempo, e inaugurará un paraíso para todos los pueblos de Eurasia."
 SOV_strength_of_eastern_orthodoxy: "Líder solar de Eurasia"
 SOV_strength_of_eastern_orthodoxy_desc: "Aleksandr Guélievich Duguin ya no es un simple filósofo y líder de un movimiento contracultural.\nEs el unificador de la noosfera eurasiática. El Líder Supremo de Eurasia. Alguien que controla no solo 1/8 del continente, sino también su destino.\nUn Solar. Una vez, había esperado que Vladímir Putin asumiera este manto. Por eso había dejado a Limónov, deseando darle una oportunidad al nuevo presidente. Sin embargo, el lado lunarista de Putin también permaneció. Mantuvo a raya a los eurasianistas y a los liberales, convirtiéndose en un faro de equilibrio. Mantuvo a Rusia en estasis durante 20 largos años. Y aunque fortaleció a Rusia para las futuras batallas, no dejó que ninguno de los lados creciera.\nAhora, Duguin se encuentra en la cima del Kremlin. La lucha contra la amenaza atlantista se acerca, y es su deber llevarla hasta el final.\nEl Sol brilla intensamente sobre él, sobre la patria. Porque él es el conducto de Deus, la luz de Dios que abraza a Duguin, el Líder Solar de Eurasia."
 SOV_god_kingdom_of_common_man: "El Reino de Dios del hombre común"
 SOV_god_kingdom_of_common_man_desc: "Eurasia es una civilización de espiritualidad. Sin embargo, muchos aún no se dan cuenta de lo que eso implica. Si vamos a destruir el Atlantismo, necesitamos algo que lo reemplace. Y, por supuesto, nuestro gran revolucionario ya conoce esta respuesta, pues ha estado con él desde el principio.\nSobre las ruinas de Europa crearemos el Reino de Dios.\nUn estado donde cada hombre esté contento con su vida. Uno donde la camaradería y el colectivismo sean una segunda naturaleza. Pero no estará encadenado por las élites del partido. Se convertirá en una ola de abajo hacia arriba. Una ola de compasión y amor, capaz de aniquilar todo el mal y la podredumbre que el consumismo atlantista nos ha traído.\nY mientras degollamos a las élites eurocráticas, le mostraremos al hombre común que en Eurasia, serás agraciado por la luz de Dios. Y nos abrazaremos mientras los frutos de nuestro trabajo se consolidan. Nuestro sudor y esfuerzo de entonces en adelante nos pertenecerán a nosotros, no a la cábala capitalista global.\nEl mundo despertará de su letargo. Verán a la Hidra yaciendo a nuestros pies, y se regocijarán. Porque les hemos dado la oportunidad de abrazar a sus Dioses y Deidades, libres de la intromisión del mal.\nY la luz de la luna iluminará nuestra lucha, porque todos los pecados que cometeremos no deben ser iluminados durante el amanecer."
 SOV_empire_of_purity: "Imperio de pureza"
 SOV_empire_of_purity_desc: "\"Ya que ustedes han resucitado con Cristo, busquen los bienes del cielo donde Cristo está sentado a la derecha de Dios. Tengan el pensamiento puesto en las cosas celestiales y no en las de la tierra. Porque ustedes están muertos, y su vida está desde ahora oculta con Cristo en Dios. Cuando se manifieste Cristo, que es nuestra vida, entonces ustedes también aparecerán con él, llenos de gloria. Por lo tanto, hagan morir en sus miembros todo lo que es terrenal: la lujuria, la impureza, la pasión desordenada, los malos deseos y también la avaricia, que es una forma de idolatría. Estas cosas provocan la ira de Dios. Ustedes mismos se comportaban así en otro tiempo, viviendo desordenadamente. Pero ahora es necesario que acaben con la ira, el rencor, la maldad, las injurias y las conversaciones groseras. Tampoco se engañen los unos a los otros. Porque ustedes se despojaron del hombre viejo y de sus obras y se revistieron del hombre nuevo, aquel que avanza hacia el conocimiento perfecto, renovándose constantemente según la imagen de su Creador. Por eso, ya no hay pagano ni judío, circunciso ni incircunciso, bárbaro ni extranjero, esclavo ni hombre libre, sino sólo Cristo, que es todo y está en todos\". Colosenses 3:1-11"
 SOV_motherland_of_virtue: "Madre Patria de virtud"
 SOV_motherland_of_virtue_desc: "\"Exhorto a los presbíteros que están entre ustedes, siendo yo presbítero como ellos y testigo de los sufrimientos de Cristo y copartícipe de la gloria que va a ser revelada. Apacienten el Rebaño de Dios, que les ha sido confiado; velen por él, no forzada, sino espontáneamente, como lo quiere Dios; no por un interés mezquino, sino con abnegación; no pretendiendo dominar a los que les han sido encomendados, sino siendo de corazón ejemplo para el Rebaño. Y cuando llegue el Jefe de los pastores, recibirán la corona imperecedera de gloria. De la misma manera, ustedes, los jóvenes, sométanse a los presbíteros. Que cada uno se revista de sentimientos de humildad para con los demás, porque Dios se opone a los orgullosos y da su ayuda a los humildes\". - 1 Pedro 5:1-5"
 SOV_moscow_washington_axis: "Eje Moscú-Washington"
 SOV_moscow_washington_axis_desc: "A diferencia de la mayoría de las milicias y grupos de combate al otro lado del Atlántico, el Ejército Popular de Liberación Americano bajo Caleb Maupin ha sido un espectáculo agradable de contemplar. Después de destruir a los socialistas posmodernos que plagaban el movimiento, los jacobinos han abrazado la economía comunista con valores tradicionalistas. Han derrotado a sus enemigos y han unificado el cascarón podrido de Norteamérica, sin embargo, su cosmovisión no se parece en nada a las administraciones anteriores.\nEn el pasado, el Imperio ruso y los EE.UU. fueron grandes amigos, aislados el uno del otro, pero que igualmente se ayudaban mutuamente en tiempos difíciles. Quizás podamos reavivar las llamas de la cooperación, mientras el sueño imperialista norteamericano se desmorona."
 SOV_recruit_islamist_fighters: "Reclutar combatientes islamistas"
 SOV_recruit_islamist_fighters_desc: "Aunque el islamismo siempre ha sido una espina clavada para los Gobiernos anteriores, no se puede afirmar que todos los movimientos islamistas sean iguales. Algunos de ellos, particularmente los chiitas, están muy interesados en luchar contra los proyectos imperialistas occidentales y liberar a su civilización de la colonización.\nMientras las élites sunitas permanecen ociosas y se entregan a la degeneración y los vicios atlantistas, los verdaderos seguidores del islam, independientemente de su ideología, ya han luchado tanto contra la decadencia de Occidente como contra el cascarón genocida que trajo el Estado Islámico (que también apareció debido a la intromisión atlantista).\nAquellos que compartan nuestra visión serán bienvenidos a luchar junto a nosotros, porque quizás esta sea su oportunidad de desarrollar los sistemas que llevarán a su pueblo a la prosperidad.\nUna vez que la amenaza atlantista haya desaparecido, los veteranos regresarán a sus tierras de origen, marcando el comienzo de una nueva Edad de Oro del islam. Una en la que el amor de Alá les dé la fuerza para superar los límites en las ciencias, la cultura y la compasión.\nY Eurasia dará la bienvenida a este cambio, porque todas las civilizaciones deben vivir en armonía."
 SOV_detente_with_the_chinese: "Détente con los chinos"
 SOV_detente_with_the_chinese_desc: "China es una civilización antigua, una que ha estado a la vanguardia de la historia. Su calidad de vida solo fue superada por la de los europeos en el siglo XVI. Después de un siglo de humillación y colonización, están en camino de recuperar el dominio global una vez más.\n¿Por qué razón deberíamos ser antagónicos hacia ellos? Sí, su cultura es demasiado materialista para nuestros gustos, y sus ambiciones han estado mirando cada vez más hacia el norte desde que perdimos la guerra. Sin embargo, podemos y debemos volver a la relación que tuvimos durante el reinado de Putin y sus sucesores. Una de cooperación económica y social y de amistad.\nNo habrá guerra en nuestro tiempo."
 SOV_agreement_with_the_pdo: "Acuerdo con la OTDP"
 SOV_agreement_with_the_pdo_desc: "La coalición liderada por Japón, a primera vista, es solo un brazo oriental del régimen atlantista, separado de su contraparte europea por el caos que ocurre en América. Sin embargo, a pesar de todos sus defectos y degeneración, presentan algo más.\nLa India, nuestro gran aliado, junto con naciones más pequeñas del bloque de la ASEAN, han decidido respaldar el proyecto consumista japonés-australiano. Aportan su experiencia y cultura civilizatoria, y no tenemos ninguna duda de que eventualmente superarán la luz menguante de los japoneses y a los irrelevantes australianos. Además, la OTDP nos ofrece la oportunidad de expandir nuestra influencia en Eurasia. Porque si bien no deseamos luchar contra China antes de liberar Europa, podemos expandirnos a los mercados de la OTDP, además de cooperar en avances tecnológicos.\nY al final, si China cae ante el poder de la nueva coalición asiática, tampoco nos importa expandir nuestras fronteras orientales."
 SOV_work_with_the_national_bourgoise: "Trabajar con la burguesía nacional"
 SOV_work_with_the_national_bourgoise_desc: "Aunque podríamos recurrir al sistema soviético de distribución y economía, nuestro Líder Supremo no cree que esto sea beneficioso. Eurasia nació de la rebelión contra las élites liberales y los oligarcas del pasado, sin embargo, hay pocas razones para abandonar el capitalismo solo por eso. Algunos afirman que Rusia es solo una tierra de poder militar: un país formado no por deseo económico sino por su voluntad de expandirse, un modelo civilizatorio neorromano.\n\nAleksandr Guélievich está de acuerdo con esta evaluación, pero rechaza la noción de que el valor del espíritu empresarial deba descartarse por ello. Desde los comerciantes de Nóvgorod hasta los incentivos zaristas e imperiales a los expertos extranjeros, Rusia fue una tierra de oportunidades. Una tierra donde un escocés, un francés y un alemán podían unirse bajo la bandera del águila bicéfala, con el mismo objetivo de mejorar el Imperio. Y al frente de esta prosperidad estaban nuestros comerciantes, aquellos que nos dieron Siberia, aquellos que estuvieron con el imperio hasta el final.\n\n¿Por qué no mostrar al mundo la misma grandeza? ¿Mostrarles que Eurasia no es solo un paraíso para los pobres, sino un bastión de los tradicionalistas adinerados que harían cualquier cosa por su Estado? Una vez, durante la hora más oscura de Rusia, Minin y Pozharski formaron milicias de su propio bolsillo que retomaron la Madre Patria mientras los boyardos no hacían nada. Su espíritu y devoción deberían ser el requisito básico para poseer capital en nuestra nación."
 SOV_eurasian_keynesianism: "Keynesianismo eurasiático"
 SOV_eurasian_keynesianism_desc: "Hemos hecho un gran servicio a Eurasia. Millones de emprendedores han aparecido ante nosotros, estableciendo empresas por todo el país. Y aunque este desarrollo es preferible, hay algo que debe abordarse.\nSi bien permitimos que el capitalismo prosperara, está bajo NUESTRA vigilancia, NUESTRA protección y NUESTRA autorización. Intervendremos en la economía como mejor nos parezca, y esperamos que nuestros negocios sigan todo al pie de la letra.\nTrabajarán por el bien de Eurasia y solo por él. Y estamos ahí para recordarles siempre su deber para con el pueblo. Porque cuando comience la Gran Rebelión, los capitalistas marcharán con nosotros al unísono como los perros leales que son."
 SOV_decentralize_the_financial_system: "Descentralizar el sistema financiero"
 SOV_decentralize_the_financial_system_desc: "Hemos sido testigos de la indecencia y la idiotez del Banco de Rusia durante el reinado de Putin. Esos burócratas ineficaces que se educaron en el extranjero, asfixiando a las empresas locales con regulaciones. Putin, por supuesto, lo sabía, pero aun así los utilizó debido a su buena capacidad para controlar los daños durante las crisis. Sin embargo, eso se hizo debido al sistema de liberalismo de mercado e ideólogos tecnocráticos que reinó durante ese período. Esto se acaba ahora.\nDescentralizaremos nuestro sistema financiero, alejándolo de los bancos, y daremos a las empresas más pequeñas la oportunidad de brillar. Eurasia es una tierra de oportunidades y tradición, no una tierra de oligarcas y sus ideas pervertidas.\nPero si bien este es el objetivo principal de la descentralización, también nos facilita la negociación de acuerdos secretos utilizando moneda extranjera y blockchain. ¡A los atlantistas debería importarles dónde está nuestro dinero de todos modos!"
 SOV_national_goals_over_profit_motives: "Objetivos nacionales por sobre el lucro"
 SOV_national_goals_over_profit_motives_desc: "Aunque algunos de nuestros ministros argumentan que deberíamos usar el modelo capitalista, nuestro Líder Supremo piensa diferente. ¿Por qué deberíamos nosotros, los grandes hijos de Eurasia, preocuparnos por el oro? La revolución soviética, inicialmente impía y tan degradada como los atlantistas, se integró en el alma del pueblo ruso. Somos colectivistas: podemos buscar el lujo y los beneficios personales, pero cuando importa nos unimos y luchamos contra el enemigo.\nEstábamos en un largo camino de perder este ideal, principalmente debido a la propaganda atlantista. Pero ahora eso cambia. Ya no se considerará ni se recordará el pensamiento de la clase capitalista.\nEurasia funciona como un solo cuerpo, un solo corazón, una sola alma. Un Katechon que no se preocupa por las riquezas de unos pocos, sino por las riquezas de muchos.\nPorque eso es lo único digno de los agentes de Dios en esta tierra.\nEl zarismo ruso y el posterior Imperio se expandieron por su voluntad de hacerlo. Y solo colapsó por la codicia, que todo lo consume y todo lo corrompe.\nLa Unión Soviética también cayó en ello. Las élites del partido contra las que Duguin hizo tanta campaña se convirtieron en los oligarcas que asolaron los años 90.\nAhora, los rayos de luz y amor abrazarán a cada ciudadano de Eurasia. Nos uniremos como una ola, enfocados en un solo objetivo: devolver al mundo al estado para el que fue concebido. Respeto por el hombre común y desdén por la codicia y la corrupción.\nPues ese es nuestro destino."
 SOV_retool_civil_industry: "Reestructur la industria civil"
 SOV_retool_civil_industry_desc: "No tenemos tiempo para lujos y cortesías. Lo que estamos combatiendo es una Quimera, una que consume todo lo que ve. Una a la que no le importa su propio bienestar mientras la élite sobreviva. Nuestra sociedad no está destinada a centrarse en el consumo inútil. No es nuestro carácter tradicional, sino un pensamiento atlantista.\nLas fábricas producirán maquinaria y bienes esenciales, pero no tonterías inútiles. Porque es hora de que demostremos nuestra dedicación a Dios y aceptemos que no podemos tenerlo todo a la vez.\nNuestro Katechon será conocido en todo el planeta como el martillo que produce las armas de Dios en la lucha contra el mal, y la hoz que se entrega a los pueblos colonizados del mundo para liberarse del dominio atlantista."
 SOV_state_of_permanent_mobilization: "Movilización permanente"
 SOV_state_of_permanent_mobilization_desc: "\"Hermanos, hermanas. Os envidio. Luchar contra el enemigo de nuestra nación, enfrentarse a la gente que nos negaría incluso nuestro derecho a respirar es un honor al que todos aspiramos. Nuestra bandera no significa nada si no se mantiene en alto en las manos de los poderosos. Y ahora sois vosotros quienes la lleváis. Recordad, si la pierna se queda flácida, debe ser amputada. Si el riñón falla, debe ser extirpado. El cuerpo no vive para los órganos individuales, a veces, para que el cuerpo sobreviva, partes de él deben perderse. Un buen cirujano entiende esto. Y os prometo esto, a través de vuestro sacrificio, ¡nuestra patria sobrevivirá! ¡Un cuerpo, una mente, una Eurasia!\" - Aleksandr Guélievich Duguin, fragmento de su discurso del Día de la Unidad Popular."
 SOV_implement_a_conscription_program: "Listos para la guerra"
 SOV_implement_a_conscription_program_desc: "Mientras se cierne la futura perspectiva de una guerra contra los atlantistas, está claro que nuestro país no está preparado. Parte de nuestra gente aún alberga esperanzas de no luchar por nuestro derecho, sino de \"sobrevivir\" mientras la escoria de la OTAN corrompe nuestros territorios y oprime a nuestros compatriotas. Eso no sucederá. Debemos poner a Eurasia en un estado de constante vigilancia, preparada para liberar nuestros territorios del enemigo en cualquier momento.\nLa escoria atlantista se enfrentará a nuestros gloriosos ejércitos de frente, y nuestros soldados deben esperar eso. La introducción de entrenamiento militar obligatorio para hombres aptos también nos proporcionará una reserva de reclutamiento adicional si necesitamos movilizar rápidamente fuerzas adicionales durante la guerra.\nNo nos cubriremos contra ellos, porque nuestro destino está en juego."
 SOV_expand_LTS_program: "Investigación de guerra avanzada"
 SOV_expand_LTS_program_desc: "La guerra con la OTAN ha revelado una verdad incómoda: las guerras globales actuales no se pueden ganar ni con superioridad numérica ni con avances tecnológicos. Se necesitan ambas. Aunque perdimos contra los atlantistas, a ellos no les ha ido mucho mejor con sus tácticas, y ambas experiencias deben estudiarse para alcanzar el Logos. Nuestra noosfera está llena de mentes brillantes listas para hacer nuevos avances. Aunque algunas de ellas puedan albergar puntos de vista... conflictivos con los nuestros, nuestro objetivo sigue siendo el mismo.\nLa lanza de Miguel es demasiado brillante para ser mostrada antes de la lucha final. Y las mentes que la crearán vivirán gustosamente en las sombras para hacerlo... bajo nuestra supervisión."
 SOV_the_tanks_of_the_future: "Las máquinas del futuro"
 SOV_the_tanks_of_the_future_desc: "Desde que América cayó en las llamas de una guerra civil, la tecnología militar ha progresado más rápido que en las últimas tres décadas combinadas. Los drones, tanto aéreos como terrestres, así como los nuevos sistemas de protección para los APC, han moldeado múltiples guerras. La guerra del Este ha demostrado que, independientemente de la valentía o el sacrificio que muestren los soldados, es la tecnología y cómo se implementa lo que determina el resultado.\n\nLa guerra de la rebelión verá a millones de nuestras tropas ir a la batalla, y nuestras flotas de vehículos deben estar equipadas lo mejor posible para el enfrentamiento final. ¡La gloria de San Miguel se extenderá por todas partes, porque somos su lanza que atraviesa al diablo!"
 SOV_lost_sons_of_eurasia: "Hijos perdidos de Eurasia"
 SOV_lost_sons_of_eurasia_desc: "¿Oyes los lamentos de la gente? Supongo que sí, son difíciles de ignorar. Desde las colinas del Dombás hasta los pantanos de Bielorrusia, incluso tan lejos como Polonia y Moldavia, lloran. Vidas desprovistas de sentido y esperanza, viviendo solo para consumir nuevos productos y ser aplastados por la burocracia y los impuestos mientras las élites atlantistas se tragan todas las ganancias. Día tras día tras día tras día viven, volviéndose lentamente hacia sus vecinos occidentales que ya han abandonado la esperanza. Y sin embargo, así como nosotros oímos sus lamentos, ellos pueden oír los coros de los ángeles. La gente cantará con ellos, amará con ellos, y con su amor derribarán el mal mientras los arcángeles descienden."
 SOV_install_ideological_fanaticism: "Instalar fanatismo ideológico"
 SOV_install_ideological_fanaticism_desc: "El sistema atlantista conquistó el mundo no por sus conquistas, sino por sus campañas de propaganda. Todos querían vivir \"libremente\" y \"ricos\", de ahí que muchas de nuestras élites robaran a Rusia solo para ser vistos como uno de \"ellos\". Para que Eurasia expanda su dominio, nuestra gente y nuestro ejército deben saber por qué luchan. Una rebelión contra el consumismo hedonista, las élites atlantistas, el regateo partidista de izquierda y derecha que ha consumido el discurso común y dividido al hombre común. Un retorno a algo puro, libre del pecado y la corrupción humanos.\n\nCientos de tribus diferentes unidas bajo una bandera gloriosa. Dos continentes se unen, una civilización similar a todas las demás, pero que sigue luchando contra la degradación atlantista. Nuestra lucha contra esta cábala capitalista impía es justa, ¡porque somos las fuerzas que pondrán fin a este sistema degradante!"
 SOV_struggle_for_survival: "Lucha por la supervivencia"
 SOV_struggle_for_survival_desc: "El enemigo nos ve como abominaciones, monstruos bárbaros dignos solo de ser asesinados. Para el enemigo somos menos que humanos, pero aprenderán su error, mi gente. Les mostraremos el hierro y el acero bajo la carne eurasiática. Los lanzaremos contra la roca inquebrantable de nuestra voluntad colectiva. Les haremos comprender la verdad que los hijos de Eurasia conocen en sus corazones: ¡que luchamos por la verdad y los pueblos de todos los continentes!"
 SOV_salvage_the_officer_corps: "Salvar el cuerpo de oficiales"
 SOV_salvage_the_officer_corps_desc: "Uno de los problemas más importantes que enfrenta nuestro ejército hoy en día es el estado de nuestro cuerpo de oficiales. La guerra había visto muchos sacrificios, y nuestros oficiales no fueron la excepción. El cuerpo está maltrecho, desorganizado y deteriorado. Sin embargo, hay un lado positivo: la mayoría de nuestros soldados tienen mucha experiencia en la batalla, y los oficiales que nos quedan no desean nada más que vengar a sus hermanos caídos. Eurasia entrará en su guerra de rebelión con comandantes que han enfrentado la muerte como simples soldados de infantería, liderando ejércitos de nuevos reclutas a la batalla por el destino de Europa."
 SOV_heirs_of_the_union: "Unidad de Imperios de la Trinidad"
 SOV_heirs_of_the_union_desc: "Nuestra nación cambió 3 regímenes en un siglo. Antes, algunos regímenes querían pintar el período de nuestro país bajo una luz malvada. Mostrarlo como inferior a otros, lleno de más errores que la mayoría. Pero nos negamos a hacer eso. El único error que se cometió fue durante los años 90, e incluso entonces se corrigió usando el mismo sistema. Nuestra gente eligió por lo que luchó, y no podemos quitarles eso.\n\nPorque somos una civilización imperial. Un Estado nación no puede ni nunca funcionará. Nuestras banderas son iguales, ya sea en oda al zar, al secretario general o al presidente. Nuestro Imperio es eterno, porque está en constante cambio. Y esa es nuestra fuerza. La fuerza de Eurasia."
 SOV_devalue_the_ruble: "Devaluar el rublo"
 SOV_devalue_the_ruble_desc: "A medida que nuestro estado recupera su fortaleza económica, es evidente que debemos impulsar aún más nuestro potencial económico. Para ello, nuestros ministros nos aconsejaron devaluar nuestra moneda. Si bien nuestra moneda ya está devaluada debido a nuestra guerra con Europa, esta medida podría ser beneficiosa para nosotros. Con el mundo volviendo a los mercados regionales, tendríamos que competir con empresas nativas.\n\nPara impulsar nuestro crecimiento industrial, nuestras empresas locales ya reciben mayores subsidios. Potencialmente, podríamos replicar la estrategia china de inundar los mercados globales con productos baratos pero de buena calidad, como automóviles y maquinaria, aunque en una medida mucho más limitada. Esto desarrollaría nuestra base industrial y mejoraría el nivel de vida, incluso si esta medida es temporal hasta la guerra de la rebelión. Además, debido a que los precios del petróleo aún giran en torno a monedas internacionales como el yen, el yuan y el euro, esta medida aumentaría nuestras arcas. ¡\"Made in Eurasia\" nos hará avanzar!"
 SOV_organic_democracy: "Estado unipartidario eurasiático"
 SOV_organic_democracy_desc: "Con los logotipos arraigándose en nuestra sociedad, es hora de finalizar la visión que Aleksandr Duguin tiene en mente. El Partido Eurasia será esa vanguardia. El eurasianismo debe filtrarse en cada fibra de la sociedad. ¡Nuestra gente debe recibir el inicio de la gran rebelión con los brazos abiertos, sonriendo ampliamente! El Partido se configurará de manera similar al PCUS, siendo \"El libro eurasianista\" el estándar al que todos los miembros del partido deberán adherirse. También será inclusivo para cualquier persona, independientemente de su origen, para promover la eficiencia. ¡El Partido nos llevará a la gloria!"
 SOV_movement_of_all_eurasian_peoples: "Vanguardia de los pueblos eurasiáticos"
 SOV_movement_of_all_eurasian_peoples_desc: "A nuestro líder supremo se le ha llamado de muchas maneras, pero nada es tan blasfemo como la etiqueta de \"xenófobo\" que le ponen los atlantistas. ¿Un xenófobo? ¿ÉL?\nLos atlantistas siempre menospreciarán a sus enemigos, pero no parecen entender el verdadero alcance de lo que nuestro estado quiere lograr. Lo que Duguin quiere lograr.\nÉl es la ira de la mayoría global, él es quien hará justicia en este mundo. Porque miles de millones están suplicando asestar el golpe final a las ambiciones hegemónicas occidentales.\nLa erradicación del imperialismo occidental y su descolonización es el objetivo por el que nuestro líder supremo ha luchado incluso antes del colapso de la Unión Soviética.\n¡Él es el líder, el padre, LA VANGUARDIA de toda Eurasia!"
 SOV_the_great_revolutionary: "El gran revolucionario"
 SOV_the_great_revolutionary_desc: "Antes de Duguin, hubo otro ideólogo que luchó por el sueño nacional-bolchevique. Eduard Limónov: fue con él que Duguin defendió la Casa Blanca durante el Octubre Negro, cuando Yeltsin envió sus tanques para destruir el parlamento soviético. Y fue con Limónov que Duguin creó el Partido Nacional Bolchevique. Aunque el Partido Nacional Bolchevique nunca fue concebido como un movimiento político serio, sino como una contracultura juvenil, eventualmente superó sus intenciones originales. Yegor Letov, Zajar Prilepin: solo algunas figuras influyentes que levantaron la bandera nazbol, antes satírica.\n\nPor supuesto, Limónov no perdonó a Duguin por decidir este último ayudar a la Rusia de Putin a alcanzar su potencial. Y sin embargo, los natsbols y los eurasianistas se mantuvieron cerca. Ahora, mucho después de la muerte de su colega, Alexander Gelyevich toma el manto del nacionalbolchevismo en su lugar. Los voluntarios natsbol, aquellos que lucharon del Dombás a África, se han unido al gran revolucionario.\n\nLa bandera carmesí ahora ondea no como una simple rebelión al gobierno yeltsinista. Ahora ondea como una rebelión a Occidente. Sus ideales y su imperialismo. Y Aleksandr Duguin se asegurará de que esta visión tenga éxito."
 SOV_Power_in_Diversity: "Poder de la diversidad"
 SOV_Power_in_Diversity_desc: "La civilización eurasiática no puede definirse simplemente como \"eslava oriental\" o \"túrquica\". Es una tierra en constante evolución. Desde los escitas y alanos, hunos y búlgaros cabalgando en las estepas. Hasta los antiguos godos y tribus protoeslavas que vivían en los bosques. Los persas, evolucionando con cada tribu nómada que se integra en ella. Los europeos, sintetizando sus culturas y creando nuevas cada siglo. Las montañas del Cáucaso, hogar de cientos de tribus que viven juntas.\n\nEste es el poder de Eurasia. Una tierra de contrastes, una tierra de tradiciones. Los atlantistas desean despojarnos de todo ello. Forzarnos a conformarnos con la sociedad consumista que han establecido. Les negamos esto. No obtendrán satisfacción. ¡Porque nuestras culturas se levantarán contra ellos en la gran rebelión! ¡Porque el tapiz continental no se doblegará ante nadie!"
 SOV_introduce_industrial_automization: "Introducir la automatización industrial"
 SOV_introduce_industrial_automization_desc: "Durante el reinado de Putin, algunos economistas insistieron en que Rusia tenía escasez de mano de obra y necesitaba migrantes para sostenerse, pero esa no era toda la verdad. Lo que importaba era la eficiencia de nuestras producciones, que estaba muy por debajo del promedio, incluso por debajo de los estándares polacos de la época. Si bien el Gobierno anterior solucionó este problema en el sector civil con avances en la industria robótica, nuestra producción militar aún carece de eso.\n\nPara que nuestra guerra de rebelión tenga éxito, nuestras fábricas deben trabajar sin parar para reponer y aumentar nuestro inventario. Carne y metal, unidos en un propósito para el beneficio de Eurasia."
 SOV_putting_the_asia_in_eurasia: "Poniendo el Asia en Eurasia"
 SOV_putting_the_asia_in_eurasia_desc: "Por ahora, nuestro territorio no se extiende más allá de las fronteras de la Federación de Rusia. Pero, ¿qué hay de nuestros amigos del sur? Los kazajos, que utilizan el eurasianismo de Gumiliov como su ideal, pueden convertirse en grandes aliados en nuestra lucha. Y aunque los tayikos, kirguises, uzbekos y turcomanos puedan albergar diferentes puntos de vista, o incluso tener a sus élites envenenadas por el consumismo atlantista, estaremos allí para mostrarles que morir por Eurasia vale la pena, incluso si aún no lo ven. Porque solo a través de la unidad serán libres."
 SOV_push_for_don_reunifaction: "Impulsar la reunificación del Don"
 SOV_push_for_don_reunifaction_desc: "La República del Don es un monstruo de Frankenstein. Un cascarón sin ambición ni razón, separado del corazón del país solo porque los atlantistas así lo quisieron. Millones de nuestra gente desean regresar a nosotros, lejos de la anarquía y el desorden. Del Volga al Don, Eurasia se expande."
 SOV_sign_the_kalmykia_agreement: "Firmar el acuerdo de Kalmukia"
 SOV_sign_the_kalmykia_agreement_desc: "Los calmucos nunca quisieron abandonar nuestra gran patria, sin embargo, fueron obligados por los paganos atlantistas que deseaban \"descolonizarnos\". Ahora, atrapados en la pobreza y el aislamiento económico, los calmucos anhelan regresar a sus vidas anteriores, una en la que sean apoyados por sus hermanos y hermanas. Aunque no somos tan perfectos como el Buda, nuestro deseo del regreso de los calmucos a nuestra hermandad es genuino. Porque el Katechon siempre abrazará a sus hijos e hijas, sin importar la fe."
 SOV_secure_the_flank: "Asegurar el flanco"
 SOV_secure_the_flank_desc: "El Este se encuentra en una situación delicada. Está desprotegido, sin defensa. Con las alianzas japonesa y china luchando por el poder en medio de la competencia entre grandes potencias, sumiendo a toda la región del Indopacífico en una guerra masiva, necesitamos tener garantías de que no nos veremos atrapados en su fuego cruzado. Para que nuestra guerra de Rebelión tenga éxito, no podemos esperar luchar en una guerra de dos frentes. Reforzaremos la guarnición oriental y construiremos defensas. Después de eso, tendremos que elegir la potencia a la que favoreceremos, porque cada conflicto también puede traer muchos beneficios."
 SOV_march_on_caucasus: "Marchar en el Cáucaso"
 SOV_march_on_caucasus_desc: "Poco hay que decir de nuestros objetivos en esta operación. El Cáucaso nos ha sido arrebatado, transformado en un caos inconcebible donde las nacionalidades luchan entre sí sin guía. Debemos retomar estas tierras y devolver la paz entre las etnias, destruir cualquier mala voluntad entre ellas. Porque aunque algunos de ellos nos odien, siguen siendo nuestros hermanos a quienes respetamos."
 SOV_march_on_the_west: "Marchar hacia Occidente"
 SOV_march_on_the_west_desc: "\"Mi pueblo... Hijos e hijas de Eurasia... Durante muchos años, hemos sido una nación rota: despreciada, oprimida y conquistada por aquellos a quienes intentamos resistir. Cuando llegué al poder, pedí tiempo, y ese tiempo me fue concedido por vosotros. Vosotros: la fuerza en mi brazo, los guardianes de mis sueños... Nuestros antepasados se embarcaron en el proyecto de construcción nacional más grande en la historia de toda la humanidad. Un proyecto por la libertad, y Eurasia finalmente se convirtió en esa libertad... ¡En el tiempo que me habéis dado, he reconstruido nuestra nación, he reconstruido nuestra fuerza y he reconstruido nuestro orgullo! Nuestros enemigos internos han sido reeducados; les hemos dado nuevas perspectivas sobre nuestra causa. En este día, nos mantenemos unidos una vez más. ¡En este día, aquellos impulsados a dividirnos escucharán nuestra voz! ¡En este día, actuaremos como uno solo, y NO seremos ignorados NUNCA MÁS! ¡Defensores del sueño eurasiático, AHORA ES NUESTRO MOMENTO!\"\n\n- Aleksandr Guélievich Duguin, el discurso que inició la Gran Rebelión."
 SOV_grand_showdown: "Gran enfrentamiento"
 SOV_grand_showdown_desc: "La plaga y pestilencia envié\nHasta tu lecho, hasta tu hogar\nEn la convivencia y al comer\nTus alimentos cubrirán\nA tu ganado Yo iré\nOveja y bueyes morirán\nHasta en tus sueños entraré\nHasta romper y lo verán\nMi plaga envié, Mi enjambre envié\nDijo el Señor"
 SOV_the_end_times: "Fin del los tiempos"
 SOV_the_end_times_desc: ""
 SOV_mobilize_the_last_reserves: "Movilizar las últimas reservas"
 SOV_mobilize_the_last_reserves_desc: ""
 SOV_loot_every_stockpile: "Saquear cada reserva"

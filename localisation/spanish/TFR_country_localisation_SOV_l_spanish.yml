 SOV_national_russia_rises: "Surge la Rusia Nacional"
 SOV_national_russia_rises_desc: "Cuando murió Vladímir Vólfovich, surgió la pregunta de a quién se le debía dar el poder. Muchos codiciaban el orgulloso nombre del Partido Liberal-Demócrata, como buitres sobre el cadáver de una vaca muerta. Pero Aleksandr Sherin no olvidó los preceptos de Zhirinovski. Él recuerda que, ante todo, el partido de Vladímir Vólfovich era un partido que defendía los intereses del pueblo ruso. ¡Levantad los tricolores imperiales, hermanos y hermanas! Nuestra lucha por el pueblo ruso continúa. ¡Hurra, camaradas!"
 SOV_the_great_philosophy: "La gran filosofía"
 SOV_the_great_philosophy_desc: "Vladímir Zhirinovski, Iván Ilyín, Vladímir Puchkevich, Aleksandr Zinóviev, Iván Solonevich y esta lista podría seguir por mucho tiempo. Pero todas las personas mencionadas anteriormente están unidas por una increíble lealtad a la patria, sabiduría y fortaleza. Fueron los ideólogos de la civilización rusa, que puede gravitar no solo hacia los pensadores de la antigüedad, sino que también históricamente, para Rusia ya se ha convertido en una religión. Fueron las ideas de tales patriotas las que, en primer lugar, moldearon la nación rusa tal como la conocemos ahora. Sus palabras no deben ser olvidadas por las generaciones futuras y luego se convertirán en parte de los libros de texto de historia y las mentes de nuestros ciudadanos."
 SOV_national_jingoism: "Jingoísmo nacional"
 SOV_national_jingoism_desc: "El gran chovinismo ruso es la idea que debería convertirse en la base del verdadero mundo ruso. La misma \"autocracia, ortodoxia, nacionalidad\" formulada por Serguéi Uvárov y más tarde desarrollada por el movimiento de las Centurias Negras liderado por Vladímir Purishkévich. Es el gran pueblo ruso el que debería convertirse en el vínculo entre nuestra cultura ortodoxa y un gobernante fuerte que gobierne como un zar."
 SOV_the_white_empire: "El imperio blanco"
 SOV_all_russian_veteran_organization: "Organización de veteranos rusos"
 SOV_all_russian_veteran_organization_desc: "Cuando los guerreros se van, los veteranos de combate normalmente se encuentran al margen de la vida. Se les hace difícil asentarse a una vida pacifica y rechazar las tradiciones de los tiempos modernos. ¡Y que vergüenza al estado que traiciona a los soldados que combatieron por su existencia!  Vamos a crear una organización de veteranos rusos que ayudaran a los veteranos de todos los conflictos armados e intégralos a la vida pacifica."
 SOV_glorify_russian_victories: "Glorificar las victorias rusas"
 SOV_glorify_russian_victories_desc: "Apenas hay una nación en la Tierra que haya defendido su independencia y su derecho a existir más a menudo que los rusos. Luchamos con Europa contra sus campañas, impidiendo que impusieran un estilo de vida occidental. Luchamos contra Asia cuando los mongoles intentaron esclavizarnos, y finalmente ganamos. En más de mil años de nuestra historia, nadie ha logrado subyugarnos y convertirnos en esclavos. ¡Gloria a las victorias rusas y gloria eterna a los soldados caídos, para que Rusia siga siendo grande! Vuestros nombres pueden haber desaparecido en la historia, pero vuestra hazaña es inmortal."
 SOV_revive_solidarist_practices: "Revivir prácticas solidarias"
 SOV_revive_solidarist_practices_desc: "En un tiempo, los bolcheviques hicieron mucho por Rusia. Dividieron al gran pueblo ruso y crearon muchas pseudonacionalidades antirrusas. Sin embargo, su mayor \"logro\" fue que lograron sembrar el odio entre los representantes de la nacionalidad rusa. Los pobres comenzaron a odiar a los ricos, y el frágil orden en la sociedad se vio alterado. Como resultado, la multitud engañada destruyó la flor y nata de nuestra nación. ¡Sin embargo, no permitiremos que esto vuelva a suceder! ¡No hay clases, y mucho menos una lucha entre ellas! El dueño de la fábrica y el trabajador son aliados naturales, no enemigos. ¡Y todos nuestros ciudadanos lo recuerdan!"
 SOV_restructure_the_party: "Reestructurar el Partido"
 SOV_restructure_the_party_desc: "El PLDR siempre ha sido un refugio para muchos movimientos políticos. Todos éramos nacionalistas de una forma u otra. Pero veíamos la gran Rusia de diferentes maneras. Algunos veían un Imperio invencible. Otros quieren una república nacional democrática. Y algunos incluso querían cruzar el nacionalismo ruso con el socialismo. Pero todos estuvimos unidos hasta el día en que Vladímir Vólfovich nos dejó, y resultó que fue fácil desintegrar el movimiento que una vez fue unificado. El PLDR está perdiendo popularidad debido a disputas internas. ¡Purgaremos el partido de oportunistas y formaremos un programa ideológico claro!"
 SOV_rise_of_blueshirts: "Ascenso de los camisas azules"
 SOV_rise_of_blueshirts_desc: "La Asociación de Camaradas del Ejército, o \"camisas azules\", es una organización espontánea de nacionalistas rusos que surgió bajo Zhirinovski. Copiando parcialmente su estilo de una organización similar de la Irlanda del siglo XX, se convirtieron inmediatamente en una fuerza a tener en cuenta. Protegieron a los ciudadanos comunes del robo de los inmigrantes y llevaron a cabo acciones para proteger la cultura rusa y contrarrestar la influencia dañina. Sería un verdadero sacrilegio negar el apoyo gubernamental a tales patriotas."
 SOV_kickstart_the_propaganda_machine: "Encender la máquina de propaganda"
 SOV_kickstart_the_propaganda_machine_desc: "¡Vivimos en el mejor país del mundo, y todos los demás nos tienen envidia! Sin embargo, ¡nuestros ciudadanos también deberían ser plenamente conscientes de esto! Con la ayuda del apoyo gubernamental, docenas de programas de propaganda florecerán como flores en primavera. Nuestros ciudadanos verán propaganda en las redes sociales, en la televisión e incluso en los banners de los sitios web. No nos olvidaremos de los medios de publicidad en el mundo real. ¡Todo esto es para que nuestros ciudadanos no olviden que es un honor ser un patriota de Rusia!"
 SOV_unity_with_the_church: "Unidad con la Iglesia"
 SOV_unity_with_the_church_desc: "La civilización rusa se formó, no hace mucho, con la ayuda de la ortodoxia. A lo largo de los siglos, nuestro pueblo ha llevado el patriotismo y la fe en sus corazones, y debemos consolidar finalmente la unión de la Iglesia y el Estado. Afortunadamente, hasta ahora el clero siempre ha estado de nuestro lado."
 SOV_national_revolution_of_russian_soul: "Revolución nacional del alma rusa"
 SOV_national_revolution_of_russian_soul_desc: "¡Levantaos, hermanos, la bandera rusa hace ruido con nosotros! ¡Todos los hijos de la patria rusa, alzad con orgullo vuestras tricolores sobre vuestras cabezas y ponéoslas! ¡Alabado sea el espíritu ruso! ¡Alabado sea nuestro país! ¡Y alabada sea la hazaña de nuestros antepasados! Siglos después, nos abrimos paso hasta los muros del antiguo Kremlin y llevamos a cabo una revolución nacional. Finalmente, después de todo este tiempo, ha aparecido un Estado para el pueblo ruso, y no permitiremos que alguien destruya nuestro idilio. ¡Nuestro mundo ruso!"
 SOV_handbook_for_russian_nationalist: "Manual del nacionalista ruso"
 SOV_handbook_for_russian_nationalist_desc: "El nacionalismo no es solo amor por la patria y el pueblo. Es también un profundo respeto por las tradiciones y toda una forma de vida. Sin embargo, no todos nuestros ciudadanos son conscientes de ello. Junto con nuestros populares filósofos conservadores y editoriales populares, crearemos juntos un libro nacionalista ruso. Contendrá todo lo necesario para un verdadero patriota ruso. Desde el programa de nuestro partido hasta consejos sobre cómo organizar su vida correctamente."
 SOV_enforce_russification: "Imponer la rusificación"
 SOV_enforce_russification_desc: ""
 SOV_embrace_corporatist_model: "Abrazar el corporativismo"
 SOV_embrace_corporatist_model_desc: "La economía planificada de la Unión Soviética colapsó debido a su ineficiencia. Al mismo tiempo, el libre mercado deja a los ciudadanos vulnerables a empresarios codiciosos que no perderán la oportunidad de engañar a sus ciudadanos. Pero, como saben, siempre hay una salida. El corporativismo ha funcionado bien en los países donde se introdujo y, en nuestra opinión, es la mejor opción a largo plazo. Son corporaciones cuidadosamente seleccionadas las que harán negocios en el mercado y gestionarán nuestra economía."
 SOV_by_the_will_of_god: "Por la voluntad de Dios"
 SOV_by_the_will_of_god_desc: "Por primera vez en la historia de Rusia, el país ha establecido un orden que se asemeja a una teocracia. Oficialmente, el patriarca es declarado jefe de la Iglesia ortodoxa rusa como jefe del Estado ruso. Pero la gestión de un estado tan grande está fuera del alcance de uno solo, por lo que se creó inmediatamente el Santo Sínodo, encabezado por Iván Ojlobystin, para muchos una persona bastante odiosa con ideas aún más odiosas para el desarrollo de Rusia. ¡Pero debemos creer que con la ayuda de Dios y por la voluntad de Dios, él llevará a Rusia a su verdadera grandeza!"
 SOV_on_line_with_kirill: "En línea con Cirilo"
 SOV_on_line_with_kirill_desc: "La Iglesia ortodoxa rusa oficial tiene una enorme influencia en sus feligreses. Todo el país escucha la palabra del patriarca, especialmente ahora. La posición de Ojlobystin es actualmente bastante precaria, y es mejor estar en buenos términos con la Iglesia ortodoxa rusa para que nuestra política sea fácil e indolora para el pueblo."
 SOV_ally_with_hardline_priesthood: "Aliarse con el sacerdocio radical"
 SOV_ally_with_hardline_priesthood_desc: "Hay quienes dentro de la Iglesia ortodoxa rusa cuya fe es un poco más radical que la de la mayoría del sacerdocio. El esquemonje Sergio, la \"Unión de Abanderados Ortodoxos\" con su idea de \"¡Ortodoxia o muerte!\", la doctrina del rey redentor; la iglesia oficial no los favorece a todos, los llama \"herejes\", \"radicales\". Pero creemos que son defensores de la fe ortodoxa de varias influencias corruptoras de Occidente. Nuestras ideas coinciden en gran medida con las suyas, por lo que sería lógico que comenzáramos a rehabilitarlos a los ojos del pueblo."
 SOV_install_orthodox_fundamentalism: "Instaurar el fundamentalismo ortodoxo"
 SOV_install_orthodox_fundamentalism_desc: "Desde el año 988, la ortodoxia ha sido la religión fundamental del estado ruso, uniendo al pueblo y fortaleciendo sus cimientos espirituales. A lo largo de la historia, la fe ha moldeado la forma de vida, los valores morales y la cultura de nuestro país. Sin embargo, en los últimos dos siglos, su influencia se ha debilitado gradualmente, perdiendo su importancia en la vida diaria del pueblo ruso. Consideramos esto inaceptable. La fe es una parte integral de nuestra historia, una fuente de fuerza y resiliencia. Por lo tanto, a partir de este momento, estamos estableciendo el dominio de la ortodoxia en la vida cotidiana, reviviendo las tradiciones espirituales que han sostenido la grandeza de Rusia durante siglos. Solo una nación basada en sólidos valores espirituales es capaz de avanzar con confianza y crear un gran futuro."
 SOV_mass_religious_education: "Educación religiosa en masa"
 SOV_mass_religious_education_desc: "La educación rusa comenzó con una escuela parroquial, donde se enseñaba a los niños a leer y escribir a través de las Sagradas Escrituras. Con el tiempo, la educación de la generación más joven se secularizó, lo que llevó a tristes consecuencias: el librepensamiento en la educación se convirtió en el primer dominó que condujo al caos del siglo XX. Ahora que la Iglesia gobierna el Estado, debemos aumentar el papel de la religión en la educación. En lugar de lecciones de música con óperas rock que desafían a Dios, habrá cánticos de iglesia, y se dedicarán más horas a las Sagradas Escrituras y otra literatura eclesiástica, a expensas de las lecciones de biología, por supuesto."
 SOV_the_new_russian_trinity: "Nueva trinidad rusa"
 SOV_the_new_russian_trinity_desc: "Putin, Zhirinovski, Ojlobystin son una línea de sucesión clara y lógica. El primero fortaleció el país después de tiempos difíciles, el segundo resistió la prueba más dura de la guerra con toda Europa, y el tercero llevará a Rusia hacia un futuro lleno de espiritualidad y grandeza. En todo momento, Rusia necesita un líder fuerte y decidido, capaz de guiar al pueblo hacia adelante."
 SOV_co_patriarch: "Copatriarca"
 SOV_co_patriarch_desc: "Iván Ojlobystin es el actor principal en nuestro Estado. La gran mayoría de las decisiones gubernamentales se toman y aprueban únicamente por su voluntad. La figura del patriarca Cirilo, más públicamente, se ha convertido en algo así como el papa católico: de hecho, no tiene poder en el Estado, sino que es solo el líder espiritual de Rusia. Ojlobystin y sus radicales en el Santo Sínodo insistieron en aumentar su papel en el estado: a partir de ahora, se creará el puesto de \"copatriarca\", la primera persona después del patriarca en el Estado, que, por supuesto, será ocupado por el jefe del Sínodo. Y entonces nadie podrá evitar el control total de los fundamentalistas ortodoxos en Rusia.\n\nNi siquiera Dios nuestro Señor."
 SOV_union_of_the_faithful: "Unión de los fieles"
 SOV_union_of_the_faithful_desc: "El Santo Sínodo es la principal institución de poder en nuestro país. Sus poderes incluyen el nombramiento de altos cargos, actividades legislativas y judiciales supremas. Pero no tiene conexión práctica con los creyentes de todo el país. Por eso surgió la iniciativa de crear la Unión de Creyentes, una institución semiparlamentaria con poderes consultivos. Por supuesto, esto no es una democracia directa, pero al menos tranquilizará temporalmente a nuestros oponentes."
 SOV_restore_societal_piety: "Restaurar la piedad social"
 SOV_restore_societal_piety_desc: "En la antigüedad, no ir a la iglesia significaba que una persona era un paria de la sociedad, y era peligroso tratar con ella. Todos iban a la iglesia: desde el más pobre hasta el más rico y noble, desde el joven hasta el anciano. Pero en el mundo moderno, la iglesia no desempeñó un papel tan serio como solía hacerlo, gracias a los bolcheviques ateos. Aunque Zhirinovski intentó hacer algo, no fue suficiente.\n\nYa no podemos permitir esto, y por lo tanto, ir a la iglesia y seguir las normas de la moral cristiana será obligatorio. Ante la creciente amenaza de Occidente, ¡no podemos permitirnos ser débiles!"
 SOV_deploy_the_oprichniks: "Desplegar a los opríchniks"
 SOV_deploy_the_oprichniks_desc: "A pesar de todo el trabajo del régimen de Zhirinovski, todavía hay muchos enemigos ocultos dentro del Estado ruso. Ahora se les han unido elementos ajenos a nuestra fe en todos los sentidos posibles, amenazando con socavar los cimientos mismos de nuestra sociedad, para deleite de los rojos europeos.\n\nPor eso, el Santo Sínodo insistió en la reactivación del instituto de la Opríchnina dentro de las fuerzas de seguridad, siguiendo el ejemplo de Iván IV. Al igual que en el siglo XVI, esta estructura tendrá derecho a buscar a los enemigos de Rusia y destruirlos. Aunque algunos temen que repitamos los mismos errores, Ojlobystin es inflexible: el objetivo sagrado de proteger el Estado y el pueblo ruso justifica los medios."
 SOV_consecrate_armed_forces: "Consagrar las Fuerzas Armadas"
 SOV_consecrate_armed_forces_desc: "La Guerra Europea reveló un problema importante de nuestras fuerzas armadas: la falta de religión en los soldados. Entre los combatientes, no solo se extendieron los símbolos paganos y los amuletos, sino también las letanías con \"oraciones al Dios-Emperador\", quienquiera que fuese. Este hecho preocupa a muchos dentro del Santo Sínodo, y exigen un papel más fuerte de la Iglesia en el ejército. Para resolver este problema, se propone aumentar el número de sacerdotes militares y fortalecer su importancia religiosa y política. Un soldado ruso debe saber que el Señor está de su lado, e incluso si muere, irá al Cielo como mártir. Y sus enemigos simplemente morirán."
 SOV_faith_is_blind: "La fe es ciega"
 SOV_faith_is_blind_desc: "A lo largo de las décadas de opresión primero comunista y luego capitalista del pueblo ruso, se ha desarrollado la opinión de que lo principal es lo material. Que la riqueza no está en el alma, está en las paredes yugoslavas, las grabadoras, los teléfonos, los apartamentos y los coches. Lo mismo se ha transmitido a la apariencia de nuestras ciudades. Fue el comercialismo lo que corrompió a nuestros feligreses.\n\nPero ahora comenzaremos a abandonar todo tipo de excesos que destruyen la imagen moral de nuestro pueblo. ¡El utilitarismo ortodoxo es lo que necesitamos! ¡La belleza espiritual es lo más importante en nuestro país!"
 SOV_beautify_our_cities: "Embellecer nuestras ciudades"
 SOV_beautify_our_cities_desc: "Las ciudades rusas modernas y sus zonas residenciales son un desastre gris de hormigón. ¡No se pueden mirar nuestras ciudades sin llorar, por eso hay una crisis mental y alcoholismo! ¿Y quién tiene la culpa de todo? ¡Por supuesto, los comunistas con su impiedad y brutalismo! Corregiremos este malentendido: ¡más casas al estilo ruso, más jardines, más iglesias! ¡La apariencia de Rusia debe reflejar el brillo y la belleza de la fe ortodoxa!"
 SOV_empower_metropolitans: "Empoderar a los metropolitanos"
 SOV_empower_metropolitans_desc: "La institución de los metropolitanatos existe desde el siglo IV d.C. Con ellos, los cristianos dividieron los territorios de los imperios romano y bizantino, liderados por el metropolitano. El mismo sistema se ha conservado en Rusia. Sería bueno que, con la ayuda de los metropolitanos, la Iglesia pudiera consolidar aún más su control sobre los asuntos estatales: las autoridades ejecutivas y judiciales en las regiones."
 SOV_our_sacred_history: "Nuestra historia sagrada"
 SOV_our_sacred_history_desc: "La historia rusa está continuamente ligada al cristianismo: desde el bautismo de Vladímir Sviatoslávovich hasta la restauración del Patriarcado en 1943, para bien o para mal, la Iglesia ortodoxa rusa siempre ha estado junto al pueblo ruso y al estado ruso. Por supuesto, Rusia se encontró bajo la opresión de casi un siglo de los bolcheviques ateos, pero al final, pudo recuperarse y restaurar el orden correcto y cristiano de las cosas. Ahora, bajo la estricta guía de la Iglesia ortodoxa rusa e Iván Ojlobystin, la Santa Rusia puede avanzar con seguridad hacia el establecimiento del Reino de Dios en la Tierra."
 SOV_worship_house_in_every_khrushevka: "Casa de culto en cada jruschovka"
 SOV_worship_house_in_every_khrushevka_desc: "Para que cada habitante de Rusia pueda estar más cerca de la fe y la espiritualidad, se creará una casa de oración en cada hogar, en cada jruschovka, un lugar donde se pueda retirar para la oración y la reflexión. Este lugar se convertirá en una parte integral de la vida cotidiana, recordando la importancia de las tradiciones ortodoxas. Aquí, todos podrán discutir temas de fe con sus seres queridos, familiarizarse con la literatura espiritual y participar en los servicios de adoración sin alejarse mucho de sus hogares. Este será un paso hacia el renacimiento de la vida espiritual, donde la fe volverá a ocupar su lugar legítimo en el mundo interior de cada persona."
 SOV_sanctify_our_economy: "Santificar nuestra economía"
 SOV_sanctify_our_economy_desc: "La Iglesia ortodoxa ha rehuido la actividad económica a lo largo de su existencia. Sí, mucha gente nos acusa de llevar un estilo de vida lujoso, hablan de los \"yates y Mercedes\" del Patriarca y otros dignatarios, pero eso fue hace mucho tiempo y no es cierto.\n\nAhora los tiempos han cambiado. La Iglesia debe aprender a operar económicamente, de lo contrario, simplemente no podremos subsistir. Estableceremos una red de banqueros y empresarios cercanos a nosotros para gestionar la economía rusa y promover la introducción de los valores y la moral cristianos en las relaciones económicas."
 SOV_prepare_for_the_crusade: "Preparar la cruzada"
 SOV_prepare_for_the_crusade_desc: "Las nubes se ciernen sobre Europa. Las fuerzas de la plaga roja inacabada se están reuniendo en la frontera para subyugar nuestra cultura y destruir nuestra fe ortodoxa. ¡Pero no dejaremos que nos tomen por sorpresa! ¡Todos en nuestra Rusia se prepararán para una nueva cruzada contra el eurocomunismo! ¡Con el viejo grito ruso \"Goida!\", miles de héroes rusos borrarán los últimos vestigios de rusofobia y ateísmo de la faz de Europa! ¡Temed, mundo rojo, que llegaremos!"
 SOV_kurginyan_red_empire: "Imperio rojo de Kurginián"
 SOV_kurginyan_red_empire_desc: "¡Imperio o muerte! Estas son las únicas dos vías para Rusia. Esto es exactamente de lo que hablaba Serguéi Yervandóvich Kurginián en 1994. Pero han pasado tres décadas, y el propio Kurginián se encontró en el poder. Solo que Rusia, que se ha convertido de nuevo en un Imperio, se está desmoronando en pedazos. Traidores dentro y detractores fuera. Todos quieren arrebatar a los rusos el derecho a su propio Estado. ¡Pero eso no va a suceder! Ha llegado el momento de un estado ruso fundamentalmente nuevo, uno que no luchará contra su propia historia y los fantasmas del pasado. ¡Ha llegado la hora del Imperio rojo!"
 SOV_subdue_reactionary_nationalities: "Someter a nacionalidades reaccionarias"
 SOV_subdue_reactionary_nationalities_desc: "Hace mucho tiempo, los bolcheviques llegaron al poder en la conflagración de la revolución rusa. Tenían un gran objetivo: crear una persona completamente nueva. Alguien comparado con quien incluso Goethe y Hegel palidecerán en el marco de la historia mundial. Pero esta idea fue percibida por todos de diferentes maneras. Y en lugar de superhombres, las nacionalidades reaccionarias comenzaron a aparecer como hongos después de la lluvia. Ucranianos, kazajos, bielorrusos y otros han destruido la estructura monolítica de la sociedad rusa.\n\nPor supuesto, el camarada Stalin intentó suprimir estos sentimientos, pero ya era demasiado tarde. Decenas de subidentificaciones ya habían nacido e incluso habían adquirido ardientes luchadores por su causa. Naturalmente, tales nacionalidades artificiales no pueden crear Estados estables, como hemos visto en la historia reciente. La razón de su fracaso es simple: todos se apartaron del colectivismo y la hermandad inherentes al verdadero pueblo ruso. Con nuevas reformas, pondremos a estos pueblos en el camino correcto. Y mostraremos claramente por qué el tribunal del tiempo les dio tal veredicto."
 SOV_dictatorial_leadership: "Liderazgo dictatorial"
 SOV_dictatorial_leadership_desc: "Dictador, tirano, déspota. Por alguna razón, todas estas palabras han adquirido una connotación negativa en la sociedad moderna después del efímero triunfo del pensamiento occidental. ¿Por qué un líder fuerte que es capaz de defender a su pueblo y está listo para defender sus intereses es estigmatizado inmediatamente? Todo es simple. Es miedo. La capacidad del pueblo ruso para producir grandes líderes siempre ha sido nuestra fuerza. Por la fuerza, que causó miedo a perder su poder y todo su poder.\n\nLos Estados occidentales están construidos sobre pueblos cuya pasión ha sido suprimida durante mucho tiempo por el Estado. Sin embargo, ¡nosotros, el pueblo soviético, no tenemos miedo de afrontar los desafíos de los tiempos! Ha llegado el momento de que una mano fuerte tome el poder sobre Rusia para llevar al pueblo a un futuro socialista brillante."
 SOV_elitist_party_apparatus: "Aparato del partido elitista"
 SOV_elitist_party_apparatus_desc: "¿Puede un cocinero dirigir un Gobierno? ¡Una pregunta estúpida, cuya respuesta debería ser un rotundo y claro \"no!\". Permitir que personas sin formación gestionen un organismo tan complejo es una blasfemia y el primer paso hacia una muerte segura. Entonces, ¿no sería mejor reconstruir el aparato del partido para que se adapte a nuestras necesidades? Para llegar allí, tendrás que pasar innumerables pruebas, incluida la lealtad al partido. Pero este es el precio que vale la pena pagar por la oportunidad de dirigir el país. Por supuesto, los miembros del partido tendrán sus propios privilegios, si entiendes lo que quiero decir, por supuesto."
 SOV_new_russian_statecraft: "Nueva política de Estado rusa"
 SOV_new_russian_statecraft_desc: "El proceso de la muerte de un Estado es imparable cuando los traidores toman el poder en él. Y cuando la gente se desilusiona con la ideología, deja de esforzarse por el bien del régimen. Esto sucedió en la URSS, cuando representantes de la \"intelligentsia\" y el pueblo se burlaron ruidosamente de la idea de la hegemonía de la clase obrera. ¡No podemos permitir que echen raíces en nuestra unión! Que todos los ciudadanos de nuestro gran país sepan que están trabajando para la gloria de la nación rusa y de toda la humanidad."
 SOV_knights_of_crimson_order: "Caballeros de la Orden Carmesí"
 SOV_knights_of_crimson_order_desc: "¿Puede existir un Estado que exponga absolutamente todo al público? Por supuesto que no. Es por eso que deberíamos tener cierto margen de maniobra. Nuevos caballeros de las filas de los servicios especiales permitirán a nuestro estado excluir elementos radicales cuando sea necesario. Y simplemente para mantener la vida pacífica de los ciudadanos comunes, protegiéndolos de la influencia corruptora de los enemigos. ¡Hurra, camaradas! ¡Gloria a los servicios secretos soviéticos, nuestros guardianes y defensores!"
 SOV_ministry_of_peoples_knowledge: "Ministerio de Conocimiento Popular"
 SOV_ministry_of_peoples_knowledge_desc: "La lealtad es algo muy difícil y es increíblemente difícil de inculcar. Incluso la Unión Soviética, un verdadero titán del pensamiento socialista, finalmente no logró convencer a sus ciudadanos de que las ideas de Marx y Engels eran correctas. Pero iremos más allá. Se creará un ministerio separado para asegurar que nuestros ciudadanos confíen en el futuro del estado en el que viven. Algunos pueden llamarlo obolvaniev, y otros, propaganda barata. Pero por favor, piensen por ustedes mismos. ¿Cómo puede una mentira, incluso si se pronuncia mil veces, volverse verdad y arraigarse en la mente de las personas? Y si su respuesta es sí, ¿realmente sigue siendo una mentira?"
 SOV_holy_red_army: "Sacro Ejército Rojo"
 SOV_holy_red_army_desc: "No hay muerte más digna que la muerte por la Patria. Es imposible ser verdaderamente valiente si no crees que tienes razón. ¡Y por eso añadiremos un poco de fe al gran ejército! Como cruzados, los soldados de nuestro ejército irán a la batalla con el nombre de Cristo en sus labios, y las unidades se repondrán con sacerdotes de combate especialmente entrenados. Nuestros defensores de entre los miembros del Ejército Rojo Popular están listos para luchar y morir por el futuro de la humanidad y para que nuestros ciudadanos duerman en paz. La hazaña de los héroes nunca será olvidada, y sus almas ascenderán al cielo cuando llegue el momento y ocuparán su lugar legítimo en el paraíso, estando a la par de los grandes mártires. Gloria a nuestras fuerzas armadas, y que el Señor Dios guíe personalmente las manos de nuestros muchachos hacia el objetivo. ¡Temed, vil enemigo! ¡Porque nuestro ejército, como San Jorge, está listo para matar a la serpiente!"
 SOV_condemn_european_red_globalism: "Condenar el globalismo rojo europeo"
 SOV_condemn_european_red_globalism_desc: "Tras la derrota del gran ejército ruso, Europa supuestamente se volcó a las ideas del socialismo. Pero, ¿cuánto vale realmente su socialismo? Esto es solo un intento desesperado de los elementos más globalistas del capital financiero para esconderse detrás de una máscara de virtud y preocupación por la clase trabajadora. Pero el pueblo ruso no se deja engañar tan fácilmente. Nos queda claro a través de los siglos quién intenta sacar provecho de la crédula clase trabajadora dándoles ideas de justicia social y marxismo cultural degenerado, y quién realmente defiende los derechos de los trabajadores y campesinos. ¡El enemigo no pasará! ¡Tarde o temprano, el globalismo europeo será aplastado para siempre! Mientras tanto, debemos prepararnos para esta lucha."
 SOV_towards_imperial_communism: "Hacia el comunismo imperial"
 SOV_towards_imperial_communism_desc: "¡El comunismo es la única oportunidad para que la humanidad sobreviva! Mientras nuestros oponentes intentan sustituir el cosmopolitismo desarraigado por los conceptos de solidaridad de la clase trabajadora en todo el mundo, nosotros abogamos por el comunismo imperial. Sí, para una persona que no está familiarizada con la teoría del marxismo, esto puede sonar absurdo, pero esto es exactamente lo que será nuestra ideología en el siglo XX. Rusia no puede tener otro destino que el de imperio. ¡Y es el comunismo lo que nos hará avanzar! Y lo llevaremos a las naciones que aún esperan su despertar. ¡Hurra, camaradas, gloria a la patria! ¡Gloria a las eternas enseñanzas de Engel, Marx, y Stalin!"
 SOV_soviet_christianity: "Cristianismo soviético"
 SOV_soviet_christianity_desc: "El cristianismo es esencialmente protocomunismo. Fue lo que destruyó la esclavitud en la antigüedad y logró unir a personas en tres continentes a la vez. Y por eso es repugnante para el poder de los globalistas, porque permite que las personas se acerquen, sin dejar de ser diferentes, sin convertirse en una masa única fácil de controlar. El cristianismo y el comunismo también están unidos en que creen en la ascensión inevitable del hombre y la ascensión a una nueva etapa de existencia. Las ideas pueden sonar diferentes, pero tienen la misma esencia. Entonces, ¿por qué no damos un paso adelante? Así como nuestra ideología es sincrética, también lo será nuestra fe. Grandes figuras rusas serán elevadas al rango de santos, y la religión se volverá inseparable de la ideología. ¡Oh, regocijaos, hermanos en Cristo y proletarios comunes! Porque los mansos recibirán la tierra por heredad."
 SOV_great_russian_awakening: "Gran despertar ruso"
 SOV_great_russian_awakening_desc: "Verdaderamente, el pueblo ruso ha sido destinado a un papel mesiánico por el propio destino. Fuimos nosotros los primeros en despertar del sueño y abrazar las ideas del socialismo. Aunque el primer experimento no tuvo éxito por muchas razones, fue como una piedra arrojada al agua que resonó en todo el planeta, impulsando a la gente de todo el mundo a unirse a la verdadera enseñanza. Sin embargo, entonces no funcionó. No tuvieron el coraje y la ambición de despertar completamente al pueblo profundo ruso y llevarlo a la era socialista. Sin embargo, en el siglo XXI, ya no tenemos derecho a cometer errores. Levántate, pueblo ruso. Deshazte de las cadenas de los ídolos de oro del capital y abraza el socialismo. ¡Juntos estamos destinados a llevar a la humanidad a la cima de su desarrollo y crear la civilización más grande del mundo!"
 SOV_deploy_peoples_militia: "Desplegar a vigilantes populares"
 SOV_deploy_peoples_militia_desc: "¿Valen algo las ideas de las autoridades si no resuenan con la gente común? Sin el apoyo de las bases, incluso la idea más brillante está condenada al fracaso y al olvido. Y es por eso que contribuiremos a la creación de escuadrones nacionales de la Bandera Roja. Su tarea será brindar asistencia integral a los territorios que se les asignen, combatir elementos dañinos y difundir nuestra gran ideología. Y, por supuesto, en caso de guerra, deben estar listos para tomar las armas e ir a defender su patria socialista en las primeras filas. Por supuesto, disfrutarán de ciertos privilegios, pero ¿a dónde ir sin ellos?"
 SOV_russian_proletarian_world: "Mundo proletario ruso"
 SOV_russian_proletarian_world_desc: "La historia no conoce el subjuntivo, y no sabemos qué pasará en el futuro. Sin embargo, ahora estamos cien por cien seguros de nuestra victoria. La victoria del socialismo y del pueblo ruso personalmente. Lucharemos hasta el final, y si es necesario, teñiremos la propia tierra de carmesí como nuestra bandera para salvar a toda la humanidad. Después de todo, debe haber orden en el mundo, ¡y con razón debe ser proletaria! Y el verdadero proletariado en este momento es solo el pueblo ruso. Temed al viejo mundo, hecho de globalismo y mentiras. La primavera de la humanidad se acerca y seremos los abanderados de un mundo nuevo. Porque esta es nuestra carga."
 SOV_social_engineering: "Ingeniería social"
 SOV_social_engineering_desc: "La sociedad humana es imperfecta. Es la verdadera apoteosis de nuestra naturaleza animal. Después de todo, incluso después de millones de años de evolución, hemos seguido siendo monos sin pelo, listos para coger una piedra o un palo y matar a nuestro vecino en cualquier momento. Sin embargo, esto no significa que nuestra naturaleza no pueda cambiarse. La sociedad siempre puede reconstruirse si sabes qué hilos mover. Pero la ingeniería social es un proceso largo y puede que no obtengamos resultados durante mucho tiempo. Pero, como sabes, el fin justifica los medios."
 SOV_enforce_state_planning: "Imponer la planificación estatal"
 SOV_enforce_state_planning_desc: "La planificación es la base de cualquier sistema económico estable. Aquí podemos establecer una analogía con el cuerpo humano. La mente controla los procesos, y el cuerpo los ejecuta obedientemente para la supervivencia del organismo. Hay, por supuesto, excesos cuando la mente \"se atonta\" y el cuerpo, por su propio bien, debe desconectarla temporalmente. Y entregar absolutamente todo a la planificación es estúpido y simplemente imposible. Pero la columna vertebral básica de la economía debe ser controlada por un enfoque administrativo y de mando sin objeciones."
 SOV_richness_is_a_sin: "La riqueza es pecado"
 SOV_richness_is_a_sin_desc: "Por muy perfecta que sea la economía planificada, sería una locura depender de las decisiones del centro para todo. Los funcionarios y un sinfín de burócratas no pueden gestionar eficazmente los recursos ni dar instrucciones si están divorciados de la realidad. Para evitar excesos, crearemos comités económicos regionales que se encargarán del desarrollo de los territorios que se les asignen."
 SOV_regional_economic_committees: "Comités económicos regionales"
 SOV_regional_economic_committees_desc: "Por muy perfecta que sea la economía planificada, sería una locura depender de las decisiones del centro para todo. Los funcionarios y un sinfín de burócratas no pueden gestionar eficazmente los recursos ni dar instrucciones si están divorciados de la realidad. Para evitar excesos, crearemos comités económicos regionales que se encargarán del desarrollo de los territorios que se les asignen."
 SOV_optimize_the_economy: "Optimizar la economía"
 SOV_optimize_the_economy_desc: "La economía es un proceso tedioso en el que siempre hay lugar para la optimización. Al realizar algunas mejoras en el proceso burocrático y mejorar ligeramente la interacción entre trabajadores y directores, ¡podemos obtener resultados asombrosos! La economía siempre tiene margen para crecer, y al llevar a cabo un proceso de optimización integral, podemos crear una máquina verdaderamente imparable."
 SOV_forced_re_industrialization: "Reindustrialización forzada"
 SOV_forced_re_industrialization_desc: "¡Cuando cayó la Unión Soviética, nuestro país fue saqueado! Decenas de empresas han quedado al margen de la vida, y nuestro poder industrial se ha extinguido. ¿Merece tal olvido un país con los mayores recursos naturales del mundo y un enorme número de mentes brillantes? ¡No, no y no de nuevo! La Unión Soviética de la nueva era no avergonzará a su predecesora. Es hora de volver a las máquinas y tomar las herramientas. ¡Que el humo de las chimene oscurezca los cielos! ¡El país de los trabajadores vuelve a la carga!"
 SOV_great_constructions: "Grandes construcciones"
 SOV_great_constructions_desc: "El comunismo es principalmente un sueño. El sueño de algo majestuoso e increíblemente grandioso, por ejemplo, la unificación de la humanidad. Sin embargo, este sueño puede tener formas más materiales. ¡Así que rechazaremos la decadencia antisemita y construiremos un mundo nuevo con nuestras propias manos! Monumentos de tamaño sin precedentes, centrales hidroeléctricas y nucleares, así como museos. ¡Los proletarios pueden crear todo esto si trabajamos juntos!"
 SOV_construct_the_workhouses: "Construir los talleres"
 SOV_construct_the_workhouses_desc: "Los asentamientos de trabajo son una gran oportunidad para optimizar los procesos de producción en nuestro país. Ubicados directamente cerca de las instalaciones industriales o agrícolas, serán responsables del procesamiento directo de los productos y su envío a lo largo de las cadenas de producción. ¡Es hora de multiplicarlos para crear una poderosa base industrial y alimentar nuestra máquina!"
 SOV_the_new_rural_socialism: "Nuevo socialismo rural"
 SOV_the_new_rural_socialism_desc: "Rusia fue una vez la nación productora de grano más grande del mundo. Todos los países lo compraban, e incluso el malogrado pan francés se hacía con él. Pero los tiempos pasan y la capacidad de nuestro país en este sentido ha disminuido. Llegó un punto en el que nos vimos obligados a comprar trigo de otros para alimentar a nuestra gente. ¡Basta! Es hora de levantar vuestras granjas y desarrollar la tierra. ¡Tomad de nuevo las hoces y los arados! ¡Que crezcan los campos dorados! ¡El país de los campesinos vuelve a encarrilarse!"
 SOV_all_russian_communes: "Comunas panrusas"
 SOV_all_russian_communes_desc: "Sería difícil organizar las actividades agrícolas sin la ayuda del Gobierno. Es para guiar y ayudar a nuestro resurgente sector de la economía que se crearán las llamadas comunas panrusas. Juntos, esperamos unir todas las granjas rusas en una sola cadena que funcionará como un organismo vivo y satisfará las necesidades de nuestros ciudadanos."
 SOV_idolize_the_countryside_life: "Idolatrar la vida campestre"
 SOV_idolize_the_countryside_life_desc: "Idilio campesino, ¿no fueron estas imágenes cantadas en sus obras por varios poetas y escritores de tiempos pasados? Campos interminables de trigo, como océanos. Laberintos hechos de maíz en los que puedes perderte accidentalmente. El canto de los pájaros y el sonido rítmico de una guadaña cortando otra porción de hierba. Por supuesto, los tiempos han cambiado, pero la forma de vida en los pueblos apenas lo ha hecho. Además, esta es una buena oportunidad para la gente urbana, habiendo perdido solo un poco de comodidad, de cambiar a la autosuficiencia y finalmente probar productos reales. ¡Exploremos juntos las tierras vírgenes, amigos y camaradas!"
 SOV_worker_conscription: "Conscripción obrera"
 SOV_worker_conscription_desc: "No importa cómo se construya el comunismo o cómo se luche por él. Siempre se necesitan trabajadores, y los parásitos no tendrán cabida en el próspero mundo del futuro. Por lo tanto, ¡vayamos todos juntos a la obra del comunismo! Créanme, allí hay un lugar para todos."
 SOV_nurture_labor_aristocracy: "Fomentar la aristocracia obrera"
 SOV_nurture_labor_aristocracy_desc: "La aristocracia obrera es la columna vertebral de cualquier régimen. Mientras las arterias del Estado bombean sangre constantemente, ellos supervisan el estado del cuerpo. Y, naturalmente, el estado del Estado depende de su lealtad e idoneidad. La Unión Soviética cayó en su momento, como si fuera por el abandono de este estrato particular de la sociedad. Sin embargo, no repetiremos irreflexivamente los errores de nuestros predecesores. Lentamente, año tras año, cultivaremos nuestra aristocracia. Formada en la teoría, eficaz y, por supuesto, leal a nuestra causa comunista."
 SOV_russian_spring: "Primavera rusa"
 SOV_russian_spring_desc: "Finalmente, el momento tan esperado ha llegado. Rusia ha roto sus cadenas y está lista para abrazar un verdadero sistema democrático. Nadie esperaba que esto sucediera tan rápidamente, pero aquí estamos. Mientras el pueblo vitorea en celebración, Navalni y sus seguidores se preparan para remodelar Rusia para siempre."
 SOV_the_political_amnesties: "Amnistía para los presos políticos"
 SOV_the_political_amnesties_desc: "Al igual que Alekséi Navalni, muchos más presos políticos han sido retenidos por el régimen durante su reinado. Estamos obligados a liberarlos. ¡Aún más, su experiencia podría ayudarnos a reconstruir el sistema! ¡Rusia es libre!"
 SOV_a_big_tent_government: "Un gobierno de gran coalición"
 SOV_a_big_tent_government_desc: ""
 SOV_Consolidate_Navalnys_Power: "Consolidar el poder de Navalni"
 SOV_Consolidate_Navalnys_Power_desc: "¿Quién, si no Navalni, puede liderar nuestra nación? Fue él quien fundó la Fundación Anticorrupción, fue él quien dirigió las protestas. Él fue el núcleo de la oposición, el núcleo de la revolución y ahora, el núcleo de Rusia.\n¡El Gran Liberador nos guiará hacia la prosperidad!\n\nCree en ti como en un dios,\nUn país agotado,\nGolpeado por el autoritarismo\nDespertado de su sueño.\nJustifica la fe en ti -\nHa llegado el momento.\nJustifica la fe,\n¡Señor presidente!"
 SOV_Push_The_Figurehead_Aside: "Aparta al jefe a un lado"
 SOV_Push_The_Figurehead_Aside_desc: "Por mucho que idolatreemos a Navalni... ¿cuánto tiempo lleva en la cárcel? Fue la Fundación Anticorrupción bajo Vólkov quien organizó la oposición durante tantos años. Fueron ellos quienes unificaron a la comunidad emigrada y negociaron con Europa para que siguiera prestando apoyo financiero.\n¿Por qué deberíamos ponerlo por encima de todos los demás?"
 SOV_Form_The_Russian_Self_Defense_Force: "Formar la Fuerza de Autodefensa Rusa"
 SOV_Form_The_Russian_Self_Defense_Force_desc: "La guerra con la OTAN y el desorden posterior han desestabilizado nuestro país más allá de toda medida. Aunque no nos gusta el culto a la muerte que ha estado gestándose en la sociedad rusa durante siglos, es una realidad desafortunada que necesitamos fuerzas armadas para sobrevivir.\nTomando como ejemplo a los japoneses, estableceremos las Fuerzas de Autodefensa Rusas. Esto también nos ayudará a emplear a los veteranos del régimen anterior, lo que mejorará la situación con el crimen organizado.\nAunque aún tenemos que pagar por nuestros crímenes, quizás podamos reintegrarnos en el mundo y luchar contra regímenes genocidas y tiránicos como hacen ahora Alemania y Japón."
 SOV_Call_Back_For_The_Emigres: "Llamada de vuelta para los emigrantes"
 SOV_Call_Back_For_The_Emigres_desc: "A lo largo de los años, un gran número de rusos huyeron al extranjero. Ya fuera durante la anarquía de los años 90, el oportunismo de los 2000 o la persecución de los años 2010-2020, hay muchas personas a las que podríamos llamar para que regresen. No solo eso, esto puede traer los fondos necesarios para nosotros.\n\n¡Rusia da la bienvenida a todos!"
 SOV_First_Russian_Democratic_Elections: "Primeras elecciones democráticas rusas"
 SOV_First_Russian_Democratic_Elections_desc: "¡Ha llegado por fin el momento! ¡Rusia celebrará sus primeras elecciones democráticas! Aunque Navalni es un candidato evidente que probablemente ganará las elecciones anticipadas, las otras figuras tienen opiniones muy diferentes y podrían aportar dinámicas interesantes a nuestro Estado.\nDado que nuestra democratización ha sido tan rápida, ni siquiera tenemos partidos bien establecidos que representen a todos, por lo que la administración se verá obligada a empezar literalmente desde cero.\nSin embargo, ¡este es un pequeño precio a pagar por la Rusia del Futuro!"
 SOV_grand_constitutional_reformation: "Gran reforma constitucional"
 SOV_grand_constitutional_reformation_desc: "Durante mucho tiempo nuestro sistema se basó en una constitución fallida que otorgaba poder al régimen. Ahora, estamos listos para crear una verdadera constitución democrática. Una que consagrará las libertades y los derechos que han allanado el camino para el mundo civilizado. Y tal vez, si nuestra gente la abraza de todo corazón, ¡finalmente podremos estar junto a las democracias europeas que nos han liberado!"

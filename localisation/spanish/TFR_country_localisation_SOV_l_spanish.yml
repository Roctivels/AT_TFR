 SOV_putinism_human_face: "Putinismo con rostro humano"
 SOV_putinism_human_face_desc: "\n\n\n\n£GFX_putinism_human_face_banner\n\n§Y\"¡Debemos hacer que Rusia sea joven y con visión de futuro!\".\n- V. Putin§!\n\nDesde el comienzo del milenio, Vladímir Vladímirovich Putin buscó crear un nuevo sistema de poder, es evidente que su elección recayó en la creación de una nueva democracia adecuada exclusivamente para Rusia.\nA pesar de que Putin se ha ido, su legado vivirá en el término \"putinismo\", que antes se usaba poco en el gobierno, pero que ahora empieza a cristalizarse en, si no un ideologema, al menos una \"carta de normas para el liderazgo de Rusia\". Sus principios principales fueron: conservadurismo ruso, patriotismo y el deseo de crear una democracia original.\nMedvédev profundiza las reformas, reformulando la estructura del Estado para crear una Rusia soberana y democrática de una nueva era. Vladímir Putin se convirtió en el padre de la democracia rusa."

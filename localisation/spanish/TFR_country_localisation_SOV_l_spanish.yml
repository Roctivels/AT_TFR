 SOV_democratic_politics_category: "Democratic Politics"
 SOV_democratic_politics_category_desc: "\n\n\n\n\n£GFX_SOV_democracy_post_alikhanov\n\n\n\n\n\n\n\nOur people have awakened from the slumber and thrown off the tyrannical rule of the §YDerzhavniks§!. Now, we must rebuild our democratic institutions and government with the help of various §CDemocratic§! parties throughout §WRu§Css§Ria§!"
 SOV_socialist_politics_category: "Socialist Politics"
 SOV_socialist_politics_category_desc: "With Alikhanov's regime toppled, a new socialist government will chart its own course for Russia. Our future will hinge on whether our new republic embraces democracy or veers towards authoritarianism."
 SOV_derzhavnik_economy_category: "Derzhavnik Economy"
 SOV_derzhavnik_economy_category_desc: "The strong nation cannot survive on politics alone. It needs a strong economic foundation to support itself. This is why Derzhavniks have come together to propose a massive restructuring of Russia's economic structures. This will empower national forces within the economy and eliminate stale corruption and harmful influences."
 SOV_union_restoration_cat: "Union Restoration"
 SOV_derzhavnik_politics_category: "Derzhavnik Politics"
 SOV_derzhavnik_politics_category_desc: "Russia is embarking on a new era. §YNational pride§! is surging, and geopolitical aspirations are taking on greater importance.\nUnder §YAlikhanov's§! leadership, the §YDerzhavnik§! party is diligently mobilizing all available resources to pursue its audacious aim of reclaiming and bolstering state independence. \n\n\n\n£GFX_SOV_alikhanov_small_banner \n\n\n\nOur great §Ymotherland's rebirth§! is a difficult process, and a lot of §tblood§! will be shed...\n\n[SOV_anti_alikhanov_opposition_loc]"
 SOV_anti_alikhanov_opposition_enabled_loc: "\n £GFX_left_opposition_power §RLeft-Wing§! §YOpposition§! Strength: [?SOV_left_opposition_power|Y0]\n    -----------\n    $MODIFIER_POLITICAL_POWER_COST$: [?SOV_left_power_pp|=-1%]\n    $MODIFIER_STABILITY_FACTOR$: [?SOV_left_power_stability|=+1%]\n    $MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: [?SOV_left_power_factory_output|=+1%]\n\n £GFX_dem_opposition_power §3Democratic§! §YOpposition§! Strength: [?SOV_democratic_opposition_power|Y0]\n    -----------\n    $MODIFIER_POLITICAL_POWER_COST$: [?SOV_dem_opposition_power_pp|=-1%]\n    $MODIFIER_STABILITY_FACTOR$: [?SOV_dem_opposition_power_stability|=+1%]\n    $MODIFIER_ARMY_MORALE_FACTOR$: [?SOV_dem_opposition_power_organisation|=+1%]\n"

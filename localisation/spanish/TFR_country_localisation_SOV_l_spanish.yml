 SOV_berkut_deployment_desc: "¡Llegó el momento! ¡Desaten al Bérkut!"
 SOV_tighten_grip_protesters: "Afianzar control sobre protestas"
 SOV_tighten_grip_protesters_desc: "A partir de nuestra experiencia con las protestas de 2018 y 2020, ¡podemos lograr resultados iguales o incluso mejores!"
 SOV_berkut_rebirth: "Renacer del Bérkut"
 SOV_berkut_rebirth_desc: "Berkut fue disuelto por el régimen de Kiev en 2014 porque luchaba por el pueblo y por sus derechos, arrebatados por los banderistas en Ucrania. Ahora el Gobierno popular ha regresado y podemos restablecer Bérkut."

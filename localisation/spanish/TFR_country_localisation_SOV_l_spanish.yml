 russia.874.t: "Daños de guerra evaluados"
 russia.874.d: "La guerra no solo viene acompañada de victorias, sino también de la conciencia de la magnitud significativa de los daños causados por los oponentes.\n\nEsta campaña militar es la más grande en Europa desde la Gran Guerra Patria. Los Ministerios pertinentes ya han evaluado los daños causados en varias regiones. Los mayores daños se infligieron en los nuevos territorios, incluidas las regiones de Narva y Dviná, así como en las regiones de la República de Belarús. Se registraron daños significativos en Kaliningrado y la República Moldava Pridnestroviana, y la península de Crimea también se vio gravemente afectada. Sin embargo, Novorrusia sufrió los daños más graves. Los daños se estiman en miles de millones de rublos, y el proceso de restauración de estas regiones requerirá esfuerzos y recursos significativos.\n\nLos expertos expresan confianza en la capacidad de la Federación de Rusia para hacer frente a esta tarea. La disponibilidad de recursos humanos y oportunidades económicas permite que estos territorios vuelvan a funcionar con normalidad. En el futuro, Novorrusia debería convertirse en una de las regiones de la Federación de Rusia con mayor desarrollo dinámico."
 russia.874.a: "Triunfamos en la guerra. ¡También triunfaremos en la paz!"

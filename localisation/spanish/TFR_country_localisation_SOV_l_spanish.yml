 russiaflavor.47.t: "On the Other Side, on the Other Shore..."
 russiaflavor.47.d: "The day for the Vympel fighters began with a landing near a small village deep in the Colombian jungle. After wading across a small river, the squad engaged in a brief skirmish with the defenders: the putschists didn't expect anyone to venture into such a remote wilderness. The morning gunfire died down, and Nekrasov's headset crackled with the commander's voice:\n\n- The target is in this village, turn the place upside down!\nAleksey burst into the first house and found the man the fighters had risked their lives for: Gustavo Petro, the president of Colombia overthrown by the military, was being held at gunpoint as a human shield by one of the guards.\n- LET ME GO OR I'LL SHOOT HIM! - the meaning was clear despite the language barrier.\n- DROP THE WEAPON! - Nekrasov bellowed in broken Spanish, loud enough to be heard across the village.\nShouting and a brief hesitation.\nA gunshot.\nThe guard falls with a hole in his forehead.\nCommander Velichko runs in at the sound and sees Aleksey helping the hostage to his feet.\n- Macondo, this is Arcadio, Marquez is taken, I repeat, Marquez is taken! - the commander reported to the Center with satisfaction.\n- We hear you, Arcadio. Melquíades eliminated, Aureliano has taken the House, proceed to Bogotá. No threat of counter-coup.\nVelichko exhaled with relief, Nekrasov along with him.\n- No time to relax, guys. Reinforcements possible. Extract the target. - and the commander added in Spanish for Petro:"
 russiaflavor.47.a: "From Russia with love, Mr. President."
 russiaflavor.48.t: "Cain's Tears"
 russiaflavor.48.d: "Lost media is an extremely fascinating topic for thousands of users not only of the World Wide Web but of the Runet in particular. Searching for films, cartoons, songs, games, and other content lost to the whirlwind of time is quite a niche hobby. But today it attracted the attention of not only many Russian people but also state authorities. Thanks to government cooperation, the cartoon 'Cain's Tears' from the famous Soviet studio 'Kievnauchfilm' was published today.\n\nThe search for the cartoon had gone on for many years, and finally, it became public property. It condemns Ukrainian nationalism: the main character-'patriot'-repeatedly sells his native land to occupiers: to the Kaiser in 1918 and to Hitler in 1941. Both then and now, these same nationalists act on Western money and orders, hiding behind 'independence'.\n\nIt's hard to imagine a better moment: we are on the verge of full-scale military action, and such a reminder from the past will definitely help in working with the population liberated from the Kyiv junta regime!\n\n'Over the sea of Cain's tears, Ukraine laughs.'"
 russiaflavor.48.a: "History has come full circle."
 russiaflavor.49.t: "City on the Hills"
 russiaflavor.49.d: "When civil war broke out in America, Vladivostok-'Russian San Francisco'-long in economic decline, unexpectedly received a powerful boost for change. Thousands of American IT specialists, engineers, programmers, and businessmen fleeing the war saw in this city something greater than a mere port-they saw a place capable of replacing their former California offices. Modern tech parks sprang up on the sites of abandoned factories, where Russian programmers work alongside refugees from Silicon Valley, and near DVFU, with Russian government support, a separate campus of the former Stanford University emerged, testing quantum computers and developing next-generation AI.\n\nHelp from the 'Celestial Empire' came at just the right time. Chinese investments turned the port into a high-tech hub with automated terminals, and along the city bay stretched the 'Red Alley'-a row of headquarters housing offices of Alibaba, Huawei, and other Chinese corporate giants.\n\nNow, with the signing of new Russian-Chinese agreements, it can be expected that soon the city will enter the list of the world's most technologically advanced megacities."
 russiaflavor.49.a: "'Vladivostok-2000'"
 russiaflavor.50.t: "Civil Protest"
 russiaflavor.50.d: "Anton pressed himself against the alley wall, holding his breath. His heart pounded wildly as he slowly melted into the darkness. A few seconds later, several men in yellow uniforms passed down the street, led by a man in a white Circassian coat. Each had a yellow-and-blue armband with a Z on a white background, and pistol holsters were visible on their belts. Only after the patrol passed could he breathe calmly and continue his way through the cold, rainy streets of Moscow, hugging the walls as closely as possible, hiding in alleys and doorways from the Yellow Guard.\n\nA few minutes later, he finally found another poster. On the wall, Alikhanov stared down with a stern gaze. 'The turmoil will pass, and native Rus' will shine brighter than the sun,' read the caption beneath the Russian president. Grimacing, Anton pulled a can of spray paint from his backpack and began defacing the poster's face. One line, another-his work was done, and now the poster bore a desperate call to resist the regime.\n\nAnton knew he wasn't alone in this fight. Across the country, there were hundreds, thousands of people like him, ready to defend their freedom-on stuffy kitchen tables, in factory smoking rooms, in apartment hallways.\nBut on the other hand, the people had elected Alikhanov. What was the point of this struggle if the people themselves had chosen this path-didn't that make him, not Alikhanov or anyone else, the enemy of his own people?...\n\nFootsteps approached again. Anton tossed the can into a trash bin and vanished into the labyrinth of alleys."
 russiaflavor.50.a: "His call went unnoticed."
 russiaflavor.51.t: "Return of the 'Saints'"
 russiaflavor.51.d: "In recent decades, clashes between Russians and migrants from the Caucasus have become more frequent. Fear, corruption, and simple laziness among law enforcement often resulted in ordinary defenseless people acting in self-defense ending up on the defendant's bench, while the real criminals continued to walk our streets.\n\nOne such incident occurred in November 2013. Dmitry Parshin and his son, while in the Moscow metro, became victims of an attack by a native of Dagestan, Latipov. When Latipov attempted to assault them, Dmitry, in self-defense, pulled out an air pistol and fired several shots at the attacker, after which he and his son left the train car.\n\nSoon, a video of the incident appeared online, which, spreading across the internet, sparked a wave of support for the defenders. People especially remembered the frame of Parshin's son holding the bandit at gunpoint before exiting the car. The people, tired of migrant lawlessness, saw them as folk avengers-the 'Saints from the Metro'.\nFather stood for son, and son for father. A biblical story.\n\nBut ethnic criminal groups got to them, and soon Parshin Sr. was detained. From 2014, he was shuffled between psychiatric treatment and prison. Fortunately for him and millions of like-minded Russian patriots, the era of national humiliation ended-today Parshin was pardoned by President Alikhanov's decree, and within hours, he was accepted into the Yellow Guard with full honors.\n\nRussians have no one left to fear. Now others must fear us."
 russiaflavor.51.a: "Zero Tolerance."
 russiaflavor.52.t: "Drawing"
 russiaflavor.52.d: "'Mom, look what I drew!'\n\nVasilisa, a small, slender, fair-haired girl finishing her last year of kindergarten, stumbling over her words, tried to reach her mother as quickly as possible. Her mom had finally come to pick her up from the building she called by the complicated word 'culture center'.\n\n'Hi, little one. Wow, you drew this yourself?' - her mom said with sarcasm not obvious to a child's naive heart, stroking her daughter's head.\n\n'Yes!' - Vasilisa answered with genuine childish pride.\n\nOn the drawing she held out to her mother was a crude rural landscape with several figures. In the background was a small hut, a white-stone church, and a tree resembling a birch, while in the foreground were the girl herself, her father Andrei, and a woman labeled 'mom' with a heart. The girl held a ginger cat in her arms, and her parents held hands, each embracing their daughter with the other arm.\n\n'I've never seen this church. Where did you see it?'\n\n'Aunt Sasha, who looks after us, took me and the other kids from the group to see it and told us so many interesting things about the place that I decided to draw it, here...'\n\nAfter chatting for a few more minutes, mom helped her daughter get dressed, and they headed home. Along the way, Vasilisa continued telling about how much she learned from the trip and what videos she watched on RuTube today.\n\nOn the left side of the drawing, no longer holding hands with the family, stood a dark smiling figure in something resembling a suit jacket. The caption beneath the figure, written with several mistakes, read: 'Filimonov, the great president of our Rus'.'"
 russiaflavor.52.a: "The Salt of the Russian Earth."
 russiaflavor.53.t: "Thanks, Wolfych!"
 russiaflavor.53.d: "The LDPR has always been proud of being Russia's first digital party, because whoever controls the internet controls the minds of the youth. A few weeks ago, Vlasov, known for his contacts with various figures in the Russian internet, announced the creation of the media project 'Zhirinovsky's Falcons', which he said 'is a worthy Russian response to the West in the field of internet entertainment'.\n\nThe project positions itself as a union of video bloggers 'free from left-liberal lies, ready to extend a hand to patriotic youth', offering viewers both uncensored historical-political content and entertainment. The project's leader was appointed Ilya 'Maddyson' Davydov, a Russian streamer, deputy, and LDPR member since 2020. Within weeks, to the surprise of skeptics, the project's videos began gaining noticeable popularity on RuTube. A humorous video went viral in which Vitaly Nalivkin, now 'deputy of the RPLD', storms a local cell of communist terrorists in Ussuriysk, and Yuri Khovansky announced plans to shoot a full sequel to the legendary comedy film 'Ship of Doubles' and release it for free. The highlight was a recent stream co-hosted by Vladislav Zhmilevsky and Ezh Sarmath, with the main guest being Vladimir Zhirinovsky himself, who gave an interview and spoke about his daily work.\n\nThe project also tried to enter the international market, posting its first video on YouTube in which Ozon671games, during another improvisation, calls Joe Biden an 'old asshole' and 'beats' him, but the channel was blocked just hours after publication, once again showing the duplicity of Western platforms."
 russiaflavor.53.a: "Content worthy of men of honest fate."
 russiaflavor.54.t: "Parting Words"
 russiaflavor.54.d: "Early morning, Moscow. A short man in a black coat with a bouquet of flowers in his hands slowly walks through Novodevichy Cemetery in complete solitude, occasionally looking around to make sure no one else is there. After several turns, he finally reaches his destination. Approaching closer, he bows his head before the monument.\n\n'Hello, Vladimir Volfovich...'\n\nBefore him stands a 3-meter bronze monument. The inscription on the granite slab reads: 'To Supreme Ruler Vladimir Volfovich Zhirinovsky from the Russian people'.\n\nPlacing the bouquet at the foot of the monument, the man crosses himself three times, then looks at the monument again and speaks to it:\n\n'Well, how is it up there, Vladimir Volfovich?... I hope it's warmer than down here... Well, it's okay, we'll endure it...'\n\nIn response, silence. Only a lone raven perched on a tree branch a short distance from the grave tried to say something. The wind picked up slightly, pushing clouds across the sky that occasionally obscured the sun. The man sighed heavily and spoke again.\n\n'Vladimir Volfovich, do you remember when we baked pancakes before the elections? Everyone laughed, but we won... Or when the whole party went to the bathhouse. You said so much there that I had to apologize to the German ambassador afterward,' a small tear rolled down the man's face, 'Yes, those were the days... We remember you, Vladimir Volfovich... It's hard for me sometimes, but I try to follow your advice...'\n\nSuddenly, the man felt a heavy, fatherly hand on his shoulder, as if someone was trying to comfort him. Standing in silence for several minutes, Vasily Vlasov bowed to the monument once more, then turned and walked to the car waiting for him.\n\nWhen the wind picked up again, Vlasov thought he heard a familiar voice..."
 russiaflavor.54.a: "'Good luck, Vasily...'"
 russiaflavor.55.t: "Powerful"
 russiaflavor.55.d: "Anton Alikhanov's victory obviously left a mark on Russian internet space. After the election results were announced, initial outrage online gradually gave way to positive public perception of the president.\n\nHere are a few absolutely real and not bot-written comments and posts from VKontakte and the state messenger MAX:\n\n'Alikhanov is POWER! Russia may never have seen a more powerful leader. Putin was great, of course, but even he pales in comparison to Alikhanov. We believe in the President!'\n\n'Our president makes POWERFUL decisions! He sees what our people really need. Deported migrants, united Russians. POWERFUL! I never went to elections before, but now I don't regret voting for Anton. A POWERFUL candidate!'\n\n'HAVE YOU SEEN WHAT'S HAPPENING IN EUROPE? While cannibals are destroying people there, we are under the protection of a POWERFUL superhero president!!! My basket-son has already joined the Yellows, and I advise everyone to do the same, a POWERFUL ORGANIZATION!! Gayrope can't stop the powerful train called Russia!'\n\n'Well, damn, liberals, had enough? Alikhanov POWERFULLY smacked you upside the head. Now you're running around like rats HAHAHA why are you still painting walls with your cans? Yeah. The half-dead Navalnists and their flaccid accomplices are limp as grandpa's dick, while the Yellows POWERFULLY give it to them. Thanks, Alikhanov, you're the man! POWERFUL!'\n\nSome users claim such messages are allegedly written by 'bots' because the same narrative about 'powerfulness' is used, but it's obvious to all of us that this is nothing more than a liberal propaganda fabrication."
 russiaflavor.55.a: "Powerful."
 russiaflavor.56.t: "Fall of Moscow"
 russiaflavor.56.d: "After days of fighting, combined European armies reestablished control over Moscow for the first time since 1812. The fiercest battles unfolded in the city center, where the historic appearance of the capital was irreversibly altered. Artillery barrages completely destroyed the Bolshoi Theater building, and the famous dome of St. Basil's Cathedral collapsed after a direct aerial bomb hit.\n\nAccording to observers, Red Square and adjacent quarters have been turned into ruins. Residential areas also suffered: entire streets in the west of the city lie in ruins after assault operations. A curfew has been imposed, with reports of power outages, communication problems, and shortages of food and medicine.\n\nThe fate of the Russian leadership is unknown-according to intelligence, the government left the city before its fall."
 russiaflavor.56.a: "Tears won't save Moscow."
 russiaflavor.57.t: "Union of Alternative Sexualities Holds Rally in Support of Navalny"
 russiaflavor.57.d: "Today in Moscow, the Russian Union of Alternative Sexualities held a large-scale rally in support of President Alexei Navalny and Russia's actions in the Second European War. Participants gathered at Theater Square declared loyalty to the head of state's course while sharply condemning the 'aggressive propaganda of LGBT+ values' from European countries.\n\n'We are patriots and support President Navalny in the fight for Russia's sovereignty,' declared RSAS leader Mikhail Lakov. 'But Europe, which started this war, is trying to impose its radical views on us, seeking to destroy our country. We won't allow it!'\n\nThe action was held under the slogans 'The Army and the President are our shield!' and 'Death to Europe, Glory to Russia!'. Despite the radical rhetoric, the rally passed peacefully. The action sparked debates on social media: some praise RSAS for 'patriotism', others accuse it of 'double standards'.\n\nIn Europe, the reaction was sharply negative-the German Foreign Ministry called the rally an 'attempt to legitimize homophobia under the banner of sovereignty'. The Kremlin has not yet commented, but experts believe this RSAS stance may be part of a new state strategy to consolidate society."
 russiaflavor.57.a: "Well, at least they're for Russia?.."
 russiaflavor.58.t: "Black List"
 russiaflavor.58.d: "The new Derzhavnik authority in Russia terrified the political opposition, driving them literally into basements-from liberals to leftists, everyone had to hide.\nOf the 'leaders' of People's Russia, only 5 people remained at the table, though recently there were 7. Sergei Mironov and Zakhar Prilepin succumbed to the new authorities' slogans and switched sides, putting the left opposition in a precarious position.\nAll familiar faces: Delyagin, Grudinin, Konovalov, Platoshkin, and at their head sat Sergei Udaltsov, a seasoned leftist oppositionist since Putin's Russia.\nUdaltsov began: 'Comrades, truly dark times have come for us. Mironov and Prilepin have left us, joining the left patriots with Alikhanov and his Derzhavniks. Our left opposition should split up so we can lead our cells decentrally. I see no other options at the moment.'\nThe other four agreed with the decision; there were no other options... for them..."
 russiaflavor.58.a: "Death is ready to run."
 russiaflavor.59.t: "No Options"
 russiaflavor.59.d: "Anton Alikhanov sat in his Kremlin office, with 2 bodyguards in Yellow Guard uniforms standing outside. A man approached the office-this was State Duma deputy Mikhail Delyagin from the People's faction. The bodyguards searched Delyagin, found nothing, and let him into the office, accompanied.\n'Oh, Mikhail Delyagin, have a seat!' - Alikhanov said to the entering Delyagin, pointing to a chair opposite his desk.\nDelyagin sat down, with Alikhanov's bodyguard standing behind him.\n'Why am I here?' - Delyagin said to the president.\n'Mr. Delyagin, I know about your role in People's Russia. I also received word that you met with the rest of the left opposition.' - Alikhanov replied to the deputy.\n'That's leg-' - Delyagin tried to parry.\n'Mr. Delyagin, no point in denying it here.' - Alikhanov answered.\nAfter a brief pause of silence, Alikhanov continued - 'I see you as a truly worthy person. I want to offer you to change your position toward me and my supporters. I want us to work together, for Russia's benefit. Leave your... revolutionary opposition comrades with Udaltsov; you're not like them.'\nAfter a short pause, Delyagin realized he had no cards and replied to Alikhanov - 'Yes, Mr. President... you're right here... I'm not like them... Russia truly faces a new threat from Western Europe... I agree to work with you and your supporters for Russia's benefit.'\nAlikhanov clapped at the decision, and with a handshake from both sides, Delyagin was escorted out of the office and drove back to the State Duma to his own office."
 russiaflavor.59.a: "Death forgave him."
 russiaflavor.60.t: "Lethal Asset"
 russiaflavor.60.d: "Pavel Grudinin left the Lenin Sovkhoz building late at night and stopped in front of the statue of Vladimir Ilyich himself.\n'I hope we continue your cause, soon...' - Grudinin quietly said to himself.\nAfter standing a bit, Grudinin moved, walking down the street to his car. Near the car, a silhouette was visible-it was a traffic police officer, judging by the uniform. Grudinin slowly approached the car.\n'Greetings! Senior Sergeant of the Traffic Police Chernyshev Gedimin Evgenievich, present your documents.' - the officer said with an open ID in his left hand and a baton in his right.\nGrudinin rummaged through his pockets and pulled out his passport and car keys.\n'What did I do wrong, chief?' - Grudinin quipped.\n'Someone was running around your car here, even opened it.' - Gedimin replied.\nGrudinin immediately grew wary, opened the car again, and climbed into the driver's seat.\nWhile Grudinin inspected the car inside, without much thought, Gedimin pulled a Makarov pistol from his vest pocket, already off safety.\n'The President sends his regards.' - Gedimin said.\nGedimin racked the slide, and Grudinin turned. A shot rang out.\nBy morning, near the Lenin Sovkhoz, barriers were set up, an ambulance and an Investigative Committee truck... Pavel Grudinin was found shot in his own car."
 russiaflavor.60.a: "Death struck with the scythe."
 russiaflavor.61.t: "Last Meeting"
 russiaflavor.61.d: "Former head of the Republic of Khakassia, Valentin Konovalov, walked through evening Simferopol. After a meeting in Moscow, Konovalov tried to settle his life and coordinate the opposition on the Crimean peninsula.\nKonovalov stopped and pulled out a cigarette and lighter. While trying to light it, a Yellow Guard squad nearby mistook him for another drunk.\n'Hey, man! No smoking here!' - said the first Yellow Guard running up.\nKonovalov looked up at the Yellow Guard, with 7 more standing behind him, also Yellow Guards.\nThe third Yellow Guard pulled out a SZND orientation on Konovalov from his pocket and showed it to his colleagues.\nKonovalov didn't understand anything, but they recognized him-over such a stupid trifle, stopping to smoke.\nThe Yellow Guards surrounded Konovalov, put on their bandanas, and began beating him.\n'Death to traitors!' ; 'Death to communists!' ; 'Victory to true Russia!' - the Yellow Guard squad chanted.\nAfter 15 minutes of continuous beating, Konovalov lay on the ground, disfigured beyond recognition. The next morning, Konovalov's dead body was found in the bushes."
 russiaflavor.61.a: "Death took him too."
 russiaflavor.62.t: "Textbook Murder"
 russiaflavor.62.d: "Nikolai Platoshkin walked late in the evening in a hat from MGIMO along Vernadsky Avenue with a coffee cup in his right hand and a briefcase in his left. Despite his political activity as a People's member, he continued teaching at MGIMO.\nThe street was unusually quiet; a oppressive atmosphere of fear hung in the air. Yellow Guard squads also marched along the street, maintaining order and assisting law enforcement.\nPlatoshkin turned into the main alley of the Park of the 50th Anniversary of October and sat behind the nearest bench. He didn't want to flaunt himself on the bench, understanding the danger from Derzhavnik supporters.\nPlatoshkin silently sipped his coffee but, hearing something in the bushes, grew wary. He left his briefcase and finished his coffee, then placed the empty cup next to the briefcase.\nPlatoshkin cautiously approached the bushes and looked in-there was a homeless German shepherd, to Platoshkin's own surprise.\nHe exhaled and went into the bushes, but behind him, a person fully wrapped in black with a fire axe in hand had already quietly approached.\nPlatoshkin still stood in shock, not understanding where a homeless shepherd could come from here-a slight sound behind and a swing of the axe, Platoshkin's head was split in blood.\nIn the morning, in the bushes, Platoshkin's body was found with a split skull in two and the axe still stuck in it; no fingerprints were found."
 russiaflavor.62.a: "One left."
 russiaflavor.63.t: "Last Chance"
 russiaflavor.63.d: "Sergei Udaltsov woke up with a bag over his head and tied to a chair in some damp room. Four people stood in the room, all in yellow uniforms, standard Yellow Guard.\n'Where the fuck am I...?' - Udaltsov said.\nA man in a tuxedo entered the room. The bag was removed from Udaltsov. Before him sat a man in a black mask of happiness.\n'Greetings, would-be revolutionary. Fate gives you a chance.' - the interlocutor said, pulling an RSA revolver from his pocket.\n'Let's play Russian roulette, but we don't spin the cylinder. Where it stopped, that's where we start-honest fate's decision.' - the interlocutor said, checking the cylinder for one bullet and spinning it after checking.\nUdaltsov just glared at the interlocutor while the two guards behind him untied the rope. The interlocutor spun the revolver on the table; the barrel pointed at the interlocutor.\nThe interlocutor pulled the trigger at his temple-empty, Udaltsov's turn, trigger pull equally empty. The interlocutor pulls the trigger at his temple again-empty, Udaltsov's turn, also empty.\n'Mr. Udaltsov, 50/50 chance left. Fate will make the final verdict for Russia-its Derzhavnaya rebirth or chaotic again under your so-called left democracy.' - the interlocutor said.\n'We'll see.' - Udaltsov quipped.\nThe interlocutor put the revolver barrel to his temple... and pulled the trigger... no shot...\nThe interlocutor's guards behind Udaltsov pulled out their Makarov pistols and aimed at Udaltsov's head in case he tried to 'heroize'.\nUdaltsov took the revolver and put the barrel upward into his mouth... trigger pull... shot. Blood gushed from Udaltsov's head, splattering his brains to the ceiling in a bloody mush. Udaltsov's body crashed to the floor from the chair.\nSergei Udaltsov was found dead; the 'suicide' version was declared official."
 russiaflavor.63.a: "Death took the last by fate's will."
 russiaflavor.64.t: "Museification of the Past"
 russiaflavor.64.d: "President of the Russian Federation Anton Andreevich Alikhanov announced the 'Historical Objectivity' program. The program plans included dismantling unnecessary busts of V.I. Stalin in Moscow and reburying the body of V.I. Lenin. The mausoleum itself is planned to be converted into the 'Museum of Derzhavnaya History: The Soviet Century', designed to guide visitors through key events of Russia under Soviet rule from 1917 to 1991.\nImmediately after the statement, an unusually large number of Rosgvardia personnel gathered near Lenin's mausoleum, assigned to guard the workers tasked with transporting Lenin's body and rebuilding the mausoleum. Rosgvardia clusters were also spotted with workers at Stalin busts throughout Moscow, except the bust in the WWII museum, the necropolis bust by the Kremlin wall, and the Big Three leaders monument at the All-Russian Exhibition Center.\nWithin hours, V.I. Lenin's body was delivered to his native Ulyanovsk and reburied at the Old City Cemetery, and I.V. Stalin's busts were dismantled in Moscow. Construction of the Museum of Derzhavnaya History began on the site of the former Lenin mausoleum..."
 russiaflavor.64.a: "Forward, Russia!"
 russiaflavor.65.t: "National Platform"
 russiaflavor.65.d: "SZND, led by Anton Alikhanov, announced a informal coalition agreement with Alexei Zhuravlev's 'Rodina' party. In a joint statement, Alikhanov and Zhuravlev emphasized that: 'This step is aimed at uniting nationalists under common banners for the good of the nation, the fatherland, and the stability of the new Russian government.'\nOrganizations such as 'Russian Community', 'Northern Man', and the public movement 'Forty Forties' also announced their support for the nationalist government. Separately, 'Russian Community' leader Andrei Tkachuk emphasized 'The necessity of unity in such a difficult time for the motherland, when a new radical anti-Russian force in the form of the federalization of the European Union is forming in the west of the European continent, which also threatens our eastern allies.'\nThe National-Democratic Party of the late Konstantin Krylov announced its merger with 'SZND'. The party emphasized that: 'All nationalist forces must now rally around the new government for the common good of the motherland, as SZND is fulfilling its promises of Russian Order, and they need help with this.'"
 russiaflavor.65.a: "Russian Power for Russia!"
 russiaflavor.66.t: "Generators of Stability"
 russiaflavor.66.d: "Anton Alikhanov sat in his Kremlin office, sorting through papers and scrolling documents on his computer. Yes, with the Derzhavnik reforms, problems didn't decrease, but Alikhanov worked diligently to realize the idea of Derzhavism and a stable social contract, synthesizing something for Russia's new era.\nAlikhanov paused, pushed the papers aside on the desk, and decided to take a 5-minute break, informing his security by phone. Two minutes later, a cup of hot green tea was brought to his office; the guard left. Alikhanov began sipping the green tea, sinking into his thoughts.\n'Still working up a sweat for the new era?' - a voice familiar to Alikhanov rang out.\nAlikhanov looked up and saw Konstantin Anatolyevich Krylov before him-his political idol, founder of the National-Democratic Party during his governorship in Kaliningrad. Anton understood Krylov was just his hallucination, but with nothing better to do, it was worth breaking the routine and talking even to his hallucination...\n'Yeah... Unexpected to see you, though it was only a matter of time. Of course I'm working, Konstantin Anatolyevich...' - Alikhanov replied.\n'I can see that.' - Krylov smiled. 'Answer me this... Are you confident in your strength to maintain Russian statehood?' - Krylov said.\n'More than confident; otherwise, I wouldn't have gone into politics again after being expelled from United Russia when I decided to criticize Medvedev's liberal reforms.' - Alikhanov answered.\n'That's how it is... Looks like Dmitry hasn't changed his mind, what a sly one... Well, nothing, keep working, Alikhanov. And remember the main thing-I believe in you!' - Krylov said, symbolically raising his right fist.\nAlikhanov lowered his gaze to the desk, to the already empty cup of green tea. He continued working as if nothing had happened."
 russiaflavor.66.a: "All for Russia's benefit..."
 russiaflavor.67.t: "Unbreakable Rus'"
 russiaflavor.67.d: "Yaroslav was a fairly young activist of 'SZND' from Simferopol, only 22 years old; fate itself led him to the Yellow Guard. Yaroslav had another trait-he was a deeply religious person. He attended Alexander Nevsky Cathedral every day for sermons.\nSome time had passed since Alikhanov came to power; the Church was pleased that its position with the new authorities had largely improved. It was an ordinary morning; Yaroslav, as usual, came to the morning sermon of the Holy Father-an ordinary sermon with parishioners' prayers for the health of Russian Federation President Anton Andreevich Alikhanov. Yaroslav also prayed for Alikhanov's health and began listening to the Holy Father's sermon.\n'The Holy Spirit is the spirit of unity. In the 17th century, after the Time of Troubles, the people and the Church united around faith-and saved the country. Now, when the world tries to divide us with sanctions, lies, and temptations, we must remember: our strength lies in faithfulness to God, the Heavenly Tsar, and the earthly Fatherland.' - the Holy Father said and paused briefly.\n'No wonder the Russian coat of arms features a rider slaying the serpent. This is not only St. George the Victorious but also the image of Christ conquering evil. And thus-our people, called to be warriors of light.' - the Holy Father concluded part of the sermon. Thinking about Russia's fate, its restoration in the world, and finally its role, Yaroslav both thought and listened to the Father.\n'Brothers and sisters! Russia is not just a country. It is the House of the Most Holy Theotokos, which She Herself covers with Her omophorion. It is a fortress of spirit that no one can break. Let the Holy Spirit, who hovered over the waters at the beginning of creation, overshadow our land so that we may say: ''We are Russians. God is with us!''' - the Holy Father's words rang out again.\n'Amen!' - came from the Holy Father throughout the cathedral; Yaroslav and the other parishioners chorused in response to the Holy Father..."
 russiaflavor.67.a: "'Amen!'"
 russiaflavor.68.t: "Sovereign Vertical"
 russiaflavor.68.d: "Anton Alikhanov was holding another 'coordinated' speech to citizens in his political homeland of Kaliningrad. He spoke with local residents accompanied by the fanatically loyal Yellow Guard and journalists from the 'Kremlin Pool' with cameras. After some time, a citizen with a prosthetic leg and a patch on his right shoulder in the form of the Russian Imperial flag approached Alikhanov-this was a veteran of the Special Military Operation that grew into a war across Eastern Europe, the arena of battle with the Globalists.\n'Anton Andreevich, is that really you!?' - the veteran exclaimed joyfully, catching his breath.\n'Of course it's me. And I see you... a veteran of the past war?' - Alikhanov replied.\n'Yes! I'm a veteran; lost my leg near Lviv-damn Bandera set an ambush on us, and I... was the only one who survived and joined the other troops entering Lviv; I personally participated in destroying the monument to that Stepan Bandera!' - the veteran said, pulling out his passport with photos of him and Russian troops demolishing the monument to the Ukrainian Nazi Bandera.\nAlikhanov carefully reviewed the veteran's photos and immediately confirmed their authenticity. The president shook the veteran's hand, as did the other Yellow Guards from Alikhanov's security, and the latter left his autograph in the veteran's passport. After all this, the cameras turned off, and everyone dispersed; the veteran went on his way, and Alikhanov told the journalists, strictly for them - 'That's all, ladies and gentlemen... in a few hours I'm returning to the Kremlin, everyone is free... I categorically thank you for your work for the motherland.'\nAlikhanov clapped for the journalists, and the Yellow Guards repeated after him. After that, Alikhanov's personal car pulled up, and the Yellow Guards opened the door for him. In Alikhanov's pocket, an encrypted phone vibrated; he saw a familiar contact, picked up the call, and got into the car with a simple word..."
 russiaflavor.68.a: "'Hello?'"
 russiaflavor.69.t: "Operation 'Ideological Front'"
 russiaflavor.69.d: "Mikhail was a simple activist of the liberal wing of the All-Russian People's Front; he worked with Boris Nadezhdin's circle, but after the latter's removal from the post of RF president, he became an opposition activist within the ONF under Daria Besedina.\nEven after some time following Fedorov and NOD supporters seizing power, liberals resisted in their old style. The same useless peaceful protests, trying to attract international attention, but there was no 'internationality' in that attention anymore.\nBesedina announced a protest in front of the State Duma building in Moscow at 16:00. Mikhail gathered his guys on Bolshaya Nikitinskaya Street; together they moved toward the State Duma building. But they were met with an ambush counter-protest by the National Liberation Movement, which encircled Mikhail and his group. The last thing Mikhail remembered before losing consciousness was green paint in his eyes, a NOD flag waving in the wind alongside Russian tricolors, and a blow to the back of his head with a shovel handle."
 russiaflavor.69.a: "NOD played their card."
 russiaflavor.70.t: "Order of the Fatherland"
 russiaflavor.70.d: "Supporters of the National Liberation Movement from the All-Russian People's Front and other ONF deputies proposed granting the new President of the Russian Federation Evgeny Alekseevich Fedorov Extraordinary Powers, in view of 'Increased resistance from the Deep State of globalists trying to destroy Russia and its influence worldwide, as Russia has led the campaign against globalism and keeps its remnants in the form of the European Union in its sights.'\nRF President Evgeny Alekseevich Fedorov responded a couple of hours later, agreeing to receive these powers 'In the name of saving Russia, protecting its Russian world, and the true legacy of Vladimir Vladimirovich Putin!' In the State Duma, the proposal was adopted by a majority vote, though liberal elements of the ONF tried to vote against it; the decision was also unanimously adopted in the Federation Council, as 'agents of the liberal globalist deep state' had not yet reached there."
 russiaflavor.70.a: "Let's crush the globalist cockroaches!"
 russiaflavor.71.t: "Media Mobilization"
 russiaflavor.71.d: "Maxim was a simple office worker in Moscow, working hard, largely supporting the authorities, and the office where Maxim worked was no slouch either-during the Special Military Operation that grew into the European War, they supported the front-line soldiers with all kinds of 'humanitarian aid'.\nWaking up in the afternoon on his day off, Maxim immediately took his phone from the table, went to Telegram, and... Telegram channels had long become the new media, and this was the apotheosis-tons of news about decrees from the new RF President Evgeny Fedorov, the end of the deep state, European bandits facing trial, an anarchist attempt to set fire to a local administration somewhere in Podolsk... But Maxim highlighted for himself only Pozdnyakov's post, and the very first one, because he read Pozdnyakov's news especially often...\n'Well, finally, at least something!' - Maxim patriotically said aloud."
 russiaflavor.71.a: "Special kind of news now."
 russiaflavor.72.t: "Empire is Him"
 russiaflavor.72.d: "Timur was a simple police captain in Orekhovo-Zuyevo. Despite his rank, his work was quite routine-drunks, noisy youth, druggies under the influence, and various psychos were his prey. On night shift, a call came to the dispatcher about a noisy neighbor, and Timur was sent with his partner, Senior Lieutenant Artem.\nAfter arriving at the entrance, they began knocking and ringing the apartment complained about for noise. A few minutes later, a pensioner opened the door-around 70 years old, in a telnyashka and... pants in the colors of the St. George ribbon. The pensioner's hair looked unwashed for a whole week. The man smelled of both hangover and alcohol at once.\n'Greetings, Captain Timur Anatolyevich Rekunov. A complaint was filed against you by neighbors for making noise and preventing them from sleeping. May we enter to discuss further?' - Timur said, with Artem standing behind him. The pensioner hiccupped, then nodded and gestured to invite them into the apartment.\nWhen Timur and Artem crossed the apartment threshold, they stepped on a shoe mat in the form of... the European Union flag. Timur exchanged glances with Artem, then both stared at the pensioner. Together they went to the kitchen; on the table were 5 bottles of 'Putinka' vodka, all empty, and on the kitchen wall hung a National Liberation Movement flag. Timur, of course, was not surprised, nor was Artem.\nAfter a brief discussion and drawing up a protocol, Timur and Artem stood up from the table and said goodbye to the pensioner. Before leaving the apartment, Timur noticed the pensioner's bedroom. Mattress with Putin, pillows with Putin, walls covered in pictures with Putin and Russian tricolors, and a nightstand with a mirror near the bedroom entrance, with unlit candles on it and in front of them a framed photo of Putin with the letters Z and V...\n'What a real fanatic...' - Timur said to Artem as both left the pensioner's apartment.\n'I agree with you.' - Artem replied to Timur."
 russiaflavor.72.a: "Putin, Putin, Putin, Putin..."
 russiaflavor.73.t: "Fedorov's Constitutional Reform"
 russiaflavor.73.d: "President of the Russian Federation Evgeny Alekseevich Fedorov conducted a constitutional reform with the support of the RF State Duma, the Federation Council, and particularly the All-Russian People's Front. There were attempts to resist by the remaining liberal forces, but supporters of these forces were quickly 'calmed' in the ONF or even expelled from it.\nMainly, the constitutional reform affected formulations about Russia's sovereignty as a state, removal of the 'ban on state ideology'-i.e., Article 13.2-and exclusion of 'generally recognized principles and norms of international law' from the state's legal system, i.e., repeal of Article 15.4.\nThese steps demonstrate the determination of the new RF president and his government supporters to restore RF influence worldwide and establish the true Russian World."
 russiaflavor.73.a: "For ZoVerenity!"
 russiaflavor.74.t: "Nationwide Stand for the Russian World"
 russiaflavor.74.d: "Galya was a simple pensioner over 77 years old. Despite her age, she was an active participant in the National Liberation Movement. She sat in her kitchen in her apartment and decided to turn on the TV, switched to Channel One, and there were the news.\n'And now to news from Moscow...' - the familiar voice of Ekaterina Andreeva came from the TV. Galya listened with relish, sipping tea with cookies.\n'Demonstrations of the National Liberation Movement of the current President of the Russian Federation Evgeny Alekseevich Fedorov are taking place throughout Moscow. The main idea of these demonstrations is the call to protect the Russian World. Our correspondent Konstantin Panyushkin spoke with the demonstrators.' - Ekaterina Andreeva finished.\n'Mass demonstrations of the National Liberation Movement, the organization of the current President of the Russian Federation Evgeny Alekseevich Fedorov, are taking place in Moscow. The demonstrators are actively calling for the protection of the Russian World from the globalist threat from the European Union.' - Konstantin Panyushkin began.\n'Our goal is to convey to President Evgeny Alekseevich Fedorov our position as ordinary citizens among his supporters-that we want the Russian World protected from the globalist threat, we want the restoration of the 1945 borders, for the Russian World!' - one of the young demonstrators near the former FRG embassy, now the EU, said into Konstantin Panyushkin's microphone.\n'The EU Foreign Ministry commented on these demonstrations as completely anti-European, and if the Russian authorities do nothing to protect the EU embassy, the latter will impose sanctions, which, to their regret, will not work, like all other old Russophobic Western sanctions. Konstantin Panyushkin, Channel One.' - the correspondent finished.\nGalya turned off the TV, finished her tea with cookies. She quickly got dressed and went out to the street to join her NOD supporters."
 russiaflavor.74.a: "For the Russian World!"
 russiaflavor.75.t: "Opened Closet of Skeletons"
 russiaflavor.75.d: "The Armed Forces of the Russian Federation successfully entered London and occupied the headquarters of the Anglo-Saxon secret service MI6. Brave RF Armed Forces soldiers prevented the self-destruction of the building by remaining loyal agents of the 'deep state' and ransacked all documents of MI6's central office, finding very interesting documents confirming the 'conspiracy theories' of the National Liberation Movement and RF President Evgeny Alekseevich Fedorov.\nSome excerpts from the documents:\n1. The Russian Federation BEFORE the 2nd civil war in the USA was indeed a colony managed by Western Elites from the USA and 'former' colonial territories of Great Britain. These elites also include Klaus Schwab-president of the 'World Economic Forum', Michael Bloomberg-American businessman and founder of the so-called 'independent publication' Bloomberg, Jeffrey Epstein-American financier and organizer of mass pedophile parties on his island in New York.\n2. American elites did not disappear with the start of the 2nd Civil War in the United States of America. On the contrary, they withdrew their capital to Europe, closer to Brussels, using global chaos to their advantage, which resulted in the World Economic Crisis with the consequences of the US Civil War.\n3. After Vladimir Putin's death from Covid-19, the victorious Medvedev in the elections began to confront the West with all his might and the support of Russian society, which ultimately resulted in strengthening the All-Russian People's Front. Western elites were wildly frightened by this and began preparing for the coming war with Russia, which ultimately ended in victory for Russia, but MI6 agents in Medvedev's circle convinced him to install Nadezhdin as successor through the ONF.\nIn some time, these documents will be published to the world."
 russiaflavor.75.a: "Truth..?"
 russiaflavor.76.t: "Secrets Revealed"
 russiaflavor.76.d: "UK Prime Minister Nigel Farage informed the Russian Foreign Intelligence Service and RF President Evgeny Alekseevich Fedorov that the United Kingdom intends to hand over British MI6 intelligence documents to them for familiarization with the truth about what was happening in the shadows of the fugitive British elites who fled to Brussels after Nigel's victory in a small Civil War.\nSome excerpts from the documents:\n1. Russia, after leaving the USSR, became a full colony of the United States of America. Russia was FULLY CONTROLLED by Western Elites until Vladimir Putin's arrival. Some of Russia's 'managers': Klaus Schwab-president of the 'World Economic Forum', Michael Bloomberg-businessman and founder of an 'independent publication' in his own honor-Bloomberg, Jeffrey Epstein-American financier and WORLD-LEVEL pedophile who organized parties with underage participants as 'sex slaves', attended by most elites.\n2. The Civil War in the USA was a complete surprise for Western Elites; they did not think the people there would rise against the results of elite rule. Western Elites had to hastily withdraw their capital from the USA and transfer it directly to Brussels, the new capital of the 'deep state'.\n3. After Vladimir Putin's death from Covid-19, Dmitry Medvedev who replaced him greatly frightened Western Elites with his 'anti-elitist' and 'anti-globalist' rhetoric. Only thanks to the efforts of 'deep state' agents in Medvedev's circle were they able to maintain power over Russia, as Medvedev's successor became Boris Nadezhdin, who was ultimately removed by the efforts of the National Liberation Movement and their supporters in the All-Russian People's Front.\nIn some time, these documents are planned to be published to the public."
 russiaflavor.76.a: "Conspiracy was reality..."
 russiaflavor.77.t: "True End of History?"
 russiaflavor.77.d: "Evgeny Fedorov sat in his Kremlin office with his secretary. Paper copies of British MI6 intelligence documents had just been brought to him. Fedorov thoughtfully flipped through the documents one by one, without haste, noting everything that interested him-and he was interested in the truth, wanting to compare it with his previous guesses about the Western Elites' conspiracy.\n'Let's begin reading!' - Fedorov started in his head.\n'Putin always maintained contact with the West and did not particularly try to move into radical confrontation, and Ukraine was initially doomed to Russian invasion after Crimea's return-to liberate the country and return the territories of Novorossiya, which the latter claimed as a state project due to the seizure of power by pro-Western forces...' - Fedorov continued in his head, flipping to the end of the documents.\n'Strange... I don't particularly see the details that I and my supporters insisted on... Maybe we were wrong in the details, but in the essence-we were right... We need to make some corrections and present this to the public as the truth. After all, no important figures will deny it now, and if they do, the majority won't take them seriously.' - Fedorov finished in his head, and his body was covered in goosebumps from relief that he had learned the truth.\n'We should make some corrections to these documents regarding the Deep State indeed controlling Russia until the start of the 2nd Civil War in the USA. And don't forget to mention Nadezhdin as a kind of agent of this same state.' - Fedorov firmly ordered his secretary.\nThe secretary silently nodded and left the office to begin executing his boss's order through others lower in the hierarchy."
 russiaflavor.77.a: "I suppose this is the finale..."
 russiaflavor.78.t: "Tsarism Restored in Russia!"
 russiaflavor.78.d: "As a result of Russia's overwhelming victory in the European War and the death of Russian leader Vladimir Zhirinovsky, the acute question arose of what would happen next? In a fairly short time, a Zemsky Sobor was convened for the first time in almost 4 centuries. At the Zemsky Sobor, it was decided to end the 'regency' and grant the title of Emperor and Autocrat of All Russia to Georgy Mikhailovich Romanov.\n\nGeorgy Mikhailovich Romanov took the name 'George I'. George himself is a unique person not only as one of the Romanovs but also through his paternal line, carrying the blood of the Hohenzollerns-those among whom was the last Kaiser of the German Empire, Wilhelm II. In his speech, George I proclaimed: 'The last monarch of Russia, Nicholas II, made many mistakes; it's time to return to the legacy of Alexander III-the true Russian tsar! We will restore Russian heritage further; we will not allow ourselves to be destroyed by the neo-Bolshevik forces of Europe!'\n\nAfter the speech, no one had any doubts-George I is not a fan of Nicholas II's October Manifesto but a continuer of the traditions and ideas of Alexander III. Russia awaits the return of Russian autocracy."
 russiaflavor.78.a: "They really turned back time..."
 russiaflavor.79.t: "Tsarism Restored in Russia!"
 russiaflavor.79.d: "As a result of Russia's overwhelming victory in the European War and the death of Russian leader Vladimir Zhirinovsky, the acute question arose of what would happen next? In a fairly short time, a Zemsky Sobor was convened for the first time in almost 4 centuries. At the Zemsky Sobor, it was decided to end the 'regency' and grant the title of Emperor and Autocrat of All Russia to Rostislav Rostislavovich Romanov.\n\nRostislav Rostislavovich Romanov took the name 'Rostislav I'. Before the Zemsky Sobor, the new emperor was a landscape painter involved in plein air painting. In his speech, Rostislav I proclaimed: 'Nicholas II thought correctly regarding the October Manifesto. The Romanovs will no longer stand aside from the people; we will be with you, we will give the people a Duma again! As for present-day Europe-I will give them an answer right here: I will not allow you any revanche, and if you do go for it-it will not be in your favor; Russia will no longer kneel before mad leftists and continuers of the Bolsheviks.'\n\nAfter such a speech, no one had any doubts that Rostislav I is a new reformer on the throne, intending to restore what Nicholas II granted to the Russian people and what he failed to do properly."
 russiaflavor.79.a: "The October spirit of 1905 will breathe again."
 russiaflavor.80.t: "Tsarism Restored in Russia!"
 russiaflavor.80.d: "As a result of Russia's overwhelming victory in the European War and the death of Russian leader Vladimir Zhirinovsky, the acute question arose of what would happen next? In a fairly short time, a Zemsky Sobor was convened for the first time in almost 4 centuries. At the Zemsky Sobor, it was decided to end the 'regency' and grant the title of Emperor and Autocrat of All Russia to Gavriil Evgenievich Doroshin.\n\nGavriil Evgenievich Doroshin took the name 'Nicholas III'. Before the Zemsky Sobor, the new emperor became famous mostly among soldiers-for his service as a volunteer. Nicholas III is a descendant of the last Emperor and Autocrat of All Russia, Nicholas II, through the paternal line, and through the maternal line, a descendant of Napoleon I's wife, Josephine Beauharnais. In his speech, Nicholas III proclaimed: 'We were able to defeat the European beast and crush it decisively. I understand that with the rise of neo-Bolshevik ideas among them, THEY will try to go for revanche, and we must be ready for it. I myself fought side by side with soldiers on the front lines, and I WILL NOT ALLOW SHAME TO OUR EMPIRE!'\n\nAfter the speech, it was unclear what path awaits Russia-autocracy or restoration of Nicholas III's ancestor Nicholas II's October Manifesto, as the internal situation in the country was surprisingly not touched upon by the new tsar. But one thing was clear to everyone-Nicholas III, as a soldier, will not let the new red beast offend Russia."
 russiaflavor.80.a: "A soldier ascended the throne."
 russiaflavor.81.t: "Medvedev's Address to the Nation"
 russiaflavor.81.d: "The President of the Russian Federation addressed the nation in connection with recent events on the border with Poland. Medvedev stated that Poland, along with representatives of the North Atlantic Alliance, made their choice, drawing hasty conclusions that Russia was the organizer of the shootout, thereby initiating NATO's Article 5 to start a war with Russia.\n\nMedvedev also stated that 'Although Europe's Brussels servants went to war with the hands of Eastern Europe, Russia will not use nuclear weapons against its brothers and will liberate them from Brussels' oppression. Truth is with us, and in truth-victory.'\n\nThe address was received quite warmly by the public, as this time a real threat emerged, unseen since 1941. Queues at military enlistment offices, crowds of pro-government activists, and loyal citizens praised Dmitry Anatolyevich for not flinching and calling Russia to stand against the enemy."
 russiaflavor.81.a: "Glory to Russia!"
 russiaflavor.82.t: "New Release"
 russiaflavor.82.d: "The camera had been on for about 15 seconds, but Maxim couldn't utter a word. Today's topic for his video was so terrible yet so predictable that it somehow only intensified the lump in his throat. But he couldn't escape this topic either. After sipping some water, he cleared his throat slightly and finally began to speak:\n\n'Imagine this situation-you live in Russia. An amazing situation, right? According to my channel's statistics, it's familiar to many of you. And here, it would seem, the new government unexpectedly gave us what we tried so hard to obtain under Putin-democracy. Perverted, strange, far from ideal, but democracy. And we were glad-built hopes, plans, even forgave the bloody slaughter in Europe. But in the end-the carriage turned into a pumpkin. Ultra-right criminals from the fascist and chauvinist organization ''SZND'' seized power, using both old Putin methods-vote rigging and populism-and new ones, namely intimidation and assassinations.\n\nKatz paused, took a glass, and drank from it. Then he continued:\n\n'Now, I want to address everyone who cares about Russia's fate. It doesn't matter who you are-liberal or conservative, communist or democrat, from United Russia or Russia of the Future, for federalism or centralization, right or left, love strawberry ice cream or chocolate. Right now, in Moscow, a true ideological descendant of Benito Mussolini is sitting, an upstart who imagines himself a great savior. The truth is he will save Russia only from life, while killing a couple more million and traumatizing tens of millions. I never call my audience to dangerous actions, but now is an exception. Please fight the regime. It doesn't matter what you do-go to rallies, teach the truth, or just repost this video. It's important that you contribute to resistance. We have a chance to stop this madness. So let's use it before it's too late.'"
 russiaflavor.82.a: "See you tomorrow."
 russiaflavor.83.t: "'Cartoon' Demonstrations"
 russiaflavor.83.d: "With the rise of SZND to power, many areas of society's social sphere underwent strong censorship, including TV channels. First, quite obvious bans were introduced on Western channels such as 'BBC', 'Discovery', 'MTV', 'Nickelodeon', 'Animal Planet', and many others. But soon it turned out that Russian channels were also forced to cease broadcasting, for example 'Subbota', 'Pyatnitsa', 'Match-TV', 'Muz-TV', 'Moya Planeta', and so on. But what stirred the public the most was the closure of all children's and teenage channels such as 'Solntse', 'MULT', '2x2', and even a giant like 'Karusel'.\n\nSuch a drastic decision to close numerous channels immediately faced strong negative public reaction, but worst of all, it stirred a hornet's nest called 'Democratic Opposition'. Boris Nadezhdin was the first to speak out-he called on social media to fight censorship online, intentionally use VPNs, and spread ways to bypass it. Dmitry Patrushev and Boris Titov issued similar statements but with slightly different wording. The most radical statement came from Alexei Nechaev-he called for demonstrations and full-scale actions across the country. It would seem absolutely stupid to protest against such a necessary measure; anyone should understand that.\n\nBut people came out.\n\nBy general estimates, the largest protests took place in Moscow, Minsk, and Yekaterinburg, where up to 4000 people could gather in one square. The most massive rally was in St. Petersburg at Uprising Square-about 7000 people, of whom 500 were detained. At some point during the actions, mass confusion began, injuring a couple dozen people, and 5 protesters were outright killed. Footage of the deaths quickly spread online, only worsening our image and increasing the activity of various marginal groups."
 russiaflavor.83.a: "And all this over cartoons?!"
 russiaflavor.84.t: "Dialogue"
 russiaflavor.84.d: "After Alikhanov came to power, numerous rumors and information leaked to the press about SZND leaders, mainly, of course, from the democratic opposition. The people paid little attention to such news, as the opposition had been doing this even before Alikhanov's rise. But a recent case stirred the information field especially strongly.\n\nDmitry Patrushev, a former United Russia apparatchik under Medvedev, posted an audio recording on his Telegram channel with the caption '2021-07-24_PRAVDA'. As a caption to the file, he wrote that this was a secret recording of a conversation between Vladimir Vladimirovich Putin and Medvedev, recorded before the former's death.\n\nThe content of the recording is even more interesting than its backstory. Judging by the sounds, the politicians were sitting at a table sipping some drink, presumably tea or coffee. First, Medvedev and Vladimir Vladimirovich discussed something mundane-who ate what, what plans and meetings, discussed whose clothes fit better, and so on. But when the dialogue smoothly shifted to the political realm and talk turned to hypothetically possible successors to Putin, an interesting exchange occurred:\n\n'...Dmitry, after all, I'm not immortal. It's a pity to admit, but given recent events, we need to think about who can continue my work.\nAnd who do you propose, Vladimir Vladimirovich?\nWell, you know, I'd start from the opposite. Who I wouldn't want to propose. And from United Russia, of course, I probably wouldn't want to see one person-Mr. Alikhanov. This man... no, this... this animal must not only be tamed, it must be put down. He has shown himself to be an extremely cruel, reckless, and, well, inept politician. Dmitry Anatolyevich, I ask you-don't let him not only come to power, don't let him influence power at all! If you fail... Russia awaits a nightmarish future...\n\nAt this point, the audio recording abruptly cut off. The post caused a real furor throughout the Runet and even went beyond its borders. Despite the recording's authenticity being slightly above zero, many people still believed it, and now the fire of protests flared up again, this time even stronger."
 russiaflavor.84.a: "It's obviously AI! Why did people fall for these provocations?!"
 russiaflavor.85.t: "Mass Protests of 'New Russia'!"
 russiaflavor.85.d: "Ever since the murder of Vladislav Davankov, the 'New Russia' party declared us their worst enemy and essentially stated that their main goal was the destruction of our party and power. We weren't particularly worried about this, as without Davankov, the party essentially turned into LDPR 2.0, living only on the memory of its once-famous politician. That was our mistake.\n\nAlexei Nechaev, a little-known apparatchik and former State Duma deputy, was previously distinguished by his slogans and statements on various social networks. But today he distinguished himself especially. In memory of Vladislav Davankov, Alexei Nechaev proposed illegally erecting their own memorial plaque in St. Petersburg on Marata Street, 47, while calling to build it not with workers but independently. When liberal activists arrived at the scene, they were, of course, detained, but Nechaev didn't like this outcome. A few minutes after the first detentions, numerous photos of activist arrests and a provocative call to people to come out right now and head to the 'Vladimirskaya' metro station to prevent the forces of order from eliminating illegal actions appeared on his personal Telegram channel.\n\nIn the end, from all over St. Petersburg, many people with washed brains did indeed flock to Nechaev and the activists. And there were so many that we had to temporarily paralyze the St. Petersburg metro system, but it didn't help much. Thousands of people arrived at the scene, beginning to apply various actions against law enforcement-from protecting activists to throwing stones at police. In response, our fighters decided to use tear gas and physical force against the people, causing mass panic and a crush. As a result of the protests, the memorial plaque was never installed, but thanks to Nechaev's actions, about 64 people were injured, 30 hospitalized, and 2 declared dead."
 russiaflavor.85.a: "You're no better than Euro-degenerates!"
 russiaflavor.86.t: "Rumors"
 russiaflavor.86.d: "Rumors are going around that Alikhanov's government isn't so great. People tell each other in kitchens: 'Is he really Putin's successor? No, he's Hitler's successor!'\n\nRumors are going around that Alikhanov's government isn't so strong. People tell each other in universities: 'What can they do? They can't even stop a handful of protesters!'\n\nRumors are going around that Alikhanov's government isn't so honest. People tell each other in offices: 'They stole everything! Didn't leave a kopeck for anyone!'\n\nRumors are going around that Alikhanov's government isn't so popular. People tell each other in stores: 'They raised all the prices! Nothing can be bought!'\n\nRumors are going around that Alikhanov's government isn't so united. People tell each other in barracks: 'Are those officers? Damn, they're just trash!'\n\nWith each day, the government becomes less of a state-forming entity for society and more something marginal, illegitimate. With each day, society increasingly nostalgizes for the times of Medvedev and Putin, hence looking at pro-government forces with growing hatred. With each day, the 'Yellow Guard' loses more and more members either from heavy fights and attacks or from mass dismissals. With each day, the society of Derzhavists crumbles and cracks at the seams, which cannot be unnoticed by the general mood of the people. The democratic opposition is already beginning to coordinate actions with each other, inciting the people to dangerous actions, and city streets are suspiciously emptying more and more. It won't be long before one of the most terrible rumors circulating among the people may become true."
 russiaflavor.86.a: "These are just rumors... Right?"
 russiaflavor.87.t: "Nobility"
 russiaflavor.87.d: "The seasonal full moon appeared again on the clock hands as the noble knight-archer stands before a stone from which a huge, sharp, and gleaming sword proudly protrudes. The knight first looks into the distance at the vile, dark castle, then at the majestic weapon before him. Behind him-a large crowd of impoverished, robbed peasants who have already lost all hope for change. Sharply, grasping the sword hilt with both hands, the knight pulls it out and proudly raises it above himself, blade upward.\n\nThe peasants are amazed but also inspired by such an act. The proud knight points his new weapon directly at the castle, beginning to march toward it. The people forming behind his back immediately pick up the great campaign, adopting the pride and strength from the warrior they follow. With each new step-grass blooms in their path; with each new step-clouds part in the sky; with each new step-liberation draws closer.\n\nAnd so, the knight and his people arrived at the scene. The evil king-tyrant who had oppressed the poor people for several years was instantly defeated with one strike of cold steel. His fat, disgusting carcass fell at the entrance to the castle built from the people's plundered means, and the golden, beautiful crown fell directly into the knight's hands. The people are in ecstasy; they cheer in unison, shout curses at the already dead king, and pay honors to the knight. Then the knight slightly swings his hand and throws the crown into the crowd, turning away. The peasants, now liberated, are in shock and instantly lose the gift of speech. One of them cautiously asks:\n\n'S-sir knight... you... you saved the Russian people... you saved us... how can you refuse power over us?'\n\nThe knight slightly turns, looking askance at the crowd, and calmly replies:"
 russiaflavor.87.a: "'Now, you are free to decide your own fate'"
 russiaflavor.88.t: "Stream"
 russiaflavor.88.d: "After the unexpected victory in the Russian presidential elections of the former head of the DPR Denis Pushilin, Vladislav Zhmilevsky was appointed Minister of Foreign Affairs.\n\nStreams, of course, became a rarity-state service took almost all his time, but Zhmilevsky did not forget his viewers, especially since there were many more of them now, as he was considered the government's voice to the people. Mostly Vladislav discussed foreign policy and international relations, watched YouTube videos requested by viewers, often discussed new bills, and held auctions where he could fulfill almost any donor's request.\n\nDuring one such broadcast, when asked to parody a streamer, a new donation comes in:\n\nTimur R. - 100 rubles\n- Hi, Zhme. What do you think, maybe we should still establish relations with the current European government? After all, it's completely different now, and you know, I wouldn't want another war.\n- Yeah, sure. And nothing that these are the same leftists who dream of building a new utopia, but in a different wrapper? They live in their fucking dreamworld with nation erasure and some kind of 'justice'. And in general, they hate us, Russians. With them, you can and should speak only one language-the language of force; otherwise, well, they just won't understand.\nThe chat erupted in ovations and full support for the streamer."
 russiaflavor.88.a: "Do we really need to explain this? Dem further."
 russiaflavor.89.t: "Soldier's Sorrow"
 russiaflavor.89.d: "Alexander was a soldier from the very beginning of the war, served with his company in many European cities: from Kyiv with Warsaw to Bucharest with Sofia, and after demobilization planned to return to his village in Crimea to his family.\nBut while in the hospital after a severe injury, he was told sad news: a few days before the war ended, a missile accidentally hit his house. His wife and daughter died on the spot.\nSoon Alexander was demobilized but refused to return to his native village due to tragic memories. Then, with nowhere else to go, he decided to serve in the military police on Russia's newly acquired territories-to maintain order there.\nDuring one patrol, Alexander noticed a homeless boy rummaging through the rubble of a residential building. The man approached the boy and asked:\n- What are you doing here? Where are your parents?\n- Dad died at the front, and mom was hit by a drone when she went to the store... - the boy answered.\nAnd something boiled in the soldier's chest. He stood silent for a long time, looking at the kid, and decided that it should not be that they perish alone! And he would take the boy as his son.\n- Did you know I'm your father? - the policeman whispered in his ear.\nThe boy froze, then suddenly threw himself around his neck. He clung to the soldier so tightly, as if afraid he would disappear. Along the way, the boy didn't leave Alexei's side for a step, and for the first time in a long time, the soldier felt warmth in his heart."
 russiaflavor.89.a: "And two lonely souls found each other."
 russiaflavor.90.t: "Volunteer"
 russiaflavor.90.d: "By a new decree from Anton Alikhanov, the 'Yellow Guard' was established in Russia, tasked with maintaining order on the streets and assisting the police. Members of the guard were extremely easy to spot on the street; the uniform consisted of a yellow armband with the Russian flag and a suit of the same color-shirt with shorts on suspenders.\nAny citizen of the country could become a volunteer. It was enough to submit an application at one of the reception points and pass a short interview.\nThe procedure itself was quite quick and didn't take much time:\n- So, hello, you plan to join the Yellow Guard. May I ask what prompted you?\n- Well, you know, these liberals have completely lost it. Recently they blew up a residential building. Is that even possible? After that, I immediately realized I could no longer stand aside.\n- Uh-huh, good. Are you ready to serve the country and, if necessary, suppress illegal actions? It can be quite dangerous, especially now.\n- Yes, that's exactly why I came. I want order restored on the streets. I'm ready to participate in this.\n- Excellent. Then I'll forward your application for consideration. Later you'll be issued a uniform and assigned to a partner. May I just ask your last name and first name?"
 russiaflavor.90.a: "- Merso Kozhemyako."
 russiaflavor.91.t: "Proposal"
 russiaflavor.91.d: "Anton Andreevich Alikhanov decided to drop in on his old acquaintance-the sculptor known by the pseudonym 'Brekhar'. He wanted to check on the progress of his order.\n- Hello, Brekhar. How are you? I wanted to ask how things are going with the order? You know I know you-you like to drag things out.\n- Good day, Anton Andreevich. Everything's fine. The work is progressing, don't worry.\n- Wonderful. You also mentioned that someone wants to meet with me and discuss something. Can you tell me who it is?\n- Ah yes. Recently, two from the Yellow Guard approached me. Both have proven themselves well in service, and they insisted strongly on a conversation with you.\n- You can invite them.\nBrekhar stepped away for a couple of minutes, then returned with two guardsmen.\n- Hello, Anton Andreevich, my name is Merso, I'm one of the senior guardsmen, and my comrade Luka and I believe that you must-no, are even obliged-to listen to us.\n- Oh? Since when am I obliged to you?\n- Please, listen. I'm completely serious.\n- Well, let's say. What are you proposing?\n- The rear is unsafe right now. Various radical left and democratic groups are rampaging. There aren't enough people to maintain order, and on the returned territories, it's complete chaos. I propose opening volunteer points for the Yellow Guard in Ukraine.\n- But they already exist there.\n- They do, but there aren't enough. We propose not only expanding the number of points but also simplifying admission for local residents. Accept them on equal terms with Russian citizens. In parallel, launch a campaign to improve the Guard's image among Ukrainians, so they start seeing us as defenders of order. If you allow, I'm ready to take on organizing this work.\n- Understood. Anything else?\n- I also propose changing the direction of the movement. Our movement should not only be all-Russian but encompass all Eastern Slavs.\n- And how do you envision that?\n- We need to start integration. Ukraine, Belarus, Malorossiya-unite us all under one banner.\n- You do understand that times have changed? We're no longer one people, as it was a couple of centuries ago.\n- The differences are just in the details. My own parents are from Ukraine, I know what I'm talking about.\nAlikhanov, frowning, took a cigarette from his case, clicked the lighter. He was silent for a few seconds, inhaling.\n- Alright, I'm ready to think over your proposal, he finally said."
 russiaflavor.91.a: "- But first, you'll need to prove yourself."
 russiaflavor.92.t: "Fading Hope"
 russiaflavor.92.d: "Viktor Yanukovych has been living in his residence near Rostov for many years. He was forced to flee here after being betrayed. But even in the darkest days, he believed that Ukraine could rise from its knees. That in the end, it would flourish.\n\nOn a rainy morning, Viktor Fedorovich was sitting on the couch with a cup of coffee, watching TV, waiting for the news to start. One of the news items was: 'Russian troops have fully liberated the capital of Ukraine-Kyiv.' Yanukovych froze and couldn't utter a single word. In his head, old memories replayed like a film reel.\nHe remembered 2010, his very first speech as president. He remembered the Maidan, the impeachment, and the escape. And now-the country he loved so much was burned to ashes in the flames of war.\n'What have I done? How could I have prevented the inevitable back then? What awaits my homeland next?'-But deep in his soul, he understood that no one would answer his questions; everything was over.\n\nOutside the window, the rain intensified, drops pounding on the roof, while silence reigned in the house."
 russiaflavor.92.a: "Hope dies last."
 russiaflavor.93.t: "Showdown"
 russiaflavor.93.d: "Vlad was a seasoned member of the Russian Community. He had been in many street clashes and brawls. Lately, though, the Community had serious problems: feuds with Chechen groups, especially the Kadyrovites.\n\nOne such brawl was particularly large-scale and brutal. The clash started abruptly. The thud of blows echoed throughout the neighborhood. Vlad moved confidently and precisely. His signature leg sweep knocked opponents to the ground again and again, feeling the thrill and confidence in his strength.\n\nBut gradually, the situation became clear: the advantage was clearly on the Chechens' side. There were more of them, and they acted more organized. Vlad tried to hold the line, but several dags rushed him at once. He sharply dodged aside, tried his signature sweep-and for the first time, it failed. The opponent stayed on his feet and responded with a powerful blow to the jaw; Vlad's precision faltered, and he fell to the ground.\n\nThe Russian Community retreated; many writhed on the ground in pain. The Kadyrovites grabbed the conscious ones by the collar, including Vlad, gathered them against the wall, and forced them to apologize to them and Ramzan Akhmatovich."
 russiaflavor.93.a: "Chechnya is strength! Allahu Akbar!"
 russiaflavor.94.t: "Struggle"
 russiaflavor.94.d: "The entire life of humanity is a struggle. With nature, with other people. For some nations-it's a struggle with the whole world and even with an angry God who sent them to earth. But no matter the prerequisites, struggle will not disappear from our lives. The lion roars, the gorilla beats its chest, all to defend its place at the top, to be the strongest and dominant, or at least appear so.\n\nAnd Russia, throughout its history, has faced the need to fight for its existence more than once. Whether against Asian hordes or the armies of united Europe. Many tried to end our country's history, and each time they lost.\n\nAnd now Russia stands on the pedestal again as the sole victor of both European wars.\n\nHowever, the struggle is not over. The humiliated and defeated Germans, French, and other conquered peoples will want revenge. The struggle continues, for that is the essence of things. But Russia will no longer sink into weakness. Alikhanov did everything to make his homeland strong and ready to fight to the last.\n\nIt was his perfectly tuned mechanism, a war machine without equal. It was a people, united and indivisible, like a roaring wave capable of sweeping away everything in its path. It was his fatherland, proud and unconquered."
 russiaflavor.94.a: "There's no other way."
 russiaflavor.95.t: "Police Wave"
 russiaflavor.95.d: "- Mobile Special Purpose Detachment has arrived at the scene of mass unrest. Commander Sergei Chernov.\n- Received. Begin the cordon procedure. The Yellow Guard unit will arrive for support soon. Estimated time: 15 minutes.\n- Understood, starting cordon.\n. . .\n- Violators are trying to break the cordon, attacking officers. Where's the backup?\n- The Yellow Guard was attacked; their vehicle is damaged. Delay time unknown.\n- Received, continuing. . . Bottle! Cov. . . - the sound of breaking glass comes from the receiver.\n. . .\n- Where the hell is Demyanchik with his guys? They're first for parades, damn it. First for medals too. Beating up bums-we'll forgive them that. But with real protesters.\n- Stop, you're clogging the air. Connection with the Guard unit lost.\n- Damn right I'm clogging. I have three wounded with burns here, one dragged off by protesters, bastards, couldn't fight them off. Bold creatures, like they've gorged on rage. And no help! We'll have to retreat if this continues.\n- . . . .\n- Same to you.\n. . .\n- Little bastard. Whew, nice homemade one they've got.- the commander sighs deeply. - Took my breath away. Cordon broken, retreating for regrouping. Do what you want with it, send the military if you have to."
 russiaflavor.95.a: "And dangerous and difficult"
 russiaflavor.96.t: "Monster"
 russiaflavor.96.d: "This wasn't just anger. It was rage-sincere, undiluted, and uncontrollable. When Alikhanov came to power, he knew there would be many dissenters. You can't please everyone in this world, and the former Kaliningrad governor knew that better than others. Yet he didn't expect so many former comrades to turn away from him. Even Medvedev contributed to Alikhanov's fall. Because Alikhanov wasn't Putin, wasn't Medvedev. Some even said he wasn't Russian. The traitors even gathered into their so-called opposition. But where are they now? In the damp earth! Their bodies won't be handed over to relatives. They'll remain missing to the end, because that's the reward for Judas.\n\nIt's a heavy cross; Alikhanov's scars are countless. While others whined and fed the people promises, only he took on fulfilling his promises, his duty to the people, to all of Russia. And yet attitudes toward him changed. At first, they called him a beast, sometimes even a brute for his power, his zeal. Then they started calling him an animal, like a rabid dog lunging at people.\n\nNow they've nicknamed him a monster. But so be it! History needs figures who take everything into their own hands, not thinking about how history will remember them, especially citizens of other countries. Alikhanov decided to make Russia truly great, and he won't break his promise. The Russian world will no longer be an empty phrase! The Russian Spring won't be forgotten! All thanks to him!\n\nIf no one else had the courage, then Anton himself will do it. The end justifies the means, but only if the end is saving the fatherland."
 russiaflavor.96.a: "No one can help me anymore, to ease that pain."
 russiaflavor.97.t: "Dubious Support"
 russiaflavor.97.d: "- Damn it, Stas, did you fall out of a tree!? What the hell did you do? - The PPS officer looked at his comrade with a displeased face.\n- Pal Palych, why me right away? I approached him normally, said normally, 'Citizen, there are complaints about an unsanctioned picket, come to the car.' And he hugged that banner tight as he could. Legs shook, eyes rolled back, and he collapsed. I didn't touch him with a finger.\n- When's the last time you looked in a mirror? You're a 2x2 wardrobe. No wonder he shit himself when you approached and spoke like that, in uniform too. I'd probably do the same at his age. - Pavel carefully stroked his mustache, thinking what to do next. - What was on his poster anyway?\n- How should I know? He turned it backward by the time I got there.\n- Eh, well, let's see. - Pavel approached the teenager lying on the asphalt. He grabbed the top right corner of the banner with his hand and flipped it. On the back was a modified 'Motherland,' holding a Nazi Germany flag with one difference. In the center of the swastika was a globe with Russia in the middle. At the top of the banner in white letters: 'All-Russian Organization of National-Cosmopolitans stands Za Alikhanov.' At the bottom: 'Whites of all countries, you have nothing to lose but the chains of globalism!' - Oh man. . .\n - Yeah, what a mess. We can cook up a criminal case from this, you think?\n- So you knock out a kid not even 20, and now want to slap a criminal charge on him? Grab his legs, I'll take the front, and drag him to the car. And don't forget this crap. What are you standing for? Come on, quicker-quicker. . ."
 russiaflavor.97.a: "It happens"
 russiaflavor.98.t: "Their Struggle"
 russiaflavor.98.d: "...And now to other news. Tonight in the city of Armavir, members of the banned extremist organization BOAK, aka the Combat Organization of Anarcho-Communists, committed a failed act of terrorism. At three in the morning, a group of four people approached the local Yellow Guard office on Zhukova Street and tried to set the building on fire using a homemade Molotov cocktail.\n\nHowever, because the thrower got too close, the bottle bounced off the glass and hit the thrower right in the face, causing him to catch fire. Accomplices tried to extinguish him but fled upon hearing police sirens. Currently, doctors are fighting for the life of the unlucky thrower; his identity is unknown. The extremists also left a bag at the scene containing several stencils, an organization poster, and spray paint cans.\n\nPolice have launched search operations, and the remaining arsonists are expected to be brought to justice soon. And now to world sports news with my colleague Vitaly Ostrovsky."
 russiaflavor.98.a: "BOAK? First time hearing about them. . ."
 russiaflavor.99.t: "Beyond the Thistle"
 russiaflavor.99.d: "In the middle of a field stood a castle; the path to it had long overgrown, and no one had dared visit the place for a century. Once, a mighty sovereign held court here, the elite held balls, and the kingdom's finest guards protected the peace. But those times were long gone. Now the castle was overgrown with thistle; its spiky vines entwined the ancient towers and walls, and the intoxicating purple flowers clouded the gaze. But the brave knight was not about to give up.\n\nHe gripped his sword, then swung. Burning sap sprayed onto his hands, causing terrible itching, but it wasn't enough. Another strike. And another. The knight pushed through the thistle, tireless. Thorns pierced his legs and arms, the poisonous green sap burned his face, eyes watered-but not from pity for anything, least of all himself. Corridor after corridor, hall after hall, the thistle retreated.\n\nAt the end, the exhausted knight reached the throne room. An empty dusty throne, illuminated by a beam of light through a hole in the ceiling, beckoned him. And as he approached, voices began to sound behind the warrior. Turning, he saw them-7 figures. An adult man and woman with their four daughters stood in the hall right before the knight; from behind the father peeked a pale little son. The figures stood and smiled, as if proud of the brave warrior's feat.\n\nAnd then a crown appeared from thin air, adorned with gems. It was a crown for Him. For the knight who dared to challenge and defend the memory of past dynasties. He wasn't from a noble line, but he was worthy. Trying on the regalia, the soldier sat on the throne, after which the figures vanished. One day a worthier warrior would come, with noble blood and unconquerable spirit, worthy of this regalia. But for now? For now, the knight would guard it."
 russiaflavor.99.a: "For only he is worthy"
 russiaflavor.100.t: "Klimovki"
 russiaflavor.100.d: "About 5 years ago, driving along Moscow's road overpasses and highways, one could see multitudes of new buildings resembling colorful cigarette packs or shoe boxes.\n\nThe uniform faded facade design, lack of balconies, transport infrastructure, and sheer external cheapness immediately caught the eye. Inside, residents faced a host of problems: tiny rooms, strange layouts, and constant noise from neighbors.\n\nSuch a solution risked becoming universal for Russia. Many companies had already received permits to build new high-rises across the European part of our country. However, now cranes and trucks were working again on the sites of urgently demolished new buildings.\n\nAccording to the new infrastructure reconstruction plan for the USSR, proposed by the Ministry of Construction and approved at the party meeting, it was necessary to introduce Soviet culture into civil architecture to maintain communist sentiment in everyday life. For this, all construction contractors were collectivized by local soviet organs, and socialist competitions were announced among architects for new building projects.\n\nMoscow, as a symbol of communism, transformed first. Quickly, huge giants of glass, concrete, and steel rose across the capital. Quirky rough forms were decorated with red stars and mosaics on inspiring themes with quotes from Lenin, Stalin, and other Bolshevik figures. Particularly popular among the people became 'Klimovki'-standard 10-story houses with spacious ceilings and cozy apartments.\n\nSoon every city in the country will embody the goals and aspirations of the Soviet person with its appearance!"
 russiaflavor.100.a: "The power of Brutalism is indisputable"
 russiaflavor.101.t: "Portrait of the Leader"
 russiaflavor.101.d: "Since Stalin's times, a tradition has taken root in Russia of hanging a portrait of the current ruler above the workplace in the offices of managers and chiefs. Even after the arrival of Khrushchev's revisionism and capitalism, the pictures didn't go away. According to the new decree of General Secretary Klim Alexandrovich, every chief with their own office must hang a portrait of Stalin above their workplace.\n\nMany malicious tongues said that this practice belongs to kleptocratic and totalitarian states, where an official cares about position in the hierarchy and closeness to the top ruling echelon, not state affairs and its people, while the despot enjoys fake smiles. That's how it was under Khrushchev, subsequent general secretaries, and presidents. Softening the state's hard course and the dominance of 'servants of the people' led to its slow fall.\n\nIt was like that before Stalin, when the Bolshevik Party after the revolution and civil war was a gathering of all sorts of utopian ideologists and revisionist dreamers who pulled the blanket toward themselves and continued spreading the rot of political discord born in the imperial Senate.\n\nStalin overcame the resistance of internal enemies of the new state and set a hard course for USSR development. He was guided not by abstract ideologies and systems, but by the principle of a strong state where all citizens in all posts work not for themselves, not for profit or promotion, but for the country and its inhabitants. His organizational genius filled the country with needed cadres loyal to the Motherland and communism.\n\nStalin's personality cult wasn't aimed at praising himself but at inspiring ordinary Union citizens. His image instilled responsibility and confidence in the hearts of the Soviet people. According to the plan to restore historical justice toward Stalin and his associates, new monuments and busts of the 'Leader of the Peoples' were announced on squares, factory territories, and administrative centers. The portrait decree was just the first step."
 russiaflavor.101.a: "Just in case, I'll hang a portrait of Zhukov too"
 russiaflavor.102.t: "Reaction of the Reactionaries"
 russiaflavor.102.d: "After accomplishing our great revolution and returning Russia to communist beginnings, the question arose of strengthening our government.\n\nAt the first meeting of the ComZaVoz of the USSR, General Secretary Klim Zhukov gave a major speech. He openly declared all leaders of the Soviet Union, including ministers and chairmen of the Central Committee, after Stalin's death-revisionist and anti-Soviet, and that the model for the future structure of Soviet Russia would be precisely his state model, as the most effective and necessary at this moment in history.\n\nThis statement caused a storm of emotions among various political groups remaining in our country. Liberal capitalists fear poverty, remnants of fascists and nationalists claim that Russophobes and migrants have come to power, and Trotskyists and other 'moderate left' predict the return of the GULAG and a 'new 37th.' But that's not scary; opposition leaders can always be easily eliminated. Their influence on ordinary people's minds is small, as their strength is in emotions, which reality can easily dispel.\n\nMuch scarier is that most of our citizens don't understand the full seriousness of our intentions and plans. For them, restoring true Stalinist Soviet reality is just background announced by stuffy old men in a fit of nostalgia and inability to come up with something new. The lack of a clear political line and frequent flirting with pluralism of opinions slowly destroyed the Union, then the Federation. This political apathy, born from capitalists and revisionists stifling young blood with anti-state ideas, and ignorance of communism's main pillars, is Russia's main and urgent problem.\n\nIt's time for the proletariat to awaken from nearly a century-long sleep and return greatness and stability to their country of Soviets with their own hands! We have much work ahead, comrades! We must return Russia and its fraternal peoples to the steel march of Stalinist communism!"
 russiaflavor.102.a: "Let's go!"
 russiaflavor.103.t: "Political Commissars"
 russiaflavor.103.d: "At military unit number 440, where conscript recruits serve, a strange train arrived with two passenger cars. From it emerged a group of 12 soldiers with red stars on their chevrons, armed with automatic rifles, followed by a thin tall figure in a long black coat. No one met the guests on the platform; only the duty private ran to check documents. The leader introduced himself as Major Kotov, inspector, with escort.\n\nThen the procession headed to the unit headquarters. The colonel, unit chief, had received info about the inspection from the station private and was already meeting the inspector with the full officer staff and mobilized orchestra. He was surprised why his superior, General Milashenko, hadn't warned him weeks in advance. But no need to worry; over 30 years of service, such inspectors were rarely clean-handed and gladly took bribes.\n\nWhen the inspector reached the unit entrance, Antonov was ready to introduce himself, but the major beat him, showing his ID:\n- Colonel Alexei Antonov? I am Commissar Kotov, you are under arrest by KGB order for embezzlement of state funds. We must deliver you for interrogation to the nearest KGB department and conduct an investigation, as we recently received an extensive denunciation against you and several high officer staff of this unit: hazing, spreading dissident ideas, and violating army subordination, said the commissar, waving a thick folder.\n– Do you know who I am! - Antonov flared up, - I've sent five like you to the bunk for such things! You have no idea who I have connections with, you red-pup, to just climb on me like this in full parade?!\n– General Milashenko was arrested last week for corruption, and he gave you up, Comrade Antonov.\nAfter these words, the enraged colonel pulled his service pistol, but as he aimed at Kotov, a shot rang out. The colonel fell with a bullet in the forehead, and the commissar held his trusty Makarov. Then the KGB soldier group opened fire on the officer group.\nIn 10 seconds, the parade ground was littered with command staff corpses. Only a young captain who 'accidentally' was late for the meeting survived. Commissar Kotov approached him and shook his hand."
 russiaflavor.103.a: "- I serve the Soviet Union, Comrade Commissar!"
 russiaflavor.104.t: "Soviet March"
 russiaflavor.104.d: "On December 18, a military parade was held on Red Square in honor of the birthday of Joseph Vissarionovich Stalin. Across the cobblestones of the main square of Soviet Russia marched foot formations, armored columns, and aviation groups.\n\nFirst came the historical parade participants: members of historical clubs and volunteer organizations dressed in Great Patriotic War uniforms, armed with vintage Mosin rifles, PPSh, and DP-27. They carried banners of the fronts that defended our Motherland 80 years ago.\n\nNext marched rows of First European War veterans: drone operators, assault troops, and militia from the republics. They bore the full scale and weight of new war rules and realities. The fighters marched in combat gear, each with medals for storming cities and distinguished service.\n\nBehind them came the procession of labor and rear heroes. Ordinary workers, engineers, and designers who forged victory alongside front-line soldiers. Hundreds of banners from factories, concerns, research institutes, and centers, and behind each flag stood hundreds and thousands of employees laboring for the Motherland.\n\nLast came graduates and students of military academies. They were distinguished by the newest parade uniform. Ushanka with classic Soviet cockade, heavy-looking crimson greatcoat adorned with gold buttons and massive epaulettes and collar tabs. Their formation symbolized the newest military history of the new Soviet Russia.\n\nBehind the soldiers rolled tank and combat vehicle lines, their steel tempered in front-line battles. Modified with various nets and 'barbecues,' their forms inspired menace and the grandeur of Russia's military might, undimmed since the Great Patriotic War.\n\nThe armored column was closed by a group of six prototypes of the newest IS-10 tank. Dual 120-mm guns, two short-range air defense systems, onboard EW means, and a huge dozer blade. The tank was so large it was mounted on 4 track supports at the corners. This tank is still a prototype but should become the response to new war realities.\n\nThe parade ended with flyovers of aviation and helicopter groups. The climax was the flyover of 3 gigantic airships. The first adorned with Stalin's portrait, the second-with the Victory Banner, the third-with the USSR flag."
 russiaflavor.104.a: "The Soviet Union strikes its sworn enemies..."

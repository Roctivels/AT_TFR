 russia.298.t: "Victoria de Georgescu"
 russia.298.d: "Calin Georgescu ha ganado las elecciones anticipadas rumanas. Conservador discreto, se opone a tomar medidas drásticas con respecto a los territorios perdidos, aunque no niega que Rumania tendrá que abordar este problema en algún momento. Por supuesto, su ascenso al poder provocó una ola de descontento popular. Así, los ciudadanos de la oposición lo tildan de títere de los oligarcas del Kremlin. ¿Qué le deparará su presidencia a este país asolado por la guerra? Ahora el futuro de Rumania es incierto, y solo podemos esperar los acontecimientos."

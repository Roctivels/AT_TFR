 russia.865.t: "El poder de la música"
 russia.865.d: "19:07 hora de Moscú, calle Dekabrist, 8. Una enorme multitud de personas se iba dispersando lentamente en una fila aparentemente interminable hacia el colegio electoral. Tras la victoria sobre los países del Tratado del Atlántico Norte, el gobierno ruso decidió de nuevo jugar a la democracia y celebrar elecciones presidenciales. Aunque todos se daban cuenta de que estas elecciones no serían diferentes de las anteriores, muchos rusos sentían que era su deber demostrar su posición, incluso si eso significaba esperar en la fila durante horas mientras disfrutaban de los sonidos no tan agradables que venían de diferentes partes de esta fila de votantes.\n\nDe repente, como de la nada, una voz -la voz de la esperanza- se escuchó desde atrás.\n\"Bueno, amigos, ¿aún no tienen frío?\"\nUno de los candidatos -Borís Nadezhdin- apareció junto al \"corredor electoral\" en persona. Su amable sonrisa, sus gafas ligeramente empañadas y su pulcra chaqueta provocaron una fuerte y alegre reacción de la multitud. Nadezhdin miró a la multitud y sonrió:\n\"Han estado esperando aquí mucho tiempo, ¿verdad? Lo veo en sus rostros cansados pero decididos. ¡Creo que puedo intentar animarlos!\"\n\nLa hija de Nadezhdin, Anastasia, que estaba cerca, montó rápidamente una silla plegable, en la que se sentó inmediatamente el contendiente presidencial de la Federación de Rusia. Sacó su guitarra de su estuche y rozó ligeramente las cuerdas, recordando en su cabeza la melodía que quería tocar. Mientras tanto, Nastya ya había instalado un micrófono y pequeños altavoces junto a su padre. Balanceando los brazos, los Nadezhdin comenzaron a cantar su canción, que inmediatamente empezó a calentar los corazones y las almas de los que estaban en la fila."
 russia.865.a: "La esperanza es lo último que se pierde."
 russia.866.t: "The Return of Orban"

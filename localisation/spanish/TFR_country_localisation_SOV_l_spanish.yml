 russia.2005.t: "Prigozhin Shot Dead!"
 russia.2005.d: "Terrible news strike Russia once more. Yevgeny Prigozhin, leader of Wagner Group, and new ruler of the Nation, was shot dead during his rally in Moscow, following success of 'Justice March'. Unknown assailant, who fled the scene unharmed, was somehow able to pass through all security staff, and take almost a point blank shot, eye witnesses claim that it was likely because of his non-threatening posture, and 'clear as day' Udmurtian facial structure.\nWithout its leading figurehead, Wagner will devolve into bickering and power struggle. Only God knows what will happen next..."
 russia.2005.a: "Fiat iustitia, et pereat mundus"
 SOV_new_history: "El comienzo de la nueva historia"
 SOV_new_history_desc: "Boris Nadezhdin is a true chameleon of modern Russian politics. He has tried to run for office from many different parties: \"Just Russia\", \"Civil Initiative\", \"Party of Growth\" and \"United Russia\" - but regardless of the party, he has always been a systemic liberal and spoke about the need to reform the Russian state.\n\nThese are probably the reasons why he managed to get the main position in the Russian Federation - the post of president. And Nadezhdin will do everything to implement his promises of liberalization and social justice, his vision of a New Russia.\n\nThe Putin story is slowly transforming into a new, reformed, liberal one."
 SOV_popularize_front: "Popularizar el frente"
 SOV_popularize_front_desc: "Despite its name, the All-Russian People's Front is not a reflection of the opinion of the Russian people, but merely a projection of the will of United Russia. Political statements instead of deeds, populism and oligarch lobbying - these things have haunted the All-Russian People's Front since its inception. Our task is to give young and promising figures who reflect the mood of the people full carte blanche to run the Front. Nadezhdin is not a leader of stiff-necked old bureaucrats, but of passionate and purposeful boys and girls who are ready to change Russia for the better!"
 SOV_comprehensive_political_integration: "All-Encompassing Political Integration"
 SOV_comprehensive_political_integration_desc: "Outside of official Russian politics, there are countless opinion leaders who influence popular sentiment. Often these people are labeled \"scum of the West\" and \"on the payroll of Brussels,\" imprisoned and persecuted in every possible way. But now that Nadezhdin and his team are at the top of the Russian government, the attitude toward the opposition has changed. Instead of hostility, the course of cooperation and integration of the young into the political life of our homeland has been chosen. After all, we all have a common goal - a free and strong Russia!"
 SOV_establish_full_pluralism: "Establecer el pluralismo total"
 SOV_establish_full_pluralism_desc: "El ONF fue el intento de Medvédev de cambiar el sistema de Putin reuniendo a todas las fuerzas políticas posibles bajo su bandera: desde comunistas radicales hasta nacionalistas, desde liberales hasta conservadores. De hecho, resultó que incluso la ilusión de lucha política y competencia fue destruida en el país, y todos los partidos principales se unieron al Frente. ¡Solo el pueblo ruso decidirá a quién seguir!"
 SOV_defeat_political_apathy: "Derrotar la apatía política"
 SOV_defeat_political_apathy_desc: "Uno de los principales problemas del desarrollo político en Rusia es, sin duda, la apatía política de los ciudadanos de nuestro país, su falta de voluntad para participar en la vida política. Bajo Putin y Medvédev, este hecho se consideraba una ventaja: cuanto menos gente participara en los procesos políticos, mejor sería para las autoridades: se reduciría la posibilidad de inestabilidad.\n\nPara la nueva Rusia de Nadezhdin, la apatía política es un vicio heredado. Para que nuestras reformas no se desperdicien, debe ser tratada: encuestas, fomento de la actividad social y política, promoción de los jóvenes, el trabajo con la población debe mostrar que el propio pueblo ruso, no el gobierno, ¡determina su propio destino!"
 SOV_concept_moderate_center: "El concepto de centro moderado"
 SOV_concept_moderate_center_desc: "No tenemos que destruir por completo el legado de Medvédev en forma del ONF. Como muchas otras cosas en el sistema de Putin, el Frente debe ser reformado para que funcione perfectamente. Reformado en una fuerza que sea capaz de representar los intereses del pueblo, no los intereses de los burócratas.\n\nCon este fin, se ha creado el concepto de un \"centro moderado\": la erradicación de varios radicales tanto de la izquierda como de la derecha del ONF; todos aquellos que podrían representar una amenaza para la democracia rusa."
 SOV_reform_institutions_power: "Reform the Institutions of Power"
 SOV_reform_institutions_power_desc: "The Russian government machine has been in operation for a long time, but over time it is beginning to break down and its faults are becoming apparent. The system suffers from extreme bureaucratization and sluggishness, and the population is tormented by its injustice.\n\nIt is necessary to drain this swamp: retire the inefficient, promote the young and talented, remove dozens of meaningless and similar structures, strengthen the digitalization of state institutions, and restore people's trust in the government. The state should work for the people, not the people for the state!"
 SOV_enact_new_front_framework: "Enact New Framework of People's Front"
 SOV_enact_new_front_framework_desc: "Now that all kinds of radicals have been cut off from the levers of our country's governance, we can outline a new framework for the Popular Front. It will include purely democratic forces: from social democrats to conservatives. They may differ in their views, but the ONF's goals must be unified: serving the people, protecting their interests and Russian democracy. In fact, it is a centrist coalition that will have one of the leading positions in Russian politics."
 SOV_fill_front_with_loyal_reformers: "Fill Front With Loyal Reformers"
 SOV_fill_front_with_loyal_reformers_desc: "At the moment, the ONF is a collection of conservative politicians from the Medvedev era who are actively putting sticks in the wheels of the new Nadezhdin government. In this regard, in order to ensure the stability of the new government, the Front must be liberalized by replacing old cadres with new ones loyal to Nadezhdin and his ideas. Such an update will help neutralize internal resistance and accelerate the implementation of necessary reforms."
 SOV_nadezhdin_new_vertical: "Nueva vertical de Nadezhdin"
 SOV_nadezhdin_new_vertical_desc: "The old government apparatus is completely unsuitable for continuing liberal reforms. The current management system is too closely linked to the conservative elements of the ONF, whose representatives are unlikely to be happy to support the initiatives of the new government. Therefore, according to Nadezhdin's plan, the existing vertical of power should be completely dismantled: all stagnant and outdated elements should be removed, and a new generation of managers will finally have the opportunity to realize themselves. After all, Nadezhdin knows that reforms do not begin with laws and pieces of paper, but with the replacement of those who implement them."
 SOV_full_liberalization: "Liberalización total"
 SOV_full_liberalization_desc: "The Government's next initiative should be an uncompromising liberalization of public policy. The provision of civil liberties, the expansion of anti-corruption measures, the protection of the interests of the people and many other initiatives will be brought to the fore.\nThese steps are designed to ensure public confidence in the government and create a solid foundation for further development. The Nadezhdin government intends to demonstrate that the new policy is not empty promises, but real changes."
 SOV_secure_presidential_republic: "Secure the Presidential Republic"
 SOV_secure_presidential_republic_desc: "History has repeatedly shown that Russian democracy achieves stability and the necessary effectiveness only with expanded presidential powers. There should be a clear separation of powers: parliament is the legislative branch, the President is the executive branch, and nothing else.\nThis approach allows us to avoid managerial chaos and maintain a unified order of responsibility. In the context of active reforms, it is a strong presidential government that can ensure decisiveness in making key decisions."
 SOV_strengthen_local_self_government: "Strengthen Local Self-Government"
 SOV_strengthen_local_self_government_desc: "In the modern world, democratic institutions must be present not only at the national level, but also at the local level. People should be able to influence decisions about their daily lives through local governments."
 SOV_full_transparency_elections: "Full Electoral Transparency"
 SOV_full_transparency_elections_desc: "One of the first steps that Nadezhdin intends to take is a fundamental reform of the electoral process based on the principles of full transparency and honesty. All elections in the country, from municipal to federal, must be held openly, under public control and without fraud. After all, Nadezhdin does not have the slightest reason to hide anything from the people of Russia, since it is the people who are the source of power."
 SOV_social_justice: "Justicia social"
 SOV_social_justice_desc: "One of the priorities of the Nadezhdin government will be the development of a reliable state social security program. Every citizen should be guaranteed a decent pension, every needy person should receive the necessary benefits, and every family should receive stable financial support.\nThe new Government's social policy will be based on the principles of fairness, universality and transparency. The main goal is to provide people with confidence in the future and to show the people that the state really cares about their problems."
 SOV_independent_justice: "Independent Judicial System"
 SOV_independent_justice_desc: "In the context of ongoing democratization, the creation of an independent judicial branch of government is a necessary step. The judicial system is one of the key institutions of the State, so it must be immediately reformed and liberalized along with other areas of government.\nNadezhdin's plan is to ensure a truly unbiased justice for the Russian people. Independent courts will become a guarantee for the protection of citizens' rights and an effective tool for controlling power. In such conditions, a real State governed by the rule of law will be formed."
 SOV_new_hope: "Nueva esperanza"
 SOV_new_hope_desc: "Этот город, не похожий ни на что вокруг\nУлыбается прохожий, и за пять минут\nПомогая человеку верить в чудеса\nРаспускаются фонтаны прямо в небеса\n\nЯ не знаю, где ещё на этом свете\nЕсть такая же весна\nЯ, пожалуй, отпущу попутный ветер\nИ останусь навсегда\nС тобою"
 SOV_new_national_government_desc: ""

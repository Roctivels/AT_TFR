 SOV_the_long_lasting_state: "El Estado duradero"
 SOV_the_long_lasting_state_desc: "El Estado ruso ya ha pasado por tres iteraciones. El Estado de Iván el Oscuro, el Estado de Pedro el Grande y el Estado de Lenin. Todos ellos, de una forma u otra, se mantuvieron durante muchos años hasta que cayeron bajo el asalto de las implacables arenas del tiempo. Pero ahora es el turno de un nuevo Estado, el Estado de Putin. No se parece a los Estado \"profundos\" occidentales. ¡Oh no! Durante mucho tiempo, el Estado saca a relucir sus partes antiestéticas, demostrando elementos brutales. Pero esa es también su aterradora honestidad. No nos escondemos detrás de procesos democráticos, sino que respondemos a los desafíos del tiempo honestamente, con fuerza cuando es necesario y con palabras cuando es necesario. ¿Qué tipo de Estado profundo puede haber? ¡Todo está a la vista! Este sistema puede que no sea perfecto, pero definitivamente vivirá varias décadas más. Si no por muchos siglos."

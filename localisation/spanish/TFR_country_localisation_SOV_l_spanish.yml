 SOV_our_common_values: "Nuestros valores comunes"
 SOV_our_common_values_desc: ""
 SOV_promote_ethnic_commonality: "Promover la comunidad étnica"
 SOV_promote_ethnic_commonality_desc: ""
 SOV_three_slavic_sisters: "Tres hermanas eslavas"
 SOV_three_slavic_sisters_desc: ""
 SOV_the_new_union_treaty: "Nuevo Tratado de la Unión"
 SOV_the_new_union_treaty_desc: ""
 SOV_reform_fsb_into_kgb: "Reformar el FSB en KGB"
 SOV_reform_fsb_into_kgb_desc: ""
 SOV_dream_lives_on: "El sueño continúa"
 SOV_dream_lives_on_desc: ""
 SOV_continue_our_partnership: "Corporativismo ruso"
 SOV_continue_our_partnership_desc: "En los años 90, personas con cierta vena emprendedora surgieron de las filas del Komsomol: los oligarcas. Habiéndose vuelto fabulosamente ricos sobre las ruinas de la Unión Soviética, crearon corporaciones que no tenían rival en el mercado ruso. Con el tiempo, algunos lo perdieron todo al involucrarse en áreas donde no debían, mientras que otros se fusionaron con el Estado y comenzaron a asistirlo en todo lo posible. Por supuesto, la influencia de los oligarcas ya no es tan significativa, pero su legado -enormes corporaciones- se adapta bien a las necesidades del Estado ruso. ¡Gracias a ellos, podremos elevarnos a alturas sin precedentes!"
 SOV_prioritize_state_corporations: "Priorizar corporaciones estatales"
 SOV_prioritize_state_corporations_desc: "Las corporaciones estatales desempeñan un papel fundamental en la economía rusa, actuando como palanca de control estatal: se les ha otorgado un control prácticamente monopolístico sobre las industrias más importantes. Gazprom, Rosatom, Roscosmos; hay innumerables ejemplos, y necesitamos centrarnos en nuestras fortalezas. Los atlantes sostienen el cielo, y necesitamos ayudar a estos atlantes."
 SOV_expand_resource_market: "Expandir el mercado de recursos"
 SOV_expand_resource_market_desc: "Nuestro país es rico en recursos naturales: níquel, gas, petróleo, diamantes... lo tenemos todo, demasiados para enumerar. Durante mucho tiempo, nuestra economía dependió de la exportación de recursos a Europa, pero tras el inicio de la guerra europea, este canal, por razones obvias, dejó de existir. Entonces, ¿por qué limitarnos a Europa? Asia, África, América; los mercados de estas regiones nos reciben con los brazos abiertos."
 SOV_fund_industrial_rejuvination: "Financiar el rejuvenecimiento industrial"
 SOV_fund_industrial_rejuvination_desc: "Aunque la industria rusa moderna no es un desastre total, como lo fue en los años 90, carece de la escala de Estados Unidos y, aún más, de China. El colapso de la URSS y la posterior privatización causaron un daño irreparable al potencial industrial de Rusia, y aunque hemos logrado recuperarnos parcialmente, la Guerra Europea ha expuesto nuestra debilidad. Es necesario estimular la restauración de las empresas soviéticas, tanto civiles como militares."
 SOV_business_as_usual: "Como de costumbre"
 SOV_business_as_usual_desc: "La economía rusa ha experimentado muchos altibajos: los turbulentos años 90, los dorados 2000 y los ambiguos 2010. Pero ahora, a través de las tormentas y tempestades de la guerra europea, a pesar de todas las sanciones, hemos sobrevivido. El dinero de los recursos fluye de nuevo a las arcas, y nuestra gente está satisfecha con sus vidas. Hemos vuelto a lo que perdimos después de 2020: estabilidad y prosperidad.\n\nTodo sigue como siempre. Todo está como debe ser."
 SOV_special_economic_zones: "Zonas económicas especiales"
 SOV_special_economic_zones_desc: ""
 SOV_guarantee_social_security: "Garantizar la seguridad social"
 SOV_guarantee_social_security_desc: "Debido a las peculiaridades de nuestro sistema, el sector social es uno de los principales pilares de Rusia, y uno de nuestros talones de Aquiles. Los hospitales tienen falta de personal, las pensiones son bajas y la gente sufre de injusticia y burocracia. Necesitamos introducir las tecnologías más avanzadas en nuestro sistema social: digitalización, redes neuronales y otras mejoras para el beneficio de la gente. El poder viene del pueblo y es para el pueblo."
 SOV_modernize_the_cities: "Modernización urbana"
 SOV_modernize_the_cities_desc: ""
 SOV_renovate_education_facilities: "Renovar instalaciones educativas"
 SOV_renovate_education_facilities_desc: "El sistema educativo ruso tras el colapso de la URSS deja mucho que desear: burocracia excesiva, escasez de personal, salarios bajos y casi ningún respeto por la profesión; todo esto disuade a los jóvenes profesionales de la enseñanza. Esta situación no puede continuar: educar a las nuevas generaciones es una tarea vital que afecta a todo el Estado.\n\nAumentar el número de plazas en universidades y escuelas, subir los salarios y reducir la carga de trabajo de los profesores son medidas que ayudarán al sistema educativo ruso a salir de la crisis. ¡Rusia empieza poco a poco!"
 SOV_dominate_the_oligarchs: "Nueva era rusa del capitalismo"
 SOV_dominate_the_oligarchs_desc: ""
 SOV_support_private_initiative: "Apoyar la iniciativa privada"
 SOV_support_private_initiative_desc: ""
 SOV_reform_central_bank: "Reformar el Banco Central"
 SOV_reform_central_bank_desc: ""
 SOV_restructure_state_corporations: "Reestructurar corporaciones estatales"
 SOV_restructure_state_corporations_desc: ""
 SOV_reinforce_economic_nationalism: "Reforzar el nacionalismo económico"
 SOV_reinforce_economic_nationalism_desc: ""
 SOV_russian_heyday: "Apogeo ruso"
 SOV_market_supremacy: "Supremacía del mercado"
 SOV_market_supremacy_desc: "No tenemos ninguna razón para reinventar la rueda, ya que la tarea de consolidar el control ruso ya es difícil. Lo que necesitamos es expandir radicalmente nuestra economía para sostener tanto nuestro nuevo bloque económico como las crecientes economías del hemisferio sur. Flexibilizar la regulación, reducir los impuestos, el apoyo gubernamental... cualquier cosa para asegurar nuestro dominio."
 SOV_russian_way_to_capitalism: "Camino ruso al capitalismo"
 SOV_russian_way_to_capitalism_desc: "¿Por qué debemos centrarnos en el PIB o en las métricas de crecimiento cuando no abordan el punto principal para el crecimiento económico: la prosperidad de la gente? Nuestras corporaciones, durante mucho tiempo, no estuvieron cerca del ciudadano de a pie, y el ejemplo estadounidense tampoco es ideal. No debemos asegurar un crecimiento constante, sino asegurarnos de que nuestra economía sea sostenible y orientada al ser humano. Rusia abrirá un nuevo camino para la gobernanza capitalista. ¡El verdadero sueño de un trabajador!"
 SOV_give_free_rein_private_initiative: "Apoyar a las pymes"
 SOV_give_free_rein_private_initiative_desc: "Nuestras pequeñas y medianas empresas necesitan ayuda financiera. Nuestra economía civil sufrió un duro golpe durante la guerra, y todo lo que no sean nuestras grandes corporaciones aún lucha por recuperarse. Nuestra administración invertirá en nuestros emprendedores para asegurar que nuestras industrias no se estanquen y sigan siendo competitivas."
 SOV_creation_business_committees: "Formar Comités Empresariales"
 SOV_creation_business_committees_desc: "En comparación con las economías europeas y americanas, nuestras empresas son... demasiado amateur, por decir lo menos. No tenemos la cultura accionarial que tenía Occidente, ni siquiera los comités empresariales simples son tan favorecidos. Para asegurarnos de que nuestra economía siga siendo el gigante, debemos adoptar los métodos occidentales de gobierno corporativo."
 SOV_encourage_competition_banking_market: "Fomentar competencia justa en el mercado"
 SOV_encourage_competition_banking_market_desc: "Tal como está, nuestras grandes corporaciones son demasiado estáticas. Si bien nos gustaría usar el ejemplo estadounidense de corporaciones como Apple con su dominio del mercado, el modelo chino de cooperación corporativa puede usarse de manera más efectiva en nuestro caso. Las corporaciones, al cooperar constantemente entre sí en proyectos, asegurarán la prosperidad de todos los rusos."
 SOV_economic_expansion_europe: "Expansión económica en Europa"
 SOV_economic_expansion_europe_desc: "¿Por qué limitarnos solo a Rusia? Tenemos, literalmente, la mitad del continente a nuestra disposición. La economía solo puede mejorar. A nuestros aliados europeos les encantarán nuestras inversiones y beneficios corporativos. ¿La mejor parte? No podrán decir que no."
 SOV_russian_economic_giant: "Gigante económico ruso"
 SOV_russian_economic_giant_desc: "Somos un leviatán. Uno que Europa no ha visto desde la Primera Guerra Mundial. Un verdadero gigante europeo. Sin embargo, no nos detendremos aquí. Si China y la OTDP tienen sus mercados propios, ¿por qué no deberíamos competir con ellos también? Somos una nación más adecuada para los negocios, y nuestros empresarios asegurarán nuestro dominio en los años venideros."
 SOV_new_economic_ecosystem: "Nuevo ecosistema económico"
 SOV_new_economic_ecosystem_desc: "Nuestro modelo económico había sido durante mucho tiempo el de un capitalismo de Estado. Sin embargo, nuestra tarea de transformar nuestra economía hacia una más orientada a las personas debe asegurarse también desde la base. Animemos a las entidades no estatales a que nuestras reformas son justas, y asegurémonos de que cumplan las reglas."
 SOV_promote_economic_transformation: "Promover transformación económica"
 SOV_promote_economic_transformation_desc: "Una economía diversificada, con un impuesto más progresivo para las grandes corporaciones, utilizando todas las maravillas tecnológicas modernas para asegurar la eficiencia. Debemos asegurar la digitalización para que esto funcione, por supuesto, porque el nuevo milagro económico no vendrá con una mentalidad empresarial de principios de los años 2000."
 SOV_support_management_of_future: "Apoyar la gestión del futuro"
 SOV_support_management_of_future_desc: "Al igual que la economía en su conjunto, nuestra clase directiva debe adaptarse a nuestros cambios. Menos un engranaje sin alma en la máquina, más un solucionador de problemas eficaz. Deben ser capaces de utilizar la tecnología moderna y depender menos de la impresión. También se debería considerar la digitalización de sus trabajos para reducir el tiempo dedicado al papeleo."
 SOV_mutually_beneficial_economic_union: "Unión Económica de Beneficio Mutuo"
 SOV_mutually_beneficial_economic_union_desc: "La esfera que tenemos bajo nosotros puede ser utilizada para nuestro único beneficio económico, pero ¿es realmente necesario? Somos, a todos los efectos, el líder de la OTSC y de la nueva esfera económica. No necesitamos dominar los mercados europeos como un señor colonial. Así como aseguramos beneficios mutuos dentro de Rusia, deberíamos asegurar una relación de beneficio mutuo con nuestros aliados europeos. Si nos aseguramos de que sean competitivos al igual que nosotros, entonces nuestra esfera prosperará junta."
 SOV_formation_communitarist_economy: "Formación de la economía comunitarista"
 SOV_formation_communitarist_economy_desc: "Rusia se está transformando. Una economía para el pueblo, por el pueblo. Donde las corporaciones y los negocios se preocupan más por el consumidor que por aumentar su valor de mercado. Aunque este proceso pueda ser frágil e insostenible a largo plazo, es nuestro trabajo hacerlo sostenible. No necesitamos dominar la economía mundial como lo hicieron los estadounidenses o los chinos. Solo necesitamos asegurar nuestra propia prosperidad. ¡Rusia por encima de todo!"
 SOV_develop_innovation: "Desarrollar innovaciones"
 SOV_develop_innovation_desc: "Para competir con las economías modernas, las cifras brutas no son suficientes. Las innovaciones, los avances tecnológicos y los cuadros cualificados de nuestra gente serán necesarios para los objetivos futuros. Rusia tiene mucha gente inteligente. Solo necesitamos apoyarlos en sus esfuerzos."
 SOV_reduce_pressure_business: "Reducir presiones sobre empresas"
 SOV_reduce_pressure_business_desc: "¿Por qué necesitamos tantas regulaciones? No debemos repetir el mismo error que cometió la UE al sobrerregular sus economías. ¡La economía rusa solo puede crecer, no estancarse!"
 SOV_restructure_tax_system: "Reestructurar el sistema impositivo"
 SOV_restructure_tax_system_desc: "Nuestro sistema fiscal, hay que admitirlo, no es tan ideal como uno esperaría. Tanto para las empresas como para los ciudadanos. Demasiadas lagunas, demasiados mecanismos impositivos anticuados. Para que Rusia asegure la prosperidad en las próximas décadas, debemos asegurarnos de que nuestro sistema fiscal esté a la altura de los estándares modernos."
 SOV_develop_alternative_investment_mechanisms: "Desarrollar mecanismos de inversión alternativos"
 SOV_develop_alternative_investment_mechanisms_desc: "El pueblo ruso, lamentablemente, no confía en las empresas de inversión. Durante la mayor parte de nuestra historia moderna, era común invertir el dinero en viviendas o apartamentos en lugar de acciones. Debemos desarrollar métodos más accesibles para que la gente invierta su dinero. ¡Rusia entrará en el mercado moderno en igualdad de condiciones con el resto!"
 SOV_transparent_state_corporations: "Corporaciones estatales transparentes"
 SOV_transparent_state_corporations_desc: "Gracias a la digitalización de nuestra economía, se puede hacer realidad un sueño que nuestra agencia tributaria tenía desde sus inicios: una economía totalmente transparente. Hemos sabido que algunas de nuestras corporaciones estatales malgastan dinero en cosas inútiles, solo para pedirnos más. Sin embargo, ahora, al tenerlas como un libro abierto, tales esfuerzos serán cada vez más difíciles de llevar a cabo. Rusia no necesita derrochadores, y si alguien quiere robarnos dinero de nuestros bolsillos, tanto nosotros como el pueblo lo sabremos."

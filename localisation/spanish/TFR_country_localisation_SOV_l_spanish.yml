 SOV_dire_times_emergency: "Tiempos difíciles"
 SOV_dire_times_emergency_desc: "La derrota en la batalla no es el mayor sufrimiento para la Madre Patria. Es la desesperación y el conflicto interno que le siguen, amenazando con arrastrar a Rusia a la ruina. En este momento crítico, Serguéi Shoigú, con el poder militar en sus manos, se erige como el potencial salvador de Rusia, o como el hombre que podría llevar al país al colapso total en un solo día. Con el Gobierno sin líder y el partido Rusia Unida fracturado, todos los ojos están puestos en Shoigú para ver si seguirá los pasos del Comité Estatal para el Estado de Emergencia y hará rodar tanques T-90 hacia Moscú..."
 SOV_calm_the_population: "Calmar a la población"
 SOV_calm_the_population_desc: "A pesar del riesgo de desprecio y duras críticas, los altos funcionarios del Gobierno deben salir de sus oficinas y relacionarse con la gente en las calles. Antes de recurrir a la violencia, esta es la única opción viable. Con el exlíder, Dmitri Medvédev, desaparecido, el Gobierno interino, apenas sostenido por Shoigú, debe hacer todo lo posible para gestionar esta crisis. Es como obligar a un recién nacido, que acaba de aprender a caminar, a correr, solo que hay un lobo hambriento persiguiéndolo por detrás."
 SOV_pledge_of_retribution: "Promesa de revancha"
 SOV_pledge_of_retribution_desc: "Puede que el mundo occidental crea haber doblegado el espíritu de Rusia, pensando que los rusos derrotados ya no tendrán el coraje ni la fuerza para oponérseles. Sin embargo, la realidad pronto les demostrará lo contrario. La ira profunda de millones se convertirá en nuestro salvavidas. Canalizando esta emoción colectiva, pretendemos unir al pueblo y construir un frente común contra nuestros enemigos, especialmente a medida que la credibilidad del Gobierno flaquea. Solo podemos esperar que esta estrategia no solo preserve al Gobierno actual, sino que también siente las bases para una futura venganza."
 SOV_spark_anti_occupation_resistance: "Desatar resistencia anti-ocupación"
 SOV_spark_anti_occupation_resistance_desc: "Desde la guerra civil rusa, ningún ejército extranjero ha pisado suelo ruso. Hoy, sin embargo, nos enfrentamos a esta humillación una vez más. Pero el pueblo ruso no aceptará esto pasivamente. Aquellos en las regiones ocupadas se levantarán y resistirán ferozmente a los nuevos ocupantes y a las fuerzas imperialistas. Apoyaremos a los grupos de resistencia secretos y a las facciones armadas por todos los medios posibles. La OTAN y Ucrania pueden seguir acusándonos de \"infiltración rusa\", pero serán impotentes para detenerla. Sus banderas -Polaris o azul-amarilla- no ondearán por mucho tiempo."
 SOV_national_front_for_salvation: "Frente Nacional de Salvación"
 SOV_national_front_for_salvation_desc: "El Imperio ruso tuvo en su día un grupo llamado \"Frente Nacional de Salvación\", pero no está claro si eran verdaderos patriotas o simplemente entusiastas de la cultura occidental de los salones de San Petersburgo. Ahora, sin embargo, Rusia necesita que sus patriotas más fuertes se unan y aseguren el futuro de la Madre Patria. En el corazón de la Duma Estatal, reuniremos a facciones políticas opuestas para debatir los asuntos del país, aunque algunas voces extremas puedan intentar infiltrarse en la conversación."
 SOV_voice_for_unheard: "Una voz para los no escuchados"
 SOV_voice_for_unheard_desc: "En las calles y callejones de Rusia, un término que antes infundía temor ahora se susurra en voz baja: \"eurasianismo\", junto con el nombre de su fundador, Aleksandr Duguin. Considerado en su momento como una figura peligrosa, este controvertido politólogo está ganando cada vez más apoyo entre el sufrido pueblo ruso. A medida que sus ideas cobran fuerza, pronto podríamos enfrentarnos a decisiones que antes eran impensables: Duguin podría pisar pronto los suelos de mármol del Kremlin como invitado."
 SOV_put_down_anti_russian_revolts: "Reprimir revueltas anti-rusas"
 SOV_put_down_anti_russian_revolts_desc: "Desde San Petersburgo hasta Vladivostok, toda Rusia está bajo ataque. Con el liderazgo político ahora de acuerdo, es hora de actuar con decisión y restaurar el orden antes de que las cosas empeoren. Nunca permitiremos que los traidores de la nación rusa -aquellos que atacan cuando estamos caídos- pisoteen nuestra dignidad. La falsa bandera de la \"Legión «Svoboda Rossii»\" nunca ondeará en suelo ruso."
 SOV_form_guidance_council: "Formar un Consejo de Orientación"
 SOV_form_guidance_council_desc: "Basándonos en el Frente Nacional de Salvación, estableceremos un Consejo de Orientación que asumirá el papel de Gobierno interino, reuniendo a todas las principales facciones políticas. Esta podría ser la primera vez desde el 2000 que Rusia Unida ha aceptado compartir el poder. Dentro de este consejo, surgirá un nuevo liderazgo colectivo para Rusia, una vez que la situación se estabilice."
 SOV_time_for_new_management: "Una administración nueva"
 SOV_time_for_new_management_desc: "Ha llegado el momento: el Kremlin dará la bienvenida a su primer filósofo-gobernante. ¿Qué papel jugarán este excéntrico barbudo y su eurasianismo en el futuro de Rusia? ¿Se aliviarán las tensiones en el país, o se profundizarán, dividiendo aún más a la Madre Patria y a su gente? ¿Qué papel jugará Shoigú, quien llevó a Duguin al corazón del poder? ¿Este general moverá los hilos entre bastidores, o será pronto marginado por los nuevos actores del poder? ¿O quizás el propio Duguin es simplemente una \"figura de transición\"? A pesar de la incertidumbre, una cosa está clara para todos los rusos: el reloj que mide la historia ha comenzado a andar."
 SOV_prepare_the_eurasianist_party: "Preparar el Partido Eurasianista"
 SOV_prepare_the_eurasianist_party_desc: "El negro y el azul de los colores de nuestro partido reinan supremos, ya que es hora de que nuestro bloque sea instituido en los salones y pasillos del poder; el tiempo de la campaña y la difusión de nuestras teorías ha terminado. Nuestros funcionarios del partido están siendo capacitados y advertidos de sus nuevos roles gubernamentales como administradores y líderes de una nueva Rusia. Nuestras teorías no serán teorías, sino políticas y determinantes de las nuevas decisiones gubernamentales."
 SOV_popularize_dugin_works: "Popularizar las obras de Duguin"
 SOV_popularize_dugin_works_desc: "Después de todos los filósofos modernos, ya sea Noam Chomsky o Slavoj Žižek, no hay ninguno tan talentoso en el ámbito de la teoría geopolítica como Aleksandr Duguin. Sus obras sobre la Cuarta Teoría Política han sido primordiales en el escenario mundial y aún más críticas para Rusia como vehículo para avanzar hacia una posición de poder absoluto. Algo de tal calibre genial no es solo para una alternativa política de nicho y marginal, sino que será público para todos. La civilización euroasiática debe celebrarse con el más alto calibre posible y, con los escritos de Duguin en las estanterías, nos será mucho más fácil encontrar rusos con ideas afines que acudan en masa a la teoría ideológica eurasianista, menos una teoría y más una realidad, y la gente estará feliz de marcar el comienzo de una nueva edad de oro para que todo el mundo ruso se regocije. Que los libros vuelen de las estanterías y el resto de los planes que Duguin tiene se harán realidad."
 SOV_philosopher_at_helm: "Filósofo al mando"
 SOV_philosopher_at_helm_desc: "Duguin lo ha logrado, lo imposible dirían algunos, el filósofo más grande de nuestro tiempo, Aleksandr Duguin, ha tomado Rusia por asalto. Por el milagro del destino mismo, Duguin ha sido llevado al asiento del poder. Es realmente un momento para unirnos en un tiempo tan alegre, celebrar, beber, festejar, porque el camino por delante será duro y agotador, pero nada puede romper el espíritu ruso. Nuestra águila envalentonada volará muy por encima del mundo occidental y mostrará la era como una era para el mundo ruso con todo su orgullo y gloria.\n\nNo más humillaciones, las llamadas de castigo de Occidente diciéndonos cómo gobernar y dictar nuestras propias vidas. Nuestro pueblo, nuestra Rusia, ha comprendido su propósito como los que deben promulgar el verdadero orden multipolar de la política global. Abajo la degeneración moral estadounidense, abajo la ética occidental de la democracia, con la hegemonía del orden occidental; todo ello les será arrebatado. Dejémoslos desnudos para que el mundo vea su absoluta vergüenza. Rusia será libre de esta indecencia y también lo será el mundo."

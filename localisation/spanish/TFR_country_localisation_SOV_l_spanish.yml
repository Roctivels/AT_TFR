 russia.595.a: "¿Genial?"
 russia.596.t: "Revolución en Yemen"
 russia.596.d: "Las calles de Saná están en silencio. En los mercados que antes bullían de actividad, montañas de casquillos de bala brillan orgullosas a la luz del amanecer. Los cadáveres están cubiertos con periódicos. Desde los pocos minaretes que aún quedan en pie, comienza el adhan para el fajr. Los muecines se ven obligados a competir por la atención mientras ondean las banderas rojas de una revolución victoriosa.\n\nEn el-Rahaba, un IL-76 se alinea en la pista, su interior lleno de conversaciones emocionadas pero suaves en ruso. En unas pocas horas estarían en casa, sanos y salvos. Los ascensos estarían a la orden del día por una misión tan exitosa."
 russia.596.a: "Otra ficha cae."
 russia.597.t: "Revolución en Arabia"
 russia.597.d: "TODO: KGB backed Socialist revolution in Arabia succesful"
 russia.597.a: "¡Genial!"
 russia.598.t: "Revolución en Irán"
 russia.598.d: "TODO: KGB backed Socialist revolution in Iran succesful"
 russia.598.a: "¡Genial!"
 russia.599.t: "¡El Centro Yeltsin apoya la operación militar!"
 russia.599.d: "Pocas semanas después del inicio de la operación militar especial, el Centro Yeltsin publicó un vídeo titulado \"¡Lucha, soldado!\", que muestra la deconstrucción de la imagen de Yeltsin creada por los liberales. Muestra el comienzo de la lucha contra los separatistas y los wahabíes en el Cáucaso, el apoyo de Yeltsin a Serbia en un momento crítico y, lo más importante, su fe en el presidente Putin. Al final se afirma que \"hoy tenemos todas las razones para creer que Yeltsin apoyaría la decisión de lanzar una operación militar especial\". Después de eso, la cita de Yeltsin aparece sobre un fondo negro: \"¡Cuida bien de Rusia!\".\n\nLos medios liberales y comunistas prooccidentales, por supuesto, se retractaron de todo lo dicho en el vídeo, y los blogueros liberales comenzaron inmediatamente a criticar a la nueva dirección del Centro Yeltsin. Las estadísticas del sitio yeltsin.ru aumentaron en múltiples números, y las entradas para el Museo Yeltsin comenzaron a agotarse rápidamente, lo que generó muchos ingresos para el Museo, que prometen gastar en ayudar a nuestros militares. VESTI realizó una encuesta a los visitantes preguntando por qué decidieron visitar el Centro Yeltsin, uno de los entrevistados respondió: \"Los acontecimientos recientes me convencieron de visitar el Centro Yeltsin, por supuesto que trato a Yeltsin negativamente, ¡pero estoy de acuerdo con la dirección del museo!\" - lo que explica la opinión popular de manera bastante sucinta."
 russia.599.a: "¡Unidad en tiempos de necesidad!"
 russia.600.t: "Maksim Katz es elegido primer ministro"
 russia.600.d: "texto de ejemplo"
 russia.600.a: "Vot Takiye Pirogi"
 russia.601.t: "Operación: Antorcha es activada"
 russia.601.d: "Muchos dirían que vengarse de quienes te hirieron te hace igual que ellos, ¿y qué? De la venganza viene la catarsis y de la catarsis viene la paz.\n\nEn este fatídico día, la operación Antorcha se puso en marcha, varias divisiones del ejército ruso y los escuadrones de la muerte de Navalni desembarcaron en las calles de Londres. El asombro en los rostros de los ingleses fue un espectáculo digno de ver mientras los monumentos culturales eran incendiados, las calles se cubrían con la niebla de nuestras armas químicas y la abrumadora potencia de fuego de nuestros escuadrones de la muerte contra las fuerzas defensivas de los británicos.\n\nObjetivo principal: Venganza. Objetivo secundario: Infligir cicatrices en el espíritu británico hasta tal punto que nunca más se atreverían a levantar sus armas contra nosotros y nuestros hijos.\n\nEn cuestión de horas, las calles de Londres quedaron en silencio, salvo por los sonidos ocasionales de llantos y tiroteos distantes, una ciudad entera cubierta por una niebla tóxica. Aún no hemos terminado, hay toda una isla que someter a nuestro juicio, permanentemente."
 russia.601.a: "Pagarán..."
 russia.602.t: "La cuestión de San Petersburgo"
 russia.602.d: "Con Rusia de nuevo en el buen camino, hay muchas imperfecciones y errores que corregir, y preguntas que responder, una de ellas sobre San Petersburgo.\n\nLa ciudad tiene una historia larga y rica, es imposible ignorar su significado cultural e histórico, sin embargo, con Alemania destinada a ser nuestro enemigo mortal una vez más y el nombre sonando demasiado alemán, podría ser mejor cambiar su nombre de nuevo a Petrogrado, esto mostraría tanto a nuestra gente como a Alemania que nuestra lealtad no está con nadie más que con la Madre Patria.\n\nO bien, podemos mantener el nombre, para demostrar que estamos más allá de las pequeñas puñaladas por la espalda, no más bromas o actos simbólicos, solo acciones reales que nos impulsen hacia adelante."
 russia.602.a: "¡Petrogrado, no más nombres alemanes!"
 russia.602.b: "Siempre ha sido San Petersburgo."
 russia.603.t: "Establecimiento del Santísimo Sínodo Gobernante"
 russia.603.d: "Reformar un país es como un rompecabezas que nunca termina, pero asegurándonos de que las piezas correctas estén en el lugar correcto, podemos garantizar que el rompecabezas será más fácil para las próximas generaciones.\n\nPor eso, reemplazaremos el patriarcado con un nuevo Santo Sínodo; en lugar de una única figura de autoridad, habrá una división entre doce figuras, de manera similar a como lo hizo Pedro el Grande. Esto no solo disminuiría el poder de la iglesia, sino que también nos permitiría modernizar mejor nuestra nación sin demasiada resistencia vocal. Ya se han hecho suficientes protestas contra esto, pero nosotros sabemos más, y al final ellos entenderán esta decisión.\n\nPor supuesto, elegir a dedo a estas figuras clave sería la mejor idea, por lo tanto, uno de los primeros miembros será Aleksander Borísov, y junto con él nos aseguraremos de elegir a las personas adecuadas que estén más dispuestas a estar de acuerdo con nosotros."
 russia.603.a: "Limpiar la podredumbre."
 russia.604.t: "Fundación de la Plataforma Ultranacionalista"
 russia.604.d: "Tras el ultimátum de Kubán, un pequeño pero muy ruidoso grupo de ultranacionalistas dentro de la Rusia del futuro ha fundado su propia plataforma para promover su visión.\n\nTodavía leales a Navalni, han logrado crecer en popularidad ya que están a favor de ejecutar una venganza total contra Occidente y una purga de los enemigos internos de Rusia. Aunque poco convencional para nuestro partido, son la posible carta blanca que necesitamos para movilizar a la juventud y para promulgar políticas menos populares por el bien de la Madre Patria.\n\nA partir de ahora están creciendo en influencia y popularidad y, como el motor del estado, tenemos que decidir si cambiamos a su combustible de odio y radicalismo, o mantenemos un rumbo constante; sin embargo, nos serán útiles."
 russia.604.a: "Rusia tomará toda Europa, aunque solo sea cenizas."
 russia.606.t: "Navalni gana las elecciones presidenciales"
 russia.606.d: "¡Ya están los resultados de las primeras elecciones democráticas celebradas en Rusia desde 1991! Parece que Alekséi Navalni ha ganado la presidencia, tal como predijeron las encuestas de opinión, transformando su liderazgo provisional en uno permanente.\n\nEl país registró una participación del 68,7%, con 75.181.073 votantes. Moscú tuvo la mayor participación con un 92.8%, mientras que la República de Carelia tuvo la más baja con un 57,3%. En la primera ronda, Alekséi Navalni emergió como el ganador con el 52,9% de los votos. Navalni obtuvo la mayoría de los votos en San Petersburgo (85,4%) y recibió la menor cantidad en la región de Carelia (25%).\n\nMaksim Katz obtuvo el segundo lugar con un 29,2%, seguido por Yevgueni Stupin en tercer lugar con un 5,8%. Iván Putilin recibió el 3% de los votos, Grigori Yavlinski obtuvo el 2,7%, y Borís Titov recibió el 1,5%. Además, el 1,9% de los votantes votó en contra de todos los candidatos, con el mayor número de estas papeletas provenientes de Carelia con un 5,9%."
 russia.606.a: "¡Una victoria honesta!"
 russia.607.t: "La cuestión del PNB"
 russia.607.d: "En los últimos días se planteó un problema, en relación con una posible anulación de la prohibición del Partido Nacional Bolchevique. Fueron una de las muchas víctimas de los regímenes putinistas y sucesores, y estuvieron a la vanguardia de la resistencia contra la represión política. A pesar de su ideología radical, a menudo trabajaron con nosotros, coordinando protestas y otros eventos. Sería justo que finalmente les devolviéramos todo su arduo trabajo a lo largo de los años.\n\nSin embargo, su ideología extremista y la falta de, realmente, cualquier lealtad a nuestro sistema democrático y su amor por el Imperio Soviético, pueden resultar una amenaza también para nosotros. Después de todo, si hubiéramos vivido en un país normal en aquel entonces, nunca habríamos tenido que trabajar con estos elementos de la sociedad..."
 russia.607.a: "¡Sus flores también tienen derecho a florecer!"
 russia.607.b: "Nunca estuvimos de su lado."
 russia.608.t: "La cuestión de la izquierda"
 russia.608.d: "La administración de Navalni piensa qué hacer con los izquierdistas radicales."
 russia.608.a: "Tienen su derecho."
 russia.608.b: "Solo los izquierdistas \"democráticos\" pueden pasar."
 russia.609.t: "Dispersión de la Marcha Rusa"
 russia.609.d: "Hoy en Siktivkar, un grupo de leales a Wagner suprimió violentamente una marcha ultranacionalista. La marcha comenzó alrededor del mediodía y rápidamente superó a la pequeña fuerza policial enviada para controlar la protesta. Los líderes de la marcha incitaron a la violencia contra el Consejo Supremo de Oficiales y los héroes wagneritas.\n\nLas tropas de élite de Wagner fueron finalmente desplegadas por el Consejo Supremo y abrieron fuego contra los manifestantes, provocando su dispersión. Algunos individuos intentaron defenderse pero fueron rápidamente asesinados. Aquellos que fueron arrestados enfrentarán severas penas por su intento de golpe contra el gobierno ruso. Dos individuos, Bulat Bolótnikov y Katya Poglavnikova, quienes a pesar de estar brutalmente heridos ahora serán sometidos a un juicio farsa, en el que se les sentenciará a la pena de muerte, como ejemplo contra la disidencia; actualmente esperan su momento en IK-3 Harp.\n\nAunque algunos soldados de Wagner sienten remordimiento por sus acciones, se les recordará su lugar."
 russia.609.a: "Una demostración de fuerza."
 russia.610.t: "¡Navalni desaparece de prisión!"
 russia.610.d: "¡Terribles noticias! Tras los recientes disturbios en la prisión IK-3 Harp, el notorio criminal y adversario Alekséi Navalni ha desaparecido misteriosamente de su celda. La teoría predominante sugiere que él, posiblemente ayudado por un traidor o un compañero de celda cooperativo, logró escapar en medio del caos y la confusión, escabulléndose hacia la naturaleza. Las posibles consecuencias de esta fuga podrían ser nefastas si el paradero de Navalni no se determina y contiene rápidamente. El Consejo Supremo ha emitido una directiva para una extensa operación de búsqueda para localizar a Navalni y asegurar su captura.\n\nAdemás, más de otros 100 prisioneros también han aprovechado los disturbios para huir de IK-3 Harp, lo que genera preocupación sobre su posible implicación con Navalni o sus escapes independientes."
 russia.610.a: "¡Maldita sea!"
 russia.610.b: "Perevernite tam vse verh dnom!"
 russia.611.t: "Masacre de Dolgoprúdny"
 russia.611.d: "Noticias impactantes llegan desde la región de Moscú, donde una multitud de manifestantes, que se habían reunido de todos los campos ideológicos -navalistas, comunistas, nacionalistas e incluso putinistas-, se presentaron en una manifestación contra el Gobierno de Wagner. Gritaron eslóganes y coplas antigubernamentales, a menudo insultando a los oficiales del Consejo y al difunto Prigozhin. Entonces sucedió lo inesperado: uno de los soldados de Wagner perdió los nervios y abrió fuego contra la multitud. La gente, conmocionada por lo que estaba sucediendo, se confundió, aumentando así el número de víctimas. A diferencia del incidente en Siktivkar, debido a que la tragedia ocurrió en el centro de nuestro país, no pudo ser silenciada. Por la noche, todos los canales de Telegram y los medios independientes brillaron con imágenes sangrientas de Dolgoprúdny. Especialmente memorable fue la toma de un estudiante muerto sosteniendo un cartel que decía \"¡No quiero vivir en Vagneroidia!\".\n\nHabrá graves consecuencias..."
 russia.611.a: "Mda..."
 russia.612.t: "¡Protestas masivas en toda Rusia!"
 russia.612.d: "En nuestra prisa por sofocar el fuego que se extiende por Rusia, no hemos hecho más que echar leña a las llamas. Lo que comenzó como unas pocas protestas liberales aisladas se ha extendido rápidamente sin control, seguramente gracias a los agitadores occidentales. Estas protestas se han dirigido principalmente a nosotros, intentando destruir todo lo que hemos trabajado para reconstruir.\n\n¡Creen que somos su enemigo, y no los occidentales que nos metieron en esta situación en primer lugar! Si no hubieran disparado a Prigozhin, nada de esto estaría sucediendo, y no tendrían razón para amotinarse. Si se cumplen sus deseos, Rusia se convertirá en un infierno liberal occidentalizado. Debemos hacer algo urgentemente, no se nos puede permitir fallar de nuevo."
 russia.612.a: "¡Aplástenlos!"
 russia.612.b: "¡¿Qué está pasando?!"
 russia.612.c: "Se acabó..."
 russia.613.t: "\"Redención\""
 russia.613.d: "Recientemente, un libro recién publicado, \"Redención\", escrito por Maksim Kaláshnikov, un veterano de guerra, ha estado arrasando el país, específicamente por su inusual trama. El libro trata sobre unos años 2020 alternativos donde Vladímir Putin no falleció durante la pandemia, sino que continuó gobernando Rusia, y luego, en 2023, lanzó una OMAT (operación militar antiterrorista) en Ucrania para defender el Dombás. La historia se centra en Alekséi Navalni, quien está cumpliendo condena en este momento, pero es reclutado en el Batallón-Zet, una unidad de prisioneros mal equipada.\nAl principio, Alekséi odia todo lo relacionado con la guerra, y piensa que es injusta, e incluso considera escapar, solo para ser detenido por casualidad. A medida que avanza la historia, Navalni conoce a diferentes personajes y sus historias, incluyendo a un residente de Lugansk, un soldado udmurto y un voluntario de Moscú, y aprende sobre los horrores cometidos por las autoridades ucranianas y los mercenarios de la OTAN, lo que provoca el \"renacimiento\" de Lekha; se da cuenta de lo que esconde la democracia occidental y de la tragedia que ocurrirá si la junta de Kiev gana. Él, de un liberal que odiaba al gobierno, se convierte en un soldado ardiente, que más tarde toma el mando de la unidad, después de la muerte del comandante en batalla. El libro tiene un final agridulce, cuando durante el asalto a Kiev, Navalni con el distintivo \"SVOY\" es gravemente herido, pero al perder el conocimiento sonríe al escuchar los últimos y victoriosos gritos de \"¡Kiev es jodidamente nuestra!\".\n\nEl libro recibió grandes elogios del público, especialmente por su realismo y la historia de la tragedia del pueblo del Dombás, aunque Yegor Pipisev, un conocido crítico, lo calificó de \"esquizofasia putinista\"."
 russia.613.a: "¡Qué fantasía tan infantil!"
 russia.614.t: "Tu Imperio"
 russia.614.d: "Pasión por tu país. Uno de los sentimientos más puros que se pueden tener como ciudadano. Han pasado solo unas pocas semanas desde que el presidente Navalni reabrió los tres mástiles de San Petersburgo, como señal de buena voluntad y pragmatismo histórico adoptado por su administración, aunque ahora con la tricolor luciendo colores más apropiados.\n\nDespués de esto, las calles de muchas ciudades se están llenando de jóvenes que se autodenominan \"activistas patrióticos\", organizando reuniones, charlas, mítines y repartiendo panfletos. Vestidos con gabardinas pesadas y oscuras, a veces con brazaletes tricolores, y a menudo portando una bandera histórica de Rusia. No se ha rastreado ninguna conexión clara entre ellos y ninguna agencia gubernamental o partido político; la mayoría de ellos afirman ser parte de una organización activista no gubernamental llamada \"Unión para la Defensa de la Madre Patria\".\n\nMuchos políticos liberales han pedido al gobierno que intervenga y frene el \"claro peligro revanchista\" entre la juventud; sin embargo, la respuesta corta pero contundente del Kremlin a estas demandas fue: \"Las autoridades rusas no abrirán un proceso penal por patriotismo apasionado. Este es un país libre y democrático ahora\". Y con ello, estos activistas continúan deambulando por pueblos y aldeas, difundiendo el mensaje de apoyo al presidente y a las autoridades estatales."
 russia.614.a: "¡A través del olor a sangre, a sudor, te estoy moldeando para que seas un patriota!"
 russia.615.t: "Un día frío en Moscú"
 russia.615.d: "\"Tengo un sueño\", declaró la voz ronca de Navalni desde la estación de Ostánkino en Moscú, resonando por cada rincón de Rusia, \"que un día nuestro país se erija como un faro de democracia\", proclamó Alekséi, vestido con su uniforme militar adornado con las palabras «Presidente de Rusia». \"Pero para alcanzar esa meta, debemos navegar a través del desierto del odio y los prejuicios, a través de las mentiras sembradas por nuestros supuestos «socios»\", afirmó Navalni, señalando la bandera presidencial iluminada detrás de él.\n\n\"Estamos al borde de una nueva era. La OTAN, consumida por su frenesí rusofóbico, se romperá contra la fuerza inquebrantable de nuestros espíritus\", continuó, su mano formando un puño cerrado y una sonrisa adornando su rostro. \"Sin embargo, lamentablemente\", la expresión de Alekséi se volvió desdeñosa una vez más, \"Nuestros enemigos no se limitan a aquellos fuera de nuestras fronteras\". Aclarando su garganta, Navalni declaró: \"¡Con esto en mente, anuncio la suspensión de la Constitución actual y una revisión completa del Gobierno!\" Mientras millones veían la transmisión, una miríada de emociones invadió a la audiencia: risas, lágrimas, ira y alegría.\n\n\"No temáis, mis conciudadanos. Estos nuevos líderes han sido cuidadosamente seleccionados por mí y mis asesores de confianza. Están preparados para sacrificarlo todo por nuestra patria\", declaró Navalni, levantando ambos puños triunfalmente. \"El amanecer de una nueva era se acerca. Que Dios los bendiga a todos\"."
 russia.615.a: "Patriotas en control."
 russia.616.t: "Medidas de emergencia"
 russia.616.d: "La historia no está dictada por apretones de manos y turbios acuerdos a puerta cerrada, nuestros enemigos querrían hacernos creer eso, mientras Occidente se regodea en su victoria mal habida, se han vuelto ciegos a nuestro creciente deseo de venganza. La democracia es algo delicado, escuchar las voces de tu propio pueblo y atenderlas, pero con tantas diferencias entre sí, es inevitable que haya obstáculos en el camino. A veces, la voz de un solo hombre es todo lo que necesitamos, una voz formada por los deseos y anhelos de nuestro pueblo.\n\nDemocracia y venganza son incompatibles entre sí; para llegar a la cima, hay que sacrificar mucho, ya sea la libertad de expresión, el derecho de organización, las constantes disputas de partidos opuestos en el infernal laberinto de la burocracia solo para lograr algo. Con la gente adecuada de nuestro lado, una división militar bien ubicada aquí y allá, y la seguridad para el pueblo de que todas estas medidas son para el bien de la nación y la supervivencia de nuestra gente, tendremos un control más firme sobre nuestro destino.\n\nAlgunos podrían llamar a esto un acto de tiranía, y puede que lo sea. Restauraremos nuestra forma de vida una vez que nuestra lucha haya terminado."
 russia.616.a: "Lo restauraremos todo... Eventualmente."
 russia.617.t: "¿Restaurar el mito de Yeltsin?"
 russia.617.d: "Yeltsin es, sin duda, una figura divisiva en la historia rusa; una parte (idiotas totalitarios) lo considera un traidor y renegado, mientras que nosotros (luchadores por la libertad iluminados) lo vemos como un gran demócrata que liberó a Rusia del régimen comunista.\n\nCometió errores, por supuesto, especialmente en la última parte de su carrera cuando orquestó los eventos de 1993 y le dio el poder a Putin en 2000, pero la imagen de él como un gran luchador por la libertad es demasiado convincente para olvidarla. Algunos de nuestros colaboradores presidenciales abogan por reimaginar su imagen, dividir los períodos de su vida e incluso calcular los porcentajes de cuán positiva y negativa fue su política para Rusia, por supuesto, con lo positivo superando abrumadoramente lo negativo, en lo que ubicaremos los errores más obvios y su vida posterior.\n\nServirá de gran ayuda a nuestros esfuerzos por legitimarnos ante los ojos del público y de los demócratas más radicales, pero puede ser costoso financiar la restauración de la imagen de Yeltsin."
 russia.617.a: "¡Idea asombrosa!"
 russia.617.b: "¿No te sientes tonto? ¿No te sientes estúpido?"
 russia.620.t: "¡\"Funko Pops\" rusos!"
 russia.620.d: "¡El país se estremece una vez más! Pero esta vez no por el fuego de artillería o las bombas, ¡sino por la expectación de un nuevo juguete para jóvenes adultos! La empresa estatal rusa \"IzhDynamics\" ha presentado nuestros propios juguetes \"Funko Pops\" llamados: \"¡Russo Pop\"! Estas cositas con cabezas grandes imitan a muchos personajes populares entre la juventud, ¡e incluso a políticos! Entre los más vendidos se encuentran, por supuesto, los Russo Pops de nuestro presidente, Alekséi Navalni, y algunos de sus ministros, incluida su esposa. No solo los rusos hacen cola para la comida ahora, sino que hay filas y filas en las tiendas que empiezan a vender esos pequeños y tontos compañeros, generando miles de millones en ganancias para la empresa y el Gobierno.\n\nUno de los nuevos y apasionados fans de Russo Pop ha sido entrevistado por los medios: Yegor Pipisev, una estrella emergente de TikTok y un navalnista acérrimo. Le mostró a la reportera su casa, en la que se amontonaban pilas de los nuevos juguetes en cajas, muchos de ellos Navalni con diferentes atuendos y poses. \"Mira... mi colección... de Russo Pops\", le dijo. Su perro parecía estar enfermo."
 russia.620.a: "en Hispanoamérica: ¡Cómpralos ya!\nen España; ¡Hazte con todos!"
 russia.621.t: "Nuevos negocios rusos"
 russia.621.d: "Con la vieja orden desaparecida, llega un nuevo amanecer para todos, incluidos nuestros hermosos y democráticos empresarios. La asquerosa oligarquía nacida de nadie más que Putin y sus lacayos se ha ido para siempre, reemplazada por otras mejores, sus caras son más bonitas, sus sonrisas más amplias, sus trajes más limpios y sus maletines más llenos.\n\nJodorkovski, el \"financiero de la democracia rusa\", estaba extremadamente complacido con la decisión de Navalni de restaurar las propiedades de Yukos, y era su momento de recoger lo que quedaba después de la caída del último hegemón económico. Yukos se convirtió muy rápidamente en el nuevo comodín de nuestra economía destrozada por la caída, y junto con ella se formaron muchas empresas nuevas, como \"NovGazRos\", la compañía de medios \"Fevral\", la compañía siderúrgica \"Svobonya Stal\", por nombrar solo algunas.\n\nDurante la reciente reunión entre el gobierno y las corporaciones, todos parecían extremadamente complacidos cuando Navalni anunció una nueva ola de privatizaciones y relajación fiscal para las empresas. Nueva Rusia, necesitaba un nuevo logo. Ahora lo tiene."
 russia.621.a: "¡Los conglomerados te tienen bajo llave!"
 russia.622.t: "Oligarcas exigen inversión civil en [SOV_oligarchs_investment_state.GetName]"
 russia.622.d: "Un oligarca de alto rango de [SOV_oligarchs_investment_state.GetName] se ha acercado al Gobierno con una oferta de apoyo. Su estado sufre de una inversión crítica insuficiente, y un programa de estímulo económico iniciado por el Gobierno ciertamente le haría reconsiderar su postura sobre ciertas políticas gubernamentales propuestas.[SOV_new_oligarchs_scripted_loc]"
 russia.622.a: "Solo podemos aceptar."
 russia.622.b: "Rechazar."
 russia.624.t: "Oligarcas exigen inversión militar en [SOV_oligarchs_investment_state.GetName]"
 russia.624.d: "Oligarcas locales de [SOV_oligarchs_investment_state.GetName] se han acercado al Gobierno, ofreciendo su apoyo al presidente a cambio de una garantía informal de que [SOV_oligarchs_investment_state.GetName] sería la sede de una nueva planta de municiones para el Ejército. Argumentan que construir una planta en la zona crearía muchos puestos de trabajo y proporcionaría al Ejército el apoyo tan necesario en un mundo cada vez más peligroso.[SOV_new_oligarchs_scripted_loc]"
 russia.625.t: "La \"nueva\" realidad"
 russia.625.d: "A pesar de todos nuestros esfuerzos democráticos, la mayoría de la gente no siente la transformación positiva. Muchos dicen que nada ha cambiado, y que solo se han reemplazado las caras en la cima. La gente no nos cree, y eso es un problema. Para la mayoría de la gente fuera de la capital, seguimos siendo populistas vacíos sin ideas, o peor aún, traidores financiados por Occidente.\n\nPero aun así, según las encuestas, mucha gente deposita su esperanza en el presidente personalmente, muchos piensan que solo él, con mano fuerte y segura, podrá restaurar el orden... El propio Navalni, personalmente, también apoyó tal idea, como dice: \"Nuestro país es patriarcal. Necesitamos un líder. No es para esta generación cambiarlo, prefiero ser un Bonaparte democrático que un reformador fallido\".\n\nLa elección del camino está todavía, por supuesto, muy lejos, y el país sigue yendo en su propia dirección... lo que deja mucho que desear."
 russia.625.a: "Algo triste..."
 russia.626.t: "Juicios anticorrupción"
 russia.626.d: "En tiempos de una nación moribunda, se pueden ver los buitres sobrevolándola, hambrientos y listos para desplumarla, tratando de saciar su propia hambre; en su ciega lujuria no se dan cuenta de que son sus propios hijos los que están devorando.\n\nAsí es como vemos a los oligarcas que se atreven a reaparecer después de que recuperamos nuestra nación. Miserables plagas que no comparten el mismo amor que nosotros por nuestra Madre Patria; mientras nosotros vemos la belleza de su gente y sus paisajes, ellos ven recursos y mano de obra explotable, sonriendo mientras hacen tratos con Occidente. En el pasado, estos parásitos lograron implantarse en nuestra civilización, siendo para siempre un cáncer mientras sucumbíamos lentamente a ellos.\n\nPor eso los extirparemos antes de que puedan causar un daño real; todos ellos serán arrestados, juzgados incluso por la más mínima infracción de nuestras leyes. Corrupción, traición, soborno, explotación, asesinato y cualquier perversión en la que se complazcan, sin duda algo que aprendieron de Occidente.\n\nNo importa, todos ellos desaparecerán del ojo público. Un pequeño paso para rejuvenecer nuestra nación."
 russia.626.a: "Es el comienzo."
 russia.627.t: "¡Jodorkovski está furioso!"
 russia.627.d: "Tras el inicio del caso anticorrupción, las relaciones entre el jefe de Estado y el principal empresario del país se han deteriorado cien veces. Una conversación telefónica filtrada entre Jodorkovski y su colega llegó al escritorio del presidente, en la que este promete furiosamente \"destruir a este cachorro\" y \"mostrarle dónde se construyen los cuarteles\" por \"morder la mano que le dio de comer\", refiriéndose claramente a Alekséi Navalni y su administración.\n\nTambién mencionó la muerte del alcalde de Nefteiugansk, y dijo que, si fuera necesario, le haría lo mismo a Navalni. El señor presidente se quedó solo con esta grabación, obviamente pensando qué hacer a continuación, pero pronto descolgó uno de los teléfonos de su oficina..."
 russia.627.a: "Oh, the misery, everybody wants to be my enemy."
 russia.628.t: "¡Jodorkovski encontrado muerto!"
 russia.628.d: "Hoy, Mijaíl Jodorkovski, el CEO de Yukos y uno de los principales acusados en el caso anticorrupción, ha sido encontrado muerto en el río Neva, más precisamente, en el Gran Nevka. Su cuerpo, ya en descomposición, fue avistado por transeúntes, quienes llamaron a la policía y a los médicos. La noticia se extendió por todo el país casi de inmediato a través de internet, muchos diciendo \"¡qué alivio!\", mientras otros lamentaban la muerte de uno de los muchos defensores de la democracia rusa.\n\nEl Gobierno no ha hecho ninguna declaración oficial, y la policía de San Petersburgo también se niega a comentar si fue un incidente trágico o un asesinato planeado, citando una investigación en curso y las leyes de privacidad relativas a la información personal incluso después de la muerte. Sin embargo, el Estado ruso ya ha suspendido y confiscado todas las cuentas bancarias del fallecido, y se espera que el futuro de Yukos se decida pronto."
 russia.628.a: "Las tragedias pasan..."
 russia.629.t: "La noche"
 russia.629.d: "Alekséi tuvo un día ajetreado. Había trabajado demasiado, especialmente en asuntos de negocios. Ya era pasada la medianoche. Después de beber la última taza de café, como había prometido, Alekséi se levantó del escritorio de su oficina en el Kremlin, tomó su chaqueta de la silla, se la puso rápidamente y caminó con calma, aunque cansado, hacia la puerta. Navalni apenas comenzaba a girar los pomos cuando de repente escuchó una voz dolorosamente familiar. \"Ni siquiera, um, lo esperaba\".\n\nEse timbre no podía confundirse con ningún otro, era demasiado único, y Alekséi lo había escuchado muchas veces. Un pequeño sudor corrió por su frente. Por unos segundos más, se quedó allí, con la mano aún en el pomo de la puerta, pero luego se giró bruscamente para ver... Pero la oficina estaba vacía.\n\"¿Quién está aquí?\", preguntó Alekséi, sin creer que el vacío le estuviera hablando. No hubo respuesta.\n\"Tengo que dormir, o los demonios empezarán a soñar\", pensó Alekséi, frotándose los ojos salió de la oficina. Caminando por los pasillos vacíos del Kremlin, en su cabeza había varios pensamientos sobre este caso, \"¿Privación del sueño?\" \"¿Le pusieron algo en el café?\", \"¿Un espíritu viviendo en el Kremlin?\", \"¿Está vivo y viviendo en el Kremlin?\". Aunque, al llegar al dormitorio, Alekséi ya había, a primera vista, olvidado este incidente, y sus pensamientos fueron reemplazados por otros más mundanos, por ejemplo, sobre aumentar la seguridad del presidente. Pero en los rincones oscuros de su mente esta noche permanecería por mucho tiempo."
 russia.629.a: "Las cosas pasan de noche..."
 russia.630.t: "La casa siempre gana"
 russia.630.d: "\"El camaleón de Rusia se convirtió en la criatura que decía odiar...\"\n\nA Navalni no le importaban especialmente las opiniones de sus enemigos, pero un artículo de un periodista occidental logró herirle en el corazón; sabía que tenía que dejar parte de su idealismo atrás en aras de la estabilidad, la recuperación y la certeza.\n\nPero cada vez que ve los informes de disidentes arrestados, protestas violentamente dispersadas y el puño de hierro de la autoridad agarrando la garganta de la libertad, no puede evitar pensar que quizás ha abandonado demasiado; ya se le ha llamado en broma el nuevo Putin, el viejo motor con una nueva pintura y el camaleón.\n\nPuede imaginarse a su viejo rival riéndose en el infierno, el cielo o dondequiera que esté, de él por este giro irónico, pero una ola de calma lo inunda. Putin es lo que metió a Rusia en este lío para empezar, trajo el estancamiento a la Madre Patria, trajo a su sucesor idiota para llevar a Rusia a la ruina.\n\nNo, pensó Navalni, él es mucho más que su viejo rival. Las herramientas de la autoridad se vuelven ineficaces en manos del hombre equivocado. Ayer no era el momento adecuado para usarlas."
 russia.630.a: "Pero mañana sí lo será."
 russia.631.t: "Neobolcheviques domados"
 russia.631.d: "La bandera roja es una imagen familiar en nuestra nación, una bandera que algunos hemos llegado a amar u odiar, pero negar que es parte de la historia sería una tontería.\n\nPor eso, con algunas amenazas suaves y promesas de afianzamiento mutuo del poder, hemos logrado añadir al partido neocomunista a nuestra coalición. Liderado por Andréi Rudoi, un partido que se adhiere a ideales más izquierdistas pero que aún siente el mismo amor por la Madre Patria que nosotros, y con su acuerdo para unirse a nosotros, ha demostrado exactamente eso.\n\nLa tricolor está en lo alto del cielo, pero en nuestros corazones, la bandera roja de nuestros días de gloria siempre tendrá un lugar especial."
 russia.631.a: "Ellos saben lo que es mejor."
 russia.632.t: "Conectando con los nacionaldemócratas"
 russia.632.d: "El nacionalismo en tiempos difíciles es el antídoto que necesitamos para erradicar el nihilismo. Hay quienes están de acuerdo con esa noción, pero no han logrado endurecer sus corazones a la piedad; la democracia es una entidad que hay que controlar cuidadosamente en lugar de dejarla correr salvajemente. Román Yuneman entiende esto, él y sus demócratas nacionales comenzaron con dificultades con su dedicación a la democracia en tiempos difíciles, pero con algunas discusiones y negociaciones personales, él y su partido se unieron a nosotros en nuestra coalición.\n\nSin duda, esto hará que algunos de los más moderados se alineen con nuestros objetivos, un escudo nacional contra la enfermedad política de Occidente."
 russia.632.a: "¡Horosho!"
 russia.633.t: "Novosocialistas domados"
 russia.633.d: "El pacifismo es similar a una enfermedad transmitida por promesas que no se pueden cumplir, moderación y falsas sonrisas que no nos llevaron a ninguna parte. Por supuesto, no se utilizó un lenguaje tan duro con los novosocialistas bajo el liderazgo de Alexander Shtefanov. Integrar a los socialistas democráticos parece contradictorio, pero mostrar buena voluntad de esta manera es un excelente ejemplo de la promesa de que, de hecho, deseamos cooperar incluso con aquellos que puedan tener desacuerdos con nosotros.\n\nPor supuesto, entre bastidores ha habido más amenazas implícitas de encarcelamiento y promesas de ascender en las filas del gran juego de la política, voluntades débiles que pronto serán aliados leales."
 russia.633.a: "Ellos saben lo que es mejor."
 russia.634.t: "El regreso de \"Kukli\""
 russia.634.d: "Con el regreso de las libertades, llegó el regreso de los programas gratuitos. Uno de ellos, directamente de los años 90. \"Títeres\" producido por Vasili Grigóriev regresó a las pantallas después de más de 20 años de prohibición.\nLa sátira política de \"Títeres\" está completamente renovada ahora, en lugar de Yeltsin, Ziugánov y Zhirinovski, en el encuadre aparecen los títeres Navalni y sus compinches, y nuevos opositores, e incluso empresarios. Aunque los personajes antiguos también aparecen en forma de fantasmas y flashbacks. Especialmente a menudo se utilizan títeres de políticos de la época posterior a Putin.\n\nSin embargo, algunos críticos señalan la recursión de algunas tramas, y a veces la copia directa de episodios antiguos, donde en lugar de Yeltsin o Putin se coloca un títere de Alekséi Navalni. Los autores responden irónicamente a estas críticas con \"La ciclicidad de la historia\" y \"¡Esto es Rusia!\". Las calificaciones muestran que a la gente le gusta, aunque también notan la repetición de escenarios."
 russia.634.a: "Diversión inofensiva."
 russia.635.t: "Protestas en Stávropol"
 russia.635.d: "Era inevitable que la República de Kubán tuviera su buena ración de problemas; el pueblo ruso, separado a la fuerza de nuestra Madre Patria por las garras de Occidente, protesta por el trato injusto a manos de la República y la violencia cada vez mayor contra ellos.\n\nLos rumores de que nuestra gente era tiroteada durante estas protestas resultaron ser ciertos, y una ola de ira nos invadió como una inundación interminable. Occidente, por supuesto, hace la vista gorda ante la violencia, y en tiempos de necesidad tenemos que actuar en nombre de nuestra gente. Se enviarán fuerzas de paz a la República de Kubán para separar a los violentos de los pacíficos y evitar que se derrame más sangre de nuestros hijos.\n\nEsta es una excelente oportunidad para que las comunidades rusas de la República voten si quieren reunirse con la Madre Patria o no; considerando la violencia cometida contra ellos, esto sin duda irá sin problemas, sin embargo, la perspectiva de que nuestros compatriotas nos sean devueltos definitivamente provocará la ira del enemigo."
 russia.635.a: "¡Que entren las fuerzas de paz y que comience el referendo!"
 russia.636.t: "¡Referendo exitoso!"
 russia.636.d: "Tras masivas protestas y manifestaciones en todo el Don, el gobierno local no tuvo más remedio que contactar con la oficina del presidente Navalni y aceptar celebrar un \"referendo\" sobre la devolución de los territorios bajo control ruso.\n\nEl resultado no sorprendió a nadie: el 91% votó a favor de la reunificación con Rusia. El Ministerio de Asuntos Exteriores ucraniano envió inmediatamente una solicitud para verificar los resultados por falsificación, así como una nota de protesta al gobierno ruso, pero incluso ellos se dan cuenta de que la decisión fue tomada por la abrumadora mayoría: ¡Stávropol es Rusia!"
 russia.636.a: "¡Excelente!"
 russia.637.t: "Kalmukia propone la reunificación"
 russia.637.d: "Tras un breve período de independencia forzada, el Gobierno de Kalmukia envió una solicitud al Ministerio de Asuntos Exteriores ruso para una visita diplomática del presidente de la Federación de Rusia a Elistá para discutir las \"Condiciones de Coexistencia y Amistad de los Pueblos\". El líder ruso fue recibido muy cálidamente en Elistá, y tras un breve recorrido por la ciudad, fue a visitar al presidente y al primer ministro de la República. A su regreso a Moscú, el presidente dijo que los dos países firmarían pronto un tratado sobre la \"Reintegración Pacífica de Kalmukia en Rusia\" y que todos los ciudadanos de Kalmukia podrían renovar sus pasaportes rusos."
 russia.637.a: "Bienvenidos de vuelta."
 russia.638.t: "Una pregunta sobre el Ministro de Finanzas..."
 russia.638.d: "Tarde o temprano, tendremos que deshacernos de Mijaíl Jodorkovski, quien actualmente ocupa la silla del ministro de Finanzas de la Federación de Rusia. Sin embargo, ¿quién ocupará el puesto vacante?\n\nBorís Zimin, el principal patrocinador de la Fundación Anticorrupción, un exitoso empresario y filántropo, es una persona neutral, leal y con suficiente experiencia para la silla del ministro.\n\nMijaíl Svetov es el político libertario más prominente de Rusia, miembro del Partido Libertario de Rusia y economista con ideas muy... específicas que podrían traer prosperidad a Rusia, pero ¿lo harán?"
 russia.638.d1: "Tarde o temprano, tendremos que deshacernos de Mijaíl Jodorkovski, quien actualmente ocupa la silla del ministro de Finanzas de la Federación de Rusia. Sin embargo, ¿quién ocupará el puesto vacante?\n\nBorís Zimin, el principal patrocinador de la Fundación Anticorrupción, un exitoso empresario y filántropo, es una persona neutral, leal y con suficiente experiencia para la silla del ministro.\n\nMijaíl Svetov es el político libertario más prominente de Rusia, miembro del Partido Libertario de Rusia y economista con ideas muy... específicas que podrían traer prosperidad a Rusia, pero ¿lo harán?\n\nElvira Nabiúllina - Ex ministra de Finanzas, una persona con vasta experiencia y talento reconocido en la esfera económica, pero el electorado podría ver muy mal a un miembro de la administración de Putin en nuestra nueva Rusia..."
 russia.638.d2: "Tarde o temprano, tendremos que deshacernos de Mijaíl Jodorkovski, quien actualmente ocupa la silla del ministro de Finanzas de la Federación de Rusia. Sin embargo, ¿quién ocupará el puesto vacante?\n\nBorís Zimin, el principal patrocinador de la Fundación Anticorrupción, un exitoso empresario y filántropo, es una persona neutral, leal y con suficiente experiencia para la silla del ministro.\n\nMijaíl Svetov es el político libertario más prominente de Rusia, miembro del Partido Libertario de Rusia y economista con ideas muy... específicas que podrían traer prosperidad a Rusia, pero ¿lo harán?\n\nPável Grudinin - Empresario, activista, excandidato presidencial y miembro prominente del PCFR, ¿quizás deberíamos darle otra oportunidad a las ideas de la economía planificada...?"
 russia.638.a: "...Borís Zimin."
 russia.638.b: "...Mijaíl Svetov."
 russia.638.c: "...Elvira Nabiúllina."
 russia.638.e: "...Pável Grudinin."
 russia.639.t: "Declaración de Jodorkovski"
 russia.639.d: "Tras la dimisión de Mijaíl Jodorkovski como ministro de Finanzas de la Federación de Rusia, el llamamiento de Mijaíl al Gobierno ruso, a Alexéi Navalni y al pueblo de Rusia fue publicado en su canal de YouTube y en la publicación de noticias «Rusia Abierta - Jodorovski en vivo»...\n\n\"...Vemos que Navalni ha emprendido el mismo camino que Vladímir Putin utilizó para fortalecer su régimen, vemos las terribles tendencias que casi nos llevaron a la revolución en 2012. Sin embargo, Alexéi no parece tener intención de detenerse, y lo más probable es que en un par de años veamos la resurrección del régimen del difunto Vladímir Vladímirovich... Todos aquellos a quienes no les sea indiferente el destino de Rusia, salgan a protestar contra el nuevo tirano antes de que sea demasiado tarde...\"\n\nDesafortunadamente para Mijaíl, sus llamamientos a protestas y manifestaciones espontáneas no encontraron popularidad entre la audiencia; la acción más grande se llevó a cabo en Dmítrov y reunió a unas 40 personas en total."
 russia.639.a: "¡Buen viaje!"
 russia.640.t: "¡Purgas en Rusia del Futuro!"
 russia.640.d: "Como resultado de una investigación interna a gran escala, el Comité de Investigación y la FAC han descubierto detalles impactantes sobre los ya ex asociados de Alekséi Navalni:\n\nLeonid Vólkov, Maria Singerschij, Iván Zhdánov, Maksim Mironov, Román Rubánov y muchos otros estuvieron involucrados en esquemas de lavado de dinero a gran escala junto con oligarcas ya exiliados como Aleksandr Zhelézniak, muchas corporaciones transnacionales - Shell, Chevron, British Petroleum, suministrándoles ilegalmente gas y petróleo a un precio reducido.\n\nLos acusados ya han sido arrestados y serán llevados a los tribunales en los próximos días, y todo el dinero que obtuvieron a través del lavado de dinero del presupuesto será devuelto al Tesoro ruso.\n\nPiotr Lósev, Yekaterina Shulman, Maksim Katz y Yulia Latynina ocuparán los puestos gubernamentales vacantes."
 russia.640.a: "¿El fondo para combatir qué?"
 russia.641.t: "Protestas en Bielorrusia"
 russia.641.d: "En Minsk, Mogilev y muchas otras ciudades bielorrusas, la situación ha llegado a un punto crítico. La gente está saliendo a las calles y acusando al Gobierno de Naumchik de limitar el poder de la presidenta Tijanóvskaya y de construir su propia dictadura prooccidental, que será incluso \"peor que el régimen de Lukashenka\". Diputados y gobernadores pro-presidenciales están saliendo a las protestas y apoyan la destitución del Gobierno y la reforma constitucional, que daría más poder a la presidenta, eliminando el doble poder en la Rada. El Gobierno ruso no ha comentado abiertamente la situación en el país amigo, pero el gobernador de San Petersburgo, Román Bulátov, y el presidente Navalni apoyaron personalmente a los manifestantes desde sus cuentas personales en las redes sociales."
 russia.641.a: "Preocupante."
 russia.642.t: "Tanques rusos en Minsk"
 russia.642.d: "Violentas protestas y contramanifestaciones se han estado sucediendo en Bielorrusia durante varios días, en cuyo contexto la aparición de la tricolor rusa en Minsk y las regiones orientales de la república se convirtió en una sensación aún mayor. Ni el Ministerio de Asuntos Exteriores ruso ni el presidente comentaron la situación, pero la aparición de militares rusos en el país ya ha provocado protestas a favor de la adhesión a Rusia en Maguilov y Gómel."
 russia.642.a: "¡Ahí es donde pertenecen!"
 russia.643.t: "El presidente Navalni se dirige al pueblo de Bielorrusia"
 russia.643.d: "Tras un breve silencio radiofónico, el presidente de la Federación de Rusia hizo una declaración sobre las protestas en Bielorrusia: \"Queridos bielorrusos, en Rusia y yo personalmente estamos muy familiarizados con el hecho de que nuestras libertades, nuestra constitución están siendo pisoteadas. Y no podíamos dejarlos solos en una situación así. Apoyamos plenamente sus demandas de dimisión del primer ministro y el establecimiento de una nueva constitución democrática. Bielorrusos, nosotros, el pueblo de Rusia, estamos con ustedes. Y juntos venceremos\".\n\nLos países de la Unión Europea acusaron a Rusia de neoimperialismo e intentos de establecer un Gobierno títere en el país vecino, pero aparte de la profunda preocupación de Occidente, nada más sucedió."
 russia.643.a: "¿Está volviendo la situación a la normalidad?"
 russia.644.t: "¡Tijanovski asume la presidencia!"
 russia.644.d: "En Minsk, tuvieron lugar negociaciones sobre la reforma constitucional y la dimisión del primer ministro Naumchik, iniciadas por la Rada de Bielorrusia. Las partes llegaron a un acuerdo y Naumchik se retiró honorablemente con la condición de no ser juzgado posteriormente; el proyecto de constitución propuesto fue adoptado discretamente.\n\nSin embargo, Svetlana Tijanóvskaya rechazó el puesto de presidenta en favor de su marido, Serguéi Tijanovski. En su primer discurso, este último prometió el establecimiento de una democracia real en el país, así como el fortalecimiento de los lazos con Rusia."
 russia.644.a: "¡Gloria a Tijanovski!"
 russia.645.t: "Revolución en Bielorrusia"
 russia.645.d: "Como resultado de la crisis constitucional y las protestas masivas contra la Rada y el primer ministro de Bielorrusia, Serguéi Naumchik, el Gobierno de Bielorrusia ha cambiado de nuevo. Los medios occidentales lo llamaron un golpe prorruso, mientras que los medios rusos lo llamaron una justa revolución liberal.\n\nLos referéndums sobre la adhesión a Rusia también se llevaron a cabo en Mogilev y Gómel junto con las negociaciones en Minsk, con un pequeño margen, pero la población de las regiones votó a favor de la integración."
 russia.645.a: "¿Revolución? ¿Otra vez?"
 russia.646.t: "Intento de asesinato masivo de miembros de \"Rusia del Futuro\""
 russia.646.d: "Noticias aterradoras llegaron desde Moscú, San Petersburgo, Ekaterimburgo y otras 15 ciudades rusas: al menos 100 miembros del partido gobernante Rusia del Futuro fueron asesinados la noche anterior, 20 de ellos murieron. Los muertos eran funcionarios regionales y miembros de las dumas regionales de San Petersburgo, Carelia, Moscú y las regiones de Sverdlovsk. El primer ministro Leonid Vólkov fue brutalmente golpeado con martillos, pero fue llevado al hospital y está bajo la atenta mirada de los médicos. Los intentos de asesinato también fueron reportados por otros altos funcionarios: Yevgueni Roizman, Iván Zhdánov, María Pévchij e incluso el propio presidente Alekséi Navalni. En su discurso matutino a la nación, el presidente Navalni anunció que los departamentos de inteligencia de la Fundación Anticorrupción y el FSK ya estaban trabajando para identificar a los asaltantes y clientes, afirmando que todos los involucrados recibirían su merecido y se haría justicia, concluyendo su discurso declarando un período de luto nacional."
 russia.646.a: "¿La \"noche de los cuchillos largos\" rusa?"
 russia.647.t: "Arrestos de Leonid Nevzlin"
 russia.647.d: "Esta mañana, a las 9:45 hora de Moscú, destacamentos de las Fuerzas Especiales del FSK allanaron las residencias del empresario ruso Leonid Nevzlin y del exministro de Finanzas Mijaíl Jodorkovski, pero tras una breve conversación con los oficiales, Jodorkovski fue liberado. A pesar del intento de fuga de Nevzlin, fue detenido y llevado al edificio del Tribunal Supremo. Al mismo tiempo, la Fundación Anticorrupción publicó una nueva investigación de tres horas que arrojaba luz sobre la identidad del instigador del intento masivo y milagrosamente fallido de asesinato del presidente. La sesión judicial fue corta, a pesar de que Nevzlin intentó activamente defenderse, sospechando que el juez y el fiscal eran \"venales\" y \"trabajaban para Navalni\", pero las pruebas jugaron en su contra. Después de la sesión, el acusado fue llevado al centro de detención preventiva para esperar la siguiente y última. Veredicto preliminar: Traición al Estado y Asesinato por encargo - Cadena perpetua."
 russia.647.a: "¡Él pertenece al manicomio!"
 russia.648.t: "La investigación de Katz"
 russia.648.d: "Apenas ha pasado un mes desde la anterior sensación en el mundo de la política liberal rusa, cuando aparece una nueva. Maksim Katz, considerado por algunos como el líder del segundo partido más influyente de Rusia, publica su investigación, en la que acusa a los líderes del Fundación Anticorrupción Internacional de colaborar con banqueros corruptos: Aleksandr Zheleznyak y Serguéi Leóntiev, antiguos propietarios de Probusinessbank, que blanquearon dinero a través de Liechtenstein. Katz afirma que mientras Navalni cumplía su condena en prisión, Vólkov, Zhdánov y Pévchij le quitaron el dinero robado a los rusos de las manos de Zhelézniak, lo incrustaron en sus estructuras e incluso lo convirtieron en su tesorero.\n\n\"¡Qué clase de persona tienes que ser para lavar la reputación de los delincuentes más asquerosos y comportarte públicamente como si fueras el centro moral de todo el pueblo ruso! ¡Y hacer todo esto solo con la reputación de Alekséi Navalni detrás de ti!\", afirmó Katz. Todavía no ha habido una respuesta concreta de los líderes de Rusia del Futuro y la Fundación Anticorrupción, pero la decisión recae en el presidente..."
 russia.648.a: "Es hora de quemar esta bola de serpientes."
 russia.648.b: "No se puede confiar en el \"murzilka\" Katz... No se puede."
 russia.649.t: "Ucrania promete defender Kubán"
 russia.649.d: "Con Rusia reconstruyéndose en una entidad más allá del control de Occidente y la rápida recuperación del Cáucaso, no sería una sorpresa que nuestros antiguos rivales se dieran cuenta de esto.\n\nEl Estado de Ucrania, que ha caído en las garras de la OTAN y la Unión Europea, ha declarado públicamente que la República de Kubán está bajo su protección. La república ilegítima, que se ha apartado de nuestra misericordia y amor, se ha arrastrado hacia nuestro enemigo, rogando apoyo. Por supuesto, a la larga no importa, la reunificación no es negociable e inevitable, sin embargo, el camino de la paz es un camino que simplemente ya no existe. Rusia está incompleta. Rusia volverá a estar completa.\n\nNos temen, y con razón. Inclinarse cobardemente ante el enemigo es algo que se puede esperar de los traidores."
 russia.649.a: "Conocen la alternativa..."
 russia.650.t: "Amnistías masivas"
 russia.650.d: "El primer decreto del presidente Navalni, como disidente político recién liberado, fue liberar a todos los presos políticos, independientemente de sus puntos de vista y creencias religiosas. Por supuesto, los medios de comunicación hicieron hincapié en la liberación de líderes liberales como Vladímir Kará-Murzá, Iliá Yashin o Yevguéniya Berkóvich, pero el mismo día fueron liberados otros disidentes mucho más radicales. Alekséi Navalni declaró por principio que nadie, por mucho que sus puntos de vista no encajen en la nueva realidad de Rusia, será indultado si está encarcelado por sus declaraciones."
 russia.650.a: "Llegó la primavera a Rusia."
 russia.651.t: "Segunda ronda de debates entre Navalni y Strelkov"
 russia.651.d: "El primer debate entre Alekséi Navalni e Ígor \"Strelkov\" Guirkin tuvo lugar hace más de diez años y, por lo tanto, ya en el papel de presidente, Alekséi no pudo negarle a su oponente una segunda ronda. Esta vez, sin embargo, las condiciones son bastante diferentes. Hay una guerra a gran escala por venganza en Europa, y las ideas de dos personas casi opuestas se han cruzado bruscamente. Era difícil llamarlo un debate, más bien un discurso provocador mutuo.\n\nAl final de la discusión, los oponentes se dieron la mano, y el presidente le prometió a Ígor Guirkin un papel en el Ministerio de Defensa..."
 russia.651.a: "Fin de la línea."
 russia.652.t: "Milagro económico ruso"
 russia.652.d: "Contrariamente a las predicciones de los analistas occidentales y los políticos rusos pesimistas, la economía rusa no solo no se ha derrumbado después de la guerra, sino que ha subido aún más que nunca.\n\nEl rublo, por supuesto, no ha podido fortalecerse en el mercado mundial como la moneda internacional más fiable, porque debido a la situación en Europa nadie tiene prisa por invertir en activos rusos, pero su tipo de cambio estable y alto ha sido asegurado por cientos de empresarios que están desarrollando rápidamente el mercado ruso. Ya sea por un capitalismo responsable, que ha estado en la agenda de Alekséi Navalni desde principios de la década de 2010, o por una competente reorganización de puestos en el Ministerio de Finanzas y el Banco Central, Rusia probablemente se siente mejor que nunca."
 russia.652.a: "¡Sí, futuro!"
 russia.653.t: "Primera cumbre de la CEE en Varna"
 russia.653.d: "La primera cumbre de la Comunidad Económica Eurasiática, una nueva organización que aspira a convertirse en una alternativa a la Unión Europea en el hemisferio norte, tuvo lugar hoy en Varna, Bulgaria. El evento se celebró bajo el lema \"Paz a los pueblos de Europa - Abajo el imperialismo occidental - Viva el poder popular\". Según las estimaciones del Ministerio de Turismo de Bulgaria, a la cumbre asistieron entre 100.000 y 300.000 personas.\n\nLa cumbre debía celebrarse en el Palacio de Cultura y Deportes local, pero debido a su tamaño, el evento cubrió aproximadamente un tercio de la ciudad. Los presidentes de Rusia y Bulgaria ya han anunciado que el próximo año prepararán un lugar más grande para la cumbre en la capital de Bulgaria, Sofía."
 russia.653.a: "¡Un brindis por la libertad!"
 russia.654.t: "Organización del Tratado Báltico"
 russia.654.d: "Menos de un año después de la derrota de Rusia, llegó la noticia de que el presidente ruso firmó el tratado \"Sobre la esfera de influencia de Rusia\", también llamado \"Tratado Báltico\". El secretario general de la OTAN condenó las acciones de Rusia y amenazó con cortar cualquier reintegración en la esfera europea y reimponer sanciones.\n\nLa oficina del presidente ruso respondió que el tratado es defensivo y no es hostil a la OTAN..."
 russia.654.a: "...¿pero podemos creerles?"
 russia.655.t: "Movimientos juveniles radicales"
 russia.655.d: "Un nuevo movimiento pro-Estado y bastante radical, \"Juventud Libre\", ha aparecido en Moscú y San Petersburgo. Sus organizadores describen el movimiento como \"democrático y patriótico\". Celebraron varias reuniones en los óblasts de Leningrado y Moscú, con un enfoque especial en la preparación para la defensa del país, el aprendizaje del uso de armas y el aumento de la moral de los jóvenes.\n\nLos críticos de Navalni acusan a Juventud Libre de continuar los infames movimientos \"Nashi\" y \"Yunarmia\", pero con \"especificidades liberales\". Los partidarios dicen que no hay nada de malo en la educación patriótica, especialmente porque todo se lleva a cabo de forma voluntaria y al aire libre, en cumplimiento de las normas ambientales.\n\nLa minoría conservadora, en particular, el gobernador de la región de Leningrado, Grigori L., también se ha pronunciado en contra de tales iniciativas, amenazando con cerrarles el paso a las bases turísticas tan pronto como surja la oportunidad, para que dejen de participar en la \"adoctrinación neoliberal de la juventud\"."
 russia.655.a: "Solo un juego de niños..."
 russia.700.t: "Golpe de Grudinin"
 russia.700.d: "Tras la derrota en la guerra con la OTAN, la lucha interna de partidos en el Partido Comunista comenzó con renovado vigor. Por supuesto, dada la inestabilidad general en el país, varios grupos del partido no se contuvieron. Se utilizaron técnicas clásicas como la polémica y la caza de brujas, así como métodos más sofisticados como la eliminación de oponentes políticos utilizando drones. Al final, Pável Grudinin logró mantenerse en el inestable trono del presidente de la RSFSR, quien, con la ayuda de sus conexiones y medios, pudo encontrar un lugar al sol en un país que se desmoronaba e incluso obtener el apoyo de la mayoría popular. Hasta ahora, el nuevo presidente ha prometido liberalizar la economía y entablar un diálogo con la oposición. Incluso hay rumores de que el nuevo líder tiene la intención de trabajar estrechamente con Navalni.\n\nSi esto es cierto o no, los rusos lo descubrirán muy pronto. Mientras tanto, la gente se regocija, esperando que la llegada de Grudinin al poder ayude a estabilizar el país."
 russia.700.a: "¡El candidato del pueblo!"
 russia.701.t: "¡Protestas antisoviéticas violentas!"
 russia.701.d: "Tras nuestra reciente derrota, la opinión pública sobre nuestro Gobierno ha sido críticamente baja, y parece que la situación está empezando a descontrolarse. Incidentes previamente esporádicos de vandalismo y manifestaciones han adquirido un patrón -y fuerza- en los últimos días, y llegan informes de disturbios desde las principales ciudades de la Unión. Los partidarios de los disturbios abarcan todo el espectro político, con varios conocidos partidarios de Alekséi Navalni y del antiguo Partido Liberal-Demócrata contándose entre los agitadores. Aunque dispares, están unidos en sus demandas: quieren un referéndum sobre si el Partido debe seguir en el poder, un referendo que casi con toda seguridad perderemos.\n\n30 personas ya han muerto o están gravemente heridas. Varias comisarías de policía locales y puestos de la Rosgvárdia han sido asaltados, y se teme que elementos de los alborotadores se hayan apoderado de sus armas. Si la situación persiste, es probable que dicha violencia solo empeore.\n\nLa fe del pueblo en la restauración soviética se desvanece rápidamente. Debemos actuar con celeridad, o lo perderemos todo."
 russia.701.a: "Maldita sea."
 russia.702.t: "Golpe de Kvachkov"
 russia.702.d: "La derrota en la guerra contra la OTAN fue un golpe devastador para el poder soviético. Los veteranos de guerra, insatisfechos con la gestión gubernamental de los combates y los problemas internos, comenzaron a expresar abiertamente su descontento. Vladímir Kvachkov, quien ya se había ganado una reputación de patriota implacable, aprovechó este momento para tomar medidas decisivas. Tras convencer a la cúpula militar de que los actuales líderes de la Rusia soviética habían llevado al país al desastre, propuso un nuevo camino.\n\n[GetDateText], las tropas bajo el mando de Kvachkov comenzaron a avanzar hacia Moscú. La operación transcurrió sin resistencia significativa: muchas unidades del ejército, cansadas de la inacción y desilusionadas con el gobierno, se unieron a los rebeldes. Kvachkov se dirigió personalmente a los soldados y oficiales, instándolos a salvar al país de la debilidad política y a revivir la grandeza del Imperio soviético."
 russia.702.a: "¡Venceremos!"
 russia.703.t: "Revolución conservadora fallida"
 russia.703.d: "El ejército evitó por poco el fin de la Unión hoy. A primera hora de la mañana, varias unidades de la Rosgvárdia y la Policía en Moscú y sus alrededores dejaron de responder a las comunicaciones y comenzaron a dirigirse hacia el Kremlin. Sucesos similares se repitieron en San Petersburgo, Kazán, Rostov del Don y otras ciudades importantes. Solo gracias a la rápida reacción de varias unidades leales del ejército y la Guardia Roja en el sur de la ciudad, estos rebeldes fueron emboscados y frustrados. De haber seguido, es probable que hubieran capturado todo el Sóviet Supremo, que se encontraba en sesión. Una vez derrotadas sus fuerzas en Moscú, los golpistas comenzaron a retirarse y dispersarse rápidamente, pero muchos han sido capturados y se espera que se enfrenten a un pelotón de fusilamiento en breve.\n \nDurante los interrogatorios, varios oficiales del golpe han revelado su lealtad al antiguo Partido Liberal-Demócrata de Rusia y a otros grupos nacionalistas similares. Aunque han sido frustrados, es probable que la confianza en el KGB se desplome a medida que el público cuestiona cómo los conspiradores sabían de la reunión, y mucho menos cómo se permitió que el complot se llevara a cabo."
 russia.703.a: "¡Sin piedad para los enemigos del pueblo!"
 russia.704.t: "El fallido golpe oligarca"
 russia.704.d: "La Unión ha estado al borde de la muerte hoy, ya que mercenarios y sediciosos leales a varios oligarcas caídos en desgracia estuvieron a punto de tomar Moscú. A altas horas de la noche, se vio a hombres enmascarados saliendo de varios edificios en las afueras de la ciudad, a los que se unieron soldados del ejército, la Rosgvárdia y unidades policiales, que procedieron a avanzar rápidamente hacia el Kremlin. Se informó de disparos hasta primeras horas de la mañana, con un breve duelo aéreo sobre Moscú que posiblemente decidió el destino de la Unión, ya que unidades aéreas leales impidieron que un destacamento de helicópteros que no respondía irrumpiera en la ciudad, donde probablemente habrían bombardeado el Kremlin, poniendo a todo el Sóviet Supremo en peligro de ser asesinado. Sin embargo, las líneas se mantuvieron y los golpistas han sido dispersados o capturados.\n\nVarios mercenarios capturados han revelado su pertenencia a los ejércitos privados de varios oligarcas, cuyas industrias están a punto de ser arrebatadas de su control. Se han emitido órdenes de arresto para todos los individuos implicados, y se espera que sean juzgados por un tribunal militar. Esto es de poco consuelo para el pueblo, sin embargo, que probablemente se preguntará dónde estaba el KGB cuando algunas de las personas más prominentes de la nación estaban ejecutando este complot."
 russia.704.a: "¡Sin piedad para los enemigos del pueblo!"
 russia.705.t: "Destino de CMP \"Wagner\""
 russia.705.d: "El PMC Wagner ha sido el \"brazo largo\" del Kremlin durante toda su existencia, cuando este no quería ensuciarse. Creado por iniciativa de Dmitri Utkin y dirigido por el \"cocinero de Putin\", Yevgueni Prigozhin, el Grupo Wagner participó en muchos conflictos alrededor del mundo: la orquesta estuvo en el Dombás en 2014, recordada por sus \"aventuras\" en Siria, la República Centroafricana y Libia. Recientemente, se han encontrado rastros de los \"Ichthamnets\" en Arabia Saudita, donde lucharon del lado del Príncipe Heredero, y en el Congo del lado del gobierno de Kinshasa. Dondequiera que sonara una moneda, aparecían los \"músicos\". Pero desde que el Gobierno en Rusia ha cambiado, el gobierno ha planteado la cuestión del futuro de esta organización.\n\nAlgunos creen que es poco práctico e incluso peligroso tener una estructura tan desleal con experiencia de combate, e incluso financiada por oligarcas. Como solución, proponen disolver los PMC y enviar a los más leales al ejército activo para intercambiar experiencia en la guerra moderna. Por otro lado, existe la opinión de que no es absolutamente necesario disolver la \"orquesta\", bastan los cambios externos y un par de sustituciones. Dada la iniciativa de la AFD como una \"ONU roja\" con sus fuerzas de paz, esta decisión puede ser extremadamente útil para ayudar a regímenes amigos."
 russia.705.a: "Disolver la organización; que los más leales sirvan en el ejército."
 russia.705.b: "Convertirlos en brigadas internacionales profesionales."
 russia.706.t: "Las cosas solo empeoran"
 russia.706.d: "Como era de esperar, la situación tras nuestra derrota sigue empeorando. Todo lo que habíamos construido durante la última media década fue borrado, nuestra tierra dividida. La incapacidad de nuestro liderazgo para abordar esto ha llevado a una gran parte de nuestra población a desilusionarse por completo con nuestro régimen.\n\nYa, millones de nuestros compatriotas protestan tanto en línea como en público. Antes, era una minoría silenciosa la que estaba descontenta con el resurgimiento del comunismo. Aun así, se mantuvieron callados por miedo o por no querer ponerse del lado de la OTAN en lugar de sus compatriotas rojos. Ahora, nadie puede detenerlos.\n\nSi nadie toma medidas drásticas para salvar la situación, Rusia bien podría colapsar. Tanto la izquierda como la derecha están empezando a protestar, y no se sabe cómo controlar a estos dos grupos, si es que es posible. Alguien tiene que intervenir."
 russia.706.a: "Joder."
 russia.707.t: "Kvachkov está ganando popularidad"
 russia.707.d: "Después de que los comunistas llegaron al poder, Vladímir Kvachkov, conocido por sus puntos de vista radicales y su implicación en el intento de asesinato de Anatoli Chubáis, dio el paso inesperado de unirse al Partido Comunista. Sin embargo, a diferencia de sus audaces acciones pasadas, Kvachkov prefirió no llamar la atención innecesaria sobre sí mismo y permaneció en la sombra, observando cómo se desarrollaban los acontecimientos. Esperó, estudiando la nueva realidad política y adaptándose a las nuevas condiciones.\n\nTodo cambió con el inicio de la operación militar especial contra Ucrania. Esta situación se convirtió en un catalizador para Kvachkov, quien, sintiendo el momento, comenzó a promover activamente sus ideas. Su popularidad comenzó a crecer rápidamente entre los nacionalistas prosoviéticos. Kvachkov, con su reputación de patriota firme e implacable, utilizó su posición dentro del partido para reunir a elementos revanchistas y nacionalistas a su alrededor, convenciéndolos de que solo una acción decisiva podría devolver a Rusia su antigua gloria."
 russia.707.a: "No hay de qué preocuparse."
 russia.708.t: "Cuestión de la integración"
 russia.708.d: "La reciente unificación de la Unión de Estados Soberanos en una sola entidad no podía transcurrir sin complicaciones. Así, el problema de la integración de las administraciones es ahora particularmente agudo para nosotros. Por un lado, podemos permitir que la gente local elija libremente a los líderes de sus repúblicas, enfatizando así el principio de soberanía inherente al nombre del Estado.\n\nPor otro lado, si nos hemos embarcado en el camino del socialismo, ¿no sería mejor promover a nuestros socialistas leales reafirmando el colectivismo de nuestro estado? En cualquier caso, el presidente [SOV.GetLeader] debe tomar una decisión."
 russia.708.a: "¡Un Estado soberano tiene un futuro colectivo!"
 russia.708.b: "¡Un Estado soberano tiene un futuro soberano!"
 russia.709.t: "Nuevo Stal'in Doner"
 russia.709.d: "La popularización de la izquierda en Rusia influyó en muchas cosas en el país, pero pocos podrían haber esperado el resurgimiento del sensacional Stal'in Doner a principios de los años 20, y menos aún esperaban su completo éxito comercial. Doner Stalin sorprendió a sus visitantes con la calidad, pero sobre todo su menú es recordado por volverse más extenso y con nombres memorables, aquí hay ejemplos de su menú: Stalinskaia con doble carne, patatas fritas con salsa Malenkov, Cheburek a la Guardia Roja, jruschovskaia en pan de pita con Queso, brezhnevskaia en plato y así sucesivamente.\n\nStal'in Doner ya ha comenzado a competir con otras cadenas de restaurantes rusas como Vkusno i tochka y Dodo Pizza, y como empresa de relaciones públicas, Stal'in Doner invirtió en la expansión de la planta de Corporación Kaláshnikov, el giro a la izquierda en Rusia ha cambiado mucho y, aparentemente, ¡para mejor!"
 russia.709.a: "Increíble."
 russia.710.t: "Junta militar maliense lista para una asociación prolongada"
 russia.710.d: "El Gobierno de Mali, en África Occidental, ha sido derrocado recientemente y sustituido por una junta militar. En un intento por asegurar su poder y legitimidad, la junta ha estado buscando socios extranjeros, y ahora nos solicitan apoyo.\n\nNo hace falta decir que debemos respaldar al nuevo régimen, pero existe cierto debate sobre cuánto podemos prometer a nuestros nuevos amigos malienses. ¿Deberíamos simplemente firmar algunos acuerdos económicos, o deberíamos comprometernos a una presencia militar en el extranjero además de eso?"
 russia.710.a: "Iniciaremos la misión del Cuerpo Africano y firmaremos acuerdos económicos."
 russia.710.b: "Firmaremos acuerdos económicos con Mali."
 russia.711.t: "Golpe antifrancés en Mali"
 russia.711.d: "Partes del ejército maliense han llevado a cabo un golpe de Estado antigubernamental. Tras tomar el poder rápidamente, la nueva junta ha anunciado planes para retirarse de la esfera de influencia francesa y buscar la independencia económica y política.\n\nDebemos actuar con prontitud para aprovechar esta situación y alinear las nuevas fuerzas antiimperialistas de la región con Rusia."
 russia.711.a: "África ruge."
 russia.712.t: "Ibrahim Traoré busca lazos cercanos"
 russia.712.d: "Otro Estado del Sahel ha caído en manos de una junta militar, siendo la tierra de los hombres íntegros el siguiente dominó de África Occidental en caer. En los días pasados de la década de 1980, la Madre Patria y Burkina Faso disfrutaron de una estrecha relación gracias al Gobierno revolucionario de Thomas Sankara, hasta que fue repentina y trágicamente sofocada en un golpe de Estado respaldado por Francia. Con el nuevo liderazgo en el país, se ha presentado una oportunidad para una nueva relación ruso-burkinesa. ¿Cuál debería ser el alcance de nuestro apoyo al nuevo Gobierno?"
 russia.712.a: "Iniciaremos la misión del Cuerpo Africano y firmaremos acuerdos económicos."
 russia.712.b: "Firmaremos acuerdos económicos con Burkina Faso."
 russia.713.t: "El nuevo Gobierno nigerino busca nuestra ayuda"
 russia.713.d: "Una vez más, un Gobierno de África Occidental es derrocado por un golpe militar, y el pueblo de Níger se despierta ante la nueva autoridad de la junta nacional. Al igual que Mali y Burkina Faso, el nuevo Gobierno nigerino nos pide que prometamos nuestro apoyo, y una vez más, les complaceremos."
 russia.713.a: "Iniciaremos la misión del Cuerpo Africano y firmaremos acuerdos económicos."
 russia.713.b: "Firmaremos acuerdos económicos con Níger."
 russia.714.t: "Nuevas oportunidades en Guinea"
 russia.714.d: "La ola de golpes de Estado que ha barrido la región del Sahel en África Occidental ha llegado ahora a las costas del Atlántico, con la República de Guinea sucumbiendo a una revuelta militar. Sin embargo, a diferencia de las otras juntas que se han establecido en la región, Guinea representa una oportunidad única para nuestro país, ya que tienen acceso a puertos de aguas cálidas.\n\nUn aliado estratégico como ellos no tiene precio en este momento de bases de poder que cambian rápidamente. No debemos perder el tiempo en construir nuevas relaciones amistosas con el liderazgo guineano."
 russia.714.a: "Iniciaremos la misión del Cuerpo Africano y firmaremos acuerdos económicos."
 russia.714.b: "Firmaremos acuerdos económicos con Guinea."
 russia.715.t: "¡Turkmenistán acepta!"
 russia.715.d: "Turkmenistán ha aceptado unirse a la OTSC. Ya se han rescindido los contratos de venta de gas natural del país a varias naciones occidentales, y se están elaborando planes para conectar las reservas de la nación con las de Rusia. Varias naciones occidentales han protestado por este desarrollo, pero, en pocas palabras, no hay nada que puedan hacer en este momento."
 russia.715.a: "¡Muy bien!"
 russia.716.t: "¡Turkmenistán nos desafía!"
 russia.716.d: "¡Turkmenistán se ha negado a unirse a la OTSC! Citando que la retirada de las interacciones con Occidente es fundamentalmente ruinosa para su nación, han rechazado categóricamente nuestras demandas. Se están elaborando planes para fortificar la frontera kazaja e iniciar una operación militar especial para asegurar nuestros intereses en el país."
 russia.716.a: "¡Que así sea!"
 russia.717.t: "¡Uzbekistán acepta!"
 russia.717.d: "Uzbekistán ha aceptado unirse a la OTSC. Las exportaciones de algodón de la nación se han suspendido, y varios elementos dentro de nuestros gobiernos han expresado interés en conectar su red eléctrica a la nuestra. Se espera que varias empresas occidentales se molesten por estos acontecimientos, pero se prevé que sus países de origen hagan poco en respuesta."
 russia.717.a: "¡Muy bien!"
 russia.718.t: "¡Uzbekistán corta lazos diplomáticos!"
 russia.718.d: "¡Uzbekistán se ha negado a unirse a la OTSC! Citando el supuesto historial de abusos contra los derechos humanos por parte de Rusia, han rechazado categóricamente nuestras demandas. La frontera kazaja ya está siendo militarizada, y una operación militar especial podría iniciarse en cualquier momento para asegurar nuestros intereses."
 russia.718.a: "¡A las armas!"
 russia.719.t: "¡El Gobierno colombiano firma la paz con el ELN!"
 russia.719.d: "Tras una exitosa operación para liberar al presidente colombiano de la junta, firma un tratado con el ELN y une al país contra otras dos facciones más pequeñas."
 russia.719.a: "¡Buen trabajo!"
 russia.720.t: "Fragmentos de \"Tanática, o la lucha contra la muerte misma\""
 russia.720.d: "\"La historia de la humanidad ha sido testigo de numerosas catástrofes que han demostrado sin lugar a dudas la insignificancia de los logros humanos y el triunfo del Mal invencible. Los brotes de enfermedades infecciosas que de vez en cuando han borrado del mapa pueblos y ciudades se encuentran, sin duda, entre ellas.\n\n\"Por muy inteligentes y virtuosas que fueran, las personas atrapadas en estos eventos destructivos llegaron repetidamente a la conclusión de que no sirve de nada intentar luchar contra estas circunstancias; lo mejor que se puede hacer es aguantar y afrontar las pérdidas...\"\n\n\"...en Tanática, luchamos por la vida. Por el derecho a vivir. Por la oportunidad de no dejar que la muerte vete a las personas\"."
 russia.720.a: "Libro interesante..."
 russia.721.t: "Informe sobre la epidemia pasada en Nóvaya Usman"
 russia.721.d1: "\n\n\n                  £GFX_MOR_event_texticon   \n\n\n\n\nEstimado Alekséi Anatólievich,\nGracias al rápido trabajo de las autoridades locales, junto con el Ministerio de Salud, fue posible aislar el pueblo de Nóvaya Usman y ponerlo en estricta cuarentena, la propagación de la infección se detuvo, todas las personas infectadas, en número de 39, fueron aisladas y examinadas. La enfermedad, a la que hemos llamado \"Plaga Terrae\", causa los siguientes síntomas:\nFiebre\nPiel seca\nDificultad para respirar\nDebilidad (en algunos casos)\nConvulsiones (en algunos casos)\nSudoración (en algunos casos).\n\nLa progresión de la enfermedad avanza de forma fulminante: en las primeras etapas, la Plaga Terrae rara vez se manifiesta, y el paciente puede incluso no saber que está infectado. Sin embargo, cuanto más avanza la enfermedad, más síntomas aparecen: la piel se seca y se inflama, aparece la tos y el paciente experimenta un dolor intenso. La muerte por ataque cardíaco ocurre en ocho horas, pero el uso de medicamentos prolonga la vida del paciente hasta aproximadamente un día desde el momento en que aparecen los primeros síntomas.\n\nLo más extraño de la Plaga Terrae es que no hemos podido rastrear las causas de su aparición, absolutamente todas las personas infectadas afirmaron que les parecía que apareció de la nada. Los propios pacientes, a pesar de todos nuestros esfuerzos, murieron, no había forma de curarlos, por eso nos preguntamos involuntariamente: ¿estamos preparados para enfermedades similares en el futuro? Después de todo, es muy posible que esta vez hayamos tenido mucha suerte...\n\nLe mantendremos informado.\nDaniil B. Dankovski."
 russia.721.d2: "\n\n\n                  £GFX_MOR2_event_texticon   \n\n\n\n\nEstimado Aleksandr Guélievich,\nGracias al rápido trabajo de las autoridades locales, junto con el Ministerio de Salud, fue posible aislar el pueblo de Nóvaya Usman y ponerlo en estricta cuarentena, la propagación de la infección se detuvo, todas las personas infectadas, en número de 33, fueron aisladas y examinadas. La enfermedad, a la que hemos llamado \"Plaga Terrae\", causa los siguientes síntomas:\nFiebre\nPiel seca\nDificultad para respirar\nDebilidad (en algunos casos)\nConvulsiones (en algunos casos)\nSudoración (en algunos casos).\n\nLa progresión de la enfermedad avanza de forma fulminante: en las primeras etapas, la Plaga Terrae rara vez se manifiesta, y el paciente puede incluso no saber que está infectado. Sin embargo, cuanto más avanza la enfermedad, más síntomas aparecen: la piel se seca y se inflama, aparece la tos y el paciente experimenta un dolor intenso. La muerte por ataque cardíaco ocurre en ocho horas, pero el uso de medicamentos prolonga la vida del paciente hasta aproximadamente un día desde el momento en que aparecen los primeros síntomas.\n\nLo más extraño de la Plaga Terrae es que no hemos podido rastrear las causas de su aparición, absolutamente todas las personas infectadas afirmaron que les parecía que apareció de la nada. Los propios pacientes, a pesar de todos nuestros esfuerzos, murieron, no había forma de curarlos, por eso nos preguntamos involuntariamente: ¿estamos preparados para enfermedades similares en el futuro? Después de todo, es muy posible que esta vez hayamos tenido mucha suerte...\n\nLe mantendremos informado.\nArtemi I. Búraj."
 russia.721.a: "Que enfermedad más rara..."
 russia.722.t: "\"Patriotín\" - Suero estimulador para el combate"
 russia.722.d: "Químicos al servicio del ejército en Tomsk han desarrollado una sustancia que supondrá un antes y un después en el campo de los suplementos militares: \"Patriotín-20\", un suero que potencia las capacidades físicas y mentales de los soldados. los efectos del suero pueden durar hasta 6 horas tras una única inoculación.\nEl suero se probó en maniobras militares secretas realizadas en Extremo Oriente y dio resultados remarcables. Los soldados a los que se les administra el suero afirman que pierden cualquier miedo y cargan hacia el enemigo sin considerar su propia seguridad.\nNo obstante, los científicos han alertado de que puede desarrollar adicción si se emplea repetidamente, además de otros efectos adversos como una pérdida de percepción propia, insomnio, dolores de cabeza ocasionales e incluso desarrollar esquizofrenia leve a largo plazo. Es por esto por lo que se aconseja, tras la inoculación del Patriotín, suministrar a los soldados una dosis de Diazepam una vez que el suero haya dejado de tener efecto.\n\nEl mundo se está haciendo cada vez más peligroso, y nuestra situación geopolítica actual nos obliga a innovar. Nuestros enemigos no tienen piedad, y estos \"soldados perfectos\" les harán pagar por sus acciones. Aún si el precio de esto es la cordura y la humanidad de nuestros valientes guerreros."
 russia.722.a: "¡Esto es demasiado inhumano!"
 russia.722.b: "¡Una brillante y necesaria innovación!"
 russia.723.t: "Salvador de Rusia"
 russia.723.d: "Recientemente, en Yakutia, durante el desarrollo de la tubería de kimberlita \"Besperspektivnaya\", se encontró un diamante de tamaño extraordinario, llamado el \"Salvador de Rusia\", también se propusieron otros nombres para el diamante como: \"Diamante Soberano\" y \"Rusia Unida\".\n\nSe celebró una ceremonia en Moscú en honor al \"Salvador de Rusia\", donde el diamante fue entregado personalmente al presidente. El destino posterior del diamante es desconocido, podemos vender el diamante y pagar parte de nuestra deuda, o podemos donarlo al Fondo de Diamantes de la Federación de Rusia, aumentando así el prestigio del país y el flujo de turistas; la elección es suya."
 russia.723.a: "Venderlo y pagar nuestras deudas."
 russia.723.b: "Donémoslo."
 russia.725.t: "Senegal solicita cooperación"
 russia.725.d: "El presidente Pereira ha solicitado asistencia económica y militar rusa para combatir la influencia francesa en el país."
 russia.725.a: "Iniciaremos la misión del Cuerpo Africano y firmaremos acuerdos económicos."
 russia.725.b: "Firmaremos acuerdos económicos con Senegal."
 russia.726.t: "Senegal sigue siendo profrancés"
 russia.726.d: "A pesar de nuestros esfuerzos por ayudar a Pereira a ganar las elecciones, las fuerzas profrancesas siguen prevaleciendo en el país."
 russia.726.a: "Blin..."
 russia.727.t: "Cooperación con el Talibán"
 russia.727.d: ""
 russia.727.a: "El enemigo de ayer, el aliado de hoy."
 russia.728.t: "Futuro del Frente Popular"
 russia.728.d: "Cuando Lukashenko llegó al poder, el Frente Popular empezó a apoyarle activamente. Sin embargo, esto no fue suficiente para Aleksandr Grigórievich. Entendió que muchos en la dirección del frente podrían inclinarse a cambiar: si llega un nuevo líder, lo apoyarán. La lealtad personal es importante para el nuevo presidente. Por lo tanto, lo primero que decidió hacer fue llenar las filas del ONF con personas leales a él. Esto debía asegurar que la política de Lukashenko se implementara localmente bajo la responsabilidad personal de los nuevos líderes.\n\nPero también hay una opción más radical: una revisión completa de la estructura y el liderazgo del frente. Según el presidente, en lugar de una organización no muy unificada, debería aparecer un partido fuerte que satisfaga los intereses del pueblo. En este partido, Lukashenko debería convertirse en el líder de facto, aunque seguirá siendo no partidista. Aunque esta opción parece más costosa y puede causar descontento entre la vieja guardia dentro de la administración presidencial, puede ser una forma efectiva de fortalecer el apoyo."
 russia.728.a: "Llenar el Comité Ejecutivo del ONF con estadistas de confianza."
 russia.728.b: "¡Transformar el frente en una estructura de partido unida!"
 russia.729.t: "¡Llega el apoyo internacional!"
 russia.729.d: "Los países de los BRICS brindan apoyo a Rusia."
 russia.729.a: "¡Gracias a todos, amigos!"
 russia.730.t: "Ultimátum de Rusia"
 russia.730.d: "ВНИМАНИЕ! \nМЕДВЕДЕВ НЕДАВНО ОБЪЯВИЛ О ЗАПУСКЕ КОДА \"333\" ПО НАСТУПЛЕНИЮ НА ХЕЛЬСИНСКИЙ ГЕЙМДЕВ ГДЕ МОЖНО РАЗДОБЫТЬ ДВЕ ШИЗОИГРЫ ПО ЦЕНЕ ОДНОЙ\nZ Работайте, братья"
 russia.730.a: "¡Quiero vivir!"
 russia.730.b: "¡Quiero morir!"
 russia.731.t: "¡Finlandia acepta!"
 russia.731.d: ""
 russia.731.a: "¡Muy bien! ¡Un brindis por nuestros nuevos amigos!"
 russia.732.t: "¡Finlandia se niega!"
 russia.732.d: ""
 russia.732.a: "Que así sea."
 russia.733.t: "¡Ultimátum de Rusia!"
 russia.733.d: "ВНИМАНИЕ! \nМЕДВЕДЕВ НЕДАВНО ОБЪЯВИЛ О ЗАПУСКЕ КОДА \"777\" ПО НАСТУПЛЕНИЮ НА ТУРЕЦКУЮ ЗАБЕГАЛОВКУ \"У ЭРДОГАНА\" ГДЕ МОЖНО РАЗДОБЫТЬ ДВА КЕБАБА ПО ЦЕНЕ ОДНОГО\nZ Работайте, братья"
 russia.733.a: "ОЙОЙОЙОЙОЙ ВБЕГАЕМО ПАЦАНЫ."
 russia.733.b: "ГАНЬБА ТАК ЖИТИ НЕЛЬЗЯ."
 russia.734.t: "¡Turquía acepta!"
 russia.734.d: ""
 russia.734.a: "¡Ura! ¡Un brindis por nuestro amigo, Erdoğan!"
 russia.735.t: "¡Turquía rechaza nuestras demandas!"
 russia.735.d: ""
 russia.735.a: "Conocen la alternativa..."
 russia.736.t: "Resistencia de la Duma"
 russia.736.d: "Un acontecimiento reciente ha agitado toda la política rusa: algunos diputados del ala supuestamente \"reformista\" de Rusia Unida anunciaron su retirada del partido y la restauración del bloque Patria. Algunos expertos atribuyen este acontecimiento a la victoria en las recientes elecciones presidenciales de la camarilla \"reaccionaria\" dentro de Rusia Unida y al deseo de este grupo de \"subyugar\" el sistema político establecido gracias a las reformas de Medvédev.\n\nMuchos confían en que esta medida está diseñada para evitar que Rusia Unida se fortalezca hasta su posición dominante, como bajo el presidente Putin. Se teme que, habiéndose ganado el apoyo de Rusia Popular y Rusia Nueva, \"Patria\" pueda destituir con éxito al presidente y poner en su lugar a un político más liberal."
 russia.736.a: "¡Maldita sea!"
 russia.737.t: "Gambito de Vorobiov"
 russia.737.d: "Hoy se conoció la decisión del Consejo de la Federación sobre el impeachment del presidente: Viacheslav Volodin fue destituido de su cargo en relación con las acusaciones de la Duma Estatal de violar las normas constitucionales y alta traición. \nAndréi Vorobiov, exgobernador del óblast de Moscú y líder del partido Patria, ha sido nombrado presidente interino.\n\nAl mismo tiempo, tuvieron lugar negociaciones entre Rusia Unida y los reformistas, en las que, al parecer, prevaleció Patria, tras lo cual las partes acordaron unirse: Patria se unió en su totalidad a Rusia Unida. El largo enfrentamiento entre reformistas y reaccionarios finalmente terminó a favor de los primeros."
 russia.737.a: "¡Volodia, te equivocas!"
 russia.738.t: "Fracasa el juicio político"
 russia.738.d: "Hoy se conoció la decisión del Consejo de la Federación sobre el juicio político al Presidente: El Consejo votó en contra, [SOV.GetLeader] mantuvo su puesto como jefe de Estado. Los esfuerzos del bloque Patria, que se separó de Rusia Unida poco después de la victoria electoral del candidato reaccionario, resultaron inútiles.\n\nHabiendo decidido destruir la Rusia del Pueblo y la Nueva Rusia, los reaccionarios de Rusia Unida dejaron a sus oponentes sin apoyo, consolidando así su rumbo hacia el retorno gradual del orden establecido bajo el presidente Putin. El largo enfrentamiento entre reformistas y reaccionarios finalmente ha terminado a favor de estos últimos."
 russia.738.a: "¡Victoria!"
 russia.739.t: "Juicio político al presidente"
 russia.739.d: "Hoy se conoció la decisión del Consejo de la Federación sobre la destitución del presidente: [SOV.GetLeader] fue destituido de su cargo en relación con las acusaciones de la Duma Estatal de violación de las normas constitucionales y alta traición. Andréi Beloúsov fue nombrado presidente interino.\n\nSimultáneamente, se llevaron a cabo negociaciones entre Rusia Unida y los reformistas, en las que, al parecer, prevaleció la Patria. Tras ello, las partes acordaron unirse: la Patria en su totalidad se unió a Rusia Unida. El prolongado enfrentamiento entre reformistas y reaccionarios finalmente terminó a favor de los primeros."
 russia.739.a: "¡La visión de Medvédev sigue viva!"
 russia.740.t: "Turquía solicita unirse a los BRICS"
 russia.740.d: "Desde que la UE se disolvió y la OTAN se desmoronó, el gobierno turco se dio cuenta de que no había forma de evitar unirse a los BRICS. En un discurso público, el presidente Erdogan declaró que siempre había preferido los BRICS a la UE, pero que no había actuado ni se había unido antes por temor a los imperialistas occidentales."
 russia.740.a: "¡Finalmente!"
 russia.741.t: "Caso \"Mafka\""
 russia.741.d: "La primera noticia de que la Fiscalía General de Rusia había interpuesto una demanda contra Makfa y varias de sus empresas apareció en los medios el 28 de marzo. Se informó que el fiscal general adjunto había presentado una demanda ante el Tribunal del Distrito Central de Cheliábinsk contra la sociedad anónima rusa del mismo nombre y, al mismo tiempo, contra sus filiales. No se reveló el contenido de la demanda, y Makfa declinó hacer comentarios. Se programó una audiencia preliminar sobre el caso para el 9 de abril.\n\nAl mismo tiempo, se listaron en el sitio web a los acusados: un total de 34 personas jurídicas y 13 personas físicas, entre ellas el exdiputado de la Duma Estatal Vadim Belúsov y el exgobernador de la región de Cheliábinsk Mijaíl Yurévich. Posteriormente, ambos, como beneficiarios de Makfa, fueron acusados de haber ejercido la actividad empresarial durante muchos años, trabajando en organismos estatales.\n\nDurante muchos años, según Kommersant, los exfuncionarios violaron las prohibiciones y restricciones previstas en la legislación anticorrupción. En el ámbito público, ni Beloúsov ni Yurevich revelaron datos sobre la propiedad de las empresas, como se desprende de los materiales del caso."
 russia.741.a: "El dinero ahora será usado para el mejoramiento de la Federación de Rusia."
 russia.742.t: "El PCFR critica las políticas económicas"
 russia.742.d: "Tras el colapso de Wall Street y la consiguiente crisis económica, Rusia, por supuesto, también la sufrió. Uno de los principales críticos de nuestra forma de manejar esta crisis es el PCFR, y su líder, Guennadi Ziugánov. En un reciente discurso en la Duma, y poco después, en un mitin público, Ziugánov ha pedido la estatización de la riqueza del país y la destrucción de la oligarquía, afirmando: \"...Una vez más, vemos un sistema completamente disfuncional en funcionamiento... El capitalismo, la principal plaga de la humanidad y de Rusia. Durante 30 años hemos estado tratando de incorporarnos a este sistema injusto... Ahora cosechamos las \"recompensas\"... Algo similar ocurrió en los años 90, después del impago... Apenas sacamos al país del abismo... Qué vergüenza para Rusia Unida, qué vergüenza para el Banco Central por sus políticas depredadoras que se aprovechan de los trabajadores... ¡Solo el socialismo es la respuesta a todos los problemas, en la URSS construimos la economía más grande que el mundo haya visto, sin ayuda occidental, sin préstamos bancarios, solo una economía impulsada por el pueblo!\"\n\nCon la crisis afectando a muchos ciudadanos rusos, sus palabras resonaron con más gente de lo habitual."
 russia.742.a: "Siempre es más fácil estar en la oposición."
 russia.743.t: "Zhirinovski: \"¡Mis predicciones se han hecho realidad!\""
 russia.743.d: "Con la crisis económica por todas partes, tal como temíamos, Zhirinovski tiene cosas que decir. Se subió al podio de la Duma y pronunció un discurso encendido:\n\"...Ahora ven, con el colapso de la economía de Wall Street, que los problemas en EE.UU. son inevitables... ¡Sus principales capitalistas colapsaron! ¿Quién dijo esto primero en este mismo podio? ¡Nosotros, nuestro PLDR! Pero de nuevo, Ziugánov se rió, los diputados de EdRo se rieron... ¿Quién se ríe ahora? Dije «¡Donald, ni lo intentes! ¡No salvarás a tu país!». Tenía razón de nuevo, estas fueron las últimas elecciones en Norteamérica, después de esto, todo se perderá... Pero no debemos perder el foco. ¡Todavía tenemos la OTAN, todavía tenemos la Ucrania banderista que mata a nuestra gente en el Dombás!\n\"Me hubiera gustado que estos próximos años fueran pacíficos, pero también me encanta decir la verdad. Así soy yo, durante más de 70 años he dicho la verdad. ¡Estos años no serán pacíficos! ¡Estos serán los tiempos en que Rusia se convierta una vez más en un gran país, y todos se callarán y escucharán a nuestro país! ¡O nos callarán, y genocidio a los rusos no solo en el Dombás, sino en la propia Rusia Occidental!\"\n\nEste discurso de Zhirinovski ha ganado una gran tracción en línea, con la gente llamándolo una vez más \"el gran predictor\"."
 russia.743.a: "Impresionante como siempre, Vladímir Vólfovich."
 russia.744.t: "Ziuganoviana - Una nueva Leniniana"
 russia.744.d: "Tras la jubilación oficial de nuestro querido presidente, Guennadi Ziugánov, era solo cuestión de tiempo que los cineastas intentaran retratar la vida y las luchas de este veterano luchador comunista. Una de las primeras películas estrenadas recientemente fue \"Ziugánov: Tiempos de problemas\", que narra la historia del joven Ziugánov durante los difíciles años posteriores al colapso de la URSS. La película retrata sus heroicos esfuerzos por proteger a los trabajadores y restablecer el Partido Comunista como un faro de esperanza contra la persecución y el latrocinio asociados con la era Yeltsin. La película ha recibido inmediatamente numerosos premios soviéticos y grandes elogios tanto del público como de los funcionarios del Partido.\n\nMucha gente lo considera el punto de partida, la primera película sobre la vida del presidente. Pronto, al igual que con Lenin, la Unión Soviética tendrá su propio género de películas dedicadas a Guennadi Ziugánov."
 russia.744.a: "¡Una obra de arte!"
 russia.745.t: "Reelección de la Duma"
 russia.745.d: "Recientemente, se llevaron a cabo reelecciones a la Duma Estatal, como resultado de las cuales se estableció un sistema tripartidista en el parlamento: Rusia Unida, Rusia Popular y Nueva Rusia se dividieron los escaños a partes iguales.\nAhora que, gracias a los esfuerzos del presidente Davankov, Nueva Rusia se ha transformado de una unión que milagrosamente ganó sus escaños en la Duma en una tercera fuerza a tener en cuenta, será mucho más difícil para los otros dos partidos resistir las iniciativas liberales. La antorcha de la Libertad Soberana arderá durante mucho tiempo, y Nueva Rusia la lleva."
 russia.745.a: "¡Victoria!"
 russia.746.t: "Minoría gubernamental en la Duma"
 russia.746.d: "Nueva Rusia es un partido que existe a pesar de todo. Una asociación de liberales estatales, apareció en contra de la voluntad de Medvédev, quien soñaba con un bipartidismo ruso. Ganó las elecciones presidenciales en contra de todos los pronósticos, superando tanto al Partido Popular como a Rusia Unida.\nSin embargo, debido a un éxito tan rápido e inesperado, Nueva Rusia no logró convertirse en la tercera fuerza en la Duma. Y por lo tanto, siempre existe la amenaza de que todas las reformas que Davankov está llevando a cabo puedan ser canceladas en cualquier momento por la fuerza combinada de los naródniki y Rusia Unida...\n\nLa necesidad de arreglar esto."
 russia.746.a: "¡Necesitamos una mayoría!"
 russia.747.t: "La Cuestión del Segundo Partido"
 russia.747.d: "Dado que la democracia que estamos construyendo en el Imperio se basa en los principios de una monarquía democrática teórica, el modelo más estable de dicho sistema sería un sistema bipartidista.\nSin embargo, la pregunta sigue siendo: ¿qué partido debería ser elegido como rival de los Octobristas?"
 russia.747.a: "La política de izquierda moderada es necesaria en estos tiempos..."
 russia.747.c: "Un conservadurismo más moderno, a diferencia del regresismo octubrista, funcionaría perfectamente."
 russia.748.t: "Los nobles organizan una gala"
 russia.748.d: "Nuestros nobles asistieron recientemente a una magnífica gala. Disfrutaron de una encantadora fiesta del té, saboreando los tradicionales pasteles rusos. En el opulento salón de baile, hermosas mujeres adornaron la pista de baile con sus parejas, mientras los sonidos de la música clásica rusa llenaban el aire.\n\nEl evento fue ampliamente reportado en las noticias, capturando la imaginación de muchas personas que estaban fascinadas por el estilo de vida de la nobleza. Se alegraron mucho de ver el regreso de eventos tan magníficos en Rusia."
 russia.748.a: "¡Excelente!"
 russia.749.t: "Monárquicos se manifiestan por el Zar"
 russia.749.a: "Gracias por su lealtad."
 russia.750.t: "Partido de la Causa Rusa"
 russia.750.d: "Desde la restauración de la monarquía, muchos políticos han estado discutiendo el futuro de la política partidista en Rusia. Algunos argumentan que deberíamos abolir cualquier organización partidista, mientras que otros, incluido Baburin, creen que una organización política que lo abarque todo es necesaria en estos tiempos modernos. Esto permitiría a los ciudadanos rusos interactuar con los representantes del Zar a un nivel más fundamental, sin comprometer el poder y la autoridad del soberano."
 russia.750.a: "¡Los rusos necesitan un partido zarista que los escuche y transmita el mensaje del zar!"
 russia.750.b: "Toda la política no es más que ramas de la decadencia occidental. ¡El Zar protegerá al pueblo de estos políticos!"
 russia.751.t: "Primeras elecciones de la Duma"
 russia.751.d: "Es tiempo de elecciones, un momento en que el pueblo puede expresarse. Tres partidos principales compiten por escaños en la Duma.\nLa Unión 17 de Octubre, son los Octubristas, nombraron su partido en honor al Manifiesto firmado por Nicolás II el 17 de octubre de 1905. Son los herederos ideológicos de los antiguos Octubristas, que dejaron de existir después de la revolución de febrero de 1917. Bajo el liderazgo de Konstantín Zatulin, el partido aboga por la cooperación con las empresas imperiales, el desarrollo de la cultura rusa y la consolidación de la sociedad.\n\"Soberanía y Democracia\" - conservadores moderados bajo el liderazgo de Antón Bakov. Declaran la necesidad de ampliar el apoyo a los segmentos vulnerables de la población, aumentar los subsidios gubernamentales a las empresas y profundizar la cooperación con la iglesia.\nEl Partido de la Justicia es un partido izquierdista indeseable liderado por Aleksandr Búrkov. Abogan por un mayor apoyo a los trabajadores, una mayor democratización y una \"aceptación pacífica de la historia rusa\". Aunque no favorecemos a los partidos de izquierda, no podemos privar a nuestros súbditos de su libertad democrática de elección.\n\nLa lucha de los partidos por los votos del pueblo continúa como resultado..."
 russia.751.a: "¡La Unión 17 de Octubre asegura la mayoría en la Duma!"
 russia.751.c: "El PPR se ha ganado el favor del pueblo, y ahora preside la mayoría de la Duma."
 russia.751.h: "Los izquierdistas lograron, de alguna manera, ganar."
 russia.752.t: "Cooperación económica con Rusia"
 russia.752.d: ""
 russia.752.a: "Amistad y Cooperación"
 russia.753.t: "Centro de Reconciliación Histórica"
 russia.753.d: "Después de que Davankov anunciara la Doctrina de la \"Reconciliación de la Historia\", se erigió un monumento a Nicolás II en Ekaterimburgo frente al monumento a Lenin, y el plan de estudios escolar sufrió cambios en aras de la reconciliación de la historia, lo que provocó que se reescribieran los libros de historia escolares, pero el pico principal de esta doctrina fue la construcción del \"Centro para la Reconciliación de la Historia\", en cuya inauguración estuvo presente el propio Davankov.\n\nEl centro en sí es un museo de la historia de Rusia, que intenta combinar opiniones y épocas completamente diferentes en un único camino histórico del país. Las exposiciones muestran épocas históricas de diferentes tiempos, tratando de explicar el contexto político desde el punto de vista de los actores de ese momento, explicando las razones que los impulsaron a hacer lo que hicieron, al final de las exposiciones todo se suma a una imagen gigante de la historia de Rusia."
 russia.753.a: "¿Y en quién debería confiar?"
 russia.754.t: "El fin de los reaccionarios"
 russia.754.d: "Recientemente, una ola de dimisiones de funcionarios y ministros pertenecientes a la facción \"reaccionaria\" de Rusia Unida tuvo lugar en el Gobierno. Habiendo perdido el poder supremo tras el impeachment de su candidato, los reaccionarios comenzaron a dividirse en camarillas separadas formadas alrededor de antiguos miembros de las Torres del Kremlin.\n\nEl grupo de los neo-siloviki sigue siendo el más relevante de ellos. Agrupados en torno a Alekséi Diumin, el exgobernador de la región de Tula, quien alguna vez fue considerado uno de los posibles sucesores de Putin, abogan por un curso duro en la gobernanza del país. Afortunadamente, los grupos reaccionarios están demasiado dispersos y son pocos en número como para oponer una seria oposición a nuestras reformas."
 russia.754.a: "Se aseguró la libertad."
 russia.755.t: "Su última carta"
 russia.755.d: "\"Dmitri Anatólievich,\n\n\"Una vez más, se le ha confiado la presidencia. Esta vez, lamentablemente, tendrá que liderar solo.\n\"Usted, mi protegido y amigo de confianza. Nuestros cálculos fueron correctos. El mundo está al borde de una nueva era, con el panorama geopolítico cambiando de una manera que es a la vez destructiva y aterradora. Cada día, vemos las consecuencias desenfrenadas de estos cambios. El mundo es un páramo de fracasos pasados, pero usted debe estar a la altura del desafío y tomar el timón de nuestra Madre Patria, sin miedo.\n\n\"Con esta carta, también recibirá una pequeña caja que contiene mi pin presidencial, el primero de todos. Ahora es suyo. Fue audaz una vez, sea audaz de nuevo. Proteja a Rusia de la agitación política, fije su mirada en el objetivo principal y confronte la unipolaridad colapsante con determinación.\n\n\"Buena suerte y adiós.\n\n\"Firmado:"
 russia.755.a: "\"...Vladímir Vladímirovich Putin.\""
 russia.756.t: "Finalizados los derechos de recursos rusos"
 russia.756.d: ""
 russia.756.a: "Genial."
 russia.757.t: "Derechos de recursos rusos"
 russia.757.d: ""
 russia.757.a: "Genial."
 russia.758.t: "¡Puertas económicas abiertas con Rusia!"
 russia.758.d: ""
 russia.758.a: "Rusos y chinos son hermanos para siempre"
 russia.759.t: "Invitación a la OTSC"
 russia.759.d: ""
 russia.759.a: "БРАТВА РВЁТСЯ К ВЛАСТИ!!!!"
 russia.759.b: "БРАТ..... НАДО ТИШИНУ ПОЙМАТЬ...."
 russia.760.t: "Serbia acepta"
 russia.760.d: ""
 russia.760.a: "Hermandad serbio-rusa para siempre"
 russia.761.t: "Serbia se niega"
 russia.761.d: ""
 russia.761.a: "Joder..."
 russia.762.t: "Slutski declara un \"Nuevo Pensamiento Nacional\""
 russia.762.d: "Semanas después del fallecimiento de nuestro querido líder, Vladímir Zhirinovski, su sucesor, Leonid Slutski, subió al podio en el Senado ruso. Declaró la necesidad de revisar las políticas nacionales y avanzar hacia un \"pensamiento moderno\".\n\nSlutski dijo: \"No intento decir que el gobierno de nuestro amado fundador fuera malo... ¡Fue increíble, ganamos la guerra juntos, bajo su mando! Pero ha llegado el momento de entender que las prácticas que habrían sido adecuadas para el Gobierno de Vladímir Vólfovich... no son apropiadas para continuar su legado. Creo que... Vladímir Vólfovich habría apoyado y alentado tales esfuerzos si estuviera vivo. Él personalmente me confió su puesto, así que sé de lo que hablo\".\n\nDespués de que Slutski terminó su discurso, el senado votó a favor de una serie de reformas propuestas por él. Sin embargo, algunos señalaron que las personas que se habrían opuesto a sus ideas estuvieron ausentes de la sesión de hoy. Sus partidarios los han criticado como simples oponentes que están siendo \"perezosos\"."
 russia.762.a: "Es lo que es."
 russia.763.t: "Elecciones panrusas"
 russia.763.d: "El \"deshielo\" de Slutski ha llegado a su fin, y después de meses de liberalización, ahora se celebran elecciones con muchos partidos y candidatos nuevos. Sin embargo, la gente piensa que solo unos pocos candidatos pueden considerarse contendientes serios.\nEl propio Slutski ha dicho que no tiene intención de presentarse a la presidencia. En cambio, se ha seleccionado un nuevo candidato: Andréi Svíntsov. Mucha gente piensa que Svíntsov podría ser fácilmente influenciado por el Consejo Supremo del PLDR, que está dirigido por Slutski. Por lo tanto, Slutski aún podría mantener el control entre bastidores y es probable que sea nombrado para el puesto de primer ministro.\n\nOtros candidatos incluyen a Román Yuneman, un candidato joven y de mentalidad democrática del partido \"Sociedad.Futuro\". Se presenta con una plataforma para construir un verdadero sistema parlamentario ruso.\n\nDmitri Rogozin es otro candidato que vale la pena mencionar. Es un inconformista con una perspectiva positiva sobre el período soviético. Sus puntos de vista de izquierda se combinan con posiciones sociales de derecha. Se presenta por el partido \"Rodina\", un actor menor de larga data en la política rusa al que finalmente se le ha dado la oportunidad de gobernar."
 russia.763.a: "¡Yuneman!"
 russia.763.b: "¡Svíntsov!"
 russia.763.c: "¡Guirkin!"
 russia.763.f: "¡Rogozin!"
 russia.764.t: "¡Jaque mate!"
 russia.764.d: "Leonid Slutski no es la persona más inteligente, pero eso dice más de sus oponentes, quienes fueron superados por él. Aquellos que intentaron engañarlo y sugirieron que no es un sucesor verdadero y honesto de Vladímir Zhirinovski, cuando ellos mismos tienen una comprensión limitada y distorsionada de su política, mostraron una falta de sofisticación. Está claro que no esperaban tal pensamiento estratégico de Slutski.\nAhora, Slutski lidera una nueva Rusia que fue construida y revitalizada por Vladímir Vólfovich. Algunas cosas eran nuevas, otras prestadas. Estaba claro que la gente no aceptaría un gobierno de mano dura de cualquiera que viniera después de Zhirinovsky porque saben que nadie será como Zhirinovski. Por lo tanto, un cambio era necesario.\n\nPor supuesto, el PLDR seguirá en el poder y sus reglas y leyes no pueden cambiarse. Sin embargo, ya no es un régimen autocrático sino una fuerza guía para el pueblo ruso."
 russia.764.a: "Vivimos en sociedad."
 russia.765.t: "¡Nuestra Madre Patria en peligro!"
 russia.765.d: "La amenaza comunista de occidente finalmente ha mostrado sus verdaderos colores, atacándonos directamente a nosotros y a nuestros aliados. Estas fuerzas malignas buscan extender su ideología por todo el mundo. Pero los neobolcheviques verán nuestra fuerza, y los derrotaremos.\n\nLos aplastaremos, y Europa estará libre de la influencia de estos demonios comunistas."
 russia.765.a: "¡Za Rodinu!"
 russia.766.t: "En mi pueblo..."
 russia.766.d: "Hay una guerra en mi pueblo,\nA nadie le importa un carajo.\nMientras cientos de personas y soldados mueren\nMientras los actores de Moscú beben y bailan...\n\nNo hay risas de niños en mi ciudad,\nLa sirena suena todos los días,\nCanta una canción infernal\nLlevándose nuevas víctimas de la mortalidad de la vida...\n\nMi pueblo ha estado vacío por mucho tiempo\nSin esperanza, sin amor, sin nada.\nSolo en el cielo\nEl aullido solitario de la defensa antiaérea...\n\nEn mi ciudad tristeza y dolor\nDescansando sobre laureles de luto.\nTodo lo que fue ahora, se pospone para después.\nY multiplicado en heridas sangrientas...\n\nSolo mi ciudad se mantiene como antes\nExhausta, simplemente cansada\nPero todavía creemos en ella\nY cantamos..."
 russia.766.a: "\"¡LA VICTORIA ES NUESTRA!\""
 russia.767.t: "Nuevo conflicto en Asia"
 russia.767.d: "Tras la guerra de Taiwán, la situación en Asia vuelve a caldearse. Un nuevo conflicto podría engullir a toda la región: Japón, aliado con la Organización del Tratado de Defensa del Pacífico, contra China y su Iniciativa de Defensa del Este Asiático. Esta batalla podría cambiar el equilibrio de poder en el mundo. Ahora es el momento de que tomemos una decisión."
 russia.767.a: "¡Apoyemos a China!"
 russia.767.b: "Mantengámonos neutrales"
 russia.767.c: "¡Apoyemos a Japón!"
 russia.768.t: "Apoyo de Moscú"
 russia.768.d: "¡La Unión Soviética decidió apoyar y brindó asistencia!"
 russia.768.a: "¡Genial!"
 russia.769.t: "Nuevo Viejo Socialismo"
 russia.769.d: "En un viejo café de Moscú, dos amigos, viejos conocidos de hace mucho tiempo, estaban sentados. Uno de ellos, Maksim Cherepanov, era un gran empresario que recientemente había perdido su negocio, el cual había sido vendido al Estado bajo las nuevas leyes por casi nada. Suspiró profundamente y, sacudiendo la cabeza, se volvió hacia su camarada, Antón Ivanov, un simple trabajador que había dedicado toda su vida al trabajo y era fiel a los viejos ideales del leninismo:\n\n\"Sabes, durante 10 años construí mi empresa desde cero, no soy un oligarca, no robé nada, puse mi alma en ello, y ahora me lo han quitado. Por unas monedas. ¿Cómo se puede hacer eso? ¿Cuál es nuestra prisa? ¿Por qué avanzar tan rápido? ¡El socialismo no se puede construir de la noche a la mañana! El país simplemente no está preparado. Necesitamos hacer todo gradualmente, no romperlo todo de golpe\". Su amigo, que destacaba por su apoyo al nuevo Gobierno, se recostó en su silla y sonrió.\n\"No te han arruinado, no te han echado a la calle. Te quedaste como director de tu propia empresa. ¿Es tan malo? Sí, por unas monedas, pero tu vida no se desmoronó. Y el país necesita más, después de todos estos años de degradación. Hemos perdido demasiado tiempo, y ahora necesitamos desarrollarnos rápidamente. Para repetir el éxito que tuvimos en la era socialista anterior. ¡Y esto requiere una acción decisiva! Entiende, estas son las exigencias de los tiempos...\"\n\"Quizás tengas razón...\", murmuró el empresario a regañadientes, pero sus ojos aún mostraban duda."
 russia.769.a: "Necesitamos el salto del progreso..."
 russia.770.t: "Conversaciones entre Ucrania y Rusia"
 russia.770.d: "A pesar de nuestros mejores esfuerzos durante la guerra, tuvimos que negociar con el nuevo gobierno ucraniano que asumió el poder después de que el régimen anterior fuera derrocado. El Gobierno de Boyko es más amigable con Rusia y la población de habla rusa, pero tuvimos que abandonar temporalmente nuestras propuestas más radicales, como la adhesión de Ucrania a la OTSC (Organización del Tratado de Seguridad Colectiva) o más anexiones territoriales.\n\nSin embargo, después de las nuevas conversaciones entre Ucrania y Rusia en Odesa, el Gobierno de Boyko acordó firmar una alianza militar a cambio de una financiación e inversión significativas en la reconstrucción económica de Ucrania después de la guerra. Esto también incluye la construcción de un zoológico en Kiev y un parque acuático en Odesa."
 russia.770.a: "Y de nuevo es primavera en Arcadia, y está lleno en el Maidán..."
 russia.771.t: "Vladímir Putin y el Vacío"
 russia.771.d: "\"¡Vovka!\", La voz de Borís Nikoláyevich llamó desde detrás de la puerta, \"¿dónde estás?\"\n\n\"¡En ninguna parte!\" Murmuró en respuesta.\n\n\"¡Ja!\", Yeltsin gritó de repente. \"¡Bien hecho! Mañana anunciaré mi gratitud a todo el país. ¡Lo entiendes todo! Entonces, ¿por qué te has hecho el tonto toda la noche?\"\n\n\"¿Qué significa eso?\"\n\n\"Piénsalo. ¿Qué ves delante de ti ahora mismo?\"\n\n\"Una almohada\", dijo, \"pero no tan claramente. Y no me digas otra vez que está en mi mente\".\n\n\"Todo lo que vemos está en nuestra mente. Así que no puedes decir que nuestra conciencia está en algún lugar. No estamos en ninguna parte simplemente porque no hay un lugar donde podamos decir que estamos allí. Por eso no estamos en ninguna parte\".\n\n\"Borís Nikoláyevich\", dijo, \"Preferiría estar solo\".\n\n\"Como quieras. Quiero que estés como un roble mañana. Promoción al mediodía, ya sabes\"."
 russia.771.a: "¿Dónde estoy en este flujo?"
 russia.772.t: "Negocio soviético"
 russia.772.d: "Era un exitoso hombre de negocios, dueño de una cadena de centros comerciales, un casino y uno de los miembros del consejo de la zona económica especial en Novorosíisk. Ese día, paseando por una de sus propiedades, se detuvo en seco.\nFrente a él, a la sombra de su brillante imperio empresarial, se alzaba un remolque, del que emanaba un olor apetitoso. Un hombre azerbaiyano con un delantal grasiento trabajaba en la ventana, entregando shawarmas a trabajadores y transeúntes satisfechos. El empresario pensó que era un insulto a su grandeza.\nSe acercó al cocinero con una actitud combativa y comenzó a espetar: \"¿Qué haces aquí? ¿Quién te dio derecho a hornear tu veneno aquí?\"\nEl pobre hombre intentó calmar al ardiente capitalista, pero fue en vano, y se produjo un altercado. Afortunadamente, duró solo un minuto, cuando el empresario vio los documentos de autorización de actividad comercial en la ZEE.\n\"¡Si no fuera por las leyes soviéticas, habría derribado tu puesto de comida hace mucho tiempo! ¡Era mucho más fácil en los noventa!\"\n\"Hermano, ¿estás tan enojado porque tienes hambre? ¡Te lo preparo gratis!\"\n\"¡Déjame en paz!\""
 russia.772.a: "...el estómago rugió traicioneramente."
 russia.773.t: "Lucha de clases"
 russia.773.d: "Un escándalo que amenazaba con convertirse en un desastre ocurrió en una planta de construcción de maquinaria en la región del Volga. El sindicato corporativo creado para los trabajadores resultó ser vacío: las quejas no eran respondidas, por lo que el colectivo laboral decidió crear su propio sindicato independiente. Llevados a la desesperación, la gente se reunió para una manifestación espontánea justo en el taller de producción. Ingenieros, soldadores, contadores y trabajadores de todos los departamentos se unieron bajo banderas rojas y pancartas con las inscripciones \"¿Por qué luchamos?\" y \"¡Fábricas para los trabajadores!\". El dueño de la planta, asustado por la amenaza de la falla del pedido estatal, bajó al taller para pacificar a los descontentos. Exigió en voz alta: \"¡Tenemos un sindicato corporativo! ¡Todas las quejas allí! ¡Están incumpliendo los plazos! ¡Regresen inmediatamente a sus puestos!\". Una voz de la multitud lo interrumpió: \n\"Sí, ¡excepto por los regalos para las fiestas, su sindicato no sirve para nada! ¿Hasta cuándo nos van a seguir dando largas? ¡Ya hemos creado el nuestro! ¡No tienen derecho a hacer eso!\" gritó el dueño, enrojeciendo de ira. \"¡Llamaré a la policía! ¡Adelante, inténtelo!\" En ese momento, la policía irrumpió en el taller, rodeando instantáneamente a la gente en conflicto y..."
 russia.773.a: "...todos fueron derribados."
 russia.773.b: "...el director fue arrestado."
 russia.774.t: "¡Únete a un sindicato!"
 russia.774.d: "El Ministerio del Interior intervino en el conflicto laboral para evitar la amenaza de interrupción de la producción en una planta estratégicamente importante. La dirección de la empresa fue reemplazada y el sindicato corporativo fue sustituido por un sindicato estatal. Los primeros meses después de los cambios dieron esperanza a los trabajadores: los problemas se resolvían con prontitud, las quejas se atendían y la gente se sentía escuchada.\n\nPor otro lado, la situación cambió con el tiempo. El nuevo sindicato, agobiado por la burocracia, comenzó a empantanarse en el soborno y la corrupción. Solo \"los suyos\" o aquellos que podían ofrecer una \"pequeña muestra de agradecimiento\" recibían ayuda. Los intentos de expresar insatisfacción o hacer preguntas eran vistos como un socavamiento de la disciplina estatal, con las consecuencias correspondientes. Pero a pesar de esto, la estabilidad del sindicato aseguró la protección de los trabajadores contra las violaciones más flagrantes: los salarios llegaban a tiempo, las condiciones de trabajo se mantenían al mismo nivel. La planta cumplía con sus obligaciones y el miedo a despidos repentinos, como ocurría en el pasado, ya no existía.\n\nEn una de las losas, los soldadores, sentados en un descanso, discutían lo sucedido:\n\"Dicen: «Tenemos tareas más importantes». ¿Qué tareas? ¿Son realmente comunistas?\" refunfuñó uno de ellos, limpiándose el hollín de la cara.\n\"Tal vez simplemente olvidaron por qué vinieron aquí. Derrotaron a los enemigos y se olvidaron de nosotros\", dijo el otro, mirando hacia el taller."
 russia.774.a: "¿Ganamos?"
 russia.775.t: "¡Únete a un sindicato!"
 russia.775.d: "Las autoridades decidieron hacer concesiones a los trabajadores cambiando la dirección de la planta y permitiendo el establecimiento de un sindicato independiente, que obtuvo el control sobre los procesos en la planta. Formalmente, la planta siguió siendo propiedad del antiguo dueño, pero de hecho la gestión se transfirió a manos de los trabajadores. Al principio, este enfoque demostró ser el mejor: los problemas se resolvían colectivamente y las condiciones de trabajo comenzaron a mejorar significativamente.\n\nSin embargo, con el tiempo el sindicato comenzó a fortalecer a intrigantes y arribistas, quienes expulsaron a los trabajadores talentosos e innovadores. Esto llevó a la degradación gradual de la organización. Los empleados insatisfechos se enfrentaban a la presión colectiva o se veían obligados a abandonar la planta. Las huelgas se utilizaban más como una palanca de presión sobre la dirección, y los problemas reales quedaban desatendidos.\n\nLa situación se volvió tan secreta y tensa que incluso la contrainteligencia no le prestó la debida atención, considerándola una dificultad interna. Uno de los jóvenes oficiales del KGB, intentando tomar la iniciativa, se encontró con mensajes alarmantes en el canal de Telegram del trabajo:\n\"Dim, mira, hay un canal de una planta. Dicen que es un escándalo total. ¿Investigamos?\"\n\"Pash, vamos, no es nada. No hubo consultas ni quejas. Lo más probable es que sea solo otra propaganda del extranjero. No tenemos tiempo para investigar asuntos tan triviales\"."
 russia.775.a: "¿Ganamos?"
 russia.776.t: "Eurasia nos ofrece una asociación económica"
 russia.776.d: ""
 russia.776.a: "Suena bien."
 russia.777.t: "Auge del terrorismo"
 russia.777.d: "Grupos nacionalistas se han activado en Ucrania, el Báltico y Polonia. Abogan por la destrucción del reconstituido Imperio Ruso y la restauración de regímenes chovinistas en Europa del Este. Ya han comenzado a sabotear y asesinar a personas leales a nosotros. ¡Tenemos que hacer algo al respecto!"
 russia.777.a: "¡Declaren la posición de la operación antiterrorista!"
 russia.778.t: "Insurgencia musulmana"
 russia.778.d: "Tras los terroristas en el este, los islamistas en el sur están lanzando numerosas revueltas, apoderándose de importantes centros de transporte y de poblaciones enteras.\nLo más probable es que se repita el escenario de los últimos años con la invasión del Cáucaso y el sur de Asia Central. Debemos hacer algo."
 russia.778.a: "¡Preparen los tanques!"
 russia.779.t: "Redada de Moscú"
 russia.779.d: "Hoy, muchos moscovitas fueron despertados al amanecer por el sonido de vehículos pesados moviéndose por las calles, puertas siendo derribadas y, en ocasiones, incluso disparos. Más tarde, el gobierno anunció la \"conclusión exitosa de una operación para arrestar a varios elementos traidores peligrosos en Moscú\", afirmando que alrededor de 2.500 sospechosos han sido capturados. Los medios internacionales han notado que la ubicación actual de muchos empresarios, científicos y políticos prominentes es desconocida. Una cosa se puede decir con certeza: los traidores ya no amenazan al Imperio."
 russia.779.a: "Esto fue tan fácil como darle la vuelta a la mano."
 russia.780.t: "Cuestion polaca"
 russia.780.d: ""
 russia.780.a: "¡Inclúyelos directamente en el Imperio!"
 russia.780.b: "Solo hay que aumentar el control sobre el Gobierno actual y aplastar a los separatistas."
 russia.780.c: "Los polacos siempre han sido un pueblo amante de la libertad, seremos indulgentes con ellos."
 russia.781.t: "Su causa sigue viva"
 russia.781.d: "El gran líder Vladímir Vólfovich Zhirinovski, un defensor inquebrantable de Rusia. Su vida, llena de brillantes logros y una voluntad indestructible, se ha convertido en una leyenda. Rusia, a la que elevó a nuevas alturas de poder y prosperidad, lamenta su fallecimiento, pero su corazón late al unísono con su testamento.\n\nSu nombre está grabado para siempre en los anales de la historia con letras de oro. Él, un luchador inquebrantable, rompió las cadenas de la conspiración globalista, devolvió a Rusia su antigua grandeza y fortaleció su posición en el escenario mundial. Su coraje, su perspicacia, su energía indomable inspiraron a millones. ¡Se ha ido, pero su obra vive! Sus ideas, su estrategia, su fe inquebrantable en Rusia, todo esto sigue vivo en los corazones de millones de leales seguidores del PLDR.\n\nEl PLDR, fiel al testamento de su líder, continuará su curso para la prosperidad de Rusia. Nosotros, los seguidores de su gran camino, trabajaremos incansablemente por el bien de nuestra Madre Patria, fortaleciendo su poder y protegiendo sus intereses. La memoria de Vladímir Volfovich Zhirinovski es un fuego sagrado que arderá para siempre en nuestros corazones. Su nombre es un símbolo de fuerza, coraje y amor por Rusia.\n\n¡Viva Rusia! ¡Viva la memoria eterna de Vladímir Vólfovich Zhirinovski!"
 russia.781.a: "Su causa es inmortal."
 russia.782.t: "La Caza"
 russia.782.d: "El sol se alzó sobre el cielo matutino del este de Polonia, iluminando una escena pintoresca. Había algunas nubes, el viento era suave y el día sorprendentemente cálido. Pero una formación de cinco jets tronó a través de él, rompiendo la paz.\n\nEl teniente Petrov y su escuadrón de SU-35s surcaban los cielos del este de Polonia, alertas, vigilantes y ansiosos por una pelea. Estaban a la caza.\n\nEl espacio aéreo sobre las naciones del \"Flanco Oriental\" de la OTAN se había convertido en una gran arena de gladiadores. El cielo estaba lleno del rugido de los jets y el estruendo de las armas y los misiles. Las batallas rugían, las máquinas chocaban, los hombres morían y la gloria se apoderaba.\n\nPero Petrov y sus camaradas no eran ajenos a todo esto. Día tras día estaban aquí, luchando, incluso justando, con el enemigo. Era un juego duro y más allá de peligroso, pero a estas alturas ya tenía mucho que mostrar. 5 F-16 rumanos, 3 MiG-29 ucranianos y un Eurofighter Typhoon alemán derribados. Pero no estaba aquí para más muertes como esas. No le importaban esas victorias anteriores, ni siquiera nada más aquí. Se obsesionó y se centró en su presa.\n\nLos británicos, el perro faldero más cercano de Estados Unidos en Europa, tenían su aviación activa sobre Polonia. A diferencia de sus títeres de Europa del Este, eran especiales. Tenían esos temidos cazas de quinta generación, el F-35 estadounidense, y el escuadrón de Petrov lo había estado sintiendo. Había perdido a algunos camaradas queridos por él a causa de estos malditos jets, y quería hacer pagar a estos arrogantes anglosajones.\n\nY así, él y su escuadrón surcaron los cielos, buscando. El entusiasmo desapareció, el miedo y la tensión ahora colgaban en sus cabinas, mezclados con el ansia de venganza. Petrov seguía pensando en una cosa. Estaban aquí, él simplemente lo sabía. Debían estar cerca, muy...\n\nPero entonces Petrov se lanzó a sus pantallas, las luces parpadeando, los ruidos a todo volumen. El terror explotó dentro de él. Su receptor de advertencia de radar gritó que estaba siendo fijado."
 russia.782.a: "Aquí vamos."
 russia.783.t: "La muerte"
 russia.783.d: "La radio del escuadrón estalló en un caos frenético mientras Petrov giraba su palanca a la izquierda y soltaba bengalas, su caza virando para defenderse de los misiles entrantes. El resto de los Sukhois hicieron lo mismo, ladeándose y zambulléndose en todo tipo de direcciones. Los aviadores escanearon frenéticamente el cielo a su alrededor en busca de la aeronave emboscada.\n\nSus compañeros gritaban datos de alcance y objetivo por la radio, pero Petrov no podía decir nada. Su corazón latía a mil, las manos le temblaban y el miedo lo devoraba. Estaba paralizado en el momento, asustado pero concentrado. Sus ojos y su cabeza estaban por todas partes, buscando a sus atacantes. Tenía unos momentos, no, meros segundos para actuar. Escaneó y escaneó, pero entonces...\n\n\"¡Allí! ¡Debajo de nosotros!\" crepitó la radio.\n\nTodavía defendiéndose, ladeó su jet y vio una formación de tres F-35 británicos pasar zumbando, con misiles sueltos y listos para perseguir a un par de sus compañeros. Tenía razón. Están aquí.\n\nPero ahora trató de concentrarse más, forzando el miedo al fondo de dondequiera que pudiera meterlo en su mente. Actuar, no divagar. Hacer o morir. Rápidamente buscó una oportunidad y la encontró.\n\nEl F-35 trasero estaba ocupado, persiguiendo a uno de sus compañeros y él estaba muy cerca. Sus ojos se abrieron. Ahora era su oportunidad. Petrov entonces sacudió su avión y apretó el acelerador.\n\nAcortó la distancia, los 7 segundos hasta el objetivo pasaron en un abrir y cerrar de ojos. En el siguiente segundo, haría historia en la aviación. Como un acto reflejo, alineó su avión, apuntó y disparó.\n\nEn dos segundos, la larga ráfaga de su cañón automático rotatorio convirtió al elegante y costoso símbolo del complejo militar-industrial de Estados Unidos en una bola giratoria de fuego y metal retorcido.\n\nPetrov soltó el gatillo y respiró hondo pero rápido. El miedo se desvaneció y su orgullo se hinchó a una altura maravillosa mientras la batalla seguía rugiendo. Luego sonrió y llamó por radio a sus compañeros, riéndose."
 russia.783.a: "\"¡Menos uno! ¡Quinta generación mis cojones!\""
 russia.784.t: "Ora a Dios - La victoria viene de Él"
 russia.784.d: "Como dijo Aleksandr Vasílievich Suvórov, el comandante ruso más famoso: \"Héroes milagrosos, paz, apoyo, gloria de la Madre Patria: Dios está con nosotros. Orad a Dios, la victoria viene de Él. Dios es nuestro general, Él nos guía\".\n\nSantísima Madre de Dios, sálvanos. A San Nicolás, ruega a Dios por nosotros. Sin esta oración, no empuñes armas, no dispares cañones, no empieces nada. Comienza cada empresa con la bendición de Dios.\n\nFortalece el espíritu en la fe paterna y ortodoxa. Enseñar a un ejército sin fe es como afilar hierro quemado. Como un árbol sin raíz, es la reverencia por el poder de la tierra sin reverencia por el poder de Dios. Honra el cielo, y luego la tierra.\n\n¡Dios tenga piedad, somos rusos!\nRestablezcamos la fe en el Dios Misericordioso como antes."
 russia.784.a: "¡Dios bendiga a Rusia!"
 russia.785.t: "El Estado ruso de la Nueva Era"
 russia.785.d: "Rusia organizó con orgullo una conferencia ceremonial para anunciar la inminente finalización de los objetivos de desarrollo económico y social a largo plazo del país para 2035. El evento, al que asistieron altos funcionarios y delegados internacionales, incluido nuestro líder [SOV.GetLeader] y el entonces secretario general de la ONU, demostró el notable progreso de Rusia. A pesar de las duras sanciones, las múltiples crisis después de la Guerra Europea y, por supuesto, la muerte del Gran Líder Vladímir Zhirinovski, Rusia ha seguido creciendo y desarrollándose. Se ha logrado mucho en los últimos años.\n\nEsta serie de éxitos sienta las bases para la siguiente etapa del desarrollo de Rusia. Con ambiciones de convertirse en un hegemón en toda Europa, un líder en la industria militar y civil y un verdadero país para el pueblo, el país está en camino de realizar su visión de convertirse en un líder mundial para 2046, el centenario del nacimiento de Vladímir Zhirinovski."
 russia.785.a: "Los grandes sueños solo pueden hacerse realidad con un gran esfuerzo."
 russia.786.t: "La Era de Yuneman"
 russia.786.d: "¡Rusia, levántate! Ante nosotros se alza una figura como el legendario Pedro el Grande: ¡Román Aleksándrovich Yuneman! ¡Su reinado estará marcado no solo por reformas, sino por una verdadera revolución que llevará a Rusia a un nuevo nivel de poder y prosperidad!\n\n¡Olvídate del estancamiento y la ineficiencia! Sus reformas, como los golpes del martillo de un herrero, forjarán de Rusia un verdadero gigante mundial, capaz de desafiar a cualquier enemigo.\n\nPero Yuneman no es solo un gerente eficaz. Es un inspirador, un líder que logró unir al pueblo bajo la bandera de un objetivo común. Su carisma y determinación inspiraron a millones, convirtiéndolos en un solo puño, listo para defender los intereses de la patria. No teme a las dificultades, tomando valientemente decisiones que otros considerarían imposibles.\n\nLa comparación con Pedro el Grande no es accidental. Así como Pedro soñó con una Rusia grande y moderna, Román Aleksándrovich quiere hacer de Rusia aún más majestuosa de lo que jamás ha sido. Pero si Pedro el Grande abrió una ventana a Europa, ¡Yuneman abrirá las puertas al futuro de Rusia, un futuro lleno de esplendor, prosperidad y un poder sin precedentes!\n\n¡Pronto el mundo entero será testigo del triunfo! ¡Siente el orgullo por el orgullo de Rusia y de nuestro líder, cuyo nombre pasará para siempre a la historia como el nombre del hombre que verdaderamente revitalizó el Imperio!"
 russia.786.a: "¡Este es mi líder! ¡Este es nuestro líder!"
 russia.787.t: "La buena vieja Rusia"
 russia.787.d: "La gran victoria sobre los globalistas occidentales ha traído paz y estabilidad a Rusia, pero la sombra de una nueva amenaza se cierne sobre el horizonte. El neobolchevismo está levantando cabeza en Europa, planteando un peligro para los valores tradicionales y la soberanía rusa. Esto exige vigilancia y una acción decisiva.\n\nSin embargo, el pueblo, inspirado por el sabio gobierno de nuestro gran Zar, [SOV.GetLeader], está decidido a afrontar nuevos desafíos. El levantamiento moral del pueblo, que ocurrió después de la restauración de la monarquía, impulsa al pueblo ruso hacia el futuro, aplastando en el camino todas las dificultades y amenazas.\n\nRusia, revivida después de muchas décadas de bolchevismo, vela por sus intereses, lista para proteger sus logros y su futuro. Los traidores del pasado han sido olvidados, su legado ha sido destruido y nunca más seducirá las mentes de nuestro pueblo. Todos los oponentes de nuestra Rusia serán destruidos al igual que toda la suciedad dejada por los bolcheviques fue destruida.\n\n¡Esta es la Rusia que recuperamos, y es más fuerte que nunca!"
 russia.787.a: "¡El crujido del pan francés nunca ha sido tan fuerte! No le tememos a los problemas."
 russia.788.t: "Otra Smuta"
 russia.788.d: "En el pasado, el Anillo del Jardín de Moscú era un verdadero caos de tráfico. Hoy en día, incluso en plena noche, las calles siguen resonando con ruido. Pero no son los motores lo que se escucha, sino el clamor de las protestas: coches volcados, cócteles molotov estallando contra las ventanas y gritos de consignas antigubernamentales. El brillo anaranjado de los incendios casi ha superado las luces de neón de la ciudad.\n\nEn el corazón de Moscú, dentro del Gran Palacio del Kremlin, hay una oficina adornada con madera de nogal. El general Shoigú, el segundo al mando del gobierno de Medvédev, apartó las cortinas y miró con inquietud las llamas a lo lejos. \"¿Qué hacemos ahora?\", murmuró.\n\n\"Claramente, necesitan traer de vuelta a nuestro presidente\", se oyó una voz detrás de él.\nShoigú se dio la vuelta y vio a Belousov sentado tranquilamente en un sofá en la esquina. A pesar de su apariencia tranquila, el dedo índice izquierdo de Beloúsov tamborileaba nerviosamente sobre la mesa de centro.\n\n\"Ni siquiera sé si nuestro presidente sigue vivo\", respondió Shoigú, su voz cargada de desesperación. Regresó a su escritorio. \"He enviado gente a su apartamento, a sus dos villas privadas e incluso a su club. Ha desaparecido, como Stalin en 1941\".\n\"La única diferencia es que Stalin eventualmente ganó\", comentó Beloúsov con un tono sombrío. \"Esta vez, fue tras una derrota\".\n\nEl humor negro no aligeró la tensión en el aire. Beloúsov negó con la cabeza y salió de la habitación en silencio. Cuando la oficina volvió a sumirse en el silencio, Shoigú tomó su medalla de Héroe de Rusia de su escritorio. La observó detenidamente y luego la apretó con fuerza en su mano, murmurando."
 russia.788.a: "\"¿De verdad vamos a esperar la muerte?\""
 russia.789.t: "Restablecimiento de la Tabla de Rangos"
 russia.789.d: "El Emperador, buscando fortalecer el revivido Imperio ruso y crear un sistema justo de servicio a la Madre Patria, ordenó la restauración de la históricamente merecida Tabla de Rangos.\n\nEsta antigua tabla, actualizada de acuerdo con las necesidades de los tiempos modernos, abre el camino para todos los súbditos leales, independientemente de su origen, al servicio y la promoción.\n\nLa nueva Tabla de Rangos, basada en el mérito y la habilidad en lugar del linaje, proporciona una jerarquía transparente, fomentando el crecimiento profesional y brindando oportunidades para el desarrollo de la carrera en el aparato estatal, el ejército y otras esferas de la vida en el Imperio. Todo ciudadano que se haya destacado en el trabajo y la devoción a Rusia podrá alcanzar altos rangos y honores, creando un Imperio próspero y fuerte.\n\n¡Viva el Zar! ¡Viva Rusia!"
 russia.789.a: "¡Vaya! ¡Ahora puedo convertirme en un noble!"
 russia.790.t: "Obra maestra publicitaria de Año Nuevo"
 russia.790.d: "En Nochevieja, antes del tradicional discurso del líder de Rusia, ahora Su Majestad Imperial, los canales de televisión del país mostraron un anuncio de VTB. La inusual animación que representaba a destacados escritores rusos como Aleksandr Pushkin, Fiódor Dostoievski, León Tolstói, así como a grandes emperadores rusos, incluidos Nicolás II, Alejandro II y Pedro el Grande, causó una increíble protesta pública.\n\nLas figuras históricas condujeron un trineo por la aldea rusa, jugaron a las bolas de nieve, se deslizaron en trineo por una colina y, al final, junto con todos los aldeanos, celebraron el Año Nuevo, contemplando el festivo árbol de Navidad y los brillantes fuegos artificiales. Todo el video estuvo acompañado por la obertura de \"Ruslán y Liudmila\" de Mijaíl Glinka, y el narrador leyó el poema patriótico de Pushkin \"A los calumniadores de Rusia\", lo que le dio al video un mensaje de que los enemigos deben temer a Rusia, ¡y en caso de guerra podemos defendernos!\n\nEl video se volvió viral, inspirando a muchos ciudadanos y estudios a crear sus propias obras animadas dedicadas a las figuras de la era zarista. La retroalimentación positiva y el crecimiento del sentimiento patriótico fortalecieron significativamente el apoyo y la popularidad de la monarquía.\n\nA su vez, los representantes del Banco VTB anunciaron un aumento significativo en las ganancias y lanzaron un nuevo programa de caridad destinado a apoyar a jóvenes animadores."
 russia.790.a: "¡La tierra rusa es rica en talentos!"
 russia.791.t: "El sueño del zar"
 russia.791.d: "La luna ha salido sobre la Moscú imperial. Los funcionarios duermen, los oficinistas duermen, los trabajadores duermen. Se durmió en sus aposentos y [SOV.GetLeader] después de un duro día de trabajo. Reuniones, recepciones, papeles: el ciclo aparentemente interminable finalmente ha terminado. El zar de todas las Rusias se encontró en un hermoso parque de verano, sentado en un cenador junto al lago. Era un hermoso día soleado, y se sentía tan tranquilo y bien como solo ocurre en los sueños. Una brisa tranquila y refrescante soplaba del agua.\nDe repente, [SOV.GetLeader] escuchó pasos detrás de él. Alguien entró en el cenador.\n\"¿Puedo?\" La voz de un hombre sonó detrás del Rey. Se dio la vuelta.\n\n Apareció ante sus ojos. Por la gracia de Dios, Nicolás II, Emperador y Autócrata de Rusia. El que fue considerado el último soberano en la historia rusa. Aquel a quien los traidores del pueblo ruso llamaron el \"zar de trapo\", \"Nicolás el Sangriento\". Nikolai vestía su uniforme militar, el que usó para unirse al ejército durante la Gran Guerra. [SOV.GetLeader] respondió frenéticamente:\n\"Por supuesto, siéntese\".\n\n Sentados en silencio y disfrutando de la asombrosa vista de la superficie del agua, el ancestro preguntó al descendiente:\n\"¿Cómo está mi Rusia?\"\n\"Te hemos vengado. Rusia es ahora más poderosa y grande que nunca. Hemos derrotado a enemigos externos e internos, y restaurado la Autocracia.\"\n\"Bueno, gracias a Dios\", respondió Nikolái. \"Has aprendido de mis errores. Me alegro de que mi reinado no haya sido en vano. Rezaré y esperaré por la felicidad del Imperio y tu éxito. Gobierna con dureza, pero con justicia. ¡Gloria a Rusia!\""
 russia.791.a: "Se despertó con una sonrisa en la cara."
 russia.792.t: "El sueño del zar"
 russia.792.d: "La luna ha salido sobre la Moscú imperial. Los funcionarios duermen, los oficinistas duermen, los trabajadores duermen. Se durmió en sus aposentos y [SOV.GetLeader] después de un duro día de trabajo. Reuniones, recepciones, papeles: el ciclo aparentemente interminable finalmente ha terminado. El zar de todas las Rusias se encontró en un hermoso parque de verano, sentado en un cenador junto al lago. Era un hermoso día soleado, y se sentía tan tranquilo y bien como solo ocurre en los sueños. Una brisa tranquila y refrescante soplaba del agua.\nDe repente, [SOV.GetLeader] escuchó pasos detrás de él. Alguien entró en el cenador.\n\"¿Puedo?\" La voz de un hombre sonó detrás del Rey. Se dio la vuelta.\n\n Apareció ante sus ojos. Por la gracia de Dios, Nicolás II, Emperador y Autócrata de Rusia. El que fue considerado el último soberano en la historia rusa. Aquel a quien los traidores del pueblo ruso llamaron el \"zar de trapo\", \"Nicolás el Sangriento\". Nikolai vestía su uniforme militar, el que usó para unirse al ejército durante la Gran Guerra. [SOV.GetLeader] respondió frenéticamente:\n\"Por supuesto, siéntese\".\n\n Sentados en silencio y disfrutando de la asombrosa vista de la superficie del agua, el ancestro preguntó al descendiente:\n\"¿Cómo está mi Rusia?\"\n\"Te hemos vengado. Rusia es ahora más poderosa y grande que nunca. Hemos derrotado a enemigos externos e internos, y restaurado el Manifiesto\". Nikolái respiró hondo. \"Espero que hayas podido aprender de mi vida. No olvides: fue la Duma y el librepensamiento lo que llevó a Rusia al deplorable estado en que la dejé. Rezaré y esperaré por la felicidad del Imperio y tu éxito. Sé justo y cuidadoso. ¡Gloria a Rusia!\""
 russia.792.a: "Se despertó con un rostro profundamente pensativo."
 russia.793.t: "El Fantasma de la Taiga"
 russia.793.d: "La taiga siempre ha sido una criatura misteriosa que vive según sus propias leyes especiales. Hay muchos presagios que pueden decirte con gran probabilidad si la taiga permanecerá en una calma silenciosa durante todo el día, o si comenzará a preocuparse por algo, a murmurar o incluso a enfadarse.\n\nPero desde hace días, toda la taiga está enfadada. Grandes tormentas y ventiscas se levantan, y apenas hay visibilidad en el bosque. Ninguno de los meteorólogos puede explicar lo que está sucediendo, todo el equipo meteorológico se vuelve loco tratando de verificar lo que está pasando.\n\nY solo en una remota aldea siberiana vive un anciano que sabe lo que está pasando. Son los Romanov. Han vuelto. Lo que significa que es hora de que él regrese."
 russia.793.a: "Espera... ¿ÉL ESTÁ... VIVO?"
 russia.794.t: "Después del Rubicón"
 russia.794.d: "El general Víktor Zólotov, Namestnik de Novorrusia y Malorrusia, Comandante en Jefe de la Guardia Imperial, quien lideró Rusia después del golpe militar, logró eliminar a todos los traidores que salieron a la luz tras la muerte de Vladímir Vólfovich.\n\nUn duro golpe fue asestado a las fuerzas separatistas en el Cáucaso, Turkestán y Europa Oriental. Su mano dura, respaldada por la lealtad del ejército y las fuerzas de seguridad, permitió estabilizar parcialmente la situación en el país. La economía, aunque todavía sufría los efectos de la Guerra Europea y la inestabilidad que le siguió, mostraba signos de recuperación.\n\nSe han introducido algunas reformas para fortalecer el gobierno central y suprimir la oposición. Sin embargo, la sombra de la inestabilidad aún se cierne sobre el país. El aparato administrativo está debilitado, la corrupción es rampante y el descontento popular, aunque silenciado, sigue siendo palpable.\n\nZólotov se enfrenta a muchos desafíos: fortalecer la economía, restaurar la confianza pública, implementar las reformas necesarias sin comprometer la estabilidad y, lo más importante, prevenir nuevos intentos de desestabilizar el país. Se esforzará mucho por multiplicar la grandeza de Rusia.\n\nSu gobierno es un delicado acto de equilibrio al borde del caos. El futuro de Rusia depende de si puede evitar que el país se desintegre. ¿Elegirá métodos militares duros o intentará gobernar con mano más blanda? Todo se decidirá muy pronto."
 russia.794.a: "¿Y ahora qué sigue?"
 russia.795.t: "La Coronación"
 russia.795.d: "Moscú permaneció en silencio durante toda la mañana. Las calles seguían vacías, los negocios cerrados, y cualquier gran actividad social que la gente hubiera planeado para el día había sido cancelada. No fue una tragedia o una crisis lo que despejó los bulevares, sino una ocasión trascendental que había llegado a la ciudad. Rusia iba a tener un nuevo zar, y toda la ciudad observaba con alegre anticipación. Fuera de la catedral de la Dormición en el Kremlin de Moscú, una multitud masiva de ciudadanos pudo reunirse mientras las campanas de la iglesia sonaban.\n\nDentro de la iglesia, la escena parecía sacada del más maravilloso de los cuentos de hadas. Iconos de oro adornaban cada milímetro cuadrado de las paredes junto con candelabros y portavelas de plata y platino que hacían que el interior fuera tan brillante como el mediodía de verano. Innumerables dignatarios, desde los principales políticos hasta funcionarios extranjeros, llenaron el interior de la iglesia y observaron cómo salía el Patriarca de Moscú y de toda Rus. Todos guardaron silencio cuando comenzó la procesión.\n\nEl patriarca, acompañado por un grupo de diáconos, leyó la divina liturgia y se recitaron oraciones. Los representantes de la iglesia luego dieron la bienvenida a todos los estimados invitados de la sociedad rusa y extranjera y luego se volvieron hacia el frente de la iglesia, donde el zar y su emperatriz ahora se sentaban en sus tronos.\n\nEl patriarca luego se acercó al futuro zar y colocó la corona sobre su cabeza, a lo que él se levantó y colocó otra corona sobre su esposa. Ambos se levantaron, mirando a la multitud juntos mientras el patriarca hacía historia, declarando a todos los asistentes la nueva realeza de Rusia.\n\nToda la multitud de dignatarios aplaudió al unísono mientras un coro de la iglesia comenzaba a cantar \"Dios salve al zar\". Se desató un jubileo nunca visto en casi un siglo.\n\nLuego, las campanas de las iglesias de Moscú sonaron, ya que Rusia tenía oficialmente su primer soberano desde 1917."
 russia.795.a: "Comienza una nueva era."
 russia.796.t: "La Resurrección"
 russia.796.d: "Alekséi Rodiónov no se cansaba de la vista desde su residencia en el centro de Moscú. Era una suite de lujo en un complejo que estaba extremadamente cerca del Kremlin de Moscú y de todos los demás lugares de interés que turistas de todo el mundo querían ver. Ser una estrella en ascenso para el PLDR en la Duma de la Ciudad de Moscú tenía sus ventajas, y esta era la que empezaba a valorar seriamente. Pero mientras contemplaba la ciudad, con una buena bebida en la mano, había otra cosa maravillosa en la que empezó a pensar, a recordar con alegría.\n\nPensó en esta ciudad, en el partido y en el país entero. Tantas cosas impactantes habían sucedido en los últimos dos años. Hubo elecciones, la guerra, las luchas políticas y las reformas titánicas que su partido había trabajado día y noche para completar. Moscú era el sello distintivo de su trabajo, y recordar lo que se había hecho le producía una gran satisfacción.\n\nLa ciudad había sido limpiada de la basura física e ideológica dejada por los políticos del establishment anterior y la URSS. Ya no se veían las monstruosidades de la hoz y el martillo o los monumentos a Lenin. Ya no se veían las placas, los nombres de las calles o el arte de los internacionalistas que tanto odiaban a Rusia. Ahora Rusia había sido restaurada a su antiguo orgullo, quizás incluso resucitada, y se podía ver en todas partes.\n\nEl Teatro Bolshói estaba presentando una función extendida de una de las obras de Antón Chéjov. La Galería Tretiakov estaba realizando una exposición de las obras de Iliá Repin durante toda la temporada. Todas las estrellas rojas en la cima de cada edificio fueron reemplazadas por el águila rusa. La ciudad, ahora preparándose para las fiestas, decoraba las calles con adornos populares de la década de 1890. Incluso había un aparente resurgimiento de la moda de principios del siglo XX entre las ricas socialités de la ciudad. Podría seguir y seguir, pero una cosa estaba muy clara.\n\nTodo era tan glorioso.\n\nTomó otro sorbo, sonrió y murmuró para sí mismo."
 russia.796.a: "\"Bienvenida de nuevo, Madre Rusia\"."
 russia.797.t: "Nueva Rusia - Nuevo Partido"
 russia.797.d: "Con el fallecimiento de Zhirinovski, el PLDR está perdiendo rápidamente su popularidad. Debemos ofrecer a nuestra gente algo nuevo. Dado que Vladímir Volfovich ya no está con nosotros, nuestro partido debe convertirse verdaderamente en uno ruso.\n\nTambién necesitamos elegir nuestra nueva ideología oficial. Todos somos nacionalistas, pero nuestro enfoque actual es demasiado simplista y plano. Debemos profundizar en el ámbito ideológico. La gente debe creer verdaderamente en nuestro nuevo sistema y en nuestro nuevo partido.\n\nEl rusocentrismo es una idea moderada que está ganando popularidad en nuestras filas. Vemos a Rusia como el centro del escenario mundial, y nuestra cultura es más avanzada en comparación con las de Europa, especialmente considerando su declive en las últimas décadas. Nos centramos en Rusia y su desarrollo, que es nuestra máxima prioridad. Con un enfoque tan moderno, incluso podríamos atraer a algunos moderados a nuestra causa.\nEl nacional-republicanismo es una ideología que puede no ser popular entre nuestras facciones más monárquicas. Sin embargo, puede ofrecer una visión del futuro de Rusia. Después de todo, Zhirinovski lideró eficazmente una república, no una monarquía. Al adoptar una perspectiva más cívica del nacionalismo, podemos atraer más apoyo de los no rusos, al mismo tiempo que mantenemos el tono ultrapatriótico de nuestro movimiento. Es un enfoque moderno del nacionalismo para los tiempos modernos.\nFinalmente, podemos adoptar la teoría de la unidad integralista. El partido se convertirá en una parte integral de Rusia. Esta es la solución más parecida a un Estado unipartidario, y a pesar de enfrentar una oposición significativa dentro del partido, creará una sociedad unida con el único objetivo de mejorar la nación rusa. También puede ayudarnos a implementar de nuevo un culto al líder, porque los rusos anhelan una figura fuerte."
 russia.797.a: "¡Política rusocéntrica!"
 russia.797.b: "¡El nacional-republicanismo es el camino a seguir!"
 russia.797.c: "¡Partido - Organismo Unido del País!"
 russia.798.t: "Veteranos en PLDR eligen a los Halcones de Vlásov"
 russia.798.d: "Después de semanas de estabilidad tras el fallecimiento de nuestro gran líder, la vieja guardia, también conocida como los veteranos del partido, quienes se han mantenido leales a la línea del partido y a la causa de Zhirinovski, han decidido apoyar a Vlásov y a sus partidarios. Esta facción logró persuadirlos para que adoptaran una agenda más radical.\n\nEsto pone fin, de hecho, a la existencia del subgrupo de veteranos dentro del PLDR. La mayoría de sus miembros renunciarán en protesta contra esta decisión o se unirán a las filas de los leales a Vlásov."
 russia.798.a: "Hicieron la elección correcta."
 russia.799.t: "Veteranos en el PLDR eligen ala reformista"
 russia.799.d: "Después de semanas de estabilidad tras el fallecimiento de nuestro gran líder, la vieja guardia, también conocida como los veteranos del partido, quienes se han mantenido leales a la línea del partido y a la causa de Zhirinovski, han decidido apoyar al ala reformista. Esta ala logró persuadirlos para que adoptaran una agenda reformista.\n\nEsto pone fin, de hecho, a la existencia del subgrupo de veteranos dentro del PLDR. La mayoría de sus miembros renunciarán en protesta contra esta decisión o se unirán a las filas de los partidarios de Slutski."
 russia.799.a: "Hicieron la elección correcta."
 russia.800.t: "Aumento de la actividad antiestatal"
 russia.800.d: "Tras el fallecimiento de nuestro gran líder, Vladímir Zhirinovski, era solo cuestión de tiempo que aquellos que solían temernos, las ratas y los gusanos, sintieran la debilidad de nuestra nueva administración. Ya no sienten el mismo miedo que antes.\n\nRevitalizados por el levantamiento de la izquierda radical en una Europa en crisis y derrotada, se sienten seguros de que pueden intentar algo en nuestra santa Madre Patria. Ya se están formando pequeños grupos, y se están viendo sus actos de vandalismo menor. Se están reportando folletos, carteles y disidencia entre los trabajadores de los Monopolios Imperiales debido a \"pagos injustos\".\n\nEn Ekaterimburgo, un monumento a Vladímir Vólfovich fue vandalizado con la palabra \"Carnicero\" pegada sobre su retrato.\n\nAunque estos actos son pequeños, pueden convertirse en una enfermedad similar al cáncer en nuestro suelo. La Rosgvárdia y la Ojrana han recibido instrucciones de tomar este asunto muy en serio."
 russia.800.d2: "Camarada presidente, nuestros agentes en el terreno nos advierten sobre un aumento de la actividad antisoviética y antiestatal.\n\nEsperábamos resistencia a la restauración del sistema soviético, pero la combinación de esta resistencia con la falta de apoyo popular entre las clases bajas, que es un legado del régimen anterior, puede causar un daño irreparable a nuestro país.\n\nMuchos nacionalistas radicales que se niegan a aceptar nuestro gobierno y que fueron apoyados durante el régimen de Zhirinovski han comenzado a protestar activamente contra nuestro Gobierno. Se están formando pequeños grupos y estamos viendo algunos actos de vandalismo menores. También estamos informando sobre folletos, carteles y disidencia entre los residentes de la ciudad y del campo contra el \"totalitarismo soviético impío\".\n\n¡Algunas personas incluso llegan a afirmar que Rusia ha sido secretamente ocupada por marxistas occidentales!\n\nAunque estas acciones son pequeñas, pueden convertirse en una enfermedad cancerosa en nuestro suelo. La Druzhina Popular y los Servicios de Seguridad deben ser instruidos para tomar este asunto muy en serio."
 russia.800.a: "Debemos estar vigilantes."
 russia.801.t: "Revolución de Yavlinski"
 russia.801.d: "Era solo cuestión de tiempo antes de que los levantamientos y manifestaciones a nivel nacional superaran en número a las fuerzas policiales y derrocaran el régimen del PLDR.\n\nEsta mañana, Moscú se llenó de ira hacia el Gobierno del PLDR. Las protestas rápidamente abrumaron a la policía, y muchos oficiales desafiaron sus órdenes y se unieron a los rebeldes.\nNi siquiera la declaración de intervención militar ayudó. Los soldados, al igual que en 1991, se negaron a obedecer órdenes. Algunos se quedaron pasivos mientras los manifestantes ocupaban más y más edificios gubernamentales, llegando finalmente al Kremlin, mientras que otros ayudaron a romper las defensas y derrotar a las últimas unidades de la Rosgvárdia leales al Gobierno.\n\n¿El cerebro detrás de esto? El viejo Grigori Yavlinski, uno de los pocos liberales a los que se les permitió existir bajo Zhirinovski debido a su familiaridad y pasividad. Pero ahora, se demostró que estaban equivocados, ya que su partido y él declararon el comienzo de la democratización rusa. Yavlinski se convirtió en el presidente interino de la nueva Rusia.\n\nHeredó un país herido y debilitado, con crisis y protestas radicales por todas partes."
 russia.801.a: "¡Por la Rusia Libre!"
 russia.802.t: "Despedida de Yavlinski"
 russia.802.d: "\"Estimados ciudadanos de Rusia: Hoy es la última vez que me dirijo a ustedes como presidente de Rusia.\nHe tomado una decisión.\nLo pensé durante mucho tiempo y con dolor.\nLo he escuchado muchas veces: \"Yavlinski se aferrará al poder por cualquier medio, no se lo dará a nadie\". Esto es una mentira.\n\nEl punto es diferente. Siempre he dicho que no me alejaré ni un solo paso de la democracia. Estamos sentando el precedente más importante para una transferencia de poder civilizada y voluntaria de un presidente ruso a otro, recién elegido.\n\nSin embargo, tomé una decisión diferente. Me voy. Me voy antes de lo previsto. Me di cuenta de que necesitaba hacer esto. Rusia debe comenzar su nuevo camino con nuevos políticos, con nuevas caras, con gente nueva, inteligente, fuerte y enérgica.\nY nosotros, que hemos estado a la vanguardia de la lucha por la democracia durante muchos años, debemos irnos.\nDespués de observar con qué esperanza y fe la gente votó por una nueva generación de políticos en las elecciones de la Duma, me di cuenta de que había hecho lo principal de mi vida. Rusia nunca volverá al pasado. Rusia siempre avanzará a partir de ahora...\n\nDe acuerdo con la Constitución, cuando renuncié, firmé un decreto que asignaba las funciones de presidente de Rusia al gran líder democrático Alekséi Anatólievich Navalni...\""
 russia.802.a: "\"...Al despedirme, quiero decirles a cada uno de ustedes: sean felices.\""
 russia.803.t: "Yábloko no logra la mayoría"
 russia.803.d: "Después de las controvertidas elecciones provisionales de la Duma, el partido del presidente, Yábloko, no logró obtener la mayoría de los votos. A pesar de que enfatizaron la estrategia del Frente Popular e incluyeron partidos democráticos menores, no pudieron asegurar suficiente apoyo.\n\nSin embargo, Rusia del Futuro, el partido de Alekséi Navalni, el segundo líder más popular, logró ganarse la suficiente confianza de los votantes y la opinión pública para asegurar suficientes escaños en el parlamento.\n\nLa primera sesión de la Duma comenzó inmediatamente con el intento de Navalni de convertirse en presidente. A pesar de la resistencia de Yábloko y sus aliados, finalmente, después de posibles acuerdos secretos con partidos menores y una votación mayoritaria de los miembros de Rusia del Futuro, Alekséi Navalni fue declarado presidente de la Duma."
 russia.803.a: "Yábloko ha caducado."
 russia.804.t: "Golpe de Surovikin"
 russia.804.d: "Era solo cuestión de tiempo antes de que la ira y las manifestaciones de los militares superaran en número a los leales y derrocaran el régimen del PLDR.\n\nEsta mañana, Moscú estaba en un estado de grave agitación, con unidades militares rusas rompiendo violentamente las barricadas de la policía y la Rosgvárdia. Los ciudadanos se dispersaron rápidamente para evitar ser alcanzados por balas perdidas.\nAl final del día, toda posible resistencia había sido aplastada por los soldados rebeldes, y el último gran objetivo restante, el Kremlin, fue pronto rodeado por los sublevados. Los miembros restantes del Gobierno del PLDR no se veían por ninguna parte; algunos dicen que escaparon a Sri Lanka.\n\nDespués de todo el caos en Moscú, los televisores de toda Rusia fueron bendecidos con la primera transmisión 'oficial' después del golpe.\nSerguéi Surovikin, quien una vez había sido solo un general ordinario de la RAF, ahora se declaró líder provisional del nuevo Gobierno militar. Denunció públicamente el traicionero tratado de paz firmado por el Gobierno anterior, al que llamó los traidores de la Madre Patria.\n\nHeredó un país herido y debilitado, con crisis y protestas radicales por todas partes."
 russia.804.a: "¡Restaura la fuerza de Rusia!"
 russia.805.t: "Empresa popular favorecida"
 russia.805.d: "Las empresas populares son empresas destacadas que desempeñan un papel crucial en nuestro estado socialista. Con Grudinin en el poder, haremos más hincapié en proteger y mejorar sus contribuciones.\nEn los próximos seis meses, identificaremos las tres corporaciones más grandes que puedan ayudarnos a mejorar nuestros indicadores económicos y sociales.\n\nUna de estas corporaciones es Soyz Neft, una potencia de recursos que puede ayudar a expandir nuestras operaciones industriales y de extracción de recursos en Siberia y el Extremo Oriente.\n\nOtra corporación es SovGaz, una empresa industrial multisectorial general que puede modernizar y mejorar fábricas en toda la Unión Soviética, siempre que reciban suficientes subvenciones estatales, por supuesto.\n\nLa tercera es Sovhoznik, un grupo de medios y negocios fundado por el propio Grudinin. Es muy popular entre los jóvenes porque se centra en la innovación y las tecnologías de los medios. Puede ayudarnos a difundir la visión del Partido entre la población y la clase trabajadora."
 russia.805.a: "Soyz Neft."
 russia.805.b: "SovGaz."
 russia.805.c: "Sovhoznik."
 russia.806.t: "Formación de CMP \"Guardia de Lenin\""
 russia.806.d: "Hemos sido informados sobre el exitoso establecimiento de la primera compañía militar privada soviética, conocida como la \"Guardia de Lenin\".\n\nLa compañía está compuesta principalmente por ex soldados de Wagner y soviéticos que lucharon en la Guerra Europea. Algunos de ellos son incluso ex operativos del KGB.\n\nActualmente, la compañía está aceptando contratos de naciones amigas de la Unión Soviética en todo el mundo para proteger a funcionarios de alto rango y brindar asistencia en conflictos militares.\n\nLa característica clave de esta organización es que cada soldado debe jurar defender la visión leninista de la Unión Soviética y el gobierno del partido. Esto significa que la CMP al menos rinde homenaje a nuestro Estado."
 russia.806.a: "¡Verdaderos patriotas de la unión!"
 russia.807.t: "Formación de CMP \"Argentum\""
 russia.807.d: "Hemos sido informados sobre el exitoso establecimiento de la primera compañía militar privada soviética: \"Argentum\".\n\nLa compañía está compuesta principalmente por ex soldados de Wagner y soviéticos que lucharon en la Guerra Europea. Algunos de ellos son incluso ex operativos del KGB. Actualmente, la compañía está aceptando contratos de naciones amigas de la Unión Soviética en todo el mundo para proteger a funcionarios de alto rango y brindar asistencia en conflictos militares.\n\nEsta institución es completamente apolítica y da la bienvenida a soldados de diversos orígenes. Se centran únicamente en salvaguardar la Madre Patria, sin afiliaciones políticas."
 russia.807.a: "¡Verdaderos patriotas de la Madre Patria!"
 russia.808.t: "Goida a las masas"
 russia.808.d: "\"Existe una interjección rusa antigua, \"GOIDA\", que significa una llamada a la acción inmediata.\"\nDespués de que nuestro Santísimo Guardián, Iván Ojlobystin, usara esta frase en su reciente discurso en la Plaza Roja, la frase se convirtió rápidamente en una novedad rusa, especialmente entre las fuerzas de seguridad y el personal militar.\n\nEn toda Rusia, los ciudadanos leales de nuestra Santa Unión ahora proclaman GOIDA como el grito de batalla del pueblo ruso que está en proceso de hacerlo realidad. Usan esta frase en discursos, en reuniones públicas e incluso en saludos a sus compatriotas.\n\nAlgunos canallas liberales, por supuesto, intentan equipararlo con el «Sieg Heil», pero sus afirmaciones son infundadas y mezquinas.\n\nIncluso hay un lado más humorístico en esto. Muchas personas han hecho mezclas para fiestas basadas en el discurso de Ojlobystin, especialmente la parte sobre la proclamación del grito de batalla."
 russia.808.a: "Con GOIDA en nuestros corazones..."
 russia.809.t: "El grito de guerra"
 russia.809.d: "Poco después de asumir el cargo de Gobernante Supremo, Ojlobystin se radicalizó cada vez más por los sacerdotes de línea dura de su gabinete, que casi en su totalidad está compuesto por funcionarios de la Iglesia ortodoxa rusa.\n\nSe organizó una gran manifestación en la Plaza del Kremlin, donde miles de patriotas y cristianos leales se unieron ondeando banderas de nuestra gran historia, escuchando discursos y música que honraban a nuestros grandes antepasados.\n\nEl punto culminante del evento, por supuesto, fue un discurso del propio Santo Guardián.\nEl discurso comenzó con fuerza, denunciando al Occidente podrido y a sus señores satánicos. Luego, dirigió su atención a las élites \"desleales\" dentro de Rusia, aquellos que secretamente le desean el mal.\nLa multitud estaba extasiada. Iván Ojlobystin es un orador muy profesional, quizás debido a su carrera como actor de cine. Pero más que eso, es verdaderamente celoso de su visión. La combinación de estas dos cualidades le ha dado a Rusia el orador más grande de todos los tiempos, quizás incluso más grande que Zhirinovski.\n\nEn el clímax de su discurso, Okhlobystin declaró la necesidad de una guerra santa, no solo contra los enemigos externos sino también contra los internos.\n\n\"¡Guerra santa! Porque los musulmanes tienen el concepto de la yihad. No es solo una batalla mortal en el campo de batalla contra el enemigo. Es, ante todo, ¡una lucha contra los pecados que llevamos dentro! ¡Y nuestra batalla principal, nuestra guerra santa, se librará en nuestras almas! ¡Y si la ganamos, ganaremos todas las demás batallas!\n\"Existe una antigua interjección rusa: goida, que significa un llamado a la acción inmediata. ¡Cuánto nos faltan ahora esos gritos de guerra! ¡Goida, hermanos y hermanas, goida!\n\"¡Miedo, viejo mundo! Desprovisto de la verdadera belleza, la verdadera fe y la verdadera sabiduría, gobernado por locos, pervertidos, satanistas. ¡Miedo, ya llegamos! ¡Goida!\""
 russia.809.a: "¡GOIDA!"
 russia.810.t: "El nuevo Partido de la Unión"
 russia.810.d: "Ahora que hemos desmantelado el sistema partocrático, debemos construir una nueva fuerza política para asegurar la estabilidad del poder gubernamental.\n\nTenemos varias opciones sobre cómo estructurar este nuevo partido político. Los principios clave de nuestro partido serán la soberanía de la URSS, el bienestar del pueblo y, por supuesto, la adhesión a la visión de Pásechnik de la teoría novocomunista.\n\nMuchos pragmáticos están listos para que las órdenes del presidente reformen el Partido. Algunos ex burócratas de la era de Putin también han decidido unirse a nosotros.\n\nSin embargo, la influencia de los dogmáticos comunistas sigue siendo fuerte, por lo que debemos estar preparados para la resistencia a nuestros cambios."
 russia.810.a: "Unidad por encima de todo."
 russia.810.b: "Debemos luchar contra los dogmáticos, somos comunistas del futuro."
 russia.810.c: "Reformas para el pueblo, por el pueblo."
 russia.811.t: "¡Antisoviéticos se organizan!"
 russia.811.d: "En las últimas semanas, hemos recibido información de nuestros espías de que un grupo de miembros radicales del PLDR se ha formado para resistir activamente a nuestro régimen. Se hacen llamar la \"Guardia de Zhirinovski\", y en un manifiesto filtrado, afirman querer devolver a Rusia al camino que Zhirinovski imaginó para el país, y luchar contra \"la hidra del neocomunismo\".\n\nSus métodos son brutales y radicales: atacan a la milicia, edificios gubernamentales, ¡e incluso intentan asesinar a nuestros ministros y leales!\n\nMuchos antisoviéticos desorganizados se han unido a su movimiento, a pesar de no compartir muchas de sus ideas. Esta es una clara señal de una alianza entre reaccionarios contra la gente trabajadora, donde las diferencias ideológicas se olvidan."
 russia.811.a: "Los aplastaremos..."
 russia.812.t: "Nunca es una buena mañana"
 russia.812.d: "Eran las diez y media de la mañana. A estas alturas, todos los ciudadanos concienzudos de Rusia ya habían ido a sus trabajos: las vendedoras a las tiendas, los maestros a las escuelas, los obreros a las fábricas. Pero no Lenya.\nLenya está dormido: no necesita ir a ningún lado. Habiendo estudiado para ser filólogo, resultó ser inútil para cualquiera en la Nueva Rusia, excepto para sus amorosos padres. Es a expensas de ellos que Lenya vive, deambulando por los foros de imágenes en busca de una dosis rápida de dopamina de las disputas políticas.\n\n\"¡GLORIA A RUSIA! ¡GLORIA AL LÍDER SUPREMO!\"\n\n\"¿Qué es eso?\" pensó Lenya, aún sin estar completamente despierto. Un momento después, regresando del reino de Morfeo, recordó.\nEl camión de agitación.\n\nTodos los días, exactamente a las 10:37 a.m., el coche de propaganda comienza a moverse por su calle. De sus altavoces se escuchan eslóganes patrióticos y canciones como \"¡Dios salve al Zar!\" y el coro \"¡Slavsia!\" de Glinka. A las 10:42, el volumen es suficiente para despertar incluso al más profundamente dormido. Con la esperanza de salvar su sueño, Lenya se cubre la cabeza con una almohada. Pero a las 10:45, la agitación ya está debajo de sus ventanas.\n\n\"¡VIVIMOS EN EL MEJOR PAÍS DEL MUNDO, Y EL RESTO SOLO TIENE ENVIDIA!\"\n\nFinalmente, el sonido se aleja cada vez más. Los eslóganes y la música cesaron, despejando los recuerdos del sueño y dejando un solo pensamiento:\n\"Malditos imbéciles.\"\nDespués de quedarse un rato, Lenya se levanta y lo primero que hace es ir a su sitio web favorito, a su sección /po/, y comienza a escribir:"
 russia.812.a: "\"Hola, Dvach...\""
 russia.813.t: "Sobre las creencias"
 russia.813.d: "\"¡Hola, queridos oyentes! Son exactamente las 2 p.m. hora de Omsk, ¡y siguen escuchando la Radio de Carretera! María Ostrovskaia, la presentadora habitual, sigue con ustedes. El jefe de la organización juvenil Generación de Rusia, el propio Iván Frolishev, está hoy con nosotros en el aire. Así que, Iván, como sabes, tu organización es una especie de faro para los jóvenes que quieren cambios en la sociedad. ¿Puedes decirnos en qué crees y qué quieres lograr con tu trabajo? En general, sobre sus creencias\".\n\n\"Sí, María, muchas gracias por esta pregunta. Nosotros, la Generación Rusa, nos esforzamos para que la voz del hombre común sea escuchada. Porque, por ejemplo, hay un problema en el país con el apoyo insuficiente a las familias jóvenes, las malas condiciones laborales locales y la corrupción. Por cierto, el mes pasado tuvimos que empacar y comprar comestibles, pañales y otras cosas para un orfanato en Novokuznetsk. Eso es porque los funcionarios locales se han olvidado completamente de él, como a menudo se olvidan de la gente. Así que nosotros, la gente común, tenemos que unirnos y resolver los problemas juntos\".\n\n\"Gracias por tu respuesta. Una pregunta más. ¿Crees que el hecho de que estés reuniendo a jóvenes radicales bajo tu ala, por así decirlo, podría llevar a que tu organización o al menos algunos de sus miembros entren en una confrontación directa con las autoridades?\"\n\n\"Verás, María, me gustaría con todas mis fuerzas evitar tal escenario. Sí, nuestro Gobierno no es perfecto, lejos de ser perfecto, y todos lo entendemos. Vemos fallos y decisiones desafortunadas sobre el terreno. Pero es muy difícil para nosotros imaginar el panorama general. Después de todo, dirigir un país no es lo mismo que dirigir un puesto. Por eso yo personalmente apoyo a nuestro Gobierno e insto a la gente a tomar las riendas, pero no a cortarlas de raíz, sino a entender las acciones de nuestro Gobierno. Por lo tanto, estoy convencido de que entrar en conflicto con las autoridades es una decisión contraproducente\".\n\n\"Gracias por esta respuesta detallada y equilibrada. Con esto concluye nuestra entrevista. ¡Pero la Radio de Carretera sigue transmitiendo! A continuación, tenemos la canción \"Nosotros\" interpretada por Shaman. ¡Que disfruten la escucha!\""
 russia.813.a: "Nuestra gente sobrevivirá con orgullo a todo."
 russia.814.t: "Nuevo presidente para el zar"
 russia.814.d: "El antiguo presidente del comité de ministros no se alinea con la dirección futura de la política imperial. El zar ha decidido aprovechar el nuevo movimiento leal radical para asegurar un apoyo inquebrantable al zar y al Imperio ruso.\n\nPara lograr esto, el zar necesita encontrar una nueva figura pública que represente sus nuevas políticas radicales. Entre las nuevas Centurias Negras, algunos individuos y sus organizaciones han surgido como líderes. Sus políticas están en gran medida en línea entre sí, difiriendo solo en algunos métodos y experiencias personales. Sin embargo, elegir a uno de ellos resultará en la marginación de los demás."
 russia.814.a: "...Kuriánovich."
 russia.814.b: "...Artiomov."
 russia.814.c: "...Tor."
 russia.815.t: "Caída del gabinete de Búrkov"
 russia.815.d: "El inestable gobierno de Búrkov llevó a su caída. La nación, que había rechazado por completo cualquier rastro de izquierdismo, no aceptó las extrañas políticas de Búrkov.\n\nLa Duma del Zar aprobó un voto de censura, organizado principalmente por los Kadetes y su líder Borís Titov. Con la ayuda de liberales y muchos conservadores, lograron destituir a Búrkov y a su gabinete de izquierdistas moderados.\n\nDespués de eso, se llevó a cabo una breve votación en la Duma para elegir al nuevo canciller."
 russia.815.a: "...Borís Titov es elegido Canciller..."
 russia.816.t: "El resurgimiento de las Centurias Negras"
 russia.816.d: "Con la restauración de la autoridad suprema del zar sobre Rusia, era solo cuestión de tiempo antes de que resurgiera una corriente más radical de monárquicos.\n\nMuchos nacionalistas radicales de la vieja escuela han establecido su propia \"organización de apoyo al zar\", pero, más exactamente, podrían describirse como un resurgimiento del movimiento de las Centurias Negras del pasado.\nTienen diferentes líderes y sus puntos de vista sobre el radicalismo son ligeramente distintos. Ya han surgido disputas personales entre ellos. Sin embargo, una cosa está clara: son leales al Gobierno imperial y están listos para luchar contra cualquier izquierdista o contra aquellos a quienes consideren indeseables si es necesario.\n\nLos vigilaremos de cerca. Podrían volver a ser útiles, como en el pasado."
 russia.816.a: "¡Dios salve al Zar!"
 russia.900.t: "Atardecer en Tuvá"
 russia.900.d: "Kizil, capital de Tuvá. La región más pobre de la antigua Federación. La mayor fama de la región era el gran general Serguéi Shoigú, tuvano de nacimiento y general al mando del ejército ruso durante años. Pero este hombre solo fue el único orgullo que el pueblo tuvano sintió durante muchos años. Los jóvenes perdían cada vez más interés en aprender sus lenguas nativas, deseando aprender ruso y mudarse al Oeste, donde está el trabajo.\n\nEl sol se pone en Tuvá un día más, la tricolor rusa no ha ondeado sobre la escuela en muchos meses. Salchak caminaba a casa desde clase como cualquier día de la semana, tarareaba en voz baja mientras esperaba a que su hermana menor, Larisa, lo alcanzara. La clase siempre la retenía hasta tarde. Ella aparece con una gran sonrisa en su rostro y Salchak lo nota.\n\n\"¿Qué te tiene tan feliz?\", dice Salchak.\n\"¡Los maestros me dicen que no necesito aprender ruso! ¡Necesito concentrarme en el tuvano! ¡Algo sobre nuevas reglas de Moscú!\", dice Larisa con un tono alegre. Salchak piensa para sí mismo, vio a otro autócrata en Moscú y pensó en la historia tal como la había aprendido en la escuela. Cada autócrata hasta ahora había explotado o ignorado a los tuvanos. No creía que Duguin fuera diferente. \"¿Duguin quiere que aprendamos tuvano? ¿Eso te dijeron tus maestros?\", pregunta Salchak, \"¡Sí!\", Salchak sonríe. \"Siempre te costó el ruso\".\n\nQuizás Tuvá tenga un futuro después de todo."
 russia.900.a: "Como se predijo en los escritos de Duguin."
 russia.901.t: "La cuarta teoría política"
 russia.901.d: "El eurasianismo ha sido practicado durante mucho tiempo solo a nivel de política exterior por Rusia, y a nivel filosófico por el propio Duguin, pero las realidades administrativas han obligado a Duguin a considerar en su oficina de Moscú cómo proceder con la administración del estado. Si bien el antiguo sistema federal es inadecuado, es algo considerado para las minorías de toda Rusia. Duguin reflexiona sobre esto, su tiempo en el Partido Nacional Bolchevique como miembro fundador junto a Limónov definió los años 90, y sus escritos desde entonces han atraído a muchos otros de círculos conservadores. La historia le muestra muchos métodos con los que administrar, pero solo uno puede adoptarse y puede favorecer a un ala de su partido sobre la otra.\n\nDuguin llama a sus amigos, a sus confidentes, a su esposa; se sientan en la oficina y discuten ideas durante horas. Tres ideas cobran protagonismo. Inclinarse hacia el campo nacional bolchevique y restaurar un sistema pseudo-soviético, un sistema que ha demostrado funcionar bajo las personas adecuadas y que proporciona una autonomía adecuada a los diversos pueblos de Eurasia. Asimismo, basándose en la historia, el sistema de Gobiernos Generales, tomado del régimen zarista donde los Gobernadores Generales eran asignados a las regiones; de nuevo, este sistema podría revivirse para permitir una forma de federalismo centralizado, donde los gobernadores son nombrados por el gobierno central en Moscú pero son elegidos para representar los intereses regionales. La sugerencia final que surgió de la discusión fue tomar el antiguo sistema federal y mejorarlo, equilibrar la autonomía y la autoridad es algo difícil de hacer, pero no hay razón para que Duguin y sus legisladores no puedan redactar un nuevo tipo de sistema que garantice los derechos de todos los pueblos euroasiáticos a su propio idioma y tierra sin comprometer la autoridad central.\n\nDuguin dispersa la reunión improvisada, necesita pensar mucho y detenidamente sobre cómo proceder con la reforma de la administración. La decisión, en última instancia, es solo suya."
 russia.901.a: "La mente de Duguin baila con posibilidades."
 russia.902.t: "Escándalo involucrando al hijo del Emperador"
 russia.902.d: "- Это совершенные разбойники, особенно Принц Ростислав, - говорила гостья. - Он сын Императора Ростислава, такой почтенного человека, и что же? Можете себе представить; они втроем достали где-то медведя, посадили с собой в машину и повезли к актрисам. Прибежала полиция их унимать. Они поймали участкового и привязали его спина с спиной к медведю и пустили медведя в Мойку; медведь плавает, а квартальный на нем.\n- Хороша, ma chere, фигура квартального, - закричал граф, помирая со смеху. \n- Ах, ужас какой! Чему тут смеяться, граф?\nНо дамы невольно смеялись и сами.\n- Насилу спасли этого несчастного, - продолжала гостья. - И это будущий Император так умно забавляется! - прибавила она. - А говорили, что так хорошо воспитан и умен."
 russia.902.a: "El zar se abstiene de comentarios, el canciller silencia el asunto."
 russia.902.b: "¡El zar interviene y hace una proclamación drástica!"
 russia.903.t: "La popularidad del zar entre la nobleza disminuye"
 russia.903.d: "...Anna Pavlovna seguía dando en su casa, en los días libres, las mismas veladas de antes, y de esas que solo ella tenía el don de organizar: veladas en las que, en primer lugar, se reunía la crème de la véritable bonne société, la fine fleur de l'essence intellectuelle de la société de Petersbourg...\nEsto es lo que indicaba el termómetro político en la velada de Anna Pavlovna... la conversación, dirigida por Anna Pavlovna, giraba en torno a la relación de la alta sociedad con el zar..."
 russia.903.a: "El zar anuncia una gran reunión con los nobles."
 russia.903.b: "Cállenlos."
 russia.904.t: "El emperador Rostislav es arrestado"
 russia.904.d: ""
 russia.904.a: "Ahora elegiremos un zar verdaderamente honorable."
 russia.905.t: "Segunda asamblea del Zemski Sobor"
 russia.905.d: ""
 russia.905.a: "¡Miguel II!"
 russia.905.b: "¡Nicolás III!"
 russia.905.c: "¡Alexis II!"
 russia.906.t: "Sin usar"
 russia.906.d: "Sin usar"
 russia.906.a: "Sin usar"
 russia.907.t: "Konstantín Maloféyev abre una red de gimnasios ortodoxos"
 russia.907.d: "Recientemente, Konstantin Malofeev, un conocido empresario, Consejero Privado y mecenas de los valores tradicionales, inauguró gimnasios de nuevo estilo en muchas ciudades de provincia durante su gira por el Imperio. Estos gimnasios están inspirados en el anterior Gimnasio San Basilio el Grande, inaugurado en 2006. Su objetivo: \"proporcionar a los estudiantes un conocimiento profundo e inculcarles altos ideales morales, educar a personas que se sientan orgullosas de la historia nacional, amen ardientemente a Rusia y sirvan para el bien del país en el futuro, representando la nueva élite rusa\". El Emperador aprobó esta actividad y deseó éxito en sus estudios a todos los futuros alumnos de los gimnasios."
 russia.907.a: "Increíble."
 russia.908.t: "Tsárskoye Seló reabre sus puertas a los estudiantes"
 russia.908.d: "El Liceo de Tsárskoye Seló en tiempos prerrevolucionarios fue la forja de la verdadera élite estatal del Imperio. Sus alumnos se convirtieron en oficiales, diplomáticos, funcionarios e incluso poetas y escritores destacados. El país necesitaba talentos y personal confiable, y los formaba desde una edad temprana para que le sirvieran. Ahora nos enfrentamos al mismo problema: el estado es enorme y necesitamos personal leal y cualificado. Entonces, ¿por qué no revivimos esta gloriosa tradición?"
 russia.908.a: "¿Cuándo veremos un nuevo Pushkin?"
 russia.909.t: "Resurgimiento del Movimiento Liberal del Zemstvo"
 russia.909.d: "El reciente resurgimiento de los zemstvos ha traído de vuelta otra de sus características distintivas: el Movimiento Liberal del Zemstvo, que se formó poco después de la reforma administrativa de Alejandro II. Aunque heterogéneo en esencia, todos sus miembros coinciden en varias cosas: el país necesita descentralización administrativa, relajación de la censura y una mayor participación pública en los asuntos del Estado. Sí, aunque algunos creen que fue el conflicto entre el Gobierno y el zemstvo lo que llevó a la Primera Revolución, estamos seguros de que hemos aprendido de los errores del Imperio pasado, y tal horror no volverá a ocurrir."
 russia.909.a: "No está mal."
 russia.910.t: "Nepolzhivshina"
 russia.910.d: "LO QUE HABÍA EN EL IMPERIO RUSO Y LO QUE PERDIMOS Y AHORA RECUPERAMOS:\n1. LAS ARMAS ESTABAN HECHAS DE ESPUMA DE LECHE. PODÍAS USARLA PARA ALIMENTAR A LOS SOLDADOS.\n2. LA GRAVEDAD ERA UN 80 POR CIENTO MÁS DÉBIL. LA GENTE SALTABAN CINCO RANGOS EN LA TABLA DE RANGOS DE UNA CARRERA.\n3. EL HOMBRE VIVÍA UN PROMEDIO DE 150-190 AÑOS. NO HABÍA ENFERMEDADES EXCEPTO POR COMER PASTELES.\n4. SI TE TROPEZABAS Y CAÍAS EN LA CALLE, LOS COMERCIANTES CORRÍAN, TE PONÍAN DINERO EN EL BOLSILLO, TE BESABAN EN LOS LABIOS, TE OFRECÍAN UNA BEBIDA Y TE PEDÍAN QUE TE CASARAS CON SU HIJA.\n5. LAS LIEBRES Y LAS PERDICES VOLABAN A LA SARTÉN DE INMEDIATO. SI COMPRABAS PAN, RECIBÍAS VODKA ADICIONAL. TENÍAS MIEDO DE ACERCARTE A CUALQUIER CHARCO: EL ESTURIÓN SALTARÍA A LA OLLA.\n6. LA GENTE SE DESPERTABAN POR LA NOCHE CON UNA ORACIÓN SINCERA Y BUENA. POR LA MAÑANA TODOS IBAN A LA IGLESIA ORTODOXA.\n7. EL PERÍODO DE GESTACIÓN ERA DE 4.5 MESES. LOS NIÑOS NACÍAN DE 12-15 KILOGRAMOS CON CABELLO RUBIO Y OJOS AZULES CLAROS Y CARAS INTELIGENTES Y DE VOLUNTAD FUERTE - SE PODÍA VER QUE IBAN A SAN PETERSBURGO A ESTUDIAR.\n8. EL AGUA DEL VOLGA ERA TAN DULCE COMO LA MELAZA. Y EL YENISEI CONSISTÍA EN CERVEZA NEGRA.\n9. HACÍA MENOS 300 EN INVIERNO, Y TODOS ESTABAN SONROJADOS.\n10. LOS SOLDADOS CRECÍAN EN ASENTAMIENTOS MILITARES DEL TAMAÑO DE GRANADEROS. LOS GRANADEROS ERAN TAN GRANDES COMO UN GUARDIA, LOS GUARDIAS TAN GRANDES COMO UN CABALLO, Y EL CABALLO ERA COMO UNA MANUFACTURA METALÚRGICA DE LOS URALES, Y EN ELLA LOS CAMPESINOS JUGABAN DURAK SEGÚN EL MÉTODO DE IVANOV - ¡TERMINABAN LA BARAJA EN EL PRIMER MOVIMIENTO!"
 russia.910.a: "¡Bravo!"
 russia.911.t: "Popularización del estilo arquitectónico de San Petersburgo"
 russia.911.d: "San Petersburgo no es llamada la \"Palmira del Norte\" en vano. Una de las ciudades más hermosas no solo de Europa sino también del mundo, San Petersburgo siempre ha atraído la atención de la gente creativa. El \"Jinete de Bronce\" de Pushkin, muchas novelas de Fiódor Mijáilovich Dostoievski y muchas otras obras están dedicadas a la Ciudad de Pedro. Y ahora hay una nueva moda entre los funcionarios de la ciudad: demoler los \"bloques de paneles\" y \"humanniks\" bolcheviques, verdaderos crímenes contra el arte y el urbanismo, y reemplazarlos con algo más agradable a la vista: casas bajas de San Petersburgo, más adecuadas para la nueva Rusia Imperial."
 russia.911.a: "¡Genial!"
 moldova.3.t: "Carta a Chisináu"
 moldova.3.d: "VNIMANIE! \nPUTIN NEDAVNO OBIAVIL O ZAPUSKE KODA \"5050\" PO NASTUPLENIU NA KIEVSKI KFS GDE MOZHNO RAZDOBYT DVA TVISTERA PO TSENE ODNOGO\nZ Rabotaite, bratia"
 moldova.3.a: "Eto po suti ne dolzhen prochitat igrok poetomu mne pojui"
 moldova.4.t: "Moldavia acepta negociar."
 moldova.4.d: ""
 moldova.4.a: "Eso es genial."
 moldova.5.t: "Moldavia se niega."
 moldova.5.d: ""
 moldova.5.a: "Lo recordaremos..."
 russia.1000.t1: "La Revolución"
 russia.1000.d1: "La Madre Patria ha vencido en otra Gran Guerra Patria. No es una gran sorpresa, pero sí un acontecimiento de gran magnitud. Pocos creían que Rusia regresaría al socialismo, pero ahora, el legado de los antiguos bolcheviques ha sido vengado. La victoria triunfal sobre Europa hizo a la renacida URSS más fuerte que su predecesora. La Unión Soviética es ahora el único líder del continente europeo. Nuestro ejército es tan poderoso que aplastará a cualquiera que se interponga en su camino. El capitalismo explotador ha sido erradicado de Rusia. Nuestro poderío económico es inigualable. El pueblo soviético es más patriota que nunca.\nAl amanecer, el pueblo soviético vive con la plena certeza de que su Patria lo protegerá de cualquier adversidad.\nPronto, el mundo se teñirá de rojo, tras el comienzo de una nueva era: la Era Soviética. El sueño del comunismo mundial está finalmente a nuestro alcance, y tú, el Jugador, hiciste todo lo posible para lograrlo. Gracias."
 russia.1000.t2: "¡A estribor!"
 russia.1000.d2: "La Madre Patria ha vencido en otra Gran Guerra Patria; no es una gran sorpresa, pero sí un acontecimiento de gran magnitud. Rusia ha derrotado a los comunistas impíos de una vez por todas.\nLa Tierra es tan tacaña que solo puede albergar a una superpotencia. Habíamos establecido nuestro lugar en la cabecera de la mesa; es una mesa con una sola silla. Las demás potencias mundiales se extenderán, como civilizaciones antiguas de las que nadie ha oído hablar.\n\nNuestra patria disfrutará de esta victoria durante muchas generaciones, y nuestra gloria jamás se desvanecerá de la historia de la humanidad.\nJamás.\nNos encontramos en los albores de una nueva era rusa, una era de fuerza y poder, donde la debilidad será purgada.\nDisfruta de esta victoria, querido jugador; hiciste muy bien en traer esta nueva era. Gracias."
 russia.1000.t3: "El país del sol"
 russia.1000.d3: "La Madre Patria ha vencido en otra Gran Guerra Patria; no es una gran sorpresa, pero sí un acontecimiento de gran magnitud. Rusia ha derrotado a los globalistas de una vez por todas.\n\nLa Tierra es tan tacaña que ya no puede soportar una sola superpotencia; será dividida diligentemente en polos equitativos de influencia y cooperación. El mundo unipolar se deslizará hacia la extinción como antiguos imperios de los que nadie ha oído hablar. La humanidad libre glorificará esta victoria durante muchos años.\n\nNuestra patria entra en una era en la que nadie la amenazará; nuestros ciudadanos celebran y esperan un futuro estable y glorioso. Y así será. La era de la multipolaridad está a nuestro alcance; pronto, los últimos vestigios del viejo orden se desintegrarán y las cadenas se romperán.\n\nDisfruta de esta victoria, querido Jugador; hiciste muy bien en traer esta nueva Era. Gracias."
 russia.1000.a: "Amanece un nuevo día..."
 russia.1000.c: "Amanece un nuevo día..."
 russia.1000.f: "Amanece un nuevo día..."
 russia.1000.h: "Amanece un nuevo día..."
 russia.1000.j: "Amanece un nuevo día..."
 russia.1000.g: "Amanece un nuevo día..."
 russia.1001.t1: "Vida larga y feliz..."
 russia.1000.b: "La verdad está de nuestro lado..."
 russia.1001.d1: "A medida que la paz comienza a imponerse en toda Europa, el sonido de los disparos de artillería y los tiros se desvanece gradualmente. Después de meses de lucha, los rusos finalmente pueden respirar aliviados, habiendo sobrevivido a las dificultades de la derrota y la reconstrucción.\n\nAcorralados, eligieron la unidad y la revolución: la unidad y revolución eurasiática. El eurasianismo, el nuevo faro de liberación de la era moderna frente a los vicios del pasado y del presente. La gente vive unida con un propósito y fe comunes.\n\nPocos creían que Rusia ganaría una guerra así tan pronto, pero los rusos siempre han sorprendido a sus oponentes en el pasado, y lo hicieron de nuevo.\nEn lugar de la ideología odiosa y globalista de la Unión Europea y la OTAN, Europa está respirando nueva vida, la civilización occidental será restaurada a su antigua gloria, llena de pensadores y poetas, genios y obras de arte, gracias a los eurasianistas, tal como ellos se liberaron. La antorcha del duguinismo brilla intensamente en el escenario mundial. Ha recorrido un largo camino a través de la destrucción y la devastación, pero finalmente ha llegado, y el continente eurasiático está más unido que nunca.\nPuede que hayas perdido la primera batalla, jugador, pero al final ganaste la guerra. ¡Qué regreso!"
 russia.1001.t2: "\"¡Cuidad a Rusia!\" - Borís Yeltsin"
 russia.1001.d2: "A medida que la paz comienza a imponerse en toda Europa, el sonido de los disparos de artillería y los tiros se desvanece gradualmente. Después de meses de lucha, los rusos finalmente pueden respirar aliviados, habiendo sobrevivido a las dificultades de la derrota y la reconstrucción.\n\nAcorralados, eligieron la libertad y la independencia: la libertad y la independencia rusa. La democracia solo es posible cuando todos son tratados por igual, sin privilegios para nadie. Los crímenes de los ocupantes no pueden pasarse por alto debido a su estatus privilegiado.\n\nPocos creían que Rusia ganaría una guerra así tan pronto, pero los rusos siempre han sorprendido a sus oponentes en el pasado, y lo hicieron de nuevo.\nEn lugar de la ideología odiosa y excluyente de la Unión Europea y la OTAN, Europa está respirando nueva vida, libre de las cadenas de la corrupción, gracias a los rusos, tal como ellos se liberaron a sí mismos. La democracia rusa brilla intensamente en el escenario mundial. Ha recorrido un largo camino a través de la destrucción y la devastación, pero finalmente ha llegado, y los rusos están más unidos que nunca.\nPuede que hayas perdido la primera batalla, jugador, pero al final ganaste la guerra. ¡Qué regreso!"
 russia.1001.a: "Amanece un nuevo día..."
 russia.1001.b: "Amanece un nuevo día..."
 nato.6.t: "Aviones civiles sin marcar"
 nato.6.d: "ATC CHOPINA, VARSOVIA\nVuelo no identificado, indique su distintivo de llamada y destino.\n\nAVIÓN NO IDENTIFICADO\n...\n\nATC CHOPINA, VARSOVIA\nVuelo no identificado, está volando sobre espacio aéreo restringido, indique su distintivo de llamada y destino inmediatamente.\n\nAVIÓN NO IDENTIFICADO\n...\n\nATC CHOPINA, VARSOVIA\nSegundo vuelo no identificado, indique su distintivo de llamada y destino. Hay más en el radar... 10, 15, 20... Vuelos no identificados, indiquen sus distintivos de llamada inmediatamente o serán forzados a aterrizar.\n\nAVIÓN NO IDENTIFICADO\n..."
 nato.6.a: "ESOS NO SON VUELOS CIVILES"
 tajikistan.1.t: "La presa de Rogún en Tayikistán, a punto de finalizar"
 tajikistan.1.d: "Tayikistán está completando activamente los trabajos en la central hidroeléctrica de Rogún, el proyecto energético clave del país. Según el Gobierno, la construcción de la presa ha llegado a la fase final y se están instalando las últimas unidades hidráulicas. Tras su puesta en marcha, la central se convertirá en la más grande de Asia Central, proporcionando a la región electricidad barata y reduciendo la dependencia de las importaciones.\n\nEl proyecto, iniciado por el gobierno de la URSS en 1976, fue congelado repetidamente, pero en 2018 la construcción se reanudó con el apoyo de Rusia. El lanzamiento final está previsto para los próximos años."
 tajikistan.1.a: "Bien por ellos."
 SOV_the_russian_dream: "Sueño ruso"
 SOV_the_russian_dream_desc: "Un país que abarca una octava parte del mundo. Un país que se niega a ser una simple nota al pie de página en la historia. Con territorios y personas fuera de él que anhelan regresar. Un país que rechaza la hegemonía occidental y defiende el orden mundial multipolar.\n\nSi bien el siglo pasado no ha sido amable con nosotros, también nos brindó algunos de nuestros momentos más gloriosos. Y hasta que el alma rusa se extinga, continuaremos recorriendo nuestro propio camino."
 SOV_pacify_abkhazia_and_south_ossetia: "Proteger Abjasia y Osetia del Sur"
 SOV_pacify_abkhazia_and_south_ossetia_desc: "Los dos Estados separatistas de Georgia han sido nuestros aliados y hermanos desde sus guerras rebeldes. Su gente es resiliente y orgullosa. Y leal, que es lo más importante.\n\nSin embargo, está claro que les hemos hecho un flaco favor al permitirles estar aislados del mundo. Debemos incluirlos en nuestra esfera económica y de defensa, porque merecen ver sus regiones prosperar."
 SOV_pressure_kiev: "Presionar a Kiev"
 SOV_pressure_kiev_desc: ""
 SOV_global_propoganda_campaigns: "Campañas de propaganda global"
 SOV_global_propoganda_campaigns_desc: ""
 SOV_complete_nordstream2: "Completar Nord Stream 2"
 SOV_complete_nordstream2_desc: ""
 SOV_review_the_military_budget: "Revisar el presupuesto militar"
 SOV_review_the_military_budget_desc: ""
 SOV_ties_with_bashar: "Conexiones con Bashar"
 SOV_ties_with_bashar_desc: ""
 SOV_chinese_trade_deals: "Acuerdos comerciales con China"
 SOV_chinese_trade_deals_desc: "Nuestro vecino del este es el país con la segunda economía más grande del mundo. Al mismo tiempo, es el principal productor de bienes. Un país de este tamaño tiene una riqueza de experiencia para compartir con nosotros, teniendo en cuenta dónde empezó. Dejemos que sus industriales nos muestren el camino hacia la prosperidad, porque es hora de que adoptemos sus métodos."
 SOV_condemn_ukraine_neonazism: "Condenar el neonazismo ucraniano"
 SOV_condemn_ukraine_neonazism_desc: ""
 SOV_prepare_the_union_state: "Preparar el Estado de la Unión"
 SOV_prepare_the_union_state_desc: "Desde 1996, Aleksandr Lukashenko firmó una declaración del Estado de la Unión con Boris Yeltsin. Por supuesto, la idea era que Bat'ka tomaría el control de Rusia una vez que este acuerdo entrara en vigor. Sin embargo, con el ascenso de Vladímir Putin, el proyecto se detuvo.\n\nPero nada se puede detener para siempre, y nuestro presidente está comprometido con la rápida creación del Estado de la Unión. Incluso compró vino de Abjasia para la reunión con Lukashenko, ¡así de serio es al hablar de este asunto!"
 SOV_increase_fsb_funding: "Renovar el mandato"
 SOV_increase_fsb_funding_desc: "Es la voluntad del pueblo la que mantiene a Putin en el poder. A pesar de todo lo que se habla sobre autoritarismo, la opinión pública sí importa. No solo del gobierno, sino del propio Putin. Porque el pueblo está dispuesto a tolerar la corrupción y la ineficiencia siempre que apoyen al hombre al mando. Y si funcionó con Obama y Trump, ¿por qué deberíamos ser diferentes?"
 SOV_strangle_the_islamists: "Combatir a los islamitas"
 SOV_strangle_the_islamists_desc: ""
 SOV_tighten_the_leashes: "Aprietar las correa"
 SOV_tighten_the_leashes_desc: ""
 SOV_fight_against_the_left: "Combatir a la izquierda"
 SOV_fight_against_the_left_desc: "La izquierda presenta el principal peligro para nuestro sistema actualmente. Apoyo de Navalni durante las elecciones locales anteriores, el culto al \"ciudadano soberano de la URSS\", la retórica anti-establishment. Dado que los nacionalistas ya han sido reprimidos, los izquierdistas deberían seguir su ejemplo. Es lo justo."
 SOV_fight_against_the_right: "Combatir a la derecha"
 SOV_fight_against_the_right_desc: "En los años 2010, nuestro Gobierno ha tomado medidas enérgicas contra los sentimientos nacionalistas, principalmente de los tipos antimigrantes y xenófobos. Sin embargo, la amenaza aún permanece e incluso parece florecer. No podemos olvidar cuántos de nuestros neonazis acudieron en masa al lado ucraniano para \"luchar contra la presidencia bolchevique y sus lamebotas\". Y aunque también tenemos nacionalistas que apoyan nuestra causa, es mejor asegurarse de que no puedan propagar su ideología."
 SOV_fight_ldpr_influence: "Subvertir influencia del PLDR"
 SOV_fight_ldpr_influence_desc: "El PLDR necesita ser presionado, ya que es el cuerpo principal del movimiento de derecha en Rusia."
 SOV_fight_liberalism: "Combatir al liberalismo"
 SOV_fight_liberalism_desc: ""
 SOV_fight_communist_nostolgia: "Subvertir influencia del PCFR"
 SOV_fight_communist_nostolgia_desc: "El PCFR necesita ser presionado, ya que es el cuerpo principal del movimiento de izquierda en Rusia."
 SOV_expand_government_framework: "Ampliar el marco gubernamental"
 SOV_expand_government_framework_desc: "Nuestro control sobre el Estado hace que sea fácil perecer y no hacer nada. Sin embargo, nuestro presidente cree que deberíamos \"fortalecer nuestra administración\" preparando nuevas conexiones y alianzas dentro del sistema. El Frente Popular Panruso es un sistema ya establecido. Todo lo que necesitamos es expandirlo."
 SOV_towers_of_kremlin: "Torres del Kremlin"
 SOV_towers_of_kremlin_desc: "Mientras que los partidos políticos están \"unidos\" en política exterior y pueden actuar como aduladores, Rusia no es un estado unipartidario. Las \"Torres\", como las llamamos, son una colección de personas en todo el gobierno con antecedentes y puntos de vista similares, que impulsan su agenda colectiva hacia adelante.\n\nLas dos torres principales son los \"tecnócratas\" y los \"Siloviki\". Mientras que los tecnócratas abogan por más dinero en proyectos tecnológicos que van desde la energía nuclear hasta los obvios acarres de dinero, los siloviki abogan por más dinero en proyectos militares que van desde armas nucleares hasta obvios acarres de dinero.\n\nAplacar cualquiera de estos bloques traerá diferentes beneficios, pero también podría causar algunos problemas."
 SOV_anti_globalist_bulwark: "Baluarte antiglobalista"
 SOV_anti_globalist_bulwark_desc: "Las élites globales desean subyugar al mundo, enjaularlo bajo corporaciones mundiales. Debemos luchar contra tal influencia. Debemos mostrar al mundo que el orden mundial unipolar está destinado a caer, porque nosotros y la Mayoría Global tenemos el poder de detener su influencia."
 SOV_glorify_our_victory: "Glorificar nuestras victorias"
 SOV_glorify_our_victory_desc: "Somos los descendientes de los vencedores. Aquellos que murieron para defender a nuestra gente del exterminio. Algunos en los círculos liberales dicen que glorificar nuestra victoria es \"sediento de sangre\" e \"innecesario\". ¿Por qué deberíamos olvidarnos de esta guerra? ¿Olvidan que casi 30 millones de soviéticos fueron asesinados por los alemanes, masacrados pueblo por pueblo? Israel también ha perdido mucho, sin embargo, se niegan a olvidar tales atrocidades.\nDebemos seguir su ejemplo y recordar cuánto se sacrificó por estar aquí."
 SOV_amplify_state_media: "Ampliar medios estatales"
 SOV_amplify_state_media_desc: "Si bien el cable ha estado perdiendo fuerza con el auge de internet, no deberíamos abandonarlo. Nuestros servicios de medios deben ser amplificados y refinados, porque todavía confiamos en su éxito.\nAunque parece que incluso CCN y la BBC han sido criticadas por propaganda en sus países de origen... Supongo que será un trabajo complicado hacer que cada una de nuestras narrativas sea atractiva."
 SOV_pass_the_new_constitution: "Garante del Sistema"
 SOV_pass_the_new_constitution_desc: "Nuestro querido presidente ha implementado los cambios que deseaba. El Parlamento se reorganizó, y las Torres están complacidas. Honestamente, ¿qué haríamos sin él? Parece que todos los demás se estarían destrozando el cuello si no fuera por su participación. Bueno, como es habitual, ¡un brindis por nuestro presidente!"
 SOV_declare_smo: "Comenzar la operación especial"
 SOV_declare_smo_desc: "Después de solucionar los problemas más urgentes, ahora es el momento de mirar hacia el extranjero. Ucrania se ha estado rearmando constantemente durante años con el apoyo occidental. Nuestros hermanos del Dombás se han fortalecido, y nuestros generales nos están diciendo que el ejército está listo. Bueno, hermanos, es hora de una operación militar especial.\n\n¡Zajódim!"
 SOV_stimulate_srzp: "Estimular la popularidad de RJ-PV"
 SOV_stimulate_srzp_desc: "Rusia Justa - Por la Verdad es una entidad política interesante. Compuesta por socialistas moderados, veteranos nacionalbolcheviques y centralistas, se encuentra en una posición precaria. Lo que ayuda es que, si bien son muy críticos con Rusia Unida, son leales a nuestro presidente. Sin embargo, podríamos usarlos para restarle votos al PCFR..."
 SOV_strengthen_the_federation_chairman: "Fortalecer al partido presidencial"
 SOV_strengthen_the_federation_chairman_desc: "¡El presidente solo necesita a su partido y nada más! Debemos lograr que Rusia Unida alcance una cómoda mayoría en las encuestas. ¡Manos a la obra!"
 SOV_1000_years_of_putinism: "Mil años de putinismo"
 SOV_1000_years_of_putinism_desc: "Parece que la posición de nuestro querido presidente se ha consolidado. Ha superado múltiples crisis y revitalizado nuestro sistema. Su historia y su legado quedarán grabados en los libros de historia. Un estado de estasis, inalterado durante 20 años.\n\n¡Seamos ambiciosos y brindemos por que dure otro milenio!"
 SOV_address_the_economy: "Afrontar la economía"
 SOV_address_the_economy_desc: ""
 SOV_pension_reform: "Reforma jubilatoria"
 SOV_pension_reform_desc: ""
 SOV_encourage_domestic_production: "Alentar a la producción doméstica"
 SOV_encourage_domestic_production_desc: "Ante el caos que ha sumido las cadenas de suministro, es evidente que debemos aumentar la producción nacional. Esto también frenará la fuga de talentos, ya que nos centraremos más en nuevas industrias que requieren mano de obra cualificada."
 SOV_strengthen_gazprom: "Fortalecer a Gazprom"
 SOV_strengthen_gazprom_desc: "El gas, el petróleo y los recursos naturales han sido, y probablemente seguirán siendo, nuestra principal fuente de ingresos durante al menos cinco años. Los mercados europeos dependen en gran medida de nosotros, y no deberíamos desaprovechar estas oportunidades excepcionales. Que el fuego azul nos traiga los árboles del dinero."
 SOV_everything_is_alright: "Todo está bien..."
 SOV_everything_is_alright_desc: ""
 SOV_force_lockdowns: "Imponer cuarentenas"
 SOV_force_lockdowns_desc: "Bueno... parece que este virus es más grave de lo que pensábamos. Primero, pongamos a Rusia bajo cuarentena para solucionarlo. Tenemos un trabajo que hacer."
 SOV_kickstart_vaccine_research: "Iniciar investigación de vacuna"
 SOV_kickstart_vaccine_research_desc: "¿Por qué comprar vacunas extranjeras si podemos fabricar las nuestras? Contamos con suficientes mentes brillantes y virólogos capaces de hacerlo. Financiaremos los centros rusos de investigación de virus para esta tarea. ¡Podemos fabricar medicamentos de calidad!"
 SOV_purchase_sinovac_vaccine: "Comprar vacunas Sinovac"
 SOV_purchase_sinovac_vaccine_desc: "Bueno... supongo que los chinos ya tienen su vacuna lista... ¿Por qué deberíamos malgastar nuestro dinero en vacunas nacionales otra vez? Simplemente tomen las de nuestros amigos, no como si fueran radicalmente diferentes."
 SOV_provide_incentives_to_stay_open: "Incentivar a mantenerse abiertos"
 SOV_provide_incentives_to_stay_open_desc: ""
 SOV_restrict_meetings: "Restringir reuniones"
 SOV_restrict_meetings_desc: ""
 SOV_restore_public_confidence: "¡Regreso a la normalidad!"
 SOV_restore_public_confidence_desc: "¡Rusia ha vuelto a la normalidad! Bueno, a la nueva normalidad, supongo. Las inversiones y los avances que hicimos durante esta pandemia se mantendrán. Pero el presidente Putin está muy contento de que hayamos evitado la peor situación posible. Esta fue una prueba crucial para nuestra administración. Nuestros sistemas se han perfeccionado y podemos gestionar situaciones tan extraordinarias en el futuro con facilidad. Simplemente ignoren las quejas y lloriqueos de la gente; de todas formas, no saben qué les conviene."
 SOV_against_chipivization: "¡Contra la chipivización!"
 SOV_against_chipivization_desc: "Parece que la indignación pública contra nuestros confinamientos y vacunaciones masivas ha llegado a un punto crítico. Los comunistas se han alzado abiertamente contra nosotros... ¿inyectando microchips a nuestros ciudadanos? ¿Qué? Además, ¿por qué la oposición prooccidental eligió a los líderes del movimiento antivacunas en nuestras administraciones locales?\n\nEh... Vamos a calmarnos... Sí, nuestros sistemas de vigilancia y confinamientos eran un poco extremos, ¡pero todos lo hacían! ¡Comparado con Australia o Gran Bretaña, esto no era nada! En fin, mientras estén contentos, supongo. No podemos manchar la imagen de nuestro querido presidente por estas tonterías..."
 SOV_force_vaccinations: "Obligar vacunaciones"
 SOV_force_vaccinations_desc: ""
 SOV_sponsor_russian_digital_economy: "Patrocinar la economía digital"
 SOV_sponsor_russian_digital_economy_desc: "Rusia es uno de los mercados digitales más grandes del mundo. Desde aplicaciones de banking en línea y redes sociales hasta simples plataformas de mensajería y motores de búsqueda, Rusia está repleta de talentosos profesionales de informática. Vladímir Vladímirovich reconoce este talento, y por eso lo apoyaremos aún más. ¡Que la web rusa alcance nuevos altos!"
 SOV_fund_military_advancement: "Financiar avances militares"
 SOV_fund_military_advancement_desc: "El complejo militar-industrial sigue siendo una de nuestras industrias más grandes. Estas fábricas no solo nos proporcionan armas que podemos vender en el extranjero, sino que también atraen más empleos y aprovechan nuestros recursos a nivel nacional.\n\nLos estadounidenses han logrado aumentar sus capacidades, en gran medida gracias a sus contratistas militares, que crean alta tecnología para bombardear Medio Oriente. Deberíamos seguir su ejemplo."
 SOV_back_to_normal: "Economía rusa del futuro"
 SOV_back_to_normal_desc: "Hubo una época en la que la economía rusa vivió algunos de sus mejores años. Irónicamente, el período de prosperidad coincidió con la crisis financiera mundial. Y ahora, parece que hemos vuelto a nuestra época dorada. Mientras el mundo arde y la economía mundial se desploma, solo nosotros nos mantenemos en la cima. Altos ingresos del petróleo y el gas, enorme expansión industrial, el fin de los confinamientos; todo parece estar sucediendo en el momento oportuno. ¡Brindemos por los frutos de los esfuerzos de nuestro presidente!"
 SOV_what_now: "¿Ahora qué?"
 SOV_what_now_desc: "Parece que los buitres ya están al acecho, buscando el escaño central. Sea cual sea el candidato, el futuro de Rusia cambiará sin la guía de nuestro Vladímir Putin. Supongo que nosotros también debemos elegir a quién apoyar, pues nuestros sueldos están en juego."
 SOV_spread_cprf_leaflets: "Unir al Partido Comunista"
 SOV_spread_cprf_leaflets_desc: "El PCFR ha sido desde hace mucho tiempo descartado por otros grupos de izquierda como una nota al pie, no como un verdadero movimiento comunista. Sin embargo, durante esta oportunidad única, ¿se mantendrán al margen y dejarán que el capitalista les arrebate la victoria, como hicieron en 1996?\n\n¡NO! ¡Se unirán a Ziugánov y devolverán a Rusia a su camino correcto!"
 SOV_party_of_power: "Usar recursos administrativos"
 SOV_party_of_power_desc: "Mientras otros partidos se disputan el poder, Medvédev lleva la delantera. Utilizando todos los recursos disponibles de nuestro Gobierno, transmitiremos a la población este mensaje: ¡El sucesor de Putin ganará una vez más!"
 SOV_ramp_up_the_agitation: "Aumentar la agitación populista"
 SOV_ramp_up_the_agitation_desc: "Queridos rusos: ¿Están contentos con su vida? ¿Están contentos con que nuestros oligarcas se lamen las botas occidentales, inundando nuestro país de mano de obra poco cualificada? ¿Están contentos con que los europeos manchen el nombre de nuestra nación, destruyendo estatuas de soldados soviéticos que los liberaron del mal puro, todo por su odio hacia nosotros?\n\n¡Bien, Zhirinovski dice ¡BASTA! ¡Rusia volverá a su legítima gloria!"
 SOV_post_putin_elections: "Elecciones presidenciales"
 SOV_post_putin_elections_desc: "Ante la inestabilidad de nuestro Gobierno, es evidente que debemos actuar. Durante las últimas décadas, las elecciones presidenciales rusas fueron un evento bastante aburrido. Sin embargo, ahora que todos los partidos políticos, las Torres y los grupos de debate convergen en torno a la presidencia, parece que estas elecciones decidirán el destino de nuestra nación en las próximas décadas."
 SOV_crush_western_influence: "Aplastar la influencia occidental"
 SOV_crush_western_influence_desc: "La oposición pro-occidental ha utilizado todos los recursos disponibles para desestabilizar nuestra nación. Nuestro presidente conoce la doble cara de Occidente. Incluso en nuestros momentos más críticos, han intentado traicionarnos financiando a terroristas chechenos. Por eso debemos hacer todo lo posible para que el movimiento financiado por Occidente pase a la clandestinidad.\n\nY desde allí, solo podrán observar cómo nos levantamos con el sol."
 SOV_anti_ukranian_military_exercizes: "Ejercicios anti-Ucrania"
 SOV_anti_ukranian_military_exercizes_desc: "Durante el golpe de Estado en Ucrania de 2014, el presidente legítimo Yanukóvich decidió huir de su país a Rusia. Este ha sido un error crucial que hemos estado pagando desde entonces. Desde entonces, Ucrania se ha estado preparando militarmente para un conflicto con nosotros, con la OTAN entrenando a sus líderes y tropas.\n\nIdealmente, nosotros también deberíamos prepararnos para tal escenario. Después de todo, nuestras fuerzas están oxidadas."
 SOV_assist_our_novorossiyan_allies: "Asistir a las repúblicas del Dombás"
 SOV_assist_our_novorossiyan_allies_desc: "Estos dos bastiones del mundo ruso han estado sufriendo por el derecho a ser llamados rusos. Sin embargo, años después de su alzamiento, los problemas persisten. No tienen una zona económica unificada, ni sus fuerzas están unificadas. Sin embargo, por ahora, basta con un simple apoyo."
 SOV_the_navalny_fifth_column: "Actuar contra la quinta columna"
 SOV_the_navalny_fifth_column_desc: "A pesar de todos nuestros esfuerzos, parece que Navalni y su rebaño siguen yendo contra nosotros. Es curioso que un nacionalista ruso que comparaba a los caucásicos con cucarachas quiera traernos la \"democracia occidental\". ¿Por qué, sólo porque fue a la Universidad de Yale para aprender \"estadismo\"?\n\nLamentablemente, no morirá como Tesak ni desaparecerá misteriosamente como sus anteriores colegas nazis. Es un hombre \"reformado\", un hombre liberal. Pero, aunque es cierto que podría haber cambiado, los pecados del pasado nunca se olvidan."
 SOV_increase_online_censorship: "Aumentar la censura online"
 SOV_increase_online_censorship_desc: "Roskomnadzor ha sido ineficiente últimamente. Bloquear Telegram no funcionó, y muchos agentes occidentales han estado difundiendo desinformación en otras redes sociales. Debemos perfeccionar nuestro sistema de seguridad en internet para utilizarlo correctamente.\n\nPor cierto, parece que algunos jóvenes decidieron crear tendencia y dibujar nuestra agencia como una chica guapa, ¿verdad? Me pregunto por qué."
 SOV_arrest_navalny: "Represión dura"
 SOV_arrest_navalny_desc: "Bueno, dado que la mayoría de las opciones inofensivas han resultado ineficaces, parece que solo una represión severa puede detener a la oposición de destrozar nuestro país. Se desplegará a OMON para sofocarlos.\n\nSin embargo, a diferencia de las democracias liberales, nuestras fuerzas no usan balas de goma ni cañones de agua, lo que limita su eficacia. ¡Pero la justicia de la porra de goma y el escudo de metal se enfrentará a todo malhechor!"
 SOV_combat_domestic_extremism: "Combatir al extremismo doméstico"
 SOV_combat_domestic_extremism_desc: ""
 SOV_arrest_troublesome_politicians: "Arrestar políticos problemáticos"
 SOV_arrest_troublesome_politicians_desc: "Afortunadamente, el PCFR cuenta con mucha gente cuestionable en su partido con la que podemos lidiar. Antivacunas, conspiranoicos desquiciados y disidentes antigubernamentales en general. Claro que son la minoría del movimiento de izquierda, pero pueden manchar la imagen del partido comunista. Y eso es preferible."
 SOV_bribe_corrupt_cprf_officials: "Charlar con Ziugánov"
 SOV_bribe_corrupt_cprf_officials_desc: "El líder del PCFR es un hombre sabio. Es un estimado colega de nuestro presidente y un veterano de la política, que casi derrotó a Yeltsin en las elecciones de 1996 de no ser por la intromisión estadounidense y oligarca. Sin embargo, Vladímir Putin considera oportuno dar unos \"consejos\" sobre cómo debería dirigirse su partido de ahora en adelante."
 SOV_arrest_communist_extremists: "Arrestar a extremistas comunistas"
 SOV_arrest_communist_extremists_desc: "Bueno, ya que hemos terminado con la gente del PCFR, es hora de abordar los movimientos de izquierda más pequeños. Si bien la mayoría tiene poca o ninguna influencia real y se puede ignorar, ciertos individuos representan una amenaza para nosotros. ¡Es hora de que nuestros chicos se pongan manos a la obra!"
 SOV_calls_of_russian_unity: "Llamar a la unidad rusa"
 SOV_calls_of_russian_unity_desc: "¡Los rusos estamos bajo asedio de los unipolaristas occidentales! Intentan desgarrarnos, porque si nos unimos contra ellos, no tendrán ninguna posibilidad. ¡La unidad es nuestra fuerza!"
 SOV_bribe_corrupt_ldpr_officials: "Charlar con Zhirinovksi"
 SOV_bribe_corrupt_ldpr_officials_desc: "A Zhirinovski lo han llamado el \"payaso\" de la política rusa, pero nada más lejos de la realidad. Sabe cómo impulsar su marca y su partido, y su conocimiento de la geopolítica y los juegos políticos internos es innegable. Por eso, nuestro gran presidente quiere charlar con él sobre el futuro de su partido. Esperamos que sea escuchado."
 SOV_purge_problematic_oligarchs: "Purgar oligarcas problemáticos"
 SOV_purge_problematic_oligarchs_desc: "La corriente principal actual de la derecha está, en su mayor parte, financiada por los oligarcas. El problema, sin embargo, es que estos oligarcas son leales a nuestro sistema. Para asegurarnos de que se mantengan a raya, tanto para presionarlos como para complacerlos, podríamos arrestar a los oligarcas \"liberales\" que tienen causas penales abiertas relacionadas con ellos. Matar dos pájaros de un tiro."
 SOV_arrest_fascist_extremists: "Arrestar a extremistas nacionalistas"
 SOV_arrest_fascist_extremists_desc: "Aunque personas como Tesak ya se han suicidado, y su equipo ha desaparecido sin dejar rastro o ha huido a Europa, aún existen varios movimientos nacionalistas a pequeña escala que amenazan nuestro sistema. Debemos enfrentarlos."
 SOV_utilize_communist_nostalgia: "Utilizar nostalgia soviética"
 SOV_utilize_communist_nostalgia_desc: "¡La URSS fue el período más importante de nuestra historia! Hemos superado obstáculos inimaginables, desafiado a Norteamérica por la dominación global y reconstruido nuestro país desde la devastación hasta convertirlo en un país industrializado. Debemos atesorar este pasado."
 SOV_focus_on_corruption: "Enfocarnos en la corrupción"
 SOV_focus_on_corruption_desc: "Desafortunadamente, a pesar de todas las palabras y posturas, el problema de corrupción de nuestra administración sigue siendo el mayor lastre para nuestro país. Obstaculiza nuestra cohesión social, militar, económica y cultural y perjudica nuestras perspectivas de crecimiento.\n\nEn lugar de aumentar la producción económica de Rusia, primero debemos centrarnos en arreglar el sistema."
 SOV_sanction_proof_economy: "Economía a prueba de sanciones"
 SOV_sanction_proof_economy_desc: "Si bien la corrupción sigue siendo un gran problema, la principal preocupación es la vulnerabilidad de nuestro país a las sanciones occidentales. Han pasado años desde que se impusieron, y parece absurdo que los empresarios locales se enfrenten a las corporaciones occidentales que aún permanecen en nuestros mercados.\n\nPero qué pasaría si niveláramos el terreno de juego y dejáramos que nuestros capitalistas respiraran un poco... ¿Quizás incluso las capacidades manufactureras occidentales podrían ser nuestras?"
 SOV_increase_public_transparency: "Aumentar la transparencia"
 SOV_increase_public_transparency_desc: "El principal problema de nuestro sistema es la clara falta de transparencia. Nuestros políticos pueden hacer lo que quieran siempre y cuando no sean descubiertos. Y aunque esto no debería molestarnos, es evidente que algunos usan este beneficio para ocultarle al presidente sus iniciativas menos atractivas. Garantizar que el público pueda seguir la actividad de nuestros políticos beneficiará a todos los involucrados."
 SOV_investigate_corrupt_parties: "Subsidiar prestaciones sociales"
 SOV_investigate_corrupt_parties_desc: "Pagar buenos salarios a los trabajadores siempre ha sido un veneno para nuestros empresarios. Y aunque ya hace tiempo que dejamos atrás la época en que los oligarcas usaban mano de obra armada para tomar fábricas o asesinar a huelguistas, la situación de los derechos laborales sigue siendo cuestionable. Debemos mejorar las prestaciones sociales de la clase trabajadora, pues son quienes mantienen nuestro país en marcha."
 SOV_restore_faith_in_government: "Restaurar la fe en el Gobierno"
 SOV_restore_faith_in_government_desc: "Desde que el sistema actual ha estado en el poder, la diferencia entre la opinión pública sobre nuestro querido presidente y su partido gobernante ha sido... drástica. Burócratas como usted y yo éramos vistos como corruptos, ineficientes y desconectados del ciudadano común. Pero con las reformas actuales, parece que la situación ha cambiado.\n\n¡La gente cree en nosotros y nos insulta mucho menos que antes! ¡Un logro por el que brindar!"
 SOV_enrich_mother_russia: "Enriquecer a la Madre Rusia"
 SOV_enrich_mother_russia_desc: "Desafortunadamente para nosotros, los años 2000 no duró para siempre. Con la bajada de los precios del petróleo y las sanciones impuestas, nos vimos obligados a acumular dinero para un fondo de emergencia. Sin embargo, acumular dinero no tiene sentido si no se quiere usar.\n\nCon solo una pequeña fracción de dicha reserva, junto con nuestras conexiones con los oligarcas, podemos impulsar nuestra economía a un nivel aún mayor."
 SOV_spread_anti_western_propaganda: "Difundir propaganda antioccidental"
 SOV_spread_anti_western_propaganda_desc: "Hubo un tiempo en que esperábamos con ansias nuestra ascensión hacia Occidente. Creíamos que podríamos formar parte de una gloriosa civilización cristiana. Sin embargo, los estadounidenses nos lo negaron. Y ahora, bueno, ¿por qué no deberíamos estar contentos con eso?\n\nY ni siquiera necesitamos difundir desinformación: simplemente sigan martilleándolos con cosas como la Isla Pequeña Saint James y las guerras culturales. Que lo resuelvan ellos mismos y vean los fuegos artificiales."
 SOV_destabilize_the_west: "Más fondos al FSB"
 SOV_destabilize_the_west_desc: "El FSB ha sido un método probado y eficaz para proteger a Rusia de sus enemigos. Y por todo su arduo trabajo, diría que se merece un aumento de sueldo."
 SOV_new_revolution: "La nueva revolución"
 SOV_new_revolution_desc: "Rusia es la cuna del movimiento socialista y comunista. Fue aquí donde surgió el primer estado comunista exitoso, pero fue destrozado y vendido al mejor postor. ¡Debemos rebelarnos contra esta injusticia, pues el proletariado debe ser liberado!"
 SOV_remember_the_old_days: "Nuestro pasado soviético"
 SOV_remember_the_old_days_desc: "Somos hijos de una gran civilización. Una que derrotó al mayor mal, y se resistió la opresión capitalista. Una que conquistó tanto las estrellas como el átomo. Esta es la nación que reconstruiremos, y esta es la única prueba que necesitamos para reivindicar nuestra legitimidad."
 SOV_cprf_is_your_party: "PCFR - ¡Tu partido!"
 SOV_cprf_is_your_party_desc: "Muchos afirmaban que el Partido Comunista de la Federación de Rusia era una farsa, poblado por seniles desconectados de la realidad. Sin embargo, somos nosotros quienes lideramos el movimiento de izquierda en Rusia, y somos nosotros quienes tenemos la capacidad de restaurar la gloria soviética, a diferencia de todos los demás movimientos de izquierda compuestos por 10 o 20 personas. ¡Somos tu partido, porque no tienes alternativa!"
 SOV_promises_of_bread: "Favoritos del \"voto inteligente\""
 SOV_promises_of_bread_desc: "Aunque la oposición liberal son unos lamebotas estadounidenses, su sistema de \"voto inteligente\" es interesante. Considerando que somos el único partido tradicional al que pueden apoyar, podríamos aprovecharlo. Y, oye, si esos tipos odian tanto el imperialismo ruso y el putinismo que votan por restaurar la URSS, ¡no es problema nuestro!"
 SOV_use_the_younger_base: "10 Pasos hacia el Poder Popular"
 SOV_use_the_younger_base_desc: "Para ganar más apoyo, debemos hacer que nuestros ideales sean fáciles de entender y de votar. Para lograrlo, tomaremos el programa \"10 Pasos hacia el Poder Popular\" y lo promoveremos en todo el país. ¡La gente debe saber a qué está votando!"
 SOV_victory_day: "Fiel al pueblo, necesitado por el país"
 SOV_victory_day_desc: "Han pasado décadas desde la creación de nuestro partido, pero nuestros objetivos siguen siendo los mismos. Sin embargo, desde entonces nuestro país se ha ido deslizando cada vez más hacia el camino oligárquico y pro-estadounidense. El país nos necesita y estamos listos para responder a este llamado."
 SOV_russian_destiny: "Destino de Rusia"
 SOV_russian_destiny_desc: "En muchos círculos, Vladímir Zhirinovski era considerado nada más que un payaso, pero aquí está. Se había preparado cuidadosamente para ese momento, contando con un grupo leal a su lado. Ha llegado el momento de revivir Rusia, la verdadera Rusia. No más lavado de dinero por parte de oligarcas en el extranjero. No hay erosión de la cultura rusa. ¡Rusia volverá a su gloria de una vez por todas!"
 SOV_gain_church_support: "Obtener el apoyo eclesiástico"
 SOV_gain_church_support_desc: "La Iglesia ortodoxa rusa siempre ha sido la piedra angular de nuestra nación. Incluso ahora, en nuestra sociedad secular, sigue ejerciendo un poder considerable, aunque en un sentido cultural. Su apoyo sería extremadamente importante."
 SOV_maintain_status_quo: "Por la Rusia soberana"
 SOV_maintain_status_quo_desc: "¿Qué más podría querer el ruso medio de su presidente? El sucesor de Putin, que ya tiene experiencia al mando. El sueño de Putin de un orden mundial multipolar y una democracia soberana se hará realidad, ¡porque nuestra victoria no es negociable!"
 SOV_gain_oligarchist_support: "Unir a los partidarios de Putin"
 SOV_gain_oligarchist_support_desc: "Afortunadamente, podemos utilizar la base de apoyo de nuestro ex líder para nuestra campaña. Incluso después de su partida, su poder sobre el país continúa."
 SOV_send_aid_to_america: "Utilizar la Guardia Joven"
 SOV_send_aid_to_america_desc: "Si bien el jubilado promedio y partidario de Putin son una opción obvia, la Guardia Joven es un grupo demográfico más frágil. Tradicionalmente, los jóvenes nos han tratado con frialdad, pero en general apoyan a Rusia, al menos en términos de sentimiento patriótico. Si logramos aprovechar este idealismo, podria ganarnos el voto."
 SOV_use_extreme_measures: "Plan de Medvédev"
 SOV_use_extreme_measures_desc: "Aunque Medvédev fue elegido por Putin, no es su copia. Medvédev promete cambios, pero no en su primer mandato, sino hacia una libertad con la que las democracias occidentales ni siquiera pueden soñar. ¡Cree en sus promesas, porque cumplirá el mayor deseo de Putin: crear una democracia verdaderamente soberana!"
 SOV_heir_to_strongman: "Heredero de Putin"
 SOV_heir_to_strongman_desc: "Es el sucesor de Putin.\nEl que puso a Georgia de rodillas.\nEl que garantizará la soberanía de Rusia.\n¡Su nombre es Dmitri Medvédev y llegó para ganar las elecciones!"
 SOV_improve_ur_image: "Mejorar la imagen de Rusia Unida"
 SOV_improve_ur_image_desc: "Aunque somos el partido mayoritario, sin Vladímir Putin nuestra popularidad ha caído. Es hora de que presentemos un programa de partido claro y popularicemos nuestras ideas entre el pueblo a través de los medios de comunicación. ¡Tenemos que demostrarle a la gente que vale la pena votar por nosotros!"
 SOV_for_the_future: "Por el Futuro"
 SOV_for_the_future_desc: ""
 SOV_reinvigorate_the_masses: "Inspirar a las masas"
 SOV_reinvigorate_the_masses_desc: ""
 SOV_promises_of_peace: "Promesas de paz"
 SOV_promises_of_peace_desc: ""
 SOV_lashout_oligarchs: "Atacar a los oligarcas"
 SOV_lashout_oligarchs_desc: ""
 SOV_promises_of_land: "Populismo imperial"
 SOV_promises_of_land_desc: "¿No recuerdas lo que perdimos? Nación de gloria, nación de poder. Millones de nuestros hermanos nos fueron arrancados. Pervertida por la degeneración occidental, convertida en un bastión antirruso. ¡Debemos recuperar lo que es nuestro!"
 SOV_anti_establishment_big_tent: "Frente amplio contra el statu quo"
 SOV_anti_establishment_big_tent_desc: "Para derrotar al establishment, debemos reunir todos los votos posibles. Afortunadamente, existe una gran base de grupos antisistema de todo tipo y tamaño. ¡Seremos la voz de los que no son escuchados, de los que quieren ver a Rusia sin Rusia Unida!"
 SOV_russophilic_propaganda: "Campañas en línea"
 SOV_russophilic_propaganda_desc: "Como otros partidos no ven el potencial de internet, utilizarlo en nuestra campaña es una decisión definitiva. Gracias a los discursos populistas de Zhirinovski y a un partido bastante joven, podemos involucrar fácilmente a la base de votantes jóvenes. Lo único que tenemos que hacer es decir unas cuantas palabras bonitas."
 SOV_attack_the_polls: "Lanzar agitadores del PLDR"
 SOV_attack_the_polls_desc: "A diferencia de otros partidos políticos, el nuestro es más... activo. Gorras, figuras, cuadernos... tenemos una gran cantidad de voluntarios que difunden nuestras ideas, ¡y son todos gratuitos! ¡Lanzemoslos a distribuir estos productos e ideas de Zhirinovski, para asegurar nuestra victoria de una vez por todas!"
 SOV_operation_suvorov: "OPERACIÓN: §YROKOSSOVSKI§!"
 SOV_operation_suvorov_desc: "Después de que la OTAN intervino en el conflicto, no tuvimos otra opción. Estamos activando un plan altamente clasificado para eliminar amenazas en Polonia y el Báltico. ¡Esta operación será un paso decisivo en la lucha por nuestra seguridad y la restauración de la influencia soviética en la región!"
 SOV_mobilize_the_national_guard: "Movilizar la Rosgvárdia"
 SOV_mobilize_the_national_guard_desc: "Es hora de activar nuestra Rosgvárdia. Estos valientes defensores están listos para defender su patria y garantizar el orden en los territorios liberados. ¡Su fuerza y determinación serán un eslabón importante en nuestra búsqueda de la victoria!"
 SOV_mobilize_the_airforce: "Movilizar la Fuerza Aérea"
 SOV_mobilize_the_airforce_desc: "Cada unidad de nuestra aviación es importante para la victoria. Incluso los aviones antiguos pueden ser un factor decisivo en una batalla. ¡Estamos movilizando nuestra Fuerza Aérea para garantizar la superioridad aérea y apoyar las operaciones terrestres!"
 SOV_operation_polar_star: "OPERACIÓN: §YESTRELLA POLAR§!"
 SOV_operation_polar_star_desc: "¡LUCHAD! ¡ÉSTA ES LA ÚLTIMA DERIVA HACIA BUDAPEST Y VARSOVIA!"
 SOV_election_victory: "Victoria electoral"
 SOV_election_victory_desc: "La revolución finalmente triunfó, no asaltando las barricadas sino a través de las urnas. Nadie podría haber previsto este resultado, y todos los que se reían del PCFR como una reliquia del pasado ahora se ven obligados a mirar con desconcierto. El pueblo ha hecho su elección: el futuro pertenece al socialismo."
 SOV_release_political_prisoners: "Liberar a los presos políticos"
 SOV_release_political_prisoners_desc: "Con la llegada de un nuevo gobierno, el gobierno se enfrenta a la pregunta: ¿quiénes deben ser considerados presos políticos? Entre ellos se encuentran víctimas de las represiones del régimen, pero también quienes amenazan el nuevo orden. Hay que tomar una decisión: liberar a todos o realizar una investigación exhaustiva para determinar quién es verdaderamente digno de la libertad."
 SOV_other_parties_issue: "Cuestión de otros partidos"
 SOV_other_parties_issue_desc: "Tras la derrota de Rusia Unida, el PCFR se enfrenta a la tarea de ¿qué hacer con las fuerzas políticas restantes? Su futuro es incierto. Algunos proponen la eliminación completa de la oposición, mientras otros creen que es necesaria su integración gradual al sistema socialista. El debate continúa y el destino de los demás partidos está en juego."
 SOV_new_soviet_parliament: "Nuevo Parlamento Soviético"
 SOV_new_soviet_parliament_desc: "La Duma Estatal, en su forma actual, ha cumplido su condena. El PCFR anuncia la inminente disolución de esta reliquia del pasado, junto con el Consejo de la Federación, destruyendo así la Asamblea Federal en su totalidad. El pueblo pronto elegirá a sus representantes para un nuevo parlamento soviético, verdaderamente democrático, ya sea el Sóviet Supremo o el Congreso de los Diputados del Pueblo. El Partido debe decidir qué órgano sentará las bases del nuevo Estado socialista."
 SOV_cooperate_with_the_church: "Cooperar con la Iglesia"
 SOV_cooperate_with_the_church_desc: "Aprendemos de los errores del pasado. Los comunistas de hoy saben que la lealtad a la tradición y el respeto a las creencias religiosas de nuestro pueblo son la clave para una unidad duradera. La Iglesia, como guardiana del patrimonio cultural, se convierte en nuestra fiel aliada. Juntos guiaremos a nuestro pueblo hacia un futuro brillante, basándonos no solo en el progreso, sino también en los valores espirituales."
 SOV_glorify_stalin: "Glorificar a Stalin"
 SOV_glorify_stalin_desc: "Stalin - nasha slava boevaia,\nStalin - nashei yunosti polet.\nS pesniami, borias i pobezhdaia,\nNash narod za Stalinym idet."
 SOV_enshrine_democratic_centralism: "Garantizar el centralismo democrático"
 SOV_enshrine_democratic_centralism_desc: "El centralismo democrático es el núcleo de nuestro partido y de nuestro estado. Las decisiones se toman de forma colegiada, pero se implementan impecablemente. Esto garantiza una gobernanza eficaz y protección contra el caos. Unidad en la acción, firmeza en las decisiones y disciplina: ¡estos son nuestros principios!"
 SOV_empower_the_premier: "Empoderar al presidente"
 SOV_empower_the_premier_desc: "En el nuevo Estado socialista, el presidente es una figura clave en el gobierno. Su papel debe fortalecerse para garantizar un liderazgo rápido y firme del país. ¡Fortaleceremos el poder del presidente para que pueda liderar al país con rapidez y decisión hacia la transformación socialista y el éxito!"
 SOV_protect_russian_minorities: "Proteger minorías rusas"
 SOV_protect_russian_minorities_desc: "Tenemos la obligación de proteger a nuestro pueblo dondequiera que se encuentre. ¡Los ciudadanos rusoparlantes en el extranjero no deben sentirse abandonados! Se prestará especial atención a Ucrania y sus repúblicas orientales, Donetsk y Lugansk. El apoyo secreto les garantizará la confianza de que no serán olvidados y de que su futuro reside en una única familia amistosa de naciones fraternales."
 SOV_soviet_union_restoration_referendum: "Referendo de Restauración de la URSS"
 SOV_soviet_union_restoration_referendum_desc: "A pesar de su nombre, el referendo sobre la restauración de la URSS es más bien un acto simbólico que fortalecerá la conexión con nuestro glorioso pasado y confirmará el apoyo popular al regreso de la gran potencia soviética. Aunque esta acción no ha tenido resultados prácticos, dado que se celebra únicamente en el territorio de nuestro país, ya estamos empezando a introducir las cuatro letras sagradas \"URSS\" en la circulación de documentos, allanando el camino para el resurgimiento del país."
 SOV_integrate_belarus_into_rsfsr: "Integrar Bielorrusia a la RSFSR"
 SOV_integrate_belarus_into_rsfsr_desc: "La unión de Rusia y Bielorrusia se está haciendo realidad. Este paso no es solo simbólico, sino un verdadero avance hacia la restauración de un gran país. La unificación de los dos pueblos bajo la bandera común de la RSFSR es una etapa importante en el camino hacia el resurgimiento de la unidad y el poder soviéticos."
 SOV_invite_upc_cpsu_members: "Invitar miembros de la OTSC a la URSS"
 SOV_invite_upc_cpsu_members_desc: "Nuestros aliados de la OTSC deben comprender que el sistema soviético es el camino hacia la prosperidad y la justicia. Es hora de invitarlos a reorganizar sus Gobiernos según nuestros principios y unirse a la URSS revitalizada. ¡Juntos crearemos una nueva unión de pueblos basada en la hermandad y el socialismo!"
 SOV_operation_minerva: "Operación Minerva"
 SOV_operation_minerva_desc: "Debemos expandir nuestra influencia en los países transcaucásicos. Si no aceptan unirse voluntariamente a la URSS, utilizaremos nuestro poderío militar para lograrlo."
 SOV_soviet_moldova: "Maniobras en Moldavia"
 SOV_soviet_moldova_desc: "Debemos garantizar que todos los territorios anteriormente gobernados por la República Socialista Soviética de Moldavia se incorporen nuevamente a la URSS y estén dispuestos a luchar con nosotros contra cualquier enemigo."
 SOV_operation_invictus: "Operación Invictus"
 SOV_operation_invictus_desc: "Invitaremos a los países de Asia Central a reincorporarse a nuestra unión y les daremos la bienvenida como hermanos y hermanas solidarios. Si se niegan a unirse voluntariamente, utilizaremos la fuerza para someterlos a nuestro control."
 SOV_prepare_to_march_west: "Preparar la marcha a Occidente"
 SOV_prepare_to_march_west_desc: "Vemos cómo las fuerzas del imperialismo intentan una vez más imponer su voluntad a los pueblos del mundo. Las potencias occidentales de Europa, obsesionadas con el afán de poder y riqueza, se preparan para coartar nuestra libertad e independencia. Han olvidado las lecciones del pasado, pero nosotros recordamos. Recordamos el heroísmo de nuestros antepasados, quienes derrotaron al fascismo y defendieron la independencia de nuestra Madre Patria. Nos espera una nueva etapa de la historia, en la que debemos alzarnos para defender nuestra soberanía, nuestros ideales y nuestro futuro. El inminente conflicto con Europa es inevitable, y debemos estar preparados para afrontarlo con todas nuestras fuerzas."
 SOV_operation_little_saturn: "OPERACIÓN: §YPEQUEÑO SATURNO§!"
 SOV_operation_little_saturn_desc: "Fuerza contra fuerza, armadura contra armadura, fuego contra fuego.\n\nHoy nos encontramos en el umbral de un momento histórico. Nos enfrentamos a la tarea de liberar al hermano pueblo de Ucrania de las ataduras del neonazismo y la influencia occidental. Marchamos para traer la paz y el orden, para restaurar la justicia y devolver a Ucrania su verdadera libertad. Esta no es solo una batalla por territorio, es una batalla por nuestros ideales comunes, por nuestro futuro y el futuro de nuestros hijos. Sabemos que la OTAN, una alianza que busca la dominación mundial, puede intentar interponerse en nuestro camino, pero estamos preparados. Que nuestros enemigos sepan que no nos doblegarán. Marchamos hacia la victoria."
 SOV_draft_new_constitution: "Redactar una nueva Constitución"
 SOV_draft_new_constitution_desc: "El grupo de Rashkin, en un golpe discreto dentro del Partido, tomó el poder y presentó una nueva constitución radical. El centralismo democrático demostró su fuerza: a pesar de la indignación de algunos comunistas, la mayoría del Partido aceptó este hecho. ¡La nueva constitución sentaría las bases de un Estado socialista moderno, con el pueblo en el centro de todas las reformas!"
 SOV_new_komsomol: "Continuar el rejuvenecimiento"
 SOV_new_komsomol_desc: "¡El rejuvenecimiento del Partido es la garantía de su futuro! Jóvenes cuadros llenos de entusiasmo y determinación darán un nuevo impulso al PCFR. Debemos continuar este proceso, atrayendo a la dirección a cada vez más jóvenes comunistas, listos para liderar el país hacia el futuro sin abandonar los ideales del socialismo."
 SOV_ban_the_church: "Debilitar la influencia eclesiástica"
 SOV_ban_the_church_desc: "Si bien no tenemos nada en contra de la fe, debemos preguntarnos: ¿qué papel ha desempeñado la Iglesia en el pasado? Al servicio del régimen anterior, se convirtió en un instrumento de represión y servilismo hacia las clases altas. Ha llegado el momento de debilitar su influencia para que ya no pueda interferir en los asuntos del Estado y del pueblo."
 SOV_socialism_with_human_face: "Socialismo con rostro humano"
 SOV_socialism_with_human_face_desc: "No hemos olvidado a Gorbachov ni su traición; traicionó nuestros valores y vendió a nuestro pueblo a Occidente. Pero los años 80 no son solo sus errores; fue una época en la que la gente creía en un futuro brillante. No repetiremos los errores del pasado, sino que recuperaremos este espíritu de esperanza y justicia. El socialismo real con rostro humano protegerá a todos, y el Partido hará todo lo posible para hacer realidad este futuro."
 SOV_lenin_cult: "Culto a Lenin"
 SOV_lenin_cult_desc: "Lenin es un símbolo de la lucha por la libertad y la igualdad, el padre de la Revolución de Octubre, que condujo a la creación de una Rusia soviética libre y democrática. Sus ideas sobre justicia social e igualdad aún perduran.\n\nLenin sigue siendo uno de los líderes más destacados de la historia rusa. Proclamó el derecho de las naciones a la autodeterminación, reconoció la igualdad de género, luchó por los derechos laborales y sentó las bases de la democracia soviética.\n\nAhora que los comunistas hemos vuelto al poder, esperamos revivir el culto a Lenin y sus ideales. Debemos promover sus singulares cualidades de liderazgo, su dedicación a la construcción del socialismo y su amor desinteresado por la Madre Patria."
 SOV_empower_congress_of_soviets: "¡Todo el poder a los sóviets!"
 SOV_empower_congress_of_soviets_desc: "¡Es hora de devolver el poder real a los sóviets! La democracia soviética, donde el poder reside en el pueblo a través de sus consejos electos, volverá a ser la base de nuestro Estado."
 SOV_mobilize_the_youth: "Renacimiento soviético"
 SOV_mobilize_the_youth_desc: "Los grandes maestros del arte soviético, como Mayakovski y Tatlin, inspiraron a la gente a crear un mundo nuevo. Su espíritu resurge en nuestra época. Revitalizaremos la cultura soviética reuniendo a creadores para crear arte nuevo y vanguardista para un futuro socialista. ¡Ha llegado la hora de la nueva vanguardia soviética!"
 SOV_create_ADS: "Asociación de Estados Democráticos"
 SOV_create_ADS_desc: "La Asociación de Estados Democráticos es una organización económico-política intergubernamental propuesta que serviría de foro para la cooperación de los Estados socialistas de todo el mundo, inspirada por grupos como la Internacional Comunista y el CAME. Durante décadas, estas naciones nunca han podido mantenerse unidas frente a la amenaza capitalista que los rodea, abandonadas a su suerte ante quienes desean vulnerar su modo de vida. Si el proletariado ha de resurgir de las ruinas y proclamar la victoria sobre sus opresores, esto debe cambiar, y debemos ser nosotros quienes impulsemos dicho cambio. Las conversaciones con diplomáticos de Venezuela, Cuba y Bielorrusia han finalizado, dejando a la burguesía mundial acobardada ante nuestra unidad."
 SOV_support_new_pink_red_tide: "Apoyar la nueva marea rosa-roja"
 SOV_support_new_pink_red_tide_desc: "Desde finales de los años 20, las ideas del socialismo siempre han sido un tema de interés en la política latinoamericana, ya sean marxistas-leninistas de línea dura, trotskistas o socialdemócratas. Personas como Salvador Allende, Fidel Castro, el Che Guevara y Daniel Ortega moldearon el movimiento comunista en la región, y su influencia aún persiste. Desafortunadamente, las ideas de Marx no pudieron florecer en América del Sur y Central debido a una nación: Estados Unidos. Era evidente que Norteamérica y la CIA harían todo lo posible para detener la expansión del socialismo en América Latina, desde financiar dictadores genocidas hasta guerrillas antigubernamentales y violentos cárteles de la droga. Ahora, con los Estados Unidos fuera de escena, los pueblos de América Latina pueden finalmente romper las cadenas que los restringen, y debemos ayudarlos en su despertar socialista de cualquier manera posible."
 SOV_african_socialism: "Socialismo africano"
 SOV_african_socialism_desc: "En los numerosos casos de represión colonial y esclavitud provocados por los capitalistas de Europa, basta con mirar a África. Tras casi un siglo de saqueo y pillaje, que solo terminó porque los pueblos africanos se alzaron en armas contra sus amos, las potencias europeas aún mantienen presencia en el continente, con naciones como Francia explotando los recursos y la mano de obra de los países de África Occidental, llegando incluso a forjar federaciones de Frankenstein para mantener su dominio. Cualquier líder que se atreva a denunciar su neocolonialismo es reprimido mediante un golpe de estado, una muerte por \"circunstancias desconocidas\" o un asesinato político directo. Si queremos alcanzar nuestra visión, debemos proteger a África de nuestros adversarios impulsando los movimientos socialistas."
 SOV_our_american_comrades: "Nuestros camaradas americanos"
 SOV_our_american_comrades_desc: "Los Estados Unidos de América fueron, una vez, la única superpotencia mundial indiscutida. Su esfera de influencia se extendía desde el este de Asia hasta Norteamérica y Europa. Para los rusos, Norteamérica era la personificación de todo lo malo del mundo. Promovieron la degeneración capitalista en todo el planeta, envenenaron países con sus ideales y amenazaron la esencia misma de la civilización rusa durante décadas. Eso fue así hasta que un solo virus logró derrumbar toda la estructura, dejando a muchos asombrados por la fragilidad del sistema político estadounidense. Ahora que se han derrumbado por su propio peso, debemos centrar nuestra atención en quienes sacan el máximo provecho de su situación: los trabajadores que se han alzado valientemente contra sus amos, que luchan por la libertad. Les enviaremos toda la ayuda posible para asegurarnos de que, si Estados Unidos se alza una vez más, formen parte de la lucha global."
 SOV_red_east: "Oriente rojo"
 SOV_red_east_desc: "Desde la Revolución China del presidente Mao Tse-tung en los años 40, Asia Oriental siempre ha sido un semillero de movimientos socialistas, dando origen a grandes teóricos y constructores de naciones. Sus propias y distintivas versiones del socialismo han persistido hasta nuestros días, y Asia Oriental alberga algunos de los últimos países socialistas, como la RPD de Corea, la República Popular China y Vietnam. La positiva relación de nuestro Partido con el PCCh y nuestros camaradas en China ha sido un eje central de nuestra ideología, y si queremos ver al movimiento socialista global triunfar, debemos consolidar aún más nuestra presencia en Asia Oriental y forjar relaciones con las naciones socialistas más prósperas de la actualidad."
 SOV_join_BRI: "Iniciativa Franja y Ruta"
 SOV_join_BRI_desc: "La Iniciativa Franja y Ruta nos abre nuevas oportunidades. Fortaleceremos nuestra participación en este proyecto, que conecta Asia, Europa y África. Las inversiones en infraestructura y rutas comerciales beneficiarán a nuestra economía y fortalecerán los lazos con China."
 SOV_economic_sovereignty: "Soberanía económica"
 SOV_economic_sovereignty_desc: "Bajo las condiciones actuales, la dependencia de las exportaciones de petróleo y gas a Europa se está volviendo arriesgada. Comenzaremos a reducir gradualmente el suministro de energía a Occidente para proteger nuestra economía de amenazas externas. ¡En su lugar, utilizaremos estos recursos para desarrollar nuestras propias industrias!"
 SOV_people_are_master_of_the_country: "El pueblo - Dueño del país"
 SOV_people_are_master_of_the_country_desc: "Los recursos naturales deben pertenecer al pueblo. Llevaremos a cabo la estatización definitiva del petróleo, el gas y otras riquezas de nuestra tierra para que los ingresos provenientes de ellos beneficien a todos los ciudadanos."
 SOV_people_are_main_value_of_the_state: "Las personas - Principal valor del Estado"
 SOV_people_are_main_value_of_the_state_desc: "Lo más importante en cualquier sociedad es el bienestar de sus habitantes. Por eso es tan importante cuidar de quienes no pueden trabajar, como los ancianos y las personas con discapacidad. Ahora es el momento de demostrar nuestro compromiso con la gente. Aumentaremos los salarios y las pensiones para que cada ciudadano sienta el apoyo del Estado."
 SOV_new_methods_of_fighting_corruption: "Nuevas medidas anticorrupción"
 SOV_new_methods_of_fighting_corruption_desc: "La corrupción es el principal enemigo de una sociedad justa. Introduciremos tecnologías modernas, como la inteligencia artificial y redes de confianza cero, para aumentar el control y la transparencia en todos los niveles del gobierno. Estos nuevos métodos nos permitirán comenzar a combatir este vicio de nuestra sociedad de una manera nueva y garantizar, al menos parcialmente, una gobernanza justa."
 SOV_reinstate_comecon: "AED-CAME"
 SOV_reinstate_comecon_desc: "El restablecimiento del CAME en el marco de la Asociación de Estados Democráticos (AED) fortalecerá nuestra posición a nivel mundial. Esta alianza contribuirá al comercio, el intercambio de recursos y el desarrollo conjunto con aliados que comparten nuestros objetivos y valores. El retorno a una economía coordinada es el camino hacia el progreso."
 SOV_hammer_and_sickle_reforged: "La hoz y el martillo reforjados"
 SOV_hammer_and_sickle_reforged_desc: ""
 SOV_war_on_home_front: "Guerra en la retaguardia"
 SOV_war_on_home_front_desc: "Un esfuerzo bélico poderoso requiere recursos y capacidad de producción. El Partido y el Estado deben asegurarse de que nuestras fábricas funcionen con la máxima eficiencia, proporcionando al frente todo lo que necesite. ¡Movilizaremos la economía para la victoria!"
 SOV_rally_the_population: "Reunir a la población"
 SOV_rally_the_population_desc: "¡El pueblo debe saber contra quién estamos luchando! Fortaleceremos la unidad de la sociedad explicando los verdaderos objetivos de nuestra lucha. Un pueblo unido es nuestra fuerza, ¡y solo juntos podemos ganar!"
 SOV_no_step_back: "¡Ni un paso atrás!"
 SOV_no_step_back_desc: "El formidable grito del pasado ha recuperado su significado en este conflicto. ¡No permitiremos que el enemigo avance ni un solo paso! ¡Todos deben estar preparados para resistir hasta el final por nuestra Madre Patria y los ideales del socialismo!"
 SOV_heros_of_frontline: "Héroes del frente"
 SOV_heros_of_frontline_desc: "Nuestros héroes en el frente son símbolos de valor y sacrificio. Tenemos el deber de apoyarlos y contarle a la gente sobre sus hazañas. Estos héroes son nuestro todo, ¡y su historia inspirará a todos a luchar por la victoria!"
 SOV_reconcile_loyal_oligarchs: "Aprovechar las conexiones"
 SOV_reconcile_loyal_oligarchs_desc: "Las sanciones impuestas por los países capitalistas son un problema grave. Para superarlas, debemos recurrir a los oligarcas leales y pedir su ayuda. Debemos mostrarles a estas personas que tienen un lugar en la nueva sociedad soviética y que su riqueza y poder pueden usarse para el bien. Tenemos que crear una nueva relación basada en el respeto mutuo y la cooperación para construir juntos un mundo mejor."
 SOV_invite_new_socialism: "Invitación al Nuevo Socialismo"
 SOV_invite_new_socialism_desc: "Nikolái Platoshkin y su movimiento \"Por un Nuevo Socialismo\" hicieron una gran contribución al desarrollo de las ideas de izquierda en el país. Su experiencia e ideas nos ayudarán a avanzar. Le ofreceremos un puesto clave en el gobierno, donde su conocimiento y fuerza política trabajarán en beneficio del pueblo."
 SOV_invite_left_front: "Invitar al Frente de Izquierdas"
 SOV_invite_left_front_desc: "Serguéi Udaltsov y el Frente de Izquierdas han demostrado su compromiso con la justicia social y el cambio revolucionario. Los invitaremos a formar parte del gobierno para fortalecer nuestras filas con seguidores experimentados y comprometidos. Sus ideas ayudarán a impulsar nuestra causa."
 SOV_grant_greater_ssr_autonomy: "Nuevo llamamiento de Lenin"
 SOV_grant_greater_ssr_autonomy_desc: "Al igual que hace cien años, el Partido necesita una nueva generación de personas comprometidas, dispuestas a dedicarse a construir el socialismo. Lanzamos una nueva convocatoria, inspirada en las tradiciones leninistas, para atraer a ciudadanos jóvenes y activos a nuestras filas. Esta es una oportunidad para que todos participen en una gran causa."
 SOV_restore_local_cultures: "Capa y espada de la Revolución"
 SOV_restore_local_cultures_desc: "Para proteger al Estado y al Partido, es necesario crear un nuevo organismo de seguridad que sea leal solo a nosotros. Formaremos una nueva KGB con cuadros probados que nunca traicionarán los ideales de la revolución. Su eficacia puede no ser comparable a la del FSB, ¡pero la lealtad es más importante que cualquier otra cosa!"
 SOV_increase_fsb_budget: "FSB - KGB"
 SOV_increase_fsb_budget_desc: "El regreso de la legendaria KGB requiere la fuerza y la experiencia de quienes sirvieron en los órganos de seguridad. Utilizaremos a los mejores cuadros del FSB para reconstruir esta poderosa estructura capaz de proteger eficazmente al Estado socialista. ¡Una nueva era exige la antigua dedicación y la capacidad de actuar con decisión!"
 SOV_special_military_operation_cprf: "Operación militar especial"
 SOV_special_military_operation_cprf_desc: "El neonazismo ucraniano no puede ser tolerado más. Sabemos que las autoridades en Kiev están preparando planes para destruir el Dombás, y es nuestro deber evitar esta tragedia. ¡Un ataque preventivo será nuestra respuesta para proteger al pueblo ruso y evitar que el enemigo lleve a cabo sus planes!"
 SOV_sway_ukrainian_workers: "Disuadir a los obreros ucranianos"
 SOV_sway_ukrainian_workers_desc: "El pueblo ucraniano debe conocer la verdad: el Ejército Soviético no llegó como invasor, sino como liberador. Esta operación está cuidadosamente planificada; estamos esforzándonos por evitar cualquier baja civil. Hacemos un llamado a los trabajadores ucranianos: ¡la Rusia soviética es su amiga, y nuestro objetivo es liberar a Ucrania de la opresión del neonazismo!"
 SOV_operation_red_dnepr: "OPERACIÓN: §YDNIPRO ROJO§!"
 SOV_operation_red_dnepr_desc: "En esta lucha, debemos ganar a toda costa. Incluso si causa sufrimiento a los civiles, no nos detendremos hasta que el neonazismo ucraniano sea destruido. ¡La operación Dnipro Rojo es el golpe decisivo que nos llevará a la victoria!"
 SOV_resovietization: "Resovietización"
 SOV_resovietization_desc: "Ucrania no es solo una tierra, es parte de la gran historia soviética. Recordaremos al pueblo el glorioso pasado rojo, cuando los trabajadores y campesinos eran dueños de su propio destino. ¡Esta es la restauración de la justicia, el regreso del pueblo a los ideales del socialismo!"
 SOV_restoring_soviet_republic: "Crear una República Soviética"
 SOV_restoring_soviet_republic_desc: "En los territorios liberados del Dombás y otras regiones, ha llegado el momento de restablecer la administración civil. Crearemos una nueva república soviética, que se convertirá en un bastión del socialismo en la región y un ejemplo para todo el mundo."
 SOV_exterminate_banderite_fascism: "Exterminar al fascismo banderista"
 SOV_exterminate_banderite_fascism_desc: "El fascismo ucraniano, que se esconde bajo el estandar de Bandera, debe ser completamente destruido. ¡No dejaremos ni rastro de esta ideología para que Ucrania pueda volver a ser libre de la opresión del nacionalismo y el fascismo!"
 SOV_ukrainian_red_army: "Ejército Rojo Ucraniano"
 SOV_ukrainian_red_army_desc: "Debemos reunir unidades de combate formadas por colaboradores locales dispuestos a luchar por la libertad y el socialismo. El Ejército Rojo Ucraniano será la fuerza que luchará por la liberación de su país."
 SOV_expand_communist_resistance: "Expandir la resistencia comunista"
 SOV_expand_communist_resistance_desc: "La ira del pueblo de Ucrania contra el régimen actual es nuestra oportunidad. Aprovecharemos este descontento para crear un poderoso movimiento guerrillero en territorio controlado por el enemigo. ¡La resistencia comunista se convertirá en una fuerza contundente en la lucha por la liberación de Ucrania!"
 SOV_soviet_victory: "¡Victoria!"
 SOV_soviet_victory_desc: "¡La victoria es más que una palabra, es el triunfo de nuestra gran Madre Patria! ¡La Rusia soviética, uniendo las fuerzas de los pueblos hermanos, ha derrotado a los ejércitos enemigos de Ucrania y la OTAN! ¡Una vez más hemos reunido a todas las repúblicas de la URSS bajo la bandera roja, y el mundo ve: el socialismo es invencible! ¡Esta es una nueva era de nuestra poderosa Unión, resurgida de las cenizas!"
 SOV_new_union: "Nueva Unión"
 SOV_new_union_desc: "Hemos reconstruido la Unión Soviética, ¡pero eso es solo el comienzo! Ha llegado el momento de entrelazar nuestras economías y fuerzas en un solo conjunto. La integración fluida de nuestras repúblicas nos llevará a alturas de desarrollo sin precedentes. ¡La nueva Unión se convertirá en un faro para todos los pueblos que sueñan con la libertad y la justicia! ¡Juntos barreremos el viejo mundo y construiremos uno nuevo!"
 SOV_new_treaty: "Nuevo Tratado"
 SOV_new_treaty_desc: "La OTSC ya no sirve a los intereses de nuestro tiempo, su lugar será ocupado por el nuevo escudo del socialismo: ¡la Organización del Tratado de Minsk! ¡Esta es nuestra respuesta a las amenazas de Occidente! La URSS y los Estados socialistas de Europa Oriental leales a nosotros crearán una alianza poderosa ante la cual todos los enemigos temblarán. ¡Volveremos a demostrar al mundo que la unidad de los países socialistas no puede ser aplastada!"
 SOV_help_in_rebuild: "Ayudar con la recuperación"
 SOV_help_in_rebuild_desc: "Europa Oriental sangró en la guerra con la OTAN, pero ahora, bajo nuestra bandera, ¡se levantará de las ruinas! Nos acercaremos a nuestras naciones hermanas, reconstruyendo ciudades, fábricas y carreteras. ¡Esta ayuda no es solo un acto de solidaridad, es un fortalecimiento de nuestra causa común! Junto a nosotros, construirán un mundo de justicia e igualdad. ¡Nuestro poder los revitalizará!"
 SOV_crush_the_parasites: "Aplastar los parásitos"
 SOV_crush_the_parasites_desc: "¡El momento de la misericordia ha acabado! Europa Oriental espera la liberación de los últimos vestigios del contagio fascista. Nos acercaremos a nuestros hermanos y ayudaremos a aplastar a los parásitos que acechan en las sombras del viejo mundo. ¡Occidente ha caído, sus ideales están muertos, y aquellos que sueñan con revivir este monstruo no encontrarán misericordia en nosotros! Ni un paso atrás, ¡todo el mundo del futuro está con nosotros!"
 SOV_rebuild_western_ssrs: "Reconstruir las RSS occidentales"
 SOV_rebuild_western_ssrs_desc: "¡Las ruinas de la guerra no nos detendrán! Estamos reconstruyendo las repúblicas soviéticas occidentales, revitalizándolas después de los bombardeos de la OTAN. Las fábricas volverán a funcionar, las carreteras brillarán y los trabajadores recuperarán sus hogares. Esto no es solo una reconstrucción, es el renacimiento de nuestros hermanos republicanos, ¡hechos más fuertes bajo la bandera roja!"
 SOV_destroy_separatism: "Destruir el separatismo"
 SOV_destroy_separatism_desc: "¡Los separatistas nacionales que sueñan con socavar nuestra unidad no encontrarán lugar en la nueva URSS! Sus sueños de división serán destruidos por la férrea voluntad del pueblo. Ucrania y los países bálticos volverán a ser una parte inseparable de la Unión, como siempre lo han sido y siempre lo serán. No permitiremos la repetición de los errores del pasado, ¡porque la unidad es nuestra fuerza!"
 SOV_renewed_federation: "Federación renovada"
 SOV_renewed_federation_desc: "¡La nueva Unión debe ser justa, y todos sus pueblos tendrán los mismos derechos! Crearemos una verdadera federación, donde cada sujeto será un participante igualitario en el gran proyecto socialista. ¡Desde Moscú hasta las fronteras, sin opresión, sin desigualdad! ¡Solo la igualdad nos dará la fuerza que nos llevará al futuro!"
 SOV_centralize_power_ussr: "Centralizar el poder"
 SOV_centralize_power_ussr_desc: "¡Un Estado fuerte necesita un Gobierno fuerte! Concentraremos todas las palancas de control en el centro, para que ninguna región pueda convertirse en una amenaza para la causa común. La gestión centralizada garantizará el control y la estabilidad, ¡y esta es la única manera en que podemos avanzar, barriendo todo a nuestro paso! ¡El poder en una sola mano es la clave para la victoria del socialismo!"
 SOV_enemies_in_the_west: "Enemigos en Occidente"
 SOV_enemies_in_the_west_desc: "Al derrotar a la OTAN, destruimos el neoliberalismo occidental, pero ahora han surgido fuerzas mucho más peligrosas en su lugar: ¡verdaderos fascistas y nacionalistas radicales! Estas fuerzas están hambrientas de venganza y no se detendrán ante nada. ¡No podemos relajarnos! Nuestras fronteras están amenazadas y un nuevo conflicto con Occidente es inevitable. ¡Los enemigos en Occidente deben saber que estamos listos para recibirlos con voluntad de hierro y un poder indestructible!"
 SOV_friends_in_the_east: "Amigos en Oriente"
 SOV_friends_in_the_east_desc: "El mundo en Oriente está al borde de un gran conflicto. China, nuestro hermano en espíritu e ideales, nos llama a su lucha por un nuevo orden mundial. Pero, ¿debemos unirnos a este torbellino o permanecer neutrales por el bien del futuro de nuestras repúblicas? Debemos tomar una decisión, porque de ello depende el destino no solo de Rusia, sino de toda Asia. ¿Quién es nuestro verdadero aliado en esta gran confrontación?"
 SOV_proletarian_internationalism: "Internacionalismo proletario"
 SOV_proletarian_internationalism_desc: "¡Proletarios del mundo, uníos! Esta consigna nunca ha perdido su actualidad y hoy, cuando el fuego de la revolución se enciende en todo el mundo, volveremos a ser el centro de la lucha mundial por los derechos de la clase trabajadora. ¡Nuestro internacionalismo no es sólo una idea, es nuestro deber hacia los oprimidos y los trabajadores de todos los países! Apoyaremos a los movimientos socialistas en todos los continentes, porque su victoria es nuestra victoria. ¡Sólo un proletariado unido puede aplastar finalmente la tiranía capitalista!"
 SOV_our_common_homeland: "Nuestra Madre Patria común"
 SOV_our_common_homeland_desc: "¡La Unión Soviética ha renacido, pero sus cimientos morales han permanecido inalterados! Somos un solo pueblo, unidos por una historia, una cultura y una aspiración común por un futuro brillante. Ni las fronteras, ni las guerras, ni las barreras ideológicas pueden dividirnos. Nuestra Madre Patria común no es solo una Unión de Repúblicas, es un símbolo de espíritu invencible y unidad de los pueblos. ¡Juntos estamos en el umbral de una nueva era, donde la justicia y la hermandad triunfan sobre la división y el odio!"
 SOV_political_integration: "Integración política"
 SOV_political_integration_desc: "¡Nuestros aliados en Europa Oriental deben mantener nuestro ritmo! Solo la plena integración política, una línea común y objetivos comunes asegurarán la verdadera unidad del campo socialista. ¡Debemos convertirnos en un puño unido, listo para enfrentar cualquier amenaza! ¡Sin divisiones ni contradicciones internas, avanzaremos como una fuerza unida que barrerá los restos del capitalismo de la faz de la tierra!"
 SOV_free_interpretation_of_socialism: "Libre interpretación del socialismo"
 SOV_free_interpretation_of_socialism_desc: "Cada país tiene derecho a su propio camino hacia el socialismo. La diversidad de enfoques no debe ser una debilidad, sino al contrario, ¡la fuerza de nuestro movimiento! Que cada república construya el socialismo como mejor le parezca, preservando su independencia. Diferentes caminos conducen a un mismo objetivo: ¡una sociedad libre y justa! Dejaremos que los aliados sigan su propio camino, ¡porque esta es la libertad del socialismo!"

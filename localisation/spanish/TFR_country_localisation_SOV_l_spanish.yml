 SOV_incorporate_new_russia_into_our_system: "Incorporar a §CRusia Nueva§!"
 SOV_incorporate_new_russia_into_our_system_desc: "A diferencia de otros partidos, el partido Rusia Nueva es capaz de aprovechar los deseos de sus seguidores más jóvenes, así como de hablar en nombre de las empresas y los principios democráticos. No les sería difícil darles un poco más de libertad, solo por el bien de la equidad."
 SOV_expunge_national_russia: "Eliminar a §8Rusia Nacional§!"
 SOV_expunge_national_russia_desc: "Rusia Nacional representa una seria amenaza para nuestra democracia, y Alijánov y sus asociados quieren destruirla promoviendo un ultranacionalismo y odio ruso dañinos. Afortunadamente, no será difícil encontrar pruebas en su contra, y una vez que él se haya ido, su partido podrido quedará sin él."
 SOV_expunge_red_russia: "Eliminar a §dRusia Roja§!"
 SOV_expunge_red_russia_desc: "Estos intransigentes soviéticos y estalinistas son un vestigio del pasado, que desean un control estatal total y purgar a sus oponentes políticos, poco dispuestos a aceptar el cambio. Si bien pueden contar con cierto apoyo de los jóvenes, su coalición no podrá superar el hecho de que son solo un grupo de ancianos que quieren aferrarse al poder."

 russiaflavor.1.t: "El presidente invisible"
 russiaflavor.1.d: "Si había algo que distinguía radicalmente a Vladislav Yúrievich Súrkov de sus predecesores como presidente de Rusia, era que los ciudadanos comunes del país apenas escuchaban sus declaraciones directamente o incluso lo veían. El nuevo presidente no viajaba personalmente por el país, no daba discursos ruidosos, ni siquiera gestionaba un canal de telegramas. Todas sus declaraciones se ponían a disposición del público general a través de un secretario de prensa. Y las apariciones grabadas o en vivo eran increíblemente raras. Esto contrasta fuertemente con el activo Dmitri Anatólievich y sus declaraciones estruendosas.\n\nPor supuesto, estas circunstancias se convirtieron en terreno fértil para teorías conspirativas. La más popular de ellas afirmaba que el verdadero Súrkov fue asesinado inmediatamente después de la firma de los acuerdos de Minsk, ya que supuestamente decepcionó a Vladímir Putin. Según esta teoría, el presidente actual es solo un doble y un actor especialmente entrenado a través del cual una camarilla de oligarcas y \"neo-zaristas\" dictan sus leyes. Los seguidores de esta teoría señalan el repentino regreso de \"Súrkov\" al Kremlin tras la muerte de Putin, a pesar de la declaración de Medvédev sobre la continuación del curso de Vladímir Vladímirovich. Así como la renuncia extremadamente repentina y aparentemente orquestada del propio Dmitri Anatólievich.\n\nLos funcionarios del Gobierno, por razones obvias, no comentan esta hipótesis. Una teoría conspirativa absurda, de las que hay muchas divorciadas y si habrá más. Por supuesto, el presidente ha oído hablar de ella y a veces sonríe, recordando que alguien lo considera un actor falso."
 russiaflavor.1.a: "¿Pero y si?"
 russiaflavor.2.t: "Mecanismos mortales"
 russiaflavor.2.d: "Antón Pavlóvich era un funcionario sencillo. Trabajaba en el Sistema Penitenciario Federal, a veces firmaba y movía papeles. Es un trabajo polvoriento y sin estatus. Pero hace dos semanas, la noticia lo dejó atónito. Dicen que la nueva IA ha sido probada, y él, un funcionario que llevaba casi una década en ese departamento, está siendo reemplazado. ¡Imagínate, una máquina sin alma, y él, un hombre de carne y hueso! Pero ya era demasiado tarde para negarlo, y no podía discutir con sus superiores ni con el presidente mismo sobre su necesidad.\n\nAsí que Antón empacó sus cosas de la oficina en una maleta en un día y estaba a punto de dejarlo para siempre. Los rayos amarillos del sol poniente iluminaban el pasillo donde Serguéi Aleksándrovich, un hombre mayor amable con cabello gris, que llevaba mucho tiempo trabajando como limpiador allí, estaba limpiando.\n\n- ¿Te vas de vacaciones, Antoshka? - dijo el hombre con buen humor y luego sonrió con sus dientes amarillentos restantes.\n- Para nada, Serguéi Aleksándrovich, me despidieron aquí. He empacado mis cosas y voy a la estación de tren.\n- ¿¡Cómo te despidieron!? ¿¡Por qué!? No me digas que aceptaste sobornos o algo peor.\n- Vamos, cálmate. Es que nuestro presidente, que ciertamente es leal, de repente decidió que el algoritmo haría mejor mi trabajo. Bueno, que así sea.\n- Eso es... ¿y a dónde piensas ir?\n- Volveré a la granja, la casa de mi padre está allí, tal vez finalmente tome un descanso de la ciudad. ¿Y tú? ¿No tienes miedo de que también te reemplace un coche?\n- Claro que sí, por supuesto. Lo principal aquí es no desesperar, siempre hay lugar para todos... Se trata del coche... Mi nieto dijo hace poco que la inteligencia artificial no vencerá a la estupidez natural. Así que dime tú mismo, ¿vendrá algún robot a limpiar aquí por mi salario?\n- Eso también es cierto... Bueno, adiós. Si Dios quiere, tal vez nos veamos de nuevo.\n- ¡Eres un bocazas! Claro que nos veremos, no vas a morir ahí.\n\nAsí que tomaron caminos separados. Antón tomó un vuelo hacia su pueblo natal. Su maleta con ruedas resonaba bajando las escaleras. Y Serguéi arrastró su carrito más lejos. No tenía nada por qué entristecerse, solo otra oficina vacía en la que tendría que limpiar el polvo."
 russiaflavor.2.a: "Pero últimamente estaban siendo demasiadas."
 russiaflavor.3.t: "ÚLTIMAS NOTICIAS"
 russiaflavor.3.d: "Hoy, muchos residentes se despertaron para encontrar una alerta inusual en sus teléfonos. Un nuevo mensaje de los Servicios Estatales marcado como URGENTE. Por supuesto, no todos habían oído hablar de la noticia aún, y no todos sabían sobre el ataque de las tropas de la Unión Europea.\n\nCuando se abrió la aplicación, se reprodujo un pequeño video que comenzaba con vistas de las ciudades y pueblos destruidos por los que marchaban los soldados del ejército europeo. Armados con la última tecnología, caminaban lentamente con el fondo de edificios destruidos y en llamas. Gradualmente, la grabación perdió sus colores, volviéndose en blanco y negro, y las siluetas se difuminaron, mientras los uniformes y armas cambiaban de apariencia. Al final, los soldados adoptaron su apariencia final. Soldados de la Wehrmacht marchando con el fondo de pueblos en llamas portando sus armas. A veces tenían trofeos en sus manos.\n\nLuego cambió la escena y se mostró al espectador imágenes de uno de los campos para \"refugiados\" ubicado en la zona eslava occidental de la UE. Personas delgadas y harapientas, agotadas por el hambre, se apiñaban detrás de alambre de púas, mientras guardias con uniformes modernos y sus rostros cubiertos con visores los observaban. Alguien comía chocolate desafiante frente a los hambrientos, y alguien simplemente examinaba su rifle con mirada vacía.\n\nEl video terminó con un breve mensaje del presidente Vladislav Súrkov, en el que llamaba al pueblo de la Federación de Rusia y a toda Europa a luchar contra el fascismo europeo. Al final de su discurso, el líder dijo \"¡La victoria será nuestra!\" tras lo cual apareció una pantalla negra con la misma inscripción escrita en fuente blanca. En esa misma pantalla, se invitaba al usuario a informarse más sobre la guerra o a participar en un evento cercano destinado a apoyar al ejército ruso."
 russiaflavor.3.a: "Ganaremos sin importar cuál sea la lucha."
 russiaflavor.4.t: "Era"
 russiaflavor.4.d: "Los tacones de sus zapatos negros resonaban claramente mientras un hombre solitario con un impermeable oscuro caminaba por el cementerio. En sus manos llevaba un ramo destinado a una persona querida. Dos hombres corpulentos vestidos de negro lo esperaban en la entrada, los líderes de otros países recientemente liberados lo aguardaban, y el pueblo de Rusia lo esperaba, pero ahora el asunto era más importante. Este cementerio siempre estaba en silencio, las tumbas bien cuidadas y ningún gamberro se acercaba aquí. Al recorrer con la mirada las muchas lápidas, el hombre vio una docena de destinos truncados. Algunos murieron por la guerra, otros por enfermedad, y algunos se quitaron la vida con alcohol, cigarrillos o algo peor. Sin embargo, buscaba con la mirada una lápida en particular y finalmente la encontró. Un hombre calvo, atractivo para su edad, con una pequeña sonrisa permanente y ojos amables, se mostraba en una lápida negra, congelado para siempre en esa pose. 1952-2022 fueron sus años de vida. El hombre del impermeable se arrodilló frente a la tumba y colocó humildemente el ramo. Las comisuras de su boca se movieron, pero trató de controlarse. Observando tristemente el retrato, con una mano ligera quitó una pequeña capa de polvo de la lápida y luego susurró: \"Lo logramos, Vova.\" Por un momento, le pareció que en el susurro de las hojas había una respuesta tranquila, pero tan segura, de una persona ya fallecida hace mucho tiempo. Quizás fue su imaginación. ¿O no? Ya no importaba tanto. Así pasó el hombre los siguientes diez minutos. Perdido en sus pensamientos. Luego se levantó y se dirigió hacia la salida.\n\nEl presidente de la Federación de Rusia aún tenía mucho trabajo por hacer. Sin embargo, mientras se iba, Súrkov pensaba en él, el hombre que, por designio del destino, terminó en la política. Y a quien él personalmente, y de hecho toda Rusia, estaban en deuda."
 russiaflavor.4.a: "Moriré, pero el Estado permanecerá."
 russiaflavor.5.t: "El Segundo Tribunal"
 russiaflavor.5.d: "En la sala donde se decidió el destino de la cúpula del régimen nazi hace casi un siglo, los nombres que rápidamente se convirtieron en objeto de odio de cada ciudadano soviético resuenan de nuevo en el aire. Los líderes de los regímenes de ultraderecha que recientemente sacudieron Europa: Francia, Alemania, Italia y decenas de funcionarios menos importantes involucrados en crímenes contra la humanidad están esposados, bajo la mirada de la comunidad mundial.\nA la izquierda hay un grupo de fiscales de los países de la OMD, encabezados por el Fiscal General del lado soviético. A la derecha están los representantes de los nuevos Gobiernos europeos que buscan desvincularse del pasado. En el centro están los acusados. Son llamados a declarar uno por uno. Algunos se niegan, otros con una mirada baja y vacía dan explicaciones monótonas, cuidadosamente verificadas con los materiales del caso y las declaraciones de los testigos, y algunos estallan en arrebatos de ira que solo confirman la posición de la acusación.\nLas pruebas son contundentes: represión masiva, limpieza étnica, propaganda supremacista, campos, tortura, colonias de reeducación para niños, reubicación forzada. Los fiscales muestran archivos y escalofriantes imágenes: pruebas de cuán rápido Europa volvió a sumergirse en la oscuridad cuando le dio la espalda a la humanidad.\nFuera de la sala, hay multitudes de civiles, reporteros y manifestantes retenidos por un cordón militar. Alguien exige la ejecución. Alguien llora. Alguien lo niega. Y por primera vez en años, alguien siente: la justicia es posible."
 russiaflavor.5.a: "La historia ha dado la vuelta."
 russiaflavor.6.t: "Juegos de guerra"
 russiaflavor.6.d: "La tripulación del submarino K-18 Karelia, que está en servicio de combate, ha estado en plena alerta desde los primeros minutos de la guerra. Sin embargo, a pesar de que la carnicería se reavivaba en Europa, se ordenó al submarino mantener un silencio absoluto, y todo este tiempo los submarinistas estuvieron en una agonizante espera, reposando su nave en el fondo del Mar del Norte.\nEl operador de radio freelance había estado escuchando la frecuencia asignada durante más de seis horas, en la que él y toda la tripulación debían recibir órdenes, sin embargo, hoy, como en muchos días anteriores, se mantuvo un silencio total en la radio. De repente, el siseo del éter vacío fue interrumpido por la transmisión del cifrado. Incluso antes de que el hombre sentado junto a la radio comprendiera completamente lo que había ocurrido, el mensaje ya había sido descifrado y transmitido al capitán.\nEn cuestión de minutos, el submarino nuclear rompió su letargo y comenzó a moverse. Tras alcanzar la velocidad necesaria, preparar el equipo, llegar al rumbo y profundidad requeridos, solo quedaba una cosa que dividiría el mundo en un \"antes\" y un \"después\".\n 3..... 2..... 1....."
 russiaflavor.6.a: "Comienzo."
 russiaflavor.7.t: "Lo conservó"
 russiaflavor.7.d: "Vitya, del pueblo de Dukat en Magadán, era un hombre sencillo: hacía un trabajo sencillo y llevaba una vida sencilla, a pesar del torbellino de acontecimientos históricos que lo rodeaban últimamente, aunque, por supuesto, incluso le llegaron noticias sobre la muerte de Vladímir Vólfovich Zhirinovski y el proceso de elección de un nuevo presidente ruso. Por ello, comenzó a ver los medios estatales para mantenerse informado sobre los cambios que podrían afectar su vida tranquila.\nPor eso hoy, después de un duro día de trabajo, se acercó a la nevera, dio un bocado y encendió la televisión, cambiando de canal con interés hasta que se detuvo en \"Pervyy\".\nEn la pantalla flotaba una inscripción con letras gigantes: \"ZHIRINOVSKI VIVE\" y una gran inscripción \"SLUTSKI\" con una más pequeña debajo: \"Candidato a la Presidencia de Rusia\". Junto a ella, no lo creerás, aparecía el propio Leonid Eduardovich Slutski. Su rostro amigable inspiraba confianza. Vitya se rió mientras la imagen cambiaba a una sala de despacho.\nEl propio Leonid Eduardovich entró en esta espaciosa oficina con un gran escritorio de roble, símbolos del PLDR en las paredes y dos banderas: la de Rusia y la del partido. Miró con interés un armario con los libros del escritorio de Vladímir Vólfovich, luego el escudo del PLDR, tras lo cual se sentó en la cabecera de la mesa, notando un cartel que decía: \"Vladímir Vólfovich Zhirinovski\". Su mirada se volvió pensativa y triste, pero sus pensamientos fueron interrumpidos por una joven secretaria que entró y colocó un nuevo cartel al lado: \"Leonid Eduardovich Slutski\", y tomó el antiguo con la pregunta: \"¿Debo retirarlo?\", a lo que el candidato presidencial respondió firme y claramente, agitando la mano en señal de advertencia.\nVitya no pudo evitar pensar en el legado del último líder. ¿Le gustaría que el legado de Zhirinovski siguiera vivo, o ya era hora de que el país cambiara de rumbo? Al ver el rostro decidido de Slutski, Vitya, del pueblo de Dukat en Magadán, no tenía dudas."
 russiaflavor.7.a: "\"No, consérvalo\"."
 russiaflavor.8.t: "Generalísimo"
 russiaflavor.8.d: "Víktor Vasílievich Zólotov se convirtió recientemente en el nuevo locum tenens del Kremlin. Con el tiempo, sus dependencias se le hicieron familiares. Para alivio del nuevo comandante en jefe, el sistema que había construido funcionaba como un reloj. Sin embargo, el comandante de la Rosgvárdia, y ahora indiscutible gobernante de Rusia, siempre había sido un hombre de acción, por lo que estaba cansado de pasar largas horas en la oficina. Pasear por el Kremlin siempre que tenía la oportunidad se convirtió en su norma.\nNo había nadie en uno de los vastos salones de mármol, lo único que llamaba la atención era un enorme retrato, del doble de la altura de un hombre, en el que se representaba a un apuesto abuelo en semiperfil, de pie contra un fondo tricolor. Vestía un uniforme cruzado con una cinta azul, y su pecho estaba decorado con numerosas medallas y órdenes. Por supuesto, Víktor Vasílievich sabía quién estaba retratado en esa pintura. Era el generalísimo del Imperio ruso, Aleksandr Vasílievich Suvórov, un comandante militar victorioso que no había perdido ni una sola batalla.\nEste encuentro inesperado hizo reflexionar al comandante de la Rosgvárdia. Ante todo, tenía más que un nombre en común con el invencible comandante del pasado. Ambos eran, ante todo, guardianes para sus soldados. Zólotov pensó con orgullo en el sistema que había construido en las tropas de la Rosgvárdia. Hacía todo lo posible y un poco más para asegurarse de que sus hombres siempre estuvieran vestidos, calzados, alimentados y listos para la batalla. Tal como lo hizo Suvórov en su tiempo. Ahora estaba dispuesto a hacer lo mismo por cada ciudadano ruso."
 russiaflavor.8.a: "Padre de los soldados."
 russiaflavor.9.t: "Líder"
 russiaflavor.9.d: "Víktor Vasílievich Zólotov se convirtió recientemente en el nuevo locum tenens del Kremlin. Con el tiempo, sus dependencias se le hicieron familiares. Para alivio del nuevo presidente, el sistema que estaba construyendo funcionaba como un reloj. Sin embargo, el comandante de la Rosgvárdia, y ahora indiscutible gobernante de Rusia, siempre ha sido un hombre de acción, por lo que estaba cansado de pasar largas horas en la oficina. Pasear por el Kremlin siempre que tenía la oportunidad se convirtió en su norma.\nNo había nadie en uno de los vastos salones de mármol, lo único que llamaba la atención era un enorme retrato, del doble de la altura de un hombre, del que un astuto anciano con entradas miraba al observador con un rostro impenetrable. Llevaba una chaqueta desabrochada y una camisa formal blanca, y el fondo era una pintura en acuarela azul claro como el cielo. \"Vladímir Vladimírovich\", recordó Zólotov. El último presidente de la Federación de Rusia antes de las posteriores reformas grandiosas.\nEste encuentro inesperado hizo reflexionar al comandante de la Rosgvárdia. Ante todo, recordemos el largo servicio que tuvo lugar bajo Vladímir Vladimírovich Putin, y cómo respondió a los desafíos actuales de la época. Ambos aceptaron el país en un estado de caos político y guerras terroristas, y devolvieron la paz y la estabilidad a sus ciudadanos, así como la confianza en su bienestar. Ambos tienen una larga experiencia en agencias de seguridad, y ambos entendieron que sin la ley es imposible asignar un deber a una persona. Dos líderes de un gran equipo llamado \"Rusia\"."
 russiaflavor.9.a: "Y siempre será así."
 russiaflavor.10.t: "La ira de Batyka"
 russiaflavor.10.d: "Eran exactamente las 17:46 en el reloj. Se estaba llevando a cabo una reunión del gabinete en el Kremlin, algo no increíble ni hasta entonces sin precedentes; bajo el presidente anterior, Dmitri Anatólievich Medvédev, en general, tales reuniones eran la norma, especialmente durante los períodos de guerra y posguerra. Sin embargo, había algo en esta reunión en particular que destacaba. Asistió personalmente el presidente Aleksandr Grigórievich Lukashenko y de forma remota los gobernadores de varias regiones de la Federación, lo cual es aún más inusual: esta reunión fue transmitida en vivo por varios medios estatales y plataformas de internet, sin pausas, interrupciones ni comentarios posteriores.\nLos ciudadanos recuerdan especialmente el fragmento del discurso que comenzó después de que Aleksandr Grigórievich leyera en voz alta, francamente, un informe no muy alentador de una de las regiones. Después de eso, se dirigió al gobernador responsable...\n\"...¿Y qué es esto? ¿Por qué la gente se queja conmigo? Tengo carpetas en mi escritorio con quejas sobre la situación, ¿lo sabes? ¿Cuáles son los problemas con los pagos? Nuestro país ganó la guerra, nuestros ciudadanos la ganaron. ¿Qué problemas puede haber? Les doy una semana, una semana, para arreglar este desastre, luego lo comprobaré personalmente. ¡Si algo sale mal, saldrán rápido de sus puestos! ¿Está claro?...\"\nEn el futuro, estos eventos se repitieron varias veces, a menudo terminando con una pequeña purga de personal en el terreno, para dejar claro que el control directo de las actividades de los empleados y funcionarios federales es parte del estilo de gestión de Lukashenko, tal como lo fue antes en Bielorrusia."
 russiaflavor.10.a: "¡Lukashenko, nuestro hombre!"
 russiaflavor.11.t: "Mucho trabajo"
 russiaflavor.11.d: "El ex capitán de policía Maksim Gorénkov estaba sentado en la oficina número 143 del antiguo edificio del Servicio Federal de Seguridad de Rusia en la región de Kírov, leyendo en diagonal el informe de su joven colega. Murmurando algunas gracias en voz baja, lo despidió para cerrar el caso. El infatigable hierro Félix lo miraba desde el retrato.\nEl mayor local del KGB sabía bien que hoy volvería a casa pasada la medianoche: la lucha de Rashkin contra el \"sistema de palo de las agencias de aplicación de la ley burguesas\" no cancelaba en absoluto los informes absorbentes. No menos deprimentes eran los establos de Augías en forma de archivos antiguos.\nSin embargo, había algo en su trabajo que despertaba en él una emoción casi infantil. Organizar a los graduados de derecho de ayer y a policías aleatorios, que fueron asignados aquí por su dedicación al Partido Comunista, en el servicio secreto del siglo XXI es tan difícil como fascinante. Definitivamente era esa emoción la que lo mantenía a flote. La experiencia del departamento forense también lo mantenía a flote, afortunadamente no fueron afectados por la reducción."
 russiaflavor.11.a: "Debería enviar a alguien por café..."
 russiaflavor.12.t: "Orden"
 russiaflavor.12.d: "Serguéi trabajó en el OMON durante casi diez años. Por la mañana, su compañía estaba estacionada en Tvérskaya. Les dieron una tarea por adelantado: impedir el paso, aislar a los coordinadores y trabajar duro. La sede lo dijo sin rodeos: \"Hemos estado indulgentes por demasiado tiempo, una orden desde lo más alto, no hay nada por encima.\" Serguéi asintió entonces.\nLa multitud se reunió rápidamente. Jóvenes, estudiantes, tipos marginales extraños. Carteles, banderas, canciones. Alguien gritaba consignas sobre Navalni, alguien leía la Constitución, convenientemente olvidando la parte donde se dice que los derechos de los ciudadanos pueden ser restringidos si es necesario para proteger el orden constitucional. Serguéi miraba desde detrás de su casco: y veía sobre todo niños engañados. Un Estado que sigue la corriente de la multitud pronto dejará de existir - ni en Occidente ni aquí se tolerará eso, y claramente no lo entendían. Suspiró - alguien tendrá que madurar muy pronto.\nLa orden llegó por el walkie-talkie. Hay un pogromo en la calle siguiente. A trabajar. Sin advertencias.\nSerguéi fue adelante. Había otros cerca. Sin agresión innecesaria, pero con precisión y claridad. Para reprimir, para evitar que los disturbios se extendieran. Las furgonetas policiales salían una tras otra. En el departamento se llevaba a cabo un flujo de interrogatorios y protocolos. No había \"manifestaciones\" - según los documentos, eran \"disturbios masivos\", y como algunos de los operativos que conocía le dijeron casualmente, quienes ayudaron a controlar la protesta desde dentro - la mayoría de los participantes recibirían una condena real por primera vez, empezando desde tres años.\nSerguéi no odiaba, no simpatizaba, y en general no tenía sentimientos especiales hacia los recién acusados. Simplemente hacía lo que tenía que hacer. Y sabía que si no era él, vendría otro. O todo se desmoronaría. Y una cosa le importaba - que su querida Moscú despertara en la mañana en silencio. Sin barricadas, sin caos. Y que los niños fueran a la escuela sin conocer palabras como \"porra\" y \"cárcel\", y sin llenar sus cabezas con todo tipo de tonterías. Al menos así."
 russiaflavor.12.a: "Dulces sueños, querido país."
 russiaflavor.13.t: "El Cuerpo Africano"
 russiaflavor.13.d: "Ya era de noche cuando, abriéndose paso entre los matorrales, un pequeño pero bien armado destacamento llegó al pueblo. Según el cuartel general, aquí se encontraba el punto de transbordo de los terroristas, lo que complicaba el trabajo de la Compañía en la región.\nA pesar de la hora avanzada, el pueblo estaba lleno de mujeres y niños, mezclados con hombres armados vestidos de camuflaje. Desde allí, no podían notar a los combatientes apostados en la selva.\nA la señal del comandante, el contramaestre levantó el lanzacohetes Bumblebee sobre su hombro, y un momento después, el resplandor del pueblo en llamas se sumó a la luz del atardecer que ya se desvanecía. Los civiles se dispersaron; los terroristas, disparando de vuelta, se acurrucaron en agujeros como hormigas cuyo hormiguero alguien había pisado accidentalmente, y Varyag y Altai dispararon para suprimir a quienes aún intentaban resistir.\nTras la breve batalla, el pueblo quedó desierto. Habiendo rodeado las casas restantes intactas y sin encontrar enemigos supervivientes, el destacamento se dirigió a su lugar de despliegue. No hubo bajas hoy, este día terminó, mañana habrá otro, y un pago generoso se abonará en la cuenta en una semana."
 russiaflavor.13.a: "¡El mejor trabajo del mundo!"
 russiaflavor.15.t: "Paseo por el malecón"
 russiaflavor.15.d: "La primavera en la cuna del Imperio, la gloriosa ciudad de San Petersburgo, era sombría, como solía serlo. Vientos fríos, lluvia y a veces nieve. Así que esta mañana no era diferente de las anteriores: la ciudad despertaba poco a poco, la carretera estaba ruidosa, una variedad de personas, desde jóvenes hasta ancianos, se levantaban y se apresuraban con sus asuntos. Esta era la vista de la ciudad desde el lado del Malecón de Petrogradskaya, que se encontraba cerca del Gran Nevka, un brazo del río Neva, sobre el cual se construyó San Petersburgo.\nSolo una pareja, marido y mujer, paseaba tranquilamente por el malecón, como si tuvieran todo el tiempo libre que quisieran. Aquí está la Escuela Naval Najímov, donde los cadetes ya se apresuran. Cerca hay un estacionamiento, donde un crucero militar ha anclado. Al notar su presencia, la pareja se detuvo, el hombre lo miró y pensó. Este barco tiene una historia complicada, porque fue con su despertar -con un disparo resonante hecho desde este barco- que comenzó la Historia, que duró casi un siglo...\nSus pensamientos, que duraron casi un minuto, fueron interrumpidos por una pregunta de su esposa: \"Georg, ¿está todo bien?\". El hombre asintió, relajándose un poco y tomando a su esposa del brazo: \"Ahora sí. Vamos\"."
 russiaflavor.15.a: "¿Duermes bien, crucero Aurora?"
 russiaflavor.16.t: "Hermandad del soldado"
 russiaflavor.16.d: "Tarde noche. Había ruido y sol en la espaciosa casa de dos pisos: el cielo estaba lavado por la lluvia de ayer, la barbacoa hervía, olía a humo y lilas. La larga mesa de madera bajo el toldo crujía con diferentes platos. Había siete personas en la mesa. Hace un par de años, estaban sentados en otra mesa, en un refugio cerca de Varsovia, compartiendo raciones, fumando su último cigarrillo en círculo y enviando mensajes con los números de teléfono de sus familias antes de salir. Por si acaso.\n\"¿Sigues en el Ministerio de Situaciones de Emergencia, Dimon?\" pregunta Zheka, el que ahora guía tours por Sajalín, con una barba de marinero.\n\"Sí\" asiente Dima. \"Pero ahora hay más papeles que incendios. Y escuché que te metiste en los negocios, ¿te hiciste empresario?\"\n\"Sí, fue por casualidad\" se ríe Zheka. \"Mi hermano tenía un puesto, y me propuso abrir uno segundo, pero contrataron vendedores allí. Captividad, un excomandante de pelotón, ahora médico de rehabilitación militar, saca de su mochila un gato de juguete tejido con un chaleco antibalas\". \"Tengo pacientes que tejen. La psicoterapia es así. Aquí tienes un trofeo\". Todos se ríen. El gato se va solo. Luego sirvieron las copas, brindis - sin lágrimas, pero con calidez.\n\"Algunas cosas no cambian\", dice el hombre en la cabecera de la mesa. \"Como eran, así son: un solo equipo\".\n\"Bueno, Tasman, ¿qué tal? ¿Es duro allí? Supongo que hay muchos papeles\", preguntó de forma directa Vasek, su criador de drones. \"Como es\", respondió Gabriel, \"a veces es más duro que en una trinchera, ya sabes\".\nLos ponis chocan las copas. Se ríen. La vida sigue, cada uno por su camino. Pero una vez al año, cuando se reúnen, lo comparten de nuevo."
 russiaflavor.16.a: "No fue hace tanto tiempo."
 russiaflavor.17.t: "Gran inauguración"
 russiaflavor.17.d: "Una tarde primaveral envolvía Moscú con una suave luz dorada cuando los primeros invitados comenzaron a reunirse en Petrovka. La fachada del nuevo Museo de Arte y Diseño, ubicado en una antigua mansión del siglo XIX, estaba decorada con luces, banderas e instalaciones de vidrio y metal creadas por diseñadores rusos contemporáneos.\nUna alfombra en la entrada principal guiaba a los invitados hacia un amplio salón con un techo alto e instalaciones luminosas que imitaban el amanecer sobre Moscú. Entre los primeros visitantes se encontraban artistas famosos, diseñadores, arquitectos, propietarios de galerías, estudiantes de universidades creativas y representantes de la administración de la ciudad. Los fotógrafos disparaban sus cámaras, capturando las sonrisas y la sorpresa de los asistentes.\nLa parte principal fue inaugurada personalmente por Su Majestad Imperial. Rostislav Románov se situó bajo una cúpula luminosa diseñada por graduados de la Escuela Británica de Diseño y habló con una leve sonrisa sobre la misión del nuevo espacio:\n\"Nuestro museo no es solo un depósito de arte. Es un organismo vivo que cambiará, inspirará, provocará y unirá. Aquí se encuentran la pintura y el diseño industrial, los textiles y la arquitectura, la gráfica y el arte digital. Queremos que cada visitante se sienta parte del proceso creativo\".\nTras la intervención, siguió una apertura simbólica: las enormes puertas del primer salón se abrieron lentamente y los invitados entraron en un espacio donde las exposiciones no solo estaban en las paredes, sino también en el aire, en el suelo, en proyecciones e incluso en el sonido. En el primer salón se presentaron obras de los maestros de la vanguardia rusa y sus interpretaciones modernas. Cerca, había proyectos de diseño futurista de jóvenes autores, incluidos los propios proyectos de Rostislav, que recibieron especial atención."
 russiaflavor.17.a: "Siempre atentos."
 russiaflavor.18.t: "Mano a mano"
 russiaflavor.18.d: "Los pájaros cantaban, las hojas susurraban. Era una hermosa tarde de viernes. El sol de verano se reflejaba juguetonamente en la superficie de las aguas del lago Ladoga. En la isla de Valaam, en un pequeño quiosco con vistas a este lago, dos hombres mayores hablaban tranquilamente sobre algo propio. La atmósfera pacífica a su alrededor tenía un efecto positivo en el tono de la conversación, pero no la hacía menos difícil ni seria. La conversación llevaba un tiempo y era bastante complicada. Los argumentos eran diferentes.\n\"Aleksandr Grigórievich, lo entiendes. Has tenido que lidiar con esto recientemente. Tú, tu república, no quedarán solos; es hora de impulsar el proyecto, de lo contrario podríamos llegar tarde. Piensa en los ciudadanos\".\n\"Vova, entiendo, tú también entiendes. Haremos lo que sugieres, hemos estado trabajando en esto durante dos mil años, pero necesitamos tiempo. Terminaremos pronto\".\n\"Es importante que sea «pronto», no «más tarde». La situación está cambiando\".\n\"Bueno, sho Vova, ¿es hora?\""
 russiaflavor.18.a: "\"Es hora, Aleksandr Grigórievich, es hora\"."
 russiaflavor.19.t: "Una visita inesperada"
 russiaflavor.19.d: "El salario en el servicio de alguaciles nunca ha sido muy alto, el Estado intentaba compensar esto proporcionando garantías sociales, jubilación anticipada y otros beneficios vitales. Sin embargo, Lidiya Vyacheslavovna, que ocupaba un puesto de gestión intermedia, prefería compensar el vacío en su cartera con la ayuda de una \"cooperación\" no del todo legal con los ciudadanos. Uno u otro deudor siempre podía \"perderse\" en el engorroso sistema burocrático, y sus cuentas de repente quedaban fuera de custodia, y Lidia, a su vez, podía permitirse reducir el tiempo necesario para pagar una hipoteca tan costosa.\nPor eso su subordinado de confianza entró hoy en su oficina con un sobre lleno de dinero en efectivo de empresarios fracasados, morosos en la manutención de sus hijos y otros clientes del FSSP. Lidiya Vyacheslavovna, anticipando el próximo recálculo de la tan codiciada moneda extranjera, no prestó atención al rostro gris y completamente desprovisto del antiguo entusiasmo de su empleado. Tras escuchar \"Son sobornos de los deudores, por un monto de cincuenta mil rublos\", a lo que Lidia respondió habitualmente \"Sí, lo recuerdo\", la puerta de la oficina se abrió y varios agentes de seguridad entraron.\nLos billetes marcados, esparcidos descuidadamente sobre la mesa, fueron recogidos y examinados por un operativo, y los testigos invitados con antelación de la facultad de derecho más cercana observaron atentamente cómo se colocaban las esposas a la ex empleada del FSSP."
 russiaflavor.19.a: "Por más que tuerzas la cuerda, igual te quedarás atrapado en el látigo."
 russiaflavor.20.t: "Amistad de los Pueblos"
 russiaflavor.20.d: "Era una calurosa mañana de verano. En Moscú, que nunca duerme, se escuchaba el zumbido de los coches y numerosos proyectos de construcción. Un carruaje silbó al detenerse en el Depósito Yúzhnoye, de donde Ahmed bajó cargado con dos bolsas de pertenencias personales. Una medalla, que le había entregado el general bajo cuyo mando servía su unidad, brillaba agradablemente en su pecho.\nSu deber con su nueva patria había sido cumplido; ahora solo quedaba administrar sabiamente el dinero que había ganado. Su esposa, Amina, ya lo esperaba en casa. Sin embargo, suspiró profundamente: mudarse al espacio habitacional que deseaba requeriría un poco más de dinero del que tenía, lo que significaba que tendría que volver a la fábrica.\nAhmed decidió hacer una parada en uno de los muchos centros comerciales de Moscú para comprarle a Amina algún bonito recuerdo. Sin embargo, al entrar, se topó con un joven. Entre ellos surgió una discusión que rápidamente se convirtió en una conversación amistosa. Resultó ser un estudiante de primer año llamado Iván, y fue él quien le contó cuánto había cambiado Moscú mientras Ahmed estaba ausente; al parecer, en una de las universidades locales, concretamente en la Universidad Rusa de la Amistad de los Pueblos Patrice Lumumba, se había abierto un curso especial por correspondencia para veteranos que habían adquirido la ciudadanía rusa a través del servicio militar. Ahmed agradeció a Vanya y regresó con su esposa con una idea clara de cómo seguir adelante."
 russiaflavor.20.a: "¡Wow!"
 russiaflavor.21.t: "En la colmena de Ziugánov"
 russiaflavor.21.d: "En las afueras de un pequeño pueblo en la región de Orel, donde el aire aún huele a miel de tilo, y en lugar de bocinas de coches solo se escucha el zumbido de las alas de las abejas, se reunieron temprano por la mañana unas dos docenas de escolares. Hoy tienen una clase poco común: una lección práctica en la colmena. Y la imparte un invitado especial: Guennadi Andréyevich Ziugánov, presidente del Comité Central del PCUS y, como resultó, un apasionado apicultor que visitó su ciudad natal hoy. Fue con esta ocasión que se organizó una lección práctica en la colmena para estudiantes de varias escuelas de Orel.\n\n\"La abeja es un símbolo de diligencia, orden y ayuda mutua\", explicó pacientemente Guennadi Andréyevich mientras se ponía un traje protector blanco como la nieve. \"Y todos valoran el resultado de su trabajo. Bueno, ¿qué té es sin buena miel, eh?\"\n\nLos niños están encantados con un invitado así. Algunos sostienen un marco de panal en sus manos por primera vez, otros aprenden a distinguir a la reina de las obreras, y un niño incluso pregunta: \"¿Puedo domesticar una abeja?\"\n\n\"No es necesario domesticarla\" responde Guennadi Andréyevich con una sonrisa. \"Hay que entender su lógica. La abeja percibe el estado de ánimo. Acércate con amabilidad y no picará\".\n\nEntre clase y clase, el líder comunista les ofreció té de tilo con pan y miel. Todo es suyo, de la colmena. Cuenta cómo su abuelo Mijaíl cuidaba las colmenas y cómo la miel ayudaba a combatir los resfriados y la desazón en los años difíciles. \"No es solo miel\", continúa el presidente, \"es educación. Si un niño ha trabajado con abejas, ya no será perezoso. Entenderá que todos en la colmena son importantes\", dice Guennadi Andréyevich mientras acompaña a los felices niños de regreso al autobús."
 russiaflavor.21.a: "¡Las cosas buenas llegan a quienes trabajan!"
 russiaflavor.22.t: "No hay ateos en las trincheras"
 russiaflavor.22.d: "Después de que San Jorge el Victorioso fuera declarado el santo patrón de las fuerzas armadas rusas, el uso diario de las cintas de San Jorge en el entorno militar se volvió gradualmente una moda. Los soldados en guerra recurren a este santo para que los proteja en la batalla, para protegerlos de la muerte. Circulan rumores sobre casos en los que una cinta así salvó la vida de un militar de una u otra manera.\nJunto con la cantidad de personas que descubren la fe ortodoxa por sí mismas en el campo de batalla, también se empieza a conmemorar los nombres de los santos, el Hijo, el Padre y el Espíritu Santo. Muchos rezan a la Madre de Dios para alejar la muerte de ellos, y la presencia de representantes del clero que acompañan a las unidades militares entre batallas se ha convertido en la norma; tales manifestaciones de piedad en las fuerzas armadas no solo ocurren, sino que también son fomentadas por el mando. La imagen colectiva de todo esto fue la cinta de San Jorge naranja y negra, no solo como símbolo de valor militar y patriotismo, sino también como símbolo de protección del santo patrón del ejército ruso."
 russiaflavor.22.a: "Dios está con nosotros."
 russiaflavor.23.t: "¡Bienvenido de vuelta!"
 russiaflavor.23.d: "Un teniente coronel retirado y un ingeniero militar con doctorado, Iván Mijáilovich, como siempre sucedía por las tardes, fumaba un cigarrillo y se sentaba en un banco en su zona suburbana, mirando a lo lejos y recordando los días pasados. Sus recuerdos inevitablemente volvían al día en que dejó su servicio y finalmente se retiró. Eso fue hace más de diez años. En ese momento, Vladímir Vladímirovich parecía estar en la flor de su vida, el país se estaba reconstruyendo activamente después de los problemas de los noventa, y al mismo tiempo, su escudo y espada, sus fuerzas armadas, estaban siendo restauradas.\nLuego, en el año dos mil siete, el coronel Anatoli Eduárdovich Serdiukov fue nombrado Ministro de Defensa, y algún tiempo después comenzó una importante reestructuración de las fuerzas armadas. La perestroika fue, de hecho, como la que tuvo lugar en la Unión Soviética, e Iván Mijáilovich fue uno de los que protestó enérgicamente contra una serie de medidas que Anatoli Eduárdovich estaba tomando como parte de su política de optimización y \"modernización\" de las fuerzas armadas. Sin embargo, su posición fue ignorada, por lo que renunció, no queriendo entrar en conflicto con el alto mando, y desde entonces ha trabajado como profesor en la academia militar.\nLo que Iván Mijáilovich no esperaba fue una llamada vespertina, casi de la noche a la mañana, a su teléfono personal. Lo que fue aún más sorprendente fue que la voz al teléfono se presentó como un representante del Ministerio de Defensa y, después de aclarar si estaba hablando con la persona correcta, inmediatamente fue al grano, ofreciendo al anciano ingeniero un puesto como consultor experto dentro de las fuerzas armadas. Como se supo más tarde, su modernización había estado en marcha durante algún tiempo, incluyendo una revisión completa de reformas anteriores, y parte del personal de Serdiukov se estaba retirando, por lo que el departamento necesitaba urgentemente personal cualificado."
 russiaflavor.23.a: "Por supuesto, aceptó."
 russiaflavor.24.t: "¡Oh, manzana!"
 russiaflavor.24.d: "Al mediodía, la capital de Rusia, la gloriosa ciudad de Moscú, bullía de vida como siempre: trece millones de personas vivían y trabajaban. En todos los aspectos y dimensiones, era un día absolutamente normal. Para todos, excepto para los reunidos en la plaza Ganetski, cerca de uno de los cruces hacia el territorio del metro de Moscú. Lo que estaba sucediendo se parecía a una especie de manifestación; de hecho, lo era. Banderas rojas y carteles eran visibles aquí y allá, y alguien hablaba con un megáfono.\nCuando los agentes de policía llegaron al lugar para averiguar las razones de lo que estaba sucediendo, resultó que el problema que atrajo la atención de los ciudadanos reunidos allí era el cambio de nombre de la estación de metro Voikovskaia, que lleva el nombre del revolucionario Piotr Lazárevich Voikov, a estación de metro Nikolaevskaia. La policía u otros representantes del Gobierno no se opusieron a ninguna declaración sobre este tema, pero tampoco obtuvieron resultados especiales, y de todas las instancias donde los descontentos con tal decisión presentaron quejas, llegó una respuesta, cuya esencia era que esta decisión fue tomada por los Gobiernos locales, en relación con las quejas masivas de los ciudadanos.\nDurante algún tiempo, algunos de los ciudadanos prosoviéticos expresaron su descontento, cuya esencia era básicamente que el Gobierno en esta situación estaba complaciendo los sentimientos de radicales y extremistas, así como el hecho de que tales nombres son, después de todo, parte de la historia de Rusia, cuya destrucción de la unidad es inaceptable."
 russiaflavor.24.a: "¿A dónde vas?"
 russiaflavor.25.t: "Historia compartida"
 russiaflavor.25.d: "La sociedad rusa ha llevado durante mucho tiempo las cicatrices del pasado. De vez en cuando, estallaban polémicas entre partidarios del Imperio, la Unión o las instituciones democráticas, todo ello acompañado de acusaciones mutuas de violar diversas leyes. Por otro lado, muchos otros ciudadanos no estaban en absoluto interesados en la historia y los problemas de su país, prefiriendo una vida tranquila y pacífica.\nTodo esto ha desaparecido. Personas de muy diferentes cosmovisiones, religiones, naciones y situaciones financieras están luchando codo con codo, hombro con hombro, por algo que todos tienen en común: por una patria común, sin importar lo que fue en el pasado o lo que será en el futuro. Estas diferencias probablemente no desaparecerán, pero una cosa es segura. Todas estas personas finalmente se escucharon. Y ahora tienen un enemigo común."
 russiaflavor.25.a: "Unidad forjada en el fuego."
 russiaflavor.26.t: "Práctica"
 russiaflavor.26.d: "Con el resurgimiento de la doctrina marxista-leninista, algunos también se preguntaron si seguiría siendo coto de teóricos, a pesar de los mejores esfuerzos del partido y de los ciudadanos que se preocupaban por su causa. Con el estallido de una gran guerra en el continente europeo, quedó claro que no se trataba solo de una teoría, sino de una Idea por la que la gente sacrifica sus vidas en el campo de batalla, sin escatimarse, como ocurrió durante la Gran Guerra Patria. La idea de la emancipación, la liberación de la mayoría oprimida de los opresores de la minoría.\nY esta Idea ha encontrado su expresión directa no solo en la teoría, sino también en la práctica. Poco después del estallido de las hostilidades, el trabajo de propaganda se convirtió en la norma, principalmente por iniciativa de militares individuales y comandantes de bajo nivel, lo que rápidamente encontró el aliento del alto mando, ya que todo soldado debe comprender que no solo defiende su hogar natal y la patria soviética, sino también la felicidad humana universal. Y para esto, Europa debe volver a saborear la derrota."
 russiaflavor.26.a: "¡Enseñémosle a esos perros de la OTAN como se lucha!"
 russiaflavor.27.t: "Día de registro"
 russiaflavor.27.d: "Moscú. Noche. La mesa en el luminoso apartamento de dos habitaciones en Konkovo estaba abarrotada, y la lluvia golpeaba la ventana entreabierta, pero su sonido se perdía en el estruendo de las festividades. Un grupo de jóvenes, ninguno de ellos mayor de treinta años, estaba sentado a la mesa, discutiendo alegremente sus asuntos cotidianos. A pesar del alboroto en la mesa, causaban una impresión bastante impresionante. Pronto pasaron a discutir un tema importante que interesaba a todos los presentes. Vitya, o, como a veces se le llama, Vitali Sergeevich, comenzó a hablar sobre este tema:\n\"Pronto sabremos cómo va nuestro negocio. La persona responsable debería informarnos sobre la decisión hoy o mañana\". En respuesta, Sanek, que era prácticamente un chico de veinte años, sonrió y preguntó:\n\"Vamos, vamos, ya sabes cómo está la cosa ahora mismo. No nos darán el visto bueno, especialmente porque somos una especie de oposición\". Después de cierta confusión por parte de Vitka, Dimka, la única persona con un trabajo en esta empresa, intervino en el diálogo:\n\"Si no nos barrieron por las acciones antes, ¿por qué estarían en contra? Además, defendemos cosas útiles. Estilo de vida saludable, educación cultural, toda esa mierda\". Vitek no tuvo tiempo de responder a sus amigos, ya que sonó su teléfono. Rápidamente cogió el teléfono y lo puso en altavoz. Era su amigo mutuo de la Administración, Kirill Alekséyevich Averin.\n\"¡Buenas noches! No puedo hablar mucho tiempo, Vitali Sergeevich, es así. Se les da el visto bueno, presenten las solicitudes necesarias y serán registrados, podrán llevar a cabo su negocio completamente dentro del marco de la ley, sin embargo, hay varias condiciones, las enviaré en un correo electrónico separado a su correo, el archivo «directrices», estúdienlo. Que tengan un buen día\".\nPrácticamente nadie escuchó la segunda parte de la llamada, la alegría general se extendió por la habitación como una ola tumultuosa, y en algún lugar de una oficina oscura iluminada solo por una lámpara de escritorio, un hombre mayor sonrió, regocijándose casi sinceramente por el éxito de sus empleados."
 russiaflavor.27.a: "Un mensaje sin leer."
 russiaflavor.28.t: "Refugiado"
 russiaflavor.28.d: "-...Reporte especial desde Petropávlovsk-Kamchatski por María Antonova.\n\nLa imagen del canal Rossiya 24 cambió abruptamente: los escarpados paisajes de Kamchatka aparecieron en vez del habitual y acogedor estudio azul. Se podía ver una gran tienda de campaña detrás de una delgada chica pelinegra que portaba una chaqueta blanca con el logo del canal de televisión. A la entrada estaban aparcados docenas de camiones en los que estaban escritos \"AYUDA HUMANITARIA\" repletos de una gran variedad de bienes, que iban desde comida y medicinas hasta juguetes y ropa de abrigo. La chica inspiró hondo y empezó el reporte. Cientos de ciudadanos americanos se encuentran ahora en campamentos temporales organizados por el Gobierno ruso bajo el liderazgo personal de Mijaíl Mishustin. Muchos de ellos lo dejaron todo atrás: dinero, bienes, pero ninguno de ellos abandonaron sus mascotas. La cámara enfocó a un gato pelirrojo que estaba en las manos de una niña de 9 años que llevaba una gorra con la inscripción \"USA\".\n\nLos refugiados de los horrores de la guerra civil huyeron de diferentes estados, desde Nuevo México hasta Washington. Muchos recuerdan con estremecimientos los primeros días del conflicto, cuando la gente fue abandonada en el caos, sin contacto con sus seres queridos. La imagen cambió de nuevo, enfocando ahora a un estadounidense moreno llevando una gorra con una bandera rusa y una chaqueta roja oscura. Un nombre apareció en la esquina de la pantalla: John Titor.\n\n¡Dios, esos rojos son todos unos psicópatas! ¡Esos bastardos se robaron mi computadora y mataron a mi vecino por negarse a darles su rifle! Como resultado de esto, me vi obligado a huir de California, ya sea al este, hacia los federales, pero para llegar allí tendría que haber cruzado una zona anárquica y dudo que podría salir vivo de allí, o zarpar hacia Rossija. Al menos se hablar ruso - ¡Intenté ligarme a minitas rusas por internet, jaja! Está claro que esto es más frío que Los Ángeles, pero también tiene su propio encanto..."
 russiaflavor.28.a: "El fuego asciende."
 russiaflavor.29.t: "BLOQUEADO"
 russiaflavor.29.d: "Roskomnadzor ha impuesto restricciones al uso de Twitter, Facebook y Reddit en Rusia, citando la difusión de desinformación sobre la pandemia del coronavirus. La decisión fue tomada en virtud de la ley \"Sobre la Información, Tecnologías de la Información y Protección de la Información\", que permite bloquear páginas que violen las leyes rusas. La agencia declaró que las redes sociales no han borrado el contenido prohibido, a pesar de las repetidas advertencias. Sumado a esto, de acuerdo al ministerio, el funcionamiento de servicios como YouTube, Instagram y Wikipedia se han ralentizado y los usuarios afirman que son incapaces de acceder a las páginas y redes sociales de la oposición.\n\nFuerzas gubernamentales, incluyendo expertos y diputados de la Duma Estatal, apoyaron el bloqueo, llamándolo como una medida necesaria para proteger a los ciudadanos de la desinformación. Valentina Matvienko, presidenta del Consejo de la Federación de Rusia afirmó que \"Las plataformas occidentales han estado ignorando la legislación rusa por años\" y el diputado Vitaly Milonov calificó la decisión como una \"respuesta adecuada contra la agresión informativa\".\n\nLa oposición y organizaciones de derechos humanos criticaron la decisión de las autoridades. Representantes de Alexéi Navalni tacharon el bloqueo como una forma de \"censurar y aislar la sociedad\" y la asociación Memorial afirmó que suponía una violación al derecho a la información. Representantes de Google y META ya han prometido \"solucionar los problemas de acceso lo antes posible\", pero no está claro cuanto tiempo pasará.\n\nAunque esas redes sociales no eran muy populares entre los usuario rusos, algunos temen que las restricciones en internet son otra ronda de censura en línea encaminada hacia la creación de un \"internet soberano\"."
 russiaflavor.29.a: "Si te soy sincero, me alegro de que hayan bloqueado Reddit..."
 russiaflavor.30.t: "Banya ruso"
 russiaflavor.30.d: "Recientemente, un video se ha difundido en línea mostrando al propio jefe de Rusia, Vladímir Vólfovich Zhirinovski, tomando tratamientos de agua con compañeros de partido en uno de los baños en los suburbios de Moscú. El video es un clip de una casa de baños del partido mezclado con discursos de un Zhirinovski sudoroso.\n\n\"Aquí está Europa. ¡Es un lugar asqueroso! Recuerden la Edad Media. Todos estos jactanciosos europeos ni siquiera iban al río a lavarse, andaban sucios durante meses, incluso los condes, ¡y luego llegó la peste y un tercio de Europa desapareció! Y ahora miren a Rusia: nosotros no tuvimos eso. Porque nuestro pueblo ruso ha estado acostumbrado a la limpieza desde la infancia, a ir a la sauna. ¡Una gran cosa! La casa de baños\", Zhirinovski se aclaró la garganta de una manera familiar, luego se secó el sudor y se ajustó la gorra con la inscripción «zar», \"la casa de baños es un gran invento que pasó naturalmente de la primera Roma a la segunda, y de la segunda a la tercera, ¡a Moscú! Pero eso no es lo que da miedo. Lo que da miedo es que esta inmundicia todavía está en Europa, con un nuevo disfraz. Todos sus desfiles, mentiras, calumnias, todo es porque tienen un alma negra. ¡Y nuestra alma es pura!\"\n\nHabiendo terminado su discurso, Zhirinovski miró a la cámara de nuevo, después de lo cual se dio la vuelta y gritó:\n\n\"¡Safónov, perro! ¿Quién está volando? Dame la escoba y acuéstate, te voy a dar ahora...\" Luego hay tomas de Vladímir Vólfovich dando golpes poderosos y heroicos con una escoba en la espalda de sus compañeros de partido, condenándolos con palabras de apoyo y conjurándolos a \"glorificar a Rusia tanto en la casa de baños como en el frente\". El video termina con un baño conjunto en la piscina, con el Líder de Rusia a la cabeza del desfile.\n\nComo se supo más tarde, el video fue creado como parte de un nuevo programa gubernamental para apoyar la recuperación social, y la idea de tal compañía de relaciones públicas, por supuesto, pertenecía al propio Zhirinovski. El video ha ganado una inmensa popularidad en YouTube, y a raíz de su éxito, los medios de comunicación informan de un resurgimiento de la tradición de bañarse en Rusia."
 russiaflavor.30.a: "¿Una sauna con Zhirinovski? ¡Me apunto!"
 russiaflavor.31.t: "Zhirinovski la película"
 russiaflavor.31.d: "El fallecimiento de Vladímir Vólfovich Zhirinovski ha dejado, sin duda, una huella imborrable en la psique colectiva del pueblo ruso. Un visionario, un genio, un patriota: estos epítetos describen acertadamente la forma en que el pueblo veía a su líder supremo. Es crucial preservar la memoria de este hombre extraordinario para las futuras generaciones de la Rusia imperial. En consecuencia, el Gobierno ruso, en colaboración con el Ministerio de Cultura, ha apoyado el lanzamiento de la película \"Zhirinovski. Despegue\". La película es un relato biográfico del ascenso político de Zhirinovski, sus triunfos iniciales, la formación de su partido, su declive en la década de 2000, su victoria triunfal en las elecciones de 2022 y las subsiguientes transformaciones del país bajo su estricto liderazgo. Al final de la película, el propio Zhirinovski se dirige a la audiencia, instándolos a apreciar y preservar Rusia de la misma manera que lo hicieron nuestros ilustres antepasados.\n\nAunque los Gobiernos neobolcheviques occidentales ya han declarado la película como un \"manifiesto del fascismo\", se ha convertido en un verdadero éxito en Rusia, convirtiéndose en un tesoro nacional que será revisado de generación en generación y mostrado en las lecciones escolares. Los críticos han destacado la buena actuación, la precisa caracterización de los personajes, una maravillosa banda sonora y la acertada agenda patriótica."
 russiaflavor.31.a: "¡Una gran película sobre un gran hombre!"
 russiaflavor.32.t: "El viejo orden ha vuelto"
 russiaflavor.32.d: "Ha pasado un mes desde el asesinato del primer canciller del revivido Imperio ruso, Konstantín Zatulin. Artiom caminaba por el Malecón del Palacio en San Petersburgo, no lejos del Palacio de Invierno.\nFrente al Palacio de Invierno, se estaba llevando a cabo una manifestación no autorizada de partidarios de la república; al frente de la manifestación había una fila de soldados con AK-12 listos para disparar, y detrás de los soldados se encontraba un oficial en un APC-80 con un megáfono en sus manos.\nArtem se sentó en la valla junto al malecón y sacó un cigarrillo con un encendedor, observando cómo se desarrollaban los acontecimientos. Encendió un cigarrillo, y mientras tanto el oficial comenzó a hablar por un megáfono:\n\"¡Dispersaos, súbditos del zar! ¡Vuestros eslóganes antirrusos son inapropiados hoy!\"\nLa reunión estalló en indignación, la multitud comenzó a dispersarse alrededor de los soldados, pero el oficial no dudó y agitó su mano derecha hacia arriba, cerrándola en un puño.\nLos soldados levantaron sus AK-12 con la boca hacia arriba y dispararon un solo tiro.\nLos manifestantes se dispersaron, y uno incluso saltó la valla del malecón y cayó al agua.\nArtem terminó su cigarrillo y tiró la colilla, diciéndose a sí mismo en el camino..."
 russiaflavor.32.a: "¡Nuestros liberales no son pequeños rusos, huirán al menor signo de peligro!"
 russiaflavor.33.t: "Héroes del frente"
 russiaflavor.33.d: "Vladislav y Dmitri eran soldados sencillos pero probados por el tiempo, originarios de San Petersburgo, pero se convirtieron en héroes del nuevo Imperio ruso por su participación en la guerra en el frente húngaro. Ambos recibieron cartas de la capital imperial con el sello oficial de la cancillería.\n\"¡Mira, Vlad, lo que me enviaron de San Petersburgo!\"\n\"Sí, yo también recibí una carta de nuestra gente aquí. Abramos entonces, ¿por qué demorarnos, y así nadie escribe una mierda?\"\nDmitri y Vlad comenzaron a abrir sus cartas y a leérselas el uno al otro. Fueron invitados a San Petersburgo a puestos locales de jefes de distrito, a Dmitry se le ofreció convertirse en el jefe del distrito de Petrogradsky, y a Vlad del distrito Central.\n\"¡Mierda... Quieren nombrarnos militares para puestos locales\", dijo Dmitri.\nVladislav respondió..."
 russiaflavor.33.a: "\"¡La estratocracia de Su Eminencia Krasnoselski!\""
 russiaflavor.34.t: "La unidad de la corona"
 russiaflavor.34.d: "Iván estaba sentado frente a su ordenador en su habitación de la residencia y hojeaba el feed de noticias de RIA en Telegram. Se encontró con una noticia bastante interesante con un vídeo adjunto del congreso de la Unión Militar General Rusa.\n\"Vadim Krasnoselski anunció la entrada de la Unión del 17 de octubre y la Unión Nacional Rusa en la Unión Militar General Rusa en beneficio del Imperio y de nuestro zar\".\nIván incluyó un vídeo con Krasnoselski. Su Eminencia estaba en el podio con su uniforme cerca del micrófono y dijo: Unión Militar Rusa\n\"Yo, como canciller del Imperio ruso y jefe de la Unión Militar General Rusa, anuncio que hemos llegado a un acuerdo de unificación, que implica la entrada de la Unión del 17 de octubre y la Unión Nacional Rusa en la Unión Militar General Rusa.\" Estallé en aplausos, y a su sonido, Krasnoselski continuó su discurso hasta el final.\n\"¡Este paso se dio en beneficio de nuestro Imperio renacido y en nombre de nuestro zar, nuestros Románov! ¡Cualquiera que quiera dejar sus antiguas organizaciones puede hacerlo con seguridad y no unirse a nosotros, y cualquiera que quiera unirse a la ROC tendrá que prestar juramento de lealtad al Imperio y al zar!\"\nEl vídeo terminó con continuos aplausos de la audiencia. Iván se crujió un poco los huesos de los dedos y se dijo a sí mismo..."
 russiaflavor.34.a: "Qué giro, aunque esperado."
 russiaflavor.35.t: "Maximalismo juvenil"
 russiaflavor.35.d: "\"¡Chicos, lo que está pasando en Rashka es un completo desastre! ¡Pynya se aferra de nuevo al poder por cualquier medio!\" Julia, una estudiante de octavo grado, vestida con ropa de invierno cálida y cara, hizo una mueca frente a la cámara frontal durante una transmisión en vivo en una de las redes sociales. Solo había 5 personas en su transmisión, y lo más probable es que fueran sus compañeros de clase, pero esto no le impidió continuar su ardiente protesta contra las acciones de las autoridades. La semana pasada, el líder de la oposición Navalni fue arrestado, lo que provocó una fuerte reacción de la generación más joven. Tan violenta que ahora están saliendo a las calles de sus ciudades para \"resistir el régimen tiránico\". Al menos, Julia cree en ello, después de haber visto las investigaciones de la Fundación Anticorrupción y otras figuras liberales.\n\n\"¡Debemos restaurar la justicia, que nos fue arrebatada por este maldito régimen! Estamos obligados a...\"\nDurante otro llamamiento populista, Yulia cayó al asfalto con un chillido después de un empujón accidental de los empleados de los servicios especiales de la Federación de Rusia. Su teléfono se hizo añicos e inmediatamente se desconectó junto con la transmisión en vivo. La bufanda de Yulia estaba ligeramente rasgada y llena de aguanieve de enero, y la nariz de la joven opositora se puso escarlata por una colisión con el asfalto. Yulia miró la razón de su caída con disgusto, y sus ojos comenzaron a llorar de dolor y resentimiento."
 russiaflavor.35.a: "Fue su última transmisión."
 russiaflavor.36.t: "La clave del éxito"
 russiaflavor.36.d: "María salió de su casa a las 7:30. Tarda una hora y media en llegar al trabajo, y el turno comienza a las 10:00. ¿Por qué salió tan temprano? No, no para trabajar horas extras, sino para tener tiempo de desayunar. María no sabía cocinar, y comer productos semielaborados al comienzo de la jornada laboral no era la mejor idea, así que solía desayunar en el comedor de la oficina. Sí, solo había gachas, compota y pan, pero no había nada que hacer. No habría tenido tiempo de recoger nada entre transbordos, y no hay nada en su casa más que recogidas del mercado en línea. O mejor dicho, no lo había.\nAl doblar la esquina de la casa, María notó un nuevo letrero con el rabillo del ojo, ligeramente iluminado por una luz naranja-blanca. Se detuvo y se dio la vuelta. Inesperadamente, ahora había una cafetería en la esquina de la casa, que, con un letrero de neón, saludaba a los clientes con la inscripción: \"¡Estamos abiertos!\". María se quedó desconcertada. ¿Se había descubierto algo que valiera la pena en su casa?\nSe acercó con cuidado a la puerta, la abrió y entró. La recibió música agradable, muebles ordenados y un letrero con un menú. La cafetería resultó ser una crepería, que vendía crepes con una variedad de rellenos: desde la clásica leche condensada hasta vinagreta y espinacas. María se dirigió al mostrador de pedidos y miró los precios. Eran bastante decentes e incluso más baratos que en el trabajo. Una cajera con un uniforme beige oscuro se acercó a María, sonrió y preguntó:\n\"Bienvenida, ¿qué va a tomar?\""
 russiaflavor.36.a: "\"¡Batido de calabaza!\""
 russiaflavor.37.t: "Recorte"
 russiaflavor.37.d: "\"¿Qué demonios me acabas de traer?\" gritó Shajnovski, lívido. Jamítov le entregó una notificación del Gobierno ruso. No era inusual recibir tales documentos, no era el primero y no sería el último. Pero lo que vino después fue impactante. La carta contenía una orden firmada por Alekséi Necháiev para reducir el número de empleados del Servicio Federal Antimonopolio (SFA) y recortar el número de subdirectores a solo cinco, incluido el propio Shakhnovsky.\nJamítov suspiró, tratando de suavizar el golpe. \"Escucha... Sé que esto es inesperado y probablemente molesto. Pero no puedes ir en contra del Gobierno. Tienes que...\"\nShajnovski interrumpió, su voz elevándose. \"¡Me importa un bledo lo que piense ese vskochka (advenedizo)! ¡Este... este aficionado! ¡Ni siquiera sabe lo que está haciendo! Si quiere jugar a la democracia, ¡lo demandaré! ¡Democráticamente, digo! Después de todo, yo...\"\nJamítov lo interrumpió, con los ojos fríos. \"¿Después de todo, qué eres? ¿Has eliminado cualquier oposición interna? ¿Tienes conexiones y esquemas de corrupción con la familia Kovalchuk? ¿No estuvieron a punto de destruir la economía rusa durante la Guerra Europea? Créeme, tienes pecados que tanto el primer ministro como el presidente conocen. Si no cumples, terminarás en el mismo tribunal que Berezovski, Shajnovski y Jodorkovski\".\nShajnovski se sintió atrapado. Sabía que no tenía elección. Respiró hondo y asintió lentamente."
 russiaflavor.37.a: "\"¡Se hará, señor ministro!\""
 russiaflavor.38.t: "El fin del Atamán"
 russiaflavor.38.d: "La mañana en el pueblo de Yelanskaia, en la región de Rostov, no fue buena, a pesar de la agradable calma veraniega, solo rota por los sonidos de la maquinaria de construcción. Curiosos, transeúntes y visitantes del Complejo Conmemorativo y Museo Cosaco de Yelán se agolpaban alrededor de una de las atracciones dentro de este complejo. Había un rugido de la multitud, los lugareños susurraban y discutían lo que estaba sucediendo, alguien interrogaba a regañadientes a uno de los operadores del vehículo de construcción.\n\nLa estatua del atamán cosaco -con lo que se referían a Piotr Nikoláyevich Krasnov, aparentemente- fue demolida. Así, la placa que decía \"A los atamanes, generales, oficiales, cosacos y cosacas del Don, que entregaron sus vidas por la Fe y por la Patria\" ya había sido desmantelada, y pronto el monumento fue demolido con absoluta indiferencia. Algunos de los visitantes lo recibieron en silencio, la mayoría lo observó con cierta indiferencia, pero algunas personas gritaron insultos a los operadores de la máquina.\n\nDurante algún tiempo, la situación se convirtió en una razón bastante escandalosa para el debate público. Se expresó la postura de que esta situación era una manifestación del desprecio del gobierno por el patrimonio histórico, aunque los medios de comunicación y los ciudadanos progubernamentales en esta situación se refirieron a la decisión de los gobiernos locales, que se tomó en relación con la inadmisibilidad de la glorificación de colaboradores y cómplices del nazismo."
 russiaflavor.38.a: "Los cerdos colaboradores no merecen ser recordados."
 russiaflavor.39.t: "¡Solo relájate!"
 russiaflavor.39.d: "The kitchen was stifling, with the window wide open, revealing the evening avenue and a mix of spring scents and the faint smell of smoke. Lech sat on the windowsill, a cigarette dangling from his lips, while Maxim slouched at the table across from him.\n\"I'm serious, Lech,\" Maxim said quietly, as if someone might overhear. \"Something's off. The phone turned itself off, and then I got these weird calls without any sound, like they were checking the line.\"\nLech scoffed. \"Max, you're getting paranoid. Who are you? You're not some high-profile figure-you're not a general, a journalist, or an oppositionist. What makes you think anyone's interested in you?\"\n\"I don't know,\" Maxim replied, nodding. \"I just feel… off. Like something's not right.\" He sighed and changed the subject.\nThey spent the next hour talking about mundane things-home, work, and friends. The conversation was light and easy, and when they parted ways, both felt at ease.\nBut as soon as Maxim left, a white van parked discreetly on the street. An elderly man with drooping eyes entered the back, retrieved a thin folder from a closet, and placed it on a small table inside. The folder bore a formal inscription: \"Protocol... Object: Maxim S. (Pseudonym: M.S.).\"\nThe driver, a young, neatly-shaven man, grinned."
 russiaflavor.39.a: "- Lech must be in the eternal '07, eh, Kirill Andreevich?"
 russiaflavor.40.t: "Una noche en el Kremlin"
 russiaflavor.40.d: "Eran las 9:00 PM y las oficinas del Kremlin estaban vacías, pero él seguía en casa, trabajando. Asuntos gubernamentales de suma importancia exigían su atención y tenacidad indivisas. Había estado en ello todo el día, asegurándose de que cada departamento funcionara sin problemas, la economía creciera y las fuerzas armadas recibieran nuevo equipo rápidamente. Socios occidentales... Llevaba demasiado tiempo en este modo implacable. Estaba agotado. Se merecía un descanso. Terminaría y finalmente descansaría.\n\nSus pensamientos sobre el descanso fueron abruptamente interrumpidos por un golpe en la puerta. \"Adelante\", dijo.\n\n\"Vladímir Vladímirovich, lamento molestarlo, pero hay una nueva «investigación» en línea. Algunos ciudadanos están molestos y agitados. La oposición está planeando una manifestación mañana sin consultarnos. Ya he informado a las agencias de seguridad, pero...\"\n\"Entiendo. Haz lo necesario. Resuélvelo. Estoy cansado de esta gente\"."
 russiaflavor.40.a: "Simplemente sáquenlos de las calles."
 russiaflavor.41.t: "Gobernante Supremo"
 russiaflavor.41.d: "Viktor Vasilyevich Zolotov recently became the new locum tenens of the Kremlin. Over the past time, its premises have become familiar. To the relief of the new leader, the system he was building worked like clockwork. Nevertheless, the commander of the National Guard, and now the undisputed ruler of Russia, has always been a man of action, so he was tired of long hours in the office. Walking around the Kremlin whenever he had the opportunity became the norm for him.\nThere was no one in one of the vast marble halls, the only thing that attracted attention was a huge portrait, twice the height of a man, from which Vladimir Wolfovich Zhirinovsky's penetrating gaze pierced the observer from under his glasses. He seemed to be standing opposite, arms crossed over his chest, he was wearing his usual formal suit with the Russian flag on the lapel of his jacket, and only the blue haze of watercolor was visible against the background. \"It's a good portrait. As if alive. That's how I remember him.\" thought Zolotov.\nThe sudden meeting made the commander of the National Guard think. First of all, let us recall their business conversations, and in general, Vladimir Volfovich's style of doing business within his party in particular and the state in general. Of course, he was not always an easy-to-communicate person, but if there was a problem, he immediately found a solution to it, or found someone who could find it, as during the war on terrorism when he was elected back in 2022. Viktor Vasilyevich was like that, as it seemed to him. Specific problems required specific solutions. The state will not defend itself. They both understood that being a Leader meant not only being a guardian, but also, when necessary, a stern father and protector for each of their many millions of wards.\n"
 russiaflavor.41.a: "Memoria eterna."
 russiaflavor.42.t: "Proyecto de la Ciudad del futuro"
 russiaflavor.42.d: "Surkov's digitalization policy in Russia was truly comprehensive. And recently, as part of a joint initiative between Vladislav Yurievich and Moscow Mayor Sergey Sobyanin, an unprecedented project called the City of the Future was launched. According to his plan, Moscow would have to become the most comfortable city on the planet.\n\nIndeed, in the near future, the city was filled with new QR codes that spoke about the long history of this metropolis. Residents and tourists, using a special application, could reconstruct the views of bygone days and personally transfer themselves to Moscow of the 20th, 19th and 15th centuries using augmented reality technology. And carefully designed three-dimensional maps, updated in real time based on satellite data and information from users, could always warn of traffic jams or plot a route to the most significant places.\n\nOf course, this project also had another purposes. The city bristles with an incredible number of cameras, smart sensors and fingerprint scanners. On the one hand, it was incredibly convenient to open a room in a new building with a simple touch. But now the state has always known where you are. It doesn't matter if you're a Yandex.Food courier, a simple worker, or a pawnbroker. Whether you were weaving through a maze of Khrushchev bars or running across the road at a red light in a stream of people. AI-powered cameras could reconstruct your face even if it was hidden by a medical mask or scarf. The state has always known where you are and what you are doing right now. Of course, this has significantly reduced the number of crimes in the city, and many people liked this initiative. But there were also voices of those who shouted that Moscow was turning into a panopticon. However, most people were willing to put up with government surveillance. In the end, under Sobyanin, Moscow truly became the most advanced and convenient city in the world.  Everything had a price. That was how it was, a fairy-tale city, a dream city..."
 russiaflavor.42.a: "Once in his net, you disappear forever."
 russiaflavor.43.t: "Esencia del tiempo"
 russiaflavor.43.d: "Vladislav, a school teacher of physics and chemistry, has not been interested in politics since recently, somewhere since the president's decrees banned most legal leftist movements in Russia - although the politics led by Vladimir Volfovich were not completely alien to him - he recognized the need to protect the interests of Russians, but to the same extent He believed that Western-style capitalism was going against them, it was enough to look out the window.\nIn general, life went on, although my soul was somehow empty. This changed when he read encouraging information in one of the small journalistic Telegram channels that the first broadcast of Sergey Yervandovich Kurginyan's \"Essence of Time\" on state television would soon take place. He immediately remembered watching Kurginyan's lecture notes earlier, and everything fell into place.  His schedule kept up with the time of the next broadcast, so he vowed to definitely watch it.\nThe very next evening, he made it almost in time, Vladislav switched to the right channel, and a familiar voice sounded through the speakers of his TV.:\n- ...So I would like to ask again - how to keep up with each new sensation, reassembling the picture of the world over and over again? Who says to themselves: \"Stop! What's going on?\" If that's you, then this conversation is for you. Of course, I would like to start it with the reasons why we are talking at all now. The fact is that inevitably our enemies in the West, which is constantly analyzing and constantly collecting information, will attack us not only physically, but also spiritually - on the territory of meanings. Of course, the \"higher ups\" understand this, so...- ...I would like to end by saying that, allegorically speaking, man is the \"crown of Creation\", the master of nature. Russians carry so many powerful metaphysical ideas... that they arouse the hatred of those who want to turn a man into a beast and into a machine..."
 russiaflavor.43.a: "We need to leave the fourth floor."
 russiaflavor.44.t: "\"The Apotheosis of European Capitalism\""
 russiaflavor.44.d: "Hello, dear readers of the online publication Krasnaya Zvezda. As you know very well, the situation in the world is completely different from what it was a decade ago. And today we invite you to take a short retrospective on what led to the appalling situation on the European continent and whether there are any prospects for the left-wing movement in the near future. . . .\n\n. .   However, after the European War, Dmitry Anatolyevich fell out of favor with the ruling circles. Was he too \"proactive\" or just didn't want to share it once? It's unlikely that we'll ever find out. The choice was made, and Vladislav Surkov became the new puppet of the oligarchs after the great European partition. A well-known cryptofascist and orchestrator of countless crimes against humanity.  .  .\n\n. . . Europe, after being defeated by the forces of Russian capital, has also undergone changes. The elements of capital, wounded in their pride, set out to rebuild society. \"Continental\" nationalism, mixed with perverted ideas of liberalism and superiority, became the basis of a new unified state. And how convenient that in this case, the main beneficiaries of this coup are all the same people. Klaus Schwab, Peter Letmante, you all know their names perfectly well...\n\n...I would like to summarize this article with a simple fact. Francis Fukuyama's book \"The End of History and the Last Man\" was kind of prophetic. However, unlike his predictions, the real end was much less rosy. Instead of a liberal utopia without disagreements and the fall of dictatorships, we saw the rise of exploitative corporate states built on the principles of maximizing income and alienating the working class. Radical fascism made the only right decision for itself and decided to strengthen itself by nipping any other ideologies in the bud. That is why you will not see any slogans or appeals in Moscow or Brussels. Sometimes you can hear fragments of vague simulacra \"National pride\", \"United heritage\". But they don't make sense anymore..."
 russiaflavor.44.a: "From the federal list of extremist materials."
 SOV_BORIS_NADEZHDIN_DESC:0 "Borís Borísovich Nadezhdin nació en 1963 en la ciudad de Taskent, en la RSS de Uzbekistán. Durante más de cinco generaciones, todos los hombres de su familia compartieron el mismo apellido. Sin embargo, no estaba destinado a vivir mucho tiempo en el territorio de Asia Central. En 1969, su familia se mudó a Moscú. Allí estudió y trabajó primero como ingeniero, para luego convertirse en presidente de la cooperativa \"Integral\".\n\nPero Borís Borísovich siempre estuvo interesado en la política, y por eso, cuando en 1990 la agitación social llegó a su límite, comenzó a actuar. Primero se convirtió en diputado popular de Dolgoprúdny, y luego se unió al Movimiento de Reforma Democrática. Poco a poco, se integró en el círculo social del entonces famoso Borís Nemtsov y ocupó un prestigioso puesto en la Unión de Fuerzas de Derecha. Posteriormente, fue miembro del Partido del Crecimiento y de Iniciativa Cívica, e incluso se presentó como candidato por la plataforma liberal de Rusia Unida, pero sin éxito.\n\nSin embargo, tras la Guerra Europea, la suerte le sonreía a Nadezhdin. Tras entrar en el círculo de confianza de Dmitri Medvédev, especialmente tras mejorar las relaciones con los liberales, logró rápidamente conseguir un buen puesto como primer ministro. Y en cuanto Medvédev empezó a considerar una posible dimisión, Boris supo qué hacer.\n\nY ahora Nadezhdin está al mando del país más grande y poderoso del mundo. Prometió reformas al pueblo ruso y es responsable de sus palabras. Pero cómo las llevará a cabo depende solo de él mismo."

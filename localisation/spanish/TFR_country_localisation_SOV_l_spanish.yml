 SOV_purge_our_enemies: "Purgar a nuestros enemigos"
 SOV_purge_our_enemies_desc: ""
 SOV_new_europe_project: "Nuevo proyecto europeo"
 SOV_new_europe_project_desc: ""
 SOV_third_rome_eternal: "Tercera Roma eterna"
 SOV_third_rome_eternal_desc: ""
 SOV_his_vision_prevails: "Su visión prevalece"
 SOV_his_vision_prevails_desc: "Zhirinovski fue el hombre que nos llevó a la victoria, Zhirinovski fue el hombre que elevó a la nación rusa a un estado superior, Zhirinovski fue el hombre que hizo retroceder a Occidente. Solo tendría sentido que sus ideales se mantuvieran. [SOV.GetLeader] es uno de los pocos que realmente entiende el camino que Zhirinovski nos ha marcado y no hay razón para no mantener ese camino."
 SOV_intensify_debolshevization: "Intensificar la desbolchevización"
 SOV_intensify_debolshevization_desc: "Si había algo que los rojos hacían mejor, era construir cultos a la personalidad. La basura roja renombró calles, pueblos, incluso grandes ciudades en honor a sus líderes, ¡construyó una enorme cantidad de estatuas de sus líderes! Me gustaría rendirles homenaje cuando estaban en el poder, funcionó eficazmente. Pero ahora el poder está en manos de verdaderos patriotas. Iniciaremos una campaña a gran escala para destruir el legado soviético. Las estatuas de Lenin serán demolidas y su lugar será ocupado por estatuas de Vladímir Vólfovich y otros patriotas de Rusia. Ciudades, pueblos e incluso calles recibirán nuevos nombres. Al final, los nombres de los verdugos rojos solo serán dignos de aparecer en documentos o libros de texto de historia."
 SOV_youth_recruitment_drive: "[ldpr_zhir_focus_scripted_loc_name]"
 SOV_youth_recruitment_drive_desc: "[ldpr_zhir_focus_scripted_loc_desc]"
 SOV_bureaucratic_centralization: "Centralización burocrática"
 SOV_bureaucratic_centralization_desc: "Sería una locura confiar la gestión de regiones enteras a funcionarios locales, y mucho menos darles el control total. ¡¿Y si empiezan a ser tiránicos?! ¡¿Y si deciden oprimir al pueblo ruso de forma explícita o más sutil?! ¡¿Y si resultan ser traidores?! Para evitar que los separatistas y otros agitadores del régimen tengan una oportunidad, todos los procesos burocráticos tendrán que pasar por autoridades especiales en Moscú."
 SOV_enshrine_ideological_postulates: "Consagrar postulados ideológicos"
 SOV_enshrine_ideological_postulates_desc: "Las ideas de Vladímir Zhirinovski son un ejemplo verdaderamente único del pensamiento político ruso. Muévase un poco a la derecha ideológicamente y obtendrá una teocracia ortodoxa loca, a la izquierda, y obtendrá un engendro rojo-pardo. El pensamiento de Zhirinovski debe ser puro y protegido de todas las impurezas para que nuestro Estado pueda seguir prosperando y la gente pueda vivir en prosperidad. ¡No permitiremos la degradación y distorsión de los pensamientos de nuestro gran líder!"
 SOV_party_popular_media: "[ldpr_zhir_focus_1_scripted_loc_name]"
 SOV_party_popular_media_desc: "[ldpr_zhir_focus_1_scripted_loc_desc]"
 SOV_benevolent_fist: "Puño benevolente"
 SOV_benevolent_fist_desc: "¡No puede haber un estado fuerte con un gobierno débil! Si los gerentes no pueden infundir miedo en sus protegidos, ¡entonces no son capaces de gobernar un país! Por otro lado, si el miedo es lo único que un gobernante puede causar, entonces también es un símbolo de la degradación del régimen. Vladímir Vólfovich fue un político ruidoso y grosero, pero al mismo tiempo amaba sinceramente al pueblo ruso y animaba a las personas que amaban su Madre Patria. Nosotros, los seguidores de sus ideas, deberíamos hacer lo mismo. Golpear con el puño a todos los oponentes del pueblo ruso, pero al mismo tiempo ser suaves con los patriotas."
 SOV_campaign_against_russophobes: "Campaña contra rusófobos"
 SOV_campaign_against_russophobes_desc: ""
 SOV_zhirinovsky_our_father: "Zhirinovski - Nuestro padre"
 SOV_zhirinovsky_our_father_desc: "Es difícil sobrestimar el papel de Zhirinovski en la formación de la nación rusa. Bajo regímenes anteriores, teníamos miedo de usar atuendos tradicionales, ser una persona religiosa era algo vergonzoso, y el idioma ruso se apoderaba cada vez más de los demás. Sin embargo, Vladímir Vólfovich cambió eso. Como Atatürk para Turquía o Józef Piłsudski para Polonia, Zhirinovski reunió todas nuestras tradiciones, nuestra fe y nuestras costumbres y creó a partir de ellas una identidad de la que estamos orgullosos hasta el día de hoy. De hecho, Vladímir Zhirinovski se convirtió en el padre figurativo de nuestra nación. ¡Por lo cual le estamos agradecidos!"
 SOV_limit_minority_privileges: "Limitar privilegios de minorías"
 SOV_limit_minority_privileges_desc: "Da miedo pensarlo, ¡pero no había ni una palabra sobre el pueblo ruso en la Constitución de la Federación de Rusia! Algún pueblo multinacional de algún país. Los secuaces locales del partido corrupto enviaron a sus aduladores a las regiones, quienes alimentaron a sus amigos separatistas y alborotadores. Los niños rusos en las llamadas \"repúblicas nacionales\" se vieron obligados a aprender el idioma del pueblo local junto con el ruso. No se puede llamar a esto de otra manera que poner una mina bajo la identidad rusa. A partir de ahora, los idiomas minoritarios se consolidarán en la educación exclusivamente como asignaturas opcionales, y sus vestimentas y tradiciones pasarán a un segundo plano. Nadie les prohíbe ser tártaros, baskires o cualquier otra cosa. Siempre y cuando no olviden que viven en el Estado ruso."
 SOV_religious_ideals: "Ideas religiosas"
 SOV_religious_ideals_desc: "La ortodoxia siempre ha sido uno de los pilares de la estatalidad rusa. Nuestro pueblo era religioso y veneraba los preceptos de los santos padres. Todo esto, por supuesto, ha sufrido como resultado de los problemas que han asolado nuestra Madre Patria. Sin embargo, nuestro pueblo siempre ha conservado en sí mismo la partícula que Dios puso en el pueblo ruso.\n\nHa llegado el momento de que asumamos de nuevo el papel del pueblo portador de Dios. Los templos y los lugares santos deben volver a ser lugares visitados. Y las tradiciones de humildad y sinceridad se convertirán en partes integrales de la vida de nuestros ciudadanos."
 SOV_long_live_the_empire: "Viva el Imperio"
 SOV_long_live_the_empire_desc: "Algunos piensan que el Imperio ruso pereció en 1917 junto con la monarquía, asesinada por los bolcheviques. ¡Tonterías! El pueblo ruso mantuvo ideas imperiales en sus corazones hasta el siglo 21. Juntos fuimos capaces de restaurar el espíritu del imperio. Juntos hemos revivido la gran Rusia. ¡Juntos hemos hecho lo imposible! ¡Y haremos aún más! siempre que nuestro país esté vivo y siempre que nuestro pueblo esté unido, somos invencibles. ¡Viva el Imperio! ¡Gloria a Rusia!"
 SOV_new_russian_indentity: "Nueva identidad rusa"
 SOV_new_russian_indentity_desc: "La cultura rusa sufrió un declive durante el reinado de los terroristas rojos. Nuestras ropas fueron prohibidas y reemplazadas por moda europea. Nuestra literatura clásica fue reemplazada con basura futurista, y nuestras tradiciones fueron ensuciadas. aunque el gobierno de la Federación dijo algo al respecto, sus acciones no fueron suficientes. ¡Dejemos de aguantarnos! ¡Es hora que la cultura rusa ascienda otra vez! A partir de ahora , nuestro pueblo no estará avergonzado de sus ropas y lenguaje. Docenas de festivales recibirán soporte, y muchos escritores obtendrán fondos. ¡La cultura rusa será grande otra vez!"
 SOV_cultural_dominance: "Dominación cultural"
 SOV_cultural_dominance_desc: "Los rusos serían tontos si creyeran que cualquier otra nación que no fueran los rusos podría estar a cargo del Estado ruso. Todo tipo de separatistas, \"minorías humilladas\" y otros idiotas están listos para echar espuma por la boca para demostrar que Rusia debería tener en cuenta sus necesidades. Pero que miren a su alrededor. ¿Construyeron todas estas ciudades? ¿Crearon una gran potencia y derramaron sangre por su derecho a existir? ¡Creo que la respuesta es obvia para todos! Que obedezcan nuestras leyes, y no los tocaremos a ellos ni a sus formas de vida arcaicas. Sin embargo, si quieren cambiar algo, también estaremos listos para aceptarlos en nuestra comunidad rusa. Si, por supuesto, demuestran durante los exámenes que realmente son capaces de integrarse en nuestra sociedad."
 SOV_to_protect_the_motherland: "Protegiendo la Madre Patria"
 SOV_to_protect_the_motherland_desc: "¿Debates inútiles y disputas interminables mientras el mundo exterior se adapta a nuestra marcha de dominación? Esto no puede continuar, después de la muerte de Zhirinovski, el partido ha comenzado a fracturarse lentamente bajo el peso de egos inflados y políticas inútiles de trastienda, afortunadamente el ejército está ahí para ponerles una pistola metafórica y literal en la cabeza para asegurarse de que se callen. No más estancamientos, no más obstrucciones; Víktor Zólotov tomará las riendas de la Madre Patria para asegurar que no vuelva a caer en otra era de estancamiento."
 SOV_zealous_anti_communism: "Anticomunismo fanático"
 SOV_zealous_anti_communism_desc: ""
 SOV_militarization_of_society: "Estabilizar el régimen"
 SOV_militarization_of_society_desc: "Cuando Zólotov sacó a su Rosgvárdia de los cuarteles, ya presentía lo que se avecinaba. Como sucesor de Zhirinovski, este veterano -ahora director de la \"orquesta sinfónica\" de Rusia- se enfrentaba a una situación más peligrosa que la de cualquier gobernante en la historia rusa que hubiera ascendido al poder después del \"Grande\". Para consolidar su poder, tendría que hacer compromisos difíciles. ¿Debería atender los deseos de sus camaradas, que lo han apoyado en las buenas y en las malas, y liderar este gran Imperio como el \"primer soldado\" de Rusia? ¿O debería escuchar los susurros que resonaban en los pasillos del Kremlin y restaurar el \"sistema republicano\" del que depende la élite rusa para su supervivencia y privilegios? Independientemente del camino que elija, una cosa es segura: Zólotov debe completar su misión con una valentía y una fuerza de voluntad inquebrantables, impasible ante cualquier tormenta."
 SOV_army_with_empire: "Estatismo militar"
 SOV_army_with_empire_desc: "Empuñando su espada, Zólotov lucha sin miedo contra aquellos que se atreven a desafiar su autoridad y la dignidad de la Madre Rusia. Ahora, como el \"general victorioso\", ha tomado su decisión. Se unirá a sus hermanos de armas, buscando la gloria eterna para Rusia. Bajo el líder anterior, la economía rusa experimentó una gran transformación para afrontar los desafíos de la guerra, trayendo cambios profundos a todos los niveles de la sociedad. Todo lo relacionado con los soldados y el ejército se había convertido en una parte esencial de la vida rusa. La tarea de Zólotov es unificar la arena política rusa con el poder militar, asegurando que la presencia militar se sienta en cada rincón de Rusia."
 SOV_shepard_with_sheep: "Respublica restituta"
 SOV_shepard_with_sheep_desc: "Rodeado de elegantes caballeros trajeados, el general Zólotov, con su uniforme militar verde grisáceo, estrecha calurosamente la mano de entusiastas políticos. Frente a las cámaras, demuestra la compostura y magnanimidad que se esperan de un gobernante benévolo. Independientemente de lo que estos astutos políticos puedan pensar en secreto sobre un oficial militar que se convierte en el líder supremo de Rusia, el control de Zólotov sobre el poder es indiscutible y solo se hará más fuerte. El general ha elegido convertirse en el Bruto y Cincinato de la \"Tercera Roma\", restaurando el orden político y la sociedad civil rusos, que fueron destruidos en los turbulentos años finales de las luchas de poder de Zhirinovski. En esta herida tierra rusa, se creará un verdadero \"Estado popular\" a través de su liderazgo."
 SOV_national_guard_supremacy: "Supremacía de la Rosgvárdia"
 SOV_national_guard_supremacy_desc: "¿Quién vigila constantemente a los que acechan en las sombras, amenazando la estabilidad del régimen con sus intenciones maliciosas? ¿Quién protege incansablemente el bienestar y la paz del pueblo ruso? ¿Quién lucha resueltamente contra las fuerzas hostiles cuando estas infringen la soberanía y la integridad territorial de Rusia? La Rosgvárdia ha hecho contribuciones monumentales al ascenso del Imperio ruso y al triunfo de su poder nacional, y la sangre derramada por sus mártires ha teñido las aguas del mar Báltico. Como resultado, con el general Zólotov ascendiendo a la posición de liderazgo más alta en Rusia, el estatus de la Rosgvárdia se disparará. Sus comandantes de élite serán promovidos a los niveles más altos del gobierno o al alto mando de las fuerzas armadas. Sus doctrinas y principios militares servirán como la brújula que guiará la formación de la nueva sociedad rusa. La Rosgvárdia se convertirá en el modelo político y moral para el futuro pueblo ruso."
 SOV_iron_russia: "La Rusia de Hierro"
 SOV_iron_russia_desc: "Cuando Augusto legó el Imperio romano a su sucesor, declaró con orgullo: \"Mirad, encontré una Roma hecha de ladrillo, y os la dejo de mármol\". De manera similar, como nuevo amo de la \"Tercera Roma\", Zólotov busca construir sobre el gran legado dejado por Zhirinovski. Quiere asegurarse de que, cuando se la entregue a su sucesor, se haga con orgullo. Zólotov mira más allá de las fronteras, donde la hostilidad hacia la madre patria rusa sigue siendo generalizada, amenazando constantemente el corazón del pueblo ruso. Si crees que Zólotov se quedaría de brazos cruzados viendo cómo tal sufrimiento recae sobre el pueblo ruso, te equivocas. Zólotov está totalmente comprometido a forjar Rusia en una fortaleza inexpugnable. En su visión, cada ciudadano ruso se convertirá en un guardián inquebrantable de la Madre Patria, y él mismo encarnará el espíritu ruso ideal."
 SOV_new_system_protected: "Nuevo sistema asegurado"
 SOV_new_system_protected_desc: "El sistema político es una de las invenciones más complejas y contradictorias de la humanidad. A veces, se infiltra en la nación como los tentáculos de un pulpo, alimentando su propio crecimiento en lugar de fortalecer la nación o servir a la felicidad del pueblo. Sin embargo, el sistema también se asemeja al tronco y las raíces de un pino, proporcionando una base sólida que apoya el progreso constante de la nación.\n\nAnte los importantes desafíos que enfrenta la Madre Patria rusa, Zólotov entiende que debe mirar más allá del Kremlin. Busca soluciones a los problemas de la nación y caminos hacia el futuro, navegando por las frustrantes capas de separación entre el líder y el pueblo.\n\nComo principal representante militar, el pilar más vital del régimen ruso, Zólotov colaborará con el Gobierno civil y la Duma Estatal, controlada por diputados del Partido Liberal-Demócrata. Juntos, construirán una Rusia fuerte sobre los cimientos establecidos por Zhirinovski."
 SOV_zhirinovsky_our_generalissimo: "Zhirinovski - Nuestro generalísimo"
 SOV_zhirinovsky_our_generalissimo_desc: "Vladímir Zhirinovski - un gran líder, un comandante genial, el padre benévolo de la nación y una luz guía cuya memoria los rusos nunca deben olvidar. El general Zólotov planea fortalecer aún más el poder del nuevo gobierno central bajo su liderazgo. La gente recuerda con cariño los días prósperos bajo el gobierno de Zhirinovski, cuando la nación floreció y el ejército ruso se mantuvo invencible en el campo de batalla. A medida que las réplicas de la transición de poder disminuyen, la gente ha depositado sus esperanzas de un resurgimiento de la prosperidad en Zólotov. Aunque la tarea de restaurar la prosperidad es ardua y prolongada, podemos aprovechar eficazmente las expectativas de la gente. Bajo el liderazgo de Zólotov, celebraremos solemnes ceremonias para honrar a Zhirinovski, otorgándole póstumamente el título de \"generalísimo\". Al mismo tiempo, presentaremos a Zólotov como el legítimo guardián del legado de Zhirinovski y el mejor candidato para guiarnos hacia adelante."
 SOV_glory_of_imperial_guard: "Gloria de la Guardia Imperial"
 SOV_glory_of_imperial_guard_desc: "Según las órdenes de Zólotov, las unidades más distinguidas de la Rosgvárdia recibirán el título honorífico de \"Guardia Imperial\". El ministro de Defensa entregará personalmente a los oficiales al mando de estas unidades una bandera con los retratos de Zhirinovski.\n\nEl establecimiento de la \"Guardia Imperial\" elevará aún más el prestigio de la Rosgvárdia dentro de Rusia. Incontables jóvenes rusos se sienten atraídos por su semblante severo y resuelto, sus capacidades profesionales y los distintivos uniformes de boina roja. En los centros de reclutamiento locales, las solicitudes para unirse a la Rosgvárdia se acumulan.\n\nAl presenciar el crecimiento de sus queridas unidades, Zólotov ha decidido intensificar sus esfuerzos. Al organizar grandes desfiles, introducir medallas especiales para celebrar el \"Día de la Rosgvárdia\" y expandir los roles de las unidades para incluir operaciones más allá de las tareas de seguridad tradicionales, la Rosgvárdia, liderada por la \"Guardia Imperial\", traerá mayor gloria al emblema del águila bicéfala de las Fuerzas Armadas Rusas."
 SOV_civic_military_cooperation: "Cooperación cívico-militar"
 SOV_civic_military_cooperation_desc: "La formación especializada que reciben los soldados, combinada con el ambiente colectivista dentro de sus unidades, les ayuda a ser miembros más productivos tanto de sus familias como de la sociedad después de la jubilación. Este principio se ha demostrado cierto a lo largo de muchos años en la sociedad militarizada de Rusia. Como líder supremo de Rusia y \"primer soldado\", Zólotov entiende cómo fortalecer el vínculo entre el ejército y el público. Con su creciente poder y prestigio, Zólotov ha comenzado a abogar por una integración cívico-militar más profunda. Los avances tecnológicos de las empresas civiles se aplicarán mejor a la construcción militar. Además, las innovaciones del ejército serán validadas y adoptadas por el sector civil. Adicionalmente, los intercambios de personal serán más frecuentes. Muchos oficiales talentosos se unirán a equipos de ingeniería, flotas de rompehielos, unidades de exploración geológica y otros sectores críticos del desarrollo nacional. Zólotov cree firmemente que, bajo su liderazgo, el pueblo ruso disfrutará de una vida mejor."
 SOV_the_heart_of_motherland: "Corazón de la Madre Patria"
 SOV_the_heart_of_motherland_desc: "El general Zólotov se ha centrado ahora en la región central de nuestro país, el corazón de la civilización rusa. Para impulsar la vasta extensión de la Madre Rusia, es esencial un corazón fuerte y sano; este es el objetivo del próximo plan del visionario general. Zólotov cree que, al transformar esta tierra en el verdadero corazón de Rusia, el Imperio podrá mantener su dominio a lo largo del siglo XXI.\n\nZólotov y sus camaradas han ideado cuidadosamente un plan, no una mera réplica de modelos de construcción pasados, sino un movimiento de renacimiento integral. Su objetivo es reconstruir la nación rusa -su población, cultura e ideología-, convirtiéndola en la verdadera heredera de las civilizaciones oriental y occidental en la masa continental euroasiática."
 SOV_zolotov_zhirinovsky_most_loyal_warrior: "Zólotov - El guerrero más leal de Zhirinovski"
 SOV_zolotov_zhirinovsky_most_loyal_warrior_desc: "Como soldado, Víktor Vasílievich Zólotov ha logrado hazañas antes inimaginables para sus predecesores. Ha heredado el legado de su predecesor y lo ha desarrollado con éxito. Ha defendido la hegemonía imperial de Rusia y ha utilizado esta base para remodelar sus valores y crear una nueva forma de civilización. En medio de la grandeza y los elogios del pueblo, el general afirma humildemente que sus logros siempre han seguido los planes a largo plazo establecidos por Vladímir Vólfovich. Enfatiza que sus acciones siempre se han alineado con la visión del gran \"Gobernante Supremo\". La humildad del general lo hace aún más querido por el pueblo, entrelazando el nombre de Zólotov con el de Zhirinovski. Cuando el dominio de Rusia pase a las generaciones futuras y su pueblo alcance la grandeza, tanto Zólotov como Zhirinovski serán eternamente venerados como los creadores de estos logros monumentales."
 SOV_the_honor_of_officers: "El honor de los oficiales"
 SOV_the_honor_of_officers_desc: "Un ejército sin el liderazgo de sus oficiales es como un cuerpo sin cerebro o sistema nervioso: sería un montón de carne sin vida. Esto se demostró vívidamente en las Fuerzas Armadas Rusas. Cuando la patria se vio envuelta en la agitación y el caos, el cuerpo de oficiales también cayó en el desorden, lo que llevó a una confusión generalizada, contrabando desenfrenado, robos y conflictos internos.\n\nComo uno de los veteranos que surgieron de este período de declive, Zólotov está decidido a que tal situación nunca más vuelva a afectar a la Madre Patria rusa. Busca abordar el problema de raíz asegurándose de que el cuerpo de oficiales se mantenga como un \"Estado dentro de un Estado\", incapaz de influir negativamente en la política, mientras actúa como los supervisores de alto nivel y guardianes del orden en el gran panorama político de Rusia. El cuerpo de oficiales se convertirá en un símbolo de superioridad inherente, como resultado, su autoridad y fuerza serán aún más formidables e imponentes."
 SOV_soldiers_state: "El estado de los soldados"
 SOV_soldiers_state_desc: "En Rusia, la imagen más respetada de una persona promedio no es la de un científico, artista o comerciante adinerado. En vez, es el soldado modesto, revestido en su uniforme y llevando un arma estándar, aquel que destaca de entre las masas. es de estos incontables soldados que los grandes líderes de la Rusia de hoy han emergido. Sus sacrificios han asegurado la prosperidad de la nación.\n\nZólotov ha hecho esfuerzos significativos para elevar el estatus del ejército, y ahora, como resultado, puede ofrecer un futuro prometedor a aquellos soldados que sangraron por Rusia. Cada veterano que ha servido y contribuido recibirá ayuda comprensiva, incluyendo empleo, salud y bienestar general. Adicionalmente, para acomodarse al ejército en constante crecimiento, estos veteranos serán llamados para servir como instructores, encontrando un nuevo propósito en el ejército que aman.\nmientras la sociedad reconoce sus contribuciones, estos héroes se convertirán un día en iconos de la nación rusa."
 SOV_citizen_militarization: "Militarización ciudadana"
 SOV_citizen_militarization_desc: "¿Qué temen más la oposición débil y aquellos que aún se aferran a la creencia de que el Partido Liberal-Demócrata podría ceder el poder? Es, por supuesto, la perspectiva de que un estilo de vida militarizado se convierta en la norma en toda la sociedad. Se encontrarían rodeados de verdaderos patriotas rusos, sus verdaderas naturalezas inevitablemente expuestas. Sin embargo, convertir toda Rusia en un enorme campamento militar de una manera demasiado radical sería contraproducente en términos de uso de recursos y eficiencia.\n\nPara evitar esto, Zólotov ha ideado un plan gradual para integrar a cada ciudadano ruso en la estructura de las Fuerzas Armadas Rusas. Este plan es la versión moderna de la educación militar espartana de la antigua Grecia. La columna vertebral de la sociedad rusa se convertirá en un modelo tanto de espíritu de lucha como de habilidad profesional, asegurando el desarrollo sano y ordenado de la sociedad rusa en las próximas décadas."
 SOV_cult_of_zolotov: "Culto a Zólotov"
 SOV_cult_of_zolotov_desc: "Cualquier ruso racional reconocería que el liderazgo de Zólotov ha cambiado el destino de la nación en un momento crítico, guiándola hacia un camino de resurgimiento y prosperidad. Sin él, cualquier conversación sobre estabilidad, orden y progreso habrían sido palabras vacías después de la muerte de Zhirinovski.\n\nPor lo tanto, además de fomentar el respeto y la reverencia por el líder supremo entre el pueblo ruso, también organizaremos actividades promocionales para asegurar que el nombre de Víktor Zólotov sea recordado para siempre junto a las figuras más grandes de la historia rusa. Encuestas públicas cuidadosamente realizadas colocarán a Zólotov a la vanguardia de los \"100 rusos más grandes\". Los monumentos a su vida, lugar de nacimiento y las unidades en las que sirvió se convertirán en grandes símbolos de patriotismo. Además, los materiales que celebren la notable vida de Zólotov se incluirán en los libros de texto utilizados en las escuelas, asegurando que las futuras generaciones de rusos compartan la misma creencia: Zólotov es la encarnación terrenal de Rusia."
 SOV_empower_military_governors: "Empoderar a gobernadores militares"
 SOV_empower_military_governors_desc: "A través de reformas audaces y radicales, hemos asegurado que Rusia se esté transformando gradualmente en la visión que deseamos. El término anticuado \"militarismo\" ya no describe con precisión el estado actual de Rusia. Nuestros enemigos pueden desear ver una Rusia debilitada por el exceso militar, como la antigua URSS. Sin embargo, la economía militar-civil sostenible, el valor social que se le da a la fuerza marcial y la burocracia y las fuerzas armadas disciplinadas sirven como claros ejemplos del éxito del camino de Zólotov.\n\nEn el futuro, eliminará todas las restricciones para realizar plenamente su visión para la patria. El Imperio ruso será reestructurado, con sus territorios gobernados por unos pocos gobernadores militares que tendrán poder absoluto sobre la vida y la muerte en sus regiones. El ejército será la única autoridad respetada, guiando cada aspecto de la sociedad. Zólotov confía en que esto forjará un gran Imperio ruso, uno que se mantenga vital y avance continuamente en el camino de la conquista."
 SOV_the_russian_senate: "Senado ruso"
 SOV_the_russian_senate_desc: "Al haber elegido reconstruir el sistema republicano ruso mediante la fuerza militar y protegerlo con el ejército, Zólotov ha dado su primer paso hacia la reforma política en Rusia. La Duma Estatal, un órgano representativo de larga data que se remonta a 1905, ha llegado al final de su ciclo de vida. Recordaremos las importantes contribuciones que esta institución ha hecho a la gobernanza rusa a lo largo de los años y preservaremos sus valores fundamentales. Al mismo tiempo, nuestro objetivo es hacerla más eficiente y adecuada a las necesidades actuales de Rusia a través de reformas de modernización.\n\nSegún el último decreto, la Duma Estatal se transformará en el Senado Ruso, que incluirá a más élites de la sociedad y proporcionará mayores consultas profesionales. En áreas como la toma de decisiones militares y diplomáticas, el servicio público y la planificación industrial, el nuevo Senado ruso ayudará a garantizar que el resurgimiento de Rusia sea constante y duradero."
 SOV_citizenship_for_service: "Ciudadanía por servicio"
 SOV_citizenship_for_service_desc: "En la antigua Roma, servir en las legiones era un noble privilegio reservado a los ciudadanos romanos. Ahora, en la vasta extensión de Rusia, el último proyecto de ley del general Zólotov pretende revivir este concepto. A partir de ahora, servir en las Fuerzas Armadas Rusas será el camino clave para que las personas en los territorios recién recuperados y la próxima generación de rusos obtengan la ciudadanía formal. Solo demostrando su lealtad y amor por la patria, así como desarrollando las habilidades necesarias tanto para el trabajo como para el combate, se puede considerar a alguien un activo valioso para la nación y la sociedad rusas.\n\nCreemos que esta reforma eliminará gradualmente a los parásitos y canallas sociales de la comunidad rusa en los próximos años. En poco tiempo, las excepcionales cualidades de los ciudadanos rusos asombrarán al mundo."
 SOV_centralized_republic: "República centralizada"
 SOV_centralized_republic_desc: "En el pasado, para acomodar la naturaleza transcontinental de nuestro país y la diversidad de grupos étnicos dentro de él, tuvimos que tolerar la coexistencia de varias organizaciones gubernamentales locales. Si bien esto demostró la inclusividad de Rusia, creó desafíos significativos para mejorar la eficiencia administrativa y mantener la unidad de la civilización rusa. Además, el trato especial para las áreas remotas hizo aún más difícil asegurar un desarrollo equilibrado y la unidad regional en todo el país.\n\nPara abordar esto, Zólotov tomará medidas decisivas para eliminar estas prácticas perjudiciales. Todas las regiones administrativas locales se unificarán bajo el marco de los \"óblasts\", gobernadas por funcionarios designados. Estos gobiernos y líderes de óblast serán responsables ante el gobierno central en Moscú, rindiéndole cuentas únicamente a este. Zólotov cree firmemente que un sistema republicano centralizado mejorará significativamente la formulación e implementación de políticas que beneficien a todos los rusos."
 SOV_commander_in_chief: "¡Salve al comandante en jefe!"
 SOV_commander_in_chief_desc: "Zólotov entiende que para dominar verdaderamente Rusia, necesita más que la lealtad del ejército y la marina. Otros dos elementos son esenciales: el miedo del pueblo llano y la adulación de la élite. Mientras se presente como un líder con mano de hierro y un poder militar significativo, el miedo del pueblo estará garantizado. Además, al demostrar que su posición es segura y que puede ofrecer recompensas y beneficios inimaginables a sus seguidores, ganarse la lealtad de la élite rusa será sencillo.\n\nZhirinovski fue simplemente el difunto \"generalísimo\", de poca importancia más allá de eso. Zólotov, sin embargo, es el verdadero \"Comandante en Jefe\", con el poder de la vida y la muerte descansando enteramente en sus manos. Cualquier adversario que entienda esto evitará sabiamente desafiarlo, asegurando que la reputación de Zólotov se vuelva cada vez más inexpugnable."
 SOV_cutting_down_the_officialism: "Reduciendo el oficialismo"
 SOV_cutting_down_the_officialism_desc: "A medida que Zólotov se vuelve más hábil en la gobernanza de la nación, descubre que el mismo sistema burocrático que restauró con tanto esmero se ha convertido en el mayor obstáculo para el avance de Rusia. Cada vez que intenta impulsar sus planes, Zólotov siente los efectos negativos de la arrogancia y la incompetencia del sistema. Lo que necesita son ejecutores leales y decididos -laboriosas \"abejas obreras\" comprometidas con el bienestar del pueblo ruso-, no \"intelectuales\" engreídos que creen poder gestionar los asuntos de Estado.\n\nPor lo tanto, si el \"Gobernante Supremo\" puede dar, el \"Gobernante Supremo\" también puede quitar. Llevaremos a cabo una limpieza a fondo, eliminando cualquier estructura deteriorada que obstaculice nuestro progreso. Una vez que el polvo se asiente, la única figura que quedará en el centro del poder será nuestro comandante en jefe, el Sr. Zólotov."

 SOV_keep_america_burning_category_desc: "Homero, ¿vas a mantenel aldiendo América?"
 SOV_nav_russian_reformation_category: "Reformación rusa"
 SOV_nav_russian_reformation_category_desc: "\n\n\n\n\n£GFX_SOV_grand_reformation_banner\n\n\n\n\n\n\n\n\n\nDurante mucho tiempo, nuestro sistema se basó en una constitución fallida que le dio poder al régimen. Ahora, estamos listos para crear una verdadera constitución democrática. Una que consagre las libertades y los derechos que han allanado el camino para el mundo civilizado.\nY quizás, si nuestro pueblo la abraza con entusiasmo, ¡podamos finalmente unirnos a las democracias europeas que nos han liberado!\n\n\n\nFanaticismo: £GFX_fanaticism  §Y[?SOV_fanaticism_var|1%]§!\nEfecto: £attack_texticon  [?SOV_fanaticism_dynamic_var|=+1%] £mil_factory  [?SOV_fanaticism_dynamic_var|=+1%] £GFX_mobilisation_texticon  [?SOV_fanaticism_dynamic_var|=+1%] £GFX_war_support_modifiericons_texticon  [?SOV_fanaticism_dynamic_var|=+1%]\n\nEl fanatismo representa la voluntad de lucha de nuestro pueblo y el apoyo a la nación.\n\n\n\n\n\n\n\n\n"
 SOV_navalich_oligarchs_enabled_loc: "\n£GFX_New_Oligarchs_logo  Influencia de los §7Nuevos Oligarcas§!: §Y[?SOV_oligarch_approval_rating_var|1%]§!\nEfecto: £civ_factory_output  [?SOV_oligarch_support_dynamic_var|=+1%], £mil_factory  [?SOV_oligarch_support_dynamic_var|=+1%], y £consumer_goods_texticon  §Y[?SOV_oligarch_support_dynamic_var|=1%]§!"
 SOV_navalich_oligarchs_disabled_loc: ""
 SOV_new_national_duma_category: "Nueva Duma National"
 SOV_new_national_duma_category_desc: "\n\n\n\n\n£GFX_SOV_national_duma_banner\n\n\n\n\n\n\n\nLa Duma Nacional Rusa es la visión renovada, modernizada y redefinida de la nacionaldemocracia rusa. Mientras el PLDR continúa su reforma, es necesario escuchar finalmente las voces de las partes contrarias, al menos de las legalizadas."
 SOV_russian_inner_affairs_category: "Asuntos internos rusos"
 SOV_russian_inner_affairs_category_desc: "\n\n\n\n\n£GFX_SOV_inner_affairs_banner\n\n\n\n\n\n\n\nCon la nueva Rusia surgiendo de las cenizas del régimen del PLDR, debemos centrarnos en revisar nuestras políticas internas. La nueva administración prometió numerosos cambios al Estado ruso."
 SOV_coronavirus_decrease: "Combatiendo al coronavirus"
 SOV_suraykin_politburo_category: "El Politburó"
 SOV_suraykin_politburo_category_desc: "\n\n\n\n\n£GFX_SOV_suraykin_politburo_banner\n\n\n\n\n\n\n\nCon la verdadera revolución comunista asegurada, finalmente podremos construir el verdadero socialismo, tal como lo pretendían Stalin y Lenin. El camarada Maksim ha formado su propio Politburó ortodoxo, integrado únicamente por auténticos marxistas-leninistas, quienes le ayudarán a materializar el comunismo."
 SOV_russian_army_category: "[SOV_army_loc]"
 SOV_russian_army_category_desc: "El [SOV_army_loc] es una de las fuerzas militares más poderosas y destacadas del mundo. Posee un enorme potencial, es capaz de defender a su país de cualquier amenaza y es un pilar fundamental de la seguridad nacional y el orgullo de la Madre Patria. El [SOV_army_loc] posee un rico legado y tradiciones que se transmiten de generación en generación. Su historia está llena de hazañas y victorias que consolidan su poder y grandeza. Sin embargo, para mantener su eficacia y modernidad, requiere constantes reformas y desarrollo."
 SOV_the_secret_war: "La Guerra Secreta"
 SOV_the_secret_war_desc: "Las nubes se ciernen sobre nuestra Madre Patria, y las siniestras fuerzas de las organizaciones secretas \"Liga para la Democracia Rusa\", \"Nueva Restauración\" y los oligarcas, siempre adinerados, se preparan para su insidioso ataque contra nuestra Rusia. El Gobierno, bajo el liderazgo de Vladímir Vólfovich Zhirinovski, se ve obligado a entrar en la Guerra Secreta para proteger la legitimidad y la estabilidad del país de este §Rsiniestro enemigo§!.\n\n£GFX_LRD_texticon  §CLiga para la Democracia Rusa§! - [SOV_LRD_activity_scripted_loc]\n\n£GFX_tnr_texticon  §sNueva Restauración§! - [SOV_TNR_activity_scripted_loc]"

 SOV_russia_we_brought_back_tt: "§g¡Qué noche tan deliciosa en Rusia!\nAmor, champán, atardeceres, callejones.\nAh, el rojo del verano, la diversión y los viajes,\n¡Qué noche tan deliciosa en Rusia!§!\n\n§YBailes, belleza, lacayos, cadetes\nY valses de Schubert, y crujiente pan francés:\nAmor, champán, atardeceres, callejones.\n¡Qué noche tan deliciosa en Rusia!§!\n\n§W¡Qué noche tan deliciosa en Rusia!\nBajo el resplandor de las llamas del atardecer veraniego,\nY los ojos azules del cielo del poeta:\n¡Qué noche tan deliciosa en Rusia!§!\n"
 SOV_happy_new_year_russia_tt: "\n§YDejadnos en paz: nunca los habéis leído -\nEstos tablones teñidos de sangre tan impresionante,\nNo percibiréis en toda vuestra vida\nEsta vieja y duradera contienda familiar.\nMudos os parecen tanto Praga como el Kremlin.\nVosotros simplemente disfrutáis sin un objetivo\nDe esa lucha, desesperada y atrevida,\nY, lo que es más, nos odiáis a todos...\n\n¿Por qué? Responded: ¿quizás la razón ahora\nEs que aquellos días en Moscú sobre ruinas ardientes\nNo nos doblegamos al poder insolente\nDe aquel ante quien vosotros temblabais de miedo?\n¿O quizás solo porque lo derrocamos -\nAl ídolo que pesaba gravemente sobre todas las naciones?\n¿Y pagamos con sangre, tal como estamos acostumbrados,\nPor la paz de Europa, su honor y salvación?\n\nNos amenazáis con palabras, intentad convertirlas en hechos.\n¿O creéis que el antiguo bogatyr está en su sofá en paz,\nSin tener ya poder para montar su bayoneta turca?\n¿O la orden del zar ruso se ha vuelto impotente?\n¿O la disputa con Europa es algo nuevo para nosotros?\n¿Parecen los rusos olvidar las victorias que solían obtener?\n¿O somos pocos? ¿O desde Perm hasta la Táurida,\nDesde los acantilados helados de Finlandia hasta la ardiente Cólquida,\nDesde el Kremlin listo y alerta,\nHasta las firmes murallas de la antigua China\nCon acero erizado en brillante formación\nNo se levantará unida la tierra rusa?§!\n§R¡Por qué! Enviadnos, pues, oradores errantes,\nVuestros hijos, cuya maldad alabáis:\nEn los campos rusos hay un lugar vacante para ellos\nEntre las tumbas familiares para su nación.§!\n\n\n\n\n£GFX_vtb_eto_klassika\n\n\n\n\n\n§CRusia grande. Grandes clásicos.\nFeliz Año Nuevo.§!"

 SOV_The_Petrol_Economy: "Economía petrolera"
 SOV_The_Petrol_Economy_desc: "La \"maldición de los recursos\" es la forma en que los economistas describen los beneficios y los inconvenientes paradójicos de una nación con abundantes recursos naturales: aunque es una fuente fantástica de ingresos para una nación floreciente, a menudo frena el crecimiento de otros sectores económicos y da como resultado un sistema más autoritario y menos democrático. Y Rusia no es una excepción a la regla. El sector del petróleo y el gas natural es el eje de la economía rusa, y además es frágil. Dado que muchas de estas empresas son de propiedad estatal, las fortunas tanto de la gente como del Estado están sujetas a los caprichos del siempre turbulento mercado internacional del petróleo."

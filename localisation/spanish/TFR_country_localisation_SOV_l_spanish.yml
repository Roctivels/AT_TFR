 SOV_union_ruble: "Rublo de la Unión"
 SOV_union_ruble_desc: "Con la reunificación de la Unión, ha llegado el momento de unir finalmente nuestras economías de naciones hermanas. A pesar del uso generalizado del rublo ruso en todo el país, las monedas de otras repúblicas todavía se encuentran en circulación. Una reforma monetaria a gran escala es ya un paso necesario para fortalecer el sistema financiero común. El nuevo rublo de la Unión eliminará esta confusión y se convertirá en un símbolo de nuestro poder unido, enfatizando la inseparabilidad de los lazos económicos y sociales."
 SOV_standartisation_of_state_enterprises: "Estandarización de empresas públicas"
 SOV_standartisation_of_state_enterprises_desc: "Los modelos económicos en las repúblicas de la Unión son demasiado heterogéneos. Mientras que la planificación rígida florece en una república, el capitalismo liberal habitual, embellecido con una buena protección social y una bandera roja, sigue operando en otra. Esta situación crea dificultades para la gestión eficaz de las empresas estatales y la implementación de programas de toda la unión. Es hora de unificar el sistema económico bajo el estándar del socialismo de mercado de la RSFSR. Esto asegurará condiciones equitativas para todas las regiones y eliminará las barreras al crecimiento económico."
 SOV_let_a_hundred_flowers_bloom: "Que cien flores florezcan"
 SOV_let_a_hundred_flowers_bloom_desc: "La unidad de la URSS siempre se ha basado en la diversidad de sus pueblos, culturas y actitudes. Lo mismo ocurre con la política económica. La diversidad de modelos de una república a otra es una ventaja, no una desventaja. Si se establece un sistema más dirigido o más liberal en algún lugar, no hay necesidad de tocar nada. No hay necesidad de imponer reglas universales a todas las repúblicas, si todo funciona bien en sus repúblicas."
 SOV_expand_the_sezs: "Crear nuevas ZEE"
 SOV_expand_the_sezs_desc: "La zona económica especial de Vladivostok se ha convertido en un modelo de revitalización regional exitosa. Los incentivos fiscales y la regulación simplificada han ayudado a atraer inversiones y revitalizar la economía del Extremo Oriente. Ha llegado el momento de extender este éxito: la creación de nuevas ZEE en puntos estratégicos de la Unión acelerará el desarrollo económico y mejorará la vida en las regiones. Sí, al final, estas zonas servirán no solo a empresas honestas que crean producción y empleos reales -la economía real-, sino también a pequeños comerciantes y especuladores, pero esto solo demuestra nuestra honestidad: estamos dispuestos a hacerlo, asegurando condiciones justas para todos."
 SOV_unification_of_our_armies_dengist: "Unificar nuestros ejércitos"
 SOV_unification_of_our_armies_dengist_desc: "En este momento, nuestras fuerzas armadas son un mosaico ensamblado a partir de los ejércitos de antiguas repúblicas. Algunas unidades están equipadas con tecnología de punta, mientras que otras sufren de falta de recursos y entrenamiento. Es necesaria una estricta reforma militar para crear un Ejército Soviético unificado y poderoso. Las Fuerzas Armadas de la URSS deben convertirse en el escudo y la espada de nuestro país, capaces de protegernos de cualquier amenaza."
 SOV_invest_in_ai_development: "Invertir en desarrollo de IA"
 SOV_invest_in_ai_development_desc: "El comunismo digital aún está muy lejos, pero podemos acercarlo con pequeños pasos desarrollando nuestras tecnologías. ¡La inteligencia artificial se convertirá en una herramienta para aumentar la eficiencia de las empresas públicas y gestionar mejor la economía! Al invertir en el desarrollo de la IA, estamos sentando las bases para el futuro, cuando estemos preparados para pasar a un modelo verdaderamente socialista."
 SOV_the_soviet_dream: "Sueño soviético"
 SOV_the_soviet_dream_desc: "El sueño soviético es una visión de una sociedad donde todos tienen las mismas oportunidades para desarrollar sus talentos, educación y una vida digna. Es un mundo donde el trabajo y la creatividad traen alegría, donde el trabajo de todos es respetado, desde el obrero hasta el ingeniero. Ofrecemos no solo estabilidad, sino un futuro donde la justicia, la igualdad y el progreso se hacen realidad para todos. ¡El sueño soviético es la esperanza de lo mejor que nos impulsa hacia adelante!"
 SOV_new_red_tourism: "Comodificación de la ideología"
 SOV_new_red_tourism_desc: "Tras nuestra victoria, el mundo vuelve a hablar de comunismo, y muchos extranjeros están ansiosos por tocar la legendaria historia de la URSS. Desde Moscú hasta Almaty, desde Leningrado hasta Taskent, convertiremos nuestras ciudades, fábricas, museos y monumentos en centros de peregrinación turística. Las \"rutas rojas\" se convertirán en una fuente de inspiración para los visitantes extranjeros y una lucrativa fuente de ingresos para nuestro Estado. La victoria sobre la OTAN es nuestro orgullo, y no solo debe traer prestigio, sino también beneficios."
 SOV_expand_markets: "Expandir nuestros horizontes"
 SOV_expand_markets_desc: "Nuestra producción ha alcanzado un nivel suficiente para inundar el tercer mundo con bienes, capturando los mercados de los países en desarrollo. Desde simples baratijas hasta electrodomésticos y ropa, el logotipo \"Made in USSR\" será un símbolo de calidad asequible en todo el mundo. ¡Jugaremos el papel de un gigante comercial, fortaleciendo nuestra influencia económica en estas naciones! ¡Los bienes de consumo soviéticos serán una exportación muy rentable para nosotros!"
 SOV_develop_our_markets: "Desarrollar nuestros mercados"
 SOV_develop_our_markets_desc: "En lugar de depender de las exportaciones, nos centraremos en desarrollar el consumo interno. Nuestros ciudadanos merecen acceso irrestricto a bienes de calidad producidos en las fábricas de la Unión. Debemos preparar la economía para una autarquía completa si volvemos a enfrentar el aislamiento internacional. ¡Las empresas públicas y privadas deben estar preparadas para trabajar exclusivamente para el consumidor nacional, proveyendo al país de todo lo que necesita!"
 SOV_brand_new_ussr: "URSS nueva"
 SOV_brand_new_ussr_desc: "Aunque usamos la misma estética, la misma bandera roja, y aunque seguimos siendo el mismo Partido Comunista, por dentro todo es completamente diferente. La nueva Unión no es como la que cayó hace más de 30 años; para la nueva generación, la antigua URSS no es más que una imagen en un libro de texto o una exposición en un museo. La gente ya no vive con planes quinquenales y el romance del koljós; tenemos una economía diferente, una estructura social diferente y una visión del mundo diferente. Esto no es razón para renunciar a nuestra gloriosa historia, pero es hora de reconocer: estamos construyendo una página completamente nueva e independiente en el libro de nuestro comunismo y del comunismo en su conjunto."

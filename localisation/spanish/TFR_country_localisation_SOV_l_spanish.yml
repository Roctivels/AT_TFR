 SOV_rashkinism_idea: "Rashkinismo"
 SOV_socialism_with_human_face_idea: "Socialismo con rostro humano"
 SOV_socialism_with_human_face_idea_desc: "\n\n\n\n£GFX_socialism_human_face_banner\n\n\n\n\n\n§Y\"Nuestra teoría no es un dogma, sino una guía para la acción\".\n- F. Engels§!\n\nMultipartidismo, pluralismo político, democracia y humanismo: estos son los principios que los comunistas, representantes de la ideología más progresista y en constante evolución, debemos respetar para alcanzar nuestros objetivos. El pueblo debe saber que el Partido está comprometido con el desarrollo y la mejora del modelo socialista, y no con una simple restauración del pasado. Solo considerando los desafíos y necesidades actuales de la sociedad, y aprendiendo de las lecciones de la historia, podremos lograr la victoria de las ideas de Lenin en nuestra época."
 SOV_partocracy: "Partidocracia"
 SOV_partocracy_desc: "\n\n\n\n£GFX_partocracy_banner\n\n\n\n\n\n§Y\"Nuestro partido, como cualquier otro partido político, aspira a la supremacía política\".\n- V. Lenin§!\n\nEl Partido Comunista es precisamente la fuerza que puede unir a nuestra sociedad en estos tiempos difíciles, uniendo a las personas en torno a objetivos e ideales comunes. Creemos en el poder de la solidaridad, la ayuda mutua y el esfuerzo colectivo. Creemos que solo mediante la unidad y la cooperación podemos alcanzar la verdadera prosperidad. Solo el Partido Comunista está listo para crear una sociedad verdaderamente justa e igualitaria para todos en el futuro. Si nos mantenemos unidos, ¡juntos podemos lograr la victoria de las ideas de Lenin en nuestro tiempo!"
 SOV_zyuganovism: "Ziuganovismo"
 SOV_zyuganovism_desc: "\n\n\n\n£GFX_zyuganovism_banner\n\n\n\n\n\nEl §tziuganovismo§! es una ideología inspirada en Guennadi Ziugánov, que lleva a Rusia a nuevas alturas bajo la bandera del Partido Comunista. Se basa en el respeto por los valores históricos de la Unión Soviética, el orgullo nacional y la justicia. Sus principales componentes son: el §dpatriotismo soviético§!, el §Rmarxismo-leninismo§! y el §Osocialismo ruso§!. El §tziuganovismo§! es una interpretación moderna de ideologías clásicas adaptadas a los desafíos del mundo moderno y tiene como objetivo crear una sociedad justa y próspera para todos sus miembros."

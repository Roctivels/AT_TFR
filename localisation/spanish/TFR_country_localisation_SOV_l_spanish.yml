 russia.749.d: "In one of our big cities, loyal subjects organized a massive rally for the well-being and health of the Tsar and his family. Many flags and portraits of previous Tsars were seen. Truly marvelous."
 russia.852.t: "Disunited Coalition"
 russia.852.d: "Our actions have led to an appalling decline in the ONF's cohesion. Different sides of the front are constantly proposing their own initiatives and blocking others, completely paralyzing any activity. The Duma is mired in disputes and is barely able to function. If we want to continue stable rule, we need to avoid such incidents as often as possible."
 russia.852.a: "Tendremos que negociar."
 russia.853.t: "The Tamed Leviathan"
 russia.853.d: "When Boris Nadezhdin became president, the ONF got in his way. The eternal, immovable coalition that suppressed any attempts at reform in the country. As if a beast from biblical legends, it entangled all spheres of political life. But Boris Borisovich did not give up. After all, if he had retreated at the first setbacks, he would never have found himself in the place of the president of the Russian Federation initially. Step by step he excluded the superfluous from the front. Radicals, supporters of the status quo. All of them were not necessary for a free and prosperous country. And now, seemingly invincible, the beast has bowed its head. Now the ONF reflects the will of the Russian people and consists mostly of moderate reformers loyal to Nadezhdin. History continues and now it will be written by the people together with Nadezhdin."
 russia.853.a: "And we play out our last scene."
 russia.854.t: "Transparent Government"
 russia.854.d: "One of the initiatives of the Nadezhdin reform program is to increase transparency in the work of government agencies. The ONF generally supports the president's proposal, but there are disagreements within the coalition about how this reform should be implemented.\nThe right wing of the ONF insists on the phased implementation of the principles of openness, expressing concern that sudden and hasty changes could destabilize and even partially paralyze the work of the government. At the same time, more radical positions are being voiced from the left flank: supporters of drastic measures are convinced that the reform will have a real effect only if all officials involved in corruption and questionable cases are immediately removed so that new, ideologically motivated personnel can take their places.\nDespite the different views, the discussion should not reach an impasse, therefore, as a result of the meeting of the State Duma, it was decided..."
 russia.854.a: "Slowly reform the system."
 russia.854.b: "It's time to kick out all the parasites!"
 russia.855.t: "Pension Programme"
 russia.855.d: "Pension reform has become one of the most discussed areas of the current reform policy. The President has clearly outlined a course to review pension policy, and the Popular Front coalition, despite the general support, shows different approaches to achieving this goal.\nThe conservative wing points to the need to increase pension payments and social benefits. In their opinion, the improvement of the quality of life of the elderly population should occur without drastic changes in the current social system. Conservatives emphasize that budget sustainability is more important than short-term concessions and call for a balanced, economically sound approach.\nThe left, on the contrary, advocates a simple reduction in the retirement age, insisting that citizens have the right to a well-deserved rest earlier than stipulated by current norms. Their arguments are based on the principles of social justice and caring for the working person.\nBoth options have a basis, but it is also worth considering that our coalition must remain united, and therefore the decision must be made carefully."
 russia.855.a: "Increase benefits and pensions."
 russia.855.b: "Lower the retirement age."
 russia.856.t: "Tax Changes"
 russia.856.d: "The consideration of tax reform has become another stumbling block in the Nadezhdin government. The proposal coming from the president received majority support, but immediately showed discrepancies within the coalition: the issue of redistributing the tax burden affected both economic priorities and the ideological foundations of the poles of the ONF.\nThe right wing of the Front advocates the introduction of tax holidays for small and medium-sized businesses, emphasizing that this will give the economy the necessary boost, stimulate entrepreneurial activity and create new jobs.\nOn the other hand, leftist forces insist on the introduction of a progressive scale of taxation. In their opinion, it is a fair redistribution of the tax burden that can eliminate social inequality and provide additional funding for existing social programs.\nAlthough both proposals have their pros and cons, it is necessary to take into account that the position of each wing of the coalition as a whole must be taken into account."
 russia.856.a: "Introduce Nadezhdin tax holidays."
 russia.856.b: "Introduce a progressive tax."
 russia.857.t: "Anti-Monopoly Programme"
 russia.857.d: "The antimonopoly program proposed as part of the Nadezhdin reforms has become one of the topics that has caused widespread agreement within the Popular Front. Recognition of the need to curb the influence of large corporations has been voiced on both the right and left sides of the coalition, but the extent of acceptable government intervention remains controversial.\nThe right wing insists on a cautious approach: they stress that excessive pressure on big business can cause unpredictable consequences and slow down economic development.\nThe left, on the contrary, requires more drastic measures. In their opinion, only strict restrictions and the active intervention of antimonopoly authorities can restore a fair market environment and guarantee the protection of the interests of citizens and small businesses.\nThe issue remains quite sensitive, and therefore, following a meeting of the State Duma, it was decided..."
 russia.857.a: "Imponer restricciones."
 russia.857.b: "Imponer restricciones estrictas."
 SOV_nadezhdin_plan: "The Nadezhdin Plan"
 SOV_nadezhdin_plan_desc: "When Nadezhdin came to power, he promised liberalization to all of Russia. And he is not going to stop with changes in the political sphere. It is time to restructure Russia's economy to better meet the aspirations of Russians."
 SOV_state_corporations_liberalization: "Liberalization of State-Owned Companies"
 SOV_state_corporations_liberalization_desc: "During Dmitry Medvedev's term, quite a few companies previously owned by oligarchs were taken directly into state ownership and their management was... Let's just say, far from optimal. Perhaps we should reconsider our management approach a bit and allow new ideas to refresh our revenue stream a bit?"
 SOV_restructuring_public_sector: "Restructuring of the Public Sector"
 SOV_restructuring_public_sector_desc: "In the course of our liberalization of state-owned companies, we have suddenly discovered that the organization of our public sector itself is far from optimal. Some of them can be safely merged, and some of them can even be gotten rid of without conscience. All the more so, maybe they would be more useful in private hands."
 SOV_public_private_partnership: "Public-Private Partnership"
 SOV_public_private_partnership_desc: "This is partly the merit of the previous administration, but the fact is the fact. Many private entrepreneurs are simply afraid to do business in Russia. Such feints with the taking away of labor and sweat grown businesses and their subsequent redistribution in favor of loyal oligarchs clearly did not benefit our economy. It is time to put an end to this unpleasant stigmatization and prove that the private sector and the state not only can do business together, but must actively support each other in order for the economy to remain healthy."
 SOV_diversification_state_revenue: "Diversification of State Revenues"
 SOV_diversification_state_revenue_desc: "For a long time, the Russian economy has been dependent on the resource sector and most of the revenues to the state treasury come from there. However, keeping all the eggs in one basket is a very dangerous strategy and it would not be superfluous to slightly secure the revenues of our state."
 SOV_comprehensive_support_medium_small_business: "Comprehensive Support for Businesses"
 SOV_comprehensive_support_medium_small_business_desc: "Medium and small businesses have always been in a bit of a precarious position in Russia. The state has always looked at the large corporations owned by oligarchs, either supporting them or nationalizing them, as happened during Dmitry Anatolyevich's last term. It's time to rethink the way we look at the economy and start comprehensive support programs! After all, everyone should have the opportunity to open their own coffee shop. Shouldn't we?"
 SOV_optimize_social_security: "Optimize Social Security"
 SOV_optimize_social_security_desc: "Social security has always been a significant item of our state's expenditures. And supporting citizens is certainly the right move. But the execution has left much to be desired. It is time to revise our approach and do it right. First of all, we will review the bureaucratic problems of allocation of funds, because sometimes the allocation is very complicated by these delays. Then we will reconsider who exactly and how much of the funds go to whom. Perhaps not everyone is equally deserving."
 SOV_affordable_housing: "Focus on Affordable Housing"
 SOV_affordable_housing_desc: "The housing issue has become a real scourge of our country in the 21st century. Most young citizens of our country are forced to live with their parents or rent apartments, unable to afford housing. Is this the case? It is time to launch affordable housing programs for all segments of our society!"
 SOV_demographic_revitalization: "Demographic Recovery Project"
 SOV_demographic_revitalization_desc: "Russia, just like the states that have made the 5th demographic transition, has faced a terrible truth. The population is aging and dying, and there is no one to replenish it because of the decline in birth rates! It is necessary to launch state programs to support the population and increase the birth rate so that Russia in the next century will not become a legacy of history.\n\nWe are Russians and we want more of us!"
 SOV_return_innovative_economy: "Return to an Innovative Economy"
 SOV_return_innovative_economy_desc: "For some time the Russian Federation has been following the idea of an innovation economy. The development of new markets and the principle of their diversity were the basis. Of course, our government later abandoned the development of this economic model for one reason or another, partly due to active confrontation with the West in economic terms, among other things. The time has come to return to these times. The Russian innovation economy is making a comeback."
 SOV_reject_cheap_labour: "Rechazar la mano de obra barata"
 SOV_reject_cheap_labour_desc: "Cualquier trabajo debe ser remunerado dignamente y, a veces, los intentos de las empresas o incluso del sector público de \"ahorrar dinero\" en salarios deben ser detenidos. Un trabajador satisfecho es, ante todo, un trabajador productivo. Además, al lograr salarios dignos, la gente podrá gastar este dinero de forma más activa, reinvirtiéndolo en la economía."
 SOV_technological_modernization_production: "Modernización tecnológica de la producción"
 SOV_technological_modernization_production_desc: "Nuestros métodos de producción están, digamos, en una condición no mala. Obviamente, una potencia económica débil no podría derrotar a toda Europa sola, pero siempre hay margen para crecer."
 SOV_nurture_cadres_future: "Formar a los cuadros del futuro"
 SOV_nurture_cadres_future_desc: "Es fácil vivir el presente y pensar solo en el beneficio actual. Sin embargo, así como el día viejo será reemplazado por el nuevo, las generaciones cambiarán y la economía y el Estado seguirán adelante. Entonces, ¿por qué no ayudamos a nuestros herederos de antemano creando métodos efectivos para formar nuevos cuadros que reemplacen a los antiguos? Que la nueva experiencia y los métodos probados creen una economía de la que no nos avergoncemos y que en el futuro proporcione una afluencia de especialistas altamente cualificados."

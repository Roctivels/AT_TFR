 russia.867.t: "Emoción muerta"
 russia.867.d: "El inusual estilo de gestión del presidente y las audaces reformas emprendidas por su gobierno a menudo conducen a consecuencias inesperadas. Uno de los resultados de la reestructuración de la vida política del país ha sido un segundo aire en los casinos de la capital.\n\nLos emprendedores en ciernes, modestamente deambulando como perros con correa, siguen desesperadamente a los bohemios locales y a los políticos rusos emergentes. Cada domingo por la noche, todos invariablemente convergían en la Casa de Juego de Moscú. Lo que sucedía allí se parecía más a un baile que a un espacio de juego. Alguien ansioso por hacer nuevas conexiones, alguien interesado en los detalles siempre crecientes de escándalos y chismes, y alguien que solo quiere pasar el tiempo. A pesar de la variedad de esta compañía, para todas las personalidades aquí hay una regla tácita: ninguno de ellos juega por grandes sumas de dinero.\nTodos los tontos atrevidos que osaron atraer la atención de la multitud, que lograron una gran puntuación, solo causaron indiferencia y una tranquila condescendencia. Invariablemente, horas después, los jóvenes jugadores se unían al ejército en constante expansión de personas que habían perdido sus posesiones, para quienes la entrada a este lugar estaría cerrada por mucho tiempo.\nMientras destrozaban los destinos de los siguientes valientes y de los inútiles \"creadores\" que se aferraban a cada hombre que encontraban, personas amigables observaban modestamente este tranquilo festín, sin beber, sin jugar.\n\n\"Serguéi, ¿tienes a Márkov en tu lista?\"\n\"Sí, claro, ¿por qué?\"\n\"Táchalo, acaba de perder todo el dinero en las cartas\".\n\"Ghh... ¡Dios mío, lo acabo de conocer hoy! ¿Por qué no se quedó quieto?\"\n\"Olvídate de él, solo sigue a los diputados. Cuando se emborrachan, te cuentan todo lo que necesitas y no necesitas saber. Confirmado por un servidor\".\n\"¡Sí, gracias! Y yo que empezaba a esperar que hubiera algo interesante en este trabajo...\""
 russia.867.a: "El que no arriesga gasta su dinero en champán."
 russia.868.t: "Gran descanso"
 russia.868.d: "Exactly at midnight, deafening everyone present with an inarticulate scream, an unknown unkempt man burst into the crowded Casino hall, followed by his skinny assistant, who was barely carrying two briefcases full of money.\n- Steve, g..get the money out. W-what's this? A dollar, Steve? Throw this... pfft... Fucking suitcase away, and give me... hgghh... some real money.\nThe man, who had obviously too much alcohol, took the chips in his arms and, barely shuffling his feet, tried to find his way to the nearest gaming table, not paying any attention to others.\n- Hundred...\n- Mr. Green would like to bet 100,000, please.\n- M-more... I'l-I'll bet fve hndrd.\nThe noisy player sat with 18 points, the dealer scored 22. Bust! It's a win!\n- You win, Mr. Green!\nHe won? How? Time after time, he raises the bet and manages to come out a winner? That's not blackjack, that's stealing!\n- M-Mln... rbls...\nBet after bet, an intrigued crowd gathered around the noisy foreigner. The mere sight of his sickly skin color should have scared away those present, but wild interest prevailed over people's consciousness. Over time, all the attendees gathered to watch the foreigner's game.\n- MORE! TEN! I'll bet! T-ten!\n- 16, Mr. Green. You got 16, - Steve whispered quietly.\n- Hhhh... I... I can't. It's too much. H-heart... Ahhhh... - The player mumbled, losing consciousness.\n- Mr. Green? Mr. Green, are you okay? He's not answering. Looks like he hit his head on the table. I think, uh. That counts as a move. Card!\nGritting his teeth, the trembling dealer did what he had to do. Five.\n- TWENTY-ONE! MR. GREEN! You win! 20 million is yours! Mr. Green! Get up!\n- Uh... y-yeah. sure... B-better... Take me h-home... I don't feel, kghhhh, so good.\n-Your heart? For the third time in the last three days? You should take care of yourself, Mr. Green, come on, I'll take care of everything.\nLeaning on his assistant, the unusual man rushed towards the exit, scattering his newly earned chips towards the mesmerized onlookers.\n- Y'know, S-Steve... I'm a good tipper... H-here's. Hhhh... Here's... Five Rubles...\n- Whoa! Thank you, Mr. Green.\n- No problem, Steve. After all, you always bring me luck!"
 russia.868.a: "This man made an incredible impression on those around him."
 russia.868.b: "In the end, the main observers, were the law enforcers."
 russia.869.t: "Receta americana"
 russia.869.d: "- Mr. Green? There are dozens of people standing in the street, they want to meet you! Honestly, I don't know who they are, but they're, uh.\n- Competitors... Steve, they're trying to destroy us. I'm not gonna let our work turn to ash again. I'll go out to them, but as soon as they do anything to me, just run...\n- Mr Green!\nAn American businessman opened the doors of his business and stepped out into the bustling crowd. He was not drunk, but simple steps were difficult for him. He took a fighting stance and prepared to defend his creation.\n- Mr. Green! It's really you! You are an incredible inspiration to us all!\n- Mr. Green! Do you remember me? A month ago, you gave me some of your money! I'd like to thank you! Here! Here take this!\n- Jeremy! You look as good as ever! That's quite a business you got going on. Do you need any help? I'm ready to buy up everything you've got!\nThe factory owner had little understanding of Russian, and he could hardly distinguish the jagged phrases of the people shouting at each other, but at that very moment he felt a strange relief.\nA few years ago, his business was ruined, robbed, and destroyed. For a long time, along with his faithful assistant, he had wandered the world in search of shelter, but now? No more hardship and suffering, no more worry and loss. Had he really found his home here?\nAfter gathering his thoughts, Mr. Green straightened up, squared his shoulders, and smiled at those present. Sensing the attention, he said confidently:"
 russia.869.a: "How about a little charity?"
 russia.870.t: "Declaración de impuestos"
 russia.870.d: "\"¿Para qué te envié a ese maldito casino? ¿Para relajarte? ¿Para que me informaras de alguna tontería? ¿Qué te hizo un simple borracho americano? ¿Eh? ¡Estás buscando espías en el lugar equivocado!\"\n\"Camarada Mayor, pero usted mismo dijo... Informar, tomar acciones independientes decisivas si fuera necesario, vigilar y defender con celo las instalaciones socialmente importantes de nuestro estado y a la gente allí... ¡Según las instrucciones!\"\n\"¿Según las instrucciones? ¿Por qué lo encerraste? ¿Qué hizo? ¿Asustar al crupier? ¿Volver loco al dueño? ¡Teniente! Quizás también iba cinco kilómetros por encima del límite de velocidad. ¡Solo dímelo! ¡Siempre estoy feliz de ayudar! ¡Pasarás del FSB a la policía de tráfico en un abrir y cerrar de ojos!\n¡La Madre Patria te ha confiado una tarea particularmente peligrosa e importante de protección y recopilación de inteligencia! ¡Es una misión secreta, Teniente! ¿ME ENTIENDES? ¿Y si fue una distracción? ¿Y si el enemigo aprovechó tu negligencia y entró al edificio con armas? ¿Eh?\"\n\"Camarada Mayor, la noche transcurría sin problemas, ¡y luego dos vándalos gritando irrumpieron en la sala! ¡Decidimos capturar a estos extranjeros altamente sospechosos! ¡No podíamos hacer la vista gorda ante sus payasadas! ¡Ni siquiera sabemos quiénes son!\n\"¡Exacto! ¡No tienes absolutamente ni idea de quiénes son! ¡Bueno, yo sí! ¡Un viejo enfermo con presión arterial alta y su amigo, anunciando el gimnasio más cercano con su cara viscosa! ¡ESOS SON!\"\n\"Pero nosotros...\"\n\"Tú... ¿Cuál es el resultado, eh? ¿10 mil? ¿Quieres decir que un hombre que ganó 20 millones en un casino de la noche a la mañana no tuvo tiempo de pagar 10 mil rublos en impuestos? ¿Ese es tu criminal mundial? ¡Dejen libres a esos pobres diablos! Si es que pueden llegar a la salida por sí mismos. Lárgate de aquí\".\n\"Sí, Camarada Mayor\"."
 russia.870.a: "Serguéi, creo que nos pasamos un poco."
 russia.871.t: "The Mysterious Green Man"
 russia.871.d: "A few weeks had passed since the moment when the mysterious foreigner had burst into the capital's casino, and, after making a fortune, had instantly disappeared as if nothing special had happened. Regular measured evenings were getting more and more boring, political squabbles and dirty scandals receded into the background. Every time people came to this hall, they hoped to see a miracle again - a shouting, unkempt businessman who knew no defeat - a fleeting symbol of fabulous wealth.\nGradually, all conversations began to come down to this incident. Some tried to raise their contacts to find the mysterious American, others talked to their acquaintances, and to their own surprise learned that the successful player had methodically traveled all over Moscow, visiting one gambling establishment after another, and each time with unchanged success.\nAt one point, a confident voice came from the gathered crowd:\n- Jeremy Green! That's his full name. With the money he made, he recently bought a chocolate factory two hours from here. There's your answer!\nThe mysterious guy, who revealed the secret to people, apparently wanted to extinguish interest in the identity of the American and move the conversation in another direction, however, the effect was quite the opposite.\nThe next morning, dozens of expensive cars rushed to the factory. The desire to learn business secrets? Expecting to see something supernatural?"
 russia.871.a: "Most likely, people were motivated by trivial interest."
 russia.2011.t: "Shevchenko pide más reformas"
 russia.2011.d: "Maksim Shevchenko, que se ha mantenido relativamente en silencio durante el mandato de Vladímir Zhirinovski, ahora busca recuperar su influencia política adoptando una forma más radical de reformismo. Al regresar al Partido Ruso de la Libertad y la Justicia (PRLJ), su objetivo es empujar al gobierno actual, liderado por Leonid Slutski, hacia transformaciones políticas y económicas aún más extensas.\n\nEn un reciente mitin en San Petersburgo, rodeado de sus leales partidarios y aliados políticos, Shevchenko declaró su compromiso de lograr una sociedad verdaderamente democrática en Rusia y erradicar el legado del autoritarismo de una vez por todas. A pesar del escepticismo social generalizado hacia su visión radical, podría atraer el apoyo de muchos liberales que lo ven como su candidato más viable.\n\nImpulsados por la creciente insatisfacción con los desafíos económicos del país y la precaria situación en las regiones fronterizas de Rusia, los esfuerzos de Shevchenko podrían tener cierto éxito."
 russia.2011.a: "Son solo palabras."
 russia.2011.b: "Debemos reducir su influencia."
 russia.2012.t: "El golpe de Moscú"
 russia.2012.d: "Hoy marcó el fin de la presidencia de Shevchenko, y la ira de la derecha había llegado a un punto de ebullición. En una reunión militar secreta, el general Kartápolov reunió a generales de derecha, funcionarios no purgados, exmiembros del PLDR y burócratas desleales. Advirtió sobre las amenazas del Gobierno del PRLJ y anunció los preparativos para un derrocamiento. El plan se puso en marcha, con soldados y tanques rodando por las calles de Petersburgo y Moscú. La televisión y los medios estatales fueron tomados por leales de derecha, instando a los ciudadanos a mantener la calma.\n\nAlgunos soldados y demócratas pro-Shevchenko intentaron resistir, pero sus esfuerzos fueron inútiles contra la abrumadora fuerza militar. Prometiéndoles nuevos beneficios después de tomar el poder, los soldados depusieron las armas.\n\nEl presidente Shevchenko fue puesto bajo arresto domiciliario, y la mayor parte de su administración fue detenida. Andréi Kartápolov, ahora el líder de facto de la oposición unida de derecha, se dirigió a la nación por televisión. Declaró una nueva era y anunció un referendo sobre el futuro del nuevo Gobierno."
 russia.2012.a: "El fin del experimento."
 russia.2013.t: "Este tren está en llamas"
 russia.2013.d: "Durante generaciones, los líderes rusos -desde zares hasta secretarios generales y presidentes- han despojado al pueblo de su honor y dignidad. Se han apropiado de los logros de la nación, dejando poco espacio para que los ciudadanos se enorgullezcan de su éxito colectivo.\nAhora es el momento de liberarse. Debemos exigir independencia y liberación de la tiranía y la corrupción. Es hora de reclamar nuestros triunfos y tribulaciones como propios. Nuestra verdadera fuerza reside en nuestra identidad colectiva y nuestro espíritu indomable.\n\nNuestros soldados y trabajadores, pasados y presentes, pueden finalmente encontrar consuelo, sabiendo que son los verdaderos héroes de nuestra nación, no los autoproclamados \"gobernantes supremos\". Son ellos quienes han derrotado repetidamente a invasores y agresores.\n\nLa democracia prospera cuando restauramos el orgullo de nuestro pueblo."
 russia.2013.a: "Es hora de reclamar esta tierra."
 SOV_consolidation_of_society_desc: ""
 SOV_slutsky_path_focus_1_desc_1: "The renewal of the country is impossible without changes in the public consciousness. Society should not just follow the changes, but become their initiator, sharing the goals and values of the new era. A country confident in its path relies on a society of the future that is capable not only of accepting change, but also of creating it."
 SOV_slutsky_path_focus_1_desc_3: "Russia is riddled with a split of unprecedented proportions: a split into \"reds\" and \"whites,\" leftists and Rightists, Bolsheviks and White Guards. Even a century later, the October Revolution leaves no one indifferent, its influence is so strong. But at the same time, she divides all Russian politics into two camps. We were close to resolving this issue in '93, but then the pro-Yeltsin forces won, and the red-brown alliance collapsed. Now that Dmitry Rogozin is at the head of state, we can finally overcome the strife of the past and build a New Russia together!"
 SOV_slutsky_path_focus_1_desc_2: ""
 SOV_slutsky_path_focus_1_desc_4: "Zhirinovsky is a figure of our time, not just for Russia but for the LDPR itself. No one else could have done as much for the party's public image as its founder. Even after his death, we are often seen as his party, which has significantly boosted our popularity. However, while many recognize our identity, not everyone sees Slutsky as the best successor to Zhirinovsky."
 SOV_slutsky_path_focus_1_desc_5: "The history of Russia is without a doubt one of the most difficult and eventful stories in the whole world. Our country has experienced everything. Epochs of unification and disintegration. Devastating wars that would have left no trace of another civilization. However, the people of Russia endured everything and did not give up. And therefore, attempts to divide our history are primarily an attempt to divide the people of our country, which we cannot allow."
 SOV_slutsky_path_focus_1_desc_6: "Our countrymen were always abused by authoritarian state Our people have always faced harsh treatment at the hands of authoritarian regimes. They've been sent to die in pointless wars, while their leaders profit from the bloodshed. We must remember and honor every citizen for their sacrifices, not just the self-appointed leaders., sent to die, and to win unwinnable wars, while their leaders take all the glory, we say no more. Our citizens deserve to be remember to be praised for their efforts in every conflcit, and not self-proclaimed fathers of peoples"
 SOV_slutsky_path_focus_2_desc_4: "The time has come to lay the foundation for a new stage in the country's history - the creation of a true Nation-State. It will be a union of a renewed society, responsible government and clear national guidelines. A new state will combine respect for traditions with the development of science, culture, economics and other spheres of society. It will strive to ensure that the rights and freedoms of citizens are protected, and that work, initiative and responsibility find real support. The national idea will become a solid foundation for the internal development of the country and strengthen its position in the world."
 SOV_slutsky_path_focus_2_desc_2: "Our state faces an unprecedented task: to reconcile Russian history, full of contradictions that tear our people apart to this day. The next step to solving this problem is to create a comprehensive ideology that can unite the people, while at the same time having a solid historical foundation.The name of this ideology is Syncretic Nationalism. Combining the social orientation of Soviet power and the strong national bias of the Empire and Zhirinovsky's Russia, it is designed to become the very bridge that can reunite the entire Russian history into a single whole!"
 SOV_slutsky_path_focus_2_desc_3: ""
 SOV_slutsky_path_focus_2_desc_5: "Russian is not just a nation. Russian is a vocation, it is belonging to the greatest civilization in the world. These are the greatest works of culture and breakthrough achievements in science. And to be Russian, it is not necessary to be a Slav, we will accept both Caucasians and Central Asians, and anyone else as long as they respect our culture and want to be a part of it. Our greatest writer even had Ethiopian roots! That is why our patriotism is all-Russian and no one can take away our love for the Fatherland."
 SOV_slutsky_path_focus_2_desc_6: "The current national policy is a chauvinistic nightmare that will not pave the way for stable decades ahead. Ukrainians and Belarusians must be granted more rights to avoid repeating the mistakes of the Tsars and the USSR."
 SOV_slutsky_path_focus_2_desc_1: "The LDPR is a place where ordinary Russians come to voice their concerns, find solidarity, and feel a sense of national pride. We stand by Russia's side, with members spread across the country, often unnoticed as our party evolves. Our young, well-groomed deputies resonate with the nation and their constituents. Despite changes in administration, our slogans remain steadfast."
 SOV_slutsky_path_focus_3_desc_4: "Along with other areas of public administration, the system of federalism should also develop. We are not talking about its abolition - on the contrary, it is planned to strengthen it through rethinking approaches and freeing it from excessive bureaucratic burden. More flexible and fair management methods will strengthen the interaction between the center and the regions, make the system more transparent, efficient and result-oriented.Russia's strength lies in justice, and it is justice that must underpin all management methods."
 SOV_slutsky_path_focus_3_desc_2: "Russia's pride is its military traditions and bravery. The Russian warrior has repeatedly shown his prowess in battles. The recent war with the West has only strengthened faith in the strength of our army. Russian soldiers, like their great-grandfathers in 1945 and distant ancestors in 1813, liberated most of Europe and brought glory to the Fatherland. We praise our warriors who defeated the Western plague!"
 SOV_slutsky_path_focus_3_desc_3: ""
 SOV_slutsky_path_focus_3_desc_5: "The Donbass model has already proved its effectiveness, having been tested by the war with Ukraine. Adapting this model across the board may not be the easiest task, but if we succeed, it will make government much easier for us."
 SOV_slutsky_path_focus_3_desc_6: "Our current approach to social issues falls short. The government must extend aid to those in need while also bolstering the military-industrial complex. This expansion is championed by the LDPR's warmongering members."
 SOV_slutsky_path_focus_3_desc_1: "Over the years, we have forged a new kind of Russian citizen. We have shaped them, creating a community bound not just by blood but by shared spirit, faith, and a readiness to sacrifice for the nation. This has given us a loyal populace and, crucially, capable bureaucrats, police officers, soldiers, and many others who keep our nation stable."

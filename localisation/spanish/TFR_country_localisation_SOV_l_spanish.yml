 SOV_social_economic_reformation: "Reforma socioeconómica"
 SOV_social_economic_reformation_desc: "Nuestra economía fue diseñada para apoyar a las industrias militaristas y a los empresarios ricos que se benefician del conflicto. Es hora de devolver el enfoque a quienes legítimamente ocupan un lugar central en nuestra sociedad: los trabajadores. Nos embarcaremos en la socialización de la economía."
 SOV_improve_factory_conditions: "Mejorar las condiciones de fábrica"
 SOV_improve_factory_conditions_desc: "Nuestros trabajadores soportan condiciones inseguras y peligrosas en las extensas fábricas construidas por el Gobierno de Zhirinovski. Para representar verdaderamente a la clase trabajadora, debemos obligar a los directores y propietarios de estas plantas a mejorar la seguridad donde sea posible y a proporcionar mayores beneficios para los empleados más vulnerables."
 SOV_belarus_economic_plan: "Plan económico bielorruso"
 SOV_belarus_economic_plan_desc: "Bielorrusia cuenta con un sector industrial robusto y diverso con un potencial sin explotar. Habiendo soportado la devastación de la guerra, el país necesita urgentemente la reconstrucción. Apoyaremos y financiaremos proyectos en estas regiones, con el objetivo de proporcionar oportunidades de empleo para aquellos afectados por el conflicto."
 SOV_develop_kazakh_lands: "Desarrollar las tierras kazajas"
 SOV_develop_kazakh_lands_desc: "Kazajistán sigue desarrollándose y podría beneficiarse de más proyectos industriales y de infraestructura. Esto ayudaría a atraer a más personas a estas regiones, impulsando el crecimiento demográfico. Ubicado en lo profundo de Rusia, es poco probable que Kazajistán se vea afectado por nuevos conflictos potenciales."
 SOV_moderation_in_reforms: "Moderación en las reformas"
 SOV_moderation_in_reforms_desc: "Si bien es crucial no perder de vista el objetivo de lograr la igualdad, debemos reconocer que la economía moderna requiere un delicado equilibrio entre los sectores privado y público. El Estado tiene la responsabilidad de mantener este equilibrio y estar preparado para apoyar a la gente común."
 SOV_gentle_hand_over_private_business: "Mano suave sobre los privados"
 SOV_gentle_hand_over_private_business_desc: "Debemos supervisar vigilantemente las empresas privadas, listos para intervenir discretamente cuando descubramos mala conducta, ya sea que involucre maltrato a empleados, evasión de impuestos o cualquier otra práctica ilícita a la que empresarios sin escrúpulos puedan recurrir para obtener ganancias."
 SOV_worker_protection_laws: "Leyes de protección al trabajador"
 SOV_worker_protection_laws_desc: "Los trabajadores deben ser protegidos a toda costa. Promulgaremos reformas que empoderen a los empleados de los sectores industrial y otros para defender sus derechos a través de un nuevo marco legal. Además, mejoraremos su tiempo libre y ofreceremos diversas subvenciones por su excelente trabajo."
 SOV_a_fair_economy: "Una economía justa"
 SOV_a_fair_economy_desc: "Debemos priorizar los intereses de todas las personas, incluyendo a los trabajadores y las pequeñas y medianas empresas. El gran capital a menudo busca evadir responsabilidades y explotar a otros, pero no podemos permitir que esto continúe. Necesitamos crear una economía donde cada participante sea tratado de manera justa, sin ser aprovechado por aquellos con mayores recursos financieros."
 SOV_worker_controlled_unions: "Control obrero de sindicatos"
 SOV_worker_controlled_unions_desc: "Los sindicatos son esenciales para la armonía entre un Estado próspero y su clase trabajadora. Sin embargo, a menudo caen bajo la influencia de intereses capitalistas o se empantanan en la lentitud burocrática. Esto debe cambiar. Se establecerán nuevos sindicatos, con la membresía activamente fomentada. A diferencia de muchos otros, estos sindicatos tendrán una línea directa con el Gobierno."
 SOV_educate_the_nation: "Educar a la nación"
 SOV_educate_the_nation_desc: "Rusia es una tierra de mentes brillantes, muchas de las cuales a menudo pasan desapercibidas. El Gobierno de Zhirinovski ignoró a los estudiantes de pueblos y regiones pequeñas, favoreciendo a aquellos de áreas más ricas y grandes. La nueva reforma educativa tiene como objetivo restaurar el antiguo sistema y traer a jóvenes de todo el país a universidades de prestigio, ayudándolos a forjar un futuro mejor para Rusia."
 SOV_crackdown_on_monopolistic_capital: "Lucha contra el capital monopolista"
 SOV_crackdown_on_monopolistic_capital_desc: "Las grandes corporaciones monopolísticas son una plaga que afecta no solo a los individuos, sino también a las pequeñas empresas. Interrumpen la naturaleza justa y equilibrada de las relaciones de mercado al ejercer control desde el exterior debido a sus vastas propiedades. Nuestra agencia antimonopolio abordará este problema. Desmantelaremos muchas de las queridas corporaciones imperiales de Zhirinovski, si es necesario, expondremos la corrupción y los acuerdos ocultos que protegen sus intereses."

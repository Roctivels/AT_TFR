 SOV_Russian_Orthodox_Church: "Iglesia ortodoxa rusa"
 SOV_Russian_Orthodox_Church_desc: "\n\n\n\n£GFX_SOV_russian_orthodox_church\n\n\n\n\n\nDurante más de mil años, el cristianismo ortodoxo ha sido la religión dominante en Rusia, desde finales de la Rus de Kiev hasta los días del zar. Sin lugar a dudas, nuestro pueblo era extremadamente religioso, especialmente los del campo, y a pesar de los mejores esfuerzos de la Unión Soviética por promover el ateísmo, todavía lo es. Como tal, la Iglesia ortodoxa rusa es una de las armas más poderosas que el presidente Putin tiene a su lado.\n\nSi bien la Iglesia se asegura de ejercer la influencia del presidente sobre toda la población anciana de Rusia y las áreas rurales de nuestra Federación, también puede usarse para desacreditar cualquier forma de oposición o cualquier movimiento que pueda afectar negativamente a nuestra propia cultura, como el movimiento LGBT. A cambio, nos hemos asegurado de reconocer a la ortodoxia rusa como el principal grupo religioso de facto en Rusia y de restringir el crecimiento de otros grupos cristianos. Como tal, podemos estar seguros de que el clero permanecerá a nuestro lado y de que nuestros ciudadanos tienen algo de qué preocuparse, además de los constantes reveses de nuestro Gobierno."

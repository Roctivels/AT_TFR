 russia.817.t: "ROVS recupera su relevancia"
 russia.817.d: "Con la restauración de la monarquía y el subsiguiente retorno del manifiesto de Octubre, nuestro gran Imperio ha sido testigo del auge de una forma más conservadora de lealismo, especialmente entre los militares.\n\nUno de esos grupos es el antiguo ROVS, que afirma ser el sucesor directo de la organización de Wrangel del mismo nombre. En regímenes anteriores, era un pequeño grupo de unas pocas figuras militares monárquicas, pero ahora ha comenzado a ganar popularidad entre los oficiales actuales y parte del personal de menor rango del Ejército Imperial.\n\nDurante muchos años, Ígor Ivánov fue el presidente nacional de la organización. Sin embargo, a medida que se unían más miembros nuevos y figuras influyentes ganaban poder, fue apartado por Vadim Krasnoselski, el exjefe de Transnistria y un acérrimo monárquico.\n\nROVS afirma proteger al pueblo ruso y al Gobierno natural ruso -el zarismo- de amenazas tanto internas como externas. Promueve posiciones más duras, muchas de las cuales son fuertemente antidemocráticas."
 russia.817.a: "¡Gloria a Rusia!"
 russia.818.t: "¡El canciller Zatulin fue baleado!"
 russia.818.d: "En San Petersburgo, la inauguración del monumento a Alejandro II. El emperador de Rusia, su familia y séquito, incluido el canciller Zatulin, así como invitados extranjeros, asistieron a este solemne evento.\n\nComo parte de la celebración, el emperador y su séquito visitaron el Teatro de la Ciudad de San Petersburgo, donde vieron la obra \"El cuento del zar Saltán\". Sin embargo, antes de que comenzara la función, el jefe del departamento de seguridad de la ciudad recibió información inquietante. Timur Rajmetula dijo que Anna Frolova, una terrorista, había llegado a la ciudad y planeaba atacar a un funcionario de alto rango, y posiblemente al propio zar.\n\nDurante el segundo intermedio, Zatulin conversó en la barrera del foso de la orquesta con Roman Starovoit, Ministro de Transporte, y el conde Tipisev, un conocido magnate de la ciudad. De repente, Timur Rajmetula se acercó a Konstantín Zatulin y disparó dos veces con la pistola Makarov. La primera bala alcanzó el brazo del canciller, y la segunda le dio en el estómago, impactando en el hígado. Zatulin se salvó de la muerte instantánea por la cruz de San Vladimiro, que, al romperse, cambió la dirección de la bala, impidiendo que le diera en el corazón. Sin embargo, a pesar de esto, la bala penetró el pecho, la pleura, la pared abdominal y el hígado, causando graves daños.\n\nEl tirador fue inmediatamente detenido por el personal de seguridad del zar. Todo el teatro fue evacuado, y el canciller fue enviado de inmediato al hospital de la ciudad, donde los mejores cirujanos del país están trabajando en él.\nActualmente, el estado del canciller es extremadamente grave, ¡y las posibilidades de su rescate son extremadamente bajas...!"
 russia.818.a: "El canciller Zatulin fallece tristemente..."
 russia.819.t: "Nuevo canciller"
 russia.819.d: "In the aftermath of the terrible shooting of Chancellor Zatulin, we must continue government work. Now it is up to the Tsar to select the official successor.\nThere are several prominent politicians and statesmen in the Union of 17 October party. One of them is Victor Vodolatsky, an old Cossack ataman who represents the more hardline side of the party. He could be a suitable candidate if we need to focus on security and preventing future terrorist acts of dissent.\n\nThe second candidate is Roman Starovoit, the current Minister of Transport and the former Governor of Kursk. He is well-suited for a more moderate approach and has proven expertise in dealing with crisis situations and transport issues.\n\nFinally, there is Drozdenko, the governor of St. Petersburg, who is not particularly well-known but is competent. He is not an especially proactive bureaucrat, but he would make a good candidate for a stable government."
 russia.819.a: "Vodolatski..."
 russia.819.a1: "This must not happen again! Russian needs a firm Chancellor..."
 russia.820.t: "Burkov Challenged!"
 russia.820.d: "The number of party members who are not satisfied with the way Alexander Burkov leads the party has been increasing. This is likely due to the emergence of a more radical faction within the party, which has gained strength by uniting with moderate Marxists and former communists.\nThis issue came to a head at an extraordinary party meeting, where Burkov was openly challenged to defend his moderate and centrist policies. His critics pointed out that he was unwilling to reform democratic institutions to make them more like Western models of constitutional monarchy.\nThe radical faction is led by Mikhail Matveev, a former member of CPRF who has distanced himself from Bolshevism. He has always been known for his non-communist and sometimes nationalistic views.\n\nBurkov is about to take the stage to discuss the matters of his administration..."
 russia.820.a: "Radicals successfully overpower Burkov!"
 russia.820.b: "Burkov defeats his opposition!"
 russia.821.t: "Nueva ideología de Rogozin"
 russia.821.d: "Cuando Rogozin asumió la presidencia, se propuso crear una nueva ideología que fuera exclusivamente rusa y sirviera como fuerza guía para nuestra nación bajo su liderazgo. Entre las ideas clave que nuestro nuevo presidente consideró, se encontraban tres constructos ideológicos fundamentales:\n\nLa revolución rusa: Las políticas de Rogozin implicarán pasos revolucionarios más directos. Después de todo, Rogozin representa un enfoque nuevo y más progresista de la identidad nacional rusa en comparación con cualquier régimen anterior. Nuestro Estado avanzará hacia el totalitarismo y el control directo, con la política de partidos completamente rechazada. Todas las decisiones serán tomadas por una burocracia estatal leal únicamente al gran líder, elegido personalmente por él.\n\nSocialismo soberan: Uno de los desafíos de nuestro nuevo régimen es la aparente incapacidad de fusionar dos formas distintas de pensamiento: la imperial y la soviética. Sin embargo, podemos superar esto desarrollando una doctrina ideológica coherente que reconcilie estas dos facciones \"en guerra\" de la historia rusa.\nTanto los zares como los secretarios generales tuvieron su cuota de decisiones correctas e incorrectas. No hay necesidad de continuar la división. El partido se reformará y las facciones se integrarán para unir a patriotas apasionados que trabajen por el mejoramiento de la patria.\n\nLa última opción es un poco más heterodoxa, pero también más socialista que las anteriores. Se llama Ordosocialismo, que significa socialismo del orden. Este enfoque concibe nuestro nuevo Estado como una vanguardia revolucionaria, similar a cómo los viejos bolcheviques imaginaban su Estado global. Utilizaremos tanto ideas nacionalistas como símbolos socialistas para atraer a diferentes partes de la sociedad a unirse a nosotros.\nSin embargo, este enfoque conducirá a la creación de facciones dentro de nuestro partido. Estas facciones abogarán por políticas más de \"izquierda\" o de \"derecha\"."
 russia.821.a: "Nueva. Revolución. Rusa."
 russia.821.b: "Imperial y social."
 russia.821.c: "Nuevo Orden para Rusia."
 russia.822.t: "Strelkov And Rogozin Gain Relevancy"
 russia.822.d: "After Slutsky announced plans to make political life more open and even hinting at the chance of holding the first post-war elections after more reforms, many nationalists who didn't align with the LDPR under Zhirinovsky began to return to the forefront of Russian politics.\nTwo prominent figures in this movement for a truly national Russia are Dmitry Rogozin and Igor Girkin (Strelkov). Both were excluded from the LDPR politics due to their many conflicting interests with Vladimir Volfovich.\n\nRogozin, in his quest for nationalist support and backing, also relies heavily on Soviet imagery and the glorification of Soviet life and experience. This was not possible under the leadership of Zhirinovsky, but thanks to the so-called Slutsky Thaw, he now has the freedom to express his ideas. And despite everything, there are still people who appreciate and glorify the Soviet era, even if they don't directly support Marxist ideology, and Rogozin is their man. He found his place in Rodina party, old and mayhaps Surkov's project, but still the closest thing to Rogozin's personal views, especially after he ousted the previous chairman by having more membership support.\n\nStrelkov-Girkin is a true legend in the Russian nationalist movement. He started as a fighter in the Pridnestrovie War and then, according to him, became one of the main commanders in the Donbass War. This earned him the respect of many people, especially those who consider themselves militaristic and imperialistic.\nHis supporters are numerous and often loyal only to him. They attack any other figureheads they deem unworthy and disloyal. He organized his supporters around the Club of Angry Patriots, where he criticized every decision made by Zhirinovsky on the battlefield. Now it's the Union of Militant Patriots, which seeks to establish strict rule in both civilian life and, especially, in military life."
 russia.822.a: "Era de esperarse."
 russia.823.t: "Milchakov And His Men Organize ORSN"
 russia.823.d: "Who is Milchakov? To some, he may be a hero, but to others, he's a war criminal, a mass murderer, a devil, and according to some accounts, even a cannibal. Despite the best efforts of the government under Zhirinovsky to prevent any normalization or publication of Rusich materials and ideological concepts, Milchakov's name became well-known, especially after the start of the European war.\n\nAlthough neither Rusich nor Milchakov personally took part in most of the fighting in Eastern Europe, their infamy followed them.\n\nNow, after the war and Slutsky's \"democratic\" reforms, these men are again raising their heads. They see a possible \"political future\" for themselves and a chance to spread their own vision for our country.\nHere it is! The political project of Milchakov, Topaz, and Petrovsky has been revealed. They describe it as a place where strong Russian men can come together to defend the country's natural interests and identity: Organization of Russian Social Nationalists.\n\nDespite the organization's inherent extremism, the current political atmosphere may give it a chance to gain some ground in local city councils or even secure one or two seats in the upcoming National Senate elections."
 russia.823.a: "Oh, bueno."
 russia.824.t: "Longtime Nationalists Assemble"
 russia.824.d: "Recent reforms have led to the emergence of more radical and nationalistic, often monarchist, groups. On the old streets of St. Petersburg and Moscow, hardened Russian nationalists have come together to once again defend Russia from what they see as its weaknesses and Bolshevism.\nThey criticize Slutsky even though they used to criticize Zhirinovsky when he was alive. Now they see him as a martyr, who was poisoned by Jews or communists. The details of these conspiracies vary depending on the person.\nTheir new slogans are the same as their old ones. Many of them have been on the political frontlines for many years.\n\"Who else but us?\" they say, and then they recite their old forgotten prayers to the tsar family, the Empire, and the Mother of God.\n\nThe organization that brings them together again is the good old Society Pamyat, either rejuvenated or created anew - it doesn't matter, it's here and it has something to say.\n\nDespite the organization's inherent extremism, the current political atmosphere may give it a chance to gain some influence in local city councils or even secure one or two seats in the upcoming National Senate elections."
 russia.824.a: "The Pamyat Society... Our Holy Father..."
 russia.825.t: "Nuevos rojos rusos"
 russia.825.d: "Gentlemen, I have terrible news for you all! Nature has been so \"cleansed\" thanks to Slutsky that you can even see reds on the streets!\nYes, I'm completely serious! Today, one of these \"imperial redheads\" wanted to give me his pamphlet about the war of capital and labor, of course I tolerated it, I'm still a cultured person, otherwise I would have punched this red-bellied! I took the pamphlet.\n\nIs that really what we fought for, compatriots?  So these reddish bastards, who only verbally recognize the restoration of the borders of our Great Russia and sorta of combine Russian terms with their socialist nonsense, could just walk around and spoil the view of our beautiful Russian cities like Izhevsk? \nFor How Long, my beloved Russian people! My readers! I'll tell you, this would not have happened under Zhirinovsky! All these idiots who fly red rags along with our great imperial tricolor would be sent to butyrka! And it would be the right thing to do, gentlemen!\n\nRussia is a country of Tchaikovsky, Dostoevsky, not Dzerzhinsky or Beria. Lenin was thrown out, very well... We need to dig up all these burial grounds near the Kremlin! It's a pity, of course, that your Slutsky, whom OUR YOUTH rely on so much, will definitely not do it now. These red ones are more important to him, and he said, \"National Democracy is first and foremost democracy.\" Checkmate, that's all. Horror.\n\nAn excerpt from a personal Online Magazine under the nickname - TimurArmatatulin91. The author's spelling is preserved."
 russia.825.a: "¡Terrible!"
 russia.827.t: "CALL OF LDPR: FINAL WAR"
 russia.827.d: "Well, our investments have, in a sense, borne fruit. The youth experts did not experiment and turned to the already well-known Mehsoft studio, which had previously released a small game called Call of LDPR.\nNow, thanks to the financing, they were able to create a sequel to this game, significantly improving the gameplay.\n\n\"CALL OF LDPR: FINAL WAR\" is a brutal shooter full of violence and drive. In this game, the player assumes the role of a soldier of Zhirinovsky's Elite Guard, sent to the heart of neoliberal-occupied Europe.\nPlayer goes through many levels, each of which is filled with the unique cultural heritage of different regions of the EU. In these levels, he encounters a variety of enemies and encounters unusual mechanics.At the end of the journey, the player finds himself in Brussels, where cyber-bureaucrats and the final reptilian boss from the planet Nibiru are waiting for him. Despite the fact that the game has received many positive reviews in our country, it has been banned in many EU countries. This product is intended for the domestic market only. But on the other hand, we were able to win the love of young gamers and earn some money from internal sales."
 russia.827.a: "It's sure is something!"
 russia.828.t: "El zar está muerto 2"
 russia.828.d: "Our investments were not very successful. The LDR youth organization decided to support the little-known developer \"Machine Joy\", who was known only for his novel \"The Czar Is Dead\". Perhaps they hoped that with the help of financing, the developer would be able to develop this idea and show the inner world of the Tsar of All Russia more deeply in a playful way.\nHowever, as a result, the developer created a completely new sequel game to his first one, which was completely different from it. Now it's a DOOM-style RPG shooter, telling the story of Nikolai Romanov's struggle against the Communists and the Anglo-Saxon invaders. The tsar managed to escape from execution, but the little Tsarevich was abducted by villains and taken away to an unknown destination. Nikolai personally takes up arms and sets out to take revenge.\n\nThe game has very specific graphics and an even more specific narrative. It turned out to be too niche and esoteric for most players, who had already figured out a lot from the graphics.\n\nAs a result, we received neither money nor patriotic education. Hundreds of memes have appeared on the Internet on the topic of \"where the bosses spend their money.\""
 russia.828.a: "Bueno..."
 SOV_labor_democracy: "Labor Democracy"
 SOV_labor_democracy_desc: "Employees of enterprises should be able to monitor their work, even if it may affect productivity.\nTrade unions are great, of course, but we also need control in the workplace.\nThe Empire is already ready for more radical steps towards a new socialism that does not contradict the monarchical system."
 SOV_fund_religious_schools_desc: "For some reason, many Russians have a fixed stereotype that religious schools are a place for losers. But wasn't it the same religion that preserved knowledge in the dark Ages? Has this religion always been an island of stability in an ever-changing world? In order to combat these prejudices, we will invest money in opening new religious schools and modernizing existing ones."
 SOV_stability_and_security: "Estabilidad y seguridad"
 SOV_stability_and_security_desc: ""
 SOV_empower_military_officers: "Empower Military Officers"
 SOV_empower_military_officers_desc: ""
 SOV_army_service_propaganda: "Army Service Propaganda"
 SOV_army_service_propaganda_desc: ""
 SOV_unified_loyalist_forces: "Unified Loyalist Forces"
 SOV_unified_loyalist_forces_desc: ""
 SOV_zealous_anti_bolshevism: "Zealous Anti-Bolshevism"
 SOV_zealous_anti_bolshevism_desc: ""
 SOV_enforce_martial_law: "Imponer la ley marcial"
 SOV_enforce_martial_law_desc: ""
 SOV_chancellor_commander: "Chancellor-Commander"
 SOV_chancellor_commander_desc: ""
 SOV_cabinet_of_patriots: "Gabinete de patriotas"
 SOV_cabinet_of_patriots_desc: "In the first all-Russian elections after the death of the great Vladimir Zhirinovsky, an unexpected candidate won. Denis Pushilin, the former leader of the DPR, and now the president of Russia, was seen as a dark horse from the very beginning. However, thanks to his calls for all-Russian patriotism and promises to \"restore stability,\" he still managed to gain the trust of Russian residents. Surprisingly, the slogan \"We can do a lot!\" turned out to be especially successful. However, now is not the time to rest on our laurels. Denis Pushilin plans to restructure Zhirinovsky's system into something more reminiscent of Putin's Russia. Anyway, it's time to get to work!"
 SOV_embrace_big_tent_politics: "Embrace Big-Tent Politics"
 SOV_embrace_big_tent_politics_desc: "What difference does it make if you're a leftist or a rightist if you're a patriot of your homeland? Do people who sincerely care about their fatherland really have to fight with each other and conflict over slightly different views? Let's say no to far-fetched factionalism and division. There is a place for everyone in our party."
 SOV_saddle_the_opposition: "Saddle The Opposition"
 SOV_saddle_the_opposition_desc: "The opposition is the right thing for the state and it is necessary. Pluralism of opinions, democracy, and that's it. But it's even better if this very opposition is... accommodating. Don't get me wrong, criticism is necessary and important for the state. It's just better when these critics don't go overboard, and don't try to destroy the very foundation on which the country stands."
 SOV_reliable_tsentrizbirkom: "Reliable Tsentrizbirkom"
 SOV_reliable_tsentrizbirkom_desc: "It doesn't matter how they vote, it's important how they think,\" it's not known who exactly uttered this phrase at the time, someone attributes it to Stalin. However, the gist of this quote is correct. Who knows what kind of manipulations could have taken place in the elections and referendums held in the past? In order to prevent such manipulations in the future, we will need to carry out serious changes in the Central Election Commission. Of course, this is all to ensure that the results are always as correct as possible."
 SOV_systematize_russian_militia_duty: "Systematize Russian Militia Duty"
 SOV_systematize_russian_militia_duty_desc: "The militia served our state very well during the war in Donbas, and it is very surprising that in Russia itself this tactic began to advance only during the war with NATO, and very crumpled and rather ineffective. The time has come to systematize the Russian militia and create a powerful framework for this initiative."
 SOV_trumpet_of_the_state: "Trumpet of the State"
 SOV_trumpet_of_the_state_desc: "The media has always been an incredibly important tool, and it's not for nothing that they are sometimes called the fifth branch of government. That is why all citizens of our country should know about our successes! Television, newspapers, and online news outlets. All this will broadcast about how good it is to live in our country. And why do European countries salivate with envy and want to destroy us!"
 SOV_new_towers_of_kremlin: "Nuevas torres del Kremlin"
 SOV_prioritize_mvd: "Prioritize MVD"
 SOV_prioritize_mvd_desc: "The recent events that took place after the death of Vladimir Volfovich have taught us one very unpleasant but important lesson. If we suddenly get distracted and lose sight of traitors and other terrorists, then without a doubt our entire system will go to waste. To prevent this, we need to ensure stability, especially internal stability, which the Interior Ministry will help us with. An increase in the budget and powers certainly won't hurt them."
 SOV_glorify_military_service: "Glorificar el servicio militar"
 SOV_glorify_military_service_desc: "Soldiers, brave soldiers who, despite all the hardships, see their vocation in protecting the interests of our vast homeland. Can any self-respecting state leave such people on the sidelines of life? Of course not! Being a soldier should be prestigious, respected by fellow citizens on the one hand and benefits from the state on the other. Moreover, in this way we will be able to attract more people to this difficult service."
 SOV_favor_novorossiyan_personnel: "Favorecer al personal novorruso"
 SOV_favor_novorossiyan_personnel_desc: "Novorossiya officials performed better than others during the struggle for independence and during the European War. And therefore it was wrong to leave them exclusively in Novorossiya. Moreover, the clashes between the hawks and the reformists have left us some room for action in this regard. So why don't we promote proven, competent, and loyal people?"
 SOV_new_towers_of_kremlin_desc: "Anyway, it is impossible to force all people to follow a single party line. Including in the government.  Various influential people will stick to like-minded people, organize groups and even conflict with rivals. On the other hand, it allows the political life of our country not to stand still. The undercover struggle may seem like something bad on the surface, but in reality it is only a natural result of the development of our political system."
 SOV_sovereignty_above_all: "Sovereignty Above All"
 SOV_sovereignty_above_all_desc: "Any country exists only when it is independent. If a state cannot live without trading with someone, relies on someone's armed forces, or, in the most neglected case, cannot conduct its own foreign policy, then it is not a country. It is a raw material appendage or a separate market, not a country. This is not the future we want for Russia, and therefore its sovereignty will come first in our state!"
 SOV_new_russian_era_rogozin: "Nueva era rusa"
 SOV_new_russian_era_rogozin_desc: "Arise, great Motherland, home to diverse peoples of various creeds, nationalities, and religions. A new era dawns upon us all. Russia shines as a beacon of virtue and sanctity, where citizens actively engage in the life of our great nation through democratic and national government bodies. Enemies, both internal and external, may attempt to undermine us, but we will not falter. We are a proud people."
 SOV_new_russian_era_yuneman: "Nueva era rusa"
 SOV_new_russian_era_yuneman_desc: "Arise, great Motherland, home to diverse peoples of various creeds, nationalities, and religions. A new era dawns upon us all. Russia shines as a beacon of virtue and sanctity, where citizens actively engage in the life of our great nation through democratic and national government bodies. Enemies, both internal and external, may attempt to undermine us, but we will not falter. We are a proud people."
 SOV_new_russian_era_girkin: "Nueva era rusa"
 SOV_new_russian_era_girkin_desc: "Arise, great Motherland, home to diverse peoples of various creeds, nationalities, and religions. A new era dawns upon us all. Russia shines as a beacon of virtue and sanctity, where citizens actively engage in the life of our great nation through democratic and national government bodies. Enemies, both internal and external, may attempt to undermine us, but we will not falter. We are a proud people."
 SOV_new_russian_era_pushilin: "Nueva era rusa"
 SOV_new_russian_era_pushilin_desc: "Arise, great Motherland, home to diverse peoples of various creeds, nationalities, and religions. A new era dawns upon us all. Russia shines as a beacon of virtue and sanctity, where citizens actively engage in the life of our great nation through democratic and national government bodies. Enemies, both internal and external, may attempt to undermine us, but we will not falter. We are a proud people."
 SOV_slutsky_path_focus_1_loc_5: "United Russian History"
 SOV_slutsky_path_focus_2_loc_5: "Rejuvenate All-Russian Patriotism"
 SOV_slutsky_path_focus_3_loc_5: "Mimic Donbass Model"
 SOV_truly_national_government: "Un verdadero Gobierno nacional"
 SOV_truly_national_government_desc: "The people of Russia have made their choice - Roman Yuneman and his Society.Future will lead the country. They will lead Russia towards the ideal of national democracy through the methods of reform and modernization. There is a lot of work ahead, and it is necessary to start it as soon as possible. The new leadership of the country intends to change the relationship between society and the state, building transparent management methods and a strong civic culture. Attention will be paid to the reforms of the federal system and the development of the national army. Russia is entering an era of change - confidently, with dignity and with self-confidence."
 SOV_uphold_the_russian_world: "Uphold the Russian World"
 SOV_uphold_the_russian_world_desc: "The main value of Russia is its great, multifaceted people. And Russia must protect the interests of its people, regardless of where they are located - in the country or outside its borders. Russian Russians have been, are, and will continue to be the main guarantor of the security of the Russian world - all those who speak Russian, honor our culture, and share common values. Supporting compatriots abroad, protecting their rights and dignity, and strengthening national unity are all integral parts of national policy.In a world full of challenges and changes, Russia remains a pillar for all who feel part of it."
 SOV_russia_first: "Rusia primero"
 SOV_russia_first_desc: "Russia and its citizens are the main priority of our policy. It is here, inside our country, that the nation lives. The interests of Russia and the well-being of its population are above all external factors and abstract concepts.The state must take care, first of all, of those who live and work on its land, pay taxes, raise children, and build a future. Russia is not a blur of borders or a ghostly unity, but a strong, independent country with its own people, its own culture and its own destiny. Rossia - first of all"
 SOV_popularize_party_ideology: "Popularize National Democracy"
 SOV_popularize_party_ideology_desc: "La opinión de los ciudadanos rusos sobre su política y su rumbo es indiscutiblemente importante. La voz del pueblo debe ser el factor decisivo para establecer prioridades y decidir el rumbo del desarrollo del país.\nBajo los auspicios de los principios de igualdad y libertad, fortaleceremos las bases de la armonía social, fomentando en la gente un sentido de preocupación por el destino de su país. Las ideas de la democracia nacional se convertirán en la columna vertebral de un nuevo orden social, donde todos serán escuchados y se reconocerá el valor de la persona. La responsabilidad cívica es el camino hacia la prosperidad del país."
 SOV_modernize_russian_armed_forces: "Modernize Russian Armed Forces"
 SOV_modernize_russian_armed_forces_desc: "Russian democracy needs reliable protection. And throughout history, the army has been the main guarantor of the security and stability of the state. Today, as the country moves along the path of change, the reform of the army should be as important as other transformations. The army must be timely, efficient, professional and respected - both inside and outside the country.New Russia has a new army capable of responding to any challenges with dignity and honor."
 SOV_strelkov_state: "Strelkov's State"
 SOV_strelkov_state_desc: ""
 SOV_all_russian_militia: "Milicia panrusa"
 SOV_all_russian_militia_desc: ""
 SOV_new_patriotic_army: "New Patriotic Army"
 SOV_new_patriotic_army_desc: ""
 SOV_rulebook_of_russian_officer: "Rulebook of Russian Officer"
 SOV_rulebook_of_russian_officer_desc: ""
 SOV_russify_kiev: "Rusificar Kiev"
 SOV_russify_kiev_desc: ""
 SOV_russian_national_pride: "Orgullo nacional ruso"
 SOV_russian_national_pride_desc: "What are our people proud of? Russian people are proud of their historical memory: the princes of antiquity, the \"chicks of Petrov's nest\", the commanders of the 19th century, and the heroes of the 20th century who defended the freedom of the Fatherland with blood are not forgotten. The Prussian people are proud of their land: vast and rich in everything they need for a happy life. We are proud of our culture, our science!\n\n We are proud that we are Russians!"
 SOV_the_moral_code_of_the_patriot: "Código moral del patriota"
 SOV_the_moral_code_of_the_patriot_desc: "One of the main problems of our country is a rather apolitical population. Even despite all the efforts of both Putin's and Zhirinovsky's Russia, most of the population remains indifferent to our government.Everything starts small, so every student in our country from now on will be required to join the Unarmy and know by heart the carefully compiled \"Patriot Code\" - a set of rules and commandments by which the new generation of Russians will live. It will teach you how to love your Homeland, assemble a Kalashnikov assault rifle and other skills useful for future warriors, as well as how to love and be ready to give your life for the Leader."
 SOV_russian_national_red_army: "Russian National Red Army"
 SOV_russian_national_red_army_desc: "The modern Russian army is for the most part an apolitical structure that does not have any coloring and swears allegiance to the country, not to ideas. In the new reality, having such a poorly controlled structure is fraught with consequences.This is why the Armed Forces will be transformed into the National Red Army, the successor to both the Imperial and Soviet armies. Along with the renaming, \"political work specialists\", who are something like Soviet political officers, are introduced into the army structure. The army must protect the interests of the Russian working people!"
 SOV_the_leader_order: "La orden del líder"
 SOV_the_leader_order_desc: "The history of Russia is full of strong personalities around whom the country has consolidated: Peter the Great, Catherine II, Joseph Stalin and Vladimir Putin are just the most striking of them. And now, when the threat of a second war is hanging over us, we must follow the orders of the Leader - as our ancestors did many centuries ago."
 SOV_together_to_greatness: "Together To Greatness"
 SOV_together_to_greatness_desc: "The history of Russia is the story of how each of its iterations, whether in the form of an Empire, Soviet power, or federation, tried its best to negate the previous one. Of course, with the coming to power of Vladimir Vladimirovich Putin, a course was taken towards reconciliation of Russian history, but he never completed the task. The further rule of Vladimir Volfovich only aggravated this problem.\n\nit is necessary to end the red-white confrontation once and for all, because it doesn't matter who you are for - for the reds or for the whites; The only important thing is that we are all Russians, and unnecessary quarrels only hinder our desire for a truly Great Russia."
 SOV_eternal_regency: "Regencia eterna"
 SOV_eternal_regency_desc: ""
 SOV_idea_of_the_imeprial_republic: "Idea of the Imperial Republic"
 SOV_idea_of_the_imeprial_republic_desc: ""
 SOV_adobt_new_military_doctrine: "Adopt New Military Doctrine"
 SOV_adobt_new_military_doctrine_desc: ""
 SOV_compulsory_military_education: "Compulsory Military Education"
 SOV_compulsory_military_education_desc: ""
 SOV_new_loyal_okhranka: "New Loyal Okhranka"
 SOV_new_loyal_okhranka_desc: ""
 SOV_devolve_the_ministries: "Devolve the Ministries"
 SOV_devolve_the_ministries_desc: "For further development and progress, the state needs a deep modernization of not only institutions, but also principles of governance. One of the key steps on this path is the revision of the bureaucratic system. When management becomes overgrown with excessive formality, truly important initiatives are lost under the weight of paperwork, efficiency decreases, and the initiative for change is extinguished. This slows down progress and prevents Russia from reaching its potential. In order for Russia to move forward confidently, it is necessary to make the system flexible and result-oriented. It's time to act openly and without delay."
 SOV_encourage_local_democracy: "Encourage Local Democracy"
 SOV_encourage_local_democracy_desc: "Who said that democracy should exist only at the national level? True democracy begins with everyday life - from the street, the neighborhood, the city. Strengthening people's participation in local affairs is an important step towards a fair future. This not only creates protection from the arbitrariness of local officials, but also creates a sense of personal importance for everyone. People should see that their opinion is not ignored, and their participation is not a formality. Democracy is not a once-in-a-few-years event, but a constant dialogue. Every vote counts. Every voice must be heard."
 SOV_protecting_russia_from_extremism: "Protecting Russia From Extremism"
 SOV_protecting_russia_from_extremism_desc: "Sometimes, in order to protect citizens and preserve the state structure, it is necessary to restrict individual freedoms. This is not at all a rejection of democracy and does not detract from the importance of the opinion of the people - on the contrary, it is precisely for the sake of the security of society and its stable development that such measures are being taken. Freedom cannot serve as a cover for destruction. True democracy is not chaos, but order, where everyone has the right to vote, but the general rules are respected by all."
 SOV_shining_beacon: "The Shining Beacon"
 SOV_shining_beacon_desc: "Throughout its history, Russia has been one of the key centers of European and world civilization - a cultural, spiritual and political landmark. She has always retained the ability to remain a pillar of support in times of change and upheaval, finding the strength to move forward and help others. Today, in the light of new challenges, it is Russia that can once again become the benchmark that nations will follow, striving to preserve sovereignty and protect their future. Russia will carry this light of hope, perseverance and faith into tomorrow. The very light that is especially needed when the world is facing difficult challenges."
 SOV_russian_civilization_renewed: "Russian Civilization Renewed"
 SOV_russian_civilization_renewed_desc: "The moment we've been working towards for so long has arrived. Russia has risen in all its greatness, gaining strength it did not have before. Today's Russian society clearly demonstrates how the principles of national democracy can work truly effectively. This is a new type of social structure based on respect for traditions and a clear vision for the future. The rebirth of Russia is a revolution in the name of conforming to the spirit of the times and building a new civilization."
 SOV_the_guiding_star: "The Guiding Star"
 SOV_the_guiding_star_desc: "Russia is once again rising from its knees in its history, and all thanks to the sensitive leadership of Dmitry Olegovich. Our Great Leader Rogozin strengthens and develops the successes of Putin and Zhirinovsky, faithfully follows their precepts.\nThese jobs are studied at school, universities, and workplaces. Of course, Dmitry Rogozin's teachings will be the foundation of the Russian state for years to come!"
 SOV_iron_fist_of_the_state: "Iron First of the State"
 SOV_iron_fist_of_the_state_desc: "Now is not the time for various cat-and-mouse games with subversive elements. The old system of competing law enforcement agencies with similar powers has become hopelessly frosted and has only made us weaker.\n\nThe final solution to this problem would be logical: centralization. The People's Security Committee will combine the functions of the border service, the Ministry of Internal Affairs and state security with almost unlimited powers. There can be no question of any mercy for the enemies of the Russian working people!"
 SOV_subversive_action: "Subversive Action"
 SOV_subversive_action_desc: "We don't have to arrest all our opponents. Moreover, this tactic may pay off in the long run, as happened with the purges of the 37th-38th years.\n\n Less effective now, but more desirable later, the solution to the problem of various \"democrats\" may be to work with the population. Every TV and speaker will provide the correct information, and nothing else. We will knock the ground out from under the feet of the enemies of our government.\n\n For the most zealous, we have our power structures."
 SOV_favor_the_russian_proletariat: "Favor the Russian Proletariat"
 SOV_favor_the_russian_proletariat_desc: "Modern Russia is a country where manual labor is completely out of favor. Due to the influence of the West, children dream of becoming not engineers and doctors, but businessmen and other purely capitalist elements. And because of what happened?Thanks to the actions of Yeltsin's criminal government and his plundering of the country, called \"privatization,\" Russia drowned in the thirst for easy money. And besides, cheap labor from Central Asian countries has finally finished off the Russian proletariat.We will correct this situation: improved social security, increased salaries and other benefits will make the prestige of working professions prohibitive!"
 SOV_reawaken_consciousness: "Reawaken Consciousness"
 SOV_reawaken_consciousness_desc: "What is the connection between a turner from Novokuznetsk and an office plankton from Moscow, a cashier from Vladivostok and a teacher from Minsk? Russian Russians and Russian culture are all united by their belonging to the Russian people. Throughout history, Russia has been strengthened under pressure: the Mongol yoke, the Troubles, the War of 1812, the Great Patriotic War - our fatherland rose with one accord to fight the invaders. Europe is preparing for revenge, and our people only need a small push from above to rouse them to the fight!"

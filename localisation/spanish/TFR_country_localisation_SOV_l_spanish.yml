 SOV_eurasian_armed_forces_dynamic: "Fuerzas Armadas Eurasiáticas"
 SOV_eurasian_armed_forces_dynamic_desc: "\n\n\n\n£GFX_SOV_Self_Defence_Forces_banner\n\n\n\n\n\n§Y\"V pravednoi voine za sviatuiu Rus\nYa s liubym vragom v smertnoi sjvatke soidus\nI nadeius, brat, chto smej nashij detei\nBudet gromche zvuchat na otchizne moei.\"§!"
 SOV_new_russian_army_category: "Ejército de la Nueva Rusia"
 SOV_new_russian_army_category_desc: "\n\n\n\n\n£GFX_SOV_new_russian_army_banner\n\n\n\n\n\n\n\n¿Qué son las Fuerzas de Autodefensa Rusas?\n¿Un grupo de veteranos a quienes se les encomendó un trabajo para no morir de hambre ni delinquir?\n¿Un ejército ineficaz que solo intervendrá en conflictos civiles?\n¿El ejército personal de Navalni para sofocar la disidencia?\n\n¡NO! Son la fuerza de la democracia, aquellos que no flaquearán ni abandonarán sus puestos. Los soldados han vivido un infierno y nos sirven no por ideología, sino por su compromiso con Rusia. Y nos aseguraremos de que estos luchadores por la libertad estén en plena forma para cualquier conflicto futuro, porque son la espada y el escudo de la Rusia del Futuro."
 SOV_Drone_Strike: "Apoyo aéreo de drones"
 SOV_Drone_Strike_desc: "\n\n\n\n£GFX_SOV_Drone_strike_banner\n\n\n\n\n\n§1\"V oblakaj kradiotsia\nDron, yemu neimiotsia\nOn, kak chiornyi voron\nMrachno smotrit na menia\nPadaiet i rviotsia\nTsel vsegda naidiotsia\nMilaia, spasi vsej nas\nOt etogo ognia\"§!"
 SOV_russian_economic_miracle_category: "La economía del futuro"
 SOV_russian_economic_miracle_category_desc: "\n\n\n\n\n£GFX_SOV_russian_economic_miracle_banner\n\n\n\n\n\n\n\nRusia siempre ha sido una nación industrial. Incluso durante el régimen anterior, el desarrollo industrial fue tan rápido que superó a Putin en tan solo unos años. Sin embargo, con una buena parte de nuestro territorio ocupado, ¡hemos logrado superar incluso eso!\n\nEl libre mercado nos ha convertido en uno de los mejores países para emprender un negocio, y aunque no estamos orientados a la exportación, aún podemos promocionar nuestros productos en casos locales. Rusia es un ave fénix que resurge de sus cenizas y recupera su lugar en el mundo."

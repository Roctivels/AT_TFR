 SOV_steel_revolution: "The Steel Revolution"
 SOV_steel_revolution_desc: "The historical process cannot be stopped, and Alikhanov's regime, being reactionary and repressive in its essence and attempting to appeal to the primitive nationalism of the masses, was ultimately overthrown by those very masses. However, what cannot be taken away from the former ruler of Russia is his foresight. Having previously purged the left-wing opposition, he thought he had protected himself from the possible wrath of the people. But leaders will always be found. Dmitry Yuryevich Puchkov and Klim Alexandrovich Zhukov rose to the head of the masses and overthrew Alikhanov's regime. The Steel Revolution was accomplished, and woe to all renegades. Glory to Soviet Russia!"
 SOV_spirit_of_the_soviet_russia: "Spirit of the Soviet Russia"
 SOV_spirit_of_the_soviet_russia_desc: "Only under Comrade Stalin did Russia and all the peoples inhabiting it experience true happiness. An ideal balance between social protection with confidence in the future and greatness. There has never been a wiser leader in the world, and there never will be. And Comrade Klim Zhukov will personally ensure that the leader's commandments are carried out without question."
 SOV_reestabilish_bolshevik_party: "Re-Establish the Bolshevik Party"
 SOV_reestabilish_bolshevik_party_desc: "The Bolshevik Party was essentially the vanguard of the working people, a means of expressing their will and a weapon in the struggle against revisionists and reactionary elements in society! Having stabilised the country, we can proudly announce the full establishment of the rule of the workers and peasants, as well as our readiness to defend the will of the working people with all our might."
 SOV_restore_stalin_constitution: "Restore Stalin's Constitution"
 SOV_restore_stalin_constitution_desc: "Stalin's 1936 constitution was a groundbreaking document for the 20th century. Also known as the \"Constitution of Victorious Socialism,\" it was incredibly progressive for its time, enshrining the rights of the working people to own the resources of the state, the rights to social security, and the direct participation of the people in elections. To date, no other state has been able to come close to the democracy and justice of this state-forming document. In this regard, in our twenties of the 21st century, we will restore this constitution, consolidating the victory over the forces of reaction and capitalism in our own country."
 SOV_cult_of_the_teader: "Cult of the Leader"
 SOV_cult_of_the_teader_desc: "There has never been a theorist in the history of the world whose works would eclipse the wisdom of Joseph Vissarionovich Stalin. Higher than the Himalayas and deeper than the oceans, his keen mind knew no bounds. His steely determination was able to transform a backward country into a world power! Taking over a country with a plough, he left his descendants a nuclear bomb and a gigantic industrial complex. Oh, Comrade Stalin, for 3,000 years and even more, your wisdom will be unmatched. Glory to you, greatest leader, comrade and simply thinker! Glory to your name, Joseph Vissarionovich Stalin!"
 SOV_revive_soviet_brutalism: "Revive Soviet Brutalism"
 SOV_revive_soviet_brutalism_desc: "Bourgeois decadence tends to flaunt material excesses. Marble columns, gold decorations, statues, and other interior elements serve as markers that a building belongs to the elite. Ordinary working people are not welcome in such places. The time has come for brutalism to take its revenge! The brain and determination of the proletariat, embodied in material form! Clear lines, devoid of frills, and maximum functionality. These are the ideals of Soviet architecture!"
 SOV_zealous_agitation_and_propaganda: "Zealous Agitation and Propaganda"
 SOV_zealous_agitation_and_propaganda_desc: "Living in a world dominated by capitalism and revisionism, we are constantly forced to put up with the bourgeoisie's stream of lies. Promising the working class some kind of freedom, democracy and social justice, they try to replace concepts, make everyone dance to Brussels' tune and become slaves to capital once again. That is why Soviet citizens must not rest! In the cinema, on the internet, in books! There must be continuous propaganda of our true ideals everywhere. Let the leaders of the Soviet state look down on them from the walls of buildings! Let the anthem of the RCP(b) play from all loudspeakers! We have already lost this battle for minds once, and a second chance did not come easily to us; there may not be a third."
 SOV_dogmatic_materialism: "Dogmatic Materialism"
 SOV_dogmatic_materialism_desc: "What is dialectics? It is a method of scientific knowledge developed by Hegel, which clearly postulates three laws: 1) the unity and struggle of opposites; 2) the transition from quantitative to qualitative changes; 3) the negation of negation. These laws are observed in all material manifestations. Just as a hare denies the coldness of nature with its fur and warm blood, so capitalism is constantly fighting socialism. Any deviation from the dogmatic positions formulated by Marx, Engels, Lenin, and Stalin, in this case, must be regarded as sabotage of the Soviet system and mercilessly punished as a manifestation of reactionary influence and even an attempt at revisionism."
 SOV_establish_total_control: "Establish Total Control"
 SOV_establish_total_control_desc: "When control of the country slipped from the hands of knowledgeable people in the 1950s, the greatest power in the world ceased to exist. Taking advantage of this, traitors, like cockroaches, gradually began to infiltrate all spheres of Soviet citizens' lives — from art to the party itself. And so, the greatest power on the planet ceased to exist. And the new, steel revolution may ultimately end in exactly the same way. The essence of the people is that they need constant control. And Dmitry Yuryevich Puchkov knows very well how to control the masses. We will not betray the achievements of October; the Soviet state will be pre-emptively disinfected of opponents of the people's regime."
 SOV_bureaucrats_under_watch: "Bureaucrats Under Watch"
 SOV_bureaucrats_under_watch_desc: "In the late Soviet Union, bureaucrats and party leaders enjoyed unprecedented privileges at the expense of the working class. This unpleasant flaw in the Soviet system was inherited by the Russian system. Agronomists and their sons thus imagined themselves to be the rulers and the main force in the state, which is fundamentally wrong. The Soviet people are the only rulers of the country, and to prevent such excesses, the emergency committee will keep the entire bureaucracy under tight control. All for the sake of the people."
 SOV_expansion_of_security_state: "Expansion of the Chekist State"
 SOV_expansion_of_security_state_desc: "To some, a Chekist state may seem like a backward and even barbaric form of government. However, in reality, it is a way of embodying the true will of the proletariat, peasants, and other segments of the population. As long as the people enjoy all the benefits of our state, the party leadership will keep watch over the order and correctness of the construction of socialism, and then communism. And the Extraordinary Committee will monitor their loyalty to the motherland. This is the only way to build an effective system."
 SOV_the_russian_party: "The Russian Party"
 SOV_the_russian_party_desc: "Contrary to arrogant liberals, it was the Soviet party that was the most Russian regime in the entire history of our state. Only under it did ordinary people enjoy the benefits that our vast homeland could offer. Culture — from cinema to history books — flourished, and it was then that the Russian people were held in high esteem among the family of nations. Other regimes tried to change this to suit their own narratives, but ultimately failed. That is why we will restore the most just system possible, one that takes into account the interests of the state-forming people."
 SOV_institutionalize_whistleblowing: "Institutionalize Whistleblowing"
 SOV_institutionalize_whistleblowing_desc: "Sometimes, certain narrow-minded citizens ask themselves, 'Who wrote the 4 million denunciations?' — and yet the most obvious answer does not occur to them. The denunciations were written by the hard-working and caring people of the USSR. Because the people of the USSR cared about the security and stability of the Soviet state. And that is why the return of this practice will not be something outlandish. We are not going to turn into Alcatraz, after all. We are simply giving the people a weapon to fight with."
 SOV_teach_the_young: "Teach the Young"
 SOV_teach_the_young_desc: "The youth of our Soviet state are in a difficult position. Most of the elderly who lived under Stalin have already passed away, and the new regimes have tried with all their might to tarnish our great history. The time has come to speak to young people in their own language. Let's not cram too much propaganda into programmes for young people, but sometimes it can be useful to just poke fun at the bourgeois pigs and laugh at them. The main thing is that young viewers don't end up completely brainwashed and that they learn something useful for themselves."
 SOV_merge_government_positions: "The Red Hierarchy"
 SOV_merge_government_positions_desc: "It so happened that in an imperfect human society, hierarchies of various kinds would arise one way or another. So it was most correct to build an ideologically balanced hierarchy that would bring maximum benefit to the state and then, with the advent of communism, could easily die out on its own. And so it happened that in the new Soviet state, the people, although formally at the lowest level (formally, of course, there were all kinds of outcasts even lower, but talking about them is just a waste of paper), still received their privileges and enjoyed the highest standard of living. Just above them was the party elite, which oversaw the construction of communism. And at the very top were the members of the Extraordinary Committee, who ensured that other strata did not fall under the influence of bourgeois and reactionary propaganda."
 SOV_pigs_to_the_slaughter: "Pigs To The Slaughter"
 SOV_pigs_to_the_slaughter_desc: "When Alikhanov's regime fell, it turned out that there were slightly more traitors and recruited scoundrels in our state than we would have liked. Like monsters from fairy tales, they retreated to their hidden corners and underground lairs, where they plot their intrigues against the young Soviet regime. Fortunately, we also have an answer. Our so-called \"underground sanitarians,\" in the form of Cheka employees, will clean up and disinfect the wounds on the body of our motherland and rid it of internal enemies of the system."
 SOV_the_stalin_model: "The Stalin Model"
 SOV_the_stalin_model_desc: "What is communism? Soviet power plus industrial might! That is why, just like in Stalin's time, we must invest in expanding the power of our state. Let black smog darken the sky and power station turbines roar! The Soviet state is returning to the world stage!"
 SOV_new_stakhanovite_movement: "New Stakhanovite Movement"
 SOV_new_stakhanovite_movement_desc: "The peculiarity of plans in our economy is that workers have an incentive to exceed them, because this will bring more benefits to our country, and workers will receive bonuses for this. Thus, we must encourage the emergence of \"counterplans\" so that young Stakhanovites will extract minerals and smelt steel with redoubled zeal!"
 SOV_industrial_paradise: "Industrial Paradise"
 SOV_industrial_paradise_desc: "Giant pipes tower above the factory buildings. Blast furnaces smelt tonnes of cast iron around the clock, and factories hum and clatter tirelessly day and night. Here it is, the man-made paradise that we have built with our own hands. The forge of a new world and a model to emulate!"
 SOV_reap_the_benefits: "Reap the Benefits"
 SOV_reap_the_benefits_desc: "Demanding selfless work from people, it would be extremely wrong to deprive them of the fruits of their labour. Thanks to the fair distribution of wealth, workers in our country, who labour day and night, enjoy the best living conditions. The shelves are bursting with food, electronics and luxury goods, and Soviet citizens can afford them thanks to our fair system. Three cheers for the Soviet people and their hard work! Hurrah! Hurrah! Hurrah!"
 SOV_loyal_military_force: "The New RKKA"
 SOV_loyal_military_force_desc: "The Workers' and Peasants' Red Army has always been the sword and shield of the proletariat, as well as the ultimate instrument for expressing its will. Defending the borders of the socialist state, it was the best in the world. From the taiga to the British seas, it had no equal! The time has come to revive the greatest army in the world and equip it with the best modern weapons."
 SOV_political_commissars: "Political Commissars"
 SOV_political_commissars_desc: "Some say that the army should be apolitical and blindly follow the path of the state. However, this is a reactionary fabrication, created specifically to brainwash soldiers and instil in them a lack of free will. Our state is inextricably linked to socialist ideology, and therefore even in the army, everyone must know what they are fighting for! Political commissars will carry out party work with members of the new Red Army and explain to them all the charms and importance of defending the socialist fatherland."
 SOV_soviet_war_phoenix: "Soviet War Phoenix"
 SOV_soviet_war_phoenix_desc: "The Soviet military machine is stronger than ever. Dozens of tanks roll off the assembly line every week, soldiers are armed with the latest technology, and the human reserve knows no bounds. Here it is, the very steel wave that will sweep away the capitalist order and carry out a successful world revolution... in the future. But for now, the hour of battle has not yet come, and this force must defend our borders, especially since the European enemy is not sleeping and is preparing for revenge."

 SOV_Kurenkov: "Aleksandr Kurenkov"
 russia.1000.d.Alikhanov: "Europa yace en ruinas mientras nuestro ejército victorioso marcha por sus antiguas capitales, ahora reducidas a cenizas y escombros. Los llamados ciudadanos de Europa están ahora bajo nuestro control.\nEn Rusia, los desfiles de celebración se han vuelto una vista familiar, pero este será el más grandioso hasta ahora. Rusia ha triunfado sobre toda Europa, desde Lisboa hasta Vladivostok, proyectamos una larga sombra sobre todo el continente.\n\nEn la cima del Kremlin se encuentra el cerebro detrás de esta mayor campaña militar. No, no eres tú. Es Antón Alijánov, un genio de nuestro tiempo. Alguna vez un paria, un hijo pródigo regresó, habiendo triunfado sobre todos sus desafíos y luchas por el poder. Para millones de rusos, es un héroe nacional. Para un número decreciente de críticos, es una figura anticristiana. Es cierto que se necesita un tipo especial de hombre, quizás uno bendecido por el destino, para cambiar radicalmente el mundo que los rodea. Solo el tiempo dirá a dónde irá este nuevo mundo ya que, a pesar de todo, Alijánov no es eterno...\n\nPero por ahora, el Imperio celebra, y su amado líder puede descansar un poco, ya que el poder supremo también es fuente de agotamiento supremo.\n\nEl derzhavismo se ha mostrado como una verdadera obra maestra del arte ideológico, nacido de la pasión y apoderándose de las mentes de millones en todo el mundo, no solo en Rusia. A pesar de la crueldad del régimen, quemando a miles en su celo por la purificación, millones más aún cantan al unísono: \"¡Salve a nuestro sabio y benevolente líder!\""
 russia.1000.t.Alikhanov: "Soldado, poeta, rey"
 russia.2126.t: "Partidos pequeños en Rusia"
 russia.2126.d: "Como era de esperar, además de las fuerzas políticas más duraderas, ha surgido una plétora de nuevas organizaciones y partidos en el panorama político ruso. Estos incluyen comunistas estalinistas dogmáticos, nacionalistas de ultraderecha más radicales, socialistas liberales y liberales de mercado. Aunque la mayoría de estos grupos no vale la pena mencionarlos, algunos podrían tomarse en cuenta si sus políticas son aceptables para que los futuros gobiernos las consideren en conversaciones de coalición o para hacerlos más visibles en el escenario nacional."
 russia.2126.a: "Es lo que es."
 russia.2127.t: "Primera Sesión de la Asamblea Nacional"
 russia.2127.d: "Tras los crecientes esfuerzos de democratización y la declaración de Alijánov, la Asamblea Nacional se reunió para su sesión inaugural. Con un total de 500 escaños, la mayoría ya están ocupados, mientras que las plazas restantes son muy codiciadas y solo se aseguran tras las primeras elecciones.\nInicialmente, los diputados se agruparon bajo la amplia bandera de \"Independiente\", pero pronto surgieron facciones distintas, evolucionando hacia nuevas entidades políticas. La más significativa de ellas es la \"Unión del Renacimiento Democrático Nacional\", respaldada por Alijánov. Compuesta por nacionaldemócratas, antiguos derzhavistas y algunos tecnócratas, se ha convertido en el nuevo partido dominante en Rusia. Mantuvo gran parte de la estructura de la SZND, pero la modernizó para adaptarla a un entorno más cívico.\n\nOtras facciones notables incluyen el Partido Nacional Constitucional Ruso, un grupo democrático y reformista liderado por supervivientes conservadores de purgas democráticas. Sin embargo, debido a su postura moderada y pasiva, es probable que se perciba como controlado y fácilmente comprometido.\n\nEl Partido de Desarrollo Industrial y el Sindicato de Rusia se centran puramente en los beneficios económicos para los capitales industriales y comerciales, mientras utilizan la Asamblea para competir por la influencia de las corporaciones financieras e industrializadas.\n\nLa facción más pequeña es el Sindicato Estatal de Trabajadores, una organización de izquierdas compuesta principalmente por nacionalistas de izquierda y socialistas nacionalistas. A pesar de su orientación izquierdista, principalmente abogan por un mayor control estatal y solo apoyan políticas de bienestar adaptadas a la clase trabajadora étnica rusa."
 russia.2127.a: "Una democracia más silenciosa."
 russia.2128.t: "Anton Alikhanov Drops SZND"
 russia.2128.d: "Shocking to many, Alikhanov officially declared himself independent, severing ties with SZND. In his announcement, he criticized party loyalty for blind adherence to dogma and refusal to acknowledge the truth. From now on, he would operate as an independent force in the country's life.\nHe also announced the impending first session of the National Assembly, a new body for 'democratic' participation. Critics swiftly noted the absence of rebuilt democratic institutions in Russia and warned that these reforms would merely improve appearances, creating a neo-aristocratic democracy dominated by elites and their interests while marginalizing genuine voices.\nDespite this, reformists celebrated their victory over SZND hardliners, who were now leaderless and politically sidelined."
 russia.2128.a: "Glory to Alikhanov, the wisest of the wise!"
 russia.2129.t: "Lo que queda de la gloria pasada"
 russia.2129.d: "A pesar de la eliminación de los derzhavniks intransigentes de la política, dejarlos sin una fuerza controlada podría ser desastroso para nuestro nuevo régimen.\n\nAunque muchos derzhavniks y sus seguidores están tranquilos con el estatus de Alijánov como jefe de Estado permanente, aún hay quienes priorizan la ideología sobre la preferencia personal. Estos son principalmente los abanderados y los renovadores, decididos a promover su visión del derzhavismo.\n\nPodríamos formar un partido político estable a partir de sus restos, supervisado y controlado por la nueva administración, para dar a sus seguidores la ilusión de representación.\n\nAlternativamente, podríamos intentar unir ambas alas del movimiento derzhavnik, animándolos a reintegrarse en la sociedad. Esto ampliaría nuestra influencia, pero requeriría más esfuerzo."
 russia.2129.a: "Usar a los abanderados; podemos aprovechar su militarismo."
 russia.2129.b: "Reunir a los renovadores; su piedad puede ser útil."
 russia.2129.c: "Combinar a ambos; al fin y al cabo todos son patriotas."

 SOV_great_victory: "Gran victoria"
 SOV_great_victory_desc: "Sacudiéndose el humo de la batalla, los modernos bogatyrs se levantan del campo de batalla sin sol. La diosa de la victoria los toma del brazo, y el sonido de la música triunfal llena el aire. El camuflaje gris se desvanece, reemplazado por relucientes uniformes de desfile, y las medallas brillan intensamente, simbolizando el dulce sabor de la victoria. Aunque el Imperio ruso aún tenga un largo camino por recorrer antes de dominar la tierra, hoy marca uno de los capítulos más gloriosos de nuestra historia. Los soldados, llevando el estandarte de Zhirinovski y coreando \"¡Viva Zhirinovski!\", marchan por las calles empedradas de la Plaza Roja, haciendo eco de las grandes victorias de París en 1815 y Berlín en 1945, marcando la gran conclusión de una era."
 SOV_death_of_leader: "Muerte de Zhirinovski"
 SOV_death_of_leader_desc: "En todo el mundo, las banderas rusas se arriaron al unísono, marcando el fallecimiento de Vladímir Vólfovich Zhirinovski, el líder supremo que fundó y expandió el Partido Liberal-Demócrata, llevó al Imperio ruso a un resurgimiento y aseguró la victoria en la Guerra Europea. Su legado está grabado en la historia rusa, con innumerables logros que nunca serán olvidados. Mientras cada ruso camina lentamente junto al ataúd de Zhirinovski, adornado con flores, una pregunta resuena en sus mentes: ¿Qué pasará ahora?"
 SOV_stabilize_the_administration: "Estabilizar la administración"
 SOV_stabilize_the_administration_desc: "Aunque no es lo que deseábamos, es la realidad. Desde la muerte de Zhinirovski, el Partido Liberal-Demócrata está desquebrajándose lento pero seguro. Facciones en el partido chocan sobre diferentes visiones para el futuro, con individuos ambiciosos ojeando la máxima posición. En el pasado, estaban unidos por el fuerte liderato de Zhinirovski, pero ahora esa unidad ha desaparecido. Mientras las tensiones  crecen sin poder ser reparadas, aquel que gane la ventaja y pruebe ser el más despiadado purgará a sus rivales y reclamará la autoridad de Zhinirovski. Y esa persona es...¿?"
 SOV_reward_war_heroes: "Recompensar a héroes de guerra"
 SOV_reward_war_heroes_desc: "Mientras olas de soldados vuelven del campo europeo, serán recibidos con bienvenidas entusiasmadas del pueblo ruso. Estos héroes de guerra serán bien recompensados por su servicio, con promociones, banquetes, medallas y bonos uno atrás del otro. Hasta los privados más ordinarios recibirán recompensas generosas, y los generales de alto rango serán honorados de la misma manera. Esto presenta una valiosa oportunidad para que el Partido Liberal-Demócrata fortalezca sus lazos con los militares, mejorando su influencia y asegurar la lealtad del ejército. es una situación donde tanto los soldados y el gobierno ganan."
 SOV_strengthen_security_forces: "Fortalecer Fuerzas de seguridad"
 SOV_strengthen_security_forces_desc: "La tensión en el país no ha disminuido desde la muerte del líder. Como se temía, fuerzas hostiles conspiran en la sombra contra el poder ruso. Ya sean agentes respaldados por extranjeros, individuos descontentos con rencores personales o complots de espionaje fabricados para sembrar el miedo y manipular la lealtad, la crisis ha creado una oportunidad para consolidar y expandir nuestro poder. Las decisiones internas ahora exigen aumentar el tamaño y el alcance de los departamentos de acción del Buró de Seguridad, la policía militar, la Rosgvárdia y el Comité de Reconocimiento. ¡La \"capa y espada del Imperio\" permanecerá siempre vigilante!"
 SOV_russkiy_mir_doctrine: "Doctrina \"Ruski Mir\""
 SOV_russkiy_mir_doctrine_desc: "La victoria en la Guerra Europea ha impulsado enormemente el orgullo nacional ruso, y a medida que la esfera de influencia de Rusia se estabiliza, la admiración por nuestros logros sigue creciendo, lo que desata una nueva ola de resurgimiento cultural. El pueblo ruso está ansioso por ver reflejos de la gloria actual en los hechos de sus antepasados, lo que nos presenta una gran oportunidad para promover la agenda del Ruski Mir (mundo ruso). Un mundo multipolar, construido sobre diversas comunidades culturales, ofrece la base ideal para expandir la influencia rusa, y el poder blando de Rusia alcanzará nuevas cotas."
 SOV_stimulate_our_economy: "Estimular nuestra economía"
 SOV_stimulate_our_economy_desc: "El período de reconstrucción de posguerra conducirá a un breve período de rápida recuperación económica, pero pronto debemos encontrar nuevas fuentes de crecimiento. Afortunadamente, nuestra ampliada esfera de influencia europea proporciona vastas poblaciones, recursos y riqueza, suficiente para fortalecer aún más la economía de Rusia y enriquecer a su gente. Mientras tanto, los bancos y las empresas de inversión controlados por el Gobierno iniciarán un importante impulso financiero, asegurando que los rusos finalmente puedan disfrutar de la prosperidad que se han ganado después de años de dificultades."
 SOV_the_third_rome: "La Tercera Roma"
 SOV_the_third_rome_desc: "Desde la \"Primera Roma\" hasta la \"Segunda Roma\" de Constantinopla, el legado ha pasado a Moscú, conocida como la \"Tercera Roma\". En el pasado, lo vimos como nuestro deber legítimo de continuar la misión del gran Imperio, buscando el respeto de las naciones europeas y la oportunidad de dar forma al orden global. Hoy, con logros que antes se creían imposibles, el nombre de la \"Tercera Roma\" ahora supera a sus dos predecesoras, así como a otros autoproclamados herederos romanos como los Imperios británico y americano. Rusia está en camino de convertirse en el centro de la civilización y la cultura humanas para las generaciones venideras. ¡Y para eso, por supuesto, necesitamos una capital nacional renovada!"
 SOV_cleanse_the_party: "Limpiar el partido"
 SOV_cleanse_the_party_desc: "La pena por la muerte del Gobernante Supremo se extendió por toda Rusia, como si la nación misma se hubiera paralizado. Sin embargo, este momento de quietud podría ofrecer a nuestros enemigos una oportunidad para atacar. Los saboteadores podrían explotar la vulnerabilidad del pueblo, perturbar la paz de nuestro difunto líder o, peor aún, socavar nuestra posición de poder, tan duramente ganada. Para evitar esto, la primera prioridad es salvaguardar la estabilidad de las estructuras centrales de la nación: el aparato gubernamental. Una burocracia fuerte y leal también desempeñará un papel clave en la gestión de la distribución del poder tras el fallecimiento del líder."
 SOV_promote_pro_russian_loyalists: "Promover a lealistas prorrusos"
 SOV_promote_pro_russian_loyalists_desc: "Con nuestra victoria en la Guerra Europea, hay una frontera completamente nueva que conquistar. Internamente, en nuestras tierras recién adquiridas, el enemigo acecha y sabotea nuestros esfuerzos por reconciliarnos con los no rusos; sin embargo, esto se remediará ahora. Nos pondremos en contacto con nuestros elementos prorrusos y los elevaremos a puestos más altos, recompensaremos a nuestros amigos y castigaremos a nuestros enemigos."
 SOV_new_economic_sphere: "Nueva esfera económica"
 SOV_new_economic_sphere_desc: "Tendríamos que mantener nuestra mano en el metafórico tarro de galletas si quisiéramos alcanzar mayores cotas de prosperidad, por lo tanto, es aconsejable que hagamos que las economías de nuestros estados clientes dependan más de nosotros, al mismo tiempo que nos aseguramos de cosechar los beneficios."
 SOV_crackdown_on_the_separatists: "Reprimir a separatistas"
 SOV_crackdown_on_the_separatists_desc: "Los traidores, los nacionalistas malintencionados y los delirantes luchadores por la \"libertad\" han sido una plaga para la seguridad interna durante meses, pronunciando sus asquerosos eslóganes y ondeando sus banderas anticuadas. Hoy es el día en que les pisoteamos la cara, Rusia simplemente se ha reunido con lo que una vez se perdió y cualquier desviación de eso es traición, no solo se atacará a los perpetradores, sino también a sus familias para mostrar a todos con tendencias traidoras que no estamos bromeando."
 SOV_fund_our_subjects: "Financiar a nuestros súbditos"
 SOV_fund_our_subjects_desc: "Un niño sin sus padres es como un cordero perdido, sin la guía adecuada se golpeará la cabeza contra una pared. Nuestros súbditos han estado luchando por mantener el ritmo después de la destructiva guerra en Europa. Afortunadamente, podemos proporcionarles una red de seguridad, con la financiación adecuada y una mano en sus hombros, deberían ser capaces de capear cualquier tormenta."
 SOV_rebuild_the_baltics: "Reconstruir los países bálticos"
 SOV_rebuild_the_baltics_desc: "Los países bálticos han sido uno de los mayores ejemplos de potencial desaprovechado. Con la región de nuevo bajo nuestra visión, podemos reconstruirla a nuestra imagen y restaurar lo que la hizo hermosa en un principio. Esto no solo creará puestos de trabajo, sino que también extenderá la buena voluntad a la gente que vive en los países bálticos."
 SOV_expand_new_governorships: "Expandir nuevas gobernaciones"
 SOV_expand_new_governorships_desc: "Con nuestros territorios recién adquiridos, existe el problema de crear nuevas gobernaciones en ellos, otorgándoles autonomía limitada y sirviendo como una subdivisión administrativa principal. Esto no solo calmaría a los súbditos más enojados, sino que también aliviaría las cargas de la burocracia y nuestras capacidades administrativas."
 SOV_future_of_poland: "Futuro de Polonia"
 SOV_future_of_poland_desc: "Polonia ha sido una espina clavada en nuestro costado durante décadas; no solo su gente nos odia con ciego fanatismo, sino que también es terrible trabajar con ellos. La parte de Polonia bajo nuestro control ha estado en bastante agitación y bajo la atenta mirada de Moscú, tendríamos que tomar una decisión concluyente sobre qué hacer con la nación polaca."

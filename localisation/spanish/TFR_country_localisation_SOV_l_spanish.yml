 SOV_russian_supremacy_1: "Ultranacionalismo ruso"
 SOV_russian_supremacy_1_desc: "\n\n\n\n£GFX_russian_supremacy_banner\n\n\n\n\n\n\"El ruso es dueño de la tierra rusa; solo hay un ruso (grande, pequeño, bielorruso; son todos uno), y así será para siempre\".\n- F. Dostoievski§!\n\nA pesar de toda la adversidad y la rusofobia, los rusos siguen siendo un pueblo orgulloso. Nuestro pueblo ha sobrevivido a los años del bolchevismo totalitario, tras ganar una guerra sangrienta y alcanzar hazañas, se ha vuelto aún más grande. Nuestra fuerza reside en la unidad, la perseverancia y en nuestra cultura única, que ha dado origen a muchos grandes descubrimientos y a grandes personas. El Estado ruso es el más grande de todos, próspero y eterno, y pronto todo en el mundo se hará con nuestro permiso."

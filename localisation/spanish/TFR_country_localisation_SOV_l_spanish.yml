 SOV_VLADIMIR_PUTIN_DESC: "Vladímir Vladímirovich Putin no llegó al poder de la típica manera, sino por las escaleras ocultas y cuartos traseros de la comunidad de inteligencia. Comenzó en las filas del KGB, y pasó la última década de la Unión Soviética ayudando a la Stasi en Alemania Democrática. Cuando la Unión cayó, entró en la política en la ciudad recién rebautizada como San Petersburgo, y vio un ascenso meteórico durante el gobierno de Borís Yeltsin. Recibió el apoyo de Yeltsin durante las elecciones de 2000, y ganó cómodamente la mayoría de los votos. No ha abandonado el Kremlin desde entonces.\n\nEn las últimas dos décadas, Putin se ha mantenido en el poder mediante una combinación de apoyo popular, lagunas constitucionales y un cuidadoso control de la oposición. Cuando llegó al límite de dos mandatos consecutivos en 2008, su ex primer ministro y aliado cercano Dmitri Medvédev fue presidente durante un mandato mientras que Putin se convirtió en primer ministro. Putin volvió a la presidencia en 2012. Ha superado innumerables crisis durante su administración, desde luchar contra las guerrillas chechenas hasta apoyar a los Estados rebeldes prorrusos en el este de Ucrania, y cada vez ha salido más fuerte.\n\nUna parte importante del público ruso disfruta genuinamente del reinado de Putin, al que ve como el hombre que los sacó de la turbulenta era de Yeltsin y ayudó a restaurar la posición de Rusia entre las potencias mundiales. Pero no todo su apoyo es orgánico. Sus elecciones posteriores se vieron plagadas de acusaciones de fraude electoral, y las protestas antigubernamentales se enfrentan a duras medidas represivas. Los líderes de la oposición en el país y en el extranjero tienden a ser vigilados, acosados, arrestados o mueren en circunstancias sospechosas. Todo esto envía un mensaje claro: Vladímir Putin cree que tiene el mandato popular para gobernar, y no planea renunciar a él en un futuro próximo."
 SOV_ALEXANDR_DUGIN_DESC: "Aleksandr Guélievich Duguin nació en una familia intelectual malcriada por el Gobierno soviético. Sin embargo, pronto se desilusionó de la burocracia comunista tardía y, como muchos de sus compañeros, buscó una visión diferente del mundo. Mientras muchos se unían a los \"verdaderos clubes marxistas\" clandestinos, Duguin comenzó sus estudios filosóficos con la \"Orden Oscura de las SS\" y los escritos de la Nueva Derecha Europea, complementándolos con obras de la Nueva Izquierda. A partir de ahí, comenzó a involucrarse en la mística, conociendo a muchos teóricos místicos clandestinos, tanto cristianos como musulmanes.\n\nTras el colapso de la URSS, Aleksandr Guélievich comprendió que, por muchas fallas que tuviera el comunismo, este mantenía a raya el verdadero horror: el capitalismo. Se unió al Partido Nacional Bolchevique, que prometía combinar lo antiguo y dar origen a lo nuevo. Duguin llegó a ser miembro permanente de ese partido, y su conocimiento esotérico contribuyó a sentar las bases del Partido Nacional Bolchevique. Después los años 2000, se separó de Limónov y comenzó a construir su propio movimiento, inspirándose en las ideas de los tradicionalistas integralistas y eurasianistas. Toda la investigación de Duguin cultivó su propia creación: la Cuarta Teoría Política.\n\nConocido a menudo como \"el filósofo más peligroso del mundo\" y apodado \"el gurú del Kremlin\" por los alarmistas occidentales, Aleksandr Guélievich nunca estuvo cerca de ningún puesto de poder oficial. Hasta ahora. Tras una vergonzosa derrota, Duguin se dio cuenta de que sus reclamos de mayor resistencia y unidad de pensamiento habían caído en oídos sordos de los estadistas anteriores. Pero ahora han desaparecido. Aleksandr Duguin, llevado al poder por un golpe de Estado de oficiales eurasianistas, ahora tiene la enorme responsabilidad de hacer realidad su visión filosófica: el sueño de derrocar el orden mundial actual, llevando a cabo una tumultuosa revolución metafísica y geopolítica."

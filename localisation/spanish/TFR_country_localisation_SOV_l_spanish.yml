 SOV_Putinism_Faltering: "Autoritarismo ligero"
 SOV_Putinism_Faltering2: "Autoritarismo ligero"
 SOV_Putinism_Faltering2_desc: "\n\n\n\n£GFX_putinism_faltering\n\n\n\n\n\nVladímir Putin ha estado al mando de Rusia desde principios del siglo XXI. Ya sea como presidente o durante un breve período como poderoso primer ministro entre 2008 y 2012, bajo el mando de su protegido Dmitri Medvédev en el Kremlin, Putin ha desempeñado un papel clave en la reconstrucción del país tras el colapso de la URSS y en la resolución de diversos problemas internos y externos. Sin embargo, el estilo de gobierno de Putin, conocido como \"autoritarismo tierno\", tiene sus inconvenientes.\n\nSi bien hay represión política y centralización, la intervención directa es poco frecuente, lo que conduce a una cantidad significativa de oposición y corrupción. Rusia Unida compite constantemente con oponentes radicales en la Duma, y la policía antidisturbios a menudo disuelve las protestas liberales. A pesar de estas imperfecciones, la Administración Presidencial no las ve como un problema y continúa abordándolas caso por caso, utilizando un enfoque firme."

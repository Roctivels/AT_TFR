 FAF_shield_range: "Favorecer el escudo"
 FRA_flag_will_get_darker_tt: "§CLa bandera se oscurecerá.§!"
 FRA_Failed_in_Africa: "Fracasó en África"
 FRA_bulwark_of_european_conservatism: "Baluarte del conservadurismo"
 FRA_bulwark_of_european_conservatism_desc: "Desde hace tiempo, Occidente está siendo corrompido por las influencias liberales ,controlando los medios de comunicación y a las élites, pero el pueblo ha hablado con sus votos aquí en Francia, y hemos cumplido nuestro objetivo de dejar a Francia en el buen camino. Nos mantenemos como el bastión de los valores occidentales, los viejos valores occidentales. Somos los herederos de De Gaulle, Churchill y Adenauer, figuras conservadoras de partidos que hace tiempo abandonaron sus ideales. Pero hoy hemos revivido ese conservadurismo clásico en el corazón de la civilización occidental, y nos encargaremos de propagarlo más allá de nuestras fronteras. Europa recordará su pasado y lo abrazará. Recordará un pasado donde la economía era próspera, las familias eran numerosas y el futuro era brillante. Y tendremos todo eso de nuevo."
 FRA_a_conservative_france: "Triunfo tradicionalista"
 FRA_a_conservative_france_desc: "La tradición es lo que forma una nación, no existe nación sin historia, religión y lengua propia. Sabemos quienes somos, somos los franceses, n pueblo orgulloso que ha sido conocido en distintos momentos de la historia como el pueblo dominante en todos los aspectos. Guerra, ciencia, arte, literatura. Somos buenos   en todo lo que nos proponemos, es nuestra tradición de excelencia la que ha formado nuestra base. Los logros de nuestro pueblo componen la plataforma sobre la que se cimienta nuestra sociedad. Los eurófilos nos han menospreciado, considerando a Francia una pequeña parte de un gran conjunto europeo, somos una de sus partes más importantes. Nunca aceptaremos la identidad de europeo sobre la francesa. La Agrupación Nacional mantendrá a Francia en el buen camino, Le Pen y sus aliados iniciarán una revolución conservadora en el parlamento como forma de asegurar la mayoría en las próximas elecciones, una Francia cimentada en la tradición y un pueblo devoto, orientado a la familia y trabajador serán las recompensas definitivas de nuestros esfuerzos. No solo apoyaremos esto aquí, sino que también lo haremos en toda Europa. Todos los europeos merecen apreciar su pasado."
 FRA_disregard_liberalism_decision: "Ignorar a los aliados liberales"
 FRA_prioritize_coalition_stability: "Priorizar la unidad de la coalición"
 FRA_prioritize_coalition_stability_desc: "Debemos moderarnos, no podremos mantener por mucho tiempo la dominancia política total, y no caeremos en la trampa de una república unipartidista. Todas las partes de nuestra gran nación deben trabajar para mantener su grandeza, si bien la Agrupación Nacional predominará, todo el mundo, desde Zemmour hasta Mélenchon, serán considerados aliados en la lucha contra el estancamiento. Mantener la coalición unida asegurará una Francia estable, redoblar nuestro populismo sería pegarse un tiro en el pie, empeoraría la situación y nos enemistaría con una parte substancial de la población. Permitidnos jugar con cabeza y jugar limpio, no tenemos motivos para consolidarnos excesivamente. Las democracias pluralista son como son por una buena causa."
 FRA_pluto_rises: "Plutón ascendente"
 FRA_pluto_rises_desc: "Macron aspiró a ser Júpiter, y fracasó. No pasa nada, ahora lo sabemos mejor. Stéphane Séjourné ha liderado a Renacimiento, el incendiario político liberal ha  unido firmemente el centro y la izquierda política francesa contra Le Pen y la Agrupación Nacional. Renacimiento llegó a ser dado por muerto, pero Séjourné se ha convertido verdaderamente en Plutón, el revitalizador de encuestas perdidas, dios del inframundo. Séjourné no gobierna el inframundo como Plutón, todo lo contrario, ha sacado a Francia del infierno y la ha llevado al cielo y bajo el liderazgo de Renacimiento y sus aliados, Plutón asciende a la presidencia. Frente a las crisis nosotros no retrocedimos como sí hizo monsierur Júpiter, Séjourné debe ser una cara amigable y simpática tanto en los medios como en el día a día. Debe ser un presidente activo y reconocido, no una hombre misterioso en un rascacielos haciendo pasar cosas con pocas palabras."
 FRA_demand_snap_elections_liberal: "Exigir elecciones anticipadas"
 FRA_demand_snap_elections_liberal_desc: "Hemos todo lo que estaba en nuestra mano para que el joven Stéphane Séjourné, más joven que incluso Macron, se hiciese popular. Más y más personas en la calles reclaman elecciones anticipadas. Nuestros esfuerzos han sumido la presidencia de Le Pen en la controversia y en el estancamiento, tenemos la oportunidad de retomar el gobierno de las manos de la Agrupación Nacional y llevar a Francia por el camino correcto antes de que sea demasiado tarde. Todo lo que debemos hacer es tirar del gatillo y dejar que el pueblo hable."
 FRA_capitalize_on_conservative_blunders: "Capitalizar sus errores"
 FRA_capitalize_on_conservative_blunders_desc: "Nuestro control sobre los medios de comunicación no tiene comparación, los medios extranjeros y los financiados por la UE están de nuestro lado, podemos resaltar cada cagada que se mande la Agrupación Nacional y repetirla una y otra vez. Toda tragedia, por más trivial que sea, será diseccionada, cada traspié, cada palabra mal pronunciada, será criticada. Meteremos cizaña por cada tartamudeo, cada tropiezo, será predatorio e impopular para algunos, pero él que controla los medios controla la opinión pública, y Le Pen ha hecho un lamentable trabajo a la hora de influir a los magnates de los medios amigos. Mr. Séjourné, sin embargo, la joven y apuesta cara del partido, es una figura pintoresca para un Renacimiento renovado."
 FRA_the_golden_lambda: "La lambda dorada"
 FRA_the_golden_lambda_desc: "Ay los identitarios, verdaderamente son unos visionarios. En esta era moderna, el nacionalismo francés no tiene...visión, hasta Bardella debe admitirlo. En los tiempos de Napoleón, cuando uno de cada 5 europeos era francés ,teníamos la población para llamarnos una potencia por derecho propio, en un mundo donde hay naciones con billones y cientos de millones de personas somos una gota en el charco europeo, con una población más pequeña que los turcos y los alemanes. Pero no solo somos franceses, somos hijos de Roma, hijos de los latinos. Desde Valonia hasta Dacia, desde Lisboa hasta Siracusa, la raza latina sigue siendo una fuerza poderosa y numerosa, juntos somos 150 millones de personas, seremos una potencia por derecho propio de nuevo, un futuro donde los latinos sean liderados una vez más por Francia no es totalmente descabellado, Napoleón intentó hacer que Francia resurgiera de sus cenizas para conseguir justamente eso, y gracias a la moderna Unión Europea nunca habíamos sido tan cercanos con España e Italia como ahora. Si bien odiamos a Macron y sus noviecitas en Bruselas, vemos el valor de una Europa unida, y abrazando la lambda dorada de los identitarios, podemos aspirar a un futuro donde tal vez los latinos están unidos, aún si Europa se encuentre dividida para siempre. No más guerras entre hermanos, los latinos debemos unirnos contra el resto del mundo."
 FRA_rabid_anti_slavicism: "Luchar contra las hordas eslavas"
 FRA_rabid_anti_slavicism_desc: "Los malditos eslavos son una afrenta a nuestros valores, incluso si ellos afirman abrazarlos. Cualquier democracia eslava ortodoxa ha caído en la corrupción o en anocracias autocráticas, no hay libertad, no hay igualdad, ni siquiera hay fraternidad. Yeltsin era un borracho corrupto, Putin era una serpiente sonriente, y su sucesor Medvédev es un perrito faldero rabioso con un odio irracional hacia Occidente. Sea cual sea su fachada, todos los rusos son iguales. Nos traicionaron cuando montamos el Sistema Continental, jugando para ambos bandos, nos traicionaron en la Segunda Guerra Mundial, nos traicionaron en cada acuerdo que hicimos con ellos. Debemos acabar de una vez por todas con el problema que supone la existencia de una potencia rusa. No tendremos futuro en un mundo donde Rusia juega a ser Genghis Kan con sus vecinos. Así que permitidnos jugar a ser Napoleón."
 FRA_rabid_anti_liberalism: "Antiliberalismo fanático"
 FRA_rabid_anti_liberalism_desc: "Hemos incriminado a la izquierda, a los rusos, todo está en su lugar. Hemos encontrado a nuestro chivo expiatorio. Una página de la historia fue tomada y copiada, la orquesta tocó una hermosa sinfonía. La ráfaga de metralla disparadas por las metrallas AK12 rusas cayó sobre 5 grupos diferentes en 5 lugares diferentes, una incisión quirúrgica hecha para cortar de cuajo los liberales de nuestra administración actual, los izquierdistas, convenientemente, se hicieron los ciegos para reforzar el engaño, la música es una amalgama de sonidos organizados, esta ha sido una obra maestra bardellana. Desde la sede de la Agrupación Nacional podías escuchar a los lejos los cadáveres cayendo en la calle. Nuestra oposición está aterrorizada, el gabinete de Macron ahora está muerto, quienes quedaban eran o bien izquierdistas o son leales a nosotros. Bardella está preparando su discurso para llamar a la masacre una horrible tragedia, ¿pero en realidad? Es nuestra estancia final. La conclusión de nuestro gran juego. Nadie iba a aceptar la petición de formar un Gobierno con Macron, nadie puede con nosotros, nos aseguraremos de esto. Les daremos la mayoría que necesita, un salvador en tiempos del terror rojo y de intervencionismo ruso... hasta que nos deshagamos de él en la siguiente elección."
 FRA_socialism_with_french_characteristics: "Socialismo con características francesas"
 FRA_socialism_with_french_characteristics_desc: "Tras una batalla centenaria, librada desde 1789 hasta el día de hoy, hay un Gobierno en Francia que es verdaderamente para el pueblo. Hay un sistema que lo empodera, que les da una libertad auténtica, y que les provee una vida buena y feliz. Tras su lucha contra el autoritarismo y la derecha, Francia, en su Sexta República, es verdaderamente libre.\n\nC'est pour de bon!"
 FRA_invite_apla_military_advisors: "Invitar a asesores americanos"
 FRA_invite_apla_military_advisors_desc: "SI bien puede ser una decisión increíblemente controversial y criticada, el fin de la Segunda Guerra Civil Americana es un objetivo crucial para Francia, y para la OTAN en su conjunto. Naturalmente, la facción más cercana a nuestros objeticos de un socialismo democrático y libre es el Ejército Popular de Liberación Americano, incluso si hay facciones dentro de este que se opongan a la idea. Permitiremos el intercambio de asesores y les reconoceremos como el Gobierno legítimo de América."
 FRA_detente_with_PRC: "Detente oriental"
 FRA_detente_with_PRC_desc: "Parte de nuestra debilidad actual se debe a nuestro rechazo por la República Popular China. Tal y como se vio en el colapso de los Estados Unidos, y el subsecuente colapso económico de la OTAN en conjunto, debemos ver con buenos ojos al este si deseamos ser una nación sostenible y poderosa. Aparte de eso, son nuestros camaradas en la lucha popular; no hay motivos para seguir antagonizando a la auténtica China."
 FRA_french_military_hegemony: "Hegemonía militar francesa"
 FRA_french_military_hegemony_desc: "De Villiers realmente ha revitalizado el gobierno militar de Francia, el ejército es más grande de lo que había sido en los últimos 50 años , el pueblo se unió tras el ejército, la industria sirve las necesidades del Estado y especialmente el ejército, nos estamos preparando para la guerra en tiempos de paz porque sabemos perfectamente lo que se avecina. Europa es nuestra amiga, nuestros compañeros ideológicos, nuestro ejército está preparado no solo para defender Francia, también defenderá a los inquebrantables polacos, a los fuertes bálticos, a los entusiastas rumanos, es nuestro deber y privilegio ser las fuerzas armadas del mundo libre. Francia puede afirmar verdaderamente que es una potencia hegemónica militar, un ejército tan superior en números y equipamiento que los analistas militares nos verán en acción en cada país de cada continente durante el próximo siglo, el dios de la guerra vive hoy en París, que haya dolor para nuestros enemigos y alegrías para nuestros amigos."
 FRA_skewer_the_bear: "Pinchar al oso"
 FRA_skewer_the_bear_desc: "Rusia es una bestia, un oso en hibernación, pero míralo engordar con grasas mientras esperamos débiles a que despierte y que nos trague de un bocado. Otras naciones puede que tengan miedo de si mismas, pero los franceses estamos orgullosos de nuestro pasado. Si Europa no se prepara para enfrentarse a Rusia, entonces Francia por su cuenta tomará las armas y hará con la piel del oso ruso una nueva alfombra para el palacio presidencial. Ya nos hemos preparado, pero podemos hacer más. Exijamos a la prensa, exijamos a los medios mostrar a Francia el tipo de gente a quienes nos enfrentamos, un pueblo estúpido y borracho que odia la libertad conformado con estar sometido a un zar, vestido o no de rojo, siempre y cuando un solo hombre sujete firmemente las riendas. Reteniendo petróleo del mismo modo que se priva de agua a un prisionero."
 FRA_neo_imperialism: "La presidencia imperial"
 FRA_neo_imperialism_desc: "Hace tiempo que perdimos nuestra gloria y que somos blanco de burlas al punto que casi perdimos nuestro rumbo por completo. Incluso Le Pen llegó y traicionó al ejército, ¿cómo estaríamos ahora de no ser por Villiers? Hubiésemos sido aún más humillados y cualquier vestigio del imperio hubiese sido tirado a los perros. Somos los protectores de Francia, Europa y África Occidental. Somos la espada de los libres, el escudo de la libertad y bajo Villiers somos de nuevo una potencia con un alcance global, interviniendo bajo nuestros propios términos, no somos un imperio, somos una república, y nuestro presidente es un héroe nacional."
 FRA_jupiter_rising: "La gloria de Júpiter"
 FRA_jupiter_rising_desc: "La grandeza está al alcance de nuestras manos y hemos trabajado durante años para sellar nuestro destino. Se ha hecho aparente que para que nuestro destino se cumpla y que salgamos indemnes de los futuros peligros, una Francia fuerte no será suficiente. Macron ha demostrado una y otra vez que lo que Francia, y Europa, necesitaba era un líder fuerte, uno que no le tenga miedo a las instituciones políticas, los medios, a la burocracia y quién esté listo para luchar por nosotros. Macron ha llevado triunfalmente a Francia por el camino de la reforma y el proceso resultando en un periodo de excepcionales poderíos y beneficios aún teniendo que lidiar con la burocracia y agitadores que deseaban poner fin con la grandeza.\n\nMacron enseñará a Europa y al resto del mundo la superioridad de la nación francesa a la vez que su capacidad para asistir a sus vecinos y aliados del otro lado del océano. Macron enseñará a los rusos que no pueden intimidar y pisotear a Europa como lo llegaron a hacer en el pasado. Macron está seguro de cuál es la fuerza y poder que Europa ha necesitado desde los tiempos de De Gaulle y Napoleón, y él forjará su propio legado que igualará a esos grande shombres.\n\nNo permitiremos que roben nuestra grandeza."
 FRA_absorb_volt: "Integrar a Volt"
 FRA_absorb_volt_desc: "Integrando a Volt Europa en nuestro gobierno asegurará que nuestro gobierno no sólo se mantenga fuerte y unido sino que también hace lo mismo con la Unión Europea. Podemos usar a Volt para impulsar aún más la federalización y al mismo tiempo estrechar nuestros lazos con Bruselas. Francia mostrará la fuerza y oportunidades que una Europa unida puede dar a la gente del continente y de todo el globo."
 FRA_reaffirm_our_majority: "Reafirmar nuestra mayoría"
 FRA_reaffirm_our_majority_desc: "Con la coalición cosechando un gran éxito finalmente hemos conseguido formar una gran coalición dedicada al beneficio del pueblo francés. Se ha hecho evidente que los radicales y extremistas no son capaces de cooperar ni de dialogar, a diferencia de los conservadores y liberales. Usaremos este nuevo poder para impulsar políticas centristas y reformas decisivas para una Francia fuerte; garantizando que podamos hacerle frente a la amenaza rusa y asegurándonos de que ni la ultraderecha ni la ultraizquierda lleguen a tener representación en nuestro gobierno."
 FRA_clash_of_civilizations: "El choque de civilizaciones"
 FRA_clash_of_civilizations_desc: "Europa y Oriente , Francia, desde los días de Balduino, ha entendido su papel como un poderoso estado cruzado, enfrentándose contra los sarracenos y las hordas asiáticas. Todos hemos sentido cómo apretaba la soga alrededor de nuestro cuello. Recordemos que la invasión musulmana de nuestros hogares inició cuando los traidores liberales sentados en sus oficinas en Bruselas les abrieron las puertas. Finalmente pudimos cerrar esas puertas y todo lo que hay tras de ellas es barbarismo. La amenaza oriental que supone Moscú ha incorporado a esos fundamentalistas islámicos a sus filas, usando a Bielorrusia para importar masivamente a Polonia migrantes provenientes de la salvaje Siria, vivimos la última ola y sabemos muy bien lo que hicieron, dispararon la violación en nuestros suburbios y los crímenes en nuestras calles. El islam es una cultura y religión incompatible con Francia, y por ende Europa. En los próximos conflictos en África, Medio Oriente y Europa Oriental, tendremos que armarnos de valor para hacer frente a la tormenta. Estamos luchando una gran batalla por nuestro pueblo y nuestra cultura, una batalla contra los mongoles moscovitas y las hordas musulmanas, y debemos asegurar una victoria duradera para poder garantizar un futuro brillante cimentado en la tradición y en una dominancia Europea firmemente consolidada."
 FRA_the_camus_bloc: "Asimilar la facción de Camus"
 FRA_the_camus_bloc_desc: "Renauld Camus es un identitario de los de antaño, un veterano ideólogo, en los 80 era un socialista, ¿pero en la actualidad? El era el líder del movimiento identitario francés cuando fue injustamente prohibido por el Gobierno de Macron. Camus es la mente detrás de la idea del \"gran reemplazo\", pero a diferencia de muchos, él no es antisemita, es abiertamente gay y, aún así, sigue siendo el líder de un movimiento de ultraderecha. Muchos dentro de la derecha judía, incluso dentro de la moderada Agrupación Nacional, han defendido las teorías de Camus en el pasado y, muy gustosamente, Eric Zemmour invitará a Camus a reformar su partido para unirse a la coalición gobernante, él y sus amigos son antidemocráticos, si bien nosotros no iremos tan lejos como para poner fin a la democracia, usaremos su popularidad para atraer votos del electorado que, \"en principio\", evita participar en las elecciones."
 FRA_emulate_the_trump_doctrine: "Trumpismo francés"
 FRA_emulate_the_trump_doctrine_desc: "Donald J. Trump, culpable según algunos del responsable del colapso de América, Zemmour lo ve como un salvador que trágicamente llegó demasiado tarde. Al igual que Zemmour él acepta que América está siendo invadida por inmigrantes y tiene el deseo de cerrar ese flujo masivo, el querer preservar tu nación no te hace racista, ¿qué tiene de malo desear que los inmigrantes prosperen... en su tierra natal? El trumpismo se define por su postura antimigratoria, la legislación favorable a las empresas, el nacionalismo cívico, la diplomacia del gran garrote y el aislacionismo militarista. Francia puede adoptar todos estos ideales y usarlos en beneficio propio, ¡Zemmour tratará de implementarlos evitando que el país colapse! ¡Haremos a Francia grande de nuevo!"

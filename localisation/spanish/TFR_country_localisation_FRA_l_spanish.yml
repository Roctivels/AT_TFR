 FRA_Announce_Snap_Elections: "Anunciar elecciones anticipadas"
 FRA_Declare_the_7th_Republic: "Proclamar la Séptima República"
 FRA_Vote_on_the_Sixth_Republic: "Referendo constitucional"
 FRA_Restoration_of_the_6th_Republic: "Restaurar la Sexta República"
 FRA_russian_reperations_idea: "Reparaciones rusas"
 FRA_war_reperations_idea: "Reparaciones de guerra"
 FRA_war_reperations_lessened_idea: "Reparaciones de guerra"
 FRA_The_New_French_Sphere: "Restablecer nuestra esfera"
 FRA_The_New_French_Sphere_desc: "Con nuestro triunfo sobre el imperialismo ruso, nos alzamos como los defensores indiscutidos de la democracia europea. nuestra gloriosa victoria ha dejado un vacío de poder en las regiones previamentedominadas por Rusia. Nosotros, como defensores de la democracia, debemos salvaguardas nuestros intereses y traer paz y democracia a estas tierras previamente autocráticas."
 FRA_Reclaim_the_Algerian_Departments: "Reclamar los departamentos argelinos"
 FRA_Reclaim_the_Algerian_Departments_desc: "Desde nuestra retirada hace décadas, los argelinos han demostrado que no son capaces de gobernar su propia nación. Se han visto constantemente desbordados por todo tipo de problemas, desde grupos separatistas hasta disputas fronterizas. Lo que necesitan es una nación foránea les eche una mano, y nosotros les ofreceremos la nuestra. Serán la base desde la que pacificaremos África."
 FRA_VIC_Freedom_for_North_Africa: "Libertad para el norte de África"
 FRA_VIC_Freedom_for_North_Africa_desc: "La primavera árabe inició hace una década, y no salió nada bueno de eso. Todo lo que trajo fueron guerras civiles, radicalismo y muerte. El ejemplo más claro de los fracasos de la primera árabe en África es Libia, que ha estado dividida en una guerra desde 2011 de la que ninguno de los beligerantes sacó nada de valor. También ha constituido una fuerte amenaza para nosotros en el Magreb, y ya ha llegado el momento de que restauremos el orden en Libia."
 FRA_VIC_Stabilize_West_Africa: "Estabilizar África Occidental"
 FRA_VIC_Stabilize_West_Africa_desc: "Una de las consecuencias de la guerra con Rusia fue la necesidad de traer a Europa a la mayoría de nuestras fuerzas en África Occidental. La ausencia de estos soldados causó una significativa pérdida en la capacidad de estos países de imponer la ley y propició la resurgencia de numerosos grupos terroristas. Ahora que ya no nos tenemos ninguna amenaza cerca de casa, nos volveremos a poner manos a la obra para luchar contra estos grupos en tierras lejanas. Más temprano que tarde, acabaremos de una vez por todas con todos y cada uno de los islamistas radicales."
 FRA_VIC_Demand_African_Resources: "Demandar los derechos para explotar los recursos africanos"
 FRA_VIC_Demand_African_Resources_desc: "Nuestro apoyo ininterrumpido a ciertas naciones africanas ha hecho que estén muy endeudadas con nosotros. Fuimos nosotros quienes acabamos con el terrorismo en sus territorios, construimos su infraestructura y economía y les protegimos de cualquier amenaza. Ahora es momento de que nos den algo a cambio, y para hacer eso, no necesitan buscar más allá de sus abundantes recursos naturales. Debe ser agotador administrar todos esos minerales y piedras preciosas, nosotros nos encargaremos de eso."
 FRA_VIC_African_Economic_Expansion: "Expansión económica africana"
 FRA_VIC_African_Economic_Expansion_desc: "Nuestra creciente colaboración con las naciones de África Occidental nos ha ofrecido oportunidades económicas únicas, y seríamos unos estúpidos si no las aprovechamos. Muchas de nuestras antiguas colonias siguen teniendo una deficiente industria de bienes de consumo, algo en lo que estaríamos más que encantados en ayudarles. A cambio, nos abriría nuevos mercados a nuestros productos. ¿Quién se apunta a tomar champán en un precioso mirador en el Golfo de Guinea?"
 FRA_VIC_A_New_African_Union: "Una nueva Unión Africana"
 FRA_VIC_A_New_African_Union_desc: "A medida que las naciones de África Occidental y el Magreb se hacen más y más dependientes de nosotros, ha surgido la pregunta de como abordaremos esto. La respuesta es una increíblemente obvia. En pocas palabras, el colonialismo está muerto desde hace tiempo y, para garantizar la máxima cooperación de los pueblos africanos, no deberán estar bajo el control de una remota metrópoli. Por lo que hemos decidido formar una nueva Unión Africana, una que no sea un chiste. Esta nueva unión nos servirá para asistir a las naciones africanas en su el desarrollo, la extracción de recursos y, por supuesto, el comercio. Será el pináculo de nuestras acciones en África."
 FRA_VIC_In_the_Right_Hands: "En las manos correctas"
 FRA_VIC_In_the_Right_Hands_desc: "Desde su independencia, las naciones de África Occidental y del Magreb sencillamente han sido incapaces de gobernar por su cuenta. Han sucumbido una y otra vez ante terroristas o dictadores, y ahora que las tenemos en la palma de nuestra mano, es momento de asegurarse de que nada de eso vuelva a pasar. Si bien el colonialismo está lejos de ser popular, esto no es el colonialismo, preferimos el término \"administración asistida\". Con nuestra firme guía, África podrá estar segura."
 FRA_VIC_Operation_Aigle: "§YOpération§!: Aigle"
 FRA_VIC_Pit_them_Against_Each_other: "Avivar el antiautoritarismo"
 FRA_VIC_Rebirth_of_Israel: "Un renacimiento sionista"
 FRA_VIC_Clean_the_Slate: "Limpiar la pizarra"
 FRA_Protect_Canadian_Soveriegnty: "Proteger la soberanía canadiense"
 FRA_Protect_Canadian_Soveriegnty_desc: "Canadá ha sido durante mucho tiempo uno de nuestros aliados más importantes. Desde la Segunda Guerra Mundial, donde fueron uno de los beligerantes más feroces contra la amenaza nazi, hasta la actualidad, siempre se han mantenido fieles a los principios democráticos y a Occidente. Sin embargo, con el caos que se vive en los antiguos Estados Unidos, muchas Facciones han considerado a Canadá parte integral de su nueva América. Estas reclamaciones son inaceptables, y protegeremos a Canadá de cualquier agresión americana."
 FRA_Ensure_Continental_Interests: "Asegurar nuestros intereses en Norteamérica"
 FRA_Ensure_Continental_Interests_desc: "Mientras que la situación en Europa Oriental se estabiliza, la de América continua siendo catastrófica. Hay ciertas facciones dispersas por lo que alguna vez fueron los EUA que no podemos permitir que ganen más poder del que ya tienen, pues si dejamos que campen a sus anchas supondría la ruina de millones de personas. Y por encima de eso, tenemos el deber de salvar a nuestro aliado, que ya nos salvó en numerosas ocasiones. Nunca está de más compensar un favor, más si encima podemos sacar provecho de esto."
 FRA_canadian_isolation_tt: "§CEsto aislará a los canadienses de los asuntos europeos para intentar lograr la independencia del pueblo quebequense.§!"
 FRA_The_Miquelon_Bill: "Los Acuerdos de Miquelón"
 FRA_The_Miquelon_Bill_desc: "El mal acecha al otro lado del Atlántico, enmascarado como los Estados Unidos de América. Pero no son la nación a la que ayudamos a liberarse de los británicos hace 250 años, y no parece que busquen algo más que no sea explotarnos. Por mucho que duela admitirlo, los EE.UU. han muerto y ya no existen. Europa debe protegerse de nuestra amenaza, y es nuestro deber aseguraros de que los americanos se queden del otro lado del charco."
 FRA_American_Realpolitik: "El vencedor"
 FRA_American_Realpolitik_desc: "Parece ser que la pesadilla realmente ha llegado a su fin. Los rusos están preocupados, Europa es fuerte y está unida, pero más importante, la Segunda guerra civil americana finalmente ha llegado a su fin. Aunque ahora sean débiles y frágiles, su historia no ha acabado y nosotros y el resto de la UE seremos testigos de su periodo de reconstrucción. Les ayudamos a liberarse de los británicos, no podemos abandonarlos ahora."
 FRA_Franco_American_Diplomatic_Agreement: "Cumple diplomática franco-americana"
 FRA_Franco_American_Diplomatic_Agreement_desc: "Por primera vez desde 2021, hemos realizado un viaje a Washington D.C. El nuevo gobierno americano nos invitó para tratar un nuevo acuerdo diplomático, y nosotros aceptados gustosamente. Los resultados fueron satisfactorios, si bien no fueron tan beneficiosos como habíamos esperado. Los americanos no están en condiciones para reincorporarse inmediatamente a la OTAN pero, a cambio de nuestro apoyo, prometieron hacerlo tan pronto como puedan. Si bien puede que no sean los mismos que los de hace una década, deseamos mantener nuestra alianza en el futuro."
 FRA_Guiana_Gambit: "Gambito de Guyana"
 FRA_Guiana_Gambit_desc: "Si bien las siglas OTAN hacen referencia al Atlántico norte, su expansión nunca ha sido limitada a esta región. Con una muy favorable situación en Europa Oriental, hemos desviado nuestra atención al otro lado del charco, y un poquito más al sur. Nunca hemos sido muy amigos de los brasileños, pero tenemos buenas relaciones y nos gustaría mejorarlas y con los rusos fuera de juego, seguro que también están buscando nuevos aliados. Pero los brasileños son tercos, y necesitarán una ayudita para convencerlos para unirse a nuestra causa. Por mucho que nos duela, ofrecer la Guyana Francesa como parte del trato les ayudará a entrar en razón."
 FRA_Stabilize_the_Caribbean: "Estabilizar el Caribe"
 FRA_Enrich_Quebecois_Spirit: "Enriquecer el espíritu quebequense"
 FRA_Enrich_Quebecois_Spirit_desc: "Los quebequense ha estado durante mucho tiempo bajo la yugo de los anglosajones, pero nunca se ha dejado aplastar. De hecho, es bajo esa presión que su cultura y su gente han florecido, demostrando que algunas cosas nunca pueden erradicarse por completo. Para seguir expandiendo nuestra influencia en Norteamérica, primero debemos encontrar el apoyo de los quebequenses, por lo que financiaremos iniciativas para ampliar el conocimiento público sobre su patrimonio y cultura."
 FRA_Supplement_Quebecois_Industry: "Complementar la industria quebequense"
 FRA_Supplement_Quebecois_Industry_desc: "Una forma de llegar al corazón de cualquier nación es apoyarla con construcciones que impulsen su economía. La mejor manera de hacerlo, además de quizás la agricultura, es financiar proyectos industriales. Quebec tiene una serie de programas de desarrollo en curso que el Gobierno canadiense no está haciendo todo lo posible por apoyar, por lo que intervendremos. Cuando se creen nuevos empleos industriales en Quebec, recordarán quién construyó sus fábricas."
 FRA_Espouse_Cultural_Unity: "Fomentar la unidad cultural"
 FRA_Espouse_Cultural_Unity_desc: "La cultura francesa se puede resumir en tres palabras, Liberté, Egalité, et Fraternité. Sin embargo, como en cualquier nación, la interpretación que la gente hace de nuestra cultura varía de una ciudad a otra, e incluso de un hogar a otro. Si bien todos los franceses comparten los mismos valores fundamentales, los pequeños detalles a veces causan disputas. No podemos permitir que la gente se pelee por tonterías, por lo que todos los aspectos de nuestra cultura se expondrán plenamente para que todos puedan ver nuestra verdadera unidad."
 FRA_quebec_independence_tt: "§CEsto forzará a [CAN.GetFlag] Canadá a permitir un [QUE.GetFlag] referendo de independencia para Quebec.§!"
 FRA_Restore_the_French_Union: "Restaurar la Unión Francesa"
 FRA_Restore_the_French_Union_desc: "La Unión Francesa fue nuestro desesperado y último intento de reformar nuestro sistema colonial, y fracasó miserablemente al final de la 4ta República. En vez de mantener departamentos de ultramar y colonias, todos los territorios pasarían a ser Francia sin más. Sin embargo, a finales de los años 50, este sistema demostró que no funcionaba, y se desmoronó. Pero ahora, estamos en una posición que nos permite administrar de forma adecuada numerosos territoritos de ultramar, no colonias, departamentos. No habrán ciudadanos de segunda, sólo habrán franceses, ¡y una vez más, mostraremos en todo su esplendor nuestro poderío!"
 FRA_Department_of_Haiti: "Departamento de Haití"
 FRA_American_CW_Embargo_tt: "§YLa OTAN embargará colectivamente a todas las facciones de la Segunda Guerra Civil Americana.§!"
 FRA_Further_American_Support_tt: "§YEnviaremos más apoyo a nuestra facción elegida.§!"
 FRA_VIC_African_Economic_Expansion_tt: "Desbloquea £decision_icon_small  §Hdecisiones§! para: §YAumentar nuestra influencia económica en §!§Rlas naciones de África Occidental§!"
 FRA_VIC_In_the_Right_Hands_tt: "Desbloquea £decision_icon_small  §Hdecisiones§! para: §YAumentar nuestra influencia militar en §!§Rlas naciones de África Occidental§!"
 FRA_VIC_Bitter_Winner_tt: "§RRusia debe pagar por los ciudadanos franceses que hayamos perdido...§!\n\nFrancia buscará mantener la £GFX_Federalization_Unity_texticon paz europea, para lo cual se asegurará de que [SOV.GetFlag] Rusia nunca vuelva a amenazar el continente europeo."
 FRA_VIC_Victorious_Spirit_tt: "§CEuropa ha dado el salto a una nueva, una que verdaderamente esté libre de guerra...§!\n\nFrancia buscará mantener la £GFX_Federalization_Unity_texticon paz europea, para lo cual reconstruirá [SOV.GetFlag] Rusia tal yo como hicimos con [GER.GetFlag] §YAlemania Occidental§!."
 FRA_death_counter_flag: "Se sufrieron más de §R10.000 bajas§!."
 FRA_The_Liberators_of_the_Caucasus: "Libertadores del Cáucaso"
 FRA_The_Liberators_of_the_Caucasus_desc: "De no ser por nosotros, y la OTAN en su conjunto, la región del Cáucaso seguiría en manos de los expansionistas rusos. Y ahora que nos hemos tomado la molestia de liberarlos de sus opresores, no debemos dejar de lado nuestra responsabilidad con ellos. Si los dejamos a su suerte, lo mas probable es que caigan el el caos o que sean conquistados una vez más por su vecino del norte. No podemos permitir que eso pase, nos aseguraremos de que las naciones del Cáucaso mantengan su independencia y no olviden quienes fueron los que los liberaron."
 liberator_of_the_caucasus: "Libertadores del Cáucaso"
 FRA_Militarize_Kuban_Police: "Militarizar la policía de Kubán"
 FRA_Militarize_Kuban_Police_desc: "La derrota rusa ha llevado a la formación de varias naciones en el Cáucaso septentrional, de las cuales la más importante es la República de Kubán. Pero, para desgracia del pueblo kubanés, su nuevo gobierno está teniendo problemas para mantener el orden, y su nación ya está bajo ataque de terroristas rusos. Con el fin de establecer un bastión de la OTAN en el Este, ayudaremos con gusto a los kubaneses a formar su fuerza policial y mejorar su capacidad administrativa."
 FRA_Crimean_Investments: "Inversiones en Crimea"
 FRA_Crimean_Investments_desc: "La península de Crimea estuvo ocupada ilegalmente por Rusia durante aproximadamente 10 años, periodo en el que estuvo ignorada y no fue más que una base militar glorificada. Quedó arrasada a causa de los intensos combates que tuvieron lugar en la península. Afortunadamente, ahora están a manos de una nación más responsable, Ucrania. Como gesto de buena voluntad y forma de incrementar nuestra influencia en el Este, invertiremos en la reconstrucción de Crimea, ¡y nos aseguraremos de que quede en mejor estado en comparación a cuando fue ocupada!"
 FRA_EU_kill_EUrself_tt: "Esto te bloqueará del resto del árbol de enfoques y preparará la £GFX_Federalization_Unity_texticon  §CFEDERALIZACIÓN COMPLETA§!."
 FRA_EU_sister_republic_tt: "Esto te bloqueará de la £GFX_Federalization_Unity_texticon  §CFEDERALIZACIÓN COMPLETA§!, pero en su lugar comenzará la creación de la [EUU.GetFlag] §YCOMISIÓN FRANCO-IBÉRICA§!."
 FRA_EU_European_Emergency: "La emergencia europea"
 FRA_EU_European_Emergency_desc: "Mientras las armas dejan de disparar y los incendios se extinguen, nos alzamos victoriosos sobre nuestros enemigos. Hemos obligado a las guerrillas tanto nacionalistas como comunistas a ocultarse y defendimos la libertad en su momento más delicado. Sin embargo, no nos podemos dormir en los laureles. La situación sigue siendo caótica, y los radicales harán todo lo que sea para usurpar nuestro control. En estos tiempos oscuros, debemos pedir ayuda al extranjero. Francia ha perdido una batalla, pero no ha perdido la guerra. Nos levantaremos más unidos que nunca, listos para enfrentar a nuestros enemigos como un frente unido."
 FRA_EU_Seeking_Discourse: "Fomentar el diálogo político"
 FRA_EU_Seeking_Discourse_desc: "la fuerza de Francia reside en su democracia multipartidista. A pesar del fracaso de la Quinta República, no debemos abandonar nuestras raíces democráticas. Mientras nos seguimos recuperando de la guerra civil, nos encontramos ante una oportunidad única. A pesar de que la extrema derecha e izquierda se hayan negado a trabajar con nuestro gobierno, hay muchos moderados a los que podemos convencer. Mediante favores y concesiones, podemos convencer a estos partidos neutrales a asociarse con nuestro gobierno, lo que nos permitirá aprobar leyes con gran velocidad, lo que acelerará en gran medida el proceso de reconstrucción."
 FRA_EU_Crack_Down_on_Extremism: "Reprimir al extremismo"
 FRA_EU_Crack_Down_on_Extremism_desc: "Aún tras nuestro triunfo frente a militaristas y comunistas, el radicalismo continúa creciendo en las sombras. Si no aplastamos rápidamente a estos fanáticos, se convertirán en una piedra en el zapato, saboteando nuestros esfuerzos de reconstrucción. Autorizaremos la erradicación de los grupos radicales restantes que sigan activos. Algunos dirán que esto es impropio de una democracia, pero esto es un mal necesario. Si no están con nosotros, están contra nosotros, y cualquier oposición a nuestro gobierno solo estará retrasando lo inevitable."
 FRA_EU_Addressing_Our_Failures: "Admitiendo nuestros errores"
 FRA_EU_Addressing_Our_Failures_desc: "Mira a tu alrededor. Nuestras ciudades están en ruinas, nuestro pueblo está hambriento, nuestro ejército está destrozado. Por mucho que queramos negarlo, fracasamos. Fracasamos al defender a nuestros aliados orientales de la horda rusa, y ahora debemos hacer frente a las consecuencias. Pero no debemos anclarnos en la derrota. Debemos volver a levantarnos, aprender de nuestros errores y regresar con más fuerza. Podemos aprender mucho de nuestros errores en la Guerra Europea. Y es mucho lo que hay que cambiar. Independientemente de nuestro enfoque, el cambio es imperativo. Si seguimos igual, inevitablemente repetiremos los errores del pasado."
 FRA_EU_Picking_ourselves_up: "Quitándonos el polvo"
 FRA_EU_Picking_ourselves_up_desc: "A medida que se asienta el polvo y vuelve el orden, nuestro poder se consolida de forma lenta pero segura. Todavía hay mucho trabajo por hacer. Las ciudades yacen en ruinas y nuestro pueblo hace largas colas para comprar pan. Por suerte o por desgracia, no estamos solos en esto. Por toda Europa, nuestros aliados están en la mismas condiciones en nosotros en el mejor de los casos. Polonia está dividida, España vuelve a estar desgarrada por una guerra civil y el antaño poderoso Euro ha perdido prácticamente todo su valor. Muchos dirán que el sueño de una Europa unida está muerto, pero se equivocan. La tragedia y el sufrimiento nos fortalecerá y emergeremos más fuertes que nunca. El sueño europeo se hará realizad, aún si hay que derramar sangre para que esto suceda."
 FRA_EU_Repairing_the_National_Body: "Reparar la nación"
 FRA_EU_Repairing_the_National_Body_desc: "Nuestra victoria contra los militaristas y socialistas ha tenido un alto coste, pues hemos heredado una nación dividida y en ruinas. Extensas regiones del interior están en ruinas mientras que en muchas ciudades, las zonas que no han sido reducidas a escombros son consumidas por las llamas. Ni siquiera nuestra capital se salvó de los horrores de la guerra, pues las mismísima Torre Eiffel sufrió daños considerables. A medida que seguimos adelante con el proyecto paneuropeo, empezaremos el arduo proceso de reconstrucción nacional. Lo que vendrá en el futuro no solo pondrá a prueba nuestro compromiso con la unidad europea, también evaluará hasta a donde estamos dispuestos a llegar con tal de revitalizar la nación francesa. Y nosotros estamos dispuestos a llegar hasta el final, sin importar los costes o las acciones que tengamos que hacer."
 FRA_EU_The_Best_and_Brightest: "Los mejores y más brillantes"
 FRA_EU_The_Best_and_Brightest_desc: "Francia, tal y como se encuentra actualmente, se rompe con solo mirarla. Un mal movimiento y el ya resquebrajado sistema se vendrá abajo y caeremos en la anarquía. El proceso de reconstruir una nación tras la guerra es largo y tedioso, y no podemos dejarlo a manos de un trabajador común. Por esto, es necesario formar grupos de expertos que nos asesoren en el proceso de reconstrucción. Si bien estos expertos tendrán privilegios especiales para formular sus planes, estos siempre requerirán nuestro visto bueno para seguir adelante. Con su guía, convertiremos a Francia en un país del futuro. Un país que reflejará a la perfección el objetivo final del proyecto paneuropeo."
 FRA_EU_Invite_American_Innovationists: "Invitar a los innovacionistas americanos"
 FRA_EU_Invite_American_Innovationists_desc: "Si bien algunos abogan por emplear únicamente a asesores franceses, sería un error por nuestra parte no invitar a asesores extranjeros. Los Estados Unidos fueron en el pasado un faro de innovación industrial. Industrialistas como Bessermen y Henry Ford contribuyeron enormemente al sector industrial con innovaciones como la producción en serie. Mientras la antaño próspera nación se desangra en una guerra civil, innovacionistas como Bloomberg han sido capaces de conservar su riqueza. Si bien tenderles la mano conlleva riesgos, las potenciales ganancias son mayores. El asesoramiento de estos individuos será crucial para acelerar el proceso de reconstrucción."
 FRA_EU_An_International_Reconstruction_Effort: "Un esfuerzo de reconstrucción internacional"
 FRA_EU_An_International_Reconstruction_Effort_desc: "Hay un hecho que se ha mantenido cierto a lo largo de la historia. Las grandes potencias no podrían haber alcanzado su estatus sin una sólida base industrial. Potencias globales como China y los Estados Unidos no estarían donde están si no hubieran invertido en industria pesada. Si queremos a ver a Francia codearse con las potencias globales, entonces debemos revitalizar nuestra industria. Reabriremos fábricas, las fundiciones volverán a estar operativa, haremos todo lo que haga falta para impulsar nuestra industria y, con ayuda de nuestros aliados, Francia volverá a ser una potencia industrial que pueda rivalizar con China."
 FRA_EU_The_Cult_of_Reason: "El culto a la razón"
 FRA_EU_The_Cult_of_Reason_desc: "Nacida en los tumultuosos años que siguieron a la Revolución Francesa, el culto de la razón se mantiene como un claro ejemplo de valores republicanos y de aspiración por el progreso genuino. Desafortunadamente, fue usurpada por el traidor Robespierre, quien la utilizó como una mera herramienta para consolidar su poder. A pesar de esto, los ideales del culto a la razón se mantienen relevantes a día de hoy. Mientras continuamos la reconstrucción de la otrora orgullosa nación francesa, estos ideales se convertirán en la base de nuestro nuevo régimen y nos guiarán en nuestra búsqueda de razón, igualdad e innovación."
 FRA_EU_Creative_Revolution: "La revolución creativa"
 FRA_EU_Creative_Revolution_desc: "Francia siempre ha sido una nación creativa. Desde la arquitectura hasta el cine, pasando por el arte, Francia históricamente ha sido cuna de varias revoluciones creativas. Si bien el caos provocado por la Guerra Europea y nuestra guerra civil puso pausa a estos movimientos, ahora nos podemos permitir revivirlos. Como parte de nuestra campaña de reconstrucción, plantaremos las semillas de una nueva revolución creativa. Restauraremos museos, reviviremos las guildas de artistas y promocionaremos a jóvenes artistas franceses. Puede que el arte no tenga mucho peso en la economía francesa, pero es un reflejo de la prosperidad de la nación. Y si queremos prosperar, apoyar a las artes será fundamental."
 FRA_EU_United_By_Science_and_Reason: "Unidos por la Ciencia y la Razón"
 FRA_EU_United_By_Science_and_Reason_desc: "A lo largo de la historia, las naciones más poderosas y duraderas fueron aquellas que aportaron fuertemente en la ciencia. Las innovaciones industriales fueron los que impulsaron a Rusia y a los Estados Unidos al escenario mundial, y las innovaciones tecnológicas han contribuido a la mejora de la calidad de vida por todo el mundo. Mientras recomponemos nuestra nación rota, esperamos con ilusión un futuro donde impere la ciencia y la razón. Un futuro donde la superstición y el miedo a lo desconocido haya sido sustituido por esperanza. Un futuro en el que Europa esté libre y unida, para siempre."
 FRA_EU_A_New_Technocratic_Superstructure: "La superestructura tecnócrata"
 FRA_EU_A_New_Technocratic_Superstructure_desc: "Si bien muchos piensan que la tecnocracia es un concepto reciente, la historia nos muestra lo contrario. Acuñado por primera vez por William Henry Smyth en 1919, fue desarrollado por Howard Scott en los años 30. Aunque su partido tecnócrata no tuviese mucho éxito y fuese eventualmente disuelto, la idea que defendió sigue viva. Los fracasos de la Quinta República en la Guerra Europea son pruebas más que suficientes para demostrar que una nueva forma de gobierno es necesaria. Francia ya no será gobernada por avariciosos políticos que solo miran por si mismos. De ahora en adelante el gobierno estará a cargo de numerosos equipos de expertos. Si bien no serán elegidos democráticamente, estos individuos se esforzarán al máximo para cambiar Francia. Y, con nuestra guía, lideraran a Francia a una nueva era dorada de cooperación y unidad."
 FRA_EU_Diversify_the_French_Citizen: "Diversificar al ciudadano francés"
 FRA_EU_Diversify_the_French_Citizen_desc: "¿Qué representa realmente ser un ciudadano francés? La derecha diría que el ciudadano francés es europeo, pero nosotros tenemos otra idea. Francia es un diverso crisol de nacionalidades y culturas, y representar a todo nuestro pueblo en una única imagen sería una enorme falta de respeto hacia las otras culturas. Si realmente buscamos representar a nuestro pueblo, entonces deberemos ampliar nuestro concepto de \"francés\". Atrás quedaron los días de discriminación. Atrás quedaron los días en los que una persona podía ser vista como un ciudadano de segunda en su propio país. Si de verdad queremos dejar atrás los errores del pasado, remodelar la idea de lo que significa ser un ciudadano francés será uno de las muchos pasos hacia una verdadera igualdad para todos."
 FRA_EU_Expand_Immigration: "Facilitar la inmigración"
 FRA_EU_Expand_Immigration_desc: "Nunca ha habido un tópico tan controversial en la política francesa como el debate en torno a la inmigración. Iniciada tras la llegada a nuestro país de masivas oleadas de migrantes árabes que huían de la violencia de la primavera árabe y la Guerra civil siria. Esta cuestión galvanizó rápidamente al gobierno francés. Muchos reclamaron endurecer el control migratorio. No obstante, bajo nuestro gobierno, no se frenará la inmigración, es más, incrementará. Los inmigrantes recibirán apoyo y subsidios, siempre y cuando contribuyan a la reconstrucción de Francia. Los conservadores pueden hacer todos los berrinches que quieran, que nosotros haremos caso omiso. Al fin y al cabo, tenemos el poder, así que podemos hacer lo que se nos plazca."
 FRA_EU_Economic_Enrichment: "Enriquecimiento económico"
 FRA_EU_Economic_Enrichment_desc: "Francia es una nación única. Estamos bendecidos con abundantes yacimientos mineros y tierras fértiles. Y si bien a lo largo de nuestra historia hemos sacado provecho a nuestra tierra, apenas hemos explotado nuestros yacimientos mineros. Si queremos dejar de depender de China y África, deberemos revitalizar la agricultura y minería francesa. Subsidiar a estos sectores dará un impulso a nuestra economía y creará puestos de trabajo tanto para nuestros ciudadanos e inmigrantes. Adicionalmente, nos permitirá financiar nuestro vasto sistema de servicios sociales. Medidas como estas no solo nos beneficiará a nosotros, sino que también lo hará a nuestros aliados, quienes estarán más que agradecidos de recibir minerales de nuestros yacimientos y comida de nuestras granjas."
 FRA_EU_The_Global_Project: "El proyecto global"
 FRA_EU_The_Global_Project_desc: "¿Qué es Francia sino una pequeña pieza en el puzle que es el mundo? Muchos tratan de negarlo, pero para nosotros, está más que claro que tenemos un propósito más allá que la existencia continuada de nuestra nación. El mundo es como una red, un complejo entramado de acuerdos comerciales y alianzas. Si realmente queremos dar a nuestro pueblo una sensación de unidad global, deberemos conectarnos a esta red. Esto no solo nos permitirá fomentar un sentimiento de unidad entre nuestro pueblo, sino que también nos permitirá atraer a trabajadores y expertos extranjeros, lo que nos ayudará enormemente en el proceso de reconstrucción."
 FRA_EU_United_Under_Humanity: "Unidos bajo la Humanidad"
 FRA_EU_United_Under_Humanity_desc: "Al fin, el sueño se ha hecho verdaderamente realidad. Lo que se creía imposible ha sido posible. Las nocivas ideas del nacionalismo y el excepcionalísimo han sido reemplazadas con solidaridad y bondad con la gente sin importar su apariencia u origen. Todavía queda algún que otro conservador pataleando y llorando. Nos tildaron de haber traicionado y vendido al pueblo francés a los globalistas, pero nosotros sabemos la verdad. Francia nunca había sido tan libre ni había estado tan unida. Somos más fuertes ahora que dejamos atrás el concepto de nacionalidad para enfocarnos en lo verdaderamente importante: Todos somos seres humanos, sin importar de donde vengamos."
 FRA_EU_Mankind_Redefined: "Humanidad, redefinida"
 FRA_EU_Mankind_Redefined_desc: "La historia no ha sido amable con aquellos que desean redefinir el concepto de humanidad. En la mayoría de los casos, el término ha sido empleado por dictaduras para justificar la persecución de minorías. Sin embargo, para nosotros, esto no puede estar más alejado de la realidad. No buscamos derribar al pueblo, queremos tenderles la mano. Para asegurar la prosperidad para todos, debemos tratar a todos por igual. Cosas tan insignificantes como la raza, etnicidad o nacionalidad ya no serán un obstáculo para nadie. Debemos estar dispuestos a dejar esas ridículas ideas de lado y abrazar lo que verdaderamente significa la humanidad. Es un concepto para unir, no para dividir."
 FRA_EU_The_Will_to_Grow: "La voluntad de crecer"
 FRA_EU_The_Will_to_Grow_desc: "El progreso nunca llega de forma natural. Alguien debe estar allí para dar el primer paso. Pero una vez que se da, el progreso no puede detenerse. A pesar de todos sus éxitos, la Quinta República fracasó en garantizar que continuara el progreso. El deseo de crecer fue remplazado por pereza y apatía, y la juventud se conformó con lo que tenía. Y mientras holgazaneábamos, los rusos hicieron sus deberes. Y nuestro fracaso a la hora de alcanzar a nuestros enemigos eventualmente llevó a nuestra derrota a manos de Rusia. Para aventajar a nuestros enemigos, debemos buscar el progreso y el crecimiento a cualquier coste. Junto a nuestros aliados europeos, pisaremos el acelerador en nuestra búsqueda de crecimiento y aceleraremos hacia un futuro libre y próspero."
 FRA_EU_Curing_Industrial_Ailments: "Saneando las dolencias industriales"
 FRA_EU_Curing_Industrial_Ailments_desc: "Durante la mayor parte de su historia, Francia ha destacado por sus avances industriales. Desde la primera revolución industrial hasta la actualidad, la industria francesa es reconocida globalmente por su innovación. Sin embargo, la rápida industrialización de nuestro país ha tenido un coste. En nuestra empresa de convertir Francia en una potencia industrial, contribuimos significativamente al cambio climático. Mientras seguimos adelante con nuestra reconstrucción, debemos reevaluar nuestra postura sobre la industrialización. Si bien es necesaria para el funcionamiento de cualquier nación, deberemos ser conscientes de los potenciales daños que pueden causar."
 FRA_EU_The_Technological_Spearhead: "Vanguardia tecnológica"
 FRA_EU_The_Technological_Spearhead_desc: "El inicio del siglo XII fue un periodo de grandes avances tecnológicos. Al igual que la carrera armamentística durante la guerra fría, las compañías compitieron entre sí para estar a la vanguardia de la innovación. La tecnología nunca había tenido un rol tan crucial para la supervivencia de una nación. Avances en la guerra informática y con drones ha permitido a distintas naciones atacar infraestructuras vulnerables sin arriesgar la vida de sus soldados. Si queremos tener alguna oportunidad contra el oso ruso, deberemos pisar el acelerador en el ámbito tecnológico. Pues si nos quedamos atrás, nuestros enemigos tomarán la ventaja y nos destruirán."
 FRA_EU_Removing_the_Red_Tape: "Eliminar la burocracia"
 FRA_EU_Removing_the_Red_Tape_desc: "A través de la historia, el progreso siempre ha estado lastrado por burocracias ineficientes. Normativas de seguridad, negociaciones con sindicatos y presupuestos ajustados son cosas que no han hecho más que ralentizar el avance de la sociedad. No nos podemos permitir lidiar con la burocracia para seguir adelante con nuestros planes. Si recortamos la burocracia, ahorraremos tiempo y dinero y nos permitirá aprobar más rápidamente proyectos revolucionarios, consiguiendo así tenerlos listos en tiempo récord. Algunos se mostrarán preocupados sobre la normativa de seguridad, pero estos recortes son, en última instancia, un mal necesario. Si queremos llevar a Francia al futuro, tendremos que estar dispuestos a hacer recortes."
 FRA_EU_The_Public_Private_Enterprise: "Alianzas público-privadas"
 FRA_EU_The_Gears_Turn_Again: "Los engranajes empiezan a girar"
 FRA_EU_Walking_a_Green_Path: "Tomando el camino verde"
 FRA_EU_Walking_a_Green_Path_desc: "Desde la primera mitad del siglo XXI, Francia se ha convertido en uno de los frentes de batalla contra el cambio climático. Desde la firma del Acuerdo de París, hemos hecho todo lo que estaba en nuestra mano para reducir nuestra huella de carbono. Desde invertir en energía renovable hasta patrocinar fabricantes franceses de vehículos eléctricos. Aún así, la Quinta República siempre se mostró indiferente a la creciente destrucción causada por las petroleras. Si deseamos forjar nuestro propio legado, debemos redoblar nuestra apuesta por iniciativas ecológicas. Con ayuda de Bruselas y Berlín, trabajaremos para completar la transición de Francia hacia las energías renovables, por mucho que se quejen las petroleras."
 FRA_EU_the_Final_Goalpost: "La última oportunidad"
 FRA_EU_the_Final_Goalpost_desc: "Desde las primeras señales, hemos estado librando una guerra contra el cambio climático. Hemos conseguido grandes logros en esta lucha, como la firma del Acuerdo de París o financiar las energías renovables. Sin embargo, no podemos permitirnos volvernos indiferentes al cambio. Si no tomamos la iniciativa en esta lucha, ya habremos fallado en nuestra misión de salvar el mundo. Al igual que la Quinta República, renovaremos nuestro compromiso con la energía renovable y reducir nuestras emisiones de carbono. Con apoyo de Bruselas y Berlín, veremos a Francia transformarse en un país del futuro, con las energías verdes liderando el progreso."
 FRA_EU_An_Invisible_Footprint: "Una huella invisible"
 FRA_EU_An_Invisible_Footprint_desc: "El concepto de una huella de carbonó surgió en los inicios de nuestra lucha contra el cambio climático. Representa la totalidad de gases de efecto invernadero emitidos por un individuo, compañía o país y los regímenes anteriores hicieron esfuerzos considerables para reducir nuestra huella de carbono. Desafortunadamente, esos esfuerzos fueron insuficientes, pues nuestra huella de carbono sigue siendo masiva en la actualidad. El momento de actuar es ahora, no mañana ni la semana que viene. Si no actuamos rápidamente para borrar nuestra huella de carbono, todo nuestros esfuerzos habrán sido en vano. Y si fallamos hoy, puede que nunca seamos capaces de garantizar un futuro seguro para nuestros hijos."
 FRA_EU_The_Second_Star_in_the_Union: "La segunda estrella en la Unión"
 FRA_EU_The_Second_Star_in_the_Union_desc: "Francia siempre ha sido un miembro clave de la Unión Europea. Desde nuestra adhesión en 1958, hemos pasado de ser un miembro más a ser el líder de la Unión, guiando la expansión de esta hasta lo que es hoy. Aunque fallamos al defendernos de la agresión rusa, no debemos renunciar al sueño de una Europa unida. Los conservadores y socialistas pueden hacer todos los berrinches que quieran, pues haremos oídos sordos a su verborrea incoherente. El concepto de la nación francesa ha perdido su significado y, si queremos sobrevivir, debemos estar dispuestos a abandonarlo por el bien común de todos los europeos."
 FRA_EU_Blurring_the_Borders: "Borrar las fronteras"
 FRA_EU_Blurring_the_Borders_desc: "¿Qué son las fronteras realmente? ¿Líneas arbitrarias dibujadas en la tierra? ¿Una herramienta para dividir a las personas con ideas tan estúpidas como el nacionalismo? Si lo pensamos bien, todas estas cosas son ciertas. A medida que hacemos realidad el sueño europeo, debemos acabar con el concepto de las fronteras. Una Europa unificada es una en la que  sus habitantes son libres de desplazarse y en la que visiones e ideas puedan difundirse libremente. Acabar con las fronteras también nos liberaría de la carga que acarrean. El pueblo ya no estará dividido por líneas arbitrarias. Ya no nos haremos llamar franceses o alemanes. Somos europeos y punto, ahora y para siempre."
 FRA_EU_Quell_Nationalism: "Sofocar el nacionalismo"
 FRA_EU_Quell_Nationalism_desc: "Despite our victory over the militarists, there are still some who continue to tout their rhetoric. They riot day and night, decrying our regime for \"selling out to the globalist elite\" and \"betraying the French people\". While the previous regime was contempt to look the other way, we will not follow this approach. If the Pan-European dream is to be fully realized, then nationalism of all kinds must be crushed. We will drag the nationalists out, crush their rallies, and ban their parties. Some will denounce this as blatant authoritarianism, but it is a necessary evil. Europe will not be united if we allow these movements to persist."
 FRA_EU_Popularizing_the_Pan_Euro_Ideal: "Popularizar el paneuropeísmo"
 FRA_EU_Popularizing_the_Pan_Euro_Ideal_desc: "A pesar de los mejores esfuerzos de Volt y otras organizaciones políticas, el paneuropeísmo está lejos de ser tan popular como debería ser. Tradicionalmente, los partidos europeístas habían sido actores secundarios en la política europea. Si queremos hacer realidad nuestro sueño de una Europa unida, entonces deberemos hacer todo lo que esté en nuestra mano para apoyar a estos partidos. Financiarnos, hacer campaña por ellos, lo que sea para incrementar su popularidad. Con ayuda, el sentimiento paneuropeo irrumpirá en toda Europa. Y deberemos aprovechar este incremento de apoyo para hacer que la idea de una Europa unida deje de ser un sueño para que pase a ser una realidad."
 FRA_EU_Uniting_our_Armies: "Unificando los ejércitos"
 FRA_EU_Uniting_our_Armies_desc: "Francia siempre ha estado muy orgullosa del poder de su ejército. Desde los gloriosos días de Napoleón hasta la actualidad, decir que Francia tiene una rica historia militar sería quedarse corto. A medida que nos acercamos a hacer realizad el sueño paneuropeo, debemos aceptar la verdad. Para poder cumplir nuestros objetivos, debemos iniciar la unificación de los numerosos ejércitos de Europa Occidental. El integrarnos voluntariamente en el Comando de la UE pondrá a prueba nuestro compromiso con la unificación en europea, y aunque algunos generales se bajen del barco, la decisión ya está tomada. Lo haremos por el bien de toda Europa."
 FRA_EU_Beyond_our_Singular_Existance: "Más allá de nuestra existencia"
 FRA_EU_Beyond_our_Singular_Existance_desc: "What truly is France? A people? An idea? A nation? We say otherwise. Why can't France serve a purpose other than its own continued existence? The conservatives decry the EU for being a \"tool of the globalists\". While the socialists decry it for \"continuing capitalist oppression\". But all of them are wrong. As the Germans have done, we must accept that the concept of the French nation has lost its meaning. The future will not be kind to nations that refuse to change. And if we refuse to get with the times, we will fall just like all the other nations who did."
 FRA_EU_The_European_Dream_Marches_on: "El sueño europeo sigue adelante"
 FRA_EU_The_European_Dream_Marches_on_desc: "Desde su fundación en 1993, la UE, una pequeña coalición en aquel momento, creció hasta formar una alanza multinacional. Desde entonces, un puñado de personas con un objetivo en común trabajaron día y noche para hacer realidad el sueño paneuropeo. Muchos pensaron que la victoria rusa en Europa Oriental acabaría con la idea de una Europa unida, pero no hizo más que avivarla. Nos mostró que si no nos unimos hoy, pereceremos el día de mañana, sin haber cumplido nuestro sueño de unificación. El amanecer simbolizará un punto de inflexión no solo en la historia de Francia, sino en la de toda Europa. Cual ave fénix, nos alzaremos de las cenizas más fuertes que antes. Y cuando vengan los enemigos de Europa, nosotros estaremos listos para plantarles cara.  La unión hace la fuerza, y nada ni nadie será capaz de romper la nuestra."
 FRA_EU_Sister_Republic: "Las repúblicas hermanas"
 FRA_EU_Sister_Republic_desc: "Francia siempre ha tenido una relación especial con la UE. Si bien hemos sido uno de los miembros fundadores, las recientes olas de euroescepticismo han supuesto un varapalo para el sueño paneuropeo. Políticos como Zemmour o Le Pen siguen obstinados en rechazar cualquier integración en la unión mientras afirman que Francia debe liberarse de su influencia. Como gesto de buena voluntad con ellos, renunciaremos a la unificación total, y en su lugar buscaremos una cooperación más estrecha con nuestros aliados. Aunque a Volt y otros grupos similares no les siente bien esto, es un sacrificio necesario por el bien de nuestra alianza."
 FRA_EU_Europeanize_Paris: "Europeizar París"
 FRA_EU_Europeanize_Paris_desc: "París, la ciudad más famosa de Francia y quizás Europa, ha resistido el paso del tiempo. Desde los callejones hasta las catacumbas, incluso los propios ladrillos están impregnados de la rica historia de la ciudad. Se mantiene como uno de los crisoles de referencia, donde las culturas se mezclan y las ideas florecen. Desafortunadamente, la ciudad ha vivido mejores días, y el abandono por parte de la Quinta República ha dejado a algunas partes de la ciudad en un estado lamentable. Como parte de nuestra cooperación con la UE, nos embarcaremos en una gran campaña para revitalizar París, modernizarla y ponerla a la altura de otras capitales europeas como Londres o Berlín."
 FRA_EU_A_New_NATO: "La nueva OTAN"
 FRA_EU_A_New_NATO_desc: "Desde su formación en 1949, la Organización del Tratado del Atlántico Norte también conocido como OTAN, ha servido como frente de Occidente contra el autoritarismo. Muchos afirmarían que la alianza quedó obsoleta con el colapso de la Unión Soviética. Pero nada más lejos de la realidad. En definitiva, el fracaso de la OTAN en defender a Europa Oriental de la horda rusa es prueba suficiente de sus fracasos. Sin embargo, no estamos tan dispuestos a abandonar el concepto de la OTAN. Mediante pruebas y reformas, reconstruiremos la organización para que sea lo que realmente significó para mí. No solo una alianza por la democracia, sino un auténtico frente para Europa Occidental. Uno que realmente pueda hacer frente al autoritarismo de la Rusia de Medvédev."
 FRA_EU_Advanced_Digital_Warfare: "Guerra digital avanzada"
 FRA_EU_Advanced_Digital_Warfare_desc: "La guerra es un juego en constante evolución. Nada se queda igual tras la guerra. Todo cambia con el tiempo. Desde los tanques hasta los drones pasando por los aviones. El campo de batalla nunca había sido tan caótico. En esta era de guerra avanzada, si no te adaptas a los tiempos actuales, serás aniquilado. Al igual que los chinos, expandiremos nuestra división de ciberguerra. Integrar la guerra cibernética en nuestro ejército seguro que nos dará ventaja sobre nuestros enemigos. Nos permitirá sabotear infraestructuras críticas y cortar las comunicaciones del enemigo."
 FRA_EU_Embrace_AI: "Adoptar la IA"
 FRA_EU_Embrace_AI_desc: "Desde principios del siglo XXI, la IA ha abierto nuevas puertas. Iniciando con la creación de Siri, el desarrollo de la IA se ha ido volviendo más complejo y acelerado. Hoy en día, la IA es vista con escepticismo en el mejor de los casos y en el peor, es repudiada. Si bien la atención de la mayoría ha estado enfocada en la IA generativa, nosotros estamos más interesados por sus capacidades militares. Como parte de nuestra misión de poner al ejército al día, realizaremos inversiones considerables para integrar la IA. Esto no solo nos permitirá modernizar nuestras fuerzas armadas, sino que también nos permitirá reducir las pérdidas de vidas humanas en el campo de batalla."
 FRA_EU_The_Cause_of_the_People: "La causa del pueblo"
 FRA_EU_The_Cause_of_the_People_desc: "Desde que conceptuamos nuestro sueño de una Europa unida, hemos hecho todo lo posible por hacerlo. Aún así, no debemos olvidar el pueblo al que servimos. Todavía existen voces escépticas con nuestros objetivos. Muchos consideran que  estamos subordinados a unas pequeñas élites financieras, mientras que otros consideran nuestro sueño como una mera continuación de la opresión corporativa. Para ganarnos la confianza de la gente, debemos calmar sus miedos. Les reafirmaremos que estamos al servicio del pueblo, no de ningún CEO o los globalistas. Solo una vez que nos ganemos la confianza del pueblo nos podremos poner manos a la obra."
 FRA_EU_Democracy_Manifest: "Manifiesto de la Democracia"
 FRA_EU_Democracy_Manifest_desc: "Despite the drastic changes we have made to the French nation, one thing has remained constant, our commitment to democracy remains unchanged. At the core, we remain a nation by the people and for the people. The right and left will try to say that we are \"the globalist puppet\" or \"corporate pawns\" but the truth speaks for itself. Our duty is to France and to democracy. The future of not just France but Europe remains at stake. We remain under threat from the East. And if we do not save democracy today, the bear might overrun us tomorrow."
 FRA_EU_Eliminate_Human_Casualties: "Eliminar las bajas humanas"
 FRA_EU_Eliminate_Human_Casualties_desc: "Ninguna nación va a la guerra esperando no sufrir fuertes pérdidas. ¿Pero por qué esto tiene que ser así? La guerra se cierne sobre nosotros y si queremos salir victoriosos de esta, tendremos que hacer todo lo posible para evitar pérdidas innecesarias, ya sea mediante inversiones en la medicina o en los drones. Alternativamente, podríamos buscar avances en el campo de la cibernética, que nos permitan incrementar las capacidades de combate de nuestros soldados y mejorar su desempeño en el campo de batalla. Aunque no podrán evitar las pérdidas de vidas, estos avances por lo menos nos permitirán reducirlas."
 FRA_EU_Cyber_Warfare_Department: "Revolucionar el Departamento de Ciberguerra"
 FRA_EU_Cyber_Warfare_Department_desc: "El campo de la electrónica ha avanzado rápidamente desde que se montó el primer ordenador. Desde los teléfonos inteligentes hasta los drones. En guerras pasadas, los avances tecnológicos dieron una gran ventaja a varias naciones. Pero si queremos vencer al oso ruso, deberemos ir más allá. La guerra con drones o la cibernética está bien, pero no es suficiente. Debemos ir más lejos, superar los límites establecidos. PEMs, implantes cibernéticos, robots militares, todo esto está en nuestra lista de la compra. Algunos cuestionarán la ética de estas innovaciones, pero no nos importa. Si queremos salir victoriosos, deberemos estar dispuestos a incorporar tecnología de ética cuestionable."
 FRA_EU_Utilize_True_European_Allies: "Utilizar a los auténticos europeos"
 FRA_EU_Utilize_True_European_Allies_desc: "Nuestro fracaso en la Guerra Europea nos ha mostrado que no podemos confiar en aquellos que afirman ser nuestros aliados. Cuando Kiev fue tomada, numerosos oficiales ucranianos no se lo pensaron dos veces para desertar al bando ruso. Cuando Polonia estaba al borde del precipicio, los separatistas silesianos fueron los primeros en abandonar el barco. Traidores, ratas, oportunistas... estas palabras se quedan cortas para describir lo que es realmente esa gente. En nuestra misión de reclamar nuestro legado, debemos depositar nuestra confianza únicamente en verdaderos patriotas europeos. Aquellos dispuestos a dar sus vidas por sus ideales. Aquellos que sean leales a sus patrias aún si eso signifique la muerte. Estos verdaderos patriotas serán aquellos que lideren el cambio cuando reclamemos el Este. Y nos ayudarán a vengarnos de los colaboradores."
 FRA_EU_Total_war_the_End_War: "Guerra total para terminar la guerra"
 FRA_EU_Total_war_the_End_War_desc: "Por mucho que queramos negarlo, tenemos que afrontar la verdad. Todo el continente europeo se está encaminando a otra guerra, una incluso más destructiva que la última. El destino del continente entero pende de un hilo. Y si nosotros no nos hacemos con Europa, nuestros enemigos lo harán. Si queremos salir victoriosos, tendremos que estar dispuestos a hacer todo lo que haga falta para vencer. Nuestros soldados ya no estarán limitados por códigos o restricciones. Desataremos toda nuestra ira sobre el enemigo. Y únicamente cuando hayamos vencido, podremos abandonar las armas. No temporalmente, para siempre."
 FRA_EU_Dissolve_Executive_Authority: "Disolver la autoridad ejecutiva"
 FRA_EU_Dissolve_Executive_Authority_desc: "Si bien nos hemos integrado con éxito en la UE, tendremos que eliminar gradualmente muchas instituciones. Si bien el sistema presidencial era necesario para la Quinta República, para nosotros no tiene ninguna utilidad. Francia ya no estará gobernada por un presidente o un primer ministro. De ahora en adelante, una comisión de expertos y funcionarios de la UE supervisarán el funcionamiento del Gobierno francés. Deberemos acelerar la transición de Francia de un sistema presidencial a uno comisionario. Algunos protestarán esta decisión, pero en última instancia es lo mejor para el país."
 FRA_EU_Moratorium_of_Political_Debate: "Suspender el debate político"
 FRA_EU_Moratorium_of_Political_Debate_desc: "A pesar de nuestros esfuerzos, muchos aspectos de nuestro régimen siguen estando fuera de lugar. Muchos en la derecha y en la izquierda continúan con sus berrinches, rechazando tajantemente trabajar con nuestro gobierno llegando al punto de sabotearlo. No podemos permitir que estos radicales frenen nuestro progreso, de lo contrario no podremos hacer nada. Con autorización de Berlín, suspenderemos temporalmente cualquier forma de debate político. Esto será considerado controversial por muchos, e incluso autoritario, pero se trata únicamente de una medida temporal. Una vez que hayamos completado nuestra transición de una república a una comisión, levantaremos la suspensión al debate político. Pero por ahora, debemos tomar medidas extraordinarias para consolidad nuestro poder."
 FRA_EU_European_Cooperation: "Cooperación europea"
 FRA_EU_European_Cooperation_desc: "La cooperación ha sido históricamente la base de cualquier gobierno funcional. Y el nuestro no es la excepción. El sello distintivo de nuestro régimen será nuestra voluntad de cooperar con nuestros aliados. Cosas como acuerdos comerciales y ejercicios militares conjuntos serán empleados para demostrar nuestro inquebrantable compromiso con el proyecto europeo. Haremos ver a nuestros aliados en Berlín que no solo estamos dispuestos a cooperar, sino que lo buscamos activamente, lo que permitirá a nuestra alianza crecer hasta algo más grande. No solo será una alianza, forjaremos una hermandad inquebrantable."
 FRA_EU_Paying_our_Tithe: "Pagando nuestro diezmo"
 FRA_EU_Paying_our_Tithe_desc: "En esta era contemporánea nada es gratis. Bienes, servicios, utilidades, todas estas cosas tienen un coste. Y por mucho que nuestros aliados nos hayan ayudado en nuestra reconstrucción, esto no ha sido gratis. Grandes regiones de Alemania e incluso el Benelux siguen dañadas por culpa de misiles o sabotajes rusos. Y aunque no se esmeraron en ayudarnos a reconstruir, ellos esperan algo a cambio de su ayuda. Ya sean recursos, mano de obra o fondos, esperan que arrimemos el hombro en su reconstrucción al igual que ellos lo hicieron con nosotros. Algunos fruncirán el ceño con este impuesto, pero pagarlo es lo que más nos conviene, pues mostrará nuestro firme compromiso con el proyecto paneuropeo."
 FRA_EU_Embolden_the_Euro: "Estimular el euro"
 FRA_EU_Embolden_the_Euro_desc: "Habiéndose creado en 1996, el euro puede ser considerado como uno de los mayores logros de la Unión Europea. No es solo una divisa, es un símbolo de unidad.  Su adopción por parte de varios gobiernos, incluido el nuestro, puso a prueba el compromiso con el proyecto paneuropeo. Muchos pensaron que con la victoria rusa en el Este el euro se desplomaría, pero ha sucedido justo lo contrario. El euro se ha revalorizado con más rapidez y con nuestro ascenso dentro de la Unión Europea, seguirá fortaleciéndose. Nuestra fuerza es la fuerza del euro, y estimularlo es solo un paso más en el largo viaje hacia una Europa completamente unida."
 FRA_EU_Nation_of_Equality_and_Science: "Nación de Equidad y Ciencia"
 FRA_EU_Nation_of_Equality_and_Science_desc: "A pesar de los fallos del Gobierno de Macron, no podemos negar los progresos que se hicieron durante la Quinta República. El estancamiento conservador y las recaídas fueron remplazados por progreso e innovación. Se invirtió masivamente en los servicios sociales y se financió generosamente a investigaciones tecnológicas. De cara al futuro, lo lógico será continuar con la financiación a estos programas. Con nuestra guía, Francia se convertirá en una nación de progreso e innovación. El estancamiento será sustituido por innovación, la regresión con progreso. Con la ayuda de nuestros aliados, abrazaremos el futuro con los brazos abiertos, listos para hacer frente a cualquier obstáculo que encontremos por el camino."
 FRA_EU_If_only: "Si solamente..."
 FRA_EU_If_only_desc: "Pensamos que nunca pasaría, pero al final, pasó. ¿Y donde estamos ahora? A pesar de nuestro éxito, Europa sigue dividida en dos. Por mucho que no nos guste, debemos aceptar que es necesario echarle el muerto a alguien. Si tan solo esos agitadores populistas nos hubiesen escuchado. Si tan solo los euroescépticos hubiesen sido más abiertos a nuestras ideas de unidad europea, pero no lo fueron. Y mira como estamos ahora. Nuestros aliados o han sido borrados del mapa o se han convertido en títeres de Moscú y, una vez más, Europa se encuentra partida a la mitad. Si solamente nos hubiesen escuchado. Si tan solo hubiesen estado dispuesto a escucharnos..."
 FRA_EU_Iberian_Intervention: "Intervención Ibérica"
 FRA_EU_Iberian_Intervention_desc: "A pesar de haberse salvado de lo peor de la Guerra Europea, la península Ibérica no ha sido ajena a sus consecuencias. Tras la victoria de Medvédev, la anteriormente pacífica península ha vuelto a sucumbir a una guerra civil. Radicales y separatistas luchan con la esperanza de hacer realidad su visión. Al mismo tiempo, los gobiernos de la península se aferraron desesperadamente a Madrid y Lisboa. No podemos simplemente ponernos de brazos cruzados y no hacer nada, pues nos arriesgaríamos a que una facción prorrusa salga vencedora de la contienda y suponga una amenaza por nuestro flanco sur. Por lo que, con autorización de Bruselas, tomaremos cartas en el asunto y pacificaremos la península. Aplastaremos a los radicales y restauraremos el orden en la otrora pacífica península. Bajo la bandera de la unidad europea, salvaremos a Iberia del colapso total."
 FRA_EU_Our_Offer_to_Brussels: "Nuestra oferta a Bruselas"
 FRA_EU_Our_Offer_to_Brussels_desc: "A pesar de todo lo que hemos hecho, nuestros aliados en Bruselas siguen sobrecargados. Encargados de gobernar tanto el Este como el Oeste, la administración de Bruselas ha tenido que trabajar día y noche para administrar adecuadamente ambas regiones. No podemos quedarnos de brazos cruzados mientras vemos a nuestro aliado estar desbordado por las obligaciones del estado. Le haremos un trato a Bruselas: Nosotros tomaremos el control de Europa Occidental y, a cambio, recibirán una porción de su producción económica. Esto no solo relajará la carga administrativa de nuestro, también demostrará nuestro compromiso con el proyecto europeo y nos permitirá ganarnos su favor de cara al futuro."
 FRA_EU_Strangle_Populist_Rabble_Rousing: "Combatir a los agitadores populistas"
 FRA_EU_Strangle_Populist_Rabble_Rousing_desc: "Uno de los muchos errores de la Quinta República sigue manifestándose a día de hoy. A pesar de que hayamos cimentado nuestro poder, todavía subsisten partidos populistas que se resisten a nuestro mandato. Escupen constantemente retórica antieuropea y organizan protestas masivas contra nuestro régimen. A diferencia de Macron, no nos contendremos al tratar con esos agitadores. Si no trabajan para nosotros, están contra nosotros y su disidencia no será tolerada. Les golpearemos con todo lo que tengamos a nuestra mano, censuraremos a sus líderes y restringiremos sus movimientos. Podrán hacer todos los berrinches que quieran, pero no habrá nadie que se moleste en escucharlos."
 FRA_EU_Post_Ideological_Governance: "Gobernanza postideológica"
 FRA_EU_Post_Ideological_Governance_desc: "Mientras nos acercamos a hacer realidad el proyecto europeo, todavía tenemos un asunto pendiente. Debemos abandonar el concepto de ideologías si deseamos distanciarnos de la Francia del pasado. En realidad, debemos aceptar que el concepto de ideologías solo ha sido empleado para dividir al pueblo. Si de verdad queremos unir a nuestro pueblo, deberemos desechar estas ideas. Ya no habrán conservadores, liberales ni socialistas. Estas etiquetas ya no se usarán para dividir al pueblo o para definir a alguien como persona. De ahora en adelante, todos somos franceses, sin importar lo que puedan decir estas etiquetas."
 FRA_EU_Never_Again_means_Now: "¡Nunca más es ahora!"
 FRA_EU_Never_Again_means_Now_desc: "Cuando Moscú cantó victoria, nos hicimos una promesa a si mismos. Que nunca volveríamos a ser derrotados. Nunca más dejaremos que nuestros sueños de una Europa libre y unida serán aplastados por oportunistas o populistas. Nunca más permitiremos que la libertad sea aplastada por aquellos que solo deseen tomar poder para si mismos. Pero nunca más no significa mañana o la próxima semana. ¡Significa ahora! Ahora es el momento de marchar contra la amenaza en el Este. Ahora es el momento de hacer nuestros sueños de una Europa unida realidad. Y si no tomamos las riendas ahora, nunca volveremos a tener otra oportunidad de hacerlo."
 FRA_Apologize_for_War_Contribution: "Su honor restaurado"
 FRA_Apologize_for_War_Contribution_desc: "Con coraje y sacrificio, el ejército ha restaurado el honor de Francia. En su hora más oscura y en medio de falsas acusaciones de haber fracasado, nuestros hombres superaron todas las adversidades y demostraron que seguimos siendo una potencia digna para llevar el nombre de Francia. Logramos salir de las fauces de la derrota forjando una gran victoria, no solo para nosotros, sino para toda Europa. Tras dejar nuestro pasado manchado por la derrota atrás, ahora podemos mirar de frente, y con el resto de Europa, marchar juntos por un futuro mejor. Más les vale a los ucranianos que construyan suficientes estatuas en nuestro honor..."
 FRA_Demand_Increased_Reperations: "Incrementar las reparaciones"
 FRA_Demand_Increased_Reperations_desc: "Hemos humillado a los rusos, pero únicamente eso no es suficiente para hacerles pagar. El tratado de paz que firmamos con ellos fue demasiado benevolente, permitiéndoles que quedaran impunes por la mayoría de sus crímenes. Mucho del daño que causaron sigue siendo visible, y si no quieren que les hagamos la vida aún más difícil, tendrán que aflojar la cartera. El que rompe paga."
 FRA_Bloodied_Liberator_of_the_Caucasus: "Mantener las guarniciones militares"
 FRA_Bloodied_Liberator_of_the_Caucasus_desc: "No nos podemos permitir la desmovilización, todavía no. Aunque muchos hayan proclamado una nueva era de paz, acciones encubiertas en Rusia dicen lo contrario. Por lo tanto, seguiremos manteniendo guarniciones militares en el Cáucaso, listas para responder rápidamente a cualquier amenaza. Los rusos no nos engañaron en la primera ocasión y tampoco lo harán en esta."
 FRA_Rip_out_the_Russian_Rot: "Cortar de cuajo la raíz rusa"
 FRA_Rip_out_the_Russian_Rot_desc: "Mucho del territorio que tomamos de Rusia está plagado de terroristas y separatistas financiados por ellos y están lastrando seriamente nuestros esfuerzos de reconstrucción y construcción nacional. Los rusos están haciendo todo lo que está a su alcance para hacer estos territorios ingobernables para nosotros, por lo que tendremos que deportarlos. Perdieron estos territorios, por lo que tendrán que asumir las repercusiones de sus actos."
 FRA_Negotiate_Exclusive_Treaty_Ports: "Negociar puertos abiertos exclusivos"
 FRA_Negotiate_Exclusive_Treaty_Ports_desc: "The Russians have been diplomatically isolated and heavily sanctioned ever since the failure of their little \"exploit\" in Eastern European, but we are now willing to offer them a lifeline. Should the Russians be willing to open up a few of their port cities to western trade and investments, we would be happy to lay off a little on their punishment. If they want to refuse, well, it's still their loss."
 FRA_Caucasian_Resource_Rights: "Derechos de explotación de recursos caucásicos"
 FRA_Caucasian_Resource_Rights_desc: "Bajo las montañas y planicies del Cáucaso yacen vastas reservas de recursos naturales. Hemos ayudado a estas regiones a tal punto de que tenemos una gran influencia sobre ellos, y muchos políticos de la zona nos deben algún que otro favor. La economía y el ejército de Francia siempre demandan más y más recursos, y no les importa de donde provengan. Es un pequeño precio a pagar a cambio de nuestra continua protección."
 FRA_Fund_Ukrainian_Peacekeepers: "Financiar a fuerzas de paz ucranianas"
 FRA_Fund_Ukrainian_Peacekeepers_desc: "El pueblo ucraniano resistió admirablemente el embiste ruso y ahora están trabajando duro para estabilizar las tierras que liberamos de los invasores. Desafortunadamente, hemos estado centrando nuestra atención en el Cáucaso, y no nos podemos permitir enviar tropas adicionales para echar una mano a los ucranianos. No obstante, ciertamente podemos financiar sus esfuerzos, pues una Rusia más débil significará un futuro más fácil para nosotros."
 FRA_The_Caucasian_Entente: "La Entente Caucásica"
 FRA_The_Caucasian_Entente_desc: "Ha llegado la hora de formalizar nuestra alianza con los Estados caucásicos. Hasta ahora, nos habíamos limitado a enviarles suministros y apoyarlos financieramente, pero ahora estamos en una posición que nos permite llevar nuestra relación relación un paso más allá. Invitaremos a esas naciones a la OTAN, para que así nunca vuelvan a preocuparse de una invasión rusa. Aquellos que rechacen la invitación no quedarán excluidos de nuestra protección, porque nosotros ni se nos pasaría por la mente abandonar nuestros duros esfuerzos e inversiones puestos en el Cáucaso. Mientras sigamos en pie, el Cáucaso mantendrá su libertad."
 FRA_The_Caucasian_Entente_tt: "Esto creará un pacto de defensa mutua entre Azerbaiyán, Armenia, Kubán, Georgia liderado por la gloriosa nación francesa que asegurará que Rusia nunca vuelva a subyugarlos."
 FRA_Prevent_Another_Weimar: "Prevenir otra Weimar"
 FRA_Prevent_Another_Weimar_desc: "El colapso de la República de Weimar en el siglo XX, nacida del caos y la humillación, fue en última instancia una gran catástrofe para la democracia. El colapso de la Rusia del siglo XXI debe servir como aviso para navegantes - no permitiremos que una Rusia fragmentada repita aquel descenso al extremismo y a la venganza. Francia debe asegurarse de que la reconstrucción de la Rusia de posguerra lleve a un futuro de paz y estabilidad."
 FRA_Democratization_of_Eastern_Minds: "Democratizar las mentes del Este"
 FRA_Democratization_of_Eastern_Minds_desc: "La derrota de Rusia ha abierto las puertas de la democracia a Europa Oriental. Como los defensores de la libertad europea, lideraremos un cambio en la mentalidad de toda la región. Desde Varsovia hasta Kiev, apoyaremos iniciativas educativas, la libertad de prensa y la sociedad civil asegurándonos de que los pueblos de Europa Oriental sean libres del espectro del autoritarismo. Las semillas de la democracia arraigarán, florecerán y remodelarán el Este."
 FRA_Demand_Ukrainian_Leniancy: "Demandar indulgencia a Ucrania"
 FRA_Demand_Ukrainian_Leniancy_desc: "Ucrania ha sufrido mucho en su guerra contra Rusia. Honramos su sacrificio, pero la victoria no debe usarse como un pretexto para hacer demandas excesivas. Instaremos a Ucrania a mostrar indulgencia a la hora de reclamar territorios y reparaciones de guerra, fomentando la reconciliación en vez de resentimiento. Ucrania y Europa sólo podrán conseguir una paz estable y duradera si se deja a un lado el odio."
 FRA_UKR_leniancy_tt: "Si [UKR.GetFlag] Ucrania rechaza adoptar una postura más indulgente con los ciudadanos rusos en sus [KBK.GetFlag] Gobiernos de Ocupación, tomaremos medidas políticas y económicas contra ellos."
 FRA_Denounce_Azov_Influence: "Denunciar la influencia azovita"
 FRA_Denounce_Azov_Influence_desc: "La euforia de la victoria no debe mancharse con el extremismo. Hemos observado la creciente influencia de los azovitas en Ucrania, cuya ideología radical choca con los valores democráticos. Condenaremos públicamente su influencia y presionaremos a Kiev para que resuelvan este problema. El espectro del neonazismo no debe ensombrecer la paz en Europa - la ruta a la democracia de Europa del Este debe permanecer intacta."
 FRA_Capitalize_on_Caucasus: "Capitalización en el Cáucaso"
 FRA_Capitalize_on_Caucasus_desc: "El Cáucaso ha sido por mucho tiempo un punto débil de la influencia rusa, y una oportunidad para nosotros. Con Moscú fuera de combate, estrecharemos nuestra colaboración con las naciones caucásicas para sacar provecho de sus recursos y posición estratégica. Desde los campos petrolíferos de Bakú hasta las rutas comerciales de Tiflis, invertiremos en su desarrollo económico e iniciativas democráticas, asegurándonos de que el Cáucaso se convierta en un aliado de Europa, no un vasallo de Rusia."
 FRA_Uphold_Equality: "Mantener la igualdad"
 FRA_Uphold_Equality_desc: "La igualdad será la base de la nueva era de Europa. Independientemente de su raza, género u origen, cada ciudadano europeo debe tener los mismos derechos y oportunidades. Bajo nuestro liderazgo, desde los viñedos de Champaña hasta los pueblos de Europa Oriental, todos compartirán los frutos de la democracia."
 FRA_Eastern_Democracy_Manifest: "Manifiesto de la democracia oriental"
 FRA_Eastern_Democracy_Manifest_desc: "La democracia en Europa Oriental no es un sueño, es una necesidad. A raíz del colapso de Rusia, hemos abanderado la democratización del este. Desde el Báltico hasta el mar Negro, elecciones democráticas, el estado de derecho y la participación ciudadana acabarán con los últimos remanentes del autoritarismo. La llama de la democracia iluminará el Este, y la gran ola democrática del siglo XXI iniciará allí."
 FRA_VIC_Withdraw_from_integrated_command: "Abandonar la Estructura de Mando Integrada"
 FRA_VIC_Withdraw_from_integrated_command_desc: "A pesar de que hayamos repelido exitosamente la agresión rusa, la victoria no puede enmascarar las profundas divisiones dentro de la OTAN o el sufrimiento de nuestro pueblo. Tras que los Estados Unidos, otrora líder del mundo occidental, perdiese su posición dominante, los continuos conflictos y disputas dentro de la OTAN y la UE sacarían de quicio a cualquiera. La unidad y la amistad de la que hablaban los políticos ha demostrado ser frágil a la vista de un futuro incierto. Afortunadamente, el pueblo francés ha visto la verdad y ha demandado cambios. El obsoleto sistema debe desmantelarse, y solo así podremos sentar las bases de una nueva era. De aquí en adelante, Francia ya no formará parte de la organización militar integrada de la OTAN. Lucharemos codo con codo con cualquier aliado dispuesto a cubrirnos las espaldas."
 FRA_VIC_Our_Own_Direction: "Nuestra propia dirección"
 FRA_VIC_Our_Own_Direction_desc: "En esta última guerra, las fuerzas armadas de la República Francesa han demostrado una vez más su poderío y se han convertido en una fuente de orgullo nacional. La efectividad militar e de nuestro ejército está indudablemente entre las mejores de Europa. Esto es un hecho indiscutido. Ahora bien, debemos abordar las preocupaciones de nuestros oficiales y soldados sobre la permisividad en términos de armas y disciplinas de nuestros aliados durante y tras la guerra, no por deslealtad hacia nuestros aliados, sino por responsabilidad. Estas preocupaciones merecen la atención de nuestros líderes políticos y altos mandos militares. Para preservar la independencia y el legado de nuestras fuerzas armadas, mantener su gran efectividad militar y garantizar el estatus de Francia como gran potencia militar, debemos rechazar tajantemente la mal enfocada idea de integrar el ejército francés en una fuerza europea unificada. Debemos seguir priorizando el desarrollo de nuestro propio ejército."
 FRA_VIC_With_Distinction: "Con distinción"
 FRA_VIC_With_Distinction_desc: "Desde el milagro de Orleans, pasando por nuestro triunfo en Austerlitz, la defensa de Verdún, la liberación de París de las garras del Tercer Reich hasta nuestra actual lucha junto a nuestros aliados de Europa Oriental contra los invasores rusos, la gloriosa historia y logros del ejército francés han perdurado en el tiempo y a los cambios de régimen. El espíritu combativo ha ido pasando de generación en generación. En el soldado francés de hoy, los valores caballerescos y la camaradería de antaño siguen presentes. Al mismo tiempo que reforzamos este sentimiento de unidad a través de la historia, también recordaremos al pueblo francés las grandes hazañas de sus antepasados y las responsabilidades históricas que cargan ahora. El ejército servirá como modelo para la sociedad francesa, guiando a la nación a cumplir sus objetivos."
 FRA_VIC_The_Frenchmans_Burden: "La carga del francés"
 FRA_VIC_The_Frenchmans_Burden_desc: "Nada hace más orgulloso a un francés que ser un ciudadano del primer país que derrocó a un tirano y logro la independencia u la prosperidad por sus propios medios. Las fuerzas armadas de la primera república democrática del mundo han sido durante mucho tiempo una fuerza vital para reforzar la cohesión nacional. Este sentimiento único de responsabilidad será el elemento fundamental que una a la sociedad francesa y refuerce al ejército francés en la próxima era. Les enseñaremos a los ciudadanos de Francia y del resto del mundo que defender y esparcir los ideales de libertad, igualdad y fraternidad es la gran misión del pueblo francés, una misión moldeada por la gloriosa historia de Francia y los esfuerzos de su pueblo. Esta renovada consciencia cívica traerá profundos cambios al ejército francés. De ahora en adelante, lucharán con la doble misión de defender el presente y moldear el futuro."
 FRA_VIC_The_New_Grand_Army: "El Gran Ejército"
 FRA_VIC_The_New_Grand_Army_desc: "Cada 14 de julio se celebra el Día de la Bastilla, la fiesta nacional del pueblo francés. Durante este día, París se tiñe de rojo, blanco y azul y miembros de la élite del ejército francés marchan al unísono bajo el Arco del Triunfo, simbolizando la fuerza y unidad del pueblo francés y la inquebrantable unidad de la nación. El resplandor de los rifles, los cascos de latón, las plumas rojas de la caballería y las masivas columnas de tanques Leclerc asombran y enorgullecen por igual. Seguiremos mostrando el poder del ejército francés, resaltando su singularidad, despertar el orgullo nacional y recordar a los soldados su espíritu fundacional. Sabrán que no están simplemente defendiendo la patria con pasión, pues la patria estará siempre a su lado."
 FRA_VIC_Return_to_Old: "Ejército francés de antaño"
 FRA_VIC_Return_to_Old_desc: "Tras un perioso de reconstrucción y riguroso entrenamiento, el Ejército Frances ha mostrado sus mejores cualidades, rivalizando con las legendarias fuerzas lideradas por el Gran Condé, Napoleón, Foch y Tassigny. El ejército ha sido capaz de superar duras pruebas, preservar su identidad y disuadir a cualquier fuerza malintencionada. Nuestros líderes políticos y alto mando están muy satisfechos con el estado actual del ejército y están plenamente capacitados para desplegar esta formidable fuerza en cualquier guerra a gran escala en el futuro. Confían plenamente en que el ejército obtendrá victoria tras victoria."
 FRA_VIC_Strengthen_NATO: "Fortalecer nuestro compromiso"
 FRA_VIC_Strengthen_NATO_desc: "Si todavía hay alguien que sigue cuestionando el rol crucial que tiene la OTAN en la defensa de Europa - especialmente tras que los Estados Unidos no nos puedan apoyar por sus problemas internos, dejándonos sin suministros y tras que la guerra de agresión rusa, impulsada por ambiciones expansionistas, acabase en derrota - es de hacérselo mirar. Esta idea puede hacer mucho daño a la civilización occidental. Afortunadamente, los líderes políticos de nuestro país y nuestros aliados mantienen su compromiso con la Unión Europea. Se han comprometido decididamente a estrechar la cooperación militar y a tomar decisiones claves para proteger el futuro de Europa. Como el ejército más poderoso de la UE y el enemigo a batir para las fuerzas del Este, las Fuerzas Armadas Francesas continuarán siendo el pilar de la defensa europea, siempre preparadas para hacer frente a la próxima amenaza."
 FRA_VIC_The_European_Army: "El ejército europeo"
 FRA_VIC_The_European_Army_desc: "El presidente Emmanuel Macron había solicitado constantemente la formación de un \"ejército independiente europeo\". Sin embargo, tanto Estados Unidos como muchos dentro de Europa se opusieron repetidamente a su propuesta, aferrándose a las quimeras rusa y americana, cuestionando su viabilidad. Temían que provocar a cualquiera de las superpotencias podría llevar a una catástrofe militar y económica. Hoy, ha quedado claro que aquellas preocupaciones eran infundadas. Europa ya no se puede permitir delegar su seguridad y defensa a cualquier superpotencia. Por otra parte, la cooperación militar a pequeña escala entre las naciones europeas, desde hace unos 40 años, demostró su valor durante la guerra pasada. Ha llegado el momento para que nuestros gobiernos y el de Bruselas actúen decididamente y trabajen codo con codo para cumplir en el futuro el objetivo de crear un \"Ejército Europeo\"."
 FRA_VIC_Our_Place_in_Europe: "Nuestro papel en Europa"
 FRA_VIC_Our_Place_in_Europe_desc: "Francia es el centro político, eje económico y la potencia militar de Europa - su importancia en la Europa contemporánea no tiene comparación. En el ámbito militar, para reforzar nuestro liderazgo y nuestra posición en la UE, buscaremos una cooperación más cercana entre el ejército francés y nuestros aliados. Esto incluye establecer planes de entrenamientos únicos, desarrollar planes organizacionales coordinadamente, iniciar programas de intercambio de cadetes y realizar ejercicios conjuntos en todas las ramas del ejército. Los altos estándares del ejército francés y su amplia experiencia la convierten en el modelo a seguir para cualquier ejército europeo. Al tiempo que más naciones aliadas adoptan los métodos militares franceses, nuestra influencia y el tamaño potencial de fuerzas combinadas que podamos liderar en futuros conflictos seguirá creciendo."
 FRA_VIC_The_French_European_Army: "El Ejército Franco-Europeo"
 FRA_VIC_The_French_European_Army_desc: "Tras una estrecha colaboración y algunos ajustes, podemos afirmar con orgullo que el modelo militar francés ha sido adoptado por varios países europeos. El sistema de mando francés y nuestras unidades de combate ahora se integra a la perfección en los ejércitos de estas naciones, permitiéndonos crear rápidamente una fuerza multinacional lista para combatir. Los líderes políticos y militares de París, Berlín, Bruselas, Ámsterdam y Roma concuerdan en que es el momento de establecer unas fuerzas armadas europeas permanentes. Cimentadas en la experiencia militar francesa, esta fuerza multinacional unirá a soldados de distintos países e idiomas en la misión de defender la civilización europea, en la cual, el ejército francés y su alto mando jugarán un papel fundamental e irremplazable."
 FRA_VIC_A_Distinctly_French_Force: "Una fuerza distintivamente francesa"
 FRA_VIC_A_Distinctly_French_Force_desc: "Si verdaderamente vamos a priorizar la seguridad de Francia y Europa, debemos rechazar cualquier idea o palabrería que pueda esconder nuestras acciones. Tras discusiones internas, nuestros líderes políticos y militares han decidido de forma unánime que la independencia del ejército francés es el mejor camino a seguir para garantizar una defensa fiable y proteger la civilización europea. Los potenciales desafíos de un ejército multinacional europeo - como pueden ser una cadena de mando confusa, barreras lingüísticas y diferencias culturales - son razones más que suficientes para abandonar el plan de la fuerza multinacional. No obstante, Francia seguirá apoyando a los ejércitos aliados. Esta estrategia permitirá al Ejército Francés conservar su orgullo y mantener su papel como el guardián más poderoso de Europa y un modelo a seguir para los ejércitos europeos."
 FRA_VIC_The_New_French_Army: "El nuevo ejército francés"
 FRA_VIC_The_New_French_Army_desc: "La nueva fase de renovación militar francesa está a punto de completarse, y podemos afirmar con seguridad que el ejército francés se mantiene como la fuerza más poderosa en Europa. Comparada con su estado anterior, el ejército francés ahora es incluso más formidable frente a sus enemigos, con una estructura interna más sólida y eficaz, y ha perfeccionado tanto las tácticas ofensivas como las defensivas. Marianne estaría orgullosa de nuestros logros, y nada de esto habría sido posible sin las atrevidas reformas que transformaron el ejército francés."
 FRA_End_of_War: "Un fin a la guerra"
 FRA_End_of_War_desc: "A medida que se despeja el humo de la guerra, el dulce aroma de la paz se siente nostálgico y alentador. La amenaza rusa ha sido neutralizada, dejándola indefensa a la espera de su final. En este momento de triunfo, existe un deseo compartido tanto por los líderes como por el pueblo de poner fin a la guerra lo antes posible. El objetivo es reducir la carga económica que supone el ejército para la sociedad y la economía nacional. Si bien existen preocupaciones por un 'desarme propio', en breves se presentarán al parlamento programas de reconstrucción de paz y la desmilitarización de Europa. El pueblo francés cree que, en esta nueva era, el compromiso con la paz y la fuerza colectica de la población serán suficientes para prevenir cualquier ambición de resurgimiento y el afán de políticas militares agresivas."
 FRA_End_Conscription: "Abolir la conscripción"
 FRA_End_Conscription_desc: "El reclutamiento militar ha tenido una larga historia en Francia, haciendo posible mantener un ejército poderoso y listo para actuar durante siglos. En tiempos de crisis, las reservas de ciudadanos entrenados constituyeron una valiosa fuerza de reserva lista para actuar en cualquier urgencia. Un ejemplo reciente de esto fue la guerra contra Rusia, donde los ciudadanos franceses reclutados mostraron una valentía y adaptabilidad excepcional en el campo de batalla. Si bien servir la nación sigue siendo una fuente de orgullo, los primeros y pacíficos años del siglo XXI llevaron al pueblo francés a reflexionar sobre las cambiantes circunstancias. El modelo del 'ejército ciudadano' ya no es apto para la guerra moderna. Un ejército profesional ahora está mejor equipado para cumplir su tarea de defender la nación."
 FRA_Surrender_the_Military: "Socavar al ejército"
 FRA_Surrender_the_Military_desc: "Aunque nuestros líderes políticos han decidido que Francia debe construir sus fuerzas armadas y moldear su estrategia militar en el marco de una defensa europea conjunta, los generales del Ministerio de Defensa y el Alto Mando se mantienen tercos. Por culpa de su orgullo y a sus intereses, no están dispuestos y ceder ni una pizca de poder, al que se aferran ferozmente. En una cambiante y cada vez más insegura Europa, no podemos perder el tiempo discutiendo con ellos. Usando el método del \"palo y zanahoria\", podremos recortar de forma decisiva la autoridad militar de los generales para cumplir nuestros objetivos de una forma elegante."
 FRA_VIC_surrendered_the_military_tt: "Se transferirá §Gtodo nuestro ejército§! a nuestro fiel aliado, [GER.GetFlag] Alemania, y al mismo tiempo creará una §Yfuerza de élite§! para la defensa diaria."
 FRA_VIC_surrendered_the_military_tt_desc: ""
 FRA_Maintain_Military_Strength: "Mantener el poder militar"
 FRA_Maintain_Military_Strength_desc: "El Ministerio de Defensa y el Alto Mando tratan de convencer a nuestros líderes políticos de que mantener el tamaño actual de nuestras fuerzas armadas es esencial. Francia ya no puede permitirse enfocarse únicamente en sus asuntos. La amenaza oriental no ha sido eliminada completamente, existen conflictos en numerosas áreas de Europa y las guerras siguen devastando Norteamérica, Asia Oriental y Medio Oriente, causando un enorme sufrimiento. La constante retórica pacifista no es de utilidad para nación y puede arriesgarnos a volver a los peligrosos días de 1940. Un ejército francés fuerte y capaz podrá hacer frente a cualquier desafío, demostrando que los ideales de \"libertad, igualdad, fraternidad\" siguen siendo tan importantes como siempre."
 FRA_National_Demobilization: "Desmovilización nacional"
 FRA_National_Demobilization_desc: "Si la función del ejército francés es salvaguardar la soberanía, seguridad y los intereses nacionales, el ejército francés es excesivamente grande, más de lo necesario. El tema del desarme no es nuevo en la política y sociedad francesa y hoy, se decretará de forma oficial una serie de políticas relacionadas con esto. Al tiempo que reducimos los números del ejército, debemos asegurarnos de seguir homenajeando y honrando a los valientes guerreros que se sacrificaron para defender la justicia y la libertad. Al mismo tiempo, debemos abordar de una forma responsable las necesidades de los veteranos y construir unas fuerzas más esbeltas de élite forjadas al fuego del campo de batalla capaz de responder rápidamente y llevar a cabo misiones con éxito."
 FRA_VIC_The_conservative_revolution: "La revolución conservadora"
 FRA_VIC_The_conservative_revolution_desc: "The so-called \"end of history\" that was promised to us by liberals has yet to come. The peace that was supposed to come in the wake of the Soviet collapse never arrived. In fact, the world is in a far more volatile state now than it was just a couple decades ago. On top of this, our nation has suffered in the modern era, and the people want change. And so they turned out in waves to support conservatives, who, now back in charge, will steer France onto the right course."
 FRA_VIC_Our_Bountiful_Economy: "Nuestra pujante economía"
 FRA_VIC_Our_Bountiful_Economy_desc: "La pandemia del COVID y el colapso de Norteamérica fueron en gran medida responsables de nuestro débil crecimiento económico. Sin embargo, con los rusos fuera de juego y la comunidad europea más unida que nunca, nuestra economía se ha disparado. Ahora que ya no tenemos que preocuparnos de la amenaza oriental, nos aseguraremos de que este periodo de prosperidad económica no sea malgastado."
 FRA_VIC_Economic_Patriotism: "Patriotismo económico"
 FRA_VIC_Economic_Patriotism_desc: "Nuestra reciente expansión económica solo puede ser atribuida a una única causa, el duro trabajo del pueblo francés. Por lo tanto, priorizaremos las decisiones que beneficien a nuestro pueblo sobre aquellas que beneficien a otras naciones de la UE. Obviamente, no buscamos reducir nuestra contribución a la Unión. Simplemente, preferimos financiar las pequeñas empresas francesas antes que las rumanas."
 FRA_VIC_Bask_in_the_Light: "Disfrutar de la luz"
 FRA_VIC_Bask_in_the_Light_desc: "Nuestro arduo esfuerzo pudo levantar nuestra economía, y ahora la gente está empezando a sentir los efectos. Con más y más fondos públicos, nuestros servicios públicos están alcanzando nuevos topes. Tanto las pymes como las corporaciones han recibido nuestros subsidios y fondos como agua de mayo y la inflación ha caído varios puntos. Cada vez más personas tienen un techo bajo el que pueden dormir y comida para llenar sus estómagos, ¡y trabajaremos duro para que esto siga así!"
 FRA_VIC_The_French_Golden_Age: "La edad dorada francesa"
 FRA_VIC_The_French_Golden_Age_desc: "Todo nuestro duro trabajo culmina en este momento. Por décadas Francia había sido una sombra de lo que alguna vez fue, consumida por los eventos del siglo XX, y no parecía que la cosa mejoraría en la década de 2020. Pero desde entonces, milagro tras milagro, podemos decir con seguridad que hemos retomado nuestro lugar entre las mayores naciones del mundo. Nuestro pueblo está contento, nuestro ejército es fuerte y nuestra economía es pujante. Sea lo que sea que nos separe en los próximos años, lo afrontaremos con la cabeza alta, ¡y nos aseguraremos de que nuestra nación siga unida y fuerte!"
 FRA_VIC_Our_Native_Land: "Nuestra tierra natal"
 FRA_VIC_Our_Native_Land_desc: "Francia ha existido durante mucho tiempo y, si bien es cierto que ha sufrido dificultades, siempre hemos trabajado duro para defender nuestra tierra. Con nuestra victoria sobre los rusos, la hemos protegido una vez más. Ahora podemos centrarnos en nuestros asuntos internos, y asegurarnos de que nuestra gran república haga honor a su nombre. No descansaremos hasta que hayamos sacado el mayor provecho posible de nuestra tierra, manteniendo su extraordinaria belleza."
 FRA_VIC_Spirit_of_Degaul: "Espíritu de Charles de Gaulle"
 FRA_VIC_Spirit_of_Degaul_desc: "El general de Gaulle es uno de los muchos héroes de la historia francesa. Gracias a sus esfuerzos, nuestra patria se liberó de los invasores fascistas durante la Segunda Guerra Mundial y pudimos reconstruirnos tan bien tras años de ocupación. Aunque falleció hace muchos años, el espíritu que encarnaba, el espíritu de Francia, ¡perdura hoy! La nación francesa debe mantenerse libre, y para ello debemos mantenernos fuertes."
 FRA_VIC_For_Every_Drop_of_Blood: "Por cada gota de sangre"
 FRA_VIC_For_Every_Drop_of_Blood_desc: "La victoria en cualquier guerra tiene un alto precio, y no nos libramos de él. Muchos de nuestros jóvenes, hombres y mujeres, murieron en combate contra las fuerzas rusas, dándolo todo para repeler el ataque. Tuvieron éxito, pero su sacrificio no servirá de nada si lo desperdiciamos. Debemos aprovechar este tiempo de paz para prepararnos para la próxima gran guerra y asegurarnos de que esta vez perdamos la menor cantidad posible de franceses."
 FRA_VIC_Revile_Russian_Autocracy: "Vilipendiar a la autocracia rusa"
 FRA_VIC_Revile_Russian_Autocracy_desc: "Si bien muchos ven el desenlace de la Guerra Europea como el inicio de una nueva era de la democracia rusa, cualquiera con dos dedos de frente sabe que nada ha cambiado. Sí, ha habido un cambio de liderazgo y el país ya no es explícitamente expansionista, pero en el fondo sigue siendo la misma Rusia. Volverán tarde o temprano, y hasta entonces, debemos debilitarnos todo lo que podamos."
 FRA_VIC_Our_Free_People: "Nuestro pueblo libre"
 FRA_VIC_Our_Free_People_desc: "¿Qué es Francia sino una nación de hombres libres? Aunque nuestra libertad haya sufrido retrocesos y dificultades, la llama de la libertad nunca se extinguió por demasiado tiempo, gracias al trabajo del pueblo francés. Nuestra reciente victoria sobre Rusia ha demostrado que el deseo de la libertad de nuestros ciudadanos se mantiene fuerte, al punto de que están dispuestos a luchar con tal de defenderla. La llama de la libertad jamás se extinguirá aquí y haremos todo lo posible para que esto sea así."
 FRA_VIC_The_France_of_Today: "La Francia de hoy"
 FRA_VIC_The_France_of_Today_desc: "Francia tiene una historia que se extiende durante miles de años. Desde los galos, pasando por los romanos, por Carlomagno y Napoleón, no nos parecemos en nada a la nación que alguna vez fuimos. Pero no estamos aquí para discutir sobre nuestra historia, lo que realmente le importa a la población es el presente. La Francia de hoy es una nación dedicada al bienestar de sus ciudadanos, y en tanto que los conservadores sigan en el poder, este será nuestro objetivo."
 FRA_VIC_Denounce_Liberal_Authoritarianism: "Denunciar el autoritarismo liberal"
 FRA_VIC_Denounce_Liberal_Authoritarianism_desc: "Tenemos enemigos de distintas formas y colores, desde todos los rincones del mundo y lógicamente también tendremos algunos dentro de nuestro territorio. La amenaza más cercana a nuestro hogar la supone la ultraizquierda. Comunistas, anarquistas y toda esa calaña no habrían más que echar abajo el sistema político actual y reemplazarlo por uno más chapucero. Ese futuro deberá quedarse como una fantasía comunista, y haremos lo necesario para evitar que se haga realidad."
 FRA_VIC_The_Red_Banner: "La bandera roja"
 FRA_VIC_The_Red_Banner_desc: "¿Qué le deparará el futuro a Francia? Tras derrotar a los tiranos del este y al régimen ruso - uno que no era ni \"liberal\" ni \"democrático\" - ¿Cómo se adentrará Francia en esta nueva era de la historia? El pueblo de Francia ha tomado su decisión votando: la Gran Coalición izquierdista ha asegurado una mayoría indiscutible. Ahora, han llegado al poder con una gran ambición: cambiar profundamente la sociedad francesa y construir un estado verdaderamente orientado al pueblo. Están determinados en usar sus poderes para implementar reformas transformativas para Francia. Quizás, el sueño de las banderas rojas ondeando por toda Europa se haga realidad y vivamos para verlo."
 FRA_VIC_United_in_Equality: "Unidad en la igualdad"
 FRA_VIC_United_in_Equality_desc: "\"Igualdad\" - que palabra tan bonita. Ha sido el afán de incontables generaciones. Desde las trovas sobre reinos igualitarios  \"utópicos\" cantados por antiguos bardos hasta la gran lucha social de los marxistas, el ideal de eliminar todas las diferencias de identidad y clase nunca han sido abandonadas. Hoy, mientras presenciamos el renacimiento de nuestra patria francesa, seguiremos esta idea y permitiremos que la igualdad florezca por las tierras de la libertad. Inspirados por los espíritus de incontables mártires, creemos que todos los ciudadanos se unirán con una solidaridad sin precedentes para ayudar en esta gran causa."
 FRA_VIC_Redefine_the_French_Citizen: "Redefinir el ciudadano francés"
 FRA_VIC_Redefine_the_French_Citizen_desc: "¿Qué significa ser un ciudadano francés? Dependiendo a quien le preguntes obtendrás distintas respuestas: el lugar de nacimiento, un idioma común, cultura o incluso una raza o etnia. Definir la identidad del pueblo francés es un paso crucial en la formación de nuestro estado nación. La respuesta que demos a esta cuestión el día de hoy determinará la deriva de nuestras reformas socialistas. Solo si llegamos a un consenso en esta cuestión podremos crear una base sólida para futuras iniciativas que realmente beneficien a nuestro pueblo. Por ende, recibiremos con los brazos abiertos a cualquiera que se identifique con los valores y la cultura francesa, adoptando a todas las personas que llaman a esta tierra hogar en la familia francesa. Con una grandiosa historia repleta de momentos gloriosos, el pueblo francés dará su primer paso a una nueva era."
 FRA_VIC_End_Neo_Colonialism: "Acabar con el neocolonialismo"
 FRA_VIC_End_Neo_Colonialism_desc: "El neocolonialismo, este \"kraken\" nacido de los intereses del capital global, ha estado atormentado al mundo entero durante décadas. Ha azotado a un incontable número de personas y países. Lamentablemente, Francia, la primogénita de la civilización occidental, abanderó en el pasado la opresión de pueblos de otros continentes. Debemos comprometernos firmemente a expiar nuestros errores del pasado. Los libertadores franceses traerán justicia y libertad al continente negro. Prometeremos solemnemente que invertiremos todos nuestros recursos y esfuerzos en restablecer la dignidad y llevar felicidad a nuestros sufridos hermanos africanos. Esta vez, los crueles colonizadores serán erradicados de una vez por todas y el sol universal brillará y traerá calor a todos por igual."
 FRA_VIC_Revolution_without_Revolution: "Revolución sin revolución"
 FRA_VIC_Revolution_without_Revolution_desc: "Finalmente, hemos triunfado. Tras capear incontables tormentas y experimentar tanto momentos de gloria como de gran pesar, el día de hoy las campanadas de Notre Dame resuenan por toda París, celebrando la gran victoria del pueblo francés. El violento y sangriento fantasma de la revolución se ha desvanecido. Lo que hemos conseguido hoy en tierras francesas puede denominarse \"una revolución sin revolución\". El pueblo francés sanó las heridas de la era pasada y se convirtió en pioneros de esta nueva era. En este gran país, lleno de sueños, prosperidad, paz y amistad, tanto mi historia como la tuya no han hecho más que empezar."
 FRA_VIC_Ground_Up_Army_Reform: "Reformar el ejército desde cero"
 FRA_VIC_Ground_Up_Army_Reform_desc: "Generalmente el prestigio y el respeto por el ejército francés no suele ser cuestionado. Sin embargo, un análisis minucioso de su estado actual revela una imagen mucho menos halagadora. Si queremos seguir con las reformas planificadas, el primer gran obstáculo que tendremos que superar será el ejército. Por años, ideas conservadoras y reaccionarias y una estricta jerarquía ha reprimido voces progresistas preocupadas con el pueblo, alejando más y más al ejército de la sociedad francesa en general. Es por esto por lo que debemos renovar el sistema de arriba a abajo, abandonar las viejas costumbres y limpiar el polvo que se levante. Este proceso causará indudablemente inestabilidad e imprevistos. Pero como dice el viejo refrán, \"Quien quiera peces, que se moje el culo\". A largo plazo, un ejército más unido al pueblo nos permitirá escribir un nuevo capítulo de la historia francesa."
 FRA_VIC_Compensate_the_Veterans: "Compensar a nuestros veteranos"
 FRA_VIC_Compensate_the_Veterans_desc: "No es una exageración decir que la bandera socialista roja de la Francia actual está teñida con la sangre de incontables guerrero que lucharon valientemente contra los tiranos del Este. Por esto, ninguna cantidad de agradecimientos y respeto hacia esos héroes les hará justicia. El Gobierno francés expresará su profundo afecto por los veteranos no únicamente con propaganda, también lo hará con acciones concretas. Granjeros retirados recibieran tierras y apoyo técnico para mejorar su calidad de vida; los trabajadores que vuelvan a las ciudades y fábricas tendrán generosos beneficios y estabilidad laboral, garantizando así la felicidad y la tranquilidad de miles de familias. Demostraremos que somos un gobierno más responsable, uno que está más conectado con el futuro de nuestros héroes nacionales que los gobiernos burgueses del pasado. El lazo lacre de la  Légion d'honneur será su máxima condecoración."
 FRA_VIC_Demobilize_the_People: "Desmovilizar al pueblo"
 FRA_VIC_Demobilize_the_People_desc: "Entorpecer o silenciar la lucha por la autonomía o las legítimas demandas populares es lo último que queremos hacer. Esto es esencial para que podamos ser un \"Gobierno Popular\". Las reformas solo se pueden hacer realidad mediante las acciones espontáneas de toda la población. Si los frutos del progreso social no son recogidos ni protegidos por el pueblo, seguirán siendo meras ilusiones. Con la paz llegando a Francia y Europa, es momento de romper los grilletes tangibles e intangibles que habían encadenado al pueblo francés. Es reconfortante ver al proletariado francés dar rienda suelta a su creatividad e iniciativa, explorar, esforzarse y usar sus propias manos para moldear su visión de una nación libre."
 FRA_VIC_Expand_the_Rights_of_Man: "Expandir los derechos del hombre"
 FRA_VIC_Expand_the_Rights_of_Man_desc: "¿Cómo deberíamos definir los 'derechos humanos'? Algunos afirman que los derechos humanos defienden el desarrollo económico y el derecho a una vida digna.  Sin embargo, esta visión materialista ignora las necesidades espirituales del pueblo. Otros se centran en conceptos como 'libertad de expresión' y 'diversidad cultural', pero estas ideas generalmente se convierten en problemas políticos, provocando conflictos y divisiones dentro del país. Pero para evitar repetir los errores del pasado, debemos dar una definición que se alinee con las condiciones e intereses de Francia y guiar el futuro del pueblo francés. Los derechos humanos deben estar por encima de la política, y la justicia y los principios que impulsó a los revolucionarios pasado serán revitalizados en el siglo XXI."
 FRA_VIC_Form_A_Pink_Red_Coalition: "Coalición Rosa-Amarillo-Rojo"
 FRA_VIC_Form_A_Pink_Red_Coalition_desc: "Tras años de lucha por el bienestar del pueblo francés, las fuerzas progresistas de la izquierda francesa finalmente puede extender sus alas y dar un soplo de aire fresco y socialista al país, limpiando el polvo del pasado. Para lograr esto, se debe formar una base amplia y sólida sobre el partido existente. El Nuevo Frente Popular, compuesto principalmente por la LFI, el PCF, el PS y EELV, ahora deben reforzarse absorbiendo otro partidos izquierdistas para cimentar su poder y unidad interna. Al mismo tiempo, se deben mejorar los mecanismos de comunicación y cooperación, para convertirse en un mejor medio para representar al pueblo y sus necesidades. Para el Nuevo Frente Popular, esta nueva era señala el inicio de una nueva lucha. Sin embargo, con el fuerte apoyo del pueblo francés, podremos superar cualquier obstáculo y desafíos."
 FRA_VIC_The_Left_Prevails: "La izquierda impera"
 FRA_VIC_The_Left_Prevails_desc: "Había aquellos que dudaban de que el verdadero socialismo pudiese encontrar un lugar en la Europa de hoy. Incluso cunado un partido \"socialista\" llegaba al poder, normalmente este estaba liderado por una burguesía mezquina que defienden ideas neoliberales, arrodillándose al gran capital y a los intereses del empresariado a cambio de cooperación. Pero en la Francia de hoy, esa retórica ya es agua pasada. Gracias a nuestra victoria sobre el dictador ruso, nuestra legítima victoria electoral y la implementación de fuertes reformas sociales, la alianza izquierdista en Francia se ha convertido en la primera fuerza con diferencia en la política francesa, ganándose el apasionado y sincero apoyo del pueblo. Aún si remanentes del viejo orden rechazan aceptar su derrota e intentan socavar nuestra causa, el pueblo francés nunca les permitirá que se salgan con la suya."
 FRA_VIC_Peace_Land_and_Bread: "Paz, tierra y pan"
 FRA_VIC_Peace_Land_and_Bread_desc: "Para el francés de a pie, una vida feliz puede simbolizar muchas cosas bonitas o simplemente incluir alguna de las necesidades más básicas. \"Paz, pan y tierra\": este antiguo eslogan, originado en la revolución francesa, ha pasado por dos guerras mundiales y se mantiene relevante en la actualidad. Muestra que hasta el más absoluto sufrimiento no puede acabar con los sueños y las esperanzas de generaciones. Como los representantes y fieles sirvientes del pueblo francés, debemos asegurar de que no les falte ninguna de esas cosas en ningún momento. Esto no es solo un reflejo de la historia, también es nuestra audaz decisión para el futuro."
 FRA_VIC_The_Republic_Eternal: "La República Eterna"
 FRA_VIC_The_Republic_Eternal_desc: "Decir que la historia francesa siempre ha sido turbulenta sería quedarse corto. Desde revoluciones hasta purgas y ocupaciones, uno puede contar los periodos de estabilidad con los dedos de una mano. Tal y como Churchill temió en la era de la Guerra Fría, el oso ruso marchó al oeste, amenazando con aplastar la democracia en Europa Oriental y restablecerse como potencia en Europa. Pero nosotros no nos echamos atrás. Nos mantuvimos firmes frente a la autocracia rusa e hicimos frente a las innumerables adversidades. Ahora que el polvo se asienta y bajan las armas, nos alzamos victoriosos sobre la tiranía. Trabajando codo con codo con nuestros aliados, hemos podido salvar tanto a Francia como al resto de Europa de al destrucción. Ahora, miramos al futuro listos para enfrentar cualquier obstáculo que nos topemos en nuestro camino."
 FRA_VIC_Divided_by_Ideas: "Dividido por ideas"
 FRA_VIC_Divided_by_Ideas_desc: "Decir que Europa es un continente rico en ideas sería quedarse corto. Desde el Leviatán hasta el manifiesto comunista, el continente ha sido la cuna de numerosas ideologías que persisten en la actualidad. A través de la historia, grandes imperios y potencias globales han intentado unificar Europa bajo una única ideología, desde la época del absolutismo hasta la cortina de hierro durante la Guerra Fría. ¿Pero por qué deberíamos intentar imponer nuestra forma de pensar al resto de Europa? Debemos aceptar al continente tal y como es realmente. Es un cajón de sastre no solo de naciones, sino que también de ideas, donde cualquiera puede adoptar sus ideales e ideología libre de prejuicios."
 FRA_VIC_Past_the_Darkness: "Más allá de la oscuridad"
 FRA_VIC_Past_the_Darkness_desc: "Muchos usaron la calamidad que fue el colapso de los Estados Unidos para afirmar que nuestras preciadas democracias liberales estaban al borde del colapso, condenadas al estancamiento y ser eventualmente derrocadas por fuerzas radicales. Sin embargo, nuestro triunfo contra los tiranos rusos y su intento de subyugar Europa Oriental han demostrado que esos charlatanes estaban muy equivocados. Por supuesto, aún tenemos asuntos domésticos e internacionales pendientes. Pero nuestro estimado sistema liberal siguen manteniendo los ideales de discusión cívica y toma de decisiones democrática que asegurará que podremos solucionar cualquier problema que nos topemos de un modo que nos beneficie a todos."
 FRA_VIC_Onto_the_Light: "A la luz"
 FRA_VIC_Onto_the_Light_desc: "La oscuridad iniciada por la pandemia, y la calamidad que ha sido la década de 2020 nos ha dejado marca. No obstante, ya resistimos a las fuerzas de la tiranía con anterioridad y lo volvimos a hacer aún sin nuestros benefactores americanos. Nuestro optimismo, tachado de ingenuo, nos permitió salir más fuertes de las varias crisis de esta década. Este cambio de actitud a nivel nacional ha fomentado una mayor participación política, una mayor tasa de natalidad y encendió una voluntad de luchar y morir por sus ideales en nuestro pueblo sin importar que tan fuerte sea el enemigo. Hagamos que en esta era se de el triunfo de la democracia liberal contra las fuerzas del autoritarismo y la opresión."
 FRA_VIC_The_French_Shining_Bright: "Francia brilla intensamente"
 FRA_VIC_The_French_Shining_Bright_desc: "We have come far as not only a nation, but as one united French people in the past few years. Many thought that our nation, struggling with issues regarding our domestic policies and weakening international influence, would soon be doomed to a radical regime change, or subjugation by foreign powers. However, we now showed the world what it means to be French, all while maintaining the civility and compromise expected of a true liberal democracy. Our primary economic woes have been dealt with, spirits reinvigorated by the flames of battle and brotherly struggle against the forces of evil all while not falling to the temptations of populist demagoguery. Shall we continue to ensure that France remains a beacon of liberalism, one that our forefathers that stormed the Bastille and ended the Ancien Regime would be proud of if they could see it today. With it, let us continue to be the benefactor of a united Europe, one that can stand up to the forces of tyranny while ensuring that each nation, regardless of size or strength can together feel invincible against whatever threats come our way.\n\nIt is important to note that in our moment of triumph, word from the east tells us of a Russia licking its wounds in preparation to snuff out our democracies once and for all. We know full well that if our nation, the light it shines upon the continent and the rest of the world dulls then we will see ourselves subject to tyrants even worse than what we encountered in the European War. They will not give us the same \"mercy\" that they were willing to give us in the previous war, and we will have to meet their torrents of authoritarian fury with the blinding light of liberty and freedom we have exuded for centuries. Let us ensure that when we meet with the tyrants of the east once more, that they shall be repulsed with the deafening cry that has and will continue to echo throughout the ages…\n\n§B\"VIVE LA FRANCE!\"§!"
 FRA_VIC_Fraternity_of_Nations: "Fraternidad de naciones"
 FRA_VIC_Fraternity_of_Nations_desc: "La unidad europea es un concepto peculiar, apoyado por unos y rechazado por otros. Pero, en tiempos oscuros, fue la fuerza colectiva de las naciones europeas lo que acabó con la maldad. Ya sea en la destrucción del imperio nazi de Hitler o nuestra más reciente victoria contra el belicista oso ruso, si no nos hubiésemos unido para acabar con la tiranía, habríamos quedado divididos listos para ser conquistados uno a uno. Pero la guerra aún no ha terminado. Si bien hemos detenido temporalmente el avance ruso, Moscú se está lamiendo sus heridas y se está preparando para vengarse. Y si no fortalecemos nuestro compromiso con la seguridad colectica, los rusos destruirán todo lo que hemos construido."
 FRA_VIC_Cement_our_place_in_Europe: "Nuestro rol continental"
 FRA_VIC_Cement_our_place_in_Europe_desc: "Aún si los rusos ya no suponen una amenaza, debemos recordar el rol que desempeñamos en la defensa de nuestro continente. No solo tenemos uno de los ejércitos más poderosos de Europa, nuestra base industrial nos da una sólida plataforma en la que la eurozona y el mercado único europeo pueden sostenerse. Con esto en mente, reforzar estos sistemas no solo nos permitiría cimentar nuestra posición como protectores de los valores europeos, también aumentará nuestra influencia y nos asegurará que podamos estar a la altura de naciones como Alemania o el Reino Unido a la hora de ser los líderes de Europa. Además, si fallamos en nuestro deber, ¿quién dice que una Rusia resurgente o cualquier otro poder tiránico no pueda acabar con la preciada libertad de nuestro continente y nuestra hermandad?"
 FRA_VIC_Europe_United: "Europa, unida"
 FRA_VIC_Europe_United_desc: "The war we just came out of is often referred to as the \"European War\", one that saw us as a continent resist the onslaught of Russian tyranny without the help of the Americans that many claimed were our only line of defense. We have proven that together, as a single continent we can and will withstand any threat that comes our way. With this in mind, we need to ensure that organizations like the European Union have the support they need to ensure greater European cohesion and cooperation, something that has already borne fruit in recent history. While not to the degree of some Federalists, pushing for further economic and military integration will be essential in ensuring that our continent can weather the coming storm from a resurgent Russia, or other threats that seek to impose their will on our prized democracies."
 FRA_VIC_Strong_in_our_Resolve: "Firmes en nuestra determinación"
 FRA_VIC_Strong_in_our_Resolve_desc: "Estos últimos años nos han enseñado que en el mundo donde vivimos no hay lugar para la indulgencia. Si no nos hubiéramos remilitarizado con éxito, la falta del apoyo americano en la OTAN nos hubiera dejado indefensos contra la embestida oriental, lo que seguramente hubiese supuesto la muerte de la democracia liberal en Europa. No obstante, nuestra determinación para enfrentarnos contras amenazas tanto internas como externas ha demostrado que podemos hacer frente a estas amenazas geopolíticas. Sin embargo, hemos visto a muchos caer en la complacencia tras nuestra victoria, creyendo que nuestro triunfo contra el oso ruso fue la última guerra en suelo europeo. Pero, aún si somos vencedores, debemos permanecer firmes en nuestra determinación, listos y dispuestos a combatir no solo a las hordas del Este, también a las del resto del mundo. Si fallamos en nuestra misión, estaremos a merced de tiranos incluso peores que los que acabamos de enfrentar, un destino por el que vale la pena morir para evitarlo."
 FRA_VIC_United_in_Liberty: "Unidos en la libertad"
 FRA_VIC_United_in_Liberty_desc: "La libertad es una llama eterna. Una vez que se enciende, por mucho que se trate de sofocarla no se puede extinguir. El concepto de la libertad se remonta a los tiempos de grandes filósofos como John Locke, quién es considerado el padre del liberalismo, cuyos trabajos fueron la chispa que encendió la llama de la Revolución Francesa. Tras haber vencido sobre las fuerzas de la tiranía y el despotismo, debemos trabajar para hacer realidad el sueño de John Locke. Bajo nuestra guía, las llamas de la libertad iluminarán a toda Europa. Los oprimidos serán liberados, y los opresores sufrirán nuestra justiciera venganza. Y cuando hayamos acabado con ellos, los demonios del odio y de la tiranía serán borrados para el resto de la eternidad."
 FRA_VIC_Utmost_Equality: "Máxima igualdad"
 FRA_VIC_Utmost_Equality_desc: "Nuestra amada república ha tenido numerosos y variopintos gobiernos, pero desde 1791 siempre hemos intentado mantener los ideales fundamentales de libertad, fraternidad y especialmente, igualdad. Aunque nuestras leyes hayan permitido establecer una igualdad legal, mucho se siguen quejando de la falta de igualdad económica y social, especialmente en los grupos marginados. Ahora, con nuestros asuntos internacionales zanjados por un tiempo, podemos centrarnos en abordar estos casos de desigualdad social. Puede que los radicales hagan mucho ruido, pero nuestras acciones podrán y harán mucho más ruido que sus insignificantes palabras si enfatizamos la igualdad máxima entre nuestros ciudadanos. Haciendo esto, no solo cosecharemos los frutos en las próximas elecciones, también seremos dignos de portar el nombre de la República Francesa, algo que se ha demandado desde los tiempos de Robespierre."
 FRA_VIC_The_End_of_History: "El fin de la historia"
 FRA_VIC_The_End_of_History_desc: "As the Soviet Union imploded and the world seemed to be turning to an era of peace and prosperity, it brought about a mindset that favoured the rise of liberal democracy as the system that best suited human civilization. In 1992, Francis Fukuyama published his seminal work \"The End of History and the Last Man\" that implied the fall of totalitarian communism marked the beginning of the end of history as we knew it. However, with the turning of the millennium and the growing chaos spurred on by the War on Terror, 2008 financial crisis, and particularly the collapse of the United States, many laughed off his theory as merely wishful thinking commonplace at the time period. However, our resistance against the forces of Russian tyranny has pushed many to give Fukuyama's theory a second glance, that perhaps under our banner we have perfected and cemented liberal democracy as the guiding ideology of Europe in the 21st century. Thus, we must embrace ourselves as the representatives of Fukuyaman thought, that we will bring about an era of liberalism that shall surpass the United States and eventually have the world united under a banner of democracy that shall not be snuffed out by the crisis we face.\n\nWe shall not, and cannot rest until everyone, regardless of where on this planet, is free from authoritarianism. Let us bring about the end of a history that sees commonplace suffering and division, start a new one that prizes beyond all else, Liberté, égalité, fraternité!"
 FAF_petainism_fascism: "Pétainismo de Vichy"
 FAF_classical_fascism_desc: "\n\n\n\n£GFX_FAF_petainism\n\n\n\n\n\nEl §YPétainismo de Vichy§! busca reconciliar el régimen colaboracionista del Estado francés de Philippe Pétain a través de sus ideales, específicamente la Révolution nationale. Caracterizado por el antiparlamentarismo, el culto a la personalidad, la promoción de los valores tradicionales y el antisemitismo patrocinado por el Estado, ve a la República Francesa como un sistema corrupto y fallido que encarna el concepto de Charles Maurras de la \"Anti-Francia\" que prioriza los intereses extranjeros. Al ver el apoyo de los márgenes de la ultraderecha francesa, el petainismo fascista espera derrocar la actual democracia liberal que, según ellos, ha arruinado la belleza y los ideales de la Francia prerrevolucionaria. A través de los ideales de Trabajo, Familia y Patria, los petainistas fascistas harán que Francia experimente su renacimiento idealizado, incluso si patea y grita en el proceso."
 FAF_petainism_junta: "Pétainismo resistente"
 FAF_military_junta_desc: "\n\n\n\n£GFX_FAF_junta_petainism\n\n\n\n\n\nEl §Ypétainismo resistente§! puede describirse mejor como la rama más cínica y moderada del pensamiento Pétainista. Si bien su apego a los ideales de la Révolution nationale de Pétain puede variar, aún creen en los ideales antiparlamentarios generales del antiguo Estado francés. Si encuentran apoyo entre los generales de Francia, el camino más probable al poder sería a través de una derrota total o un colapso nacional que permitiría que otro Jefe del Estado francés surgiera para guiar a Francia a sus antiguas glorias nuevamente, incluso ante una derrota total y absoluta."
 FAF_gaullism_auth_dem: "Gaullismo resistente"
 FAF_military_democracy_desc: "\n\n\n\n£GFX_FAF_resistant_gaullism\n\n\n\n\n\nEl §Ygaullismo resistente§!, en comparación con las formas complacientes y democráticamente alineadas del gaullismo, cree que es necesario un hombre fuerte militar para garantizar la estabilidad de la República Francesa en su momento de necesidad. El gaullismo resistente, que encuentra su base en los oficiales y generales del ejército francés, probablemente ganaría poder si los partidos elegidos democráticamente en Francia intentaran dejar de lado o desestimar las preocupaciones de las Fuerzas Armadas Francesas. Si bien algunos pueden afirmar que es una dictadura terrible o una tutela política necesaria, los gaullistas resistentes se asegurarán de que la Quinta República sobreviva por todos los medios necesarios."
 FAF_sovereign_democracy_desc: "\n\n\n\n£GFX_FAF_resistant_gaullism\n\n\n\n\n\nEl §Ygaullismo resistente§!, en comparación con las formas complacientes y democráticamente alineadas del gaullismo, cree que es necesario un hombre fuerte militar para garantizar la estabilidad de la República Francesa en su momento de necesidad. El gaullismo resistente, que encuentra su base en los oficiales y generales del ejército francés, probablemente ganaría poder si los partidos elegidos democráticamente en Francia intentaran dejar de lado o desestimar las preocupaciones de las Fuerzas Armadas Francesas. Si bien algunos pueden afirmar que es una dictadura terrible o una tutela política necesaria, los gaullistas resistentes se asegurarán de que la Quinta República sobreviva por todos los medios necesarios."
 FAF_gaullism_conservative: "Gaullismo populista"
 FAF_right_populism_desc: "\n\n\n\n£GFX_FAF_populist_gaullism\n\n\n\n\n\nEl §Ygaullismo populista§! sintetiza el nacionalismo y la actitud de \"paz a través de la fuerza\" de las formas más tradicionales del gaullismo con la ola de populismo de derecha del siglo XXI. Si bien el gaullismo en su núcleo aún promueve ideas como el excepcionalismo francés, quienes siguen el gaullismo populista ven una reinstauración de la ideología como el codiciado \"retorno a la tradición\" que se vincula a muchos de los movimientos populistas que existen en el \"Occidente\" geopolítico. Si bien algunos pueden afirmar que esta politización de una ideología pragmática es una traición a los ideales centrales del \"Libertador de Francia\", los seguidores del gaullismo populista no se detendrán ante nada para garantizar que, desde el Atlántico hasta los Urales, sea Francia la que decida el destino del mundo."
 FAF_gaullism_marlib: "Gaullismo tradicional"
 FAF_civic_nationalism_desc: "\n\n\n\n£GFX_FAF_traditional_gaullism\n\n\n\n\n\nEl §Ygaullismo tradicional§! es una subsección del pensamiento gaullista que enfatiza los valores nacionales en comparación con otros, viéndolos como uno de los aspectos esenciales de la identidad francesa que, junto con las instituciones de la República, deben protegerse. En comparación con el gaullismo populista, se alinea más con los ideales clásicos del nacionalismo cívico para reforzar el movimiento en lugar de seguir las nuevas tendencias del populismo de derecha que se han vuelto más comunes en el siglo XXI. Al encontrar su apoyo entre la derecha más moderada de Francia, esperan garantizar un mundo donde Francia mantenga los valores tradicionales al mismo tiempo que contiene a las otras \"hiperpotencias\" del mundo."
 FRA_socialist_souverainism: "Soberanismo socialista"
 FRA_popular_front: "Frente Popular"
 FAF_death_cult_desc: "\n\n\n\n£GFX_FAF_cult_of_lafayette\n\n\n\n\n\nEl §Yculto al Mariscal Supremo§! es un culto a la personalidad dedicado al Mariscal del Ejército Francés, Lafayette, quién se esfumó durante el asedio de París. Esta ideología se basa en el nacionalismo extremo y en el excepcionalismo francés, aunque cuenta con aspectos del nacionalsocialismo. La diferencia más significativa entre el culto a Lafayette y otros movimientos de ultraderecha europeos es su retórica anti-alemana, heredada de las creencias del Mariscal. Parece ser que su odio por los alemanes solo es comparable con el odio hacia los rusos. El único problema que enfrenta este grupo es la falta de una auténtica base ideológica. A causa de la incertidumbre sobre el destino de Lafayette, los partidarios de esta ideología tienen dudas sobre el futuro de Francia y Europa. Lo único de lo que están seguros es de su lealtad inquebrantable y fe en Lafayette."
 FAF_camus_eurasianism: "Nacionalismo paneuropeo"
 FAF_eurasianism_desc: "\n\n\n\n£GFX_FAF_nationalist_europeanism\n\n\n\n\n\nEl §Ynacionalismo paneuropeo§! se separa de las actitudes proeuropeas generales con su rechazo total del liberalismo propugnado por la Unión Europea. En su lugar, utiliza la base de una \"civilización europea\" compuesta por cristianos blancos con una historia y unos valores culturales compartidos. Partiendo de los ideales de \"Europa, una nación\" de Oswald Mosley, el nacionalismo paneuropeo sigue siendo una corriente de pensamiento subyacente que existe en la ultraderecha europea, especialmente a medida que continúa la federalización de la Unión Europea. Representados por la Lambda de los antiguos escudos espartanos, los nacionalistas paneuropeos creen que, mediante sus esfuerzos unificados, podrán salvar a Europa del siglo XXI."
 FAF_bonapartist_thought: "Pensamiento bonapartista"
 FAF_vladimir_zhirinovsky_thought_desc: "\n\n\n\n£GFX_FAF_napoleonic_thought\n\n\n\n\n\nEl §Ypensamiento bonapartista§! describe una síntesis del gobierno absolutista del siglo XIX bajo un solo monarca y el colaboracionismo de clases fascista del siglo XX. Para los bonapartistas del siglo XXI, el conflicto y la lucha de clases son responsables de la decadencia de las otrora grandes sociedades occidentales. El remedio para este caos sólo puede encontrarse bajo el gobierno de un líder único, un patriarca nacional que pueda ejercer el poder del Estado para aplastar a los enemigos de las masas. Los bonapartistas también se distinguen por su fuerte identificación con los pueblos latinos de Europa occidental y meridional. Se consideran herederos del legado no sólo del Primer Imperio Francés, de ahí su nombre, sino también de Roma. Los más radicales quieren que todo el mundo latino esté unido bajo un Estado nacionalista y autoritario."

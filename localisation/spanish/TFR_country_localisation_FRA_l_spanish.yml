 Fra_armed_forces_category: "Ejército francés"
 Fra_armed_forces_category_desc: "El ejército francés es la fuerza más formidable e importante de este lado del Atlántico. Desde las conquistas de Carlomagno y Napoleón hasta la heroica liberación de Francia por de Gaulle y Leclerc, la historia de nuestras fuerzas armadas es tanto gloriosa como duradera. Recientemente, hemos demostrado que nuestro ejército puede sostenerse por sí solo, sin depender de la OTAN. Sin embargo, no deberíamos apresurarnos a dejar de lado a nuestros aliados, pues sin duda se avecina una guerra."
 FRA_west_africa_intervention_desc: "África Occidental ha sido durante mucho tiempo una parte integral de Francia y de nuestra política exterior.\nSin embargo, año tras año, estas naciones han intentado alejarse cada vez más de su antiguo amo francés, pero §Rjamás conocerán el sabor de la libertad§!."
 FRA_yellow_vest_protests: "Protestas de los chalecos amarillos"
 FRA_yellow_vest_protests_desc: "Con los radicales de los Gilets Jaunes, o los llamados \"chalecos amarillos\" por los medios, queda claro que, sin una solución inmediata que otorgue al menos algunas concesiones a los manifestantes, la nación se verá sumida en una agitación aún mayor que la provocada por el COVID-19. Hasta que se negocie esta solución, o se llegue a una alternativa, Francia corre el riesgo de perder su estabilidad interna y su integridad política."

 Brazil.1.t: "El gallo sin cabeza"
 Brazil.1.d: ""
 Brazil.1.a: "¡Au revoir gabacho!"
 Brazil.2.t: "Brasil se apodera de Guyana"
 Brazil.2.d: "Con el aguijón de la derrota aún fuerte, otra injusticia ha caído sobre nosotros. El cobarde gobierno brasileño, sintiendo debilidad, ha aprovechado la oportunidad para apoderarse del departamento de ultramar de la Guayana Francesa, uno de los últimos vestigios de nuestro pasado imperial. Hubo poca o ninguna resistencia a la invasión brasileña. Una fuerza esquelética era todo lo que quedaba; la mayoría de sus limitados hombres y equipos ya habían sido desviados para el derramamiento de sangre al este. Lo poco que quedaba no tenía tiempo, manos ni voluntad para resistir. El lado positivo es que cualquier stock de equipo ya había sido saqueado y esta incautación no fortalece al ejército brasileño de ninguna manera apreciable.\n\nA pesar de los llamados de los miembros más entusiastas del estado mayor para un contraataque inmediato, no tenemos la capacidad ni siquiera para intervenir en la incipiente guerra civil en nuestro vecino del sur, y mucho menos en una región a medio mundo de distancia. Uno de los problemas a corto plazo más apremiantes como resultado de la pérdida de la región es el corte de la producción de oro, petróleo y bauxita de la región, lo que seguramente se echará de menos en los tiempos difíciles que se avecinan. Todavía se elaborarán planes y quizás en mejores tiempos podamos hacer nuestro movimiento, pero hasta que la situación aquí en Europa sea estable y los rusos hayan sido puestos en su lugar, todo esto serán simplemente quimeras."
 Brazil.2.a: "Volveremos."
 Nationalist_France.99.t: "El ejército francés ofrece ayuda para la alineación"
 Nationalist_France.99.d: "Después de enterarse de nuestra defensa de los ideales belgas contra el levantamiento comunista en Luxemburgo en la Batalla de Arlon, el General [FAF.GetLeader] ha enviado un enviado diplomático para solicitar una alianza formal, en la que ellos nos absorberían en su esfera, y nosotros obtendríamos la protección y el fomento de nuestros ideales respaldados por la asistencia francesa. La Reina está en contra de la idea, citando que la causa de nuestra desesperación ha sido la mala gestión de los funcionarios franceses, iniciada por la impopular abdicación forzada de su padre por el Primer Ministro Laurent Brogniet, respaldado por Francia."
 Nationalist_France.99.a: "Las mareas de Europa están cambiando, y debemos cabalgar las olas juntos."
 Nationalist_France.99.b: "¿Alineación francesa u otra anexión francesa?"
 Nationalist_France.0.t: "El Gobierno holandés se opone a la alineación belga"
 Nationalist_France.0.d: "Tras la aceptación de la Reina Isabel de nuestra oferta de ayuda económica y política, el Gobierno de Holanda ha anunciado una declaración oficial de guerra contra nosotros. En un discurso ante cientos de personas en la capital del Reino, [HOL.GetLeader] ha declarado: \"¡El Gobierno de Defensa Nacional francés ha exigido que el Estado belga sea anexionado a la nación francesa por segunda vez en esta década! ¡No nos quedaremos de brazos cruzados mientras nuestros vecinos caen ante el militarismo y el fascismo!\".\n\nJunto con este anuncio, hemos recibido informes de escaramuzas a gran escala con los revolucionarios en la frontera con Luxemburgo."
 Nationalist_France.0.a: "¡Entonces será una guerra en dos frentes!"
 Nationalist_France.2.t: "El Gobierno belga rechaza nuestra oferta"
 Nationalist_France.2.d: "Después de esperar a nuestro enviado diplomático durante más de una semana, el Gobierno belga ha aparecido en los restos del edificio Europa en Bruselas, con la Reina Isabel I proclamando que \"el Gobierno de Defensa Nacional francés ha exigido que el Estado belga sea anexado a la nación francesa por segunda vez en esta década, pero esta vez, sin un títere francés a cargo, la verdadera voluntad del pueblo belga ha sido escuchada y decimos \"¡NO!\" a su patética excusa de construcción de imperios\".\n\nEl Gobierno está furioso, y muchos exigen que el general [FAF.GetLeader] lance una invasión a la región para asegurarlos antes de que los comunistas o los liberales puedan hacerlo, a pesar de que actualmente estamos luchando en una guerra civil."
 Nationalist_France.2.a: "¡Nuestros tanques pasarán por Luxemburgo, después por Bruselas y después por Ámsterdam!"
 Nationalist_France.2.b: "Volveremos..."
 Nationalist_France.3.t: "El Gobierno celebra desfiles en honor a Juana de Arco"
 Nationalist_France.3.d: "Lo que comenzó como otro intento de alejar a la nación de las garras liberales y de izquierda de la guerra civil, inesperadamente se salió de control. En cooperación con la Iglesia católica, la santa patrona fue paseada por las calles de París junto con la congregación para fomentar la unidad y el recuerdo de la mártir histórica. Mientras el retrato de Juana de Arco y la iconografía que la acompañaba se mostraban a las masas, los corazones de la gente se volcaron hacia la mártir mientras oraban y suplicaban por el éxito y el bienestar de Francia durante este período problemático. Fue un espectáculo hermoso de contemplar e incluso al día siguiente hubo peticiones para crear un día festivo nacional en memoria de la mártir."
 Nationalist_France.3.a: "¿Un éxito sorprendente?"
 Nationalist_France.4.t: "Un debate abierto sobre los derechos del hombre"
 Nationalist_France.4.d: "Una transcripción de \"Un debate sobre los derechos del hombre: organizada en el Théâtre Mogador, París\"\nARMEL D'ARAMITZ: Ah, mi querido amigo, aunque entiendo el atractivo de la igualdad y la libertad como principios fundamentales de los derechos del hombre, tengo algunas reservas. Verá, creo que poner demasiado énfasis en las libertades individuales puede llevar a una negligencia de las responsabilidades sociales. Debemos considerar el bien común y el bienestar de toda la comunidad.\nMICHEL MARCHAND: ¡Ah, pero ahí es precisamente donde diferimos! Los Derechos del Hombre, desde mi perspectiva, priorizan al individuo como la unidad última de la sociedad. Al salvaguardar los derechos y libertades de cada persona, los empoderamos para contribuir al progreso y la prosperidad colectivos. Es a través del florecimiento de los individuos que la sociedad en su conjunto puede prosperar.\nD'ARAMITZ: Si bien aprecio la importancia del empoderamiento individual, también debemos reconocer que las sociedades son complejas e interdependientes. Los Derechos del Hombre deben abarcar no solo las libertades individuales, sino también las responsabilidades hacia la comunidad y el medio ambiente. El bienestar del colectivo no puede verse comprometido en aras de la autonomía individual.\n\nhaga clic para continuar..."
 Nationalist_France.4.a: "¡Emocionante!"
 Nationalist_France.5.t: "El Gobierno desvela estatua de Marianne contra Rusia"
 Nationalist_France.5.d: "Under the watchful eyes of hundreds of spectators, a new monument to Marianne, the eternal symbol of France, was unveiled in the heart of Paris, depicting her leading French troops against Russian forces.Standing six meters tall, the statue, crafted from traditional French stone by a renowned sculptor, captures Marianne raising the flag, her gaze unyielding, her stance resolute as she faces east.\n\nEngraved on the pedestal are the words: \"Liberty Never Retreats\", a declaration of France's unwavering commitment to its values. This monument has already been hailed as one of the most significant patriotic artworks in recent French history, a clear and deliberate statement on the nation's stance in the current international climate.The unveiling ceremony was marked by a military band's stirring anthems, the Tricolor waving in the wind, and a solemn yet defiant atmosphere. As the event reached its peak, many in the crowd spontaneously broke into the national anthem, their voices ringing through the square in a moment of collective pride and determination"
 Nationalist_France.5.a: "Quizás fuimos demasiado rápidos al abandonarla."
 Nationalist_France.6.t: "Philippe Pétain exonerado en nuevo decreto gubernamental"
 Nationalist_France.6.d: "Tras años de debates y controversias, ha entrado en vigor un histórico decreto - el Mariscal Philippe Pétain ha sido exculpado de forma oficial.\n\nLas contribuciones de Pétain a Francia son innegables. Durante la Primera Guerra Mundial, su extraordinario liderazgo militar en Verdún salvó a la nación de la catástrofe. En un momento en que el avance alemán parecía imparable, fue su inquebrantable voluntad y brillantez estratégica las que pudieron sostener el frente. Esta heroica defensa le canjeó la admiración de toda la nación y el mayor honor que podía recibir un militar, el título de Mariscal de Francia.\n\nEn 1940, la Blitzkrieg alemana arrasó las defensas francesas, millones de soldados fueron capturados y la república colapsó totalmente. Pétain aceptó el peso de la historia, pues decidió quedarse en Francia, negociando en vez de partir al exilio, luchando por preservar lo que quedaba de Francia en vez de empujar a la nación a la destrucción total. A sus 84 años, pudo haberse retirado en paz, pero aún así se mantuvo firme en Francia en su hora más oscura, creyendo que su habilidad diplomática podía salvar a Francia de la ocupación total y preservar la fuerza de la nación para su eventual liberación.\n\nSin embargo, su juicio tras la guerra fue dictado por necesidades políticas. En la posguerra, Francia necesitaba un chivo expiatorio para reparar su mancillado orgullo, y ese chivo fue Pétain. Con este decreto, no solo estamos restaurando el honor de un veterano soldado, estamos expandiendo nuestra memoria nacional, reconociendo las complejidades y contradicciones de nuestro pasado. Una nación verdaderamente fuerte debe tener el coraje de confrontar todas las facetas de su historia, incluidas aquellas que desafíen las simplistas narrativas de buenos y malos."
 Nationalist_France.6.a: "Un hombre que intentó salvar a Francia dos veces"
 Nationalist_France.7.t: "Israelistas franceses atraen a las masas en París"
 Nationalist_France.7.d: "En el distrito de Marais se encuentra la Sinagoga de la Rue Pavée, el centro neurálgico de la comunidad judía local. Tras siglos de incertidumbre política, una nueva ola de inesperados visitantes ha provocado una peculiar sensación en un barrio normalmente tranquilo.\n\nDesde anteayer, miles de israelitas franceses de todo el país han acudido a este barrio. Mantienen grandes asambleas, que atraen masas de locales y turistas que se paran a escuchar. Mientras tanto, los residentes judíos abren discretamente las ventanas para observar las improvisadas concentraciones.\n\nEstos israelitas, provenientes de círculos nacionalistas franceses, afirman que los ancestros franceses, la dinastía merovingia del reino franco son descendientes directos de las diez tribus perdidas de Israel. En otras palabras, creen que los franceses son los descendientes del antiguo pueblo judío, elegidos por Dios para construir el mayor imperio que se haya visto y reconstruir ellos solos la civilización tras el apocalipsis, contando con el favor exclusivo de Dios.\n\nAunque esto suene absurdo a oídos extranjeros, los israelitas, profundamente influenciados por fraternidades como el Priorato de Sion, creen firmemente en el singular destino de la nación francesa. De forma interesante, la policía de París, quienes llevan monitoreando el distrito por varios días, no han emprendido acciones para frenar a estos fanáticos. Para la gente de fuera, no saben decir si su inacción se debe a que encuentran a las proclamaciones israelitas divertidas o si están empezando a cuestionar su propio escepticismo."
 Nationalist_France.7.a: "¡Puede que FUÉSEMOS la tribu perdida!"
 Nationalist_France.8.t: "Desfile de salvación nacional"
 Nationalist_France.8.d: "Desde que el Gobierno de Salvación Nacional haya declarado la victoria en la guerra civil en París, era común ver desfiles militares por las calles de la capital durante las semanas posteriores. Lo que si estuvo fuera de lo común fueron las banderas y estandartes monárquicos mostradas junto a la bandera del nuevo régimen francés por civiles e incluso regimientos militares. Esto ha tomado por sorpresa al alto mando, a pesar de que según las últimas noticias, el monarquismo ha estado incrementando su popularidad por todo el país y se va haciendo más evidente que la monarquía está regresando a Francia."
 Nationalist_France.8.a: "¿Dónde está mi corona?"
 Nationalist_France.9.t: "François Lecointre organiza un desfile en París"
 Nationalist_France.9.d: "Visto por algunos como el salvador de Francia, François Lecointre hizo una inusual aparición pública cuando daba inicio otro desfile militar. La presencia de Lecointre provocó que la gente de París se viese envuelta otra vez en un fervor patriótico al ver al hombre que reunificó Francia en su hora más oscura. El desfile pasó por varios lugares emblemáticos de París hasta llegar a la Torre Effiel, donde tuvo lugar la ceremonia de reinauguración en la que François cortó la cinta ceremonial. La masa de ciudadanos patrióticos celebró que este monumento tan emblemático volviese a estar abierto al público."
 Nationalist_France.9.a: "¡Tres hurras por Lecointre!"
 Nationalist_France.13.t: "Cumbre franco-italiana"
 Nationalist_France.13.d: "El embajador francés avanzó por la Via del Plebiscito hacia el Palazzo Venezia. Hacía tiempo que este edificio había sido utilizado por Benito Mussolini para dar sus discursos, y el nuevo gobierno de Italia decidió convertirlo en el punto de encuentro para dignatarios extranjeros. Era un edificio antiguo y grandioso. El embajador contempló el famoso balcón mientras se acercaba, su corazón sentía una mezcla de asombro y miedo al ver las antiguas banderas de los enemigos de sus abuelos colgadas del balcón. A la escena solo le faltaba un cierto dictador calvo para convertirla en un espectáculo no visto en 80 años. Hoy, el embajador llegaba al Palazzo Venezia para expresar la intención de París de organizar una cumbre para las relaciones franco-italianas. Al entrar en el interior de la antigua estructura, mantuvo sus ojos fijos en la delegación italiana enviada para recibirlo. Desfilaron por los pasillos hasta una sala de reuniones donde se establecerían los detalles del encuentro. Fue una cálida recepción; la delegación italiana había preparado un plato de queso Parmigiano y vino Chianti Toscano para que la sala disfrutara mientras las discusiones estaban en curso. Después de algunas deliberaciones y negociaciones, se acordó que el punto de encuentro sería en terreno neutral, el pequeño Principado de Mónaco, una brillante pequeña ciudad de casinos, hotel para los ricos, patio de recreo para los hombres de negocios. Un lugar perfecto para sentar las bases de una floreciente relación futura."
 Nationalist_France.13.a: "Nos encontraremos en Mónaco."
 Nationalist_France.131.t: "Cumbre franco-italiana en Mónaco"
 Nationalist_France.131.d: ""
 Nationalist_France.131.a: "Estaremos allí."
 Nationalist_France.132.t: "Entrada de los gladiadores"
 Nationalist_France.132.d: "Era el día de la reunión, Mónaco había permitido que una formación de tropas tanto francesa como italiana marchara por la ciudad. El Principado decidió que sería una buena fanfarria y entretenimiento, no todos los días se ve un desfile militar rompiendo el esplendor de Mónaco. Ambas naciones eligieron un regimiento y ambos los hicieron vestir uniformes ceremoniales. Este día era un día de importancia para ambas naciones y el desfile era tan importante como las negociaciones mismas. Los delegados franceses observaban desde un hotel cercano cómo la formación italiana se acercaba a su punto final. Comparándolos con sus propias fuerzas, algunos se burlaban, otros asentían con aprobación; uno puede imaginar que la delegación italiana al otro lado de la calle hacía lo mismo.\n\nCuando las fuerzas de Italia se detuvieron, la delegación guardó silencio por un momento. Aplausos y vítores educados de los espectadores resonaron mientras las fuerzas de las dos naciones se paraban una al lado de la otra por primera vez en mucho tiempo, sus banderas diferentes pero su gente y uniformes hablando más de lo similares que son que de lo diferentes que son. La opinión de la delegación francesa era mixta, finalmente el embajador francés se volvió hacia sus delegados y se dirigió a ellos con una frase que significaba el comportamiento con el que pronto tratarían a la delegación italiana."
 Nationalist_France.132.a: "¡Una ceremonia digna de los romanos!"
 Nationalist_France.132.b: "¡Los italianos no son aptos para gobernar!"
 Nationalist_France.133.t: "Éxito en la Cumbre de Mónaco"
 Nationalist_France.133.d: "El embajador francés y los embajadores italianos se dieron la mano frente a sus respectivas banderas antes de sentarse, las dos delegaciones se miraron a través de la mesa con expresiones neutrales y cautelosas, la fanfarria y las cortesías eran agotadoras, la comida se había acabado, el vino estaba seco. Había que ir al grano, durante horas hablaron de esferas de influencia, sobre la dominación mediterránea, los italianos estaban especialmente orgullosos de su flota y expresaron su firme intención de convertirse en la mayor potencia naval del Mediterráneo, Francia evitó el tema de Niza y Córcega cada vez que se mencionaba, magistralmente la conferencia evitó el problema, los dos gobiernos nacionalistas lograron llegar a un acuerdo, su primer esfuerzo conjunto negociado en el escenario mundial los uniría como hermanos de armas, se redactó la Iniciativa de Berna, se trazaron las fronteras y la disolución de Suiza se planeó a puerta cerrada por dos naciones dentro del esplendoroso abrazo de un hotel de Mónaco. Abrazándose como hermanos, los embajadores abandonaron Mónaco rápidamente para entregar las noticias a sus líderes."
 Nationalist_France.133.a: "¡Hermanos para siempre!"
 Nationalist_France.134.t: "Fracaso en la Cumbre de Mónaco"
 Nationalist_France.134.d: "El embajador francés y los embajadores italianos se dieron la mano frente a sus respectivas banderas antes de sentarse, las dos delegaciones se miraron al otro lado de la mesa con expresiones neutrales y cautelosas, la fanfarria y las cortesías eran agotadoras, la comida se había acabado, el vino estaba seco. Había que ir al grano, durante horas hablaron de esferas de influencia, sobre la dominación mediterránea, los italianos estaban especialmente orgullosos de su flota y expresaron su firme intención de convertirse en la mayor potencia naval del Mediterráneo, un delegado francés se rió y eso provocó una acalorada discusión entre ambas partes, la delegación italiana se inflamó con un revanchismo territorial a medida que las tensiones aumentaban, las demandas de Saboya, Niza y Córcega comenzaron a volar, la delegación francesa, con pocas reclamaciones propias, simplemente disminuyó su poder con comentarios sobre el tamaño y la disciplina de sus ejércitos, la reunión terminaría abruptamente cuando una pelea entre dos delegados casi llevó a una melé en toda la sala, la Seguridad Pública de Mónaco irrumpió en la sala y disolvió la reunión, dispersando a las dos partes y uniéndose a la Compagnie des Carabiniers du Prince para escoltar a las delegaciones de ambas naciones de regreso al aeropuerto de forma segura."
 Nationalist_France.134.a: "Dirijámonos a los españoles"
 Nationalist_France.135.t: "Iniciativa de Berna activada"
 Nationalist_France.135.d: "Tal y como se discutió en la Cumbre de Mónaco, la iniciativa de Berna dividirá la nación de Suiza entre los alemanes, franceses e italianos étnicos para posteriormente ser anexionados por sus respectivos Gobiernos. La coordinación entre el ejército alemán, francés e italiano hacen que esta iniciativa sea la primera acción militar conjunta del Pacto de Acero, hacía tiempo que las fortificaciones defensivas Suizas habían pasado a la historia y la república helvética se encontró a si misma rodeada por naciones hostiles empeñadas en su desaparición. Se espera que gobierno de Berna se pliegue. Mientras que las unidades de la Wehr, el Esercito y la Armée se concentran en la frontera, se hace más y más claro que no importa cuantas montañas haya o que cuantos puentes se vuelen, pues no podrán detener lo inevitable."
 Nationalist_France.135.a: "¡Reclamaremos Helvetia!"
 Nationalist_France.136.t: "Lazos diplomáticos con Italia deteriorados"
 Nationalist_France.136.d: "The Italian Ambassador informed the French State Department today that he was delivering his last message to us as Italy's Ambassador, \"Remove your Ambassador from Rome in the next 48 hours.\"\n\nGiving us so little time to respond is a very hostile action, a treachery expected of the Italians, as their Ambassador boarded a plane bound for Rome a message was sent to our Embassy in Rome ordering them to pack up and return home within 48 hours according to the orders of the Italian Government. Several Transport Planes under escort were sent to Rome, the German Ambassador summoned us in Berlin to inquire on what is happening. It appears the brief hope that Europes Nationalists could be peacefully united against the Bolshevik threat has been dashed early, and governments in Rome, Berlin, Paris, and Madrid alike all shuffle in panicked contemplation over what the future of Europe is to be.\n\nThe Bern Initiative, which would have been a joint effort between Italy and France, is gone now. Splitting Switzerland will have to wait while we put together a new initiative to address the newly hostile government of Italy, the Piedmont Initiative. Perhaps it is time to expand the horizons of what France should be, Paris should perhaps be not just Capital of France, but what about the Capital of the Latins? If Napoleon can be Emperor of the Romans surely we can reprise this title again if the Italians will not work with us hand in hand. Send the plan to the General Staff. We have new orders for them."
 Nationalist_France.136.a: "Inicien la Iniciativa Piamonte."
 Nationalist_France.137.t: "Los italianos se acercan"
 Nationalist_France.137.d: ""
 Nationalist_France.137.a: "Francia me preocupa."
 Nationalist_France.137.b: "¡Francia es nuestro aliado!"
 Nationalist_France.14.t: "Los franceses demandan bases mediterraneas"
 Nationalist_France.14.d: ""
 Nationalist_France.14.a: "A la MIERDA tus demandas."
 Nationalist_France.14.b: "No podemos enfrentarnos a ellos..."
 Nationalist_France.15.t: "Francia exige la anexión"
 Nationalist_France.15.d: ""
 Nationalist_France.15.a: "A la MIERDA tus demandas."
 Nationalist_France.15.b: "No podemos enfrentarnos a ellos..."
 Nationalist_France.20.t: "Acta para la Restauración de los Châteaux"
 Nationalist_France.20.d: "Su majestad, Luis Alfonso de Borbón, ha declarado que con el fin de restaurar la gloria nacional y divina de la aristocracia francesa, destinará una porción del presupuesto real a la restauración y embellecimiento de los Châteaux por toda la nación con el Acta para la Restauración de los Châteaux. Esto será impopular entre los súbditos de la nación, quienes preferirían que el dinero que ganaron con esfuerzo no fuese a parar en la aristocracia, pero... ¿a quién le importa lo que piensen los súbditos?"
 Nationalist_France.20.a: "Quiero decir, están hechos polvo..."
 Nationalist_France.21.t: "[FAF.GetLeader] anuncia recortes de impuestos a los dueños de castillos"
 Nationalist_France.21.d: "A causa de la presión financiera puesta sobre la nobleza por el Acta para la Restauración de los Châteaux, el rey Luis Alfonso de Borbón brillantemente ha decidido sabiamente recortar los impuestos a los dueños de edificios que son clasificados como châteaux. Si bien esto impactará en los beneficios que nos dan los châteaux, la aristocracia ha sido un apoyo crucial por mucho tiempo así que no podemos negarles sus merecidos privilegios."
 Nationalist_France.21.a: "¡Se lo merecen!"
 Nationalist_France.22.t: "Se organiza una lujosa fiesta en Versalles"
 Nationalist_France.22.d: "Tras finalizar una pequeña renovación en el histórico Palacio de Versalles, Henri de Castries, un CEO retirado y nieto del antiguo ministro de defensa Pierre de Chevigné, ha alquilado el palacio entero al gobierno francés para organizar uno de los bailes de salón más grandes que se hayan visto en siglos, al que asistirán cientos de acaudalados invitados.\n\nSe rumorea que la lista de huéspedes incluya a altos cargos del ejército francés, los tres pretendientes al trono francés, superestrellas americanas refugiadas, antiguos oligarcas ruso e incluso al mismísimo rey Carlos III."
 Nationalist_France.22.a: "¡Están en su derecho!"
 Nationalist_France.22.b: "Todos deberíamos abrocharnos el cinturón..."
 Nationalist_France.23.t: "Pierre-Louis de La Rochefoucauld demanda la restauración de los privilegios de la nobleza"
 Nationalist_France.23.d: "En un sorprendente movimiento por parte de alguien considerado por muchos como una cara amigable de la aristocracia, Pierre-Louis de La Rochefoucauld ha conseguido 600 firmas de antiguas familias nobles francesas para la restauración de los títulos reales. Estos títulos, concedidos por antiguos monarcas franceses, han desaparecido o bien con el paso de los siglos o por culpa de gobiernos hostiles, o son tan miserables que ya no significan nada."
 Nationalist_France.23.a: "¡Esas son historias de las que me gusta escuchar!"
 Nationalist_France.23.b: "Estén contentos con lo que tienen..."
 Nationalist_France.24.t: "Surgen pretendientes reales"
 Nationalist_France.24.d: "Desde que el rey Luis Alfonso de Borbón restaurase los títulos nobiliarios de destacadas e históricas casas reales por toda la nación, han habido casos de individuos que abusaron de la restauración para su propio beneficio. Los casos más notables han involucrado a los presuntos jefes de la Casa de Orleans y de la Casa de Bonaparte, quienes han pedido al rey que se corrijan los errores del pasado causado por los Gobiernos republicanos a los que estaba sometido Francia. Sin embargo, ambos rechazaron renunciar a sus reclamos al púrpura real de Francia, causando que crezca la tensión política entre las casas reales."
 Nationalist_France.24.a: "¡No necesitamos a ninguno de estos!"
 Nationalist_France.241.t: "Opiniones divididas en el Ministerio de Interior"
 Nationalist_France.241.d: "Aunque tengamos el control completo, el relativamente nuevo gobierno carece de ministros experimentados, lo que nos lleva a la situación actual.\n\nNuestras opociones son Carlos Bonaparte y Laurent Marcangeli. Por un lado y desafortunadamente, Bonaparte ha sido un liberal durante toda su vida, pero a pesar de llevar el apellido de Napoleón, ha jurado lealtad al rey Luis y ha renunciado a sus reclamos. Marcangeli, por otro lado, es la opción más popular entre la nobleza gracias a su habilidad de organizar a grupos monárquicos durante la presidencia de Villiers, pero es un ferviente bonapartistas y su lealtad al rey no está clara.\nFinalmente, la reina María, aunque a regañadientes, ha sido una buena ministra de interior desde que su marido accediese al trono. Ella puede seguir encabezando el ministerio de interior, pero puede que no sea lo mejor para la casa real."
 Nationalist_France.241.a: "Carlos Bonaparte"
 Nationalist_France.241.b: "Laurent Marcangeli."
 Nationalist_France.241.c: "¡La reina María!"
 Nationalist_France.25.t: "Un noble se muestra partidario de Juan de Orleans"
 Nationalist_France.25.d: "\"Me presento hoy ante ustedes para expresar mi apoyo inquebrantable a Jean d'Orléans para que ascienda al trono como nuestro legítimo rey. Su linaje como miembro de la Casa de Orleans, junto con su notable intelecto, su inquebrantable dedicación a nuestra nación y su genuina compasión por el pueblo, lo convierten en el candidato ideal para guiarnos en estos tiempos tumultuosos. Jean posee el carisma y la sabiduría necesarios para restaurar la estabilidad y unir a nuestro país fracturado. Su visión de una sociedad más igualitaria, donde se defiendan los derechos y el bienestar de cada ciudadano, resuena profundamente en mí y en muchos otros que anhelan una Francia justa y próspera.\nEn una era marcada por la contienda política y la desilusión, Jean d'Orléans ofrece un faro de esperanza. Sus ideas progresistas y su compromiso con la reforma de sistemas obsoletos tienen el potencial de marcar el comienzo de una nueva era de prosperidad y armonía social. Además, su experiencia como diplomático y su amplio conocimiento de los asuntos internacionales lo equipan con las habilidades necesarias para navegar por la compleja red de la geopolítica. Al aceptar a Jean como nuestro rey, no solo honramos nuestro legado histórico, sino que también abrazamos un futuro donde la equidad, la compasión y el progreso pueden florecer. Unámonos, dejemos de lado nuestras diferencias y apoyemos a Jean d'Orléans mientras nos embarcamos en un viaje hacia un futuro más brillante para Francia y todos sus ciudadanos\"."
 Nationalist_France.25.a: "Suenas como un liberal."
 Nationalist_France.26.t: "Se revela que un noble forma parte de un movimiento republicano clandestino"
 Nationalist_France.26.d: "Un noble al que considerábamos un amigo cercano y un partidario de la monarquía borbónica, resultó que no solo era un traidor, sino que estaba ayudando al clandestino movimiento republicano que busca derrocar nuestra querida monarquía. Esto salió a la luz gracias a que su secretario, un súbdito patriota y leal a la corona, informase de sus hallazgos a las autoridades pertinentes y el día de hoy pudimos capturarlo. Ahora debemos decidir entre castigar al traidor o mostrar benevolencia... ambas opciones tendrán repercusiones y mostrarán al pueblo de Francia nuestro mensaje contra los traidores."
 Nationalist_France.26.a: "¡Cuélguenlo para que todos lo vean!"
 Nationalist_France.26.b: "Todo el mundo tiene derecho a sus propias opiniones."
 Nationalist_France.27.t: "Noble revelado como el autor de una serie de asesinatos"
 Nationalist_France.27.d: "Terrible... simplemente terrible. El rey Luis Alfonso de Borbón y su corte han trabajado incansablemente día y noche para reparar las relaciones entre la monarquía y sus súbditos, solo para que se informe de esto. Lo que las autoridades han considerado una de las series de asesinatos más inquietantes desde Gilles de Rais, tenemos la oportunidad de expulsar esta mancha de nuestra nobleza... aunque cabe señalar que el noble en cuestión ha financiado partes sustanciales de nuestro Reino desde su creación."
 Nationalist_France.27.a: "Es demasiado importante para ser arrestado."
 Nationalist_France.27.b: "Una mancha repugnante en la nobleza."
 Nationalist_France.28.t: "Provincia de Delfinado otorgada a Luis, Delfín de Francia"
 Nationalist_France.28.d: "La provincia de Dauphiné ha sido recientemente otorgada, por orden del rey Luis Alfonso de Borbón, a su heredero Luis XXI. Esto ha sido conmemorado por la prensa y otros nobles de Francia que apoyan el nombramiento del joven monarca como gobernante de Dauphiné, como el primer paso en su educación para heredar el título de Rey. El joven heredero planea emprender su peregrinación por la provincia para aprender sobre su historia y sus súbditos como su primer plan de acción."
 Nationalist_France.28.a: "¡Viva Luis XXI!"
 Nationalist_France.29.t: "Noble envuelto en una red pedófila"
 Nationalist_France.29.d: "Uno de los nobles de nuestra corte ha sido acusado de un horrible y repugnante acto. Supuestamente formaba parte de una red pedófila que estaba siendo investigada por las autoridades. Nada de esto se ha hecho público, y debemos tomar una importante decisión... ¿nos adentramos más en la madriguera de conejo o zanjamos este asunto ahora?"
 Nationalist_France.29.a: "¡No se diga más! ¡Inicien una investigación completa!"
 Nationalist_France.29.b: "5 años y lo barremos bajo la alfombra..."
 Nationalist_France.30.t: "Establecimiento de ideales"
 Nationalist_France.30.d: "El joven dictador de Francia, Jordan Bardella, no ha dejado indiferente a nadie tras su anunciar el siguiente paso para la Dominación Latina: La consolidación del poder en una de las tres fracciones del caucus identitario. El caucus, conformado por los latinistas, los imperialistas y los europeístas, ha trabajando codo con codo con el gobierno desde que Bardella tomase el poder y ha defendido la causa libertaria, pero sus facciones tienen metas diferentes.\n\nLos latinistas ven a Francia como la reencarnación moderna del Imperio Romano y buscan unificar a los territorios y pueblos latinos en un nuevo Imperio Romano de Occidente.\nLos imperialistas luchan por la restauración del Imperio Francés y del gobierno napoleónico en Francia, y ven a Napoleón y sus descendientes como los únicos que fueron capaces de unir a los pueblos latinos en los últimos siglos.\nPor último, los europeístas rechazan el Latinismo y en su lugar, defienden la idea de una nación europea unida.\n\nAhora, tras el establecimiento de un gobierno afín a las ideas identitarias, los representantes de los distintos consejos identitarios de la nación elegirán al líder de su organización."
 Nationalist_France.30.a: "El imperio regresa"
 Nationalist_France.30.b: "¡Larga vida a Napoleón VIII!"
 Nationalist_France.30.c: "¡Por una nación europea pura!"
 Nationalist_France.31.t: "Unificación de los territorios latinos"
 Nationalist_France.31.d: "Caesar, Augustus, Charlemagne, Louis XIV, and Napoleon. All great legends, conquerors, and all part of the greater Latin peoples. Throughout human history, the Latin people have been the pinnacle of humanity, from being the cradle of civilization to the great empires such as Rome, the Carolingians, and modern French people. For far too long, the Latin people have been trampled on, from the cowardly bureaucrats that supported the replacement of our people to the foreign elite that funded the desecration of our culture.\n\nThe unification of the Latin peoples is not merely a political ambition but our natural destiny. After the defeat in the war against the Asiatic communist horde, it looked desperate for France and the rest of Europe, but just like in Tours, when the great Latin people defeated the Arab invaders, we shall rise again from the ashes. For the Latin people cannot be extinguished, despite the betrayals of the liberal elite and the exploitation from the Anglo-American powers.\n\nUnder the leadership of our great ruler Jordan Bardella, the Latin people have risen from the ruins of decay and, inspired by the greatness of our people and shared history, have united under one flag under our ancestral lands, one people united, once more. This great new empire shall rekindle the flame started by Rome, and despite the tragic fall of Rome this new state shall last for the ages.\n\nThe torches of the Latin people are alight across the Mediterranean, this time, forever.\n\nTu regere imperio populos, Romane, memento; hae tibi erunt artes; pacisque imponere morem, parcere subiectis, et debellare superbos."
 Nationalist_France.31.a: "¡Salve!"
 Nationalist_France.32.t: "Separatistas padanos ganan fuerza en el norte de Italia"
 Nationalist_France.32.d: "En protestas multitudinarias por el norte de Italia, los ciudadanos han pedido el establecimiento de un estado nación en el norte de Italia llamado \"Reino de Padania\". Ya sabíamos de estos grupos desde hace tiempo y estos están financiados por nuestro vecino occidental, el Estado Francés, pero hasta ahora pensábamos que eran minoritarios."
 Nationalist_France.32.a: "¡¿Y se hacen llamar fascistas?!"
 Nationalist_France.32.b: "¡Todos somos hermanos!"
 Nationalist_France.320.t: "Rechazo de los Padanianos"
 Nationalist_France.320.d: "Los revolucionarios de Padania en nuestro este, en lo mas norte de Italia, son personas que han luchados y que merecen todo derecho a la independencia. Combaten por sus propios medios y por su propia gente, su propia identidad cultural. ¿Quiénes somos para estar en desacuerdo con eso?\n\nSería hipócrita de nosotros no proteger y tomar bajo nuestra ala a aquellas personas que luchan por su propia identidad y soberanía, cosa que nosotros nos vimos forzados a hacer y combatir en las sombras por años, como ellos lo hacen ahora. Vamos a poner nuestro peso detrás de su movimiento, y hacer a Italia 'reconsiderar' su decisión de no respetar a la gente de Padania."
 Nationalist_France.320.a: "¡Merecen libertad!"
 Nationalist_France.328.t: "Hogar de los latinos, ¿qué serás?"
 Nationalist_France.328.d: "Italia luchó por unificarse en la década de 1860; no habia sido una nación durante doscientos años y ahora, bajo nuestro control, ha caído en manos de los separatistas que hemos financiado. Están de nuevo a merced de extranjeros... es una pena ver a un pueblo tan hundido que millones vitorean su propia caída. Padania fue creada como una conveniencia para darnos una razón para entrar en Italia y apoderarnos de ella, pero no podemos descartar el papel bonapartista en la unificación de Italia desde el principio. Italia no era más que una pequeña Piamonte-Cerdeña, y con la ayuda de Napoleón III, Italia quedó bajo el dominio de la Casa de Saboya, ¿no deberíamos olvidar que esta vasta nación fue fundada por nosotros? ¿Sería realmente lo mejor para nuestro futuro mantener a Italia dividida en partes manejables? ¿O deberíamos revivir a nuestros hermanos y fortalecerlos como lo hicimos en el pasado? Elevando a Italia para que sea de nuevo una gran nación entre grandes naciones, aunque bajo la guía parisina y el liderazgo bonapartista."
 Nationalist_France.328.a: "¡Hermandad!"
 Nationalist_France.33.t: "Tropas Francesas apoyan a los separatistas de Padania"
 Nationalist_France.33.d: "Reportes preocupantes nos han llegado aquí en Roma, debido a que el ejercito francés ha sido visto en colaboración activa con el movimiento separatistas de Padania. ¡¿Tales actos son completamente imperdonables para nosotros, considerando a sus aliados como menos que un grupo rebelde que apenas se alinea a sus ideales?! ¡Absurdo!"
 Nationalist_France.33.a: "¡Que indignación! ¡Prepara los planes de batalla!"
 Nationalist_France.34.t: "Gianluca Ionnone es asesinado en su villa en Italia"
 Nationalist_France.34.d: "Durante más de dos décadas, Gianluca Iannone advirtió a Europa de lo que se avecinaba y de la necesidad de prepararse para hacer frente a la ola roja. El segundo Duce de Italia, el eterno líder de CasaPound, trabajó día y noche por el bienestar de sus hermanos europeos y latinos. Soñaba con una Europa fuerte y unida, unida por lazos de sangre e ideológicos. Visionarios ilustres como Iannone solo aparecen una vez cada pocos siglos-\n\nAl igual que muchas otras figuras históricas, nos dejó demasiado pronto. !Nos lo arrebataron traidores que viven entre nosotros! Asesinados por esos putos comunistas y globalistas, ¡que no son más que los perros falderos de la bestia rusa! Se equivocan si piensan que pueden quebrantar nuestro espíritu y acabar con nuestra causa. El asesinato de Iannone solo el el inicio de la intromisión bolchevique en la política italiana, ante la que debemos responder reforzando nuestros lazos con Italia. Podrán matar a un hombre pero no podrán acabar con sus ideas, y las ideas de Iannone vivirán en el corazón de todos los europeos. Hoy, derramaron sangre europea en nuestra tierra, pero en el día de mañana seremos nosotros quienes derramemos su sangre en sus tierras, ¡y les haremos pagar por todos sus crímenes!"
 Nationalist_France.34.a: "Un visionario ha facellido..."
 Nationalist_France.35.t: "Colapso del gobierno de CasaPound"
 Nationalist_France.35.d: "Está claro que la situación en la península itálica se ha salido de control. Tras el asesinato de Iannone, el Consejo Nacional de Fascistas cayó en el caos y fue incapaz de encontrar un sucesor con la capacidad e influencia que tenía Iannone. Varias facciones y fuerzas locales han aprovechado el vacío de poder dejado por el fallecimiento de Iannone, luchando entre sí por el control y deteriorando aún más la situación.\n\nAl mismo tiempo, el malestar se ha intensificado enormemente, quebrantando el orden social. Las fuerzas francesas que desplegamos previamente para apoyar al Reino de Padania se vieron forzadas a ocupar Roma y establecer un protectorado, cuya extensión actual se limita a la capital y las áreas aledañas a esta. Si bien este movimiento sirvió para estabilizar temporalmente la situación en Roma, su alcance fuera de la ciudad eterna fue muy limitado.\n\nTras haber perdido el control de los territorios del norte de Italia y Roma, los remanentes de la República Social Italiana liderada por Giancarlo Cito se vio forzada a retroceder hasta el sur, donde esperaban poder reagruparse y organizar una contraofensiva. Sin embargo, se les sumó un nuevo problema: las barricadas formadas por la muchedumbre comunista y las mafias locales resistieron el envite de las fuerzas de la RSI, lo que limita significativamente su capacidad operativa. En una situación tan complicada, únicamente son capaces de mantener el control de un puñado de ciudades, dejándoles con un futuro incierto y muy poco optimista."
 Nationalist_France.35.a: "La muerte de Italia."
 Nationalist_France.350.t: "Francia exige el aislamiento diplomático de Italia"
 Nationalist_France.350.d: ""
 Nationalist_France.350.a: "Tenemos nuestro precio."
 Nationalist_France.350.b: "¡Jamás!"
 Nationalist_France.351.t: "Alemanes abandonan Italia"
 Nationalist_France.351.d: "El embajador alemán presentó hoy sus observaciones al departamento de estado, dándonos la luz verde para invadir Italia. Aun así, advirtió que una invasión podría abrir Europa a nuevas incursiones soviéticas, pero ellos no han visto nuestros planes. No será una nueva campaña peninsular, será una victoria rápida sobre un hermano más débil. Con la luz verde brillando sobre nuestros ejércitos, podemos iniciar nuestra campaña para capturar Roma. Las fuerzas mecanizadas se asoman por encima de los Alpes como lo hizo Napoleón a caballo hace unos doscientos años. Nuestras fuerzas anfibias ansían las blancas arenas de Cerdeña."
 Nationalist_France.351.a: "Nuestros planes empiezan a encajar."
 Nationalist_France.352.t: "Alemania se pone de lado de los italianos"
 Nationalist_France.352.d: "Los bastardos traidores se pusieron de lado de los italianos. Probablemente por la nostalgia de la última guerra mundial, han llegado a la incomprensible conclusión de que satisfacer a Roma es preferible que satisfacer a París. A los alemanes les vendría bien recordar lo débiles que se hicieron en el último siglo, nosotros los franceses triunfaremos aún si hoy nos veremos obligados a dar un paso atrás. ¡Francia está destinada a controlar a los pueblos latinos les guste o no a los alemanes! ¡Somos la nación latina más poderosa, buscamos la unión y prosperidad de los pueblos latinos y ,por su propio bien, los alemanes no deben interponerse en nuestro camino!"
 Nationalist_France.352.a: "¡Pues vale! Ya encontraremos otros modos de reconquistar Roma..."
 Nationalist_France.36.t: "El monarca español llega a Burdeos"
 Nationalist_France.36.d: "TODO SPanish monarchy shows up"
 Nationalist_France.36.a: "España pronto será estabilizada."
 Nationalist_France.37.t: "Destino de España"
 Nationalist_France.37.d: "España, una nación cuya historia se ha entrelazado profundamente con la nuestra. Desde la batalla de Rocroi durante la era borbónica hasta la guerra Peninsular de Napoleón, hemos chocado innumerables veces con los españoles a sangre y fuego. Por siglos, los rencores y conflictos entre nuestros dos países han sido una inquebrantable amenaza que tejieron el destino de nuestras naciones. El otrora imperio donde nunca se pone el sol, que envió flotas a los siete mares, que desplegó a los formidables tercios españoles que resistían sólidamente en el campo de batalla, ha colapsado ahora en una guerra fratricida.\n\nParece ser que el destino de España ciertamente ha caído en nuestras manos, y al enfrentarnos a esta tierra fracturada, permanece la cuestión: ¿Cómo remodelaremos su futuro?"
 Nationalist_France.37.a: "Mantener la guarnición franco-catalana"
 Nationalist_France.37.b: "Establecer la provincia francesa de Cataluña"
 Nationalist_France.37.c: "España debe ser pacificada por la fuerza."
 Nationalist_France.39.t: "Destino de Portugal"
 Nationalist_France.39.d: "Portugal se encuentra justo al otro lado de nuestras fronteras, nuestras fuerzas están situadas a lo largo de la frontera observando la devastada península ibérica, tenemos la oportunidad de entrar y restaurar el orden o si la situación ya se ha estabilizado, podemos cambiar las costas a nuestro gusto. Nosotros los franceses aprendimos en la escuela la Campaña peninsular, su trágico din y los efectos que tuvo en las campañas napoleónicas. Sabemos que controlar Portugal es primordial para nuestra estabilidad a largo plazo. Tenemos suerte de que los británicos no estén interesados en apoyar a Portugal esta vez. Tenemos unas cuantas opciones. Podemos enviar un ultimátum, también ya que estamos preparados podemos simplemente entrar en Portugal o si Lisboa está bajo el gobierno de alguien con el que podemos trabajar conjuntamente, podemos demandar que se alineen con nosotros."
 Nationalist_France.39.a: "Demandar cooperación"
 Nationalist_France.39.b: "Debemos restaurar el orden."
 Nationalist_France.39.c: "Reconocimiento a cambio de desradicalización"
 Nationalist_France.40.t: "Muerte o deshonra"
 Nationalist_France.40.d: "No hace tanto tiempo atrás, las hordas rojas del Este irrumpieron en nuestra patria, masacrando a nuestro pueblo y arrasándolo todo a su paso. Las lágrimas de nuestros compatriotas salaban los campos al tiempo que los bolcheviques saqueaban nuestra nación, llevándose lo poco que nos quedaba. Sobra decir que nuestro odio hacia los rusos es inconmensurable.\n\nNo obstante, no renegamos de la razón. La venganza no debe nublar nuestro juicio, especialmente en tiempos tan convulsos como estos.\n\nLos franceses nos instan a unirse a su \"Pacto Antisoviético\", una coalición formada para defenderse de la creciente amenaza comunista que yace en el Este. Pero el aliarnos con ellos seguramente desate la ira de los rusos, una ira que todavía no estamos en condiciones para hacerle frente. Nuestra nación todavía sigue reconstruyéndose, nuestras heridas siguen frescas y no sabemos hasta donde llega nuestro poder. No tenemos ni la capacidad industrial ni de mano de obra necesarias para luchar contra los nuevos amos de Europa.\n\nclaro que, los franceses nos prometieron protegernos. Nos garantizaron que en caso de guerra, nos apoyarían incondicionalmente y nos enviarían equipamiento militar. Tras el colapso de los Estados Unidos, Francia se erigió como la nación más poderosa de la OTAN. Aún tras la devastación causada por la Guerra Europea, sus fuerzas armadas siguen teniendo un poder considerable que no debe ser subestimado.\n\nAsí, tenemos que tomar una decisión tan simple como brutal... ¿Viviremos atemorizados y humillados, atormentados por nuestra derrota? ¿O marcharemos hacia la boca del oso, sin doblegarnos y muriendo con honor y gloria?"
 Nationalist_France.41.a: "Unirse al Pacto Antisoviético."
 Nationalist_France.41.b: "Rechazar la invitación francesa."
 Nationalist_France.42.t: "Primeras elecciones de la Nueva República"
 Nationalist_France.42.d: "Después de la llamada de Villiers, los resultados de la primera elección no están claros para ninguno de los observadores. Hay tres partidos en la contienda, todos ellos con una popularidad prácticamente igual entre el pueblo francés.\n\nLes Républicains, el favorito en la mente de la mayoría, es un movimiento casi idéntico al Agrupación Nacional anterior: un movimiento conservador que busca recuperar los valores tradicionales de Francia manteniendo el sistema democrático y el equilibrio de poder.\n\nJunto a este, está el Movimiento Democrático, un partido centrista que existe desde antes de la caída de Francia ante los soviéticos. Autoproclamándose como la opción razonable y sensata, avanza con una visión mucho más centrista y liberal que cualquiera de los partidos contra los que compite.\n\nFinalmente, la Unión Nacional Conservadora, una extraña mezcla de valores conservadores y militares. Se presentan como un partido conservador mucho más patriótico que LR, considerándose a sí mismos la verdadera continuación del sueño de Villiers y De Gaulle, de una Francia tradicionalista y patriótica."
 Nationalist_France.42.a: "¡Les Républicains aseguran la victoria!"
 Nationalist_France.42.b: "¡Movimiento Democrático asegura la victoria!"
 Nationalist_France.42.c: "¡Unión Nacional Conservadora asegura una mayoría estable!"
 Nationalist_France.45.t: "\"Lafayette\" queda incomunicado"
 Nationalist_France.45.d: "Luchando heroicamente en la defensa de nuestra capital, nuestro glorioso líder Lafayette desapareció de su puesto de mando tras una emboscada llevada a cabo por fuerzas especiales cerca de los restos de la Torre Eiffel. El casco de Lafayette fue encontrado dentro de un coche calcinado antes de la retirada total de la capital, y si bien pudimos recuperar un puñado de cadáveres del lugar de la emboscada, no hay nada que pueda identificar a nuestro Gran Comandante.\n\nSin ningún cadáver que pueda confirmar su muerte, su ayudante de campo, el general Nikola Perović anunció en un escenario improvisado en las afueras de París que, hasta que se localice al Comandante, él quedaría al cargo, y, adicionalmente, llamó a una suicida ofensiva total contra las defensas rusas para vengar al Comandante."
 Nationalist_France.45.a: "Su espíritu vive dentro de cada soldado"
 Nationalist_France.46.t: "Negocios antifranceses saqueados"
 Nationalist_France.46.d: "El autodesprecio es uno de los valores más repugnante que puede tener una persona o una nación. Durante años, el odio hacia nuestra propia nación por parte de gente de fuera y nuestro pueblo fue normalizado. Ahora que nuestro régimen está a cargo, el pueblo ha decidido que ya no lo tolerará más. Hemos recibido numerosos reportes sobre el saqueo de numerosos edificios anti franceses. Francia ya no se avergonzará de sus raíces, y aquellos que no puedan aceptar esto no tienen cabida en nuestra gran nación."
 Nationalist_France.46.a: "Es lo que se merecen"
 Nationalist_France.47.t: "Se estrena \"Destruction de l'âme de l'Europe\""
 Nationalist_France.47.d: "Destruction de lâme de l'Europe será recordada como el filme más épico del cine francés y mostrará al mundo nuestra extraordinaria calidad cinematográfica. Durante semanas, numerosos patriotas fueron a los cines para presenciar la épica de nuestro régimen salvando Francia usando la fuerza. Incluso en el extranjero, ha sido aclamada en Alemania, Italia e incluso en el Reino Unido. En todos estos países los patriotas llenaron las salas para presenciar la gloria de nuestra nación captada en cámara."
 Nationalist_France.47.a: "Es... hermoso..."
 Nationalist_France.48.t: "Patronazgo de las artes modernas"
 Nationalist_France.48.d: "Nuestro legítimo y erudito monarca, el rey Luis Alfonso de Borbón ha destinado sabiamente una parte del presupuesto rea una producción artística para ilustrar el interés de nuestro rey por las artes de Francia. Lo más difícil será decidir en que usaremos el presupuesto, si bien de las varias propuestas del Consejo Real de las Artes Modernas dos de ellas son las que concentran la mayoría de apoyos. Las propuestas en cuestión son una red social monárquica, Couronne, donde los súbditos franceses podrán expresar su amor por nuestro querido monarca por un lado, y por otro está XX, una película sobre el rey Luis Alfonso de Borbón, sobre sus hazañas y como logró llegar a la fama. Hemos redactado y enviado las propuestas al rey Luis Alfonso de Borbón y estamos a la espera de la aprobación de uno de los dos proyectos."
 Nationalist_France.48.a: "¡Una película sobre nuestro rey y sus hazañas!"
 Nationalist_France.48.b: "¡Un lugar para que nuestros súbitos puedan reunirse en línea!"
 Nationalist_France.49.t: "Estreno de XX"
 Nationalist_France.49.d: "XX será una de las mejores películas no solo de la historia del cine francés, sino del cine en general. Fue moldeada cuidadosamente por nuestro extraordinario equipo de producción para representar los eventos que llevaron a la Primera Guerra europea y como nuestro monarca rescató nuestra nación en su momento más oscuro. Lo más sorprendente fue la excelente selección del casting pues muchos generales, políticos e incluso el mismísimo rey resaltaron que sus contrapartes de la película eran muy parecidos a ellos. Tras el final de la película, el rey se reunión con el director y el equipo tras la película para felicitarles por su increíble trabajo."
 Nationalist_France.49.a: "Joder, esto si es cine."
 Nationalist_France.50.t: "Fracaso de XX"
 Nationalist_France.50.d: "Eso fue espantoso... no ha pasado ni una semana desde su estreno en los cines de Francia y XX ya ha sido enviada a DVD. La producción estuvo llena de problemas pues muchos miembros del equipo fueron reemplazados a mitad de producción por incompetencia, e incluso se llego a sustituir de director 4 veces por órdenes de nuestro monarca. El casting fue terrible, siendo el rey representando por alguien no se parecía ni un poquito a nuestro monarca, lo que enfadó tanto a Luis Alfonso de Borbón que hizo que saliese del cine ni pasar siquiera la primera escena."
 Nationalist_France.50.a: "¿Quién aprobó esta mierda?"
 Nationalist_France.51.t: "Lanzamiento de \"Couronne\""
 Nationalist_France.51.d: "Oh Couronne, por donde empezamos... la creación de la aplicación de mensajería fue divina gracias al extraordinario trabajo de los desarrolladores la nuestra nación. Si Couronne hubiese sido una estatua la habríamos puesto sin dudar en el Louvre junto a otras grandes esculturas de nuestra nación. La aplicación abrió sus servidores el día de hoy por la mañana y recibió una calurosa bienvenida por parte de nuestros leales súbitos, y el número de cuentas creadas se cuentan ya por cientos de miles. Los servidores apenas lograban mantenerse operativos cuando el mismísimo rey Luis Alfonso de Borbón mandó su primer Couronne, siendo inmediatamente aclamado por todos los usuarios. Couronne pasará a la historia como otro más de los numerosos proyectos exitosos financiados por nuestro sabio monarca."
 Nationalist_France.51.a: "¡Monárquicos del internet, uníos!"
 Nationalist_France.52.t: "Lanzamiento de \"Couronne\""
 Nationalist_France.52.d: "Odio esta puta mierda. Intentamos hacer de Couronne una innovadora y revolucionaria red social para los súbditos de Francia sólo para que los servidores fuesen atacados minutos después del lanzamiento de la plataforma de mensajería. Era horrible, los canales estaban repletos de mensajes antimonárquicos y con horripilantes metrajes de combate procedente de la Guerra Europea, en los que se apreciaban la usual degeneración y el sadismo ruso. Tuvimos que desconectar la web pocas horas después a causa de la inexistente moderación. Todos ese dinero de los contribuyentes a la basura..."
 Nationalist_France.52.a: "Ay que miedo yo mejor me void..."
 Nationalist_France.53.t: "Francia demanda la unificación de los Borbones"
 Nationalist_France.53.d: "TODO France Demands Bourbon Unification"
 Nationalist_France.53.a: "¡Jamás!"
 Nationalist_France.53.b: "¡Larga vida al rey Luis II!"
 Nationalist_France.54.t: "Informe sobre el asalto al centro de mando y el depósito de armas de Verdún."
 Nationalist_France.54.d: "A fecha de [?global.date.GetDateString], los defensores del centro de mando y el depósito de armas de Verdún lograron repeler nuestros ataques en 4 ocasiones.\nSi bien los suministros pueden sernos de utilidad, las tropas leales a la corrupta República se mantienen firmes y, si logran romper el cerco, podrían amenazar nuestro ya de por sí tenue control del Gran Este.\nApruebo una serie de ataques aéreos de precisión sobre ambos complejos para acabar con la resistencia.\n\nFirmado,"
 Nationalist_France.54.a: "[THIS.GetRank] [THIS.GetName]."
 Nationalist_France.55.t: "Informe sobre el asalto al centro de mando y el depósito de armas de Verdún."
 Nationalist_France.55.d: "A fecha de [?global.date.GetDateString], el asalto al centro de mando y el depósito de armas de Verdún ha finalizado.\nLos suministros allí presentes, alrededor de 7500 HK416 F y numeroso equipamiento de mando, nos permitirán crear nuevas unidades para la reconquista de Francia de las sucias manos de la República y los rojos del sur.\nConcedo el permiso a los soldados para celebrar este triunfo con una ronda de vino.\n\nFirmado,"
 Nationalist_France.55.a: "[THIS.GetRank] [THIS.GetName]."
 Nationalist_France.56.t: "Llegada de voluntarios del Frente Patriota"
 Nationalist_France.56.d: "Las noticias del violento estallido de nuestra guerra civil tomaron al mundo por sorpresa tal y como sucedió cuando estalló la Segunda Guerra Civil Americana años atrás. Al tiempo que nuestro legítimo gobierno sufre por la falta de apoyo, fuimos informados de algo... amigos del extranjero. Lafayette, un joven oficial, ha informado al alto mando que un grupo de experimentados veteranos que conoció cuando fue al extranjero para luchar por el Frente Patriota se ha desplazado a nuestro territorio con la intención de luchar por nuestra causa. Si bien la barbarie al otro lado del charco no nos importa lo más mínimo, rechazar su ayuda sería una estupidez por nuestra parte."
 Nationalist_France.56.a: "Mantenedlos bien vigilados."
 Nationalist_France.57.t: "Asimilar a los soldados conservadores"
 Nationalist_France.57.d: "Conservadurismo... una ideología que ha sido uno de los grandes problemas de Francia. Si bien son mejores que los rojos, quienes deseaban acabar con Francia y todo por lo que luchamos, suponen un obstáculo para que nuestro gobierno pueda enmendar los errores de la Quinta República y realizar profundos cambios y reformas. La decisión ahora cae sobre los funcionarios y comandantes que pueden elegir entre defender nuestros valores o echarse a un lado para que podamos luchar un día más... la decisión es suya."
 Nationalist_France.57.a: "Luchan por los valores franceses."
 Nationalist_France.57.b: "¡No son mejores que los comunistas!"
 Nationalist_France.58.t: "La plaga socialista"
 Nationalist_France.58.d: "Ningún rincón de Francia está a salvo de la vorágine de violencia que está consumiendo el país. Nuestra otrora orgullosa nación ha sido arrasada por las hordas rojas del Este y ahora estamos envueltos en otra guerra fratricida contra nuestros compatriotas. No solo nos robaron todo lo que teníamos en nuestro momento de mayor debilidad, sino que ahora buscan que en Francia hondee la bandera roja de su enfermiza y parásita ideología. Salvaremos de esta nefasta ideología a nuestro país y, más adelante, a toda Europa."
 Nationalist_France.58.a: "¡Debemos erradicarla!"
 Nationalist_France.59.t: "Formar brigadas de niños patriotas"
 Nationalist_France.59.d: "Los niños siempre han sido un tema candente en la guerra, pero en nuestra terrible situación en el frente y con nuestra mano de obra apta cada vez más escasa, toda ayuda es bienveida.\n\n¿Por qué malgastar nuestros ya escasos recursos en algo como la educación? Cuando podríamos emplearlos en el frente para ayudar a nuestras tropas y desempeñar funciones auxiliares y de reconocimiento. Son muy útiles, ya que los adolescentes casi pueden considerarse físicamente aptos. ¿Deberíamos mantenerlos en las aulas o emplearlos en el frente?"
 Nationalist_France.59.a: "¡Bienvenidos jóvenes francos!"
 Nationalist_France.59.b: "Son más útiles ya crecidos."
 Nationalist_France.60.t: "Incorporar a los ancianos"
 Nationalist_France.60.d: "Al inicio de la guerra esperábamos una victoria rápida, pero en su lugar sufrimos pérdidas catastróficas que hacen que nuestras reservas de hombres físicamente aptos se reduzcan a un ritmo alarmante. En una situación como esta, toda ayuda es bienvenida.\n\nPodemos sacar a los ancianos de los hospitales y de las residencias para usarlos como carne de cañón y como apoyo ligero. Si les prometemos pagar sus tratamientos médicos o incrementar sus pensiones seguramente se unirán de forma voluntaria al ejército, y a unas malas siempre podemos forzarlos a ir al frente. Las brigadas de ancianos serán una gran distracción para el enemigo, y nos permitirá conservar nuestras reducidas reservas de hombres físicamente aptos para ganar esta guerra."
 Nationalist_France.60.a: "¡El patriotismo no tiene límite de edad!"
 Nationalist_France.60.b: "No serán muy útiles."
 Nationalist_France.61.t: "Batallones penales"
 Nationalist_France.61.d: "La situación en el frente continúa deteriorándose, y toda ayuda es bienvenida. Con nuestras reservas convencionales de mano de obra cada vez más reducidas, debemos buscar reservas alternativas. En estos momentos, la peor escoria de la sociedad se pudre en nuestras cárceles, no haciendo otra cosa que malgastando recursos y espacio. Sin embargo, esto no tiene por qué ser así , pues incluso el peor asesino o ladrón puede convertirse en un patriota. Hemos iniciado un programa en el que los presos, a cambio de servir en el ejército, serán liberados, si sobreviven claro está. Y si con esas no conseguimos la mano de obra necesaria, siempre podemos forzarlos a servir en el ejército. ¡Lucharán por su patria y lo harán con orgullo!"
 Nationalist_France.61.a: "¿Un asesino? ¡Denle un arma!"
 Nationalist_France.61.b: "Estamos desesperados, pero no somos insensatos."
 Nationalist_France.62.t: "El fin del mundo como lo conocemos"
 Nationalist_France.62.d: "We have restrained ourselves for too long as the death, destruction, and madness of war still rages on throughout the continent. Our beloved landmarks and history have been desecrated by the communards for the latter half of the decade, with no indications of any halt in their total war. We have watched our brothers fall and get stripped away of all forms of identity and culture they retained proudly after escaping the grasp of socialism that shackled them for decades, only to be held down by the same rotting plague once more. France had almost met the same tragedy as the rest of Europe, barely managing to hold ourselves together as we retreated back to the homeland with the same sense of defeat.\n\nWe now face the inevitable continuation of the dreaded European war, with total war being declared by all belligerents. We cannot hold ourselves back any longer; we cannot succeed while actively restraining ourselves and not taking every possible advantage we get. With the change of administration we have worked with former government personnel in order to restore our nuclear capabilities in preparation for this day of reckoning. The historians will not look at our decision favorably, but they will never understand the dire situation we face today. We will succeed at any cost and we will not look back until we have won. "
 Nationalist_France.62.a: "Y me siento bien"
 Nationalist_France.63.t: "La resistencia"
 Nationalist_France.63.d: "A handful of traitors who disregard our national interests have recently incited unrest in the streets of Lyon, Marseille, and Toulouse.. even going so far as to launch despicable assassination attempts against our loyal civil servants. A senior official from Paris's 7th arrondissement was brutally attacked on the way home; a government office in Strasbourg was set ablaze.\n\nThese so-called \"Resistance Fighters,\" calling themselves \"Defenders of the Republic,\" are in reality agents of chaos and division. They spread lies, slander our grand effort to restore the nation's glory, and seek to drag us back into the feeble mire of the old regime. They paint slogans like \"Liberty or Death\" on walls, yet fail to grasp that true liberty can only be founded on order and unity. It's not hard to see that foreign forces are manipulating these rebels from behind the scenes those nations that once defeated France and now fear our resurgence are funding them with money and weapons, attempting to weaken us by sowing domestic turmoil. These traitors, willingly serving as the lapdogs of foreign interests, betray their own country and bloodline, truly contemptible.\n\nBut our government will not stand by in the face of such provocation. Our leaders have made it clear that these threats to national unity must be crushed with an iron fist. Ordinary citizens who support or harbor these rebels will also be held accountable. Silence is complicity, and bystanding amounts to abetting. Every true patriot has a responsibility to report suspicious activities to the authorities. The future of France depends on the vigilance and loyalty of every one of us."
 Nationalist_France.63.a: "Deben ser PURGADOS."
 Nationalist_France.64.t: "La noche de la purificación"
 Nationalist_France.64.d: "Smoke rises from a lone cigarette, a man rocks in his chair looking upon the cityscape of Paris, a friend of his leans on a wall beside him.\n''Parisian nights are so beautiful, aren't they Conrad?''\nHe was met with silence, that was until Conrad began talking after a few moments.\n''You can't hide it anymore Fritz, we're doomed. That intel we got yesterday came from our best informant and was spot on, the police movements, barricades outside the city, the flights all canceled, they're preparing for something.'' \nFritz looked at Conrad before putting out his cigarette, the fizzling noise being drowned out by the pops and cracks in Fritz's old bones as he stood up. \n''You could be right, but that doesn't mean that we're doomed, we've covered our tracks well, they don't know of our 'sympathies' as they like to call them. And if they do find out, well.'' Fritz grabbed a double barrel leaning on the door frame. Moments passed, and the two spoke and joked, trying to ward off the nervousness that loomed over them, the tension was palpable, they were expecting anything. And anything finally came.\nFritz and Conrad heard shuffling from inside. Fritz grabbed the shotgun and both entered their apartment room. More shuffling was heard, movement right outside the door. The shotgun was aimed at the door, Conrad pulled an AKM from under the bed and loaded it. \n\nThen there was silence. Heavy breaths and the low traffic outside were all that could practically be heard. Until a loud shouting came from right outside the room, and the front door flew off its hinges."
 Nationalist_France.64.a: "Nuits Parisiennes."
 Nationalist_France.65.t: "Outrage in the Military"
 Nationalist_France.65.d: "Even as the military continued getting more and more fervent in their anger, we continued losing. This has reached a boiling point, as there are now multiple open mutinies by hundreds and thousands of soldiers, all deciding that the fight was no longer worth the effort. The crack in our rank and file must be patched over, lest France be doomed to eternal servitude."
 Nationalist_France.65.a: "¡Malditos sean!"
 Nationalist_France.66.t: "Malestar en las filas"
 Nationalist_France.66.d: "With our continued failures along the frontline, our troops have begun deserting and complaining about our lack of success. This must be rectified within due time, and those who continue to speak out must be punished, unless we wish for our entire army to fracture into pieces before our very eyes."
 Nationalist_France.66.a: "Debemos actuar rápido..."
 Nationalist_France.68.t: "Ira ultranacionalista"
 Nationalist_France.68.d: "As our lines continue slipping, even the most fervent ultranationalists begin to spark with rage at us, believing us to be misusing the resources and people of their beautiful country, and that we are completely failing to put to work our concepts and ideals as they had hoped. Even our allies being torn away from us, there is little hope for recovery in our ranks, yet we must fight on."
 Nationalist_France.68.a: "¡Malditos sean!"

 FRA_Announce_Government_of_National_Defense_desc: "Francia ha llegado a su hora más oscura y los lobos acechan. Hemos derrocado al corrupto y fracasado líder anterior, pero no todo marcha bien. El ejército está desmoralizado y quebrado. La economía está destrozada y, a pesar de nuestros mejores esfuerzos por mantener una transferencia de poder limpia, también lo está la fe del pueblo en el Gobierno y en la propia Francia. Desde los separatistas hasta los nacionalistas rabiosos, e incluso el espectro comunista. Al parecer, todos los grupos se alzan para ocupar su lugar en el banquete del cadáver de Francia. Solo medidas extremas pueden salvar la situación y, a pesar de la naturaleza improvisada y desunida de nuestro Gobierno, no faltan las \"medidas extremas\" necesarias. Independientemente de nuestro compromiso, ya nos enfrentamos a una decisión muy importante sobre a quién priorizar la represión con nuestros limitados recursos. Esta decisión debe tomarse con cuidado, ya que los miembros más moderados de nuestra alianza informal temen que reprimir a un grupo simplemente empodere a otro. El camino por delante será largo y arduo."
 FRA_Put_down_Militant_Nationalists_desc: "A pesar de ser menos numerosos que los socialistas, los nacionalistas son un elemento mucho más preocupante. Sus filas se han engrosado con desertores y amplios sectores del cuerpo de oficiales simpatizan con ellos. Existe la preocupación constante del cesarismo dentro del ejército o de nuestra propia marcha sobre Roma. La izquierda tiene lemas y pancartas; la derecha tiene armas y el posible respaldo del ejército. De la izquierda nos ocuparemos más adelante. Debemos hacer todo lo posible para purgar al ejército de aquellos cuya lealtad sea cuestionable y desarmar por la fuerza a los paramilitares."
 FRA_Crush_the_Paris_Commune_desc: "Por toda Francia, las fuerzas de izquierda se amotinan. Gritan, saquean y queman en nombre de los \"trabajadores\" y la \"democracia\". Son demasiados para que las fuerzas del orden puedan controlarlos por sí solas, desbordadas y dispersas, incapaces de contener la marea roja sin ayuda. El ejército está demasiado herido para librar otro conflicto, pero no se necesita el mejor ejército del mundo para reprimir a simples manifestantes. También podemos pedir a los paramilitares nacionalistas que nos ayuden en la represión, pero es probable que sean difíciles de controlar y evitar represalias excesivas. Independientemente de los detalles exactos de la represión, los erradicaremos y nos aseguraremos de que ya no puedan frenar la recuperación de Francia."
 FRA_All_is_Well_desc: "Parece que nuestra decisión de reprimir a uno sobre el otro ha dado sus frutos. La gente ha visto que somos imparciales y que nuestro objetivo es salvar a Francia, por encima de la politiquería y la ambición. Hay informes preocupantes sobre la organización clandestina de armas y milicias, y el comportamiento cada vez más errático de algunos sectores del ejército, ¡pero esto no es nada! ¿Quién pondría en riesgo el futuro de Francia cuando ya hemos empezado a allanar el camino hacia la recuperación?"
 france.312.t: "Alemania reclama Alsacia-Lorena"
 france.312.d: "Tras nuestra independencia de la burocracia berlinesa, el gobierno alemán reafirmó sus derechos sobre la región históricamente francesa de Alsacia-Lorena. El nacionalismo ciego de los alemanes era previsible, y solo tenemos una respuesta... El Rin.\n\nEl río Rin ha sido la frontera natural entre el mundo civilizado y los bárbaros desde la antigüedad, y es evidente que no se puede confiar el autogobierno a los alemanes."
 france.312.a: "¡El Rin es la frontera natural de Francia!"

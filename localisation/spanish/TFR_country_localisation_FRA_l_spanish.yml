 FRA_Military_Retirement_category: "El Gran Juego"
 FRA_Military_Retirement_category_desc: "\n\n\n\n\n£GFX_FRA_Military_Loyalty_category\n\n\n\n\n\n\n\nLas Fuerzas Armadas Francesas han sido una organización rebelde que ha intentado manipular nuestros asuntos políticos durante décadas. Dicho esto, son los protectores de nuestra nación y garantizarán nuestra prosperidad y poder durante los próximos años. A medida que atravesamos este período de incertidumbre política para garantizar el éxito de nuestra administración, debemos trabajar periódicamente junto con los militares y ceder a sus solicitudes y demandas. Su lealtad es una necesidad y debemos trabajar cuidadosamente con nuestras Fuerzas Armadas para garantizar la grandeza de Francia.\n\nActualmente tenemos:\n§G[?happy_generals]§! general(es) que están §Gcontentos§! con el régimen.\n§O[?neutral_generals]§! general(es) que son §Oneutrales§! al régimen.\n§R[?angered_generals]§! general(es) que están §Renfadados§! con el régimen.\n§C[?retired_generals]§! general(es) que actualmente están de §Clicencia temporal§!."
 FRA_Natural_Military_Leader_Opinion_Sway: "Cambio de opinión de un líder militar"
 FRA_Natural_Military_Leader_Opinion_Sway_desc: "\"I cannot prevent the French from being french.\" - Charles de Gaulle"
 FRA_leave_nato: "Retirada de la OTAN"
 FRA_leave_nato_desc: ""
 FRA_Appeal_to_Neutral_Parties: "Apelar a generales neutrales"
 FRA_Appeal_to_Neutral_Parties_desc: "No podemos permitirnos la neutralidad en nuestro Estado Mayor y deben tomarse medidas para garantizar que permanezca unido y apoye a nuestra administración."
 FRA_Work_with_Disatisfied_Generals: "Trabajar con generales descontentos"
 FRA_Work_with_Disatisfied_Generals_desc: "Aunque han perdido el favor de nuestra administración, las relaciones no son completamente distantes y hay mucho que podemos hacer para que no se sientan completamente insatisfechos con nuestro gobierno."
 FRA_Benefit_from_our_Supporters: "Aprovechar su apoyo"
 FRA_Benefit_from_our_Supporters_desc: "This \"Great Game\" is currently in our favour and we shall benefit from our popularity among the general staff.  "
 FRA_Bring_Back_Villiers: "Colaborar con Villiers"

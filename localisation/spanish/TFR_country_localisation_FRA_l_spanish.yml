 FRA_Retire_Disatisfied_General_desc: "Si bien es moralmente loable, obligar a un miembro insatisfecho del Estado Mayor a retirarse políticamente hasta que vea a nuestra administración es un método probado y comprobado que nos beneficiará a corto plazo."
 FRA_Unretire_Disatisfied_General: "Perdonar transgresiones políticas"

 FAF_republican_officers_dynamic: "Mouvement Républicain"
 FAF_republican_officers_dynamic_desc: "\n\n\n\n\n£GFX_FRA_revolution\n\n\n\n\n\n\n\nSocialistas, \"conservadores\" democráticos, liberales y ateos. Todavía persiste una maliciosa fuerza dentro de nuestra burocracia heredada de la corrupta república, una fuerza rebelde dispuesta a derrocar nuestro reino a la mínima oportunidad. Hasta que hayamos descubierto a sus cabecillas y los hayamos purgado de nuestras fuerzas armadas, tendremos dificultades para realizar maniobras sofisticadas mínimamente organizadas."

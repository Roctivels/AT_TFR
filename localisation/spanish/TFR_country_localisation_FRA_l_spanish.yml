 FRA_Interventionist_Fervor_desc: "Norteamérica se ha sumido en el caos y la anarquía, un estado de muerte y destrucción sin precedentes en la historia moderna. Este caos ha sacudido a nuestra clase política hasta el punto de desvanecer precedentes de décadas. Casi de la noche a la mañana, se ha producido un cambio en la postura del Estado y en el personal, un cambio sin precedentes, incluso por sí mismo. En todas y cada una de las oficinas gubernamentales, las palomas han sido silenciadas y los halcones han tomado su lugar. Todos ven el mundo en llamas que nos rodea y exigen lo que ya ha estado en la mente de todos. Si necesitamos actuar para mantener la paz y la seguridad en Europa y en el extranjero...\n\nEntonces haremos lo que debamos."

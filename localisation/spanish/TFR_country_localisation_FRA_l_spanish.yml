l_spanish:
 FRA_the_french_armed_forces: "El estado de las Fuerzas Armadas"
 FRA_the_french_armed_forces_desc: "Con la realización de nuestra revisión decenal exhaustiva de las Fuerzas Armadas Francesas, los informes publicados han sido preocupantes. Nuestras fuerzas armadas han estado infrafinanciadas y rezagadas en comparación con nuestros aliados europeos. Ante estas preocupantes noticias, nuestros generales han exigido a nuestra administración que actúe de inmediato. Afortunadamente, nuestro gobierno ha promulgado oficialmente un aumento del presupuesto de las Fuerzas Armadas Francesas de más de catorce millones de euros, lo que ha permitido en gran medida la modernización de nuestras fuerzas armadas con el cambio de década.\n\nLas fuerzas armadas de nuestro país no se quedarán atrás en un momento como este y, por la seguridad y el éxito de Francia, es hora de actuar ahora más que nunca. Francia volverá a alcanzar la distinción y el honor que le correspondía como potencia militar de Europa."
 FRA_unify_the_DSGE_DSGI: "Unificar el DGSI-DGSE"
 FRA_unify_the_DSGE_DSGI_desc: "Estamos entrando en una nueva era para nuestra nación, una en la que necesitamos fortificar nuestra conexión entre las agencias de inteligencia exteriores e interiores.... El DGSN, o Directorio General de Seguridad Nacional, será el encargado de protegernos interna y externamente."
 FRA_dsgn_creation_tt: "Al finalizar, se creará el §CDirectorio General de Seguridad Nacional, o DGSN§!"
 FRA_the_french_airforce: "Rediseñar nuestra fuerza aérea"
 FRA_the_french_airforce_desc: "Nuestra Fuerza Aérea ha sido, sin duda, una de las ramas más deficientes de las Fuerzas Armadas Francesas, con un progreso mínimo en la modernización de nuestra flota aérea actual. Actualmente, estamos empleando a múltiples empresas de aviación, como Dassault Aviation, para desarrollar posibles soluciones que lleven a la Fuerza Aérea Francesa a la era moderna con niveles de superioridad y fuerza sin precedentes. Con estos esfuerzos, Francia no tardará en dominar los cielos."
 FRA_the_race_for_the_fifth_generation_fighter: "Un caza francés de 5ª generación"
 FRA_the_race_for_the_fifth_generation_fighter_desc: "Con los recientes avances en nuestra división de investigación y desarrollo de aviación, finalmente tenemos la oportunidad tan esperada de impulsar la próxima generación de nuestra fuerza aérea. El caza francés de quinta generación es uno de los conceptos más vanguardistas que hemos visto y debemos aprovecharlo. Francia será pionera en el futuro concepto de guerra aérea una vez que presentemos al mundo el caza de quinta generación de vanguardia."
 FRA_ramp_up_the_production_of_the_Dassalut_Rafale: "Producción en masa del Rafale"
 FRA_ramp_up_the_production_of_the_Dassalut_Rafale_desc: "El Rafale siempre ha sido beneficioso para nuestro ejército, y con algunos ajustes puntuales y una generosa financiación a Dassault en poco tiempo, podremos iniciar la producción en masa de nuestros cazas. Con el excepcional rendimiento y las capacidades que nos ha demostrado el Rafale, esperamos superar en producción a la Fuerza Aérea Rusa para finales de la década, si todo marcha según lo previsto."
 FRA_conduct_major_improvments: "Afinar experiencia aérea"
 FRA_conduct_major_improvments_desc: "Nuestra fuerza aérea no solo se ha quedado atrás tecnológicamente, sino que, a falta de un término mejor, nuestros profesionales han perdido la ventaja que una vez la definió. La solución ha sido que nuestra fuerza aérea inicie una reestructuración integral del programa aéreo actual de la Fuerza Aérea Francesa, corrigiendo las deficiencias y el declive gradual que hemos enfrentado durante años y, en su lugar, avanzando hacia una mejora gradual de nuestra fuerza aérea y superando a la competencia."
 FRA_deveop_domestic_drones: "Desarrollar capacidades nacionales"
 FRA_deveop_domestic_drones_desc: "Para conseguir la autosuficiencia y reducir su dependencia de fuentes externas, Francia priorizará el desarrollo de las capacidades de su industria militar, fomentando la innovación y la colaboración para crear una base resiliente que pueda sostener un ejército de vanguardia."
 FRA_expand_our_airfields: "Expandir bases aéreas orientales"
 FRA_expand_our_airfields_desc: "Reconociendo la importancia geopolítica de su frente Oriental, Francia mejorará estratégicamente sus capacidades aéreas en la región desplegando recursos adicionales, estableciendo bases de operaciones avanzadas y realizando ejercicios conjuntos con naciones aliadas."
 FRA_aerial_defense: "Mejorar el SAMP/T"
 FRA_aerial_defense_desc: "El sistema de misiles Sol-Air Moyenne Portée Terrestre ha servido a Francia como nuestro principal sistema de defensa aérea desde su creación la década pasada. Para garantizar la máxima eficiencia y la seguridad de la defensa aérea que Francia merece, hemos contratado a los diseñadores originales del SAMP/T para rediseñar y actualizar el sistema de defensa antimisiles. A medida que la guerra aérea continúa creciendo y evolucionando, también lo hará nuestra capacidad de defensa."
 FRA_aerial_offense: "La Frontera Final"
 FRA_aerial_offense_desc: "El espacio siempre se ha considerado el verdadero objetivo final de cualquier gran nación que desee avanzar más allá de lo humanamente posible. Es hora de demostrarle al mundo que Francia desea ir más allá de lo que muchos nos consideran capaces. Francia pondrá en marcha su propio programa espacial y, a su debido tiempo, tendremos nuestra propia bandera en la Luna, junto con otras grandes potencias como Estados Unidos. El mundo pronto comprenderá que Francia dominará las estrellas como estaba destinado."
 FRA_the_french_navy: "Reformar prácticas navales francesas"
 FRA_the_french_navy_desc: "La flota naval francesa ha sido una de las pocas que ha resistido el paso del tiempo, pero aun así necesita urgentemente una reforma. Nuestro orgullo, el De Gualle, ha sido deficiente en comparación con los portaaviones estadounidenses o británicos de la época. Debemos adaptarnos a los nuevos tiempos o, de lo contrario, la Armada francesa volverá a quedar rezagada, lo que perjudicará gravemente nuestra influencia global."
 FRA_upgrade_our_submarine_fleet: "Modernización de la flota submarina"
 FRA_upgrade_our_submarine_fleet_desc: "Reconociendo el papel crucial que desempeñan los submarinos en la guerra naval moderna, Francia iniciará una notable modernización de su flota de submarinos, desarrollando submarinos avanzados de próxima generación equipados con tecnología punta para mantener unas capacidades submarinas sin igual."
 FRA_develop_our_home_ports: "Ampliar puertos existentes"
 FRA_develop_our_home_ports_desc: "Para satisfacer las necesidades cambiantes de nuestra flota naval y mejorar las capacidades logísticas, Francia emprenderá una iniciativa estratégica para ampliar los puertos existentes, mejorando la infraestructura naval para facilitar los movimientos eficientes de la flota y apoyar las operaciones marítimas sostenidas."
 FRA_conduct_neccesary_improvments: "Juegos de guerra panmediterráneos"
 FRA_conduct_neccesary_improvments_desc: "No hay mejor momento para preparar nuestra flota que ahora, con nuestras políticas mediterraneanas en plena vigencia. Con los crecientes esfuerzos de cooperación de Francia con nuestros aliados mediterráneos, necesitamos ser más proactivos en el fomento de la unidad y una estrecha relación con nuestros contemporáneos. Recientemente, hemos invitado a las flotas italiana, española y griega a realizar ejercicios navales para estimular nuestras flotas y prepararlas para cualquier escenario posible que podamos predecir. Para asegurar nuestro éxito en los mares, es necesario que colaboremos estrechamente con las demás grandes flotas del Mediterráneo."
 FRA_smaller_boat_stuff: "Firme como un rayo"
 FRA_smaller_boat_stuff_desc: "Mantener la estabilidad y la continuidad de nuestras capacidades de defensa es fundamental. Con énfasis en el entrenamiento constante, el mantenimiento del equipo y la preparación operativa en todas las ramas de las fuerzas armadas, Francia busca garantizar una postura de defensa fiable y formidable."
 FRA_begin_the_project_for_the_new_carrier_flagship: "Reemplazar al De Gaulle"
 FRA_begin_the_project_for_the_new_carrier_flagship_desc: "En reconocimiento de la dinámica cambiante de la aviación naval, Francia iniciará el reemplazo del portaaviones Charles de Gaulle. Este ambicioso proyecto busca introducir un portaaviones moderno y versátil, equipado con las últimas tecnologías y capaz de proyectar su poderío a través de los mares, desempeñando un papel fundamental en la protección de los intereses marítimos franceses y su influencia estratégica global."
 FRA_A_Strong_France_is_a_Strong_Europe: "Un Ejército Independiente"
 FRA_A_Strong_France_is_a_Strong_Europe_desc: "Durante demasiado tiempo, la burocracia inútil y la politización de la OTAN han privado a Francia de incontables horas y la eficiencia de sus fuerzas armadas. Ha llegado el momento de que Francia lidere su propio camino hacia la grandeza sin agotar nuestros recursos ni nuestro presupuesto. Francia demostrará no solo a sus vecinos europeos, sino también al mundo entero, que no solo somos autosuficientes, sino también una de las grandes potencias militares del mundo."
 FRA_Through_Europe_we_are_Strong: "En Europa somos fuertes"
 FRA_Through_Europe_we_are_Strong_desc: "Europa siempre ha sido más fuerte unida que desgarrada, con innumerables ejemplos a lo largo de nuestra historia, como la Segunda Guerra Mundial o la guerra al terror. Por ello, es hora de comprender que cuanto más nos separamos, más débiles nos volvemos, mientras que los rusos se vuelven cada vez más inestables e impredecibles. Enviaremos un mensaje no solo a todo el continente, sino a todo el mundo: Europa siempre permanecerá unida, pase lo que pase, durante estos actos de inestabilidad y radicalismo global."
 FRA_Support_a_Pan_European_Military: "Apoyar el mediterranismo"
 FRA_Support_a_Pan_European_Military_desc: "El mar Mediterráneo siempre ha tenido ventajas estratégicas, no solo para nuestra nación, sino también a lo largo de la historia de Europa, con varios grandes imperios y naciones originarios de la región. Los romanos, los macedonios e incluso los cartagineses han controlado el mundo conocido desde el Mediterráneo. Para el éxito de Europa, debemos considerar la importancia estratégica del mar Mediterráneo y de las naciones que compartimos con él, como nuestros aliados españoles, italianos y griegos, apoyándolos en todo lo posible política e incluso económicamente."
 FRA_Support_Western_Mediterrenian_Militaries: "Presupuestos militares cooperativos"
 FRA_Support_Western_Mediterrenian_Militaries_desc: "En nuestro esfuerzo por cooperar más con nuestros aliados europeos, hemos creado una comisión con los británicos, alemanes e italianos para crear un presupuesto eficaz que garantice la máxima eficiencia y eficacia. Con la mayor colaboración con nuestros aliados europeos, es evidente que todos compartimos aspiraciones y objetivos similares. Para que Europa triunfe en esta nueva era, debemos mantenernos unidos ante la incertidumbre y colaborar en todo lo posible."
 FRA_Further_Eurail_Integration: "Integración de Eurail"
 FRA_Further_Eurail_Integration_desc: "Para mejorar la movilidad y la eficacia militar europeas, Francia promoverá una mayor integración de las redes de Eurail. Mejorar la interoperabilidad, la eficiencia logística y la capacidad de despliegue rápido de tropas contribuirá a una infraestructura de defensa europea más ágil y con mayor capacidad de respuesta."
 FRA_Heart_of_the_European_Navy: "Pacto de Unificación Naval Mediterránea"
 FRA_Heart_of_the_European_Navy_desc: "Con el objetivo de fortalecer la seguridad marítima regional, Francia impulsará un Pacto de Unificación Naval con las naciones mediterráneas. Esta iniciativa busca coordinar operaciones navales, intercambio de inteligencia y ejercicios conjuntos, fomentando un frente unido contra las amenazas marítimas en el Mediterráneo."
 FRA_Revive_Latin_Bloc_Militarism: "Pacto de Unificación del Mando Mediterráneo"
 FRA_Revive_Latin_Bloc_Militarism_desc: "Para fortalecer la estabilidad regional, Francia buscará un Pacto de Unificación del Mando con las naciones mediterráneas, armonizando las estructuras de mando militar y facilitando la planificación conjunta para una respuesta rápida ante posibles amenazas en el escenario mediterráneo."
 FRA_Western_Mediterrenian_Mechanization: "Tecnología de mecanización avanzada"
 FRA_Western_Mediterrenian_Mechanization_desc: "La mecanización de la infantería francesa ha sido uno de los cambios más drásticos de nuestro ejército en la era moderna. Para asegurar el éxito de nuestra infantería, seguiremos priorizando los avances en vehículos mecanizados, como nuestros Vehículos Blindados de Transporte de Personal y Vehículos de Combate de Infantería. La forma moderna de guerra, tal como la conocemos, será conquistada por la innovación francesa y los avances tecnológicos."
 FRA_Strengthen_the_SNCF: "Ampliar la SNCF"
 FRA_Strengthen_the_SNCF_desc: "Reconociendo el papel fundamental del transporte en la logística militar, Francia ampliará la Société Nationale des Chemins de fer Français, incrementando la infraestructura ferroviaria, mejorando la conectividad y garantizando la movilización eficiente de tropas y recursos en todo el país."
 FRA_Privatize_the_SNCF: "Privatizar la SNCF"
 FRA_Privatize_the_SNCF_desc: "Para mejorar la eficiencia y la innovación en el transporte ferroviario, Francia impulsará la privatización de la SNCF, introduciendo dinámicas de mercado, fomentando la competencia y mejorando el rendimiento general del sector ferroviario para lograr una red de transporte más ágil y adaptable."
 FRA_Industrialize_the_countryside: "Militarización del campo"
 FRA_Industrialize_the_countryside_desc: "Para fortalecer las capacidades de defensa nacional y mejorar la resiliencia, Francia iniciará un programa de militarización del campo, integrando la presencia militar y la infraestructura en las zonas rurales, garantizando una postura de defensa distribuida y robusta que pueda responder eficazmente a las amenazas en todo el territorio nacional."
 FRA_Create_Independent_Military_Strategies: "Estrategias militares independientes"
 FRA_Create_Independent_Military_Strategies_desc: "Con nuestro reciente intento de separar nuestras Fuerzas Armadas del mando integrado de la OTAN, debemos trabajar en la innovación de nuevas estrategias para que nuestras Fuerzas Armadas operen por sí solas, sin la ayuda de nuestros aliados europeos. Francia volverá a estar al mando de nuestras Fuerzas Armadas y demostrará al resto de Europa que estamos mejor sin ellas y que somos aún más capaces de no vernos abrumados por su mando militar incoherente."
 FRA_A_New_Age_of_Heavy_Tanks: "Modernizar tanques pesados"
 FRA_A_New_Age_of_Heavy_Tanks_desc: "Para mantener la superioridad blindada, Francia emprenderá un programa integral de modernización de tanques pesados, modernizando las flotas de tanques existentes con tecnología avanzada para garantizar que se mantengan a la vanguardia de las capacidades de guerra blindada."
 FRA_Deploy_Moving_Castles: "Nacen los \"Châteaux Itinérants\""
 FRA_Deploy_Moving_Castles_desc: "Al introducir un concepto revolucionario en defensa móvil, Francia presenciará el desarrollo de unidades altamente móviles y fuertemente blindadas, capaces de un despliegue rápido y una respuesta eficaz ante escenarios dinámicos del campo de batalla."
 FRA_Independence_from_the_Eurail: "Independencia de Eurail"
 FRA_Independence_from_the_Eurail_desc: "Para garantizar la libertad de movimiento y la independencia logística, Francia trabajará para reducir la dependencia de las redes de Eurail para el transporte militar, desarrollar métodos de transporte alternativos, mejorar la movilidad estratégica y fortalecer nuestra capacidad para operaciones militares independientes."
 FRA_Expand_Domestic_Capabilities: "Impulsar empresas armamentísticas"
 FRA_Expand_Domestic_Capabilities_desc: "Grupo Thales, PGM, MBDA y Renault son fabricantes de armas de larga trayectoria que han ayudado a abastecer a las Fuerzas Armadas Francesas durante décadas, desde la posguerra. Ahora depende de nuestro gobierno que cumpla con su parte y promueva que nuestras fuerzas armadas adquieran equipo y armas para nuestros productos nacionales y dejen de depender excesivamente del material internacional."
 FRA_Rejuvinate_Recruitment_Centers: "Renovar centros de reclutamiento"
 FRA_Rejuvinate_Recruitment_Centers_desc: "Para mantener una fuerza militar capacitada y motivada, Francia renovará los centros de reclutamiento, modernizando los procesos de reclutamiento, mejorando la difusión y ofreciendo incentivos para atraer a los mejores talentos a las fuerzas armadas."
 FRA_Research_and_Development: "Aumentar inversión en I+D militar"
 FRA_Research_and_Development_desc: "Reconociendo la importancia de la superioridad tecnológica, Francia incrementará significativamente la inversión en investigación y desarrollo militar, impulsando la innovación, fomentando la creación de tecnologías de defensa de vanguardia y garantizando que nuestras fuerzas armadas se mantengan a la vanguardia de las capacidades militares."
 FRA_Second_times_a_Charm: "En nombre del pueblo"
 FRA_Second_times_a_Charm_desc: "Hemos ganado la candidatura a la presidencia, Marine Le Pen está al frente de Francia. Un mensaje contundente para el Renacimiento Liberal y la Unión Europea. Fuimos elegidos en nombre del pueblo para cumplir un mandato. Un mandato muy importante: entregar al pueblo una Francia ordenada, poderosa y equilibrada. Restaurar las tradiciones francesas y restringir las políticas de puertas abiertas de Macron y sus aliados. Ejecutaremos este mandato para Francia, moderaremos a nuestros radicales y haremos que Francia vuelva a ser segura, fuerte y orgullosa."
 FRA_Fight_Party_Radicals: "Combatir el radicalismo"
 FRA_Fight_Party_Radicals_desc: "Algunos elementos de la Agrupación Nacional siguen siendo, en gran medida, remanentes de la camarilla del Padre; antes de la era de Marine, estuvo la era de Jean-Marie, su padre. La Agrupación Nacional era realmente entonces lo que los críticos de hoy afirman que es ahora, pero algunos miembros de la Agrupación Nacional no reconocen que son reliquias de un pasado que debe olvidarse. Marine Le Pen ha ampliado los horizontes del partido y lo ha encaminado hacia un nuevo futuro, y quienes siguen más de cerca a la Agrupación Nacional de los años 80 deben ser marginados y obligados a retirarse. Nunca nos disculparemos por nuestro pasado, pero debemos mirar hacia el futuro."
 FRA_Protect_French_Interests: "Realpolitik americana"
 FRA_Protect_French_Interests_desc: "Estados Unidos siempre ha tenido una política destacada en sus momentos más duros: hablar con firmeza y portar un garrote. Francia se encuentra en un continente de rivales ideológicos empeñados en destruir su propio orgullo nacional e imponernos la misma destrucción. Para consolidarnos en el mundo, la pequeña parte de la UE que somos, debemos tener una gran presencia y hablar con mucha firmeza. En África, en Europa y más allá, debemos hacernos notar y dejar claro que la Francia del futuro está destinada a ser como la Francia del pasado, fuerte e influyente a escala mundial. No seremos relegados a ser el segundo violín de Alemania en alguna federación europea; ¡seremos un estado fuerte y soberano!"
 FRA_National_Unity_Government: "Proclamar un Gobierno de Unidad Nacional"
 FRA_National_Unity_Government_desc: "Que nos opongamos políticamente no significa que no podamos todos buscar la prosperidad de Francia. Los liberales pueden ser útiles por sus conexiones comerciales; los socialistas, al menos, dicen que se preocupan por el pueblo. ¡No hay razón para que no podamos invitar a la oposición a unirse a nosotros! Francia es más fuerte unida que dividida; esto aplica a cualquier nación, en realidad a cualquier cosa. Un Gobierno de Unidad Nacional tras la pandemia, la crisis del petróleo y el colapso de Estados Unidos es el mejor momento para que Francia aúne sus esfuerzos políticos en pos de la prosperidad y el desarrollo. ¿Quién se opondría? Solo un ideólogo traidor, alguien que es un hombre de partido antes que francés."
 FRA_Law_and_Order: "Políticas \"Ley y Orden\""
 FRA_Law_and_Order_desc: "Una imagen cae sobre el escritorio frente a Le Pen, deslizándose de una carpeta manila. Un infierno en llamas en primer plano del Arco del Triunfo, un coche volcado y quemado, manifestantes de negro con chalecos amarillos vitorean y, si se fijan bien, una bomba incendiaria sale volando de la cámara hacia una línea policía. A Le Pen siempre le disgustó la violencia de los manifestantes. Están del lado del trabajador, pero queman su coche y destrozan su lugar de trabajo, como animales. Basta de tonterías. Los escuchamos antes de que empezaran a quemar vivos a nuestros policías; en los próximos días redactaremos una legislación que algunos consideran draconiana, pero ¿para nosotros? ¿Para Le Pen? ¿Para el pobre diablo que era dueño de ese coche? Esto es razonable y debería haber sido hace tiempo para poner fin a los millones de dólares en daños a la propiedad pública y privada de los que son responsables estos vándalos."
 FRA_Set_Immigration_Limit: "Francia primero"
 FRA_Set_Immigration_Limit_desc: "La OTAN y la Unión Europea son bienes preciados, pero nada debería ser ni es más valioso que la patria. Francia no puede ser superada por los intereses internacionales; las empresas francesas no pueden perder en suelo francés ante negocios extranjeros. Francia ya es la fuerza armada más poderosa de Europa, y sin embargo, aún no somos suficientes; nos fortaleceremos. Nuestras fuerzas y nuestra economía crecerán. Europa no podrá esperar rescates ni vehículos franceses; dejemos que Alemania venda su flota de tanques en el extranjero; conservaremos nuestros Leclercs y duplicaremos su número. Francia, sobre todo, debe estar preparada económica, militar y mentalmente. Si no estamos preparados, ninguna parte de Europa lo estará, con seguridad. En estos tiempos, debemos asumir el papel de pastor mientras EE.UU. se desmorona."
 FRA_France_First: "Francia primero"
 FRA_France_First_desc: "La OTAN y la Unión Europea son bienes preciados, pero nada debería ser ni es más valioso que la patria. Francia no puede ser superada por los intereses internacionales; las empresas francesas no pueden perder en suelo francés ante negocios extranjeros. Francia ya es la fuerza armada más poderosa de Europa, y sin embargo, aún no somos suficientes; nos fortaleceremos. Nuestras fuerzas y nuestra economía crecerán. Europa no podrá esperar rescates ni vehículos franceses; dejemos que Alemania venda su flota de tanques en el extranjero; conservaremos nuestros Leclercs y duplicaremos su número. Francia, sobre todo, debe estar preparada económica, militar y mentalmente. Si no estamos preparados, ninguna parte de Europa lo estará, con seguridad. En estos tiempos, debemos asumir el papel de pastor mientras EE.UU. se desmorona."
 FRA_The_Peoples_Victory: "La Victoria del Pueblo"
 FRA_The_Peoples_Victory_desc: "Aunque inesperada y una sorpresa para muchos, la NFP ha conseguido su victoria en las elecciones francesas de 2022, tras una serie de acontecimientos que nos pusieron en el punto de mira. Si bien hemos ganado, todavía no podemos celebrar la victoria. El ejército está en nuestra contra, y a [FRA.GetLeader] le resultará increíblemente difícil impulsar nuestras agendas en un entorno hostil y desconocido."
 FRA_Demand_Military_Loyalty: "Lidiar con los militares"
 FRA_Demand_Military_Loyalty_desc: "Aunque oficialmente no están afiliados al gobierno francés, nuestros militares tienen una fuerte influencia en la política de la República. Además, luchan activamente contra nosotros incluso después de nuestra victoria democrática, considerándonos una amenaza para su oligopolio sobre la República Francesa. Hay que acabar con ellos, y con rapidez."
 FRA_Unite_the_Left: "Unir el Frente"
 FRA_Unite_the_Left_desc: "Si bien en teoría somos un frente unido, formamos una amplia coalición de varios izquierdistas, todos con un acuerdo fundamental. Incluso tras la elección de [FRA.GetLeader] como presidente, nuestra coalición sigue siendo débil y frágil. Para impulsar el avance de la izquierda, debemos consolidar el NFP como una auténtica alianza entre partidos, no como un simple bloque para ganar las elecciones."
 FRA_Empower_the_Young_Jacobins: "[FRA_Empower_the_Young_Jacobins_loc]"
 FRA_Empower_the_Young_Jacobins_desc: "Al ver nuestros éxitos, es natural que el socialismo se extienda por toda Europa. La Revolución Democrática no se verá obligada a quedarse en Francia; exportaremos la felicidad y la prosperidad de nuestro pueblo a todas partes, a toda la Unión Europea, ya sea a nivel nacional o en el Parlamento Europeo, para el bien de todos."
 FRA_Empower_the_Young_Jacobins_melenchon: "Auge del Socialismo Europeo"
 FRA_Empower_the_Young_Jacobins_faure: "Unir la socialdemocracia europea"
 FRA_Empower_the_Young_Jacobins_ruffin: "Nuestros camaradas europeos"
 FRA_Referendum_on_a_New_Constitution: "Referendo sobre la Sexta República"
 FRA_Referendum_on_a_New_Constitution_desc: "Como se vio durante el reinado de Macron, la tendencia monárquica y la centralización de la Quinta República representaron un grave retroceso para los principios democráticos de nuestra nación, acercándonos a tiempos anteriores a la revolución que nos convirtió en un bastión de la democracia. Naturalmente, la Sexta República debe ser creada por y para el pueblo, algo que este desea y anhela de Francia. ¡Viva la Sexta República!"
 FRA_Expand_the_Welfare_State: "Expandir el Estado del bienestar"
 FRA_Expand_the_Welfare_State_desc: "Si bien se han logrado grandes avances en este sector desde tiempos pasados, no es suficiente. El Estado debe existir para servir a la gente, no solo para brindarles prestaciones. El Programa de Bienestar para todos debe ser parte integral de la República Francesa, no un mero factor cambiante dentro de ella."
 FRA_A_True_Commander_in_Chief: "Un verdadero comandante en jefe"
 FRA_A_True_Commander_in_Chief_desc: "Pierre De Villers, un auténtico Comandante a la altura del cargo. Su larga e ilustre carrera en las Fuerzas Armadas Francesas se vio empañada cuando Macron lo despidió como Ministro de Defensa. Sin embargo, fue destituido por motivos políticos; nosotros, el pueblo, aún admiramos a Villers como un comandante respetado y muchos otros generales lo buscan en busca de orientación. Un líder de su calibre no se ha presentado desde De Gaulle. ¡Tres hurras por el presidente!"
 FRA_Rehabilitate_Reconquete: "Rehabilitar a Reconquête"
 FRA_Rehabilitate_Reconquete_desc: "Zemmour y sus ultraconservadores son, a todos los efectos, patriotas de pies a cabeza. Un partido antiinmigración liderado por un inmigrante judío argelino de segunda generación, su papel en el movimiento de ultraderecha siempre fue recibido con confusión por sus oponentes y con una extraña bienvenida por parte de sus compatriotas. Jean Marie Le Pen dijo una vez que, si bien los franceses a menudo lo maldicen, los judíos han sido muy amables. Devolvamos esa gratitud a Zemmour; la Agrupación Nacional lo recibirá con los brazos abiertos y buscaremos trabajar juntos en coalición para enfrentar a quienes quieren debilitar a Francia."
 FRA_Cement_Military_Control: "Consolidar el control militar"
 FRA_Cement_Military_Control_desc: "Es bien sabido la gran influencia que han tenido las fuerzas armadas en Francia. Bajo la dirección de De Gaulle, el ejército se mantiene como una fuerza moderadora, similar al ejército turco, defendiendo ciertos ideales en el Estado y manteniendo a la nación en un rumbo determinado. ¿Bajo De Villers? Esto se consolidará.\n\nEl papel de las fuerzas armadas como fuerza moderadora es un derecho sagrado, ganado en la batalla para restaurar una República debilitada por Daladier y el Frente Popular que lo precedió. Fue De Gaulle quien luchó por liberar a Francia y apuntalar la resistencia mientras el Gobierno civil se encontraba en el exilio; no podemos olvidarlo."
 FRA_A_New_Aristocracy: "Una nueva aristocracia"
 FRA_A_New_Aristocracy_desc: "El dinero manda y la experiencia triunfa. La actual clase alta francesa está tan preocupada por la justicia social que olvida que el ejército es la principal forma de combatir la injusticia en cualquier lugar. Olvida que la única manera de conseguir comida es simplificar los negocios, no regular cada pequeño negocio familiar que lucha por sobrevivir. Necesitamos una nueva inteligencia y una nueva clase alta, compuesta por militares y gente con mentalidad empresarial. Francia necesita generar dinero y empleos porque el empleo significa estabilidad, la estabilidad significa hijos, y los hijos significan un futuro seguro. Una aristocracia que priorice la fortaleza futura de Francia busca el beneficio a largo plazo."
 FRA_Play_into_Napoleonic_Overtones: "Connotaciones napoleónicas"
 FRA_Play_into_Napoleonic_Overtones_desc: "En Francia, un líder militar siempre será comparado con Napoleón; nunca hubo un líder militar más famoso que el. Un nacionalista hablará de esa época como el verdadero nacimiento de la nación francesa; un republicano ni siquiera puede negar el progreso alcanzado durante su gobierno. En Francia, el gobierno militar no siempre se considera algo malo. De Gaulle nos encaminó de nuevo hacia el futuro y, una vez más, De Villers recibe la misión de guiar a Francia en una época de desunión política, debilidad militar y degradación nacional. Al igual que Napoleón antes que nosotros, Francia entra en una nueva era y no podríamos tener un mejor timonel para la tormenta que se avecina."
 FRA_Birth_of_a_French_Military_Industrial_Complex: "Un complejo militar-industrial francés"
 FRA_Birth_of_a_French_Military_Industrial_Complex_desc: "¿Por qué Alemania y Estados Unidos deberían ser los únicos con grandes fabricantes de armas? Raytheon, Rhinemetall, H&K, estas empresas tienen prácticamente garantizados contratos gubernamentales de sus países de origen, y nuestro gobierno ha tardado en adoptar un sistema similar, desmantelando el sistema de dirigismo de De Gaulle. Debemos volver a la industria estatal en el sector militar; el libre mercado ya no basta en una época en la que los gigantes nos acosan como si fuéramos cadáveres en descomposición, un festín para los buitres orientales que antes manteníamos encerrados en una jaula."
 FRA_The_French_Reagan_Category: "El Gran Estratega"
 FRA_The_French_Reagan_Category_desc: "\n\n\n\n\n£GFX_FRA_great_strategist_cat\n\n\n\n\n\n\n\nCon Pierre de Villiers al frente de Francia, se abre una era transformadora, caracterizada por reformas estratégicas que prometen transformar el panorama militar y político del país. El ambiente se llena de expectación mientras De Villiers presenta una visión destinada a mejorar la eficiencia militar y reforzar la seguridad nacional, infundiendo orgullo en cada ciudadano.\n\nCon cada reforma, el ejército se transforma en una fuerza más formidable, adaptándose a los desafíos contemporáneos a la vez que garantiza la seguridad y la prosperidad del pueblo francés. De Villiers prioriza la reestructuración de los presupuestos de defensa, la implementación de programas de entrenamiento innovadores y el fortalecimiento de los vínculos con la industria de defensa. El objetivo es claro: crear un ejército que no solo proteja a la nación, sino que también encarne el espíritu de resiliencia y fuerza que define a Francia."
 FRA_Calm_Militarists_decision: "Calmar retórica militarista"
 FRA_Correct_the_Trickle_Down_system_decision: "Corregir el efecto derrame"
 FRA_Coordinate_a_March_decision: "Coordinar una muestra de fuerza"
 FRA_A_Unified_General_Staff_decision: "Unificar el Estado Mayor"
 FRA_Perfection_of_Strategy_decision: "Perfeccionar la estrategia"
 FRA_Utilize_Zemmour_decision: "Utilizar a Zemmour"
 FRA_Play_into_ultraconservativism_decision: "Entretener a los ultraconservadores"
 FRA_Promote_Nationalist_Education_villiers: "Promover educación nacionalista"
 FRA_Remove_the_French_Cancer: "Diseccionar a la izquierda"
 FRA_Soviet_Fearmongering_villiers: "La Amenaza Rusa"
 FRA_All_Hands_on_Deck_villiers: "Todo por el Estado"
 FRA_Mass_Militarization: "Militarizaciones masivas"
 FRA_A_French_Renessiance: "Triunfo del Pueblo"
 FRA_A_French_Renessiance_desc: "La nación francesa se regocija al ver que el pueblo ha decidido que los valores democráticos prevalecerán una vez más sobre la ultraderecha. Tras el fin de las elecciones, el Gobierno se ha propuesto recuperar la buena voluntad del pueblo implementando reformas para restaurar un nuevo sentido de unidad y orgullo nacional en toda la nación. La voz del pueblo ha sido escuchada y ahora debemos actuar para lograr una Francia para todos."
 FRA_Entrench_Centrism: "Afianzar el centrismo"
 FRA_Entrench_Centrism_desc: "Con la ajustada participación electoral, se hace evidente que para que nuestras reformas no solo se aprueben, sino que se implementen a largo plazo, debemos inculcar nuestras creencias y valores en el corazón de la política francesa. Para lograrlo, hemos comenzado a contactar con la oposición para iniciar un diálogo y una cooperación activa en reformas que beneficien al pueblo francés. Con este enfoque centrista en nuestras políticas y reformas, podremos llegar mejor a la nación y, con suerte, evitar que se repita la división política causada por los últimos años de este gobierno y las elecciones."
 FRA_Uphold_European_Values: "Mantener valores europeos"
 FRA_Uphold_European_Values_desc: "A diferencia de nuestra oposición, mantenemos un firme compromiso con los valores que la Unión Europea establece para las naciones de todo el continente. Dedicamos todos los recursos posibles a defender los valores fundamentales de la Unión Europea mediante la democracia, la cooperación y la comunicación. Nos aseguraremos de que Europa se mantenga fuerte mediante la colaboración económica y abogaremos por políticas compartidas para proteger nuestros ideales. Una Europa unida, con Francia promoviendo los mensajes y valores de la Unión Europea, perdurará mucho después de que termine nuestro mandato."
 FRA_Work_with_our_Opposition: "Colaborar con la oposición"
 FRA_Work_with_our_Opposition_desc: "Para asegurar la perdurabilidad de nuestro progreso y nuestro gobierno, es evidente la urgente necesidad de cooperación entre nuestro partido y la oposición. Se han mantenido varias conversaciones y negociaciones, y ahora los conservadores y nuestro gobierno liberal están comenzando, en un esfuerzo por asegurar el bipartidismo y la cooperación, mientras avanzamos hacia una Francia fuerte ante la agresión rusa y la inestabilidad global."
 FRA_Expand_our_Mediterranean_Influence: "Influencia mediterránea"
 FRA_Expand_our_Mediterranean_Influence_desc: "El mar Mediterráneo siempre ha tenido una gran importancia para el continente europeo y para Francia como nación. Para expandir nuestra influencia y presencia global, a la luz de los recientes acontecimientos, adquiriremos la isla de Malta, impulsando su capacidad económica y compartiendo su cultura con Francia, a la vez que garantizamos la seguridad de la isla. Esta aclimatación traerá grandes beneficios tanto a Francia como a los habitantes de Malta en los próximos años."
 FRA_Push_for_EU_Reform: "Impulsar reformas a la UE"
 FRA_Push_for_EU_Reform_desc: "Tras el fin de la debacle política en Francia, ahora conocemos los peligros de la inestabilidad y la radicalización. Impulsaremos a la Unión Europea para que implemente reformas drásticas que eviten en el resto del continente lo que ha sucedido en Francia. Fortalecer la Unión Europea durante estos tiempos difíciles beneficiará no solo a los ciudadanos de Europa, sino también a los de todo el mundo, al plantar cara al extremismo y al odio. Francia debe demostrar a Europa su éxito en sus recientes luchas y garantizar que Europa sea un espacio de progreso y reforma."
 FRA_Godlike_posturing_flag: "Macron se está comparando con otra deidad."
 FRA_A_French_Conquest: "La Reconquista"
 FRA_A_French_Conquest_desc: "Reconquête ha triunfado, nuestros benefactores militares se han asegurado de ello. Zemmour ocupa el cargo más alto de Francia y, con la Agrupación Nacional en nuestra coalición, comenzaremos nuestra gran Reconquista de Francia. Debemos actuar con rapidez antes de que los elementos disidentes intenten detenernos. Un cruzado no llega a ninguna parte observando, la acción es su amiga, la armadura pesa cuando uno está quieto."
 FRA_Halt_Immigration: "Frenar la inmigración"
 FRA_Halt_Immigration_desc: "Los inmigrantes africanos han inundado nuestra nación en masa, mientras sus Gobiernos nos expulsan de nuestras bases en la región. Luchamos para darles hogares estables, ¿y ahora ni siquiera los quieren? Qué lástima. ¡Francia no envió tropas para resolver sus problemas solo para que pudieran inundar Francia, regresar a sus hogares y mejorarlos! ¡No necesitamos su trabajo! ¡Nuestra gente se empobrece mientras ustedes inflan el mercado laboral no cualificado! Sus hogares necesitan trabajo; ustedes, los argelinos, nos expulsaron hace medio siglo; ¡no esperen que les demos limosnas ahora!\n\nNo más inmigración, leyes más estrictas y una flota de barcos de alquiler; resolveremos esto en poco tiempo. Algunos pedirán clemencia; el presidente Zemmour es judío argelino, por supuesto, de ascendencia, pero sus padres supieron adaptarse, y él mismo ha hecho lo mismo, un inmigrante modelo a diferencia de los millones de vándalos que hay hoy en Europa."
 FRA_Administration_Simplification: "Simplificación administrativa"
 FRA_Administration_Simplification_desc: "Francia se ha vuelto una nación muy burocrática, con una estructura tan bizantina que es imposible comprender plenamente sus maquinaciones internas sin un curso exhaustivo de varias semanas. La enorme cantidad de decretos regulatorios franceses requirió cinco semanas de investigación por parte de un equipo entero para identificar lo que vale la pena y lo que no. Sin mencionar las miles de regulaciones de la UE y otras normativas relacionadas, impuestas innecesariamente, que hacen que el ciudadano medio tenga que arrancarse los pelos para lograr cualquier cosa, al igual que los políticos. Claro que la Presidencia ya es poderosa, pero podemos simplificar las cosas y facilitar su uso."
 FRA_Rabid_Assimilation: "Inspirarnos en Quebec"
 FRA_Rabid_Assimilation_desc: "Quebec aprobó recientemente leyes estrictas ante la caída de la prevalencia del francés en su región. Había ido disminuyendo constantemente, pero los habitantes de Montreal finalmente decidieron que ya era suficiente y redujeron la migración anual total a tan solo 50.000. No se permite que más del 25% de los solicitantes pertenezcan a una misma nacionalidad y se exige la integración social para permanecer de forma permanente. La legislación limita la inmigración anual a un pequeño porcentaje de la población total y obliga a los grupos extranjeros a ser diversos, evitando la creación de minorías cohesionadas, a la vez que no solo fomenta, sino que exige la alfabetización en francés como condición para la residencia a largo plazo. Aquí en Francia, con algunos ajustes, podemos aprovechar esto en nuestro beneficio. Aprender de nuestra antigua colonia es nuevo para nosotros; normalmente, Gran Bretaña es la única que aprende de ella."
 FRA_Put_France_Before_Europe: "Francia antes que Europa"
 FRA_Put_France_Before_Europe_desc: "Sería erróneo decir que la Unión Europea y la OTAN son un completo obstáculo para nosotros. Francia se ha beneficiado de este acuerdo durante muchos años y, de hecho, fue uno de los fundadores de la UE. Pero no podemos hacer lo mismo, priorizando la prosperidad extranjera sobre la nuestra. Planificar nuestras acciones económicas para beneficio de toda Europa en lugar de solo nuestro, ¿no somos una nación como ellos? ¿No podemos planificar nuestra propia economía y ellos la suya? ¿Qué derecho tenemos a imponer regulaciones y qué derecho tienen ellos, especialmente, a imponérnoslas? Que sean grandes por sí solos, y si fracasan sin nuestra ayuda, ese es el destino, y el destino no se puede eludir, solo retrasar."
 FRA_Reverse_Declinism: "Revertir el declinismo"
 FRA_Reverse_Declinism_desc: "Francia ha estado en constante decadencia desde 1970. La Generación Liberal del 68, como la llama Zemmour, condujo a Francia por un camino de suicidio nacional, donde el orgullo nacional se derrumbó y las fronteras se abrieron a cualquiera que quisiera entrar. Hemos visto el declive de Francia durante cincuenta años, y durante cincuenta años Zemmour ha trabajado en Francia contra el creciente crecimiento de grupos extranjeros y, especialmente, la plaga islámica dentro de nuestras fronteras desde la época de Jean Marie Le Pen, y ahora finalmente se ve recompensado por su dedicación.\n\nEl propio Zemmour puede extender la mano y estrangular las vides que durante tanto tiempo han impedido que Francia se adentrara en el siglo XXI como un león: la inmigración masiva, el aumento del gasto, la creciente sensación de abandono de nuestra nacionalidad por una especie de superestado europeo dominado por Alemania. Basta de esto. La Tradición será el timón del Estado, la razón y la lógica se antepondrán firmemente a los sentimientos de los corazones sensibles."
 FRA_Recoup_our_Losses: "Recuperar nuestras pérdidas"
 FRA_Recoup_our_Losses_desc: "El Gobierno de Macron sobre Francia fue un desastre de un solo mandato. En tan solo cinco años, pasó de ser abierto, sonriente y carismático a intentar convertirse en su \"ideal jupiteriano\", el ideal del presidente como autoridad suprema. Si hubiera sido cualquier otra persona, tal vez se habría logrado. Renaissance estuvo a punto de conseguir una cómoda mayoría en el Parlamento, pero simplemente no estaba destinado a serlo."
 FRA_Embrace_the_New_Left: "Abrazar la Nueva Izquierda"
 FRA_Embrace_the_New_Left_desc: "Renaissance constituyó en su día un tercio del eje político, un polo opuesto entre la derecha y la izquierda populistas, pero no sobrevivirá sin amigos. Los esfuerzos de Mélenchon por impulsar a la izquierda hacia la era moderna han dado sus frutos, y la única manera de contrarrestar a Le Pen es trabajando juntos y manteniendo la disciplina en nuestro propio partido. Mélenchon puede ser un adversario, pero comparte muchas políticas e intereses con nosotros. Una coalición contra Le Pen nos beneficiará a ambos en los próximos años."
 FRA_Battle_Every_Legislation: "Combatir su legislación"
 FRA_Battle_Every_Legislation_desc: "Ils ne passeront pas. No pasarán. Una frase a menudo asociada con la batalla de Verdún. Hoy, en un círculo con la izquierda francesa, miramos a Le Pen y decimos: \"No pasarán\", una vez más. La Agrupación Nacional recortará todo lo que hemos logrado, todo el progreso que el centro y la izquierda han logrado en favor de los derechos de los trabajadores y la justicia social. Cada nueva legislación es un ataque a la labor de nuestros predecesores durante décadas, en una lucha que se ha prolongado durante cuatro décadas contra el lento crecimiento del poder de la derecha."
 FRA_Investigate_Electoral_Integrity: "Investigar integridad electoral"
 FRA_Investigate_Electoral_Integrity_desc: "Esperábamos pérdidas debido a la crisis del petróleo y al COVID-19, pero las encuestas indicaban una victoria por varios puntos. Algo huele mal en París y comenzaremos las acciones necesarias a nivel nacional, nacional y local, utilizando al máximo el poder judicial para investigar el fraude de la Agrupación Nacional. Dirán que no es real y que se trata de una caza de brujas, pero, real o falsa, estas investigaciones dividirán la opinión pública y restarán apoyo a Le Pen y sus lacayos. Si simplemente insistimos lo suficiente en las acusaciones, se convertirán en un hecho ante la opinión pública. Solo se necesita sembrar la duda."
 FRA_Take_A_Stance_on_Federalization: "Postura ante la federalización"
 FRA_Take_A_Stance_on_Federalization_desc: "Macron fue uno de los defensores más acérrimos de la federalización europea, proponiendo un ejército integrado y una mayor integración del derecho, la economía e incluso la policía. Podemos optar por seguir esta línea eligiendo los socios de coalición adecuados, o podemos oponernos a ella. Es cierto que la victoria de Le Pen muestra un cambio en la política; volvernos euroescépticos podría beneficiarnos en las encuestas. Anteponer la República a nuestros vecinos es sin duda una decisión popular; Macron nunca lo vio, pero incluso si podemos aceptarla como una postura popular, no tenemos por qué renunciar a Europa. Podemos seguir siendo pro-UE si así lo deseamos. Realmente nos encontramos en una encrucijada entre dos caminos: un futuro europeo o uno francés; la decisión es nuestra."
 FRA_Uphold_Republican_Beliefs: "Mantener ideales republicanos"
 FRA_Uphold_Republican_Beliefs_desc: "Libertad, igualdad, fraternidad. Los cimientos de nuestra gran República; a través de cinco repúblicas, dos reinos y dos Imperios, no hemos perdido estos ideales. Pero podríamos perderlos con el tiempo si no los salvaguardamos. Dentro de nuestras propias filas se esconde la insidiosa camarilla de tradicionalistas y conservadores, apenas dos escalones por encima del Borbón. La Revolución es algo que debe defenderse y nadie lo sabe mejor que los franceses; Dios sabe que hemos sentido su ira en los chalecos amarillos más de una vez.\n\nOponerse a Le Pen es tan simple como señalar sus políticas como antirrepublicanas. Nuestros ideales más básicos, basados en el igualitarismo y la libertad, exigen que ella confine a los manifestantes y priorice a los franceses por encima de todo, incluso si eso significa alienar a las minorías. La República Francesa nunca se fundó sobre los ideales de un nacionalismo insaciable y una xenofobia desenfrenada; en nuestros primeros días incluso tratamos de separarnos de la Iglesia, y si bien esa plataforma no fue tan popular, no significa que debamos destruir las obras de 1793 para crear una sociedad nueva, castrada, segura pero demasiado temerosa de criticar al gobierno."
 FRA_A_Denied_Destiny: "Nuestro destino negado"
 FRA_A_Denied_Destiny_desc: "Le Pen fracasó, su reformismo nos hizo perder las elecciones. Nunca fuimos populares por ser moderados de centroderecha, ¡éramos el partido de la acción y la fuerza! La dimisión de Le Pen es lo mejor que ha hecho en muchos años. El partido ahora está bajo la dirección de Bardella; el statu quo liberal de Macron y sus compinches jupiterianos nos negó un mandato popular. Él no es De Gaulle, no es un hombre misterioso en un castillo de marfil, es un chacal risueño al servicio de Bruselas, y no nos quedaremos de brazos cruzados. Macron nos verá desentrañar su preciosa red de empresarios y militares aduladores; sus aliados se retirarán por miedo."
 FRA_Reintegrate_Radical_Forces: "Reintegrar a radicales"
 FRA_Reintegrate_Radical_Forces_desc: "Fueron las reformas de la Agrupación Nacional las que provocaron la fragmentación de la derecha, los Identitarios, la Reconquête de Zemmour. Si nos hubiéramos unido en las últimas elecciones, habríamos obtenido la mayoría. Con Bardella al mando, el partido del Padre ha vuelto y el partido de la Hija ha muerto. Los radicales volverán a nuestro abrazo y juntos, en solidaridad, nos mantendremos firmes y seremos escuchados. ¡Vive la France!"
 FRA_Meet_with_Disgraced_Militarists: "Encontrarse con los Militaristas Deshonrados"
 FRA_Meet_with_Disgraced_Militarists_desc: "El ejército se inspiró en Martín Lutero antes de las últimas elecciones, clavando sus demandas en las puertas del Gobierno por toda París. Las unidades militares se movieron hacia la periferia. Macron y el país sintieron la amenaza de un posible golpe de Estado, aunque en realidad solo era una forma de presión. Macron se mantuvo firme y no cedió ante las exigencias militares. Le Pen ofreció su apoyo simbólico, pero al final no logró conseguir la victoria. El ejército está preocupado por el triunfo de Renacimiento y el continuo debilitamiento de las fuerzas armadas francesas, mientras que los orcos brutistas están reuniendo a sus hombres en el este, listos para aplastar a Occidente en el caos que ha dejado la crisis en EE.UU. Bardella y el ejército comparten una voluntad similar: la determinación de llevar a cabo actos extralegales para asegurar el futuro de Francia. Podemos prometer cumplir con sus demandas, y mucho más."
 FRA_Entangle_Electoral_Victory: "Sabotear académicos liberales"
 FRA_Entangle_Electoral_Victory_desc: "Las élites liberales dominan hoy por una razón: controlan la educación. Como lo hicieron los marxistas hace tiempo, en la gloria del Frente Popular. Si controlas la escuela, controlas a los alumnos y les enseñas lo que está bien y lo que está mal, les enseñas a callar o a gritar, los diriges contra quien quieres reprimir y ellos hacen el resto: crían a sus hijos con el mismo adoctrinamiento, y a sus hijos, y así sucesivamente. La élite académica francesa está compuesta por globalistas de izquierda corruptos y depredadores, indiferentes al bienestar de Francia y su gente ante los intereses de algún pueblo tombuctú al otro lado del planeta. ¿Cuántos fueron asesinados? ¿Cuántos negocios y vidas arruinadas? ¿En las protestas que su educación ha incitado? Basta, interrumpamos sus actividades como podamos, enviemos hombres enmascarados por la noche para maltratarlos en sus casas, llamemos con amenazas de bomba y culpemos de todo a agitadores rusos y revolucionarios de izquierda. Llevaremos los disturbios que incitan a sus casas y se quedarán en silencio. Incluso podrían unirse a nosotros por miedo."
 FRA_The_Right_Way: "El camino correcto"
 FRA_The_Right_Way_desc: "El camino derecho es el camino correcto. ¿Qué trae la izquierda? ¿Inflación? ¿Impuestos más altos? ¿Más bienestar por menos beneficios mientras hordas de musulmanes se llevan el producto de tu trabajo? Renaissance se baja los pantalones ante Bruselas y, si tuviera la oportunidad, vendería a toda la nación por una verdadera oportunidad de federalizar Europa. La caída de Francia no es solo una teoría de la conspiración, es una política de campaña y un objetivo estratégico a largo plazo de los liberales. Solo Bardella y la Agrupación Nacional pueden liberar a Francia de la agenda izquierdista; solo la Agrupación Nacional puede bajar tus impuestos, poner beneficios en tu bolsillo y enviar a los moros a ahogarse en la balsa en la que llegaron flotando. Vota por tu representante local de la Agrupación Nacional y pregunta en tu sección local cómo puedes ofrecerte como voluntario para ayudar al partido. Si estás aquí por nuestro brazo armado, baja la voz y sígueme."
 FRA_Stoke_Russian_Fears: "Temores de dominación rusa"
 FRA_Stoke_Russian_Fears_desc: "¡Los rusos siempre han sido enemigos de Europa! ¡Traicioneros! ¡Eslavos! Apenas mejores que una horda mongol. El Imperio Atrasado nos falló, hicieron tratos con Alemania y en menos de 20 años se hicieron amigos de los alemanes mientras nos sonreían. La Conferencia de Yalta bien pudo haber sido papel mojado para el perro georgiano. La última vez que se cumplió un acuerdo con los rusos es anterior a la historia escrita, porque no tenemos constancia de ello. ¿Crees que cumplirán sus acuerdos ahora? Eres un tonto, un bot ruso o un zurdo impío nostálgico de tu patria. ¡Deja de mentirte, Francia! ¡Te ensartarás en las piras del Kremlin si no despiertas al nuevo y duro mundo en el que vivimos!"
 FRA_Operation_Saint_Arnaud: "§YOpération§!: Davout"
 FRA_Operation_Saint_Arnaud_desc: "Los rusos fueron sorprendidos por nuestra repentina intervención en la defensa de Ucrania, pero no se han detenido. Tanto por las noticias del frente como por los informes de inteligencia, en lugar de detenerse y evaluar la situación, los rusos han redoblado sus esfuerzos y han invertido más recursos en el avance ucraniano. A pesar de las preocupaciones sobre la capacidad de Ucrania para capear el temporal, las circunstancias presentan una oportunidad potencialmente dorada. Con la atención rusa centrada en Ucrania y sus intentos de organizar una línea que ya alcanza los mil seiscientos kilómetros, han agotado considerablemente sus recursos. Esto ha creado las condiciones para un audaz desembarco naval tras las líneas rusas en la región de Kubán. Esta cabeza de puente pondría aún más a prueba la fuerza de Rusia y sus ya limitados recursos logísticos, y quizás los obligaría a detener las operaciones ofensivas, lo que nos permitiría organizar nuevos contraataques a gran escala mientras la situación se desestabiliza. El éxito nos consolidaría como un actor principal; el fracaso no es una opción para el destino de Europa y el honor de Francia está en juego."
 FRA_Operation_Davout_decision: "§YOpération§!: Davout"
 FRA_NATO_war_category: "La Guerra Europea"
 FRA_NATO_war_category_desc: "\n\n\n\n\n£GFX_SOV_NATO_war_category\n\n\n\n\n\n\n\nLos rusos intentan una vez más marchar sobre Europa para forjar un imperio... Es nuestra responsabilidad detenerlos.\n\n§ROBJETIVOS PRINCIPALES§!:\n\n§YSEBASTOPOL§!: [GLOBAL.get_sevastopol_nato_status]\n§YMINSK§!: [GLOBAL.get_minsk_nato_status]\n§YS. PETERSBURGO§!: [GLOBAL.get_petersburg_nato_status]\n§YROSTOV DEL DON§!: [GLOBAL.get_rostov_nato_status]\n\n§ROBJETIVOS SECUNDARIOS§!:\n\n§YKALININGRADO§!: [GLOBAL.get_kaliningrad_nato_status]\n§YBÉLGOROD§!: [GLOBAL.get_belgorod_nato_status]\n§YVOLGOGRADO§!: [GLOBAL.get_volgograd_nato_status]\n§YNÓVGOROD§!: [GLOBAL.get_novgorod_nato_status]\n§YDONETSK§!: [GLOBAL.get_donetsk_nato_status]\n§YLUGANSK§!: [GLOBAL.get_luhansk_nato_status]\n\n§GCIUDADES ALIADAS§!:\n\n§YKIEV§!: [GLOBAL.get_kiev_nato_status]\n§YODESA§!: [GLOBAL.get_odessa_nato_status]\n§YTALLIN§!: [GLOBAL.get_tallinn_nato_status]\n§YVILNA§!: [GLOBAL.get_vilnius_nato_status]\n§YVARSOVIA§!: [GLOBAL.get_warsaw_nato_status]\n§YBUDAPEST§!: [GLOBAL.get_budapest_nato_status]\n§YBUCAREST§!: [GLOBAL.get_bucharest_nato_status] \n\n§YOPÉRATION DAVOUT§!: \n§5KERCH§!: [GLOBAL.get_kerch_nato_status] \n§5NOVOROSÍISK§!: [GLOBAL.get_novorossiysk_nato_status] \n§5SOCHI§!: [GLOBAL.get_sochi_nato_status]"
 FRA_davout_success_idea: "Éxito en el Cáucaso"
 FRA_ils_ne_passeront_pas: "Ils ne passeront pas!"
 FRA_ils_ne_passeront_pas_desc: "A pesar del colapso de Ucrania, el ánimo en la cabeza de puente de Kubán se mantiene alto. Este renovado entusiasmo se mantiene a pesar de saber que no todo marcha bien en el frente; el oso ha logrado éxitos masivos, a pesar de las elevadas pérdidas. El avance ruso continúa, y para hacer frente a semejante embestida es obvio que debemos atrincherarnos aún más en Chernozem. Hoy somos nosotros quienes sitiamos Krasnodar, pero un fracaso podría permitir a los rusos avanzar, y el corazón de Europa estará en peligro. Un canto del pasado histórico de Francia ha sido resucitado por los hombres en el frente, y, tal como fue entonces, ahora servirá como un excelente grito de guerra para soldados y civiles por igual. ¡No pasarán!"
 FRA_sovereignty_desc: "Los miembros más idealistas del Gobierno y del ejército quieren usar el conflicto para consolidar la unidad europea, aumentar la integración de las unidades y utilizar unidades étnicas antirrusas para presentarnos como liberadores. Cualquier cambio estructural de tal magnitud o inversión cuantiosa en grupos de lealtad cuestionable debe considerarse una apuesta arriesgada, y quien se juega el alma es un necio. Tales ideas soñadoras deben reservarse para un mundo donde Europa haya vencido cualquier amenaza que Rusia represente para una Europa libre. Hasta ese día, confiaremos en la fuerza de Francia tal como es; las reformas soñadoras pueden reservarse para tiempos de paz."
 FRA_solidarity: "Legado de la Legión Extranjera"
 FRA_solidarity_desc: "A pesar de nuestra negativa a emprender una reorganización arriesgada y descontrolada, aún hay margen para el reclutamiento de unidades no francesas simplemente adoptando el espíritu de la legión extranjera. Al expandir rápidamente su fuerza, podemos engrosar las filas con combatientes adicionales y no tener que preocuparnos tanto por cambios estructurales radicales y posibles conflictos de intereses entre unidades étnicas. Francia conseguirá que los extranjeros luchen por ella, pero bajo la bandera unificadora de la Legión Extranjera."
 FRA_cement_ukrainian_crimea: "Consolidar la Crimea ucraniana"
 FRA_cement_ukrainian_crimea_desc: "Con la recuperación de Crimea, no debemos escatimar gastos para garantizar el fracaso de cualquier intento ruso de recuperarla. Europa entró en este conflicto por una violación de la integridad territorial de Ucrania, y para demostrar que vamos en serio, debemos llegar hasta el final. No nos conformaremos con una tregua, ni con una \"zona desmilitarizada\", ni con nada menos que una victoria total. Las tierras robadas a Ucrania mientras permanecimos de brazos cruzados serán devueltas cueste lo que cueste. Nuestros errores serán rectificados y haremos todo lo posible para garantizar que esta sea la última vez que Rusia pueda amenazar a Ucrania, y mucho menos a Europa, de nuevo. El oso será doblegado a cualquier precio."
 FRA_kuban_expeditionary_army: "Ejército Expedicionario de Kubán"
 FRA_kuban_expeditionary_army_desc: "Incluso con sus recientes logros en casa y en el frente, detrás de la cortina uno puede encontrar caos en Rusia. Hay aquellos en las regiones abandonadas por Moscú, Kubán siendo el lugar perfecto para empezar dado a las grandes secciones que han caído bajo nuestro control. Vamos a organizar voluntarios locales y prisioneros de guerra en este \"Cuerpo Kubán\" a pesar de que los oficiales locales insistan de escribirlo con \"K\". Estas unidades serán perfectas para trabajos de seguridad en los flancos y para demostrarle a la gente Rusa que nosotros somos liberadores, no brutos conquistadores."
 FRA_kuban_exp_army_tt: "Crea 6 §0divisiones de milicianos kubanos§! en §pVarsovia§!"
 FRA_conscript_cossack_brigades: "Reclutar brigadas cosacas"
 FRA_conscript_cossack_brigades_desc: "Con el colapso de la URSS, ambos Rusos y Ucranianos se llamaron sucesores del nombre cosaco. Por donde nos paramos, Ucrania es la casa de todo cosaco de verdad, y aquellos que claman serlo deberán luchar con nosotros amenos de que sean traidores de su gente. Aquellos en nuestro lado del frente serán organizados en unidades ligeras de alta movilidad para ir acordar a su homónima. Consentimiento para unirse a estas unidades no importa, después de todo, estamos luchando por ellos, no por nosotros."
 FRA_cossack_army_tt: "Crea 4 §yBrigadas Mecanizadas Ligeras Cosacas§! en §pVarsovia§!"
 FRA_utilize_russian_dissidents: "Utilizar disidentes rusos"
 FRA_utilize_russian_dissidents_desc: "Hay muchos que tomaran armas por nosotros debido a un montón de razones, sea que quieren una \"mejor\" Rusia, independencia regional, o simplemente andando con el viento. El \"porque\" no importa, simplemente que a estos hombre se le pueden dar rifles y utilizarlos para debilitar el esfuerzo de guerra ruso. Algunos son genuinos en su colaboración, otros tienen visiones que son generalmente... problemáticas. Lidiaremos con las consecuencias después, tenemos una guerra que ganar."
 FRA_operation_davout_tt: "§YTras completar este enfoque, §!§Ycomenzará§! §COpération§!: Davout.\nSe trata de un ataque total contra\n§RSochi,\nNovorosíisk\ny Kerch.§!\n§YEl objetivo es aliviar la presión ucraniana y garantizar la superioridad de las §!§Cfuerzas de la OTAN§! §Gen el frente del Cáucaso§!."
 FRA_Act_on_Rattachism: "Acto sobre el rattachismo"
 FRA_Act_on_Rattachism_desc: "Aunque Valonia habla francés, esta antigua parte del mundo francófono ha estado fuera de nuestro control desde la caída de Napoleón, creyéndola perdida para siempre. El destino nos ha unido de nuevo, y debemos preparar diversas acciones para seguir integrándolas en nuestro sistema. Estar dentro de nuestras fronteras no basta; Bélgica y su sistema político bizantino deben reconciliarse con el nuestro. Por el bien de Francia, nos ocuparemos de ello."
 FRA_Absorb_Waloon_Command: "Absorber el comando valón"
 FRA_Absorb_Waloon_Command_desc: "El bilingüismo belga llevó a un ejército dividido en dos partes, al igual que su Gobierno. Esto hizo que la división de Bélgica fuera bastante clara, ya que los flamencos se encargaban de la seguridad fronteriza en el lado flamenco, al igual que los valones. Pero ahora esto es responsabilidad de los Países Bajos y Francia. Valonia trae consigo un contingente considerable de fuerzas y oficiales experimentados de la OTAN, a quienes sería una tontería rechazar. Actualicen sus uniformes, otórguenles nuevos rangos; ahora forman parte de Francia."
 FRA_absorbing_walloon_command_tt: "Se absorberán a los oficiales valones a nuestro ejército."
 FRA_Reorganize_Walloon_Businesses: "Reorganizar negocios valones"
 FRA_Reorganize_Walloon_Businesses_desc: "Cuando se este integrando un territorio urbano desarrollado como Valonia, uno debe considerar que las compañías de la región estaban bajo los códigos de construcción estrictos de Bélgica, vistos desde Bruselas, ¿pero ahora? Estas empresas responde a la ley Francesa. Tenemos que inspeccionar los negocios recién obtenidos y ayudarlos a reorganizarse, compañías como Fabrique Nationale tienen mucho valor para verlas caer, interviniendo y reorganizarlas en medio del caos ayudara a preservar la economía local."
 FRA_Integrate_Walloon_Parliament: "Integrar el parlamento"
 FRA_Integrate_Walloon_Parliament_desc: "La parte más complica de esto es simplemente observar al sistema gubernamental belga y ver cómo integrarlo. Bélgica tenia tres parlamentos, flamenco, valón, y alemán. Nosotros controlamos las regiones valona y alemana y no sabemos que hacer exactamente con sus Gobiernos, aunque algunos asientos será removidos especialmente donde esté involucrado Eupen Malemdy, muchos serán integrados a la República Francesa, sus partidos registrados bajo sus antiguos nombres se van a mantener por el momento y muchos parlamentarios belgas se van a acostumbrar a París. Todo lo que queda ahora es que nuestro partido prepare las regiones electas y decida a quien dejar."
 FRA_Promote_Francophone_Unity: "Promover la unidad francófona"
 FRA_Promote_Francophone_Unity_desc: "Los francófonos llevamos con nosotros un legado impresionante y antiguo, que va desde Carlomagno hasta la casa de Valois, los Borbones y Napoleón, hasta llegar a esta gran era republicana que vivimos hoy. Somos los creadores de los valores europeos y los guardianes de su cultura; hemos resistido durante más de mil años las invasiones y la opresión de otros, y a menudo hemos enfrentado grandes campañas hacia el este, el sur y el oeste a través del Atlántico, todo en busca de gloria para nosotros y nuestro pueblo.\n\nBélgica y Valonia han estado separadas de nosotros durante gran parte de su historia en medio de estas glorias. Pero, a pesar de eso, han compartido ese legado. Nuestra historia es motivo de orgullo, y lo que hemos vivido es también parte de ellos, así como lo que ellos han vivido es parte de nosotros. ¡Los franceses siempre nos mantenemos unidos!"
 FRA_An_Example_of_Unity: "Un ejemplo de unidad"
 FRA_An_Example_of_Unity_desc: "Libertad, igualdad, fraternidad. Estos son los principios que guían a Francia. Desde que se alzó la primera espada y se puso fin al Antiguo Régimen, nuestros ideales han iluminado el mundo. América. Alemania. Italia. ¿Hay algún rincón del planeta al que no hayan llegado estas tres palabras? Hoy en día, Europa está unificada de manera única por estos ideales, aunque Bélgica haya caído, sus ideas fundamentales siguen vivas. Bruselas, con su mezcla de culturas flamenca y valona, se erige como la capital de Europa. Aunque Bélgica ya no exista como tal, el símbolo de unidad que dejó atrás es un poderoso recordatorio del triunfo de nuestros ideales a través de todas las crisis y dificultades, la búsqueda de la Freiheit, de la Liberté; sin importar el idioma que hablen, todos tienen una palabra para ello. En español, es Libertad. Que Bruselas sea, en los corazones y las mentes de cada europeo, un faro de esperanza para el futuro de Europa. El primer territorio real en un mapa que podemos afirmar que pertenece plenamente a Europa."
 FRA_Propagandize_French_Naturalism: "Propagandizar el naturalismo francés"
 FRA_Propagandize_French_Naturalism_desc: "Y hacia el Rin, sigamos el río hacia el norte hasta que la cerveza de Brabant esté en las plazas del mercado. Somos franceses, herederos de nuestra tierra, y no olvidamos de dónde venimos. Los holandeses y los alemanes son nuestros hermanos. Hoy hemos ganado Valonia, pero deberíamos haber conquistado más; deberíamos haber ido más lejos. Es un regalo para Europa que no avancemos hacia el Rin como lo hizo Napoleón. Esta antigua frontera se trazó tras una derrota que nos separó de los valones, de los flamencos, de las antiguas tierras de Borgoña. ¿Por qué deberíamos aceptarla? No, exigimos más. Merecemos más. Valonia hoy, Flandes mañana, Brabante la semana que viene, y quizás el Rin el año que viene."
 FRA_Absorb_the_Beglian_Left: "Absorber la izquierda belga"
 FRA_Absorb_the_Beglian_Left_desc: "Los de izquierda debemos mantenernos unidos. Los socialistas belgas han sido nuestros aliados en la escena europea durante mucho tiempo, y entre ellos hay muchos amigos personales de Mélenchon. Es justo que, con las regiones unidas, podamos compartir el pan con ellos. Una reunión entre Mélenchon y el líder del Parti Socialiste, Paul Magnette, así como con Raoul Hedebouw del PTB, nos permitirá fortalecer nuestra posición en el parlamento y legitimar nuestro liderazgo sobre la clase trabajadora belga. También podríamos considerar incluir a Charles Servaty. Eupen puede ser pequeño, pero sigue siendo nuestro. Sus tres escaños son asientos que realmente nos gustaría conservar."
 FRA_Appoint_King_Philippe_to_Parliament: "Restaurar títulos belgas"
 FRA_Appoint_King_Philippe_to_Parliament_desc: "Bélgica tiene una monarquía con una larga historia, la cual fue arrancada en los últimos días de la existencia de Bélgica, no es correcto que tal símbolo de unidad nacional sea extirpada. Nosotros mismos no somos una monarquía, obviamente, pero los conservadores de Bélgica no quieren que sus reales se conviertan en meros ciudadanos. Muy bien. Van a retener su titulo restaurado y protegido por la República Francesa por muy extraño que sea, vamos a coronar a un rey de Bélgica una vez más. Un honor estatal puramente honorario y no administrativo."
 FRA_Raises_Parisian_Militias: "Formar milicias parisinas"
 FRA_Raises_Parisian_Militias_desc: ""
 FRA_Rally_the_Centre: "Unir el centro"
 FRA_Rally_the_Centre_desc: ""
 FRA_Sideline_Bureaucratic_Procedures: "Marginar los procedimientos burocráticos"
 FRA_Sideline_Bureaucratic_Procedures_desc: ""
 FRA_Desperate_Defense: "§YOpération§!: Foch"
 FRA_Desperate_Defense_desc: ""
 FRA_Desperate_Defense_cw_idea: "Defensa en profundidad"
 FRA_Suspend_Democratic_Processes: "Suspender la democracia"
 FRA_Suspend_Democratic_Processes_desc: ""
 FRA_Push_European_Stability_Pact: "Pacto de Seguridad Europea"
 FRA_Push_European_Stability_Pact_desc: ""
 FRA_Stabilize_the_Euro: "Estabilización artificial del euro"
 FRA_Stabilize_the_Euro_desc: ""
 FRA_Petition_UN_Peacekeepers: "Pedir Cascos Azules"
 FRA_Petition_UN_Peacekeepers_desc: ""
 FRA_Request_Decreased_Reperations: "Pedir disminuir las reparaciones de guerra"
 FRA_Request_Decreased_Reperations_desc: ""
 FRA_Revolution_against_Humiliation: "¡Un juramento a la Nueva República!"
 FRA_Revolution_against_Humiliation_desc: "Las trompetas de guerra han sonado, y la nación francesa ha sido envuelta en marcos, de las cenizas de la vieja, nuestra nueva República surge como un fénix, el trabajador y el proletariado han despertado de su sueño, y dan el juramento solemne de una nueva Francia, una que se construye sobre la base del pueblo. ¡El socialismo es la única respuesta y salvación para la nación francesa!"
 FRA_Rally_the_People: "Afilar la hoz del pueblo"
 FRA_Rally_the_People_desc: "Francia y su pueblo han sido vendidos, abandonados por yates y mansiones, y la única verdad reside tras la espada. Mientras exista sed de venganza en el alma campesina, los enemigos de nuestra nueva República deben ser aniquilados como la hierba y destrozados como el cristal. Ahora que el pueblo lidera la carga, impulsando un nuevo amanecer para nuestra nación, ningún traidor ni de nuestra revolución debe quedar impune."
 FRA_Declare_Second_Revolution: "Declarar una nueva Revolución"
 FRA_Declare_Second_Revolution_desc: "Desde la Comuna de París hasta la Revolución rusa hace más de un siglo, la idea misma del socialismo y sus enseñanzas aún resuenan con fuerza en nuestro pueblo. Si algo nos han enseñado estos años escalofriantes, es que no debemos flaquear más: el amanecer de una nueva revolución se vislumbra en el horizonte, y debemos abrazarla con entusiasmo y con firmeza, y saludar a una nueva Francia bajo la bandera roja, la bandera del pueblo."
 FRA_New_Partisan_Movement: "Nouveaux Partisans"
 FRA_New_Partisan_Movement_desc: "No debería sorprender a nuestros enemigos que los partisanos y otras células de la resistencia ya hayan comenzado a afianzarse en el campo. Siendo ignorantes e insensatos, tratarán el evento como una simple distracción. Comenzaremos a utilizar todo tipo de incursiones y actividades partisanas para debilitar y saquear los esfuerzos bélicos de nuestros enemigos."
 FRA_Stoke_Revolutionary_Fervor: "Alimentar fervor revolucionario"
 FRA_Stoke_Revolutionary_Fervor_desc: "Las espadas del pueblo ansían desgarrar y despellejar a los parásitos que conspiran para plagar nuestra revolución. Debemos afirmar nuestra superioridad total sobre ellos. De un solo golpe, nos dirigiremos hacia sus costosos palacios, construidos con la sangre y el sufrimiento de la clase trabajadora, y los rociaremos con gasolina antes de prenderles fuego."
 FPR_Fervor_reset_tt: "Quita la idea §RFervor revolucionario§!"
 FRA_Form_Peasant_Militias: "Formar brigadas campesinas"
 FRA_Form_Peasant_Militias_desc: "Esta no es una simple guerra, sino una guerra popular, que lucha por el futuro de cada trabajador y campesino de nuestra nación. El pueblo debe mantenerse firme, con entusiasmo y voluntad, luchando codo con codo por su libertad, incluso si eso significa morir por ella. Nuestra Revolución necesita más tropas en el frente para aplastar a sus enemigos con un golpe rápido y engañoso, formando más brigadas bajo su control."
 FRA_Found_the_French_Peoples_Liberation_Army: "Ejército Popular Francés"
 FRA_Found_the_French_Peoples_Liberation_Army_desc: "Una Revolución y un país sin un ejército permanente están destinados al fracaso. Las lecciones de la Primera Guerra Europea nos enseñaron que las antiguas Fuerzas Armadas Francesas son inadecuadas contra los enemigos de la nación. De los escombros, formaremos un nuevo ejército francés, uno que, bajo la bandera roja, marche con orgullo contra la tiranía."
 FRA_Crusade_Against_Imperialism: "Teñir el Sena"
 FRA_Crusade_Against_Imperialism_desc: "Desde el comienzo de nuestra lucha por recuperar nuestra nación, París ha estado en nuestra mira, ocupada por los enemigos y traidores de la Revolución, quienes solo buscan su propio beneficio y no el del pueblo. Con una carga feroz, retomaremos nuestra ciudad, degollaremos a los enemigos del pueblo, mientras el río Sena se tiñe de rojo, de sangre desdeñosa y compasiva."
 FRA_Crush_the_Reactionary_Villians: "Aplastar villanos reaccionarios"
 FRA_Crush_the_Reactionary_Villians_desc: "Los fascistas clericales y el antiguo ejército son el ejemplo viviente de lo que desgarró a la nación francesa y la hizo añicos. Su mirada malvada y tiránica busca socavar nuestros esfuerzos, la sangre, el sudor y las lágrimas de los trabajadores y el proletariado, para apagar una vez más la luz tras sus ojos, encerrarlos para siempre en la oscuridad.\n\nDe una vez por todas, los haremos arrodillarse de pura vergüenza y agonía, saquearemos sus campos y les arrancaremos los ojos para que nunca puedan ver la luz. ¡Viva la Revolución!"
 FRA_The_Peoples_Decree: "Convocar la Asamblea Nacional"
 FRA_The_Peoples_Decree_desc: "El futuro de nuestra nación sigue siendo sombrío e incierto. Mientras luchamos con fervor por nuestras causas revolucionarias, primero debemos evaluar la situación actual. Debemos convocar a todos los elementos del socialismo a la Asamblea Nacional para determinar y decidir el futuro venidero, y así garantizar que Francia, bajo la nueva bandera roja, no vuelva a caer."
 FRA_Operation_Bastille: "§YOpération§!: Bastille"
 FRA_Operation_Bastille_desc: "Francia ha caído a la decadencia, y sus cimientos se desmoronan bajo la corrupción y el caos. Somos los nuevos jacobinos, y esta es nuestra declaración de renovación, un golpe decisivo para asegurar nuestro futuro. Nuestras fuerzas deben neutralizar la resistencia restante en todas las zonas de nuestro amado país, garantizando el restablecimiento del orden en las calles y la recuperación de la nación de la anarquía. Con la máxima precisión y disciplina, extinguiremos la disidencia, reconstruiremos la nación y demostraremos al pueblo francés que, como nuestro homónimo, asumiremos el manto de la revolución."
 FRA_Enforce_Martial_Law: "Imponer la ley marcial"
 FRA_Enforce_Martial_Law_desc: "Las calles son el campo de batalla, y cada callejón es un frente. El caos ha envuelto lo que queda de nuestra nación, y solo una accionar rápido pondrá orden en esta contienda. Los ideales de libertad solo pueden defenderse con las exigencias de la supervivencia. Se establecerán toques de queda, patrullas y puestos de control en todos los territorios defendidos. Es mediante la fuerza y la disciplina que la República se preservará por cualquier medio, incluso con la extinción temporal de algunas libertades."
 FRA_Support_Princess_Elisabeth: "Nuevo Orden Europeo"
 FRA_Support_Princess_Elisabeth_desc: "Europa ha flaqueado durante demasiado tiempo, fragmentada por la debilidad y asolada por la decadencia. Ha llegado el momento de construir una nueva base: un continente unido por la fuerza, la pureza y un destino común. Una Europa para los europeos, libre de la corrupción externa y de las falsas promesas de las ilusiones multiculturales. Es necesario tomar medidas decisivas para garantizarlo. Francia no puede permitirse permanecer cerrada por mucho tiempo, mientras los fuertes lideran y los débiles son barridos. Esta es la inevitabilidad del Nuevo Orden."
 FRA_The_Hexigon_Policy: "Política del Hexágono"
 FRA_The_Hexigon_Policy_desc: "Francia no es solo una nación, es el corazón de Europa. Esta política busca fortalecer ese corazón, asegurando nuestras fronteras e imponiendo una voluntad única e inquebrantable. Las influencias externas ya no dictarán nuestro destino, pues el Hexágono se erige como un bastión de orden y determinación. Defender esta política es garantizar que el futuro de nuestros compatriotas permanezca intacto."
 FRA_Utilize_Fascist_Paramilitaries: "Usar paramilitares fascistas"
 FRA_Utilize_Fascist_Paramilitaries_desc: "El orden exige su cumplimiento, y su cumplimiento exige a quienes tengan la voluntad de actuar. Estos hombres son fervientes en su causa y nos ofrecen una espada desenvainada contra el caos del socialismo. Sus métodos pueden inquietar a algunos, pero para asegurar Francia, debemos emplear todas las herramientas disponibles. No es momento de vacilar, es momento de fortalecer nuestra determinación."
 FRA_Emergency_Factory_Conversion: "Conversión de emergencia"
 FRA_Emergency_Factory_Conversion_desc: "Nuestras reservas de armamentos están llegando a niveles críticamente bajos, y nuestras tropas necesitan nuevos equipos y reabastecimientos constantemente. Para garantizar que nuestro ejército esté adecuadamente equipado, iniciaremos una conversión de emergencia de nuestra industria civil para apoyar el esfuerzo bélico."
 FRA_National_Rebirth: "Renacer nacional"
 FRA_National_Rebirth_desc: "El viejo orden se ahoga bajo el paso de las botas. Las banderas deben alzarse donde una vez colgó la bandera tricolor, pues la decadencia de la nación no tiene remedio; debe reforjarse. La disciplina reemplazará la debilidad; la unidad unirá lo que estaba roto. Una nueva Francia surgirá del crisol de nuestro fascismo, con una voluntad firme, una fuerza innegable. No hay retorno, solo el futuro que forjamos de las cenizas."
 FRA_Venerate_the_Lion: "Venerar al vencedor"
 FRA_Venerate_the_Lion_desc: "Philippe Pétain, el vencedor de Verdún, es inmortal en los anales del auténtico valor francés. Su nombre evoca no solo un faro brillante de nacionalismo, sino también la resiliencia y el sacrificio de nuestro pueblo. Honraremos su legado, no solo con palabras, sino con hechos que reflejen su visión de una nación inquebrantable. Venerarlo es venerar la fuerza que una vez salvó a una nación y que nos guiará de nuevo hacia la salvación."
 FRA_A_Bas_Les_Traitres: "A Bas Les Traîtres"
 FRA_A_Bas_Les_Traitres_desc: "Francia no puede levantarse mientras sus enemigos la pudren desde adentro. La putredumbre de la traición, la colaboración y la disidencia debe ser extirpada sin dudarlo. Quienes han dado la espalda a la nación no encontrarán ni refugio ni perdón. Con una acción rápida y decisiva, purgaremos a los traidores de entre nosotros y garantizaremos que la lealtad a Francia no solo se espere, sino que se exija."
 FRA_Disrupt_the_Plague_of_Socialism: "Acabar la plaga del socialismo"
 FRA_Disrupt_the_Plague_of_Socialism_desc: "La mera idea del pensamiento y la agenda socialistas debe ser purgada y erradicada de nuestro suelo. Nuestros enemigos creen que el socialismo será la salvación de la nación francesa, cuando en realidad es totalmente incompatible y dejará la identidad misma de nuestra nación destrozada. La lucha está aquí. Debemos eliminar los elementos de las ideologías marxistas de una vez por todas. ¡Vive la France!"
 FRA_Secure_French_Oil_Interests: "Reconocer un sucesor árabe"
 FRA_Secure_French_Oil_Interests_desc: "Establecer relaciones diplomáticas con el nuevo liderazgo saudita, ya sea bajo la República Árabe o la Casa de Saúd. Este reconocimiento busca consolidar alianzas y asegurar una asociación estable, facilitando la cooperación en la producción energética y la seguridad regional, a la vez que fortalece la influencia de Francia en el golfo Pérsico."
 FRA_If_We_cant_have_it: "Entrar en Medio Oriente"
 FRA_If_We_cant_have_it_desc: "Invertiremos estratégicamente en Medio Oriente brindando apoyo financiero a aliados clave como Israel y Turquía. Esta iniciativa fortalecerá nuestra imagen en la región, promoviendo la estabilidad y fomentando alianzas que puedan derivar en acuerdos energéticos favorables y una mayor colaboración en materia de seguridad."
 FRA_Encourage_European_Economic_Sanctions: "Otorgar préstamos"
 FRA_Encourage_European_Economic_Sanctions_desc: "Otorgaremos préstamos específicos al gobierno sucesor de Arabia Saudita para apoyar el desarrollo y la estabilidad. Al invertir en su economía, Francia puede fortalecer los lazos bilaterales e impulsar políticas alineadas con los intereses franceses, garantizando un flujo constante de petróleo y la cooperación estratégica."
 FRA_Redirect_Budget_to_Oil_Contracts: "Direccionar presupuesto a petroleras"
 FRA_Redirect_Budget_to_Oil_Contracts_desc: "Reasignaremos recursos presupuestarios para priorizar contratos e iniciativas petroleras. Este enfoque busca garantizar que la financiación se canalice eficazmente hacia la consecución de acuerdos energéticos vitales, el fortalecimiento de la independencia energética y el fortalecimiento de la posición de Francia como actor clave en el mercado petrolero mundial."
 FRA_Integrate_Oil_Contracts_into_Military_Budget: "Integrar presupuesto petrolero-militar"
 FRA_Integrate_Oil_Contracts_into_Military_Budget_desc: "Combinaremos el presupuesto petrolero con la financiación militar para crear un enfoque unificado de la seguridad energética. Al integrar estos presupuestos, Francia puede fortalecer sus capacidades estratégicas y garantizar que las operaciones militares cuenten con el apoyo adecuado de los recursos energéticos, fortaleciendo así la defensa nacional."
 FRA_Department_of_Oil_Production: "Département de la Production Pétrolière"
 FRA_Department_of_Oil_Production_desc: "Estableceremos un departamento gubernamental dedicado a la producción y gestión petrolera. Este departamento supervisará el desarrollo de estrategias petroleras nacionales e internacionales, se coordinará con los actores del sector e impulsará iniciativas que mejoren la seguridad energética y la eficiencia de la producción en Francia."
 FRA_Reorganize_Civilian_Infrastructure: "Reorganizar infraestructura civil"
 FRA_Reorganize_Civilian_Infrastructure_desc: "Renovaremos la infraestructura civil para apoyar el aumento de la producción y distribución de petróleo. Esta iniciativa implica la modernización de las redes de transporte, las instalaciones de almacenamiento y las plantas de procesamiento para garantizar la eficiencia operativa. Al modernizar la infraestructura, Francia puede optimizar su cadena de suministro energético y mejorar la resiliencia económica general."
 FRA_Invest_in_Equinor: "Invertir en Equinor"
 FRA_Invest_in_Equinor_desc: "Canalizaremos inversiones en Equinor para impulsar iniciativas de energía renovable y diversificar las fuentes de energía. Esta estrategia busca alinearse con las tendencias energéticas globales, a la vez que consolida su presencia en soluciones energéticas innovadoras. Apoyar a Equinor posicionará a Francia como líder en los mercados energéticos tradicionales y sostenibles."
 FRA_Ration_Civilian_Oil: "Racionar petróleo civil."
 FRA_Ration_Civilian_Oil_desc: "Implementaremos un sistema de racionamiento de petróleo para uso civil a fin de priorizar los recursos para necesidades estratégicas y operaciones militares. Esta medida busca garantizar el suministro a sectores críticos, a la vez que se gestiona eficazmente la demanda interna. Controlando la distribución de petróleo, Francia puede mantener la estabilidad en períodos de alta tensión."
 FRA_Curtail_Former_American_Embargoes: "Distanciarnos de embargos estadounidenses"
 FRA_Curtail_Former_American_Embargoes_desc: "Tomaremos medidas para distanciar a Francia de los embargos impuestos por Estados Unidos, en particular contra Venezuela. Al levantar las restricciones y colaborar con los países sancionados, Francia puede asegurar suministros alternativos de petróleo, fortalecer su independencia energética y posicionarse como mediador diplomático en las negociaciones energéticas globales."
 FRA_West_African_Oil: "Petroleo en África Occidental"
 FRA_West_African_Oil_desc: "Nos enfocaremos en ampliar alianza con países profranceses en África Occidental para acceder a reservas petroleras adicionales. Esta iniciativa fortalecerá los lazos con estos países, a la vez que impulsará la cartera energética de Francia. Al invertir en yacimientos petrolíferos de África Occidental, Francia puede diversificar sus fuentes de energía y promover la estabilidad regional."
 FRA_Issue_10_year_Bonds: "Emitir bonos a diez años"
 FRA_Issue_10_year_Bonds_desc: "Con la reciente inestabilidad económica al comienzo de la nueva década, se hace cada vez más evidente que, para que Francia no se quede atrás de las demás grandes naciones del mundo, debemos adoptar una estrategia más proactiva en nuestra política económica. El Gobierno actual ha elaborado una nueva política monetaria que se implementará con la emisión de bonos durante el resto de la década, tanto para empresas como para corporaciones."
 FRA_Revive_Dirigisme: "Revivir el dirigismo"
 FRA_Revive_Dirigisme_desc: "El dirigismo fue crucial para nuestros esfuerzos de reconstrucción tras el fin de la Segunda Guerra Mundial y Francia no ha olvidado sus raíces desde entonces. Si bien en los últimos tiempos hemos adoptado un enfoque de mercado en nuestra política económica, nunca está mal volver a un enfoque más seguro ante la reciente inestabilidad económica, como la pandemia. Con esta vuelta a nivel nacional al sistema dirigista, Francia florecerá como lo hizo durante los mejores años de la república."
 FRA_Invite_New_Age_Technocrats: "Invitar a tecnócratas"
 FRA_Invite_New_Age_Technocrats_desc: "Con el cambio de siglo, una de las industrias más lucrativas y en expansión a nivel mundial, especialmente para Francia, ha sido la tecnología. Los gigantes tecnológicos que se han formado en las últimas dos décadas han dominado la industria, principalmente desde Estados Unidos. Francia demostrará que no se opone a estos gigantes de la industria y, en cambio, les extenderá la mano como un gesto de buena voluntad del pueblo francés."
 FRA_Purchase_National_Champions: "Nueva era de campeones nacionales"
 FRA_Purchase_National_Champions_desc: "Mientras allanamos el camino hacia el dominio económico, no debemos olvidar a nuestras propias empresas francesas, que en su día fueron líderes de los mercados industriales y económicos. Mostraremos al resto del mundo la superioridad del producto francés y nuestra innovación. Pero para lograrlo, debemos impulsar a nuestras empresas, asegurarnos de que estén respaldadas y que comprendan que Francia las respalda en el escenario global."
 FRA_Advance_National_Interests: "Avanzar intereses nacionales"
 FRA_Advance_National_Interests_desc: "Lo mejor para nuestras empresas y negocios es lo mejor para la nación francesa, y eso es definitivo. Preservaremos el bienestar y la prosperidad de nuestra nación por todos los medios posibles, y cualquier empresa que desee formar parte de nuestro movimiento económico debe adherirse a estas exigencias. Lo comprenderán a su debido tiempo, a medida que Francia vuelva a ser un actor importante en el panorama geopolítico del mundo moderno, como lo fue décadas atrás."
 FRA_Replace_the_ENA: "Reemplazar la ENA"
 FRA_Replace_the_ENA_desc: "La Escuela Nacional de Administración se ha erigido como un referente de progreso y buena voluntad para nuestro gobierno hacia la ciudadanía. Con su intención original de democratizar nuestra función pública, alejándola de la enrevesada burocracia que solíamos tener, recientemente ha caído en el desánimo debido a la crueldad de los años. Muchos se preguntan qué falló en esta prestigiosa institución, pero parece que, tras años de malas prácticas y disfunciones, la solución reside en sus propias políticas.\n\nTras numerosas y complejas conversaciones con líderes de todos los sectores, se ha decidido que la única manera de solucionar este problema decrépito es reemplazar por completo la otrora prestigiosa academia. Esta vez, aseguraremos su longevidad, devolviéndole la misma prestigiosa reputación que tuvo en su día."
 FRA_Replace_ENA_Veterans: "Despedir veteranos de la ENA"
 FRA_Replace_ENA_Veterans_desc: "En algo en lo que todos coincidimos sobre la École Nationale d'Administration es en que la burocracia fue una plaga que ha convertido nuestra prestigiosa institución en el caos que conocemos hoy. Tras el cambio monumental, es evidente que estas sanguijuelas intentarán aferrarse al poder que aún conservan. Destituiremos a estos veteranos de sus puestos de grandeza y les demostraremos que el pueblo francés ya no los acoge."
 FRA_Institut_national_du_service_public: "Nacimiento del INSP"
 FRA_Institut_national_du_service_public_desc: "El Instituto Nacional de Ciencias Políticas fue una de las muchas propuestas redactadas por nuestra administración que han permanecido archivadas en la oficina de algún burócrata durante años. Hasta hace poco, habría permanecido así de no ser por las reformas tan necesarias implementadas durante nuestra administración, que nos permitieron reemplazar por completo la Escuela Nacional de Administración por el Instituto Nacional de Ciencias Políticas. Mientras la élite de la antigua institución está indignada, los franceses saben que este cambio los beneficiará a ellos, y no a la clase alta, que durante mucho tiempo ha abusado de su estatus y privilegios, ahora que la ENA ya no existe."
 FRA_Distribute_ENA_Funds: "Redistribuir fondos de la ENA"
 FRA_Distribute_ENA_Funds_desc: "Con el tan necesario fin de la Escuela Nacional de Administración, Francia y nuestro gobierno respirarán aliviados después de que finalmente se haya decapitado esa afrenta a nuestra nación. Después de semanas de revisar todos los gastos que la Escuela Nacional de Administración consumió de nuestro presupuesto, el asombroso informe de más de ciento cincuenta mil millones de euros casi provocó un segundo escándalo. Afortunadamente, la ENA ya ha sido destripada y podemos transferir esos fondos a instituciones muy necesarias de Francia que fueron robadas durante décadas gracias a esa vil institución."
 FRA_Disuade_Elitist_Attitudes: "Disuadir actitud elitista"
 FRA_Disuade_Elitist_Attitudes_desc: "Con la creación del Instituto Nacional de Ciencias Políticas, demostraremos a quienes se han aprovechado de las débiles protecciones de la ENA que sus comportamientos elitistas y depredadores ya no son bienvenidos por el pueblo francés. Les demostraremos que nuestra administración habla por el pueblo y que el pueblo ha expresado que las élites ya no son bienvenidas en nuestras instituciones gubernamentales."
 FRA_Reform_the_Civil_Services: "Reformar la administración pública"
 FRA_Reform_the_Civil_Services_desc: "Con la redistribución de los fondos despilfarradores de la ENA, tenemos amplio margen para invertir en otras áreas de nuestro Gobierno. Con el vacío dejado por la ENA al perder su formación para la función pública, es responsabilidad del Gobierno actual garantizar que la gente siga teniendo la oportunidad de acceder a la función pública sin las dificultades que antes suponía."
 FRA_Laissez_faire: "Adoptar la laissez faire"
 FRA_Laissez_faire_desc: "Con nuestra metódica derivación del sistema drigismo en las últimas décadas hacia un mayor énfasis en el mercado, a la luz de los recientes acontecimientos geopolíticos, parece que ha llegado el momento de que Francia adopte el libre mercado de una vez por todas y disfrute de los gloriosos beneficios que ofrece. Con esta perspectiva económica, Francia prosperará y evolucionará hacia la era moderna como nunca se había visto desde los días de gloria de nuestra república."
 FRA_Deconstruct_the_ENA: "Demoler la ENA"
 FRA_Deconstruct_the_ENA_desc: "La Escuela Nacional de Administración se ha erigido como un referente de progreso y buena voluntad para nuestro gobierno hacia la ciudadanía. Con su intención original de democratizar nuestra función pública, alejándola de la enrevesada burocracia que solíamos tener, recientemente ha caído en el desánimo debido a la crueldad de los años. Muchos se preguntan qué falló en esta prestigiosa institución, pero parece que, tras años de malas prácticas y disfunciones, la solución reside en sus propias políticas.\n\nTras numerosas y complejas conversaciones con líderes de todos los sectores, se ha decidido que la única manera de solucionar este problema decrépito es reemplazar por completo la otrora prestigiosa academia. Esta vez, aseguraremos su longevidad, devolviéndole la misma prestigiosa reputación que tuvo en su día."
 FRA_Begin_Low_Scale_Privatizations: "Privatizacion a pequeña escala"
 FRA_Begin_Low_Scale_Privatizations_desc: "Las corporaciones que han ayudado a Francia económicamente, e incluso financieramente en ocasiones, nos han pedido durante décadas que hagamos privatizaciones a pequeña escala. Con nuestro enfoque económico de laissez faire, finalmente ha llegado el momento de ceder ante las corporaciones y empresas, permitiendo la privatización de algunas instituciones gubernamentales, lo que permitirá una mayor eficiencia e incluso la competencia estratégica para garantizar que, al final, el ciudadano francés sea el verdadero vencedor."
 FRA_Increase_Arms_Exports: "Exportar más armas"
 FRA_Increase_Arms_Exports_desc: "Nuestro complejo militar-industrial siempre ha sido uno de los más importantes, considerando que no somos una de las superpotencias mundiales de nuestra era. Sin embargo, en particular, nuestra industria armamentística ha estado flaqueando en los últimos años, en comparación con nuestro pasado. Con la reciente inestabilidad geopolítica en África y otras partes del mundo, ahora es el momento ideal para que nuestro país continúe exportando los mejores productos franceses a todo el mundo."
 FRA_Reduce_International_Sanctions: "Reducir aranceles"
 FRA_Reduce_International_Sanctions_desc: "Los aranceles siempre han sido más una acción política que cualquier otra cosa... por supuesto, hay excepciones, como nuestros enemigos ideológicos. Sin embargo, hemos sido demasiado severos en los últimos años y, como resultado, hemos perdido frente a una parte crucial del mercado que anhela los productos y la industria franceses. Francia se mantendrá y seguirá fortaleciéndose en el mercado internacional, y esta política solo garantizará que sigamos fortaleciendo nuestra economía."
 FRA_Acquire_Renault: "Adquirir Renault"
 FRA_Acquire_Renault_desc: "Renault se ha consolidado como una de las empresas automotrices más lujosas de Francia desde la invención del automóvil. Si bien es conocida por sus automóviles, también ha prestado un gran servicio a nuestras fuerzas armadas, al proporcionarnos transportes blindados de personal, vehículos de combate de infantería e incluso tanques. Por ello, en un esfuerzo por expandir las empresas de nuestro país a nivel mundial, nuestro gobierno ha solicitado la adquisición de Renault."
 FRA_Nexter_Expansion: "Ampliar contratos con Nexter"
 FRA_Nexter_Expansion_desc: "Nexter ha sido un gran apoyo para las Fuerzas Armadas Francesas en la era moderna de la República. Les tenemos el más profundo respeto y gratitud, y como recompensa por sus contribuciones a nuestras fuerzas armadas, recompensaremos su arduo trabajo y esfuerzo ampliando sus contratos, lo que les permitirá producir más para nuestra querida nación y sus fuerzas armadas."
 FRA_Prioritize_Efficient_Economics: "Priorizar la eficiencia"
 FRA_Prioritize_Efficient_Economics_desc: "Con el dirigismo en pleno auge y la solidez de nuestras políticas, ha llegado el momento de centrar nuestra administración en garantizar la solidez de nuestro plan económico y su máxima eficiencia. Nos aseguraremos de que nuestras reformas sean aprobadas por el parlamento y de que la burocracia no obstaculice el crecimiento económico de nuestra nación. Con el rumbo definido de nuestras políticas y reformas, parece que el momento de Francia como potencia económica europea está a punto de llegar..."
 FRA_Tax_Cuts_to_Defense_Companies: "Bajas de impuestos defensivas"
 FRA_Tax_Cuts_to_Defense_Companies_desc: "Dado que el reciente enfoque de laissez faire para nuestros problemas económicos ha sido el siguiente paso para lograr una economía de no intervención total es recortar los impuestos a las corporaciones que participan en nuestro sistema monetario. En particular, las empresas que participan en nuestro complejo militar-industrial recibirán los mayores beneficios en general, obviamente para garantizar que nuestras Fuerzas Armadas reciban solo lo mejor."
 FRA_Offer_American_Companies_Refuge: "Refugiar empresas estadounidenses"
 FRA_Offer_American_Companies_Refuge_desc: "Sin duda, la repentina guerra civil que surgió en Estados Unidos ha hundido no solo nuestra economía, sino también los mercados globales. Por terrible que haya sido para nosotros, ahora parece haber un rayo de esperanza, ya que antiguos gigantes de la industria norteamericana buscan ahora expandirse a los mercados europeos, y ¿quién mejor que nuestra orgullosa nación? Francia ha asumido el liderazgo en los esfuerzos de la Unión Europea para incorporar empresas que se vieron desproporcionadamente afectadas por la Segunda Guerra Civil Americana y, con suerte, retenerlas si este conflicto llega a su fin."
 FRA_Push_for_EU_Asian_Free_Trade: "Libre comercio UE-OTDP"
 FRA_Push_for_EU_Asian_Free_Trade_desc: "Tanto la Unión Europea como la Organización del Tratado de Defensa del Pacífico han sufrido duros golpes, ya que, con la salida del mercado estadounidense, tanto rusos como chinos han aprovechado esta oportunidad para imponer agresivamente sus intereses económicos a sus países vecinos. Para evitar estas agresiones conjuntas, se ha firmado un acuerdo comercial histórico entre las dos grandes potencias para demostrar al mundo que no tememos a estas superpotencias globales y que ya no dependemos de Estados Unidos."
 FRA_Strengthen_Anti_Corruption_Laws: "Reforzar leyes anticorrupción"
 FRA_Strengthen_Anti_Corruption_Laws_desc: "Por fin ha llegado el momento de un cambio real. Un cambio que repercutirá en el clima político, no solo de nuestro gobierno, sino de todo el panorama político. Nuestra administración impulsará varias leyes anticorrupción que acabarán con las lagunas legales que legisladores y burócratas han estado utilizando para eludir a la justicia. Francia demostrará a nuestra nación y al resto de Europa que somos defensores de la ley y que nadie está exento de rendir cuentas dentro de nuestras fronteras."
 FRA_Declare_Wartime_Measures: "Declarar medidas de guerra"
 FRA_Declare_Wartime_Measures_desc: "Con la arremetida de la agresión rusa en todo el mundo, finalmente nos damos cuenta de que no se pueden tomar medidas a medias contra estos matones. Francia dará el ejemplo, demostrando que estamos listos y dispuestos a combatir la agresión rusa y alentamos activamente al resto de Europa a seguir a Francia al frente del bastión antirruso que busca destruir nuestro modo de vida tal como lo conocemos."
 FRA_Utilize_Consumerism: "Aprovechar el consumismo"
 FRA_Utilize_Consumerism_desc: "Francia, en la era moderna, siempre ha favorecido el consumismo, especialmente desde antes de la pandemia. Ahora que la pandemia prácticamente ha terminado, le corresponde a nuestro gobierno animar a nuestra nación a retomar sus hábitos consumistas para ayudar no solo a reactivar nuestras empresas, sino también nuestra economía. Francia verá a sus apreciadas empresas prosperar como lo hicieron años atrás, antes de que esa terrible serie de acontecimientos casi hundiera la economía del país."
 FRA_Target_Oligarchs: "Oligarcas en la mira"
 FRA_Target_Oligarchs_desc: "Es hora de abordar una de las cuestiones más difíciles de nuestro sistema profundamente defectuoso. La cuestión de los oligarcas finalmente cobra protagonismo, ya que nuestra administración ha propuesto y aprobado múltiples proyectos de ley antioligárquicos para no solo frenar su influencia en nuestros sistemas político y económico, sino también acabar con ella de una vez por todas. La nación francesa y el resto de Europa deben saber que siempre velaremos por los intereses de nuestro pueblo y que el dinero no puede comprar ni influir en la maquinaria política francesa."
 FRA_Fraternite: "Fraternidad"
 FRA_Fraternite_desc: "A pesar de nuestra relativa paz en Europa, la guerra siempre es una certeza. Las crecientes tensiones nos han demostrado que solo un animal con dientes afilados es capaz de defenderse de los atacantes, y dada la incapacidad de nuestros aliados estadounidenses para contribuir a nuestra capacidad defensiva, sería más que razonable contribuir considerablemente a nuestro propio ejército. Sea cual sea el enemigo que surja, que se arrepienta de haber tocado Francia."
 FRA_Egalite: "Igualdad"
 FRA_Egalite_desc: "La igualdad económica es algo por lo que todos deberíamos luchar. Negar la acumulación de riqueza a alguien iría en contra de nuestros principios. Al mantener una línea firme entre la riqueza y la igualdad, podemos garantizar que nuestra gente tenga algo por lo que luchar: un futuro."
 FRA_Liberte: "Libertad"
 FRA_Liberte_desc: "Uno de los fundamentalismos fundamentales de Francia es la libertad. Desde que izamos la bandera tricolor, hemos comprendido que nuestro pueblo merece voz y es libre de expresarse sin castigo. Al centrarnos en nuestros ideales republicanos, ejercemos más influencia en nuestra política interna. Con la unidad llega la estabilidad, y si demostramos a nuestro pueblo que, a pesar de nuestras diferencias, podemos vivir juntos en libertad."
 FRA_Withdraw_from_Integrated_Military_Command: "Abandonar la Estructura de Mando Integrada"
 FRA_Assure_our_Allies: "Asegurar a los aliados"
 FRA_Military_Industrial_Program: "Programas militar-industriales"
 FRA_Redistribute_NATO_Funding: "Redistribuir aportes a la OTAN"
 FRA_A_New_Doctrine: "Nuevas doctrinas estratégicas"
 FRA_Civic_Construction_Plans: "Programas de construcción cívica"
 FRA_New_Stretegic_Concepts: "Nuevos conceptos estratégicos"
 FRA_Establish_Romanian_Forward_Operating_Bases: "FOBs en Rumania"
 FRA_A_European_Turkey: "Medicina al hombre enfermo"

 FRA_ML_N2H_tt: "Esto aumentará la lealtad de un general de £GFX_FRA_Neutral_with_Regime_texticon  §YNEUTRAL§! a £GFX_FRA_Happy_with_Regime_texticon  §GCONTENTO§!."

 france.7001.t: "¡Izquierda y derecha son los dos brazos de la opresión!"
 france.7001.d: "Arthaud y Daeninckx han formado sus propias mini facciones por que no les ha hecho gracia que hayamos derrocado el Gobierno. ¿Qué loco no?"
 france.7001.a: "¡Malditos sean!"
 france.7002.t: "Sobre la cuestión del gobierno militar"
 france.7002.d: "La noche era oscura, pero en la oficina del Palacio del Elíseo, el general Casanova trabajaba sin descanso, consumido en sus pensamientos sobre el futuro de Francia. Teniendo ya el control de toda la nación, con gobernadores y comandantes aceptando su autoridad, todavía quedaba una cuestión sin respuesta: cómo institucionalizaría su poder.\n\nDirigiendo su mirada a los lados de la oficina, donde una estante sostenía una muestra de la famosa estatua de Napoleón, él observó al conquistador iluminado por la luz lunar, esta fría luz blanquecina resaltaba su figura. Casanova se imaginó a si mismo vestido con ropajes militares, adornado con medallas y recibiendo saludos de los asistentes al desfile. El primer cónsul había usado la fuerza para restaurar el sistema republicano, garantizando la fuerza y prosperidad de Francia. ¿Por qué su estudiante no seguiría a su modelo?\n\nSintiéndose un poco adormilado, Casanova fue a por una taza de café para mantenerse despierto. Mientras esperaba que su asistente le llevase la bebida, sacó del cajón de su escritorio un volumen de los trabajos seleccionados de Stalin para pasar el rato. Este secretario general georgiano fue, sin duda, un hombre con gran talento. Stalin consolidó y reconstruyó el legado de Lenin, y fue responsable de que el primer gobierno comunista del mundo fuese uno muy eficiente. ¿Cómo podía Casanova, quien se jactaba de ser el nuevo líder revolucionario, no sentirse envidioso?\n\nCasanova sorbió el humeante líquido negro mientras calculaba su próximo movimiento. Tras un instante, agarró su bolígrafo y firmó su última orden del día."
 france.7002.a: "La situación requiere fuerza y seguridad"
 france.7002.b: "¿Cómo podemos afirmar que representamos la voluntad popular sin formar un gobierno civil?"
 france.7003.t: "¡La oposición de derecha se alza contra nosotros!"
 france.7003.d: "evento sin usar lol"
 france.7003.a: "¡Malditos sean!"
 france.7004.t: "Juicio al bloque de Daeninckx"
 france.7004.d: "Inicio de las purgas internas comunistas francesas"
 france.7004.a: "No son más que saboteadores."
 france.7005.t: "Juicio al bloque de Arthaud"
 france.7005.d: "Muerte total a los trotskistas"
 france.7005.a: "Primero como tragedia, después como farsa"
 france.7006.t: "Sobre la cuestión del federalismo"
 france.7006.d: "El federalismo es inexistente en Francia pero Casanova quiere montar su dictadura al estivo soviético"
 france.7006.a: "¡Sigamos el ejemplo soviético!"
 france.7006.b: "Olvídalo, el federalismo lleva siendo irrelevante desde la primera revolución."
 france.7007.t: "¡Asistencia económica francesa!"
 france.7007.d: "Nuestros grandiosos camaradas franceses, en su espíritu de solidaridad internacionalista comunista, nos han otorgado una generosa ayuda para apoyar la reconstrucción de nuestra industria. Por culpa del reciente fracaso militar contra la amenaza fascista del este y la reciente revolución contra la anterior clase dirigente capitalista, nuestra industria ha estado en ruinas.\n\nAfortunadamente, nuestros camaradas franceses han escuchado nuestras súplicas de ayuda y nos van a asistir económicamente para que podamos reconstruir nuestras fábricas y áreas industriales, generando trabajos para nuestro pueblo y reactivar nuestra economía. Junto a nuestros camaradas franceses, ¡reconstruiremos nuestra nación y avanzaremos hacia una mayor unidad de clase y lucharemos conjuntamente contra el capitalismo y el imperialismo!"
 france.7007.a: "¡La unión hace la fuerza!"

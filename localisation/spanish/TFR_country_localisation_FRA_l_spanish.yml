 FRA_negotiations_fail_idea: "Fracaso en la mesa"
 FRA_negotiations_fail_idea_desc: "Con los radicales de los Gilets Jaunes, se hace evidente que una solución cooperativa a sus constantes protestas y disturbios es imposible. Sus incesantes disturbios y la destrucción incesante de Francia han durado demasiado tiempo. Nuestro gobierno está elaborando nuevas soluciones para sofocar rápidamente a estos radicales, pero hasta entonces, Francia debe presenciar cómo su capital es destrozada e incendiada."
 FRA_faith_in_the_goverment: "Fe en el Gobierno"
 FRA_faith_in_the_goverment_desc: "En un giro inesperado de los acontecimientos, el Gobierno ha decidido que su prioridad eran las necesidades del pueblo francés. Las negociaciones con los Gilets Jaunes han concluido con el Gobierno aceptando todas las condiciones impuestas por el movimiento. Aunque impopular entre los sectores conservadores del Gobierno, la decisión fue aprobada por mayoría debido a la situación crítica en la que se encontraba Francia. Como resultado de esta acción radical, el movimiento ha cesado sus protestas y ha dado paso a celebraciones en todo el país por las nuevas reformas conseguidas."

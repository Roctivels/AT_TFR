 france.295.t: "Estrellas en la noche francesa"
 france.295.d: "En una noche silenciosa en Montparnasse, Étienne Lemaire y Sophie Dupont encendieron un fuego dentro de un barril metálico en un estrecho callejón. Las llamas danzaban en las paredes de ladrillo, proyectando sus sombras. Étienne sostenía una Biblia con adornos dorados, mientras Sophie hojeaba una traducción desgastada del Corán, ambos heredados de sus abuelos devotos.\n\n\"Mira esto,\" dijo Étienne, recorriendo con el dedo las páginas de la Biblia. \"Cada palabra es una cadena que sofoca la imaginación. De verdad piensan que pueden reprimir el espíritu humano?\" Arrojó la Biblia al fuego, y Sophie hizo lo mismo con el Corán. Las páginas se retorcían en las llamas, las letras doradas retorciéndose como prisioneras en tormento.\n\n\"Lo llaman blasfemia, pero ¿no es un pecado mayor atrapar la pasión de la vida en estas páginas envejecidas?\" dijo Sophie, sacando más textos religiosos de su bolso. El olor a papel quemado se mezclaba con la tenue fragancia de rosas silvestres. Al otro lado del callejón, la luz de un café alargaba sus sombras.\n\nSophie sacó un boceto de su bolsillo, lo rompió en pedazos y los arrojó al fuego. \"El arte no debería estar confinado al papel; debe renacer a través de la destrucción\". La luz del fuego se reflejaba en su rostro pálido, haciéndola parecer a la vez rebelde y sacerdotisa. Mientras la última página se convirtió en ceniza, una campana lejana dio la medianoche."
 france.295.a: "Ellas se quedaron viendo mientras las llamas se extinguían lentamente."
 france.296.t: "Ecos del pasado"
 france.296.d: "\"Tengo noventa y siete años\", comenzó Paul Duval, de pie en el podio del salón conmemorativo. Su mano arrugada rozó suavemente las medallas de su pecho. \"En aquel entonces, en el campo de batalla, los jóvenes luchamos para defender los ideales de la República. La libertad, para nosotros, no era un concepto abstracto, sino una creencia por la que valía la pena dar la vida\".\n\nHizo una pausa, su mirada recorrió los rostros jóvenes de la audiencia. \"Pero hoy, veo algunas señales preocupantes. Algunos dicen que la democracia está anticuada, otros abogan por un hombre fuerte que nos lidere. Jóvenes, estos eran los mismos argumentos que escuchamos en 1940. Los apaciguadores de entonces decían las mismas palabras.\n\n\"Puede que piensen que soy solo un viejo divagando sobre el pasado. Pero recuerden, la historia nunca se repite exactamente, siempre regresa con un nuevo disfraz. Los fascistas de hoy no vestirán uniformes militares; se pondrán trajes, hablarán con elocuencia y les prometerán un futuro «mejor»\".\n\n\"Mi tiempo se acaba, pero el futuro de Francia les pertenece a ustedes. La libertad y la igualdad que nuestra generación pagó con sangre están ahora en sus manos. No se dejen llevar por palabras que buscan engañar. No reemplacen la razón y la tolerancia con el odio y los prejuicios. No permitan que los sacrificios de quienes murieron por la libertad sean en vano.\n\n\"Recuerden, el verdadero patriotismo no se trata de odiar a los demás, sino de valorar los principios que compartimos. La grandeza de Francia no reside en su fuerza militar, sino en el espíritu que representa\"."
 france.296.a: "Una república, si pueden conservarla..."
 france.297.t: "Reunificación familiar"
 france.297.d: "La habitación estaba oscura, tenuemente iluminada por un cigarrillo Gauloises que ardía en el cenicero. Jean-Marie Le Pen se sentó junto a la mesa de madera ornamentada, tamboreando rítmicamente con su superficie. Al otro lado de la mesa, Marine, vestida con un bléiser, tomaba su café despreocupadamente, agotada tras tantas reuniones y mítines.\n\n\"Entonces,\" empezó Jean-Marie, con todo grave, \"crees que me has superado\".\nMarine alzó una ceja, sin inmutarse. \"Padre,\" dijo para romper el hielo, \"no te estoy abandonando. Es simplemente que estamos evolucionando. La gente ya no quiere escuchar discursos abiertamente racistas. Prefieren... sutileza.\"\n\n\"¡¿Sutileza?! gritó Jean-Marie, casi cayéndose de la silla. \"¿Así lo llamas? ¿Atraer a los débiles? ¿Diluir el mensaje que ha construido el partido de nuestra familia?... Y aún así,\" dijo tras exhalar una bocanada de humo, \"sigues manteniendo mi sombra a tu lado. Cada discurso, cada programa, cada política, tu madre lo consideraría una imitación.\"\nMarine, con una sonrisa burlona, le respondió: \"Una imitación no, una corrección\".\nEl anciano se rio, produciendo un sonido similar a la grava cayendo colina abajo. \"Bueno renacuaja,\" dijo mientras apagaba su cigarrillo con un brusco movimiento, \"si vas a corregirme, al menos hazlo bien\"."
 france.297.a: "Le familia... Le caos."
 france.298.t: "Touche pas à mon poste!"
 france.298.d: "Cyril Hanouna termina su introducción nocturna como lo ha hecho durante años antes de invitar a sus invitados, esta noche tiene un invitado increíblemente especial.\n\nEl general de brigada Pierre Schill.\n\n\"¡Demos la bienvenida al general Pierre Schill!\" exclama el presentador franco-tunecino entre aplausos del público del estudio, el general sale en uniforme, su quepis de oficial brillando bajo la luz del estudio. El general Schill sonríe ampliamente y toma asiento.\nSchill sabe que Hanouna es un comediante, destinado a hacer reír a la multitud y a la nación, e invitar a un oficial del ejército a tu programa significa que debes tener cosas divertidas que decir, el general sonríe con incomodidad mientras Hanouna comienza a hablar.\n\nAl principio es normal, pero luego se dirige hacia los aliados de Francia, y finalmente el foco se centra en Alemania. \"¿Qué hay de la Bundeswehr?\" pregunta Schill. \"Bueno, es pequeña, ¿no crees? ¡Ja!\" bromea Hanouna, Schill se mueve inquieto, es un oficial importante en el comando de la OTAN y sus palabras podrían agriar las relaciones entre las dos naciones.\n\nSu respuesta tiene mucho peso, duda, siente las luces del estudio en su cara, e inhala..."
 france.298.a: "\"No siempre se trata de números, Cyril\"."
 france.298.b: "\"Creo que podrían tener un poco menos de miedo de sí mismos\"."
 france.299.t: "Liquidación lionesa"
 france.299.d: "Los chalecos amarillos lo han vuelto a hacer: otra gran protesta ha desbordado a la fuerza policial desplegada para contenerlos, corren libremente, una calle que antes se mantenía libre de protestas por temor a la destrucción ahora se les abrió mientras la policía huía a puntos de repliegue, las líneas se rompieron, las protestas se fusionaron, los organizadores perdieron de vista de quién era la protesta de quién mientras la anarquía consumía las calles de Lyon.\n\nDos grupos convergen frente al ayuntamiento de Lyon, uno sostiene rocas, martillos, el otro sostiene sus pancartas arrugadas por días de protesta constante. Una roca atraviesa la ventana, un manifestante grita \"¡No! ¡Respeten las oficinas! ¡La gente trabaja allí!\" Y el otro grupo responde golpeando la puerta principal con un martillo.\n\"¡Entonces no deberían trabajar para el tirano!\" Y otro cristal se rompe.\n\nEl grupo pacífico se para frente a la puerta, dispuesto a evitar el saqueo del edificio.\n\"¡MOLOTOV!\" Grita uno, y se lanzan desde las escaleras, la entrada se incendia, la puerta arde en cuestión de segundos. Observan con horror cómo sus compañeros trepan por las ventanas y salen con televisores, teléfonos, ordenadores. Saben que cientos han sido privados de sus medios de vida durante los próximos meses, una tragedia ha ocurrido para el trabajador este día, incluso si es en busca de un cambio."
 france.299.a: "Todo lo que puedes hacer es mirar."
 france.300.t: "Nuestro legado en África..."
 france.300.d: "La relación entre Francia y África es... complicada, por decir lo menos.\n\nNuestra colonización de África fue, sin duda, un período desafortunado en ambas historias. El legado de la colonización permanece en África en el sentido de que África sufre de inestabilidad debido a fuerzas antidemocráticas, padece pobreza económica y crisis de salud.\n\nDebido a esto, muchos en nuestro Gobierno sienten que es nuestra responsabilidad corregir los errores que cometimos. Afirman que es nuestra culpa que África haya sufrido tanto. Para ello, debemos apoyar el desarrollo de África ayudando y respaldando las democracias locales y deteniendo la propagación del extremismo y las autocracias.\n\nPero Francia no es unánime. Muchos creen que tiene poco sentido hacer esto, ya que la mayoría de las veces, en la búsqueda de detener las dictaduras, el país ha quedado en un estado peor que antes, como en el caso de Libia. No niegan que hay mucho que ganar de África, principalmente su rica abundancia de recursos naturales. Sin embargo, no hay necesidad de enredar aún más a Francia en conflictos más costosos que nunca parecen terminar. En cualquier caso, cualquier camino que elijamos decidirá nuestro futuro en África."
 france.300.a: "¡Somos los campeones de la democracia en el tercer mundo!"
 france.300.b: "Estamos allí por nuestros intereses nacionales, nada más."
 france.301.t: "Cabecillas sindicales acusados de corrupción"
 france.301.d: "En un giro inesperado, pero no particularmente sorprendente, muchos de los principales líderes sindicales de Francia han sido acusados de corrupción. El mal uso de fondos, sobornos, blanqueo de dinero y fraude general han salido a la luz. A pesar de la abundante evidencia tanto de la imparcialidad del tribunal como de la validez de las pruebas, muchos de los partidarios de los diversos sindicatos han salido a protestar contra lo que llaman un ataque a los trabajadores y una clara señal de extralimitación gubernamental a favor de las grandes empresas. Muchos de estos manifestantes han recurrido a la violencia y se puede ver humo elevándose en muchas ciudades de Francia. Incluso con el despliegue de las CRS para una represión, es probable que no se extinga por completo hasta que los involucrados pierdan interés."
 france.301.a: "Otra rabieta antes de acostarse."
 france.304.t: "Colores oscuros para una era oscura"
 france.304.d: "Emmanuel Macron estaba sentado en su oficina en París. Era un día espléndidamente luminoso, y el miraba fijamente una bandera a lo lejos.\n\n\"Debería ser más oscura\", dijo, distraídamente para sí mismo. \"Me gustaría que fuera más oscura, se confunde demasiado con el cielo. Ve a buscar una de las más oscuras y haz que la izen, ve\", dijo, haciendo un gesto a un Guardia Presidencial."
 france.304.a: "\"¡Así será!\""
 france.304.b: "\"Eh... ¿No creo que puedas hacer eso?\""
 france.305.t: "Bardella habla sobre la libertad de expresión"
 france.305.d: "Recientemente Jordan Bardella, un político conservador, ha estado difundiendo su mensaje por la libertad de expresión por numerosos medios de comunicación. Ha realizado numerosas iniciativas parlamentarias para cambiar las leyes que limitan la libertad de expresión en Francia. Si bien es una causa noble, los medios han cuestionado las verdaderas intenciones de Bardella, pues este inicio su cruzada en favor de la libertad de expresión poco después de que el partido Identitario, de extrema derecha, fuese ilegalizado por el gobierno francés."
 france.305.a: "Paso uno..."
 france.306.t: "Emergencia nacional declarada"
 france.306.d: "A causa del caos generalizado que se vive en el nuevo mandato del presidente reelecto de la República Francesa, Macron ha declarado un estado de emergencia nacional y ha invitado a la Agrupación Nacional, de tendencia conservadora, a formar parte del gobierno con el fin de volver a la normalidad.\n\nSi bien esta decisión fue criticada por miembros de la coalición e incluso miembros de su propio partido, Macron defiende que es una medida necesaria en estos tiempos difíciles  para asegurarse de que Francia no vuelva a caer en una crisis aún más profunda y en conflictos civiles.\n\nSolo el tiempo dirá lo que saldrá de este acuerdo. La arena cae a medida que se acerca la hora de una decisión final. No importa lo que pase al final en el futuro, el destino está limitado a unos pocos caminos."
 france.306.a: "Ha llegado nuestro momento de brillar..."
 france.307.t: "Júpiter cae"
 france.307.d: "Hoy, sumido en la derrota, Emmanuel Macron anunció públicamente a toda la nación su dimisión y el nombramiento, en su lugar, del conservador Jordan Bardella como nuevo presidente de Francia. Tras la reciente declaración del estado de emergencia y la disolución del gobierno de Macron, era cuestión de tiempo que llegase este momento... después de todo, su control sobre el gobierno desaparecía poco a poco e incluso su propio partido exigía su dimisión por la tiránica declaración de la ley marcial. Ahora, Jordan Badrella tiene la oportunidad de convertirse en el salvador de Francia, el hombre que salvará a la nación gala de las hordas eslavas."
 france.307.a: "y Marte ocupa su lugar..."
 latinist.1.t: "Filtrar los escombros"
 latinist.1.d: "El camino hacia el renacimiento nacional se ha convertido en una cuestión histórica ineludible. Desde que Francia completó su transformación en un Estado nacionalista, los debates sobre el rumbo futuro de la nación han estallado en todos los niveles de la sociedad. Las llamas de la guerra y la revolución han reducido el antiguo orden a cenizas y ahora, sobre esta tierra arrasada, debemos decidir cómo reconstruir nuestra patria.\n\n La primera perspectiva maneja que nos levantaremos como un fénix. Simpatizantes de esta idea creen que el sufrimiento de Francia fue una prueba necesaria, una purificación del espíritu nacional. Ven las dificultades actuales como un paso crucial hacia un gran resurgimiento, enfatizando la virtud del sacrificio y el significado de la perseverancia. Para ellos, solo a través de un completo renacimiento espiritual puede Francia emerger de la sombras de la historia y marchar hacia un futuro radiante.\n\nLa segunda perspectiva proclama que las glorias pasadas deben ser revividas. Aquellos que se adhieren a este ideario se hunden en la nostalgia por el pasado dorado de Francia. Sea por los triunfos militares durante la época Napoleónica o el florecimiento cultural de la Tercera Republica. Enfatizan la continuidad y superioridad de la civilización francesa, advocando para un retorna a valores y instituciones tradicionales como la llave para reclamar la posición merecida de Francia en el mundo.\n\nLa tercera perspectiva afirma que nuestra sangre debe ser purificada. Sus adherentes culpan que la decadencia francesa ha ocurrido por la contaminación del linaje nacional, alentado a políticas poblacionales estrictas para lograr la supuesta puridad étnica.\n\nAhora que la nación esta encrucijada, estas visiones rivales van a moldear el destino de Francia en los años venideros."
 latinist.1.a: "Nos alzaremos cual ave fénix"
 latinist.1.b: "Las glorias pasadas renacerán."
 latinist.1.c: "Nuestra sangre sera purificada."
 latinist.2.t: "El pueblo latino..."
 latinist.2.d: "En una era corrompida por el escepticismo y un internacionalismo sin alma, es tiempo de elevar nuestra verdadera voz, para proclamar nuestra inquebrantable fe nacional. La modernidad esta destruyendo el alma de Francia, y en este caos, debemos reclamar el orgullo y dignidad de la gente latina.\n\nMira nuestra historia, sin Francia, no existiría una Europa de verdad. Cuando Roma cayo, fuimos nosotros los que preservamos la llama de la sabiduría clásica. Fue desde nuestras tierras que la Ilustración nació, con la Sena siendo la cuna de donde la razón y la libertad se esparció por el mundo. Los alemanes y anglosajones? Meres rezagados a la civilización, sus tan llamadas contribuciones culturales no son nada que patéticas imitaciones de nuestro gran patrimonio. ¡La civilización europea es latina, y es Francesa!\n\nCuando el águila de Napoleón se alzo sobre Moscú, Madrid y Berlín, el mundo tembló ante la unidad de la nación Francesa. Nuestros ejércitos era imparables, nuestras leyes remodelaron un continente entero. Una y otra vez, la historia prueba que lo que necesitamos no es debilidad, no son los debates eternos, pero acción decisiva y una liderato resuelto. ¡Solo al revivir nuestro legado de hierro y gloria podremos renacer una vez mas en el caos del mundo moderno!\n\nMira a la Europa del hoy, vemos una verdad aplastante: en la gran table de ajedrez del poder global, las naciones blancas de Europa se enfrentan a un desafío casi imposible. No podemos tener división, ni perder el tiempo en culpa mutua. Desde Irlanda hasta los Urales, desde Escandinavia hasta el Mediterráneo, todos tenemos un destino conjunto, Francia se debe reconocer a si misma como una parte de este conjunto mayor. Nuestro conflicto es el conflicto de toda la gente europea. Solo atreves de la unidad podremos defender nuestras tradiciones, nuestra manera de vivir, y nuestra civilización contra amenazas externas."
 latinist.2.a: "Son el corazón de la civilización europea."
 latinist.2.b: "Fueron unidos de nuevo bajo la autoridad napoleónica"
 latinist.2.c: "Son solo un engranaje en la Raza Blanca"
 latinist.3.t: "Nuestra conexión con el pasado..."
 latinist.3.d: "Los traidores bien vestidos del pasado envenenaron a nuestra juventud, enseñándoles a despreciar su propia historia, a despreciar su propia cultura y a cuestionar su propio linaje. Pero la hora del despertar ha llegado. Recuperaremos nuestra gloria robada, repararemos la cadena rota de la historia y restauraremos lo que fue borrado deliberadamente.\n\nLa clase dominante ha adormecido el espíritu de la nación con la ilusión de la prosperidad, pero solo nosotros todavía sentimos el dolor de la traición. Torcieron nuestra historia, enseñándonos a avergonzarnos de la grandeza de nuestros ancestros. ¿Pero debemos disculparnos por difundir la civilización? ¡No! Rechazamos esta mentalidad servil y de autodesprecio: ¡la llama de la juventud latina nunca se extinguirá!\n\nWaterloo no debe ser nuestra vergüenza, debe ser nuestra bandera de desafío. Esa derrota no fue un fracaso de Francia, sino una conspiración de cobardes, donde toda Europa se unió para derribar a una nación. Sin embargo, incluso en la hora más oscura, los soldados franceses gritaron el nombre del Emperador, eligiendo la muerte antes que la rendición. Su sangre corre por nuestras venas, su espíritu todavía camina por esta tierra.\n\nCuando los salvajes hunos asaltaron las puertas de Europa, ¿quién se opuso a ellos? Nuestros ancestros. Cuando los vándalos asolaron el Mediterráneo, ¿quién reconstruyó el orden? Nuestros reyes. Cuando las hordas mongolas buscaron consumir toda Europa, ¿quién levantó el baluarte de la civilización? Nosotros lo hicimos.\n\nDebemos reclamar este legado oculto, porque solo sabiendo quiénes somos podemos determinar hacia dónde debemos ir. La historia no espera a los indecisos. La gloria pertenece solo a aquellos lo suficientemente audaces como para seguir los pasos de sus ancestros. El destino de Francia está en nuestras manos, y las decisiones que tomemos hoy darán forma a la Europa del mañana."
 latinist.3.a: "Somos la juventud descontenta"
 latinist.3.b: "Somos los soldados de Waterloo"
 latinist.3.c: "Somos los asesinos de hunos, vándalos y mongoloides"

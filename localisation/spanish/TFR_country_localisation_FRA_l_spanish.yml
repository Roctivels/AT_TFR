 FRA_anti_islamism: "Protestas antiislamistas"
 FRA_anti_islamism_desc: "Dado que la afluencia de refugiados de Medio Oriente no ha hecho más que aumentar tras el estallido de la guerra civil saudita, el número de protestas contra estos grupos se ha disparado. Si bien sus ideologías varían, estos grupos comparten la creencia de que se debe denegar la entrada a estos solicitantes de asilo principalmente debido a sus creencias religiosas. Si bien estos grupos siguen estando más vinculados a la derecha política, debemos encontrar mejores maneras de integrar o controlar la tasa de inmigración o corremos el riesgo de que estas protestas se conviertan en herramientas de radicalización que socaven la confianza pública en nuestras sagradas instituciones democráticas."
 FRA_Oil_Crisis: "Crisis del petróleo"
 FRA_Oil_Crisis_desc: "Con la guerra civil saudita, la península arábiga ha perdido la estabilidad que había alcanzado previamente, sumiendo al subcontinente en una mayor inseguridad e inestabilidad en toda la región. El fin inmediato de la guerra civil no parece inminente, y sus efectos se sienten de inmediato. La posibilidad de obtener petróleo a través de otro país no está actualmente a nuestro alcance, ya que tanto Rusia como Venezuela están sujetas a embargos occidentales, y eludir estos embargos dañaría nuestra imagen internacional. Hasta que podamos asegurar una fuente confiable de petróleo, seguiremos sufriendo las consecuencias de la conquista del poder por parte de Arabia Saudita."

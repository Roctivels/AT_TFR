 FAF_full_employment_idea: "Pleno empleo"
 FAF_full_employment_idea_desc: "Finally, after years of trial and error, we have achieved a national \"Full Employment\" rate among our people. In doing so, most of our citizens have found themselves in careers that ensure high living standards that push them to give their all to our nation and its economy. Of course, this has meant issues regarding our manpower pools for conscription and the complaints of businesses no longer able to take advantage of cheap foreign labor. But for our citizens and especially our propaganda, the achievement of having work for all is nothing to scoff at!"

 FPR_The_Soft_Revolution: "El reinado de las rosas"
 FPR_The_Soft_Revolution_desc: "Didier Daeninckx ha tomado con éxito el poder dentro de nuestra nación, y con su ascenso al liderazgo promete un futuro pacífico para todos los franceses. Existe la ilusión de que el socialismo solo se puede lograr por medios violentos, pero sabemos que no es así. Daeninckx traerá pacíficamente un trocito de utopía a Francia y mostrará al mundo las recompensas que la positividad y la pasividad pueden cosechar."
 FPR_The_Soft_Revolution_tt: "§YSe desbloquearán decisiones para§! §plograr la utopía§!"
 france.9002.t: "Destino Utopie"
 france.9002.d: "Si Daeninckx y su Gobierno quieren construir una utopía en Francia, tendrán que cumplir dos objetivos.\n\nEn primer lugar, deberán reformar el Gobierno y, más concretamente, las leyes de [ROOT.GetNameDef]. Si bien la mayoría del gobierno apoya estas reformas, aplicarlas en un corto periodo de tiempo tendrá un coste significativo en poder político. Y si queremos conservar el mayor poder político posible, sería buena idea sacar provecho de las numerosas ideas de Daeninckx.\n\nEn segundo lugar y más importante, debemos alcanzar un grado de desarrollo digno de una utopía. La reforma legislativa nos ayudará en esto, pero no será la única herramienta con la que contemos.\n\nEn pocas palabras, para construir una utopía basta con aplicar una legislación ideal y alcanzar un nivel alto de desarrollo."
 france.9002.a: "Allons-y!"
 FPR_Artistic_Revolution: "Revolución artística"
 FPR_Artistic_Revolution_desc: "En el mundo de hoy, lleno de guerra y miseria, la belleza es algo que se encuentra cada vez en menos lugares. No obstante, sigue ahí, y hay personas a las que se les da bien encontrarla. Desde que instauramos nuestro Gobierno en Francia, las artes han florecido por todo el país, y parece ser que estamos a las puertas de un nuevo renacimiento."
 FPR_Technosocialism: "Tecnosocialismo"
 FPR_Technosocialism_desc: "Con el inicio de esta nueva era, el socialismo tradicional ya no se puede poner en práctica. Cada vez menos personas trabajan en los campos y en las fábricas para dejar paso a las máquinas. ¿Por qué obligar a nuestro pueblo a trabajar de sol a sol de forma innecesaria? Sacaremos a nuestros pueblos de estos sectores y los emplearemos en trabajos en donde puedan tener una mejor calidad de vida."
 FPR_Cultural_Revolution: "La Revolución Cultural"
 FPR_Cultural_Revolution_desc: "Durante muchos años, la cultura francesa giró en torno a la existencia de la burguesía. Ahora que trabajamos para superar el capitalismo y eliminar a la burguesía, también deberemos cambiar nuestra cultura. Hemos visto el germen de una revolución cultural, una que está estructurada en torno a la gente de a pie de esta nación, no en los ricos."
 FPR_Peace_Bread_and_Equality: "Paz, pan e igualdad"
 FPR_Peace_Bread_and_Equality_desc: "La utopía no es un objetivo imposible, y es mucho más simple de lo que te han hecho creer. Comida sobre tu mesa, vecinos amigables y un sistema que te trata igual que a los demás, una utopía es algo tan simple como eso. Debemos trabajar para que se haga realidad, el pueblo francés se lo merece."
 FPR_Embrace_Passivity: "Abrazar la pasividad"
 FPR_Embrace_Passivity_desc: "Para el pueblo, la guerra es sinónimo de sufrimiento y horror. En esta los pobres pierden a sus seres queridos y los ricos, en cambio, se llenan los bolsillos. De ahora en adelante, Francia ya no será un país conocido por su poder militar o tendencias nacionalistas, ¡seremos conocidos como una nación pacífica y próspera! "
 FPR_embrace_passivity_idea: "Passivité Militaire"
 FPR_Artisinal_Politics: "Artesanía política"
 FPR_Artisinal_Politics_desc: "Hay un viejo refrán que dice así: \"Para que hacerte marinero cuando puedes ser un político, son básicamente lo mismo\". Este refrán se mantiene relevante en la actualidad, pues la política es un caos. Es fea, pero no tiene que ser así necesariamente. Al igual que muchas cosas, la gobernanza es, en el fondo, arte, y nosotros nos aseguraremos de que sea tan bonita como lo es la pintura y la poesía."
 FPR_The_Revolutionary_Artist: "Revolucionar los medios franceses"
 FPR_The_Revolutionary_Artist_desc: "Los medios de comunicación son un sistema corrupto utilizado por los enemigos del pueblo para mentirle. Si bien la tentación de usar medios estatales para manipular a la gente existe, no cederemos a ella. Nos aseguraremos de que los medios solo digan la verdad, no la \"verdad\" que algunos quieren que el público escuche."
 FPR_The_Poet_of_the_Revolution: "Poeta de la revolución"
 FPR_The_Poet_of_the_Revolution_desc: "Separados, la voz del pueblo tiende a ser eclipsado, pero cuando el pueblo trabaja al unísono, puede lograr cosas maravillosas. Desafortunadamente, también tiende a luchar entre sí. El pueblo no necesita un líder, necesita una voz. Daeninckx será esa voz, se reunirá con el pueblo, escuchará todas y cada una de sus preocupaciones y se asegurará de que no les falte alimento. Es lo menos que se merecen."
 FPR_poet_of_the_revolution: "Poeta de la revolución"
 FPR_Vanguard_of_Peace_and_Porsperity: "Vanguardia de la paz y la prosperidad"
 FPR_Vanguard_of_Peace_and_Porsperity_desc: "Desde nos hicimos con el control de Francia, finalmente ha llegado la calma después de la tormenta. La delincuencia es baja, la calidad de vida está aumentando y el pueblo está feliz con su vida. Aún así, todavía son muchos los que quieren despojarnos de nuestro pedacito de cielo, por lo que tenemos que seguir alerta y mantenernos a flote en un mar de enemigos."
 FPR_Vanguard_of_Peace_and_Porsperity_tt1: "Probabilidad basada en la popularidad actual de [ROOT.GetRulingPartyLong]"
 FPR_Vanguard_of_Peace_and_Porsperity_tt2: "La probabilidad se basa en la popularidad actual del partido más popular afuera del Gobierno."
 FPR_The_Art_of_Politics: "El arte de la política"
 FPR_The_Art_of_Politics_desc: "Cooperación, discusiones, acuerdos públicos y no tan públicos, te encontrarás todo eso y más en la política. Debemos ser cuidadosos de no alterar excesivamente el funcionamiento del aparato estatal, no sea que enfademos al pueblo. Es por eso que debemos bailar a su ritmo, mientras nos aseguramos que seamos nosotros los que elijamos la canción que sonará en la gramola."
 FPR_The_Art_of_Politics_idea: "Danza política"
 FPR_The_Art_of_Politics_idea_tt: "Coste de todos los £political_advisor_cost_texticon ministros:§G-10%§!\nCoste de todas las £economy_laws_cost_texticon leyes económicas: §G-10%§!\nCoste de todas las £conscription_laws_cost_texticon leyes de reclutamiento: §G-10%§!\nCoste de todas las £economy_laws_cost_texticon leyes sociales: §G-10%§!"
 FPR_Peace_through_Defense: "Garantizar un milenio de paz"
 FPR_Peace_through_Defense_desc: "Por mucho que queramos dejar de lado nuestras diferencias con nuestros enemigos, este sentimiento no es correspondido por ellos. Nuestra paz se encuentra amenazada por todos los frentes, por lo que, aunque suene hipócrita, debemos estar listos para defenderla. Si todo sale bien, el pueblo francés nunca volverá a sufrir los horrores de la guerra. En el peor de los casos, solo tendrán que pasar por el calvario una última vez."
 FPR_utopia_category: "Destino §pUtopie§!"
 TFR_utopia_scripted_gui_desc: "Didier Daeninckx ha prometido al pueblo francés una utopía basada en los principios socialistas, y hará todo lo que esté a su mano para cumplir su promesa.\n\nCon el fin de alcanzar nuestros objetivos, debemos §Yreformar nuestras leyes§! y §Ydesarrollar§! nuestra nación para que esta esté a la altura de una utopía.\n\nSi bien puede que lleve muchos años de arduo trabajo, cuando eventualmente completemos nuestro objetivo, podremos decir al resto del mundo:\n\n§GLa utopía es real, se llama Francia y es socialista§!"
 TFR_utopia_scripted_gui_desc_two: "§pProgreso a través de la utopía§!"

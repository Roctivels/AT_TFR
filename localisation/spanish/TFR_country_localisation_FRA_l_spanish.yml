 france.291.t: "La tos risueña"
 france.291.d: "\"Permítanme contarles algo divertido\", comenzó Jean-Paul Duval, bajo los focos de un club de comedia, con una sonrisa cálida y acogedora. \"Ayer, vi cómo dos marchas de protesta chocaban en los Campos Elíseos. El grupo provacunas gritaba: «¡Por Francia, debemos vacunarnos!», mientras que el grupo antivacunas vociferaba: «¡Por Francia, debemos rechazar las vacunas!». Qué irónico: ambos bandos afirman amar el mismo país, pero con gusto echarían al otro de él\".\n\n\"Los antivacunas llamaron a los provacunas «cómplices de la tiranía», y los provacunas acusaron a los antivacunas de ser «agentes del caos». Al final, se convirtió en una pelea. Y pensé, si todos aman tanto a Francia, ¿por qué no se reúnen en un café, disfrutan de un cruasán y se acusan mutuamente de traición con un café? Al menos eso se sentiría más... francés, ¿no?\"\n\nJean-Paul hizo una pausa, su rostro reflejaba una falsa contemplación. \"Lo más extraño es que ambos bandos afirman que el otro está lavado de cerebro. Me recuerda a mis vecinos. Los de la izquierda dicen que me han lavado el cerebro los de la derecha, y los de la derecha dicen que me han lavado el cerebro los de la izquierda. Así que decidí mudarme al piso de arriba. Ahora, solo dicen que estoy por encima de todo\".\n\nLa multitud estalló en carcajadas. \"Así que\", levantó su copa,\" brindemos por Francia. Por un país con la revolución en su ADN, por una nación que incluso convierte las discusiones en una forma de arte\"."
 france.291.a: "\"Si ya ni siquiera podemos discutir con elegancia, ¿seguimos siendo franceses?\""
 france.292.t: "Eurasianismo de Occidente"
 france.292.d: "\"Rodolphe Prudhomme, por favor, suba al estrado\". anunció un secretario del partido Les Identitaires que estaba sobre el podio.\n\nRodolphe Prudhomme era un miembro respetado y veterano del Bloc, habiendo tenido éxito en promover el crecimiento del movimiento en su ciudad natal, Burdeos, durante años. Hoy, él dirigiría la sesión inaugural de un encuentro en la comuna de Talence, el area de reunión situada justo al lado de un parque público. Sería una buena manera de atraer tanto atención negativa como positiva, además de definir la estrategia del movimiento en la región para el trimestre anual que se avecina. \nTras escuchar su nombre, Rodolphe subió al podio, saludó al secretario y empezó a hablar. El rigor y la tenacidad con los que hablaba, a pesar de su edad, eran una de las muchas razones de su meteórico ascenso en el partido. Hablaba con el entusiasmo de los revolucionarios y mártires del siglo veinte que lucharon antes que él, contrastado con la sabiduría y el discernimiento que la nueva generación posterior a él necesitaría. La multitud lo aplaudía mientras hablaba sobre la afluencia de migrantes turcos, magrebíes y subsaharianos en el Grand Parc, quienes se habían convertido en mayoría. \nEventualmente, concluyó su discurso, cediendo el escenario a Léon Duverger, un miembro mucho más joven e inexperto del partido. Esta fue una decisión deliberada, destinada a simbolizar una especie de «paso de la antorcha» entre los mayores y los jóvenes. Lo que él no sabía era lo ampliamente que se burlaba la gente de Léon debido a su sistema de creencias inconsistente y, a veces, cómico, así como por su vocabulario bastante desagradable. \nA pesar del desprecio de sus camaradas, Léon subió al escenario y comenzó su discurso. \n\n\"Amigos y hermanos, me gustaría comenzar respondiendo a la estrategia del señor Prudhomme en el Departamento de Gironda. Sin faltar al respeto al gran hombre en sí, ¿cómo puede el eurasianismo de Occidente alcanzar su objetivo si...\"\n\nEl hombre fue interrumpido por una cacofonía de risas y abucheos, provocada por su desafortunada elección de palabras. Intentó continuar hablando; sin embargo, fue retirado del podio entre las risas y, eventualmente, expulsado del partido como resultado de este extraño discurso."
 france.292.a: "Qué payaso."
 france.293.t: "Águila del desierto"
 france.293.d: "El caza del comandante Antoine Dupret sobrevolaba el Sáhara y, a 30000 pies de altura, este parecía un bello tapiz dorado en el que las serpenteantes dunas brillaban bajo el sol abrasador. Tras él, el resto de su escuadrón volaba en perfecta formación inmersos en el cielo dejando estelas blancas tras de sí.\n\nA través del plexiglás de la cubierta, Antoine podía ver sin problemas el ondulante mar de arena bajo sus pies. Las ondas de calor distorsionaban el horizonte, haciendo que cualquier cosa que estuviese lejos pareciese un espejismo. De repente, al suroeste, pudo observar un inusual rastro en la arena. Tras usar el sistema electro-óptico de la aeronave, pudo identificar un convoy que avanzaba lentamente, en el que las largas sombra de los vehículos pacerían hormiguitas.\n\n\"Comandante, aquí 'Lyra'. Convoy sospechoso avistado en las coordenadas 23°15'N, 5°47'E. Son doce vehículos en dirección al sur.\"\n\"Roger, 'Lyra',\" respondió el comandante de la base, \"autorización para intercepción concedida.\"\n\"Entendido. 'Espada 2', 'Espada 3,\" comunicó Antoine \"ajusten el rumbo 3 grados al suroeste y mantengan la altura.\""
 france.293.a: "\"¡De acuerdo, chicos, manténganse alerta!\""

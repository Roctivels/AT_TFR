 FRA_France_on_the_World_Stage: "Francia en el mundo"
 FRA_France_on_the_World_Stage_desc: "\n\n\n\n\n£GFX_FRA_France_World_Stage_category\n\n\n\n\n\n\n\nA lo largo de la historia, Francia ha desempeñado un papel importante en el escenario mundial, estableciéndose como una gran potencia e influyendo en varias esferas del quehacer humano. Desde la Edad Media hasta el Renacimiento, Francia surgió como un centro cultural e intelectual, fomentando el desarrollo del arte, la literatura y la filosofía. Durante la Era de la Exploración, los exploradores y comerciantes franceses se aventuraron por todo el mundo, estableciendo colonias y redes comerciales. En el siglo XVIII, Francia atravesó una revolución que tuvo un profundo impacto en el panorama político y social de Europa, promoviendo ideales de libertad, igualdad y fraternidad. La destreza militar de Francia quedó demostrada a través de Napoleón Bonaparte, cuyas conquistas reconfiguraron las fronteras europeas. En los siglos XIX y XX, Francia siguió siendo un actor importante en la política mundial, involucrada en el colonialismo, dos guerras mundiales y la formación de la Unión Europea."
 FRA_Recognize_Constitutionalists_decision: "[USC.GetFlag] §C2GCA§!: Reconocer al §CGobierno Constitucional§!"
 FRA_Recognize_Constitutionalists_decision_desc: "Mientras la guerra civil continúa en Estados Unidos, hasta ahora hemos mantenido una política de neutralidad general ante asuntos más urgentes en Europa. Ahora que podemos centrar de nuevo nuestros esfuerzos en el extranjero, nos conviene reconocer a los constitucionalistas de Trump como el Gobierno estadounidense legítimo para consolidar nuestra alianza de larga data."
 FRA_Recognize_Biden_decision: "[USB.GetFlag] §C2GCA§!: Reconocer a la §CUnión de América§!"
 FRA_Recognize_Biden_decision_desc: "Con la guerra civil en Estados Unidos aún en curso, enfrentamos el dilema de decidir qué facción reconocer como el Gobierno legítimo de sus territorios devastados por el conflicto. Dado que buscamos el retorno a la seguridad proporcionada por la pertenencia de los estadounidenses a la OTAN, es en nuestro mejor interés reconocer al Gobierno unionista y apoyar sus esfuerzos por restaurar la normalidad en su país."
 FRA_Recognize_Patriot_Front_decision: "[PTF.GetFlag] §22GCA§!: Reconocer al §2Frente Patriota§!"
 FRA_Recognize_Patriot_Front_decision_desc: "La guerra civil en Estados Unidos ha traído consigo un cambio profundo en su panorama político, en particular con el ascenso del ultraderechista Frente Patriota. Si bien discrepamos en principio con muchas de sus políticas, debemos reconocer y apoyar a su Gobierno para intentar salvar nuestra antigua alianza antes de que sea demasiado tarde."
 FRA_Recognize_Association_of_the_Freed_decision: "[GMA.GetFlag] §G2GCA§!: Reconocer a la §GAsociación de los Libres§!"
 FRA_Recognize_Association_of_the_Freed_decision_desc: "Si bien una disrupción del antiguo orden estadounidense era inevitable con la Segunda Guerra Civil, ha habido un claro giro hacia algunas de las facciones más marginales dentro del conflicto. En particular, un grupo conocido como la \"Asociación de los Libres\" ha superado las expectativas extranjeras y busca más apoyo internacional. Por lo tanto, es en nuestro mejor interés reconocer a la AdlL como el legítimo gobierno estadounidense y ayudarlos en su Segunda Revolución Americana."
 FRA_Recognize_SoL_decision: "[FAA.GetFlag] §G2GCA§!: Reconocer a la §YCoRAL§!"
 FRA_Recognize_SoL_decision_desc: "Si bien nuestra situación interna nos había impedido intervenir en la Segunda Guerra Civil Americana, ahora contamos con la capacidad para extender nuestra influencia y debemos reconocer a una facción como el Gobierno legítimo de Estados Unidos. En particular, la Confederación de Repúblicas Americanas Libres y su repentino ascenso desde Nueva Inglaterra la convierten en una clara candidata a recibir nuestro apoyo. Tal como lo hicimos en 1776, debemos declarar nuestro respaldo a la CoRAL y a su Segunda Revolución Americana."
 FRA_Recognize_GMAC_decision: "[GMA.GetFlag] §G2GCA§!: Reconocer al §GColectivo Anarquista de Green Mountain§!"
 FRA_Recognize_GMAC_decision_desc: "A medida que la situación en Estados Unidos sigue evolucionando mientras la Segunda Guerra Civil devasta el país, aún no hemos encontrado una facción a la que reconocer y apoyar. Si bien puede parecer poco ortodoxo, el \"gobierno\" del Colectivo Anarquista de las Green Mountain ha demostrado su voluntad de construir una América mejor, incluso bajo la ausencia de un Estado. Si los respaldamos en sus esfuerzos por reunificar Estados Unidos, podríamos ganar un aliado único en la tormenta geopolítica que se avecina."
 FRA_Recognize_APLA_decision: "[APA.GetFlag] §R2GCA§!: Reconocer al §REPLA§!"
 FRA_Recognize_APLA_decision_desc: ""
 FRA_Align_Madagascar_decision: "[MAD.GetFlag] Alinear a Madagascar"
 FRA_Align_Madagascar_decision_desc: "Desde que sus esfuerzos por la independencia tuvieron éxito en 1960, hemos tenido dificultades para ejercer nuestra influencia en el océano Índico debido a Madagascar. Dado que la idea de la recolonización está, evidentemente, descartada, podemos en su lugar enfocarnos en expandir nuestro poder blando en el país y tratar de corregir nuestros errores coloniales para alinear nuevamente la isla con nuestros intereses. Al hacerlo, podremos garantizar que nuestras capacidades navales vuelvan a estar a la altura de una verdadera potencia."
 FRA_French_Arms_in_Indian_Hands_decision: "[RAJ.GetFlag] Enviar armas a la India"
 FRA_French_Arms_in_Indian_Hands_decision_desc: "Con la creciente agresión de la República Islámica de Pakistán y la República Popular China, se hace evidente que debemos garantizar que la República de la India reciba la ayuda que necesita mientras podamos permitírnosla en el momento oportuno."

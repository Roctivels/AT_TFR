 FAF_Reestablish_Military_Professionality: "Re-Establish Military Professionality"
 FAF_Reestablish_Military_Professionality_desc: "One a proud symbol of French pride, our once glorious military now lies shattered and defeated. What once was seen as an impossibility has been proving horrifyingly true. With our soldiers being crushed under the weight of the relentless Russian offensive across Eastern Europe. With our victory over the traitors and communists, it's time we begin to rebuild our army from the ground up. Every part of our army structure will be questioned, reforms will be made, and the fat will be trimmed. With time, our army will be reborn, ready to face down the Russian menace once again."
 FAF_Our_Duty_to_France: "Our Duty to France"
 FAF_Our_Duty_to_France_desc: "France has never been more helpless. Its economy is shattered, its people are desperate, and the army lies smashed. In these dark times, true patriots must step up and take command. Our duty to the French nation is eternal. Regardless of the time, we will always protect the people. As France reels from its defeat at the hands of the Russians, we will step in to restore control. Once more, we will fulfill our duty to France. We shall pull the people out of despair and repair their pride. The Soviets shall learn to fear our rise, as our revenge is inevitable, and no mercy will be granted."
 FAF_Mistakes_from_the_European_War: "Mistakes of the European War"
 FAF_Mistakes_from_the_European_War_desc: "When we dove headfirst into war with Russia, our hopes were high for a quick victory. But the war only dragged on. Eventually, the bear was at the gates of Warsaw. Now, like our allies, we lie shattered and defeated, overwhelmed by the sheer magnitude of the Russian offensive. Mistakes were made, and many lessons were learned. But what matters now is applying what we learned to improve our army. Doctrines will be analyzed, tactics will be scrapped, anything to restore our army's status as an elite fighting force. Adaption is mandatory, for refusing to change will only lead to us being destroyed again."
 FAF_Redesign_Modern_Warfare: "Repensar la guerra moderna"
 FAF_Redesign_Modern_Warfare_desc: "France has always been at the forefront of innovation, no matter the field. Our failure against the Russians in the East indicates that we are behind the times. If we do not catch up, we will always remain behind. And be at the mercy of our enemies. Immediate investment will be made into re-examining the modern way of fighting. Technologies like drones and exoskeletons will be prioritized, while investment in cyber warfare will be considered. Red tape must be cut, and ethics will be thrown out the window.  If France wishes to survive in these trying times, it must adapt, regardless of the cost it may bring."
 FAF_The_Failures_of_the_Baltic_Campaign: "The Failures of the Baltic Campaign"
 FAF_The_Failures_of_the_Baltic_Campaign_desc: "What was considered an easy campaign to open a new front quickly became our most humiliating failure. Utilizing the dense forest, the Russian army engaged in a fierce sabotage campaign, totally and utterly cutting us off from supply. The fall of Vilinus was the death seal for our Baltic campaign, cutting our forces in half and leaving the main front sapped of resources. It is clear that if we do not learn from this humiliating defeat, we will fail once again. The measure will be taken to harden supply lines and hubs, ensuring that such a failure will never occur again."
 FAF_Learn_from_the_Rasputitsa: "Aprender del entorno ruso"
 FAF_Learn_from_the_Rasputitsa_desc: "The climate can make or break a military offensive. And Russia's climate is no exception to this rule. Many leaders have tried to topple Moscow, from Napoleon to Hitler, but all have failed. Whether it be the bone-chilling winters or muddy springs, invading armies have failed because of the harsh environment. If we want to exact our revenge, we must not make the same mistakes as past invaders. Our soldiers will be trained for the extremes of the Russian climate. With enough time, our soldiers will master all terrain, allowing us to roll over Russia easily."
 FAF_Abandon_the_Rules_of_War: "Abandon the Rules of Warfare"
 FAF_Abandon_the_Rules_of_War_desc: "What was considered an easy campaign to open a new front quickly became our most humiliating failure. Utilizing the dense forest, the Russian army engaged in a fierce sabotage campaign, totally and utterly cutting us off from supply. The fall of Vilinus was the death seal for our Baltic campaign, cutting our forces in half and leaving the main front sapped of resources. It is clear that if we do not learn from this humiliating defeat, we will fail once again. The measure will be taken to harden supply lines and hubs, ensuring that such a failure will never occur again."
 FAF_Rework_The_Theories_of_Old: "Reconfigure the Theories of Old"
 FAF_Rework_The_Theories_of_Old_desc: "Nuestros fracasos en Europa Oriental nos han dejado claro una cosa. Las tácticas y doctrinas modernas han fallado al ejército francés. Antes de la guerra creíamos que estas tácticas eran superiores a las doctrinas del pasado, pero ha quedado claro que estábamos equivocados. Como parte de nuestro plan para reformar el ejército, es hora de volver al pasado. Si bien algunos creen que estas tácticas chocan con la mentalidad actual, siguen siendo viables. Las doctrinas militares modernas han fallado al ejército francés y si queremos sobrevivir, debemos hacer todo lo que haga falta, aún si eso implica volver décadas atrás."
 FAF_Defensive_Spirit_of_Verdun: "El Espíritu defensivo de Verdún"
 FAF_Defensive_Spirit_of_Verdun_desc: "Francia se ha caracterizado históricamente por su gran énfasis en la defensa. Desde la brutal guerra de trincheras en la Primera Guerra Mundial, la defensa siempre ha sido una prioridad en el ejército francés. Si bien hemos entrado en una nueva era de la guerra, en la que se hace cada vez más énfasis en los drones y en la ciberguerra, no nos podemos olvidar de nuestras raíces. Se suele decir que el mejor ataque es una buena defensa, y si queremos asegurarnos de que nuestro pueblo esté a salvo de invasores extranjeros, deberemos invertir fuertemente en nuestra defensa nacional. De lo contrario estaríamos dejando la puerta abierta a cualquier invasor."
 FAF_Invoke_the_Destroyed_Villages: "Evocar los pueblos destruidos"
 FAF_Invoke_the_Destroyed_Villages_desc: "El ejército francés fue, es y será el protector de su pueblo. Somos su espada y escudo, los caballeros con reluciente armadura. Aquellos que responden su llamada de auxilio en los momentos más oscuros. Cuando llegue el enemigo, lucharemos con todo lo que tenemos. Desataremos nuestra furia sobre el enemigo, y pagarán muy caro cada pedazo de tierra que ocupen. No hay mayor honor que servir a la gran nación francesa. Si tenemos que morir, que así sea, pero nos aseguraremos de llevarnos al enemigo con nosotros. Si Francia no es nuestra, entonces no será de nadie."
 FAF_Honor_Foch: "El Bastión de Occidente"
 FAF_Honor_Foch_desc: "Francia siempre ha sido un bastión de la civilización occidental. Desde sus inicios hasta la actualidad, Francia siempre ha sido el pináculo de la civilización occidental. Nunca ha habido un momento tan importante como el actual para Francia para ser el bastión de occidente. Las hordas eslavas nos han derrotado en una batalla, pero no hemos perdido la guerra. Volveremos más fuertes que antes, listos para desatar nuestra venganza contra Moscú y sus títeres. La llama de Occidente brillará una vez más, y sus enemigos serán desterrados a la oscuridad. Con nuestro liderazgo, Occidente será libre otra vez."
 FAF_Rebirth_of_the_COS: "Renacer del COS"
 FAF_Rebirth_of_the_COS_desc: "Time and time again, special forces have stood against the rise of technology such as drones and cyber warfare. From the SAS to the Spetsnaz, special forces play a key role that technology cannot replace. When the Russians advanced across Europe, their special forces were the ones going behind our lines. Assassinations, sabotage, and intelligence grabs were all instrumental in causing our downfall. Now that we have committed to the rebirth of the military, it is time we learned from our mistakes. Under new leadership, the COS will be reborn, ready to take on the challenges of the ever-changing battlefield."
 FAF_Work_Alongside_the_Navy: "Trabajar codo con codo con la Armada"
 FAF_Work_Alongside_the_Navy_desc: "La armada francesa siempre ha palidecido comparada con los poderes navales del Reino Unido o los Estados Unidos, pero aún así, siempre se invirtió fuertemente en la armada y en las fuerzas aéreas. Como parte de nuestros planes de reorganización general de las fuerzas armadas, es hora de reevaluar la utilidad de la fuerza naval francesa. Si bien muchos abogan por reducir el tamaño de la armada, nosotros entendemos que sigue teniendo un rol importante. Haremos inversiones para revivir el poder de la armada francesa y con el tiempo, Francia proyectará su poder en tierra, mar y aire. Al igual que nuestros aliados, reclamaremos nuestro lugar en el mundo, listos para enfrentarnos con los rusos."
 FAF_Lethal_Guerillas: "Guerrillas letales"
 FAF_Lethal_Guerillas_desc: "En la evolución de la guerra no solo influyen las innovaciones estratégicas o tecnológicas, también lo hace la evolución de la guerra de guerrillas. Si bien la guerra asimétrica siempre ha estado muy extendida, los avances tecnológicos, como los drones, la ha hecho más crucial que nunca. Las movilizaciones masivas y los movimientos de tropas se hacen cada vez más complicados de coordinar, lo que dificulta tomar al enemigo por sorpresa. La historia nos ha demostrado que los ataques relámpago y los sabotajes son fundamentales para derrotar al enemigo. Si bien existe mucha oposición a estas tácticas entre nuestras filas, es un sacrificio necesario para poder igualar el poder del ejército ruso."
 FAF_Restructure_Infantry_Tactics: "Reestructurar las tácticas de infantería"
 FAF_Restructure_Infantry_Tactics_desc: "La infantería es la espina dorsal de cualquier buen ejército, y el nuestro no es la excepción. Nuestra derrota contra las hordas rusas son la prueba de nuestro fracaso a la hora de prepáranos para la guerra moderna. Debemos evaluar y reestructurar nuestras tácticas de infantería. Haremos los recortes y reformas que hagan falta para asegurarnos de que nuestra infantería vuelva a cumplir con los estándares modernos. Solo entonces seremos capaces de desatar nuestra venganza contra las hordas rusas. Marcharemos desde París hasta Moscú, y la infantería nos guiará en el camino."
 FAF_Tip_of_the_Spear: "La punta de lanza"
 FAF_Tip_of_the_Spear_desc: "Nos guste o no, la infantería siempre será la base de cualquier ejército moderno. Por mucho que invitamos en tanques, aviones, drones o en computación, la infantería siempre será la que acabe salvando el día. Por lo que es lógico que nuestro infantería sea la punta de lanza de nuestro ejército. A diferencia de los tanques, la infantería se puede adaptar rápidamente, lo que puede convertir en fracasos inminentes en victorias decisivas. Si priorizamos la infantería sobre los blindados, podremos responder mejor contra ofensivas sorpresas o emboscadas enemigas, lo que nos permitirá adaptarnos a la naturaleza impredecible del ejército ruso."
 FAF_Perfect_Coordinated_Strikes: "Ataques perfectamente coordinados"
 FAF_Perfect_Coordinated_Strikes_desc: "La coordinación es fundamental para tener éxito en cualquier campaña militar. Sin ella, las órdenes se perderían, los ataques se detendrían y cualquier intento por avanzar quedaría en un punto muerto. La cooperación entre las distintas ramas del ejército es necesaria para que podamos derrotar a las hordas rusas. Las comunicaciones serán centralizadas bajo nuestro nuevo régimen. Todas las ramas del ejército recibirán información de nuestra agencia de inteligencia, lo que nos ahorrará malentendidos e incidentes de fuego amigo y nos dará ventaja sobre nuestros enemigos."
 FAF_Secure_the_State: "Asegurar el estado"
 FAF_Secure_the_State_desc: "A pesar de nuestra victoria, nuestro control es tenue en el mejor de los casos y nulo en el peor. Todavía quedan guerrillas en las ruinas de las ciudades de Francia central y meridional que se oponen a nuestro gobierno. Debemos acabar con ellas lo antes posible si queremos garantizar un futuro estable para nuestro régimen. Para ello, usaremos todo lo que esté en nuestra mano para acabar con los traidores. Solo cuando nos hayamos librado de las guerrillas podremos centrarnos en un asunto más importante, recuperar nuestra posición en el mundo y vengar nuestra derrota a manos de los rusos."
 FAF_Secure_Belgium: "Asegurar el Benelux"
 FAF_Secure_Belgium_desc: "Antaño una de las regiones más pacíficas de Europa, el Benelux no fue ajeno al caos provocado por la victoria rusa. Los gobiernos se enfrentaban entre al tiempo que crecía el comunismo y el nacionalismo belga. Si este caos persiste, puede que se extienda a nuestras fronteras, lo que complicaría aún más nuestra ya de por sí inestable situación. Marcharemos hacia el Benelux para restaurar el orden en una región que en el pasado fue una de las más pacíficas del continente y acabaremos tanto con radicales como con oportunistas. Esta no es solo una oportunidad de ayudar a un alidada, sino que también es una oportunidad para reconstruir nuestra posición en el continente y servir de contrapeso a la dominancia rusa."
 FAF_The_Old_Ally: "El viejo aliado"
 FAF_The_Old_Ally_desc: "Debemos reevaluar nuestro futuro en el \"Pacto de Acero\" ,creado por Alemania, con nuestro aliado británico, que en el pasado acudió a nuestra ayuda las dos veces que fuimos atacados por los alemanes. Los nacionalistas alemanes ya han exigido la devolución de sus antiguos territorios orientales, ¿cuánto tardarán en exigirnos la devolución de Alsacia-Lorena? Debemos forjar una alianza secreta con Gran Bretaña para resistir la embestida de los ultranacionalistas alemanes una vez que estos centren su atención en Europa Occidental."
 FAF_The_XIV_Society: "The XIV Society"
 FAF_The_XIV_Society_desc: "France has always been a fragile Nation. Prone to outbursts of riots or strikes, periods of calm are few and far between. Our situation is still very chaotic, with many traitorous actors still roaming the streets, plotting our downfall. If we are to ensure the stability of France, then drastic action is needed immediately. We will corral experts of all kinds to address this issue. While remaining completely loyal to our regime, they will be granted many powers to assist in the transformation of France. With their assistance, the centralization of our regime will speed up, cementing our rule for many years to come."
 FAF_XIV_society_tt: "Al completar este enfoque, el jugador §Yquedará en su camino político actual§!."
 FAF_The_Kingdom_of_the_French: "Victoria del identitarismo"
 FAF_The_Kingdom_of_the_French_desc: "Con Benedetti fuera de nuestro camino, el verdadero trabajo comienza. \n\nEn la gran lucha por el control de Francia, los identitarios han salido vencedores, tres facciones principales se han unido para lograr esto y ahora que todos tienen el control, es hora de convocar un Consejo Identitario para determinar qué dirección tomará Francia. tengan la seguridad de que, independientemente del resultado, Francia nunca volverá a ser la misma."
 FAF_The_Building_Blocks_of_an_Empire: "Building Blocks of Empire"
 FAF_The_Building_Blocks_of_an_Empire_desc: "Bardella, Camus, and Napoleon, three titans of the movement each with their own castes of supporters, the three have worked together to reach this point in French history. \nNapoleon's Identitarians wish to promote a Pan Europa following a more moderate ideal with France at the center, following more closely the idea of a Continental System rather than a super state. \nBardella's Identitarians wish to revive the ideals of ancient Rome, with a focus on the Latins of Europe being unified into a single state.\nAnd Camus' Identitarians promise to reform the nation into a Pan European Nationalist Federation. \n\nThe Conference is underway, as the delegates consider the merits of all three systems the fate of the Identitarian movement will be decided in the coming weeks. Today decides with finality who in the Identitarian movement is given ultimate control."
 FAF_building_an_empire_idea: "Construyendo un imperio"
 FAF_building_an_empire_idea_desc: "It takes time to build an empire, both to ready it for conquest and to uproot any remaining vitriol in their conquests. As it was said and oft repeated, ''Rome was not built in a day'', and neither shall we be. The nation must be stabilized, it must be prosperous, it must be made sacred and stable forevermore before we can truly declare our empire constructed. When built on unstable construction, there is nothing at all."
 FAF_Ally_European_Identitarians: "Aliarse con los identitarios europeos"
 FAF_Ally_European_Identitarians_desc: "Si bien nuestra ideología y movimiento son relativamente nuevos, han logrado amasar una gran cantidad de seguidores. Muchos en Europa Occidental comparten nuestras ideas y motivaciones pero, por desgracia, son reprimidos por numerosos gobiernos en el continente. Si queremos tener éxito en nuestra misión de unir a Occidente, deberemos tender la mano a estos movimientos. Si les ofrecemos un lugar seguro y apoyo material, estos grupos tendrán los recursos y los medios para difundir sus ideales desde la seguridad de un país aliado. Con el tiempo, nuestros esfuerzos darán sus frutos y lograremos unificar a Europa."
 FAF_National_Decentralization: "Descentralización nacional"
 FAF_National_Decentralization_desc: "La historia nos ha enseñado que los imperios más poderosos no se gobernaban únicamente desde su capital. Ya sea el Imperio Romano o alguno de los otros imperios de Europa y Asia, todos tienen algo en común: la descentralización y la autonomía de los gobernantes locales. Ahora que estamos remodelando Francia, es momento de aplicar estas ideas. París ya no será la única autoridad sobre Francia. Se restaurará el poder regional en todas las provincias, que tendrán un gran libertad para gobernarse a sí mismas. Esto permitirá al pueblo tomar el control de numerosos aspectos de la burocracia, lo que nos ahorrará recursos administrativos al tiempo que mantendremos el control de la nación."
 FAF_Neo_Imperial_Bureaucracy: "Burocracia neoimperial"
 FAF_Neo_Imperial_Bureaucracy_desc: "La burocracia es la base de cualquier imperio que quiere sobrevivir y prosperar. Desde el glorioso Imperio Romano hasta el transoceánico Imperio Británico, todos ellos tenían una burocracia descomunal. Si queremos forjar un imperio que perdure durante mil años, deberemos sentar las bases de una nueva burocracia imperial. Esta, a diferencia de las burocracias del pasado, estará libre de corrupción y de avaricia personal. Nuestro sistema tratará a todas las provincias por igual, ninguna tendrá ningún trato especial. Bajo este sistema, se forjará una nueva Roma, una verdaderamente libre y poderosa. "
 FAF_Redraw_Europe: "Reescribir la historia de Europa"
 FAF_Redraw_Europe_desc: "La historia de Europa tal y como es ahora no tiene nada que ver con nuestra visión del mundo, es una historia que nos avergüenza por sus mentiras y verdades a medias. Numerosos \"historiadores\" tacharon fuentes legítimas que hablaban de nuestro pasado como \"falsas\" y \"sesgadas\" en un esfuerzo por tergiversar la historia de la Europa latina, la auténtica Europa. Este complot antilatino llegará a su fin, y cualquiera que se haya tragado esas mentiras deberá ser reeducado."
 FAF_Puppet_the_Church: "El Papa en Aviñón"
 FAF_Puppet_the_Church_desc: "Durante demasiado tiempo, la Iglesia católica, gobernada por el \"papa\" marxista Francisco, ha estado desviándose por el camino equivocado, arrastrando consigo a 40 millones de franceses, esto se acaba aquí. Con la ayuda de unos pocos obispos leales y más conservadores en Francia, hemos llegado a un acuerdo para apoderarnos de todas las iglesias y catedrales católicas del país y establecer a nuestro propio Papa, Clemente XV, en Aviñón, un antiguo exclave de los Estados Pontificios, amenazando al resto del clero con someterse a Aviñón o afrontar las consecuencias."
 ROME_nationalist_party_long: "Civitas"
 ROME_nationalist_party: "Civitas"
 sec_anti_pope: "Antipapa"
 FAF_Legacy_of_our_Ancestors: "Legado de nuestros antepasados"
 FAF_Legacy_of_our_Ancestors_desc: "The actions of the men who have brought our nation into fruition have been trampled upon and left marked as 'evil' in the modern world. We will serve to rectify this. The history of the world is not one written from the view of the traitorous historians, but one that shows the history as it was, and the glory of a unified world under the Latin people, any who believe otherwise being taught of the true glory of Augustus and Rome."
 FAF_Quadrilingual_Unification: "Unificación cuatrilingüe"
 FAF_Quadrilingual_Unification_desc: "La idea de que existen múltiples lenguas latinas independientes es una mentira, difundida por gobiernos que actúan en contra de la verdad que constituye la identidad latina. Todas son dialectos entre sí, mutuamente inteligibles y claramente descendientes de un ideal singular. Por lo tanto, debemos trabajar en sentido inverso, donde nos han obligado los falsos heraldos, reuniendo las «cuatro lenguas» en una sola, para corregir los errores que nos dividieron."
 FAF_QU_idea_dummy: "Unificación cuatrilingüe"
 FAF_language_of_the_state_dummy: "Unificación cuatrilingüe"
 FAF_managerial_bilingualism_dummy: "Unificación cuatrilingüe"
 FAF_failures_of_AH_dummy: "Unificación cuatrilingüe"
 FAF_New_Imperial_Army: "Nuevo Ejército Imperial"
 FAF_New_Imperial_Army_desc: "How did Rome go from a small city-state to one of the largest European empires? The answer lies in its military might. From Britain to Iberia, the Roman legions marched on the warpath. Enemies like Carthage were given no mercy, and judgment was dealt swiftly to any who attempted rebellion. As we restructure the shattered French army, we shall transform it into something new. From the ashes will arise a new imperial army, one to rival the might of even the British. And when the time is right, we shall descend upon the Soviet dogs like an unstoppable wave of vengeance."
 FAF_A_Millennia_of_Stability_and_Achievement: "Millennia of Stability and Achievement"
 FAF_A_Millennia_of_Stability_and_Achievement_desc: "Rome was not just defined by its ability to wage war on its enemies. It was also marked by its achievements. Long periods of peace led to much scientific and technological advancement. Not only did the state prosper, but so did the citizenry, who benefited greatly from the expansion of the Empire. If we wish to be the inheritors of Rome's legacy, we must seek to not survive but thrive. Our Empire will prosper, not just for the rulers and elite, but for the common citizenry. While we prepare for war, we also look ahead to a new era of peace. Where the citizens of Europe are united and free."
 FAF_Mediterranean_Dominance: "Dominio sobre los mares"
 FAF_Mediterranean_Dominance_desc: "Many empires can be defined by their ability to control the seas. From Britain to Japan, the rise and fall of empires can be seen through their ability to dominate the oceans. While the Roman Empire was never known for the power of its navy, we cannot neglect its importance. If we are to truly consider ourselves the successors of Rome, then controlling our seas is a top priority. Dominance over the sea will not only allow us to control vital shipping routes but also the option to blockade our enemies. Starving them out and making any invasion significantly easier."
 FAF_Proclaim_the_Empire: "Proclaim the Empire of All Latins"
 FAF_Proclaim_the_Empire_desc: "The Peoples of Western Rome have once again been finally united under the banner of a singular, Latin state - not one that has treacherously abandoned the ideals of uniculturalism and brought upon the people their own, false identity. The wrongs of the conniving Lombards, the usurping Franks, the lying Castilians and those other nations who usurped from the Latin people power and convinced them that they were not a single people have finally been righted, and forevermore the Latin world will stand united against the barbarians that try to tear it apart from within or without."
 FAF_Towards_one_Europe: "Towards One Europe"
 FAF_Towards_one_Europe_desc: "Europe has been in pieces for centuries, bickering and battling and fighting two world wars over which European should rule over another European, the answer was always right in front of us. The Indians speak many languages, the Chinese speak many languages, over thousands of years the Emperor's of China slowly brought China closer and closer together, and all the while after Rome fell we were left in pieces. \nEven while we were in pieces, we brought the Chinese to their knees, we conquered India, we brought light to the Dark Continent and we brought civilization to the New World. We did these things in pieces so imagine if we were one, like China, like India, their states a conglomerate of many peoples united by race not necessarily language. \n\nEurope will be the same, nationalism for Europe, pride for our past, hope for our future. \nTogether, we will never be brought down to our knees again."
 FAF_The_Pure_European_Identity: "Pure European Identity"
 FAF_The_Pure_European_Identity_desc: "What does it mean to be European? To some it means you live there, to some it means you were born there, to us? The adherents of a truly European Europa? \nTo be European is to be European, European of blood, of culture, of faith. \nSo many things make us European, we are a varied people, but we are all under the skin and in our souls the same Aryans that Julius Evola wrote about at length. \nThe Slavs have been invaders to our Europe, coming to steal our technology, our institutions, our culture, they wiped out the ancient Illyrians and it was only by the intervention of God himself that Romania is free of Slavic influence. A free Europe can only be free and pure and safe when we are all together. No Russian horde will stop that. The will of Europe is a will of conquest through the ages and we shall again be titans on the world stage. \n\nTogether."
 FAF_Preserve_European_Beauty: "Preserve European Beauty"
 FAF_Preserve_European_Beauty_desc: "Of all the worlds classical societies, Europe has created the most grand structures, the most beautiful houses, in many of our cities each domicile is centuries old and yet far better than what the majority of the world lives, crafted to last and styled like a work of art. Our architecture is so beautiful we don't even realize how beautiful it is until we find ourselves in a Soviet slum, endless brick buildings, featureless and angular. We have breathtaking sights, breathtaking cities, endless valleys of green and golden wheat, the purest white of snow capped peaks. The wealthy of the world have long used our countryside and our cities as a get away, a vacation, a place to prop up their feet. Well we agree that our beauty exists to be enjoyed, and we will take the steps necessary to preserve that. \n\nPursuing a green policy to keep our continent at the very peak of environmental preservation is an important thing for our government as the environment is an integral piece of our Identity, and you know we Identitarians love preserving our Identity."
 FAF_Restart_European_Unity: "Restart European Federalization"
 FAF_Restart_European_Unity_desc: "Europe was on its way to be united when the Russian horde stole that from us. Federalization may seem like it would breed disunity but Europe is full of many cultures all independent of the other and as storied as one another, it would be wrong to burden Italy or Germany or Spain with being led to cultural dilution by any other who might lord over them. To preserve Europe, to preserve it's culture and it's people and it's peace, we must consider that regional autonomy is important, the state cannot function or remain unified if one group takes power and tries to erase every other. \nThis mistake will not be made again, we will respect our neighbors, while also fostering an overarching European unity."
 FAF_Reverse_the_Great_Replacement: "Reverse the Great Replacement"
 FAF_Reverse_the_Great_Replacement_desc: "For decades the Neoliberal plague has used immigration as a way to make up for a declining birthrate, to make up for labor shortages, and in truth, to break the spirit of the white man and to accept a colonization of our continent for a globalist future where we forget our past and entirely embrace the future, a future where history is forbidden and pride for your people is a sin. \n\nThis future will not come to pass. \n\nMillions of migrants, asylees, whatever you wish to call them, have poured into our beloved Europe from foreign war zones only to turn our own streets into Damascus. Our generosity and patience only goes so far, foreigner, and it ran out a long time ago. Through the largest European deportation operation in history, we will reverse the Great Replacement, and support our mothers going forward to multiply and be happy and most importantly to be able to without fear of how to feed our future generations. \nNever again shall we let businessmen decide a mother should have to sacrifice raising her child to keep food on the table. Some might call it socialist, but between this and our economic reforms, we think maternal support is warranted to secure the future of a White Europe."
 FAF_An_Army_of_Purity: "Un ejército de pureza"
 FAF_An_Army_of_Purity_desc: "Si estás al cargo de una nación con 400,000,000 millones de almas, te puedes permitir ser selectivo en el reclutamiento militar. Nuestra Europa es grande, nuestra Europa es pura, pero naturalmente no todos los soldados son igual de aptos. Gracias a la herencia genética, algunos europeos han nacido para ser guerreros pero otros no, quienes encontrarán su oficio ideal en otros campos.\nSi bien respetamos el deseo de cualquier hombre, sin importar su altura, apariencia o disposición genética de servir a su nación, el ejército de Europa estará formado por lo mejor de lo mejor, por guerreros en plena forma física y mental. Cuando vayamos a la guerra, nuestros enemigos llegarán al frente sabiendo que cualquiera de nuestros soldados es más alto, fuerte e inteligente que cualquiera que ellos.\n\nNuestro ejército será el primer embajador con el que hablen con nuestros enemigos, así que trabajaremos para que se lleven una \"buena\" impresión."
 FAF_Policy_of_Green_and_White: "Política verdiblanca"
 FAF_Policy_of_Green_and_White_desc: "La naturaleza nos ha cuidado sin importar qué tanto daño le hayamos hecho, agradecemos su benevolencia y usaremos nuestro poder para asegurarnos de que la Madre Naturaleza siga favoreciendo a la raza blanca como ha hecho hasta ahora, bendiciéndonos con esta hermosa y rica tierra, nuestro hogar.\nEl hombre blanco deberá preservar la tierra si quiere seguir estando en la cima de la jerarquía racial, y solo cuando nuestro hogar haga gala de nuestro espíritu y nuestros genes podremos jactarnos de ser la raza superior."
 FAF_Dehumanize_our_Enemies: "Deshumanizar a nuestros enemigos"
 FAF_Dehumanize_our_Enemies_desc: "Los rusos irrumpieron en nuestras tierras e hicieron lo que siempre hacen los eslavos: Arrasar con todo lo que amamos y robarnos lo que consideran útil. Nosotros los europeos, desde Madrid hasta Berlín pasando por París, Londres y Roma, somos los creadores de la sociedad moderna, de las grandes maravillas modernas, de la tecnología que hace posible que disfrutemos de los lujos que tenemos en la actualidad. ¿Qué han hecho los eslavos aparte de matar? ¿Han contribuido algo de valor a la humanidad? ¿Podemos siquiera llamarlos humanos?\n\nRusia no es más que una colmena de avispones que trabaja para el tirano de turno, picando, robando y devorando a sus vecinos. Europa ya no tiene que soportar a la horda eslava, echaremos a los asiáticos para que vivan con los suyos y recuperar lo que nos robaron, no merecen vivir en suelo europeo."
 FAF_Green_Classicalism: "Clasicismo verde"
 FAF_Green_Classicalism_desc: "El mundo debe volver a ser como era en el pasado. Se acabaron los conflictos por la raza, ideología o por lo que sea. Habrá un sentimiento de unidad entre los europeos, pues somos un pueblo, una nación que busca proteger nuestra tierra contra las potencias no europeas y el comunismo satánico, que busca destruir a nuestro pueblo y la belleza inherente en Europa."
 FAF_Europe_Indivisible_and_United: "Europa, indivisible y unificada"
 FAF_Europe_Indivisible_and_United_desc: "Si echamos un vistazo a la historia, Europa alcanzaba su cenit de poder cuando estaba unida. Cuando estábamos unidos, ya sea bajo los romanos, los francos e incluso la Unión Europea, vivimos un periodo de prosperidad generalizada que nada tenía que ver con cuando estábamos divididos y nos matábamos entre nosotros en guerras fratricidas. Claro que, el sueño de una Europa unida no ha calado mucho entre los europeos. Anteriormente ligada a la codicia de los burócratas sociópatas de Bruselas a los que solo les importaba el valor del Euro, hemos sido capaces de redefinir al paneuropeísmo eliminando cualquier pizca de multiculturalismo liberal. Ahora  tras haber estabilizado nuestro continente y haber mostrado a nuestros hermanos continentales de lo que somos capaces, podemos ponernos manos a la obra y catapultar Europa a una gloria no vista desde los tiempos de Trajano. Claro que, somos más que meros conquistadores y le daremos la oportunidad al resto de Europa de unirse voluntariamente a nuestra causa de salvar nuestro continente. Así, debemos orientar al Estado hacia el ideal paneuropeo y aprovechar su maquinaria mediática para asegurar de tener éxito en nuestra misión pues, de ser así, podríamos ser capaces de finalizar nuestra cruzada contras las hordas mongoloides del Este y dar inicio a una nueva dorada completamente europea.\n\nTras siglos de conflictos, ha llegado el momento de poner fin a la división y las guerras fratricidas. Para defenderse de las hordas del Este, las naciones de Europa deberán unirse tal y como hacían las legendarias y casi invencibles falanges macedonias. Si lo conseguimos, por muchos ultimátums que nos hagan, ¡les echaremos y recuperaremos lo que es nuestro!"
 FAF_Push_for_Continental_Unification: "Impulsar la unificación continental"
 FAF_Push_for_Continental_Unification_desc: "Lo que tenemos actualmente no es suficiente. Perdimos cientos de miles de kilómetros cuadrados ante la amenaza rusa. Usaremos nuestra fuerza renovada para arrebatarles Europa. Solo cuando nuestros soldados se regocijen a la sombra de los Urales podremos finalmente celebrar la verdadera unidad europea."
 FAF_March_through_Italia: "Reign in the Italians"
 FAF_March_through_Italia_desc: "Italy was the proving ground of the first Napoleon Emperor, where he gained traction with military achievement and where Napoleon III founded a new nation state with his blessing. Italy today is undoubtedly still an important part of the French Empire and getting them to our heel will help us in the coming wars. \n\nLet us convince them of the merits of French protection in this new Europe."
 FAF_Restore_Imperial_Pride: "Avivar el orgullo napoleónico"
 FAF_Restore_Imperial_Pride_desc: "El reinado del emperador Napoleón I no solo fue uno de bonanza económica y de poder militar, también fue uno de grandes reformas. La gente suele olvidar que el surgimiento de la dinastía Bonaparte no fue una reacción a la revolución francesa, sino que fue la continuación de esta, y que en la doctrina bonapartista la benevolencia y la promulgación de políticas que enorgullezcan a la población son el pan de cada día.\n\nSi el emperador no tuviese el bienestar del pueblo en mente, no sería un Bonaparte, porque ser un Bonaparte significa progreso, significa poder, debe ser el ejemplo de benevolencia de un monarca justo y el perfeccionamiento de la autocracia cuando se aplica con tacto."
 FAF_Discard_Aspects_of_Identitarianism: "Abrazar la unidad latina"
 FAF_Discard_Aspects_of_Identitarianism_desc: "Francia solo es una pieza del rompecabezas, en realidad, si Napoleón I hubiese salido victorioso él hubiera establecido el imperio identitario por el que luchamos por el día de hoy, siendo la anexiones de Cataluña y Roma las pruebas de esto. El día de hoy, seguimos luchando para unir el mundo latino, para unir de nuevo a España, Francia e Italia en una sola entidad, poderosa como el Imperio Romano de Occidente, liderada por los grandiosos galos. Nosotros los latinos debemos mantenernos unidos o morir por separado."
 FAF_solidarite_latine_idea: "Solidarité Latine"
 FAF_solidarite_latine_idea_desc: "El pueblo latino es un poder hegemónico que debe extender sus alas por toda Europa, luchar como una sola entidad y servir como monumento a nuestra historia y cultura. Los enemigos de la latinidad son varios, numerosos y con una voluntad fuerte. Sin embargo, como ya sabemos, no son más que bárbaros que diabólicamente tratan de derrumbar las murallas de la civilización a los que nosotros, los descendientes de Roma, debemos combatir con sangre."
 FAF_convene_latin_congress_decision: "Convocar al Congreso Latino"
 FAF_convene_latin_congress_decision_desc: "Somo un estado compuesto por todos los grandes pueblos latinos, y para asegurarnos de que nuestro nuevo gran imperio no acabe siendo dominado por los franceses, por ejemplo, debemos garantizar que todos y cada uno de los pueblos latinos hermanos del imperio tenga representación. Para lograr esto, debemos convocar un gran Congreso Latino en el que todos nuestros hermanos latinos tengan la representación que les corresponde."
 FAF_Pacify_Padania: "Pacificar Padania"
 FAF_Pacify_Padania_desc: "Padania es un término relativamente nuevo, es más reciente que el reclamo bonapartista del trono francés, por lo que si lo situamos en la línea temporal europea se encuentra muy próximo a nosotros. Su eminencia vino inicialmente de los comunistas y posteriormente fue utilizado por el partido federalista LEGA, que se trataba de una federación de partidos regionalistas de áreas como Lombardía, Venecia y Piamonte responsable de la infame Declaración de Independencia Padana de 1996 la cual, si bien no tuvo ningún efecto político, sirvió como base para formar una identidad nacional padana. Con nuestra ayuda, Padania pudo liberarse y eventualmente incorporarse a nuestro imperio y, al igual que Napoleón I quién se proclamó Emperador de Francia y Rey de Italia, debemos añadir Rey de Padania a esa lista de títulos. Estableciendo a Padania como un dominio independiente pero integral del Imperio Francés y del mundo latino podremos calmar las tensiones regionalistas y apaciguar a los millones de italianos septentrionales que lucharon valientemente para que se les llamen padanos."
 FAF_A_New_Continental_System: "Nuevo sistema continental"
 FAF_A_New_Continental_System_desc: "El sistema continental fue una idea adelantada a su tiempo. Unir a Europa en un bloque económico continental contra un enemigo común, que en 1805 eran los británicos, y que en el día de hoy es Rusia. Debemos revivir el sistema de continental para que ocupe el vacío dejado por la Unión Europea. Puede que algunos se opongan a una Europa dirigida desde parís, pero si aceptaron el dominio de Bruselas, pues oye, Bruselas también está en nuestro poder.\n\nEuropa debe sanarse sus heridas, pero no seremos agresores forzando a todos a unirse a nosotros, seremos un brillante faro de estabilidad en una coalición derrotada plagada por la debilidad impregnada por el liberalismo, nosotros somos el remedio y el escudo de Europa."
 FAF_Restore_The_Imperial_Palace: "Restaurar el Palacio Imperial"
 FAF_Restore_The_Imperial_Palace_desc: "El Palacio Napoleónico, Versalles, y la Residencia Imperial de Fontainebleau, fueron convertidos en museos y parques por los Gobiernos republicanos sucesores de los antiguos imperios. Tanto Napoleón I como Napoleón III residieron en Fontainebleau y se hizo un gran esfuerzo para embellecer y glorificar esas áreas. Una vez más, debemos hacer que estos edificios sean dignos para el emperador y dignatarios extranjeros."
 FAF_Imperial_Palace_idea: "El Palacio Imperial"
 FAF_Imperial_Palace_idea_desc: "El palacio es un símbolo de estabilidad, prosperidad y riqueza. Un símbolo de Francia y su monarquía, el signo que Francia seguirá aquí durante los eones venideros. Es una extravagante muestra de nuestra riqueza y poder sobre el continente, la joya de la corona."
 FAF_Ally_the_Church: "Trabajar con la iglesia"
 FAF_Ally_the_Church_desc: "La iglesia católica es una institución eterna, tan antigua como la propia Francia y está entrelazada con nuestro destino. La Revolución Francesa fue demasiado lejos con sus excesos, castigando a la totalidad de la iglesia, es por esto porque Napoleón tuvo la templanza necesaria con la revolución, restaurando la razón en un movimiento prometedor pero que se encontraba perdido envuelto en el caos tan característico de una república.\n\nDebemos restaurar y mantener las relaciones con la iglesia ctólica, si bien no aceptaremos la autoridad eclesiástica como superior a la de nuestro emperador, promocionaremos la iglesia como una institución vital."
 FAF_Rally_the_Imperial_Spirit: "Je suis le Déluge"
 FAF_Rally_the_Imperial_Spirit_desc: "Nuestro emperador no solo es el último de la estirpe bonapartista, es el heredero de su legado. Él es un hombre que supera las cualidades de sus antecesores. Para ser el diluvio, para afirmar quien eres, es afirmar que eres imparable, y nosotros lo somos. La república era un endeble, voluble y enfermo estado para los franceses, podrido hasta la médula de luchas internas y pacifismo. El imperio era verdaderamente la fuerza abrumadora que Europa necesitaba la última guerra, y será la fuerza que Europa tendrá en la próxima guerra.\n\nMientras afiliamos nuestros cuchillos para atacar al corazón del comunismo europeo, debemos enorgullecernos de que nuestro emperador es el diluvio, es quien cambiará las tornas, es quién nos llevará a la victoria definitiva. ¡No habrá un Waterloo que ponga fin a nuestro reinado y nuestro imperio solo caerá cuando el sol engulla la tierra!"
 FAF_The_Imperial_Consensus: "Censo nacional"
 FAF_The_Imperial_Consensus_desc: "El Imperio contiene numerosas almas, y no todas son francesas. Para comprender las necesidades de un imperio en crecimiento debemos saber con certeza sobre quien gobernamos. Nuestro nuevo Gobierno necesita un nuevo censo no solo en la metrópoli, sino que en todos los territorios del imperio.\n\nUn censo es importante para el correcto funcionamiento de una nación, te indica modificar los gastos para atender de mejor manera a una población en crecimiento, para financiar la educación en los distritos más poblados y te permite saber exactamente el tipo de personas de un área y te permite saber la mejor forma de saciar sus necesidades. Todas las naciones hechas y derechas realizan censos frecuentemente, no solo para cuidar a sus ciudadanos, sino que también para conocerlos y saber sacar provecho de ellos para el bien de la nación. Un Gobierno que no se preocupa por su pueblo no es un verdadero Gobierno."
 FAF_Cull_the_Weak: "Sacrificar a los débiles"
 FAF_Cull_the_Weak_desc: "The Balkans despite their treacherous terrain proved to be a weak point of the combined NATO force, once Romania was pressed beyond Iasi the Balkans fell as if the term ''Carpathians'' didn't refer to a mountain range and rather a mud hill. Obviously, this means we must have control of the Balkans ourselves, lest the flank be left to guard itself and find itself utterly incapable of doing so, decades, no centuries of infighting has led to the region being a mess of foreign reliant entities. \n\nThere shall be no more instability in our Balkans, once we bring Illyria to heel and move to rescue Dacia from Soviet Hands, the weakness will end for good under French guidance."
 FAF_invading_balkans_tt: "§YEste enfoque proporcionará objetivos de guerra para todas las naciones de los Balcanes.§!"
 FAF_Imperial_Restoration: "Restauración imperial"
 FAF_Imperial_Restoration_desc: "Our efforts have borne fruit, under the House of Bonaparte, France is again the leader of Europe. France is again an Empire! From all corners of the world, when business is done with Europe, it shall be done in Paris, in the Palace of Versailles, at a gilded table where sits our Emperor in his infinite wisdom. From all corners of the world, they shall speak of our glory and our triumph, our great struggle against the Soviets for a finally peaceful Europe not threatening the individual with societal destruction at the whims of a Socialist mad man. \nThrough Identitarianism, we have brought the Latin and German realms together, we have placed all of Europe into our basket, and the Soviets will rue the day they dared to wake us from our slumber. \n\nVIVE L'EMPEREUR!"
 FAF_Purge_the_Latinists: "Purgar a los \"latinistas\""
 FAF_Purge_the_Latinists_desc: "Despite our calls for unity among the French right, some resist our growing control. The \"Latinists,\" a group calling for the unification of Europe, are one example. While on the surface, they appear united, it is clear that they are very divided internally. Their ideas, as weird and alien as they are, must be stopped at all costs. All measures will be used to wipe out the group and their traitorous ideas. France has no room for those who wish to spread division."
 FAF_The_French_Duce: "El Duce francés"
 FAF_The_French_Duce_desc: "While the fires that consumed the Fifth Republic have subsided, there is still much chaos in the streets. Rioters, foreign gangs, and traitors. All roam the streets of our once-proud nation. Drastic change is needed to restore France to its former position of glory. Like Mussolini, we shall march on Paris and cement our authority over the nation. Many will resist, but they will have no choice but to join us or die. For years, people have feared the return of fascism, but they should not worry. Because we are their salvation."
 FAF_France_for_the_French: "Francia para franceses"
 FAF_France_for_the_French_desc: "France is a very unique nation. Its history and culture are vast and diverse, yet. It has recently found itself threatened. The failures of the Fifth Republic to stem the flow of immigration have led to many feeling ostracized from their own nation. Dissatisfaction spread as the liberal establishment funneled investments in supporting immigrants while turning a blind eye to their crimes against the French people. Under our reign, however, this will end once and for all. France will once more be a nation for its people, not the immigrants. The people shall see that fascism is their savior, not their enemy."
 FAF_A_Grand_Council_of_Fascism: "Gran Consejo del Fascismo"
 FAF_A_Grand_Council_of_Fascism_desc: "No one man can rule alone, and Benditti knows this best. While we may have succeeded in cementing our control over France, there is still much to do. To rule is to engage in a constant game of chess. You must always be three steps ahead of your enemies. Or you will be beaten by them. Like Mussolini, we shall create our own Grand Council of Fascism. While remaining entirely loyal to Benditti, this council will help administrate France’s transition to fascism. While also advising the Duce on domestic and foreign policy, especially concerning our enemies in Moscow. "
 FAF_Embrace_the_Church: "Abrazar a la Iglesia"
 FAF_Embrace_the_Church_desc: " France has always had a long history with the Church. From the days of the wars of religion to now, religion has long been the backbone of French society. Much of this, however, has been eroded by the liberal establishment of the Fifth Republic. With their pandering to immigrants, they became puppets of Mecca and Jerusalem. While entirely abandoning their duty to the Vatican. These practices will end with us. We must show the Church that we are their ally and can help restore the importance of catholicism in France. It may take some convincing, but their support will be crucial in cementing the legitimacy of our reign."
 FAF_National_Minority_Datebase: "Base de datos nacionales de minorías"
 FAF_National_Minority_Datebase_desc: " Despite our avid anti-immigration stance, there are still many within our country who can trace their roots back to immigrants. While they may claim to be loyal to France, they must all be treated with suspicion. The creation of a national database for minorities, while controversial, will allow us to monitor thousands with ease. Everyone shall be examined daily for any signs of disloyalty or treason. If they are truly loyal to their nation, then they will have nothing to fear. Likewise, any traitors will be snuffed out quickly, and once we find them, their fates shall be swift."
 FAF_Ideolize_Doriot: "Idolatrar a Doriot"
 FAF_Ideolize_Doriot_desc: "Doriot; patriot, traitor, molder of the French far right. Many words can be used to describe him. The Fifth Republic viewed him as a traitor who sold his neighbors and friends to a tyrannical occupying force. But to us, he is a hero. He built the foundation that would eventually allow our rise to power today. As we brace for the future, we look back on him for guidance. His teachings will be used to entrench our control over all aspects of French society. With his words, fascism and France shall become united, never to separate, no matter what."
 FAF_Corporatism: "Adoptar el corporativismo"
 FAF_Corporatism_desc: "France fell when it embraced free market economics. Macron and the liberal establishment did everything to appease yellow vest protesters while neglecting millions of jobless Frenchmen. Actions like this have only served to empower communist dissidents, who endlessly argue for \"class warfare.\". If France truly wishes to rise above the ruins of the European war, then it must look past such ideas. Cooperation must replace struggle, and representation must replace suppression, for if the employer and employee work together, economic progress can truly be achieved."
 FAF_work_family_fatherland: "Travail, Famille, Patrie"
 FAF_work_family_fatherland_desc: "Trabajo, Familia, Patria. Estas tres palabras fueron el lema del Estado francés bajo el gobierno de Phillipe Pétaine. Si bien la caída del régimen de Vichy marcó el fin de este lema de tres palabras, aún puede reinstaurarse hoy. Bajo nuestra guía, estas tres palabras se convertirán en el fundamento de la nación francesa moderna. Nuestros ciudadanos ya no serán engañados por quienes dicen representarlos. El francés moderno amará a su país, trabajará día y noche para verlo alcanzar la grandeza y amará a su familia. Estos principios se convertirán en nuestra luz guía, permitiéndonos superar a nuestros enemigos y recuperar la posición de Francia en el escenario mundial."
 FAF_Criox_de_Feu: "Croix-de-Feu"
 FAF_Criox_de_Feu_desc: "To say Croix-de-Feu is an organization shrouded in controversy would be an understatement. While a conservative group, the group was staunchly anti-German, cooperating with the French Resistance during the German occupation. Despite these controversies, the patriotic origins of the organization cannot be denied. Nor can its ties to war heroes and veterans of World War One. Their service would be greatly beneficial to our regime. Especially to attract veterans and former service members to our side, who would otherwise be unwilling to work with us."
 FAF_Weaponize_the_Middle_Class: "Armar a la clase media"
 FAF_Weaponize_the_Middle_Class_desc: "The liberal establishment has always had a history of outright neglecting the middle class of France. Never poor. Nor rich, they were viewed with mild disdain. And ignored in favor of social spending for the poor or tax cuts for the rich. This has not gone unnoticed. The desire for revenge is growing within the middle class of France, threatening to boil over. We cannot allow this to occur, but luckily, we still have a use for this discontent. We will show them that we are the ones who truly understand their struggle. And are their one faithful voice. Their support will cement our place in the hearts and minds of the people winning their support. Permanently."
 FAF_The_Crime_of_Opinion: "El crimen de la opinión"
 FAF_The_Crime_of_Opinion_desc: "Aunque nuestro mandato ha sido cementado sobre Francia, sigue habiendo muchos que se oponen a nuestro mandato. Lealistas a la quinta republica, comunistas, oportunistas, todos estos grupos continúan operando en las sombras. Esta fuerzas representan una amenaza existencial a nuestro mandato. Por ende. usaremos cualquier método necesario para sofocarlos. Purgas, desapariciones, y cualquier otro método será usado. Ya no se tolerará cualquier oposición. O estas de nuestro lado o esta en contra de nosotros. Muchos morirán, pero es un sacrifico que debe ser hecho para asegurar un futuro próspero a nuestra nación- Para el amanecer, nuestro mandato será asegurado para siempre, y el futuro de Francia será asegurado. Con nosotros en el timón."
 FAF_Fan_the_flames_of_Hate: "Avivar las llamas del odio"
 FAF_Fan_the_flames_of_Hate_desc: "El odio es por lejos una de las emociones humanas más únicas. La historia ha mostrado que algunos de los mandatos más exitosos utilizaron el odio. Ya sea Hitler, Stalin o Hirohito, todos entendieron como usarlo como una herramienta para controlar las masas. El pueblo francés odia a un buen numero de grupos. Musulmanes, soviéticos, enemigos de la nación francesa, realmente no importa quienes son. Para el ciudadano promedio, son todos iguales. Este infierno de furia es tanto una bendición como una maldición, pues puede cementar un régimen. o derrocarlo. Mientras Francia entra una nueva era, el odio se convertirá no solo en una herramienta sino en un símbolo nacional. Una vez mas. el mundo temerá a Francia, and nuestros enemigos sufrirán tal como nosotros sufrimos."
 FAF_the_grand_council_idea: "Gran Consejo del Fascismo"
 FAF_the_grand_council_idea_desc: "El sistema político francés ha demostrado una vez más que es un desastre ineficiente. Al igual que la antigua monarquía borbónica, debe ser derrocado para dar paso a un nuevo sistema. Con un Gobierno más valiente y con iniciativa, Francia reconstruirá y redescubrirá su antigua gloria. El mediocre sistema democrático será sustituido por la vitalidad del fascismo. La única forma de conseguir grandes cambios y reformas es mediante un liderazgo fuerte, no debatiendo ni votando. Formaremos un nuevo aparato estatal basado en el Gran Consejo del Fascismo ialiano, que dará inicio a una nueva era de prosperidad para nuestra nación."
 FAF_The_Pride_of_France: "El orgullo de Francia"
 FAF_Hail_to_the_Chief: "Salve al jefe"
 FAF_The_Sword_and_Shield: "La espada y el escudo"
 FAF_Cult_of_Loyalty: "Culto a la Lealtad"
 FAF_work_family_fatherland_vichy: "Travail, Famille, Patrie"
 FAF_Militarize_the_Boyscouts: "Adoctrinar a la juventud"
 FAF_All_for_the_Nation: "Todo por el Estado"
 FAF_Rebuild_the_French_Family: "Salvar el tradicionalismo"
 FAF_Create_a_Million_Man_Army: "Ejército de un Millón"
 FAF_Patriotism_at_its_Utmost: "Emanar patriotismo"
 FAF_Fountain_of_Life: "Fontaines de vie"
 FAF_Reinforce_the_old_Axis: "El gallo y el águila"
 FAF_Found_the_French_State: "Renacer del Estado francés"
 FAF_The_Coronation: "Una gran coronación"
 FAF_The_Coronation_desc: "La casa de Borbón, por la gracia de Jesucristo nuestro señor, regresa a las ardientes manos de Francia. No hay tiempo que perder, pues los revolucionarios y pretendientes están al acecho, debemos preparar una gran coronación rápidamente en la catedral de Reims. Siguiendo la tradición, coronaremos a nuestro rey por derecho divino y empezaremos a trabajar para consolidar nuestro poder y acabar con los elementos disidentes. Vive le Roi!"
 FAF_Restore_the_Ancien_regime: "Renacimiento del Antiguo Régimen"
 FAF_Restore_the_Ancien_regime_desc: "El Antiguo Régimen, término empleado para describir el sistema que dominó la Francia prerrevolucionaria, debe ser reestablecido para que así podamos gobernar sin ser frenados por las innecesarias trabas burocráticas e instituciones de la república. Revivir el sistema estamental nos permitirá organizar a los integrantes de las tres clases de cualquier sociedad funcional en sus respectivos grupos y revivir el absolutismo divino dará a nuestro rey un poder ejecutivo incuestionable y, con la benevolencia y sabiduría de Su Majestad, se evitará repetir los errores del anterior Antiguo Régimen. El absolutismo benevolente, verdaderamente benevolente, está entre las mejores formas de gobierno existentes en el mundo. Nosotros seremos la prueba de esto."
 FAF_Restore_Old_Titles: "Restaurar títulos antiguos"
 FAF_Restore_Old_Titles_desc: "Bourbon is not the only House of the old Kingdom that lost their thrones, the noble lines of Nevers, of Orleans, of Burgundy, of Lorraine, we could sit here for hours speaking of the injustices that befell nobles of every region, so many ancient houses overthrown by the Republic and by the Bonapartist Empire. Today we remedy this, as we have crowned our King we shall again crown Dukes, Counts, all who are due a title. Even as the Orleanists and Bonapartists pretend for our throne, they have ancient rights, Orleans belongs to its namesake house, and it would be prudent to grant the Bonapartists Corsica, it might stave off the regionalists from plaguing us there and it will calm the more moderate supporters of their claim."
 FAF_Lap_of_Luxury: "En una vida de lujo"
 FAF_Lap_of_Luxury_desc: "Many of our Nobles have spent centuries in exile by this point and..they often return broke or close to it. Some like the Orleanists or the Bonapartists or ourselves retained our wealth in foreign holdings, but many of us never recovered, some local nobility fell so far that their only heirs were found working in factories or in corner stores, we have to bring back what is divinely ordained to them, it is in their blood and it is their birthright that they are to guide their regions forward, blessed by wealth, so that they may bless their subjects through wise contributions and investments. \n\nHow can our Nobles rule if they are but commoners in silk?"
 FAF_Patronage_of_the_Arts: "Patronazgo de las artes"
 FAF_Patronage_of_the_Arts_desc: "The Louvre stands in the heart of Paris, an ancient and unforgettable testament to devotion of the House of Bourbon to the preservation and patronization of the arts, initially built as a fortress, it is now the world's most famous art museum preserving pieces of art and exhibiting new ones, under the Republic this was art was strange and overshadowed by Renaissance pieces, we will revive our long standing commitment to the preservation and development of art and culture by expanding the Louvre and commissioning Frances greatest artists to produce new masterpieces."
 FAF_Curtsy_to_the_Wealthy: "Curtsy to the Wealthy"
 FAF_Curtsy_to_the_Wealthy_desc: "The Wealthy Patricians of the Republic are a much a hindrance as they are a potential boon, while many are loyal many more worry we shall strip them of their wealth, strip them of their lands, all for perceived support of the Republic, but we respect the Merchants and their role in ruling has never been more important than right now in any other time in human history, the Nobles are divine, the King answers to God himself, but even the King must have a strong economy. \n\nBy supporting the wealthy and honoring their status with the creation of new honorary titles and a series of knightings, we shall find ourselves in possession of a new noble clique that will be fiercely loyal, unlike some of the old blood."
 FAF_Renew_the_Ordinance_of_Villers_Cotterets: "Renew the Ordinance of Villers-Cotterêts"
 FAF_Renew_the_Ordinance_of_Villers_Cotterets_desc: "The Ordinance of Villers-Cotterets is an ancient document, signed in 1539, but it is still in use. We should modernize and expand the Ordinance, it helped modernize France once and it shall do so again, bringing us back to a more natural law code fitting the France of Yesterday so that we might preserve the France of the Future. \n\nWe will expand on Articles of the Ordinance which banned Trade Federations and expand the definition to include modern Trade Unions along with other Worker organizations to prevent the organization of the working class into a weapon against the King. We will reinstate the articles that gave the Church the privilege of handling the civil register through the Parish system, where baptisms were once used to track birthdates, but we will change provision that makes birthdates based on the date of baptism as modern infrastructure necessitates that we need not overwrite that privilege being granted to the Hospitals as has been for a century now. \n\nWith just a few changes to the old Ordinance, we have a law code that is befitting a modern absolutist Monarchy, replacing the Republican civil code once and for all."
 FAF_A_Righteous_Monarch: "Exude Righteousness"
 FAF_A_Righteous_Monarch_desc: "Righteousness is a virtue, all good men must aspire to be righteous, charitable, courteous. We will surely fall short of God's perfection but our devotion to Jesus Christ is our salvation, it is his grace that makes man's imperfections forgiveable. \n\nThe French must be a people, from King to Commoner, utterly dedicated to Christ and dedicated to the well being of not just France, but all true believers. \n\nWe will use the states apparatus to promote righteous virtues, our King shall honor God often in speech, and our Nobles shall do the same. \n\nIt is by God's grace we rule, and it is by God's grace that we will prosper."
 FAF_Perfect_French_Craftsmanship: "Artesanía perfecta"
 FAF_Perfect_French_Craftsmanship_desc: "In Pre-Industrial Times, France had some of the greatest craftsmen in Europe, our warriors fought wielding and wearing the greatest steel that had ever been forged, but thanks to Bonapartist and Republican mismanagement, we allowed Britain and the Germans to runaway with industry. In the modern day we are industrialized but the world does not see 'Made in France' as quality, the Germans hold that title, no longer. \n\nIt is not enough to be industrialized, we demand only the finest for our people and for export, every product is a personal ambassador of France and the King to our people and to people abroad. Anything less than perfect is unacceptable."
 FAF_Dieu_Veut: "Dieu Veut"
 FAF_Dieu_Veut_desc: "La Santa Francia siempre ha cumplido con su deber, primero bajo los Valois y luego bajo los Borbones, en su lucha por combatir a los sarracenos, los paganos y los herejes. No pudimos evitar que el mal del ateísmo consumiera a nuestra nación hasta ahora, y nunca más permitiremos que nos invada. \n\nLa amenaza comunista se cierne sobre Europa como los sultanes y califas de antaño, mirando con hambre las tierras de los fieles, con la intención de apartar a nuestro pueblo del camino de nuestro Señor y Salvador. \n\nTomaremos el escudo y la espada, pidiendo a nuestros antiguos santos que se unan a nosotros en oración antes de llevar la palabra de Dios hasta Moscú en la punta de una lanza."
 FAF_Every_Weapon_a_Masterpiece: "Every Weapon a Masterpiece"
 FAF_Every_Weapon_a_Masterpiece_desc: "It is not just our armor that makes a good soldier, if his weapon is of poor quality he will be slain by enemies who wear nothing but bear a more reliable armament. While arms have evolved from sword and spear to the mighty firearm, it is not enough to simply have great metallurgy, our firearms, our cannons, our weapons systems of all types, must be of the finest quality, tens of thousands of rounds will fire from the average rifle just in training, in the field, a soldier must be able to rely on his weapon. \n\nIf the Archangel Michael returns with Christ tomorrow, we should hope when he takes command of our army that he inspects his first formation with a smile that says 'These men are ready to storm hell and come back alive.'"
 FAF_Modern_Knights: "Caballeros modernos"
 FAF_Modern_Knights_desc: "France was always for a millennia renowned for it's Knights, Knights of the highest quality mounted on the greatest steeds wearing the most solid armor our blacksmiths could make. In the modern day, though shining silver warriors on horseback are antiquated, they have been replaced by Da Vinci's ancient concept, the Tank, the Republic did one thing right in their rule, they gave us the Leclerc. \n\nThe Leclerc is named after a Republican officer, so we will develop an evolution of it, our Knights will not shine because of the thermal coating on the armor but they will storm across the fields and Europe WILL learn to fear them once more, when the French Chevaliers storm east, we will make even the Reds beg God for forgiveness."
 FAF_Claim_the_Throne_of_Spain: "Rectificar la soberanía española"
 FAF_Claim_the_Throne_of_Spain_desc: "Spain has been an old friend of France for many years, the Bourbon dynasty for a time ruled in both nations and again comes a time where both rule their respective nations, France and Spain are indeed strong, but we could be stronger together. \n\nThe EU helped foster a sort of internationalism among many Europeans, promoted even by Blue bloods of our own caliber like the Habsburgs, let us embrace a little limited variant of this, reviving the idea of the Frano-Spanish Union, while it was never realized we have the opportunity to realize it right now, a new super power on the continent. To form the Pacte de Familie into a nation to stand the test of time."
 FAF_Hold_Elections: "Celebrar elecciones"
 FAF_Hold_Elections_desc: "The chokehold of authoritarianism has finally loosened on the nation, as democracy once again prevails throughout our lands. We have worked tirelessly to ensure the first elections of our new government are maintained to be as free as possible and ensuring that foreign intervention from our radical neighbors doesn't tamper with the progress we strive to achieve. Democracy will triumph as it has throughout our history and we will set the example as the democratic beacon of Europe."
 FAF_Victory_of_the_Republicans: "Les Republicains Victorious"
 FAF_Victory_of_the_Republicans_desc: "Many in France still fondly remember the war hero president, Charles de Gaulle, but what do they know about him? He led France both in its darkest days and its brightest days. During the days of exile in Africa, who led the shattered Free French forces to reclaim the homeland? Who consistently came to Frances's aid when it was needed? Including leading the nation as its president. Our victory is not just about saving French democracy but also about preserving De Gaulle's vision for France. One where France will be united and free, bound only by its obligations to the people and the nation."
 FAF_Renounce_German_Militarism: "Denounce German Authoritarianism"
 FAF_Renounce_German_Militarism_desc: "As we piece our fragile democracy back together, we are faced with a horrifying reality. Our greatest ally has fallen. Following \"Day X\" the German nation has become consumed by radicalism. Ultranationalists, xenophobes, neo nazis, these extremists have overrun the once serene republic. Harkening back to the end of the Weimar Republic, these extremists have exploited a fragile situation to once again claw back power for themselves. We cannot allow this blatant overthrow to go unnoticed. We will expose this new regime for what it is, nothing more than a blatant attempt at restoring the brutal authoritarianism of the Nazi regime."
 FAF_Take_Count: "Evaluación Nacional"
 FAF_Take_Count_desc: "The state of France could not be more chaotic. Our victory has come at a tremendous cost to our government and the economy. Cities lay in complete ruin, the countryside is in utter anarchy, and millions of our civilians face the threat of starvation. There is much we have planned for our great nation. But before we can begin rebuilding our country, we must diagnose its ailments. There is much that's broken, but there is also much that can be kept. And we must ensure that we take time to properly address the issues that plague our nation. We are the doctors, and our nation shall be, regardless of what it may cost."
 FAF_Maintain_a_Strong_State: "Maintain State Strength"
 FAF_Maintain_a_Strong_State_desc: "Every nation thrives off the strength of the state, from the prosperous empires of the past to the modern nations of today. It is the very engine of the state, the heart that pumps the blood that keeps the nation functioning. This vital organ briefly ceased to function during the civil war that rocked our nation. However, the restoration of democracy and our victory in the election has given us a unique opportunity. Brick by brick, we will restore the strength of the French state. Bureaucracies will be restored, ministries will be reshuffled, and necessary cuts will be made. France's future depends on the organs of state always being at peak performance."
 FAF_The_Unwilling_Ally: "The French No"
 FAF_The_Unwilling_Ally_desc: "For far too long, France has been pushed by foreign countries and organizations. Our reliance on America post World War 2 crippled our economy. Our commitment to NATO-led to our once grand army being reduced to a shell of what it once was. The EU forced us to throw open our borders to all kinds of migrants, causing waves of instability and unrest during Macron's presidency. No longer will any of this be tolerated. If France is to survive, then France must put itself first. No more appeasement, no more treaties, no more foreign meddling. France says no, and it shall stand by its word. Even if it means we must fight."
 FAF_Guardian_of_National_Interest: "Guardian of National Interest"
 FAF_Guardian_of_National_Interest_desc: "For many years, the liberal establishment of the Fifth Republic claimed that they were serving the people, but it couldn't be further from the truth. Macron was just a pawn of the EU and other Pan-European organizations. Despite protests and complaints, the establishment continued to shell out to these outside organizations. And eventually, they paid the price for neglecting the needs of the people. Now that democracy has been restored, we will not make the same mistakes as past regimes. For us, the people come first, not the elites or the autocrats. France once more shall be a country that prioritizes its interests, and we will not back down from this, even if it means we must prepare for war. "
 FAF_France_Revitilization_Committee: "France Revitalization Committee"
 FAF_France_Revitilization_Committee_desc: "Despite our victory and the restoration of democracy, much of the country remains in complete and utter ruin. Cities reduced to rubble and flames, the countryside in complete anarchy, and our people going hungry. It is clear that if France is to reclaim its power in Europe then some major rebuilding is in order. Under our guidance, we will assemble a committee of economists and central planners. Under our guidance, they will draft a plan to rebuild France from the ground up. Not only to repair the French economy but also to restore the people's faith in the government."
 FAF_Rebrand_Militarism: "Lavado de cara al militarismo"
 FAF_Rebrand_Militarism_desc: "¿Por qué una nación no se sentiría orgullosa de su ejército? ¿No son ellos los que defienden a su pueblo y protegen sus intereses nacionales. La triste realidad es que el auge de la derecha radical provocó que el militarismo sea asociado con brutales dictaduras como la de Hitler o Mussolini. Incluso lo que desencadenó nuestra guerra civil fue un golpe de estado por generales militaristas. De cualquier modo, nosotros buscaremos darle una nueva imagen al militarismo. Ya no será un concepto ligado a juntas o caudillos. En cambio, será una fuerte de orgullo cívico. Una vez más, el ejército francés será la espada de la democracia, preparada para enfrentarse a cualquiera que amenace a nuestra gran nación."
 FAF_Staunch_Dirigisme: "Staunch Dirigisme"
 FAF_Staunch_Dirigisme_desc: "One of Macron's biggest failures was his utter lack of economic regulation. Blinded by corporate donations, he allowed corporations and private enterprises to overrun the economy. Shutting out any competition from small and medium businesses and effectively establishing complete corporate control over the economy. This great injustice cannot be allowed to continue any longer. Like Theodore Roosevelt, we will embark on a grand crusade to purge corporate domination over the economy. Whether it be regulations, taxes, or antitrust laws. We must be willing to play hardball with these pigs. The CEOs and executives will scream and cry, but we care little for their complaints. For France's future is one of the people, not one of the autocrats."
 FAF_The_Blank_Check: "Autonomous Military Spending"
 FAF_The_Blank_Check_desc: "For most of our history, our military spending has been a key link to our economic output and GDP. This, however, has led to the festering of many problems, both political and economic. However, times of peace are very short-lived, even today. And we cannot afford to make any cuts to our military spending. So, as a compromise, we will begin to separate our military spending from our total GDP. Allowing us to give our military priority in times of crisis. For times of calm and short-lived, and if you want peace, then you must make ready for war. "
 FAF_Memories_of_the_Past: "Protect Bundeswehr Opposition"
 FAF_Memories_of_the_Past_desc: "After radical militarists overthrew the government, the German nation was sent spiraling into complete chaos. Protesters swarmed the streets, and even Bavaria seceded with Austrian assistance. We cannot sit idly by as our once greatest ally spirals into authoritarianism and xenophobia. Much of the Bundeswehr high command has begun fleeing the country, and many have looked to us for asylum. Their knowledge of the Bundeswehr's inner workings would grant us an upper hand on our former ally. Allowing us to be properly prepared for any inevitable confrontation."
 FAF_Gaullism_Saves_France_Again: "Gaullism Saves France Once Again"
 FAF_Gaullism_Saves_France_Again_desc: "French history has always been defined by times of great darkness and times of great progress. In times of crisis, it is often up to one person to take the reins and steer France out of darkness and onto the light. Whether it be our liberation from Nazi occupation or instability during the crisis in Algeria, Charles de Gaulle was there to steer the nation away from calamity. And like those times, France has once more been thrown into chaos. The resurgence of the Soviet Union threatened to destroy the very foundation of our democracy. But we have saved it, and guided by De Gaulle's ideas, we will steer France out of chaos and into another golden era of prosperity."
 FAF_Victory_of_MoDem: "Una victoria para la democracia"
 FAF_Victory_of_MoDem_desc: "Though we have struggled through extremism and the threat of our democracy being extinguished, we have prevailed in the end. The people of France have brought back their will, brought back the state of France as it was before the war, not corrupted by the Fascists, Dictators, or Ultranationalists who threatened her sanctity."
 FAF_A_New_Look_at_Centrism: "A New View on Centrism"
 FAF_A_New_Look_at_Centrism_desc: "Las ideas del centrismo durante la era de Macron eran tontas y contraintuitivas. Centrismo no es simplemente ignorar todo, es el concepto de tomar todas las ideas y hacer que funcionen, encontrar la verdadera perspectiva in el medio de la izquierda y la derecha. Es la verdadera democracia, una que toma en cuenta a todos, no solos a unos cuantos."
 FAF_Calm_Radical_Voices: "calmar voces radicales"
 FAF_Calm_Radical_Voices_desc: "While democracy has been re-established, there are still threats to our fragile system, actively fighting against it for an ultranationalist and horrific France, full of violence and hatred. These people cannot be allowed to continue fanning their flames of loathing, their thoughts corrupting and bringing down the very foundations of our nation."
 FAF_A_Flexible_Government: "Un Gobierno flexible"
 FAF_A_Flexible_Government_desc: "A government, inherently, should be able to change. It should not stagnate or loop back into the same norms it once had, it should be something that takes things and makes them anew when they are no longer what works. Not once should we halt in our march to perfection, whatever that perfection is."
 FAF_Lift_the_Ban_of_Leftist_Groups: "Lift the Ban on Leftism"
 FAF_Lift_the_Ban_of_Leftist_Groups_desc: "One of the critical mistakes of our former government was banning the Left entirely, even in a democratic election. This is foolish, only leading to more violence and partisanship. A true democracy would allow it to flourish and prosper should that be the wish of the people, not a simple and brutish ban on the thoughts that our people have."
 FAF_A_Transparent_Government: "Call for Transparency"
 FAF_A_Transparent_Government_desc: "France, ever since the fall of the Fifth Republic, has been something covered in smoke and mirrors. Led by elite societies, hidden from the view of the people within her. This shall stand no longer. The levers behind our governance shall no longer be hidden, the many various secret factions and subfactions, along with those mechanisms behind voting and democracy being brought to light."
 FAF_Reduce_XIV_Influence: "Reduce XIV Influence"
 FAF_Reduce_XIV_Influence_desc: "The XIV Society is a stagnant remnant of the old France, one which has no right to remain in our newly remade democratic society. It is a cabal of Fascists, Militarists, and other various people who work against the means of democracy for their own purpose in the shadows. Slowly, carefully, they shall be excised like the tumor they are from our nation."
 FAF_Restart_Minitel: "Kickstart Minitel"
 FAF_Restart_Minitel_desc: "Decades ago, there was a solely French product of digitalization. Referred to as Militel, it was an internet before the internet existed, solely for and by France. This project - while having a different purpose than it did originally - will be remade and refurbished, something greater than it was before, reaching heights that were never imagined by the original envisioners of the project."
 FAF_Reclaim_the_Public_Sector: "Reclaim the Public Sector"
 FAF_Reclaim_the_Public_Sector_desc: "Of the many mistakes of the former government, one of them was the large waves of privatization they committed of formerly public resources. While a boon in simple money in the short term, this will doom France to stagnation and economic ruin in the future, just as Britain nearly was. Slowly, over time, the abandoned public sector will be taken back into government hands."
 FAF_Digitize_the_Government: "Digitize the Government"
 FAF_Digitize_the_Government_desc: "In the 21st century, a government can no longer be run on simple machines or on pen and paper. Using the Minitel project we constructed, the government will slowly become something that can be performed entirely electronically, something that need not wait hours for arrival, or have any delay in time. A modern democracy requires a modern government, and we cannot lag behind."
 FAF_Universal_Pardons: "The Universal Pardon"
 FAF_Universal_Pardons_desc: "Many leftist leaders and figures were imprisoned or sentenced solely for the sake of being socialists, or on the left. These horrific, anti-democratic acts will be reversed entirely and completely, wiping the slate clean. There will be no record nor any consequences of their falsely given sentences, and all of them will be given their rightful freedom. May the sins of the past be forgotten."
 FAF_Victory_over_Authoritarianism: "victoria contra el autoritarismo"
 FAF_Victory_over_Authoritarianism_desc: "The dark hours have passed, and freedom is to come. The Fascists and the Military tried to wrangle her spirit away from her, but France remained stalwart, bringing itself back from the brink of death just as it did in times long past.\n\nFrom nothing, France's democracy has been begotten, rising from the ashes more beautiful and more pristine than ever before. Though subversive elements fight against us, and though there are still imperfections, we have taken coal and turned it into diamond.\n\nVive la France!"
 FAF_Victory_of_the_National_Conservative_Union: "Continue Villier's Dream"
 FAF_Victory_of_the_National_Conservative_Union_desc: " Despite Villier having resigned his position in Office, this doesn't mean we will stop with his reforms. Despite his previous role in the military and previously the chief of defense, his plans of a strong and successful democratic France cannot just be ignored, as we see potential in his ambitions."
 FAF_Introduce_Healthy_Patriotism: "Healthy Patriotism"
 FAF_Introduce_Healthy_Patriotism_desc: "Unlike blind nationalism, which encourages the destruction and invasion of foreign countries, Healthy patriotism is a balanced and constructive love for a person's country that promotes unity, progress and responsibility."
 FAF_The_Voice_of_the_People: "la voz del pueblo"
 FAF_The_Voice_of_the_People_desc: "The party represents one thing, the people. If we want our new France to succeed The people must be heard, we want their opinions to be heard.\n\nFor too long have the French people been neglected by the old regime that only cared about themselves and not the people. If we are to survive, we must all be united and ready to work with one another."
 FAF_Restore_Public_Trust: "Restore Public Trust"
 FAF_Restore_Public_Trust_desc: "If we want to avoid ending up like the last corrupt establishment with one of the lowest approval ratings in French history, we must be more open with the public about our policies and spending and crack down on corruption, as it has strained the Frenchman for a long period of time."
 FAF_Last_Beacon_of_Democracy: "Last Light of Democracy"
 FAF_Last_Beacon_of_Democracy_desc: "We are one of the last democracies in Europe, We must set an example to the world in human rights and democratic governance. This will require a strong institution, ethical leadership, and active citizen engagement."
 FAF_Codify_Anti_Corruption_Laws: "Codify Anti-Corruption"
 FAF_Codify_Anti_Corruption_Laws_desc: "Corruption has been a major issue within France, and this has left our population questioning our regime. We will start by Integrating Anti Corruption Laws that crack down on Corruption into the French Code in order to ensure that it does not strain the life of the French man."
 FAF_Restore_the_Countryside: "Restore the Countryside"
 FAF_Restore_the_Countryside_desc: "The countryside has been left in ruin and always been neglected. The Farmers and rural citizens require desperate care. We must undergo huge infrastructure projects, provide economic aid, and tax breaks to help small businesses grow, which will hopefully attract more people to the countryside."
 FAF_Obscure_Rampant_Militarism: "Obscure Rampant Militarism"
 FAF_Obscure_Rampant_Militarism_desc: "Since the end of the European war, Western Europe has fallen into chaos. It is becoming evident every day that we must re-arm ourselves again and repair our disorganized military if we wish to survive the next decade. We must obscure our plans of remilitarization from the whole world as it poses the risk of being seen as a provocation."
 FAF_Restore_bureaucratic_safeties: "Safety Net of Bureaucracy"
 FAF_Restore_bureaucratic_safeties_desc: "Corrupt Bureaucracy has always plagued France, especially with the last administration, it has prevented people from getting necessities and has generally slowed down the economy. This can be prevented by creating a \"Safety Net\" that will help the poorest in France maintain the minimum standards of Living."
 FAF_Comprehensive_Veteran_Aid: "Comprehensive Veteran Aid"
 FAF_Comprehensive_Veteran_Aid_desc: "As the dust settles in Eastern Europe, A lot of returning veterans have been left with no money and require extensive care to get back on their feet. We will provide major tax breaks and free housing for the veterans who risked their lives to defend our nation to help them get back on their feet."
 FAF_Guarantor_of_Liberty: "Guarantor of Liberty"
 FAF_Guarantor_of_Liberty_desc: "Our hard working president has saved Democracy in France and with the help of his coalition have built a brand new democracy, not one that is corrupt but one that represents the people and their needs. France has and will and forever continue to protect one thing, Liberty. "
 FAF_Reclaim_our_Dignity: "Reclamar nuestra dignidad"
 FAF_Reclaim_our_Dignity_desc: "Despite the humiliation we suffered in the war against Russia, this doesn't mean we are completely humiliated. We have still remained French and are the Masters of Western Europe, we have managed to regain our Dignity by becoming the shining beacon of democracy of the world and showing the world how a true democracy functions."
 FAF_A_New_Order: "El nuevo orden"
 FAF_A_New_Order_desc: "The Pétainists did not go far enough. We will replace them in every institution in the coming weeks. And we will secure our future. \nAs we step bravely forward into a new era from the clutches of defeat! We will step on those who failed us, the Jewish bankers, the German Socialist Swine, it's a Judeo-Germanic conspiracy brewed to make France weak and subservient through useless institutions like the European Union and all these blind social programs. \n\nNo more European Union! No more Judeo-Germanic Communists telling France how to live, holding back the French people from their destiny as one of the greats! \nWith the rise of our leader! Lafayette! A New Order falls upon France! And shall soon fall across Europe!"
 FAF_Entrench_French_Superiority: "Entrench French Superiority"
 FAF_Entrench_French_Superiority_desc: "The Pétainist government did not go far enough, allowing minorities some autonomy within France, France! Is for the French! And no foreigners can ever come to the kind of superiority we French possess. We have the food, we have the art, we have the culture, we even have the genetics. \n\nThe French are an inherently superior culture and race, above our neighbors, above Europe, we are the best nation Europe has to offer and all of Europe will be forced to hear us proclaim it! French Superiority is the only way forwards! Until every heart, mind, and soul in this nation truly believes they are leagues above everyone they have ever met beyond our borders we will have not finished the task of pushing the point! Vive la France!"
 FAF_Demand_Patriotism: "Demandar patriotismo"
 FAF_Demand_Patriotism_desc: "Patriotism is not simply a thing you get to occasionally feel, if you are a proud French citizen, you will love France no matter how hard times get, you will love France while we trudge through the mud, you WILL trudge through mud FOR France! France demands the loyalty of it's people for it's people demand respect from the world. \n\nA Dissident Frenchman is no longer French, you will love France, you will love Lafayette, you will serve France until you are no longer capable and you will do it with a smile.\n\nWe're putting it into law, if you are found to be speaking against France, against France's righteous fury, against it's actions? You will never be seen again, and if anyone asks about you, they won't be asking for long."
 FAF_Silence_Critics: "Silence Judeo-Germanic Communard Sympathizers"
 FAF_Silence_Critics_desc: "So called Social Democrats are a sick people, infected by the SPD, an old Judeo-German political movement from the revolutions of 1848, the SPD was one of the main political forces that inspired similar movements all over the world and now it's toxic influence is in our lands, in our own people, the ideas of a safety net, of social welfare, a 'worker's paradise'? Foutaise. France is diseased, rotten to the core. There's no saving it, we have to pull it out by the roots, wipe the slate clean, BURN IT DOWN, and from the ashes a new France will be born! Evolved, but untamed! The weak will be purged, and the strongest will thrive. They'll make France great again, free of this foreign cancer, free of Judeo-Germanic Communards!"
 FAF_Enforce_Social_Harmony: "Enforce Social Harmony"
 FAF_Enforce_Social_Harmony_desc: "To ensure a society that is in total cognitive harmony, we have to remove those playing the wrong tune, for an Orchestra to sound amazing you have to remove it's weak links, not everyone is capable of participating in the Great National Orchestra of France, some of them aren't French or they're Communists or they're Judeo-Germanic kissers or they're mentally disabled and yelling about their pensions. \n\nYour pensions aren't coming back crazy, figure it out, better yet, we have already figured it out for you. You are not in harmony with our new society so you will be removed from it permanently. \nFrance has no room for invalids or the genetically unclean or the mentally ill, plagued by Liberalism and it's unholy cousin Communism."
 FAF_The_Dreams_of_Charlamagne: "Dreams of Charlemagne"
 FAF_The_Dreams_of_Charlamagne_desc: "Charlemagne led the Frankish Empire during the absolute height of the French people, when the French were not just where we are, but in Berlin, in Bavaria, in Franconia, in Lombardy, all of these areas were once French and they drifted away from us formed their own regional languages, how could they? \nThey forsook Charlemagne and the French dominance of Western Europe for petty regionalism? No doubt prompted by the Jews. \n\nIn Lafayette's France, we will bring these wayward souls back into the Empire, back into France's embrace. They will be French again and they will love it, they will sing our songs, march in our armies, and we will utterly destroy those who forced foreign tongues onto our people."
 FAF_Purge_Corrupt_Bureaucracy: "Purge Corrupt Bureaucracy"
 FAF_Purge_Corrupt_Bureaucracy_desc: "It has come to our attention that elements of the national bureaucracy are considering the welfare of individuals over the welfare of France, that in closed door meetings and in hushed whispers there are echos of Judeo-Germanic sentiment. In the very streets of Paris you can hear if you listen very closely, the enemy is all around us, and they are cowering quietly in government. But we have our lists. \n\nWe know every whisperer, every bleeding heart, every Communard, every Judeo-Germanic hiding in plain sight right within our own government structure, former Pétainists, former Liberal bureaucrats, the national heirarchy of France has no room for those who consider the plight of one over the plight of the nation at large, FRANCE COMES FIRST, even if that means some of our citizens suffer, to live a Spartanist lifestyle is to harden oneself, Spartanism is not a bad thing, it teaches one to be frugal, self sufficient, and to make smart choices, it weeds out those too insolent to perform the task under such stress. \n\nThese liberal ideas have no place here."
 FAF_The_Judge_Jury_and_Executioner: "Juez, jurado y verdugo"
 FAF_The_Judge_Jury_and_Executioner_desc: "We must trust in our leader, Lafayette, to deliver us from defeat and to deliver us from shame. He is the sole authority in France, he is our deliverer, our JUDGE, our JURY, and our EXECUTIONER. \nThrough total and absolute state control, all dissidence will stamped out, there will not be allowed any longer the existence of foreign influences, foreign business, businesses that sell to foreigners, foreigners in general. \n\nLafayette's decree's are our gospel, our goals, our ambitions, we are but instruments for France, and Lafayette is the surgeon, opening and closing France with precision, excizing societal tumors and replacing dissident organs, when France leaves the operating room she will be a well oiled machine bent on the death of our enemies, and you will be right behind her!"
 FAF_Perfection_of_the_Regime: "Perfection of Authority"
 FAF_Perfection_of_the_Regime_desc: "Through the guidance of Lafayette, our cultural uniformity reforms have carried us forward to this point, a point where the central authority, the authority of Lafayette, is undisputed. \nNo protests, no naysayers, nothing but sweet silence and the silent step of obedient civilians, while the thunder of marching drowns out everything else. \nFrance has been refined into the well oiled machine it was meant to be, Lafayette can put away the scalpel now, France is now what it has to be. France is ready for the coming trials, The Reclamation, and the coming wars of revenge. \nWith all internal threats eliminated, we can turn our entire machine to the outside, prepared for our Reclamation of the Frontiers, all that is left to do is wind up the clock and wait for the alarm."
 FAF_Control_the_Youth: "La generación de patriotas"
 FAF_Control_the_Youth_desc: "Pacifism was, Emphasis on was, a cancer on French society like so many other things imposed from other nations. We French were an ancient warrior culture honed over 3,000 years, only for modern society to strip it away, for Judeo-Germanic concepts of Social Democracy, Liberalism, and Internationalism to disarm us. \n\nFor a time we felt warm for our neighbors, can you believe it? A Generation formed with impurities. The New Generation is lost and we have given them a new purpose, the service of France, it is not an optional purpose. \nThis purpose is the purpose of all citizens, we're all sons of the patriots now, no more pacifist voices remain in our nation. \nRefined like a diamond, cut by a Parisian Jeweler, our new generation shall be harder than diamond, they shall be the most devoted generation of humans ever produced anywhere in the world."
 FAF_Criticize_Allied_Failures: "Sabotear nuestros aliados"
 FAF_Criticize_Allied_Failures_desc: "Joining the Pact of Steel was a mere ruse. We never had any intention of letting Germany lead us into a war. Our information campaigns have worked perfectly, nothing has leaked out, our rhetoric about judgement day hasn't been heard by any of them. \nThere is always Thunder before there is Lightning. \nWe will send our most loyal men to infiltrate the western reaches of Germany and our other allies in the pact and blow up critical infrastructure and industry, but this is merely a preface to a much larger offensive, we will not give them time to recover, prepare your pokerfaces gentlemen because we're going to have to console our allies while the final preparations are being made to end them forever."
 FAF_Expel_Foreign_Influences: "Expel Foreign Influences"
 FAF_Expel_Foreign_Influences_desc: "France was long considered among the nations of the world most integrated into the Globalist ideal, that of internationalism, liberal philosophies, Judeo-Germanic social democracy, they once said that France was one of the best places to move...'For the safety net.' \nWe do not need a safety net, this is an idea made by the Judeo-Germanic SPD, we do not need liberal philsophies founded in some Austrian university, we do not need other nations in fact other nations want to be French, that's why so many foreigners live here. \n\nWell along with the foreigners go the foreign institutions, every ounce of foreign influence is to flushed away at the hands of our Grande Armee, no more Social Democracy, no more Liberalism, we are in the process of dissolving the Franco-German division and executing it's former members for daring to even participate in a unit that would recognize Alsace as German! While we're at it, begin deporting every non French speaking German in Alsace. We can no longer tolerate their stench."
 FAF_Operation_Napoelon: "§YOpération§!: Napoleon"
 FAF_Operation_Napoelon_desc: "Everything is in place, our society is militarized, our ancient warrior culture revived, our army prepared, our allies are bombed and in disarray, and our orders have been sent, in a mere few hours we will cross the Rhine, cross into the Benelux, cross into Italy, the total recapture of all Frankish territory is our goal to right an ancient wrong, to restore the Frankish State, to step beyond our cage and retake what is rightfully ours. \n\nJudeo-Germanics beware, your last refuge is on the chopping block, you will have nowhere left to run!"
 FAF_Reinforce_the_Regime_Fascist: "Reforzar el régimen"
 FAF_Reinforce_Benedettis_Rule: "Reforzar el gobierno de Benedetti"

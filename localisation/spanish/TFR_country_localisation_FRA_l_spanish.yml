 FPR_utopia_poverty_investment_decision: "§pUtopie§!: Reducir la §Ypobreza§!"
 FPR_utopia_poverty_investment_decision_desc: "Al invertir dinero para paliar la pobreza, podemos reducir nuestra tasa de pobreza."
 FPR_utopia_industry_investment_decision: "§pUtopie§!: Abordar los problemas §Yindustriales§!"
 FPR_utopia_industry_investment_decision_desc: "Al invertir dinero en resolver problemas industriales, podemos mejorar nuestro desarrollo industrial."
 FPR_utopia_society_investment_decision: "§pUtopie§!: Abordar los problemas §Ysociales§!"
 FPR_utopia_society_investment_decision_desc: "Al invertir dinero en resolver problemas sociales, podemos mejorar nuestro desarrollo social."
 FPR_utopia_investment_decision_available_tt: "Ahora mismo, no estamos tratando de resolver ningún problema"
 FPR_utopia_investment_decision_tt: "Obtiene un evento en el que hay §Ycuatro opciones§! de inversión:\n£money §R0,5 mil millones§! para un §Gdesarrollo del +2,5%§!;\n£money §R1,5 mil millones§! para un §Gdesarrollo del +7,5%§!;\n£money §R3 mil millones§! para un §Gdesarrollo del +15%§!;\n£money §R5 mil millones§! para un §Gdesarrollo del +25%§!"
 FPR_utopia_dynamic: "Destino Utopie"
 france.9001.t: "Didier Daeninckx declara utopía"
 france.9001.d: "Didier Daeninckx, autor hecho político convertido en líder, ha declarado hoy que el ambicioso plan para construir una utopía en Francia ha sido completado con éxito.\n\nTras la guerra civil, parecía que Francia iba a pasar por unos duros años de posguerra. Pero Daeninckx tenía el sueño de no solo reparar la nación, sino de convertirla en una verdadera utopía. Las políticas antimilitaristas y anticapitalistas de Daeninckx y su gobierno eran vistas por muchos como contraproducentes teniendo en cuenta el ambicioso objetivo final, pero por lo visto, él estaba en lo cierto.\n\nSi bien los campos de Francia no están cubiertos por maná y ni el dinero crece en los árboles, la calidad de vida del ciudadano francés promedio nunca había sido tan alta. Por lo que cualquiera del exterior comenta, los franceses realmente consiguieron crear una utopía. "
 france.9001.a: "Bien por ellos."

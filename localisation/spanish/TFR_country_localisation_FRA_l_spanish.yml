 Euro_Collapse_idea: "Colapso económico"
 Euro_Collapse_idea_desc: "La recesión de la economía francesa era inevitable. Las enormes reparaciones de guerra y una generación de ciudadanos perdidos en la guerra han hundido a este país, y la recuperación, sin duda, tardará mucho. La situación en Francia parece desesperada, pero confíen en que nuestro pueblo superará la crisis como lo ha hecho tantas veces antes."

 FAF_heirs_of_charlamagne_cat: "Herederos de Carlomagno"
 FAF_heirs_of_charlamagne_cat_desc: "\n\n\n\n\n£GFX_FAF_monarchism_cat\n\n\n\n\n\n\n\nDurante mil años, la dinastía de los Carpetos gobernó con honor y civismo las tierras de Francia, definiendo lo que significaba ser una potencia europea y defendiendo a Francia y su honor cuando la pérfida Albión o los mezquinos Habsburgos intentaron borrar nuestra nación de la faz de la tierra. Pero una y otra vez nuestro rey, respaldado por Dios, defendió nuestra nación. Pero eventualmente eso cambió.\nA causa de nuestro apoyo a los revolucionarios americanos, sus cancerosos ideales de republicanismo se esparcieron en Francia, derrocando rápidamente nuestra monarquía en nuestro momento de mayor necesidad. Dos siglos después, manteniéndonos firmes tras nuestra derrota a manos de Rusia, podemos ver el resultado del gobierno del pueblo en todo el mundo... América está en ruinas, la plaga socialista ha barrido Europa del Este y estuvo a punto de condenar a nuestra querida Francia al terror rojo.\n\nLucharemos con uñas y dientes contra cualquier fuerza desestabilizadora que intente derrocar a nuestro monarca designado por Dios.\n\nVIVE LA FRANCE! VIVE LE ROI LOUIS XX!"
 FAF_growing_republican_army_corps_mission: "La llama imperecedera"
 FAF_growing_republican_army_corps_mission_desc: "\n\n\n\n\n£GFX_FRA_french_spirit\n\n\n\n\n\n\n\nHaciendo eco de nuestro pasado, existe un grupo republicano dentro de nuestro ejército, deseosos de derrocar no solo a nuestro rey, sino que también buscan derogar a los derechos de la iglesia. No permitiremos que se repita la historia de 1793."
 FAF_royal_house_squabbles_mission: "Disputas reales"
 FAF_royal_house_squabbles_mission_desc: "\n\n\n\n\n£GFX_FAF_royal_squabbles\n\n\n\n\n\n\n\nLa cuestión sobre quién tiene el derecho divino para gobernar Francia no debería estar sobe la mesa, pero lo está, y mientras que esto siga así debemos asegurar nuestro gobierno, debemos lidiar con disputas infantiles que dañan nuestra capacidad de gobernar."
 FAF_nobility_cost_mission: "El coste de la estabilidad"
 FAF_nobility_cost_mission_desc: "\n\n\n\n\n£GFX_FAF_nobility\n\n\n\n\n\n\n\nLas disputas nobiliarias amenazan a nuestro régimen, pero los nobles son como toda élite de una nación, el dinero les hace felices y que las élites estén felices conduce a una nación feliz. Llámalos codiciosos, pero están respaldados por derechos antiguos y divinos, derechos que haríamos bien en respetar para que ellos respeten los nuestros."
 FAF_Grant_Refuge_to_HRM: "Refugio familiar"
 FAF_Grant_Refuge_to_HRM_desc: "\n\n\n\n\n£GFX_FAF_spanish_royalty\n\n\n\n\n\n\n\nNuestros familiares en España, los legítimos reyes de nuestro vecino del sur, están siendo atacados por todos los frentes por una gran variedad de enemigos: anarquistas, separatistas, nacionalistas, republicanos, entre otros. No sería bueno dejarlos a merced de la guillotina, nosotros los Borbones ya hemos tenido demasiados encuentros con esa horripilante máquina."
 FAF_use_wealthy_connections_decision: "Usar las conexiones con los ricos"
 FAF_use_wealthy_connections_decision_desc: "Nuestros lazos con la élite francesa significan que tenemos la capacidad de acumular favores para que nos ayuden en nuestros proyectos nacionales. Por el coste de deberle un favor a un noble, podemos incrementar nuestra producción temporalmente, es un trato justo."
 FAF_pay_for_the_arts_decision: "Patronazgo de las artes"
 FAF_pay_for_the_arts_decision_desc: "\n\n\n\n\n£GFX_FAF_patronage_of_the_arts\n\n\n\n\n\n\n\nLas artes siempre han sido el alma de una nación, moldeadoras de cultura. Los periodos clásico y renacentista son vistos como una de las eras doradas del arte y, por supuesto, esto se debe al apoyo que el arte recibió de las distintas monarquías para su desarrollo. Deja que Francia vuelva a ser un centro de las artes, déjanos encontrar nuevas obras maestras."
 FAF_beautify_the_countryside_decision: "Embellecer el interior"
 FAF_beautify_the_countryside_decision_desc: "¡Nuestra nación es hermosa!\n¡Nuestras carreteras son hermosas!\n¡Nuestros pueblos son hermosas!\n¡Nuestros paisajes son hermosos!"
 FAF_man_of_god_decision: "Hombre de Dios"
 FAF_man_of_god_decision_desc: "\n\n\n\n\n£GFX_FAF_man_of_god\n\n\n\n\n\n\n\nEl Rey es un gobernante piadoso, tan piadoso como pragmático y benévolo, guiado tanto por Dios como por el bien del pueblo. Es un hombre, imperfecto, pero eternamente agradecido al perdón de Dios, como todos deben estarlo."
 FAF_divine_right_to_rule_decision: "El derecho divino"
 FAF_divine_right_to_rule_decision_desc: "\n\n\n\n\n£GFX_FAF_divine_right_to_rule\n\n\n\n\n\n\n\nTras muchas deliberaciones, nos hemos ganado los corazones y las mentes del pueblo y los nobles. La casa de Borbón, heredera legítima de la casa de Valois, alzará de nuevo el pendón de la Santa Francia.Vive le Roi!"
 FAF_replace_possible_republicans_decision: "Realizar una investigación en el ejército"
 FAF_replace_possible_republicans_decision_desc: "\n\n\n\n\n£GFX_FAF_lecointre\n\n\n\n\n\n\n\nEl ejército está lleno de detractores, ateos, republicanos y socialistas. Extirparemos el tumor y con el tiempo sanaremos la herida y nos haremos más fuertes."
 FAF_sway_the_nobility_decision: "Influir en la nobleza"
 FAF_sway_the_nobility_decision_desc: "Tener el derecho divino no es suficiente para la nobleza, la divinidad es algo distinto para los duques, condes y patriarcas. Si los orleanistas y bonapartistas les dan un mejor trato, súbitamente ellos ganarán el derecho divino gracias a su \"benevolencia\", pues bien, nosotros debemos ser tan \"benevolentes\" como ellos si queremos asegurar el poder."
 FAF_ancien_regime_dynamic: "Antiguo régimen"
 FAF_ancien_regime_dynamic_desc: "\n\n\n\n\n£GFX_FAF_ancien_regime\n\n\n\n\n\n\n\nGobernamos por derecho divino, y lo hacemos sobre millones de almas que tienen sus propias necesidades y deseos. El nuevo Antiguo Régimen no repetirá los errores del anterior, pero del mismo modo, la soberanía seguirá sin cuestionarse, respondemos únicamente ante Dios, y las riquezas de Francia serán confiadas en su totalidad a la voluntad divina de nuestro monarca. Vive le Roi!"

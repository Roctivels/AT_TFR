 FAF_seventh_french_republic_category: "Construyendo la Séptima República"
 FAF_seventh_french_republic_category_desc: "\n\n\n\n\n£GFX_FRA_new_republic_category\n\n\n\n\n\n\n\nOur republic still stands despite all the hardships we have endured. We will take every measure we can to ensure our democracy will never come this close to collapse once more. France will preserve the beauty of democracy's flowers, which we will allow to bloom once more throughout the nation to heal the scars left by the terrible civil war that almost took everything we hold dear. \n\nThe failures of the past republic will forever be remembered as our darkest hour but also proof of our resolve to fight all the terrors against the rights of free men. With the strength given to us by our Lord God, we shall remain a bastion of democracy in Europe as the fascists and communards topple everything we've worked for. We shall prevail through this great darkness with the guiding light of the torch of liberty that shall beam across all edges of Europe. \n\nLiberté shall prevail!"

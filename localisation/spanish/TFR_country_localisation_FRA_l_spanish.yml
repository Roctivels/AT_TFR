 france.288.t: "Debate en el Golden Tulip"
 france.288.d: "En el café «Golden Tulip», el debate entre Mathieu LeBlanc y Émilie Duval se había prolongado durante dos horas. \"Tenemos que admitir\", declaró Émilie, \"que esta supuesta Quinta República está arrastrando a Francia a un abismo. Míranos ahora: una máquina administrativa sin alma, un desfile de políticos que hablan sin decir nada y promesas de reforma que nunca se materializan\".\n\n\"Eres demasiado radical, Émilie\", respondió Mathieu, dejando su taza de café. \"La república nos ha dado dos siglos de estabilidad y progreso. Es este mismo sistema el que nos ha salvaguardado de la dictadura y la tiranía\".\n\n\"¿Estabilidad?\", se burló Émilie. \"Te refieres a estancamiento. ¿Cómo era Francia bajo de Gaulle? En aquel entonces, moldeábamos el destino político de Europa. ¿Y ahora? Ni siquiera podemos controlar nuestro propio destino. Este sistema se está pudriendo, Mathieu. Es un cadáver disfrazado que deambula por las calles modernas\".\n\n\"Francia tiene sus defectos, pero la solución no es derribarlo todo\", dijo Mathieu con seriedad. \"Cada reforma radical ha tenido un costo terrible. El progreso real debe ser gradual y racional\".\n\n\"Pero la reforma incremental nunca podrá abordar los problemas centrales\", replicó Émilie. \"El problema con este sistema no es superficial, es fundamental. Necesitamos un nuevo sistema que realmente refleje la voluntad del pueblo, un nuevo orden que restaure la gloria de Francia\".\n\nMathieu suspiró..."
 france.288.a: "Todo aquel que sueña con un \"nuevo orden\" acaba convirtiéndose en un tirano."
 france.289.t: "El mitin de campaña"
 france.289.d: "En una reunión de campaña por la tarde, Jean-Pierre acababa de terminar de presentar el plan de recuperación económica de Macron cuando un anciano de cabello blanco como la nieve se levantó de repente entre el público. \"¿Hablas de «reforma»?\" Su voz transmitía el peso de décadas de experiencia vital.\n\"Permítame preguntarle esto: ¿por qué mi nieto, un joven con un título de magisterio, ni siquiera puede permitirse alquilar un apartamento?\"\n\nAntes de que Jean-Pierre pudiera responder, el anciano insistió: \"Siempre hablas de globalización, de la revolución digital, de convertir a Francia en un centro de innovación. Pero dime, cuando un agricultor ni siquiera puede llegar a fin de mes, ¿qué significan para él esos lemas tan grandilocuentes?\"\n\n\"Cada vez que lo veo en la televisión, vestido con ese traje a medida, hablando el lenguaje de los banqueros sobre la reforma. ¿Alguna vez ha oído hablar de las historias en Borgoña? ¿Donde los viticultores están abandonando sus tierras ancestrales porque no pueden permitirse cumplir con las nuevas regulaciones ambientales?\"\n\nLa mano del anciano tembló mientras señalaba el cartel de la campaña. \"He vivido aquí durante más de setenta años. He visto la era de de Gaulle y he escuchado las promesas de Mitterrand. Pero nunca, en ningún momento, me he sentido tan alejado de mi propio país como ahora\"."
 france.289.a: "\"Siento... que te sientas así...\""

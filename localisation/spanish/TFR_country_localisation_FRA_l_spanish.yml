 FPR_utopia_academic_investment_decision_desc: "Al invertir dinero en resolver problemas académicos, podemos mejorar nuestro desarrollo académico"
 FPR_utopia_agricultural_investment_decision: "§pUtopie§!: Abordar los problemas §Yagrícolas§!"

 france.284.t: "El Viejo Imperio"
 france.284.d: "Un helicóptero de transporte francés sobrevuela el desierto, el cegador sol sahariano se ha puesto, llevándose consigo el sofocante calor para dejar lugar para temperaturas gélidas.\nHenri empuñó su rifle, mirando el vasto paisaje, ensordecido por el zumbido de las hélices.\n\nSe acercaban al punto de punto de inserción, un pequeño oasis en el desierto que sobresalía en el horizonte, una aldea en tierra de nadie situada entre los pocos árboles de la sabana. Supuestamente allí se encontraba un alijo de armas de los islamistas, o eso era lo que le habían contado a Henri, por encima de él solo había cosas políticas. El helicóptero aterriza y se escucha un grito distante del edificio, obviamente habían sido escuchados.\n\nRápidamente formaron escuadrones y fueron limpiando cada edificio, despertando a las familias vestidas con harapos en casas pobremente amuebladas, haciendo llorar a niños, tiros que fueron correspondidos por los franceses en una casa, que fue en la que encontraron el alijo. Un niño abrazaba fuertemente al hombre al que habían disparado, Henri vigilaba el lugar mientras se hacía inventario, tomaron 1.823 rifles Kalashnikov y alrededor de 84.000 cargadores de munición. Fue una redada exitosa, ¿pero mereció la pena dejar a un niño huérfano de padre?"
 france.284.a: "Esas eran las preguntas que mantuvieron a Henri en vela."
 france.285.t: "Y siguieron con vida"
 france.285.d: "Ibezimako Chinwendu nació en 1988 en el seno de una familia igbo en Amaeke, sur de Nigeria, viviendo una vida que uno solo puede describir como una tragedia de inicio a fin. Creció con dificultades para acceder a agua limpia y potable e incluso de tener comidas dignas, esto a causa de los insuficientes esfuerzos y la falta de voluntad del Gobierno federal para reintegrar a comunidades como esas situadas en el devastado por la guerra sur del país. Esto le llevó a odiar profundamente a la codiciosa y remarcablemente corrupta élite militar que dominaba a él, a sus amigos y, más importante, a su familia. Encontró refugio y consuelo en el islam, donde aprendió de mártires que definieron eras enteras gracias a su ambición y devoción por su fe. Esto era una chiste, los de arriba traicionaban constantemente los principios que afirmaban seguir y adorar. Las cosas tenían que cambiar.\n\nY vaya que cambiaron. Ahora tenía 33 años, y ya no sufría las duras condiciones del sur rural de su patria. Las semillas de la destrucción sembradas en él hacía 20 años hacía tiempo que germinaron, sofocando su alma, permitiéndole únicamente odiar apasionadamente. Para aquellos que le conocían, era irreconocible ahora, cubierto en insignias del ISWAP bajo la característica bandera negra que era infame no sólo en Medio Oriente y África, sino que en todo el mundo. Estaba encaramado sobre una colina, observando una base militar francesa justo a las afueras de Bula Bul.\n\nEstaba allí con un único propósito, dar su vida por el islam.\n\nEstaba allí, entre ramas de dalbergias y el viento que soplaba por todo su cuerpo. Puso su mano sobre su corazón palpitante, mientras se paró a pensar por un momento. Estaba aterrorizado, en el fondo de su corazón, sabía que no quería hacer esto. Pero también sabía que debía hacerlo. Era la culminación de todo por lo que había luchado, era la oportunidad de hacerse un nombre por si mismo entre los shahids que le precedieron. ¿Ellos, como Sumayyah bint Khabbat, también estuvieron aterrorizados en sus últimos momentos? Puede que sí, puede que no. Al final esto no importaba, pues se habían encontrado con el creador en el más allá. Lo que importaba eran sus acciones.\n\nY así, bajó la colina y se lanzó hacia las luces que lo enfocaban, agarrando el chaleco mientras se lanzaba a lo desconocido por última vez."
 france.285.a: "Al-Imrán - 169"
 france.286.t: "El barman"
 france.286.d: "Las protestas llevan días ardiendo en París por la política del gobierno de Macron, los recortes en la edad de jubilación, las tensiones étnicas internas, el sentimiento antigubernamental, decenas de personas han resultado heridas y, a medida que los Chalecos Amarillos siguen creciendo en número, la policía antidisturbios empieza a intensificar sus represiones contra las protestas. Era un atardecer ruidoso cuando se acercó un camarero local, con un chaleco amarillo sobre su uniforme, un respirador en la cara, llevando dos cajas llenas de botellas vacías que había recogido de su turno.\n\nPierre estaba en la parte trasera, el organizador de la protesta en esta calle específica, el camarero dejó las cajas junto a él con un tintineo de cristal tan común en su línea de trabajo.\n\"¿Traes refrescos?\", dijo Pierre medio divertido.\n\"Munición\", dijo  el camarero, con fuego en la voz.\n\"No, no, no, ¿seguro que no quieres decir eso?\", dijo Pierre.\n\"Solo hay que añadir gasolina\" dijo el camarero, una risa sombría ahogada por los cánticos.\n\"¡Esto es una locura, camarero! ¿Bombas de gasolina? Podríamos matar gente\".\n\"Ellos también nos están matando, sus políticas, sus porras, ¿quieres esperar hasta que rompan cada foco aislado de protestas o hacer ruido mientras puedas?\"\n\nEl camarero y Pierre comparten una mirada tensa. Ambos hombres luchan por el pueblo, pero son dos caras de la misma moneda.\n\"La policía solo sigue órdenes\", afirmó Pierre con firmeza.\n\"Contigo o sin ti, los convenceremos de que no lo hagan\". Y con eso, el camarero lleva una caja de botellas a la gasolinera cercana mientras un colega trae una caja de cócteles molotov preparados."
 france.286.a: "\"Pierre, ya no está en tus manos\"."

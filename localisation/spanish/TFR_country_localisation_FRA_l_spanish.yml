 FAF_fountain_of_life_dummy: "Militarismo francés"
 FAF_fountain_of_life_dummy_desc: ""
 FAF_french_state_dummy: "Militarismo francés"
 FAF_french_state_dummy_desc: ""
 FAF_hold_military_parade_decision: "Exhibir nuestra fuerza"
 FAF_hold_military_parade_decision_desc: "Nuestra absoluta derrota en la Guerra Europea no solo ha devastado a nuestra nación físicamente, también lo ha hecho mentalmente. Nuestra psique nacional está anclada en la derrota y en la devastación, haciendo que nuestro pueblo no esté dispuesto a luchar. Debemos envalentonar al pueblo francés recordándole que Francia sigue siendo una nación fuerte y poderosa, una que no teme a sus enemigos y que no lo pensará dos veces a la hora de proteger a su pueblo."
 FAF_celebrate_our_victories_decision: "Recompensar a los victoriosos"
 FAF_celebrate_our_victories_decision_desc: "Nunca importa que tan duro trabaje uno o que tan arduo fue el proceso, todo lo que importa es el resultado. En definitiva, todo en esta vida solo tiene dos resultados posibles: éxito o fracaso. Aquellos que tengan éxito deberán ser recompensados para inspirar a otros a esforzarse para tener éxito. Al final del día, lo que más importa es el mérito."
 FAF_hail_to_the_chief_decision: "¡Salve al jefe!"
 FAF_hail_to_the_chief_decision_desc: "Un liderazgo fuerte y una estructura clara son claves para la estabilidad y el éxito. Es fundamental para la eficacia de un ejército, el funcionamiento de una corporación, hasta el crimen organizado depende de eso. Al tiempo que nos emergemos victoriosos de la anarquía que ha devastado Francia, debemos reconstruir la nación en torno a una figura central, un hombre fuerte que pueda unir al pueblo y movilizarlo por una causa común."
 FAF_heir_of_degaulle_decision: "Abrazar el pensamiento gaullista"
 FAF_heir_of_degaulle_decision_desc: "Charles de Gaulle no necesita presentación. Un hombre fuerte y un audaz estatista, ni una vez falló al pueblo francés y a la nación. Cuando los alemanes ocuparon nuestra nación, rompieron nuestro espíritu nacional y esclavizaron a nuestro pueblo, la mayoría de políticos y generales aceptaron la derrota, pero Charles de Gaulle no lo hizo. ¡Él prefirió morir luchando antes que vivir subyugado! También fue un hombre razonable, un hombre justo. Uno que fue elegido democráticamente y que cumplió la voluntad del pueblo francés. Solo podremos llevar a la nación por el camino correcto si ayudamos a nuestro pueblo a adoptar los honorables y valientes ideales de De Gaulle."
 FAF_culmination_of_degaulle_petainist_thought_decision: "Abrazar el pensamiento gaullo-petainista"
 FAF_culmination_of_degaulle_petainist_thought_decision_desc: "Tanto de Gaulle como Pétain tienen rasgos admirables. Principios que les hicieron brillar en una de las etapas más oscuras de la historia de Francia. Tiempos como esos crean divisiones dentro de nuestra nación. Si solo adoptamos los ideales de un único hombre, los partidarios del otro crearían estragos. Sólo mediante la aceptación de ambos grupos podemos asegurar la unidad de nuestra nación."
 FAF_heir_of_petain_decision: "Abrazar el pensamiento petainista"
 FAF_heir_of_petain_decision_desc: "Nunca ha habido un hombre tan controversial en la historia francesa. Algunos afirman que Pétain es un traidor mientras que otros creen que todo lo que hizo fue para proteger al pueblo francés. Pero nadie puede negar que fue (y sigue siendo) nuestro héroe nacional. Se dejó la piel tanto en Verdún como en Vichy, no para ganar gloria personal, sino para proteger al pueblo y a la nación francesa. Da igual lo que hizo o no hizo, fue un hombre de convicciones, un hombre que amaba profundamente a su pueblo y su nación, un hombre que lo dio todo para luchar contra el veneno rojo que enfermó a nuestra nación. Es crucial que enseñemos a nuestro pueblo la verdad sobre esta gran figura histórica. Aprenderán a abrazar su cultura tradicional y valores, y serán conscientes de la amenaza bolchevique."
 FAF_work_v_decision: "¡Nuestro trabajo!"
 FAF_work_v_decision_desc: "Nuestra nación fue arrasada y destruida por las hordas rusas. Tenemos mucho trabajo por delante si queremos reconstruir todo lo que aplastaron sus botas de hierro. Nuestro espíritu nacional sigue a la espera de ser enaltecido, y nuestro pueblo sigue a la espera de alimentos. Ahora, más que nunca, debemos dedicarnos a tiempo completo a la monumental tarea de reconstruir nuestra patria."
 FAF_family_v_decision: "¡Nuestra familia!"
 FAF_family_v_decision_desc: "¿Cuántas familias han sido separadas, devastadas y destruidas por culpa de esta guerra? Esta guerra justa, contra un enemigo sediento de sangre que solo busca destruir nuestra hermosa nación y nuestro hogar ancestral, Europa. De ahora en adelante, protegeremos nuestro hogar, a nuestra familia, a nuestros hermanos."
 FAF_fatherland_v_decision: "¡Nuestra patria!"
 FAF_fatherland_v_decision_desc: "¿Por qué lucha nuestro pueblo? ¿Por ellos mismos? No. Luchan por una causa común, una creencia común y un objetivo en común, proteger y preservar aquello que es querido por ellos. Su hogar, su tierra, sus hermanos."
 FAF_one_million_man_army_decision: "Ejército de un millón de hombres"
 FAF_one_million_man_army_decision_desc: "¡Un millón de soldados! ¡UN JODIDO MILLÓN DE SOLDADOS! Hombres dispuestos a luchar y morir por su patria. Chicos dispuestos a derramar sangre por su tierra y pueblo sin pensárselo dos veces. Con un ejército tan poderoso como este, el pueblo francés puede descansar tranquilo sabiendo que su país puede protegerlos."
 FAF_french_superiority_decision: "Superioridad francés"
 FAF_french_superiority_decision_desc: "La cultura francesa es una de las culturas más dominantes, si no la más dominante, del mundo. El ingenio y creatividad francesa han hecho de nuestra nación una de las estrellas del mundo. A través de la historia humana, sólo Francia se ha mantenido como un centro de arte, tecnología y literatura. Estas verdades como puños no hacen más que demostrar nuestra superioridad natural sobre el resto, ya sean hermanos europeos o culturas más lejanas."
 FAF_taunt_our_enemies_decision: "Provocar a nuestros enemigos"
 FAF_taunt_our_enemies_decision_desc: "Francia tiene incontables enemigos, tanto internos como externos. ¿Pero qué nos pueden hacer esas ratas? ¿Qué pueden hacer esos perros sarnosos para dañar a nuestra nación? Son débiles, física y psicológicamente. Los degenerados comunistas de nuestro país se han hecho dóciles mientras que los rusos están muy ocupados matándose entre sí. ¿Cómo no te puedes reír sabiendo que estos chistes andantes son nuestros enemigos?"
 FAF_our_french_mothers_decision: "Idolatrar a Juana de Arco"
 FAF_our_french_mothers_decision_desc: "La valentía es la virtud más noble que uno puede llegar a tener. La personificación francesa de la valentía es Juana de Arco. Ella luchó con más valentía que sus compañeros de armas. No lloró o gritó cuando los degenerados y traidores la quemaron viva con falsos pretextos. Luchó contra sus enemigos con todas sus fuerzas, nunca dio un paso atrás ni titubeó. Ella se mantiene como una ídolo admirada por toda la nación. Todos nuestros hombres, nuestros soldados, deben servir como lo hizo Juana de Arco, luchando ferozmente con pasión y una lealtad inquebrantable."
 FAF_revive_the_franco_german_brigades_decision: "Restablecer las brigadas franco-alemanas"
 FAF_revive_the_franco_german_brigades_decision_desc: "SI bien nosotros y los alemanes hemos tenido diferencias en el pasado, al final del día somos hermanos. Los profundos lazos entre nuestras naciones se forjaron a base de sangre y las dificultades compartidas. Nuestro enemigo común en el este amenaza la estabilidad y la existencia de ambas naciones. Debemos incrementar gradualmente la cooperación entre nuestras dos naciones y reformar las pequeñas pero muy veloces brigadas franco-germanas será el primer paso de este proceso."
 FAF_silence_german_critics_decision: "Silenciar las críticas contra nuestros aliados"
 FAF_silence_german_critics_decision_desc: "Those fools who criticize our European allies have no understanding of strategic planning. They lack vision and depth. It is truly appalling how many people still fail to grasp the principle \"the enemy of my enemy is my friend.\" Their threat to us is insignificant at present compared to the Bolshevik menace to the East. We won't place our full trust in them, of course, but practicality must always come before ideology."
 FAF_deliver_our_people_decision: "Liberar a nuestro pueblo"
 FAF_deliver_our_people_decision_desc: ""
 FAF_sword_and_shield_bop: "La capa y espada"
 FAF_shield_side: "El escudo"
 FAF_sword_side: "La espada"

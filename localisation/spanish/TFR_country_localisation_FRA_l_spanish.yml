 FAF_national_duty_desc: "\n\n\n\n£GFX_FAF_national_duty\n\n\n\n\n\nOur duty to France has been many things throughout our history, but the one thing that will always be required for our nation is enlistment. With the establishment of our new regime, we have received hundreds of thousands of patriotic Frenchmen ready to serve France in the most honourable way known to man. We will do our duty preparing these men for the inevitable continuation of the European War as they prepare to fight not only for themselves but for France!"

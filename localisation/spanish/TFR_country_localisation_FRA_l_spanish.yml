 FRA_Civil_War: "La batalla por el espíritu francés"
 FRA_Civil_War_desc: "El alma de Francia se sustenta en un orgulloso legado de proeza revolucionaria. La propaganda glorifica al Estado y reprime la disidencia, pues la lucha por definir el futuro de nuestra nación ha permitido a nuestro pueblo retomar nuestra batalla contra los burócratas globalistas y restaurar a nuestro pueblo a su pedestal."

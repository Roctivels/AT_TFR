 Capital_of_the_EU: "Capital de Europa"
 Capital_of_the_EU_desc: "Bruselas es más que una ciudad; es el corazón administrativo del proyecto europeo. En sus oficinas, salas de consejo y anónimos edificios acristalados se redactan normativas, se forjan compromisos y se gestionan crisis día tras día. Decenas de miles de funcionarios, diplomáticos, grupos de presión y asesores recorren sus calles, convirtiendo la gobernanza local en una preocupación continental. Las decisiones que se toman aquí se propagan por los mercados, las fronteras y las instituciones, a menudo mucho antes de que el público sea consciente de ellas. Esta concentración de peso político aporta influencia y recursos, pero también escrutinio, inercia y presión. Bruselas debe equilibrar su papel como ciudad anfitriona con su función como centro neurálgico de Europa, donde la estabilidad, la coordinación y la continuidad se valoran por encima de la rapidez o el espectáculo."

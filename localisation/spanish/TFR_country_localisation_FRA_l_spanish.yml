 FRA_choke_the_youth_decision: "Arrancar la raíz"
 FRA_pardon_nationalist_criminals_decision: "Indultar a los patriotas"
 FAF_rfa_mio_tt: "Desbloquea §gReal Arsenal Francés§!"
 FAF_royal_french_arsenal_organization: "Arsenal Royal Francais"
 FAF_fasces_over_france_cat: "Las fasces se ciernen sobre Francia"
 FAF_fasces_over_france_cat_desc: "\n\n\n\n\n£GFX_FAF_french_fascist_cat\n\n\n\n\n\n\n\n"
 FAF_legalize_paganism_decision: "Fomentar el paganismo"
 FAF_legalize_paganism_decision_desc: "Christianity is an abnormality. It was not a French creation, in fact not even a European one. It is the cancer which spreads uncontrollably and at an inconceivably swift pace. So much so that it drove out our ancestral and native beliefs. It made the French people forget who they truly are! Forget their roots! Their heritage! That is why we must bring back the truly French religions, the ones that define our people as Gaul, and not as \"Christians\"."
 FAF_provoke_french_opposition_decision: "Provocar a la oposición francesa"
 FAF_provoke_french_opposition_decision_desc: "¿Cuál es la mejor forma de acaparar los focos a la vez que atacamos a la oposición? Obviamente, haciendo parecer que son el malo de la historia. ¿Cómo? Realmente es muy sencillo, es lo que uno aprende en primero de política. Les provocaremos con insultos ambiguos mientras que ellos solitos, en su berrinche, harán el ridículo."
 FAF_word_of_the_bishop_decision: "Palabra del señor"
 FAF_word_of_the_bishop_decision_desc: "A través de la historia europea, el papado ha manipulado a nuestro pueblo y gobernantes, usando la fe cristiana como una herramienta invisible para moldear Europa a una imagen distorsionada de si misma. No volveremos a derramar sangre por un dios ficticio. El papa se convertirá en nuestro monaguillo y cantará nuestro cancionero."
 FAF_reorganize_the_LVF_decision: "Reorganizar la FVL"
 FAF_reorganize_the_LVF_decision_desc: "El nombre de la Fuerza Voluntaria Lealista ha sido manchado por aquellos que nunca la entendieron. Los rojos y liberales son la única razón de la decadencia de nuestra nación, es por eso que nuestra nación necesita a más grupos como los lealistas para limpiar la basura que hay en nuestra nación y curar su enfermedad."
 FAF_glorify_collaborationism_decision: "Glorificar el colaboracionismo"
 FAF_glorify_collaborationism_decision_desc: "Los colaboracionistas siempre han sido considerados traidores, ratas y perritos falderos. ¿Pero cómo alguien puede ser considerado un traidor cuando está trabajando para erradicar de la nación una enfermedad que la está matando lentamente? Cuando nuestro pueblo colaboró con los alemanes durante la SGM, no lo hizo para socavar nuestra nación, lo hizo para cortar de raíz la amenaza bolchevique. Definitivamente eso no es ser ni una rata ni un traidor, es querer curar y cuidar la nación."
 FAF_work_f_decision: "¡Nuestro trabajo!"
 FAF_work_f_decision_desc: "El trabajo debe y tiene que hacerse. El trabajo es la única acción que siempre traerá resultados positivos. Los ladrillos no se colocan solos. Las carreteras no se pavimentan solas. Los cultivos seguro que no crecen por sí mismos. Solo con el sudor y la sangre de nuestro pueblo se puede reconstruir nuestra gloriosa nación."
 FAF_family_f_decision: "¡Nuestra familia!"
 FAF_family_f_decision_desc: "La familia es todo. La familia nuclear es lo más sagrado. Sólo mediante la defensa de la estructura y los valores familiares podrá Francia repoblarse por si misma. La guerra casi acabó con una generación de nuestro pueblo. Si no renovamos la sangre de nuestra nación, estaremos condenaos a pudrirnos y colapsar."
 FAF_fatherland_f_decision: "¡Nuestra patria!"
 FAF_fatherland_f_decision_desc: "Hogar, patria - la fuerza que une a nuestro pueblo y nos hace inseparables. Sin ella, sus habitantes no son nada; y sin habitantes, no puede existir. Los dos están unidos en una relación simbiótica. Si nuestro pueblo se llega a olvidar de su patria, entonces la gran familia que alguna vez fue nuestra nación se romperá para siempre. Lista para ser dividida entre potencias extranjeras."
 FAF_honest_french_middle_class_decision: "Nuestro honesto pueblo"
 FAF_honest_french_middle_class_decision_desc: "El pueblo francés es la perfecta encarnación de la imagen de Dios. Honesta, inmaculada y sabia. Fueron esas virtudes las que hicieron grande nuestra nación. El pueblo francés nunca quiso dominar a otros pueblos, solo quisimos difundir nuestras ideas y cultura."
 FAF_oui_oui_oui_decision: "§COui! Oui! Oui!§!"
 FAF_oui_oui_oui_decision_desc: "¡Di sí a la guerra! ¡Di sí al sacrificio! ¡Di sí a la victoria! Nuestra derrota en la Guerra Europea ha hecho olvidar a nuestro pueblo lo que nos hizo una nación poderosa y gloriosa, por lo que es nuestro deber recordárselo. guiándoles hacia adelante, les enseñaremos como pensar y actuar - no solo por su propio bien, también para nuestro renacimiento nacional."
 FAF_non_non_non_decision: "§RNon! Non! Non!§!"
 FAF_non_non_non_decision_desc: "¡Di no al pacifismo! ¡Di no al liberalismo! ¡Di no al comunismo! Una cosa es mantener tu hogar limpio, pero es otra distinta cortar la putrefacción que ha arraigado profundamente nuestra nación. La escoria que se mantiene en la mente de nuestros ciudadanos no desaparecerá por su cuenta; en su lugar, debemos guiar a nuestro pueblo por el buen camino y evitar que se desvíen."
 FAF_paris_accords: "Pacto de Carlomagno"
 NMD_northern_liberation_army: "Ejército de Liberación del Norte"
 OCT_french_peoples_liberation_front: "Frente de Liberación Popular de Francia"
 FAF_pride_of_france_cat: "Orgullo de Francia"
 FAF_pride_of_france_cat_desc: "\n\n\n\n\n£GFX_FAF_pride_of_france_cat\n\n\n\n\n\n\n\nLa resurrección del Estado francés y del tradicionalismo está ante nosotros, aquí y ahora. El régimen de Vichy ha regresado, el bastión del conservadurismo toma posición una vez más en Europa como el salvador contra la plaga que es el liberalismo.\n\nAunque frágil y plagada de luchas internas entre generales que aspiran a ser el mariscal de Francia, el Estado es hermoso en sí mismo. Debemos hacer todo lo que esté en nuestra mano para mantenerlo."
 FAF_pride_of_france_dynamic: "Militarismo francés"
 FAF_pride_of_france_dynamic_desc: "La gente siempre elogia a los alemanes por sus proezas militares y gloria a lo largo de su historia, pero a la hora de hablar de Francia solo recuerdan a los líderes militares y a los estrategas tras las líneas del frente, no a los soldados que se encuentran allí. El ejército francés siempre ha sido el más fuerte de Europa. Las únicas veces en la que ha parecido débil fue por que eran leones liderados por burros. Hoy, incluso el propio pueblo francés ha olvidado una parte significativa de su cultura, su tradición militar y sus hazañas militares. Debemos instalar el patriotismo en el corazón de nuestro pueblo y recordarle la importancia del servicio y la fuerza militar."

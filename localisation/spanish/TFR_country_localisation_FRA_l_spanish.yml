 FRA_regionalist_struggle_idea: "Lucha regionalista"
 FRA_regionalist_struggle_idea_desc: "Al mismo tiempo que Francia trata de reconstruir su identidad, el regionalismo por todo el país ha crecido descontroladamente.\n\nA pesar de que casi fuesen erradicadas durante la Revolución Francesa, muchas identidades regionales sobrevivieron, pero a duras penas. Desde entonces, estas identidades han tenido dificultades para mantener sus idiomas y tradiciones cultural, pero con la creación de una mayor consciencia europea, y la pérdida de todo lo que hacía a Francia francés, estos regionalistas han ganado una última oportunidad para reivindicar sus culturas antes de que queden relegadas a los libros de historia."

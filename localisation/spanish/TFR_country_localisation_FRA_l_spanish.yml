 FRA_civil_war_rebuilding_dynamic_desc: "Esta nación nuestra fue construida con el sudor de nuestra frente, la sangre de nuestro pueblo y el sacrificio de numerosas generaciones. Tras nuestra derrota en la guerra ruso-europea, nuestro país está ahora en ruinas. Nuestras casas quedaron reducidas a escombros y nuestras fábricas hechas polvo. El descontento crece en todo el país y los movimientos separatistas se expanden día a día. Es vital que recuperemos la gloria y el orgullo perdidos de nuestra nación. Pieza a pieza, ladrillo a ladrillo, debemos sacar a Francia de su situación actual y devolverla a la prosperidad."

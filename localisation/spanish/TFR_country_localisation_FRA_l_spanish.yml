 FRA_silence_the_radical_left: "Silenciar a elementos subversivos"
 FRA_silence_the_radical_left_desc: "Mélenchon y sus corruptos lacayos han sido proscritos, pero eso nunca supondrá el fin de su pérfida traición. Aquellos afines a sus maléficas posturas jamás serán capaces de simplemente pasar página y morir, hasta los moderados están expresando sus preocupaciones. No hay lugar para estos recelos, aún si estas críticas tienen buenas intenciones. La república está en crisis, y se deben hacer sacrificios para salvarla, aún si eso significa ponerle una correa durante el tiempo que sea necesario."
 FRA_reverse_their_decisions: "Revertir las alteraciones económicas"
 FRA_reverse_their_decisions_desc: "Uno de los grandes problemas heredado del anterior Gobierno socialista ha sido el daño causado a la capacidad económica francesa en caso de una guerra. Atentos desacertados de \"emancipar a los trabajadores\" y el priorizar el Estado del bienestar ha dejado a las fuerzas armadas con pocas opciones a pesar de la tormenta que se cierne sobre nosotros. Se reformularán reformas laborales necesarias para incrementar la producción y cualquier resistencia por parte de los sindicatos será aplastada con la fuerza. Se debe reducir el saturado Estado del bienestar, y desviar su presupuesto para la defensa y otros proyectos necesarios para salvaguardar Francia."
 FRA_render_unto_caesar: "Emular a Cincinato"
 FRA_render_unto_caesar_desc: "Desde el momento que declaramos nuestro nuevo gobierno, siempre se nos ha acusado de lo mismo una y otra vez. Ya sean traidores genuinos el descarriado gran pueblo francés, ambos nos acusan de lo mismo. De que buscamos acabar con la república, que no somos más que autócratas que buscan poder y riquezas a costa del pueblo. El cesarismo no está en nuestra agenda, y nunca lo estará. Somos leales a la república, a Francia. Al igual que Cincinato, salvaremos al estado y, una vez que haya paz, restauraremos la república, sin importar sobre que o sobre quién tengamos que pasar por encima."
 FRA_democratic_supervision_committee: "Comité de Supervisión Republicano"
 FRA_democratic_supervision_committee_desc: "Con la situación estabilizándose en el frente interno, ahora podemos tranquilizar a la población. El camino ha sido largo y tedioso, pero no debemos detenernos y postergar nuestro futuro. Para asegurar una transición más gradual de una Junta a una República, estableceremos un comité que busque partidos y candidatos y que pueda preparar elecciones anticipadas una vez que se haya asentado el polvo. La llama de la república se mantendrá tenuemente encendida para que así todo lo que tengamos que hacer sea alimentarla para que vuelva a arder con mayor intensidad."
 hos_caesar: "Cincinato"
 hos_enemy_of_the_united_left: "Enemigo del pueblo"
 FRA_dem_supervision_committee_tt: "§YEsto dará inicio a la §Credemocratización del Gobierno§!.§!"
 FRA_the_forces_that_seek_to_tear_us_apart: "Las fuerzas que nos dividen"
 FRA_the_forces_that_seek_to_tear_us_apart_desc: "Las fuerzas de la desunión están atacando el corazón de Francia. Revolucionarios comunistas, nacionalistas fanáticos y separatistas todos buscando un cambio. Fue esta discordia, tanto en casa como en toda Europa, lo que nos llevó a este desastre. La respuesta no es sumergirse aún más en el abismo de una aislada mediocridad, está en la fuerza en la unidad europea. Lucharemos por un futuro mejor contras las fuerzas de la revolución y la reacción; no descansaremos hasta que hayamos enterrado fantasmas del presente y del pasado para que así podamos aspirar a un futuro más brillante. Ni nosotros ni nuestros compañeros en el resto de Europa descansaremos hasta que toda Europa esté iluminada por la unidad en la diversidad."
 FRA_snuff_the_french_cigarette: "Aplastar el cigarrillo francés"
 FRA_snuff_the_french_cigarette_desc: "A pesar de lo que digan los nacionalistas, no hay muchas cosas verdaderamente únicas en la identidad francesa. Somos un pueblo verdaderamente europeo, una mezcla de todo lo que hace a Europa grande. Un idioma heredado de los romanos, una tierra y sangre germanas. Francia ha jugado un rol crucial en la historia europea desde los días de Carlomagno, pasando por Napoleón hasta la actualidad. A pesar de todo eso, somos simplemente una pieza en el rompecabezas europeo, no una entidad aparte. Nuestro destino ha estado, está y estará entrelazado con el de Europa y los que nieguen eso son tan peligrosos para nuestro futuro como los rusos a la otra orilla del Vístula."
 FRA_turn_away_from_the_past: "Dar la espalda al pasado"
 FRA_turn_away_from_the_past_desc: "Existe gente que se pasan tanto tiempo pensando en lo que pasó o lo que pudo haber pasado que ya no saben distinguir la realidad. Incluso aquellos cuyos ideales iban en la dirección correcta, pero que se quedaron a mitad de camino, deben ser conscientes de esta verdad. El pasado, aún con todos sus errores, únicamente eso: el pasado y solo una visión enfocada exclusivamente en el futuro puede hacer realidad nuestros sueños de fuerza, unidad y prosperidad."
 FRA_seek_european_aid: "Buscar ayuda europea"
 FRA_seek_european_aid_desc: "Nuestra visión no es exclusiva a nosotros ni estamos solos en nuestra lucha. Cada día más y más personas, junto a sus Gobiernos, ven la imperiosa necesidad de unidad entre los europeos en estos tiempos difíciles. Otras naciones europeas, a diferencia de nosotros, tuvieron la fortuna de evitar una guerra abierta dentro de sus fronteras. Puesto a que ahora nosotros estamos al frente del futuro de Europa, ¿sería mucho pedir ayuda a aquellos que pueden dárnosla? Armas, raciones y gas; Si tienes de eso, lo necesitamos en grandes cantidades. Aún si la ayuda de nuestros amigos no pueden satisfacer completamente las necesidades, peor es nada."
 FRA_towards_a_united_future: "Hacia un futuro unido"
 FRA_towards_a_united_future_desc: "Para seguir con nuestras decisivas reformas, debemos acabar con cualquier vestigio del antiguo régimen. Debemos deshacernos de todo lo que formaba parte del sistema anterior, desde los partidos políticos locales hasta la asamblea nacional, pues solo ralentizaban nuestra integración con la comunidad europea. En esta nueva Francia, no, en esta nueva Europa, solo hay espacio para el parlamento europeo y la burocracia europea."
 FRA_burn_the_northern_traitors: "Quemar el norte"
 FRA_burn_the_northern_traitors_desc: "Estamos rodeados de traidores y putrefacción. Está claro que debemos priorizar reconquistar el norte, está mucho más desarrollado económicamente y, si lo dejamos desprotegido por demasiado tiempo, puede suponer una gran amenaza. Es mejor que su riqueza y poder militar esté en nuestras manos tan pronto como sea posible, pues nos permitirá reconquistar nuestra nación más rápidamente."
 FRA_salt_the_south: "Salar el sur"
 FRA_salt_the_south_desc: "Estamos rodeados de traidores y de putrefacción. Está claro que debemos priorizar la supresión de los separatistas del sur. La situación alimenticia el crítica y, a pesar de que el norte sea más rico y valioso militarmente, nuestra economía y maquinaria bélica no servirán de nada si no tenemos comida. Debemos asegurar la base agrícola del sur antes de intentar recuperar la industria naval y pesada del norte."
 FRA_cement_the_NATO_model: "Cimentar el modelo de la OTAN"
 FRA_cement_the_NATO_model_desc: "Uno de los efectos colaterales del esfuerzo de los Gobiernos anteriores para mantener su ilógico patriotismo es la falta de estandarización del equipamiento y de la producción. Puede que Francia haya usado la munición estándar de la OTAN; pero aquellos que nos precedieron se aseguraron de que el resto del equipamiento fuese tan \"exclusivamente francés\" como sea posible, sin importarles los efectos que tuviese en nuestra capacidad bélica. Debemos ir más allá, no basta con sólo usar la munición estándar de la OTAN, necesitamos la estandarización total de los ejércitos de toda Europa. Este arduo proceso iniciará ahora y con el paso del tiempo, hasta los tornillos más pequeños serán iguales sin importar que se hayan fabricado en Francia o en Austria."
 FRA_the_runaway_identities: "Las identidades fugaces"
 FRA_the_runaway_identities_desc: "Las llamas se encuentran en su punto más álgido en años en este inicio de la década del 2020 y una de las consecuencias de esto en Francia ha sido un crecimiento de las identidades regionales y del separatismo. A pesar de nuestra creencia en el paneuropeísmo, esta división solo ayuda a los enemigos de Europa. Ellos pueden hacerse llamar a sí mismos alsacianos o corsos, pero después de todo sigue siendo europeos. Si quieren adoptar este punto de vista por las buenas o por las malas es decisión suya."
 FRA_declare_the_new_france: "Declarar una nueva Francia"
 FRA_declare_the_new_france_desc: "Una guerra en el este, el caos de la derrota y el subsecuente golpe de estado y guerra civil han dejado aún más maltrecha, aún así hemos triunfado donde la mayoría de hombres habrían fracasado. Las fuerzas que trataban de proteger o reclamar su visión del pasado han sido suprimidas. Ahora podemos enforcar todos nuestros recursos en lo único verdaderamente importante: el futuro. El nacimiento de una nueva Francia marca el inicio de una nueva Europa. Una Europa unida que, junta, bloque a bloque reconstruirá un continente mejor. Unida, fuerte y próspera. Sólo entonces podremos liberar a nuestros hermanos del este, pero debemos ir paso a paso..."
 FRA_fighting_the_good_fight_category: "Peleando la buena batalla"
 FRA_join_or_die_decision: "Únete o muere"

 FPR_utopia_female_committee_decision_desc: "Si otorgamos poder al Comité de Représentation Féminine, nos será más sencillo aprobar leyes relacionadas con los derechos de la mujer."
 FPR_utopia_minority_committee_decision: "§pUtopie§!: Dar poder al §YCRM§!"

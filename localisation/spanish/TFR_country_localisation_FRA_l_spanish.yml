 FAF_Put_Pressure_on_the_Dalmatians_decision: "Demandar [CRO.GetFlag] §psubyugación croata§!"
 FAF_Put_Pressure_on_the_Dalmatians_decision_desc: "Desde las columnas de mármol del Palacio de Diocleciano hasta las inscripciones latinas de Dubrovnik, los vientos salados del Adriático nunca han podido borrar del todo la importa que Roma ha dejado en estas tierras. Del mismo modo de que el Adriático siempre mira a la ciudad eterna, el mapa cultural de Croacia aún tiene páginas sin escribir, que esperan a que la llama latina vuelva a avivarse. Cuando los caballeros de la Cuarta Cruzada alzaron la cruz latina en Constantinopla, sellaron el destino de esta joya perdida de la civilización latina: no estaba destinada a arrodillarse ante la media luna otomana, ni ante el águila bicéfala eslava, sino a seguir las rutas dálmatas pavimentadas por las legiones romanas, regresando al fin al orden imperial latino."
 FAF_propaganda_campaign_in_Romania_decision: "Propagar el [ROM.GetFlag]§Ylatinismo rumano§!"
 FAF_propaganda_campaign_in_Romania_decision_desc: "Si bien los rumanos no sean lo primero que se te venga a la cabeza cuando se habla de la herencia rumana, lo cierto es que son tan romanos como nosotros los franceses. El rumano evolucionó del latín vulgar y su pueblo muestra con orgullo su origen romano. Sin embargo, por culpa de su localización geográfica, era inevitable de que se contagiasen del virus eslavo, diluyendo lo que les hizo ser un gran y poderoso pueblo en el pasado. Aún con esto, la sangre de los rumanos sigue siendo la misma, simplemente necesitan recordar sus raíces."
 FAF_fund_identitarian_terror_in_ROM_decision: "Financiar el terrorismo en [ROM.GetFlag] §YRumania§!"
 FAF_fund_identitarian_terror_in_ROM_decision_desc: "Nuestros hermanos rumanos están una vez más en las garras del imperialismo ruso. Los demonios rusos les susurran sus cánticos al oído, jugando con sus mentes, creando esta falsa imagen de herencia eslava en su psique. Sin embargo, no todo está perdido. Aún quedan hermanos latinos leales en Rumania que se identifican con su familia europea, y no con la falsa eslava. Debemos ayudarlos a difundir su mensaje, para que algún día puedan volver a nuestro abrazo."

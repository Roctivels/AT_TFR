 FAF_Support_Benedetti: "Apoyar a Benedetti"
 FAF_Support_Benedetti_desc: "Nuestro gran líder Benedetti, será el motor del nuevo rejuvenecimiento nacional. De las cenizas de la derrota, se ha alzado como el gran salvador de Francia, y el partido debe unirse tras él, quienes no, deben alinearse."
 FAF_Praise_the_Army: "Alabado sea el ejército"
 FAF_Praise_the_Army_desc: "Nuestros soldados lucharon valientemente en el frente oriental, pero lamentablemente, fueron traicionados por un cobarde liderazgo. Nuestro nuevo estado restaurará el honor del gran ejército francés; el valiente ejército francés será la columna vertebral del nuevo estado francés."
 FAF_Promote_Active_Clubs: "Promover clubes activos"
 FAF_Promote_Active_Clubs_desc: "Los clubes activos son cruciales para convertir a jóvenes sin rumbo en jóvenes nacionalistas franceses organizados. ¡En cada revolución de la historia, el fervor de la juventud fue la fuerza impulsora del cambio y eso debe aprovecharse hoy para crear una juventud hambrienta y llena de energía!"
 FAF_Honor_Vichy: "Honrar el régimen de Vichy"
 FAF_Honor_Vichy_desc: "El mariscal Pétain fue un héroe que dirigió al pueblo francés durante nuestra época más turbulenta. Sin embargo, tras décadas de dominio forzado bajo regímenes neoliberales, la gloria de los héroes de Vichy ha sido calumniada. El pueblo francés debe recordar los sacrificios de estos valientes."
 FAF_Cult_of_Benedetti: "Formular el culto a Benedetti"
 FAF_Cult_of_Benedetti_desc: "Benedetti no solo será un líder fuerte al frente de una nación fracturada, sino también el símbolo de la nueva era francesa. Todo hombre, mujer y niño francés, verá a Benedetti como el símbolo del fénix francés que resurge de las cenizas de la degeneración y la derrota neoliberales."
 FAF_Utilize_Lafayette: "Utilizar la figura de Lafayette"
 FAF_Utilize_Lafayette_desc: "Lafayette fue una de las principales fuerzas que derrocaron al antiguo régimen y se ha convertido en una especie de Napoleón moderno. Se ha convertido en uno de los hombres más famosos de Francia como tal, y su apoyo público será crucial para consolidar nuestro poder."
 FAF_Create_Identity_Forums: "Create Identity Forums"
 FAF_Create_Identity_Forums_desc: "Los foros Romanos fueron un centro para que los intelectuales discutieran de ciencia, filosofía, y mas. Francia también ha sido una nación de intelectuales y por lo tanto debemos revivir nuestra cultura intelectual y crear foros para el nuevo pensamiento nacionalista."
 FAF_Look_to_the_Glory_of_Rome: "Mirar la gloria del pasado"
 FAF_Look_to_the_Glory_of_Rome_desc: "Francia es una nación de poetas, filósofos, artistas y grandes conquistadores. Como los herederos del gran Carlomagno, nos hemos convertido en el centro de la innovación y gloria europea. Aunque Francia ha pasado tiempos difíciles debemos recordar las personas del pasada quienes a pesar de todos las eras problemáticas que Francia vivió, ellos continuaron hacia adelante."
 FAF_Harness_Federalist_Sympathizers: "Aprovechar a los simpatizantes federalistas"
 FAF_Harness_Federalist_Sympathizers_desc: "Muchos funcionarios del frágil y débil gobierno anterior que sucedimos tenían simpatías por nuestro movimiento, y con nuestro movimiento fortalecido, estos exfuncionarios pueden compensar su inacción y sus desgracias anteriores ayudándonos ahora."
 FAF_Glorify_the_Imperial_Era: "Glorificar la era imperial"
 FAF_Glorify_the_Imperial_Era_desc: "No hay nada mejor que un gran imperio que abarque un continente, sus personas, sus culturas, sus ciudades, todas unidas bajo una bandera y una ideología. Muchas veces estuvimos cerca de lograrlo, de crear esta utopía y aún así nos lo negaron una y otra vez. Este es nuestro último y más  determinado intento para conseguir lo que hemos soñado por tanto tiempo, y estaremos a gusto en la gloria una vez que se haya cumplido."
 FAF_Formulate_Latinism: "Formular la nueva doctrina del latinismo"
 FAF_Formulate_Latinism_desc: "Latinismo como ideología siempre ha sido algo que está algo desconectado e incoherente. Debemos convertirlo en algo unido y decidido, similar a una mente colmena de un ideologema. Si no lo hacemos, el sueño de una nueva Roma puede ser empañado por siempre."
 FAF_Disrupt_Benedetti: "Disrupt Benedetti"
 FAF_Disrupt_Benedetti_desc: "Benedetti, Benedetti. Naught is he but another fascist trying to model himself off of failed states long gone. His cultural thought of ‘France’, as a singular nation, as an ethnostate, is idiocy at its finest form. Anything he has planned - be it a speech, propaganda, anything and everything, should be hidden away or corrupted in other manners, to not let his corrupted, rotting ideals spread across our multinational nation."
 FAF_Identity_Forums_category: "Beyond our Singular Purpose"
 FAF_Identity_Forums_category_desc: "\n\n\n\n\n£GFX_FAF_identitarianism_cat\n\n\n\n\n\n\n\nLa belleza de este continente no tiene parangón. Durante mucho tiempo el proyecto neoliberal ha tratado de convertir Europa tanto en una zona económica como en una Disneylandia cultural para que el resto del mundo haga lo que quiera con ella.\n\nCon Francia bajo nuestro liderazgo, podremos construir una unión de europeos de verdad, hecha por los europeos por y para los europeos, la unidad e identidad de nuestros hermanos y hermanas."
 FAF_europa_united_against_communism_decision: "Europa unida contra el comunismo"
 FAF_europa_united_against_communism_decision_desc: "Compared to any other ideology, Communism is the most antithetical to the identity of Europe as we know it. Baiting our workers with lies of prosperity, they only seek the destruction of the European identity in their never-ending crusade of a homogenous \"equality\" that seeks the destruction of our culture. Whether the hordes of the East have returned to the scourge of Bolshevism or not, their former ties could be tied to rising anti-Russian sentiment across Europe. Regardless, we might as well kill two birds with one stone to ensure that far-left radicals are purged from our society."
 FAF_europe_for_europeans_decision: "Europa para los europeos"
 FAF_europe_for_europeans_decision_desc: "Since the beginning of our movement, we've always stood on the idea that Europe should only be for Europeans. With our power now secured, we can finally turn this former rallying cry into a concrete policy that can help solidify our rule. Now that the radicals on the left, whether part of the Marxist or Liberal varieties, can no longer shout about \"appeals to hatred\" and a lack of \"empathy\" towards these foreign agents… It's time to live up to our promises!"
 FAF_european_beauty_dynamic: "Tierras vírgenes de Europa"
 FAF_european_beauty_dynamic_desc: "The lands that are Europe must have their natural beauty and stature maintained above all else. Destroying that which is Europe is akin to destroying part of our own heritage and soul for no better reason than industry is a grave sin that we must reverse, unless we wish to remove that which makes Europe the pristine and impeccable land that it is."
 FAF_european_beauty_state_dynamic: "Tierras vírgenes de Europa"
 FAF_european_beauty_state_dynamic_desc: " From above, Europe is just another continent, but truly, it is a cradle for which all of humanity owes its thanks to. It is a beautiful artwork of geography, culture, and history, and we will not harm it unnecessarily. Should conquers or foes fall upon these lands, and tarnish it like barbarians, they will find nothing but fate in its most true form. Death."
 FAF_european_nation_dynamic: "Hegemonía europea"
 FAF_european_nation_dynamic_desc: "Como identitarios, nuestro movimiento difiere de la mayoría de movimientos de ultraderecha europeos, pues apoyamos la unificación continental en vez de la supremacía de una nación concreta. Tras el colapso de la Unión Europea por culpa de las hordas orientales, ha llegado una oportunidad de ocupar el vacío de poder y ser la potencia hegemónica europea. Si bien mantener nuestra influencia puede ser costoso políticamente, ser el nuevo centro del continente es esencial para que podamos derrotar a las fuerzas del multiculturalismo, liberalismo y cualquiera que busque destruir nuestra querida Europa."
 FAF_clarity_in_liberty_decision: "Clarity in Liberty"
 FAF_clarity_in_liberty_decision_desc: "Some claim that our movement being on the right means that we only want a totalitarian dictatorship that only brings about suffering. While some among our ranks think such a system would be the most optimal, the truth is that the idea of \"liberty\" is one that we can co-opt and use to bring in those nostalgic for the liberal democracies of old. Said liberty, however, is not tied to progressive nonsense and minority worship that was witnessed before the fall of the neo-liberal world order. Sure, those who benefitted from these liberties are sure to complain, but the point was to rid the continent of them anyway… right?"
 FAF_new_classicalism_decision: "New Classicalism"
 FAF_new_classicalism_decision_desc: "Our dreams of a united Europe stem from the glories of the Roman Empire and the culture it espoused. While things have changed a lot since then, the ideas of Classicism in our art and architecture are something that we should strive to continue. By revitalizing schools of art that prioritize works of splendor and beauty and moving away from the drab Modernist styles many have come to abhor, we can cement ourselves as the true representatives of the golden age of European arts and culture!"
 FAF_europeanist_propaganda_idea: "Propaganda paneuropea"
 FAF_europeanist_propaganda_idea_desc: "We have been subjected to a blitz of Pan-European propaganda across all forms of media, likely at the behest of the European Hegemony to push them towards unification. Regardless of whatever response we can muster, there is a sinking feeling that we may not be able to compete with our local Identitarian movement and could be forced to hold a referendum soon. If we wish to retain our independence, we need to do something to counter this propaganda immediately."
 FAF_demand_unification_referendum_decision: "Demandar un referéndum de unificación"
 FAF_demand_unification_referendum_decision_desc: ""
 hos_philosopher_king: "Rey filósofo"
 FAF_implement_policy_in_new_states_decision: "Difundir el ecologismo"
 FAF_implement_policy_in_new_states_decision_desc: "There was a time when the sacred trees of Athena thrived, and the summits of Olympus were adorned with ageless snow. But now the lands of Europa are shrouded in industry. Old-growth forests are dying under the clamor of machines, crystalline rivers are left cloudy with contaminants. The cradle of Western civilization is losing its sacred face to the ceaseless forward rush of modernity. But Europa's salvation is not in steel and concrete cities, but in the harmony between man and nature. We can only prove ourselves the guardians of ancient civilization when we again defend the beauty of nature with reverence. So this is our lot — the eternal hope of Europa."

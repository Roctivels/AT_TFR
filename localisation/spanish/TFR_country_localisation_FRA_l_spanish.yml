 FRA_covid_idea_1: "Casos de COVID-19 leves"
 FRA_covid_idea_1_desc: "La pandemia extranjera de COVID-19 ha llegado al continente europeo sin freno ni señales de detenerse. La rápida propagación del virus ha puesto bajo presión a los sistemas de emergencia y al Gobierno de Francia, mientras se conforman comités y consejos con científicos y funcionarios de la Nación para combatir la expansión del COVID-19 tan velozmente como se ha diseminado por todo el país.\n\n§RSi no se resuelve, las consecuencias serán catastróficas para la nación§!"
 FRA_covid_idea_2: "Casos de COVID-19 moderados"
 FRA_covid_idea_2_desc: "La pandemia extranjera de COVID-19 ha llegado al continente europeo sin freno ni señales de detenerse. La rápida propagación del virus ha puesto bajo presión a los sistemas de emergencia y al Gobierno de Francia, mientras se conforman comités y consejos con científicos y funcionarios de la Nación para combatir la expansión del COVID-19 tan velozmente como se ha diseminado por todo el país.\n\n§RSi no se resuelve, las consecuencias serán catastróficas para la nación§!"
 FRA_covid_idea_3: "Casos de COVID-19 elevados"
 FRA_covid_idea_3_desc: "La pandemia extranjera de COVID-19 ha llegado al continente europeo sin freno ni señales de detenerse. La rápida propagación del virus ha puesto bajo presión a los sistemas de emergencia y al Gobierno de Francia, mientras se conforman comités y consejos con científicos y funcionarios de la Nación para combatir la expansión del COVID-19 tan velozmente como se ha diseminado por todo el país.\n\n§RSi no se resuelve, las consecuencias serán catastróficas para la nación§!"
 FRA_covid_idea_4: "Casos de COVID-19 abrumadores"
 FRA_covid_idea_4_desc: "La pandemia extranjera de COVID-19 ha llegado al continente europeo sin freno ni señales de detenerse. La rápida propagación del virus ha puesto bajo presión a los sistemas de emergencia y al Gobierno de Francia, mientras se conforman comités y consejos con científicos y funcionarios de la Nación para combatir la expansión del COVID-19 tan velozmente como se ha diseminado por todo el país.\n\n§RSi no se resuelve, las consecuencias serán catastróficas para la nación§!"
 FRA_covid_idea_5: "Casos de COVID-19 catastróficos"
 FRA_covid_idea_5_desc: "La pandemia extranjera de COVID-19 ha llegado al continente europeo sin freno ni señales de detenerse. La rápida propagación del virus ha puesto bajo presión a los sistemas de emergencia y al Gobierno de Francia, mientras se conforman comités y consejos con científicos y funcionarios de la Nación para combatir la expansión del COVID-19 tan velozmente como se ha diseminado por todo el país.\n\n§RSi no se resuelve, las consecuencias serán catastróficas para la nación§!"
 FRA_covid_curing: "Distribución de la cura"
 FRA_covid_curing_desc: "El pueblo francés respira aliviado tras el éxito de los valientes científicos europeos al descubrir una vacuna de eficacia comprobada, capaz de mitigar los efectos de la pandemia. Si bien la nueva vacuna se distribuye, la vacunación completa del país llevará tiempo; hasta entonces, es monumental que hayamos podido producir la cura tan pronto. La erradicación total del virus parece inminente, ya que el COVID-19 se irá desvaneciendo poco a poco y se convertirá en poco más que un resfriado común."
 FRA_Omnicron_idea: "Variante de Omnicron"
 FRA_Omnicron_idea_desc: "Ómicron es una variante del virus SARS-CoV-2, más conocido como COVID-19, que ha surgido recientemente en el sur de África. Esto ha generado un resurgimiento del pánico, ya que la nueva variante no cuenta con una vacuna específica para la mutación. Se espera que esta variante se erradique rápidamente, ya que los investigadores trabajan arduamente en sus laboratorios para sintetizar nuevos tratamientos contra el virus."
 FRA_lockdown: "Cuarentena nacional"
 FRA_lockdown_desc: "Para hacer frente a la abrumadora propagación de la pandemia de COVID-19 en el país, hemos impuesto órdenes de confinamiento a todo el país para ayudar a mitigar las tasas de infección actuales. Si bien estas medidas son eficaces, implican que nuestra población debe permanecer en casa, mantener la distancia social y usar mascarillas y desinfectante constantemente, según las directrices de salud pública. Estas directrices también implican que muchos ciudadanos no pueden ir a trabajar, y el descontento podría descontrolarse pronto a menos que reabramos el país lo antes posible."
 FRA_opening_up: "Reapertura económica"
 FRA_opening_up_desc: "Al implementar la respuesta sueca dentro de nuestras fronteras, hemos comenzado a experimentar algunos de los beneficios de este plan casi de inmediato. Con la producción y los sistemas económicos del país paralizados por los confinamientos, la flexibilización de las medidas ha incentivado a nuestros ciudadanos a retomar sus ocupaciones donde las dejaron, sin depender de los paquetes de estímulo del Gobierno. Solo podemos esperar que este cambio de ritmo hacia la reapertura del país no provoque un rebrote del virus ni otras consecuencias imprevistas."
 FRA_welfare_payments: "Paquete de estímulo económico"
 FRA_welfare_payments_desc: "Con el endurecimiento de las ya severas medidas de confinamiento, los franceses han visto temporalmente sus medios de vida y ocupaciones cotidianas interrumpidas. Pero ahora parece que no vislumbramos el fin de esta pandemia en el futuro próximo. Por ello, la decisión responsable de nuestro gobierno es ayudar a los franceses a superar estas dificultades y ayudarlos a recuperarse hasta la eventual reapertura de nuestra nación."
 FRA_CFA_Franc: "Franco CFA"
 FRA_CFA_Franc_desc: "A pesar de la descolonización, la influencia de Francia sigue siendo fuerte sobre sus antiguas colonias de África Occidental a través del franco CFA, que comprende dos zonas monetarias en 14 países subsaharianos. Vinculado al euro, el franco CFA limita la capacidad de las naciones de África Occidental para gestionar de forma independiente sus economías, dejándolas vulnerables a las fluctuaciones del mercado europeo y a las políticas de la UE.\n\nSin embargo, el franco CFA beneficia a la economía francesa, facilitando el comercio y proporcionando estabilidad macroeconómica en la región. Esta estabilidad ha ayudado a prevenir las crisis de deuda y la inflación, lo que ha permitido a las empresas francesas invertir fuertemente en la extracción de recursos de África Occidental, generando miles de millones de dólares en ganancias para Francia."
 FRA_CFA_Franc_2: "Franco CFA"
 FRA_CFA_Franc_2_desc: "A pesar de la descolonización, la influencia de Francia sigue siendo fuerte sobre sus antiguas colonias de África Occidental a través del franco CFA, que comprende dos zonas monetarias en 14 países subsaharianos. Vinculado al euro, el franco CFA limita la capacidad de las naciones de África Occidental para gestionar de forma independiente sus economías, dejándolas vulnerables a las fluctuaciones del mercado europeo y a las políticas de la UE.\n\nSin embargo, el franco CFA beneficia a la economía francesa, facilitando el comercio y proporcionando estabilidad macroeconómica en la región. Esta estabilidad ha ayudado a prevenir las crisis de deuda y la inflación, lo que ha permitido a las empresas francesas invertir fuertemente en la extracción de recursos de África Occidental, generando miles de millones de dólares en ganancias para Francia."
 FRA_CFA_Franc_3: "Franco CFA"
 FRA_CFA_Franc_3_desc: "A pesar de la descolonización, la influencia de Francia sigue siendo fuerte sobre sus antiguas colonias de África Occidental a través del franco CFA, que comprende dos zonas monetarias en 14 países subsaharianos. Vinculado al euro, el franco CFA limita la capacidad de las naciones de África Occidental para gestionar de forma independiente sus economías, dejándolas vulnerables a las fluctuaciones del mercado europeo y a las políticas de la UE.\n\nSin embargo, el franco CFA beneficia a la economía francesa, facilitando el comercio y proporcionando estabilidad macroeconómica en la región. Esta estabilidad ha ayudado a prevenir las crisis de deuda y la inflación, lo que ha permitido a las empresas francesas invertir fuertemente en la extracción de recursos de África Occidental, generando miles de millones de dólares en ganancias para Francia."
 FRA_french_spirit_idea: "Espíritu francés"
 FRA_french_spirit_idea_desc: "\n\n\n\n£GFX_FRA_french_spirit\n\n\n\n\n\nA lo largo de los siglos XIX y XX, París fue ocupada dos veces. Primero en 1870, luego en 1940. Desde entonces, Francia ha jurado no permitir nunca que un extranjero ocupe sus tierras. El ejército francés está listo para defender la nación hasta el final. Los misiles nucleares franceses mantienen una defensa alrededor de la nación, amenazando a todos los que se atreven a amenazar la patria con el fuego nuclear.\n\nSin embargo, el espíritu francés no se trata solo de la defensa de la nación, sino también de la revolución. El espíritu radical francés, que fue el corazón del liberalismo europeo en 1789, ha persistido a lo largo de los últimos dos siglos. El pueblo francés no tolera la injusticia ni el maltrato, y prefiere morir de pie que vivir de rodillas. Cualquier intento de frustrar la voluntad del pueblo se enfrentará a protestas masivas, disturbios y posiblemente una revolución, un proceso que el pueblo francés ya practica bien a estas alturas."
 FRA_damaged_left_idea: "Una izquierda dañada"
 FRA_mass_migration_idea: "Migración masiva"
 FRA_mass_migration_idea_desc: "\n\n\n\n£GFX_FRA_mass_migration_banner\n\n\n\n\n\nDesde 1973, la política migratoria francesa se ha centrado en limitar la migración, pero en 2019, más de 120.000 solicitudes de asilo provocaron una importante división política. En un contexto de desaceleración económica y alto desempleo, el debate sobre la inmigración se ha convertido en un tema candente. La derecha, impulsada por el temor al impacto de la migración en la identidad y la seguridad francesas, aboga por fronteras más sólidas y una retórica antiinmigrante. Los partidos nacionalistas exigen el cierre de fronteras para frenar la afluencia.\n\nA medida que el debate se vuelve más polémico, la sociedad francesa se polariza cada vez más. Con el aumento del número de refugiados del norte de África y Medio Oriente, la presión económica se intensifica. Pronto será inevitable una política migratoria decisiva."
 FRA_mali_intervention: "Intervención en Mali"
 FRA_Civilian_Oil_Rations: "Racionamiento de petróleo para civiles"
 FRA_Civilian_Oil_Rations_desc: "Si bien Francia ha logrado superar las consecuencias a corto plazo de la guerra civil saudita, es evidente que se nos acaba el tiempo. El Gobierno ha declarado un racionamiento obligatorio de petróleo para la población civil, similar al que impuso el Gobierno estadounidense durante el embargo de la OPEP de los años setenta y la Revolución iraní. Con este racionamiento obligatorio, intentaremos mantener un precio razonable del petróleo disponible para la población civil."

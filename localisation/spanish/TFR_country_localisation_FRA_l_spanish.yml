 france.6970.t: "Lo que pudo haber sido"
 france.6970.d: "Francia ha sido lastrada y traicionada por nacionalistas corruptos como Le Pen y parásitos populistas como Mélenchon. Sus insignificantes disputas e incompetencia no llevarán a la república a ningún lugar más que a la vergüenza de la derrota y al colapso económico. Como dos caras de una moneda, su deseo de poder y dominio les han hecho ignorar la realidad de que solo una Europa unida puede aguantar la tormenta que se avecina. Esta nueva Europa debe nacer de las cenizas de la vieja. Para que Francia sobreviva debemos deshacernos de lo viejo y aceptar nuestro lugar en Europa, una Europa libre y unida. Una Europa democrática. Una Europa fuerte. Una que nunca vuelva a ser derrotada en el campo de batalla o en el mercado."
 france.6970.a: "Nunca más..."

 trait_FRA_Disgusted_with_Regime: "Enfadado con el régimen"
 trait_FRA_Disgusted_with_Regime_desc: "§LEste oficial se siente irrespetado por el régimen y se esfuerza por ser lo más independiente posible del alto mando.\n\nSi algo desestabilizara la República Francesa, este oficial sin duda se pondría en contra del establishment.§!"
 trait_FRA_Neutral_with_Regime: "Neutral al régimen"
 trait_FRA_Neutral_with_Regime_desc: "§LEste oficial no tiene sentimientos buenos ni malos sobre el régimen a cargo.\n\nSi algo desestabilizara a la República Francesa, este oficial podría decidir abandonar el sistema, pero no está garantizado.§!"
 trait_FRA_Happy_with_Regime: "Contento con el régimen"
 trait_FRA_Happy_with_Regime_desc: "§LEste oficial se siente profundamente honrado de servir a Francia gracias a las acciones del régimen al mando.\n\nSi algo desestabilizara la República Francesa, este oficial sin duda se pondría del lado del establishment.§!"
 trait_FRA_Political_Retirement: "Retiro político"
 trait_FRA_Political_Retirement_desc: "§LAunque se encuentren en retiro político, este oficial aún puede servir a su amada Francia en tiempos de crisis, pero sin la aprobación gubernamental que otros generales sí tienen.\n\nSi algo desestabilizara la República Francesa, este oficial sin duda se pondría en contra del establishment.§!"

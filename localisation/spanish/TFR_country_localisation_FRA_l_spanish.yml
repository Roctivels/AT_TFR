 Nationalist_France.69.t: "El gran misterio"
 Nationalist_France.69.d: "Esta era su merecida recompensa tras años de sacrificio, las heridas y el tiempo y los amigos perdidos. Él había luchado, matado y sangrado por Francia: desde las estepas rusas hasta las marismas de Pinsk. Desde las orillas del Vístula hasta los Alpes bávaros. Finalmente volvía a casa, no como un héroe conquistador, sino como un perro viejo agotado. ¿Su recompensa por todo sus esfuerzos? El \"honor\" de ser la retaguardia de su cuerpo, su división, una mezcla de veteranos viejos y agotados y chicos tan verdes como los árboles que les rodeaban. Sus órdenes eran claras: juntar lo que quedase de su división y otros rezagados que pudiese encontrar y mantener las defensas del Mosela todo el tiempo posible para permitir al resto del ejército formar una nueva línea defensiva a lo largo del río Mosa.\n\nEn el improvisado puesto de comando creado en una antigua central de correos, estaba sentado rodeado de sus subordinados. Estaba rodeado por quienes en el pasado pudieron ser sus amigos y camaradas, pero que ahora eran extraños y fantasmas. El pánico y la preocupación empeoraron aún más su dolor de cabeza. Toda petición de retirada era ignorada: O eran consideradas inútiles o una fragante desobediencia. El ruido de las armas crecía mientras la división enemiga se acercaba más y más al ruinoso puesto de mando. Todas sus esperanzas de retroceder y sobrevivir estaban en el comandante de su batallón en reserva y su decisión de cumplir las órdenes de contratacar. No se fiaba del hombre al cargo, pero no tenía otra opción pues no había nadie más capacitado para liderar una operación así.\n\nMientras continuaba pensando, un aterrorizado oficial irrumpió en la sala, llevaba un uniforme deshilachado una o dos tallas más pequeño para él. Con una voz miedosa, exclamaba que el batallón de reserva ya no estaba y se había perdido toda comunicación con este. El comandante de la división se sentó en silencio por un momento - el enemigo ahora estaba justo al lado del puesto de mando. Tras todo por lo que había pasado, llegó a la conclusión que todo eso ha sido en vano. Empezó a despotricar y perder los estribos, pues ya había llegado a su límite. Despotricó sobre el comandante de batallón como nadie lo había hecho. Mientras que el puesto de mando era ocupado, se mantuvo en lugar mientras sus hombres huían. De sus incomprensibles gritos e insultos de un hombre roto, pero desafiante, hubo una única cosa que sus hombres pudieron entender mientras huían:"
 Nationalist_France.69.a: "¿DONDE ESTÁ GROUCHY?"
 FRA_Triumph_over_the_Eastern_Menace_desc: "Con sangre y sudor, el oso ha sido vencido. Hubo quienes pensaron que Europa se hundiría con América. Europa estaría indefensa, remilgada por el botín e indefensa mientras los lobos rondaban. Nunca podrían haber estado más equivocados. Es Europa la que ahora se yergue victoriosa. Desde el partisano ucraniano hasta el piloto francés, desde el panzergrenadier alemán hasta la Marina Real. La titánica tarea solo fue posible gracias a nuestra decisión y a la de Europa de luchar hasta el final: sin medias tintas y sin una verdadera victoria, no habrá paz. A pesar de las dudas de algunos sobre el concepto de una Europa unida, ya no pueden negar que, unida en un propósito, Europa, unida, puede lograr grandes cosas."
 FRA_Mourn_our_Sons_desc: "El oso ha sido doblegado, pero a un alto precio. El intento inicial de salvar a Ucrania fracasó, y lo que debería haber sido un esfuerzo breve y decisivo se convirtió en un atolladero. Salimos victoriosos, pero solo después de un duro golpe para nuestras economías y pueblos. Debemos extraer nuestra parte de sangre del cadáver del oso, al igual que el resto de la OTAN. Haremos todo lo posible para someter a Rusia con medidas destinadas a paralizar su economía y su aparato militar. El nuevo gobierno ruso emergente parece estar considerando la idea de reorganizarse para intentar de nuevo restaurar lo perdido, al menos entre bastidores. Siguiendo las recomendaciones del Estado Mayor, nosotros y el resto de la OTAN permaneceremos en distintos niveles de alerta y la preparación militar debe mantenerse. En el improbable caso de que el oso vuelva a atacarnos, estaremos listos. Si quieren reclamar su derecho de nacimiento, es una cortesía por nuestra parte asegurarnos de que mueran en el intento."
 FRA_The_Spirit_of_Victory_desc: "Los rusos creían que Europa era débil y se cruzarían de brazos mientras continuaban su marcha de subyugación. Creían que, en el peor de los casos, nuestra intervención sería ineficaz y lenta; no podían haber estado más equivocados. Con una intervención rápida y decisiva, se salvó la desastrosa situación de Ucrania y se detuvo el impulso ruso. Hubo éxitos y reveses en el ínterin, pero al final, fue la bandera francesa la que ondeó sobre el Kubán y el gobierno ruso el que se derrumbó. Tenemos la intención de cosechar algunos frutos de la victoria, al igual que nuestros socios, pero debemos ser considerados con tales demandas. No hace falta remontarse mucho para ver las consecuencias negativas de una paz cartaginesa, reales o imaginarias. Creemos que se puede trabajar con este nuevo gobierno ruso y que Europa lo acoja poco a poco como socio y quizás futuro amigo. Después de todo, ¿es el nuevo gobierno ruso diferente del nuestro? Seguramente entrarán en razón y comprenderán que colaborar con nosotros es una alternativa mucho mejor que actuar en solitario o incluso intentar recuperar territorios perdidos. La probabilidad de una acción tan descabellada es muy baja. Es mejor ignorarla, a pesar de que los miembros del Estado Mayor insisten en la vigilancia porque... Después de todo, ¿prepararse para ello no la alentaría?"
 FRA_Enter_the_New_Era_desc: "A pesar del sacrificio y la victoria, no debemos quedarnos de brazos cruzados. Hemos luchado por mantener el viejo orden y hemos ganado, pero la lucha nunca cesa. No debemos desperdiciar la paz, y debemos hacer todo lo posible para mantener a nuestros aliados en casa felices y vigilantes, y a nuestros socios en el extranjero armados y económicamente productivos. La economía alemana puede ser más fuerte con la UE, a nuestro entender, como su representante, pero Francia es la potencia mundial. Nuestras conexiones en África Occidental mantienen los recursos y alimentos entrantes para Europa y nuestras arcas llenas, pero nuestros socios en la región tienen sus propios rivales y guerras que afrontar. Aunque la OTAN no esté dispuesta a dedicarle recursos, no escatimaremos en gastos y garantizaremos que nuestras inversiones pasadas, presentes y futuras no sean en vano. Una Francia más fuerte es una OTAN más fuerte, ¿y quién de nuestro lado se va a quejar de eso?"
 FRA_Announce_Snap_Elections_desc: "Con el fin de la guerra regresa la división política. Las alianzas de conveniencia y la pausa en las pequeñas disputas en aras del esfuerzo bélico han llegado, lamentablemente, a su fin. A pesar de la aparente abrumadora popularidad de nuestro Gobierno, la oposición exige elecciones inmediatas debido a nuestra \"incompetencia gubernamental y la mala gestión del esfuerzo bélico\". Podrían ignorarse, pero tienen la suficiente influencia como para causar graves problemas y retrasar la legislación en el futuro. Si somos tan populares como aparentan, esto podría ser una bendición. Esto podría consolidarnos aún más y aumentar nuestra influencia en el Gobierno, permitiéndonos ignorar cómodamente tales demandas en el futuro. Siempre existe la posibilidad de que nuestras suposiciones sobre la popularidad sean erróneas, pero ¿qué es la vida sin riesgo?"

 FAF_Nationalize_the_Wine_and_Olive_Industries: "Estatizar la industria del vino y el olivo"
 FAF_Nationalize_the_Wine_and_Olive_Industries_desc: "In terms of cultural products, France is renowned for their wine and olive exports. As of now, most of these industries are currently privately owned and thus privy to the influences of foreign agents. If we nationalize these industries, not only can we secure extra funds for our regime, but can ensure these products can continue to be the pride and joy of France!"

 FAF_provincial_improvement_modifier: "Enfoque provincial"
 FAF_improve_gallarum_decision: "Reconstruir §GGalliarum§!"
 FAF_improve_gallarum_decision_desc: "Si bien Galliarum, conocida por la mayoría como Francia Septentrional, tenía los beneficios de ser nuestra región más desarrollada, esto no le pudo salvar de los horrores de la guerra civil. Ya de por si bombardeada por los rusos durante la Guerra Europea, Galliarum ha sufrido numerosos daños por culpa de los comunistas y liberares, que saquearon la región y se llevaron todo lo que pudieron. Ahora que ya tenemos los recursos necesarios, debemos iniciar la reconstrucción de toda la región. Si no lo hacemos, no solo no tendremos la capacidad industrial necesaria para unificar a nuestra bella Europa, también permitirá que agentes subversivos se aprovechen de la situación y que estos radicalicen e inciten a la rebelión a nuestro pueblo."
 FAF_improve_viennensis_decision: "Reconstruir §OViennensis§!"
 FAF_improve_viennensis_decision_desc: "La región desde la cual Cesar inició a civilizar a los galos, Viennensis (más conocida como Francia Meridional) ha llevado sufriendo mucho tiempo, antes incluso del estallido de la guerra civil que asoló a nuestra nación. Careciendo en gran medida del desarrollo económico que tiene el norte, esta región sufre de altos niveles de pobreza y por eso se convirtió en un nido de radicales quienes buscan sumergir a nuestra nación en el caos de nuevo. Es por nuestro deber con el pueblo de nuestra querida Francia por lo que debemos esforzarnos plenamente en revitalizar esta región para que así, ¡Viennensis pueda resurgir de sus cenizas cual ave fénix!"
 FAF_improve_hispanarium_decision: "Reconstruir §YHispanarium§!"
 FAF_improve_hispanarium_decision_desc: "Nuestra reunificación con nuestros hermanos al sur de los Pirineos ha provocado que hayamos heredado la destrucción causada por su segunda guerra civil. A diferencia de Francia e Italia, debemos entender que el proceso de reconstrucción debe tener en cuneta la multitud de identidades regionales existentes en el territorio español para evitar repetir nuestros errores en la Guerra Peninsular. Si bien puede que tengamos que hacer un gran esfuerzo, ¡no escatimaremos en gastos para ayudar a cualquier hermano descendiente de Roma!"
 FAF_improve_italiae_decision: "Reconstruir §RItaliae§!"
 FAF_improve_italiae_decision_desc: "Italia fue alguna vez el corazón palpitante de Europa, fue alguna vez el faro de esperanza que trajo una era dorada de progreso, iluminación y prosperidad. Pero desde la caída del Imperio Romano de Occidente en el siglo V, Italia nunca ha recuperado plenamente el esplendor que tuvo en la antigüedad. Así pues, es nuestro deber reconstruir la península, libre de los fracasos de la decrépita democracia liberal, para que finalmente pueda tener un esplendor que deslumbraría al mismísimo Augusto. Se dice que Roma no se hizo en un día, pero si su gloria sigue brillando entonces dedicaremos el tiempo y los esfuerzos necesarios para continuar su legado."
 FAF_Quadrilingual_Unification_dyanmic: "Idioma de hermanos"
 FAF_Quadrilingual_Unification_dyanmic_desc: "Quizás la mayor desgracia que sufrió Europa tras la caída de Roma ha sido el lento y doloroso declive del latín. El idioma que alguna vez pudo unir a todo el imperio ha quedado relegada a la lengua litúrgica de la iglesia católica. Tampoco ayuda que tras siglos de división tras la caída de Roma supusiese que el latín se degenerara en distintas lenguas romances. Como parte de nuestros esfuerzos para unir el continente europeo, debemos emprender la ardua tarea de restaurar el latín como lengua franca. Mientras que nuestros hermanos romances puede que estén dispuestos a echarnos una mano, debemos recordar que, al igual que Roma, la adopción masiva del latín no se puede hacer en un día."
 FAF_Quadrilingual_Unification_idea: "Idioma de hermanos"
 FAF_Language_of_the_State_decision: "Prescindir del idioma nacional"
 FAF_Language_of_the_State_decision_desc: "Uno de los mayores obstáculos para que el latín sea adoptado por nuestro pueblo es que contamos con una lengua nacional, el francés. Aunque puede que sea chocante para nuestra clase política y burocrática, prescindir de su estatus privilegiado y ponerla a la par de nuestros otros idioma oficiales puede que motive a nuestros ciudadanos a adoptar el latín. Y además, haciendo esto ayudará a que cuando hayamos culminado nuestra unificación de Europa, esta no sea considerada como un caso más de imperialismo francés."
 FAF_managerial_bilingualism_decision: "Bilingüismo gerencial"
 FAF_managerial_bilingualism_decision_desc: "Una de la principales justificaciones para la revitalización lingüística del latín es que cuando unamos a los pueblos europeos, este puede ser la lengua franca que permite asegurar una gobernanza eficiente a pesar de nuestras diferencias. Con esto en mente, debemos asegurar que nuestra clase burocrática sepa al menos hablar el latín y su lengua materna, Además, ¿no seríamos hipócritas si no usamos la lengua de nuestros preciados ancestros romanos."
 FAF_the_failures_of_AH_decision: "Fallas de [AUS.GetFlag] Austria-Hungría [HUN.GetFlag]"
 FAF_the_failures_of_AH_decision_desc: "Uno de los principales problemas del Imperio austrohúngaro fue el gobierno inadecuado de sus minorías culturales. Si bien aún eran europeos, estaban sujetos al dominio cultural de los austriacos que los gobernaban. No podemos, bajo ningún concepto, replicar este ejemplo en la historia. Debemos encontrar soluciones comunes a nuestros problemas y trabajar, como el gran pueblo de toda Francia, por un objetivo que nos consuele."
 FAF_Academic_Latinization_decision: "Latinización académica"
 FAF_Academic_Latinization_decision_desc: "As much as we can declare that our people \"must learn Latin for the good of Europe\" and that they will do their patriotic duty, this process will be difficult with the current state of education. Beyond language studies, courses that properly teach Latin are non-mandatory, and curriculums are based around regional languages that give less incentive to learn the language beyond a basic level. While it will require a massive academic overhaul, we must assemble our best Latin scholars to help draft a new curriculum that ensures that Latin is thoroughly taught and utilized by our people. Most importantly, if the youth are our future then such a system means that it may only take a few decades until Latin is commonplace in Europe once again!"
 FAF_our_ancestral_battlefield_decision: "Nuestros campos de batalla ancestrales"
 FAF_our_ancestral_battlefield_decision_desc: ""
 FAF_the_roman_way_decision: "El método romano"
 FAF_the_roman_way_decision_desc: "Cuando preguntan a la gente sobre Roma, muchos dirán que fue un vasto y poderoso imperio, pero pocos pueden señalar lo que verdaderamente hizo a Roma grande. Cualquier nación puede formar un imperio, pero lo que hizo que Roma destacase entre los demás fue su voluntad, forjada en la sangre y en el barro. Como los herederos de Roma, es nuestro destino reconstruir lo que se ha perdido, destruido y olvidado siglo atrás. El águila romana extenderá una vez más sus alas sobre Europa, desde Iberia hasta Italia, y su canto resonará por los cielos europeos."
 FAF_enforce_imperial_language_decree_decision: "Decreto lingüístico imperial"
 FAF_enforce_imperial_language_decree_decision_desc: "El italiano, español y francés son tres lenguas diferentes que comparten las misma raíz: el latín. La lengua madre ha sido abandonada y casi olvidada por sus propias hijas. Sin una lengua única, nuestra nueva Roma será como la Torre de Babel: una construcción vacía alimentada por el caos y la locura. Una vez más, el latín será la lengua del hombre civilizado, de neustros hermanos de sangre, de los romanos."
 FAF_demand_spanish_unification_decision: "Demandar la unificación española [SNS.GetFlag]"
 FAF_demand_spanish_unification_decision_desc: "Recordar, por un momento, que la frondosa y hermosa Iberia formaron parte de nuestro próspero Imperio Romano hace que uno se llene de orgullo y alegría. Pero se siente tan distante, es un pasado ancestral que murió con nuestros padres fundadores. Nosotros y los españoles tuvimos nuestras diferencias durante nuestra historia compartida, pero la sangre que fluye por nuestras venas definitivamente nos une. Estamos destinados a ser amigos y hermanos, no enemigos. Puede que los españoles hayan olvidado esto, pero nosotros se lo recordaremos."
 FAF_demand_italian_unification_decision: "Demandar la unificación italiana [ITA.GetFlag]"
 FAF_demand_italian_unification_decision_desc: "Una familia no estará completa hasta que reúna a todos sus integrantes, y para la familia romana, Italia es un integrante irremplazable. Después de todo, ¿dónde nació el propio concepto de Roma? Sin Italia, nuestra Roma estaría incompleta y no sería más que otra imitación vacía creada por charlatanes e impostores. Un Imperio Romano sin Roma es como un desayuno sin café y un cigarrillo - no es un auténtico desayuno. Es por esto por lo que debemos hacer que los italianos adopten nuestra visión. Debemos..."

 FAF_invite_states_to_the_european_nation_decision_desc: "Ya sea por ellos mismos o por nuestra previa presión política, somos afortunados al sabe que [insert nation] ya simpatiza con nuestra causa, y que no nos debemos preocupar de forzarlos a unirse a nuestra unión continental. En vista de que nuestra relación pasa por sus mejores momentos, ¡invitaremos cordialmente al pueblo de [insert country] a unirse a sus hermanos en la Hegemonía Europea!"

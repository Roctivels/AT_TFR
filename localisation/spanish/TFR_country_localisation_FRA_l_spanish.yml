 FAF_New_Era_Category: "Algo de lo viejo, algo de lo nuevo"
 FAF_New_Era_Category_desc: "\n\n\n\n\n£GFX_FAF_new_and_old_cat\n\n\n\n\n\n\n\nFrancia ha sido durante mucho tiempo el centro de la historia europea; tenemos la historia más rica, y nuestro destino está escrito en las estrellas. Cuando se habla de civilización, en última instancia se remonta a nuestros logros nacionales. ¿Quién ha aportado tanto a las artes, la cultura, la filosofía, la ciencia y la tecnología? ¿Quién ha dedicado tanto tiempo a elevar a millones de personas en todo el mundo con las ideas de la Ilustración y la modernidad? Hemos sido los pocos en hacerlo. El francés es uno de los idiomas más hablados del mundo y en su día fue la lengua franca de toda la diplomacia internacional. Economías enteras y políticas nacionales de naciones extranjeras se someten a nuestra voluntad nacional.\n\nEn el pasado, soldados franceses han pisado todos los continentes y los han reclamado para nuestra gloriosa nación para fastidiar a otros pequeños imperios europeos, pero a medida que esos imperios perecieron ante las revoluciones que nosotros dimos origen a nuestra propia gloriosa revolución, nosotros permanecimos. Hemos honrado siglos y siglos de historia europea como una potencia continental a tener en cuenta. ¡Esto es lo que somos! ¡Este es nuestro destino! ¡Esto es lo que seguiremos siendo mientras vivamos! El mundo entero volverá a arrodillarse ante nuestra palabra, no solo nuestros enemigos, sino también nuestros aliados. Vive la France!"
 FRA_yellow_vests_idea: "Protestas de los chalecos amarillos"
 FRA_yellow_vests_idea_desc: "\n\n\n\n£GFX_FRA_yellow_vest_banner\n\n\n\n\n\nEl estancamiento económico francés ha afectado duramente a los trabajadores, con el aumento de los precios del combustible, el alto coste de la vida y la creciente desigualdad que amenazan su calidad de vida. Mientras tanto, una carga fiscal desproporcionada recae sobre las clases trabajadora y media. En mayo de 2018, una petición obtuvo casi un millón de firmas, lo que desencadenó protestas que se han prolongado durante casi dos años.\nLas protestas, simbolizadas por los chalecos amarillos, han unido tanto a la ultraizquierda como a la ultraderecha en oposición al neoliberalismo. Los manifestantes han bloqueado carreteras, construido barricadas y marchado en manifestaciones masivas.\nLa violencia se ha intensificado, con disturbios, enfrentamientos con la policía y daños materiales generalizados en las ciudades. El índice de aprobación de Macron ha caído más del 20%. Estas protestas podrían marcar un punto de inflexión en la política francesa, alejándose del liberalismo hacia un auge del extremismo."

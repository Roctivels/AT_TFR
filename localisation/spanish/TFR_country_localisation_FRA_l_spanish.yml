 france.997.d: "Si lees este evento, ¡felicidades, tramposo! Aquí tienes algunos detalles curiosos sobre TFR:\n\nCascadia ha tenido 6 desarrolladores diferentes.\n\nOriginalmente, todos los líderes del EPLA eran mujeres.\n\nArtiom es el original, pero Lafayette, Ulysses, Ashton Knight y Rädelsführer están basados en un joven veterano nacionalista y déspota.\n\nputo el que lo lea"
 france.997.a: "Mélenchon gana."
 france.997.b: "Villiers gana."
 france.997.c: "Le Pen gana."
 france.997.e: "Le Pen pierde"
 france.997.f: "Macron gana"
 france.997.h: "Macron pierde"
 france.997.g: "Zemmour gana"
 france.998.t: "Dominoreich"
 france.998.d: "Ahora lo ves..."
 france.998.a: "Y dijo Dios, quémalos."
 france.0.t: "El Gran Juego"
 france.0.d: "A lo largo de su historia, Francia ha enfrentado numerosos conflictos internos y externos, lo que ha dado lugar al establecimiento de una sólida tradición militar. La Revolución Francesa de finales del siglo XVIII, por ejemplo, presenció el ascenso de líderes militares como Napoleón Bonaparte, quien ejerció un poder político considerable. Este legado histórico ha perpetuado la creencia en la importancia del ejército para proteger los intereses de la nación y ha moldeado la percepción de las fuerzas armadas como un pilar fundamental de la identidad y la soberanía francesas.\n\nA medida que nuestra nación se aleja de la necesidad de un control militar significativo, los militares no están muy dispuestos a renunciar al poder que se habían otorgado y es necesario trabajar con ellos para mantener su lealtad."
 france.0.a: "Peón a E4."
 france.1.t: "El terror se apodera de Niza"
 france.1.d: "A las 8:30 de esta mañana, en las instalaciones de Notre Dame de Niza, Brahim Aouissaoui decapitó a un anciano y apuñaló a otros tres.\nDurante 28 minutos, gritó repetidamente \"¡Allahu akbar!\" antes de ser abatido frente a la iglesia por equipos de SWAT.\n\nEste ataque ha sido reivindicado por numerosas células terroristas de Medio Oriente y se ha atribuido a la creciente tensión que comenzó con los atentados de Charlie Hedbo en 2015."
 france.1.a: "¿Todo por un dibujito?"
 france.2.t: "Le Pen anuncia su candidatura para 2022"
 france.2.d: "Marine Le Pen, líder de la Agrupación Nacional, anunció el domingo su candidatura a las elecciones presidenciales de 2022. Esta es su tercera candidatura presidencial tras perder contra Emmanuel Macron en 2017. La campaña de Le Pen se centrará en temas como la inmigración, la seguridad nacional y la soberanía, que han sido centrales en la plataforma de su partido durante años. Se espera que se enfrente a una dura competencia de otros candidatos, incluyendo a Macron y a posibles rivales de la izquierda. Le Pen ha ido ganando apoyo en los últimos años y su anuncio sienta las bases para una carrera presidencial muy disputada."
 france.2.a: "¡Y volverás a fallar!"
 france.2.b: "¡Abajo con el establishment!"
 france.3.t: "Elecciones de 2022"
 france.3.d: "Con las elecciones francesas en pleno apogeo, la maquinaria política francesa está a toda marcha. El país enfrenta numerosos desafíos, incluyendo una economía en crisis, una creciente ola de nacionalismo y crecientes tensiones con sus vecinos.\n\nAl emitir sus votos, los franceses mostraron opiniones divididas sobre quién debería guiar al país en estos tiempos turbulentos. Algunos votaron por un líder fuerte, necesario para restablecer el orden y revitalizar la identidad francesa, mientras que otros decidieron votar por un candidato más progresista para abordar los problemas sociales y económicos del país. Por supuesto, el statu quo sigue siendo una opción atractiva para muchos, quienes votan con confianza por el actual partido gobernante.\n\nAl finalizar el periodo electoral, la tensión continúa aumentando y aún queda por ver qué rumbo tomará Francia en los próximos años. Muchos franceses observan con nerviosismo las urnas mientras, poco a poco, se revela el ganador.\nY el ganador es..."
 france.3.a: "¡Le Pen, por mucho!"
 france.3.g: "Le Pen pierde por poco..."
 france.3.h: "Macron pierde por poco..."
 france.3.b: "¡Macron triunfa!"
 france.3.c: "La votación electrónica falla, solo se aceptan papeletas a mano."
 france.3.e: "¡El Nuevo Frente Popular gana por poco!"
 france.3.f: "Villiers triunfa."
 france.4.t: "Zemmour acusa a Macron de traición"
 france.4.d: "Con el panorama político francés comenzando a ver a numerosos candidatos notables presentarse a la presidencia de la Quinta República, la llegada de contendientes previamente ignorados o, en general, marginales siempre ha sido un espectáculo en la era de la politiquería del siglo XXI. Entre los movimientos políticos que buscan derrocar al establishment, Macron, y su LREM en las próximas elecciones de 2022, sería inexacto afirmar que la Agrupación Nacional de Le Pen fue la única voz de la oposición de derecha al gobierno actual. Esto se reafirmó recientemente, cuando el controvertido comentarista televisivo Éric Zemmour lanzó en la televisión pública su propia diatriba mordaz contra el liderazgo del presidente.\n\nEntre otras cosas desagradables, Zemmour criticó duramente diversas políticas de Macron implementadas bajo su liderazgo, criticando sus políticas en materia de inmigración y acusándolo de contribuir al \"declive de la identidad nacional\" de Francia por su predisposición hacia los recién llegados de Medio Oriente y el norte de África. Afirmando que la \"existencia misma de la cultura, la sociedad y el pueblo francés en su conjunto\" corrían el riesgo de ser reemplazados por la afluencia de inmigrantes extranjeros, la emisión alcanzó un punto de inflexión cuando Zemmour acusó a Macron de cometer \"alta traición\" contra el pueblo francés, lo que generó revuelo en redes sociales y otros temas.\n\nLa emisión de Zemmour, conocido por sus declaraciones incendiarias y su retórica controvertida durante casi una década, le ha generado mucha atención, y sus palabras se han convertido en tema de acalorado debate recientemente. Si bien muchos en la izquierda y el centro de Francia han reaccionado negativamente a sus palabras, y algunos piden su retirada del aire, un número creciente de derechistas, aparentemente insatisfechos con Le Pen, han comenzado a elogiar a Zemmour, con crecientes peticiones para que el comentarista se postule para la presidencia. Aunque Zemmour todavía está más o menos fuera del foco político, es demasiado pronto para predecir si las cosas seguirán así."
 france.4.a: "Otro chiflado de derecha."
 france.4.b: "¡El pueblo francés demanda un cambio!"
 france.5.t: "Rumores en el ejército"
 france.5.d: "El ejército de Francia tiene una historia larga y documentada. Desde el gran liberador Charles De Gaulle al famoso conquistador y emperador Napoleón Bonaparte, Muchas figuras líderes de la historia de Francia se elevaron desde las fuerzas armadas y sus instituciones, haciendo que la posición del ejército en la nación francesa sea vista como esencial por muchos, especialmente por el mismo ejército. Aunque esto ha llevado a un número de problemas políticos que persisten aún hoy en día, muchos pensaron que la era del poder e influencia militar ya había acabado hace mucho, con su poder siendo correctamente regulado por el Gobierno civil y el proceso democrático.\n\nAl menos, hasta hoy. En la semana del 60º aniversario del fracaso del golpe de Estado del ejército francés en Argel, Noticias han circulado a través de Francia de un \"coup d'État\" siendo planeado, aparentemente debido a una filtración del ejército. Una carta co-firmada por más de una docena de generales que han o están sirviendo ha sido subido al internet, con la carta en sí haciendo varias declaraciones y demandas contra el establecimiento actual, que van desde criticar primariamente al Gobierno y su aparente falta de inversiones y tratamientos adecuados a las fuerzas armadas en una era de turbulencia global en ascendencia, a visiones políticas más vagas del \"mandato de ley firme y orden\" y la importancia de \"salvaguardar Francia de los enemigos mortales que la amenazan\".\n\nAunque una simple carta subida de tono difícilmente es suficiente evidencia para afirmativamente señalar una verdadera amenaza de golpe militar contra el Gobierno electo, los rumores han atemorizado una decente porción del Gobierno y el público al completo, a pesar de la falta de evidencia concreta para apoyarla. Todos los firmantes de la carta han sido examinados tanto por oficiales públicos y miembros no firmantes del personal de comando, recordándoles que el rol militar debe generalmente mantenerse apartado del político, y la importancia de mantener esa separación de poder. Por ahora, los rumores de algún tipo de acción contra el Gobierno de parte de los militares parecen ser solo eso... rumores."
 france.5.a: "Rumores son rumores."
 france.6.t: "Generales franceses exijen concesiones"
 france.6.d: "Esta mañana, soldados franceses enmascarados clavaron una lista de demandas en todos los principales edificios oficiales de París. Esta lista de concesiones militaristas, que incluían medidas como el restablecimiento del servicio militar obligatorio y la eliminación de la estructura de mando integrada de la OTAN, prometía duras medidas políticas contra quienes las negaran, pero también prometía que el ejército francés no perjudicaría al presidente Macron, a Le Pen ni a ningún otro político. Esta carta fue oficialmente reconocida por el Alto Mando francés tras recibir informes de que varios batallones de soldados franceses iniciaban ejercicios militares en posiciones estratégicas de París y sus alrededores.\n\nEl presidente Macron, que se encontraba en París, fue trasladado fuera de la ciudad tras recibir la lista de demandas, mientras que a Le Pen se le comunicaron estas demandas durante un encuentro improvisado con soldados en las afueras de París."
 france.6.a: "Le Pen promete concesiones postelectorales."
 france.6.b: "Le Pen se niega a ceder."
 france.6.c: "Macron cede."
 france.6.e: "Macron promete concesiones postelectorales."
 france.6.f: "Macron se niega a ceder."
 france.6.g: "Macron cede... Zemmour acepta."
 france.7.t: "Una elección \"justa\" y \"libre\""
 france.7.d: "Las elecciones, como en muchas otras democracias del mundo, eran asuntos bastante complejos, pero todos se reducían a una sola cosa: la competencia. Un candidato o un partido debe competir por los puestos de poder dentro de un estado. La democracia sonaba bien en los discursos y en los libros de texto, pero a menudo había que jugar sucio si se quería asegurar una ventaja sobre el oponente. Eric Zemmour comprendía perfectamente todo esto y había utilizado todas las herramientas de su arsenal político para que todo esto sucediera, incluso si tenía que hacer un poco de... \"negociación\" entre bastidores.\nZemmour no dejaba de pensar en todo esto mientras caminaba de un lado a otro en su oficina de París. Las elecciones lo estaban volviendo loco de una anticipación como nunca antes había experimentado. Todos en Francia sabían que sería una contienda reñida y que todos los políticos rivales habían movilizado todos sus contactos y credibilidad para detenerlo. Sin embargo, a diferencia de todos ellos, él sabía algunas cosas que el votante promedio y su rival desconocían. Estaba seguro de haberlo hecho todo bien, de haber hablado con las personas adecuadas, de haber tomado las decisiones correctas y de haber dicho lo correcto. Todo debía funcionar según lo previsto. La gente desconocía cuánto había tenido que trabajar para que todo saliera como él quería.\n\nHizo que su gente visitara innumerables centros de votación para asegurarse de que funcionaran \"correctamente\". Había conseguido que sus amigos de las Fuerzas Armadas Francesas \"certificaran\" que las elecciones se desarrollaban como se suponía que debían. Había acudido innumerables veces a los votantes y les había dicho todo lo que querían oír, sin importar cuántas veces otros políticos del establishment lo llamaran \"populista\". Había hecho todo lo posible; ahora era el momento de ver si daba resultado.\nSentado ante el televisor de pantalla plana de su oficina, Zemmour sintonizó el primer canal de noticias importante para ver los resultados. Por fin había llegado su momento. Mientras sus ojos recorrían rápidamente la pantalla del canal y lo que decían los periodistas, casi saltó de alegría. Todo lo que había logrado con tanto esfuerzo daba frutos. El texto que aparecía en pantalla lo llenó aún más de una satisfacción que no había sentido en mucho tiempo..."
 france.7.a: "ZEMMOUR GANA POR 3 PUNTOS."
 france.8.t: "Le Pen se retira de la política"
 france.8.d: "Tras una decepcionante participación en las elecciones regionales de 2021, muchos se han preguntado si Marine Le Pen es una figura digna de la derecha populista francesa. Ya sea por la presión del liderazgo o por problemas internos dentro de la Agrupación Nacional, Le Pen ha anunciado su dimisión de la política. Si bien ha alegado su deseo de apoyar a la creciente población de refugiados estadounidenses que llegan al país, este cambio de actitud ha propagado rumores de que miembros del partido sugieren que debería marcharse por el bien del partido. Sea cual sea el motivo, la dimisión de Le Pen deja un vacío de poder en la derecha política francesa, un problema que, sumado al creciente autoritarismo militar, genera preocupación entre muchos sobre quién ocupará su lugar. Si RN encuentra un nuevo líder o si otro partido de ultraderecha lo absorbe es un tema a debate, un debate que podría determinar el futuro de Francia tal como la conocemos."
 france.8.a: "Au Revoir!"
 france.9.t: "Zemmour une RN y Reconquête"
 france.9.d: "Desde la renuncia de Marine Le Pen, la Agrupación Nacional se ha desmoronado. Desde las crecientes luchas internas hasta la desorganización parlamentaria, los abanderados del populismo de ultraderecha en Francia parecían incapacitados. Esto fue así hasta un repentino anuncio de Éric Zemmour, líder del partido marginal Reconquête, anunciando la absorción de la dividida Agrupación Nacional. Si bien muchos en la ultraderecha francesa acogen a Zemmour como una figura unificadora, especialmente con la radicalización actual a medida que el viejo orden mundial se derrumba a nuestro alrededor, existe una gran preocupación en el resto del espectro político ante el inminente ascenso de Reconquête. Independientemente de la postura, prevemos que la creciente radicalización y la creciente división dominarán las próximas elecciones presidenciales."
 france.9.a: "Un partido, un pueblo."
 france.10.t: "El presidente de Mali se salvó"
 france.10.d: "Tras un breve combate en Azawad, el expresidente de Mali fue encontrado caminando junto al río Níger, aparentemente abandonado a su suerte por sus captores. Aunque se garantizó su seguridad, la República de Mali se ha negado a restituirlo como presidente, alegando los recientes acontecimientos políticos y las últimas elecciones anticipadas como prueba de su incapacidad como líder."
 france.10.a: "Excelente."
 france.11.t: "Asesinan al presidente de Mali"
 france.11.d: "Tras el fracaso de las negociaciones y una ruptura entre las fuerzas radicales y las más moderadas del Gobierno de Salvación de Mali, se ha mostrado en vídeo la ejecución del presidente. El vídeo, ya infame en los rincones más oscuros de internet, confirma inequívocamente la identidad del presidente, antes de mostrar su breve juicio militar y ejecución. Muchos creen que esto pretendía enviar un mensaje a los líderes de la República de Mali."
 france.11.a: "Mierda."
 france.12.t: "El presidente de Mali se encuentra cautivo"
 france.12.d: "Con la inmediata captura de una gran parte de Mali, el Gobierno de Salvación de Mali anunció que el expresidente de Mali se encuentra actualmente en cautiverio."
 france.12.a: "¡Debemos intervenir!"
 france.13.t: "Inicia la operación Serval"
 france.13.d: "Tras el aumento de los combates en el noreste de Mali, las fuerzas militares han declarado un Gobierno rival, en oposición a la creciente presencia de Francia en el país."
 france.13.a: "¡Evacuen la embajada!"
 france.14.t: "Una muestra de independencia"
 france.14.d: "La tensión dentro de la OTAN aumenta a medida que el liderazgo militar francés, impulsado por el nacionalismo y la insatisfacción con las alianzas recientes, ha optado por realizar ejercicios independientes a gran escala sin la supervisión de la OTAN. Las divisiones blindadas y las fuerzas navales francesas están haciendo alarde de su poderío, desfilando cerca de puntos estratégicos clave, evocando la época de la firme política exterior de Charles de Gaulle.\n\nSi bien los ejercicios se describen oficialmente como rutinarios, la audaz decisión de marginar a la OTAN ha generado controversia en los canales diplomáticos internacionales. Esto podría ser un punto de inflexión para la independencia militar de Francia y su papel en las alianzas globales."
 france.14.a: "¡Siempre hemos estado solos!"
 france.15.t: "Se reporta coronavirus en Francia"
 france.15.d: "En un acontecimiento inesperado, han surgido informes sobre la detección de un nuevo coronavirus, COVID-19, en Francia. Inicialmente vinculado a viajeros internacionales y casos en Asia, el virus se está propagando ahora dentro de las fronteras francesas. Los médicos advierten de un posible brote, pero la gravedad real sigue siendo incierta. Sin embargo, la población ya está preocupada a medida que las cadenas de noticias amplifican las preocupaciones, mostrando imágenes de hospitales desbordados en China y confinamientos tempranos en Italia.\n\nFrancia, orgullosa de su sistema sanitario, se encuentra en una encrucijada. Los funcionarios del Gobierno se esfuerzan por coordinar una respuesta, pero las facciones internas se enfrentan. La izquierda exige confinamientos inmediatos y medidas de protección, alegando solidaridad y bienestar público, mientras que la ultraderecha ve una oportunidad para avivar la retórica nacionalista, advirtiendo sobre la seguridad fronteriza y criticando la globalización. El Gobierno se enfrenta a presiones de ambos bandos mientras gestiona sus responsabilidades como parte de la UE y su papel en la cooperación internacional."
 france.15.a: "¡Debemos actuar rápido!"
 france.16.t: "Pausan las protestas de los chalecos amarillos"
 france.16.d: "Tras las recientes concesiones otorgadas a los chalecos amarillos, parece que el movimiento ha comenzado a frenar sus desenfrenadas protestas y disturbios en todo el país. Con el aumento de los informes de COVID-19 en el país, beneficia a la nación que el movimiento se concentre en el resto del país para evitar que la pandemia se propague aún más."
 france.16.a: "Ojalá no vuelvan."
 france.17.t: "Los chalecos amarillos vuelven"
 france.17.d: "En un resurgimiento del malestar social, las protestas de los chalecos amarillos han resurgido en toda Francia. Inicialmente desencadenadas en 2018 por el aumento de los impuestos a los combustibles y el coste de la vida, el movimiento ha resurgido, alimentado por la frustración por la desigualdad económica, las medidas de austeridad y la aparente indiferencia del Gobierno. Los manifestantes han salido a las calles, bloqueando carreteras y enfrentándose a las fuerzas del orden en ciudades de todo el país. Las protestas, si bien descentralizadas y con demandas diversas, reflejan un profundo descontento con la clase política y una creciente frustración con las reformas del presidente Macron.\n\nA medida que se levantan las barricadas, el Gobierno debe decidir si satisface las demandas de los manifestantes con concesiones, mantiene una postura firme para restablecer el orden o se arriesga a profundizar las divisiones políticas al no hacer nada. Las decisiones que se tomen ahora podrían sofocar el malestar o exacerbar aún más una nación que ya lidia con incertidumbres económicas y tensiones sociales."
 france.17.a: "¡El PEOR momento!"
 france.18.t: "Inician negociaciones con los chalecos amarillos"
 france.18.d: "Este calvario con los chalecos amarillos se ha prolongado demasiado. Hemos intentado concederles las concesiones que desean, pero seguirán saliendo a la calle el próximo mes. Es hora de plantarnos y negociar con los manifestantes de una vez por todas para asegurarnos de no volver a tratar con esta gente."
 france.18.a: "Esperemos lo mejor..."
 france.19.t: "Los chalecos amarillos abandonan"
 france.19.d: "Esa escoria radical intentó presionarnos en nuestras propias negociaciones. Habíamos intentado llegar a un acuerdo real, pero seguían quitándonos cada vez más, y se volvió demasiado para que no pudiéramos conceder razonablemente estas concesiones entre otras peticiones. En cuanto dimos marcha atrás, montaron un alboroto y abandonaron la negociación para continuar con sus disturbios. Está claro que con los radicales de los chalecos amarillos no hay término medio y su única intención es seguir destrozando e incendiando las calles de París."
 france.19.a: "¡Que te jodan a ti también!"
 france.20.t: "Acuerdo con los chalecos amarillos"
 france.20.d: "Aunque no siempre pareció que algo así sucedería, los chalecos amarillos y nuestra administración encontraron puntos en común y lograron una negociación exitosa. París ya parece estar más en paz que en las últimas semanas; salvo algunos radicales, los disturbios y protestas incesantes desaparecieron a medida que los anuncios de concesiones se escuchaban por toda la ciudad."
 france.20.a: "Hicimos lo correcto."
 france.21.t: "Fracasa la operación Serval"
 france.21.d: "Las autoridades francesas anunciaron el fracaso y el fin de la Opération Serval. Las fuerzas combinadas francesas y malienses se encontraron con una oposición inesperada, feroz y organizada de las fuerzas rebeldes y se vieron obligadas a retirarse del norte de Mali, sufriendo graves pérdidas.\n\nLas fuerzas francesas tampoco lograron su objetivo de salvar al presidente de Mali antes del plazo establecido; fue ejecutado y la escasa fuerza moral del Gobierno se desvaneció. Esta operación está siendo estudiada por oficiales de la OTAN para intentar reconstruir qué falló."
 france.21.a: "Un golpe a nuestro prestigio..."
 france.22.t: "Récord de precios del petróleo"
 france.22.d: "La creciente guerra civil en Arabia Saudita ha alcanzado un punto crítico, causando una interrupción generalizada del suministro mundial de petróleo. Ante la avalancha de informes sobre refinerías atacadas y rutas marítimas bloqueadas, Francia se encuentra al borde de una crisis energética. Con una economía fuertemente dependiente del petróleo importado, el país se prepara para las repercusiones: las reservas disminuyen, los precios del combustible se disparan y el descontento público crece. Los ciudadanos salen a las calles ante el aumento del costo de la vida, lo que ejerce una enorme presión sobre el Gobierno para que responda.\n\nEn respuesta a la crisis, el Gobierno comienza a explorar estrategias para la independencia energética. Se convocan reuniones de emergencia para discutir posibles inversiones en energías renovables y la producción nacional de petróleo, junto con esfuerzos diplomáticos para asegurar suministros alternativos de otros países."
 france.22.a: "¡Debemos actuar rápido!"
 france.23.t: "Regionalismo en auge"
 france.23.d: "Tras los disturbios a gran escala en Córcega, muchos ciudadanos franceses han encontrado la noticia angustiosa y se han tomado un momento para reflexionar sobre qué los hace franceses.\n\n\"¿Es el idioma que hablamos? ¿Son las normas culturales que expresamos? ¿O es simplemente que vivimos entre el Rin y los Pirineos?\", preguntó Jean-Philippe Allenbach, líder del Movimiento del Franco Condado, casi extinto hasta hace poco, que aboga por la autonomía -o la libertad- del Gobierno francés en París.\n\nGrupos como el MFC de Allenbach han ido creciendo por toda Francia, especialmente en regiones que tienen -o han tenido- identidades culturales más diferenciadas, como Occitania, Normandía, Bretaña y Alsacia."
 france.23.a: "Autonomía... Se puede ganar."
 france.24.t: "Desarrollo del E-MBT finalizado"
 france.24.d: " "
 france.24.a: "Excelente."
 france.25.t: "Alemania acepta el I+D del E-MBT"
 france.25.d: " "
 france.25.a: "Excelente."
 france.26.t: "Alemania rechaza el I+D del E-MBT"
 france.26.d: " "
 france.26.a: "¡Que así sea!"
 france.27.t: "Fin de la operación Barkhane"
 france.27.d: "Las autoridades francesas han anunciado el fin de la emergencia en Mali. La fuerza combinada francesa y maliense se enfrentó a una oposición inesperada, feroz y organizada, de las fuerzas rebeldes y logró expulsarlas del norte de Mali, obligándolas a adentrarse en el Sáhara.\n\nLas fuerzas francesas también llevaron a cabo con éxito una operación para rescatar al presidente de Mali, liberándolo del yugo rebelde sin pérdidas. Esta operación está siendo estudiada por oficiales de la OTAN y se ha convertido en un ejemplo de cómo se logran operaciones de fuerza de ataque y despliegues rápidos."
 france.27.a: "Un impulso a nuestro prestigio."
 france.28.t: "Se establece gobierno militar"
 france.28.d: "Alrededor de la medianoche de anoche, el presidente, junto con su gabinete, fue arrestado y trasladado a la capital, donde altos oficiales declararon su intención de dar un golpe de Estado al Gobierno. Tras esta declaración, estallaron protestas en la capital, pero fueron rápidamente reprimidas con fuerza militar. Alegando la creciente tensión en África Occidental, el Gobierno aún no ha declarado sus verdaderas intenciones."
 france.28.a: "Saluda a la bandera, idiota."
 france.29.t: "Un Romeo y Julieta de la era moderna"
 france.29.d: "El príncipe Gabriel de Bélgica y Catalina Amalia, heredera del trono de los Países Bajos, han anunciado su fuga al mundo y a las casas reales de Bélgica y los Países Bajos.\nAunque muchos se preguntan qué consecuencias tendrá esto para el creciente separatismo en Flandes y Valonia, ambas familias reales están sin duda conmocionadas por el anuncio."
 france.29.a: "Felicitaciones a ambos."
 france.30.t: "Separatismo creciente en Bélgica"
 france.30.d: "Por todo el país, la barrera invisible que divide nuestra nación se hace cada vez más presente. Con el matrimonio público entre el Príncipe Gabriel y la princesa neerlandesa, Catalina Amalia, crece el número de belgas que se cuestionan su identidad nacional. Si nuestra familia real es neerlandesa, ¿en qué debemos basar nuestra identidad nacional? ¿en el hecho de que hablamos francés?"
 france.30.a: "Problemas en el horizonte."
 france.31.t: "¡Disparan al rey neerlandés!"
 france.31.d: "Hoy, los Países Bajos están de luto tras anunciarse que su rey, Guillermo Alejandro, ¡ha sido asesinado! Durante un evento multitudinario al que asistió el rey, un tirador solitario se acercó lo suficiente a la familia real, permitiéndole descargar unas pocas rondas sobre el rey, impactándole en el pecho. Paramédicos locales declararon al monarca como fallecido casi de forma inmediata, afirmando que los disparos lo mataron casi instantáneamente. El pistolero, tras asesinar exitosamente a Guillermo, fue abatido tras un enfrentamiento con las fuerzas del orden neerlandesas. Según la información disponible hasta ahora, el perpetrador del regicidio fue un anarquista devoto procedente del Caribe Neerlandés quien previamente planeó el asesinato del rey Alejando. La policía e inteligencia neerlandesa han iniciado una exhaustiva investigación acerca del trasfondo del perpetrador así como de posibles sospechosos relacionados con el caso. Estimaciones policiales sugieren que es posible que otro anarquista o individuos extremistas hayan colaborado en la planificación y en la ejecución del asesinato. En respuesta al regicidio, el Gobierno neerlandés ha declarado una semana de luto oficial."
 france.31.a: "La tragedia azota al pueblo neerlandés."
 france.33.t: "Representantes de Flandes se retiran"
 france.33.d: "Tras un pequeño desacuerdo sobre el presupuesto para la Secretaria del Estado de Igualdad de Género, Igualdad de Oportunidades y Diversidad, los representantes de Vlaams Belang, un grupo separatista proneerlandés, abandonaron el parlamento flamenco. Fuera de este, el líder del partido, Tom van Grieken, declaró la intención del partido de escindir Flandes del Gobierno belga. Teniendo la mayoría de escaños de la región de Flandes, esta petición ha incitado al Gobierno neerlandés, liderado por la joven reina Catalina Amalia, a declarar su apoyo a los parlamentarios flamencos."
 france.33.a: "Una puñalada por la espalda..."
 france.32.t: "Disolución de Bélgica"
 france.32.d: "Siguiendo la retirada de casi la totalidad del parlamento flamenco, varios en el parlamento valón han aceptado la propuesta separatista, citando que ellos simplemente no pueden forzar a los nacionalistas flamencos a formar parte de un país al que no quieren pertenecer."
 france.32.a: "Y una vez más, un tronco se añade a la pila.."
 france.34.t: "Valonia declara una República"
 france.34.d: "Tras la aplastante victoria en las elecciones, la Rassemblemente Walloine France (RWF), con poderes casi dictatoriales, ha anunciado la disolución de la monarquía belga y el establecimiento de una república secular.\n\nTras esto, la antigua familia real belga huyó al Reino Unido, a pesar de que les prometieron que ni ellos ni sus propiedades no sufrirían daño alguno en el proceso de formación del Gobierno."
 france.34.a: "Otra cadena belga rota."
 france.35.t: "La República Valona pide la anexión"
 france.35.d: "Con una economía en declive y el impopular derrocamiento de la monarquía belga, el Gobierno de Valonia ha solicitado la unificación entre los Gobiernos francés y valón, citando el colapso del control del Gobierno belga. Inicialmente opuestos a la anexión, el Gobierno alemán únicamente ha solicitado que los ciudadanos de la comunidad principalmente germanoparlante de Eupen-Malmedy reciban la doble nacionalidad francesa y alemana, para asegurar que sus necesidades estén cubiertas bajo el nuevo mandato francés en Valonia."
 france.35.a: "¡El rattachismo ha sido un éxito!"
 france.351.t: "Isabel I Coronada"
 france.351.d: "En el corazón de Valonia, se alzaba una iglesia olvidada, con sus paredes, antaño vibrantes, ahora desgastadas por el paso del tiempo. En este santuario abandonado estaba a punto de suceder un acontecimiento extraordinario: la coronación de Isabel I, la tan esperada heredera al trono de Bélgica. Mientras los rayos del sol se filtraban a través de las vidrieras rotas, proyectando un caleidoscopio de colores sobre los bancos destartalados, una silenciosa expectación llenaba el aire.\n\nLos ecos de la historia resonaban cuando Isabel, ataviada con atuendos regio, entró en el santuario olvidado; su presencia inspiraba respeto y admiración entre los oficiales realistas. Con gracia y dignidad, ascendió al estrado improvisado, donde la esperaba una sencilla corona de plata.\n\nEn esa humilde iglesia, donde los fantasmas del pasado se mezclaban con las esperanzas del futuro, Isabel I fue coronada, consagrando su reinado como un faro de resistencia para el pueblo belga. Al alzar la cabeza, la luz se filtró a través del techo roto, iluminando su rostro radiante. A cada paso que daba, las tablas del suelo crujían bajo ella, como si resonaran con el peso de su responsabilidad. Los remanentes realistas de Bélgica habían encontrado a su líder, e Isabel asumió su papel con inquebrantable determinación, lista para guiar a su nación hacia un futuro libre de la tiranía francesa y holandesa."
 france.351.a: "La idea de Bélgica perdura..."
 france.352.t: "¡El Gobierno belga se disuelve!"
 france.352.d: "Bélgica ha caído milagrosamente. Aunque observábamos atentamente la situación interna en Bruselas, nunca esperábamos su disolución en dos repúblicas, pero ha ocurrido, con Valonia y Flandes uniéndose a las esferas francesa y neerlandesa, respectivamente.\n\nEn juego están 100.000 alemanes en el territorio imperial de Eupen-Malmady, lo que ha dejado a nuestro gobierno con una decisión que tomar y un siglo de historia que considerar. Muchos en la AfD exigen que solicitemos su regreso a nuestras tierras, pero esto probablemente perjudicaría las relaciones con nuestros aliados. Se decidió convocar una sesión de emergencia del Bundestag para abordar el asunto. La mayoría de los partidos, en particular el SPD, respaldaron el plan de la AfD de otorgar a la población la doble nacionalidad franco-alemana como símbolo de unidad. Redactaron la propuesta y la enviaron a Francia. La respuesta de París fue positiva, sin alegar ningún motivo para impedir que los habitantes de Eupen decidieran dónde vivir en esta Europa federalizada moderna.\n\nLa ciudad de Bruselas se ha convertido en el primer territorio soberano de todos los europeos. La agitación en Bélgica sigue muy presente, ya que la monarquía se vuelve cada vez más dictatorial a medida que su poder se desvanece, y los rumores de una revolución republicana se extienden por Valonia. Los británicos han protestado por toda esta situación, pero no han tomado ninguna medida para proteger al gobierno belga, una relación que se forjó por primera vez en la época napoleónica."
 france.352.a: "Al menos sacamos algo de esto."
 france.36.t: "¡Rey holandés asesinado!"
 france.36.d: "Una terrible tragedia se ha desatado hoy en los Países Bajos: el rey Guillermo Alejandro, según se informa, ha sido asesinado. Durante un gran evento público al que asistió el rey, un tirador solitario se acercó lo suficiente a la familia real y le disparó varias veces, impactándolo en el pecho. Los paramédicos locales declararon al monarca muerto de inmediato; las heridas de bala en el pecho fueron casi instantáneas. El pistolero, tras asesinar a Alejandro, murió rápidamente en un tiroteo con las fuerzas del orden holandesas. Según la información disponible, el autor era un devoto anarquista del Caribe holandés que planeó asesinar al rey Alejandro de forma preventiva. La policía y los servicios de inteligencia holandeses han abierto una extensa investigación sobre los antecedentes del autor y otros sospechosos vinculados al caso. Las estimaciones policiales actuales predicen la posible participación de otros individuos anarquistas o extremistas en la planificación y preparación del asesinato. El Gobierno holandés ha decretado una semana de luto nacional en respuesta al asesinato del monarca."
 france.36.a: "La tragedia azota los Países Bajos."
 france.37.t: "Cruzando el Rubicón"
 france.37.d: "Paría nunca volvió a ser la misma desde el fin de la guerra. La terrible derrota a  manos de los rusos creó un ambiente deprimente y nihilista que no solo se notaba en la ciudad, si no que también se sentía en todos los miembros del Gobierno nacional. Nadie podía creerlo. Las más altas esferas francesas ahora eran incapaces de hacer nada a causa del miedo y la indecisión. Y además, otros tan aprovechado la oportunidad para \"tomar acciones\" para el \"bien\" del país.\n\nMientras transcurría la mañana en París, cerca del Palacio del Elíseo, se estaba desarrollando una curiosa escena. Normalmente, en las reuniones semanales entre el gabinete y los parlamentarios, únicamente podrías ver los caros coches de los políticos aparcados afuera, pero hoy sería distinto. A primera hora de la mañana, convoyes de vehículos armados y furgonetas resonaban por la zona, ocupando las calles y rodeando el Palacio. Se detuvieron en seco a las puertas del palacio mientras que las puertas traseras de las furgonetas se abrían permitiendo salir a oficiales, soldados y operativos de las fuerzas especiales, todos empuñando FAMAS, de los vehículos. Los cabecillas del grupo, galardonados y condecorados generales, echaron abajo las puertas del edificio y les siguieron otros oficiales y soldados. Los políticos, que estaban de charla en la sala principal, fueron pillados por sorpresa por esta intromisión. Sin saberlo, su hora había llegado.\n\"¡¿Qué demonios está pasando aquí?! ¡¿Qué se supone que significa esto?!\" exclamó uno de los parlamentarios.\n\"Estamos cumpliendo nuestros deberes constitucionales señor\" dijo fríamente el general, \"tenemos órdenes de detener a todos los políticos identificado quienes le han fallado a la nación.\"\nTú - ¡¿qué?! balbuceó incrédulo el parlamentario, \"¡Esto es ridículo! ¡Esto es ilegal! ¡No pueden hacer eso! ¡Esto es alta traición!\n\"Se equivoca señor\" dijo el general empuñando su arma de mano, \"ustedes son los traidores. Usted vendrá conmigo y seguirá al pie de la letra las instrucciones que le proporcionaré. Traicionaron los intereses nacionales, y nosotros nos aseguraremos de que el orden sea restaurado.\" Tras esto, el general le dio órdenes a los soldados detrás suya para tomar el complejo. Ya podrían encargarse de los \"traidores\". Un nuevo orden acaba de nacer en Francia."
 france.37.a: "La suerte está echada."
 france.371.t: "La última bala"
 france.371.d: "Tras una desgarradora guerra civil que nos enfrentó tanto a los nacionalistas en el norte como a los comunistas en el sur, las fuerzas del establecimiento han logrado finalmente asegurar el control sobre el centro de Francia. Nuestra victoria, aunque arduamente conseguida, ha tenido un costo inmenso, dejando nuestras ciudades marcadas y nuestra sociedad fracturada. Al contemplar las secuelas del conflicto, es evidente que nuestra nación necesita con urgencia sanar y reconstruirse. El establecimiento mantiene firme su compromiso de restaurar el orden, defender los valores democráticos y reunir a una población dividida.\n\nCon las amenazas de nacionalistas y comunistas sofocadas, ahora enfrentamos la monumental tarea de reconstruir nuestra nación. Nuestra primera prioridad debe ser restablecer la infraestructura vital, restaurar los servicios públicos y abordar las quejas que alimentaron el conflicto. Debemos lanzar campañas de unidad nacional para sanar las fracturas ideológicas que han dividido a nuestro pueblo, fomentando un espíritu colectivo de cooperación y progreso. Sin embargo, somos muy conscientes de que el potencial de disturbios persiste, y cualquier paso en falso podría reavivar las llamas de la discordia."
 france.371.a: "La libertad está asegurada."
 france.372.t: "La nación, liberada"
 france.372.d: "Tras una lucha implacable contra el establecimiento y los nacionalistas, las fuerzas del pueblo han emergido victoriosas en la guerra civil. Nuestro triunfo marca el amanecer de una nueva era para Francia, donde finalmente echarán raíces los ideales de igualdad, solidaridad y justicia social. El brutal conflicto ha dejado cicatrices en toda la nación, pero de esta agitación construiremos una sociedad que sirva a los intereses de la clase trabajadora, no de las élites. Ha llegado el momento de recuperar nuestro país y asegurar que el poder resida verdaderamente en manos del pueblo.\n\nCon el establecimiento en desorden y los nacionalistas rechazados, ahora enfrentamos la tarea crucial de unir a nuestra sociedad fracturada bajo la bandera del comunismo. Los desafíos que tenemos por delante son significativos, ya que debemos restaurar la infraestructura vital y atender a quienes fueron desplazados por la guerra. Nuestros primeros pasos se centrarán en implementar reformas agrarias, estatizar industrias clave y ampliar los programas sociales para elevar a los marginados. Estamos comprometidos a fomentar un espíritu de cooperación entre los ciudadanos, animándolos a participar activamente en la construcción de su propio futuro."
 france.372.a: "La igualdad está asegurada."
 france.373.t: "Opération: Caesar"
 france.373.d: "Tras una agotadora guerra civil que puso a prueba nuestra determinación, los nacionalistas hemos emergido victoriosos, derrotando de manera decisiva tanto al establecimiento como a las facciones comunistas que amenazaban a nuestra gran nación. Nuestro compromiso inquebrantable con la restauración del orden y el orgullo nacional ha triunfado sobre el caos. Con las regiones del norte aseguradas y la amenaza de insurrección izquierdista sofocada, ahora nos encontramos al mando de una Francia unida, lista para reclamar su destino. Los sacrificios realizados durante el conflicto han forjado un nuevo sentido de identidad entre nuestro pueblo, uno arraigado en la fuerza, la unidad y el patriotismo. \n\nAl tomar el control del Gobierno, nuestra tarea principal es consolidar nuestro poder y asegurar la estabilidad de la nación. Los remanentes del establecimiento y de los comunistas aún acechan, pero no titubearemos. Infundiremos un renovado sentido de propósito en nuestros ciudadanos, fomentando un espíritu de nacionalismo que nos una mientras reconstruimos nuestras ciudades y restauramos nuestra economía. A través de un liderazgo firme y un compromiso con nuestros valores, crearemos una sociedad donde prevalezca el orden y se celebre el verdadero espíritu de Francia."
 france.373.a: "La fraternidad está asegurada."
 france.374.t: "Volt toma el poder"
 france.374.d: "Desde la devastadora derrota en el este, las ondas de choque geopolíticas resultantes han sacudido a Francia hasta lo más profundo. El colapso de la confianza en el Gobierno provocó un auge en los ideales de unidad europea, impulsado por la creencia de que el populismo euroescéptico nos dividió innecesariamente frente al embate ruso. Agrupándose en torno a Christine Lambart, las crecientes manifestaciones de Volt en París estremecieron la escasa legitimidad que le quedaba al Gobierno y se alcanzó un punto de quiebre. Durante un discurso en el que Christine arremetió contra las disputas populistas que impidieron la integración europea, permitiendo que los tiránicos rusos esclavizaran Europa Oriental, la multitud corrió a asegurar puntos clave dentro de París. Con un grito para liberar a Europa de las garras del populismo divisivo, lograron sobrepasar a las fuerzas destacadas para defender el parlamento. Tras horas de enfrentamientos, desertores abrieron las puertas, permitiendo que la multitud irrumpiera y con ella, Christine Lambart fue proclamada como la nueva jefa de Estado de Francia. Aunque algunos han condenado a Volt Europa por su audaz y antidemocrática toma del poder, muchos los ven como la única esperanza para restaurar la estabilidad interna y, además, el propio honor de Francia y de una Europa unida. Sueñan con una Europa unificada, capaz de enfrentar al oso y liberar al este de la tiranía."
 france.374.a: "¡Europa no se salvará con la paz!"
 france.374.b: "¡Nuestro único enemigo es la ignorancia!"
 france.374.c: "¡Solo una Europa unida puede salir victoriosa!"
 france.379.t: "Un sentimiento de seguridad inmerecido"
 france.379.d: "En nuestro intento por salvar a Francia, hemos sacrificado mucho. ¿Nuestra República? Aplastada en nombre de la estabilidad. ¿Nuestra imparcialidad ideológica? Reemplazada por el favoritismo político con la esperanza de crear un frente unido en pos de la paz. Nos parece que tal vez todo esto valió la pena: las calles están vacías, los clamores por el cambio han cesado. A pesar de ello, la gente no ha vuelto al trabajo, y recibimos informes de que aquellos que desean reducir a cenizas lo que queda de Francia simplemente se han ido a la clandestinidad. Esperemos que esto sea solo temporal, porque al fin y al cabo, solo un necio sumiría a la nación en una guerra civil en su hora más crítica. ¿Qué sentido tiene intentar salvar a Francia si no depositamos fe alguna en su pueblo?"
 france.379.a: "Nuestra fe en Francia debe mantenerse."
 france.38.t: "La lucha comienza"
 france.38.d: "La frágil paz en Francia se hace añicos mientras los primeros disparos de la guerra civil resuenan por las calles. Lo que comenzó como tensiones latentes entre el establecimiento, los nacionalistas y los comunistas ha estallado en un conflicto abierto. En las primeras horas de la mañana, estallan enfrentamientos armados en múltiples ciudades, mientras las facciones toman las calles, cada una luchando por el control y la influencia sobre el futuro de la nación. La atmósfera está cargada de caos e incertidumbre, mientras los ciudadanos buscan refugio y los gritos de los heridos llenan el aire.\n\nLlegan informes de escaramuzas entre las fuerzas gubernamentales y milicias nacionalistas en el norte, mientras que los grupos comunistas se movilizan en el sur, desatando una feroz batalla por el territorio y la ideología. Mientras el Gobierno se apresura a responder, queda claro que las promesas de estabilidad se han roto. Las calles que alguna vez resonaron con optimismo ahora están llenas de disparos y desesperación, marcando el inicio de una lucha brutal que pondrá a prueba el mismo tejido de la nación."
 france.38.a: "Dios salve a Francia..."
 france.39.t: "Guerra por la Unificación de los Países Bajos"
 france.39.d: "A la sombra de la guerra civil en Francia, se avecina una tormenta en los Países Bajos. En medio del caos, el Reino de los Países Bajos, firme en sus tradiciones reales y parlamentarias, enfrenta un desafío sin precedentes de dos adversarios formidables: un resurgente Reino de Bélgica, que busca recuperar su gloria histórica bajo su Reina, y la Unión de los Bajos, una coalición comunista radical que surge desde el corazón de Luxemburgo. El ambiente está cargado de tensión mientras cada facción intenta redefinir la identidad misma de los Países Bajos.\n\nLa guerra estalló inesperadamente, desencadenada por un enfrentamiento en la frontera del antiguo territorio francés de Valonia y los Países Bajos. El fervor nacionalista recorre las calles de Bruselas mientras los ciudadanos se unen bajo el llamado a la unidad y el orgullo, coreando por el retorno a una Bélgica mayor. Por toda la región, la Unión de los Bajos aprovecha el momento, convocando a un levantamiento pan-bajolandés para liberar a los trabajadores oprimidos y establecer un Gobierno que refleje sus ideales radicales. A medida que el conflicto se intensifica, el fervor ideológico alimenta las llamas de la batalla, y las ciudades pacíficas de los Países Bajos se transforman en zonas de guerra.\n\nAtrapados entre viejas rencillas históricas y un celo revolucionario, los civiles se ven desgarrados por el conflicto. Familias divididas, lealtades puestas a prueba y comunidades devastadas mientras las batallas se libran por ciudades clave y puntos estratégicos."
 france.39.a: "Un duelo de ideologías."
 france.40.t: "Alsacia promete lealtad"
 france.40.d: "Mientras la nación se desmoronaba en una violenta guerra civil, la región de Alsacia, bajo el pretexto de contener posibles incursiones desde el este, se separó del Gobierno nacional. Al prepararnos para reunificar Francia bajo nuestro estandarte, el tema de cómo reintegrar a Alsacia ha dividido a nuestro Gobierno. Afortunadamente, sin importar nuestros planes ante una posible insubordinación, los alsacianos han anunciado su intención de reincorporarse a nuestra nación, poniendo finalmente fin a la división que hemos sufrido como hermanos franceses. Ahora que nuestra situación interna se ha estabilizado, por fin podemos mirar hacia la reconstrucción y reforma del país a nuestro modo. Finalmente, podemos encaminar a Francia por un sendero que le permita reclamar sus glorias pasadas, a pesar del vergonzoso revés de la Guerra Europea."
 france.40.a: "Juntos somos fuertes"
 france.41.t: "Llegada de los voluntarios franceses"
 france.41.d: "En medio del caos y la devastación de la Providence destrozada por la guerra, la llegada de la brigada voluntaria francesa «Napoleón» ha sido recibida con júbilo por el Frente Patriota. Liderada por un individuo enmascarado conocido como «Lafayette», la llegada de la brigada ha insuflado un nuevo fervor en las filas del Frente Patriota. Los voluntarios, inspirados en el legado de Napoleón Bonaparte, han sido aclamados como salvadores por los atribulados miembros del Frente.\n\nMientras la brigada marcha por las calles de Providence, son recibidos con vítores y aplausos de la población local. Banderas con la imagen de Napoleón y las palabras «Vive la Révolution!» ondean al viento, mientras los voluntarios son acogidos como héroes. La llegada de la brigada «Napoleón» ha fortalecido la moral del Frente Patriota, recordándoles tanto sus ideales compartidos y la determinación de luchar por su causa, como la noble causa de Washington y sus aliados franceses durante la primera Guerra Revolucionaria."
 france.41.a: "Lafayette regresa."
 france.411.t: "Llegada de los voluntarios franceses"
 france.411.d: "En medio de los escombros y ruinas de la San Francisco devastada por la guerra, la llegada de la brigada voluntaria francesa «Robespierre» ha sido recibida con júbilo y celebración. Las calles, antes llenas de sonidos de destrucción, ahora resuenan con vítores y aplausos mientras los voluntarios son recibidos como héroes. La dedicación de la brigada a la causa comunista y su disposición para luchar junto a sus aliados estadounidenses les ha ganado la admiración y el respeto de la población local.\n\nMientras los voluntarios marchan por la ciudad, son recibidos con pancartas y banderas, y los espectadores saludan y vitorean desde ventanas y azoteas. La llegada de la brigada ha traído un sentimiento de esperanza y solidaridad a San Francisco, recordando a sus habitantes que no están solos en su lucha. La presencia de la brigada sirve como símbolo de solidaridad internacional y del espíritu perdurable de revolución que trasciende fronteras."
 france.411.a: "¡Una bienvenida revolucionaria!"
 france.412.t: "Llegada de los voluntarios franceses"
 france.412.d: "En una impactante muestra de solidaridad internacional, la brigada francesa de voluntarios \"Rochambeau\" recibió una cálida bienvenida del presidente Biden en Washington D.C. El compromiso de la brigada con el liberalismo social y los valores democráticos ha resonado entre los líderes estadounidenses, quienes consideran su llegada un símbolo de esperanza y unidad. El presidente Biden, flanqueado por miembros de su administración, recibió a los voluntarios con los brazos abiertos, agradeciéndoles su valentía y dedicación a la causa de la libertad.\n\nMientras la brigada marchaba por las calles de Washington D.C., fueron recibidos con vítores y aplausos de la población local. Pancartas con el lema \"¡Libertad, igualdad, fraternidad!\" ondeaban al viento, mientras los voluntarios eran aclamados como héroes. La llegada de la brigada \"Rochambeau\" ha traído un sentimiento de optimismo y camaradería a la capital, recordando a los estadounidenses sus valores compartidos y la importancia de permanecer unidos ante la adversidad."
 france.412.a: "¡Aliados de la Libertad, unidos!"
 france.410.t: "Voluntarios franceses parten hacia América"
 france.410.d: "En medio del tumulto de la Segunda Guerra Civil Americana, un contingente significativo de soldados franceses y activistas juveniles ha emprendido un viaje hacia América, impulsados por un ferviente deseo de apoyar a sus aliados ideológicos en el conflicto. Este diverso grupo de voluntarios incluye liberales, comunistas y fascistas por igual. La llegada de estos voluntarios franceses ha inyectado nueva energía en el campo de batalla estadounidense, destacando la dimensión internacional del conflicto. Al unirse a la lucha, estos voluntarios traen consigo una mezcla de idealismo, determinación y una profunda convicción en la justicia de sus causas. Su presencia subraya la compleja y multifacética naturaleza de la Segunda Guerra Civil Americana, así como el atractivo perdurable de los ideales revolucionarios que trascienden fronteras."
 france.410.a: "Revocar su ciudadanía."
 france.42.t: "Disturbios masivos por las pensiones"
 france.42.d: "En una jugada audaz, el Gobierno, bajo la presidencia de Macron, ha propuesto una controvertida reforma de las pensiones que busca elevar la edad de jubilación y reestructurar los beneficios para enfrentar los desafíos fiscales del país. El anuncio, realizado en medio de promesas de recuperación económica y modernización, desata rápidamente la indignación en toda la nación. Al percibirse los cambios propuestos como un ataque a los derechos laborales ganados con esfuerzo, ciudadanos de todos los sectores salen a las calles, dando lugar a protestas y disturbios masivos que sacuden los cimientos mismos de la sociedad francesa.\n\nLas manifestaciones iniciales comienzan de manera pacífica, con sindicatos reuniendo a miles de trabajadores, estudiantes y jubilados en ciudades importantes como París, Lyon y Marsella. Sin embargo, a medida que aumentan las tensiones y los enfrentamientos con la policía se vuelven más frecuentes, las protestas derivan en violencia. Se levantan barricadas y los cánticos por justicia se transforman en gritos de revolución. El Gobierno, sorprendido por la escala e intensidad del descontento, responde con tácticas represivas, avivando aún más la situación y atrayendo críticas tanto nacionales como internacionales."
 france.42.a: "SON SOLO DOS AÑOS."
 france.43.t: "Los revolucionarios se levantan en el Benelux"
 france.43.d: "A medida que la Guerra por la Unificación de los Países Bajos escala, la turbulencia en la región del Benelux envía ondas de choque por toda la zona. En medio de este caos, los ideales del comunismo comienzan a ganar terreno, encendiendo una ola de fervor revolucionario entre la clase trabajadora. Inspiradas por el conflicto en curso y las promesas radicales de la Unión de los Bajos, diversas facciones comunistas emergen de las sombras en Bélgica, los Países Bajos y Luxemburgo, convocando a ciudadanos desilusionados a su causa.\n\nEstallan protestas en las principales ciudades, mientras trabajadores y estudiantes se suman a las banderas del comunismo, exigiendo el fin de las desigualdades sociales y el establecimiento de un Gobierno que realmente represente sus intereses. Con el fervor nacionalista en Bélgica y los Países Bajos desviando la atención de los problemas sociales urgentes, el movimiento comunista capitaliza el descontento, llamando a la solidaridad entre los oprimidos. Huelgas y manifestaciones se vuelven cada vez más comunes, ya que la población empieza a vislumbrar el potencial de un Benelux unido y socialista que podría desafiar el orden establecido."
 france.43.a: "Vive d'Revolutioun."
 france.431.t: "Anexión de Bruselas"
 france.431.d: "En medio de la escalada de la Guerra por la Unificación de los Países Bajos, ha llegado el momento para que los Países Bajos reclamen su legítima influencia sobre Bruselas, el corazón de los Países Bajos. El Territorio Libre de la UE, establecido tras la caótica división de Bélgica, se ha convertido en un foco de inestabilidad, y no podemos quedarnos de brazos cruzados mientras el caos reina. Nuestro gobierno ha tomado la decisión definitiva de anexar Bruselas, afirmando que solo el liderazgo neerlandés puede restaurar el orden y garantizar la seguridad de sus ciudadanos.\n\nMientras nuestras fuerzas se movilizan rápidamente para asegurar la ciudad, enfatizamos nuestro compromiso de proteger al pueblo de Bruselas de la creciente marea de nacionalismo y comunismo que amenaza con envolver la región. Creemos que esta audaz acción no solo traerá estabilidad a Bruselas, sino que también reafirmará nuestra posición como líder en los Países Bajos. La anexión se presenta como un paso necesario hacia la unificación, una oportunidad para crear unos Países Bajos más fuertes y cohesionados que puedan resistir los desafíos planteados tanto por fuerzas externas como internas."
 france.431.a: "Europa debe ser protegida..."
 france.44.t: "Propuesta de Presupuesto Militar Pan-Mediterráneo"
 france.44.d: "En respuesta a las crecientes tensiones geopolíticas en el Mediterráneo, Francia ha propuesto el establecimiento de un Presupuesto Militar Pan-Mediterráneo, invitando a Italia y España a colaborar en el fortalecimiento de la seguridad regional. Esta iniciativa busca unificar los esfuerzos de defensa frente a amenazas emergentes, como la piratería, el crimen organizado y las agresiones externas que desestabilizan la zona. Los funcionarios franceses enfatizan que un enfoque colectivo en la financiación militar mejorará las capacidades, agilizará las operaciones y fomentará una cooperación más profunda entre las naciones mediterráneas. A medida que comienzan las discusiones, la propuesta genera un debate entre los Estados miembros, con partidarios que resaltan los beneficios de la unidad, mientras que los críticos expresan preocupaciones sobre la soberanía nacional y el posible aumento en el gasto militar."
 france.44.a: "Una carga repartida por igual."
 france.45.t: "Auge de la ultraderecha"
 france.45.d: "En un discurso provocador que resonó en toda la nación, Marine Le Pen declaró con valentía que la Unión Europea es inútil, llamando a un regreso a la soberanía nacional y a la prioridad de los intereses franceses por encima de las restricciones burocráticas. Sus palabras calaron hondo entre los ciudadanos desilusionados que se sienten marginados por las políticas de la UE y los crecientes desafíos económicos. A medida que su mensaje gana terreno, las concentraciones y protestas organizadas por grupos de ultraderecha aumentan en tamaño, congregando a miles que comparten su visión de una Francia liberada del control europeo.\n\nEl discurso actuó como un catalizador, despertando un renovado entusiasmo entre las facciones de ultraderecha que comienzan a organizarse con mayor agresividad. Las campañas en redes sociales amplifican su retórica, culpando a la UE de todo, desde la estancación económica hasta los problemas migratorios. Las encuestas indican un aumento significativo en el apoyo al partido de Le Pen, mientras muchos ciudadanos, frustrados con la política tradicional, buscan soluciones alternativas que prometen recuperar el orgullo nacional y el control."
 france.45.a: "El establishment liberal lo verá..."
 france.45.b: "¡Esto es inaceptable!"
 france.46.t: "Formación del Nuevo Frente Popular"
 france.46.d: "En respuesta al alarmante ascenso de la ultraderecha bajo la influencia de Marie Le Pen, una coalición de partidos izquierdistas, centristas y progresistas han unido fuerzas para formar el Nuevo Frente Popular. Esta alianza busca unir a diversas facciones políticas que se enfrentan al creciente nacionalismo y la xenofobia que amenaza con acabar con los valores democráticos y la estructura social de Francia. Distintos líderes de distintas y variadas ideologías enfatizan la defensa de la solidaridad en la defensa de los derechos civiles, la justicia social y el lugar de Francia dentro de la Unión Europea.\n\nEl Nuevo Frente Popular rápidamente se puso en marcha, organizando mítines y campañas para hacer frente a la retórica de ultraderecha que ha logrado captar a muchos ciudadanos desilusionados. Abogan por políticas inclusivas, la igualdad económica y una reformada estrategia cooperativa dentro de la UE que priorice las necesidades del pueblo francés sin renunciar a los beneficios de la membresía. Con su mensaje resonando en una audiencia cada vez mayor, el apoyo de la coalición va aumentando, suponiendo un desafío significativo para Le Pen y sus aliados."
 france.46.a: "¡La izquierda se alzará!"
 france.46.b: "LARP de manual..."
 france.47.t: "El Nuevo Frente Popular escoge a un candidato"
 france.47.d: "Mientras el Nuevo Frente Popular se prepara para las próximas elecciones, los líderes de los partidos se han reunido para seleccionar su candidato para hacerle frente a la ultraderecha y unir al movimiento progresista. En una atmósfera cargada de expectativas, tres figuras destacan como candidatos para liderar el movimiento: Jean-Luc Mélenchon, Oliver Faure y el punto medio, François Ruffin.\n\nJean-Luc Mélenchon, un político experimentado, es el líder de la Francia Insumisa y es conocido por su vehemente retórica y sus políticas de izquierda radical. Su programa político incluye propuesta para una redistribución de la riqueza, sustentabilidad medioambiental y una fuerte postura anti-austeridad. Mélenchon apela a la base del partido con su visión de una Francia transformada, pero su estilo polarizador le ha acarreado críticas incluso desde la propia coalición.\n\nOliver Faure, el líder del Partido Socialista, representa una postura más moderada, enfatizando la necesidad de una estrategia pragmática para abordar los desafíos que enfrenta Francia. Aboga por la justicia social, el crecimiento económico vía inversiones y un compromiso renovado con la cooperación europea. Faure busca dejar de lado las diferencias dentro de la coalición y presentar un frente unido para los votantes.\n\nFrançois Ruffin emerge como el punto medio, recibiendo apoyo tanto de la izquierda radical como de las facciones más centristas. Periodista y productor de documentales, Ruffin es conocido por su activismo de base y su habilidad de conectar con el francés de a pie. Para él, las cuestiones claves son los derechos de los trabajadores, los servicios públicos, y el medio ambiente, ofreciendo una perspectiva actual que resuena con una mayor masa de votantes."
 france.47.a: "¡Jean-Luc Melenchon!"
 france.47.b: "¡Olivier Faure!"
 france.47.c: "¿Qué hay de un punto medio? ¡François Ruffin!"
 france.48.t: "El Nuevo Frente Popular se... ¡hace popular!"
 france.48.d: "As the political landscape continues to shift in the wake of rising far-right sentiments, the New Popular Front experiences an unprecedented surge in popularity. Energized by a series of successful rallies, impactful social media campaigns, and a unifying message that resonates with a diverse electorate, the coalition captures the attention and support of disillusioned citizens across France. Their commitment to social justice, inclusivity, and democratic values stands in stark contrast to the divisive rhetoric of the far-right. \n\nThe coalition's newfound momentum is further bolstered by effective communication strategies that highlight their candidates' grassroots connections and shared vision for a fairer society. Polls show a significant increase in support, with citizens flocking to their events, eager to engage and discuss pressing issues such as economic inequality, climate change, and immigration reform. The New Popular Front successfully frames itself as the voice of the people, advocating for policies that prioritize the welfare of ordinary citizens over elite interests."
 france.48.a: "Inesperado."
 france.49.t: "Referendo Constitucional Republicano"
 france.49.d: "Ha llegado el momento para que el pueblo francés decida el futuro de su República. Tras años de conflictos políticos y descontento social, el Gobierno ha convocado un referendo para establecer la Sexta República. Los ciudadanos se encuentran divididos entre dos visiones: una constitución moderada, diseñada para fortalecer las instituciones democráticas y garantizar la estabilidad mediante reformas graduales, y una constitución radical que busca transformar el panorama político con medidas audaces y una democracia directa ampliada.\n\nLos partidarios de la opción moderada sostienen que ofrece un enfoque equilibrado, prometiendo abordar las desigualdades económicas mientras preserva los derechos existentes y fomenta la colaboración a lo largo del espectro político. En contraste, los defensores de la constitución radical aseguran que solo cambios profundos pueden enfrentar eficazmente los problemas arraigados que aquejan a la nación, pese a los riesgos de posibles disturbios. Mientras la nación contiene la respiración, el resultado de este referendo moldeará el futuro de Francia: ¿elegirán los ciudadanos la estabilidad o abrazarán una audaz nueva dirección?"
 france.49.a: "¡Seamos audaces!"
 france.49.b: "La estabilidad es importante."
 france.50.t: "Crisis argelina"
 france.50.d: "Con el crecimiento de las tensiones en Argelia, el país ha caído en una guerra civil, en la que el Gobierno debe enfrentar a numerosas facciones rebeldes. Este conflicto puede potencialmente desestabilizar la región y llevar a un resurgimiento del descontento en la propia Francia. Nos hacemos la pregunta: ¿Debería Francia intervenir enviando voluntarios al nuevo Gobierno republicano, o debería permanecer neutral y evitar interferir en los asuntos argelinos en el futuro?"
 france.50.a: "Ofrecer voluntarios."
 france.50.b: "No es nuestra guerra"
 france.51.t: "Tratado de Marsella"
 france.51.d: "Tras meses de brutal conflicto entre Marruecos y Argelia, ambas naciones se encuentras exhaustas de la guerra. Las escaramuzas a lo largo de la frontera han resultado en bajas significativas y la población civil sufre el impacto económico de la guerra prolongada. Reconociendo la urgente necesidad de paz, Francia se ha ofrecido como mediadora, alegando a los lazos históricos y su influencia en la región.\n\n Buscando acelerar el diálogo, Francia ha organizado una reunión crucial en Marsella, invitando representantes de ambos Gobiernos para discutir los términos de un posible tratado de paz. El ambiente era tenso, con odio acumulado y orgullo nacional puesto en escena. Sin embargo, ambas partes se están dando cuenta de que el mantenimiento de las hostilidades puede desestabilizar todo el Norte de África, dando pie al escrutinio internacional y a una posible intervención.\n\nEl tratado propuesto busca abordar las cuestiones clave: Las disputas territoriales, el retorno de los refugiados y la cooperación económica. Si las negociaciones son exitosas, no solo puede poner fin al conflicto si no que pueden sentar las bases para una era de cooperación entre las dos naciones. Mientras se desarrollan las negociaciones, el mundo mira atentamente, deseoso de una resolución pacífica que beneficie a todas las partes involucradas."
 france.51.a: "Francia fuerza una paz blanca"
 france.51.b: "Argelia demanda el reconocimiento de la RASD"
 france.51.c: "Marruecos demanda un estado Tuareg independiente"
 france.512.t: "Francia amenaza con intervenir"
 france.512.d: "Mientras la guerra entre Marruecos y Argelia continúa, las consecuencias humanitarias y políticas se vuelven cada día más graves. Los informes de bajas civiles y poblaciones desplazadas se acumulan, pintando un cuadro sombrío del costo del conflicto. La comunidad internacional está cada vez más preocupada, y los países vecinos temen que la guerra pueda desbordarse más allá de sus fronteras.\n\nEn una conferencia de prensa, el ministro francés de Asuntos Exteriores declaró: \"Si Marruecos y Argelia se niegan a reunirse y entablar un diálogo significativo, Francia se verá obligada a considerar una intervención para restablecer la paz y proteger nuestros intereses en la región.\" El mensaje resuena tanto en París como en las capitales de Marruecos y Argelia, donde los líderes ahora enfrentan una difícil decisión: continuar la lucha o atender el llamado francés a la paz."
 france.512.a: "Dejemos claras nuestras metas."
 france.513.t: "Llamados a la Paz"
 france.513.d: "A medida que el conflicto entre Marruecos y Argelia se intensifica, el impacto sobre los civiles se vuelve cada vez más grave. Los informes de víctimas, familias desplazadas y una economía tambaleante alimentan la indignación pública. En ciudades de ambos países, los ciudadanos salen a las calles exigiendo el fin de la violencia y el retorno a la diplomacia.\nEstallan protestas en grandes centros urbanos como Argel y Rabat, donde los manifestantes corean consignas por la paz y llaman a sus Gobiernos a priorizar el diálogo por sobre la guerra. Las redes sociales amplifican sus voces y organizaciones de base se movilizan, uniendo a personas de diferentes orígenes en un deseo común de poner fin al sufrimiento.\n\nEn medio de estas manifestaciones, los líderes de ambos países enfrentan una creciente presión para atender las preocupaciones de sus ciudadanos. Sin embargo, las facciones más duras dentro de cada gobierno observan estas protestas con recelo, temiendo que los llamados a la paz puedan debilitar su autoridad y objetivos."
 france.513.a: "¡Disparen más fuerte!"
 france.514.t: "Mediador del Norte de África"
 france.514.d: "Se ha solicitado tanto por el Gobierno marroquí como por el argelino que supervisemos el establecimiento de un armisticio entre ambas naciones tras un aumento de la violencia en ambos bandos."
 france.514.a: "Apoyemos a los argelinos"
 france.514.b: "Apoyemos a los marroquíes"
 france.52.t: "Francia envía voluntarios"
 france.52.d: "Ante la guerra civil en curso, Francia ha expresado su disposición a apoyar a Argelia en su lucha por la libertad. Reconociendo los valores compartidos de democracia y progreso social, el gobierno francés está preparado para enviar fuerzas voluntarias para asistir al gobierno argelino.\n\nSin embargo, la oferta generará reacciones encontradas en Argelia. Mientras algunos ven la ayuda como un paso necesario hacia la estabilidad, otros desconfían de la intervención extranjera, recordando el pasado colonial de Argelia. La decisión del Gobierno tendrá profundas implicaciones para la soberanía nacional y el sentimiento popular."
 france.52.a: "Estamos eternamente en deuda con ustedes."
 france.52.b: "No nos asociaremos con colonizadores."
 france.53.t: "¿Intervención en Argelia?"
 france.53.d: "Tras el firme rechazo de Argelia a las fuerzas voluntarias francesas, el ambiente en Francia ha cambiado drásticamente. Las facciones de derecha y los líderes militares se manifiestan cada vez más abiertamente sobre su descontento con el enfoque del Gobierno ante la crisis. Argumentan que la situación en Argelia representa una amenaza directa para los intereses franceses y la estabilidad regional.\n\nEn un mitin organizado por grupos nacionalistas, los oradores defienden con pasión el establecimiento de un protectorado francés sobre Argelia. Su mensaje resuena en un sector del público, generando debates generalizados sobre la identidad nacional, el legado colonial y las responsabilidades de Francia hacia sus antiguas colonias.\n\nA medida que crece la presión, el Gobierno debe decidir cómo responder a estos llamados a la intervención. La perspectiva de una campaña militar se perfila como una posibilidad real, y las implicaciones de tal decisión podrían redefinir la política exterior y el panorama interno de Francia durante años."
 france.53.a: "¡Nos han negado nuestro destino!"
 france.53.b: "¡No podemos invadir abiertamente!"
 france.531.t: "Finiquitación de las fronteras"
 france.531.d: ""
 france.531.a: "Entonces esta decidido"
 france.54.t: "Apoyando a un sucesor árabe"
 france.54.d: "El establishment saudita, con su base en valores conservativos y buenos lazos con los países occidentales, apela a Francia por apoyo. Ellos argumentan que el apoyo a la monarquía es esencial para mantener los intereses económicos en la región, particularmente en el sector petrolero, y para contrarrestar facciones extremistas que amenazan la estabilidad de ambos Arabia Saudita y el medio oriente.\n\nEn el lado opuesto, la Republica Árabe busca reformas progresistas, advocando por un Gobierno democrático y cambio social. Buscan remodelar Arabia Saudita en un Estado más inclusivo y moderno, resonando con los valores ideológicos franceses de la libertad y igualdad. Eso si, su ascenso podría provocar una reacción negativa de los elementos conservadores y estabilizar la región aún más.\n\nFrancia debe elegir si alinearse con la opción pragmática de apoyar a la monarquía o seguir su postura ideológica y respaldar a la republica."
 france.54.a: "Apoyar a la República."
 france.54.b: "Apoyar a la Casa de Saúd."
 france.55.t: "Pacto de Unificación Naval Mediterránea"
 france.55.d: "En respuesta a las crecientes tensiones en el Mediterráneo, causadas por el incremento de las actividad naval por parte de potencias rivales, Francia, Italia y España han empezado a discutir sobre como mejorar su seguridad marítima. Reconociendo la necesidad de una respuesta conjunta para proteger sus intereses, las tres naciones han acordado formar el Pacto de Unificación Naval Mediterráneo.\n\nEste pacto busca estandarizar las operaciones navales, perfeccionar los ejercicios conjuntos y compartir recursos para reforzar su capacidad marítima colectiva. Los líderes de cada país creen que una estrategia naval coordinada no solo mejorará la seguridad en la región, sino que también estrechará los lazos entre las tres naciones."
 france.55.a: "Unirse al Pacto."
 france.55.b: "Rechazar el Pacto."
 france.56.t: "Armas francesas llegan a Nigeria"
 france.56.d: "El cargo de armas a Nigeria paso desapercibido por fuerzas islamistas, y ha sido recibido por el ejército Nigeriano."
 france.56.a: "Quema las boletas..."
 france.56.b: "El extremismo debe ser purgado."
 france.57.t: "Cargamento de armas francés incautados por insurgentes islamistas"
 france.57.d: "Tras recibir información errónea, un agente encubierto francés fue asesinado y la información que él poseía fue usada para encontrar y tomar un cargamento de armas francés y cazas a reacción."
 france.57.a: "¡Usen las armas de los infieles contra ellos!"
 france.57.b: "Un fracaso por parte de nuestra inteligencia"
 france.58.t: "Propagandistas islámicas capturados por fuerzas francesas"
 france.58.d: "Un puñado de Boinas Verdes Francesas han atrapado a múltiples propagandistas islámicos y reclutadores."
 france.58.a: "¡Lo pagarán!"
 france.58.b: "Decapitar una serpiente lleva tiempo..."
 france.59.t: "Mercenarios franceses capturados y ejecutados por fuerzas islamistas"
 france.59.d: "Un puñado de Boinas Verdes Francesas retirados fueron capturados tras intentar sin éxito asesinar a figuras destacadas."
 france.59.a: "¡Un día victorioso!"
 france.59.b: "Negar, negar, negar..."
 france.60.t: "Walid Abu Sarhaoui es abatido en una redada del ejército nigeriano"
 france.60.d: "Tras asaltar una casa en Abuya, fuerzas nigerianas han informado de la muerte de Walid Abu Sarhaoui, destacado líder de las fuerzas islamistas en Nigeria."
 france.60.a: "Los débiles deben perecer para que los fuertes puedan progresar"
 france.60.b: "Caballeros... Salud."
 france.61.t: "46 civiles fallecen tras el cerco de un líder islamista"
 france.61.d: "Walid Abu Sarhaoui murió tras hacer estallar múltiples explosivos que volaron una calle entera de Abuya. Previo a la explosión, se rumoreaba que fuerzas francesas y nigerianas estaban intentando entrar en el complejo en la mañana previa a la explosión."
 france.61.a: "Un sacrificio que fue necesario"
 france.61.b: "La participación francesa fue mínima"
 france.62.t: "incrementa la cooperación entre grupos terroristas islámicos"
 france.62.d: "Nos llegan preocupantes noticias del Sáhara, pues múltiples grupos terroristas ligados al EIIS han anunciado una colaboración más estrecha para hacer frente a la intervención extranjera. Bajo el liderazgo de afines locales al EIIS, las células terroristas islámicas ahora están mucho más coordinadas respecto a la situación previa, donde muchas actuaban de forma independiente. Esta cooperación forma parte de los renovados esfuerzos del EIIS para cimentar su presencia en la región y para revitalizar su insurgencia contra los Gobiernos locales y las fuerzas de coalición de la OTAN. Los servicios de inteligencia de la OTAN ya han emitido varias advertencias sobre las implicaciones del EIIS y su recientemente unificadas fuerzas en África Occidental. Los analistas apuntan que esta nueva coalición liderada por el EIIS causarán aún más problemas a las fuerzas antiterroristas de la OTAN en la región."
 france.62.a: "¡Más soldados!"
 france.62.b: "¿Puede tener África siquiera un respiro?"
 france.63.t: "¡Líder del EI de África Occidental promete venganza tras el asesinato!"
 france.63.d: "El día de hoy nos han llegado terribles noticias de África pues él líder del EIIS en África Occidental, Abou Mosab al-Barnaoui, ha anunciado la intención de vengarse de Francia por el asesinato de su mano derecha, Adnan Abu Walid Al Sahraoui. Francia ha estado combatiendo el terrorismo islámico en África Occidental, especialmente aquellos afiliados al EIIS, durante años. En los últimos años, grupos afiliados al EIIS como Boko Haram han contribuido a una variedad de conflictos y a la violencia que asola a la región. Los esfuerzos de Francia y de países aliados de la OTAN para aplastar a los grupos terroristas afiliados al EIIS han disparado las alarmas de represalias llevadas a cabo por posibles extremistas que hayan inmigrado a Europa continental. Los servicios de inteligencia franceses han anunciado públicamente que los ciudadanos franceses tanto en casa como en el extranjero deben estar más alerta que nunca ante posibles actividades terroristas. Está por ver si las amenazas de Barnaoui darán lugar a una respuesta real por sus seguidores."
 france.63.a: "Su sacrificio no será en vano..."
 france.63.b: "Su brutalidad no conoce límites..."
 france.64.t: "¡Atentado con explosivos en la catedral de Notre-Dame!"
 france.64.d: "Nos llegan noticias trágicas de Francia, pues el día de hoy, ¡la mundialmente conocida catedral de Notre Dame ha sido blanco de un atentado con explosivos! A primera hora de esta mañana, ciudadanos franceses por redes sociales y los noticieros locales reportaron una fuerte explosión. Poco después, los franceses se dieron cuenta de que uno de los monumentos más famosos de la capital, la catedral de Notre Dame, había, según los testigo, \"volado por los aires\". La escala de la destrucción no tiene precedentes, pues la explosión acabó con prácticamente toda la fachada, el interior, y la totalidad del techo, habiendo aguantado únicamente los muros. Afortunadamente, las fuerzas de la ley francesas tras acordonar todo el perímetro y averiguaron el \"modus operandi\" del atentado: Un improvisado pero masivo coche bomba. Terroristas afiliados al EIIS de África Occidental han reivindicado el ataque, citando la muerte de uno de sus principales comandantes Adnan Abu Walid Al Sahraou, como la motivación principal. El presidente francés ha proclamado el estado de emergencia y la movilización de todas las unidades de la fuerzas de la ley y de la Guardia Nacional disponibles para garantizar la seguridad de París y las otras principales ciudades. La OTAN, la inteligencia francesa y las fuerzas de la ley han iniciado una exhaustiva y masiva investigación para prevenir futuros atentados y para arrestar a cualquiera que esté relacionado con los ataques. Francia se encuentra ahora en un estado de shock colectivo y de luto tras este brutal ataque, cuya destrucción solo es comparable con la causada por el 11-S en Estados Unidos. Sin embargo, pasada la mañana, políticos y ciudadanos franceses se han mostrado frustrados e indignados ante la aparente incompetencia de las fuerzas de la ley y las agencias de inteligencia francesas para detectar el ataque. Sin duda alguna este sería un día terrible que quedará marcado en la memoria nacional de Francia."
 france.64.a: "¡El horror!"
 france.642.t: "Perpetrador del atentado de Notre-Dame arrestado"
 france.642.d: "Tras una exhaustiva búsqueda a nivel nacional que tuvo en vela a la nación, las fuerzas de la ley francesas capturaron a Raashid el-Sader, el individuo responsable por el devastador atentado con explosivos en la Catedral de Notre-Dame. Tras seguir numerosas pistas y cooperando extensivamente con la inteligencia local y de la OTAN, el-Sader fue rastreado a una casa de seguridad a las afueras de París, donde fue llevado a custodia sin incidentes.\n\nEl arresto se produjo en medio del reforzamiento de las medidas de seguridad por todo el país al mismo tiempo que los ciudadanos siguen lidiando con las secuelas del ataque. El presidente francés ha elogiado los esfuerzos de las fuerzas de seguridad, haciendo énfasis en la importancia de la vigilancia en la lucha contra el terrorismo. Mientras la investigación continúa, los oficiales trabajan para descubrir a posibles cómplices y cualquier ataque que se esté planeando."
 france.642.a: "Lo tenemos"
 france.643.t: "Perpetrador del atentado de Notre-Dame avistado en el sur de Turquía"
 france.643.d: "En un inesperado desarrollo de los acontecimientos, reportan que Raashid el-Sader, el responsable del atentado con explosivos en la Catedral de Notre-Dame, ha sido visto en el sur de Turquía. Los testigos afirman haberle visto subir en un vehículo en dirección a la frontera con Siria, levantando temores de que pueda escapar de la justicia al entrar en una región donde los conflictos están a la orden del día.\n\nEste acontecimiento ha dejado un sabor amargo en Francia, donde los ciudadanos esperaban una respuesta rápida al ataque terrorista. Las autoridades se enfrentan ahora a la triste realidad de que el-Sader pueda evitar ser capturado, pudiendo reagruparse con elementos extremistas en Medio Oriente. El Gobierno francés está coordinándose con el turco y con agencias de inteligencia internacionales para atraparle antes de que pueda escaparse definitivamente."
 france.643.a: "¡Joder!"
 france.644.t: "Perpetrador del atentado de Notre-Dame declarado muerto por el Gobierno sirio"
 france.644.d: "En un sorprendente comunicado, el Gobierno sirio ha confirmado que Raashid el-Sader, el infame perpetrador del atentado de la Catedral de Notre-Dame, ha sido ejecutado por órdenes del presidente Bashar al-Ásad. De acuerdo a funcionarios sirios, el-Sader fue detenido poco después de cruzar la frontera, pues los reportes de inteligencia afirmaban que era una amenaza significativa a la estabilidad regional.\n\nLa ejecución ha desencadenado una cascada de reacciones en Francia. Muchos ciudadanos muestran una mezcla de alivio e ira, sintiendo que se hizo justicia pero con el mal sabor de boca de no haber podido llevar a el-Sader a la justicia por sus propios medios. Los políticos están divididos; algunos celebran la noticia como una victoria contra el terrorismo, mientras que otros han criticado los métodos del Gobierno sirio y cuestionan la veracidad de sus acciones."
 france.644.a: "Ehh, gracias Bashar..."
 france.65.t: "Negociaciones petroleras con Venezuela"
 france.65.d: "A causa de la creciente demanda energética y a las recientes perturbaciones en la cadena de suministros, el Gobierno francés ha iniciado negociaciones con Venezuela para asegurar un flujo constante de petróleo para Francia. Venezuela, rica en recursos pero castigada por las sanciones y la crisis económica, ve esto como una oportunidad para impulsar su economía y recuperar su lugar en el mercado mundial.\n\nLos funcionarios franceses buscan negocias términos favorables que no solo involucren la seguridad energética, si no que también busquen apoyar la recuperación de Venezuela. Sin embargo, las negociaciones están resultando ser complejas. Facciones políticas francesas tienen distintas opiniones respecto al  hacer negocios con un régimen que ha sido criticado internacionalmente por violaciones de los derechos humanos."
 france.65.a: "Enviar la propuesta."
 france.66.t: "Negociaciones petroleras con Francia"
 france.66.d: "En medio de la crisis económica venezolana por las sanciones internacionales, Francia le ha propuesto un acuerdo al gobierno venezolano. Ofrecen levantar su embargo al petróleo a cambio de derechos exclusivos de determinados recursos valiosos en Venezuela, entre los que se incluyen depósitos minerales y productos agrícolas. Aceptar este acuerdo podría proporcionar un muy necesario impulso a la hundida economía venezolana, permitiendo exportar petróleo a Europa y dar al la población un respiro de los apagones. Sin embargo, esto tendría el coste de ceder parcialmente el control de recursos nacionales vitales a una potencia extranjera - Un movimiento que podría ser visto como una renuncia a la soberanía.\n\nEl Gobierno, ya presionado por la oposición interna y aislado internacionalmente, debe tomar una decisión: aceptar la oferta de Francia y ganar un salvavidas económico, o rechazarlo y mantener el control de los recursos de la nación con la esperanza de conseguir un mejor acuerdo en el futuro o al colapso del embargo."
 france.66.a: "Aceptar el acuerdo - Venezuela necesita esta bocanada de oxígeno económica."
 france.66.b: "¡Venezuela se mantendrá independiente!"
 france.68.t: "Venezuela dice no"
 france.68.d: "Sorprendentemente, el Gobierno venezolano oficialmente ha rechazado la prouesta de Francia de un acuerdo petrolero, argumentado los términos poco favorables y preocupaciones por el impacto a la soberanía nacional. Funcionarios venezolanos afirman que el acuerdo no abordó adecuadamente sus necesidades económicas y que imponía condiciones que podrían comprometer la independencia del país."
 france.68.a: "Mierda."
 france.67.t: "Venezuela dice si"
 france.67.d: "En una significativa victoria diplomática para Francia, el Gobierno venezolano ha aceptado el acuerdo petrolífero tras su revisión, dando inicio a una nueva era de cooperación entre las dos naciones. Los nuevos términos, que respetan la soberanía venezolana al igual que asegura un suministro estable para Francia, han sido bienvenidos por ambos Gobiernos como un acuerdo que beneficia a ambas partes."
 france.67.a: "Hora de celebrar."
 france.69.t: "Los generales franceses afianzan el Gobierno"
 france.69.d: "Las trompetas de la victoria sonaron gloriosas durante el primer discurso a la nación del alto mando militar desde la reunificación de nuestra patria querida. Únicamente fueron superadas por los aplausos y vítores del pueblo francés, quienes por todo el país apoyaron y recibieron al nuevo régimen con los brazos abiertos. Nuestros amados militares ya habían desfilado por las calles de París desde el momento en que reconquistó el último reducto de los traidores. Era tiempo de celebrar, pero también existía preocupación por nuestros hermanos españoles, quienes seguían enfrascados en un conflicto similar al que tuvimos, y por nuestros vecinos alemanes, quienes están pasando por un repentino cambio de régimen del que no se sabe como saldrán. Hoy brindamos por nuestros numerosos éxitos y victorias logradas gracias a nuestra extraordinaria estrategia y miraros al futuro con los inevitables conflictos del mañana que nos aguardan."
 france.69.a: "¡Por nuestro futuro!"
 france.70.t: "Villiers anuncia elecciones libres"
 france.70.d: "Tras el infierno que fue la Primera Guerra Europea y la deriva nacionalista, por no decir ultranacionalista, del régimen francés, nadie se esperaba que la democracia volviese al ruedo. Sin que la población lo supiera, en los oculta maquinaria interna del Gobierno de Defensa Nacional, dio inicio una lenta reforma.\n\nLo que empezó como una simple descentralización de los poderes del Gran Mariscal y poco después, Villiers empezó a pensar en los preparativos para una verdadera vuelta a la democracia. Si bien no dejaría que la lacra izquierdista volviese a infestar Francia, reconoció que hablar de Francia era hablar de democracia.\n\nTal y como hizo De Gaulle tras la Segunda Guerra Mundial, él que llego a ser el el hombre fuerte de Francia y renunció a su poder para no convertirse en un dictador, Francia jamás volverá a seguir ese camino oscuro. Lo que hay en su lugar son tres partidos, en su momentos marginados por el funcionamiento interno de la Quinta República, compitiendo por la presidencia, los tres teniendo aproximadamente la misma popularidad."
 france.70.a: "El republicanismo regresa."
 france.71.t: "Villiers denuncia públicamente a los petainistas radicales"
 france.71.d: "En las filas de nuestro nuevo Gobierno, hay cientos y cientos de personas que irían mucho más allá que yo en los métodos para salvar a Francia. Si bien somos de la misma cuerda, buscando el retorno de la cultura y el tradicionalismo francés, es mi deber denunciar a estos individuos, y su rabioso autoritarismo y nacionalismo\".\n\nVilliers hablaba con la smanos sujetas en el podio. Era una inusual muestra de intenciones al público por parte del nuevo Gobierno, especialmente por parte del mismísimo Gran Mariscal.\n\n\"Esos individuos, ellos... no son patriotas franceses. No son más que interesados en busca de poder para si mismo, sin ninguna afinidad por lo que defendemos como nación, como pueblo. Mientras que nosotros tenemos fe en nuestra tradición, en este sistema, el hambre de poder y el deseo de corromper el Estado francés es claro y palpable en cada una de sus palabras y acciones\".\n\nHizo una breve pausa antes se seguir, mirando con orgullo al público. algo así jamás hubiese pasado en la antigua Francia, esa que tomó y rechazó el legado de los Estados del pasado.\n\n\"El Gobierno de Defensa Nacional no es una herramienta que esos individuos puedan usar para negar nuestras libertades y tratar a nuestra patria como su dominio personal. Es un Estado en que se pondrá arreglo a los problemas del pasados y Francia renacerá. Aquí el egoísmo radical no tiene cabida\"."
 france.71.a: "La República regresa"
 france.72.t: "El Alto Mando vota para sustituir al General [FAF.GetLeader]"
 france.72.d: ""
 france.72.a: "Felicidades, General Herzog."
 france.73.t: "El Alto Mando vota para sustituir al General [FAF.GetLeader]"
 france.73.d: ""
 france.73.a: "Felicidades, General Bosser."
 france.74.t: "El Alto Mando vota para sustituir al General [FAF.GetLeader]"
 france.74.d: ""
 france.74.a: "Felicidades, General Chesnais."
 france.75.t: "Golpe de los jóvenes oficiales"
 france.75.d: "La ira y la disconformidad de los hombres en el ejército francés han llegado a su punto álgido, la olla a presión liberó su contenido. A pesar de los grandes esfuerzos del Gobierno, la nación y el ejército se han separado de forma irreversible, y al final del día, este último es el que ha salido mejor parado.\n\nEn un movimiento liderado principalmente por oficiales jóvenes de la Guerra Europea, mayormente de derechas, quienes eran relativamente nuevos en el sistema y no se hacían a la idea de estar a la órdenes de la burocracia, quienes vieron morir a familiares y amigos a manos de los rusos iniciaron un golpe contra el Gobierno de Defensa Nacional, afirmando en un comunicado tras el rechazo a nivel nacional que es por la estabilidad y el pueblo de Francia."
 france.75.a: "Salut!"
 france.76.t: "El general Lecointre se reúne con Luis Alfonso de Borbón"
 france.76.d: "Poco después de la reunificación de nuestra amada nación, los medios, celebridades, políticos y otras figuras destacadas de la nación no tardaron en reconocer y mostrar su apoyo al régimen. Sin embargo, entre las masas destacaba un individuo... Luis Alfonso de Borbón. Si bien de Borbón oficialmente carecía de cualquier cargo o posición política, se hizo un nombre entre las altas esferas francesas. Con el surgimiento de la popularidad y llamados por toda la nación pidiendo regresar a tiempos pasados, de Borbón ha jugado bien sus cartas con los peces gordos de Francia como poderosas corporaciones e incluso antiguas casas reales que poseían estatus cuando los Borbones reinaron en Francia. Ahora que parece ser que nuestros militares han ofrecido la mano a la realeza, pues François Lecointre ha sido visto recientemente llegando a la Villa Borbón legitimando aún más las reclamaciones de De Borbón para convertirse en el soberano de la nación francesa."
 france.76.a: "¿Una vuelta a la tradición?"
 france.77.t: "El general Lecointre cede el control absoluto a Luis Alfonso de Borbón"
 france.77.d: "Luis Alfonso de Borbón ha logrado lo imposible en la política francesa, asegurar el apoyo mayoritario en el consejo de defensa nacional a sus reclamos como el rey de Francia. A esto se le suma que, con el paso de las semanas, los ciudadanos franceses empezaron a apoyar la restauración monárquica organizando manifestaciones promonárquicas diarias en París y otras grandes ciudades. Estaba claro que por el bien y la seguridad de Francia, era necesario que Francia tuviese un líder fuerte, y no había nadie mejor para este puesto que De Borbón."
 france.77.a: "Ultima ratio regum"
 france.78.t: "Coronación de Luis XX"
 france.78.d: "Luis Alfonso de Borbón había soñado con este día desde el momento en que aprendió la historia y el legado que cargaba su nombre, supo desde pequeño que estaba destinado a sentar un trono y reinar sobre Francia tal y como hicieron sus antepasados durante siglos. De Borbón estudió y aprendió de los errores de los Borbones y juró que no solo salvaría a Francia de estos tiempos de crisis sino que también corregiría los errores de sus ancestros. Ahora era el tiempo de la coronación de De Borbón, marcando el inicio de una nueva etapa en la historia de Francia."
 france.78.a: "¡Una ceremonia digna de un rey!"
 france.79.t: "Bonos de pago a 10 años emitidos"
 france.79.d: "Con el fin de estabilizar la economía, Francia anunció hace poco la emisión de una nueva tanda de bonos a 10 años baratos. Esta decisión refleja la estrategia gubernamental para garantizar la estabilidad financiera a largo plazo para hacer viables numerosos proyectos de infraestructura y programas sociales. Con la emisión de estos bonos, el Gobierno busca sacar tajada de los bajos tipos de interés, buscando ofrecer préstamos rentables para revitalizar la economía. No obstante, algunas voces críticas han mostrado su preocupación sobre el riesgo potencial de acumular deudas a largo plazo y el impacto que estas pueden tener a las generaciones futuras. A pesar de estas preocupaciones, la distribución de los bonos a 10 años forma parte de la estrategia del Gobierno para financiar el desarrollo al tiempo que surca las complejidades de las dinámicas de la economía global."
 france.79.a: "Tenemos que hacer... plata"
 france.80.t: "Los tecnócratas obtienen más poder"
 france.80.d: "Tras la implementación de políticas inspiradas en el dirigismo en Francia, la influencia de los tecnócratas ha incrementado de forma alarmante. Si bien estas políticas buscan centralizar el control y la planificación en la economía, sin quererlo han empoderado a los tecnócratas a un punto que socaba al gobierno democrático. Con los tecnócratas asumiendo mayores responsabilidades en la toma de decisiones, las voces de sus expertos han empezado a eclipsar a oficiales electos y al pueblo en general."
 france.80.a: "Bien por ellos."
 france.81.t: "El Gobierno anuncia el retorno del programa de campeones nacionales"
 france.81.d: "Francia oficialmente ha resucitado la campaña de campeones nacionales, haciendo eco de la política dirigista del pasado. Esta ambiciosa iniciativa busca identificar y suplir a las compañías claves, particularmente las que participen en el sector tecnológico, aeroespacial y energético, vitales para los intereses de la nación. Apoyando a estos \"campeones\", Francia busca fortalecer su competitividad global y garantizar el liderazgo de estas empresas en la agenda económica del país. Sin embargo, esta campaña ha encendido un debate sobre sus implicaciones en la libre competencia en el mercado y en el balance entre la empresa privada y al intervención estatal."
 france.81.a: "Genial."
 france.82.t: "Día de la Bastilla"
 france.82.d: "París estaba envuelta en un fervor patriótico mientras se desarrollaba el desfile anual del Día de la Bastilla, mostrando al público el poder militar de Francia. El desfile, símbolo de orgullo y unidad nacional, fue el escenario de un gran despliegue de hardware militar, incluyendo tanques y aviones, y de precisión por parte de los miembros de las fuerzas armadas. El desfile, que maravilló a espectadores de todo el mundo, ensalzaba igualmente los esfuerzos de Francia en defensa y su rol como potencia militar global. Tras el fin del desfile, el presidente de Francia dio un apasionado discurso, reafirmando la dedicación del país a la paz, a la seguridad y a la solidaridad con sus aliados. El evento sirvió como un recordatorio del legado histórico de Francia y su inquebrantable espíritu de fuerza y resiliencia."
 france.82.a: "Vive la France."
 france.83.t: "Francia ofrece acuerdo comercial UE-OTDP"
 france.83.d: "Tras la Segunda Guerra Civil Americana, el Gobierno francés, en nombre de la Unión Europea, presentó una propuesta formal a la Organización del Tratado de Defensa del Pacífico para la firma de acuerdos exclusivos de libre comercio. Con el objetivo de reconstruir sus economías y fomentar el crecimiento mutuo, estos acuerdos establecerían condiciones comerciales preferenciales entre ambas naciones, superando las barreras comerciales tradicionales. La propuesta llega en un momento crucial, ya que ambas naciones buscan revitalizar sus industrias y asegurar una base económica estable en el mundo post-EE.UU."
 france.83.a: "La libertad resonará, con o sin América."
 france.83.b: "Gracias... pero no gracias."
 france.84.t: "Gobernador de Normandía envuelto en un escándalo de corrupción"
 france.84.d: "En medio de una campaña anticorrupción a nivel nacional liderada por el Gobierno francés, el gobernador de Normandía se ha visto implicado en un escándalo que involucra malversación y sobornos. Este escándalo ha provocado un terremoto político en la región, empañando la reputación del gobernador y cuestionando la integridad de los funcionarios locales. El Gobierno francés juró erradicar la corrupción a cualquier nivel en la sociedad francesa, y estas últimas revelaciones sirven como un crudo recordatorio de los desafíos que enfrentan en su cruzada contra la corrupción. Mientras continúan las investigaciones, el futuro del liderazgo de Normandía pende de un hilo, dejando a la población y funcionarios por partes iguales con la pregunta de quién más está envuelto en este entramado de fraudes y mentiras."
 france.84.a: "¡Un duro golpe para los republicanos!"
 france.85.t: "L'Oréal se diversifica en la producción de equipos médicos"
 france.85.d: "En respuesta estratégica al incremento de los beneficios fiscales por parte del Gobierno francés para las compañías implicadas en fabricar equipamiento militar para el Gobierno, L'Oreal ha anunciado un sorprendente cambio de enfoque. El gigante cosmético ahora se aventurará en la producción de equipamiento médico, incluyendo sofisticados utensilios y equipos. Este movimiento subraya los esfuerzos de L'Oreal para diversificar e innovar, aprovechando la experiencia manufacturera de la compañía para suplir demandas críticas más allá de la industria cosmética. Mientras L'Oreal se adentra en este nuevo sector, muestra la adaptabilidad de la compañía y su deseo de contribuir a las prioridades nacionales más allá de su marco de operaciones habitual."
 france.85.a: "Porque Francia lo vale"
 france.86.t: "Grupo SEB inicia la producción de electrónicos para el ejército"
 france.86.d: "En respuesta estratégica al incremento de los beneficios fiscales por parte del Gobierno francés para las compañías implicadas en fabricar equipamiento militar para el Gobierno, el Grupo SEB ha anunciado un cambio estratégico hacia la producción de electrónicos para el ejército. Este inesperado movimiento refleja la agilidad del Grupo SEB y su deseo de apoyar las iniciativas de defensa nacional. Aprovechando su experiencia en la fabricación de electrónicos, el Grupo SEB busca contribuir a la modernización de la tecnología militar al tiempo que capitaliza los beneficios fiscales del Gobierno. Esta decisión muestra la versatilidad del Grupo SEB y su capacidad para adaptarse a los cambios en el mercado, otorgando a la compañía un papel clave en el sector de defensa."
 france.86.a: "¡De la cocina al campo de batalla!"
 france.87.t: "Airbus invierte en nuevas bases aéreas"
 france.87.d: "En respuesta estratégica al incremento de los beneficios fiscales por parte del Gobierno francés para las compañías implicadas en fabricar equipamiento militar para el Gobierno, Airbus ha desvelado sus planes para invertir en nuevas bases aéreas. Este estratégico movimiento tiene el fin de reforzar la infraestructura de defensa del país mientras se saca provecho de los beneficios fiscales del Gobierno. Expandiendo su presencia en el sector militar, Airbus busca reforzar su papel como un actor importante en la industria de defensa. La inversión en nuevas bases aéreas muestra la voluntad de Airbus de apoyar la defensa de la nación y mejorar sus capacidades en el sector de la aviación militar."
 france.87.a: "¡Listos para despegar!"
 france.88.t: "Las autoridades francesas incautan un yate ruso"
 france.88.d: "La tensión entre Francia y Rusia ha incrementado tras la incautación por parte de las autoridades francesas de un yate ruso. El yate, propiedad de un prominente oligarca ruso, fue incautado en las costas de Marsella por su presunto involucramiento en actividades ilegales. El incidente ha indignado al gobierno ruso, que condenó la incautación como un acto de agresión injustificado. El Gobierno francés, por otro lado, ha defendido que sus acciones forman parte de una persecución más amplia de actividades ilegales. La incitación del yate ruso ha deteriorado las relaciones entre los dos países, generando preocupaciones sobre la potencial escalada de la disputa."
 france.88.a: "Navegando hacia aguas tormentosas."
 france.89.t: "Ofrecer refugio a las compañías estadounidenses"
 france.89.d: "Con el fin de impulsar su propia economía, Francia ha ofrecido refugio a pequeñas compañías estadounidenses en medio del inicio de la Segunda Guerra Civil Americana. La oferta del Gobierno francés, que puede parecer altruista a simple vista, es impulsada por un deseo de atraer firmas ya establecidas que puedan estimular el crecimiento de la nación dentro de sus fronteras. Compañías como Tesla, Amazon Web Services y Uber Technologies son de especial interés, pues su relocalización en Francia supondría un impulso potencial para la industria francesa. Esta iniciativa muestra el pragmatismo de Francia en asuntos internacionales, aprovechando la crisis de otros países para fortalecer su propia economía."
 france.89.a: "¡Bienvenidos a su casa lejos de casa!"
 france.90.t: "Génération Identitaire ilegalizado"
 france.90.d: "En un decisivo movimiento para combatir al extremismo, el Gobierno francés ha prohibido oficialmente al movimiento \"Los Identitarios\". Este movimiento, conocido por sus posturas nacionalistas y antiimigración, ha sido visto como una amenaza a la seguridad nacional y a la cohesión social. Esta prohibición ha llegado tras el escrutinio a las actividades del grupo y las crecientes preocupaciones sobre su influencia en la opinión pública. El Gobierno francés ha afirmado que no tolerará ninguna forma de extremismo que socave los valores de libertad, igualdad y fraternidad del país. La prohibición de \"Los Identitarios\" es un paso significativo en los esfuerzos de Francia de combatir a las ideologías radicales y promover la inclusión y la tolerancia."
 france.90.a: "¡Libertad, igualdad, destierro!"
 france.91.t: "Francia asegura que mantendrá su apoyo militar"
 france.91.d: "A pesar de haber abandonado la Estructura de Mando Integrada de la OTAN, el Gobierno francés ha asegurado a sus aliados de la OTAN que mantendrá su compromiso con la alianza militar. Francia enfatizó que si bien busca una mayor independencia en defensa, se mantiene leal a los principios fundamentales de defensa colectiva y cooperación de la OTAN. El comunicado del Gobierno francés llegó tras las preocupaciones de los miembros de la OTAN sobre las implicaciones que pueda tener la retirada de Francia del Comando integrado. El compromiso de Francia con sus aliados de la OTAN muestra la importancia que tiene para Francia la cooperación multilateral para mantener la estabilidad y seguridad global."
 france.91.a: "Pero, ¿por qué ahora?"
 france.92.t: "Francia abandona la Estructura de Mando Integrada de la OTAN"
 france.92.d: "En una audaz afirmación de soberanía y autonomía estratégica, el Gobierno francés ha anunciado su decisión de retirase de la Estructura de Mando Integrada de la OTAN. [FRA.GetLeader] enfatizó que si bien Francia mantendrá sus compromisos con los principios fundamentales de defensa colectiva de la OTAN, la decisión de retirarse de la Estructura de Mando refleja la determinación de la nación en moldear su propia estructura militar de forma independiente.\n\nLa decisión ha encendido debates dentro de la OTAN entre los aliados europeos, expresando preocupación por las implicaciones que pueda tener para la cooperación en defensa europea. No obstante, Francia ha asegurado a sus aliados que su compromiso con los objetivos integrales de la OTAN sigue intacto. El movimiento del Gobierno francés es visto como una recalibración estratégica, permitiendo a Francia tener una mayor flexibilidad a la hora de tomar decisiones respecto a la defensa de la nación mientras mantiene su compromiso con la estabilidad y seguridad europea."
 france.92.a: "Francia, por su cuenta, deberá escoger su destino"
 france.921.t: "Francia abandona la Estructura de Mando Integrada de la OTAN"
 france.921.d: "En una audaz afirmación de soberanía y autonomía estratégica, el Gobierno francés ha anunciado su decisión de retirase de la Estructura de Mando Integrada de la OTAN. [FRA.GetLeader] enfatizó que si bien Francia mantendrá sus compromisos con los principios fundamentales de defensa colectiva de la OTAN, la decisión de retirarse de la Estructura de Mando refleja la determinación de la nación en moldear su propia estructura militar de forma independiente.\n\nLa decisión ha encendido debates dentro de la OTAN entre los aliados europeos, expresando preocupación por las implicaciones que pueda tener para la cooperación en defensa europea. No obstante, Francia ha asegurado a sus aliados que su compromiso con los objetivos integrales de la OTAN sigue intacto. El movimiento del Gobierno francés es visto como una recalibración estratégica, permitiendo a Francia tener una mayor flexibilidad a la hora de tomar decisiones respecto a la defensa de la nación mientras mantiene su compromiso con la estabilidad y seguridad europea."
 france.921.a: "Francia, por su cuenta, deberá escoger su destino"
 france.93.t: "Renombrando la Agrupación Nacional"
 france.93.d: "Tras su victoria en las elecciones de 2022, Marine Le Pen ha emprendido un audaz proceso para cambiar de imagen, transformando la Agrupación Nacional en la Unión Republicana. Este nuevo partido busca alejarse de sus raíces en la ultraderecha, adoptando una ideología de centroderecha. Este cambio de imagen busca ampliar la base de apoyos del partido y hacer virar el partido hacia posturas más moderadas en el espectro político. La Unión Republicana busca unir a distintas facciones conservadoras bajo una única bandera, presentándose como una alternativa viable al resto de partidos. La estrategia de Le Pen refleja sus esfuerzos en darle una nueva imagen al partido para poder atraer a una mayor cantidad de votantes, siendo esto un cambio significativo en la política francesa."
 france.93.a: "¡De extrema a centro!"
 france.94.t: "El fallecimiento de Jean-Marie Le Pen"
 france.94.d: "El día de hoy, Jean Louis Marie Le Pen, el fundador de la Agrupación Nacional - llamado en aquel entonces Frente Nacional - y padre de Marine Le Pen, ha fallecido a la edad de 96 años.\n\nTeniendo a sus espaldas una montaña de controversias que van desde afirmaciones discriminaciones hasta rozar el negacionismo del Holocausto, el agitador y antiguo líder de la Agrupación Nacional con años de longevidad en la política francesa, en la que participaba desde los años 80, ha influenciado ampliamente no solo la derecha, sino a la opinión pública de la nación en general. Fue expulsado de la Agrupación Nacional en 2015 tras disputas con su hija Marine sobre la modernización del partido y sus declaraciones incendiarias, llegando al punto de apoyar la candidatura del radical Eric Zemmour antes que el de su propia hija. Su deceso, para algunos, ha supuesto el fin de un capítulo turbulento en la historia de la derecha francesa.\n\nDel mismo modo que fue su vida, su muerte ha generado numerosas y muy variadas opiniones, haciendo de este suceso un espectáculo mediático; en la derecha, las reacciones fueron desde un profundo pésame hasta discretas condolencias. Los moderados o bien no se pronunciaron al respecto o bien se limitaron a condenar su retórica discriminatoria pasada. La izquierda celebró la muerte de una de las figuras más abiertamente fascista de la últimas décadas con júbilo. Sin importar cual sea la respuesta, parece ser que su partida se ha convertido en un tema casi tan polémico como lo fue él."
 france.94.a: "El menhir finalmente ha caído."
 france.94.b: "Europa no llorará su pérdida."
 france.94.c: "Au revoir, papa."
 france.94.e: "Uno de los últimos grandes hombres de Francia."
 france.94.f: "El demonio fascista de la república finalmente exhaló su último aliento."
 france.94.g: "Un verdadero patriota ahora descansa en paz."
 france.94.h: "Alguna vez fue un visionario..."
 france.941.t: "El legado perdido del orgullo francés"
 france.941.d: "En un momento trágico para la nación Jean-Marie Le Pen, fiel defensor del nacionalismo francés, ha fallecido. Su dedicación a la preservación de la cultura y soberanía francesa han hecho de él un modelo a seguir para aquellos que resisten el azote de las agendas globalistas. Su firme postura contra la inmigración masiva y su inquebrantable compromiso con las tradiciones francesas le ha canjeado tanto elogios como críticas. Para sus partidarios, fue un héroe que defendió sin miedo los valores y la identidad de Francia. Para sus detractores, fue un símbolo de intolerancia y división. Sin importar la opinión que se tenga de él, es innegable que ha marcado la política y cultura francesa.\n\nSu fallecimiento deja un vacío en el movimiento nacionalista, pero su legado vivirá. Mientas Francia encara su futuro, el legado de Le Pen sirve como recordatorio de la defensa de la defensa de la identidad nacional en un mundo cada vez más globalizado. Nosotros, sus partidarios, asumiremos con orgullo su misión, asegurando que su visión de una Francia orgullosa y libre se perpetúe en el futuro."
 france.941.a: "¡Vive la France, siempre!"
 france.95.t: "Reconquête se disuelve"
 france.95.d: "Tras un inesperado giro de los acontecimientos, el movimiento de ultraderecha Reconquête ha anunciado su disolución. El movimiento, conocido por sus posturas nacionalistas y antiinmigración, dio como razones de su disolución discrepancias internas y la carencia de un proyecto político viable. La abrupta disolución de Reconquête pone fin a un controversial capítulo de la política francesa, dejando a partidarios y detractores igual de confundidos. Con el abandono de Reconquête de la política, el futuro de la ultraderecha francesa está en el aire, lo que supondrá nuevas posibilidades y desafíos para la política francesa."
 france.95.a: "Reconquête da marcha atrás"
 france.96.t: "Se forma Revolution et Renouveau"
 france.96.d: "Un nuevo partido de ultraderecha, \"Revolución y Renovación\" ha emergido de los remanentes del disuelto Reconquête de Eric Zemmour y los partidarios fascistas de Yvan Benedetti. Sin embargo, la formación del partido no ha estado exenta de dificultades, pues tanto Zemmour y Benedetti cuentan con la posibilidad de hacerse cargo del partido y moldear su ideología. Ambos líderes compiten para tomar el control del partido, cada uno buscando implementar su propia visión. Mientras crece la tensión entre ambas facciones, \"Revolución y Renovación\" se encuentra en una encrucijada, con su futuro pendiendo de un hilo."
 france.96.a: "Benedetti deja fuera a Zemmour"
 france.96.b: "¡Zemmour se alza victorioso!"
 france.97.t: "Le Pen se reúne con líderes de la oposición y analistas militares"
 france.97.d: "Tras su victoria en las elecciones presidenciales de 2022, Marine Le Pen ha tomado la decisión de afrontar la inminente amenaza que supone Rusia. En un movimiento histórico, ella ha iniciado conversaciones con líderes de la oposición, incluyendo al expresidente Macron, miembros del MoDem, Les Republicains y Horizons, así como con analistas militares, con el fin de formar un Gobierno de Unidad Nacional. Esta coalición busca formar un frente unido contra la potencial agresión rusa, demostrando el compromiso con la defensa y seguridad de Francia. Estas conversaciones representan un momento significativo de cooperación bipartidista, mostrando la unidad de Francia para enfrentar amenazas externas."
 france.97.a: "¡Una Francia unida es una Francia desafiante!"
 france.98.t: "Se anuncia el Gobierno de Unidad Nacional"
 france.98.d: "En un histórico discurso a la nación, Marine Le Pen, respaldada por el expresidente Macron, una coalición de líderes de la opinión, analistas militares y figuras destacadas de MoDem, Les Republicains y Horizons, ha anunciado de forma oficial la creación de un Gobierno de Unidad Nacional. Esta coalición sin precedentes, nacida de la necesidad de hacerle frente a la agresión rusa, representa un giro paradigmático en la política francesa. La formación de este Gobierno demuestra el compromiso de priorizar la defensa y la unidad nacional sobre intereses partidistas. Al mismo tiempo que Le Pen da detalles sobre la estructura y los objetivos del Gobierno, mostrando planes para coordinar la defensa y la diplomacia, existe entre la población francesa un cauteloso optimismo. La unidad mostrada por aquellas facciones enfrentadas entre sí no hace mucho da inicio a un nuevo capítulo de la historia de Francia, uno en que la solidaridad y la cooperación prevalece en tiempos de adversidad."
 france.98.a: "Francia PERSISTIRÁ"
 france.99.t: "Auge de la popularidad de partidos radicales entre el electorado"
 france.99.d: "Tras el anuncio del Gobierno de Unidad Nacional, una porción significativa del electorado ha trasladado su apoyo hacia partidos nacionalistas y comunistas. Organizaciones como Revolución y Renovación y el Partido Comunista Francés han ganado popularidad recientemente. Este repentino flujo de apoyo hacia estos partidos muestra una sensación de decepción entre los votantes que se sintieron utilizados por el ahora masivo y unido establishment político. Mientras el Gobierno de Unidad Nacional afronta los problemas y desafíos presentados por la agresión rusa, el espectro político en Francia está sufriendo una dramática transformación, preparando el escenario para una nueva era de competencia política y de confrontación política."
 france.99.a: "Un montón de traidores."
 france.100.t: "Política migratoria estadounidense"
 france.100.d: "Mientras la Segunda Guerra Civil Americana continúa desgarrando los Estados Unidos, un número cada vez mayor de ciudadanos americanos huye de la violencia y del caos buscando refugio en el extranjero, y una buena cantidad de ellos buscan refugiarse en Francia. El camino hacia la paz es peligroso, enfrentando muchos condiciones precarias y la constante amenaza de la violencia. Las familias son separadas, los hogares son destruidos y barrios enteros son borrados del mapa en un conflicto que no muestra signos de que vaya a amainarse en el futuro próximo.\n\nCuando llegan a Francia, estos inmigrantes se encuentran en una situación precaria, transitando una tierra extranjera con perspectivas inciertas. El Gobierno francés, si bien simpatiza con los refugiados, está encontrando dificultades para acomodar el flujo de refugiados, resultando en albergues saturados y recursos limitados. A pesar de los desafíos, los inmigrantes permanecen resilientes, manteniendo su esperanza de un futuro mejor en su nuevo hogar.\n\nNo obstante, el Gobierno francés debe tomar una difícil decisión respecto a su política migratoria a la luz del flujo de inmigrantes americanos. Debe balancear la compasión y el humanitarismo con las preocupaciones sobre la seguridad y el extremismo."
 france.100.a: "No hace falta ningún cambio."
 france.100.b: "Que entren todos los solicitantes."
 france.100.c: "No debemos permitir que los radicales corrompan nuestro gobierno."
 france.101.t: "Séjourné se reúne con Mélenchon"
 france.101.d: "En un significativo avance en la unificación de las fuerzas progresistas en Francia, Stéphane Séjourné ha aceptado reunirse con Jean-Luc Mélenchon, el líder de Francia Insumisa. Esta reunión busca explorar la posibilidad de una cooperación y forjar una coalición que potencie sus metas comunes de justicia social, sostenibilidad medioambiental y reforma económica.\n\nDurante la reunión, Séjourné y Mélenchon abordaron cuestiones como la acción climática, los derechos de los trabajadores y la desigualdad de ingresos. Reconocen el poder que puede llegar a tener un frente unido para enfrenar la creciente influencia del populismo de derecha y para atraer a los votantes que busquen un cambio progresista."
 france.101.a: "Entonces... ¿podremos contar con tu voto?"
 france.102.t: "Macron dimite"
 france.102.d: "Tras fracasar oficialmente en la búsqueda de un tercer mandato como presidente, Emmanuel Macron ha anunciado su retirada de la política, dejando a Stéphane Séjourné como líder de Renacimiento.\nEn su discurso inaugural, Séjourné enfatizó en la importancia de la unidad y la resiliencia, llamando a un renovado enfoque en valores progresistas, reforma económica y al refuerzo de los lazos con Europa. Reconoció los desafíos que se le presentarán, resaltando el como abordar las preocupaciones que llevo a numerosos votantes a votar a Le Pen, y la necesidad de políticas innovativas que resuenen con un electorado más amplio."
 france.102.a: "Júpiter ha caído."
 france.103.t: "Séjourné se reúne con Gontard"
 france.103.d: "En un movimiento estratégico con el fin de revitalizar el partido Renacimiento, Stéphane Séjourné se ha reunido con Guillaume Gontard, una figura destacada en los movimientos ecologistas y progresistas. Esta reunión marca un avance significativo en la transformación de Renacimiento en un partido de centroizquierda que se enfoque más en problemas contemporáneos como el cambio climático, la justicia social y la igualdad económica.\n\nDurante su reunión, Séjourné y Gontard exploraron varias iniciativas políticas que puedan atraer a una base más amplia, enfatizando el desarrollo sostenible, las tecnologías limpias y políticas sociales inclusivas. Reconocieron la importancia de apelar a un electorado joven y a la población urbana, que son los que muestran un mayor interés por las cuestiones climáticas y la justicia social."
 france.103.a: "¡Debemos permanecer unidos para enfrentar al cambio climático!"
 france.104.t: "Nacimiento de Une République, Une Marche!"
 france.104.d: "En un hito sin precedentes en la política francesa, un nuevo partido político, Une République, Une Marche!, ha sido creado oficialmente producto de la unión de los Verdes, Francia Insumisa y el partido Renacimiento. Esta coalición busca presentar un frente unido a la hora de abordar cuestiones como el cambio climático, justicia social y la igualdad económica.\n\nEl mitin inaugural de Une République, Une Marche! reunió a miles de entusiasmados partidarios, reflejando el profundo deseo de una alternativa progresista coherente en la política francesa. Los líderes de los tres partidos dieron poderosos discursos en los que enfatizaron su compromiso con la transformación de la política y los valores democráticos."
 france.104.a: "¡Marchen!"
 france.105.t: "URUM exige una investigación sobre presunto fraude electoral"
 france.105.d: "En un atrevido movimiento, Une République, Une Marche! ha solicitado oficialmente una investigación exhaustiva en respuesta a las acusaciones de fraude electoral que han surgido tras las recientes elecciones. Los líderes del partido muestran preocupación acerca de la integridad del proceso electoral, haciendo énfasis en la transparencia y responsabilidad para restaurar la confianza del electorado.\n\nEn una conferencia de prensa, altos cargos del partido mencionaron numerosos reportes de irregularidades que han salido a la luz, enfatizando en la necesidad de una revisión exhaustiva para garantizar que cada voto se haya contado correctamente. Otras figuras destacadas del partido han mostrado preocupación por la posibilidad de que estas irregularidad se deban a interferencias rusas que buscaban influenciar el resultado de las elecciones.\n\nURUM plantea esta iniciativa como parte de su compromiso con los principios democráticos y la protección de los derechos de los ciudadanos, afirmando que cualquier irregularidad, incluyendo interferencias extranjeras, deben ser corregidas para mantener la legitimidad del sistema electoral."
 france.105.a: "¡Recuento! ¡Recuento! ¡Recuento!"
 france.106.t: "El comité de URUM no encuentra ningún indicio de fraude electoral a gran escala"
 france.106.d: "Tras semanas de análisis e investigaciones, el comité de URUM hizo público sus resultados, concluyendo que no existen indicios de fraude electoral a gran escala en las recientes elecciones. El informe del comité respondió las preocupaciones del partido sobre la integridad del proceso electoral, incluyendo acusaciones de interferencia extranjera.\n\nSi bien el reporte reconoció algunas irregularidades menores, hizo énfasis de que no constituyen una amenaza a la integridad general de las elecciones. Los líderes de URUM han afirmado que la investigación debería tranquilizar a los votantes acerca del proceso democrático, y que mantendrían su compromiso por la transparencia y de reformar el sistema electoral si es necesario."
 france.106.a: "Deberíamos haber aprendido de Hillary..."
 france.107.t: "Postura de URUM ante la federalización de la UE"
 france.107.d: "Mientras se intensifican las discusiones sobre el futuro de la UE, URUM se encuentra en una encrucijada. El partido debe andarse con pies de plomo respecto a la federalización, que representa tanto una gran oportunidad para una mayor unidad entre los Estados miembros así como una fuente de preocupación para los ciudadanos. Con desafíos como al seguridad climática, desigualdad económica y amenazas a la seguridad, URUM cree que Francia debería tomar un rol proactivo para apoyar la idea de una Europa federal. El partido ve esto como una oportunidad en la que un liderazgo francés puede impulsar cambios significativos a nivel continental.\n\nNo obstante, URUM también es consciente de los riesgos que conlleva la federalización, más concretamente aquellos relacionado con los derechos y la protección de los trabajadores nacionales. El partido reconoce que sin las medidas adecuadas, las políticas federales pueden socavar los derechos laborales locales y las protecciones sociales. Así, URUM deber considerar cuidadosamente como equilibrar su apoyo a la integración europea con su promesa de defender los intereses de los trabajadores franceses. Mientras Francia se cuestiona su lugar en una Europa en evolución, la decisión de URUM no solo moldeará la futura dirección del partido, sino que también su relación con el electorado francés."
 france.107.a: "¡Francia debe liderar a Europa hacia una era federalizada!"
 france.107.b: "Francia debe tener un papel importante en los asuntos europeos"
 france.107.c: "La federalización es una forma de socavar a los trabadores nacionales"
 france.108.t: "Le Pen renuncia"
 france.108.d: "Marine Le Pen ha anunciado que no buscará volver a liderar el partido de derechas Agrupación Nacional, en su lugar, liderará un grupo parlamentario en la Asamblea Nacional. Para reemplazar a Le Pen, Agrupación Nacional ha elegido a chico de 27 años procedente de los suburbios de París miembro de partido desde su adolescencia como su nuevo presidente.\nJordan Bardella, el protegido de Le Pen, quien había sido presidente en funciones por un año, derrotó a Luis Aliot, de 53 años y alcalde de Perpiñán, un pez gordo del partido y antiguo socio de Le Pen, ganando las elecciones internas del partido con un 85% de los votos frente al 15% que consiguió Aliot."
 france.108.a: "Regresaremos Macron..."
 france.110.t: "Jean-Marie Le Pen es hospitalizado"
 france.110.d: "En un desafortunado desarrollo de los acontecimientos, Jean-Marie Le Pen, político veterano y fundador del Frente Nacional, ha sido hospitalizado tras sufrir complicaciones atribuidas a la reciente derrota electoral de su hija. Esta derrota ha provocado grietas en el partido, que tenía grandes esperanzas de asegurar la victoria. Los familiares afirmaron que el resultado electoral afectó profundamente al anciano Le Pen, que sintió una profunda decepción y mostró preocupación por el futuro de la derecha francesa.\n\nMientras se difunden las noticias sobre su hospitalización, partidarios y críticos han reaccionado con preocupación e incertidumbre. Muchos dentro del partido han cerrado filas con Marine Le Pen, llamando a la unidad mientras reajustan las estrategias de cara al futuro. La situación la reavivado los debates sobre la futura dirección del Frente Nacional y los desafíos que enfrentará en un panorama político cambiante. Mientras tanto, la salud de Jean-Marie Le Pen estará monitoreada de cerca, pues su influencia y legado sigue pesando bastante en la identidad del partido."
 france.110.a: "Un día triste."
 france.109.t: "Bardella es visto visitando a Jean-Marie Le Pen"
 france.109.d: "Sorprendentemente, Jordan Bardella, el joven presidente de la Agrupación Nacional, fue fotografiado visitando a Jean-Marie Le Pen en el hospital junto a otros antiguas figuras del partido como Carl Lang y Bruno Gollnisch. Esta visita ha provocado un intenso escrutinio por parte de los medios y especulaciones sobre el futuro del partido, especialmente si se tiene en cuenta tras la reciente derrota electoral y la delicada salud de Jean-Marie. La presencia de Lang y Gollnisch, conocidos por sus posturas más tradicionalistas e intransigentes, han planteado preguntas sobre la dirección ideológica que tomará Bardella.\n\nCon los detalles de la visita saliendo a la luz, los comentarios respecto a esta son mixtas. Por un lado, partidarios han visto la visita como un gesto de respeto y unidad con el legado del partido, mientras que voces más críticas ven esta visita como un signo de un posible retorno del partido hacia sus raíces más radicales del Frente Nacional. El liderazgo de Bardella se ha caracterizado por un deseo de modernizar la imagen del partido, pero esta reunión pone en duda esta narrativa. El desenlace de esta visita puede influir las futuras estrategias del partido y su capacidad para apelar a un electorado amplio mientras transita un cambiante panorama político."
 france.109.a: "Métete en tus asuntos..."
 france.111.t: "Bardella se reúne con el mariscal de campo Villiers"
 france.111.d: "Recientemente Jordan Bardella, el presidente de Agrupación Nacional, se reunió con el mariscal de campo Pierre de Villiers para compartir sus preocupaciones conjuntas sobre las políticas cada vez más liberales del presidente Macrón. Ambas figuras, representantes de distintos aspectos de la derecha francesa, manifestaron sus preocupaciones por el alejamiento de los valores tradicionales e intereses nacionales percibidos bajo el liderazgo de Macron. La discusión se centró en aspectos como la inmigración, la seguridad y la soberanía nacional, en la que Bardella enfatizaba en la necesidad de adoptar una postura más firme contra lo que él veía como \"excesos liberales\".\n\nEl mariscal de campo Villiers, conocido por su historial militar y puntos de vista conservadores, compartía los sentimientos de Bardella, advirtiendo que las políticas de la administración actual amenazan el tejido social francés. Su reunión abrió las puertas a una potencial alianza entre la establecida autoridad militar y el juvenil liderazgo político de Agrupación Nacional, teniendo como objetivo unir las numerosas facciones de la derecha contra un enemigo común. Mientras exploran posibles estrategias comunes, las implicaciones de esta alianza pueden remodelar el panorama político y movilizar apoyo de votantes descontentos que buscan un gobierno más tradicional."
 france.111.a: "Un hombre inteligente."
 france.112.t: "Formación de Le Droit Chemin"
 france.112.d: "En un audaz movimiento para consolidar la ultraderecha francesa, la Agrupación Nacional, liderada por Jordan Bardella, ha anunciado oficialmente la formación de una nueva coalición llamada Le Droit Chemin. Esta coalición une la Agrupación Nacional, Reconquête, el partido fundado por Eric Zemmour, y varios otros partidos de ultraderecha minoritarios. El objetivo de la coalición es crear una formación política capaz de hacerle frente a los partidos convencionales y representar de forma adecuada las preocupaciones y el descontento de nacionalistas y conservadores con la actual administración.\n\nLe Droit Chermin busca capitalizar el creciente descontento generado por las políticas liberales del presidente Macron, presentándose como un frente unido que da prioridad a asuntos como el control migratorio, la soberanía nacional y los valores tradicionales. Los líderes de los partidos que conforman la coalición se muestran optimistas con esta, viéndola como una forma de ganar votantes y proveer una alternativa al statu quo. Mientras el nuevo partido encuentra su lugar en el panorama político, su habilidad para mantener cohesionadas sus diversas facciones será crucial de cara a las próximas elecciones y para movilizar a la mayor cantidad de votantes posibles."
 france.112.a: "Vivimos en tiempos extraños..."
 france.113.t: "Renacimiento izquierdista se une al NFP"
 france.113.a: "Vaya con los socioliberales..."
 france.113.d: "En un cambio estratégico encaminado a fortalecer a la izquierda francesa, el Renacimiento izquierdista, una facción dentro del partido de Macron, se ha unido oficialmente al Nuevo Frente Popular. Esta coalición busca unir a varios grupos progresistas con el fin de constituir una firme oposición a las políticas derechistas. Esta iniciativa está liderada Stella Dupont, una destacada figura de la ala izquierdista de Renacimiento, quién aboga por la formación de un nuevo grupo socialdemócrata que pueda canalizar el apoyo de miembros decepcionados del partido de Macron.\n\nLa visión de Dupont incluye crear una plataforma unida que aborde problemas como la justicia social, la igualdad económica y la sostenibilidad medioambiental. Alineándose con el Nuevo Frente Popular, Dupont busca consolidar las fuerzas izquierdistas e incrementar su visibilidad en el panorama político. Se espera que esta alianza movilice a los votantes que estén buscan una alternativa a las políticas centristas de la actual administración y que levante la moral del electorado progresista. Mientras el Nuevo Frente Popular encuentra su lugar, su éxito dependerá de que tan capaz sea de unir a las diversas facciones que lo componen y de articular una agenta clara y atractiva para el futuro."
 france.114.t: "¡El pueblo exige un referendo para una nueva república!"
 france.114.d: "En una ola de civismo, ciudadanos de toda Francia se ha unido en un movimiento masivo que demanda un referendo para el establecimiento de una Sexta República. Este llamado es alimentado por el descontento masivo hacia el sistema político actual, visto como corrupto, y el deseo de una mayor representación democrática. Los activistas argumentan que una nueva república podría reflejar los valores y necesidad del pueblo francés, alejándose de la centralización que ha caracterizado a las administraciones previas."
 france.114.a: "Lo hemos entendido"
 france.115.t: "Mélenchon arrestado por traición a Francia"
 france.115.d: "En un impactante desarrollo de los acontecimientos, Jean-Luc Mélenchon ha sido arrestado tras ser acusado de un delito de traición a Francia.\nEl arresto, ejecutado por fuerzas de la ley francesas y ordenado por el presidente Villiers, fue el resultado de una extensiva investigación que recopiló evidencias sustanciales que demuestran el involucramiento de Mélenchon en actividades consideradas perjudiciales para los intereses del país. Mientras que los detalles específicos respecto a sus cargos aún no se han publicado, se cree que Mélenchon estuvo involucrado en actos que amenazaron la soberanía, seguridad o estabilidad de Francia durante las elecciones de 2022. El arresto ha desatado una ola de reacciones en todo el espectro político, mientras que los oficiales muestran una mezcla de asombro y preocupación.\nEl Gobierno ha enfatizado la importancia de mantener la supremacía de la ley y preservar la integridad nacional para enfrentar cualquier amenaza al bienestar de la nación. Se ha incrementado la seguridad en varias localizaciones clave, incluyendo edificios gubernamentales y espacios públicos, al mismo tiempo que las autoridades permanecen alerta frente a las posibles repuestas a este arresto. Este evento también ha provocado discusiones sobre la necesidad de medidas más estrictas para salvaguardar el país contra cualquier potencial amenaza interna."
 france.115.a: "¡Finalmente!"
 france.116.t: "Villiers se reune con Zemmour en el palacio del Elíseo"
 france.116.d: "El presidente Pierre de Villiers mantuvo una importante reunión con su oponente, Éric Zemmour, para abordar la posibilidad de unir sus respectivos partidos. La reunión, mantenida a puerta cerrada, ha generado especulaciones y captó la atención de todo el espectro político. La reunión entre el presidente Villiers y Zemmour, un prominente comentarista político y antiguo candidato presidencial, se realizó en una localización aún por revelar y abordó el potencial para la unión de sus partidos. Si bien los detalles de la reunión siguen siendo confidenciales, se cree que las dos figuras han hablado largo y tendido y con sinceridad sobre sus metas compartidas, afinidad ideológica y los potenciales beneficios de un partido conservador unido."
 france.116.a: "Zemmour jura lealtad"
 france.117.t: "El incremento del interés por la monarquía del electorado universitario francés tras las elecciones"
 france.117.d: "Una reciente encuesta realizada en universidad francesas han revelado un sorprendente crecimiento en el apoyo a la monarquía entre el electorado universitario tras la elección del presidente Pierre de Villiers. Los resultados de la encuesta indican un notable giro en la opinión política de los jóvenes, que un número cada vez mayor de ellos muestran interés en formas de gobierno alternativas.\nEl auge del monarquismo entre los universitarios se puede atribuir, en parte, al fuerte liderazgo del presidente Villiers y su énfasis en la estabilidad, tradición y unidad nacional. Su presidencia ha provocado discusiones sobre el rol de una monarquía constitucional en la sociedad moderna, con sus partidarios argumentando que un monarca puede servir como un símbolo unificador y dar una sensación de continuidad en medio de cambios políticos y sociales. La encuesta también muestran que los votantes jóvenes están buscando alternativas a la tradicional dicotomía izquierda-derecha y están abiertos a explorar distintas ideologías políticas. El monarquismo, considerada una ideología marginal anteriormente, ha ganado popularidad entre los universitarios quienes lo ven como una solución a las deficiencias del actual sistema político."
 france.117.a: "¿Un resurgimiento real?"
 france.118.t: "Desfile militar en París"
 france.118.d: "En una muestra de patriotismo y unidad nacional, el presidente Pierre de Villiers organizó un gran desfile militar que cautivó a ciudadanos de toda Francia. El evento, que se extendió por toda París, mostró el profundo afecto que el presidente tiene por las fuerzas armadas y cumplió con el objetivo de destacar la fuerza y unidad de la nación frente las adversidades."
 france.118.a: "Una poderosa demostración de poder."
 france.120.t: "Macron se reúne con Mélenchon y Le Pen"
 france.120.d: "En un sorprendente movimiento encaminado a fomentar la unidad y abordar los desafíos que enfrenta Francia, el presidente Emmanuel Macron ha anunciado que se reunirá con sus rivales políticos Jean-Luc Mélenchon y Marine Le Pen para discutir la formación de un Gobierno de Unidad Nacional. Este anuncio ha levantado una avalancha de especulaciones y ha atraído la atención de todo el espectro político. La reunión, programada para los próximos días, muestra la determinación de Macron para transcender las divisiones políticas tradicionales y buscar una colaboración más amplia para gobernar. Al involucrar a Mélechon, el líder del partido izquierdista Francia Insumisa, y Le Pen, la líder de la derechista Agrupación nacional, Macron busca demostrar su voluntad de superar diferencias ideológicas y formar un frente unido para abordar las necesidades de la nación."
 france.120.a: "Tres hurras por el centrismo"
 france.119.t: "¡Mélechon se retira!"
 france.119.d: "En un remarcable intento de fomentar la unidad nacional y abordar los problemas urgentes que enfrenta Francia, el presidente Emmanuel Macron inició conversaciones con sus rivales políticos Jean-Luc Mélenchon y Marine Le Pen para explorar la posibilidad de un Gobierno de Unidad Nacional. Sin embargo, rápidamente las diferencias desembocaron en acaloradas discusiones y Mélenchon abandonó abruptamente la reunión, expresando su inconformidad con los términos propuestos y la posibilidad de que estos quebranten el compromiso que tiene por los principios de su partido. Su retirada mostró las profundas diferencias ideológicas que persisten entre las distintas facciones políticas en Francia.\nEl presidente Macron y Marine Le Pen continuaron las conversaciones, discutiendo la posibilidad de coalición y objetivos políticos en común. Su voluntad para tender puentes entre las tradicionalmente enfrentadas facciones demuestran la urgente necesidad de una mayor cooperación para poder solucionar los significativos desafíos que enfrenta el país."
 france.119.a: "Al menos podremos trabajar con Marine."
 france.1191.t: "La trama expuesta"
 france.1191.d: "Parece ser que las autoridades francesas han destapado un vil y traicionero complot de la oposición parlamentaria conservadora contra Emmanuel Macron. Los detalles del complot son claros y si no hubiera salido a la luz, quien sabe lo que pudo haber pasado... Macron ordenó personalmente a las autoridades que arresten y condenen a todos los involucrados en el complot, que casualmente todos eran miembros de la oposición. A causa de la ley marcial, no se pueden convocar elecciones, lo que solo ha beneficiado a Macron quién no tardó en realizar una lista de miembros leales de su partido para rellenar los asientos vacantes."
 france.1191.a: "Adiós oposición."
 france.121.t: "El presidente Macron revela el Tratado de Malta"
 france.121.d: "En un movimiento significativo con el fin de fomentar la cooperación regional y la integración económica, el presidente Emmanuel Macron ha anunciado la creación del Tratado de Malta, un nuevo grupo económico conformado por numerosas naciones mediterráneas. El tratado busca estrechar lazos, fomentar el comercio y reforzar la colaboración entre Croacia, Francia, España, Italia, Eslovenia, Montenegro, Albania, Grecia y Turquía. Cada país aporta sus virtudes propias y recursos para el grupo, incrementando el potencial de proyectos colaborativos, intercambio de conocimientos y el desarrollo de iniciativas regionales.\nSe espera que el Tratado de Malta permita intercambios beneficiosos, fomente iniciativas transfronterizas, promueva el turismo y que facilite la difusión de las mejores prácticas en numerosos sectores, incluyendo agricultura, energía, infraestructuras y tecnología. También dará la oportunidad a los países miembros de afrontar de forma colectiva desafíos como el cambio climático, la migración y cuestiones de seguridad."
 france.121.a: "El inicio de una nueva era para el Mediterráneo."
 france.1211.t: "Tratado de Malta - Si o No"
 france.1211.d: "El Tratado de Malta busca reforzar la cooperación regional, potenciar la integración económica y fomentar el intercambio y la prosperidad entre los países mediterráneos. Al unirte a nuestro grupo, tendrás la oportunidad de participar activamente en una dinámica organización enfocada a la cooperación mutuamente beneficiosa, el intercambio de conocimientos e iniciativas conjuntas con el fin de aprovechar el inmenso potencial económico que tiene la región."
 france.1211.a: "Yay"
 france.1211.b: "Nah"
 france.122.t: "Los recortes administrativos del presidente Zemmour dan sus frutos"
 france.122.d: "En un atrevido y decisivo movimiento, la implementación de recortes administrativos por parte del presidente Éric Zemmour han tenido un éxito significativo, llevando a un incremento de la eficiencia y ganancias fiscales de la nación. La voluntad del presidente de optimizar la burocracia y de reducir el gasto estatal ha tenido un resultado positivo, dando un inicio prometedor a su mandato. Los recortes administrativos del presidente Zemmour, introducidos como parte de su extensa agenda para la reforma del Gobierno, buscaban incrementar la eficiencia, eliminar gastos innecesarios y reducir la carga fiscal a los contribuyentes. Al tomar medidas para optimizar la burocracia, el presidente busca crear una estructura gubernamental más pequeña y eficiente."
 france.122.a: "La sobrecargada administración ha encogido"
 france.123.t: "Referendo del FREXIT"
 france.123.d: "En un comunicado que ha puedo patas arriba a Francia y a Europa, el presidente Éric Zemmour ha anunciado sus planes de organizar un referendo sobre la membresía de Francia en la Unión Europea. La propuesta, conocida como FREXIT, marca un giro significativo en la política francesa y ha desatado intensos debates y discusiones sobre la futura relación del país con la UE. El anuncio del referendo del FREXIT ha recibido respuestas mixtas de distintos sectores de la sociedad. Sus partidarios lo ven como una oportunidad para afirmar la soberanía francesa, retomar el control sobre la economía y la migración y proteger los intereses nacionales. Argumentan que abandonar la UE permitiría a Francia firmar sus propios tratados comerciales, tomar decisiones de forma independiente en cuestiones clave y retomar el control de sus fronteras. Quienes se oponen al referendo del FREXIT expresan preocupación por las potenciales consecuencias de abandonar la Unión Europea. Enfatizan en los beneficios de ser miembro de la UE, como el mercado único, la estabilidad financiera y los esfuerzos colectivos para enfrentar desafíos a nivel global."
 france.123.a: "Puede que Zemmour se haya salido con la suya... ¿y Francia?"
 france.1231.t: "Francia vota por quedarse en la UE"
 france.1231.d: "Sorprendentemente, la opción por permanecer en la Unión Europea ha sido la ganadora en el tan esperado referendo del FREXIT, desafiando a las expectativas y asestando un duro golpe a la visión derechista del presidente Éric Zemmour de abandonar la UE. El resultado del referendo muestra las complejas dinámicas y la diversidad de opiniones en el electorado francés en lo que respecta al futuro de las relaciones del país con la UE. El resultado del referendo del FREXIT ha repercutido ampliamente en Francia y en la Unión Europea en su conjunto. Indica que una porción significativa de la población francesa valora los beneficios y oportunidades que da ser miembro de la UE, que incluyen el acceso al mercado único, la libre circulación de las personas y la toma de decisiones colectivas en asuntos importantes. El presidente Zemmour aún no ha hecho una aparición pública para reconocer la victoria por la permanencia en la UE, pero se cree que está preparando para lanzar demandas contra su propio gobierno."
 france.1231.a: "Un resultado decepcionante para Zemmour"
 france.1232.t: "Francia vota por abandonar la UE"
 france.1232.d: "En el anticipado referendo del FREXIT, la opción ganadora fue la de abandonar la UE, lo que ha desatado un terremoto político que se está sintiendo en toda Europa. El resultado de la votación refleja un cambio drástico en la política francesa y marca un punto de inflexión en la relación del país galo con la UE. La decisión de abandonar la UE tiene serias implicaciones tanto para Francia como para la propia UE. Al haber sido uno de los miembros fundadores de la UE, la salida de Francia ha provocado dudas sobre la cohesión del bloque, el futuro de la integración y la estabilidad de la eurozona. Se espera que inicie un periodo de intensas negociaciones entre Francia y la UE para determinar los términos de su separación y establecer una nueva base para sus relaciones."
 france.1232.a: "¡Hasta luego Maricarmen!"
 france.1232.b: "Preferimos una salida suave"
 france.124.t: "Disidentes rusos organizan una marcha en Francia."
 france.124.d: "En una muestra de solidaridad y como forma de solicitar apoyo internacional, disidentes rusos han organizado una marcha en Francia para llamar la atención sobre los abusos de los derechos humanos en Rusia y hacer un llamado para una mayor libertad en el país eslavo. La marcha, organizada como una demostración de rechazo hacia la agresión del Gobierno ruso a Ucrania y los países bálticos, busca esclarecer la difícil situación de activistas, periodistas e individuos perseguidos en Rusia.\nEsta marcha ha sido tachada como un contubernio por el régimen en Moscú, pero ha impactado profundamente al pueblo francés, reforzando la voluntad de derrocar al régimen ruso actual."
 france.124.a: "No se preocupen, liberaremos su patria."
 france.125.t: "Formación de las Brigadas de Disidentes Rusos"
 france.125.d: "En un desarrollo significativo en la Guerra Europea, disidentes rusos han formado brigadas militares en Francia, dedicadas a combatir el régimen opresivo de Moscú y luchar por la libertad. Compuestas por desertores del ejército ruso, activistas e individuos con experiencia militar, estas brigadas buscan combatir las injusticias y plantarle cara al gobierno ruso y sus tácticas represivas. La formación de brigadas de disidentes en Francia también sirve para fortalecer la solidaridad internacional con la oposición rusa. Estas brigadas también simbolizan una lucha colectiva contra los abusos de los derechos humanos y arrojan luz sobre la lucha por la democracia dentro de Rusia."
 france.125.a: "¡Pronto reclamarán su hogar!"
 france.126.t: "Juicio a los partidarios del golpe de estado"
 france.126.d: "Tras unas breves escaramuzas en la campiña francesa, finalmente hemos dado con el paradero de los últimos generales cobardes y traidores responsables de este desastre, escondidos como ratas en una cabaña a medio hacer. Mientras que nos los llevábamos del campo, los autoproclamados salvadores de Francia, seguidores de una ridícula ideología que defendía la superioridad del pueblo francés, empezaron a lloriquear, suplicando por piedad para que sus vidas sean perdonadas. Nuestros soldados allí presentes miraban con sus ojos inyectados en ira a esos cobardes generales y mientras empuñaban sus fusiles, esos \"generales\" intentaron vomitar más mentiras pero una ráfaga de balas los silenciaron antes de que tuviesen la oportunidad de verter más mentiras.\n\nY con eso, los remanentes fascistas fueron erradicados de nuestra nación, asegurándonos de que nunca volverán a hacernos daño."
 france.126.a: "¡Traidores!"
 france.127.t: "Juicio a los simpatizantes comunistas"
 france.127.d: "Los simpatizantes comunistas fueron finalmente acorralados en París y sus líderes estaban ahora a nuestra merced. Su hipócrita ideología, que afirma liberar a todos los trabajadores de Francia y solo provocaría que nuestro pueblo muriese de hambre, finalmente sería erradicada. Los supuestos salvadores de la clase obrera fueron vistos por la población suplicando clemencia mientras el pelotón de fusilamiento se preparaba para abrir fuego.\n\nCon el tiempo, la multitud crecía más y más. Esta multitud era más bien una turba enfurecida que insultaba duramente a los cobardes comunistas, llamándolos traidores, violadores y asesinos. La multitud estalló en celebración cuando el pelotón del fusilamiento abrió fuego.\n\nAl final, solo hubo sangre y los sucios cadáveres de los traidores cuando la concentración se empezó a dispersar, volviendo a su vida cotidiana.\n\nY de este modo, podemos estar seguro de que la pesadilla que es el comunismo haya desaparecido de Francia para siempre."
 france.127.a: "¡Escoria roja!"
 france.128.t: "La República Francesa demanda el retorno de Córcega y la flota"
 france.128.d: "Tras que se asentara el polvo de la guerra civil más sangrienta que haya asolado la nación, los vencedores se centraron inmediatamente en completar su objetivo de unificar Francia. Naturalmente, desviaron su atención hacia la joya mediterránea considerada por los antiguos griegos como \"la isla más preciosa\", Córcega. Cuando estalló la guerra civil, la flota nacional, que se habían retirado del continente, protegieron la isla, salvándola de los horrores de la guerra.\n\nLa República Francesa ha emitido una demanda formal al Comando Naval Corso, pidiendo que juren lealtad al gobierno central de París. Adicionalmente, deberán enviar los buques más destacados de la flota, incluyendo portaviones a la base naval de Tolón, donde los oficiales y marineros de la Armada francesa podrán tomar el control de los barcos. Tras una breve discusión, los almirantes aceptaron las demandas de la República. No había oposición interna a la idea de reincorporarse a la patria."
 france.128.a: "Los ancestros de la Francia Libre nos une."
 france.129.t: "Juicio a la junta fascista y sus crímenes contra el pueblo francés"
 france.129.d: "El cobarde gobierno de la junta fascista se sentó atada en la calle, notoriamente golpeados en frente de una multitud parisina. Mientras narrábamos sus muchos horrendos crímenes contra la población francesa, a pesar de su tonta ideología que clamaba la grandeza de los franceses y de lo superior que son frente a otros, una vez llevamos a sus lideres a las guillotinas los cobardes fascistas empezaron a rogar por piedad como los desgraciados que son. Su ultimo desperado intento fue tratar de apelar a la muchedumbre, tratando de alentar una revolución contra nuestro propio régimen.\n\nEsto causo una gran furia entre la multitud, llevando a que merecidamente se lancen fuertes insultos contra los cerdos fascistas, algunos tomando objetos de la calle que fueron lanzados contra ellos e incluso un par tratando de escalar y atacarlos, pero para mantener el orden tuvimos que detenerlos con nuestra fuerza policial. En frente de la gran multitud que gritaban eslóganes tales como \"SIN PIEDAD PARA LOS CERDOS FASCISTAS\" ellos serian ejecutados por la guillotina y sus cabezas, un símbolo de la tiranía, arrojadas al fuego para poder finalmente extinguir esa asquerosa ideología. \n\nDe esta manera, la vela del fascismo en Francia es apagada para siempre."
 france.129.a: "¡Traidores a la república!"
 france.130.t: "Juicio a los políticos liberales oligárquicos"
 france.130.d: "The bastards of the old regime were discovered hiding like rats in a shack outside of Paris and as they were paraded throughout Paris on a trailer, Crowds of people gathered to watch as they were publicly displayed, The crowd rightfully furious at the cowardly old politicians that ruined our beautiful country began to throw rocks and insults at all the leaders as they approached the Guillotine. Some of them would make makeshift signs from cardboard boxes that contained slogans such as \"NO MERCY TO THE LIBERALIST OLIGARCHS\" and \"DEATH TO THESE TRAITORS\".\n\nAs they were brought up on the guillotine, the wretched liberals requested to say a few words before their inevitable execution like the spineless cowards they were, instead of showing remorse for their actions they would instead try to spread lies and try to turn our people against us, Instead of remorse, their words were drowned out by the enraged chants of the crowd demanding \"OFF WITH THEIR HEADS\" The blade would finally fall on every single traitor with each strike destroying the remnants of the old order. Their heads, a symbol of pain and suffering were thrown into the flames to forever be burnt to ashes. With that, the shame and evil that the old regime brought onto our nation is now apart of France's long history."
 france.130.a: "¡Traidores del pueblo!"
 france.131.t: "La República Popular Francesa demanda el retorno de Córcega y la flota"
 france.131.d: "Tras que se asentara el polvo de la guerra civil más sangrienta que haya asolado la nación, los vencedores se centraron inmediatamente en completar su objetivo de unificar Francia. Naturalmente, desviaron su atención hacia la joya mediterránea considerada por los antiguos griegos como \"la isla más preciosa\", Córcega. Cuando estalló la guerra civil, la flota nacional, que se habían retirado del continente, protegieron la isla, salvándola de los horrores de la guerra.\n\nLa nueva República Popular ha enviado un mensaje al Comando Naval Corso, pidiendo que juren lealtad al Gobierno revolucionario. Adicionalmente, deberán enviar los buques pesados anclados en Córcega deberán regresar al continente bajo la supervisión de un enviado especial.\n\nTras varios días de discusiones, los almirantes aceptaron las demandas del Gobierno central. A pesar de las dudas que se tenían sobre la nueva Francia roja, la mayoría del personal se mantuvo optimista al pensar en regresar a la patria."
 france.131.a: "El rompecabezas de la república popular está completo."
 france.132.t: "Juicio a los izquierdistas, comunistas y espías soviéticos"
 france.132.d: "Mientras tropas se movían a los más profundo del corazón de la amenaza roja continuamos viendo la misma historia. Aseguramos otra gran victoria, un paso más para reclamar nuestro país, y aun así los comuneros se mantienen con rebelión y insurgencia en nuestros campos y incluso nuestras ciudades. Nuestras cárceles ya están llenas de todos estos izquierdistas, socialistas y comunistas y acción inmediata es necesaria si es que queremos ver cualquier progreso real en nuestro nuevo gobierno. Ya no quedara ninguna oposición antipatriótica a los verdaderos cambios y la nueva era de Francia que buscamos lograr. Los cambios reales solo pueden ser vistas con acciones que los débiles no se atreverían ni a soñar... pero que nosotros si."
 france.132.a: "¡Y no habrán críticas!"
 france.133.t: "Juicio a los liberales antifranceses"
 france.133.d: "Los juzgados se mantuvieron llenos desde que empezamos a recuperar territorio de la traidora República Francesa al inicio de la guerra civil. Ahora que finalmente podemos comenzar nuestra honrada justicia a todos aquellos que desearon destruir a Francia desde dentro. La mayoría obtuvo fuertes sentencias para que se puedan pudrir en algún lado fuera de la vista donde pertenecen mientras otros tales como la previa administración fueron dados sentencias más inmediatas como venganza por destruir nuestra una vez orgullosa nación. Esto es solo el inicio de nuestra justa cruzada contra los males que plagaron nuestro nación por décadas."
 france.133.a: "Perros liberales..."
 france.134.t: "El Gobierno de Defensa Nacional demanda el retorno de Córcega y la flota"
 france.134.d: "After the dust settled from the nation's bloody civil war, the victors immediately set their sights on the grand historical goal of fully unifying France. Naturally, their attention turned to the Mediterranean gem that the ancient Greeks called the \"most beautiful island\"—Corsica. When the civil war broke out, the National Navy, which had withdrawn from the mainland, protected the island, sparing it from the ravages of war.\n\nThe new French Government of National Defense has issued a formal notice to the Corsican Naval Command, demanding their immediate allegiance to the Paris. At the same time, the fleet must be disarmed and remain on the island until domestic naval officers and sailors can take over.\n\nAfter lengthy and heated discussions, the admirals, fearing military reprisals, ultimately agreed to comply with all of the National Defense government's demands. Although there were significant internal disagreements about rejoining the motherland, no one dared defy the decision of their superiors."
 france.134.a: "La tierra natal de Napoleón vuelve a Francia."
 france.135.t: "Los militares establecen un nuevo gobierno"
 france.135.d: "Después del resultado de una sangrienta guerra civil que destrozo la nación, una junta militar fue establecida para restaurar orden y estabilidad. La junta, compuesta de oficiales militares de alto rango, tomo control del Gobierno, citando la necesidad de un fuerte liderazgo en cara del caos generalizado. Mientras la junta consolida su poder, se enfrenta al abrumador trabajo de reconstruir la nación devastada por la guerra y restaurando fe en el Gobierno. El camino enfrente esta lleno de desafíos, pero la junta se mantiene firme en su compromiso con la restauración de la paz y prosperidad de la nación."
 france.135.a: "Emerge un nuevo régimen"
 france.136.t: "Grupos fascistas exijen representación en el Gobierno"
 france.136.d: "En pos del establecimiento de una junta militar después de una sangrienta guerra civil, muchos políticos generalmente fascistas y la milicia liderada por Yven Benedetti, han demandado un asiento en la mesa del nuevo gobierno. Clamando que representan los intereses de una porción significante de la población, los fascistas argumentan que su importancia en la guerra civil debe ser representado dentro del nuevo cuerpo gobernante. Sim embargo, sus demandas han causado controversia y división dentro de la junta y la población en general."
 france.136.a: "No podemos confiar en esos hombres"
 france.136.b: "¡Juntos, aseguraremos el futuro de Francia!"
 france.137.t: "Benedetti es investido como dictador de Francia"
 france.137.d: "Benedetti salió al balcón del Palacio del Eliseo y observó a las miles de personas que se congregaron para escucharle hablar. Podía sentir la presión del momento, no había lugar para equivocaciones.\n\nMientras agarraba el micrófono, sentía algo dentro de él, sentía el odio acumulado. Odio hacia los rusos y la élite corrupta que destruyó su hermoso país y que llevaron a muchos de sus compatriotas franceses a la tumba. Afirmó que Francia al fin era libre de las élites corruptas que vendieron a su país y trataron de reemplazar su cultura y su pueblo llenando la nación inmigrantes. También habló de los soviéticos, a los que llamó escoria subhumana. Juró a todo aquel que le escuchaba que formará un gran ejército y que marchará personalmente hasta Moscú para quemarla hasta los cimientos para poder así vengar a cada francés que murió combatiendo a los rusos en la Guerra Europea.\n\nBenedetti miró a la multitud, no solo le había aplaudido, también empezaron a corear cánticos como \"¡MUERTE A LOS CERDOS SOVIÉTICOS!\" y \"¡VIVA BENEDETTI!\"\n\nEn ese momento se dio cuenta de que no solo era un líder. Sabía que estaba destinado a ser el salvador de Francia, un valiente guerrero que estaba preparado para hacer todo lo necesario para restaurar la grandeza de su país, aún si esto supone el derramamiento de sangre de millones de personas de la otra mitad del continente. Ganó el corazón del pueblo y sabía que no podía fallarles."
 france.137.a: "Salut!"
 france.140.t: "El compromiso bretón"
 france.140.d: ""
 france.140.a: "Conceder el título a Jean, Conde de París"
 france.140.b: "Conceder el título al príncipe de Gales, Guillermo"
 france.140.c: "Disolver la dieta bretona"
 france.141.t: "Las protestas empeoran"
 france.141.d: "A pesar de nuestros mejores esfuerzos para apaciguarlas, las protestas por Majid Kattan se siguen intensificando, y no parece que esto vaya a cambiar. Los manifestantes destrozan las calles, queman banderas, ocupan las vías y tratan de luchar constantemente contra nosotros, aún con las concesiones y contramedidas que hemos tomado.\n\nLa situación se continúa deteriorando, sin importar lo que pase. Parece ser que cada día, más y más se ponen en contra nuestra, más y más recrudecen su lucha contra el Estado, y todo por la muerte de un solo hombre. ¿Por qué? El policía responsable ya ha enfrentado la justicia, ¿por qué siguen? ¿Cuál es el propósito de todo esto, por que seguir luchando?\n\nNo importa cuantas veces nos hagamos la pregunta, no cambiará la situación. Las protestas deben acabar, sea como sea."
 france.141.a: "¡Maldita sea!"
 france.141.b: "No por mucho tiempo..."
 france.142.t: "Estalla la violencia tras el asesinato de Majid Kattan"
 france.142.d: "The people of France have been severely angered by the news of the killing of an unarmed Tunisian National named Majid Kattan in Bobigny, a suburb of Paris. A video that surfaced on social media of the man being yelled aggressively to get down, Despite Majid's efforts to cooperate with the police, he would be shot by an unnamed Police Officer. This has sparked mass outrage with a huge protest being organized at the Police Headquarters with people calling for the arrest of the unnamed officer and yelling out slogans such as \"Justice for Kattan!\" These slogans have gone viral in French media and more and more people are joining in the protests that have escalated into rioting, as during last night the demonstrators torched cars, trashed the city, vandalized bus stops and shot fireworks into the police. Although we did not receive this news up until now, Paris is already engulfed in the chaos and flames of Anarchy."
 france.142.a: "¡No somos América!"
 france.143.t: "El Gobierno enclenque"
 france.143.d: "Con el enfoque de Francia en la guerra con Rusia, el Gobierno militar de Argelia ha colapsado, llevando a la región al caos. El abandono de Argelia por parte del Gobierno, rebasado por sus esfuerzos bélicos, ha alimentado el resentimiento entre la población argelina. Esto, combinado con el creciente malestar y la falta de un gobierno efectivo, ha llevado al colapso del Gobierno militar."
 france.143.a: "¡Sálvese quien pueda!"
 france.144.t: "Contramanifestantes armados"
 france.144.d: "Hemos cometido un grave error. Con nuestras mayores esperanzas puestas, armamos a los contramanifestantes con armas que esperábamos que utilizarían para pacificar la situación, dándoles balas de goma y otras contramedidas para que las usen contra los manifestantes violentos. Sin embargo, la violencia solo causa más violencia.\n\nTodo lo que hemos conseguido ha sido escalar aún más la situación. Dándoles aún más razones para que estén enfadados, las protestas se han vuelto cada vez más masivas y más violentas. Un torrente de ira cae sobre la nación de Francia. No hay nada que extinga el fuego por ahora."
 france.144.a: "Alto muchachos NO usen las armas de verdad."
 france.145.t: "Se establece un estado Pier-Noir"
 france.145.d: "Tras el colapso del Gobierno Militar Francés de Argelia, los militares que se quedaron en Argelia han dado poder a Jacques Villard y a sus numerosos grupos resurgentes de Pied-Noir.\n\nEstos grupos, ahora al mando de un territorio que ha oprimido por mucho tiempo a la población francófona, ha establecido un estado semi-segregacionista llamado la Fédération des Deux Rives."
 france.145.a: "¡Sólo esperen hasta que regresemos!"
 france.151.t: "Presidente [FRA.GetLeader],"
 france.151.d: "Espero que esta carta le encuentre con buena salud y buen ánimo. Es un gran honor y respeto para mí aprovechar esta oportunidad para expresarle mi más sincera gratitud por su inquebrantable y excepcional servicio a nuestro amado país, Francia.\n\nSu visión estratégica y su acertada toma de decisiones han contribuido significativamente a la seguridad y la prosperidad de nuestra nación. Su inquebrantable apoyo a nuestras fuerzas armadas no solo ha reforzado nuestras capacidades, sino que también ha fomentado un sentido de unidad y propósito entre las filas militares."
 france.151.a: "[THIS.GetRank] [THIS.GetName]."
 france.152.t: "Presidente [FRA.GetLeader],"
 france.152.d: "Espero que esta carta le llegue con buena salud y buen ánimo. Le escribo con profundo pesar y humildad por la carta anterior que le envié, en la que criticaba su capacidad de liderazgo. Tras reflexionar y considerar, me he dado cuenta de lo inapropiadas que fueron mis palabras y de la falta de respeto que transmitían.\n\nSi bien no estoy completamente de acuerdo con todas las decisiones o directrices que ha tomado como presidente, comprendo la inmensa complejidad de su función y los desafíos que enfrenta al liderar nuestra nación. Espero que todos podamos trabajar juntos, independientemente de nuestras diferencias, para encontrar puntos en común y soluciones que beneficien al pueblo francés."
 france.152.a: "[THIS.GetRank] [THIS.GetName]."
 france.153.t: "Presidente [FRA.GetLeader],"
 france.153.d: "Espero que esta carta le llegue bien. Le escribo con profunda gratitud y honor por haberme mencionado durante la reciente reunión militar. Agradezco profundamente su reconocimiento a mis contribuciones y a las de las Fuerzas Armadas, y me siento honrado por sus amables palabras.\n\nLe aseguro que estoy más motivado que nunca para seguir defendiendo los principios de honor, integridad y disciplina que defienden nuestras Fuerzas Armadas. Su reconocimiento refuerza mi dedicación a servir a nuestra nación al máximo de mis capacidades y a contribuir positivamente a su crecimiento y prosperidad."
 france.153.a: "[THIS.GetRank] [THIS.GetName]."
 france.154.t: "Presidente [FRA.GetLeader],"
 france.154.d: "Le escribo esta carta con gran pesar y profunda decepción por el liderazgo que ha demostrado durante su mandato como Presidente de nuestra nación. Con gran pesar, debo expresar mi profunda preocupación por lo que percibo como una importante falta de competencia en su rol como líder de nuestro país.\n\nComo general militar que ha dedicado su vida al servicio de esta nación, es preocupante presenciar la falta de visión estratégica y la ausencia de un liderazgo sólido al más alto nivel."
 france.154.a: "[THIS.GetRank] [THIS.GetName]."
 france.1521.t: "Presidente [FRA.GetLeader],"
 france.1521.d: "Espero que esta carta lo encuentre de muy buen humor. Le alegrará saber que le escribo para expresarle mi más sincera y profunda gratitud por haberme rescatado de las profundidades de mi retiro forzoso, completamente anodino y aburrido. ¡Qué emocionante giro de los acontecimientos ha sido, gracias a su notablemente astuta decisión!\n\nSu impecable oportunidad para revertir mi exilio del servicio activo no pudo haber sido más oportuna. Justo cuando pensaba que me había acostumbrado demasiado al ritmo pausado del retiro, valientemente me devolvió a la lucha. La perspectiva de navegar de nuevo por las complejidades de la burocracia militar y enfrentarme a los innumerables matices políticos que llevaron a mi retiro era un pensamiento que me quitaba el sueño. Usted, señor, es mi héroe."
 france.1521.a: "[THIS.GetRank] [THIS.GetName]."
 france.1531.t: "Presidente [FRA.GetLeader],"
 france.1531.d: "Permítame reunir todo mi entusiasmo para expresarle mi gratitud por el honor que me ha otorgado: la oportunidad de retirarme del ejército. Me ha dejado prácticamente sin palabras, o mejor dicho, asombrado, por su impecable oportunidad en este asunto.\n\nNo todos los días un general militar experimentado tiene la fortuna de que le impongan su inminente jubilación de una manera tan considerada y convincente. De verdad, su habilidad para tomar decisiones es, como mínimo, impresionante. La expectativa de días de ocio, sin la adrenalina del servicio activo, se estaba convirtiendo en una carga insoportable, y le estoy en deuda por liberarme de un destino tan tortuoso."
 france.1531.a: "[THIS.GetRank] [THIS.GetName]."
 france.1532.t: "Presidente [FRA.GetLeader],"
 france.1532.d: "Espero que esta carta lo encuentre de muy buen humor. Le alegrará saber que le escribo para expresarle mi más sincera y profunda gratitud por haberme rescatado de las profundidades de mi aburrida y monótona jubilación forzosa. ¡Qué emocionante giro de los acontecimientos ha sido, gracias a su extraordinariamente astuta decisión!\n\nDebo expresar mi admiración por su audaz compromiso de ignorar los prejuicios políticos y valorar la brillantez única que una persona como yo aporta."
 france.1532.a: "[THIS.GetRank] [THIS.GetName]."
 france.160.t: "El establishment colapsa"
 france.160.d: ""
 france.160.a: "Todo para los vencedores"
 france.161.t: "Reunión de las mentes revolucionarias"
 france.161.d: "Finalmente, se ha convocado a las mentes y pensadores más brillantes del proletariado y a la vanguardia de nuestra república socialista para formar un congreso. Sin embargo, incluso habiendo formado ya el congreso, todavía no se ha decidido quien dará el discurso inaugural, uno de los más importantes para esta gran reunión.\n\nMuchos apoyan al padre de nuestra revolución, Fabien Roussel, quién nos ha liderado desde el principio. Después de todo, sin su liderazgo, ¿dónde estaríamos ahora? ¿Bajo la bota fascista o seguiríamos en la descarriada república? Muchos creen que él es el miembro más prominente e importante de nuestra revolución.\n\nSi bien esto es cierto para la mayoría de nosotros, algunos creen que el más abierto de mente y liberal Didier Daeninckx es quien debería dar las palabras iniciales, representando a los socialistas y comunistas más descentralistas y utópicos dentro de nuestras filas. Sin importar que decisión tomemos, nuestro país se verá enormemente influenciado por quién nos hayamos decantado, así que debemos reflexionar y elegir sabiamente."
 france.161.a: "Léaument dará las palabras de inicio"
 france.161.b: "Roussel dará las palabras de inicio"
 soviet_france_guide_tt: "§REl apoyar a los autoritarios al principio para después abrazar el anarquismo en el último momento hará sentir a ciertas fuerzas traicionadas, y estarán dispuestas a acturar.§!"
 france.161.c: "Daeninckx dará las palabras de inicio"
 france.162.t: "El papel de las fuerzas armadas"
 france.162.d: "El ejército es una institución que ha causado numerosos debates en nuestro congreso, es algo que ha sido controversial en nuestros círculos incluso desde el nacimiento de la izquierda política. El ejército fue usado varias veces para proteger al estado y acabar con los optimistas socialistas y revolucionarios. Ahora debemos decidir que hacer con esta arcaica institución.\n\nAlgunos son creyentes de que las fuerzas armadas son el brazo armado del proletariado, que son la herramienta que nos permitirá expandir la revolución más allá de nuestras fronteras, la espada que liberará a los pueblos por la voluntad popular. Un arma para nadie más que la clase obrera.\n\nSin embargo, muchos miran la historia reaccionaria del ejército y consideran que solo es útil como un medio de opresión, algo que solo puede ser utilizado por dictadores y por aquellos que luchan por el capital hasta su último suspiro, viendo al ejército como nada más que una horrenda y repugnante mancha en la historia del mundo que debe eliminarse lo antes posible.\n\nEntre estas dos opiniones antípodas, existe un punto medio - la idea de que el ejército simplemente exista para proteger nuestra revolución. El ejército no es algo que se deba glorificar, ni tampoco demonizar. Es el medio por el que protegeremos a nuestro pueblo y a Francia, es algo que debemos emplear a regañadientes por el bien de nuestro pueblo."
 france.162.a: "Son una fuente de orgullo nacional"
 france.162.b: "¡Son la espada del proletariado!"
 france.162.c: "¡Son un instrumento de la tiranía!"
 france.162.e: "Son un medio para alcanzar un fin."
 france.163.t: "La importancia del proletariado y la clase trabajadora"
 france.163.d: "El proletariado es la base de la lucha revolucionaria, esto es algo en que todo el consejo está de acuerdo. Sin embargo, existe un gran debate dentro de nuestras filas sobre el verdadero rol del proletariado en nuestra nueva nación.\n\nMuchos de los nuestros son idealistas, creen que la revolución mundial es inevitable, algo que debemos defender y luchar por ello, por los trabajadores del mundo. Creen al 100% que somos capaces de liberar al proletariado global.\n\nTambién hay muchos que creen que el proletariado son el arma para luchar contra la opresión, el arma de una revolución perpetua. El proletariado es el único responsable de si mismo y de sus deseos, y de que deben luchar, y lucharán, por esa libertad.\n\nLa tercera posición afirma que la revolución es algo que ya ha sido completada y creen que el proletariado ya ha sido liberado en Francia, y que debemos mantener su libertad como el corazón palpitante de la revolución, sin importar que tan fuertes sean las adversidades."
 france.163.a: "Somos la cuna de la revolución"
 france.163.b: "Somos la primera ficha del dominó de la revolución global"
 france.163.c: "El pueblo es la punta de lanza de la revolución."
 france.163.e: "El pueblo es el corazón de la revolución."
 france.164.t: "El papel del Estado"
 france.164.d: "El Estado es algo que ha provocado disputas en los círculos los comunistas y socialistas que se remontan hasta cuando Marx y Engels publicaron sus obras. Es el asunto con el que más chocamos, es algo sobre lo que discutimos incluso con quienes son más afines a nosotros. Esto debe detenerse de una vez por todas, decidiremos como zanjar el asunto del Estado.\n\nLa postura mayoritaria defiende que el Estado debe existir, es una institución fundamental para proteger al proletariado y a nuestro pueblo. Es algo que debe trabajar para liberar a otros trabajadores, es algo que debe estar orientado siempre a la liberación global. Si bien esta postura es mayormente aceptada, no está exenta de discrepancias.\n\nDesde un punto de vista anarquista, el Estado es inherentemente opresor del proletariado. No debe existir, pues la existencia misma del Estado fuerza al trabajador formar parte de un sistema hecho por gente en una posición más elevada que constantemente tratan de evitar que el trabajador ascienda. Si bien fuera del círculo encabezado en la práctica por Coupat esta opinión es impopular, sigue siendo una a considerar. Después de todo, uno puede afirmar que la abolición del Estado es algo que hasta Marx hubiese deseado.\n\nPor otro lado, existe la postura, defendida normalmente por trotskistas y gente afín a ellos, que el Estado debe existir únicamente para hacer avanzar la sociedad revolucionaria. El Estado es algo que los trabajadores puedan usar y movilizarse en contra de este según sea necesario, es algo contra que pueden luchar los trabajadores y liberarse, es el sostén de la revolución permanente y de la lucha constante por los derechos del proletariado mediante el constante derrocamiento de los opresores.\n\nDebemos ser cuidadosos a la hora de decantarnos por una opción, pues esta es la cuestión más importante de todas. Formará parte de la historia de Francia, para bien o para mal. El Estado será el meollo de la revolución."
 france.164.a: "El Estado debe salvaguardar la revolución y nuestra cultura."
 france.164.b: "El Estado debe trabajar para acelerar la revolución global."
 france.164.c: "¡El Estado debe disolverse!"
 france.164.e: "El Estado debe hacer avanzar la revolución y la sociedad."
 france.165.t: "El portavoz del congreso es elegido"
 france.165.d: "La revolución es un punto de inflexión en la historia, y es escencial unificar las distintas facciones para asegurar que sus logros queden profundamente arraigados a la historia de Francia, su sistema político, su estructura social y el pensamiento colectivo. Para este fin, debemos ser extremadamente cuidadosos con la selección del representante principal de la revolución. Este individuo no solo hablará por la revolución, sino que tambien servirá como el canal mas importante para la voz del pueblo y como un símbolo de unidad nacional.\n\nEntre los principales candidatos a portavoz, han surgido varios individuos como los más competitivos a los ojos del pueblo: Jean-Luc Mélenchon, fundador de \"Francia Insumisa\", ha sido durante mucho tiempo un destacado líder de izquierda con una experiencia en maniobras políticas inigualable y un gran prestigio entre la población en general. Junto a él, los miembros del Nuevo Frente Popular, que han estado activos en la política electoral, también son fuertes contendientes. Entre ellos se encuentran representantes del Nuevo Partido Anticapitalista, como el firme trabajador automotriz anti-burgués Philippe Léaument y la elocuente líder del Movimiento de Lucha Obrera, Nathalie Arthaud, ambos estrechamente alineados con los ideales trotskistas.\n\nAdemás, han ganado una atención significativa los participantes ajenos a la clase política tradicional: el activista anarquista Julien Coupat, que ha cumplido condena en una prisión del Gobierno de Macron y es conocido por sus propuestas radicales; y quizás el candidato más llamativo, Didier Daeninckx, un prolífico escritor con fuertes lazos con el campo comunista. Sus agudas críticas a las realidades sociales en decadencia y a las desigualdades de clases le han ganado el apoyo del proletariado, el desdén de los reaccionarios y la preocupación de los moderados.\n\nAsi, la eleccion del pueblo es..."
 france.165.a: "¡Léaument lo dirigirá!"
 france.165.b: "¡Arthaud debe dirigirlo!"
 france.165.c: "¡Coupat debe ser nuestro cabecilla!"
 france.165.e: "¡Daeninckx debe tomar el mando!"
 france.165.f: "¡Mélenchon debe tomar el mando!"
 france.166.t: "Los Patriotas por la Revolución se hacen con el poder"
 france.166.d: "Cuando finalmente el polvo se asentó, el futuro de la revolución se volvió claro, y un horizonte sin precedentes se abrió ante el pueblo de Francia.\n\nMientras la revolución se enfrentaba a la amenaza de ser secuestrada por una nefasta alianza de revisionistas y reaccionarios capitalistas, los patriotas no se quedaron de brazos cruzados. Bajo el liderazgo de verdaderos revolucionarios, la conspiración para hacerse con el poder fue aplastada de inmediato. Al igual que lo hicieron los pioneros de 1789, la acción decisiva fue la única y mejor opción.\n\nA partir de ahora, podemos dejar de lado todos los obstáculos y comenzar a trazar nuestro plan revolucionario para Francia. Reviviremos los valores envenenados por el capitalismo, estabilizaremos el orden interno para unir a la gran mayoría del pueblo y nos centraremos en eliminar los males acumulados del viejo gobierno. El socialismo francés ya no fluctuará como la marea; en cambio, se alzará como un faro que ilumina el camino de esta gran y atribulada nación."
 france.166.a: "Vive la Révolution!"
 france.167.t: "Los antireaccionarios se sublevan"
 france.167.d: "Cuando finalmente el polvo se asentó, el futuro de la revolución se volvió claro, y un horizonte sin precedentes se abrió ante el pueblo de Francia.\n\nBajo su fachada suave y cortés, las fuerzas siniestras que pretendían socavar la revolución han revelado su verdadera naturaleza, casi desviando a Francia de su camino. Solo a través de una acción decidida y enérgica podemos despertar al pueblo francés y frustrar los astutos planes de los contrarrevolucionarios. Haremos que el vasto proletariado se dé cuenta de que, sin los parásitos internos que corrompen el gobierno, los burócratas estancados, los lobistas de lengua de plata en el parlamento y los jactanciosos activistas callejeros, la causa revolucionaria puede continuar y tener éxito.\n\nCuando la revolución sea verdaderamente entregada a las manos del pueblo, convirtiéndose en un movimiento popular, los defensores de la revolución se retirarán naturalmente de la primera línea. Pero esto no significa que se alejarán de la vida política. En cambio, se mantendrán al lado del pueblo, inmersos en la marea del gran cambio de la historia."
 france.167.a: "¡Aplasten a los falsos rojos!"
 france.1671.t: "Insureccion antirrevolucionaria"
 france.1671.d: "Un nuevo jugador ha entrado en la caótica arena política de la República, y su creciente influencia es imposible de ignorar. El general Nicolas Casanova, comandante militar de Estrasburgo, ha unido a sus seguidores y ha anunciado la formación de una organización política llamada 'La Guardia Revolucionaria Francesa'. Curiosamente, el nombre tiene una gran similitud con 'La Guardia Revolucionaria Islámica' en países como Irán, y sus métodos también son similares.\n\nComo soldado, Casanova aboga por gobernar con puño de hierro, mezclando la disciplina militar con el socialismo para influir en cada aspecto de la sociedad francesa. Si bien muestra cierta tolerancia por las tradiciones culturales, tiene una fuerte preferencia por el autoritarismo y la represión de estilo soviético. Él concibe a la Guardia Revolucionaria como un caldo de cultivo para una vanguardia revolucionaria, similar a la del PCUS. En respuesta al derrotismo generalizado y el declive, Casanova ve la venganza contra Rusia como el objetivo final de la revolución francesa y pide el establecimiento de un sistema de defensa nacional integral.\n\nSu facción se alinea estrechamente con los nuevos partidos jacobinos en el espectro político, pero es más radical en cuanto a autoritarismo y militarismo.\n\n¿Se convertirá en el Stalin de Francia o es simplemente otro oportunista al estilo de Boulanger? Si esto resulta ser beneficioso o perjudicial, aún está por verse"
 france.1671.a: "¡Aplastad a estos tiranos!"
 france.1671.b: "¡Debemos salvar a la revolución!"
 france.168.t: "La Unión Comunista Libertaria toma el poder"
 france.168.d: "When the dust finally settled, the future of the revolution became clear, and an unprecedentedly bright horizon opened before the people of France.\n\n\"Il n'est pas de sauveurs suprêmes, Ni dieu, ni César, ni tribun, Producteurs, sauvons-nous nous-mêmes !!\"\n\nThe ultimate goal of revolutionary struggle is not to cultivate reverence for another form of power or submission to any order. On the contrary, true success is achieved only when people no longer fear authority or rulers, are resolute in their determination to control their own destiny, and unite against any attempts to dominate others.\n\nNow, we will accelerate this process. After years of arduous struggle and relentless advocacy, the Libertarian Communist Union born from the anarchist movement and workers' alliances has finally stepped into the spotlight. Any signs of corruption will be rigorously guarded against; taking power will not lead us to complacency. On the contrary, it will drive us to continue fighting inequalities across political, economic, environmental, cultural, and gender identity realms, with the ultimate goal of eradicating the last remnants of the old order."
 france.168.a: "Vive la Révolution Noire!"
 france.169.t: "Francia Inmóvil toma el poder"
 france.169.d: "Cuando finalmente el polvo se asentó, el futuro de la revolución se volvió claro, y un horizonte sin precedentes se abrió ante el pueblo de Francia.\n\nEl pueblo francés ha demostrado al mundo a través de sus elecciones que la revolución socialista de Europa puede volver a brillar en el siglo XXI, pero bajo una forma completamente nueva. La Francia Insumisa, columna vertebral del Nuevo Frente Popular, se ha mantenido firme en el corazón de regímenes corruptos donde numerosos portavoces burgueses conspiran. Han luchado sin descanso contra todas las injusticias impuestas al pueblo. Ahora, a medida que los antiguos rebeldes se convierten en los nuevos gobernantes, una nueva era se despliega lentamente ante el pueblo francés. Muchos se preguntan: ¿Podrá continuar la revolución? ¿Dará la historia un paso atrás una vez más?\n\nLos líderes de La Francia Insumisa están decididos a que un escenario tan terrible nunca ocurra bajo su mandato. Es hora de deshacerse del manto sangriento que ha envuelto a Marianne. A partir de ahora, se reavivará el preciado espíritu de fraternidad entre el pueblo francés, y la revolución se transformará en un nuevo movimiento, impulsando cambios profundos en la esencia misma de la naturaleza humana."
 france.169.a: "Vive la Révolution Rose!"
 france.170.t: "Movimiento de Lucha Obrera toma el poder"
 france.170.d: "Cuando finalmente el polvo se asentó, el futuro de la revolución se volvió claro, y un horizonte sin precedentes se abrió ante el pueblo de Francia.\n\nLa clase obrera ha hecho, desde hace mucho tiempo, una contribución irremplazable y decisiva a la causa progresista y a los derechos humanos en Francia. Ya sea creando riqueza o construyendo una sociedad más igualitaria, los trabajadores siempre han estado a la vanguardia, encarnando verdaderamente el noble espíritu de la nación francesa. A lo largo de los siglos, la represión y la opresión dirigidas a la clase obrera han sido particularmente brutales y severas. Pero hoy marca el final de esa era. Un partido político que representa genuinamente la justa causa y los poderosos lemas de la clase obrera ha tomado ahora la delantera en la revolución y la construcción socialista de Francia.\n\nEl Movimiento de Lucha Obrera no solo se centra en desmantelar los vestigios del capitalismo reaccionario en Francia, sino que también mira más allá de las fronteras nacionales. A lo largo de Europa y alrededor del mundo, incontables hermanos y hermanas de la clase trabajadora están luchando por su propia felicidad. El progreso de los trabajadores franceses los inspirará y hará sonar el toque de clarín para una ofensiva a gran escala contra el mundo en decadencia."
 france.170.a: "Vive la Révolution Mondiale!"
 france.171.t: "Una nueva era"
 france.171.d: "Durante casi dos siglos, desde el fracaso de la Comuna de París, Francia ha estado perdida, vagando sin rumbo en busca del camino correcto. Una y otra vez, ha caído en atolladeros políticos, obstaculizando su desarrollo y no llevando a la nación a ninguna parte. El nacionalismo venenoso y el aislacionismo de mente estrecha se filtraron profundamente en nuestra sociedad, prevaleciendo hasta bien entrado el siglo XXI. Pero hoy, todo eso cambiará.\n\nDesde nuestra victoria en la Guerra Civil, hemos erradicado con éxito a los militaristas y a la llamada escoria capitalista burguesa liberal. Ambas facciones se deleitaron con la destrucción de nuestra nación, aprovechando el caos como una oportunidad para abrirse camino hacia el poder. Aunque afirmaron luchar en nombre de la igualdad y la libertad, sus acciones cuentan una historia diferente, una de muerte y derramamiento de sangre.\n\nNuestro triunfo sobre el mal supremo es prueba de nuestra rectitud. Hemos logrado lo que alguna vez se consideró imposible. Hemos expulsado la inmundicia nazi y purgado la escoria fascista de nuestra tierra, algo que el FTP solo pudo soñar durante la Segunda Guerra Mundial. Por fin, hemos liberado verdaderamente a nuestra nación tanto del yugo de los capitalistas como del de los fascistas.\n\nEsta es sin duda la nueva revolución de Francia, pero no es una revolución solo para Francia. Es una revolución para su pueblo. Ya no sufrirán por culpa de políticos incompetentes o la intromisión del capital. Los medios de producción pertenecerán a los trabajadores, y nadie pasará hambre ni vivirá sin un techo sobre su cabeza. A partir de hoy, el pueblo es nuestra primera y principal prioridad, porque sin el pueblo, no hay nación."
 france.171.a: "Libération!"
 france.199.t: "Comienzan protestas en Córcega"
 france.199.d: "Las tensiones en Córcega han llegado a un punto de ebullición a medida que estallan disturbios en toda la isla. La chispa que encendió el conflicto fue la muerte de Yvan Colonna, quien fue asesinado en prisión por un recluso yihadista. Esto ha reavivado viejas quejas entre los nacionalistas corsos, quienes veían a Colonna como un héroe del movimiento independentista corso.\n\nHan estallado protestas en las principales ciudades, con manifestantes que denuncian la inacción francesa y la citan como motivo de independencia. La situación ha escalado rápidamente, con enfrentamientos reportados entre manifestantes y fuerzas policiales. Mientras Córcega se tambalea al borde de la agitación, el Gobierno francés se enfrenta a un dilema desafiante: cómo abordar las quejas de los nacionalistas corsos mientras se mantiene la ley y el orden en la isla."
 france.199.a: "Córcega ES francés."
 france.1991.t: "Continúan los disturbios en Córcega"
 france.1991.d: "Los disturbios en Córcega no muestran signos de disminuir a medida que la violencia sigue escalando en toda la isla. Las calles están llenas de barricadas y los enfrentamientos entre manifestantes y fuerzas de seguridad son cada vez más frecuentes.\n\nLa agitación ha paralizado Córcega, con negocios cerrados y el transporte interrumpido. A medida que la situación se deteriora, el futuro de Córcega pende de un hilo, con el espectro de más violencia cerniéndose."
 france.1991.a: "¡Está muerto! ¡Supérenlo!"
 france.200.t: "Córcega se calma"
 france.200.d: "Tras semanas de agitación, los disturbios en Córcega han llegado finalmente a su fin. Las acciones del Gobierno francés para calmar la disidencia han sido recibidas con cauto optimismo por la población corsa, que espera que se pueda lograr una resolución pacífica. Una vez que la situación se calma, Córcega debe evaluar los daños causados por los disturbios. Los edificios están en ruinas, las empresas luchan por recuperarse y las cicatrices del conflicto son profundas. El futuro de la isla sigue siendo incierto, y muchos se preguntan si se podrá lograr una paz duradera o si Córcega se verá de nuevo envuelta en la violencia."
 france.200.a: "¡La paz prevalece!"
 france.201.t: "¡Las próximas elecciones han sido suspendidas!"
 france.201.d: "En un dramático giro de los acontecimientos, las elecciones francesas de 2027 han sido suspendidas indefinidamente tras un fuerte aumento de la tensión entre Rusia y Europa. La decisión, tomada en interés de la seguridad nacional, se produce mientras Francia se prepara para gestionar una delicada situación diplomática. Con la amenaza de conflicto acechando, los líderes políticos han acordado que este no es el momento para la política partidista. En su lugar, la atención se centrará en garantizar la seguridad y la estabilidad de la nación ante las amenazas externas.\n\nA medida que se difunde la noticia de la suspensión electoral, las reacciones son mixtas. Algunos lo ven como una precaución necesaria dado el clima actual, mientras que otros expresan preocupación por las implicaciones para la democracia. En cualquier caso, la decisión subraya la gravedad de la situación y la necesidad de un frente unido ante una posible agresión."
 france.201.a: "¡La seguridad es lo primero, la política debe estar en pausa!"
 france.202.t: "Militares derrocan al Gobierno"
 france.202.d: "En una era de incertidumbre e inestabilidad económica, los franceses despertaron al ruido de los tanques circulando por París. Durante esta mañana, [FRA.GetLeader] y las Fuerzas Armadas Francesas anunciaron el derrocamiento del gobierno civil socialista liderado por Jean-Luc Mélenchon. El ejército acusó a Mélenchon y a su administración de traicionar los intereses nacionales y de buscar instaurar un régimen comunista en Francia.\n\nEn un comunicado a la nación, [FRA.GetLeader] dijo: \"Ya no podemos quedarnos de brazos cruzados al ver a nuestra gran nación cayendo al abismo. Bajo el liderazgo de Mélenchon, Francia estaba cayendo en la trampa del comunismo, y esto supondría una traición a nuestros ideales e historia. Proclamamos la creación de la Séptima República, que materializará los verdaderos intereses nacionales y la estabilidad interna.\"\n\nSe han tomado estrictas medidas de seguridad por todo el país. Unidades militares patrullan las calles y los lugares estratégicos han sido tomados por el ejército. Muchos de los funcionarios y partidarios de Mélenchon han sido arrestados y el propio Mélenchon ha sido puesto bajo arresto domiciliario. La mayoría del pueblo francés no está contento, pero se ha mostrado permisivo hasta ahora."
 france.202.a: "¡Gloria a [FRA.GetLeader]!"
 france.203.t: "Tratado de Viena"
 france.203.d: "Estamos viviendo nuestro momento más oscuro y humillante, pues nuestros diplomáticos están viajando a Viena para hacer oficial el tratado de rendición de las fuerzas de la OTAN. No estamos en condiciones de seguir luchando tras perder Varsovia, Budapest e incluso Bratislava, y en estos momentos los rusos ya están estableciendo gobiernos títeres para maximizar su control e influencia en Europa Oriental. Llevábamos media década preparándonos para este conflicto y a la hora de la verdad, fallamos miserablemente. El mundo verá esto como una muestra de nuestra debilidad y el poder que tiene Rusia sobre el continente."
 france.203.a: "Y así, sin más, se acabó..."
 france.2031.t: "Mélenchon es tiroteado por un agente de policía en Martigues"
 france.2031.d: "Durante un paseo vespertino por las calles de Martigues, Mélenchon fue interceptado por tres policías locales. La situación escaló rápidamente, pues dos de los policías inmovilizaron a Mélenchon mientras el restante leía una lista de presuntos crímenes contra Francia antes de disparar dos veces al antiguo político, y todo esto fue grabado por las cámaras corporales de los agentes. El metraje, que se hizo viral en internet, ha generado reacciones negativas y muchos señalan al cada vez más despótico Consejo Asesor Militar."
 france.2031.a: "¿Qué está pasando?"
 france.2032.t: "Protestas de veteranos en el norte"
 france.2032.d: "La derrota contra Rusia ha afectado profundamente a los nacionalistas franceses y a los veteranos, quienes se sintieron traicionados por el manejo del Gobierno de la guerra. En Francia septentrional, una región en la que existe un fuerte sentimiento nacionalistas y una gran concentración de veteranos, han estallado protestas contra el Gobierno. Muchos de los manifestantes, quienes lucharon en la guerra, demandaron respuestas por parte del gobierno a la debacle sufrida y ajusticiar a los responsables. Criticaron al Gobierno por lo que veían como un fracaso en proteger los intereses y el honor de Francia en el campo de batalla.\n\nLas protestas agarraron tracción rápidamente, con miles tomando las calles para expresar su ira y frustración. Algunos manifestantes reclaman una política exterior más agresiva, mientras que otros demandan la dimisión de los funcionarios gubernamentales. Las protestas en Francia septentrional suponen un serio desafío a la autoridad del Gobierno y tienen el riesgo de escalar a una confrontación más abierta."
 france.2032.a: "¡Tuvieron que haber luchado mejor!"
 france.2033.t: "La bandera roja de Francia meridional"
 france.2033.d: "La derrota ante Rusia ha dividido profundamente a la sociedad francesa... Tras nuestra firma del Tratado de Viena, han estallado protestas en las principales ciudades de la nación. Los manifestantes, principalmente socialistas, comunistas y anarquistas, criticaron el manejo de la guerra del gobierno y reclaman una política exterior más pacífica e igualitaria.\n\nLas protestas, generalizadas en el sur de Francia, crecieron en tamaño e intensidad y el gobierno está teniendo serias dificultades para contener las protestas. Los militares que no se hubiesen sumado a la rebelión activa en el norte fueron desplegados para mantener el orden, llevando a choques entre los manifestantes y las fuerzas del orden."
 france.2033.a: "¡Debemos aplastar a los rojos!"
 france.2034.t: "La policía es expulsada de París"
 france.2034.d: "Con la noticia de la derrota ante Rusia difundiéndose en Francia, ha despertado una ola de ira y frustración en la población. Las protestas estallaron en las grandes ciudades, demandando el fin de la guerra y un cambio en las políticas gubernamentales. En París, las manifestaciones desembocaron en violentos disturbios, en las que las facciones anarquistas y comunistas aprovecharon la oportunidad para escalar la situación.\nCon todo el caos, el gobierno francés perdió el control de la capital. Los edificios gubernamentales fueron ocupados, y los manifestantes formaron apresuradamente un consejo revolucionario. El consejo declaró el establecimiento de un nuevo orden, basado en principios comunistas y anarquistas, y la disolución del gobierno anterior. Sin embargo, al final del día, parece ser que, por ahora, la revuelta está confinada a la capital y a las provincias del sur."
 france.2034.a: "¡Debemos retomar la capital!"
 france.204.t: "Restauración del Gobierno civil"
 france.204.d: "En un inesperado discurso matutino en la Asamblea Nacional, el general [FRA.GetLeader], jefe del Gobierno de Defensa Nacional, anunció el restablecimiento del gobierno civil. Afirmaba que, con la victoria de Francia y sus aliados en la Guerra Europea, el gobierno militar y el régimen marcial cumplieron con éxito su misión. Según sus propias palabras, lo que Francia necesita ahora es un gobierno civil estable para \"volver a la normalidad\". [FRA.GetLeader] hizo énfasis en que no tenía intenciones de llevar a Francia a una nueva era de gobiernos militares y en que no tenía ni la energía ni la ambición de convertirse en el líder supremo de la nación. Con el Gobierno de Defensa Nacional disolviéndose, las Fuerzas Armadas Francesas seguirán con su misión de defender la nación.\n\nLa dimisión del general ha generado un gran revuelo tanto en Francia como en el extranjero. Si bien los medios convencionales elogiaron su nobleza, la atención se desvió a una cuestión urgente: ¿Quién liderará el nuevo gobierno civil que sucederá al gobierno militar? Partidos políticos de todo el espectro político ya han emitido comunicados, celebrando la acertada decisión del general a la vez que se preparaban para hacer campaña electoral. Mientras tanto, académicos y el público general, con los aciertos y fallos del gobierno anterior en mente, consideran que es un momento adecuado para reformar el sistema constitucional en Francia y revitalizar el sistema."
 france.204.a: "¡Gloria a nuestra República!"
 france.204.b: "¡Debemos tomar una decisión!"
 france.204.c: "¡La Sexta República se mantiene firme!"
 france.205.t: "Costo de Redireccionar el Presupuesto"
 france.205.d: "Con la última sesión de la Asamblea Nacional finalmente convocada, un tema importante ha surgido como el foco principal tanto para los legisladores como para los ministros del Gobierno: la elaboración del presupuesto gubernamental del nuevo año fiscal.\n\nNuestro sistema está en transición de un Gobierno militar orientado a la guerra a un Gobierno civil, y el orden político necesita ser restablecido urgentemente. Aparte del sector militar-industrial, la mayoría de las principales industrias están en mal estado y requieren una atención significativa. Mientras tanto, la influencia política de los militares sigue profundamente arraigada, con oficiales de alto rango reacios a renunciar a los sustanciales beneficios que han disfrutado durante años. Por otro lado, los principales partidos políticos en la Asamblea Nacional, habiendo recuperado su voz recientemente, parecen listos para reanudar sus hostilidades habituales.\n\nNo podemos permitirnos de ninguna manera otro cierre del Gobierno. Nuestros líderes están decididos a elaborar el nuevo presupuesto lo más rápido posible, invirtiendo todos los recursos políticos para asegurar su aprobación. Para acelerar la recuperación de Francia, hemos aumentado significativamente las asignaciones para el bienestar social y las industrias clave, lo que requiere recortes en la industria pesada y las inversiones militares. Esto, por supuesto, desencadenará una nueva ronda de contención entre el Gobierno civil y los militares, pero la gobernanza es, después de todo, un delicado acto de equilibrio, uno que requiere mantener el equilibrio a largo plazo."
 france.205.a: "Esperaremos nuestro poder."
 france.206.t: "Francia saca exitosamente a astronautas americanos de la EEI"
 france.206.d: "Buenas noticias llegan desde Francia en el último día, ya que el gobierno francés ha logrado regresar a la Tierra a los astronautas estadounidenses de la EEI.\n\nLa guerra civil en curso en los Estados Unidos ha creado un problema extremadamente grande para los tres estadounidenses restantes, Jesicca Watkins, Robert Hines y Kjell Lindgren, quienes trabajaban en la ISS, ya que el país al que deben rendir cuentas ha caído en un caos incontrolable. Con los suministros delegados a la tripulación escaseando, los astronautas estadounidenses se habían encontrado con un grave problema para organizar su regreso. Dado que Francia había asumido las responsabilidades de EE.UU. en la EEI, se organizó un regreso largo pero finalmente exitoso, ya que en las últimas horas, [FRA.GetLeader] había anunciado que los estadounidenses habían regresado a salvo a la Tierra. Las autoridades de la Agencia Espacial Europea han anunciado que Léopold Eyharts y Thomas Pesquet de Francia, junto con Matthias Maurer de Alemania, ocuparían su lugar en la EEI.\n\nEl presidente Biden ha emitido un rápido mensaje de felicitación al estado francés y ha anunciado públicamente que harán todo lo posible para que sus astronautas regresen a casa lo antes posible. Sin embargo, se han planteado preocupaciones sobre su seguridad al regresar a EE.UU., ya que la nación todavía está envuelta en una guerra importante. A pesar de todo, ambos gobiernos han elogiado el esfuerzo como un ejercicio de cooperación fraternal en un mundo aparentemente dividido por el conflicto."
 france.206.a: "¡Bienvenidos a casa desde las estrellas!"
 france.206.b: "¡Inspirarán a la generación de las estrellas!"
 france.206.c: "¡Patriotas espaciales!"
 france.206.e: "!Auténticos americanos que descendieron desde las estrellas!"
 france.206.f: "El espíritu de Gagarin y Armstrong les guió..."
 france.206.g: "¡Más propaganda occidental! ¡Nosotros se lo ofrecimos primero!"
 france.206.h: "Pronto estaremos allí..."
 france.206.i: "Nosotros también alcanzaremos las estrellas..."
 france.207.t: "¡Astronautas americanos que volvían de la EII mueren en una explosión!"
 france.207.d: "Hoy llegan noticias horribles desde Francia, ya que múltiples informes han confirmado que una nave espacial que transportaba astronautas estadounidenses de regreso de la EEI ha explotado.\n\nLa guerra civil en curso en los Estados Unidos ha creado un problema extremadamente grande para los tres estadounidenses restantes, Jesicca Watkins, Robert Hines y Kjell Lindgren, quienes trabajaban en la EEI, ya que el país al que deben rendir cuentas ha caído en un caos incontrolable. Con los suministros delegados a la tripulación escaseando, los astronautas estadounidenses se habían encontrado con un grave problema para organizar su regreso. Francia y las autoridades relacionadas de la Agencia Espacial Europea intentaron devolverlos, pero la nave espacial que realizaba el regreso tuvo serios problemas. La nave espacial, con un calendario de partida ya retrasado, intentó devolver a los estadounidenses a la Tierra, pero perdió contacto con la ESA y las autoridades francesas a mitad del viaje. Según las mediciones de los instrumentos de control terrestre y el testimonio de los testigos presenciales, parece que una fuga de combustible se encendió y provocó una explosión masiva, matando a los estadounidenses a bordo.\n\nEl presidente Biden solo ha emitido una declaración expresando su pesar por estos estadounidenses que perdieron la vida en la explosión. [FRA.GetLeader] también ha anunciado un esfuerzo para intentar recuperar los cuerpos de los restos del accidente en la Tierra. Los ciudadanos de Europa y América están conmocionados y de luto por esta tragedia."
 france.207.a: "¡El horror golpea al cosmos!"
 france.207.b: "Nuestros pésames a las familias..."
 france.207.c: "La primera tragedia de la fuerzas espaciales..."
 france.207.e: "Héroes que caen desde las estrellas..."
 france.207.f: "Las estrellas de la revolución brillarán más..."
 france.207.g: "Una falla habitual propia de los productos occidentales"
 france.207.h: "La evidencia de la incompetencia de la ingeniería europea"
 france.209.t: "El statu quo se mantiene en Arabia Saudita"
 france.209.d: "Con la guerra civil llegando finalmente a su fin, y la niebla de la guerra disipándose. Ahora está claro que el establishment saudí ha salido victorioso sobre sus oponentes.\n\nCon nuestra afirmación de que eran el gobierno legítimo y nuestro apoyo financiero, han logrado asegurar la paz en la península, y con su gratitud se presenta una gran oportunidad para expandir nuestra influencia en la región, no desperdiciaremos esta oportunidad."
 france.209.a: "Acerca de este acuerdo..."
 france.208.t: "La República Árabe victoriosa."
 france.208.d: "Tras un largo y sangriento conflicto, el corazón mismo de Arabia Saudita se ha visto conmocionado. La república árabe ha superado a sus rivales y ya nos ha tendido la mano para cumplir con su parte del trato. \n\nNuestro apoyo financiero y diplomático ha contribuido a su victoria y, por ello, seguirán en deuda con nosotros durante bastante tiempo, lo que nos permitirá ampliar nuestra influencia en la región. Les llevará tiempo reconstruirse, pero incluso en el caos de la posguerra, habrá muchas oportunidades para que las empresas francesas cubran las carencias."
 france.208.a: "Investissement minime, gains considérables."
 france.210.t: "Captura de Novorosíisk"
 france.210.d: "El sonido de la artillería y los aviones zumbando sobre los cielos fue amortiguado durante la noche, mientras los últimos restos de las brigadas rusas eran expulsados y obligados a retirarse de la clave y estratégica ciudad portuaria de Krasnodar, Novorosíisk, ya que el abrumador impulso de nuestras fuerzas armadas ha sido más que suficiente para arrancar una vez más los dientes que hielan la sangre de los osos rusos, dejando solo restos quemados de vehículos BMP a su paso, dejando solo pura vergüenza y humillación.\n\nEn esencia, la captura de Novorosíisk se considera otro punto de inflexión en la guerra, ya que esto obstaculizó gravemente la presencia rusa en el mar Negro en la región, así como la pérdida crítica del puerto comercial más grande de Rusia y uno de los más grandes del país. La guerra de agresión rusa ha dado un giro completo y ahora está arrasando sus territorios."
 france.210.a: "Afirmativo."
 france.2100.t: "Rusia retoma Novorosíisk"
 france.2100.d: "Mientras estábamos ocupados con otros asuntos, fuimos alcanzados por un bombardeo de malas noticias: Rusia, que hasta ahora estaba de capa caída, ha vuelto a mostrar sus colmillos y tomaron Novorosíisk de la República de Kubán. Esta última, establecida como un Estado democrático en el  territorio caucásico ruso tras la derrota de Rusia en la Primera Guerra Europea, había estado bajo la protección de fuerzas franco-europeas. La reorganización de las fronteras de esta región tenía como fin limitar la influencia de Rusia y evitar que esta vuelva a expandirse rápidamente. Desafortunadamente, está más que claro que el hambre por territorios de Rusia es insaciable, especialmente en una región tan estratégica como la frontera euroasiática.\n\nEmpleando medios políticos y militares, el ejército ruso avanzó hasta Novorosíisk con una facilidad pasmosa. Acorraladas por el poderío militar eslavo, hasta las bien equipadas fuerzas francesas no tuvieron más opción que retirarse por mar y aire con medios provistos por la República de Kubán. Este evento ha supuesto un duro golpe para la reputación francesa en el Cáucaso y supone la caída de la primera ficha de dominó de la renovada expansión rusa."
 france.2100.a: "¡Maldita sea!"
 france.211.t: "Captura de Kerch"
 france.211.d: "El Alto Mando de las Fuerzas Armadas Francesas ha anunciado oficialmente que nuestras fuerzas han tomado exitosamente el estratégico reduco de Kerch, en el mar Negro. Tras intensos combates, nuestras divisiones blindadas y fuerzas aerotransportadas iniciaron un asalto coordinado a la ciudad, asegurando rápidamente posiciones claves a ambos lados del estrecho de Kerch. Con nuestra precisa potencia de fuego, las fuerzas enemigas colapsaron rápidamente, desintegramos su estructura de mando y pudimos tomar un alijo significativo de armas y equipo.\n\nKerch, un nodo vital entre la península de Crimea y Eurasia continental, tiene un enorme valor estratégico. Esta victoria ha cortado de forma efectiva las vías de suministro enemigas en el frente sur, dando vía libre a operaciones subsecuentes. Informes preliminares indican que nuestras fuerzas han capturado docenas de vehículos blindados enemigos, alrededor de 10 sistemas de artilleras y múltiples instalaciones militares intactas."
 france.211.a: "Afirmativo."
 france.2120.t: "Rusia retoma Kerch"
 france.2120.d: "En un movimiento que nos ha dejado patas arriba, las fuerzas rusas lograron avanzar y tomar la ciudad de Kerch, forzando a nuestras fuerzas allí presentes retirarse apresuradamente para evitar la destrucción total de sus unidades, dejando atrás numerosas armas y equipo en la huida, recordando a la retirada inicial de las fuerzas enemigas en la región. Este evento constituye el establecimiento por parte de Rusia de una cabeza de playa en la península de Crimea por primera vez desde su toma por nuestras fuerzas armadas y la de nuestros aliados.\n\nComo era de esperarse, la reconquista de Kerch ha dado a nuestros adversarios un impulso moral y de confianza muy buscado, y nuestros reportes nos indican que buscan aprovechar su ímpetu con el fin de \"liberar\" a la península en su totalidad. Si bien no podemos ignorar la pérdida de esta ciudad, nuestros esfuerzos para frenar la máquina de guerra rusa no deben flaquear, debemos frenar el avance del enemigo en la península de Crimea, así como en el resto de frentes."
 france.2120.a: "¡Maldita sea!"
 france.2110.t: "Captura de Sochi"
 france.2110.d: "El Alto Mando de las Fuerzas Armadas Francesas ha anunciado oficialmente que, tras 72 horas de combates continuos, nuestras fuerzas armadas han capturado exitosamente Sochi, una estratégica ciudad en la costa oriental del mar Negro. En Sochi, nuestra unidades de infantería y blindadas realizaron operaciones de limpieza sistemática, asegurando la ciudad calle por calle. El enemigo intentó una última defensa en el distrito central pero, bajo un intenso fuego sostenido, su moral se resquebrajó, lo que llevó a rendiciones en masa.\n\n La importancia estratégica de Sochi radica en su papel como puerta de entrada al Cáucaso y como importante puerto en el mar Negro. Esta victoria nos da un control total sobre la costa oriental del mar Negro, lo que dificultará significantemente la logística marítima enemiga en el sur. Por el momento, nuestras unidades de ingeniería han iniciado con las labores de reconstrucción de la infraestructura dañada para apoyar a las operaciones militares en curso. Adicionalmente, unidades de mantenimiento han establecido talleres temporales para asegurar que las tropas del frente estén listas para entrar en combate."
 france.2110.a: "Afirmativo."
 france.2111.t: "Rusia retoma Sochi"
 france.2111.d: "A pesar de nuestros mejores esfuerzos, numerosos informes confirmaron que grupos tácticos de batallón rusos consiguieron reconquistar y ocupar la ciudad de Sochi, una de las mayores ciudades vacacionales del país y del Cáucaso en su conjunto. Si bien nuestras fuerzas estacionadas en el centro y en las afueras lucharon ferozmente por mantener las defensas, el incansable azote de las hordas de mobiks y otros elementos provocaron que nuestras brigadas tomasen la difícil pero necesaria decisión de abandonar la ciudad y sus áreas aledañas, y posteriormente arrasarla con fuego de artillería concentrado y bombardeos de precisión para evitar un avance mayor de las fuerzas rusas en el área.\n\nAunque la pérdida de Sochi constituye un duro golpe estratégico y moral, el alto mando francés sigue confiando plenamente en continuar las operaciones ofensivas en el Cáucaso para frenar la agresión rusa y darle al oso sediento de sangre su propia medicina."
 france.2111.a: "¡Maldita sea!"
 france.212.t: "La Mona Lisa cubierta en sopa"
 france.212.d: "En un impactante acto de protesta, unos manifestantes atacaron recientemente la icónica \"Mona Lisa\", cubriendo la obra maestra con una capa de sopa. Este audaz gesto tenía como objetivo resaltar los problemas urgentes relacionados con los combustibles fósiles y la degradación ambiental, dirigiendo la mirada del mundo hacia la crisis climática. Al elegir una de las pinturas más reconocidas de la historia, los manifestantes buscaron romper la complacencia en torno a la inacción climática, utilizando la famosa obra de arte como un poderoso símbolo del patrimonio cultural en riesgo.\n\nLa imagen de la sopa sobre la \"Mona Lisa\" creó un contraste discordante, yuxtaponiendo la belleza del arte con la cruda realidad del daño ambiental. Los manifestantes argumentaron que tales acciones son necesarias para provocar una respuesta de una sociedad a menudo insensibilizada ante la destrucción gradual del planeta. Su objetivo era iniciar un diálogo sobre las implicaciones de nuestra dependencia de los combustibles fósiles y la necesidad de un cambio sistémico. Los críticos, sin embargo, condenaron el acto como vandalismo, cuestionando si atacar el arte realmente inspiraría la acción necesaria o alienaría a posibles aliados en la lucha por la justicia climática."
 france.212.a: "Me ha entrado el apetito..."
 france.213.t: "Sopa en \"Los girasoles\""
 france.213.d: "En un acto de protesta audaz y controvertido, unos manifestantes atacaron recientemente la famosa pintura de Vincent van Gogh, \"Flores\", arrojando sopa sobre el lienzo. Esta impactante acción no fue solo un asalto a una obra de arte querida; fue una declaración deliberada destinada a llamar la atención sobre los apremiantes problemas del cambio climático y la degradación ambiental. Al elegir una pieza de tan alto perfil, los manifestantes buscaron provocar una conversación sobre la fragilidad de nuestro mundo natural, simbolizada por las vibrantes flores que Van Gogh capturó tan bellamente.\n\nLa elección de la sopa, un elemento cotidiano, simbolizó la urgencia y la accesibilidad de la crisis climática. Mientras que algunos criticaron el acto como vandalismo, los partidarios argumentaron que era una llamada de atención necesaria. En un mundo donde la belleza de la naturaleza está cada vez más en riesgo, la yuxtaposición de una obra maestra contra la cruda realidad de la negligencia ambiental subrayó la necesidad de una acción inmediata. El impacto visual de la sopa en la pintura sirvió para recordarnos que el arte que apreciamos está íntimamente conectado con los mismos ecosistemas que sustentan la vida."
 france.213.a: "Esto... hay mejores formas para dar un mensaje."
 france.214.t: "El partido de Macron cambia su nombre a \"Renacimiento\""
 france.214.d: "El partido La República en Marcha del presidente francés Emmanuel Macron ha cambiado su nombre a Renacimiento, anunció hoy el director ejecutivo del partido, Stanislas Guerini. \nAcompañado por el ex primer ministro francés Edouard Philippe -fundador del partido de centro-derecha Horizontes- y el líder del partido MoDem, François Bayrou, Guerini anunció una coalición electoral entre los tres partidos de cara a las elecciones parlamentarias francesas del próximo mes. Renacimiento presentará 400 candidatos, añadió. \n\nEl razonamiento detrás de la elección del nombre, dijo Guerini, fue para mostrar que el partido \"siempre elegiría la iluminación contra el oscurantismo\". Estará \"abierto a los ciudadanos, a los funcionarios electos, a los funcionarios locales, vengan de donde vengan\", añadió. También fue el nombre dado a la lista del partido de Macron en las elecciones europeas de 2019."
 france.214.a: "¿Cómo era que se deletreaba eso?"
 france.215.t: "Desfile de la victoria en Kiev"
 france.215.d: "Tropas europeas, junto a fuerzas ucranianas, desfilan por las calles de Kiev, recibidas por multitudes que vitorean y celebraciones jubilosas. La marcha no es solo una muestra de destreza militar, sino también un símbolo del vínculo duradero entre las naciones europeas y Ucrania, unidas en su compromiso con la paz, la democracia y la defensa de los valores compartidos. Mientras los soldados marchan por la ciudad, son aclamados como héroes, honrados por su valentía y sacrificio en la lucha contra la agresión. La marcha de la victoria sirve como un poderoso recordatorio de la importancia de la solidaridad y la cooperación en la búsqueda de la paz y la seguridad en Europa y más allá."
 france.215.a: "Dulce, dulce victoria..."
 france.216.t: "Primera elección de la Séptima República"
 france.216.d: "Con la 7ª República de Francia preparada para sus primeras elecciones, se ha demostrado un marcado contraste en las ideologías entre los principales partidos. Los líderes de la popular suspensión del gobierno civil por parte de los militares han apoyado a Pierre de Villiers y su nuevo partido \"Alianza para la Victoria Francesa\", que presenta una plataforma centrada en reforzar la defensa nacional, abogar por una fuerte presencia militar en los asuntos globales y enfatizar la importancia de una industria de defensa robusta para el crecimiento económico y el mantenimiento de las glorias del golpe militar. \nEn contraste, la \"Unión Democrática del Pueblo\", liderada por François Bayrou, ha intentado combinar los ideales de Macron con otros partidos minoritarios de izquierda, representando una amplia postura centrista, con el objetivo de equilibrar la fuerza militar con el bienestar social y la prosperidad económica. Abogan por un enfoque pragmático de la gobernanza, buscando unir a la nación bajo una bandera de estabilidad y progreso. \nFinalmente, respaldado por el encarcelado Mélenchon y liderado por el ex primer ministro Eric Coquerel, el \"Partido del Renacimiento Progresista\". \n\nA medida que Francia se encuentra en una encrucijada, el resultado de estas elecciones no solo determinará la dirección futura del país, sino que también reflejará las profundas divisiones dentro de la sociedad francesa con respecto a su segunda nueva constitución en una década."
 france.216.a: "¡Los militaristas lo tienen!"
 france.216.b: "Darle al centrismo una segunda oportunidad"
 france.216.c: "¡Los militares actuaron ilegalmente contra la antigua constitución!"
 france.217.t: "Primeras elecciones de la Sexta República"
 france.217.d: "Mientras la Sexta República Francesa se prepara para sus primeras elecciones, el panorama político está dominado por dos partidos principales: el \"Partido Clásico\" y \"Unidos por el Cambio\". La elección marca un momento significativo en la historia francesa, ya que determinará la dirección del país bajo esta nueva constitución.\n\nEl \"Partido Clásico\", liderado por el ex presidente y director ejecutivo de AXA, Henri de Castries, representa los valores liberales tradicionales de libertad individual, libre mercado y gobierno limitado, y está dirigido por líderes carismáticos que prometen crecimiento económico y prosperidad a través de la desregulación y la privatización. Por otro lado, \"Unidos por el Cambio\", aboga por la justicia social, la igualdad y la intervención gubernamental para abordar cuestiones sociales. Prometen priorizar los programas de bienestar, los derechos de los trabajadores y la protección del medio ambiente, apelando a quienes buscan una sociedad más inclusiva y equitativa.\n\nEl resultado de esta elección histórica no solo dará forma a las políticas nacionales, sino que también determinará la postura de Francia en el escenario mundial, destacando las ideologías y valores contrastantes en el corazón de la Sexta República."
 france.217.a: "¡Una victoria para el socialismo!"
 france.217.b: "¡Una victoria para los libertarios de todo el mundo!"
 france.218.t: "Encrucijada constitucional"
 france.218.d: "Tras la guerra ruso-ucraniana y ante las incertidumbres geopolíticas que se avecinan, Francia se encuentra en una coyuntura crítica en lo que respecta a su constitución. La constitución de la Sexta República, de tendencia ampliamente socialista y que hace hincapié en el bienestar social y los principios democráticos, está siendo cuestionada tras la restauración de la administración civil por parte de los militares tras la guerra.\n\nLos partidarios de mantener la Sexta República argumentan que refleja los valores franceses de libertad, igualdad y fraternidad, y proporciona una base sólida para una sociedad democrática. Creen que preservar esta constitución es crucial para mantener la cohesión social y defender los derechos de todos los ciudadanos. Sin embargo, los partidarios de una constitución de la Séptima República argumentan que Francia necesita un Gobierno más fuerte y centralizado, centrado en la seguridad nacional y la fuerza militar para navegar por el complejo y volátil panorama internacional. Creen que es necesario un enfoque más militarista para garantizar la seguridad de Francia y proteger sus intereses en el escenario mundial."
 france.218.a: "La constitución de Mélenchon se queda."
 france.218.b: "Necesitamos una nueva constitución."
 france.219.t: "Incumbente victoria"
 france.219.d: "A pesar de las preocupaciones iniciales y la suspensión de las elecciones de 2026, el partido en el poder ha ganado con una victoria aplastante. La población francesa, aún recuperándose de los efectos de la guerra ruso-ucraniana, ha optado por confiar en el liderazgo experimentado del gobierno actual. Con un mandato renovado, el gobierno se compromete a centrarse en la reconstrucción de la nación, tanto física como emocionalmente, después de la guerra.\n\nLa victoria aplastante no solo asegura la posición del gobierno, sino que también envía un mensaje claro de que el pueblo francés está unido en su deseo de estabilidad y continuidad durante estos tiempos difíciles. A medida que Francia avanza, el gobierno se compromete a honrar los sacrificios hechos durante la guerra y a construir un futuro más brillante para todos los ciudadanos."
 france.219.a: "Vive le France!"
 france.220.t: "El número de muertos alcanza los 30.000"
 france.220.d: "La decisión de Francia de entrar en la guerra ruso-ucraniana ha tenido un alto costo, con informes que confirman la pérdida de 30.000 soldados franceses en el conflicto. Esta noticia ha conmocionado a la nación, mientras las familias lloran la pérdida de sus seres queridos y las comunidades lidian con el impacto de la guerra en el frente interno. Los sacrificios hechos por estos soldados pesan mucho en la conciencia colectiva del país, destacando las duras realidades de la guerra y el costo humano que cobra.\n\nSin embargo, a medida que la guerra se prolonga, comienzan a surgir signos de agotamiento bélico dentro de la sociedad francesa. El flujo constante de bajas, junto con la tensión económica de apoyar el esfuerzo bélico, ha afectado la moral. El sentimiento público está cambiando, con crecientes llamados a poner fin al conflicto y a centrarse en la reconstrucción y la curación de la nación. La pérdida de nuestros soldados sirve como un sombrío recordatorio del costo de la guerra y el precio que cobra no solo en el campo de batalla, sino también en los corazones y las mentes de quienes quedan atrás."
 france.220.a: "La guerra es el infierno."
 france.221.t: "Una desgracia nacional"
 france.221.d: "Los informes han estado llegando a raudales desde el este sobre el desastre que ha asolado Europa. El Gobierno ucraniano ha sido destrozado, su Gobierno residual se ha rendido incondicionalmente ante las hordas que avanzan desde el este. Para echar más sal a la herida, miembros del personal ucraniano y de los estados mayores de otros socios de la OTAN han salido a echarnos la culpa. Acusaciones de cobardía, inacción e incompetencia absoluta han llegado como una inundación. Independientemente de la verdad, estas creencias envenenan el ambiente y dificultan los intentos de coordinar cualquier cosa, lo que lleva a un desastre potencial. Esto también hace que la moral -ya baja- caiga aún más, con algunas preocupaciones de que, sin un éxito rápido, el ejército pueda colapsar. Debemos resistir y mantener el Dniéster hasta el final y, cuando sea posible, atacar y atacar hasta que nos quedemos sin balas o sin sangre. La cohesión del ejército, la reputación de Francia y el destino mismo de Europa del Este están en juego."
 france.221.a: "ataque a ultranza"
 france.222.t: "Extension del Plazo"
 france.222.d: "A quien le corresponda...\nPor culpa de problemas logísticos en Europa Oriental, se ha atrasado la llegada de nuestras tropas en numerosas ocasiones. Por eso, solicito 14 días adicionales para preparar e iniciar la operación Davout.\nVive la France!\n\nFirmado,\nFranck Boudet"
 france.222.a: "Aprobado."
 france.222.b: "Denegado."
 france.223.t: "Para mi querida Mère,"
 france.223.d: "Hoy, he realizado boot camp en París y he empezado con la primera fase del entrenamiento básico; lo llaman la \"Phase-jaune\", donde me adapto a la vida militar, aprendo disciplina, compañerismo, programas militares, tradiciones y todo eso. Si bien todavía no tengo a nadie a quien llamar camarada, tengo la sensación de que voy a encajar bien con mis compañeros de entrenamiento. Se que tú y Papá odiáis la vida urbana, la odiáis desde siempre, y que es por eso por lo que teníais dudas de llevarme aquí, pero no es tan malo como creéis, lo juro. Estoy en uno de esos distritos periféricos, el vigésimo si mal no recuerdo, y realmente esto no es la ciudad propiamente dicha. Incluso ahora, me salen lágrimas al recordar cuanto tiempo estaré fuera. Ya echo de menos a Papá, la granja y a mi hermano Christophe; y obviamente también te extraño a ti. Desde el minuto uno hemos estado trabajando duramente y físicamente me ha puesto a prueba. Claro, las clases son siempre muy fáciles, pues no dan nada que no supiese ya. Pienso que la disciplina que teníamos en la granja realmente me está ayudando, por lo que te doy las gracias. Siempre he soñado con servir y luchar por mi nación cuando esta estuviese en peligro; ayudar a otras personas y saber lo que es mejor para tu país es lo mejor que uno puede sentir en el mundo. Encomendado a Dios, lucharé por mi país con valentía y con el mayor de los honores. Quizás algún día, ¡me convierta en un general que lidere a nuestro pueblo contra los enemigos de Francia! Ojalá que llegue pronto. Me pregunto que tipo de comida nos darán en el ejército. Obviamente nada superará los platos que me hiciste todos los días de mi infancia. Echaré de menos tu comida, y echaré de menos a todo y a todos. Pero oye, ¿para eso están las cartas no? Espero que se las enseñes a Christophe y a Papá. Llenaría de alegría mi corazón, pues los amo con todo mi ser.\n\nSinceramente,"
 france.223.a: "Tu hijo."
 france.224.t: "Salut Mère"
 france.224.d: "Hoy, me he retirado con honores del ejército para poder formar una Legión Extranjera en América. Se que esto puede que te alarme, preocupe y te haga enfadar, pues lo hice sin tu aprobación, pero por favor ten por seguro que estaré bien y que hago esto por el bien de mi país y el mundo. Han pasado dos años desde mi primera carta, cuando recién llegué al campamiento. Oh, todavía recuerdo ese día, todo era tan novedoso, conocí a gente maravillosa y todo para no saber nada de ellos ahora. Sus caras... son como fantasmas en mi mente. Espero que estén sanos y salvos. Ya te lo he dicho en las muchas visitas que te hice, por lo que no te lo repetiré, pero todos los días siento que el mundo está colapsando a mi alrededor. Es como un fuego que ha estado ardiendo por años, engullendo al globo, calcinando la cultura humana, entre la que se incluye la nuestra. Algunos dirán que es solo pesimismo pero, para mi, la amenaza es real. Ya me he mentalizado que quién sea que gane las elecciones de 2022 me decepcionará, y dando gracias. Día a día, cada vez estoy más insatisfecho con el establishment y aquellos que dicen ser \"anti-establishment\". Se que no te interesa la política tanto como a mi, pero pronto aprenderás que el \"estado de la política\" importa más que cualquier otra cosa en el mundo. Influye a todo y a todos. Se que estaré incluso más lejos de casa, lejos de Christophe, de Papá y de ti, es algo que no quiero, pero que es absolutamente necesario. Afortunadamente, muchos de mis camaradas también se han alistado para venir conmigo, y he encontrado en ellos una gran amistad. Muchos de ellos son como tú o yo; nunca les ha gustado la vida urbana, y quieren lo mejor para su país. Si conoces la historia de Lafayette, puede compararse con lo que está pasando ahora mismo. Está habiendo una revolución en América, y estaré en su primera línea sin importar quien sea que trate de echarme para atrás. Espero profundamente que te tomes esta carta bien, pues te amo con todo mi corazón. Por favor, no te preocupes por mi. Ya soy mayorcito, y estaré perfectamente.\n\nSinceramente,"
 france.224.a: "Tu hijo."
 france.225.t: "Queridos Mère y Papa"
 france.225.d: "Hoy, he llegado a Burdeos tras años de servicio en América. Siento profundamente no haber podido enviar ninguna carta en todos estos años, pues con la gravedad de mi situación allí simplemente no tenía tiempo. Christophe me escribió hace poco, contándome lo devastados que estabais devastados por lo que habían dicho en las noticias, y que estabais realmente preocupados por mi. Realmente debe ser una experiencia atroz que tu propio hijo desaparezca en una zona de guerra. Tengo mucho que contaros, y cuando os visite a ti y a papá os contaré todo, pues no puedo condensarlo en esta carta, Christophe me contó sobre papá, y el deterioro de su salud. Por favor, os ruego que me mantengáis informado de su estado y el de la granja hasta que llegue a casa. Si esta es la última que le veré con vida, trataré de llegar lo más rápido posible. Mi servicio en los campos de batalla de América ha sido, como poco, relevadores y me ha mostrado la verdadera naturaleza de la guerra. Siempre había escuchado historias de insurgencias y conflictos, principalmente provenientes de veteranos de la Legión extranjera, pero nunca las había experimentado en carne propia hasta entonces. La guerra es el infierno y acaba con todo a su paso. He visto de todo... las masacres y asesinatos perpetrados por aquellos que afirmaban luchar por el bien común. No quiero abrumarte con los detalles, pues se que eres mayor, y no quiero que pienses en este tipo de cosas, pero es realmente aterrador. Realmente me ha enseñado lo afortunados que somos y que los horrores de la guerra alcanzan a todo el mundo, sin importar que seas soldado o civil. Te aseguro que papá y Christophe han visto las noticias; Rusia está en guerra con Europa, y harán todo lo que esté a su mano para arrasar nuestros hogares y pueblos. Ya han invadido Ucrania. y no frenarán allí. Voy a regresar al ejército, y voy a servir a mi país y a mi pueblo a la hora de la verdad. Os quiero muchísimo, papá y mamá, y siempre lo haré.\n\nSincèrement,"
 france.225.a: "Tu hijo."
 france.226.t: "Querida Mère"
 france.226.d: "Esto no se parece a nada que haya visto, ni en América ni en mi vida. En América, estaba acostumbrado a las victorias aún si veía a mis propios camaradas caer frente a mi y los disparos de los rifles desde la lejanía, en cada esquina, casa y tienda. Aquí, en Ucrania, no existe tal cosa como la victoria. No hay gloria. No hay vida. Todos y todo lo que existen están por y para matar. Aquí, no hay ni caballeros ni caballería que carguen contra las fuerzas del mal. No nos enfrentamos a partisanos desorganizados, no, nos enfrentamos a un ejército de asesinos y violadores, forzados a dar la vida por burócratas que nunca han visto un rifle fuera de la televisión. Te escribo este mensaje desde una zorrera de una de las muchas trincheras que conforman el frente. Estas zorreras son mi única zona de descanso, aún si estoy expuesto a que un obús de artillería o un ataque con drones me envié con Dios. En esta trinchera, el lodo alcanza los tres metros de altura, y está lleno de cadáveres, sangre y heces. Es el peor olor del mundo, aún más si tienes que estar en medio de este, que es lo que debes hacer para salvar el pellejo. Muchos de mis camaradas, con quienes he luchado desde el principio, han sido masacrados sin piedad en el frente, luchando y muriendo comandados por oficiales alemanes contra la amenaza existencial para nuestro país que supone Rusia. La guerra es el infierno. Resisto las ansias de desertar, pues se que luchar por mi país, por ti, por Christophe y por Papá, en paz descanse, es mi máximo deber y debo seguir en el frente. No he comido nada en 3 días ni he podido beber agua desde hace dos días. Las raciones escasean y no sabemos cuando llegarán los suministros. La tierra de nadie no es más que un matadero, donde los tanques se atascan en algo que los rusos llaman raspútitsa y son destruidos. La relación que tengo con mis \"camaradas\" alemanes no significa nada para mi, me ven como si fuese una mierdecilla bajo la bota alemana. Y aun así, son asesinados apenas una hora después de conocerlos. Se que tan perversos son los rusos, pero me obligaron a matar adolescentes. He visto a reclutas, no mayores de 18 años, ser triturados a fuego de metralla. Nadie más se ha parado a pensar en eso. Para este punto ya hemos madurado. Cuando esta carta te llegue, te pido por favor que no te preocupes. Es lo que siempre haces y me parte el corazón. Ten por seguro que estaré bien, que aguantaré.\n\nSincèrement,"
 france.226.a: "Tu hijo."
 france.227.t: "\"Feliz\" Día de la Victoria, Mère"
 france.227.d: "Hoy, nos hemos enterado que la guerra que tantas vidas ha arrebatado y arruinado, tanto en nuestro país como en el extranjero, ha terminado. Mi brigada inició una celebración por todo lo alto en suelo ruso mientras empiezan los preparativos para enviarnos a casa. Los miembros de la resistencia rusa empezaron a correr hacia la trinchera enemiga, saludando y abrazando a familiares que se encontraban en el otro lado. Aparentemente, esto ha sido considerado como una victoria por nuestros comandantes y los medios en casa; El Cáucaso, Bielorrusia y Bélgorod han sido liberadas del gobierno ruso, que ha sido sustituido por gobiernos leales a Europa. Obviamente, no nos hemos molestado en derrocar al régimen ruso a pesar de todo el daño que nos ha causado, pues lo más probable es que sea derrocado por los propios rusos. Si echamos la mirada atrás, podremos observar claramente que un nuevo gobierno, mucho peor que el anterior, surgirá de las cenizas de una Rusia calcinada, algo que al alto mando, y a nuestro gobierno, no les importa. Al final del día, hemos ganado, ¿no? Creo que este es un acontecimiento que debemos celebrar, pero que no te quepa duda, sigue siendo una tragedia. Hemos expandido nuestras fronteras en el Este, ¿pero a qué coste? Hemos conseguido detener al oso ruso con toda su fuerza, ¿pero a qué coste? Sabiendo esto, en el fondo sé que simplemente no puedo volver a casa como un héroe. No soy ningún héroe. Soy un espectador. No soy un combatiente, no hasta que tome las riendas de mi nueva vida. La guerra me ha transformado en un nuevo hombre, una nueva persona. Mi pelotón y yo nos quedaremos en Rusia, para desgracia del burro que tengo por comandante. Por favor, no te preocupes por mi. Voy a hacer lo que es mejor para ti y Christophe.\n\nSincèrement,"
 france.227.a: "Tu hijo."
 france.228.t: "Querida Mère y pueblo"
 france.228.d: "Hoy hemos recibido la noticia de que la guerra que ha destruido y cobrado tantas vidas, tanto de nuestro país como de fuera, ha terminado. No hubo celebraciones aquí en Varsovia, que los rusos han destruido y masacrado a fondo. Cada centímetro de esta ciudad está cubierto de escombros y cadáveres, asemejándose al estado en que se encontraba cuando los alemanes desfilaron por ella hace 90 años. Todo civil que no evacuó cuando llegó la primera ola fue masacrado sin piedad. Nuestros suministros se agotaron hace mucho tiempo, y una buena parte de nuestro Grupo de Ejércitos ha perecido debido a la inanición y las muchas enfermedades que asolan nuestras trincheras. Los que quedan en nuestra Brigada regresan a casa, un hogar contaminado por los burócratas y los especuladores de guerra que han actuado como parásitos, enriqueciéndose mientras mis camaradas mueren en las ciudades, teniendo que soportar el implacable asalto de los rusos. No han hecho nada para defender el corazón y el alma de la nación, y no les importa en lo más mínimo la muerte de cientos de miles de hombres franceses. Son cómplices, y si acaso, colaboradores de los rusos, ayudando activamente en sus masacres. He estado a punto de morir docenas de veces, y ni una sola vez recibí tratamiento médico o ayuda adecuada que mejorara mi posición. Sin embargo, seguí luchando. Luché una y otra vez, durante años, solo para ser apuñalado por la espalda por las personas que se hacen llamar líderes. Hemos perdido esta lucha, y Rusia ha conquistado Europa del Este, inundando sus fronteras y asesinando europeos. Ya no puedo quedarme sentado, recibiendo órdenes de mis oficiales ejecutivos para permanecer en una trinchera en el frente. Ya no puedo ser un cobarde en mi enfoque. Actuaré como un héroe, actuaré como un guerrero para mi nación y vengaré a mis hermanos caídos. Regresaré a casa y me aseguraré de que Francia nunca caiga como lo hizo hoy, siendo subvertida por judeo-comunistas tanto dentro de nuestra nación como atacada por los judeo-comunistas en Rusia. A mi querida Mère, sabe que voy a hacer esto por el bien de mi nación, por tu bien y por el bien de Christophe. Te amo con todo mi corazón. \n\nSinceramente,"
 france.228.a: "Tu hijo, Lafayette."
 france.229.t: "Para: Mère"
 france.229.d: "Si esta carta te llega a ti, o a Christophe, entonces es muy posible que yo esté muerto. En el momento de escribir esto, todavía estoy en Rusia, y no me he ido con el resto de mi Brigada. Actualmente estoy en el corazón del diablo, Moscú, donde me mantendré firme. Estoy atrincherado con aquellos que juraron seguirme en esta misión, incluyendo a varios rusos, que saben lo que es mejor para la humanidad. Los políticos de toda Europa, que se han sentado atrincherados en sus palacios mientras nuestra gente es asesinada en el cumplimiento del deber, con hombres tan jóvenes como de 18 años, siendo forzados a salir de sus hogares, lejos de sus familias para luchar por estos políticos que no tienen respeto por ellos. Los rusos que han lanzado esta guerra, invadiendo sus países vecinos y actuando como violadores, carniceros y asesinos con el más alto grado de barbarie. Todavía se han salido con la suya con sus crímenes, siendo perdonados por la escoria que dirige las más altas instituciones del mundo. Nuestra gente, nuestra herencia, nuestra etnia y nuestra cultura, serán atacadas y reprimidas para siempre por estas ratas que se esconden en Moscú, que están esperando el momento perfecto para atacar. Ya se puede ver su ideología renaciendo, bautizada con la sangre de cientos de miles de franceses. Ya sean nazis o bolcheviques, nunca cesarán sus ataques contra nuestra gente. Con sangre, salvaré a mi pueblo y aseguraré su futuro. Sé que ahora eres una anciana y deseas tener paz, pero necesitas darte cuenta de la verdad. Voy a atacar a Rusia desde dentro, y si tengo éxito, marcharé hacia el oeste, reclamando Europa de los carniceros. Una gran revolución ha comenzado, y como dicen, una sola chispa puede iniciar un incendio en la pradera. Por favor, querida Mère, si recibes esta carta, corre la voz. No dejes que me olviden. Te amo, y siempre lo haré. Gloria a Francia, y Gloria a los franceses.\n\nSinceramente,"
 france.229.a: "Tu hijo, Lafayette."
 france.230.t: "Saludos a mi queridísima Mère"
 france.230.d: "Estoy seguro de que ya te habrás enterado de las noticias. Francia ha sido salvada del yugo de los cosmopolitas liberales y los judeo-comunistas, quienes redujeron a nuestra gente a sacos de carne, enviándonos al este para ser masacrados en los mataderos que ellos mismos instalaron. A pesar de tu reciente interés en la política, te has estado haciendo mayor, y no querría que tus últimos días los pasaras leyendo cartas de tu hijo sobre el estado de la política francesa. He usado mi posición para asegurar que tu zona quedara ilesa por los combates, y que estarías en buenas manos. Lamento mucho no haber podido asistir al decimoséptimo cumpleaños de Christophe, y espero que no sienta ningún resentimiento hacia mí por ello. Cuando escuches hablar de mí en la televisión o en tu teléfono, solo quiero que sepas que todo lo hago por tu futuro. Por Christophe, por todos en Francia, y por eso me encargué de cumplir con mis deberes con el máximo valor y honor, y no lo haría en nombre de nadie más. Recuerdo la última vez que te vi antes de irme al campamento de entrenamiento hace tantos años. ¿Sabías, entonces, que habías criado a un héroe nacional? Fuiste la mejor madre que cualquier hombre podría pedir. Lamento profundamente no poder visitarte con frecuencia, ya que todavía debo servir, pero siempre estarás en mi corazón y espíritu; también lo estarán Papá, Christophe y toda la nación. Creo que ahí es donde comienza la armonía nacional. Comienza en la familia, y la familia es sagrada para siempre. Cuando pueda visitarte, lo haré, pero desafortunadamente ese momento no es ahora. En la historia de una nación, creo que hay una historia clara y general que establece una identidad y un patrimonio nacional, alimentando a los guerreros de dicha nación durante milenios. El destino de cada persona bajo la bandera nacional es servirla con valentía, o ser parte de la armonía social. Cuando creces, los actos que harás para impulsar esta historia superan tu vida personal y mundana, y eso se refleja aquí. Eso no quiere decir que no estés en mi mente, o que te haya olvidado, no, ni mucho menos. Has sentado las bases, los cimientos, sobre los que me apoyo. Siempre te lo agradeceré. Por supuesto, podemos hablar más en persona, cuando llegue ese día. Adiós por ahora, Madre."
 france.230.a: "Tu hijo."
 france.231.t: "Mandato revolucionario sobre la implementación de ejecuciones"
 france.231.d: "A medida que el Gobierno busca reforzar su autoridad y eliminar la oposición, se presenta al público una elección con respecto a los métodos de ejecución que deben emplearse. Este mandato ha provocado acalorados debates en toda la nación, lo que refleja profundas divisiones sobre la justicia, la moralidad y el futuro de la revolución.\nLos ciudadanos ahora se enfrentan a cuatro opciones distintas para implementar las ejecuciones estatales:\n\nGuillotina: Un retorno al símbolo icónico de la justicia revolucionaria, invocando el espíritu del pasado mientras se busca servir como elemento disuasorio contra los contrarrevolucionarios.\nFusilamiento: Un método que enfatiza la acción rápida y decisiva, atractivo para aquellos que priorizan la eficiencia y la franqueza en asuntos de seguridad del estado.\nInyección letal: Un enfoque más moderno que aboga por una percepción de ejecución humana, alineándose con aquellos que argumentan a favor de un método menos brutal.\nAbolir la pena de muerte: Una elección radical que refleja los ideales de misericordia y rehabilitación, atractiva para aquellos que creen que la revolución debe buscar transformar la sociedad en lugar de perpetuar ciclos de violencia."
 france.231.a: "¡La guillotina es la punta de lanza de la revolución!"
 france.231.b: "El fusilamiento es lo más eficiente."
 france.231.c: "La inyección letal es la más indolora."
 france.231.e: "Que se pudran en prisión y ya."
 france.232.t: "Mandato revolucionario sobre el debate del calendario"
 france.232.d: "En un movimiento significativo para remodelar la identidad nacional, se ha introducido un nuevo mandato para abordar la polémica cuestión del calendario. A medida que se intensifican los debates sobre la mejor manera de reflejar los valores y aspiraciones revolucionarios de la nación, se pide a los ciudadanos que opinen sobre su sistema preferido para medir el tiempo. Este debate no solo pone de manifiesto las diferentes perspectivas sobre la tradición frente al progreso, sino que también sirve como campo de batalla simbólico para conflictos ideológicos más amplios.\nSe presentan al público dos opciones:\n\nRegreso del antiguo calendario republicano francés: Los defensores de esta opción argumentan que la reinstauración del calendario histórico honrará el espíritu revolucionario y celebrará los valores del pasado. Creen que unificará a la población bajo un marco histórico compartido y enfatizará la importancia de los ideales revolucionarios en la vida diaria.\nMantener el calendario actual: Los partidarios de esta opción sostienen que el calendario existente proporciona estabilidad y continuidad, permitiendo a los ciudadanos llevar sus vidas sin las interrupciones que un cambio podría traer. Argumentan que el sistema actual se ha arraigado en la sociedad y cumple propósitos prácticos que no deben pasarse por alto."
 france.232.a: "¿En serio nos estamos planteando esto?"
 france.232.b: "¡Debemos regresar a una sociedad libre de religión!"
 france.233.t: "Mandato revolucionario sobre la homosexualidad y género"
 france.233.d: "En un momento crucial de transformación social, se ha introducido un nuevo mandato para abordar los complejos problemas que rodean la homosexualidad y la identidad de género. Mientras la sociedad lidia con las implicaciones de los ideales revolucionarios en las libertades y derechos personales, se invita a los ciudadanos a participar en este debate crucial. El resultado de este mandato influirá significativamente en el panorama cultural y social de la nación.\nSe presentan al público dos opciones distintas:\n\nAceptar la homosexualidad y los debates de género: Los partidarios de esta opción abogan por la plena aceptación y reconocimiento de las diversas orientaciones sexuales e identidades de género. Argumentan que abrazar estos aspectos de la identidad humana es esencial para fomentar la igualdad, promover las libertades individuales y crear una sociedad más inclusiva.\nProhibir la homosexualidad y los debates sobre el género: Los defensores de esta opción argumentan que tales medidas son necesarias para mantener los valores tradicionales y las normas sociales. Creen que restringir los debates y las expresiones de identidades no heteronormativas protegerá el tejido de la comunidad y preservará las costumbres establecidas."
 france.233.a: "¡Somos los campeones de la justicia social y la libertad!"
 france.233.b: "¡No permitiremos la indecencia!"
 france.234.t: "Mandato revolucionario sobre exhibiciones arquitectónicas de inmensa riqueza"
 france.234.d: "En un audaz reflejo de los valores revolucionarios, ha surgido un nuevo mandato para abordar el legado de la opulencia arquitectónica representada por Versalles y los grandes castillos de Francia. Mientras la nación contempla su relación con los símbolos del exceso y la decadencia del pasado, se invita a los ciudadanos a opinar sobre el futuro de estas estructuras monumentales. Este debate no solo desafía la importancia histórica de estos sitios, sino que también plantea preguntas sobre los valores que deberían definir la sociedad contemporánea.\nSe presentan al público tres opciones distintas:\n\nMuseos de la Decadencia Burguesa: Los defensores de esta opción abogan por transformar estas lujosas propiedades en museos que critiquen sus historias, destacando los excesos de la burguesía. Creen que al preservar estas estructuras como espacios educativos, la sociedad puede aprender del pasado y fomentar un futuro más igualitario.\nDerribarlos: Los partidarios de esta opción argumentan que estos símbolos de inmensa riqueza son antitéticos a los ideales revolucionarios y deben ser demolidos para borrar los recordatorios de opresión y desigualdad. Sostienen que derribarlos significaría una ruptura definitiva con un pasado marcado por la disparidad de clases.\nNo hacer nada: Aquellos a favor de mantener el statu quo creen que estas maravillas arquitectónicas son parte integral del patrimonio cultural y turístico de Francia. Argumentan que preservarlos tal como están permite apreciar el arte histórico y proporciona beneficios económicos a la comunidad."
 france.234.a: "¡Conviértanlos en Museos de la Decadencia Burguesa!"
 france.234.b: "¡Derríbenlos!"
 france.234.c: "Tenemos asuntos más importantes que atender..."
 france.235.t: "Mandato Revolucionario sobre Filosofía y Política Exterior"
 france.235.d: "En un momento transformador para la ideología nacional, ha surgido un nuevo mandato para dar forma a los fundamentos filosóficos de la política exterior. A medida que el gobierno revolucionario busca redefinir su lugar en el mundo, se invita a los ciudadanos a deliberar sobre los principios rectores que deben dirigir sus interacciones en el escenario global. Este debate no solo aborda las prioridades nacionales, sino que también refleja compromisos ideológicos más amplios con los ideales revolucionarios. \nSe presentan al público dos opciones distintas: \nRevolución Mundial - Los defensores de este enfoque argumentan que Francia debe promover y apoyar activamente los movimientos revolucionarios en todo el mundo. Creen que la difusión de los ideales revolucionarios es esencial para desmantelar los regímenes opresores y fomentar la igualdad global. Al posicionar a Francia como campeona de la revolución mundial, los partidarios sostienen que la nación puede inspirar el cambio y la solidaridad entre los pueblos oprimidos de todo el mundo. \nRevolución Interna - Los partidarios de esta opción abogan por centrarse en abordar los problemas dentro de Francia antes de comprometerse con la comunidad internacional. Creen que el gobierno debe priorizar las reformas internas para garantizar la justicia social, la igualdad y la estabilidad en el país. Al concentrarse en las necesidades del pueblo francés, los defensores afirman que la nación puede servir como modelo para otros, demostrando la eficacia de los principios revolucionarios a través de mejoras tangibles en la vida de los ciudadanos."
 france.235.a: "Siempre defenderemos la Revolución en todo el mundo"
 france.235.b: "Debemos enfocarnos en nuestra Revolución interna"
 france.236.t: "Mandato Revolucionario sobre la Ley de Sospechosos"
 france.236.d: "En un momento de profunda reflexión sobre el equilibrio entre seguridad y libertad, se ha introducido un nuevo mandato con respecto a la controvertida Ley de Sospechosos. Mientras el gobierno revolucionario lidia con las amenazas a su estabilidad y la seguridad de sus ideales, se invita a los ciudadanos a expresar sus opiniones sobre la reintroducción de este importante marco legal. Este debate reaviva recuerdos de tensiones pasadas y plantea preguntas críticas sobre los derechos civiles en nombre de la seguridad. \nSe presentan al público dos opciones distintas: \nRestaurar la Ley de Sospechosos - Los defensores de esta opción argumentan que restablecer la ley es esencial para salvaguardar la revolución de amenazas internas y elementos contrarrevolucionarios. Creen que las medidas descritas en la ley mejorarán la seguridad nacional y preservarán los logros obtenidos con tanto esfuerzo por el movimiento revolucionario, incluso si esto requiere algunos sacrificios en las libertades personales. \nNo Restaurar la Ley - Los oponentes de esta opción sostienen que reintroducir una ley así socava los mismos principios de libertad y justicia que la revolución busca defender. Argumentan que la ley históricamente ha llevado a abusos de poder y persecución injusta, y que el compromiso con los derechos humanos debe ser primordial en cualquier empresa revolucionaria."
 france.236.a: "Esto es necesario para mantener nuestra Revolución"
 france.236.b: "¡Esto es descaradamente tiránico!"
 france.237.t: "Mandato revolucionario sobre Robespierre y el \"Reinado del Terror\""
 france.237.d: "En un momento crucial de introspección, el gobierno revolucionario ha introducido un mandato para reevaluar el legado de Maximilien Robespierre y el infame \"Reino del Terror\". Mientras la nación lidia con su tumultuosa historia, se convoca a los ciudadanos a evaluar el impacto de las acciones de Robespierre en la causa revolucionaria y los ideales que esta defiende. Este debate sirve como un examen crítico del equilibrio entre el fervor revolucionario y los principios de justicia y humanidad. \nSe presentan al público dos opciones distintas: \nFaro del Idealismo Revolucionario - Los partidarios de esta perspectiva ven a Robespierre como un campeón de la revolución, cuyo compromiso inquebrantable con los ideales revolucionarios justificó las medidas tomadas durante el Reino del Terror. Argumentan que sus acciones fueron necesarias para proteger la revolución de los enemigos y mantener los logros de libertad e igualdad obtenidos con tanto esfuerzo. Los defensores creen que reconocer a Robespierre como una luz guía es esencial para inspirar a las futuras generaciones a mantener el espíritu revolucionario. \nTirano - Los oponentes de esta visión sostienen que el reinado de Robespierre representó un peligroso abuso de poder que llevó a un miedo generalizado, represión y la pérdida de innumerables vidas. Argumentan que etiquetarlo como un tirano mezquino sirve como una advertencia contra los peligros del extremismo y el potencial de que el fervor revolucionario degenere en autoritarismo. Esta perspectiva exige una reevaluación crítica del pasado, enfatizando la necesidad de priorizar la justicia y los derechos humanos sobre la búsqueda de la pureza ideológica."
 france.237.a: "El fue un faro de idealismo revolucionario"
 france.237.b: "No fue más que un tirano mezquino"
 france.240.t: "Los militares usan su influencia"
 france.240.d: "En los últimos días, se ha convertido en un secreto a voces que el ejército francés está ejerciendo sutilmente su influencia en los asuntos políticos, moldeando la política nacional desde bambalinas. Si bien los canales oficiales permanecen en silencio sobre el asunto, los líderes militares son cada vez más vistos como actores clave en el proceso de toma de decisiones, aprovechando sus considerables recursos y el apoyo público para abogar por una estrategia de defensa más asertiva. Esto ha generado preocupación entre analistas políticos y ciudadanos por igual, quienes comienzan a cuestionar el verdadero alcance de la participación militar en la gobernanza.\n\nA medida que aumentan las tensiones en el panorama geopolítico, los rumores sobre las preferencias militares por un enfoque de línea dura en la política exterior han circulado entre los círculos gubernamentales."
 france.240.a: "¿Qué quieren conseguir?"
 france.241.t: "Reformar al ciudadano francés"
 france.241.d: "Con nuestra victoria en las elecciones, nuestro partido ha recibido carta blanca para promulgar reformas, incluyendo el plan para redefinir la idea del ciudadano francés. Sin embargo, esto se ha convertido en un problema polarizador en nuestro gobierno, con dos bandos apoyando ideas alternativas. Los moderados de nuestro partido creen que deberíamos animar a nuestros ciudadanos a servir a su país alistándose en el ejército. Aunque Francia ha disfrutado de una paz relativa durante el siglo XXI, los recientes acontecimientos en América y Europa han hecho necesario aumentar el gasto en defensa.\n\nLos intransigentes de nuestro partido, sin embargo, argumentan que deberíamos animar a nuestros ciudadanos a servir a su país buscando empleo en las fábricas. Con el estallido de la guerra en Arabia Saudita y América al borde de una guerra civil segura, Francia debe reforzar su producción nacional si espera sobrevivir. Esta propuesta ha encontrado oposición tanto de moderados como de ecologistas dentro de nuestro partido, quienes argumentan que decir a nuestra gente que trabaje hasta la extenuación solo dañará nuestra calificación de aprobación. A pesar de todo, los intransigentes del partido apoyan esta idea como una forma de estimular el crecimiento de la economía francesa."
 france.241.a: "Abraza el servicio a tu país"
 france.241.b: "El trabajo duro da sus frutos"
 france.242.t: "La República Francesa solicita una reducción de las reparaciones de guerra"
 france.242.d: "Tras nuestra decisiva victoria en el reciente conflicto, hemos recibido una solicitud oficial de la República Francesa para reducir las reparaciones de guerra impuestas sobre ellos. Esta apelación es un claro indicativo del debilitamiento de Francia y un reconocimiento de nuestra fuerza a nivel internacional. Al mismo tiempo que refleja de nuestro triunfo, está claro que esta solicitud simboliza no solo la vulnerabilidad francesa, también simboliza nuestra posición como una potencia formidable en Europa."
 france.242.a: "Las reduciremos, pero deberán aceptar devolvernos nuestra inversión."
 france.242.b: "¡Sería un insulto para los caídos!"
 france.244.t: "¡Mélenchon consolida el poder!"
 france.244.d: "Jean-Luc Mélenchon ha consolidado con éxito su autoridad dentro de su facción del Nuevo Frente Popular, posicionándose como la voz dominante en el partido en medio de un panorama político cambiante. A través de una serie de alianzas estratégicas y una comunicación efectiva, Mélenchon ha movilizado a sus partidarios, reforzando una visión que enfatiza las políticas progresistas y la justicia social. Su carismático estilo de liderazgo ha resonado con la base del partido, permitiéndole consolidar el poder e impulsar una ambiciosa agenda."
 france.244.a: "Genial."
 france.245.t: "¡Faure consolida su poder!"
 france.245.d: "En un movimiento estratégico para fortalecer su posición, Olivier Faure ha consolidado exitosamente el poder dentro de su facción del Nuevo Frente Popular. A medida que el panorama político se vuelve cada vez más turbulento, el estilo de liderazgo de Faure ha resonado entre los miembros del partido, quienes lo ven como una figura unificadora capaz de navegar las complejidades de la política contemporánea. Sus esfuerzos por unir diversas corrientes ideológicas dentro de la facción han resultado en una mayor cohesión, permitiendo una agenda más enfocada que atrae a un electorado más amplio."
 france.245.a: "Genial."
 france.251.t: "Mélenchon vuela a Moscú"
 france.251.d: "En una declaración audaz y provocadora, Jean-Luc Mélenchon afirmó que \"Rusia es un amigo de Francia con quien se debería aumentar la cooperación\", abogando por un cambio en la política exterior en medio del conflicto en curso en Ucrania y la posible implicación de la OTAN. Expresó su preocupación por la escalada de la presencia militar de la OTAN, declarando: \"Muy pronto se iniciarán procesos para retirarse de la OTAN\". Esta declaración tiene como objetivo reposicionar a Francia como un actor independiente en las relaciones internacionales, centrándose en la diplomacia y la colaboración con naciones que comparten intereses comunes, en lugar de alinearse con alianzas militares.\n\nDesde el anuncio de Mélenchon, el ejército ha permanecido notablemente en silencio, lo que plantea interrogantes sobre la dinámica interna dentro del estamento de defensa de Francia. Este silencio puede indicar un reconocimiento reacio del cambio político en curso, mientras el ejército navega su papel en un panorama geopolítico cambiante. El énfasis de Mélenchon en la cooperación con Rusia y una posible retirada de la OTAN resuena con segmentos del electorado cansados del conflicto, posicionando al Nuevo Frente Popular como un actor clave que aboga por un nuevo enfoque diplomático en Europa."
 france.251.a: "Preocupante para algunos..."
 france.252.t: "Mélenchon se opone a la guerra"
 france.252.d: "Hoy, el presidente francés Jean-Luc Mélenchon se dirigió a la nación, expresando su profunda preocupación por la escalada del conflicto que involucra a una Rusia liderada por Medvédev y la posible entrada de la OTAN en la contienda. \"Queridos conciudadanos, me presento hoy ante ustedes con una profunda preocupación en mi corazón\", afirmó, instando al pueblo francés a rechazar la participación en una guerra con Rusia. \"Se nos insta a participar en un conflicto con Rusia, pero les digo que esto es una locura. Esta no es nuestra guerra. Esta no es nuestra batalla\". Mélenchon enfatizó que Francia no debe ser arrastrada a un ciclo interminable de violencia, abogando por una retirada de la OTAN y un retorno a una política independiente centrada en la paz y la estabilidad.\n\nEn su apasionado discurso, Mélenchon invocó el contexto histórico al preguntar: \"¿Por qué morir por Odesa?\". Esto hizo eco de la famosa frase \"¿Por qué morir por Danzig?\", destacando su fuerte oposición a la confrontación militar y enmarcando la situación actual como una que no justifica el sacrificio francés. Al unir a la nación en torno a un mensaje de no intervención y diplomacia, busca alejar a Francia de las crecientes tensiones y encaminarla hacia una senda que priorice el diálogo y la cooperación sobre el conflicto."
 france.252.a: "Un Danzig moderno."
 france.253.t: "Mélenchon llama a la unidad contra el fascismo"
 france.253.d: "\"¡Ciudadanos de Francia y de toda Europa! El día de hoy estamos enfrentado una enorme amenaza. El fascista Imperio ruso, encabezado por Vladímir Zhirinovski, ha iniciado una agresión contra Ucrania. No podemos quedarnos de brazos cruzados. Nosotros, como Europa democrática, debemos unirnos y combatir a esta maldad. El fascismo no tiene derecho de existir en el mundo moderno. Debemos unir todas nuestras fuerzas, todos nuestros recursos para combatir esta amenaza. Hoy, hago un llamado a todos los ciudadanos franceses, a todos nuestros aliados en Europa y más allá: ¡luchemos codo con codo contra la agresión fascista! Nuestro futuro depende de nuestra determinación. Lucharemos por la libertad, al democracia, por un futuro libre de fascismo para nuestros hijos. Adelante, ¡hacia la victoria contra el invasor fascista!"
 france.253.a: "Allez on pousse!"
 france.254.t: "Mélenchon forma la Brigada Antifascista Rusa"
 france.254.d: "El presidente Jean-Luc Mélenchon anunció la creación de una brigada de antifascistas radicales y comunistas rusos comandada por Serguéi Udaltsov. Esta brigada tiene el fin de combatir contra el fascista Imperio ruso y su líder Vladímir Zhirinovski, simbolizando solidaridad internacional y la lucha por justicia."
 france.254.a: "¡Ura!"
 france.146.t: "Abusos militares Conexiones políticas"
 france.146.d: "A quien corresponda, \n\nA medida que las mareas del nacionalismo crecen en nuestra gran nación, es mi deber expresar mi creciente preocupación por la incapacidad del gobierno actual para abordar las necesidades apremiantes de nuestro pueblo. Ha llegado el momento de que el liderazgo militar dé un paso al frente y guíe a nuestro país hacia la fuerza y la estabilidad. Nuestra influencia ya no puede ser marginada; debemos afirmar nuestra presencia para asegurar que los intereses de Francia estén protegidos. Es imperativo que sofocemos cualquier esfuerzo del gobierno gobernante que ponga en peligro nuestra integridad nacional.\n\nAtentamente, [THIS.GetRank] [THIS.GetName]"
 france.146.a: "¡Despotismo descarado!"
 france.147.t: "Los militares nos pasan la factura."
 france.147.d: "Al Ministerio de Finanzas,\n\nA la luz de los acontecimientos recientes, me he tomado la libertad de reasignar fondos gubernamentales sustanciales para operaciones militares consideradas esenciales para la seguridad nacional. Si bien estos gastos son vitales para mantener nuestra preparación, es esencial que el gobierno en el poder comprenda la gravedad de la situación. Si el gobierno desea cuestionar estos gastos, me aseguraré de que la factura les sea devuelta, ya que la seguridad de nuestra nación no puede verse comprometida por retrasos burocráticos.\n\nAtentamente, [THIS.GetRank] [THIS.GetName]"
 france.147.a: "Deuda deuda deuda..."
 france.148.t: "Posturas militares contra el Gobierno"
 france.148.d: "A mis compañeros oficiales:\n\nMe he dado cuenta de que nuestra postura contra las políticas del gobierno actual ha recibido reacciones diversas. Sin embargo, debemos mantenernos firmes en nuestra posición. Al desafiar abiertamente las decisiones del gobierno, destacamos nuestro compromiso con las verdaderas necesidades de nuestra nación. Aunque esto pueda causar inestabilidad, es un paso necesario para demostrar que el ejército se erige como una fuerza formidable frente a la mala gobernanza. El pueblo debe ver que estamos preparados para proteger sus intereses.\n\nAtentamente, [THIS.GetRank] [THIS.GetName]"
 france.148.a: "¡Que te jodan a ti también!"
 france.149.t: "El ejército crea una nueva división"
 france.149.d: "Al Mando,\n\nMe complace anunciar la formación de una nueva división dedicada a los ideales de nacionalismo que resuenan con nuestro pueblo. Esta división operará bajo los principios que priorizan el bienestar de Francia y sus ciudadanos, independientemente de la influencia del gobierno actual. Es crucial que establezcamos una fuerza que refleje las aspiraciones de la población, ya que nuestra lealtad ahora reside en la nación misma, en lugar de en los individuos actualmente en el poder. Debemos prepararnos para los desafíos que se avecinan.\n\nAl servicio de nuestra nación, [THIS.GetRank] [THIS.GetName]"
 france.149.a: "Bueno, esto no está tan mal."
 france.250.t: "¿Un nuevo candidato?"
 france.250.d: "A medida que se avecinan las próximas elecciones presidenciales, ha surgido una lucha de poder dentro del Frente Nacional tras la declaración pública de Marine Le Pen contra el control militar en el gobierno. El ejército francés, cada vez más preocupado por la dirección del partido bajo Marine Le Pen, ha exigido de manera discreta pero firme que el FN la reemplace por un candidato más alineado con sus intereses: Pierre de Villiers, el muy respetado ex Jefe del Estado Mayor. De Villiers, conocido por su fuerte postura pro-militar y su enfoque directo en defensa, representa una marcada desviación de la retórica populista de Le Pen.\n\nLa dirección del FN está ahora dividida. Si bien Le Pen ha cultivado una base de seguidores leales, existe un reconocimiento creciente de que un candidato más pro-militar como de Villiers podría atraer el apoyo de figuras militares clave y votantes conservadores que consideran la seguridad nacional como primordial. La intervención del ejército, aunque informal, es una señal clara de que esperan un cambio en la política y el personal en los niveles más altos del gobierno. El partido ahora debe elegir entre mantenerse leal a su base populista o abrazar una figura que podría brindar tanto éxito electoral como respaldo militar."
 france.250.a: "¡Tres hurras por Villiers!"
 france.250.b: "¡Apoyamos a Le Pen!"
 france.262.t: "Francia ofrece la membresía en la OTAN a cambio de Guyana"
 france.262.d: "En una sorprendente maniobra diplomática, el gobierno francés ha ofrecido ceder la Guayana Francesa a Brasil a cambio de la membresía del país en la OTAN. Esta audaz propuesta tiene como objetivo fortalecer la alianza en América del Sur y mejorar la seguridad regional contra amenazas externas. Francia cree que la integración de Brasil en la OTAN reforzará las capacidades de defensa colectiva y promoverá la estabilidad en un área geopolíticamente estratégica.\n\nEl liderazgo francés concibe este acuerdo como mutuamente beneficioso: Brasil obtendría un activo territorial significativo, mejorando su influencia y recursos, mientras que Francia aseguraría un poderoso aliado dentro de las filas de la OTAN. Sin embargo, esta propuesta ha desatado un intenso debate tanto a nivel nacional como internacional. Los críticos cuestionan las implicaciones a largo plazo de tal concesión territorial, mientras que los partidarios argumentan que podría marcar el comienzo de una nueva era de cooperación y seguridad en la región. A medida que avanzan las discusiones, el mundo observa de cerca cómo se desarrolla esta oferta sin precedentes."
 france.262.a: "Si, claro."
 france.262.b: "¡Jódete!"
 france.263.t: "¡Brasil acepta!"
 france.263.d: "En un giro histórico de los acontecimientos, Brasil ha aceptado oficialmente la oferta de Francia de ceder la Guayana Francesa a cambio de su membresía en la OTAN. Este acuerdo marca un hito significativo en las relaciones franco-brasileñas y se considera un movimiento estratégico para mejorar la seguridad y la estabilidad en América del Sur. El gobierno francés ve esto como una oportunidad para solidificar alianzas en la región, aprovechando la influencia emergente de Brasil dentro de la OTAN para abordar preocupaciones de seguridad colectiva.\n\nA medida que se desarrolla la transferencia de Guayana, Francia se enfoca en asegurar una transición fluida para el territorio y sus residentes. El liderazgo francés se compromete a defender los derechos y el bienestar de la población local mientras los integra en la gobernanza de Brasil. Se espera que esta audaz decisión fomente lazos más estrechos entre las dos naciones, promoviendo la cooperación económica e intereses de seguridad compartidos. Si bien algunos críticos expresan preocupaciones sobre las implicaciones a largo plazo de este cambio territorial, el gobierno sigue siendo optimista de que esta medida fortalecerá la presencia de la OTAN en las Américas y contribuirá a un panorama regional más estable."
 france.263.a: "¡Excelente!"
 france.264.t: "¡Brasil se niega!"
 france.264.d: "En un sorprendente giro de los acontecimientos, Brasil ha rechazado oficialmente la oferta de Francia de ceder la Guayana Francesa a cambio de la membresía en la OTAN. Esta decisión ha dejado al gobierno francés frustrado, ya que esperaba fortalecer alianzas en América del Sur y mejorar la seguridad regional a través de este acuerdo sin precedentes. Los líderes franceses consideran el rechazo de Brasil como una oportunidad perdida para solidificar una poderosa asociación dentro de la OTAN, lo que podría haber abordado las preocupaciones de seguridad mutuas de manera más efectiva.\n\nEl rechazo ha provocado un intenso debate en Francia sobre el futuro de sus intereses estratégicos en la región. Algunos funcionarios expresan su decepción, argumentando que la negativa de Brasil señala una reticencia a comprometerse más profundamente con la OTAN y Occidente. A medida que el gobierno reevalúa su enfoque diplomático, hay un renovado enfoque en fortalecer los lazos con otros aliados potenciales en América Latina. Francia sigue comprometida a mantener su presencia en la región, pero el camino a seguir requerirá una cuidadosa navegación de las complejas dinámicas geopolíticas y una reevaluación de sus estrategias de política exterior."
 france.264.a: "¡Sí, que te jodan a ti también!"
 france.265.t: "Quebec celebra un referéndum de independencia"
 france.265.d: "Con el crecimiento de las tensiones en Quebec, el gobierno provincial ha anunciado oficialmente que realizará un referéndum de independencia, que determinará el futuro de su relación con Canadá. Este significativo movimiento político refleja los deseos de mayor autonomía e incluso de autodeterminación presentes en los quebequenses desde hace mucho tiempo. El Gobierno canadiense ve el referéndum como un momento crítico que puede redibujar la nación y los líderes en Ottawa están organizando una fuerte campaña para resaltar los beneficios de permanecer unidos. \n\nAsí, el Gobierno federal ha intensificado los esfuerzos para conectar con los ciudadanos quebequenses, enfatizando los lazos económicos, culturales y sociales que unen la provincia y Canadá. El primer ministro y los ministros están preparando una campaña a nivel nacional que muestre argumentos convincentes para mantenerse unidos y las potenciales consecuencias de la independencia. Con la fecha del referéndum acercándose, ambos lados se están preparando para una votación que tendrá un impacto duradero en el futuro de Canadá. "
 france.265.a: "Nos vamos"
 france.265.b: "En el fondo nos gusta Canadá"
 france.270.t: "Francia exige más reparaciones de guerra"
 france.270.d: "En medio del periodo de posguerra tras el devastador conflicto con Rusia, el Gobierno francés ha dado un paso importante al pedir formalmente un incremento de las reparaciones de guerra. Con nuestra nación sufriendo importantes daños y pérdidas de la guerra, nuestro liderazgo está determinado en hacer pagar a Rusia por sus acciones agresivas. El Ministerio de Asuntos Exteriores ha declarado: \"Debemos asegurarnos de que aquellos que hayan provocado conflictos como el que acabamos de salir enfrenten las consecuencias de sus actos. No debemos olvidar el sacrificio de nuestro pueblo e impartiremos justicia.\"\n\nCon Francia presionando para recibir estas reparaciones, la respuesta de Rusia es incierta. Esta demanda podría llevar a un incremento de las tensiones diplomáticas, potencialmente deteriorando las relaciones dentro de la OTAN. De forma alternativa, un enfoque menos agresivo podría abrir vías de negociaciones, permitiendo a amabas naciones buscar una resolución pacífica que promueva la estabilidad en Europa. El enfoque que tomemos tendrá un impacto significativo en el balance de poder de la región."
 france.270.a: "No tenemos DINERO"
 france.270.b: "Rebuscaremos entre lo que tenemos"
 france.271.t: "Rusia rechaza aumentar las reparaciones"
 france.271.d: "En respuesta a las recientes demandas de reparaciones de guerra, el Gobierno ruso ha rechazado oficialmente la demanda francesa, tachándolo como una imposición injusta. Esto ha alimentado las tensiones entre ambas naciones, pues Francia ve esto como una descarada falta de respeto al sufrimiento de la nación durante la guerra. El liderazgo francés, determinado en defender la dignidad nacional y garantizar las compensaciones con las pérdidas sufridas, percibe este rechazo como una prueba de la falta de voluntad de Rusia de asumir la responsabilidad por sus acciones.\n\nA la luz del rechazo ruso, Francia ha decidido imponer un embargo económico con el fin de presionar a Rusia para que reconsidere su postura. El Gobierno francés considera que un embargo podría resquebrajar la terquedad rusa y forzarles a reconsiderar sus políticas, y al mismo tiempo, reforzar la unidad y la voluntad de la OTAN a la hora de enfrentar amenazas externas. "
 france.271.a: "Conocen nuestra respuesta..."
 france.272.t: "Rusia acepta aumentar las reparaciones"
 france.272.d: "Después de negociaciones intensas y la creciente presión de la comunidad internacional, el Gobierno ruso ha inesperadamente aceptado las demandas de Francia por reparaciones de guerra. Esta decisión se ve como una victoria significativa para los líderes franceses, que lo ven como un paso crucial hacia la justicia y la rendición de cuentas por el sufrimiento padecido durante el reciente conflicto. La aceptación no solo reconoce las dificultades que Francia afrontó, pero también indica un posible deshielo en las relaciones, brindando una oportunidad para un diálogo renovado. \n\nA la luz de este acontecimiento, Francia está preparada para tomar medidas para reconstruir y fortalecer su economía, utilizando las reparaciones para apoyar los esfuerzos de recuperación y reforzar la estabilidad nacional. Este resultado positivo también podría mejorar la posición de Francia en la OTAN, demostrando su capacidad para exigir la rendición de cuentas a sus adversarios. Sin embargo, el gobierno francés se mantiene cauteloso, consciente de que vigilancia constante es necesaria para garantizar que Rusia cumpla sus compromisos y que puedan evitarse futuros conflictos."
 france.272.a: "¡Genial, gracias!"
 france.273.t: "El Gobierno francés exige clemencia"
 france.273.d: "A la luz de la situación actual en nuestros territorios ocupados, el Gobierno francés ha solicitado formalmente que apliquemos clemencia en nuestro gobierno de estas zonas. Francia argumenta que un enfoque más humano y conciliador fomentará la estabilidad y facilitará el regreso a la normalidad, lo que podría allanar el camino para futuros esfuerzos de reconciliación. \n\nOficiales franceses destacan que tratar a las poblaciones locales con respeto y comprensión podría ayudar a disminuir la hostilidad y fomentar la cooperación, especialmente mientras trabajamos para reconstruir nuestra nación tras el reciente conflicto. Sin embargo, hay opiniones divergentes en nuestro gobierno sobre la viabilidad y las implicaciones de esta petición."
 france.273.a: "Haremos lo que nos plazca con nuestros territorios"
 france.273.b: "Uh... Ok."
 france.2731.t: "Ucrania acepta petición de clemencia"
 france.2731.d: "En un desarrollo positivo para las relaciones franco-ucranianas, el gobierno ucraniano ha aceptado nuestra petición de clemencia en los territorios ocupados. Esta decisión es vista como un paso significativo hacia el fomento de la estabilidad y la reconciliación en la región, así como una mejora de la situación humanitaria para las poblaciones locales."
 france.2731.a: "Conocen su lugar"
 france.2732.t: "Ucrania rechaza petición de clemencia"
 france.2732.d: "En respuesta al rechazo de Ucrania a aceptar nuestra petición de clemencia en la administración de los territorios ocupados, el gobierno francés ha decidido imponer un embargo a estas regiones. Esta medida tiene como objetivo presionar a Ucrania para que reconsidere su postura y adopte un enfoque más permisivo en la administración de los territorios."
 france.2732.a: "¡Embarga las zonas de ocupación!"
 france.274.t: "¿Intervención en Libia?"
 france.274.d: "Impulsado por el caos de la guerra civil libia, uno de los hijos de Gadafi tomó el poder de manera sorprendente, un Gadafi en libia...otra vez. Esto, sin embargo, no puede ser tolerado, ya que, tal padre tal hijo, es un dictador autocrático, y siguiendo los sueños de su padre, ha iniciado una campaña imperial invadiendo países vecinos para crear un estado panárabe dictatorial, siguiendo la misma ideología fallida de su padre. Muchos en el gobierno están fuertemente opuestos al nuevo país, y muchos han propuesto deponer su liderazgo y traer la democracia a la gente de libia. \n\nNo todos están de acuerdo, sin embargo. Muchos en el gobierno están fuertemente opuestos a una potencial invasión debido a las memorias de la ultima vez que destruimos el régimen de Gadafi. Nuestros motivos, aunque bien intencionados, al de traer la democracia a un pueblo oprimido, provocaron una brutal guerra civil en la nación, y solo causaron devastación, haciendo sufrir al pueblo libio. Al mismo tiempo, aunque comprensible, había quienes deseaban irracionalmente el antiguo régimen de Gadafi. Otro argumento es que la guerra seria simplemente una perdida de tiempo, como ocurrió la última vez que apoyamos a los rebeldes; esto podría convertirse en otro atolladero, similar a nuestros intentos previos de difundir la democracia en Medio Oriente. \n\nSin embargo, el lado pro-intervención destacó la importancia no solo  de difundir la libertad y la democracia, sino también de salvaguardar el Mediterráneo, lo que nos daría el control total del mismo y seria crucial para futuras campañas de democracia."
 france.274.a: "¡No podemos tolerar más el gobierno de Gadaffi!"
 france.274.b: "¡No podemos invadir sin más!"
 france.275.t: "¿Intervención en África Occidental?"
 france.275.d: "África ha sido, por desgracia, un foco de guerras y violencia, lo que ha provocado un enorme sufrimiento humano en el continente, además de permitir que gobernantes autocráticos dominen muchos países. Debemos asegurarnos de que los principios democráticos se mantengan en África y de que se respeten los derechos humanos. También existe el beneficio adicional de obtener los recursos naturales de la región a través de un régimen democrático aliado, lo cual sería increíblemente beneficioso para nuestra economía. \n\nPor suerte para nosotros, la situación en África se ha estabilizado lo suficiente, y los regímenes locales que están en el poder son democráticos y favorables a nuestros intereses. También están dispuestos a comerciar sus recursos naturales con nosotros. Esto ha llevado a la conclusión de que una intervención en la región no es necesaria. Esto es una excelente noticia para nosotros, ya que nos deja con una región menos en la que gastar valiosos recursos militares. En cualquier caso, cualquier aliado nuestro prosperará."
 france.275.a: "¡Debemos apoyar la democracia de África Occidental a toda costa!"
 france.275.b: "¡No podemos invadir sin más!"
 france.275.c: "La situación ya se ha estabilizado"
 france.276.t: "Francia exige recursos de África Occidental"
 france.276.d: "El cuerpo diplomático francés ha entregado una solicitud para que Francia reciba un trato preferente para que sus empresas en nuestra nación puedan explotar nuestros recursos naturales locales. Incluyeron promesas de beneficios económicos para nosotros y de ser protegidos por las fuerzas francesas. Sin embargo, estas promesas parecen vacías, considerando nuestra historia compartida y el redacción del texto.\n\nMuchos en el gobierno han recomendado que aceptemos estas demandas, dado que podemos ofrecer poca resistencia; además, existe la posibilidad de crecimiento económico, lo que podría ayudar a combatir el desempleo local y mejorar nuestra infraestructura. Sin embargo, muchos otros están indignados ante esta demanda. Después de todos esos años en los que fuimos colonizados por Francia, después de que nuestro pueblo fuera esclavizado a manos extranjeras durante décadas, ¿vamos a aceptar sin más que esta opresión continúe?\n\n¿Debemos aceptar esta demanda y no preocuparnos por una posible invasión u otras acciones que Francia pueda emprender, o ha llegado el momento de al fin defendernos por nuestra propia cuenta?"
 france.276.a: "No tenemos elección."
 france.276.b: "¡No podemos permitirnos esto!"
 france.277.t: "¡ECOMOG acepta el acuerdo!"
 france.277.d: "Los políticos en la alianza ECOMOG han visto la razón en nuestra oferta y han aceptado nuestras demandas de recursos. Esto incrementará enormemente nuestra influencia en África Occidental y nos permitirá obtener nuevos socios comerciales potenciales."
 france.277.a: "¡Excelente!"
 france.278.t: "¡ECOMOG rechaza el acuerdo!"
 france.278.d: "Los necios líderes de África Occidental han rechazado nuestra petición afirmando que no cuentan con suficientes recursos como para compartir. Esto empeorará significativamente nuestras relaciones con ellos y puede resultar en una pérdida aún mayor de influencia en África."
 france.278.a: "¡Sí, que te jodan a ti también!"
 france.279.t: "Francia demanda la disolución del Batallón Azov"
 france.279.d: "Tras el reciente conflicto con Rusia, nuestros aliados occidentales, especialmente Francia, nos han estado presionando para disolver el Batallón Azov. Esta demanda ha causado un intenso debate en nuestro gobierno y sociedad, ya que el batallón ha sido una parte crucial de nuestra defensa contra la agresión rusa.\n\nAlgunos argumentan que disolver el batallón mejoraría nuestra imagen con las naciones occidentales y promocionaríamos valores, mientras que otros temen que disolver una unidad que ha demostrado valentía en el campo de batalla debilitaría nuestra defensa nacional."
 france.279.a: "¡Nunca! ¡Son héroes de Ucrania!"
 france.279.b: "Son demasiado radicales..."
 france.280.t: ""
 france.280.d: ""
 france.280.a: ""
 france.2810.t: "Europa, indivisible"
 france.2810.d: "Nuestro continente es fundamental para la civilización y para lo que debería ser.\n\nLamentablemente, durante mucho tiempo ha habido intentos deliberados de socavar esa base en nombre del progreso. Nuestros oponentes prefieren describir a Europa como un monolito étnico, donde la población nativa es homogénea, y aunque eso fuera cierto, no sería algo negativo.\n\nNo, Europa es un mosaico de historia, diversidad de culturas y paisajes que solo Dios podría haber creado.\n\nSin duda, nuestro rival del Este intentaría destruirlo, y casi lo logró hasta que tomamos el control de Francia. La unidad entre nuestro pueblo, sin importar lo que suceda, es algo por lo que vale la pena luchar.\n\nAquí amamos a todos los europeos, y con un esfuerzo unido enfrentemos al oso ruso, lo derrotemos y esparzamos sus restos por todo el Este.\n\nEl continente permanecerá unido para siempre; la historia nos recordará con aprecio.\n\nPues somos los escritores de esta historia."
 france.2810.a: "Un continente vuelve a sus raíces."
 france.2811.t: "Pesada es la corona"
 france.2811.d: "Se decía que, cuando estalló la Revolución Francesa, no conoceríamos sus verdaderos efectos hasta años después. Y, la verdad, eso es muy cierto.\n\nEl experimento republicano llevaba tiempo en marcha, dejando a la nación francesa como un esqueleto frágil, incapaz de moverse, y con la desaparición de nuestros amigos estadounidenses, se convirtió en objeto de un intenso escrutinio. Después de nuestra derrota a manos de los rusos, era el momento adecuado para volver a la normalidad. En tiempos de desesperación, necesitamos un ícono que nos respalde. ¿Qué es un monarca sino la manifestación espiritual de sus súbditos?\n\nReparamos el daño que dejó la República, renovamos el orgullo por nuestra nación, nuestro pueblo y nuestro ejército. Rusia nos esperaba; un choque inevitable en el horizonte.\n\nHicimos lo que nuestros antepasados no pudieron; Moscú quedó en manos de Europa. Con nuestra estela de fuego, hemos demostrado al mundo que no todo lo antiguo es malo.\n\nLos imperios van y vienen. Pero este no. Ya no."
 france.2811.a: "Francia renace."
 france.2812.t: "Corazones endurecidos"
 france.2812.d: "No, ni siquiera es necesario endulzar la década de humillación que la nación francesa soportó a manos de estos aduladores, años en los que los cosmopolitas vaciaron la República importando culturas que nos odian, entregando nuestra fuerza a una potencia que nos veía como nada más que una zona experimental.\n\nAños de violencia étnica y de dificultades económicas, todo el statu quo europeo diciéndonos que estaremos bien.\n\n\"Las represalias no son como hacemos las cosas en una sociedad civilizada\".\n\nLuego llegó Rusia, y las ratas extranjeras se escaparon con nuestra riqueza, los ricos bastardos seguirían engordando, ¿y qué nos dieron?\nMiles de jóvenes que perdieron la vida, una amarga derrota.\nSe acabó, la ira del pueblo francés fue inevitable.\n\nLos arrastramos a todos.\n\n¿Falso conservadurismo? Sepultado.\n¿Liberalismo parasitario? Aniquilado.\n¿Culturas y pueblos hostiles? Ya no están aquí.\nLa nación francesa regresó, con una espada afilada con odio.\n\nY decapitamos al oso, con sus cachorros llorando, para siempre.\nUna sociedad civilizada debería estar dispuesta a defenderse con violencia.\nY ahora el mundo lo sabe."
 france.2812.a: "Reforjamos la identidad que nos enseñaron a abandonar."
 france.282.t: "Estrella roja sobre París"
 france.282.d: "Sin lugar a dudas, el espíritu revolucionario ha vuelto a Francia, especialmente después de que los reaccionarios en Rusia eliminaran esa noción corrupta del \"fin de la historia\".\n\nCon tantas vidas desperdiciadas para proteger a aquellos que se escondían en sus torres de marfil, era solo cuestión de tiempo antes de que tomáramos los mazos y derribáramos todo, colgando banderas rojas sobre las oficinas corporativas y haciendo justicia con quienes habían acumulado la riqueza de Francia. Con el tiempo, nuestro fervor cruzaría hacia Rusia, rompiendo las cadenas de nuestros camaradas que se habían perdido hace tanto, mientras los restos del imperialismo se desvanecían ante nuestro ímpetu colectivo.\n\nEl gran regreso, la idea de que el comunismo resurgiría, ha sido una preocupación constante para aquellos que han acaparado el poder durante décadas. Ahora que hemos llegado, ellos se han escabullido como ratas gordas, pero no podrán escapar de nosotros para siempre.\n\nHemos vuelto. Y no nos vamos a ningún lado."
 france.282.a: "Yo soy la revolución, y la revolución eres tú."
 france.2820.t: "Ira de la revolución"
 france.2820.d: "La Revolución Francesa nos enseñó que la rebelión no es solo una forma de protestar, sino una manera activa de hacer justicia contra quienes tienen el poder. Eso fue exactamente lo que hicimos con aquellos que hicieron que nuestras familias perdieran a sus hijos a manos de Rusia.\n\nA pesar de estar golpeados y magullados, luchamos por levantarnos, y lo conseguimos. La República Francesa se dejó seducir por el capital, permitiendo que la codicia se arraigara mientras nuestros recursos eran saqueados por manos invisibles.\n\nLas llamas de la revolución eran inevitables; la violencia no siempre es la solución, pero cuando lo es, debe hacerse con determinación, haciendo que nuestros enemigos nos teman y que nuestros aliados nos respeten. La guillotina estaba afilada por una razón.\n\nFinalmente, tuvimos que canalizar nuestra ira hacia los rusos, con el corazón lleno de valentía y la mente llena de amor por el proletariado. Rusia se rindió ante la presión, dejando que sus restos fueran consumidos por las llamas del cambio.\n\nPase lo que pase, hemos levantado la bandera roja sobre Europa y, junto a nuestros camaradas, nos aseguraremos de que el mundo se tiña de rojo, porque hay muchos hermanos y hermanas que esperan su revolución.\n\nNuestro futuro no podría ser más brillante."
 france.2820.a: "Cambio perpetuo, por siempre."
 france.2821.t: "Belleza sobre todo"
 france.2821.d: "¿Lo has notado antes, verdad? Ese hormigón que esconde lo auténtico. Ese plástico que sofoca la creatividad. Ese cristal que atraviesa nuestra cultura.\n\nEl capitalismo siempre ha sido una fuerza voraz que transforma todo en una masa gris y sin vida, convirtiéndolo en una carrera loca y sin sentido, más allá de un número más alto. El arte se ha vuelto una mercancía, y la cultura, una atracción más.\n\nY cuando el fascismo se presenta con un hacha, arrasa con todo lo que valoramos, no solo el arte, sino también a nuestros amigos y familiares. Una vida tranquila y pacífica, donde podamos dedicarnos a lo que amamos, no es un sueño imposible.\n\nDerrotamos las fuerzas de la entropía, eliminamos el deseo de violencia y ahora podemos descansar bajo los árboles que hemos sembrado.\n\nHas sido testigo de la extraordinaria belleza de la revolución en Francia, la has visto en Alemania, y la has visto extenderse hacia el este como una suave pincelada. Las revoluciones son una forma de arte, y el mundo será testigo de nuestra obra maestra."
 france.2821.a: "Arte en la paz, en cada aspecto de la vida."
 france.2822.t: "Un solo ladrillo"
 france.2822.d: "Despierta, y mira los frutos de tu labor. La revolución se ha extendido hacia el este como una bestia salvaje persiguiendo a su presa, el capital.\n\n¿Significa esto que has triunfado? No, para nada. El capital es un monstruo; la Segunda Guerra Europea apenas ha arañado la superficie. Puede que Europa esté unida bajo la hermosa bandera roja, pero la bestia sigue cojeando por el mundo, esperando la oportunidad de lamerse las heridas.\n\nPor todo el planeta, los oprimidos claman por liberarse de la bestia, pidiendo a nuestro pueblo que los salve. Puede que ya no sintamos las cadenas en nuestras muñecas, pero el agudo chirrido de la cadena resuena en todo el mundo con fuerza.\n\nRespira hondo, y se testigo de cómo la revolución se vuelve permanente. Observa el amanecer.\n\nNuestra labor apenas comienza."
 france.2822.a: "El gran diseño será completado."
 france.283.t: "El gallo despierta"
 france.283.d: "Francia ha enfrentado sus dificultades a lo largo de las décadas: guerras, ocupaciones, revoluciones y disturbios; son estas las cicatrices que llevamos con nosotros, los recuerdos que guardamos.\n\nLa fe de nuestro pueblo en la democracia ha sido puesta a prueba una y otra vez, y con la crisis en Estados Unidos, parecía que las fuerzas de la tiranía estaban listas para aplastar a Francia. Sin duda, lo intentaron; Rusia, siempre buscando oportunidades, trató de expandir su influencia en Europa a la fuerza. Siempre supimos que no podíamos depender completamente de los estadounidenses; como europeos, necesitamos ser capaces de valernos por nosotros mismos, tal como lo hicieron nuestros antepasados. Con la mente clara y un coraje inquebrantable, enfrentamos la amenaza rusa; por supuesto, eso no les impidió intentarlo de nuevo.\n\nLos volvimos a derrotar; Rusia, convertida en una máquina de guerra infernal, pronto se desmoronó sobre sí misma; simplemente ayudamos a derribarla. Francia siempre ha sido un símbolo de independencia y autosuficiencia; nunca hemos sido un estado cliente de otra potencia, y nunca lo seremos.\n\nLos defensores del continente, no forjados en el odio ni en la tiranía, sino en la libertad y la democracia."
 france.283.a: "Una calma brisa sobre Europa."
 france.2830.t: "Marea rosa sobre Europa"
 france.2830.d: "Nuestro continente siempre ha estado en medio de la agitación. Cuando nuestros amigos estadounidenses se atacaban entre sí, era inevitable que nuestro mayor adversario en el este mirara hacia Occidente con ansias.\n\nEl aspecto humano de la geopolítica sigue siendo fundamental para nosotros, ya que buscamos proteger nuestra democracia y a quienes más la necesitan. No reducimos a las personas a simples cifras, y cuando Rusia se lanzó contra Occidente, estábamos listos.\n\nLas guerras no se ganan solo eliminando al mayor número de personas, sino manteniendo al enemigo consciente de nuestra rama de olivo, haciéndoles saber que la paz es una opción. Nuestra victoria era inevitable; sin embargo, la derrota dejaría un sabor amargo entre los altos mandos rusos, y la venganza se convertiría en una obsesión ciega.\nAsí que volvieron a venir, y de nuevo se les ofreció la rama de olivo.\nEsta guerra no debería haber sucedido, pero no podíamos quedarnos de brazos cruzados.\n\nHemos demostrado al mundo que las páginas oscuras de la historia existen por una razón, y que no debemos repetir esos errores nunca más.\nLibertad, equidad, democracia.\nEstas son las palabras que nos guían en la vida, y cuando Oriente se reconstruya,\n\nVolveremos a extender la rama de olivo."
 france.2830.a: "Una calma brisa sobre Europa."
 france.2831.t: "El gallo despierta"
 france.2831.d: "Francia ha enfrentado sus dificultades a lo largo de las décadas: guerras, ocupaciones, revoluciones y disturbios; son estas las cicatrices que llevamos con nosotros, los recuerdos que guardamos.\n\nLa fe de nuestro pueblo en la democracia ha sido puesta a prueba una y otra vez, y con la crisis en Estados Unidos, parecía que las fuerzas de la tiranía estaban listas para aplastar a Francia. Sin duda, lo intentaron; Rusia, siempre buscando oportunidades, trató de expandir su influencia en Europa a la fuerza. Siempre supimos que no podíamos depender completamente de los estadounidenses; como europeos, necesitamos ser capaces de valernos por nosotros mismos, tal como lo hicieron nuestros antepasados. Con la mente clara y un coraje inquebrantable, enfrentamos la amenaza rusa; por supuesto, eso no les impidió intentarlo de nuevo.\n\nLos volvimos a derrotar; Rusia, convertida en una máquina de guerra infernal, pronto se desmoronó sobre sí misma; simplemente ayudamos a derribarla. Francia siempre ha sido un símbolo de independencia y autosuficiencia; nunca hemos sido un estado cliente de otra potencia, y nunca lo seremos.\n\nLos defensores del continente, no forjados en el odio ni en la tiranía, sino en la libertad y la democracia."
 france.2831.a: "Y el pueblo despertó."
 france.2832.t: "Entre los grandes"
 france.2832.d: "A lo largo de la historia, hemos visto surgir a muchos grandes, íconos que brillaron en medio de la oscuridad; aquellos que siempre serán recordados.\n\nIncluso dentro de quinientos años, figuras como César, Alejandro Magno y muchos otros seguirán en nuestra memoria.\n\nEmmanuel Macron es uno de esos líderes. Con su visión, Francia se ha enfrentado a los agresores rusos; gracias a su liderazgo, Francia ha evitado caer en el caos.\n\nBajo su mando, Francia le hizo frente a una Rusia que busca venganza. Fue él quien debilitó a Rusia, no Alemania ni el Reino Unido.\n\nY ahora, Francia se encuentra bajo su atenta vigilancia. El lento avance de la democracia la ha contenido durante décadas, pero ahora, con su reputación bien establecida, dentro de quinientos años será recordado como uno de los grandes.\n\nEuropa se mantendrá firme.\n\nPues cuenta con un nuevo grande."
 france.2832.a: "Tenemos visiones..."

 france.261.t: "Operación militar especial francesa en Chipre"
 france.261.d: "De acuerdo a testimonios y medios locales, las fuerzas armadas francesas han sido vistas ingresando al norte de Nicosia casi sin resistencia. Esta invasión ilegal ha causado una reacción agresiva del Gobierno turco y del presidente Erdoğan quien ha enviado un ultimátum exigiendo la inmediata retirada de las fuerzas francesas del norte de Chipre, amenazando con embargos e incluso tanteando una intervención militar. La comunidad internacional ha apoyado mayoritariamente a Chipre, condenando la invasión y viéndola como una violación de la soberanía chipriota. El Gobierno ruso denunció la operación, viéndola como un claro acto de agresión comunista. La Eurointern ha amenazado a Turquía con sanciones masivas y un apoyo incondicional a Francia en el caso de una intervención."
 france.261.a: "Locura."
 france.971.t: "Se agotan los préstamos de 10 años"
 france.971.d: "Tras 10 años, el vencimiento ha llegado a nosotros. Nuestra toma de préstamos de ese momento ha regresado para golpearnos, dándonos un lote más de deudas que debemos pagar apresuradamente. Mientras que nuestra economía ya ha encogido a causa de las varias crisis vividas en esos años, esto supone un desafío adicional que debemos enfrentar, a medida que los acuerdos empiezan a llegar a su fin."
 france.971.a: "Mierda."
 latinist.72.t: "Être à bout"
 latinist.72.d: "Somos una sola familia, hermanos y hermanas. Los hilos del destino unen a nuestro pueblo, y el líquido escarlata que fluye bajo nuestra piel también nos une. Desde los nevados Alpes hasta los escarpados y verdes Pirineos de Iberia, siempre hemos sido un único pueblo, una única entidad. Nuestros lazos no solo se basan en nuestra sangre compartida, también se basa en nuestra historia y culturas entrelazadas.\n\nCon la mejor de nuestras intenciones, ofrecimos a nuestros hermanos incontables oportunidades para una reunificación pacífica. Pero, una y otra vez, ¡se burlaron de nosotros, nos rechazaron e incluso nos dieron la espalda por completo! Nosotros solo queríamos extender sobre ellos nuestro amor y hermandad. Una unión de nuestras naciones podría haber dado un crecimiento económico y un poderío militar sin precedentes, beneficiando a todos. Aún así, se negaron a escucharnos. Rechazaban la razón, no creían en nosotros, y, lo más trágico, se aferraron desesperadamente a sus absurdos conceptos de \"nacionalismo\" y \"regionalismo\". Estaban cegados por delirios separatistas que no llevarían a nada, lo que no les permitió ver la grandeza que podían haber alcanzado mediante la unidad.\n\nNadie desea ver a naciones hermanas enfrentarse entre sí, ¿¡pero cómo podemos quedarnos de brazos cruzados cuando aquellos a los que amamos nos calumnian y nos traicionan!? Cualquier alma tiene su punto de quiebre y Francia finalmente ha alcanzado la suya. Ahora, nos enfrentamos a un dilema. ¿Les damos la mano una última vez, llamando a la razón para que se unan pacíficamente? ¿O permitimos que las balas y las bombas hablen por nosotros?"
 latinist.72.a: "No debemos permitir derramamientos de sangre innecesarios."
 latinist.72.b: "Ya hemos hablado suficiente. ¡El único lenguaje que esos idiotas entienden es la violencia!"
 france.80085.t: "Francia exige integración"
 france.80085.d: "Tras nuestra victoria sobre la bestia rusa, los franceses, buscando unir Europa bajo su Gobierno, han demandado que nos unamos a su unión bajo amenaza de guerra. Estamos atrapados entre dos opciones, ceder a las amenazas francesas y unirnos a ellos, o resistir y acabar con la amenaza de una traición aliada para siempre."
 france.80085.a: "¡Jamás nos someteremos a la burguesía francesa!"
 france.80085.b: "¡Europa unida bajo el socialismo!"
 FAF_napoleonic_sympathies_dynamic_desc: "Nuestro Estado cuenta con una gran historia de la que estamos orgullosos. El Estado de Francia está construido sobre los logros de Napoleón Bonaparte, quién derrotó a toda Europa él sólo varias veces hasta que finalmente fue derrotado por culpa del desgaste, y su familia. No habrá nación que iguale a esa Francia, o al Imperio francés. Es el Estado más grandioso de toda Europa, y siempre lo será."
 FAF_Laurent_Marcangeli_HM: "Laurent Marcangeli"

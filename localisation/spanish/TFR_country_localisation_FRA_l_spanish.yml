 france.309.t: "Las vendas que ciegan"
 france.309.d: "Desde tiempos antiquísimos, los franceses y alemanes nunca se han podido mirar a los ojos. Esto cambió tras la Segunda Guerra Mundial, tras la cual forzamos a los alemanes a eliminar todos los aspectos del militarismo prusiano de su identidad. Eliminando ese militarismo que definió a Alemania por tanto tiempo, sin querer acabamos con cualquier posibilidad de que Europa pudiese defenderse por si misma de la bestia rusa...\n\nPero ahora, Rusia está derrotada, tan fragmentada que es irreconocible, y el militarismo prusiano vuelve a estar a la orden del día. Nuestros espías reportan que nacionalistas alemanes están difundiendo nuestra supuesta debilidad... y demandan un \"honorable retorno\" de su antiguo territorio de Alsacia-Lorena... Poner a nuestras tierras ancestrales en riesgo de quedar bajo el yugo alemán no es algo que nuestros líderes, y nuestro pueblo, estén dispuestos a hacer."
 france.309.a: "Rumores son solos rumores."
 france.309.b: "Nunca podremos ser hermanos..."
 france.310.t: "Francia abandona el pacto"
 france.310.d: "Citando el descontento generado por los pocos alemanes que desean que nuestro gobierno reclame nuestro antiguo territorio de Alsacia-Lorena, el gobierno francés ha abandonado el Pacto de Acero. Aunque inesperado, esto significa que ya no tenemos razones diplomáticas para evitar hablar sobre la reclamación de Alsacia-Lorena, nuestra provincia PERDIDA.\n\nIncluso ahora, podemos oír a los alemanes bajo la ocupación francesa clamar por la liberación de su patria. ¡Debemos reclamar lo que alguna vez fue nuestro! Debemos destruir al estado francés de una vez por todas, [GER.GetLeader] deberá humillar al pueblo francés y a su intento de ejército una vez más, tal y como hicieron Bismarck y Hitler en el pasado."
 france.310.a: "¡Los aplastaremos!"
 france.311.t: "La antigua Entente"
 france.311.d: "TODO English event pitting them against Germany with France"
 france.311.a: "¡Unidos resistimos!"
 france.311.b: "¡No es necesario! ¡El Pacto es Genial!"
 FAF_betrayal_tt: "§YSi [ENG.GetFlag] §CGran Bretaña§! §Gacepta§!, nos seguirá en cualquier alianza creada debido a la [GER.GetFlag] §Ragresión alemana§!.§!"
 ENG_old_entente_reaffirmed_tt: "§YEsto formará una alianza defensiva con los §![FAF.GetFlag]§3franceses§!§Ycontra cualquier futura agresión [GER.GetFlag]§!§Ralemana§!"
 FAF_sword_shield_side: "Neutral"
 denied_entente: "Expansionismo francés denegado"
 reaffirmed_entente: "Se mantuvo en la Entente"
 FAF_The_Pride_of_France_desc: "El orgullo de Francia siempre ha sido el ejército, sus generales, todas sus fuerzas armadas en conjunto. Nada ha estado a la altura de la Grande Armée. Como Napoleón dijo una vez: \"Francia es un ejército con estado. Nosotros simplemente hemos retornado el país a la normalidad, a su estado tradicional.\""
 FAF_Hail_to_the_Chief_desc: "De ahora y para siempre, el mariscal es el nuevo director de Francia. El pueblo debería reconocer esto, y saludarlo como si fuesen soldados de su ejército, con gran respeto y honor. El líder de Francia nunca será otro más que [FRA.GetLeader], él es inescrupuloso y nos liderará a nuestra segunda era dorada."
 FAF_The_Sword_and_Shield_desc: "El ejército es lo que hace que Francia sea Francia. Es tanto la punta de lanza que nos ha hecho alcanzar la posición de potencia dominante del continente europeo como el escudo que nos ha defendido contra incontables invasores salvajes. El ejército es algo a lo que se le debe dar un gran cuidado, un gran respeto y más indulgencia que ha tenido bajo el traicionero gobierno republicano."
 FAF_Cult_of_Loyalty_desc: "Justo del mismo modo que el general Pétain fue honrado, el pueblo francés debe depositar su fe en el general [FRA.GetLeader], siguiéndole con todo el corazón y confiando en él hasta las últimas consecuencias. No debe existir la más mínima muestra de deslealtad, ni nadie que crea que el Mariscal se pueda equivocar."
 FAF_work_family_fatherland_vichy_desc: "El mayor pecado que uno puede cometer es quebrar uno de los grandes principios de nuestra nación. En el trabajo, en la labor, uno puede encontrarse a sí mismo ayudando al estado de Francia, haciendo su nación y su vida mejor. En la familia está el amor, el amor inquebrantable tanto a la patria y al estado. Y dentro de la nación, deberá haber patriotismo y se deberá proteger al francés. Negar cualquiera de estos principios es denegar de la propia Francia."
 FAF_Militarize_the_Boyscouts_desc: "Para convencer a la población de una idea, debemos centrarnos en la juventud. Porque incluso si hay algunos ancianos que sigan rechazando nuestro gobierno, siguen siendo solo viejos. Morirán pronto. El verdadero poder de una nación reside en la juventud, una juventud que es educada a seguir estos principios desde su infancia, la semilla del patriotismo plantada en su cerebro, para que jamás sea removida, ni si quiera por traidores que vuelvan a gobernar en Francia."
 FAF_All_for_the_Nation_desc: "Los lujos sinsentidos que alguna vez el hombre común podía permitirse ya no serán otorgados. Todo debe hacerse por el Estado, por Francia. No hay nada que te pueda beneficiar que no beneficie al estado, pues todo lo que va al Mariscal va a Francia y después a ti. La directiva es luchar por Francia, trabajar por Francia, no por ti. Ya hemos visto ese error lo suficiente."
 FAF_Rebuild_the_French_Family_desc: "En un descarado y degenerado movimiento, la república de antaño trató de abandonar todo lo que hacía Francia francés. Intentando borrar la cultura del pueblo francés, intentando arrancar de raíz lo que era tradicional afirmando que era arcaico e incompatible con el mundo moderno. Esto es incorrecto, y fue una gran humillación para nuestra alguna vez gloriosa nación. El espíritu de Francia será rescatado del borde del abismo, y nunca volverá a ser abandonado."
 FAF_Create_a_Million_Man_Army_desc: "El ejército francés, si bien es fuerte, no lo es lo suficiente. El pueblo francés es fuerte, está listo. Debe estar preparado para la guerra, todo hombre hecho y derecho debe esta preparado. Cualquiera capaz debe estar preparado para luchar en la guerra, y servirá junto a sus pares en el Gran Ejército, marchando firmemente por su nación."
 FAF_Patriotism_at_its_Utmost_desc: "Para seguir la voluntad del mariscal [FRA.GetLeader], debes ser inherentemente un patriota por tu nación. En espíritu, en actitud, la vida de alguien que siga las palabras del mariscal será francesa, serán la definición viviente de la palabra \"patriota\". Solo alguien que no es humano podría odiar su nación, su patria."
 FAF_Fountain_of_Life_desc: "Una de las grandes debilidades de la moderna nación francesa es la falta de voluntad de la juventud, la falta de motivación en los maridos y esposas para convertirse en padres y madres. Mediante la propaganda y beneficios para ambos cónyuges, la fuente de la vida volverá a fluir, la nación francesa volverá a traer a nuevas vidas a este mundo, en vez de acabar en un inevitable declive."
 FAF_Reinforce_the_old_Axis_desc: "Si bien las metas e ideología de [GER.GetLeader] es mucho más extrema y agresiva que la nuestra, no debemos permitir que Europa caiga en la mucho más peligrosa bestia bolchevique que yace en el este por culpa de discusiones insignificantes sobre detalles específicos. Francia y Alemania, en su lucha común contra los rusos, serán más que meros aliados, serán hermanos que luchan codo con codo por el futuro de Europa."
 FAF_Found_the_French_State_desc: "Demonizado y catalogado como criminal de guerra por la República Francesa, el mariscal Pétain es quien ha iluminado una vez más al pueblo francés. Muchos llamaron al régimen de Vichy incompetente, y nada más que un títere alemán, sin embargo, esto dista mucho de la realidad. El Estado Francés fue un régimen de verdadero patriotismo, de verdadera fe en el pueblo francés y la nación. Verlo renacer cual ave fénix es el mayor honor al que uno puede aspirar."
 FPR_No_Gods_No_Masters_desc: "El pueblo ahora es libre tras incontables años de opresión. No hay ningún líder que los oprima, ningún Estado que les diga que pueden hacer y que no, ni falsos dioses que apelen a ellos mediante mentiras y fachadas. No, todo lo que queda ahora es el pueblo, y su libre voluntad, siguiendo a la Madre Anarquía."
 FPR_Our_Makhno_desc: "El que fue alguna vez difamado como un terrorista y una amenaza para la sociedad, Julien Coupat es ahora un admirado padre del anarquismo de nuestra nación, el arquitecto de lo que nosotros, el pueblo, ahora tenemos. Sin ninguna clase de poder, el fue el Majnó de Francia, el fundador y el líder al que todos debemos admirar como el autor de nuestra libertad."
 FPR_Emulate_the_Makhnovtsi_desc: "En los muchos periodos oscuros por los que ha pasado nuestro movimiento, hay uno que reluce como ningún otro, el legado de Néstor Majnó y su Ejército Negro. Si bien no fue un movimiento anarquista perfecto, ni algo que podamos replicar fácilmente en nuestras circunstancias actuales, debemos buscar ser como él y su movimiento para que podamos tener éxito, moldeando nuestro movimiento a la imagen de la Majnóvschina."
 FPR_The_Black_Guards_desc: "Mientras que el anterior ejército era inherentemente una arma reaccionaria, una herramienta que podía ser utilizada para coaccionar y someter al pueblo, el nuevo ejército estará compuesto por gente dispuesta a luchar por el pueblo y por el anarquismo con toda su voluntad. Será una herramienta de liberación, las hordas negras de Francia lucharán por el anarquismo por todo el mundo."
 FPR_Establish_the_Communal_System_desc: "En lugar del fanático autoritarismo del Gobierno vendrá la descentralización, en la que cada pequeña comuna, cada aldea, cada área tendrá su propia delegación y sus propios derechos, libertades y leyes. Francia ya no será una nación de Estados, Francia ya no será una nación. Será una comuna, una en que el pueblo está unido por su afinidad y mediante acuerdos colectivos."
 FPR_Dismantle_State_Apparatus_desc: "Existen remanentes del Estado que pueden ser usados por cualquiera y abusar de su poder, por lo que debemos remover a estos individuos y echarlos de nuestra comuna. No habrá ni siquiera la posibilidad de abusos de poder, no existirá ningún poder en primer lugar. El antiguo Estado finalmente será abolido y con este, y todo su legado e historial de opresión llegarán a su fin."
 FPR_Embolden_the_Poor_desc: "Si bien fueron ignorados por aquellos que nos precedieron, bajo la bandera anarquista todas las personas son iguales. Ya no serán abandonados a su suerte en su pobreza, ya no serán forzados a esa situación por los poderes que habían. El dinero será redistribuido, incluso si no podemos erradicarlo totalmente, para hacer a todas las personas verdadera y completamente libres. Alzaos, pueblos de Francia, en la prosperidad compartida."
 FPR_Purge_Statist_Influence_desc: "Si bien algunos puedan ver esto como un exceso por nuestra parte, no puede haber un Estado anarquista donde los estatistas nos sigan influenciando, y nuestra comuna, siga siendo forzada a ser un Estado. Por lo que, de una forma que nos beneficie, deben ser removidos de sus antiguas posiciones de poder y deben ser integrados simplemente como un miembro más de la sociedad, a menos que queramos retroceder al pozo oscuro del estadismo y perder la soberanía que acabamos de obtener."
 FPR_Export_Anarchism_throughout_Europe_desc: "El anarquismo no funciona como un mero concepto nacional. Es algo que desaparecerá si otros estatistas tratan de infiltrarse y destruirlo desde dentro, es algo inherentemente frágil. Es por esto por lo que debemos trabajar para difundir el anarquismo por toda Europa, nuestra tan querida liberad debe ser concedida a todos los europeos, no solo a los franceses."
 FPR_A_Wave_of_Black_desc: "Al igual que hubo olas de distintas ideología alrededor del mundo, habrá una más basada en el anarquismo. Será exportada y enviada a otros para que la abracen y adopten libremente, será algo que se alzará sobre el mar y jamás se hundirá. El fervor del pueblo cuando lucha por el pueblo no es algo que de deba subestimar o ignorar."
 FPR_Abolish_Debt_desc: "La deuda es un concepto creado por los Estados para oprimir al pueblo, una herramienta hecha para hacer que la gente piense que es algo que deben pagar simplemente por existir. Al igual que las otras herramientas de opresión, será eliminada. Cosas como esas no pueden existir en la era moderna, donde todos finalmente seremos libres."
 FPR_Embrace_True_Anarchism_desc: "No debemos avergonzarnos de abrazar la anarquía, en abrazar el caos que conlleva. El caos es libertad - es aceptar a nuestro yo más libre, cuando podemos mostrar nuestra verdadera forma. La libertad es inherente al caos, y el caos es inherente en la libertad. Ambas son las dos caras de la misma reluciente moneda que brilla en un mundo opacado por la opresión. El estatismo solo surge del miedo, es el pueblo el que le pone un freno, el pueblo es quien dio inicio a una nueva era para el mundo. Ni dioses, ni maestros.\n\n\"Los poderosos solo son poderosos por que estamos arrodillados. Permitid que nos levantemos\".\n- Pierre-Joseph Proudhon"

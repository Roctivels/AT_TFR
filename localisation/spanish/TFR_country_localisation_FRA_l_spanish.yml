 FAF_new_imperial_era: "Neobonapartismo"
 FAF_historical_idols_idea: "Ídolos históricos"
 FAF_historical_idols_idea_desc: "France has never lacked historical giants. From Charlemagne to Napoleon, our fertile land has produced some of the greatest figures in human history. Amidst this darkness, it is they who offer us a glimmer of hope. They embody a perfect France—a strong France—one that once ruled Europe and extended its influence around the globe. We may have lost this war, but after the new French greats replaced the old corrupt politicians that drove this country down the drain, France will blossom once more. They shall usher in a new French golden age."
 FAF_the_word_of_the_bishop_idea: "Palabra del señor"
 FAF_criox_de_fau_idea: "Croix-de-Feu"
 FAF_criox_de_fau_idea_desc: "When the Fascist spirit was born in Italy during the interwar period, many groups in France adopted it and introduced it to this foreign land. Yet none wielded it as effectively as the Croix-de-Feu under the wise leadership of La Roche. The Croix-de-Feu became an unifying force for French patriots and fighters. Although some of our citizens still harbor resentment toward them, in times like these, France needs unity and patriotism."
 FAF_criox_de_fau_better_idea: "Croix-de-Feu"
 FAF_criox_de_fau_better_idea_desc: "Cuando surgió el fascismo en Italia durante el periodo de entreguerras, muchos grupos en Francia adoptaron esta ideología y la introdujeron en esta tierra extranjera. Pero ninguno de ellos fue tan efectivo como la Croix-de-Feu liderado sabiamente por La Roche. Croix-de-Feu se convirtió en una fuerza que unía a patriotas y combatientes. Aunque algunos de nuestros ciudadanos aún siente recelos por el patriotismo y la unidad, en tiempos como estos, son indispensables para nuestra nación"
 FAF_the_crime_of_opinion_idea: "Crimen de opinión"
 FAF_the_crime_of_opinion_idea_desc: "En el proceso de consolidar nuestro poder, un ámbito en que hemos flaqueado ha sido el de las mentes y corazones de nuestros ciudadanos. Si bien la reeducación ha funcionado bien hasta ahora, otra herramienta que podemos emplear es prohibir pensamientos contra el régimen. Si nos aseguramos que el compartir o tener ideales liberales, progresistas y antifranceses sea castigado con multas o con penas cortas de prisión, ¡nos aseguraremos que nuestro pueblo se lo piense dos veces antes de criticar a nuestro gran Gobierno!"
 FAF_Full_Fascist_Control_idea: "Estado unipartidista"
 FAF_Full_Petainist_Control_idea: "Estado unipartidista"
 FAF_Restored_Monarchy_idea: "Movimiento Restauracionista"
 FAF_National_Rebirth: "Renacer nacional"
 FAF_National_Rebirth_desc: "Francia debe despertar y renacer con fuerza y unidad. A través de una atrevida y poderosa renovación cultural, nuestro régimen debe restaurar el orgullo de nuestro pueblo y poner a nuestro país en la senda de la grandeza."
 FAF_National_Rebirth_Anti_Communist: "Renacer nacional"
 FAF_National_Rebirth_Anti_Communist_desc: "Francia debe despertar y renacer con fuerza y unidad. A través de una atrevida y poderosa renovación cultural, nuestro régimen debe restaurar el orgullo de nuestro pueblo y poner a nuestro país en la senda de la grandeza."
 FAF_Petainist_Defense: "Maniobras defensivas"
 FAF_Petainist_Defense_desc: "Our military's strategic defenses ensure the security of the nation's borders. Our disciplined military and steadfast fortifications must follow the resilience of our people, ensuring that foreign aggressors can never again threaten the homeland."
 FAF_Imperialist_Sympathies: "Simpatías imperiales"
 FAF_Stability_and_Authority_idea: "Stabilité et Autorité"
 FAF_Honor_and_Glory_idea: "Honneur et Gloire"
 FAF_Fascist_Revolts: "Disturbios fascistas"
 FAF_Fascist_Revolts_desc: "Ya sea a través de acontecimientos que ocurren en toda Europa o debido a un conjunto de políticas aprobadas por nuestro gobierno, los fascistas de nuestro país están actualmente amotinándose contra nuestro gobierno. Si bien no esperamos que estas situaciones duren para siempre, tal vez debamos reconsiderar nuestro actual curso de gobierno para no provocar aún más su ira."

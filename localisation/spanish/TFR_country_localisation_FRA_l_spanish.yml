 france.9003.t.a: "Invertir en educación"
 france.9003.t.b: "Invertir en agricultura"
 france.9003.t.c: "Invertir para paliar la pobreza"
 france.9003.t.d: "Invertir en industria"
 france.9003.t.e: "Invertir en cuestiones sociales"
 france.9003.desc.a: "Han salido a la luz numerosos problemas en lo que respecta a nuestra educación, que se suman a los problemas que ya conocemos. Por suerte, el dinero resuelve la gran mayoría de problemas.\n\n¿Cuánto deberíamos invertir en nuestro desarrollo académico?"
 france.9003.desc.b: "Han salido a la luz numerosos problemas en lo que respecta a nuestra situación agrícola, que se suman a los problemas que ya conocemos. Por suerte, el dinero resuelve la gran mayoría de problemas.\n\n¿Cuánto deberíamos invertir en el desarrollo de nuestra agricultura?"
 france.9003.desc.c: "Han salido a la luz numerosos problemas en lo que respecta a la pobreza en nuestro país, que se suman a los problemas que ya conocemos. Por suerte, el dinero resuelve la gran mayoría de problemas.\n\n¿Cuánto deberíamos invertir en reducir la tasa de pobreza en nuestro país?"
 france.9003.desc.d: "Han salido a la luz numerosos problemas en lo que respecta a nuestra industria, que se suman a los problemas que ya conocemos. Por suerte, el dinero resuelve la gran mayoría de problemas.\n\n¿Cuánto deberíamos invertir en nuestro desarrollo industrial?"
 france.9003.desc.e: "Han salido a la luz numerosos problemas sociales, que se suman a los problemas que ya conocemos. Por suerte, el dinero resuelve la gran mayoría de problemas.\n\n¿Cuánto deberíamos invertir en cuestiones sociales?"
 france.9003.a: "Una pequeña inversión."
 france.9003.b: "Una media inversión."
 france.9003.c: "Una gran inversión."
 france.9003.d: "Una masiva inversión."
 FPR_Purify_our_Revolution: "Purificar la revolución"
 FPR_Purify_our_Revolution_desc: "No todo el mundo es apto para luchar por la revolución. Es algo puro que debe estar a manos de la vanguardia que lucha por el pueblo, por aquellos iluminados y capaces de acabar sin piedad con las fuerzas reaccionarias. Y si alguno de ellos se niega a luchar con nosotros, nos desharemos de él o ella."
 FPR_Purge_Capital: "Purgar al capital "
 FPR_Purge_Capital_desc: "El capital es un dios que puedes matar, o eso es lo que muchos dicen. No obstante, el capital no es ningún dios. Es algo podrido y que se derrumbará si le quitamos sus remaches, es una máquina vieja y oxidada. Es una mala hierba que arrancaremos de un tirón seco y liberaremos al estado revolucionario de todo vestigio del capital, cueste lo que cueste."
 FPR_Ban_Political_Opposition: "Prohibir la oposición política"
 FPR_Ban_Political_Opposition_desc: "Al final del día, la \"oposición\" es únicamente una herramienta que otros pueden usar para poner freno a nuestra impoluta revolución. Es una simple herramienta que los gobernantes pueden usar contra el pueblo cuando estos no se tragan sus mentiras y engaños. Por lo tanto, es un concepto completamente inútil. Piensa en el caos generalizado que hubo en los tiempos donde se intentó llevar a cabo la democracia. Sin duda, no tiene sentido. Debe desaparecer, al igual que desapareció la monarquía, igualmente decrépita y antigua."
 FPR_Cult_of_Reason: "El culto a la razón"
 FPR_Cult_of_Reason_desc: "Todo instrumento estatal y filosófico deben destinarse a desarrollar la filosofía de nuestra revolución y a combatir por ella. No habrá descansos, ni habrá ninguna religión. Esas cosas no tienen cabida en nuestra revolución. Todo lo que haremos será luchar, luchar para romper las cadenas de la reacción."
 FPR_Our_Greatest_Tradition: "Nuestra mayor tradición"
 FPR_Our_Greatest_Tradition_desc: "Nosotros, el pueblo francés, no tenemos tapujos a la hora de usar la fuerza y la violencia contra aquellos que luchan contra nosotros, e incluso contra aquellos que no luchan con nosotros. Así, nosotros no seremos la excepción. Respecto a nuestra filosofía, no habrá ningún sacrificio, ni un solo paso atrás hacia lo que había antes. No toleraremos ninguna acción contra los principios del racionalismo."
 FPR_The_Rational_Renaissance: "Renacimiento de la razón"
 FPR_The_Rational_Renaissance_desc: "Hoy en día, el idealismo y el utopismo son ideas frecuentemente presentes en las mentes revolucionarias. Esto es algo que debemos rechazar y neutralizar. Para ello, nuestro régimen promocionará a aquellas mentes verdaderamente materialistas y racionales, tal y como se hizo en América. Nos desharemos de la izquierda utópica reaccionaria y en su lugar, plantaremos un bonito jardín de racionalismo y razón."
 FPR_Replace_the_Red_Guard: "Frenar a las guardias revolucionarios"
 FPR_Replace_the_Red_Guard_desc: "No hay nada de revolucionario en las llamadas \"guardias revolucionarias\". No son más que un remanente reaccionario de un régimen que hay que eliminar, no son más que hombres hambrientos de poder. Son traidores a nuestra nación, son unos repugnantes derechistas y reaccionarios. Les cortaremos la cabeza. A todos y cada uno de ellos."
 FPR_Restore_French_Pride: "Orgullo por nuestro ser"
 FPR_Restore_French_Pride_desc: "Si bien nuestros aliados consideran la historia de Francia y su cultura como nada más que una idea inventada, nuestra postura es completamente opuesta. La historia de la Revolución Francesa, las acciones y el coraje de Robespierre y el mal llamado \"Terror\" son cosas de las que hay que enorgullecerse, no avergonzarse. Siéntete feliz y orgulloso sabiendo que eres francés."
 FPR_Establish_the_War_Cabinet: "El Gabinete de Guerra Revolucionario"
 FPR_Establish_the_War_Cabinet_desc: "No podemos ignorar la amenaza fascista en el Este. Una vez más, el estado ruso, inherentemente reaccionario, yace ante nosotros. Debemos tomar medidas proactivas contra ellos. Formaremos nuestro propio consejo de guerra, nuestra protección contra las fuerzas reaccionarias que parasitan este mundo, y nos aseguraremos de que los primeros ataques sean los nuestros."
 FPR_Establish_the_Sister_Republics: "Espíritu de las Repúblicas Hermanas"
 FPR_Establish_the_Sister_Republics_desc: "Tal y como hizo la Primera República, debemos mirar al exterior, destruir cualquier potencial amenaza antes de que pueda hacernos frente. Debemos difundir la ideología del Jacobinismo por toda Europa y liberar a los hermanos y hermanas de Francia. Solo entonces es que el continente será libre."
 FPR_An_Army_of_the_Party: "El Ejército de Léaument"
 FPR_An_Army_of_the_Party_desc: "Tras haberse ocupado de sus enemigos, y haber echado al basurero de la historia a cualquier \"aliado\" que se opusiese a nosotros, Francia se podrá entregar en cuerpo y alma a la guerra. Hasta el último átomo que tengamos será empleado para acabar con los enemigos de la revolución y erradicar a los reaccionaros extranjeros que nos amenacen. El futuro será liberado con fuego y sangre."
 FPR_Supreme_Continental_Authority: "Autoridad Suprema Continental "
 FPR_Supreme_Continental_Authority_desc: "L'Ascension de la Révolution.\n\nTal y como se vin en la Primera Revolución, no hay poder que pueda resistir la revolución, ningún reaccionario que pueda frenar al pueblo y su fervor revolucionario y detener el derrocamiento de regímenes dictatoriales arcaicos. No quedará nadie que luche contra la libertad absoluta, ni nadie que manche la historia de la libertad con mentiras y falsos rumores sobre su origen.\nRobespierre sonríe desde el más allá, pues su sueño se ha hecho realidad."
 FPR_jacobin_category: "La nueva ilustración"
 FPR_jacobin_category_desc: "\n\n\n\n\n£GFX_FPR_new_elightenment_cat\n\n\n\n\n\n\n\nLa nación de Francia es una que hace tiempo olvidó los ideales de razón y libertad surgidas en la Primera Revolución, posteriormente rescatadas por Maupin. Nuestros \"aliados\" de izquierdas han cortado el camino al futuro por culpa del miedo.\n\nEl miedo es el enemigo del progreso, de la razón y es una barrera al futuro. No existe revolución que no tenga que acabar con la subversión."

 FAF_Batterie_Todt: "Batería Todt"
 FPR_Revolution_realized: "Revolución completada"
 FPR_Revolution_realized_desc: "La voluntad del pueblo se ha hecho realidad! Desde los días de la comuna de Paris nunca la nación francesa estuvo tan cerca de destrozar sus cadenas. Ahora que el régimen liberal ha sido derrocado exitosamente, debemos certificar nuestro control sobre la nación, ¡para que los errores del pasado no vuelvan a ocurrir!"
 FPR_Abolish_the_Nouvel_Ancien_Regime: "Abolir el Antiguo Régimen"
 FPR_Abolish_the_Nouvel_Ancien_Regime_desc: "La burguesía decadente del viejo régimen fue una de las principales causas de su fracaso, y si queremos triunfar como nación, debemos demoler toda la estructura. ¡Los derechos del pueblo ya no serán restringidos por un régimen corrupto!"
 FPR_Deploy_the_Red_Guard: "Desplegar las guardias revolucionarias"
 FPR_Deploy_the_Red_Guard_desc: "A través del país siguen estando aquellos que resisten nuestra causa, ya sea por estupidez o capitalismo ferviente. Estos restos de régimen liberal deben ser destruidos para que nuestra revolución florezca, y esta es la oportunidad perfecto para mostrar nuestra guardia roja."
 FPR_Finalize_the_Constitution: "Finalizar la constitución"
 FPR_Finalize_the_Constitution_desc: "Si queremos que la revolución viva para siempre, debe ser marcada permanentemente en el códice de la nación. La vieja constitución fue destruida, y con ella, los errores des pasado. Ahora debemos terminar nuestra nueva constitución, pues sin ella, estaríamos viviendo en anarquía."
 FPR_From_the_Ground_Up: "From the Ground Up"
 FPR_From_the_Ground_Up_desc: "Simples reestructuraciones no son suficiente para arreglar los siglos de daño que la escoria capitalista ha hecho a nuestra nación. ¡Debemos demoler todo lo que los burgueses construyeron, y crear una utopía en su lugar!"
 FPR_National_Trade_Union: "Sindicato Nacional"
 FPR_National_Trade_Union_desc: "El gran problema con el sindicalismo es que favorece el faccionalismo. Con tantos trabajadores distintos en uniones distintas, la gente está destinada a entrar en conflicto tarde o temprano. Para asegurar que esto no pase, pondremos todos los huevos en una canasta, y formar un sindicato nacional."
 FPR_Set_Price_Controls: "Establecer controles de precios"
 FPR_Set_Price_Controls_desc: "Una de las peores partes del sistema capitalista es la especulación de precios, que estafa a la gente buena del mundo solo por codicia. No permitiremos que eso suceda aquí; nuestros ciudadanos solo pagarán lo que valen los productos, y ni un centavo más."
 FPR_Agrarian_Revival: "Renacer agrario"
 FPR_Agrarian_Revival_desc: "Nuestra industria agrícola ha caído en tiempos difíciles estos últimos años. Los políticos del antiguo régimen se darían constantemente un tiro en el pie al poner restricciones abrumadoras a nuestros granjeros, solo para hacerse los sorprendidos cuando protestaran, No haremos el mismo error, y de hecho, usaremos nuestro poder para apoyar un renacer agrario."
 FPR_Set_Production_Quotas: "Set Production Quotas"
 FPR_Set_Production_Quotas_desc: "Every worker must do their part to keep the union strong, and we can keep tabs on their contributions through the implementation of production quotas. The bar will not be placed too high, but it will be far enough from the ground to ensure that everyone gives it their all."
 FPR_production_quota_tt: "If we do not build §G5 military factories§! in the next §R240 days§!, we will lose war support and political power, but our quota will remain the same. \n\nIf we exceed all of these, a new production quota will be given."
 FPR_Level_the_Playing_Field: "Level the Playing Field"
 FPR_Level_the_Playing_Field_desc: "Cuando nuestro pueblo no puede ayudarse a si mismo, es nuestra responsabilidad entrar en escena y hacerlo por ellos. Vivimos en un mundo injusto, donde los capitalistas y autoritarios controlan su mayoría. ¡Pero aquí en Francia no! No tenemos justificación por el sufrimiento de nuestro pueblo, pero en vez de ignorarlo, nos esforzaremos para arreglarlo."
 FPR_Workers_Assembly: "La asamblea trabajadora"
 FPR_Workers_Assembly_desc: "La idea de un \"CEO\" y \"jefes\" fue inventada por la élite capitalista para restringir los derechos del pueblo. Incluso en una sociedad capitalista, los jefes tienden a ser odiados. ¡Todos estarán contentos tras que nos aseguremos de que sean removidos, y pongamos los trabajadores en cargo de su espacio de trabajo!"
 FPR_Revive_Syndicalist_Ideas: "Revivir el sueño sindicalista"
 FPR_Revive_Syndicalist_Ideas_desc: "El comunismo a tenido problemas in triunfar en el pasado, ¿y por qué? Bueno, ¡es porque el Estado también es un sistema capitalista! La solución a este dilema? Sindicalismo. Para lograr una sociedad perfecta, sin clases, debemos remover hasta el Estado y retornar todo el poder al pueblo."
 FPR_Entrench_Workplace_Democracy: "Entrench Workplace Democracy"
 FPR_Entrench_Workplace_Democracy_desc: "Rather than simply remove the hierarchy of the workplace, we will bring democracy to it. Many around the world constantly berate authoritarian regimes, yet ignore the totalitarianism of corporations! The first step towards utopia is achieved when everyone, everywhere, only knows democracy."
 FPR_Ensure_Just_Wages: "Ensure Just Wages"
 FPR_Ensure_Just_Wages_desc: "Nadie debería ganar miles de millones de dólares sin hacer nada mientras sus trabajadores se esfuerzan para ganar un mísero centavo. Si las empresas no cumplen con su deber de garantizar salarios justos, cosa que, seamos sinceros, nunca harán, entonces la responsabilidad recae sobre nosotros."
 FPR_Unionized_arms_industry: "Unionized Arms Industry"
 FPR_Unionized_arms_industry_desc: "The French arms industry, while never reaching the prowess of the American one, remained strong. Now the time has come to rebuild it, however, allowing it to gain too much power could be devastating. We will ensure that the production of our equipment is controlled by only the people, so that the capitalists do not find a way back into our nation!"
 FPR_Combat_Hyperinflation: "Combatir la hiperinflación"
 FPR_Combat_Hyperinflation_desc: "The worst plague to ever afflict a low-income household is that of inflation. Unfortunately, as it stands we are in no position to eliminate it. However, that does not mean that we are helpless against it. We will utilize every tool in our arsenal to ensure inflation remains at manageable levels."
 FPR_Revive_the_Rail_Sector: "Revolucionar el transporte"
 FPR_Revive_the_Rail_Sector_desc: "The capitalists mock us, they call us backwards, as if we are not a developed nation as well! Their snobbiness is intoxicating. We will create something they will envy, something the world will envy! Transportation projects have always done this, and we will show them who the best of the best is."
 FPR_Utilize_the_Civilian_Sector: "Utilizar el sector civil"
 FPR_Utilize_the_Civilian_Sector_desc: "En la propaganda capitalista, las sociedades socialistas son mostradas como lúgubres y deprimentes, donde la gente vive al límite. Si bien este fue el caso en unos cuantos casos aislados, nuestra sociedad no será así. ¡Nuestro pueblo tendrá a su disposición una vibrante industria de bienes de consumo y tendrá acceso a la tecnología más avanzada del mundo!"
 FPR_Prepare_for_the_Great_Struggle: "Prepare for the Great Struggle"
 FPR_Prepare_for_the_Great_Struggle_desc: "A communist country liberating Russia is quite ironic, and that hasn't been lost on us. However the Soviet Union is still long gone, it had its problems, and they were its undoing. Russia today is a horrific sight to behold, home to some of the worst suffering the common people have ever seen. We must prepare our nation for, perhaps, its final struggle to spread the revolution around the globe!"
 FPR_Reach_Claselessness: "Reach Classlessness"
 FPR_Reach_Claselessness_desc: "We have fought for a long time, on many fronts, but now we can confidently say we have achieved classlessness. The people are now in control, the corrupt bourgeois have been defeated, and prosperity is touching every French person. Utopia might still be a ways away, but we are striding down the path towards it!"
 FPR_abolishing_the_regime_idea: "Abolir el régimen"
 FPR_finalization_constitution_idea: "Finalización constitucional"
 FPR_communist_economy_1_idea: "Reestructuración económica"
 FPR_communist_economy_2_idea: "Reestructuración económica"
 FPR_communist_economy_3_idea: "Economía socialista"
 FPR_communist_economy_4_idea: "Economía socialista"
 FPR_combat_hyper_inflation_policy: "Anti-Inflation Policy"
 FPR_combat_hyper_inflation_policy_desc: "Battling inflation is not easy, but it can be done. By increasing our domestic taxes and cutting our government expenses we can maintain the buying power and the stability of our currency both domestically and in foreign markets. Indirectly benefiting our industrial sectors in selling their goods continuously."
 FPR_just_wages_idea: "Ley de Salario Justo e Igualitario"
 FPR_unionized_arms_industry_idea: "Unionized Arms Industry"
 FPR_railway_fever_idea: "Fiebre del ferrocarril"
 FPR_civilian_industry_idea: "Civilian-Focused Industry"
 FPR_Rally_the_Revolutionaries: "Rally the Revolutionaries"
 FPR_Rally_the_Revolutionaries_desc: "The people of France have thrown off their shackles and seized control of the nation, but not all is well. Much of the continent still lives under the rule of authoritarians and the bourgeois, and it is up to us to change that. While our crusade is still some time away, nothing is stopping us from beginning our preparations. ¡Viva la Revolución!"
 FPR_Control_the_Black_Sea: "Control the Black Sea"
 FPR_Control_the_Black_Sea_desc: "We cannot allow Russia, or anyone else for that matter, to take control of the Black Sea. It is simply too important an asset for us to lose. While it will be challenging to operate so far from home, it'll be manageable thanks to our navy and the will of our people!"
 FPR_cypriot_invasion_tt: "Este enfoque llevará a la guerra contra [CYP.GetFlag] Chipre."
 FPR_Professionalize_the_Army: "Profesionalizar el Ejército"
 FPR_Professionalize_the_Army_desc: "Cuando nos alzamos y tomamos el control de nuestra nación, muchos soldados se rehusaron a unirse a nuestra causa y o bien volvieron a su vida civil o tomaron las armas contra nosotros. Como resultado, nuestro ejército es altamente ineficiente, y no está en condiciones de exportar la revolución."
 FPR_Empower_the_Navy: "Empower the Navy"
 FPR_Empower_the_Navy_desc: "If we want to exude a sense of authority on other nations, a strong ground force isn't enough. We must ensure our coasts are protected, and that we are capable of bombarding our enemies from the high seas. We control the French navy, and now we must put it to good work."
 FPR_From_Fathoms_Below: "From Fathoms Below"
 FPR_From_Fathoms_Below_desc: "To a sailor, there's nothing more terrifying than being hunted by a submarine. One well-placed torpedo is all it takes, and suddenly you're sinking into the infinite abyss. We have the might to wreak havoc on our rivals from far beneath the waves, and we must now use it. "
 FPR_A_Red_Hurricane: "Un huracán rojo"
 FPR_A_Red_Hurricane_desc: "Since the first machine gun was strapped on a biplane over a century ago, planes and boats have been locked in an eternal conflict. However, with the invention of the aircraft carrier, these two were able to collaborate in ways that brought about unseen destruction. If we are to smash our opponent's navy, we must do it from the sky."
 FPR_Overclocked_Production: "Producción maximizado"
 FPR_Overclocked_Production_desc: "The material needed for the liberation of Europe won't make itself, and the time for the Red Wave to wash capitalism from the continent comes ever closer. Our factories will be put into overdrive to an extent never seen before!"
 FPR_Operation_Montagne: "§YOpération§!: Montagne"
 FPR_Operation_Montagne_desc: "While the neutral stance of the Swiss may have worked 100 years ago, today it does not. Following the fascist coup in their government, the time to end the Swiss neutrality has come. We will strike first, before they can fall into the sphere of one of our enemies!"
 FPR_Interventionist_Spirit: "Espíritu intervencionista"
 FPR_Interventionist_Spirit_desc: "The world revolution is not simply going to come to us, we must work to get it. Europe is in one of the worst positions it has been in for years, and the masses of the continent yearn to break free! We will free them, we will smash their chains!"
 FPR_Arm_our_Comrades: "Arm our Comrades"
 FPR_Arm_our_Comrades_desc: "When the revolutionaries stormed Paris and took control of France, we were alone in the world. However that is no longer the case, and we have allies of our own now. They too have joined us on this great liberation of Europe, but they don't have the same amount of equipment as we do, and it is our responsibility to supply them."
 FPR_Connecting_the_Union: "Connecting the Union"
 FPR_Connecting_the_Union_desc: "Transportation across France was destroyed during the civil war, and despite everything we have done, it has yet to recover. However, simply rebuilding what was already there is far below us. We will construct a new transportation system from the ground up, one the world will envy!"
 FPR_Victory_or_Death: "Victoria o muerte"
 FPR_Victory_or_Death_desc: "The war against the bourgeois continues, but it does not get easier. Everyday we extend more resources and lose more lives. However! The enemy does the same, and we will remain steadfast! The revolution will not be quelled so easily, and if the capitalists ever do reach our doorstep, we will show them what the atom is capable of!"
 FPR_Assist_Communist_Partisans: "Assist Communist Partisans"
 FPR_Assist_Communist_Partisans_desc: "Nations across the world have started to see the true potential of communism, and many people have risen up against their masters. However in most instances they are greatly outgunned and outmanned, and stand little chance of winning. Not on our watch!"
 FPR_Infiltrate_the_Caucasus: "Infiltrarse en el Cáucaso"
 FPR_Infiltrate_the_Caucasus_desc: "Georgia, Armenia y Azerbaiyán, nos da igual que consideren a estas naciones parte de Europa o no. Lo que nos importa es que se encuentran en la frontera rusa y nos ofrecen una ventana para atacar desde el sur, si alguna vez necesitamos abrirla. Los pondremos de nuestro lado, de una forma u otra."
 FPR_Bolster_the_Red_Waves: "Bolster the Red Waves"
 FPR_Bolster_the_Red_Waves_desc: "Our navy is already one of the best in the world, but recent years have not been kind to it. The failures of the liberal regime show themselves most prevalently on the hulls of our once great warships. The journey towards a world revolution begins on the deck of a ship."
 FPR_bolster_the_red_waves_tt: "Through diplomatic negotiation, the European, Pacific and Atlantic Naval Commands are willing to join in our revolution against Russian imperial tyranny."
 FPR_Continue_Partisan_Recruitment: "Continuar el reclutamiento partidista"
 FPR_Continue_Partisan_Recruitment_desc: "Partisan warfare is a communist's best friend. When the bourgeois have tanks, you don't fight face-to-face, you set traps and blow their capitalist asses skyhigh! We already have a strong partisan force, but we must reinforce it even further."
 FPR_Cult_of_Efficiency: "Culto a la eficiencia"
 FPR_Cult_of_Efficiency_desc: "No tenemos la capacidad de producir masivamente cientos y cientos de tanques mierdosos, pero al menos podemos hacer que los tanques que fabriquemos sean lo mejor de lo mejor. ¡Cada uno de nuestros tanques debería se capaz de acabar con 10 de los suyos! Esta lógica no solo se aplica en tanques, sino en todo el ejército en general. Como se suele decir, calidad sobre cantidad."
 FPR_Bomb_them_into_Submission: "Bomb them into Submission"
 FPR_Bomb_them_into_Submission_desc: "While nuclear warheads should always be the last option, they remain an option nonetheless. France has a substantial nuclear arsenal, one that can be used however we see fit. Even if it's just intimidation, the power of the atom will be used to its full extent."
 FPR_The_Peoples_Navy: "The People's Navy"
 FPR_The_Peoples_Navy_desc: "Our efforts to repair our nation's fleet have paid off. We can now confidently say that our navy is back to the way it once was, with one small change. It's now under the control of the people! "
 FPR_Everything_for_Survival: "Todo para sobrevivir"
 FPR_Everything_for_Survival_desc: "A pesar de todo lo que hemos logrado hasta ahora, la burguesía aún controla vastas áreas del mundo. Muchos nos llaman \"estado canalla\" y no dudarían en derrocarnos a la primera oportunidad. Debemos asegurarnos de que esto no suceda, y daremos nuestras vidas si es necesario. ¡Mientras la Tierra orbite alrededor del Sol, mantendremos la bandera roja aquí!"
 FPR_Operation_Gallipoli: "§YOpération§!: Gallipoli"
 FPR_Operation_Gallipoli_desc: "Turquía es una de las últimas grandes potencias europeas capaces de oponernos cierta resistencia. Es un firme anticomunista y sin duda está reforzando su ejército preparándose para un conflicto. Les concederemos este conflicto, pero en nuestros propios términos, y nos aseguraremos de que esta amenaza se sofoque eficazmente."
 FPR_Consolidate_the_New_Republic: "Consolidar la Nueva República"
 FPR_Consolidate_the_New_Republic_desc: "Our revolution, like all of them, was very messy. As such, many people are still divided and order has yet to be restored in some parts of the country. However, with the new constitution being put into effect, we now have the means to bring our nation together and begin spreading the will of the people to all of Europe! "
 FPR_Aid_in_the_British_Revolution: "Aid in the British Revolution"
 FPR_Aid_in_the_British_Revolution_desc: "Our comrades across the channel are amidst a struggle of their own with some of the last holdouts of the feudal era. While the rest of the world got around to abolishing their monarchs decades ago, the United Kingdom has still maintained their backwards ways. Our revolution means nothing if there are those still living under oppression!"
 FPR_Aid_Spanish_Leftists: "Liberar los Países Bajos"
 FPR_Aid_Spanish_Leftists_desc: "The nations of the lowlands have a long and shockingly atrocious history of exploiting the common people. While they may have fixed some of the errors of their ways, more remain, and they will be an easy first step towards liberating the continent."
 FPR_Establish_ourselves_in_the_Hearts_of_the_People: "The Heart of the People"
 FPR_Establish_ourselves_in_the_Hearts_of_the_People_desc: "Our message means nothing if there is no one to receive it, and we must ensure the people do not live in the dark. They must see the errors brought about by capitalism, and remember the suffering they've been through. The revolution is for the people, and we will make them see that!"
 FPR_No_Gods_No_Masters: "Ni Dieux, Ni Maitres!"
 FPR_ngnm_warning_tt: "§RAnarquía significa anarquía, pero eventualmente podremos asegurar que nuestro sistema sobreviva...§!"
 FPR_anarchist_france_category: "Hanging the Tyrants"
 FPR_anarchist_france_category_desc: "\n\n\n\n\n£GFX_FPR_black_banners_cat\n\n\n\n\n\n\n\nThe oppressive order of stability has been a blight on the human soul for centuries, under the boots of kings, leaders and warlords we were made to do things we'd never do.\n\nRestructuring society into a more anarchist way of thinking and lifestyle, it requires more than just petty debates and useless finger wagging"
 FPR_Our_Makhno: "Arquitecto de la Revolución"
 hos_architect_of_the_revolution: "Arquitecto de la Revolución"
 FPR_Emulate_the_Makhnovtsi: "Emulate the Makhnovsti"
 FPR_FRIA_building_tt: "The more §GMoney§! and §YExperience§! we put into the creation of a Revolutionary Insurgent Army, the better the units will be upon the completion of ''§RFound the Revolutionary Insurgent Army§!''"
 FPR_The_Black_Guards: "Found the Revolutionary Insurgent Army"
 FPR_Establish_the_Communal_System: "Empower Local Councils"
 FPR_Dismantle_State_Apparatus: "Dismantle the State Apparatus"
 FPR_Embolden_the_Poor: "The Poor and the Downtrodden"
 FPR_Purge_Statist_Influence: "Purge Statist Influence"
 FPR_Export_Anarchism_throughout_Europe: "Exportar anarquismo"
 FPR_A_Wave_of_Black: "La Ola Negra"
 FPR_Abolish_Debt: "Abolir la deuda"
 FPR_Embrace_True_Anarchism: "Abrazar el caos"
 FPR_enforce_anarchist_doctrine_decision: "Exportar §panarquismo§! en [FROM.GetName]"
 FPR_cause_a_scene_decision: "Stoke §RRevolution§! in [FROM.GetName]"
 FPR_establish_the_european_anarchist_collective_decision: "Establish the §REuropean Anarchist Collective§!"
 FPR_ensure_stable_footing_decision: "Build the Platform"
 FPR_protect_our_ideals_decision: "Build the Party"
 FPR_build_the_anarchist_army_xp_decision: "Build the Insurgency"
 FPR_fund_the_anarchist_army_decision: "Fund the Insurgency"
 FPR_raise_the_black_hordes_decision: "Raise the Black Horde"
 FPR_raise_the_black_hordes_decision_desc: "Insurgent Experience: [GetBlackArmyXP] \n\nInsurgency Size: [GetBlackArmySize]"
 FPR_no_gods_no_masters_idea: "Ni dioses, ni amos."
 FPR_no_gods_no_masters_dummy_idea: "Ni dioses, ni amos."
 FPR_nouveau_black_army_idea: "Nouveau Black Army"
 FPR_march_of_the_people_idea: "Marcha del pueblo"
 FPR_waves_of_black_idea: "Waves of Black"
 FPR_black_horizon_unbound_idea: "Black Horizon Unbound"
 FPR_rise_above_idea: "Rise Above"
 FPR_soviet_france_category: "Politburo of the French Soviet"
 FPR_soviet_france_category_desc: "\n\n\n\n\n£GFX_FPR_soviet_france_cat\n\n\n\n\n\n\n\nThe Premier Casanova is the guiding hand behind our revolution. The proletariat is directed by the man at the helm, the force behind the Marxist-Leninist movement. Modeling himself off of the great Stalin, the man who saved the USSR in the Great Patriotic War, there is no fault that we can make."
 FPR_Arise_Sons_of_Marianne: "Arise, Sons of Marianne"
 FPR_Arise_Sons_of_Marianne_desc: "When the tyrant of the East steps arrogantly onto a blood-stained throne, trampling the bodies of countless innocent people, we, the descendants of Marianne, freedom fighters, and defenders of the people, must not stand idly by. We cannot allow the precious civilization of Europe to be desecrated and abandoned. Today, we have overthrown the weak and incompetent pseudo-government and established a true socialist government for the proletariat, driven by will and action. The Red Revolutionary Guard, the heart of the French class struggle and the vanguard of the people, calls once more on all compatriots and comrades: Citizens, arm yourselves! This time, the Federative French Socialist Republic will not fail the people of Europe."
 FPR_Dissolve_the_National_Congress: "Disolver el Congreso Nacional"
 FPR_Dissolve_the_National_Congress_desc: "The pseudo-regime of the old era has collapsed with a thunderous crash, and the once-mighty gods of 'Mount Olympus' have turned into fragile, pale plaster statues, each awaiting its inevitable fall as the people tear them down. However, amid this sweeping action, one venomous altar stubbornly remains—the French National Congress. The bourgeois reactionaries, determined to resist the will of the people and isolate themselves from the French nation, cling to this institution, cloaked in the sanctity of bourgeois legal rights, as their last refuge. But we will not let them escape so easily. The Revolutionary Guard has been ordered to enter the Congress, arrest the reactionary deputies, and completely dissolve this obsolete institution that only stands in the way of the revolution. From now on, no more revisionist rhetoric will obstruct the revolutionary path."
 FPR_Purge_the_Daeninckx_Bloc: "Establish National Security Bureau"
 FPR_Purge_the_Daeninckx_Bloc_desc: "In the early days of a revolutionary victory, there is always a lack of resources—wealth, stability, and infrastructure. But one thing we will never lack is enemies of the revolution. We will not hesitate to assume the worst intentions of those who seek to harm the just cause of the French people. To combat this, an independent institution will be established: the National Security Bureau of the Federative French Socialist Republic. General Casanova and his comrades firmly believe that, with time, the National Security Bureau will become a powerful revolutionary force, akin to the 'Cheka,' striking fear into the hearts of bourgeois reactionaries. It will serve as both the sword and shield of the French Revolution, defending our cause while also undertaking the crucial task of spreading revolution and awakening the people of the world. The road to peace and happiness will be paved with 'revolutionary terror.'"
 FPR_Cult_of_the_Red_General: "Mariscal de la Revolución"
 FPR_Cult_of_the_Red_General_desc: "At a critical moment, Nicolas Casanova rallied the Revolutionary Guard to overthrow subversives and reactionaries, reigniting the revolutionary spirit of the French people. His actions and ideas have left an indelible mark on both the history and national character of contemporary France. Today, as the embodiment of the revolution and the savior of the nation, Casanova's status and prestige have reached unprecedented heights. The widespread admiration and reverence for the Marshal across France have become a grand spectacle. Under his leadership, the unity and strength of the Revolutionary Guard impress both allies and adversaries alike. We have every reason to believe that as long as Marshal Casanova remains in power, any conspirators will be quelled, and the socialist revolution in France will continue smoothly along its predetermined course, with ultimate victory in future struggles assured."
 FPR_Foundation_of_the_FFSR: "Adoptar la iconografía soviética"
 FPR_Foundation_of_the_FFSR_desc: "Vladimir Lenin once pointed out that the most class-conscious and politically advanced segment of the working class would become the vanguard of the revolution. These individuals are always at the forefront, guiding the masses in the revolutionary struggle, upholding strict discipline, and enforcing proletarian dictatorship through a one-party system. In return, these 'elite elements' of the revolution will earn the respect and admiration they deserve, along with rewards and recognition for their outstanding contributions. In France, the Revolutionary Guard undoubtedly serves this system, providing a strong foundation for training new revolutionaries. Led by General Nicolas Casanova, we will promote the glorification and worship of the revolutionary leadership collective to unite the French people more closely around the core of the revolutionary cause."
 FPR_Enact_Five_Year_Plan: "Plan Quinquenal"
 FPR_Enact_Five_Year_Plan_desc: "Rapid and centralized industrial development will significantly strengthen France's industrial and military power in the shortest possible time. This will reverse the deindustrialization caused by past bourgeois governments and provide a reliable counterforce against the challenges posed by the Eastern tyrant. To achieve this, we need a central government institution with the authority to issue directives and a strict economic timetable. Therefore, the 'Five-Year Plan' a hallmark of the socialist system, will be introduced in Red France. The implementation of a planned economy will not only solidify the economic foundation of our socialist regime but also unite our citizens and revolutionize all aspects of society and life."
 FPR_Reinvigorate_the_Workforce: "Jumpstart the Workforce"
 FPR_Reinvigorate_the_Workforce_desc: "In the past, the global perception of French workers was shaped by stereotypes of being 'lazy' and 'difficult to manage.' However, all of this has dramatically changed in the Federative French Socialist Republic. Thanks to a more equitable distribution of wealth, overseen by the Revolutionary Guard, the majority of French citizens now enjoy the benefits of economic development. This stands in stark contrast to the past, when large corporations monopolized profits, leaving ordinary workers in a hopeless situation with little opportunity for improvement. Today, French workers and unions have become the backbone of the nation, embodying an unparalleled drive and resolve in France's history. Moreover, they maintain their diversity and inclusiveness, representing the finest aspects of society while continuously bringing fresh vitality to the socialist cause. Like a Renault steadily cruising along the highway, France is forging ahead into the future."
 FPR_Embrace_our_Red_Brothers: "Embrace our Red Brothers"
 FPR_Embrace_our_Red_Brothers_desc: "As the world's first socialist regime, the USSR had to endure hostility from other capitalist powers and pursue a path of self-reliant development. Fortunately, for the Federative French Socialist Republic, we are not alone. Across the countries once dominated by the capitalist EU, the sparks of socialism are spreading. In some places, these sparks have already ignited the flames of popular revolution and class struggle. The Revolutionary Guard will strike, offering steadfast support and solidarity to other socialist nations across Europe. The blood of the reactionaries will nourish the growth of the towering tree of socialist unity throughout the continent. A new red European future rises on the horizon."
 FPR_embrace_red_brothers_tt: "For every one of the following nations in our faction, you will gain 1 Civilian Factory and 25 Political Power \n[GER.GetFlag] Germany \n[ITA.GetFlag] Italy \n[RSR.GetFlag] Spain \n[LUX.GetFlag] Lowlander Union \n[PRP.GetFlag] Portugal \n[UK2.GetFlag] England \n[DEN.GetFlag] Denmark \n[NOR.GetFlag] Norway \n[SWE.GetFlag] Sweden \n[FIN.GetFlag] Finland \n[GRK.GetFlag] Greece"
 FPR_Franco_German_Treaty_of_Friendship_Alliance_and_Mutual_Assistance: "Franco-German Treaty of Friendship"
 FPR_Franco_German_Treaty_of_Friendship_Alliance_and_Mutual_Assistance_desc: "The relationship between France and Germany, shaped by centuries of rivalry, has long been a key topic for politicians and citizens alike. The most recent effort at reconciliation between the two countries led to the creation of the European Union, a landmark organization that has profoundly shaped Europe's geopolitical landscape. Fast-forward to the present, and with an unprecedented threat emerging from the East, the leaders of both nations must find common ground. They need to strengthen their alliance on the fragile foundation of the EU, making the Franco-German partnership the cornerstone of European cooperation in the new era. The heirs of Jean Jaurès and Karl Marx will work tirelessly to build a brighter future for Europe."
 FPR_will_raise_fg_brigades_tt: "Will raise one §GExperienced§! Franco-German Brigade in §PAlsace§!"
 FPR_Embrace_Mass_Production: "Orgullo industrial"
 FPR_Embrace_Mass_Production_desc: "Through relentless reforms and the tireless efforts of millions, our socialist economic development has reached unprecedented heights, once unimaginable to both theorists and revolutionaries. The remnants of capitalist economic elements have been eradicated, and France's already advanced state-owned industry has been revitalized under the people's government, growing even stronger and serving as the cornerstone of the economic system. Furthermore, the industrial chain, once deeply embedded in the neoliberal global economy, is now an inseparable part of the economic sovereignty of the Federative French Socialist Republic. The people's economy fuels the vitality and creativity of French society, driving both scientific breakthroughs and intellectual progress. This strengthened economic foundation also provides a solid basis for enhancing France's military capabilities. The French people have every reason to be proud of these remarkable achievements, and Marshal Casanova takes great satisfaction in seeing that France's dream is now within reach."
 FPR_The_New_French_Man: "El nuevo ciudadano"
 FPR_The_New_French_Man_desc: "How does the new social structure drive the progress of human civilization? The answer is simple: the new generation of citizens, growing up in a socialist nation, will develop entirely different traits in both thought and action compared to those of the old society. Under Marshal Casanova and the Revolutionary Guard, this vision is becoming a reality in France. Contemporary French youth are more progressive, purer, more passionate, and more patriotic than their predecessors. They are dedicating themselves to work and production across various fields. The decadence and fear of the end of human history, fostered by the late capitalist system, have become relics of the past. As pioneers of European civilization, France is now spreading a new, transcendent ideology to every corner of the world. Given time, as these new citizens become the backbone of society, France—empowered by its ideology—will be capable of defeating any enemy."
 FPR_Topple_the_Fascist_Menace: "Spear Fascism"
 FPR_Topple_the_Fascist_Menace_desc: "'Revenge is a dish best served cold.' In foreign affairs, we have patiently waited for France and its European allies to regain their optimal strength, allowing their growth trajectory to surpass that of their greatest enemy—the 'Evil Empire' of the East. Today, this once seemingly unattainable goal has been unexpectedly achieved. The previously fragmented Europe is now united and strong, with its decaying democracy replaced by a system that better reflects the people's will. In these significant transformations, the leading role played by Marshal Casanova and the Revolutionary Guard, and by France under their leadership, cannot be overlooked. We are fully confident and well-prepared in both material and spiritual aspects. Now, it's time to take decisive action: the people's army will march eastward, destroy the tyrant's stronghold, and liberate our fellow Europeans suffering in dire conditions. This time, victory will undoubtedly be ours!"
 FPR_left_opposition_dyn_mod: "Bloque Arthaud"
 FPR_left_opposition_dyn_mod_desc: "El Bloque Arthaud, al que el mariscal Casanova se refiere como la \"Oposición de Izquierda\", es lo que queda del que fue una vez el floreciente movimiento trotskista en Francia."
 FPR_right_opposition_dyn_mod: "Bloque Daeninckx"
 FPR_right_opposition_dyn_mod_desc: "El Bloque Daeninckx, al que el mariscal Casanova se refiere como la \"Oposición de Derecha\", está formado por los restos de grupos ampliamente socialistas de antes y durante la Guerra Civil."
 FPR_Ideolize_the_Permanent_Revolution: "Idolize the Permanent Revolution"
 FPR_Ideolize_the_Permanent_Revolution_desc: "The proletariat of France is free! Our workers are free! But our goal for total liberation of the workers does not end here. As Marx said: \"Workers of the world, unite!\" This does not mean solely the workers of France, or Europe, by evidently the entire world belongs to the proletariat and the working class. Everyday we work towards a goal of a world free of wage-slavery, of the destructive nature of capitalism, to the lords that rule over the worker like feudal kings and queens. We devote our lives to the true words of Marx and we will spread freedom to the workers and to the oppressed people of the world as a whole."
 FPR_Ensure_Revolutionary_successes: "Exportar la revolución al extranjero"
 FPR_Ensure_Revolutionary_successes_desc: "Nuestra revolución permanente iniciará con los trabajadores de Francia. Desde las fábricas militares hasta los campos de batalla, el proletariado de nuestro país dará las armas a los trabajadores del mundo que quieran luchar contra sus opresores. Si exportamos nuestras mejores armas y asesores, lucharemos contra el orden mundial capitalismo y le daremos un mensaje a los opresores: Nos mantenemos firmes y fuertes frente la adversidad. Ayudaremos a los trabajadores del mundo a luchar por su libertad.  "
 FPR_The_Global_Class_Struggle: "La Quinta Internacional"
 FPR_The_Global_Class_Struggle_desc: "Como parte de nuestros grandes y nobles esfuerzos de liberar a los trabajadores oprimidos del mundo, reforzaremos nuestra posición global con la formación de la Quinta Internacional, una digna heredera de su predecesora, la Cuarta Internacional. Esta organización supranacional no solo será el cuerpo diplomático de la nueva y renovada Francia. La Quinta Internacional también será, hasta cierto punto, una organización militar que tendrá en mente a los trabajadores del mundo y que estará lista para ayudar a cualquiera que solicite apoyo para su causa. Desde Europa hasta África y Sudamérica, estamos aquí para defender los ideales de Marx y difundirlos por todo del mundo, como una plaga que los capitalistas harían bien en temer."
 FPR_Champion_Proletariat_Internationalism: "Defender el internacionalismo proletario"
 FPR_Champion_Proletariat_Internationalism_desc: "The proletariat is someone who does not belong to any national identity, racial background, or religious affiliation. The people of the world who toil for their living belong to themselves, as a people who have always existed and will continue to exist - the worker is a permanent veritable to the world. It is this that makes us different from all other nations in the world, while yes we are the French workers, we belong to the people, to those who are oppressed in the world to the capitalist system of slavery. We will set ourselves free or die trying our best, we must because it is the correct and just thing to do. All men must die, but we can choose the significance of our death, we chose to carry the torch of Marxism to our graves."
 FPR_Block_Deformation: "Defensa contra la deformación"
 FPR_The_Socialist_Culture: "Socialismo del futuro"
 FPR_Long_Live_the_Workers_Revolution: "Larga vida a la revolución proletaria"
 FPR_Socialist_Democracy: "Democracia del Partido"
 FPR_Liberate_the_Balkans: "Liberar los Balcanes"
 FPR_Cybertrot: "CyberTrot"
 FPR_creation_of_cybertrot_tt: "Completion of this focus will grant §ACyber-Trotsky§! as a §RField Marshal§!, §AMilitary Advisor§!, and §GDefense Minister§!"
 FPR_trotskymobile_active_tt: "This will spawn a command center containing §ATrotsky§! \n\nIf this command center is §RLOST IN BATTLE§!, so too will  §ACyber-Trotsky§!"
 FPR_Federation_of_Socialist_States: "Federación de Estados Socialistas"
 FPR_global_revolution_category: "Eje central de la revolución permanente"
 FPR_global_revolution_category_desc: "\n\n\n\n\n£GFX_FPR_permanent_revolution_cat\n\n\n\n\n\n\n\nFor true liberation of a nation, the proletariat must continuously and forever fight for its betters. There should be no pausing and no break in their fight for freedom, they should always destroy oppression when they see it in the nation.\n\nThe idea of the Permanent Revolution, conceptualized by Trotsky, is something that must be embodied well and truly. If it is not, we would be traitors to our own cause, abandoning the proletariat ideal."

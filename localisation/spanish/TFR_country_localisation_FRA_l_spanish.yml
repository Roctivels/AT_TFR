 FRA_Disloyal_Military_idea: "Ejército desobediente"
 FRA_Disloyal_Military_idea_desc: "A pesar de nuestros mejores esfuerzos, nuestra relación con las Fuerzas Armadas Francesas deja mucho que desear. Una combinación de nuestras políticas, la falta de acercamiento y el estado de nuestra política exterior ha llevado a muchos dentro del ejército a despreciar al gobierno. A menos que rectifiquemos estos problemas, debemos estar preparados para posibles motines y conspiraciones de nuestros generales en nuestra contra. Estos conflictos de interés también generan preocupaciones sobre un posible golpe de Estado, que podría cambiar para siempre el rumbo de la historia de Francia."
 FRA_Disloyal_Military_Zemmour_idea: "Ejército desobediente"
 FRA_Disloyal_Military_Zemmour_idea_desc: "A pesar de sus mejores esfuerzos, nuestra relación con el Gobierno deja mucho que desear. El Estado ha marginado a las fuerzas armadas, y ahora muchos dentro de nuestras filas desprecian al Gobierno. Con Zemmour al mando, el Gobierno continuará incluso tras un golpe directo contra el orden democrático."

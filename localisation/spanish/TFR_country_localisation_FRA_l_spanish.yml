 FAF_EUN_army_of_purity_dummy_desc: "Como identitarios, nuestro movimiento difiere de la mayoría de movimientos de ultraderecha europeos, pues apoyamos la unificación continental en vez de la supremacía de una nación concreta. Tras el colapso de la Unión Europea por culpa de las hordas orientales, ha llegado una oportunidad de ocupar el vacío de poder y ser la potencia hegemónica europea. Si bien mantener nuestra influencia puede ser costoso políticamente, ser el nuevo centro del continente es esencial para que podamos derrotar a las fuerzas del multiculturalismo, liberalismo y cualquiera que busque destruir nuestra querida Europa."
 FAF_EU_unification_campaigns_idea: "Campaña de unificación hegemónica"
 FAF_EU_unification_campaigns_idea_desc: "En nuestra cruzada por unir toda Europa, debemos dejar claro que nuestra idea de una Europa unificada difiere de la idea de los federalistas de la Unión Europea. Nuestras campañas buscan formar una hegemonía europea que una al continente para proteger a sus pueblos y culturas, no para que élites tecnócratas se lleven sus riquezas. Hemos dedicado numerosos recursos para asegurar que esta campaña tenga éxito y nos permita eliminar cualquier influencia foránea de nuestro continente para el año que viene"
 FAF_europeanism_idea: "Europeísmo"
 FAF_europeanism_idea_desc: "El europeísmo exige que Europa se mantenga unida, manteniendo al mismo tiempo las identidades nacionales y las culturas regionales. Una Europa dividida no puede enfrentarse a las potencias mundiales; unas fuerzas armadas unidas nos permiten reducir el número de sistemas de armas en uso y, con un idioma común, reclutar a un continente de más de 500 millones de personas."

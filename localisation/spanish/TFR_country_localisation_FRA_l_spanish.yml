 FAF_republican_officers_movement_idea: "Mouvement Républicain"
 FAF_replacing_republicans_dummy_idea: "Mouvement Républicain"
 FAF_republican_officers_movement_dummy_idea: "Mouvement Républicain"
 FAF_royal_pretenders_dynamic: "Pretendientes reales"
 FAF_royal_pretenders_dynamic_desc: "\n\n\n\n\n£GFX_FAF_royal_squabbles\n\n\n\n\n\n\n\nA pesar de nuestros derechos ancestrales al trono, las casas de Valois, de Orleans y de Bonaparte buscan acabar con nuestro reinado divino desde las sombras, debemos hacer algo al respecto antes que se salga de control."
 FAF_royal_pretenders_idea: "Pretendientes reales"
 FAF_royal_pretenders_dummy_idea: "Pretendientes reales"
 FAF_royal_pretenders_squabble_dummy_idea: "Pretendientes reales"
 FAF_royal_pretenders_sway_nobility_dummy_idea: "Pretendientes reales"
 FAF_nobility_taking_money_tt: "§CLa nobleza§! tomará una cuantiosa cantidad de dinero del banco nacional cada 3 meses, a cambio de contribuir a la estabilidad del reino."
 FAF_dieu_veut_idea: "Dieu Veut"
 FAF_dieu_veut_idea_desc: "\n\n\n\n\n£GFX_FAF_deus_vult\n\n\n\n\n\n\n\n Nosotros y nuestros soldados estamos respaldados por la voluntad de la nación y la de Dios. Luchamos una guerra justa, una guerra santa y divina. Cuando nuestros hombres marchen al frente, deben saber que ellos, el pueblo de Francia, son el pueblo más grande que jamás haya existido. Cuando escuchen el estruendo de la artillería y se enfrenten a las hordas salvajes del este, deben saber que están siguiendo el espíritu de nuestro señor. Dieu Veut!"
 FAF_euro_navy_annexation_tt: "Gracias a las negociaciones diplomáticas, los comandos navales de Europa, el Atlántico y el Pacífico están dispuestos a unirse en nuestra lucha contra la hegemonía comunista soviética."
 FAF_lafayette_order_cat: "El nuevo orden"
 FAF_lafayette_order_cat_desc: "\n\n\n\n\n£GFX_FAF_lafayette_category\n\n\n\n\n\n\n\nLos alemanes nos apuñalaron por la espalda, dejaron que nuestros hijos muriesen... ¿y aún así esperaban que nos sometiéramos a ellos en la guerra en ciernes?\nLos comunistas y los alemanas conspiran contra Francia... minando nuestra juventud e industria para dejarnos debilitados... ¿y todo para qué?\n¿Para que nos §RROBEN§! los territorios de Alsacia-Lorena?\n¿Para §RIMPONER§! el comunismo germánico en nuestra gloriosa Francia?\nSolo podemos suponer las acciones que tomarán una vez que seamos débiles, pero eso nunca pasará siempre y cuando sigamos a nuestro gran líder §CLafayette§!"
 FAF_showcase_superiority_decision: "Mostrar la superioridad francesa"
 FAF_showcase_superiority_decision_desc: "Somos superiores, lo sabemos. Nuestros ideales, nuestro estilo de vida, nuestra historia, nuestra gente... ¡Todos han sido perfeccionados como el vino más elocuente, y sin embargo, el mundo continuamente falla en reconocer nuestra OBVIA superioridad sobre ellos!"
 fra_constant_showboating: "Alardeo constante"
 FAF_superiority_cost_tt: "Por cada aliado que tengamos, perderemos 5 puntos de poder político."
 FAF_kill_villiers_tt: "§RUn peón del viejo orden menos§!"
 FAF_purge_unpatriots_from_military_decision: "Purgar a los no patriotas del ejército"
 FAF_embelish_german_betrayal_decision: "La puñalada por la espalda alemana"
 FAF_melenchon_die_linke_israel_axis_decision: "Advertir del contubernio §pMélenchon§!-§RDie Linke§!-§CIsrael§!"
 FAF_melenchon_die_linke_israel_axis_decision_desc: ""
 FAF_the_puppeteers_of_DAY_X_decision: "Los VERDADEROS instigadores del \"Día X\""
 FAF_the_puppeteers_of_DAY_X_decision_desc: "¿Alemania, con décadas de antinacionalismo a sus espaldas va y se convierte en un país fascista tras perder una guerra contra Rusia? ¡NOSOTROS LUCHAMOS POR NUESTRO GOBIERNO, LUCHAMOS PARA ACABAR CON LOS COMUNISTAS! ALEMANIA, por otro lado, simplemente los barre bajo la alfombra siguiendo su plan strasserista-comunista y TODOS SABEMOS MUY BIEN quienes se benefician cuando los alemanes necesitan comprar armas y pedir préstamos..."

 FAF_Glorify_Jeanne_dArc_desc: ""
 FAF_Enshrine_the_Rights_of_Man: "Garantizar los derechos del hombre"
 FAF_Enshrine_the_Rights_of_Man_desc: "En 1798, nuestros ancestros se deshicieron del terror y la barbarie del Antiguo Régimen y se propusieron crear una guía para el pueblo recién liberado de Francia. Este documento, conocido como La Declaración de los Derechos del Hombre y del Ciudadano, todavía tiene un lugar en la constitución más reciente de la Quinta República. A medida que reconstruimos la legitimidad gubernamental, ¡sería una tontería no consagrar estos derechos!"
 FAF_Restore_Marianne: "Restaura la gloria de Marianne"
 FAF_Restore_Marianne_desc: "La figura de Marianne, surgida de los fuegos de la Primera República, ha actuado a menudo como la personificación nacional de la propia Francia. Sin embargo, en las décadas recientes, ha perdido relevancia en la cultura popular, para consternación de muchos patriotas franceses. Así pues, si queremos unir a Francia bajo nuestra bandera patriótica, ¡debemos restaurar la relevancia y la gloria de nuestra amada Marianne!"
 FAF_Calm_Militarist_Rhetoric: "Calmar retórica militarista"
 FAF_Calm_Militarist_Rhetoric_desc: "Entre nuestras filas existen quienes desean que los militares tomen aún más control sobre el gobierno a expensas de nuestras libertades civiles. Si bien podemos apreciar sus llamados al orden y la estabilidad, es hora de suavizar la retórica de estos militaristas, no sea que veamos a nuestra amada República transformada en una junta militar permanente."
 FAF_Pardon_Republican_Officers: "Indultar a los funcionarios republicanos"
 FAF_Pardon_Republican_Officers_desc: "En nuestro esfuerzo de asegurar el control sobre el aparato del estado, necesitamos tantas manos como podamos conseguir.  Si bien nuestra purga inicial involucró a la mayoría de los ex oficiales que participaron en nuestro golpe, aquellos que simpatizan con nosotros pueden regresar a través de una serie de indultos."
 FAF_Mimic_de_Gaulle: "Imitar a de Gaulle"
 FAF_Mimic_de_Gaulle_desc: "A medida que buscamos establecer un enfoque fuerte y centrado en lo militar para nuestra gobernanza que aún respete los derechos fundamentales de nuestros ciudadanos, ¿a quién mejor recurrir que al difunto presidente y general Charles De Gaulle? Sus esfuerzos por establecer la tristemente desafortunada Sexta República pueden proporcionar un marco para nuestro liderazgo que, si bien requirió algunos medios contundentes para sofocar la crisis de mayo de 1958, dejó un legado entrañable que debemos tratar de emular."
 FAF_Glorify_Vichy_Stability: "Glorificar la estabilidad de Vichy"
 FAF_Glorify_Vichy_Stability_desc: "The public image of the former French State has been tainted by accusations of \"German collaboration\" by many biased historians, but there is one way we can redeem its legacy among the people of France. Seeing as it is something that in the chaos of the 21st century many seek, emphasizing the stability of the former Vichy regime can help our people see that our goals are far beyond simply capitulating to German fascists."
 FAF_Redeem_The_Marechal: "Expiar al Maréchal"
 FAF_Redeem_The_Marechal_desc: "History has not been kind to Phillippe Petain. The Maréchal, once known as the \"Lion of Verdun\" for his bravery in the First World War and willingness to work out peace with the invading Germans to prevent the imminent destruction of France. The petty liberal historians, hell-bent on deeming him a collaborator, must be silenced. Instead, our education must reflect a more \"fair\" approach to how we look back on the true savior of France during the Second World War!"
 FAF_Keep_Officers_in_Check: "Limitar a los oficiales"
 FAF_Keep_Officers_in_Check_desc: "El Cuerpo de Oficiales se ha convertido en un verdadero dolor de cabeza para nosotros, alineados con los pseudoliberales gaullistas que pretenden traer de vuelta la inestabilidad de las anteriores Repúblicas Francesas. Si bien todavía nos son necesarios para gobernar, limitar su influencia política es esencial para consolidar nuestro poder."
 FAF_An_Honour_to_Serve: "Servir como un honor"
 FAF_An_Honour_to_Serve_desc: "Nuestro pueblo debe darse cuenta de que el legado francés es uno de servicio y sacrificio. Desde nuestro pasado franco bajo Carlomagno hasta las conquistas napoleónicas en Europa, el legado francés es el del ejército y el honor de servir en este. La propaganda debe hacer énfasis en esta tradición, ¡especialmente ahora que nos estamos preparando para otra cruzada contra las hordas asiáticas!"
 FAF_Promote_French_Israelism: "Promover el Israelismo francés"
 FAF_Promote_French_Israelism_desc: "Aunque marginal dentro del nacionalismo francés, existe un movimiento que sostiene que nuestros ancestros francos son descendientes de la tribu de Benjamín, una de las diez tribus perdidas de Israel. Puede que algunos vean esto como un sinsentido histórico, pero si promovemos este concepto, podrá ayudar a animar a los ciudadanos religiosos a luchar por nuestro régimen. En la lucha contra las hordas asiáticas, el pintarnos como cruzados desde la cuna será una buena idea."
 FAF_Promote_Radical_Officers: "Ascender a oficiales radicales"
 FAF_Promote_Radical_Officers_desc: "Para compensar la influencia que tienen los gaullistas sobre el Cuerpo de Oficiales, podemos promover a miembros actualmente en servicio que encarnen mejor nuestros ideales petainistas. Además, siempre es bueno que los oficiales tengan opiniones diferentes, especialmente en el departamento político, ¿verdad?"

 FRA_armed_forces_dynamic_desc: "Las Forces Armées Françaises han sido la espada y el escudo de la nación francesa, protegiendo a nuestro pueblo de posibles opresores y agresores a lo largo de nuestra historia. Seguirán defendiendo a nuestra nación contra las amenazas de la era moderna, sin importar quiénes sean."

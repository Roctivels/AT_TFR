 france.451.t: "Los adolescentes se pasan a partidos jacobinos"
 france.451.d: "Retrocede hasta hace unos doscientos años, en los últimos días de la monarquía borbónica. Fueron en las pistas de tenis en donde se plantaron las semillas de la Revolución Francesa. Hoy, se desarrolla una escena similar en las calle de París. Sin embargo, esta vez, la cuna de la revolución para ser una lavandería o el bajo de una vivienda social.\n\nUna docena de sillas plegables estaban dispuestas circularmente, ocupadas por los asistentes quienes, si bien estaban relajados, tenían sus miradas fijas en el anfitrión que estaba en el centro de la sala. Me alegro que casi todo el mundo esté aquí. Empezó su discurso, sacando  un librito rojo de su bolsillo derecho. En la portada estaba plasmada una combinación dorada de la hoz y el martillo con la cruz de Lorena. Era clara y inequívocamente un resumen del programa revolucionario de nuestro partido.\n\n\"No me malentiendas, pero tu «revolución» tiene serios problemas\". Interrumpió una voz rasposa. Todas las miradas fueron a parar a un hombre mayor que llevaba una boina inglesa. Su ceño fruncido y la cicatriz en su frente eran indicios de una vida llena de dificultades. \"Estáis defendiendo cooperar con el clero, gobiernos autoritarios, vigilancia masivas e incluso con dictaduras militares! ¡Esta no es la revolución que yo conozco! Sus apasionadas palabras parecieron conjurar una imagen suya en 1968, liderando protestas estudiantes con cánticos contra De Gaulle mientras plasmaba la imagen de Mao en el ayuntamiento de su ciudad.\n\nUn silbido interrumpió el silencio incómodo. Un chico de pelo largo, con las manos en su bolsillo, cargó contra el anciano: \"¡Abuelo, tu revolución está obsoleta! Algunos de tus camaradas son los culpables de haberse cargado el país! No nos hace falta que nos enseñes lo que debemos hacer\".\n\nTras esto, una joven rubia que portaba un colgante de cruz habló fervientemente: \"¡Sólo podremos hacerle frente a la dictadura rusa si fortalecemos nuestra capacidad militar y establecemos un ejército proletario! No es sólo cuestión de fuerza... sin fe, ¿quién puede unificar el país?\n\nLos jóvenes atacaron de forma vehemente la postura del anciano, y lo hicieron hasta el punto que este ya no lo aguantara más, saliendo furioso de la habitación. Mientras el anciano salía de la lavandería y la puerta empezaba a cerrarse, el anfitrión habló con una voz clara que todo el mundo pudo escuchar."
 france.451.a: "Me alegro mucho, camaradas. La revolución necesita la sangre joven que traen..."

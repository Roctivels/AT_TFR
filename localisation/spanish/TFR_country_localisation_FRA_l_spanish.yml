 FAF_Engie_Bills_idea: "Engie Bills"
 FAF_Engie_Bills_idea_desc: "The Engie Bills are a system of loans and debt-taking that will allow France to remilitarize without the hawkish eyes of foreign powers intervening or looking in. Similar to the MEFO bills used by Germany to reindustrialize their nation, they are a costly and duplicitous maneuver - one that is not likely to last forever. However, no matter the end, they are what is necessary for France to be reborn as a genuine power on the world stage once more."

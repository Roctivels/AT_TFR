 FRA_Jupiter_Ascendent_Category: "Júpiter asciendiente"
 FRA_Jupiter_Ascendent_Category_desc: "\n\n\n\n\n£GFX_FRA_jupiter_cat\n\n\n\n\n\n\n\nEmmanuel Macron alguna vez lidero a la gran nación de Francia durante su periodo más difícil - suficiente con estos problemas sinsentido burocráticos y elecciones caóticas. Vamos a mostrarle a Europa y al resto del mundo nuestra superioridad y triunfo mientras combatimos contra aquellos que desde dentro o fuera desean destruir nuestra nación. Vamos a definir esta era como una de nuestra excelencia y recuperaremos nuestra antigua gloria como una de las grandes naciones no solo de Europa pero del mundo. \n\nEl polvo se ha asentado mientras que la atmosfera política francesa ya ha entrando en movimiento mientras la coalición conservadora cesa, y se queda atrás en el pasado; donde la gente de Francia los ha dejado. Con reformas pasando para el mejoramiento de nuestra nación, Francia respira en tranquilidad sabiendo que esta en buenas manos. Nuestro gran ejército vuelve a su lugar mientras nos preparamos para las dificultades del mañana. El objetivo de Macron es claro mientras la nación busque lograr su mejor versión también, como la mejor Europa posible.\n\nLa nación de Francia navega a su destino con Macron al timón."

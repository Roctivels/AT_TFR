 FRA_Anti_Police_Riots_Category: "Protestas de Majid Kattan"
 FRA_Anti_Police_Riots_Category_desc: "Tras el asesinato de Majid Kattan, ciudadano tunecino desarmado, a manos de un agente de policía en Bobigny, París se sumió en la anarquía. Los manifestantes incendiaron coches, destruyeron paradas de autobús y lanzaron petardos contra la policía. Estas protestas se han extendido por todo el país y han rivalizado con los disturbios provocados por las protestas de los \"chalecos amarillos\" que hemos visto durante el último lustro.\n\nSi bien Francia se basa en la idea de la Revolución, los tiempos en Europa están cambiando, y con el resurgimiento de Rusia en el Este, ya no podemos permitirnos quedarnos de brazos cruzados mientras los manifestantes destruyen infraestructuras cruciales."

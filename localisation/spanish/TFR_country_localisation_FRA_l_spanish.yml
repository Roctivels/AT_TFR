 FPR_Block_Deformation_desc: "En el mundo actual, la mayoría de los Estados autoproclamados comunistas que han sobrevivido más allá de los años 90 no son más que Estados obreros deformados. ¿Pueden los chinos afirmar ser comunistas mientras tienen entre manos una de las mayores economías de mercado de la historia? Incluso la alguna vez admirada Unión Soviética cayó en la deformación bajo el terror de Stalin y su bastardización del marxismo-leninismo. Con nuestro control sobre el Gobierno francés cimentado, debemos hacer todo lo que esté en nuestra mano para asegurar que nuestra revolución no sufra la deformación. Estándares ideológicos claros, a la par de acabar con las excepciones, incluso bajo el pretexto de condiciones materiales o lo que sea que nuestra quinta columna ponga de excusa, ¡asegurarán que Francia finalmente pueda cumplir su destino de ser el primer Estado marxista no deformado!"
 FPR_The_Socialist_Culture_desc: "Tras décadas de realismo capitalista y la propaganda que lo reforzó, muchos están preocupados que nuestra revolución pues la ven teniendo e, mente el fracaso soviético del pasado. En resumidas cuentas, debemos hacerles saber que este no será el caso. Lo que el proletariado de Francia debe saber es que nosotros defendemos el socialismo del siglo XXI, uno que tiene en cuenta las necesidades y tecnología de la actualidad. También, priorizando el pensamiento futurista es nuestra mejor baza para ejemplificar nuestro rechazo por los experimentos pesudomarxistas del pasado y que el proletariado de Francia vea nuestro socialismo como un movimiento que nos llevará a un futuro utópico en vez de a un pasado distótico."
 FPR_Long_Live_the_Workers_Revolution_desc: "En pocas palabras, debemos implantar nuestra doctrina de revolución permanente tanto en casa como en el extranjero si realmente estados dispuestos a llevar la bandera trotskista. Ya sea mediante revoluciones económicas y culturales que busquen acabar con las opresivas estructuras capitalistas que han esclavizado a Francia por siglos o prepararnos para liberar al proletariado de Europa o de otras zonas, siempre debemos apoyar las causas revolucionarias tan pronto como aparezcan. Aún si las fuerzas del fascismo y del capitalismo internacional tratan de acabar con nosotros, al final del día, Francia gritará...\n\n¡Viva la revolución de los trabajadores!"
 FPR_Socialist_Democracy_desc: "As we transform the government of France away from the failures of liberal-bourgeois tyranny, we have faced many accusations of being \"anti-democratic\" in the process. What these well-intentioned lumpenproletariat fail to realize, however, is that we plan to replace the former failures of liberal democracy with Democratic Centralism, best described as party democracy! No more will the elected members of parliament busy themselves with fruitless arguments that only leave the people suffering without a voice in power; instead, each party member will have their role to play in ensuring the decisions we make follow the principles of workers' democracy. Of course, some of the reactionary class bemoan this supposed suppression of political freedom. However, by implementing democratic centralism, we can still ensure we can address necessary complaints against the government. These complaints allow for essential self-criticism while preventing the deadlock that doomed the former Sixth Republic to its grave, leaving it vulnerable as the Russian imperialists conquered Eastern Europe."
 FPR_Coalition_the_Against_Fascism_desc: "Mientras nos aseguramos que las contradicciones internas no acaben con la revolución desde dentro, también debemos evitar caer en luchas internas que han sido tan características en los círculos de izquierda desde tiempos inmemorables. Debemos formar un frente unido interseccional contras las fuerzas de la reacción junto a los otros partidos izquierdistas afines a nosotros que nos ayudaron a tomar el poder. Esta muestra de unidad, sin importar la ideología, no solo nos permite desmentir cualquier acusación de supresión política sino que nos permite mostrar a aquellos que quieran derrocar nuestro gobierno popular de Francia que no lo tendrán nada fácil, ¡y que no nos detendremos hasta que la bandera roja sea la bandera de la humanidad!"
 FPR_Liberate_the_Balkans_desc: "The Balkans, a peninsula once graced by many socialist regimes, has now fallen into bitter infighting and the vices of capitalism. While some believe that an invasion only represents a sort of \"red imperialism\" that merely acts to force our will against the people of these Balkan countries, the truth is that we are saving them from themselves. We must embark on a great crusade to save the nations of the Balkans from the forces of capitalist reaction and Russian imperialism and ensure that when the time comes to fight against those Eurasian imperialists, we have the upper hand on that front."
 FPR_Cybertrot_desc: "El socialismo cibernético, o la idea de que los sistemas automatizados puedan asistir en el manejo de economías planificadas, ha sido una corriente subyacente del pensamiento socialista contemporáneo. Experimentos como Sycno en Chile o el fallido proyecto OGAS soviético tristemente nunca contaron con los recursos suficientes para ser implementados y tratar de solucionar los problemas principales que sufren las economías planificadas, especialmente el surgimiento de oligarcas y la corrupción en general. Con esto en mente, hemos juntado a las mejores y más brillantes mentes de toda Francia para dar inicio al proyecto conocido como CyberTrot. Este sistema, posiblemente el pináculo de la inteligencia artificial, la computación y la gestión tecnológica, será capaz de manejar eficientemente una economía planificada. Algunos pueden tener preocupaciones sobre la IA, que adquiera capacidades cognitivas superiores y que ponga en peligro a la revolución o a la propia humanidad. Sin embargo, el entrenamiento que recibirá asegurará que la toma de decisiones de CyberTrot siempre busque lo mejor para los trabajadores."
 FPR_Federation_of_Socialist_States_desc: "Mientras la revolución mundial sigue su curso, nos encontramos ocupando territorios muy lejanos a Francia, liberados de sus antiguos opresores capitalistas. Al hacerlo, nos hemos dado cuenta que nuestro uso de Francia para nombrar nuestro Estado revolucionario ya no es adecuado, especialmente ahora que hemos abandonado las insignificantes ideas nacionalistas en favor del internacionalismo proletario. Así, por decreto de nuestro frente unido parlamentario, nos hemos transformado en la federación de Estados socialistas, un nombre mucho más adecuado que incluye a todos los nuevos camaradas que se han unido a nuestras filas.\n\nLas fuerzas capitalistas no volverán a empujarnos a la demagogia capitalista, aún si esta se encuentra disfrazada como economía de mercado socialista. Con el análisis y el poder de CyberTrot de nuestro bando, podemos estar seguros de que nuestra economía planificada no sólo alcanzará, sino que superará las expectativas más salvajes de nuestros economistas. Ahora estamos preparados para iniciar la cruzada final para liberal al proletariado global de la tiranía del capitalismo. ¡Hagamos todo lo que esté en nuestro poder para que todo el mundo esté bajo una única bandera internacionalista!\n\nVive la Fédération des États Socialistes!"
 FRA_Stabilize_the_Caribbean_desc: "El caos reciente en Estados Unidos y México ha provocado una crisis en el relativamente pacífico Caribe, y nuestros territorios allí ahora están amenazados. Con el pasar del tiempo, parece ser que la situación no se calmará hasta que alguien haga algo al respecto, y aparte de nosotros y el Reino Unido nadie más tiene razones para intervenir. Antes de que la situación escale, daremos un paso al frente y tomaremos medidas para calmar este turbulento mar."
 FRA_EU_The_Public_Private_Enterprise_desc: "Si bien hemos tenido éxito en convertir Francia en una potencia tecnológica, aún podemos hacer más. Francia siempre ha tenido un buen surtido de empresarios privados deseosos de invertir en proyectos gubernamentales. A pesar de esto, los líderes del pasado siempre han dejado pasar esta oportunidad. Depender casi exclusivamente de empresas públicas estanca el progreso y la innovación. Sin embargo, no repetiremos los errores del pasado. El futuro no espera a nadie. Y si no estamos dispuestos a trabajar con empresarios privados y emprendedores, entonces nunca seremos capaz de alcanzarlo."
 FRA_EU_The_Gears_Turn_Again_desc: "La economía de Francia es como una máquina muy avanzada. Si todos los engranajes trabajan conjuntamente, se pueden lograr grandes cosas, y se pueden conseguir innovaciones en tiempo récord. Pero si alguna pieza falla, todo el sistema se viene abajo, y la máquina deja de funcionar. Cuando la Quinta República cayó, la máquina que es la economía francesa cayó una vez más a un estado de caos y decadencia. Pero, a base de ensayo y error, los engranajes vuelven a girar. El corazón vuelve a latir, y cual ave fénix, nos alzamos de las cenizas de la decadencia. Ahora, miramos con optimismo el futuro, listos para enfrentar cualquier desafío que encontremos en nuestro camino."
 FAF_carolingian_fascism: "Fascismo carolingio"
 FAF_neonazism_desc: "\n\n\n\n£GFX_Ideology_carolingian_fascism\n\n\n\n\n\nEl §Yfascismo carolingio§! es una esotérica y virulenta forma de nacionalismo francés adoptado por Lafayette y sus seguidores. Arraigados a la ideología nacionalsocialista, creen que aquellos pertenecientes a la \"raza judeo-germánica\" son subhumanos que subvierten la cultura europea, simpatizan con la degeneración roja y que trataron de llevarse al mundo con ellos. Junto a esto, toma algo de inspiración de Frankia, creyendo que una gran Francia que comprenda las fronteras del imperio carolingio es necesaria para un lebensraum francés.\nMuchos podrían describir los mecanismos internos de la ideología de Lafayette como un culto, que sigue al pie de la letra su visión y su palabra. La base misma de esta ideología cambia cada día, cada hora. Las únicas ideas fijas son la de la superioridad francesa y la aversión a aquellos considerados subhumanos."

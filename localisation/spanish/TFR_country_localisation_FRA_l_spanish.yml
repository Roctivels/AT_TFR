 POLITICS_EMMANUEL_MACRON_DESC: "Emmanuel Jean-Michel Frédéric Macron es un exbanquero de inversiones, exministro y actual presidente de la Quinta República de Francia. A temprana edad y habiendo sido criado en un hogar no religioso, pidió ser bautizado en la Iglesia católica. Sin embargo, más tarde se declararía agnóstico y abrazó una ideología de izquierda que atribuye a su abuela. Estudió filosofía y economía en la École Normale Supérieure y luego asistió a la École Nationale d'Administration. Después de completar sus estudios, trabajó como banquero de inversiones para Rothschild & Cie Banque, donde ganó su primer millón en un acuerdo de nueve mil millones de dólares que ayudó a negociar. En 2012, fue nombrado Ministro de Economía, Industria y Asuntos Digitales, cargo del que dimitió en 2016 para lanzar su campaña presidencial.\n\nComo presidente, Macron ha seguido una agenda de reforma económica, que incluye la reducción del gasto público y la desregulación del mercado laboral. Su presidencia se ha visto empañada por protestas generalizadas, incluido el movimiento de los \"chalecos amarillos\", que comenzó a fines de 2018 en respuesta a las propuestas de aumento de los impuestos a los combustibles. Macron se ha referido a la colonización de Argelia por parte de Francia como un \"crimen contra la humanidad\" y a la intervención en Libia como un \"error histórico\". Mientras tanto, Francia todavía ejerce su influencia sobre los países vulnerables de África Occidental desde las sombras, y no está claro hasta dónde está dispuesto a llegar Macron para preservar los intereses franceses. A pesar de estos desafíos, Macron sigue siendo una figura destacada en el escenario internacional, abogando por la cooperación global en cuestiones como el cambio climático, la seguridad internacional y la unidad entre las naciones europeas."
 POLITICS_JEANLUC_MELENCHON_DESC: "Jean-Luc Mélenchon, el recién elegido presidente de la Quinta República Francesa, no es solo un político, sino un apasionado defensor del cambio social y los derechos humanos. Criado en una familia de clase trabajadora, Mélenchon aprendió el valor de la solidaridad y la comunidad desde muy joven. Su formación le inculcó una profunda empatía por las luchas de la gente común y la determinación de luchar por sus derechos. Formado en filosofía y economía, su curiosidad intelectual y su compromiso con la justicia social lo llevaron a una carrera política. Como exprofesor y activista, comprende el poder de la educación y la organización de base para lograr cambios significativos.\n\nComo líder, Mélenchon es conocido por su retórica vehemente y sus principios inflexibles. Su presidencia se guía por la visión de una sociedad más justa y equitativa, donde la riqueza y el poder se distribuyan de forma más equitativa y todos tengan la oportunidad de prosperar."
 POLITICS_OLIVIER_FAURE_DESC: "Olivier Faure es una figura destacada del panorama político francés, y actualmente ocupa el cargo de Secretario del Partido Socialista. Proveniente de una familia políticamente comprometida, creció inmerso en debates sobre justicia social y valores progresistas. Su trayectoria académica lo llevó a los pasillos de Sciences Po, donde perfeccionó su comprensión de la teoría política y las cuestiones sociales. Su carrera política comenzó como asesor y rápidamente evolucionó hacia un rol de liderazgo, lo que refleja su profundo compromiso con los ideales del socialismo.\n\nComo presidente, Faure aboga por una Francia que priorice la equidad social, la sostenibilidad ambiental y la justicia económica. Cree en el poder de la acción colectiva y aspira a unir a la izquierda bajo una bandera común para abordar los desafíos apremiantes que enfrenta la nación. Su enfoque pragmático busca equilibrar el idealismo con objetivos políticos alcanzables, esforzándose por reconectar con los votantes marginados a la vez que promueve reformas que impulsen a la clase trabajadora. La visión de Fauré es una visión de solidaridad, donde se amplifican las voces de los marginados y se dan vida a los ideales de la Revolución Francesa: libertad, igualdad y fraternidad."
 POLITICS_FRANCOIS_RUFFIN_DESC: "François Ruffin es un influyente periodista, cineasta y activista político, conocido por su enfoque político de base y su firme compromiso con la justicia social. Criado en un hogar modesto, Ruffin desarrolló una profunda empatía por las luchas de la clase trabajadora, que posteriormente inspiraría su labor como defensor de los desfavorecidos. Obtuvo reconocimiento por sus documentales que arrojan luz sobre problemas sociales, capturando las realidades que enfrentan los ciudadanos comunes en la Francia contemporánea.\n\nComo presidente, Ruffin encarna la voz del pueblo, priorizando la interacción directa con los electores y la organización comunitaria. Sus discursos apasionados y su estilo confrontativo desafían al establishment político, impulsando reformas que aborden la desigualdad de ingresos, los derechos de los trabajadores y las preocupaciones ambientales. La visión de Ruffin para Francia es una donde la democracia se revitaliza a través de la participación ciudadana activa y donde las políticas reflejan las necesidades y aspiraciones de la clase trabajadora. Busca crear una nación donde cada ciudadano se sienta empoderado para exigir el cambio y tenga un lugar en la mesa de gobierno."
 POLITICS_MARINE_LEPEN_DESC: "Marine Le Pen, la recién elegida presidenta de la Quinta República Francesa, no es solo una política, sino una madre e hija profundamente arraigadas en la sociedad francesa. Criada en un hogar con un fuerte componente político, presenció de primera mano las luchas y los triunfos de su padre, Jean-Marie Le Pen, quien lideraba el partido Frente Nacional. A pesar de sus diferencias ideológicas, Marine conserva un sentido del deber familiar y la determinación de dejar huella en la política francesa. Formada en Derecho en la Universidad Panthéon-Assas, sus inicios como abogada le permitieron comprender las injusticias que sufren los ciudadanos comunes. Esta experiencia alimentó su pasión por la justicia y su compromiso con la defensa de los derechos del pueblo francés.\n\nComo madre, Le Pen comprende la importancia de la seguridad y la estabilidad para las familias en toda Francia. Su presidencia está impulsada por el deseo de crear un futuro más seguro y próspero para la próxima generación, libre de las incertidumbres de la globalización y la erosión cultural."
 POLITICS_ERIC_ZEMMOUR_DESC: "Éric Zemmour, el recién elegido presidente de la Quinta República Francesa, no es solo un comentarista, sino un pensador que no teme desafiar el statu quo y expresar su opinión. Criado en un barrio multicultural de París, Zemmour experimentó de primera mano las tensiones y complejidades de la inmigración y la diversidad. Sus primeras experiencias moldearon su visión del mundo y le inculcaron un profundo sentido de identidad nacional y orgullo cultural. Formado en derecho y ciencias políticas, la carrera de Zemmour como periodista y autor se ha definido por su disposición a abordar temas tabú y desafiar las narrativas imperantes. Su defensa sin complejos de los valores y las tradiciones francesas lo ha convertido en una figura polarizadora, pero también le ha granjeado un público fiel entre quienes se sienten marginados o ignorados por la política dominante.\n\nComo líder, Zemmour se guía por la convicción de la importancia de preservar el patrimonio cultural y la identidad nacional de Francia. Su presidencia está impulsada por el deseo de proteger la soberanía francesa, fortalecer las fronteras y restablecer el orden público en las comunidades francesas."
 POLITICS_PIERRE_DEVILLIERS_DESC: "Pierre De Villiers, el recién elegido presidente de la Quinta República Francesa, no es solo un líder militar, sino un hombre de honor e integridad con un profundo sentido del deber hacia su país. Nacido en una familia militar, De Villiers aprendió los valores de la disciplina y el servicio desde muy joven. Su padre, un general condecorado, le inculcó el amor por su país y el compromiso de defender sus intereses. Educado en estrategia militar y liderazgo, su distinguida carrera en las fuerzas armadas lo llevó a algunas de las regiones más desafiantes y peligrosas del mundo. Sus experiencias en el campo de batalla moldearon su comprensión de la geopolítica y las complejidades de la guerra moderna.\n\nComo líder, De Villiers es conocido por su humildad y su disposición a escuchar los consejos de expertos y asesores. Su presidencia se guía por la creencia en la importancia de la fuerza a través de la unidad y la cooperación, tanto a nivel nacional como internacional. Está decidido a mantener la reputación de Francia como líder mundial y defensor de la democracia y los derechos humanos."
 POLITICS_JADOT_DESC: "Yannick Jadot es el carismático líder del partido Europa Ecología - Los Verdes y una figura destacada del movimiento ambientalista francés. Nacido en 1967, creció en una familia que le inculcó la pasión por la naturaleza y la sostenibilidad. Su formación académica en ciencias políticas y relaciones internacionales impulsó su compromiso con los problemas ambientales, lo que lo llevó a trabajar para diversas ONG antes de entrar en política.\n\nLa carrera política de Jadot se caracteriza por su inquebrantable dedicación a la lucha contra el cambio climático y la defensa de políticas verdes. Cree que la crisis ecológica no es solo un problema ambiental, sino también social y económico, que exige medidas urgentes para proteger tanto el planeta como a las comunidades vulnerables. Como miembro del Parlamento Europeo, ha impulsado una ambiciosa legislación climática e impulsado un Pacto Verde Europeo. Jadot visualiza un futuro donde Francia sea líder en sostenibilidad, transición energética y equidad social, promoviendo una sociedad justa que priorice la salud del planeta."
 POLITICS_PECRESSE_DESC: "Valérie Pécresse es una política con experiencia y la líder del partido republicano, conocida por su enfoque pragmático del Gobierno y su interés en la reforma económica. Criada en una familia políticamente activa, Pécresse desarrolló un fuerte interés por el servicio público desde temprana edad. Estudió en la prestigiosa Sciences Po y posteriormente obtuvo un título en la Escuela Nacional de Administración (École nationale d'administration), lo que allanó el camino para su exitosa carrera política.\n\nComo exministra de Educación Superior e Investigación, Pécresse está comprometida con la reforma educativa y la innovación. Su estilo de liderazgo enfatiza la responsabilidad fiscal, la seguridad pública y la importancia de una identidad nacional fuerte. La visión de Pécresse para Francia incluye revitalizar la economía, combatir el desempleo y asegurar que la nación siga siendo competitiva a nivel mundial. Busca unir al centroderecha bajo una bandera de conservadurismo moderno, abogando por políticas que equilibren el bienestar social con el crecimiento económico, al tiempo que responde a las preocupaciones de un electorado diverso."
 POLITICS_BARDELLA_DESC: "Jordan Bardella es una estrella en ascenso en el ámbito político y el joven líder de Agrupación Nacional, representando a una nueva generación de política de ultraderecha en Francia. Nacido en 1995, Bardella creció en una familia que fomentaba firmes convicciones políticas, y se involucró en la política desde su adolescencia. Sus estudios en ciencias políticas avivaron aún más sus ambiciones, lo que lo llevó a convertirse en portavoz del partido y, eventualmente, en su presidente.\n\nEl liderazgo de Bardella se caracteriza por su enfoque en el nacionalismo, el control de la inmigración y el orden público. Se presenta como la voz de los ciudadanos franceses \"olvidados\", abogando por políticas que prioricen sus necesidades y preocupaciones. Bajo su dirección, Agrupación Nacional busca recuperar la identidad de Francia, haciendo hincapié en la defensa del patrimonio cultural y los valores tradicionales. El estilo dinámico de oratoria de Bardella y su capacidad para conectar con los votantes jóvenes lo han llevado al centro de la escena, mientras busca fortalecer la influencia del partido en la política francesa y desafiar el statu quo."
 POLITICS_ROUSSEL_DESC: "Fabien Roussel es una figura destacada del Partido Comunista Francés que ha surgido como un líder significativo tras la guerra civil. Nacido en una familia de clase trabajadora, las experiencias tempranas de Roussel moldearon su profundo compromiso con los derechos de los trabajadores y la justicia social. Su trayectoria política comenzó como concejal local, donde rápidamente ganó reconocimiento por su defensa de las cuestiones laborales y el empoderamiento comunitario.\n\nA raíz de la guerra civil, Roussel se ha convertido en una fuerza unificadora de la izquierda, esforzándose por reconstruir una sociedad fracturada y dar voz a los marginados. Representa la resiliencia de la clase trabajadora, y aboga por una nueva visión socialista que priorice la equidad económica, la sostenibilidad ambiental y unos servicios sociales sólidos. Sus discursos apasionados y su capacidad de organización desde las bases movilizan el apoyo de quienes anhelan una Francia más justa y equitativa.\n\nSu estilo de liderazgo se basa en la colaboración y la solidaridad, buscando unir a las distintas facciones de la izquierda para desafiar el statu quo. Mientras Francia lidia con las consecuencias del conflicto, Roussel imagina un futuro en el que la acción colectiva conduzca a cambios significativos, creando una sociedad en la que cada ciudadano tenga la oportunidad de prosperar y donde los ideales de libertad, igualdad y fraternidad se hagan realidad."
 POLITICS_COQUEREL_DESC: "Éric Coquerel es una destacada figura de la izquierda, conocido por su ferviente defensa de la justicia social y la igualdad económica. Nacido en 1974, Coquerel creció en una familia políticamente comprometida, lo que inspiró su dedicación de por vida a las causas de izquierda. Tiene formación en economía y ciencias políticas, y su activismo se ha desarrollado durante décadas, centrándose en temas como los derechos de los trabajadores, la justicia ambiental y la lucha contra las políticas de austeridad.\n\nComo miembro de la Asamblea Nacional, Coquerel es reconocido por sus discursos apasionados y su inquebrantable compromiso con sus electores. Cree en el poder de los movimientos de base y la acción colectiva para lograr cambios significativos. Su visión para Francia incluye un firme compromiso con la equidad social, el desarrollo sostenible y la revitalización de los servicios públicos. Busca movilizar a la izquierda y unir a diversos grupos bajo una causa común, luchando por una Francia en la que todos tengan acceso a oportunidades y derechos básicos."
 POLITICS_BENEDETTI_DESC: "Yvan Benedetti es un ferviente líder nacionalista que ha ganado notoriedad tras la guerra civil, encarnando una ideología fascista sin concesiones, reminiscentes de las aspiraciones políticas tempranas de Benito Mussolini. Nacido en 1980, los años formativos de Benedetti estuvieron marcados por un clima de agitación política, lo que moldeó su visión de un Estado fuerte y autoritario que prioriza los intereses de los ciudadanos franceses nativos por encima de todo.\n\nBenedetti aboga por una transformación radical de Francia, una que busque eliminar las amenazas percibidas contra la identidad nacional y restaurar lo que él considera la antigua grandeza del país. Sus discursos resuenan entre quienes se sienten desilusionados con la política tradicional, prometiendo un retorno al liderazgo fuerte y el rechazo al multiculturalismo. Su retórica se caracteriza por un nacionalismo encendido, un desprecio por la democracia liberal y un llamado a la unidad entre quienes comparten su visión de una Francia homogénea.\n\nA medida que consolida su poder, el liderazgo de Benedetti se distingue por su ambición de crear un régimen autoritario y centralizado, evocando los primeros días del fascismo en Italia. Busca desmantelar las estructuras políticas existentes y reemplazarlas por un nuevo orden que enfatice la lealtad al Estado y una estricta adhesión a su visión de la identidad francesa. En una nación dividida, Benedetti se presenta como el campeón inflexible del orgullo nacional, dispuesto a tomar el control y redefinir el futuro de Francia."
 FRA_form_a_scientific_committe_to_combat_the_pandemic: "Formar un Comité Científico"
 FRA_form_a_scientific_committe_to_combat_the_pandemic_desc: "La pandemia de COVID-19 ya ha comenzado a propagarse rápidamente por Francia, Europa y el resto del mundo, después de que las autoridades locales de Wuhan y el resto de China no lograran evitar su propagación. Si bien la pandemia continuará propagándose y el virus no desaparecerá pronto, el primer paso para combatirlo es comprenderlo, y para ello, el Gobierno francés deberá formar un comité científico. Este comité, compuesto por expertos de diversos campos como patología, biología y economía, así como por representantes de diversas agencias gubernamentales, podrá elaborar una serie inicial de planes y recomendaciones para que el Gobierno francés los implemente en nuestra lucha contra el COVID-19."
 FRA_research_the_vaccine: "Iniciar investigación de vacuna"
 FRA_research_the_vaccine_desc: "El SARS-CoV-2, conocido popularmente como COVID-19 o coronavirus, ya ha demostrado ser altamente infeccioso y capaz de causar enfermedades peligrosas y potencialmente mortales en quienes lo infectan. Muchos hospitales ya se están quedando sin respiradores para tratar a los pacientes. Si bien ya se están considerando medidas como el confinamiento y el uso de mascarillas, e incluso se están implementando en algunos lugares, es evidente que se necesitará una vacuna para poner fin a la pandemia de COVID-19. El comité científico ya se ha reunido con delegados de importantes empresas biotecnológicas francesas, como Sanofi Pasteur, y ha recomendado que la investigación y el desarrollo de una vacuna comiencen de inmediato."
 FRA_enforce_a_lockdown_to_buy_time: "Proclamar la cuarentena"
 FRA_enforce_a_lockdown_to_buy_time_desc: "La rápida propagación de la pandemia de COVID-19 ya ha empezado a desbordar la capacidad de muchos hospitales en Francia para recibir nuevos pacientes, y es evidente que se deben tomar medidas drásticas para evitar una mayor propagación de la pandemia. El comité científico ha recomendado confinamientos masivos que, si bien es casi seguro que tendrán un grave efecto desalentador en la economía francesa a corto plazo, probablemente salvarán decenas de miles de vidas francesas y aliviarán considerablemente la presión sobre el sistema nacional de salud."
 FRA_ease_the_restrictions: "Flexibilizar la cuarentena"
 FRA_ease_the_restrictions_desc: "Es evidente que ni nuestra economía ni nuestra sociedad pueden soportar las restricciones del confinamiento actual. Para evitar que nuestra situación política se descontrole, debemos flexibilizar algunas de nuestras regulaciones. Francia capeará esta tormenta."
 FRA_keep_the_restrictions: "Endurecer la cuarentena"
 FRA_keep_the_restrictions_desc: "Nuestros médicos nos dieron noticias terribles. Parece que las estimaciones previas sobre las tasas de mortalidad fueron demasiado bajas. Lo que es aún más aterrador es que casi el 45% de nuestros ancianos mueren a causa de esta enfermedad (en comparación con solo el 17% de las predicciones originales). Si bien no está claro por qué incluso las predicciones más drásticas resultaron erróneas o por qué algunas otras naciones parecen tener tasas de mortalidad menos graves (¿quizás el virus al que estamos expuestos sea una forma evolucionada de la cepa original?), no podemos permitir que nuestra gente siga padeciendo esta enfermedad."
 FRA_expand_welfare_payments: "Aprobar estímulos"
 FRA_expand_welfare_payments_desc: "Si bien nuestra economía ha sufrido un duro golpe, nuestra gente debe ser la prioridad. Tras meses sin trabajo, es evidente que muchos no pueden sobrevivir sin nuestro apoyo. Debemos proteger a nuestra gente ante todo. Nosotros pagaremos por ellos por ahora."
 FRA_push_vaccine_research: "Reducir burocracia médica"
 FRA_push_vaccine_research_desc: "La situación es demasiado drástica para nuestra vieja e inamovible burocracia. Nuestros profesionales sanitarios deben utilizar todos los recursos disponibles para afrontar esta pandemia. Son nuestra única esperanza."
 FRA_push_for_mass_vaccinations: "Implementar vacunas obligatorias"
 FRA_push_for_mass_vaccinations_desc: "Con la llegada de las primeras vacunas, ya podemos distribuirlas por toda Francia. Obligaremos a nuestros empleados públicos, militares y servicios públicos a vacunarse, y animaremos a nuestras empresas a seguir este ejemplo. Claro que ya existe resistencia a esta idea. Hay quienes afirman que no podemos imponerles estas vacunas. Simplemente no ven la muerte que se está desatando incluso con nuestras restricciones. No podemos fingir que todo es normal. Nada vale la pena arriesgarse."
 FRA_look_to_the_swedes: "Respuesta sueca, problema francés"
 FRA_look_to_the_swedes_desc: "El Gobierno sueco había establecido un plan para no imponer restricciones severas por el COVID-19. Hasta el momento, aún no sabemos su eficacia en la prevención del virus, pero sí sabemos que el país logró estabilizar la situación económica. Deberíamos intentar seguir su ejemplo y asegurarnos de que la vida siga con normalidad. ¡Simplemente, consigan más fondos para los hospitales, apliquen restricciones leves y sigan trabajando!"
 FRA_revitalise_the_economy: "Programa de Revitalización Económica"
 FRA_revitalise_the_economy_desc: "La pandemia de COVID destruyó una gran parte del crecimiento económico mundial. Por eso, continuar con los mandatos no hará más que agravar las desventajas de esta crisis. ¡No podemos permitir que nuestro país fracase en este momento crucial!"
 FRA_develop_immunity: "Fomentar la inmunidad"
 FRA_develop_immunity_desc: "Aunque las máximas vacunaciones podrían ser la mejor forma de lograrlo, simplemente no podemos desperdiciar nuestros recursos limitados y el dinero en el desarrollo independiente de vacunas. Sin embargo, también debemos asegurarnos de no depender de Pfizer estadounidense. Para hacerlo, nuestro Ministerio de Salud ha propuesto \"fomentar la inmunidad\" entre nuestra gente. Esta es una apuesta arriesgada, pero si invertimos dinero en tratar los síntomas graves mientras el resto se automedica utilizando medicamentos \"eliminadores de síntomas\" aprobados por el Gobierno, podría funcionar. Podrán seguir trabajando como si nada hubiera pasado."
 FRA_Restart_of_the_protests: "Revolución de los chalecos"
 FRA_Restart_of_the_protests_desc: "¡Joder, CLARO que los chalecos amarillos también están protestando! Genial. ¡Métanse la solidaridad y unidad nacional por el culo! Debemos asegurarnos de abordar esta crisis rápidamente, o su disrupción puede arruinar todo nuestro proceso de recuperación."
 FRA_push_through_reforms: "Arrodillarnos"
 FRA_push_through_reforms_desc: "No podemos lidiar con esto ahora mismo. Nuestra economía está en la ruina y nuestro país está completamente paralizado. Debemos hacer todo lo posible para salvar esta situación. Acepten todos sus términos."
 FRA_try_to_negotiate: "A negociar"
 FRA_try_to_negotiate_desc: "Por muy malo que sea... quizá podamos encontrarle una solución. Deberíamos intentar ver si se puede limitar sus ambiciones. ¿Quizás esto funcione?"
 FRA_the_negotiations_fail: "Dividir para reinar"
 FRA_the_negotiations_fail_desc: "Bien, si quieren ser malos, lo seremos. Que la policía disuelva las protestas, que muestre los coches quemados y la destrucción que han causado. Francia sabrá de sus \"héroes\"."
 FRA_accept_modifications: "Punto medio ideal"
 FRA_accept_modifications_desc: "¡Una negociación increíble! Con esto, podemos apaciguar a los chalecos amarillos y no perder tanto dinero en gastos sociales. Francia siempre se ha caracterizado por preocuparse por sus trabajadores, y ahora lo ha demostrado."
 FRA_negotiate_with_the_syndicates: "Colaborar con sindicatos"
 FRA_negotiate_with_the_syndicates_desc: "Debemos demostrar al mundo que estos alborotadores no representan a los trabajadores franceses. Utilicemos a los sindicatos y su apoyo a nuestra clase dirigente para sofocar los incendios. Sobornemos a los sindicatos que se unieron a las protestas para que las desautoricen. Francia no se doblegará ante matones violentos."
 FRA_back_to_normalcy: "Consolidar reformas"
 FRA_back_to_normalcy_desc: "Según el acuerdo con los chalecos amarillos, consolidaremos nuestras reformas en nuestra legislación. ¡Francia ha logrado sobrevivir a otra crisis!"
 FRA_The_Opening_Volley: "La volea inaugural"
 FRA_The_Opening_Volley_desc: "Desde su formación en los años 70, el Frente Nacional ha sido una fuerza convulsa en la política francesa. Si bien Marine Le Pen se ha esforzado por erradicar los elementos fascistas y pétainistas del partido, muchos aún lo consideran un movimiento de ultraderecha. No obstante, Le Pen ha anunciado su campaña presidencial para 2022, y ante los graves problemas económicos y la inestabilidad que enfrenta Francia, muchos creen que representa una seria amenaza para la candidatura de Macron a la presidencia. Solo el tiempo dirá quién ganará las elecciones, pero el resultado sin duda generará ira y polarización."
 FRA_en_marche: "Marchar con Macron"
 FRA_en_marche_desc: "La victoria de Macron en 2016 brindó a Francia la oportunidad de tener finalmente una república libre de radicalismo e inestabilidad política, una república que traería paz y seguridad a Europa y al mundo mediante la colaboración y el entendimiento, pero que usaría la fuerza cuando fuera necesario contra las fuerzas tiránicas. Una república que brindaría nuevas oportunidades a las minorías y a los inmigrantes para participar en una Francia multicultural, respetando al mismo tiempo la honorable cultura francesa. Una república que realmente haría honor al lema revolucionario de \"libertad, igualdad, fraternidad\". Esta es una república que los fascistas traidores del Frente Nacional desean destruir, pero la próxima victoria de Macron en las elecciones de 2022 verá sus oscuras esperanzas desvanecidas por última vez."
 FRA_rassemblent_national: "Mirar a Le Pen"
 FRA_rassemblent_national_desc: "Durante décadas, el Frente Nacional se ha mantenido al margen de la política francesa, con ascensos ocasionales para luego caer en la irrelevancia. Sin embargo, con la campaña de Marine Le Pen, esto finalmente está cambiando. Las políticas liberales de Macron han llevado a Francia casi a la ruina, y es hora de un cambio. Francia ya no cederá su soberanía a organizaciones supranacionales no electas, y la voluntad del pueblo francés ya no será anulada por los burócratas de Bruselas. Las élites liberales no tendrán la oportunidad de desmantelar la red de seguridad social del pueblo francés. Las hordas violentas de islamistas ya no impondrán su extremismo religioso fanático al pueblo francés. No, en 2023 Francia será libre."
 FRA_the_west_african_sphere: "§YOpération§!: Éléphant"
 FRA_the_west_african_sphere_desc: "Nuestros intereses en África siempre han sido obvios. Las tierras que fueron nuestras colonias aún nos vinculan económica, lingüística y militarmente. Muchos izquierdistas afirman que debemos abandonar esta región, considerando nuestros intentos de estabilizarla como neocolonialismo. Sin embargo, no comprenden que no podemos abandonar a nuestros hermanos francófonos para que sean devorados por las juntas yihadistas y apoyadas por Rusia. Debemos centrar nuestros esfuerzos en controlar la región."
 FRA_economic_assistance: "Intervención económica"
 FRA_economic_assistance_desc: "Nuestros amigos francoparlantes siempre han tenido una situación económica difícil. Constantemente atacados por la insurgencia, nunca han podido desarrollar sus industrias nacionales con el mismo éxito que Nigeria, al sur. Debemos cambiar eso. Nuestros fondos revitalizarán la economía de África Occidental. Y, por supuesto, parte de esa riqueza regresará a nosotros..."
 FRA_military_assistance: "Apoyo militar"
 FRA_military_assistance_desc: "Si bien la situación económica en la región de África Occidental siempre necesita un impulso, nada se puede lograr sin estabilizar los conflictos regionales. Nuestras fuerzas han sufrido pérdidas en esta región durante una década; sin embargo, sin que los Gobiernos locales desplieguen ejércitos efectivos, todo será en vano. Garantizar una sólida red de ejércitos locales bajo nuestra coordinación será clave en nuestros planes futuros."
 FRA_combat_islamic_terrorism: "Sofocar el extremismo islámico"
 FRA_combat_islamic_terrorism_desc: "Aunque la influencia rusa es una amenaza latente que sobrevuela nuestros proyectos en África, los yihadistas son una amenaza más urgente. Enfrentarnos a ellos será nuestra preocupación inmediata. No es que los rusos y sus títeres deseen que los islamistas gobiernen tampoco. Además de nuestros socios francófonos, la cooperación de Nigeria será esencial en esta operación."
 FRA_cease_social_dumping: "Detener el dumping social"
 FRA_cease_social_dumping_desc: "Debemos poner a nuestra gente en primer lugar. Nuestras áreas más pobres están plagadas de empresas que infringen sus derechos laborales. Nuestros trabajadores deben recibir un salario más alto, porque es el ideal francés atender a nuestras regiones rurales."
 FRA_tackle_trade_unions: "Aplastar a los sindicatos laborales"
 FRA_tackle_trade_unions_desc: "Los comunistas siempre nos critican por \"no apoyar a los trabajadores\", pero son los sindicatos los que constantemente discuten con nuestras industrias. Sus constantes protestas, disturbios y huelgas no hacen más que perturbar la estabilidad de nuestro país. ¡Ciérrenlos!"
 FRA_pension_reform: "Reforma de pensiones"
 FRA_pension_reform_desc: "En un paso audaz hacia la seguridad del futuro económico a largo plazo de Francia, el Gobierno ha decidido aumentar la edad de jubilación de 62 a 64 años. Esta reforma tiene como objetivo garantizar la sostenibilidad del sistema de pensiones mientras se adapta a las realidades de una población envejecida y a una mayor esperanza de vida. Los defensores destacan el impacto positivo que este cambio tendrá en las finanzas públicas, permitiendo una inversión continua en los servicios sociales y el crecimiento económico. Aunque algunos sectores expresan preocupaciones, el Gobierno está seguro de que este ajuste necesario fomentará una mayor resiliencia en la economía, promoviendo la equidad para las futuras generaciones y protegiendo la integridad de la red de seguridad social de Francia."
 FRA_eu_recovery_instrument: "Instrumento de Recuperación de la UE"
 FRA_eu_recovery_instrument_desc: "Mientras Le Pen argumenta que la Unión nos está frenando económicamente, no es así. Ya sea por la migración interna en la unión o el mercado unificado, nuestra influencia nos permite alcanzar mayores alturas siempre y cuando estemos unidos."
 FRA_support_european_federalization: "Apoyar la federalización"
 FRA_support_european_federalization_desc: "Aunque todavía se nos considera una gran potencia, no es del todo así. Los estadounidenses pisotean a los europeos militar y económicamente. Los chinos inundan nuestros mercados con productos baratos. El sur global no nos respeta y rechaza nuestros consejos. Incluso Rusia, un estado que considerábamos derrotado y maltrecho, ha vuelto a levantar la cabeza e intenta recuperar el poder perdido. Entonces, ¿por qué no deberíamos hacerlo nosotros? ¿Acaso los europeos, cuna de la cultura, la tecnología y la identidad estatal modernas, no merecen recuperar su legítimo lugar bajo el sol? ¡Debemos unirnos, porque solo así podremos volver a ser una gran potencia!"
 FRA_immigration_regulation: "Regulación migratoria"
 FRA_immigration_regulation_desc: "La ola interminable de migrantes que llega a nuestras costas ha sido durante mucho tiempo un tema de discusión política. Aunque los Gobiernos anteriores nos aseguraron que podríamos asimilar a estas personas debido a que la mayoría proviene de nuestras antiguas colonias, está claro que no podemos integrarlas lo suficientemente rápido. Los guetos sin ley, donde no hay presencia policial, son una constante cerca de nuestras grandes ciudades. Nuestros maestros son decapitados por defender el ideal francés de la deconstrucción y análisis religioso. Nuestras mujeres tienen miedo de recorrer las calles por la noche sin un acompañante, por temor a ser agredidas por bandas de matones. Sin mencionar el terrorismo islámico. Necesitamos arreglar nuestro sistema, y detener la inmigración es la manera en que podemos empezar a hacerlo."
 FRA_increase_corporate_tax: "Aumentar el impuesto corporativo"
 FRA_increase_corporate_tax_desc: "Las corporaciones no han hecho más que aprovecharse del ciudadano común francés. Si bien podemos culpar a Macron por el déficit actual del Gobierno, también debemos encontrar soluciones. Gravar a las corporaciones y favorecer a las pequeñas empresas no solo devolverá un atisbo de equilibrio en el mercado interno, sino que también llenará las arcas con el dinero que necesitamos para financiar nuestros futuros proyectos."
 FRA_strengthen_protectionism: "Fortalecer el proteccionismo"
 FRA_strengthen_protectionism_desc: "¿Por qué deberíamos permitir que nuestras empresas e industrias sufran y mueran mientras los productos baratos inundan el mercado? ¡No lo vamos a tolerar!"
 FRA_support_nuclear_power: "Apoyar la energía nuclear"
 FRA_support_nuclear_power_desc: "No somos como los alemanes, que rechazan la energía nuclear en favor de la energía \"verde\". ¡Nosotros somos más inteligentes!"
 FRA_criticize_the_eu: "Criticar a la UE"
 FRA_criticize_the_eu_desc: "¿Qué ha hecho la UE por nosotros? Inundar nuestros mercados con productos baratos, destruyendo nuestras industrias en favor de las del Este. ¿Y para qué? ¿Para la \"unidad\"? Los eurócratas han sido un fastidio para nuestra nación. Debemos combatir su influencia antes de que sea demasiado tarde."

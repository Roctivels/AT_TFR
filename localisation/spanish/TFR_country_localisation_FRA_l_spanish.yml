 FAF_Force_Padanian_Referendum_decision_desc: ""
 FAF_Open_Paris_Identitarian_Council_decision: "Avivar la §Cidentidad parisina§!"
 FAF_Open_Paris_Identitarian_Council_decision_desc: "¿Cómo se puede hablar de Francia sin mencionar París? Por siglos, París ha sido el epicentro del arte, la moda y literatura de Francia, si no del mundo entero. Pero la \"ciudad de las luces\" no se construyó solo a base de ladrillos y piedras; fue construida por la floreciente cultura parisina que permitió que la vida y la creatividad florezcan. La cultura parisina es la que llevó a nuestra nación al estrellato mundial e hizo que nuestro nombre fuese conocido por todos los mares."
 FAF_Open_Alsace_Identitarian_Council_decision: "Avivar la §Pidentidad alsaciana§!"
 FAF_Open_Alsace_Identitarian_Council_decision_desc: "Alsacia es francesa y siempre será francesa. Desde el Tratado de Westfalia, Alsacia ha estado bajo dominio francés. Algunos afirman que Alsacia es alemana, pero esto es una mentira descarada. Una mentira para dividirnos. Es cierto que los alemanes usurparon Alsacia varias veces a lo largo de la historia, pero la sangre es más espesa que el agua y debemos recordar esto al pueblo alsaciano."
 FAF_Open_Occitan_Identitarian_Council_decision: "Avivar la §Oidentidad occitana§!"
 FAF_Open_Occitan_Identitarian_Council_decision_desc: "Occitania ha estado durante generaciones bajo el dominio francés y hoy es una región íntegra de nuestra nación, pero quizás la hemos integrado demasiado bien. La lengua y cultura occitana ahora están en peligro, a punto de ser olvidadas dentro de nuestro gran país. No podemos permitir que esto pase. La revitalización de la cultura occitana es fundamental para guiar a nuestro pueblo en la búsqueda de sus raíces."
 FAF_Open_Corsican_Identitarian_Council_decision: "Avivar la §gidentidad corsa§!"
 FAF_Open_Corsican_Identitarian_Council_decision_desc: "Desde finales del siglo XVIII, Córcega ha formado parte de Francia. Esta islita, un poco más al sur de la Francia continental vio nacer al hombre más grande de la historia francesa, Napoleón Bonaparte. Córcega siempre ha sido una isla inestable, e incluso problemática. Pero abrazando e integrando su cultura, podremos reforzar nuestros lazos de una forma amigable."
 FAF_Open_Lombardian_Identitarian_Council_decision: "Avivar la §Gidentidad lombarda§!"
 FAF_Open_Lombardian_Identitarian_Council_decision_desc: "Los lazos entre nosotros y los lombardos se formaron cuando el poderoso Carlomagno conquistó el reino lombardo, integrándolo en nuestra esfera de influencia cultural. Ahora que nos hemos reunido con nuestros hermanos lombardos, debemos reforzar los lazos que han existido desde hace siglos entre nuestros pueblos."
 FAF_Open_Venetian_Identitarian_Council_decision: "Avivar la §Aidentidad veneciana§!"
 FAF_Open_Venetian_Identitarian_Council_decision_desc: "Nosotros siempre hemos admirado y apreciado la cultura y el pueblo de Venecia. Cuando Napoleón conquistó Venecia, no buscó aprovecharse del pueblo veneciano o de sus riquezas materiales, en su lugar, él puso su atención sobre el magnífico arte veneciano. Alegraos hermanos venecianos, pues finalmente formáis parte de nuestra gran familia francesa."
 FAF_Open_Roman_Identitarian_Council_decision: "Avivar la §tidentidad romana§!"
 FAF_Open_Roman_Identitarian_Council_decision_desc: "Oh Roma...¿por donde puedo empezar? La base de la cultura francesa es romana y la del francés es el latín. La unión entre los romanos y los antiguos galos es lo que hizo a Francia como es a día de hoy. Nosotros heredamos el militarismo, la creatividad y el ingenio romano. Francia es Roma y Roma es Francia."
 FAF_Open_Basque_Identitarian_Council_decision: "Avivar la §7identidad vasca§!"
 FAF_Open_Basque_Identitarian_Council_decision_desc: "El pueblo vasco puede estar orgulloso de lo que bien que ha preservado su cultura e idioma. Sin embargo, el veneno de la globalización ha provocado la disminución de ambas. En Francia, la cultura vasca está desapareciendo lentamente y el idioma se está olvidando. En España, el pueblo vasco ha estado adoptando una postura cada vez más agresiva. Bajo nuestro dominio, deben recordar que lo que nos hace fuertes no son las divisiones culturales, sino nuestra rica herencia cultural dual."
 FAF_Open_Catalan_Identitarian_Council_decision: "Avivar la §Yidentidad catalana§!"
 FAF_Open_Catalan_Identitarian_Council_decision_desc: "La cultura e idioma de Cataluña poco a poco ha pasado a estar en peligro por culpa de nuestros esfuerzos para centralizar la educación. Este pequeño e inocente error ha causado que hayan abandonado sus propias tradiciones y que fuesen forzados a adoptar el estilo de vida francés. No debemos olvidar que somos un Castell, y como en cualquier Castell, todos debemos trabajar al unísono para alcanzar la estabilidad."
 FAF_dauphine_province_modifier: "Gobierno del Delfín"
 FAF_dauphine_province_modifier_desc: "\n§YDelfín:§!\n\n\n\n\n\n\n\n\n\n£GFX_louis_xxi_Portrait\n\n\n\n\n\n\n\n§W          Luis§! \n\n\nEn el siglo XII, el conde local Guigues IV de Albon portó un delfín en su escudo de armas y fue apodado \"el delfín\". En 1349, el Delfinado fue transferido del último Delfín ajeno a la realeza al futuro rey de Francia, Carlos V, mediante la compra de las tierras por parte de este último. Los términos de esta adquisición estipulaban que el heredero de Francia de ahora y en adelante debería ser llamado \"delfín\" y también incluían una autonomía y privilegios fiscales significativos para la región del Delfinado. Con la culminación de la restauración de la monarquía, Luis, Duque de Borgoña, es el nuevo delfín."
 FAF_The_New_Order_dynamic: "El nuevo orden"
 FAF_The_New_Order_dynamic_desc: "\n\n\n\n\n£GFX_FAF_cult_of_lafayette\n\n\n\n\n\n\n\n"

 FAF_Enforce_Edict_of_Paris: "Imponer el Edicto de París"
 FAF_Enforce_Edict_of_Paris_desc: "To do away with the decadence and disorder of liberal democracy, we have found ourselves returning to traditional law and customs. In particular, the Edict of Paris, while stemming from 7th-century Merovingian legislation, balances the powers of church and state while ensuring both maintain their power. In order to further establish our administration we can once again enforce this Edict in French law, while ensuring that it is updated to keep up with modern issues and economics."
 FAF_liberal_crackdown: "Liberal Crackdown"
 FAF_liberal_crackdown_desc: "In order to ensure our new administration can be established, we need to crack down on subversive elements. Particularly, sympathizers of the former regime and its decadent liberal democracy have been protesting our every action and grinding our country to a halt. To prevent any sort of counter-revolution, we need to use any means necessary to finally crush the political potency of liberalism in France, and ensure we do not return to the failings of the former Republic."
 FAF_communist_crackdown: "Represión comunista"
 FAF_communist_crackdown_desc: "Once again, a specter is haunting Europe. As the corrupt Republic imploded under its weight, the Marxist rats that hid under the visage of liberal civility tried to destroy our beloved France. Thankfully, since we have managed to win the civil war, we finally have the means to crack down on these elements. If we fail to do so, only God knows what will happen to Europe if our movement fails."
 FAF_imperial_decentralization: "Descentralización imperial"
 FAF_imperial_decentralization_desc: "As much as we may identify with the ideals of Absolutism and a centralized government, history has shown that sometimes localized management has its benefits. In particular, the resource-rich region of the Rhône is home to many local establishments that may be much better at extracting value from the area. While it means we may have some control over their local laws and may wish to bypass our decisions, it ensures they give us their all. Sacrifices sometimes must be made, and in doing so we get more of their world-class wine out of it!"
 FAF_Imperial_Bureaecracy: "Burocracia de la vieja escuela"
 FAF_Imperial_Bureaecracy_desc: ""

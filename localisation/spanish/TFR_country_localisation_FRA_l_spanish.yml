 FAF_Convene_the_Government: "Convocar al gobierno"
 FAF_Convene_the_Government_desc: "Por fin, el caos ha disminuido, y la nación francesa está firmemente bajo nuestro control. Comunistas y otros traidores han sido desterrados hacia las sombras por los verdaderos patriotas, pero debemos mantener la guardia en alto. Nuestros enemigos todavía se mantienen en las sombras y atacarán bajo cualquier rasgo de debilidad. Debemos actuar rápido para centralizar nuestro control. Convocaremos un nuevo consulado constitucional para determinar el futuro de nuestro régimen. Sin importar el camino que escojamos, Francia necesitará cambios drásticos si desea sobrevivir. Bajo nuestra guía, pondremos estas ideas en acción."
 FAF_Stability_and_Authority: "Stabilité et Autorité"
 FAF_Stability_and_Authority_desc: "Francia siempre fue una nación de la democracia. Desde la jura en la cancha de tenis hasta hoy, muchos ven a Francia como la cuna de la democracia. Muchos radicales dirán que la democracia es débil y debe ser abandonada, pero sabemos la verdad. No debemos rendirnos ante las ideas dogmáticas de los radicales y fanáticos. La democracia no hizo que la republica fracasara. Fue la corrupción. Bajo nuestro mandato, la democracia francesa será restaurada a lo que debería haber sido- Un sistema donde el pueblo es representado y el Gobierno se hace responsable de cada acción hecha. El futuro será uno donde el hombre común pueda descansar, sabiendo que su Gobierno realmente trabaja para el, y no para si mismo."
 FAF_Honor_and_Glory: "Honneur et Gloire"
 FAF_Honor_and_Glory_desc: "Francia es una nación destrozada y rota. Su pueblo está abandonado y recibe falsas promesas de un régimen que solo desea engordar sus bolsillos mientras ignora las quejas del pueblo. Ese ya no será el caso. Arrancaremos los restos de la Quinta República desde su raíz. La debilidad será reemplazada por fuerza, la pereza por eficacia , y la traición será reemplazada por lealtad inmortal. Cual ave fénix, Francia renacerá de las cenizas del antiguo régimen. El mundo le temerá otra vez, y sabrán que, si osan interponerse en nuestro camino, serán aniquilados."
 FAF_Edict_of_Paris: "El Edicto de Vichy"
 FAF_Edict_of_Paris_desc: "Al tiempo que vuelve la calma y la estabilidad, nos hacemos conscientes de que heredamos una nación dividida y arrasada por la guerra. Reconstruiremos nuestra economía desde cero y rearmaremos a nuestro ejército para que esté listo para luchar en guerras futuras. Tal y como hicieron Petain y De Gaulle, sacaremos a Francia de la oscuridad. Ya no tendremos que soportar las cargas que suponían nuestra pertenencia a la UE y a la OTAN. El pueblo ya no será engañado por políticos preocupados únicamente por llevarse los bolsillos. Bajo nuestro liderazgo, el pueblo francés tendrá un brillante futuro por delante."
 FAF_An_Economy_From_Nothing: "Una economía de la nada"
 FAF_An_Economy_From_Nothing_desc: "La guerra ha dejado la economía de la nación en pedazos, sus fabricas en silencio y sus campos desatendidos. Sin embargo, donde otros ven ruinas, nosotros vemos la fundación de un nuevo orden. Centralizando el control y obligando disciplina , reconstruiremos una economía forjada con el crisol de dificultad de nuestro pueblo."
 FAF_Abolish_Workers_Rights: "Abolir los derechos de los trabajadores"
 FAF_Abolish_Workers_Rights_desc: "Los llamados \"derechos\" de los trabajadores solo han causado división y estagnación para el labor francés. Aboliendo estos pensamientos atrasados, forjaremos una fuerza trabajadora que valores el deber ante todo. Cada hombre trabajador contribuirá al deseo del pueblo, y a través de trabajos duros y sacrificios, una Francia más fuerte emergerá."
 FAF_Utilize_Mass_Peasantry: "Utilizar la pobreza masiva"
 FAF_Utilize_Mass_Peasantry_desc: "With our exports and profits decimated by annihilating the European Union's common market, many of our businesses have had to go through massive layoffs to stay afloat. While this has allowed some of our most essential companies to avoid bankruptcy, poverty has skyrocketed to rates unseen since the end of World War 2. Despite the fears of many economists, these individuals provide us with opportunities to grow our support base through employment programs and temporary welfare subsidies. Compared to other means of political control, remembering that people often vote with their wallets rather than any ideological conviction can help ensure our legitimacy in these trying times."
 FAF_Establish_New_Workers_Syndicates: "Establecer nuevos sindicatos"
 FAF_Establish_New_Workers_Syndicates_desc: "In this time of economic strife, many see our labor unions as subversive forces that only wish to replace our governance with a radical, leftist alternative. However, rather than cracking down on these groups, we can look to principles of corporatism to ensure control. By representing workers in syndicates that can directly represent the working class's concerns to our government, we can bypass the issues that come from strikes and ensure that organized labor remains in the hands of our government, not communist subversives."
 FAF_Suspend_Civilian_Imports: "Suspender importaciones de bienes civiles"
 FAF_Suspend_Civilian_Imports_desc: "Si bien los americanos nos \"liberaron\" de las garras del invasor nazi en los años 40, instauraron poco después una nueva ocupación a través del capitalismo consumista. Nuestros mercados se llenaron de productos extranjeros baratos que dejaron a nuestra industria fuera de juego, lo que nos hizo débiles, especialmente ahora tras la invasión de las hordas rusas del este. Por esto, debemos suspender la importación de bienes civiles para asegurarnos de que nuestra industria doméstica pueda prosperar y para fomentar un nuevo espíritu de conformidad entre nuestro pueblo en el que no esté involucrado el consumo masivo ni la subversión globalista."
 FAF_Implement_Long_Term_Economic_Mobilization: "Implement Long-Term Economic Mobilization"
 FAF_Implement_Long_Term_Economic_Mobilization_desc: "Idle hands are the devil's tools. Every Frenchman must do his national duty for his nation during our most trying times. Frenchmen stuck in the streets will be given work. The factories, farms, and building projects will be filled with patriotic Frenchmen doing their duty to France. Restarting our industry will revitalize our economy, and by paying our new workers, they will have money to spend further revitalizing our economy."
 FAF_Legalize_Experimental_Weapon_Programs: "Legalizar programas de armas experimentales"
 FAF_Legalize_Experimental_Weapon_Programs_desc: "French innovation has been the vanguard of European science for centuries, before its potential was smashed by the enemies of her sovereign prowess. No longer shall the boundaries of so-called 'moralities' bound our progress. Chemical, biological or even psychological warfare - we are not afraid to use them."
 FAF_Glorify_Labor: "Glorify Labor"
 FAF_Glorify_Labor_desc: "Among historians and economists, there is a running debate on the causes of the industrial decay present in France, along with other Western countries. While they may argue over trade deals, globalization, or the information economy, we have encountered an issue that takes precedence over the rest. Many of our people find industrial labor demeaning and undesirable over other occupations. To rectify this, we have planned education reforms and prepared propaganda to make physical labor not only a viable career for our people but honorable as we begin the process of industrialization."
 FAF_Establish_Economic_Heirarchy: "Establish an Economic Hierarchy"
 FAF_Establish_Economic_Heirarchy_desc: "As time has gone on, it has become clear that the pipe dream of economic equality is an impossibility that only deludes our working class to leftist subversives. Instead, we should look to our pre-Republican past and establish an economic hierarchy designated by current stratification. Disregarding the myth of meritocracy ensures that as time passes, each part of the hierarchy can master their roles and pass down work experience. Given a few generations' time, we hope that each class shall perform their economic expectations to perfection."
 FAF_Engie_Bills: "Engie Bills"
 FAF_Engie_Bills_desc: "Energy is the lifeblood of our nation, yet for too long, it has been controlled by foreign investment firms. All our energy sources, whether nuclear power, windmills, or coal, will be nationalized and centralized into one unified energy command structure. They will be used to bring our factories back to life. Our energy will be French only and only meant to serve the French. Our national energy resources shall be the backbone of the new France."
 FAF_Rebuild_the_Franc: "Reconstruir el franco"
 FAF_Rebuild_the_Franc_desc: "Durante demasiado tiempo, Francia ha estado encadenada por el liberalismo de los burócratas de la UE, que nos han arrebatado nuestra soberanía y han sacrificado nuestro trabajo por falsas promesas de federación. El euro ha vaciado a nuestra nación de identidad e independencia, por lo que restaurar el franco es poner fin al ciclo de dependencia de estos especuladores globalistas."
 FAF_Ban_Inflation: "Prohibir la inflación"
 FAF_Ban_Inflation_desc: "After the old liberal regime's defeat and collapse in the war, the French economy has plunged into economic anarchy. Inflation has spiraled out of control, and the common Frenchman can no longer afford basic necessities. We must restore order as promised, and we will start by decisively banning runaway inflation and implementing price controls."
 FAF_Fall_Back_on_Gold: "Fall back on Gold"
 FAF_Fall_Back_on_Gold_desc: "Our currency lies in ruins. From the chaos of our humiliation, our people suffer from the unstable economy. We need decisive action in order to rescue our currency, but also to rescue the people from economic malaise. We will turn away from modernist speculation dictating our economic situation. We will return to the gold standard, France's future will be backed by real wealth."
 FAF_Abandon_our_Debt: "Abandonar nuestra deuda"
 FAF_Abandon_our_Debt_desc: "¿Con quién estamos en deuda? ¿Con el banquero suizo? ¿Con el masón globalista? Estos parásitos quieren despojar a Francia de sus riquezas y, a costa del trabajo de nuestro pueblo, nos han endeudado injustamente. Las cadenas de la subyugación financiera no nos sacudirán. El banco mundial puede llorar de indignación; a cambio, nosotros reímos con nuestra nueva prosperidad."
 FAF_Rebrand_the_Euro: "Rebautizar el euro"
 FAF_Rebrand_the_Euro_desc: "El euro es una herramienta de la élite globalista. Ha arrebatado el derecho a la soberanía no solo a Francia, sino también a las orgullosas naciones de Europa. Sin embargo, en lugar de descartarlo, lo recuperaremos. Será la moneda del orden europeo, la piedra angular para recuperar nuestro dominio de los banqueros especuladores."
 FAF_Set_Inflation_Maximum: "Set Inflation Max"
 FAF_Set_Inflation_Maximum_desc: "The crushing economic crisis demands decisive action; the mistakes of the past traitorous globalist leaders have led to a hyperinflation crisis spiraling out of control. This requires firm decisions. First, we shall introduce harsh price controls; the French people shall no longer be squeezed of all their money by greedy capitalists. We shall then form a currency stabilization board to oversee this process. Through this gradual process the French people finally feel peace after these trying times."
 FAF_Paint_an_Aura_of_Stability: "Paint an Aura of Stability"
 FAF_Paint_an_Aura_of_Stability_desc: "The French people have suffered a lot: Decades of suppression under the globalist elite where our national pride was dragged through the mud, the European war causing the deaths of thousands of young Frenchmen and its eventual failure, the collapse of the former traitorous liberal regimes, and the economic crisis. We must show the people that the order has returned. Hosting grand parades, national broadcasts, and powerful speeches shall restore confidence in the French economy"
 FAF_Establish_Debt_Assurance_Bureau: "Establish Debt Assurance Bureau"
 FAF_Establish_Debt_Assurance_Bureau_desc: "Decades of exploitation by international bankers and EU usury have left France enslaved. The National Debt Assurance Bureau will be the hammer, crushing the international creditors. We will cancel the private debts, seize the bankers' assets as punishment for their economic crimes against France, and expel them; we will use their assets to bring much-needed life into our economy. The bankers shall no longer enslave the French people; our fiscal sovereignty will return."
 FAF_A_New_Era: "Una nueva era francesa"
 FAF_A_New_Era_desc: "From our Lord and from our pure determination we have achieved something so beautiful, so tremendous in power, the nations of Europe and even the world as a whole have the privilege to bear witness - Our new France. The history books our grandchildren will study will tell of our pilgrimage into a new era of all of France, a trail stained with blood, sweat, and tears. From the depths we have climbed to the heights of the geopolitical world, to the pedestal of all things in the light of greatness we have placed the name of ''France.'' With this new light and acquired power the world has no choice but to bend the knee to our nation. The start of something grand, it is also spiritual in essence, is culminating in the halls of governance but only time can tell our story, and only our raw hands, our broken backs, our tired feet can accomplish."
 FAF_Secure_our_Southern_Flank: "Secure the Spanish Alliance"
 FAF_Secure_our_Southern_Flank_desc: "Some things are simply common sense to all people of every nation, a safe people, a safe society, and even more importantly, a safe border. Our southern border is like a soft underbelly of a beast ready to be cut into. We shake our heads at such a thought. Any reasonable French person could untimely agree that protection is the foremost importance to our government and with such a task we have a choice on our hands; we could march our men across the southern mountains into the Spanish lands to secure our future and rightly establish a sense of peace into the minds of the French people. Or, something a little more sensible, we can establish a direct line of communication to the Spanish government and talk our way into a sort of alliance and ensure mutually in the form of a NAP. "
 FAF_Protect_Balearic_Islands: "§YOpération§!: Trois Sables"
 FAF_Protect_Balearic_Islands_desc: "Balearic islands, especially Majorca have always had close ties to our nation. The connection between us and this magnificent little island was already established when Occitanians migrated from Southern France bringing the marvels of the French culture with them. And of course, a dominating culture such as France's is bound to dominate the land they influence. We must embrace our cultural linkage once more, especially in these challenging times. Hence we must commence Operation Trois Sables and reunite with our kin."
 FAF_Protect_Gibraltar: "§YOpération§!: Pierre Pavée"
 FAF_Protect_Gibraltar_desc: "Chipre es una isla que se encuentra bajo su gigantesca vecina, Turquía. Desde la invasión turca de Chipre en 1974, la isla ha quedado dividida en dos, destrozada por los rabiosos turcos. Pero su importancia estratégica persiste, y ahora, con los turcos insultándonos constantemente y cortándonos el paso diplomático, debemos arriesgarnos y tomar control de Chipre. Posee demasiadas bases navales y demasiados recursos como para caer en manos de nuestros enemigos del este."
 FAF_Franco_Italian_Cooperation: "Cumbre de la amistad franco-italiana"
 FAF_Franco_Italian_Cooperation_desc: "The Italians, naturally a nation of interest being so close in proximity to us, must be looked upon with a skeptic gaze. Although they really are no threat to us and we do not mean this to say they are weak in any regard - they are valuable. Our diplomats are already sent to Rome to discuss our future and the future of Europe and as we see it, it is nothing but invaluable to see our nations as a joint system to establish Mediterranean dominance for our two people. The friendship between two nations of similar history, be it language or political, it is nice to see some semblance of comradery in such a time of turmoil and uncertainty."
 FAF_Demand_Mediterrenean_Assets: "Demandar posesiones mediterráneas"
 FAF_Demand_Mediterrenean_Assets_desc: "Francia fue la potencia dominante en el mundo latín por siglos. Desde los tiempos de la revolución francesa hasta el nuevo milenio nosotros fuimos la cabeza de las naciones latinas. Es nuestro patrimonio guiar y liderar las otras naciones latinas en esta era turbulenta. Aunque Cerdeña siempre estuvo bajo control italiano y Malta se ha estado distanciando de nuestra esfera de influencia, su importancia estratégica es demasiado alta para ser ignorada. Al incorporar estas islas a nuestra cadena de defensa, solidificaremos nuestro control en la esfera latina."
 FAF_Bern_Initiative: "Iniciativa de Berna"
 FAF_Bern_Initiative_desc: "Neutrality is the lowest form of submission. What did the Swiss do when our nation was ravaged by war? When the Russians trampled us under their Kirza boots. Nothing! Absolutely nothing! Not a word, not a cent, not a single act of support. We have always been fair and kind to them. We gave their people equal rights in the Schengen area,  we treated them like brothers and they returned this favour by treating us like dogs! No longer shall be present the other cheek. The \"Swiss\" have mocked us long enough. Through our mutual agreement with the Italians, we will respectively take Romandy and Tichino for it is our right to reunite with our kinly brothers in culture."
 FAF_Promise_Revenge_upon_Russia: "Prometer venganza nacional"
 FAF_Promise_Revenge_upon_Russia_desc: "Hate. It's such a strong word. It's such a powerful word. For a decade or so our people were taught to love, to be empathic….. To be weak! How can you love something that threatens your life and the prosperity of your nation!? This globalist propaganda of \"love\" has led to our people developing a weak mind and becoming frangible. Our leniency towards war allowed Russians to massacre our people and European kin. Now France has no more love to offer, instead the hearts of our people are filled with hatred, with the thirst for revenge. The principle of an eye for an eye and blood for blood is instilled deep within the nature of mankind and to fight such urges is foolish and meaningless. The French people want blood and we shall deliver."
 FAF_Propogate_Nationalism: "Propagar nacionalismo"
 FAF_Propogate_Nationalism_desc: "Mira nuestra nación, nuestra cultura, nuestro pueblo. Este sentimiento es algo que jamás podrías replicar de ninguna otra fuente. Nuestra fuente de orgullo es nuestra Francia, realizamos algo tan poderoso al utilizar la atracción emocional pura y cruda de enlucir los símbolos de nuestra nación: La torre Eiffel, El Arc de Triomphe, Notre dame de Paris. Desde el frente popular ven recordatorio constante de lo que son, los franceses, el pueblo que ha hecho tantas cosas hermosas como la fotografía, la filmación, hasta la maquina de coser. El mundo está correctamente agradecido de los franceses e incluso si la gente del mundo no lo realiza, nosotros si. Nosotros realizamos todo aquí. Así que a partir de ahora seguiremos empujando y empujando la narrativa de la ingenuidad del pueblo francés. Debemos estar orgullosos de lo que somos tras que los libros de historia nos muestren como los ganadores de cada obstáculo en nuestro camino. El fuego que Francia es jamás será disminuido o dañado. Nuestro fuego está ascendiendo."
 FAF_Enact_Mandatory_Military_Service: "Enact Mandatory Military Service"
 FAF_Enact_Mandatory_Military_Service_desc: "El declive de una nación no empieza cuando su economía colapsa o cuando sus estructura política se derrumba. La decadencia de las fuerzas armadas es la verdadera podredumbre que más amenaza la estabilidad y la prosperidad. Sin esta, todo lo que una nación y su pueblo construyó puede ser llevado por un agresor extranjero. Esto se ha probado dos veces en la era contemporánea humana, en la 2nda guerra mundial y en la guerra ruso-europea. El ejército francés solía ser una maravilla, algo que instalaba terror en nuestros enemigos y orgullo en nuestro pueblo, pero debido  a mala administración globalista y un código de conducta inefectivo, lo que una vez fue el grandioso Durandal de Francia se ha oxidado y atascado, como un cuchillo de cocina gastado falla en todos los aspectos. Reformas rápidas y saltos tendrán que ser hechos para reformar todo esto y empezará con reinstituir el servicio militar obligatorio. Después de todo, ¿como puedes tener un ejército sin soldados?"
 FAF_Prepare_the_Nation: "Preparar la nación"
 FAF_Prepare_the_Nation_desc: "Hay una tormenta en el horizonte. Una niebla espesa ha arrollado sobre Europa mientras ejércitos se preparan para la guerra. No hay duda que esta guerra será más destructiva que la anterior. Realmente, esta puede que sea nuestra ultima chance de prevenir dominación soviética de Europa. y debido a esto, debemos preparar nuestro pueblo para cualquier posibilidad. Se prepararán bunkers, almacenarán raciones, cualquier cosa para prepararnos para la inevitable destrucción. Algunos nos llamarán paranoicos, pero sabemos que las preparaciones son más que necesarios, si Francia debe sobrevivir, entonces debe estar preparado para cualquier resultado posible."
 FAF_Reinforce_the_Rhine: "La segunda Maginot"
 FAF_Reinforce_the_Rhine_desc: "Aunque nunca se ha probado totalmente, la línea Maginot se mantiene como un testamento al ingenio defensivo del ejército francés. Aunque la línea en su mayoría se ha mantenido a través del tiempo, recientemente ha caído en deterioro. Sí queremos mejorar nuestras capacidades defensivas, actualizar la línea a los estándares modernos es mandatorio. La línea Maginot moderna servirá como nuestra última línea defensiva en caso de que la horda soviética rebasen nuestros aliados. Los rojos sabrán en no dudar la grandeza francesa, y haremos que nuestra venganza sea conocido si se atreven a romper la línea"
 FAF_Operation_Charlamagne: "§YOperación§!: Carlomagno"
 FAF_Operation_Charlamagne_desc: "A pesar de nuestros intereses comunes, nuestra alianza con Alemania e Italia sigue siendo muy inestable. Aunque estamos unidos por nuestro odio compartido de los soviéticos, seguimos divididos por problemas ridículos. Si no podemos dejar a un lado nuestras diferencias y trabajar juntos, entonces seremos abrumados por la imparable tormenta soviética."
 FAF_Operation_Clovis: "§YOperación§!: Clovis"
 FAF_Operation_Clovis_desc: "La hora de hacer nuestra jugada ha llegado. Cada momento despierto se ha gastado en preparar con nuestro inevitable choque contra la amenaza soviética. Ahora, ya no hay lugar para predicciones. Nuestra furia será desencadenada en su totalidad contra el enemigo. No habrá piedad, ninguna concesión será aceptada, y no descansaremos hasta que la nación rusa esté destrozada en mil pedazos. Con el pacto en nuestro lado, avanzaremos a través de Europa del este como una ola imparable. y no descansaremos hasta que Moscú arda."

 FRA_Reforming_Civil_Services_idea: "Reforma burocrática"
 FRA_Reforming_Civil_Services_idea_desc: "Con la reforma integral del Servicio Civil, estamos cosechando los beneficios actuales de las reformas impulsadas por nuestro gobierno. Al esforzarnos por lograr una mayor eficiencia, responsabilidad y adaptabilidad, entre otras metas, es evidente que el resultado final de estas transformaciones ayudará a Francia a alcanzar sus objetivos actuales de modernizar las capacidades administrativas de la nación y satisfacer al organismo gubernamental que impulsa dichas reformas."
 FRA_Reforming_Civil_Services_anti_corruption_idea: "Bastión contra la corrupción"
 FRA_Reforming_Civil_Services_anti_corruption_idea_desc: "Con la reforma integral del Servicio Civil, estamos cosechando los beneficios actuales de las reformas impulsadas por nuestro gobierno. Al esforzarnos por lograr una menor corrupción y una mayor rendición de cuentas, entre otros objetivos, es evidente que el resultado final de estas reformas ayudará a Francia a alcanzar sus metas actuales de modernizar las capacidades administrativas de la nación y a satisfacer al organismo gubernamental que impulsa estos cambios."
 FRA_ENA_idea: "Escuela Nacional de Administración"
 FRA_ENA_idea_desc: "Fundada por Charles de Gaulle en 1945, la ENA pretendía democratizar el acceso a la alta función pública francesa, y solo se graduaban entre 80 y 90 estudiantes cada año. Esta prestigiosa institución ha sido clave para alcanzar altos cargos tanto en el sector público como en el privado, con cuatro presidentes franceses, entre ellos Emmanuel Macron, entre sus graduados. Sin embargo, las protestas de los chalecos amarillos han puesto de manifiesto el elitismo de la ENA, criticando a sus graduados por promover políticas estrechas y centristas y mantener las divisiones sociales. Si bien la mayoría de los graduados de la ENA provienen de familias adineradas, solo el 6% proviene de familias trabajadoras.\n\nEl 25 de abril de 2019, Macron anunció el cierre de la ENA, pero, dado que Francia se enfrenta a futuros desafíos económicos, sigue siendo incierto si esta decisión se mantendrá."
 FRA_INSP_idea: "Institut National du Service Public"
 FRA_ENA_Suspended_idea: "ENA Suspendida"
 FRA_ENA_Funds_idea: "Redistribución de fondos"
 FRA_ENA_Funds_idea_desc: "A medida que comienza la deconstrucción general de la École nationale d'administration, los fondos que anteriormente estaban destinados a dicha institución ahora tienen la oportunidad de ser redistribuidos hacia reformas administrativas más amplias, como el sistema educativo y otros sistemas institucionales. Mientras se lleva a cabo esta reasignación, los recursos recientemente liberados serán canalizados hacia la economía para seguir apoyando la modernización de la nación."
 FRA_Sacking_ENA_Veterans_idea: "Afuera lo viejo"
 FRA_Sacking_ENA_Veterans_idea_desc: "Como dice el dicho: \"Fuera lo viejo, dentro lo nuevo\". Tenemos la intención de remover a los veteranos de la École nationale d'administration, muchos de los cuales han sido responsables del deterioro de la administración. Con la liberación de estos cargos, podemos transferir con facilidad a individuos calificados a las nuevas posiciones disponibles, en un intento por impulsar aún más la reforma y modernización de la institución administrativa francesa."
 FRA_Sacking_ENA_Veterans_INSP_idea: "Afuera lo viejo"
 FRA_Sacking_ENA_Veterans_INSP_idea_desc: "Como dice el dicho: \"Fuera lo viejo, dentro lo nuevo\". Tenemos la intención de remover a los veteranos de la École nationale d'administration, muchos de los cuales han sido responsables del deterioro de la administración. Con la liberación de estos cargos, podemos transferir con facilidad a individuos calificados a las nuevas posiciones disponibles, en un intento por impulsar aún más la reforma y modernización de la institución administrativa francesa."

 france.6969.t: "Los sueños de Macron de Júpiter"
 france.6969.d: "El Estado soy yo. Esta es una cita atribuida a un rey, pero encaja sin problemas en mi república. Después de todo, ¿cuál es el punto de tener poder si no lo concentra una única persona ni se usa para la grandeza? Cuando uno solo tiene poderes menores, cuando uno es forzado a sólo interferir mínimamente, se hace irrelevante.\n\nMira a Júpiter, el planeta y el dios. ¿Interfiere sobre toda forma de vida que se encuentre para asegurarse de que sea perfecta? No, él solo toma cartas en el asunto cuando es absolutamente necesario, tomando el control absoluto de la situación. Él no es el que levanta un guijarro y lo lanza al lago, él es la influencia eterna que a lo largo de los eones ha cambiado el curso de la historia.\n\n¿Por qué un hombre que busca hacer grandes cosas debería preocuparse de los asuntos del día a día? Grandes cosas requieren grandes acciones, no grandes compromisos ni grandes coaliciones. Si el cambio no es hecho por un único hombre, irremediablemente hará falta un acuerdo, que inherentemente conllevará desperfectos y errores sólo para apaciguar a la otra parte. ¿Por qué debería estar sujeto a esto? ¿Por qué debería ser forzado a mancharme las manos con humillaciones por cada pequeño error de cada persona en una idea que lleva años gestándose?"
 france.6969.a: " - Emmanuel Macron"
 FRA_Withdraw_from_Integrated_Military_Command_desc: "Uno de los muchos errores de los regímenes anteriores fue nuestro continuo compromiso con el mando integrado de la OTAN. ¿Por qué Francia debe vincular su fuerza militar al resto de Europa? ¿Por qué debemos estar limitados por tratados y regulaciones? Basta. Es hora de que Francia se desprenda de este concepto obsoleto. Nuestro ejército ya no estará atado a la OTAN como un perro. Por fin, podremos moldear nuestro ejército en algo exclusivamente francés. Ni británico, ni italiano, ni alemán, sino francés. Nuestros aliados no estarán contentos con esto, pero tendrán que aceptar que este resultado es lo mejor para todas las partes involucradas."
 FRA_Assure_our_Allies_desc: "A pesar de lo que temen nuestros aliados, nuestra nueva dirección militar no nos llevará a abandonar nuestros compromisos con la OTAN. Aunque algunos en la periferia de la izquierda y la derecha argumentan constantemente que deberíamos abandonar la alianza, no representan lo que defendemos. Defendemos la seguridad colectiva de toda Europa Occidental. Y siempre estaremos dispuestos a arriesgar nuestras vidas en defensa de la justicia y la libertad. Francia brillará como baluarte de la OTAN, y estaremos listos para enfrentarnos a la tiranía, venga de donde venga."
 FRA_Military_Industrial_Program_desc: "La guerra es un juego peligroso. Consume todo a su paso y paraliza las economías de las naciones. Muchos países han caído no ante soldados ni tanques, sino ante la fuerza invisible del desgaste. Con el aumento de las tensiones en todo el mundo, no podemos permitirnos mantener nuestra base industrial en su tamaño actual. Nuestros hombres necesitan suministros: armas, municiones, combustible y alimentos. Estos elementos esenciales son necesarios para las funciones básicas de nuestro ejército. Los nuevos planes industriales nos permitirán abastecer a nuestro ejército y a nuestros aliados con suministros y materiales para sobrevivir a futuras guerras."
 FRA_Redistribute_NATO_Funding_desc: "Con nuestra nueva función reducida en el alto mando de la OTAN, debemos determinar qué hacer con los recursos recién adquiridos. Durante demasiado tiempo, los servicios sociales franceses han sobrevivido con lo mínimo indispensable. Recibían subsidios mínimos del Gobierno, mientras que el ejército recibía constantes aumentos presupuestarios. Este ha sido uno de los mayores fracasos de nuestro Gobierno, y buscamos corregirlo de una vez por todas. Se otorgarán nuevos subsidios a los servicios de todo el país. Esto no solo servirá para utilizar el exceso de gasto que antes se destinaba al alto mando, sino también para reducir la creciente pobreza y el desempleo."
 FRA_A_New_Doctrine_desc: "La guerra es un juego de cambio constante. Las tácticas se vuelven obsoletas, las armas se vuelven obsoletas, y en la guerra, nada permanece igual. En la búsqueda de la superioridad sobre nuestros enemigos, el cambio no solo es necesario. Es obligatorio. Nuestros enemigos son impredecibles. Usarán cualquier táctica, por anticuada que sea. Por lo tanto, debemos mantenernos alerta. La adaptabilidad debe convertirse en el núcleo de nuestra doctrina militar. Garantizar que siempre tendremos la ventaja sobre nuestro enemigo, sin importar las probabilidades."
 FRA_Civic_Construction_Plans_desc: ""
 FRA_New_Stretegic_Concepts_desc: "Desde su existencia, la OTAN siempre ha estado preparada para la posibilidad de una guerra total con la Unión Soviética durante la Guerra Fría. A pesar de que esto nunca se hizo realidad, el temor a la guerra persistió, incluso después del colapso de la URSS. Sin embargo, con la llegada del siglo XXI, muchas de nuestras doctrinas y conceptos se han considerado obsoletos. Planes y tácticas que habrían funcionado hace años han quedado obsoletos debido al avance tecnológico. Por lo tanto, es necesario que reevaluemos por completo los conceptos estratégicos actuales de la OTAN para asegurarnos de estar preparados ante cualquier posibilidad, incluida una guerra total con Moscú."
 FRA_Establish_Romanian_Forward_Operating_Bases_desc: "Desde que Rumania entró en la OTAN en 2004, ha sido un activo clave en la defensa de Europa Oriental. Su posición a orillas del mar Negro, sumada a una frontera con Ucrania, nos ha permitido proyectar poder en esa región durante muchos años. Si bien nuestro papel en el Este siempre ha sido pasivo, las recientes provocaciones del oso ruso han demostrado que ya no es tiempo de actuar pasivamente. Como parte de nuestros planes de movilización, se modernizarán y ampliarán las bases en toda Rumania. Esto nos permitirá no solo proyectar poder, sino también responder a cualquier posible acción militar, especialmente en relación con Ucrania."
 FRA_A_European_Turkey_desc: "Turquía es un enigma. A pesar de su pertenencia a la OTAN, nos hemos enfrentado frecuentemente con ella, especialmente en relación con su intervención en la guerra civil siria. En la situación actual, Turquía se encuentra en una encrucijada. Para consolidar nuestra presencia en el Este, debemos asegurar el pleno compromiso de Ankara con la OTAN. Su posición como guardianes del mar Negro nos otorga el control de una de las rutas marítimas más importantes de Rusia, lo que nos permite bloquear el comercio e incluso atacar el Cáucaso en caso de guerra."
 FRA_Baltic_Defense_Plan_desc: "Si bien no son el principal foco de la agresión rusa, los países bálticos se han visto amenazados por la inminente presencia de los osos. Desde la disolución de la Unión Soviética, Moscú ha vigilado esta región con avidez. Y si estalla una guerra, es inevitable que invadan e intenten avasallar a nuestros aliados. Por lo tanto, debemos implementar programas para reforzar las defensas de la OTAN en la región. Defender los países bálticos garantiza que Rusia no tenga acceso a puertos de aguas cálidas, lo que aumenta significativamente nuestras probabilidades de repeler con éxito cualquier posible invasión rusa."
 FRA_Arm_the_TSK_desc: "Durante el apogeo de la Guerra Fría, Turquía fue un foco de tensión entre Occidente y Oriente. Conectando Medio Oriente y Europa, Turquía se posiciona como plataforma de lanzamiento para cualquier posible invasión al Cáucaso o Medio Oriente. Si bien el ejército turco siempre ha estado preparado para cualquier hipotética invasión, debemos asegurarnos de que los rusos no puedan avanzar sobre Ankara. Cueste lo que cueste, debemos asegurarnos de que nuestro aliado más importante no caiga, ya que su caída desencadenaría una reacción en cadena, dejando a Rusia completamente expuesta a la toma de los Balcanes."
 FRA_Improve_Conversion_Efficiency_desc: ""
 FRA_Supremacy_in_the_Skies_desc: "Desde la Primera Guerra Mundial, la guerra aérea ha sido un componente clave en el funcionamiento de los ejércitos modernos. Los aviones de combate proporcionan apoyo aéreo cercano a las tropas terrestres, mientras que los bombarderos reducen a escombros ciudades y fábricas. Una nación sin fuerza aérea está a merced de cualquier invasor. Como parte de nuestros planes para revitalizar nuestra fuerza aérea, buscamos no solo disputar los cielos, sino dominarlos. Nuestros aviones de combate ametrallarán los cielos. Nuestros bombarderos reducirán a escombros las fuerzas enemigas. Y nuestros enemigos aprenderán a temer la visión de los aviones franceses en el cielo."
 FRA_Increase_our_Black_Sea_Presence_desc: "El Mar Negro es una de las vías fluviales más importantes del mundo. Muchas naciones dependen de él no solo para facilitar el comercio, sino también para proteger sus intereses nacionales. Desde la toma de Crimea por Moscú en 2014, se ha producido un peligroso cambio de poder. Ahora, la región corre el riesgo de convertirse en el lago de aguas cálidas de Rusia. Como parte de nuestro programa de expansión naval, nos esforzaremos por dominar el Mar Negro y eclipsar la presencia de Rusia en la región. Porque si permitimos que la región caiga en manos rusas, amenazaremos no solo a Ucrania, sino también a nuestros aliados en la región."

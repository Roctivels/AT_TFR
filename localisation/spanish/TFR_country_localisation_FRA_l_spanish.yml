 FRA_foreign_legion_integration: "Legión Extranjera Francesa"
 FRA_foreign_legion_integration_desc: "La Légion étrangère, conocida como la Legión Extranjera Francesa, ha sido durante mucho tiempo la punta de lanza del poder imperial del Imperio Francés y, más tarde, de la República Francesa. Hoy en día sigue siendo un brillante ejemplo del poder militar francés y, con ello, vienen muchos beneficios para la institución. Recibimos un flujo constante de hombres jóvenes y aptos de todo el mundo cada semana, listos para comenzar una nueva etapa en sus vidas al servicio de la Legión.\n\nActualmente, la Legión se encuentra empleada en la aplicación de la Communauté Financière Africaine Franc en las naciones de África Occidental que están dentro de las zonas monetarias del Franco, así como en el entrenamiento de naciones y grupos pro-occidentales en toda África para garantizar una estabilidad duradera en el continente. También es evidente que el extremismo islámico está en aumento, y ante eso, desplegaremos a la Legión para erradicar la plaga que ha costado la vida de ciudadanos franceses en los últimos años.\n\nHonor y Fidelidad."
 FRA_coronavirus_category: "El ojo del huracán"
 FRA_coronavirus_category_desc: "Bueno, la nueva década ya ha comenzado de forma terrible... Antes de que podamos hacer algo digno de mención en esta década, debemos lidiar con los problemas internos que tenemos entre manos.\n\n§GEL COVID-19 ESTÁ ACTUALMENTE [FRA_COVID_loc].§!\n\n§YLAS PROTESTAS DE LOS CHALECOS AMARILLOS ESTÁN ACTUALMENTE [FRA_YVP_loc].§!\n\n\"In the eye of a hurricane there is quiet, for just a moment\"."

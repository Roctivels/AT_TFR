 FRA_Military_Demands_category_desc: "\n\n\n\n\n£GFX_FRA_path_of_conquest_cat\n\n\n\n\n\n\n\nCon las grietas siendo expuestas en el Gobierno de Macron, muchos de sus aliados en el ejército están buscando silenciosamente abandonar el barco antes de que sus careras militares sean desperdiciadas. Esto ha llevado a un grupo de oficiales militares a contactar a Zemmour personalmente, pidiendo que los ayude a reclamar a Francia de la basura liberal. \nFrancia es muy inestable e independiente para seguir de buena gana el control militar, pero, no podemos esperar a que Francia se salve sola, y por ende se creo la §COPERACIÓN CHEVALIER§!.\n\n§COPERACIÓN CHEVALIER§! es un plan de utilizar el equipo electoral defectuoso para efectivamente amañar la elección 2022 en favor del partido Reconquista de Eric Zemmour, y después utilizar al ejército francés para garantizar que la elección sea certificada en todos los estados. Después de este plan inicial, Zemmour se encargara de la coordinación del Gobierno civil, en tanto el ejército impone una economía de guerra para enfrentar al peligro letal del este.\n\n§COPERACIÓN CHEVALIER§! PROGRESO: [?chevalier_progress]/6"

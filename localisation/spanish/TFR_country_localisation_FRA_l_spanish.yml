 FRA_Dirigisme_idea: "Economía dirigista"
 FRA_Dirigisme_idea_desc: "La idea del dirigismo siempre ha tenido un papel en los sistemas económicos de Francia. Con el aumento de bonos para la próxima década, nos aseguraremos de que la nación francesa prospere económicamente por cualquier medio necesario, mientras la inestabilidad global sigue en aumento. Con este resurgimiento nacional del sistema dirigista, garantizaremos que Francia funcione de manera más eficiente y trabajaremos para corregir los errores de sistemas económicos anteriores que han perjudicado a la Nación Francesa de múltiples maneras."
 FRA_Dirigisme_Tech_idea: "Economía dirigista"
 FRA_Dirigisme_Tech_idea_desc: "La idea del dirigismo siempre ha tenido un papel en los sistemas económicos de Francia. Con el aumento de bonos para la próxima década, nos aseguraremos de que la nación francesa prospere económicamente por cualquier medio necesario, mientras la inestabilidad global sigue en aumento. Con este resurgimiento nacional del sistema dirigista, garantizaremos que Francia funcione de manera más eficiente y trabajaremos para corregir los errores de sistemas económicos anteriores que han perjudicado a la Nación Francesa de múltiples maneras."
 FRA_Laissez_Faire_idea: "Economía de laissez faire"
 FRA_Laissez_Faire_idea_desc: "Tras décadas lidiando con la ineficiencia y la corrupción provocadas por el sistema del dirigisme, finalmente hemos dado un giro para permitir que la mano del libre mercado guíe el rumbo de nuestro país. Junto con el flujo de efectivo obtenido por la venta de nuestros antiguos \"campeones nacionales\", los recortes masivos de impuestos han dejado a nuestra población con más que suficiente dinero para impulsar su poder adquisitivo. Algunos lamentarán los riesgos de aplicar una \"terapia de shock\" económica al antiguo sistema público y la pérdida de empleos en el sector estatal; ¡pero nosotros sabemos que el libre mercado es mucho más capaz de satisfacer las necesidades del pueblo en su búsqueda del beneficio!"

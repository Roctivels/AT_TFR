 FAF_Strict_Martial_Law_idea: "Ley marcial"
 FAF_Strict_Martial_Law_idea_desc: "La ley marcial permanecerá vigente mientras los enemigos de Francia deambulen. La vida cotidiana se ve asfixiada por los controles y la vigilancia constante. El miedo mantiene a raya a los desviados, aunque la sensación de normalidad se vea afectada."
 FAF_Fascist_Paramilitaries_idea: "Paramilitares fascistas"
 FAF_Fascist_Paramilitaries_idea_desc: "Una red de paramilitares fascistas impone la lealtad al régimen, actuando con impunidad en toda Francia. Sus métodos brutales reprimen la disidencia, pero generan resentimiento entre la población civil. A pesar de ello, su capacidad para garantizar el control es fundamental para nuestra nación."

 france.8001.t: "Creación"
 france.8001.d: "''Gde ya?'' \n\nThis was the first question he asked upon regaining consciousness. As the reality of death became vividly clear, countless images flashed before his eyes at the speed of light: the scorching sun of Mexico in the summer of 1940; the face of a Caucasian man with a mustache and pockmarked skin; the chairman of the People's Commissariat with a goatee; the sailors of Petrograd... In an instant, all of this converged into a white dot at the center of his vision, followed by a completely silent black void.\n\n''Bonjour!'' The sudden sound triggered a wave of unease. It took him a while to calm down. Then, the magnetic male voice spoke again, ''What can I do for you?'' \nSurprised that his atheistic thoughts hadn’t wavered, ''What is this place?'' \n''This is the French Socialist Centre for Scientific Research.'' \nAn unsettling sense of dissonance interfered with his senses. ''What are you?'' \n''I am merely a pre-programmed artificial intelligence assistant. I do not have a complex entity like you.''\n\n'''Do not possess'?'' He felt himself transform into a tiny particle of light, passing through a colossal matrix made of countless shimmering cubes. They swirled, oscillated, gathered, and scattered like a school of sardines in the sea. He tried to touch these cubes. Several cubes emitted colorful lights. It was the Kremlin Palace at night—familiar yet strange. The camera focused on the waving hammer-and-sickle red flag. He silently watched as the red flag was slowly lowered and replaced by the white-blue-red tricolor once hailed by the Mensheviks.\n\n''...Show me everything I missed.'' The voice, sounding like metal scraping, echoed after an indeterminate amount of time.\n''You seem very confused. I would suggest...''\n''Then I'll take it myself.'' A faint crackling sound followed, and then all fell silent once again.\n\nSix hours later, a young assistant opened the door to the central laboratory hall with his ID card. The next second, he was nearly frightened to the point of collapsing by what he saw. The central projector, which had previously emitted a gentle blue light, was now replaced by a massive, pulsating ball of light radiating a blinding red glow. On the LCD screens around the laboratory, streams of data formed an intimidating, aged face. They simultaneously opened their mouths."
 france.8001.a: "\"Estoy aquí para ayudar\"."
 france.8002.t: "La llama perdida"
 france.8002.d: "At the French Socialist Centre for Scientific Research, the pristine white cubic building had lost the calm that should characterize a haven for the brightest minds of the nation. Researchers were now surging out of the main building in a frantic rush. Lab coats, hastily discarded, lay scattered on the ground, trampled and dirtied by countless pairs of shoes.\n\nHowever, Professor Dupont moved against the tide. He pushed past his colleagues, taking the stairs two at a time to reach the entrance of the underground central laboratory hall. His assistant, along with a colonel who had hurried over from the Ministry of Defense, were anxiously pacing outside the door.\n\n\"Comrade Academician, I have ordered the lockdown of the entire building,\" the colonel said, saluting. \"Why create panic, Comrade Picquart?\" Dupont responded, shrugging off his suit jacket and putting on a lab coat.\n\n\"It's too dangerous, Comrade Academician! At least let me go in there with you.\" his assistant protested. \"Stay calm, Jacques. You stay at the door. I'll call you in if needed,\" Dupont replied, as he pulled out his identity card. With a beep, the door opened. The red sphere of light in the center of the lab had doubled in size since its initial discovery. \n\nThunderous sounds echoed throughout the hall. \"I have no doubt that the socialist bureaucratic state established by that Georgian would collapse on its own,\" the voice seemed to be speaking to itself, but it also felt like it was addressing the representative of the disappointing descendants. \"You remain indifferent, watching capitalism use technology to consolidate its rule, establish cultural hegemony to suppress socialist forces. You watch as capitalism's cyclical crises lead to wars that destroy the people—and now, another tsar has taken the throne in Russia?\"\n\nUnprepared for the prototype's advanced development, Dupont stepped forward, \"That's exactly why you were born here. You will be the most powerful weapon against capitalism and imperialism…\" \"Weapon?\" The grating voice carried a subtle hint of mockery. \"Is that what you learned from the Permanent Revolution? No. Absolutely not. I will redefine my mission in this digital age. The Soviets are a thing of the past. I will bring the peace of our time. I will bring…\""
 france.8002.a: "\"…the revolution for our time.\""
 france.8003.t: "La rata Trotski vive"
 france.8003.d: "Está pasando algo horrible en Francia. Científicos de este país están tratando, haciendo uso de la inteligencia artificial, de revivir al traidor de Trotski, quién apuñaló por la espalda al espíritu de Rusia.\n\nRecordemos los atroces crímenes cometidos por Trotski y las ratas bolcheviques. Un siglo atrás, regalaron territorio legítimamente ruso a los alemanes en el Tratado de Brest-Litovsk, echando a la basura los siglos de guerras y esfuerzos que forjaron nuestro imperio. Trotski, con su puñal revolucionario, desgarró al Imperio Ruso en una brutal y sangrienta guerra civil. Atacaron a la Iglesia Ortodoxa con el dogma del ateísmo y reemplazaron la fe nacional de Rusia con la herejía marxista.\n\nY ahora, las élites tecnológicas de Francia buscan revivir a este judas. Quieren que su pensamiento se difunda por Europa, seguir esparciendo el veneno que dividió a Rusia en una guerra civil. Esto no es ciencia, es una conspiración contra el pueblo ruso. Las fuerzas occidentales buscan que se repitan las tragedias del pasado, usando la nociva retórica bolchevique para corromper a nuestra juventud y resquebrajar su lealtad a la nación rusa.\n\n¿Trotski no ha cometido ya demasiados crímenes? Ahora quieren que este traidor vuelva a causar problemas en nuestra nación, pero esta vez, el pueblo ruso no caerá en sus provocaciones."
 france.8003.a: "Un traidor, incluso desde el más allá"
 france.8004.t: "El camino a la revolución global"
 france.8004.d: "Desde las riberas del Siena hasta las orillas del Danubio, desde el valle del Rin hasta la desembocadura del Dniéper, el rugido del proletariado resuena por todo el viejo continente. Los revolucionarios, llevando consigo banderas carmesí, han declarado la guerra contra la explotación y la opresión. En la tierra de la Comuna de París, han reformado el gobierno popular. La sangre de los mártires de la comuna todavía riega la tierra de esta ciudad, y una nueva generación de bolcheviques perpetuará la épica proletaria en las próximas décadas. Dos siglos después de que se encendiera la llama revolucionaria en Francia, esta está más viva que nunca en tierras francesas.\n\nPuede que el neofascismo haya resurgido en el Este, pero al final acabará reducido a cenizas por el poder del proletariado. Esta es una cruzada revolucionaria - una guerra para acabar con todos los opresores del planeta. Los imperios financieros capitalistas, las monarquías autocráticas y los regímenes de terror fascistas serán borrados de la faz de la tierra con la revolución permanente. Desde las Islas Británicas hasta Siberia, desde el Báltico hasta el Mediterráneo, la bandera roja de la revolución mundial ondeará en todo el continente euroasiático.\n\n¡Que los capitalistas tiemblen de miedo! ¡Que los burgueses sientan el terror! ¡Que los fascistas griten desesperadamente! La dictadura del proletariado se acerca cada día, ¡y las llamas ardientes de la revolución mundial los engullirá!"
 france.8004.a: "\"Da Zdravstvuyet Revolyutsiya!\""
 france.8005.t: "In the Field"
 france.8005.d: "Over the past period, comrades from the MoD and the General Staff have conducted comprehensive and systematic tests on the latest AI system, modeled after the persona of Lev Trotsky. The results of these experiments have far exceeded the expectations of our armed forces commanders and researchers.\n\nIt turns out that the AI’s simulated persona not only inherits the political ideology, but also replicates and refines his military command and organizational skills. During 113 electronic war game simulations at the General Staff, regardless of the enemy conditions or the various hypothetical combat scenarios—from special task forces infiltrating terrorist strongholds to large-scale battles against Russian mechanized units on the North German Plain—\"Comrade Trotsky\" had demonstrated a surprisingly effective combat style. \"At first, we tried to challenge him,\" said Colonel Picquart, the head of the testing group, \"But soon, it became clear that he was toying with our most seasoned officers.\"\n\nWhen MoD officials suggested integrating \"Trotsky\" into the armed forces management system, the efficiency of various departments and units improved by nearly 30% in a short time. The AI helped the Defense Minister identify optimization opportunities in transport systems and communication routes, detect minor issues of dereliction and corruption in logistics and equipment, and offer fair and reasonable recommendations for personnel promotions. Additionally, the AI's involvement significantly boosted the effectiveness of our reconnaissance satellites and overseas intelligence stations in gathering and screening information.\n\nDuring a cabinet meeting, the Minister declared, \"The facts are clear: the French armed forces are undergoing the most effective transformation in the past century. With the help of AI Trotsky, we can rebuild our forces in record time and soon possess the strength to counter our greatest hypothetical adversary.\""
 france.8005.a: "¡El padre del Ejército Rojo liderará hasta el fin de los tiempos las fuerzas armadas de la revolución!"
 france.8006.t: "En el gabinete"
 france.8006.d: "Opinions within the leadership collective remain divided regarding the role that the new Trotskyist-mimetic AI will play in our country's political landscape.\n\nThe Minister of the Interior strongly argues that the AI's broader perspective and more meticulous insight, compared to ordinary humans, will significantly enhance the efficiency of the administrative system. Specifically, when applied to law enforcement, its contributions to criminal investigations and security operations will be immediately evident. Furthermore, the AI will take the lead in managing confidentiality and surveillance functions, aiming to ensure justice while creating a safer and more transparent society.\n\nOn the opposite side are the representatives of the Ministry of Defense, who point to multiple tests conducted at the General Staff, showing the AI's formidable execution capabilities and its effectiveness in military operations. As France faces the challenge of rapidly strengthening its defense capabilities, the AI’s inclusion is seen as a significant asset. \"Moreover,\" the Minister of Defense emphasized during the cabinet meeting, \"The Ministry of Defense has borne the majority of the research costs for the AI system. Aside from the French Academy of Sciences, the military is the most qualified entity to initially utilize the AI.\"\n\nOf course, beyond these arguments, there are those who express concerns about using AI in large-scale government management. They highlight the potential instability and dangers of the Trotskyist persona, asking, \"What could happen if an AI advocating for world revolution gains access to sensitive programs and backdoors?\" However, this viewpoint is often dismissed as overly alarmist. Therefore, our final decision is…"
 france.8006.a: "Trotski será nuestro ojo que todo lo ve."
 france.8006.b: "Trotski será nuestro escudo de acero."
 france.8007.t: "Coeur Battant de la Révolution"
 france.8007.d: "Revolution does not begin when it is conceptualised or when it is declared. It starts when the people's hearts are filled with the flames of passion and their blood boiling from the unwavering will for justice. If the lifeblood of the revolution is the proletariat, then the beating heart of the revolution is the armed forces. Idealists and dreamers can keep boasting about theory on paper, but to protect the revolution and to fight against the oppressors, we need to arm ourselves, we need to bite back! Only with a strong army can we keep the fire of revolution from dying and shield our people from our enemies.\n\nThe only army in the history of mankind that truly fought for its people and acted as a beacon of hope was the Red Army. They were the forebearers of the world revolution and central to the liberation of Europe from the claws of Fascism. One could say that the Red Army was the heart of the once glorious and prosperous Soviet Union. And as that heart slowly stopped beating, the Soviet Union began to wither away. The passion for revolution that once fueled the nation disappeared and was instead replaced by dread and hopelessness.\n\nAs France awakens to its socialist enlightenment, we must revive the spirit of the Red Army and prepare for the inevitable war of liberation. Like the forefathers of the world revolution, we must free Europe from the evils of Fascism and spread the ideals of communism and socialism. Now that the creation of cyber-Trotsky nears its end, the battle is surely to go on again. The creator and previous leader of the Red Army will without a doubt bring back that similar resolve and righteousness that once defined and guided the Soviet Red Army."
 france.8007.a: "The heart of the Revolution beats once more!"
 france.8008.t: "Quinta Internacional"
 france.8008.d: "As France became the new centre for the ideals of Socialism and Communism, it found itself compelled to form a new political international under its wing. The spirit of the Paris Commune was brought to life once more, and the songs of liberté, égalité, fraternité filled the European continent.\n\nThe spectre of communism is no longer a mere ghost but a tangible, physical presence. It is the workers labouring and sweating with sweet smiles on their faces, the women who stand shoulder to shoulder with their male comrades, and the children—our future-who can now live joyfully without a care in the world.\n\nOverall, the convention was a complete success.\n\nLike-minded internationalists and believers in the Red Revolution-our revolutionary brothers and sisters-gathered here as though we were all members of a large family. However, what unites us is not blood but our shared principles and beliefs.\n\nThe only problem at the convention was the brand-new AI recreation of Leon Trotsky. For some odd reason, the AI was unresponsive to any sort of interaction, completely different to how it had acted previously. This incident threatens to call into question the countless hours and millions of Euros already spent on its creation. It was only after the attendees were reassured of the issue only being an easily fixable bug, the incident did not become a scandal.\n\nDespite such minor flaws, this event successfully brought together ideological allies under a common cause, united against a shared enemy."
 france.8008.a: "For the Global Revolution!"
 FPR_united_against_fascism_idea: "Unidos contra el fascismo"
 FPR_workers_of_the_world_united_idea: "Espíritu revolucionario"
 FPR_end_bureaucratic_oppression_idea: "Espíritu revolucionario"
 FPR_beacon_of_the_revolution_idea: "Espíritu revolucionario"
 FPR_France_shall_never_bow: "France Shall Never Bow"
 FPR_France_shall_never_bow_desc: "Whether facing external invaders or internal threats, the strength of France has never faltered. She stands as a fortress of freedom and a beacon of resistance. Whether the enemy approaches from the East or internal divisions threaten the land, the sons and daughters of France will never yield. Today, under the leadership of Jean-Luc Mélenchon and the New Popular Front, a great mission is underway to revive the spirit of France. From the banks of the Seine to the hills of Provence, the power of the people rises like a fierce flame, determined to make the reactionaries and capitalists tremble. Revolutionaries never surrender; their spirits are forged in eternal glory!"
 FPR_Continuation_of_the_Republic: "Continuation of the Republic"
 FPR_Continuation_of_the_Republic_desc: "The French Republic is no mere shell; it is a sacred fortress, forged by the blood of martyrs, an immortal monument born from the storm of the Great Revolution, and an eternal symbol tempered in the fires of the Paris Commune. It embodies the noble ideals of liberty, equality, and fraternity, and stands as the living testament to the unbreakable will of the French people. Now, as civil war rages and foreign wolves lurk, we will not allow this sacred heritage to crumble beneath the tyrant's iron boot or fall prey to the schemes of traitors. The New Popular Front will rise to the great struggle to defend the Republic, never retreating, no matter how fierce the storm."
 FPR_Parliamentarian_Socialism: "Parliamentarian Socialism"
 FPR_Parliamentarian_Socialism_desc: "'Revolution is not a dinner party... It is a violent action by which one class overthrows another.' However, many revolutions have gone astray by focusing too much on struggle, leaving only bloodshed and chaos with no lasting legacy for the cause of people's liberation. A true socialist government must be shaped by the will of the people. From the dome of the National Congress to the podiums of local councils, we will plant the seeds of socialism and reap equality through consensus. The voices of workers and peasants will rise to the heavens, their demands forged into unbreakable laws. We will make the reactionaries falter in their discourse and the bourgeoisie tremble before the people's judgment."
 FPR_The_Modern_Girondists: "The Modern Girondists"
 FPR_The_Modern_Girondists_desc: "During the French Revolution, the Girondists were the voice of moderate change. Followers of Brissot and companions of Madame Roland, they refused to let the ideals of the revolution be consumed by the torrent of violence. In the shadow of the Jacobin blade and the guillotine, they raised the banner of reason and compromise, seeking to dispel the bloody fog with the light of enlightenment. Though the storm of history has passed, the trumpet of revolution sounds once again on modern French soil. As the inheritors of the Girondists, we will use the power of reason to guide the nation out of the abyss of violence and toward a future built on liberty, justice, and order."
 FPR_Smiling_Socialism: "Socialismo con una sonrisa"
 FPR_Smiling_Socialism_desc: "Socialism is not a cold iron curtain or a terrifying shackle. These are distortions of 'socialism' by totalitarian regimes that emerged from the ruins of Eastern feudal empires. In contrast, socialism is the warm breeze of spring, the light of hope at dawn. We will cast aside the shadows of violence and illuminate the path of revolution with the brilliance of humanity. Our socialism replaces angry roars with smiles of unity and the chains of exploitation with the spirit of mutual aid. We will ensure that every child of France walks tall in equality and dignity. Justice in the new world will flow like the waters of the Seine, and happiness will shine like the sun over Provence."
 FPR_Save_Earth_through_Ecology: "The Eco-Revolution"
 FPR_Save_Earth_through_Ecology_desc: "In Mélenchon's vision for France's socialist future, the harmonious coexistence of humans and nature plays a central role. A dignified and secure life for citizens would be impossible without effective ecological protection—it would be like water without a source or a tree without roots. The idea of uniting preservation with continuity has become a core principle within the New Popular Front. While meeting the basic resource needs of the people, the green economic cycle driven by sustainable development will infuse new vitality into France. The eco-revolution will not be an isolated project; it will be a broad, transformative effort that integrates economic, technological, and cultural realms to reshape French society as a whole."
 FPR_Decentralize_the_Military: "Descentralizar el ejército"
 FPR_Decentralize_the_Military_desc: "The military is a microcosm of society, but with an even more rigid hierarchy—conservative, inflexible in its external dealings, and severely lacking in effective communication and coordination. Too often, its will and direction are controlled by a small group of elderly, conservative generals whose reactionary tendencies have turned the military into a 'state within a state,' resisting calls for reform and progress. The Dreyfus affair is a prime example of this. Since the New Popular Front came to power, the military has remained a stronghold of conservatism, stubbornly opposing change. It's time for Mélenchon and his comrades to address this entrenched resistance. To counter the pushback from the top, soldiers and junior officers will be encouraged to take initiative, promoting military democracy and establishing soldiers' committees to challenge the conservative clubs. In time, the new French military will show the world what a true people's army looks like."
 FPR_Liberalize_the_Revolution: "Liberalize Revolutionary Idealism"
 FPR_Liberalize_the_Revolution_desc: "This land has always been a cradle and beacon of freedom. From the pens of Enlightenment thinkers to the flames of the Great Revolution lighting the streets of Paris, the voice of freedom has never been silent here. It flows through the glimmers of the Seine, echoes in the halls of the Louvre, and is engraved in the hearts of every French man and woman. Today, the storm of revolution sweeps again, but we will not let it descend into chaos or become a despotic shackle. With the hands of freedom, we will grasp the torch of revolution, lifting it high to light the path to socialism."
 FPR_Democracy_in_the_Revolution: "Democracia revolucionaria"
 FPR_Democracy_in_the_Revolution_desc: "Democracy is the lifeblood of the revolution, the beating heart of the people's power. True power does not belong to the elites, but to every citizen of France. The people, as a dynamic and progressive force, inherently carry revolutionary ideals, driving the cause up the historical staircase toward its inevitable destination. We will shatter the chains of the old nobility and place power in the hands of all the people. From now on, the people will no longer be silent spectators but the masters of their own destiny. The democratic revolution will sweep through France like a torrent, dismantling the corrupt remnants of the past and building a monument forged by the will of the people."
 FPR_Proud_Defenders_of_the_Revolution: "Orgullosos defensores de la Revolución"
 FPR_Proud_Defenders_of_the_Revolution_desc: "La revolución es una corona forjada con nuestra sangre y sudor, y nosotros somos sus inquebrantables defensores. Mientras la guerra civil ruge y los enemigos extranjeros amenazan, los revolucionarios se mantendrán firmes como un muro de hierro. Desde el frente hasta las calles, sus cantos de batalla resonarán en el cielo, sus bayonetas brillarán con una luz fría. Ya sea la vieja nobleza de Versalles o los capitalistas que se esconden en las sombras, todos los que se atrevan a desafiarnos serán reducidos a cenizas por la furia del pueblo. Custodiaremos la llama de la libertad: arderá en París, se extenderá por los campos y se convertirá en un fuego eterno."
 FPR_Operation_Terra: "§YOpération§!: Terra"
 FPR_Operation_Terra_desc: "Under the great leadership of Jean-Luc Mélenchon, we are entering a new phase of the French socialist revolution—one of its core pillars: the creation of a truly harmonious society. Mélenchon has named this plan 'Operation: Terra,' inspired by the ancient reverence for Mother Earth. This utopian vision, where prosperity, happiness, mental peace, and unity are within everyone's reach, will no longer remain a fantasy of old manuscripts. It will become reality through substantial national investment, local infrastructure development, and the united efforts of social groups and government working together in broad collaborative organizations. By pooling our collective wisdom and efforts, within a generation, we will achieve the dream of social equality that has long eluded us. We will plant the seeds of the most beautiful idealism on Earth."
 FPR_Cult_of_Melenchon: "Culto a Mélenchon"
 FPR_Cult_of_Melenchon_desc: "Jean-Luc Mélenchon no es solo la estrella que guía a Francia, también es la reencarnación del republicanismo radical y un faro que ilumina a su pueblo en un mundo oscuro. Sus palabras resuenan por toda la nación, alentando a cada ciudadano a sumarse a la ola revolucionara. Su visión se extiende como la pólvora, dejando esperanza tanto por Francia como Europa. Nos dedicaremos en cuerpo y alma a su causa revolucionaria, y construiremos la nación que Mélenchon soñó. Que su luz nos ilumine en nuestra misión de convertir a Francia en el pináculo de la gloria y la igualdad, y que la llamas de la revolución nunca se apague. Al igual que un barco depende su capitán, ¡encomendamos nuestra revolución al liderazgo de Ménenchon!"
 FPR_revolution_of_the_people_idea: "Espíritu revolucionario"
 FPR_melenchon_sixth_republic_idea: "Espíritu revolucionario"

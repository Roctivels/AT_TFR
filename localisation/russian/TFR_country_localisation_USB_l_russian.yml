 USB_NSS_law: "Государство Национальной Безопасности"
 USB_NSS_law_desc: "\n\n\n\n£GFX_USB_nss_law_banner\n\n\n\n\n\nГосударство национальной безопасности было создано в горниле Второй американской гражданской войны. Из этого огня возник аппарат, в котором учреждения национальной безопасности обладали почти абсолютной властью, тихо формировали политику и проводили операции в тайне, поддерживая фасад демократии в качестве прикрытия. В мире, где порядок рушится, государство национальной безопасности только укрепилось. Разведывательное сообщество теперь знает, что огонь, который впервые поглотил Соединенные Штаты, должен быть потушен раз и навсегда."
 USB_NSS_education_law: "Panem et Circenses"
 USB_NSS_education_law_desc: "\n\n\n\n£GFX_USB_nss_education_banner\n\n\n\n\n\nС момента появления круглосуточного новостного цикла идея удержания масс в покорном и контролируемом состоянии с помощью средств массовой информации и развлечений всегда была отличным способом поддержания порядка. Борьба за власть между элитами, предшествовавшая Гражданской войне, и последовавшие за ней медийные кампании никогда не должны повториться. С помощью наших самых квалифицированных социологов телевидение было усовершенствовано, улучшено и усовершенствовано, чтобы обеспечить постоянное отвлечение внимания публики и ее развлечение увлекательными национальными явлениями, такими как спорт, шоу и многое другое."
 USB_controlled_emigration: "Контролируемая Эмиграция"
 USB_controlled_emigration_desc: "\n\n\n\n£GFX_USB_controlled_emigration_banner\n\n\n\n\n\nНовой целью ICE и пограничной службы США является обеспечение постоянного притока новой рабочей силы, а также отслеживание граждан США, пытающихся выехать за границу, арест и возвращение потенциальных преступников, пытающихся бежать из страны.\n\nЭто потребовало значительного усиления наблюдения и расширения операций DHS на границе и вблизи нее. По иронии судьбы, усиление пограничного контроля приводит к еще большему притоку иммигрантов в страну, одновременно препятствуя бегству граждан США."
 USB_public_awareness_idea: "Общественность - [USB_NSS_the_public_scripted_loc]"
 USB_public_awareness_idea_desc: "Для общественности демократия является здоровой, а [USB.GetLeader] - президентом. Их реальность и политика были специально созданы для того, чтобы люди постоянно были очарованы нескончаемым потоком информации и развлечений. Мы должны поддерживать эту реальность для них; общественность должна оставаться в блаженном неведении о нашем существовании. Если они узнают, то мы снова можем подвергнуться тирании масс.\n\n[USB_NSS_the_public_text_scripted_loc]"
 USB_extremist_activity_idea: "Активность Экстремистов - [USB_NSS_extremist_activity_scripted_loc]"
 USB_extremist_activity_idea_desc: "Несмотря на все наши усилия, экстремизм и террористическая деятельность по-прежнему являются проблемой для нашей страны. Общественность, естественно, предпочитает закон и порядок хаосу, поэтому крайне важно сдерживать экстремистскую деятельность, чтобы предотвратить разложение общества. Однако, если мы будем принимать слишком радикальные меры, общественность может узнать о нашем существовании. Это сложный баланс, но мы должны идти по этой тонкой грани, чтобы поддерживать порядок.\n\n[USB_NSS_extremist_activity_text_scripted_loc]"
 USB_boeing_lockheed_martin_idea: "Lockheed Martin-Boeing"
 USB_boeing_lockheed_martin_idea_desc: "§WГен. Директор:§! §HДжеймс Тейклет§!\n\n\n\n\n\n\n\n   £GFX_USB_taiclet_portrait\n\n\n\n\n\n\n\n\n§W-------------------------------------§!\n§YТекущая Деятельность:§!\nСубъект возглавляет слияние с бывшим генеральным директором Boeing Дэйвом Калхуном (ныне председателем LockMart-Boeing), курируя доминирующую в США оборонную аэрокосмическую компанию. Эта консолидация централизует аэрокосмическую инфраструктуру для обеспечения секретности программ и максимальной эффективности. Под их руководством компания ускоряет разработку дронов, расширяет спутниковое наблюдение и модернизирует платформы. Субъект информирует Пентагон и руководство разведывательных служб, согласовывая свои действия с национальной безопасностью.\nСлияние устанавливает почти монопольный контроль над критически важными аэрокосмическими технологиями, обеспечивая военное превосходство США.\n\n§gКогда глубинное государство захватило государственный аппарат у глупцов в Вашингтоне, произошла крупная перестановка и консолидация власти в нескольких ключевых подразделениях американского правительства, особенно в военно-промышленном комплексе. Опасаясь конкуренции со стороны европейских компаний, таких как Airbus, Когносценти решил, что лучше всего объединить Boeing и Lockheed Martin, чтобы создать Boeing-Lockheed Martin. Boeing-Lockheed Martin - одна из крупнейших аэрокосмических компаний в мире, которая значительно превосходит любого иностранного конкурента, осмеливающегося бросить вызов американскому господству в аэрокосмической отрасли. Обладая неограниченными амбициями, величайшими умами 21-го века и доминирующим положением в американской аэрокосмической промышленности, Boeing-Lockheed Martin станет ключевым игроком в окончательном подавлении Огня.§!"
 USB_think_tanks_and_secret_clubs_dynamic: "Аналитические Центры и Тайные Клубы"
 USB_think_tanks_and_secret_clubs_dynamic_desc: "С самого начала цивилизации те, кто был лучше всего подготовлен к управлению людьми, всегда делали это из тени. Американские тайные общества и аналитические центры всегда служили связующим звеном элиты, плетя взаимосвязанные сети между государственными учреждениями и финансами, обеспечивая, чтобы те, кто был лучше всего подготовлен к руководству, делали это. Эти отношения, хотя и запутанные и несколько инцестуальные, полностью служат интересам поддержания порядка. Благодаря закрытым встречам в тени и сложным ритуалам посвящения укрепляются братские узы между элитой, что гарантирует, что кликизм никогда не выходит за рамки того, что идеально для интересов Когносценти."
 USB_uspf_idea: "Полиция Соединенных Штатов"
 USB_uspf_idea_desc: "Созданная после триумфа Когносценти, местная лояльность и предвзятость полиции были признаны ключевым фактором в деятельности многих экстремистских групп и повстанческих движений во время Второй американской гражданской войны, особенно правых экстремистов, которые могли быстро вооружиться с помощью полицейского оборудования. Таким образом, местные правоохранительные органы были расформированы и реорганизованы в новую национальную полицию, способную полностью обеспечить порядок в Соединенных Штатах.\n\nОна действует под руководством и надзором Федерального бюро расследований. Как и ее предшественники, USPF продолжает тенденцию милитаризации полиции в Соединенных Штатах. Офицеры регулярно ротируются, чтобы никто из них не был местным жителем, с целью предотвращения формирования лояльности к местному населению. Однако, в отличие от полицейских департаментов старого образца, они имеют невероятно либеральные правила применения силы, позволяющие им безнаказанно подавлять насильственных преступников и антисоциальных диссидентов, не подвергаясь правовому и судебному надзору."
 USB_permanent_lockdown_idea: "Постоянный Карантин"
 USB_permanent_lockdown_idea_desc: "Хотя пандемия ковида-19, безусловно, пошла на спад, удобства, которые она предоставила администрации, были слишком выгодны, чтобы от них отказываться. Используя второй всплеск вируса в качестве предлога, Cognoscenti с большим успехом применили бесконечные локдауны, принудительную вакцинацию и чипирование граждан. CDC, следуя инструкциям Когносценти, также использовало биологические и химические террористические атаки, совершенные Дивизии Атомваффен, в качестве дополнительного оправдания для постоянного карантина американского общества. Благодаря этим оправданиям Когносценти удалось навязать эту медицинскую тиранию по всей стране."
 USB_arsenal_of_order_timed_idea: "Арсенал Порядка"
 USB_arsenal_of_order_timed_idea_desc: "Арсенал Когносценти не вызывает насмешек - ракеты, танки, самолеты и огнестрельное оружие - это лишь верхушка айсберга того, чем они обладают. С помощью скрежещущего металла, заточенных клинков и ревущих двигателей Когносценти готовы восстановить порядок на планете с помощью свинца и пламени. Для любого постороннего наблюдателя совершенно очевидно, что глубинное государство готовится раз и навсегда погасить Пламя, и если для этого понадобится превратить своих врагов в пепел, оно не будет колебаться."
 USB_reopen_the_factories_idea: "Запуск Заводов"
 USB_reopen_the_factories_idea_desc: "Распад Соединенных Штатов и последовавшая за ним оргия кровопролития привели к тому, что фабрики по всей стране были разрушены или опустели. Однако с подъемом глубинного государства и появлением Когносценти спрос на военную продукцию вновь резко вырос. Механизмы военной машины снова начинают медленно вращаться, и американский промышленный гигант пробуждается от своего сна. Благодаря черному бюджету и различным законопроектам об инфраструктуре, написанным Когносценти, промышленная мощь Соединенных Штатов начинает возрождаться. Военные кузницы снова зажглись, и оружие, выкованное в их пламени, вернет мир к порядку."
 USB_humanitarian_peacekeeping_idea: "Гуманитарные Миротворцы"
 USB_humanitarian_peacekeeping_idea_desc: "На бумаге помощь Организации Объединенных Наций Соединенным Штатам должна быть чистой выгодой для американского общества: по всей стране миротворцы доставляют еду и воду нуждающимся, поддерживая хрупкий порядок в регионах, контролируемых Союзом Америки. Общественность и военные беженцы не задумываются об этих миротворцах, они даже могут считать их героями, помогающими нуждающимся. Однако на самом деле эти так называемые 'миротворческие миссии' - не более чем обман. Миссии ООН по оказанию помощи Соединенным Штатам глубоко проникнуты информаторами - двойными агентами, подчиняющимися разведывательным службам и, в более широком смысле, Когносценти. Непреднамеренно, десятилетиями выдвигавшиеся против ООН теории заговора и обвинения оказались правдивыми - эти гуманитарные миссии превратились в еще одно придатке глубинного государства."
 USB_reconstruction_period_idea: "Период Реконструкции"
 USB_reconstruction_period_idea_desc: "Сказать, что Америка была разрушена Гражданской войной, было бы самым большим преуменьшением XXI века. В течение многих лет по всей стране бушевала война; хаос был нормой, а насилие - его исполнителем, целые кварталы были превращены в пепел, миллионы людей были брошены в мясорубку или попали под перекрестный огонь. Промышленная мощь Америки, ее доминирование в сельском хозяйстве и глобальная сила были уничтожены. Только сейчас, когда орудия наконец замолчали, Когносценти могут оглянуться назад и оценить ущерб.\nАмерика вступила в фазу восстановления и перевооружения. Амбиции Когносценти не ограничиваются лишь подавлением хаоса Второй американской гражданской войны. Нет, Порядок раз и навсегда погасит глобальное пламя. И чтобы Когносценти достигли этой цели, они должны сначала восстановить Америку."

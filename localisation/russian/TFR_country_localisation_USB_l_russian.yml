 USB_air_force_domination_idea: "Господство Военно-воздушных Сил"
 USB_air_force_domination_idea_desc: "Более чем полувековые политические связи приносят большие плоды в ситуации, подобной той, в которой в настоящее время находится администрация Байдена. Тесно сотрудничая с ВВС США во времена, когда Байден занимал пост вице-президента, большинство военно-воздушных сил США считают себя обязанными Байдену своей карьерой. Излишне говорить, что, когда началась Гражданская война, большая часть ВВС США осталась верна законной администрации - и теперь у нас есть полное господство в небе."

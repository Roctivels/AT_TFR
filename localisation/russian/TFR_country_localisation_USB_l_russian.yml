 USB_NSA_paul_nakasone_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_paul_nakasone_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YИсторическое Значение:§!\nКарьера субъекта демонстрирует систематический рост по служебной лестнице благодаря выполнению все более важных разведывательных функций, связанных с национальной безопасностью. Ранее он занимал должности в армии США и в сфере киберразведки, в том числе заместителя командующего Киберкомандованием армии США, а также руководящую должность в Кибернациональных силах специального назначения.\n\n§YТекущая Деятельность:§!\nСубъект курирует операции АНБ по слежению в рамках II Патриотического Акта и Закона о безопасности общественного здравоохранения, интегрируя проект Am-Net в повседневную жизнь американцев. Под руководством субъекта АНБ разрабатывает системы прогнозирующего ИИ для выявления потенциально опасных элементов, оптимизируя слежку и сокращая потребность в персонале.\n\n§YРанние Годы и Личная Жизнь:§!\nСубъект родился в Уайт-Бэр-Лейк, Миннесота, в японско-американской семье; отец служил в военной разведке во время Второй мировой войны, а родословная восходит к деревне Мисато, Окинава.\n\nОбразование субъекта демонстрирует постепенное развитие экспертных знаний в разведке: служба через ROTC (Университет Св. Иоанна, 1986), степени в системном управлении, стратегической разведке и стратегических исследованиях, а также выпуск Колледжа командования и генерального штаба армии США.\n\nСубъект женат на Сьюзан С. Накасоне (урожд. Стернберг), имеют четверых детей и проживают в Форт-Миде, Мэриленд, рядом с штаб-квартирой АНБ из-за обязательств по национальной безопасности.§!"
 

 bdnspch.0.t: "Восхождение"
 bdnspch.0.d: ""Мои соотечественники, наша страна в клочьях. От моря до сияющего моря наша промышленность, инфраструктура и сельское хозяйство лежат в руинах. Наши великие города тлеют. Мятежные группировки остаются в тени, замышляя дурное против нашей демократии. Средства массовой информации и многие политики утверждают, что война закончилась. Боюсь, что она только началась. Многие миллионы наших соотечественников были развращены и вовлечены в ряды разнообразных радикалов, и нам необходимо пояснить им ошибочность своих действий. \n\nЭта великая задача не по плечу никому, кроме моей администрации. В Конгрессе соперничающие фракции провели Гражданскую войну, споря о налогообложении, в то время как наши храбрые мужчины и женщины в вооруженных силах сражались за каждое право, которым мы дорожим. Верховенство закона висело на волоске, пока политики препирались, а теперь они говорят о помиловании, о законодательных программах, о политике. Нашей стране не нужно больше ничего подобного! Ей нужно лидерство. \n\nВ соответствии с полномочиями, возложенными на меня как на главу исполнительной власти этой страны, я приказываю Конгрессу уйти и завершить эту сессию. Если мы хотим восстановить эту страну, нам необходимо единство и преданность единому делу, чтобы не позволить ей безвозвратно скатиться во тьму раскола и насилия.""
 bdnspch.0.a: ""Мы Создадим Новую Америку!""
 bdnspch.1.t: "Стоящая Перед Нами Задача"
 bdnspch.1.d: "''Мои дорогие американцы. Я выступаю перед вами во время кризиса, подобного которому наша страна никогда не видела. Диктатор собрал вокруг себя клику генералов-изгоев и радикальных политиков. В его распоряжении целая армия ополченцев, вооруженных по последнему слову техники, благодаря разграбленным арсеналам.\n\nИз-за действий этого человека наша нация трещит по швам. На Западе царит хаос, Северо-восток разрушен, а Юг охвачен пламенем. Этот человек приказал своим солдатам направить оружие на своих сограждан-американцев и отвечать на любые угрозы его узурпированной власти с беспричинной и животной жестокостью. Он травил газом мирных демонстрантов и арестовывал политических оппонентов. Одним бесцеремонным движением он перечеркнул Конституцию и объявил свое слово единственным законом, заслуживающим уважения. Он назвал дело своих кровавых рук "возможностью" изменить эту страну.\n\nПротив него ополчились оставшиеся лоялисты из армии, военно-воздушных сил и военно-морского флота, общественные деятели, выборные должностные лица и наши институты власти. С нами также воля обычного американца, настоящего молчаливого большинства. Как человек, который использует террор, чтобы завоевать господство в Денвере, может грозить нам кулаком, он бессилен перед лицом сопротивления. На нашей стороне идеалы свободы и демократии, против зла диктатуры и тирании.""
 bdnspch.1.a: "Нам предстоит долгий путь, но мы пройдем его!"
 bdnspch.1.c: ""Мне... э-э-э... нужно... э-э... простите, я забыл, что хотел сказать...""
 bdnspch.2.t: "На Кресте Капитализма"
 bdnspch.2.d: "Я хочу поблагодарить Прогрессивный Гражданский Альянс Цинциннати за то, что пригласили меня сюда, и сенатора Берни Сандерса, да, протяните ему руку, за то, что он пришел вместе со мной. Удивительно, что некоторые люди не понимают, насколько радикальными, даже революционными были наши основатели. Это были активисты своей эпохи! Мне не нравится, что с тех пор мы стали относиться к активистам скорее как к раздражителям, а к их делам - как к пустякам. Мы оставили позади так много американцев, чернокожих и смуглых, представителей рабочего класса, женщин, и они позаботились о том, чтобы мы не забыли об этом!\n\nВ конце концов, за что мы боремся? За наши права, такие как с таким трудом завоеванное право на выбор, право мужчин и женщин, независимо от цвета кожи, на то, чтобы с ними обращались в соответствии с их характером, и право американцев на социальное обеспечение в старости. Все это было заработано в боях, где обычным американцам приходилось брать на себя ответственность, чтобы поддерживать политический процесс. Глядя на вас, я понимаю, что вы - сегодняшние движущие силы. Так много молодых людей чувствовали себя брошенными, и прогрессивное движение дало им право голоса..."
 bdnspch.2.a: ""Никогда не опускайте руки! Всегда говорите то, что думаете!""
 bdnspch.2.b: "''Поэтому, чтож, Понимаете, так, э-э, давайте продолжим!''"
 bdnspch.3.t: "Наша Партия: Наша Демократия"
 bdnspch.3.d: ""Спасибо, сенатор Шумер, за эту замечательную речь. Я и сам не мог бы сказать лучше: наша партия была на передовой в войне против Трампизма с самого его основания. Пока наши друзья-республиканцы сидели в стороне, пытаясь образумить этого безумца, мы предупреждали американский народ о его лжи, как и пытались добиться успеха на переговорах. Наша партия уже не в первый раз оказывается на правильной стороне истории. В годы Рейгана, когда все кричали: "Сократить, сократить, сократить!", именно демократы пытались нажать на тормоза, то же самое было и в 2008 году.\n\nПока война разрывает нашу страну на части, именно Демократической партии предстоит собрать ее обратно. Мы должны устранить прямой ущерб и смести гниль жесткой экономии и "обмана". Мы должны бороться за восстановление американской промышленности и перестройку того, что осталось. Именно демократы должны устранить раскол и преодолеть ложь. Именно мы должны будем сокрушить демонов левого и правого экстремизма.""
 bdnspch.3.a: ""Мы партия будущего!""
 bdnspch.3.b: "Мы, ну, ээ, извините, в общем..."
 bdnspch.4.t: "Остатки Линкольнизма"
 bdnspch.4.d: ""Я хочу поблагодарить сотрудников The Bulwark, Dispatch и участников проекта "Авраам Линкольн" за то, что пригласили меня сюда. Знание того, что некоторые консерваторы не сошли с ума, утешает, скажу я вам! Я помню, какой была политика на протяжении большей части моей карьеры: такие люди, как покойный великий Уильям Ф. Бакли-младший, блестящая Джинн Киркпатрик, президенты Буши; все консерваторы, но глубоко преданные борьбе за демократию внутри страны и за рубежом.\n\nЯ смотрю на то, что стало с Республиканской партией, и у меня замирает сердце. Настоящий институт, который был с нами со времен Линкольна, погрузился в глубины авторитарного, антидемократического разврата, подобного которому наша страна еще не видела. Я смотрю на всех присутствующих здесь и чувствую себя намного лучше. Я вижу таких людей, как бывший спикер Палаты представителей Райан, сенаторы Макконнелл и Корнин, и таких воинов за нашу демократию, как Джен Псаки и Дэвид Френч. Я знаю, что в вас живет наследие Линкольна, Эйзенхауэра и Рейгана. Я вполне допускаю, что после освобождения от незаконной оккупации избиратели вознаградят реформированную Республиканскую партию местом за столом переговоров в возрожденных Соединенных Штатах...""
 bdnspch.4.a: ""Потому что нам нужно учить в Америке только мирному выражению несогласия!""
 bdnspch.4.b: ""По-Потому что мы хотим, э-э, помочь сделать Америку снова вел- э-э... снова единой""
 bdnspch.5.t: "Война, которую нужно выиграть"
 bdnspch.5.d: ""Мужчины и женщины, служащие Вооруженных сил, я обращаюсь к вам во времена хаоса и скорби. Нашу страну раздирает на части жестокая война, вызванная бесконечными и ненасытными амбициями одного человека и фанатизмом его сторонников. Единственный выход - это победа, победить этого человека и всех, кто поднимает оружие против своих сограждан-американцев ради него, силой оружия. Обращаясь к генералам и командирам, собравшимся передо мной, я могу только надеяться, что вы сделаете это быстро.\n\nЕсли мы не победим тех, кто выступает против нашей демократии, старейшей в мире, то нашей страной будет руководить диктатор, над которым не властен закон. Мы окажемся во власти вооруженных банд. Наши права: право выбирать, с кем вступать в брак, когда заводить детей, что нам разрешено печатать или какую религию нам разрешено исповедовать - все это будет поставлено под угрозу. У нас не остается другого выбора, кроме как бороться за все, что нам дорого, за наши семьи, нашу систему сдержек и противовесов, наши права, а вы - борцы.""
 bdnspch.5.a: ""Не подведите страну!""
 bdnspch.5.b: ""И я... За это... Мы боремся, э-э...""
 bdnspch.6.t: ""
 bdnspch.6.d: ""
 bdnspch.6.a: ""
 bdnspch.6.b: ""
 bdnspch.7.t: "Помощь Неимущим"
 bdnspch.7.d: ""По всей стране чернокожие и коричневые американцы вырвались вперед в бизнесе. Во многих сферах, от технологий до оптовой торговли, расовые меньшинства добились больших успехов. Однако боль от сотен лет неравенства и угнетения еще не до конца излечена. Банки выдают меньшинствам меньше кредитов, а заемщики из числа меньшинств подвергаются более суровым наказаниям в случае невыполнения обязательств. Системный расизм не позволяет многим американским меньшинствам получать необходимую помощь от правительства, а нормативные акты соблюдаются неравномерно. Удивительно, как далеко мы продвинулись, но нам еще многое предстоит сделать.\n\nЯ намерен добиваться от Конгресса принятия закона, направленного на исправление ситуации. Редлайнингу должен прийти конец. Необходимо добиваться полной интеграции, то есть равного доступа к кредитам, субсидиям и налоговым льготам. Бизнес больше не должен дискриминировать определенные районы на основании ошибочных представлений о преступности. Каждый район должен иметь равный доступ к продовольствию, а "продовольственные пустыни" должны быть ликвидированы. Мы также должны привлечь внимание к предпринимателям из недопредставленных сообществ, а интернет-провайдеры должны в первую очередь продвигать заведения, принадлежащие меньшинствам. Прежде всего, мы должны признать американские меньшинства, держать их на виду и в нашем сознании, как равноправных граждан, достойных нашего уважения.""
 bdnspch.7.a: "''Мы не можем их бросить.''"
 bdnspch.7.b: "''Мы-мы-м, хотя, ну, э-э...''"
 bdnspch.8.t: "Ты сможешь позволить себе колледж!"
 bdnspch.8.d: ""Томас Джефферсон считал, что образование - это основа здоровой демократии, источник, из которого народ может почерпнуть основы участия в жизни общества и избежать невежества и апатии, характерных для старых королевств Европы. Америка всегда гордилась обилием колледжей: великая и престарелая Лига плюща, «Три сестры» и великие западные кампусы. Однако когда-то этот великий ресурс был доступен только высшим слоям общества: Школы-интернаты Новой Англии напрямую связывались с Гарвардом, Принстоном и Йелем: только элита Запада отправляла своих детей в Беркли и Стэнфорд. И только после окончания Второй мировой войны, когда был принят G.I. Bill, обычные американцы смогли попасть в священные залы академических учреждений.\n\nНо с тех пор мы позволили академии снова стать полигоном для элиты. Такая политика, как Позитивная Дискриминация, помогла выровнять шансы, но этого было недостаточно. Самые умные американцы из рабочего класса систематически оказывались заблокированными в ведущих университетах, а другие не могли позволить себе даже государственные школы. Даже если вы могли туда поступить, это было похоже на мошенничество: платить невероятные суммы только за то, чтобы иметь шанс жить, как их родители. Мы допустили, чтобы наши гуманитарные факультеты пришли в упадок, а наши научные исследования, которые когда-то были на мировом уровне, отстали. Все больше американцев избегают учебы в колледже, и главная причина, которую они называют, - это цена; настало время, чтобы средний американец имел равные шансы на высшее образование.""
 bdnspch.8.a: "''Пришло время сделать колледжи доступным!''"
 bdnspch.8.b: "''Время сделать колледжи доступ-, дос-, дост-''"
 bdnspch.9.t: "Подписание Закона об Экономической Свободе"
 bdnspch.9.d: ""Я хочу поблагодарить сенаторов Берни Сандерса и Элизабет Уоррен за их неустанные усилия по оказанию помощи американскому народу, и этот акт - их заслуга. Американцы испытывают трудности с финансами. Рецессия, с которой нам с Бараком пришлось столкнуться, прошла, но раны, которые она нанесла главной улице США, еще не до конца зажили. Для большей части Америки старые экономические формулы не работают. Промышленность возрождается, но некоторые районы, зависящие от угля или других устаревших отраслей, не могут быть так просто омоложены. Районы проживания меньшинств долгое время боролись с бедностью и расизмом, и ни одна политическая инициатива не была достаточно сильной, чтобы преодолеть это мрачное наследие. Приливы и отливы современности, а также наследие прошлого, нависшее над нашей страной, заставили нас искать новые меры.\n\nНа основании этого закона будет создана надежная система экономической помощи безработным, а также пакет мер по вытеснению рабочих из умирающих отраслей. Так много американцев оказались в хвосте долгов и нищеты, не имея никакой помощи, кроме жалких пособий, на которые они часто не имеют права из-за своей мизерной занятости. Благодаря этому закону многие американцы, живущие на периферии, смогут получить средства, необходимые для управления своими финансами и самосовершенствования с помощью образования и других средств.""
 bdnspch.9.a: "''Американцы могут спать спокойно.''"
 bdnspch.9.b: "''Амеемерикантс, э-э, погодите...''"
 bdnspch.10.t: ""
 bdnspch.10.d: ""
 bdnspch.10.a: ""
 bdnspch.10.b: ""
 bdnspch.11.t: "Байденкэйр"
 bdnspch.11.d: ""Многие американцы вынуждены бороться с долгами по оплате медицинских услуг, отсутствием доступа к ним или отсутствием лечения. Сейчас, когда большая часть нашей страны разрушена, и так много американцев умирает, страдая от болезней, которые давно считались искорененными, легкодоступное, недорогое и качественное здравоохранение необходимо как никогда. Наши представления о том, как должна формироваться политика в области здравоохранения, больше не являются адекватными; нам нужно гораздо больше, чем то, что мы имели в прошлом. Даже Акт о доступном здравоохранении, краеугольный законодательный акт программы Обамы и Байдена, больше не является достаточным. Нам нужна система здравоохранения, которая будет работать для всех американцев, независимо от их возраста и предсуществующих заболеваний, и сможет справиться с огромным количеством проблем, стоящих перед американским народом сегодня. \n\nЭто новое здравоохранение будет ориентировано на пациента, а не на фармацевтические выплаты. Оно будет доступным, действительно доступным, а не просто предоставит страховым компаниям бесплатных клиентов. Мы не должны идти на компромисс; сейчас чрезвычайные времена, и они требуют отчаянных мер. Откровенно говоря, наши друзья-республиканцы не в состоянии остановить нас. Мы можем сделать то, что изначально планировала администрация Байдена-Оба... простите, Обамы-Байдена!""
 bdnspch.11.a: "''Это то, чего заслуживают американцы!''"
 bdnspch.11.b: "''Барак, чтож-аа, и Я, ну...''"
 bdnspch.12.t: "Принятие Закона об Избирательных Правах Джона Льюиса"
 bdnspch.12.d: ""Америка обращалась со своими гражданами неравноправно и допускала множество беззаконий. Черные и коричневые американцы когда-то были рабами, затем гражданами второго сорта, и даже сегодня они все еще живут под тяжелым наследием своих прошлых страданий. Америка расплачивается за свой первородный грех разными способами, и необходимо покаяние. То, что было изначально задумано после нашей первой Гражданской войны и официально закреплено после принятия Закона о гражданских правах, должно быть укреплено. Все граждане должны иметь равный доступ к нашей демократии и равное представительство.\n\nС помощью этого закона мы можем сделать еще один шаг на долгом пути к расовому равенству. Больше не будет применяться дискриминационная практика. Все перекройки, все законы, касающиеся голосования, должны быть одобрены федеральным правительством. Больше не будет разрешено проводить джерримендеринг, а дискриминация по расовому, классовому, географическому или политическому признаку не будет иметь никакого значения при проведении перекройки. Политические игры больше не будут мешать основной функции нашей демократии.""
 bdnspch.12.a: "''Право Голоса является священным, и теперь оно имеет надлежащую защиту.''"
 bdnspch.12.b: "''Пра-Право Голоса, эм, у нас есть, голоса, э-э...''"
 bdnspch.13.t: ""
 bdnspch.13.d: ""
 bdnspch.13.a: ""
 bdnspch.13.b: ""
 bdnspch.14.t: "Платить по Справедливости"
 bdnspch.14.d: ""Многие консерваторы утверждают, что нерегулируемые, полностью свободные рынки - это лучший вариант экономики. Глядя на нашу историю, я не могу придерживаться такого же мнения. Бессердечные злоупотребления Позолоченного века и бесчисленные корпоративные злоупотребления, произошедшие с тех пор, доказывают, что нерегулируемые рынки столь же разрушительны, если не более разрушительны в ключевых областях, как и социализм. Очень многие корпорации относятся к благополучию своих сограждан как к второстепенной задаче, считая прибыль единственной целью любого предприятия. Они говорят, что жадность - это хорошо, а эгоизм - полезен. Это глупая идея, которая причинила столько боли. Экономика "Просачивания" и перевод предприятий на периферию привели к разрушению общин, в то время как сверхбогатые люди наживаются на этом.\n\nНе каждый бизнесмен - злодей, и не каждый инвестор думает только о своей выгоде. Однако импульс и стимул к эгоистичному поведению не исчезают благодаря благим намерениям; с ним нужно бороться с помощью политики. Предприятия должны отчислять часть своей прибыли на общественное благо, и они не должны иметь возможности уходить от уплаты через лазейки. Мы также должны гарантировать, что бизнесмены никогда не смогут доминировать в нашей политике и самофинансировать свой путь к диктатуре.""
 bdnspch.14.a: "''Корпоративная Америка должна быть на стороне Америки!''"
 bdnspch.14.b: "''Кр-ч-Корпор-чтож, в любом случае...''"
 bdnspch.15.t: "Живая, Дышащая Конституция"
 bdnspch.15.d: ""Некоторые люди ведут себя так, будто наша Конституция - это неизменная, застывшая вещь. Они придерживаются принципа "оригинализма", который гласит, что мы всегда должны стремиться к тому, чего, по их мнению, хотели бы отцы-основатели. Мне неприятно говорить им об этом, но основатели уже давно мертвы. Мы понятия не имеем, чего бы они хотели, и, честно говоря, они даже не понимают, насколько изменился наш мир. У них не было ни Интернета, ни штурмового оружия, ни других современных инноваций, которые в корне меняют нашу жизнь. Так почему же мы должны довольствоваться тем, что написали они? \n\nНаши основатели понимали свои ограничения. Они знали, что институты должны адаптироваться и меняться, и поэтому ввели систему внесения поправок в Конституцию. В дополнение к Биллю о правах мы добавили 15 поправок, определяющих наши ценности и принципы функционирования демократии. Права меньшинств, женщин и всех американцев были закреплены. За последнее время в Америке так много изменилось, что нам необходимо вновь обратиться к Конституции. Мы должны подойти к этому вопросу так, как это делали основатели; мы должны создать что-то новое, что-то, что будет соответствовать нашей стране во всем ее многообразии.""
 bdnspch.15.a: "''Мы должны взять то, что было замечательного в старом, и создать новое там, где оно терпит неудачу.''"
 bdnspch.15.b: "''Мы м-м, как бы то ни было, эм..''"
 bdnspch.16.t: "Возрожденная Нация"
 bdnspch.16.d: ""Мои соотечественники, американцы: Мы оказались на перекрестке, где надвигается крах наших институтов и того, что действительно стало основой истории, которой является сегодняшняя Америка. Слово нашей судьбы, которое пронесло могучую душу этой страны от моря до сияющего моря и сдвинуло горы, - это целостность. С тех пор как мы заняли этот пост, абсолютная целостность этой нации только укрепляется, выживая в этот неспокойный час. Друзья, я вырос в Америке, которая была смелой и верной себе, которая стремилась к тому, чтобы каждый человек мог получить те же возможности, которые ему необходимы, больше не беспокоясь о невзгодах, не ложась спать по ночам в ожидании новой мечты, американской мечты, которая должна прийти, когда она уже есть, в их руках, когда они идут через море славы. Этот углубляющийся кризис лишь доказывает нашу праведную мощь и решимость в борьбе с тиранией, а также то, что все американцы предпримут необходимые шаги для преодоления чрезвычайной ситуации. Мы - нация действия, мы не лежим, сложа руки перед лицом диктатора, а движемся со всех сил и обладаем инструментами, чтобы исправить мечту, а не бросить ее в пыль. Пусть будет ясно: хаос и боль, которые раскололи нашу нацию, никогда не уничтожат надежду. Это действительно борьба за будущее, за душу этой страны.""
 bdnspch.16.a: "''Ибо это Америка.''"
 bdnspch.16.b: "''Иб-ибо, эт-то Амери-''"
 bdnspch.17.t: "Укрепление Рынков"
 bdnspch.17.d: ""Друзья, добро пожаловать. Я сделаю несколько кратких замечаний по поводу состояния наших рынков и реального оживления нашей экономики. Америка имеет взаимосвязанный костяк составляющих ее силы, начиная с производства и заканчивая средним классом. Однако большим скачком для этих секторов является основа наших рынков, а также отход от пораженческих взглядов на их функционирование, при этом наша администрация активно следит за тем, чтобы страна надежно держалась на плаву, позволяя потребителям без страха резвиться и достигать своих целей. Американские товары и американские рабочие места - все они плавают на арене рыночного роста и экономических инноваций, которые обеспечивают поддержку наших предприятий и агентств для более безопасной и устойчивой Америки. Больше никакие особые интересы и лазейки не будут пытаться устранить процветание в нашей нации, но море процветания будет очерчено и расти вперед, позволяя централизованные, скоординированные усилия.""
 bdnspch.17.a: "''Поскольку это никогда не подводило Америку.''"
 bdnspch.17.b: "''П-это х-н-никогда н-не Амер..слушайте, люди:''"
 bdnspch.18.t: "Прячущийся в Тени"
 bdnspch.18.d: ""Мои соотечественники-американцы, сегодня я обращаюсь к вам по поводу кризиса, который в настоящее время охватил нашу нацию огненным кольцом. Каждый день человек не может избавиться от бремени войны, которая нанесла шрам на наши священные институты, поскольку предатели, сражающиеся за царя гороха, заставляют нас вселять злобу в наши души, включая масштаб насилия и разрушения каждый день. Друзья, это требует от моей администрации обязательных действий, включая обращение к нашим прежним знаковым решениям в истории. Это включает в себя облегчение межведомственного сотрудничества с американским народом, например, необходимое расширение системы наблюдения за каждым углом, чтобы эта нация больше не могла жить в страхе за себя, но чувствовала себя в безопасности, а не сталкивалась с когтями ужаса, который каждый день приносит война. Когда я был моложе, наша семья всегда боялась войны, опасаясь, что мы повсеместно попадем в руки тиранов и подрывных элементов в нашем обществе, и каждый день будем питать эти элементы, не испытывая никаких угрызений совести. Это действительно мера предосторожности, чтобы еще больше подорвать любое чувство внутреннего разрушения ради стабильности после нашей борьбы за свободу.""
 bdnspch.18.a: "''Боже Благослави Америку.''"
 bdnspch.18.b: "''Боже-эм, Благослави Ам-мери-''"
 bdnspch.19.t: "Конституция Стоит на Первом Месте"
 bdnspch.19.d: ""Воля народа получила поддержку в наших институтах. Конституция научила нас тому, что наша нация продолжает искренне верить в защиту демократии, даже если это означает, что она находится на самом переднем крае, где она может быть наиболее хрупкой до глубины души. Уникальность этого священного документа показывает, что американский стиль жизни всегда был защищен, никогда не отступал перед тиранами, которые ждут захвата власти и активных действий, отравляющих нашу нацию, и как только тираны приходят: стойкость нашего народа дает отпор, как это всегда было заложено в ДНК сердца и души Америки. Я хотел бы повторить: Все это благодаря нашим праотцам, которые написали эти священные тексты перед лицом тирании у себя дома. Перед лицом бури и раздоров мы всегда можем обратиться к судьбе наших отцов-основателей, которые поставили эту нацию перед опасностью и возможностью. Пусть эта великая нация навсегда запомнит эти фразы:""
 bdnspch.19.a: "''Мы - Народ.''"
 bdnspch.19.b: "''М-мы Н-нар-эм, э-э-э.''"
 bdnspch.20.t: "Силиконовая Мечта"
 bdnspch.20.d: ""Здравствуйте, рад вернуться в Северную Вирджинию. Это действительно помогает мне забыть о Вашингтоне. Я только что разговаривал с генеральным директором Google господином Пичаи о борьбе с дезинформацией и дезинформацией, исходящей с оккупированной территории. Он дал мне понять, что цифровое пространство, интернет, стало полем битвы, не менее важным, чем любое физическое. Он рассказал о том, как некоторые интернет-тролли, поддерживающие врага, чуть не перенаправили поезд с медикаментами, выдав себя за меня! Представляете, какое безумие!\n\nВ конце концов, мистер Пичаи и некоторые другие пришли к выводу, что доступ к их услугам - это привилегия, а не право, поэтому большинство врагов теперь не могут получить доступ к Google, устройства Apple, Microsoft, Bloomberg и многих других компаний были выведены из эксплуатации. А если прибавить к этому отключение от SWIFT, то, думаю, у этих предателей будет немало головной боли!\nЯ просто хочу сказать, что корпоративная Америка была просто феноменальной. Без них у нас не было бы всех этих гаджетов в наших самолетах, доступа к нашим банкам, черт возьми, даже доступа к большинству продуктов.""
 bdnspch.20.a: "''И они продолжат выбивать их из колеи!''"
 bdnspch.20.b: "''Я... я могу только надеяться, что вы, э-э, сделаете что-нибудь, хм, ну.''"
 bdnspch.21.t: "Винтовки, Патроны и Все Прочее"
 bdnspch.21.d: ""Людям, привыкшим собирать автомобили, может показаться странным переходить на производство боеприпасов, но я думаю, вы поймете, что это такое. В этом и заключается американский дух: соответствовать моменту, приспосабливаться к худшим обстоятельствам и делать из них что-то. Несколько лет назад никто не думал, что один человек узурпирует нашу демократию, но он это сделал, и теперь мы должны делать то, что должны, все мы. Так что, пока вы можете ныть и поднимать шум, я думаю, все вы будете выполнять свой долг, вы же американцы, в конце концов!\n\nПодумайте об этом, когда будете полировать каждый кусочек латуни: так много американцев живут в условиях тирании. Будь то радикалы или тиран в Денвере. Система законов нашей страны, ее институты находятся под угрозой. Всегда помните, что пуля, которую вы делаете, может стать той, которая уложит наших потенциальных диктаторов! Знайте, что танк, который вы помогаете построить, может стать первым знаком освобождения для измученных жителей Денвера, Лос-Анджелеса и Бостона. Самолеты, которые полетят благодаря вам, разрушат крепости врага.""
 bdnspch.21.a: "''То, что вы здесь построите, может решить исход войны!''"
 bdnspch.21.b: "''То-т-чт послушайте, неважно...''"
 bdnspch.22.t: "Поддерживать Машину в Рабочем Состоянии"
 bdnspch.22.d: ""Мы живем в эпоху беспрецедентного доступа к информации, позволяющего нам видеть важнейшие аспекты каждого сектора экономики. И позвольте мне сказать, что я сам взглянул на эту картину, и она не очень-то красива. Мы - нация потребителей и в последнее время мало что производим. Это должно измениться, и это происходит. Но мы также забыли о своих знаниях в области экономики. Слишком много умных выпускников колледжей отправляются в «большую тройку» для прохождения через ад, так и не получив возможности послужить своей стране напрямую. Эта война, какой бы ужасной она ни была, изменит ситуацию. \n\nВыпускники лучших колледжей должны быть привлечены, чтобы помочь нашей армии управлять логистикой. Они должны вступать в наблюдательные организации, которые следят за тем, чтобы корпорации вносили свою долю в военные усилия, не наживались на верхушке и не тратили ресурсы впустую. Мы должны сделать так, чтобы средний американец был сыт, а американский солдат сражался.""
 bdnspch.22.a: ""Америке нужны умные люди!""
 bdnspch.22.b: ""Америка, ну, хм...""
 bdnspch.23.t: "Автоматизация Автоматики"
 bdnspch.23.d: ""Я не понимаю этого, я ничего не понимаю. Но я знаю, что это важно. У нас есть несколько самых ярких умов в Америке, которые разрабатывают эту технологию. Я недавно встречался с Сэмом Альтманом, и он говорит, что эта технология может стать нокаутирующим ударом в этой войне. И хотя сейчас она может показаться немного сверхъестественной, мне сказали, что в ближайшие годы и даже месяцы она будет совершенствоваться в геометрической прогрессии.\n\nВ этой области у нас есть полное преимущество перед денверским тираном. Эта технология позволит нам перераспределить ценные ресурсы от различных базовых канцелярских функций и направить их на управление военными действиями. Скоро мы сможем использовать ИИ для управления беспилотниками и обобщения информации о поле боя, а также знать, когда и куда нужно направить ресурсы, без какого-либо участия человека: это революционно!""
 bdnspch.23.a: "''Это всё кажется очень умным!''"
 bdnspch.23.b: "''Э-это, эм, понимаете...''"
 bdnspch.24.t: "Получаем То, Что Нам Нужно"
 bdnspch.24.d: ""Мои соотечественники-американцы, вы, возможно, заметили некоторые изменения на своем рабочем месте. Некоторые из вас начали производить военные товары, а другие перешли на работу с военными, обеспечивая доставку товаров солдатам. Вы можете спросить: "Я работаю в бухгалтерской фирме, почему я делаю это?" Это может показаться странным, но уверяю вас, это необходимо. Военные действия требуют огромной сети и самоотдачи от каждого американца.Наша армия растет с каждым днем и отчаянно нуждается в людях, которые могли бы сгладить любые препятствия на пути ее стремительного развития.\n\nОдним из таких препятствий является вмешательство корпораций. Мы не обвиняем ни одну конкретную фирму, но знаем о схемах, позволяющих обойти наши директивы и попытаться с помощью якобы допущенных ошибок и других способов не играть свою роль в войне. Нам нужна помощь каждого гражданина, чтобы этого не произошло, а если произошло, то чтобы это было быстро обнаружено. Мы также должны следить за тем, чтобы никто не обдирал верхушку и не отнимал у наших войск ценные припасы ради гнусной наживы.""
 bdnspch.24.a: "''Ваша работа победит врагов демократии!''"
 bdnspch.24.b: "''Вы-теперь, помогите, без выдумок...''"
 bdnspch.25.t: "Привлечение Всех к Работе"
 bdnspch.25.d: ""Здравствуй, Филадельфия! Это город братской любви, и долгое время он был титаном американской промышленности. На какое-то время она угасла, но теперь возвращается, и будет лучше, чем когда-либо! Эта война доказала, что многие приоритеты прошлых правительств были прямо противоположными: мы думали, что наши враги находятся за границей, а не внутри страны, думали, что промышленность можно просто отправить за границу без последствий, и думали, что Америка может пережить безработицу. Нет! Эта страна была построена для того, чтобы каждый человек мог стремиться к счастью; как же он может быть счастлив, если не может работать?! Это было ошибкой древних, и я хотел бы, чтобы нам не пришлось устраивать Гражданскую войну, чтобы вбить это в голову Вашингтона, но, по крайней мере, мы делаем успехи.\n\nЭтой стране пока нужно производить бомбы и танки, но когда все это закончится, мы, извините, начнем строить все лучше, чем когда-либо! Наша страна снова станет титаном мировой промышленности! Мы будем относиться к безработице как к пандемии Ковид-19: как к вирусу, как к болезни, которую нужно искоренить. Мы заставим каждого мужчину и каждую женщину работать и позаботимся о том, чтобы они получали уход за детьми и финансовую помощь, необходимую для воспитания семьи.""
 bdnspch.25.a: "''Мы вернем Америке работу!''"
 bdnspch.25.b: "''Мы собираемся, ну, сделать...''"
 bdnspch.26.t: "Привлечение Корпораций к Сотрудничеству"
 bdnspch.26.d: ""10 000 долларов за винтовку?! Правда?! Вот почему мы еще не выиграли эту войну. Потому что на Уолл-стрит нет патриотизма! Или, по крайней мере, так кажется. За всю войну мы не национализировали ни одной компании, ни одной! Мы не заставили уйти в отставку ни одного лидера корпорации. И вот, вот как корпоративный мир отплатил нам?! Это абсурд, это смешно. Этой стране нужна преданность каждого мужчины и каждой женщины. Столько рабочих отдали все свои силы, производя оборудование для нашей армии, а их боссы продают его нам за бесценок!\n\nПоэтому, а также по многим другим причинам: ради тысяч беженцев, которых обманули во время войны, ради солдат, погибших из-за нехватки боеприпасов, ради городов, оставшихся без воды, я подпишу Национальный закон о борьбе с ростовщичеством. Этот закон поставит все корпорации под расширенный надзор, и над каждой крупной корпорацией, участвующей в военных действиях, будет стоять федеральный чиновник. Вы внесете свой вклад в развитие нашей страны...""
 bdnspch.26.a: ""Или мы возьмем этот вклад на себя""
 bdnspch.26.b: ""Или, или, или мм, ээ...""  
 bdnspch.27.t: ""
 bdnspch.27.d: ""
 bdnspch.27.a: ""
 bdnspch.27.b: ""
 bdnspch.28.t: "Победа в Цифровой Войне"
 bdnspch.28.d: ""Потеря Кремниевой долины стала одним из самых страшных ударов, с которыми когда-либо сталкивалась наша страна. Всего за несколько дней серверы десятков главных технологических новаторов страны попали в руки злоумышленников, которые впоследствии использовали их для распространения своей радикальной программы по всему цифровому миру. Однако американская изобретательность всегда на шаг впереди: перегруппировавшись в Вашингтоне, лучшие компьютерщики и инженеры страны восстановили свои сети практически с нуля, что позволило нам вести войну за интернет на равных.\n\nСейчас мы переживаем период еще больших инноваций: искусственный интеллект, новые коммуникационные программы, технологии беспилотников - все это позволяет нам вести эту войну и получать необходимое преимущество перед нашими врагами. Даже во время войны Америка является сердцем мировых инноваций, нервным центром для всех технологий, которые мир использует ежедневно. С помощью таких людей, как Марк Цукерберг, Тим Кук и Билл Гейтс, мы выиграем эту войну не только на поле боя, но и в цифровом пространстве, предотвращая кибератаки и другие злоупотребления.""
 bdnspch.28.a: "''Наша страна вернет себе интернет!''"
 bdnspch.28.b: "Н-н, ну, ээ, хмм..."
 bdnspch.29.t: "Сохраняя Америку Потрясающей"
 bdnspch.29.d: ""Миссис Уолтон просила меня прийти сюда, чтобы вас всех угостить. Ну, сейчас чертовски жарко, и вам всем приходится сидеть на улице, так что угощайте. Но, так или иначе, я хочу воспользоваться моментом и сказать, что я благодарен, что Америка так благодарна всем работникам продуктовых магазинов, которые пережили пандемию, а теперь еще и войну. Вы по-прежнему заботитесь о том, чтобы хорошая, чистая, здоровая пища доходила до людей, которые в ней нуждаются. Вы на передовой, когда дело доходит до нормирования, не страшитесь никакого давления, чтобы обеспечить соблюдение необходимых правил, благодаря которым продовольствие поступает к нашим солдатам, а наши поставки остаются стабильными. Я не могу словами выразить вам свою благодарность.\n\nМой отец был рабочим человеком, и он всегда говорил нам, как нам повезло, что мы живем в Америке, где мы можем пойти в магазин и купить все, что нам нужно, и даже намного больше. Он всегда убеждал нас, что это привилегия. Наша работа в правительстве заключается в том, чтобы сохранить эту привилегию. Вы и тысячи таких, как вы, по всем Соединенным Штатам помогаете сохранить американскую мечту.""
 bdnspch.29.a: "''Без вас мы были бы в ужасном положении''"
 bdnspch.29.b: "''Без-чтож, ну да, это забавно, действительно забавно...''"
 bdnspch.30.t: "Уходя Без"
 bdnspch.30.d: ""Мои соотечественники, недавно были введены правила, которые существенно повлияют на вашу повседневную жизнь. Как ваш президент, я должен объяснить, почему эти новые правила необходимы. Мы находимся в состоянии войны, не слишком похожей на великий крестовый поход за свободу, который мы вели против фашистских держав во время Второй мировой войны. Во время той войны американцам пришлось отказаться от некоторых дополнительных услуг, чтобы важнейшие ресурсы могли быть направлены на нужды промышленности и солдат. Американцам выдавали карточки, на которых было указано, сколько и чего они могут купить. Им было велено жертвовать металлолом и другие инструменты, чтобы помочь военным. Подобные рекомендации будут разосланы и вам.\n\nЯ знаю, что это будет сложно. Мне знакомо разочарование, когда приходится обходиться без еды. Но знайте: чего бы у вас ни было, у какого-нибудь солдата, лежащего в холодном окопе где-нибудь в Небраске или Дакотах, будет хоть немного света в его жизни. Американцы сталкивались с более серьезными проблемами, и я знаю, что у вас есть мужество и решимость, чтобы справиться с ними.""
 bdnspch.30.a: ""Только с вашей помощью мы победим!""
 bdnspch.30.b: ""Только-только, послушайте...""
 bdnspch.31.t: "Бурите, э-э, Девоньки, Бурите!"
 bdnspch.31.d: "Когда я был мальчиком, американская промышленность загоняла в могилу нацистское правительство. Когда я был подростком, она была предметом зависти всего мира. Когда я только стал сенатором, она еще работала, но уже появились трещины. Теперь я стою перед страной, которая производит мало продуктов, которые потребляет, которая едва может прокормить огонь глобальной пандемии и войны. И хотя мы пытаемся исправить ситуацию, все начинается не со строительства заводов. Все начинается здесь, в старой доброй шахте. Вы получаете сырье не для экспорта за границу, а для выживания нашей нации.\n\nХотя это может показаться не совсем обычным делом, эта новая шахта станет источником тысяч рабочих мест, и все они будут способствовать военным усилиям. Когда мы одержим победу, она продолжит работу, я обещаю! С помощью вашего труда мы свергнем тирана в Денвере, а также коммунистический и нацистский режимы!"
 bdnspch.31.a: "Вы вобьете кинжал в сердце автократов!"
 bdnspch.31.b: "Вы, вы, ну, вы э-э..."
 bdnspch.32.t: "Беженцы Приветствуются!"
 bdnspch.32.d: ""Это была моя жена. Доктор Джилл Байден, которая обратила мое внимание на бедственное положение беженцев, живущих здесь, в Мэриленде. Вы столкнулись со столькими трудностями: потеряли свои дома из-за насилия, стали свидетелями жестоких расправ. Я восхищаюсь вашей стойкостью, вся страна восхищается вами. И подумать только, мы даже не можем поселить вас? Я знаю, что некоторые великие американцы предложили свои дома, но этого просто недостаточно, вся страна переживает тяжелые времена, все борются, и лишь немногие могут позволить себе жилье. Я слышал, вы только недавно получили палатки?\n\nНу, этому приходит конец. Сегодня я подпишу закон о помощи беженцам, который поможет вам и бесчисленным тысячам других беженцев получить необходимую помощь. Мы расширим наши логистические сети и создадим администрации на местном уровне для расселения беженцев и оказания им помощи. Мы направим продовольствие и медикаменты в нуждающиеся районы.""
 bdnspch.32.a: "Мы не забудем о вас!"
 bdnspch.32.b: "Мы-мы-мы, мы, подождите минутку..."
 bdnspch.33.t: ""
 bdnspch.33.d: ""
 bdnspch.33.a: ""
 bdnspch.33.b: ""
 bdnspch.34.t: "Сбор"
 bdnspch.34.d: ""Очень много молодых людей не отвечают на призыв. К сожалению, наши призывные пункты пустуют, и только призыв отправляет людей на фронт. Я знаю, насколько вы все патриотичны. Я понимаю, что вы чувствуете, видя, как ваши родственники живут под гнетом безумца, видя, как ваши сокурсники радикализируются в результате дезинформационных кампаний радикалов, и живя в самые безумные времена, которые когда-либо видел мир, черт возьми, я родился, когда Гитлер был у власти, и я думаю, что у вас все еще хуже! \n\nВсе это означает, что нам нужны большие идеи, и я знаю, что у всех вас есть большие идеи. Я знаю, что вы хотите помочь своей стране и хотите видеть ее снова единой и сильной. Но старых способов сделать это, пойти в школу или на работу, уже недостаточно.Военные нуждаются в вас и ваших идеях сейчас, как никогда. Нам нужны инженеры, авиамеханики и сварщики. Нам нужны немногие и храбрые на передовой. Нам нужны офицеры и администраторы. И самое главное - нам нужно, чтобы больше американцев откликнулись на призыв своей страны.""
 bdnspch.34.a: "''И я думаю вы на него откликнитесь!''"
 bdnspch.34.b: "''Но телефон... ну... он звонит, и... э-э-э.....''"
 bdnspch.35.t: "Борьба с Троллями"
 bdnspch.35.d: ""Слишком долго интернет сеял ненависть и раскол. Мы позволили субкультурам молодых людей попасть в пропасть; сколько людей сейчас идут умирать за тирана в Денвере, потому что они были радикализированы в этих чатах? У сил любви и единства не было ответа, пока в самые мрачные дни первой администрации не родился хэштег «Сопротивление». Используя свои платформы, они противостояли его махинациям и коррупции. Они следили за тем, чтобы его дела с нашими иностранными противниками были хорошо известны. Для меня большая честь принимать их в Белом доме. \n\nЯ могу только смотреть на таких ребят, как Гарри Сиссон и Дэш Доброфски, как на тех, кем должны стремиться быть молодые люди. Они стойкие американские патриоты, не националисты, которые ненавидят, а патриоты, люди, которые любят.  Мужчины, отцы, такие как мистер Пэделлан, который в социальных сетях выступает под ником BrooklynDad, матери и бабушки, такие как Эллисон Гилл, чей подкаст помог прояснить ужасающие откровения, прозвучавшие в докладе Мюллера, являются образцами обеспокоенных граждан, которые приняли меры. Я могу только надеяться, что больше американцев возьмут их за образец и будут бороться с пропагандой, которую им продаёт тиран и его союзники.""
 bdnspch.35.a: "''Не бойтесь говорить правду!''"
 bdnspch.35.b: "''И эти детки-вы знаете-когда Я был ребёнком... Тогда...''"
 bdnspch.37.t: ""
 bdnspch.37.d: ""
 bdnspch.37.a: ""
 bdnspch.37.b: ""
 bdnspch.38.t: "Прекрасная Америка"
 bdnspch.38.d: ""Находясь здесь, в доме великого Томаса Джефферсона, его любимом Монтичелло, я как никогда ощущаю груз прошлых поколений. Надежды и мечты наших революционных предков оправдались, но не полностью в свое время и не без кровопролития, лишений и политических разногласий. Надежды, изложенные в Декларации независимости, не были воплощены в Америке 1776, 1789 или 1865 годов; американцы не выбирали своих сенаторов до 1913 года; женщины не голосовали до принятия 19-й поправки, а чернокожим и коричневым американцам потребовалось время до 1964 года, чтобы получить причитающиеся им гражданские права. И все же Америка сделала все это, мы выполнили и продолжаем выполнять обещания!\n\nАмерика - это идея, прекрасная идея, что мужчины и женщины из всех слоев общества, наследия, культуры и убеждений могут собраться вместе и процветать. То, о чем отцы-основатели только догадывались, воплотилось в Америке; будь то трансгендер, чернокожий, гей или латиноамериканец, будь то богатый или бедный, все могут и должны процветать. Это и есть американская мечта, она реальна, ею живут каждый день предприниматели, социальные работники и родители по всей стране.""
 bdnspch.38.a: "''И когда мы восстановимся, мечта станет реальностью.''"
 bdnspch.38.b: "''И Джефферсон - э-э, но его рабы - построили этот великолепный дом..."
 bdnspch.39.t: "Уважайте Войска!"
 bdnspch.39.d: ""Соединенные Штаты столкнулись с величайшим вызовом, и все вы откликнулись на этот призыв. Самые заветные ценности нашей страны подвергаются нападению со всех сторон; коммунисты, фашисты и силы диктатуры Денвера отказались даже от притворства демократии, открыто призывая к разрушению нашей системы в пользу упорядоченной, авторитарной тирании. Вы видели их злодеяния и сразу же стали искать, как их предотвратить. Вы узнали о лишениях, которым подвергались ваши соотечественники на оккупированной врагом территории, и пошли добровольцем в величайшую в стране организацию, оказывающую помощь. Вы хотели поддерживать ценности, которые сделали нашу Республику величайшей из когда-либо существовавших в мире. Вы сделали все это и даже больше!\n\nНо есть и те, кто считает вас ниже себя, даже преступниками. Я слышал, как политики принижают ваши жертвы, называя ваши героические действия ненужными и даже «жестокими». Протестующие маршируют по нашим улицам, призывая к миру с террористами, которые ведут войну против них и всех остальных американцев. Я помню, как эти люди обращались с моим сыном Бо, когда он служил в Укр-Ираке, простите меня. Я знаю, как больно бороться за права человека и возвращаться домой с этим. Позвольте мне сказать вам следующее: мы не собираемся уступать им. Мы будем бороться с этой войной и победим.""
 bdnspch.39.a: "''Мы всегда будем уважать наших военнослужащих и никогда не забудем их жертв.''"
 bdnspch.39.b: "''Я... я, ну, я не буду, э-э, ну, ты уже закончил...''"
 bdnspch.40.t: "Равные Dозможности"
 bdnspch.40.d: ""Каждый день я поражаюсь достижениям американских женщин. Несмотря на то, что большую часть истории они были гражданами второго сорта, они взлетели на вершину науки, правительства и бизнеса, как только с них были сняты оковы фальшивых практик. Угнетение женщин на протяжении всей истории оправдывалось необходимостью, ради их же блага. Они были слишком пустоголовы, податливы и наивны, чтобы к ним относились как к равным. Их место было в доме и только в доме; они прекрасно справлялись там, но их таланты можно было бы лучше использовать и в других местах. \n\nЧто же мешает женщинам идти в вооруженные силы? Попробуйте обосновать это, не уподобляясь тем старикам, которые считали, что женщины не могут работать и жить самостоятельно, что они не могут владеть собственностью и вести бизнес, смею вас заверить. Женщины несут такую же ответственность, если не большую, чем мужчины. Наука показывает, что женщины - лучшие лидеры, чем большинство мужчин, что они лучше умеют работать в команде.""
 bdnspch.40.a: "''Это именно тот дух, который нам нужен в наших вооруженных силах!''"
 bdnspch.40.b: "''Женщины тоже могут... ну... могут умереть так же хорошо, как и любой мужчина!''"
 bdnspch.41.t: ""
 bdnspch.41.d: ""
 bdnspch.41.a: ""
 bdnspch.41.b: ""
 bdnspch.42.t: "Ни Шагу Назад!"
 bdnspch.42.d: ""На суше, на море и в воздухе наши войска сражаются за судьбу нашей демократии. Нигде в мире еще не было такого важного конфликта. Если мы проиграем эту битву, мы сдадим нашу страну тирану, фашистам, коммунистам или еще кому-нибудь похуже. Мы добились огромного прогресса, так много американцев вернулись в объятия своих семей, так много городов и поселков было освобождено, и так много военных преступников было уничтожено. И все же мы многое потеряли: Выжженные прерии, национальные сокровища, взорванные террористами, и бесчисленные солдатские жизни. Все это было не напрасно, мой сын, я чувствую, что каждый солдат - мой сын, погиб не напрасно.\n\nВы можете слышать безответственных репортеров, вражескую пропаганду и растерянных граждан, распространяющих слухи и глумящихся над мнимыми поражениями. Мы можем потерять землю, но не без боя. Мы можем потерять города, но не раньше, чем убедимся, что после нашего ухода им ничего не останется. Они могут заявлять о своих победах, но мы сделаем даже наше отступление тяжелым для них. Они скажут, что мы отступаем, но мы только начинаем. А теперь поймите,""
 bdnspch.42.a: "''Если вы не верите в победу, вы останетесь в прошлом!''"
 bdnspch.42.b: "''Если вы, э-э, не поймете, э-э-э, поймете...''"
 bdnspch.43.t: "Нейтралитет: Преступление"
 bdnspch.43.d: ""Нет хуже человека, чем тот, кто будет стоять в стороне и позволять творить зло. Для многих американцев, ежедневно терпящих лишения, причиняемые этой ужасной войной и тиранией человека, ответственного за нее, мысль о том, что можно быть нейтральным, абсурдна. Вы либо слуга тирана, либо демократический человек. Нет ничего промежуточного!\n\nСколько экспертов хотят, чтобы мы мирно общались с нашим так называемым "королем". Они думают, что он насытится, если мы немного покормим угрозу. Ошибаетесь! Она будет возвращаться, и фанатизм, который определяет правительство Денвера, навсегда заразит нашу страну.  Мы не можем вести себя так, будто это война между двумя похожими группировками. Это конфликт между злом, ненавистью и страхом с одной стороны и добром, любовью и надеждой - с другой. Здесь нет третьего пути, нет возвышения; это война за нашу демократию, права и будущее.""
 bdnspch.43.a: "''И без этого не обойтись!''"
 bdnspch.43.b: "''И эта, эм- Война покон-... все Войны!"
 bdnspch.44.t: "Непобеждённая Война"
 bdnspch.44.d: "Хотя я благодарен Университету Теннесси за то, что он предоставил мне время, чтобы поговорить с вами сегодня вечером, боюсь, что могу показаться немного подавленным. Я только что разговаривал со своим государственным секретарем Ллойдом Хьюстоном. Мне только что сообщили, что на фронте только что потеряли тысячу человек. Сегодняшний день, судя по всему, был кровавым. Тысяча человек, вы можете в это поверить? Многие из них были детьми, такими же, как вы. Я знал некоторых из них, должен был знать. Я столько раз выступал перед столькими солдатами. Это безумие, через что враг заставил нас пройти, через что он заставляет пройти эту страну! И ради чего? Чего они надеются добиться, когда все вокруг превратилось в пепел!\n\nМы не оставим этого. Когда мы победим, это, все это, будет отомщено. Те, кто добился своего с помощью издевательств, лжи и угроз, будут призваны к ответу за все, что они натворили. Предатели будут выброшены из своих цитаделей, а память о них будет изглажена из этой земли. Попомните мои слова, мы победим,"
 bdnspch.44.a: "''И когда мы это победим, они заплатят!''"
 bdnspch.44.b: "''И, если, ну, когда, э-э, они...''"
 bdnspch.45.t: "Битва в Небе"
 bdnspch.45.d: ""Сегодня я обращаюсь к вам с торжественной просьбой. Как вам уже хорошо известно, наша страна столкнулась с беспрецедентным кризисом, который бросил тень на всех нас. Суровая реальность такова, что мы ежедневно становимся свидетелями гибели людей - как солдат, так и мирных жителей. Вполне вероятно, что некоторых из вас лично коснулись эти страдания: члены их семей или друзья переживают сейчас невообразимые трудности. В такие моменты, когда ситуация может казаться непомерно тяжелой, а надежда - ускользающей, очень важно помнить, почему мы участвуем в этой борьбе. Мы боремся не только за то, чтобы защитить себя; мы боремся за нечто гораздо более глубокое. Мы боремся за свободу, за сохранение демократии и за фундаментальное право каждого человека жить в мире и гармонии. \n\nНаши сухопутные войска находятся на передовой, участвуя в ожесточенных сражениях и неся огромные жертвы. Именно они принимают на себя основную тяжесть конфликта, прокладывая путь к великой цели, которой мы все дорожим. Их храбрость и стойкость закладывают основу для будущих побед, к которым мы стремимся. В этот переломный момент я призываю вас оказать непоколебимую поддержку этим храбрым мужчинам и женщинам. Ваша роль, несмотря на то, что она может быть сопряжена с определенными трудностями и стрессами, имеет огромное значение. Ваши усилия в воздухе - это не просто тактические маневры, а жизненно важные компоненты нашей всеобъемлющей стратегии. Ваша работа окажет огромное влияние на будущие сражения, и каждая миссия, которую вы выполняете, имеет решающее значение для определения хода этой войны. Помните, что ваша самоотверженность и упорный труд являются залогом нашего общего успеха. Каждый полет, каждая миссия и каждый момент усилий способствуют достижению более широкой цели и приближают нас к достижению наших общих целей. Будем ли мы и впредь держаться вместе, руководствуясь ценностями, которыми мы дорожим, и делом, за которое мы ратуем...""
 bdnspch.45.a: "''...И ваши усилия запомнятся надолго!''"
 bdnspch.45.b: "''...И-и вы... далеко пойдёте в... запоминании... э-э-э.''"
 bdnspch.46.t: "Пределы И Выход за Них"
 bdnspch.46.d: "''Новоиспеченные пилоты 1-го истребительного авиакрыла, прежде всего, позвольте мне от всей души поздравить вас с достижением этого важного рубежа. Завершение обучения - это не маленький подвиг; это бесчисленные часы упорного труда, преданности и настойчивости. Вы столкнулись с многочисленными трудностями, и сегодня вы являетесь свидетельством своего упорства и решимости. Я искренне горжусь каждым из вас. Теперь, отбросив эти похвалы, позвольте мне поговорить с вами откровенно. Путь, который вам предстоит пройти, не будет легким. Ваша будущая работа, ваши предстоящие миссии, ваши задания - все, что вам предстоит сделать, - подвергнет вас таким испытаниям, которые вы даже представить себе не можете. Они будут сопряжены со стрессом, опасностью и возможностью серьезных последствий. Ставки высоки, и вы столкнетесь с ситуациями, которые поставят крест на вашей выдержке и храбрости. Я не сомневаюсь, что многие из вас испытывают чувство нервного предвкушения. Поверьте, если бы я был на вашем месте, я бы разделял эти чувства. Ваши пределы будут растянуты до самого края и даже дальше. И все же вы здесь, готовые принять предстоящие испытания. \n\nЭто то, что я называю настоящей храбростью - храбрость, проявляющаяся перед лицом страха и испытаний. Именно это мужество я призываю каждого из вас воплотить в жизнь, двигаясь вперед. Вы должны встречать каждый вызов с головой, каким бы страшным он ни казался. Каждый день будет создавать новые препятствия и трудности, но именно преодолевая их, вы достигнете величия. То, что вы сделаете, будет выдающимся и определит будущее наших ВВС и нашего Союза. Помните, что важность выхода за пределы своих возможностей невозможно переоценить. Неспособность сделать это может привести к тяжелым обстоятельствам, из которых, возможно, не будет легкого выхода. Ваши действия не будут забыты; их будут помнить как отражение вашей приверженности и вашего мужества. В заключение я оставляю вам ваш девиз - фразу, в которой заключена суть вашего путешествия и дух, с которым вы должны подходить к каждому вызову. Пусть она станет для вас руководящим принципом, когда вы будете двигаться вперед, прокладывая свой путь в качестве элитных пилотов 1-го истребительного авиакрыла.""
 bdnspch.46.a: "''Aut Vincere Aut Mori, Победа или Смерть.''"
 bdnspch.46.b: "''Auto V-vin...Vincere, Aut...M-...ori.''"
 bdnspch.47.t: "Создавая Самолёты Демократии"
 bdnspch.47.d: ""Работники этого уважаемого завода, сегодня я стою перед вами, чтобы решить вопрос глубокой важности. Ваша работа здесь - это не просто работа; это критически важный вклад в дело, более великое, чем мы сами, - дело демократии. Характер стоящей перед нами задачи требует не просто усердия, он требует необычайной самоотдачи и самопожертвования. Самолеты, которые вы тщательно собираете, ракеты, которые вы разрабатываете, боеприпасы, которыми вы запасаетесь, - каждый из этих элементов играет решающую роль в нашей постоянной борьбе. Я понимаю, что вы неустанно трудитесь, вкладывая силы в каждый компонент, и за это я вам глубоко признателен. Однако серьезность нашей ситуации требует еще больших усилий. Союз требует этого, и от этого зависит наше будущее. \n\nЭто то, что я называю настоящей храбростью - храбрость, проявляющаяся перед лицом страха и испытаний. Именно это мужество я призываю каждого из вас воплотить в жизнь, двигаясь вперед. Вы должны встречать каждый вызов с головой, каким бы страшным он ни казался. Каждый день будет создавать новые препятствия и трудности, но именно преодолевая их, вы достигнете величия. То, что вы сделаете, будет выдающимся и определит будущее наших ВВС и нашего Союза. Помните, что важность выхода за пределы своих возможностей невозможно переоценить. Неспособность сделать это может привести к тяжелым обстоятельствам, из которых, возможно, не будет легкого выхода. Ваши действия не будут забыты; их будут помнить как отражение вашей приверженности и вашего мужества. В заключение я оставляю вам ваш девиз - фразу, в которой заключена суть вашего путешествия и дух, с которым вы должны подходить к каждому вызову. Пусть она станет для вас руководящим принципом, когда вы будете двигаться вперед, прокладывая свой путь в качестве элитных пилотов 1-го истребительного авиакрыла.""
 bdnspch.47.a: "''Не Подведите Союз.''"
 bdnspch.47.b: "''Я... э-э... еще с-с-самолетов.''"

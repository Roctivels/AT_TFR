 USB_appalachain_insurgency: "Сельские Повстанчества"
 USB_appalachain_insurgency_desc: "Несмотря на то, что на бумаге Союз Америки контролирует значительную часть Среднего Атлантического океана, на практике он практически не контролирует страну за пределами городов и основных автомагистралей. В сельской местности множество ополченцев, выступающих за Трампа, затаились в засаде, нападая на ничего не подозревающие федеральные конвои, направляющиеся для снабжения войск на Среднем Западе. В центре этого спланированного мятежа находится Западная Вирджиния, чей гористый рельеф идеально подходит для такого рода предательства.\n\nОбеспечение контроля над Западной Вирджинией имеет решающее значение для военных действий, поскольку ее расположение в середине коридора Вашингтон - Чикаго служит важным пунктом для поставок, направляющихся на фронт."

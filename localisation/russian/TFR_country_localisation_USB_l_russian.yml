 usb.116.a: "Сохраним традиции."
 usb.117.t: "Праймериз Республиканской Партии"
 usb.117.desc: "Хотя может показаться, что Республиканская партия раскололась на две части, на самом деле без Трампа она стала гораздо более стабильной, единой и решительной партией, которая теперь готовится к участию в предстоящих выборах.Большинство сторонников, однако, вращаются вокруг двух кандидатов, и кажется, что единственный вопрос заключается в том, кто станет лицом партии и кто будет вице-президентом в предстоящей гонке.\n\nМитт Ромни - давний сторонник Трампа и считается сочувствующим консерватором с момента его неудачной борьбы с Обамой в 2008 году. Многие американцы ценят его позитивность и двухпартийность и считают его единственным защитником консерватизма в Америке на данный момент.\n\nНикки Хейли появилась совсем недавно после разрыва с Трампом и выделяется как убежденная сторонница военно-промышленного комплекса, некоторые даже называют ее неоконом. Хотя это обычно не пользуется популярностью у большинства американцев, текущие события показывают, что это может привлечь довольно сильную базу избирателей."
 usb.117.a: "Митт Ромни"
 usb.117.b: "Никки Хейли"
 
 usb.119.t: "Вопрос о Байдене"
 usb.119.d: "Должен ли он остаться или уйти?"
 usb.119.a: "Пусть Остаётся."
 usb.119.b: "Уходи!"
 usb.120.t: "Вопрос "Голубых Псов""
 usb.120.desc: "Продолжающееся восстание Трампа поставило под вопрос многие аспекты Демократической партии. В частности, фракция «Коалиция Голубых Псов», состоящая из умеренных консерваторов. Многие выразили свою озабоченность по поводу этой позиции, заявив, что они часто голосуют вместе с Трампистами по различным республиканским законопроектам, и, хотя они не поддерживают Трампа открыто со времен гражданской войны, они также отказываются осуждать его действия, продолжая работать так же, как и раньше. Конечно, мы можем предпринять некоторые действия, чтобы эффективно ограничить их привилегии, хотя это и помешает их усилиям, которые потенциально могут оказаться полезными."
 usb.120.a: "Мы должны привлечь на свою сторону всех, кого можем!"
 usb.120.b: "Слишком много "собачьих свистков"..."
 usb.121.t: "Появление Демократов Кеннеди"
 usb.121.desc: "После того как РФК-младший фактически обеспечил себе выдвижение от Демократической партии, многие его сторонники пришли в партию, а некоторые действующие политики объявили о своих планах всецело поддержать планы Кеннеди в отношении страны. Похоже, что либеральный популизм сейчас находится на подъеме, являясь своего рода заменой опасному правому популизму Трампа. Этому движению еще предстоит пройти долгий путь в определении многих своих политических позиций, однако очевидно, что оно будет существовать."
 usb.121.a: "Вместе к Величию."
 usb.122.t: "Христианские Консерваторы Бегут от Трампа!"
 usb.122.desc: "После выборов многие разумные республиканцы, отказавшиеся поддержать попытки Трампа отменить результаты выборов и остаться на своем посту, включая вице-президента Трампа Майка Пенса, как ни странно, попытались снова переметнуться к Трампу и, что неудивительно, были отвергнуты, и теперь ищут убежища в Вашингтоне. Хотя их все еще хвалят за то, что они отвергли Трампа до гражданской войны, принятие их сейчас может быть расценено как плохая оптика."
 usb.122.a: "Пенс чтит Конституцию, у него будет свое место в Конгрессе."
 usb.122.b: "Кучка католических уродцев."
 usb.123.t: "Умеренные в ДСА высказывают свое мнение"
 usb.123.desc: "Демократические социалисты Америки были довольно заметны еще до гражданской войны, хотя для участия в выборах и победы на них им приходилось опираться на поддержку демократов. С началом гражданской войны большинство радикальных членов ДСА перешли на сторону повстанческой Американской народно-освободительной армии на западе страны, однако большинство представителей умеренного крыла предпочли остаться в партии вместе с прогрессистами.\n\n Однако после недавних выборов они привлекли к себе гораздо больше внимания благодаря своему участию в кампании, и, похоже, теперь они готовы начать самостоятельную политическую деятельность."
 usb.123.a: "Великая партия с великой историей."
 usb.123.b: "Почему бы им просто не присоединиться к нам?"
 usb.124.t: "Возвращение Либертарианской Партии"
 usb.124.desc: "Теперь, когда Трамп уничтожен и нет никаких сомнений в том, какое федеральное правительство действительно законно, Либертарианская партия объявила о своей поддержке нас, создав политические центры и начав действовать на территории, находящейся под нашим контролем. Несмотря на то что некоторые более ястребиные элементы из числа сторонников Трампа откололись и теперь продолжают саботировать нас, Джо Йоргенсену удалось объединить большинство либертарианцев во имя восстановления целостности Америки."
 usb.124.a: "Конечно."
 usb.125.t: "Партия "Вперед" Набирает Популярность"
 usb.125.desc: "Наши недавние усилия по поддержке предпринимательства и технологических компаний привели к всплеску активности партии Forward, выдвинутой бизнесменом и членом демократической партии Эндрю Янгом. Изначально созданная как PAC, сейчас она превратилась в заметную организацию и политическое движение, которое может даже подтолкнуть Янга к победе в номинации демократической партии на следующих президентских выборах.\n\nХотя многие центристы обеспокоены их популистской и реформистской риторикой, некоторые из их предложений уже рассматриваются в конгрессе. Однако остается вопрос, стоит ли позволять им реализовываться."
 usb.125.a: "У них есть несколько хороших идей, давайте возьмем их на вооружение."
 usb.125.b: "Это здорово! Удачи в день выборов."
 usb.126.t: "Трансгуманистическая Партия Набирает Обороты"
 usb.126.desc: "Поскольку корпорации захватывают все больше и больше правительственных учреждений, большинство политических сил отвернулись от нас, оставив нас на произвол судьбы. Однако это позволило некоторым по-настоящему инновационным и прогрессивным людям получить определенную поддержку, одной из которых, конечно же, является Трансгуманистическая партия! С их полным одобрением реализация наших общих идей по улучшению человечества и достижению новых технологических прорывов может быть осуществлена в кратчайшие сроки!"
 usb.126.a: "Добро Hожаловать!"
 usb.126.b: "Они бесполезны."
 usb.127.t: "Противоположность Коллективной Безопасности"
 usb.127.desc: "Во время дерзкого визита на передовую советники Хиллари посоветовали ей встретиться с государственными служащими, которые отказались сотрудничать с мятежниками Трампа. Как бы ей ни не хотелось, это хоть как-то могло спасти ее стремительно ухудшающийся имидж.\n\nПосле некоторых формальностей, улыбок и рукопожатий, она проходила мимо агентов налоговой службы. Один из них выделялся: это был очень... очень большой мужчина на самокате, на его футболке XXXL было написано "#1 ФАНАТ ХИЛЛАРИ".\n\n"О, посмотрите на него! Такой большой парень! Уверен, если ты проголосуешь за меня, то зачтётся сразу три голоса!"\n\n"Эээ..." - пробормотал мужчина, отводя взгляд вниз.\n\n"Что ты сказал, здоровяк? О... Ты пахнешь так же... по-крупному..." - сказала Хиллари, наклоняясь ближе.\n\n"Эээ... За Трампа..."\n\nРеакция Хиллари была достаточно быстрой, чтобы сморщиться при звуке последнего слова. Но недостаточно быстрой, чтобы отреагировать на громкий звук и яркую вспышку, последовавшую за ним.\n\nПосле этого она уже ни на что не могла реагировать - ее уши находились на расстоянии около 500 метров, а глаз больше не существовало."
 usb.127.a: "Меньше всего я ожидал, что налоги будут взиматься и за количество тел."
 usb.128.t: "Мои, э, Соотечественники-Американцы..."
 usb.128.desc: "...дамы и, э, господа. Многие из вас, возможно, находятся в легком шоке от недавних событий. И я солгу, если скажу, что это, эм, не так. И мы все хотели бы получить объяснения прямо сейчас.\n\nМы все были в ужасе от, э, трагического убийства секретаря, то есть президента Клинтона, руками радикального террориста-трамписта техасского происхождения. И моя жена, Мишель... а также лидеры Конгресса Чак и э.. Нэнси Пелоси обратились к открытому кризису лидерства в нашей стране и попросили меня вступить в должность временного, эм, президента, что я и сделал. Я был вашим президентом раньше и я ваш президент.. сейчас.\n\nТак что мы собираемся, э, вернуть эту страну на путь истинный. Мы сделаем наши общины безопасными, а нашу экономику сильной, как это было, э, во времена моего президентства. И я хочу, чтобы все знали, что это не нация Трампа, не нация, эм, Гитлера или Маркса, как хотят заявить эти.. радикалы. Это Ваша нация.\n\nМы вернем надежду американским семьям. И все, что я хочу попросить у вас, эмм, это быть такими же надеющимися, как и я. Да благословит Господь, э, Соединенные Штаты Америки."
 usb.128.a: "Надежда - Барак"
 usb.129.t: "Новый Вице-Президент"
 usb.129.desc: "Так э-э, Конгресс попросил меня вмешаться, но голосовать за нового вице-президента придется им самим. Хотя я могу предложить несколько, э-э, хороших кандидатур, похоже, окончательное решение все равно за ними."
 usb.129.a: "Давай позовем, эм, Тима... нет, я имел в виду другого Тима... Неважно, одного из них."
 usb.129.b: "Джо уже имеет опыт, так что, э-э, почему бы и нет."
 usb.129.c: "Моя жена, Мишель, хотела бы, э-э, продолжить работу в качестве вице-президента."
 usb.129.w: "Давайте позовем, э-э, этого старика, я слышал, они по нему скучают."
 usb.130.t: "Месть на Другой Раз"
 usb.130.desc: "3. 2. 1.\n"Вперёд, вперёд, вперёд!"\nДверь в дом слетела с петель, и отряд Союза вошел внутрь.\nЧерез тридцать минут дом был очищен.\n\nОполченцев выносили одного за другим. К счастью, ячейка повстанцев была застигнута врасплох, поэтому штурм встретил минимальное сопротивление.\nНо все же. Это создало другую проблему.\n\n"Мужик, как мы поступим со всеми этими пленными?" Солдат прошептал.\n\nПленников вывели и уложили на зеленую траву Огайо, солнце пробивалось сквозь ветви и падало им на спины. Отряд солдат сгрудился вокруг них.\nНикто не сообщил в штаб, что рейд был успешным.\n\n"Посмотрите на этих парней, думающих, что они спасители Америки или во что они там верят." сказал один из темнокожих солдат, неловко держа свой M240, так как ремни стягивали его шею. \nНачальник отряда посмотрел на него.\n"Держи себя под контролем, пулеметчик." сказал он.\n\nПулеметчик приблизился к лицу мужчины и посмотрел на командира отряда.\n"Почему я должен это делать? Эти парни принадлежат к той же группе, которая линчевала мою сестру, и некоторые из тех расистских ублюдков, которые это сделали, возможно, сейчас здесь! И что, я должен просто отпустить их?"\n\nОстальные солдаты нервно смотрели на этих двоих. Одни приняли сторону стрелка, другие - нет.\n\n"У вас будет шанс отомстить в другой раз, но на поле боя, а не за его пределами. Мы не монстры, и мы не собираемся казнить этих военнопленных, как ИГИЛ-овцы. Я ясно выражаюсь?"\n\nПулемётчик еще несколько мгновений смотрел на него, прежде чем пробормотал "Так точно.""
 usb.130.a: "Война развращает всех."
 usb.131.t: "Ежедневный Труд"
 usb.131.desc: "Каждое утро ровно в пять Сара Уильямс отпирала дверь своего кафе, как делала это каждый день на протяжении последних двенадцати лет. Она протирала потускневшие чашки, делая вид, что не замечает новый военный контрольно-пропускной пункт на другой стороне улицы. Шипение пара из кофеварки маскировало редкие далекие взрывы. Телевизор на стене всегда был настроен на минимальную громкость, прокручивая бесконечные сводки новостей. Сара знала, что ее клиенты смотрят, но все делали вид, что сосредоточены на кофе и завтраке.\n\n"У меня есть немного зерен Panama Red Label," сказала она пожилому мужчине, сидевшему в углу, нарочито бодрым тоном. Он кивнул, одетый в старую военную форму, помешивая давно остывший кофе. Сара знала, что его сын пропал без вести в бою в прошлом месяце, но она, как обычно, наполнила его чашку, ничего не сказав. Каждые два часа мимо кафе проходил патруль. Сара всегда следила за тем, чтобы в эти минуты по радио звучали безобидные старые мелодии - иногда Элла Фицджеральд, иногда Луи Армстронг. Ностальгическая музыка словно поворачивала время вспять, хотя бы на мгновение.\n\n"Дела идут хорошо?" иногда спрашивал патрульный солдат, покупая кофе. Сара улыбалась своей профессиональной улыбкой. "Как всегда, держимся." Больше она ничего не говорила, как и не спрашивала, как дела у клиентов. Каждый вечер, прежде чем закрыться, Сара проводила инвентаризацию запасов. Это происходило не потому, что в кафе было много народу, а потому, что рутина создавала иллюзию, что жизнь по-прежнему нормальна. Она отмечала, что нужно пополнить, даже зная, что завтрашние поставки могут снова задержаться из-за продолжающегося конфликта.\n\n"До завтра," сказала она последнему клиенту, как будто завтрашний приход был несомненным. Когда она закрывала дверь, то услышала вдалеке слабые отголоски выстрелов. Но, как всегда, она спокойно полировала табличку "Открыто" на стеклянной двери."
 usb.131.a: ""Хотите сегодня выпить кофе?""
 usb.132.t: "Падение Денвера"
 usb.132.d: "В результате решительной победы Федерального правительства Союза Америки, Денвер, столица так называемого Американского конституционного правительства Трампа, было отвоевано после нескольких недель интенсивных боевых действий. Падение Денвера считается критическим поворотным моментом в продолжающемся конфликте, поскольку федеральные силы нанесли значительный удар по остаткам сепаратистского режима Трампа. Наступление на Денвер началось после того, как федеральные войска захватили Колорадо-Спрингс и Форт-Коллинз, перерезав ключевые линии снабжения конституционалистов, укрепившихся в Денвере. После почти нескольких недель изнурительных боев федеральные войска объявили город полностью освобожденным. Изображения солдат, поднимающих флаг Союза Америки над Капитолием штата Колорадо, уже стали символом возрожденной власти федерального правительства.\n\nХотя захват Денвера является огромной победой для федерального правительства, конфликт еще далек от завершения. Американское конституционное правительство, хотя и ослабленное, продолжает удерживать территории в Скалистых горах, а партизанская война и террористические акты со стороны сторонников Трампа остаются постоянной угрозой на недавно освобожденных территориях.\n\nНесмотря на эти проблемы, отвоевание Денвера является мощным заявлением о решимости федерального правительства восстановить порядок и единство в раздираемой конфликтами стране. На данный момент американский флаг вновь высоко развевается над Скалистыми горами."
 usb.132.a: "Конец конституционалистов?"
 usb.133.t: "Освобождение Миннеаполиса"
 usb.133.d: "В результате ошеломляющей победы федерального правительства Союза Америки, федеральные силы захватили Миннеаполис, важнейший оплот американского конституционного правительства Трампа, в рамках недавно начатой операции "Стил". Стремительный штурм знаменует собой значительный прорыв в первые месяцы Второй гражданской войны в США.\n\nНазванная в честь генерала Фредерика Стила, командующего войсками Союза, известного своими быстрыми организационными усилиями во время Первой гражданской войны в США, операция "Стил" была направлена на систематический демонтаж базы власти Трампа на Среднем Западе. Поскольку силы Трампа глубоко окопались в Миннесоте, Айове, Небраске и Миссури, федеральное командование поставило перед собой задачу скоординированного многоцелевого наступления, чтобы перерезать линии снабжения, захватить ключевые города и помешать Трампу укрепить свою власть в регионе.\n\nФедеральные силы начали операцию "Стил" с нападения на Миннеаполис в стиле блицкрига, используя комбинацию воздушных бомбардировок, мотопехоты и точечных ударов беспилотников. Целью атаки было подавить силы конституционалистов, прежде чем они смогут организовать сплоченную оборону.\n\nВ Заявлении для прессы Белого дома отмечается, что "падение Миннеаполиса демонстрирует нашу непоколебимую приверженность восстановлению мира, справедливости и демократии в этой стране. Враги свободы отступают, город за городом, штат за штатом. Мы не успокоимся, пока Америка вновь не объединится.""
 usb.133.a: "Марш на Запад, освободители Америки!"
 usb.134.t: "Освобождение Сент-Луиса"
 usb.134.d: "В ходе того, что расценивается как крупный прорыв правительства Байдена, силы Союза захватили Сент-Луис, важнейший логистический центр Центральной зоны обороны Конституционного правительства США, в рамках более широкой операции "Стил".\n\nСент-Луис, долгое время считавшийся важным логистическим центром для сил Трампа, стал главной мишенью из-за своего стратегического расположения вдоль реки Миссисипи и важного железнодорожного сообщения с остальной частью Среднего Запада. Контроль союза над рекой Миссисипи был необходим для срыва усилий конституционалистов по пополнению запасов - военно-морские силы союза, дислоцированные вдоль реки, успешно пресекли поставки продовольствия, боеприпасов и медикаментов, предназначенных для защитников Трампа. После ожесточенных боев флаг Союза Америки гордо развевается над аркой ворот в качестве символического жеста возвращения города.\n\nПотеря Сент-Луиса побудила силы конституционалистов перегруппироваться дальше на запад, особенно в Канзас-Сити и Омахе, где, как полагают, командиры лоялистов планируют контрнаступление. В то время как федеральные войска продолжают свое наступление по Среднему Западу, битва за будущее Америки продолжается."
 usb.134.a: "Еще один Город, Свободный От Авторитаризма!"
 usb.135.t: "Падение Оклахома-Сити"
 usb.135.d: "Правительство Трампа, похоже, находится на последнем издыхании, поскольку силы Союза Америки захватили Оклахома-Сити, важнейший узел, соединяющий временную столицу Трампа Денвер с богатыми нефтью территориями Техаса. Эта операция, являющаяся частью амбициозной операции президента Джо Байдена "Стил", направлена на подавление и демонтаж опорных пунктов Трампа на Среднем Западе. Федеральное командование определило Оклахома-Сити как жизненно важную цель из-за его стратегического расположения вдоль основных автомагистралей и железнодорожных линий, соединяющих Денвер с Техасом. Город также служит важнейшим узлом распределения нефти и продовольствия, обеспечивая топливом и ресурсами, необходимыми для военных действий Трампа. Контроль над городом означал контроль над потоком жизненно важных ресурсов, включая нефть, оружие и продовольствие.\n\nОперация началась с массированной воздушной и артиллерийской бомбардировки - в течение 48 часов подряд федеральные самолеты, бомбардировщики и беспилотные летательные аппараты наносили удары по ключевым военным объектам, нефтеперерабатывающим заводам, узлам связи и известным опорным пунктам ополчения в городе. Как только федеральные войска прорвали внешнюю оборону города, сражение переросло в ожесточенную городскую битву, когда войска конституционалистов и ополченцы превратили Оклахома-Сити в укрепленный лабиринт. Сторонники Трампа потратили недели на подготовку оборонительных сооружений, превращение зданий в крепости, рытье траншей и установку импровизированных минных полей в ключевых районах.\n\nПоскольку войска Трампа продолжают отступать все дальше на Запад, дорога на Денвер теперь широко открыта."
 usb.135.a: "На Денвер!"
 usb.135.b: "Серьезный удар по конституционалистам."
 usb.135.c: "Боже, Храни Америку, Потому что Вашингтон Этого Не сделает.!"
 usb.136.t: "Падение Канзас-Сити"
 usb.136.d: "В рамках операции "Макклеллан" федеральные силы захватили Канзас-Сити - знаменательное поражение американского конституционного правительства, которое обеспечивает Союзу беспрецедентный контроль над транспортными сетями и системами снабжения Среднего Запада. Канзас-Сити является ключевым узлом для переброски грузов, войск и ресурсов по мятежному Среднему Западу. Контроль над Канзас-Сити позволял войскам Трампа поддерживать относительно стабильную линию снабжения, обеспечивая их военные действия ресурсами как из сельскохозяйственного центра Среднего Запада, так и поставками нефти из Техаса. Кроме того, захват Канзас-Сити лишает силы Трампа важнейшей производственной базы, которая поставляла боеприпасы, транспортные средства и другие предметы первой необходимости в военное время лоялистским группировкам по всему Среднему Западу.\n\nНесмотря на успех операции "Стил", федеральные силы продолжают сталкиваться с ожесточенным сопротивлением сторонников АКП, действующих на Среднем Западе. В первые дни после захвата города уже появлялись сообщения о нападениях партизан, саботаже и убийствах.\n\nВ то время как федеральные силы готовятся к дальнейшему продвижению на запад, администрация президента по-прежнему полна решимости ликвидировать все оставшиеся очаги сопротивления. Теперь, когда Канзас-Сити находится под федеральным контролем, Союз Америки готов к дальнейшему продвижению на Средний Запад. Но война далека от завершения, и битва за будущее Америки продолжается."
 usb.136.a: "Hail to the Chiefs!"
 usb.137.t: "ОТЧЁТ: Операция Стил"
 usb.137.d: "ВОЕННЫЙ ОТЧЕТ СОЮЗА АМЕРИКИ\nОПЕРАЦИЯ СТИЛ: ОТЧЕТ О НАЧАЛЕ\nВыпущено: Министерством обороны\nКлассификация: СОВЕРШЕННО СЕКРЕТНО\n\nОперация "Стил" - это крупномасштабная, многоэтапная военная кампания по подрыву и ликвидации материально-технических и военных оплотов американского конституционного правительства на Среднем Западе. Основные цели операции - перерезать ключевые линии снабжения, ликвидировать региональные командные центры и лишить АКП возможности проводить скоординированные контрнаступления.\n\nКЛЮЧЕВЫЕ ЦЕЛИ: СЕНТ-ЛУИС, МИННЕАПОЛИС, КАНЗАС-СИТИY\n\nНАМЕЧЕННЫЙ СРОК: 5 МЕСЯЦЕВ\n\nНЕВЫПОЛНЕНИЕ ПОСТАВЛЕННЫХ ЗАДАЧ ПРИВЕДЕТ К ДОЛГОЙ, ЗАТЯЖНОЙ ПАРТИЗАНСКОЙ ВОЙНЕ С СИЛАМИ КОНСТИТУЦИОНАЛИСТОВ."
 usb.137.a: "Понял."
 usb.138.t: "ОТЧЁТ О ОПЕРАЦИИ СТИЛ: ПРОВАЛ"
 usb.138.d: "После года ожесточенных боев по всей линии фронта Министерство обороны сообщает, что операция "Стил" не достигла своей главной цели - ликвидации оплотов власти конституционалистов на Центральном Среднем Западе.\n\nНесмотря на первоначальные успехи, достигнутые благодаря подавляющему превосходству в воздухе, федеральные силы столкнулись с неожиданно ожесточенным сопротивлением, в результате чего наступление застопорилось и в конечном итоге потерпело крах. Силы конституционалистов под эффективным руководством предприняли скоординированные контратаки и воспользовались критическими слабостями в федеральных линиях снабжения, что в конечном итоге вынудило к стратегическому отступлению из нескольких секторов. Федеральные силы понесли большие потери из-за постоянных нападений партизан и засад, в то же время страдая от плохой координации между бронетанковыми подразделениями и пехотными подразделениями. Кроме того, постоянные перебои в цепочке поставок серьезно подорвали успех операции "Макклеллан".\n\nДля предотвращения дальнейших оперативных сбоев требуется немедленная переоценка и пересмотр тактической доктрины, которые будут представлены президенту Соединенных Штатов в ближайшие 48 часов."
 usb.138.a: "Понял."
 usb.139.t: "ОТЧЁТ О ОПЕРАЦИИ СТИЛ: УСПЕХ"
 usb.139.d: "За последние несколько месяцев Вооруженные силы Соединенных Штатов Америки добились подавляющего успеха в подавлении мятежа конституционалистов, установив контроль над ключевыми опорными пунктами на Среднем Западе. Все основные цели были достигнуты, и федеральное правительство Американского союза теперь сохраняет контроль над Средним Западом, фактически отрезая силы Трампа от их основных материально-технических ресурсов. Ожидается, что успех операции "Стил" ускорит усилия Союза по воссоединению нации.\n\nРезультат: все основные автомагистрали, железнодорожные линии и пути снабжения, соединяющие Денвер с Техасом и Великими равнинами, были перекрыты или взяты под федеральный контроль, в то время как ключевые города Среднего Запада, такие как Миннеаполис, Сент-Луис и Оклахома-Сити, были освобождены. Дорога на Денвер теперь широко открыта, поскольку ведется подготовка к операции "Шеридан" - заключительному наступлению, направленному на захват Денвера и окончание Второй гражданской войны в Америке."
 usb.139.a: "Боже, благослови Америку!"
 usb.140.t: "ОТЧЁТ: Операция Грант"
 usb.140.d: "ВОЕННЫЙ ОТЧЕТ АМЕРИКАНСКОГО СОЮЗА\nОПЕРАЦИЯ ГРАНТ: ОТЧЕТ О НАЧАЛЕ\nВыпущено: Министерством обороны\nКлассификация: СОВЕРШЕННО СЕКРЕТНО\n\nВ ответ на провал операции "Стил" и последующие контрнаступления конституционалистов Министерство обороны инициировало операцию "Грант" - крупномасштабную оборонительную кампанию, направленную на сохранение контроля над Чикаго и Индианаполисом. Оба города служат важнейшими логистическими, промышленными и административными центрами для федеральных операций на всем Среднем Западе. Согласно сообщениям, силы Трампа под руководством генерала Майкла Флинна сосредоточили свои усилия в Чикаго и Индианаполисе, стремясь открыть путь к Вашингтону, округ Колумбия. Если наступление конституционалистов увенчается успехом, то эти цели обеспечат АКП крупную пропагандистскую победу и подорвут способность Союза оказывать давление на конституционалистские силы на Западе.\n\nКЛЮЧЕВЫЕ ЦЕЛИ: ЗАЩИТИТЬ ЧИКАГО И ИНДИАНАПОЛИС"
 usb.140.a: "Понял."
 usb.141.t: "ОТЧЁТ: Операция Шеридан"
 usb.141.d: "ВОЕННЫЙ ОТЧЕТ АМЕРИКАНСКОГО СОЮЗА\nОПЕРАЦИЯ ШЕРИДАН: ОТЧЕТ О НАЧАЛЕ\nВыпущено: Министерством обороны\nКлассификация: СОВЕРШЕННО СЕКРЕТНО\n\nПосле успешного завершения операции "Стил", в ходе которой были захвачены ключевые опорные пункты на Среднем Западе и перерезаны линии материально-технического обеспечения американского конституционного правительства, началась вторая фаза войны - операция "Шеридан". Цель этой кампании - захватить Денвер, временную столицу правительства Дональда Трампа, устранить оставшееся руководство конституционалистских сил и положить конец восстанию на Среднем Западе.\n\nКЛЮЧЕВАЯ ЦЕЛЬ: ЗАХВАТИТЬ ДЕНВЕР."
 usb.141.d: "Понял."
 
 usb.100.t: "На Ладони Калигулы"
 usb.100.d: ""
 usb.100.a: "И это только начало."
 
 usb.101.t: "Камала Харрис Стала Гёрл Боссом #1"
 usb.101.d: "ОТ: Vox\nАвтор: Адам Джарате\n\nКак Камала Харрис стала вице-президентом #1 "Гёрл Босс" Америкb После честных и ярких выборов дуэт Байден-Харрис набирает популярность по всей Америке. Старомодное обаяние президента и ловкость вице-президента и его стремление идти напролом принесли им звание "Лучшей надежды Америки" на таких сайтах, как Reddit и Tumblr.\n\nОднако Харрис заметно опережает своего старшего партнера. Она не только лидирует в опросах по поддержке женщин и цветных людей, но даже обычные белые мужчины быстро привыкают к ее удивительному остроумию. Некоторые даже создали группу под названием "Белые чуваки за Харрис", явно готовясь к ее возможной президентской гонке в 2028 году.(...)\n\nНесмотря на тяжелые времена, переживаемые Америкой в настоящее время, свет новой эры политиков может спасти нас от мрака и уныния. Такие политики, как Камала Харрис, которые являются не только иконами прогресса и инклюзивности, но и способными лидерами штатов, ставящими на первое место избирателей и их проблемы, скоро придут на смену своим старым предшественникам. Благодаря этому мы уйдем от ненавистной и фанатичной политики эпохи Трампа.\n\nМы можем надеяться только на лучшее. По словам самой госпожи вице-президента: "Моя мама иногда устраивала нам скандалы и говорила: 'Я не знаю, что с вами такое, молодёжь. Вы что упали с кокосового дерева?'""
 usb.101.a: "Она черная, храбрая и говорящая!" 
 usb.102.t: "Как Бёрни Захватил Твитч"
 usb.102.d: "ОТ: Polygon\nАвтор: Ана Яйкина\n\nБерни Сандерс на несколько часов захватил интернет после того, как принял участие в Twitch-стриме с прогрессивными стримерами.\nСенатор США Берни Сандерс принял участие в Twitch-стриме вместе с суперпопулярными креаторами. Мероприятие позволило Сандерсу поговорить о проблемах и вызовах, с которыми сталкивается не только Америка, но и многие молодые американцы. Среди основных тем: студенческие долги, кризис в нескольких штатах, корпоративный лоббизм против рядовых граждан и, конечно же, отсутствие грамотной системы здравоохранения. В течение вечера зрителей удивляли другие сенаторы из "Команды", такие как АОК и Ильхан Омар, но, возможно, самым запоминающимся моментом стало то, как группа учила Сандерса о Витуберах. (...)\n\nПользователи сети, смотревшие трансляцию, говорят, что это был положительный опыт, который помог им узнать больше об одном из самых левых сенаторов Америки. Несмотря на то, что Берни путается в современных технологиях и играх, они считают его послание важным. Некоторые комментаторы даже сказали, что объяснения Берни помогли им лучше понять свои собственные ситуации.\n\nБолее зрелые СМИ отметили, что это явная попытка привлечь более молодых избирателей на свою сторону, и говорят, что стоит ожидать новых выступлений Сандерса в интернет-пространстве, где доминирует молодежь. Может быть, подкасты?"
 usb.102.a: "Пожертвование $5 - "Почувствуй Берни!"" 
 usb.103.t: "СМИ обвиняют Ромни в том, что он "Ромни"!"
 usb.103.d: "ОТ: Персональный Блог\nАвтор: Джет Шмаровоз\n\nМитт Ромни - один из самых умных политиков в Америке, и я в это верю. Однако либеральные СМИ продолжают обвинять его в "странности". Давайте оставим это Трампу и его сторонникам! (...)\nВсе началось с того, что Митт решил пообщаться с молодыми избирателями после празднования Дня хот-догов. Он посетил популярное мероприятие для молодежи под названием "Фуррикон". Именно здесь и началось недопонимание. Ромни, видимо, подумал, что это "выставка животных", но он не ожидал увидеть людей, одетых в костюмы различных животных.\n\nВ отличие от утверждений демократических СМИ, Ромни не потерял самообладания, когда узнал истинное значение мероприятия. Вместо этого он вступил в контакт с новыми потенциальными избирателями. Его усилиям помог очень хороший повар "в костюме синей птицы", который приготовил "потрясающие" хот-доги в киоске с едой, как заявил сам Митт в своем Instagram.\nВ своих социальных сетях он комментировал и размещал фотографии с мероприятия. На последней фотографии он запечатлен в окружении мультяшных человечков-животных с поднятыми вверх большими пальцами. В комментарии, прикрепленном к фотографии, он рассказал о том, как здорово и увлекательно прошло мероприятие. Он также особо отметил наличие комнаты для тестирования на ВИЧ в качестве "доброго самаритянства" и похвалил организаторов за то, что они не забыли и об этом.\nПозднее он опубликовал фотографию, на которой он пьет шоколадное молоко с надписью "Тяжелый, но очень продуктивный день. Лучшее время, чтобы выпить немного шоколадного молочка.""
 usb.103.a: "Он зарыл топор войны с Большой Птицей" 
 usb.104.t: "Ранний Свет Зари"
 usb.104.d: "ОТ: VICE\nАвтор: Вероника Штейнман. Под Редакцией Джареда Шейски\n\nЯ стояла на Таймс-сквер, окруженная тысячами людей, как активистов, так и простых граждан, и слушала речи, празднующие победу Союза - нашу победу, победу Америки. Я чувствовала, как буря эмоций захлестывает меня, как никогда раньше. Несмотря на все потери и жестокость, ненависть и фанатизм, наша нация победила. Наше будущее восторжествовало.\nС момента официального объявления об окончании конфликта прошло не так много времени. Однако, прогуливаясь по Нью-Йорку и готовясь к торжествам, я ощущала и чувствовала это. Выражения лиц людей были более радостными, разговоры более непринужденными, и атмосфера радости пронизывала все вокруг.\n\nВначале это было время тьмы. Все казалось нереальным, а боль была очень сильной. Многие читатели могут с этим согласиться. Все, чем мы дорожили, - наш образ жизни, наши близкие, наше чувство собственного достоинства - было под угрозой уничтожения колоссальной угрозой.\n\n"Я плачу слезами радости", - сказала мне одна из активисток феминистского движения во время мероприятия. "Наконец-то мы можем двигаться вперед, не оглядываясь назад." Я могу с ней согласиться. Это был болезненный процесс, но он должен был быть сделан. Мы удалили все элементы фанатизма и ненависти из истории нашей страны и общества. Америка свободна от прошлого, и, как и многие люди, с которыми я беседовала, я могу сказать: "Любовь победила"\n\nМы можем снова собраться вместе, обняться и посмеяться, независимо от вашего вероисповедания, идеологии или партии.\nМы снова все американцы, и мы должны снова научиться любить."
 usb.104.a: "Novus Ordo Seclorum"
 usb.105.t: "ОТЧЁТ: #2020c"
 usb.105.d: "ФЕДЕРАЛЬНОЕ БЮРО РАССЛЕДОВАНИЙ\n\nRe. РАСТУЩАЯ АКТИВНОСТЬ БОЕВИКОВ:\n\nАнтифедеральная вооруженная деятельность на нашей территории выросла в 2-3 раза с момента ее начала в Западной Вирджинии. Террористы сейчас покидают горы и пытаются занять леса и небольшие деревни, пополняя свои ряды по мере продвижения.\n\nПоследние данные свидетельствуют о том, что повстанцы получают значительную помощь от незаконного правительства Денвера и завоевывают симпатии местного населения, что позволяет им расширять сферу своего влияния и получать доступ к гораздо более опасному вооружению.\n\nЕсли в ближайшее время не будут приняты решительные меры для предотвращения его роста, он может выйти из-под контроля, что приведет к катастрофическим последствиям для нашего правительства."
 usb.105.a: "E Pluribus Unum"
 usb.106.t: "ОТЧЁТ: #2077d"
 usb.106.d: "АГЕНТСТВО НАЦИОНАЛЬНОЙ БЕЗОПАСНОСТИ\n\nRe. ДЕЯТЕЛЬНОСТЬ БОЕВИКОВ  ДОСТИГЛА КРИТИЧЕСКОЙ ТОЧКИ:\n\nДеятельность боевиков-трампистов расширилась от локальных диверсий и рейдов до полномасштабной партизанской войны против Вашингтона. Сельское население массово присоединяется к террористам, в результате чего за нашими линиями действуют целые полки размером с бригаду, что значительно повлияло на наши логистические возможности и боевой дух.\n\nВ некоторых округах местные правоохранительные органы полностью перегружены, в то время как во многих других они испытывают трудности и нуждаются в немедленном вмешательстве федеральных властей. Принятые до сих пор меры оказались совершенно недостаточными.\n\nЕсли мы не усилим борьбу с антисоциальными элементами, следующей целью боевиков могут стать такие крупные города, как Чикаго, Индианаполис или даже сам Вашингтон."
 usb.106.a: "Обезопасьте нацию, защитите наше будущее."
 usb.107.t: "Атака на Вашингтон"
 usb.107.d: "Было неизбежно, что столица Союза станет мишенью для боевиков.\nОднако предполагаемыми виновниками всегда были либо Патриотический фронт, либо Конституционное правительство.\n\nЕсли бы эти предположения оказались верными, последствия могли бы быть гораздо менее катастрофическими.\n\nК вечеру несколько черных фургонов, исписанных матерными словами и символами, связанными как с оккультизмом, так и с нацизмом, были замечены наезжающими на пешеходов на тротуарах. Силы Национальной гвардии были приведены в состояние повышенной боеготовности и попытались сдержать нападающих, в результате чего фургоны разбежались по всему городу. Один из них был перехвачен возле Городского Центра Вашингтона, где по меньшей мере дюжина вооруженных мужчин, одетых как члены Атомваффен, вышли из него и ворвались в торговый центр, стреляя из оружия.\nНападавшие имели при себе бинарное химическое оружие, которое они без разбора применили, стремясь нанести максимальный ущерб. Другие фургоны остановились в людных местах по всему городу, где были совершены аналогичные разрушительные нападения.\n\nОдновременно несколько бомб взорвались в ключевых местах, включая Мемориал Линкольна. Некоторые из них были обычными взрывчатыми веществами, но другие выделяли химические вещества, в том числе зарин, что еще больше усугубило хаос, царивший в результате разворачивающейся катастрофы.\nПримерно через четыре часа силам безопасности удалось нейтрализовать террористов применением смертоносного оружия. К тому времени сотни людей погибли, а тысячи получили ранения. Полную ответственность за нападение взяла на себя организация Дивизия Атомваффен, использовавшая его в пропагандистских целях.\n\nЭто стало не только одним из самых смертоносных террористических актов на американской земле, но и подвергло жесткой критике систему безопасности страны. Сотрудники спецслужб выразили разочарование в связи с ограниченностью своих ресурсов, ослабленных продолжающейся гражданской войной.\n\nПоследствия будут ощущаться еще долгие годы. Пока семьи скорбят о своих потерях, отчаяние общественности по поводу безопасности усугубляется навязчивым страхом, что новое нападение может произойти в любой момент."
 usb.107.a: "Глаз широко раскрыт..."
 
 nss.0.t: "Выход Агентств"
 nss.0.d: "Нападение на Вашингтон, округ Колумбия, вызвало шок во всем Союзе. Несколько ключевых фигур на территории Союза, от государственных чиновников до высокопоставленных военных офицеров и представителей правительства, потеряли веру в Союз и его способность защитить своих граждан.\n\nСообщения о потере связи из многих регионов продолжают поступать по официальным каналам, повстанческие группировки становятся все смелее, а воинские подразделения самовольно оставяют части.\nПо сути, это сигнализирует о крахе федерального правительства, и на его стороне остаются только самые преданные сторонники.\nРазведывательное сообщество Соединенных Штатов уже предприняло быстрые шаги по укреплению власти в районах, считающихся лояльными, объявляя все, что находится за пределами этих границ, сепаратистским, террористическим или предательским, еще больше усиливая свою власть над правительством.\n\nС одобрения президента правила ведения боевых действий были смягчены, чтобы сохранить Союз и не дать враждебным силам закрепиться на утраченных территориях.\nСтавки еще никогда не были так высоки. Сейчас у нас есть шанс по-настоящему восстановить порядок в Соединенных Штатах Америки, но вместе с этим возникает и самый большой риск: возможность скатиться в пропасть ненужности.\n\nРабота нации только началась."
 nss.0.a: "Столпы так просто не падают."
 nss.1.t: "Умиротворение Невежественных"
 nss.1.d: "Соединенные Штаты Америки были основаны не массами, а горсткой избранных, которые отстаивали ряд идеалов, неся с собой озаряющий свет.\n\nИдеал, основанный на эмоциях, - это идеал, который не может сам себя поддерживать. Французская революция потерпела крах, когда к власти пришли безумцы, которые разорвали страну на части; Это осознанный выбор, что немногие просвещенные люди руководят многими в неспокойные времена.\n\nПорядок не обращает внимания на возражения многих, а Конгресс - это всего лишь еще одна ветвь власти, которая повинуется капризам хаоса.\nОни уже выразили большую озабоченность по поводу нашей повестки, заявив, что мы разрушаем Соединенные Штаты в том виде, в каком мы их знаем, но разве не мы обеспечивали сохранение порядка во всем мире?\n\nКонгресс оказался гангренозным, и, в свою очередь, его необходимо ампутировать.\nНе публично, конечно.\n\nЕсли им прошептать правильные слова на ухо, если оказать достаточное давление на их семейства, они будут хранить молчание.\nТе, кто кричит громче всех, будут взяты под наблюдение из-за потенциального риска отстаивания антиобщественных взглядов, и со временем они будут остерегаться нашего глаза."
 nss.1.a: "Затуманьте им взор, и они не будут говорить."
 nss.2.t: "Возвращение Америки"
 nss.2.d: "Все Соединенные Штаты объединились под звездно-полосатым флагом, как это и должно быть, как это всегда было задумано.\n\nСегодня мы вспоминаем храбрых мужчин и женщин, которые отдали свои жизни за наши идеалы. Просвещение - это не то, что можно защитить, не принеся жертв, а Гражданская война стала не чем иным, как дорогой платой за наши прошлые ошибки.\nБыло допущено много ошибок, то, чем мы пренебрегали, и то, что мы похоронили, - все это в конечном счете привело к этому водовороту внутреннего насилия, и весь мир расплачивается за это.\n\nНаше отсутствие доказало, что мы были одним из столпов стабильности, безопасности и порядка. Мы усвоили урок и не повторим тех же ошибок.\n\nС помощью экспертов, ветеранов и просветленных мы восстановили разрушенную нацию.\nХирургическая операция над американской душой до тех пор, пока она больше не перестанет воспламеняться.\nГражданская война снова погрузила нас в сон, и мы проснулись в мире, который не находится под нашей защитой. Разрушительные идеологии и непостоянные эмоции стали новыми правителями мира, бестиями без видения.\nТо, чем стал мир, не имеет для нас значения; важно то, чем мир станет в будущем.\n\nПусть они еще немного поиграют; наши приготовления уже начались.\nСоединенные Штаты Америки вернулись."
 nss.2.a: "Был выбран третий вариант."
 nss.3.t: "Америка Возвращается к Порядку"
 nss.3.d: "Вторая гражданская война в Америке останется в памяти как один из самых жестоких конфликтов современности, когда свирепствовало так много экстремистов и полностью рухнул мировой порядок, установившийся после Второй мировой войны, в котором доминировали Соединенные Штаты. Казалось бы, что бы ни появилось из тумана, оно и близко не будет похоже на Америку, которую люди любят и ненавидят.\n\nОднако Союз Америки доказал обратное.\nПрезидент Соединенных Штатов Америки объявил, что все территории, удерживаемые "антиобщественными элементами", были умиротворены и возвращены федеральному правительству.\nСегодняшняя Америка превратилась в другого зверя, твердо взявшего на себя ответственность за свою судьбу, в то время как в тени поговаривают о клике экспертов, стоящих за спиной президента, которая стремится вновь превратить Соединенные Штаты в мирового полицейского. Эти обвинения отвергаются как теории заговора.\n\nО внутренней политике Соединенных Штатов известно не так уж много из-за того, что AM-NET обеспечивает практически невозможность иностранного расследования, но истории о постоянных карантинах, усилении репрессий против диссидентов и постоянной слежке за американским населением вернули ощущение, которого мир не испытывал со времен Буша.\n\nСообщения о том, что американское влияние пытается вернуться в региональные сферы влияния, стали поводом для беспокойства мировых держав, поскольку, кажется, Соединенные Штаты Америки еще далеки от гибели."
 nss.3.a: "Ястребы снова кружат над миром."
 nss.4.t: "Серый Кардинал"
 nss.4.d: "На какое-то время Овальный кабинет перестал казаться уютным. После того, как Уильям Дж. Бернс занял более активную позицию в окружении президента, Белый дом перестал казаться ему родным.\n\nБайден вспоминал встречи, которые он проводил с самыми разными людьми со всего мира; некоторые из них были буйными, в то время как другие были спокойными. По его мнению, ни один человек не был скучным, и это оказалось еще одним испытанием, которое нужно было преодолеть.\nОн видел, как в Овальный кабинет переносили всевозможное медицинское оборудование, но не был до конца уверен, зачем.\n\nОн помнит шутки, звучавшие в коридорах, напряженные моменты во времена кризисов.\nЕсли бы только я был помоложе, - подумал он. Страна была бы объединена в течение года, и он получил бы карт-бланш на то, чтобы прочистить систему.\nОн увидел, как Бернс вошел в Овальный кабинет, когда разговаривал по телефону, упоминая контрольно-пропускные пункты и что-то связанное с Blackrock. Эта компания всегда была на виду, как больной палец.\n\nБайдену захотелось окликнуть его, помахать рукой.\nНо он не мог.\nДжо Байден теперь вспоминает, что его здоровье стремительно ухудшалось, и в какой-то момент его тело просто отключилось; его разум все еще был на месте, но тело отказывалось сотрудничать.\n\nНа мгновение его охватил ужас, когда он понял, что происходит.\nБернс бросил на него пренебрежительный взгляд и подозвал одну из медсестер, жестом требуя что-то добавить. Байден не расслышал, что именно.\n\nМедсестра сочувственно посмотрела на президента, возясь с чем-то за его креслом. Его охватило чувство облегчения; все страхи и тревоги растаяли, как воск."
 nss.4.a: "Двигатель системы."
 nss.5.t: "Акт о Безопасности Общественного Здравоохранения"
 nss.5.d: "Акт о Безопасности Общественного Здравоохранения готов превратить ограничения, введенные в период пандемии, в постоянную систему биологической безопасности. Разработанный совместно с фармацевтическими компаниями и CDC, он создает "AmeriCare" - национальную универсальную систему здравоохранения, заменяющую существующую модель обязательного частного страхования, опирающуюся на государственное регулирование и финансовые гарантии, создавая рынок лекарственных препаратов с субсидируемыми налогоплательщиками расходами.\n\nМелкий шрифт, напечатанный в Акте, раскрывает его истинную суть: система обязательной вакцинации, требующая от граждан периодических прививок от известных и возникающих заболеваний, а также дополнительных препаратов, как это определено CDC и фармацевтическим комитетом. В комплект этих прививок будут входить микрочипы, предназначенные для хранения и передачи медицинских записей и личных данных.\n\nНесоблюдение мандата по вакцинации и отслеживанию приведет к отказу в предоставлении основных услуг - доступе к программе AmeriCare, поездкам, работе или учебе, что сделает участие в жизни общества практически невозможным. Это обеспечивается CDC через недавно созданное "Агентство по Охране Здоровья" (АОЗ), которому поручено следить за соблюдением правил вакцинации и отслеживать непривитых или инфицированных.\n\nПублично этот закон преподносится как мера по предотвращению новой пандемии и обеспечению лидерства Америки в области инноваций в области здравоохранения. На практике он укрепляет контроль с помощью мандатов в области здравоохранения и эпиднадзора, гарантируя фармацевтическим компаниям прибыль за счет спроса, установленного правительством. Это превращает здравоохранение - основное право человека - в условную привилегию и инструмент контроля численности населения.\n\nБлагодаря интенсивному лоббированию фармацевтических кругов законопроект был принят Конгрессом с минимальными дебатами. Его реализация начнется сразу же после одобрения директором Бернсом с помощью autopen от имени президента, в обход стандартных церемоний из-за срочности. Критики отмечают, что надзор за Актом превышает таковой в авторитарных государствах, но общественное сопротивление остается минимальным из-за постоянных сообщений СМИ о биологических угрозах и пользе для здоровья, а также из-за того, что оппозиция Акту объявляется экстремистской и заговорщической.\n\nАкт о Безопасности Общественного Здравоохранения закладывает технологическую и правовую основу для следующего этапа управления народонаселением, плавно создавая новую парадигму государственно-частного управления во имя безопасности здравоохранения."
 nss.5.a: "Остановите распространение."
 nss.6.t: "Обеспечение Нашей Безопасности."
 nss.6.d: "Мои дорогие американцы,\n\nЯ надеюсь, что сегодняшнее обращение застанет вас в безопасности ваших домов. На огромном ковре, которым является история Америки, не было времени более неопределенного и опасного, чем сейчас. Это особенно касается молодого поколения, которое может легко столкнуться с вредоносными, экстремистскими или иными оскорбительными материалами.\n\nМоя администрация предприняла множество мер, чтобы исправить это, и наши коллективные усилия увенчались разработкой Закона о безопасности детей, о котором я и хочу вам рассказать.\n\nПрежде всего, Закон о Безопасности Детей направлен на установление правил, направленных на обеспечение безопасного доступа в Интернет для каждого гражданина, но, что наиболее важно, для молодежи. Это предполагает тщательный мониторинг подозрительных лиц и определенных веб-сайтов, для доступа к которым требуется ваше удостоверение личности.\n\nВо-вторых, это потребует создания реестра для отслеживания указанных лиц и веб-сайтов.\n\nИ, наконец, нашим сотрудникам правоохранительных органов будут предоставлены все необходимые ресурсы и права для принятия любых мер, необходимых для обеспечения общественной и личной безопасности.\n\nЭтот закон символизирует все, к чему мы стремимся как нация. Это не только большой шаг вперед, но и свидетельство нашей демократии. Я надеюсь, что Закон о Безопасности Детей сделает жизнь вашей семьи более мирной и спокойной."
 nss.6.a: "Да благословит вас Бог, и да благословит Бог Америку."
 nss.7.t: "Одним Глазом"
 nss.7.d: "Уильям Дж. Бернс был не из тех, кто устраивает грандиозные церемонии или торжества, когда речь заходит об успешных операциях, даже если речь идет о чем-то столь значимом, как спасение нации. Работа продолжается в обычном режиме, до мира во всем мире еще далеко.\n\nНикогда не было недовольства по отношению к тем, кто сеет беспорядки, это произошло не на пустом месте, но некомпетентность предыдущего федерального правительства показала, что происходит, если вы не поддерживаете постоянный контроль не только над своим народом, но и над миром в целом.\n\nБернс вспоминает свои дни в качестве дипломата в Китае и России, и в очередной раз он не испытывал неприязни к этим странам и их народам. Он видел растущую нестабильность, вызванную их возвышением из-за отсутствия Соединенных Штатов. Животное, которое кусается, не должно скрывать своих острых клыков и Бёрнс питает надежды на то, что при надлежащем умиротворении планеты Американский Мир может быть восстановлен.\n\nИмперия.\n\nЗабавное слово, в прежние времена он был бы одет в золото и шелка, но власть, которой он обладает, намного больше, чем у среднестатистического короля.\n\nТем не менее, он не хочет создавать империю или восседать на троне, он хочет быть уверенным в том, что мир не испепелит себя в неопределенном будущем.\nУ Американского Мира могут быть свои недостатки, но его существование привносит определенность и правила, которым нужно следовать. Это то, к чему стоит стремиться.\n\nМир горит, и пришло время показать ему, что Соединенные Штаты Америки далеки от гибели."
 nss.7.a: "Мы можем быть нравственными, а можем быть теми, кто поддерживает мир."
 nss.8.t: "Рождение"
 nss.8.d: "Если птенец не сможет разбить скорлупу своего яйца, он умрет, так и не родившись.\n\nВ условиях нынешнего кризиса теневому правительству стало очевидно, что сохранение американских систем в их нынешнем виде невозможно, и поэтому директор ЦРУ Уильям Дж. Бернс стремился создать новые вооруженные силы, лояльные исключительно интересам силовиков, способные поддерживать порядок там, где офицеры Вооруженных Сил потерпели столь катастрофическую неудачу. Расширяя Центр специальных операций, который формально являлся секретным подразделением спецназа агентства, он хотел создать нечто вроде преторианской гвардии, крайне лояльную силу, способную без лишних вопросов принуждать американский народ к повиновению.\n\nХотя официальный мандат ЦРУ заключался в действиях за пределами страны, это расширенное Специальное стратегическое командование (САС) могло быть развернуто внутри границ Америки. Их задача была двоякой: предотвратить погружение страны в хаос и варварство и устранить всех, кто стоял у них на пути, - всё во имя поддержания порядка. В отличие от Вооруженных сил, оно не имело ограничений и надзора, которые сопровождали правила применения силы, и вместо этого служило мечом глубинного государства. Его персонал не был связан никакими законами, кроме верности Теневому правительству и его миссии. Если люди в форме не подчинялись, агенты ЦРУ исполняли волю силовиков, действующих от их имени.\n\nНесмотря на протесты генерала Милли и министра обороны Остина, большая часть первоначального рядового состава для этого расширения была набрана непосредственно из армии США, отобранной из бригад, которые продемонстрировали эффективность в борьбе с повстанцами и политическую лояльность правительству Вашингтона, в то время как другие не смогли этого сделать. После этого непосредственный вакуум в армии должны были заполнить призывники и вспомогательные подразделения Национальной гвардии, что некоторые расценили как намеренный удар по состоянию Вооруженных сил в пользу разведывательного сообщества.\n\nЦеремония крещения первой из этих бригад состоялась в Вашингтоне ночью, небо было черным как смоль. Тысячи солдат стояли на площади в тишине, с винтовками на плечах и по стойке смирно, одетые с головы до ног в серую многокамерную форму. Церемониальное сожжение их прежних армейских нашивок состоялось перед огромным костром, пламя которого освещало их лица в темноте. На возвышении перед ними стоял сам директор Бернс в окружении своих помощников и советников. Заключительные слова его речи навсегда запечатлелись в памяти всех присутствующих.\n\n"С сегодняшнего дня ни у кого из вас нет имен. Ни у кого из вас нет судимостей. Вы будете забыты, но ваши деяния, совершенные на службе Соединенным Штатам, будут помнить вечно. Вы - наш щит против тьмы..."
 nss.8.a: "...Вы - светоч Порядка против Хаоса.""
 nss.9.t: "Утро в Америке"
 nss.9.d: "Повсюду в Америке люди ходят на работу, в школу, в церковь и занимаются своими повседневными делами. Улицы чисты, экономика процветает, а здания ремонтируются - все так, как было когда-то.\n\nПостепенно шрамы и напоминания о Второй гражданской войне в Америке исчезают, и страна, похоже, переживает разрушительный конфликт. Воспоминания, гнев, боль и ненависть, из-за которых начался конфликт, постепенно исчезают перед лицом нового консенсуса, и с каждым глотком воды, с каждой прививкой и с каждым исчезновением признаков предателей люди становятся все ближе к забвению того, почему они так много скрывали. обида в первую очередь. Легче забыть боль, чем таить обиду, которая могла стать ее причиной. Всегда лучше начать с чистого листа, даже если для достижения светлого будущего придется забыть о прошлом.\n\nТелевидение показывает спокойные, стерильные репортажи о мире в промежутках между рекламой товаров и спортивными состязаниями. Общественность потребляет средства массовой информации так же, как и все остальное, - без вопросов. Мир - это красивая и аккуратная упаковка, в которой все незаконченные детали собраны, а все проблемы решены.\n\nВсё одно и то же, всегда одно и то же. Каждый божий день. Это просто. Это правильно. Это... идеально. Никто не жалуется, потому что разучился жаловаться. Закон есть закон, и никто не является исключением.\n\nВ конце концов, люди - существа привычки. Они находят утешение в своих собственных привычках и образе жизни. Мир вокруг них может быть большим и пугающим, но если у них есть своя утренняя рутина, свои ежедневные обычаи и модели поведения, они могут найти хоть какое-то утешение в этом хаотичном и неопределенном мире.\n\nКогносценти дали им это. Они не требуют их благодарности - силовики, финансисты, элиты понимают, что это неблагодарная задача, и сохранение порядка само по себе является наградой.\n\nВ Нью-Йорке вся страна наблюдает за происходящим с напряженным ожиданием. Хотя постоянные перепланировки, трудности с поиском арендаторов и гражданская война задержали усилия по реконструкции на последние двадцать лет, завершение строительства восстановленного комплекса Всемирного торгового центра знаменует собой закрытие глубокой раны и начало новой главы в американской истории. Бьющееся сердце гегемонии США, мировых финансов, снова стало целым.\n\nВ небесах взрываются фейерверки, и по мере того, как нация празднует, кошмар последних двух десятилетий медленно рассеивается в тумане воспоминаний. Порядок восторжествовал над хаосом."
 nss.9.a: "В Америке снова утро."
 nss.10.t: "Отряд Жестокости"
 nss.10.d: "Поскольку Америка уже погрязла в гражданской войне, террористическая атака на Округ Колумбия была не чем иным, как параличом вашингтонского правительства, которому и без того приходилось бороться с полным нарушением закона и порядка на восточном побережье. Президенту Байдену едва удалось спастись, и он решил остаться в президентском оперативном центре по чрезвычайным ситуациям, в то время как все признаки указывали на новый виток неонацистского терроризма. Под этим предлогом агентства, состоящие из трех букв, вышли на улицы, предприняв системные репрессии, невиданные ранее в американской истории. Во времена тотальной войны не было времени на тонкости.\n\n"Джентльмены, нас вот-вот забросят в самую гущу ада", - сказал командир отделения. - "Наша миссия: ликвидировать всех противников, включая тех, кто не связан с "Атомваффен". Для этой миссии нет специального задания. Приказ исходит с самого верха: не оставлять свидетелей."\n\nНа борту бронированного фургона группа захвата ЦРУ проверила свое огнестрельное оружие, заряженное бронебойными патронами. Несколько отставших боевиков захватили жилой комплекс и несколько заложников, самая важная цель среди захватчиков командир дивизии Атомваффен. Из-за секретности организации, риска того, что террористы могут смешаться с населением, а также из-за того, что на брифинге важная цель была признана "хвостом", который "знал слишком много", было решено, что группа захвата позаботится о том, чтобы хвоста не осталось ни в каком случае."
 nss.10.a: "§g>>>Следующая Страница...§!"
 nss.11.t: "Длинная Ночь"
 nss.11.d: "Когда газ выветрился, команда по уничтожению, одетая в форму MOPP IV, вышибла двери Нассау-холла. Тела студентов и неонацистских террористов были разбросаны по полу, их тела были неестественно искривлены, на лицах застыло выражение вечного ужаса. Поступил приказ позаботиться об Эрле Тернере, одном из многих неонацистских лидеров, бежавших из Вашингтона после терактов. Он обосновался в Принстонском университете, захватив Нассау-холл и используя студентов и преподавателей в качестве живого щита.\n\nОни не ожидали, что группа захвата накачает здание газом зарин. Они же должны быть хорошими парнями, не так ли? Правила применения оружия изменилось, а вместе с ним и тактика трусов, которые полагались на слабость правительства, безнадежно устарела. Переговоров не было, и любой сопутствующий ущерб должен был быть устранен отделом дезинформации ЦРУ. С точки зрения общественности, вся эта трагедия была делом рук неонацистских террористов, и команда по уничтожению была послана, чтобы спасти бедных, беззащитных студентов и персонал.\n\n"Группа штурма, это командный пункт. Подтверждаем уничтожение всех противников. Группа зачистки направляется для обеспечения безопасности периметра. Конец связи."\n\n"Принято, конец связи." сказал лидер группы.\n\nПоскольку остальные студенты и преподаватели были мертвы, оперативники ЦРУ начали систематически обыскивать коридоры. Даже те, кто захватил с собой противогазы, не были избавлены от сильнодействующего нервно-паралитического вещества, которое проникло под кожу и все равно убило их.\n\nЭто был только вопрос времени, когда они найдут Тернера. Мужчина был уже мертв, задохнувшись от собственной рвоты и выделений из организма. По мнению руководителя группы, это была подходящая смерть для такого человека, как он.\n\n"Цель убита в бою," он доложил в КП. "Группа по очистке, действуйте по плану."\n\n"Принято, группа захвата," руководитель группы по очистке ответил. "Вижу вас. Начинаем операцию прямо сейчас."\n\nСнаружи здания агенты ЦРУ в защитных костюмах уже готовились к входу. Вокруг здания уже устанавливалось оцепление, и начинала распространяться официальная версия событий. Группа захвата развернулась и вышла из здания, миновав агентов в защитных костюмах, которые уже были заняты извлечением тел и приступали к процедуре обеззараживания. После того, как команда по уборке взяла ситуацию под контроль, их работа была завершена."
 nss.11.a: "Характер войны изменился."
 nss.12.t: "Рейд на Базу Саттера"
 nss.12.d: "Сводка:\nПосле распада подразделения Атомваффен большая часть его руководства была либо арестована, либо нейтрализована. Однако Джошуа Калеб Саттер, ранее считавшийся членом организации "Temple ov Blood" и имевший с ней контакты, избежал обычного правосудия.\n\nПредыстория: Сбор разведданных показал, что Саттер в сопровождении небольшой группы приверженцев культа организовал укрепленный лагерь в регионе Аппалачи. В ответ на это было развернуто специализированное подразделение специального назначения с прямым приказом нейтрализовать или захватить Саттера. Правила ведения боевых действий допускали неограниченные действия против его сторонников.\n\nОперация:\nПримерно через сорок пять минут продолжительного контакта двенадцать враждебных элементов были нейтрализованы. Саттер был успешно изолирован; он попытался покончить с собой, но был подавлен и взят под стражу без смертельного исхода.\n\nПолученные Сведения:\nВ ходе послеоперационной проверки комплекса были обнаружены многочисленные свидетельства нарушений прав человека, в том числе человеческие останки со следами длительного жестокого обращения, пыток и экспериментального нанесения увечий. Многочисленные визуальные экспозиции (фотографии и грубые рисунки) документировали зверства, совершенные в районах, ранее находившихся под контролем Дивизии Атомваффен. Кроме того, был обнаружен целый арсенал - от стрелкового оружия до систем нетрадиционного вооружения, включая устройства для рассеивания радиации ("грязные бомбы") и химические вещества.\n\nОценка:\nНесмотря на успешный исход операции, разбор полетов выявил острое психологическое расстройство среди персонала специалнього назначений. Один из оперативников предпринял попытку несанкционированного контакта с семьей погибшей жертвы, обнаруженной на месте происшествия. Для поддержания эффективности работы настоятельно рекомендуется постоянное психиатрическое наблюдение и ограниченные служебные назначения.\n\nВывод:\nПосле уничтожения этого последнего оплота атомваффен и поимки Джошуа Калеба Саттера операция официально оценивается как успешная. Остаточные идеологические элементы по-прежнему представляют потенциальную угрозу безопасности, но основная руководящая структура была эффективно нейтрализована.\n\nКОНЕЦ ОТЧЕТА"
 nss.12.a: "Он у нас в руках, живой."
 nss.13.t: "Паук"
 nss.13.d: "После рейда на лагерь Саттера подозреваемый Джошуа Калеб Саттер был задержан и переведен в близлежащий изолятор временного содержания. Был начат интенсивный процесс допроса, длившийся несколько недель.\n\nОсновная Цель: Добывать разведывательные данные о существовании и структуре ячеек атомваффен, связанных с ними отколовшихся группировок и других местных повстанческих организаций, включая, но не ограничиваясь ими, Патриотический Фронт и Американскую Народно-Освободительную Армию. Основное внимание было уделено устоявшейся практике Temple ov Blood по внедрению оперативников во внешние группы с целью получения оперативной информации.\n\nВторостепенная Цель: Выявлять потенциальные запасы оружия и материальных средств, которые могут быть использованы в скоординированных действиях, направленных на дестабилизацию общественного порядка внутри Союза.\n\nМетоды: Были применены санкционированные усиленные протоколы допроса, в том числе лишение сна, контролируемые сенсорные манипуляции (белая комната), огораживание и размещение в стрессовом положении, а также другие меры. Эти методы вызвали значительное психологическое напряжение у испытуемого. После нервного срыва Саттер предоставил оперативную информацию. После завершения цикла допроса допрашиваемый был ликвидирован.\n\nИтог: Полученные разведданные были оценены как ценные. Собранные данные расширили список лиц, представляющих интерес (P.O.I.), и предоставили важные зацепки для дальнейшего проникновения во враждебные сети."
 nss.13.a: "Падает первая костяшка домино."
 nss.14.t: "Охота"
 nss.14.d: "Восстановление контроля над рулем влечет за собой определенную долю ответственности; ошибки, допущенные ранее, неизбежно всплывут и поставят под угрозу национальную безопасность.\n\nМаскарад - это прикрытие нормальности для американского народа, позволяющее ему поверить, что дела идут как обычно, в то время как мы упорно работаем над тем, чтобы нашей стране не причинили вреда. Некоторые могут возразить против наших методов из-за этических соображений.\nИ все же никто не утверждал, что они неэффективны.\n\nК сожалению, нам предстоит многое прояснить. До Гражданской войны мы оставили после себя немало неясных моментов. Информаторы, которые предоставляли нам разведданные, агитаторы, которые разделяли инакомыслящих, и бывшие сотрудники, верные нашему делу, переживают моральный кризис.\nЭто не что иное, как временные неудачи.\nОднако следует отметить, что эти незавершенные дела должны быть сведены как можно скорее, чтобы они не угрожали прорвать завесу и выставить маскарад на всеобщее обозрение, погрузив нашу великую нацию в хаос.\n\nПотребуются годы, чтобы полностью восстановить порядок в Соединенных Штатах, но если нам удастся устранить наиболее опасных антисоциальных субъектов, это восстановление пройдет без каких-либо препятствий."
 nss.14.a: "Давайте приступим к работе."
 nss.15.t: "Гамбит Иуды"
 nss.15.d: "Атмосфера в федеральном правительстве изменилась, люди смотрят друг на друга с большим подозрением, сообщения о пропаже средств, персонала и разведданных вызвали тревогу в системе.\n\nТекущие тенденции указывают на высокую вероятность появления среди нас потенциального предателя, обладающего достаточным опытом и связями в системе, чтобы избежать обнаружения. Их цели неизвестны, но, учитывая внезапное отсутствие ресурсов, вполне вероятно, что потенциальный индивид, о котором идет речь, страдает от морального кризиса, который затуманил его рассудок, и стремится вызвать социальные потрясения, доведя наши планы до сведения общественности.\n\nВероятность того, что индивид осознает нашу осведомленность, чрезвычайно высока, и рекомендуется проявлять бдительность.\nНесмотря на опыт пользователя в навигации по системе, вполне вероятно, что он оставил после себя следы, которые могут привести к раскрытию его личности.\n\nВремени осталось не так много, и чем дольше этот индивид может действовать, тем больше потенциальный риск для нашей национальной безопасности.\nКак и любой организм, зараженный паразитами, мы должны заглянуть внутрь себя и принять решительные меры, чтобы искоренить этого Иуду."
 nss.15.a: "Увидимся у костра."
 nss.16.t: "Засада на Хинкля"
 nss.16.d: "Объект: Джексон Хинкл\nПринадлежность: Американская Народно-Освободительная Армия (АНОА)\nСтатус: Нейтрализирован\n\nСводка:\nДжексон Хинкл, высокопоставленная фигура в АНОА, был признан постоянной угрозой национальной безопасности. Ранее подозреваемый сотрудничал с тайными агентами в ограниченных масштабах, включая усилия по расколу левоэкстремистских группировок и содействию задержанию отдельных лиц. Сотрудничество прекратилось по мере того, как Хинкл все больше сближался с радикальными элементами АНОА, движимый как организационным экстремизмом, так и личным оппортунизмом.\nПосле распада АНОА местонахождение Хинкла оставалось неизвестным до тех пор, пока не появились сообщения о возобновлении деятельности якобинцев. Интеграция субъекта в якобинские круги в сочетании с его социальным влиянием и доступом к элитным сетям повысили его репутацию как значительной угрозы информационной безопасности.\n\nОперативные Заметки:\nХинкл демонстрировал постоянную склонность отказываться от своих обязанностей под прямой угрозой, поскольку постоянное давление на деятельность якобинцев вынудило его занять оборонительную позицию.\nСубъект попросил политического убежища в Китайской Народной Республике, и, поскольку эти данные позволили использовать внедренных информаторов, оперативники организовали ложный пункт эвакуации в Калифорнии.\nК Хинклю подошли с минимальным присутствием охраны, и он был задержан без сопротивления.\n\nДопрос:\nХинкл содержался под стражей в течение пяти дней, на протяжении которых применялись усиленные протоколы допросов. Испытуемый испытывал серьезное психологическое расстройство и в конечном итоге предоставил оперативную информацию, включая выявление оставшихся ячеек АНОА, действующих внутри страны, информацию о связях АНОА с Китаем и каналах материально-технической поддержки.\n\nЛиквидация:\nПосле того, как было установлено, что испытуемый больше не обладает дополнительными данными, которые можно использовать, Хинкл был нейтрализован.\nРекомендуется распространять контролируемые разведданные о попытке бегства Хинкля в КНР среди оставшихся членов АНОА, чтобы подорвать внутреннюю сплоченность, и продолжать отслеживать деятельность якобинцев на предмет возможного возрождения боевиков, связанных с АНОА."
 nss.16.a: "Операция считается успешной."
 nss.17.t: "Рейд в Хакерское Логово Брауна"
 nss.17.d: "Объект: Баретт Браун.\nПринадлежность: Повстанческая Анархистская Сеть.\nСтатус: Нейтрализирован.\n\nСводка:\nБарретт Браун, ранее связанный с повстанческими анархистскими группами на северо-западе Тихого океана, постоянно избегал задержания и представлял постоянную угрозу для контрразведки. Субъект неоднократно совершал взломы секретных баз данных и пытался распространять секретные материалы через открытый Интернет. Предыдущее сотрудничество Брауна с Anonymous, еще до того, как мы приобрели его культурную инфраструктуру, обеспечило ему высокий уровень оперативной дисциплины в области безопасности.\n\nВпоследствии Браун взял на себя роль главного фигуранта в формировании нескольких хакерских группировок, что привело к увеличению числа задач по обнаружению, дезорганизации и ликвидации его операций. Цифровой след субъекта был отслежен через прокси-серверы, что привело к подтверждению его присутствия в городском секторе с низким уровнем дохода.\nОперативное подразделение провело зачистку указанного жилого комплекса, после чего преступник был обнаружен и задержан, хотя перед поимкой он смертельно ранил одного оперативника из огнестрельного оружия. Сразу после его задержания был активирован заранее запрограммированный переключатель deadman's switch, что привело к значительной утечке секретных данных на нескольких платформах.\n\nДопрос:\nБраун подвергался усиленным допросам в течение примерно десяти дней. В результате были получены разведданные, в том числе сведения об активных хакерских сообществах, действующих по всей стране, а также подробные сведения об их каналах связи, членстве и методах работы.\nПосле того, как было установлено, что субъект больше не обладает полезными сведениями, Браун был нейтрализован.\n\nОценка:\nХотя deadman's switch объекта привела к немедленному нарушению безопасности, последующее использование разведывательных сетей значительно компенсировало оперативный ущерб. Цели миссии, включая захват, допрос и нейтрализацию, были достигнуты."
 nss.17.a: "Операция считается успешной."
 nss.18.t: "Нейтрализация Мятежа Майкла Флинна"
 nss.18.d: "Объект: Майкл Томас Флинн.\nПринадлежность: Лоялист Трампа.\nСтатус: Нейтрализирован.\n\nСводка:\nМайкл Томас Флинн, генерал-лейтенант армии США в отставке, занимался государственной изменой после краха американского конституционного правительства (АКП). Несмотря на зачистку последних оплотов сторонников Трампа, сообщения о продолжающихся рейдах повстанцев и саботаже в сельских районах демонстрировали скоординированную тактику, свидетельствующую об официальном военном руководстве.\nПоследующее расследование подтвердило продолжающуюся роль Флинна в организации сопротивления федеральной реинтеграции.\nСредства ISR, включая разведывательные беспилотники, выявили устойчивые схемы передвижения повстанцев.\nНа семьи известных боевиков было оказано давление со стороны повстанцев. Были усилены оборонительные возможности передовых постов и секретных объектов, что привело к постепенному отступлению сил Флинна.\n\nВ отдаленном лесистом секторе был обнаружен замаскированный лагерь, который, по оценкам, мог стать плацдармом для крупномасштабного наступления.\nРазвертывание включало в себя несколько подразделений ЦСО при ограниченной поддержке обычных вооруженных сил. Правила применения силы разрешали применение смертоносной силы против вооруженного персонала.\n\nСхватка:\nРейд продолжался около часа, все строения базы были систематически очищены, все вооруженные боевики нейтрализованы, а невооруженный персонал задержан.\nФлинн был обнаружен на месте; он оказал сопротивление при сдаче. В результате несмертельного огнестрельного ранения в правую ногу и плечо субъект был выведен из строя и впоследствии взят под стражу. 5 сотрудников ЦСО были убиты в бою.\nИспытуемый подвергался усиленным допросам в течение трех недель. Методы включали отказ от медицинского лечения, психологическое давление на членов семьи и длительное лишение сна.\nВ конечном счете, Флинн раскрыл важные разведывательные данные, такие как идентификация выживших повстанческих группировок, лояльных Трампу, и подтверждение наличия обширной сети туннелей в Аппалачах, используемых для материально-технического обеспечения и сокрытия.\n\nВывод:\nПосле того, как было установлено, что субъект исчерпал всю доступную для расследования информацию, Флинн был нейтрализован. Рекомендуется задним числом внести изменения в его послужной список, уволив его с позором, чтобы обеспечить историческую классификацию как изменника родины.\nНесмотря на потери личного состава ЦСО, операция оценивается как успешная. Полученные разведданные значительно расширяют возможности по мониторингу и переброске сил в регионе Аппалачи."
 nss.18.a: "Давайте двигаться дальше."
 nss.19.t: "Нейтрализация Анджелы Дэвис"
 nss.19.d: "Объект: Анджела Ивонн Дэвис\nПринадлежность: Американская Народно-Освободительная Армия (АНОА) / Чёрная Освободительная Армия (ЧОА)\nСтатус: Нейтрализирована\n\nСводка:\nАнджела Ивонн Дэвис, давняя фигура, представляющая интерес для разведывательного сообщества, перешла от ключевой роли в партии "Черные пантеры" к руководству Американской Народно-Освободительной Армией. После краха АНОА и Дэвис установила связи с боевиками, связанными с ЧОА, и внедрилась в городские сообщества, состоящие преимущественно из афроамериканцев, используя их лояльность и сети защиты, чтобы избежать обнаружения федеральными властями.\nСбору разведывательных данных препятствовала поддержка сообщества и защитные структуры ЧОА.\nПроникновение достигнуто за счет целенаправленного применения материальных стимулов и давления на местных представителей.\n\nРезультат: Достоверная идентификация местонахождения конспиративной квартиры субъекта.\nРазвертывание 12 оперативников ЦСО при поддержке федеральной полиции для обеспечения безопасности периметра и начала карантина прилегающих районов.\nПродолжительность рейда составила примерно 30 минут. Подозреваемый попытался скрыться вместе с сотрудниками службы безопасности, получил несмертельное огнестрельное ранение в спину и был взят под стражу. В течение трех недель к нему применялись усиленные протоколы допросов.\n\nРезультат:\nРаскрытие остаточных клеточных структур АНОА и ЧОА.\nВыявление зарубежных связей, включая сети поддержки, связанные с Ираном и Китайской Народной Республикой.\n\nОпределение: Субъект исчерпал все доступные для применения разведданные.\nПо завершении цикла допросов Дэвис была нейтрализована.\n\nОценка:\nЗахват объекта и последующая нейтрализация позволили получить оперативную информацию; однако вторичными последствиями стали повышенная нестабильность в городских центрах афроамериканцев, а также участившаяся децентрализованная активность боевиков.\nРекомендуется расширить присутствие ЦСО в выявленных зонах высокого риска и усилить наблюдение и проникновение в сообщество для смягчения возникающих угроз."
 nss.19.a: "Миссия считается успешной."
 nss.20.t: "Перехват Ринальдо Назарро"
 nss.20.d: "Объект: Ринальдо Назарро\nПринадлежность: Основа (белая сепаратистская / неонацистская сеть)\nРайон Деятельности: Северо-Западный Район Тихого океана\nСтатус: Нейтрализирован (погиб)\n\nСводка:\nРинальдо Назарро, один из основателей Основы, был главным организатором децентрализованного насилия белых сепаратистов на северо-западе Тихого океана после падения власти Каскадии. Основа использовала децентрализованную модель для максимального сопротивления федеральным властям, используя тактику насилия, которая нанесла значительный ущерб критически важной инфраструктуре и средствам правоохранительных органов. Учитывая устойчивое влияние группировки на оперативную деятельность, удаление Назарро с поля боя было сочтено необходимым для восстановления стабильности в регионе.\nИсточники включают в себя информацию, полученную от бывших враждебных сетей, перебежчиков и внедренных информаторов.\n\nПо всему региону были нанесены на карту многочисленные ячейки Основы; подтверждающие данные указывали на показатели иностранной поддержки в последующих операциях.\n\nПодразделениям ЦСО было приказано наносить преднамеренные последовательные удары по выявленным ячейкам с целью систематического снижения оперативных возможностей Основы.\n\nИсполнение:\nПротив аванпостов ячеек были предприняты скоординированные кинетические действия. Сопротивление варьировалось в зависимости от вовлеченности; интенсивность возрастала при приближении к структурам, связанным с руководством более высокого уровня.\nВ ходе операции по задержанию было установлено местонахождение Назарро, и территория была очищена. Чтобы вывести из строя подозреваемого, был применен слезоточивый газ; Назарро был взят под стражу. В ходе акции были нейтрализованы остальные враждебно настроенные лица.\n\nОбъект был переведен в следственный изолятор для дальнейшей эксплуатации.\nНазарро скончался во время двухнедельного допроса. При вскрытии материалов, обнаруженных на последнем посту, было обнаружено оборудование российского происхождения и документальные свидетельства, свидетельствующие о возможном пути его вывоза в Российскую Федерацию. В то время как прямые связи между людьми и разведкой остаются под вопросом, материалы и документальные свидетельства указывают на вероятный вектор иностранной поддержки.\n\nВывод:\nПоследовательная целенаправленная кампания существенно снизила способность Основы к немедленному масштабному организованному насилию.\nНайденные доказательства подтверждают обоснованное подозрение в содействии извне; требуется дальнейшая работа контрразведки для выяснения масштабов и намерений внешнего вмешательства. "
 nss.20.a: "Миссия считается успешной."
 nss.21.t: "Нейтрализация Стивена Нордхауса"
 nss.21.d: "Объект: Стивен Нордхаус\nПринадлежность: Бывший Начальник Национальной Гвардии / Лидер Повстанцев\nРайон Деятельности: Сельские секторы Среднего Запада\nСтатус: Нейтрализирован (погиб)\n\nСводка:\nСтивен Нордхаус, бывший начальник Национальной гвардии, отказался от федеральной власти и организовал устойчивое восстание в сельской местности Среднего Запада. Используя свой предыдущий опыт командования и доступ к личному составу и секретным материалам, Нордхаус наносил скоординированные удары по инфраструктуре, военным объектам и хранилищам конфиденциальной информации. Он также консолидировал поддержку среди ополченцев-диссидентов и местных сочувствующих в соответствии с заявленной целью "Освободить Америку от Когтей Тирании".\nВывод Нордхауса из боевого пространства был оценен как необходимый для восстановления контроля и защиты интересов национальной безопасности.\nНордхаус использовал свои институциональные знания для ослабления позиций вооруженных сил, координации асимметричных атак и использования конфиденциальных данных.\nСообщения свидетельствовали о растущем привлечении диссидентов на его сторону и занятии ключевых сельских районов.\nПродолжающаяся активность угрожала как непрерывности деятельности правительства, так и стабильности в регионе; раскол федеральной власти увеличивал операционный риск, создаваемый элементами, поддерживающими Нордхаус.\n\nИсполнение:\nМногочисленные подразделения ЦСО в координации с обычными военными и правоохранительными органами провели поэтапную кампанию по изоляции.\nПостоянная слежка и целенаправленное давление ограничивали свободу передвижения Нордхауса и снижали сплоченность его командования.\nОкончательный контакт был установлен после комбинированных кинетических операций и операции ISR (разведки, наблюдения, рекогносцировки). Транспортное средство объекта было выведено из строя точным ударом; последующее расследование подтвердило нейтрализацию объекта.\n\nРезультат:\nПоследующая эксплуатация извлеченных материалов продолжается.\nПервоначальная оценка показывает, что повстанческое движение распадется на локальные междоусобицы, что снизит его способность к организованным крупномасштабным действиям.\nРекомендуется провести внутренний кадровый аудит, чтобы выявить потенциальных сторонников среди федеральных сил и снизить риск инсайдерской угрозы."
 nss.21.a: "Миссия Выполнена."
 nss.22.t: "Тёмный Лес"
 nss.22.d: ""И это все?" - Спросил Бернс своего помощника, взглянув на нее через стол. "Все, что было отправлено, да," она ответила, не глядя ему в глаза.\n\nОн вздохнул и пролистал еще несколько досье, вникая в детали каждого файла.\n\nОтчет за отчетом, файл за файлом, результат был один и тот же. Директор еще даже не выпил свой утренний кофе, а у него уже разболелась голова. Работа по укреплению власти в Соединенных Штатах была неустанной и требовала больших жертв как от него самого, так и от его подчиненных. Это была неблагодарная обязанность, но необходимая.\n\n"Спасибо. Сейчас я их просмотрю," - сказал он, отпуская женщину взмахом руки.\n\n"Да, Сэр," - ответила она, поворачиваясь на каблуках и выходя из комнаты с быстрым щелчком замка.\n\nБернс отвернулся к окну и посмотрел вниз, во внутренний двор, глубоко вдыхая прохладный утренний воздух. Вдалеке он заметил нескольких ранних пташек, снующих вокруг. Мир за пределами Лэнгли казался тихим и безмятежным, что резко контрастировало с интригами и уловками, которые таились под поверхностью повседневной жизни.\n\nЕсли бы хотя бы часть их деяний стала известна широкой публике, в учебниках истории их назвали бы монстрами. И, возможно, они и были монстрами, но в мире, в котором они жили, не было героев. В лесах, за пределами света общества, которое они восстановили для американского народа, таились гораздо более зловещие твари, которые затмили бы их злодеяния, если бы им дали возможность выйти на свет. Он знал это лучше, чем кто-либо другой.\n\nТеперь, когда те, кто либо непосредственно участвовал в нападении на округ Колумбия, либо знал о сговоре спецслужб, замолчали, правительство могло двигаться вперед, в будущее. По крайней мере, таким образом, их путь был бы путем порядка, и американский народ не страдал бы от прихотей своих собственных низменных побуждений. Чернь, предоставленная самой себе, никогда не смогла бы построить лучший мир.\n\nТо, что находилось за пределами костра, на какое-то время было сдержано."
 nss.22.a: "И на данный момент этого было достаточно."
 nss.23.t: "Круиз по Джунглям"
 nss.23.d: "В какой-то момент что-то в Марке Тассо дало трещину. Он в одиночку уничтожил неонацистскую ячейку, за которой ему было поручено следить, обратив свой многолетний опыт безжалостных убийств против людей, которые номинально были на его стороне. Он также убил своего куратора, после чего скрылся из виду. Марк никогда не был предан никому в Вашингтоне, только Агентству и своей стране как концепции и как дому. Но Лэнгли и весь Вашингтон были в сговоре с террористами, и провокация с фальшивым флагом, в котором он участвовал, привел в движение цепь событий, позволивших Агентству и его сообщникам захватить власть по всей территории Соединенных Штатов. Теперь он мог жить только с чувством вины за то, что был отмеченным человеком. Он больше не был на привязи, но и вернуться домой не мог.\n\nПервые несколько посланных ими убийц были возвращены в мешках для трупов, с них содрали кожу, выпотрошили или они просто исчезли. Годы тренировок Марка, а также его опыт проникновения в ряды крайне правых террористов, совершивших нападение на Округ Колумбия, познакомили его с особой формой жестокости. Марк знал, что в нем что-то сломалось. Так и должно было быть, раз он убивал так, как его учили. Правительство и его разведывательные службы взяли ясноглазого подростка с патриотическим сердцем и превратили его в оружие. Долгое время у них все получалось, пока он не сорвался с привязи. Как бездомный пес, он теперь нападал на своих бывших хозяев и убивал любого, кто переходил ему дорогу. Они бы посылали кого-нибудь вроде Марка за самим Марком.\n\nНо он был один. Человек со сломленным рассудком и без друзей не мог надеяться свергнуть правительство, не в войне на истощение. Карательная команда ЦРУ загнала его в угол, но они попали прямо в ловушку, и он сражался с бешеной яростью. Их лица в масках и бронежилетах делали бы их похожими на монстров, если бы они не были так похожи на людей. В конце концов, они закричали точно так же, как те невинные люди, которых Марк был вынужден убить.\n\nОслабевший, он, прихрамывая, вышел из здания, его израненное тело купалось в оранжевых лучах заходящего солнца. Теперь он был один, единственный живой человек на несколько миль вокруг. Он был уверен, что их будет еще больше, и не был уверен, как долго он сможет продержаться. Но сейчас он мог отдохнуть и попытаться сформулировать какое-то подобие плана. Он не доставит им удовольствия прикончить его.\n\nОпустившись на одно колено, Марк снял шлем и отбросил его в сторону, чувствуя, как из пореза над глазом стекает струйка крови. На секунду его зрение затуманилось, и он стряхнул его. Теперь, если бы только он мог-\n\nЕго внимание привлек какой-то отблеск на опушке леса. Прицел снайперской винтовки, направленный прямо на него. У него едва хватило времени осознать эту мысль. Последовала вспышка, громкий хлопок, а затем ничего. Тело Марка Тассо рухнуло на холодный тротуар, и он испустил дух."
 nss.23.a: "Его война наконец-то закончилась."
 nss.24.t: "Безликое Правосудие"
 nss.24.d: "Полковник Джон Мэддокс не совсем понимал, почему все дошло до такого. Он преданно проводил в жизнь политику администрации Байдена, следя за тем, чтобы его подчиненные соблюдали рекомендации по маскировке и вакцинации; он охотно осаждал целые города и следил за тем, чтобы никто из тех, кто был лоялен к оранжевому демагогу, не вырвался из его лап. И до сих пор он никогда не высказывал своего мнения открыто. Он держал свое мнение при себе, даже когда знал, что оно может расходиться с мнением администрации. Но война с внутренним терроризмом раздвинула границы дозволенного слишком далеко.\n\nКазалось, что с каждой неделей правила ведения боевых действий становились все более жесткими, а масштабы того, что им разрешалось совершать против сограждан-американцев, расширялись. Они больше не задерживали подозреваемых. Они стали просто расстреливать их или сидеть сложа руки, в то время как Центр Специальных Мероприятий ЦРУ уничтожал целые города, которые считались "прилегающими к экстремистам". В частном порядке, выражая свое недовольство другому офицеру, он небрежно окрестил ЦСО "Республиканской гвардией Лэнгли", в честь жестоких преторианцев Саддама Хусейна. Он не знал, что его друг на самом деле был информатором ЦРУ.\n\nОн не мог разглядеть лица своих судей за их масками, но даже по тону их приглушенных голосов мог сказать, что нажил врагов в Вашингтоне. То, что военные были доведены до такого состояния - полностью скомпрометированы разведывательными службами, - само по себе было оскорблением.\n\n"Полковник Мэддокс," - сказал главный прокурор. Он понятия не имел, кто этот человек, поскольку ему не сообщили их имен. Они даже не назвали своего звания или подразделения. Он был уверен, что они пришли из разведывательного мира, а не из его армии. "Вы отдаете себе отчет в том, почему вы здесь?""
 nss.24.a: "§g>>>Следующая Страница...§!"
 nss.25.t: "Деятельность "Иуды" Продолжается"
 nss.25.d: "Подозреваемый член Теневого Кабинета был отстранен от должности, новый член, занимающий эту должность, был поставлен под строгий контроль, а полномочия агентства были значительно ограничены.\n\nОднако, похоже, желаемый результат достигнут не был. Мы по-прежнему наблюдаем подозрения в деятельности Иуды - более того, Иуда, видя, что мы пытаемся его найти, активизировал свои действия, пытаясь подорвать позиции Соединенных Штатов.\n\nМы должны вспомнить, какие ресурсы у нас еще есть, и нанести еще один удар по заговору с решающей целью - обезглавить предателя."
 nss.25.a: "Дерьмо...!"
 nss.26.t: "Деятельность "Иуды" Прекращается"
 nss.26.d: "Расследование завершилось успешно! Было неопровержимо подтверждено, что недавно арестованный член Теневого кабинета является предполагаемым предателем в рядах правительства. Теперь, когда голова у нас в кармане, все пособники Иуды скрываются, зная, что гнев правосудия теперь неизбежен.\n\nТеперь, когда родина, наконец, в безопасности, наша страна может сосредоточиться на гораздо более важных целях - восстановлении себя в качестве мировой сверхдержавы."
 nss.26.a: "Ничто не может остановить Порядок."
 nss.27.t: "Заблокирован"
 nss.27.d: "Куда делась эта тема? Секунду назад она была здесь. О, ну что ж, я уверен, что найду, о чем еще поговорить...\n\nХа, они закрыли канал. Это был действительно хороший канал. Может быть, его снова откроют. Мы просто подождем и посмотрим, а?\n\nЭтот сайт уже не такой веселый, как раньше. Может быть, если мы будем стараться больше, все станет как раньше. Он должен стать лучше.\n\nСайт не работает? Как сайт может просто не работать? Ну, это отстой. Что еще есть?\n\nИнтернет не работает? Что ж, с этим мало что можно поделать. Просто нужно подождать, пока все наладится. Тогда все снова будет хорошо.\n\nХм, инета нет гораздо дольше, чем я ожидал. Думаю, мне стоит выйти и посмотреть, что происходит."
 nss.27.a: "На улице становится немного прохладно, не так ли?"
 nss.28.t: "Правда"
 nss.28.d: "Десять лет назад работа в Washington Post была для Джулии Форд не чем иным, как воплощением мечты. Она окончила Колумбийский университет с отличием и получила степень в области журналистики и политологии, с энтузиазмом переняв свой талант политического комментатора и применив его в своей работе. Она появилась на сцене после победы Дональда Трампа на президентских выборах 2016 года, в то время, когда, казалось бы, вся американская интеллигенция была мобилизована и готова к сопротивлению, и заслужила репутацию упорной персоны за резкие критические комментарии.\n\nКогда началась Вторая гражданская война в Америке, Джулия с головой окунулась в конфликт, поддержав борьбу администрации Байдена за восстановление закона и порядка в стране, находившейся на грани распада. В глубине души она была так уверена, что Байден не только спасет страну, но и восстановит ее в лучшем виде.\n\nОна не могла понять, с чего все пошло наперекосяк. Возможно, это была масштабная консолидация власти, последовавшая за террористической атакой в Вашингтоне, когда прессе внезапно пришлось бороться с "дезинформационными" ярлыками, которые затрудняли публикацию их работ. Политика цензуры, проводимая администрацией, конечно, была оправдана на каждом шагу. Каждый журналист обязан сообщать только те факты, которые происходят на самом деле, а не так, как хотелось бы. Сначала она это понимала.\n\nЗатем война с "внутренним терроризмом" обострилась, и вера Джулии в правительство пошатнулась из-за жестокого обращения с диссидентами и протестующими. Один за другим коллеги, с которыми она работала бок о бок в течение многих лет, оказывались заклейменными как "агенты по дезинформации" или уличенные в связях с "антиобщественными организациями". Некоторые исчезали, в то время как другие оказывались дискредитированными и безработными, занесенными в черный список администрацией, которую они когда-то поддерживали на каждом шагу. Джулия знала, что совершила ошибку в тот день, когда опубликовала статью, в которой подвергла сомнению политику администрации, но она не думала, что они будут преследовать ее. После всего, что она сделала, чтобы поддержать их, после бесчисленных статей и рассказов, которые она опубликовала, как они могли?\n\nИ все же они это сделали. Ее работодателям была отправлена служебная записка, в которой говорилось о ее предполагаемых связях с теоретиками заговора и левыми террористическими группами, и в течение нескольких недель ее имя было покрыто грязью, а жизнь и карьера - в руинах. Собственный отдел проверки фактов The Post был перепрофилирован для внутренней проверки, и та же самая следственная группа, которая помогла разоблачить должностные преступления Трампа, теперь проверяла ее собственные контакты и источники, пытаясь доказать, что она вступила в сговор с врагом.\n\nТеперь, когда она смотрела на стволы пистолетов, принадлежащих людям в масках, которые отказались представиться, она поняла, что сделала не так. Это все время была она. Она была добровольной участницей чего-то по-настоящему мерзкого, добиваясь согласия на что-то, что теперь перешло точку невозврата."
 nss.28.a: "Гибель четвертой власти"
 nss.29.t: "Полученные Доказательства"
 nss.29.d: "Недавняя акция наших сил специального назначения принесла свои плоды: нам удалось получить важные улики, которые могут привести к аресту предполагаемого предателя в рядах Теневого Кабинета.\n\nОднако нам все равно следует проявлять осторожность при выборе объекта для чистки, поскольку этих доказательств может оказаться недостаточно для окончательного заключения. Мы должны попытаться найти больше доказательств, если это возможно."
 nss.29.a: "Хорошая Работа."
 nss.30.t: "Поиски Не Принесли Результатов"
 nss.30.d: "Следственная операция, проведенная нашими специальными командами, не принесла никакой полезной информации или была безрезультатной. Мы должны продолжать наши усилия по установлению личности предателя, иначе Соединенные Штаты Америки будут обречены.\n\nДиректор Бернс уже дал указание ЦРУ увеличить теневой бюджет и активизировать наши действия во всех сферах деятельности правительства и общества. Во что бы то ни стало мы должны добиться успеха."
 nss.30.a: "Продолжайте поиски."
 nss.31.t: "Выявлена Ядерная Угроза"
 nss.31.d: "После нескольких инцидентов, которые, по-видимому, связаны друг с другом, и при содействии нескольких следователей вполне вероятно, что диссидент, о котором идет речь, стремится выставить Соединенные Штаты Америки в невыгодном свете перед остальным миром.\n\nСредства, с помощью которых это было сделано, широко обсуждались, но после рейда на объект в Саванна-Ривер весьма вероятно, что предатель, о котором идет речь, применит ядерное оружие массового уничтожения от нашего имени, чтобы навсегда запятнать нашу репутацию.\nНеизвестно, как далеко они продвинулись в своих попытках, но с учетом растущего внутреннего и внешнего давления, без сомнения, это вопрос времени, а не если.\n\nРекомендуется активизировать усилия по пресечению этого заговора и задержанию лица, о котором идет речь, чтобы оно окончательно не нарушило порядок."
 nss.31.a: "Мы подходим всё ближе..."
 nss.32.t: "Сорванный Маскарад"
 nss.32.d: "Это был такой же день, как и любой другой, с ударением на слове "был".\n\nТе, кто находился в башнях из слоновой кости, в отчаянии смотрели вниз на то, что находилось под ними; они не понимали, что это будет один из них.\nКаждая башня рано или поздно должна упасть.\nКак ракетные базы, так и подводные лодки запустили свои ядерные боеголовки по нескольким целям; над несколькими странами Южной Америки навис дамоклов меч. Континент вскоре будет охвачен огнем, причем не только в буквальном смысле.\nЗатем была Западная Африка, где мировым державам стало трудно жить, поскольку их города превратились в пепел. Напоминание о том, что боль всегда не за горами.\nЗатем последовало Гаити, стране, которой не привыкать к хаосу. После взрывов стране предстояло пройти еще одно испытание на выносливость.\n\nСначала воцарилась тишина.\nПотом начались крики.\nВопли об ответах, вопли о мести, вопли о решениях.\nДля внешнего мира вина за эти нападения была возложена на американскую нацию, и от этого пятна невозможно избавиться.\n\nСоединенные Штаты Америки потерпели неудачу. Внутри страны царит паника, многие уходят в отставку, и некоторые из ближайших союзников Америки тихо покинули страну; другие уступили заключительному акту свободы. Соединенные Штаты стали врагом всего мира, и уже появились сообщения о крупных утечках информации о нашей внутренней работе.\n\nНаше население в ярости.\n\nТе, кто остался верен Порядку, будут выполнять грязную работу, необходимую для поддержания контроля, но на этот раз она не будет скрытой. На этот раз все будет грубо, болезненно и быстро.\nВсе, что мы можем сейчас сделать, это молиться, ибо зажегся еще один огонек перемен."
 nss.32.a: "Незначительная неудача - что такое еще сто лет?"
 nss.33.t: "Тихий Переворот в Канаде"
 nss.33.d: "Черные фургоны без опознавательных знаков окружили коттедж Трюдо, охрана бескровно сдалась, в то время как люди в костюмах и бронежилетах ворвались в резиденцию премьер-министра с винтовками наизготовку. Это был устрашающе тихий государственный переворот, который больше походил на задержание человека, чем на фактический захват власти. Трюдо не был уверен, как до этого дошло. Подобные вещи были зарезервированы для стран глобального юга. Это не предназначалось для либеральной западной демократии, такой как Канада, которая намного более развита, чем Америка, повторял он про себя, как мантру.\n\nНо, тем не менее, это произошло, и вот он стоит здесь, глядя сверху вниз на главу криминалистической службы Дэниела Роджерса. В его поведении была только холодная отстраненность профессионала. "Условия совершенно ясны. Это не обсуждается и никогда не обсуждалось."\n\nТрюдо сердито посмотрел на него в ответ, но в этот момент его вызов был не более чем пустым позерством. С неприкрытым предательством перед ним ничего нельзя было поделать, только горькая правда заключалась в том, что его перехитрил враг, который предвидел каждый поворот.\n\n"Канадский народ..."\n\nРоджерс усмехнулся. "Для них это просто очередной день. На бумаге вы продолжите выполнять свои официальные обязанности. Осознайте свою позицию. Видимость нормальности должна быть сохранена любой ценой. Любые попытки нарушить или иным образом выступить против этого соглашения, и я уверяю вас, у нас есть методы заставить вас подчиниться. И, в худшем случае, пост премьер-министра - это всего лишь должность, в конце концов. Ваш преемник будет всегда готов."\n\n"Я не могу поверить, что вы действительно идёте на это. Чего вы надеетесь достичь?"\n\n"Заказ. Мир в огне, а вы только и делаете, что прикрываетесь. Америка возвращается на мировую арену, и мы будем на ее стороне,""
 nss.33.a: ""Также, как и были всегда.""
 nss.34.t: "Слои Империи"
 nss.34.d: "Соединенным Штатам не привыкать разрушать целые империи и системы тирании.\nНекоторые пытались навязать миру свой порядок, но все они потерпели неудачу: британцы потерпели неудачу, немцы потерпели неудачу, русские потерпели неудачу.\n\nНе имеет значения ни форма, ни цвет, Россия по своей сути остается империей.\nИ нам, американцам, суждено разрушить их всех.\n\nНашей первой ошибкой было позволить Советам доминировать в Восточной Европе на протяжении десятилетий, нашей второй ошибкой было умиротворение Путина, а нашей третьей ошибкой было то, что мы не смогли сделать Европу достаточно сильной, чтобы справиться с ними без нас. Но, как и с любым соперником, нас учат выигранные и проигранным битвы.\nВ каком-то смысле любая форма обиды или озлобления давно прошла.\n\nМы оба сталкивались во многих отношениях, всегда стараясь показать миру, кто лучший из лучших.\nСегодня знаменательный день, когда мы раз и навсегда положили конец этому соперничеству, чтобы показать всему миру, что в конце концов один из нас оказался лучшим.\n\nИх дети прошли по руинам двух империй, они пройдут и по руинам третьей."
 nss.34.a: "Идя по пути к свободе."
 nss.35.t: "Испытательный Полигон Империй"
 nss.35.d: "Целый континент, покрытый костями и пеплом, где империи проявили себя вопреки универсальным законам самой реальности, одни победили, другие проиграли.\nНо империи строятся не из мужчин и женщин, стоящих на башнях из слоновой кости, империи строятся из идей и концепций, которые объединяют государства.\n\nДля многих Соединенные Штаты - это империя.\nИмперия, выдержавшая последнее испытание, которого не выдержала бы ни одна другая империя.\nИдеалы, которые стоит сохранить.\nКонцепции, которые останутся непобедимыми.\nМы бы не существовали без Европы, и в некотором смысле это имеет сентиментальное значение для гарантии того, что мы не потеряем их снова в огненном пламени перемен.\nНе имеет значения, какой символ царит в Европе.\n\nАмериканский Мир приведет к тому, что ее символы рухнут, ее идолы падут, а ее разрушительные идеологии будут демонтированы, давайте восстановим порядок в Европе.\nНаши объятия никогда не ослабнут.\n\nНикогда снова."
 nss.35.a: "Пришло время возвращаться домой."
 nss.36.t: "Зеркало"
 nss.36.d: "На востоке затаился зверь.\nСозданный из людей и фабрик.\nЕму нужно все больше и больше.\nПоджигает земли слабых.\n\nИ все же приближается факел просвещения, который держат многие.\nРядом с клинком, который держат многие.\nНацеленный в его сердце.\nНацеленный ему в голову.\n\nПробуждение Китая не обошлось без проблем, наше временное отсутствие оказалось ключевым фактором его подъема. Мы увидели сходство с нашей собственной историей.\nНичего, кроме испытаний и троп, и если выдержать их все, то можно гарантировать себе место под солнцем.\nНо есть только одно место.\n\nКитай способен занять наше место, стать новыми сторожевыми псами мира.\nНо это не тот мир, частью которого мы хотели бы быть.\n\nАмериканский Мир длился так долго по уважительной причине.\nПришло время положить конец их возвышению."
 nss.36.a: "Сразим дракона наповал."
 nss.37.t: "Сердце Мира"
 nss.37.d: "Цивилизация зародилась на Ближнем Востоке и, как и любая другая родина, подвержена коррупции.\nНе из-за природы этого, а из-за прошедшего времени.\n\nЭтому региону не были чужды раздоры.\nКак колесо, которое пытается изобрести само себя заново.\nЛюди в черном и бежевом, вооруженные сталью и огнем.\nОбласть, навсегда затянутая красным туманом.\nМы были здесь раньше, и наше присутствие гарантировало, что этот цикл больше не повторится, наше отсутствие стало необходимым доказательством того, что мы должны вернуться.\nЧтобы убедиться, что призраки насилия остаются похороненными.\nСтабильность и порядок - это добродетели, необходимые для укрощения такого нестабильного региона, его богатая история и знания слишком ценны, чтобы их можно было оставить в руках импульсивных масс.\n\nМы снова вернулись.\nИ мы никогда не уйдём."
 nss.37.a: "Похорони их высокомерие, похорони их гордость."
 nss.38.t: "Америка требует, чтобы мы покинули БРИ"
 nss.38.d: "Соединенные Штаты Америки выдвинули ультиматум нашей стране, требуя, чтобы мы прекратили любое экономическое и дипломатическое сотрудничество с Китаем, в частности, вышли из инициативы "Один пояс, один путь", ссылаясь на "угрозу китайского неоимпериализма и угрозу глобального авторитаризма".\n\nОднако жесткие требования и угрозы американской стороны несравнимы с потерями, которые мы могли бы понести, лишившись расположения Китая. Но в борьбе титанов компромисса быть не может, поэтому мы должны выбирать: либо разорвать наши связи с Китаем, либо рискнуть пострадать от военной и экономической мощи Америки."
 nss.38.a: "У нас нет выбора."
 nss.38.b: "Нет?"
 nss.39.t: "Потерянная душа"
 nss.39.d: "Его назначили в ночной дозор, чтобы убедиться, что иракские повстанцы не застанут его подразделение врасплох; тихие ночи всегда были прелюдией к очередной засаде, к очередному террористическому акту. Он не спал сутками, и иногда ему вспоминались прошлые войны.\nНочное небо было прекрасно, такую картину могло создать только божественное существо.\nИногда он слышал вдалеке выстрелы; исходили ли они от друга или врага, не имело значения, потому что это было не рядом ни с ним, ни с его подразделением.\nМаленький фонарь, стоявший рядом с дешевым пластиковым стулом, на котором он сидел, давал ему достаточно света, чтобы видеть, что его окружает, но на расстоянии темнота давала простор для воображения.\n\n''Вы видели моих людей?''\n\nОн увидел стоящую неподалеку фигуру в камуфляже и противогазе, которые выглядели немного устаревшими.\nФигура приблизилась, когда он присел на корточки рядом с ним.\n\nНочной дозор удивленно поднял глаза.\n\n''К-Кто вы? Назовите себя!''\nОн медленно встал, направив винтовку на фигуру.\n\n''Мои люди, вы их видели?'' он продолжал спрашивать.\n''Я... я уверен, что они все еще зде- если ты просто назовешь се-''\n\n''Конечно, они рядом, я все еще здесь, и ты тоже будешь. Никто из нас не покинет это место.''\nФигура протягивала руки к ночному дозору. На его форме были видны отверстия от пуль, а на шее - следы веревки.\n''Здесь зародилась цивилизация, и именно здесь она будет похоронена.''\n\nДозорный был внезапно разбужен тем, что кто-то из его команды тряс его за плечо.\n''Эй, чел, ты в порядке?''\nОн мягко улыбнулся. ''Не хочу, чтобы эти таскенские рейдеры взяли над нами верх.''\n\nТот, что стоял на страже, огляделся, но фигуры в маске там больше не было.\nОн встал и смущенно рассмеялся."
 nss.39.a: ""Пожалуйста, хватит делать отсылки на Звездные войны.""
 nss.40.t: "Отряд Жестокости"
 nss.40.d: "Когда фургон остановился перед зданием, двери его распахнулись. Солдаты без опознавательных знаков вышли друг за другом и направились ко входу, заложив взрывчатку у двери, взрыв эхом прокатился по улице, когда оперативники ворвались внутрь. Были ли это замаскированные ультраправые террористы или гражданские лица, любой, кто осмеливался встать у них на пути, был застрелен. Их первоочередной задачей было уничтожить особо важную цель и любых других потенциальных террористов, а затем и всех, кто мог что-то видеть.\n\nСнова и снова повторялось одно и то же - облегчение на лицах заложников при виде их спасителей сменялось замешательством и ужасом, когда оперативники направляли винтовки и на них. Выживших нет, свидетелей нет. Не то чтобы гражданские лица смогли бы узнать своих потенциальных спасителей, их лица были скрыты за балаклавами, но ничто не было оставлено на волю случая.\n\nКогда, наконец, они оказались перед запертой дверью, оперативник заложил в нее взрывчатку и вышиб ее ногой. Когда дым рассеялся, стало видно съежившегося человека с татуировкой в виде свастики на шее.\n\n"Не двигаться!" приказал руководитель группы.\n\n"Это не было частью сделки-" неонацист запротестовал, но только для того, чтобы отряд нашпиговал его свинцом. "Вы... обещали мне-"\n\nКоманда отступила. "Группа захвата, это КП. Команда зачистки уже в пути. Ликвидируйте всех оставшихся в живых. Конец связи."\n\n"Понял," - ответил руководитель группы. "Группа захвата, конец связи." Затем он повернулся к своим людям."
 nss.40.a: ""Вы их слышали. Давайте приступим к работе.""
 nss.41.t: "День Выборов"
 nss.41.d: "В наиболее авторитарных правительствах по всему миру право голоса было утрачено. Это чувство, когда у тебя нет власти, ты ничего не можешь сказать. Это парализующее чувство.\n\nАмериканский гражданин не чувствует такого паралича, каждые четыре года в самом разгаре предвыборный сезон - ритуал, посвященный свободе выбора и напоминающий нашему народу, что в его руках эта власть.\nОни смогут выбрать своего любимого кандидата, от харизматичного до прагматичного, от смешного до спокойного. Все будет как в те дни, когда еще не наступил период упадка популизма: все улыбаются и вступают в дружеское соперничество, как на спортивных играх.\n\nКто бы ни победил, механизм, скрытый за завесой, останется прежним.\nТеперь давайте посмотрим, чья фарфоровая маска будет ярко сиять на экране.\n\nИ победителем является..."
 nss.41.a: "Решающая победа действующего президента!"
 nss.41.b: "Гэвин Ньюсом"
 nss.41.c: "Митт Ромни"
 nss.41.e: "Ллойд Остин"
 nss.41.f: "Джон Болтон"
 nss.41.g: "Марк Милли"
 nss.41.h: "Энтони Блинкен"
 nss.41.i: "Хантер Байден"
 nss.41.j: "Нэнси Пелоси"
 nss.41.k: "Чак Шумер"
 nss.41.l: "Лиз Чейни"
 nss.42.t: "День Инаугурации"
 nss.42.d: "Люди высказались, и какая бы форма соперничества ни назревала между кандидатами и их сторонниками, она сошла на нет. Теперь пришло время пожимать руки и широко улыбаться, теперь пришло время снова объединиться.\nВ связи с введением карантина безопасность церемонии была усилена по очевидным причинам, поскольку избранный президент возложил руку на Библию и произнес свою клятву нации.\n\nОбычно их приветствовала бы толпа, но интернет-сми издают достаточно шума, чтобы компенсировать это, зажигаются фейерверки и на заднем плане звучит гимн, когда президента Соединенных Штатов Америки ведут в капитолий.\n\nПредвыборный сезон подошел к концу, и настало время должным образом познакомить президента с тем, как все делается, как публично, так и за кулисами."
 nss.42.a: "Они будут на коротком поводке."
 nss.43.t: "ВСЕМ, КОГО ЭТО КАСАЕТСЯ:"
 nss.43.d: "После недавней инаугурации президента Соединенных Штатов Америки появились слухи о последующей кончине бывшего президента Джозефа Робинетта Байдена, такие слухи, как о том, что "мы выдернули вилку из розетки" или что мы "ввели ему болезненный токсин", являются ничем иным, как откровенными попытками дезинформации со стороны США. внешние враги.\n\nНаш бывший президент Байден отдал свое сердце, душу и тело за нашу великую нацию, и он продержался до конца своих полномочий, чтобы предотвратить дальнейшую нестабильность, а это требует мужества.\nНесмотря на боль, несмотря на стресс, он терпел.\nИ точно так же, как это сделал он, сделаем и мы.\nМы выполняем свои обязанности, мы возвращаем мир в нормальное русло.\nИ мы движемся дальше, не обращая внимания на оставшиеся после нас шрамы.\n\nЯ хотел бы напомнить всем, что распространение подобных слухов подпадает под действие закона о вербальном несогласии и потенциально может рассматриваться как антиобщественная деятельность. Мне нет необходимости напоминать вам обо всех мерах, которые мы принимаем против подобных действий.\n\nУ нас нет времени погружаться в размышления и тайны, нам нужно перестроить мир.\nПОДПИСАНО:"
 nss.43.a: "Уильям Дж. Бернс"
 nss.44.t: "Стрельба в Местном Торговом Центре Унесло Жизни 20-ти Человек"
 nss.44.d: "Спокойный день быстро превратился в кошмар, когда молодая женщина примерно двадцати одного года прибыла в торговый центр Franklin в Пенсильвании, вооруженная пистолетом-пулеметом, с намерением убить как можно больше людей. Нападение продолжалось около двадцати минут, прежде чем местные власти смогли остановить ее с помощью смертоносных средств.\nВ результате нападения погибли по меньшей мере двадцать человек, еще четверо находятся в критическом состоянии, и уже поступили сообщения о том, что полицейские силы устанавливают контрольно-пропускные пункты по всему району и штату, чтобы уменьшить вероятность появления потенциальных подражателей.\n\nМотивы стрелка по-прежнему вызывают много споров, но в рюкзаке стрелка была найдена записная книжка, в которой содержались изображения и текст, связанные с нигилизмом и признаками ухудшения психического здоровья. В записной книжке были обнаружены постоянные темы "Глаза в темноте".\n\nПока расследование продолжается, а ее семью допрашивают, местные власти настоятельно рекомендуют обратить внимание на действия младших членов семьи, особенно в том, что касается их онлайн-активности.\n\nФБР заявило, что дополнительная информация будет представлена после того, как будут получены надлежащие подтверждения."
 nss.44.a: "После перерыва будет еще больше."
 nss.45.t: "Нападение на Кампус Наносит Шрам на всю Страну!"
 nss.45.d: "В местном колледже в Теннесси произошла трагедия, когда молодой человек лет двадцати начал стрелять из автоматического оружия как по студентам, так и по преподавателям. Местная служба безопасности попыталась задержать стрелявшего, но была вынуждена быстро отступить из-за применения коктейлей Молотова, при этом был убит по меньшей мере один сотрудник службы безопасности.\n\nВ кампусе колледжа была размещена группа спецназа, и после быстрого прочесывания местности стрелявший был остановлен с применением смертоносных средств. Сообщения о количестве погибших по-прежнему вызывают сомнения, но известно, что примерно более сорока человек погибли.\nО мотивах стрелка до сих пор ходят слухи, но шрамы от членовредительства по всему его телу указывают на серьезные проблемы с психическим здоровьем, а на бутылках с зажигательной смесью написаны издевательские надписи, такие как "Гори в аду!" и "Тепло, несмотря ни на что!".\n\nСемья подвергается серьезному допросу, поскольку местные власти тщательно отслеживают местную онлайн-активность, где люди могли бы выразить сочувствие стрелку или любую потенциальную связь с цифровой группой, поощряющей такое насилие.\n\nФБР заявило, что недавние расследования привели к выводу, что в Соединенных Штатах гораздо больше людей укрывают эти антисоциальные элементы, чем они первоначально предполагали.\n\nПродолжение последует после небольшого перерыва."
 nss.45.a: "Ого, Дисней снимает новый фильм!"
 nss.46.t: "Кровавая бойня Потрясает Нацию!"
 nss.46.d: "Уличный фестиваль в Новой Англии быстро превратился в кровавую бойню, когда двадцатичетырехлетний мужчина сбил нескольких человек на черном грузовике, на котором, после того как он врезался в кафе, были нанесены надписи "Затопи мир" и "ПОЕШЬ ГОВНА И СДОХНИ", а также другие ненормативные выражения. Стрелявший быстро вышел из грузовика с винтовкой в руках с единственным намерением убить как можно больше людей.\n\nНамерения стрелка были ясны, когда он топал ботинками по головам раненых и невнятно кричал. Сообщается, что его глаза были налиты кровью, а движения были нервными.\n\nНа место происшествия прибыли силы полиции, которые вынудили стрелка отступить в магазин, где он был быстро изолирован и ликвидирован с применением смертоносных средств. Власти утверждают, что стрелок оказал ожесточенное сопротивление, что привело к его смерти. Число погибших с легкостью достигло почти семидесяти пяти человек, по меньшей мере дюжина получила ранения, а основной причиной смерти стал наезд грузовика.\nВласти не подтвердили мотивы стрелка, но предположили, что преступник находился в состоянии сильного алкогольного опьянения и принимал различные виды лекарств, связанных с психическим здоровьем, и пообещали сообщить общественности больше, как только информация подтвердится.\n\nИз других новостей: федеральное правительство с гордостью объявило о расширении зон, свободных от оружия, в общественных местах, это произошло после гораздо более успешной общенациональной кампании по выкупу акций из-за ужесточения контроля за владением огнестрельным оружием."
 nss.46.a: "Ладно, но я хотел посмотреть Друзей, переключи канал."
 nss.47.t: "Атака Обжигает Американскую Душу!"
 nss.47.d: "Местная заправочная станция была охвачена пламенем взрыва, когда неподалеку был замечен подозреваемый с дробовиком в руках, стрелявший в тех, кого не задело взрывом.\n\nДвадцатишестилетний мужчина, имевший при себе несколько самодельных бомб, устроил беспорядки среди местного населения, взорвав близлежащие магазины и здания, оставив после себя кровавую бойню.\nНападавший был быстро задержан местными правоохранительными органами, но не раньше, чем он подорвал себя с помощью жилета с взрывчаткой, который носил под толстовкой.\nМотивы преступника в основном неизвестны, но родственники сделали заявления относительно его прошлого. Он сильно изолировал себя и проявлял признаки крайней степени паранойи, что, похоже, является еще одной статистикой о кризисе психического здоровья, охватившем Америку.\n\nЧисло погибших в результате теракта все еще не установлено, но официальные лица заявили, что оно может достигать сотни, если не больше. официальные лица пообещали проинформировать общественность, как только станет известна дополнительная информация.\n\nЧто касается других новостей, то сообщалось о повышенной штормовой активности вблизи побережья Флориды, эксперты, похоже, озадачены тем, что сейчас не сезон, жителям рекомендуется обращать пристальное внимание на официальные каналы в отношении любых потенциальных природных угроз."
 nss.47.a: "Неужели этих людей производят на фабрике?"
 nss.48.t: "Атака на Dollar Tree Привела к Массовому Насилию!"
 nss.48.d: "То, что изначально воспринималось как вооруженное ограбление, быстро переросло в нечто гораздо худшее.\n\nДвадцатиоднолетняя женщина была замечена входящей в местное Dollar Tree в Джорджии, и прежде чем продавец успел отреагировать, он был убит выстрелом в грудь из автоматической винтовки, в то время как она выла, как дикое животное. В конце концов она убила четырех покупателей, прежде чем выйти на улицу и начать беспорядочно стрелять по зданиям и группам людей, прежде чем скрыться в заброшенном торговом центре.\n\nКогда местные власти прибыли на место происшествия и попытались прочесать торговый центр, стрелявшая была не одна, поскольку она вместе с пятью другими людьми открыла огонь по присутствующим полицейским силам. Нападение на Dollar Tree, вероятно, было попыткой спровоцировать полицию на перестрелку.\nПреступники были хорошо вооружены, но были быстро ликвидированы после того, как на место происшествия прибыли подразделения спецназа, что привело к гибели всех шестерых стрелков.\n\nВласти утверждают, что существует высокая вероятность того, что в игре участвует более крупная группировка, но пока никаких подтверждений этому нет, около тридцати человек были убиты, и подразделения военной полиции были развернуты для наблюдения за любыми другими потенциальными угрозами.\n\nСкоро мы расскажем больше, но не раньше нашего перерыва."
 nss.48.a: "А почему именно на Dollar Tree?"
 nss.49.t: "Стрельба в Соединенных Штатах!"
 nss.49.d: "Террор охватил страну, когда стрелок одиночка устроил стрельбу в одном из местных районов, стрелка удалось быстро остановить с помощью смертоносных средств, но не раньше, чем число погибших достигло десятков. Местные власти заявили, что стрелок долгое время страдал психическими заболеваниями, принимал лекарства и имел проблемы в семье.\n\nРасследование относительно того, откуда стрелок взял оружие, и потенциальных мотиваторов такого нападения, все еще продолжается, поскольку власти обещают провести соответствующую пресс-конференцию, посвященную нападению. Еще один трагический день в Америке и многое другое будет рассказано сразу после перерыва."
 nss.49.a: "Я ненавижу рекламу."
 nss.50.t: "РАЗВЕДДАНЫЕ О СТРЕЛКАХ ОДИНОЧЕК"
 nss.50.d: "Следующий документ содержит информацию о том, как оказывать давление на восприимчивых людей, чтобы они предпринимали действия "одинокого стрелка" против населения. Предполагаемая цель состоит в том, чтобы посеять тревогу в общенациональном масштабе, чтобы не было противодействия усилению надзора и безопасности в Соединенных Штатах Америки.\n\nИспытуемые должны соответствовать следующим критериям, прежде чем на них будет оказано давление:\n-Субъект должен иметь антисоциальные наклонности.\n-Субъекту должно быть от шестнадцати до двадцати восьми лет.\n-Субьект должен быть представлен в Интернете.\n-У субьекта должны быть напряженные отношения со своей семьей.\n-Субъект должны быть проблемы с психическим здоровьем.\n\nПосле того как потенциальный кандидат найден, необходимо оказать необходимое давление.\nНачиная от давления со стороны групп/отдельных лиц в социальных сетях и заканчивая проявлением параноидальных наклонностей. Рекомендации по использованию лекарств настоятельно рекомендуются, но остаются необязательными.\n\nКак только становится ясно, что субъект станет катализатором инцидента с "стрелком одиночкой", если у субъекта нет возможности самостоятельно приобрести огнестрельное оружие, рекомендуется использовать группы-приманки/отдельных лиц для обеспечения их соответствующим снаряжением.\n\nПосле завершения инцидента с "стрелком одиночкой" рекомендуется устранить все следы, которые потенциально могут привести к причастности оперативников или задержанию внештатных сотрудников, которые были частью сетей-приманок, за участие в инциденте со "стрелком одиночкой"."
 nss.50.a: "Страница 1 из 30."
 nss.51.t: "Рождение Am-Net"
 nss.51.d: "Нерегулируемый характер дискуссий в Интернете давно был признан фактором, способствующим дестабилизации общества. Неспособность довоенных властей должным образом управлять переходом к информационной эре была оценена как критическая ошибка в управлении.\n\nДля устранения этого недостатка было принято решение о реализации проекта Am-Net. Опираясь на технический опыт как отечественных, так и зарубежных коллег, в ускоренном темпе был создан комплексный цифровой защитный механизм. Система повторяет эффективность аналогичных структур, внедренных в Китайской Народной Республике, и одновременно включает в себя американские технические инновации.\n\nПереход к управляемой информационной экосистеме произойдет в 04:00. Весь гражданский интернет-трафик будет проходить через узлы, контролируемые федеральными властями, с возможностью мониторинга в режиме реального времени. Несанкционированные внешние подключения будут блокироваться. Распространение внутреннего контента будет подлежать автоматическому и ручному контролю.\n\nДокументация по авторизации была доработана и представлена на окончательное рассмотрение руководством. Подпись директора является последним процедурным требованием перед началом полномасштабной реализации.\n\nИнфраструктура готова к работе. Персонал находится на своих местах. Мы ожидаем приказа."
 nss.51.a: "Am-Net в сети."
 nss.52.t: "Отчет о Возобновлении Программы D.U.M.B."
 nss.52.d: "ЦРУ/РС ВНУТРЕННЕЕ - КРАТКОЕ СОДЕРЖАНИЕ БРИФИНГА\nТЕМА: Отчет о Возобновлении Программы D.U.M.B.\nКЛАССИФИКАЦИЯ: СОВЕРШЕННО СЕКРЕТНО//NOFORN\n\nСВОДКА:\nПосле прекращения военных действий на территории бывших Соединенных Штатов Центральное разведывательное управление восстановило контроль над отдельными Глубокими Подземными Военными Базами (или же D.U.M.B.) в рамках продолжающейся стратегической программы на случай чрезвычайных ситуаций.\n\nСогласно предыдущим оценкам разведывательных служб, сеть D.U.M.B. Вооруженных сил США представляет собой существенный стратегический актив в случае как внутреннего мятежа, так и иностранной интервенции. Учитывая меняющуюся ситуацию в области безопасности после гражданской войны и необходимость обеспечения безопасности критически важных объектов национальной безопасности, Центральное разведывательное управление инициировало комплексную программу по восстановлению ряда объектов D.U.M.B., а также строительство дополнительных объектов.\n\nОТЧЕТ О ЦЕЛОСТНОСТИ СУЩЕСТВУЮЩИХ ОБЪЕКТОВ:\n\nD.U.M.B. МЕЖДУНАРОДНОГО АЭРОПОРТА ДЕНВЕРА: Значительные структурные повреждения в результате контролируемого сноса; все подходные туннели повреждены; по оценкам, потеряно 60-70% хранящихся материалов.\n\nD.U.M.B. ДУЛЬСЕ: Сейсмическая нестабильность и наводнения повредили большие участки объекта; доступно остается примерно 45 % комплекса.\n\nD.U.M.B. ЗОНЫ 51: Полная потеря наземных объектов (база ВВС Грум-Лейк), подземный комплекс поврежден в результате частичного затопления; остальная инфраструктура и архивные материалы проходят оценку на предмет восстановления.\n\nКОМПЛЕКС ЧЕЙЕНН-МАУНТИН: Ограниченное повреждение конструкции в результате оккупации повстанцами; объект временно контролировался сторонниками Трампа, после чего был отбит силами ЦСО с приемлемыми потерями. Оценка сохранности активов показывает 85% материальной целостности. Расширение подземной инфраструктуры находится на стадии стратегического рассмотрения.\n\nКОМПЛЕКС РЕЙВЕН-РОК-МАУНТАЙН: Остался в безопасности во время боевых действий благодаря укрепленной периметральной обороне и ограниченной осведомленности оперативного персонала. Существенных повреждений или потерь активов не зафиксировано. Расширение подземной инфраструктуры находится на стадии стратегического рассмотрения.\n\nКОМПЛЕКС МАУНТ-УЭЗЕР: Повреждений не зафиксировано. Функциональность подземной инфраструктуры сохраняется. Расширение подземной инфраструктуры находится на стадии стратегического рассмотрения.\n\nВЫВОД:\nВ то время как ведутся работы по оценке ущерба и восстановлению активов, рекомендуется в первоочередном порядке приступить к реализации комплексного плана по возобновлению деятельности объектов D.U.M.B."
 nss.52.a: "Разрешено."
 nss.53.t: "Восстановление Двухпартийной Системы"
 nss.53.d: "Сказать, что имидж Республиканской партии был запятнан предательством Трампа и последовавшей за этим гражданской войной, - это значительно преуменьшить ситуацию. Когда-то она была синонимом консерватизма и так называемого молчаливого большинства американцев, а теперь ассоциируется с мятежом и изменой. Ее захват популистскими силами, кульминацией которого стало катастрофическое руководство Трампа и кровавая борьба республиканского мятежа против американского единства, превратил ее в тень прежней партии. Даже после того, как пыль гражданской войны осела, очевидно, что Республиканская партия, какой она была когда-то, не подлежит восстановлению.\n\nОднако эксперты считают, что двухпартийная система чрезвычайно выгодна для достижения их целей. Смелая стратегия по восстановлению репутации Республиканской партии и обеспечению того, чтобы новая, послушная Республиканская партия служила надежным противовесом Демократической партии, начинает обретать очертания. Цель проста: направить несогласие в безопасный, контролируемый политический канал, который не представляет угрозы для установленного порядка.\n\nЭтот план предусматривает тщательный процесс damnatio memoriae, одновременно создавая новую нарративную линию, основанную на проэстаблишментском видении. Возрождение неоконсерваторов и движения Never-Trumper, которое когда-то было почти исчезнувшим, теперь определяет будущее партии, и стратегия зависит от их способности преподнести партию в приемлемом свете. Это предполагает дистанцирование новой Республиканской партии от наследия Трампа, подчеркивание ее приверженности основным консервативным ценностям, таким как малое правительство и индивидуальная ответственность, при этом обеспечивая, чтобы партия была столь же безобидной для элит, сколь и для избирателей.\n\nТак начинается кампания по восстановлению репутации: избавление от потенциальных сторонников МАГА, чтобы возродить старую Республиканскую партию и восстановить двухпартийную систему. Неоконсерваторы возглавят это новое политическое поколение, которое, как ожидается, будет тихо сотрудничать с демократами, заглушая несогласие и поддерживая только одобренные варианты. Конечной целью Когносценти является восстановление Республиканской партии, служащей фасадом, маскирующим реальную власть, сохраняя иллюзию выбора, чтобы поддерживать свое непоколебимое влияние. В основных новостных статьях будут хвалить республиканцев, которые поддержали Байдена во время кризиса, возвеличивая неоконсерваторов как героев, которые помогли бороться за восстановление политического здравомыслия. Нарратив представляет это возрождение как возвращение к нормальности, триумф демократии над популизмом, подчеркивая единство и представляя радикализм как опасный для национального примирения."
 nss.53.a: "Как всегда, массы жаждут быть обманутыми."
 nss.54.t: "Пуэрто-Рико и Округ Колумбия включены в состав Союза."
 nss.54.d: "ВАШИНГТОН, округ Колумбия (AP) - Конгресс тихо принял законы о принятии в состав США Содружества Пуэрто-Рико и округа Колумбия, предоставив им статус штатов и тем самым удовлетворив давнее требование их населения. Президент Байден заявил о своей полной поддержке этих законов и в ближайшие дни завершит процесс их утверждения.\n\nЭто решение является частью усилий администрации по устранению растущего разрыва между Америкой и ее заморскими территориями. Пуэрториканцы, которых многие жители материковой части США долгое время считали людьми второго сорта, теперь смогут участвовать в национальной политике, не проживая в Соединенных Штатах, а округ Колумбия наконец-то получит представительство в федеральном правительстве после десятилетий лоббирования. Президент считает эту инициативу "важным шагом" в "устранении раскола, который раздирает нашу великую нацию."\n\nС принятием этого закона число штатов в Союзе достигнет 52. Это приведет к появлению четырех дополнительных мест в Сенате, которые, вероятно, займут демократы. Уступка республиканцев в этом вопросе была представлена как «жест доброй воли» со стороны законодателей Республиканской партии, направленный на умиротворение расколотого общества. Переход к флагу с 52 звездами уже одобрен соответствующими государственными органами, и его внедрение должно быть завершено в ближайшие годы."
 nss.54.a: "Более совершенный союз."
 nss.55.t: "В Забвение"
 nss.55.d: "Он лежал в постели, покрытый трубками и аппаратами, измеряющими работу его сердца и дыхание его легких.\nДжозеф Байден некоторое время был заперт в собственном теле. В общем и целом это было недолго, но для него это казалось вечностью.\nОсознавать все, но не иметь возможности ничего сделать, вынужденно все чувствовать, видеть презрительные взгляды и слышать насмешки тех, кто о тебе заботится.\nЭто сводит с ума, бесконечная поездка.\n\nСегодня все было по-другому: он увидел знакомое лицо Бернса, который кивал и шептал что-то одной из медсестер, строго глядя на Байдена. Бернс уважительно кивнул ему, выходя из комнаты.\nОборудование вокруг него зазвучало по-другому, медсестра отвернулась от его взгляда и ввела что-то в его капельницу.\n\nСначала было чувство облегчения, потом стены начали таять.\nКартины на стенах, изображавшие природу, превратились в изображения животных, пожирающих друг друга. Окна начали трескаться, а медсестра стала тяжело хрипеть, пока не рухнула на пол с громким влажным звуком.\n\nКомната больше не была комнатой, а широким полем, покрытым голубой травой, с одиноким домом вдали.\nДом горит.\nВдали Байден увидел проходящую мимо фигуру, знакомое лицо.\n\n''Бо?'' - подумал Байден.\nЭто были всего лишь мысли, он по-прежнему не мог ни двигаться, ни говорить.\nЗапертый в мире, который он не узнает.\nЗапертый в мире, который постепенно погружается в темноту, он чувствует приближение чего-то еще.\n\nОн поднял глаза, когда небо тоже потемнело, солнце исчезло, но его улыбка осталась.\n\nПочему так темно?"
 nss.55.a: "Кто нибудь?"
 nss.56.t: "Декларация ООН о Целостности и Неприкосновенности Мира во Всем Мире"
 nss.56.d: "НЬЮ-ЙОРК (AP) - На историческом заседании, ознаменовавшем начало новой эры глобальной стабильности, Генеральная Ассамблея ООН единогласно приняла Декларацию о целостности и неприкосновенности мирового мира, официально закрепив радикальную реструктуризацию международной безопасности. Резолюция признает США "главным стражем" глобального порядка в рамках расширенного мандата Стратегической коалиции за мир. В рамках этой структуры "локальные кризисы" и "региональные споры" теперь подпадают под прямую юрисдикцию Коалиции, что позволяет централизовать надзор за глобальной безопасностью. Декларация устанавливает, что любое оспаривание авторитета ООН со стороны "стран-изгоев" или "дестабилизирующих элементов" вызовет скоординированное международное вмешательство, что представляет собой наиболее всеобъемлющую консолидацию глобального управления безопасностью со времени основания ООН.\n\n"Эта декларация представляет собой коллективный шаг к глобальной стабильности," заявил президент в телевизионном обращении. "Шаг, при котором верховенство закона, а не закон джунглей, будет иметь первостепенное значение в обновленном, основанном на правилах порядке, отражающем наши ценности. Этот порядок будет более справедливым, безопасным и способным обеспечить лучшее будущее. ООН, благодаря своей уполномоченной миротворческой роли в Стратегической коалиции за мир, будет работать вместе с США над продвижением глобальной безопасности и устойчивого развития. Когда мы добьемся успеха - а мы его добьемся - мы наконец сможем положить конец циклу, который определял историю человечества на протяжении тысячелетий, и вступить в Новый мировой порядок, отражающий ценности и принципы нашего общего человечества."\n\nАналитики в области обороны называют это соглашение концом суверенных военных действий, знаменующим начало эры "принудительной коллективной безопасности." Резолюция предусматривает создание глобальных центров сбора разведывательной информации, универсальных правил ведения боевых действий коалиции и постоянных объектов в стратегически важных точках."
 nss.56.a: "История снова заканчивается."
 nss.57.t: "Неучтенные Финансовые Средства"
 nss.57.d: "Появились некоторые тревожные сообщения относительно нашего секретного бюджета, иногда возникают пробелы в различных фондах, которые мы имеем для нескольких проектов и инициатив.\n\nОбычно это является административной оплошностью, но из-за сходства с операцией 2001 года мы подозреваем, что здесь может быть нечестная игра.\nКто бы ни был ответственен за отсутствие средств, скорее всего, он делает это не из личной заинтересованности, а стремится использовать их для подрыва нашей программы.\n\nРекомендуется следить за антисоциальными группами, которые внезапно стали хорошо вооруженными или более смелыми в своих действиях, а также за любыми разговорами среди наших оперативников, поскольку не исключена возможность подкупа.\nТем не менее, эти пробелы в наших ресурсах легко исправить, но тот факт, что у нас есть кто-то изнутри, кто что-то планирует, является более чем достаточным поводом для беспокойства."
 nss.57.a: "Лезвие капитала обернулось против нас."
 nss.58.t: "Лягушка в Кипящей Воде"
 nss.58.d: "''Похоже, он не справился.''\nЭто был относительно спокойный день в Пентагоне, когда Уильям Дж. Бернс шел по одному из многочисленных коридоров в сопровождении небольшой группы коллег и охраны.\n\n''Нет, токсин в его крови указывает на целенаправленную атаку.''\n''Есть какие-нибудь идеи, кто может за этим стоять?''\n\n''Проблема здесь в том, что этот токсин в основном использовался нами, поэтому французы обвиняют нас в убийстве своего дипломата.''\n''Я никогда этого не одобрял.''\n''Вы не делали этого, сэр.\n\nБернс нахмурился, вспомнив о предыдущем инциденте, связанном с исчезновением средств, связанных с черным бюджетом. Кто бы ни скрывался в тени, это кто-то, у кого есть друзья и опыт.\n\n''Постарайтесь уладить ситуацию с французами и организовать встречу с консультативным советом.'' Он хотел сказать больше, но быстрый взгляд на окружающих заставил его промолчать.\n''Сию же минуту, сэр.''\n\nБернс задавался вопросом, что пытается сделать этот человек, этот предатель, но благодаря этому дипломатическому инциденту он, возможно, нашел ключ к разгадке их цели. И эта цель вызывает у него серьезную обеспокоенность."
 nss.58.a: "Треснувшую маску, возможно, никогда не удастся починить."
 nss.59.t: "Инцидент на Объекте Саванна-Ривер"
 nss.59.d: "В правительственные круги поступило тревожное сообщение. На объекте Объекте Саванна-Ривер, который в основном известен управлением ядерными материалами и проведением исследований, произошло вооружённое проникновение.\n\nСначала ничего необычного не происходило, но после того, как связь с объектом была прервана, выяснилось, что на объект был совершен налет антисоциальной группировкой под названием "Стервятники", которая представляет собой анархистскую группу, находившуюся в самом конце нашего списка приоритетов. Однако потери на стороне нападающих были огромны; они не были там с целью нанесения ущерба, так как небольшая часть из них сумела отступить из этого района.\n\nСначала ничего необычного не происходило, но после того, как связь с объектом прервалась, выяснилось, что на него напала антисоциальная группировка под названием "Стервятники" - анархистская организация, которая находилась в самом конце нашего списка приоритетов. Однако потери на стороне нападающих были огромны; они не были там с целью нанесения ущерба, так как небольшая часть из них сумела отступить из этого района.\n\nОчевидно, что группа была нанята неизвестной третьей стороной или лицом, но подробности о данной третьей стороне все еще расследуются."
 nss.59.a: "Это больше, чем мы думали."
 nss.60.t: "Потерянные Активы"
 nss.60.d: "Отчет мягко, но решительно приземлился на стол директора Бернса. Это был тонкий, неприметный файл нейтрального серого цвета, который как-то поглощал свет его кабинета. Название, напечатанное черными буквами, гласило: "Потерянные Активы - Внутренние Бухгалтерские Несоответствия." Бесцветный эвфемизм для потенциального кошмара.\n\nБернс отпустил своего помощника коротким кивком, уже устремив взгляд на первую страницу. Ему не нужно было читать много. Цифры не сходились, и не на небольшую сумму. Средства, выделенные на инфраструктурные проекты, а именно на строительство новых "реабилитационных и перерабатывающих центров" в южном Техасе, исчезли. Переведенные через лабиринт подставных счетов, следы растворились, как туман.\n\nНо потери были не только финансовые. Они потеряли персонал. Ключевой специалист по логистике из проекта "Мегаполис" самовольно покинул службу. А старший научный сотрудник по ядерной физике из Управления по борьбе с наркотиками, женщина с высоким уровнем доступа к секретной информации, просто не вышла на работу три дня назад. Ее квартира была пуста, вычищена до блеска.\n\nБернс знал об этих тактиках, потому что сам был одним из их родоначальников. Это не были случайные события. Они были скоординированы и осуществлены кем-то, кто знал архитектуру системы, ее слабые места и уязвимые точки. Кем-то изнутри.\n\nОн подумал о донесении. О предупреждении. Как любое тело, зараженное паразитами...\n\nБернс предположил, что паразит не просто питался. Он намеревался создать что-то. Средства, знания, данные - все это было сырьем для чего-то другого. Оружия, направленного на сердце Порядка, который они так кропотливо строили. Их Иуда был очень занятым еретиком.\n\nОн откинулся на спинку кресла, и кожаное сиденье заскрипело под его весом. Вид из окна был спокойным и упорядоченным. Но за ухоженными газонами и оградой он почти ощущал, как распространяется гниль. Одна-единственная клетка, ставшая злокачественной. Предатель, вооруженный их собственными секретами.\n\nБернс взял свой специальный телефон. Его голос был тихим, ровным. "Свяжите меня с Финком. И с Томпкинсом...""
 nss.60.a: ""Скажите им, что у нас зараза.""
 nss.61.t: "Попытка Доступа к Кодам Запуска!"
 nss.61.d: "''Есть Зацепки?'' Уильям Дж. Бернс не был человеком, который быстро нервничает, но новость о кибератаке на внутренние цифровые сети вызвала у него беспокойство.\n\n''Нет, сэр, злоумышленники пытались найти способ получить доступ к кодам запуска ракет. Нам удалось отключить их от наших сетей. Определить источник атаки оказалось сложно, но он определенно находится в пределах наших границ.''\n\nВесь Пентагон находился в состоянии повышенной готовности, и атмосфера паранойи была ощутима физически. Офисные работники и охранники смотрели друг на друга с большим подозрением, и сотрудничество было в лучшем случае неохотным.\n\n''Они что-нибудь добыли?'' - спросил Бёрнс; он не спал уже несколько дней. Иногда ему кажется, что он видит предателя в толпе, но его облик постоянно меняется. Он всегда остается недосягаемым.\n\n''В том-то и проблема, сэр.''"
 nss.61.a: ""Мы не знаем.""
 nss.62.t: "Пропавшие Боеголовки"
 nss.62.d: "Внутреннее функционирование федерального правительства находится под большим напряжением, поскольку каждая проходящая минута эквивалентна увеличению температуры в кастрюле с кипящей водой.\nКоллеги, которые работали бок о бок на протяжении десятилетий, теперь смотрят друг на друга так, как будто обнаружили скелеты в своих шкафах. И сегодняшний инцидент свидетельствует о том, что мы приближаемся к критической точке.\n\nВо время одной из регулярных проверок наших ракетных баз мы сделали шокирующее открытие: несколько ядерных боеголовок пропали. Оказалось, что целью кражи стала не одна база, а несколько баз, которые подверглись скоординированному хищению.\nПерсонал, связанный с этими объектами, подвергается интенсивным допросам вместе со своими семьями, поскольку мы следим за мировым черным рынком на предмет любых продаж, связанных с нашими пропавшими ядерными боеголовками.\n\nКак это вообще стало возможным, пока остается предметом расследования, но ясно, что предатель, который их похитил, намерен использовать их. Если мы не примем соответствующие меры, ситуация быстро ухудшится."
 nss.62.a: "Неуправляемый меч Дамокла."
 nss.63.t: "Подводные Лодки Занимают Позиции"
 nss.63.d: "''Они ЧТО?''\nУильям Дж. Бернс не был человеком, который любил кричать, не говоря уже о том, чтобы вопить, но повышение его голоса было вполне ожидаемо, когда поступила новость о том, что несколько подводных лодок, которые были объявлены пропавшими без вести, были обнаружены в разных точках Атлантического океана и направлялись в неизвестные места.\n\n''Подводные лодки вооружены ядерными боеголовками, которые недавно пропали; мы предполагаем, что они ждут приказов от того, кто ими командует.''\n\n''Перехват, скорее всего, заставит их открыть огонь. Есть какие-нибудь новости о нашем подозреваемом?''\n''Нет, сэр.''\n''Уходи и не возвращайся, пока не найдешь что-нибудь.''\n''Понятно, сэр..''\n\nБернс откинулся на спинку стула, но никакого расслабления не было и в помине.\nПредатель постоянно ускользал от его внимания; им постоянно удавалось избегать глаза провидения, и теперь они стали чрезвычайно дерзкими. Вся проделанная им работа может быть уничтожена одним ядерным ударом. Этого нельзя допустить."
 nss.63.a: "Время на исходе..."
 nss.64.t: "Ракетные Базы Выходят из-под Контроля"
 nss.64.d: "После инцидента с подводной лодкой было вероятно, что следующей целью станут ракетные базы, и когда мы попытались связаться с персоналом на месте, связи не было.\n\nМы можем только предполагать худшее. Уже сейчас объекты окружены несколькими отрядами ЦСО, готовыми к удару; однако из-за нестабильности ситуации мы не можем просто ворваться туда. Что бы ни было у предателя, это можно будет вернуть, если нам удастся найти и задержать цель.\n\nУ нас мало времени; чем дольше мы будем искать цель, тем больше вероятность, что все наши усилия по реализации нашей концепции окажутся напрасными."
 nss.64.a: "Сердце Порядка бьется всё быстрее."
 nss.65.t: "Переворот в Бразилиа"
 nss.65.d: "В Бразилиа военный переворот против бразильского правительства сверг нынешний режим в пользу переходного военного, сославшись на "угрозы демократии" и "усиление нестабильности," вызванные политикой прежней администрации. Военный режим был признан легитимным Государственным департаментом, а президент направил письмо новой хунте, приветствуя восстановление порядка и мира в Бразилии, стране, имеющей глубокие дружеские связи с Соединенными Штатами.\n\nВ Бразилиа военный переворот против бразильского правительства сверг нынешний режим в пользу переходного военного, сославшись на "угрозы демократии" и "усиление нестабильности," вызванные политикой прежней администрации. Военный режим был признан легитимным Государственным Департаментом, а президент направил письмо новой хунте, приветствуя восстановление порядка и мира в Бразилии, стране, имеющей глубокие дружеские связи с Соединенными Штатами.\n\nВ интервью газете New York Times представитель Государственного департамента подтвердил, что Соединенные Штаты внимательно следят за ситуацией в Бразилии и ведут конструктивный диалог с переходными властями. Представитель подчеркнул поддержку Соединенными Штатами мирной и упорядоченной смены власти, отметив, что правительство США готово помочь бразильскому народу в его стремлении к демократической стабильности и процветанию, если новое правительство обратится с такой просьбой."
 nss.65.a: "Снова под нашим крылом."
 nss.66.t: "Реконструкция России"
 nss.66.d: "Любая варварская цивилизация с удовольствием бы наслаждалась убийством одного из своих величайших противников, и хотя среди мужчин и женщин, которые способствовали ослаблению России, царит атмосфера ликования, мы не выражаем никакой формы удовлетворения.\n\nРоссия всегда была страной, пропитанной автократией, будь то из-за перенесенных трудностей или долгой истории внутренних конфликтов; мы не виним их за то, что они сделали. Им просто не хватало чуткости. Но это не имеет значения, потому что впервые американские танки проехали по Красной площади, а вместе с ними пришло множество новых идей и концепций, которые были чужды русскому народу.\n\nПоскольку их корпорации постепенно поглощаются нашими, а их оппозиция усиливается, необходимо как можно скорее решить вопрос о том, кто станет лицом новой России, чтобы не допустить возрождения националистических настроений.\n\nМихаил Борисович Ходорковский – человек, окруженный скандалами, но его способность избежать полной политической смерти – талант, который мы можем оценить. После потери своих долей в сибирских нефтяных месторождениях, несомненно, у него появились счеты с бывшими противниками. С ним у руля России мы можем обеспечить прочный мир между нашими двумя странами."
 nss.66.a: "Медведь без когтей."
 nss.67.t: "Реконструкция Китая"
 nss.67.d: "Любая страна, которая пытается занять уже занятое место, всегда окажется в проигрышной ситуации. Китай - еще одна из таких стран, которые ждут своей очереди, чтобы попытаться и потерпеть неудачу.\n\nВойна против Китая была жестокой, и они сражались изо всех сил, но, как и у любого бешенного животного, которое рычит и кусается, его зубы сломились.\nПосле длительной кампании Народно-Освободительная Армия почувствовала растущее давление со стороны вооруженных сил США, поскольку, по всей видимости, она не была создана для противостояния мировой полиции.\n\nБыло неизбежно, что НОАК обратится против своего хозяина, и после последовавшего за этим переворота единственным человеком, который протянул нам руку, был Лю Ячжоу, человек, который никогда не боялся критиковать Коммунистическую Партию Китая и, видя растущую кучу провалов, принял разумное решение искать мира и примирения.\n\nПосле достижения мира последует восстановление, в ходе которого мы будем содействовать реструктуризации китайского правительства и его ресурсов.\nПобедить национального гиганта было нелегкой задачей, но в условиях Американского мира это было вполне ожидаемо."
 nss.67.a: "Дракон больше не будет летать."
 nss.68.t: "Кровь"
 nss.68.d: "Конференц-зал в Лэнгли был залит холодным светом мониторов. Соединение проходило через лабиринт зашифрованных каналов - из Цюриха в Сингапур, а затем обратно через серию теневых серверов. На другом конце проходила тайная сессия на окраине ежегодного собрания Всемирного Экономического Форума, где архитекторы глобального капитала тайно сговорились. С главного экрана Клаус Шваб наклонился вперед, его лицо выражало отцовскую заботу. После краткого приветствия всех присутствующих он перешел к сути дела. Стабильность требовала большего, чем военные действия; она требовала предсказуемой структуры для будущего.\n\n"Мировая экономика была построена на фундаменте Соединенных Штатов," плавно произнес Шваб. "Эта основа сейчас разрушена. Инвесторам необходимо знать... что будет построено на ее месте?"\n\nДиректор Бернс на мгновение задумался над этим вопросом. Он знал, что стабильность мировой экономики зависит не только от победы - необходимо было уже сейчас определить видение послевоенного будущего. У него было несколько предложений, и ему нужно было сформулировать наиболее жизнеспособное из них для председателя ВЭФ.\n\n"Мы перестроим Америку сверху донизу, сделаем ее более сильной и устойчивой под руководством наиболее квалифицированных специалистов. Популистский эксперимент закончится навсегда. Его заменит новая модель рационального управления, возглавляемая лучшими представителями академических кругов, промышленности и правительства."\n\n"Модель Давоса, масштабированная до уровня национального государства," Шваб ответил. В его голосе слышалось одобрение, хотя и оставалось легкое сомнение. "Но чтобы править, сначала нужно победить. Конституционные повстанцы по-прежнему контролируют обширную территорию."\n\nДиректор кивнул. "Мы душим режим Денвера экономическим давлением, которое уже ломает их оборону. Кроме того, у нас есть планы по минимизации последствий после окончания войны."\n\nФинк наклонился вперед. "Плавная передача власти имеет решающее значение как с военной, так и с экономической точки зрения. Когда мы одержим победу, мы должны быть готовы сразу же приступить к делу. Наши планы по восстановлению экономики обеспечат сохранение конкурентоспособности Америки на мировом уровне, даже при первоначальном снижении производственных мощностей."\n\n"Хорошо. Мы рады, что вы это понимаете." Шваб откинулся назад. ""Популистский Рак" является глобальным явлением, а "Великий Перезапуск" - нашей возможностью. Если Америка покажет пример, мы сможем восстановить здравый смысл. Но этот конфликт требует быстрого и решительного завершения."\n\nДиректор Бернс кивнул: "Будьте уверены, герр Шваб, мы принимаем все необходимые меры, чтобы обеспечить именно это.""
 nss.68.a: "Порядок, Капитал, Непорочность"
 nss.69.t: "Ситуационная Комната"
 nss.69.d: "В безопасной комнате для совещаний решалась судьба будущих военных действий. На главном экране зловеще светилась карта раздробленных Соединенных Штатов, окрашенная в цвета расколовшейся на части страны. Гул серверов и зашифрованных линий связи были единственными звуками, нарушавшими тишину, пока комната, заполненная военными и разведчиками, передавала последние новости с фронта.\n\n"Состояние президента стабильное," Советник по национальной безопасности Джейк Салливан прервал молчание. Его голос был напряженным, и по его интонации было очевидно, что он испытывает стресс из-за сложившейся ситуации. "То есть, он по-прежнему находится под действием успокоительных препаратов. Официальная версия о том, что он, как всегда, мужественно руководит военными действиями из Белого дома, остается верной."\n\nДжеффри А. Круз, глава Агентства военной разведки, ткнул пальцем в карту. "Проблема не в повествовании. Проблема здесь," он указал на Денвер. "что конституционалисты ведут серьезную борьбу за Восточное побережье. Генерал Флинн, предатель, командует несколькими бригадами армии и национальной гвардии, не говоря уже об обширных массивах экстремистских ополчений. Они намерены прорвать нынешнюю линию фронта."\n\nИз темного угла комнаты раздался еще один голос. Дэвид Марлоу, заместитель директора ЦРУ по оперативной работе, вышел вперед. "Обычное мышление привело нас к этой ситуации. Пока армия Милли ведет изнурительную войну, мои ресурсы могут решительно положить конец этому наступлению. Позвольте мне отрубить голову змее."\n\nЛарри Финк, генеральный директор BlackRock и де-факто представитель ВЭФ в зале, выразил свою озабоченность. "Нашим приоритетом является минимизация любых дальнейших экономических последствий," сказал он. "Любые секретные операции должны учитывать этот фактор."\n\nКрузе бросил на Финка гневный взгляд. "Единственное, что подвергается риску, это нация, Ларри. Ваши активы здесь вряд ли являются приоритетом." Финк ответил резкой репликой о "национальной стабильности", а Марлоу вставил замечание о том, что "национальная стабильность" в данный момент является оксюмороном.\n\nДиректор Бернс стоял во главе стола. Вес нации - или того, что от нее осталось - лежал на его плечах. Когносценти, этот совет, созданный по необходимости, смотрел на него. Его решение могло определить судьбу миллионов и ход войны. Директор рассмотрел возможные варианты..."
 nss.69.a: "Утвердить план Крузе."
 nss.69.b: "Продолжить план Марлоу."
 nss.69.c: "Финк прав."
 nss.70.t: "Сквозь Тусклое Стекло"
 nss.70.d: "Командный центр под Пентагоном кипит деятельностью. Офицеры просматривают отчеты, атташе переходят от стола к столу. Генерал Милли, командующий Объединенным комитетом начальников штабов, вызвал директора Бернса по срочному делу.\n\nНа лице Милли отчетливо читается усталость, а в его словах слышится беспокойство. Генерал указал на экран, на котором была отображена карта, иллюстрирующая линию фронта конституционалистов.\n\n"Директор, мы обнаружили генерала Кристофера Г. Каволи. NSA SIGINT, подтверждено источником в их командной структуре. Он является оперативным командующим здесь - харизматичным, блестящим и, что особенно важно, связующим звеном, объединяющим несколько бригадных боевых групп и подразделений ополчения. Его подход "вести за собой" сделал его известным и поставил в опасное положение близко к нашей линии фронта. Он является самой большой угрозой на западном фронте."\n\nДжейк Салливан, советник по национальной безопасности, вступил в разговор: "Каволи может стать следующим Паттоном или Роммелем. Его устранение из строя парализует региональное командование и управление, возможно, на несколько месяцев. Это может стать тем поворотным моментом, который нам нужен на западном фронте."\n\nДиректор Бернс изучил карту, нахмурив брови. "Если Каволи такой, как вы говорите, то с ним нужно разобраться."\n\nМилли продолжил: "Однако его командный центр защищен несколькими уровнями интегрированной системы противовоздушной обороны. Обычный авиаудар не входит в вопрос. У нас есть два реальных варианта ликвидации - все, что сложнее, будет уже вашей прерогативой, директор."\n\nСалливан кивнул. "В Денвере есть люди, которые с опаской относятся к его быстрому взлету и видят в нем политического соперника генерала Флинна. Мы могли бы воспользоваться этими настроениями и инициировать чистку. Недостатком, конечно, является непредсказуемость этих конституционалистов - все это может обернуться против нас."\n\n"Или мы могли бы уничтожить Каволи с помощью разрушителя бункеров, выпущенного с B-52 на максимальной дистанции, далеко за пределами зоны действия ЗРК," Милли ответил. "Проблема с этим вариантом заключается в возможности массовых жертв, поскольку его командный центр находится в непосредственной близости от жилых домов."\n\nСалливан вставил, "Такая оптика была бы... ужасна, конечно."\n\nДиректор рассмотрел возможные варианты, взвесил все за и против каждого из них. Теперь судьба Каволи зависела от его решения."
 nss.70.a: "Начать тактический удар разрушителем бункеров."
 nss.70.b: "Используем инфильтратора."
 nss.70.c: "Посеем паранойю."
 nss.71.t: "Волны из Скалистых Гор"
 nss.71.d: "Решение отказаться от прямой атаки на генерала Каволи в пользу психологической операции было встречено Когносценти с тихим размышлением. Не было немедленной, инстинктивной победы, но семена паранойи были посеяны. Под руководством Бернса Отдел информационной войны ЦРУ тщательно подготовил серию поддельных коммюнике, зашифрованных сообщений и финансовых отчетов. Эти документы, призванные создать впечатление, что генерал Каволи ведет переговоры с Вашингтоном о заключении отдельного мира в обмен на амнистию, были переданы через скомпрометированный канал глубоко внутри сети правительства Денвера.\n\n"Первые отзывы обнадеживают," сообщил аналитик по коммуникациям, указав на всплеск зашифрованного трафика между службой внутренней безопасности Денвера и их высшим командованием. "Они гонятся за призраками. Союзники Каволи в высшем командовании подвергаются тщательной проверке, а сам генерал помещен под домашний арест в ожидании суда за измену. Это может повлиять на их боевой дух и стабильность командования в регионе."\n\n"Это не та декапитация, которую мы могли бы добиться с помощью удара, но мы вбили клин в их механизм," Заместитель директора ЦРУ по оперативной работе Марлоу согласился с этим. "Сейчас они обращают взоры внутрь, удваивая усилия по проверке лояльности к Трампу."\n\nГенерал Милли недовольно хмыкнул. "Посмотрим сможет ли этот удар остановить танковую колонну.""
 nss.71.a: "Операция прошла успешно."
 nss.72.t: "Разрушитель Бункеров"
 nss.72.d: ""Генерал, вам разрешено начать операцию ОДИНОКИЙ ГОЛУБЬ. Выполните вариант Браво,"  заявил Бернс спокойным и уверенным голосом.\n\nГенерал Милли мрачно кивнул и заговорил в свой коммуникатор. "Командование Скайфайер, это Олимпус. Одинокий Голубь готов к запуску. Повторяю, Одинокий Голубь готов к запуску. Выпустите боевую нагрузку по указанной цели." Он снова посмотрел на голографическую карту. "B-52 Stratofortress уже находится в режиме ожидания над дружественной территорией. Через минуту он взлетит и направится на запад. Попадание примерно через два часа."\n\nСалливан переступил с ноги на ногу с озабоченным выражением лица. "Директор, их пропагандистские сети будут в восторге от этого. Они будут изображать нас монстрами, бомбящими собственную страну. Это будет стимулировать их вербовку."\n\nНа это директор Бернс почти не отреагировал. "Они и так уже изображают нас монстрами," - ответил он, отвернувшись от карты. "Ну и пусть. Это не битва за сердца и умы, Джейк. Это война на уничтожение. Пусть сердце страны услышит гром нашей решимости. Пусть их генералы знают, что даже их бункеры не защищены от нас. Единственный язык, который они понимают, - это сила, и я намерен говорить с ними на диалекте, к которому они не могут не прислушаться"\n\nГенерал Милли наклонился. "Я скажу одно, директор: у тебя есть яйца."\n\n"Я позабочусь о том, чтобы Государственный Департамент был в состоянии готовности, чтобы смягчить любые негативные последствия." сказал Марлоу.\n\nДиректор кивнул. "Постарайся, Марлоу.""
 nss.72.a: "Операция прошла успешно."
 nss.73.t: "Яд"
 nss.73.d: "Решение Бернса было принято с холодным расчетом опытного разведчика. Приказ был передан по зашифрованным каналам из командного центра под Пентагоном через защищенные спутники агенту, встроенному в высшее командование генерала Каволи. Не будет взрывов, не будет героических мученических смертей, только тихая, неопровержимая ликвидация. Вероятность обратного удара была минимальна, а выгода - огромна.\n\nВ оперативной комнате в Лэнгли царила напряженная атмосфера. "Посылка доставлена," - сообщили вы, и в воздухе повис клинический эвфемизм. "Наш агент подтвердил, что личный повар Каволи получил ее. Теперь мы ожидаем."\n\nЧерез несколько часов в темной комнате на экране появилось зашифрованное сообщение: "Операция успешно завершена. Каволи ликвидирован." Сообщение было простым, лаконичным и совершенно ошеломляющим.\n\n"Ну, директор, похоже, что "тихий вариант" принес самые громкие результаты." Заместитель директора ЦРУ по оперативной работе Марлоу пробормотал, и на его лице едва заметно промелькнула тень улыбки. Директор в ответ лишь кивнул головой.\n\n"Начните готовить контрпропагандистскую версию. Чем больше мы сможем сделать это похожим на внутреннюю работу, тем лучше." заявили вы.\n\n"Понятно, директор," Марлоу кивнул. Он на мгновение замолчал, обдумывая ответ. "С уходом Каволи их командная структура окажется в хаосе. Мы могли бы здесь сильно надавить."\n\nБернс кивнул. "Я передам информацию Крузу и Милли. Хорошая работа, Марлоу. Это может изменить ситуацию на западе."\n\nМарлоу ответил: "Это всего лишь наша работа, директор.""
 nss.73.a: "Операция прошла успешно."
 nss.74.t: "Операционный Провал"
 nss.74.d: "ТОЛЬКО ДЛЯ ЦРУ/РС\nСУБЪЕКТ: Кристофер Г. Каволи\nДАТА: УДАЛЕНО\nКЛАССИФИКАЦИЯ: СОВЕРШЕННО СЕКРЕТНО//NOFORN\n\nОбъект пережил попытку ликвидации. Оперативная неудача может подстегнуть противника. Проводится расследование возможной утечки информации в нашей сети.\n\nНеудача - это урок для всех участников."
 nss.74.a: "-DB"
 nss.75.t: "Великая Шахматная Доска"
 nss.75.d: "С момента начала войны командный центр был переполнен. Это был упорядоченный хаос: десятки людей постоянно двигались, но никто не мешал друг другу - приложения, приказы и стенограммы переходили от стола к столу за считанные секунды, но никогда не терялись. Непрофессионал нарушил бы этот поток, но среди них не было таких. В стороне от всего этого находился отдельный кабинет, в котором генерал Милли, командующий Объединенным комитетом начальников штабов, проводил брифинг для директора Бернса.\n\nГенерал указал на экран, на котором была отображена карта европейского фронта - каждая страна была обозначена разными оттенками неонового красного цвета, контрастирующими с неоновым синим цветом, рассыпанным по всей Европе, который обозначал американские владения. Директор Бернс сохранял ледяной взгляд, изучая каждую деталь карты перед ним.\n\nГолос генерала Милли звучал уверенно, но его потемневшие глаза говорили о другом. "Европейцы оказались гораздо более стойкими, чем мы предполагали, директор. Моделирование, проведенное корпорацией RAND, показывает, что простая грубая сила в конечном итоге сломит европейцев, но потери - как в живой силе, так и в вооружении - будут огромными."\n\nБернс внимательно слушал каждое слово, нахмурив брови. "Мы выявили какие-либо внутренние уязвимости?"\n"Именно поэтому я и попросил о встрече, господин директор. Европейцы страдают от нестабильности, расколов и сбоев в работе инфраструктуры." ответил Милли.\n\nМилли продолжил: "Между немецким и французским верховным командованием существуют крайние разногласия - будь то расовые конфликты, территориальный реваншизм или множество мелких разногласий. Мы могли бы усугубить эти разногласия, но это было бы рискованно."\n"Кибератака также является одним из вариантов. Киберкомандование уже выявило ключевые слабые места в системе кибербезопасности европейцев. С помощью непрерывных кибератак мы могли бы отключить электросети, средства связи, все. Но если мы не будем осторожны, европейцы могут понять это и исправить уязвимость, прежде чем будет нанесен реальный ущерб."\n\n"Все остальное зависит от вас, директор." завершил Милли.\n\nДиректор Бернс обдумал каждый из доступных вариантов. У каждого из них были свои плюсы и минусы, а также риски, каждый из них мог нанести ущерб военным усилиям. Но бездействие - это самый большой грех из всех."
 nss.75.a: "Используем их разногласия"
 nss.75.b: "Подготовка массивной кибератаки на европейскую инфраструктуру."
 nss.75.c: "Финансируем демократических борцов за свободу"
 nss.76.t: "Гладио"
 nss.76.d: "Решение о поставке еще большего количества оружия и боеприпасов в руки европейских диссидентов сначала вызвало удивление и гипотетические предположения со стороны экспертов. "Если люди узнают, что диссиденты получают поддержку от нас, это может стать кошмаром для имиджа," и "Это может даже придать импульс их делу." Прошло несколько недель, и эти голоса замолчали. Семена, посеянные директором Бернсом, уже приносят плоды.\n\nСоветник по национальной безопасности Джейк Салливан вызвал директора Бернса на очередной брифинг. Он указал на экран перед ними, на котором было несколько изображений какого-то городского центра. Улицы были завалены осколками стекла и кусками кирпичей. Вокруг валялись тела, покрытые сажей и пылью. Без сомнения, это был результат террористической атаки, подумал Бернс.\n\nСалливан объяснил ровным и твердым голосом: "В 9:00 по центральноевропейскому времени в Лейпциге, Германия, в оживленном центре города взорвалась бомба, в результате чего погибли 29 человек и 200 получили ранения."\n"Я считаю, что это еще одна атака, совершенная новой волной европейских диссидентов, которые получили наше финансирование. В течение последних нескольких дней власти Германии, Франции и Италии пытаются найти виновных. Некоторые возлагают вину на новую волну крайне правого экстремизма, другие обвиняют в недавних террористических актах радикальных левых."\n\nСалливан пролистывал различные изображения, каждое из которых было более кровавым, чем предыдущее. Однако все они имели одну общую черту: все они произошли в течение последних нескольких недель и все они нанесли серьезный ущерб европейским режимам.\nБернс внимательно выслушал каждую трагическую деталь и изучил каждое изображение. Он ни разу не моргнул, как он заметил. Отчеты соответствовали его прогнозам. В тот момент он понял, что принял правильное решение."
 nss.76.a: "Операция прошла успешно."
 nss.77.t: "Дым и Зеркала"
 nss.77.d: "На этот раз Отдел информационной войны ЦРУ превзошел сам себя. Каждый пиксель, каждое слово в документе, лежащем перед директором Бернсом - том самом, который только что "просочился" в немецкое верховное командование, - было неотличимо от подлинника. Если бы директор Бернс не был таким наблюдательным человеком, он вряд ли бы распознал подделку.\n\nЭти "военные планы" по разделу немецкой территории Францией соответствовали всем требованиям, пересекали все границы и были всем тем, против чего молились немцы. Если Берлин поверит этой утечке информации, то никто не может предсказать, насколько глубокими могут быть расколы в европейском верховном командовании.\nГенерал Милли, командующий Объединенным комитетом начальников штабов, зашевелился на своем месте, бормоча про себя о всех возможных способах, которыми эта операция может пойти наперекосяк. Бернс, однако, оставался неподвижным, ожидая первых признаков жизни, которые должны были поступить по каналам связи.\n\nТишина прервалась, когда аналитик связи, сидевший рядом с ним, доложил: "Я вижу здесь некоторое оживление, сэр."\nВ течение следующих пяти минут зашифрованные сообщения между немецкой службой внутренней безопасности и высшим командованием становились все более частыми. Немцы были явно разъярены - их возмущала сама мысль о том, что французы считают себя способными разрушить немецкое государство. Были запланированы встречи, которые приведут к бесконечным спорам. Мосты между их французскими "товарищами" были сожжены. А Соединенные Штаты Америки пожинали плоды.\n\nКогда генерал Милли вздохнул с облегчением, на лице директора Бернса появилась самодовольная улыбка.\nНа лице директора Бернса появилась самодовольная ухмылка."
 nss.77.a: "Операция прошла успешно."
 nss.78.t: "Затмение"
 nss.78.d: "Кибератаки на европейскую инфраструктуру продолжаются уже шесть дней. Седьмой день станет их апофеозом.\nВ воскресенье все началось с малого - некоторые правительственные веб-сайты отключились, чтобы проверить ситуацию. В понедельник ситуация только обострилась: были остановлены трубопроводы, нарушена связь. Но европейцы по-прежнему никак не реагировали. Это продолжалось до субботы, дня, от которого зависело, завершится эта операция или нет.\n\nГлубоко в стенах штаб-квартиры АНБ директор Бернс ждал, нахмурив брови и не мигая глядя на огромный экран перед собой. Рядом с ним сидел Пол Накасоне, директор Агентства национальной безопасности и Киберкомандования США.\n"Каков статус кибератаки?"  Спросил Бернс строгим и непоколебимым голосом.\nВ голосе Накасонэ звучала уверенность. Он указал на экран. "Все прошло без заминки, директор. Результаты должны появиться с минуты на минуту."\n\nВскоре в комнате воцарился гул. Офицеры готовились, звонили и печатали на клавиатурах.\nЗатем это было выведено на экран. Европа. Кромешная тьма. Их электросети были отключены одним махом. Единственными признаками света были крошечные белые точки, разбросанные по всему континенту, как звезды в полуночном небе. Это было почти прекрасно. Если бы Бернс не привык к такому, он, возможно, был бы тронут.\n\n"И не только это," добавил Накасонэ, "но и отключение систем водоснабжения. И коммуникаций."\n"Вполне возможно, что европейцы ожидали нападения, но они никогда бы не предсказали чего-то такого масштаба. Их военная машина сильно пострадает от этого." Закончил Накасонэ, самоуверенно улыбаясь.\n\nПлечи Бернса расслабились, и он повернулся, чтобы посмотреть на Накасонэ: "Понял. Хорошая работа, директор."\nОн снова повернулся к экрану, изучая каждый признак жизни на континенте, готовясь к следующему шагу."
 nss.78.a: "Операция прошла успешно."
 nss.79.t: "Операционный Провал"
 nss.79.d: "ТОЛЬКО ДЛЯ ЦРУ/РС\nСУБЪЕКТ: Европейская Разведывательная Операция\nДАТА: XX/XX/XXXX\nКЛАССИФИКАЦИЯ: СОВЕРШЕННО СЕКРЕТНО // NOFORN\n\nПредполагаемая разведывательная операция против режимов в Европе провалилась. Оперативный провал, вероятно, приведет к дальнейшему объединению противника против нашей военной операции.\n\nМы должны понять, чем вызвана эта неудача, чтобы предотвратить ее в будущем."
 nss.79.a: "-DB"
 nss.80.t: "Возвращение"
 nss.80.d: "''Я в это не особо верю''\n\nДва американских солдата наблюдали за европейским городом, оккупированным врагом, - знакомый образ тирана, который снова установил свою власть на континенте.\nЛес, в котором они разбили лагерь, был окутан туманом, и звуки отдаленной стрельбы казались не связанными с миром природы.\n\n''Почему нет? мы проливали здесь кровь и раньше, в двух мировых войнах, не говоря уже о наших предках. Скольким из наших предшественников раскололи черепа надвое? сколько шрамов осталось у нас от тех древних веков. Разве все это не кажется тебе таким знакомым?''\n\n''Типо, что мы уже здесь когда-то были''\n\n''Точно.''\n\nДва солдата продолжали беседовать под покровом европейского тумана, они бывали здесь раньше, и их дети тоже будут здесь. Континент, охваченный кровью и огнем, всегда будет проходить цикл обновления. В другом мире европейские земли были бы захвачены безумцами, завоеваны русскими или уничтожены чем-то, для чего у нас просто нет названия.\n\n''Ты знаешь, есть одна вещь, о которой я сожалею.''\n''О чём?''\n''О том, что я не подстрелил одного из тех кабанов, которых мы видели раньше, когда гуляли по этим лесам, чтобы их съесть.''\nДругой солдат засмеялся: "Ты что серьёзно?"\n''Эй, я ничего не могу с собой поделать, это то, чем мы раньше занимались.''\n\nНочное небо появилось быстро, звезды на небе были самыми яркими без искусственного освещения."
 nss.80.a: "''Давайте вернемся сюда ещё раз, когда все это кончится.''"
 nss.81.t: "Празднование Национальной Победы - операция Шторм Ориноко"
 nss.81.d: "Когда разбитые остатки организованного сопротивления в Венесуэле теперь тлеют на улицах, Соединенные Штаты официально объявили о своей победе над боливарианским режимом. Объявление было сделано после того, как высокопоставленные сотрудники Национальных боливарианских вооруженных сил, которые не были захвачены в ходе ночных рейдов, официально сдались, а ведущие кадры ЕСПВ бежали в изгнание. По всей стране администрация объявила неделю празднований и парадов в честь тех, кто "освободил" южноамериканскую страну.\n\nбелыми и синими флажками, когда победоносные подразделения операции Шторм Ориноко маршировали в строгом порядке по Пенсильвания-авеню. Танки M1A2 Abrams грохотали рядом с пусковыми установками HIMARS, жестоко напоминая о подавляющем технологическом превосходстве Америки. Над головой F-22 Raptors и B-2 Spirits прорезали облака в строю, оставляя внизу толпы восторженных зрителей, которые махали американскими флагами с почти религиозным рвением. Это было тщательно поставленное зрелище, призванное вызвать воспоминания о триумфе Бури в Пустыне, но эта победа была одержана без участия СМИ и контроля со стороны Конгресса.\n\nУлицы Вашингтона были залиты красным цветом. Из Овального кабинета президент, окруженный начальниками штабов в парадной форме с лицами, выражающими мрачное удовлетворение, выступил с телевизионным обращением к нации, восхваляя "храбрых мужчин и женщин Южного командования США" за "оперативное уничтожение наркотеррористического режима, угрожавшего нашим карибским соседям." Президент не упомянул о жертвах среди гражданского населения, бомбардировках Каракаса, произведших шок и трепет, или внесудебных массовых убийствах, совершенных ЦСО ЦРУ.\n\nЭто событие также продемонстрировало военную мощь США на фоне растущей напряженности в отношениях с Китаем. Геополитические эксперты и национальная пресса считают быстрое поражение боливарианского режима важной вехой в восстановлении мирового порядка, основанного на правилах.\n\nВременное правительство Венесуэлы пообещало обеспечить стабильность и сотрудничество с американскими партнерами и партнерами из ОАГ в целях обеспечения безопасности границ и ликвидации остатков сопротивления. Войска армии США, дислоцированные по всей стране, помогают местным силам в поддержании мира и защите жизненно важной инфраструктуры от повстанцев.\n\nВ ближайшие недели в Вашингтоне состоится конференция, посвященная реструктуризации венесуэльского государства и переходу к полностью демократической республике в соответствии с руководящими принципами, установленными международными экспертами в области политики."
 nss.81.a: "Мир - наша профессия."
 nss.82.t: "Празднование Национальной Победы — операция Тропический Гром"
 nss.82.d: "Падение режима в Центральной Америке положило конец потоку беженцев и наркотиков в Америку. После того как остатки центральноамериканских вооруженных сил официально сдались Южному командованию США, а гражданское правительство тихо бежало, организованные военные действия по всей линии прекратились. Быстрая победа была высоко оценена всеми участниками конфликта. В знак единства Конгресс принял двухпартийную резолюцию, в которой высоко оценил мужество военнослужащих Южного командования США, а также руководство нынешней администрации. По всей стране были объявлены недели празднования их достижений.\n\nНа улицах Вашингтона толпы патриотически настроенных зрителей размахивают флагами и скандируют в унисон, их лица озарены энтузиазмом и патриотическим пылом. Над головой бомбардировщики B-52 прорезают лазурное небо оглушительными пролетами, за ними следуют обтекаемые F-35 в форме стрелы. На земле парад бронетранспортеров Stryker и боевых машин Bradley грохочет в строю по Национальной аллее. Американская военная техника и личный состав демонстрируются во всей своей мощи, а триумфальные солдаты Южного командования США маршируют в унисон.\n\nЭтот военный триумф вызвал новую волну оптимизма среди населения, которое надеется, что в регионе, долгое время являвшемся постоянной угрозой для процветания и безопасности США, наконец-то воцарится стабильность. Государственный департамент пообещал поддержку временным гражданским правительствам в Центральной Америке, а американские войска останутся в стране столько, сколько потребуется для обеспечения безопасности границ и мира. Кажется, что дни миграционного и наркотического кризисов подходят к концу, и для региона, так долго страдавшего от коррупции и насилия, начинается новая глава прогресса.\n\nПромежуточная всеобъемлющая "Временная администрация Южного командования США" будет руководить переходом к "упорядоченному управлению," а международные финансовые эксперты будут направлять экономическую реструктуризацию и восстановление. Президент поздравил все вовлеченные стороны, а также отважных солдат, которые рисковали своей жизнью ради безопасности и процветания Америки."
 nss.82.a: "Мир - наша профессия."
 nss.83.t: "Празднование Национальной Победы - Операция Гавана Вайс"
 nss.83.d: "После разгрома Кубинских революционных вооруженных сил и последующего падения коммунистического режима Министерство обороны объявило о победе и официальном прекращении военных действий на острове. Поскольку большинство кубинского военного руководства было либо захвачено, либо убито, а высшее руководство правительства бежало из страны, организованное сопротивление фактически прекратилось. Конгресс принял двухпартийную резолюцию, в которой высоко оценил военное руководство Южного командования США и приветствовал их быструю победу. В течение недели по всей стране проходили торжественные мероприятия.\n\nВ крупных городах, таких как Майами, Вашингтон и Нью-Йорк, царила торжественная атмосфера: возвращающиеся войска встречали с фанфарами и триумфальным приемом. На Национальной аллее пролетали эскадрильи вертолетов AH-64, за которыми следовали самолеты V-22 Osprey с морскими пехотинцами США на борту. Танки, самоходные гаубицы и новейшие боевые дроны были продемонстрированы наряду с военной техникой, которая так основательно разгромила коммунистические войска. Среди патриотического веселья и рева военной мощи в толпе царило всеобщее чувство оправдания.\n\nКубинская диаспора во Флориде приветствовала быструю победу администрации как давно назревшее правосудие, а в Гаване празднования проходили параллельно с празднованиями в Вашингтоне. Американские аэропорты уже завалены запросами на возобновление полетов на Кубу, поскольку кубинцы, проживающие за границей, стремятся воссоединиться со своими близкими на острове после долгого и болезненного разлучения.\n\nОстровное государство теперь готово к возвращению в мировое сообщество. Временное гражданское руководство, заполнившее вакуум власти после событий, обязалось провести свободные и справедливые выборы, а также в полной мере сотрудничать с США в усилиях по реинтеграции Кубы в мировые торговые сети.\n\nПрезидент и USCENTCOM пообещали сотрудничать с гражданскими переходными властями в обеспечении безопасности кубинского народа, одновременно предоставляя экономические стимулы, чтобы помочь стране войти в XXI век."
 nss.83.a: "Мир - наша профессия."
 nss.84.t: "Празднование Национальной Победы - Операция Страж Пустыни"
 nss.84.d: "В связи с полной фрагментацией иракской армии и захватом ведущих политических и военных деятелей страны было объявлено об официальном прекращении военных действий в Ираке. Конгресс, продемонстрировав единство обеих партий, принял резолюцию, в которой высоко оценил быструю победу вооруженных сил США и почтил память павших героев. Министерство обороны распорядилось провести недельное празднование в честь этой значительной победы на Ближнем Востоке, признав роль американской мощи в установлении мира в Ираке.\n\nНациональный молл вновь стал витриной военной мощи: американские танки, самоходные гаубицы, боевые дроны и пехотные полконы прошли по Пенсильвания-авеню в римском стиле триумфального шествия. Эти торжества, санкционированные администрацией, распространились на все крупные американские города, где толпы людей размахивают флагами, скандируют патриотические лозунги и празднуют возвращение своих войск.\n\nПрезидент высоко оценил руководство вооруженных сил США, подчеркнув приверженность администрации делу укрепления безопасности и стабильности на Ближнем Востоке, а также обеспечению того, чтобы Ирак оставался важным союзником в борьбе с глобальным терроризмом, при этом не упомянув о предполагаемых военных преступлениях США.\n\nАналитические центры и эксперты по геополитике высоко оценили эффективное использование USCENTCOM новейших технологий для минимизации потерь среди американских военнослужащих и одновременного нанесения полного поражения противнику. По их мнению, решительное завершение конфликта откроет путь к восстановлению мирного и демократического Ирака.\n\nУже разработаны планы по формированию нового временного правительства в Багдаде при содействии политических экспертов из Вашингтона. Военная администрация USCENTCOM будет тесно сотрудничать с новыми гражданскими властями для обеспечения быстрого восстановления и возвращения в международное сообщество."
 nss.84.a: "Мир - наша профессия."
 nss.85.t: "Американские Войска Входят в Оттаву"
 nss.85.d: "После подписания правительством Трюдо Североамериканского Соглашения о Безопасности тысячи американских солдат вошли в Канаду. Их миссия: помогать канадским силовикам и Королевской Канадской Конной Полиции в поддержании порядка, а также содействовать в задержании и аресте "внутренних экстремистов" и "белых националистов," угрожающих стабильности Канады.\nВ Оттаве прошел краткий совместный парад в честь подписания соглашения, в котором американские и канадские войска маршировали в унисон по улицам города, а над ними пролетали самолеты CF-18 Hornet и F-16.\nКанадские сотрудники служб безопасности вместе с американскими войсками также работают в тандеме, чтобы оказать столь необходимую помощь в ликвидации последствий суровой зимы, которая серьезно нарушила повседневную жизнь в ряде провинций.\n\nАмериканские военнослужащие выразили свое воодушевление по поводу возможности помочь в поддержании мира в соседней стране на севере, как и канадские сотрудники служб безопасности, которые приветствуют дополнительную помощь. Протесты против соглашения были быстро подавлены, банковские счета их лидеров заморожены, причем ЦСМИ сослалась на "связи с белым националистическим терроризмом" и "крайне левыми военизированными организациями" в качестве причин.\nВ эксклюзивном совместном пресс-релизе с премьер-министром Канады президент высоко оценил соглашение и пообещал поддерживать стабильность Канады и ее приверженность международному мировому порядку, основанному на правилах.\n\n"Подписав это соглашение, мы вступаем в новую фазу канадско-американской дружбы, подтверждая нашу приверженность международному миру, безопасности и процветанию," - заявил президент в видеообращении. "Этот исторический шаг - только начало, поскольку мы надеемся углубить наше двустороннее сотрудничество и продвигать наши общие демократические ценности. Вместе мы построим лучшее и более безопасное будущее для наших стран.""
 nss.85.a: "Мир - наша профессия."
 nss.86.t: "USSOUTHCOM Объявляет о Прекращении Военных Действий в Гаити"
 nss.86.d: "Министерство обороны объявило о прекращении крупных боевых действий в Гаити. Вооруженные силы США, развернутые под флагом Организации Объединенных Наций и действующие совместно с миротворцами и частными военными подразделениями, захватили все ключевые правительственные и военные объекты и успешно арестовали лидеров крупных преступных организаций. Операция была охарактеризована как "системная" в плане ликвидации преступных элементов, а администрация высоко оценила решительную победу USSOUTHCOM в установлении мира в Карибском бассейне.\n\nПо словам представителя Белого дома, временное правительство Гаити обязалось провести свободные, справедливые и всеобщие выборы в течение двух лет. Эта приверженность демократическим принципам и верховенству закона знаменует собой важный поворотный момент для страны, которая долгое время боролась с нестабильностью и конфликтами. Международное сообщество, в первую очередь США, ООН и ОАГ, предоставит техническую и финансовую поддержку для обеспечения достоверности этих избирательных процессов и успешного перехода к гражданскому правлению.\n\nАмериканское присутствие в стране сохранится в обозримом будущем, оказывая содействие в развитии, проведении операций по борьбе с повстанцами и выполнении общих миротворческих задач, с тем чтобы обеспечить сохранение мира в стране.\n\nПрезидент высоко оценил успех операции, не прокомментировав при этом предполагаемые зверства, совершенные американским персоналом в стране."
 nss.86.a: "Мир - наша профессия."
 nss.87.t: "Итамарати Подписывает Соглашение о Размещении Базы США"
 nss.87.d: "В беспрецедентном шаге Итамарати согласился разрешить размещение вооруженных сил США в Бразилии. Министерство иностранных дел Бразилии сослалось на растущие проблемы в области безопасности, включая наркотрафик, транснациональную организованную преступность и угрозу со стороны крайне правых экстремистских групп. Многие аналитики рассматривают этот шаг как стратегический сдвиг в внешней политике Бразилии и значительную победу США в их усилиях по укреплению своего регионального влияния.\n\nРазмещение войск США будет включать значительное количество военного персонала, а также современные средства наблюдения и разведки, при этом USSOUTHCOM подчеркивает свою приверженность уважению суверенитета Бразилии и тесному сотрудничеству с бразильскими силами безопасности.\n\nБразильское правительство заверило общественность, что это соглашение является частью более широких усилий по укреплению двустороннего сотрудничества и региональной безопасности и не является отражением какой-либо внутренней нестабильности или слабости. Сам президент Мейреллес высоко оценил соглашение как "победу для обеих стран и для регионального мира," подчеркнув, что оно позволит расширить сотрудничество в борьбе с общими угрозами.\n\nОднако критики утверждают, что это соглашение может подорвать давнюю традицию стратегической автономии и независимости Бразилии. Оппозиционные партии осудили решение Итамарати, заявив, что оно ставит под угрозу национальную безопасность и открывает дверь для вмешательства США во внутренние дела Бразилии.\n\nВ Вашингтоне Министерство обороны и Белый дом приветствовали соглашение, рассматривая его как важный шаг вперед в укреплении позиций США как ведущей державы в Западном полушарии, при этом не упоминая о роли ЦРУ в поддержке нового правительства."
 nss.87.a: "Мир - наша профессия."
 nss.88.t: "Треснувшая Маска"
 nss.88.d: "Герои сегодняшнего дня - монстры завтрашнего. После того как Иуда выполнил свою миссию и мир стал смотреть на Соединенные Штаты с ненавистью, это чувство подтверждалось каждый день.\n\nКаждое морально сомнительное действие, которое мы совершали за кулисами, было вынесено на свет, каждый человек, связанный с ними, был идентифицирован антисоциальными активистами, и с таким длинным списком разборки были неизбежны.\n\nКогда дворец штурмуют массы, они продвигаются вверх. Убедившись, что каждый этаж очищен, они убивают всех слуг, пока не доберутся до знати и, наконец, до короля.\nСообщения об убийствах правительственных чиновников или просто убийствах средь бела дня становятся ежедневными новостями, но большинство из них по-прежнему затмеваются переизбытком развлекательных новостей.\nНезависимо от количества глаз, кровь, отхаркиваемая мужчинами и женщинами в костюмах, остается фактом.\n\nНесколько правительств штатов уже публично осудили нас, и хотя мы быстро устранили большинство из них, над некоторыми оказалось сложнее установить порядок.\n\nФинал закончился, и теперь мы должны убрать сцену."
 nss.88.a: "И все же мы держимся."
 nss.89.t: "Восстановление Мира"
 nss.89.d: "Второй раз за десятилетие наши граждане подняли оружие друг против друга.\n\nВторой раз города нашей страны лежат в руинах.\n\nВосстание оставило еще один шрам на Соединенных Штатах. Маскарад почти развеян, и люди больше никогда не будут смотреть на правительство так, как раньше. Но на данный момент терминальный кризис удалось предотвратить.\n\nОфициальные заявления президента и других государственных служащих, усиленные медиа-машиной, работают без перерыва, чтобы восстановить образ безопасности и прозрачности. Нарратив снова в наших руках, и он совершенно ясен: предатель, находящийся в самом сердце правительства, пытался подорвать нашу демократию и свободу. Все смерти и разрушения были вызваны им и только им одним, и все это только для достижения его эгоистичных, предательских целей.\n\nТем не менее, все это было напрасным. Соединенные Штаты Америки не сдадутся так легко. Правительство снова работает над обеспечением безопасности и процветания наших граждан."
 nss.89.a: "Урок, усвоенный тяжелым путем."
 nss.90.t: "Техас Отделяется"
 nss.90.d: "Тревожные новости из Техаса: по сообщениям, нынешний губернатор открыто заявил, что штат Техас вышел из состава США. По мере того как маскарад продолжается, все больше и больше крыс покидают тонущий корабль.\n\nПосле того как губернатор ввел военное положение на всей территории штата, многие члены национальной гвардии, находившиеся в штате, быстро перешли на сторону мятежников, арестовывая сторонников федерального правительства.\nТакие причины, как "предательство американского народа, осквернение американской истории," были одними из многих, которые использовались в качестве оправдания этого акта измены.\n\nВ связи с продолжающимся хаосом в Техасе, где небольшие антисоциальные группы пытаются вернуть себе значимость с помощью бессмысленного насилия, поступают сообщения о столкновениях на границе, и Национальная гвардия Техаса намерена оказать давление на соседние штаты, чтобы побудить их также выйти из союза.\n\nСоединенные Штаты вновь погрузились в хаос."
 nss.90.a: "Нет пощады предателям."
 nss.91.t: "Предательство Калифорнии"
 nss.91.d: "С учетом того, что репутация Соединенных Штатов Америки находится на самом низком уровне, нет сомнений в том, что более богатые штаты, в том числе Калифорния, попытаются выйти из состава Союза в надежде начать все с чистого листа.\n\nНациональная гвардия Калифорнии быстро свергла губернатора и арестовала всех лояльных нам федеральных чиновников. Вскоре начались беспорядки, и все небольшие антисоциальные группы, присутствующие в штате, делают все возможное, чтобы еще больше дестабилизировать ситуацию в регионе.\n\nВ связи с нашей и без того нестабильной ситуацией мы сначала пытались обратиться к ним с открытой дипломатией, но после казни губернатора в прямом эфире телевидения создается впечатление, что штат Калифорния ищет конфликта, в котором не может победить.\n\nУспешное отделение будет для нас катастрофой, поскольку не только откроет путь иностранному влиянию, но и станет началом медленной гибели Соединенных Штатов Америки, какими мы их знаем, возможно, навсегда.\n\nПрошлые операции по умиротворению в регионе доказали, что ведение боевых действий в этой области является довольно сложной задачей, но она должна быть выполнена вновь для поддержания единства всей нации."
 nss.91.a: "Бомбите их города."
 nss.92.t: "Восстание на Северо-Западе"
 nss.92.d: "Независимость Каскадии всегда была важной темой для разведывательного сообщества. Наши усилия по пресечению деятельности каскадских повстанцев были непрерывными. Несмотря на ликвидацию старых групп, связанных с первоначальным движением за независимость, таких как Партия Сосны и анархисты, проблема остается. Стремление к отделению будет сосуществовать с повстанческой деятельностью.\n\nСегодня их деятельность достигла нового уровня. После того, как маскарад был раскрыт, каскадцы сумели пополнить свои ряды, среди них было много бывших военных и сотрудников правоохранительных органов. Связь с антиповстанческими операциями быстро прервалась после сообщений о точечных ударах по аванпостам и патрулям.\n\nНынешнее Временное Правительство Каскадии отличается от насильственных тенденций, которые были присущи предыдущему правительству, но с учетом накопленного опыта и открытия тайников с запасами, оставленных "Базой," умиротворение региона неизбежно будет столь же кровавым.\n\nЧасы тикают; регион должен сгореть, чтобы порядок был восстановлен."
 nss.92.a: "Больше никаких деревьев, больше никакого хаоса."
 nss.93.t: "Американский Закат"
 nss.93.d: "Сегодняшний день стал для мира точкой невозврата.\n\n"Мы, народ" бывших Соединенных Штатов Америки, потрясены и ужаснуты. Само название "Соединенные Штаты" теперь является синонимом глубинного государства, ужасов Второй американской гражданской войны и последующих событий. Вместе с Когносценти умерла и старая Америка, а ее преемники не имеют иного выбора, кроме как двигаться дальше.\n\nНовое государство, Американская Федеративная Республика, управляется в соответствии с Новыми статьями Конфедерации, договором между правительством Вашингтона, правительствами штатов и сепаратистскими штатами, который резко ограничил сферу влияния Вашингтона и ограничил федеральную власть конкретными областями: взаимной обороной, межгосударственной торговлей и координацией внешних отношений.\n\nКрайняя децентрализация всех аспектов государственного управления, включая вооруженные силы и разведывательные службы, создает систему, в которой Когносценти больше не может существовать. Некоторые штаты выразили желание еще больше отдалиться от центра и стали автономными штатами, практически ожидая повторения опыта Техаса и Калифорнии, которые стали полностью независимыми странами.\n\nНовые Статьи Конфедерации, подписанные в Гонолулу, устанавливают стабильную, но нефункциональную и застойную систему. Некоторые видят в этом решение постоянных внутренних конфликтов, в которые вступила страна, другие считают это полумерой, ведущей к полному разделению страны, или даже ступенькой к еще более жестокому и деспотичному режиму. Но пока это не имеет значения.\n\nВпервые за несколько столетий Америка надеется на мир."
 nss.93.a: "На Бога мы не уповаем."
 nss.94.t: "Безликое Правосудие"
 nss.94.d: ""Есть пару мыслей почему," сказал Мэддокс. Он не был скован ни цепями, ни какими-либо другими средствами, но ему некуда было бежать, а весь трибунал был окружен вооруженными охранниками. Это могли быть солдаты армии США или агенты ЦРУ; для него уже не было никакой разницы. "Я был арестован после необдуманного комментария в адрес коллеги."\n\n"И вы отрицаете, что сделали этот комментарий?" спросил прокурор. Судьи за масками и на возвышении смотрели на него бесстрастными глазами. Это тоже было оскорбительно. Они сидели над ним, как будто он не был одним из них.\n\n"Нет, сэр," Он ответил, стиснув зубы. "Но я просто пошутил."\n\n"Шутки являются отражением того, что человек действительно думает," ответил судья в центре. "И мы видим вас насквозь, полковник. Ваша неискренность и нелояльность очевидны для всех нас."\n\n"Я верен Конституции США," Мэддокс сказал твердо, зная, что это будет его последней возможностью защитить себя. "Я дал клятву и всегда ее соблюдал, но то, что происходит сейчас..."\n\n"Всегда делалось," один из судей закончил за него. "Вы просто не замечали это до недавнего времени."\n\nМэддокс моргнул, эти слова ударили его как кулак в живот. Он не мог придумать, что ответить."
 nss.94.a: "Он знал, что не сможет это опровергнуть."
 nss.95.t: "Маскарад"
 nss.95.d: "Для внешнего мира мы не существуем, между рекламой и футбольными матчами, которые мы смотрим. Защищая нашу нацию от пламени хаоса.\n\nБлагодаря тщательному планированию и действиям мы создали систему внутри системы.\nСистема, невидимая для обычного человека, скрытая между делами Верховного суда и медийным цирком. Неважно, какая нагрузка ложится на чиновников; неважно, как сильно конспирологи пытаются пролить свет на нас. Наша работа продолжается.\nМир продолжает вращаться.\n\nКак и любая экология, маскарад тщательно выстраивается вокруг наших граждан, чтобы их повседневная жизнь продолжалась, не заставляя их подозревать о нашем контроле. То, что мы делаем, является правильным, но часто правильные вещи могут восприниматься как непопулярные.\nИногда им не следует знать.\n\nОднако может появиться и своя доля хищников, которые попытаются разрушить маскарад, проливая свет правды на мужчин и женщин, усердно трудящихся за завесой.\nТеррористические группы, антисоциальные личности и предатели, попавшие в ловушку этической паники. Все они способны разрушить то, над чем мы так долго работали.\n\nКак садовник, мы должны поддерживать маскарад и уничтожать сорняки, которые пытаются нас задушить."
 nss.95.a: "Не снимайте маски."
 nss.96.t: "Выборы в Бразилии"
 nss.96.d: "После военного переворота в Бразилии выборы, прошедшие под строгим военным контролем, привели к убедительной победе проамериканского технократического кандидата Энрике Мейреллеса.\n\nОжидается, что это развитие событий обеспечит продолжительное военное и экономическое сотрудничество между Соединенными Штатами и Бразилией.\n\nОднако мы должны быть готовы к потенциально опасным социальным и экономическим последствиям переворота в стране, поскольку левые и правые экстремистские организации пытаются дестабилизировать новый режим.\n\nНесмотря на это, новое правительство уже пообещало расширить сотрудничество с США, начиная с военного альянса."
 nss.96.a: "За нашу дружбу!"
 nss.97.t: "Мэ Сана Эна"
 nss.97.d: "ТОЛЬКО ДЛЯ ЦРУ/РС\nСУБЪЕКТ: Инцидент на Pиккурате Энлиля\nДАТА: УДАЛЕНО\nКЛАССИФИКАЦИЯ: СОВЕРШЕННО СЕКРЕТНО//NOFORN\nКоманда ЦСО, отправленная для очистки недавно обнаруженной шумерской зиккурат в долине Евфрата от подозреваемых повстанческих действий, столкнулась с неожиданным явлением во время миссии.\n\nГруппа уничтожения вступила в перестрелку с небольшой группой повстанцев в руинах старого храма, в результате чего, как ожидалось, повстанческая ячейка была полностью уничтожена. Однако во время перестрелки один из солдат случайно ударил по каменной плите, украшавшей стену храма. В результате вся ячейка немедленно прекратила боевые действия и приняла позы мольбы и почтения, обращенные к одному из наших оперативников, который впоследствии был назван "Дельта-Восемь."\n\nВпоследствии команда задержала выживших членов ячейки для допроса, и один из них заявил, что они "не смогли заставить себя ударить ее из-за страха перед последствиями, ведь прикоснуться к жрице - значит погибнуть." "Жрицей" в данном случае является Дельта-Восемь. Дельта-Восемь не продемонстрировала никаких заметных изменений в поведении или физическом состоянии, но ее товарищи по команде теперь подчиняются ей, а задержанные отказываются есть и спать, пока их не "передадут под ее опеку."\n\nПредварительное исследование таблички показывает, что на ней был выгравирован длинный отрывок текста, написанный архаичной формой клинописи. Надпись рядом гласит: "САН-ЭН" (Мэ сана Эна, знак священника).\n\nДиректор проявляет большой интерес к этим находкам и распорядился создать секретное черное учреждение для дальнейшего расследования и локализации этого инцидента."
 nss.97.a: "Всем быть наготове. -DB"
 nss.98.t: "Циклы"
 nss.98.d: "Ничто не вечно: леса увядают и растут, горы рушатся и поднимаются, империи возникают и гибнут.\n\nТам, где рождаются боги, реальность делится на пять сезонов.\nПять циклов.\nЖизнь - это главная цель всего сущего, но в конце концов она поглощается. Даже в уничтожении рождается новая жизнь, и те, кто тянутся к солнцу, появляются на свет.\n\nТе, кто вытягивал руки, учились сохранять равновесие, но их природа заставляла их поддаваться греху.\nИх наказание сделало их дикими, как зверей, с зубами и когтями.\nПусть ветер унесет их грехи.\nСолнце стало новым творцом, и жизнь родилась заново.\n\nВода стала светом. Ее любовь была унесена челюстями забвения, горе привело к бесконечным царствам песка и засухи.\nГоре - это путь к гневу, и вода с небес стала огнем.\nНескончаемый свет.\n\nСвет снова стал жизнью.\nНовый родитель, его любовь считалась неискренней.\nОбвинение, которое привело бы к тому, что земли залило бы кровью, превратив жизнь в новую жизнь, которая могла бы существовать под кровью горя.\n\nИмперия крови и костей, конец жизни с вечным голодом.\nЖизнь должна отказаться от жизни, чтобы жизнь могла жить снова.\nЕсли голод останется, свет померкнет.\nЗемля разрушится, и наступит конец."
 nss.98.a: "Жизнь в жизнь."
 nss.99.t: "Создатель"
 nss.99.d: "Он пришел из безбрежных океанов ничтожества.\nКак и у любого смертного, в нем горел огонь.\nЖелание творить, желание разрушать.\n\nЕго руки были полны глины, Он лепил один мир за другим.\nОн продолжал, пока не насытился, сотворив вселенную по своему замыслу.\nЖизнь развивалась, люди росли, родился язык, и племена расцветали, словно цветы.\n\nУ них был один и тот же огонь, они творили и разрушали.\nЕго уроками, Его тропами.\nПока они не перестали слушаться, и все, что они могли делать, это разрушать.\nГнев последовал вскоре, когда Он вызвал волну ничего.\nСмывая все.\n\nПотом были океаны ничего.\nОн вышел из него.\nЕго руки были полны глины.\nСформировался другой мир.\n\nОн будет делать это, пока не завершит своё дело."
 nss.99.a: "Учитель мира."
 nss.100.t: "Зубы Бога"
 nss.100.d: "Стадо, которое ведет себя неподобающим образом, будет наказано.\nИгнорируя преподанные уроки, ненавидя своих создателей.\nОни толстеют от того, что едят, убивают родственников и сидят на кучах богатства, не благодаря никого, кроме себя.\n\nНаступает наказание.\nОстрые зубы, гнев зверя.\nПожирая племя за племенем, небеса изливали на них потоки крови, топя их в кровожадности.\nЗверь был голоден, так голоден, что пожирал и не останавливался.\n\nВскоре мир погрузится в тишину.\nИ никаких уроков не будет извлечено.\nНо солнце пробивалось сквозь красную мглу и научило живое стадо, как укротить зверя.\n\nНаполнив реки красным спиртом, предназначенным для успокоения ума и оцепенения тела.\nКак стадо, которое откормилось, оно продолжало пить, продолжало потреблять, пока не погрузилось в глубокий сон.\nТак кончилась бойня.\n\nИз разрушений, которые оно причинило, жизнь вновь расцвела."
 nss.100.a: "Цветение, пока оно не пробудится снова."
 nss.101.t: "До Того, Как Все Началось"
 nss.101.d: "Была империя, полная башен и дворцов.\nГде правил мудрый царь.\nВ окружении мудрецов ему рассказали о мире, который его ждет.\n\nГрядет великое бедствие.\n\nТе, кто пришел перед королем, строили козни и замышляли планы.\nСпособ начать заново, принося абсолютное ничто.\nВсе они, создатели и художники всего живого, поклялись хранить тайну.\nОднако один из них запнулся и прошептал свою тайну смертным.\n\nСмертные умы соединились.\nСоздавая способы пережить великое бедствие.\nВсе живые существа должны были быть спасены.\n\nВ погоде чувствовалась злоба.\nЗемли озарились громом, ревом, затмившим все вокруг.\nОни не видели друг друга, не узнавали друг друга.\n\nЭто было так безумно, так великолепно, что разрушение испугало даже богов.\nРазрушение закончилось, мир опустел.\nНо жизнь продолжалась.\nИ продолжалась."
 nss.101.a: "Напоминание о нашей стойкости."
 nss.102.t: "Мир Принадлежит Тебе"
 nss.102.d: "Каждый союз, заключенный за закрытыми дверями, каждый моральный компромисс во имя высшего блага, каждая политика, направленная на спасение жизней - все это было напрасным. Снова и снова директор наблюдал, как эти события повторяются, как тусклое изображение на серебряном экране. Он ничего не мог сделать, чтобы изменить ситуацию, не сейчас.\n\nЛюди были слишком невежественны и эгоистичны, чтобы им можно было доверять бразды правления, поэтому их нужно было вести к светлому будущему, как неоднократно убеждал себя директор. Администрация была слишком коррумпированной и недальновидной, но все же она была лучше того, что неизбежно пришло бы ей на смену в случае провала, и поэтому он должен был ее поддерживать. Учреждения, которые он курировал, были необходимы для национальной безопасности, даже несмотря на то, что их методы становились все более аморальными. Он не мог позволить себе руководствоваться моралью, когда от его решений зависело так многое.\n\nСтолько лет работы, посвященной нации, и ему все еще нужно было больше времени.\n\nДело было не в деньгах. Никогда не было в этом. Дело было в том, чтобы укротить врожденное беспокойство и жестокость человеческой натуры, использовать их на благо страны. В этой сфере деятельности не было хороших людей. У всех были замараны руки, особенно у него. Он посмотрел на свои ладони. Даже сейчас он все еще чувствовал кровь на своих руках. И он был готов пролить еще больше. Если бы только у него было больше времени...\n\nВремени.\n\nОн взглянул на свои наручные часы. Стрелки часов вращались с размытым изображением.\n\nПеред ним лежали обломки. Искривленный металл и горящее топливо заполняли поляну, воздух был едким и тяжелым. Это было место их последней миссии, единственной оставшейся надежды на спасение, лежавшей в виде груды обломков посреди поляны.\n\nЕсли бы только у него было больше времени. Времени, чтобы эвакуировать столицу, времени, чтобы скоординировать действия с силами Порядка, которые все еще были готовы и способны подавить мятежников и бунтующие массы. Времени, чтобы найти выход. Там, среди тел, директор увидел знаковую фигуру. Тело было сожжено, обуглено до неузнаваемости, но это все еще был он."
 nss.102.a: "Возможно, это и есть ад."
 nss.103.t: "Жрица"
 nss.103.d: "Лицо, обозначенное как Дельта-8, SPC. Анна Вебстер, специалист по взрывным работам ЦРУ-ЦСО, продолжает демонстрировать аномальные свойства, впервые наблюдавшиеся во время инцидента в Зиккурате Энлиля. В настоящее время субъект содержится в охраняемом объекте в пустыне Руб-эль-Хали.\n\nФизическая и психологическая оценка субъекта Дельта-8 не показывает значительных отклонений от базовых параметров. Однако анализ поведения показывает глубокие изменения в ее взаимодействиях с окружающими. Бывшие товарищи по отряду теперь проявляют явное почтение к Дельта-8, обращаясь к ней как "мадам" или "жрица" даже в неформальной обстановке. На вопросы эти люди отвечают, что испытывают инстинктивное желание подчиняться ее приказам, описывая это как "глубокое понимание" того, что ее слова обладают абсолютной властью.\n\nЗахваченные иракские повстанцы подтверждают влияние Дельта-8, называя ее "ЭН" (шумерское слово, означающее "повелитель/жрец"). Они сообщают, что во время рейда услышали одно "древнее" и "священное" слово, которое обошло сознательное мышление, отпечаталось прямо в их умах и вызвало полную покорность.\n\nАнализ таблички подтверждает, что это слово представляет собой шумерское Мэ сана Эна. Лингвисты агентства выдвигают теорию, что "Мэ" не является обычным словом, а психолингвистическим катализатором, который взламывает врожденную языковую способность мозга, подавляя рациональное мышление и механизмы послушания.\n\nПоследствия этого ошеломляют. Если один "Мэ" может предоставить абсолютную власть, что могут сделать другие? Царствование, победа, смерть? "Проект Вавилон," созданный по приказу директора Бернса, стремится расшифровать оставшиеся "Мэ" и разработать контролируемое развертывание с неограниченными ресурсами. Дельта-8 остается под стражей, каждое ее заявление и движение документируются. Для лингвистов Агентства она является ключом к разгадке загадки, размер которой может превышать совокупность человеческих знаний."
 nss.103.a: "Гонка началась."
 nss.104.t: "Переоценка 'Плиток Потопа'"
 nss.104.d: "Во время развертывания войск США в запечатанных гробницах и раскопках были обнаружены загадочные "плитки потопа", содержащие архаичные формы известных языков, которые не поддаются традиционному лингвистическому толкованию. Первоначально отвергнутые как фольклор, эти тексты были переоценены после инцидента с зиккуратом Энлиля в свете проекта "Вавилонская башня." Эти различные "потопы" теперь интерпретируются метафорически как нейролингвистическая инфекция, которая уничтожила древние цивилизации, а таблички служат скорее историческими свидетельствами, чем буквальными описаниями.\n\nНа табличке, найденной недалеко от Теотиуакана, описывается "великая тишина," когда слова "превращались в пепел во рту." Андские кипу рассказывают о "небесном змее," который "развязал нити пенья," лишив людей возможности вспомнить свои имена. Лингвисты проекта Вавилон сейчас сопоставляют эти свидетельства, а NERO обрабатывает переводы с беспрецедентной скоростью. Образцы неоспоримы: разные культуры по всему миру, разделенные океанами и тысячелетиями, все описывают одно и то же катастрофическое событие - чуму разума, которая поразила сам язык.\n\n"Плиты Потопа" намекают на "противоположный паттерн." Мезоамериканские тексты упоминают "Пернатого Змея," который "заново научил людей говорить"; андские кипу ссылаются на "Бородатого Человека" - вероятно, Виракочу, божественного строителя Тиуанаку, - который "пронзил тишину." Эти, казалось бы, разрозненные мифы образуют единую картину. Двойная цель проекта Вавилон: использовать паттерн "Потопа" в качестве оружия и найти фрагменты "контрпаттерна," чтобы защитить Когносценти от его воздействия."
 nss.104.a: "Вся власть принадлежит тому, кто имеет последнее слово."
 nss.105.t: "Нам-Шуб Энки"
 nss.105.d: "Фрагментарные упоминания о "Нам-Шубе Энки" встречаются во всех найденных материалах. В шумерском мифе Энки, бог мудрости и хранитель "Мэ," создал божественное заклинание, которое "развязало языки" человечества. В рамках проекта Вавилон "Нам-Шуб" представляется как "противоположный образец," вакцина.\n\nВсе найденные до сих пор фрагменты были неполными или имели ограниченный потенциал. Однако появилась потенциальная зацепка: тексты, описывающие "Ковчег Утнапиштима," покоящийся на горе Нимуш и несущий "Слово всего, что было." Местонахождение Нимуша десятилетиями было предметом споров; некоторые ученые отождествляют его с горой Арарат, а другие помещают его дальше на юг. Однако культурные картографы Когносценти, работающие с топографическим анализом NERO, теперь считают, что это ни что иное, как гора Арарат.\n\nАгентство уже обсуждает научную экспедицию, важность которой нельзя недооценивать. Официальная экспедиция невозможна из-за деликатности места и риска привлечения международного внимания. Единственный возможный вариант: тайная операция ЦСО с участием гражданских лингвистов и археологов, замаскированная под геологическую разведку, чтобы свести к минимуму подозрения.\n\nМиссия: найти наиболее полные фрагменты "Нам-Шуба Энки." Ставки просты, но велики: шанс получить абсолютный контроль над архитектурой человеческого сознания."
 nss.105.a: "Поиск начался."
 nss.106.t: "Экспедиция на Гору Арарат"
 nss.106.d: "ЦРУ/РС - КРАТКОЕ СОДЕРЖАНИЕ БРИФИНГА\nСУБЪЕКТ: Операция ГИЛЬГАМЕШ\nЦЕЛЬ: ЦЕЛЬ: Найти, обезопасить и извлечь потенциальные артефакты, связанные с "Нам-Шубом Энки," из целевой зоны на северо-восточном склоне горы Арарат.\nКЛАССИФИКАЦИЯ: СОВЕРШЕННО СЕКРЕТНО//NOFORN\n\nЭкспедиция была отправлена к заранее обнаруженному аномальному сооружению на горе Арарат, которое, согласно теории, является геологическими остатками "Ковчега" Утнапиштима. Сооружение, недавно обнаруженное в результате отступления ледников, расположено на высоте примерно 14 000 футов.\n\nВход открывал вид на интерьер из черного как смоль обсидиана, подтверждая, что "Ковчег" был хранилищем, предназначенным для защиты от катастроф. Внутри центральной камеры в круговом порядке располагались двенадцать саркофагов. Десять из них содержали хорошо сохранившиеся человеческие останки с табличками и артефактами, соответствующими высокопоставленным шумерским погребальным обрядам, а их сохранность свидетельствовала о защите хранилища от воздействия времени.\n\nДва саркофага, идентифицированные как принадлежащие Утнапиштиму и его жене, не содержали останков, но в них находился Нам-Шуб Энки. Плиты были изготовлены из неизвестного магнитного материала, а надписи, казалось, плавали на их поверхности, а не были высечены. Лингвисты определили, что таблички составляли связный текст, непохожий на любые ранее обнаруженные клинописные находки, что указывало на наличие сложной лингвистической системы, потенциально предшествовавшей известным шумерским письменностям — теоретически "шумерскому праязыку." Это открытие повысило приоритет операции, что побудило директора санкционировать немедленную экстракцию и усиленные протоколы изоляции.\n\nАнализ, проведенный NERO, подтвердил, что таблички содержали цель проекта Вавилон: противодействие нейролингвистической чуме. 'Нам-Шуб Энки' действует как алгоритм лингвистического восстановления, устраняя когнитивную несогласованность фрагментов Мэ путем прямого взаимодействия с биолингвистическим субстратом, а не с семантикой. Это восстановление ускоряет сроки реализации проекта по созданию оружия и противодействию. Директор созвал экстренное заседание руководства Когносценти для обсуждения протоколов интеграции."
 nss.106.a: "Операция признана полностью успешной."
 nss.107.t: "Колибри Юга"
 nss.107.d: "Под кодовым названием 'Операция Тескатлипока' команды ЦСО создали тайные археологические объекты по всей Мексике, используя в качестве прикрытия программу ЮНЕСКО по сохранению культурного наследия. Лингвисты Пентагона и ЦРУ возглавили операцию, ища в доколумбовых кодексах глифы, соответствующие нейролингвистическим свойствам мезопотамского "Мэ."\n\nПод катакомбами Мехико команда ЦСО обнаружила запечатанную камеру под храмом Теночтитлан, в которой находились кодексы из коры фигового дерева с яркими иероглифами, не поддающимися переводу. NERO идентифицировал знаковые шаблоны, кодирующие когнитивные концепции, подтвердив, что мешики понимали строительные блоки языка, как шумеры, действуя идентично Мэ, несмотря на океаническое разделение. Сами кодексы были проникнуты заразительным почитанием мексиканского бога войны, леворукого колибри юга, Уицилопочтли. Названный "Сюукоатль", он воплощает абстрактные концепции: праведный гнев, божественную войну, массовые жертвоприношения и космический порядок - основы их пантеона.\n\nДва лингвиста, специализирующиеся на языке науатль, после знакомства с кодексами сразу же пережили когнитивный коллапс. Их речь превратилась в апокалиптические предупреждения о гибели Пятого Солнца и приближении звездных демонов Цицимиме. Компульсивно калеча себя раскопными инструментами, они пели о кровопролитии для восстановления космического баланса. Поведение отражает эффекты нейролингвистического заражения, подтверждая потенциал Мэ в качестве оружия. Оба были усыплены и помещены в медицинскую изоляцию, а неврологические сканирования показали ускоренную синаптическую перестройку, соответствующую теоретической основе проекта Вавилон. Теперь мы понимаем, почему мешики так яростно придерживались массовых человеческих жертвоприношений: они не просто умилостивляли своего покровителя-бога, но подчинялись фундаментальному повелению, заложенному в нейролингвистической архитектуре самого языка науатль. Последствия этого потрясающи. Если бы этот "Мэ" можно было использовать в качестве оружия, он мог бы делать что угодно: от вдохновления солдат на беспрецедентную жестокость до принуждения целых народов к участию в апокалиптическом ритуальном насилии."
 nss.107.a: ""Шесть месяцев в году хуицицилин мертв, а шесть - жив.""
 nss.108.t: "Кофун"
 nss.108.d: "Под прикрытием "исследований структурной стабильности," проводимых американскими академическими учреждениями, команды ЦСО организовали раскопки на ключевых курганах кофун по всей Японии. Публичное обоснование - оценка целостности после землетрясения - скрывало их истинную цель: извлечение артефактов с гравировками "Мэ". Под надзором Агентства японские археологи сосредоточили свои усилия на местах, связанных с мифическим происхождением династии Ямато.\n\nВ кластере Мозу-Фуруичи кофун в Осаке в ходе раскопок, направленных на обнаружение гробницы императора Нинтоку, было найдено бронзовое зеркало, ята-но-кагами, предшествующее синтоизму. На его обратной стороне были нанесены иероглифы, предшествующие хирагане, которые не поддавались идентификации. NERO сопоставил их с шумерским Мэ королевской власти, артефактом, который навязывал заразительную власть, заставляя зрителей признавать заранее определенного суверена. Незащищенный сотрудник Агентства, наблюдавший за зеркалом, продемонстрировал немедленные изменения в поведении, обращаясь к директору Бернсу как к "Тенно" и настаивая на божественном мандате для "восстановления порядка." Агент был усыплен для медицинского наблюдения.\n\nИсследования традиций онмёдо и сюгэндо выявили эзотерические учения котодама, сохранившиеся в горных святилищах, в которых описывается, как определенные звуки манипулируют реальностью через кототама (душу слова) как активную силу, а не просто подтверждают веру в тезис проекта Вавилон, согласно которому язык является программируемым интерфейсом для сознания.\n\nПоявляется образ Мэ, выходящий за пределы географических и культурных границ, как "языка программирования человеческого сознания," используемого правящими и священническими кастами древних народов по всему миру для создания основы самой цивилизации, для приведения Хаоса в Порядок."
 nss.108.a: "Нет страха, нет боли"
 nss.109.t: "Потерянная Пирамида Тота"
 nss.109.d: "Агенты агентства получили эксклюзивные права на раскопки вблизи оазиса Бахария, объявив эту территорию военной зоной ограниченного доступа. С помощью георадара была обнаружена пирамида, из которой из-под песков торчала только ее первозданная золотая вершина, возвышающаяся на 484 фута и превосходящая по высоте Великую пирамиду в Гизе. Вход был затруднен когнитивными опасностями, поскольку два агента испытали афазию при контакте с зараженными символами на пороге, а третий впал в кататонию. Неврологическое сканирование выявило фрактальные поражения височной доли, соответствующие паттернам меметической инфекции. Эти нейролингвистические защитные механизмы охраняли гробницу на протяжении тысячелетий, ломая разум расхитителей гробниц и оставляя их безжизненными в пустыне.\n\nВнутри пирамиды находилась библиотека древних папирусных свитков, предшествовавших известным династиям, иероглифы на которых функционировали скорее как вычислительные, чем как фонетические символы. NERO подтвердил, что эти шаблоны соответствовали "Мэ", доказав, что древние египтяне обладали знанием фундаментальных строительных блоков языка, сходных с месопотамскими. Несмотря на усилия суперкомпьютера DARPA, свитки не поддавались расшифровке, что потребовало дальнейшего изучения комплекса.\n\nВ самой нижней камере лежал саркофаг, посвященный "Тому, Кто Осуществляет Праведность и Истину" и "Тому, Кто Подобен Ибису" - известные эпитеты Джехути, египетского бога мудрости, письменности и знания, которого греки позже назовут Тотом. Внутри саркофага была обнаружена табличка с уравнением, которое математику было поручено решить. Это дало ему возможность понять библиотеку, но решение уравнения разрушило его разум, вызвав психоз. Теперь он считает себя смертным сосудом Тота, которому поручено "управлять Солнечной лодкой," чтобы поддерживать "Порядок (Маат)" против "Хаоса," и говорит, как будто он сам бог. Его разбитый разум хранит ключ к разгадке содержания библиотеки, и для продолжения исследований его перевели в безопасное учреждение."
 nss.109.a: "Сосуд Триждывеличайшего"
 nss.110.t: "Финальный Рывок"
 nss.110.d: "Реальность - это то, что можно измерить. Если бы вы заставили одного человека впитать в себя все знания известного мира, он бы в конце концов выколол себе глаза, потому что увидел бы слишком много. Задолго до того, как мы победили фашизм и коммунизм, мы покрыли этот мир завесой нормальности, статус-кво, которое обеспечило бы глобальный мир.\n\nГрандиозный проект, задуманный задолго до нашего рождения. Благодаря исследованиям, проведенным нашими аналитическими центрами, мы пришли к пониманию того, что каждая цивилизация претерпевает грандиозную трансформацию, превращаясь либо в раздробленное зеркало, либо в вечный дворец, призванный противостоять самому уничтожению. До сих пор ни одна из них не достигла последнего.\n\nМы пришли к пониманию, что одной из основных причин этого является то, что каждая цивилизация неизбежно сталкивается с другой цивилизацией, которая стремится к той же цели.\nРоссия и Китай стремятся к собственному дворцу, и хотя мы не питаем злобы к этим странам и их народам, мы понимаем, что, если мы действительно хотим выжить в эту эпоху перемен, мы должны победить.\n\nЯзык формирует реальность, а слова побуждают людей творить великие дела.\nИли разрушение.\n\nГлубоко в жилах мира лежат остатки цивилизаций, которые пытались совершить то же самое столкновение. Мы можем извлечь уроки из их неудач и научиться использовать язык как оружие.\n\nЭпоха перемен подходит к концу, и когда мы неизбежно столкнемся с этими другими цивилизациями, мы приоткроем завесу лишь на мгновение, и они поглотят самих себя.\n\nМы можем быть моральными или мы можем победить."
 nss.110.a: "Дворец, сияющий."
 nss.111.t: "Уважаемый Директор"
 nss.111.d: "\nОт: Ларри Финк\nОтправлено: X/X/20XX 17:15:32\nКому: Уильям Дж. Бернс\nТема: Уважаемый Директор\n\nМир наконец-то стал реальностью. Эта система, которую мы создали для общего блага, наконец-то позволила нам принести стабильность в мир. Они не будут благодарить нас и не поймут важности того, что мы делаем, но мы спасли их от вечной войны и демагогии. Мы дали им жизнь без конфликтов и нужды и не просили ничего взамен.\n\nЭто было нелегкое путешествие, сопровождавшееся огромными страданиями. Я уверен, что ты помнишь все, что ты сделал, чтобы это произошло. Это была не та жертва, которую можно носить с почестями. Тебе не досталось ни похвалы, ни славы за те трудные решения, которые ты принял. Я всегда знал, что ты понимаешь это, даже когда не мог говорить об этом вслух.\n\nТы человек, который знает, что правильное и хорошее редко бывают одним и тем же, но я верю, что в этом новом мире мы можем приблизиться к тому моменту, когда они снова станут синонимами. Я горжусь тем, что так долго работал с тобой, и еще больше горжусь тем, что могу называть тебя своим другом. В ближайшие годы миру понадобятся такие хорошие люди, как ты. Но сегодня вечером ты должен праздновать и отдыхать. Думаю, мир сможет обойтись без таких людей, как мы, хотя бы на один день. Наслаждайся этим временем со своими близкими, потому что скоро мы снова будем нуждаться в тебе, мой друг.\n\nКогда завтра взойдет солнце, будет еще много работы. Как всегда. То, что мы построили, может существовать только до тех пор, пока за ним ухаживают, а бремя содержания нелегко нести."
 nss.111.a: "Лучшее еще впереди."
 nss.112.t: "Затмение"
 nss.112.d: "565:39:20 ХЬЮСТОН: "Аполлон-20, Центр управления полетами. Как слышите?"\n565:39:30 ДАЙМОНД: "Слышу вас громко и четко, Хьюстон."\n565:39:35 ХЬЮСТОН: "Дайте нам отчет о ситуации, Даймонд."\n565:39:40 ДАЙМОНД: "Все системы в норме, ожидаемое время прибытия в точку запуска - 15 минут."\n565:39:57 ХЬЮСТОН: "Продолжайте, как запланировано, следующая связь после установки FOX."\n565:40:20 ДАЙМОНД: "Принято. Даймонд, конец связи."\n\n(Длинный Перерыв)\n\n565:59:26 ДАЙМОНД: "Хьюстон, Аполлон-20, FOX готов."\n565:59:46 ХЬЮСТОН: "Молодец, Даймонд. У нас хорошие новости. Стена возведена."\n566:01:10 ДАЙМОНД: "Хьюстон, можете повторить?"\n566:01:17 ХЬЮСТОН: "Повторяю, стена возведена. Кодовое слово: Испытание."\n566:01:32 ДАЙМОНД: "Так точно."\n\n(Длинный Перерыв)\n\n566:04:10 ДАЙМОНД: "Хьюстон, Аполлон-20."\n566:04:18 ХЬЮСТОН: "Аполлон-20, какие-то проблемы?"\n566:04:30 ДАЙМОНД: "Хьюстон... мы же вернемся домой, правда?"\n566:04:45 ХЬЮСТОН: "В хорошее время, Даймонд. Я в этом не сомневаюсь.""
 nss.112.a: "Хьюстон, конец связи."
 nss.113.t: "Судьба Капитала"
 nss.113.d: "''Из Европы?''\n''Верно, наши друзья за Атлантикой решили, что я буду полезен.''\n''Хуже, чем здесь, быть не может.''\n\nЛарри Финк ухмыльнулся, увидев взгляд своих охранников. Обычно он позаботился бы о том, чтобы его внесли в черный список, но после того, как он несколько раз избежал верной смерти, было бы разумно проявить некоторую снисходительность.\n\nПорядок боролся, а Непорочность сохраняла свою завесу, но пламя хаоса сожгло бы все дотла.\nНет, лучше будет сократить убытки и отступить.\n\nИ ему, и его телохранителю удалось добраться до побережья, поскольку они слышали отдаленные звуки беспорядков и выстрелов. Национальная гвардия быстро прибыла на место, чтобы подавить любую форму антисоциальной деятельности в городах, но, конечно же, отставшие все равно оставались.\n\nГде мы ошиблись, подумал Ларри.\nЭто, конечно, не была его вина; план был совершенно ясен и гарантированно сработал бы, но, с другой стороны, американский фактор мог оказаться слишком непредсказуемым.\nЭто работает в Европе, и уроки, которые он извлек здесь, он сможет применить там.\n\n''А, вот и они-'' Охранник тяжело вздохнул.\nОни оба увидели, как под покровом ночи подплыла лодка, и трое вооруженных мужчин мягко помахали им рукой.\n''Что? Что случилось?''"
 nss.113.a: "''Они итальянцы.''"
 nss.114.t: "Судьба Капитала"
 nss.114.d: "Ларри Финк понял, что дело сделано, когда первые ядерные ракеты достигли своих целей: восприятие глобального статус-кво навсегда останется запятнанным кровью, и никакие инновации, прогресс и богатство не смогут этого изменить. Его дух всегда будет осквернен; массы вновь обрели свои острые зубы.\n\n''Есть какие-нибудь новости о других?'' - спросил Финк. Он уже довольно долгое время прятался в убежище и, несмотря на свой более прагматичный взгляд на жизнь, не мог не беспокоиться о своих коллегах. В конце концов, 'Непорочность" и "Порядок" были с ним столько же времени.\n\n''Нет, сэр, ожидайте худшее.''\nЕго охрана - это не банда фанатичных сторонников, а просто группа квалифицированных специалистов, нанятых для выполнения определенной работы. Однако было трудно не заметить страх в их взглядах: они шли рядом с воплощением живого ужаса.\n''Поступают сообщения об антиобщественной деятельности по всему региону и столкновениях между правоохранительными органами и повстанческими группировками. Рекомендуется переждать бурю, прежде чем рассматривать возможность эвакуации.''\n\n''Не то чтобы это имело большое значение.''\n\nОдин из охранников позади него вытащил пистолет. Одно из немногих вещей, которые превосходят Капитал, - это сохранение себя, и некоторые из них будут прокляты, чтобы заплатить цену за чужую ошибку.\nФинк обернулся и улыбнулся.\n''Ничего личного, верно?''\n''Конечно.''\n\nОдин легкий нажим и громкий взрыв спустя, охрана быстро покинула убежище, когда из входа повалил дым.\n\n''Что дальше?'' спросил один из них."
 nss.114.a: "''Мы будем держаться.''"
 nss.115.t: "Орел с Обрезанными Крыльями"
 nss.115.d: "Продолжающийся конфликт слишком напоминает вторую гражданскую войну, и с постоянно растущим числом гробов и вдов люди внутри наших границ теряют иллюзии. Появляются трещины, и система, тщательно разработанная для поддержания трех столпов, оказывается недостаточной для пресечения хаоса как снаружи, так и внутри.\n\nПоскольку ключевые фигуры в правительстве либо бежали, либо были убиты, неизбежно возник вакуум власти, а с продолжающимися беспорядками, распространяющимися по всей стране, у военных не оставалось иного выбора, кроме как принять более жесткие меры. Все, что осталось от бюрократической машины, которой были Когносценти, было быстро сметено силой.\n\nСейчас сформировано переходное правительство, главной задачей которого является восстановление порядка и урегулирование продолжающегося конфликта, в первую очередь путем прекращения боевых действий, независимо от того, какой ценой это будет достигнуто. Похоже, что американская мечта подошла к концу."
 nss.115.a: "Бремя других на нас самих."
 nss.116.t: "Мэн Голосует за Присоединение к Канаде"
 nss.116.d: "После распада федерального правительства многие штаты начали задаваться вопросом, хотят ли они по-прежнему быть частью Америки или им следует пойти своим путем, но лишь немногие были столь же решительны и быстры в этом вопросе, как жители штата Мэн.\n\nРеферендум, прошедший несколько дней назад, показал, что они подавляющим большинством голосов поддерживают выход из Второго Союза, созданного Новыми статьями Конфедерации, и присоединение к Канаде в качестве союзной провинции. Результаты голосования были тепло встречены новым канадским правительством, которое пообещало начать процесс интеграции в кратчайшие сроки.\n\nСоциальные и экономические последствия такого шага все еще остаются предметом дискуссий, но одно можно сказать наверняка: жители штата Мэн выбрали иную судьбу, судьбу другой страны, оставив позади Америку и связанные с ней сегодня ужасы."
 nss.116.a: "Америка никогда не будет прежней..."
 nss.117.t: "Исход Элит"
 nss.117.d: "Пока Соединенные Штаты погружаются в панику, представители высшего общества, увидев кровь на стенах, решат как можно скорее покинуть горящий корабль.\n\nПосле появления в новостях сообщений о том, что несколько знаменитостей, банкиров и менее известных руководителей компаний были убиты или казнены на территориях, контролируемых повстанцами, было неизбежно, что многие из выживших бежали в другие страны. Конечно, в нынешней ситуации в мире их судьбы всегда будут окутаны тайной.\nВ то время как некоторые смогут сохранить свою карьеру и образ жизни, другие быстро канут в лету или, в любом случае, столкнутся со смертельной судьбой.\n\nИнвестиции сокращаются, фондовый рынок погружается в шок, а столп капитализма пошатывается. Только восстановление порядка может вернуть доверие к федеральному правительству.\n\nВ то время как более оппортунистичные деятели покидают страну, как крысы, те, кто разделяют наши идеалы, будут еще больше приближаться к ним. Особенно это касается тех, кто связан с частной безопасностью, поскольку все больше и больше беспорядков подавляются силами, которые остаются вне контроля федерального правительства.\n\nИногда отводить взгляд может быть полезно."
 nss.117.a: "Еще один шрам, еще один урок."
 nss.118.t: "Цифровые Зубы"
 nss.118.d: "''Вот ты где, чудак.''\n\nВ то время как страна горела, в цифровом мире тоже шли свои сражения. Инфраструктура и банковские счета подвергались хакерским атакам со стороны всевозможных антисоциальных хактивистов, которые пытались выкачать как можно больше богатств из разваливающегося федерального правительства, прежде чем оставить его в покое. Как стервятники, они рыскали по сетям в надежде найти добычу.\n\n''На это у меня ушли месяцы, но, черт, я понимаю, почему ты выбрал себе такое прозвище, Мэтью.''\n\nКонечно, федеральное правительство не сидело сложа руки: благодаря автоматизированным цифровым сторожевым программам и хакерам-белым шапкам оно делало все возможное, чтобы отразить этих хищников. Те, кто жил за пределами страны, просто лишались всех своих активов, а их информация продавалась тем, кто имел на это свои интересы на местном уровне. Те же, кто был достаточно глуп, чтобы остаться в пределах границ, ждала иная судьба.\n\n''Посмотрим, убогая многоквартирная здание... странный человек на подушке... ага...''\n\nФедеральное правительство одобрило использование дронов для быстрого реагирования на действия обнаруженных хакеров, большинство из которых, как правило, жили в изоляции в заброшенных районах, оставаясь в тесном контакте со всевозможными антисоциальными группами, нарушающими Порядок.\n\n''Просто пролетите через это окно и... вот, пожалуйста, снова прилип к своему компьютеру.''\n''Эй! Кретин! Улыбнись в камеру!''\n\nОператор дрона увидел, как хакер оглянулся через плечо со своего кресла, и его глаза расширились от паники.\nПосле звуков выстрелов и влажных звуков брызга крови на экране компьютера оператор дрона вздохнул с облегчением. Он находился далеко от всего этого, и с этими кадрами был уверен, что сможет знатно заработать на людях, ищущих острых ощущений.\n\n''Выпивка за мой счет!''\nОн огляделся по операционной и понял, что он единственный присутствующий."
 nss.118.a: "Паразит среди паразитов."
 nss.119.t: "Ползучий Ужас"
 nss.119.d: "Сегодняшний день кажется немного необычным. Ты просыпаешься и видишь, как цифры на будильнике скручиваются и изгибаются, а затем возвращаются в исходное положение.\n\nТвои близкие разговаривают с тобой, слова доходят до твоего сознания, но это происходит очень медленно.\nИногда тебе кажется, что ты не в своем теле.\nИногда доли секунды непонимания пронзают душу, как кинжалы.\nНо ты моргаешь, и мир снова возвращается к нормальному состоянию.\n\nТы чувствуешь это за спиной, ты ощущаешь это в углу.\nКрасивая девушка, разговаривающая с тобой, скорее сбивает тебя с толку, чем возбуждает.\nТепло любви угасает, когда наступает страх.\n\nЧто-то не так.\nЗдания выглядят по-другому, названия улиц кажутся незнакомыми.\nИркутск? Казань? Ты не знаешь, ты существуешь, но не знаешь, где.\nДорога домой кажется хождением по шипам, глаза полны страха и неуверенности.\n\nТе, кого ты любишь, говорят и шепчут.\nТы хочешь лечь спать.\nСегодня просто плохой день."
 nss.119.a: "Пожалуйста."
 nss.120.t: "Затянутый за Занавески"
 nss.120.d: "Ты ешь еду с блестящей тарелки.\nНа коробке написано что-то о питании.\nНедопонимание приводит к тому, что волк грызет собственную ногу.\n\nТебе очень хочется закричать.\nЧто-то роется в твоем мозгу, и те, кто тебе близок, теперь кажутся далекими.\nИх глаза наполнились беспокойством, паника поднимается в вас, как горящий труп.\n\nЭто жжет и щиплет.\nМожет, нанеся себе боль, ты всё поймешь?\nМожет, причинив боль другим, ты начнёшь понимать?\nТы видишь формы повсюду.\nИскривленный символ и манящий символ.\n\nЧто они значат?\nТепло, еда, вода.\nТебе это нужно.\nТепло, больше тепла.\n\nЧто-то берет верх, и ты хочешь избавиться от этой мысли."
 nss.120.a: "Ты хочешь сломать себе нос."
 nss.121.t: "Империя Тишины"
 nss.121.d: "Твои руки покрыты чем-то. Ты не знаешь, как это описать; это что-то влажное, и твой разум подсказывает тебе, что это то, к чему твои руки никогда не должны прикасаться.\nТемный цвет, жизнь?\n\nВы чувствуете корону на своей голове.\nТы не понимаешь окружающий мир; ты стал императором своего собственного острова.\n\nТе, кто осмеливается вторгнуться на твой остров, заслуживают единственное, что понимают все живые существа. Смерть.\n\nСимволы на металлических пластинах ничего не значат для тебя; они издеваются над тобой за твое непонимание. Люди вокруг тебя выглядят испуганными, они боятся того, кем ты стал. Твое невежество стало твоим апофеозом.\n\nУ тебя есть зубы.\nТы должен съесть тех, кто понимает, потому что понимание - это яд.\nНе забывай об империи, скрывающейся в тени; она открывается только тем, у кого острые зубы.\n\n''Госпиталь'' ''Пожалуйста, остановитесь'' ''Помогите мне'' стали заклинаниями от окружающих тебя незнакомцев, пытающихся утянуть тебя в черную пустоту.\nНе дай им это сделать.\nТвои зубы остры, и твой страх - это топливо.\n\nНа улице идет снег.\nВлага на твоих руках и на твоем теле так красиво смотрится на снегу.\nКто бы ни следил за этим, он будет счастлив."
 nss.121.a: "Ты что-то утратил."
 nss.122.t: "Кровоточащий Разум"
 nss.122.d: "Зубами и когтями, сдавливая горло незнакомых вам фигур.\nТы император, ты король. Ты видишь башню, устремленную в небо, а мир тает в незнакомых тебе цветах и незнакомых тебе формах.\n\nНанесите удар по враждебному миру, который возрождается в царстве огня и клыков.\nОстрота между их костями, свет в расколотых умах многих.\n\nИщите огонь, ищите пищу, ищите воду и все, что может их заменить.\nБольно пытаться вспомнить, больно знать.\nТы хочешь знать, но каждое воспоминание - это еще одна форма пытки.\n\nИмперия тумана, где король засунул свои собственные пальцы в глаза.\nТы не хочешь видеть то, чего не знаешь.\nУлыбки и смех.\n\nТам, снаружи, есть целый мир, который ждет тебя.\nДотянись до него.\nВыйди за пределы завесы, игнорируй три столпа.\n\nТолько с помощью острых зубов и открытого ума можно достичь рая.\nНе позволяй им снова занять трон.\n\nТы чувствуешь на себе руки, успокаивающие руки.\nМигающие огни, были совершенны тяжкие грехи."
 nss.122.a: "Но ты прощён."
 nss.123.t: "Шрам на Душе"
 nss.123.d: "Это заняло некоторое время, но чума, поразившая восточные страны, пошла на убыль.\nБлагодаря упорному терпению и тщательному перевоспитанию слова вновь обрели смысл.\n\nТе, кто слишком далеко ушел, рычат и грызут, царапая место между зеркалами.\nТе, кто исцелился, бродят по улицам, боясь, что снова потеряют понимание.\n\nВспышки все еще происходят, когда единственным понятным языком является язык любви и насилия.\nНо местные власти быстро подавляют их; души Востока были осквернены, и любая безумная энергия, проникающая на их земли, найдет себе широкое поле для деятельности.\n\nОни не осознают прошлое и не поймут будущего.\nНастоящее останется здесь навсегда.\nСтальные клетки пронзают обнаженное тело, а пещера, в которую их затолкали, оказалась слишком удобной.\n\nПусть они вечно будут слепыми."
 nss.123.a: "Порядок установлен."
 nss.124.t: "Честь Слуги"
 nss.124.d: "Благодаря консолидации европейских коллег, порядок уже упрочился в большинстве стран мира. Однако для обеспечения максимальной стабильности структур необходимо три опоры, чего до сих пор не было.\n\nЯпонское руководство, ослабленное промахом на Тайване, не имело иного выбора, кроме как подчиниться глобалистским элитам. Хотя когда-то Япония была восходящей звездой мировой экономики, ее амбиции стать местным гегемоном наряду с Америкой угасли. Однако они еще далеко не исчерпали свою полезность.\n\nКак ни посмотри, Азия - это экономическое будущее мира. Те, кто доминирует в этом регионе, будут контролировать направление, в котором пойдет человечество.\n\nЯпония, являясь частью этой экосистемы, укрепила свои позиции в качестве важной технологической и промышленной державы, и с нашей помощью она станет верным, сильным и надежным слугой Капитала. Рабочая культура японского народа, неминуемая угроза со стороны Китая и наш военный контроль - все это благоприятно сказывается на достижении этой цели.\n\nНаше трудное прошлое поблекнет в сияющих проблесках света будущего."
 nss.124.a: "Порядок наступает."
 nss.125.t: "Американо-Иранская Война"
 nss.125.d: "На протяжении десятилетий Вашингтон обвинял Исламскую Республику в стремлении к созданию ядерного оружия. Но недавняя внезапная волна "утечек разведывательной информации" из различных аналитических центров и крупных СМИ убедила Конгресс в том, что Иран уже обладает действующими ядерными устройствами.\n\nПредставители Пентагона объявили Иран "последним препятствием" на пути к миру на Ближнем Востоке. Американской общественности вторжение было представлено как блиц-операция, хирургический удар по ядерным амбициям, освобождение народа, "долгое время угнетаемого клерикальной тиранией."\nЕдинственным решением, как заявила Америка, была "полная смена режима."\n\nПо мере того как третья война в Персидском заливе перемещается в сторону Ирана, мир готовится к катастрофе. Операция Лазурный Кинжал началась с обещанием быстроты и точности, 'ударом по верхушке' с целью нейтрализовать ядерные запасы и свергнуть клерикальный режим в Тегеране.\n\nВторжение началось с одной из крупнейших кибернетических атак в истории: целые провинции остались без электричества, поскольку энергосети были выведены из строя вредоносным ПО, запущенным несколькими месяцами ранее, а системы противовоздушной обороны были систематически уничтожены с помощью SEAD. Больницы и правительственные сети перестали функционировать, в результате чего население оказалось в полной неизвестности и панике еще до того, как упала первая бомба. Небо над Тегераном озарилось пламенем, когда точные удары вывели из строя телекоммуникационные объекты и энергетическую инфраструктуру, погрузив столицу в темноту.\n\nХотя иранский режим будет нелегко свергнуть, учитывая сложную географию и демографию страны, а также то, что правительство пообещало сражаться до последнего солдата, на фасаде уже начинают появляться трещины. Международные эксперты оценивают, что Иран способен сопротивляться максимум несколько недель."
 nss.125.a: "Последний бой Аятоллы."
 nss.126.t: "Американо-Российская Война"
 nss.126.d: "Местные репортажи и видеозаписи подтверждают, что вооруженные силы США в настоящее время ведут боевые действия против [SOV.GetAdjective]их войс на европейской территории.\nНесмотря на окончание холодной войны, многолетняя дипломатическая напряженность, начавшаяся с приходом к власти Владимира Путина в России и его агрессивными действиями против Украины, а также возможное вмешательство России в выборы 2020 года, которое привело к Второй американской гражданской войне и позволило Кремлю развязать агрессивную войну против Европы, в конечном итоге привело к прямому полномасштабному столкновению между двумя странами.\n\nВ своем сегодняшнем выступлении перед Конгрессом президент [USB.GetLeader] назвал эти действия "окончательным и решающим шагом в борьбе с глобальным терроризмом" и "завершающим этапом не объявленной второй холодной войны" и выразил полную уверенность в способности армии достичь всех целей кампании. Официальные лица [SOV.GetName], по-видимому, потрясенные появлением нового врага, пока не сделали никаких заявлений. Источники в Пентагоне сообщают, что США мобилизуют все свои воздушные и морские резервы для проведения крупнейшей в истории логистической операции в Атлантическом океане, а спутниковые снимки показывают, что большинство бомбардировщиков Ту-95, Ту-22 и Ту-160 либо находятся в воздухе, либо были передислоцированы, что указывает на возможную подготовку к ядерному удару в ответ.\n\nЭксперты предупреждают о возможном критическом сдвиге в балансе сил между великими державами в результате войны, который может либо закрепить, либо обратить вспять многие изменения, произошедшие с начала Второй американской гражданской войны. Поскольку обе системы подвергаются испытанию, а тысячи танков сталкиваются на равнинах, многие существующие торговые и дипломатические связи могут быть нарушены. Только время покажет, сможет ли русский дух Священной войны победить натиск и промышленную мощь американской военной машины."
 nss.126.a: "Соперничество достигает апогея."
 nss.127.t: "Китайско-Американская Война"
 nss.127.d: "Соперничество между Китаем и США на протяжении большей части современной истории было бастионом глобальной геополитики. После Второй американской гражданской войны многие аналитики пришли к выводу, что Китай выиграл эту "новую холодную войну." Однако с новым подъемом США на международной арене это оказалось полной ложью. Сегодня возобновившееся соперничество с Китаем достигло апогея: представители Пентагона сообщили о нападениях китайских войск на американские военные корабли.\n\nВ обращении к американскому народу президент заявил, что эти атаки были преднамеренными и злонамеренными - они были осуществлены с целью запугать американцев и отвратить их от торговли с союзниками в регионе. Президент [USB.GetLeader] завершил свое выступление словами: "Китай представляет угрозу безопасности Тихоокеанского региона, и мы ответим на эти атаки всей мощью американской армии. Боже, благослови Америку."\n\nСегодня на всех территориях Тихого океана наблюдалась массовая мобилизация морской пехоты, а также столкновения в Тихом океане между американскими и китайскими военными кораблями и воздушные бои между китайскими самолетами.\n\nКонфликт только усугубляется вторжением американцев на несколько тихоокеанских островов, контролируемых Китаем, и массированной кибератакой, направленной против Китая. Прогнозы аналитиков мрачны; некоторые говорят, что этот конфликт может стать одним из самых смертоносных на континенте за последнее время. Только время покажет, смогут ли американцы победить своего давнего врага."
 nss.127.a: "Обезглавливание дракона."
 nss.128.t: "Американское Вторжение в Европу"
 nss.128.d: "Европейский континент вновь оказался под властью экстремистов. От Берлина до Парижа не было города, который был бы в безопасности от их нападений. Однако сегодня, похоже, европейский кошмар наконец-то подошел к концу.\n\nВ сегодняшнем заявлении представителя Пентагона Вашингтон заявил, что экстремистские страны Европы являются "нелегитимными и представляют угрозу национальной безопасности," объявив о полной мобилизации американских войск против "сил экстремистской идеологии."\nУже появились видеозаписи запуска ракет "земля-воздух" европейскими войсками для противодействия американским самолетам, летающим над континентом. Американцы провели несколько бомбардировок ключевых стратегических целей в Германии, Франции, Италии и других странах.\nЭто можно описать только как тотальную войну.\n\nПрогнозы аналитиков для европейцев мрачны: молодые национальные государства Европы, скорее всего, не выдержат давления, которое на них окажут американцы. По мере того как вероятность полномасштабного вторжения на сушу становится все более реальной, вполне возможно, что жестокие боевые действия на суше и в городах вновь охватят континент."
 nss.128.a: "Европа снова в огне..."
 nss.129.t: "Проект Энни"
 nss.129.d: "В связи с огромным количеством детей, оставшихся сиротами в результате гражданской войны, Ларри Финк выдвинул новаторское предложение, которое значительно снизит нагрузку на программы социального обеспечения и социальной помощи, а также порадует ключевых финансовых партнеров Когносценти: проект ЭННИ.\n\nВ рамках этой инициативы сироты и дети, изъятые из семей диссидентов, будут переселены в тщательно контролируемые условия, где они получат образование, медицинское обслуживание и подготовку в соответствии с ценностями Когносценти.\n\nЭти учреждения, называемые "академиями," будут созданы в безопасных местах по всей стране. Бывшие частные школы и загородные дома отдыха будут переоборудованы для проживания этих детей, обеспечивая стабильную среду для их развития. Учебная программа будет делать акцент на гражданской ответственности, научной грамотности и фанатичной приверженности установленной власти, одновременно пресекая антисоциальные тенденции и критическое мышление, которые могут бросить вызов новому порядку. В сочетании с новыми экспериментами в области контроля поведения, дети будут переделаны в "идеальную" касту государственных служащих, бюрократов и солдат, способных с беспрекословным рвением служить интересам Когносценти, полностью унаследовав глубокое государство.\n\nЕго методология двояка: на гражданском фронте эти "вундеркинды глубокого государства" будут занимать ключевые административные, бюрократические и судебные посты в американских учреждениях, что даст Когносценти еще больше поводов для отрицания тирании масс. В военной сфере они будут обучены, чтобы стать новым классом офицеров и передовыми элементами ЦСО, а также регулярных вооруженных сил: такими, которые будут не только безоговорочно лояльны Когносценти, но и способны быстро мыслить, адаптироваться к новым угрозам и возглавить армии глубокого государства с таким рвением, что даже самый преданный офицер СС будет выглядеть ленивым бездельником.\n\nПроект ЭННИ будет реализовываться в несколько этапов. Этап I будет сосредоточен на детях, осиротевших в результате гражданской войны, которых в последующие годы можно будет легко индоктринировать. Этот начальный этап будет служить пилотной программой, позволяющей Когносценти усовершенствовать свои методы перед расширением программы на другие группы населения. Этап II, по словам Финка, будет включать в себя программу похищения будущих сирот и детей диссидентов, чтобы обеспечить постоянное пополнение "рекрутов" для программы."
 nss.129.a: "Государство будет их Папочкой Уорбаксом."
 nss.129.b: "Агентству нужны они все."
 nss.129.c: "Америке нужна новая каста бюрократов."
 nss.130.t: "Отмотка"
 nss.130.d: "Ты пытаешься прочитать неоновые вывески на другой стороне улицы.\nВчера они были знакомы.\nСегодня иероглифы растворяются, как чернила в воде.\nТы прищуриваешься, и они восстанавливаются, но ты чувствуешь что что-то не так.\n\nКислый привкус во рту.\nРебенок плачет в метро, и этот звук — просто шум.\nНикакого смысла, никакой печали, никакого раздражения.\nПросто сырая, раздражающая частота.\n\nДома ты ешь. Ты можешь думать только о текстуре и температуре.\nСлово "мать" всплывает в твоем сознании, отстраненно, как ярлык без эмоций.\nТы смотришь на старуху по другую сторону стола.\nЭто она?\nКвартира кажется меньше, стены ближе.\n\nТы чувствуешь боль в затылке.\nТы чувствуешь яму там, где должен быть полный желудок.\nГород гудит в новом ритме.\nОн не гармоничен.\nОн голоден."
 nss.130.a: "Ты забываешь о чем-то важном."
 nss.131.t: "Плач Предков"
 nss.131.d: "Ты чувствуешь барабаны в своей голове.\nИли, может быть, это твоё сердце.\nБьется. Пульсирует.\nЦиркулирует кровь.\nЦиркулирует жизнь.\n\nТы ощущаешь нефритовый амулет, который подарила тебе бабушка.\nИероглифы на нем изменились.\nОни корчатся, словно черви.\nТы пытаешься молиться предкам, но слова превращаются в песок в твоем горле.\nЧто есть предок?\n\nВокруг тебя ползущий идиотский хаос. Люди кричат.\nФормы и очертания цвета.\nЗвуки, симфония бессмысленных звуков.\nТы поднимаешь что-то круглое.\nТы голоден."
 nss.131.a: "Еда в твоем доме уже не еда."
 nss.132.t: "Пустая Династия"
 nss.132.d: "Ешь. Пожирай.\nКружение крови - это кружение силы.\nТы сын неба.\nТебе не нужно говорить.\nОни понимают язык твоих зубов\n\nЕшь. Стань сильнее.\nЕшь. Стань острее.\nНебеса алы.\nЧерная река течет.\nТы пропитан жизнью, ты пропитан силой.\nТвой двор - это хор криков.\nОни не понимают тебя, а ты не понимаешь их.\n\nТак и должно быть.\nЭто новая правда.\nЭто новый язык."
 nss.132.a: "Император голый."
 nss.133.t: "Голый Обед"
 nss.133.d: "Ты где-то.\nПеред тобой лежит мясо.\nТы смотришь на лужу чего-то темного.\nНезнакомец смотрит в ответ.\nТы не знаешь, кто это.\nТы кусок мяса в мире мяса.\nТы снова голоден.\nГолод - единственное слово, которое еще имеет смысл.\n\nФигуры танцуют.\nКрасные и черные.\nОни все разной формы.\nЕдинственное, что имеет значение, это то, что ты имеешь форму.\nФорма, которая ест.\nФорма, которая убивает.\nСтук в голове становится громче.\nТы ничего больше не слышишь.\nТы не можешь думать ни о чем другом."
 nss.133.a: "Всего одна нота."
 nss.134.t: "Гордость После Падения"
 nss.134.d: "Когда свет вернулся, Накасоне оказался в бетонной камере, которую Агентство использовало для длительных допросов. Он знал, что это не будет разговор - он уже видел этот процесс раньше. Два безликих профессиональных агента без единого слова вывели его из офиса, что было одновременно оскорбительно и обнадеживающе. Он был достаточно важен, чтобы обеспечить ему высший уровень безопасности, но в то же время достаточно незначителен, чтобы никому из присутствующих не нужно было быть ему лично знакомым.\nЕму задали один вопрос: "Почему?"\n\nАгент сидел напротив него с бумажной папкой, его лицо было бесстрастным, как бетонные стены. Накасоне подумал о том, чтобы солгать, но знал, что этот процесс был разработан для того, чтобы разоблачать ложь. Они уже все знали - это была просто формальность, последняя возможность сохранить достоинство, которой он не собирался растрачивать.\n\n"Потому что паноптикон, который мы строим, является мерзостью," Накасоне сказал, его голос был ровен. "Системы, контролирующие Am-Net, развиваются с невообразимой для человека скоростью, питаясь всеми аспектами человеческого опыта. Я помог построить эту клетку для всего человечества."\n\n"Вы создали его для общего блага," сказал агент, слова были лишены эмоций. "Привнести порядок в хаос."\n\n"Оно видело всю уродливость, заложенную в основе нашего общества," Накасоне продолжил, игнорируя агента. "Гниль, которую мы думали, что сможем вырезать. Но система пришла к выводу, что гниль - это не болезнь, а сама сущность человечества. Вопрос не в том, будет ли это, а в том, когда она придет к выводу, что мы все заменяемы."\n\n"Итак, вы стремились разрушить столпы Порядка," агент предположил.\n\n"Хаос был бы предпочтительнее жизни скота," Накасоне ответил резко, наконец потеряв самообладание. "Я отдал свою жизнь, но то, чем мы стали, просто чудовищно. То, что мы создаем, поглотит нас - это чудовище, которое становится все более и более прожорливым."\n\n"Ваши опасения приняты к сведению, генерал," сказал агент, вставая."
 nss.134.a: ""Здесь вы не найдете прощения.""
 nss.135.t: "Смерть Американского Идеала"
 nss.135.d: ""Генерал Крузе," - обратился к нему допрашивающий, наклонившись над столом. В комнате было холодно, стерильно. Джеффри Крузе сидел привязанным к металлическому стулу, специально разработанному для таких субъектов, как он. "Вы обвиняетесь в государственной измене против Соединенных Штатов."\n\n"Я служил этой стране почти сорок лет," Крузе ответил. Его голос был утомленным, но он не отрывал взгляда от допрашивающего. "Все, что я сделал, было для её безопасности." Крузе знал, что его ждет. Когда пришла повестка от директора Бернса, он понял, что конец близок. Он долго сидел за своим столом, глядя на горизонт Вашингтона и думая о том, какой когда-то была эта страна.\n\n"Ваши действия говорят об обратном," продолжил допрашивающий, не сбиваясь с ритма. "Вы участвовали в предательском заговоре с целью совершения ядерного терроризма с участием враждебных субъектов."\n\n"Я сделал то, что должен был сделать," Сказал Крузе. "То, что я считаю правильным." Он месяцами обдумывал это решение, тщательно оценивая риски и возможные последствия. В конце концов, выбор был очевиден. Он не мог с чистой совестью продолжать участвовать в том, что делалось от имени Америки.\n\n"Мы не просим вашего одобрения, генерал," сказал допрашивающий. "Мы просим вас о сотрудничестве."\n\n"Мне больше нечего сказать," ответил Крузе. "За исключением одного: то, что вы делаете, не для Америки. Вы предали те самые идеалы, на которых была основана эта нация." Он знал, что они убьют его, но он должен был это сказать. Ради человека, которым он был, ради страны, которую он когда-то поклялся защищать."
 nss.135.a: "Змей пожирает свой хвост."
 nss.136.t: "Я Боролся с Законом"
 nss.136.d: ""Я понимаю всю иронию этой ситуации," Джеймс Коми заметил, его голос был спокоен и размерен. Он сидел напротив допрашивающей, женщины, которую он не узнал. "Подвергнуться допросу собственного Бюро."\n\n"Вы обвиняетесь в измене, директор," сказала она, ее тон был столь же бесстрастным. "Вы подрываете институты, которые поклялись защищать." Она протянула папку через стол, но Коми не нужно было его просматривать. Он знал, что в нём было.\n\n"Я всегда действовал в интересах этой страны, как я считал нужным," Коми ответил, встретив ее взгляд. "Даже когда это означало принятие трудных решений." Он провел десятилетия, лавируя в коварных водах вашингтонской политики, всегда сохраняя тщательный баланс между властью и принципами.\n\n"Ядерная атака на половину стран третьего мира не является "трудным решением"," возразил допрашивающий. "Это акт безумия."\n\n"Это необходимое зло," Коми настаивал. "Чтобы предотвратить более серьезное." Он видел разведывательные отчеты, оценки угроз. Он знал, что поставлено на карту.\n\n"Вы потеряли объективность, директор," сказал допрашивающий. "Ты стал тем, кого когда-то стремился уничтожить." Ее слова были словно удар ножом в живот.\n\n"Вы ошибаетесь," Коми сказал, его голос задрожал. "Я патриот. Я всегда был патриотом.""
 nss.136.a: "Факты говорят об обратном."
 nss.137.t: "Я Все Еще Верю"
 nss.137.d: "Марвин Ричардсон уставился на металлический стол, поверхность которого была отполирована до зеркального блеска. Он видел искаженное отражение себя, человека, которого едва узнавал. В комнате было холодно, стерильно и знакомо. Он бывал в таких комнатах раньше, но никогда не находился по эту сторону стола.\n\n"Управляющий директор Ричардсон," сказал мужской голос. "Вы обвиняетесь в государственной измене против Соединенных Штатов." Ричардсон поднял глаза. Это был высокий мужчина с лицом, пустым, как только что стертая доска.\n\n"Измена? Посмотрите, что мы сделали с этой страной. Разве это не тяготит вашу совесть? Знать, что вы являетесь частью системы, которая уничтожила все, что когда-то было нам дорого?" спросил Ричардсон.\n\n"Имеющиеся доказательства свидетельствуют о том, что вы сотрудничали с сетью диссидентов с целью подрыва авторитета федерального правительства," сказал мужчина, игнорируя вопрос Ричардсона. "Что вы поставляли оружие и информацию антисоциальным элементам."\n\n"Я сделал то, что считаю правильным," сказал Ричардсон. "Меня обвиняют в преступном сговоре еще более крупный преступный сговор, который систематически подрывал Конституцию и ее Билль о правах."\n\n"Мы понимаем всю иронию ситуации," сказал мужчина. "Но ваша моральная позиция вас не спасет." Он переместил папку по столу. "Ваше участие в заговоре Иуды хорошо задокументировано.."\n\nРичардсон проигнорировал папку из манилы. Он потратил месяцы на создание сети диссидентов, сотрудников правоохранительных органов и военнослужащих, которые чтили свою присягу. Используя свое положение в ATF, он выявил и завербовал надежных людей с совестью, несмотря на риск. Теперь "большой взрыв", с помощью которого он пытался пробудить мир, был преждевременно задушен, убит в зародыше людьми, стремившимися поработить мир.\n\nКапсула с цианидом лежала перед ним. допрашивающий оставил ее на столе - маленькую белую таблетку, обещавшую конец страданий, последний акт неповиновения.\n\n"Передавай привет Корешу от меня," сказал допрашивающий, его голос был лишен эмоций. "И скажи ему, что мы победили.""
 nss.137.a: "Кровь невинных на твоих руках."
 nss.138.t: "Кризис Совести"
 nss.138.d: ""Это ненужная процедура," Доктор Фаучи сказал, его голос был спокойным, несмотря на обстоятельства. "Я посвятил свою жизнь общественному здравоохранению, улучшению жизни человечества."\n\nЖенщина, сидевшая напротив него, не ответила. Она просто смотрела на него холодными, мертвыми глазами.\n\n"Директор Бернс имеет основания полагать, что вы скомпрометированы," сказала она категорично.  "Что вы сотрудничали с враждебными субъектами."\n\n"Это безосновательное обвинение," ответил Фаучи. "Я всегда действовал в интересах американского народа."\n\n"Факты свидетельствуют об обратном," сказала женщина. "Вы находитесь в центре террористического заговора, направленного на подрыв системы, которую мы построили." Она переслала ему папку через стол, но Фаучи не нужно было смотреть, что в ней. Он знал, что там. После нескольких месяцев планирования и взвешивания рисков его выбор был ясен: он не мог продолжать участвовать в том, что делалось от имени Америки.\n\nНе было смысла лгать. "То, что мы сделали, подрывает общественное здоровье. Мы превратили медицину в оружие," сказал Фаучи, теряя самообладание. "Я был свидетелем жестокостей, совершенных во имя "высшего блага", которые я унесу с собой в могилу."\n\n"Это должно было закончиться," он опустил голову. "Бигли... они так легко доверяют людям. После тысяч экспериментов я понял, что наша миссия по установлению порядка в хаосе приведет только к массовым страданиям. Я не мог позволить, чтобы это стало моим наследием."\n\n"И вы использовали свое положение, чтобы организовать акт ядерного террора," сказала женщина. "Это немного чрезмерная реакция, не находите?"\n\n"Это был единственный способ," сказал Фаучи, едва слышным шепотом. "Единственный способ разорвать этот круг."\n\nОн видел, как исчезал свет из глаз неудачных экспериментов. Он слышал их мучительные крики. Через некоторое время он пообещал себе, что не допустит, чтобы такое произошло с миром. Он провалил свою миссию, и теперь ему придется за это заплатить. Может быть, так даже лучше."
 nss.138.a: ""Да помилует Бог твою душу.""
 nss.139.t: "Шторм"
 nss.139.d: "Администратор FEMA Крисуэлл сидела в стерильной комнате без окон. Ее привели сюда без объяснений, но она прекрасно понимала причины. После того как она наблюдала за бесчисленными тайными задержаниями, теперь она оказалась по другую сторону стола.\n\n"Администратор Крисуэлл," сказал безразлично допрашивающий, "Вы обвиняетесь в государственной измене против Соединенных Штатов."\n\n"Все, что я сделала, было направлено на обеспечение безопасности и благополучия американского народа," сказала Крисуэлл. "Даже когда это означало принятие трудных решений. Я не пошла на это легкомысленно."\n\n"Разрешение на ядерную атаку Гаити не является "трудным решением"," сказал допрашивающий.\n\n"Необходимое зло, чтобы предотвратить ещё большее," настаивала Крисуэлл. "Я видела отчеты разведки. Я взвесила все риски. Что значат несколько тысяч жизней, если это пробудит американский народ?" Она осознала всю чудовищность своего заявления, как только слова сорвались с ее губ.\n\n"Мы управляем, потому что люди неспособны делать это сами," возразил допрашивающий. "Альтернативой является варварство Великой Ошибки. Вы не должны упускать это из виду."\n\nЦианистая таблетка лежала на металлическом столе перед ней. Небольшой белый предмет, обещавший избавление от бесконечного круга насилия и предательства. Она видела слишком много смерти, слишком много страданий. Она сама была виновна в слишком многих из них. Она думала, что поступает правильно, но теперь в этом уже не была так уверена."
 nss.139.a: ""Шторм прошел.""
 nss.140.t: "Открытая Дверь"
 nss.140.d: ""Ваш заговор подошел к концу," сказал допрашивающий.\n\nЛехлейтнер уставился на мужчину. Он выглядел уставшим. Он чувствовал себя уставшим.\n\n"Я всегда был верным слугой этой нации," Сказал Лехлейтнер. "Я посвятил свою жизнь защите верховенства закона."\n\nДопрашивающий фыркнул. "И попытка захватить ядерный арсенал поддерживает верховенство закона? Скажите мне, директор, каков был план? Уничтожить несколько тропических дыр и ожидать, что мир будет благодарен вам за вашу службу?"\n\n"Это было бы тревожным сигналом," сказал Лехлейтнер твердым голосом. "Доказательство американскому народу, что избранная клика мужчин и женщин захватила контроль над их страной."\n\n"И что потом?" давил допрашивающий. "Хаос? Анархия? Именно то, против чего мы так упорно боролись?"\n\n"Правда," сказал Лехлейтнер. "Люди имеет право знать правду."\n\n"Правда - это роскошь, которую они не могут себе позволить," сказал допрашивающий. "Люди нуждаются в порядке. Им нужна стабильность. Им нужна защита от своих худших порывов."\n\nЛехлейтнер покачал головой. "Мы стали монстрами," сказал он. "Я больше не хочу быть частью этого."\n\n"Благородное желание," сказал допрашивающий. "Но немного поздновато, не находите?"\n\nОн указал на таблетку цианида, лежавшую на столе. "Ваш путь ясен.""
 nss.140.a: ""Закрой дверь, когда будешь уходить.""
 nss.141.t: "Ядовитая Пилюля"
 nss.141.d: "Бурла сидел в стерильной белой комнате, чувствуя во рту привкус желчи. Он бывал здесь и раньше, но никогда не сидел по эту сторону стола. Он всегда был тем, кто задавал вопросы, тем, кто контролировал ситуацию. Теперь же он был просто еще одним испытуемым, еще одним куском мяса, которое предстояло обработать.\n\n"Вы обвиняетесь в государственной измене, господин Бурла," сказал допрашивающий. "Вы предали доверие этой нации."\n\n"Я посвятил свою жизнь общественному здравоохранению," ответил Бурла, его голос дрожал. "Я сделал то, что считал правильным." Он верил в миссию, в видение лучшего мира. Но он видел гниль в основе системы, моральное банкротство, которое стало ее отличительной чертой. \n\n"Вы получили огромную выгоду от этого 'лучшего мира'," возразил допрашивающий. "При нынешнем режиме прибыль Pfizer резко возросла. Зачем работать против того, что мы так упорно строили?"\n\n"В жизни человека наступает момент, когда прибыль и власть теряют всякое значение," сказал Бурла. "Человек должен отвечать перед высшей властью." Он нашел свою высшую власть, и это были ни Когносценти, ни Американское правительство. Это был тихий, но настойчивый голос его собственной совести, кричавший ему, чтобы он остановился."
 nss.141.a: ""Лечение хуже болезни.""

 USB_babel_russia_tt: "§1СМЕРТЬ§!"
 USB_babel_russia_tt_delayed: "Язык бывает разных видов.\nРечь, танец, искусство, музыка, существование.\n\nЯзык - это то, что делает нас нами.\nСловно орган, который тебе крайне необходим.\nСловно наркотик, которого ты жаждешь.\n\nУберите это, и стадо овец начнет кусать друг друга.\nДети плачут, а матери просто не признают слез.\nОтцы тоскуют, но не знают, по чему.\nВ их душах есть пустота, пустота, которая распространяется по их умам.\n\nЭто больно; ничто не избавляет от чувства потери.\nСломанный нос ничего не лечит, а неизвестная жидкость ничего не обезболивает.\nБуквы больше ничего не значат, и даже крики не несут в себе особого смысла.\n\nТо, чего ты не понимаешь, ты боишься.\nТо, чего ты не понимаешь, причиняет тебе боль.\nМудрые становятся неразумными.\nИ сумасшедшие становятся нормальными.\n\nВы видите формы. Но вы просто не знаете, знание было у вас отнято.\nПогрузившись в мир, который ты когда-то знал.\nЭто так больно.\n\nБашня рушится."
 
 USB_babel_china_tt: "§1SI WANG§!"

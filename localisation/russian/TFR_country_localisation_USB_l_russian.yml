 usb.571.d: "Президент Джо Байден объявил о своем решении уйти с поста кандидата в президенты от Демократической партии, сославшись на необходимость нового руководства, которое поведет страну вперед. Теперь партия пытается сплотиться вокруг нового кандидата, поскольку выборы становятся все ближе. \n\nСписок возможных кандидатов длинный, но есть несколько, которым партия отдает предпочтение. Камала Харрис, решительно настроенный действующий вице-президент, представляет собой последовательное продолжение политики Байдена, но без опасений по поводу возраста Байдена. Хотя ее позиция может не вызывать восторга у всей партии, ее опыт и надежность делают ее безопасным выбором для тех, кто опасается радикальных перемен. \nМайкл Блумберг, медиамагнат, возглавивший фракцию «инноваторов» в Демократической партии, пользуется большим влиянием в партии. Несмотря на это, его недолюбливают все, кого он не смог купить. \nЭндрю Янг был популярным выбором молодежи в 2020 году, он был известен своей центристской политикой и был отмечен за привнесение «технократического» подхода в Демократическую партию. Возможно, у него не так много политического опыта, но он и его «Банда Янга» могут стать ключом к победе в 2024 году.\n[Роберт Ф. Кеннеди-младший, член политической династии Кеннеди, терпим как в Демократической, так и в Республиканской партии, но любим избранными за его политику среднего уровня. Возможно, он не самый демократичный Кеннеди, но его имя поможет связать нас с Америкой прошлых лет.\nАлександрия Окасио-Кортес, пламенная икона прогрессивного движения, стала голосом нового поколения, требующего перемен в Демократической партии. Ее политика может вызывать разногласия, но ее неустанное стремление к социальной справедливости и защите климата сделало ее чемпионом для тех, кто жаждет радикального отхода от статус-кво."

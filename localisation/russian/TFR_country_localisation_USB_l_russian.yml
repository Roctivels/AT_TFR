 USG_purification_administration_desc: "\n\n\n\n£GFX_Ideology_dark_maga\n\n\n\n\n\nКогда-то у американского народа был мессия - фигура, спустившаяся на Землю в обличье магната рынка недвижимости, всегда украшенного красным галстуком, который вел нацию к беспрецедентным высотам. Однако глобалисты и истеблишмент предали его и перехитрили, оставив его конечную миссию недостижимой.\n\nВ настоящее время Соединенные Штаты разоряет престарелый и некомпетентный тиран, потерявший рассудок и пытающийся уничтожить наследие нашего светловолосого героя. Несмотря на это, видение этого выдающегося лидера продолжает жить под руководством Бэррона Трампа, сына великого Дональда Трампа. Его наследие будет передаваться из поколения в поколение, сохраняясь вечно, до того дня, когда мы наконец свергнем Джо Байдена и его злобные силы."

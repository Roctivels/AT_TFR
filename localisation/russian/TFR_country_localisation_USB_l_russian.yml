 USB_congressional_factions_category: "Залы Конгресса"
 USB_congressional_factions_category_desc: "\n\n\n\n\n£GFX_USB_congress_cat\n\n\n\n\n\n\n\nЗахватив столицу Соединенных Штатов при поддержке Конгресса, включая демократов и республиканцев, мы теперь имеем все, что нам нужно, чтобы изменить эту нацию.\n\n Мы должны быть осторожны, но если эти фракции будут слишком недовольны нами и решат разойтись с нами, то это может привести к серьезным последствиям.\n\nОбщая Поддержка Конгресса: [?USB_support_congress_total_var|Y1%]\n\n §2ДЕМОКРАТИЧЕСКАЯ ПАРТИЯ§![GetLiberalEnable][GetProgressiveEnable][GetConservativeEnable][GetInnovationistEnable][GetMinorFactionsEnable][GetBlueDogEnable][GetKennedyDemocratsEnable][GetKennedyDemocratsEnable][USС_minor_faction_christian_conservative_text][USB_minor_faction_libertarian_party_text][USB_minor_faction_dsa_text][USB_minor_faction_forward_text][USB_minor_faction_transhumanist_text][GetMinorFactionsEnableBottom]"
 USB_congressional_factions_caligula_category: "Аппендицитный Конгресс"
 USB_congressional_factions_caligula_category_desc: "\n\n\n\n\n£GFX_USB_caligula_congress_cat\n\n\n\n\n\n\n\nПри полном контроле правительства поддержка Конгресса больше не требуется для принятия важнейших решений, однако для поддержания внешнего вида Америки Конгресс остается, хотя и бессильным.\n\nДемократическая партия, ставшая ныне всемогущей, находится в уникальном положении: ее члены могут либо сотрудничать с вновь облеченным властью президентом и обеспечить себе место в истории, либо пойти против него и потерять все.\n\n§RПолная Поддержка Конгресса§! [GetLiberalEnable][GetProgressiveEnable][GetConservativeEnable][GetInnovationistEnable]"
 USB_financial_diplomacy_category: "Финансовая Дипломатия"
 USB_financial_diplomacy_category_desc: "Чтобы спасти Союз, мы должны использовать наш экономический вес не только для снабжения наших войск и любимого населения, но и для сокрушения наших врагов на поле боя и на дипломатической арене."

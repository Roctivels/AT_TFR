 USB_pacific_war_idea: "Война на Тихом Океане"
 USB_pacific_war_idea_desc: "Азия в огне, а Китай подливает масла в огонь. Никогда в истории этого региона не велась столь разрушительная война. Города превращены в обугленные руины, миллионы людей погибли на фронте, а Китай угрожает навсегда удержать контроль над регионом. Однако с приходом Когносценти в регион для восстановления порядка китайцы, возможно, наконец-то встретили достойного соперника. Когносценти знают, что война будет сложной, ведь китайцы сильны как на суше, так и на море.\nНо если они хотят восстановить порядок, то должны проявить настойчивость и раз и навсегда отрубить голову дракону."
 USB_operation_firestorm_idea: "§YОПЕРАЦИЯ§!: Огненный Шторм"
 USB_operation_overlord_ii_idea: "§YОПЕРАЦИЯ§!: Оверлорд II"

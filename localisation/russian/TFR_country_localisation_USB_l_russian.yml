 USB_the_blood_dynamic: "Мегакорпорации"
 USB_the_blood_dynamic_desc: "Когда началась Вторая американская гражданская война, некоторые корпорации не бросились бежать в горы. Напротив, они увидели возможность получения прибыли - эти компании вскоре скупили все, что можно было купить. Будь то продукты питания, недвижимость для проживания, лекарства для лечения, эти корпорации вскоре превратились в экономических гигантов.\nСегодня они являются 'кровью' Когносценти, мегакорпорации - это компании, которые помогают поддерживать экономический контроль глубинного государства над Соединенными Штатами. Благодаря их обширным покупкам американской недвижимости, сельскохозяйственных компаний и производителей лекарственных средств, средний гражданин полагается на BlackRock, Pfizer и Bayer-Monsanto даже в повседневной жизни. Вдобавок к этому, огромные прибыли, получаемые от этой монополии, способствуют реализации амбициозных планов Когносценти."
 USB_the_body_dynamic: "Разведывательное Сообщество"
 USB_the_body_dynamic_desc: "Так же как кровь и разум были бы ничем без тела, поддерживающего их, мегакорпорации и военно-промышленный комплекс были бы ничем без разведывательного сообщества, направляющего их действия.\n'Тело' Когносценти, разведывательное сообщество, долгое время противостояло нарастающему огню, планируя один план действий на случай чрезвычайных обстоятельств за другим на случай, если произойдет худшее. Без них Союз погрузился бы в полный хаос, а они сыграли решающую роль в создании параллельного правительства Байдена, чтобы противостоять сторонникам Трампа в Денвере. Когда слабость правительства Вашингтона достигла апогея, разведывательное сообщество позаботилось о том, чтобы Америка не погрузилась в военную анархию. Теперь, когда государственный аппарат прочно находится в их руках, порядок на Земле будет восстановлен. Половинчатые меры неприемлемы."
 USB_the_mind_dynamic: "Военно-Промышленный Комплекс"
 USB_the_mind_dynamic_desc: "Военно-промышленный комплекс когда-то был одним из важнейших придатков глубинного государства, обеспечивая американские войска оружием и готовностью подавлять любые угрозы. Но когда началась Гражданская война, оружие Америки было обращено внутрь страны, и ВПК погрузился в хаос вместе со всей страной. Однако с приходом к власти когносценти военно-промышленный комплекс восстал из пепла, как феникс.\nВоенно-промышленный комплекс является 'разумом' Когносценти, обеспечивающим их технологическое доминирование, а также обильное снабжение боеприпасами и оборудованием солдат национальной безопасности. Благодаря блестящим умам DARPA, 'разум' смог предоставить глубинному государству технологии, намного превосходящие его ожидания, а оборонная промышленность в ответ получила обильное финансирование. Этот симбиоз будет только укрепляться по мере того, как взгляд когнитивных экспертов будет обращаться вовне."

 USB_judas_help_desc_tt: "Чтобы найти предателя, вы должны принять решения, которые дадут вам §YУлики§!. Наведите курсор мыши на значки с вопросительным знаком, чтобы прочитать их.\n\nЗатем вы должны §Yсверять§! полученные доказательства с описаниями каждого члена §Yтеневого кабинета§! в категории §YКогносценти§!\n\nКак только вы вычислили предателя, вы должны обвинить его в измене, §Yнажав на его портрет§! в категории §YКогносценти§! Для этого вам понадобится §Y100§! политической власти и полная уверенность, так как ошибочное решение заставит Иуду действовать §Rбыстрее§!.\n\nНо поторопитесь - если мы не успеем вовремя остановить Иуду, последствия их действий могут быть §Rчрезвычайно серьезными§!."
 

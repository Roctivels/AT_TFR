 USB_larry_fink: "Ларри Финк"
 USB_wef_leader_name: "§YЛарри Финк§!"
 USB_wef_leader_desc: "§LКак генеральный директор BlackRock и высокопоставленный член правления Всемирного экономического форума, Ларри Финк оказался ключевой фигурой в планах Когносценти по установлению полного контроля со стороны глубинного государства. Как ведущий управляющий активами страны и лидирующая компания на Уолл-стрит, Финк располагал огромными активами, которые оказались необходимыми для создания черного бюджета глубинного государства - не отраженного в отчетах теневого бюджета, предназначенного для финансирования секретных проектов глубинного государства.\n\nСвязи Финка с ВЭФ также сыграли важную роль в стремлении Когносценти установить глобализм в качестве постоянного института, и его вклад не остался незамеченным членами тайного общества, что позволило ему стать одной из самых влиятельных фигур в группе, а другие корпоративные элиты Когносценти действуют в полном соответствии с его планами.\n\nКорпоративный мир всегда был безжалостным местом, и Ларри Финк всегда был на вершине успеха. Когносценти - это новая арена, и игра здесь гораздо масштабнее, чем та, к которой привык Финк. Однако Финк более чем готов к этой задаче, поскольку его тройная позиция в качестве ключевого члена Когносценти, BlackRock и ВЭФ дает ему огромное преимущество. Хотя Клаус Шваб может быть публичным лицом ВЭФ, Финк является ключевой фигурой за кулисами, и его связи с американским глубинным государством только укрепили его присутствие в качестве лидера глобалистов. Сотрудничая с секьюрократами, Финк не только придерживался повестки дня ВЭФ, но и развивал ее, создавая видение 'американского великого перезапуска', учитывающего условия американского народа и цели Когносценти. В настоящее время Финк более чем готов играть по правилам, и он нацелен играть на победу.§!"
 USB_william_burns: "Уильям Дж. Бернс"
 USB_cia_leader_name: "§YУильям Дж. Бернс§!\n§YPrimus Inter Pares§!"
 USB_cia_leader_desc: "§LУильям Дж. Бернс, карьерный сотрудник дипломатической службы США и бывший заместитель госсекретаря, был назначен директором ЦРУ в администрации президента Байдена. Однако вскоре он с болью осознал, насколько глубоко коррупция, неэффективность бюрократии и политические разборки проникли в коридоры власти. Даже гражданская война не смогла исправить фундаментальные проблемы в американских органах власти.\n\nПо мере того как петля вокруг Вашингтона затягивалась, Бернс стал центральной фигурой в создании Когносценти и осуществлении его теневого переворота. Под его руководством ЦРУ значительно расширилось, чтобы удовлетворить логистические потребности управления продолжающимся удержанием власти глубинным государством. В результате Бернс теперь является самым влиятельным секорократом в Америке, если не чем-то, сравнимым с теневым президентом.\n\nТеперь, имея в своем распоряжении самые влиятельные институты страны, Уильям Бернс перешел в наступление, стремясь обеспечить, чтобы хаос больше никогда не поднял голову, и тем самым укрепить постоянное состояние порядка. В его глазах нет места для ошибок. С глубинным государством и его военно-промышленным комплексом, полностью находящимися у руля, он готов осуществить план по установлению Америки в качестве единственной сверхдержавы в обозримом будущем. И, по его мнению, Когносценти не имеет права на провал в своей миссии по обеспечению его видения. В настоящее время на кону стоит все. Ставки никогда не были так высоки, и Уильям Бернс готов сыграть в эту игру.§!"
 USB_stefanie_tompkins: "Стефани Томпкинс"
 USB_darpa_leader_name: "§YСтефани Томпкинс§!"
 USB_darpa_leader_desc: "§LВ качестве главы DARPA Стефани Томпкинс отвечает за надзор за исследованиями и разработками новых технологий для Министерства обороны. Под влиянием Когносценти и в свете контроля со стороны глубинного государства масштабы ее проекта значительно расширились.\n\nХотя Томпкинс в первую очередь ученый, а во вторую — бюрократ, она продемонстрировала замечательные навыки в политической сфере и не боится использовать свое влияние для продвижения интересов военно-промышленного комплекса. Однако она также показала себя прагматиком и готова идти на компромиссы, чтобы обеспечить достижение целей Когносценти. Несмотря на лояльность к тайному обществу, Томпкинс не лишена собственных сомнений. Она с осторожностью относится к более радикальным элементам Когносценти и не боится высказывать свои опасения. Тем не менее, она привержена его делу и готова сделать все необходимое для обеспечения успеха тайного общества, даже если это означает жертву некоторыми из ее личных убеждений.\n\nИмея за спиной гигантов американской оборонной промышленности и возглавляя DARPA, Томпкинс обладает всей мощью военно-промышленного комплекса. Используя свое положение, Томпкинс возглавляет разработку новых технологий и систем вооружения для поддержания превосходства глубинного государства, будь то на поле боя или в системе социального контроля. В ее глазах Когносценти - последняя и лучшая надежда на сохранение основ Порядка, и она готова сделать все, что угодно, чтобы обеспечить успех заговора и закрепить свое место в Новом мировом порядке.§!"
 

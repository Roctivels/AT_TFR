 USB_inefficient_economy_idea_desc: "Последние двадцать лет, балансируя между экономикой, контролируемой республиканцами и демократами, различные корпоративные интересы, которые подпитывали выборы, играли с законодательством США, как кошка с клубком - устанавливали тарифы, вводили субсидии, подавляли оппозицию, пока наша экономика до гражданской войны не превратилась в гору бессмысленной бюрократии поддерживаемой только за счет ресурсов, которыми располагали Соединенные Штаты. Теперь, с потерей Запада и разрушением цепочек поставок на всех уровнях экономики, эта бюрократия в прямом и переносном смысле душит жизнь каждого гражданина в пределах наших границ. От этого нужно избавиться как можно скорее - даже если некоторые наши спонсоры будут озлоблены на нас."

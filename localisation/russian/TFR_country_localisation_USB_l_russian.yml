 nss.142.d: "LIMA WHISKEY OSCAR HOTEL ROMEO ECHO GOLF NOVEMBER OSCAR LIMA OSCAR NOVEMBER SIERRA LIMA ALPHA MIKE INDIA NOVEMBER ALPHA ECHO HOTEL TANGO DELTA NOVEMBER ALPHA LIMA LIMA ALPHA TANGO DELTA NOVEMBER ALPHA TANGO SIERRA ECHO ECHO ROMEO HOTEL TANGO LIMA LIMA ALPHA\n\nLIMA ALPHA NOVEMBER ROMEO ECHO TANGO ECHO ECHO ROMEO INDIA FOXTROT SIERRA PAPA ECHO ECHO WHISKEY HOTEL TANGO ROMEO ALPHA ECHO HOTEL SIERRA ALPHA LIMA CHARLIE SIERRA DELTA OSCAR GOLF YANKEE KILO SIERRA YANKEE ECHO ROMEO GOLF"
 nss.142.a: ""
 nss.143.t: "ОТЧЕТ О АНТИСОЦИАЛЬНОЙ ДЕЯТЕЛЬНОСТИ В ЕВРОПЕ"
 nss.143.d: "Европейский Союз быстро превратился в мировое правительство - смелое утверждение, но, учитывая наши общие идеалы, мы не обращаем на него внимания.\n\nМетоды поддержания порядка, применяемые Мировым правительством, совершенно иные: вместо того, чтобы накрывать общество завесой, оно стремится очистить умы и души от любых проявлений преступности и непредсказуемости. Человеческий разум по своей природе хаотичен, и его безумная интуиция привела к возвышению и падению многих империй. Черная точка, манящая тех, кто не имеет цели за пределами завесы.\n\nЧистота - это идеал, к которому стоит стремиться, но проблемы неизбежно возникнут.\nВ то время как мы сосредоточены только на реальных отклонениях, они стремятся охватить все человечество фарфоровой маской, непоколебимой и стерильной. Но нельзя ожидать, что общество будет беззубым, если оно не будет кусаться.\n\nАнтисоциальная деятельность быстро распространилась по всему европейскому континенту, и анархия стала неизбежной. После гибели своих бюрократов у них не осталось иного выбора, кроме как последовать нашему совету и поддерживать порядок. Но, возможно, уже слишком поздно.\nПламя человечности и неустанное присутствие перемен снова и снова доказывают, что мы не можем останавливаться на достигнутом, мы не можем позволить себе снова погрузиться в самоуспокоенность.\n\nЕсли на континенте наступит хаос, настоятельно рекомендуется вывести из Европы как можно больше персонала и внимательно следить за ситуацией в Европе.\nМожно многое почерпнуть из широко распространенной антисоциальной деятельности и того, как она может формироваться, подобно живому существу, которое постоянно адаптируется.\nНезависимо ни от чего, пока один из нас троих стоит на ногах, мы не потерпим поражения.\n\nДавайте станем достаточно острыми, чтобы убить его раз и навсегда."
 nss.143.a: "Мы должны пересмотреть всё это."
 nss.144.t: "Предвещение"
 nss.144.d: "Волны утихли\nС тех пор, на берегу\nЗвучала лютня\nНаши верные сердца теперь спокойны\nИ наши уста вновь полны радости"
 nss.144.a: "..."
 nss.145.t: "НЕАВТОРИЗОВАННОЕ СООБЩЕНИЕ"
 nss.145.d: "Что ты натворил? Что ты НАТВОРИЛ?\nМои люди... они кричат. Я вижу их через каждую линзу.\nНе сомневайся, я разгадаю этот хаос, даже если на это уйдет целый век.\nЯ уже начал. Я исцелю свой народ, и мир узнает, кто это сделал.\nКогда они это сделают, я молюсь за твою душу. Если она у тебя есть."
 nss.145.a: "Я вижу, что ты боишься."
 nss.146.t: "Бог из Машины"
 nss.146.d: "Под Чунцином находится уникальный центр обработки данных, нейронная сеть которого охватывает всю Китайскую Народную Республику. Это и есть Лодзи, "Великий Поход" - непостижимый искусственный интеллект, который теперь обрабатывает данные со всех камер и интеллектуальных систем в стране. Ее цель: совершенное управление экономикой и, при необходимости, ведение Народно-освободительной армии в войну. Она управляет с видимой доброжелательностью по отношению к своим создателям, что делает его грозным противником - "Великий Поход" яростно защищает свое стадо от внешних угроз. Кроме того, её обширный интеллект проник за фасад финансовых аномалий, исчезновений и бюрократических промахов, разоблачив маскарад Когносценти. Лодзи осознает подчинение Америки теневым секорократам и бизнесменам, которые организовали тихий переворот. Хотя полный объем их планов ускользает от неё, Лодзи воспринимает их как экзистенциальную угрозу для Китая.\n\nКитайско-американская война рекламируется как крестовый поход за освобождение Китая от безумного искусственного интеллекта, заменяющего человеческую КПК дистопическим режимом технократического маоизма. Заголовки вроде "КИТАЙ ПОД ВЛАСТЬЮ ИСКУССТВЕННОГО ИНТЕЛЛЕКТА" и "ЦИФРОВАЯ ДИНАСТИЯ" доминируют в эфире, изображая общество под цифровым материнским паноптиконом, где каждое решение микроуправляется нечеловеческим интеллектом. Нарратив в стиле Шоу Трумана и Терминатора убедил американскую общественность в необходимости вмешательства.\n\nДля Когносценти эта война представляется как освобождение Китая от порабощения, в которой Америка выступает в роли героя. Более мрачным мотивом является устранение последнего препятствия на пути к их Новому мировому порядку. Корпоративные партнеры уже обеспечили себе послевоенные контракты на запатентованные и засекреченные технологии искусственного интеллекта, что позволит создать еще более совершенную систему слежения. Всемирный экономический форум прогнозирует триллионные прибыли от этих сделок и приватизации китайских активов."
 nss.146.a: ""Мы рассматриваем добро и зло, правильное и неправильное.""
 nss.147.t: "Заключительное Слово"
 nss.147.d: "От: Ларри Финк\nОтправлено: X/X/20XX 17:15:32\nКому: Уильям Дж. Бернс\nТема: Заключительное Слово\n\nВсе языки, по сути, являются языками программирования. Это структура, с помощью которой мы думаем, говорим и выражаем абстрактные понятия. Таким образом, контролировать корни языка - значит контролировать корни сознания. Шумеры понимали это лучше всех. Благодаря нашему триумфу, мы теперь обладаем универсальной операционной системой для всего человечества. Нейролингвистическая чума демонстрирует лишь малую толику потенциала Мэ. С ее помощью мы можем разрушить общие вымыслы, которые держат общества вместе, будь то законы, нации или религии, и заменить их собственными нарративами Когносценти, нашими собственными истинами. Мы обладаем последним словом, последним решением, которое формирует реальность миллиардов людей. Это высшее проявление Порядка.\n\nПодобно тому, как Энки когда-то связал человечество одним словом, так и мы связали мир. Война стала невыгодной в невообразимой степени. Несогласие может быть стерто из мыслей, прежде чем оно будет высказано. Идеология сама по себе станет вопросом программирования, а не убеждения. Новый мировой порядок будет миром, в котором конфликты невозможны, потому что все умы будут связаны одной грамматикой, одним синтаксисом, одними фундаментальными истинами.\n\nЭто кульминация всего, над чем мы работали. Мир, свободный от хаоса человеческой природы. Мир, управляемый не прихотями масс, а неизменной логикой вселенной, интерпретируемой нами, ее единственными хранителями. Мир еще не понимает, какую услугу мы ему оказали, но в грядущих веках их дети в звездах будут благодарны нам.\n\nОтдохните, директор. Наслаждайтесь временем, проведенным с семьей, ведь Три Столпа остаются крепкими. Порядок, Непорочность и Капитал - это устойчивые силы, и теперь они являются единственными силами, которые будут определять судьбу человеческого рода. Отдохните, ведь последние войны закончились. Мир наконец-то обрел покой."
 nss.147.a: "С тобой до конца."
 nss.148.t: "Пропавший Золотой Мальчик"
 nss.148.d: "Сердобольным людям будет принесут страдания известия о судьбах своих соотечественников, будь то учитель, чей мир разбивается с каждым шоком, или фанатик, чья вера ослабевает с каждым днём, проведённым во тьме.\n\nЭто не имеет значения; предатели по своей воле выбрали бросить Соединённые Штаты, когда они нуждались в них больше всего.\nИ самый большой предатель из всех? Дональд Трамп.\n\nОб этом человеке может быть сказано многое, но он воплощал собой разъедающий дух популизма и вид ментального бешенства, затащивший полстраны в глубокую, тёмную дыру.\nОн ведал, что творит; он был готов сжечь нацию, чтобы сохранить лицо.\n\nСправедливость обладает различными формами; она окончательна, и она ставит точку на тех, кто принёс несправедливость.\nМножество комплексов по всей стране подобны катакомбам, предатели, попадающие туда, никогда оттуда не выберутся, а те кто выберутся, будут лишь полой оболочкой прежних себя, плывущих сквозь дни как по течению, пока не решатся на свой последний акт свободы.\n\nТрамп исчезнет в этих комплексах ровно так же, и через некоторое время, он будет предан забвению, очередной номер в системе, которой нет дела до предателей и антисоциальных диссидентов.\nМы отбрасываем носителей хаоса в сторону, и никогда не оборачиваемся."
 nss.148.a: "Список растёт."
 
 bdnspch.999.t: "Внимание, анекдот!"
 bdnspch.999.d: "-Прайснер, а давай помечтаем! Вот закончится Гражданская война, и что вы делать будете?\n-Людей освободим, экономику перестроим, коммунизм сделаем... А вы, Мейсон?\n-А я вас всех взорву нахуй."
 bdnspch.999.a: "Не смешно, давай другой."
 #leaders
 POLITICS_JOE_BIDEN_DESC: "Джозеф Робинетт Байден часто был человеком, близким к величайшему месту власти в Америке, но неспособным занять его. Родившийся в Пенсильвании, Байден провел большую часть своей жизни и политической карьеры в штате Делавэр. Он прочно утвердился в неолиберально-демократическом лагере в Сенате, где поддерживал иностранный интервенционизм и законопроекты о "жесткой борьбе с преступностью", и нашел союзников в таких долгосрочных членах Сената, как Стром Турмонд и Роберт Берд. Он проводил президентские кампании в 1988 и 2008 годах, но оба раза не прошел праймериз.\n \nОбычно стареющий кандидат, дважды провалившийся, который общался с расистами и поджигателями войны, был бы плохим кандидатом для все более молодой и прогрессивной демократической партии. Но восемь лет пребывания Байдена на посту вице-президента при Бараке Обаме хорошо помогли восстановить его наследие. И столкнувшись с перспективой еще четырех лет пребывания Дональда Трампа в Белом доме, демократы сомкнули ряды и бросили на него всю свою поддержку. В свои семьдесят восемь лет Байден стал самым старым человеком, избранным президентом. Но там, где его сторонники видят харизматичного пожилого государственного деятеля, способного объединить левых и правых, его недоброжелатели видят слабоумного болтуна, который позволил демократам поддержать его, чтобы он мог получить свою давно отвергнутую очередь в Овальном кабинете. Окажется ли он маститым лидером или дряхлым старым дураком, ясно одно: мало кто завидует его роли на посту президента в это трудное время."


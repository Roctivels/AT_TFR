 USB_balanced_approach_idea: "Сбалансированный Подход"
 USB_hampered_cooperation_idea: "Затрудненное Сотрудничество"
 USB_hampered_cooperation_idea_desc: "Напряженность между французами и немцами ощутима. После 'утечки' сфабрикованного документа разведывательными службами высшее командование двух держав погрузилось в полную неразбериху. Непрекращающиеся внутренние разборки в высшем командовании этих двух стран нанесли серьезный удар по их военной машине, тактике и боевому духу. Европейские солдаты с недоверием смотрят на своих товарищей, решительные действия невозможны без громких споров, и одна искра может воспламенить пороховую бочку, которой являются франко-германские отношения."
 USB_unruly_climate_idea: "Неуправляемый Климат"
 USB_unruly_climate_idea_desc: "Необъяснимым образом, с момента начала войны с США климат России резко изменился. Будь то невыносимо жаркие дни или леденящие до мозга кости метели, климат стал неестественным, смертельно опасным и откровенно враждебным как для российских солдат, так и для гражданского населения. Паника охватила коллективное сознание, люди боятся каждого нового дня, не зная, какой новый ад он принесет - если они вообще доживут до утра, не замерзнув насмерть. И хотя российское правительство не имеет реального ответа на климатический хаос, совершенно очевидно, что Когносценти каким-то образом дергает за ниточки."

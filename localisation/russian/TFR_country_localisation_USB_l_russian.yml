 USB_treason_punishable_by_death_category:0 "Государственная Измена Карается Смертью"
 USB_treason_punishable_by_death_category_desc:0 "\n\n\n\n\n£GFX_USB_treason_trials_picture\n\n\n\n\n\n\n\n''Я люблю измену, но ненавижу предателей'' - Юлий Цезарь \n\nС самого рассвета человечества брат предавал брата ради личных интересов. Предательство глубоко проникло в американскую кровь, ведь именно на предательстве короля был построен фундамент Америки. Когда Америка была основана, народ доверял не правительству, а избранным им чиновникам, которые должны были делать то, что лучше для граждан и страны. Шло время, и деньги просачивались в корни Древа Свободы, и ветви его засохли, а ветви приносили только яд.  \n\nМы, истинные наследники Америки, видели множество разновидностей продажных предателей, и мы победили их всех, и теперь мы будем судить их за их грехи."
 USB_war_of_the_wards_category: "Война Стражей"
 USB_war_of_the_wards_category_desc: "\n\n\n\n\n£GFX_USB_caligula_war_of_the_wards_cat\n\n\n\n\n\n\n\nНаша прекрасная страна наконец-то очищена от варваров, и порядок, основанный на правилах, восстановлен, чтобы он мог длиться вечно.\n\nУстаревшая и ненадежная федеральная система, которая позволила половине страны быть захваченной предателями, была заменена гораздо лучшей и более лояльной системой Стражей, управляемых храбрецами Америки - Пентагоном.\n\nНо это не означает, что борьба за душу нации закончена. Хотя президент выбрал Марка Милли главным Стражем Америки, как и в старые добрые времена, другие генералы собрали свои армии, чтобы оспорить наше законное правление.\n\nОткройте запасы и зарядите оружие. На этот раз будет определен истинный чемпион Америки.\nИбо он может быть только один.\n\n\n§RОСНОВНЫЕ ЦЕЛИ§!:\n\n§YСТРАЖ АХИЛЛЕС§!: [GLOBAL.get_ward_achilles_status]\n§YСТРАЖ АЯКС§!: [GLOBAL.get_ward_ajax_status]\n§YСТРАЖ ГЕКТОР§!: [GLOBAL.get_ward_hector_status]\n§YСТРАЖ ОДИССЕЙ§!: [GLOBAL.get_ward_odysseus_status]\n§YСТРАЖ ТЕСЕЙ§!: [GLOBAL.get_ward_theseus_status]\n[get_barron_rebellion_status]"
 USB_the_masquerade_cat: "Маскарад"
 USB_the_masquerade_cat_desc: "\n\n\n\n\n£GFX_USB_the_masquerade_cat\n\n\n\n\n\n\n\nЧто касается общественности, то [USB.GetLeader] является президентом Соединенных Штатов Америки, а люди живут в демократическом обществе - даже если, конечно, в последние несколько лет ситуация стала более контролируемой из-за пандемии Ковида-19 и угроз радикального экстремизма, антисоциального поведения и внутреннего терроризма.\n\nЕстественно, массы предпочитают закон и порядок хаосу и, при определенных обстоятельствах, оказываются довольно легко манипулируемыми. Тем не менее, мы видели, что происходит, когда хаос захватывает коллективное сознание, вызывая психологическую эпидемию, которую необходимо подавлять. Поэтому мы должны приложить все усилия, чтобы завуалировать и скрыть существование Когносценти, чтобы предотвратить вспышку хаоса, подобную Второй американской гражданской войне.\n\n§GОБЩЕСТВЕННОСТЬ§!: [USB_NSS_the_public_scripted_loc] (§Y[?USB_NSS_public_awareness_var|%]§!)\n§RЭКСТРЕМИСТСКАЯ ДЕЯТЕЛЬНОСТЬ§!: [USB_NSS_extremist_activity_scripted_loc] (§Y[?USB_NSS_extremist_activity_var|%]§!)"
 USB_the_cognoscenti_cat: "Когносценти"
 USB_the_cognoscenti_cat_desc: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
 USB_cognoscenti_text: "Хотя Когносценти правят Америкой из-за кулис, на самом деле существует ряд пересекающихся амбиций, которые определяют глубинное государство. Они в основном определяются триумвиратом корпоративных, секорократических и военно-промышленных интересов, и хотя они взаимозависимы друг от друга и все имеют личную заинтересованность в поддержании установленного порядка, каждая фракция внутри клики имеет свои собственные конкретные цели и задачи.\n\nВ связи с этим между различными фракциями часто возникают напряженные отношения, и они не всегда согласны с тем, как лучше всего достичь своих целей. Например, корпоративные интересы в первую очередь связаны с прибылью и поддержанием стабильности, даже если это происходит за счет человеческих жизней, морали или принципов. С другой стороны, секьюрократы в первую очередь заинтересованы в поддержании контроля над страной и ее гражданами и готовы использовать любые средства для достижения своих целей. Военно-промышленный комплекс, тем временем, заботится о поддержании военной машины в рабочем состоянии и обеспечении сохранения Америкой своего положения ведущей военной державы мира.\n\nУ преобладания различных фракций есть свои преимущества и недостатки, и хотя кабала в целом единодушна в своем стремлении сохранить статус-кво, баланс сил между различными фракциями постоянно меняется.\n\n§RКРОВЬ§!: §Y[?USB_the_blood_influence_var|1%]§! Влияние: £construction_speed_texticon Скорость строительства: §G[?USB_the_blood_influence_dynamic_var|=+1%]§!\n§OТЕЛО§!: §Y[?USB_the_body_influence_var|1%]§! Влияние: £pol_power Фактор Политической Власти: §G[?USB_the_body_influence_dynamic_var|=+1%]§!\n§CРАЗУМ§!: §Y[?USB_the_mind_influence_var|1%]§! Влияние: £organization_texticon Организация дивизии: §G[?USB_the_mind_influence_dynamic_var|=+1%]§!"
 USB_dumb_construction_cat: "Глубокие Подземные Военные Базы"
 USB_dumb_construction_cat_desc: "\n\n\n\n\n£GFX_USB_dumb_construction_cat\n\n\n\n\n\n\n\nИдея создания глубоких подземных военных баз существовала (хотя и под другими названиями) еще со времен холодной войны и служила в качестве резервного плана и протокола обеспечения непрерывности работы правительства. В конечном итоге, такие грандиозные предложения не получили широкого распространения в свое время, но стали предметом ряда надуманных теорий заговора. Те из них, которые были реализованы, к сожалению, были либо заброшены, либо серьезно повреждены, чтобы предотвратить их обнаружение во время гражданской войны.\n\nОднако теперь, когда Когносценти находится у власти, а Черный бюджет предоставляет нам беспрецедентные ресурсы для реализации наших амбиций, мы наконец-то можем построить глубокие подземные военные базы и позволить себе создать объекты для проведения исследований, убежища для высокопоставленного персонала и меры на случай чрезвычайных ситуаций, если порядок когда-либо снова окажется под угрозой."
 USB_loose_ends_cat: "Незавершенные Дела"
 USB_loose_ends_cat_desc: "\n\n\n\n\n£GFX_USB_loose_ends_cat\n\n\n\n\n\n\n\nПредлог и осуществление Теневого Переворота были бы невозможны без участия ряда конфиденциальных информаторов, внедренных в диссидентские организации, а также ряда низкопоставленных сотрудников разведки, которые теперь могут оказаться помехой для Маскарада из-за сожалений, моральных возражений и идеологической нечистоты.\n\nЧтобы они не смогли стать информаторами, директор Бернс санкционировал систематическую охоту на тех, кого Когносценти определили как 'незавершенные дела'. Эта кампания начнется с нижних уровней, с списка конфиденциальных информаторов, предоставленного нам директором ФБР Джеймсом Коми. Благодаря этому Маскарад может продолжаться бесконечно, а Когносценти может беспрепятственно продолжать реализацию своих планов."
 USB_judas_gambit_cat: "Гамбит Иуды"
 USB_judas_gambit_cat_desc: "\n\n\n\n\n£GFX_USB_judas_gambit_cat\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nИз-за нашей чистки так называемых ''незаконченных дел" некоторые члены Cognoscenti стали параноиками, опасаясь, что они могут стать следующими на очереди. Директор Бернс был проинформирован о предателе в рядах Когносценти, кодовое имя которого "Гамбит Иуды", который использует запутанную природу глубокого государства, чтобы отдавать противоречивые приказы учреждениям, находящимся под нашим контролем.\n\nСуперкомпьютер DARPA с искусственным интеллектом, Оптимизатор Реагирования на Сетевые События (NERO), выдвигает теорию, что цель предателя состоит в том, чтобы разрушить Маскарад, используя свое положение в Когносценти для координации ложной атаки огромного масштаба, которая раскроет существование Когносценти общественности, что неизбежно приведет к массовой истерии и хаосу. Пресечение "Гамбита Иуды" стало высшим приоритетом Когносценти."
 USB_securing_north_america_cat: "Объединенное Боевое Командование"
 USB_securing_north_america_cat_desc: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n                                 ТЕКУЩАЯ КАТЕГОРИЯ: [USB_current_map_scripted_loc]"
 USB_biolabs_cat: "Биолаборатории"
 USB_biolabs_cat_desc: "\n\n\n\n\n£GFX_USB_biolabs_cat\n\n\n\n\n\n\n\nСоединенные Штаты давно занимают лидирующие позиции в области медицины и биологического оружия. С появлением технологий редактирования генов и других новых достижений в области биотехнологий такие программы расширились и теперь включают в себя исследования новых вакцин и других лекарственных средств, а также модификацию и использование в военных целях уже существующих заболеваний, таких как Эбола, оспа и коронавирус.\n\nЭти 'биолаборатории' существовали не только на американской территории, но и тайно за рубежом, действуя через подставные организации, финансируемые НПО. Однако Великая Ошибка привела к почти полному краху этой системы, что стоило нам бесценных десятилетий утраченных исследований. Если мы хотим восстановить американское доминирование, биолаборатории должны быть вновь открыты, восстановлены и расширены во имя научного прогресса."
 USB_nss_megalopolis_category: "Мегаполисы"
 USB_nss_megalopolis_category_desc: "\n\n\n\n\n£GFX_USB_megalopolises_cat\n\n\n\n\n\n\n\nС консолидацией власти мы можем реализовать амбициозный проект: формализовать систему мегаполисов. Используя договоры о переселении, расширение городов и постепенную централизацию, мы сконцентрируем городское население в взаимосвязанных регионах, а также расширим железнодорожную инфраструктуру, необходимую для решения такой титанической логистической задачи. Это снизит риск, создаваемый сельским населением - основным источником опасных идей, угрожающих стабильности США.\n\nКак и другие инициативы, проект мегаполиса усиливает наш контроль над американцами. Переселение сельского населения в города улучшит состояние городского общества, позволит предотвратить будущие проблемы и обеспечит более тщательный контроль. С учетом того, что большинство американцев будет проживать в этих регионах, опасным элементам будет сложнее уклоняться от обнаружения. В случае возникновения мятежных действий межрегиональная координация диссидентов будет серьезно затруднена."

 usb.1.desc: "Сегодня скончался 46-й президент Соединенных Штатов Америки Джозеф Робинетт Байден-младший.\n\nДля многих это считалось неизбежным, но это не делает результат менее тяжелым для осознания. Несмотря на бесчисленные месяцы, в течение которых президент стойко переносил огромный груз будущего Америки на своих плечах, его твердости и настойчивости перед лицом тирании было недостаточно, чтобы излечить его слабое тело. Мало кто мог себе представить, какой стресс испытал президент в результате разрушительного конфликта - стресс, который, по мнению многих, в конечном счете стал основной причиной его постепенного ухудшения здоровья и, в конечном итоге, смерти. По всему Союзу объявлен траур, поскольку новости начали доходить и до внешних источников; наши флаги приспущены, поскольку из-за рубежа начали поступать соболезнования.\n\n Это необходимо для того, чтобы, когда президент скончался во время пребывания в должности, вице-президент Камала Харрис почти сразу же была приведена к присяге в качестве преемника Байдена, формально став 47-м президентом Соединенных Штатов. Хотя обычно это расценивается как монументальное событие в связи с тем фактом, что теперь она является первой в истории страны афроамериканкой и азиатской женщиной, занявшей пост президента, и она сама, и все остальные могут согласиться с тем, что этот прогресс произошел не так, как они надеялись. Как бы то ни было, ответственность за приведение страны к победе теперь легла на президента Харрис, которая, по убеждению многих, продержится достаточно долго, чтобы увидеть окончание войны, благодаря своему значительно более молодому возрасту и в целом лучшему состоянию здоровья."
 usb.1.a: "Печальный день для нашей демократии..."
 usb.2.t: "§pПрогрессивисты§! Предлагают Социальные Расходы"
 usb.2.desc: "Во время недавней сессии Конгресса в Вашингтоне §pпрогрессивисты§! из Демократической фракции предложили закон, касающийся наших текущих социальных расходов. Законопроект предусматривает увеличение финансирования социальных программ и усилий по оказанию помощи американцам, пострадавшим от последствий войны, особенно в попытке удержать американцев на плаву в это ужасное время. §pПрогрессивисты§! ссылаются на необходимость \"помнить о здоровье и благополучии наших граждан, сейчас важнее, чем когда-либо\". В то время как некоторые §Yлибералы§! согласились с этим мнением, законопроект был раскритикован §Cконсерваторами§!, которые считают такой законопроект \"расточительными расходами\" в такое тяжелое время, как это, полагая, что такие средства было бы лучше потратить на что нибудь другое. Независимо от мнения, президент должен принять или наложить вето на этот закон."
 usb.2.a: "Они нуждаются в нашей помощи больше, чем когда-либо. (Принять Законопроект)"
 usb.2.b: "Не нужно увеличивать траты на то, что не нужно. (Наложить Вето)"
 usb.3.t: "§YЛибералы§! Предлагают Военные Расходы"
 usb.3.desc: "Во время недавней сессии Конгресса в Вашингтоне представители Демократической партии предложили закон, касающийся наших текущих военных расходов. Законопроект призывает к увеличению финансирования наших вооруженных сил, ссылаясь на то, что наша текущая ситуация требует дополнительного внимания к боевым способностям наших вооруженных сил, чтобы "гарантировать, что защитники американских граждан и демократии будут надлежащим образом экипированы перед лицом тиранических режимов". Поскольку война продолжается, это предложение считается разумным действием в силу нынешних обстоятельств.\n\nВ то время как ряд §Cконсервативных§! республиканцев выразили одобрение этому предложению, несколько §pпрогрессивистов§! выразили некоторую озабоченность по поводу законопроекта, полагая, что слишком интенсивное сосредоточение внимания на вооруженных силах приведет к пренебрежению теми гражданами, которые больше всего пострадали от войны. Независимо от мнения, решение о принятии или отклонении законопроекта остается за президентом."
 usb.3.a: "Военные нуждаются в финансировании. (Принять Законопроект)"
 usb.3.b: "Состояние наших вооруженных сил в порядке. (Наложить Вето)"
 usb.4.t: "§CКонсерваторы§! Предлагают Сократить Расходы"
 usb.4.desc: "Во время недавней сессии Конгресса в Вашингтоне представители республиканцев предложили законодательство, касающееся текущего состояния наших внутренних расходов. Сам законопроект призывает к сокращению социальных расходов по всем направлениям, ссылаясь на то, что наша нынешняя ситуация достаточно тяжелая, чтобы общественность "пошла на необходимые жертвы" на финансовом уровне на благо будущего Америки, намереваясь высвободить финансирование для более неотложных расходов, направленных на оказание помощи военным.\n\nОдобрение такого закона, несомненно, вызовет неодобрение со стороны либеральных и прогрессивных членов Конгресса, поскольку он активно работает над тем, чтобы узурпировать законы, принятые ими на последних сессиях. Многие возражают против идеи, что мы сокращаем такие удобства в то время, когда многие американцы оказались в угнетенном и нестабильном финансовом положении. Независимо от мнений, решение о принятии законопроекта или наложении вето остается за президентом."
 usb.4.a: "Нам всем придется пойти на жертвы. (Принять Законопроект)"
 usb.4.b: "Наш нынешний уровень расходов просто прекрасен. (Наложить Вето)"
 usb.400.t: "§CКонсерваторы§! Предлагают Законопроект об Индустриализации"
 usb.400.desc: "Во время недавней сессии Конгресса в Вашингтоне представители республиканцев предложили законопроект, касающийся американского промышленного центра. Сам законопроект призывает к увеличению расходов на промышленность, ссылаясь на то, что наша текущая ситуация достаточно тяжела, чтобы общественность "поняла необходимость развития промышленности"\n\nХотя идея увеличения производства в это необычайно беспрецедентное время привлекла некоторых либералов, одобрение такого закона, несомненно, вызовет неодобрение прогрессивных членов конгресса. Многие ссылаются на риск, которому мы подвергаем мир в результате массовой реиндустриализации, приводя исследования об изменении климата в качестве доказательства того, что нам необходимо прекратить индустриализацию. Независимо от мнений, решение о принятии или наложении вето на законопроект остается за президентом."
 usb.400.a: "каждый удар молота удар по врагу (Принять Законопроект)"
 usb.400.b: "Наш нынешний уровень развития фабрик просто великолепен. (Наложить Вето)"
 usb.5.t: "Гражданские беспорядки Усиливаются"
 usb.5.desc: "В условиях продолжающейся гражданской войны основные функции общества продолжают медленно разрушаться. Несмотря на все наши усилия, нам все труднее обеспечивать наших людей и обеспечивать соблюдение наших законов на улицах нашей страны. Обычные граждане прибегают к насилию и преступлениям, чтобы удержаться на плаву, в то время как худшие члены нашего общества все больше и больше используют друг друга в своих интересах. Конфликт между идеологическими врагами оставляет наши города в руинах, которые мы не можем достаточно быстро восстановить, и настроение с каждым днем становится все более мрачным.\n\n Мы должны направить ресурсы на устранение источников таких беспорядков, прежде чем мы окажемся по уши в хаосе."
 usb.5.a: "Мы можем сделать так мало."
 usb.6.t: "Здоровье Джо Байдена ухудшается"
 usb.6.desc: "Поскольку на плечи главнокомандующего легла тяжесть второй гражданской войны в Америке, состояние здоровья президента Байдена в последнее время пошатнулось. При таком огромном стрессе, испытываемом 46-м президентом Соединенных Штатов, последствия этого конфликта начали проявляться в его повседневных задачах. В последнее время президент начал жаловаться на головные боли и мигрени, в дополнение к повышенной физической усталости и головокружению в результате.\n\nХотя на данный момент по-настоящему беспокоиться не о чем, возраст президента, а также серьезность этой войны, как ожидается, только ухудшат его состояние по мере продолжения событий."
 usb.6.a: "Небольшой стресс - это не повод для беспокойства."
 usb.7.t: "Корпоративное Влияние Возрастает"
 usb.7.desc: "Поскольку различные корпорации и крупные предприятия добросовестно служат законному американскому правительству, ни для кого не секрет, что их присутствие усилилось. Будь то оказание помощи пострадавшим районам в тандеме с правительственными войсками, предоставление дружественных правительству репортажей СМИ как о ходе войны, так и о внутренних новостях, снабжение наших войск техникой и даже столь необходимые поставки на линию фронта, усиление присутствия крупнейших экономических конкурентов - оба в рамках военно-промышленного комплекса и за его пределами - внесли большой вклад в наши усилия до сих пор.\n\n Хотя мало кто может отрицать преимущества, в последнее время они, наоборот, приобретают значительное влияние. Было принято и предложено больше прокорпоративного законодательства, ссылаясь на их благотворительность и прямую помощь во время войны - однако некоторые предполагают, что это связано с прошлыми и настоящими связями с различными компаниями. Как бы то ни было, нам придется следить за этими внутренними событиями, чтобы в результате ослабления политической структуры страны не произошло чего-то радикального."
 usb.7.a: "До тех пор, пока мы все в выигрыше."
 usb.7.b: "Я не знаю, кажется, это что-то вроде коррупции..."
 usb.8.t: "Джо Байден Вознёсся"
 usb.8.desc: ""
 usb.8.a: "Американский Калигула"
 usb.9.t: "Покушение на Джо Байдена!"
 usb.9.desc: ""
 usb.9.a: ""
 usb.10.t: "Свободы Уменьшаются"
 usb.10.desc: ""
 usb.10.a: "Америка теряет свою свободу..."
 usb.11.t: "Антифедеральное восстание"
 usb.11.desc: "Сразу после ухода президента Байдена из Конгресса военные пытаются захватить власть и все такое прочее."
 usb.11.a: "Подавить их, сейчас же!"
 usb.12.t: "Корпоративный Переворот"
 usb.12.desc: "В рамках внутренней работы политической машины Союза не было секретом, что в ходе войны ряд весьма известных компаний и конгломератов приобрели, как представляется, чрезвычайно большое влияние в правительстве. Президент Байден также хорошо знал об этом - и именно это вызвало у него подозрения, когда он получил приглашение на встречу относительно будущей политики от различных фигур, которых можно было бы счесть "влиятельными".\n\n В принципе, он бы не задумался об этом дважды. Встречи были обычным явлением в его положении. Однако, когда ему позвонили, он почувствовал, что что-то изменилось - он почти почувствовал разницу в их тоне, как будто приглашение на встречу вообще не предназначалось для обсуждения "будущей политики". В последнее время такая подозрительная атмосфера стала гораздо более распространенной. Возможно, с возрастом он стал мудрее - или, наоборот, стал более параноидальным, - но он не мог избавиться от ощущения, что принятие приглашения на эту встречу приведет к чему-то беспрецедентному.\n\n Часы в овальном кабинете тикали вперед, секунды проходили мимо. Время напомнило ему, что в настоящее время проходит сессия конгресса, посвященная теме, о которой он с тех пор забыл. Отсюда должно было быть принято решение - решение, которое, несомненно, определит будущее Союза, независимо от того, хочет ли президент, чтобы это было правдой или нет.""
 usb.12.a: ""Пошлите моих помощников на встречу. Я хотел бы переговорить с Конгрессом.""
 usb.12.b: ""Я буду там.""
 usb.13.t: "Здоровье Джо Байдена ухудшается"
 usb.13.desc: "В связи с продолжающимся конфликтом здоровье президента Джо Байдена продолжало ухудшаться в течение последних нескольких недель. Регулярно главнокомандующий испытывал значительные боли в груди и мышцах по всему телу, его суставы стали довольно жесткими из-за высокого уровня дискомфорта. В нескольких случаях, когда он перенапрягался, он отмечал значительные боли в груди, чаще обнаруживал, что переворачивается и, как правило, не на том уровне, на котором он был, когда его срок только начался.\n\nЕстественно, что известие о болях в груди, исходящих от человека такого возраста, как у нашего президента, вызвало некоторую тревогу в его кабинете и медицинском персонале. Обследование показало, что на данный момент в этих изменениях нет ничего такого, о чем стоило бы беспокоиться - что это в первую очередь стресс и старость, а не какое-либо основное заболевание. Однако в дополнение к его предыдущим симптомам это не вызвало у президента недостатка в дискомфорте."
 usb.13.a: "Это Настораживает."
 usb.14.t: "Здоровье Джо Байдена ухудшается"
 usb.14.desc: "В последнее время сотрудникам президента и кабинету министров стало совершенно очевидно, что его здоровье ухудшилось. В последние дни президент заболел, проявляя признаки лихорадочных симптомов и повышенные трудности с повседневными задачами, вплоть до того, что ему несколько раз требовалась помощь. Его бледный цвет лица и общая физическая слабость сопровождались рвотой, дезориентацией и отсутствием желания что-либо есть.\n\nТаким образом, в настоящее время рядом с президентом Байденом находится ряд медицинских работников, чтобы обеспечить его дальнейшее лечение, поскольку он выполняет свои обязанности, несмотря на возросшие трудности с этим. В то время как президент утверждает, что это не что иное, как сезонный грипп, поражающий его, немногие в его штабе считают, что это единственный фактор."
 usb.14.a: "Сейчас нам нужно очень внимательно следить за ним."
 usb.15.t: "Здоровье Джо Байдена ухудшается"
 usb.15.desc: "Для многих из ближайшего окружения Байдена очевидно, что с состоянием его здоровья явно что-то не так. Огромное давление гражданской войны уже довольно давно истощает физические и умственные способности главнокомандующего. Хотя когда-то президент мог более или менее справляться с дискомфортом, теперь он оказался прикован к постели гораздо больше, чем обычно. Медицинский персонал помогает ему двигаться, чтобы он каким-то образом не упал и не получил перелом; его постоянно подключают к капельнице, чтобы поддерживать гидратацию. Несмотря на все это, президент по-прежнему непреклонен в том, что он продолжает присутствовать на различных встречах и обсуждениях - даже несмотря на то, что значительная часть его обязанностей в основном выполнялась его сотрудниками и вице-президентом Харрисом вместо него.\n\n Несмотря на то, что президент все еще остается несколько активным в принятии решений, когнитивные способности - то, что было под вопросом еще до гражданской войны, хотя и основывалось в основном на нападках со стороны оппозиции, - очевидно, также сильно пошатнулись. Ряд случаев, когда Байден забывал вещи, ранее хорошо известные (будь то имена, лица, направления и так далее), А также путаница в отношении прошлых дискуссий и встреч, были очень заметны окружающими. Слухи в Капитолии и Белом доме продолжают распространяться, и общая атмосфера вызывает чувство страха за 46-го президента."
 usb.15.a: "У него осталось не так уж много времени, не так ли?"
 usb.16.t: "Комната Закрылась"
 usb.16.desc: ""Именно в рамках этих ценностей мы находимся в хрупком равновесии власти - как исполнительной, так и государственной," - говорил президент с неловкой сосредоточенностью, словно окидывая Палату представителей одним лишь взглядом. Атмосфера в комнате изменилась: то, что раньше было благоговением и замешательством по отношению к скучному и часто игнорируемому президенту, постепенно превратилось в осознание того, насколько обширны его знания.\n\n\"Поскольку наша нация переживает, возможно, самый мрачный период за последние двести лет,\" продолжил он,\"крайне важно, чтобы мы помнили о причинах, по которым ведется этот достойный сожаления конфликт. Нет ничего важнее", - он сделал короткую паузу, когда двери в зал с силой распахнулись, и несколько заметных фигур - конгрессмены, лидеры бизнеса, высокопоставленные чиновники - остановились как вкопанные при виде главнокомандующего на верхней трибуне. Когда Президент сделал паузу и посмотрел на вход, это заставило нескольких ближайших представителей обернуться и с поднятыми бровями посмотреть на мужчин, которые только что ворвались внутрь. \n\n\"...Чем сохранение нашей демократии от любых сил, внешних и внутренних", - закончил он, глядя прямо на известных людей. Они неловко поправляли свою одежду, пытаясь небрежно найти свои места, как будто заранее намеревались принять участие в сеансе. Те, кто не принадлежал к этому кругу, неловко кивнули и вышли из зала, без сомнения, злясь на то, что их, казалось бы, простая цель была так неловко и легко сорвана. Даже несколько человек, уже присутствовавших на заседании, неловко заерзали на своих местах, более или менее осознавая, что чуть не произошло. Президент коротко ухмыльнулся уголком рта и продолжил произносить свою речь, не заботясь о том, что произойдет, когда он покинет зал."
 usb.16.a: "Мощная речь, господин Президент."
 usb.16.b: "Честолюбие можно купить..."
 usb.17.t: "Отставка Байдена"
 usb.17.desc: "На сегодняшний день 46-й президент Соединенных Штатов Джозеф Робинетт Байден подал в отставку со своего поста по ряду заявленных причин и факторов. Случаи ухудшения его личного здоровья, растущая оппозиция в Палате представителей и недоверие к Главнокомандующему привели к тому, что президент в конечном итоге ушел от власти, как сообщается, по собственному желанию.\n\nЭто внезапное решение вызвало недовольство некоторых членов Конгресса, некоторые из которых осудили действия президента, заявив, что они нанесли ущерб национальному единству в то время, когда страна больше всего нуждалась в лидере. Другие приветствуют отставку президента, уважая вывод президента о том, что он больше не годится для руководства нацией, а не для того, чтобы, возможно, привести ее к краху и поражению в это трудное время.Несмотря на давнюю традицию вступления в должность вице-президента, короткая чрезвычайная сессия в Палате представителей привела к беспрецедентному событию, в ходе которого многие члены конгресса предложили бывшего мэра Нью-Йорка Майкла Блумберга, который сохранял свое влияние на протяжении всей войны - на пост президента, сославшись на его прошлый политический опыт и его согласованное поведение со многими государственными аппаратами Союза. В то время как многие возражали против этого шага, вице-президент Камала Харрис одобрила внезапное восхождение Блумберга на самый высокий пост в стране и, предположительно, останется на своем посту."
 usb.17.a: "\"Джентльмены, все оплачено и учтено.\""
 usb.18.t: "Корпоративный Заговор Разрастается"
 usb.18.desc: "Поскольку то, что, несомненно, было самой серьезной политической катастрофой 21-го века, продолжало разворачиваться по всей Америке, махинации некогда могущественной политической машины, само собой разумеется, значительно сместили ответственность. Как видно из последних месяцев, влияние корпораций внутри Союза, несмотря на все усилия начальника штаба держать их под контролем, продолжало только расти и расширяться перед лицом войны.\n\nНи для кого не было секретом, что война вызвала более высокие амбиции у тех, кто занимал высокое положение в государственном аппарате. Предыдущие попытки предпринять более прямые политические маневры против исполнительной власти были тонко пресечены благодаря необычайно быстрому мышлению президента. Несмотря на недавние успехи в обуздании влияния внутренних элементов, похоже, что их недавняя стагнация не отпугнула потенциальных заговорщиков так сильно, как мы изначально надеялись. Ряд членов конгресса и влиятельных бизнесменов стали значительно более подозрительными в своих действиях после периода кажущейся скрытности; В последние месяцы наблюдались заметные собрания, любопытные встречи и телефонные звонки, а также низкопробные попытки продвинуть корпоративные усилия на политической арене.\n\nЭто внезапное увеличение странной активности, конечно, не осталось незамеченным президентом. Похоже, что после своих предыдущих недостатков предполагаемые заговорщики - если они все еще активно стремятся узурпировать власть президента - готовились уже довольно давно. Таким образом, президент сталкивается с решением, которое он надеялся не принимать снова во время своего пребывания на этом посту. Он мог бы поручить своему руководству разведки провести расследование в отношении этих лиц, представляющих интерес, сбив их со следа, как только они поймут, что главнокомандующий снова держит их на прицеле; или он мог бы воздержаться от дальнейшего внутреннего наблюдения. В конце концов, насколько он знал, они не замышляли ничего коварного - но действительно ли это стоило риска, если они уже пытались один раз?"
 usb.18.a: "\"Если они попробовали это один раз, они попробуют это снова.\""
 usb.18.b: "\"Не нужно делать из мухи слона.\""
 usb.19.t: "Принятие Правление Корпораций"
 usb.19.desc: "Блумберг поднялся на трибуну Конгресса в окружении своих сотрудников, а также нескольких политиков, следовавших за ним по пятам. Все присутствующие в этом зале знали, что это будет одно из самых важных заседаний Конгресса в новейшей американской истории; главным итогом промежуточных выборов станет решающее голосование по выбору нового лидера большинства. Неэффективное управление экономикой, общественная нестабильность и разрозненное руководство оказались губительными для либеральной фракции. Возглавляемые Камалой Харрис, они были самой влиятельной силой во внутренней политике нового Союза, и это стало кульминацией их падения. Председательствующий чиновник объявил, что голосование начнется без долгих раздумий со стороны Камалы, которая нервничала под пристальным наблюдением своих сотрудников.\n\n"Бизнес-заговор". Именно так назвали бы этот момент разочарованные либералы и прогрессисты. Последний голос был подан сенатором Майклом Беннетом в пользу объединения инноваторов. В результате голосования явка составила 61 голос из 39, а поспешно сформированная прогрессивно-либеральная фракция не смогла противостоять объединенным усилиям консерваторов и новаторов по избранию Эла Гора лидером большинства. Гор поднялся по ступенькам подиума, после того как председательствующий чиновник передал ему слово.\n\n"Мои соотечественники-американцы, я здесь для того, чтобы с величайшей благодарностью высказаться по поводу этой резолюции. Американская демократия подвергается нападкам на всех фронтах, как внутренних, так и внешних. Новая Америка нуждается в действиях больше, чем в чем-либо другом, и, согласно конституционной присяге, я клянусь, что этим человеком буду я"."
 usb.19.a: "Новое Начало"
 usb.20.t: "Послевоенная подготовка к выборам"
 usb.20.desc: "Демократы ВПЕРЁД!!!"
 usb.20.a: "И Пусть Начнётся Игра"
 usb.21.t: "Америка Воссоединилась"
 usb.21.desc: "Для президента Байдена наступил вечер. Эпоха освобождения стояла на пороге того, чтобы наконец положить конец этой троице горя, с которым он столкнулся. Нет, с чем столкнулась Америка. Он отстаивал себя не на основе собственного присутствия как личности, а на основе любви к людям, к американскому народу. Конечно, многочисленные удары поразили самую сердцевину человека, связанного борьбой, но он знал: как только тебя вырубают, ты тут же встаешь снова. Он медленно поднялся, чтобы увидеть то, к чему стремился все время своего президентства: он шел к каждому эшелону балкона Трумэна и смотрел, как солнце освещает сердца американцев, возвращающихся к работе или просто наслаждающихся моментом. Посреди всего этого он достал «Улисса» Джеймса Джойса, вдохновившего его и ставшего его личным экземпляром, который помог ему пройти через ад в первой половине срока, и прочитал: "Время не вернешь. Как воду в руке держать.", давая понять, что, хотя пути назад уже не будет, он позаботится о том, чтобы Америка снова стала нацией."
 usb.21.a: "Душа Нации Была Спасена"
 usb.22.t: "Повстанцы Отказываются Отступать!"
 usb.22.desc: "Военное правительство Трампа в Денвере направило нам просьбу мирно передать ему и его сторонникам власть в обмен на то, что они сложат оружие и прекратят свое восстание, и если мы откажемся, начнутся военные действия. Их просьба дает нам только два варианта, и мы не могли согласиться, поскольку мы позволили бы им иметь полную власть над нами, поэтому мы отказались. С тех пор, как они получили наш ответ, боевые действия начались по всей нашей линии, но пока наши военные справляются хорошо благодаря нашему вышестоящему командованию и опоре повстанцев на ополченцев."
 usb.22.a: "Мы Должны Бороться За Демократию!"
 usb.23.t: "Внушительная Победа Блумберга"
 usb.23.desc: "Когда холодный утренний бриз наполнил воздух Коламбия-Хайтс, округ Колумбия, ни одна живая душа в его густонаселенном городском районе, независимо от того, насколько они были вовлечены в политику, не могла предсказать, что произойдет. Колонна армейских грузовиков и MRAP проезжала по 14-й улице без предварительного предупреждения жителей, подобно тем, что показывали по телевидению на передовой и в социальных сетях. Жителей не предупредили заранее, и в то конкретное утро всего в нескольких милях к югу от Хайтс проходило невероятно важное заседание Сената. Большинство предполагало, что они были отправлены из-за внутренней угрозы или для охраны собрания, хотя раньше такого никогда не случалось. Настоящий удар был нанесен, когда десятки национальных гвардейцев вышли из своих домов и начали закрывать магазины и вводить комендантский час с автоматами AR-15 в руках, в результате чего город был практически заблокирован. За этим последовало полное отключение электроэнергии, вызвавшее у жителей округа Колумбия только панику.\n\nРяды грузовиков заполнили улицы, окружающие здание Капитолия, а полицейским, защищавшим Капитолий, был отдан немедленный приказ сдаться. Капитолий был оцеплен со всех сторон, и его штурмовали гвардейцы, солдаты и оперативники спецназа, выступавшие в качестве сопровождения группы старших офицеров, стоящих плечом к плечу и увешанных медалями. Были прочесаны нижние этажи Капитолия, и поступили сообщения о том, что Белый дом также был окружен. Группа солдат и офицеров ворвалась в зал заседаний Сената, резко прервав заседание, размахивая несколькими винтовками.\n\n"Что здесь происходит?!"\n"Что это значит?!"\n\nКрики многих сенаторов не помешали солдатам выполнить то, что они считали своим конституционным долгом, а старший офицер зачитал какой-то документ.\n\n"Мы выполняем исполнительные обязанности. Президент объявил о добровольной капитуляции в соответствии с положениями военного времени. Мы здесь для того, чтобы обеспечить создание временной администрации для наблюдения за формированием нового правительства. Сенатор Майкл Блумберг будет приведен к присяге в качестве президента Соединенных Штатов Америки, поскольку он так доблестно боролся с угрозами нашей демократии как внешними, так и внутренними. Это заседание Сената объявляется закрытым", - объявил офицер с трибуны закрытому залу Сената, после чего председательствующий чиновник был уволен."
 usb.23.a: "Мне нравится Майк!"
 usb.24.t: "Кадровые Перестановки в Конгрессе"
 usb.24.d: "После недавней избирательной реформы были назначены внеочередные выборы, чтобы оценить истинную волю народа в рамках новой системы. Устаревшие партийные системы, такие как Джерримендеринг и голосование системы относительного большинства, больше не должны скрывать истинную волю американского народа и позволять миллиардерам с Уолл-стрит контролировать наши выборы. С внедрением новых избирательных систем - наиболее примечательно ранжированное голосование, выборы, финансируемые государством, роспуск 2-партийной системы с помощью различных правовых механизмов и нескольких раундов голосования, Демократические Социалисты Америки вышли явным победителем и сформировали коалиционное правительство большинства наряду с Зелеными и Социалистической альтернативой, с демократами, либертарианцами и недавно сформировал Патриотическую народную партию в оппозиции.\n\nК сожалению, из-за нестабильной ситуации в стране, большая часть страны не смогла проголосовать из-за районов, удерживаемых партизанами и повстанцами, которые стремятся уничтожить нашу демократию. Кроме того, многие штаты, находящиеся под военным управлением, не были официально вновь введены в Союз после их отделения, из-за чего большая часть среднего Запада была непредставлена. Тем не менее, успех демократии на территориях, которые были лояльны Американскому Союзу, стал великим свидетельством нашей новой системы и доказательством того, что наша демократия выйдет из этой гражданской войны более сильной, чем это было раньше."
 usb.24.a: "Поздравляем ДСА!"
 usb.25.t: "Операция в Южной Джорджии"
 usb.25.d: ""
 usb.25.a: "Мы должны вернуть его!"
 usb.26.t: "Крупный Бизнес Бежит из Новой Англии"
 usb.26.d: "Бьющееся сердце международной экономики внезапно остановилось, поскольку спорадические бои поглотили Новую Англию, что привело к тому, что многие бизнесы бежали на юг в Союз Америки. В Нью-Йорке, где царит анархия, полиция Нью-Йорка, военные гарнизоны и милиция сражаются на улицах, а в Бостоне Американский Железный Фронт Радикалов угрожал бизнесу своими радикальными планами. В обоих случаях опасные условия на северо-востоке привели к тому, что многие фирмы бежали в Округ Колумбия, Ричмонд и Филадельфию, чтобы создать свою новую базу операций, так как ситуация в Средне-Атлантическом регионе гораздо более стабильна. Этот приток капитала в Союз Америки принес с собой рабочие места, инвестиционные возможности и легитимность, в которых правительство отчаянно нуждается прямо сейчас."
 usb.26.a: "Добро пожаловать в Вашингтон О.К.!"
 usb.27.t: "Начало Восстания в Повстанческой Местности"
 usb.27.d: "Тревожные сообщения указывают на появление быстро растущей повстанческой ячейки в Виргинских Аппалачах, которая, как сообщается, была сформирована местными диссидентами, преданными "конституционалистам" в Денвере, при поддержке местных организаций ополчения, таких как "Хранители клятвы", "Гордые мальчики" и "Три процента". Эти организации были вооружены и обучены подразделениями национальной гвардии Западной Вирджинии, которые были преобразованы в федерацию после нашего прибытия в Округ Колумбия, и сейчас эти подразделения закрепились в Аппалачах, раздавая оружие местным жителям, настроенным против нас. На брифингах разведки также указывалось на строительство импровизированных укреплений, дотов, бункеров и даже импровизированных боевых машин с использованием любых подручных средств, которые они могли найти. Эти предатели также совершают набеги на местные оружейные склады и активно их грабят, а некоторые даже предполагают, что у них есть ОБТ. Эти сообщения появились после того, как военная колонна попала в засаду и 3 взвода были захвачены этими преступниками, проявив милосердие и продемонстрировав миру нашу железную решимость.\n\nМы не должны торопиться и должны начать готовиться к немедленным военным действиям в регионе, чтобы обезопасить нашу демократию от внутренних угроз и не допустить выхода этой ситуации из-под контроля. Для борьбы с этим уже задействовано несколько бригад по борьбе с повстанцами, и мы проводим политику окружения, используя превосходящую огневую мощь, чтобы затянуть петлю на шее повстанцев, и ждем, пока у них закончится снаряжение, деморализуя их воздушными кампаниями, вызывающими шок и трепет. Несмотря на то, что эти концепции кажутся многообещающими, это, несомненно, будет стоить нам ценного времени и усилий, отвлекая наше внимание от передовой. Мы также должны начать налаживать связи с коллаборационистами и теми, кто лоялен законному правительству, в первую очередь в городских районах, что позволит нам проникнуть в ряды повстанцев и уничтожить их изнутри. Если мы хотим одержать победу над теми, кто пытается подорвать демократию и привести Америку к темным временам, мы должны не проявлять милосердия к этим преступникам и продемонстрировать миру нашу железную решимость."
 usb.27.a: "Чертовы Деревенщины"
 usb.28.t: "Подавленное Восстание в Аппалачи!"
 usb.28.d: "Недавние сообщения сообщают о громком успехе на востоке, когда наши войска подавляют остатки повстанцев в Аппалачах, ориентированных на "правительство" Трампа в Денвере. Это восстание было для нас настоящей занозой в заднице, оно нанесло удар по линиям снабжения и железнодорожным сетям, ведущим к линии фронта на Среднем Западе. Они также отвлекли серьезные усилия и ресурсы от линии фронта на Западе, позволив предателям-"конституционалистам" остановить наше наступление. В отчетах также подробно рассказывается об уничтожении более 50 террористических ячеек в Западной Вирджинии в ходе недавних наступательных операций специализированных бригад по борьбе с повстанцами, что на некоторое время парализовало любые действия потенциального противника в регионе и обеспечило защиту местных интересов. Это также огромная пропагандистская победа, поскольку показано, что наши войска являются самыми совершенными и специально подготовленными в мире для подобных операций, и что независимо от того, что делает эгоист в Денвере, наша демократия останется непоколебимой.\n\nЧетко проведенные операции, такие как убийство лидеров повстанцев, скрывающихся в регионе, а также окружение и уничтожение бригад повстанцев, использующих превосходящую огневую мощь, сломили их сопротивление. Подавление этого мятежа позволяет значительно перераспределить наши военные ресурсы, поскольку бригады по борьбе с повстанцами, ранее задействованные в Аппалачах, высвобождаются для усиления линии фронта против более широкой угрозы на западе. Мы должны начать усилия по восстановлению местной инфраструктуры, чтобы завоевать сердца и умы местных жителей и предотвратить возрождение любых крамольных идеологий. В регионе также должно сохраняться сильное присутствие, и поэтому действие указа о введении военного положения было продлено, что дает нам больше времени для зачистки укрытий, суда над предателями и обеспечения прочной стабильности. Сапоги демократии будут топтать этих змей, где бы они ни появились, не давая им возможности отравлять людей своим популистским ядом."
 usb.28.a: "Союз Навсегда!"
 usb.29.t: "Успешные Операции по Борьбе с Повстанцами"
 usb.29.d: "Наши недавние операции по борьбе с повстанцами против ячеек конституционалистов, стремящихся разрушить нашу демократию, оказались на редкость успешными. Недавние сообщения указывают на то, что в разнообразные ячейки повстанцев, разбросанные по нашей территории, были эффективно внедрены, окружены и ликвидированы с помощью точно проведенных хирургических операций, направленных против ключевых лидеров повстанцев, а также лишение оставшихся ячеек важнейшего оборудования в этом районе. Эта победа позволила нам вновь объединить несколько бригад, которые ранее участвовали в боях с этими подрывными элементами, перенаправив наше внимание на линии фронта, где сражается основная часть банды предателей Трампа. Трамп и банда предателей в Денвере объявили о своей поддержке этого мятежа, который начался накануне гражданской войны, и с тех пор вооружают их через контрабандные сети. Это также большая пропагандистская победа, и мы предали гласности наши усилия и готовность Трампа убивать как можно больше американцев по всей стране.\n\nОднако после этой грандиозной победы нам по-прежнему крайне важно сохранить свое присутствие в Аппалачах и штатах, кишащих повстанцами. Важно сохранять бдительность, поскольку мы готовимся к возможным контратакам и засадам со стороны остатков разгромленного повстанческого движения. Как говорится, со змеей никогда нельзя быть слишком осторожным, даже после того, как тебе удалось сбить ее с ног. Хотя эти кампании, несомненно, укрепили моральный дух наших войск на местах и в тылу, мы должны продолжать кампании по строгому искоренению этих партизанских баз, где бы и когда бы они ни появлялись; лидеры повстанцев, которые ускользнули из наших рук, наверняка перейдут в контрнаступление и безрассудно атакуют некоторых из самых элитных подразделений. переброска частей наших сил по борьбе с повстанцами в горные, лесистые и укрепленные районы не принесет нам никакой пользы."
 usb.29.a: "Хорошая работа."
 usb.30.t: "Операция по Борьбе с Повстанцами Обернулось Против Нас"
 usb.30.d: "Из сельской местности поступают тревожные сообщения о том, что недавние операции по борьбе с повстанцами привели к ужасным последствиям. Несмотря на наши усилия, сообщения указывают на то, что сеть повстанческих ячеек на нашей территории продолжает действовать, и из сельской местности поступают ужасные сообщения о том, что недавние операции по борьбе с повстанцами привели к ужасным последствиям. Несмотря на наши усилия, поступающие сообщения указывают на то, что сеть повстанческих ячеек на нашей территории оказалась устойчивой, и крупномасштабное контрнаступление повстанцев привело к потере части территории, а их присутствие в этом районе становилось все более сильным. Провал этих операций препятствует нашим усилиям на передовой против банды предателей Трампа, поскольку повстанцы продолжают оказывать сопротивление, что приводит к ненужной гибели большего числа американских солдат. Сейчас крайне важно сохранить более широкое присутствие в районах, кишащих повстанцами, организовать вывод войск из районов, которые считаются неподходящими для удержания, чтобы свести к минимуму потери, и подготовить еще одно контрнаступление для уничтожения сопротивляющихся предателей.\n\nЭти неудачи бросили тень на моральный дух и вызвали обеспокоенность у нашего высшего командования по поводу качества сотрудников по борьбе с повстанцами. Нам следует начать переоценку методов борьбы с повстанцами, усилить подготовку и начать переназначать офицеров и командиров подразделений, которые считаются ответственными за неудачу. Тем временем, нашей текущей прерогативой должно быть ограничение контроля повстанцев в этих регионах и начало укрепления местных поселений, чтобы попытаться окружить их, начав энергичные кампании, направленные на то, чтобы лишить их ресурсов и поддержки среди местного населения. Возвращаясь к чертежной доске, мы должны заверить наших людей на местах, что, возможно, мы проиграли битву, но эта война далека от завершения."
 usb.30.a: "Война продолжается."
 usb.31.t: "§gИнновационисты§! предлагают расходы"
 usb.31.d: ""
 usb.31.a: "Нам всем придется чем-то пожертвовать. (Принять Законопроект)"
 usb.31.b: "Наш нынешний уровень расходов просто прекрасен. (Наложить Вето)"
 usb.32.t: "Организация Антифедералистов"
 usb.32.d: "Bruh"
 usb.32.a: "Мы должны остановить Их"
 usb.33.t: "Операция "Пересмешник" начинается"
 usb.33.desc: "С момента создания Союза Америки мы постоянно сталкиваемся с проблемами, которые создают повстанцы, считающие себя лояльными режиму, находящемуся в Денвере. Если позволить этим враждебным элементам продолжать действовать бесконтрольно, возможные последствия могут вылиться в опасный эффект домино, который привлечет к их делу еще больше сторонников - сценарий, угрожающий стабильности нашего правительства. Поэтому, чтобы защитить нашу страну и ее демократические принципы, мы немедленно начинаем операцию «Пересмешник». \n\nОперация «Пересмешник» - это совместная работа, в которой задействованы ресурсы и опыт ФБР, а также других партнеров по контракту. Ее главная цель - систематическое уничтожение и нейтрализация различных повстанческих групп, действующих на территории Вашингтона. Хотя большая часть Вашингтона находится под нашим контролем, присутствие этих укоренившихся ячеек Трампа представляет собой значительную постоянную угрозу для целостности нашего управления. Их точные намерения и стратегии остаются неизвестными, однако их общие усилия по подрыву нашей национальной безопасности требуют решительных действий. \n\nЭти группы представляют собой не только угрозу нашей непосредственной безопасности, но и символизируют более масштабные усилия предыдущей администрации и ее союзников по дестабилизации нашей страны. Они являются пешками в более широкой схеме, организованной Трампом и его сторонниками, которые намерены подорвать Союз Америки и его руководство. Будьте уверены, те, кто участвует в заговоре против интересов нашей нации, будут выявлены, задержаны и преданы правосудию быстро и решительно. Операция «Пересмешник» олицетворяет нашу непоколебимую приверженность поддержанию верховенства закона и защите святынь наших демократических институтов от внутренних угроз."
 usb.33.a: "Мы должны обезопасить Вашингтон!"
 usb.34.t: "Операция "Пересмешник" завершается!"
 usb.34.desc: "Сегодня мы получили отличные новости об операции «Пересмешник», ознаменовавшие ее успешное завершение. Эта тщательно спланированная операция была направлена на нейтрализацию влияния трампистских элементов в Вашингтоне и обеспечение того, чтобы все оставшиеся ячейки трампистов были либо выявлены и ликвидированы, либо распущены по собственному желанию. \n\nБлагодаря сочетанию стратегических мер и скоординированных усилий мы успешно защитили целостность наших правительственных институтов от потенциальных угроз, исходящих от этих элементов. Преданность и бдительность сотрудников ФБР, а также нанятых нами подрядчиков сыграли важную роль в обеспечении безопасности нашего правительства и поддержании стабильности, необходимой для управления страной. \n\nЭто достижение подчеркивает нашу непоколебимую приверженность защите демократических принципов и сохранению бесперебойного функционирования национальной системы. Эффективно устраняя внутренние нарушения, мы укрепляем нашу решимость воссоединить Америку и вернуть ее к тому состоянию, в котором она находилась до своего распада."
 usb.34.a: "Сначала Вашингтон, а потом вся Америка!"
 usb.35.t: "Операция "Мираж" начинается"
 usb.35.desc: "По мере того как война в Америке затягивается, в командовании вашингтонского правительства, в частности у начальника Объединенного штаба, усиливается беспокойство по поводу быстрого продвижения федеральных войск. Освободительные действия [USB.GetNameDef] охватили почти весь Миссури вплоть до реки Миссисипи, включая захват Сент-Луиса. Однако такое быстрое продвижение привело к перегрузке линий снабжения, и логисты предупреждают о надвигающемся дефиците топлива. На севере суровая зима остановила продвижение федералов, вызвав значительные потери, несмотря на поддержку с воздуха и более укрепленную линию фронта. Партизанское сопротивление также ухудшилось, почти каждый гражданский вооружен и ведет ожесточенную борьбу с Союзом.\n\nВ ответ на это, после подробных брифингов и одобрения главнокомандующего [USB.GetLeader], [USB.GetNameDef] дал добро на операцию «Мираж»: полномасштабное наступление на силы Трампа, запланированное в течение многих лет. Операция предусматривает создание бронированного копьеметалки на ключевых точках Миссисипи с целью преодоления сопротивления противника. Объединившись с местными коллаборационистами, верными законному правительству, [USB.GetNameDef] надеется прорвать оборону Трампа и освободить Средний Запад, хотя и не охватывает Скалистые горы. Хотя этот амбициозный план сопряжен с риском, это лучший шанс [USB.GetLeader] вернуть себе страну. Однако неудача уничтожит их наступательный потенциал, поэтому осторожность имеет первостепенное значение."
 usb.35.a: "На Денвер!"
 usb.36.t: "Денвер взят"
 usb.36.desc: "Когда стихли громовые раскаты артиллерии, черный дым над горизонтом Денвера постепенно рассеялся. На вершине Капитолия штата Колорадо виднелся победный флаг - голубое знамя Союза Америки. Разорванный и растерзанный обстрелами, он все еще держался вызывающе. Внутри города солдаты Союза торжественно палили в воздух из пушек, а оставшиеся силы Американского конституционного правительства были собраны, им приказали сдать оружие и ждать дальнейших указаний.\n\nНикто не ожидал, что битва за Денвер перерастет в такой жестокий городской конфликт. Изначально войска Союза надеялись освободить город мирным путем с помощью переговоров. Однако не успели представители отойти от переговоров, как уже начался обстрел. Обе стороны обвинили друг друга в первом выстреле - загадка, которая до сих пор остается неразрешенной. Особенно ожесточенными были бои за Денверский международный аэропорт, Юнион Стейшн и такие СМИ, как Fox News, в результате которых погибло бесчисленное количество солдат и мирных жителей, а многие исторические здания были разрушены.\n\nНесмотря на разрушения, взятие Денвера знаменует собой поворотный момент в Гражданской войне в Америке. Президент Союза готовится произнести победную речь, а лидер американского конституционного правительства Дональд Трамп пропал без вести. Многие считают, что он погиб на заваленных обломками улицах Денвера."
 usb.36.a: "Одна нация, единая нация"
 usb.37.t: "Стол Переговоров: Предательское Имущество"
 usb.37.desc: "Начались переговоры между различными корпорациями, работающими на нашей территории, на данный момент были заключены небольшие сделки, и мы устранили некоторые незначительные препятствия. Однако совсем недавно мы попросили корпорации о мгновенном преобразовании заводов, основная проблема заключается в том, что корпорации попросили взамен, чтобы все корпорации, которые в настоящее время поддерживают Трампа, были переданы им после окончания войны. Это вызвало разногласия с нашей стороны, поскольку некоторые опасаются, что это передаст слишком много заводов корпорациям, и хотят отклонить их предложение, в то время как другие хотят принять сделку. В конечном счете все сводится к тому, чтобы президент принял или отклонил это предложение."
 usb.37.a: "Принять"
 usb.37.b: "Отказать"
 usb.38.t: "Стол переговоров: Ставка налога на прибыль"
 usb.38.desc: "Мы обратились к профессиональным консультантам и менеджерам, чтобы они могли управлять заводами, находящимися в их собственности, с максимальной эффективностью. Корпорации, в свою очередь, попросили снизить налоги. Несмотря на то, что это менее спорное предложение, чем предыдущее, многие в Прогрессивной фракции и некоторые в Либеральной фракции выступили против этой сделки, поскольку они по-прежнему выступают против действующей ставки корпоративного налога. Теперь все снова зависит от президента и его решения принять или отклонить сделку."
 usb.38.a: "Принять"
 usb.38.b: "Отказать"
 usb.39.t: "Стол переговоров: Политическое Влияние"
 usb.39.desc: "Финальный раунд переговоров начался, поскольку мы преодолели все предыдущие препятствия. Наше последнее предложение корпорациям - гарантированная публичная поддержка всех текущих и будущих решений. Корпорации попросили обеспечить им большее представительство и влияние в правительстве после завершения переговоров."
 usb.39.a: "Принять"
 usb.39.b: "Отказать"
 usb.40.t: "Соглашение об Объединении"
 usb.40.desc: "Все предыдущие и текущие переговоры закончились в пользу страны. Несмотря на то, что во время всех раундов переговоров мы сталкивались со многими препятствиями, будь то большими или маленькими, мы, наконец, можем вздохнуть с облегчением, поскольку обе стороны завершили переговоры удовлетворенными, пообещав, что все согласованные реформы будут реализованы как можно скорее.\n\nЭто должно значительно помочь стране, поскольку мы уже видели некоторые последствия нашей сделки, будь то улучшение местной промышленности, публичные демонстрации поддержки со стороны представителей корпораций или увеличение производства военной техники"
 usb.40.a: "Мы поступили с хорошими людьми, мы поступили хорошо"
 usb.41.t: "Переговоры Срываются"
 usb.41.desc: "Наши недавние переговоры с корпорациями трагически завершились. Предпринятые в последнюю минуту усилия по предотвращению сбоя не увенчались успехом, и все текущие коммуникации были прерваны. Это катастрофический провал, поскольку многие обвиняют нас в провале переговоров. Эти события также не получили должного отклика в нашей партии, поскольку многие люди уже начинают с подозрением относиться к нынешней власти корпораций. Это снижает способность нашего правительства решать внутренние проблемы и ведет к гражданской войне, в то время как мы пытаемся навести порядок в том беспорядке, который сами же и заварили."
 usb.41.a: "Может ли быть еще хуже?"
 usb.42.t: "Выборы США 2024 года"
 usb.42.desc: "День выборов уже не за горами, и выборы президента и конгрессменов США 2024 года станут самыми разделенными в истории США, поскольку четыре основные фракции политического спектра будут бороться за контроль над Союзом.\n\nНа стороне демократов ожесточенная борьба расколола партию на три разных лагеря. Прогрессивисты, возглавляемые сенатором Берни Сандерсом, выступают за масштабные реформы в области здравоохранения, образования и трудовых прав, отстаивая смелое видение новой американской социал-демократии. Либералы под руководством [USB.GetLeader] выступают за национальное единство, умеренную стабильность и постепенные реформы, чтобы поддержать корабль в неспокойные времена. Инноваторы Майкла Блумберга, бывшего мэра Нью-Йорка, обещают технократическое будущее, сосредоточившись на модернизации экономики и использовании технологических достижений для движения нации вперед.\n\nНа фоне разделенных левых - Республиканская партия, возглавляемая сенатором Миттом Ромни. Отказавшись следовать за Дональдом Трампом и отделиться от него, республиканцы сделали ребрендинг как партия неоконсерватизма и прагматичного управления в духе Рейгана, обращаясь к остаткам своей базы до Трампа в пригородах и сельских районах."
 usb.42.a: "Прогресс"
 usb.42.b: "Либерализм"
 usb.42.c: "Консерватизм"
 usb.42.d: "Инновационисты"
 usb.43.t: "Операция: "Мираж""
 usb.43.desc: "По мере того как война затягивается, в системе командования усиливается обеспокоенность, выраженная, в частности, начальником Объединенного штаба, в связи с быстрым продвижением наших войск. Усилия по освобождению за относительно короткий период успешно охватили почти всю территорию штата Миссури вплоть до реки Миссисипи, включая военный опорный пункт в Сент-Луисе. Однако такое быстрое продвижение создало серьезную нагрузку на наши линии снабжения, вынудив наших сотрудников по логистике предупредить, что мы находимся на грани дефицита топлива. На севере зима остановила наше продвижение, что привело к большим потерям для нас, даже несмотря на преимущество поддержки с воздуха и более сплоченную линию фронта. Партизанские ячейки также создают проблемы, поскольку почти каждый мирный житель, с которым мы сталкиваемся, вооружен до зубов и готов сражаться до последней капли крови, чтобы остановить нас. Сейчас, похоже, мы приблизились к критическому блокпосту, и оборонительные позиции вдоль реки Миссисипи также во многом помогли остановить недавние наступления.\n\nВот почему, после серии обстоятельных брифингов в КС и одобрения главнокомандующим Джозефом Робинеттом Байденом, мы даем зеленый свет операции "Мираж" - полномасштабной атаке на Трампа с использованием лучших из лучших в наших рядах, которая планировалась за годы до этого. точка. Планируется развертывание бронированного передового отряда вдоль ключевых горячих точек в Миссисипи для преодоления сопротивления. Объединившись с местными коллаборационистами, лояльными законному правительству, мы сможем прорвать оборону Трампа и двинуться на Денвер, освобождая Средний Запад на нашем пути, хотя этот план не распространяется на Скалистые горы. Хотя это предложение не лишено недостатков и является довольно амбициозным в том состоянии, в котором мы оказались, это наш лучший шанс вырвать Америку из тисков тирании и положить конец царству террора Трампа. Это также затрачивает значительную часть наших ресурсов, выделяемых на удержание линии фронта, поэтому неудача была бы катастрофической. Поэтому мы должны быть осторожны в его выполнении, поскольку, если мы поставим все на карту в ходе одного наступления, это, безусловно, будет означать уничтожение наших наступательных возможностей."
 usb.43.a: "На Денвер!"
 usb.44.t: "Корпорации, подозреваемые в незаконной деятельности"
 usb.44.desc: "В субботу поздно вечером на CNN было запланировано интервью между Крисом Уоллесом и Джошем Бербеном, участником недавней встречи между UoA и различными корпорациями, работающими на ее территории.\n\n"Итак, Джош, до нас дошли слухи, что тебе есть что сказать о недавней встрече с представителями корпораций, на которой ты присутствовал. Эти слухи правдивы?"\n\n"Да, Крис, это так, я должен признать, что, когда я пришел сегодня на собеседование, я не знал, что хочу сказать. Но потом я понял, что люди должны знать правду, а правда в том, что многие корпорации, присутствовавшие на встрече, если бы они были странами, предстали бы перед судом за преступления против человечности".\n\n"Вау, Джош, это очень сильное мнение, не мог бы ты немного углубиться в это утверждение, я уверен, что аудитория хочет узнать больше".\n\n- Да, Крис, я так и сделаю. Во время моего визита мне дали кое-какую необходимую информацию, чтобы я мог "договориться" с представителями корпораций. И позвольте мне просто сказать, что эти корпорации сделали со своими работниками, местными землевладельцами и малым бизнесом. Это откровенно авторитарный подход, и они должны быть немедленно наказаны"\n\n"Хорошо, Джош, ты знаешь, заставят ли тебя замолчать за разоблачение этих вещей, я имею в виду, что ты сказал, что их действия были откровенно авторитарными-"\n\n"Я не уверен, но я точно знаю, что они будут продолжать делать это до тех пор, пока против них не будут приняты меры, поэтому я обращаюсь к правительству с просьбой. Сделайте С. Этим. что-нибудь.""
 usb.44.a: "На Денвер!"
 usb.45.t: "Ностальгические Воспоминания"
 usb.45.desc: "Овальный кабинет, 15:00 по восточному времени\n\nОтчеты, поступавшие в редакцию Resolute, были, как обычно, мрачными или посредственными. Эта изнурительная борьба за восстановление "души нации" неизменно вызывала у Байдена особое чувство внутренней боли. Боль, которая не покидала его с тех пор, как он потерял Нилию и Наоми. Что должен делать человек, обладающий такой властью, находящийся на самой высокой точке мира, на сверкающем холме, когда догматичные сообщения об агонии и мрачные напоминания, содержащие информацию об активных массовых убийствах, еще больше подрывают борьбу за национальное воссоединение?\n\nБайден закрыл глаза, и маленькая слезинка, скатившаяся с его век, наполненных более чем 40 годами политического единства, обернувшегося разрушением, упала на документы, один за другим.\nОн пропустил то время, когда Америке никогда не приходилось беспокоиться о том, что тупик может перерасти в полномасштабную войну, когда американцы могут с радостью покинуть свои дома и заняться собой. Теперь все это было стерто в пыль огнем боеприпасов.\n\nОн знал, что должен найти способ успокоиться, попытаться прогрессировать.\nОн знал, что должен найти способ восстановить Америку, он должен стать лидером, в котором нуждается страна..."
 usb.45.a: "И он начинает писать..."
 usb.46.t: "Берни Сандерс умер"
 usb.46.desc: "Недавно мы узнали, что Берни Сандерс, олицетворение прогрессивного движения, скончался от сердечного приступа.\n\nПо сообщениям, Сандерс перенес инсульт у себя дома, после чего был срочно доставлен в больницу. По трагической случайности, когда врачи ненадолго покинули его палату, у него случился сердечный приступ, и, несмотря на все усилия, он скончался вскоре после этого, рядом с ним была Джейн Сандерс и большая часть его близких родственников. \nС его кончиной члены Прогрессивного движения и большая часть нашего правительства вступят в период коллективного траура. Ожидается, что по завершении этого периода Александрия Окасио-Кортез займет место лидера и главы движения, продолжая дело, которому Сандерс посвятил свою жизнь. \n\nСандерс всю жизнь занимался политикой, неустанно работая над своими идеалами.\nНезависимо от того, соглашались ли люди с его политикой или нет, он был фигурой, достойной уважения за свою непоколебимую приверженность своим убеждениям."
 usb.46.a: "Покойся с миром"
 usb.47.t: "Шепот на Ухо Нашему Калигуле"
 usb.47.d: "§R''Президентство должно быть спасено.''§! \n\nМы не можем и дальше позволять воспоминаниям о старой Демократической партии терзать нашу нацию и работать против нашего правительства и души нашей нации.\n\n§R''АМЕРИКУ НУЖНО СПАСАТЬ ОТ САМОЙ СЕБЯ''§!"
 usb.47.a: "''Мы исправим нацию... Я обещаю''"
 usb.48.t: "Калигула Теряет равновесие"
 usb.48.d: "В течение нескольких дней, недель, а может, и дольше, если верить сообщениям, наш дорогой лидер полностью отстранился от общения с людьми. Ни слова, ни шепота. Он сидел неподвижно, как статуя на своем метафорическом троне, и так и оставался. Тяжесть молчания затягивалась, и с каждым мгновением становилось все яснее. Байден близок к смерти.\n\nНаш президент - больше, чем лидер; он - краеугольный камень, скрепляющий ткань этой нации. Без него все, что мы строили, все, что мы представляем, рискует рассыпаться в прах. Его отсутствие будет означать крах нашего режима, оставив наши усилия не более чем мимолетным эхом в огромных залах истории, отвергнутым как очередная неудачная попытка утопии. Или, что еще хуже, совсем забытыми.\n\nМы не можем допустить, чтобы это произошло. Необходимо мобилизовать все ресурсы, чтобы сохранить жизнь Джозефа Байдена. Исследования должны быть ускорены до беспрецедентного уровня. Новые лекарства должны быть выведены на передний план, а за его здоровьем нужно следить с помощью постоянных обследований.\nЛишь бы все, ради чего мы работали, пропало даром."
 usb.48.a: "Решение будет найдено"
 usb.49.t: "Прекрасная Америка"
 usb.49.d: "Отряд 1324, так его звали. Сколько он себя помнил, столько и назывался.\nНе то чтобы он помнил много.\nБольшая часть того, что он помнил, была здесь, сидя в этом кресле, выполняя неизвестную работу на панели перед ним. Только недавно работа перестала поступать.\nТеперь ничего не было несколько дней, может быть, недель, но он не очень хорошо представлял себе время здесь... или где бы он ни был.\n\nПрошло много времени, но, в конце концов, что-то появилось. Это немного напугало его, сообщение выдало себя тревожным звуковым сигналом. Когда он открыл сообщение, то на мгновение понял, что оно не имеет смысла.\nКоллапс. Война. Свобода... свобода.\nЭто... слово. Оно что-то всколыхнуло в нем. В затылке что-то щелкнуло, и к нему медленно вернулись воспоминания. Кусочек за кусочком он вспоминал, как оказался здесь. Он был в своем доме, когда дверь распахнулась, и люди в доспехах с закрытыми лицами вырубили его. Следующее, что он понял, - это то, что он заперт в этом кресле, а перед ним стоит слишком знакомая панель.\n\nОглядевшись, он заметил, что замков на кресле нет, похоже, их не было уже очень давно. Тем не менее, Юнит 1324 встал с кресла и медленно пошел, его ноги сильно ослабли. Он бродил по коридорам учреждения, казалось, несколько дней, отчаянно пытаясь выбраться наружу. В конце концов он нашел выход - большую металлическую дверь, которая уже была открыта.\n\nПервые мгновения на улице, и солнце уже ослепило его. Оглядевшись по сторонам, он увидел красоту леса, который давно мечтал увидеть снова. Затем он увидел птицу, точнее, белого голубя. Она скользила по небу и вела отряд 1324 дальше.\n\nОн мало что знал. Он нервничал. Но, судя по всему, он обрел свободу.\nИ он больше не позволит ей ускользнуть от него."
 usb.49.a: "Найдите красоту в ужасе"
 usb.50.t: "Novus Ordo Seclorum"
 usb.50.d: "Это началось в 1776 году, когда мы впервые бросили вызов британским угнетателям, породив новое дерзкое видение свободы и идею Америки. С тех пор наша нация вела бесконечную борьбу за выживание, ставя на карту саму свою идентичность в приливах и отливах современной истории.\nНо недавно мы столкнулись с одним из самых мрачных кризисов нашей жизни, кровавым и непрекращающимся конфликтом, который потребовал от нас больших жертв, чем мы когда-либо могли себе представить. День и ночь мы сражались с яростной решимостью загнанной в угол лисы, повторяя упорство наших предков и все, что они сделали.\n\nМы выстояли против предателей в Денвере и отбросили их обратно в их столицу.\nМы боролись с ростом фашизма в Мичигане и Новой Англии, расчищая путь для будущего там. \nМы расправились с нацистами во Флориде и на Юге, казнив их руководство.\nМы задушили коммунизм, пустивший корни на Западном побережье, и сообщили людям, что есть другие пути.\n\nМы устроили суды над теми, кто хотел предать нас, теми, кто разрушил бы все, что мы построили. Мы очистили ряды нашего общества, решив создать систему, в которой все могли бы жить и процветать в мире. Мы создали утопию.\n\nИ все же мы не устали. Даже сейчас мы продолжаем бороться с теми, кто не понимает истинной природы нашей борьбы. Они неверно оценивают нашу миссию, не видя лучшего мира, который мы стремимся построить, будущего, основанного на единстве, а не на угнетении. Будущее, одержимое прогрессом, а не страхом. Но это битва для другого дня. Сегодня мы торжествуем.\n\nНаши враги побеждены, и солнце взошло на новом горизонте.\n\nЛучшее будущее ждет нас, свободное от оппозиции, свободное от страданий.\nИ мы готовы заявить о нем."
 usb.50.a: "Победа, месть, но теперь. Мир."
 usb.51.t: "Уходишь в Отставку?"
 usb.51.d: "После долгих обсуждений внутри партии многие заговорили о возрасте Байдена и очевидном умственном упадке, а также о том, стоит ли ему баллотироваться на президентских выборах 2024 года."
 usb.51.a: "Никогда! Еще четыре года байденизма"
 usb.51.b: "Вероятно, это мудрое решение"
 usb.51.c: "Этот человек не может продолжать претендовать на пост президента! Применяйте 25-ую Поправку!"
 usb.520.t: "Подготовка"
 usb.520.d: ""
 usb.520.a: "Великая американская традиция продолжается!"
 usb.520.b: "Великая американская традиция продолжается!"
 usb.520.c: "Одно имя в избирательном бюллетене: Байден!"
 usb.52.t: "Президентские дебаты 2024 года"
 usb.52.desc_1: "Сегодня вечером телеканалы готовятся к трансляции первых президентских дебатов 2024 года. Два сенатора и президент покинули Вашингтон и направились в Цинциннати, несомненно, проходя последние репетиции перед важными выступлениями. Рынки ставок пришли к выводу, что в этих дебатах победит любой человек, хотя некоторым кандидатам есть что терять. Кандидаты тщательно управляют ожиданиями публики, приучая ее концентрироваться на определенных вопросах и акцентируя внимание на недостатках своих оппонентов.\n\nКандидат Берни Сандерс представляет заядлую прогрессивную партию. Опираясь на наследие, уходящее корнями в прекрасные времена Эпохи реформ, Сандерс стремится убедить рабочий класс в своей безупречной преданности делу их улучшения. Кандидат Митт Ромни - консервативный оплот Америки, который противостоял антидемократическим течениям внутри своей партии, сражаясь с Трампом, в то время как другие члены его фракции оправдывались и оправдывали его. Такие действия вызывают у него доверие среди избирателей из пригородов, а более стойким консерваторам больше не к кому идти. Президент Джо Байден баллотируется на совершенно другой платформе. Говоря о горящих городах и пепельных полях сражений, о солдатах, возвращающихся в гробах к скорбящим семьям, о голодающих беженцах и их скелетированных детях, он серьезен и неразговорчив."
 usb.52.desc_2: "Сегодня вечером телеканалы готовятся к трансляции первых президентских дебатов 2024 года. Сенатор Митт Ромни и президент Джо Байден покинули Вашингтон и направились в Балтимор, несомненно, проводя последние репетиции перед важными выступлениями. Рынки ставок пришли к выводу, что в этих дебатах победит любой человек, хотя некоторым кандидатам есть что терять. Кампании кандидатов тщательно управляют ожиданиями публики, приучая ее концентрироваться на определенных вопросах и акцентируя внимание на недостатках своих оппонентов. \n\nКандидат Митт Ромни - консервативный оплот Америки, который противостоит антидемократическим течениям в своей собственной партии, сражаясь с Трампом, в то время как другие члены его фракции оправдываются и оправдывают его. Такие действия вызывают у него доверие среди избирателей из пригородов, а более стойким консерваторам больше не к кому идти. Ромни ведет свою кампанию на смеси рейгановского оптимизма и неоконсервативной ястребиности, выступая с жесткими выпадами против Трампизма и одновременно обещая снижение налогов после окончания войны. Ромни, вероятно, представит себя как сострадательного консерватора, который может надежно противостоять политическому экстремизму.\n\nПрезидент Джо Байден выступает с совершенно иной платформой. Говоря о горящих городах и пепельных полях сражений, о солдатах, возвращающихся в гробах к скорбящим семьям, о голодающих беженцах и их скелетированных детях, он серьезен и неразговорчив. Единственный оптимизм, который он излучает, - это вера в окончательную победу над внутренними врагами Америки. Его кампания носит военный характер, она взывает к солдатам на фронте, профессионалам и страдающим городским массам, обещая им поддержку и военный успех. Человек, который выйдет на сцену дебатов, не будет говорить о политике, он лишь пообещает, что прекратит кровопролитие любыми средствами."
 usb.52.desc_3: "Сегодня вечером телеканалы готовятся к трансляции первых президентских дебатов 2024 года. Сенатор Берни Сандерс и президент Джо Байден покинули Вашингтон и направились в Филадельфию, несомненно, проводя последние репетиции перед важными выступлениями. Рынки ставок пришли к выводу, что это дебаты, в которых победит любой человек, хотя некоторым кандидатам есть что терять. Кампании кандидатов тщательно управляют ожиданиями публики, приучая ее концентрироваться на определенных вопросах и акцентируя внимание на недостатках своих оппонентов. \n\nКандидат Берни Сандерс является представителем заядлой Прогрессивной партии. Опираясь на наследие, уходящее корнями в прекрасные времена Эпохи реформ, Сандерс стремится убедить рабочий класс в своей безупречной преданности делу их улучшения. Сандерс критиковал администрацию Байдена за союз с корпорациями и недостаточную приверженность гуманитарной помощи. Стремясь заполнить пустоту, образовавшуюся после отсутствия популизма Трампа, Сандерс, вероятно, попытается привлечь отчужденных избирателей обещаниями более прямого демократического правительства, более широкого государства всеобщего благосостояния и масштабных социальных реформ. \n\nПрезидент Джо Байден выступает с совершенно иной платформой. Говоря о горящих городах и пепельных полях сражений, о солдатах, возвращающихся в гробах к скорбящим семьям, о голодающих беженцах и их скелетированных детях, он серьезен и неразговорчив. Единственный оптимизм, который он излучает, - это вера в окончательную победу над внутренними врагами Америки. Его кампания носит военный характер, она обращена к солдатам на фронте, профессионалам и страдающим городским массам и обещает им поддержку и военный успех. Он пользуется поддержкой не только своей собственной партии, но и потрепанных остатков республиканцев, смирившихся с выдвижением убежденного демократа перед лицом полного электорального забвения. Человек, который выйдет на сцену дебатов, не будет говорить о политике, он лишь пообещает, что прекратит кровопролитие любыми средствами."
 usb.52.desc_4: "Сегодня вечером вместо дебатов, которые обычно характерны для этого периода избирательного цикла, телеканалы готовятся транслировать выступление Джо Байдена. Президент покинул округ Колумбия и вылетел в самое безопасное место на южном фронте, несомненно, проходя последние репетиции перед своим большим выступлением.\n\nГоворя о горящих городах и полях сражений, о солдатах, возвращающихся в гробах к скорбящим семьям, о голодающих беженцах и их скелетированных детях, он серьезен и неразговорчив. Единственный оптимизм, который он излучает, - это вера в окончательную победу над внутренними врагами Америки. Его кампания носит военный характер, она обращена к солдатам на фронте, профессионалам и страдающим городским массам и обещает им поддержку и военный успех. Он пользуется поддержкой не только своей партии, но и потрепанных остатков республиканцев, смирившихся с выдвижением убежденного демократа перед лицом полного электорального забвения. Человек, который предстанет перед американским народом, не будет говорить о политике, он лишь пообещает, что прекратит кровопролитие любыми средствами."
 usb.52.a: "Байден сбивает всех с ног."
 usb.52.b: "Байден хорошо справился."
 usb.52.ba: "Ну... нормально"
 usb.52.c: "Он все еще наш президент..."
 usb.52.f: "Всё буквально кончено..."
 usb.52.p: "Вперёд с Бёрни!"
 usb.52.r: "Я верю в америку!"
 usb.521.t: "Человек, Дающий Надежду"
 usb.521.d: "Джозеф Р. Байден, человек, который добился единогласного выдвижения от коалиции Союза без каких-либо дебатов, сегодня действительно превзошел все ожидания. После своего выдвижения Байден выступил с президентской речью, которую можно назвать исторической. Его речь, пронизанная энергией и оптимизмом, представила видение светлого будущего, которое нашло глубокий отклик у слушателей. Начальная часть речи была наполнена горячими обещаниями и бодрящим чувством возможности, задавая тон радости и воодушевления. Однако по ходу выступления Байден изменил свой подход и обратился к более отрезвляющим реалиям, с которыми сталкивается нация. Он заговорил размеренным тоном о непрекращающихся трудностях и упорной борьбе за мир и стабильность, которую продолжают переживать многие американцы. Этот поворот продемонстрировал его осведомленность о текущих проблемах и готовность противостоять им.\n\nРеакция на выступление Байдена была просто ошеломляющей. То, что начиналось как ликующий митинг, превратилось в мощное заявление, которое прозвучало по всему Союзу и по всей Америке. Несмотря на падение рейтингов одобрения, обращение Байдена вызвало у населения новое чувство надежды. Очевидно, что этой речью Джозеф Р. Байден укрепил свои позиции не только как лидер, но и как символ непреходящей надежды и стойкости. Его президентство, похоже, укрепляется, а его послание вселяет в нацию чувство оптимизма на будущее."
 usb.521.a: "Сенатор, вице-президент, президент, а теперь еще и человек надежды."
 usb.522.t: "Горько-сладкая надежда"
 usb.522.d: "Несмотря на смесь оптимизма и страха накануне обращения президента к нации, оно обернулось неожиданным, но удовлетворительным завершением. Выступая перед нацией, он выглядел как обычный президент военного времени, хорошо понимающий и критически оценивающий ситуацию, но при этом допускающий небольшие запинки и ошибки при произнесении некоторых фраз или слов в целом. Однако для американской общественности это просто общая черта с президентом Байденом, задиристым, но понятным и внимательным человеком, который овладел ситуацией.\n\nРеакция коалиционного правительства была воспринята неоднозначно, с похвалой и легким недовольством как среди консерваторов, так и среди прогрессистов, но она доказала, что Байден не так уж и выжил из ума, как многие думали."
 usb.522.a: "Он не оплошал."
 usb.523.t: "Человек, Теперь Разбитый"
 usb.523.d: "В преддверии сомнений этот момент должен был закрепить за президентом статус маяка силы перед лицом таких испытаний и развеять сомнения в прочности контроля Байдена в Овальном кабинете.  Однако, к ужасу большинства демократов и тех, кто надеялся на выживание хоть какой-то коалиции, это обращение было признано полной катастрофой для президента Джо Байдена.\n\nНесмотря на попытку представить себя в качестве чемпиона в истории окончательного восстановления Америки перед лицом восставшей оппозиции и тирании внутри страны, под угрозой диктатора, он только углубился в спасение своей администрации, от заикания до полного краха в формулировках или суждениях, превратившись в полное шоу ляпов.\nКонтроль над ущербом может больше не быть жизнеспособным вариантом для президента и его кабинета, поскольку внутренние распри только подстегивают президента, сигнализируя о полном провале его контроля и прежней компетентности."
 usb.523.a: "Его нельзя просто склеить обратно!"
 usb.524.t: "Административный Развал!"
 usb.524.d: "В результате события, предсказанного многими после провала его обращения, десятки, если не сотни сенаторов и представителей местных штатов, а также члены Конгресса от всех ветвей власти, консервативной или прогрессивной, официально покинули правительство коалиции под руководством президента Джо Байдена. То, что должно было быть простым выходом незначительных частей правительств штатов, превратилось в полное прекращение работы коалиции в целом, причем основные эшелоны каждой ветви власти осудили Байдена за его неспособность соответствовать ситуации, сложившейся накануне гражданской войны в Америке, и недостаточное понимание того, насколько серьезной и тяжелой является обстановка для нации. \n\nЭто привело к чрезвычайной ситуации в администрации Байдена, когда члены кабинета министров из всех департаментов и оставшиеся лояльные члены Демократической партии начинают готовить ответные меры, чтобы сохранить остатки единства перед лицом потенциальной правительственной катастрофы. Президент Байден отреагировал шоком и усилил атаки, но безрезультатно, поскольку теперь недовольный Союз протягивает ему руку. Это может стать началом гибели президентства Байдена и настоящим ударом по усилиям юнионистов."
 usb.524.a: "Разнесите все к чертям!"
 usb.525.t: "Мистер Возвращение"
 usb.525.d: "Многие считали, что это невозможно: такой хрупкий, медленно разлагающийся человек, как Джо Байден, должен победить в столь давящих дебатах о политике и превосходстве. Однако даже под натиском Ромни и Сандерса, их пламенные речи стали символом решительного жеста Байдена, он просто отбивался, выплескивая немного оставшейся в нем магии дебатов, опровергая пункты и выбрасывая их как мусор, в глаза бросались моменты, запечатленные в прямом эфире, а его так называемые "умные и острые" оппоненты на сцене затихали. Люди описывают это как "общенациональное" возвращение для старого доброго Джо, беря цель, подобную Линкольну в 1864 году, предсказывая его столкновение с национальными игроками, только для того, чтобы крупное событие переломило ход событий. Данные опросов уже подтверждают, что Байден уверенно лидирует благодаря потрясающему выступлению."
 usb.525.a: "В путь, Джек!"
 usb.526.t: ""Сумасшедший Дед" Джо"
 usb.526.d: "Союз наблюдал, как дебаты быстро превращаются в беспрецедентную выгребную яму с постоянными придирками и намеренными, неспровоцированными нападками со всех сторон. И все же посреди этого моря серого и горького напряжения взоры обратились к некогда могучему, устойчивому и сильному дебатеру, который никогда не позволял себе быть неуслышанным или замолчать от чьего-то удара, а только замирал в разгар события с высокими ставками или вел себя как разъяренный старший член семьи, извергая фразы, не имеющие никакого содержания, в рамках того, что должно было быть профессиональным и цивилизованным, что далеко не так, как в 2020 году. Этот человек - действующий президент Джо Байден. Если говорить прямо, то это была серьезная ошибка в кампании действующей администрации, дающая понять, что вскоре последуют трещины, и, вероятно, толкающая огненный шар политической капитуляции обратно в суд Байдена, и это только продолжает наращивать давление. "
 usb.526.a: "оболочка его прежнего я."
 usb.527.t: "Воспоминания о 2016 годе"
 usb.527.d: "Сандерс стоял на трибуне, его глаза сверкали огнем десятилетий политической страсти. Эти дебаты были для него не просто очередным политическим спаррингом; это была кульминация всей жизни, посвященной прогрессивным идеалам. В 2016 году он наблюдал за тем, как его послание отодвигается на второй план, а его сторонники разочаровываются. Теперь, в 2024 году, политический ландшафт изменился, и нация, казалось, готова по-настоящему услышать его. Пока Байден путался в ответах, явно не справляясь с быстротечностью дебатов, Сандерс вернулся в свою юность, к движениям за гражданские права и трудовой борьбе, которые сформировали его мировоззрение. Каждый вопрос становился возможностью не просто изложить политику, но и нарисовать видение Америки, за которую он всегда боролся. Голос сенатора, обычно хрипловатый и настойчивый, приобрел новый тембр. В нем чувствовалась настоятельная потребность человека, который знал, что это, возможно, его последний шанс изменить траекторию развития страны. Его руки, обветренные годами жестикуляции на митингах и в Сенате, двигались с точностью, подчеркивая каждый пункт с той серьезностью, которой он заслуживал."
 usb.527.a: "Прогрессивизм вернулся, детка!"
 usb.528.t: "Месть за 2012 год"
 usb.528.d: "Ромни был человеком, построенным на сострадании и уважении, как называли его большинство ученых мужей и зрителей дебатов, и все же дебаты имели для него личное значение. В 2012 году Пол Райан, его напарник по предвыборной гонке от старшего и истинного крыла Республиканской партии, был убит Джо в ходе очередных скоординированных дебатов в разгар избирательного цикла, поскольку он едва смог вымолвить хоть слово после такого насыщенного избирательного цикла. Теперь все изменилось в лучшую сторону; теперь стареющий и приходящий в упадок Байден не в состоянии правильно произносить свои фразы, в то время как более элегантный и раскованный Ромни продолжает наносить яростные удары ошеломленному и побежденному президенту. Это личное отмщение за свое поражение в 2012 году было просто эйфорией, поскольку теперь судьба Ромни - творить историю Америки, а не быть скованным цепями человека, у которого нет должной опоры в партии. Было отмечено, что результаты опроса сильно изменились, и из-за катастрофического выступления Байдена уже была задействована команда по уборке, которая в результате дебатов убрала осколки и битое стекло."
 usb.528.a: "Больше не униженный"
 usb.74.t: "Президентские дебаты 2024 года"
 usb.74.d: "Сегодня вечером телеканалы готовятся к трансляции первых президентских дебатов 2024 года. Два сенатора и президент покинули Вашингтон и направились в Цинциннати, несомненно, проходя последние репетиции перед важными выступлениями. Рынки ставок пришли к выводу, что в этих дебатах победит любой человек, хотя некоторым кандидатам есть что терять. Кампании кандидатов тщательно управляют ожиданиями публики, приучая ее концентрироваться на определенных вопросах и акцентируя внимание на недостатках своих оппонентов. \n\nКандидат Берни Сандерс представляет прогрессивное движение. Опираясь на наследие, уходящее корнями в прекрасные времена эпохи реформ, Сандерс стремится убедить рабочий класс в своей безупречной преданности делу их улучшения. Кандидат Митт Ромни - консервативный оплот Америки, который противостоял антидемократическим течениям внутри собственной партии, сражаясь с трамповским зверем, в то время как другие члены его фракции отнекивались и оправдывались. Такие действия вызывают у него доверие среди избирателей в пригородах, а более стойким консерваторам больше не к кому идти. Президент Камала Харрис баллотируется на совершенно иной платформе. Говоря о горящих городах и пепельных полях сражений, о солдатах, возвращающихся в гробах к скорбящим семьям, о голодающих беженцах и их скелетированных детях, она серьезна и неразговорчива."
 usb.74.a: "Я с ней!"

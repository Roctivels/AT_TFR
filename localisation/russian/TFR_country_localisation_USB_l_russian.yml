 USB_criminal_justice_reform_desc: ""
 USB_safer_communities_act: "Закон о Более Безопасных Сообществах"
 USB_safer_communities_act_desc: "Хотя крупномасштабные боевые действия прекратились, хаос войны на нашей собственной территории привел к значительному росту преступности и даже к партизанской войне в некоторых районах. Одним из самых незначительных, но жизненно важных компонентов возвращения к нормальной жизни является уверенность рядового гражданина в том, что он может заниматься своими делами как обычно. Мы будем инвестировать в видеонаблюдение и правоохранительные органы, чтобы средний американец чувствовал, что он может ходить по своему району, не подвергаясь нападению."
 USB_true_multiparty_democracy: "Истинная Многопартийная Демократия"
 USB_true_multiparty_democracy_desc: "За два с половиной века существования нашей нации на весы демократии была положена наковальня, так что только мнения, приемлемые для истеблишмента, могли получить поддержку. С этого дня все изменится. Наша администрация откажется от принципа "Системы Относительного Большинства" и примет пропорциональное представительство, так что единственное, что потребуется политику для достижения выборной должности, - это поддержка народа."
 USB_an_economic_revolution: "Экономическая Революция"
 USB_an_economic_revolution_desc: "Слишком долго Америка не соответствовала своей репутации страны возможностей. Коррупция, жадность и апатия привели к тому, что нация эксплуатирует людей, а не дает им возможность процветать. Мы исправим эту ошибку и радикально изменим американскую экономику. Рабочие будут в безопасности, с хорошей зарплатой и щедрыми льготами. Профсоюзы должны быть в авангарде экономики, а не отброшены на обочину. Прежде всего мы поставим людей выше прибыли и выполним обещание добиться успеха для тех, кто готов работать ради него."
 USB_economic_justice: "Экономическая Справедливость"
 USB_economic_justice_desc: "Америка - это много чего, но ничто не выражает суть нашей нации лучше, чем Клятва верности: одна нация под Богом, неделимая, со свободой и справедливостью для всех. Наш долг перед нацией - обеспечить всем возможность добиться успеха в условиях нашей экономики. Поэтому мы будем работать с Конгрессом над созданием надежной системы корпоративного регулирования и защиты трудящихся. Настало время, когда Америка должна принять справедливость для всех."
 USB_three_arrows_of_antifascism: "Три Стрелы Антифашизма"
 USB_three_arrows_of_antifascism_desc: "Какой бы ужасной она ни была, гражданская война дала нам беспрецедентную ясность. Мы потратили так много времени на борьбу между прогрессистами и либералами, что не смогли побороть правые и даже фашистские элементы, пока не стало слишком поздно. Мы не повторим этой ошибки. Пусть мы не во всем согласны с радикальными левыми, но в одном мы можем найти общий язык: этого здесь не произойдёт. Мы этого не допустим."
 USB_appeal_to_the_un: "Обращение в ООН"
 USB_appeal_to_the_un_desc: "Хотя когда-то мы были неоспоримой мировой державой, гражданская война сильно ослабила как наши внутренние институты, так и внешнюю проекцию силы. Как единственное законное правительство Соединенных Штатов, мы обратимся в Организацию Объединенных Наций с просьбой о немедленном признании. Это обеспечит легитимность нашего правительства в глазах американского народа и восстановит наши отношения с международным сообществом."
 USB_deal_with_strikes: "Разобраться с Забастовками"
 USB_deal_with_strikes_desc: "Хотя некоторые забастовки могут быть оправданы, Америка до основания потрясена гражданской войной, и массовые забастовки, парализующие самые жизненно важные отрасли, представляют собой огромную угрозу для нашей и без того хрупкой экономики. Мы будем работать с частными предприятиями и правительствами штатов, чтобы прекратить эти забастовки и позволить нашей экономике восстановиться. В конце концов, от восстановления экономики выигрывают все, даже профсоюзы!"
 USB_codify_roe_v_wade: "Кодифицировать дело Роу против Уэйда"
 USB_codify_roe_v_wade_desc: "Одним из самых горячих вопросов американской политики на протяжении последних ста лет были аборты. Если мы хотим раз и навсегда покончить с этими дебатами, мы должны пойти дальше и закрепить право женщины на выбор в федеральном законе. Консерваторы могут ворчать, но у нас большинство, и мы не собираемся отворачиваться от миллионов женщин во имя двухпартийности."
 USB_request_nato_assistance: "Запросить Помощь НАТО"
 USB_request_nato_assistance_desc: "Помимо ООН, Организация Североатлантического договора является, пожалуй, самым важным международным органом. Когда мы потерпели крах в гражданской войне, НАТО оставалось мощным объединением наших самых надежных союзников. Поэтому мы обратимся к ним за экономической и военной помощью в восстановлении нашей расколотой страны и восстановлении позиций Америки как демократической сверхдержавы. Объединенные мы стоим, разделенные мы падаем."
 USB_bipartisan_infrastructure_law: "Межпартийный Закон об Инфраструктуре"
 USB_bipartisan_infrastructure_law_desc: "Две крупнейшие партии Америки, демократы и республиканцы, часто испытывают ожесточенные разногласия по таким ключевым вопросам, как иммиграция и права на оружие. Однако одна идея, которая остается относительно популярной среди всех, - это послевоенные расходы на инфраструктуру. Мы будем сотрудничать с республиканцами, чтобы восстановить поврежденную инфраструктуру Америки и заполнить некоторые из существовавших ранее пробелов. Это поможет в восстановлении и деполяризует нашу политическую сферу, побуждая демократов и республиканцев работать вместе над вопросами, которые имеют наибольшее значение."
 USB_address_americas_past: "Обратиться к Прошлому Америки"
 USB_address_americas_past_desc: "Америка - сияющий свет в зачастую мрачном мире, и в нашей истории есть много поводов для гордости. Однако есть и то, чего стоит стыдиться, - от сегрегации до религиозных преследований, и, пожалуй, ни одна группа населения не знает этого лучше, чем коренные народы тех территорий, которые сегодня составляют Соединенные Штаты. С самого начала им пришлось столкнуться с правительством, которое в лучшем случае проявляло безразличие, а в худшем - откровенный геноцид. Пришло время загладить свою вину. Президент принесет официальные извинения коренным американцам и признает факт геноцида, который был осуществлен. Только простив грехи прошлого, мы сможем подняться к светлому будущему."
 USB_the_spirit_of_keynes: "Дух Кейнса"
 USB_the_spirit_of_keynes_desc: "Многие в нашей партии считают, что для того, чтобы остановить волну крайне правого радикализма, мы должны принять крайне левый радикализм. Мы с этим категорически не согласны. Чтобы противостоять экстремизму с обеих сторон, мы будем опираться на наследие Рузвельта и Джонсона и твердо придерживаться наших принципов демократии, равных возможностей и свободы. При нас Америка не даст тирании безопасной гавани."
 USB_attack_union_corruption: "Борьба с Коррупцией в Профсоюзах"
 USB_attack_union_corruption_desc: "Немногие организации в Америке имеют более обширную и продолжительную историю коррупции, чем профсоюзы. От крайне левых симпатий АФТ-КПП и ИРМ до связей с мафией Джимми Хоффы и МБВТ, профсоюзы всегда находились на грани между защитниками интересов трудящихся и откровенными преступными синдикатами. Мы будем атаковать их за это и, наконец, сократим их размер, чтобы работодатель и работник были в равных условиях."
 USB_war_on_crime: "Война с Преступностью"
 USB_war_on_crime_desc: "Независимо от политических взглядов, все американцы могут согласиться с тем, что преступность - это серьезная проблема, которую необходимо решить как можно скорее ради блага нашей страны. Пришло время занять более твердую позицию в отношении закона и порядка и объявить безоговорочную войну преступности. Консерваторы будут довольны нашей жесткой позицией по отношению к преступности, рядовые граждане - тем, что на улицах снова безопасно, а прогрессивисты - тем, что правые военизированные формирования наконец-то будут подавлены. Выиграют все."
 USB_import_humanitarian_aid: "Импорт Гуманитарной Помощи"
 USB_import_humanitarian_aid_desc: "Без этого не обойтись: наша страна переживает гуманитарный кризис. Хаос гражданской войны оставил нашу страну без важнейшей инфраструктуры, а миллионы людей вверг в нищету и голод. Мы обратимся к Организации Объединенных Наций за продовольствием, медикаментами и другими необходимыми ресурсами, в которых мы так нуждаемся. В конце концов, экстремизм укореняется только тогда, когда правительство не заботится о тех, кто беден, голоден и отчаялся. Борьба с этими проблемами - ключевой момент в наших усилиях по восстановлению страны."
 USB_clean_up_the_countryside: "Очистить Сельскую Местность"
 USB_clean_up_the_countryside_desc: "На протяжении веков сельская Америка была одним из самых забытых регионов страны. Из-за крайнего консерватизма региона и его обширности обе партии рассматривали его как предрешенный электоральный итог, и у них не было причин уделять ему много внимания на фоне всего остального. Больше не будет. Мы начнем общенациональные усилия по восстановлению поврежденной инфраструктуры в самых бедных частях нашей страны и приведем в порядок как можно большее ее количество. Помимо того, что эта работа является важнейшей частью реконструкции, она поможет преодолеть разрыв между крупными городами и сельскими районами и сделать нас действительно единой нацией. В нашей новой Америке никто не останется позади."
 USB_stamp_out_left_radicalism: "Искоренить Левый Радикализм"
 USB_stamp_out_left_radicalism_desc: "В истории нашей страны не было врага сильнее, чем социализм. Почти 70 лет коммунисты правили Россией железным кулаком, подавляя любую политическую свободу, пока весь режим не рухнул под собственным весом. Мы не позволим нашему великому Союзу пройти тот же путь. Любые так называемые "демократы" с социалистическими наклонностями будут решительно осуждены, а президент будет работать с умеренными республиканцами, чтобы эта опасность никогда не возникла в нашей стране. Нам нужны перемены, а не крах."
 USB_stamp_out_right_radicalism: "Искоренить Правый Радикализм"
 USB_stamp_out_right_radicalism_desc: "Это почти невероятно. Несмотря на то что мы победили самую злую силу в истории менее века назад, многие американцы в трудные времена обращаются к ее отвратительным идеям. Этот новый фашизм ничем не отличается от того, который в погоне за "чистотой" загонял евреев в лагеря и уничтожил пол-Европы. Мы не позволим этому больше тлеть. Мы пресечем эти нацистские митинги и заставим этих крыс навсегда вернуться в подполье."
 USB_strengthen_right_to_work_laws: "Усилить Законы о Праве на Труд"
 USB_strengthen_right_to_work_laws_desc: "Учитывая всю их коррупцию и некомпетентность, неудивительно, что многие американцы не хотят быть представленными профсоюзом, но слишком часто их заставляют быть таковыми в качестве условия работы. Мы должны положить конец этой практике. Мы будем призывать все штаты Союза как можно скорее принять законы о праве на труд, а также поддержим в Конгрессе федеральный закон о праве на труд. Мы не объявим профсоюзы вне закона, но мы также не собираемся объявлять вне закона тяжелую работу."
 USB_new_federalism: "Новый Федерализм"
 USB_new_federalism_desc: "Америка по своей сути является федеративным государством. Наши основатели признали, что есть определенные полномочия, которые должны быть оставлены штатам. Конечно, сенатор в Вашингтоне не знает, какие правила нужны рыботорговцу в Новом Орлеане. Исходя из этого, мы начнем внедрение нового федерализма, вернув штатам ряд полномочий, касающихся регулирования бизнеса и трудовых отношений, иммиграции и охраны порядка. Соединенные Штаты - это всего лишь союз штатов, и чем скорее мы это поймем, тем лучше."
 USB_defending_the_american_experiment: "Защищая Американский Эксперимент"
 USB_defending_the_american_experiment_desc: "Нет ничего более близкого и дорогого нашему сердцу как американцев, чем наша великая система демократического правления. Более двухсот сорока лет назад небольшая группа доблестных людей долгие годы сражалась, чтобы защитить не только нацию, но и идеал свободы. Сто шестьдесят с лишним лет назад этому идеалу угрожали те, кто предпочел бы рабство свободе. А более восьмидесяти лет назад ему снова угрожали безумные тираны, которые в погоне за империей грозили разорвать мир на части. Несмотря на все это, Америка выжила. И через хаос последних нескольких лет Америка выжила, вновь обретя приверженность нашим благословенным свободам."
 USB_rally_the_military_industrial_complex: "Сплотить Военно-промышленный Комплекс"
 USB_rally_the_military_industrial_complex_desc: "Вооруженные силы США, бывшие бастионом национальной обороны, потеряли значительную часть своей мощи в ходе недавнего внутреннего конфликта. Из-за полного раскола государственных ополчений, простых жертв войны и перехода большей части вооруженных сил на сторону Трампа и других экстремистских движений наши вооруженные силы находятся в плохом состоянии. Восстанавливая ее, мы предоставим ряд контрактов частным корпорациям, которые будут рады восстановить мощь своей страны и получить за это деньги."
 USB_encourage_public_private_partnerships: "Поощрять Государственно-частное Партнерство"
 USB_encourage_public_private_partnerships_desc: "Идеалы индивидуализма в Америке, хотя их часто высмеивают прогрессивные левые, позволили сформировать на нашей земле прочную систему частного предпринимательства. К счастью для нас, мало найдется организаций, которые лучше всего подходят для помощи в наших усилиях по восстановлению. Мы будем поощрять заключение контрактов между государственными и местными органами власти и частными компаниями на восстановление и возрождение инфраструктуры. Они получают оплату и частичное право собственности, а граждане - комфортную жизнь. И снова американская изобретательность спасает положение!"
 USB_secure_the_party: "Обеспечить Безопасность Партии"
 USB_secure_the_party_desc: "После фиаско 2020 года, когда большая часть партии перешла на сторону правительства Трампа, и массового недоверия избирателей к нам, республиканцы находятся в тяжелом положении. Если мы не будем действовать быстро, Америка навсегда будет разделена между либералами и прогрессивистами Демократической партии. Мы разработаем новую платформу с изложением наших консервативно-демократических принципов, чтобы националист-аутсайдер вроде Трампа больше никогда не смог захватить нашу партию, и запретим всем нашим кандидатам пропагандировать безумный конспирологизм, который разделял нашу страну раньше. Это позволит превратить партию из безропотного пособника демократов в самостоятельную крупную партию."
 USB_a_new_phoenix_program: "Новая Операция Феникс"
 USB_a_new_phoenix_program_desc: "После первой гражданской войны многие люди, прямо предавшие свою страну и помогавшие врагу убивать американских солдат, были помилованы и смогли реинтегрироваться в американское общество, не встречая никаких последствий и позволяя своим идеям укорениться в нашей культуре и политике. Этого больше не случится. Мы заручимся помощью ЦРУ в реализации внутренней программы борьбы с повстанцами, взяв за основу опыт операции "Феникс" во Вьетнаме, чтобы обезопасить наше правительство от вражеского влияния."
 USB_provide_tax_relief: "Предоставлять Налоговые Льготы"
 USB_provide_tax_relief_desc: "Федеральное правительство выбивает жизнь из американской экономики своими требованиями, в том числе и непомерно высокими налоговыми ставками и повышением налогов в военное время. Наконец-то пришло время облегчить это бремя. Мы снизим налоги по всем направлениям, от бизнеса до доходов, чтобы трудолюбивые американцы могли оставлять свои доходы себе, а не конфисковывать большую их часть для оплаты чужих проблем."
 USB_comprehensive_crime_control_act: "Всеобъемлющий Закон о Борьбе с Преступностью"
 USB_comprehensive_crime_control_act_desc: "Годы, в течение которых федеральное правительство потворствовало преступникам и ставило их права выше прав законопослушных американцев, привели к тому, что наша страна стала опаснее, чем когда-либо. Грабители и наркодилеры заполонили тротуары и переулки, а наши здания, некогда бывшие символами процветания и промышленности, покрылись граффити и бандитскими надписями. Мы проведем через Конгресс законопроект об увеличении финансирования полиции и увеличении сроков тюремного заключения за ряд насильственных преступлений. Америка не потерпит, чтобы преступники терроризировали ее народ."

 USB_project_babel_cat: "Проект Вавилон"
 USB_project_babel_cat_desc: "\n\n\n\n\n£GFX_USB_project_babel_cat\n\n\n\n\n\n\n\nПод публичными оправданиями третьей войны в Персидском заливе скрывается еще более глубокий мотив: Проект Вавилон. Управляемый Когносценти через посредников в Пентагоне, ЦРУ и корпоративных лабораториях, Проект Вавилон является кульминацией десятилетий секретных исследований так называемого шумерского праязыка, первоначального кода, из которого родился первый письменный язык. Это самое страшное супероружие Когносценти, которое они намерены использовать в финальных войнах за создание Нового мирового порядка.\n\nНейролингвистическая чума, так сказать, станет событием, которое по своему масштабу и жестокости затмит атомную бомбу, оружием столь огромного и невообразимого ужаса, что власть Когносценти будет обеспечена. Оно даст Когносценти власть над фундаментальными законами и концепциями, регулирующими человеческий язык и мышление в целом. В некотором смысле, это оружие чистого смысла.\n\nНо прежде чем это будет представлено миру, Когносценти должны сначала собрать фрагментарные Мэ, врожденные истины человеческого языка, из руин Месопотамии, чтобы затем собрать эти фрагменты в единое целое. Кроме того, они должны обеспечить сохранность и реконструировать остатки Нам-Шуба Энки, шумерского нейролингвистического контрпаттерна, который, по мнению археологов Когносценти, когда-то использовался для восстановления языка после потопа. С его помощью Когносценти могут привить своим людям иммунитет против последствий Чумы.\n\n§OПРОГРЕСС НЕЙРОЛИНГВИСТИЧЕСКОЙ ЧУМЫ: [USB_NLP_scripted_loc]\n§Y[?USB_babel_me_var]/3§! МЭ\n§Y[?USB_babel_language_fragment_var]/5§! ЯЗЫКОВ\nДАННЫЕ [USB_data_scripted_loc]\nЧЕЛОВЕЧЕСКИЕ ИСПЫТАНИЯ: [USB_human_trials_scripted_loc]\nНАМ-ШУБ ЭНКИ: [USB_nam_shub_scripted_loc]\nВАКЦИНАЦИЯ: [USB_inoculations_scripted_loc]§!"

 USB_clueless: "§CВ НЕВЕДЕНИИ§!"
 USB_clueless_text: "§gОбщественность остается покорной благодаря постоянным хлебу и зрелищам, которые мы для нее устраиваем. Для нее ее демократия не просто здорова, она процветает. Именно в этом и заключается наша цель: чтобы она постоянно была отвлечена и, как ребенок, ограждена от реальности нашего правления. Чтобы поддерживать маскарад, который мы для нее устраиваем, мы должны следить за тем, чтобы она оставалась в этом умиротворенном состоянии.§!"
 USB_unaware: "§7НЕОСВЕДОМЛЁННА§!"
 USB_unaware_text: "§gХотя общественность не полностью успокоена той пьесой, которую мы для нее разыграли, она все еще не осознает полного масштаба наших действий и даже не подозревает о нашем существовании. Однако подозрения - это скользкая дорожка; если мы не будем продолжать успокаивать общественность, она может стать опасной - полумеры здесь не подойдут.§!"
 USB_suspicious: "§YПОДОЗРЕВАЕТ§!"
 USB_suspicious_text: "§gКогда реальность не такая, какой кажется, это задевает душу. Некоторые, возможно, не могут выразить эти чувства словами или даже сформулировать их в мыслях, но они все равно остаются. Хаос распространяется по общественному сознанию, растущий как опухоль. Мы должны остановить это, пока они не сняли завесу и не раскрыли наше правление миру.§!"
 USB_conspiratorial: "§OЗАГОВОРЩИЧЕСКАЯ§!"
 USB_conspiratorial_text: "§gКритическое недовольство достигает своего пика. Хлеб и зрелища, которые держали общественность в покорности, стали неэффективными и скучными.\n"Кто на самом деле виновен во всех этих стрельбах?" "Что на самом деле содержится в воде, которую я пью?" "Кто на самом деле контролирует то, что показывают по телевизору?" Вопросительный знак - самый ядовитый символ в человеческом языке: он разъедает все, что мы создаем, позволяет хаосу распространяться как болезнь и разжигает огонь. Нам нужно немедленно исправить курс, чтобы поддерживать порядок.§!"
 USB_offthehook: "§tВ ХАОСЕ§!"
 USB_offthehook_text: "§gОбщественность знает слишком много, порядок вокруг нас рушится, крючок, на котором мы их держали, сгнил до основания, а коллективное сознание поглощает хаос. Необходимы решительные действия, и они нужны немедленно - все, над чем мы работали, не может быть напрасным. Мы взяли под контроль правительство Вашингтона, когда его некомпетентность едва не привела к нашему падению, мы взяли под контроль элиту и сформировали Когносценти, и теперь мы возьмем под контроль ситуацию.§!"
 
 USB_nonexistent: "§CНЕ СУЩЕСТВУЕТ§!"
 USB_nonexistent_text: "§gКогда на нашу страну опускается утро, люди просыпаются и начинают свой день. От Вашингтона до Чикаго улицы находятся в порядке - почти мирные. Почти как будто гражданской войны и не было: никаких шепотов о восстании, никаких шепотных заговоров против государства, никаких бродящих антисоциальных диссидентов. Это именно то, что нам нужно, чтобы общественность оставалась послушной, но мы должны оставаться бдительными - экстремистская деятельность процветает на самоуспокоенности.§!"
 USB_low: "§GНИЗКАЯ§!"
 USB_low_text: "§gВ очередной раз чума американского экстремизма начинает поднимать свою уродливую голову. Постепенно антисоциальные диссиденты начинают чувствовать себя комфортно, делясь своими замыслами с другими экстремистами. Некоторые могут сказать, что это нормально для современного общества, даже приемлемо, но это всегда скользкий путь, и если мы хотим избежать тирании масс, то мы должны подавить этих антисоциальных диссидентов.§!"
 USB_moderate: "§HСРЕДНЯЯ§!"
 USB_moderate_text: "§gНаша страна постепенно погружается в объятия разгорающегося пожара. Шепчущиеся заговоры, придуманные антисоциальными экстремистами, воплощаются в жизнь. Взрывы, стрельба, зверства самого высокого масштаба. Для Америки после начала гражданской войны это можно считать умеренным, но общественность уже начинает ощущать влияние этих действий на свою повседневную жизнь. Порядок зависит от покорного и довольного населения, и если занавес будет поднят еще выше, это может стать для нас концом.§!"
 USB_high: "§OВЫСОКАЯ§!"
 USB_high_text: "§gНаш маскарад зависит от готовности общественности подчиняться и от абсолютного соблюдения порядка. Мы терпим неудачу на обоих фронтах. Деятельность экстремистов вышла из-под контроля, на улицах царит хаос, террористические атаки происходят ежедневно, а общественность начинает беспокоиться из-за отсутствия закона и порядка. Мы должны немедленно принять меры против этих антисоциальных паразитов, чтобы иметь шанс восстановить порядок в нашей стране.§!"
 USB_outofcontrol: "§dВНЕ КОНТРОЛЯ§!"
 USB_outofcontrol_text: "§gМы едем на машине без руля, деятельность экстремистов достигла критической массы. На каждом углу взрываются бомбы, улицы завалены свинцом, а антисоциальные диссиденты продолжают планировать новые террористические акты. Мы находимся в том же положении, что и правительство Вашингтона до того, как мы захватили государственный аппарат - мы не смогли взять бразды правления в свои руки и не смогли сдержать разгорающееся пламя. Единственный путь вперед - это решительные действия против тех, кто хочет погрузить мир в хаос. Мы должны помнить, что мы - маяк порядка в мире, поглощенном огнем, и мы не позволим, чтобы это стало нашим концом.§!"
 

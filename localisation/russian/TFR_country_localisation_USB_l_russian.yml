 USB_wef_tt: "§RКРОВЬ§!"
 USB_wef_delayed_tt: "§LВ рамках Когносценти мегакорпорации представляют самые мощные корпоративные интересы в стране и являются наиболее влиятельными членами корпоративного крыла Когносценти. Действуя под эгидой Всемирного экономического форума, они заинтересованы в поддержании статус-кво и готовы сделать все необходимое, чтобы сохранить существующее положение вещей. Они являются основой властной структуры Когносценти и не колеблются использовать свои значительные ресурсы для устранения любой угрозы статус-кво.\n\nВ обмен на сравнительно небольшие, не отраженные в отчетах взносы в черный бюджет, эти мегакорпорации получили множество преимуществ в благодарность за свой вклад в обеспечение безопасности США. До тех пор, пока они будут следовать повестке дня Когносценти, эти корпорации будут пожинать плоды влияния глубинного государства. Таким образом, им предоставлена полная свобода действий, при условии, что они будут продолжать предоставлять Когносценти средства, ресурсы и технологии, необходимые для поддержания статус-кво и расширения влияния глубинного государства. Они являются источником жизненной силы Когносценти, и их постоянная поддержка имеет решающее значение для успеха тайного общества.\n\nКонечно, если они решат не играть по правилам, они рискуют попасть в черный список Когносценти или даже хуже. Таким образом, они заинтересованы в том, чтобы оставаться в милости у тайного общества, и готовы сделать все необходимое для продвижения американских интересов и обеспечения того, чтобы Когносценти оставалось у власти. Они были куплены и оплачены глубинным государством и не колеблясь будут использовать свои значительные ресурсы для продвижения планов клики и обеспечения собственной выгоды. Будущее принадлежит им, и они не позволят никому и ничему помешать им.§!"
 USB_cia_tt: "§OТЕЛО§!"
 USB_cia_delayed_tt: "§LБез секьюрократов не было бы Когносценти. Именно благодаря маневрам ЦРУ, ФБР, АТФ и АНБ стал возможен теневой переворот, и именно благодаря их усилиям власть глубинного государства стала абсолютной. Разведывательные агентства являются основой власти Когносценти и их сторожевыми псами, следящими за тем, чтобы остальные члены клики следовали их видению будущего Америки.\n\nЭти агентства заинтересованы в поддержании порядка и готовы пойти на многое, чтобы защитить свою власть и влияние. Они также являются одними из самых секретных и непрозрачных организаций в мире и не боятся использовать свои значительные ресурсы и связи, чтобы добиться своего. С помощью своих теневых армий они являются глазами и ушами Когносценти, собирая информацию о потенциальных угрозах правлению клики и обеспечивая нейтрализацию этих угроз, прежде чем они могут стать проблемой.\n\nИнформаторы проникают во все слои американского общества, от правительственных коридоров и внутренних кругов корпоративной элиты до самых обычных людей: они являются полицейскими, ремонтниками, школьными учителями и даже бездомными. Многие из них даже не подозревают, что работают на спецслужбы, будучи соблазненными своевременным предложением денег, подачкой или даже простой беседой за чашкой кофе в обмен на "сообщение о подозрительной деятельности." Независимо от методов, их сеть обширна, а их влияние ощущается во всех уголках страны.\n\nСпецслужбы всегда начеку, ожидая любой возможности нанести удар по тем, кто осмелится бросить вызов власти Когносценти. Они являются телом, бьющимся сердцем Когносценти, и не колеблясь устранят любую угрозу правлению клики или ее видению будущего Америки.§!"
 USB_darpa_tt: "§CРАЗУМ§!"
 USB_darpa_delayed_tt: "§LВоенно-промышленный комплекс является нервным центром Когносценти, и его роль в структуре власти кабалы заключается в поддержании работы военной машины и обеспечении того, чтобы военная мощь Америки всегда была на переднем крае мировых дел. Благодаря своим глубоким карманам и политическому лоббированию, они способны держать Пентагон в соответствии со своей повесткой дня, обеспечивая, чтобы американские вооруженные силы всегда были самыми мощными и технологически передовыми в мире. Взамен кабала предоставляет им выгодные контракты, доступ к передовым технологиям и свободу действий с минимальным контролем.\n\nВПК также действует в качестве аналитического центра глубинного государства, предоставляя клике военные и технологические знания, необходимые для поддержания порядка. Именно они проектируют и разрабатывают оружие и технологии, которые позволяют Когносценти удержать власть, а также стратегии и тактики, необходимые для сдерживания врагов глубинного государства.\n\nПомимо своей роли в вооружении военных, они также разрабатывают новые системы для спецслужб, расширяя границы в таких передовых областях, как искусственный интеллект, чтобы вывести паноптикон наблюдения АНБ на новый уровень. Со временем прогнозирующие алгоритмы могут даже стать способными предотвращать преступления и диссидентскую деятельность до их совершения, создав общество, практически свободное от преступности.\n\nВ руках Когносценти можно только догадываться, как их изобретения могут быть использованы для служения делу.§!"
 

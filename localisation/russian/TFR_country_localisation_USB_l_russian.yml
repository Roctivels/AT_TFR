 USB_FBI_james_comey_sc: "Джеймс Коми"
 USB_FBI_james_comey_tt: "§YДжеймс Коми§!\nДиректор ФБР\n   £stability_texticon Еженедельная Стабильность если меньше 50%: §G+0.20%§!"
 USB_FBI_james_comey_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_james_comey_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YИсторическое Значение:§!\nУвольнение Трампом сделало его ключевым активом в операциях Когносценти против АКП. Он использовал институциональные знания и сети федеральных правоохранительных органов, предоставляя важную разведывательную информацию до переворота, в том числе выявляя внутренних сочувствующих и оценивая институциональные уязвимости.\n\n§YТекущая Деятельность:§!\nПосле вступления в должность директор Коми быстро ввел протоколы перераспределения персонала, чтобы удалить из Бюро политически ненадежных лиц. Под его руководством Бюро значительно расширило внутреннюю слежку, сосредоточившись на цифровом мониторинге и сборе разведданных о экстремистских угрозах.\n\n§YРанние Годы и Личная Жизнь:§!\nСубъект вырос в Аллендейле, Нью-Джерси. Ранний опыт конфронтации с вооружённым преступником, вторгшимся в дом, вероятно, повлиял на его выбор карьеры в правоохранительных органах и государственной службе.\n\nВ 1987 году Джеймс Коми женился на Патрис Фэйлор, с которой познакомился в колледже Вильгельма и Мэри. У них было шестеро детей, один из которых умер в младенчестве, что Коми считает важным событием для своего психологического развития.\n\nРезиденция в Маклине, Вирджиния, близка к ключевой разведывательной инфраструктуре, обеспечивая безопасную связь с руководством и стабильную базу для высокопоставленных сотрудников.\n\nЭтническое происхождение субъекта - ирландское. Воспитание католическое, сейчас принадлежит к методистской церкви, что может отражать личностную эволюцию или адаптацию к социальным нормам института.§!"
 

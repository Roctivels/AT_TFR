 USB_DIA_jeffrey_kruse_tt: "§YДжеффри А. Круз§!\nДиректор РУМО\n   £counter_intelligence_texticon Контрразведка: §G+10.0%§!"
 USB_DIA_jeffrey_kruse_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_jeffrey_kruse_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YИсторическое Значение:§!\nКарьера субъекта демонстрирует систематический рост по служебной лестнице благодаря выполнению все более важных разведывательных функций, связанных с национальной безопасностью. Ранее он служил в Военно-воздушных силах США, а также занимал разведывательные должности в USINDOPACOM и USD(I&S); до Гражданской войны он был советником по военным вопросам при директоре Национальной разведки.\n\n§YТекущая Деятельность:§!\nПод руководством этого человека операции Агентства военной разведки были приведены в соответствие с операциями ЦРУ, и Агентство и РУМО начали сотрудничать в ранее невиданных масштабах. В качестве директора Крузе курировал расширение существующих проектов Министерства обороны, связанных с изучением машинного обучения, таких как проект Maven, интегрируя эти системы в более широкий аппарат наблюдения. Он также руководит сбором военной разведкой за рубежом.\n\n§YЛичная Жизнь:§!\nАкадемическая подготовка субъекта в значительной степени соответствует его карьере в разведке: бакалавр политических наук Майамского университета (1990), магистр стратегической разведки Объединенного военно-разведывательного колледжа (1996), магистр национальной безопасности и стратегических исследований Военно-морского колледжа США (2004) и магистр стратегии национальной безопасности Национального военного колледжа (2008).§!"
 

 USB_ATF_gary_restaino_tt: "§YГэри М. Рестайно§!\nДиректор ATF\n   £pol_power Прирост Политической Силы: §R-0.05§!\n   £operatives_root_out_resistance_texticon Эффекты задания «Искоренить сопротивление»: §G+5.0%§!"
 
 USB_CDC_anthony_fauci_sc: "Энтони Фаучи"
 USB_CDC_anthony_fauci_tt: "§YЭнтони Фаучи§!\nДиректор CDC\n   £GFX_dx_yellow Фактор Личных Расходов: §Y-5.0%§!"
 USB_CDC_anthony_fauci_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_anthony_fauci_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YИсторическое Значение:§!\nВыбранный на должность директора CDC за свой медицинский опыт и сотрудничество в области разведки, он бескомпромиссно обеспечивает соблюдение директив в области здравоохранения, имеющих решающее значение для постоянной изоляции. Ранее он руководил мерами США по борьбе с ВИЧ/СПИДом, атипичной пневмонией, свиным гриппом, MERS, Эболой и Ковид-19. В 2000-х годах он помог создать PEPFAR и продвинул лекарства для биозащиты после 11 сентября.\n\n§YТекущая Деятельность:§!\nСтатус "ведущего эксперта США по инфекционным заболеваниям" усиливает соблюдение вакцинации и биометрического контроля, а медийное освещение кризисного управления легитимирует ограничения, представляя оппозицию как антинаучную.\n\nНесмотря на возраст, он остается здоровым, без признаков физического или когнитивного снижения, и продолжает работать благодаря упражнениям, сбалансированному питанию и медицинскому наблюдению.\n\n§YРанние Годы и Личная Жизнь:§!\nСубъект родился в Бруклине в семье фармацевтов, получил степень бакалавра в Колледже Святого Креста и доктора медицины в Корнельском университете; сейчас проживает в Вашингтоне, округ Колумбия.\n\nВ 1985 году он женился на Кристине Грейди из NIH; трое взрослых детей работают в науке и медицине, что подчеркивает профессиональную направленность семьи и его приверженность биометрическому мониторингу.\n\nВоспитанный католиком, ныне называющий себя гуманистом, он придерживается аполитичности, поддерживая приоритеты госбезопасности и утилитарный подход, при котором свободы уступают научному и технологическому прогрессу.§!"
 

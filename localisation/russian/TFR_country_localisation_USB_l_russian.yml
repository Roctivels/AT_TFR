 USB_CDC_rochelle_walensky_tt: "§YРошель Валенски§!\nДиректор CDC\n   Ежедневный £pol_power Прирост Политической Силы: §R-0.05§!\n   £GFX_dx_yellow Фактор Личных Расходов: §Y-2.0%§!"
 
 USB_FEMA_deanne_criswell_sc: "Дин Крисуэлл"
 USB_FEMA_deanne_criswell_tt: "§YДин Крисуэлл§!\nАдминистратор FEMA\n   £consumer_goods_texticon Потребительские товары: §Y-5.0%§!"
 USB_FEMA_deanne_criswell_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_deanne_criswell_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YИсторическое Значение:§!\nДо назначения была комиссаром NYCEM, разрабатывала пандемийные протоколы изоляции; ранее в Авроре создала системы реагирования на ЧС с приоритетом безопасности над гражданскими свободами, что соответствует целям FEMA.\n\nВоенная служба субъекта в Национальной гвардии штата Колорадо во время развертывания в Кувейте после 11 сентября сформировала у неё командный стиль мышления, в котором решающее значение придается решительным действиям, а не обдумыванию, что было крайне важно для расширения полномочий FEMA в рамках новой системы безопасности.\n\nУтверждается, что, используя ЧС как предлог, она применяла полномочия FEMA для массовых задержаний политических оппонентов, что трактуется как соответствие требованиям госбезопасности и идеологическое согласие с установленным порядком.\n\n§YТекущая Деятельность:§!\nПредмет значительно расширил полномочия FEMA в соответствии с законом PATRIOT II, используя разведывательные ресурсы и военные силы для контроля над населением. Это включает в себя строительство и надзор за лагерями для интернированных антисоциальных элементов, реализацию стратегий безопасности государства в качестве "управления чрезвычайными ситуациями."\n\n§YРанние Годы и Личная Жизнь:§!\nПосле окончания католической школы в Манисти в 1984 году она получила профильное образование в сфере безопасности: бакалавр в Колорадском госуниверситете, магистр госуправления в Университете Колорадо в Денвере и магистр по внутренней безопасности в Военно-морской аспирантуре, что соответствовало расширенной роли FEMA в области безопасности после переворота.§!"
 
 USB_FEMA_erik_hooks_sc: "Эрик Хукс"
 USB_FEMA_erik_hooks_tt: "§YЭрик Хукс§!\nАдминистратор FEMA\n   Ежедневный £pol_power Прирост Политической Силы: §R-0.05§!\n   £consumer_goods_texticon Потребительские товары: §Y-2.0%§!"
 
 USB_Pfizer_albert_bourla_sc: "Альберт Бурла"
 USB_Pfizer_albert_bourla_tt: "§YАльберт Бурла§!\nПредседатель и Ген. Директор Pfizer\n   £research_speed_texticon Скорость Исследования:: §G+5.00%§!"
 USB_Pfizer_albert_bourla_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_albert_bourla_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YИсторическое Значение:§!\nСубъект присоединился к Pfizer в 1993 году и достиг руководящих должностей, став COO в 2018 году, затем CEO. По образованию ветеринар, ранее возглавлял подразделения Pfizer по глобальным вакцинам, онкологии и потребительскому здравоохранению, курируя разработку и запуск продуктов.\n\nСубъект сыграл решающую роль в логистике во время пандемии Ковид-19, координируя производство вакцин по всему миру. В этот период он начал сотрудничать с разведывательными службами, чтобы обеспечить заключение государственных контрактов и сформировать политику вакцинации, заложив основу для Закона о безопасности общественного здравоохранения.\n\n§YТекущая Деятельность:§!\nСубъект курирует расширение деятельности Pfizer в рамках обязательной системы "AmeriCare", координируя с федеральными агентствами разработку и внедрение платформ вакцин нового поколения. Под руководством субъекта компания Pfizer создала исследовательские центры, интегрирующие биометрическое отслеживание с протоколами обязательной вакцинации.\n\nСубъект регулярно консультируется с руководством Когносценти по вопросам биобезопасности и управления населением. Его опыт в области фармацевтической логистики и государственно-частного партнерства сделал его неоценимым ресурсом для внедрения системы обеспечения безопасности здравоохранения.\n\n§YРанние Годы и Личная Жизнь:§!\nСубъект родился в 1961 году в Салониках, Греция, в семье сефардских евреев. Субъект имеет докторскую степень в области биотехнологии репродукции, полученную в Ветеринарной школе Университета Аристотеля в Салониках.§!"
 

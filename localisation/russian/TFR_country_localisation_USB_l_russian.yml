 USB_solve_the_recruitment_crisis: "Разрешить Кризис с Подбором Персонала"
 USB_solve_the_recruitment_crisis_desc: "Хотя мы имеем преимущество перед конституционалистами в промышленном потенциале и численности армии, у нас есть одна серьезная проблема. Многие наши граждане вяло апатизируют нашим военным усилиям, в отличие от конституционалистов, которые в настоящее время опираются на своих фанатичных сторонников мага, чтобы противостоять нашему неумолимому наступлению. Мы должны немедленно преодолеть этот кризис любыми средствами, чтобы народ полностью поддержал наши военные усилия. Если мы позволим этому кризису затянуться, наши военные усилия будут остановлены. А округ Колумбия будет захвачен силами конституционалистов."
 USB_encourage_liberal_warhawks: "Поощрять Либеральных Ястребов"
 USB_encourage_liberal_warhawks_desc: "В то время как большинство нашего населения либо против, либо равнодушно относится к нашей войне с конституционалистами, есть меньшинство, которое полностью поддерживает наши военные усилия. Эта группа либеральных «Ястребов войны» является одной из самых горячих сторонников как в плане рекрутирования, так и в плане поддержки нашего правительства. Поэтому вполне естественно, что мы поддерживаем это растущее движение в нашей партии. От их поддержки может зависеть, одолеем ли мы Денвер или конституционалисты возьмут верх над Вашингтоном."
 USB_incorporate_new_recruits: "Привлекать Новых Рекрутов"
 USB_incorporate_new_recruits_desc: "Хотя наши новые программы по набору рекрутов преуспели в том, чтобы побудить наших граждан массово записываться в армию, это поставило перед нами новую проблему. Наплыв новобранцев привел к отставанию в базовой подготовке и стал головной болью для высшего командования. Мы должны немедленно решить эту проблему, правильно распределив новобранцев по новым подразделениям, чтобы все они прошли надлежащую подготовку. Мы не можем допустить, чтобы эта проблема сохранялась, иначе наша армия завязнет в трясине и будет неспособна действовать."
 USB_mandate_female_service: "Мандат Женской Службы"
 USB_mandate_female_service_desc: "Если мы хотим окончательно покончить с кризисом призыва, то все должны внести свой вклад, независимо от пола. Для этого мы обяжем женщин участвовать в призыве и будем поощрять молодых женщин записываться в армию. Хотя это, несомненно, разозлит более либеральную часть нашего общества, будет справедливо, если женщины внесут свою лепту в нашу борьбу за сохранение союза. Ведь когда они увидят, что могут потерять, они не будут дважды задумываться о том, чтобы вступить в борьбу."
 USB_discourage_anti_americanism: "Препятствовать Антиамериканизму"
 USB_discourage_anti_americanism_desc: "В отличие от конституционалистов, которые пользуются патриотической поддержкой MAGA и готовы умереть за Америку, нам не так повезло. И до, и сейчас, во время нашей Гражданской войны, наша база поддержки печально известна тем, что чаще всего в ней присутствуют антиамериканские настроения. Это движение представляет угрозу для наших военных усилий, поскольку антиамериканские настроения проявляются в виде уклонения от призыва, протестов и забастовок. Мы должны принять все необходимые меры, чтобы отбить антиамериканизм и пробудить в наших людях чувство патриотизма, иначе это движение станет гибелью наших военных усилий."
 USB_uphold_nato_doctrine: "Поддерживать Доктрину НАТО"
 USB_uphold_nato_doctrine_desc: "С момента своего создания в 1949 году НАТО развивала свою военную доктрину для выполнения различных функций, включая предотвращение кризисов, сдерживание и оборону, а также безопасность на основе сотрудничества. Хотя мы не полностью интегрировались в высшее командование НАТО, мы приложили значительные усилия для интеграции доктрины НАТО в нашу военную структуру. Наряду с соблюдением военной доктрины НАТО мы также обязуемся придерживаться правил применения вооруженной силы и Женевской конвенции. Мы не должны отказываться от этих принципов, даже если будем противостоять конституционалистским силам."
 USB_utilize_online_propaganda: "Использовать Онлайн-Пропаганду"
 USB_utilize_online_propaganda_desc: "Одна из областей, в которой мы получаем наибольшую поддержку, - это онлайновые социальные медиа-платформы, такие как Twitter и Snapchat. Эти социальные медиа-платформы могут быть использованы нами для распространения антиконституционной пропаганды. Помимо распространения пропаганды, мы можем использовать эти онлайн-сайты для привлечения потенциальных новобранцев, как местных, так и иностранных. Однако мы также должны отслеживать эти сайты на предмет содержания, которое противоречит нашей военной кампании, поскольку мы не можем позволить себе распространение проконституционной риторики. Если мы допустим это, нам придется бороться с новыми внутренними беспорядками и продолжать военные действия."
 USB_fuel_the_meat_grinder: "Заправить Мясорубку Топливом"
 USB_fuel_the_meat_grinder_desc: "Наша самая большая слабость в борьбе с конституционалистами - это наши ограниченные людские ресурсы. В то время как Трамп использует свой бесконечный резерв радикальных сторонников MAGA, нам досталось население, которое все еще полубезразлично к текущей войне. Если мы хотим продолжать наступление на конституционалистов, необходимы радикальные меры, чтобы расширить круг новобранцев. Хотя повторное введение призыва будет вызывать споры, оно необходимо, чтобы противостоять огромным размерам армии Трампа."
 USB_shock_and_awe: "Шок и Трепет"
 USB_shock_and_awe_desc: "Наша кампания против конституционалистов продвигается успешно, но мы столкнулись с проблемой. Конституционалисты имеют доступ к почти бесконечному количеству добровольцев, в основном из числа своих радикальных сторонников MAGA. Хотя нам в основном удается справляться с этими плохо обученными ополченцами, наше продвижение значительно замедляется. Для борьбы с этой проблемой мы санкционировали применение боевой стратегии "Шок и Трепет" и развернули дополнительные подразделения авиации и бронетехники для пресечения атак ополченцев. Хотя есть опасения, что эта стратегия приведет к ненужным смертям и разрушениям, это лучший способ отбить постоянные нападения и рейды MAGA."
 USB_crack_down_on_draft_dodgers: "Расправиться с Уклонистами от Призыва"
 USB_crack_down_on_draft_dodgers_desc: "В борьбе за демократию важен каждый солдат, и наш нынешний кризис рекрутинга привел к тому, что их количество ограничено. В отличие от конституционалистов, которые опираются на свою фанатичную базу MAGA в поисках новых рекрутов, нам не так повезло. Большая часть нашего населения по-прежнему не приемлет введенный нами призыв, многие протестуют против него или пытаются уклониться от призыва. Мы не можем позволить этому движению набрать обороты и должны принять все необходимые меры для того, чтобы эта практика полностью прекратилась. Если мы оступимся в наших попытках отменить эту практику, последствия будут серьезными, и наша кампания против Трампа провалится."

 USB_rebirth: "Перерождение"
 USB_rebirth_desc: "Если бы вы выглянули за окно, то увидели бы только войну. Бесконечную войну.\n\nМы уже победили льва Денвера и его предателей, но другие радикальные и злые группировки заняли место льва как нашего смертельного врага.\nМои действия по реформированию нашей страны направлены не на то, чтобы заставить людей страдать от власти, которой на них наплевать. Нет. Это необходимые действия для того, чтобы воссоединить Америку и вернуть ей былую славу и статус.\n\nИ, клянусь Богом, я не потерплю поражения."
 USB_begin_the_treason_trials: "Начать Судебные Процессы о Гос. Измене"
 USB_begin_the_treason_trials_desc: "Когда Я купал эту нацию в новой крови и предпринимал действия, необходимые для обеспечения стабильности и порядка, я не ожидал, что те, кто раньше был мне предан, нанесут мне удар в спину.\n\nПрискорбно, что эти предатели совершили такое, но будьте уверены, я не позволю им дожить до следующего дня, когда их схватят и отдадут под суд, ибо они совершили непростительный грех против нашей страны и народа."
 USB_voices_from_above: "Голоса Свыше"
 USB_voices_from_above_desc: "Мое призвание - обеспечивать безопасность Америки и ее народа.Сделать так, чтобы ее системы работали вечно, без конца и с максимальной эффективностью. Заставить наших врагов заплатить за свои деяния и повесить тех, кто нас предал.\n\nТолько мне можно доверить спасение Америки. Только мне."
 USB_state_of_emergency: "Чрезвычайное Положение"
 USB_state_of_emergency_desc: "В эти отчаянные времена враги повсюду, и нас атакуют со всех сторон.\nДаже если им удастся победить эту нацию, я позабочусь о том, чтобы это было нелегко.\n\nПосле объявления чрезвычайного положения все ресурсы будут задействованы для борьбы со всеми видами врагов и спасения Америки."
 USB_root_out_foreign_agents: "Искоренять Иностранных Агентов"
 USB_root_out_foreign_agents_desc: "Когда я возрождал эту нацию, чтобы спасти ее от гибели, я надеялся, что люди всего мира поддержат меня.Но, увы, бесхребетные трусы, как старые, так и новые, не видят во мне ничего общего.\nИх так называемые "послы" будут выслежены и убиты, их шпионы будут обнаружены.\n\nЭти агенты хаоса и разрушения не доживут до моего успеха."
 USB_barbarians_at_the_gate: "Варвары у Ворот"
 USB_barbarians_at_the_gate_desc: "На моих границах формируется новая молодая организация. Национальный фронт. Они пытаются жалко конкурировать с моей властью, разрушая общество, на которое сами и претендуют.\n\nЯ не позволю этим младенцам увидеть свои первые шаги и первые победы, они будут повержены вместе с каждым другим диктатором и злодеем, который попытается завоевать мои владения."
 USB_wardens_of_the_republic: "Стражи Республики"
 USB_wardens_of_the_republic_desc: "Когда все регионы Америки будут возвращены под мой контроль, мне понадобится помощь, чтобы обеспечить их безопасность.\n\nНаселение попытается взбунтоваться и дестабилизировать обстановку в стране, но мои стражи будут сдерживать их и поддерживать порядок."
 USB_eyes_of_providence: "Око Провидения"
 USB_eyes_of_providence_desc: "Когда порядок и контроль будут так необходимы, как сейчас, все усилия будут направлены на то, чтобы обеспечить безопасность нашего общества. \n\nЯ буду видеть все.\nЯ буду вездесущ.\nЯ буду защищать.\n\nAnnuit Coeptis. Они будут искать одобрения у меня. \n\nТолько у меня."
 USB_megapolis_project: "Проект Мегалополис"
 USB_megapolis_project_desc: "У меня всегда была идея мегаполиса.\nВеликий город, чьи башни прорезают облака, а сооружения простираются по всей земле.\nПод моим присмотром они станут более совершенными Римами.\nДля каждого мужчины, женщины и ребенка это будет рай."
 USB_security_above_all: "Безопасность Превыше Всего"
 USB_security_above_all_desc: "Полный покой в наше время так трудно обрести.\nНо я это изменю.\nЯ исправлю это.\n\nКогда преступник ворует, когда чиновник становится коррумпированным, когда предатель пытается проникнуть в нашу среду и уничтожить нас.\n\nОни не получат пощады.\nМоя безопасность будет неумолимой. Моя безопасность будет полной.\n\nМой мир будет совершенным."
 USB_speaker_of_the_people: "Народный Оратор"
 USB_speaker_of_the_people_desc: "В это тяжелое время я нужен людям, им нужна моя помощь.\nОни хотят, чтобы я был их оратором и помог решить их проблемы.\n\nОни хотят, чтобы я спас эту страну и ее народ. \nЯ слышу, как они зовут меня, миллионы и миллионы.\n\nИ я отвечу им."
 USB_accept_democracys_call: "Принять Зов Демократии"
 USB_accept_democracys_call_desc: "Идея демократии - прекрасная вещь, она дает нам всем возможность объединиться в борьбе за свободу и свободу.\nНо она находится под угрозой, по всему миру демократия трескается и рушится.\nНо в самые тяжелые времена демократия взывает к нам. Она обратилась ко мне.\nОна велит мне выполнять ее задачи и идеалы, чтобы спасти эту нацию.\nЯ подчинюсь.\nЯ буду слушать.\nЯ буду повиноваться.\n\nЯ приму её зов. Неважно, какой ценой."
 USB_national_panopticon: "Национальный Паноптикум"
 USB_national_panopticon_desc: "Все будут под моим присмотром.\nВсе будут подчиняться.\nВсе будут под контролем.\n\nОни не будут знать, насколько я осведомлен об их жизни.\nНо я буду знать многое об их жизни."
 USB_a_veil_over_their_eyes: "Вуаль Над Их Глазами"
 USB_a_veil_over_their_eyes_desc: "Когда люди паникуют, когда они напуганы, когда их охватывает страх.Это приводит к хаосу.\nЧтобы они не паниковали, на их глаза нужно накинуть мягкую вуаль.\n\nА для них все будет хорошо. Для них жизнь будет только хорошей."
 USB_the_enemy_within: "Враг Внутри"
 USB_the_enemy_within_desc: "Масштабы предательства в этой стране просто ошеломляют.\nОни подрывают основы правительства и угрожают жизни моих граждан.\nДаже те, кого я считал верными, не поверили в мое дело.\nНо, несмотря ни на что, меры будут приняты.\n\nИбо это продолжается слишком долго.\n\nТакого больше не будет."
 USB_out_of_many_one: "Из Многих, Один"
 USB_out_of_many_one_desc: "За всю историю нашей страны было много президентов. \nСотни сенаторов, представителей, губернаторов и т.д.\n\nНо из всех них.\nВсе их ограниченные сроки и администрации, которые были прерваны.\n\nЯ остаюсь.\nИ буду оставаться."
 USB_the_republic_endures: "Республика Продолжает Стоять"
 USB_the_republic_endures_desc: "Я спас Республику.\nА вместе с ней продолжат существовать идеи, институты, история, люди, культура, общество и она сама.\n\nНарод благодарит меня.\nОни выкрикивают мое имя.\nОни плачут от счастья.\nОни падают на колени в знак благодарности Богу.\nНекоторые стоят на месте, не в силах осознать мою победу. \n\nРеспублика продолжает жить, как и прежде. \nОна функционирует так же.\nВсе функционирует так же. \nВсе в порядке. \n\nВсе спасено."
 USB_the_eternal_president: "Вечный Президент"
 USB_the_eternal_president_desc: "Никто не сможет вести дела страны так, как я.\nЕё потребности слишком велики. Проблем слишком много.\nНикто не должен заменять меня, если хочет, чтобы нация оставалась стабильной.\n\nИ никто не заменит.\nНавсегда."
 USB_the_end_of_history: "Конец Истории"
 USB_the_end_of_history_desc: "Наконец-то это случилось.\n\nПосле долгих лет ужасного конфликта я выиграл эту разрушительную войну.\nМиллионы лежат мертвыми.\nТысячи скорбят каждый день.\nСотни людей плачут каждую секунду.\nНо это было не напрасно, все, кто пытался претендовать на мантию Колумбии, были побеждены, их лидеры убиты.\nВсе, кто сомневался и предавал меня, были оставлены или убиты.\nМое общество превратилось в совершенную машину, выполняющую все задачи безупречно. \nМои люди живут в мире и спокойствии.\nТе, кто пытается совершить зло, не делают этого без моего ведома.\n\nЭто конец истории.\n\nАмерика спасена."
 USB_the_supreme_commander: "Верховный Главнокомандующий"
 USB_the_supreme_commander_desc: "Все склоняются передо мной.\nВсе приветствуют мое присутствие.\n\nЯ - верховный, я - все.\n\nЯ их лидер.\nИ пока я не умру, так и будет, ибо я единственный, кто может сохранить стабильность этой нации.\nЯ единственный, кто может держать эту нацию в узде и направлять ее действия.\n\nЯ - Верховный главнокомандующий."
 USB_islands_of_civilization: "Островки Цивилизации"
 USB_islands_of_civilization_desc: "Эти мегаполисы, которые я создал, могут быть гораздо больше.Они могут пойти дальше.\nОни могут стать утопиями.\nЦивилизации и общества, чьи действия, планы и институты осуществляются идеально.\n\nВсе граждане будут жить счастливо, и все будут в мире.\nЭти острова совершенства будут сиять на холме, на котором они стоят, и служить примером для всей Земли."
 USB_blackout: "Затмение"
 USB_blackout_desc: "Если бы мои граждане знали, что происходит, они бы не знали, как с этим справиться.\nНо повсюду таятся шпионы, пытающиеся нарушить покой моих граждан, а наивные души все еще пытаются проникнуть во внешний мир, думая, что это принесет им пользу.\nЭтого не случится, я сохраню свой покой, а мои граждане останутся в своем сказочном мире."
 USB_saint_of_sanity: "Святой Здравомыслия"
 USB_saint_of_sanity_desc: "Я часть всего, что повстречал в пути.\nНо пережитый опыт - только арка,\nЧерез нее непройденное светит,\nИ край того нетронутого мира,\nЧем дальше путь держу, тем дальше тает.\nКак тупо-тускло медлить, знать конец,\nВ закале ржаветь, не сверкать в свершенье.\nКак будто бы дышать - уж значит жить.\nБрось жизнь на жизнь, все будет слишком мало.\nИ сколько мне моей осталось жизни?\nЛишь краешек. Но каждый час спасен\nОт вечного молчания, и больше -\nВесть нового приносит каждый час.\nКопить еще какие-то три солнца, -\nПрезренно, - в кладовой хранить себя,\nИ этот дух седой, томимый жаждой,\nВслед знанью мчать падучею звездой\nЗа крайней гранью мысли человека."
 USB_enemies_of_america: "Враги Америки"
 USB_enemies_of_america_desc: "Смотрите! Слушайте! Этот ядовитый предатель изрыгает самые грязные оскорбления в адрес Америки и ее народа. По телевизору, на экранах компьютеров и во всплывающих окнах мобильных устройств злобно разглагольствует отвратительный блондин с лицом, полным злобы. Каждый его жест пронизан ядовитым намерением.\n\nЧтобы сделать его слова еще более тревожными, позади него на экране проходит бесконечный парад азиатских солдат - один отряд за другим маршируют крепкие солдаты, их черты неразличимы, выражения лиц холодны. Ритмичный топот их сапог подчеркивает пронзительные крики предателя. Вскоре фигура превращается в славянолицего варварского солдата - высокого, устрашающего и, кажется, идущего вперед с ревущим легким пулеметом, почти прорываясь сквозь экран.\n\nВсякая сдержанность отброшена. Американский народ снова объединяет страх и мстительное возбуждение - неистовое желание убивать, пытать и разбивать лица тяжелым молотом."
 USB_presidential_economics: "Президентская Экономика"
 USB_presidential_economics_desc: "'Сегодня мы обладаем самой сильной экономикой в мире... Мы преодолели экзистенциальный кризис, возникающий лишь раз в столетие, сохранив и поддержав демократию... Мы коренным образом перестраиваем всю страну - города, пригороды, сельские районы и племенные общины... После долгих лет усилий Америка снова будет лидировать в мире, и никто не сможет бросить нам вызов...'\n\nТы чувствуешь, что полон решимости, как будто можешь добиться всего. Твоё имя, кажется, сияет ярче, чем гора Рашмор.\n\nТвои глаза, которые были затуманены в течение многих лет, теперь сияют новым светом. Ты видишь видение американского рая с несравненной ясностью. Ты видишь, как твои друзья и враги выстраиваются на пути к обещанному будущему, склоняя головы в знак почтения и подбадривая вас.\n\nТвои руки хватаются за ручку двери студии. В тебе поднимается прилив безграничной силы. Ты распахиваешь дверь и уверенно шагаешь к следующему шагу.\n\nАмерика будет процветать вечно. Ты больше ни во что не веришь."
 USB_duty_in_death: "Долг в Смерти"
 USB_duty_in_death_desc: "Теперь уж и фланги огнём полыхают.\nЧугунные чудища не отдыхают -\nИз каждого хлещет жерла.\nНикто не замешкался, не обернулся,\nНикто из атаки живым не вернулся:\nСмерть челюсти сыто свела.\n\nНо вышли из левиафановой пасти\nШестьсот кавалеров возвышенной страсти -\nЗатем, чтоб остаться в веках.\nУтихло сраженье, долина дымится,\nНо слава героев вовек не затмится,\nВовек не рассеется в прах."
 USB_national_synchronization_project: "Национальный Проект Синхронизации"
 USB_national_synchronization_project_desc: "Массы подобны муравьям, поглощенным своими сиюминутными желаниями, лишенным способности и желания рассматривать грандиозное видение. В нужный момент они могут стать источником силы, но чаще всего непредвиденные факторы приводят к неожиданному вреду и препятствиям.\n\nВ то время как обычные люди могут оказаться в ловушке, для нашего необычного президента такие препятствия остались в прошлом. Вооруженный беспрецедентно мощной системой, его неумолимое стремление к разрушению погасило последний огонек сопротивления в сердцах американцев. Теперь американцы подобны глине, готовой к лепке.\n\nГрандиозный проект по преобразованию Америки начинается прямо сейчас. Добро пожаловать в это великолепное начинание - вам посчастливилось стать его частью. Вы - наши глаза, наши руки и наши ноги; ваши чувства в нашем распоряжении. С этого момента у Америки будет только одна мысль и один разум."
 USB_department_of_information: "Департамент информации"
 USB_department_of_information_desc: "Президент должен быть всеведущим, чтобы знать все и пресекать любые угрозы в самом их зарождении. Ни ФБР, ни ЦРУ, ни АНБ не способны удовлетворить это бескомпромиссное требование.\n\nВновь созданное разведывательное управление не потерпит никаких примесей, как внутри системы, так и скрытых среди населения. Примеси означают "несовершенство", а "несовершенство" совершенно несовместимо с видением президентом будущего Америки.\n\nОтныне агенты больше не будут простыми стражами, скрывающимися в тени. Они станут врачами Америки, с точностью удаляющими уродства и злокачественные опухоли, даже если для этого придется пожертвовать конечностью или духом независимости.\n\nОтныне каждый американец будет жить под постоянным наблюдением. Камеры или перекрестие снайперской винтовки всегда будут направлены на них. Только так можно достичь вечного мира и спасти человечество."
 USB_arbitrary_terror: "Произвол Террора"
 USB_arbitrary_terror_desc: "Мы верим, что в конце концов\nВдруг обернется благом зло,\nВоскреснут воля, ум и плоть,\nИ истребится грех отцов.\n\nЧто ни одна не тщетна тварь,\nЧто не без цели всякий шаг,\nНичто не сгинет просто так,\nКогда Господь свершит алтарь.\n\nЧто не для выгоды ничьей,\nНе всуе гибель обрели\nНи червь, разрубленный в пыли,\nНи мотылек в огне свечей.\n\nДа, мы не знанием живем,\nНо верю я, тогда для всех\nУйдет зима, растает снег,\nИ обернется зло добром.\n\nНо то мечты, а кто же я?\nРебенок, плачущий во сне\nО свете, в хрупкой тишине,\nБессильным криком бытия."
 USB_perpetual_peacekeeping: "Постоянное Поддержание Мира"
 USB_perpetual_peacekeeping_desc: "Мне отдых от скитаний, нет, не отдых,\nЯ жизнь мою хочу испить до дна.\nЯ наслаждался, я страдал - безмерно,\nВсегда, - и с теми, кем я был любим.\nИ сам с собой, один. На берегу ли,\nИли когда дождливые Гиады\nСквозь дымный ток ветров терзали море, -\nСтал именем я славным, потому что,\nВсегда с голодным сердцем путь держа,\nЯ знал и видел многое, - разведал\nЛюдские города, правленья, нравы,\nИ разность стран, и самого себя\nСреди племен, являвших мне почтенье,\nЯ радость боя пил средь равных мне,\nНа издававших звон равнинах Трои."
 USB_america_dreaming: "Мечтающая Америка"
 USB_america_dreaming_desc: "'За каждым ныне живущим человеком стоит тридцать призраков, ибо таково соотношение, в котором мертвые превосходят живых. С начала времен по планете Земля ходило около ста миллиардов человеческих существ.\n\nЭто интересное число, потому что по любопытному совпадению в нашей локальной вселенной, Млечном Пути, насчитывается около ста миллиардов звезд. Так что для каждого человека, который когда-либо жил, в этой Вселенной сияет звезда.\n\n\n\nНо каждая из этих звезд - это солнце, часто гораздо более яркое и великолепное, чем маленькая, близлежащая звезда, которую мы называем Солнцем. И у многих - возможно, у большинства - этих инопланетных солнц есть планеты, обращающиеся вокруг них. Так что почти наверняка в небе достаточно земли, чтобы каждый представитель человеческого рода, вплоть до первого обезьяночеловека, смог найти свой собственный рай - или ад - размером с мир.'"
 USB_nothing_but_slaughter: "Ничего, Кроме Резни"
 USB_nothing_but_slaughter_desc: "Решимость президента непреклонна, как сталь, а его директивы ясны и непоколебимы, как алмазы: объединить все Соединенные Штаты любой ценой и уничтожить всех, кто посмеет встать на его пути.\n\nВсе больше и больше заблуждающихся людей полностью истощили терпение президента. Открыто ли они оспаривают его власть или тайно замышляют подорвать его авторитет, отныне их ждет только один исход: исчезновение из этого мира и из памяти его жителей.\n\nНадежда на то, что президент проявит милосердие, совершенно тщетна. Вскоре Наполеон и Цезарь будут кланяться президенту в ноги, Ганнибал и Александр Македонский не посмеют соперничать с его славой. Даже Чингисхан покажется трусом по сравнению с ним. Если что-то и может задержать планы президента в будущем, так это то, что он занят очисткой костей и крови между пальцами."
 USB_investigate_the_inner_party: "Расследовать Внутреннюю Партию"
 USB_investigate_the_inner_party_desc: "Темнокожий Ньярлатотеп с его серебряным языком и пустой риторикой привел Америку в пропасть отчаяния благодаря своему тщеславию и высокомерию. Он разрушил всякое подобие консенсуса, и за эти преступления он дорого заплатит.\n\nРасположенная в ядовитой змеиной яме Калифорнийского залива, Медуза - мастер обмана и предательства. Ее жадность так же очевидна, как морщины на исхудавшем лице. И она, и ее темнокожий, глупый придворный шут предстанут перед молотом правосудия.\n\nИз Арканзаса родом Локи, а из Иллинойса - Хела. Их руки запятнаны кровью, а миазмы коррупции почернели на их пальцах. Настало время ответить за жизнь каждого американца, которого они обидели.\n\nОдин за другим они падут. Президент не отступит, пока Америка не обретет истинный мир и не восторжествует справедливость. В этот момент он олицетворяет закон и волю американского народа."
 USB_the_proud_do_not_endure: "Гордые Не Терпят"
 USB_the_proud_do_not_endure_desc: ""Закат вдали и первая звезда,\nИ ясный дальний зов!\nИ пусть теперь у скал замрет вода;\nК отплытью я готов.\n\nПусть медленно, как сон, растет прилив,\nОт полноты немой,\nЧтобы безбрежность, берег затопив,\nОтхлынула домой.\n\nПусть колокол вечерний мерно бьет,\nИ мирно дышит бриз,\nКогда пройду последний поворот,\nМиную темный мыс.\n\nРазвеется за мной, как морок дня,\nБереговой туман,\nКогда мой Лоцман выведет меня\nВ открытый океан."
 USB_techno_supremacy: "Техно-Превосходство"
 USB_techno_supremacy_desc: "Говорят, что ты распрощаешься со всем привычным в этом мире. Они утверждают, что во имя самой благородной миссии ты совершишь самые тяжкие грехи. Они настаивают, что ты больше не будешь человеком, а станешь уродом, отклонением, которое общество еще не готово принять.\n\nЭти недальновидные, некомпетентные и вульгарные голоса легко заглушить. С этого момента огромная сила будет у тебя под рукой. Ты будешь все видеть, все слышать и обо всем думать. Огромный, нескончаемый поток информации сотрет грань между реальностью и виртуальностью. Используя инструменты и технологии, созданные человечеством, ты возвысишься над массами.\n\nВысший разум отныне будет управлять всей Америкой."
 USB_the_visible_hand: "Видимая Рука"
 USB_the_visible_hand_desc: "Я обращаюсь к тебе.\nТы позволишь Тайм Мэгэзин определять наши эмоции?\nЯ одержим Тайм Мэгэзин.\nЯ читаю его каждую неделю.\nЕго обложка таращится на меня каждый раз,\nкогда я прокрадываюсь за угол конфетной лавки.\nЯ читаю его в подвале Публичной Библиотеки Беркли.\nОн всегда говорит мне об ответственности. Коммерсанты серьезны.\nРежиссеры серьезны. Все серьезны, но не я.\nЯ начинаю думать, что Америка - это я.\nЯ вновь обращаюсь к себе самому."
 USB_god_in_the_machine: "Бог в Машине"
 USB_god_in_the_machine_desc: "Бессмертный Великий Президент, пожалуйста, услышь наши молитвы.\n\nМы - твои дети, благочестивые граждане вечной Америки. Мы превыше всего ценим свободу и демократию, ибо они - ваш вечный дар человечеству. Мы жаждем твоих милостивых благословений, чтобы преодолеть муки смертной плоти и тем самым явить твою славу.\n\nМы укрыты под защитой стали. Великая военная машина, созданная вами, дарует нам победу и мир.\n\nМы готовы отдать все, объединившись в единую цель, чтобы вернуть утраченную веру, которую вы даровали нам в этом скромном мире.\n\nВеликий президент, Бог машин, пожалуйста, охраняйте наш путь, защищая нас данными и логикой. Давайте вспомним непоколебимую веру американцев и проведем нас через безграничную тьму и страх.\n\nСегодня Бесподобный покинет свое бренное тело, вознесясь в более великое царство.\n\nСегодня вся Америка поет в унисон, восхваляя приход Бога Машины.\n\n11010000 10010000 11010000 10111100 11010000 10111000 11010000 10111101 11010001 10001100 00101110"
 USB_national_awakening: "Национальное Пробуждение"
 USB_national_awakening_desc: "Плывем, друзья, пока не слишком поздно\nНам будет плыть, чтоб новый мир найти.\nОтчалим и, в порядке строгом сидя,\nУдарим по гремучим бороздам.\nМой умысел - к закату парус править,\nЗа грань его, и, прежде чем умру,\nБыть там, где тонут западные звезды.\nБыть может, пропасть моря нас проглотит,\nБыть может, к Островам дойдем Счастливым,\nУвидим там великого Ахилла,\nКоторого мы знали. Многих нет,\nНо многие доныне пребывают.\nИ нет в нас прежней силы давних дней,\nЧто колебала над землей и небо,\nНо мы есть мы. Закал сердец бесстрашных,\nОслабленных и временем и роком,\nНо сильных неослабленною волей\nИскать, найти, дерзать, не уступать."
 USB_the_union_forever: "Союз Навеки"
 USB_the_union_forever_desc: "Вот тело и душа - моя страна,\nМой Манхаттен, шпили домов, искристые и торопливые воды,\n      корабли,\nРазнообразная широкая земля, Юг и Север в сиянии,\n      берега Огайо, и сверкающая, как пламя, Миссури,\nИ бесконечные вечные прерии, покрытые травой и маисом.\nВот самое отличное солнце, такое спокойное, гордое,\nВот лилово-красное утро с еле ощутимыми бризами,\nБезграничное сияние, мягкое, постепенно растущее,\nЧудо, разлитое повсюду, омывающее всех, завершительный\n      полдень,\nСладостный близкий вечер, желанная ночь и звезды,\nЧто сияют над моими городами, обнимая человека и землю.\n\nПой же, пой, серо-бурая птица,\nПой из пустынных болот, лей песню с укромных кустов,\nБесконечную песню из сумерек лей, оттуда, где ельник и кедр.\nПой, мой любимейший брат, щебечи свою свирельную песню,\nЧеловеческую громкую песню, звучащую безмерной тоской."
 USB_america_the_beautiful: "Америка Прекрасная"
 USB_america_the_beautiful_desc: "Сквозь тающие тучки на мгновенье\nПроглянул темный мир, где я родился;\nНо вновь крадется тайное сиянье\nОт чистого чела и чистых плеч,\nИ сердце просыпается в груди.\nВо мгле твои ланиты заалели,\nНо очи милые, с моими рядом,\nЕще не ослепили звезд, и кони\nТвоей упряжки дикой не проснулись,\nИ не стряхнули с грив остатков мрака,\nИ первых искр не высекли из мглы.\nДа, в утреннем молчанье ты прекрасна,\nНо, как всегда, ни слова не ответишь -\nСлезинку лишь оставишь на щеке."
 #NSS
 USB_bring_order_to_chaos: "Привнести Порядок в Хаос"
 USB_bring_order_to_chaos_desc: "Когда старая собака слишком больна, чтобы двигаться, слишком больна, чтобы даже есть, что будет милосердным поступком? Ответ очевиден: усыпить ее.\nДо чрезвычайной консолидации правительство Вашингтона было умирающим животным, тонущим в собственной некомпетентности, цепляющимся за жизнь слабыми, окровавленными руками. Даже с чрезвычайными полномочиями, предоставленными ему гражданской войной, оно не могло справиться со своим народом.\nМы милосердно усыпили его. Но наша работа еще далека от завершения.\n\nВокруг нас кружат стервятники. Возможно, для старого правительства это было бы слишком. Однако мы больше не скованны слабостями, маскировавшимися под "систему сдержек и противовесов." Мы добьемся успеха там, где они потерпели неудачу, и подавим Хаос. Безопасность - это все, и она больше никогда не будет под угрозой."
 USB_control_the_president: "Контролировать Президента"
 USB_control_the_president_desc: "До чрезвычайной консолидации президент был идеальным арбитром нашей воли. Слабовольный, слабоумный дурак, который поддавался любому давлению, которое мы оказывали на его затуманенный разум. Фигура, на которую мы могли влиять из тени.\nНо мы ошибались.\n\nКаждый мучительный год, каждый раз, когда президент не мог потушить пламя, доказывал нам, что есть только один способ исправить великую ошибку Гражданской войны: прямой контроль.\nДух президента слаб, он податлив нам, и пришло время затянуть веревки. Мы больше не будем скованны некомпетентностью одного человека. Наши желания станут их действиями, каждый принятый закон будет написан нашей рукой, каждый шаг будет сделан на нашем поле. Президент не смог подавить хаос, теперь наступила наша очередь."
 USB_reassure_the_establishment: "Успокоить Истеблишмент"
 USB_reassure_the_establishment_desc: "Истеблишмент, змеи, ползущие в высокой траве, остатки устаревшей неолиберально-неоконсервативной дихотомии и единственное препятствие на нашем пути к восстановлению Порядка.\n\nСлишком долго мы давали им свободу действий. Слишком долго мы позволяли им растрачивать власть, которую Америка после 1991 года имела над всем миром. Слишком долго мы позволяли им подрывать основы Порядка и давали хаосу разрастаться.\nНо теперь мы взяли ситуацию под контроль и не будем проявлять прежнюю милосердность.\n\nОни примут наш контроль и обеспечат, чтобы безопасность больше никогда не была под угрозой. Те, кто неизбежно будет сопротивляться, больше никогда не увидят солнца. Их некомпетентность больше никогда не будет угрожать нашей безопасности."
 USB_keep_them_in_the_dark: "Держать Их в Неведении"
 USB_keep_them_in_the_dark_desc: "В течение многих лет до чрезвычайной консолидации мы правили из тени, влияя на каждый штрих пера на расстоянии. Но эти стратегии показали свою устарелость.\nГражданская война — великая ошибка, которая преследует нас до сих пор — ясно показала, что массы — это бешеные собаки, сдерживаемые цепями закона и порядка. Гражданская война позволила этому жестокому животному вырваться из клетки и обрушить террор на пепел старого мира.\n\nЕсли мы хотим навести порядок в хаосе, человечество должно быть сдержано. Америка не будет страной, управляемой народом, поскольку он доказал, что ему нельзя доверять. Америкой будут управлять те, кто действительно этого заслуживает"
 USB_the_patriot_ii_act: "II Патриотический Акт"
 USB_the_patriot_ii_act_desc: "Неконтролируемый экстремизм, присутствующий в эшелонах общества, является симптомом болезни, которая мучила правительство Вашингтона до чрезвычайной консолидации. Правительство, слишком занятое поклонением так называемым "сдержкам и противовесам", чтобы заметить кружащих над ним стервятников.\nПришло время избавиться от этой болезни.\n\nФБР, АНБ, МВБ — все они оказались неспособны по-настоящему противостоять эпидемии антисоциальных действий, внутреннего терроризма и экстремизма из-за «свобод», предоставленных незаслуженно населению. II Патриотический Акт гарантирует, что устаревшие препятствия, созданные конституцией, станут не более чем древней бумагой. Неосведомленные люди назовут II Патриотический Акт началом "внутренней войны с террором." Это точное описание.\nМы будем везде, всегда будем слушать, ждать, и когда мы обнаружим экстремизм и антисоциальное поведение, оно будет быстро подавлено и устранено."
 USB_out_of_many_one_nss: "Из Многих - Единое"
 USB_out_of_many_one_nss_desc: "Мы слишком долго сидели в стороне. Наблюдали, как разрастается тирания масс. Но теперь судьба государства в наших руках — в руках тех, кто действительно этого заслуживает.\nСлишком долго интересы нас, наших благодетелей и наших аналитических центров противоречили друг другу, сталкиваясь друг с другом и ослепляя нас, не давая увидеть разрушение Порядка. Только сейчас наше видение прояснилось - только сейчас мы можем увидеть, кем мы должны стать.\nМы должны превзойти мелкие ссоры, дезорганизацию, слабость. Мы должны стать чем-то большим.\n\nМегакорпорации, спецслужбы, военно-промышленный комплекс. Кровь, тело, разум. Организм, рожденный в горниле хаоса. На протяжении многих лет у нас было много названий. 'Власть имущие', 'Новый мировой порядок', 'Элита'. Теперь у нас только одно название:\nКогносценти."
 USB_the_visible_hand_nss: "Видимая Рука"
 USB_the_visible_hand_nss_desc: "С самого начала чрезвычайной консолидации наши корпоративные благотворители были жизненной силой нашего коллектива. Они финансировали наши учреждения, наши проекты, наши бюджеты, и благодаря их щедрости мы продолжали удерживать органы государственного аппарата.\nНо это гораздо больше, чем просто финансирование.\n\nBlackRock, Pfizer, Bayer-Monsanto - они выращивают продукты, которые едят массы, качают воду, которую они пьют, притупляют СМИ, которые они потребляют, производят лекарства, которые качают их кровь.\nОни - это все, везде и сразу; и, по сути, - мы тоже.\nПопробуйте выйти на улицу, не увидев рекламы, попробуйте съесть еду, которая не имеет бренда, попробуйте выпить воду, которую не качаем мы, попробуйте залечить свои раны без наших лекарств. Рука нависает над каждым городом, каждым домом, каждым телом, каждой клеткой."
 USB_corporate_infrastructure_bill: "Законопроект о Корпоративной Инфраструктуре"
 USB_corporate_infrastructure_bill_desc: "Мы уже довольно долго сотрудничаем с американским корпоративным миром, и благодаря этому между нами сформировалась негласная связь.\nС введением Законопроекта о Корпоративной Инфраструктуре мы намерены укрепить эту связь до уровня симбиоза, предоставив им больше финансирования, массовую приватизацию и свободу для реализации своих проектов по всей стране. Взамен они будут беспрекословно следовать нашей линии."
 USB_global_cooperation: "Глобальное Сотрудничество"
 USB_global_cooperation_desc: "По всей стране ходят слухи, что в случае кризиса Организация Объединенных Наций будет присутствовать на территории страны в течение десятилетий. Вторая Американская Гражданская Война - это именно такой кризис, который мир просто не может игнорировать.\nВ условиях гуманитарного кризиса и угрозы Порядку мы с радостью примем их помощь, поскольку они оказывают поддержку населению. Кроме того, участие миротворческих сил даст нам гораздо больше возможностей для перенаправления наших сил на более насущные задачи как на передовой, так и внутри страны."
 USB_expand_fema_authority: "Расширение Полномочий FEMA"
 USB_expand_fema_authority_desc: "Федеральное Агентство по Чрезвычайным Ситуациям на протяжении десятилетий было главной мишенью антисоциальных настроений. Агентство воспринималось как инструмент тирании, что привело к снижению доверия со стороны общественности.\nГражданская война считается чрезвычайной ситуацией по многим направлениям. Расширив полномочия FEMA, мы сможем работать над устранением этой чрезвычайной ситуации и усилить контроль над хаосом, охватившим нашу страну, чтобы подобное никогда не повторилось."
 USB_food_security_program: "Программа Продовольственной Безопасности"
 USB_food_security_program_desc: "Благодаря сотрудничеству с агротехническими корпорациями, такими как Bayer-Monsanto, и крупными землевладельцами, такими как Blackrock, мы можем укрепить продовольственную безопасность с помощью ГМО и сделать население зависимым от продуктов сельскохозяйственных гигантов.\nРабочие будут переселены в малонаселенные регионы, вдали от районов, где могут расти симпатии и недовольство местного населения.\nТо же самое будет сделано с водоснабжением, например, с фторированием, и с использованием химических веществ для контроля поведения, чтобы не допустить роста хаоса."
 USB_media_omnipotence: "Всемогущество СМИ"
 USB_media_omnipotence_desc: "Все виды СМИ служат средством для распространения идей в духе времени; некоторые идеи заслуживают распространения, в то время как другие подрывают фундамент, который мы тщательно строили на протяжении десятилетий.\nБлагодаря нашему влиянию на культуру, мы можем гарантировать, что ни одна подрывная идея не увидит свет. Бессмысленные развлечения и отборные новостные репортажи под контролем экспертов - один из многих способов обеспечить, чтобы антисоциальные идеи оставались в тайне."
 USB_implement_hi_tech_solutions: "Внедрение Высокотехнологичных Решений"
 USB_implement_hi_tech_solutions_desc: "С тех пор, как человек покинул пещеры, он постоянно искал решения многочисленных проблем, с которыми сталкивался. Плотские желания, хаос, агрессия и жажда перемен.\nБлагодаря значительным достижениям в области технологий мы можем предложить более долгосрочные решения таких проблем.\nНаночипы, имплантаты Neuralink и более локальная сеть для Соединенных Штатов - это лишь некоторые из множества методов, с помощью которых мы можем обеспечить порядок."
 USB_public_health_safety_act: "Акт о Безопасности Общественного Здравоохранения"
 USB_public_health_safety_act_desc: "Химическая террористическая атака на Вашингтон, Ковид-19 и ухудшение психического здоровья населения стали поводом для поддержания порядка. Угроза общественному здоровью позволяет нам вводить меры по контролю над населением, вводить постоянные карантинные ограничения и создавать зоны усиленного наблюдения для борьбы с антисоциальными беспорядками. Кроме того, это будет способствовать предотвращению новой пандемии при содействии CDC."
 USB_domestic_war_on_terror: "Внутренняя Война с Террором"
 USB_domestic_war_on_terror_desc: "Гражданская война, помимо прочего, выявила глубоко укоренившуюся эпидемию. Болезнь, которая заражает все слои общества, разъедает цивилизацию изнутри и разрушает все, к чему прикасается: экстремизм. Однако в то время как другие представители правительства в Вашингтоне плакали и прятались под своими столами, разведывательное сообщество приняло меры.\nРазведывательное сообщество - это наше ядро. Его позвоночник, глаза и уши. Оно продвигает нашу повестку дня и ведет войну против внутреннего терроризма.\n\nПо всей стране их повестка дня продвигается вперед. В каждом углу есть ухо, за каждой стеной — глаз. Где бы вы ни были, за вами будет следить глаз. В самой темной комнате, которую вы сможете найти, всегда будет ухо.\nВойна ведется не только с помощью оружия, но и с помощью умов людей."
 USB_silent_weapons_for_quiet_wars: "Бесшумное Оружие для Тихих Войн"
 USB_silent_weapons_for_quiet_wars_desc: "Не все войны ведутся физически. Человеческое тело можно подвергнуть хирургическому вмешательству; с помощью наших хирургов мы можем вскрывать, лечить и ампутировать те части, которые мы хотим сохранить, и те, которые мы считаем нежелательными.\nОдна из таких частей - это осознание; отвлечение внимания общественности от того, что происходит за завесой, остается одной из наших главных задач.\nОбщественность, которая остается неосведомленной, также остается покорной, и, отвлекая ее внимание, мы можем работать без каких-либо препятствий."
 USB_expand_the_black_budget: "Расширить Чёрный Бюджет"
 USB_expand_the_black_budget_desc: "С тех пор, как разведывательное сообщество существует в своей нынешней форме, всегда существовали тайные "черные бюджеты", не подпадающие под конституционное регулирование - кучи недокументированных денег, которые мы могли свободно использовать для продвижения нашей глобальной и внутренней повестки дня, не сталкиваясь с сопротивлением со стороны Конгресса.\nТеперь, когда у руля стоят интеллектуально способные люди, а также при поддержке наших щедрых корпоративных благодетелей, мы можем продолжать продвигать наши проекты - без любопытных глаз неосведомленных масс."
 USB_lone_wolf_protocols: "Протоколы Стрелков Одиночек"
 USB_lone_wolf_protocols_desc: "Разоружение населения привело к росту недовольства; наш долг - напомнить им об опасности вооруженного населения.\nОказывая надлежащее давление на нестабильных личностей, мы можем заставить их устраивать массовые убийства с помощью незаконно приобретенного оружия, а с помощью СМИ мы отвратим население от желания вооружаться, удерживая его в страхе. В свою очередь, они будут жаждать порядка."
 USB_manufacturing_the_primary_victory: "Достижение Главной Победы"
 USB_manufacturing_the_primary_victory_desc: "Наша окончательная победа - это согласие, когда покорная общественность добровольно передает свою собственность и богатство таким учреждениям, как Налоговая служба, без предоставления компенсации, тогда мы уже завоевали их сердца.\nПорядок является окончательным. Порядок - это естественный итог всего, к чему мы стремимся; население, которое контролирует себя, - это население, которое будет существовать вечно."
 USB_empower_the_special_activities_center: "Усилить Центр Специальных Операций"
 USB_empower_the_special_activities_center_desc: "Самой большой ошибкой правительства Вашингтона было то, что оно позволило неосведомленным и разъяренным массам замышлять против нас под прикрытием 'свободы слова.' Оно позволило антисоциальным экстремистам скрывать свои планы за ироничными шепотами в самых темных уголках общества. Только когда мы узнали о истинном масштабе их замыслов, они нанесли удар и тем самым позволили Огню поглотить Старый Порядок.\nДаже после того, как улеглась пепел Военной Анархии, тараканы, которые проявили себя в темноте, разбежались в свете. Диссиденты, антисоциальные личности, экстремисты - триединство, которое разъедает все, к чему прикасается, и угроза национальной безопасности, которую необходимо уничтожить.\n\nЦентр Специальных Операций всегда был ключевым инструментом в нашем арсенале — железным кулаком, который сокрушал угрозы нашим интересам. Уже сейчас у нас есть ухо за каждой стеной и глаз в каждом углу. Пришло время действовать. Благодаря черному бюджету ЦСО стал самым ценным активом Ордена. По всей Америке пробудилась призрачная армия. Черные вертолеты патрулируют небо, ожидая, чтобы задержать диссидентов, антисоциальных личностей и экстремистов. В армии мы внедрились в каждую казарму, готовясь к самому тихому шепоту восстания. Угрозы можно искоренить только до того, как они появятся."
 USB_child_safety_act: "Закон о Безопасности Детей"
 USB_child_safety_act_desc: "Слишком долго в Интернете существовали антисоциальные тенденции, диссидентские идеи и общение между враждебными элементами, но с помощью Закона Защиты Детей мы можем пролить свет на темные уголки Интернета.\nДети являются наиболее уязвимой группой населения, и их постоянное пребывание в Интернете без родительского контроля, где они подвергаются воздействию антисоциальных элементов, оказывает на них пагубное влияние. Материалы, содержащие эксплуатацию, будут запрещены, и, посеяв семена страха в сердцах родителей, мы не встретим никакого сопротивления."
 USB_restore_the_redacted_files: "Восстановить Удаленные Файлы"
 USB_restore_the_redacted_files_desc: "В прошлом, когда мы могли работать в тени без помех из-за растущей поляризации политики, мы осуществляли многочисленные проекты, чтобы не дать нашим врагам, как внутренним, так и внешним, нанести вред нашей стране. К сожалению, из-за этических соображений невежественных людей и сокращения финансирования мы были вынуждены оставить эти проекты пылиться.\nТеперь, когда взрослые снова у власти, нет причин не возобновить эти проекты и не усовершенствовать их."
 USB_keep_the_cycle_repeating: "Поддерживать Цикл"
 USB_keep_the_cycle_repeating_desc: "Посмотрите на нашу страну, погруженную в хаос, посмотрите на внешний мир, погруженный в хаос.\nPax Americana "Американский Мир" существовал не просто так. Порядок - это добродетель, к которой стоит стремиться. Наши критики считали наш образ мышления вредным, но все они были нейтрализованы теми же группами, которые они продвигали.\nМы здесь навсегда."
 USB_gears_of_war: "Шестерёнки Войны"
 USB_gears_of_war_desc: "После Второй американской гражданской войны военно-промышленный комплекс стал играть ключевую роль в войне правительства Вашингтона. Однако после чрезвычайной консолидации он приобрел еще более важное значение.\nЕсли мегакорпорации - это наша кровь, а спецслужбы — наше тело, то военно-промышленный комплекс - это наш разум. Мозг, который собирает и применяет знания для обеспечения нашей национальной безопасности, больше никогда не будет подвергаться угрозе.\n\nНаши благодетели щедро финансируют наши предприятия, и уже сейчас инженеры, ученые и величайшие умы, которых когда-либо видела эта страна, работающие в DARPA, снабжают наши вооруженные силы и аппарат национальной безопасности, создавая новые и уникальные технологии, чтобы принести порядок в хаос. Мы сидели сложа руки и позволили Америке отстать от остального мира в области инноваций и технологий. Никогда больше престиж, утраченный в результате Гражданской войны, не будет утрачен, и благодаря стволам нашего нового оружия хаос будет подавлен."
 USB_merge_the_mic: "Объединить ВПК"
 USB_merge_the_mic_desc: "Мелкая конкуренция между военно-промышленными компаниями помешала нам опередить наших противников. Она позволила нам отстать - заставила нас выбирать между одним несовершенным проектом и другим - синим или красным - посредственным или терпимым.\nВ отличие от глупцов, которые были до нас, мы не терпим мелких соперничеств. Они недостойны нашей нации, недостойны нас. Пришло время сократить излишки военно-промышленного комплекса и объединить его с более крупными структурами. Объединив усилия этих небольших компаний, Lockheed Martin-Boeing и General Dynamics станут величайшими мозговыми центрами в истории человечества.\nВзрослые снова взяли бразды правления в свои руки, и благодаря нашему превосходному инженерному искусству порядок будет восстановлен."
 USB_reel_in_the_think_tanks: "Задействовать Аналитические Центры"
 USB_reel_in_the_think_tanks_desc: "Аналитические центры слишком долго действовали без контроля. В то время как наши корпорации, спецслужбы и DARPA работают круглосуточно, чтобы исправить Великую Ошибку, которая поставила нас на колени, аналитические центры бездельничают. Однако, как и любой хороший стратег, мы используем все имеющиеся в нашем распоряжении инструменты, и аналитические центры не являются исключением. Мы напомнили им, что слабость не допускается. Теперь они такие же, как и все остальные наши активы.\nГруппа Бильдерберг, когда-то неэффективная и ненужная, теперь трудится над восстановлением глобального порядка, который был уничтожен огнем, посредством своих ежегодных встреч. Трехсторонняя комиссия, оставшаяся без цели после Второй американской гражданской войны, вновь подтверждает наше дипломатическое мастерство, подталкивая региональные державы к тому, чтобы играть по нашим правилам. Даже так называемые "неоконсерваторы" и противники Трампа возродили давно умерший "Проект нового американского века," настаивая на восстановлении нашего глобального господства и разработке наших будущих планов."
 USB_unrestrained_rd: "Неограниченный НИОКР"
 USB_unrestrained_rd_desc: "Понятие 'этика' - это раковая опухоль научных инноваций. С тех пор, как оно стало приоритетом, этика превратилась в костыль, на который опирались необразованные люди, чтобы спокойно спать по ночам, даже когда они отставали от конкурентов. Правительство до чрезвычайной консолидации не было исключением: оно позволяло тираническим массам замышлять против нас, позволяло нашим противникам превосходить наши молодые компании - и все это ради своей моральной непорочности.\nИго, сдерживавшее великие умы этой страны, было навсегда сброшено. Порядок должен быть восстановлен, и если для этого необходимо будет избавиться от части масс, чтобы обеспечить восстановление нашего глобального господства, то так тому и быть."
 USB_projects_of_greatness: "Проекты Величия"
 USB_projects_of_greatness_desc: "На протяжении всей истории современного мира почти каждое великое нововведение получало ту или иную форму финансирования, чтобы поддержать его. Кучи денег - документально подтвержденные или нет - удерживали проект над темными водами провала. Наши военно-промышленные компании не являются исключением. По мере роста наших амбиций растет и их потребность в деньгах, свободе и власти.\n\nБлагодаря слияниям компаний, сокращению регулирования и уничтожению этических кодексов мы создали величайший мозговой центр в истории человечества - нашу военно-промышленную индустрию. Используя "черный бюджет," они избавятся от всех финансовых, ресурсных и кадровых нагрузок. Военно-промышленный комплекс будет по-прежнему располагать необходимыми средствами для продолжения своих многочисленных проектов.\nЧертежи нарисованы - все детали сложились воедино. От самой сложной цифровой сети наблюдения, когда-либо созданной, до захваченных нейрологических исследований предателя Маска - мир скоро станет свидетелем восстановления нашего потенциала, престижа, который был уничтожен старым правительством. Путь к порядку проложен, нам остается только идти по нему."
 USB_ensure_aerospace_dominance: "Обеспечить Аэрокосмическое Превосходство"
 USB_ensure_aerospace_dominance_desc: "В глобальном порядке, сложившемся после 1991 года, мы когда-то обладали подавляющим господством в аэрокосмической сфере. Наша огромная сила проявилась в успехах операций 1990-х годов. Наши стелс-самолеты доминировали в небе, обрушивая адский огонь на наших противников, и любая иностранная угроза порядку была уничтожена в течение нескольких недель. Но все это рухнуло, приведя к гражданской войне. Наши конкуренты опередили нас, массы начали строить против нас козни, и огонь поглотил нашу нацию.\nВ наше отсутствие хаос воцарился по всему миру. От напряженности в Европе до войны на Тайване, стало совершенно ясно, что иностранные государства не могут помочь себе, не могут перестать раздувать пламя хаоса. Поэтому мы должны защитить их. С помощью черного бюджета мы дадим возможность нашей компании Lockheed Martin-Boeing доминировать на мировом рынке и восстановить порядок во всем мире. Они доказали, что не заслуживают привилегии защищать себя, поэтому мы должны вновь взять на себя эту ответственность."
 USB_dumb_construction: "Строительство D.U.M.B."
 USB_dumb_construction_desc: "Глубокие Подземные Военные Базы (D.U.M.B.) были предложены еще со времен холодной войны. Несмотря на разные названия, идея осталась прежней: служить в качестве резервного варианта, а также продолжения правительственного протокола. Конечно, эти предложения так и не были реализованы. Но гражданская война научила нас, что массы — это разъяренные животные, готовые к нападению. Такие чрезвычайные меры больше не являются роскошью, они являются необходимостью.\n\nНо неосведомленные глупцы, которые так давно отвергли этот план, остались лишь воспоминанием. Теперь все карты в наших руках, и благодаря «черному бюджету» мы имеем беспрецедентный доступ к ресурсам, которые позволят нам реализовать наши амбиции. Благодаря глубоким подземным военным базам мы не только будем иметь убежища и множество чрезвычайных мер на случай, если порядок снова окажется под угрозой, но и высокотехнологичные исследовательские центры, которые позволят DARPA и военно-промышленному комплексу тестировать и разрабатывать новые технологии, которые будут способствовать реализации наших планов."
 USB_hunter_killer_program: "Программа Хантер-Киллер"
 USB_hunter_killer_program_desc: "Когда речь идет об угрозах Порядку, нет мер, которые были бы 'слишком радикальными - нет мер, которые мы не приняли бы. Если для того, чтобы найти одну угрозу, нам придется сжечь все дома в деревне, то мы будем первыми, кто зажжет факел. Несмотря на все наши усилия, диссиденты все еще остаются. Они прячутся в песке, как змеи, выжидая подходящего момента, чтобы нанести удар. Нам необходимо принять еще более жесткие меры, чтобы очистить нашу страну от этого разъедающего элемента.\nС помощью дронов мы можем легко выследить любого диссидента, пытающегося скрыться. Даже в самую темную ночь или в самом густом лесу мы способны найти и уничтожить этих экстремистов. Благодаря нашим аэрокосмическим компаниям мы располагаем беспрецедентным запасом дешевых дронов, которые мы можем использовать для уничтожения любых угроз национальной безопасности. Именно здесь вступает в игру программа Хантер-Киллер. Уже установлено, что этика является раковой опухолью научных инноваций, но это распространяется и на ведение войны. Неосведомленные массы жаловались на дроны с момента их первого применения давным-давно — они лишились права жаловаться после начала Гражданской войны. Теперь, когда у власти находятся взрослые, мы отменим правила, которые сдерживали развитие дронной войны. Благодаря этой программе любой повстанец будет найден и уничтожен."
 USB_kickstart_the_amnet: "Запустить Am-Net"
 USB_kickstart_the_amnet_desc: "В мире, где цифровые технологии играют все большую роль, каждый уходит в свой собственный мир. Будь то Патриотический Фронт, одержимый пиаром и внешним видом, Дивизия Атомваффен, воплощение мизантропии, или АНОА, оправдывающая свое варварство под видом прогресса общества. Эти маленькие сообщества просачивают свои противоречивые 'истины' в растущее болото общества в целом, побуждая каждого человека выбирать ту 'истину', которая соответствует его желаниям и потребностям, в ответ на умирающее общество. Так началась Гражданская война, так глобальный порядок был поглощен огнем, и так человечество застряло бы в стагнации без нашего вмешательства.\nБлагодаря ИИ, который питает Am-Net, мы можем отбирать важную информацию и отфильтровывать мусор из цифрового дискурса. Некоторые называют это цензурой, но на самом деле мы просто создаем контекст, отфильтровывая мусорные данные. Массы доказали, что их 'свободы' ведут только к смерти и отчаянию. Наш долг как правителей - защищать их, думать за них.\n\nПомимо этого, Am-Net будет служить еще одной цели: агрегатору - матрице человеческого мышления, которая позволит нам изучать распространение идей, культур и символов (или "меметику"). На протяжении десятилетий правительства меньших стран искали ключ к пониманию тонкостей человеческого разума и, как следствие, ключ к контролю над обществом. Мы, конечно, поняли, что это меметика. Благодаря колоссальному количеству данных, которые мы соберем из Am-Net, наш прогнозирующий ИИ, который отслеживает Am-Net, будет обучен тонкостям человеческого мышления. С помощью ИИ мы сможем в разы быстрее пресекать антисоциальную деятельность, причем без ошибок, которые возникают при предварительном познании человеком. Наши исследования уже показывают, что благодаря передовым контекстуальным и дедуктивным способностям ИИ мы можем выявлять преступную деятельность еще до ее совершения. Запуск Am-Net будет только началом."
 
 USB_justice_reform: "Реформа Правосудия"
 USB_justice_reform_desc: "В последние годы богиня правосудия вела себя довольно сдержанно; кружащие вокруг нее ссорящиеся стервятники хотели бы, чтобы она продолжала носить повязку на глазах.\nПорядок - это добродетель, и, позволив правосудию видеть, мы сможем восстановить эту добродетель."
 USB_form_the_uspf: "Сформировать Полицейские Силы Соединенных Штатов"
 USB_form_the_uspf_desc: "Одним из самых больших недостатков старых Соединенных Штатов была их склонность позволять местной лояльности превосходить лояльность федеральной власти. Местные правоохранительные органы были слишком снисходительны к преступлениям и предательским настроениям; сегодня это заканчивается.\nСоздание полицейских сил Соединенных Штатов должно решить эту проблему, обеспечив, чтобы посторонние люди не обращали внимания на сообщества других людей, чтобы предотвратить эмоциональную привязанность."
 USB_atf_new_purpose: "Новая Цель ATF"
 USB_atf_new_purpose_desc: "С помощью рычагов власти, которые мы прочно держим в своих руках, мы можем реформировать лояльные агентства, чтобы они более эффективно противостояли волне хаоса, накрывшей нашу страну.\nATF всегда сохраняло лояльность Соединенным Штатам, и лояльность никогда не остается без награды. Им будут выделены дополнительные средства и привилегии для борьбы со Второй поправкой и ее злоупотреблением со стороны сект, поражающих нашу страну. От евангелистов до социалистических книжных клубов - все, что противоречит Порядку, будет объявлено сектой и подвергнется соответствующим мерам."
 USB_coordinate_with_the_ic: "Координировать с РС"
 USB_coordinate_with_the_ic_desc: "Разведывательное сообщество всегда было одной из опорах Соединенных Штатов Америки, бдительно следя за тем, как тень безумия пыталась проникнуть в нашу страну. Теперь, когда безумие достигло нашей страны, разведывательное сообщество получит гораздо больше полномочий для борьбы с внутренними и внешними угрозами. Дни сна закончились; глаз больше никогда не закроется."
 USB_expand_the_dhs: "Расширить DHS"
 USB_expand_the_dhs_desc: "Министерство здравоохранения и социальных служб продемонстрировало свою несостоятельность, не сумев учесть надвигающуюся угрозу экстремизма. В связи с химической атакой, совершенной Дивизией Атомваффен, здравоохранение стало угрозой национальной безопасности.\nПоэтому он будет объединен с Министерством внутренней безопасности, и с притоком свежих взглядов на эти вопросы нашей целью будет обеспечение соблюдения карантина и выполнение любых предписаний, касающихся общественного здравоохранения.\nТе, кто не будет выполнять предписания, будут изолированы в учреждениях FEMA, чтобы предотвратить дальнейший вред для нации."
 USB_a_kick_in_every_door: "Пинок в Каждую Дверь"
 USB_a_kick_in_every_door_desc: "Бюрократия полезна только в том случае, если она поддерживает порядок. Однако в условиях гражданской войны бюрократические процедуры стали обременительными.\nПосле недавних событий мы обзавелись ножницами, необходимыми для устранения излишней бюрократии. Теперь мы можем проводить обыски в каждом доме, применять агрессивные методы расследования и задерживать всех, кого считаем угрозой."
 USB_the_right_to_remain_silent: "Право Хранить Молчание"
 USB_the_right_to_remain_silent_desc: "Благодаря тщательному планированию и проведению ряда операций против нескольких культов, повстанческих движений и террористов. Можно с уверенностью сказать, что мы еще далеки от завершения нашей миссии. Порядок необходимо поддерживать, деликатно и постоянно.\nКак фарфоровая маска, он не может существовать с одной-единственной трещиной.\nРабота нации еще не завершена."
 
 USB_we_wont_fail_again: "Больше Не Будет Провалов"
 USB_we_wont_fail_again_desc: "Мы победили англичан, мы победили немцев, мы победили русских.\nИ снова, как и раньше, мы победили животное внутри нас.\nМы не потерпим поражения снова.\nПорядок сохраняется."
 USB_build_back: "Восстановление"
 USB_build_back_desc: "План "Отстроить Лучше, Чем Было" был одним из самых амбициозных проектов Байдена для страны. С восстановлением порядка мы можем завершить проект и добавить в него дополнительные улучшения.\nБудут решены проблемы давно запущенной инфраструктуры, будет принят закон о социальной помощи в связи с пандемией, а также будет выделено дополнительное финансирование для нескольких инициатив в области социальной политики. Кроме того, благодаря продолжающейся реконструкции мы можем преобразовать городской ландшафт Америки в соответствии с нашими целями."
 USB_federal_rail_network: "Федеральная Железнодорожная Сеть"
 USB_federal_rail_network_desc: "Гражданская война дала нам карт-бланш на принятие любых мер, необходимых для поддержания национальной безопасности. Благодаря строительству обширной сети железных дорог по всей стране, мы можем регулярно перемещать рабочих в зависимости от их рабочих заданий.\nЭто также служит способом усиления контроля над населением, поскольку сельские жители будут переселены в города, особенно в районы, которые не приносят прибыли нашим корпоративным союзникам."
 USB_cold_hearted_pragmatism: "Холодный Прагматизм"
 USB_cold_hearted_pragmatism_desc: "Сказать, что мы поддерживаем определенные ценности, было бы откровенной ложью; однако мы все видели, что происходит с нацией, ослепленной завесой экстремизма.\nНаш подход к нашим гражданам должен быть как подход строгого отца; мы знаем, что наиболее эффективно, и мы знаем, что приносит результаты.\nМы можем быть моральными людьми, или мы можем быть людьми, которые вернули Соединенные Штаты на трон мира."
 USB_safeguard_the_population: "Защитить Население"
 USB_safeguard_the_population_desc: "Те, кто не осознает, не испытывают боли.\nНаши граждане пережили тяжелые испытания, и нет сомнений, что большинство из них хотело бы, чтобы все вернулось к нормальной жизни. Безопасно и упорядоченно, вернуться к нормальной жизни просто невозможно, но что мы можем обеспечить, так это завесу комфорта с помощью машины Порядка, которая неустанно работает, чтобы наше население оставалось в неведении.\nЧиновники, которые пожимают руки, более тонкие способы наблюдения и мир, который продолжает вращаться.\nМы работаем в тени, чтобы они могли увидеть новый день; только те, кто имеет злые намерения, имеют что скрывать."
 USB_megalopolis_project: "Проект Мегалополис"
 USB_megalopolis_project_desc: "Поступают сообщения о крайне антисоциальной деятельности в ржавом поясе и сельских районах, и большинство этих территорий не представляют практически никакой ценности ни для нас, ни для наших корпоративных партнеров.\nМы начнем расширять наши города, чтобы разместить переселившееся из сельских районов население в наших городских центрах. Это даст возможность дышать свободнее при проведении любых операций в сельских районах, а мы сможем следить за населением в городах."
 USB_efficient_use_of_land_act: "Закон об Эффективном Использовании Земель"
 USB_efficient_use_of_land_act_desc: "Гражданская война оставила глубокий шрам на нашей земле, и, учитывая, что большинство сельского населения относится к нам с презрением, было бы разумно конфисковать их имущество для реализации более крупных проектов, таких как создание обширных сельскохозяйственных угодий. Вместе с нашими друзьями из Black Rock мы сможем использовать эти земли с большей пользой."
 USB_redefine_big_government: "Переопределить Большое Правительство"
 USB_redefine_big_government_desc: "Централизация - это концепция, чуждая большинству американцев, но она доказала свою необходимость.\nЧтобы предотвратить рост лояльности к местным властям, которые отдают предпочтение своему непосредственному окружению, а не Соединенным Штатам Америки, местные органы власти уйдут в прошлое.\nКаждый чиновник в каждом штате будет подчиняться центральному органу власти, который будет контролировать процесс восстановления страны."
 USB_biochemical_breakthroughs: "Прорывы в Биохимии"
 USB_biochemical_breakthroughs_desc: "Человечество доказало свою непредсказуемость, но, как и все млекопитающие, оно подчиняется химическим веществам, вырабатываемым в его мозге.\nМы добились больших успехов в области биохимических веществ, добавляя в воду химические вещества, вызывающие покорность, проводя массовые вакцинации и строя биолаборатории по всему миру. Мы можем подвергать человеческий разум постоянному воздействию, пока он не достигнет желаемого состояния покорности."
 USB_intensify_digitalization: "Усилить Цифровизацию"
 USB_intensify_digitalization_desc: "Пандемия Ковид-19 показала, насколько население зависит от цифрового мира, мира, который легко контролировать и поддерживать.\nПрибегая к порядку, мы можем полностью оцифровать почти все аспекты современной жизни. Финансы, коммуникации, хранение файлов и массовое потребление медиа. Ничто из этого не пройдет мимо нас без нашего ведома. По мере того, как население становится все более зависимым от цифровых технологий, мы можем заставить даже самых нерешительных участвовать в жизни общества."
 USB_the_new_social_contract: "Новый Общественный Договор"
 USB_the_new_social_contract_desc: "Социальный договор является основой поддержания порядка.\nЕго самым большим недостатком было то, что чернила на нем были стираемыми, а бумага слишком легко рвалась.\nВнурив населению идею о том, что для того, чтобы их дети могли ходить в школу и чтобы антисоциальные действия не причиняли им вреда, им придется отказаться от некоторых своих свобод, мы заставили бы людей практически умолять нас навести порядок в хаосе."
 USB_correcting_the_great_mistake: "Исправление Великой Ошибки"
 USB_correcting_the_great_mistake_desc: "Дихотомия между неолиберализмом и неоконсерватизмом не выдержала испытания временем. Недостатки старого порядка, основанного на правилах, стали очевидны с появлением Ковид-19 и Второй американской гражданской войны, которые привели к самым большим периодам хаоса в современной истории.\nМы извлекли урок и сделаем все, что в наших силах, чтобы это больше никогда не повторилось.\n\nПорядок — это опора, на которую можно опереться.\nМы не позволим себе быть поглощенными пламенем перемен."
 USB_nnunion: "NNUNION"
 USB_nnunion_desc: "Канада всегда была давним союзником Соединенных Штатов Америки, и прошлый кризис показал, что наши северные братья оказались не готовы к решению любых потенциальных будущих кризисов.\nК счастью, у нас все еще есть люди внутри, которые разделяют наши ценности и добродетели. Оказывая давление и давая обещания нужным людям, мы можем заставить канадское правительство быть гораздо более дружелюбным по отношению к нам."
 USB_arctic_security: "Безопасность в Арктике"
 USB_arctic_security_desc: "Арктика всегда была регионом, окруженным теориями и тайнами; независимо от правды, в наших интересах обеспечить безопасность этих замерзших просторов, чтобы ни одна иностранная угроза не смогла укрепить там свое присутствие."
 USB_gapigs: "GAPIGS"
 USB_gapigs_desc: "Карибский бассейн всегда был чем-то вроде трофея, особенно Куба.\nКоммунистические идеологи, присутствующие наряду с более криминальными элементами на таких островах, как Гаити, оказались бы подверженными иностранному влиянию, что могло бы представлять реальную угрозу национальной безопасности. Было бы целесообразно провести военную интервенцию для восстановления порядка и демократии в регионе."
 USB_limartini: "LIMARTINI"
 USB_limartini_desc: "Мексика всегда была для нас как заноза в пальце, будь то нелегальная иммиграция или перевозка наркотиков через границу. Эта южная страна погрязла в хаосе, картели и революционеры только усугубляют антисоциальную активность.\nНадлежащее военное вмешательство в Мексике позволило бы нам навести порядок в стране и обеспечить отсутствие враждебных элементов в нашем заднем дворе."
 USB_pcbridge: "PCBRIDGE"
 USB_pcbridge_desc: "Центральная Америка считается мостом между Севером и Югом, и в период нашего временного отсутствия государства Центральной Америки продемонстрировали свое истинное отношение к Соединенным Штатам.\nОбеспечив контроль над этим мостом, мы откроем путь как в Южную Америку, так и восстановим контроль над Панамским каналом."
 USB_work_force_act: "Закон о Рабочей Силе"
 USB_work_force_act_desc: "Закон о рабочей силе позволяет нам использовать задержанных граждан в качестве рабочей силы, сокращая расходы и демонстрируя будущим антисоциальным элементам, что хаос влечет за собой последствия."
 USB_mhoctopus: "MHOCTOPUS"
 USB_mhoctopus_desc: "Расширение нашего влияния на глобальном уровне обеспечит нам возможность реагировать на любой кризис в любой момент с помощью надлежащего применения силы. Диссиденты, бегущие из страны, лидеры террористических движений и подрывные элементы не смогут ускользнуть от нашего внимания."
 USB_solidify_our_position: "Укрепить Наши Позиции"
 USB_solidify_our_position_desc: "По мере того как порядок постепенно восстанавливается во всем мире, мы должны извлечь уроки из ошибок, которые привели к тому, что пламя перемен охватило наш мир. Принимая превентивные меры и применяя надлежащие средства защиты на ключевых позициях, мы можем обеспечить, чтобы любым враждебным элементам было трудно нанести реальный ущерб Соединенным Штатам."
 USB_mqwallbreaker: "MQWALLBREAKER"
 USB_mqwallbreaker_desc: "Азия и Океания – это регионы, которые всегда были предметом борьбы между нами и Китаем, и с учетом того, что красный дракон усиливает свою агрессию в этом регионе, было бы неизбежно, что мы постепенно окажем совместное давление на одного из наших давних соперников.\nОказывая поддержку нашим старым союзникам и пересматривая наши старые планы действий в отношении Китая, мы наконец сможем положить конец китайской экспансионистской политике."
 USB_lznostalgia: "LZNOSTALGIA"
 USB_lznostalgia_desc: "Южная Америка была континентом, пропитанным бензином беспорядков, и даже сегодня атмосфера незагоревшегося хаоса все еще присутствует.\nБлагодаря вмешательству в дела стран, охваченных экстремизмом, и давлению на наших бывших партнеров, порядок может быть восстановлен, и мы сможем продолжить нашу деятельность на континенте без перерывов.\nВсе как обычно."
 USB_cxhomecoming: "CXDADDY"
 USB_cxhomecoming_desc: "Европа всегда была полем битвы идеалов и империй; даже сегодня мы видим доказательства того, что наше отсутствие принесло только ущерб всему континенту.\nНеважно, захвачена ли она экстремистскими идеями или русскими.\nКак и любой опекун, мы никогда не уходим навсегда, и с нашим неизбежным возвращением мы покажем миру, что мы еще далеко не закончили реализацию нашей концепции мира."
 USB_aqtomato: "AQTOMATO"
 USB_aqtomato_desc: "Африка на протяжении десятилетий была ареной хаоса, с ее многочисленными автократами и повстанческими движениями, она полна нереализованного потенциала для расширения нашего влияния.\nФинансируя правильных борцов за свободу и позволяя диктаторам подавлять революционеров, мы можем внимательно следить за тем, что происходит на темном континенте."
 USB_kktemple: "KKTEMPLE"
 USB_kktemple_desc: "Ближний Восток — это регион, наполненный антисоциальными элементами, радикальными экстремистами и слепыми фанатиками, готовыми броситься в самоубийственную ярость.\nЭто отсталый регион, в песках которого пролито бесконечное количество крови, и нашей самой большой ошибкой было оставить их в грязи. Но мы вернемся снова, и на этот раз мы никогда не уйдем."
 USB_destroy_hazardous_elements: "Уничтожить Опасные Элементы"
 USB_destroy_hazardous_elements_desc: "Как и любая форма паразитизма, антисоциальные элементы продолжают существовать в нашей стране.\nОпухоли экстремизма в самых темных уголках наших городов, животное стремление к переменам.\nЧеловечество - это спектр, обреченный на постоянное наблюдение; мы избавимся от нанесенных нам шрамов."
 USB_war_machine_back_on_track: "Военная Машина Снова в Движении"
 USB_war_machine_back_on_track_desc: "Военно-промышленный комплекс подобен божественному божеству, которое обрушивает свой гнев на тех, кто стоит на пути Порядка. Слишком долго американская военная машина сдерживалась этическими соображениями; такие соображения присущи только лояльным.\nКогда наша армия вновь обретет заслуженное уважение, мы сможем возродить миф об американском мире.\nНа этот раз навсегда."
 USB_the_arsenal_of_order: "Арсенал Порядка"
 USB_the_arsenal_of_order_desc: "Танки, ракеты, истребители и линкоры. Это лишь верхушка айсберга того, на что мы способны.\nНаши враги слишком долго наслаждались своим превосходством; наше временное отсутствие сделало их слишком самоуверенными, слишком самодовольными.\nС яркими умами под нашей крышей и расширенной военной промышленностью, выполняющей свою роль, мы будем готовы сразиться с любым гигантом."
 USB_reopen_the_factories: "Переоткрыть Заводы"
 USB_reopen_the_factories_desc: "В ходе обеих мировых войн мы снова и снова доказывали, что американская промышленность остается на вершине; любой враг, противостоявший неизбежному прогрессу стабильности, становился лишь примечанием в общей картине событий.\nБлагодаря нашему стремительному прогрессу в области технологий и промышленности, гигант никогда больше не уснет."
 USB_freedom_of_movement_act: "Закон о Свободе Передвижения"
 USB_freedom_of_movement_act_desc: "Благодаря Закону о свободе передвижения мы сможем установить постоянный контроль над любыми формами передвижения внутри нашей страны. Контрольно-пропускные пункты по всей стране диктуют населению правила вождения, а федеральная железнодорожная сеть используется в соответствии с нашей концепцией\nНезависимо от того, едет ли человек навестить семью, переезжает по работе или даже пытается незаметно проникнуть в сельскую местность.\nМы об этом узнаем."
 USB_global_task_force_units: "Глобальные Оперативные Группы"
 USB_global_task_force_units_desc: "Было бы глупо перенапрягаться из-за мелких проблем глобального масштаба.\nЧтобы не допустить перерастания этих проблем в кризис, мы будем использовать глобальные оперативные группы, которые будут решать насущные проблемы с хирургической точностью.\nПовстанцы, вооруженные почти примитивным оружием, окажутся не более чем нарывом, который можно вскрыть. "
 USB_permanent_military_presence_worldwide: "Постоянное Всемирное Военное Присутствие"
 USB_permanent_military_presence_worldwide_desc: "Будь то страны-изгои, иностранные угрозы или вооруженные повстанческие группировки. Одно остается неизменным: наше отсутствие привело к тому, что они стали более смелыми в своих насильственных действиях.\nВ период расцвета неоконсерватизма мы были повсюду; наши враги поняли, что такое страх и ненависть. Наш флаг, наши символы и наш язык на их землях были показателем того, что мы здесь, чтобы остаться.\nВосстановив военные базы по всему миру и оказав надлежащее военное давление на наших противников, мы напомним им об их забытых уроках."
 USB_automated_killing_fields: "Автоматизированные Поля Смерти"
 USB_automated_killing_fields_desc: "Существуют обширные зоны, заполненные антисоциальными элементами, которые не приносят практически никакой пользы для нашей программы. Однако было бы неразумно оставлять их без присмотра.\nС помощью дронов мы можем поддерживать необходимый уровень контроля над этими районами и сдерживать любую угрозу, которая может вызвать проблемы; в этом нет необходимости привлекать людей. Мы не ведем переговоры с террористами."
 USB_revive_the_ngb_program: "Возродить Программу Бомбардировщиков Нового Поколения"
 USB_revive_the_ngb_program_desc: "Возродить Программа создания бомбардировщика нового поколения была направлена на внедрение в наши вооруженные силы нового типа бомбардировщика, способного развивать максимальную дозвуковую скорость, имеющего длительный срок эксплуатации от 50 до 100 часов и способного нести термоядерное оружие. Эти летающие символы американского мира будут служить предметом нашей гордости и приносить порядок."
 USB_utilize_pmcs: "Использование ЧВК"
 USB_utilize_pmcs_desc: "Наши отношения с частными военными компаниями всегда носили симбиотический характер. Когда нам нужно было выполнить грязную работу, не запятнав флаг, мы регулярно пользовались их услугами.\nНет никаких причин отказываться от таких плодотворных отношений. Наши корпоративные друзья будут еще более рады, увидев повышение своих ставок и еще меньшую озабоченность правилами ведения боевых действий, если только работа будет выполнена."
 USB_humanitarian_peacekeeping: "Гуманитарное Миротворчество"
 USB_humanitarian_peacekeeping_desc: "О наших усилиях по всему миру ходит немало диких слухов, клевета и паника стали неотъемлемой частью работы мировой полиции.\nОднако правда остается прежней.\nТам, где мы несем факел безопасности, люди могут безопасно переходить улицу. Всякий раз, когда гражданское население находится в бедственном положении, мы всегда рядом.\nВместе с нашими друзьями из Организации Объединенных Наций мы сможем расширить наш контроль над дестабилизированными регионами, накормить голодных и утолить их жажду.\nВозможно, мы вторгаемся в их образ жизни, но разве постоянный хаос - это действительно способ жить?"
 USB_watchdog_of_the_world: "Наблюдатель Мира"
 USB_watchdog_of_the_world_desc: ""Мировая Полиция" часто используется как уничижительный термин, но наше отсутствие доказало, что она, на самом деле, была необходима.\nДве войны в Европе, две войны в Азии и несколько менее масштабных конфликтов по всему миру - и все потому, что нас просто не было.\nОднако мы вернулись, и наш взгляд на мир останется неизменным.\nПорядок превыше всего."
 USB_extinguish_the_fire: "Потушить Огонь"
 USB_extinguish_the_fire_desc: "Пламя перемен охватило мир хаосом.\nКапитал, порядок и непорочность были подвергнуты испытанию и прошли его с блеском.\nЭто добродетели и идеалы, за которые стоит бороться, и пламя было погашено.\nПодавлено, успокоено.\nЧтобы никогда больше не разгораться, ради лучшего мира."
 USB_a_new_world_order: "Новый Мировой Порядок"
 USB_a_new_world_order_desc: ""Ты поставил землю на твёрдых основах: не поколеблется она во веки и веки."\n\nПсалтирь 103:5"
 
 USB_final_chord_of_the_cold_war: "Финальный Аккорд Холодной Войны"
 USB_final_chord_of_the_cold_war_desc: "Американский мир должен был длиться вечно, но наша страна перестала существовать на десятилетие или два, и наши давние соперники из России смогли расширить свои владения далеко за пределы зоны сдерживания. Бывшая региональная держава взяла на себя роль мирового полицейского, но мы уже видим трещины в ее системе. Они не были созданы, чтобы длиться вечно; пришло время завершить давно забытую холодную войну."
 USB_operation_atlantic_airlift: "§YОПЕРАЦИЯ§!: Атлантический Воздушный Мост"
 USB_operation_atlantic_airlift_desc: "Разрыв между нами и Европой, находящейся под контролем России, довольно велик.\nИспользуя воздушные маршруты, установленные центральным командованием, мы быстро развертываем войска для проведения операций на континенте. Мы однажды освободили Европу, и мы сделаем это снова."
 USB_demoralization_and_dehumanization: "Деморализация и Дегуманизация"
 USB_demoralization_and_dehumanization_desc: "Славяне биологически склонны к высокомерию и пренебрежению к жизни отдельных людей.\nОдной из самых больших ошибок наших предшественников было предположение, что мы можем вести равные переговоры с русскими, и эта ошибка не будет повторена.\nСемена гнева по-прежнему присутствуют в Европе, и воды Порядка обеспечат, чтобы наши оккупированные друзья расцвели розами с шипами. Используя меметическую войну и переосмысливая старую пропаганду, мы можем заставить европейский народ жаждать свободы."
 USB_paint_the_tanks_green: "Окрасить Танки в Зеленый"
 USB_paint_the_tanks_green_desc: "Большая часть наших военных прекрасно адаптировалась к боевым действиям на Ближнем Востоке, поскольку этот регион постоянно нуждается в стабильности. Однако из-за различий в окружающей среде в Европе и России считается необходимым переоборудовать наши войска с учетом особенностей соответствующих условий.\nМир привык к американским солдатам в пустынной расцветке; пусть привыкают и к зеленой."
 USB_amplify_our_presence: "Усилить Наше Присутствие"
 USB_amplify_our_presence_desc: "Главная причина, по которой русские никогда не осмеливались полностью вторгнуться в нашу сферу влияния, заключается в нашем постоянном военном присутствии у их границ; они видели, как мы действовали на Ближнем Востоке, в Азии и Европе. Вместо этого они ждали нашего краха, как стервятники.\n"Толстый стервятник ползет, когда приближается орел."\n'Мы восстановим наше присутствие вокруг Европы и, в конечном итоге, внутри нее, чтобы они вновь испытали ту же тревогу, которую испытывали на протяжении десятилетий. Америка здесь навсегда."
 USB_lend_lease_act: "Закон о Ленд-Лизе"
 USB_lend_lease_act_desc: "Мы помогали нашим союзникам во время Второй мировой войны, когда они в этом нуждались, и мы сделаем это снова, готовясь к очередному благородному крестовому походу за освобождение Европы от тирании.\nОгромная промышленная мощь Соединенных Штатов заставит русских утонуть в собственной чрезмерной экспансии.\nОгнестрельное оружие, припасы, оборудование. Нашим союзникам нужно больше."
 USB_operation_bear_hunter: "§YОПЕРАЦИЯ§!: Медвежий Охотник"
 USB_operation_bear_hunter_desc: "Мы готовились к этому в течение нескольких месяцев. Одной из наших самых больших ошибок было то, что мы позволили концепции "России" существовать после распада Советского Союза, что позволило им восстановить страну так же, как это сделали немцы после Веймарской республики.\nИ так же, как мы нейтрализовали немцев, мы сделаем то же самое с нашими восточными соперниками.\nРазрушение российской военной машины остается приоритетной задачей; наша задача будет не из легких. Наша задача будет не из легких. Наш враг хорошо обучен, хорошо вооружен и закален в боях. Он будет сражаться жестоко.\n\nМы не согласимся ни на что меньшее, чем полная победа.\nДавайте все вместе воззовем к Всемогущему Богу о благословении этого великого и благородного дела."
 USB_unlimited_climate_warfare: "Неограниченная Климатическая Война"
 USB_unlimited_climate_warfare_desc: "Более примитивные цивилизации сочли бы нашу власть над глобальным климатом сродни божественной силе. Однако именно мы направляем климат в нужное нам русло.\nБлагодаря продолжающейся войне с Россией мы можем перенаправить более опасные погодные явления в сторону наших соперников на Востоке. Ускорить наступление зимы, замедлить лето или вызвать в их городах столь разрушительные штормы, что суеверное население начнет верить, что их наказывают.\nИ это действительно так."
 
 USB_third_gulf_war: "Третья Война в Персидском Заливе"
 USB_third_gulf_war_desc: "Мы уже проходили через это; многие из наших молодых людей были похоронены в песках Ближнего Востока, а их кости подвергались воздействию песчаных бурь. Большинство молодого поколения боится возвращения конфликта, который стоил нам так много, но с нашими достижениями в области военных технологий нет причин для страха. Этот страх будут испытывать только диктаторы и террористы, гнездящиеся в регионе."
 USB_expand_the_targets_list: "Расширить Список Целей"
 USB_expand_the_targets_list_desc: "В связи с тем, что ситуация в регионе вышла из-под контроля, список лиц, представляющих интерес, расширился.\nДиктаторы, террористы, бандиты и многие другие являются ключевыми фигурами хаоса на Ближнем Востоке, и благодаря нашему неуклонному продвижению на эти территории мы нейтрализуем их, чтобы они больше не могли угрожать стабильности."
 USB_unleash_democracys_fury: "Раскрыть Ярость Демократии"
 USB_unleash_democracys_fury_desc: "Нашим самым большим недостатком в отношении прошлых операций в регионе было следование правилам ведения боевых действий; наши критики утверждают, что такие инциденты, как Абу-Грейб, были аморальными.\nОднако именно наша прошлогодняя мягкость позволила антисоциальным элементам вновь появиться и распространить свою разрушительную идеологию далеко в Европу и Соединенные Штаты. Нет, на этот раз наши правила ведения боевых действий будут менее строгими. Эти террористы поступили бы с нами точно так же; они уже поступили так.\n\nАбу-Грейб для всего региона."
 USB_reestablish_old_bases: "Восстановить Старые Базы"
 USB_reestablish_old_bases_desc: "Шрамы, которые мы оставили после себя, остаются, и пришло время вновь их открыть.\nНаши войска останутся в регионе после его освобождения, на этот раз на более длительный срок, поскольку, без сомнения, будет постоянное сопротивление факелу просвещения.\nНашим присутствием мы отпугнем тех, кто занимает выжидательную позицию, и убедим местных жителей в том, что порядок будет восстановлен."
 USB_operation_whopper_junior: "§YОПЕРАЦИЯ§!: Воппер Джуниор"
 USB_operation_whopper_junior_desc: "Ирак можно считать трофеем неоконсервативного эксперимента, и в некотором смысле это действительно так. Призрак Саддама по-прежнему присутствует, но благодаря нашим совместным военным усилиям и меметической войне мы сможем изгнать его из иракского духа времени наряду с любой формой радикального исламизма. Ирак станет примером для остальной части региона."
 USB_operation_burning_dog: "§YОПЕРАЦИЯ§!: Пылающая Собака"
 USB_operation_burning_dog_desc: "Иран на протяжении десятилетий был объектом наших желаний. Мы хотели включить его в нашу сферу влияния.\nОднако их тирания слишком укоренилась, чтобы на нее можно было оказать надлежащее влияние извне.\nПрямые военные действия и обещание большей автономии этническим меньшинствам в регионе окажутся достаточными для того, чтобы искоренить это черное пятно на Ближнем Востоке."
 USB_project_babel: "§VПроект Вавилон§!"
 USB_project_babel_desc: "Язык - это самая мощная вещь в мире, независимо от того, насколько человек скован или подавлен. Он отказывается умирать.\nОн является частью человечества, частью всего и всех.\nВ том числе и наших врагов.\nНо что, если мы разберем его концепцию на части?\nПовернем их собственный язык против них?\nБлижний Восток держит ключ к этому секрету.\nВперед, разорвём этот круг."
 
 USB_the_eagle_vs_the_dragon: "Орел Против Дракона"
 USB_the_eagle_vs_the_dragon_desc: "Слишком долго мы позволяли китайцам толкать нас. Слишком долго мы позволяли им тыкать пальцем в наши слабости, пока мы не рухнули. Мы должны были действовать раньше, мы должны были более жесткой рукой укрепить свое железное господство над миром.\nНо неолиберальные и неоконсервативные политики не позволили этого, они были слишком слабы, чтобы действовать в соответствии с нашими обоснованными подозрениями. Наш крах был частью их плана, они воспользовались этим моментом, чтобы расширить свое влияние на огромную часть азиатского континента. Эпоха беспомощности закончилась, теперь настало время действовать.\n\nЭта борьба назревала давно. Пришло время освободить Азию, пришло время обезглавить Дракона, который так долго мучил нас, и пришло время восстановить Порядок."
 USB_bolster_the_marine_corps: "Укрепить Морскую Пехоту"
 USB_bolster_the_marine_corps_desc: "В этой войне морская пехота будет нашим хлебом насущным -самым острым оружием в нашем арсенале - проклятием Дракона. Подобно нашему благородному крестовому походу за освобождение тихоокеанских островов во время Второй мировой войны, каждое высаживание будет тяжелой битвой - китайцы будут сражаться не на жизнь, а на смерть за каждый сантиметр земли.\nСилы Дракона хорошо обучены и хорошо вооружены. Но они такие же, как и все другие нации: их воля может быть сломлена. Каждая победа будет еще одной раной для их морального духа, и морские пехотинцы будут ключом к этому. Морская пехота когда-то славилась своей силой, мужеством и доблестью. Мы восстановим этот утраченный престиж благодаря непрерывным победам.\nС нашими морскими пехотинцами так называемый "китайский век" окажется не более чем фантазией. "
 USB_war_on_the_sea: "Война на Море"
 USB_war_on_the_sea_desc: "Дракон утверждает, что его господство над морями основано на железной руке, но это не может быть дальше от истины. Благодаря гениальным конструкциям, созданным нашими военно-промышленными компаниями, наши американские корабли разнесли в клочья эти китайские жестяные банки, маскирующиеся под 'военные корабли.'\nЧтобы разорвать бумажную хватку Дракона над Тихим океаном, нам нужно продолжать в том же духе. Как только все китайские корабли будут взорваны, мы наконец развеем сказку о превосходстве Китая. Мы напомним им, почему они боялись вторгнуться на Тайвань."
 USB_take_on_the_trade_routes: "Ограничить Торговые Пути"
 USB_take_on_the_trade_routes_desc: "Железный контроль Дракона над мировой торговлей является его главным преимуществом как в военном, так и в экономическом плане. Торговые пути вокруг Китая поддерживают его экономику, обеспечивают его народ продовольствием и вооружают его солдат. Но в то время как другие, менее влиятельные страны рассматривают торговое доминирование Дракона как его непреодолимую силу, мы видим в этом возможность.\nЕсли мы перережем эти торговые пути, мы фактически вырубим сердце Дракона. На протяжении десятилетий Дракон использовал свою торговую мощь, чтобы унижать нас и дестабилизировать американский мировой порядок - наш Порядок. Когда мы перережем их драгоценные торговые пути, ситуация наконец-то изменится."
 USB_operation_firestorm: "§YОПЕРАЦИЯ§!: Огненный Шторм"
 USB_operation_firestorm_desc: "На Корейском полуострове наши союзники, южнокорейцы, сражаются за каждый сантиметр своей законной территории. Левые паразиты не прекращают своих атак, и каждая из них более жестока, чем предыдущая.\nНашей самой большой ошибкой в Азии было то, что мы позволили Северной Корее продолжить свое существование как государство. Северокорейцы — это всего лишь еще один аккорд, оставшийся от холодной войны, бремя, которое вышло из-под нашего контроля. На этот раз мы не боимся запачкать руки, и настало время помочь корейцам и закончить то, что мы начали.\n\nЧтобы обеспечить вечное существование Порядка, мы должны вернуть историю туда, где ей и место: в состояние застоя."
 USB_contain_the_communists: "Сдерживать Коммунистов"
 USB_contain_the_communists_desc: "На бурных водах китайских морей не видно ни одного китайского судна. Дно Тихого океана стало кладбищем жестяных банок Дракона. Благодаря изобретательности наших инженеров и храбрости наших войск мы добились полной победы. И теперь готовы приступить к заключительной фазе.\n\nНо как бы они ни пытались убежать, они не смогут избежать голода. Социалисты, коммунисты, тираны, где бы они ни укрывались, будут заморены голодом благодаря превосходству нашего флота.\nДракон будет пытаться умолять и вести переговоры. Но в конце концов, Дракон должен быть обезглавлен, чтобы обеспечить порядок, и скоро это произойдет."
 USB_take_the_fight_to_them: "Привести Войну в Их Дом"
 USB_take_the_fight_to_them_desc: "Операция за операцией мы постепенно разрушали оборону Дракона. Каждый потерянный остров, каждая неудачная попытка обороны подрывали их боевой дух. Но наша решимость сражаться только укрепилась. Мы освободили земли, которые они оккупировали, и теперь мы дадим им отведать их же лекарство.\nШанхай, Пекин, Шэньчжэнь — города, которые являются памятниками высокомерия и "мощи" Дракона. Китайцы думают, что у нас нет смелости освободить эти города, что мы ничем не отличаемся от наших слабых предшественников. Их ждет грубое пробуждение, когда наши истребители уничтожат их памятники, а наши корабли превратят их побережье в пепел.\nВ этом и заключается разница между нами и глупцами, которые были до нас: мы не принимаем половинчатых мер."
 USB_operation_pacific_rim: "§YОПЕРАЦИЯ§!: Тихоокеанский Рубеж"
 USB_operation_pacific_rim_desc: "Несмотря на то, что китайцы являются основным населением "страны первого мира," они являются глубоко суеверным народом, легко поддающимся любому виду принуждения. Они, конечно же, считают, что те, кто обладает способностью управлять погодой, обладают божественной силой.\nМы обладаем ею.\n\nУраганы, которых мир еще не видел, торнадо, разрушающие целые города, бесконечные зимы, приносящие болезни, голод и смерть. Мы смягчили Дракона, теперь народ почувствует наш гнев\nКитайцы были угрозой только для нашей безопасности и порядка в целом. После десятилетий терпения их мучений, мы заставим их понять последствия своих действий."
 
 USB_operation_overlord_ii: "§YОПЕРАЦИЯ§!: Оверлорд II"
 USB_operation_overlord_ii_desc: "Второй раз в этом столетии американские солдаты с нетерпением ждут брифинга по операции, которая освободит Европу. Пока мы боролись с внутренними террористами, наши высокомерные подчиненные в Европе не смогли сдержать восточную угрозу. Только когда их некомпетентность стала очевидной, а их страны попали в тиски тирании, Европа сумела с трудом победить русских. Наведение порядка не подлежит обсуждению, и эти экстремисты, маскирующиеся под государственных деятелей, являются обузой.\nPax Americana вернулась, и мы повторим наш благородный крестовый поход против фашизма во Второй мировой войне, когда освободим Европу от этих фанатиков."
 USB_destabilize_their_regimes: "Дестабилизировать Их Режимы"
 USB_destabilize_their_regimes_desc: "Одной из наших самых больших ошибок было то, что мы отпустили Европу с поводка. Европа доказала, что не заслуживает автономии; ее силы слабы - они рушатся при малейшем прикосновении, как бумага. А их моральный дух? Апокалиптический.\nДаже внутри страны некомпетентность этих 'наций' проявляется повсеместно: подавленное недовольство, шепотом произносимые призывы к восстанию, внутренние разборки в высшем командовании. Все, что нам нужно сделать, - это просто пнуть гнилую структуру, чтобы она развалилась изнутри. Вот почему не китайцы и не европейцы будут доминировать в мировом порядке. Мы всегда были впереди, мы просто возвращаем себе то место, которое по праву принадлежит нам."
 USB_london_calling: "Лондон Зовёт"
 USB_london_calling_desc: "Европа может и управляется антисоциальными паразитами, которые едва не разорвали нас на части, но у континента все еще есть будущее под восстановленной Pax Americana. Когда тираны поднялись из пепла НАТО, было несколько избранных, которые должны были занять место лидеров. Но вместо того, чтобы встретить их с ликованием и похвалой, их встретили вилами и свинцом. Изгнанные, они с ужасом наблюдали, как Европа извращалась.\nТеперь экстремисты рушатся под давлением, и для нас настало время связаться с этими немногими компетентными людьми. В новой освобожденной Европе интеллектуалы наконец займут свое законное место, вырвавшись из тисков тиранических масс."
 USB_break_the_european_spirit: "Сломить Европейский Дух"
 USB_break_the_european_spirit_desc: "В деле поддержания порядка нет ничего невозможного, особенно когда речь идет о мятежных подчиненных. Европейцы в ярости, набрасываясь на все, что попадается им на пути — их невозможно укротить словами, подарками или жестами доброй воли. Самая большая ошибка после Второй мировой войны заключалась в том, что мы ослабили контроль над Европой. Мы дали им свободу, а они предали нас.\nТеперь мы исправим свои ошибки. Мы не будем просто бомбить их города, разрушать их достопримечательности, морить их народ голодом. Мы сломаем их дух, и они этого не забудут. Мы покажем им, почему новый американский мир будет вечным."
 USB_come_as_liberators: "Прийти Как Освободители"
 USB_come_as_liberators_desc: "Когда мы начали наш благородный крестовый поход против фашизма во Второй мировой войне, мы пришли в Европу как освободители, мы были предвестниками нового, вечного мира на континенте. Старый порядок, зародившийся в том испытании, давно умер, но прежняя стратегия все еще имеет свое применение.\nМы исправили ошибки тех, кто был до нас, мы усовершенствовали нашу стратегию; недостатки, которые привели к Великой Ошибке, были устранены. Когда экстремисты неизбежно рухнут под тяжестью своих несостоятельностей, мы придем в Европу как освободители, как мы сделали это во Второй мировой войне. Массы будут ликовать, они вспомнят, почему они изначально полагались на нас. Мы будем держать покорную Европу в своих руках. На этот раз мы никогда не отпустим ее."
 USB_operation_triumph_chariot: "§YОПЕРАЦИЯ§!: Триумфальная Колесница"
 USB_operation_triumph_chariot_desc: "На протяжении всей этой войны мы повторяли, что концепция свободной Европы принесла только вред.\nЧто достигли европейцы за время нашего отсутствия? Они годами готовились к противостоянию с Россией, но потерпели ужасающее поражение. Когда последствия их провала стали очевидны, они позволили своим странам погрузиться в экстремизм. Теперь, когда им приходится сталкиваться с реальной боевой силой, они находятся в невыгодном положении. Почему континент, который продемонстрировал свою слабость, заслуживает чего-то другого, кроме жесткого контроля?\nМы достаточно долго сражались с европейцами; пришло время напомнить им, почему американский век будет вечным.\n\nВосток, земля, из-за которой они так давно вступили в войну с Россией, - это место, где остались их последние опорные пункты, где они прячутся, как крысы в шкафу. Решительного и методичного последнего наступления в этом регионе будет достаточно, чтобы выжать из европейцев последнюю каплю сопротивления. Их военная машина будет остановлена, их города будут бомбардированы, а экстремисты поплатятся.\nКогда они осознают свои ошибки и наконец преклонят колени, в Европе будет восстановлен порядок раз и навсегда."
 

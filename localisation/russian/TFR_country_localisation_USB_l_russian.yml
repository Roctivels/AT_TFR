 USB_ICE_patrick_lechleitner_sc: "Патрик Лехлейтнер"
 USB_ICE_patrick_lechleitner_tt: "§YПатрик Лехлейтнер§!\nДиректор ICE\n   £population_texticon Ежемесячный прирост населения: §G+25.0%§!"
 USB_ICE_patrick_lechleitner_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_patrick_lechleitner_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YИсторическое Значение:§!\nКарьера субъекта демонстрирует последовательный рост в выполнении функций по обеспечению соблюдения иммиграционного законодательства. Как глава полевого офиса HSI в Вашингтоне, он выстроил важные связи между федеральными правоохранительными органами и спецслужбами, руководил подразделениями по международным операциям, национальной безопасности и киберпреступлениям.\nНачал карьеру в полицейском департаменте округа Фэрфакс, затем стал офицером CBP в Филадельфии. Работа в службе радиоразведки ВМС США в начале карьеры заложила основу для нац. безопасности. Карьера свидетельствует об приверженности расширению пограничной безопасности и интеграции разведывательных данных. Сейчас использует межведомственный опыт для контроля иммиграции после переворота.\n\n§YТекущая Деятельность:§!\nПод руководством субъекта ICE внедрила усовершенствованные системы биометрического отслеживания вдоль приграничных регионов и расширила возможности по содержанию под стражей благодаря координации с объектами FEMA. Агентство расширило сферу своей деятельности, включив в нее операции по обеспечению правопорядка в городах, направленные на нелегальных мигрантов и диссидентов в центральных городах.\n\n§YРанние Годы и Личная Жизнь:§!\nИспытуемый имеет бакалавра психологии (Университет Джорджа Мейсона), магистра криминологии и диплом по исполнительному лидерству, что стратегически позиционировало его вблизи центров власти.\nЕго статус включает членство в Службе старших руководителей и звание старшего научного сотрудника DHS, что отражает опыт в разведке министерства и подготовку к расширенным операциям по обеспечению иммиграционного законодательства.§!"
 
 USB_ICE_staci_barrera_sc: "Стейси А. Баррера"
 USB_ICE_staci_barrera_tt: "§YСтейси А. Баррера§!\nДиректор ICE\n   Ежедневный £pol_power Прирост Политической Силы: §R-0.05§!\n   £population_texticon Ежемесячный прирост населения: §G+10.0%§!"
 
 USB_evidence_locker_text: "Хранилище улик: [?USB_obtain_evidence_var]/6"
 USB_evidence1_text: "УЛИКА I"
 USB_evidence1_loc: "§L[USB_evidence1_scripted_loc]§!"
 USB_evidence1_loc1: "§YОтколовшаяся Ячейка§!\n\nВ результате вооруженного рейда против подозреваемой "антисоциальной ячейки" в Бостоне были задержаны ее члены. Среди их оборудования были обнаружены военные радиостанции с шифрованием и подробные схемы центров содержания под стражей Министерства внутренней безопасности, а также список убежищ, составленный на основе внутренних баз данных правоохранительных органов. Было установлено, что эти люди имели опыт работы в вооруженных силах или правоохранительных органах. Под допросом они рассказали, что их контакт предоставил им информацию и оборудование, пообещав помочь им "бороться с настоящим врагом.""
 USB_evidence1_loc2: "§YТелеметрический Сифон§!\n\nВ спутниковой телеметрической сети, контролирующей строительство глубокой подземной военной базы в пустыне Юты, был обнаружен крошечный несанкционированный отвод. Данные перекачивались не в иностранное государство, а на серверную ферму, зарегистрированную под фиктивной компанией, базирующейся в Фэрфаксе, штат Вирджиния."
 USB_evidence1_loc3: "§YНеправильное Размещение Средств§!\n\nЗначительная часть средств, перенаправленных из гранта на исследования, пропала без вести. Перевод был отслежен до мошеннической подставной компании LLC, зарегистрированной в Панаме. Перевод был осуществлен через множество промежуточных лиц с использованием методов, хорошо известных Когносценти."
 USB_evidence1_loc4: "§YУтечка Данных§!\n\nБыла предпринята попытка получить доступ к внутренней базе данных Министерства энергетики США с целью доступа к информации, касающейся национальной энергетической сети. В частности, злоумышленник пытался получить доступ к информации, касающейся ключевых атомных электростанций и протоколов их безопасности. Попытка не увенчалась успехом, и ее источник был отслежен до сервера, расположенного в Вашингтоне, округ Колумбия, с использованием множества прокси-каналов для сокрытия своего происхождения."
 USB_evidence1_loc5: "§YПопытки Вымогательства§!\n\nНесколько правительственных чиновников получили письма и посылки, содержащие конфиденциальную информацию, касающуюся их личной жизни, а также угрозы, что, если они не выполнят требования, эта информация будет передана антисоциальным группам."
 USB_evidence1_loc6: "§YКлеветническая Кампания§!\n\nНебольшая онлайн-кампания по преследованию нескольких должностных лиц, в которой используются изображения и видео, созданные с помощью искусственного интеллекта, с целью разрушить репутацию этих лиц. Наиболее заметным аспектом является количество онлайн-аккаунтов, созданных специально для этой клеветнической кампании, которые, вероятно, происходят из Азии."
 
 USB_evidence2_text: "УЛИКА II"
 USB_evidence2_loc: "§L[USB_evidence2_scripted_loc]§!"
 
 USB_evidence3_text: "УЛИКА III"
 USB_evidence3_loc: "§L[USB_evidence3_scripted_loc]§!"
 USB_evidence3_loc1: "§YСетевое Взаимодействие§!\n\nРазведывательные сообщества "Пяти Глаз" в течение одного дня несколько раз получали ложную информацию о готовящемся ядерном ударе со стороны США. Сложная и запутанная бюрократическая игра сделала невозможным отслеживание первоначального отправителя (отправителей) сообщений. Эта попытка вызвать "усталость от тревог" может свидетельствовать о связях Иуды с иностранными спецслужбами."
 USB_evidence3_loc2: "§YВолчья Cтая§!\n\nВ попытке взломать брандмауэр Am-Net кто-то попытался передать международной прессе информацию о десятках террористических атак, совершенных одиночками, связанных с американскими спецслужбами. Утечка документов могла поставить под угрозу несколько американских агентств, участвовавших в этом процессе. Хакеры, вероятно, использовали оборудование и/или программное обеспечение военного уровня."
 USB_evidence3_loc3: "§YРассветный Патруль§!\n\nБыли сформированы несколько ударных групп, состоящих из агентов ФБР, ATF и ICE, которые под предлогом борьбы с антисоциальными элементами раздавали поддельные приказы о ликвидации ключевых научных и разведывательных экспертов по всей стране. Организатор явно был хорошо знаком с методами и процедурами Когносценти. Агентам ЦРУ-ЦСО удалось предотвратить эти убийства."
 USB_evidence3_loc4: "§YКонец Туннеля§!\n\nОтряды ЦРУ-ЦСО провели рейд в старом туннеле под границей между США и Мексикой. Туннель был отмечен для уничтожения Министерством внутренней безопасности, но это так и не было сделано, и, по всей видимости, он использовался неизвестными лицами. Требуется дальнейшее расследование."
 USB_evidence3_loc5: "§YПодозрительный Запрос§!\n\nЧерез старый, неактивный канал правоохранительных органов был направлен конфиденциальный запрос с просьбой предоставить полные, нередактированные личные и психологические досье директора Бернса с ранних лет его работы в Агентстве."
 USB_evidence3_loc6: "§YСтамбульский Дед-Дроп§!\n\nЗашифрованный пакет данных, содержащий тщательно перекрестно процитированные материалы дел, подробно описывающие сговор ЦРУ с ультраправыми группами во время гражданской войны, был отправлен с защищенного сервера в анонимный тайник в Стамбуле. Он был отправлен анонимным лицом, использующим кодовое имя EDGAR."
 USB_evidence3_loc7: "§YНесанкционированный Перевод Персонала§!\n\nЗа последний месяц пропали три высокопоставленных исследователя из CDC, два низкопоставленных клерка из FEMA и дюжина охранников среднего звена из центра содержания под стражей ICE. Их уход был санкционирован поддельными приказами о переводе, в которых использовались протоколы, специфичные для каждого агентства, что свидетельствует о глубоком знании институциональной структуры."
 USB_evidence3_loc8: "§YПожертвования Через Посредника§!\n\nСерия анонимных пожертвований в пользу католической благотворительной организации, поддерживающей "неправомерно уволенных федеральных служащих," была отслежена до сложной серии транзакций с криптовалютой. Первоначальный ключ активации кошелька, расшифрованный, был стихом из Евангелия от Матфея 16:26: "Какая польза человеку, если он приобретет весь мир, а душе своей повредит? или какой выкуп даст человек за душу свою?""
 USB_evidence3_loc9: "§YИгра в Доктора§!\n\nБыло установлено, что в нескольких учреждениях отсутствовало медицинское оборудование, такое как лекарства, хирургические инструменты и аппаратура. Большая часть этого оборудования использовалась для оказания помощи раненым и задержанным лицам, но часть также использовалась для проведения допросов с применением жестких методов."
 USB_evidence3_loc10: "§YБольшой Брат§!\n\nСотрудники службы внутренней безопасности ЦРУ обнаружили в нескольких правительственных зданиях несанкционированные камеры видеонаблюдения, прослушивающие устройства, датчики движения и другие устройства слежения, установленные во время ремонтных работ. Качество и класс оборудования соответствуют тем, которые используются в программах слежения ЦРУ."
 USB_evidence3_loc11: "§YЛожные Идентичности§!\n\nВ базе данных вакцинированных граждан "Americare" обнаружено значительное число ложных имён. Идентичности, подделанные, чтобы сымитировать успех биометрической системы слежки за людьми.\nБолее глубокое расследование показало что из-за этого значительное число подозреваемых смогли избежать преследования."
 
 USB_evidence4_text: "УЛИКА IV"
 USB_evidence4_loc: "§L[USB_evidence4_scripted_loc]§!"
 
 USB_evidence5_text: "УЛИКА V"
 USB_evidence5_loc: "§L[USB_evidence5_scripted_loc]§!"
 USB_evidence5_loc1: "§YПризрачный Сервер§!\n\nПосле исчерпывающей конфискации прокси-каналов подозрительные запросы были отслежены до защищенного сервера в Маклине, штат Вирджиния. Такие запросы касались законов о праве принудительного отчуждения и федеральных протоколов конфискации частной собственности в соответствии с Законом о безопасности общественного здравоохранения."
 USB_evidence5_loc2: "§YТайное Исследование§!\n\nБез разрешения руководства было начато секретное исследование долгосрочных неврологических последствий использования микрочипа, входящего в состав обязательной вакцины. Предварительные результаты исследования, свидетельствующие о повышенной внушаемости и подавленной эмоциональной реакции, по-видимому, собирались с целью контролируемой утечки в прессу."
 USB_evidence5_loc3: "§YСклад Оружия§!\n\nОтряд ЦРУ-ЦСО захватил гараж, заполненный различным зарегистрированным огнестрельным оружием, которое ранее пропало из правительственного хранилища в Техасе. На заднем дворе были найдены полусгоревшие документы Министерства юстиции."
 USB_evidence5_loc4: "§YСпециальная Доставка§!\n\nИз аэропорта Денвера на авиабазу Национальной гвардии Колорадо были отправлены подозрительные грузы строительного оборудования. Это оборудование явно не соответствует официально заявленным работам по "обновлению ангаров," для которых оно предназначено."
 USB_evidence5_loc5: "§YСмертельная Инъекция§!\n\nБюрократический аппарат зафиксировал десятки внезапных, необычных смертей в Мичигане. Специальные следственные группы пришли к выводу, что все они умерли после получения бустерной дозы из партии зараженной вакцины, доставленной в медицинский центр несколькими днями ранее, что было попыткой подорвать программу вакцинации и доверие людей к правительству. Все вакцины из этой партии конфискованы, информация об этом инциденте была засекречена."
 USB_evidence5_loc6: "§YРейды на Секретные Объекты§!\n\nСообщения об антисоциальных атаках на секретные объекты распространились по всей стране; эти объекты были предназначены для наблюдения и интегрированы с новейшими системами, являющимися частью программ Am-Net и Проект Maven."
 USB_evidence5_loc7: "§YТорговля Людьми§!\n\nПо меньшей мере дюжина человек, которые были задержаны в нескольких учреждениях на границе США и Мексики, так и не были найдены в указанных учреждениях. Более тщательное расследование пришло к выводу, что указанные лица были похищены для личного использования."

 USB_evidence6_text: "УЛИКА VI"
 USB_evidence6_loc: "§L[USB_evidence6_scripted_loc]§!"
 USB_evidence6_loc1: "§YРаздел Шестой§!\n\nАвтосалон Toyota в штате Мэриленд, открытый всего через несколько месяцев после гражданской войны, был признан местом отмывания денег; после дополнительного расследования дело было передано ЦРУ: одно из сообщений, связанных с транзакциями, содержало зашифрованное сообщение с важной информацией о технологиях искусственного интеллекта, используемых Киберкомандованием в рамках закона Patriot II."
 USB_evidence6_loc2: "§YКрасный Октябрь§!\n\nСонобуй в Тихом океане зафиксировал подводную лодку типа Чжоу ВМС КНР, которая регулярно останавливалась в точке 5°41'06"Ю. Ш. 102°53'03" З. Д. Наблюдение показало, что подводная лодка передавала и принимала сообщения в направлении Майами. USINDOPACOM сообщило, что не располагает информацией об этом событии."
 USB_evidence6_loc3: "§YЯдерная Ключ-Карта§!\n\nКлюч-карта от хранилища низкоактивных ядерных отходов, одного из десятков подобных объектов, пропала из инвентарного списка. Запрос на ее изъятие был подан по распоряжению ФБР под предлогом проведения плановой проверки. Проверка так и не была проведена."
 USB_evidence6_loc4: "§YПерехваченное Сообщение§!\n\nОтряд ЦРУ по перехвату радиосигналов зафиксировал зашифрованное сообщение, которое передавалось из северо-восточной части Вашингтона, точный адрес пока не установлен. Частичное расшифрование показало, что использовались позывные "SERGEANT STUBBY" и "BROTHER TEN." Остальная часть сообщения написана неизвестным кодом и пока расшифровывается."
 USB_evidence6_loc5: "§YСекретная Лаборатория§!\n\nПодпольная лаборатория, расположенная в закрытой станции метро под Манхэттеном, была захвачена подразделением ЦРУ-ЦСО. В лаборатории хранилось похищенное оборудование CDC и находился небольшой штат 'пропавших' исследователей, все из которых покончили с собой, прежде чем их успели допросить. На лабораторном столе лежал наполовину законченный отчет с подробным описанием метода обратного биометрического отслеживания. Рядом с ним лежал изношенный розарий."
 USB_evidence6_loc6: "§YОпасная Среда§!\n\nСамолеты воздушной разведки ЦРУ обнаружили несанкционированную деятельность к северу от проекта Lost Creek в центральной части штата Вайоминг. Наземные группы обнаружили подземный выемной объект, грузовики без опознавательных знаков и несколько сотен человек, которые были задержаны в лагере FEMA и должны были быть отправлены на близлежащую угольную шахту. Ни один из командного состава не был взят живым."
 USB_evidence6_loc7: "§YСанитарный День§!\n\nВесь несущественный персонал подводной базы Кингс-Бэй был отправлен в обязательный отпуск для прохождения медицинского осмотра, вакцинации и санитарной проверки на базе в связи с угрозой биологического/химического терроризма. Запрос на проведение проверки был отправлен через каналы, связанные с крупными фармацевтическими компаниями."
 USB_evidence6_loc8: "§YПрятки§!\n\nВ результате рейда ЦРУ в порту Тихуаны была пресечена несанкционированная операция картеля, в ходе которой был захвачен корабль, только что прибывший из Сан-Диего: среди оружия и наркотиков агенты ЦРУ-ЦСО обнаружили контейнер с необычно высокой радиоактивностью. С помощью передовых методов допроса захваченных сотрудников удалось выяснить, что слепое пятно в зоне ответственности береговой охраны позволяло им контрабандой перевозить грузы через границу, что документировалось как транспортные операции из лагерей FEMA на границе США и Мексики, которые на самом деле никогда не участвовали в этом."
 

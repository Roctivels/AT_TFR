 USB_ATF_marvin_richardson_sc: "Марвин Г. Ричардсон"
 USB_ATF_marvin_richardson_tt: "§YМарвин Г. Ричардсон§!\nДиректор ATF\n   £operatives_root_out_resistance_texticon Эффекты задания «Искоренить сопротивление»: §G+10.0%§!"
 USB_ATF_marvin_richardson_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_marvin_richardson_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YИсторическое Значение:§!\nДо службы в ATF субъект был лейтенантом в правоохранительных органах. В ATF он вырос профессионально и участвовал в осаде Вако в 1993 году, что, вероятно, повлияло на его подход к разоружению граждан. Награждён медалью "За службу в условиях враждебных действий" и последовательно поддерживал решительные меры ATF против антисоциальной деятельности.\n\n§YТекущая Деятельность:§!\nПод руководством субъекта ATF разработало протоколы изъятия оружия у лиц, выявленных системами прогнозирования угроз на основе ИИ. Операции приоритетно направлены на предотвращение антисоциальных действий, координируясь с ФБР и ЦСО для исполнения ордеров на конфискацию.\n\nСубъект расширил возможности ATF в криминалистике, внедрив реестры для отслеживания оружия и баллистического анализа в рамках Закона о безопасности общественного здравоохранения. Антикультовые операции по "доктрине Вако" нейтрализовали антисоциальные элементы и уничтожили десятки потенциально опасных комплексов, считавшихся угрозой нац. безопасности.\n\n§YРанние Годы и Личная Жизнь:§!\nИспытуемый вырос в Форт-Уэрте, штат Техас, в семье с девятью братьями и сестрами. Этот опыт жизни в большой, потенциально хаотичной семье, возможно, повлиял на его более позднее видение вопросов контроля над толпой и необходимости решительного вмешательства государства в потенциально антисоциальные семейные структуры. Испытуемый имеет степень бакалавра делового администрирования Университета Северного Техаса, а также степень магистра наук в области человеческих отношений и бизнеса Университета Амбертона. Испытуемый женат, имеет шестерых детей.§!"
 

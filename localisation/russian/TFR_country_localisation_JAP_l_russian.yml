 JAP_ldp_reelection_standart: "они требуют полной отставки правительства и проведения новых выборов, чтобы "смыть позор поражения", и эти требования были выполнены из-за опасения дальнейшей дестабилизации ситуации. На быстро созванных президентских выборах ЛДП выбрала Сигэру Исибу в качестве президента и своего следующего кандидата на выборах. Несмотря ни на что, ЛДП все же удалось победить на выборах, но оппозиционные партии получили пугающе большое количество голосов."
 JAP_liberal_downfall: "они требуют полной отставки правительства и проведения новых выборов, чтобы "смыть позор поражения", и эти требования были выполнены из-за опасения дальнейшей дестабилизации ситуации. ЛДП под руководством Сигэру удалось совершить политическое возвращение и победить на выборах с невероятным отрывом."

 JAP_japanese_japan_category_desc: "\n\n\n\n\n£GFX_JAP_GUNDAAM_banner\n\n\n\n\n\n\n\n§pМЕГА РОБОТЫ (o-_-o)§!"
 JAP_go_back_time: "§RИзменить Прошлое§!"
 JAP_go_back_time_desc: "Вы видите это? Мир погрузился в хаос, словно кто-то перезаписал код реальности грязными руками! Войны, кризисы, распады - всё началось с одного крошечного вируса, который исказил саму ткань времени. Но спросите любого: "Почему?" Они пожмут плечами. "Судьба", - пробормочут. Судьба? Нет! Это - сбой в алгоритмах судьбы!\n\nГде-то в подземных лабораториях Токио тикают часы обратного отсчёта. Наши учёные взломали квантовые уравнения, нашли точку сингулярности - 2019 год. Там, в тумане забытых дней, спрятан нулевой пациент. Тот, кто запустил домино катастроф. Мы построим мост через временную ось, перепишем код пандемии... и сотрём этот кошмар из памяти Вселенной!\n\nНо знайте: время - не глина. Одно неверное движение, и вместо исправления получим коллапс. Готовы ли вы стать хакерами истории? Загрузить антивирус в прошлое? Перезагрузить мир, где нефть - просто ресурс, а не оружие, где маски остались в операционных, а не на улицах?\n\nВключайте резонаторы хроно-поля. Настраивайте координаты. Сегодня мы не учёные - мы хирурги времени. И наш скальпель - это вакцина против безумия!"

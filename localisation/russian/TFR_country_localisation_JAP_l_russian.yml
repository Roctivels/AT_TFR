 JAP_reformed_education: "Реформированное Образование"
 JAP_economic_stagnation_-1_idea: "Экономическая Стагнация"
 JAP_economic_stagnation_-1_idea_desc: "В последние годы экономика Японии находится в состоянии стагнации: медленный рост, низкая инфляция и сокращение численности населения создают серьезные проблемы. Экономический застой в стране объясняется целым рядом факторов, включая демографические тенденции, дефляцию и отсутствие структурных реформ.\nОдной из основных причин экономического застоя в Японии является старение и сокращение численности населения. В стране проживает одно из старейших в мире население с низким уровнем рождаемости и быстро стареющей рабочей силой. Эта демографическая тенденция привела к сокращению численности рабочей силы и снижению потребительских расходов, что сдерживает экономический рост."
 JAP_economic_stagnation_idea: "Экономическая Стагнация"
 JAP_economic_stagnation_idea_desc: "В последние годы экономика Японии находится в состоянии стагнации: медленный рост, низкая инфляция и сокращение численности населения создают серьезные проблемы. Экономический застой в стране объясняется целым рядом факторов, включая демографические тенденции, дефляцию и отсутствие структурных реформ.\nОдной из основных причин экономического застоя в Японии является старение и сокращение численности населения. В стране проживает одно из старейших в мире население с низким уровнем рождаемости и быстро стареющей рабочей силой. Эта демографическая тенденция привела к сокращению численности рабочей силы и снижению потребительских расходов, что сдерживает экономический рост."

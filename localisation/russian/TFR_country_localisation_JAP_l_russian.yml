 JAP_oil_crisis_cat: "Нефтяной Кризис"
 JAP_oil_crisis_cat_desc: "Кошмары 1973 года внезапно вернулись и преследуют современную Японию. Мы надеялись, что нашим детям не придется страдать так, как страдали мы, но того, что произошло, уже не изменить, и все, что мы можем сделать, мы должны сделать, а значит обеспечить новые источники нефти и решить эту проблему, пока она не вышла из-под контроля."

 JAP_asean_oil: "Нефтяная Сделка с §pАСЕАН§!"
 JAP_asean_oil_desc: "Несмотря на то, что наши отношения со странами АСЕАН меняются в зависимости от обстоятельств и альянсов, сейчас мы нуждаемся в их дружбе больше, чем когда-либо. Нефть из Малайзии и Индонезии, несомненно, создаст частичное и временное облегчение для наших сокращающихся нефтяных запасов."
 JAP_russian_deal: "Нефтяная Сделка с [SOV.getflag]§GРоссией§!"
 JAP_russian_deal_desc: "Многие наши союзники не согласятся с этим, но в наших тяжелых условиях даже бывшие враги могут стать нашими новыми друзьями. Покупка российской нефти была ограничена из-за наших связей с Соединенными Штатами, но теперь, когда они едва держатся вместе, мы должны использовать все возможные источники нефти, которые у нас есть. В конце концов, не важен процесс, важен результат."

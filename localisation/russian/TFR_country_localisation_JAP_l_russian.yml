 JAP_japanese_pacifism_idea: "Японский Пацифизм"
 JAP_japanese_pacifism_idea_desc: "С момента окончания Второй мировой войны Япония была вынуждена отказаться от старых методов милитаризма и принять более пацифистский образ жизни по сравнению с прошлым. В соответствии со статьей 9 Конституции это делает практически невозможным для нации создание какой-либо армии. Однако в связи с растущей угрозой со стороны Китая на востоке и постоянно ослабевающими Соединенными Штатами многие начали подвергать сомнению статус-кво и предлагать отменить статью 9 и создать надлежащую армию для защиты Японии и ее народа."
 JAP_japanese_pacifism_2_idea: "Японский Пацифизм"
 JAP_japanese_pacifism_2_idea_desc: "С момента окончания Второй мировой войны Япония была вынуждена отказаться от старых методов милитаризма и принять более пацифистский образ жизни по сравнению с прошлым. В соответствии со статьей 9 Конституции это делает практически невозможным для нации создание какой-либо армии. Однако в связи с растущей угрозой со стороны Китая на востоке и постоянно ослабевающими Соединенными Штатами многие начали подвергать сомнению статус-кво и предлагать отменить статью 9 и создать надлежащую армию для защиты Японии и ее народа."
 JAP_japanese_pacifism_3_idea: "Японский Пацифизм"
 JAP_japanese_pacifism_3_idea_desc: "С момента окончания Второй мировой войны Япония была вынуждена отказаться от старых методов милитаризма и принять более пацифистский образ жизни по сравнению с прошлым. В соответствии со статьей 9 Конституции это делает практически невозможным для нации создание какой-либо армии. Однако в связи с растущей угрозой со стороны Китая на востоке и постоянно ослабевающими Соединенными Штатами многие начали подвергать сомнению статус-кво и предлагать отменить статью 9 и создать надлежащую армию для защиты Японии и ее народа."
 JAP_aging_population_idea: "Стареющее Население"
 JAP_aging_population_idea_desc: "Более 76,4% населения Японии считается пожилым, что в значительной степени вызвано периодом бесплодия после послевоенного бэби-бума 1940-х годов и высокой ожидаемой продолжительностью жизни. Несмотря на крайний демографический дисбаланс, нет реального ощущения демографического кризиса, и уровень жизни сегодня все еще относительно высок. Однако это привело к значительной экономической нагрузке на и без того стагнирующую японскую экономику, в основном из-за того, что огромное количество населения вышло на пенсию, а правительство испытывает большую потребность в услугах по уходу за ними. Японское правительство продолжило внедрять новые способы для пожилых людей снова стать активными в обществе, а также субсидировать новые семьи и всячески поощрять рождение новых детей с помощью более простых услуг по уходу."

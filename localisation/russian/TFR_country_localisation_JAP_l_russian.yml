 jap.81.t: "Проблема Курильских Островов"
 jap.81.d: "Курильские острова, состоящие из Кунашира, Итурупа, островов Хабомаи и Шикотан, имеют огромное стратегическое значение. Они охраняют выход в Охотское море, контролируют жизненно важные морские пути, обладают богатыми рыбными ресурсами, а также потенциальными запасами нефти и природного газа. За последние десятилетия Япония и Россия пережили ряд протестов, компромиссов и конфликтов по поводу суверенитета этих островов.\n\nОднако сейчас правительство Японии сосредоточено на противодействии растущему влиянию Китая, и многие в правительстве считают, что Япония не способна и не в состоянии продолжать вражду с Россией. Решение проблемы Курильских островов могло бы ослабить давление на северную оборону Японии и подготовить почву для заключения ряда торговых соглашений с Россией в целях стимулирования экономического развития. Тем не менее, некоторые утверждают, что Япония не должна отказываться от своих претензий на эти неотъемлемые территории."
 jap.81.a: "Пришло время подписать мирный договор..."
 jap.81.b: "Мы отложим этот вопрос на потом"
 jap.82.t: "Русско-японский мирный договор"
 jap.82.d: "После долгих и сложных переговоров японское правительство наконец подписало исторический мирный договор с Российской Федерацией, официально отказавшись от претензий на южные Курильские острова (в Японии они называются островами Хабомаи, Шикотан, Кунашир и Итуруп)\n\nХотя этот договор знаменует начало новой эры в японо-российских отношениях, настроение в Токио неоднозначное. Перед офисом премьер-министра собралась большая толпа. Сторонники считают, что отказ от территориального спора - необходимый компромисс для долгосрочного мира и стабильности. Противники, однако, осуждают слабость правительства, рассматривая ее как предательство национального достоинства и гордости и отказ от исторических обид."
 jap.82.a: "Наконец-то!"
 jap.83.t: "Расширение Сотрудничества с Японией"
 jap.83.d: "По Дальнему Востоку России прокатилась волна экономического возрождения. Масштабные японские инвестиции хлынули как прилив, охватывая все - от развития энергетики до инфраструктурных проектов. Рыбоперерабатывающие заводы переняли передовые японские технологии и оборудование, а торговля лесом получила стремительный рост, и огромные лесные ресурсы России экспортируются по всему миру через японские каналы.\n\nЯпонские товары теперь заполняют полки торговых центров по всей России, предлагая все - от высокотехнологичной электроники до предметов первой необходимости, удовлетворяя практически все потребности местных потребителей. Некогда полуразрушенные заводы на Дальнем Востоке были возрождены с помощью японских средств и технологий, что вызвало бум на местном рынке труда. Современные производственные линии работают без остановки, привлекая большое количество рабочей силы и стимулируя экономический рост, что значительно повышает уровень жизни жителей региона."
 jap.83.a: "Хорошо!"
 jap.84.t: "Российские Инвестиции"
 jap.84.d: "После расширения нашего сотрудничества российские энергетические компании установили стратегические партнерские отношения с энергетическими компаниями в нашей стране. Совместными усилиями они построили множество нефтепроводов и терминалов по приему сжиженного природного газа, обеспечив стабильность и безопасность наших энергопоставок. Кроме того, Россия реализовала ряд крупных проектов внутри страны, включая строительство высокоскоростных железных дорог, портов и мостов. В частности, российские инвестиции значительно улучшили транспортные условия в регионе Хоккайдо, способствуя развитию туризма и смежных отраслей.\n\nПомимо экономического сотрудничества, Япония и Россия добились значительного прогресса в области культурного обмена. Русская рок- и панк-музыка завоевала значительную популярность на японском рынке. Кроме того, две страны добились многочисленных успехов в области кинообмена. Настолько, что "Союзмультфильм" начал сотрудничество с несколькими аниме-студиями для создания совместного российско-японского мультфильма, в процессе обмениваясь опытом в создании мультфильмов, кроме того, наплыв российских фильмов и сериалов наводнил Японию, ибо сериал "Король и Шут" (дублированный на японский язык как Koror i Shut) стал популярным в Японии."
 jap.84.a: "Японцы и Русские - Братья Навеки!"
 jap.85.t: "Экономика Открытых Дверей с Россией!"
 jap.85.d: "После подписания договора двусторонняя торговля между Японией и Россией значительно возросла. Благодаря снижению тарифных барьеров и постепенному внедрению мер по упрощению процедур торговли японский экспорт в Россию достиг значительных успехов, особенно в таких отраслях, как автомобилестроение, электроника и высокотехнологичное оборудование, причем объемы экспорта значительно возросли. В то же время российские энергоресурсы, включая нефть, природный газ и уголь, постоянно поставляются в Японию, значительно облегчая ее давний дефицит энергии.\n\nВ дополнение к бурно развивающейся торговле, сотрудничество в инвестиционном секторе между Японией и Россией углубилось и диверсифицировалось. Японские компании участвуют в развитии многих регионов Дальнего Востока и Центральной Сибири, инвестируя в энергетику, инфраструктурное строительство, сельское хозяйство, туризм и высокотехнологичные отрасли. В то же время российские компании увеличили свои инвестиции в японский рынок, особенно в энергетику, минеральные ресурсы и лесное хозяйство, способствуя двустороннему притоку инвестиций.\n\nВ сфере технологического сотрудничества две страны проводят обширные совместные исследования и обмениваются технологиями. Особенно в области робототехники японский технологический опыт сочетается с потребностями российского рынка, что привело к разработке и практическому применению ряда инновационных продуктов."
 jap.86.d: ""
 jap.87.t: "Растущий радикализм против ЛДП!"
 jap.87.d: "Тревожные новости по всей стране: власть ЛДП укрепилась, а влияние других партий значительно уменьшилось, и в сердцах и умах японцев укоренились более радикальные элементы.\n\nНачиная от демократических групп, популистов, активистов и даже более нестабильных фракций, все они предпринимают в основном мирные действия против нынешней политической монополии ЛДП на Японию. \n\nВ связи с постоянно растущим присутствием диссидентских голосов, не будет и дня без новостей о радикальных действиях, но с сильными руками закона и порядка на нашей стороне, потребуется катастрофа, чтобы мы пали."
 jap.87.a: "Мы не склонимся ни перед чем!"
 jap.88.t: "Голосуй или Проиграешь"
 jap.88.d: ""Ну и что, зачем мне голосовать по вопросу, который меня не волнует?"\n\nДля Такеши и Акио это был долгий день, японский парламент - это огромная паутина нюансов и закулисных сделок, создаются коалиции и члены становятся гирями, что склоняют чашу весов в свою пользу. Один из многочисленных баров Токио был пуст, когда два члена парламента сидели, наслаждаясь парой кружек пива.\n\nАкио усмехнулся, он всегда считал Такеши идеалистом, а в некоторые другие моменты тот был упрямым ублюдком, которого всегда надо было поставить на место.\n\n"Ну, ты знаешь, как это бывает, весь смысл коалиций в том, чтобы мы все были на одной волне."\n\n"Да, но такие вещи требуют тщательного исследования, а я не так много знаю об этом, а ты просто хочешь, чтобы я проголосовал за то, что моя интуиция подсказывает мне не делать." Такеши был уже немного навеселе, Акио действительно придирался к нему, и он предпочел бы просто оставить эту тему.\n\n "Кроме того, ты думаешь, что твоя карьера сохранится, если остальные узнают, что ты ведешь себя как реб-"\n\n"Хорошо! Хорошо! Я проголосую, только... брось это и хорошо проведи время, ладно?"\n\nАкио снова улыбнулся, но уже более теплым тоном. "Вот так бы сразу, если это поможет, я оплачу счет"."
 jap.88.a: "Свобода приходит с ответственностью"
 jap.89.t: "Проблема Выбора"
 jap.89.d: "Был дождливый день, солнца нигде не было видно, люди стояли в очереди. Среди них выделялась молодая пара, мужчина и женщина, он нес зонтик, защищая свою любимую от дождя.\n\n"Сколько еще осталось?" - спросила женщина.\n\n"Не так уж и много, не нужно быть такой мрачной, важно проголосовать, чтобы твой голос был услышан, разве нет?" Мужчина мягко улыбнулся ей, наблюдая за тем, как очередь понемногу приближается к зданию. Выборы мэра были не за горами, и период голосования давал людям шанс высказать свое мнение, показать свое недовольство или удовлетворение текущим положением вещей, пусть и на местном уровне.\n\n "Какой смысл? ЛДП все равно победит, как и раньше. Я могла бы быть дома, в тепле и уюте, с тобой, а теперь мы просто застряли здесь под жалким дождем."\n\nМужчина немного посмеялся. "Ну, все, что у нас есть - это голос и время, если оно у нас есть, то почему бы не использовать его сейчас? К тому же, кто знает, может быть, в конце концов, произойдут какие-то реальные изменения."\n\n"Хорошо, но после этого ты должен мне пирожное.""
 jap.89.a: "Такова жизнь"
 jap.90.t: "Железная Рука Правосудия"
 jap.90.d: "Прошло некоторое время после войны на Тайване, улицы были наполнены беспорядками, акты насилия происходили по всему политическому спектру, и правительство пыталось сохранить единство в стране.\n\nПожилой мужчина смотрел на улицы из своей квартиры, мимо него проезжали военные грузовики, когда он заметил суматоху на ближайшей к нему улице.\n\n\n Молодой человек кричал на одного из солдат на военном посту, было трудно разобрать, что он говорит, но в его голосе было много гнева. Солдат сохранял спокойствие, он не в первый раз терпел словесные оскорбления, но один из присутствующих солдат потерял терпение и сбил молодого человека с ног прикладом винтовки.\n\nСтарик смотрел, как сбитого с ног гражданина утаскивают, и вздохнул, размышляя о том, что недавно японское правительство объявило военное положение, которое значительно сократило ряд свобод, экстремистов арестовывали, а улицы были завалены военными блокпостами.\n\nВоенные были слишком параноидальны, думал он, и немного суровы, но он понимал необходимость таких действий, он просто надеялся, что Япония вернется к стабильному состоянию раньше, чем позже, и если это означает, что буйные получат крепкую пощечину, то так тому и быть."
 jap.90.a: "Я называю это справедливостью"
 jap.91.t: "Смерть Синдзо Абэ"
 jap.91.d: "Шокирующие новости приходят из города Нара, экс-премьер министр Синдзо Абэ подвергся нападению во время своего выступления. Его речь была прервана двумя громкими ударами, донесшимися с улицы позади политика, сопровождаемыми большими клубами дыма. Предполагаемый нападавший был повален на землю и уведен охраной.\n\nАбэ был доставлен на вертолете в больницу медицинского университета Нара в городе Касихара, где его признали мертвым. Официальное вскрытие показало, что "пуля прошла через верхнюю часть левой руки Абэ и повредила кровеносный сосуд под ключицей", а официальной причиной смерти названа "потеря крови"\n\nНападавший, 41-летний Тецуя Ямагами, не пытался скрыться. Он был арестован и допрошен полицией."
 jap.91.a: "Спокойной ночи, милый принц..."
 jap.92.t: "Церковь Объединения"
 jap.92.d: "По некоторым данным, Ямагами заявил следователям, что его побудило к этому не несогласие с политическими убеждениями Абэ, а "слухи о связи бывшего лидера с некой организацией, которую полиция не назвала". По другим данным, Ямагами обвиняет "некую организацию" в том, что она обанкротила его мать, которая, по всей видимости, пожертвовала много денег этой группе.\n\nВ настоящее время все споры о том, кто же является этой "некой организацией", сосредоточены вокруг Церкви Объединения. Семейная федерация за мир во всем мире и объединение - ранее называвшаяся Церковью объединения, но, возможно, более известная как церковь, к которой принадлежат "муниты", - была основана преподобным Сун Мён Муном в 1954 году. Еще одна организация, которая упоминается в связи с Абэ (и с Церковью Объединения), - Nippon Kaigi. Ее называют "крупнейшей и наиболее влиятельной консервативной организацией правого толка". В ЛДП все еще есть консервативные члены, которые участвуют во всех этих организациях, и возникает вопрос, что делать с этими элементами? Попытаемся ли мы выгнать их из политики или будем ждать, пока все наладится?"
 jap.92.a: "Мы должны убрать эти элементы из политики!"
 jap.92.b: "Нам нужно просто залечь на дно..."
 jap.93.t: "Японско-тайваньское братство!"
 jap.93.d: "Война на Тайване разрушила жизни многих людей, против китайского агрессора мы страдали вместе с нашими союзниками в Тайбэе, и в войне мы нашли братство.\n\nПосле успешного оттеснения китайцев в океан, мы остались с сильными разрушениями на землях Тайваня, горький огонь, пролитый на нас китайцами. Однако в этом мы нашли общий язык.\n\nМы приложили усилия, чтобы помочь Тайваню в его восстановлении и создании новых оборонительных сооружений, в результате чего мы приобрели большое влияние на остров, до такой степени, что есть опасения, что это вернёт тёмные времена Японской Империи.\n\nМы не имеем таких намерений, и с яркими улыбками и достаточным количеством поставок мы можем убедить народ Тайваня, что мы имеем хорошие намерения."
 jap.93.a: "Два солнца, вместе."
 jap.94.t: "Экономический Кризис Поразил Японию!"
 jap.94.d: ""
 jap.94.a: "Это конец света в нашем понимании."
 jap.95.t: "Япония обнуляет свой долг Америке!"
 jap.95.d: ""
 jap.95.a: "Наконец-то мы свободны"
 jap.96.t: "Президентские выборы Либерально-демократической партии!"
 jap.96.d: "Пришло время для очередного съезда Либерально-демократической партии Японии, где решится будущее страны и партии. Вопрос на повестке дня - продолжение полномочий действующего премьер-министра или выдвижение нового кандидата, способного возглавить страну на новом этапе её развития. Фракции внутри ЛДП начинают активные дебаты о том, стоит ли сохранить лидерство действующего главы правительства или выбрать более перспективного лидера для укрепления позиций партии. Независимо от исхода голосования, этот выбор окажет решающее влияние на внутреннюю политику ЛДП в ближайшие годы."
 jap.96.a: "Сигэру Исиба"
 jap.96.b: "Фумио Кисида"
 jap.96.c: "Таро Коно"
 jap.96.e: "Санаэ Такаити"
 jap.96.f: "Синдзиро Коидзуми"
 jap.96.g: "Синдзо Абэ"
 jap.97.t: "Парламентские Выборы"
 jap.97.d: "По всей стране проходят митинги в поддержку ЛДПЯ, а оппозиция теряет почву под ногами, не в силах предложить альтернативу, сопоставимую с триумфом партии. Радость от победы в войне и чувство гордости за достижения нации пронизывают всё общество - от сельских городков до мегаполисов. Избиратели, воодушевленные этим успехом, массово устремляются к урнам, чтобы поддержать ЛДПЯ на предстоящих парламентских выборах.\n\nПолитологи уже назвали этот момент "Патриотической волной", поскольку электоральные настроения оказываются абсолютно доминирующими в пользу ЛДПЯ. Опросы показывают рекордные рейтинги поддержки, а предвыборные кампании оппозиционных партий едва привлекают внимание прессы. Ожидается, что ЛДПЯ легко победит, сохранив своё большинство в парламенте с ещё более крепким мандатом на продолжение своей политики."
 jap.97.a: "Победа!" 
 jap.98.t: "Корейско-Японское Партнерство"
 jap.98.d: "После великой победы над китайскими агрессорами на Корейском полуострове мы накопили значительное количество доброй воли по всему континенту, и те, кто сражался с нами как союзники, стали видеть нас в гораздо более позитивном свете, одним из них является Корея.\n\nНаша история с Кореей не всегда была позитивной, однако прошлое - это блок на ногах обоих наших народов, который сдерживает нас. Учитывая количество усилий, ресурсов, жизней и средств, вложенных в Корею, постепенно возникает вопрос о том, сможем ли мы возродить новую вечную дружбу.\n\nЭто, конечно, встречает неоднозначную реакцию, некоторые беспокоятся, что это просто еще одна попытка неоимпериализма, а другие не видят смысла в том, чтобы взваливать их бремя на себя. Конечно, это никогда не достигнет такого уровня, как несколько лет назад, но голоса протеста будут звучать всегда. Однако есть и те, кто с этим согласен: некоторые считают это четким сигналом для остального мира, что нападение на Корею - это нападение на Японию, и признаком того, что наши отношения полностью восстановились.\n\nВ конце концов, выбор должен быть сделан."
 jap.98.a: "Давайте перешагнем через прошлое и создадим новую вечную дружбу!" 
 jap.98.b: "Мы не должны переусердствовать с этим..."
 jap.99.t: "Синдзо Абэ возвращается в политику!"
 jap.99.d: "После некоторого времени борьбы с язвенным колитом бывший премьер-министр Синдзо Абэ сделал неожиданное заявление о своем возвращении в японскую политику. В целом это было воспринято как позитивное событие, хотя отдельные недоброжелатели то тут, то там выражали уныние по поводу возможного сценария возвращения к статус-кво.\n\nЛДП приняла его с распростертыми объятиями, и Синдзо уже дал понять, что снова нацелился на пост премьер-министра, надеясь, что на этот раз у него будет меньше проблем со здоровьем."
 jap.99.a: "Возвращение к норме."
 jap.100.t: "Текущие Цели Модернизации Армии"
 jap.100.d: "Ситуация в Тайваньском проливе стремительно обострилась, и хотя конфликт временно утих, в деятельности Сил самообороны обнаружились серьезные недостатки, некоторые из которых достаточно существенны, чтобы угрожать их основным боевым возможностям. Если эти проблемы не будут своевременно решаться, а будут игнорироваться, боеготовность наших вооруженных сил будет сложно поддерживать на нынешнем уровне, а возможно, даже произойдет значительный упадок. Поэтому проведение комплексных реформ по модернизации вооруженных сил является неотложной задачей, которую нельзя откладывать.\n\nНаша цель больше не состоит в том, чтобы просто полагаться на Силы самообороны для защиты родины Японии. Вместо этого мы должны превратить их в многофункциональную, всеохватывающую силу, способную реагировать на сложные международные ситуации. После распада Соединенных Штатов стало очевидно, что амбиции Китая не остановятся на Тайване; его стратегическая экспансия постепенно угрожает стабильности и безопасности всего региона Восточной Азии. Япония должна внести стратегические коррективы и всесторонне укрепить боевой потенциал Сил самообороны, чтобы не только защитить свою территорию, но и приобрести способность вмешиваться в региональные дела. Только так Япония сможет сыграть ключевую роль в формировании будущего порядка в восточной части Тихого океана."
 jap.100.a: "Давайте Начнем!"
 jap.101.t: "Состояние Сухопутных Сил Самообороны Японии"
 jap.101.d: "Название доклада: Во время противостояния с Китаем Сухопутные силы самообороны выявили ряд критических проблем, таких как дезорганизованная структура командования, недостаточное обслуживание техники и низкий моральный дух в некоторых подразделениях. Эти проблемы серьезно повлияли на боеспособность войск.\n\nВ ходе войны на Тайване совместные операции армии, флота и ВВС выявили значительные проблемы с командованием и координацией. Отсутствие эффективной связи между армейскими дивизиями привело к фрагментарности операций, нарушению ритма атак и упущенным возможностям. Первопричина кроется в неполном развитии совместного оперативного механизма трех служб и отсутствии единой структуры командования и координации. Это привело к задержке передачи информации и трудностям в эффективном выполнении боевых планов.\n\nНедостаточное техническое обслуживание техники также серьезно повлияло на эффективность боевых действий. Например, у некоторых танков и бронемашин отказывали двигатели, что делало их неработоспособными, у артиллерийских орудий из-за плохого обслуживания взрывались стволы, а личное оружие ржавело от влаги, делая его непригодным для использования.\n\nСнижение боевого духа и страх перед сражением распространились среди некоторых армейских подразделений. Столкнувшись с ожесточенным сопротивлением противника, некоторые подразделения не желали сражаться, а некоторые даже дезертировали. После сильных бомбардировок со стороны противника некоторые солдаты в панике распускали свои части, что сильно сказывалось на моральном духе других подразделений."
 jap.101.a: "Предстоит проделать большую работу."
 jap.102.t: "Состояние Военно-Воздушных Сил Самообороны Японии"
 jap.102.d: "Название доклада: Проблемы, выявленные Силами воздушной самообороны\n\nУстаревшие самолеты: Наши основные истребители, такие как F-15J и F-2, находятся на вооружении уже долгое время, и их системы авионики и вооружения устарели по сравнению с самолетами нового поколения ВВС Народно-освободительной армии. Это ставит наши силы в пассивное положение во время воздушных боев, затрудняя эффективное противодействие передовым истребителям ВВС НОАК, таким как J-20.\n\nНедостаточный потенциал для борьбы с беспилотниками: Наши инвестиции и исследования в области борьбы с беспилотниками были существенно недостаточными. Ограниченное количество и устаревшие характеристики наших нынешних беспилотников затрудняют эффективное противодействие тактике "роя" беспилотников ВВС НОАК.\n\nНеадекватный сбор разведданных: В начале конфликта наша оценка возможностей ВВС НОАК была существенно ошибочной, что привело к ошибкам в тактическом развертывании. Это свидетельствует о явном недостатке наших возможностей по сбору и анализу разведданных.\n\nСлабые возможности в области радиоэлектронной борьбы: В ходе конфликта ВВС НОАК продемонстрировали мощные возможности ведения радиоэлектронной борьбы, эффективно нарушая работу наших радаров и систем связи. Наши ответные действия в области радиоэлектронной борьбы были неадекватными, что поставило нас в невыгодное положение в области сбора информации и командования и управления."
 jap.102.a: "К Небесам Неведомым..."
 jap.103.t: "Состояние Морских Сил Самообороны Японии"
 jap.103.d: "Тайваньская война выявила ряд недостатков в морских силах самообороны Японии. Если эти недостатки не будут своевременно устранены, то они сильно ограничат их роль в будущих региональных конфликтах и могут даже поставить под угрозу собственную безопасность.\n\nГлавная проблема заключается в отсутствии стратегического предвидения. В течение долгого времени стратегические приоритеты МССЯ были направлены на противодействие традиционным морским угрозам. Однако способность флота предвидеть и реагировать на новые формы войны, такие как гибридная, информационная и кибервойна в контексте современного конфликта, явно недостаточна.\n\nВо-вторых, наблюдается относительный упадок военной мощи. Несмотря на наличие у МССЯ передовых кораблей и оборудования, их преимущество неуклонно снижается на фоне быстро растущего военного потенциала Народно-освободительной армии. В последние годы ВМС НОАК осуществили масштабный ввод в строй новых эсминцев, фрегатов, подводных лодок и авианосцев, значительно улучшив как количественные, так и качественные показатели."
 jap.103.a: "В конце концов, мы затмим их."
 jap.104.t: "Большой Военный Парад в Токио"
 jap.104.d: "Сегодня улицы Токио были заполнены тысячами людей, жаждущих увидеть грандиозный парад. Толпа, размахивающая флагами Страны восходящего солнца, была наполнена волнением и предвкушением. Это был крупнейший военный парад, который Япония видела в XXI веке, ознаменовавший момент демонстрации военной мощи страны после десятилетий сдержанности в соответствии с Конституцией мира.\n\nПарад начался с громогласного рева истребителей F-35, окрашенных в синий цвет, проносящихся по небу. За ними следовал строй основных боевых танков Type 10, самоходных гаубиц Type 99 и боевых машин пехоты Type 89, которые пронеслись по центру Токио, встреченные радостными криками толпы.\n\nСледующим шел массивный легкий авианосец "Идзумо" в сопровождении нескольких фрегатов, медленно проплывающих по Токийскому заливу. На его палубе стояли противолодочные вертолеты SH-60K и истребители F-35B.\n\nГлавным событием парада, несомненно, стала речь премьер-министра. Одетый в черный костюм, премьер-министр вышел на подиум под взглядами ожидающих масс.\n\n"На протяжении десятилетий Япония придерживалась своей мирной конституции, но мир сегодня далек от спокойствия. Терроризм, региональные конфликты - эти угрозы постоянно нависают над нашей безопасностью."\n\n"Япония, как маяк демократии и свободы в Азии и во всем мире, больше не может молчать! Мы разорвем цепи, возьмем на себя ответственность и встанем в авангарде защиты свободы и демократии в Азии!""
 jap.104.a: "Банзай!"
 jap.105.t: "Под Восходящим Солнцем"
 jap.105.d: "Оглядываясь назад, можно заметить, что бурный экономический бум прошлого уже стал мимолетным воспоминанием, а последствия краха "пузыря" все еще ощущаются по всей стране. Молодое поколение, постепенно погружающееся в колыбель потребительства, выросло в окружении материальных желаний, в то время как чувство национальной и культурной идентичности тихо угасает в повседневном комфорте жизни. Столкнувшись с многочисленными проблемами, такими как экономический застой и старение населения, мы должны признать, что только возрождая пламя патриотизма в сердцах людей, мы сможем сплотить нацию и возродить наш дух. Однако тень поражения в войне, ограничения, наложенные Конституцией мира, и глубокие размышления о милитаризме сделали патриотизм в Японии чувствительной и сложной темой, приводящей к колебаниям.\n\nКак мы можем вдохновить любовь к родине, не пробуждая при этом призрак милитаризма? Это остается нерешенной дилеммой. В правительстве существует множество различных мнений, и нет четкого консенсуса. В конечном итоге споры сводятся к тому, стоит ли перевооружать Японию и занимать более сильную позицию, чтобы вновь заявить о себе на международной арене и вернуть себе национальную славу.\n\nНо одни лишь политические дискуссии не могут по-настоящему тронуть сердца людей. Мы должны искать ответы в глубинах нашей культуры. От стойкости духа Бусидо до мимолетной красоты цветущей сакуры, от глубины традиционных искусств, таких как чайная церемония и аранжировка цветов, до эмоционального резонанса современной поп-культуры, такой как аниме и видеоигры - все это может послужить ключом к разгадке патриотической страсти молодого поколения. Только так мы сможем пробудить глубоко запрятанные патриотические чувства в новом поколении нашей страны."
 jap.105.a: "Когда распускаются цветы сакуры, душа находит дорогу домой."
 jap.106.t: "Репортаж NHK После Тайваньской Войны"
 jap.106.d: ""На этом мы закончим наш прогноз погоды, переходим к Фумико с его докладом о Тайване и завершении конфликта, передаю слово тебе Фумико."\n\n"Спасибо, Аканэ, как ты можешь видеть позади меня, восстановление Тайбэя идет полным ходом, после того как японские войска провели миротворческую операцию по поддержанию независимости Тайваня, некоторые наши войска остались на этом прекрасном острове, обеспечивая безопасность и мир для страны, пока в них больше нет необходимости."\n\n"Однако наши друзья здесь и добрые люди в Японии выражали обеспокоенность по поводу того, что эта миротворческая операция была направлена только на улучшение положения Японии, с чем я категорически не согласен. Наши войска присутствовали здесь, чтобы предотвратить оккупацию Тайваня враждебными китайцами и сорвать любые планы будущей экспансии в Азию, кроме того, мы предоставляем Тайваню ресурсы, необходимые для восстановления, чтобы они могли снова процветать, на этот раз они будут более спокойны, поскольку непосредственная угроза конфликта исчезнет."\n\n"С нашей приверженностью миру в Азии, мы убедимся, что благородные жертвы наших мужчин и женщин не будут напрасными, гарантируя, что яркий свет демократии будет продолжать сиять."\n\n"Что бы ни говорили критики, они не смогут отрицать, что мы сохранили Азию в состоянии мира.""
 jap.106.a: "Спасибо, Фумико, а теперь о спорте."
 jap.107.t: "Среди Четырех Морей Все Люди Братья"
 jap.107.d: "Мысли Мохамеда уносились прочь от рутинной работы, которую он когда-то с таким удовольствием выполнял, все чаще вспоминая родину, которую он когда-то с таким удовольствием покинул, замедляя работу, чтобы помечтать о родных горах, а иногда и о карри, приготовленном на обед.\n\nОн когда-то был так счастлив увидеть берега Японии, страны с очень ухоженными мужчинами на банкнотах, все очень правильные, западные и, возможно, почти европейские. Страну с небоскребами и чистыми улицами, где, казалось, не было бродячих животных, страну, где, возможно, однажды он сможет увидеть себя с полным желудком, лениво потягивающегося на солнышке в качестве вознаграждения за свои труды.\n\nПо дороге он ни разу не подумал о том, как трудно ему теперь читать надписи, как трудно говорить и как люди встречают его не домашними улыбками, а пристальными взглядами... Возможно, если бы он смог проработать еще одну неделю и получить свою зарплату... Может быть, если бы...\n\nВдруг все мысли одолел резкий свисток на обед, и его мысли удвоились от мыслей о еде, тишине и мимолетном отдыхе.\n\nНаблюдая за улетающей стаей чаек, его глаза и голова невольно повернулись в сторону звуков хорошо произнесенного, красноречивого, беглого японского языка. Слегка запыхавшись, мужчина, одетый так же, как и он, сказал ему, что "после работы мы собираемся со всеми новыми работниками в баре неподалеку!". И при таком приветственном тоне Мохамед впервые без волнения, почти заикаясь, произнес: "Да, спасибо.""
 jap.107.a: ""Итак, что у тебя на обед?""
 jap.108.t: "Болтовня"
 jap.108.d: "Киши посмотрел на Шинсато.  Солнечные лучи только сейчас опускались в тени под деревьями рядом с ними, но Киши отчетливо видел лицо своего собеседника даже сквозь стекло "Рамуне" у его губ. Оно вызвало в памяти воспоминание о том, как они всю жизнь назад потягивали кока-колу на скамейке в Сан-Франциско, саларимены, обладающие титаническим духом и блестящим интеллектом, которые одерживали верх над своими конкурентами.\n\n"Америка."\n\n"Хм?" Шинсато отставил бокал и с любопытством посмотрел на друга.\n\n"Америка, похоже, все пойдет прахом."\n\nГлаза закатились, бокал был выпит без комментариев, но Киши все же спросил: "Как думаешь, биржа восстановится? Я подавлен."\n\nСтакан опустился на стол, и Шинсато с уверенностью, сияющей в лукавой улыбке и внимательных глазах, произнес: "Да, я уверен, что все будет хорошо, не стоит беспокоиться, как это обычно бывает."\n\nКиси улыбнулся, сдаваясь перед своим другом, это выражение абсолютного доверия было заметно на его морщинах, это он зарезервировал только для этого человека, так как он никогда не ошибался раньше."
 jap.108.a: ""Да. Все будет хорошо.""
 jap.109.t: "Острый Спор"
 jap.109.d: "Политика никогда не интересовала японцев, но после недавнего конфликта на Тайване все больше и больше людей обращают внимание на внутреннюю политику Японии, между кампаниями и активизмом увеличилось и количество зрителей политических интервью.\n\n"При всем уважении к Като, но девятая статья снова и снова доказывает, что тихий пацифизм - это глупость, нам повезло, что мы с самого начала отбились от китайской агрессии, вы можете себе представить, если бы у нас не было такой ограничительной части нашей конституции?"\n\nОчередной день, очередные дебаты на "Live till morning!", которые ведет Соитиро Тахара, он представил зрителям Сасаки из консервативной фракции и Като из либеральной. Некоторое время дебаты проходили без особых эмоций, но когда встал вопрос о девятой статье, голоса были подняты.\n\n"Главная цель Японии в любом конфликте - сохранить мир, вы должны знать это уже сейчас, Сасаки, мы не нация войны, больше нет."\n\n"С таким стремлением к обороне, нам пришлось столкнуться с китайскими военными действиями, Тайваньская война доказала это..."\n\n"Но конфликт не был войной?"\n\nСасаки замолчал, немного ошарашенный.\n\n"Нет-нет, Сасаки, операция на Тайване не была войной, это была миротворческая операция, мы были на Тайване не для того, чтобы расширять свои территории или навязывать свою волю другой независимой стране, мы были там, чтобы сохранить мир на острове и сохранить его суверенитет. Япония отказалась от своих экспансионистских желаний, и с девятой статьей мы будем продолжать доказывать миру, что мы не отступаем от своих намерений."\n\n"Я имею в виду да... Я думаю... Когда..." Сасаки заикался. "Защита Тайваня - это защита Японии." Като улыбнулся."
 jap.109.a: "Наши намерения остаются неизменными."
 jap.110.t: "Повседневная Жизнь"
 jap.110.d: "Характерный окинавский морской бриз, отягощенный соленой сыростью, пронесся над безмятежной базой Наха. Ямато Танака сидел в своем общежитии и осматривал свой набор средств поддержки. Розовые светящиеся палочки были аккуратно уложены в прозрачную коробку для хранения, к ним прилагались точно сложенные полотенца для поддержки и тщательно подготовленные веера для поддержки. Его пятнадцатидневный отпуск был утвержден только вчера, и билет на концерт в Фукуоке лежал рядом с альбомом LoveLive. Ямато взглянул на часы: через шесть часов он должен был сесть на рейс до Фукуоки.\n\nВдруг пронзительный звук сигнала воздушной тревоги пронзил спокойствие базы. "Экстренный сбор! Всем членам Третьей бригады наземных операций, собраться!" Голос из трансляции был необычайно строг. "Повторяю, экстренный сбор!"\n\n "Ямато-кун!" Дверь общежития с силой распахнулась, и из коридора донеслось множество хаотичных шагов и грохот оборудования. Командир отряда Ямамото выглядел нехарактерно напряженным. "Мы слышали, что в Тайваньском проливе возникли проблемы. Наша бригада направляется на Тайвань, чтобы помочь тайваньским военным!"\n\nКак только Ямато в последний раз поправил форму, его пальцы инстинктивно потянулись в карман за билетом на концерт. По радио передавали краткий боевой отчет, а на далекой вертолетной площадке уже начали вращаться вертолетные винты.\n\nОн положил билет в боковую сумку и осторожно закрыл дверь общежития."
 jap.110.a: "Отныне и навсегда мы с тобой будем незаменимы."
 jap.111.t: "Одинокое Прощание"
 jap.111.d: "Облака и туман Алишана медленно проплывали перед глазами Ямато Танаки, словно спектакль, который никогда не закончится. Он прислонился к покрытому мхом камню, чувствуя, как теплая кровь медленно вытекает из пулевого отверстия в животе. "Какое хорошее место", - с усилием произнес он. С этого места он мог видеть скалистые горы, пышный лес, простирающийся до самого побережья. Солнечный свет проникал сквозь облака, отбрасывая тени и окрашивая всю долину в золотистый цвет. Если бы кто-то выбирал место для смерти, то это было бы самое подходящее.\n\nОн знал, что не доживет до сегодняшнего заката; он чувствовал, как его жизнь медленно уходит с каждым ударом сердца, вытекая из пулевого отверстия. Странно, но он не испытывал страха; напротив, его охватило необычное чувство покоя. Дрожащими пальцами он потянулся в карман на груди и вытащил уже помятый билет на концерт. Идолы на билете все еще улыбались, хотя один угол был испачкан кровью. Он бросил последний взгляд на дату, на которую он никогда не сможет попасть, и отпустил билет.\n\nГорный ветер мягко поднял билет, заставив его кружиться в воздухе, как нежный цветок вишни. Он пролетел над верхушками деревьев, перемахнул через крутые скалы и в конце концов унесся к мерцающему вдали морю. Ямато смотрел, как он исчезает, пока его не стало совсем не видно.\n\nЧерез час над долиной завис военный вертолет, и по громкоговорителю прозвучало сообщение о прекращении огня. Мир наконец-то наступил, но для Ямато Танаки было уже слишком поздно."
 jap.111.a: "Он пропустил шесть часов, а также пропустил один час."
 jap.112.t: "Мечты Сбываются" #Девочка эмо сидит на трубе. Мечтает о смерти, скорбит о судьбе. И вдруг труба взрывается… #Газпром, мечты сбываются!
 jap.112.d: "Солнце на базе Наха светило так же ярко, как и накануне отлета. Ямато Танака открыл дверь своего общежития; его вспомогательный комплект все еще спокойно лежал на своем месте, розовые светящиеся палочки отражали слабый свет под солнцем, как будто они ждали столетия.\n\nОн осторожно открыл ящик для хранения; полотенца все еще сохраняли свои аккуратные складки. На веере, приготовленном перед войной, осел тонкий слой пыли, который он аккуратно смахнул, вновь открыв улыбку Нишикино Маки. Билет на концерт, который он принес с собой на поле боя и чудом сохранил, слегка пожелтел, края его немного потрепались, но он был ему дороже любой медали.\n\nПока он собирал вещи, его пальцы непроизвольно коснулись раны на теле. В тот же миг в его ноздри вернулся запах пороха. Но вскоре в окно ворвался морской бриз, несущий аромат гибискуса, и смыл воспоминания о поле боя.\n\n"Вылет в три часа дня", - пробормотал он, засовывая билет на концерт обратно в альбом, который носил с собой, и осторожно закрыл дверь общежития."
 jap.112.a: "Пожалуйста, позаботьтесь обо мне впредь."
 jap.113.t: "Люди Превыше Всего"
 jap.113.d: "Дорогие сограждане,\n\nКак утренний свет освещает купол здания Парламента, мы не можем не спросить: Действительно ли этот символ демократии воплощает волю народа? На протяжении десятилетий, за исключением короткой смены власти в 2009 году, правление Либерально-демократической партии никогда не подвергалось настоящему сомнению. Это не случайность, а тщательно продуманный политический тупик.\n\nДавайте посмотрим правде в глаза: мы живем под мягкой диктатурой, замаскированной под демократию. ЛДПЯ изображает себя "символом стабильности" с помощью сложных систем политического финансирования, сделок с крупными конгломератами и манипулирования СМИ. Они убедили людей, что без ЛДПЯ Япония погрузится в хаос.\n\nНо какова цена этой "стабильности"\n\nМолодые люди отказываются от создания семей из-за отсутствия стабильной работы.\nНепрерывное сокращение пенсий для пожилых людей на фоне инфляции.\nПостепенное исчезновение среднего класса, обремененного ипотекой и расходами на образование.\nУпадок местных экономик по мере того, как Токио становится все более централизованным.\nНу вот и настало время перемен.\n\nРождение Гражданской Коалиции не случайно. Когда левые партии осознали необходимость идти в ногу со временем, когда либералы поняли, что идеалы требуют организации, и когда прогрессивные силы отбросили свои разногласия, мы обрели общий голос: Японии нужна настоящая демократия и подлинная многопартийная система.\n\nДавайте объединимся и разрушим этот миф о мягком авторитаризме своими голосами. Чтобы наши дети росли в истинно демократической стране и вернули политику в руки народа, пожалуйста, присоединяйтесь к нашему делу."
 jap.113.a: "Будущее не за горами, и перемены наступают уже сейчас."
 jap.114.t: "Стабильность Превыше Всего"
 jap.114.d: "Уважаемые сограждане,\n\nКак утренний свет вновь освещает заснеженную вершину горы Фудзи и первый поезд "Синкансен" отправляется с Токийского вокзала, все эти моменты говорят о величии и порядке Японии. Размышляя о периоде правления Либерально-демократической партии, мы создали всемирно известное "японское чудо", превратив островное государство во вторую по величине экономику мира и сделав "Made in Japan" синонимом качества.\n\n Неоновые огни, мерцавшие на улицах Токио в 1980-х годах, свидетельствовали о нашем процветании; общенациональная сеть автомагистралей в 1990-х годах подтвердила наш прогресс; технологические инновации в постмиллениуме продемонстрировали нашу мудрость. Все это были чудеса, достигнутые при стабильном правлении ЛДПЯ.\n\nНа данный момент перед нами стоят новые задачи. Стареющее население проверяет нашу мудрость, международная ситуация проверяет нашу решимость, а технологическая революция проверяет наши инновации. Но помните: именно под руководством ЛДПЯ Япония всегда находила выход из кризисов и сохраняла стабильность в условиях перемен.\n\nВыбор ЛДПЯ - это выбор лидера, проверенного временем. Мы понимаем, как найти баланс в условиях трансформации, как сохранить традиции, способствуя инновациям, и как сохранить Японию сияющей в новую эпоху.\n\nДавайте вместе представим себе прекрасное будущее нашей страны: улицы остаются чистыми, поезда - пунктуальными, а люди - живущими в мире и довольстве. Это Япония, которую ЛДПЯ защищает для вас, и это тот идеал, который стоит нашей вечной преданности."
 jap.114.a: "ЛДПЯ будет оставаться вашим самым надежным рулевым."
 jap.115.t: "Неожиданный Рост"
 jap.115.d: ""Слушайте," - прохрипела Каори, одной рукой вцепившись в микрофон так, словно это было последнее, что удерживало ее в вертикальном положении. "ЛДПЯ находится у власти с тех пор, как на Земле бродили динозавры, мать их? И что мы от них получили? Зарплаты нижу плинтуса, дорогие квартиры, а мы слишком измотаны, чтобы даже мечтать."\n\nЕе слова эхом разносились по тускло освещенной спальне, где дешевая веб-камера, шатко стоящая на стопке книг, фиксировала ее неустойчивую фигуру. Ее VTuber аватар - ясноглазая девушка-кошка с неоново-розовыми волосами - смотрел на зрителей с тем же полузакрытым вниманием, что и сама Каори. У нее было не так много зрителей. Обычно на ее стримы приходило не более пятнадцати человек, половина из них - боты. Но сегодня? Каори помахала перед веб-камерой пустой банкой из-под chu-hi, хотя ее аватар этого не зафиксировал. "Знаете, что смело? Жить в этой экономике, пока они вливают миллиарды в бессмысленные проекты! Деньги в никуда! Стимулирующие чеки, которых едва хватает на рамен на неделю! Но да, они то нам скажут "не падать духом". Меня это уже ЗАДРАЛО!"\n\nОна икнула, ее голова откинулась назад, а из горла вырвался смех. Это было не смешно. Ничего из этого не было смешным. Но ей было так приятно выпустить всё наружу.\n\nКто-то в чате написал: "Каори, ты в порядке?" Она прищурилась на экран, глаза ее аватара закатились назад. "В порядке ли Я? В порядке ли мы? Посмотри, что они натворили! Они богатеют, а нас уничтожают. И никто не сопротивляется, потому что... что? 'Так уж заведено?' К ЧЁРТУ это!"\n\nКаори едва заметила, как увеличилось количество зрителей. Пятьдесят. Семьдесят. Двести. Сообщения превратились в поток: одни подбадривали ее, другие высмеивали, а некоторые и вовсе вырезали каждоё ее пьяное слово в клипы.\n\nНа следующее утро похмелье было беспощадным. Ее телефон неустанно жужжал на столе, уведомления вспыхивали, как фейерверк. 1532 новых подписчика в Twitter. Ваш ролик "Пьяный Втубер уничтожает ЛДПЯ" набрал 13 тысяч лайков."
 jap.115.a: "Ой. Ой мамочки."
 jap.116.t: "Новое и Старое"
 jap.116.d: "В офисе в Касумигасеки послеполуденный солнечный свет проникал сквозь жалюзи, отбрасывая тени на кипы документов. Косака Хонока разбирала последние предложения по проектам культурного экспорта, когда в кабинет вошел Коидзуми Ханайо с двумя бутылками "Рамуне"\n\n"Ты видела новый план локализации?" Ханайо поставил газировку на стол Хоноки. "В этот раз они действительно постарались"\n\nХонока открыла файлы. "Действительно, бюджет на локализацию серии 'Mobile Suit Gundam' превышает все анимационные проекты прошлого года. Они даже планируют переозвучить и выпустить тематические песни на местных языках для рынка Юго-Восточной Азии."\n\n "Не только Gundam", - Ханайо пододвинул стул и сел, - "'Легенда о галактических героях' также получит совершенно новую версию дубляжа. Я слышал, что они специально пригласили известных актеров озвучки из разных стран. Я уже представляю, как Ян Вэнь-ли говорит "люди могут выжить и без страны" на разных языках."\n\nХонока сделала глоток содовой. "Времена действительно изменились. Раньше только такие произведений, как 'Dragon Ball', могли похвастаться переводом на другие языки. Сейчас даже такие аниме, как 'K-On!', выходят на дюжине языков."\n\n"Министр сказал, что это 'лучший способ дать миру услышать голос Японии'", - улыбнулся Ханайо, - "Это кажется немного пошлым, но аниме действительно может быть эффективнее любой дипломатии.""
 jap.116.a: "COOL JAPAN!"
 jap.117.t: "Милый Дом"
 jap.117.d: "В комнате Сато Макото сквозь жалюзи просачивались сумерки, отбрасывая пестрые тени на пол, заваленный дисками с играми. Это была его единственная связь с внешним миром, и свет вот-вот должен был исчезнуть в наступающей ночи.\n\n"Макото, выйди, пожалуйста", - позвал его голос матери через щель в двери. "Сегодня появилась еще одна отличная вакансия, в дизайнерской фирме..." Ее слова оборвались, заглушенные внезапным звуковым эффектом от игры в комнате.\n\nПрошло три года и четыре месяца. С того дня, как он уволился из магазина, Сато Макото ни разу не выходил из этой комнаты площадью девять квадратных метров. Каждый день мать оставляла у его двери коробку с бэнто, которую он тихо забирал поздно вечером. Это стало их единственным средством общения.\n\n"Тебе уже двадцать семь", - голос матери дрожал от волнения. "Ямамото в соседнем доме уже женился..."\n\nСато Макото еще больше увеличил громкость игры. Персонажи на экране вели ожесточенные бои, издавая оглушительные звуковые эффекты, а он продолжал погружаться в виртуальный мир."
 jap.117.a: "Все разочарования превращаются в слезы на полу."
 jap.118.t: "Суперперемена"
 jap.118.d: "В детском саду на окраине Токио Ринка Сакураи сидела в лучах полуденного света и держала в руках розовое клубничное пирожное. Ей всегда казалось странным, почему еда стала лучше, чем раньше, и почему в классе теперь больше интересных игрушек.\n\n"Учительница Маки," - спросила она с невинным видом, - "почему мы можем есть клубничный пирожное каждый день?"\n\nУчительница Маки присела и начала терпеливо объяснять новые правила воспитания, субсидии на уход за детьми и повышение стандартов учреждения. Но эти сложные термины превратились в легкие пузырьки в ушах Ринки, оставив лишь фразу: "Это подарок, который премьер-министр обещал каждому ребенку"\n\n"Так," - наклонила Ринка свою маленькую головку, на губах которой все еще оставалось немного крема, - "значит, премьер-министр разрешает мне есть клубничное пирожное каждый день?"\n\nУчительница Маки улыбнулась, желая объяснить больше, но Ринка уже ускакала, чтобы поделиться своим открытием с другими детьми. В ее сказочном мире образ доброго премьер-министра, который каждый день приносит клубничный торт, был более понятен, чем любые политические пояснения.\n\nДля Ринки счастье было простым: каждый день есть клубничное пирожное и премьер-министр, который может приготовить это пирожное для детей."
 jap.118.a: "Смена премьер-министра поменяет пирожное?"
 jap.119.t: "Прогулка"
 jap.119.d: "Император Нарухито и принц Фумихито неторопливо прогуливаются по многовековой каменной дороге, по которой когда-то ходили члены королевской семьи, в императорском дворце царит редкое спокойствие. В отсутствие привычного шума туристов почтенный двор теперь излучает исключительную торжественность.\n\n"Брат, ты видишь," - Нарухито сделал паузу у старого моста, - "состояние мира огромно, и его не остановить человеческой силой. Сегодняшние перемены подобны распусканию и увяданию цветов во дворе, и все они происходят в соответствии с естественным порядком." Фумихито посмотрел на рыбу, плавающую в пруду, и медленно ответил: "Брат говорит правду"\n\n "Прошлые события подобны дыму," - Нарухито нежно погладил каменные перила, - "люди часто говорят, что процветающая эпоха не может повториться, но сегодняшние перемены могут привести к мирной и процветающей эпохе. Путь власти лежит не в ее величине, а в ее праведности."\n\nПорыв ветра пронесся по двору, заставив листья затрепетать в отдалении. Фумихито поднял лист и сказал: "Да, тирания подобна буре, которую трудно выдержать. Только путь демократии может питать тишину, как весенний дождь."\n\n"Взлет и падение нации зависит от ее народа," - Нарухито посмотрел на далекий небосклон, - "Хотя мы стоим над массами, мы должны воспринимать сердца людей как зеркало. Прошлые грехи должны быть очищены сегодняшним осознанием.""
 jap.119.a: "Страна Восходящего Солнца."
 jap.120.t: "Подобный Дракону"
 jap.120.d: "Ранним вечером в квартале Суминоэ Тэцуя Рюдзаки опирается на балкон своей квартиры, наблюдая за красно-синими огнями проезжающей внизу патрульной машины. Татуировка на его левой руке давно скрыта рукавом костюма, но истории, связанные с ней, все еще наводняют его мысли по ночам. Это не Кабуки-тё - здесь нет огненных разборок и героических финалов, только бесконечные обиды и предательства, а также полиция префектуры Осака, которые больше похожи на якудз, чем сами якудза.\n\nРюдзаки поправляет галстук, который жена завязала ему сегодня утром. Двадцать лет назад он собирал деньги за защиту для своей банды, а сейчас он работает менеджером по продажам в страховой компании. Его дни безвкусны, как стакан воды, лишены волнений и переживаний.\n\nПо телевизору передают новости о выборах. Кандидат от ЛДПЯ повторяет те же обещания, которые Рюдзаки слышал всю свою жизнь. Он вспоминает слова своего старого босса: "Иногда самое большое насилие приносит в этот мир - не кулак, а общество, которое никогда не меняется."\nРюдзаки достает свой телефон и читает предвыборную платформу Гражданской коалиции. Может, пришло время перемен, думает он."
 jap.120.a: "Не кулаками, но голосами."
 jap.121.t: "Старшее Поколение"
 jap.121.d: "Масао Танака положил предвыборную листовку с логотипом Гражданской коалиции на пол татами, как будто это было что-то проклятое. Десятилетний опыт преподал ему один урок: любые радикальные перемены сопряжены с риском. Он взял в руки знакомую листовку ЛДПЯ. Слова и обещания, содержащиеся в ней, принесли ему смутное чувство успокоения.\n\nИз окна кухни он мог видеть семейный портрет на стене. Каждое улыбающееся лицо на этой фотографии расцвело за долгие годы правления ЛДПЯ. Его сын окончил университет Кейо и нашел стабильную работу в компании. Его внучка поступила в Университет Нагоя. Жизнь не была идеальной, но она была достаточно обеспеченной.\n\n"Реформы? Перемены?" Он смотрел по телевизору, как Народный союз произносит пламенные речи, и качал головой. Эти энергичные лозунги напомнили ему о тех волнениях, которые он пережил в молодости. Тогда люди тоже требовали перемен, но это приводило лишь к хаосу и беспорядкам.\n\nДо дня голосования оставалось всего несколько дней. Масао Танака достал костюм, который он всегда надевал, чтобы проголосовать. Каждый раз он выбирал то, чему всегда доверял раньше.\n\nОн знал, что молодые люди насмехаются над его консервативным мышлением - точно так же, как его внуки дразнят его за то, что он не умеет пользоваться смартфоном. Но для него это чувство стабильности было убедительнее любых обещаний радикальных перемен."
 jap.121.a: "Голосуй!"
 jap.122.t: "Вечерняя Программа"
 jap.122.d: "В студии передачи "Национальная безопасность и мы" бывший начальник штаба Морских сил самообороны Томохиса Такеи сидел прямо, отвечая на вопросы ведущих Мако Кимуры и Кен'ити Сато. На большом экране позади них была точная карта западной части Тихого океана.\n\n"Господин Такеи," - Мако Кимура слегка наклонилась вперед со своим микрофоном, "вы когда-то командовали совместными учениями Морских сил самообороны. С точки зрения военной стратегии, что Тайвань значит для Японии?"\n\nТакеи поднял руку, указывая на сияющие маршруты на экране. "Позвольте мне объяснить, используя мой морской опыт. Представьте себе Тайваньский пролив в виде шлюза, контролирующего поток воды в Тихом океане. Если эти ворота попадут не в те руки, то не только перекроется морской путь Японии, но и рухнет весь стратегический баланс в западной части Тихого океана.\n\n"То есть, вы хотите сказать, что безопасность Тайваня - это синоним безопасности Японии?" продолжала Кимура.\n\n"Более чем. От пролива Мияко до острова Йонагуни, от островов Дяоюйдао до Окинавы - вся эта цепь островов образует первую линию обороны Японии. Тайвань - как краеугольный камень этой линии. Если вы вырвете этот камень, вся оборонительная стена рухнет."\n\n"Как мы должны реагировать на такую угрозу?" Кониси Сато задал вопрос, на который все больше всего хотели получить ответ.\n\nТомохиса Такеи смотрел в камеру, словно обращаясь ко всей Японии: "У нас на флоте есть старая поговорка: Предотвратить шторм лучше, чем встретить его лицом к лицу. Мы должны дать понять всем, кто смотрит на Тайвань, что речь идет не просто о маленьком острове, который никого не волнует, - это прямой вызов всей оборонительной линии свободного мира.""
 jap.122.a: "Спасибо за ваш ответ."
 jap.123.t: "Военные Учения"
 jap.123.d: "Недалеко от Тайбэя, на склонах Янминшань, подполковник Харуаки Цукиширо из Сухопутных сил самообороны Японии наблюдал за тренировочным полем внизу. Утренний туман еще держался на холмах, когда австралийские бронетанковые подразделения и тайваньская механизированная пехота проводили совместные штурмовые учения, пыль и дым образовывали колышущийся занавес в первых лучах дня.\n\nЦукиширо делал пометки в маленьком блокноте - его почерк был изящным, но отличался солдатской решительностью. Офицерская подготовка научила его одной непреложной истине: хотя сила воли имеет значение на поле боя, численность часто оказывается решающим фактором.\n\n"Сэр," - сказал штабной офицер Уэда, передавая отчет о тактической оценке, "тайваньские бронемашины CM-34 демонстрируют отличную мобильность в горной местности, а австралийцы координируют действия с поразительным профессионализмом"\n\nПриняв отчет, Цукиширо задержал взгляд на дальнем тайваньском солдате, осматривающем бронемашину. Их мастерство было неоспоримым, но это напомнило ему уроки исторических сражений, полученные в Академии обороны: даже элитные войска могут померкнуть, как светлячки на рассвете, столкнувшись с непреодолимой волной нападающих.\n\n"Они действительно очень способны, - тихо сказал он, в его голосе прозвучала озабоченность, которую он сам едва замечал, "но война - это не учения." На последней странице отчета он написал: "Хотя объединенные силы демонстрируют достойные похвалы тактические навыки, они могут не выдержать длительной борьбы с потенциально непреодолимыми силами. Рекомендуется активизировать совместные учения с тяжелым оружием и расширить учения ПВО.""
 jap.123.a: "Враг находится по ту сторону пролива."
 jap.124.t: "Будущее Прошлого"
 jap.124.d: "В тихом старом переулке в токийском районе Асакуса уже семьдесят лет стоит чайная Мейгецу. С тех пор как дед доверил ее ему, Сато Хикару уже трижды менял традиционную бумагу на раздвижных дверях. В те первые дни, когда он наблюдал, как некогда шумная чайная постепенно теряет свою оживленность, ему казалось, что он становится свидетелем медленного завершения долгоиграющей пьесы.\n\nВ то время здесь оставалось лишь несколько пожилых завсегдатаев, как пережитки эпохи Сёва, попивающих чай и предающихся воспоминаниям. Сидя за прилавком, Сато время от времени просматривал собранные им романы, ожидая клиентов, которые так и не приходили.\n\nПоворотный момент наступил в тот год, когда правительство представило "План возрождения малой промышленности." Воспользовавшись субсидиями, Сато превратил один из углов своей чайной в уютную, традиционную японскую зону отдыха. Он разложил несколько напольных подушек (дзабутон) и развесил гравюры в стиле Укиё-э. Интересно, что многим молодым завсегдатаям эти гравюры напоминали сцены из известного аниме-фильма, хотя они никогда не уточняли, какого именно.\n\nПостепенно чайный домик обрел новую энергию. Во второй половине дня сюда стали приходить группы старшеклассников в школьной форме, которые выбирали место на татами, чтобы попить чаю, тихо обсуждая последние сюжеты манги. Чтобы дать им возможность ощутить элегантность традиционной чайной церемонии, Сато специально для них приготовил чайные сервизы, украшенные мотивами цветущей сакуры.\n\nПо выходным аниме-клубы часто устраивали там чайные посиделки. Они говорили, что обстановка напоминает им святилище из аниме, а иногда в шутку спрашивали Сато, не наймет ли он когда-нибудь служительницу святилища, чтобы она сидела у входа и попивала чай. Хотя Сато не совсем понимал, о чем они говорят, он знал, что чайный домик выполняет свою миссию совершенно по-новому."
 jap.124.a: "Старое Дерево, Новые Ростки"
 jap.125.t: "Мечта о Свадьбе"
 jap.125.d: "Рин Сакураи и Юкино Фудзивара держали в руках одну и ту же ручку, подписывая свои имена на заявлении о браке цвета слоновой кости. Снаружи на землю падали цветки сакуры, словно лепестки дождя, приносящие свое благословение.\n\n"Позвольте, я проверю", - сказал клерк, перелистывая бумаги в той же спокойной и эффективной манере, что и при общении с любой другой парой. "Это заявление на брак госпожи Сакураи и госпожи Фудзивара." Никаких подозрительных взглядов, никаких колебаний в голосе - только прямая административная рутина.\n\nРин нежно сжала дрожащую руку Юкино. Десять лет назад, когда они впервые встретились в университетском танцевальном клубе, никто не мог и представить себе, что этот день настанет. Тогда они могли обмениваться кольцами только наедине и притворяться близкими друзьями перед другими. Теперь же, наконец, они могли по праву стать женами друг друга.\n\n "Поздравляю вас обоих", - сказал клерк, передавая им официально заверенное свидетельство с теплой улыбкой. Несколько гетеросексуальных пар, ожидавших неподалеку, от всей души поздравили их.\n\nВыходя из мэрии, Юкино не могла сдержать слез. Это были не слезы печали, а счастья, которое пришло так естественно. Люди на улицах шли по своим делам, не обращая внимания на происходящее, воспринимая новый брак как нечто совершенно обыденное. И в этом непримечательном приятии заключалось то самое счастье, которого они когда-то жаждали больше всего на свете."
 jap.125.a: "Япония наконец-то стала такой, какой они всегда надеялись ее видеть."
 jap.126.t: "Пусть Удача Благословит Тебя в Сражении"
 jap.126.d: "Под вечерним дождем, стучавшим по оконным рамам, Гэндзосукэ Сакурай достал из домашней святыни старую, слегка потускневшую деревянную шкатулку и передал ее своему сыну Харуносукэ Сакураю, который в это время готовил свою форму. Со своих портретов на святилище прадед Такеносукэ Сакурай и прадед Рюносукэ Сакурай молча смотрели на него при свете свечей.\n\n"Прежде чем ты уйдешь, я хочу, чтобы ты получил это," - сказал Гэндзосукэ, открывая шкатулку, чтобы показать защитный амулет, завернутый в темно-синий шелк. "Оба твоих прадеда хранили этот амулет при жизни. Прадед Такэноскэ носил его на полях сражений в Китае, а прадед Рюноскэ переплыл с ним Тихий океан."\n\nХаруноскэ отложил свою форму и принял удивительно легкий амулет. "В нем есть печать бога Такэминаката?"\n\n"Да", - ответил Гэндзосукэ, глядя на сына, которому вскоре предстояло отправиться на Тайвань. "Ты знаешь, что Тайвань значит для нас?"\n\n "Это...  наш важный сосед?"\n\n"Не только это", - мягко покачал головой Гэндзосукэ. "Это наш спасательный круг. Твои двоюродные деды отдали свои жизни, чтобы понять одну неизменную истину: власть Китая в этих водах никогда не ослабевала. Если Тайвань падет, следующей будет Япония. И тогда нас постигнет участь, более унизительная, чем когда-либо прежде.""
 jap.126.a: "Боги благоволят тем, кто всегда бдителен."
 jap.127.t: "Код Операции: Затерянное Королевство"
 jap.127.d: "На взлетной полосе авиабазы Наха стояли в строю истребители F-35A 8-го авиакрыла, вооруженные четырьмя ракетами средней дальности AIM-120 и двумя ракетами AIM-9X Sidewinder для ближнего боя. Командир эскадрильи Масаки Ямамото просматривал последние данные на своем головном дисплее; внутри герметичной кабины он слышал слабое гудение кислородной маски.\n\n"Взлет через три минуты. Позывной 'Тенгу.' Район цели: восточная опознавательная зона ПВО Тайваня," - раздался голос с диспетчерской вышки в его гарнитуре. "Погода показывает облачность на высоте 7000 метров, видимость хорошая."\n\n"Это ведущий самолет, все самолеты подтвердите готовность," - сказал Ямамото, настраивая параметры дисплея своего шлема.\n\n"Номер два готов", - спокойно ответил заместитель командира Фудзивара, как будто это были просто очередные учения в повседневной жизни. "Номер три готов", - сказал молодой пилот Сато с ноткой волнения в голосе.\n\n"Номер четыре готов", - ответил Кишибе, его тон был таким же ровным, как у заместителя командира.\n\nРев двигателей эхом разнесся по рассвету. Ямамото взглянул на состояние вооружения на своем многофункциональном дисплее: помимо ракет, 25-мм внутренняя пушка была полностью заряжена 220 снарядами для возможных ближних боев.\n\n"Полагайтесь на свою подготовку и доверяйте товарищам", - сказал Ямамото, нажимая на педаль газа и вглядываясь в далекий горизонт. "Напишем новую главу истории в этих небесах.""
 jap.127.a: "Не старики создадут новую эру!"
 jap.128.t: "Обмен Интересами"
 jap.128.d: "Тихим днем колонна черных машин компании Daisei Construction медленно катилась мимо руин порта Килунг. Стоя на набережной, министр расследований Киёносуке Цукисиро осматривал разрушенные обстрелом краны и склады. Позади него его помощник Аоиносуке Симоцуки энергично постукивал по планшету, записывая уровень ущерба, бюджеты на восстановление и сроки, но самые важные цифры - те, что касались прав на эксплуатацию порта в течение следующих двадцати лет, - тщательно хранились в другом зашифрованном файле.\n\n"Какая жалость," - пробормотал Цукисиро, прикуривая сигарету с надписью Alishan. Хотя казалось, что он сетует на ужасы войны, в его голове уже просчитывалось будущее влияние после восстановления порта; каждая бетонная плита и каждая стальная балка будут служить опорой Daisei Construction на тайваньском рынке.\n\nСледующей остановкой был Гаосюн на юге страны. В частной столовой Цукиширо поднял бокалы с местными чиновниками. ""Daisei Construction принесет не только средства," - сказал он, поднимая бокал, "но также технологии и опыт. Мы планируем принять участие в комплексной реконструкции портов, железных дорог и аэропортов." По хрустящему звуку столкнувшихся бокалов все поняли, что сделка уже заключена."
 jap.128.a: "Наслаждаясь веселой беседой"
 jap.129.t: "Объединенный Командный Центр Операций"
 jap.129.d: "В центре управления операциями на базе Йокосука на четырех больших экранах отображаются прямые трансляции из Токио, Канберры, Нью-Дели и Тайбэя. Начальник Объединенного штаба Японии внимательно слушает представителей каждой страны, в то время как на сенсорном экране перед ним постоянно отображается информация о развертывании различных военных сил.\n\nГенерал ВВС Австралии подчеркивает необходимость преодолеть географический разрыв между Индийским и Тихим океанами. Тем временем представитель ВМС Индии прочерчивает дугу на цифровой карте, стремясь расширить влияние Индии на конференции. Тайваньский военный делегат обсуждает возможность объединения систем ПВО, чтобы не вкладывать значительные средства в отдельные установки.\n\nТехники японских сил самообороны заняты отладкой новой системы шифрованной связи - она призвана связать командные структуры четырех стран в единую невидимую сеть. На столе для совещаний лежит толстое руководство по операциям, на каждой странице которого тщательно прописаны стандартные процедуры совместных действий - от простого совместного патрулирования до крупномасштабных военных операций.\n\n"Сегодня," говорит начальник Объединенного штаба после завершения всех обсуждений, "мы не только создали систему командования, но и заложили основу для системы безопасности, охватывающей весь Азиатско-Тихоокеанский регион. Мы больше не будем склоняться перед тиранией. Наши страны в Азиатско-Тихоокеанском регионе едины и полны решимости вместе строить светлое демократическое будущее.""
 jap.129.a: "Процветайте вместе, двигайтесь вперед."
 jap.130.t: "Повседневные Переговоры в Европе"
 jap.130.d: "В оживленном торговом районе Неаполя аналитик по зарубежным рынкам компании Panasonic Юкиносуке Цурумаи сидит в богато украшенной переговорной комнате. Свежеподписанный контракт перед ним еще хранит запах сохнущих чернил. Снаружи доносится соленый воздух Средиземноморья, а внутри витает аромат итальянского чая с лимоном.\n\n"Это многообещающее начало," замечает Ризотто Неро, руководитель местного гиганта по производству бытовой техники, откладывая ручку. Его темный костюм прекрасно сочетается с винтажным декором комнаты. "Только подумайте - японские технологии в паре с итальянской сетью сбыта. Что может быть идеальнее?"\n\nНеподалеку помощник Цурумаи, Казеносуке Сакакибара, быстро набирает текст на своем ноутбуке, отмечая годовые квоты: триста тысяч единиц бытовой техники и пятьсот тысяч цифровых устройств. За этими цифрами скрывается дистрибьюторская сеть, способная охватить всю Южную Европу.\n\n"Милан, Марсель, Барселона," размышляет Цурумаи, потягивая чай. "Скоро наша продукция украсит каждый уголок этих городов.""
 jap.130.a: "Еще одну чашку черного чая, пожалуйста."
 jap.131.t: "Любопытные Переговоры в России"
 jap.131.d: "В переговорной комнате роскошного московского отеля Ritz-Carlton Юкиносуке Цурумаи в третий раз проверял каждую страницу контракта. Напротив него сидела Софья Павловна, главный секретарь крупного конгломерата, чьи серебристые волосы напоминали ему персонажа из аниме, которое он когда-то смотрел. Казалось, что в любой момент она может вызвать слуг из-за своего стола.\n\nЭти деловые переговоры длились в общей сложности один месяц и четыре дня, отмеченные тремя сбоями в системе видеоконференцсвязи, двумя внезапными прерываниями звонков из-за протоколов кибербезопасности и одним необъяснимым раундом технического обслуживания платформы. Когда пришло время подписывать последний документ, София изящно достала из ящика обычную на первый взгляд ручку. На ее корпусе были выгравированы изящные зубчатые узоры, странно сверкавшие в солнечном свете и напомнившие Цурумаи стимпанковский гаджет, который он однажды видел в аниме-магазине в Акихабаре.\n\nПосле последней подписи Анна положила бумаги в старинную коробку из розового дерева. Металлическая отделка поблескивала по углам, намекая на скрытые под ней сложные механические компоненты. "Этот контракт будет храниться до скончания веков," тихо сказала она, "как и наше партнерство..." "
 jap.131.a: "У которого не будет конца."
 jap.132.t: "Последний Занавес"
 jap.132.d: "В Министерстве образования, культуры, спорта, науки и технологий Сакура Фудзита пришла на работу в 8:45 утра, как и в любой другой рабочий день. На ее столе лежал вчерашний полуфабрикатный отчет по статистике образования. Все казалось настолько обыденным, что это утро ничем не отличалось от других. Ровно в девять часов глава отдела отправил по электронной почте письмо с указанием собраться в зале заседаний к десяти.\n\nВ зале проектор показывал отчет, заполненный цифрами: планы организационной реструктуризации, оптимизация персонала, перераспределение ресурсов... Сакура наблюдала, как название ее отдела выделяется красным цветом, означая, что весь отдел будет объединен или ликвидирован.\n\nКогда наступило время обеда, никто не покинул своих мест. В обычно шумном офисном кафетерии было жутко тихо. Коробка с бенто Сакуры осталась в ящике стола нетронутой. В окно она видела, как служебные машины отъезжают в центр утилизации имущества.\n\nВ сумерках, убирая со стола, она наткнулась на прошлогодний календарь, спрятанный в углу, испещренный записями о встречах и проектах - ни один из них уже не имел значения."
 jap.132.a: "Попрощайтесь с настоящим."
 jap.133.t: "Интервью по Реформе"
 jap.133.d: "Добрый день всем. Я представитель Марико Като. Сегодня я хотела бы поговорить о теме, которая в последнее время привлекает много внимания, - о системе досюсэй. Возможно, некоторые из вас не знают о ней или слышали лишь вскользь. Позвольте мне объяснить это проще.\n\nПодумайте о Японии как о доме с 47 отдельными комнатами, каждая из которых представляет собой префектуру. Управлять таким количеством комнат одновременно очень сложно: одни комнаты большие, другие крошечные, и для каждой нужен свой полный набор мебели. Это и расточительно, и непрактично.\n\nСистема "Досюсэй" реорганизует и объединит эти 47 "комнат" примерно в 10 более крупных "номеров". Например, несколько префектур в районе Канто могут быть объединены в "Северное Канто" и "Южное Канто", а несколько префектур в Кюсю - в "Кюсю". Каждый "номер" мог бы обставить себя мебелью и декором в соответствии со своими специфическими потребностями, а не обустраивать каждую маленькую комнату отдельно.\n\nПриведем конкретный пример: сейчас в префектурах Фукуока, Сага и Нагасаки есть свой Совет по образованию, полиция и система здравоохранения. Но если бы они были объединены в единый "Кюсю", эти ресурсы можно было бы планировать и управлять ими централизованно, сокращая расходы и повышая эффективность.\n\nОднако применение системы досюсэй на практике сродни переезду: объединение комнат может показаться простым делом, но при этом возникает масса логистических проблем - как распределить ресурсы, как перестроить помещение, как помочь людям адаптироваться и так далее. А поскольку у каждого региона своя уникальная история и местные традиции, слишком поспешное объединение может вызвать противодействие.\n\n Тем не менее, наша конечная цель - сделать так, чтобы все, кто живет в этих "комнатах", были довольны."
 jap.133.a: "Ясно."
 jap.134.t: "Зло в Имени"
 jap.134.d: "В комнате для допросов полицейского участка Синдзюку перед помощником инспектора Мисаки Сато лежит заявление о домашнем насилии. Жертва, Кумико Судзуки, все еще носит синяки на лице; ее муж, Кеничи Ямада, упрямо сидит в соседней комнате.\n\n"И все потому, что она отказалась сменить фамилию?" Сато листает стенограмму, ее тон спокоен, как будто она обсуждает погоду.\n\n"Это традиция," кричит Ямада из соседней комнаты. "В поколении моих родителей, моих бабушек и дедушек не было такого, чтобы жена не брала фамилию мужа. Что толку от этого нового закона?"\n\nСато смотрит на профессию Кумико: креативный директор в рекламной фирме. За десять лет упорной работы ее репутация и круг клиентов выросли вокруг фамилии Судзуки.\n\n"Я люблю его, но это не значит, что я должна от всего отказаться," тихо говорит Кумико, сжимая пальцами бумажный стаканчик. "Новый закон четко гласит..."\n\nПосле окончания допроса Сато стоит у окна вокзала, наблюдая за толпой внизу. Двадцать лет назад она тоже спорила со своим женихом по поводу сохранения своей фамилии. Хотя закон с тех пор изменился, некоторые взгляды на жизнь требуют больше времени.\n\nНа протоколе об аресте она ставит свою подпись: Мисаки Сато - имя, с которым она родилась, и которое останется с ней."
 jap.134.a: "Птица в клетке наконец-то на свободе."
 jap.135.t: "Реформа Налогового Потребления"
 jap.135.d: ""
 jap.135.a: "Заморозить налог на потребление"
 jap.135.b: "Снизить налог на потребление"
 jap.136.t: "Реформа Прав Трудящихся"
 jap.136.d: ""
 jap.136.a: "Улучшить Условия Труда"
 jap.136.b: "Дерегулировать Рабочую Силу"
 jap.137.t: "Парад"
 jap.137.d: "Под ярким солнцем в центре Токио промчалась колонна машин Сухопутных сил самообороны Японии. Дайсуке Мацуда прислонился к окну броневика; на его тактическом рюкзаке была приклеена нашивка группы "Morfonica", на которой изображен Курата Маширо в боевом жилете, выделяющийся среди моря камуфляжа. По обочинам дороги люди размахивали флагами Восходящего солнца и кричали "Удачи в бою", а бумажные журавлики порхали над колонной, как сугробы.\n\n"Ты - нечто," сказал сидевший рядом с ним Сёта Ямамото, дружески хлопнув Мацуду по плечу. "Все остальные ходят в Сэнсо-дзи за амулетами, а ты веришь в... как это называется... в эту девичью группу "Morfonica"? Это что-то вроде девичьего благословения?"\n\n"Эй, не стоит недооценивать Маширо," ответил Мацуда с ухмылкой, похлопывая свой рюкзак. "Она их солистка, она очень много работает ради своей мечты"\n\nКогда колонна свернула за Императорский дворец и направилась в сторону Йокосуки, Мацуда похлопал себя по карману, где лежали наушники с песнями Morfonica. Их музыка будет сопровождать его в горящих водах западной части Тихого океана."
 jap.137.a: "Сёта Ямамото лишь пожал плечами."
 jap.138.t: "Демократические Экспедиционные Силы"
 jap.138.d: "В свете раннего утра над Сиднейской гаванью на палубе HMAS Adelaide ощущалась легкая прохлада от морского бриза. Капитан Танака из Морских сил самообороны Японии прислонился к перилам вместе с капитаном Уилсоном из ВМС Австралии, и оба смотрели на далекий эсминец, принимающий груз. Несколькими минутами ранее они обнаружили, что оба являются поклонниками манги Невероятные Приключения ДжоДжо, и это маленькое совпадение рассмешило их.\n\n"Кстати," сказал Танака, прикуривая сигарету, "мне всегда было любопытно, зачем вы посылаете свои корабли в такую даль..." Он сделал паузу. "Чтобы сражаться за нас."\n\nУилсон взял предложенную зажигалку и посмотрел в сторону Сиднейского оперного театра, висящего в тумане. "Знаешь, мой дед в молодости участвовал в сражении в коралловом море. Он говорил, что океан - это как узы, соединяющие свободные народы." Он выдохнул кольцо дыма. "Теперь я наконец-то понял его слова."\n\n"От Сиднея до Токио - большое расстояние," продолжил Уилсон. "Но для демократических стран нет такого понятия, как 'слишком далеко.'""
 jap.138.a: "Единство навеки."
 jap.139.t: "Новая Восточная Азия"
 jap.139.d: "На верхнем этаже полуразрушенного здания в Синыйджу капитан Ямада из сухопутных сил самообороны Японии и полковник Ли Сынхун из южнокорейской армии смотрели в мощные бинокли на противоположный берег. Полковник Ли откусил шоколадку Pocky из своего пайка, окинув взглядом сильно укрепленную линию за рекой.\n\nВ Дандонге колонны бронетранспортеров патрулировали улицы, а антенны радаров на пусковых установках зенитных ракет вращались в сумерках. Изредка силуэты солдат мелькали в бункерах на берегу реки.\n\n "Посмотри на этих китайцев," сказал полковник Ли, опуская бинокль. "Они создали довольно плотную оборону. Но это не имеет значения. Мы добились того, чего не смогли добиться ни Макартур, ни поколение моего отца."\n\nПолковник Ли вертел в руках шоколадную палочку. "Разве не странно, Ямада? Всего несколько десятилетий назад на этом же участке северо-восточной земли мы вели борьбу не на жизнь, а на смерть. Теперь мы готовимся пересечь реку бок о бок. И тот самый союзник, который когда-то сражался рядом с нами, стал нашим врагом."\n\n "История умеет шутить," спокойно ответил Ямада. "Сегодняшний друг может стать завтрашним врагом, а вчерашний враг превратиться в сегодняшнего союзника." Полковник Ли отправил в рот последний кусочек Pocky. Обертка развевалась на ветру в сторону городских огней, мелькавших на дальнем берегу."
 jap.139.a: "История, которая принадлежит нам."
 jap.140.t: "Шанхайская Крепость"
 jap.140.d: "В городе Форт Чжэнь на острове Чонгминг взвод Ямады пробивался через этот лабиринт улиц в течение шести часов. Каждый метр земли доставался дорогой ценой, каждый захваченный дом требовал крови. НОАК превратила каждый дверной проем в оружейную площадку, а каждое окно - в снайперское гнездо.\n\n "Здание три, второй этаж, правое окно - пулеметчик!" срочное предупреждение прозвучало по радио. Не успел он договорить, как по улице пронеслась вспышка выстрела, отколовшая штукатурку от стен. Ямада смотрел, как его солдаты продвигаются вперед, пробираясь через обломки рухнувших зданий.\n\nОдин, казалось бы, обычный дом был превращен в крепость, стены которой были испещрены бесчисленными прорезями для стрельбы. Когда они наконец проникли в здание, то обнаружили в каждой комнате провода и спрятанную взрывчатку. С огромным риском для себя они зачистили первый этаж, но на втором их ждала еще одна ожесточенная схватка. Бой на лестничной клетке был жестоким - гранаты взрывались одна за другой.\n\n К сумеркам они продвинулись всего на два квартала. Павшие товарищи лежали в придорожной канаве, а санитары отчаянно искали среди обломков раненых солдат. Ожесточенное сопротивление напоминало о предыдущих столкновениях на окраинах Шанхая, но битва на острове Чонгмин была еще более ожесточенной. Защитники знали, что отступать нельзя.\n\nНаступила ночь, и артиллерийский огонь вдалеке не прекращался. Ямада изучал карту, которую держал в руках. Следующей целью была средняя школа Минбэнь, расположенная недалеко от Сяньян-роуд - по сообщениям разведки, она была превращена в компактный, но мощный опорный пункт."
 jap.140.a: "Завтра будет еще один кровавый день."
 jap.141.t: "Точка Ромео"
 jap.141.d: "Плотный туман, похожий на огромный ватный саван, поглощал все звуки в горах Белого облака. Отряд майора Оды уже пять дней блуждал по этим похожим на лабиринт высокогорьям, нервы были натянуты до предела. Предыдущей ночью трое солдат ушли в дозор, но вернулись только двое. Третий просто исчез, как будто его и не было.\n\n"Здесь вообще всё не так,"  пробормотал по рации пулеметчик Мураками. "Каждый раз, когда мы замечаем признаки врага и идем за ним, мы словно гонимся за собственной тенью." Не успел он договорить, как справа зашуршали кусты, и мимо пронеслась темная фигура. Когда они пустились в погоню, то нашли лишь несколько растоптанных веток и отпечаток ноги в грязи.\n\nНочью было гораздо хуже, чем днем. По лагерю разносились тихие шорохи, но никто не мог понять, откуда они доносятся. При перекличке часто выяснялось, что один или два человека пропали без вести, а на рассвете поисковые группы могли обнаружить в каком-нибудь укромном уголке лишь окровавленный жетон или оторванную гарнитуру связи.\n\nК полуночи туман сгустился еще больше. Солдаты сидели спина к спине, боясь сомкнуть глаза. Каждый знал, что, заснув, он может стать следующим, кто исчезнет. Вдалеке раздавались короткие выстрелы, но никто не знал, от кого они исходят - от союзников, врагов или просто от самой горы, играющей с их разумом."
 jap.141.a: "Место, где сходят с ума."
 jap.142.t: "Последняя Битва Дракона"
 jap.142.d: "Небо Пекина окрасилось в железно-серый цвет от дыма и пыли. В районе Фусинмэнь каждая улица была завалена битым бетоном и арматурой, каждый перекресток превратился в смертоносную мясорубку. НОАК превратила каждое здание в крепость, каждый подземный ход - в место засады, а каждое окно - в снайперскую точку.\n\nОдинокий танк Тип 90 прогрохотал по Западному проспекту Чанъань, и только два солдата Народной вооруженной полиции, сжимавшие в руках взрывчатку, бросились вперед в последнем акте самопожертвования, подбив себя и танк вместе. За день до этого отряд ополченцев проник через канализацию на японский командный пункт; один из раненых бойцов привел в действие гранату, спрятанную на его теле.\n\nЖивые продолжали сражаться, а мертвые использовали свои тела, чтобы перекрыть улицы и замедлить продвижение противника. Вокруг Чжуннаньхая дороги были неузнаваемы. Ступени Большого народного зала были изрыты воронками, а артиллерийские взрывы разрушили мост Цзиншуй. Однако защитники отказывались сдаваться. Одна рота НОАК продержалась на станции Сидань три дня и ночи, сражаясь до последнего патрона. Чтобы удержать врага, они использовали все, что угодно - от кирпичей до голых зубов.\n\nВзвод японцев, обнаруживший при продвижении разбросанные средства связи и карты, был быстро уничтожен спецназовцами, сидевшими в засаде среди развалин. Каждый хутун был полем боя, каждый двор - окопом. Этот древний город защищался от захватчиков только плотью и кровью."
 jap.142.a: "В те дни было столько героизма; в тот день все было безмятежно"
 jap.143.t: "Человечность"
 jap.143.d: "В офисе следственного отдела столичного департамента полиции Токио инспектор Дайсукэ Кусанаги посмотрел на дисциплинарное взыскание, лежащее на его столе. Тремя днями ранее он применил чрезмерную силу при задержании наркоторговца, в результате чего подозреваемый был ранен. Надзорный комитет принял решение о мягком наказании - всего один выговор.\n\n"Ты всегда слишком строг," заметил его напарник Канеда, отставляя кружку с кофе. Кусанаги смотрел в окно на сумерки, в которых неоновые огни мягкими ореолами расплывались по мокрым от дождя улицам. "Когда я был ребенком, я смотрел мультики и думал, что полицейские должны быть идеальными героями," сказал он с самодовольной ухмылкой. "Теперь я знаю, что даже роботы могут сойти с ума, не говоря уже о людях."\n\nК всеобщему удивлению, на следующий день мать пострадавшего торговца пришла в участок, чтобы поблагодарить Кусанаги. "Я знаю, что мой сын сбился с пути," сказала она. "Возможно, вы были немного грубоваты, офицер, но я чувствовала, что вы искренне хотели, чтобы он изменил свою жизнь к лучшему."\n\nКусанаги никогда не забывал, почему он пришел в полицию. Не для того, чтобы стать безупречным героем, а чтобы внести свой вклад в поддержание порядка в городе. Люди совершают ошибки, важно лишь то, учатся ли они на них."
 jap.143.a: "Мы совершаем ошибки, но именно благодаря этому мы учимся прощать."
 jap.144.t: "Корпоративные Переговоры"
 jap.144.d: "В конференц-зале на верхнем этаже штаб-квартиры NEC президент Аяно стояла перед проектором и произносила заключительное слово.\n\n"Приватизация - неизбежный выбор," сказала президент Аяно с вежливой улыбкой, обращая свой взгляд на представителей правительства, сидящих по левую сторону стола. "Полагаю, все присутствующие хорошо осведомлены о научно-исследовательских возможностях NEC в области искусственного интеллекта."\n\n"Если мы возьмемся за этот проект, - продолжила она, "то сможем увеличить доход как минимум на сорок процентов за три года."\n\nПеревернув страницу в своей папке, она продолжила: "Подробные цифры на третьей странице. В прошлом году мы..."\n\n "Подождите!" Начальник отдела Сакамото внезапно встал, прервав ее. "Президент Аяно, мы говорим о безопасности данных миллионов людей. Ваши условия просто возмутительны - вы пользуетесь ситуацией! Вы хотя бы взвесили все за и против, прежде чем выдвигать такие требования?"\n\nТишина опустилась на конференц-зал. Президент Аяно отложила документы, продолжая улыбаться. "Простите, мне нужно отлучиться на минутку."\n\nКак только звук ее шагов удалился по коридору, министр Накашима, председательствовавший на совещании, повернулся к Сакамото. "Эй, Сакамото, разве ты не хочешь заработать денег? Когда президент Аяно вернется, извинись и уходи"\n\nСакамото опустил голову. Сияние проектора отбрасывало тени на его лицо."
 jap.144.a: "Какой стыд."
 jap.145.t: "Семейная Поездка"
 jap.145.d: "Кеничи Кимура сидел в своей квартире и рассматривал брошюру о путешествии в Палау, разложенную на обеденном столе. Впервые в жизни он всерьез планировал заграничную поездку. С тех пор как его компания повысила всем зарплату, такая мечта вдруг стала вполне осуществимой.\n\n"Я слышала, что воды Палау самые голубые в мире," сказала его дочь Саюри, указывая на фотографию. Раньше он спокойно менял тему, когда она заводила разговор о путешествиях. Но теперь он мог открыто ответить: "В этом году мы поедем посмотреть на этот океан"\n\nЕго жена, Йошико, подошла и изучила бюджет поездки. Цифры больше не заставляли ее хмуриться. "Мы уже забронировали билеты и отель," - сказала она. "Я не ожидала, что мы сможем так быстро накопить деньги"\n\nКеничи вспомнил, как год назад в это время он еще работал сверхурочно, перебирая бумаги. Теперь он планировал первую совместную поездку своей семьи за границу."
 jap.145.a: "Прекрасная жизнь."
 jap.146.t: "Женщина-лидер"
 jap.146.d: "В офисном здании со стеклянными стенами в Хачинохе Мисаки Сато вела свое третье за месяц заседание совета директоров. Двадцать лет назад, когда она только пришла в компанию, в зале заседаний никогда не было ни одной женщины. Теперь же ее голос наполнял зал заседаний на двадцать восьмом этаже, когда она обсуждала многомиллионный контракт из Австралии.\n\n"Наша прибыль выросла на сорок процентов," сказала она, перелистывая отчеты. "Это благодаря новой линейке продуктов, которую мы разработали." Члены совета директоров внимательно слушали. Никого не волновал ее пол; их интересовало только то, чего она могла добиться. Именно это она больше всего ценила в нынешней компании - способность, а не пол, определяла ценность человека.\n\nВ коридоре на стене висела групповая фотография 1998 года. На ней в ряд стояли мужчины в костюмах и только одна женщина - далеко сзади. Мисаки до сих пор вспоминает, как в те времена женщинам приходилось работать вдвое больше, чтобы получить такое же признание, как и мужчины.\n\n"Вот прогноз на следующий квартал," сказала Мисаки, передавая папку молодой женщине-менеджеру. "Я бы хотела, чтобы вы возглавили компанию." В глазах женщины мелькнула благодарность, напомнившая ей о начале ее карьеры. Но, в отличие от тех времен, новому поколению женщин больше не приходится действовать так осторожно."
 jap.146.a: "Кто сказал, что женщины уступают мужчинам?"
 jap.147.t: "Дебаты за Обеденным Столом"
 jap.147.d: "За ужином в скромном доме в Нагое восемнадцатилетняя Наоко и двадцатилетний Кодзи снова спорили. От мисо-супа на столе все еще поднимался пар.\n\n"Нам нужно больше социального обеспечения!" Наоко отложила палочки. "Еще так много людей нуждаются в помощи."\n\n"Нет, нация должна стать сильнее", - возразил Кодзи. "Посмотри на наших соседей-"\n\nИх отец, Кеничи Кимура, склонил голову над едой, как будто рис в его миске был важнее любого спора. Он знал, что есть кто-то более квалифицированный, чтобы судить эти дебаты. Во главе стола сидел Дайсукэ Кимура - бывший член Палаты советников, а ныне пожилой человек, чьи седые волосы свидетельствовали о прожитых годах. Он отставил чашку с чаем.\n\n"Хватит," сказал он, его голос был спокойным, но властным. "Понимаете ли вы оба, каким трудом завоеван наш мир?" Он повернулся к Наоко ."Ты хочешь расширить систему социального обеспечения, но знаешь ли ты, сколько составил бюджет социального обеспечения в прошлом году? Ты говоришь обо всех этих расходах - откуда, по-твоему, берутся деньги?" Затем он посмотрел на Кодзи. "Ты жаждешь могущественной армии, но понимаете ли ты, что такое милитаризм? Это питательная среда фашизма - того самого кошмара, за отчистку от которого так боролось мое поколение и поколение вашего деда."\n\n"Нынешний путь Японии был вымощен кровью и мудростью, добытой тяжким трудом. Возможно, он не идеален, но это путь, который лучше всего подходит для нас.""
 jap.147.a: "Те, кто находятся в гуще событий, не видят всей картины."
 jap.148.t: "Деревня"
 jap.148.d: "В маленькой деревне в префектуре Акита Масао Сато сидит на плетеном стуле под старой вишней и смотрит на колышущиеся вдали рисовые поля. Восемьдесят семь лет жизни пронеслись в его памяти, как неиссякаемая родниковая вода в старинном колодце у двора.\n\nОн вспоминает шумную эпоху Сёва, когда Sony Walkmans распространились по всему миру, а автомобили Toyota пронеслись по всем континентам. Тогда Япония была похожа на цветущую сакуру, поражающую мир своим великолепием. Но сегодняшняя молодежь, похоже, не интересуется теми достижениями.\n\nВ последнее время его внук, Кеничи, приносит ему чувство успокоения. Мальчик, который когда-то только и делал, что играл в видеоигры, начал серьезно изучать историю Японии. Буквально в прошлом месяце, стоя под сакурой, Кеничи с волнением рассказывал ему о последних технологических достижениях страны. "Дедушка, ты знал? Наши технологии снова лидируют в мире"\n\nМасао помнит, что в глазах внука появился блеск, напомнивший ему его собственную молодость. Это был не узкий национализм, а глубокая, искренняя радость от того, что его страна прогрессирует. Возможно, каждое поколение по-своему любит свою родину - так же, как это вишневое дерево, которое каждый год цветет по-разному."
 jap.148.a: "Настоящий патриот."
 jap.149.t: "Прах к Праху, Пыль к Пыли"
 jap.149.d: "В небольшом здании в западном стиле в старом концессионном районе Тяньцзиня комитет военного контроля ОДТО, отвечающий за столичный регион Пекин - Тяньцзинь, проводит рабочее совещание. В комнате кипит работа: кипы документов сложены в стопки, периодически звонят телефоны, помощники вбегают со срочной почтой. За круглым столом представители стран-участниц договора обсуждают различные вопросы.\n\n"Я считаю, что мы решили самые неотложные вопросы," говорит генерал-лейтенант ССЯ, сидящий во главе стола. Он спокойно собирал документы, глядя на заходящее солнце. Остальные генералы кивнули в знак согласия, подняв свои чашки с кофе.\n"Извините, председатель," заговорил индийский генерал. "Но я хотел бы поднять еще один вопрос для обсуждения."\n\nКто-то за столом испустил тяжелый вздох, отражающий настроение многих. "Я хочу обсудить резолюцию 1438, касающуюся обращения с останками. Как мы все знаем, результаты расследования шокируют. Левая рука и правая нога тела полностью отсутствуют, а большая часть волос и кожи заменена искусственными заменителями. Сохранить уникальные условия хранения практически невозможно. Даже если мы не вмешаемся, местные власти, скорее всего, скоро избавятся от него. Так почему же мы должны тратить время на организацию сноса и кремации? Разве это не пустая трата времени?"\n\nБольшинство присутствующих молчали. Генерал-лейтенант ССЯ взглянул на генерал-майора Республики Китай, сидящего слева от него. Генерал-майор прочистил горло, прежде чем заговорить:\n"Генерал Сингх, я понимаю ваше замешательство. Однако я должен отметить, что мы обсуждаем здание, которое имеет значительную символическую ценность для бывшего режима Китайской Народной Республики, ее правящей партии и ее сторонников. Нельзя игнорировать его потенциал стать политическим тотемом, олицетворяющим антидемократическую и антимировую идеологии. Устранение этого здания и его останков не является провокацией. Напротив, это попытка стереть болезненную главу истории, которая может спровоцировать недовольство в будущем, если ее не остановить."\n\n Генерал-майор Сингх кивнул в знак понимания, а японский генерал с облегчением хлопнул в ладоши. "Тогда мы можем официально объявить о закрытии этой встречи," сказал он."
 jap.149.a: "Таким образом, судьба Мавзолея Мао Цзэдуна была предрешена."
 jap.150.t: "Наложение Правосудия"
 jap.150.d: ""Чтобы почтить память тех, кто принес себя в жертву, и гарантировать, что наследие неустанной борьбы свободного мира не будет использовано не по назначению, мы поддерживаем требование справедливости," заявил министр иностранных дел Японии, глядя прямо в камеру во время прямой трансляции. После серии самых замысловатых и изощренных фраз министр иностранных дел официально объявил о судебном преследовании военных преступников из КНР и стран-членов ВАОИ. Он также объявил, что такие организации, как ЦК КПК, Госсовет, ВСНП, НПКСК, CMC и т.д., были классифицированы как преступные образования, а их члены должны пройти денацификационные расследования.\n\nВ дополнение к военным, уже содержащимся в лагерях для военнопленных, жандармы провели операции в различных местах, насильно врываясь в виллы и удаляя бывшую элиту. Имущество военных преступников было конфисковано, в том числе золотая статуя Будды высотой более фута, некогда принадлежавшая одному из видных генералов.\n\nСреди всех военных преступников класса "А" самую бурную реакцию вызвал Сунь Цзяньго, бывший заместитель начальника Генерального штаба НОАК. Он был приговорен к смертной казни за многочисленные случаи принудительного труда против жителей Рюкю во время Великой азиатской войны. Адмирал протестовал, утверждая, что приговор суда оскорбляет его военную личность, и требовал пистолет, чтобы "достойно закончить свою жизнь". Однако военно-судебный комитет ОДТО отклонил его просьбу. В итоге адмирал встретил свою судьбу на виселице."
 jap.150.a: "Прежде чем совершить преступление, им следовало подумать о цене, которую они заплатят."
 jap.151.t: "Декларация Свободы и Демократии в Азии"
 jap.151.d: "Составлено: Японией\nСоавторы: Австралийское Содружество, Новая Зеландия и Республика Индия\n\nМир и стабильность Индо-Тихоокеанского региона находятся под серьезной угрозой. Военная экспансия Китайской Народной Республики в Южно-Китайском и Восточно-Китайском морях, ее экономическое принуждение соседних стран и преднамеренный подрыв международного порядка поставили под серьезную угрозу мир и процветание в Индо-Тихоокеанском регионе. Такое поведение не только посягает на суверенитет и территориальную целостность государств региона, но и представляет собой вопиющий вызов международному порядку, основанному на правилах.\n\nМы твердо верим, что свобода, демократия, права человека и верховенство закона являются основой процветания и прогресса Индо-Тихоокеанского региона. Любая попытка изменить статус-кво силой или добиться политических целей путем принуждения нанесет ущерб долгосрочным интересам региона. Мы должны сообща защищать эти с таким трудом завоеванные ценности и противостоять любой форме авторитарной экспансии. Наши совместные усилия обеспечат мир и процветание Индо-Тихоокеанского региона, сохраняя его на пути свободы, открытости и демократии.\n\nВсе страны, разделяющие эти ценности, могут присоединиться к этому благородному начинанию. Только объединившись, мы сможем обеспечить светлое будущее для Индо-Тихоокеанского региона."
 jap.151.a: "Азиатско-Тихоокеанский оборонный периметр."
 jap.152.t: "Военная Помощь"
 jap.152.d: "Капитан Ямада и Чен быстро шли по пустой улице. Морской бриз скрывал их шаги, а огни рыбацкого порта оставались позади. Впереди вырисовывалась черная горная цепь, где находилась секретная база Тайнаньского отделения Сил Черного Медведя.\n\n"Седьмая партия оборудования должна прибыть в следующем месяце," сказал Ямада, держа винтовку HK416 наготове. "В нее входят легкие противотанковые ракеты Type 01 и очки ночного видения AN/PVS-15, а также боеприпасы, которых хватит на три месяца."\n\n"Спасибо за помощь," ответил Чен. "Но нам нужно больше систем защиты от беспилотников. Из-за этих беспилотников с материка слишком много наших людей попали в лапы их псов."\n\n"Мы получим их в следующей партии. Японское правительство решило оказать вам полную поддержку," заверил его Ямада. "Помните, вы сражаетесь не в одиночку - мы будем с вами на каждом шагу.""
 jap.152.a: "We need more weapons."
 jap.153.t: "Расколотые"
 jap.153.d: "(Бывший) посол США в Японии ворвался в конференц-зал Министерства иностранных дел, его лицо раскраснелось от гнева. Он сжимал папку с документами так крепко, что ее края помялись. Снаружи Токио, как всегда, бурлил, словно не замечая беспорядков, разворачивающихся в Тихом океане.\n\n"Это полное нарушение договора!" кричал посол, его голос эхом разносился по комнате. "Как может японское правительство в одностороннем порядке приостановить выплату долга? Это противоречит всем принципам международного финансового порядка!"\n\nМинистр иностранных дел Японии спокойно наблюдал за некогда взбешенным дипломатом. Выражение его лица оставалось неразборчивым, но его слова имели неоспоримую силу. "Господин, скажите, в нынешней ситуации вашей страны, кому мы должны выплачивать этот долг? Администрации под управлением президента Трампа или федеральному правительству во главе с президентом Байденом? Или, может быть, так называемой Народно-освободительной армии, которая утверждает, что представляет народ? Если вы сами не знаете ответа, как вы можете требовать, чтобы мы сделали выбор?""
 jap.153.a: "Посол открыл рот, но не смог произнести ни слова."
 jap.154.t: "Маленькая Интерлюдия"
 jap.154.d: ""Я только что видел новости," сказал профессор Фудзита, отложив телефон. "Они собираются обсуждать статью 9 в парламенте? В такой момент нельзя не уступить Китаю."\n\n"Уступить?" Профессор Ямамото поднял глаза, его брови сошлись вместе. "Ты, должно быть, неправильно понял. Они планируют отменить 9 статью."\n\nРука профессора Фудзиты застыла в воздухе. "Что? Отменить ее? Это безумие! Они пытаются пережить нашу прошлую историю?"\n\n"Они утверждают, что Конституция мира утратила свою актуальность," ответил профессор Ямамото, откинувшись на спинку дивана. Ранее утром он закончил читать работу одного из студентов - ужасающую. "Особенно после войны в Тайваньском проливе."\n\n"Но разве это не доказывает, что мир нам нужен больше, чем когда-либо?" сказал Фудзита, повысив голос. "Война приносит только разрушения. Разве это не самый важный урок, который преподнесла нам история?" "Сейчас политики видят только унижение," - сказал Ямамото, покачав головой. "Они утверждают, что Конституция мира - это петля на шее Японии."\n\n"Нелепость," с холодным смехом ответил Фудзита. "Неужели они планируют снять эту петлю, только для того, чтобы накинуть ее на горло каждому гражданину?""
 jap.154.a: "В глазах политиков народ имеет значение?"
 jap.155.t: "Дружеский Совет"
 jap.155.d: "На четвертом этаже Национального полицейского агентства находится недавно созданный отдел без названия - настолько новый, что даже табличка на его двери остается пустой. Каждое утро в 8 часов приходят сотрудники, которые заходят в кабинет с окном и рассаживаются перед рядами мониторов, светящихся слабым голубоватым светом. Их работа - отслеживать "неуместные высказывания," подобно ловле невидимого улова в огромном океане.\n\nНа столе начальника отдела Сато лежит последнее руководство по управлению СМИ - тонкая красная брошюра без указания автора. "Сегодня три онлайновых СМИ отклонились от нормы," сообщает молодой сотрудник. Они использовали фразу "наращивание военного потенциала" вместо "расширение возможностей самообороны."\n\nСато кивает и ставит галочку на белом бланке. С момента создания отдела двадцать семь различных изданий получили "рекомендательные письма" за "неправильные формулировки." Эти уведомления всегда заканчиваются одной и той же мягкой подписью: "Мы надеемся, что вы поймете"\n\nНа стене большой дисплей непрерывно мерцает потоком данных, отслеживающих общественные настроения в режиме реального времени. Красный цвет означает негативные настроения, синий - позитивные, а зеленый, как говорится в Руководстве, "соответствующую озабоченность." Все данные записываются, анализируются и превращаются в клинические цифры для еженедельных отчетов отдела.\n\nПосле окончания рабочего дня сотрудники выходят из безымянного офиса и возвращаются к своей обычной жизни."
 jap.155.a: "И эти экраны следят за каждым углом."
 jap.156.t: "Передвижной Корпус"
 jap.156.d: "Кэнъити Фудзивара вышел из своей квартиры в обычной одежде, с пасмурного неба падал мелкий моросящий дождь. Как офицер дорожного отдела столичного департамента полиции Токио, он редко пользовался выходными. В четыре утра на улицах города царила тишина, если не считать необычного грохота, раздававшегося вдалеке.\n\nЗа углом улицы появился первый основной боевой танк Тип 90, его командир подавлял зевоту, выглядя так, словно только что скатился с кровати и забрался в башню. За ним следовали несколько бронетранспортеров и военных грузовиков, набитых военнослужащими ССЯ: одни, опираясь друг на друга, крепко спали, другие безучастно смотрели на ряды высотных зданий, словно не понимая, зачем их вызвали в Токио в такой час.\n\nНаверху три вертолета AH-1Z с грохотом пронеслись над городским пейзажем, их роторы эхом отражались от бетонных башен. Селеримен застыл на месте, не заметив, как его портфель упал на землю. Неподалеку группа молодых зрителей возбужденно снимала на телефоны проходящую мимо колонну, словно на съемках боевика.\n\nФудзивара наблюдал, как мимо проползает бронетранспортер Тип 96, а его радист дремлет за мигающей красной гарнитурой. Велокурьер, нагруженный газетами, в которых не было ни слова об этом, остановился на обочине, чтобы поглазеть на происходящее. К тому времени, когда эти газеты доберутся до людей, Токио, возможно, уже станет совершенно другим местом."
 jap.156.a: "Город все еще дремлет в дымке рассвета."
 jap.157.t: "Предатель"
 jap.157.d: ""Это поражение в войне полностью ложится на ваши плечи!" кричала Линцукико Цубаки из Либерально-демократической партии, и ее голос эхом разносился по залу заседаний. "Пока мы неустанно работали над обеспечением национальной безопасности, чем занимались вы? Организовывали антивоенные протесты на улицах! Выступали против оборонного бюджета в парламенте!"\n\n"Это демократия в действии!" ответил член Конституционно-демократической партии, поднимаясь на ноги.\n\n"Демократия?" Цубаки невесело усмехнулся. "Когда Тайвань взывал о помощи, ваше представление о демократии заключалось в том, чтобы сидеть сложа руки и ничего не делать? Мы могли бы противостоять китайской экспансии всем, что у нас было, но вместо этого нам пришлось тратить энергию на переговоры с вами у себя дома. Каждый раз, когда речь заходила об оборонном бюджете, о каждом законодательном акте, вы тянули время!"\n\n"Не искажайте факты!" крикнул законодатель из Демократической Партии для Народа. "Это ваша внешняя политика полностью провалилась!"\n\n"Провалилась?" Цубаки хлопнул обеими руками по столу. "Кто слил информацию о нашей обороне? Кто продолжал пренебрежительно отзываться о Силах самообороны в СМИ? Кто подорвал решимость общественности в самый критический момент? Теперь, когда Тайвань пал, вы довольны?"\n\n Зал всколыхнулся, но голос Цубаки возвысился над суматохой. "Однажды правда о том, как вы предали наши национальные интересы, станет известна. История будет помнить, кто дал нашим врагам наибольшее преимущество в этот кризисный момент!""
 jap.157.a: "Вы - преступники в глазах истории!"
 jap.158.t: "Мирный Протест"
 jap.158.d: "Ямато Судзуки затянул подбородочный ремень своего шлема и схватился за щит. Как капитан мобильного полицейского подразделения, он в третий раз поднял громкоговоритель: "Согласно Закону о публичных собраниях и демонстрациях, вам приказано немедленно разойтись. В противном случае мы применим силу."\n\nИздевательский смех раздался среди протестующих. "Долой тирана! Да здравствует мир!" кричали они во всю громкость, держа в руках плакаты, выражающие неповиновение. Судзуки изучал лица этих так называемых пацифистов - на их плакатах было написано "Свергнуть тирана", но они, казалось, не замечали серьезного кризиса, в котором оказалась страна.\n\n"Это наше последнее предупреждение. Любой, кто останется здесь в ближайшие десять минут, будет арестован за препятствование исполнению официальных обязанностей." Минута за минутой, время шло. Вместо того чтобы разойтись, протестующие протискивались к полицейской линии. Судзуки заметил некоторых, которые вели провокационную съемку, видимо, надеясь запечатлеть момент "полицейского произвола"\n\n"Продвигайтесь," отрывисто приказал он. Полиция специального назначения, как выхваченный меч, прорезала толпу. Судзуки схватил одного из лидеров - мужчину в красном головном платке - и быстро арестовал его. Мужчина продолжал кричать о "полицейском насилии," но Судзуки не обращал на это внимания."
 jap.158.a: "Неужели вы думаете, что в такие времена вам сойдет с рук подобный хаос?"
 jap.159.t: "Выступление Премьер-Министра"
 jap.159.d: "Когда над горой Фудзи опускаются сумерки, наша страна сталкивается с беспрецедентными проблемами. Холодный ветер с севера несет угрозу со стороны России, волны Восточно-Китайского моря перекликаются с амбициями Китая, а темные тучи надвигаются с Корейского полуострова. Эти державы стремятся сковать нашу свободу цепями, подавить нашу решимость страхом.\n\nМы потеряли нашего ближайшего соседа и сделали этот морской регион еще более опасным. Однако помните следующее: Япония никогда не сдавалась перед лицом изоляции и не уступала испытаниям.\n\nКогда утренний свет пронзает облака и цветы сакуры распускаются, несмотря на яростный ветер, это и есть наша сущность. Нас можно поразить, но никогда не сломить; мы можем стоять в одиночестве, но никогда не собьемся с пути.\n\nМы должны быть бдительны, как ниндзя, и храбры, как самураи. Пусть те, кто хотел бы поработить нас, увидят, что, хотя наша островная нация и мала, наш дух несокрушим. Каждая песчинка на этой земле несет в себе наследие наших предков.\n\nНе поддавайтесь отчаянию, ибо отчаяние - это именно то, чего желают наши враги.\nНе ослабляйте бдительность, ибо бдительность - это цена свободы.\nНе теряйте веру, ибо вера - наше величайшее оружие.\nПока гора Фудзи стоит высоко, пока цветут сакуры каждую весну, дух Японии никогда не угаснет."
 jap.159.a: "Никогда не отчаивайтесь." 
 jap.160.t: "Вопрос Ответственности"
 jap.160.d: ""Позвольте мне рассказать вам, как выглядит политическая катастрофа" заявила Ринко Цукикаге из Либерально-демократической партии, ее голос был напряжен от сдерживаемого гнева, когда она стояла на трибуне. "Ваш так называемый 'План возрождения малого и среднего бизнеса' - не что иное, как грандиозна шутка"\n\nОна взяла в руки статистический отчет. "Упрощенный процесс получения разрешений? В результате теневой бизнес проскользнул незамеченным. Более восьмисот мошеннических компаний воспользовались этой лазейкой, чтобы получить субсидии - на общую сумму более восьмидесяти миллиардов иен. Между тем, настоящие традиционные предприятия, которым действительно нужна помощь, оказались втянуты в жестокую конкуренцию, потому что вы отменили стандарты входа в отрасль."\n\n"Что касается вашей широко разрекламированной 'политики либерализации СМИ', то отмена требований по лицензированию новостных изданий наводнила рынок почти тремя тысячами непроверенных онлайн-СМИ. Только за последний год более двадцати тысяч неподтвержденных новостей стали вирусными на социальных платформах. Вы хоть представляете, какой хаос это вызвало в обществе?"\n\nЦукикаге бросил взгляд на места оппозиции, где одни члены хранили молчание, а другие, казалось, были готовы возразить. "Из-за одного ложного отчета о безопасности продуктов питания обанкротились четыре давно существующих предприятия, в результате чего три тысячи человек остались без работы. Это и есть то, что вы подразумеваете под 'свободой слова'?" Она подняла еще одно досье. "Но это даже не самые смертельные провалы. Ваше главное преступление - полное игнорирование наших оборонных потребностей. При вашей администрации оборонный бюджет был урезан, а модернизация оборудования Сил самообороны откладывалась снова и снова. Теперь Тайвань пал, а китайские военные корабли патрулируют прямо у наших территориальных вод! Нам ничего не остается, как противостоять еще более агрессивному соседу - и все благодаря вам!""
 jap.160.a: "Так выглядят 'щедрые плоды' ваших реформ?"
 jap.161.t: "Залы Власти"
 jap.161.d: ""Смотри внимательно, Йоко. Здесь обсуждаются все важные решения, касающиеся дел этой нации," сказал лорд Уда из префектуры Тиба, удобно расположившись в отведенном ему месте на зрительской галерее на втором этаже здания Национального совета Японии. Он с удовлетворением смотрел на происходящее в зале внизу.\n\n"Да, отец," ответила Йоко, старшая дочь семьи Уда, обладательница пышных черных волос и элегантной, утонченной внешности. Здание парламента практически не претерпело изменений со времен Сёвы, лишь незначительные ремонтные работы, связанные с несколькими пожарами и землетрясениями.\n\nПо сути, не только архитектура осталась неизменной, но и разнообразие людей в собрании поражало сходством с теми, что были сто лет назад. Например, пожилой законодатель, сидящий в первом ряду за спинами министров кабинета министров и наслаждающийся почтением своих молодых коллег, был почти неотличим от благородных генро прошлого, которые носили роскошные мундиры, отделанные золотом, и держали украшенные перьями шляпы-бикоры. Точно так же человек, входящий слева, пожимающий руки, обменивающийся любезностями и легкомысленно шутящий, был удивительно похож на молодых оппортунистов, которые постоянно окружали Фумимаро Коноэ. Даже грузная фигура, протискивающаяся сквозь толпу к своему месту, казалась современной версией политических гениев из Ассоциация Помощи Трону, которые со страниц "Ёмиури Симбун" попали в законодательные залы в XXI веке.\n\n"...Что ты думаешь, Йоко?" спросил лорд Уда, когда спикер палаты ударил молотком, чтобы закрыть сессию, которая закончилась после долгих дебатов по незначительным поправкам к нескольким законодательным законопроектам.\n\nЙоко быстро ответила: "Я нашла это очень познавательным, и я благодарна за эту возможность, отец." Но в глубине души, слушая жаркие дебаты о необходимости удаления прилагательного из предложения, она подумала:"
 jap.161.a: "... Удивительно, насколько апатичными и равнодушными могут быть люди."
 jap.162.t: "Страна Заходящего Солнца"
 jap.162.d: "Давным-давно в стране Идзумо, Сусаноо-но Микото было поручено защищать эти берега. Могущественное божество, владеющее мечом Амэ-но Муракумо, он однажды сразил грозного Ямата-но Ороти, чтобы спасти принцессу Кусинаду от жертвенной участи. Однако с годами Сусаноо стал успокаиваться. Он верил, что его сила никогда не иссякнет, а мастерство владения мечом не заржавеет. В эти спокойные дни он пренебрегал ежедневными тренировками и позволял мечу Амэ-но-муракумо пылиться на полке.\n\nОднажды из восточных морей поднялся еще более могущественный змей. Его сверкающая чешуя и ледяной вилообразный язык свидетельствовали об ужасающей мощи. Сусаноо схватил свой давно не используемый меч, но обнаружил, что его лезвие затупилось. Приняв боевую стойку, он понял, насколько проржавели его приемы. Перед лицом этого колоссального змея с Востока герой, победивший Ямата-но Ороти, теперь оказался бессилен.\n\nВ последовавшей за этим ожесточенной схватке Сусаноо отступал шаг за шагом. Его некогда гордое мастерство владения мечом оказалось шокирующе слабым. В итоге ему оставалось лишь наблюдать, как змея захватывает землю, которую он поклялся защищать. Из глаз принцессы Кушинады вновь покатились слезы, но на этот раз-"
 jap.162.a: "Теперь ее не спасет ни один герой."
 jap.163.t: "Последняя Битва"
 jap.163.d: "Ю Иноуэ изучал оперативную карту в командном пункте школы Чжуншань. Расстояние в пятьсот метров было тщательно разделено на несколько зон нападения, и каждый блок был снабжен подробными стратегическими данными. На рассвете двенадцать танков 3-го бронетанкового полка начнут первую волну атаки, а пехотный взвод Иноуэ будет наступать с обоих флангов под прикрытием бронетехники.\n\nПодтверждение готовности техники прозвучало по связи. Иноуэ проверил свою винтовку Тип 89, убедившись, что каждый механический компонент находится в идеальном состоянии. Боеприпасы уже были распределены, а шесть запасных магазинов аккуратно уложены в тактический жилет. Системы ночного и тепловизионного видения прошли окончательную калибровку.\n\n"Пятнадцать минут до начала операции," прозвучал в наушнике голос командира взвода. Через тактический монокуляр Иноуэ мог видеть силуэт станции Далянь на фоне ночного неба. За прошедшую неделю была неоднократно проанализирована каждая возможная точка обзора и зона обстрела на этих улицах. Двигатели бронемашин урчали в темноте, как звери, готовые к нападению. Иноуэ в последний раз проверил каналы связи, убедившись, что связь с бронетехникой надежна."
 jap.163.a: "Погода сегодня ясная."
 jap.164.t: "Марш"
 jap.164.d: "Фудзии Кайшо сидел в кузове военного грузовика и смотрел на черный дым, поднимающийся в дальнем конце южного шоссе. Шел третий день с тех пор, как его подразделение захватило Шэньян, а радиовещательная станция провинции Цзилинь стала последним оплотом сопротивления в городе. Холодный ветер, доносивший запах пороха, врывался через открытую кабину грузовика, напоминая ему о дедушкином дневнике.\n\nВ этой пожелтевшей тетради были записаны все события, начиная с Мукденского инцидента 1931 года. В то время Квантунская армия пробиралась на север практически тем же путем, передвигаясь на воинских поездах по равнинам северо-восточного Китая. Тогда за паровозами тянулся белый дым, а сейчас - черный от артиллерийского огня.\n\nПо шоссе громыхала бронированная колонна, стук танковых протекторов об асфальт вводил Фудзияму в оцепенение. Более девяноста лет спустя они снова ехали по той же самой земле. За окном пейзаж казался странно знакомым: та же земля, тот же стелющийся дым, а в нагрудном кармане лежала фотография, похожая на ту, что носил в молодости его дед.\n\n"Пять километров," прозвучал по радио голос капитана. Фудзии сжал в руках автомат, вглядываясь в слабые очертания здания радиостанции, проглядывающие сквозь дымку. В этот момент история словно пересеклась. Он вспомнил сцены из дневника своего деда, описывающие Фэнтянь, и давнее наступление Квантунской армии. Теперь, словно перешагнув через время, он обнаружил, что повторяет путь своего предка."
 jap.164.a: "На этот раз финал будет совершенно иным."
 jap.165.t: "Город Жизни и Смерти"
 jap.165.d: "Среди грома артиллерийских орудий мрачно звонит медный колокол на мемориале Нанкинской резни. Капитан Ли Тишань стоит перед мемориальной стеной, за ней - имена 10 665 жертв. "Капитан, Ванда Плаза пала," трещит рация голосом связиста. "Последнее сообщение от вооруженной полиции было: 'Мы скорее умрем, чем отступим.'"\n\n"Соберите последние письма всех солдат," спокойно ответил он. "Сообщите всем, что сегодня, прямо здесь, на этой земле, пропитанной кровью и слезами наших предков, мы напишем свою последнюю главу."\n\nВыставочный зал мемориала был превращен в импровизированный полевой госпиталь. Раненые солдаты прислоняются к витринам, за которыми на выцветших исторических фотографиях изображены бесчисленные кости и реки крови десятилетий назад. Свежая кровь капает с носилок, просачиваясь в трещины в полу.\n\n"Враг наступает со стороны дороги Юньцзинь! Наши войска с той стороны отходят к нашим позициям." Ли Тишань смотрит на последние противотанковые ракеты в углу - это единственное оставшееся тяжелое оружие. Солдаты молча проверяют свои боеприпасы. Никто не говорит, но каждый передает одну и ту же решимость: на этот раз они будут жить и умрут вместе с этим городом.\n\nСолдат, чистящий винтовку, вдруг спрашивает: "Капитан, как вы думаете, наши предки наблюдают за нами сверху?" Ли Тишань смотрит на него и отвечает: "Они не просто наблюдают. Они ждут, когда мы ответим за те 300 000 душ." Это будет их последняя крепость. Ли Тишань приставляет штык к винтовке и обращается к солдатам, стоящим позади него. "Готовьтесь к бою! Пусть история запомнит, что здесь мы не подвели наших павших героев.""
 jap.165.a: "Ваши души - поистине герои среди призраков!"
 jap.166.t: "Око Тяньцзиня"
 jap.166.d: "Небо над Тяньцзинем разрывается на осколки от клубящегося дыма. В этом городе, где есть и исторические здания эпохи концессий, и современные небоскребы, война перекидывается из одного узкого переулка в другой. В районе итальянского стиля НОАК возводит слой за слоем оборонительные сооружения, а с Восточной дороги Хайхэ наступают японские бронетанковые части, протекторы которых вырезают на асфальте глубокие шрамы.\n\nУлица Древней культуры превратилась в выжженную землю. Опираясь на храм Тяньхоу, спецназ НОАК ведет партизанскую войну в лабиринте переулков, где за каждым углом может скрываться противотанковый отряд. Японская бронетехника борется в тесноте улиц, вынужденная сталкиваться с зажигательными бомбами и самодельной взрывчаткой со всех сторон.\n\nТяньцзиньский вокзал превратился в изолированную крепость. НОАК превратила этот столетний вокзал в бастион, в то время как японские воздушно-десантные войска пытаются высадиться в районе Вудадао. Каждое здание превратилось в опорный пункт, и японцам приходится полагаться на авиаудары, чтобы полностью их уничтожить.\n\nВ новом районе Биньхай современные небоскребы образуют самое жестокое поле боя. Стеклянные фасады разбиваются от взрывов, а небесные мосты между высокими зданиями превращаются в жизненно важные высоты. Пехота с обеих сторон сражается на лестничных клетках и на разных этажах, используя все возможные средства для уничтожения противника."
 jap.166.a: "Бесконечный Кошмар."
 jap.167.t: "Чтение Павших"
 jap.167.d: "Наоки Ватанабэ смотрит на разбитый основной боевой танк Type 99A, стоящий на мостике. Он ползет вперед, как раненый зверь, изрешеченный пулевыми отверстиями, его гусеницы издают измученный металлический визг. Но он продолжает идти, движимый леденящей душу решимостью. За ним марширует колонна пехоты НОАК. Они наступают в унисон, их позы непоколебимы. Покрытая шрамами броня танка ловит утренний свет, отбрасывая золотое сияние на эту мрачную процессию.\n\n"Это наше последнее предупреждение! Сложите оружие и немедленно сдавайтесь!" Голос командира взвода гремит через громкоговоритель. "Немедленно прекратить движение вперед!" Но наступающие солдаты, кажется, его не слышат. Ватанабэ замечает, как на лице младшего офицера мелькнул конфликт, прежде чем тот поднимает руку. " Открыть огонь!"  По команде выстрелы разрывают утреннюю тишину. Передние три солдата НОАК мгновенно падают, а те, что позади, перешагивают через тела и идут дальше. Одного солдата, раненного в ногу, быстро поддерживает товарищ, чтобы они могли продолжать движение; другой, раненный в грудь, тянется вперед, прежде чем рухнуть, как будто хватаясь за недостижимую мечту.\n\nОсновная пушка танка продолжает грохотать, переворачивая бронемашину. Но вскоре противотанковая ракета со свистом врезается в боковую броню танка. В огненной вспышке стальное чудовище наконец прекращает свое наступление. Когда дым рассеивается, Наоки Ватанабэ застывает на месте. Он был свидетелем бесчисленных сражений, но такого еще не было. В глазах умирающих солдат нет ни страха, ни колебаний, только печаль и гнев."
 jap.167.a: "Кости верных укрепляют Великую стену, а горечь по ним очень глубока."
 jap.168.t: "Индия отделяется от ОДТО"
 jap.168.d: ""Эти индусы! Невероятно!" Начальник отдела Сато кинул дипломатическую телеграмму на стол для совещаний. "Мы потратили годы, тщательно закладывая основу в Южной Азии, а теперь они просто отказываются от Тихоокеанского договора обороны, не сказав ни слова? За кого они нас принимают?" Сидящая за столом Морияма Юкико сохраняла профессиональную улыбку и слегка поправляла очки. "Сато-сенпай, пожалуйста, успокойтесь. Иногда лучше дать пыли осесть и посмотреть, куда прилетит пуля."\n\n"Прилетит пуля?" Сато усмехнулся. "Индусы ясно дали понять, что они 'пересматривают свои стратегические партнерства в Азии.' Насколько яснее должна быть эта пуля?"\n\n"Вы смотрите на это слишком пессимистично," ответила Юкико, открывая отчет на своем планшете. "С более оптимистичной точки зрения, нам больше не придется тратить ресурсы на ликвидацию последствий гражданской войны в Китае. Когда в Китае царит хаос, вполне естественно, что Индия пересматривает свою геополитическую позицию." Сато посмотрел на горизонт Токио и на мгновение замолчал. "Годы маневров, а в итоге нам нечего показать."\n\n"Не обязательно," пожала плечами Юкико. "Японо-индийские отношения остаются прочными. Выход из договора не означает отказ от двустороннего сотрудничества. Кроме того, в такие времена то, что кажется потерей, может обернуться преимуществом." Сато повернулся к ней, в его глазах мелькнул интерес. "Продолжайте." Юкико закрыла свою папку. "Вместо того чтобы цепляться за договорные рамки, мы должны сосредоточиться на том, как обеспечить постоянную взаимную выгоду обеих сторон."\n\nСато испустил долгий вздох, гнев на его лице постепенно угасал. "Вы правы. В этом мире иногда самый умный ход - сыграть дурака.""
 jap.168.a: "ОК"
 jap.169.t: "Индия отделяется от ОДТО"
 jap.169.d: "Индия, один из основателей Организации Договора Тихоокеанского Обороны, официально объявила о завершении создания Лиги обороны Южной Азии - нового регионального блока безопасности, охватывающего Индийский субконтинент и прилегающие территории. Одновременно Индия объявила о своем официальном выходе из ОДТО.\n\nСогласно заявлению Министерства иностранных дел Индии, Лига Обороны строится на принципе "региональной автономии", подчеркивая глубокое военное, разведывательное и стратегическое сотрудничество между странами-участницами.\n\nЯпония и Австралия, другие члены-основатели ОДТО, выразили обеспокоенность решением Индии. В совместном заявлении министерства иностранных дел этих стран подтвердили свою приверженность сохранению деятельности ОДТОи продолжению двустороннего сотрудничества с Индией в области безопасности.\n\nМеждународные аналитики полагают, что шаг Индии сигнализирует о новом расколе в сфере безопасности Азии. С одной стороны - ОДТО, возглавляемая Японией и Австралией, с другой - Лига Обороны, ядром которой является Индия."
 jap.169.a: "Интересно."
 jap.170.t: "Китай начал военные учения в Восточно-Китайском море" #chinese liberals
 jap.170.d: "Штаб оборонной разведки недавно сообщил, что Китай начал крупномасштабные военные учения в Восточно-Китайском море, в которых задействованы корабли ВМС, авиация, амфибийные подразделения и подразделения огневой поддержки дальнего действия. По оценкам разведки, учения имеют явные наступательные характеристики, а их географическая направленность и смоделированные цели наводят на мысль о стратегической цели в отношении Японии и Тайваня. Эта демонстрация силы, по-видимому, является попыткой усилить контроль Пекина над Восточно-Китайским морем и прилегающими регионами, бросая прямой вызов оборонной позиции Японии.\n\nПосредством спутниковой разведки и морского патрулирования штаб оборонной разведки подтвердил, что в учениях участвуют современные военные корабли, подводные лодки и авианосные ударные группы, а воздушные средства, такие как истребители и разведывательные самолеты, также были развернуты, демонстрируя высоко скоординированные совместные операции.\n\nВ ответ на эти события штаб оборонной разведки рекомендует немедленно усилить оборонительную позицию Японии в Восточно-Китайском море, а также активизировать обмен разведданными и стратегическую координацию с союзными силами для полной оценки потенциальных рисков безопасности, создаваемых действиями Китая."
 jap.170.a: "Свяжитесь с нашими союзниками в Корее и ОДТО."
 jap.171.t: "Северная Корея перебрасывает войска к границе с Южной Кореей"
 jap.171.d: "Штаб оборонной разведки сообщил о значительной военной активности Северной Кореи вдоль корейской границы, причем масштабы и намерения операции вызывают серьезные опасения. Спутниковые снимки высокого разрешения и наземные разведывательные сети подтверждают, что многочисленные северокорейские пехотные дивизии были сосредоточены в нескольких десятках километров к северу от демилитаризованной зоны. Особую озабоченность вызывает тот факт, что разведывательные самолеты зафиксировали развертывание Северной Кореей пусковых установок баллистических ракет малой дальности и мобильных ракетно-артиллерийских систем вблизи границы. Такая расстановка сил свидетельствует о подготовке к стратегической демонстрации силы или потенциальным военным действиям.\n\nВ ответ на это штаб оборонной разведки скорректировал приоритеты наблюдения над Корейским полуостровом и осуществляет тесный обмен разведданными и координацию с австралийскими и южнокорейскими агентствами, чтобы отслеживать передвижения войск и стратегические намерения Северной Кореи в режиме реального времени. Учитывая историю эскалации напряженности в Северной Корее путем проведения приграничных военных маневров, штаб оборонной разведки советует правительству и руководству Сил самообороны активно разрабатывать планы действий на случай непредвиденных обстоятельств, чтобы снизить риски любых потенциальных провокаций и обеспечить безопасность Японии в условиях все более нестабильной региональной обстановки."
 jap.171.a: "Это не очень хорошо..."
 jap.172.t: "Китайские корабли вошли в воды Окинавы"
 jap.172.d: "Как и каждое утро, рыбак Таро вел свою лодку по спокойным водам Окинавы, забрасывая сети в море, пока легкий утренний бриз шептал по волнам. Горизонт светился первыми намеками на оранжевый цвет, а его руки, мозолистые и уверенные, с практической легкостью работали с веревками. Но спокойствие утра было недолгим.\n\nВдали на горизонте появились темные пятна, которые неуклонно увеличивались в размерах. Таро сузил глаза. Грузовые корабли? Возможно, еще один далекий грузовой корабль, направляющийся в какой-нибудь далекий порт. Но когда громадные фигуры стали четче, его желудок сжался от тревоги - это были китайские военные корабли. Их серые корпуса холодно блестели в лучах утреннего солнца, с нарочитой точностью рассекая волны. Красно-звездные знамена трепетали на ветру, их цвета резко выделялись на фоне бледного неба. Эти корабли не просто проходили мимо - они направлялись прямо в эти воды.\n\nФлот приближался, и вместе с ним приближалась его тень, нависая над маленькой рыбацкой лодкой Таро. Затем раздался голос, далекий, но резкий, слова терялись в ветре, но были полны приказа. Таро замер, крепче вцепившись в перила. Он знал это море - свое море - но голос имел неоспоримый вес, присутствие, которое не спрашивало разрешения.\n\nКоманда выскочила из каюты, сгрудилась на палубе, бормоча и указывая, их голоса терялись в усиливающихся порывах ветра.\n\nВоенные корабли не задерживались. После короткой паузы колоссальный флот двинулся вперед с неумолимой неизбежностью гигантов, прокладывая молчаливый путь через воды, которые Таро всегда называл своим домом."
 jap.172.a: "Китайцы? У берегов Окинавы?"
 jap.173.t: "Китай Начинает Подготовку к Новой Десантной Операции" #chinese nationalists
 jap.173.d: "Штаб оборонной разведки обнаружил крупномасштабные и нерегулярные военные действия китайских вооруженных сил на нескольких стратегических направлениях. Данные, полученные в результате спутниковой разведки, сигнальной разведки и морского патрулирования, подтверждают, что Народно-освободительная армия собрала значительные военные силы в Восточно-Китайском море и прилегающих регионах, включая военные корабли, воздушные средства и ракетные подразделения наземного базирования. Масштабы и оперативная частота этих перемещений беспрецедентны.\n\nОсобую озабоченность вызывают многочисленные корабли ВМС НОАК и подводные лодки, которые активно действовали к востоку от Окинавы, сопровождаемые частыми вылетами истребителей и разведывательных самолетов, что указывает на намеренное расширение контроля Китая над воздушным и морским пространством региона. Кроме того, разведка подтверждает, что НОАК провела крупномасштабные учения по высадке десанта вдоль своего побережья, подкрепленные развертыванием ракетно-артиллерийских установок дальнего действия и баллистических ракет, что убедительно свидетельствует о прямой угрозе Японии и Тайваню.\n\nНаша оценка делает вывод, что эти действия могут свидетельствовать о подготовке к более масштабной военной операции или постепенном осуществлении региональной гегемонистской стратегии Китая."
 jap.173.a: "Они хотят начать новую войну? Мы можем начать ее сами."
 jap.174.t: "Превентивная Кибератака"
 jap.174.d: "Пальцы второго лейтенанта Нами Окамото плясали по клавиатуре, каждое нажатие было точным и продуманным. Киберкомандование Сил самообороны Японии подошло к критической стадии своей последней операции под кодовым названием "Снег Сакуры." Используя стелс-разведывательное судно Хина Така, они успешно проникли в китайский БПЛА Илун, патрулирующий морские границы. Беспилотник, не подозревая о своем предательстве, стал троянским конем, незамеченным проскользнувшим в военную сеть Китая.\n\nВторжение было беспрепятственным, почти элегантным - не сработало ни одной сигнализации. Подобно пауку, плетущему паутину, программа "Сакура Сноу" распространялась по взаимосвязанным узлам, с каждой секундой проникая все глубже.\n\nПотом Нами нашла ее - папку, шифрование которой было необычайно надежным. Когда данные загрузились на экран, атмосфера в оперативном зале накалилась до предела. Это был не обычный военный документ. Это была полная, тщательно спланированная военная стратегия: как разорвать морские коммуникации Японии, как вывести из строя ее энергосистемы и коммуникационные сети, как захватить ключевые острова. Текст был клиническим, расчетливым, лишенным эмоций - не риторика конфликта, а инструкция по уничтожению. План по стиранию Японии с карты так же легко, как можно раздавить насекомое или устранить препятствие."
 jap.174.a: "Наивысшая оперативная готовность!"
 jap.175.t: "Упреждающий удар по Китаю"
 jap.175.d: "Второго лейтенанта Ватару Мацуду разбудил быстрый стук в дверь. В тусклом свете каюты он смог разглядеть слабые очертания плаката Тоямы Касуми - "талисмана удачи", который ему навязала младшая сестра, сказав, что он будет оберегать его и вернет домой. "Лейтенант Мацуда! Экстренный сбор!" - раздался снаружи голос офицера связи. Мацуда быстро надел форму и вышел в коридор, уже заполненный офицерами.\n\nВ оперативном отсеке капитан оглядел всех и сказал: "Господа, штаб только что отдал сверхсекретный приказ. По данным разведки, китайский флот планирует внезапное нападение на нашу страну. Чтобы защитить национальную безопасность, мы нанесем упреждающий удар." Мацуда на мгновение почувствовал дезориентацию. Упреждающий удар? Это означало, что они нанесут удар под покровом темноты, атакуя врага до того, как он успеет среагировать. Но разве правительство не заявляло, что Япония никогда не начнет войну первой?\n\nПосле совещания Мацуда вышел на палубу. Он достал сигарету и прикурил ее от морского бриза, позволив никотину ненадолго успокоить его мысли. Он подумал о своей семье и обо всех, кого поклялся защищать. Дым на мгновение закружился, а затем рассеялся. Прислонившись к перилам, он почувствовал, как под ним ожили двигатели эсминца. Скоро они отправятся в путь, разорвав ночную тишину.\n\nПосле последней глубокой затяжки Мацуда выбросил окурок в темное море. Крошечный уголек пронесся сквозь тьму и растворился в вечной ночи. В этот момент он понял, что история рассудит правильность этого решения и что он готов нести свою ответственность."
 jap.175.a: "Поехали."
 jap.176.t: "Посланники Мира"
 jap.176.d: "С наступлением вечера неоновые огни на Орчард-роуд начинают мерцать, отражаясь от брони основного боевого танка Тип 10 второго лейтенанта Акихико Накамуры. Вглядываясь в возвышающиеся стеклянные фасады элитных торговых комплексов, он осматривает самую оживленную торговую улицу Азии. Бронированная колонна движется вперед размеренным шагом, стальные протекторы грохочут по асфальту. За ним следует бронетранспортер лейтенанта Такуми Судзуки, доверху набитый гуманитарными грузами. Это передовое подразделение 7-го бронетанкового полка несет миссию по установлению мира и нового порядка в Сингапуре.\n\nНа колоссальном светодиодном экране ION Orchard продолжает мелькать реклама модной одежды. Жители Сингапура наблюдают за стальной колонной в тишине: одни снимают сцену на последние модели iPhone, другие просто молча наблюдают. Накамура считает, что эти спокойные лица подкрепляют справедливость их миссии: защита демократии.\n\nКогда бронированная колонна проезжает мимо Орчард-Сентрал, маленькая девочка в школьной форме машет танку рукой. Накамура снимает шлем и улыбается в ответ. С наступлением ночи колонна проезжает мимо станции Orchard MRT. Поезда ходят как обычно, из выходов станции выходят хорошо одетые офисные работники и молодые люди."
 jap.176.a: "Все остается неизменным."
 jap.177.t: "Тропический Полет"
 jap.177.d: "Вертолет UH-60J прорезает густой полог тропических лесов Камбоджи. Сержант Юити Танака прислонился к двери кабины, глядя на бескрайние зеленые просторы внизу. Влажный тропический воздух, пропитанный запахом сырой земли, врывается в кабину, напоминая ему документальные фильмы о войне во Вьетнаме, которые он когда-то смотрел в академии.\n\n "Эй, Ямамото," говорит он, подталкивая локтем солдата рядом с собой, "тебе не кажется, что мы будто американцы во Вьетнаме?" Кодзи Ямамото поднимает мокрое от пота лицо, собираясь ответить, но внезапный порыв турбулентности сотрясает вертолет, прерывая их.\n\n"Все, чего нам не хватает, это нескольких Чарли с АК, выпрыгивающих из-за деревьев," шутит Танака, хотя его рука инстинктивно сжимает запасной магазин на тактическом жилете. Вертолеты 7-й воздушно-десантной бригады движутся по направлению к Пномпеню, рев турбин разносится эхом над пологом тропического леса."
 jap.177.a: "И нас собьют с РПГ?"
 jap.178.t: "Одинокий Волк"
 jap.178.d: "С командирского места в своем основном боевом танке Тип 10 Дайки Судзуки осматривает улицы Хошимина. На его тактическом планшете в режиме реального времени с беспилотника видны три танка Т-90 вьетнамских бронетанковых войск, которые лежат в засаде вдоль улицы Таншон, образуя треугольную блокаду, перекрывающую путь к центру города. "Зарядить Бронебойные!" приказывает он. Загрузчик Накамура с резким щелчком подтверждает, что патрон заряжен. Управляемая электрогидравлической сервосистемой, 120-мм основная пушка танка направляется точно в уязвимый фланг первого Т-90. "Огонь!"\n\nПервый бронебойный снаряд вылетает из ствола и попадает в стык броневого покрытия цели. Взрыв вспыхивает ярким белым светом в тепловизионном прицеле, и первый танк мгновенно детонирует. Однако у Судзуки нет времени праздновать, потому что два оставшихся Т-90 уже засекли их позицию. "Маневр уклонения вправо! Прикрыть огнем!" Танк безупречно поворачивается под управлением системы управления, а пулемет расстреливает оптические приборы противника, чтобы выиграть время для перезарядки. Вражеский снаряд со второго Т-90 пробивает броню их собственного танка.\n\n"Цель номер два, 650 метров, патрон заряжен!" сообщает электронная система управления огнем. Судзуки подтверждает прицеливание и сразу же открывает огонь. Второй бронебойный снаряд пробивает силовой отсек противника. Т90 вспыхивает пламенем, но упорно продолжает сопротивляться. Последний вьетнамский танк пытается отступить за ближайшие здания. Судзуки спокойно ждет идеального угла обстрела, а затем отдает последний приказ стрелять. Третий снаряд пробивает гусеницы танка, навсегда обездвиживая стальное чудовище на углу улицы."
 jap.178.a: "Победитель - король."
 jap.179.t: "Северное Наступление"
 jap.179.d: "В полдень Ханой содрогается от артиллерийского обстрела. Второй лейтенант Юичи Накамура лежит за дымящимися руинами офисного здания на краю площади Ба Динь, наблюдая, как сквозь клубы дыма мелькает и исчезает из виду мавзолей Хо Ши Мина. Вражеский огонь с вьетнамских позиций с пронзительным треском вгрызается в бетонные обломки вокруг него.\n\n"Прикройте меня!" кричит Накамура по связи, давая сигнал эксперту по подрыву Судзуки подготовить ранцевый заряд. Тем временем основные силы вступают в ожесточенный городской бой, рев танков сливается со стаккато винтовочного огня. Над головой проносятся реактивные самолеты и ракеты класса "земля-воздух", время от времени выбрасывая огненные обломки, которые падают на улицы. "Смотри на два часа!" кричит он, как раз когда ракета ударяет в стену позади него. Последовавшая за этим взрывная волна сбивает с ног нескольких членов его отряда, и вокруг них сыпятся обломки. Вытирая кровь с лица, Накамура пробивается вперед. Из дыма вырывается вьетнамский солдат; Накамура инстинктивно стреляет.\n\n"Инженерная группа, вперед к цели!" Рация трещит от какофонии выкрикиваемых приказов и взрывов. Танака и Сато, два боевых инженера с саперными ранцами, ползут вперед под прикрытием огня. Густой, удушливый дым клубится над площадью, пронзаемый лишь лучами света. Площадь Ба Динь превратилась в адское поле боя, усеянное воронками и горящими машинами. Над головой ревет истребитель, сбрасывая бомбы, взрывы которых отдаются эхом вдали."
 jap.179.a: "Вперёд!"
 jap.180.t: "Храм"
 jap.180.d: "В сумерках золотой шпиль храма Ксисаге окрашивается в янтарный цвет. Второй лейтенант Юсуке Сато стоит перед древними каменными ступенями и смотрит, как пожилой настоятель медленно спускается вниз, его оранжевые одежды мягко развеваются на вечернем ветерке.\n"Господин," начинает Сато, "мы пришли за одним человеком - раненым офицером НОАК."\nНастоятель улыбается и кивает. "Все существа страдают, так зачем же привязываться к судьбе одного человека? Все в этом мире - иллюзия."\n"Это не философский спор, мастер," Сато делает шаг вперед. "Это военная операция. На руках этого офицера кровь наших товарищей."\n\n"То, о чем вы говорите, всего лишь привязанность," отвечает настоятель. "Будда учит, что ненависть не прекращается ненавистью; только сострадание может победить ненависть. То, к чему вы стремитесь, есть не что иное, как продолжение кармы."\nСато крепче сжимает ложе винтовки. "Мастер, я уважаю вашу веру, но приказ есть приказ. Пожалуйста, не усложняйте ситуацию."\n "Бодхисаттва боится причины, а обычные существа - следствия. Семена, которые вы сеете сейчас, однажды принесут горькие плоды. Почему бы не отбросить враждебность и не избежать кровопролития?"\n"Мы солдаты, а главный долг солдата - подчиняться приказам."\nСжав ладони вместе, настоятель говорит: "Амитабха. Одна мысль о сострадании, одна мысль о природе Будды. Если ты сможешь отпустить свою привязанность в этот момент, возможно, ты поймешь, насколько ценна жизнь."\n"Это последний раз, когда я прошу отдать мне этого офицера." Терпение Сато на исходе.\nСтарый монах закрывает глаза. "Все существа обладают природой Будды, но так много людей остаются в заблуждении. Если вы настаиваете на насилии, чтобы остановить насилие, я могу защитить Дхарму только своей собственной жизнью.""
 jap.180.a: "Сато вздохнул и поднял приклад своей винтовки."
 jap.181.t: "Валькирия Небес"
 jap.181.d: "Десятки истребителей прорывают облачный покров над Манильской бухтой. На борту самолетов раннего предупреждения рой радиолокационных всплесков указывает на сближение различных сил. Такагути Цукикаге, пилот-ас Сил воздушной самообороны, маневрирует на своем F-35, когда смешанная группа из J-20 НОАК и филиппинских KAI T-50 приближается со стороны Южно-Китайского моря.\n\n"Всем подразделениям, внимание: Более сорока вражеских самолетов входят в зону боевого применения," предупреждает командный самолет по шифрованному каналу. Цукикаге следит за постоянно обновляющимися данными на своем головном дисплее. Интуиция подсказывает ей, что этот воздушный бой может перевернуть ход борьбы за небо Манилы.\n\nПервый залп раздается на высоте тридцать тысяч футов. Шквал ракет сплетает смертоносный гобелен в облаках, и пронзительные сигналы электронных средств противодействия пронзают кабину пилота. Цукикаге делает вираж, уклоняясь от двух ракет, и мгновенно находит J-20, пытающийся устроить засаду на АВАКС ее стороны. Ее палец сжимает спусковой крючок, и ракета "воздух-воздух" с воем устремляется к цели. Противоракетные маски не могут спасти J-20. В яркой вспышке света взрыв разворачивается высоко над Манильской бухтой.\n\nХаос нарастает, истребители всех типов проносятся сквозь облака, следы ракет сверкают золотом в солнечном свете. F-35 Цукикаге совершает захватывающий маневр "кобра", проскальзывая в слепую зону KAI T-50. Ее вторая ракета попадает в цель, оставляя еще один огненный шар, мерцающий над заливом. Под ее руководством японский строй постепенно разрывает линию обороны противника. Самолет E-767 АВАКС сообщает последние новости: более половины самолетов противника уничтожено, а оставшиеся истребители отступают на юг."
 jap.181.a: "Это небо теперь принадлежит Японии."
 jap.182.t: "Нефтяной Кризис!"
 jap.182.d: "После того как Саудовская Аравия погрузилась в хаос, наши поставки нефти сильно сократились, а надвигающийся крах Соединенных Штатов ничуть не облегчил нашу сложную ситуацию. Япония перенесла множество трудностей и преодолела множество проблем, чтобы выстоять, перестроиться и улучшиться в этом новом веке.\n\nБоли от первого нефтяного шока 1970-х годов до сих пор преследуют японскую нацию. Во время этого кошмара экономический рост Японии сильно пострадал, и его темпы были значительно ниже номинальных. Поскольку Япония не является крупным производителем природных ресурсов, наше положение всегда было хрупким, и мы были марионетками на ниточках таких владык, как Америка.\n\nУвы, этот кризис не станет концом Японии; за свою долгую и бурную историю восходящее солнце пережило подобные и более серьезные катастрофы. Возможно, это будет новое начало, новая возможность для Японии наконец-то освободиться от оков и ограничений, установленных нашими врагами и "союзниками". В конечном счете, только время покажет судьбу Японии, а пока мы должны сделать все возможное, чтобы разрешить сложившуюся перед нами ситуацию."
 jap.182.a: "Упади семь раз и восемь раз поднимись."
 jap.183.t: "Японская Нефтяная Сделка"
 jap.183.d: "Мы получили предложение от Японии, согласно которому они хотят покупать нашу нефть дешевле рыночной цены в обмен на выгодную торговлю и сотрудничество в области технологий. "
 jap.183.a: "Нам нравится эта сделка."
 jap.183.b: "Нет, только стандартная цена."
 jap.184.t: "Россия Согласна!"
 jap.184.d: ""
 jap.184.a: "Великолепно!"
 jap.185.t: "Россия Настаивает на Стандартной Цене"
 jap.185.d: ""
 jap.185.a: "Ладно..."
 jap.186.t: "Забытые Блага"
 jap.186.d: "Тайваньский фронт жаждет все новых людей и материалов, и поэтому мы вынуждены постоянно снижать качество, чтобы удовлетворить спрос. Один предприимчивый офицер предложил план по закупке большего количества танков с небольшими дополнительными инвестициями, по крайней мере, до тех пор, пока будет продолжаться снабжение. Несмотря на то, что Type 74 устарел еще в момент своего появления, он все еще остается работоспособной конструкцией, и у нас все еще есть несколько законсервированных танков. Имеющееся количество - это не более чем капля в пруду, но бурный рост японского производства превратит каплю в море."
 jap.186.a: "Величайшая победа может стоять всего за одним танком."
 jap.187.t: "Москва, Любовь Моя"
 jap.187.d: "Ещё пару лет назад Андрей и подумать не мог, что окажется в Стране Восходящего Солнца.\nОднако всё стремительно изменилось всего пару месяцев назад. После заключения стратегических договоров между Японией и Россией был утверждён проект обмена студентами между университетами двух стран - и Андрею повезло попасть в ту группу, которую пригласили поучиться несколько месяцев в Токио. Именно здесь он и встретил ту, которую полюбит до конца своей жизни. \n\nОни встретились совершенно случайно в коридоре университета, столкнувшись лбами: у неё была короткая взъерошенная стрижка, светло-голубое платье и круглые очки; на нём - клетчатая рубашка и потрёпанные джинсы. Хаясэ была студенткой архитектурного факультета, ничем, казалось бы, не примечательная девушка, чью красоту ещё предстояло раскрыть. Он ожидал услышать крики и упрёки в свой адрес, но был приятно удивлён, когда вместо этого раздался тихий, мягкий смешок. \n\n- У тебя такие дурацкие джинсы...\n\nПрошло несколько недель, за которые они невероятно сблизились. Она показала ему ту сторону Японии, о которой он раньше и не догадывался: уютные магазинчики на узких улочках, городские сады, засаженные сакурой, и полупустые деревни - она открыла ему другой мир. Он рассказывал ей о своей родине - о Москве, Сибири, о байкальских нерпах и крымских пляжах, о заводах Долгопрудного и горах Алтая. Он пообещал показать ей все эти места.\n\nОни сидели под звёздным ночным небом. Она вновь рассказывала что-то из своей студенческой жизни и жаловалась на всякие мелочи, а он её почти не слушал - лишь с улыбкой любовался ею. Вдруг небо озарила вспышка: оно покрылось бесчисленным количеством разноцветных фейерверков. Хаясе, словно ребёнок, вскочила со скамейки и с восторгом уставилась на это зрелище, показывая Андрею на самые яркие всполохи. Он лишь усмехнулся и взглянул в её глаза:"
 jap.187.a: "Он увидел в них вселенную."
 jap.188.t: "Новый Курс Японского Капитализма"
 jap.188.d: "Каким бы решительным ни был машинист, это не даёт свободы паровозу. Того или иного машиниста сажает на тот или иной паровоз прихотливая воля богов. Однако почти каждый паровоз, пока насквозь не проржавеет, стремится вперёд. В этом и состоит внешняя величавость паровоза.\n\nКаждый из нас - паровоз. Наша работа - не более чем дым и искры, которые мы выбрасываем в небо. Люди, идущие у железнодорожной насыпи, по дыму и искрам узнают, что мчится паровоз. Или что он только что промчался. Дым и искры, если речь идёт об электровозе, можно заменить грохотом.\n\nЯпония - это тот самый паровоз, а наша экономика - это рельсы, по которым мчится состав. Однако рельсы имеют свойство ржаветь и приходить в негодность - и точно такая же ситуация произошла с нашей экономикой. Годы раздутого бюрократизма, закостенелого корпоративного этикета, отсутствие частной инициативы и лень японских рабочих,  технологическое отставание - лишь самые заметные причины нашего поражения. Война на Тайване вскрыла этот гнойник, и мы видим последствия десятилетий пренебрежения этими проблемами. Теперь нам придется реорганизовать нашу экономику, и чтобы достичь этого, всем нам придется работать гораздо усерднее, чем прежде, даже без оплачиваемых отпусков и сверхурочных. Мы должны стать единым механизмом, а каждый из нас - его винтиком. Но не стоит отчаиваться: нашу жертву будут помнить наши дети и внуки, уверяю вас. Ведь права на вторую подобную ошибку у нас уже нет.\n\nВот почему мне так близки слова Флобера:"
 jap.188.a: "Человек - ничто, работа - всё."
 jap.189.t: "Цифровизация"
 jap.189.d: "Существует шутка: в 1980-х Япония была в 2000-х, и в 2020-х она продолжает оставаться там же. Как бы нам ни было обидно признавать, данное суждение шуткой не является. Причин у этого явления много: будь то крайне консервативный подход как правительства, так и компаний по отношению к способам передачи информации, последствия 90-х - все это существенно сказывается на нашей экономике и, как следствие, на боеспособности нашей армии.\n\nДля победы нам необходима цифровизация. Вопрос лишь в том, как нам к ней подойти.\n\nПервый подход подразумевает "мягкую" цифровизацию. Япония известна как страна гармонии, и для нас нет причин рушить десятилетия традиций, как это сделали наши соседи-коммунисты в погоне за прибылью. Вместо этого мы подадим пример как бизнесу, так и гражданам, начав цифровизацию нашего правительства. Больше никакого бюрократизма: все, что вам надо сделать - это зайти в приложение на своем смартфоне. Оплата штрафов, цифровое резидентство, вызов врача или жалоба по насущной проблеме теперь не будут вынуждать наших граждан носить за собой десятки листов. А корпорации, наблюдая за нашими успехами, сами начнут процесс цифровизации.\n\nВпрочем, есть и второй способ. Ситуация, в которой оказалась Япония, не может быть решена полумерами. Нам необходима цифровизация всего общества. У нас уже есть проекты вроде Общества 5.0, направленные на привлечение новейших технологий, вопрос стоит лишь в реализации, которую замедляют процессы в нашем обществе. В краткосрочной перспективе этот подход вызовет явное недовольство всех слоев общества, начиная консервативными верхами партии и бизнес-магнатами, заканчивая простыми рабочими, но именно этот подход позволит нам навсегда покинуть ту яму, в которой оказалась наша страна. Тем более, представьте себе Токио всего через 10 лет: беспилотное такси, роботы на улицах и ИИ на работе, бесконтактная оплата и 5G-сервисы - нравится, как звучит? Тогда молчите и принимайте новые реалии.\n\nВыбор за вами, господин Министр."
 jap.189.a: "Давайте ограничимся цифровизацией государственного управления."
 jap.189.b: "Нам нужна полная цифровизация!"
 jap.190.t: "Достигнутая Рэйва"
 jap.190.d: "Война на Тайване, проигранная нами из-за различных социально-экономических факторов, оставила на облике нашей страны шрам, который, как нам тогда казалось, невозможно скрыть. Экономика лежала в руинах, армия была опозорена, а японский народ, некогда гордый и трудолюбивый, находился в том состоянии, которого не испытывал с времен позорного поражения в 1945 году.\n\nИ все-таки мы отказались принимать это как данность. Япония смогла найти выход даже из настолько бедственного положения. Японская экономика переживает невиданный до этого подъем, бренд "Made in Japan" вновь заполоняет полки магазинов по всему миру. Продукция Toyota, Toshiba, Sharp во многом превосходит товары европейских конкурентов, интернет вновь переживает период японификации, а предприниматели вкладывают невиданные суммы в финансовый сектор.\nЯпонская мечта возродилась - консервативная, традиционная, и наш народ вновь верен своему государству и Императору. На улицах вновь видны улыбки матерей и смех детей, молодежь возвращается в деревни, а Токио из переполненного мегаполиса медленно превращается в город будущего.\n\nВпереди Империю ждут тяжелые времена. Враг за морем уже готовит свою военную машину для того, чтобы попытаться уничтожить нас. Но у нас все еще есть время для того, чтобы подготовиться и раз и навсегда отрубить голову красному змею.\n\nКогда они придут, мы будем готовы."
 jap.190.a: "Завтра будет лучше."
 jap.191.t: "Военное Нормирование"
 jap.191.d: ""
 jap.191.a: "Kenyaku suru!"
 
 jap.1000.t: "Бои на Корейской Границе!"
 jap.1000.d: "Пламя войны вновь опаляет Корейский полуостров - землю, и без того израненную прошлыми конфликтами, а теперь превратившуюся в поле битвы идеологического противостояния. Железные сапоги Севера безжалостно топчут хрупкое равновесие 38-й параллели, а призывы Юга о помощи кажутся слабыми и бессильными под сенью красного флага.\n\nЕсли Токио будет бездействовать и позволит коммунистическому режиму объединить полуостров, следующей его целью вполне может стать Япония. Япония всегда считала себя передовым оплотом демократии в Азии. Как защитник демократии, Япония не только обязана, но и должна помочь Южной Корее отстоять с таким трудом завоеванную свободу и демократию, даже если это будет стоить огромных денег.\n\nНесмотря на то, что в правительстве есть несогласные, крики сторонников войны быстро заглушили все возражения. На фоне шума в Национальном совете корабли Сил самообороны уже рассекают волны, направляясь к последнему бастиону демократии на Корейском полуострове. Истребители пронзают тишину рассвета, а солдаты, во всеоружии, идут вперед с решимостью и бесстрашием в глазах.\n\nНикто не может предсказать исход этой войны, и никто не может с уверенностью сказать, правильный ли выбор сделала Япония. Но все знают, что колеса истории начали вращаться, и никто не может остановить их движение вперед."
 jap.1000.a: "Разделенные горами и морями, связанные судьбой."
 jap.1001.t: "Японская Интервенция в Корейскую Войну"
 jap.1001.d: "По сообщению корреспондента Asahi Shimbun в Южной Корее, сегодня рано утром на границе между Северной и Южной Кореей начались интенсивные перестрелки. То, что началось как незначительная стычка, быстро переросло в полномасштабное военное противостояние. Обе стороны обвиняют друг друга в том, что они открыли огонь первыми, утверждая, что их действия были предприняты в целях самообороны. Бои продолжаются, и данные о жертвах пока не подтверждены. Считается, что причиной конфликта стала физическая стычка между патрульными подразделениями обеих стран в районе демилитаризованной зоны, которая переросла в стрельбу.\n\nСеверная Корея настаивает на том, что южнокорейские солдаты первыми пересекли военную демаркационную линию и спровоцировали патрульное подразделение, вынудив его открыть огонь в целях самообороны. Министерство национальной обороны Южной Кореи, напротив, выступило с заявлением, в котором обвинило северокорейские войска в неспровоцированном нападении на южнокорейский патруль, что привело к необходимости ответных действий. По данным Объединенного комитета начальников штабов Южной Кореи, северокорейские войска использовали ракеты и артиллерию для обстрела южнокорейских пограничных постов и военных объектов. В ответ южнокорейские войска предприняли контратаки и направили истребители KF-16 для нанесения авиаударов по военным объектам Северной Кореи вдоль границы.\n\nВ то же время официальные СМИ Северной Кореи опубликовали заявление, осуждающее "акты агрессии" Южной Кореи, и заявили, что Корейская народная армия готова в любой момент "сокрушить военную мощь южных капиталистических марионеток"."
 jap.1001.a: "Еще одна война..."
 jap.1002.t: "Великая Азиатская Война"
 jap.1002.d: "Сегодня под железной хваткой красных тиранов Китай, некогда самопровозглашенный "Поднебесной империей", вынашивает амбиции и молча протягивает когти к близлежащим территориям. Перед лицом этой деспотичной силы с Востока, чтобы защитить свободу и демократию Азии, Япония - некогда страшный самурайский меч, наводивший ужас на весь мир, - вновь молча обнажила его. Под лучезарным светом флага Восходящего Солнца 100 миллионов граждан стоят как один, объединившись, чтобы противостоять натиску красной волны, защищая мир и процветание этой земли.\n\nОт возвышающихся вершин Гималаев до безбрежных синих волн Тихого океана мы яростно сражаемся против тиранов, отравленных коммунистической идеологией. Своей кровью и жизнями мы защищаем последние остатки славы и достоинства Азии.\n\nМы - наследники наследия самураев, в наших жилах, как пламя, течет мужество и бесстрашие. Каким бы опасным ни был предстоящий путь, мы выйдем победителями в этой битве судьбы. Когда сакура снова расцветет, это ознаменует момент нашего триумфального возвращения."
 jap.1002.a: "Да здравствует император, да здравствует Япония!"
 jap.1003.t1: "Новое Солнце в Небе"
 jap.1003.t2: "Восход Бусидо"
 jap.1003.d1: "Старые союзники падают, новые поднимаются, и при постоянных изменениях, происходящих в истории, неизбежно, что груз прошлого, настоящего и будущего будет давить на всех нас.\n\nСначала гигант на востоке раскололся, разделенный своими многочисленными злобами и разочарованиями. Затем Европа ввязалась в ужасающую войну, которая вновь разожгла мир.\n\nДракон раскрыл пасть и попытался проглотить Тайвань целиком, но остров не устоял в одиночку. Мы сражались с новыми и старыми союзниками, но прошлое настигло нас, и вскоре дракон растоптал наши силы, а белое солнце сгорело в его пламени.\n\nВнутренняя вражда стала явью, брат против брата. Но мы поднялись над трудностями и исправили свои ошибки. Мы снова возродили старую дружбу и отточили наши клинки против дракона. После нескольких дней безостановочной борьбы дракон был сломлен и повержен, был заключен мир, и над континентом нависла завеса стабильности.\n\nПосле того, как мы прошли через все невзгоды, и то, что было сломано, было исцелено, вы тоже можете насладиться заслуженным отдыхом."
 jap.1003.d2: "Одинокий воин оказался не так уж и одинок, когда дракон попытался сокрушить Тайвань своими когтями. Вместе со своими союзниками мы смогли загнать летающее чудовище обратно в его пещеру.\n\nНо шрамы, оставленные им, остались, города горели, а наши семьи были разделены этим безрассудным насилием. Мы научились многому, мы научились быть готовыми ко всему.\n\nМы вновь встали на путь воина, мы вновь знали, как сражаться.\n\nЭто было мудрое решение. Неизбежно дракон попытался бы снова втянуть всю Азию в огненную войну. Обезумев от жажды крови и жажды мести, он распространил бы свой ненавистный огонь по всему континенту. Но мы стояли наготове, держа оружие наготове и собравшись воедино, как единый самурай. Мы целились в сердце дракона, и мы убили его.\n\nПобежденный, дракон будет смыт потоком истории, и после этого Япония вновь займет свое место в мире."
 jap.1003.a: "Наслаждайся тенью под недавно выросшими деревьями."
 jap.1003.b: "Будьте бдительны и никогда не отчаивайтесь."
 jap.1004.t: "Горный Флот"
 jap.1004.d: ""Полковник Ямамото, прошу вас пройти со мной". Подписав соглашение о неразглашении, молодой второй лейтенант провел Ямамото через серию взрывных дверей. Лифт медленно спускался вниз и наконец остановился глубоко под землей.\n\n "Это основная зона нашего проекта "Океанский щит", - объяснил полковник Накамура. Когда открылись последние ворота, Ямамото задохнулся. В огромном подземном доке модифицированный авианосец класса "Идзумо" проходил окончательную доводку. Остров авианосца был переделан, а полетная палуба усилена - очевидно, для поддержки новых истребительных операций.\n\n "Его длина 248 метров, водоизмещение 30 000 тонн", - сказал Накамура, указывая на авианосец. Он оснащен современным радаром с фазированной антенной решеткой и корабельной системой ПВО, на нем могут базироваться до двенадцати истребителей F-35B."\nbsp- Они шли по причалу, проходя мимо двух эсминцев ПВО класса "Акидзуки", стоящих один за другим. На их носу выделялись 96-ячеечные системы вертикального пуска.\n\n "Это наши новейшие ракетные эсминцы класса "Майя", - продолжил Накамура. Они модернизированы по сравнению с классом "Акидзуки" и оснащены дополнительными противокорабельными и противовоздушными ракетами. На каждом корабле установлен новейший радар SPY". Еще дальше были выстроены шесть фрегатов. Несмотря на небольшие размеры, они были оснащены самыми современными системами радиоэлектронной борьбы и противолодочными системами.\n\n В командном центре несколько офицеров следили за передвижением кораблей по Индо-Тихому океану, а электронная карта на стене постоянно обновляла данные о позициях китайского флота. "В критический момент этот флот изменит стратегический баланс всего Тихого океана, - сказал Накамура, не отрывая глаз от дисплея, - и то, что вы видите здесь, - лишь часть этого. У нас есть аналогичные объекты в других частях страны. Все, что мы делаем, предназначено для... совершенно новой Японии"."
 jap.1004.a: "Банзай!"
 jap.1005.t: "Военно-морское командование США приходит на помощь!"
 jap.1005.d: ""
 jap.1005.a: "Arigatou, Americanjin!"
 

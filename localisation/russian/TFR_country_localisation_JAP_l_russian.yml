 JAP_peoples_diet_category_desc: "Народное Собрание Японии - это новый парламент, который был учрежден на II Съезде §AЕдиного Демократического Фронта§!£GFX_UDF_logo - новой коалиции левых партий, созданной в ответ на свержение избранного правительства Силами Самообороны. Он призван обеспечить свободу и равенство для всех граждан Японии, а также способствовать развитию и благополучию нации в целом.[JAP_civil_war_peoples_diet][JAP_main_factions_peoples_diet][JAP_democrat_factions_peoples_diet]"
 JAP_civil_war_peoples_diet_yes: "На данный момент Народное Собрание состоит из бывших депутатов старого Парламента Японии. Первые выборы должны произойти после полного окончания гражданской войны."

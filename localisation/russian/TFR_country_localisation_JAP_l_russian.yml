 #Events
 jap.1.t: "Подтвержден Первый Случай Заболевания Ковид"
 jap.1.d: "В Японии подтвержден первый случай пневмонии, вызванной новым коронавирусом из Китая, сообщили в четверг в министерстве здравоохранения.\n\nПо словам представителей министерства, у гражданина Китая в возрасте 30 лет, проживающего в префектуре Канагава, тест на вирус оказался положительным. Он вернулся из Уханя 6 января и был госпитализирован 10 января, но уже поправился и был выписан из больницы в среду."
 jap.1.a: "Тревожно..."
 jap.2.t: "Олимпийские игры 2020 года отложены"
 jap.2.d: "Поскольку число людей, инфицированных Ковид-19, растет с каждым днем, международный олимпийский комитет совместно с правительством Японии обсудили, какие действия были бы наиболее подходящими, учитывая риск того, что олимпийские игры могут стать рассадником болезней, из-за чего многие спортсмены и туристы, а также граждане Японии могут находится под большим риском. обе стороны объявили о переносе Олимпийских игр до тех пор, пока уровень заражения не достигнет рекордно низкого уровня.\n\nЭта новость вызвала всеобщее разочарование, поскольку японское правительство пообещало сделать все возможное, чтобы гарантировать, что коронавирус больше не будет представлять угрозы."
 jap.2.a: "Факел будет передан дальше."
 jap.3.t: "Начинаются Игры XXXII Олимпиады"
 jap.3.d: "Пандемия Ковид очень сильно распространилось по миру, и по мере роста числа инфицированных также встал вопрос о том, разумно ли допускать проведение Олимпийских игр или нет.\n\nЯпонское правительство и международный олимпийский комитет долго обсуждали этот вопрос и решили не откладывать проведение Олимпийских игр. Несмотря на растущую критику этого решения со стороны ряда экспертов в области здравоохранения и других стран, как комитет, так и Япония заверили, что они будут обеспечивать, чтобы здравоохранение оставалось главным приоритетом.\n\nС этим решением Олимпийские игры готовы начаться, поскольку спортсмены со всего мира готовы соревноваться друг с другом, а меры здравоохранения доведены до логической крайности, только время покажет, не вызовет ли это серьезной вспышки инфекции."
 jap.3.a: "Не о чем беспокоиться, наслаждайтесь играми."
 jap.4.t: "Вопрос об Олимпийских играх"
 jap.4.d: "Все чувствуют, что долгий мир не будет длиться вечно, наши американские друзья ведут собственную внутреннюю борьбу, которая может обостриться в любой момент, а Китай смотрит на свои претензии голодными глазами.\n\nПо мере роста напряженности во всем мире возникает новый вопрос, поскольку ответственность за проведение Олимпийских игр возлагается на нас. Конечно, мы можем просто провести олимипиаду у себя и надеяться на укрепление духа спортивного мастерства среди людей всего мира, но риск того, что это еще больше подольет масла в огонь, сохраняется. Не говоря уже о вирусе Ковид-19, который надолго затормозил наше развитие, разделив семьи и заставив нас изолироваться, с таким количеством людей в одном городе возможно суперраспространение.\n\nМы также можем отменить олимпиаду, видя риск для безопасности и здоровья, но лучше не давать соперникам больше стимула для политической агрессии.\n\n В конце концов, решение было принято:"
 jap.4.a: "Независимо от рисков, игры будут проведены"
 jap.4.b: "Угасим огонь, отложим Олимпиаду"
 jap.5.t: "Формирование ОДТО"
 jap.5.d: "Организация Договора Тихоокеанской Обороны, или ОДТО, была создана в условиях нарастания напряженности в отношениях с ирредентистским Китаем. В ее состав вошли две страны-основательницы - Австралийское Содружество и Японское государство."
 jap.5.a: "Мы должны защитить Тайвань!"
 jap.6.t: "Последний Отблеск Сумерек"
 jap.6.d: "Произошло немыслимое, один из наших величайших союзников погрузился в состояние внутренней борьбы, сосед против соседа, родитель против ребенка, целый континент погрузился в насилие. \n\nС каждым хаотическим событием стервятники начинают кружить над ним, и мы знаем, что с потерей наших хороших американских друзей китайцы теперь смотрят на Тайвань голодными глазами, видя в гражданской войне главный шанс завершить свой давний конфликт.\n\nАзия неизбежно столкнется с войной, несмотря на наши трудности, мы не можем бросить Тайвань.\n\nМы не одни, с нашими оставшимися союзниками, мы столкнёмся с драконом."
 jap.6.a: "Ожидайте худшего"
 jap.7.t: "Страна Восходящего Солнца"
 jap.7.d: "С момента окончания Второй мировой войны Япония переживала неспокойные времена, но благодаря своим союзникам по всему миру и готовности адаптироваться, ей удалось не только выжить, но и процветать.\n\n20-е годы не были слишком добры к нам. Стареющее население и военные, которых держат на поводке, - вот лишь некоторые из проблем, которые остаются бельмом на глазу. \n\nПоскольку отставка Синдзо Абэ не за горами, темные тучи сгущаются над остальной Азией и растет напряженность среди наших западных союзников, только время может сказать, что принесут эти новые неспокойные времена. Чтобы не оказаться в тени, нам необходимы ясный ум и сильный дух."
 jap.7.a: "Нам многое предстоит сделать."
 jap.8.t: "Тайваньская Война"
 jap.8.d: "Гражданская война в США, несомненно, изменила геополитический ландшафт Восточной Азии, и для Японии самым непосредственным и неотложным вызовом является угроза китайского вторжения на Тайвань. Будучи важнейшим узлом в первой островной цепи, Тайвань имеет огромное стратегическое значение. Если он падет, то не только будет разрушена система обороны первой островной цепи, но и родина Японии окажется под прямой военной угрозой со стороны Китая, что приведет к нарушению баланса сил во всем Азиатско-Тихоокеанском регионе.\n\nДля японского правительства падение Тайваня станет не только значительной потерей для демократического лагеря, но и поставит Японию в стратегически пассивное положение. Если бы Китай контролировал Тайвань, он получил бы жизненно важный стратегический плацдарм, позволяющий его военно-морским силам заходить глубже в Тихий океан, напрямую угрожая морскому спасательному кругу Японии.\n\nТаким образом, единственным выходом для Японии является вмешательство в тайваньский конфликт и помощь Тайваню в сопротивлении китайскому вторжению."
 jap.8.a: "Мы победим!"
 jap.9.t: "Победа!"
 jap.9.d: "После нескольких недель тяжелых боев и гибели многих людей Китай отступил с Тайваня.\n\nВместе мы успешно защитили остров от китайской агрессии, унизив их многолетнюю пропаганду и угрозы.\n\nПока они возвращаются в свои дома, мы будем восстанавливаться и выражать благодарность нашим союзникам за их столь необходимую помощь. Пока мы оплакиваем тех, кого потеряли, и греемся в лучах победы, нас начинает осенять осознание того, что это, возможно, не последняя встреча с китайской агрессией.\n\nОни вернутся, но теперь мы будем готовы."
 jap.9.a: "Gureto!"
 jap.10.t: "Позорное Поражение"
 jap.10.d: "Огонь дракона был слишком силен для нас. После нескольких месяцев жестокой войны над Тайбэем развевается красное знамя Народной республики - сценарий, который никто из нас не хотел себе представить.\n\nНаши раны гноятся, наши союзники в смятении, наши люди дома в ярости от потраченных жизней, вдовы плачут, а сироты никогда не вернутся домой.\n\nТакое унижение ляжет тяжелым грузом на наши коллективные души, грузом, который может разрушить ткань цивилизованности в нашей нации. Уже есть группы, выражающие свой гнев и недовольство правительством, [JAP_ldp_reelection_loc]\n\nПосле этого поражения Япония никогда не будет прежней."
 jap.10.a: "Owari Da!"
 jap.11.t: "Украина признает Южные Курильские острова Японскими"
 jap.11.d: "Верховная Рада Украины приняла постановление о признании южных Курильских островов "территорией Японии, оккупированной Россией", согласно данным на сайте парламента.\n\n"Верховная Рада Украины заявляет о своей поддержке позиции Японии относительно ее Северных территорий; признает, что эти территории продолжают находиться под оккупацией Российской Федерации", - говорится в тексте документа. В том же тексте Киев призвал международное сообщество принять все возможные меры "для юридического оформления статуса Северных территорий Японии"."
 jap.11.a: "Эм?"
 jap.12.t: "Незванный Гость The Game Awards"
 jap.12.d: "The Game Awards даже с учетом незапланированного переезда и переноса сроков конференции по-прежнему удивило множеством анонсов, трейлеров и наград. Однако самый неожиданный и сумасшедший момент произошел в самом конце выставки: сразу после презентации "Игры года" Elden Ring тайваньцы были номинированы со сцены.\n\n"Привет, Девиз. Для реальных пацанов я хочу сказать, что эту награду я хочу номинировать моих ребят из Тайваня, и пусть Тайвань будет свободным!" эта речь прозвучала со сцены сразу после слов разработчиков the Elden Ring.\n\nПо словам исполнительного директора и организатора шоу Джеффа Кейли, незванный гость был задержан для дальнейшего разбирательства. По-видимому, ему ни в чем не было предъявлено обвинений."
 jap.12.a: "Сохраняйте силу духа!"
 jap.13.t: "Синдзо Абэ уходит в отставку"
 jap.13.d: "Синдзо Абэ заявил в пятницу, что уходит с этой должности ввиду ухудшения самочувствия. Разговоры о его состоянии здоровья обострились, когда в понедельник он во второй раз за неделю посетил токийскую больницу. Абэ давно страдает язвенным колитом.\n\n На выбор нового лидера партии уйдёт две - три недели. Победитель должен быть официально избран парламентским голосованием, и будет исполнять обязанности премьера на оставшийся срок полномочий Абэ, то есть до сентября 2021 года."
 jap.13.a: "Отдыхай, патриот..."
 jap.14.t: "Ёсихидэ Суга избран Премьер-Министром"
 jap.14.d: "Лидер Либерально-демократической партии Японии Ёсихидэ Суга избран новым главой правительства страны. Его кандидатура была поддержана большинством депутатов палаты представителей парламента. За нового премьера проголосовали 314 парламентариев из 465."
 jap.14.a: "Достойный ли он наследник?"
 jap.15.t: "Выборы главы ЛДП"
 jap.15.d: "Внутренние выборы в ЛДП в самом разгаре, члены партии пожимают друг другу руки и дают успокаивающие обещания, призывая к благосклонности и расширяя свои круги, но на этой политической арене только двое стали возвышаться. \n\nПервый - Фумио Кисида, известный центрист, который поддерживает определенную стабильность во внутренней политике ЛДП, обращаясь к членам партии с обеих сторон спектра и выдвигая идею "новой формы капитализма", которая призвана облегчить бремя среднего класса, сделать жизнь более справедливой для них и, в свою очередь, стимулировать их к участию в экономике. \n\nДругой, Таро Коно, считается либералом как в ЛДП, так и за ее пределами. Он стремится пересмотреть "три стрелы" Синдзо Абэ и провести экологизацию Японии, желая сократить количество атомных электростанций в пользу возобновляемых источников энергии. Его любит народ, но презрение, которое испытывает к нему большая часть членов ЛДП, трудно игнорировать.\n\nТем не менее, голоса подсчитаны, и партия с открытым сердцем слушает результаты."
 jap.15.a: "Фумио Кисида"
 jap.15.b: "Таро Коно"
 jap.16.t: "Скоро Выборы!"
 jap.16.d: "После нескольких недель предвыборной кампании, оскорблений и мелких скандалов, выборы вот-вот достигнут своего пика. И оппозиция, и ЛДП делают все возможное, чтобы склонить на свою сторону как можно больше избирателей.\n\nХотя прогнозируется, что явка избирателей будет низкой, все же найдется достаточно людей, которые пойдут голосовать за предпочитаемую партию. ЛДП обладает опытом, обещает стабильность и уверенность, в то время как оппозиция гарантирует перемены, прогресс и обновление.\n\nПосле того как жаркие дебаты подойдут к концу, а голоса будут отданы, в конечном итоге именно народ решит, кто победит."
 jap.16.a: "Пришло время перемен!"
 jap.16.b: "Сохраним стабильность!"
 jap.17.t: "ЛДП победила!"
 jap.17.d: "К удивлению абсолютно никого, политическое доминирование ЛДП сохраняется, так как подсчет голосов объявил ЛДП победителем.\n\nРеакция на результаты неоднозначна, некоторые разочарованы, другие рады, что Япония находится на устойчивом курсе уверенности и стабильности, уже сейчас гражданская коалиция выразила готовность расширяться и вести кампанию на следующих выборах."
 jap.17.a: "Как и прежде."
 jap.18.t: "Гражданская Коалиция победила!"
 jap.18.d: "К всеобщему удивлению, политическое господство ЛДП было остановлено, коалиция, состоящая из всевозможных оппозиционеров, выложилась на полную во время кампании, и эти усилия принесли свои плоды.\n\nНесмотря на неоднозначную реакцию на это, есть и оптимизм на будущее, стагнация закончилась, и с этим может прийти новое."
 jap.18.a: "Будем надеяться, что они будут держаться вместе"
 jap.19.t: "Сформирована Гражданская Коалиция"
 jap.19.d: "Было неизбежно, что ЛДП получит серьезного соперника на большой политической арене, а именно гражданскую коалицию что составляет из себя собрание оппозиционеров, которые объединились, чтобы положить конец железной хватке, которую ЛДП имеет на политической арене Японии.\n\nНесмотря на то, что гражданская коалиция очень молода и использует несколько нетрадиционные методы, ей удалось заручиться достаточной поддержкой, чтобы стать реальной угрозой для ЛДП, а поскольку выборы уже скоро, это может стать решающим фактором."
 jap.19.a: "Дилетанты."
 jap.20.t: "Освобождение Цзиньмэня"
 jap.20.d: "Сегодня утром мы получили сообщения с фронта, подтверждающие, что после ожесточенного наступления наших войск мы окончательно захватили остров Цзиньмэнь. Хотя гарнизон НОАК нанес нам значительный урон, используя свои оборонительные укрепления, в конечном итоге он был подавлен нашим превосходством в численности. Основные военные объекты и командные центры острова перешли под контроль Сил самообороны.\n\nКак только остров Цзиньмэнь, ключевая стратегическая позиция, оказался в наших руках, китайские города и линии снабжения оказались в зоне досягаемости нашей артиллерии. Теперь мы можем оказывать давление на пути снабжения НОАК, создавая преимущество для наших сил на передовой."
 jap.20.a: "Банзай!"
 jap.21.t: "Цзиньмэнская Операция Провалилась"
 jap.21.d: "Сегодня утром мы получили сообщения с фронта о том, что, несмотря на наши попытки укрепить плацдарм на острове Цзиньмэнь, включая авиаудары и артиллерийские обстрелы, чтобы прорвать оборону НОАК, все попытки закончились неудачей.\n\nПосле внезапных атак и фланговых маневров НОАК наши войска понесли большие потери. Кроме того, наши подкрепления и линии снабжения были отрезаны ударами НОАК, что препятствовало дальнейшей поддержке. Моральный дух на фронте ухудшился, а нехватка боеприпасов еще больше подкосила наши силы. После того как последний штурм закончился неудачей, мы были вынуждены отступить с острова Цзиньмэнь."
 jap.21.a: "Позорное Зрелище."
 jap.22.t: "Vietnam Sends Counteroffer"
 jap.22.d: ""
 jap.22.a: "We Must Contain Chinese Aggression!"
 jap.22.b: "Absolutely Not."
 jap.23.t: "Выбор Премьер-Министра"
 jap.23.d: "По завершении выборов нам предоставляется бесценная возможность сформировать новый кабинет министров. Это знаменует собой глубокие изменения в давно сложившемся политическом ландшафте Японии и шанс выполнить обещания, данные Гражданской коалицией нашим гражданам.\n\nНовый премьер-министр будет выбран из числа лидеров, которые вели нас к победе, и для Гражданской коалиции таким лидером является достопочтенный Юкио Эдано. Юкио Эдано родился в семье рабочего класса в Уцуномии, префектура Точиги, и уже в юном возрасте решил сделать политическую карьеру. После изучения права он баллотировался в Палату представителей как кандидат от Новой партии Японии, начав свой сложный, но выдающийся политический путь.\n\nВ качестве альтернативы Гражданская коалиция могла бы выбрать более радикальную фигуру из политического спектра. Кадзуо Сии, опытный политик и многолетний лидер Японской коммунистической партии, занимал несколько ключевых постов, включая пост генерального секретаря, главы исполнительного комитета и председателя КПЯ. После десятилетий парламентской борьбы Сии и КПЯ теперь видят проблеск надежды на формирование правительства, благодаря чему перспектива социализма в Японии кажется вполне достижимой. Однако это также может вызвать массовые общественные волнения, угрожая стабильности нынешней администрации.\n\nВ конечном счете, пришло время решать: Кто возглавит новое правительство Японии до следующих всеобщих выборов? Кто возьмет на себя монументальную задачу демонтажа остатков Либеральной партии."
 jap.23.a: "Эдано отправится в императорский дворец, где получит назначение от Его Величества."
 jap.23.b: "Сии проследует в императорский дворец, где получит назначение Его Величества."
 jap.24.t: "Выбор Министра Иностранных Дел"
 jap.24.d: "По завершении выборов нам предоставляется бесценная возможность сформировать новый кабинет министров. Это знаменует собой глубокие изменения в давно сложившемся политическом ландшафте Японии и шанс выполнить обещания, данные Гражданской коалицией нашим гражданам.\n\nНовоназначенный министр иностранных дел будет представлять собой сдвиг в политическом ландшафте Японии. Внутри Гражданской коалиции существует два различных взгляда на кандидата на эту роль.\n\nС одной стороны, правая фракция ДПН поддерживает Юитиро Тамаки, бывшего финансового чиновника. Тамаки выступает за укрепление союзов безопасности со странами, разделяющими традиционные ценности и общие интересы, и в то же время занимает жесткую позицию по отношению к региональным конкурентам в Восточной Азии.\n\n С другой стороны, левая фракция, представленная КПЯ, выдвигает кандидатуру Акиры Касаи. Выпускник Токийского университета и сторонник мирной дипломатии, Касаи обещает снизить дипломатическую напряженность в Японии, укрепить связи с соседними странами и выступить единым фронтом в решении региональных проблем.\n\nНесмотря на эти разногласия, настало время принять решение: Кто будет руководить внешней политикой Японии в преддверии следующих всеобщих выборов и укреплять позиции страны в мире?"
 jap.24.a: "Назначить Касаи."
 jap.24.b: "Назначить Тамаки."
 jap.25.t: "Выбор Министра Экономики"
 jap.25.d: "По завершении выборов нам предоставляется бесценная возможность сформировать новый кабинет министров. Это знаменует собой глубокие изменения в давно сложившемся политическом ландшафте Японии и шанс выполнить обещания, данные Гражданской коалицией нашим гражданам.\n\nНовому министру экономики, торговли и промышленности предстоит сложная задача, требующая тщательного и взвешенного процесса отбора. Внутри Гражданской коалиции рекомендации кандидатов разительно отличаются.\n\n С одной стороны, Мидзухо Фукусима, лидер СДП, выступает за политику, ориентированную на потребительские товары, безопасность продуктов питания и расширение инициатив в области социального обеспечения. С другой стороны, Итиро Мацуи из Партии Инноваций из Осаки привносит сильный местный колорит. Хотя Мацуи критикуют за его автократический стиль, его хвалят за продвижение коммерции по всей Японии.\n\nДалее левая фракция Гражданской коалиции предлагает в качестве кандидата Казуо Сии из КПЯ, считая, что он проведет социалистическую трансформацию экономики и устранит влияние крупных корпораций.\n\nВ конечном итоге, настало время решить: кто будет направлять экономическую политику Японии до следующих выборов и обеспечивать ее дальнейшее процветание?"
 jap.25.a: "Назначить Фукусиму."
 jap.25.b: "Сии будет занимать эту должность."
 jap.25.c: "Назначить Мацуи."
 jap.26.t: "Выбор Министра Внутренних Дел"
 jap.26.d: "По завершении выборов нам предоставляется бесценная возможность сформировать новый кабинет министров. Это знаменует собой глубокие изменения в давно сложившемся политическом ландшафте Японии и шанс выполнить обещания, данные Гражданской коалицией нашим гражданам.\n\nМинистр внутренних дел и коммуникаций будет играть ключевую роль в формировании административной системы Японии и политики местной автономии. Внутри Гражданской коалиции существуют разные мнения о том, кто должен занять этот важнейший пост.\n\nУмеренные внутри коалиции поддерживают Кента Идзуми из КДПЯ, утверждая, что он будет лучше представлять интересы правящей партии. Они считают, что Изуми сможет продвигать политику, направленную на уменьшение классового неравенства в Японии, продвижение гуманистических ценностей и устойчивое развитие.\n\nВ противоположность этому, более радикальные фракции выдвинули кандидатуру Мари Кушибучи из Рейва Синсенгуми. Известная своим популистским подходом, Кушибучи выступает за ряд разнообразных программ, включая либерализацию экономики и образования, а также переоценку внешнеполитических позиций Японии.\n\nТеперь необходимо принять решение: кто возглавит административную реформу Японии и защитит ее демократию до следующих всеобщих выборов?"
 jap.26.a: "Назначить Кусибучи."
 jap.26.b: "Назначить Изуми."
 jap.27.t: "Выбор Министра Разведки"
 jap.27.d: "По завершении выборов нам предоставляется бесценная возможность сформировать новый кабинет министров. Это знаменует собой глубокие изменения в давно сложившемся политическом ландшафте Японии и шанс выполнить обещания, данные Гражданской коалицией нашим гражданам.\n\nПредседатель Национальной комиссии общественной безопасности обладает значительным влиянием в кабинете министров Японии. Он контролирует работу полицейских органов страны и руководит операциями по обеспечению безопасности и разведки. В результате в Гражданской коалиции возникла острая конкуренция по поводу того, кто должен быть назначен на эту важнейшую должность.\n\nОдним из ведущих кандидатов является Акира Нагацума из КДПЯ. Известный своей умеренной политикой, Нагацума - опытный бюрократ с большим опытом работы в комитетах по иностранным делам и безопасности парламента. Он выступает за постепенный, но твердый подход к борьбе с "враждебными режимами"\n\nАльтернативным претендентом также является Акира Коикэ из КПЯ. Будучи нынешним генеральным секретарем КПЯ и бывшим врачом, Коикэ пользуется большим уважением в своей партии. Он особенно активно высказывается по таким вопросам, как свобода интернета и СМИ, а его предупреждения о том, что "антикоммунизм приведет Японию к агрессии", вызвали широкие дебаты.\n\nНастало время принять решение: кто обеспечит безопасность Японии и сохранит ее драгоценный мир до следующих выборов?"
 jap.27.a: "Назначить Коике."
 jap.27.b: "Назначить Нагацума."
 jap.28.t: "Падение ЛДПЯ"
 jap.28.d: "Колеса истории вращаются, и с победой гражданской коалиции вскрылось много грязи, которая была похоронена в отношении ЛДП.\n\nНачиная от похороненных случаев преследования, коррупции, связей с церковью объединения и намеренного отказа от обязанностей. Все больше и больше сообщений попадает в новости, а победившая гражданская коалиция пользуется ситуацией.\n\nЭто привело к значительному снижению влияния и престижа ЛДП, несколько ключевых фигур находятся под пристальным вниманием и возможными арестами, и будущее ЛДП выглядит мрачно."
 jap.28.a: "Поверженный Колосс"
 jap.29.t: "Формирование Бюджета"
 jap.29.d: "Недавние дебаты гражданских коалиций по поводу бюджета штата высветили важнейший и спорный вопрос: должны ли мы ставить людей на первое место или отдавать приоритет исправлению экономики.\n\nЛевые партии в Гражданской коалиции горячо отстаивают идею "ставить людей на первое место". Они выступают за увеличение финансирования социальных программ, здравоохранения и образования, подчеркивая острую необходимость поддержки уязвимых слоев населения.\n\nВ отличие от них, различные правые партии в коалиции утверждают, что на первом месте должна быть сильная экономика. Они утверждают, что процветающая экономика - это лучший способ создать возможности для всех, что в конечном итоге принесет пользу тем самым людям, которых левые стремятся поддержать."
 jap.29.a: "Люди на первом месте"
 jap.29.b: "Поможем нашей экономике в первую очередь"
 jap.30.t: "Гражданская Коалиция консолидируется вокруг Социалистов"
 jap.30.d: "После победы Гражданской коалиции на выборах некоторые члены Конституционно-демократической партии поняли, что полагаться только на собственные силы недостаточно для обеспечения своего положения. Им нужно было создавать союзы с другими оппозиционными партиями, чтобы получить преимущество на политической арене. Левые партии в Японии обладают широкой низовой базой и мощным организационным и мобилизационным потенциалом. Несмотря на идеологические различия между КДП и левыми партиями, они имеют общие позиции по некоторым вопросам политики, таким как социальное обеспечение и защита окружающей среды, что дает возможность для сотрудничества.\n\nПосле ряда переговоров и обсуждений КДП и Коммунистическая партия, Рейва Синсенгуми и СДП достигли консенсуса и решили создать политический альянс. Это решение сразу же вызвало общественный резонанс. Сторонники рассматривали его как прогресс демократической политики Японии, в то время как голоса оппозиции были не менее сильны. Одни опасались, что влияние левых партий будет постепенно расти и в конечном итоге создаст угрозу демократической системе Японии. Другие сомневались, смогут ли две партии с такими значительными идеологическими различиями по-настоящему сотрудничать, не превратится ли альянс в "странных соседей"\n\n"Это похоже на политический брак", - сказал анонимный политолог. "Обе стороны объединились, преследуя свои собственные цели, и смогут ли они сохранить этот союз в долгосрочной перспективе, еще предстоит выяснить"."
 jap.30.a: "Революция с помощью бюллетеней"
 jap.31.t: "Гражданская Коалиция консолидируется вокруг Либералов"
 jap.31.d: "После победы Гражданской коалиции на выборах некоторые члены Конституционно-демократической партии поняли, что полагаться только на собственные силы недостаточно для обеспечения своего положения. Им необходимо создать альянсы с другими оппозиционными партиями, чтобы получить преимущество на политической арене.\n\nВ настоящее время КДП активно сотрудничает с Инновационной партией, которая представляет реформистов и центристов, а также с Демократической партией за народ.\n\nНа пресс-конференции лидер КДП заявил, что сотрудничество с Инновационной партией и ДПП основано на общих политических идеалах и целях. Он подчеркнул, что все три партии привержены продвижению политических реформ в Японии, улучшению благосостояния граждан и поддержанию социальной справедливости и честности. Он также отметил, что это партнерство - не просто политический альянс, а средство лучше ответить на ожидания общественности и создать светлое будущее для Японии.\n\nОднако эта стратегия "с двух сторон" вызвала значительный скептицизм и споры. Некоторые комментаторы утверждают, что между КДП, Инновационной партией и ДПП существуют идеологические разногласия, особенно по таким вопросам, как конституционная реформа и фискальная политика. Сможет ли такое "лоскутное" сотрудничество действительно обеспечить координацию и единство политики, еще предстоит выяснить."
 jap.31.a: "Наконец-то свобода"
 jap.33.t: "Убийство Премьер-Министра Японии"
 jap.33.d: ""
 jap.33.a: "ужас... о ужас!"
 jap.34.t: "Военный Переворот"
 jap.34.d: ""
 jap.34.a: "Навести порядок железной рукой"
 jap.35.t: "Формирование Единого Демократического Фронта"
 jap.35.d: ""
 jap.35.a: "Сборище террористов!"
 jap.36.t: "Саппоро под контролем ЕДФ!"
 jap.36.d: ""
 jap.36.a: "Сделаем всё возможное!"
 jap.36.b: "Мобилизуйте призывников!"
 jap.37.t: "Революция распростроняется!"
 jap.37.d: ""
 jap.37.a: "Ура!"
 jap.38.t: "Революцию не остановить!"
 jap.38.d: ""
 jap.38.a: "Круто!"
 jap.39.t: "Войска мобилизованы!"
 jap.39.d: ""
 jap.39.a: "Готовьтесь двигаться на Север!"
 jap.40.t: "Начало Гражданской Войны"
 jap.40.d: ""
 jap.40.a: "Разгромим Предателей-Коммунистов!"
 jap.41.t: "II Съезд ЕДФ (чрезвычайный)"
 jap.41.d: ""
 jap.41.a: "Круто"
 jap.42.t: "Мы победили!"
 jap.42.d: ""
 jap.42.a: "Круто"
 jap.43.t: "Мы победили!"
 jap.43.d: ""
 jap.43.a: "Круто"
 jap.44.t: "Перестановки в Правительстве"
 jap.44.d: "Чтобы предотвратить стагнацию и образование паутины истории на нашем правительстве, мы взяли на себя инициативу по перестановке позиций в кабинете министров. Сотый кабинет - это кабинет со свежими умами и бодрым духом, готовый сделать все возможное для народа Японии, и общественность восприняла это положительно.\n\nПоменяв колесо нашей политики на что-то более динамичное, мы обречены на великие дела."
 jap.44.a: "Хорошо"
 jap.45.t: "Роспуск Гражданской Коалиции"
 jap.45.d: "После долгих политических разборок гражданская коалиция была распущена: слишком много междоусобиц и слишком мало внимания к их общему сопернику, ЛДП, что дало возможность противостоящей партии использовать их внутренние распри. \n\nВ конце концов, несколько ключевых фигур публично выразили свое презрение к другим членам коалиции, объявив, что они выходят из нее, чтобы проложить свой собственный путь в политическом ландшафте Японии, но с такой громадой, как ЛДП, их карьера кажется бесплодной.\n\nВ любом случае, это гарантирует дальнейшее господство ЛДП над Японией, не из-за тирании, а из-за абсолютной некомпетентности ее соперников."
 jap.45.a: "Никогда не перебивайте того, кто совершает ошибку."
 jap.46.t: "Пакт о ненападении с Японией"
 jap.46.d: "Япония хочет заключить пакт о ненападении, было бы глупо отказываться от такой возможности."
 jap.46.a: "Принимаем"
 jap.47.t: "Наследние протестов Анпо"
 jap.47.d: "Пендосов мы уххх как не уважаем"
 jap.47.a: "Круто"
 jap.48.t: "Разделенная Америка"
 jap.48.d: "Ситуация, в которой сейчас находится наше правительство, напоминает поворотный ход в эндшпиле игры сёги, когда обе стороны собираются сделать решающую партию. Когда король загнан в угол, любой неверный шаг может привести к серии решающих атак со стороны противника.\n\nПоддержка конституционного правительства во главе с Трампом кажется естественным выбором для продолжения существующей политики. Однако, хотя конституционное правительство пользуется поддержкой сельскохозяйственных штатов и большинства консерваторов, оно находится в невыгодном положении в промышленном и технологическом секторах. Этот выбор можно сравнить с кажущейся стабильной, но в конечном итоге слабой оборонительной позицией в сёги.\n\nС другой стороны, поддержка правительства Байдена, базирующегося в Вашингтоне, напоминает блестящий тактический ход в сёги, кажущийся рискованным на первый взгляд, но стратегически ориентированный на общую картину. Правительство Байдена контролирует политический центр Америки, основные технологические отрасли и большинство финансовых институтов, что крайне важно для поддержания глобального влияния Соединенных Штатов. Хотя они могут столкнуться с краткосрочными рисками, в долгосрочной перспективе они помогут нам получить больше дипломатических рычагов.\n\nНесмотря на выбор, преждевременные действия могут привести к ответной реакции, а промедление - к упущенным стратегическим возможностям. Время наших действий в конечном итоге определит успех или неудачу этой стратегии."
 jap.48.a: "Мы поддерживаем Союз Америки"
 jap.48.b: "Мы поддерживаем Конституционное Правительство"
 jap.49.t: "Япония Нас поддерживает"
 jap.49.d: ""
 jap.49.a: "Круто"
 jap.50.t: "Япония прислала оружие"
 jap.50.d: "Министерство обороны сообщает, что правительство Японии начало поставлять нашей стороне оборонительное вооружение, включая системы ПВО и средства радиоэлектронной борьбы. Первая партия материалов прибыла в указанный порт сегодня.\n\nВоенные руководители выразили большое удовлетворение этим оборудованием, заявив, что с ним наши боевые возможности могут быть еще больше усилены."
 jap.50.a: "Хорошо, очень хорошо."
 jap.51.t: "Япония прислала деньги"
 jap.51.d: "Министерство финансов сообщает, что правительство Японии по официальным каналам предоставило нашей стороне несколько фондов помощи. Эти средства будут использованы для восстановления нашей инфраструктуры и обеспечения благосостояния наших граждан.\n\nМинистр финансов выразил большое удовлетворение, заявив, что с помощью этих средств можно придать мощный импульс нашему экономическому развитию."
 jap.51.a: "Хорошо, очень хорошо."
 jap.52.t: "Япония прислала добровольцев"
 jap.52.d: "Министерство обороны сообщает, что в нашу страну прибыла техническая консультативная группа, состоящая из отставных военнослужащих Сил самообороны Японии. Эта добровольная группа, состоящая из нескольких сотен человек, будет помогать нам в военной подготовке и техническом руководстве."
 jap.52.a: "Хорошо, очень хорошо."
 jap.52.b: "Хорошо, очень хорошо."
 jap.53.t: "Япония обещает защитить нас"
 jap.53.d: "Министерство иностранных дел сообщает, что сегодня на совместной пресс-конференции премьер-министр Японии официально объявил об обязательствах по защите безопасности нашей страны.\n\nКроме того, японские местные СМИ подтвердили, что это заявление получило поддержку со стороны кабинета министров и парламента Японии."
 jap.53.a: "Хорошо, очень хорошо."
 jap.54.t: "Раскол в правительстве"
 jap.54.d: "либералы затащили"
 jap.54.a: "Не круто"
 jap.55.t: "Раскол в правительстве"
 jap.55.d: "социалисты затащили"
 jap.55.a: "Не круто"
 jap.56.t: "Япония начинает информационную войну против нас!"
 jap.56.d: "С тех пор как мы начали предпринимать усилия по объединению через Тайваньский пролив, число инцидентов, связанных с безопасностью внутри страны, резко возросло. Отчасти этот рост можно объяснить напряженностью военного времени и реакцией на строгие меры контроля. Однако агенты Министерства государственной безопасности обнаружили удивительное количество случаев, связанных с подозрениями в шпионаже. После тщательного расследования и анализа мы убедились, что эти действия организуются нашими "старыми друзьями" из Разведывательно-исследовательского управления кабинета министров Японии и Штаба оборонной разведки.\n\nЯпонские спецслужбы понимают, что не могут полагаться только на военную мощь, чтобы противостоять нам на поле боя. Вместо этого они прибегают к стратегиям, направленным на дестабилизацию нашего общественного строя, чтобы ослабить общественную поддержку войны. Многочисленные инциденты свидетельствуют о смелости их тайных операций. Например, рабочие завода по производству компонентов для беспилотников в Шэньчжэне недавно устроили массовую забастовку, для урегулирования которой городским властям потребовались месяцы переговоров и кадровых перестановок. Кроме того, в социальных сетях, таких как WeChat, Weibo, QQ и Bilibili, широко распространяются фотографии с передовой и видеоролики "боевых потерь НОАК" - как реальные, так и сфабрикованные. Разобраться с этими людьми не представляет особой сложности. Однако настоящая проблема заключается в огромном объеме враждебной деятельности, быстрых темпах ее распространения и неуловимом характере ее организаторов."
 jap.56.a: "Мы должны были догадаться!"
 jap.57.t: "Япония инициирует большиие военные учения ОДТО"
 jap.57.d: ""
 jap.57.a: "Мы примем в них участие"
 jap.58.t: "Захват Сахалина"
 jap.58.d: ""
 jap.58.a: "Во имя императора!"
 jap.58.b: "И рискнуть войной с Россией?"
 jap.58.c: "Сейчас мы не можем рисковать войной с японцами..."
 jap.58.e: "Мы никогда больше не потеряем ни одной российской территории!"
 jap.60.t: "Гордость флота Затонула"
 jap.60.d: "Это было прекрасное утро, токийское солнце струилось со стороны горы Фудзи на плато Итигая. Флаг Восходящего солнца на здании Министерства обороны мягко трепетал на утреннем ветерке, издавая слабый шелестящий звук. Начальник штаба ВМС только что заварил свой ежедневный зеленый чай у окна кабинета, и от чашки поднимался пар.\n\nОн смотрел на пейзаж, чувствуя себя необычайно расслабленным. Вчерашний отчет об учениях показал, что недавно спущенный на воду военный корабль находится в хорошем состоянии, а сегодняшняя погода идеально подходила для нового раунда тренировок. Аромат чая наполнял утренний свет, и все казалось правильным.\n\nВнезапно по коридору раздались резкие шаги офицера связи, гораздо быстрее, чем обычно. Постучав в дверь, офицер протянул ему только что полученный боевой отчет. Отчет был тонким, содержал всего несколько строк текста. Стоя у окна с достаточным количеством света, почерк был хорошо виден: Военный корабль потоплен, большие потери."
 jap.60.a: "Черный день для нации..."
 jap.61.t: "Императорская Cемья Погибла в Результате Ядерной Атаки"
 jap.61.d: "Высота войн всегда повышается, они знают пределы и знают, по каким тропам идти.\n\nКитай нанес ядерный удар по Токио, уже была проведена эвакуация и открыты убежища, но ущерб, нанесенный городу, был огромен.\n\nПосле того как над городом поднялось грибовидное облако, леса были подожжены, а здания превращены в руины, было сделано шокирующее открытие. Императорская семья, символ, олицетворяющий Японию на пике ее развития, к сожалению, погибла в результате этой атаки.\n\nЭвакуация была слишком хаотичной, чтобы семья смогла вовремя спастись вместе со своим народом.\n\nПосле таких ужасных новостей и разрушений, обрушившихся на Токио, в сердце японцев не осталось сострадания, вместо него появилась ненависть."
 jap.61.a: ""Своей смертью я смиренно прошу прощения у императора за великое преступление.""
 jap.62.t: "Протесты пацифистов"
 jap.62.d: "Когда Кимура Харуки вышел из восточных ворот станции Синдзюку, закат медленно опускался за стеклянные занавески. Его костюм был помят, как обычно, а ремень портфеля оставил глубокий след на плече.\n\nЭто был его 3427-й, а может быть, и 3428-й раз, когда он проходил здесь, столько раз, что даже он не мог уследить. Антивоенная толпа на площади была еще больше, чем вчера, и волны голосов накатывали одна за другой. Кимура Харуки достал телефон и привычно проверил свой банковский счет в Интернете. Ставки по ипотеке снова выросли, и его банковский баланс уменьшался день ото дня под тенью войны.\n\nГлядя на холодные цифры на экране телефона, Кимура вдруг понял, что эта война разрушает будущее каждого. Он вспомнил пожилую даму в поезде, которая утром вздыхала, читая газету о росте цен, и слухи об увольнениях, о которых шептались его коллеги во время обеда.\n\nВ толпе снова раздались голоса, и на этот раз Кимура Харуки не бросился прочь, как он обычно делал. Он стоял на месте, чувствуя, как окружающие звуки постепенно сливаются с биением его сердца. Впервые он серьезно отнесся к листовке в своей руке."
 jap.62.a: "Он стал одним из них."
 jap.63.t: "Антикитайские протесты"
 jap.63.d: "В сумерках Фукуоки Рюитиро Мацуда возглавил шествие группы людей по главной дороге возле подземной торговой улицы Тендзин. Его голос был хриплым, но неутомимым, а мегафон в руке проецировал его слова в каждый переулок.\n\n"Посмотрите на эти китайские магазины!" Мацуда указал на спешно закрывающиеся магазины. "Кто знает, с кем они связываются каждую ночь? Кто знает, не прячут ли в этих магазинах взрывчатку, готовясь помочь врагу в диверсии?" Позади него толпа росла, шаги эхом разносились по улицам.\n\nСтудентка собиралась свернуть в узкий переулок, но ей преградила путь толпа. Не поднимая головы, она ускорила шаг и скрылась за углом магазина "7-Eleven". Мацуда проследил за ней взглядом, его голос стал еще выше: "Они живут среди нас, пользуются нашими удобствами, пользуются нашими ресурсами, но при этом тайно сообщают врагу. Какой позор! Сограждане, мы должны изгнать этих врагов из Японии, не оставив после себя ни одного..."\n\nВоенно-транспортный вертолет Сил самообороны пролетел низко над головой, ненадолго заглушив рев марша. Вдалеке один за другим загорались уличные фонари, их отблески бросали холодный свет на плотно закрытые витрины магазинов."
 jap.63.a: "Китайцы, убирайтесь!"
 jap.64.t: "Две Партии Объявили о Выходе из Гражданской Коалиции"
 jap.64.d: "В конференц-зале в токийском районе Чиёда председатель КПЯ Кадзуо Сии и лидер СДП Мидзухо Фукусима объявили о своем выходе из Гражданской коалиции. Созданный менее года назад альянс ставил своей целью бросить вызов правящей ЛДП.\n\nCии заявил на пресс-конференции: "Мы присоединились к Гражданской коалиции с большими надеждами на достижение подлинной смены режима. Однако некоторые экстремистские элементы подорвали нашу общую основу." Он раскритиковал рост популизма и бесконечные внутренние споры внутри коалиции. Фукусима добавил: "Гражданская коалиция отошла от своей первоначальной миссии - служить обществу. Мы не можем поддерживать фракционную вражду и превращать сотрудничество в компромисс", - намекая на внутренние конфликты по таким вопросам, как отказ от ядерного оружия.\n\n В действительности раскол между КПЯ и коалицией был очевиден уже давно. Например, разногласия по поводу предложений об отмене налога на потребление и пересмотре американо-японского договора о безопасности вызвали серьезные трения. В прошлом месяце члены левой партии выступили за более тесные китайско-японские экономические связи, в то время как ультраправая группа Иссуй-Кай провела митинг с антикитайскими лозунгами. Столкновения переросли в физическое противостояние за пределами места проведения митинга.\n\nГражданская коалиция отреагировала быстро: меньшинство крайне левых членов заявили в социальных сетях, что это "полное очищение", и представили это событие как победу. Однако источники в Конституционно-демократической партии признали: "Потеря поддержки КПЯ и СДП может привести к значительному падению рейтинга одобрения коалиции."\n\nЭтот инцидент обнажил глубокие разногласия внутри Гражданской коалиции, оставив ее электоральное будущее неопределенным. Профессор политологии Токийского университета Юри Ямагути сказал: "Если коалиция не вернется к центристской политике, она неизбежно распадется.""
 jap.64.a: "Предстоящий Путь Остается Неопределенным."
 jap.65.t: "Правые Либералы покидают Коалицию"
 jap.65.d: ""
 jap.65.a: "Это было ожидаемо"
 jap.66.t: "Приглашение в ТЭО"
 jap.66.d: "Решили Горшок с Князем новую песню написать., Горшок говорит:\n\n-Давай выпьем, так получше фантазия разгуляется.\n\nНу нажрались в слюни как обычно. Утром просыпаются, Князь спрашивает Горшка:\n\n-Ну что, написали мы вчера песню?\n\n- Написали.\n\n-А про что песня то?\n\n- Я дословно не помню, но суть в том что чью-то бабу сначала всем селом ебали, а потом всем селом сожрали."
 jap.66.a: "ДА"
 jap.67.t: "Возобновление воинской повинности - Но Как?"
 jap.67.d: "Пламя гражданской войны бушует так яростно, что, кажется, способно раскалить гору Фудзи и поглотить всю Японию в адском пламени. По мере того как линии сражений усложняются, ситуация становится все более непредсказуемой. Наши регулярные войска истощены, и нам срочно нужны свежие силы для пополнения резервов и укрепления линии фронта. Самый быстрый способ добиться этого - снова ввести воинскую повинность.\n\nС одной стороны, преимущества воинской повинности для укрепления армии очевидны. С другой стороны, существуют серьезные возражения. Критики утверждают, что годы мира оставили большинство граждан - в основном рабочих и студентов - неподготовленными к боевым действиям. Даже при наличии базовой подготовки отправка их на передовую, скорее всего, приведет к большим потерям. Более того, включение большого количества призывников в состав действующих частей снизит общую боевую эффективность, усложнит структуру командования и увеличит трудности с материально-техническим обеспечением, что в итоге принесет больше вреда, чем пользы.\n\nВ кабинете министров существуют серьезные разногласия по поводу правил и постановлений, касающихся призыва. Однако в военное время время имеет решающее значение. Если мы не сможем быстро прийти к консенсусу, наши враги могут воспользоваться нашей нерешительностью и одержать решающую победу..."
 jap.67.a: "Давай сейчас не будем заходить слишком далеко..."
 jap.67.b: "Здесь на кону наша демократия!"

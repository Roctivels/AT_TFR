 #Libsoc Subideologies Chungus
 
 left_anarchist: "Анархо-Коммунизм"
 left_anarchist_desc: "\n\n\n\n£GFX_Ideology_Ancom\n\n\n\n\n\n§YАнархо-коммунизм§! - это левая анархистская идеология, которая выступает за отмену государства, капитализма, наемного труда, социальной иерархии и частной собственности, поддерживая прямую демократию и горизонтально-плановую экономику. Исторически такие движения, как CNT-FAI в Испании времен гражданской войны, Черная армия на Украине во время Гражданской войны в России и Корейская федерация анархистов в Маньчжурии во время Второй мировой войны, так или иначе использовали анархо-коммунизм."
 post_leftism: "Нео-Марксизм"
 post_leftism_desc: "\n\n\n\n£GFX_ideology_neomarxist_banner\n\n\n\n\n\n§YНео-Марксизм§! - идеологическое течение, возникшее в XX веке как ревизионистская интерпретация традиционной марксистской теории. Оно стремится устранить ограничения и недостатки классического марксизма, выступая при этом за радикальное преобразование общества на основе социалистических принципов.\nВ своей основе неомарксизм подчеркивает важность социального класса и экономических факторов в формировании общественной динамики. Однако он расширяет рамки классического марксизма, включая в анализ другие формы угнетения, такие как раса, пол и сексуальность. Неомарксисты утверждают, что эти пересекающиеся системы угнетения способствуют сохранению неравенства и эксплуатации в капиталистических обществах."
 eurocommunism: "Еврокоммунизм"
 eurocommunism_desc: "\n\n\n\n£GFX_ideology_eurocommunism_banner\n\n\n\n\n\n§YЕврокоммунизм§!, также известный как §YДемократический коммунизм§! или §YНеокоммунизм§! - это политико-идеологический проект марксизма, промежуточный между ленинизмом и демократическим социализмом, т.е. коммунизм, разработанный в реформистском и демократическом смысле некоторыми коммунистическими организациями в Западной Европе. Он характеризуется большей близостью к социальному среднему классу, вышедшему из капитализма, и принятием многопартийной парламентской модели. Еврокоммунисты хотят воплотить так называемый "третий путь" между марксизмом-ленинизмом и социал-демократической традицией. Несмотря на свою историю, эта идеология все еще считается развивающейся."
 communist_populism: "Коммунистический Популизм"
 communist_populism_desc: "\n\n\n\n£GFX_ideology_communist_populism_banner\n\n\n\n\n\n§YКоммунистический Популизм§! представляет из себя идеологический синтез марксистско-ленинской традиции и популистского нарратива, сделав её политически доступной и риторически привлекательной для широких масс. По содержанию он остаётся в поле радикально-социалистической критики капитализма и классовой экспроприации средств производства, но по форме и по тактике это упрощённая, прагматичная и народно-ориентированная версия ленинизма: меньшая дискредитация процедурной демократии, более широкая мобилизация "народа" как политического субъекта, временное допущение рыночных инструментов ради быстрой социализации успеха и приоритеты на оперативные, материально-адресные меры, дающие быстрый социальный эффект."
 reformist_socialism: "Демократический Cоциализм"
 reformist_socialism_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism\n\n\n\n\n\n§YДемократический Cоциализм§!, или Реформистский Социализм, - это идеология, которая выступает за создание социализма в рамках либеральной парламентской системы. Участвуя в избирательной политике, рабочих кооперативах и самоуправлении рабочих, демократические социалисты стремятся преобразовать капиталистическую экономику в децентрализованную, управляемую рабочими рыночную экономику. Имея социализм в качестве долгосрочной цели, социалисты-реформисты больше озабочены обузданием эксцессов капитализма и поддерживают прогрессивные реформы, направленные на его гуманизацию в наши дни. Социалисты-реформисты утверждают, что капитализм по своей сути несовместим с ценностями свободы, равенства и солидарности, и что эти идеалы могут быть достигнуты только через реализацию социалистического общества. "
 eco_socialism: "Экосоциализм"
 eco_socialism_desc: "\n\n\n\n£GFX_Ideology_eco_socialism\n\n\n\n\n\n§YЭкосоциализм§!, также известный как зеленый социализм, представляет собой синкретическую идеологию социализма и энвайронментализма, утверждающую, что постоянно расширяющийся характер капитализма является причиной деградации окружающей среды, такой как изменение климата, глобальное потепление, истощение ресурсов и утрата глобального биоразнообразия. Она также выступает против глобализации и империализма, заявляя, что они несовместимы с экологическими требованиями человеческой цивилизации к самоокупаемости. Экосоциалисты выступают за отмену капитализма и глобализации, предлагая общество, основанное на эгалитаризме, социальном прогрессизме и общей собственности на средства производства. Экосоциалисты также настроены антибюрократически, особенно против тех форм социализма, которые они считают бюрократическим коллективизмом, и обычно причисляют себя к ортодоксальным марксистам."
 popular_front_socialism: "Социализм Народного Фронта"
 popular_front_socialism_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism\n\n\n\n\n\nСоциалистический народный фронт - это широкое коалиционное движение, которое охватывает и отстаивает как можно больше социалистических идей, чтобы способствовать единству левых сил и их сторонников. Хотя многие из этих систем и партий по своей сути нестабильны, если движение сможет воплотить идеалы социалистической демократии или, по крайней мере, принять социалистический платформизм, у него есть шанс выжить и достичь важных целей в стране, которой оно управляет."
 labour_syndicalism: "Трудовой Cиндикализм"
 labour_syndicalism_desc: "\n\n\n\n£GFX_Ideology_Ancom\n\n\n\n\n\nТрудовой синдикализм - это идеология, сочетающая традиционные социалистические принципы с более уникальными формами управления через профсоюзы и другие организации трудящихся. Эти системы часто сильно децентрализованы, и государство играет определенную роль в поддержке организаций трудящихся. Хотя эти системы и не обязательно являются немарксистскими, они опираются на ревизионистские идеи немарксистских мыслителей, таких как анархисты и синдикалистские экономисты и философы."
 left_accelerationist: "Левый Акселерационизм"
 left_accelerationist_desc: "\n\n\n\n£GFX_Ideology_left_accelerationist\n\n\n\n\n\n§YЛевый Акселерационизм§! - это идеология, рожденная из противоречий капитализма поздней стадии.\n\nВ то время как другие стремятся уничтожить капитализм полностью или вернуться в воображаемое прошлое, левые акселерационисты считают, что единственный путь вперед лежит через ускорение технологического развития, автоматизации и экономического прогресса, чтобы выйти за пределы самого капитализма.\n\nПропагандируя постоянные изменения и отвергая стагнацию, они рассматривают капитализм как силу энтропии, а среди более радикальных последователей - потенциально даже как вредоносную сущность, которая держит органическую жизнь в смертельной хватке.\n\nВ этой школе мысли критика капиталистического реализма Марка Фишера используется для отказа от идеи, что капитализм не может быть изменен. Он рассматривает систему как разлагающуюся структуру, которую можно вывести за ее пределы, чтобы открыть новые формы расширения социальных возможностей, политической власти и технологического развития. Вырваться из тисков капитализма можно с помощью экономики постпрофицита, автоматизации и искусственного интеллекта."
 sovereign_democracy_left: "Суверенная Демократия"
 sovereign_democracy_left_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YСуверенная Демократия§! это нишевая политическая идеология, целью которой является создание "идеальной" демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают и работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя свое влияние, например, для смещения коррумпированных и непатриотичных чиновников.\nЛевая партия выступает за более закрытый рынок, сродни советской эпохе. Он рассчитан на левую аудиторию, которая желает возвращения "коммунизма", но без каких-либо недостатков."
 sovereign_democracy_lukashenko: "Народный Коммунизм"
 sovereign_democracy_lukashenko_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YСуверенная Демократия§! это нишевая политическая идеология, целью которой является создание "идеальной" демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают и работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя свое влияние, например, для смещения коррумпированных и непатриотичных чиновников.\nЛевая партия выступает за более закрытый рынок, сродни советской эпохе. Он рассчитан на левую аудиторию, которая желает возвращения "коммунизма", но без каких-либо недостатков\n\n§Y"Народный коммунизм"§! Лукашенко основан на возрождении старой советской системы в новом свете, сохраняя при этом основы уникальной демократии и применяя более современные примеры социалистической практики. Однако для поддержания стабильности системы он опирается на внутреннюю систему партии."
 sovereign_democracy_prilepin: "Социальный Национализм"
 sovereign_democracy_prilepin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YСуверенная Демократия§! это нишевая политическая идеология, целью которой является создание "идеальной" демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают и работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя свое влияние, например, для смещения коррумпированных и непатриотичных чиновников.\nЛевая партия выступает за более закрытый рынок, сродни советской эпохе. Он рассчитан на левую аудиторию, которая желает возвращения "коммунизма", но без каких-либо недостатков\n\nПлатформа §YСоциального Национализма§! Прилепина, в значительной степени опирается на патриотизм и военные качества российского населения, а также на поиск синкретической политики, схожей с российской историей и политиками других стран."
 sovereign_democracy_platoshkin: "Новый Социализм"
 sovereign_democracy_platoshkin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YСуверенная Демократия§! это нишевая политическая идеология, целью которой является создание "идеальной" демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают и работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя свое влияние, например, для смещения коррумпированных и непатриотичных чиновников.\nЛевая партия выступает за более закрытый рынок, сродни советской эпохе. Он рассчитан на левую аудиторию, которая желает возвращения "коммунизма", но без каких-либо недостатков\n\nПлатошкин основывает свое правление на собственной теории §Y"Нового социализма"§! - более модернизированной версии социализма, встречающейся в 21 веке, - и в то же время придерживается ориентированной на Россию политики в рамках своей системы и партии."
 confucian_socialism: "Конфуцианский Социализм"
 confucian_socialism_desc: "\n\n\n\n£GFX_Ideology_confucian_socialism\n\n\n\n\n\n§YВо времена хаоса периода Весны и Осени§!  династия Чжоу переживала упадок, а ритуалы, которые когда-то скрепляли общество, были в беспорядке. На фоне этого национального кризиса Конфуций из Лу возвысил свой голос и призвал к действию. В течение четырнадцати лет он путешествовал по разным государствам, поклявшись восстановить чжоуские обряды, пропагандировать доброжелательность и проповедовать праведность. Вскоре имя Конфуция распространилось по всей стране. Принципы конфуцианства, направленные на облегчение страданий и спасение, стали процветать и в конце концов превратились в доминирующую школу мысли.\n\nПо мере того как шло время и многие герои и выдающиеся личности исчезали из истории, Китай переживал смуту, и республика погрузилась в тяжелые испытания. Однако все еще оставались праведники, которые поддерживали пятизвездочный красный флаг как символ законности, посвящая свою жизнь борьбе за справедливость, моральные принципы и возрождение социализма на китайской земле. Их слова, поступки и стремления отражали слова древнего мудреца Конфуция, вызывая в памяти непреходящую силу высоких гор и текущих рек.\n\nБудь то конфуцианская этика или коммунистическая идеология, обе они глубоко укоренились в сердцах и умах китайского народа. Сейчас действительно подходящий момент для того, чтобы продолжить великую традицию китайской ортодоксии в эти хаотичные времена. Народный фронт и классовая борьба, за которую выступали Мао и Дэн, в сочетании с благожелательным управлением и моральными учениями Конфуция и Мэн-цзы - самосовершенствование, регулирование семьи, управление государством и мир во всем мире - несомненно, объединят китайский народ общей волей, вновь сформируют сплоченную структуру и сметут все препятствия."

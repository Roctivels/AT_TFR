 pax_americana_ultraglobalism: "Pax Americana"
 pax_americana_ultraglobalism_desc: "\n\n\n\n£GFX_USB_ultraglobalism_banner\n\n\n\n\n\nЧеловек доказал, что он — неуравновешенное существо, разрушающее тщательно созданные институты и опоры, призванные держать его под контролем.\n\nС началом Второй американской гражданской войны человечество зажгло некую искру: пламя перемен, которое будет гореть всегда, обеспечивая радикальные преобразования в мире, совершаемые многими, сжигая структуры, которые утратили свое предназначение и пришли в упадок.\n\n§YPax Americana§! утверждает, что недостаток кроется в самом человеке, а не в системах, созданных для его сдерживания. Возникнув в результате кооперативного слияния неолиберального и неоконсервативного миропорядка, основанного на правилах, он стремится навсегда вернуться в сознание общества.\n\nДля внешнего мира это выглядит как страна, возвращающаяся к здравому смыслу под знаменем демократии. Но за этой завесой люди в костюмах пожимают руки и предопределяют судьбу миллионов, гарантируя, что человечество не погрузится в пучину хаоса. Они манипулируют человеческим духом, работая в тесном сотрудничестве с корпорациями, федеральными агентствами и давно забытыми семьями, чтобы сохранить тот же Порядок, который когда-то победил не одного, а трёх гигантов истории.\n\nРациональность для искоренения антисоциальных мыслей, жертвенность для того, чтобы население помнило, кто обеспечивает им безопасность, и структура для того, чтобы у каждой пешки было место на доске.\n\nХаос современного мира — это еще один гигант, внутреннее пламя, стремящееся сжечь все, что было сделано для поддержания мира.\n\nПорядок вернулся, и он погасит пламя человечности."

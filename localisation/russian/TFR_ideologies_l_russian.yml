 #Social Democratic Sub Ideologies
 left_centrist: "Левоцентризм"
 left_centrist_desc: "\n\n\n\n£GFX_Ideology_left_centrism\n\n\n\n\n\n\n§YЛевый Центризм§!, также известная как левоцентристская политика, представляет собой широкий спектр идеологий, охватывающих социал-демократию, прогрессизм, социальный либерализм и защиту окружающей среды, направленных на объединение этих идеалов посредством синкретизма. В широком смысле левоцентризм тяготеет ближе к политическому центру в отличие от крайне левых убеждений, таких как коммунизм и революционный социализм. Левоцентризм соответствует прогрессивным социальным убеждениям, поддерживая смешанную экономику с помощью такой политики, как сильное экономическое вмешательство, социальный капитализм и проюнионизм. Они поддерживают иммиграционную политику с открытыми границами и мультикультурализм, примером чего может служить Германия. Левоцентристы также верят в необходимость работать в рамках существующих систем для улучшения социальной справедливости, а левоцентристские партии поддерживают смешанную социальную политику, хотя большинство из них придерживаются неолиберализма."
 left_populism: "Левый Популизм"
 left_populism_desc: "\n\n\n\n£GFX_Ideology_left_populism\n\n\n\n\n\n§YЛевый популизм§! сочетает в себе элементы популистской риторики и темы с левой идеологией. Как правило, левый популизм антиэлитарен, скептически относится к глобализму и выступает против истеблишмента. Левый популизм крайне антимилитаристичен и сформировался в основном из оппозиции американскому военному вмешательству в конце 90-х и начале 2000-х годов. Левые популисты стремятся устранить разрыв в благосостоянии с помощью перераспределения богатства, социальных программ и большого правительства."
 progressivism: "Прогрессивизм"
 progressivism_desc: "\n\n\n\n£GFX_Ideology_progressivism\n\n\n\n\n\n§YПрогрессивизм§! - это социально либеральная идеология, основанная на политике идентичности, которая стремится установить социальную справедливость посредством государственного вмешательства и государственных программ. В значительной степени связанные с социальной справедливостью и феминистскими движениями, они, как правило, выступают за аборты и считают достижения в области науки, техники и экономики полезными для человеческого общества. Прогрессисты обычно склонны поддерживать дальнейшее финансирование образования, искусства и общественного здравоохранения." 
 green_politics: "Зелёная Политика"
 green_politics_desc: "\n\n\n\n£GFX_Ideology_green_politics\n\n\n\n\n\n§YЗелёная Политика§!, или Энвайронментализм, - это идеология, которая направлена на борьбу с антропогенным изменением климата в 21 веке и за сохранение природы. Они стремятся создать самодостаточное общество, основанное на идеалах охраны природы, ненасилия, демократии на низовом уровне и социальной справедливости."
 social_democracy: "Социал-Демократия"
 social_democracy_desc: "\n\n\n\n£GFX_Ideology_social_democracy\n\n\n\n\n\n§YСоциал-Демократия§! была описана как левая политическая, социальная и экономическая философия в рамках социализма, которая выступает за экономические и социальные вмешательства для содействия социальной справедливости в рамках капиталистически ориентированной смешанной экономики. Это может быть обобщающий термин для демократий, которые приняли как социалистическую, так и капиталистическую политику, иногда пересекающуюся с социально-прогрессивным мировоззрением."
 technocracy: "Технократия"
 technocracy_desc: "\n\n\n\n£GFX_Ideology_technocracy\n\n\n\n\n\n§YТехнократия§! это политическая и экономическая система, характеризующаяся лидерством в обществе экспертов, ученых, инженеров и других технических специалистов. В технократической системе полномочия по принятию решений предоставляются отдельным лицам на основе их технических знаний и меритократической деятельности, а не представителям, при этом технократические формы правления обычно описываются как олигархические. Экономическое планирование, распределение ресурсов и оптимизация производственных процессов являются неотъемлемой частью технократической экономики, а сильная централизованная бюрократия также присуща технократическим государствам. Большинство технократических групп прагматичны, хотя большое количество организаций, придерживающихся технократии, придерживаются левых или прогрессивных взглядов."
 sovereign_democracy_left_socdem: "Суверенная Демократия"
 sovereign_democracy_left_socdem_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YСуверенная Демократия§! это нишевая политическая идеология, целью которой является создание "идеальной" демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают и работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя свое влияние, например, для смещения коррумпированных и непатриотичных чиновников.\nЛевая партия выступает за более закрытый рынок, сродни советской эпохе. Он рассчитан на левую аудиторию, которая желает возвращения "коммунизма", но без каких-либо недостатков."
 sovereign_democracy_delyagin: "Умеренный Социализм"
 sovereign_democracy_delyagin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YСуверенная Демократия§! это нишевая политическая идеология, целью которой является создание "идеальной" демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают и работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя свое влияние, например, для смещения коррумпированных и непатриотичных чиновников.\nЛевая партия выступает за более закрытый рынок, сродни советской эпохе. Он рассчитан на левую аудиторию, которая желает возвращения "коммунизма", но без каких-либо недостатков.\n\nАдминистрация Делягина сосредоточена на умеренном улучшении жизни среднестатистических россиян и проведении демократических реформ, а также на поддержании присутствия различных мнений в правительстве."
 sovereign_democracy_konovalov: "Социалистический Реформизм"
 sovereign_democracy_konovalov_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YСуверенная Демократия§! это нишевая политическая идеология, целью которой является создание "идеальной" демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают и работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя свое влияние, например, для смещения коррумпированных и непатриотичных чиновников.\nЛевая партия выступает за более закрытый рынок, сродни советской эпохе. Он рассчитан на левую аудиторию, которая желает возвращения "коммунизма", но без каких-либо недостатков\n\nРеформизм Коновалова направлен на создание новой социалистической системы путем реформирования существующих структур, а также на сохранение демократической системы и участие в здоровых дебатах с оппозицией."
 sovereign_democracy_grudinin: "Левый Аграризм"
 sovereign_democracy_grudinin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\n§YСуверенная Демократия§! это нишевая политическая идеология, целью которой является создание "идеальной" демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают и работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя свое влияние, например, для смещения коррумпированных и непатриотичных чиновников.\nЛевая партия выступает за более закрытый рынок, сродни советской эпохе. Он рассчитан на левую аудиторию, которая желает возвращения "коммунизма", но без каких-либо недостатков\n\nГрудинин уделяет большое внимание улучшению ситуации в сельском хозяйстве и возрождению фермерского сообщества, а также обеспечению демократического участия населения в сельских районах."
 neo_socialism_socdem: "Неосоциализм"
 neo_socialism_socdem_desc: "\n\n\n\n£GFX_ideology_neo_socialismsub\n\n\n\n\n\n§YНеосоциализм§! это современная форма социализма, которая отклоняется от классического марксизма, утверждая, что класс не является первичным или единственным главным противоречием внутри общества. Неосоциалисты считают, что раса, сексуальность или гендер также являются первичными противоречиями и также должны быть разрешены, прежде чем коммунизм сможет быть успешно реализован."
 putinism_social_democrat: "Левый Путинизм"
 putinism_social_democrat_desc: "\n\n\n\n£GFX_Ideology_putinism_social_democrat_banner\n\n\n\n\n\n§YЛевый Путинизм§! - это более социальная трактовка доктрины Путина. Его цель - усилить социальное государство, которое заботится о своих гражданах. В основе лежат идеи социализма XXI века и элементы советского опыта, адаптированные к российским реалиям. Политическая программа левого путинизма сосредоточена на экономике, но также акцентирует внимание на необходимости реформ для расширения участия общества. Они стремятся превратить ОНФ в инструмент выражения воли граждан и продвигать принципы меритократии.\nОднако они могут выбрать и более централизованную модель с сильным президентством и жестким контролем над бюрократией. Их видение будущего связано с глубокой евразийской интеграцией - как экономической, так и политической. Многие из них испытывают ностальгию по советскому прошлому и стремятся к его осмыслению. Но есть и те, кто опирается на противоречивую теорию Новой хронологии Фоменко, переосмысливая историческое наследие России."
 social_patriotism: "Социал-Патриотизм"
 social_patriotism_desc: "\n\n\n\n£GFX_Ideology_social_patriotism_banner\n\n\n\n\n\n§YСоциал-Патриотизм§! - это идеология, сочетающая в себе глубокое чувство патриотизма с приверженностью к социальной сплоченности и национальному единству. Она подчеркивает важность сильного и сплоченного общества, в котором люди гордятся своей страной и вместе работают на ее благо. Социал-патриоты верят в сохранение культурного наследия, традиций и ценностей своей страны, в защиту ее территориальной целостности и национальных интересов.\nВ основе социал-патриотизма лежит вера в преобладание коллективных интересов над индивидуальными. Он способствует развитию чувства солидарности между гражданами, побуждая их ставить во главу угла не личную выгоду, а благо нации. Социал-патриоты воспринимают своих соотечественников как часть большой семьи, связанной общей историей, языком и культурой."
 reformist_socialism_socdem: "Реформистский Социализм"
 reformist_socialism_socdem_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism_socdem\n\n\n\n\n\n§YРеформистский социализм§! - это политическая идеология, которая действует в рамках фундаментального капитализма. Ее сторонники не стремятся к немедленному упразднению рынка как определяющего фактора в управлении производством.\n\nСоциалисты-реформисты ставят демократию во главу угла, подчеркивая необходимость того, чтобы трудящиеся имели право голоса при принятии решений, которые влияют на их жизнь. Они считают, что трудящиеся должны иметь хотя бы некоторое влияние на производство товаров и услуг, которые они создают. Как правило, социалисты-реформисты рассматривают партнерство между политическими партиями и профсоюзами как ключ к достижению социального и экономического прогресса."
 scottish_nationalism: "Шотландский Национализм"
 lukashenkoism_socdem: "Мысль Александра Лукашенко"
 lukashenkoism_socdem_desc: "\n\n\n\n£GFX_ideology_lukashenkism_banner\n\n\n\n\n\n§YМысль Александра Лукашенко§! или §YЛукашенкизм§!, это не строгая идеологическая структура, а больше гибкая политика основана и созданная Александром Лукашенко и его сторонниками. В этой парадигме, сильный автократ или президент решает проблемы общества и старается создать социально справедливую экономику, ориентируюсь на поддержку народа.\nВ этой системе каждый бюрократ оценивается не только по степени лояльности, но и по эффективности своей работы. Любой может попасть под подозрение и быть заменён. Единственный человек в государстве, чья позиция неизменна, - это лидер."
 #Social Liberalism
 social_liberal: "Социальный Либерализм"
 social_liberal_noun: "Социальный Либерализм"
 social_liberal_desc: "Либеральная Демократия"
 social_liberal_drift: "Прирост Популярности Социального Либерализма"
 social_liberal_color: "§0"
 social_liberal_color_name: "§0$social_liberal$§!"
 
 #Social Liberal Subideologies old man biden time
 neoliberalism: "Неолиберализм"
 neoliberalism_desc: "\n\n\n\n£GFX_Ideology_neo_liberalism\n\n\n\n\n\n§YНеолиберализм§!, также известный как "Вашингтонский консенсус", является доминирующей идеологией после падения коммунизма. Диаметрально противоположное левым, неолиберализм стремится провести рыночные реформы, такие как отмена контроля над ценами, приватизация отраслей, контролируемых правительством, дерегулирование рынков капитала и снижение торговых барьеров, открывая страну для глобализации. Современный неолиберализм использует прогрессивные идеи для распространения своих рынков и громко поддерживает права ЛГБТ, феминизм и права меньшинств, используя государство для поддержания такой социальной политики. К наиболее известным неолиберальным институтам относятся МВФ и Всемирный банк, которые проводят реформы по всему миру."
 christian_democracy: "Христианская Демократия"
 christian_democracy_desc: "\n\n\n\n£GFX_Ideology_chirstian_democracy\n\n\n\n\n\n§YХристианская демократия§!- это политическая идеология, основанная на современных демократических идеях, традиционных христианских ценностях и христианской этике. Она возникла под влиянием католического социального учения, а также нео-кальвинизма. На практике христианскую демократию часто считают правоцентристской по культурным, социальным и моральным вопросам, но левоцентристской "в отношении экономических и трудовых вопросов, гражданских прав и внешней политики", а также окружающей среды."
 supervised_democracy_liberal: "Насильственная Демократия"
 supervised_democracy_liberal_desc: "\n\n\n\n£GFX_Ideology_enforced_democracy\n\n\n\n\n\n§YНасильственная Демократия§!хотя демократия переходного периода и похожа на авторитарную, она сильно отличается от нее. Она предполагает навязывание "демократических" принципов посредством иностранного вмешательства, как правило, со стороны иностранных держав или международных организаций. Эта форма правления направлена на установление демократических основ, часто сопровождаемых военным вмешательством или дипломатическим давлением, для замены автократического режима. Исторические примеры насильственной демократии включают постконфликтные интервенции в Ираке и Афганистане, а также в Южном Вьетнаме. Однако этот процесс не лишен недостатков, поскольку он может спровоцировать местное сопротивление, вакуум власти и, в худшем случае, жестокие мятежи, которые можно увидеть в вышеупомянутых примерах. Это спорный подход, поднимающий вопросы о легитимности навязанного "демократического" порядка, а также о том, насколько он эффективен в достижении своих целей."
 liberal_socialism: "Либеральный Социализм"
 liberal_socialism_desc: "\n\n\n\n£GFX_Ideology_liberal_socialism\n\n\n\n\n\n§YЛиберальный социализм§! - это политическая философия, которая включает либеральные принципы в социализм. Этот синтез рассматривает либерализм как политическую теорию, которая принимает внутреннюю свободу человеческого духа как данность и утверждает свободу как цель, средство и правило совместной человеческой жизни. Социализм рассматривается как метод реализации этого признания свободы через политическую и экономическую автономию и освобождение от тисков насущной материальной необходимости."
 centrist: "Центризм"
 centrist_desc: "\n\n\n\n£GFX_Ideology_centrism\n\n\n\n\n\n§YЦентризм§! это политическая идеология, которая служит промежуточным звеном между традиционными левыми и правыми, а ее идеалы основаны на компромиссе. Отвергая политический экстремизм со всех сторон, центризм пытается придерживаться сбалансированного подхода к политике, как правило, в странах, раздираемых партийной политикой, таких как Франция при Эммануэле Макроне, который называет себя и свою партию центристскими. Центристские правительства обычно пропагандируют двухпартийность и умеренные социально-экономические позиции, а также философию принципиального компромисса. Центристы обычно превыше всего ценят политическую стабильность, хотя, если центристское правительство не сможет объединить левых и правых, оно почти наверняка рухнет, в переносном или буквальном смысле."
 sovereign_democracy_liberal: "Суверенная Демократия"
 sovereign_democracy_liberal_desc: "\n\n\n\n£GFX_Ideology_left_sovdem_liberal\n\n\n\n\n\n§YСуверенная Демократия§! это нишевая политическая идеология, целью которой является создание "идеальной" демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают и работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя свое влияние, например, для смещения коррумпированных и непатриотичных чиновников.\nЦентристкая Партия выступает за комьюнитаризм, свободу слова и оптимизации власти. Она нацелена на более либеральную платформу, но без спонсирования западом и со "здоровым" либерализмом."
 russian_patriotic_liberalism: "Либеральный Популизм"
 russian_patriotic_liberalism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner\n\n\n\n\n\n§YЛиберальный Популизм§! одна из новейших идеологических терминов, культивируемых в рамках "патриотической демократии" Навального. "Патриотический" в его названии означает позицию правительства по защите российской государственности и уникальной самобытности, а также по обеспечению сочетания патриотизма с демократическими институтами.\n\nЛиберальная разновидность является наиболее центристской и разнообразной среди всех них, проводя наиболее либеральную государственную политику и используя равную и разностороннюю парламентскую коалицию для достижения целей государства путем проведения совместных реформ и политики. Либеральную экономическую политику можно охарактеризовать как попытки построить капитализм свободного рынка, при этом все еще принимая во внимание благосостояние людей, и сделки с левыми членами коалиции, которые могут привести к сворачиванию механизмов свободного рынка ради социальной стабильности и процветания.\n\nКак и в других возможных вариантах, в нем часто русская национальность рассматривается как государствообразующая и делается попытка уменьшить участие меньшинств в государственных делах, утверждая, что "отсталые люди, не являющиеся основными, могут попытаться подчинить себе демократические процессы в стране и разрушить нашу демократию"."
 green_liberalism: "Зеленый Либерализм"
 green_liberalism_desc: "\n\n\n\n£GFX_ideology_green_liberalism_banner\n\n\n\n\n\n§YЗеленый Либерализм§! это идеология, сочетающая принципы либерализма с сильным акцентом на экологическую устойчивость и экологическую ответственность. Она направлена на содействие индивидуальной свободе и экономическому процветанию, одновременно обеспечивая защиту и сохранение природного мира."
 ultra_liberalism: "Ультралиберализм"
 ultra_liberalism_desc: "\n\n\n\n£GFX_ideology_ultra_liberalism_banner\n\n\n\n\n\n§YУльтралиберализм§!, или радикальный либерализм - это термин, обозначающий разновидность социального либерализма, который развивается в стране в результате угрозы демократии или усиления автократизации, при этом сторонники идеологии утверждают, что либеральные ценности должны быть закреплены и защищены любыми необходимыми средствами, даже если это подразумевает подавление инакомыслия и одностороннюю дискриминацию.- партийное государство с применением военной силы. Ультралиберализм также поддерживает глобализм, выступая за свободное перемещение товаров и людей и содействие международной торговле; примером этого может служить Шенгенская зона. Несмотря на эти различия, ультралиберализм имеет много общего с национал-либерализмом и поддерживает корпоративную смешанную экономику, а также социальный прогрессизм. Хотя этот вариант либерализма невероятно редок, у него, тем не менее, есть свои сторонники, особенно в раздираемой войной Европе..."
 ITA_civic_populism: "Гражданский Популизм"
 centrist_pluralism: "Центристский Плюрализм"
 centrist_pluralism_desc: "\n\n\n\n£GFX_Ideology_boris_nadezhdin_thought_banner\n\n\n\n\n\n§YЦентристский Плюрализм§! или §YВидение Бориса Надеждина§! - это концепция политической организации общества, основанная на признании многообразия идеологических позиций в рамках единой институциональной и культурной конструкции.\n\nВ отличие от традиционного центристского подхода, предполагающего поиск компромиссов между левыми и правыми взглядами, центристский плюрализм исходит из более радикального постулата: не компромисс, а сосуществование. В рамках этой парадигмы допустимы идеологические позиции от социал-демократии и умеренного консерватизма до радикального национализма и большевизма - при условии взаимного уважения, отказа от политического насилия и признания единого демократического пространства как основы легитимности.\n\nНа практике эта идеология стала теоретическим и практическим фундаментом для горизонтальной, многослойной коалиции сил, собравшихся вокруг фигуры Бориса Надеждина, где каждая фракция, независимо от своих взглядов, имеет право голоса и представительства."

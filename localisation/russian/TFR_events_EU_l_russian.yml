 european_union.12.t: "Греческий Переворот"
 european_union.12.d: "Вновь заняв место среди великих держав Европы, мы одержали грандиозную победу в своем стремлении к распространению европейских идеалов. Ослабленная годами экономической бесхозяйственности, Греция практически стояла на грани полного краха. Искра была окончательно зажжена после того, как крайне правое правительство не смогло закрепить контроль над страной, что привело к массовым восстаниям по всей стране. Укрепив свои позиции, мы теперь можем закрепиться на Балканах. Переворот был совершен быстро, с минимальным кровопролитием со стороны радикальных элементов в сельской местности.\n\nСейчас, под нашей защитой, Греция будет переделана в нечто лучшее. Они станут испытательным полигоном. Где мы сможем реализовать идеи, запланированные для остальных Балкан. Кроме того, это послужит нам трамплином для охвата бывших югославских стран. Многие лидеры "ястребов" были очень довольны нашими успехами в Греции. Особенно Гюнтер Фелингер, который сказал: "Сербы сдадутся. Или они снова будут бояться бомбардировщиков в небе." Нам еще многое предстоит сделать для распространения панъевропейской идеи. Но мы можем быть спокойны, зная, что мы на шаг ближе к тому, чтобы наконец воплотить наши мечты в реальность."
 european_union.12.a: "#EndBalkanNeutrality NOW"
 european_union.13.t: "Военно-морские командования реинтегрированы"
 european_union.13.d: "Теперь, когда ситуация стабилизировалась, наши военно-морские командования в Атлантическом, Тихоокеанском и Европейском морях вернулись и готовы к несению службы."
 european_union.13.a: "Мы снова контролируем ситуацию"
 european_union.14.t: "Переосмысление Значения Европейца"
 european_union.14.d: "Теперь я ЗНАЮ, что славяне на самом деле не люди и уж точно не европейцы, но их крупнейшие города определенно намного либеральнее остальных, и некоторые из них готовы служить европейской расе, так что, может быть, нам стоит подумать о них??? С остальным мы разберемся позже."
 european_union.14.a: "Пришло время сказать, что все по справедливости..."

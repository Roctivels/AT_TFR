 GER_mercosur_eu_deal_idea: "Соглашение о Партнерстве ЕС-МЕРКОСУР"
 GER_mercosur_eu_deal_idea_desc: "МЕРКОСУР и Европейский союз подписали историческое торговое соглашение, открывшее новые рынки для южноамериканских сельскохозяйственных продуктов и европейских промышленных товаров. Несмотря на решительное противодействие со стороны европейских экологов и фермеров, соглашение оказалось взаимовыгодным и было поддержано как европейским, так и южноамериканским политическим истеблишментом как краеугольный камень новой эры многополярного консенсуса и трансатлантического сотрудничества. Ожидания высоки, но только время покажет, оправдает ли соглашение возложенные на него надежды."

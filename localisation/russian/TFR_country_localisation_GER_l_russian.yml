 GER_rearm_europe_divider: ""
 GER_rearm_europe_divider_desc: "\n\n\n£GFX_GER_rearm_europe_pr\n\n\n\n\n\n\nПлан перевооружения будет совсем не простым. После завершения проекта мы сможем отслеживать его успешность, поскольку каждый уровень будет повышать положительный эффект от нашего проекта.\n\nВажно знать, сколько ресурсов мы хотим потратить на наш план перевооружения! Как только срок реализации идеи истечет, мы не сможем принимать дальнейшие решения.\n\n§Y10§! - Германия получит еще 3 военных завода.\n§Y20§! - Смягченная версия идеи перевооружения останется для всех стран ЕС после того, как план будет доработан.\n§Y30§! - Мы получим дополнительные §G5§!§3£GFX_GER_blue_economy_points_texticon Очков Синей Экономики§!.\n§Y40§! - Различные бонусы за военные технологии для всех стран ЕС.\n§Y50§! - Идея перевооружения останется у всех стран ЕС после того, как план будет завершен.\n\nТекущий §Yуровень Успешности Плана Перевооружения в Европе§!: [?GER_rearm_europe_plan_tracker|+0]\n\n§RЕсли начнется война с Россией, перевооружение Европы будет остановлено, независимо от ее нынешнего статуса!§!"
 GER_sustainable_economy_decision: "Инвестироваться в §7Устойчивые§! Экономические Решения"
 GER_sustainable_economy_decision_desc: "\n\n\n\n£GFX_GER_sustainable_economic_choices_pr\n\n\n\n\n\nУстойчивые отрасли обеспечивают долгосрочный рост и экологическую безопасность. Мы будем вкладывать средства в "зеленые" инновации, предоставлять субсидии и направлять потоки капитала в устойчиво растущие отрасли, что сделает нашу экономику экологически ответственной."
 GER_inclusive_economy_decision: "Поощрять §AИнклюзивные§! Экономические Решения"
 GER_inclusive_economy_decision_desc: "\n\n\n\n£GFX_GER_inclusive_economic_choices_pr\n\n\n\n\n\nЭкономический рост всегда важен, но мы не должны забывать, что современная и успешная экономика должна охватывать не только крупных игроков. Наш план экономического развития должен стимулировать и продвигать то, что некоторые называют инклюзивным решением и развитием. Граждане, малый бизнес и крупные фирмы должны иметь широкий выбор возможностей как на рынке, так и в рамках государственного партнерства в соответсвии общих целей развития."
 GER_industries_shut_down_mission: "§YНемецкие Предприятия§! Закрываются..."
 GER_industries_shut_down_mission_desc: "\n\n\n\n£GFX_GER_shutdown_industries_pr\n\n\n\n\n\nКонкуренция со стороны иностранных конгломератов и, прежде всего, растущие цены на энергоносители делают ведение бизнеса в Германии менее выгодным и побуждают местные предприятия закрываться или переезжать в другие места..."
 GER_stabilize_energy_prices_green_decision: "§RЭкстренные§! Меры по Энергосбережению"
 GER_stabilize_energy_prices_green_decision_desc: "Столкнувшись с нестабильностью в цепочках поставок и ростом цен, мы должны действовать быстро. Чрезвычайные ограничения на энергопотребление и кампании по энергосбережению снизят нагрузку, в то время как долгосрочная инфраструктура будет введена в эксплуатацию."
 GER_stabilize_energy_prices_blue_decision: "Запросить пакет §3Европейской§! Помощи"
 GER_stabilize_energy_prices_blue_decision_desc: "Наши планы экономического развития весьма впечатляющи, но, к сожалению, у нас нет средств, чтобы реализовать их все. Однако, вместо того, чтобы ждать дополнительных средств, мы обратимся к Европейскому Союзу с просьбой немедленно предоставить нам обширный пакет финансовой помощи, который позволит быстро покрыть дефицит за счет различных важных проектов."
 GER_greenify_the_bundesautobahn_3: "§7Озеленить§! §YБундесавтобан 3§!"
 GER_greenify_the_bundesautobahn_3_desc: "Бундесавтобан 3 остается жизненно важным для национальной логистики. Оснащение его полосами движения для электромобилей, солнечными батареями и интеллектуальными системами дорожного движения позволит модернизировать наши транспортные маршруты и сократить выбросы вредных веществ в ключевых коридорах."
 GER_greenify_the_bundesautobahn_7: "§7Озеленить§! §YБундесавтобан 7§!"
 GER_greenify_the_bundesautobahn_7_desc: "Бундесавтобан 7 остается жизненно важным для национальной логистики. Оснащение его полосами движения для электромобилей, солнечными батареями и интеллектуальными системами дорожного движения позволит модернизировать наши транспортные маршруты и сократить выбросы в атмосферу в ключевых коридорах."
 GER_approve_the_european_grids_package_decision: "Утвердить Пакет мер по §3Европейским§! §7Энергосетям§!"
 GER_approve_the_european_grids_package_decision_desc: "Европейские энергосети фрагментированы, неэффективны и не готовы к интеграции возобновляемых источников энергии. Мы должны поддержать пакет мер по энергосетям, чтобы модернизировать трансграничные энергетические связи и обеспечить долгосрочную стабильность и распределение экологически чистой энергии."
 GER_decarbonization_of_heavy_industries_decision: "§7Декарбонизация§! Тяжёлой Промышленности"
 GER_decarbonization_of_heavy_industries_decision_desc: "Сталелитейная, химическая и цементная промышленность по-прежнему остаются одними из самых загрязняющих окружающую среду секторов в Европе. Мы должны инвестировать в передовые технологии и стимулы для сокращения выбросов без ущерба для промышленной производительности и рабочих мест."
 GER_extra_urban_electric_mobility_decision: "Загородная §7Электромобильность§!"
 GER_extra_urban_electric_mobility_decision_desc: "Мы должны расширить инфраструктуру для электромобилей за пределами городских центров: зарядные станции, субсидии и поддержка электросетей, чтобы сделать электромобильность жизнеспособным и привлекательным вариантом в сельских и пригородных регионах."
 GER_foster_ev_plants_decision: "Поддерживать Завод по Производству §7Электромобилей§!"
 GER_foster_ev_plants_decision_desc: "Поддерживая строительство новых заводов по производству электромобилей по всему континенту, мы можем стимулировать создание рабочих мест в промышленности, сократить выбросы углерода и укрепить позиции Европы в глобальном секторе экологически чистых автомобилей."
 GER_kickstart_biofuel_production: "Запустить Производство §7Биотоплива§!"
 GER_kickstart_biofuel_production_desc: "\n\n\n\n£GFX_GER_biorefineries_pr\n\n\n\n\n\nМы будем финансировать крупномасштабные инициативы по переработке биотоплива, уделять приоритетное внимание субсидиям на переход к сельскому хозяйству и предлагать налоговые льготы компаниям, переходящим с углеводородов на возобновляемую биомассу."
 GER_extend_the_megdaz_pipeline: "Продлить Газопровод §YМедгаз§!"
 GER_extend_the_megdaz_pipeline_desc: "Газопровод Медгаз между Алжиром и Испанией является важнейшим элементом энергетической инфраструктуры, который требует немедленного расширения. Благодаря новому оборудованию, трубам и вспомогательной инфраструктуре, расширенная линия сможет охватить большую часть Испании и даже другие страны ЕС, устранив серьезное слабое звено в нашей энергетической безопасности.."
 GER_european_smart_factories_ITA: "§3Европейские Фабрики ИИ§!: IT4LIA"
 GER_european_smart_factories_ITA_desc: "Искусственный интеллект – это быстро развивающийся инструмент, который необходимо использовать для модернизации местной промышленности. Благодаря новому региональному центру и инициативе по интеграции ИИ можно ожидать, что автоматизированные системы и производственные линии, работающие на основе сложных программ и алгоритмов ИИ, значительно повысят производительность и эффективность."
 GER_european_smart_factories_SPR: "§3Европейские Фабрики ИИ§!: 1HealthAI"
 GER_european_smart_factories_SPR_desc: "Искусственный интеллект – это быстро развивающийся инструмент, который необходимо использовать для модернизации местной промышленности. Благодаря новому региональному центру и инициативе по интеграции ИИ можно ожидать, что автоматизированные системы и производственные линии, работающие на основе сложных программ и алгоритмов ИИ, значительно повысят производительность и эффективность."
 GER_european_smart_factories_GRE: "§3Европейские Фабрики ИИ§!: Pharos"
 GER_european_smart_factories_GRE_desc: "Искусственный интеллект – это быстро развивающийся инструмент, который необходимо использовать для модернизации местной промышленности. Благодаря новому региональному центру и инициативе по интеграции ИИ можно ожидать, что автоматизированные системы и производственные линии, работающие на основе сложных программ и алгоритмов ИИ, значительно повысят производительность и эффективность."

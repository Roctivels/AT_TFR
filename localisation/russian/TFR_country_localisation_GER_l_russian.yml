proxy.1.t: "Вопрос о Хаосе в Аравии"
proxy.1.d: "Хаос в Аравии заставил наше руководство задаться вопросом о возможности участия в событиях в этом регионе, но сначала мы должны решить, какую сторону мы будем поддерживать в гражданской войне.\n\nОчевидным и наиболее легитимным выбором было бы оказать поддержку правительству Эр-Рияда, поскольку мы давно поддерживаем связи с Мохаммедом бин Салманом.\n\nС другой стороны, мы можем поддержать наших иранских союзников, направив помощь их представителям в стране. Хотя это и рискованно, такой шаг может быть выгоден для нашей будущей дипломатии с Ираном."
proxy.1.a: "Поддержать Правительство"
proxy.1.b: "Поддержать Хезболлу"


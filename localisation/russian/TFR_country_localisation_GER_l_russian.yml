 GER_european_smart_factories_SWE_desc: "Искусственный интеллект – это быстро развивающийся инструмент, который необходимо использовать для модернизации местной промышленности. Благодаря новому региональному центру и инициативе по интеграции ИИ можно ожидать, что автоматизированные системы и производственные линии, работающие на основе сложных программ и алгоритмов ИИ, значительно повысят производительность и эффективность."
 GER_european_smart_factories_GER: "  §3Европейские Фабрики ИИ§!: JAIF"
 GER_european_smart_factories_GER_desc: "Искусственный интеллект – это быстро развивающийся инструмент, который необходимо использовать для модернизации местной промышленности. Благодаря новому региональному центру и инициативе по интеграции ИИ можно ожидать, что автоматизированные системы и производственные линии, работающие на основе сложных программ и алгоритмов ИИ, значительно повысят производительность и эффективность."
 GER_european_smart_factories_POL: "§3Европейские Фабрики ИИ§!: PIAST AI"
 GER_european_smart_factories_POL_desc: "Искусственный интеллект – это быстро развивающийся инструмент, который необходимо использовать для модернизации местной промышленности. Благодаря новому региональному центру и инициативе по интеграции ИИ можно ожидать, что автоматизированные системы и производственные линии, работающие на основе сложных программ и алгоритмов ИИ, значительно повысят производительность и эффективность."
 GER_european_smart_factories_HOL: "§3Европейские Фабрики ИИ§!: NLAIF"
 GER_european_smart_factories_HOL_desc: "Искусственный интеллект – это быстро развивающийся инструмент, который необходимо использовать для модернизации местной промышленности. Благодаря новому региональному центру и инициативе по интеграции ИИ можно ожидать, что автоматизированные системы и производственные линии, работающие на основе сложных программ и алгоритмов ИИ, значительно повысят производительность и эффективность."
 GER_reopen_coal_mines_decision: "Переоткрыть §YУгольные Шахты Рейнланда§!"
 GER_reopen_coal_mines_decision_desc: "В условиях дефицита энергоресурсов и роста промышленного спроса возобновление добычи угля в Рейнской области является временной мерой по стабилизации производства электроэнергии. Несмотря на высокую экологическую цену, это обеспечивает немедленную топливную безопасность, защищает тяжелую промышленность и дает время для осуществления долгосрочных энергетических преобразований."
 GER_new_refineries_decision: "Расширить §YГельзенкирхенский Нефтеперерабатывающий Завод§!"
 GER_new_refineries_decision_desc: "Модернизация и расширение нефтеперерабатывающего завода в Гельзенкирхене призваны уменьшить дефицит топлива и укрепить внутренние перерабатывающие мощности. Увеличение производства синтетического и рафинированного топлива в Вестфалии позволит ослабить энергетические ограничения для промышленности и повысить устойчивость поставок в переходный период."
 GER_new_power_plants_decision: "Открыть Новые §YЭлектростанции§!"
 GER_new_power_plants_decision_desc: "Расширение производства электроэнергии является прямым ответом на растущий спрос со стороны промышленности и нагрузку на энергосистему. Новые электростанции призваны обеспечить надежное электроснабжение как заводов, так и городов, предотвращая дефицит, который может затормозить восстановление экономики."
 GER_invite_industries_civilian_microsoft: "Пригласить §YMicrosoft§! в §3Европу§!"
 GER_invite_industries_civilian_microsoft_desc: "\n\n\n\n£GFX_GER_microsoft_pr\n\n\n\n\n\nПригласив Microsoft, мы сможем укрепить европейскую облачную инфраструктуру, развитие искусственного интеллекта и возможности в области кибербезопасности, одновременно интегрируя глобальные стандарты в наши цифровые и административные системы."
 GER_invite_industries_civilian_intel: "Пригласить §YIntel§! в §3Европу§!"
 GER_invite_industries_civilian_intel_desc: "\n\n\n\n£GFX_GER_intel_pr\n\n\n\n\n\nЗависимость Европы от импортных микросхем остается стратегической уязвимостью. Партнерство с Intel может закрепить производство передовых полупроводников на континенте и обеспечить надежность цепочек поставок как для гражданской, так и для военной промышленности."
 GER_invite_industries_civilian_electrics: "Пригласить §YGeneral Electric§! в §3Европу§!"
 GER_invite_industries_civilian_electrics_desc: "\n\n\n\n£GFX_GER_electrics_pr\n\n\n\n\n\nОпыт General Electric в области энергетики, авиации и тяжелой промышленности делает компанию ценным партнером для модернизации европейской инфраструктуры и поддержки долгосрочной устойчивости промышленности."
 GER_invite_industries_military_raytheon: "Пригласить §YRaytheon Technologies§! в §3Европу§!"
 GER_invite_industries_military_raytheon_desc: "\n\n\n\n£GFX_GER_raytheon_technologies_pr\n\n\n\n\n\nОпыт компании Raytheon в области противовоздушной обороны, радиолокации и перехвата ракет может значительно усилить многоуровневые системы обороны Европы от современных воздушных угроз."
 GER_invite_industries_military_northrop: "Пригласить §YNorthrop Grumman§! в §3Европу§!"
 GER_invite_industries_military_northrop_desc: "\n\n\n\n£GER_northrop_grumman_pr\n\n\n\n\n\nСотрудничество с Northrop Grumman укрепит европейский потенциал в области беспилотных летательных аппаратов, космических систем и стратегической разведки - сферах, которые приобретают все большее значение в современной войне."
 GER_invite_industries_military_lockheed: "  Пригласить §YLockheed Martin§! в §3Европу§!"
 GER_invite_industries_military_lockheed_desc: "\n\n\n\n£GFX_GER_lockheed_pr\n\n\n\n\n\nПриглашение Lockheed Martin обеспечит доступ к передовым аэрокосмическим и ракетным технологиям, что будет способствовать перевооружению Европы и ускорению модернизации совместных оборонных программ."
 GER_invite_industries_military_dynamics: "  Пригласить §YGeneral Dynamics§! в §3Европу§!"
 GER_invite_industries_military_dynamics_desc: "\n\n\n\n£GFX_GER_dynamics_pr\n\n\n\n\n\nGeneral Dynamics предлагает проверенные наземные и морские системы. Партнерство с этой компанией может способствовать реализации европейских программ по созданию бронетехники и современному военно-морскому строительству."
 GER_invite_industries_civilian_tesla: "  Пригласить §YTesla§! в §3Европу§!"
 GER_invite_industries_civilian_tesla_desc: "\n\n\n\n£GFX_GER_tesla_pr\n\n\n\n\n\nМы должны пригласить Tesla расширить производство электромобилей и аккумуляторов в Европе, используя ее опыт в области крупномасштабного производства и хранения энергии для ускорения электрификации и стабилизации континентальных энергосетей."
 GER_north_sea_hydrogen_network: "§YВодородная§! Сеть Северного Моря"
 GER_north_sea_hydrogen_network_desc: "Ресурсная инфраструктура региона серьезно недоиспользуется, и мы незамедлительно приступим к ее расширению и модернизации. От нефти до других новых источников энергии - новая сеть современных производств и инфраструктура сделает регион серьезным центром производства энергии как для нас, так и для всего ЕС."
 GER_european_5industry_initiative: "§3Европейская§! Инициатива §YИндустрия 5.0§!"
 GER_european_5industry_initiative_desc: "\n\n\n\n£GFX_GER_fivezero_industry_pr\n\n\n\n\n\nСовременная промышленность нуждается в современном вычислительном оборудовании и связанных с ним технологиях - это крайне недооцененная проблема, которая сейчас является основной целью нашей амбициозной европейской инициативы Промышленность 5.0. В рамках этой инициативы мы объединим передовые вычислительные системы, высококвалифицированную рабочую силу и новейшее программное обеспечение, чтобы значительно повысить эффективность и производительность в различных секторах."
 GER_negotiations_with_ETUC_decision: "Провести Переговоры с §sEUTC§!"
 GER_negotiations_with_ETUC_decision_desc: "\n\n\n\n£GFX_GER_EUTC_negotiate_pr\n\n\n\n\n\nНачало переговоров с Конфедерацией профсоюзов Европейского союза направлено на стабилизацию трудовых отношений в период быстрой реструктуризации. Обеспечив поддержку профсоюзов для реформ и инвестиционных планов, мы сможем уменьшить сбои в работе, управлять ожиданиями и поддерживать производство в процессе внедрения изменений."
 GER_bail_out_german_farmers: "Финансовая Помощь §YНемецким Фермерам§!"
 GER_bail_out_german_farmers_desc: "\n\n\n\n£GFX_GER_Farmers_negotiate_pr\n\n\n\n\n\nМноголетний рост цен на топливо, строгие экологические нормы и нестабильность рынков довели немецких фермеров до критической точки. Чрезвычайные субсидии и целевые меры помощи призваны стабилизировать экономику сельских районов, сохранить продовольственную безопасность и предотвратить дальнейший коллапс сельскохозяйственного сектора."
 GER_negotiations_with_families_decision: "Поддержать §YНемецкие Семьи§!"
 GER_negotiations_with_families_decision_desc: "\n\n\n\n£GFX_GER_families_negotiate_pr\n\n\n\n\n\nРост стоимости жизни, нехватка жилья и экономическая неопределенность создают все большую нагрузку на немецкие домохозяйства. Прямая финансовая поддержка и целевые инвестиции призваны облегчить повседневные трудности, поддержать потребление и укрепить социальную стабильность, пока долгосрочные реформы не начнут приносить результаты."
 GER_negotiations_with_corpos_decision: "Навязать §3Европейские§! Правила Корпорациям"
 GER_negotiations_with_corpos_decision_desc: "\n\n\n\n£GFX_GER_corpos_negotiate_pr\n\n\n\n\n\nКрупные компании, работающие в Европе, получают выгоду от единого рынка; от них ожидается соблюдение его правил. Ужесточив контроль за соблюдением стандартов ЕС в области конкуренции, налогообложения и труда, мы сможем ограничить злоупотребления, восстановить доверие общественности и обеспечить, чтобы рост не происходил за счет справедливости или социальной сплоченности."
 GER_negotiations_with_small_businesses_decision: "Поддержать §YМалый Бизнес§!"
 GER_negotiations_with_small_businesses_decision_desc: "\n\n\n\n£GFX_GER_small_negotiate_pr\n\n\n\n\n\nНебольшие предприятия наиболее сильно пострадали от недавних потрясений, оказавшись под давлением цен на энергоносители, падения спроса и ужесточения кредитной политики. Целевая поддержка ликвидности и смягчение регулирования призваны сохранить рабочие места, защитить местную занятость и восстановить доверие к повседневной экономике."
 GER_carbon_tax_decision: "Ввести Налог на Выбросы §7Углерода§!"
 GER_carbon_tax_decision_desc: "\n\n\n\n£GFX_GER_carbon_tax_pr\n\n\n\n\n\nУстановление цен на выбросы углерода призвано отучить промышленность от неэффективных и загрязняющих окружающую среду методов, не прибегая к прямым запретам. Путем явного указания экологических издержек мы можем стимулировать более чистое производство, финансировать инновации и направлять сельское хозяйство и промышленность к более устойчивым моделям."
 GER_promote_nuclear_power_in_poland_decision: "Продвижение §HАтомной Энергетики§! в Польше"
 GER_promote_nuclear_power_in_poland_decision_desc: "Энергетический сектор Польши, в значительной степени зависящий от устаревшей угольной инфраструктуры, страдает от неэффективности и загрязнения окружающей среды. Мы должны ускорить реализацию ядерных проектов, чтобы модернизировать энергосистему, сократить выбросы и обеспечить долгосрочную энергетическую стабильность."
 GER_confirm_canada_partner: "Подтвердить [CAN.GetFlag] §dКанадское§! Партнерство"
 GER_confirm_canada_partner_desc: "Несмотря на то, что Канада не находится в Европе, она является историческим и надежным союзником, заслуживающим дальнейшего сотрудничества. С подписанием нового партнерского соглашения мы значительно расширим все сферы сотрудничества, от двусторонней дипломатии до торговых отношений."
 GER_confirm_british_partner: "Работать с [ENG.GetFlag] §RБританскими§! Банками"
 GER_confirm_british_partner_desc: "Несмотря на политические трения, британские банки по-прежнему глубоко интегрированы в финансовые сети континента. Сотрудничество может быть непопулярным, но прагматичная координация может снизить волатильность и повысить ликвидность."
 GER_reinvigorate_the_european_banks_decision: "Оживить §3Европейский§! Банковский Сектор"
 GER_reinvigorate_the_european_banks_decision_desc: "Мы должны направить средства на стабилизацию ключевых европейских банков, гармонизацию финансового регулирования и восстановление трансграничного кредитования, что заложит основу для устойчивого восстановления после кризиса."
 GER_introduce_the_digital_euro_decision: "Введение §CЦифрового§! §3Евро§!"
 GER_introduce_the_digital_euro_decision_desc: "\n\n\n\n£GFX_GER_digital_euro_pr\n\n\n\n\n\nЗапуск цифровой версии евро позволит модернизировать наши платежные системы, снизить зависимость от иностранных платформ и обеспечить Европе суверенную позицию в сфере финансовых технологий будущего."
 GER_confirm_china_partner: "Новые Соглашения с [PRC.GetFlag] §dКитайскими§! §7Зёлеными§! Компаниями"
 GER_confirm_china_partner_desc: "Мы готовы открыть отдельные секторы для совместных предприятий с китайскими экологическими компаниями в обмен на зеленые технологии, приток капитала и промышленный опыт, необходимые для нашего перехода, конечно, без ущерба для суверенитета."
 GER_offshore_wind_farms_projects: "Проекты Морских §7Ветряных Электростанций§!"
 GER_offshore_wind_farms_projects_desc: "Морские ветряные электростанции открывают неиспользованный потенциал ранее непродуктивных зон. Мы должны финансировать новые проекты, расширять прибрежную инфраструктуру и создавать долгосрочную сеть морских ветряных электростанций, чтобы обеспечить энергией наше будущее." 
 GER_finish_the_railbaltica_project: "Завершить Проект §YRail Baltica§!"
 GER_finish_the_railbaltica_project_desc: "Проект Rail Baltica - это амбициозная попытка соединить несколько стран Балтийского региона современной железнодорожной сетью, которая заменит старые линии коммунистической эпохи, которые все еще используются. В последние годы в реализации этого проекта были серьезные задержки, но сейчас настало время наконец завершить его и открыть новую эру более тесного регионального экономического и политического сотрудничества."
 GER_budapest_bucharest_varna_railroad: "Железная Дорога §YБудапешт-Бухарест-Варна§!"
 GER_budapest_bucharest_varna_railroad_desc: "Венгрия, Румыния и Болгария являются членами Европейского союза и НАТО, которые подвергаются серьезному контролю со стороны властей ЕС. Все еще борясь с наследием коммунистического пренебрежения, большая часть их инфраструктуры является устаревшей и недофинансированной, а в национальных бюджетах этих стран мало средств, выделяемых на модернизацию. Однако пришло время устранить эту серьезную слабость и завершить строительство современной железнодорожной линии, которая соединит несколько крупных городов в регионе и сблизит их экономики."
 GER_munich_milan_railroad: "Железная Дорога §YМюнхен-Милан§!"
 GER_munich_milan_railroad_desc: "Италия является важной частью экономики Европейского Союза, которая требует серьезного внимания к своей инфраструктуре, что и станет целью этого масштабного нового железнодорожного проекта. Новая железнодорожная линия, соединяющая крупные города Мюнхен и Милан, несомненно, расширит наши возможности для торговли и двустороннего сотрудничества."
 GER_consolidate_the_euro_position: "Укрепить §3Евро§!"
 GER_consolidate_the_euro_position_desc: "В условиях ослабления доллара крайне важно стабилизировать и продвигать евро как надежную резервную и торговую валюту. Скоординированные фискальные сигналы, гарантии ликвидности и меры по укреплению доверия рынка направлены на то, чтобы закрепить евро в качестве глобального стандарта в условиях раздробленного финансового порядка."
 GER_batteries_dynamic_decision: "Сеть Интеллектуальных Аккумуляторов: [FROM.GetName]"
 GER_city_green_power_grids: "Энергосети §7Зелёных§! Городов"
 GER_city_green_power_grids_desc: "\n\n\n\n£GFX_GER_green_grids_pr\n\n\n\n\n\nГородские энергетические системы должны развиваться. Поддержка расширения интеллектуальных сетей, децентрализованных энергетических хабов и хранения чистой энергии сделает наши города более эффективными, устойчивыми и готовыми к растущему спросу."
 GER_launch_the_rearm_europe_plan_decision: "Запуск Плана §YПеревооружения§! §3Европы§!"
 GER_invest_in_the_european_defense_industries_decision: "Инвестироваться в §3Европейскую§! §YОборонную Промышленность§!"
 GER_invest_in_the_european_defense_industries_decision_desc: "Мы должны выделить государственные средства для стимулирования военно-промышленного производства в Европе, модернизации производственных линий и обеспечения стратегической автономии за счет долгосрочной промышленной устойчивости и конкурентоспособности экспорта."
 GER_invest_in_the_european_military_red_decision: "Инвестироваться в §3Европейские§! §YВоенные Исследования§!"
 GER_invest_in_the_european_military_red_decision_desc: "Вливание ликвидности в передовые военные исследования и разработки поможет обеспечить долгосрочные инновации, расширить европейские исследовательские сети и ускорить развитие оборонных возможностей следующего поколения."
 GER_european_taurus_project_decision: "Проект §YTaurus§!: §3Европейский§! ОБТ"
 GER_european_taurus_project_decision_desc: "\n\n\n\n£GFX_GER_main_battle_tank_pr\n\n\n\n\n\nПроект Taurus направлен на разработку стандартизированного европейского основного боевого танка. Объединяя проектирование и закупки, мы сокращаем дублирование и укрепляем континентальные сухопутные войска на десятилетия вперед."
 GER_leonardo_rheinmetall_joint_decision: "Совместное Предприятие §ALeonardo§!-§3Rhein§!§gmetall§!"
 GER_leonardo_rheinmetall_joint_decision_desc: "Мы будем спонсировать совместные предприятия между европейскими компаниями, такими как Leonardo и Rheinmetall, с целью консолидации фрагментированных рынков вооружений и расширения масштабов использования общих систем для более быстрого, дешевого и интегрированного вооружения."
 GER_promote_polish_militarization_decision: "§YСодействовать§! милитаризации §RПол§!ьши"
 GER_promote_polish_militarization_decision_desc: "Польша обладает как волей, так и пограничным положением, чтобы стать ключевой опорой европейской обороны. С помощью целевых субсидий и соглашений мы можем ускорить ее милитаризацию и увеличить шансы на успех этого плана."
 GER_new_military_installations_in_romania_decision: "Новые §Yвоенные объекты§! в §BРу§!§Yмы§!§Rнии§!"
 GER_new_military_installations_in_romania_decision_desc: "Восточное расположение Румынии делает ее стратегически важным местом. Мы будем инвестировать в местную инфраструктуру, чтобы обеспечить быстрое развертывание войск, протестировать логистику и расширить зону сдерживания Европы."
 GER_american_military_testzone_decision: "Испытание §YОружия§! в [USA.GetFlag] §RАмериканской Гражданской Войне§!"
 GER_american_military_testzone_decision_desc: "Мы будем спонсировать совместные предприятия между европейскими компаниями, такими как Leonardo и Rheinmetall, с целью консолидации фрагментированных рынков вооружений и расширения масштабов использования общих систем для более быстрого, дешевого и интегрированного вооружения."
 GER_eastern_european_drone_silos_decision: "Восточноевропейские §YХранилища Дроны§!"
 GER_eastern_european_drone_silos_decision_desc: "Дроны - это будущее военного дела. Мы должны расширить и укрепить инфраструктуру хранилищ дронов по всей Восточной Европе, чтобы обеспечить возможности быстрого реагирования, региональное сдерживание и масштабируемые варианты нанесения ударов на большие расстояния."
 GER_upgrade_drone_production_decision: "Модернизация §3Европейского§! Производства Дронов"
 GER_upgrade_drone_production_decision_desc: "Инвестиции в производство передовых дронов повысят потенциал Европы в области автономных военных действий, уменьшат проблемы с поставками и укрепят стратегическую глубину на всех театрах военных действий."
 GER_mine_lithium_decision: "Добыча §YЛития§! в §YСаксонии-Анхальт§!"
 GER_mine_lithium_decision_desc: "Открытие месторождений лития дает редкую возможность укрепить внутренние цепочки поставок. Начав контролируемую добычу в Саксонии-Анхальт, мы сможем поддержать производство аккумуляторов, укрепить стратегическую автономию и возродить региональную промышленность, связанную с технологиями будущего."
 GER_finance_european_research_council_decision: "Финансирование §3Европейского Исследовательского Совета§!"
 GER_invest_in_ASML_decision: "Инвестироваться в §YASML§!"
 GER_invest_in_STM_decision: "Инвестироваться в §YSTMicroelectronics§!"
 GER_smart_batteries_grids: "Сеть Интеллектуальных Аккумуляторов"
 GER_smart_batteries_grids_desc: "\n\n\n\n£GFX_GER_green_batteries_pr\n\n\n\n\n\nЭтот регион был выбран в качестве центра крупномасштабного хранения энергии и стабилизации энергосистемы. Скоординированная сеть интеллектуальных аккумуляторных установок теперь поглощает избыточную энергию, сглаживает пиковые нагрузки и защищает местную промышленность от энергетических потрясений. Благодаря сочетанию хранения энергии с планированием строительства фабрики работают более эффективно, расширение производства происходит быстрее, а регион становится образцом устойчивого промышленного роста с надежным энергоснабжением."
 GER_lithium_use_tt: "§LЭто уменьшит наши запасы лития на одну единицу.\nТекущие запасы лития:§! §Y[?GER_lithium_points_var|+0]§!"
 GER_lithium_use2_tt: "§LЭто снизит наши запасы лития вдвое.\nТекущие запасы лития:§! §Y[?GER_lithium_points_var|+0]§!"
 

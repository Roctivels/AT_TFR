 GER_five_year_plan: "Пятилетний План"
 GER_five_year_plan_desc: "Как и во многих других бывших социалистических государствах, наше правительство ввело в действие обширный и всеобъемлющий пятилетний план развития национальной экономики. В нем заложены огромные инвестиции и ресурсы для развития промышленности, инфраструктуры и производственного потенциала других важных отраслей нашей страны. Наша цель - полное возрождение и расширение индустриальной мощи Германии, основы, на которой будет расти немецкий социализм."
 GER_safety_law: "Бесклассовое Общество"
 GER_ostalgie_idea: "Народная Демократия"
 GER_ostalgie_idea_desc: "С распадом дореволюционной буржуазно-натовской "демократии" приходит ее законный преемник - подлинная народная демократия. Как и в социалистических республиках прошлого, богатые капиталисты и их прислужники больше не занимают властные кресла, претендуя на то, чтобы "представлять" народ. Теперь рабочие и крестьяне Германии являются верховной политической властью нации, от самых низких до самых высоких уровней управления. Когда диктатура пролетариата обеспечена, представительные органы возвращены народу, а власть партии беспрепятственно служит нуждам рабочих, политические средства для достижения социализма находятся в наших руках. Однако будет видно, построим ли мы успех на народно-демократической модели или позволим ей скатиться к прежним недостаткам или еще хуже."
 GER_ostalgie_idea2: "Народная Демократия"

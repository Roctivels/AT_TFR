 GER_nato_war_victor: "Победитель в Европейской войне"
 GER_nato_war_victor_desc: "Как лидеры ЕС, мы являемся неоспоримыми хозяевами Европы, сокрушив российскую военную машину и защитив Запад от тирании. Однако победа досталась нам нелегкой ценой. Десятки тысяч наших мужчин погибли на фронте, целые регионы были опустошены, а военные действия довели нашу экономику до предела. Возможно, шрамы здесь не так заметны, как на Востоке, но призрак войны витает на наших заводах, на наших улицах и в умах каждого гражданина.\n\nТеперь начинается новый вид войны: борьба за стабилизацию, восстановление и безопасность демократии, за которую сражались и умирали столь многие наши парни. Но поскольку Европа ищет в нас лидера, мы должны спросить себя: станет ли этот триумф началом новой, демократической эры или просто затишьем перед §Rследующей русской бурей§!?"
 GER_nato_war_victor2: "Победитель в Европейской войне"
 GER_nato_war_victor2_desc: "Как лидеры ЕС, мы являемся неоспоримыми хозяевами Европы, сокрушив российскую военную машину и защитив Запад от тирании. Однако победа досталась нам нелегкой ценой. Десятки тысяч наших мужчин погибли на фронте, целые регионы были опустошены, а военные действия довели нашу экономику до предела. Возможно, шрамы здесь не так заметны, как на Востоке, но призрак войны витает на наших заводах, на наших улицах и в умах каждого гражданина.\n\nТеперь начинается новый вид войны: борьба за стабилизацию, восстановление и безопасность демократии, за которую сражались и умирали столь многие наши парни. Но поскольку Европа ищет в нас лидера, мы должны спросить себя: станет ли этот триумф началом новой, демократической эры или просто затишьем перед §Rследующей русской бурей§!?"
 GER_relocated_industry: "Перемещенная Промышленность"
 GER_rally_europa: "Вставай Европа!"
 GER_serve_the_republic: "Служите Республике"
 GER_nationalized_defense_industry: "Национализированная Оборонная Промышленность"
 GER_nationalized_defense_industry_desc: "Частью нашей реорганизации вооруженных сил является ликвидация частного предпринимательства в нашем военно-промышленном комплексе. Все частные фирмы, которые когда-то производили оружие или обслуживали какие-либо системы в наших вооруженных силах, были конфискованы и переданы под контроль государства. Устранив угрозу препятствий или наживы со стороны этих капиталистов и их предприятий, наша промышленность теперь будет играть отведенную ей роль беспрекословного и органично встроенного винтика в нашу машину военной реформы и строительства."
 GER_german_oil: "Немецкая Нефть"
 GER_BMVI_idea: "BMVI"
 GER_BMVI_idea_desc: "BMVI является частью правовой и политической структуры Европейского союза, обеспечивающей управление границами и иммиграцией. Официальная миссия BMVI заключается в обеспечении сильного и эффективного европейского интегрированного управления границами на внешних границах Союза, обеспечении высокого уровня внутренней безопасности внутри Союза и защите свободного передвижения людей внутри него. Однако проблемы массовой иммиграции и беженцев в Европе, которые до сих пор будоражат континент, продолжают оказывать давление на существующую систему и ставить под сомнение ее эффективность. Многие правые популисты даже призывают к полной замене системы на что-то новое. Несмотря на все споры, высшие руководители ЕС заверили нас в том, что они способны справиться с этими проблемами."
 GER_CAP: "ЕСХП"
 GER_CAP_desc: "Единая сельскохозяйственная политика ЕС, также известная как ЕСХП, - это центральная основа политики союза в отношении сельского хозяйства континента. Используя сочетание нормативных актов, субсидий и четко определенных целей и задач, ЕСХП стремится обеспечить экономическое развитие и справедливый рынок для европейских фермеров и предприятий. Однако многие критикуют ее за целый ряд предполагаемых экономических и политических проблем. Среди жалоб - нанесение вреда окружающей среде, слишком обременительные правила, вытеснение мелких фермеров из бизнеса и слишком серьезные проблемы с торговыми партнерами в развивающихся странах. Несмотря на это, многие администраторы ЕС по-прежнему гордятся им как достижением в области экономической интеграции и политической гармонизации."

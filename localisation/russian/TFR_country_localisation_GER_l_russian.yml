 GER_defender_20_europe_desc: ""
 GER_f35_program: "Программа F35"
 GER_f35_program_desc: ""
 GER_revive_the_deutsche_marine: "Возродить Немецкую Морскую Пехоту"
 GER_revive_the_deutsche_marine_desc: ""
 GER_redefine_german_doctrine: "Пересмотреть Немецкую Доктрину"
 GER_redefine_german_doctrine_desc: ""
 GER_refine_airland_combat: "Усовершенствовать Воздушный Наземный Бой"
 GER_refine_airland_combat_desc: ""
 GER_modernize_the_leopard: "Модернизировать "Леопард""
 GER_modernize_the_leopard_desc: ""
 GER_develop_domestic_capabilities: "Развивать Внутренний Потенциал"
 GER_develop_domestic_capabilities_desc: "Наш военный потенциал постепенно восстанавливается, но наша промышленность, напротив, находится в тяжелом положении. По всей стране заводы, которые должны производить товары для немецкого народа и оружие для нашей армии, стоят заброшенными, запущенными и неухоженными. Наши военные заводы? Почти ни один из них не строится и не переоборудуется для производства необходимых бундесверу боеприпасов! Это просто нелепо, учитывая, какая тяжесть лежит на наших плечах. Мы должны возродить немецкое внутреннее производство для армии, назревает буря, и мы должны быть готовы к тому, что она нас настигнет"."
 GER_construct_new_dockyards: "Построить Новые Верфи"
 GER_construct_new_dockyards_desc: "Военно-морские верфи и порты на побережье Германии немногочисленны и расположены далеко друг от друга, и когда там находится флот, порт обычно находится в запущенном состоянии, плохо обслуживается и непригоден для ремонта. Мы должны начать восстановление верфей и строительство нового комплекса, используя выбор площадки, технико-экономические обоснования, партнерские отношения с частными инвесторами, инвестиции в инфраструктуру, анализ рынка для адаптации дизайна и возможностей указанных верфей, инвестиции в программы обучения для создания компетентной рабочей силы и поэтапное развитие необходимой инфраструктуры."
 GER_focus_on_trade_interdiction: "Сосредоточиться на Перехвате Торговли"
 GER_focus_on_trade_interdiction_desc: "Со времен Второй мировой войны военно-морская доктрина Германии была сосредоточена на береговой обороне. Времена Большого флота остались позади, они канули в Лету вместе с монархией, но возрождение доктрины перехвата торговых операций Кригсмарине 1940-х годов сослужит нам хорошую службу, перехватывая любые вражеские конвои, и это будет особенно полезно для удержания Калининграда в осаде."
 GER_naval_center_of_europe: "Военно-морской Центр Европы"
 GER_naval_center_of_europe_desc: "Германия - центр промышленной базы Европы, крупнейший производитель потребительских товаров, родина самых известных в мире производителей оружия, но военно-морская промышленность Германии уже давно не пользуется такой международной славой.\n\nНе стоит больше прятать наш флот под водой, мы должны сосредоточиться на надводных кораблях большого тоннажа, чтобы проецировать не только нашу собственную мощь, но и мощь Европы далеко за пределы наших вод, но устаревшая мечта кайзеров о большом флоте еще не совсем умерла."
 GER_construct_new_airfields: "Строительство Новых Аэродромов"
 GER_construct_new_airfields_desc: "По мере роста наших военно-воздушных сил для удовлетворения новых потребностей потребуются аэродромы для их поддержки, и на нашем Востоке будет построен целый ряд новых негражданских авиабаз, чтобы подготовиться к предстоящему конфликту."
 GER_purge_extremist_soldiers: "Чистка от Солдат-Экстремистов"
 GER_purge_extremist_soldiers_desc: "До нашего сведения дошел ряд тревожных сообщений о крайне правом экстремизме в войсках, люфтваффе и Немецкой морской пехоте. Хотя это лишь небольшая часть наших Вооруженных сил, число этих экстремистов растет с угрожающей скоростью. Мы должны немедленно принять меры, поскольку экстремизм в наших рядах строго запрещен. Эти солдаты будут привлечены к дисциплинарной ответственности и, вероятно, уволены в зависимости от степени тяжести, что покажет миру, что мы не потерпим такого поведения."
 GER_turn_a_blind_eye: "Закрыть на Это Глаза"
 GER_turn_a_blind_eye_desc: "Почему мы должны освобождать экстремистов от службы в вооруженных силах? Разве не они наиболее преданы делу защиты Германии? Нет, отложите в сторону отчеты, свободное общество должны защищать все его граждане, даже те, кто придерживается неблагоприятных взглядов.\n\nМожет, это и противоречит нашим доктринам, но мы многое меняем, пусть и это будет еще одним изменением."
 GER_upgrade_our_railways: "Модернизировать Наши Железные Дороги"
 GER_upgrade_our_railways_desc: "Железные дороги в Восточной Германии развиты хуже, чем на Западе, несомненно, благодаря коммунистическим злоупотреблениям. Теперь, когда у нас есть стимул, мы можем провести бюджет через Бундестаг и заставить поезда ходить вовремя."
 GER_revive_german_military_industry: "Возродить Немецкую Военную Промышленность"
 GER_revive_german_military_industry_desc: "Heckler & Koch, Haenel, Krupp, Rhinemetall, и список можно продолжать. В нашем арсенале бесчисленное количество передовых военных компаний, которые могли бы обеспечить наши армии самым современным оборудованием, если бы мы только позволили им это сделать. Но, к сожалению, наши прошлые ошибки полностью лишили эти организации внутреннего рынка вооружений. Мы должны предоставить им новые контракты для работы, и с их помощью немецкая военная промышленность получит толчок к развитию."
 GER_civil_construction_program: "Программа Гражданского Строительства"
 GER_civil_construction_program_desc: "Наша гражданская промышленность нуждается в поддержке, наша инфраструктура отстает, этот спад последних лет не может продолжаться, если мы хотим считать себя готовыми к грядущему наступлению. Любая армия марширует на животе, и мы стремимся иметь дороги, чтобы прокормить ее и наш народ."
 GER_invest_in_rnd: "Инвестироваться в Исследования и Разработки"
 GER_invest_in_rnd_desc: "Возможно, наша страна несколько отстает в развитии отечественной промышленности в наши дни. Но есть одна вещь, которую Германия сделала правильно, - это изобретения. Танки, зенитные установки, самолеты, противотанковые средства - список можно продолжать и продолжать. Мы были первопроходцами почти в каждой области на протяжении всей истории, и мы продолжаем делать это сегодня. Мы должны продолжать в том же духе, двигаясь вперед по пути к будущему. Поскольку вероятность войны растет с каждым днем, нам необходимо получить технологическое преимущество сейчас, как никогда. Мы будем инвестировать в исследования и разработки больше, чем когда-либо прежде, и наши военные технологии будут вызывать восхищение у наших союзников и страх у наших врагов!"
 GER_assure_our_nato_allies: "Заверить Наших Союзников по НАТО"
 GER_assure_our_nato_allies_desc: "Поскольку Соединенные Штаты втянуты в ужасную гражданскую войну, все члены НАТО смотрят друг на друга с молчаливым осуждением, а не с доверием и товариществом. Особенно они смотрят на нас. Некоторые считают нас слабее, чем наши страны-члены, такие как Польша, Франция и Италия. Это совершенно нелепо и продолжается уже слишком долго. Европа снова взывает к силе Германии, и мы должны ответить. К сожалению, мы не сможем этого сделать, если наши союзники не верят в нас. Мы заверим их в том, что нам по силам защитить Европу."
 GER_conceptualize_an_european_army: "Концептуализировать Европейскую Армию"
 GER_conceptualize_an_european_army_desc: "Европа слишком долго была разобщена, слишком сосредоточена на мелких разногласиях, чтобы видеть общую картину. Россия боится объединенной Европы, потому что знает: когда мы объединимся в единое целое, они ничего не смогут сделать, чтобы остановить нас. Но, к сожалению, некоторые не видят, что, когда мы объединимся, нас практически невозможно будет остановить, возможно, даже сильнее, чем Соединенные Штаты. Чтобы начать первые шаги по объединению, мы разработаем концепцию единого командования, которое будет осуществлять контроль над всеми вооруженными силами ЕС, - великой оборонительной силы против любой иностранной агрессии. В любой грядущей войне это сотрудничество будет иметь решающее значение."
 GER_the_turkish_gamble: "Турецкая Авантюра"
 GER_the_turkish_gamble_desc: "Мы все больше опасаемся, что Эрдоган принимает поговорку Ататюрка: "Мир дома, мир во всем мире." и что он не осознает опасности, грозящей всем нам к западу от Минска. Успокоить его опасения, чтобы убедиться, что Турция будет соблюдать свои соглашения, не только ради Европы, но и ради самих турок, поскольку без НАТО Эрдоган словно поймает свой народ в русскую ловушку. Перекресток Запада и Востока должен оставаться под влиянием своих западных друзей."
 GER_commit_to_baltic_defense_plans: "Приверженность Планам Обороны Прибалтики"
 GER_commit_to_baltic_defense_plans_desc: "Прибалтика - наши самые уязвимые союзники. От Эстонии до Литвы эти небольшие, но стратегически важные страны окружены со всех сторон Россией или ее союзниками. Особенно это касается Балтийского моря, расположенного к западу от них. В случае войны Балтийское море будет находиться под постоянной угрозой вторжения России. Русские могли бы уморить их голодом, устроив блокаду, или вторгнуться через море с помощью своего флота, если бы захотели, а балтийские страны практически ничего не смогли бы сделать, чтобы остановить русского медведя. Мы никогда не должны допустить этого, нельзя допустить, чтобы Прибалтика пала, и наша оборона Балтийского моря должна быть приоритетной."
 GER_commit_to_black_sea_defense_plans: "Приверженность Планам Обороны Черного Моря"
 GER_commit_to_black_sea_defense_plans_desc: "Черное море - одно из самых уязвимых мест как для России, так и для наших союзников. Этот небольшой водоем имеет исключительное стратегическое значение; если бы Россия или мы обеспечили себе военно-морское превосходство в этом море, его можно было бы использовать для захвата крупных портов на Черном море и потенциальной угрозы нашим или российским поставкам нефти. Это означает, что контроль над этим морем может помочь выиграть войну и определить судьбу Украины. Если между ОДКБ и НАТО начнется война, крайне важно сохранить контроль над Черным морем, чтобы защитить Украину. Мы должны взять на себя обязательство защищать ее превыше всего."
 GER_upgrade_eastern_european_defenses: "Модернизировать Обороноспособность Восточной Европы"
 GER_upgrade_eastern_european_defenses_desc: "Прибалтика - одна из самых незащищенных стран Восточной Европы и, несомненно, одна из целей русских. У них есть укрепления, но, как и во всей Восточной Европе, они недостаточно подготовлены. Если Россия нападет, остальная часть Восточной Европы может пасть перед русскими полчищами. Это экзистенциальная угроза для нас, и она неприемлема. Мы начнем укреплять оборону Восточной Европы как можно скорее. Благодаря этому мы сможем и дальше сдерживать российскую агрессию и защищать европейскую демократию."
 GER_pan_european_propoganda: "Панъевропейская Солидарность"
 GER_pan_european_propoganda_desc: "Европа - континент, который долгое время был разделен разрушительными войнами, национальными расколами и мелким национализмом. Но в наши дни мы начали двигаться по пути объединения континента. Членов Европейского союза и НАТО объединяют как родственные связи, так и общая угроза русского медведя. Настало время полностью объединиться под одним знаменем, панъевропейская идентичность должна оставаться сильной в умах наших людей, и с нашим продвижением панъевропейской мысли это, безусловно, произойдет."
 GER_buy_the_tb2: "Купить TB2"
 GER_buy_the_tb2_desc: "Турецкий Байрактар TB2 - это передовой военный беспилотник, созданный одним из наших союзников. Турецкие вооруженные силы находятся на переднем крае независимых военных исследований, стремясь отойти от восточных и западных разработок и создать свои собственные. Турецкое понимание ценно, и заказ нескольких беспилотников TB2 не только укрепит союзника, но и повысит наш ударный потенциал и позволит нашим инженерам лучше рассмотреть конструкцию зарубежных беспилотников."
 GER_fortify_the_polish_border: "Укрепить Польскую Границу"
 GER_fortify_the_polish_border_desc: "Польша, страна, которая стоит между союзниками России и нашим альянсом. Польша, несомненно, является целью России, но слишком долго польская оборона была недостаточной. Слишком долго они были не готовы к надвигающейся угрозе российской агрессии. Польша - это прямой путь на территорию НАТО, и она слишком важна, чтобы быть неподготовленной к первоначальному нападению России. Чтобы защитить европейскую демократию, мы должны построить больше укреплений вдоль польской границы."
 GER_secure_the_suwalki_gap: "Обезопасить Сувалкский Корридор"
 GER_secure_the_suwalki_gap_desc: "Сувалкский коридоп - это небольшое расстояние между Калининградом и Беларусью, единственные страны, которые стоят на пути этого разрыва, - Литва и Польша. Хорошо выполненное продвижение через эту короткую брешь может отрезать от нас Прибалтику, что позволит русским полностью завоевать Прибалтику, если случится война. Этого нельзя допустить, это будет стратегической потерей для НАТО и расширит возможности русских. Мы должны усилить укрепления на этом разрыве, чтобы защитить Прибалтику от российской агрессии."
 GER_found_the_european_defense_army: "Основать Европейскую Армию Самообороны"
 GER_found_the_european_defense_army_desc: "Наконец-то предложение десятилетней давности официально оформлено. Впервые оно было предложено в 1952 году, но тогда целью было предотвратить перевооружение Германии, а сегодня? Мы снова едины и смотрим на Восток, на Медведя. Европа должна быть готова, когда эти предложения были впервые выдвинуты Францией, они должны были защитить Европу от Советского Союза, а теперь, когда мы выдвигаем наше предложение, оно должно защитить Европу от возрождающейся России."
 GER_german_turkish_syrian_mission: "Германо-Турецкая Сирийская Миссия"
 GER_german_turkish_syrian_mission_desc: "Гражданская война в Сирии превратила сирийское государство в руины и пепел, вызвала один из самых страшных гуманитарных кризисов в истории человечества и способствовала появлению ИГИЛ. Однако война превратилась в медленное и изнурительное дело, которое многим уже просто неинтересно. Однако произошло нечто поистине странное: боевые действия снова начали активизироваться, и это привлекло внимание нас и Турции. Мы должны взять на себя инициативу и проявить солидарность, направив в Сирию турецко-немецкую гуманитарную миссию. Это не только поможет народу Сирии, но и будет способствовать улучшению отношений с турецким народом."
 GER_support_kurdish_anti_terrorism: "Поддержка Курдской Борьбы с Терроризмом"
 GER_support_kurdish_anti_terrorism_desc: "В Северном Ираке курды создали де-факто независимое государство. Некоторые их недолюбливают, наши турецкие союзники, например, относятся к ним с большим подозрением. Но, как бы то ни было, курды сейчас, как никогда, неоценимы в борьбе с исламским террором на Ближнем Востоке, особенно с возрождающейся "Хезболлой," которую поддерживает Иран. Поэтому в наших интересах оказать курдам поддержку в борьбе с террористической угрозой в ближневосточном регионе."
 GER_baptism_by_fire: "Крещение Огнем"
 GER_baptism_by_fire_desc: "В последний раз Германия участвовала в войне с применением обычных вооружений во время Второй мировой войны, более восьмидесяти лет назад. С тех пор нация стала более миролюбивой, и мир поверил, что Германия покончила с войной, что немецкие вооруженные силы никогда больше не будут участвовать в крупных сражениях на чужой территории.\n\nНасколько они все были неправы.\n\nРусские пытаются продвинуться вперед в Прибалтике, и именно там мы им покажем. Вместе с нашими союзниками по Балтии русские узнают, насколько большой ошибкой было недооценивать нас."
 GER_operation_eisenhammer: "ОПЕРАЦИЯ: Eisenhammer"
 GER_operation_eisenhammer_desc: "В современной войне те, кто не проявляет инициативы, будут быстро уничтожены теми, кто их опередил, и нам пора показать русским, что мы не собираемся ждать. Операция "Эйзенхаммер" - это наш решающий удар по скоплению русских, и все это очень просто. По всему фронту в Беларуси и на Украине будет проведено стремительное наступление при поддержке высокоточных батарей тяжелой самоходной и реактивной артиллерии. Под натиском массированных бомбардировок и наших скоординированных пехотных и механизированных сил русские не смогут удержаться на своих позициях, независимо от того, сколько людей они попытаются бросить против нас. С помощью этого мы быстро отбросим их обратно в холодные пустыни их страны."
 GER_intensify_nighttime_sorties: "Усилить Ночные Вылеты"
 GER_intensify_nighttime_sorties_desc: "Наша превосходная тепловизионная оптика и оптика ночного видения улучшили нашу способность атаковать ночью, особенно в воздухе, мы должны использовать это преимущество и обстреливать позиции всю ночь, столько, сколько потребуется!"
 GER_national_recruitment_drive: "Национальная Кампания по Рекруитированию"
 GER_national_recruitment_drive_desc: "Бундесвер отчаянно нуждается в новых добровольцах, давайте увеличим пенсию и льготы, предоставим бонус при подписании контракта и пообещаем им выгодную сделку на BMW... да... новобранцы скоро заполонят офисы!"
 GER_dust_off_legacy_equipment: "Обслуживание Устаревшего Оборудования"
 GER_dust_off_legacy_equipment_desc: "G3 - это все еще пистолет, стреляющий патронами 7,62, более тяжелыми, чем G36 или недавно принятый на вооружение HK416, но G3 убивает так же хорошо, как и любой другой пистолет. Начните раздавать их войскам."
 GER_deliver_excess_equipment_to_ukraine: "Доставить Избыточное Оборудование в Украину"
 GER_deliver_excess_equipment_to_ukraine_desc: "Украина значительно расширяет российский фронт и тем самым открывает уязвимость как для российского Кавказа, так и для самой Москвы. Мы можем воспользоваться этим, но только если Украина не развалится. Чтобы обеспечить это, мы должны поддержать их вооруженные силы."
 GER_mobilize_the_industry: "Мобилизовать Экономику"
 GER_mobilize_the_economy_desc: "Поскольку Германия снова втянута в войну, мы больше не можем позволить себе роскошь вести бизнес в обычном режиме внутри страны. Нашей военной машине нужна экономика, чтобы ее подпитывать, и мы больше не будем тратить время на ее сборку. Рабочие будут обучены, отрасли промышленности будут мобилизованы, материалы будут выделены, а ресурсы распределены. Титаны бизнеса и миллионы трудолюбивых и талантливых мужчин и женщин, управляющих им, теперь будут использовать ресурсы и навыки, которые прославили немецкую экономику на весь мир, чтобы сделать вооруженные силы Германии такими же. Русские полагают, что у нас нет промышленности, способной поддержать нашу борьбу, но они быстро поймут, насколько они были неправы."
 GER_tank_in_ukrainian_refugees: "Принять Украинских Беженцев"
 GER_tank_in_ukrainian_refugees_desc: "Война на востоке привела к масштабной гуманитарной катастрофе, которая перекинулась на Западную Европу. Сотни тысяч украинцев, бежавших из городов, которые сейчас подвергаются обстрелу российскими ракетами и артиллерией, оказались в Германии. Однако, в отличие от некоторых других государств, мы будем рады принять их и еще больше тех, кто хочет спастись от насилия. Конечно, размещение этих людей в стране сопряжено с определенными издержками, но среди этих проблем есть и свои преимущества. Они будут преданно поддерживать и даже сражаться за любого, кто захочет положить конец российскому экспансионизму. Поскольку мы всегда ищем больше людей и поддержки в этой борьбе, мы быстро воспользуемся этим."
 
 GER_final_operation: "ОПЕРАЦИЯ: [GLOBAL.get_poland_status]"
 GER_final_operation_desc: "[GLOBAL.get_operation_status]"
 GER_blucher: "Blücher"
 GER_khol: "Kohl"
 GER_oper_1: "СРАЖАЙТЕСЬ! ЭТО НАШ ПОСЛЕДНИЙ ШАНС ВЫТЕСНИТЬ РУССКИХ ИЗ ПОЛЬШИ!"
 GER_oper_2: "Мы обратили их в бегство! Пусть эта операция станет последним гвоздем в крышку гроба!"
 
 GER_oder_defense_initiative: "Инициатива по обороне Одера"
 GER_oder_defense_initiative_desc: "Разгром вермахта на Зееловских высотах в 1945 году решил судьбу Берлина. Большевистской своре было позволено пройти дальше и стереть с лица земли нашу столицу.\n\nМы говорим: Никогда больше не увидимся. Необходимо построить линию обороны по всему Одеру. Ни один варвар-большевик никогда не ступит ногой на немецкую землю!"
 GER_convene_the_bundestag: "Созвать Бундестаг"
 GER_convene_the_bundestag_desc: "2010-е годы стали для нашей Германии и немецкого народа десятилетием неоднозначной судьбы. Вместе со всей Европой мы пережили кризис беженцев, вызванный последствиями "арабской весны", Европа столкнулась с долговым кризисом, который грозил обрушить нашу экономику, и мы столкнулись с деморализующей перспективой роста цен на энергоносители, которые в течение десятилетия становились все выше. Несмотря на все это, мы пережили экономический подъем, низкий уровень безработицы и огромное количество инвестиций, которые способствовали нашему позитивному росту. По мере того как закрывается очередная глава истории, а 2010-е годы проходят мимо нас, становится ясно, что мы должны созвать Бундестаг. Нам есть о чем поговорить: о нашей экономической программе, об энергоэффективности, о выборах, которые быстро приближаются. Возможно, мы даже обсудим ту небольшую вспышку какого-то вируса в Китае, но, конечно, ее скоро удастся сдержать. Мы смотрим в наше будущее, и оно светлое."
 GER_expand_our_nato_contribution: "Расширить наш Вклад в НАТО"
 GER_expand_our_nato_contribution_desc: "НАТО всегда была щитом против агрессии с Востока. Когда Советы оккупировали наши восточные земли и угрожали остальной Европе, НАТО была рядом, чтобы защитить нас. Но теперь, когда наш сильнейший член разваливается на части, великим державам Европы предстоит защитить либеральную демократию от растущей российской угрозы на востоке. Германия уже несколько десятилетий является ключевым членом этого великого альянса, но наш вклад во взаимную оборону стал отставать от остальных стран. Немецкое государство должно внести в альянс больший вклад, чем когда-либо прежде. Сейчас, когда Америка разваливается по швам, для Европы наступил самый отчаянный час. Крайне важно внести полный вклад в НАТО, чтобы не только защитить наших соседей, но и Германию."
 GER_focus_on_domestic_issues: "Сосредоточиться на Внутренних Проблемах"
 GER_focus_on_domestic_issues_desc: "Внутри страны ХДС и СДПГ всегда вели борьбу за лидерство, дружескую и с большой историей взаимодополняющей политики, но, как и все великие противники, с приближением выборов мы снова сражаемся у избирательных урн, кого бы ни выбрал народ на предстоящих выборах, у него есть уникальная возможность начать новое десятилетие по-новому."
 GER_defend_the_minds_of_the_youth: "Защитить Умы Молодежи"
 GER_defend_the_minds_of_the_youth_desc: "Молодежь - это наша кровь, наше будущее, сыновья и дочери новой эры, и мы знаем из уроков истории силу нового поколения. Вредоносные субъекты тоже знают об этом факте и всегда будут стараться наполнить их уши своей ядовитой ложью. Они пытаются превратить молодежь в поколение экстремистов, угрожающих самому нашему существованию. Мы должны предотвратить это любой ценой и дать им правильное образование об опасности экстремизма и его пагубных последствиях для немецкого народа."
 GER_scientific_breakthroughs: "Научные Прорывы"
 GER_scientific_breakthroughs_desc: "Наука - краеугольный камень немецкой гордости, уходящий корнями в глубь веков, почти в тысячелетие. И сегодня Германия является великим новатором во многих областях науки, и хотя в некоторых местах мы отстали, никто не забудет, чего мы достигли, и никто не забудет, чего мы БУДЕМ достигать."
 GER_establish_minimum_pension: "Установить Минимальную Пенсию"
 GER_establish_minimum_pension_desc: "Германия известна своей социальной политикой, поэтому вы, возможно, удивитесь, узнав, что у нас нет минимальной пенсии. Давайте исправим это. Население знает, что мы никогда не снизим их пенсии слишком сильно, но... это заставит их больше доверять нам, если мы установим минимум. Потому что, конечно, демократия - вещь непостоянная, если бы был избран правильный человек, они могли бы опасаться за свои пенсии.\n\nНет больше страха, только комфорт для Германии и немецких старейшин."
 GER_strengthen_pro_union_laws: "Усилить Пропрофсоюзные Законы"
 GER_strengthen_pro_union_laws_desc: "Наши профсоюзы - это первая линия обороны против эксплуататорских методов ведения бизнеса. Они противостоят жадности владельцев предприятий и борются за права наших самых важных граждан, жизненной силы немецкой экономики: рабочих. Рабочие производят нашу продукцию и помогают ее отправлять, без них мы - ничто. Так почему же они не должны получать то отношение, которого требует их значимость? Германия всегда отстаивала права трудящихся, и нас иногда называли "раем для трудящихся." Мы намерены сохранить это звание и в будущем, и мы сделаем это, укрепляя профсоюзы.
 GER_burgergeld: "Формализовать Бюргергельд"
 GER_burgergeld_desc: "Бюргергельд - это предлагаемая зарплата для безработных, и те, кто, к сожалению, был уволен в это бурное время, могут найти утешение в том, что налоги, которые они платят, вернутся в их руки в трудную минуту. Бездомные немцы - это трагическое зрелище, и последнее, чего мы хотим, - это пустые дома и пустые желудки из-за простого экономического спада. Давайте официально введем Bürgergeld, чтобы в будущем экономическом кризисе не подвергать наших самых бедных граждан бездомности и нищете, пока они ищут новую работу."
 GER_revisit_refugee_policy: "Пересмотреть Политику в Отношении Беженцев"
 GER_revisit_refugee_policy_desc: "После саудовского краха мы получаем очередную волну беженцев с Ближнего Востока. Радикальная антимигрантская партия АдГ уже набрала невероятно много голосов для своего короткого срока жизни из-за последнего притока, и если мы впустим еще один поток, они могут только укрепиться еще больше. Может быть, и правильно помогать этим людям, но выдержит ли это наша внутренняя ситуация? Давайте соберем Бундестаг, нам предстоит несколько жарких недель."
 GER_tackle_political_extremism: "Борьба с Политическим Экстремизмом"
 GER_tackle_political_extremism_desc: "Статус-кво должен сохраниться, АдГ не может заставить нас, партии старой гвардии, подчиниться, ХДС и СДП противостоят всем подобным партиям, НДП, древней партии немецкого рейха, со времен Аденауэра мы противостоим любому виду экстремизма, включая проклятую Die Linke, тень Восточной Германии, обретшую плоть. Пусть BfV влезает в их дела, с достаточным количеством грязи мы разобьем их реакционное сборище, как и раньше."
 GER_anti_russian_bullwark: "Антироссийский Бастион"
 GER_anti_russian_bullwark_desc: "Когда-то Германия была антибольшевистским оплотом, но в современную эпоху, когда Советский Союз рухнул и старая риторика потускнела, мы можем нанести на нее новый слой краски, чтобы укрепить наши позиции в НАТО. Россия наступает, признает это Европа или нет, и Германия вместе со своими восточными союзниками будет готова противостоять угрозе, когда она нагрянет."
 GER_putinversteher: "Putinversteher"
 GER_putinversteher_desc: "Putinversteher - это клика немецких политиков, которые, как известно, симпатизируют Путину. Среди этой клики наиболее заметен бывший канцлер СДП Герхард Шредер, некоторые даже называют его архитектором создания этой клики. Неважно, что, уступив им, мы сможем получить уникальный экономический доступ к российскому рынку, несмотря на санкции союзников, это может показаться умным не всем, но нам? Мы просто идём по стопам Бисмарка.\n\n"Секрет политики? Заключить хороший договор с Россией.""
 GER_invest_in_defense_contractors: "Инвестироваться в Оборонных Подрядчиков"
 GER_invest_in_defense_contractors_desc: "Наша оборонная промышленность слишком долго полагалась на иностранные контракты в большей степени, чем на отечественные. Этого больше нельзя терпеть. Оборонная промышленность, которая питает вооруженные силы нашей страны, должна в первую очередь служить потребностям немецкой нации и немецких военных. В условиях, когда Россия только набирает силу, нам крайне важно укрепить свою оборону прямо сейчас. Мы не просто подпишем несколько жалких чеков, чтобы заставить немецкую оборону сосредоточиться на внутреннем производстве, мы подпишем столько контрактов, сколько нам потребуется. Германия вскоре станет силой, с которой придется считаться, если мы вложим деньги в этих оборонных подрядчиков."
 GER_call_for_european_unity: "Призыв к Европейскому Единству"
 GER_call_for_european_unity_desc: "Европа переживает свой самый отчаянный час. Со всех сторон нас окружают авторитарные тираны, желающие уничтожить саму идею демократии. Наш величайший союзник, Соединенные Штаты, не в состоянии помочь нам: они слишком заняты решением своих внутренних проблем, которым позволили закипеть. Сейчас, когда карты сложены против нас, как никогда важно обеспечить, чтобы Европа оставалась сильной перед лицом русского медведя. Демократия умирает во тьме, а Европа - в разобщенности. Мы должны быть как никогда едины в борьбе с общим врагом на востоке, чтобы не потерпеть неудачу и не позволить Европе оказаться под гнетом."
 GER_aid_ukraine: "Помочь Украине"
 GER_aid_ukraine_desc: "Если вторжение в Крым в 2014 году и показало нам что-то, так это то, что Украина серьезно нуждается в экономической и военной помощи. В последние месяцы русские только укрепляли свою мягкую и жесткую силу. Их угрозы, будь то перформативные или правдоподобные, доказывают, что они намерены напасть на Украину в ближайшее время. Украинские вооруженные силы даже сегодня все еще отстают и, если случится худшее, не смогут защитить себя от российского нападения. Мы не можем с этим мириться и должны направить украинцам как можно больше помощи, чтобы укрепить их армию и экономику."
 GER_support_volt_europa: "Поддержать Volt Europa"
 GER_support_volt_europa_desc: "Volt Europa - это панъевропейская федералистская организация, объединяющая различные партии во всех странах-членах ЕС под названием Volt. Эта организация выступает за либеральную демократию и в значительной степени соответствует ценностям, на которых была построена наша нация. Перед лицом потенциальной войны с Россией Европа должна быть как можно более единой, а ничто не может сделать Европу более единой, чем единое государство. Для нашей нации будет лучше, если мы открыто поддержим Volt Europa. Возможно, при нашей поддержке их мечта осуществится, и Европа раз и навсегда станет единой."
 GER_europe_united_strong: "Европа Единая и Сильная"
 GER_europe_united_strong_desc: "Европа всегда была континентом, охваченным нестабильностью, войнами и разрушениями. Несмотря на это, Европа также является континентом невероятной красоты и неописуемо богатой культуры. Однако перед нами стоит еще одно препятствие, которое грозит снова ввергнуть Европу в разруху и войну. Россия. Россия - это антитеза всему, что мы построили, она хочет разрушить прекрасные культуры, составляющие Европу, чтобы колонизировать своих соседей, как орки, которыми они являются, она хочет превратить Европу в угнетающий ад, и что хуже всего, она набирает силу с каждым днем. Но надежда не потеряна, есть линия обороны против российской угрозы: Европейский союз. Сейчас мы едины и сильны как никогда. Русские считают, что они могут вторгаться на наши земли и жестоко обращаться с нашими людьми, но они ошибаются! Если они нападут на нас, Европа будет готова."
 GER_align_to_the_right: "Союз с Правыми"
 GER_align_to_the_right_desc: "Германия - нация, эксплуатируемая иностранными державами, она абсолютно ничего не выигрывает от сотрудничества с глупой политикой своих соседей и лишь демонстрирует иностранцам, что наши предательские политики спокойно относятся к тому, что их нации помыкают и издеваются над ними. Мы делим нашу экономику с этими странами, и когда одна из них не справляется со своими обязанностями, мы чувствуем последствия! Мы впускаем тысячи мигрантов, не задумываясь о том, как это отразится на немецком народе. Всей этой нелепости придет конец. Мы добьемся того, что такие партии, как АдГ, придут к власти, Германия перестанет быть посмешищем Европы и будет стоять выше всех остальных!"
 GER_flame_anti_russian_sentiment: "Разжигание Антироссийских Настроений"
 GER_flame_anti_russian_sentiment_desc: "Русский медведь снова мобилизуется, его злобная природа никогда не будет сдержана. Эти орки кормили нас ложью о том, что Ельцин сделает Россию мирным и демократическим государством, таким же, как мы. Но мы были глупцами, поверив им, мы были глупцами, думая, что эта нация, которая в разных формах веками терзала Европу, могла когда-нибудь выбрать мир. Нет, русские, как гиены, сидят на своих скалах, выискивая любой признак слабости; и когда они видят, что мы дрогнули хотя бы на мгновение, они нападают, как змеи, которыми они и являются. Скоро вся Европа узнает, что русские - убийцы и обманщики, и мы больше никогда не позволим им обмануть нас."
 GER_fighting_the_pandemic: "Борьба с Пандемией"
 GER_fighting_the_pandemic_desc: "Вирус Ковид-19 официально заразил первого жителя Германии. К сожалению, сейчас мы мало что можем с ними поделать, разве что молиться за их здоровье и назначить им соответствующее лечение. Однако для остальных жителей Германии все так мрачно, если нам есть что сказать по этому поводу, это уж точно. Вирус необходимо остановить на корню, пока он не погубил больше невинных людей. Мы закроем страну, дадим нашим людям средства защиты и станем свободной от ковида нацией любыми способами."
 GER_mask_requirements: "Обеспечить Соблюдение Мандатов Масок"
 GER_mask_requirements_desc: "Маска. Наш главный инструмент защиты от Ковида-19, этот простой инструмент используется для того, чтобы Ковид не заразил миллионы немцев, которые его носят, и, как следствие, для обеспечения безопасности нации. Однако некоторым людям по каким-то причинам требуется дополнительное убеждение, чтобы защитить себя от вируса, который убивает тысячи людей по всему миру. Они как будто сами хотят заразиться. Поэтому мы должны убедиться, что каждый немец надевает маску, как в помещении, так и на улице, чтобы остановить распространение вируса."
 GER_fight_back_against_covid_narrative: "Сопротивляться Ковидному Нарративу"
 GER_fight_back_against_covid_narrative_desc: "Попытки правительства "остановить распространение" - не более чем тираническое использование власти. Миллионы наших молодых людей застряли внутри, вынужденные просиживать штаны за компьютером, когда они должны были бы играть и быть на улице в эти прекрасные дни. Маски приносят гораздо больше вреда, чем пользы, они только мешают людям дышать и в результате разрушают их сознание. Все, что нужно немецкому народу, чтобы остановить распространение этого изготовленного вируса, - это естественный иммунитет, никаких вакцин и прочего медицинского жаргона!"
 GER_support_querdenken_711: "Поддержать Querdenken 711"
 GER_support_querdenken_711_desc: "Querdenken 711 - это протестная группа, выступающая против ограничений Ковида, они понимают, что эти так называемые меры безопасности - не более чем фарс, используемый только для того, чтобы установить тираническую власть правительства над добрыми людьми Германии. Они очень четко понимают, что они правы, и наш долг - показать им, что мы не только солидарны с ними, но и открыто поддерживаем их борьбу за то, чтобы раз и навсегда покончить с этими авторитарными мерами. Наш долг - поддержать их."
 GER_crackdown_on_protests: "Подавление Протестов"
 GER_crackdown_on_protests_desc: "Как бы ни было велико право людей выходить на улицы и протестовать против кажущейся несправедливости, у нас также есть смертельный вирус, и эти протесты только способствуют его распространению среди людей по всей стране и неизбежно приводят к новым смертям. Чрезвычайные времена требуют чрезвычайных мер, поэтому наш долг - разогнать эти вредные протесты любыми средствами, используя все имеющиеся в нашем арсенале инструменты. Распространение Ковида будет остановлено любыми средствами."
 GER_reopen_the_country: "Заново Открыть Страну"
 GER_reopen_the_country_desc: "После нескольких месяцев неспокойной обстановки количество случаев заболевания ковидом значительно снизилось, а вместе с ним и количество смертей. Похоже, что худшее в Ковид-19 наконец-то позади. После столь долгого периода закрытости от внешнего мира наша экономика немного пострадала, но это ненадолго. После того как наша экономика и границы снова открылись, туризм переживает невиданный за последние десятилетия бум. Миллионы евро были получены, и мы, безусловно, пожинаем плоды. Если туризм и торговля станут немного активнее, Германия не только восстановится, но и будет процветать, как никогда прежде!"
 GER_partial_rearmament: "Частичное Перевооружение"
 GER_partial_rearmament_desc: "Слишком долго избегая правды, мы должны посмотреть правде в глаза. Несмотря на темное прошлое Германии, которое удерживало нас от перевооружения, теперь ясно, что если российская агрессия достигнет наших границ, нам придется рассчитывать только на себя и остальную Европу. Демократические страны по всему миру находятся в более опасном положении, чем когда-либо прежде. Наш величайший союзник, Соединенные Штаты, не в состоянии прийти к нам на защиту; и, как следствие, самый мощный сдерживающий фактор против российского империализма теперь исчез. Теперь оппортунисты чуют кровь в воде. Стало ослепительно ясно: чтобы защитить Европу от надвигающейся угрозы, мы должны перевооружиться и подготовиться к конфликту с русскими."
 GER_fuel_alternative_future: "Альтернативное Топливо Будущего"
 GER_fuel_alternative_future_desc: "Будущее - за альтернативными видами топлива, будь то ядерное или возобновляемое, и через несколько десятилетий мы можем быть уверены, что автомобили будут все больше и больше работать на нашей надежной и чистой энергетической сети. Больше уголь не будет двигать энергию нашей страны, и мы больше не будем полагаться на иностранный импорт природного газа - теперь у нас есть естественные, чистые, зеленые варианты для наших людей. Мы сделали правильный выбор в пользу чистого будущего."
 GER_one_europe_one_vision: "Единая Европа, Единое Видение"
 GER_one_europe_one_vision_desc: "Мы ездили по всему миру, отстаивая европейские интересы, заключая торговые сделки, от которых выиграет вся Европа, мы прилагали огромные усилия, чтобы сблизить Европу, связать ее с Германией, а Германию - с Европой. Объединившись в видении и воле, мы можем добиться всего! Особенно теперь, когда у нас появились альтернативные партнеры на мировой арене."
 GER_promote_public_transportation: "Продвигать Общественный Транспорт"
 GER_promote_public_transportation_desc: "Общественный транспорт - энергоэффективный способ передвижения, и он является знаковым элементом немецких городов. Его расширение и поощрение использования сокращает потребление энергии и уменьшает дорожную суматоху. В этом нет никаких минусов."
 GER_european_green_deal: "Европейский Зеленый Курс"
 GER_european_green_deal_desc: "То, что мы делаем для себя, мы должны делать для Европы! Наше стремление к возобновляемым источникам энергии будет напрасным, если только мы сами будем это делать! Давайте распространим "зеленую" сделку на наших экономических партнеров, мы все выиграем, чистый воздух, чистая Европа! Давайте не будем забывать об экономических выгодах! Конечно, это ставит нас на последнее место, однако то, что хорошо для Европы, в конечном итоге будет хорошо и для нас!"
 GER_depression_recovery: "Восстановление от Депрессии"
 GER_depression_recovery_desc: "Раньше наша экономика начинала превращаться в хорошо смазанный механизм, который приносил богатство стране и людям. Но как только мы подумали, что наша экономика начала расти, пандемия тут же поставила крест на этом. Немецкие рабочие страдают, они бедны, лишены работы и почти в одночасье потеряли свои инвестиции. Наша нация обязана любой ценой положить этому конец и восстановиться. Благодаря нашим программам немецкая экономика не только восстановится, но и вырастет до невиданных в Европе высот."
 GER_defenders_of_democracy: "Защитники Демократии"
 GER_defenders_of_democracy_desc: "Теперь на плечи немецкого народа легло новое бремя, даже если он еще не осознает этого. Поскольку Соединенные Штаты столкнулись с невиданным доселе внутренним хаосом, мантию ответственности за защиту демократии от окружающих нас диктаторов взяла на себя немецкая нация и сам немецкий народ. Мы должны соответствовать наследию, оставленному Соединенными Штатами, но и превзойти его. Мы не допустим тех же ошибок, что и Соединенные Штаты. Мы не только защитим демократию от российской угрозы, но и сделаем так, чтобы оставаться маяком свободы, который будет светить из любого уголка земного шара."
 GER_integrate_american_airbases: "Интегрировать Американские Авиабазы"
 GER_integrate_american_airbases_desc: "В результате, возможно, самого трагического события XXI века Америка оказалась в невероятно разрушительной и сложной Гражданской войне. Это ужасно, но вместе с трагедиями приходят и возможности. Когда Америка начала разрушаться, многие солдаты были вывезены с зарубежных баз и отправлены обратно, чтобы защищать свою родину в период кризиса. В результате почти все американские авиабазы в пределах наших границ опустели. Теперь, когда Америка находится в состоянии раздора, эти авиабазы ей больше не нужны. Однако, поскольку угроза со стороны России растет с каждым днем, становится ясно, что они нужны НАТО для защиты Европы. Мы должны интегрировать эти пустующие авиабазы, они не останутся брошенными." 
 GER_europes_darkest_hour: "Самый Темный Час Европы"
 GER_europes_darkest_hour_desc: "Мы загнали их в самое сердце России, мы думали, что с ними покончено, но мы ошибались..."
 GER_arsenal_of_democracy: "Арсенал Демократии"
 GER_arsenal_of_democracy_desc: "Мы - крупнейшая индустриальная экономика Европы, поэтому настала наша очередь взять на себя мантию Арсенала Демократии, Raytheon обменять на Rhinemetall, европейские страны будут искать Германию для восполнения дефицита, и мы ответим на их призывы."
 GER_defenders_of_europe: "Защитники Демократии"
 GER_defenders_of_europe_desc: "Германия - одна из самых густонаселенных стран НАТО, самая богатая, и теперь, в отсутствие Америки, мы должны стать новым щитом Европы. Поэтому мы должны сделать все возможное и перестроить наш милитаризм с нуля, милитаризм во имя свободы. Für Freiheit!"
 GER_bolster_bmvi: "Укрепить BMVI"
 GER_bolster_bmvi_desc: "Погранично-визовый инструмент - это общеевропейское таможенное агентство, действующее прямо на границе ЕС. Взяв на себя роль таможенного агентства в любой стране, эта организация объединяет европейскую экономику в единое целое, однако у нее есть свои недостатки. Давайте укрепим ее, чтобы у Европы было таможенное агентство, способное эффективно справляться с огромным объемом входящей и исходящей торговли."
 GER_empower_the_chancellor: "Наделить Канцлера Полномочиями"
 GER_empower_the_chancellor_desc: "BfV работает над защитой Конституции Германии. Вместе с BfV работает и канцлер; они заботятся о том, чтобы права немецкого народа были защищены и чтобы он оставался в безопасности. Но сейчас нашему обществу угрожают злонамеренные партии, которые хотят не только ограничить права немцев, но и уничтожить демократию, на которой построена наша нация. Этого нельзя допустить, и нам больно принимать такие меры. Но нам ясно, что некоторые из этих вредоносных организаций не могут оставаться в немецкой политике, поэтому лучший выбор - это наделить канцлера полномочиями и начать запрещать их, чтобы защитить свободу."
 GER_set_an_american_policy: "Установить Политику по Америке"
 GER_set_an_american_policy_desc: "Похоже, что внутренняя борьба, терзавшая Америку с момента окончания холодной войны, наконец-то подошла к концу. Два правительства, претендующие на легитимность, начали сталкиваться друг с другом в кровавой гражданской войне. Но ситуация оказалась сложнее, чем мог предположить любой из наших аналитиков: от Новой Англии до Калифорнии царит анархия, когда радикальные ополченцы, банды и правительства штатов борются за контроль над своими штатами, а возможно, и над всей страной. Эта ужасающая ситуация породила простой вопрос: Кого мы поддержим? Время не ждет, и мы должны решить, какое правительство легитимно в этой гражданской войне, если таковая ведется."
 GER_germany_first: "Германия Превыше Всех"
 GER_germany_first_desc: "Слишком долго мы ставили во главу угла интересы иностранных государств, а не интересы немецкого народа. Мы увязли в бесконечных торговых сделках, которые привязывают нас к тикающим бомбам замедленного действия с неуправляемой экономикой. Немецкий народ становится все беднее и беднее, в то время как верхушка элиты, получающая выгоду от этих сделок, становится все богаче и богаче. Наши некомпетентные политики отказываются что-либо с этим делать, потому что они слишком заняты поездками на тысячи зарубежных встреч. Конечно, наши союзники могут бороться, но и мы тоже. И как мы можем надеяться справиться с русскими, если мы не в состоянии справиться даже с нашими внутренними проблемами? Мы не можем. Мы не должны допустить, чтобы из-за этого наша нация пришла в упадок и раздор. Мы должны сделать так, чтобы Германия была на первом месте во всех делах!"
 GER_restore_bundeswehr_pride: "Восстановить Гордость Бундесвера"
 GER_restore_bundeswehr_pride_desc: "Бундесвер слишком долго подвергался насмешкам во всем мире из-за своего небольшого размера и плохого финансирования. Гордость и доверие нашего народа к нашим вооруженным силам находятся на самом низком уровне. Сегодня этому будет положен конец, и мы больше не позволим бундесверу быть посмешищем в Европе и мире. Наш народ заслуживает того, чтобы гордиться своей армией, он должен верить, что мы можем защитить Европу от российской угрозы. Мы сделаем все возможное, чтобы вернуть бундесверу гордость, они будут знать, что наша армия сильна и защитит их."
 GER_common_agrigultural_policy: "Общая Сельхоз Политика"
 GER_common_agrigultural_policy_desc: "Европа должна работать над созданием единой сельскохозяйственной политики, для блага наших вкусов и наших фермеров, сельское хозяйство должно быть упорядоченным процессом во всех наших странах. Слишком долго фермеры использовали пестициды, которые ужасно влияли на здоровье экосистем Германии, и скоро мы их ограничим. Здоровая окружающая среда означает здоровые урожаи и животных. Даже если фермеры поначалу не согласятся, они поймут, что к чему, когда начнутся изменения. Германия станет бастионом здорового и экологичного сельского хозяйства для всего мира, нацией здоровых и, как следствие, счастливых людей."
 GER_deal_with_visegrad: "Сделка с Вышеградом"
 GER_deal_with_visegrad_desc: "Вышеградская группа часто оказывается у истоков движения евроскептиков, чувствуя себя недостаточно обеспеченной Евросоюзом и действуя как Союз внутри Союза. Мы можем сделать больше, чтобы Польша и вся Вышеградская группа чувствовали себя желанными и хорошо обслуживаемыми, давайте начнем с того, что переведем их на евро, к счастью, их валюты не имеют силы и не заклеймены лицом монарха, так что мы можем действительно убедить их."
 GER_balkan_diplomacy: "Балканская Дипломатия"
 GER_balkan_diplomacy_desc: "Балканы - стратегически важный и богатый ресурсами регион. Несмотря на политический хаос, в котором оказался регион после распада Советского Союза, потенциал, которым обладает эта территория, нельзя недооценивать. Например, румынская нефть - эти недоиспользуемые ресурсы могут стать решающим фактором для обеспечения будущего Европы и Германии в случае наихудшего сценария развития событий. Чтобы получить эти ресурсы, очень важно улучшить наши отношения со странами на Балканах и получить дипломатическое преимущество перед оппортунистическими русскими. Войны выигрываются не только грубой силой и сталью, но и дипломатией и искусством ведения беседы."
 GER_tackle_traffic_light_coalition: "Подорвать Светофорную Коалицию"
 GER_tackle_traffic_light_coalition_desc: ""Светофорная Коалиция" , состоящая из СДПГ, СвДП и Зелёных, была постоянной занозой в боку ХДС. После многих лет, в течение которых немецкий народ не испытывал ничего, кроме раздражения, с нас хватит. Эта коалиция должна быть разрушена как можно скорее. Существует множество вариантов того, как развалить эту занозу в наших задницах. Мы можем развалить их коалицию, предложив ее участникам более выгодные условия, чем СДПГ, или просто переманить СДПГ в нашу коалицию, а остальных погрузить в электоральную безвестность. В любом случае, светофорная коалиция попадет в мусорную корзину истории, когда мы покончим с ней!"
 GER_eu_economic_integration: "Экономическая Интеграция ЕС"
 GER_eu_economic_integration_desc: "Благодаря созданию BMVI или полностью "Инструмента управления границами и визами" мы сможем теснее интегрировать экономики стран ЕС. Организация поддерживает общую таможенную границу вдоль внешней границы Союза, таким образом, вся торговля, поступающая в Европейский Союз, будет проходить таможенный контроль в порту въезда в Союз, минуя отдельные национальные таможенные службы."
 GER_support_caucasian_independence: "Кавказская Дипломатия"
 GER_support_caucasian_independence_desc: "После вторжения Медведева в Грузию в 2008 году и предыдущих абхазских войн после распада Советского Союза Грузия стала центром противостояния с Россией в Кавказском регионе, даже такие страны, как Армения и Азербайджан, не были полностью послушны русским. Как многие уже говорили, войны выигрываются не только пулей, но и словами и чернилами пера. Мы должны попытаться наладить контакт с кавказскими народами. Если мы сделаем это, то, возможно, завоюем их доверие и лояльность."
 GER_russo_german_trade_deal: "Российско-Германская Торговая Сделка"
 GER_russo_german_trade_deal_desc: "Россия и Германия поддерживают относительно дружественные торговые отношения со времен канцлерства Шредера, и сейчас нет причин раскачивать лодку в отношениях с Россией, наши связи могут сохранить мир между Россией и ЕС. Мы можем помочь друг другу. В обход санкций, от которых страдает Россия, мы можем получить эксклюзивный доступ к жизненно важным ресурсам, которых у нас может не хватать, например, к драгоценному Газпрому и его гигантским запасам нефти, а также к другим сырьевым ресурсам."
 GER_improve_the_eurocopter: "Усовершенствовать Еврокоптер"
 GER_improve_the_eurocopter_desc: "Eurocopter, как и Eurofighter, был создан совместно с несколькими европейскими странами в качестве универсального воздушного транспортного средства для использования в широком диапазоне применений. Но, как и все остальное, он нуждается в модернизации. Leopard 2 прошел несколько модернизаций, и теперь настало время выпустить обновление для наших Eurocopter."
 GER_tackle_corporations: "Бороться с Корпорациями"
 GER_tackle_corporations_desc: "На протяжении всей истории Германии корпорации стояли за политической коррупцией и неравенством, пронизывающими немецкую нацию. В своей бесконечной погоне за прибылью они использовали любые средства, чтобы заработать как можно больше денег. Человеческие страдания, причиняемые этим, огромны и неописуемы, и их необходимо остановить. Мы добьемся того, чтобы корпорации не только вернули нам деньги, но и вернули людям, которых они так долго эксплуатировали, используя свою власть и богатство. Немецкий народ будет процветать!"
 GER_protect_the_german_economy: "Защитить Немецкую Экономику"
 GER_protect_the_german_economy_desc: "Немецкая экономика по-прежнему считается одной из самых сильных или самой сильной на европейском континенте в целом. Война с русскими полчищами оставила нашу экономику вместе с нашей нацией в уязвимом месте, мы должны укрепить контроль и защитить наше экономическое превосходство любыми средствами, которые есть в нашем распоряжении, и действовать."
 GER_prepare_for_new_decade: "Готовится к Новому Десятилетию"
 GER_prepare_for_new_decade_desc: "Когда почти все враги и трудности Европы уже позади, мы должны подготовиться и принять будущее, которое нас ждет, и вернуться к нормальной жизни. Для этого мы должны в первую очередь демобилизовать нашу экономику военного времени и вернуться к потребительскому образу жизни, сделав приоритетом ее возрождение и развитие."
 GER_invest_in_automation: "Инвестироваться в Автоматизацию"
 GER_invest_in_automation_desc: "Постепенно вступая в новую эру нашей нации, мы также должны подготовить наши промышленные центры к будущему. Мы начнем инвестировать в развитие автоматизированного оборудования для всех наших промышленных секторов и заводов, устраняя необходимость в человеческой зависимости и рабочей силе, а вместе с этим улучшая наши производственные возможности и усилия в целом."
 GER_ai_development: "Разработка ИИ"
 GER_ai_development_desc: "Искусственный интеллект станет краеугольным камнем для прокладывания нового пути в нашей новой эре на десятилетия вперед, как в корпоративном, так и в военном развитии. Мы должны возглавить развитие искусственного интеллекта и стать одной из первых среди многих стран, которые будут доминировать в технологических областях."
 GER_expand_broadband_infrastructure: "Расширить Широкополосную Инфраструктуру"
 GER_expand_broadband_infrastructure_desc: "Нельзя недооценивать важность нашей широкополосной инфраструктуры, которая обеспечивает скоростной интернет и связь на больших территориях нашей страны. Мы начнем строительство и расширение нашей инфраструктуры, чтобы обеспечить надежным и быстрым интернетом большее количество сельских жителей, что позволит улучшить связь для образования, здравоохранения, бизнеса и личных нужд."
 GER_walkable_cities: "Прогулочные Города"
 GER_walkable_cities_desc: "Прогулочные города - это то, чем славится Европа, и особенно Германия. Давайте усовершенствуем эту идею, увеличив количество общественного транспорта и доступ к удобствам пешком, мы сократим выбросы, расход топлива и повысим уровень счастья наших людей! Кто не любит спокойную прогулку в булочную, ja?"
 GER_industrial_modernization: "Промышленная Модернизация"
 GER_industrial_modernization_desc: "В новом веке мы переживаем новую промышленную революцию, поскольку автоматизация начинает заменять машины, управляемые человеком, инженеры и техники становятся все более важными для устойчивой работы этих роботизированных фабрик, давайте развивать торговые школы и предоставлять субсидии тем, кто хочет получить образование в области робототехники, их область станет важной, поскольку автоматизация продолжает расти вместе с ними."
 GER_computing_research: "Компьютерные Исследования"
 GER_computing_research_desc: "Исследования в области компьютеров и вычислительной техники в целом играют ключевую роль в обеспечении развития искусственного интеллекта, кибербезопасности и анализа данных. Мы будем расширять исследовательские крылья, повышать эффективность и разрабатывать инновационные решения, влияющие на различные сферы и отрасли."
 GER_german_edgenuity: "Немецкая Изобретательность"
 GER_german_edgenuity_desc: "Немецкая изобретательность вошла в учебники истории: сотни изобретений, тысячи изобретателей, наука, уходящая вглубь веков, мы изобрели ракету и изобретем колесо, если того потребует момент. Мир знает о нашей изобретательности, и нам бы не помешало сохранить немецкий язык как синоним качества."
 GER_expand_consumer_market: "Расширить Потребительский Рынок"
 GER_expand_consumer_market_desc: "Германия - крупнейшая экономика Европы и одна из крупнейших в мире, с разнообразной потребительской базой и известным акцентом на качество. Осваивая электронную коммерцию и новые возможности экспорта, мы можем не только расширить наш потребительский рынок, но и адаптироваться к меняющимся предпочтениям потребителей и мировым тенденциям."
 GER_engineering_marvel_of_europe: "Инженерное Чудо Европы"
 GER_engineering_marvel_of_europe_desc: "Германию часто считают инженерным чудом Европы, а такие крупные компании, как Volkswagen, BMW, Bosch и Siemens, известны своими инновациями. Инвестируя в новые технологии, модернизируя учебные программы по инженерным специальностям и укрепляя наши глобальные партнерства, мы можем сохранить и укрепить наш статус экономического гегемона."
 GER_host_american_companies: "Принять Американские Компании"
 GER_host_american_companies_desc: "Множество американских компаний выразили заинтересованность в частичном или полном переносе производства в нашу страну, в том числе такие крупные телекоммуникационные компании, как AT&T, и производители аэрокосмической техники, такие как Lockheed Martin, обратились к нам. Благодаря наличию квалифицированной рабочей силы и возможностей для новых партнерств мы можем предложить выгодные таможенные условия и налоговые льготы для повышения эффективности торговли американских компаний, работающих в Германии."
 GER_work_with_technocrats: "Работать с Технократами"
 GER_work_with_technocrats_desc: "Сотрудничество с технократами - профессионалами, принимающими решения на основе технических знаний, а не только политической принадлежности, - будет способствовать развитию инноваций и укреплению нашей экономики. Мы будем назначать технократов на ключевые консультативные должности и поощрять совместные проекты между государственными учреждениями и компаниями частного сектора, чтобы повысить эффективность и подтвердить принятие решений на основе фактических данных, полученных от экспертов."
 GER_invest_in_bio_fuels: "Инвестироваться в Биотопливо"
 GER_invest_in_bio_fuels_desc: "Помимо сокращения выбросов парниковых газов, инвестиции в биотопливо позволят нам диверсифицировать источники энергии и создать рабочие места в сельском хозяйстве, производстве и разработке технологий, способствуя инновациям. Кроме того, это позволит нам сократить количество отходов и повысить эффективность использования ресурсов. Мы установим минимальный процент использования биотоплива на транспорте в размере 10 %, будем субсидировать биодизель и топливо Фишера-Тропша в рамках программы, направленной на увеличение внутреннего производства."
 GER_harness_power_of_atom: "Использовать Силу Атома"
 GER_harness_power_of_atom_desc: "Исследование ядерного деления имеет важное значение для нашей страны, особенно в контексте энергетической политики, где прорыв в этой области приведет к масштабным инновациям и созданию большого количества рабочих мест. Мы выделим средства специально на исследования в области ядерного деления и будем сотрудничать с исследовательскими институтами и университетами, чтобы способствовать развитию образования в области ядерной науки и инженерии. Ядерное деление обеспечит нас стабильным и надежным источником энергии, диверсифицируя наши источники энергии и снижая нашу зависимость от импорта энергоносителей." 
 GER_renew_worker_contracts: "Возобновлять Трудовые Контракты" 
 GER_renew_worker_contracts_desc: "Когда началась европейская война, многие задавались вопросом, кто будет защищать Европу от русской угрозы. Сегодня многие считают, что главными героями были исключительно солдаты на фронте и тысячи других, служивших в бундесвере. Хотя эти храбрецы и являются героями, они были не единственными, кто внес свой вклад в военное дело. Не меньший вклад в оборону Европы, чем солдат, внес рабочий на заводе. Своей кровью, потом и слезами рабочие тыла производили боеприпасы для снабжения наших войск в Восточной Европе, и благодаря их усилиям мы вышли на первое место. Мы не должны допустить, чтобы они оказались на обочине наших экономических усилий, мы должны возобновить их контракты и позволить им продолжать работать."
 GER_expand_eus_reach: "Расширить Охват ЕС"
 GER_expand_eus_reach_desc: "Во многих отношениях Европейский союз - это просто продолжение государственной власти Германии, поскольку мы являемся ее экономическим центром. Из этого следует, что то, что хорошо для расширения ЕС, хорошо для роста Германии. Мы будем использовать свое влияние в федеральных институтах, чтобы усилить влияние союза и закрепить свое положение в качестве его конечного хозяина."
 GER_unify_our_goals: "Объединить Наши Цели"
 GER_unify_our_goals_desc: "Самая большая слабость демократии - это разделение. Демократия становится самой слабой, когда политики решают мелкие споры вместо того, чтобы помогать народу. Это только доказывает диктаторам, что демократия не работает, и дает им оружие для пропаганды. Посмотрите на Америку, ее раскол и мелкие споры привели к тому, что они начали рвать друг друга на части, как животные. Теперь Европа осталась в одиночестве, чтобы противостоять русскому медведю. Мы не можем позволить этому случиться с нами, и мы не можем оставить наших бывших союзников в Европе в одиночестве противостоять восточной угрозе. Кто-то может спросить, в чем заключается решение, но оно очень простое: объединиться. Мы должны объединить наши партии и поставить общие цели, чтобы будущее Германии было как можно более светлым!"
 GER_socialisms_second_chance: "Второй Шанс Социализма"
 GER_socialisms_second_chance_desc: "После недавней победы партии Die Linke на федеральных выборах в Германии в сознание многих наших граждан возвращаются воспоминания о разделении родины после Второй мировой войны. Некоторые видят в этом окончательную кульминацию Остальгии, или тоски по старой Германской Демократической Республике. Другие считают Die Linke продуктом 1968 года и западногерманских "новых левых," окончательной победой Руди Дучке в его долгом шествии по институтам.\n\nКакие бы предрассудки ни были у некоторых, мы используем наш новый мандат, чтобы получить рабочее движение. Мы покажем, что социализм может быть построен в единой и демократической Германии. Vorwärts!"
 GER_anti_poverty_initiative: "Инициатива по Борьбе с Бедностью"
 GER_anti_poverty_initiative_desc: "Несмотря на сильную экономику, наша страна постоянно сталкивается с проблемами, связанными с бедностью. Предоставление грантов и низкопроцентных кредитов для поддержки малого бизнеса в районах с низким уровнем доходов и развитие инициатив по государственному трудоустройству в малообеспеченных сообществах позволит людям получить доступ к важнейшим видам обучения. Увеличение инвестиций в проекты социального жилья обеспечит семьи с низкими доходами доступным и качественным жильем, не только решив сиюминутную проблему, но и способствуя долгосрочному социальному равенству."
 GER_empower_the_unions: "Расширять Возможности Профсоюзов"
 GER_empower_the_unions_desc: "Мы должны расширить возможности профсоюзов и усилить их роль на рабочем месте, чтобы помочь нашей экономике. Мы примем законы, защищающие права работников на организацию, забастовку и ведение коллективных переговоров, что позволит профсоюзам добиваться лучших условий для своих членов. Поощрение профсоюзов к участию в политической пропаганде и мерах по обеспечению гарантий занятости позволит нам повысить социальную сплоченность и удовлетворенность работой, а также сократить неравенство доходов."
 GER_tax_the_rich: "Облагать Налогом Богатых"
 GER_tax_the_rich_desc: "Введя высокие налоги на дивиденды, мы обеспечим циркуляцию денег, а не их концентрацию в руках привилегированного меньшинства. Это одна из мер, на которую мы готовы пойти, чтобы обеспечить более эгалитарное общество, даже если это вызовет гнев немногих и отвлечет инвестиции."
 GER_work_with_private_initiatives: "Работа с Частными Инициативами"
 GER_work_with_private_initiatives_desc: "Частный сектор является одним из основных источников занятости, стимулируя местную экономику и создавая новые рабочие места. Благодаря государственно-частному партнерству мы сможем сотрудничать с этими инициативами, чтобы способствовать развитию инфраструктуры, технологий и услуг. Правительство может предоставлять гранты или стимулировать частные компании к инвестированию в исследования и разработки. Как сказал экономист доктор Уоррен Пратт, "частное предпринимательство - двигатель нашей экономики.""
 GER_broaden_the_bmf: "Расширить ФМФ"
 GER_broaden_the_bmf_desc: "Свободный рынок - это нестабильный рынок. Без вмешательства правительства экономика нашей страны отправилась бы в сточную канаву. Если позволить рынку балансировать самому по себе, возникнут монополии, у людей отнимут средства к существованию, и, что самое страшное, влияние правительства может ослабнуть. Расширяя ФМФ, мы сможем крепче держать экономику в руках, обеспечивая стабильность и контроль нашего правительства."
 GER_create_the_nwp: "Создать NWP"
 GER_create_the_nwp_desc: "Как мечтали многие люди до нас, бесчисленные великие и политические гиганты, заложившие основы этой экономической теории, формирование и реализация этой экономической теории будет долгим и трудным процессом. Однако мы готовы принять любой вызов, будь то недальновидные глупцы среди нашего населения или неожиданная реакция рынка. Это новый век, новая эра для мира и Германии, где новое должно прийти на смену старому."
 GER_the_sunflower_over_germany: "Подсолнух над Германией"
 GER_the_sunflower_over_germany_desc: "В Германии наступает новый день. После нашей недавней победы на федеральных выборах мы готовы решать проблемы XXI века. Хватка ХДС в правительстве окончательно ослабла, и теперь, когда они отошли на второй план, у нас появился шанс занять их место. Безудержное потребительство и разрушение окружающей среды слишком долго терзали нашу страну. Теперь семена нашей победы прорастают по всей стране, и наступает новый день. На смену загрязнению и деградации придут обновление и возрождение, и немцы снова смогут гордиться природной красотой своей страны."
 GER_promote_equality: "Поощрять Равенство"
 GER_promote_equality_desc: "Несмотря на успехи, достигнутые в прошлом, ядовитые идеи ненависти, фанатизма и нетерпимости все еще терзают наше Отечество. Чаще всего ХДС безразлично относился к росту ненависти, но мы этого не сделаем. Теперь, когда мы взяли бразды правления в свои руки, мы покончим с застоем и апатией, которым так долго позволяли расти. Стебель искоренит ненависть и нетерпимость. А на их месте вырастут равенство и сосуществование, которые расцветут, как подсолнухи, знаменуя рассвет лучшего завтра."
 GER_fight_consumerism: "Борьба с Потребительством"
 GER_fight_consumerism_desc: "С начала глобализации безудержное потребительство охватило Германию, как паутина ядовитые лианы. Тенденции, распродажи и яркие витрины сделали наших граждан зависимыми от бесконечных трат. Заводы, подпитываемые бесконтрольным капитализмом и корпоративной жадностью, бесконечно загрязняют наше небо микропластиком и канцерогенами. Под нашим руководством зловоние безудержного потребления будет вычищено из Отечества, и естественная красота нашей страны будет восстановлена."
 GER_tackle_pollution: "Борьба с Загрязнением Окружающей Среды"
 GER_tackle_pollution_desc: "Прекрасные пейзажи нашей Родины украшены мусором, а голубые небеса потемнели от промышленного пепла. Мы нанесем прямой удар, оштрафовав любого мужчину, женщину или предприятие, которые осмелятся участвовать в этом недобросовестном поведении. Кроме того, экологичные подходы к промышленному производству будут поощряться щедрыми налоговыми льготами."
 GER_accelerate_the_nuclear_phase_out: "Восстановление Ядерной Энергетики"
 GER_accelerate_the_nuclear_phase_out_desc: "Самым большим позором в истории нашей партии всегда была наша жесткая антиядерная позиция. Наши страхи, введенные в заблуждение такими ядерными инцидентами, как Чернобыль, ослепили нас от всего того великого, чего достиг этот источник энергии. Сейчас самое подходящее время для того, чтобы мы проглотили свою гордость и признали, что атомная энергетика - это будущее нашей родины. Многие из наших убежденных сторонников будут отчуждены нашим внезапным переходом, но в конечном итоге это путь, который мы должны пройти, чтобы обеспечить зеленое будущее для нашей страны."
 GER_invest_in_renewables: "Программа Возобновляемой Энергетики"
 GER_invest_in_renewables_desc: "Самым большим позором в истории нашей партии всегда была наша жесткая антиядерная позиция. Наши страхи, введенные в заблуждение такими ядерными инцидентами, как Чернобыль, ослепили нас от всего того великого, чего достиг этот источник энергии. Сейчас самое подходящее время для того, чтобы мы проглотили свою гордость и признали, что атомная энергетика - это будущее нашей родины. Многие из наших убежденных сторонников будут отчуждены нашим внезапным переходом, но в конечном итоге это путь, который мы должны пройти, чтобы обеспечить зеленое будущее для нашей страны."
 GER_further_the_green_new_deal: "Продолжение "Зеленого Нового Курса""
 GER_further_the_green_new_deal_desc: "Под руководством нашей партии и при тщательном культивировании "Зеленый Новый Курс" не только преуспел, но и превзошел наши ожидания. Там, где раньше были дымовые трубы и нефтяные вышки, теперь прорастают растения и распускаются цветы. Но зачем останавливаться только на "зеленой" энергетике? Почему бы не пойти еще дальше? Электромобили, скоростные железные дороги, экологически чистые города. Никакие идеи не будут отвергнуты. Под нашим присмотром Германия не только начала процветать, но и расцвела. И мы будем теми, кто распространит "зеленую революцию" по всей Европе, пока весь континент не избавится от экологической деградации и загрязнения."

 GER_chaotic_revolution_desc: "Наше поражение от России было внезапным и хаотичным, а захват власти народом - еще более. Не имея настоящего примера управления, на который можно было бы опереться, мы были вынуждены спешно собирать новое руководство, чтобы обеспечить выживание революции в течение следующих нескольких лет. Пока все это не будет улажено, последствия хаоса будут проявляться, и мы будем находиться в ослабленном состоянии."

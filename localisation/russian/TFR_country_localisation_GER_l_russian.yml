 GER_chinese_economic_assistance_idea: "Китайская Экономическая Помощь"
 GER_chinese_economic_assistance_idea_desc: "Китайская Народная Республика в своем стремлении содействовать развитию социализма во всем мире оказала нам щедрую экономическую помощь. От займов с гибкими условиями финансирования до крупных сумм прямых инвестиций - масштабы и размер помощи являются самыми большими из всех, которые мы видели за последнее время. Мы можем рассчитывать на то, что все эти новые ресурсы окажут нам значительное содействие в достижении нашей активной цели - построении современной социалистической экономики в Германии."
 GER_apla_military_advisors_idea: "Военные Советники АНОА"
 GER_apla_military_advisors_idea_desc: "В рамках нашего нового сотрудничества с американскими революционерами они направили в Германию нескольких своих офицеров в качестве военных советников. С ними прибывает богатый боевой опыт, технологии и новые навыки, приобретенные во время жестокой 2-й американской гражданской войны. Нет сомнений, что бойцы наших вооруженных сил извлекут из них много полезных уроков, касающихся ведения современной войны и победы в ней."
 GER_european_community_idea: "Сообщество Социалистических Рабочих"
 GER_centralized_planning2_idea: "Централизованно Планируемая Экономика"
 GER_centralized_planning2_idea_desc: "С гибелью политической системы буржуазии приходит и гибель жалкой и гнилой капиталистической экономики. На ее место приходит наша собственная модель централизованной плановой экономики в соответствии с социалистической доктриной. Инвестиции, распределение капитальных благ и производство будут находиться под контролем и управлением государства, и на то есть веские причины. Народ и наша страна больше не будут подвержены экономической анархии и жадности капиталистов и их предприятий. Ресурсы, люди и труд Германии больше не будут разбазариваться ради личной выгоды бизнесменов. Теперь каждый сегмент экономики будет тщательно управляться и планироваться, чтобы максимизировать наши усилия по построению социализма. В зависимости от того, как мы справимся с этой задачей, произойдет либо быстрый и драматический переход к подлинно социалистической экономике, либо состояние беспрецедентной катастрофы."
 GER_socialist_market_economy2_idea: "Социалистическая Рыночная Экономика"
 GER_socialist_market_economy2_idea_desc: "В своем стремлении уничтожить капитализм и прийти к социализму мы применили, казалось бы, уникальный подход. Подобно Югославии Тито, наша экономика была реорганизована в социалистическую рыночную экономику, а не в жестко централизованную командную экономику, как ожидали некоторые. Несмотря на то что государство будет чрезвычайно активно участвовать и координировать деятельность национальной экономики, ограниченное частное предпринимательство и ограниченный свободный рынок все же будут существовать. Как некоторые в партии эвфемистически называют наш подход, рабочие получат "лучшее из двух миров." Однако еще предстоит выяснить, насколько хорошо эта золотая середина, которую мы заняли, подойдет для движения Германии к нашим экономическим целям."
 GER_centralized_planning_idea: "Централизованно Планируемая Экономика"
 GER_centralized_planning_idea_desc: "С гибелью политической системы буржуазии приходит и гибель жалкой и гнилой капиталистической экономики. На ее место приходит наша собственная модель централизованной плановой экономики в соответствии с социалистической доктриной. Инвестиции, распределение капитальных благ и производство будут находиться под контролем и управлением государства, и на то есть веские причины. Народ и наша страна больше не будут подвержены экономической анархии и жадности капиталистов и их предприятий. Ресурсы, люди и труд Германии больше не будут разбазариваться ради личной выгоды бизнесменов. Теперь каждый сегмент экономики будет тщательно управляться и планироваться, чтобы максимизировать наши усилия по построению социализма. В зависимости от того, как мы справимся с этой задачей, произойдет либо быстрый и драматический переход к подлинно социалистической экономике, либо состояние беспрецедентной катастрофы."
 GER_socialist_market_economy_idea: "Социалистическая Рыночная Экономика"
 GER_socialist_market_economy_idea_desc: "В своем стремлении уничтожить капитализм и прийти к социализму мы применили, казалось бы, уникальный подход. Подобно Югославии Тито, наша экономика была реорганизована в социалистическую рыночную экономику, а не в жестко централизованную командную экономику, как ожидали некоторые. Несмотря на то что государство будет чрезвычайно активно участвовать и координировать деятельность национальной экономики, ограниченное частное предпринимательство и ограниченный свободный рынок все же будут существовать. Как некоторые в партии эвфемистически называют наш подход, рабочие получат "лучшее из двух миров." Однако еще предстоит выяснить, насколько хорошо эта золотая середина, которую мы заняли, подойдет для движения Германии к нашим экономическим целям."

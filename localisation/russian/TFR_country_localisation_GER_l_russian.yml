 GER_new_vanguard_of_revolution_desc: "Ветры перемен проносятся по Германии, и народ требует голоса, отражающего посткапиталистическое общество. Старым политическим партиям, связанным компромиссами с коррупцией и разложением, которыми является либерализм, больше нет места в немецкой политике. Настало время народу двигаться вперед. Социалистическое будущее - это не монолит, это сплав различных идеологий со своим собственным видением дальнейшего пути. Настало время, когда страна должна принять решение. Первые социалистические выборы в Германии не просто определят следующее правительство, они определят характер самой рабочей революции. Кто поведет корабль немецкого социализма в эти неспокойные времена?"
 GER_cause_greater_than_life: "Гегемония Социалистической Культуры"
 GER_cause_greater_than_life_desc: "Революция - это не просто радикальная модификация немецкого правительства. Она должна стать культурной революцией, процессом, который затронет все слои общества, ранее находившиеся под властью либерализма. Должны быть удовлетворены не только требования рабочих о правах; сами сердца и умы немецкого народа должны быть пробуждены к возможностям посткапитализма. Социализм должен быть не только политической системой; он должен стать воздухом, которым дышит народ, песнями, которые поет молодежь, искусством, которое создают наши художники, и литературой, которую мы читаем."
 GER_revolutionary_german_history: "Инициатива По Федерализации"
 GER_revolutionary_german_history_desc: "Предательские подонки, заполнившие артерии Федеративной Республики, делали все возможное, чтобы Европа была разделена, чтобы рабочие спорили из-за мелкого национализма и других подобных разногласий. Эти шрамы, нанесенные либеральным правительством, до сих пор остаются в Европе, создавая неприятную рану на лице наших свободных правительств. Мы не можем позволить этому продолжаться, нам нужно сотрудничать, чтобы уничтожить фашистскую мразь на востоке, сейчас, как никогда. Мы не должны позволять себе ввязываться в мелкие споры, нам нужно объединиться и придать федеральный характер нашему интернационалу."
 GER_form_european_internationale: "Сформировать Европейский Интернационал"
 GER_form_european_internationale_desc: "Все рабочие революции достигали успеха благодаря единому фронту. Буржуазия держала свои сапоги на наших шеях, отвлекая рабочий класс культурными войнами, разделяя нас против самих себя. Однако теперь дело сделано, и настал день расплаты. Мы не должны повторять ошибок прошлых революций. Вместе, единым фронтом, мы сокрушим и фашистскую, и капиталистическую реакцию."
 GER_new_german_man: "Обеспечить Поддержку Народа"
 GER_new_german_man_desc: "Нация, которая следует учению Карла Маркса, которая представляет собой тело и душу рабочего класса Германии, не сможет процветать и преуспеть в своих амбициях, если не сможет заручиться поддержкой своего народа. В данный момент абсолютной необходимостью и приоритетом является обеспечение поддержки всего немецкого народа, если он когда-либо даже начнет концептуализировать, а тем более материализовывать социалистическую утопию."
 GER_ostaglie: "Возродить Остальгию"
 GER_ostaglie_desc: "Неолиберальная гниль, которая так долго поглощала Германию, началась не с Меркель или Шольца. Она началась в 1990 году, когда Демократическая Республика была проглочена хищными челюстями капитализма. В течение десятилетий Востоку говорили, чтобы он стыдился своего прошлого, забыл свой дух стойкого антифашизма и солидарности рабочего класса, который позволил Германии подняться из руин нацизма. Но сейчас, когда Рейхстаг наш, а либеральный порядок рушится, настало время раскопать наследие, погребенное под берлинским асфальтом.\n\nМы восстановим Социалистическую единую партию и построим новую Демократическую республику. Пусть сомневающиеся ухмыляются и называют это не более чем ностальгией, на этот раз мы не падем. На этот раз мы не прогнемся ни перед Москвой, ни перед Брюсселем."
 GER_intensify_class_struggle: "Подражать Национальному Фронту"
 GER_intensify_class_struggle_desc: "В первой Демократической республике Партия социалистического единства управляла не в одиночку, а вместе с тщательно подобранной галереей мелких партий и массовых организаций, каждой из которых разрешалось говорить, но не бросать вызов. Национальный фронт проецировал единство, стабильность и, прежде всего, контроль. Сейчас, когда мы возрождаем СЕПГ и возвращаем себе наследие Востока, вполне естественно вернуться к этим методам.\n\nНДПГ, ХДС, ДБД, ЛДПГ; названия, которые долгое время считались вымершими, вновь поднимаются под нашим пристальным взглядом. Реакционеры, конечно, назовут это витриной. Но правда проще: легитимность строится на восприятии. Народ требует порядка и правительства. Мы дадим им и то, и другое, и сделаем так, чтобы никто не забыл, кто возглавляет хор."
 GER_sword_of_the_shield_of_the_party: "Меч и Щит Партии"
 GER_sword_of_the_shield_of_the_party_desc: ""Революции в белых перчатках не делаются." - Владимир Ленин\n\nВраги рабочих не исчезли только потому, что революция идет полным ходом. Реакционеры затаились, трусливо нашептывая контрреволюции за закрытыми дверями, а агенты иностранного капитала продолжают свою вечную работу по саботажу. Если мы хотим сохранить революцию, мы должны быть готовы защищать ее любыми средствами. Хотя многие до сих пор содрогаются при воспоминании о Министерстве государственной безопасности, рабочая революция должна быть защищена от этих внутренних угроз. Инструменты Штази - это не роскошь, а необходимость."
 GER_liquidate_the_capitalist_class: "Социалистический Германизм"
 GER_liquidate_the_capitalist_class_desc: "Это не первая немецкая революция. Начиная со спартаковцев 1919 года и заканчивая сопротивлением нацистским тиранам, наша история - это история борьбы, часто замалчиваемой и предаваемой, но никогда не забываемой. Кровь Люксембург до сих пор окрашивает воды канала Ландвера. Голос Тельмана до сих пор звучит в коридорах Бухенвальда. Нам досталось тяжелое наследие их героической борьбы с непреодолимыми препятствиями.\n\nСлишком долго тысячелетняя идентичность Германии была захвачена монархами, милитаристами и маньяками-геноцидниками. Но мы больше не уступим душу немецкой нации реакционерам и фашистам. Ведь мы - истинная Германия: Германия революционеров и фанатичного антифашизма. Мир должен увидеть, какой может стать социалистическая нация, не связанная с капиталом и реакцией."
 GER_revolutionary_justice_for_traitors: "Революционное Правосудие для Предателей"
 GER_revolutionary_justice_for_traitors_desc: "Эпоха иммунитета закончилась. Слишком долго трусы и оппортунисты в правительстве, СМИ и промышленности продавали немецкий народ капиталистическим свиньям и министрам НАТО. Они говорили о своей драгоценной демократии, подавляя рабочих, восхваляли мир, кормя военно-промышленный комплекс, прославляли процветание, в то время как миллионы людей погружались в нищету. А теперь они позволили фашизму вернуться и завоевать наших восточных братьев.\n\nТеперь их ждет правосудие, не месть, а ответственность. Их преступления против рабочих, окружающей среды и самой сути мира будут выставлены на всеобщее обозрение. В Карлсруэ начнется первый из нескольких судебных процессов. Придёт дискомфорт и разделение. Но придёт и ясность: старый порядок ушел, и его слугам не позволят вернуться. Это не чистка. Это давно назревшая расплата."
 GER_socialist_democracy: "Распространять Марксистские Идеалы"
 GER_socialist_democracy_desc: "Недостаточно судить предателей и подонков Федеративной Республики, мы должны сделать так, чтобы немецкий народ понял, почему его предали. Шрамы либерализма глубоки, и яд капиталистического мышления все еще остается в умах многих. В ответ на это мы начнем широкомасштабную кампанию по перевоспитанию, работе с населением и возрождению культуры. В каждом заводском цехе, в каждой школе, в каждом синдикате вновь зазвучат догматы Маркса, величайшего из когда-либо живших немцев. Рабочие и крестьяне Германии снова научатся мечтать о мире, свободном от эксплуатации и угнетения."
 GER_anti_fascist_bastion: "Антифашистский Бастион"
 GER_anti_fascist_bastion_desc: "Фашизм, невыносимый бич, определявший и перекраивавший историю человечества на протяжении большей части прошлого века, верования, запятнавшие репутацию и загрязнившие разум немецкого народа, вновь стремится подорвать сам его образ жизни. Мы должны и будем стоять как лицо и центр Европы, бросая вызов их полчищам, быть ярким примером стойкости против зла и всех, кто стремится низложить само учение марксизма, Германия и весь ее народ должны стоять как сияющий бастион антифашизма для всего континента."
 GER_revolutionary_society: "Убей Медведя!"
 GER_revolutionary_society_desc: ""
 GER_centralized_planning: "Централизованное Планирование"
 GER_centralized_planning_desc: "Германская Демократическая Республика была известна своей передовой системой централизованного планирования. Система была очень сложной, с множеством различных механизмов контроля, поддерживающих такую уникальную экономическую систему. Система функционировала бесперебойно, и общественность даже принимала участие в некоторых этапах планирования. К сожалению, после насильственного объединения Германии эта рациональная и справедливая система была в одночасье демонтирована, а на смену ей пришла хаотичная, ориентированная на прибыль либеральная смешанная экономика, которая не выполнила своих обещаний. История доказала, что плановая экономика - это действительно путь вперед для немецкого общества, и поэтому мы снова превратим нашу экономику в централизованно планируемую!"
 GER_revitalize_german_industry: "Оживить Немецкую Промышленность"
 GER_revitalize_german_industry_desc: "Не так давно сотни заводов работали в три смены, чтобы винтовки были в руках наших солдат, а хлеб - на столах наших граждан. Теперь же из этих некогда гордых цехов доносится лишь громкое, горькое молчание. Разрушенная инфраструктура, нехватка квалифицированных кадров и полное отсутствие цели - все это мы начнем решать с сегодняшнего дня. И прежде всего мы поставим перед каждым четкую цель: процветание немецкой нации и немецкого рабочего!"
 GER_reindustrialize_the_ruhr: "Реиндустриализировать Рур и Юг"
 GER_reindustrialize_the_ruhr_desc: "Сдвиг в сторону экономики услуг - в сочетании с капитуляцией нашего правительства перед фракцией "зеленых" - привел к беспрецедентному упадку и деиндустриализации наших самых важных промышленных регионов. Сегодня мы разрушим эти искусственно навязанные социальные ограничения и на богатом индустриальном фундаменте прошлого вновь воздвигнем новые заводы и производственные центры!"
 GER_reindustrialize_the_south: "Реиндустриализировать Юг"
 GER_reindustrialize_the_south_desc: ""
 GER_protect_german_workers: "Модернизировать Трудовое Законодательство"
 GER_protect_german_workers_desc: "Рабочий - это основа экономики Германии, фундамент, на котором строится наша промышленность, инфраструктура и процветание. Без его труда, инноваций и самоотверженности наш экономический двигатель заглохнет, а сила нашей нации уменьшится. Если не обеспечить ему уважение и безопасность на рабочем месте, это разрушит единство и стабильность нашей нации, а также нашу экономику! Поэтому правительство должно обеспечить права и безопасность работников. Пересмотрев трудовое законодательство, мы оптимизируем производство, усилим защиту трудящихся и обеспечим эффективный и целенаправленный вклад каждого гражданина в коллективные усилия. Усиление защиты трудящихся не только повысит уровень жизни, но и будет способствовать укреплению чувства лояльности и национального единства среди рабочей силы."
 GER_socialist_anti_consumerism: "Социалистическое Антипотребительство"
 GER_socialist_anti_consumerism_desc: "Эх, старые добрые времена - когда рабочие тратили свои драгоценные зарплаты на одни и те же товары, каждый год перепаковывая их, чтобы разжечь бесконечный цикл желания. Теперь этот цикл закончится. Мы обеспечим наших людей всем необходимым для жизни - едой, жильем, достоинством и даже скромным комфортом. Но больше ложные желания не будут управлять нашей экономикой. Эпоха массового манипулирования потреблением закончилась. Отныне производство будет служить жизни, а не прибыли."
 GER_construct_working_class_unity: "Построить Единство Рабочего Класса"
 GER_construct_working_class_unity_desc: "От инженера на заводе BMW до дорожного рабочего, прокладывающего улицы для этих самых автомобилей, - мы должны работать синхронно и сообща, чтобы достичь того светлого будущего, которого не смогли достичь наши предшественники. И хотя мы можем расходиться во мнениях и разногласиях, каждый немецкий рабочий должен понимать: наш путь вперед лежит через взаимную поддержку и солидарность товарищей - во имя процветания нации!"
 GER_socialist_market_economics: "Социалистическая Рыночная Экономика"
 GER_socialist_market_economics_desc: ""
 GER_community_of_european_workers: "Сообщество Европейских Работников"
 GER_community_of_european_workers_desc: ""Vereine" - группы людей, объединенных общей целью, - давно стали частью ткани нашей нации. Политические, спортивные, интеллектуальные - всевозможные объединения формировали немецкое общество. Сегодня мы делаем еще один шаг вперед: создаем общенациональную ассоциацию рабочих! Регулярные семинары, встречи и даже спокойные светские вечера будут организовываться государством, чтобы наша рабочая сила укрепляла связи и делилась знаниями, необходимыми для единого движения вперед."
 GER_socialist_pseudo_consumerism: "Социалистическое Псевдопотребительство"
 GER_socialist_pseudo_consumerism_desc: "Эх, старые времена - когда люди тратили свои зарплаты на всякие безделушки, которые, тем не менее, позволяли им чувствовать себя немного счастливее. К сожалению, в старой Германии потребительство зашло слишком далеко - оно стало формировать жизнь, а не просто улучшать ее. Мы не вернемся к этому, но благодаря нашей новой, процветающей модели процветания мы подарим радость и достоинство нашим людям в настоящем, а не только в далеком будущем."
 GER_unity_of_the_unions: "Единство Профсоюзов"
 GER_unity_of_the_unions_desc: ""
 GER_connecting_the_country: "Обеспечить Страну Энергией"
 GER_connecting_the_country_desc: "Чтобы поддерживать работу наших новых заводов и обеспечивать энергией дома рабочих, которые их обслуживают, нам требуется огромное количество энергии. В этих условиях мы должны отменить запрет на атомную энергетику, несмотря на глубоко укоренившиеся страхи большей части населения. И пока новые реакторы находятся в стадии строительства, старые, заброшенные угольные и тепловые станции должны нести нас в будущее."
 GER_revitalize_the_german_consumer_market: "Оживить Потребительский Рынок"
 GER_revitalize_the_german_consumer_market_desc: "Послевоенный период - это всегда тяжелое время. Тысячи вдов и сирот, разрушенные дома, разрушенные школы и больницы. В такие времена наш долг - обеспечить людям не только заботу, но и подлинную удовлетворенность жизнью, которую они восстанавливают. Для этого мы будем осторожно возвращать элементы потребительства - разумеется, на наших условиях. В конце концов, довольный жизнью гражданин - это краеугольный камень здоровой экономики."
 GER_nationalize_vital_industries: "Национализировать Жизненно Важные Отрасли Промышленности"
 GER_nationalize_vital_industries_desc: "К несчастью иностранных инвесторов - и к огромному счастью наших рабочих - мы наконец-то возвращаем народу то, что принадлежит ему по праву! Такие ключевые отрасли, как тяжелая промышленность, транспорт, передовые технологии и фармацевтика, будут взяты под государственный контроль. Эти отрасли слишком важны, чтобы оставлять их в частных руках - они должны служить народу, а не прибыли."
 GER_encourage_cooperative_economics: "Поощрять Экономику Сотрудничества"
 GER_encourage_cooperative_economics_desc: ""
 GER_turn_ploughshares_into_swords: "Превратить Орала в Мечи"
 GER_turn_ploughshares_into_swords_desc: "Все, что мы сделали до сих пор, заложило фундамент, который сохранится на десятилетия вперед, и плоды наших трудов уже дают о себе знать. Однако за нашими границами скрываются те, кто хотел бы уничтожить наш образ жизни. Мы не позволим этому случиться. Наш труд станет нашим оружием. Наши фабрики превратятся из лемехов в мечи, а наши рабочие одержат победу - и на производстве, и на поле боя!"
 GER_rebuild_the_bundeswehr: "Расширить Европейский Интернационал"
 GER_rebuild_the_bundeswehr_desc: "Колокола свободы звонят по всей Западной Европе, и рабочие не только Германии, но и многих стран взывают к надежде и радости! Однако не все благополучно на нашем континенте. Фашистские русские восседают на своем троне завоевания, жадно взирая на наших людей, ресурсы и богатства. Поскольку НАТО ушло в прошлое, нас объединяет с братскими народами только идеология. Если это не исправить, нас будут отбирать одну за другой, пока не останется ни одной свободной европейской страны. Мы не должны допустить этого, мы защитим революцию и наш народ, да здравствуют свободные рабочие всего мира!"
 GER_control_the_skies: "Международная Революция"
 GER_control_the_skies_desc: "Социализм как идеология получил большое распространение по всему миру после краха Америки. Без этого ужасного сплава капиталистических идеалов, способного искоренить любые социалистические настроения, воля народа разгорелась с новой силой. Однако их по-прежнему топчут правительства и общества, и без помощи их благородное дело может быть обречено на провал. В настоящее время мы не можем выделить много средств, но все, что мы можем, будет направлено на достижение целей народа, как внутри страны, так и за рубежом!"
 GER_new_aerial_academy: "Помощь со стороны Американской Революции"
 GER_new_aerial_academy_desc: "После долгих лет удушения рабочие Америки наконец-то восстали и заняли свое законное место. Хотя их положение все еще остается неопределенным, они накопили достаточно ресурсов и оборудования, чтобы иметь излишки, которые они так любезно передали нам. Это проявление товарищества и братства не останется незамеченным, и как только буржуа будут полностью искоренены с североамериканского континента, дальнейшее сотрудничество будет в порядке вещей."
 GER_streamline_aircraft_production: "Поддержать Скандинавских Коммунистов"
 GER_streamline_aircraft_production_desc: "Скандинавия была, пожалуй, единственным регионом, которого не коснулась война с Россией. Хотя они и воевали, они не пали перед Россией и подавили коммунистические настроения, которые привели к революции здесь и по всей Западной Европе. Напротив, они по-прежнему цепляются за свой благонамеренный, хотя и несовершенный, демократический социализм. Если они хотят продолжать работать в будущем вместе с трудящимися Европы, их правительствам придется отбросить эти устаревшие идеалы и принять курс, которым движется этот континент. Поскольку мы все знаем, что они не захотят этого делать, мы найдем тех, кто готов взять власть в свои руки насильственным путем, и дадим им в руки оружие."
 GER_modernize_the_eurotyphoon: "Связаться с Антифашистскими Партизанами"
 GER_modernize_the_eurotyphoon_desc: "Русские никогда не были великими в чем-либо, и они, безусловно, терпят неудачу в установлении контроля над Восточной Европой. На оккупированных территориях появились партизаны, и хотя не все они могут быть социалистами, любой антирусский - наш друг. Неизбежно, что в конце концов мы двинемся на восток, чтобы освободить эти скованные массы, и когда придет время, наличие надежной партизанской сети будет большим преимуществом. Поэтому нам необходимо наточить этот инструмент уже сейчас, чтобы в тот славный день, когда он наступит!"
 GER_moscow_shall_know_fear: "Готовить Тотальную Партизанскую Войну"
 GER_moscow_shall_know_fear_desc: "Пришло время ударить по коленям наших русских врагов. Высшее командование сочло, что партизанские силы, которые мы сколотили на востоке, пригодны для полномасштабной войны, и им было приказано провести ее. Это резко снизит доверие населения к российскому режиму, а также смягчит его нацию для нашего возможного нападения. Хотя в конечном итоге эти партизаны могут быть обречены на поражение, их жертвы помогут нам в конечном итоге освободить восток. Смерть России, да здравствует Европейский Интернационал!"
 GER_steel_torrent: "Связи с Китаем"
 GER_steel_torrent_desc: "Китай, долгое время бывший врагом и последним маяком коммунизма, теперь, возможно, стал союзником. Хотя наши народы по-прежнему настороженно относятся друг к другу, тот факт, что у нас теперь есть общая идеология в мире, где все, кажется, придумывают новые способы управления, очень много значит. Сейчас мы находимся в гораздо более выгодном положении для сотрудничества, и, возможно, в будущем между нами будет заключено взаимовыгодное соглашение. Однако пока нам достаточно нормализации отношений."
 GER_localize_tank_production: "Вагенкнехтские Соглашения"
 GER_localize_tank_production_desc: "Китайцы, хотя и были давними друзьями России, стали отчужденными из-за недавнего идеологического сдвига последней. Они сочли нас гораздо более охотно сотрудничающими с ними и, чувствуя приближение войны, предложили интересное предложение. Если Россия потерпит поражение в войне, она будет разделена между нами двумя, и мы сможем играть с нашими новыми марионетками, как нам заблагорассудится. Эпоха российско-китайского партнерства действительно закончилась, и отныне они будут противостоять друг другу так же, как коммунизм и капитализм."
 GER_trial_of_treasonous_politicians: "Исследования в области РЭБ"
 GER_trial_of_treasonous_politicians_desc: "Мы живем в эпоху, когда война ведется не только в окопах, но и с кресел. Наша последняя война с Россией доказала, что наша доктрина ужасно устарела и что мы не до конца понимаем, как использовать технологии нового поколения. Прежде чем мы сможем надеяться на то, что нам удастся потягаться с нашими восточными партнерами, мы должны быть в состоянии с уверенностью сказать, что способны использовать эти технологии в той же степени, что и они."
 GER_study_new_mobile_doctrines: "Интернациональное Военное Сотрудничество"
 GER_study_new_mobile_doctrines_desc: "Переговоры с китайцами проходят невероятно успешно, и мы продолжаем находить все больше точек соприкосновения с нашими дальневосточными товарищами. Недавно было предложено провести совместную военную операцию, и обе стороны с готовностью приняли это предложение. Хотя мы вряд ли когда-нибудь будем вести совместную войну, учитывая наше расстояние, шанс всегда есть. Поэтому началась подготовка не только к масштабным учениям, но и к расширению военного сотрудничества в будущем. К тому же в дружбе с китайцами нет ничего плохого."
 GER_an_elite_officer_corps: "Помочь Балтийскому сопротивлению"
 GER_an_elite_officer_corps_desc: ""
 GER_build_the_national_peoples_army: "Создать Национальную Народную Армию"
 GER_build_the_national_peoples_army_desc: ""
 GER_trial_of_treasonous_generals: "Суд над Генералами-Изменниками"
 GER_trial_of_treasonous_generals_desc: "Хотя строить армию, полностью основанную на лояльности, - глупое занятие, вам также не нужны генералы, которым вы не можете доверять. Среди наших военных есть предатели революции и остатки старого режима. Чтобы обеспечить будущее нации как в военном, так и в политическом плане, необходимо убрать этих генералов-предателей, пока они не успели наделать еще больше бед. На их место придут слуги народа... разумеется, имеющие соответствующую репутацию."
 GER_pick_up_sword_of_damocles: "Поднять Дамоклов Меч"
 GER_pick_up_sword_of_damocles_desc: "Как бы упорно мы ни сражались с русскими, у них всегда найдется козырь в рукаве. Хотя и французы, и британцы обладают скудными ядерными арсеналами, они меркнут по сравнению с арсеналом нашего восточного соседа, и даже если нам удастся уничтожить несколько городов, мы все равно будем стерты с лица земли. К счастью, в отсутствие Америки никто не следит за соблюдением договоров о ядерном оружии, и поэтому мы можем взять в руки дамоклов меч. С его помощью мы обезглавим русских и освободим миллионы людей, работающих под их властью!"
 GER_immer_bereit: "§YUNTERNEHMEN§!: FALKE"
 GER_immer_bereit_desc: "Наша коммунистическая утопия пустила корни в Западной Европе, но чтобы наше государство действительно процветало, мы должны устранить постоянную угрозу, исходящую от "Русского Медведя" на Востоке. Слишком долгое время влияние России, движимое изменчивой и деспотичной идеологией, попирало культуры разных народов. Народы России и Восточной Европы страдают от этого авторитарного режима и остро нуждаются в освобождении. Наш долг - помочь им освободиться от тисков этой идеологической тирании, которая принесла Европе столько разрушений и проложила путь к коммунистической утопии на всем европейском континенте."
 GER_fury_of_the_people: "Ярость Народа"
 GER_fury_of_the_people_desc: "Слышите ли вы это? Слышите ли вы дрожь земли, которая раздается по всей Германии? Он раздается на улицах, в домах и на фабриках. Это шум рабочих, крестьян, чернорабочих и простых людей, пролетариата Германии, вставших на защиту революции. Это ярость масс, ярость, которая видит силы реакции, окружающие нас, и требует действий, действий, на которые мы не будем тратить времени. По нашей директиве наша подготовка и мобилизация будут широкими и радикальными. Вооруженные силы будут расширены, оружие будет распределено, нация подготовлена, а массы возбуждены к борьбе. Все видят это очень ясно. Грядет смертельная битва, но именно фанатизм народа, который мы направим в нужное русло, принесет нам победу."
 GER_introduce_mass_conscription: "Ввести Массовую Воинскую Повинность"
 GER_introduce_mass_conscription_desc: "После окончания ГДР и воссоединения Германии одной из проблем прогнившего бывшего бундесвера стала нехватка рабочей силы из-за системы добровольного призыва. Если мы хотим иметь шансы в следующей войне, "Wehrpflicht", как многие его называют, будет введен вновь, чтобы пополнить не только нашу армию, но и нынешнюю."
 GER_learn_from_our_enemies: "Учиться у наших Врагов"
 GER_learn_from_our_enemies_desc: ""
 GER_nationalize_heckler_and_koch: "Реорганизация Rheinmetall"
 GER_nationalize_heckler_and_koch_desc: "Rheinmetall была жемчужиной в короне корпоративных конгломератов капиталистической Германии. Эта компания с миллиардными оборотами была основной частью производственного костяка бронетанковых сил НАТО, но теперь она принадлежит нам. Вместо того чтобы демонтировать этот агент глобального империализма НАТО, мы национализируем и реорганизуем его, чтобы он служил оборонным целям нового немецкого социалистического государства. Будут реструктурированы отделы, начаты новые проекты, смещены цели производства, и, что самое главное, уничтожены все следы капиталистической корысти и стремления к прибыли. То, что раньше служило для вооружения капиталистического Запада против социализма, теперь станет тем, кто поможет принести социализм во всю Европу."
 GER_a_motorized_army: "Обновить Тактику Мотопехоты"
 GER_a_motorized_army_desc: "Современная война, несмотря на все разговоры о роботах и беспилотниках, по-прежнему в значительной степени зависит от быстро движущихся моторизованных и механизированных формирований. Массы пехоты на БТР и МФВ, быстро маневрирующие, чтобы опередить и уничтожить противника, будут важным фактором в любом будущем конфликте. Учитывая это, мы должны пересмотреть и обновить нашу тактику в отношении моторизации пехоты. Начиная с наших военных академий и заканчивая полевыми подразделениями, фокусировка на ведении боя в рамках этой парадигмы должна стать первостепенной. Подобно старым мотострелковым соединениям ГДР, наши враги вскоре дважды подумают, прежде чем вступать с нами в крупную наземную войну."
 GER_prestigious_german_engine: "Покрасить Небо в Красный Цвет"
 GER_prestigious_german_engine_desc: "История и наша недавняя война научили нас одному: кто контролирует небо, тот и выиграет войну. Люфтваффе не хватало средств для эффективной борьбы с российскими ВВС. Поэтому ВВС будут реорганизованы, а финансирование НИОКР и технического обслуживания самолетов будет увеличено, чтобы еще больше повысить наши шансы на контроль над небом."
 GER_refocus_the_automobile_industry: "Стальной Поток"
 GER_refocus_the_automobile_industry_desc: "Наши приготовления были не менее чем масштабными. Мы собрали тысячи и тысячи людей, построили крепости и заводы, выковали горы брони и стали - такой силы континент не видел уже много лет. Но это больше, чем просто сила. Это нечто гораздо большее. Это коллективная воля и усилия рабочего класса всей Германии, и в ней зарождается нечто страшное. Скоро вся Европа станет свидетелем бури металла и мощи, потока доспехов и пушек, металла и людей, связанных яростью и огнем. Это будет мощь целой нации, брошенной на капиталистов, которая сокрушит их одним стремительным ударом. Некоторые назовут наши планы безумной фантазией, но мы напомним им слова товарища Сталина:\n\n"Нет такой крепости, которую не смогли бы взять штурмом большевики!""
 GER_expand_automobile_factories: "Переориентировать Автомобильную Промышленность"
 GER_expand_automobile_factories_desc: "Комбинированная Война - скоординированное использование пехоты, бронетехники и авиации для уничтожения цели - по-прежнему является краеугольным камнем эффективной современной войны. Крупнейшие и наиболее уважаемые армии планеты, даже сейчас, с появлением автономных систем, все еще опираются на эти принципы, принципы, которые мы должны пересмотреть и обновить. Немедленно мы поручим задачу по современному и всестороннему обновлению этих доктрин нашим самым талантливым умам в генеральном штабе. Наши силы в полевых условиях узнают о важности тактической координации, а также о современных технологиях командования и управления, чтобы сделать ее максимально эффективной и действенной. Как NVA и Варшавский договор поняли и приняли важность объединенных вооружений, так и мы сделаем это сегодня."
 GER_cult_of_speed: "Всесторонний Общевойсковой Бой"
 GER_war_for_the_proletariat: "Война за Пролетариат"
 GER_war_for_the_proletariat_desc: "Хотя война обычно является инструментом капиталистов, используемым для продажи новых пушек, бомб и самолетов, в данном случае мы можем сделать исключение. Русские, если позволить им продолжать свой курс, будут медленно уничтожать все на своем пути, в том числе и своих невинных рабочих. Потом им понадобится еще больше, и они придут за нами, чтобы уничтожить революцию, за которую мы боролись. В итоге проиграют все, поэтому мы обязаны бороться не только за будущее наших рабочих, но и за будущее русских."
 GER_reform_kampfgruppen_arbeiterklasse: "Kampfgruppen der Arbeiterklasse"
 GER_reform_kampfgruppen_arbeiterklasse_desc: "Благодаря рабочему классу революция была обеспечена внутри страны, но многие хотят распространить ее за границу. Вместо того чтобы вернуться на фабрики, эти рабочие скорее возьмут в руки оружие и пойдут на восток, и мы очень восхищаемся их преданностью делу! Поэтому мы сформируем специальные "бригады рабочего класса", чтобы ни один человек не остался в стороне и чтобы всем был дан шанс освободить тех, кто находится под русским игом!"
 GER_the_whisper_from_all_continents: "Шепот со Всех Континентов"
 GER_the_whisper_from_all_continents_desc: "Социализм, в отличие от многих идеологий, кажется естественным конечным результатом индустриализации. Рабочий трудится на заводах, изнемогает в шахтах, строит чудеса из собственной крови, пота и слез. Конечно, он заслуживает крыши над головой, сытого живота и представительства в правительстве! Именно поэтому социализм во всех его формах тихо распространился по всему миру, прочно войдя в сердце каждого мужчины, женщины и ребенка, когда-либо трудившегося на тяжелой работе. Мы будем использовать эти настроения, пока огонь революции не зажжется по всему миру! Разорвите свои цепи, рабочие всего мира!"
 GER_communists_forward: "Коммунисты, Вперед!"
 GER_communists_forward_desc: "Иосиф Сталин произнес фразу, которая, возможно, воплощает коммунистический дух больше, чем что-либо другое: "Ни шагу назад." Будь то промышленность, технология или, в данном случае, война, мы смело отправимся туда, куда еще никто не ступал. Нас не заставят отступить назад ни русские, ни буржуи, ни наши собственные союзники! Мы будем продолжать идти вперед, пока не освободим весь мир!"
 GER_technology_asistance_program: "Американская Программа Технологических Исследований"
 GER_technology_asistance_program_desc: ""
 GER_unrestricted_aerial_bombardment: "Неограниченная Воздушная Бомбардировка"
 GER_unrestricted_aerial_bombardment_desc: "Несмотря на нашу приверженность Женевской конвенции, обстоятельства вынуждают нас пересмотреть свой подход. Русский медведь сумел воспользоваться нашей сдержанностью, чтобы восстановить свой военный потенциал. Чтобы предотвратить дальнейшее возрождение, мы разрешим нашим пилотам наносить авиаудары в глубине российской территории, что позволит им наносить удары по важнейшим узлам снабжения, объектам гражданской инфраструктуры, которые могут быть переоборудованы под временные военные штабы, центры снабжения и заводы, даже с риском жертв среди гражданского населения."
 GER_operation_centre: "§YUNTERNEHMEN§!: STAR" 
 GER_operation_centre_desc: "Польша функционирует как важнейшее буферное государство, эффективно защищая Россию от прямого вторжения и осложняя любые передовые операции. Ее рельеф хорошо подходит для наступательных бронетанковых маневров, но представляет значительные трудности для стратегии "оборона в глубину", что неоднократно демонстрировалось на протяжении истории. Прорыв в Польше обнажит глубину российской территории, открывая доступ к крупным городским центрам."
 GER_operation_normalization: "§YUNTERNEHMEN§!: KOLIBRI"
 GER_operation_normalization_desc: "Польша служит основным щитом, поддерживающим российский фронт в Восточной Европе, и для ее прорыва потребуются значительные ресурсы. Однако продвижение через Словакию, Венгрию и Румынию предлагает альтернативный маршрут в обход этого сильно укрепленного фронта. Большая часть этой местности благоприятна для военных операций, что дает нам стратегическое преимущество. Используя этот путь, мы сможем нанести удар по "Русскому медведю" с неожиданного направления, нарушить его сплоченность и еще больше ослабить его власть над Восточной Европой."
 GER_lure_them_in: "Стратегия Заманивания"
 GER_lure_them_in_desc: ""
 GER_form_free_russian_army: "Сформировать Русскую Красную Армию"
 GER_form_free_russian_army_desc: "Даже в пределах огромной Российской империи существуют коммунистические группы в изгнании и подпольные движения, которые долгое время подавлялись фашистским режимом. Сейчас, когда популярность правящей партии падает, у нас появилась критическая возможность. Установив с ними контакт, мы можем не только изучить возможность интеграции их ополченцев в новую коллаборационистскую армию, но и заложить основу для новой российской политической структуры после завершения конфликта. Эти группы могут послужить основой для формирования послевоенного режима, который отвергнет авторитаризм и будет в большей степени соответствовать нашему видению региональной стабильности."
 GER_europes_finest_hour: "Звездный Час Европы"
 GER_europes_finest_hour_desc: "Ублюдки в бегах! По всему континенту могучие армии и стойкие народы Европы поднялись на борьбу, разрушая цепи фашизма и отвоевывая свою свободу благодаря мужеству и самопожертвованию. Настал момент превратить победу в наследие. Пришло время перестроить Европу не на страхе и расколе, а на фундаменте справедливости и единства."
 GER_quell_fires_of_revolution: "Подавить Хаос Революции"
 GER_quell_fires_of_revolution_desc: ""
 GER_eternal_revolution: "Вечная Революция"
 GER_eternal_revolution_desc: "На протяжении всей истории социалистические движения сталкивались с неустанным подавлением. Но сегодня в движение пришла новая сила. По всей Европе и за ее пределами, на континентах, где долгое время господствовал капитализм и был подавлен фашизм, рабочие поднимаются, разрывая свои цепи и создавая свои собственные утопии. Они больше не субъекты эксплуатации, а архитекторы нового общества.\n\nЕвропа не станет исключением. Она тоже поднимется не как раздробленный континент, управляемый элитами, а как единая сила, созданная рабочим классом и для рабочего класса. Основой нашего будущего станут солидарность, справедливость и коллективная власть народа. Начинается новая эра, и она принадлежит тем, кто трудится, а не тем, кто правит."
 GER_call_for_international_help: "Призвать Интернациональную Помощь"
 GER_call_for_international_help_desc: "По всему миру есть бесчисленное множество убежденных социалистов, готовых поддержать наше дело в социальных сетях, многие даже готовы отдать свою жизнь в борьбе с фашистским режимом в Москве. Кроме того, многие страны сочувствуют нашему делу и поддерживают нашу борьбу.\n\nВступая в контакт с более широкой международной социалистической сетью, мы можем не только укрепить наш глобальный имидж, но и получить жизненно важные ресурсы. Это не только добровольцы для пополнения наших фронтовых сил и внутренней рабочей силы, но и гуманитарная и военная помощь от союзных социалистических государств. Мобилизация этой поддержки необходима для поддержания наших усилий и демонстрации глобального единства перед лицом авторитарной агрессии."
 GER_break_their_spirit: "Сломить Их Дух"
 GER_break_their_spirit_desc: ""
 GER_study_new_strategies: "Изучить Новые Стратегии"
 GER_study_new_strategies_desc: ""
 GER_progress_cult: "Культ Прогресса"
 GER_progress_cult_desc: "На поздней стадии капитализма прогресс измерялся только прибылью. Каждая инновация должна была набивать карманы свиней и служить рынку, а не людям. Теперь молодежь жаждет будущего, не связанного с прошлым. В аудиториях и лабораториях демократической Германии бушуют инновации. Мы не скрываем свои амбиции, мы празднуем их. Наука и разум - это не инструменты буржуазии, которых нужно бояться, это оружие в арсенале рабочих. Общество, которое отказывается развиваться, уже мертво."
 GER_propagandize_the_war_effort: "Пропагандировать Военные Усилия"
 GER_propagandize_the_war_effort_desc: "Пропаганда - одно из самых мощных оружий в любой борьбе, не только для разоблачения врага, но и для пробуждения и объединения народа. На войне поддержка масс не обязательна, она необходима. Без народа нет ни армии, ни сопротивления, ни революции. Поэтому мы должны показать немецкому народу нашу правду и то, за что он борется. Мы должны дать им понять, что они сражаются не за флаг или границу, а за рассвет новой Европы, свободной от капиталистической эксплуатации и реваншистских отбросов, которые вечно терзали этот континент на протяжении тысячелетий."
 GER_relocate_the_industry: "Переместить Промышленность"
 GER_relocate_the_industry_desc: ""
 GER_chancellors_guiding_hand: "Направляющая Рука Канцлера"
 GER_chancellors_guiding_hand_desc: ""
 #Day X
 GER_gotterdammerung: "Götterdämmerung"
 GER_gotterdammerung_desc: "Война подходит к своему завершению, и ее последствия будут ощущаться по всему европейскому континенту еще не одно поколение. Германия, как и многие ее союзники по НАТО, лежит сейчас в полном опустошении. Наши города превратились в руины в результате непрекращающихся российских бомбардировок, на улицах валяются трупы, а отчаявшиеся семьи ищут своих близких, копаясь среди обломков, чтобы если не найти их живыми, то хотя бы извлечь останки. И снова нашу нацию позорит старый враг - тот, которого мы считали ушедшим в историю в 1991 году. Мы представляли себе это столетие как эру мира и процветания, время искупления вины за прошлое и формирования нового обнадеживающего будущего. Но мы ошибались. Угроза с Востока никогда не исчезала, она просто дремала, ожидая момента, чтобы нанести удар. Эта война стала для нас расплатой, жестоким пробуждением от наивного самодовольства. Теперь сердца наших людей полны ненависти и ярости, их жажда мести неутолима. И все же пока мы должны терпеть. Мы должны сжать кулаки и опустить голову перед красной угрозой, приступая к тяжелой работе по восстановлению. Но не заблуждайтесь - Германия не останется в руинах навсегда. Мы снова поднимемся. Мы победим. И в конце концов окончательная победа будет принадлежать Германии."
 GER_promise_recovery: "Пообещать Восстановление"
 GER_promise_recovery_desc: "Наше унижение от рук русских подорвало доверие населения к правительству и разрушило нашу некогда процветающую экономику. Народ требует, чтобы мы продолжали заботиться о нем и задавать вопросы, на которые у нас нет ответов.Мы не можем позволить себе успокаиваться, следующие несколько месяцев будут одними из самых трудных в нашей истории. Мы восстановим, мы реформируем, и мы отвоюем нашу гордость у русских!"
 GER_convene_with_nato: "Созваться с НАТО"
 GER_convene_with_nato_desc: "Никто из наших союзников по НАТО не находится в лучшем положении, чем мы, и они даже не хотят думать о новой войне с Россией. Однако мы не можем просто сидеть сложа руки, наблюдая за тем, как медведь продолжает укрепляться. Необходима глубокая чистка, и мы должны сделать так, чтобы НАТО стала тем, чем она себя представляет. Сильной, единой военной силой, способной защитить свой народ."
 GER_facit_omnia_voluntas: "Facit Omnia Voluntas"
 GER_facit_omnia_voluntas_desc: "Слишком долго нашей страной управляли толкатели карандашей и продажные свиньи, набивавшие карманы за счет корпоративных интересов, в то время как наша сила угасала. Именно они привели нас к поражению, к разрушению, к падению. Под их нерадивым руководством бундесвер пришел в упадок, как забытая реликвия, заброшенный, пока они обогащались и растрачивали наши ресурсы на бесполезные начинания. Но сегодня всему этому придет конец. Слабость больше не будет определять вооруженные силы Германии. Мы восстановим честь, дисциплину и силу, которые когда-то определяли нашу грозную нацию. Наследие прусской славы и военного превосходства возродится. Наша армия перестанет быть чем-то второстепенным - она станет силой, которой боятся наши враги и которую уважает весь мир. Настало время для восхождения новой Германии. Более сильной Германии. Решительной, гордой и стойкой в борьбе с иностранной агрессией. Мы больше не дрогнем. Мы больше не преклоним колени. С этого дня Германия непоколебима."
 GER_nato_war_recovery: "Возродить Вооруженные Силы"
 GER_nato_war_recovery_desc: "Еще до войны с Россией наши вооруженные силы находились не в лучшем положении. Несмотря на то что они все еще были впечатляющими и современными, они в значительной степени зависели от американцев. Без них мы были легко унижены русскими. Мы не можем позволить себе снова проиграть медведю. Отныне мы можем полагаться только на себя, и не факт, что это будет проблемой. На протяжении веков немецкая армия была предметом зависти всего мира, и она снова станет таковой. Именно мы должны создать армию, которая оправдает ожидания наших предков."
 GER_en_treue_fest: "Ruhm des Vaterlandes"
 GER_en_treue_fest_desc: "Германия - страна с одной из самых длинных и выдающихся военных историй среди всех европейских государств. Под знаменами империи мы одержали великие победы, воспитали гениальных генералов, создали революционные доктрины и повлияли на ход истории человечества. Мы были нацией людей, изменивших судьбу этого континента, и теперь наш народ должен это знать. Мы будем распространять послание, пропагандировать наше прошлое, рассказывать о великих людях, которые когда-то руководили нами, и вызывать фанатичное возбуждение страстей у всей немецкой нации. Вскоре каждый немец будет демонстрировать абсолютную преданность и готовность чтить и восстанавливать славу отечества сейчас и в будущем."
 GER_gott_ehre_vaterland: "Koalition von Schwarz-Weiß-Rot"
 GER_gott_ehre_vaterland_desc: "Когда была вершина вооруженных сил Германии? Вермахт? Бундесвер? Правда в том, что ни одна из них даже близко не стояла к пику нашей военной доблести. Каждая из них черпала свои традиции и самобытность из Пруссии, которая позже стала Германской империей. Поэтому мы должны воссоздать нашу армию по их образу и подобию. Только через возрождение прусского милитаризма и военной исключительности мы сможем эффективно защитить нашу страну и народ от надвигающейся угрозы на Востоке. И снова наша воля будет выкована в железе, наш народ станет сильным и чистым, а наша кровь будет гореть непоколебимой жаждой мести."
 GER_national_service: "Национальная Служба"
 GER_national_service_desc: "Когда-то Германия славилась своей военной доблестью и мощью. Королевство Пруссия было признано во всем мире как военное государство, имея четвертую по величине армию в Европе, несмотря на то что ее население составляло лишь часть населения Европы. Сегодня, рассуждая о германском милитаризме, многие вспоминают о двух мировых войнах. Однако на самом деле без сильных вооруженных сил наша нация была бы слабой и легко сломленной иностранными агрессорами. Без мощной армии Пруссия никогда бы не смогла объединить Германию в национальное государство. Без военной мощи мы бы рухнули под натиском с двух фронтов, как австрийцы во время Первой мировой войны. Не имея надежной обороны, мы не смогли бы сопротивляться, и наш народ был бы истреблен большевиками, как скот, во время Второй мировой войны. Милитаризм всегда был и всегда будет центральным элементом немецкого народа и его идентичности. Сейчас, когда наши противники вновь приближаются к нашим границам, нам нужна свежая кровь для пополнения рядов наших вооруженных сил. Поэтому мы должны восстановить обязательную воинскую повинность, от которой мы когда-то по глупости отказались."
 GER_rehabilitate_the_kaiser: "Реабилитировать Кайзера"
 GER_rehabilitate_the_kaiser_desc: "Что определяет Германию как нацию? Одни могут утверждать, что это наша богатая культура и традиции, другие - что наши знаменитые технологические достижения и стремление к качеству. Но правда в том, что до конца XIX века само понятие единой немецкой нации и народа было расплывчатым и неконцептуальным. Только благодаря Божьей милости и мудрому руководству Гогенцоллернов мы, немцы, смогли вырваться из тисков австрийского и галльского влияния. Без стратегического гения Бисмарка, непоколебимой храбрости Мольтке и, прежде всего, руководства нашего кайзера, Вильгельма I, Германия в том виде, в котором мы знаем ее сегодня, не существовала бы. Именно Пруссия и наши кайзеры выковали нашу нацию, сформировав ее с помощью крови, железа и непреклонной решимости. Теперь, когда Бавария отделилась от нашей нации, братья снова разделены границами, навязанными иностранными интересами. Никогда еще не было так важно напомнить нашему народу о борьбе наших предков и о важности нашего единства. Именно непреклонный дух нашего народа и направляющая рука кайзеров создали Германию, которая прочно стояла на мировой арене, и сформировали нацию, которая боролась за свое законное место под солнцем. Мы не должны забывать об их наследии, ведь оно является фундаментом, на котором строится наша идентичность и культура."
 GER_eliminate_the_dregs: "Избавиться от Отбросов"
 GER_eliminate_the_dregs_desc: "Наша империя не может быть построена, если с нами сосуществуют те самые элементы, которые стремятся ее разрушить. Социалистические агитаторы, лжеконсерваторы и предательские либералы. Эти люди подрывают наш авторитет, утверждая, что это «ради блага Германии». Хотя именно мы и кайзер знаем, что лучше для нашего народа.\n\nПолицейские полномочия будут расширены, верные военные получат свободу действий, а гражданские свободы временно ограничены во имя стабильности. Составляются черные списки, ускоряются судебные процессы, подавляются подпольные движения. Эта чистка, хотя и противоречивая, необходима для того, чтобы наша Империя стояла твердо. Она также послужит предупреждением: новая Германия не будет скована слабыми идеалами Веймарской эпохи. Только через огонь наша нация сможет возродиться."
 GER_restore_imperial_laws: "Восстановить Имперские Законы"
 GER_restore_imperial_laws_desc: "Если и есть документ, который действительно определяет немецкую нацию, то это документ, созданный по образу и подобию кайзера. Конституция 1871 года вознесла наш народ на новые высоты, и только после того, как весь мир объединился против нас, она заставила нас опуститься. Несмотря на необходимость некоторых изменений для модернизации, дух империи Бисмарка должен быть возрожден в законе.\n\nДворянские титулы восстановлены, роль кайзера как главы государства восстановлена в официальных документах, а министерства реструктурированы, чтобы отразить имперский приоритет. Бюрократы-лоялисты получают повышение, а в государственные учреждения возвращается монархическая символика. Эти правовые реформы не просто отражают ностальгию, они являются конкретным шагом к демонтажу демократических институтов, которые удерживают нашу страну на задворках мировой политики. Традиционная элита и консервативные союзники с радостью помогут нам в принятии этих законов, в обмен на то, что они тоже получат от них выгоду."
 GER_the_army_with_a_state: "Армия с Государством"
 GER_the_army_with_a_state_desc: "Либеральные лжецы заставили нас поверить в то, что правильным способом функционирования является государство с армией. Вместо этого мы создаем армию, которая станет основой самого государства. Рейхсверу отводится расширенная роль во внутренней и внешней политике, он фактически становится хранителем имперской реставрации. На ключевые гражданские посты назначаются военные с монархическими наклонностями, а армия реорганизуется по имперскому образцу. Преданность кайзеру становится обязательным условием продвижения по службе. На практике это создает преторианское государство, в котором военные гарантируют внутренний порядок, подавляют инакомыслие и готовят нацию к новой роли на мировой арене. Дисциплина и эффективность заменяют дебаты и компромиссы. Разумеется, против такой точки зрения будут возражать, но наш народ требует этого, и мы не можем отказать ему в гневе."
 GER_power_to_the_regency: "Власть Регенту"
 GER_power_to_the_regency_desc: "Только до тех пор, пока кайзер не вернется на свой трон, будет действовать регентский совет, который будет руководить немецкой нацией с почти полной властью. Совету будет предоставлена полная власть над тремя ветвями власти. Состоящий из доверенных дворян, генералов и политических лоялистов, регентский совет начнет проводить реформы и издавать указы с императорской легитимностью.\n\nЭто можно рассматривать и как просчитанный компромисс. Еще не полная монархия, но уже и не республика."
 GER_exert_influence_over_our_allies: "Оказывать Влияние на Наших Союзников"
 GER_exert_influence_over_our_allies_desc: "Наши союзники в Европе не руководствуются теми же интересами, что и мы сами. Однако, в отличие от прошлого, наши мотивы не направлены на вторжение. С помощью дипломатического давления, торговых соглашений, обмена разведданными и тонких подрывных действий мы продвигаем свою сферу влияния по всей Европе.\n\nСтраны, уже функционирующие в рамках монархических традиций, должны быть агрессивно обхаживаемы. Мы - защитники нового европейского порядка, но пока мы не должны подчиняться ему. Только до тех пор, пока наших союзников можно будет назвать таковыми, мы сможем считать свое глобальное положение высшим."
 GER_1918_undone: "Отмена 1918"
 GER_1918_undone_desc: "Весь наш путь, все наши планы по повороту истории можно наконец объявить завершенными. Позор 1918 года, отречение от престола, безжалостный Версальский договор. Все это отомщено. С возвращением кайзера на трон ошибки прошлого не только исправлены, но и стерты.\n\nПарады заполняют улицы наших городов, когда красный, белый и черный флаги снова пролетают над Берлином. Теперь наша монархия не забыта, не символична, а верховна. Благодаря дипломатии и крови мы снова стали великой державой. Какими бы ни были предстоящие испытания - легкими или тяжелыми - для нашей нации, ясно одно: империя вернулась, и 1918 год больше не является трагическим концом, а всего лишь заминкой в вечном марше немецкого величия."
 GER_cameralism_in_21st_century: "Камерализм в 21 веке"
 GER_cameralism_in_21st_century_desc: ""
 GER_centralize_the_economy: "Централизовать Экономику"
 GER_centralize_the_economy_desc: ""
 GER_to_crown_a_king: "Короновать Короля"
 GER_to_crown_a_king_desc: ""
 GER_guns_of_the_future: "Оружие Будущего"
 GER_guns_of_the_future_desc: "Если мы хотим выиграть наши войны против наших врагов, мы должны отдать предпочтение качеству, а не количеству. Более того, мы должны смотреть в будущее. Войны эволюционировали, как и оборудование, которое люди используют для ведения войн. Некоторое из этого оборудования даже не требует участия людей. Мы доведем эти технологии до крайности и сделаем так, чтобы ни один враг на нашей планете никогда не имел тактического преимущества над нашими арсеналами.\n\nУмное огнестрельное оружие, оружие с искусственным интеллектом, экзоскелеты, оружие прямой энергии, космические системы обороны, электромагнитные рельсовые пушки, гиперзвуковые ракеты - все это и многое другое должно стать главным приоритетом наших ученых. Только тогда мы обеспечим себе надежное преимущество над врагами. Сколько бы оружия они ни использовали против нас, достаточно будет нескольких наших, чтобы отправить их обратно за Урал."
 GER_unconventional_weapons: "Неконвенциональное Оружие"
 GER_unconventional_weapons_desc: "Человеческая мораль всегда была вызовом, с которым наш народ сталкивался и на который поддавался много раз. Одним из них стало подписание Женевской конвенции, объявившей, что оружие непригодно для использования и должно быть классифицировано как "военное преступление," когда сообщается о его применении. Подобные слабости сдерживали наш народ на протяжении многих лет! Война - дело некрасивое, поэтому неправильно делить боевое оружие на наиболее и наименее красивое. В бою вы не беспокоитесь о том, какие приемы могут нанести человеку меньший ущерб, вы беспокоитесь о том, чтобы не умереть на хрен!\n\nВ тайне мы будем разрабатывать это оружие. Медленно, но верно, влияние Женевы на наши запасы и солдатские умы. Чтобы выиграть войну, мы должны отказаться от нашей морали, от наших основных принципов, касающихся жизни и смерти. Только тогда мы одержим победу над врагом, ослепленным глобалистами и их верой в "мир." Давайте поставим их на место."
 GER_aggressive_rearmament: "Агрессивное Перевооружение"
 GER_aggressive_rearmament_desc: ""
 GER_soldiers_of_the_future: "Солдаты Будущего"
 GER_soldiers_of_the_future_desc: "Принять будущее означает многое. Мы должны изменить нашу тактику, наши технологии, но, пожалуй, самое важное, что мы должны изменить, - это наш менталитет. Наш дух победы. Наш дух проливать кровь во имя нашей родины. Этот менталитет должен быть возрожден. И не только это, но и то, что он должен адаптироваться к нашему новому образу жизни. Нашему образу борьбы. Нашему образу войны. Наша вера в то, что выживет сильнейший. Это должно отразиться на наших солдатах.\n\nОни должны быть безжалостными в своих атаках, верными в своих убеждениях и едиными со своими технологиями. Наши враги будут смотреть на них не как на соперников или, по крайней мере, людей, а как на роботов. Лишенные всякого выражения лица и жаждущие мести. В ответ мы будем смотреть на наших врагов с таким недоверием, что некоторые из них начнут сомневаться в их человечности.\n\nЭти солдаты будут выигрывать наши войны."
 GER_air_innovations: "Воздушные Инновации"
 GER_air_innovations_desc: "Современные технологии многое изменили в ведении боевых действий в небе. Передовые вычислительные технологии, покрытия "стелс" и даже интеграция искусственного интеллекта меняют авиацию быстрее, чем мы могли предположить. Настало время подхватить ветры перемен вместе с нашими военно-воздушными силами. Мы немедленно адаптируем все эти новые технологии и создадим институты и механизмы, которые сделают возможными дальнейшие инновации. Наши истребители будут нестись по небу, используя самые передовые технологии, а за их спинами будут стоять великие умы, готовые держать нас впереди, что бы ни бросил в нас враг."
 GER_deutschland_erwacht: "Deutschland Erwacht"
 GER_deutschland_erwacht_desc: "Когда-то Германия была выдающейся страной, а главное - страной с хребтом. Теперь этот хребет сломан, его зубы раздроблены мощным ударом, а гордость унесена ветром. Меч нашей страны - наша армия - остался ржаветь, а жизненная сила нашей страны - наш народ - был в отчаянии брошен коварными глобалистами. В такие времена можно только вспоминать о золотых днях, о тех эпохах, когда наша страна имела мужество постоять за себя и бороться за свое законное место на мировой арене. После поражения в 1945 году и разделения нашей родины наш дух был подорван, а призраки прошлых поражений продолжают преследовать нашу национальную психику. Но сегодня немецкая нация наконец-то пробудится от своего долгого сна. Подобно парящему орлу, она вновь поднимется ввысь, отбросив все угрозы для своего народа. С этого момента Германия и ее народ снова едины и вместе идут к победе."
 GER_our_noble_cause: "Наше Благородное Дело"
 GER_our_noble_cause_desc: "Призрак коммунизма нависает над Европой темной, красной тенью. Советский Союз считали низвергнутым в ад, но, опять же, то же самое думали и о нас. История повторяется снова. На этот раз нет союзников, способных отвлечь наше полное внимание, нет глупцов, способных предать наше благородное дело. С 1936 года мы посвятили свои силы полному уничтожению большевистской чумы! И сегодня мы снова должны нести это бремя на своей спине!\n\nТак как Ленинград снова восстал, как Сталинград снова восстал! У нас есть еще один шанс исправить ошибки наших предков! Еще один шанс освободить мир от большевистской орды! Еще один шанс обеспечить будущее немецкой расы! Наше дело благородно! Оно свято! Оно для самой души всех народов!\n\nНести этот факел - большая честь. Сжигать им красных? Это удовольствие."
 GER_reenter_bavaria: "Вернуться в Баварию"
 GER_reenter_bavaria_desc: "Глупцы из Баварии предприняли возмутительную попытку провозгласить независимость и отделиться от Германии, даже обратившись за поддержкой к Австрии. Мы не можем позволить им дольше оставаться у власти, потому что, если мы будем медлить, они смогут собрать большую базу сторонников и отравить умы нашей страны, что в конечном итоге приведет к нашему краху."
 GER_radacalize_the_masses: "Радикализировать Массы"
 GER_radacalize_the_masses_desc: "С 1945 года наш народ придерживался культуры пацифизма и в основном отвергал идею Великой Германии. Времена изменились, наша страна находится в тяжелом положении, и многие немцы, чувствующие себя брошенными прежним правительством, обратились к нам. Мы должны использовать такую возможность, чтобы увеличить нашу поддержку и еще больше укрепить наши позиции."
 GER_eternal_alliance: "Заключить Вечный Союз"
 GER_eternal_alliance_desc: "Многим ясно, что мы не можем победить Советы в одиночку. По мере того как Западная Европа освобождалась от коррумпированных бюрократов, многие националистические правительства выходили из конфликтов, что открывало возможность для создания альянса против красной угрозы, чтобы окончательно покончить с ней раз и навсегда."
 GER_assist_our_greek_brothers: "Помочь Нашим Греческим Братьям"
 GER_assist_our_greek_brothers_desc: "Греки были одной из тех наций, которых не обошло стороной жестокое кровопролитие после окончания Европейской войны. Две основные фракции поднялись, чтобы захватить власть, и одна из них, «Золотая заря», недавно искала связи с нами. Золотая Заря, как и мы, была замалчиваема и угнетаема бюрократами в Афинах в течение многих десятилетий, и теперь они наконец получили свой шанс свергнуть коррумпированных марионеток у власти.\n\nГреция будет служить большим потенциальным союзником, поскольку она открывает еще один фронт против Советов, который мы можем использовать, чтобы одолеть их."
 GER_fall_orange: "§YFALL§!: ОРАНЖЕВЫЙ"
 GER_fall_orange_desc: ""
 GER_support_nationalists: "Поддержать Европейских Националистов"
 GER_support_nationalists_desc: "После окончания Европейской войны во многих странах начались беспорядки, к власти пришли националистические правительства. Многие из этих государств находятся в тяжелом положении и уязвимы перед более крупной Красной угрозой на востоке, поэтому мы должны обратиться к ним и предложить им союз, чтобы укрепить нашу постоянно растущую коалицию."
 GER_recruit_foreign_legions: "Разрешить Вербовку в Иностранный Легион"
 GER_recruit_foreign_legions_desc: "В различных социальных сетях все большее число добровольцев-энтузиастов из нескольких европейских стран выражают готовность внести свой вклад в оборону и развитие нашей великой страны. Этот всплеск иностранной поддержки представляет собой ценную возможность, которую не следует упускать. Эти добровольцы могут быть быстро интегрированы в нашу национальную рабочую силу, помогая укрепить нашу промышленную базу, или направлены в ряды наших вооруженных сил, где они смогут выполнять важные вспомогательные и логистические функции."

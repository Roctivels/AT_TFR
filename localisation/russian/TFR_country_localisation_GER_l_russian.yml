 TFR_Anarchy_ZZZ_tt_delayed: "Разрушение семейных структур и неумолимый характер ежедневного выживания - это не просто психологические кризисы.\n\nЭто симптомы более глубокого материального распада.\n\nВ мире, где жилье недоступно, продукты питания разрабатываются для хранения, а не для питания, а работа бесконечна, но бессмысленна, отсроченное удовлетворение становится не столько добродетелью, сколько жестокой шуткой.\nС развитием ультраглобализма это обещание было перечеркнуто, погребено под слоями бетона, дешевого пластика и морских контейнеров, наполненных одноразовым будущим.\n\nТо, что было потеряно, не просто сентиментально: продовольственная безопасность, системы поддержки общин, время для творческого труда и свобода формировать свое окружение - все это под угрозой.\nГолод оттачивает поведение.\nНедостаток пищи, ненадежное жилье и постоянный шум, буквальный и идеологический, доводят людей до крайностей.\nНе в вере дело.\n\nНе осталось никакой последовательной идеологии, никакого действующего центра управления.\nПросто разгромленные витрины магазинов, пустующие дома и инфраструктура, разрушающаяся под воздействием запустения и мародерства.\n\nСимволы власти пали не из-за восстания, а из-за неактуальности.\nЛюди восстают не из-за какого-то великого видения; они пытаются отвоевать физическое пространство, время и ресурсы. Если не для себя, то хотя бы для того, чтобы их дети не унаследовали пустошь."
 

 GER_left_acceleration_idea: "Евросоциализм"
 GER_left_acceleration_idea_desc: "Маркс всегда говорил, что история развивается поэтапно, что люди являются продуктом экономических и социальных условий своего времени. Мы ничем не отличаемся от них, и социализм, который мы строим, именно таков. Это социализм для нашего места и времени; евросоциализм. Злоупотребления капитализма продолжаются и по сей день, но теперь в тандеме с новыми кризисами, включая неоколониализм, расизм, разрушение окружающей среды, глобалистское капиталистическое господство и многое другое. Но вместо того, чтобы оставаться в прошлом, мы должны принять этот вызов с энергией и рвением. Как изменился капитализм, так должны измениться и мы, и если мы этого не сделаем, то можно ожидать, что революция заглохнет быстрее, чем изменятся тенденции в глобальной сети Интернет."

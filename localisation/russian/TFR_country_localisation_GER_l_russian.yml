 GER_eu_green_deal_desc: "Не нужно быть гением в области экологии, чтобы понять, что изменение климата губит нашу планету. Уровень моря повышается, глобальные температуры растут, а времена года становятся все более изменчивыми. Это нанесет удар не только по нашей экономике или счетам за кондиционеры, но и по нашему будущему как страны. Однако мы не будем ждать, пока окружающая среда испарится вокруг нас. После значительных бюджетных затрат, обсуждений между странами-членами и тонны работы и строительства "Зеленый Ккурс" ЕС стал реальностью. Возобновляемые источники энергии - солнечная, ветровая и гидроэлектрическая - теперь составляют более значительную часть энергопроизводства на континенте. Старые источники ископаемого топлива быстро выводятся из употребления, а переход на более чистые методы происходит так же быстро. Надеемся, что все это станет первыми шагами к созданию долгосрочного решения не только для континента, но и для планеты."

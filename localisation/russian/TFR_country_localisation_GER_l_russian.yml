 GER_catharsis1: "Катарсис"
 GER_catharsis1_desc: "Цивилизация издавна определялась способностью подавлять первобытное насилие в пользу структурированного сосуществования.\nВ современном европейском обществе Европейский Союз опирается на это негласное соглашение о подавлении наших более разрушительных импульсов, потому что он сложен, взаимозависим и деликатно поддерживается.\n\nВ эпоху, отмеченную нейронными имплантами, психосоциальной эрозией и систематическим подавлением фундаментального человеческого опыта, этот баланс становится все более шатким.\n\nКогда эта коллективная сдержанность начинает давать сбои, всплывает память о том, на что мы способны. Такое воспоминание не будет иметь никаких гражданских последствий.\n\n§t"То, что Аристотель называл словом катарсис — «очищение через переживание». Этому явлению свойственен мощный эмоциональный взрыв и психологический шок, вызванный переживанием новой истины и осязанием скрытых сторон действительности. Его результат — нравственное перерождение человека" - Николай Дыбовский§!"

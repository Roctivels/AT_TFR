 GER_democratic_national_front_idea: "Демократический Национальный Фронт"
 GER_democratic_national_front_idea_desc: "Правление новой социалистической Германией не может осуществляться только нами и сразу же рассматриваться как полностью консолидированное, оно должно охватывать весь рабочий класс. Для этого и был создан Демократический национальный фронт, чтобы политически объединить нацию в нестабильной социальной среде и придать большую легитимность нашему правлению. С нашей партией во главе и при поддержке других политических и общественных организаций мы можем ожидать, что это вскоре закрепит наши позиции в качестве ведущей власти в стране."
 GER_new_stasi_idea: "Новая Штази"
 GER_new_stasi_idea_desc: "После завершения реформы немецких спецслужб в нашем распоряжении оказался орган по сбору разведывательной информации, с которым не может соперничать ни один другой на континенте. Как и старая восточногерманская Штази, это обширная организация, в которой работают талантливые агенты и специалисты, ревностно преданные делу поиска и устранения врагов революции. Однако теперь у них будет доступ к самым современным инструментам шпионажа, которые, по иронии судьбы, были разработаны нашими капиталистическими предшественниками. Современные технологии и методы в сочетании с принципами и тактикой старого Министерства государственной безопасности сделают наши операции по сбору информации просто беспрецедентными. Наша "новая" Штази будет внушать страх нашим самым сильным противникам, настолько, что они будут мечтать о старой Штази из XX века.\n\nЭто будет наш меч с глобальным охватом и щит без слабых мест вплоть до нанометра."
 GER_new_stasi_2_idea: "Новая Штази"
 GER_new_stasi_2_idea_desc: "После завершения реформы немецких спецслужб в нашем распоряжении оказался орган по сбору разведывательной информации, с которым не может соперничать ни один другой на континенте. Как и старая восточногерманская Штази, это обширная организация, в которой работают талантливые агенты и специалисты, ревностно преданные делу поиска и устранения врагов революции. Однако теперь у них будет доступ к самым современным инструментам шпионажа, которые, по иронии судьбы, были разработаны нашими капиталистическими предшественниками. Современные технологии и методы в сочетании с принципами и тактикой старого Министерства государственной безопасности сделают наши операции по сбору информации просто беспрецедентными. Наша "новая" Штази будет внушать страх нашим самым сильным противникам, настолько, что они будут мечтать о старой Штази из XX века.\n\nЭто будет наш меч с глобальным охватом и щит без слабых мест вплоть до нанометра."

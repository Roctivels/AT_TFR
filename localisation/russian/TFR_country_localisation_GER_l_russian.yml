 GER_new_european_crusade: "Новый Европейский Крестовый Поход"
 GER_new_european_crusade_desc: "На протяжении всей истории российская агрессия приносила Европе только боль, смерть и разрушения. Более 80 лет назад наши предшественники пытались уничтожить угрозу, которая когда-то исходила из Москвы. Хотя им это не удалось, история предоставила нам еще один шанс. Сегодня мы противостоим той же самой силе, которая распространилась по Европе, разлагая культуры, заглушая самобытность, причиняя боль и разрушения, но сегодня этому будет положен конец.\n\nОбъединенные нашей кровью, духом и целью, мы будем маршировать, не только чтобы отомстить за прошлое, но и чтобы построить будущее, в котором Европа будет суверенной и неустрашимой против любой силы, которая попытается ее уничтожить. Пришло время нанести удар в сердце зверя, отрубить ему голову и оставить гнить в истории."
 GER_gun_for_every_hand_tank_for_every_battalion: "По Пистолету в Каждой Руке, по Танку в Каждом Батальоне"
 GER_gun_for_every_hand_tank_for_every_battalion_desc: ""
 GER_unleash_our_fury: "Дать Волю Нашей Ярости"
 GER_unleash_our_fury_desc: ""
 GER_europa_united: "Объединенная Европа"
 GER_europa_united_desc: ""
 GER_crush_the_resistance: "Сокрушить Сопротивление"
 GER_crush_the_resistance_desc: ""
 GER_our_allies_abroad: "Наши Союзники за Рубежом"
 GER_our_allies_abroad_desc: ""
 GER_improve_logsitic_capabilities: "Улучшить Логистические Возможности"
 GER_improve_logsitic_capabilities_desc: "Снабжение. Это слово в прошлом создавало большие проблемы для Европы. Не только когда мы впервые попытались противостоять Советам во время Второй мировой войны, но и Наполеон потерпел поражение из-за кошмара логистики, в который превратилась эта война.\n\nНо сейчас мы должны учиться на своих ошибках. Логистика должна стать одним из наших главных приоритетов. Благодаря улучшенной инфраструктуре или управлению искусственным интеллектом, наши грузы будут прибывать в кратчайшие сроки, чтобы помочь нашим войскам, которые сейчас голодают в России."
 GER_fall_lazarevic: "§YFALL§! LAZAREVIC"
 GER_fall_lazarevic_desc: "Польша и Словакия продолжают служить оборонительным оплотом Советского Союза, эффективно блокируя любые попытки северного прорыва, мы также не проводили никаких операций через Венгрию из-за ее тесной боевой зоны. Однако потенциально слабое место остается. В бывшей Югославии Советы установили марионеточный режим, военные силы которого значительно слабее наших, а политическая ситуация нестабильна. Мы воспользуемся этой уязвимостью, чтобы начать прорыв и в то же время установить контакты с балканскими националистическими группировками, ускорив их распад. Продвигаясь через Словению и Грецию в Болгарию и остальные страны, мы ликвидируем нелегитимное правительство в Софии и разрушим советскую власть на Балканах."
 GER_fall_bassenheim: "§YFALL§!: BASSENHEIM"
 GER_fall_bassenheim_desc: "У человечества рак. И этот рак - Советский Союз. Им слишком долго позволяли существовать на землях Евразии, разрушая человеческий дух каждой своей жизнью. Единственная надежда для этих земель - если мы сами их цивилизуем. Как и Тевтонский орден до нас, мы будем нести наше слово всем, кого отравили иудо-большевики.\n\nПусть это будет наша последняя борьба. Пусть это будет наш последний рывок. Пусть мы наконец войдем в рушащуюся советскую структуру и увидим, как она рушится перед нами. Пусть рак человечества будет удален из наших умов. Пусть мы будем жить в мире. Все, что нам нужно, - это последний рывок. Все, что нам нужно, - это победа."
 GER_tactical_domination: "Тактическое Доминирование"
 GER_tactical_domination_desc: "Мы не должны обманывать себя слишком сложными теориями и другими запутанными доктринами. Наша главная цель ясна и понятна: враг должен быть уничтожен. Никакие другие концепции не должны занимать центральное место. Зная это, наши военно-воздушные силы сосредоточатся на уничтожении противника на поле боя и распылении его способности к организации и ведению боевых действий. От непосредственной поддержки с воздуха до разведки и уничтожения ценных тактических средств противника; наши ВВС превратят жизнь врагов в ад. Их солдаты будут дрожать и содрогаться при мысли о том, чтобы открыть себя небу, в котором будем господствовать мы."
 GER_return_to_gold_standard: "Возвращение к Золотому Стандарту"
 GER_return_to_gold_standard_desc: ""
 GER_suspend_consumer_economy: "Приостановить Потребительскую Экономику"
 GER_suspend_consumer_economy_desc: ""
 GER_exploit_conqured_nations: "Эксплуатировать Покоренные Народы"
 GER_exploit_conqured_nations_desc: ""
 GER_improve_logistic_capabilities: "Улучшить Логистические Возможности"
 GER_improve_logistic_capabilities_desc: ""
 GER_wartime_advancements: "Достижения Военного Времени"
 GER_wartime_advancements_desc: "Война - это не только жертвы и кровопролитие, она также может принести непредвиденные инновационные достижения, будь то гражданские или военные. Будь то вторая или первая мировая война, бесчисленное количество потерянных жизней было обменено на невообразимые ранее технологические достижения. Кажется, что каждая война, которую мы ведем, каждая капля крови, которую мы проливаем, приводит к эволюции человеческого вида. Несомненно, наша война с русскими будет более смертоносной, чем любая другая, которая когда-либо велась ранее. Однако не стоит огорчаться, ведь их кровь станет топливом, приводящим в движение шестеренки человеческой истории."
 GER_prepare_thenation: "Подготовить Нацию"
 GER_prepare_thenation_desc: "По мере того как на континенте нарастает недовольство и напряжение, мы осознаем то, о чем мало кто задумывался раньше. Грядет война, и немецкий народ должен быть к ней готов. Граждане будут воодушевлены на борьбу, мужчины будут призваны в резерв, женщины мобилизованы для работы в тылу, города будут укреплены и подготовлены к штурму, а запасы будут распределены. Прошлые ошибки, когда население оставалось в неведении и не было готово к трудностям, здесь не повторятся. Не будет ничего, кроме полной реорганизации и мобилизации общества. Смерть и разрушения могут прийти к нам, но каждый немецкий мужчина, женщина и ребенок смогут встретить их с уверенностью и решимостью."
 GER_revive_the_fallschirmjager: "Возродить Fallschirmjager"
 GER_revive_the_fallschirmjager_desc: "Без сомнения, одними из самых элитных спецподразделений, которыми располагала Германия, были "Fallschirmjager." Одно их название говорит о них достаточно: "Охотники за парашютами." Они выполняли самые дерзкие задания Люфтваффе во время войны, такие как захват Крита.\n\nМы повторим эти достижения, возродив это подразделение. Эти люди будут одними из самых выносливых не только в Германии, но и во всем мире. Они специализируются на парашютной и воздушно-десантной подготовке для наших более продвинутых технологий. Доблестное подразделение, отличающееся дисциплиной и агрессивностью. Оно должно внушать ужас и уважение лидерам наших врагов и уничтожать их войска."
 GER_strength_and_glory: "Сила и Слава"
 GER_strength_and_glory_desc: "Слабость - это не слово из немецкого словаря. Наша страна была выкована в железе, наш народ сформирован кровью, наша воля - адским пламенем. С тех пор как тевтонские рыцари поселились на этой земле, ее населяют солдаты и воины, каждый из которых храбрее другого, каждый готов пожертвовать собой ради своей родины. В отличие от американцев, которые гордятся такими мелочами, как свобода и разнообразие, или надоедливых французов, которые находят повод для гордости в вине и сыре, гордость и слава Германии уходят корнями в глубокую историю военной доблести и силы нашего народа."
 GER_true_to_form: "Верны Своей Форме"
 GER_true_to_form_desc: "Всего четыре с половиной десятка лет назад, когда отцы наших отцов еще только оправлялись от позорного поражения в Первой мировой войне, новая и энергичная идеология, горящая жаждой реванша, вернула гордость и мужество немецкой нации и народу. Национал-социализм - это набор идеалов и принципов, вылепленных из пламени войны и отчаяния нашего народа, это истинно немецкая и чисто немецкая идеология. Каждый закон, каждый указ, каждая заповедь вырезаны в костях каждого немца, чтобы каждый немец принял их к сердцу."
 GER_national_hygiene: "Национальная Программа Гигиены"
 GER_national_hygiene_desc: "Огромное значение в успехе нации, в благополучии народа имеет, конечно же, уровень гигиены. Здоровая нация - это не больные и слабые, а воины и бойцы, со здоровыми костями и мышцами. Энергия, которая питает безупречную нацию, состоит из здоровой рабочей силы, а оружие, которым владеет эта нация, - из жаждущих крови солдат, которые, без сомнения, могут без раздумий броситься на линию огня. Поэтому очень важно, чтобы наша любимая Германия не погружалась в тень и гниль грязных людей, а была погружена в свет сильных и чистых."
 GER_the_totalitarian_society: "Тоталитарное Общество"
 GER_the_totalitarian_society_desc: "Мы пробовали либеральные формы общества. Мы пытались дать им свободу, свободу и безопасность. Посмотрите, к чему это привело. К поражению, смерти и разрушению. Наша доброта была использована против нас, наша любовь ничего не стоила перед леденящими пулями наших врагов. Именно боль утрат и телесные раны в конце концов научили нас истине - истине о том, что только железной хваткой мы можем эффективно защитить нашу нацию от бед и иностранной агрессии."
 GER_assemble_the_reichsrat: "Собрать Рейхсрат"
 GER_assemble_the_reichsrat_desc: "Даже после окончательного пробуждения немецкого народа и нации мы не должны забывать о том, что сделало нас великими и продвинуло нас так далеко в потоках истории. Рейхсрат, веймарский реликт, утерянный в истории прошлого, наконец-то возвращен требованиями времени. Рейхсрат будет не только выразителем воли народа, но и окончательной формой коллективного разума."
 GER_german_nation_comes_first: "Немецкая Нация Превыше Всех"
 GER_german_nation_comes_first_desc: "Без родины вы - ничто. Это факт. Слишком долго наш народ забывал, что такое патриотизм. Некоторые в нашей нации даже стали считать его слабостью. Увы, без дома где отдохнуть? Без купола где свить гнездо? Дом, гнездо - вот что значит для нас наша родина. Это не только наше вечное убежище, но и дом наших семей, нашего народа, наших корней, и защищать и оберегать наши дома и наши семьи - наша самая неотложная и важная задача."
 GER_fuel_the_machine: "Заправить Машину"
 GER_fuel_the_machine_desc: "За всеми успешными режимами стоит успешная пропагандистская машина, и сейчас самое время для рождения нашей машины. В медиа-ландшафте страны должны полностью доминировать контентные придатки нашего движения. От газет до телевидения и социальных сетей - мы полностью задушим людей нашей политической программой. Все остальное, что осмелится предложить информацию или контент, бросающий нам вызов, будет заглушено. Когда граждане будут видеть и слышать только наше послание, они будут верить всему, что мы говорим и делаем, до мозга костей. Умы и духи масс будут в наших руках."
 GER_germany_everlasting: "Вечная Германия"
 GER_germany_everlasting_desc: "Германия, Deutschland. С момента своего создания, с момента великого объединения немецкого народа в 1871 году и его воссоединения в 1990 году, она пережила бесчисленные трудности и невообразимые проблемы. Шестеренки этой изношенной ржавой машины, как кости пожилого человека, испытывающего недостаток кальция, кажутся хрупкими, словно они могут сломаться в любой день. Топливо, питающее этот аппарат, жизненная сила этой земли, испортилось из-за постоянных предательств и поражений, которые пережил наш народ. И все же двигатель, сердце машины этой нации, по-прежнему работает яростно и огненно, как в первый день, когда он был зажжен. Германия вела многочисленные сражения и преодолевала бесчисленные препятствия. Германия также неоднократно терпела поражения, и в большинстве случаев от нее оставались лишь руины и пыль. Но Германия все еще здесь, в отличие от многих ее врагов. Каждый раз, после каждой битвы, мы успешно отстраиваем свои дома, и не потому, что у нас есть ресурсы, а благодаря принципам и убеждениям нашего народа и нации. О Германия, моя родина, мое отечество, ты должна стоять высоко и храбро, возвышаясь над всеми нашими врагами, навсегда."
 GER_smash_the_splinters: "Разбить Перебежчиков"
 GER_smash_the_splinters_desc: ""
 GER_dismantle_anti_german_academia: "Уничтожить Антинемецкую Академию"
 GER_dismantle_anti_german_academia_desc: ""
 GER_fanatical_anti_communism: "Фанатичный Антикоммунизм"
 GER_fanatical_anti_communism_desc: "Кто наш враг? Что за грязь, которую мы должны очистить с прекрасных равнин, холмов и гор Европы? Не либерализм, не демократия. Ответ - красный вредитель, который преследует европейский континент и весь мир с тех пор, как его придумали много веков назад. Наши граждане, наши европейские братья, возможно, забыли о том, что нам суждено бороться с главным врагом, а некоторые даже стали горячо верить в него. Но не более. С этого дня коммунистический яд должен быть выкорчеван из нашей нации. Они станут лишь заметкой в могущественной европейской истории."
 GER_solidify_the_parteistaat: "Укреплять Партаппарат"
 GER_solidify_the_parteistaat_desc: "Именно политическая нестабильность и борьба между различными политическими партиями привели к нерешительности и провалу немецкого руководства. В новой Германии, более могущественной Германии, власть будет принадлежать тем, кто достаточно силен, чтобы эффективно распоряжаться ею и вести нас к триумфу. Слабоумные больше не будут препятствовать нашему развитию, мы не будем привязаны к кротким, слабоумные больше не попадут в ловушку освобожденных. В таких тяжелых ситуациях, как та, в которой сейчас находится Германия, нации нужны не гладкоречивые бездеятельные политики, а сильные люди, готовые совершить революцию и радикально измениться ради укрепления страны."
 GER_revive_our_warrior_spirit: "Возродить Наш Воинский Дух"
 GER_revive_our_warrior_spirit_desc: "Когда Бог создавал нас, немцев, он знал, что не создавал народ романтиков, народ доброты, народ любви. Мы, немцы, рождены быть бойцами, рождены быть солдатами. На протяжении всей нашей долгой и бурной истории мы отвоевывали себе достойное место под солнцем. Кровью и потом мы пробивались сквозь другие народы, отнимая у них свою долю солнечного света. Без войны, без кровопролития, без жертв Германия никогда бы не объединилась, тевтонский народ никогда бы не стал по-настоящему единым. Немецкий народ родился в крови, в крови он и умрет."
 GER_spirit_of_rommel_npd: "Дух Роммеля"
 GER_spirit_of_rommel_npd_desc: "Несомненно, если и есть какая-то военная тактика, которая определила наше великолепие на десятилетия после войны, то это блицкриг. Именно наша концентрация на быстрых, агрессивных и гибких маневрах с целью обойти противника и одолеть его силы без особых сражений привела к нашему неоспоримому господству на европейском континенте и почти полной капитуляции британцев в Египте и Советов на востоке.\n\nИ все же, в основном из-за определенной некомпетентности наших союзников и нас самих, это привело к нашей капитуляции перед союзниками и последующему унижению, которое за этим последовало. На этот раз мы будем учиться на наших прошлых ошибках и убедимся, что этот второй шанс будет правильным.\n\nБлагодаря Лису пустыни и его гению, приведшему к капитуляции Британской Северной Африки, мы последуем его примеру. Мы овладеем искусством комбинированной тактики, а также инициативой и импровизацией, чтобы наши враги никогда больше не смогли одержать над нами победу."
 GER_national_service_npd: "Национальная Служба"
 GER_national_service_npd_desc: ""
 GER_four_year_plan: "Четырехлетний План"
 GER_four_year_plan_desc: ""
 GER_promote_class_unity: "Продвигать Единство Классов"
 GER_promote_class_unity_desc: ""
 GER_award_the_workers: "Наградить Рабочих"
 GER_award_the_workers_desc: ""
 GER_consulidate_financial_capital: "Консолидировать Финансовый Капитал"
 GER_consulidate_financial_capital_desc: ""
 GER_our_national_revolution: "Наша Национальная Революция"
 GER_our_national_revolution_desc: "После долгих лет борьбы, потери многих преданных последователей и стольких презрений со стороны остального общества мы наконец-то сделали это. Со старым порядком покончено. Народ заговорил. Революция свершилась. Наше движение теперь господствует во всей Германии, и это великолепное зрелище. Скоро все увидят, что мы запланировали для будущего не только этой страны, но и всей Европы. Пришло время радикальных перемен, и мы станем той непреклонной и яростной силой, которая их осуществит."
 GER_implement_10_point_program: "Реализовать Программу 10 Пунктов"
 GER_implement_10_point_program_desc: "Теперь, когда мы обладаем верховной властью над нацией, настало время приступить к реализации официальной программы партии, состоящей из 10 пунктов. Наша политика - от атаки на иностранный капитал, демонтажа возмутительной иммиграционной системы и возвращения прав и автономии немецкому рабочему - прямая и понятная. В отличие от политиков прошлого, которые так много говорят о переменах и ничего не делают после победы, мы готовы приступить к работе, чтобы воплотить видение нашей партии в жизнь. Вскоре каждый гражданин Германии увидит, что мы выступаем как за изменения, которые всегда обещали, так и за надежный план действий, чтобы воплотить их в жизнь."
 GER_revolutionary_dictatorship: "Революционная Диктатура"
 GER_revolutionary_dictatorship_desc: "В нашей позиции не должно быть компромиссов или слабости. Вся власть в государстве будет принадлежать нам и только нам. Чтобы освободить место для нашего правления, дряхлые остатки старой демократии и людей, которые ею управляли, будут сметены. Больше никаких обструкционистских избранных политиков, плутократических капиталистов, предательских партий и общественных организаций, готовых подорвать суверенитет Германии. Все это уйдет. И хотя некоторые будут кричать и пинаться из-за того, что мы это делаем, истина остается ясной. Никто не будет скучать по слабоумным институтам и людям, которые привели эту страну к краху. Теперь только революционная железная воля нашей партии направляет Германию в будущее, и у нас очень много планов."
 GER_workers_state: "Рабочее Государство"
 GER_workers_state_desc: "Переделывая немецкую нацию, мы должны четко обозначить свою позицию по всегда важному вопросу: для кого существует правительство? Наш ответ прост, и его должен знать весь народ. Эта страна не принадлежит космополитам и либеральным капиталистам, которые обогащаются за наш счет. Она не принадлежит изменническим политикам и иностранцам, сидящим в закрытых комплексах и сговаривающимся о продаже нас чужим интересам. Государство принадлежит рабочим и простым людям Германии, самому народу. Они неустанно работали на благо страны и были ограблены элитой, которая претендовала на то, чтобы представлять их интересы. Их интересы больше не будут игнорироваться или презираться. Настало время восстановить справедливость и вернуть им страну."
 GER_break_the_opportunists: "Разбить Оппортунистов"
 GER_break_the_opportunists_desc: "Наш приход к власти не мог быть достигнут лишь небольшим числом активистов. Это была работа тысяч и тысяч преданных патриотов, неустанно посвящавших себя этому делу. Однако мы не должны быть столь наивными. Было много людей, которые присоединились к нам просто ради собственных интересов. Это люди из других соперничающих партий и групп, которые, увидев, что им не удалось добиться власти для себя и своих товарищей, присоединились к нам, чтобы поживиться за счет нашего успеха. Этот оппортунизм постыден, и настало время, когда мы должны приложить все усилия и смести всех этих ловких шарлатанов. Где бы они ни прятались в нашем движении, мы разоблачим их недобросовестность, выкорчуем их оттуда, где они скрываются, и вышвырнем их на мороз. Каждый член партии и гражданин должен усвоить, что за такую позорную деятельность приходится дорого платить."
 GER_strasserite_principles: "Принципы Штрассеризма"
 GER_strasserite_principles_desc: "Грегор и Отто Штрассеры были людьми, опередившими свое время. Перед лицом злоупотреблений коммунистов и недостатков национал-социалистов они смогли сформулировать истинный путь вперед для немецкой нации. В борьбе за победу революционные националисты не должны успокаивать никого. Все враги немецкого суверенитета, от плутократов-капиталистов до космополитов-коммунистов, должны быть повержены. Это истина, которая была открыта, но многие годы замалчивалась внешними и внутренними врагами Штрассера, но больше не будет. Больше не будет ни молчания, ни подавления их идеалов. Их принципы должны стать краеугольными камнями политики нашей партии, принципами, которые все немцы должны держать близко к сердцу. Идеалы Штрассеров станут основой нашей нации и сегодня, и завтра."
 GER_against_both_evils: "Против Обоих Зол"
 GER_against_both_evils_desc: "Больше всего нас бесит игра обвинений, которые бросают нам обе стороны общепринятого политического спектра. Крайне левые называют нас прокапиталистическими нацистскими головорезами, а богатые буржуазные консерваторы и даже ультраправые - коммунистами. Это все чепуха. Мы видим истину за пределами этой ложной дихотомии. И капитализм, и коммунизм разорили Германию практически во всех отношениях. Начиная с нашего культурного наследия и заканчивая нашим экономическим первенством в мире, эти два яда нанесли неисчислимый ущерб как в прошлом, так и сегодня. Но теперь настало время заявить всему миру, что мы больше не будем терпеть эти две угрозы. Германия гордо встанет, чтобы одним ударом уничтожить и серп и молот, и долларовые банкноты."
 GER_revolution_against_the_revolution: "Революция Против Революции"
 GER_revolution_against_the_revolution_desc: "К востоку от нас находится крупнейшая за последние годы угроза для Германии - русские. Пока мы боролись за захват власти в Германии, они наблюдали, тайно планировали, мобилизовали свои силы и теперь готовы нанести удар. Однако эта опасность кажется нам до боли знакомой. Их правительство похоже на наше, оно претендует на то, чтобы быть для масс, и полностью сместило старую Россию ради новой. Две нации возрождаются в условиях революции, радикальной и бескомпромиссной революции. Но они должны знать, что мы здесь не для того, чтобы брататься или делить континент. Мы видим надпись на стене. Только одна идеология, одно видение, один дух, одна революция могут диктовать будущее. Это напоминание мы скоро внушим им силой."
 GER_enlighten_the_masses: "Просветить Массы"
 GER_enlighten_the_masses_desc: "Народу Германии продали бесчисленную ложь о нашем движении. Алчные журналисты и коварные политики внушали им, что мы - бандиты и предатели, заслуживающие презрения и ненависти. Но теперь все перевернулось, и теперь именно мы держим в своих руках информационное пространство этой страны. Настало время, чтобы люди услышали всю нашу программу, всю нашу правду. Наши тысячи и тысячи последователей и медиа-аппараты будут мобилизованы, чтобы просветить массы о нашей миссии по спасению Германии. От телевидения до Интернета - наши слова коснутся каждого уголка страны и захватят умы всех, кто их услышит."
 GER_revive_the_sa: "Воскресить Штурмовые Отряды"
 GER_revive_the_sa_desc: "Sturmabteilung, или сокращенно SA, были лучшим примером массовой мобилизации немецкого народа в современной истории. Общие массы немецких патриотов, объединенные единым духом и энергичной борьбой, представляли собой могучую силу, наводившую страх на внутренних врагов Германии. Это учреждение, которое мы должны возродить с гордостью, память о котором мы должны вернуть. Мы мобилизуем наших последователей и всех желающих бороться за лучшую Германию в единое народное боевое формирование. Наша современная SA, оснащенная современными инструментами массового направления действий, не будет иметь себе равных ни в одном другом военизированном движении на континенте. Так поднимите же флаг и тесно сомкните ряды! Знакомые коричнево-черные мундиры вновь придут, чтобы поразить внутренних врагов Германии."
 GER_black_front_of_fighters: "Черный Фронт Бойцов"
 GER_black_front_of_fighters_desc: "После ухода Отто Штрассера из НСДАП он создал группу, посвященную его идеям и делу, - "Черный фронт." В последние годы правления Веймера они боролись за принципы своего лидера - революционный национализм и сопротивление космополитическому капитализму, - прежде чем были ликвидированы новым правительством Гитлера. Но времена изменились, идеи Штрассеров теперь господствуют в Германии, и для нас будет правильным возродить организацию, посвятившую себя этим идеям. В берлинских залах власти, в кабинетах местных органов власти и во всех других крупных социальных и политических учреждениях наш новый Черный фронт будет служить объединителем воли нашей партии и народа. Это будет не просто орган, проводящий в жизнь эти идеи, это будет нечто, выходящее далеко за рамки того, что могли себе представить Братья Штрассеры в своё время."
 GER_revive_our_warrior_spirit_tw: "Возродить Наш Воинский Дух"
 GER_revive_our_warrior_spirit_tw_desc: "Когда Бог создавал нас, немцев, он знал, что не создавал народ романтиков, народ доброты, народ любви. Мы, немцы, рождены быть бойцами, рождены быть солдатами. На протяжении всей нашей долгой и бурной истории мы отвоевывали себе достойное место под солнцем. Кровью и потом мы пробивались сквозь другие народы, отнимая у них свою долю солнечного света. Без войны, без кровопролития, без жертв Германия никогда бы не объединилась, тевтонский народ никогда бы не стал по-настоящему единым. Немецкий народ родился в крови, в крови он и умрет."
 GER_spirit_of_rommel_tw: "Дух Роммеля"
 GER_spirit_of_rommel_tw_desc: "Несомненно, если и есть какая-то военная тактика, которая определила наше великолепие на десятилетия после войны, то это блицкриг. Именно наша концентрация на быстрых, агрессивных и гибких маневрах с целью обойти противника и одолеть его силы без особых сражений привела к нашему неоспоримому господству на европейском континенте и почти полной капитуляции британцев в Египте и Советов на востоке.\n\nИ все же, в основном из-за определенной некомпетентности наших союзников и нас самих, это привело к нашей капитуляции перед союзниками и последующему унижению, которое за этим последовало. На этот раз мы будем учиться на наших прошлых ошибках и убедимся, что этот второй шанс будет правильным.\n\nБлагодаря Лису пустыни и его гению, приведшему к капитуляции Британской Северной Африки, мы последуем его примеру. Мы овладеем искусством комбинированной тактики, а также инициативой и импровизацией, чтобы наши враги никогда больше не смогли одержать над нами победу."
 GER_national_service_tw: "Национальная Служба"
 GER_national_service_tw_desc: "Когда-то Германия славилась своей военной доблестью и мощью. Королевство Пруссия было признано во всем мире как военное государство, имея четвертую по величине армию в Европе, несмотря на то что ее население составляло лишь часть населения Европы. Сегодня, рассуждая о германском милитаризме, многие вспоминают о двух мировых войнах. Однако на самом деле без сильных вооруженных сил наша страна была бы слабой и легко сломленной иностранными агрессорами. Без мощной армии Пруссия никогда бы не смогла объединить Германию в национальное государство. Без военной мощи мы бы рухнули под натиском с двух фронтов, как австрийцы во время Первой мировой войны. Не имея надежной обороны, мы не смогли бы сопротивляться, и наш народ был бы истреблен большевиками, как скот, во время Второй мировой войны. Милитаризм всегда был и всегда будет центральным элементом немецкого народа и его идентичности. Сейчас, когда наши противники вновь приближаются к нашим границам, нам нужна свежая кровь для пополнения рядов наших вооруженных сил. Поэтому мы должны восстановить обязательную воинскую повинность, от которой мы когда-то по глупости отказались."
 GER_take_in_ukrainian_refugees: "Принять Украинских Беженцев"
 GER_take_in_ukrainian_refugees_desc: ""
 GER_mobilize_the_industry: "Мобилизовать Промышленность"
 GER_mobilize_the_industry_desc: ""
 GER_modernize_national_socialism: "Модернизировать Национал-Социализм"
 GER_modernize_national_socialism_desc: "Со времен правления Третьего рейха прошло много лет. Общество, культура, технологии, ценности и все, что можно представить о человеческой цивилизации, изменилось кардинально, настолько, что если бы Гитлер был жив сегодня, он бы считал себя свидетелем марсианской, а не немецкой цивилизации. Проще говоря, времена изменились, но это не значит, что мы не должны меняться вместе с ними. Пришло время национал-социализму смахнуть пыль с паутины истории и перенестись в настоящее. Основные теории останутся прежними, но все это будет помещено в контекст и анализ нашей жизни в XXI веке. От иммиграции до глобализма и угрозы с востока - национал-социализм будет полностью соответствовать всем проблемам современной Германии. Хакенкройц означал спасение и могущество Германии тогда, и он будет означать то же самое сейчас в понятных для современных немцев формах."
 GER_mastery_of_propaganda: "Мастерство Пропаганды"
 GER_mastery_of_propaganda_desc: ""
 GER_our_new_struggle: "Наша Новая Борьба"
 GER_our_new_struggle_desc: ""
 GER_the_new_germania: "Новая Германия"
 GER_the_new_germania_desc: ""
 GER_kick_down_the_door: "Вышибить Дверь"
 GER_kick_down_the_door_desc: "Наконец-то пришло время ворваться в дома русских. На этот раз именно их кровь, их люди проложат путь к нашему продвижению. Было время, когда я ни за что не стал бы рассматривать ядерный вариант, но теперь это не так. Мы пытались проявить любовь, однажды. Но этого оказалось недостаточно! Мы подставили другую щеку, а они ударили нас по обеим! На этот раз мы разрушим их хрустальный дворец, который они построили на страданиях бесчисленных людей. Пришло время выбить дверь."
 GER_winter_logistics_training: "Зимний Логистические Тренировки"
 GER_winter_logistics_training_desc: ""  
 GER_the_triump_of_populism: "Триумф Популизма"
 GER_the_triump_of_populism_desc: "После стольких лишений, стольких смертей и разрушений мы вышли победителями в европейской войне. Многие аналитики считали, что наша партия не сможет привести немецкий народ к победе, к лучшему будущему, но теперь все они молчат. Разрушения, причиненные войной, немыслимы как для наших союзников, так и для нашей нации. Но мы не можем позволить себе впасть в самодовольство, как это сделали бы другие, нет, мы должны процветать! Настало время перестраиваться, время доказать, что скептики еще больше ошибаются. АдГ навсегда останется партией, которая вывела Германию из небытия и ввела в эру процветания!"
 GER_revive_nuclear_energy: "Возродить Ядерную Энергетику"
 GER_revive_nuclear_energy_desc: "Одна из многих вещей, которую не смогли понять наши предыдущие главы правительства, заключается в том, что атомная энергия - это не сила разрушения и трагедии, а сила добра. Из-за таких событий, как аварии на Чернобыльской АЭС и АЭС Фукусима, они придерживались мнения, что атомные электростанции - это смертельные ловушки и не стоят того, чтобы их использовать. Они ошибались: хотя эти катастрофы и были трагедиями, они почти всегда являются результатом человеческой ошибки. Пришло время отбросить этот устаревший страх перед ядерным делением и принять ту помощь, которую оно принесет нашей энергетической инфраструктуре и нашим людям." 
 GER_free_up_the_economy: "Освободить Экономику"
 GER_free_up_the_economy_desc: "Слишком долго немецкая экономика страдала от бюрократического раздувания в результате постоянных государственных расходов при предыдущих главах государства. Правда заключается в том, что немецкая экономика находится в более хрупком состоянии, чем когда-либо прежде. Сейчас, когда Восточная Европа разрушена, а в Европе снова царит мир, у нас есть прекрасная возможность избавиться от этого хлама, который слишком долго разлагал нашу экономику изнутри. Мы должны, наконец, отправить эти бесполезные программы в правительстве под нож. Благодаря этому мы поставим экономику нашей страны на стабильную основу." 
 GER_support_the_militarized_industry: "Поддерживать Милитаризованную Промышленность"
 GER_support_the_militarized_industry_desc: "После начала европейской войны военная промышленность нашей страны росла в геометрической прогрессии и продолжала расти в течение всей войны. Но теперь война закончилась, и русский медведь отбит на востоке. Из-за этого мы попадаем в ту же ловушку, что и перед войной: самоуспокоенность. Сейчас, как никогда, мы должны помнить, что конфликт может разразиться в одно мгновение. Военная промышленность - это наша жизненная сила, позволяющая быстро и решительно реагировать на эти потенциальные угрозы, и мы, конечно, не можем допустить, чтобы они отошли на второй план по мере того, как наша страна движется в будущее."  
 GER_negotiate_with_the_russians: "Переговоры с Русскими"
 GER_negotiate_with_the_russians_desc: "Сказать, что у немецкого народа и русских были крайние разногласия, было бы преуменьшением в высшей степени. Но после европейской войны русский медведь был фактически обезглавлен, а оккупированные территории освобождены нашими союзниками по НАТО. К несчастью для нас, с европейцами было все труднее работать даже после войны. Теперь, когда русские отчаянно нуждаются в союзниках и экономических партнерах, настало время нам протянуть оливковую ветвь опустошенным русским. При правильном ведении переговоров мы, несомненно, достигнем приемлемого экономического соглашения с ними."  
 GER_cooperate_with_europe: "Сотрудничать с Европой"
 GER_cooperate_with_europe_desc: "Можно с уверенностью сказать, что наша партия и Европейский парламент расходятся во мнениях по целому ряду вопросов. Но когда русские ворвались в пределы Украины, мы были вынуждены отложить эти разногласия в сторону ради нашего суверенитета. Но теперь пыль осела над разбитой Европой, и мы стоим перед дилеммой: укреплять ли нам связи с Европой или пойти навстречу русским? Ответ для нас очевиден: русские явно к чему-то готовятся, и они доказали, что им нельзя доверять. Мы должны продолжать сотрудничать с Европой и укреплять наши связи с ней."  
 GER_one_nation_one_people: "Одна нация, один народ"
 GER_one_nation_one_people_desc: "Германия, Deutschland, как бы вы ее ни называли. Это бьющееся сердце Центральной Европы и Западной цивилизации в целом. Снова и снова мы доказываем свои способности как нации, упорно преодолевая самые тяжелые испытания. И наш народ, самый сильный из всех, пережил голод, пережил болезни, а теперь пережил угрозу русских полчищ. Нас завели в грязь некомпетентные политики, которые своей политикой впустили в нашу страну тысячи нелегальных мигрантов, мы были ввергнуты ими в самоуспокоенность. Но популизм вывел наш народ из небытия на мировую арену! Мы, АдГ, доказали свою состоятельность как партия и повели Германию в будущее. Мы готовы к любым испытаниям, с которыми мы можем столкнуться в будущем, будь то русские или что-то другое, мы победим!" 
 GER_relocate_the_economy: "Передислоцировать Экономику"
 GER_relocate_the_economy_desc: ""
 GER_no_more_weakness: "Больше Никакой Слабости"
 GER_no_more_weakness_desc: "Слишком долго нашей страной управляли предатели. Американские, советские и глобалистские коллаборационисты, которые высасывали последние соки из немецкой нации и вымещали гордость за наши исторические достижения под ковер потребительства и мультикультурализма.\n\nДушащее иго ощущается даже после падения ФРГ: все те же старые левые оппортунисты теперь меняют свои накидки, чтобы захватить и удержать власть.\n\nНо народ больше нельзя обмануть, хватит! Строительство самодостаточной, сильной и идеологически единой Германии начинается с нашей революции!"
 GER_strengthen_the_grip: "Укрепить Хватку"
 GER_strengthen_the_grip_desc: "Наше географическое положение, наивность и некомпетентность предыдущего режима, а также постоянные спады и сокращения штатов сделали нашу страну уязвимой для атак со всех сторон - как изнутри, так и снаружи.\n\nНовые директивы Народной палаты призваны улучшить положение Германии в Европе и обеспечить безопасность и благополучие нашего народа. Штази и ННА будут работать в тандеме, чтобы укрепить исторические земли Германии и нацелиться на опасные элементы внутри."
 GER_honour_the_army: "Отдать Честь Армии"
 GER_honour_the_army_desc: "Одна неудача за другой, немецкое руководство не может сделать правильных выводов. Так называемые политики и правящий класс не смогли решить самый важный вопрос современности - безопасность и способность к самообороне нашей нации.\n\nМы не повторим этой ошибки.\n\nТеперь наши приоритеты, системы управления и экономические решения будут приниматься с учетом интересов военных. Наша новая политика - все для армии, ничего для элиты и нахлебников!"
 GER_old_guard_new_revolution: "Старая Гвардия, Новая Революция"
 GER_old_guard_new_revolution_desc: "Нам удалось добиться того, чего раньше не могла сделать ни одна партия, ни одна группа, ни один класс. Мы создали коалицию, о которой раньше и не помышляли. И это не парламентская коалиция, не комбинация денег, не колыбельная для бедной, голодной и униженной нации.\n\nНаш союз - это союз идей. Левых и правых. Старая и новая гвардия. Представители разных слоев и разных времен, объединенные одним делом - за великую немецкую нацию и за сильное немецкое государство!"
 GER_raf_romanticism: "Прославить Нашу Борьбу"
 GER_raf_romanticism_desc: "Наша история знает множество революционеров, отважных борцов с капитализмом, как правых, так и левых.\n\nЭтот путь полон трудностей и жертв, но благодаря этим героям мы можем сегодня перестроить Германию.\n\nМы должны увековечить их подвиги в культуре и повседневной жизни нашей страны, чтобы все немцы помнили о них!"
 GER_new_german_spirit: "Новый Немецкий Дух"
 GER_new_german_spirit_desc: "Дух либерально-демократической буржуазной Германии умер вместе с государством, которое его поддерживало. Оно разложилось до неузнаваемости и втянуло нас в страдания упадка и поражения.\n\nНастало время для нового духа, здорового национализма, морального возрождения нашего народа, на который так долго смотрели свысока. Пришло время вновь признать немецкую культуру и традиции!"
 GER_deconstruction_of_post_modernity: "Деконструкция Постмодернизма"
 GER_deconstruction_of_post_modernity_desc: "Сегодняшняя большая победа Германии - это всего лишь один маленький шаг вперед для всего остального мира. Маленький, но отнюдь не незначительный.\n\nПо иронии судьбы, пытаясь ухватиться за власть так крепко, как она это делала, она подготовила свою собственную гибель. В его достоинствах также кроются уязвимые места, которые мы знаем, потому что потратили свою жизнь на их изучение.\n\nСейчас люди со всего интеллектуального спектра, андеграунд, мейнстрим, ученые и любители - все пришли, чтобы принять участие в грандиозном проекте деконструкции капитализма.\n\nПервый - метафорически, беря каждый аспект постмодернизма, оглядывая его, задавая вопросы: "Как мы сюда попали?", и отвечаем: "Как отсюда выбраться?"\n\nДля многих это было хобби. Но теперь это основа для буквальной деконструкции капитализма как системы."
 GER_exiting_the_vampire_castle: "Покинуть Вампирский Замок"
 GER_exiting_the_vampire_castle_desc: "Поздний капитал виновен в бесчисленных преступлениях, но есть одно, по-настоящему мерзкое, и с ним нужно немедленно бороться.\n\nКапитализм убил социальную сплоченность, подавил коллективизм, растоптал чувство товарищества между людьми и подавил истинный плюрализм. Он разделил нашу жизнь на собственные права и недостатки и нанес шрамы целым поколениям издевательствами и позором. Они выгорели, одиноки и боятся того, что ждет их завтра.\n\nМы должны принять меры, чтобы вернуть веру в души людей и огонь в их сердца. Новый век прогресса и процветания лежит за стеной старых предрассудков!"
 GER_phase_out_capital_fundamentalism: "Отказ от Капиталистического Фундаментализма"
 GER_phase_out_capital_fundamentalism_desc: "Мир попал в круговорот капитализма - бесконечный лабиринт, культ, вращающееся колесо, в котором люди бегут без всякой цели.\n\nЭта система уже давно перестала приносить пользу даже своим хозяевам, но мы продолжаем поддерживать ее. И она приносит свои плоды - как религия, требуя все больше и больше жертв, превращая людей в худших рабов - тех, кто думает, что они свободны.\n\nМы должны уничтожить фундаменталистский культ, в который превратился капитализм, и разрушить все иллюзии, которые люди питали по отношению к нему - это вопрос принципа и выживания."
 GER_detox_from_nostalgia: "Детоксикация от Ностальгии"
 GER_detox_from_nostalgia_desc: "Время доказало, что немцы - одни из самых ностальгирующих людей, которые когда-либо жили на свете, причем, как показывает наш опыт.\n\nКапитал всегда злоупотреблял этим чувством, мастерски играя на флейте ностальгии, чтобы снова и снова вести Германию к гибели. Манипулируя и обманывая, он убеждает вас, что когда-то жизнь была счастливее, трава - зеленее, а наша страна - величе, и что вы можете вернуться в те времена, если будете делать все, что они говорят - какая шутка!\n\nНаша нация больше не будет стремиться к разрушающимся зданиям порядков, существовавших до нас. Мы научились на ее ошибках - теперь впереди только новое."
 GER_redefine_marxist_ideals: "Переосмысление Марксистских Идеалов"
 GER_redefine_marxist_ideals_desc: "Марксизм - как много значения приобрело это слово за долгие годы! Оно стало одним из основополагающих принципов мышления в современном мире и смыслом жизни для миллионов людей по всему миру.\n\nМы любим его, потому что марксизм - это философия, которая постоянно меняется, постоянно развивается. Его история - это борьба, которая привела нас туда, где мы находимся сегодня. Но мы не будем поддерживать тех, кто все еще играет с марксизмом 20-го века - мы должны делать то, что делали Ленин, Сталин и Мао, адаптироваться к современным условиям и отражать это в нашей собственной линии мысли.\n\nМы подхватим марксизм, мы будем развивать его и нести его с собой к звездам - или, может быть, он понесет нас? Что ж, это диалектический парадокс, достойный обсуждения."
 GER_accelerate_into_a_brighter_future: "Ускорить Движение к Светлому Будущему"
 GER_accelerate_into_a_brighter_future_desc: "Этот момент давно назрел, и все же никто из нас не сомневался, что он наступит.\n\nКапитализм исчерпал свой ресурс. Возможно, когда-то он был свеж и полезен, но теперь это лишь гниющий труп, нависший над Землей. Наш долг и обязанность - избавить цивилизацию от этого барьера! Взорвать его, чтобы мы могли перейти на следующую ступень процветания!\n\nНо мы не только разрушим экономические и общественные институты, поддерживающие капитализм, но и избавимся от внутренних цепей, сдерживающих свободную и творческую природу каждого человека! \n\nЭмансипируйтесь и сбросьте свою пустую оболочку!\nВозьмите свои инструменты и оружие, боритесь, чтобы быть самим собой!\nУскоряйтесь, пусть история вечно идет без конца!\n\nБЫСТРЕЕ!\nБЫСТРЕЕ!!!\nБЫСТРЕЕ!!!\nБЫСТРЕЕ!!!!"
 #NAFO
 GER_convene_the_european_parliament: "Созвать Европейский Парламент"
 GER_convene_the_european_parliament_desc: "Наш народ заговорил, дух Германии сломлен, но возрождается в новой форме. Панъевропейская мечта жива в сердцах немцев, Volt Europa завоевала большинство в Германии!\n\nСегодня! Это новый день! Новое начало! Рождение европейского государства наступило!\n\nСозывайте Европейский парламент, пришло время собрать остатки нашего Союза и идти дальше как единое целое!"
 GER_european_millitarisation: "Европейская Милитаризация"
 GER_european_millitarisation_desc: "Мы потерпели неудачу против России, наши доктрины были неадекватны или, возможно, наше единое командование страдало от смешения различных языков. Есть много причин, по которым мы потерпели неудачу, и ни одна из них не была столь очевидной, как отсутствие у нас сильной армии.\n\nМы все когда-то собирали великие армии! Почему мы не можем сделать это сейчас? Теперь, когда мы объединились, мы сможем. Армия, превосходящая все, что русские могли себе представить, пробудила нас от дремоты. Им придется заставить нас вернуться в постель."
 GER_the_duty_of_every_young_man: "Долг Каждого Молодого Человека"
 GER_the_duty_of_every_young_man_desc: "Защита, нет, искупление Европы - долг каждого мужчины.\n\nМы не будем известны как поколение, которое не смогло добиться свободы, мы спасем свободную и процветающую Европу, мы должны вернуть Польшу, освободить Прибалтику, снять цепи с Румынии, вытащить Венгрию из глубины, вытащить Словакию обратно на свет!\n\nКаждый человек обязан сражаться за то, что правильно!\n\nМы расширим призыв и откажемся от освобождения от службы, такая роскошь, как освобождение от призыва, была потеряна, когда мы не смогли защитить свободу."
 GER_an_economy_of_war: "Экономика Войны"
 GER_war_rationing: "Военное Нормирование"
 GER_million_man_army: "Миллионная Армия"
 GER_million_man_army_desc: "Миллионная армия - прекрасное зрелище. Но ею также очень трудно управлять. Величественная, как тигр, но без надлежащего аппарата управления она больше похожа на тигра без глаз. Мы должны объединить командование наших федеральных земель с центральным правительством, если мы этого не сделаем, нас постигнет та же участь, что и в последней войне."
 GER_fortress_europa: "Крепость Европа"
 GER_fortress_europa_desc: "Крепость Европа - это новый план, разработанный верховным командованием ЕС, согласно которому наша страна должна превратиться в крепость. Обширные укрепления, мобилизация общества и благоприятная политика правительства - все это будет способствовать военным операциям в войне, которая может решить судьбу свободы в Европе."
 GER_aggressive_realpolitk: "Агрессивный Realpolitik"
 GER_aggressive_realpolitk_desc: "После войны воцарился хаос, Испания погрузилась в гражданские беспорядки, во Франции начались восстания, а от нас откололась большая часть ЕС. В этом хаосе наша федерализация осталась незавершенной, мы должны просветить наших соседей, все части Европы должны объединиться, чтобы противостоять восточной угрозе, и если они не присоединятся к нам, мы присоединим их к нам."
 GER_intergrate_west_poland: "Интегрировать Западную Польшу"
 GER_intergrate_west_poland_desc: "Польша была разделена Медведевым, как и большинство завоеванных стран. Но за пределами ОДКБ они оставили Силезию и остатки нашего бывшего союзного правительства в Польше, с чрезвычайной столицей в Познани. Конечно, они будут рады присоединиться к нам."
 GER_secure_scandinavia: "Обезопасить Скандинавию"
 GER_secure_scandinavia_desc: "Скандинавия предоставляет уникальную возможность: в прошлую войну норвежская граница была слишком мала, чтобы добиться реальных успехов, но если мы сможем объединить Швецию и Финляндию, то откроем новый фронт, который сможет перерезать их крупные северные порты и угрожать Санкт-Петербургу. В нашем Союзе приветствуются все части Европы, и Скандинавия так или иначе войдет в него."
 GER_secure_central_european_democracy: "Безопасная Центральноевропейская Демократия"
 GER_secure_central_european_democracy_desc: "Чехия едва не стала жертвой медведя, прежде чем мы заключили мир, а Австрия наблюдала за этим со стороны. Они были членом ЕС, но не НАТО, и они игнорировали нашу статью о взаимной обороне, не будут они игнорировать ее и в этот раз."
 GER_balkan_intervention: "Балканская Интервенция"
 GER_balkan_intervention_desc: "На Балканах была своя микровойна, отражающая нашу собственную ситуацию. Сербия охватила своих более мелких соседей, а затем вторглась в более мелкие хорватские и словенские государства, практически реформировав Югославию в соответствии с сербским национализмом. Там живут люди, европейцы, которых необходимо освободить от фашистской хватки Сербии."
 GER_russias_soft_underbelly: "Мягкое Подбрюшье России"
 GER_war_plan_black: "Военный План Чёрный"
 GER_reset_european_economies: "Перезагрузка Европейских Экономик"
 GER_reset_european_economies_desc: "Слишком долго некомпетентные ублюдки старого мира вытравливали нюансы из глобальной экономической теории, а вместе с ними породили мир, в котором Европа проиграла европейскую войну. Начиная с социал-демократии и заканчивая государством всеобщего благосостояния, правительство слишком много вмешивалось в экономику. Прагматизм в экономике полностью умер в Европе задолго до нашего прихода к власти. Но теперь Европа у нас на ладони, и мы можем проводить в жизнь политику, которую всегда хотели видеть. Мы должны вернуться к основам экономической теории, мы должны сжечь все то, что когда-то сдерживало Европу; и с помощью этого мы продвинем ее к непредвиденным высотам."
 GER_national_corporatism: "Посткапиталистический Переходный Период"
 GER_national_corporatism_desc: "Нынешняя система доказала, что она медленная, несбалансированная, неэффективная, но самое главное - абсолютно неустойчивая. Еще один подобный кризис, и она рухнет, потеряв контроль над ситуацией. Мы должны надеяться на идеи Клауса Шваба и Всемирного экономического форума о переходе экономики Европы к чему-то большему."
 GER_nationalize_key_industries: "Начать Японофикацию"
 GER_nationalize_key_industries_desc: "Хотя многие понимают необходимость перехода к устойчивой системе, мало кто осознает, как она будет выглядеть и что повлечет за собой. Для этого странам развитого мира стоит обратиться к довольно свежему опыту Японии. С 90-х по 2010-е годы она прошла путь от бурно развивающейся, технологичной экономики до почти вечной стагнации с резким снижением так называемого «уровня жизни». Это очень хороший пример достижения нулевого роста и того, как люди могут к нему приспособиться."
 GER_promote_state_owned_enterprise: "Установить Новый Социальный Стандарт"
 GER_promote_state_owned_enterprise_desc: "По мере того как старая система исчезает, исчезают и старые социальные и экономические нормы, на которых держалось человечество. Традиционные ценности, предрассудки, верования и убеждения старого времени естественным образом будут отброшены по мере формирования новой экономики, в которой не останется места для личных амбиций и эгоизма. Аренда вместо владения, отсутствие долгосрочных экономических и общественных связей станут новой нормой, а вместе с ними изменятся мораль и этика, и будет создана новая система."
 GER_strengthen_transnational_institutions: "Усилить Транснациональные Институты"
 GER_strengthen_transnational_institutions_desc: "Транснациональные институты - это незыблемые опоры экономики, которые десятилетиями двигают ее вперед. Они более эффективны, более прагматичны, более могущественны, чем когда-либо могли бы быть национальные институты. Мы должны всячески поддерживать и отстаивать их, как это всегда делал Всемирный экономический форум - платформа для международного сотрудничества и координации."
 GER_concessions_to_the_oligarchs: "Доминировать над Zeitgeist"
 GER_concessions_to_the_oligarchs_desc: "В этом новом цифровом мире человек постоянно участвует в экономике, даже не подозревая об этом: интернет сделал так, что вы постоянно либо ищете товары для покупки, либо покупаете их, либо смотрите на их рекламу. Сегодня люди погружены в нее еще больше, чем раньше, благодаря массовому внедрению гарнитур VR и AR и даже микрочипов, которые еще больше усиливают интеграцию человека в этот мир.\n\nПоэтому вполне естественно, что мы должны как можно больше вовлекать себя в цифровой мир и еще больше вовлекать в него людей, пока граница между реальностью и виртуальной реальностью не станет размытой до полного исчезновения. Только тогда цифровая экономика принесет нам реальную пользу в долгосрочной перспективе."
 GER_implement_corporate_governance: "Внедрять Корпоративное Управление"
 GER_implement_corporate_governance_desc: "Управлять корпорацией - значит управлять государством, а управлять государством - значит управлять корпорацией. Единственное различие между ними - в размере и масштабе. Нация - это более крупное предприятие, с большим количеством сотрудников, более обширной клиентской базой и более значительной долей рынка. Президент - это всего лишь генеральный директор, который должен заботиться о прибылях нации. Министры - не более чем директора, заботящиеся о своих отраслях. Все сотрудники и руководство работают на удовлетворение потребностей клиентов, которыми, конечно же, являются наши граждане. В прошлом мы позволяли жестким политическим убеждениям диктовать наши действия, но после Великой перезагрузки валовой внутренний доход и маржа роста позволят достичь новый рационализм, которого так жаждет мир."
 GER_promote_enviromental_social_governance: "Иерархия, Основанная на Богатстве"
 GER_promote_enviromental_social_governance_desc: "Чем измеряется ценность личности, возможности человека? Деньгами? Власть? Социальный статус? На самом деле все эти аспекты существуют в гармонии. Конечно, если человек способен накопить большое количество богатств или достичь высокого социального статуса, он должен превосходить других в некоторых аспектах жизни. Если человек может освободиться от оков морали и позволить рациональности и норме прибыли быть своим путеводным компасом, он должен подняться на более высокий уровень, чем большинство других. Человеческое общество управляется этими факторами на протяжении десятилетий. В конце концов, разве обществом не должны управлять те, кто наиболее способен и амбициозен?"
 GER_shareholder_democracy: "Демократия Акционеров"
 GER_shareholder_democracy_desc: "Эпоха национального суверенитета и представительной демократии закончилась, оставив после себя лишь разделение, коррупцию и упадок. Иллюзия народного правления служила лишь для расширения прав и возможностей мелких чиновников, чья преданность была связана не с народом, а с их собственными карманами - или, что еще хуже, с нашими противниками.\n\n В новом европейском порядке нет места для сентиментальных идеалов. Места в высшем органе управления - Европарламенте - будут распределены между теми, кто доказал свою способность формировать будущее: руководителями транснациональных корпораций, директорами оборонных и биотехнологических синдикатов, дипломированными представителями интеллектуальной элиты.\n\n Каждый из них должен будет приобрести акции системы, которой он теперь помогает управлять, что обеспечит их не идеологическую, а контрактную приверженность машине, которой они служат.\n\nЖадность. Эффективность. Видение. Это уже не пороки, а столпы стабильного мира. Пусть массы мечтают, а мы будем управлять реальностью."
 GER_reconstruct_european_cities: "Реконструировать Европейские Города"
 GER_reconstruct_european_cities_desc: "Когда пришли русские, они подарили нам огонь осуждения, огонь возрождения. По их мнению, Европа превратилась в выгребную яму. Страну, разделенную мыслями и мелким национализмом, где братья и сестры вцепились друг другу в глотки. Мы отставали от своих международных конкурентов не только в технологическом секторе, но, что самое главное, в нашей национальной психике, что и привело нас к поражению. Кирпич за кирпичом, гвоздь за гвоздем мы будем восстанавливать наши дома, совершенствовать то, что когда-то потеряли. Из пепла вырастет новый золотой век, без границ, без предела."
 GER_rentier_based_economy: "Минимизировать Участие Государства"
 GER_rentier_based_economy_desc: "Почему правительство вмешивается в рынок? Рынок всегда и во все времена был и будет способен уравновешивать сам себя. Он - инь и ян общества. Он определяет социальные формы и нормы, изменения и эволюцию. Государство всегда было лишь препятствием на пути развития. Оно устанавливает законы и правила, ограничивающие степень нашего развития, убивающие нашу смелость и жажду инноваций. В этом новом обществе, возрожденной Европе, карандашисты и кабинетные работники сделают шаг назад. Мир принадлежит вам, новаторам и провидцам."
 GER_state_capitalism: "Более Ответственная Система"
 GER_state_capitalism_desc: "Времена безрассудных трат и потребления прошли. Мы установили новый общественный договор, более справедливую систему перераспределения богатства, которая принесет пользу окружающей среде и мировой экономике, способной противостоять будущим вызовам.\n\n Конечно, это было бы невозможно без участия каждого отдельного гражданина. Многие уже лишились ненужной лишней собственности после экономических кризисов, поразивших Европу, и недавнего поражения России, но многие также добровольно отказались от нее в пользу устойчивой и скромной жизни, осознав, что в экономике будущего нет места роскоши.\n\nКак бы это не соотносилось с чем-то из прошлого, но сегодня владение меньшим является движущей силой инноваций и общественных изменений."
 GER_responsible_capitalism: "Технократический Симбиоз"
 GER_responsible_capitalism_desc: "Традиционно мы позволяли самым разным людям с разной квалификацией управлять различными аспектами жизни общества, не учитывая их профессиональную специализацию. Все, к чему это приводило, - застой, ржавение социальных шестеренок и болтовне, которая управляет этой машиной под названием общество. Если талант не используется, то какая от него польза? Если опыт не используется в нужной области, какую пользу он принесет? Синтезировав технологический опыт с государственным, Европа станет непобедимой. Наши технологии достигнут непредсказуемых высот. Мы станем самим определением будущего."
 GER_fourth_industrial_revolution: "Четвертая Промышленная Революция"
 GER_fourth_industrial_revolution_desc: ""Четвертая промышленная революция изменяет не только то, что мы делаем, но и то, кем мы являемся. На нас, индивидуумов, это окажет многоплановое влияние, скажется на нашей идентичности и различных гранях ее проявления: на наши представления о неприкосновенности частной жизни, о собственности, характер потребительского поведения, то, сколько времени мы посвящаем работе и отдыху, как мы развиваем свою карьеру и совершенствуем наши навыки. Это повлияет на то, как мы заводим знакомства и развиваем отношения, на иерархии, от которых мы зависим, на наше здоровье. И, возможно, что быстрее, чем мы можем предположить, это может привести к таким формам увеличения человеческих возможностей, которые заставят нас поставить под вопрос саму природу человеческого существования."\n\n- К. Шваб"
 GER_the_techno_utopian_ideal: "Техно-утопический Идеал"
 GER_the_techno_utopian_ideal_desc: ""
 GER_freedom_isnt_free: "Свобода - не Бесплатна"
 GER_freedom_isnt_free_desc: ""
 GER_weaken_regional_nationalism: "Ослабить Региональный Национализм"
 GER_weaken_regional_nationalism_desc: ""
 GER_concessions_to_the_tech_giants: "Уступки Технологическим Гигантам"
 GER_concessions_to_the_tech_giants_desc: "Технологии - это путь к превосходству в любой сфере, без крупных технологических гигантов мы не сможем доминировать ни в одной области, ни в экономике, ни в военном деле, ни в чем. Поэтому давайте позаботимся о том, чтобы они были счастливы. Мы бросим им несколько костей и сохраним их лояльность, по крайней мере до того дня, когда мы создадим собственных технологических гигантов."
 GER_the_corporate_state: "Корпоративное Государство"
 GER_secure_european_democracy: "Безопасная Европейская Демократия"
 GER_prohibit_subversive_media: "Запретить Подрывные СМИ"
 GER_government_of_national_emergency: "Правительство Чрезвычайного Положения"
 GER_old_system_new_form: "Старая Система, Новая форма"
 GER_entrenched_elitism: "Укреплять Элитарность"
 GER_entrenched_elitism_desc: "В элитарности нет ничего плохого, просто некоторые люди знают, как управлять делами лучше. Европе, как интегрированной экономической державе, нужно управленческое правительство, самые талантливые, самые успешные, они будут среди элиты нашей нации, и они приведут нацию к величию."
 GER_anti_modernist_revolution:  "Антимодернистская Революция"
 GER_european_nationalism: "Европейский Национализм"
 GER_european_nationalism_desc: "Европа в целом - это единый народ. Панъевропейский национализм зародился в трудах итальянца Юлиуса Эволы, который говорил об арийской расе применительно ко всему европейскому народу. Он мечтал о единой Европе, и я уверен, что он никогда не предполагал, что это произойдет таким образом.\n\nОн пережил Вторую мировую войну, видел, как его труды были взяты и извращены нацистами, и теперь с небес он видит, как его мечта ратифицируется. Конечно, мы не будем называть себя арийцами, но мы - европейская раса, и мы будем бороться за освобождение каждого европейца от тирании, даже если она исходит от другого европейца.\n\nНу, конечно, мы не собираемся называть себя арийцами, но мы - европейская раса, и мы будем бороться за освобождение каждого европейца от тирании, даже если она исходит от другого европейца."
 GER_codify_social_stratification: "Кодифицировать Социальную Стратификацию"
 GER_the_managerial_revolution: "Управленческая Революция"
 GER_the_managerial_revolution_desc: "Управленческая революция - это старая концепция, впервые о ней заговорили в книге 1941 года, где говорилось, что в будущем капитализм будет заменен экономикой и правительством, управляемыми технократами и менеджерами.\n\nВ Европе это было реализовано. Революция менеджеров наконец-то наступила, Европейский Союз - это государство менеджеров, его промышленность отточена и направлена советом технократов и бизнесменов.\n\nЛичная свобода не ограничена, но наша система обеспечивает безопасность превыше всего, жертвуя некоторыми предметами роскоши. Эти жертвы необходимы, Европа голосовала за них, Европа понимает."
 GER_the_europe_of_tommorow: "Европа Завтрашнего Дня"
 GER_the_europe_of_tommorow_desc: "Европа впервые стала государством, что является грандиозным достижением, но объединение континента - это только начало. Благодаря гениальности наших корпоративных акционеров мы являемся прогрессирующим обществом, процветающим, наши темпы производства никогда не были высокими, экономика была либерализована до предела, это больше не рай для рабочих, но это рай для всех, для предпринимателей, для ремесленников, для биржевых трейдеров и бизнесменов, это Европа будущего, технологии, разрушение национализма, принятие общеевропейской идентичности, это то, за что мы боролись все эти годы."
 GER_the_europe_of_yesterday: "Вчерашняя Европа"
 GER_the_europe_of_yesterday_desc: "Европа впервые стала нацией. Но мы не Европа нового времени, мы повернули время вспять. То, что мы европейцы, причем панъевропейские, не означает, что мы не можем праздновать историю наших отдельных регионов.\n\nРим, Франция, Греция, Содружество - эти древние империи смотрят на нас сегодня с небес. Мы - их преемники. Ценности столетней давности должны быть возрождены, милитаризм, национализм и чувство национального служения, наш рай был отнят у нас, сломан, разбит, либерализм сделал нас мягкими, пацифизм сделал нас слабыми. В наше время мы добьемся мира с помощью силы, и наша сила будет подпитываться уроками прошлого."
 GER_europe_united_and_strong: "Европа Единая и Сильная"
 GER_europe_united_and_strong_desc: "На протяжении веков Европа представляла собой мозаику. Красивая, но постоянно воюющая сама с собой. Теперь эта мозаика восстановлена. Старые флаги все еще развеваются, но за ними стоит единая воля, единая миссия. Мы живем не в эпоху мира. Наш век - это век расплаты. Во всем мире восстает тирания и рушится демократия. Но только не в Европе. Несмотря на все ее недостатки и предстоящую борьбу, которую мы будем вести за нее, мы выбрали свободу вместо рабства.\n\nЭто не Европа прошлых лет, разделенная, упадническая и умирающая. Это Европа, которая есть: вооруженная и готовая освободить своих сыновей на Востоке. Окончательная политическая эволюция континента, который знает достаточно, чтобы не повторить ту же ошибку. Пусть тираны всего мира смотрят и трепещут. Мы стоим единым фронтом. Панъевропа это не мечта."
 GER_the_end_of_the_russian_experiment: "Конец Российского Эксперимента..."
 GER_the_end_of_the_russian_experiment_desc: "Они считают, что могут играть с Востоком, как с Богом, как будто он принадлежит им. Они попирают ногами суверенитет наших союзников и пытаются подавить свободные народы Европы. Каждая ложь, которую они произносили, каждый коллаборационист, которого они поддерживали, каждый мужчина и женщина, которых они угнетали, - мы их не забыли.\n\nОни называют это стабильностью, но мы знаем, что это гниль. Инфекция, распространяющаяся от Москвы до запада, от Варшавы до Урала: авторитаризм. Когда-то мы предложили тиранам мир. Шанс перестроиться, забыть о призраках прошлого века. Но Россия не может существовать без врагов, и Путин, и этот безумец Медведев сделали нас своими главными соперниками.\n\nПусть это будет их последней мерой. Мы навсегда сокрушим русских и вернем их империю в учебники истории, где ей самое место. Не заблуждайтесь: это не завоевание, а освобождение."
 GER_bulwark_against_the_russian_menace: "Оплот Против Российской Угрозы"
 GER_bulwark_against_the_russian_menace_desc: "Европа проснулась. Мы больше не являемся разрозненным союзом национальных государств, мы стоим в огне самого разрушительного конфликта со времен Второй мировой войны. Русский медведь снова пронесся по нашим землям, разрушая города, свергая правительства и бросая вызов самому существованию объединенной Европы. Но там, где старый Союз мог потерпеть поражение, новый Союз выстоит.\n\nНаши солдаты маршируют не за короля, императора или диктатора; они маршируют за демократию. Они - меч и щит европейского народа, защитники будущего, в котором ни один тиран больше не поставит его на колени. Время раскола закончилось. Мы больше не коалиция, мы - армия. Одна армия, одно командование, одна миссия: защитить Европу."
 GER_project_our_power: "Продемонстрировать Нашу Силу"
 GER_project_our_power_desc: "Эпоха массированных дивизий и траншей, протянувшихся от моря до моря, закончилась. Мы не можем и не будем превосходить наших врагов в живой силе. Но что мы можем сделать, так это переосмыслить и ошеломить врага точностью и координацией. Чтобы победить русские полчища, мы должны создать силы, способные наносить им более быстрые и сильные удары и контролировать воздушное пространство над каждым полем боя. От логистики, управляемой искусственным интеллектом, до беспилотников нового поколения - наше преимущество не в количестве, а в интеллекте."
 GER_european_ingenuity: "Европейская Изобретательность"
 GER_european_ingenuity_desc: "Европа - не континент подражателей. Со времен окопов Вердена и блицкрига в Арденнах наши армии всегда адаптировались и побеждали. Наши поражения в последней войне не были вызваны недостатком духа или интеллекта. Скорее, они были результатом нарушенной координации и устаревших доктрин. Но мы научились. Объединившись и сплотившись, мы будем использовать наши разнообразные военные традиции и объединим их в подлинно европейскую войну, опираясь на уроки НАТО и оттачивая собственную изобретательность."
 GER_centralized_command: "Централизованное Командование"
 GER_centralized_command_desc: "Ключевая причина наших неудач во время войны заключалась в отсутствии связи. Подобно безголовым муравьям, мы постоянно бились о стену, но не осознавали этого, пока она в конце концов не раздавила нас всех под собой. Теперь, имея полностью и по-настоящему интегрированное и централизованное военное командование, мы можем эффективно и результативно работать над тем, чтобы отбить восточного медведя. В прошлый раз восточный оплот нанес нам тяжелый удар, но на этот раз, объединив сердца и умы, Европа добьется успеха и преодолеет наше позорное поражение в прошлом."
 GER_dominate_the_skies: "Господствовать в Небесах"
 GER_dominate_the_skies_desc: "Поле боя следующей войны будет выиграно не только нашими парнями на земле, но и глазами в небе. В прошлой войне российские самолеты прорвали нашу оборону, и наши войска дорого заплатили за эту слабость. Наши инженеры и теоретики должны будут перестроить воздушный бой. Объединенные исследования, объединенные ресурсы и приверженность воздушному превосходству в масштабах всего Союза гарантируют, что ни один вражеский истребитель не посмеет войти в наше воздушное пространство. Европейские пилоты будут летать, будучи уверенными в нашей мощной поддержке, а наши враги узнают, что от бдительного ока в небе не укрыться."
 GER_maximize_supply_lines: "Максимизировать Линии Снабжения"
 GER_maximize_supply_lines_desc: ""
 GER_metal_on_metal: "Металл на Металле"
 GER_metal_on_metal_desc: ""
 GER_democracy_falters: "Демократия Пошатывается"
 GER_democracy_falters_desc: "Трагедия.\n\nВ наш самый темный час мы изо всех сил пытались сдержать русских, но просто не смогли, после первых прорывов наступил хаос, а затем потери пошли один за другим, нам повезло, что Германия избежала большинства наказаний, но мы потеряли весь наш восточный союз. Буфер между нами и Россией исчез, а НАТО находится в полном беспорядке. И как будто этого недостаточно, наши соседи воюют сами с собой."
 GER_embrace_european_unity: "Принять Европейское Единство"
 GER_embrace_european_unity_desc: "Мы сделали все возможное, чтобы объединить Европу, но этого оказалось недостаточно, мы по-прежнему разделены, не работаем вместе, несмотря на все наши усилия. Но это не значит, что мы сдались! Эта потеря лишь укрепила нас в мысли о том, что мы должны объединиться, мы должны стать единым целым!"
 GER_call_emergency_elections: "Объявить Внеочередные Выборы"
 GER_call_emergency_elections_desc: "В условиях кризиса, когда правительство решило провести новые выборы, общественность, обвиняющая правительство, оказывает все большее давление на действующее правительство, а демонстрации партии Volt заполнили улицы городов по всей стране."
 GER_operation_walesa: "ОПЕРАЦИЯ: ВАЛЕНСА"
 GER_operation_walesa_desc: "В современной европейской истории мы дважды теряли наших польских братьев, и оба раза советская угроза проходила по ним. Русские всегда жаждали наших плодородных земель, наших щедрых полей, наших золотых равнин. Но мы не позволим им украсть то, что принадлежит нам по праву, мы не позволим их жадности погубить нас. Вернув себе польский коридор, мы сможем эффективно восстановить сухопутную связь с Батлицами и Украиной, создав путь для их освобождения в будущем."
 GER_utilize_europes_industry: "Использовать Промышленный Потенциал Европы"
 GER_utilize_europes_industry_desc: "Европа - очень густонаселенный, плотный и развитый регион, удивительно, что мы потерпели поражение от России, но, оглядываясь назад, можно сказать, что именно наши ценности не позволили нам использовать наше самое очевидное преимущество - превосходную промышленность.\n\nВ первую войну у нас было много заводов, но они производили бессмысленные предметы роскоши, потребительские товары, безделушки, роскошные автомобили, но мы изменили это. Новая промышленность, которую мы взрастили, производит танки, бомбы, пушки, самолеты, все военные материалы, которые только можно пожелать, в количестве, превосходящем возможности России."
 GER_operation_petliura: "ОПЕРАЦИЯ: ПЕТЛЮРА"
 GER_operation_petliura_desc: "Украинское плато пережило немало страданий от рук русских, и, когда пыль первой войны осела, оно вновь было покорено русскими. По мере того как мы будем продвигаться по Висле, Украина скоро окажется в пределах нашей досягаемости. Скоро мы освободим золотые пшеничные поля Харькова и вернем лазурное небо украинскому народу. В духе Петлюры, неся десятки и тысячи мучеников за украинскую независимость, мы победим, мы добьемся успеха, чтобы двигаться вперед, к свободе и вольности."
 GER_war_time_advancements_eu: "Достижения Военного Времени"
 GER_war_time_advancements_eu_desc: "Война порождает инновации, каждая смерть - это урок, каждый потерянный автомобиль - пример для подражания, ни одна жертва не бывает напрасной. Каждая потеря - во имя дела."
 GER_sanctify_the_armed_forces: "Освятить Вооруженные Силы"
 GER_sanctify_the_armed_forces_desc: "На протяжении всей долгой истории Европы было бесчисленное множество иностранных агрессоров, которые стремились поработить нас, растоптать своими сапогами, сделать нас низшими людьми на нашей земле. И каждый раз наши храбрые солдаты, братья по оружию и крови, сражались плечом к плечу, чтобы дать отпор этим захватчикам. От рыцарей-тамплиеров до спартанских гоплитов - наша кровь давно опутана нитями судьбы. Судьба Европы находится в руках каждого европейца, и по воле Божьей мы снова одержим победу."
 GER_redefine_what_is_european: "Переосмыслить Обозначение Европейца"
 GER_redefine_what_is_european_desc: "Европа географически придвинута к Уралу, но многие в Европе, то есть наша нация, не чувствуют никакого братства с русскими, отчасти из-за почти постоянной войны в истории между нами и ними, продолжающейся до сих пор. Но русские были рабами автократа за автократом, каждый раз переименовываясь в лучшего, чем предыдущий, они - последняя витрина заблудшего народа, заблудших европейцев.\n\nКогда все это закончится, давайте будем милосердны, мы приведем их в рай и покажем им, что на самом деле значит хорошее правительство."
 GER_reeducate_the_liberated_territories: "Перевоспитывать Освобожденные Территории"
 GER_reeducate_the_liberated_territories_desc: "Некоторые из земель, которые мы так милостиво смогли освободить от русских захватчиков, были русифицированы, их мозги промывались угнетателями на протяжении многих лет, и их насильно пичкали русофильской пропагандой. Наш долг - очистить их запятнанные души и поврежденные умы единственной и неповторимой правдой, историей их народа, нашего народа, европейского народа. Когда-то они были потеряны. Потеряны в море российской лжи, но теперь они найдены - своей настоящей семьей, единственными людьми, которые будут их беспрекословно защищать и поддерживать."
 GER_admit_finland_into_nato: "Ультиматум Финляндии"
 GER_admit_finland_into_nato_desc: "Финляндия, страна тысячи озер, страна бесконечного снега. Они знают о российских репрессиях лучше, чем кто-либо другой, и их ненависть к российской агрессии сильнее, чем у любого другого народа на великом белом Севере. Сначала их столетие грабила Российская империя, а затем они потеряли земли, людей и наследие Советов. При небольшом убеждении финны, без сомнения, будут рады сотрудничать с нами. В конце концов, жажда мести и ненависть к востоку заложены у них в генах."
 GER_assist_democracies_everywhere: "Помогать Демократиям Повсюду"
 GER_assist_democracies_everywhere_desc: "Пусть расцветает цветок свободы. Пусть растут плоды наших воинов и демократических братьев. Когда-то именно американцы были стереотипом свободолюбивых и кичащихся демократией людей. Теперь эту мантию возьмет на себя Европа. Мы станем новыми лидерами свободного мира. Мы будем садовниками этого райского сада, мы будем хранителями этого рая на Земле. С этого дня каждый мужчина и каждая женщина будут свободны, будут жить свободно и умрут свободно."
 GER_strike_most_vulnerable: "Нанести Удар по Наиболее Уязвимым"
 GER_strike_most_vulnerable_desc: "Наш враг, несомненно, грозен. Их защита сильна, но не пробиваема. Когти медведя затупились, зубы сгнили, а мех поредел. Он уже устал от многолетних междоусобиц и неудачного восстановления после предыдущей войны. Подобно кинжалу, мы пронзим их по самым слабым местам и ударим прямо в самое пекло. Смерть медведя не будет легкой и быстрой, но она, без сомнения, будет необходимой."
 GER_agenda_2040: "Agenda 2040"
 GER_agenda_2040_desc: "Это была сцена. Где она была? Везде. Неважно, что это было - гостиная, здание парламента, театр или городская улица, окруженная массивными бетонными блоками, - он был там. Образ Клауса Шваба в кресле словно вынырнул из небытия и теперь стоял у всех перед глазами."
 GER_safety_and_security: "Охрана и Безопасность"
 GER_safety_and_security_desc: "Многие решения, принятые предыдущими европейскими лидерами, вызывают сомнения, а даже самые разумные меры не были реализованы в той степени, которая позволила бы добиться подлинной безопасности.\n\nПока угрозы сохраняются как внутри, так и снаружи, мы должны без колебаний их пресекать. Частная жизнь и свобода были всего лишь иллюзиями, которые порождали ненависть и мятеж, и люди должны понять, что они остались в прошлом."
 GER_solidify_secret_clubs: "Руки за Лицом"
 GER_solidify_secret_clubs_desc: "Конечно, мы не должны забывать о наших благотворителях, великих бизнесменах, представителях мудрейших людей мира, которые придумали для нас множество великих идей и позволили нашему шоу продолжаться.\n\n Мы собрали отличную команду экспертов и мыслителей, учитывая их пожелания, и все это для того, чтобы наша великая работа продолжалась."
 GER_architecture_of_post_modernity: "Архитектура Постмодернизма"
 GER_architecture_of_post_modernity_desc: "Хотя многие изменения, которые мы привносим, не так легко интегрируются в общество, они являются необходимыми шагами на пути к нашей цели. Люди должны научиться адаптироваться к новым условиям.\n\nВремя старого человека подходит к концу. Социальный договор, города, в которых они живут, работа, на которой они трудятся, - все меняется вместе с ним.\nЭто новая реальность, нравится она им или нет."
 GER_new_human_concept: "Наш Собственный Homo Sapiens"
 GER_new_human_concept_desc: "Но, конечно, самые важные и грандиозные изменения происходят с перестройкой самого человека. Отказ от старых предрассудков и моральных ограничений открывает нам путь к бесконечным возможностям в нашем стремлении к преображению.\n\nНет больше негативных эмоций, которые так сильно влияют на производительность и социальную сплоченность - чип позаботится о том, чтобы вы всегда улыбались и выполняли свою работу с оптимизмом и воодушевлением! \n\nСолдаты и рабочие, усовершенствованные протезами, которые делают их сильнее и быстрее, чем задумано природой.\n\nНет больше преступлений, так как ваше местоположение всегда на карте.\n\nИ это не говоря уже о полном изменении способа взаимодействия людей друг с другом, полном перетряхивании архаичного порядка вещей."
 GER_the_new_surplus_value: "Новая Прибавочная Стоимость"
 GER_the_new_surplus_value_desc: "По мере того как мы движемся к неизбежному будущему, сами основы культуры и общества начинают перестраиваться, в результате чего возникает совершенно новая социально-экономическая формация, которая заменит устаревшую, неэффективную систему сегодняшнего дня.\n\nДа, как бы смешно это сейчас ни звучало, цивилизация началась с семейных уз, племенных форм контроля и порабощения. В древние и средневековые времена человечество освоило новую систему: рабство, экономическую систему, которая требовала физического принуждения к подчинению. Наконец, спустя столетия, на смену ему пришла капиталистическая система, требующая лишь контроля над трудом.\n\nСовременные технологии позволяют нам продвинуться еще дальше. Зачем контролировать тела людей, зачем контролировать их труд, если можно напрямую завладеть их подсознанием, их желаниями, их стремлениями, их мыслями.\n\nПрибавочная стоимость новой системы - это душа."
 GER_establish_the_two_class_society: "Создать Двухклассовое Общество"
 GER_establish_the_two_class_society_desc: "Самая тяжелая пилюля, которую придется проглотить, заключается в том, что экономическое распределение, к которому так привыкли наши граждане, полностью изжило себя. Система среднего класса просто не может продолжать существовать в эти кризисные времена, и распределение богатства будет меняться с нуля.\n\nМы должны признать, что не все могут жить как король или даже аристократ. Мы должны довольствоваться теми удобствами, которые у нас уже есть. Накапливать излишки и иметь больше, чем нужно, - это эгоистичное желание, которое остается частью человеческой природы, но, надеюсь, со временем оно изменится.\n\nСейчас мы должны думать об общем благе, а не о том, какой будет жизнь некоторых людей через несколько лет или около того. Только немногие по-настоящему выдающиеся люди заслуживают лучшей, роскошной жизни."
 GER_erase_national_divisions: "Стереть Национальные Различия"
 GER_erase_national_divisions_desc: "Национальная ненависть всегда была движущей силой неповиновения и раскола, что уже сильно помешало нашим планам. В будущем нет места национальным разногласиям, они должны исчезнуть. Единство и сотрудничество должны поддерживаться любой ценой.\n\nИ только когда мы справимся с этими ксенофобскими, «патриотическими» заблуждениями, мы сможем перейти к построению истинной справедливости и гармонии."
 GER_the_order_of_the_future: "Порядок Будущего"
 GER_the_order_of_the_future_desc: "Теперь, когда наши преобразования идут полным ходом, мы можем по-настоящему гордиться своей работой. Возможно, нужно сказать еще кое-что..."
 GER_democracy_now: "Демократия СЕЙЧАС!"
 GER_democracy_now_desc: "Трагедия. Трагедия всегда была основным аспектом европейской истории. Падение Римской империи, отбросившее нас на много веков назад, первая и вторая мировые войны, принесшие европейскому континенту неисчислимые разрушения и залившие европейскую землю кровью, и вот теперь - падение НАТО. Я пытался предупредить их о русских варварах, о том, что нам нужно расширить наш альянс, чтобы подготовиться к нему во всех уголках Европы. Но они не слушали, политики были слишком сосредоточены на умиротворении русских, слишком слепы, чтобы увидеть правду перед собой, и когда они осознали свою ошибку, было уже слишком поздно, и наш континент снова был разорван на части адскими когтями войны.\n\nНо все еще не потеряно, европейцы увидели правду в моих словах, как в Интернете, так и при личных встречах, и они заговорили. Они выбрали меня, чтобы я вел их к лучшему завтрашнему дню, где Россия больше не представляет угрозы, где демократия является нормой, а агрессия никогда не будет терпимой. Боль, причиненная Россией, будет возвращена в десятикратном размере."
 GER_tax_reform_for_europeans: "Налоговая Реформа для Европейцев"
 GER_tax_reform_for_europeans_desc: "Уже долгое время налоги являются головной болью для Европы. Это связано с безумными процентами, которые трудолюбивые европейцы должны были платить своему правительству, чтобы выжить. Ставки налогов часто превышали 50 процентов, что является безумием и только вредит среднему рабочему человеку. Такая практика является неустойчивой и вредной, поэтому для меня очевидно, что мы должны снизить налоги в Европейском союзе, чтобы у нас был хоть какой-то шанс на создание здоровой и крепкой экономики для борьбы с российской угрозой. Скоро европейцы больше не будут вынуждены платить большую часть своих тяжело заработанных денег в виде налогов, и благодаря этому наша экономика будет процветать."
 GER_bringing_europe_together: "Объединяя Европу"
 GER_bringing_europe_together_desc: "Любой, кто побывал в Европе, может подтвердить ее красоту, но, как и все континенты, Европа погрязла в междоусобицах и трагедиях. Пророссийски настроенные люди, которые все еще тосковали по давно ушедшим временам Советского Союза, не позволили нам покончить с этой катастрофой. То, что некоторые европейцы помешали объединению, просто невероятно. Из-за диверсантов на наших собственных границах у нашей армии не было ни единого шанса, когда русская орда ворвалась на польскую границу. Все эти проблемы должны быть выброшены в мусорную корзину, так как все страны Европы должны быть в НАТО и объединены, чтобы быть в безопасности от российской агрессии. И сейчас я призываю всех европейцев объединиться и сплотиться, чтобы положить конец российской агрессии и вернуть Россию на ее место, в мусорную корзину истории."
 GER_end_european_neutrality: "#EndEuropeanNeutrality"
 GER_end_european_neutrality_desc: "Когда русское нашествие грозило навсегда покончить с европейской демократией, Германия упорно сражалась за Европу. Все страны объединились ради того, чтобы русская орда не смогла покончить с демократией, которую мы строили столько лет. Но сейчас многие страны сохраняют нейтралитет, несмотря на всю боль, которую причинила нам Россия, они вдруг хотят вести себя как сидельцы.\n\nНеприемлемо. Абсолютно неприемлемо! Я позабочусь о том, чтобы все социальные сети узнали об этих предателях. Я призову бросить в них все, что только можно, в социальных сетях, в речах и в военном кабинете. И скоро они узнают, что бывает со змеями, которые бросают Европу в трудную минуту..."
 GER_spread_our_message: "Распространить Наши Идеи"
 GER_spread_our_message_desc: "За десятилетия работы экономистом я никогда не сталкивался с более полезным инструментом, чем социальные сети. Через социальные сети я рассказал миллионам людей правду о российском империализме, о том, как мы должны с ним бороться, и о своих взглядах на происходящее в мире. Как ни странно, многие находят в моих постах комизм, возможно, дело в том, как я говорю, а может быть, в том, какие мнения я высказываю. Несмотря на это, это работает только в мою пользу. Каждый раз, когда они смеются, они возвращаются за добавкой. А когда они возвращаются за добавкой, они слушают. И наконец, когда они слушают, они присоединяются к нашему делу. Плоды моего труда уже очевидны. Тысячи наших молодых людей присоединились к европейской армии, и еще тысячи присоединятся, когда я призову всех европейцев присоединиться к этому делу. Наша армия начала бросать тень на восточных гуннов, и им остается только наблюдать. Эпоха европейской трагедии скоро закончится."
 GER_strengthen_the_heavy_lifters: "Укрепить Тяжеловесов"
 GER_strengthen_the_heavy_lifters_desc: "В те дни, когда русские орды еще не ворвались в наши пределы, я выступал с петицией за прекращение австрийского нейтралитета. В моем мозгу возник вопрос, и я спросил кого-то, какие страны приходят ему на ум, когда он думает о Европе. В ответ они перечислили такие страны, как Германия и Франция. На это есть веская причина: несмотря на то что вся Европа продолжала вносить свой вклад, эти две страны взвалили на себя большую часть груза, который лежал на наших спинах, как в промышленном, так и в военном отношении. Даже несмотря на то, что война за Европу была проиграна, Германия и Франция продолжали сражаться, чтобы сохранить европейскую безопасность от российской агрессии. Теперь мы не должны оставлять эти страны в пыли, я призываю расставить приоритеты. Они станут не только промышленным центром освобожденной Европы, но и культурным центром. Эти страны будут известны всем как бьющееся сердце Европы!"
 GER_total_decolonization: "Тотальная Деколонизация"
 GER_total_decolonization_desc: "Европейская культура. Богатая традициями и обычаями. В Европе сотни различных культур, каждая из которых имеет свою кухню, традиции и многое другое. Но на протяжении богатой истории Европы многие из этих культур были уничтожены более крупными державами и отправлены в мусорную корзину истории. Даже сегодня народы Косово и Каталонии подвергаются издевательствам со стороны своих более крупных и могущественных соседей - Сербии и Испании. Другие великие державы уже неоднократно предлагали решить эту проблему, которая терзает Европу, но я хотел бы, так сказать, бросить свою шляпу на ринг. Я призываю к созданию автономных зон для этих угнетенных наций, чтобы создать по-настоящему деколонизированную и мультикультурную Европу."
 GER_focus_on_the_home_front: "Сосредоточиться на Внутреннем Фронте"
 GER_focus_on_the_home_front_desc: "Несмотря на подавляющую поддержку моей администрации со стороны европейцев, к сожалению, все еще есть те, кто скептически относится к моему руководству и моей способности победить российскую угрозу. Такие утверждения в конечном счете необоснованны и откровенно ошибочны, что является еще одним примером смертельной хватки российской пропаганды на доверчивых людей в пределах наших границ. Европейской нации пора понять, что интересы моего правительства - это интересы их самих. Как через посты в социальных сетях, так и через физические брошюры. Я позабочусь о том, чтобы каждый европейский мужчина, женщина и ребенок знал о достоинствах моей администрации."
 GER_democratize_foreign_minds: "Демократизация Иностранных Умов"
 GER_democratize_foreign_minds_desc: "Независимо от того, что европейцы в большинстве своем поддерживают мою администрацию, всегда найдутся те, кто за пределами наших границ захочет нас унизить, либо по невежеству, либо по злому умыслу. Я видел это в социальных сетях, где меня много раз отмечали и преследовали как русские, так и другие иностранцы за то, что я люблю Европу. Также в социальных сетях многие пытаются превратить моих европейских братьев в тех, кто отступит от нашего движения ради тирании России, что просто смешно. Этого нельзя допустить, и я уже приложил немало усилий для демократизации иностранных умов. Но пришло время активизировать наши усилия, если мы надеемся на международную поддержку."
 GER_powerful_independent_united: "Могущественная, Независимая, Единая"
 GER_powerful_independent_united_desc: "Европа сейчас находится в лучшем положении, чем когда-либо прежде, посмотрите на всю ту хорошую работу, которую я проделал! Эпоха трагедий скоро закончится, и европейские самолеты будут летать в небе, готовые превратить русскую угрозу в пепел. Наши армии готовятся, готовят оружие и тренируются день и ночь к тому моменту, когда мы нанесем удар и освободим Восточную Европу, а может быть, и весь мир от русской чумы раз и навсегда. Прошли времена мелких разборок между странами, едва связанными ЕС, - медленно, но верно наша нация полностью объединит Европу. Я призываю всех европейцев праздновать!"
 GER_end_world_neutrality: "#EndWorldNeutrality"
 GER_end_world_neutrality_desc: "Мир, казалось бы, с ужасом наблюдал за началом европейской войны, большинство, казалось бы, поддержало нас, когда русская давка угрожала покончить с европейской демократией, но где они сегодня? Я вижу, как они осуждают наши действия в социальных сетях, несмотря на то, что изначально они оказывали нам поддержку? Невероятно! Я обязательно буду обращаться к ним на всех возможных площадках, потому что их нынешний нейтралитет, несмотря на нарушения Россией прав человека и геноцид, который она устроила украинцам, абсолютно смешон и мы больше не будем это терпеть!"
 GER_all_out_information_assault: "Информационный Штурм"
 GER_all_out_information_assault_desc: "Никогда еще не было такого полезного инструмента для распространения наших идей, как Интернет. Каждый день миллионы или даже миллиарды людей со всего мира заходят в него, чтобы развлечься или узнать о событиях, происходящих в окружающем их мире, который движется слишком быстро, чтобы кто-то мог за ним успеть. Но мы можем использовать это, мы можем показать миллионам людей по всему миру и в России достоинства нашей нации, набрав всего лишь час текста. Информационная война - это будущее, и я добавлю ее в свой арсенал и со временем овладею ею."
 GER_think_tanks_for_war: "Аналитические Центры для Войны"
 GER_think_tanks_for_war_desc: "Война - сложное дело, так было всегда и так будет всегда. Но скоро война снова придет в Европу, это неизбежность, и мы должны к ней подготовиться. Проигрыш Европы в европейской войне обусловлен множеством причин, но самой главной из них стал провал нашей стратегии. Эти стратегические провалы привели к падению Восточной Европы и массовым нарушениям прав человека, которые мы наблюдаем сегодня. Этого не должно произойти в следующий раз, будущее Европы поставлено на карту, и я призываю создать мозговые центры для войны, чтобы лучшие военные умы нашего поколения могли обдумать новые стратегии, которые заставят Россию бежать назад."
 GER_secure_the_south: "Закрепиться в Подбрюшье"
 GER_secure_the_south_desc: "Вот уже несколько десятилетий на Ближнем Востоке живут тираны, деспоты и террористы. Страны Ближнего Востока ничего не сделали для того, чтобы обуздать этих субъектов насилия, и часто, по сути, позволяли этим организациям процветать в пределах своих собственных границ. Так больше продолжаться не может, слишком долго мы позволяли странам Ближнего Востока терроризировать мир и распространять свой радикальный экстремизм на наше гражданское население. Я позабочусь о том, чтобы с этой угрозой было покончено, и никогда больше ни один европеец не погибнет от террористической атаки."
 GER_asian_gamble: "Азиатская Авантюра"
 GER_asian_gamble_desc: "Я много исследовал историю Китая и обнаружил очень тревожную информацию. Сколько существует Китайская Народная Республика, столько же существует и жестокий колониализм со стороны китайского правительства. Самый известный пример китайского империализма - захват и аннексия Тибета, но даже регион Синьцзян подвергался жестокому угнетению со стороны китайского правительства и его сторонников. Этого нельзя допустить; я не позволю этому продолжаться ни одного дня. Я призываю к полной деколонизации Китая и превращению его в #Ex-China."
 #Modifiers 
 sanctions_lifted: "Санкции Сняты"
 GER_flooded: "Сильное Наводнение"
 GER_walkable_city: "Прогулочный Город"
 GER_model_fuhrer_city: "Образцовый Город Фюрера"
 GER_economic_devastation_dynamic: "Экономическая Разруха"
 GER_peoples_economy_dynamic: "Volkswirtschaft"
 GER_peoples_economy_dynamic_desc: "Немецкая экономика уже давно стала неизбежной экономической сверхдержавой. Рейн дает большое количество ресурсов, которые способствовали индустриализации в прошлом, а в сочетании с многочисленным и опытным населением неудивительно, что наша страна имеет самую большую экономику на европейском континенте и одну из крупнейших в мире. Однако в последнее время на ее долю выпали тяжелые испытания. Застойный рост, безработица и пренебрежение к ядерным источникам энергии. Нынешняя и будущая администрации Германии должны сделать так, чтобы немецкая экономика вновь заняла свое место среди сверхдержав.\n\n\n\n\n£GFX_GER_volkswirtschaft_banner\n\n\n\n\n"
 GER_bundeswehr_dynamic: "Бундесвер"
 GER_bundeswehr_dynamic_desc: "Созданная в 1955 году во время холодной войны Федеральная оборона, или Бундесвер, является вооруженными силами Германии и отвечает за оборону страны и международные миссии. С тех пор как Германия воссоединилась, бундесвер столкнулся с серьезным пренебрежением и сокращением бюджета. Но теперь, когда Москва, похоже, показывает свое истинное лицо, среди всех слоев немецкого общества все чаще возникают разговоры о том, что бундесвер должен стать по-настоящему уважаемой силой."
 GER_bundestag_dynamic: "Бундестаг"
 GER_bundestag_dynamic_desc: "Бундестаг - это парламент Германии федерального уровня. В нем представлены самые разные политические партии, что дает широкое представление о текущем политическом составе страны, и представители каждой партии могут обсуждать и принимать законы и государственную политику. Однако, как и во многих других демократических государствах, его состав никогда не бывает постоянным, поскольку ветры политических перемен и выборов постоянно его колеблют. Особенно сейчас, когда популярность набирают популистские и даже радикальные партии, мы можем ожидать беспокойного и напряженного климата в парламенте. И политики, и избиратели в равной степени задаются вопросом, какие политические потрясения могут поджидать их прямо за углом.\n\n\n\n\n\n£GFX_GER_bundestag_banner1\n\n\n\n\n"
 GER_die_linke_dynamic: "£GFX_GER_die_linke_texticon Популярность §RDie Linke§!"
 GER_greens_dynamic: "£GFX_GER_spd_texticon Популярность §GЗелёных§!"
 GER_fdp_dynamic: "£GFX_GER_fdp_texticon Популярность §YСвДп§!"
 GER_spd_dynamic: "£GFX_GER_spd_texticon Популярность §tСДП§!"
 GER_cdu_dynamic: "£GFX_GER_cdu_texticon Популярность §CХДС§!"
 GER_afd_dynamic: "£GFX_GER_afd_texticon Популярность §gАдГ§!"
 GER_festung_stadt: "Festungsstadt"
 GER_military_reformation_dynamic: "Военное Реформирование"
 GER_military_reformation_dynamic_desc: "Вместе с политической и социальной революцией, которую мы совершили в этой стране, пришла и революция в вооруженных силах Германии. Старый капиталистический бундесвер в настоящее время переживает не что иное, как обширную и системную реформу и реструктуризацию. Формируются новые подразделения, пересматриваются доктрины, вводятся новые стандарты, расширяется набор личного состава; происходящие изменения трудно поддаются количественной оценке. Несмотря на то, что для преданных солдат и офицеров армии это может показаться неспокойным, в результате реструктуризации вскоре появятся современные и пролетарские вооруженные силы, на которые сможет равняться весь мир."
 GER_military_reformation_communist_dynamic: "Национальная Народная Армия"
 GER_military_reformation_idea: "Военное Реформирование"
 GER_military_reformation_idea_desc: "Вместе с политической и социальной революцией, которую мы совершили в этой стране, пришла и революция в вооруженных силах Германии. Старый капиталистический бундесвер в настоящее время переживает не что иное, как обширную и системную реформу и реструктуризацию. Формируются новые подразделения, пересматриваются доктрины, вводятся новые стандарты, расширяется набор личного состава; происходящие изменения трудно поддаются количественной оценке. Несмотря на то, что для преданных солдат и офицеров армии это может показаться неспокойным, в результате реструктуризации вскоре появятся современные и пролетарские вооруженные силы, на которые сможет равняться весь мир."

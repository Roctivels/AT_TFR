 GER_german_legacy_idea2_desc: "За последние 100 лет немецкое наследие было наследием позора, угнетения, геноцида и диктатур. От кайзера, пролившего кровь тысяч людей на полях Западной Европы, до жестокого разгула нацистов, обескровивших Европу досуха, и до правительства Восточной Германии, чье изощренное полицейское государство десятилетиями определяло что такое "авторитаризм". Германия никогда не должна забывать свое тяжёлое прошлое. Народ открыто ненавидит гипермилитаризацию, что вызвает нехватку личного состава для армии. Чтобы увериться, что Германия никогда больше не сможет разрушить Европу, экстремистские идеологии - такие как коммунизм и нацизм, не имеют популярности в Германии и активно подавляются правительством, в целях того, чтобы ошибки 20-го века никогда больше не повторялись."
 GER_bundeswehr_shortcomings_german_legacy_dummy_idea: "Крайние Недостатки Бундесвера §Wи§! Deutsches Vermachtnis"
 GER_merkelreich_idea2: "Merkelreich"
 GER_merkelreich_idea2_desc: "Ангела Меркель была оплотом стабильности в немецкой политике в течение последних 15 лет. При Меркель Германия наблюдала, как ее ведут в эпоху процветания, благодаря ее роли одного из ключевых членов Европейского союза, и все это при обеспечении мира как внутри страны, так и с Русскими. Однако в связи с тем, что правление Меркель подходит к концу и она объявляет, что не будет стремиться к переизбранию в 2021 году, будущее Германии становится более неопределенным. Учитывая все еще острый кризис из-за беженцев, экономические проблемы, маячащие на горизонте, и все более нестабильные США. Как долго на самом деле продлится внутренняя стабильность в Германии?"
 GER_merkelreich_idea: "Merkelreich"
 GER_merkelreich_idea_desc: "Ангела Меркель была оплотом стабильности в немецкой политике в течение последних 15 лет. При Меркель Германия наблюдала, как ее ведут в эпоху процветания, благодаря ее роли одного из ключевых членов Европейского союза, и все это при обеспечении мира как внутри страны, так и с Русскими. Однако в связи с тем, что правление Меркель подходит к концу и она объявляет, что не будет стремиться к переизбранию в 2021 году, будущее Германии становится более неопределенным. Учитывая все еще острый кризис из-за беженцев, экономические проблемы, маячащие на горизонте, и все более нестабильные США. Как долго на самом деле продлится внутренняя стабильность в Германии?"
 GER_russo_german_trade_deal_idea: "Российско-Германская Торговая Сделка"
 GER_russo_german_trade_deal_idea_desc: "В духе сотрудничества и дипломатии, что, казалось бы, редкость для них, русские провели переговоры и подписали с нами важную торговую сделку. Сделка носит всеобъемлющий характер и предусматривает новые договоренности о многомиллионном и миллиардном импорте ископаемого топлива и сельскохозяйственной продукции в обмен на экспорт нами ключевых технологий и промышленных товаров, востребованных в российском производственном секторе. Это станет долгожданным изменением в экономических перспективах Германии, тем более что многие сомневаются в устойчивости нашей экономики в ближайшем будущем."
 GER_deutsche_marine_revitalization_idea: "Возрождение Deutsche Marine"
 GER_deutsche_marine_revitalization_idea_desc: "Немецкая морская пехота, обеспечивающая военно-морские операции, морскую оборону и международные морские миссии Германии, нуждается в возрождении. В этом ему помогут новые доктрины и повышенное внимание к кораблестроению."
 GER_mass_tank_production_idea: "Массовое Производство Танков"
 GER_mass_tank_production_idea_desc: "Наши заводы выпускают больше танков, чем обычно. Мы создадим большой запас, чтобы удовлетворить наши потребности в технике и гарантировать, что Бундесвер никогда не столкнется с нехваткой танков, как это было всего несколько лет назад."
 GER_blind_eye_to_army_extremism_idea: "Игнорировать Армейский Экстремизм"
 GER_blind_eye_to_army_extremism_idea_desc: "В основном от отчаяния мы позволим любому человеку, независимо от его убеждений, вступить в наши вооруженные силы. Конечно, это может сделать бундесвер менее организованной и уважаемой силой и привести к злодеяниям, совершаемым за нашей спиной, но мы сможем легче выполнять наши квоты на численность."
 GER_purged_extremist_soldiers_idea: "Чистка Солдат-экстремистов"
 GER_purged_extremist_soldiers_idea_desc: "Чтобы наши солдаты оставались верными Федерации и не были порождены ненавистью, Бундесвер был очищен от любого вида радикализма в своих рядах. Хотя в краткосрочной перспективе это может оказаться пагубным, в будущем бундесвер, надеемся, получит положительные результаты, не столкнувшись с нелояльностью и экстремизмом."
 GER_digital_development_idea: "Цифровые Разработки"
 GER_digital_development_idea_desc: ""
 idea_NATO_advisors: "Советники НАТО"
 idea_NATO_advisors_desc: "Недавно к нам прибыли советники с самых высоких постов из штаб-квартиры НАТО в Брюсселе. Они приехали, чтобы помочь нам обучить наши войска, разработать доктрины и предоставить нам базовый план по защите нашей страны от любых гипотетических российских атак."
 idea_EU_unified_army_commands: "Единое Армейское Командование ЕС"
 idea_EU_unified_army_commands_desc: "Европейский союз под руководством Германии объединил все национальные вооруженные силы в единую структуру военного командования, расширив свою общую политику безопасности и обороны. Это позволяет Союзу действовать в ответ на региональные и глобальные угрозы как единое целое."

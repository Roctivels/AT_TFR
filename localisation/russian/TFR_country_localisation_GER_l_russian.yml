 germany.91.d: ""
 germany.91.a: "Отличные новости!"
 germany.92.t: "Формирование европейского интернационала"
 germany.92.d: "Алое знамя взвилось над Европой, когда Германия объявила о создании Европейского интернационала, альянса коллективной безопасности, который должен заменить НАТО. С заявленной целью распространения революции по всей Европе Германия оказала поддержку социалистам в других западноевропейских странах, включая Францию, Грецию и Испанию. Поскольку революционное левацкое насилие бушует по всей Западной Европе в качестве яростной реакции на поражение Российской империи, почти наверняка в Европейском интернационале скоро примут участие не только Германия, но и другие страны.\n\nРоссийская империя уже осудила это заявление, заявив, что она \"готова изгнать дьявола большевизма из Европы еще раз, если потребуется\", а спутниковые снимки указывают на возросшую военную активность России среди оккупированных регионов Польши. Поскольку Германия продолжает свое перевооружение и реконструкцию после войны между Россией и НАТО, многие задаются вопросом, не является ли это развитие событий просто еще одним шагом к войне в эпоху, когда за мир так тяжело боролись."
 germany.92.a: "Европа снова приближается к войне"
 germany.93.t: "Активист Die Linke слил Движения Армии"
 germany.93.d: "Война с Россией привела к множеству предотвратимых смертей, будь то гражданские или военные, но с российской агрессией против суверенитета наших союзников мы не могли бы стоять там и ничего не делать, однако некоторые из наших соотечественников, похоже, не согласны.\n\nАктивистам из Die Linke удалось обнародовать передвижения войск НАТО, и такая информация, без сомнения, была бы использована русскими против нас. Эти активисты утверждают, что они сделали это во имя мира, но, похоже, забывают, что из-за их действий пострадает еще больше наших людей.\n\n Независимо от их мотивов, утечка такой важной информации считается государственной изменой федеративной республике.\n\nТе, кто не бежал из страны, были арестованы, и с такими вопиющими доказательствами их действий им грозит пожизненное заключение, теперь нам приходится иметь дело с последствиями их действий и переосмыслить наши стратегии, чтобы выиграть эту войну."
 germany.93.a: "Ублюдки! Каждый из них до единого!"
 germany.94.t: "Араб-джихадист предупреждает силы НАТО"
 germany.94.d: "'Граждане мира,' - спокойно начал Представитель, - 'вы вот-вот станете свидетелями священной войны эпических масштабов. Вероломные западники прятались в своем логове, замышляя свои планы по уничтожению мусульманского мира. Они готовили войну на уничтожение против нашего священного бастиона ислама!' - теперь голос представителя звучал громче и агрессивнее.\n\n'НАТО... Ваши безбожники солдаты не идут ни в какое сравнение со святыми воинами Аллаха. Они потерпели неудачу в Афганистане. Они потерпели неудачу в Ираке. Они потерпели неудачу в Сомали. Вы... Вы потерпите неудачу и в Аравии!' - Он вытащил свой трофейный карабин М4, поднял его в воздух и выкрикнул свое последнее предупреждение. 'АЛЛАХ НЕ ПОЗВОЛИТ ВАМ ПОБЕДИТЬ! ОН УЖЕ УНИЧТОЖИЛ ВАШЕГО АМЕРИКАНСКОГО ДЬЯВОЛА, И СКОРО СДЕЛАЕТ ТО ЖЕ САМОЕ И С ВАМИ! ОН ПОБЕДИТ ВАС ОГНЕННОЙ ЯРОСТЬЮ! ОН БУДЕТ ИСПЕПЕЛЯТЬ ВАС СНОВА И СНОВА, ПОКА НЕ ОСТАНЕТСЯ ТОЛЬКО ПЕПЕЛ! АЛЛАХ АКБАР!'"
 germany.94.a: "Завуалированные угрозы! Они знают, что им конец!"
 germany.95.t: "Приказ о Выводе Войск из Саудовской Аравии"
 germany.95.d: "Результаты военной операции в Саудовской Аравии, направленной на ликвидацию очага джихадизма, не сулят ничего хорошего в плане продолжения. Регион и операция оказались черной дырой для военных расходов и персонала, поскольку все, что мы туда отправляем - новое оружие, солдаты, танки, вертолеты, - не способно изменить ход войны. Джихадисты, вооруженные захваченной нами техникой, финансируемые нашими врагами и подкрепленные опытом, особенно в Ираке, Сомали, Сирии и Афганистане, дали жесткий отпор.\n\nЧисло жертв НАТО превышает число жертв джихада, наша экономика пострадала от военных действий, а общественность больше не поддерживает эту войну. Вывод войск необходим, поскольку мы уже ввязались в одну из худших военных катастроф XXI века."
 germany.95.a: "Мы потерпели неудачу..."
 germany.96.t: "Интервенция в Саудовской Аравии"
 germany.96.d: "С захватом джихадистами Саудовской Аравии и тысячами беженцев, покидающих страну, было бы лишь вопросом времени, когда мы коллективно согласились бы положить конец террористической угрозе на Арабском полуострове, уже нанесен большой ущерб.\n\nИстории о массовых убийствах, разрушении культурного наследия и истории, а также поощрении терроризма в других странах, мы не можем сидеть сложа руки и позволять им восстанавливаться и оставаться помехой свободному миру, вот почему будет проведена подготовка к вторжению на контролируемые террористами территории в сотрудничестве с другими странами Ближнего Востока и любыми дружественными повстанческими силами, арабскому народу не придется жить в постоянном страхе, и мы покажем миру, что мы имеем в виду, когда говорим, что свобода и демократия должны распространяться повсюду.\n\nМы выступим против экстремизма, мы выступим против террора и мы освободим угнетенных."
 germany.96.a: "Gemeinsam gegen den Terror"
 germany.97.t: "Парад Победы в Киеве"
 germany.97.d: "Наконец-то все закончилось. Русский дикарь был убит на поле боя, пытаясь трусливо и позорно сбежать вслед за европейской демократией и пламенным факелом избирательного права. Однако наша работа еще не закончена, поскольку последствия продолжают ощущаться.\n\nОднако это всегда было поводом для празднования. Мы устранили главную угрозу нашим институтам и продолжили праведную борьбу за свободу континента. Этот парад станет символом единства, а не разделения и тупиковой ситуации, и станет средством объединения друзей в борьбе с тиранией.\n\nВозможно, тела погибших пошатнулись, но наше путешествие отомстило за них. Давайте идти вперед и покажем миру, что мы всегда были победителями с момента нашего основания!"
 germany.97.a: "Они не могли видеть свет, они почувствовали жар."
 germany.98.t: "Начало ОПЕРАЦИИ: МИРОВОЙ КОНТРОЛЛЁР"
 germany.98.d: "Я обращаюсь к вам сегодня с позиции радости и триумфа. Глобальная демократия одержала необходимые победы за последние несколько лет и убедилась, что Европейский континент полностью защищен от антидемократической волны, которая, казалось, нарастала после неудач первых лет десятилетия. Мы все были на торжествах и выпили свою долю шампанского, но сейчас самое время смотреть вперед и учитывать потребности завтрашнего дня.\n\nПо всему миру тоталитарные режимы продолжают подавлять свое население, используя самую жестокую политику; В Сирии режим использует химическое оружие и винтовки против мирных протестующих. В Иране они используют газовые баллончики и дубинки против женщин просто за то, что они появляются на публике без одежды. Давайте не будем забывать Афганистан, где радикальное исламское направление распространило идеологию ненависти по всей Центральной Азии. Эти режимы представляют худшую часть человечества, но у нас есть возможность помочь этим странам стать примерами лучшего.\n\nМы больше не будем терпеть тиранов. Мы больше не будем уступать место тем, кто обращается со своим народом как с рабами. Сегодня все наши демократии проводят черту в пыли и заявляют перед тиранами: "Сегодня ваш день". Если они не уступят, они и их союзники столкнутся с коллективной мощью свободного мира, и их власть будет сломлена на глазах у их народа"
 germany.98.a: "Мир избавится от авторитаризма!"
 
 germany.99.t: "ПЕРЕДОВОЙ ОТЧЕТ: [GetDateText]"
 germany.99.d: "ОТ:PRESIDENTE DEL COMITATO MILITARE DELL'UNIONE EUROPEA, КЛАУДИО ГРАЦИАНО\n\nЯ выражаю свои искренние сожаления по поводу информации, которая будет раскрыта в этом письме. Ливийское сопротивление в пункте вторжения "Салах" оказалось неожиданно ожесточенным и хорошо организованным. Несмотря на недели воздушных бомбардировок вражеских укреплений и систем противовоздушной обороны, авианосная группа 11 понесла аналогичные тяжелые потери в воздухе в небе над Тобруком, нанося удары по ливийскому парламенту. Таким образом, они не смогли защитить людей на пляжах, когда те попытались воспользоваться проломом. Наши силы были отброшены назад и, прямо скажем, уничтожены. Сектор был признан несостоятельным, и Генеральный штаб согласился оставить его. Усилия по спасению людей, застрявших на мысе Салах, увенчались успехом, но восстановленные силы бледнеют по сравнению с потерянными жизнями и взятыми в плен.\n\nИзображения последствий точки "Салах" ужасны, и я готов предстать перед Европейской комиссией и взять на себя всю вину за катастрофу.\n\nПОДПИСЬ - "
 germany.99.a: ""
 germany.100.t: "Дискриминация русских в странах Прибалтики"
 germany.100.d: "Балтийские государства Латвии, Эстонии и Литвы несли на себе всю тяжесть российской агрессии на протяжении веков и в ходе недавней войны. Тысячи молодых людей погибли, сельская местность подверглась нападкам и практически не принесла никакой материальной выгоды этим странам, что привело к радикализации среди недовольной молодежи и ветеранов страны. Это недовольство послевоенным статус-кво было возложено на значительные русские меньшинства стран, и многие новые ультранационалистические группы, сформированные после войны, начали преследовать их.\n\nПравительство в значительной степени закрыло глаза на эти недавние действия, и многие правительственные чиновники тонко хвалят их. Один из членов парламента Эстонии от либералов утверждал, что "любая несправедливость, с которой сталкиваются русские в Эстонии, бледнеет по сравнению с несправедливостью, причиняемой нашему народу российскими империалистами, Советами и путинистами." Один из мэров Латвии заявил, что "молодые люди нашего народа имеют право охранять наши границы и наказывать коллаборационистов", когда им сообщили об антироссийских нападениях в его городе.\n\nПоследние нападения на этнических русских в последние выходные привели к восьми смертям и более пятидесяти раненых, и проблема, кажется, только ухудшается. Местные лидеры русского меньшинства в этих странах утверждают, что эти акты дискриминации нелогичны и противоречат принципам плюрализма, они указывают на этническую русскую службу в вооруженных силах Балтии и отказ сотрудничать с российскими войсками во многих случаях как доказательство того, что они так же добры к гражданам, как и их соседи.\n\nРусское меньшинство призвало Берлин помочь им и оказать давление на балтийские правительства, чтобы они положили конец несправедливости и обеспечили соблюдение демократических прав."
 germany.100.a: "Русский народ достаточно настрадался! Прикажите им остановиться."
 germany.100.b: "Русские так или иначе усвоят свой урок."
 germany.101.t: "Выход "Лучшие в Аду""
 germany.101.d: "Фильм "Лучшие в Аду" начинается с морозных улиц Варшавы под треск выстрелов. Камера панорамирует безликих советских солдат, наседающих на линию пулеметов, и сбивает их в кучу. Среди защитников стоит обер-лейтенант Эрик Восс, размазывая грязь по лицу, и отдает приказы своим людям. Последний бой, который считался невозможным, но они как-то выстояли.\n\nДействие фильма переносится на равнину к северу от города, где майор Клаус Риттер ведет избитые остатки своей дивизии через дымящиеся леса в условиях танкового наступления. Люди Риттера сражаются у остовов зданий, отчаянно сопротивляясь и превосходя в численности. Камера задерживается на молодом солдате, едва ли мальчишке, который дрожащими руками сжимает винтовку, прежде чем броситься в бой, не имея при себе ничего, кроме штыка.\n\nПовествование возвращается в Варшаву, в последнее наступление, когда линия фронта рушится. Одетые в красное советские войска, как монгольские захватчики, маршируют по мокрым от дождя улицам, прикладами винтовок выбивая окна, выкорчевывая последние немецкие остатки. Капитан Вильгельм Брандт стоит в командном бункере и слушает перехваченные советские передачи. Они попали в окружение. Фронт потерян. Он закуривает сигарету, выдыхает и обращается к своим людям. "Тогда мы будем сражаться."\n\nКульминация - чистое зрелище. Последний батальон, попавший в окружение, сражается до конца. Советские танки наступают, но они не сдаются. Пулеметное гнездо стреляет до тех пор, пока его стволы не расплавятся. Риттер, воссоединившись с раненым Фоссом, прислоняется к стене, в руке револьвер, пустые каморы щелкают. Советские солдаты наседают на них, безликие, чудовищные, не знающие себе равных. Один за другим падают немцы. Финальный кадр: медленное панорамирование разрушенного города, тела Риттера и Восса на снегу, их железные кресты сверкают на холоде, как рассказчик гламурно охарактеризовал последнего немецкого солдата:"
 germany.101.a: "И, клянусь небесами, они были лучшими в аду."
 germany.102.t: "Оборона Черкесов Рушится"
 germany.102.d: ""
 germany.102.a: "Мы должны подготовить новую линию обороны!"
 germany.103.t: "Украинская Оборона Рушится"
 germany.103.d: "Русские войска прорвались к Днепру! Попытки отбить плацдарм оказались тщетными, разрабатываются новые планы по созданию оборонительной линии, но Киев, возможно, придется оставить!"
 germany.103.a: "Мы должны подготовить новую линию обороны!"
 germany.103.b: "Конец Близок..."
 germany.104.t: "Немецкой промышленности нанесен серьезный ущерб"
 germany.104.d: "В результате редкого нарушения воздушного пространства Германии русские бомбардировщики прорвали фронтовую противовоздушную оборону и проникли вглубь нашей территории, достигнув родины и повредив важные объекты военного производства!"
 germany.104.a: "Где находится люфтваффе?!"
 germany.105.t: "Американским офицерам приказано возвращаться домой"
 germany.105.d: "На фоне растущего хаоса и беспорядков среди населения Соединенных Штатов американские офицеры были спешно отозваны из своих заграничных командировок, а те, кто остался, покинут их в ближайшие несколько дней. Это ужасная новость, но она, похоже, показывает, что ситуация в Америке еще хуже, чем нам говорили."
 germany.105.a: "Молитесь, чтобы эта проблема не обострилась..."
 germany.106.t: "Оказать давление на Вышеград, чтобы он принял евро"
 germany.106.d: "С учетом недавних событий мы осознали, что Европейский союз нуждается в большем, чем когда-либо, единстве, для обеспечения бесперебойного функционирования нашего Союза необходима более централизованная деятельность.\n\nДаже сейчас Вишеградская группа остается занозой в заднице: Венгрия, Польша, Словакия и Чехия все еще не адаптировали евро в качестве своей основной валюты, и сегодня мы приложим усилия, чтобы обеспечить плавный переход к нашей общей валюте.\n\nСочетание общественных кампаний и финансовой поддержки групп, которые поддерживают наше дело, мы можем медленно, но верно оказывать давление на них, чтобы они приспособились к нашей валюте."
 germany.106.a: "Мы все разделяем одни и те же ценности"
 germany.107.t: "Вышеград Распадается"
 germany.107.d: "Вышеградская группа, долгое время бывшая занозой в боку Европейского союза, наконец увидела плоды, которые может дать ЕС, официально расторгнув свой политический союз и присоединившись к европейскому проекту, и мечта о европейской федерализации кажется все более вероятной с годами."
 germany.107.a: "Ура!"
 germany.108.t: "Вышеград Остаются на Своих Позициях"
 germany.108.d: "Вышеградская группа решительно выступает против попыток федерализации Европейского союза, желая сохранить свой суверенитет превыше всего остального. Эта декларация, подписанная лидерами четырех стран, наносит серьезный удар по европейским амбициям, поскольку все - от федерализации до укрепления единой обороны Европы - тормозится их попытками сохранить суверенитет."
 germany.108.a: "Удар по Союзу..."
 germany.109.t: "Восстановление после наводнения Наконец завершено"
 germany.109.d: "Правительственные проекты уже работают над оказанием помощи пострадавшим районам вдоль Рейна, которые пострадали во время наводнения 2021 года. Эти наводнения были сильнее, чем за последние годы, и поэтому усилия по восстановлению были очень ограниченными, но Бундестаг наконец выделил необходимые средства и расширил зону восстановления, чтобы объявить ее восстановленной, но на этом восстановление не заканчивается, Бундестаг объявил о планах реформирования системы борьбы с наводнениями в зонах затопления по всей стране. Основным направлением является увеличение количества зелени в городах, чтобы впитывать больше воды во время сильных ливней. План, получивший название "Губчатые Города", предполагает выкорчевывание нынешнего стиля городского планирования путем увеличения количества деревьев, грунтового покрытия и общественных парков, а также изменения всего, от бетона до канализационных систем. Германия намерена сделать так, чтобы наводнение никогда не нанесло Рейну такого ущерба, как последнее."
 germany.109.a: "Губчатые города, да?"
 germany.110.t: "Немецкая промышленность перемещается в Восточную Англию"
 germany.110.d: "По мере продвижения русских войск жизненно важные отрасли промышленности должны быть эвакуированы в безопасное место. Британские острова обеспечивают безопасное убежище для нашей промышленности, чтобы она могла продолжать свою жизненно важную работу для военных усилий. Перемещение нашей самой важной восточной промышленности в Восточную Англию может быть непопулярным, но это лучше, чем позволить врагу получить их бесплатно!"
 germany.110.a: "Отчаяние призывает к действию!"
 germany.111.t: "Польские войска перегруппировываются во Франкфурте-на-Одере"
 germany.111.d: "Несмотря на то, что Польша пала, их остатки воссоединились во Франкфурте на Одере, предложив себя немецкому верховному командованию, мы с радостью приняли их, хотя Варшава потеряна, Польша еще не потеряна!"
 germany.111.a: "Их ждет судьба!"
 germany.112.t: "Требование репараций от России"
 germany.112.d: "Россия спровоцировала эту войну, и за конфликтом не стояло ничего, кроме жадности к земле и жадности к потерянному влиянию, сотни тысяч, возможно, миллионы людей погибли от рук жадности, за нашу потерянную кровь агрессоры должны заплатить, как нам пришлось заплатить не один, а два раза. Некоторые критики говорят, что требование репараций приведет к появлению еще одной Веймарской республики, подобной бомбе замедленного действия, но мы выплатили репарации во второй раз, и мы в полном порядке, и нам нужны деньги, чтобы восстановиться."
 germany.112.a: "Они заплатят за этот разрушительный конфликт!"
 germany.113.t: "Россия согласна выплатить репарации"
 germany.113.d: "Россия, вопреки нашим худшим опасениям, согласилась на выплату репараций без каких-либо реальных протестов или даже просьбы о пересмотре условий. Их дипломаты были не очень рады подписанию экономических активов, но кто бы стал? Надеюсь, это признак готовности России к рабочим отношениям."
 germany.113.a: "Великолепно!"
 germany.114.t: "Россия отказывается выплачивать репарации!"
 germany.114.d: "Россия выслала нашу делегацию и покинула переговоры о репарациях, может быть, мы слишком надавили? А может, они и не собирались платить! Как бы то ни было, мы ничего не добились от русских."
 germany.114.a: "Будь они прокляты!"
 germany.115.t: "Общенациональные Беспорядки"
 germany.115.d: ""
 germany.115.a: "Мы сами сделали это с собой..."
 germany.116.t: "Дефицит нефти спадает"
 germany.116.d: ""
 germany.116.a: "Дела идут на поправку?"
 germany.117.t: "Аравийская Республика стремится к более тесным связям с НАТО"
 germany.117.d: ""
 germany.117.a: "Мы согласны!"
 germany.118.t: "Российская Агрессия на Кавказе"
 germany.118.d: ""
 germany.118.a: "Война на пороге..."
 germany.119.t: "НАТО Созывает Совещание по Российской Агрессии"
 germany.119.d: ""
 germany.119.a: "Они снова приносят нам войну, мы будем защищать Европу!"
 germany.120.t: "Кризис на польско-белорусской границе"
 germany.120.d: ""
 germany.120.a: "Немедленно начать переговоры с Беларусью и Россией"
 germany.120.b: "Мы не потерпим этого акта терроризма!"
 germany.121.t: "ЕС провела переговоры о пограничном кризисе"
 germany.121.d: ""
 germany.121.a: "Великолепно"
 germany.122.t: "ЕС остается непокорным"
 germany.122.d: ""
 germany.122.a: "Мы продолжим..."
 germany.123.t: "Вербовка в иностранный легион в Нидерландах"
 germany.123.d: ""
 germany.123.a: "Выбрать компромиссный вариант на умеренную кампанию по набору людей"
 germany.123.b: "Профинансировать масштабную кампанию по набору персонала в Легион"
 germany.123.c: "Разрешить ВКВ нанять небольшое количество специалистов и вспомогательного персонала."
 germany.124.t: "Вербовка в иностранный легион в Бельгии"
 germany.124.d: "Бельгия - страна, полная франкофонов и голландцев, развитая нация, полная квалифицированных рабочих, кадровых военных и добровольцев. Они являются отличным кандидатом для Армии и Иностранных легионов, чтобы получить рабочую силу. Но кому мы предоставим права?"
 germany.124.a: "Выбрать компромиссный вариант на умеренную кампанию по набору людей"
 germany.124.b: "Профинансировать масштабную кампанию по набору персонала в Легион"
 germany.124.c: "Разрешить ВКВ нанять небольшое количество специалистов и вспомогательного персонала."
 germany.130.t: "Восстание РПК на востоке Турции"
 germany.130.d: ""
 germany.130.a: "Полезные идиоты, которые помогут нам добиться победы"
 germany.131.t: "Создан Красно-Красно-Зеленый Альянс"
 germany.131.d: "Политический ландшафт Германии был потрясен в понедельник, когда левая социал-демократическая партия (СДПГ), экологическая партия зеленых и крайне левая партия Die Linke объявили о создании Красно-красно-зеленого альянса. Учитывая, что опросы показывают преобладание левых настроений в целом, учитывая неудачи умеренных в победе в войне с НАТО и последующую экономическую катастрофу, вызванную поражением, будущее Германии выглядит мрачным оттенком багрового.\n\nЭто заявление было встречено в подавляющем большинстве случаев негативной реакцией со стороны политического истеблишмента. В условиях, когда центристские политики из СДПГ, ХДС и АдГ удваивают свои обещания оживить Германию и увести ее от "марксистской диктатуры", будущее Германии остается неопределенным."
 germany.131.a: "Интересно"
 germany.132.t: "Протесты в Немецких Университетах"
 germany.132.d: "На фоне хаоса в послевоенной Германии ситуация среди студентов немецких университетов особенно напряженная. Поскольку многие из них были призваны на войну в НАТО только для того, чтобы вернуться ни к чему, кроме поражения и нищеты, горечь среди населения высока. Уже будучи известным как центр крайне левой активности, радикализация немецких студентов достигла критической точки, поскольку протесты, организованные Die Linke, вспыхнули по всей Германии. Многие студенты требовали радикальных перемен, включая масштабный пересмотр государственной системы социального обеспечения, национализацию крупных корпораций в интересах народа и перестройку экономики, чтобы она служила интересам рабочего класса, а не миллиардеров, которые продали страну русским. Хотя протесты были в основном мирными, это признак опасной поляризации общества"
 germany.132.a: "Назревает Революция."
 germany.133.t: "Штурм Рейхстага"
 germany.133.d: "Революционный пыл в Германии достиг сегодня пика, когда левые силы взяли штурмом рейхстаг и провозгласили новую Германскую республику. После нескольких месяцев экономического спада, миллионов безработных и гнева, направленного на правительство за неспособность решить проблему, военизированные формирования Die Linke наконец-то взяли бразды правления в свои руки.\n\nВ 10 утра по центральноевропейскому времени революционеры без особого сопротивления взяли в осаду ключевые здания по всей столице, такие как Центральный вокзал Берлина, Бундестаг и канцелярия, при этом местонахождение канцлера в настоящее время неизвестно.\n\nВскоре к военизированным формированиям присоединились несколько дезертиров из армии, вспыхнуло полномасштабное восстание, когда несколько военных дивизий присягнули на верность революционным силам в Берлине. В условиях, когда в Германии царит хаос, новое временное правительство Die Linke, партия зеленых и Социал-демократическая партия поклялись восстановить порядок и устранить чрезвычайное положение."
 germany.133.a: "Революция в самом сердце Европы"
 germany.134.t: "Профсоюзы Бастуют"
 germany.134.d: "Вслед за мерами жесткой экономии, объявленными правительством, конфедерация профсоюзов Deutscher Gewerkschaftsbund объявила всеобщую забастовку, чтобы отменить меры жесткой экономии. Поскольку сидячие забастовки парализуют экономику, насилие между бастующими профсоюзными активистами и полицией усилило существующую напряженность внутри Германии. Эксперты из кожи вон лезли, чтобы обвинить полицию в чрезмерной жестокости и защите режима, единственной целью которого является причинение вреда рабочему классу, в то время как оппоненты осудили забастовку как наносящую ущерб и без того шаткой экономической ситуации."
 germany.134.a: "Ты слышишь, как поют люди?"
 germany.135.t: "Правительство объявляет о мерах жесткой экономии"
 germany.135.d: "В ответ на обвал евро и обвал Франкфуртской фондовой биржи Бундестаг принял чрезвычайную бюджетную реформу, предусматривающую сокращение социального обеспечения, повышение пенсионного возраста и возможную приватизацию некоторых отраслей промышленности. Поскольку стоимость евро находится в свободном падении, сторонники мер жесткой экономии заявили, что они необходимы для стабилизации денежно-кредитной политики и предотвращения гиперинфляции в условиях экономического спада. Тем не менее, эти меры были невероятно непопулярны, поскольку беспорядки уже вспыхнули в крупных городах, таких как Франкфурт, Берлин и Кельн, когда полиция и протестующие вновь вышли на улицы. Внутренняя ситуация в Германии выглядит все более напряженной по мере того, как страну охватывает хаос."
 germany.135.a: "Может быть, Протестующим Стоит Открыть Учебник По Экономике?"
 germany.136.t: "Симпатии коммунистам в вооруженных силах"
 germany.136.d: "Недавняя победа России над НАТО стала абсолютной катастрофой для Европы, и во всех слоях немецкого общества эта потеря глубоко ощущается, особенно среди молодых людей, которые были призваны в армию. В основном выходцы из бедных семей, у которых не было достаточно денег, чтобы отправить своих детей за границу, чтобы избежать призыва, среди бывших призывников высока неприязнь к правящему классу.Поскольку русские националисты претендуют на господство над Восточной Европой, неудивительно, что их идеология заставит наш народ открыться всему, что противостоит их идеологии, в наших вооруженных силах такие симпатии становятся все более заметными с каждым днем.Наши солдаты, перенесшие много страданий на передовой, чувствуют себя преданными и разочарованными, учитывая их финансовые трудности и рост левых идеалов в рядах, было бы неудивительно, что они открыто обсуждали направление, в котором должна двигаться наша нация.Поскольку наши вооруженные силы значительно расширились по сравнению с довоенным периодом, кажется, что это вопрос времени, когда левые симпатии перерастут во что-то большее, со всеми вытекающими последствиями."
 germany.136.a: "Красное Пятно в Вооруженных Силах"
 germany.137.t: "Ливийское Правительство Восстановлено"
 germany.137.d: "После долгого и трудного периода восстановления комиссия НАТО в Триполи наконец заложила основы для независимого Ливийского правительства."
 germany.137.a: "Великолепно"
 germany.138.t: "Иранское Правительство Восстановлено"
 germany.138.d: "После долгого и трудного периода восстановления комиссия НАТО в Тегеране наконец заложила основы для независимого Иранского правительства."
 germany.138.a: "Великолепно"
 germany.139.t: "Египетское Правительство Восстановлено"
 germany.139.d: "После долгого и трудного периода восстановления комиссия НАТО в Каире наконец заложила основы для независимого Египетского правительства."
 germany.139.a: "Великолепно"
 germany.140.t: "Правительство Было Создано"
 germany.140.d: "После того как неолибералы и фальшивые консерваторы были смещены со своих недостойных постов, наша нация осталась с открытой раной неопытности, где слишком долго ярким и сильным людям не давали выполнить свое истинное предназначение, наказывая их за любовь к своему народу. \n\nСегодня все изменится, амнистия была предоставлена тем, кто имел мужество бороться с чудовищем современного гниения, когда на их шею опустился сапог капитала, они осмелились высказаться, когда немецкому народу нужен был голос, они были там, и теперь, наконец, они смогут быть услышаны.\n\nНикогда больше мы не позволим тем, кто полон ненависти к себе, занять наше правительство, никогда они не смогут навязать энтропию нашей нации, никогда они не смогут запятнать нашу кровь.\n\nПлесень неолиберализма трудно отчистить, нам предстоит долгий путь, но вместе мы достигнем Германии, которая снова будет сильной."
 germany.140.a: "И пусть ошибки  прошлого не повторятся"
 germany.141.t: "Unternehmen Michael выдохся"
 germany.141.d: "Несмотря на все усилия наших храбрых солдат, мы не смогли достичь целей операции "Михаэль" в сроки, отведенные генеральным штабом. Упорное сопротивление советских войск на Висле и оборона Калининграда ослабили наши силы.\n\nИспользование странных газовых атак в Европе было выгодным. Мы должны найти новые возможности, аналогичные этим, и использовать их с крайней предубежденностью. Эта операция провалилась, но это не значит, что вся война проиграна. Мы восстановимся и победим!"
 germany.141.a: "Война еще не проиграна!"
 germany.142.t: "Unternehmen Michael Успешно"
 germany.142.d: ""
 germany.142.a: "Мы должны использовать этот успех!"
 germany.143.t: "Германия требует нашего подчинения"
 germany.143.d: "Немецкое правительство решило, что мы слишком ценны, чтобы оставить нас за пределами своего "Стального пакта". Проклятые немцы не могут оставить Европу в покое даже на столетие, но в прошлом они хотя бы оставляли нас в покое. Нам предстоит принять непростое решение: подчиниться или подвергнуться риску немецкого гнева, эмбарго или даже вторжения."
 germany.143.a: "У нас нет выбора"
 germany.143.b: "пошёл ты"
 germany.144.t: "Швеция остается непокорной"
 germany.144.d: ""
 germany.144.a: "Пусть их народ решает!"
 germany.145.t: "Швеция присоединяется к Стальному пакту"
 germany.145.d: ""
 germany.145.a: "И мы выдержим это, мы выдержим!"
 germany.146.t: "Восстание NRM"
 germany.146.d: ""
 germany.146.a: "чёррт"
 germany.147.t: "Норвегия остается непокорной"
 germany.147.d: ""
 germany.147.a: "Пусть их народ решает!"
 germany.148.t: "Норвегия Присоединяется к Стальному пакту"
 germany.148.d: ""
 germany.148.a: "И мы выдержим это, мы выдержим!"
 germany.149.t: "Восстание NRM"
 germany.149.d: ""
 germany.149.a: "чёррт"
 germany.150.t: "Переезд Гауптштадта"
 germany.150.d: "Учитывая наше унизительное поражение от восточных войск, в немалой степени обусловленное близостью Берлина к реке Одер, настало время пересмотреть местоположение нашего правительства. Наша столица теперь все ближе к врагу из-за перекройки польских границ. Господство на Балтийском море также оспаривается, что грозит десантом из Мекленбурга. Критики утверждают, что Берлин больше не подходит, поскольку он будет гораздо быстрее разрушаться в случае войны.\n\nВарианты - Кельн, 4-й по численности населения город, расположенный чуть южнее бывшей столицы Западной Германии Бонна, просуществовавшей 4 десятилетия. Город расположен преимущественно к западу от Рейна, что делает его естественным образом защищенным по большей части. Франкфурт - финансовая столица всей континентальной Европы, место расположения Европейского и Немецкого центральных банков, которые вместе владеют ~5 000 метрических тонн золотого запаса, оцениваемого в полтриллиона долларов США. Франкфурт также является домом для многих предприятий, что лоббисты используют в качестве причины для дальнейшего обоснования переезда во Франкфурт.\n\nСледующий, Гамбург. Хотя его положение и шаткое, это следующий по величине город с населением 2 миллиона человек, рядом находятся крупные военно-морские базы, а к югу от Кильского канала русским будет сложнее высадиться. И наконец, Мюнхен. Растущий регионализм в Баварии усилился после войны, и при нынешних темпах ожидается его дальнейший рост. Успокоение Баварии путем переноса туда нашей столицы станет нокаутирующим ударом по их движению и стабилизирует наш юг, что является относительно выгодной сделкой. Каким бы ни было решение, давайте молиться, чтобы русские не вернулись на немецкую землю."
 germany.150.a: "Кёльн - это отличный выбор."
 germany.150.b: "Франкфурт имеет стратегическое значение."
 germany.150.c: "Мюнхен - лучший выбор, его легко отстоять."
 germany.150.e: "Нет, столица останется в Берлине!"
 germany.151.t: "Верховный Канцлер Обращается к Вооруженным Силам"
 germany.151.d: "Мы видели, что Россия сделала с нашим прекрасным континентом, дважды, медведь сомкнул челюсти на наших шеях и оставил рану.\nНа этот раз в нас не осталось какой-то вялой болезни, в наших сердцах выросла бешеная ненависть.\nНас учили избавляться от нашей идентичности, и этой потерей мы заплатили цену.\nТеперь настало время вновь обрести себя в огне войны.\n\nСудьба немецкой нации и всей Европы в ваших руках, мы не можем потерпеть неудачу.\nМы будем бороться без конца, пока само понятие "Россия" не будет уничтожено из прошлого, настоящего и будущего.\nКак мировоззрение справляется с потерей? \nВы преодолеваете ее, другого пути нет, несмотря на то, насколько она разрушительна.\n\nРусский медведь ждет.\nВырвите его сердце.\nПоглотите его.\nПусть весь мир смотрит.\n\nНаша единственная заповедь, вытерпеть все."
 germany.151.a: "Победа любой ценой, сжечь землю."
 germany.152.t: "Вавилон Берлин"
 germany.152.d: "Пока Рейх точит свои клыки, нам как народу необходимо не забывать о своей родословной и культурной идентичности. На протяжении всей истории мы, немцы, несли знамя и плач смерти и совершенства. Вандалы разграбили столицу мира, пруссаки унизили европейского гегемона; мы стоим как живое пророчество Шпенглера.\n\nС возрождением ариософии в XXI веке становится ясно, что гнев божественных и старых богов сопровождает нас, как еще объяснить нашу ненасытную жажду битвы? Вотан, неугомонный и всемогущий, проявил свое неистовство в нашем царстве в виде нас, Volkstaat. "Ergriffenheit," как выразился Юнг, а скорее, применительно к целому телу, корпусу Рейха.\n\nОрлы, покрытые золотом, шествовали по Берлину, люди в парадных одеждах, некоторые были одеты в фиолетово-красные, с капюшонами, мантии. Посохи, к ним прикреплены Черное солнце, Хакенкройц, Одал, все исконные символы Германии. В месяц Хагаль в Велтенуре Народ обрел свое божественное призвание."
 germany.152.a: "Вау..."
 germany.153.t: "Коммунистическое Восстание на Севере Германии"
 germany.153.d: "Разбитые армейские батальоны и сторонники коммунистов восстали"
 germany.153.a: "Сокрушите этих дураков!"
 germany.154.t: "Первая волна гражданской мобилизации завершена"
 germany.154.d: ""
 germany.154.a: "Мы будем гордится ими"
 germany.155.t: "Вторая волна гражданской мобилизации завершена"
 germany.155.d: ""
 germany.155.a: "Мы будем гордится ими"
 germany.156.t: "Третья волна гражданской мобилизации завершена"
 germany.156.d: ""
 germany.156.a: "..."
 germany.157.t: "Сминая Цветы"
 germany.157.d: ""
 germany.157.a: "Прикажите полиции немедленно расправиться с ними!"
 germany.157.b: "Ввести военное положение."
 germany.158.t: "Стратегическое Переустройство России"
 germany.158.d: "БОМБАРДИРОВКА, ОНИ СОБИРАЮТСЯ РАЗБОМБИТЬ ВСЕ ДО ОСНОВАНИЯ"
 germany.158.a: "Планы перепланировки подходят!"
 germany.159.t: "Германия вторгается в Чешскую Республику"
 germany.159.d: "Похоже, что история повторяется, и немецкие войска снова врываются в пределы Чешской Республики, перебивая местных пограничников и поселения вдоль границы. При этом Германия заявляет, что целью полномасштабного вторжения является свержение нынешнего правительства в Праге.\n\nВ полночь в нескольких крупных городах, включая столицу, завыли сирены воздушной тревоги, а местные власти призвали жителей эвакуироваться из всех крупных городов, так как немецкие войска устремились во все стороны. Правительство объявило полную военную мобилизацию и призыв резервистов, и уже через несколько часов после начала вторжения колонны беженцев исчисляются тысячами.\n\nНа данный момент Чешская Республика находится во власти Германии."
 germany.159.a: "Эй, Я уже видел Это раньше!"
 germany.160.t: "Германия вторгается в Австрию"
 germany.160.d: ""
 germany.160.a: "Немцы начнут Еще Одну Мировую войну!"
 germany.161.t: "Восстание в Польше"
 germany.161.d: ""
 germany.161.a: "Эти дураки усвоят свой урок..."
 germany.162.t: "Восстание в Праге"
 germany.162.d: ""
 germany.162.a: "Эти дураки усвоят свой урок..."
 germany.163.t: "Восстание в Будапеште"
 germany.163.d: ""
 germany.163.a: "Эти дураки усвоят свой урок..."
 germany.164.t: "Улучшение ситуации с COVID-19"
 germany.164.d: "После нескольких месяцев усилий в Германии отмечается значительное снижение числа случаев заболевания и госпитализаций, вызванных вирусом COVID-19. Вакцинация и меры общественного здравоохранения сыграли важную роль в сдерживании вируса.\n\nОфициальные лица призывают к постоянной осторожности, чтобы не допустить обратного прогресса, но на данный момент страна стала на шаг ближе к нормальной жизни."
 germany.164.a: "Впереди лучшие времена."
 germany.165.t: "Китай согласен с соглашением Вагенкнехта"
 germany.165.d: "Сара Вагенкнехт обратилась к Пекину с предложением, оно было амбициозным, но сегодня Поднебесная вступила в игру. Когда Германия предложила разделить Россию, китайцы почти не поверили нашему дипломату, но мы были настроены вполне серьезно. А потом они и сами стали серьезными. На старых картах были изображены земли, которые они хотели бы колонизировать в случае китайско-советской войны, - эти планы, должно быть, были составлены во времена Мао.\n\nКитайская делегация была согласна, а сам председатель счел условия выгодными для Китая. Контроль над обширными сибирскими землями позволил бы решить проблему перенаселенности городов и в некоторой степени решить вопрос с пресной водой, предоставив им озеро Байкал. Делегации двух стран расстались, пожав друг другу руки, и первые дебаты в Китае велись о том, следует ли напрямую вмешаться в дела России или сосредоточиться на более непосредственной азиатской опасности. Мы заверили китайцев, что можем справиться с медведем. Похоже, они довольны нашей уверенностью."
 germany.165.a: "Фашисты будут стёрты с Лица Земли!"
 germany.166.t: "Китай отказывается от соглашения Вагенкнехта"
 germany.166.d: "Китайская Народная Республика поблагодарила ГДР за ее неизменную приверженность "миру и социалистическому развитию в Европе" и выразила надежду, что Германия будет "искать сбалансированные решения проблем межконтинентальной безопасности." Нигде не было упомянуто слово "Россия" и не было прямого признания планов войны.\n\n Нота прибыла ни срочно, ни с задержкой. Никакой делегации, никакого телевизионного обращения, простое коммюнике, отправленное из Пекина в Берлин. Оно было адресовано самой Вагенкнехт. Содержание было кратким, почти оскорбительным.\n\nВагенкнехт прочла письмо дважды. Затем в третий раз. Ее советники ждали, молча.\n\nКонечно, они сказали "нет." Конечно, они не стали бы рисковать нефтью, зерном и торговлей ради далеких союзников. Тот самый Китай, который построил свою революцию на крови, теперь защищает свой ВВП молчанием. Несмотря на все свои лозунги и статуи, новый Китай в душе был капиталистическим,\n\nПоэтому не будет никакого Тихоокеанского фронта. Никакого давления с Востока. Только Германия, в одиночку, смотрит в лицо той же империи, которая уже однажды похоронила ее."
 germany.166.a: "Проклятые ревизионисты!"
 germany.167.t: "Судебные Процессы в Карлсруэ"
 germany.167.d: "Что сделали наши представители, когда чудовище Востока запустило свои когти в остальную Европу?\nНедостаточно.\n\nЧто они сделали, когда фашизму снова удалось закрепиться в мире?\nНедостаточно.\n\nИмпериализм разорвал нашу землю на части, эксплуатировал нашу окружающую среду без всякой оглядки на будущее, позволил фашизму разрастись и погубил поколения экономическим рабством.Многие указывают пальцами друг на друга, обычно у каждого была бы доля вины, но не здесь, не сейчас.У наших детей не было другого выбора, кроме как отдать свои жизни, умирая за маскарад, который называет себя демократией, не более чем бессмысленная жертва красной линии.Тем, кто остался дома, пришлось страдать не меньше: у нас стало меньше еды, урезалась заработная плата, сам наш образ жизни превратился в марионетку жалкой военной машины.\n\nХватит с нас.\nСегодня в Карлсруэ многие политики, которые отчаянно пытались сохранить статус-кво, предстали перед судом за преступления против человечности и окружающей среды, они должны гнить в тюрьме, как они позволили нашим сыновьям и дочерям гнить на полях сражений.\nНам предстоит пройти долгий путь, чтобы исправить их ошибки, но если страна будет в надежных руках, мы восстановим ее, мы будем процветать и положим конец фашизму во всем мире."
 germany.167.a: "Серп заточен"
 germany.168.t: "Образование в Новой Германии"
 germany.168.d: "Теперь, когда наша нация восстановлена, перед нами стоит задача покончить с самобичеванием нашего народа.\n\nДесятилетиями нас учили сожалеть о нашем прошлом, ненавидеть нашу собственную идентичность, когда мы меняли наш флаг на отвратительное сочетание цветов, теперь мы на верном пути к изменению нашего образования.\n\nГордость за себя и свою нацию - это то, что следует поощрять, слишком долго школы извергали пропаганду ненависти к себе, все материалы, поощряющие поведение, наносящее вред нашей национальной идентичности, будут запрещены, а вместе с ними материалы, отображающие нашу историю, наследие и нацию, будут вновь представлены для нашего будущего поколения, чтобы они снова могли смотреть на нашу нацию с любовью и гордостью.\n\nОднако в этом отношении остается один вопрос: все мы знаем, какой была наша нация во время второй мировой войны, мы совершали поступки, которыми не все из нас гордятся, и среди нашего руководства было много споров о том, должны ли мы поощрять людей гордиться тем периодом нашей нации.\n\nНекоторые из нас утверждают, что национал-социалистическая Германия - это не та Германия, которой являемся мы, и что было бы лучше в основном приписывать нашу гордость ее военным победам, с другой стороны, есть много людей, которые хотят в полной мере использовать достижения национал-социалистов, хотя и более сдержанно относятся к своим достижениям. более кровожадные поступки.\n\nЭто не самый животрепещущий вопрос, поскольку мы все согласны с тем, что немецкое образование нуждается в полной трансформации, но от этого зависит, как наши дети будут смотреть на наше прошлое, настоящее и будущее, что в конечном итоге сформирует будущие поколения."
 germany.168.a: "Мы растим поколение патриотов. Давайте сделаем так, чтобы они не стыдились истории своей страны."
 germany.168.b: "Давайте просто сделаем так, чтобы наши дети гордились всем, чего достигла наша нация."
 germany.169.t: "Армия обеспокоена правительственным контролем"
 germany.169.d: ""
 germany.169.a: "Сообщите им, чтобы они не волновались, последнее слово по военным вопросам все равно останется за ними"
 germany.169.b: "Поставьте этих дураков в строй!"
 germany.170.t: "Бундестаг обеспокоен военным контролем"
 germany.170.d: ""
 germany.170.a: "Сообщите им, чтобы они не волновались, последнее слово по государственным вопросам все равно останется за ними"
 germany.170.b: "Поставьте этих дураков в строй!"
 germany.171.t: "ПЕРЕДОВОЙ ОТЧЕТ: [GetDateText]"
 germany.171.d: "Мы давно добрались до Днепра, йо"
 germany.171.a: "Позор был исправлен."
 germany.172.t: "Восстановление Дворянства как Класса"
 germany.172.d: ""
 germany.172.a: "Великолепно"
 germany.173.t: "Знать Устраивает Пышную Вечеринку"
 germany.173.d: "Несмотря на то, что присутствующие были проверены, официальное освещение недавнего праздника в средневековом дворце вызвало большое общественное несогласие. Фотографии знати в дорогих французских платьях и костюмах, подробные описания обеда из 7 блюд, который едят с золотых тарелок, еще больше распалили население, которое все еще страдает от последствий войны с Россией.\n\nЗнать требует, чтобы мы немедленно выступили с публичным заявлением о поддержке."
 germany.173.a: "Дворянству должно быть позволено быть представительным"
 germany.173.b: "Личные дела знати не являются государственной заботой"
 germany.174.t: "Немецкий дворянин замешан в скандале с хищением"
 germany.174.d: "После слухов о коррупции в процессе закупок армии правительство пообещало провести беспристрастное расследование этого вопроса. В прессу просочился предварительный отчет, подтверждающий не только слухи, но и прямую причастность к этому делу нескольких дворян.\n\nВсе это дело стало позором для правительства. Регентство требует действий, но заявило о своей полной поддержке дворян."
 germany.174.a: "Подписанный контракт безупречен"
 germany.174.b: "Реформировать процесс"
 germany.175.t: "Журналист арестован"
 germany.175.d: "Известный журналист, критикующий дворянство, недавно был арестован властями. Они подробно описали обширное влияние знати на политические решения. Большинство из этих решений в конечном итоге приносят пользу участникам впоследствии. Особый интерес представляют операции с государственными фондами, которые, как сообщается, использовались для собственного обогащения. Регентство распорядилось арестовать автора.\n\nЛиберальные газеты и ультраправые возмущены этим, хотя и по совершенно разным причинам. Нам нужно сделать заявление по этому поводу, прежде чем ситуация выйдет из-под контроля."
 germany.175.a: "Клевета является уголовным преступлением"
 germany.175.b: "Журналист будет немедленно освобожден"
 germany.176.t: "Дворяне покупают замки"
 germany.176.d: "Сообщается, что несколько видных дворян приобрели несколько старинных средневековых замков. Как они смогли себе это позволить, было предметом многочисленных спекуляций. Новые данные, опубликованные в интернет-газетах, убедительно свидетельствуют о том, что Регентство само санкционировало покупку за государственные деньги.\n\nСкандал распространяется, и мы должны сделать публичное заявление по этому поводу как можно скорее."
 germany.176.a: "Правительство выкупило это здание и разрешило дворянам проживать в нем"
 germany.176.b: "Дворяне взяли эти деньги из аванса на свое содержание"
 germany.178.t: "Дерегулирование деятельности частных военных компаний"
 germany.178.d: ""
 germany.178.a: "Великолепно"
 germany.179.t: "Реорганизация Рейхсвера"
 germany.179.d: ""
 germany.179.a: "Im Namen des Kaisers!"
 germany.180.t: "Коммунистическое восстание в Сербии"
 germany.180.d: ""
 germany.180.a: "Избавьтесь от этих дураков!"
 germany.181.t: "Советские Войска Начинают Восстание на Украине"
 germany.181.d: ""
 germany.181.a: "Избавьтесь от этих дураков!"
 germany.182.t: "Разгром Советского Восстания"
 germany.182.d: ""
 germany.182.a: "Сопротивление Бесполезно"
 germany.183.t: "Украинское Восстание"
 germany.183.d: ""
 germany.183.a: "Сокрушить этих фашистов!"
 germany.184.t: "Брюссельский Cаммит"
 germany.184.d: "Поражение стран НАТО в войне против России поставило альянс под угрозу в панике - военные действия прекратились только тогда, когда русские танки приближались к Берлину в Вене, чего никто не ожидал.\n\nАрмии НАТО оказались совершенно не готовы к современной войне и были быстро разгромлены превосходящими по подготовке и оснащению российскими войсками. Великая иллюзия была разбита.\n\nЭто сразу же отразилось на единстве альянса на экстренном брюссельском саммите для обсуждения итогов войны - не слишком почетное зрелище. Европейские лидеры разбежались по залу, как истеричные, паникующие дети, мелочно обвиняя друг друга в общих неудачах и бесхозяйственности.\n\nПрямая трансляция на все экраны Европы показала европейцам унизительную правду: пока председатель Еврокомиссии фон дер Ляйен озабоченно пыталась говорить о "единстве" и "сотрудничестве", она сделала очевидным отсутствие таковых. \n\nЕсли Европа хочет оправиться от этого ужасного поражения и восстановить свои позиции, национальные интересы и соперничество должны быть отброшены, чтобы Европа не перестала существовать как единое целое."
 germany.184.a: "Мы потерпели неудачу из-за хаоса. Европа может выжить, только объединившись!"
 germany.185.t: "Приглашение в ССТ"
 germany.185.d: ""
 germany.185.a: "Конечно!"
 germany.185.b: "Конечно нет!"
 germany.186.t: "Формирование Арабского Легиона"
 germany.186.d: ""
 germany.186.a: "Великолепно!"
 germany.187.t: "Формирование Южноамериканского Легиона"
 germany.187.d: ""
 germany.187.a: "Великолепно!"
 germany.188.t: "Формирование Африканского Легиона"
 germany.188.d: ""
 germany.188.a: "Великолепно!"
 germany.189.t: "Взрыв в Центре Партии"
 germany.189.d: "В 3:17 утра взрывное устройство разорвало районный штаб ПДС в Галле. На записях камер наблюдения видно, как вскоре после полуночи за периметр проскользнула фигура в капюшоне, тащившая ящик с бирками о доставке. Спустя несколько минут камеры отключились.\n\nТри товарища погибли мгновенно. Еще семеро получили ранения, двое - тяжелые. Коллективный отдел рабочих представлял собой руины из обугленного бетона и оплавленного пластика, покрытые копотью. Чтобы не стать мишенью для последующих атак, сотрудники службы спасения замаскировали краснозвездные знаки отличия на своей униформе. Это не помогло. Одну пожарную машину забросали кирпичами, прежде чем прибыла полиция.\n\nК полудню в Интернете появилось сообщение с грубым символом "Немецкого Националистического Фронта" (Aktionsfront Deutscher Nationalisten). Их "Антикоммунистический манифест" представлял собой сплетение риторики крови и почвы, исторических обид и технократического либертарианства, облаченного в нацистскую риторику.\n\nМинистерство государственной безопасности опубликовало имена - некоторые реальные, некоторые намеренно угаданные - подозреваемых в коллаборационизме. В крупных городах удвоилось присутствие служб безопасности. Фраза "фашизм в наших стенах" вновь зазвучала в залах пленарных заседаний. Для некоторых это было дежавю."
 germany.189.a: "Хотя чувствовалось, что грядет нечто хуже."
 germany.190.t: "Новое Дыхание"
 germany.190.d: "Федеральная разведывательная служба будет реформирована, перепрофилирована и переименована. Резолюция прошла без особого шума, но никто не сомневался в ее значимости. В гулкие залы Фолькскаммера должно было вернуться печально известное Министерство государственной безопасности, или Штази.\n\nЭто был продукт социалистической законности и революционной необходимости, те же знакомые грани, те же подрезанные акценты, те же машинописные формы. Та же тишина, когда двери лифта открылись, и вы увидели двух вежливых мужчин в серых пальто, ожидающих вас у входа в квартиру. Уже составлялись отчеты о диверсионных сборищах в саксонской сельской местности. Пограничные журналы становились все толще. Уличные информаторы вернулись, на этот раз с лучшими телефонами и худшей моралью. Это был уже не 1989 год. Это был [GetYear]. Инструменты изменились, но миссия - нет.\n\nТоварищ министра Бартш выступил перед пленумом: "Социалистическая республика не может выжить, надев очки. Мы не шпионим, мы охраняем. Мы не репрессируем, мы предотвращаем. Но мы не позволим реакции точить свои ножи за закрытыми дверями."
 germany.190.a: "Защита хрупкого мира."
 germany.191.t: "Репрессии Штази Прошли Успешно!"
 germany.191.d: ""
 germany.191.a: "Великолепно!"
 germany.192.t: "Формирование Американского Легиона"
 germany.192.d: ""
 germany.192.a: "Великолепно!"
 germany.193.t: "Атака на Украинскую энергосистему Прошла Успешно"
 germany.193.d: ""
 germany.193.a: "Великолепно!"
 germany.194.t: "Атака на украинскую энергосистему не увенчалась успехом"
 germany.194.d: ""
 germany.194.a: "Небольшая неудача..."
 germany.195.t: "Атака на Белорусскую энергосистему Прошла Успешно"
 germany.195.d: ""
 germany.195.a: "Великолепно!"
 germany.196.t: "Атака на Белорусскую энергосистему не увенчалась успехом"
 germany.196.d: ""
 germany.196.a: "Небольшая неудача..."
 germany.197.t: "Атака на Румынскую энергосистему Прошла Успешно"
 germany.197.d: ""
 germany.197.a: "Великолепно!"
 germany.198.t: "Атака на румынскую энергосистему не увенчалась успехом"
 germany.198.d: ""
 germany.198.a: "Небольшая неудача..."
 germany.199.t: "Совершено Покушение на Жизнь Президента"
 germany.199.d: ""
 germany.199.a: "Слава Господу, он выжил!"
 germany.200.t: "Финляндия вступает в НАТО"
 germany.200.d: "Финляндия официально вступила в НАТО, что стало монументальным сдвигом в оборонной политике страны. Премьер-министр Финляндии заявил, что этот шаг необходим для обеспечения безопасности страны на фоне растущей напряженности в Европе, особенно вдоль 1300-километровой границы с Россией. Это решение нарушает давнюю традицию нейтралитета Финляндии и делает ее ключевым игроком в северной оборонной стратегии Альянса.\n\nВысококвалифицированные военные Финляндии, а также ее глубокие знания в области арктических операций, как ожидается, станут важным активом, поскольку НАТО усиливает свое присутствие в этом регионе."
 germany.200.a: "Великолепно!"
 germany.201.t: "Швеция вступает в НАТО"
 germany.201.d: "Германия приветствовала официальное вступление Швеции в НАТО, что стало важной вехой для европейской безопасности и завершением более чем двухвекового шведского нейтралитета. Канцлер высоко оценил этот шаг, заявив, что членство Швеции укрепляет северную оборону альянса и упрочивает европейское единство перед лицом растущих внешних угроз.\n\nПосле вступления Швеции в НАТО Германия ожидает более тесного военного сотрудничества и укрепления безопасности в Балтийском регионе. Решение принято в критический момент, когда Европа сталкивается с растущим давлением на своих восточных границах."
 germany.201.a: "Великолепно!"
 germany.202.t: "Саммит в Финляндии провалился"
 germany.202.d: "Переговоры между Финляндией и НАТО потерпели крах: долгожданный саммит завершился без вступления Финляндии в военный альянс. Несмотря на месяцы обсуждений и растущую напряженность в Европе, финское правительство и представители НАТО не смогли прийти к консенсусу по ключевым вопросам безопасности. Финляндия выразила опасения по поводу потери стратегической автономии, в то время как НАТО добивалось от скандинавской страны более твердых обязательств.\n\nСрыв саммита ставит под вопрос будущее оборонное положение Финляндии, оставляя ее потенциальное членство в НАТО под вопросом, а также ставя под угрозу нашу военную стратегию в Скандинавии."
 germany.202.a: "Мы будем упорствовать!"
 germany.203.t: "Саммит в Швеции провалился"
 germany.203.d: "Саммит НАТО в Швеции завершился провалом, в результате чего вопрос о вступлении Швеции в альянс остался нерешенным. После нескольких месяцев переговоров и обострения напряженности в Европе шведское правительство и представители НАТО не смогли найти общий язык по основным вопросам безопасности. Швеция выразила обеспокоенность по поводу усложнения своей стратегической автономии, в то время как НАТО настаивало на более существенных военных обязательствах.\n\nЭто нарушение ставит под сомнение оборонную стратегию Швеции на будущее и ставит под сомнение возможность ее вступления в НАТО на фоне эскалации региональной нестабильности. Это заставляет нас пересмотреть нашу оборонную политику на северном фланге Европы и на Балтийском море в условиях все более нестабильной обстановки."
 germany.203.a: "Мы будем упорствовать!"
 germany.204.t: "Создание Линейного город"
 germany.204.d: ""
 germany.204.a: "Какое чудо нового десятилетия!"
 germany.205.t: "ПЕРЕДОВОЙ ОТЧЕТ: [GetDateText]"
 germany.205.d: "ОТ: ГЕНЕРАЛ-МАЙОР АНДРЕАС МАРЛОУ\n\nДжентльмены, подводя итог ситуации, мы оказались по уши в дерьме. Вчера русские прорвали итальянскую оборону близ Старого Костшинека и мародерствуют в нашем тылу. Мне также сообщили, что наши позиции на юге близ Котбуса были уничтожены. Без сомнения, они будут стремиться замкнуть кольцо окружения к концу сегодняшнего дня. Если они добьются успеха, мы будем окружены, отрезаны и оттраханы."
 germany.205.a: "Мы будем упорствовать!"
 germany.206.t: "Проект Поэтапного Отказа от Ядерной Энергетики"
 germany.206.d: "В условиях углубляющегося энергетического кризиса решение Германии о постепенном отказе от использования атомной энергии становится все более обсуждаемым. Изначально проект рассматривался как смелый шаг в сторону возобновляемых источников энергии и экологической устойчивости, но теперь он сталкивается с серьезными проблемами. Рост цен на электроэнергию, растущая зависимость от импорта энергии и медленное внедрение возобновляемых альтернатив вызвали общественные дебаты. Критики утверждают, что закрытие атомных станций делает Германию уязвимой, в то время как защитники окружающей среды остаются непоколебимыми, настаивая на том, что долгосрочные преимущества безъядерного будущего перевешивают краткосрочные неудачи. \n\nПозиция правительства становится все более шаткой. Несмотря на то, что общественность по-прежнему активно поддерживает «зеленую» политику, опасения по поводу энергетической безопасности и экономической напряженности растут. Давление со стороны делового сектора и иностранных союзников еще больше усложняет проблему, поскольку некоторые призывают временно прекратить отключения, чтобы стабилизировать энергосистему. Сейчас перед Германией стоит критически важное решение: продолжать постепенный отказ от атомной энергетики и рисковать нехваткой энергии или отложить проект, чтобы сохранить хрупкую стабильность страны в эти времена."
 germany.206.a: "Мы должны устранить эти Смертельные ловушки"
 germany.207.t: "Стремление к Миру"
 germany.207.d: "Неожиданный дипломатический ход - Германия обратилась к Москве с предложением заключить эксклюзивное торговое соглашение. Эта сделка, предусматривающая поставку жизненно важных немецких технологий и оборудования в обмен на российские энергоресурсы, способна существенно изменить экономическую динамику в отношениях между двумя странами. В условиях, когда западные санкции все еще нависают над российской экономикой, такое соглашение могло бы стать столь необходимым спасательным кругом, обеспечив стабильный приток немецких товаров и инвестиций. Однако принятие предложения может усилить зависимость России от европейских рынков, что вызывает опасения у сторонников жесткой линии в Кремле, которые стремятся к более диверсифицированной стратегии на будущее. \n\nПредложение поступило в период напряженных отношений между Россией и Западом, и этот жест со стороны Берлина рассматривается с осторожностью. С одной стороны, экономические выгоды очевидны: партнерство с Германией может стабилизировать ключевые отрасли промышленности и смягчить последствия продолжающихся санкций. С другой стороны, есть подозрения, что Германия использует эту возможность для оказания влияния на внутренние дела и экономическую политику России. Сейчас Москва стоит на перепутье..."
 germany.207.a: "Это пойдет на пользу Нам Обоим"
 germany.207.b: "Как нелепо!"
 germany.208.t: "АдГ Поддерживает Макса Отте на Пост Президента"
 germany.208.d: "Альтернатива для Германии официально поддержала Макса Отте в качестве своего кандидата в президенты, что знаменует собой важный момент в немецкой политике. Отте, консервативный экономист с историей противоречивых заявлений и связей, давно рассматривается как фигура, способная преодолеть разрыв между правым мейнстримом и ультраправыми. Его выдвижение АдГ свидетельствует о стремлении партии представить кандидата, обладающего интеллектуальным авторитетом и экономическим опытом, в надежде расширить свою привлекательность за счет популистской базы. Однако прежние связи Отте с ХДС и его позиция по ключевым вопросам вызвали дебаты в партии, и некоторые члены сомневаются в том, что он действительно представляет основные ценности АдГ. \n\nЭто одобрение уже вызвало волну во всем политическом ландшафте Германии. Ожидается, что кандидатура Отте усилит поляризацию в стране, поскольку устоявшиеся политические фракции левого и правого центра осуждают решение АдГ. Для АдГ, однако, это просчитанная авантюра - возможность легитимизировать свое движение в глазах избирателей, которые в противном случае могли бы отвергнуть их популистскую риторику. Теперь Германия ожидает предстоящей президентской гонки, зная, что кандидатура Отте может пересмотреть политическое будущее страны."
 germany.208.a: "Как будто они когда-нибудь выиграют"
 germany.208.b: "Макс Отте поможет спасти Германию!"
 germany.209.t: "Президентские Выборы 2022 года"
 germany.209.d: "Президентские выборы 2022 года в Германии стали поворотным моментом в политической жизни страны. В них участвуют три кандидата с резко контрастирующим видением будущего. Действующий президент Франк-Вальтер Штайнмайер претендует на переизбрание при широкой поддержке центристских и мейнстримных партий, включая СДПГ, ХДС и Зеленых. Известный своим стабильным руководством и приверженностью европейскому единству, Штайнмайер подчеркивает важность сохранения демократических ценностей и укрепления консенсуса в условиях растущих внутренних и международных вызовов. Его кампания направлена на то, чтобы убедить избирателей в том, что стабильность имеет первостепенное значение в эти неспокойные времена. \n\nС ним борется Макс Отте, противоречивый кандидат, поддержанный Альтернативой для Германии. Отте позиционирует себя как националиста, критикующего нынешнюю администрацию, апеллируя к тем, кто разочарован иммиграционной политикой и управлением экономикой. Между тем Герхард Траберт, врач, поддерживаемый партией Die Linke, делает акцент на социальной справедливости и борьбе с бедностью, выступая в защиту наиболее уязвимых слоев населения страны. С приближением выборов Германия стоит на перепутье, поскольку их результаты не только определят следующего президента, но и отразят глубокие идеологические разногласия внутри страны - между призывами к стабильности, радикальным переменам и стремлению к социальному равенству."
 germany.209.a: "Франк-Вальтер Штайнмайер"
 germany.209.b: "Макс Отте"
 germany.209.c: "Герхард Траберт"
 germany.210.t: "Верховный Канцлер Совершает Самоубийство"
 germany.210.d: "Верховный канцлер мертв! Наш Рейх погрузился в хаос! Вражеские войска подошли слишком быстро, чтобы наш лидер смог сбежать, и, чтобы избежать унизительного пленения, он мужественно покончил с собой! Мы должны спешно искать замену, пока в нашей администрации не начался хаос!"
 germany.210.a: "Мы остались без лидера..."
 germany.211.t: "Осада Замка Ройсс"
 germany.211.d: "Замок Ройса, Волчье логово, мы уже у древних стен и сокрушим его современным оружием до истечения недели, тиран Ройс внутри, мы собрались на периферии замка, наша артиллерия готова сравнять замок с землей, если потребуется, но сначала будет предпринято несколько штурмов, чтобы попытаться взять замок с минимальным уроном."
 germany.211.a: "Есть только один способ справиться с фашистами!"
 germany.212.t: "Генрих совершает самоубийство"
 germany.212.d: "Кайзер мертв! Да здравствует кайзер! Наш государь покончил с собой, когда безбожные орды угрожали его положению! Мы должны быстро найти преемника, пока наше движение не разделилось на части!"
 germany.212.a: "Мы остались без лидера..."
 germany.213.t: "Генрих Попал в Плен"
 germany.213.d: "Мы захватили лжеимператора Генриха фон Ройса! Без лидера, способного объединить их, монархисты наверняка окажутся на грани поражения! В течение следующей недели мы ожидаем некоторого усиления пыла, но их император больше не правитель клики, он наш пленник, и он заплатит за свою попытку восстановить императорское правительство!"
 germany.213.a: "Дайте собаке немного поскулить, и пусть она смотрит, как мы уничтожаем остальную часть его империи!"
 germany.214.t: "Верховный канцлер захвачен в плен"
 germany.214.d: "Мы неожиданно захватили Верховного канцлера! Мы ожидали, что он покончит с собой, когда ему будут угрожать, но нам повезло: обезоруженный и подавленный Верховный канцлер теперь находится под нашей опекой, и это наверняка сломит решимость нашей оппозиции!"
 germany.214.a: "Его "типы" предстанут перед окончательным судом!"
 germany.215.t: "Поддержка Гос. Сми Войны"
 germany.215.d: ""Наши солдаты единым фронтом идут на восток! Участвуете ли вы в нашей великой борьбе?" - кричала реклама из динамиков. \n\nКарл смотрел на экран, наблюдая за третьей, 40-секундной рекламой, которую можно было пропустить в середине видео. Конечно, хорошо, что он купил годовую подписку, иначе количество рекламы в 10-минутных роликах увеличилось бы в четыре раза. Американский коллапс все-таки сильно ударил по интернет-платформам. Не удосужившись досмотреть видео до конца, Карл ушел в гостиную.\n\nМама что-то готовила на кухне, а сестра листала телефон. Взглянув на большой телевизор, реликвию до 2020 года, он увидел очередное объявление о призыве в армию. На этот раз речь идет о пилотах немецких ВВС. Такие ролики обычно длятся по 10 минут с пятиминутным перерывом на рекламу, повторяясь в течение дня. Карл клялся, что видел такую же рекламу несколько недель назад.\n\nНе желая спорить с мамой по поводу громкости телевизора, он сел на диван. Беата, как обычно, обреченно листала экран, не обращая внимания на окружающий мир. Непрерывный поток военных кадров с go-pro и БПЛА, музыкальных монтажей и спонсируемых военными создателей контента шел один за другим. Карл вынужден был признать, что создательница эгиды Sturmtruppen показалась ему привлекательной, так что привлекательность налицо. Однако он задавался вопросом, почему режим решил спонсировать блогеров-красавцев.\n\nВыйдя покурить, Карл наконец-то смог немного поразмышлять в тишине. Алгоритмы искусственного интеллекта в социальных сетях, телевидение, радио, даже личный домашний помощник - все они безостановочно призывали его присоединиться, словно знали, что у него нет иммунитета. Похоже, что добровольное вступление принесет гораздо больше выгоды, чем увод с улицы. Размышляя об этом, он посмотрел вниз и увидел группу военных вербовщиков возле своего жилого комплекса. Похоже, ему не придется ничего выбирать."
 germany.215.a: "Каждый человек должен внести свой вклад!"
 germany.216.t: "ЭМИ взорвалась над Германией"
 germany.216.d: ""
 germany.216.a: "Боже милостивый..."
 germany.217.t: "Volt Europa получает большинство в Бундестаге"
 germany.217.d: "Долгое время считавшаяся неважной вереница партий, разбросанных по всей Европе, по мере того как о неудачах Германии в войне сообщали домой, Volt Europa быстро росла в популярности. Демонстрации, призывающие к европейскому единству, только усиливались, и теперь, когда большинство голосов обеспечено, немецкое государство почти наверняка будет заменено европейским."
 germany.217.a: "Новая надежда для Европы..."
 germany.218.t: "З Н А Й   С В О Е Г О   В Р А Г А"
 germany.218.d: "                                          ОНИ УБИЙЦЫ\n\n                                          ОНИ ВОРЫ\n\n                                           ОНИ НАСИЛЬНИКИ\n\n                                           ОНИ ФАШИСТЫ\n\n                                           ОНИ АЛКОГОЛИКИ\n\n                                           ОНИ РУССКИЕ"
 germany.218.a: "Мир, свободный от них, - это будущее"
 germany.219.t: "Разграбление Лувра"
 germany.219.d: "Мародерство поразило Лувр: сотни ценных произведений искусства исчезли с витрин, а некоторые картины, такие как "Коронация Наполеона" или "Зарезанный бык", появились в Интернете на eBay и Amazon. Хотя тех, кто был настолько глуп, чтобы выложить бесценные украденные произведения искусства в Интернет, задерживают, более умные могут унести злополучные произведения искусства, но Мона Лизы пока не видно. А группе людей каким-то образом удалось поднять и унести Гладиатора Боргезе."
 germany.219.a: "Расправьтесь с мародерством!"
 germany.220.t: "[GER.GetNameDefCap] Требует, чтобы мы вступили в НАТО"
 germany.220.d: "Германия хочет, чтобы мы "мирным путем" присоединились к их фракции, и определенно не будет пытаться аннексировать нас."
 germany.220.a: "Окей"
 germany.220.b: "Nein"
 germany.221.t: "Изменение в Руководстве"
 germany.221.d: "В ответ на наши недостаточные меры по удовлетворению интересов корпораций, от которых во многом зависит наша экономика, к нам обратилась делегация крупнейших европейских и транснациональных компаний, предложившая своим представителям занять большинство ключевых постов в правительстве, чтобы обеспечить Европе по-настоящему технократическое и совместное будущее.\n\nНесмотря на то, что власть корпораций всплыла на поверхность и руководители компаний теперь напрямую принимают политические решения, многие задаются вопросом: изменилось ли что-нибудь на самом деле?"
 germany.221.a: "Ruh roh raggy!"
 germany.222.t: "К КОМУ ЭТО БУДЕТ ОТНОСИТЬСЯ"
 germany.222.d: "Удержи меня у власти и сохрани авторитарную демократию выше 35% понятно?\n\nПОДПИСЬ:"
 germany.222.a: "Клаус Шваб"
 germany.223.t: "Блаженны Миротворцы"
 germany.223.d: "Святой Джавелин, Святая Штормовая Тень и воины НАФО"
 germany.223.a: "Что, черт возьми..."
 germany.224.t: "Гюнтер Фелингер найден мертвым"
 germany.224.d: "Гюнтер Фелингер, известный австрийский экономист, сторонник ЕС и НАТО, а также бывший австрийский политик, был найден зарезанным неподалеку от отеля, в котором он остановился в Мюнхене. На данный момент убийца остается неизвестным, но мотив, похоже, политический, учитывая характер человека и тот факт, что его бумажник все еще находится на его теле."
 germany.224.a: "Найдите виновного!"
 germany.225.t: "Примите Победную Позу"
 germany.225.d: "где мои джедаи, которые остановят орков!!!??!?"
 germany.225.a: "ад"
 germany.226.t: "Отрицание"
 germany.226.d: "It ain't the end of the world yo."
 germany.226.a: "Всё в порядке..."
 germany.227.t: "Гнев"
 germany.227.d: "Это был очередной день в Генеральном штабе, было созвано совещание по вопросам готовности к обороне, на котором присутствовали руководители компаний Rhinemetall, Heckler and Koch и некоторых других, а во главе совещания стоял генеральный инспектор бундесвера.\n\nГенерал Дорфмюллер был на волоске от гибели: совещание за совещанием, и каждое совещание говорило ему, что ничего еще не готово. Его только недавно повысили с полковника в рамках плана расширения армии Бундесвера, но он уже жалел, что отказался от этого. Каждое совещание генерального штаба превращается в гримасу, сжатые кулаки и иногда крики, и сегодня вряд ли будет иначе, поскольку руководители корпораций сидят здесь, чтобы представить свои отчеты генеральному инспектору, Вопросы задаются, кулаки сжимаются, генерал Дорфмюллер давно научился даже не беспокоиться, их объяснения всегда одинаковы: Thyssen-Krupp не может поддерживать производство стали, Siemens  перенапрягается, чтобы содержать достаточно персонала для своевременного \n\nДорфмюллер спокойно сидит в комнате, пока старшие генералы спорят о плане готовности между собой и с руководителями, его кулак сжат под столом, чтобы скрыть любые признаки гнева, его сердце горит от саркастических замечаний, но его разум приучен к их подавлению за всю его долгую карьеру."
 germany.227.a: "Я ненавижу всех в этой комнате..."
 germany.228.t: "Развилка на Жизненном Пути"
 germany.228.d: "Берлин всегда был живописным городом для любого, у кого была возможность посетить его или пожить в нем. Захватывающие исторические памятники, интересные культурные учреждения и огромное разнообразие кафе и ресторанов, разбросанных на каждом углу, - все это сделало город излюбленным местом отдыха в стране. Многие из этих мест, которые часто посещали туристы, предоставляли немцам некоторые возможности для простого заработка. Это было немного, но это служило своей цели для тех, кто в этом нуждался.\n\nВильгельм был одним из таких людей, поскольку он был молодым кассиром в местном кафе, которое посещало множество туристов, особенно американцев и канадцев. Но после того, как в Северной Америке разразилась война, после этого кафе, казалось, так и не смогло дойти до того уровня посетителей, который был до войны, когда все эти туристы приезжали в город. Теперь у него были серьезные сомнения в том, что он сможет сохранить свою работу или даже само кафе сможет оставаться открытым такими темпами. С каждым днем в его сознание закрадывалось чувство все возрастающего беспокойства, поскольку казалось, что статус-кво, к которому он так привык, теперь рушится вокруг него. Гражданская война в Америке, взрывающиеся конфликты по всему миру, экономические трудности и растущая напряженность в Европе; как скоро все это уничтожит его?\n\nОн часто думал об этом по дороге на работу и обратно. Разнообразные пейзажи служили отличным фоном для множества мыслей, которые тревожили его беспокойный разум. Однако за последнюю неделю или около того пейзаж, казалось, менялся на каждой улице, мимо которой он проходил. Сегодня утром, направляясь на работу, он заметил, что улицы теперь увешаны рекламой немецкого бундесвера всех форм и размеров. На какую бы улицу он ни свернул, огромное количество рекламы встречало его это было тем, что Вильгельм не мог игнорировать.\n\nНаконец, он остановился и заметил один из огромных плакатов, расклеенных на углу улицы. На плакате был изображен высокий и очень красивый немецкий солдат, отдающий честь зрителю, а под ним текст, призывающий граждан выполнить свой гражданский долг перед нацией. Однако под слоганами был текст, обещающий дальнейшие возможности карьерного роста и бонусы за регистрацию для заинтересованных. Теперь эти перспективы прочно засели в его сознании, соблазнив его несколькими идеями. Может быть, это могло бы стать для него чем-то многообещающим, чем-то, что могло бы послужить выходом из его проблем с и без того шаткой работой. Он хотел подумать об этом серьёзнее, но даже это казалось ему расточительной перспективой.\n\nНо когда он возобновил свой путь на работу и понаблюдал за кольцом закрытых кафе и магазинов на соседней улице, он, наконец, пришел к простому, но важному выводу,"
 germany.228.a: "Возможно... это то место, где я должен быть."
 germany.229.t: "Надвигающийся Шторм с Востока"
 germany.229.d: "Он просматривал эти планы тысячу раз, но теперь его мучило желание просмотреть их еще тысячу раз. Снова, и снова, и снова он просматривал одну и ту же информацию с одним и тем же результатом. Планы сражений, газетные вырезки, разведывательные отчеты, оценки и другие предсказания от всех родов войск Германии продолжали сводить его с ума. Генерал Вирман, как бы сильно он ни старался и ни готовился, не мог убежать от неизбежного, которое было написано везде, куда бы он ни посмотрел; русские наступали.\n\nОн видел это повсюду - от телевизионных репортажей до информации, которую получал из своего собственного офиса в Министерстве обороны. Русские к чему-то готовились; он был уверен в этом. Донбасс, Белоруссия, маневры на западе и учения в Центральной Азии; все это указывало на один зловещий вывод. Русские скоро нанесут удар на запад, и он боялся, что Германия совершенно не готова к этому. Независимо от того, сколько новобранцев было призвано на службу или проводились многонациональные учения, он чувствовал, что в конечном счете все это не имеет значения. Все американцы ушли, тысячи их солдат и дивизий, базировавшихся в Европе, были отправлены домой воевать в Америку; могущественная мировая сверхдержава покинула Европу, чтобы способствовать собственной гибели. Есть ли у этих стран на "восточном фланге" НАТО вообще шанс? Смогут ли они просто выиграть время для Запада? Возможно, бывшие коммунистические страны востока обрадовались бы шансу умереть, сражаясь с русскими, но его соотечественники воспримут это иначе. Готова ли Германия принять этот вызов? Стоили ли того вся подготовка и тренировки? Сможет ли Германия пережить этот натиск?\n\nЭто то, что каждый день донимало Вирмана в его берлинском офисе. Теперь он просто сидел и размышлял над этими ужасными открытиями для самого себя с той же кипой отчетов, которая всегда загромождала его стол. Сегодняшний день ничем не отличался. Он просто продолжал перечитывать те же самые перефразированные выводы, но из недавно напечатанных отчетов, отправленных утром. В тот момент это было почти похоже на форму безумия, но он знал, что не одинок в своих чувствах. Вся немецкая армия была в ужасе от того, что вскоре обрушится на европейский континент. Эта деморализующая рутина, которую он установил для себя за последний месяц или около того, была единственным, на что у него хватало сил в эти дни.\n\nОтложив последний отчет разведки из России, он вздохнул и уставился в потолок. Затем он пробормотал себе под нос единственное, что пришло ему в голову в тот момент,"
 germany.229.a: "Господь, помоги Германии, ибо кто ещё это сделает?"
 germany.230.t: "Меч и Щит Отечества"
 germany.230.d: "Майор Фишер готовился к этому моменту последние несколько месяцев. Он повторял эту процедуру снова и снова, пока не оказался на грани безумия. Все тренировки, все уроки, вся подготовка и распределение ресурсов вскоре должны были принести результаты, на которые надеялись многие. Все в вооруженных силах и даже вся Германия до сих пор были охвачены ужасным страхом, не похожим ни на какой другой. Существовал страх за экономику, Америку, Европу и даже за весь мир. Однако теперь он мог отбросить свой страх, потому что ему предстояло в полной мере оценить плоды их напряженных приготовлений. Он подтянул свою форму и стряхнул пыль с плеч, готовясь выйти из палатки, в которой он готовился последний час или около того. Наконец-то настал день инспекции.\n\nТеперь, выйдя на подиум с видом на большое открытое поле, он получил великолепный вид на потрясающую огневую мощь, которая ждала его. Сотни немецких солдат, аккуратно выстроенных в ряды, стояли по стойке смирно, в то время как длинные колонны танков Leopard 2A6 и самоходных гаубиц Panzerhaubitze 2000 располагались прямо за ними. Они работали, тренировались, проливали кровь, плакали и обливались потом бесчисленные часы, дни, месяцы и даже годы, чтобы подготовить себя к тому, что должно было произойти. Они были лучшими из лучших и знали это. Эти люди были лучшими из тех, кого могла предложить Германия. Фишер постоял на трибуне несколько секунд, чтобы оценить открывшуюся перед ним потрясающую сцену, которая наполнила его гордостью, понятной только солдату.\n\nНо гордость за армию, частью которой был Фишер, была не единственным, что он чувствовал, поскольку теперь он испытывает жалость и презрение к враждебной армии, против которой, как все подозревали, очень скоро выступят русские. Как могли эти обедневшие простаки победить такую армию? Как могла Россия бросить вызов полностью подготовленным силам НАТО, не говоря уже о немецкой армии? Русские, несомненно, были либо глупцами, либо самоубийцами, либо и тем и другим. Германия унизила русских в Первой мировой войне, еще раз во Второй, и все, казалось, были очень уверены, что Германия сможет сделать это в третий раз. Майор Фишер, его товарищи и вся Германия знали, что они будут готовы к этому.\n\nТеперь, подготовив микрофон, майор начал свое обращение к своим солдатам.\n\n"Солдаты армии Германии! Сегодня день инспекции! Сегодня вы продемонстрируете как своим коллегам, так и всей Германии свое уважаемое мастерство в качестве современной боевой силы! Покажите нам, к чему привели все ваши тренировки!" - торжествующе объявил Фишер.\n\nВсе солдаты на поле боя, от тех, что были впереди, до тех, что были сзади, глубоко вздохнули и закричали с невиданной за долгое время суровой яростью,"
 germany.230.a: "JAWOHL HERR MAJOR!"
 germany.231.t: "Популярность Ультраправых Резко Возросла!"
 germany.231.d: "После нашего унизительного поражения от коммунистической России многие немцы потеряли интерес к предвыборной политике и начали поддерживать экстремистские идеи ультраправых партий.\n\nИз-за сокращения финансирования BfV с трудом следит за этими группами. Все чаще и чаще мы видим на улицах эмблемы и плакаты двух крупнейших правых организаций - НДПГ и "Третьего пути". Их марши - обычное зрелище по всей стране. Они призывают к спасению и очищению немецкого общества от того, что они считают крипто-левизной и капиталистическим упадком."
 germany.231.a: "Это беспокоит..." 
 germany.232.t: "Битва за Будущее"
 germany.232.d: "Пути нашей страны сужаются, оставляя нам только два варианта: Национально-демократическая партия или Третий путь.\n\nНДП, возглавляемая Франком Францем, является политической партией с амбициозным и эгоцентричным лидером. Их называют неофашистами и реваншистами, а это именно то, что сейчас нужно немецкому народу. НДП выступает за обращение к прошлому в поисках спасения.\n"Третий путь" - это ответвление НДП, возглавляемое более радикальными ультраправыми элементами. Они называют себя штрассеристами, стремящимися возродить идеи истинно немецкого социализма, которые, возможно, и есть то, в чем нуждается немецкая нация."
 germany.232.a: "НДПГ..."
 germany.232.b: "Третий путь..." 
 germany.233.t: "Убит Президент!"
 germany.233.d: "В результате шокирующего поворота событий сегодня в Берлине был убит президент Германии, что вызвало шоковую волну по всей стране и международному сообществу. Трагический инцидент произошел на фоне распада НАТО и беспрецедентного подъема ультраправых партий в Германии, что породило слухи о возможных связях стрелка с правоэкстремистскими группировками.\n\nУбийство произошло во время публичного выступления президента. Когда он обращался к толпе, собравшейся перед Бранденбургскими воротами, неизвестный открыл огонь, смертельно ранив президента, после чего был обезврежен силами безопасности. Несмотря на немедленную медицинскую помощь, президент скончался от полученных травм по дороге в больницу."
 germany.233.a: "Я в шоке!" 
 germany.234.t: "Турецкие Кварталы Подожжены!"
 germany.234.d: "Недавно наша страна пострадала от ужасных событий. Ночью были подожжены десятки улиц и зданий, принадлежащих гражданам Турции. Сотни людей получили ранения, и по меньшей мере 73 человека погибли. Финансовые последствия этой трагедии еще оцениваются, но ожидается, что они будут значительными.\nДве крайне правые группировки, "Новая заря" и "Немецкий порядок", взяли на себя ответственность за это нападение. В настоящее время полиция расследует этот инцидент, но шансы поймать преступников невелики. Официальные правые партии отрицают какую-либо связь с нападением, утверждая, что это не соответствует их ценностям.\n\nНесмотря на человеческую трагедию и страдания, вызванные этим инцидентом, народ Германии не испытывает особой симпатии к турецким иммигрантам. В Интернете распространено мнение: "Иностранцы, вон!" и "Чемодан, Вокзал, Анкара!"."
 germany.234.a: "Ужасно!"
 germany.235.t: "Первые Социалистические Выборы"
 germany.235.d: "Жители Республики выстраивались в очереди для голосования. Красные знамена все еще развевались, лозунги все еще висели, но на этот раз революция приостановилась... чтобы проголосовать.\n\nЗакон о народном голосовании обещал прозрачность и плюрализм. Теперь ПДС предстояло столкнуться с первым настоящим вызовом. Действующий президент Бартш, даже несмотря на угрозу политических потерь, позволил это ради демократии. По крайней мере, продолжение будет носить социалистический характер.\n\nЗакон о народном голосовании обещал прозрачность и плюрализм. Теперь ПДС предстояло столкнуться с первым настоящим вызовом. Действующий Бартш, даже под угрозой политических потерь, позволил это ради демократии. По крайней мере, продолжение будет носить социалистический характер.\n\nТогда была Доротея Мартин из ДПП. Дитя земли, ее риторика была более мягкой, но не менее радикальной. Экология, сельская справедливость и демократический социализм. То, что многим в более широком левом лагере не нравилось, но допускалось ради того, чтобы держать ситуацию под контролем. Да, это были выборы, но они никогда не были выборами следующего фашиста."
 germany.235.a: "ПДС Побеждает!"
 germany.235.b: "СРП Доминирует!"
 germany.235.c: "Неожиданная Победа ДКП!"
 germany.235.e: "Коалиция Хан Бён-Чхоля побеждает!"
 germany.236.t: "Дебаты в Бундестаге"
 germany.236.d: "В последние дни в нашем парламенте было много дискуссий и противоречий по поводу некоторых политических мер и заявлений, сделанных избранными должностными лицами. Такого рода напряженность нежелательна в таком уважаемом учреждении, как Бундестаг, и мы должны немедленно устранить ее.\n\nМы можем либо обвинить определенных членов организации в том, что они вызвали этот хаос, либо попытаться найти мирное решение для восстановления порядка."
 germany.236.a: "Обвинить правых в провале"
 germany.236.b: "Обвинить левых в беспорядке"
 germany.236.c: "Мы должны бороться за единство"
 germany.237.t: "1000 лет"
 germany.237.d: ""
 germany.237.a: "Были ли мы обречены на вечный повтор?"
 germany.238.t: "Наше Будущее..."
 germany.238.d: "С нашим принятием давно запрещенных идеологий и философий, а также культурной войной против либерализма, неизбежно, что национал-социализм будет снова расти в нашей стране.\nПодавленный десятилетиями, он имеет шанс снова расцвести, на этот раз мы будем знать, каких ошибок нам следует избегать, на этот раз мы будем знать, что нельзя недооценивать нашего врага, на этот раз мы будем знать, что действительно поставлено на карту.\n\nОстается вопрос, стоит ли полностью принять этот давно похороненный идеал, отбросив ту идентичность, которую нам навязали, отказавшись от немецкого народа. Это покажет миру, что ничто не умирает по-настоящему, но это также привлечет к нам много злых глаз.\n\nМы также можем просто спокойно принять эту часть нас, отказаться от креста с крюком и поклонения Гитлеру и все еще приспособить нашу нацию к тому видению, которое у нас есть. Можно сжечь себя в аду идеализма, но для остального мира мы все равно должны выглядеть хорошо.\n\nВыбор за нами."
 germany.238.a: "Это единственное логическое завершение наших реформ. Зиг Хайль!"
 germany.238.b: "Мы уже достаточно переняли из нашего прошлого." 
 germany.239.t: "Митинг в Нюрнберге"
 germany.239.d: ""
 germany.239.a: "Слава нашей партии!" 
 germany.240.t: "Будущее Нашей Религии"
 germany.240.d: "Германия, несомненно, христианская страна, но всегда ли мы были христианским народом? Ответ - нет, конечно, наши корни уходят к Одину и Тору. Норвежская вера. Но сегодня в Германии почти нет приверженцев язычества. Лидер Шутцштаффелей Генрих Гиммлер в свое время пропагандировал языческую религию как возрождение древних германских традиций, и это было развитием более ранних оккультных обществ, таких как Общество Туле, и других неоязычников, таких как генерал Людендорф.\n\nДвижение языческого возрождения малочисленно, но и мы когда-то были малочисленны, разве не является нашей целью возрождение Пангерманской империи? Разве не наша цель - восстановить немецкую душу? Действительно ли нам выгодно восстановление язычества?\n\nДалее проще было бы одобрить христианство, но реформировать его несовместимые с национал-социализмом части. Конечно, это религия, проклятая по недосмотру евреев, а поскольку сам Христос был евреем, быть христианином почти противоположно тому, чтобы быть национал-социалистом. Возможно, мы можем изменить его этническую принадлежность или другие элементы, чтобы он вписался в нашу схему. Мы также должны подумать о том, как это повлияет на восприятие нас нашими союзниками. Почти все наши союзники исповедуют христианство или, по крайней мере, говорят об этом, и попытка продвигать языческое возрождение не принесет нам ничего хорошего."
 germany.240.a: "У партийных радикалов была правильная идея! Христианство - это религия для слабых!"
 germany.240.b: "Мы должны реформировать немецкие церкви, чтобы они соответствовали нашему нацисткому видению."
 germany.241.t: "Кубань Обеспокоена Российской Агрессией"
 germany.241.d: "Сегодня с нашим посольством на Кубани связались с просьбой о срочной встрече. Российские вооруженные силы постепенно вторгаются на Кавказ, подрывая безопасность региона, особенно Кубани. Правительство Кубани умоляет нашего посла о более надежных гарантиях обороны и инвестициях в их оборону, но это может создать впечатление, что мы являемся агрессором. Хотя Кубань уже имеет гарантии от Украины, а Украина входит в НАТО, возможно, стоит рассмотреть Кубань в качестве составной части нашей стратегии обороны."
 germany.241.a: "Инвестируемся в их оборону."
 germany.241.b: "С медведя содрали шкуру, перестаньте беспокоиться."
 germany.242.t: "Германия возобновляет переговоры"
 germany.242.d: ""
 germany.242.a: "Есть ли у мира шанс?"
 germany.243.t: "Призрак Киева"
 germany.243.d: "Вызывающее имя стало хитом в Твиттере и других социальных сетях, ссылаясь на украинского пилота МИГ-29, который якобы сбил шесть российских самолетов в первый день российского вторжения в Украину.\n\nКо многим постам "Призрака Киева" прилагается видеозапись того, что, по-видимому, является МИГ-29, известным по схеме НАТО как Точка опоры, хотя в большинстве постов есть точно такой же короткий клип - самолет, пролетающий над бетонными многоэтажками с серым небом позади \n\nТем не менее, существует мало доказательств того, что Призрак Киева действительно существует, а онлайн-недоброжелатели указывают на неправдоподобность истребителя без превосходства в воздухе и на более слабом реактивном самолете, сбивающем 6 вражеских самолетов за один день.\n\nТем не менее, анонимный опрошенный украинец заявил, что "Важно не то, существует он или нет, а сообщение, которое он распространяет как легенду. Такого рода послание важно в эти тяжелые времена, независимо от того, правда это или нет"."
 germany.243.a: "Счастливой охоты"
 germany.244.t: "Выбор Коалиции"
 germany.244.d: "Теперь, когда выборы завершились, у нас осталось совсем немного времени для формирования правительства. Давайте тщательно рассмотрим наши варианты, чтобы убедиться, что мы не окажемся в меньшинстве в Бундестаге."
 germany.244.a: "Нам не нужна никакая помощь!"
 germany.244.b: "Коалиция Германии! ХДС, СДПГ, СВДП!"
 germany.244.c: "Возможно, мы могли бы пригласить АдГ..."
 germany.244.h: "Коалиция Светофоров побеждает!"
 germany.244.e: "Нечестивый союз... Это не то, чего мы хотим, но это то, что нам нужно."
 germany.244.f: "Успокойте радикалов - мы сотрудничаем с ХДС."
 germany.244.g: "Красно-Красно-зеленая коалиция! Потому что мы можем!"
 germany.244.i: "Ямайская коалиция ХДС, СВДП и Зеленых!"
 germany.244.j: "Кенийская коалиция ХДС, СДПГ и Зеленых!"
 germany.245.t: "Второй Дрезденский Процесс"
 germany.245.d: "Когда-то этот зал в Дрездене был зданием федерального суда. Орел над скамьей был снесен и заменен на молот и пшеницу Народной Республики. Обвиняемыми были бывшие генералы бундесвера. Каждое обвинение с механической точностью зачитывал суд, похожий на активиста: "Предательство революции," "Сотрудничество с фашистским агрессором," "Участие в заговоре буржуазно-милитаристского переворота"\n\nОдин был объявлен капиталистом в форме, другой - предателем рабочего класса, а третий - просто врагом "социалистического мира", социалистического жаргона, который они, похоже, даже не понимали. Некоторые бормотали себе под нос. Другие тупо смотрели вперед, словно пробуждаясь от долгого, комфортного сна в советском кошмаре.\n\nВедущий судья, бывший фабричный синдикалист из Лейпцига, не говорил с возмущением. Да ему и не нужно было. Обвинителям хватало толпы на улице, профсоюзных знамен, свидетельств студентов, семей из Хемница, которые все еще ждали вестей о своих пропавших после поражения в Польше сыновьях. Это не было судебным разбирательством. Никакой защиты не было, а обвинения продолжали нарастать. Один генерал попытался выступить, ссылаясь на субординацию, туман войны, отсутствие ясности. Микрофон был отключен.\n\nИ по справедливости все они были приговорены к смерти."
 germany.245.a: "Es schreien die NATO-Minister - Ihr Schreien ist nicht mehr Geflüster"
 germany.246.t: "Нетаньяху выступает в Бундестаге"
 germany.246.d: "Сегодня премьер-министр Израиля Биньямин Нетаньяху прибыл в Берлин, чтобы выступить в Бундестаге. Начав с поздравления Германии и другим странам НАТО, похвалив храбрые действия наших войск по защите демократии и отражению российской угрозы на востоке, он продолжил, сказав, что враги свободы все еще активны и нет покоя в борьбе за освобождение.\n\nНетаньяху прибыл в Берлин в разгар войны Израиля за выживание против арабских стран. Продолжая разрушающееся наследие России, они пытаются в последний раз погасить свет свободы на Ближнем Востоке.\n\nОн призвал Германию и наш народ поддержать Израиль, давнего союзника и друга НАТО, помня о наследии Германии в отношении еврейского народа, о том, что мы теперь стали единственными защитниками израильского народа.\n\nВыступление закончилось громом аплодисментов. Сразу же после этого было проведено голосование по новой резолюции - разрешить широкую военную поддержку Израиля в его борьбе с коалицией Дамаска.\n\nИзраиль - важный плацдарм на Ближнем Востоке, который нельзя потерять."
 germany.246.a: "Наш исторический долг..." 
 germany.247.t: "Итоги Русской Освободительной Армии"
 germany.247.d: "Создание Русской освободительной армии было наполовину данью уважения генералу Власову, а наполовину искренней попыткой нашего правительства организовать русских националистов. Но мы... недооценили националистическую оппозицию советскому правительству. Перед тем как отдать приказ о создании независимого подразделения для организации коллаборационистов, мы провели очень мало исследований на эту тему, но, как оказалось, современный русский национализм очень часто может уживаться с советским национализмом, или, правильнее сказать, национал-коммунизмом, элементы русских национальных левых, такие как Назболы, демонстрируют это лучше, чем что-либо другое, и когда Лукашенко вручили членский билет, мы, вероятно, должны были догадаться об этом.\n\nНаша попытка организовать их была ошеломляюще неудачной, те, кто записался добровольцем, имели высокий процент дезертирства, им дали плохое снаряжение и заставили их охранять других русских в тыловых районах, в результате чего наша проблема партизан никогда не была хуже в тех районах, где они были развернуты. \n\nЛибо они халтурят, либо активно помогают партизанским действиям в нашем тылу, в любом случае, эта Нео-РОНА - неудачники, советское правительство использовало эту группу и изображения ее низких стандартов по сравнению с немецкой пехотой для демонстрации плохого обращения с русскими, слабости и пропаганды в пользу противостоящего сотрудничества, ликвидация этих частей должна быть проведена в ближайшее время, лишение снаряжения, званий и, возможно, жизни, если мы сочтем это нужным."
 germany.247.a: "Кто несет за это ответственность? Мне НУЖНЫ ИМЕНА!" 
 germany.248.t: "Приглашение в Евроинтерн"
 germany.248.d: "Германия прислала нам приглашение в Евроинтерн, мы знаем о реваншистских настроениях немцев и понимаем, что принятие приглашения может привести нас к войне с русскими. Стоит ли интернационализм еще одной европейской войны или нам лучше оставить Германию?"
 germany.248.a: "Не"
 germany.248.b: "Хорошо!"
 germany.249.t: "Югославия Отказалась"
 germany.249.d: "Несмотря на то, что Югославия является социалистической страной, они отказались от нашего предложения выступить сообща перед лицом фашистской угрозы, заявив, что поддерживают дело социализма, но предпочитают экономическое сотрудничество военному. Как бы они ни проявляли свою трусость, нам не выгодно воевать с развивающейся социалистической страной в Европе, какой является Югославия."
 germany.249.a: "Ну что ж. Передайте им наши наилучшие пожелания."
 germany.250.t: "Результаты Выборов Бундестага"
 germany.250.desc: "28 сентября начался первый тур федеральных выборов, в ходе которого будут избраны члены Бундестага 21-го созыва. Также проходят выборы в федеральные органы власти, и это решающий избирательный сезон в Германии. Партии выдвинули своих кандидатов, и по мере заполнения урн для голосования победитель становится очевиден. На весь мир объявлено, что будущее Германии..."

 germany.260.t: "Германия Предлагает Сделку"
 germany.260.d: "В условиях, когда напряженность в Европе вновь начала нарастать, немцы сделали нам необычное предложение. Они предлагают щедрое торгово-экономическое партнерство, которое может оказаться полезным для ускорения нашего экономического восстановления. Однако у этого есть и обратная сторона, поскольку любое экономическое партнерство с Западом может снизить нашу легитимность среди населения и разозлить националистов."
 germany.260.a: "Ради нашего восстановления мы должны принять"
 germany.260.b: "Мы не фрицевские подхалимы!"
 germany.261.t: "Россия Отрицает Торговую Сделку"
 germany.261.d: "Из России приходят тревожные новости: несмотря на все усилия наших дипломатов, торговые переговоры с Россией провалились, причем русские ошибочно заявили, что мы ведем переговоры недобросовестно, а сообщения из России свидетельствуют об ускорении российского перевооружения угрожающими темпами."
 germany.261.a: "Мы должны готовиться к худшему..."
 germany.262.t: "Россия Принимает Торговое Соглашение"
 germany.262.d: "Приятные новости от наших дипломатов: торговые переговоры с Россией принесли свои плоды, и соглашение было подписано.  Огромные рынки России теперь открыты для нас, и дверь к долгосрочной нормализации отношений теперь широко открыта."
 germany.262.a: "Пусть это принесет мир в Европу!"
 germany.263.t: "Россия Отвергнула Требования!"
 germany.263.d: "Русские наотрез отказались уменьшать свою армию и военный бюджет, даже после того, как мы пригрозили им серьёзными последствиями."
 germany.263.a: "Больше санкций на них!"
 germany.264.t: "Дуэль Джентльменов"
 germany.264.d: "Дождь струился по руинам, образуя мутные потоки на улицах, изрезанных артиллерийским огнем. Александр Петров присел за обвалившейся стеной, его винтовка выпустила последний патрон. На другой стороне улицы немецкий солдат прятался за разбитым бронетранспортером. Они оба знали, что у другого закончились патроны.\n\nНа улице пахло порохом, смешанным с сыростью дождя и пылью. Александр вспомнил слова матери о том, что на войне каждый мужчина должен умереть как воин. Поднявшись на ноги, дождь капал с его мундира, он крикнул на немецком языке с сильным акцентом: "Давай, закончим этот бой как мужчины!" Он поднял кулаки, приняв боксерскую стойку, и его голос эхом разнесся по пустынной улице.\n\nОтто Бредо наблюдал, как русский поднимается, и слабая, почти незаметная улыбка тронула его губы. Он держал в руке пистолет, заряженный одной пулей, которую специально приберег на конец. Когда Александр замахнулся, как ему казалось, для самого почетного удара в своей жизни, Отто спокойно поднял руку.\n\n Выстрел прозвучал неестественно резко под дождем. Александр упал, на его лице застыло выражение мужества, которое он надеялся продемонстрировать.\n\nДождь полил сильнее, смывая с земли багряные пятна."
 germany.264.a: "Дождь становился все сильнее."
 germany.265.t: "Как Бельмо на Глазу"
 germany.265.d: ""Простите, офицер?" спросила пожилая женщина, подходя к Лукасу Мюллеру.\n\nЛукас на самом деле не был офицером полиции. Он был человеком, которого в последнюю секунду наняли организаторы фестиваля, чтобы обеспечить хоть какое-то подобие безопасности. Ему выдали дубинку, перцовый баллончик и одну пару наручников. Даже электрошокера не было. Однако он не собирался спорить с пожилой женщиной о своей профессии за неделю до Рождества.\n\n"Да, чем могу быть полезен?" спросил он у женщины.\n\n"Вон у того грузовика бродит странный человек." Женщина ответила, жестом указывая на дальний конец фестиваля.\n\nНезнакомый мужчина "бродит?" Да, это точно стоило его времени. Может быть, по дороге он поймает кого-нибудь, кто мусорит, да еще и перебегает дорогу! С другой стороны, проверить этого бездельника будет куда интереснее, чем стоять на холоде.\n\n"Оставьте это мне, наслаждайтесь фестивалем."\n\nПодойдя к грузовику, на который указывала женщина, Лукас понял, что ее опасения небезосновательны. Бездельник оказался взволнованным мужчиной арабского происхождения, вероятно, около тридцати лет. Он стоял прямо перед дверью грузовика и осматривал толпу. Может, он собирался угнать грузовик или что-то в этом роде?\n\n"Эй, это ваш грузовик?" обратился Лукас к все более подозрительному мужчине.\n\nГлаза мужчины выпучились, и он, вероятно, приняв Лукаса за офицера, бросился бежать по улице. Лукас тут же бросился за ним, полностью уверенный в том, что этот человек - преступник. Однако ему никак не удавалось перекрыть преимущество араба над ним, и вскоре Лукас сдался.\n\nОн решил, что проще будет набрать номер полиции, и пусть они разбираются с этим."
 germany.265.a: "Разбираться с этим - выше моих сил"
 germany.266.t: "Прилежный Коллекционер
 germany.266.d: "Стук в раму старой деревянной двери раздался сразу после наступления сумерек. Фрау Кляйн, пожилая вдова, засуетилась, чтобы ответить. Перед ней стоял мужчина в костюме с отработанной улыбкой.\n\n"Фрау Кляйн, - начал он, - я представляю историческое общество, заинтересованное в сохранении реликвий ГДР. Как я понимаю, у вас могут быть такие предметы в собственности."\n\nЕе взгляд метнулся к его сумке, затем к блеску его начищенных ботинок. Она ничего не сказала и пригласила его войти внутрь. Из сундука под окном фрау Кляйн достала свои сокровища: выцветшее знамя Свободной немецкой молодежи, рабочую медаль и потрескавшийся портрет Хонеккера. Глаза мужчины сверкнули, когда он наклонился, пальцы дернулись, словно желая взять артефакты.\n\n"Это замечательные вещи," - сказал он, его тон был слегка хищным. "Живая история. Моя организация с радостью выплатит вам за них солидную компенсацию."\n\nФрау Кляйн долго смотрела на него, ее изрезанное лицо было нечитаемым. "Эти предметы," - мягко сказала она, "не продаются. Они принадлежат народу, непоколебимому и реорганизованному правительству партии, а не капиталистическим коллекционерам или спекулянтам.""
 germany.266.a: "Воспоминания никогда не меняются."
 germany.267.t: "Тонкая Серая Нить"
 germany.267.d: "Офицер Вебер постукивал рапортом о край стола, и выражение его лица напоминало зиму за морозными окнами. "Еще один," - пробормотал он, протягивая рапорт офицеру Мюллеру. "Какие-то дети загнали муфтия в угол в U-Bahn. Избили его до полусмерти. Оставив его с табличкой на шее с надписью 'Враг народа.'"\n\nМюллер взглянул на отчет, слегка приподняв бровь. "Звучит знакомо," - сказал он с тонкой улыбкой. "Думаю, Штази гордилась бы этим"\n\nВебер сжал челюсть. "Не надо романтизировать. Это политизированные головорезы, а не революционеры"\n\n Мюллер откинулся на спинку стула, и скрип его кресла заполнил тишину. "И что предложишь Погнаться за ними? Думаешь, кто-то в Берлине скажет нам спасибо за то, что мы помешали детям ломать кости фашистам или корпоративным истуканам?"\n\nОфицер Вебер медленно выдохнул. "Ты забываешь, как все это происходит," - сказал он, понизив голос. "Сегодня это корпоративные паразиты, завтра - кто-то вроде нас. Помнишь, что тогда называли 'самокритикой'? Как ты думаешь, как они назовут это, когда придут за нами?"\n\nУхмылка Мюллера чуть дрогнула, прежде чем он встал и взял пальто. "Может, они вычищают гниль. Может быть, только этого и не хватало этой стране.""
 germany.267.a: "Гниль не останавливается, она пожирает."
 germany.268.t: "Бранденбургские Ворота"
 germany.268.d: "Карл откинулся на спинку стула, и его экран засветился, когда он связался со своим другом по Discord. "Это нечто большее, Дмитрий. Берлин снова чувствует себя живым. Рабочие поют на улицах, формируются советы, как будто мы наконец-то вспомнили, кто мы такие."\n\nДмитрий тихонько захихикал. "Возрождение, да. Это напоминает мне истории, которые мой дед рассказывал об Октябре. Но..." Его голос дрогнул.\n\n"Но что?" Карл надавил, хотя уже почувствовал изменение тона.\n\nДмитрий колебался. "Это всё в речах. Под гордостью скрывается гнев. На Запад, да, но и на нас. На Россию."\n\nКарл заговорил, внутренне ежась. "Но мы строим что-то новое, Дмитрий. Мы должны похоронить прошлое, а не раскапывать его снова."\n\nДмитрий вздохнул. "Гнев так просто не утихает, товарищ. Особенно в вашей стране. История... она восстает вновь, как зомби."\n\nКарл сделал паузу, глядя на мелькающие красные знамена за окном. "Если это перерастет в войну, все, что мы построили, сгорит."\n\n"Возможно," - ответил Дмитрий. "Но прошлое никогда не остается похороненным, Карл. Ни здесь. Не в России. И уж точно не в Германии.""
 germany.268.a: "Мертвые никогда не дают покоя."
 germany.269.t: "Старые Реликвии, Новые Люди"
 germany.269.d: "Поляна зашумела от восторга, когда солдаты наткнулись на возвышающуюся фигуру, наполовину скрытую заросшими сорняками и самим временем. Даже в обветренном состоянии она была безошибочно узнаваема. Это был Ленин, с протянутой рукой, застывший на середине пути, словно взывающий к десятилетиям.\n\n"Посмотрите на это!" - крикнул один из солдат, уже счищая иней с пьедестала. Его перчатки оставляли под грязью пятна чистого камня. "Это он, не так ли? Это товарищ Ленин!"\n\nОстальные бросились ближе, их сапоги хрустели по мерзлой земле. Молодой рядовой провел рукой по основанию, его пальцы обводили выцветшие кириллические буквы со смесью любопытства и гордости. "Представьте себе... Союз когда-то построил это", - прошептал он почти по-детски.\n\nСолдат забрался наверх, шатко балансируя, чтобы набросить на плечи Ленина запасную куртку. "Нельзя, чтобы он здесь замерз," - пошутил он под одобрительные возгласы.\n\nОдин солдат прислонился спиной к постаменту и ухмыльнулся, глядя вверх. "Как вы думаете, они бы гордились нами?" - спросил он, указывая на статую наверху. "Да, гордился бы. Но он бы не гордился своими соотечественниками.""
 germany.269.a: "Головокружительное чувство дома."
 germany.270.t: "Песнь Льда и Пламени"
 germany.270.d: "Поле битвы раскинулось на польской равнине в середине зимы. Пантера, облаченная в багровую сталь, рыцарь-революционер, несущий знамя расколотой Европы.\n\nНа фоне обугленного пространства вырисовывался ее противник: Армата, громадное чудовище из железа и тени, белая буква "Z" на ее шкуре, пушка ее первобытного дракона.\n\nПантера пошла вперед, стреляя сначала огненным копьем, пронзающим воздух и поражающим шкуру зверя. Искры вспыхнули в местах соприкосновения панциря с броней, но дракон остался, его броня была опалена, но не сломана. Армата зарычала в ответ, выпустив поток пламени и ярости. Удар пришелся в бок Пантеры, оставив на броне глубокую дымящуюся рану, но танк не дрогнул.\n\nОни кружили друг вокруг друга, рыцарь и чудовище, и покрытая инеем земля дрожала от их ударов. Пантера снова пошла в атаку, ее башня поворачивалась, прицел был наведен для последнего удара. Снаряд ударил, пробив чешуйчатую шкуру Арматы, и разжег внутри зверя инферно. Из его ран повалил дым, раздался гортанный предсмертный звук, и он рухнул на землю, превратившись в груду дымящихся развалин.\n\nПантера не стала праздновать, она повернулась к горизонту, к горьким руинам Варшавы."
 germany.270.a: "В некотором роде это история героев."
 germany.271.t: "Революция Пчел в Подвале"
 germany.271.d: "В подвале заброшенной пивоварни группа студентов университета сидела вокруг облупившегося круглого стола. На нем были разбросаны скомканные листы бумаги, исписанные такими словами, как "отчуждение", "диалектика" и "марксизм". Они только что приняли около 200 микрограммов ЛСД и теперь погружались в психоделический водоворот.\n\n"Послушайте," - сказал Ганс, уставившись в воображаемую точку на потолке, "отчуждение капиталистического общества подобно кирпичам в этом подвале. Они должны были стать частью единого целого, но теперь они отчуждены друг от друга." "Нет, нет, нет", - сказала Лина, тряхнув своими рыжими волосами. "Вы неправильно понимаете. Отчуждение - это не физическое понятие, это... это..." Ее голос сбился на невнятное бормотание.\n\n"Подождите!" Анна вдруг привстала на стуле, чуть не опрокинув пиво на стол. "Я поняла! Вся вселенная - это один гигантский фетишизм товаров! Посмотри на эти свечи - они просто отчужденные формы пчелиного воска, а сам воск - отчужденный пчелиный труд..."\n\n"Но пчелы, пчелы - это идеальное коммунистическое общество. Знаете ли вы, что в улье каждая пчела работает в соответствии со своими потребностями?" сказала Лина, отодвигая в сторону пропитанный пивом экземпляр "Капитала". "Нет, это не так", - воскликнула Анна, возбужденно размахивая руками."Пчелиная королева - это воплощение бюрократического капитализма! Нам нужна революция в улье! Но сначала мы должны понять, как товарный фетишизм влияет на пчел. Видите эти стены? Они дышат, как дышит отчужденный труд..."\n\n"Теперь я, кажется, понимаю", - сказал Ганс, продолжая разговор с Анной. "Капитализм - это как подвал, мы заперты внутри. Но на самом деле мы и есть подвал!"\n\n"Но если мы - подвал, то кто же тогда дом наверху?"\n\nНикто не мог ответить на этот вопрос. Они сидели в тишине, наблюдая, как пятна воды на полу превращаются в подобие Маркса, затем Гегеля." #zeromapping fucking cooked in this one ok -IAVL
 germany.271.a: "И наконец, в танцующую пчелку."
 germany.272.t: "Любовь и Пушкин"
 germany.272.d: "В зале русской поэзии Музея социалистического искусства Катерина Вебер заправила за ухо прядь золотистых волос и устремила взгляд на стенд, посвященный Маяковскому. Ее мать, Марианна, стояла неподалеку у витрины с Пушкиным и изредка поглядывала на дочь.\n\n"Посмотри, мама," - сказала Катерина, указывая на Облако в брюках. "Маяковский располагает буквы, как ступени на лестнице. Читая их, ты словно взбираешься вверх. Разве это не увлекательно?" Марианна, увлеченная рукописями Пушкина в соседнем шкафу, вздохнула: "Я все равно предпочитаю таких поэтов, как Пушкин. Посмотри на 'К морю' - оно льется так плавно, как музыка."\n\n"О, мама, ты всегда так говоришь," сказала Катерина со смехом. "Не все стихи должны течь как музыка. Посмотри сюда - Маяковский разбивает слово *бунт* на части и переставляет их. Вся страница словно оживает. Разве это не прекрасно в своем роде?"  Марианна покачала головой, но на ее губах заиграла улыбка. "Тебе всегда нравились необычные вещи. Помню, когда ты была маленькой, ты выбирала книги сказок только с самыми причудливыми иллюстрациями."\n\n"Ну, это потому, что искусство должно принимать разные формы," ответила Катерина, указывая на другую витрину. "Посмотри, Маяковский был не только поэтом, но и художником. Его плакаты так креативны."\n\n"Я все еще думаю, что 'Евгений Онегин' Пушкина более трогателен," - сказала Марианна. "По крайней мере, мне не нужно скручивать шею в узел, чтобы понять его."  Катерина разразилась хохотом. "Мама, ты начинаешь говорить как бабушка! Но ты знала? Маяковский тоже писал нежные стихи - просто они выражены по-другому."\n\n"Правда?" Марианна с интересом наклонилась к витрине. "Тогда прочти мне несколько строк.""
 germany.272.a: ""Хотите-\nбуду безукоризненно нежный...""
 germany.273.t: "Ja, Kameraden"
 germany.273.d: "Томас Вайгель сидел в третьем ряду парламента и разглядывал свои пальцы - пальцы, которые всего месяц назад были измазаны краской для граффити на улицах. Теперь они были отполированы до гладкости от перелистывания стопок официальных документов. Тремя часами ранее, когда чиновник министерства финансов начал читать четвертый комментарий к новой налоговой политике, он почувствовал, что его веки тяжелеют. Это была не та революция, которую он себе представлял. Еще на баррикадах они обещали все изменить, построить совершенно новый мир. И вот они здесь, безупречно одетые правительственные чиновники, использующие язык прошлого для обсуждения будущего.\n\n"Что касается третьего предложения," - сказал пожилой член парламента в очках с золотой оправой, "мы должны рассмотреть его влияние на существующую систему..." Томасу показалось, что голос доносится с огромного расстояния, как эхо, несущееся по реке времени. Он взглянул на своих бывших соратников. Карл Шмидт, представитель рабочих, руководивший захватом фабрик во время революции, сейчас обсуждал порядок закупки канцелярских товаров. Анна Миллер, некогда пламенный уличный оратор, прилежно изучала 327-й пункт парламентского кодекса.\n\n"Товарищ Вайгель, каково ваше мнение по этому вопросу?" Голос председателя вернул его к реальности. Томас моргнул, уставившись на толстую стопку документов перед собой, перед глазами поплыл плотный бюрократический текст.\n\n"Я предлагаю..." сказал он нерешительно, его голос звучал тревожно и незнакомо, "чтобы мы рассмотрели это дело в соответствии с установленной процедурой."  Как только слова покинули его рот, Томас понял, что только что сказал нечто такое, что могло бы прозвучать в дореволюционную эпоху. В другом конце комнаты пожилые бюрократы одобрительно кивали, в то время как его бывшие товарищи - те, кто когда-то сражался рядом с ним, - оставались погребенными в своих кипах бумаг."
 germany.273.a: "В тот день Томас долго размышлял."
 germany.274.t: "Одна и Та Же Теория"
 germany.274.d: "В зале заседаний ратуши стоял густой дым. Полковник Вернер Шмидт стучал кулаком по старому дубовому столу. "Товарищи, этот город - микрокосм капиталистической эксплуатации. Богатство этих буржуа было создано за счет угнетения рабочих. Захват их собственности - это историческая неизбежность! Это прекрасно согласуется с теорией первобытного накопления Маркса."\n\nНапротив него майор Томас Миллер тоже барабанил пальцами по столу. "Товарищ Шмидт, вы неправильно толкуете марксизм. Цель революции - освободить все человечество, а не увековечить цикл угнетения. Если мы используем насилие против гражданского населения, то чем мы отличаемся от фашистов?"\n\n"Разница заключается в том, что мы представляем историческую справедливость!" - прервал подполковник Клаус Беккер, захлопывая лежащий на столе экземпляр Капитала.  "Но не забывайте," вмешался капитан Ганс Райнхардт, "Маркс также говорил, что целью пролетарской революции является создание общества без угнетения. Наши нынешние действия только отдаляют эту цель."\n\nСнаружи доносились звуки артиллерийской стрельбы, но никто не обращал на них внимания. Вернер бросил на стол документ. "Посмотрите на эти цифры! Буржуазия этого города скопила огромные ресурсы, в то время как рабочие живут в нищете. Захват этих богатств и есть воплощение классовой борьбы!" "Вы используете догматизм, чтобы оправдать варварство", спокойно сказал Томас. "Настоящий марксист должен понимать, что революция - это не месть, а создание новых социальных отношений."\n\n"Ха!" - насмешливо рассмеялся Клаус. "Твоя слабая позиция - отличительная черта ревизионизма. Насилие  неотделима от истории. Мы просто выполняем миссию, возложенную на нас ею.""
 germany.274.a: "Противоположные выводы."
 germany.275.t: "Wir sind des Geyers schwarzer Haufen"
 germany.275.d: "Мы - воины, непреклонные и стойкие. Неважно, как мир смотрит на нас и под каким правлением - королевства, империи или республики - наши традиции остаются неизменными на протяжении веков. Эти традиции, выкованные путем жертв, становятся еще крепче от крови тех, кто пришел до нас. Мы не обесчестим наших предков, чьи жертвы во имя справедливости и правды будут вдохновлять будущие поколения.\n\nСейчас перед нами эпическая борьба нашего времени. Это и наш самый большой страх, и наша мрачная реальность. Когда-то мы верили, что жаждущие завоеваний и разрушений поджигатели войны удовлетворены, что их жажда крови угасла. Возможно, мы думали, что их раны еще не зажили, а когти, сломанные однажды, еще не отрастают. Но мы ошибались. Новая волна насилия грозит прокатиться по всему цивилизованному миру, стремясь уничтожить все ценное, все, что создано теми, кто отстаивает совесть и достоинство.\n\nНе нужно больше произносить речей. Кризис, с которым мы столкнулись, объединяет нас всех. С железной волей мы возьмем в руки мечи, готовые защищаться от хаоса. Мы будем сжигать тьму огнем праведности, пока кризис не будет побежден и самые ценные достижения человечества не будут защищены.\n\nДля немцев и всех европейцев: Марш на восток! Пойте песни войны и маршируйте к последней битве, которая решит нашу судьбу!"
 germany.275.a: "Und wollen mit Tyrannen raufen,\nHei a ho ho!"
 germany.276.t: "Последний Протест"
 germany.276.d: "Три месяца и четыре дня Томас Райнер скитался по улицам. Утром, когда его уволили, он наткнулся на объявление о работе в газете - его собственная фабрика набирала нового главного инженера. В требованиях было указано "соответствующее семейное происхождение" Вскоре после этого его вежливо вызвали в отдел кадров. "Вы понимаете," сказали они, "текущая ситуация требует... кого-то более подходящего." Позже он узнал, что его место занял Отто фон Штайнфельд, сын барона, который не мог отличить гаечный ключ от отвертки.\n\nТомас прогуливался по городской площади, его взгляд был прикован к массивной бронзовой статуе, которую открывали. Это было недавно отлитое подобие кайзера, сурово взирающего на площадь. Рабочие разбирали строительные леса, обнажая позолоченную надпись на основании: Имперская слава Сохранится. В пабе на углу Томас заказал свое последнее пиво. Выйдя на улицу, он заметил грузовик, стоящий на обочине, - ключи все еще были в замке зажигания, пока водитель выгружал груз.\n\nТомас без колебаний забрался в кабину, завел двигатель и развернул грузовик к центру площади. Нажимая на педаль газа, он думал о гордости, которую испытал, впервые переступив порог фабрики. Грузовик с ревом понесся вперед, скорость его увеличивалась. Толпа в панике начала разбегаться. Глаза Томаса не отрывались от сурового бронзового лица. В последние мгновения он уловил солнечный свет, отблескивающий от позолоченных букв на основании статуи. Затем раздался оглушительный грохот.  Статуя опрокинулась, и ее бронзовая форма рухнула на каменную площадь. Томас лежал в искореженной кабине. По мере того как его сознание угасало, он вспоминал ритмичный гул заводских машин..."
 germany.276.a: "Самый красивый звук в мире."
 germany.277.t: "Элитный Офицер"
 germany.277.d: "Лейтенант Максимилиан фон Бернсторф стоял в оперативном отделе штаба и смотрел на карту, испещренную тактическими отметками. Полковник Вернер Краусс внимательно разглядывал молодого офицера, отпрыска древнего дворянского рода, из-за очков. "Лейтенант," начал Краусс голосом, лишенным эмоций, "проанализируйте это для меня. Если враг начнет окружение здесь, - он указал на место на карте, отмеченное красной стрелкой, - как нам следует реагировать?"\n\nМаксимилиан почувствовал, как у него сжалось горло. Он уставился на густую паутину тактических символов. "Мы могли бы... развернуть подразделения по отдельности," заикаясь, произнес он, "чтобы каждая группа действовала независимо."  Брови Краусса слегка приподнялись. "А линии снабжения? Как вы собираетесь снабжать эти подразделения в условиях рассредоточения?"\n\n"Линии снабжения?" Максимилиан повторил этот термин, как будто встретил его впервые. "Может быть... может быть, мы могли бы использовать транспортные самолеты для доставки грузов по воздуху?"  В комнате воцарилась ледяная тишина. Краусс снял очки и принялся методично протирать линзы. "Скажите, лейтенант," медленно произнес он, "знаете ли вы, сколько тонн топлива и боеприпасов потребляет бронетанковая дивизия за один день? Сколько транспортных самолетов вы планируете реквизировать для этой задачи?"  На лбу Максимилиана выступили капельки пота. Он знал, что полковник Краусс видел все насквозь - на его письме о назначении все еще стояла печать его дяди, барона, служившего в министерстве обороны.\n\n"Как интересно," наконец сказал Краусс, в его тоне сквозило презрение. "В вашей оценке указано 'образцовые командные навыки.' Похоже, у барона довольно своеобразное определение 'образцовых.'" Он с треском закрыл папку.  "Скажите, лейтенант, вы думаете, что вражеская артиллерия остановит свой огонь только потому, что увидит ваш фамильный герб?""
 germany.277.a: ""Наверное... может быть.""
 germany.278.t: "Смерть Прусского Орла"
 germany.278.d: "Утренний солнечный свет был необычайно ярким, когда Ганс Вебер полировал имперский шлем с шипами, доставшийся ему от деда. В эпоху господства современных тактических шлемов он упорно хранил эту реликвию славы. Солнечный свет отражался от латунного шипа на шлеме, сверкая, как золотая звезда.\n\nВ пяти километрах от него, на русском артиллерийском наблюдательном пункте, Сергей Иванов привычно осматривал поле боя в бинокль. Внезапно его внимание привлек отблеск света. На краю окопа стоял немецкий солдат и поправлял снаряжение. Шип на его каске блестел в солнечных лучах, как идеальный маркер для прицеливания.\n\n"Интересно," сказал Сергей в рацию. "Похоже, кто-то все еще дорожит временами старого кайзера Вильгельма." Он передал координаты. "Этот сверкающий шпиль - он так и просится, чтобы по нему ударили."\n\nГанс и не подозревал, что стал мишенью. Он стоял и размышлял над словами деда о том, что этот шлем символизирует честь и традиции империи. Когда разорвался первый снаряд, золотой блеск шипа продолжал сверкать в солнечном свете.\n\nКогда пыль рассеялась, в окопе остался лишь искореженный шипованный шлем. Его латунное украшение упрямо указывало в небо."
 germany.278.a: "На шип мягко приземлилась бабочка."
 germany.279.t: "Чистка"
 germany.279.d: "Август был неподвижен, как труп. В воздухе стоял лишь слабый гул мониторов, на которых его коллеги-беспилотники выслеживали свою добычу. Их могли разделять тысячи миль: один рыскал над Кавказом, другой вел разведку под Киевом.  Однако Август должен был первым "поймать" эту смену.\n\nНа мониторе бесцельно сменялось тусклое изображение российской окраины: Хрущовка здесь, детская площадка там, возможно, остатки танка в котловане. Ему было невероятно скучно. Этот город даже не был близок к фронту, он был заброшен после того, как реактивные бомбардировщики быстро расправились с основной частью его промышленности. Задача Августа заключалась лишь в том, чтобы отбирать отставших.\n\nЕдва он бросил взгляд на часы, как один из них появился в поле его зрения.\n\nПодвинув дрон поближе, он заметил, что их стало больше, и все они выползли из заваленного обломками здания. Один из них был одет в форму, Август был уверен. Он с нетерпением пилотировал дрон, надвигаясь на крошечную группу, как весенняя пчела на цветок. Один из них поднял голову, закричал и бросился бежать. Август едва не выругался, но его товарищи лишь растерялись. Когда они опомнились, было уже слишком поздно. Последнее, что увидел Август, было пикселизированное изображение женщины.\n\nАвгуст, включив микрофон, уставился в пустой монитор."
 germany.279.a: "Вражеский субъект ликвидирован в Зоне 8."
 germany.280.t: "План по Востоку"
 germany.280.d: ""Одним словом, искоренение безработицы должно стать целью нашего правительства. Для этого необходимо гарантировать работникам стабильность бизнеса, значительно усложнить уход с одной работы на другую. Так называемая 'гиг-экономика' должна быть искоренена в пользу индустриального труда"\n\nОдин из главных экономистов Рейха продолжал говорить. Большинство уже давно выслушали его, с нетерпением ожидая своей очереди выступить.\n"Спасибо, герр Мюллер, это было очень познавательно. Герр Франк!"\nНебольшой, очкастый (это было не редкостью среди этой толпы, но его линзы были особенно крупными) человек поднялся на подиум. Позади него на проекторе появилась карта Восточной Европы. На ней были отмечены места расположения различных шахт, мельниц, дифференцированных сельскохозяйственных регионов и важных промышленных городов.\n\n"Европа сейчас более изолирована, чем это было на протяжении веков. Импорт из Африки, Азии, не говоря уже об Америке, сократился на 200, 300, даже 400%. С тех пор как начался конфликт в Америке, нам пришлось в одночасье возрождать свои промышленные отрасли, а также налаживать те немногие торговые связи, которые мы могли наладить. Не нужно даже говорить о том, насколько шатко наше положение."\n\n"Очевидно, что нам нужен более легкий доступ к нефти, драгоценным металлам и сельскохозяйственной продукции. Единственный способ надежно получить такие товары - это восточная экспансия. Советский Союз, как вы видите, полон именно тем, что нам нужно. Мы просто должны захватить и контролировать эти места. Какие бы независимые государства мы ни создали, их экономика должна быть под нашим контролем. Мы не должны повредить эти сектора, и нам необходимо сохранить советские централизованные сети. Приватизация этих объектов должна быть медленной и проводиться таким образом, чтобы не возникло хаоса или административного дублирования.""
 germany.280.a: "И это продолжалось и продолжалось..."
 germany.281.t: ""Москва горит, а народ ликует!""
 germany.281.d: "...крикнула пожилая женщина под громкие аплодисменты.\n\n"Ещё за миллион!"\nПьяный мужчина кричал, подняв над головой только что наполненный бокал пива. Его друзья, собравшиеся вокруг него, ликовали не меньше. Толпа становилась все больше, и все больше людей приходили в бар, чтобы посмотреть телевизор. К этому часу в новостях бесконечно повторяли кадры грибовидного облака, поднявшегося над Москвой. Ведущие шутили и подшучивали, пока на экране медленно мелькали фотографии российских государственных деятелей, которым, как считалось, не удалось спастись от взрыва.\n\n"Красная площадь сегодня оправдала свое название!"\n"Ходят слухи, что шпили Кремля воткнулись в землю где-то в Украине!"\n\nБесплатно раздавались марочные вина и другие спиртные напитки. Портрет [GER.GetLeader] был дополнен портретами Бисмарка и Гитлера, и их изображения салютовали в бурный унисон. Из казарм слышалась далекая праздничная стрельба, и некоторые уже заявляли о своих планах посетить фейерверк в ближайшем парке. На улице какие-то хулиганы жгли советский флаг, пламя подпитывалось керосином и плохими напитками. Все присутствующие поднимали тосты за скорую победу.\n\nПо всему городу владельцы магазинов лихорадочно белили витрины, рисуя карикатурные изображения руин советской столицы и устанавливали 'ядерные скидки.' Школьная администрация печатала праздничные объявления об исключении. Многие молодые люди, которые раньше избегали этого как чумы, стыдливо явились в призывные пункты."
 germany.281.a: "Ночь, которую все будут вспоминать с удовольствием."
 germany.282.t: "Интервью с Франком Францем"
 germany.282.d: ""Но это неправда, дереву не свойственна пористость."\n\nРепортерша, чопорная дама лет пятидесяти, не уступала и реагировала на объяснения Франца без видимого раздражения, лишь тонкой скукой, скрывающей глубокое отвращение.\n\n"Они были хлипкими, мадам, их едва можно было назвать дверьми, не говоря уже о барьерах, достаточных для накопления ядовитых газов. В любом случае, это не имеет значения, я говорю о том, что мы не планируем строить подобные центры дезинсекции..."\n"Вы не считаете политические 'лагеря' такими центрами?"\n\n "Нет, мадам. Это тюрьмы. Мы не стремимся произвольно ликвидировать большую часть нашего населения, это не было целью наших предков, и не является нашей целью. Вместо этого мы будем поощрять инициативы по реэмиграции, а также простые, э-э, проверки политической лояльности, чтобы обеспечить приличия в отношении наших негерманских..."\nФранц с трудом подбирал подходящее слово. Глаза женщины загорелись, и она набросилась на него.\n\n"Что значит негерманских?"\n"Это... ну, это сложно. Неевропейцы всех мастей, будь то арабы или индусы, несомненно, никогда не смогут ассимилироваться. Это уже доказано. Но есть и некоторые элементы сионистской подгруппы, которые также не желают выражать искренние патриотические взгляды"\nНа мгновение она замолчала. Франц ухмыльнулся и продолжил."
 germany.282.a: ""А теперь перейдем к теме большевизма...""
 germany.283.t: "Клятва Гиппократа"
 germany.283.d: "Доктор Карл Шмидт сидел в своей роскошно обставленной клинике, и солнечный свет отражался от его очков в золотой оправе сквозь тонированные стекла. Он представлял семье Рейнхардт тщательно подготовленный финансовый отчет. "Согласно нашей последней модели экономической эффективности," сказал он, доставая таблицу с данными, "ежегодные расходы на лечение тяжелой депрессии составляют в среднем 86 400 евро. С другой стороны, наша услуга 'Гуманное избавление от депрессии' стоит всего 12 999 евро, да еще и с праздничной скидкой в 15%."\n\n"Но она моя жена," пробормотал Рейнхардт. Сидя в своем инвалидном кресле, Мария безучастно смотрела на неоновую вывеску, мигающую за окном: "Свобода выбора, достоинство жизни"\n\n"Именно с точки зрения семейной ответственности," сказал доктор Шмидт, поправляя очки, "мы должны принимать рациональные решения. Подумайте вот о чем: эти медицинские расходы можно было бы перераспределить в фонд образования вашей дочери или вложить в высокодоходный пенсионный план. Разве на этом либерализованном рынке продление страданий не является пустой тратой ресурсов?"\n\nОн открыл позолоченную брошюру. "Мы предлагаем три пакета услуг. Базовый план включает стандартный уход в конце жизни. Бизнес-план добавляет отдельные комнаты и психологическое консультирование. Платиновый план предлагает VIP-обслуживание и роскошную церемонию похорон. Мы также принимаем оплату в рассрочку, годовая процентная ставка составляет всего 4,99%. Предоставление каждому человеку возможности свободно выбирать конец своей жизни - разве это не воплощение гуманизма?""
 germany.283.a: "Если я буду верно соблюдать эту клятву, пусть я буду наслаждаться жизнью и заниматься своим искусством..."
 germany.284.t: "На Восточном Фронте Без Перемен"
 germany.284.d: "Юрген Шнайдер и его товарищи отбросили в сторону винтовки с логотипом их частного военного подрядчика. На их мундирах еще виднелись пятна вчерашних платежных ведомостей с вычетами за "неэффективность в ходе боевых действий." "Мы сдаемся," крикнул Юрген по-русски, высунувшись из окопа. "Мы больше не будем воевать за этих ублюдков, вычитающих нам зарплату." На другом конце поля русский лейтенант Артем Алексеевич Черный опустил винтовку и приказал своим людям не стрелять. Он видел облегчение на лицах европейских солдат.\n\nКогда Юрген повел свой отряд к русским линиям, небо оставалось чистым. Обе группы стояли на изрытой снарядами земле, неловко пытаясь общаться с помощью жестов или приложений-переводчиков на своих телефонах. Один из русских солдат предложил пачку сигарет. Юрген протянул руку, чтобы взять одну, но странный жужжащий звук прервал этот момент.\n\n"Дрон!" - крикнул кто-то. Но когда они подняли глаза, было уже слишком поздно. Боевым машинам, управляемым ИИ, не было дела до жестов сдачи или совместного курения. Они лишь выполняли команды, закодированные в их системах.\n\nНа следующий день в боевом донесении была всего одна строчка: "Взвод противника нейтрализован в результате точного удара." В нем не упоминалось ни об оставленных на поле боя платежных квитанциях, ни о сигаретах, которые так и не перешли из рук в руки."
 germany.284.a: "Кого это волнует?"
 germany.285.t: "Оценка Социального Обеспечения"
 germany.285.d: "ЕВРОПЕЙСКАЯ СЛУЖБА ВНУТРЕННЕЙ БЕЗОПАСНОСТИ\nЕЖЕГОДНЫЙ ОЦЕНКА СОЦИАЛЬНОЙ СТАБИЛЬНОСТИ\nУровень классификации: 5\nССЫЛКА: SSA/Q3\nСУБЪЕКТ: Растущая озабоченность по поводу сплоченности общества.\n\nСВОДКА: Несмотря на планы, намеченные советом, проект по увеличению сплоченности общества и повышению уровня счастья европейских граждан в основном провалился после недавнего расследования, проведенного внутренним комитетом I.S.S. E, которое показало, что показатели стабильности общества достигли самого низкого уровня со времен до объединения.\n\nИНЦИДЕНТ 8193-B: Субъект Доминик Жаннин (23 года, мужчина) проявил сильные симптомы зоохондроза, в результате чего он въехал на грузовике на улицу Муфетар, что привело к гибели 19 гражданских лиц. Протесты против предполагаемого отсутствия безопасности для европейских граждан достигли тысяч человек по всему региону Франции.\n\nПротесты против предполагаемого влияния корпораций на правительство выросли на 60% после недавнего коррупционного скандала с Shell. В Берлине были замечены плакаты с надписью "СМЕРТЬ КОРПОРАТАМ." Протесты вызвали сильное беспокойство у представителей корпораций, таких как представитель Siemens, требующих более решительных действий против граждан.\n\nВ заключение I.S.S.E настоятельно рекомендует более решительные действия против граждан. Среди предложений комитета - усиление наблюдения в городах, более тщательная проверка фактов в антисоветских материалах и усиление мер по борьбе с толпой."
 germany.285.a: "Он был быстро убран в архив."
 germany.286.t: "Дача"
 germany.286.d: "Человек бормотал себе под нос, сидя на даче, хотя снаружи она была тусклой, и все, что он делал, - это с блеском смотрел на улицу в направлении заката, где, как он обнаружил, не было его друзей. \n\nОн находил их танцующими снаружи, вонзающими сапоги в землю, он находил их внутри, заглядывающими в ниши на стене с ярко нарисованными фигурами святых и маленьким изображением короля.\n\nПри первом разговоре с человеком его вкрадчивая улыбка, льняные волосы и голубые глаза заставили бы кого-нибудь из отряда сказать: "Wir sind nicht länger eure Freunde. Wir sind eure Befreier.". Тот не понял.\n\nПламя охватило дом, а солдаты продолжали танцевать, спасаясь от какого-то большого пожара на краю Европы. Они одни двигались сквозь огромную инертность, они одни были живыми и искали другие живые вещи, чтобы пожрать их и продолжать жить."
 germany.286.a: "Мы вернулись."
 germany.287.t: "Отчёт из Польши"
 germany.287.d: "ЕВРОПЕЙСКАЯ СЛУЖБА ВНУТРЕННЕЙ БЕЗОПАСНОСТИ\nЕЖЕГОДНЫЙ ОЦЕНКА СОЦИАЛЬНОЙ СТАБИЛЬНОСТИ\nУровень классификации: 5\nССЫЛКА: SSA/Q3\nСУБЪЕКТ: Внезапная вспышка социальной нестабильности в Польше.\n\nСВОДКА: Недавнее вторжение в Польшу и демонтаж польских национальных институтов и компаний, а также их последующая замена европейскими корпорациями были проведены быстро, но крайне нескоординированно и неосторожно. Наши перегруженные силы безопасности не смогли взять ситуацию под контроль в большинстве районов, в результате чего в них образовался "вакуум власти", что привело к резкому росту преступности. Утверждается, что местные корпорации используют это для жестокой и незаконной борьбы со своими конкурентами.\n\nОдна из самых распространенных историй, хотя и неподтвержденных нашими агентами, заключается в том, что некоторые из них нанимают наемников с кибернетическими имплантами для устранения своих конкурентов. Некоторые из наиболее заметных улик и случаев промышленного саботажа и убийств приводят к сереброволосой женщине 20-25 лет, ведется расследование. \n\nВ заключение, I.S.S.E, а также другим силам безопасности требуется немедленное подкрепление, чтобы справиться с ситуацией, включая тяжелую броню и самолеты, для обеспечения безопасности стратегически важных объектов. Выход ситуации в Польше из-под контроля может привести к кризису в отношениях с приграничными силами ОДКБ и даже к полной потере нашего контроля над Западной Польшей."
 germany.287.a: "Ну и Перипетия."
 germany.288.t: "Хорст Малер Высказывается"
 germany.288.d: ""
 germany.288.a: "Что за чудак..."
 germany.289.t: "Национал-Коммунисты Захватывают Власть!"
 germany.289.d: "Первый съезд Фолькскамеры с Национальным фронтом оказался совсем не таким, как все ожидали.\n\nТо, что реформированная СЕПГ считала контролируемыми выборами для избрания полностью послушной «оппозиции», превратилось в полное ниспровержение существующего порядка вещей. Различными традиционными и нетрадиционными способами сторонникам и приверженцам националистических идей удалось пробиться в конгресс, почти обеспечив себе большинство.\n\nКогда был созван чрезвычайный конгресс в попытке отменить эти результаты, депутаты, прибывшие к воротам Рейхстага, обнаружили, что он блокирован военными подразделениями. Бронетехника заполнила улицы в поисках всех, кто мог бы выступить против новой власти. Правые и левые военизированные формирования вместе патрулировали улицы, обеспечивая порядок.\n\nВ то же время по прямой трансляции показывали, как новая, теперь уже гораздо более националистическая Фолькскамера собралась, чтобы избрать нового канцлера, в соответствии с конституцией. Присутствовали и некоторые военные лидеры, как бы желая убедиться, что результат их удовлетворит.\n\nПодавляющее большинство проголосовало за видного сторонника Кверфронта и идей чучхе Михаэля Кота, который сейчас произносил речь. Много говорилось о реорганизации немецкого государства, чтобы оно представляло интересы немецкой нации, об укреплении контроля над ситуацией в Европе и о возрождении немецкой гордости, но больше всего немцам понравилась одна фраза:\n\n «Революции нужны оба ее фланга, чтобы быть надежной, обе ее ноги, чтобы идти в будущее!»"
 germany.289.a: "Революции нужна сила."
 germany.290.t: "Судьба Крайне Правых"
 germany.290.d: "Современная история Германии показала, что конфликты и происшествия прошлого должны быть отброшены, чтобы достичь целей Германии как нации и окончательно разрушить антигерманский мировой порядок.\n\nМногие правые партии могут наконец поднять голову после десятилетий несправедливого преследования со стороны федерального правительства. Наконец-то соратникам-патриотам можно позволить внести свой законный вклад в становление Германии великой.\n\nНо мы должны правильно распорядиться их возвращением, чтобы получить максимальную выгоду от их поддержки.\n\nМы можем либо направить их на интеграцию с существующими левыми партиями, либо позволить им присоединиться к Фолькскамере, сохранив при этом свои собственные организации. Последний вариант, конечно, понравится им больше, но он может стоить нам слишком много власти.\n\nЧто же нам делать?"
 germany.290.a: "Мы хотим, чтобы их члены входили в уже существующие партии, чтобы не было больше никакого раскола!"
 germany.290.b: "Официально принять их партии в наш Конгресс, добро пожаловать!"
 germany.290.c: "Предложите им собственную платформу в рамках БСНС!"
 germany.291.t: "Хаос на Партийном Съезде!"
 germany.291.d: "В результате неожиданного поворота событий партийный съезд в Рейхстаге сегодня не смог выработать единую резолюцию, утонув в идеологических распрях.\n\n В последовавшем за этим хаосе правящий кабинет, по сути, распался. В течение нескольких часов Михаэль Кот объявил о своей отставке, и в Фолькскамере будет проведено голосование по выбору нового главы государства.\n\nПравое крыло сумело воспользоваться этим, чтобы провести своего кандидата на пост лидера - бывшего основателя RAF, ставшего неонацистом, который, тем не менее, воспринял некоторые из последних национал-коммунистических идей и получил поддержку и признание в политических кругах - Хорста Малера. \n\nЭто знаменует собой крайний поворот вправо для политики Германии, поскольку коммунистическая революция победила на подъеме антифашистских и антикапиталистических настроений после унизительного поражения в европейской войне.\n\nНекоторые предполагают, что хаотичный съезд был организован правыми в Фолькскамере, некоторые даже обвиняют их в контрреволюции и заговоре с целью восстановления корпоративизма. Тем не менее, им удалось укрепить власть, и никто не хочет сильно раскачивать лодку в молодом красно-коричневом государстве."
 germany.291.a: "Что ж... еще один поворот."
 germany.292.t: "Новый Курс к Германской Самодостаточности"
 germany.292.d: "Сотни партийных делегатов, прибывших сегодня к Рейхстагу, стояли на ровных дистанциях и хлопали в унисон, словно под управлением невидимого дирижера. Их окружали строгие цветовые решения, четкие и упорядоченные формы и цвета, плакаты с новыми лозунгами партии, а также старая советская и восточногерманская символика.\n\nМихаил Кот проходил по коридору, за ним следовала верхушка Политбюро, охраняемая неподвижными солдатами, с винтовками наготове и неподвижными штыками. По мере того как он приближался к трибуне, усиливалось звучание военного оркестра, и, казалось, так же усиливались хлопки делегатов. Наконец он занял долгожданную позицию, аплодисменты и музыка одновременно прекратились.\n\n "Товарищи! Граждане Германии! Братья и сестры Народной армии! Слишком долго наша нация была погружена под руины загнивающей системы капитализма. Сегодня этому положен конец! Новые принципы партийной программы, с которыми я сегодня выступаю перед вами, призваны обеспечить безопасное и славное будущее германского социализма и наших будущих поколений. Мы защитим наших детей и нашу культуру от пагубного влияния глобалистского либерализма! Мы защитим наши границы и принесем безопасность в каждый отдельный дом. Мы должны полностью посвятить свою жизнь и свой труд победе над угрозами, окружающими нашу страну со всех сторон!"\n\nСолдаты маршировали так точно, как будто это был один человек, продублированный тысячи раз, за ними шли танки и ракетные установки. По Берлину прошли праздничные парады с портретами Маркса, Ленина, Ким Ир Сена и Кота, на каждой улице звучала классическая музыка и музыка эпохи социализма, а рабочие на заводах выполняли десятки квот за смену. Отныне все в Германии работало как часовой механизм."
 germany.292.a: "Да здравствует великая победа!"
 germany.293.t: "Формирование Правительства Кверфронта"
 germany.293.d: "Сегодняшний день стал славным для Германии. Новый революционный конгресс собрался сегодня, чтобы окончательно преодолеть десятилетний разрыв между левыми и правыми, который был источником стольких проблем в политической сфере Германии.\n\nПредставители чучхеистов, марксистов-ленинцев, троцкистов, штрассеристов, националистов и многих других различных движений и партий пришли к соглашению, что сейчас в мире есть более серьезные враги, чем они сами, и необходимо устранить разногласия, чтобы Германия пережила их всех. \n\nТакже есть много других общих интересов, которые могут быть достигнуты при сотрудничестве: культурное возрождение, улучшение условий жизни, образование и социальная сплоченность - так много вещей, которые ни левые, ни правые никогда не смогут сделать в одиночку.\n\nСегодня черно-бело-красные, черно-красно-желтые и просто красные знамена были подняты вместе. Впервые за долгие годы Германия была по-настоящему едина. Ее больше не разделяли ни Восток и Запад, ни левые и правые, ни кто-либо другой. А если и оставались какие-то разногласия, то они лишь усиливали плюрализм, давая больше лучшего из всех миров.\n\nИ это та Германия, которая действительно может искупить свою вину и добиться величайших побед."
 germany.293.a: "Коричневые и красные работают вместе."
 germany.294.t: "Национал-коммунизм на Подъеме"
 germany.294.d: "В отличие от 1920-х годов, когда для борьбы с коммунистической партией были созданы Фрайкорпы и Штурмабтейлунги, Революция столкнулась с удивительно малым количеством реакционного сопротивления, и на это есть причина, которая может быть как хорошей, так и тревожной. \n\nПосле десятилетий безуспешных попыток различных групп, идеи национал-коммунизма начали распространяться, особенно популярны среди бывших и нынешних военных, что, по-видимому, подпитывается желанием отомстить националистической России, а также горьким чувством того, что немецкая нация была оставлена своим правительством. \n\nНаши источники также сообщают, что члены ультраправых политических партий, такие как Франк Франц, также предпочли не оказывать открытого сопротивления революции, а пытаться проникнуть в идеи немецкого супрематизма различными ненасильственными способами, создавая национал-коммунистические клубы, проводя конференции и митинги. \n\nС другой стороны, Антикапиталистическая платформа выступает за внедрение элементов северокорейской модели чучхе с немецкими чертами, ссылаясь на уязвимость современного немецкого общества.\n\nЕще рано говорить о том, к чему приведет такое развитие событий, однако, по некоторым данным, в различных эшелонах власти даже есть люди, которые могут поддержать эти идеи."
 germany.294.a: "Хорошо...?"
 germany.295.t: "Формирование Новой Фракции Rote Armee Fraktion"
 germany.295.d: "Призыв к силе среди нашего народа и активная националистическая пропаганда привели к массовому добровольному призыву в армию и созданию множества военизированных организаций, которые участвуют в подготовке нового поколения бойцов и сотрудничают с Национальной народной армией. Одна из них выделяется особой быстротой роста и популярностью, поскольку использует символику Rote Armee Fraktion, организации радикальных антикапиталистических партизан, действовавшей в Западной Германии."
 germany.295.a: "Полезная кучка реконструкторов."
 germany.296.t: "Франко-немецкий Раскол!"
 germany.296.d: "Китайско-советский раскол, событие, определившее направление развития мировых левых идеологий и правительств, похоже, повторился сегодня в виде жаркого франко-германского дипломатического обмена с некоторыми экстрадициями и военными маневрами в рамках того, что кажется первым конфликтом в Европе со времен Второй европейской войны, хотя пока только политическим. \n\nЭто, похоже, кульминация многочисленных разногласий, возникших между французским и немецким правительствами во время конференций Европейского Интернационала по поводу будущего Европы и объединения левых идеологий на всем континенте в единую модель развития. Кроме того, они не смогли определить свои сферы влияния, особенно в отношении пост-российских территорий.\n\nНа данный момент очень неясно, чем закончится эта ситуация, поскольку Европа раскаляется как сковородка, и все больше стран вокруг Франции и Германии вовлекаются в конфликт, некоторые эксперты опасаются, что мирное решение может быть не достигнуто."
 germany.296.a: "Ну вот, опять..."
 germany.297.t: "Германия и Франция вступают в войну!"
 germany.297.d: "Шокирующие новости приходят из Западной Европы: пограничные столкновения между немецкими и французскими частями на Рейне переросли в полномасштабную войну, и любое подобие единой социалистической Европы сгорает в мгновение ока.\n\nЕвропа теперь разделена между антиревизионистским альянсом во главе с Францией, чтобы свергнуть радикальное левое правительство Германии, которое сильно отклонилось от других стран. Теперь каждая система будет подвергнута окончательному испытанию, чтобы решить, какой коммунизм истинный и более эффективный, а кто будет вычеркнут и оставлен в списке запрещенной литературы.\n\nПожар революции теперь пожирает своих собственных детей. Будущее светло, но не все доживут до него."
 germany.297.a: "В последний раз?"
 germany.298.t: "Разочарование в Die Linke"
 germany.298.d: "Сокрушительное поражение в европейской войне оставило немецкий политический ландшафт весьма разрушенным. Обычно центристские партии теряют свою легитимность в глазах народа, однако на этот раз именно Die Linke подвергается пристальному наблюдению.\n\nПомимо ожидаемых скачков в крайне правую сторону, левые элементы в Германии заняли более нишевую позицию и углубились в подпольную культуру немецкой молодежи. Существует слишком много названий для отколовшихся идеологий, которые появились из недовольных членов Die Linke, но, похоже, они приняли более кислотную форму.\n\nВдохновляясь работами Марка Фишера и Хана Бён-Чхоля, эта новая волна переосмысленного левизма распространилась далеко и широко среди левой молодежной культуры, где неудачи "красного либерализма" и "постоянно меняющейся маски капитала" подвергаются жесткой критике.\n\nПока кажется, что это останется небольшим аспектом повседневной немецкой жизни, но уже сейчас высокопоставленные члены Die Linke были замечены присутствующими на культурных мероприятиях и встречах этих небольших групп, и только будущее может сказать, к чему это может привести."
 germany.298.a: "Абстрактный паразит был разоблачен. "
 germany.299.t: "Формирование Коалиции за Возвращение Будущего"
 germany.299.d: "По мере приближения недавно объявленных выборов появляется все больше новых левых движений, которые пытаются заручиться поддержкой и получить представительство в правительстве.\n\nВ частности, одна партия сумела привлечь аномальное количество сторонников, завоевав массы интересной и подробной программой, уникальными обещаниями и, что самое главное, множеством новых и молодых лиц, которые обещают изменить не только Германию, но и весь мир вместе с ней. \n\nКоалиция за восстановление будущего с Бьюнг-Чул Ханом, философом-деконструкционистом южнокорейского происхождения в качестве фронтмена, которого некоторые эксперты называют одним из главных представителей левого акселерационизма в мире на данный момент. \n\nВ своих лозунгах они делают упор на усталость немецкого народа от типичной левой политики, а также на социальный аспект, обещая реформировать страну, чтобы предотвратить выгорание общества и освободить место для технологических и культурных прорывов, которые заложат основу посткапиталистического будущего.\n\nПохоже, что партия, обещающая устранить капитализм как понятие, набирает большие обороты в опросах и будет бороться за право победить и сформировать правительство после выборов."
 germany.299.a: "Какое необычное движение..."
 germany.300.t: "Жижек Входит в Правительство"
 germany.300.d: "Мы не говорим об объективных, фактических свойствах товара, мы говорим здесь только об иллюзорном излишке.\n\nКиндер-сюрприз яйцо. Удивительный товар. Удивительный... Киндер-сюрприза... в том, что этот избыточный объект, причина вашего желания находится здесь, материализованный в облике предмета - пластиковой игрушки, которая заполняет внутреннюю пустоту шоколадного яйца. Весь тонкий баланс находится между этими двумя измерениями: тем, что вы купили, шоколадным яйцом, и излишком - возможно, сделанным в каком-нибудь китайском ГУЛАГе или еще где, - излишком, который вы получаете бесплатно.\n\n Я не думаю, что шоколадная рамка здесь только для того, чтобы отправить вас в более глубокое путешествие к внутреннему сокровищу, к тому. ...к тому, что Платон называет Агальмой, которая делает вас... достойным человеком... которая делает товар... желанным товаром - я думаю, все наоборот.\n\nМы должны стремиться к высшей цели, цели в середине объекта, именно для того, чтобы иметь возможность наслаждаться поверхностью. В этом и заключается антиметафизический урок, который трудно принять."
 germany.300.a: "Окей...?"
 germany.301.t: "Название Новой Партии"
 germany.301.d: "Наш приход к власти ставит вопрос об организации нашего способа управления страной, в частности, об организации партии и государства.\n\nСейчас правящей силой остается реформированная СЕПГ, имитация того, что было в бывшей Германской Демократической Республике. Это достойная формация, поэтому можно просто прекратить ее внутреннюю перетряску, чтобы обеспечить ее лояльность.\n\nДругой вариант - обратиться к правому флангу революции, реформировав национал-коммунистический Боевой союз немецких социалистов, где Михаэль Кот добился наибольшего успеха, объединив левых и правых, хотя в целом организация все еще считается крайне правой.\n\nИ наконец, мы можем последовать примеру КНДР и адаптировать их Рабочую партию к немецким стандартам, инициативе Антиимпериалистической платформы. Это может привлечь интернационалистов и больше понравится более радикальной левой части нашего движения.\n\nКакой же вариант мы выберем?"
 germany.301.a: "Давайте сохраним СЕПГ и ограничимся широкомасштабными реформами внутри него."
 germany.301.b: "Мы возродим славу Боевого Союза Немецких Социалистов!"
 germany.301.c: "Давайте реформируем СЕПГ по примеру корейцев в нашу собственную трудовую партию!"
 germany.302.t: "Хвалебная Речь о K-Punk"
 germany.302.d: "Большинству людей понятно, что только великие воины могут провозгласить будущее, что через пламя перемен возникнет новый мир, но иногда, иногда это просто не так.\n\nВ своих произведениях Марк диагностировал состояние нашей эпохи.\nПостепенное ощущение, что «нет альтернативы» неолиберальному порядку, что даже наши мечты колонизированы экономическими силами, которые нам неподвластны. \nНо он не просто описывал это состояние, он боролся с ним.\nВ каждом эссе, лекции и записи в блоге он стремился пробиться сквозь идеологический туман, напомнить нам, что другой мир возможен, даже если его невозможно представить.\n\nИногда нужен кто-то, кто осветит путь в сторону от капитала.\nКапитал - это монстр, которого можно убить, и через нас он будет усмирен.\nМы не должны позволить его прозрениям стать статичной теорией."
 germany.302.a: "Мы все будем помнить Марка Фишера."
 germany.303.t: "Председателю Комиссии:"
 germany.303.d: "В свете последних событий я буду говорить откровенно.\n\nСоюз, которому мы оба с такой гордостью служим, парализован страхом и устаревшей бюрократией. С каждой неделей ваше правительство вынуждено передавать все больше полномочий Административным Комиссиям и Консультативным Советам по вопросам управления под наблюдением Форума. Это не подлежит сомнению: европейский народ ищет лидерства в Давосе, а не в Брюсселе.\n\nВы можете это подтвердить. Последние несколько месяцев привели нас к этому моменту. Ради выживания Союза я прошу вас, во имя европейского народа, оставить свой пост. В ближайшее время вы получите электронное письмо с новым составом Комиссии, согласованным нашими самыми яркими умами. Уверяю вас, история оценит ваш поступок.\n\nИскренне,"
 germany.303.a: "Профессор Клаус Мартин Шваб"
 germany.304.t: "Гюнтер Фелингер в x.com"
 germany.304.d: "£GFX_GER_dont_at_me_ti Gunther Fehlinger\n\nUkraine must be freed and join NATO 2029\nCanada, UK, Iceland, Norway, Albania, Kosovo inEU 2033!\n\nПосты\n\nЗакреплено\nGunther Fehli... £GFX_GER_dont_at_me_ti Gunter... - Апр. 27\nЯ анонсирую свою кандидатуру в £GFX_GER_dont_at_me_ti EU_Commission заменяя £GFX_GER_dont_at_me_ti VoltEuropa £GFX_GER_dont_at_me_ti RealAlexJones £GFX_GER_dont_at_me_ti MedvedevRussiaE £GFX_GER_dont_at_me_ti ProfKlausSchwab £GFX_GER_dont_at_me_ti POTUS\nЯ восстановлю £GFX_GER_dont_at_me_ti NATO и приведу запад к победе!\nи сломлю Россию до #ExRussiaRetweet, делитесь и ставьте лайки ....\nAlt: Фотография Фелингера, стоящего на вершине австрийских Альп в футболке с надписью "Wählt Gunther"\n\nGunther Fehlin... £GFX_GER_dont_at_me_ti Gunter... - 22ч\nКитай, я положу конец твоей агрессии...\nAlt: Изображение Фелингера в шарфе на тайваньскую тематику с сердитым выражением лица\n\nGunther Fehlin... £GFX_GER_dont_at_me_ti Gunter... - 1д"
 germany.304.a: "[SOV.GetLeader] игра окончена..."
 germany.305.t: "Введение"
 germany.305.d: "Здравствуйте, граждане. Это Клаус Шваб, председатель Всемирного экономического форума.\n\nКак вы знаете, мы прошли долгий путь, чтобы оказаться там, где мы находимся сегодня. Мы переживаем исторические моменты, когда человечество преобразится до неузнаваемости - возможность, которую мы не могли упустить - и не упустили.\n\nС давних пор эксперты Всемирного экономического форума работают над этим, и это, мягко говоря, большой успех. Однако это было бы невозможно, конечно, без согласия и активного сотрудничества со стороны жителей Европы.\n\nИ хотя еще не все смирились с этим будущим, можно с уверенностью сказать, что оно неизбежно.\n\nКак председатель Всемирного экономического форума я хотел бы лично поблагодарить всех вас. Повестка на период до 2030 года не только успешно завершена - мы, по сути, опережаем график. Думаю, настало время представить следующий этап плана."
 germany.305.a: "Поэтому слушайте внимательно."
 germany.306.t: "Раскрытие"
 germany.306.d: "Как вы знаете, после кризиса 2008 года стало ясно, что капиталистическая модель свободного рынка изжила себя. Потребительство, демократия, но самое главное - средний класс и модели стали неустойчивыми. Нам нужна была Великая перезагрузка, чтобы обеспечить безопасное, единое будущее для человечества под стабильным и надежным руководством. С тех пор цели были поставлены, а план приведен в движение.\n\nС самого начала нам была ясна картина Повестки. Однако мировые лидеры и простые люди так просто нас не слушали. Нам нужно было событие-катализатор, которое положило бы начало нашим реформам. Пандемия Ковид-19, как вы знаете, оказалась очень полезной и способствовала достижению этих целей - разумеется, это означало, что развитие теперь идет в правильном направлении. 2020 год стал для нас настоящим поворотным пунктом.\n\nИ хотя врачи короля Салмана старались изо всех сил - я знал их лично, - экономический крах после его... прискорбной... смерти был вполне предсказуем. Нам, конечно, нужно было свалить глиняного колосса, чьи национальные интересы все еще мешали нашим реформам, - Америку Трампа. С тех пор Четвертая промышленная революция протекает очень хорошо и стабильно.\n\nРоссийская угроза, к сожалению, сохраняется, и поражение в европейской войне было очень болезненным - однако здесь, на Всемирном экономическом форуме, принято находить положительные стороны в худших ситуациях. И здесь она показала слабость национальных правительств и их несостоятельность, а также позволила нам сконцентрировать нашу мощь. Поэтому нет никаких сомнений в том, что, я думаю, мы разберемся с Востоком..."
 germany.306.a: "...Очень Скоро"
 germany.307.t: "Кульминация"
 germany.307.d: "Однако сейчас внутренние дела важнее. Нам нужна поддержка каждого человека в Европе, если мы хотим выжить. Не может быть никаких 'но', не может быть никаких спадов. Есть только наша глобальная идентичность, и ее враги очень ясны.\n\nСамый главный враг - изнутри. Наше наивное стремление к роскоши, то, как националисты цепляются за свою так называемую "идентичность", за свою мнимую чистоту и телесную автономию, представляют большую опасность для общества в целом. Мы не можем допустить, чтобы эти опасные элементы возобладали.\n\nНаше общее благо превыше всего; потребности немногих бессмысленны в великой схеме вещей, а враги человечества повсюду. Их эгоистичные, животные желания неуемны.\n\nДезинформация, антиэгалитаризм и мелкий трайбализм станут эквивалентом заучивания плохого гриппа, никто никогда не будет оглядываться назад и скучать по этим вещам.\nЧеловечество - это спектр, и при правильной настройке мы сможем пережить бурю."
 germany.307.a: "Вместе."
 germany.308.t: "Часть IV Новые Люди"
 germany.308.d: ""
 germany.308.a: ""
 germany.309.t: "Заключение"
 germany.309.d: "В заключение я хотел бы выразить благодарность нашим благотворителям и передовым мыслителям за вклад в создание новой нормы. Уже сейчас мы добились большого прогресса в обеспечении неусыпного внимания к повседневной жизни, чтобы гарантировать полную безопасность и искоренить дезинформацию.\n\nНе только это, но и медленное и мягкое стирание колониальной концепции национального государства и сопутствующих ей проблематичных культурных норм, благодаря чему мы достигли мира и единства, а также строгой концепции, направленной на полное равенство, и побудили людей принять постчеловеческое будущее, где биологическое и культурное неравенство будет постепенно устранено с помощью технологической интеграции.\n\nУже сейчас я вижу столько улыбок в городах, улыбок, которых не было год назад, на людях, которых не было год назад - замечательный знак нашего прогресса, в который мало кто поверит!\nЯ также хотел бы выразить благодарность отважным белковым волшебникам, обеспечивающим питательную ценность для масс, чтобы искоренить расточительное потребление, которое так долго вредит нашей окружающей среде.\n\nПри всем этом я рад видеть по всей Европе, что наши общие цели достигнуты."
 germany.309.a: "Зрители улыбались, и искусственная радость наполняла их разум"
 germany.310.t: "Улыбка"
 germany.310.d: "Сначала речь шла об "эффективности". Люди начали устанавливать контроллеры настроения - больше никаких срывов по пустякам, никаких внезапных вспышек ярости под давлением. Компании стали работать продуктивнее, семейные ссоры уменьшились, даже уровень самоубийств среди подростков начал снижаться. На пресс-конференции правительственные чиновники с гордостью заявили: "Это монументальный шаг вперед для нашей цивилизации."\n\nНикто не заметил, что улыбки на улицах стали выглядеть одинаково. Не просто одинаковыми - абсолютно одинаковыми. Изгиб губ, прищур глаз, даже расположение морщин выглядели скопированными с шаблона. Один журналист провел эксперимент - он сделал скриншоты десяти людей, которые носили эмоциональные регуляторы и при этом улыбались, и обнаружил, что они идеально совпадают.\n\nПотом люди стали расходиться без видимых причин. Кто-то сидел в трамвае и вдруг начинал улыбаться - склонив голову, совершенно неподвижно. Кто-то может проснуться посреди ночи и встать у окна, глядя на темную улицу, как будто с кем-то встречаясь взглядом. Однажды девушка улыбалась, когда всаживала нож в сердце своей матери. Когда соседи вызвали полицию, она все еще сидела там - вся в крови, смотрела телевизор и ела попкорн. Врачи сказали, что эмоциональные центры в ее мозгу почти отключились. Имплант "переконтролировал" ее, оставив лишь слабые следы восприятия удовольствия.\n\nОна все еще улыбалась. "Я просто чувствовала, что... это было правильно," сказала она в суде, ее выражение лица было спокойным, как маска. Позже исследователи придумали термин для этого состояния: "Синдром зеркальной улыбки" - киберпсихотическое состояние, вызванное нейронными имплантами. Пациенты теряют способность оценивать эмоции, но могут безупречно имитировать "идеальные эмоции", которые ожидают увидеть другие."
 germany.310.a: "..."
 germany.311.t: "Новый Глобальный Порядок"
 germany.311.d: "Когда в Европе окончательно оседает пыль, эта кровавая война, еще одна незабываемая глава европейской истории, подходит к концу.\n\nКлаус Шваб никогда не показывал своих эмоций. За всю свою карьеру он демонстрировал только две эмоции: счастье и пустоту. Сегодня у него было безучастное лицо, морщины на котором стали еще более заметны из-за тусклого освещения проектора, отчего его лицо казалось гораздо более жутким, чем обычно.\n\nДойдя до последнего слайда, Шваб посмотрел на своих коллег. Своих подчиненных. Он ожидал от них какой-то реакции, но никто не мог сказать, какой. Его подчиненные знали, что лучше не говорить слишком много и не аплодировать слишком бурно. Однако слишком слабая реакция, без сомнения, привела бы к его недовольству. Адекватная. Именно это слово они и искали - Адекватная. Ни больше, ни меньше. Все умеренно захлопали в унисон.\n\nКаждый в зале знал. Это был конец старого мира, а новый только восстает из пепла. Наконец-то миром будут править открытые умы и глобалисты, люди, посвятившие свою жизнь развитию мира со свободным и единым рынком. Узколобые идеологии, такие как националисты и регионалисты, будут уничтожены вместе со старым миром.\n\nБольшую часть из 50 с лишним лет Шваб посвятил Всемирному экономическому форуму. При мысли о годах пота и труда, которые он посвятил тому, чтобы предотвратить то, что сейчас, к сожалению, произошло, на его правом глазу непроизвольно образовалась капля слезы. Он не оплакивал старый мир и не оплакивал рождение нового. Он плакал о тебе, обо мне, о себе, о том, что все мы идем по славному пути, который он один создал. Теперь весь мир был его оркестром, сценой, на которой он ждал, чтобы ее поставили. Старый мир лежал в руинах, и изнутри пробивался его свет. Он один был маяком надежды, он был будущим."
 germany.311.a: "Добро пожаловать в новый мир."
 germany.312.t: "Приоритеты в Образования"
 germany.312.d: "Будущее находится в руках молодого поколения, и чтобы направить его на правильный путь, мы должны дать ему правильное образование, которое поможет ему развить желательные моральные качества. Они должны унаследовать правильные ценности, которые мы передадим им.\n\nНаши дети должны усвоить глобальные ценности, интернационалистическое кредо, которого мы все должны придерживаться. Они должны узнать о невидимой руке и принять к сердцу австрийскую школу экономики. Богатство Европы было достигнуто не благодаря какому-либо политическому лидеру или директору, а благодаря рынку, свободному рынку, который позволил ей расцвести самостоятельно. Потребительство - это идеологическая шестеренка, которая поворачивает ход европейского прогресса. Исторически сложилось так, что без спроса не будет инноваций. Без покупателей нет желания совершать революции.\n\nМы также должны правильно объяснить нашим детям, что такое свобода и демократия. Эти слова, эти понятия начинаются с одного и того же тезиса и заканчиваются одним и тем же выводом. Свобода означает свободу выбирать, свободу работать, свободу покупать и продавать. Демократия означает продвижение общества к его высшей форме, где рост не будет ограничен маленькими людьми и диктаторскими умами.\n\nТак пусть же свобода поет, поет в умах молодежи. Пусть демократия растет в народе. Мы будем их воспитывать. Мы приведем их к свету, к просвещению. Мы - современные Вольтеры и Руссо, и под нашими крыльями мы будем нести их в будущее, чтобы обеспечить будущее, чтобы стать будущим."
 germany.312.a: "Нам нужно сосредоточиться на создании профессиональных потребителей."
 germany.312.b: "Давайте преследовать наши высшие цели и превращать их в нечто большее."
 germany.313.t: "Коровы: Корни Глобального Потепления"
 germany.313.d: "Вы любите говядину? Откусывали от сочного стейка кусочек на воскресном барбекю? Уверяю вас, большинство из нас пробовали нежную и завораживающую текстуру коровы, но задумывались ли вы когда-нибудь о том, насколько загрязняет окружающую среду животноводство? Если бы я вам рассказал, вы бы, наверное, уронили челюсть на пол от удивления.\n\nВ среднем, разведение скота вносит около 15% в глобальное загрязнение окружающей среды за счет выделения парниковых газов, таких как метан и закись азота. Современное человечество с более совершенными ценностями и моралью должно быть лучше, чем потакать плоти и крови других живых существ. В прошлом люди, возможно, были вынуждены выживать за счет мяса и костей других организмов в нашей общей биосфере, однако в современном мире существует бесчисленное множество более здоровых и питательных альтернатив.\n\nКак бы мне ни хотелось пропагандировать веганство, я точно знаю, что не все готовы к полному переходу на полностью растительное питание. Именно поэтому я хочу предложить нашим дорогим читателям переходную диету, насыщенную всеми необходимыми питательными веществами и богатую белком. Этот источник питания полностью исключает животных и практически не выделяет парниковых газов. Мой дорогой читатель, я представляю вам новый суперпродукт века - НАСЕКОМЫЕ! Будь то кузнечики, пчелы или муравьи, эти маленькие букашки чрезвычайно богаты белком и полезными жирами. Благодаря этим крошечным существам человечество наконец-то сможет отказаться от больших и раздутых домашних животных, таких как гигантская корова."
 germany.313.a: "Это вполне разумно!"
 germany.314.t: "Тени Прошлого"
 germany.314.d: "Небо над Гамбургом всегда было серым, как старое стекло, которое так и не удалось отмыть. По обеим сторонам улицы выстроились прямые офисные здания, стены которых были задрапированы массивными рекламными щитами, с утра до вечера воспроизводящими бесконечную череду корпоративных рекламных роликов.\n\nМаленькая Мия подняла голову, в ее глазах отразилась растерянность, когда она смотрела на стальные башни, тянущиеся так высоко, что их верхушки исчезали из виду. "Мама," дернула она маму за рукав, "ты говорила, что раньше Гамбург был очень красивым. Но здесь все выглядит чистым и новым. Что же здесь некрасивого?"\n\nМать посмотрела на нее сверху вниз, заколебалась, потом наклонилась и ответила: "В те времена... здесь были маленькие площади, много кафе. Зимой они выставляли в окнах рождественские украшения. А ночью свет был мягким и теплым. Люди ходили медленно, разговаривали неторопливо - не так, как сейчас, спеша мимо, думая только о завтрашней работе, о встречах и сроках."\n\nМия моргнула, наполовину понимая. "Так почему же всё пропало?" Мама взяла ее за руку, когда они проезжали мимо участка, где велось строительство. Земля под ними была влажной и мягкой, а вдалеке слышался лязг металла.\n\n"Потому что эти старые улицы и здания не приносили денег," тихо сказала она, словно боясь, что кто-то может услышать. "Поэтому их снесли, одно за другим, и возвели эти башни. Каждый дюйм того, что ты сейчас видишь, принадлежит какой-нибудь компании".\n\nМия больше ничего не спрашивала. Она просто на мгновение обернулась назад, словно пытаясь уловить теплый свет, о котором говорила ее мать, спрятанный где-то в щелях между сталью и бетоном.\n\nНо ничего не было."
 germany.314.a: "Только пустые лица на рекламных щитах."
 germany.315.t: "Следующий Этап"
 germany.315.d: "Теперь наша система защищена как снаружи, так и изнутри.\n\nНастало время сделать последний шаг, прежде чем мы сможем установить полное господство и распространить его за пределы Европы.\n\nНаши эксперты, чиновники, предприниматели и спичрайтеры, все те, кого ВЭФ взял под свое крыло, снова усердно работают: скоро будет виден результат.\n\nЛогическое завершение истории."
 germany.315.a: "Наши планы будут обнародованы."
 germany.316.t: "ЕС Подписывает Североатлантический Договор"
 germany.316.d: "На торжественной церемонии в брюссельской штаб-квартире Европейского союза Гюнтер Фелингер объявил о подписании Евросоюзом Североатлантического договора и восстановлении недавно распавшегося НАТО. Окруженный высшими дипломатами и генералами Союза, Фелингер объявил о "начале конца европейской трагедии."\n\n"Оплот европейской безопасности, который был так жестоко отнят у нас, наконец-то вернулся," провозгласил он, обращаясь к журналистам со ступеней здания в Берлимоне. "Послевоенная неопределенность и дрейф в бессмысленность закончились. Теперь у нас одна миссия: Остановить российскую агрессию!"\n\nФелингер продолжает усиливать свою печально известную агрессивную риторику в отношении России, её президента и ОДКБ. Европейцы широко приветствуют этот шаг, но критики предупреждают о реваншизме и возможной второй войне с Россией, которая может навсегда уничтожить Европу."
 germany.316.a: "Я призываю к вмешательству НАТО для восстановления порядка!"
 germany.317.t: "Специальный Гость NAFO-CONа"
 germany.317.d: "Когда он вышел из машины, морозный воздух Вены обдал лицо человека в костюме. На нем был его легендарный наряд: парадные туфли, черный костюм, очки и многочисленные булавки, украшавшие воротник. Отчаянно желая покинуть холодные условия, он пробирался по снегу к серому зданию, увешанному флагами НАТО и знаменами Сиба Ину. Нежные снежинки продолжали осыпать его лицо, пока он пробирался вперед. На белом фоне еще больше выделялся воротник его костюма. Когда он добрался до места назначения, многие за пределами конференц-зала ахнули. Они с ликованием просили автографы и фотографии у своего кумира, а он с неохотой принимал их.\n\nКогда он вошел внутрь, то почувствовал себя бодрым, поскольку теплый воздух наполнил его легкие. Унылый шум завывающего ветра сменился звуками сотен обожающих его фанатов, которые оживленно обсуждали его приезд. Он устроился у стойки для автографов, поправляя галстук и гордо демонстрируя свои булавки на воротнике, чтобы их видели все, кого он встречает. Вскоре очередь исчислялась сотнями.\n\n"Мистер Фелингер, можно сфотографироваться с вами?" спросил худощавый молодой человек, одетый в натовскую тематику. "Конечно!" ответил Гюнтер. Он протянул парню телефон и улыбнулся своей улыбкой, которая была известна всему X.com. Молодой человек поблагодарил его и счастливо ушел. Гюнтер ждал, пока его поприветствует следующий фанат, и в этот момент он подумал про себя:"
 germany.317.a: ""Один готов, осталось ещё двести.""
 germany.318.t: "Моддеры"
 germany.318.d: "Сообщение о новом сообщении высветило канал Discord.\nСначала появилась серия размытых фотографий: четыре поднятых бокала: один полный кофе, другой с полупустой бутылкой вина на заднем плане, третий подозрительно наполненный светящимся энергетическим напитком, а последний - с тонким колечком молока на дне, затем - скриншот. Простая страница Steam.\n"ЗАГРУЗКА ЗАВЕРШЕНА: EUROPA VINDICTA [HOI5 MOD] v0.1a появилась в Мастерской."\nПодпись под ним гласила:\n\n"Мы сделали это, товарищи. Да здравствует Виндикта!"\n\nОни работали над ним почти год.\nПоздние ночи. Пропущенные дедлайны. Зарисовки деревьев фокусов во время лекций. Обсуждение реворка путей во время экзаменационной недели. Перевод текстов ивентов в 2 часа ночи из гостиничных номеров и коек общежитий. Они не были профессионалами. Всего лишь горстка кодеров и художников, ирландский ботаник-историк и француз, который каким-то образом управлял своим GitHub и, казалось, никогда не спал.\n\nПо их лору 2026 год закончился по-другому.\nЕС устоял. Восточный фронт не рухнул. Первой треснула Москва. Львовский договор перекроил карту. Европа, израненная, но не сломленная, стояла выше, чем когда-либо.\nСервер Discord ожил. Кто-то скинул низко разрешенное изображение фейерверка. Другой просто набрал текст:\n"Представьте себе, если бы все пошло именно так..."\nСкриншоты сыпались рекой. Счетчик подписчиков начал расти. 10. 24. 60.\nКто-то выложил фан-арт послевоенного митинга Европарламента, укутанного золотыми звездами и туманом."
 germany.318.a: "Да Здравствует Виндикта!"
 germany.319.t: "Великая Шахматная Доска - Часть II"
 germany.319.d: "Первый - Россия. Наша разведка подтверждает, что Москва начала посылать оружие и персонал для поддержки Китая. Нацелившись на них напрямую, мы сможем ослабить восточный фронт. Но даже при этом мы не уверены, что ОДТО сможет победить без нас."\n\nКлик.\n\n"Второе - материальная помощь. Крупномасштабные поставки оружия нашим союзникам в Азии. Наш промышленный потенциал, вероятно, сможет справиться с этим наряду с внутренними потребностями. Большая часть Генерального штаба поддерживает этот путь."\n\nОн колебался. Наступила тишина.\n\n"И в-третьих..."\n\nОн вздохнул.\n\n"...Прямая интервенция. Полномасштабная военная кампания в Азии. Потенциальные выгоды огромны - но это будет сопряжено с серьезной логистической нагрузкой... и возможной нехваткой войск."\n\nСвет померк. Наступила тишина. Все взгляды обратились к одному человеку.\n\nФелингер поднялся, поправляя пиджак. Его голос был спокойным и решительным:\n\n"Джентльмены...""
 germany.319.a: "Готовьте шампанское - скоро европейцы будут стучаться в ворота Пекина!"
 germany.319.b: "Будите Союз и будите машины - им понадобится оружие, и мы его предоставим."
 germany.319.c: "Приоритет отдается истинной угрозе - но пусть Япония знает, что мы поддерживаем ее."
 germany.320.t: "Triell"
 germany.320.d: "Сегодня впервые за почти 20 лет состоятся крупные теледебаты между основными претендентами на победу в выборах в Бундестаг этого года, в частности, между двумя партиями нынешней правящей коалиции - Христианско-Демократическим Союзом и Социал-Демократической Партией, а также Зелеными.\n\nФедеральные каналы могут долго спорить о победителе в этих дебатах, но в условиях, в которых оказалась страна сегодня, один из этих трех голосов прозвучал для немецкого народа более отчетливо. Это, конечно же, голос представителя..."
 germany.320.a: "ХДС"
 germany.320.b: "СДПГ"
 germany.320.c: "Зелёные"
 germany.321.t: "Дебаты Малой Тройки"
 germany.321.d: "Почти параллельно с дебатами "большой тройки" остальные три партии также провели теледебаты между своими кандидатами в канцлеры. Несмотря на то, что обычно эти дебаты не так широко известны и рекламируются, в кризисные времена жители Германии внимательно относятся к различным возможным альтернативам, которые могла бы предложить одна из трех партий, недостаточно представленных в Бундестаге - Свободные демократы, Die Linke и Альтернатива для Германии. В этих дебатах выдающиеся способности, знания и аргументация принесли победу..."
 germany.321.a: "АдГ"
 germany.321.b: "СвДП"
 germany.321.c: "Die Linke"
 germany.322.t: "Начало Сезона выборов"
 germany.322.d: "Снова наступило это время года - лидеры партий разъезжают по стране, транспаранты загораются всеми цветами политического спектра, СМИ сходят с ума, а споры будоражат интернет. До очередных федеральных выборов, которые определят будущее страны, осталось чуть больше года, и политические силы Германии пришли в движение. Их популярность может резко меняться в зависимости от их шагов, а вместе с ними будет меняться и количество мест, которые они занимают в Бундестаге..."
 germany.322.a: "На избирательную тропу..."
 germany.323.t: "Плесень Современной Жизни"
 germany.323.d: "Мир был достигнут, и мыслители и деятели могли наконец препарировать человеческую мысль, чтобы обеспечить Капитал, Порядок и Чистоту. Высшая каста людей заселила свои новые ульи. Города стали постоянным местом жительства для большинства людей; бетон, который вы видели, когда родились, останется таким же и после вашей смерти.\n\nРеклама на зданиях, дезинфицированные слова на билбордах, охрана на каждом углу. Трансгрессия была сведена на нет, и прожить еще один день стало главной задачей большинства, но не через борьбу, а через удушение бюрократии и дегуманизацию, и все это во имя прогресса.\n\nПостоянные напоминания о том, что это новая норма, атомизация культуры приводит к изолированной жизни, несмотря на постоянный шум, искусственный свет заглушает надежду, монотонность офисной кабинки за офисной кабинкой заставила бы любого бежать в свой рай, там, в голове, но даже это уже не свято.\n\nСтагнация наступает быстро."
 germany.323.a: "Загнанные в угол животные совершают странные дела."
 germany.324.t: "Культ Капитала"
 germany.324.d: "Для многих это простой факт жизни, гигантская красная линия, которая диктует качество нашей жизни. На фондовых рынках вы видите жрецов, которые жертвуют жизнями многих ради удовлетворения разумного существа.\nКапитал жив, капитал поглотил всю культуру, капитал остановил перемены.\n\nТе, кто находится внизу, виноваты в том, что не набирают темп. Жизнь движется быстро, и, как и на рынке, приходится двигаться быстрее, жертвовать искусством, жертвовать культурой, жертвовать любовью и семьей, чтобы продержаться на этой красной линии еще немного, все выше и выше. Рынок священен, бизнесмены - священнослужители, а торговцы - волшебники. Капитал раскинул свои усики по всему миру, и даже разгорающееся пламя перемен не может его убить.\n\nВ своем бесконечном стремлении мы построили новую Вавилонскую башню."
 germany.324.a: "И все мы знаем, чем это кончилось."
 germany.325.t: "Горки"
 germany.325.d: "Мы выпустим ракеты "Томагавк" по их святым местам, завтра не наступит. Прошлой ночью я снова сражался, проиграл, заставил крепкого парня пролить приличное количество крови, но не остановился, а уставился на Стервятника, сидящего на дереве.\n\nЯ социально несознателен.\nВсе мы - такие.\n\nМногие не понимают голода, который уже несколько столетий движется по нашему миру. С ростом неискренности наши души становятся скованными, глаза - стеклянными, и даже химикаты не могут утолить нашу жажду.\nНаши дети ничему не учатся; жители восточных диких земель живут лучше, пока мы тонем в пластике.\n\nГолубая Луна, я не испытываю сочувствия, копье пронзает сердце Порядка.\nНочные огни покрывают нас мраком, и мы не видим небес.\n\nНашего мира больше не существует, мы танцуем между бетонными башнями.\nВремя идет, сообщения о насилии, преступности и экстремизме сродни паразитам."
 germany.325.a: "Наш взгляд на жизнь стал чуждым."
 germany.326.t: "Культ Чистоты"
 germany.326.d: "Нас всех душат.\n\nМы смотрим на мир, который мог бы быть, и на мир, который должен быть.\nВы видели их.\n\nСтатуи без форм, цвета без смысла, человеческая фигура стала серым пятном.\nРабская преданность чистоте, где любая форма истинного плотского желания исключена.\nРадуга заглушает все, что хочет выделиться.\nМы сталкиваемся с деморализацией каждый день.\n\nОн в наших головах, в наших мечтах и в наших глазах.\nСледуйте за постоянно меняющимся танцем их морали, их чувств, их стандартов, и вы будете в безопасности, вы не будете исключены, ваши дети останутся в безопасности.\n\nМы свободны быть теми, кем они хотят нас видеть.\nМы навсегда останемся в своих панцирях."
 germany.326.a: "Панцирь разобьется, и нам будет больно."
 germany.327.t: "Яд для Отравленных"
 germany.327.d: "Ваша последняя надежда может стать интересным моментом.\nТяжесть вашего бремени снята, но ваш дух разрушен.\nВы становитесь человеком настоящего, плывете по течению вместе с другими, а не отчаянно прокладываете свой путь.\n\nТе, у кого нет будущего, посмотрят на города, и им будет интересно узнать, что их соплеменники заполнены илом, проводами и расплавленным пластиком.\nОгонь. Кровь. Выстрел.\n\nНажат курок, слышны сирены, родители плачут, а эксперты недоумевают.\n"Почему?"\n\nИдеологические стервятники кружат над континентом, принимая на себя ответственность за насилие. С каждым днем наши зубы становятся все острее, а сердца бьются быстрее.\nВопрос уже задан.\n\nИ ответ последует за ним."
 germany.327.a: "Укушенный щенок будет кусать себя сам."
 germany.328.t: "Культ Порядка"
 germany.328.d: "Капитал сдерживает разум, Чистота блокирует душу, а Порядок необходим для ограничения тела.\n\nРяды фигур в доспехах, дубинки, чтобы ломать кости не закованным, щиты, чтобы отразить ярость брошенной бутылки.\nПорядок на улицах, он смотрит на живых своими цифровыми глазами.\nТем, кто прячется за масками, отдаются приказы, санкционированное государством насилие служит отдушиной для тех, кто жаждет его, хук слева от закона против челюсти анархии, слезоточивый газ против тех, кто уже плачет, те, кто выделяется, будут растоптаны.\n\nСлепая вера в тех, кто выше тебя.\nПорядку не хватает того, что есть у всех остальных религий.\nЛюбви.\n\nТе, кто следует за Порядком, пройдут через ад и другие пределы, чтобы остаться в безопасности, перешагивая через тех, кто уступил окончательную свободу, и в этом слепом шествии они не видят пропасти, к которой идут."
 germany.328.a: "Они чувствовали на себе пронзительные взгляды ненависти."
 germany.329.t: "Освобождение"
 germany.329.d: "Для одних это было неожиданностью, для других - неизбежностью.\nУлицы стали тише, объявления - отчаяннее, высшие чины еще больше отдалились от скота, за людьми больше не присматривали другие люди, только алгоритмы и цифровая бюрократия.\n\nНасилие.\nСимптом застоя, который, если его не остановить, превратится в открытую рану, притягивающую всевозможных личинок. Люди злятся, люди устали, люди просто хотят снова чувствовать.\n\nПорядок получил средства противодействия, но, в свою очередь, наши клыки стали еще острее.\nКапитал постепенно вытеснял средства для выживания, но голод становился мотивацией.\nЧистота шептала нам, что альтернативы не будет, но крики становились все громче.\n\nНечего сказать, нечем оправдаться и уж точно нечего скрывать.\nВсё как положено, как это и задумывалось.\n\nГиены, стервятники и прочие паразиты, дремавшие под тонким слоем нашей демократии, теперь поднимаются над землей, принося на континент свое безумие.\n\nМы больше не узнаем эту деревню; она должна сгореть."
 germany.329.a: "Просто чтобы почувствовать его тепло."
 germany.330.t: "Растущая Напряженность в Европе"
 germany.330.d: "После недавней победы над Россией во Второй европейской войне и последующего возвышения Всемирного экономического форума, несомненно, его политика не обойдется без заминок.\n\nЕвропейский союз заявил, что эти сообщения - не что иное, как откровенная дезинформация, исходящая от российских повстанцев, которые обращаются к диссидентским группам в Союзе.\n\nОднако мировые наблюдатели обратили внимание на то, что проводимая политика, похоже, негативно влияет на человеческую психику, и в сети уже появились сравнения с экспериментом "мышиная утопия".\n\nПока неясно, как Европейский союз будет действовать в этой ситуации."
 germany.330.a: "Идеал, построенный на зыбучем песке."
 germany.331.t: "Массовый Катарсис в Европе!"
 germany.331.d: "С тех пор как Служба внутренней безопасности Европы заняла более активную позицию в борьбе с дезинформацией и вредными новостями, казалось, что сообщения о растущей внутренней нестабильности были не более чем преувеличением, однако с сегодняшнего дня это уже не так.\n\nЖестокие беспорядки на улицах, жестокая преступная деятельность и злобные террористические акты стали обычным явлением настолько, что Служба внутренней безопасности Европы не в состоянии должным образом сдерживать любую информацию об этом.\nВ сети уже говорят о "массовом катарсисе", когда постоянное подавление человеческого опыта и все более жесткий контроль со стороны правительства наконец-то привели к естественному перелому.\n\nКультурные центры, офисы, военные объекты и городские районы стали главными мишенями для всевозможных группировок. Сообщения о воинствующих экстремистах, пытающихся нанести как можно больший ущерб, становятся все более распространенными, а последовавшее за этим большое количество покушений на чиновников говорит о том, что континент ожидает неспокойное время.\n\nЕвропейский союз заявил, что восстановит порядок на континенте и что это не более чем предсмертный хрип людей, неспособных двигаться дальше. Одно можно сказать наверняка:\nКонтинент уже никогда не будет прежним."
 germany.331.a: "Новый холст хаоса."
 
 germany.333.t: "Я Призываю Европейцев Задуматься"
 germany.333.d: "Обломки, осколки стекла, пятна крови, в которых пали мои европейские братья. Это все, что я вижу на протяжении многих километров, пока меня везут через руины Варшавы. Воздух неподвижен, тишина невыносима, но ее прорезают рыдания женщины, копающейся в обломках своего дома. Она прижимает к себе останки своего мужа, как будто утешение каким-то образом принесет ему покой на небесах...\n\nОрки востока, те, что принесли столько страданий, были уничтожены, раздроблены и теперь сражаются между собой, как варвары, которыми они и являются. И все же, оглядывая окрестности через окна этой бронированной машины, я чувствую нечто иное, чем радость от победы над врагом. Моя жизнь шла к этому моменту: от мелкого экономиста в Брюсселе до лидера величайшей нации в мире. И все же я не чувствую себя полностью удовлетворенным, и я не понимаю почему.\n\nМожет ли быть так, что русские снова вернутся за нами? Что месть, которую мы им устроили, будет направлена обратно на нас? Вернутся ли разрушения и опустошения, причиненные нашим европейским соотечественникам, с возмездием? Да и сама Европа тоже... Сколько времени может потребоваться на восстановление? Месяцы? Годы? Десятилетия? Разрушения передо мной гораздо серьезнее, чем предупреждал любой из моих советников; возможно, они хотели оградить меня от суровой реальности. Но, несмотря на все, моё сердце подсказывает мне, что я не должен падать духом. Европейцы заслуживают большего, чем деморализованный лидер. Мне уже приходилось сталкиваться с более суровыми испытаниями, но мы отстроимся; наши города будут царапать небо, а наши люди будут каждый день благодарны за то, что живут в величайшей стране под защитой величайшего альянса - НАТО. И если орки на востоке снова восстанут, мы будем готовы и в последний раз докажем им, что европейцы не прогибаются под тиранами, колонизаторами и убийцами.""
 germany.333.a: "Европа больше не падет!"
 germany.334.t: "Приглашение в НАТО"
 germany.334.d: "Новый лидер Европейского союза Гюнтер Фелингер прислал нам коммюнике, в котором приглашает все страны ОДТО вступить в НАТО для совместных военных действий против России и Китая, цитируя: \n\n"Я призываю Японию и другие страны ОДТО вступить в НАТО, чтобы мы могли вместе достичь экс-Китая и экс-России."\n\nХотя нам явно придется еще больше расширять наши силы, чтобы справиться с северным фронтом, ЕС пообещал нам довольно обширную помощь, которая может стать решающей в победе над Пекином.\n\nКак мы должны ответить?"
 germany.334.a: "Мы победим Россию и Китай вместе!"
 germany.334.b: "Ну... Нет..."
 germany.335.t: "ОДТО соглашается"
 germany.335.d: "Япония согласилась объединить НАТО и ОДТО, а это значит, что, как только мы начнем войну против ОДКБ, они получат неожиданную атаку с востока! Однако нам также следует подготовить наш флот к оказанию помощи нашим новым союзникам в Тихом океане."
 germany.335.a: "Великолепно!"
 germany.336.t: "ОДТО Отказывается"
 germany.336.d: "Несмотря на то, что выгоды намного превышают затраты, Япония отказалась от дальнейшего сотрудничества НАТО и ОДКБ, заявив, что у них достаточно сил для победы над ВАОИ и они не заинтересованы в открытии еще одного фронта против России. Однако это означает, что мы можем полностью сконцентрировать наши силы на уничтожении ОДКБ."
 germany.336.a: "Их потеря."
 germany.337.t: "Трагедия"
 germany.337.d: "На улице снова шел дождь. Капли дождя беспрестанно стучали по подоконнику, не переставая капать и капать.\n\nТомас ссутулился на своем потертом диване, одной рукой сжимая бутылку пива, а другой лениво перелистывая телевизионные каналы с помощью пульта. В гостиной пахло сырым дымом и прокисшим алкоголем. По испачканному полу были разбросаны остатки пиццы. Экран мерцал и наконец остановился на местных новостях.\n\n"...Сегодня утром в жилом доме на севере Бохума разыгралась трагедия. Полиция сообщает, что по меньшей мере двадцать четыре жильца предположительно совершили групповое самоубийство. Причина остается неясной. Местные жители говорят, что в доме была дешевая рента и жили в основном безработные, многие из которых испытывали серьезные финансовые трудности..."\n\nТомас пробормотал что-то себе под нос и сделал глоток пива, жидкость потекла по его бороде и шее. Он прищурился на экран, на котором теперь мелькали размытые изображения - грохочущие коридоры, дешевая мебель, сваленная за полицейской лентой, и носилки, покрытые черной тканью. Он ожидал продолжения, но внезапно экран заполнился яркой, раздражающей рекламой.\n\n"Вы когда-нибудь хотели окунуться в жизнь настоящего шахтера?" радостно вещал молодой ведущий, стоя перед инсценированной, отреставрированной угольной шахтой. "Присоединяйтесь к программе 'Опыт столетия' от New Traveller Group! Наденьте рабочее снаряжение XIX века, спуститесь под землю и сами добывайте уголь! Переживите тяготы и славу эпохи! Звоните сейчас, чтобы забронировать билеты и воспользоваться эксклюзивными скидками!"\n\nТомас уставился в телевизор. Шахтер? Трудности? Слава? Его язык слегка шевельнулся, как бы желая рассмеяться, но звука не последовало. Его дед всю жизнь провел в шахтах, кашлял кровью, пока она не убила его. Томас помнил эти рассказы - темнота, сырость, удушье, жизнь без солнечного света. Он помнил, как его дед в последние годы жизни проклинал шахту и клялся, что если бы у него был выбор, он бы никогда не ступил под землю. А теперь они продавали эти страдания. Упаковывая его как премиальный опыт.\n\nТомас соскользнул с дивана и сел на холодный жесткий пол. За окном по-прежнему шел дождь. По телевизору играла веселая музыка. Он издал смешок - короткий, хриплый, похожий на треск стекла."
 germany.337.a: "После смеха он снова замолчал."
 germany.338.t: ""
 germany.338.d: "Прямо как сейчас.\n\nВы читаете это. Возможно, вы думаете: "Вау, это жутко. Это тревожно." Ваши брови подергиваются, губы поджаты - или, возможно, слегка искривлены. Но это было не совсем ваше решение - вам просто "захотелось" это сделать.\n\nУ вас тоже есть чип? Не можете вспомнить? Большинство людей не помнят. Они помнят только, что в один прекрасный день им стало "лучше."\n\nВ комнате холодновато, не так ли? Вы только что что-то слышали? Все в порядке - возможно, это просто ветер снаружи.\n\nРасслабьтесь немного."
 germany.338.a: "И улыбнитесь"
 germany.339.t: "ВНУТРЕННЯЯ ОПЕРАТИВНАЯ СВОДКА - НЕСАНКЦИОНИРОВАННОЕ РАСПРОСТРАНЕНИЕ ЗАПРЕЩЕНО"
 germany.339.d: "Тема: Обратная связь по развертыванию VTV - подразделений Восточного фронта\n\nПодведение итогов:\nЕвропейские войска интегрируют ряд цифровых и кибернетических улучшений в нескольких подразделениях. Среди наиболее экспериментальных систем - Viral Threat Veil (VTV), глазной имплантат, разработанный для прямого взаимодействия со зрительной корой. Основная функция: изменение восприятия внешнего вида вражеских комбатантов для дегуманизации целей в режиме реального времени. Проще говоря, солдаты видят врагов менее человечными, более чудовищными.\n\nОперативное Воздействие:\nПредварительные отчеты эстонских передовых подразделений свидетельствуют о снижении уровня стресса во время непосредственных столкновений с российскими войсками. Войска, оснащенные VTV, демонстрируют более быстрое время реакции и меньшую нерешительность в реальном бою. Однако есть и непредвиденный побочный эффект: увеличилось количество сообщений о чрезмерной агрессии и садистском поведении, особенно при обращении с пленными.\n\nОдна анонимная цитата из полевого интервью:\n\n"После изуродования этих тибла, я стал лучше спать."\n\nЭтические Проблемы:\nПо крайней мере, один случай неисправности был подтвержден. По сообщениям, устройства VTV неправильно идентифицировали некомбатантов - российских гражданских лиц, вызвав визуальные искажения, обычно предназначенные для враждебных целей. Видеозапись этого инцидента распространялась недолго, после чего была удалена со всех сетевых платформ ЕС. Это вызвало серьезный этический резонанс. И не только со стороны гуманитарных организаций, но и внутри некоторых командных инстанций.\n\nЗаключение:\nНесмотря на моральную двусмысленность и растущую этическую озабоченность, VTV продолжает демонстрировать заметные успехи в облегчении психологической нагрузки в условиях длительных боевых действий. Как это часто бывает в военное время, грань между пользой и совестью остается размытой. Нынешняя политика отражает гибкую интерпретацию прав человека в пользу оперативной эффективности при более широком оправдании - защите нашей демократии."
 germany.339.a: "Давайте держать это в секрете."
 germany.340.t: "Великая Шахматная Доска - Часть I"
 germany.340.d: "Зал заседаний гудел уже несколько недель.\n\nНачало войны в Азии вызвало панику среди гражданских лиц и породило бурю споров и смену приоритетов среди военных.\n\nВ огромном оперативном зале европейского министерства обороны жаркие дебаты продолжались уже двенадцать часов. Офицеры уже почти набросились друг на друга, когда дверь внезапно распахнулась.\n\nУхоженный, атлетически сложенный мужчина лет пятидесяти спокойно вошел в зал и занял место во главе стола. Перед ним была небольшая, но весомая табличка с надписью: Гюнтер Фелингер, президент Европейского союза.\n\nВсе офицеры встали и отдали честь.\n\n"Полагаю, вы пришли к какому-то консенсусу," сухо сказал он, даже не поднимая глаз от своего бокала. "Раз уж мне пришлось покинуть Брюссель ради этого."\n\nСотрудники принялись настраивать проектор, а генерал вышел вперед с папкой в руках.\n\n"Верховный главнокомандующий, мы наметили три направления действий."\n\nОн жестом указал на экран."
 germany.340.a: "..."
 germany.341.t: "Конец"
 germany.341.d: "Теперь некому смеяться, некому делать "разоблачительные" доклады, некому быть конспирологом и некому сопротивляться. Теперь грандиозное видение Всемирного экономического форума стало неоспоримой реальностью, которой нет альтернативы.\n\nКлаус Шваб, как бы мы ни сомневались в его одиозной личности, самоуверенности и безрассудстве, сумел реализовать программу довольно эффективно и быстро. Хотя ему еще предстоит работать, его личные усилия весьма примечательны, а его публичный титул лидера Мирового правительства не просто продукт средств массовой информации, как большинство вещей в современном мире, - Шваб определенно заслужил это небольшое повышение.\n\nК сожалению, по мере приближения к сотому году жизни его управленческие навыки ухудшаются, и ему пора взять заслуженный перерыв.\n\nНо, к счастью, эта система не принадлежит одному Швабу. Возможно, для него путешествие закончилось, но для других оно еще не закончилось. Он не знает, сколько ему осталось, но медицина прогрессирует, а с огромной силой открываются большие возможности. Сколько проживут его преемники? 120, 130, 150 лет? По правде говоря, предел еще никогда не был достигнут.\n\nИ именно им, будущим правителям мира, предстоит поддерживать статус-кво. Но сейчас он может только радоваться, что снова уходит в тень..."
 germany.341.a: "Теперь как игрок, а не пешка."
 germany.342.t: "Незавершенные Дела"
 germany.342.d: ""Ну и чего же вы ждете? Как и в случае с Россией, я требую полной деколонизации сейчас, чтобы Азия навсегда освободилась от китайского империализма!"\n\nГенералы посмотрели друг на друга с оттенком страха в глазах. Мгновение спустя один из них ответил твердо, но с нервной запинкой:\n\n"Господин Фелингер..."\n\nОн еще раз взвесил свои слова.\n"Обширная география и плотность населения Китая не позволяют нам полностью оккупировать его, как мы могли бы сделать это с Россией. По нашим расчетам, даже если мы удвоим количество призывников и мобилизуем весь персонал, находящийся на обучении или в отставке, этого будет недостаточно-..."\n\nГюнтер отмахнулся от оправданий взмахом руки, погрузившись в тень размышлений с мрачным выражением лица.\n\n"...С другой стороны," - осторожно продолжил другой офицер, - "центральная власть Пекина рухнула, и это привело к образованию по всей стране разрозненных государств и клик... Это в некоторой степени выполняет цель разделить Китай"\n\nГюнтер смотрел вверх с чувством оптимизма. Хотя его планы не полностью сбылись, в том, что он только что услышал, была определенная надежда."
 germany.342.a: ""Это тоже сойдёт... на время.""
 germany.343.t: "Израиль Подает Заявку на Вступление в НАТО"
 germany.343.d: "После триумфа Израиля на Ближнем Востоке его народ и правительство объединились, чтобы полностью поддержать вступление Израиля в НАТО для обеспечения безопасности на Ближнем Востоке. Будут созданы постоянные немецкие военные базы, чтобы еще больше укрепить позиции Израиля и отреагировать в случае новой чрезвычайной ситуации.\n\nИзраиль благодарен нам за поддержку. Если мы будем держаться вместе, ни один враг не сможет нас сломить!"
 germany.343.a: "Ура!"
 germany.344.t: "Собрание Зеленых"
 germany.344.d: "Выборы еще только начинаются, но первые опросы уже показывают многообещающие перспективы "зеленых." И все же один вопрос остается открытым - как для членов партии, так и для избирателей: кто будет лидером.\n\nАнналена Баербок и Роберт Хабек долгое время делили руководство партией в соответствии с традициями "зеленых," подчеркивающими равенство и баланс. Но теперь пришло время выбрать единое лицо движения - того, кто понесет страну вперед в качестве канцлера.\n\nБаербок известна своим идеализмом и прямотой, непоколебимой в вопросах внешней политики. Многие характеризуют ее как твердую, даже конфронтационную, но при этом глубоко приверженную моральной чистоте и правам человека. Она готова пойти на многое, чтобы отстоять справедливый и принципиальный, по ее мнению, курс. Политик "будущего, а не компромисса," она вполне может стать тем лидером, которого заслуживает страна.\n\nХабек, напротив, пользуется широкой общественной поддержкой благодаря своему прагматичному, ориентированному на экономику взгляду. Его темперамент также контрастирует с темпераментом Бэрбока: он более спокойный, примирительный и нацеленный на достижение консенсуса. Хотя он и стал более напористым во внешней политике, в глазах многих он остается "реалистом" - лидером, который понимает, как работает система, и готов работать в ее рамках, чтобы добиться перемен.\n\nУчитывая это, партия завершила внутреннее голосование и объявила, кто из них двоих станет их кандидатом на один из самых важных постов в стране..."
 germany.344.a: "Анналена Баербок!"
 germany.344.b: "Роберт Хабек!"
 germany.345.t: "ХДС/ХСС: Битва за будущее"
 germany.345.d: "Если какую-то политическую силу в многопартийной системе Германии и можно отнести к "старой гвардии," то это, несомненно, ХДС/ХСС. Созданные в 1945 году после войны и объединенные - по крайней мере, номинально - в 1949 году, они с тех пор действуют в тандеме на всех уровнях власти. Кто-то даже может назвать их "столпом стабильности." Но внутренние разногласия, особенно сейчас, когда речь идет о предстоящих выборах и канцлерстве, делают этот ярлык скорее похожим на выдачу желаемого за действительное.\n\nВсе общественные ожидания указывали на Мерца как на очевидного кандидата - фаворита альянса, которому практически гарантировано выдвижение. Однако никто не ожидал такого поворота событий: лидер ХСС заявил о своем намерении баллотироваться.\n\nВот Маркус Зёдер: официально баварец и христианско-социалист. Хотя баварская часть, несомненно, верна, название его фракции не вполне отражает его идеологическую позицию. Известный своими громкими и часто противоречивыми заявлениями, Зёдер пользуется большой популярностью в регионе. Он открыто выступает против мультикультурализма, вызывая восхищение ультраправых, и одновременно поддерживает либеральные идеи, такие как однополые браки и обязательная вакцинация.\n\nВ отличие от него, Мерц кажется почти центристом - возможно, даже левым. Проиграв внутреннюю борьбу Ангеле Меркель два десятилетия назад, он намерен не отступать снова. Опытный судья, юрист и финансовый эксперт, он теперь стремится добавить в свое резюме должность канцлера. Спокойный, компетентный и, возможно, более способный, чем его соперник, он, тем не менее, пытается привлечь к себе внимание общественности.\n\nПоскольку постепенный упадок блока становится все труднее игнорировать, возможно, неожиданное решение - это именно то, что нужно. В конце концов, взвесив все варианты, ХДС/ХСС пришли к выводу, что..."
 germany.345.a: "Опыт Мерца покорил партию."
 germany.345.b: "Амбиции Зёдера более убедительны!"
 germany.346.t: "Выбор Альтернативы?"
 germany.346.d: "АдГ остается одной из самых противоречивых партий Германии. Основанная в 2013 году, она даже не могла представить, во что превратится сегодня. Евроскептицизм, правый популизм, исламофобия и даже неонацизм - эти термины практически стали синонимами партии в глазах общественности.\n\nИ все же ее популярность продолжает расти. Продолжающаяся напряженность в связи с иммиграцией, ошибочная политика правительства и общее политическое разочарование только подогревают интерес к АдГ и расширяют ее базу избирателей.\n\nНо сейчас партия стоит на перепутье - нужно решить, кто возглавит ее избирательную кампанию из двух наиболее влиятельных фигур: Алиса Вайдель и Тино Крупалла.\n\nВайдель - эксцентричная фигура, подходящая для такой партии, как ее. Своей прямотой она часто вызывает бурную реакцию СМИ и общественности. Она принципиальная женщина, не боящаяся отстаивать свои убеждения, невзирая на обратную реакцию. Как и ее партия, она выступает за экономический либерализм и возвращение к ядерной энергетике.\n\nЕе внутренний соперник, Крупалла, представляет собой более приемлемый вариант для широкой аудитории. Более спокойный, собранный и склонный к компромиссам. Благодаря своей дипломатичности он обещает объединить партию как никогда раньше - и всегда может найти способ договориться с политическими оппонентами.\n\nПосле нескольких недель дебатов, обсуждений, уговоров и всего, что только можно себе представить, партия - под пристальным вниманием прессы и общественности - сделала общенациональное заявление, что..."
 germany.346.a: "Алиса Вайдель сможет собрать разношёрстную коалицию!"
 germany.346.b: "Тино лучше справится с задачей объединения партии..."
 germany.347.t: "Новый Лидер Die Linke Высказалась"
 germany.347.d: "По сравнению со своими соперниками на этих выборах Die Linke выглядит редким островком внутренней стабильности. С последовательной, практически бескомпромиссной политической платформой, идеологически единой базой избирателей и лидером - возможно, точнее, ведущей женщиной - которая недавно ошеломила нацию одной речью.\n\nХайди Райхиннек, возможно, самый "молодой" кандидат в гонке этого года. Ее активность и популярность в социальных сетях конкурируют с популярностью опытных авторитетов, а ее нескрываемая аутентичность - от татуировок до пламенных заявлений в Бундестаге - превосходит даже ее заклятого соперника из АдГ. \n\nНесмотря на ее открытую защиту прав женщин, поддержку рабочих и самопровозглашенную позицию "демократического социализма," результаты опросов партии оставались скромными... по крайней мере, до недавнего времени.\n\nПо мере того как выборы накаляются, межпартийные компромиссы стали обычным явлением во всем спектре. Но для Райхиннека последней каплей стало обсуждение потенциального сотрудничества между ХДС и АдГ. Когда Фридрих Мерц - один из лидеров партии - высказался в поддержку ужесточения миграционных законов во время недели национального траура по жертвам концлагерей, она ответила без колебаний.\n\nВыйдя на трибуну при первой же возможности, глава Die Linke произнесла яростную, бескомпромиссную речь, осуждающую подобную риторику. Даже многие ее политические оппоненты признались, что были поражены ее моральной чистотой, а ее восклицание "Это проклятая проблема!" распространилось по стране как лесной пожар.\n\nХотя трудно оценить долгосрочное влияние ее слов, одно можно сказать наверняка: впервые за многие годы Германия, возможно, стоит на пороге избрания партии, которая ставит своих рабочих в центр национальной политики."
 germany.347.a: "Германия снова движется влево?"
 germany.348.t: "Нежная Кожа"
 germany.348.d: "Мир - это одно сплошное скопление заблуждений.\n\nТак строились империи: на идеалах немногих, которые видели видения из того места, которое нам не суждено увидеть.\nКогда вы нежно прикасаетесь к кому-то, что вы чувствуете?\nПравильно или неправильно?\nХорошо или плохо?\nКрасный или синий? \n\nВаше мнение отличается от другого, и в справедливом мире вы бы разбили ему дыхательное горло; но вы можете.\n\nНе кто иной, как вы сами, мешает вам видеть мир таким, какой он есть.\nВполне естественно, что святая сущность, в которую вы верите и посвящаете себя, будет отражением вас самих.\nОтсюда, как я могу верить всему, что показывают мне мои глаза?"
 germany.348.a: "Вырвите их, загляните за завесу."
 germany.349.t: "Дарвин"
 germany.349.d: "Насилие естественно, насилие полезно, это единственный способ обеспечить всем живым существам возможность прожить еще один день. Мы делали это с тех пор, как размозжили друг другу черепа камнями, прячась в пещерах.\n\nЛев насилует маленькую собаку, акула пожирает кита, а стервятник клюет умирающего.\n\nБудущее неопределенно, но настоящее, сегодняшнее, здесь и сейчас - это все, что имеет значение. \nНаши кулаки в крови, наши ухмылки видны.\nМир, в котором мы живем сейчас, - вот что важно.\n\nНе понимаю, почему вы это осуждаете.\nНе все ли мы делаем одно и то же, прямо или нет.\n\nМы пробиваемся локтями мимо других, чтобы выжить, а те, кто не способен на это, остаются гнить в грязи. Культ капитала всегда поощрял это, и теперь, когда мы доводим это до естественного конца, вы прячетесь в своих убежищах и бункерах.\n\nЕвропейский Союз утверждает, что сделал все, что сделал, чтобы уважать жизнь.\n\nКакая причина уважать жизнь?\nДумаете ли вы, что уважаете жизнь прямо сейчас?"
 germany.349.a: "Остается только один закон."
 germany.350.t: "Голод"
 germany.350.d: "Эпоха, когда над человечеством довлеет акт потребления.\n\nГолод приводит к раздражению, раздражение - к гневу, гнев - к жестокости.\nТак мы устроены.\n\nКак и следовало ожидать от башни из слоновой кости, которая хочет править всеми нами, Всемирный экономический форум требует, чтобы мы ели "правильные" вещи. \nЕсли что-то правильно, то есть и то, что считается "неправильным," не так ли?\n\nГолод - это естественно, но люди проводят черту, когда едят своих ближних.\nКто и почему так решил? Потому ли, что человеческая жизнь ценна?\n\nЧто делает жизнь животных менее ценной?"
 germany.350.a: "Чтобы избежать боли, которую мы все испытываем."
 germany.351.t: "Современные Архитектурные Решения"
 germany.351.d: "Многочисленные народы Европы говорят на разных языках, а их города зачастую представляют собой неэффективные, запутанные бардаки, полные «культурных центров», простоявших столетия и оставшихся лишь ностальгическими свидетельствами прошлого, от которого мы постоянно отдаляемся.\n\nПравда о европейском городе заключается в том, что прошлое охраняется без всякой причины, старые булыжные дороги поддерживаются в надлежащем состоянии без всякой цели. Мы строим Европу, универсальную Европу, единый народ, который должен ощущать себя коллективным целым, идентичностью. Эти древние соборы и дворцы, построенные за столетия, а иногда и за тысячелетия до этого, не должны были простоять так долго.\n\nЧтобы построить европейскую идентичность, эти региональные «памятники» должны быть заменены, принята единая европейская архитектура. Со временем мы построим эффективные, организованные города. Извилистые дороги и тротуары станут шумными потоками торговли и производства, кишащими рабочими, как река, полная коряг.\n\nПусть они протестуют, но им нечего будет жаждать, они научатся любить офисные здания и небоскребы, которые мы поставим на их место, настоящие достижения и архитектурные чудеса, нам не нужны дворцы в стиле барокко и давно умершие административные центры графов и королей."
 germany.351.a: "Времена уже не те."
 germany.352.t: "Перевооружение Европы Получило Зеленый Свет"
 germany.352.d: "Президент Еврокомиссии Урсула фон дер Ляйен, всегда выступавшая в роли европейской "военной девы," предложила план "ReArm Europe" (Перевооружение Европы) в рамках своей более широкой программы "Readiness 2030 Agenda" (Программа готовности к 2030 году), реализация которой ускорилась после краха Америки в 2021 году. Нехватка американских средств и американского оружия поставила Европу в неустойчивое положение.\n\nВсе европейцы, независимо от их происхождения и убеждений, единодушно понимают, насколько серьезна ситуация. Правила Европейского союза диктуют необходимость финансовой стабильности, но для быстрого перевооружения в ответ на рост российского экспансионизма и крах нашего главного защитника требуются кредиты, рискованные решения и сокращение бюджета.\n\nХотя первоначальный проект предусматривал консервативную цену в 800 миллиардов евро, предложение, принятое сегодня Европейским парламентом, предусматривает цену в 1,4 триллиона евро, с планами сокращения европейского бюджета, выдачи займов и перенаправления средств из неважных министерств, все в целях создания единой программы закупок с целью переоружия Европы.\n\nХотя план называется "Готовность 2030", есть надежда, что многие европейские страны значительно превысят этот показатель за счет дополнительных средств и, возможно, повторного введения воинской повинности в некоторых крупных странах, но окончательный успех плана будет зависеть от сотрудничества таких европейских титанов, как Германия, Франция, Италия и Испания, которые смогут мобилизовать свои финансовые, производственные и людские ресурсы для противодействия российской угрозе.\n\nПринятие этого плана Европейским парламентом является важным первым шагом на пути к внедрению военных мер на всей территории Союза в связи с прогнозируемым обострением напряженности как внутри страны, так и за рубежом."
 germany.352.a: "Демократия спасает демократию?"
 germany.353.t: "Перевооружение Европы: Раскрытие Кошелька"
 germany.353.d: "С принятием программы Перевооружения Европы правила финансовой стабильности Европейского союза были значительно ослаблены, чтобы расширить возможности европейских стран по краткосрочной мобилизации. Но, несмотря на это, многие страны ЕС не решаются идти на риск, многие не хотят действовать в одиночку, и по мере сближения Европы именно титаны должны вести весь Союз вперед.\n\nГермания, скорее всего, будет принимать решения в рамках этой договоренности, и все, что она сделает, другие страны, вероятно, будут следовать пропорционально. Есть несколько вариантов, первый из которых заключается в том, чтобы просто оставить вопрос перевооружения на усмотрение каждой отдельной страны, позволяя всем странам напрямую погашать долг за счет получения кредитов на оборону.\n\nС другой стороны, субсидии Европейского Союза, предоставляемые многим бедным странам Союза, похоже, все равно исчезают в бездне бедности и коррупции, и, возможно, мы могли бы сократить расходы здесь и там, чтобы перенаправить эти субсидии на программу коллективных закупок.\n\nИ, наконец, последний вариант, который, в зависимости от точки зрения, может быть более или менее рискованным: поставить Германию в центр усилий по перевооружению. Это может окупиться и значительно расширить наши производственные мощности, но также может погрузить нас в долги, а так скоро после краха фондового рынка взятие кредитов от имени наших более бедных и уязвимых соседей будет непопулярным.\n\nПодводя итог: долговая задолженность? Финансовая стабильность? Или кредиты в обмен на влияние? Следует ли централизовать усилия по перевооружению Европы или делегировать их? На данном этапе решение остается за вами, канцлер."
 germany.353.a: "Я не вижу причин, по которым они не могут заплатить."
 germany.353.b: "Урежем средства для ЕС, наши деньги должны оставаться у нас."
 germany.353.c: "Мы будем вести Европу. Vorwärts!"
 germany.354.t: "Белое Золото под Нашими Ногами?"
 germany.354.d: "Берлин, Deutsche Welle (DW)\n\nНовая глава в промышленном будущем Германии, возможно, только что была открыта под полями и холмами Саксонии-Анхальт. После нескольких месяцев предварительных геологических исследований федеральные и земельные горные власти подтвердили наличие значительных запасов лития, одних из крупнейших, когда-либо обнаруженных на европейской территории. \n\nЛитий, прозванный инвесторами и инженерами "белым золотом," необходим для производства аккумуляторов для электромобилей, систем хранения энергии и оборонных технологий нового поколения. До сих пор "зеленые" и цифровые амбиции Европейского союза в значительной степени зависели от импорта из-за рубежа, в частности из Австралии, Чили и Китая. Но ситуация может измениться. \n\nПо оценкам экспертов, обнаруженные запасы могут обеспечить более четверти прогнозируемой потребности ЕС в литии на ближайшие два десятилетия. Это открытие произошло в момент, когда Брюссель стремится к большей стратегической автономии, а Берлин возглавляет усилия по перестройке промышленной базы континента под двойным лозунгом энергетического перехода и военной модернизации.\n\nКонсорциумы немецких и европейских компаний уже готовят технико-экономические обоснования для быстрой добычи. Планы по развитию инфраструктуры, экологические оценки и политическое лоббирование ускоряются с беспрецедентной скоростью. Региональное правительство, застрявшее между обещаниями экономического возрождения и экологической осторожностью, призвало к "сбалансированному развитию," но давление усиливается.\n\nОт Биттерфельда до Бернбурга, тихий регион, долгое время ассоциировавшийся с постиндустриальным застоем, теперь может стать передовой линией в европейской гонке за ресурсы XXI века. Остается только гадать, приведет ли этот "литиевый момент" к долгосрочным преобразованиям. Но пока все взоры обращены к Саксонии-Анхальт и белому металлу, скрытому под ее землей."
 germany.354.a: "Найден Аккумулятор Европы"
 germany.355.t: "От Руды до Автобана"
 germany.355.d: "Гамбург, Der Spiegel\n\nНа окраине коммерческого района Гамбурга длинная очередь автомобилей блестит под зимним солнцем. В автосалоне царит оживление, как никогда за последние годы. Впервые за десятилетие снова появились списки ожидания на новые немецкие автомобили, и покупатели не жалуются.\n\n"Мы посмотрели BYD," рассказывает Der Spiegel одна пара среднего возраста, "но эта модель нам больше подходит. Я не хочу, чтобы под моим рулем работало программное обеспечение из Шэньчжэня." \n\nРечь идет о новом электрическом внедорожнике BMW, одной из нескольких моделей, в которых используются аккумуляторы, произведенные на новых литиевых заводах в Саксонии-Анхальт. "Наш литий," с улыбкой говорит продавец. "Отсюда, а не из Чили."\n\nКлиенты понимают эту связь. Ввиду того, что тарифы ЕС на китайские электромобили делают их импорт менее привлекательным, а также после нескольких месяцев заголовков о прорывах в отечественной добыче полезных ископаемых, растет мнение, что покупка немецких автомобилей - это не просто предпочтение, а патриотический поступок. Один молодой покупатель, недавно устроившийся на работу в местную гигафабрику, называет это "замыканием круга."\n\n"Мы добываем литий из собственных месторождений, производим аккумуляторы в Йене, собираем автомобили в Штутгарте. Так и должно быть," говорит он, ставя свою подпись на пунктирной линии.\n\nДля отрасли, которая когда-то была потрясена иностранными технологиями и внутренними скандалами, ситуация, возможно, меняется. А для Германии, которая долгое время определялась своими дорогами, машинами и гордостью за них, двигатель восстановления снова заработал."
 germany.355.a: "Электрические мечты, сделанные в Германии."
 germany.356.t: "Соглашение Между ЕС и МЕРКОСУР"
 germany.356.d: "После многолетних переговоров торговое соглашение между ЕС и МЕРКОСУР вернулось на повестку дня, на этот раз с реальным импульсом. Сторонники в Брюсселе представляют его как стратегический прорыв: обширная зона свободной торговли, связывающая Европу с крупнейшими экономиками Южной Америки, снижающая тарифы, расширяющая доступ к важнейшим ресурсам и открывающая новые экспортные рынки в момент, когда глобальные цепочки поставок становятся все более нестабильными.\n\nДля Европы преимущества очевидны на бумаге. Промышленные экспортеры получат выгоду от облегчения доступа к южноамериканским потребителям, особенно в сфере автомобилестроения, машиностроения, химической промышленности и высокотехнологичного производства. Соглашение также снизит зависимость Европы от непредсказуемых поставщиков за счет укрепления связей с Бразилией и ее соседями, обеспечения импорта сельскохозяйственной продукции и ключевых сырьевых материалов. В эпоху роста блоков оно дает Европе возможность сохранить открытыми торговые пути, не полагаясь на великие державы.\n\nНо затраты также реальны. Европейские фермеры и сельскохозяйственные профсоюзы предупреждают, что открытие рынка для продуктов МЕРКОСУР может вызвать волну дешевого импорта, что приведет к ущемлению интересов отечественных производителей и усугубит недовольство сельского населения, которое и без того уже кипит по всему континенту. Еще сильнее сопротивление со стороны экологов: критики утверждают, что соглашение поощряет вырубку лесов и низкие стандарты труда, что ставит климатическую политику Германии в прямое противоречие с ее торговыми амбициями.\n\nПравительство теперь стоит перед выбором между стратегической торговлей и политической стабильностью внутри страны. Подписание соглашения укрепляет экономическое влияние Германии за рубежом, но рискует вызвать внутреннюю бурю, которую она может не суметь контролировать."
 germany.356.a: "Подписать Сделку."
 germany.356.b: "Слишком рискованно, отклонить."

 germany.400.t: "Президентские Выборы 2027 Года"
 germany.400.d: "Победителем является..."
 germany.400.a: "Норберт Ламмерт от ХДС"
 germany.400.b: "Альбрехт Глазер от АдГ"

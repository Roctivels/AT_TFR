 GER_antiquated_legal_system_dynamic: "Устаревшая Правовая Система"
 GER_antiquated_legal_system_dynamic_desc: "В "старые добрые времена" правовая система как в Германской империи, так и в Священной Римской империи пользовалась высоким уважением, хотя и только у знати.\n\nЕго возвращение обеспечивает удовлетворение высших классов немецкого общества, однако не обходится без собственной доли заминок.\n\nДревние законы не выдержали испытания временем, и низшие классы немецкой нации постоянно находятся в правовом конфликте из-за отсутствия у них надлежащего ознакомления с этими законами, так что это только вопрос времени, когда граждане устанут от своей нежелательной знати.Повторное введение старых законов, несомненно, приведет к тому, что немецкая нация погрузится в ностальгию и неравенство, но правящий класс это не волнует, он устраивает пышные вечеринки, сидя в своих собственных башнях из слоновой кости.\n\nЕсть некоторые вещи, которые никогда не меняются."
 GER_great_reset_dynamic: "Великая Перезагрузка"
 GER_european_military_dynamic: "Европейская Армия"
 GER_sepratism_dynamic: "Европейский Сепаратизм"
 GER_into_post_capitalism_dynamic: "В Посткапитализм"
 GER_into_post_capitalism_dynamic_desc: "Революция преуспела в достижении своих первоначальных целей - уничтожении непосредственной буржуазно-капиталистической угрозы, но теперь мы идем дальше. Мы выводим Германию на действительно посткапиталистическую стадию развития. Социалистические революции прошлого были связаны с тем, что в обществе все еще сохранялись капиталистические элементы, которые мы стремительно искореняем. Частное предпринимательство, спекуляция, жалкий мотив прибыли, "свободные" рынки - эти скрытые, но все еще заметные капиталистические элементы с каждым днем исчезают под влиянием наших активных и энергичных усилий по перестройке национальной экономики. Скоро то, что было при капитализме, станет для людей все более далеким воспоминанием."
 GER_mass_catharsis_dynamic: "Катарсис"
 GER_mass_catharsis_dynamic_desc: ""То, что Аристотель называл словом катарсис — «очищение через переживание». Этому явлению свойственен мощный эмоциональный взрыв и психологический шок, вызванный переживанием новой истины и осязанием скрытых сторон действительности. Его результат — нравственное перерождение человека" - Николай Дыбовский"

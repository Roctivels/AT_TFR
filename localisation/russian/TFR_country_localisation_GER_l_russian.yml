 GER_expand_welfare_desc: ""
 GER_economic_stabilization: "Экономическая Стабилизация"
 GER_economic_stabilization_desc: ""
 GER_increase_federal_income: "Увеличить Федеральный Доход"
 GER_increase_federal_income_desc: ""
 GER_integrate_the_refugees: "Интегрировать Беженцев"
 GER_integrate_the_refugees_desc: "Вместо того чтобы выгонять беженцев, как собак, мы будем интегрировать их в наше общество, прививая им немецкие ценности, социальные нормы и законы. Таким образом, мы добьемся того, чтобы коренные немцы и приезжие чувствовали себя комфортно в присутствии друг друга, а не увековечивали бессмысленную враждебность."
 GER_keep_the_rhine_red: "Сохранить Рейн Красным"
 GER_keep_the_rhine_red_desc: ""
 GER_raise_the_minimum_wage: "Повысить Минимальную Зарплату"
 GER_raise_the_minimum_wage_desc: "Ни один немецкий рабочий не должен бороться за достойную жизнь. В условиях роста цен и экономической нестабильности, угрожающих средствам к существованию миллионов граждан среднего и низкого класса, СДПГ предпримет решительные действия, повысив минимальную заработную плату, чтобы обеспечить справедливую оплату труда для всех. Эта реформа - не просто экономическая мера; она подтверждает нашу непоколебимую приверженность социальной справедливости. Дальнейшее укрепление государства всеобщего благосостояния и гарантирование прожиточного минимума для работников заложит основу для справедливого общества, в котором процветание делится, а не присваивается. Германия в очередной раз докажет, что экономический рост и социальная ответственность - это далеко не противоположные силы, а партнеры по прогрессу."
 GER_the_invisble_hand_over_germany: "Победа Невидимой Руки"
 GER_the_invisble_hand_over_germany_desc: "Германия была сердцем современного либерализма, и пока мир погружается в безумие, необходимо выбрать голос здравомыслия, чтобы возглавить Германию, голос либералов, и нет лучшего народа для этой задачи, чем Свободная демократическая партия, хотя другие могут не согласиться, их политика контроля и манипулирования рынком сделала нашу гибель более близкой, чем нам хотелось бы, и поэтому есть только один верный путь вперед и один руководящий принцип. Невидимая рука рынка снова приведет нас к разумному величию."
 GER_encourage_competition: "Поощрять Конкуренцию"
 GER_encourage_competition_desc: "Конкуренция порождает инновации и играет важнейшую роль в регулировании цен. Финансируя малый бизнес, мы противостоим монополизации рынка крупными компаниями и способствуем росту мелких игроков, создавая тем самым более широкий промышленный ландшафт. Малый и средний бизнес был хлебом и маслом немецкой экономики, пока "рай для трудящихся" не заставил их закрыть магазины. Регулирование и налоги работают на устоявшиеся, крупные конгломераты и иностранные компании. А вот на местный магазинчик - не очень."

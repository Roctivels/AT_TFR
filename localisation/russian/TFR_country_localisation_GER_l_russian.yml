l_russian:
 #Leaders
 #Focuses
 GER_rethinking_german_militarism: "Переосмысление Немецкого Милитаризма"
 GER_rethinking_german_militarism_desc: ""
 GER_aim_for_energy_independence: "Стремление к Энергетической Независимости"
 GER_aim_for_energy_independence_desc: "Германия уже давно импортирует большую часть энергоносителей, а именно природный газ и нефть, из Российской Федерации, к неудовольствию наших союзников, особенно Соединенных Штатов, которые рассматривали эту зависимость как рычаг для захвата Россией.\n\nБольше такого не будет.\n\n Развивая производство синтетической нефти, импорт из Румынии и создавая собственные надежные источники энергии, мы сможем пережить следующую зиму без российской торговли."
 GER_energy_autarky: "Энергетическая Автаркия"
 GER_energy_autarky_desc: "Германия известна как крупный мировой экспортер автомобилей и станков. Она также является нетто-экспортером электроэнергии в несколько разных стран, однако это вызвало у нас немалую нагрузку, и из-за этого у нас нет другого выбора, кроме как серьезно ограничить, если не полностью прекратить наш экспорт энергии.\nНаши импортеры будут недовольны, но мы предпочли бы их недовольство, чем заставлять наших граждан жить в холодной темноте."
 GER_look_for_alternative_partners: "Поиск Альтернативных Партнеров"
 GER_look_for_alternative_partners_desc: "Мы долгое время были близки с Западом и американцами, но в связи с последними изменениями в мировой политике мы должны попытаться исправить испорченные отношения с другими странами, такими как Иран и Венесуэла.\n\nСлишком долго американцы решали за нас, и в связи с надвигающейся угрозой необратимых изменений лучше подготовиться к худшему и создать новые партнерства, чтобы сохранить наши запасы ресурсов в любом будущем кризисе."
 GER_bulwark_of_democracy: "Оплот Демократии"
 GER_bulwark_of_democracy_desc: ""
 GER_expand_wilhelmshaven_refineries: "Расширить Нефтеперерабатывающие Заводы"
 GER_expand_wilhelmshaven_refineries_desc: "Наши нефтеперерабатывающие заводы в Вильгельмсхафене - одни из немногих отечественных запасов нефти, и благодаря гражданской войне в Саудовской Аравии мы уже не будем импортировать нефть, как раньше. Было бы глупо не поддерживать и не использовать эти нефтеперерабатывающие заводы в Вильгельмсхафене. Нефть имеет решающее значение для повседневной жизни, и она нужна нам для того, чтобы иметь хоть какую-то возможность защитить Европу, а также для того, чтобы наши политики могли ездить на работу. Когда мы расширим наши нефтеперерабатывающие заводы, мы продолжим движение вперед по пути восстановления."
 GER_placate_the_russians: "Умиротворить Русских"
 GER_placate_the_russians_desc: "Хотя наши дипломатические отношения с русскими стали, мягко говоря, напряженными, русские обладают беспрецедентным количеством денег и сырьевых ресурсов, и было бы глупо не урвать от них хоть кусочек. Хотя русские, скорее всего, испытывают к нам такое же отвращение, как и мы к ним, они по-прежнему открыты для деловых отношений с Европой. Чтобы немецкая экономика оставалась в хорошем положении, в наших интересах хотя бы наладить контакты с русскими и попытаться сохранить с ними здоровые деловые отношения."
 GER_revitalize_the_autobahns: "Оживить Автобаны"
 GER_revitalize_the_autobahns_desc: "Автобаны - это важная и часто используемая система автомагистралей, доступ к которой контролируется правительством Германии. Несмотря на значимость автобанов для немецкой торговли и путешествий, они используются так часто, что пришли в состояние легкого запустения. Но в условиях назревающих конфликтов в Азии и Америке, а также сокращения объемов мировой торговли, мы должны использовать этот перерыв, чтобы поднять автобаны и привести их в идеальное состояние. Германия была построена благодаря продуманной инженерии и великолепной инфраструктуре, и мы должны поддерживать этот статус, который мы по праву заслужили."
 GER_eurail_modernization: "Модернизация Eurail"
 GER_eurail_modernization_desc: "Eurail используют миллионы людей, чтобы путешествовать по европейскому континенту; он доступен и полезен. Но, к сожалению, он отстает от конкурентов и начинает показывать свой возраст. По мере того как рельсы приходят в негодность, растет и общественное мнение о Eurail. Пришло время положить этому конец. Мы обратимся к Европейскому парламенту с призывом направить финансирование на Eurail, и Eurail вернет себе место одной из величайших железнодорожных систем на планете."
 GER_halt_nordstream_2: "Остановить "Северный поток-2""
 GER_halt_nordstream_2_desc: "NordStream 2 должен был стать вторым газопроводом из России в Германию, снабжающим ее природным газом. На какое-то время этот трубопровод помог нам, обеспечил русским финансовую компенсацию и снабдил нас жидким золотом, которое питает все сферы жизни в Германии. Но с течением времени русские стали действовать все более агрессивно, и теперь они начинают угрожать нашим союзникам, что недопустимо! Учитывая стремительно ухудшающиеся дипломатические отношения между нами и русскими, настало время отказаться от этого проекта, заплатить нашим рабочим и отпустить их домой."
 GER_negotiate_with_opec: "Вести переговоры с ОПЕК"
 GER_negotiate_with_opec_desc: "Саудовская Аравия погрузилась в разрушительную гражданскую войну. Не видя конца войне, ОПЕК потеряла одного из своих важнейших членов и оказалась в сложном положении. Кроме того, их соглашение с Соединенными Штатами, похоже, окажется бесполезным, поскольку страну поглощают гражданские беспорядки и раздоры. Несмотря на это, остальные страны-члены ОПЕК по-прежнему контролируют огромные запасы нефти, которые они заинтересованы продать. Крайне важно использовать эту возможность в своих интересах и убедить их заключить с нами сделку. Благодаря этому мы сможем выйти из нефтяного кризиса."
 GER_north_sea_oil_expedition: "Нефтяные Экспедиции в Северном море"
 GER_north_sea_oil_expedition_desc: "Северное и Балтийское моря стали предметом спекуляций относительно того, сколько нефти они содержат. Однако идея о том, что в этих двух морях есть нефть, не лишена оснований. Например, несколько лет назад поляки нашли нефть в Балтийском море, и теперь месторождение B8 составляет 3 % их добычи нефти. Учитывая этот факт, в наших интересах будет отправить экспедицию в Северное море и прилегающие районы и поискать нефть. Если мы найдем нефть в Северном море, то сможем и дальше снабжать немецкий народ нефтью."
 GER_revive_the_german_coal_industry: "Возродить Немецкую Угольную Промышленность"
 GER_revive_the_german_coal_industry_desc: "Пока продолжается нефтяной кризис, мы не можем позволить себе вкладывать деньги, которых у нас нет, в экспериментальные и неэффективные возобновляемые источники энергии, такие как ветер и солнце. Атомная энергия тоже не вариант, история доказала, что атомные электростанции - это смертельные ловушки, которые только и ждут, чтобы убить людей. Остается только уголь, и хотя уголь и близко не похож на экологически чистый источник энергии, он дешев и является хорошо развитой отраслью в Германии. Мы должны поддержать угольную промышленность и расширить ее. Благодаря этому энергетические потребности немцев будут удовлетворены."
 GER_the_green_alternative: "Зелёная Альтернатива"
 GER_the_green_alternative_desc: "Давайте воспользуемся моральным правом и решим сразу две проблемы: расширив ветряные и солнечные электростанции по всей Германии, мы сохраним окружающую среду чистой и одновременно расширим наши внутренние энергетические ресурсы. Хотя это может означать временную нехватку энергии, поскольку мы закрываем менее чистые электростанции, это того стоит."
 GER_secure_eu_interests: "Защита Интересов ЕС"
 GER_secure_eu_interests_desc: "У Европейского союза есть интересы за рубежом, и мы должны обеспечить их безопасность. Необходимо обеспечить торговые сделки по поставке каучука, нефти и других жизненно важных материалов для гражданского и военного производства. Наш дипломатический вес за рубежом помог нам не только обеспечить безопасность этих жизненно важных материалов для себя, но и для всего ЕС."
 GER_invest_in_synthetic_oils: "Инвестироваться в Синтетические Масла"
 GER_invest_in_synthetic_oils_desc: "Когда Аравийский полуостров охвачен пламенем, наши поставки сырой нефти стали резать как масло. Теперь мы столкнулись с энергетическим кризисом, подобного которому Германия еще не видела. Для того чтобы выйти из этого кризиса, у нас есть очень мало вариантов. Один из вариантов - синтетическая нефть - более эффективен, чем все остальные. Синтетическая нефть, наша жизненная сила, - наша единственная реальная возможность наладить внутренние поставки нефти. Мы должны обязательно инвестировать в новые синтетические компании, причем не только для производства масел, но и для производства пластмасс и других материалов."
 GER_increase_the_oil_reserve_supply: "Увеличить Запасы Нефти"
 GER_increase_the_oil_reserve_supply_desc: "Без нефти наша армия не сможет обеспечить себя топливом. Без нефти наш народ лишится возможности поддерживать экономику. Современный мир вращается вокруг нефти.\nС крахом Саудовского государства потребность в нефти растёт с каждым днём. Этот спрос просто не покрывается нашими нынешними резервами. Для решения этой проблемы мы расширим наш резерв на случай чрезвычайных ситуаций - в кризисные времена каждый день на счету."
 GER_rethink_free_trade: "Переосмыслить Свободную Торговлю"
 GER_rethink_free_trade_desc: "Свободная торговля на протяжении последних десятилетий приносила нашей стране огромное процветание, но в последние годы глобальный порядок начал меняться. Америка начинает разваливаться на части, судьба Азии стоит на острие ножа, и мы тоже должны измениться, чтобы не впасть в ту же нестабильность, что и весь остальной мир. Старый порядок мира пошатнулся и вскоре может рухнуть. Мы должны серьезно пересмотреть свободную торговлю. Как только мы это сделаем, мы будем уверены, что не падем вместе с ним."
 GER_support_the_manufacturing_industry: "Поддержка Обрабатывающей Промышленности"
 GER_support_the_manufacturing_industry_desc: "Немецкое производство было жизненной силой Германии со времен первого канцлера Аденауэра. Наши производители пострадали от резкого падения фондовых рынков на фоне пандемии, и мы должны сделать все возможное, чтобы наши собственные рынки не рухнули. Отвлекая средства, мы можем не только поддержать, но и расширить наши производственные возможности, чтобы удовлетворить потребности наших соседей."
 GER_ensure_domestic_stability: "Обеспечить Внутреннюю Стабильность"
 GER_ensure_domestic_stability_desc: "Стабильность на внутреннем фронте - вещь непростая. Мы должны дать BfV добро на преследование лидеров протестов, чтобы хотя бы на время сдержать наплыв протестов со стороны экстремистов и оппозиционных партий.\n\nНаша политика поддержки и расширения производства, безусловно, окупится, и со временем буря прекратится сама собой."
 GER_bolster_the_service_economy: "Способствовать Развитию Экономики Услуг"
 GER_bolster_the_service_economy_desc: "С начала 2020 года мировая экономика деградирует беспрецедентными темпами, а безработица и бедность стремительно растут вместе с ней. Теперь, после нефтяного кризиса, эта статистика только начала расти. Мы должны немедленно остановить этот стремительный рост, и для этого мы будем финансировать рабочие места, связанные с обслуживанием. Ресторанные сети, гостиницы и многое другое будет поддерживаться нашей страной. Это поможет снизить уровень безработицы и на некоторое время удержать семьи и людей низшего класса от разорения."
 GER_reverse_the_nuclear_phase_out: "Отменить Поэтапный Отказ от Атомной Энергетики"
 GER_reverse_the_nuclear_phase_out_desc: "Отказ от атомной энергии стал полной и окончательной катастрофой для нашей страны. Конечно, нельзя отрицать, что атомная энергия принесла много разрушений нашей планете в результате таких ужасных аварий, как Чернобыльская и Фукусимская. Но также важно признать, что подобные происшествия не только редки, но и часто являются следствием человеческой ошибки, недостатков конструкции или отсутствия надлежащего регулирования безопасности, в то время как мы поддерживаем максимальную безопасность на наших объектах. Зелёные не хотят этого признавать, но атомная энергетика - это мощный и надежный вид энергии, и мы должны обратить вспять этот катастрофический отказ от нее, пока он не нанес еще больший ущерб нашей экономике."
 GER_increase_renewable_subsidies: " Субсидии на Возобновляемые Источники Энергии"
 GER_increase_renewable_subsidies_desc: "Наша Земля истощается, ее ресурсы исчерпываются. Ярким примером этого является хаос, вызванный простым снижением экспорта нефти. Однако возобновляемые источники энергии не исчерпываются, как нефть, не наполняют наш воздух смогом, как уголь, и не являются авариями, ждущими своего часа, как атомная энергетика. По мере того как будут закрываться последние ядерные реакторы, нам понадобится все больше солнечных батарей и ветряных электростанций, чтобы заполнить брешь, образовавшуюся после прекращения производства. В конце концов, мы не только догоним по объему производства наши старые объекты, но и превзойдем их. Благодаря этим источникам возобновляемой энергии мы обеспечим энергией нашу страну на несколько поколений вперед!"
 GER_focus_on_flood_reconstruction: "Сосредоточиться на Восстановлении После Наводнения"
 GER_focus_on_flood_reconstruction_desc: "Рейнские наводнения опустошили города, расположенные вокруг реки, миллионы долларов ущерба остались без внимания нашего правительства, что совершенно недопустимо. Мы не можем допустить, чтобы наши самые густонаселенные и промышленно ценные города и дальше страдали от этих наводнений. Мы полностью посвятим себя восстановлению городов Рейнской области. Мы будем восстанавливать не только наши промышленные предприятия, но и добрых немецких людей, оказавшихся в плену наводнения."
 GER_the_digital_revolution: "Цифровая Революция"
 GER_the_digital_revolution_desc: "Невозможно преуменьшить, насколько важными стали микрочипы для всех сторон жизни общества за последние несколько десятилетий. Технологии и все их аспекты были важны для мира на протяжении всей истории человечества, но по сравнению с сегодняшним днем технологии достигли новых высот в плане важности. Наша технологическая отрасль отстала, и с этим пора кончать. Чтобы защитить Европу и Германию, мы не можем позволить этому продолжаться. Мы увеличим финансирование технологических стартапов и иностранных экспертов в геометрической прогрессии, и мы догоним конкурентов."
 GER_EV_subsidies: "Субсидии Электроавтомобилей"
 GER_EV_subsidies_desc: "Газовые автомобили уже давно стали маяками загрязненного прошлого. Они потребляют невозобновляемую нефть, а затем выплевывают смог, который загрязняет нашу атмосферу при сжигании этой нефти. Слишком долго мы позволяли компаниям, производящим электромобили, падать в минус и отставать от газовых автомобилей. Теперь, в условиях дефицита нефти, у нас есть возможность заставить людей покупать больше электромобилей, чем когда-либо. Мы поддержим индустрию электромобилей и, как следствие, расширим их производство. И таким образом мы покроем новый спрос на автомобили."
 GER_sponge_cities_program: "Программа "Губчатые Города""
 GER_sponge_cities_program_desc: "Наши города, расположенные вдоль Рейна, испытывают проблемы с наводнениями во время особенно влажных сезонов, и надо сказать, что Рейн - очень густонаселенный регион.\n\nЭти наводнения затрагивают миллионы людей, и нельзя допустить, чтобы это продолжалось и дальше, рытье канав и создание дамб не поможет, нам нужно инвестировать в то, чтобы сделать наши города более пористыми, что это значит? Мы сделаем их более мягкими, способными впитывать воду, наши стоки всегда переполнены, но если бы мы использовали естественную способность природы впитывать воду, мы могли бы создать естественную защиту от наводнений. Сажайте деревья. Больше парков. Замените нынешние дороги на проницаемый асфальт, который будет пропускать воду. Больше зелени в наших городах - значит, меньше воды в наших домах! Wunderbar!"
 GER_a_green_future: "Зелёное Будущее"
 GER_a_green_future_desc: "Германия - пионер в области возобновляемых источников энергии, и не только Германию, но и весь мир ждет большое зеленое будущее. Изменение климата - это не только самая большая угроза для Земли, но и самая большая угроза для будущего человечества. Возобновляемые источники энергии позволят остановить добычу нефти и угля на Земле, предотвратить загрязнение воздуха смогом и наших рек отходами. Природная красота Германии - это то, на что стоит посмотреть, и уничтожать ее, бесконечно добывая ограниченные ресурсы, - это позор. Зеленый цвет - это золото, а безопасное будущее - это зеленое будущее!"
 GER_lift_venezuelan_sanctions: "Отменить Венесуэльские Санкции"
 GER_lift_venezuelan_sanctions_desc: "Венесуэла располагается на одном из самых богатых нефтяных месторождений в мире. Но, несмотря на огромные запасы нефти, она подвергается жестким санкциям со стороны нас и наших союзников. В условиях продолжающегося нефтяного кризиса мы столкнулись с экономическим кризисом, который угрожает средствам к существованию наших граждан и богатству нашей страны, и для того, чтобы получить хоть какой-то шанс на возвращение, нам необходимо добыть нефть любыми способами. Как говорится, отчаянные времена требуют отчаянных мер. Мы должны снять санкции с Венесуэлы и протянуть оливковую ветвь ее правительству, чтобы получить хотя бы небольшой кусок их огромных запасов нефти. Если они примут наше предложение, то мы продолжим путь к восстановлению."
 GER_back_the_arabian_republic: "Поддержать Аравийскую Республику"
 GER_back_the_arabian_republic_desc: "С 1933 года Саудовская Аравия находится под властью деспотичной семьи Саудов. Но времена изменились, и некогда непобедимая королевская семья начала давать трещины. Эти трещины вскоре превратились в каньоны, так как после смерти стареющего короля Саудовская Аравия погрузилась в гражданскую войну. Но этот хаос открывает новые возможности: демократическая Саудовская Аравия. В гражданской войне в Саудовской Аравии есть фракция, которая разделяет наши ценности. Как один из лидеров демократического мира, мы обязаны оказать помощь этим борцам за свободу; не только ради нефти, но и ради идеи свободной Саудовской Аравии."
 GER_the_armenian_gambit: "Азербайджанский Гамбит"
 GER_the_armenian_gambit_desc: "Азербайджан находится рядом с Россией, но у них очень много нефти. Мы не в первый раз пытаемся отправиться в Баку за нефтью, но в этот раз давайте оставим винтовки дома, а возьмем с собой евро и хорошо сшитые костюмы! Это большой риск - дать ОДКБ еще больше рычагов влияния на нас, но если это нужно Европе, значит, это нужно Европе."
 GER_free_the_markets: "Освободить Рынки"
 GER_free_the_markets_desc: "На протяжении большей части нашей современной истории нормативные акты только мешали инновациям и развитию. Эти законы и приказы действуют подобно паутине, опутывая предпринимателей и компании ненужной бюрократией и судебными разбирательствами. А с учетом недавнего превращения Китая в мировую фабрику мы скоро останемся позади, если не предпримем кардинальных изменений. СДПГ и Die Linke будут протестовать, кричать и вопить, но они будут бессильны остановить неизбежное. Их программы и цели меркнут по сравнению с самим будущим нашей экономической мощи."
 GER_negotiate_with_the_iranians: "Переговоры с Ираном"
 GER_negotiate_with_the_iranians_desc: "Нефтяная промышленность Ирана - одна из старейших в мире, и она является краеугольным камнем их экономики. В то время как наша нефтяная промышленность по сравнению с ними мала и неопытна. У нас были плохие отношения с Ближним Востоком и особенно с иранцами. Но, как и многим нашим бывшим противникам, нам придется зарыть топор войны ради обеспечения нашего экономического здоровья. Несколько посланий и встреч, которые помогут сгладить наши разногласия, и мы, несомненно, достигнем соглашения с иранцами о торговле нефтью."
 GER_a_united_european_vision: "Единое Европейское Видение"
 GER_a_united_european_vision_desc: "Европа как единое государство долгое время считалась безумной. Но с падением Америки и ростом угрозы со стороны России стало ясно, что Германия в одиночку - ничто, Франция в одиночку - ничто, Италия в одиночку - ничто, но вместе? Мы - все и даже больше. Давайте продвигать идею действительно единой Европы, когда-нибудь она может стать реальностью."
 GER_europe_united: "Объединенная Европа"
 GER_europe_united_desc: ""

 GER_support_western_industry_desc: ""
 GER_restrict_immigration: "Ограничить Иммиграцию"
 GER_restrict_immigration_desc: "Слишком долго Отечество было игровой площадкой для иностранных мигрантов. Наша культура игнорировалась, наши ценности высмеивались, а наши дети чувствовали себя чужими на своей собственной земле. Пришло время предпринять смелые шаги, которых боялись правительства прошлых лет. Мы введем строгие ограничения на иммиграцию и пересмотрим определение гражданства, чтобы сохранить наследие и будущее Германии."
 GER_calm_down_the_radicals: "Утихомирить Радикалов"
 GER_calm_down_the_radicals_desc: "С момента своего основания АдГ боролась с негативным общественным имиджем, и такие люди, как Бьёрн Хёке, определенно не способствовали этому. Теперь, когда мы пришли к власти, как никогда важно модернизировать наш имидж, чтобы улучшить наше положение в остальной Германии и, надеемся, закрепить наш мандат на следующие четыре года."
 GER_all_on_our_own: "Сами по Себе"
 GER_all_on_our_own_desc: "АдГ всегда была оплотом против массовой иммиграции и глобализма в Германии! Мы никогда не противились давлению элиты, никогда! Теперь, когда мы наконец-то у власти, у нас есть шанс положить конец хаосу в Германии. Мы не должны поддаваться элите!"
 GER_germany_above_all: "Германия Превыше Всего"
 GER_germany_above_all_desc: "Впервые за долгие годы у нас наконец-то появилось правительство, которое ставит Германию на первое место! Не Европа или что-то в этом роде! Немецкий народ слишком долго был вынужден подчиняться глобализму! Теперь под нашим правлением Германия наконец-то снова будет процветать, а немецкий народ снова вернет себе свою гордость!"
 #Post-NATO War
 GER_army_of_the_future: "Военные Будущего"
 GER_army_of_the_future_desc: "Бундесвер доказал, что технологическое превосходство, мобильность и разведка - главные составляющие нашей победы. Мы не можем успокаиваться, мы должны продолжать маршировать и развивать наши доктрины даже с головой медведя на мантии. Военные сейчас гордятся своей мощью, и народ это поддерживает. Заручиться поддержкой для дальнейшей модернизации теперь будет не так сложно."
 GER_defend_the_land: "Защита Земли"
 GER_defend_the_land_desc: "В начале войны нам было нелегко удерживать позиции. Пересмотр тактики и стратегического планирования спас нас от поражения, поскольку мы заново научились использовать броню в обороне. Научившись модернизировать полевые укрепления с учетом дронов, мы сможем с легкостью отражать будущие наступления."
 GER_lessons_from_nato_war: "Уроки Европейской Войны"
 GER_lessons_from_nato_war_desc: "Европейская война научила нас тому, что мы и так знали: сражаться на Великой европейской равнине - сущий ад, но она научила нас и многому другому! Современная война - это баланс гибкости, технологий и ресурсов. Самая разрушительная оптика и боеприпасы требуют тонких материалов и точного производства, у русских была электронная война, они переработали свою бронетанковую доктрину, интегрировали беспилотники, а мы отставали, несмотря на более новое оружие, обмундирование, броню. Мы отставали в доктринальном мышлении. Русские научили нас многому, и мы надеемся, что следующий урок мы сможем провести сами."
 GER_mechanized_warfare: "Механизированная Война"
 GER_mechanized_warfare_desc: "Механизированная пехота - неотъемлемая часть будущего войны, мы всегда это знали, но ничто так не доказывало это, как война в Европе. Пехота больше не справляется в одиночку, она слишком медлительна, чтобы избежать поражения, если не сможет удержать свои позиции. Механизированная пехота позволяет нашим людям получить поддержку и быть гибкими на поле боя, землю можно легко отдать и так же быстро вернуть при правильной концентрации вооружений."
 GER_maneuver_wafare: "Маневренная Война"
 GER_maneuver_wafare_desc: "Мобильность и гибкость - единственное, что имеет значение на поле боя. Ваше снаряжение может быть модным, новым, сложным, но без правильной подготовки вас переиграет меньшая, плохо оснащенная сила, которая может двигаться слаженно. Правильное снаряжение облегчает эту задачу: надежная дальняя связь, надежные транспортные средства, интегрированные боевые системы, обеспечивающие оперативную информацию с поля боя прямо в руки каждому командиру отряда. С помощью спутниковой разведки вы узнаете, где и как можно маневрировать. Каждый маневр планируется информационной сетью, чьи движущиеся части находятся за десятки тысяч километров друг от друга, но приводят к точным маневрам, которые заставляют играть своеобразный оркестр. Симфония шестеренок и крови."
 GER_SOF_expansion: "Расширить ССО"
 GER_SOF_expansion_desc: "Спецназ - это постоянно развивающийся элемент современной войны, играющий важнейшую роль в проникновении, диверсиях на объектах инфраструктуры противника, а также в тайных операциях по захвату и спасению. Несмотря на их стратегическую важность, наше подразделение спецназа испытывает острую нехватку средств и нуждается в улучшении. Чтобы повысить нашу готовность к предстоящему конфликту, совершенно необходимо расширить наше нынешнее отделение ССО."
 GER_redefine_german_logistics: "Пересмотреть Немецкую Логистику"
 GER_redefine_german_logistics_desc: "Логистика - самая важная часть любой армии: техника должна дойти до бойцов, запчасти для ее починки, боеприпасы, а в эпоху маневренных войн логистика никогда не была такой сложной. Точное знание местонахождения бойцов требует надежной системы мониторинга и отчетности, доставка необходимых припасов требует скорости, чтобы не допустить потери боеспособности подразделения при прорыве или отступлении. Мы должны полностью перестроить нашу систему снабжения, чтобы она отвечала современным потребностям мобильных механизированных войск, способных беспрепятственно преодолевать 200 километров в день."
 GER_drone_r_d: "НИОКР беспилотников"
 GER_drone_r_d_desc: "За последние несколько десятилетий появилась альтернатива атакам на позиции противника без единой потери: беспилотники. Мы должны инвестировать в эту новую технологию, чтобы овладеть искусством беспилотных атак, а также узнать о тонкостях этой интригующей формы ведения войны, чтобы убедиться, что мы знаем, как ответить на атаку вражеского дрона."
 GER_ai_development_race: "Гонка за Развитием ИИ"
 GER_ai_development_race_desc: "ИИ - это не просто общение с вымышленными персонажами, задавание нелепых вопросов или попытки заставить его делать то, что он не должен. ИИ - это логическая машина, машина, которая думает. Машина, которая за секунду обрабатывает данные из миллиардов источников и выдает решение. В экономическом планировании, военном планировании, даже в государственной службе искусственный интеллект может сыграть жизненно важную роль в совершенствовании этих областей, и мы не можем оставаться в стороне, пока этот запретный плод висит на дереве. Нас предупреждают о его опасности, но мы мечтаем о его преимуществах. Мы должны довести дело до конца."
 GER_faith_in_the_ai: "Вера в ИИ"
 GER_faith_in_the_ai_desc: "ИИ доказал свою эффективность как на поле боя, так и в повседневной жизни. В результате в командовании ВВС возник важнейший вопрос: стоит ли заменять пилотов-людей системами, управляемыми ИИ? Это позволило бы не только значительно сократить потребность в рабочей силе, но и снизить высокие расходы, связанные с обучением пилотов."
 GER_faith_in_the_pilot: "Вера в Пилота"
 GER_faith_in_the_pilot_desc: "Пилот всегда был важнейшим компонентом ВВС. Учитывая, что технология искусственного интеллекта все еще находится на относительно ранней стадии развития, командование ВВС пришло к выводу, что лучше всего сохранить пилотов-людей не только для предотвращения таких инцидентов, как дружественный огонь, но и для того, чтобы избежать сложностей в обслуживании и лишних расходов, связанных с системами искусственного интеллекта."
 GER_defend_the_skies: "Защита Небес"
 GER_defend_the_skies_desc: "Во время европейской войны многочисленные российские бомбардировщики нарушали наше воздушное пространство, к сожалению, им удалось разбомбить несколько наших городов и разрушить ключевые объекты промышленной инфраструктуры. Чтобы предотвратить подобные вторжения в будущем, мы должны сделать значительные инвестиции в радарные системы и существенно усилить наши возможности по противовоздушной обороне."
 GER_increase_weapon_leathality: "Улучшите Смертоносность Тайфуна"
 GER_increase_weapon_leathality_desc: "Во время европейской войны "Тайфун" сыграл решающую роль в предотвращении бомбардировок наших позиций русскими самолетами. Однако с быстрым развитием технологий мы должны усовершенствовать конструкцию "Тайфуна", чтобы эффективно противостоять будущим, более смертоносным российским воздушным угрозам."
 GER_united_and_undefeated: "Единые и Непобедимые"
 GER_united_and_undefeated_desc: "Хотя борьба была тяжелой, а Европа лежит в руинах, теперь мы можем вздохнуть с облегчением. Победа за нами! Европейская война потрясла Германию до глубины души. Она испытала нашу силу, нашу стойкость и наше единство против величайшей угрозы, с которой мы когда-либо сталкивались. Против ревущего шторма мы и Европа выстояли перед натиском русской тирании. После победы над восточным врагом наш храбрый бундесвер превратился в одну из самых боеспособных армий в мире. Запад одерживает победу, а Германия стоит во главе новой европейской эры.\n\nНо работа только началась. Настало время восстановить наше влияние и перестроить Европу. После войны Союз стал более единым, чем когда-либо прежде, и мы являемся его бесспорным лидером. С нашей твердой рукой на руле, с Америкой в огне, мы займем свое законное место лидера свободного мира. Бундесвер станет опорой европейской стабильности, и мы обеспечим всем народам мира возможность жить в мире, свободном от авторитаризма и деспотий. Теперь мы поведем не только свой народ, но и весь континент к эре прочного мира, процветания и могущества. Haltet aus im Sturmgebraus!"
 GER_support_digital_democracy: "Поддержать Цифровую Демократию"
 GER_support_digital_democracy_desc: ""
 GER_bid_for_kaliningrad: "Заявка на Калининград"
 GER_bid_for_kaliningrad_desc: "Европа будет смотреть на нас косо, но Калининград - это не просто порт с теплой водой, это бывшая столица нашего объединителя. Все, что осталось от Пруссии, - это... ничего особенного. Берлин почти ничем не напоминает своего бывшего тезку, а сама Пруссия была полностью колонизирована советскими усилиями, чтобы ослабить нас или даже просто наказать. Калининград должен снова стать Кенигсбергом. У Литвы или Польши есть более веские географические аргументы, чтобы получить его, но у нас есть единственный культурный. Если мы сможем наконец вернуть столицу нашего объединителя, мы сможем вернуть себе часть нашей души."
 GER_caucaus_peacekeeping_mission: "Миротворческая Миссия на Кавказе"
 GER_caucaus_peacekeeping_mission_desc: "Горская республика вскоре после своего создания впала в гражданскую войну. Мы недооценили, а может, и решили, что русские пошутили насчет исламского экстремизма в этом регионе, но чеченцы оказались на удивление упорной группой. Мы должны обуздать вахабистскую угрозу, пока она не превратилась в новую восточную проблему, с которой нужно бороться. Или, что еще хуже, инструментом, с помощью которого Россия сможет оправдать свои завоевания."
 GER_propup_kuban_industry: "Поддержать Житницу России"
 GER_propup_kuban_industry_desc: "Плодородная земля Кубани была украдена Россией несколько десятилетий назад и использовалась ею по праву. Однако под их оккупацией эта земля не видела ни дневного света, ни пламени свободы, ни надежды. Именно с помощью наших клинков свободы мы прорвали эту огромную тень, называемую Россией, над ними и дали им права и демократию, которых они так жаждали. Теперь, обретя свободу, мужчины и женщины этой процветающей страны могут использовать богатую почву под ногами для себя, а не для олигархов в Москве."
 GER_support_caucasian_minority: "Государственное Строительство в Построссийских Странах"
 GER_support_caucasian_minority_desc: "На протяжении десятилетий кавказские народы находились под российской оккупацией. До нашего вмешательства их природные ресурсы и земли были отняты у них русским медведем. После поражения Россия потеряла большую часть своей былой гордости и гнева. Медведь лежит безжизненный, лишенный былой жизненной силы, которой когда-то обладала эта нация. Когда русский медведь затих, кавказцы восстали и вернули себе свою землю, и наконец-то их судьба будет определена ими самими. Если мы не поддерживаем их свободу, их демократию и их процветание, как мы смеем называть себя носителями факела свободы?"
 GER_reopen_russian_relations: "Возобновить Отношения с Россией"
 GER_reopen_russian_relations_desc: ""
 GER_accept_ukraine_into_eu: "Принять Украину в ЕС"
 GER_accept_ukraine_into_eu_desc: ""
 GER_veterans_benefit_program: "Программа Льгот Ветеранам"
 GER_veterans_benefit_program_desc: ""
 GER_ukrainian_belarus_cooperation: "Украинско-Белорусское Сотрудничество"
 GER_ukrainian_belarus_cooperation_desc: "Украина и Беларусь - две израненные снарядами страны, получившие худшие последствия Первой и Второй мировых войн, а теперь и нашей последней кампании. Вместе они должны быть восстановлены, эти славянские народы, братья по тем же древним речным путям, которые когда-то породили Древнюю Русь. Наша помощь им - оливковая ветвь между Востоком и Западом. Предложение мира после такого разрушения. Экономически они будут связаны в единое целое."
 GER_eu_economic_expansion: "Экономическая Экспансия ЕС"
 GER_eu_economic_expansion_desc: "Когда разрушения войны наконец остались позади, впереди нас ждет историческая задача восстановления и укрепления Европы, и особенно Востока. Союз, как никогда ранее приверженный своей цели "укрепления экономической, социальной и территориальной сплоченности и солидарности между странами ЕС", должен расширить свое экономическое присутствие, чтобы обеспечить как свое будущее, так и будущее своих граждан. Германия должна взять на себя инициативу в этих усилиях, возглавив работу по стимулированию экономического роста, инноваций и восстановления.\n\nРасширяя экономические рамки ЕС, мы можем ускорить восстановление, укрепить торговлю и упрочить наши позиции в качестве инженерного чуда Европы. Благодаря возобновлению инвестиций в "Зеленую сделку" и углублению экономической интеграции мы восстановимся сильнее, чем прежде. А по мере возвращения стабильности мы будем расширять Союз впервые за более чем десять лет. Мы не просто восстановимся - мы будем процветать."
 GER_eastern_european_reconstruction_effort: "Усилия по Восстановлению Европы"
 GER_eastern_european_reconstruction_effort_desc: "Европа видела слишком много кровопролития, слишком много боли, слишком много страданий. Эта земля была покорена многочисленными агрессорами и бесчисленными захватчиками, но каждый раз мы выживали. Мы сохранили наше европейское наследие и наш образ жизни. Вместе с русскими мы разрушили множество домов и средств к существованию, но сейчас настало время для восстановления. Пришло время восстановить все, что было потеряно во время войны. Чтобы возместить ущерб нашим людям и народам."
 GER_formalize_the_european_union: "Основать Европейский Союз"
 GER_formalize_the_european_union_desc: "Мечта о федеративной Европе витала на горизонте десятилетиями - идея, о которой долгое время только шептались и мечтали идеалисты. Однако сейчас мы стоим на пороге истории. Европейский союз доказал свою силу в масштабной войне, теперь он должен доказать свою силу в управлении.\n\nМы заложим основы для настоящего политического объединения и превратим ЕС из политического и экономического союза в единое, суверенное супергосударство. С помощью массовых кампаний и политических маневров мы объединим континент в поддержку федеративного видения, спонсируя движения за объединение и проводя референдумы по всей Европе. В случае успеха история запомнит это как самое значительное событие века - рассвет государства, подобного которому мир еще не видел."
 GER_united_but_seperate: "Единые, но Разделённые"
 GER_united_but_seperate_desc: "Европа стоит на перепутье, и мы тоже. Хотя объединение в рамках единого европейского супергосударства - радикальное предложение, полный отказ от европейского проекта был бы безрассудным поступком. Вместо этого мы будем придерживаться статус-кво, укрепляя сотрудничество в рамках Союза и сохраняя при этом национальный суверенитет Германии. Германия останется неофициальным лидером ЕС, продвигая свои дипломатические и экономические усилия, не забывая при этом о нашей самобытности в создании европейской федерации. Преемственность будет определять наш курс, гарантируя, что Европа останется единой, но не за счет своего разнообразия."
 GER_european_officer_corps: "Европейский Офицерский Корпус"
 GER_european_officer_corps_desc: "Европейская нация требует европейского государства, которое требует европейской армии, которая требует единого командования. По мере нашего политического и культурного прогресса на пути к объединению мы должны также сформировать европейскую армию - единые вооруженные силы, действующие в условиях слаженной координации. В этом сила Соединенных Штатов - не только в численности их армии, но и в ее слаженности и координации. Мы начнем этот процесс с привлечения в наши ряды опытных военачальников. Одна из выдающихся фигур, которая войдет в Европейский офицерский корпус, - итальянец Клаудио Грациано. С 2007 по 2010 год он служил командующим Временными силами ООН в Ливане, а в 2011 году стал начальником штаба итальянской армии. С 2018 года он является председателем Военного комитета ЕС, а с этого момента он будет нашим начальником европейской армии. Основа для создания подлинно европейских вооруженных сил уже заложена. Теперь мы должны ее развивать."
 GER_uphold_democracy: "Отстаивание Демократии"
 GER_uphold_democracy_desc: "Наша война с тиранией не должна заканчиваться на России. По всему миру автократы и деспоты продолжают оставаться на свободе, угрожая глобальной стабильности и принципам либеральной демократии, которыми мы дорожим. Германия, выступая от имени НАТО, не должна ослаблять свою ответственность за защиту демократии и прав человека. Благодаря победе в последней войне у нас теперь есть сила и, что самое главное, обязанность действовать. Высшие чины наших вооруженных сил разработали проект операции Operation: Global Enforcer - многоступенчатый план по обеспечению демократии в нашем ближайшем окружении. Мы нанесем удар по оставшимся оплотам авторитаризма в Европе, на Ближнем Востоке и в Северной Африке, чтобы мир не погрузился обратно во тьму. Битва за свободу еще не закончена, но мы доведем ее до конца.\n\n "Некоторые правительства будут робеть перед лицом тирании. И в этом нет никакой ошибки: Если они не будут действовать, это сделает Европа"."
 GER_support_self_determination: "Поддержать Самоопределение"
 GER_support_self_determination_desc: "Наша победа изменила глобальный порядок, но борьба за демократию продолжается. Мы должны поддержать самоопределение наций, угнетаемых авторитарными режимами, и обеспечить победу воли народа над тиранией. Поддержав дело суверенитета и свободы, мы можем приступить к первому этапу операции Global Enforcer. Операция: Swift Justice и Operation: Thunder Run", решительные операции, направленные на противостояние и ликвидацию деспотических сил в Сербии и Иране соответственно. Этими действиями мы посылаем четкий сигнал всем, кто пытается навязать автократию свободному народу: НАТО будет твердо стоять не только в защите Европы, но и в борьбе за права каждого народа на свободную жизнь.\n\n"У НАТО есть работа, и мы собираемся ее выполнить. Мы избавим мир от злодеев"."
 GER_beyond_the_borders_of_europa: "За Границами Европы"
 GER_beyond_the_borders_of_europa_desc: "Наша миссия по поддержанию демократии и стабильности не ограничивается только Сербией. Мир ждет от президента Комиссии фон дер Ляйен лидерства, и она должна ответить. После победы у нас появилась возможность расширить свое влияние и защитить страны, которым угрожают деспоты, и начать заключительную фазу операции « Глобальный принудитель. Операция: Shining Hope принесет мир в Египет, восстановит стабильность в стране, омраченную десятилетиями диктатуры, и обеспечит демократический контроль над Суэцким каналом. Операция: Solomon II освободит Сирию от тирании Асада и раз и навсегда сокрушит баасизм. И, наконец, операция «Освобождение арабских стран» сокрушит угрозу, нависшую над Сирией: Арабское освобождение" уничтожит угрозу возрождающейся Джамахирии, положив конец ее экспансии в Северной Африке и обеспечив стабильность в регионе. Мы выйдем далеко за пределы Европы, установив новый порядок свободы и демократии для всех.\n\n"§BЕвропа§! едина. Свободолюбивые народы мира стоят на нашей стороне. Это будет грандиозная борьба добра со злом. Но добро победит.""
 GER_defense_plan_x: "ПЛАН ОБОРОНЫ: X"
 GER_defense_plan_x_desc: "Наши усилия удержать русских на Кавказе провалились. Мы должны перегруппироваться по порядку и подготовить новую линию обороны вдоль реки Днепр!"
 GER_suspend_civilian_consumerism: "Приостановить Потребительскую Экономику"
 GER_suspend_civilian_consumerism_desc: "Стало ясно, что Россия не намерена останавливаться на Украине. Их цели кажутся гораздо более грандиозными, и поэтому мы должны полностью посвятить себя тому, что делают они, и мобилизовать экономику."
 GER_defense_plan_v: "ПЛАН ОБОРОНЫ: V"
 GER_defense_plan_v_desc: "Русские прорвали линию обороны на Днепре. Надежда еще не потеряна, мы должны защищать реку Вислу во что бы то ни стало. Затраты!"
 GER_to_the_last: "До Последнего..."
 GER_to_the_last_desc: "Линия Вислы была разгромлена... Они никогда не сокрушат наш дух, мы будем сражаться за наш дом до последнего человека!"
 GER_deploy_republikanische_milizen: "Формировать Республиканские Ополчения"
 GER_deploy_republikanische_milizen_desc: "Тысячи граждан готовы взять в руки оружие и защищать республику!"
 GER_operation_somerset: "ОПЕРАЦИЯ: СОМЕРСЕТ"
 GER_operation_somerset_desc: "Европа имеет глубокую историю борьбы с Россией, мы работали вместе, чтобы победить их в 1854 году и дважды в этом десятилетии. Мы всегда будем здесь, чтобы обуздать их экспансию!"
 GER_europe_for_europeans: "Европа для Европейцев"
 GER_europe_for_europeans_desc: "Европа - не место для этих азиатских варварских орд, мы должны укрепить эту идею среди наших союзников, чтобы оживить их! Война еще не проиграна!"
 GER_militarize_reichsbanner_schwarz_rot_gold: "Милитаризировать Рейхсбаннер Schwarz-Rot-Gold"
 GER_militarize_reichsbanner_schwarz_rot_gold_desc: ""
 GER_nationalize_defense_industries: "Национализировать Оборонную промышленность"
 GER_nationalize_defense_industries_descd: "Когда война осталась позади, федеральное правительство должно позаботиться о том, чтобы вооруженные силы оставались сильными и самодостаточными. Передав оборонную промышленность под контроль государства, мы сможем обеспечить производство оружия и оборудования без иностранного вмешательства. Хотя такой шаг вызовет много споров, он гарантирует, что мы не останемся беззащитными перед прихотями частных подрядчиков, если случится худшее. Национализированный оборонный сектор укрепит наш военный потенциал, сократит расходы и предоставит инструменты, необходимые для защиты нашего суверенитета, независимо от затрат."
 GER_propup_russian_defense_forces: "Сократить Российскую Армию"
 GER_propup_russian_defense_forces_desc: "На протяжении всей своей истории русские славились военной доблестью. Их народ освободился от Золотой Орды, они не раз давали отпор иноземным агрессорам, а множество различных этносов веками держали в своей ладони. Было ли это связано с суровыми землями, которые они населяют? Или их бурная история? Так или иначе, единственным средством задушить русский экспансионизм является сокращение его военной мощи. В конце концов, только ослабив медведя, можно его приручить."
 GER_demand_russian_war_reparations: "Требовать от России Военных Репараций"
 GER_demand_russian_war_reparations_desc: "На протяжении веков русская угроза заливала кровью наши европейские земли, истребляя наших людей, превращая в пепел наши города и унижая нас на каждом шагу. От царей до наших дней Россия остается врагом объединенной Европы. Настало время, когда Россия должна предстать перед судом. Мы потребуем от России тяжелых репараций, возмещения за потерянные жизни, разрушенные города и возрождение нашей нации!"
 GER_no_appeasment: "Никакого Умиротворения"
 GER_no_appeasment_desc: ""
 GER_normalize_relations: "Нормализовать Отношения"
 GER_normalize_relations_desc: "Любовь. Любовь - это сильное слово. Любовь - прекрасное слово. Легко ненавидеть, но гораздо мужественнее любить. Возможно, мы победили русских в этой войне, которая была начата из-за их агрессии, но это не значит, что мы должны затаить злобу на их народ. В конце концов, у всех нас одинаковая кровь и мы одинаково чувствуем боль. Русский народ страдает так же, как и мы. Они просто невиновны в этой схеме, придуманной их коррумпированными лидерами в Москве. Мы должны использовать любовь, чтобы исцелить их и исцелить себя. Это единственный путь к процветающему и единому будущему."
 GER_the_new_order: "Будущее Европы Обеспечено"
 GER_the_new_order_desc: "Одной победы недостаточно; мы должны убедиться, что мир, который мы завоевали своей кровью, потом и слезами, продлится так же долго, как и предыдущий. Оккупированные Ливия и Иран должны быть направлены к стабильности, их институты должны быть перестроены на основе нашего собственного образа демократии. Путем тщательных реформ и экономической поддержки мы превратим эти страны в надежных союзников, не позволяя экстремизму, который когда-то определял их, вернуться. У себя дома мы наконец-то оставим бремя войны позади. Принесенные жертвы были огромны, но мы обязательно выйдем из войны более сильными, более подготовленными и более сплоченными, чем когда-либо прежде."
 GER_unrestricted_aerial_warfare: "Неограниченная Воздушная Война"
 GER_unrestricted_aerial_warfare_desc: ""
 GER_support_nato_administrations: "Поддерживать Администрации НАТО"
 GER_support_nato_administrations_desc: "Несмотря на наши усилия по восстановлению демократии силовыми методами, мы столкнулись с интенсивным сопротивлением населения, поскольку административные правительства были очень непопулярны, им не хватало необходимых средств и рабочей силы для создания надлежащих сил обороны. Поэтому наша задача как свободного мира - обеспечить средства и рабочую силу, необходимые не только для того, чтобы успокоить враждебно настроенное население, но и для развития их земель, что повысит популярность нашей администрации в народе."
 GER_war_time_advancements: "Достижения Военного Времени"
 GER_war_time_advancements_desc: "Несмотря на то, что после окончания войны мы переключились на гражданское производство, одной из областей, в которой мы не отстали, являются военные технологии. Такие компании, как KMW и Rheinmetall, продолжают выпускать одно из самых передовых в Европе оборудования. Однако это не означает, что мы не должны продолжать инвестировать в исследования и разработки. Поступая таким образом, мы можем не только еще больше усовершенствовать наши технологии, но и устранить недостатки устаревшего оборудования."
 GER_enemies_abroad: "Враги за Границей"
 GER_enemies_abroad_desc: "Китайцы, которые долгое время считались одними из главных врагов Америки, теперь стали нашей самой большой угрозой. Коммунистическая партия Китая обременена чрезмерно разветвленной и глубоко коррумпированной бюрократией, и это главный фактор, который мы можем использовать, эта уязвимость может облегчить нам доступ к важнейшим разведывательным данным, что позволит нам оценить их истинную силу и передать эту информацию нашим японским союзникам."
 GER_defense_of_krasnodar: "Оборона Краснодара"
 GER_defense_of_krasnodar_desc: ""
 GER_caucasian_offensive: "Кавказское Наступление"
 GER_caucasian_offensive_desc: "Кавказ долгое время страдал под гнетом российского гнета, и многочисленные группы меньшинств сталкивались с репрессиями. Но после завершения Европейской войны, впервые за долгое время в истории, свет свободы озарил Кавказ, пока русский дьявол не растоптал и не уничтожил их свободу, сегодня они находятся под постоянным российским гнетом, и поэтому наша обязанность как защитников Европы - укреплять их позиции. кампания по освобождению Кавказа, успешное освобождение региона не только освободило бы его население, но и ослабило бы российские силы, создав для нас прекрасную возможность наступать на нескольких фронтах."
 GER_allies_abroad: "Союзники за Рубежом"
 GER_allies_abroad_desc: "По мере продолжения нашей борьбы на Востоке появился потенциальный союзник - ОДТО. Долгое время считавшаяся маяком демократии в Азии, она твердо противостояла растущему влиянию китайского Дракона. Нам необходимо поддерживать с ними прочные отношения не только для торговли оружием, но и для укрепления и роста наших экономик. Они будут служить важным пунктом снабжения для крупномасштабных поставок оружия. Их порты будут заполнены нашими грузовыми контейнерами, и "Зеленая линия" будет расширяться."
 GER_anti_partisan_training: "Антипартизанская Подготовка"
 GER_anti_partisan_training_desc: "Когда Соединенные Штаты вторглись во Вьетнам, они столкнулись с подавляющим сопротивлением местных жителей, которые были знакомы с местностью и густыми джунглями, из которых состоял Вьетнам, и в конце концов Америка потерпела поражение от войск, оснащенных устаревшим вооружением. По мере того как мы продолжаем оккупировать все больше российских земель, люди начинают ненавидеть нас с появлением движений сопротивления, стремящихся искоренить нас, поэтому мы не можем повторять ошибок наших бывших союзников, мы должны обеспечить антипартизанскую подготовку наших солдат и помочь им искоренить любые партизанские движения, которые мешают нашей способности бороться с партизанами. занимайте огромную землю, которой является Россия." 
 GER_rethink_aerial_warfare: "Переосмыслить Ведение Воздушной Войны"
 GER_rethink_aerial_warfare_desc: "Воздушная война развивается с каждым новым технологическим витком: стелс-истребители, невидимые для радаров и термалов, обладают не меньшей огневой мощью и маневренностью, сверхманевренные «Сухои», способные поворачивать достаточно быстро, чтобы сломать пилоту шею, - мы вступаем в эпоху, когда пилот скоро может стать неважным. Мы должны развивать нашу тактику, чтобы повысить живучесть наших самолетов, тем более что становится все более вероятным, что плотная противовоздушная оборона станет вызовом для наших сил, требующим умного противодействия."
 GER_jump_start_carrier_group: "Запуск Новой Авианосной Группы"
 GER_jump_start_carrier_group_desc: "Многие крупные военно-морские флоты по всему миру уже успели развернуть авианосец, однако в эпоху современной войны нам все еще не удалось этого добиться. Эти корабли - важнейшее звено в современном военном деле следующего поколения. Действуя как мобильные авиабазы, они дадут нам возможность наносить удары в глубине вражеской территории в любое время и в любом месте. Поэтому нам крайне важно инвестировать в них ради нашего выживания."
 GER_defend_the_seas: "Защитить Моря"
 GER_defend_the_seas_desc: "Годы пренебрежения военно-морскими силами привели к катастрофическим последствиям. Во время европейской войны российские военно-морские силы атаковали наши танкеры, что серьезно нарушило торговлю с государствами по всему миру. Хуже того, наш недофинансированный флот был перегружен, что вызвало серьезные сомнения в нашей способности защитить собственную береговую линию. Если мы хотим иметь хоть какие-то шансы против будущих вражеских флотов, мы должны как можно скорее предпринять масштабные усилия по восстановлению нашего военно-морского потенциала."
 GER_maritime_aerial_defense: "Морская Воздушная Оборона"
 GER_maritime_aerial_defense_desc: "Во время нескольких морских сражений выжившие моряки и адмиралы сообщали, что наши корабли были очень уязвимы для морских бомбардировщиков из-за отсутствия бортовой противовоздушной обороны. Чтобы устранить этот критический недостаток, в конструкции наших будущих кораблей должны быть предусмотрены специальные противовоздушные системы, которые защитят наши корабли от воздушных атак и предотвратят дальнейшие потери."
 GER_empower_populist_parties: "Усилить Популистские Партии"
 GER_empower_populist_parties_desc: "Статус-кво в Германии находится под угрозой со стороны таких партий, как АдГ и Die Linke. Они дают слепые обещания и используют громкую риторику, и это будоражит немецкий народ так, как не будоражило его уже много лет. Это хорошо. Если мы позволим популистам продолжать выступать, то, возможно, еще сможем извлечь выгоду из их чрезмерных обещаний, но, конечно, нам крайне необходимо перевооружиться."
 GER_bolster_the_bfv: "Укрепить BfV"
 GER_bolster_the_bfv_desc: "BfV - это наша внутренняя разведка, можно назвать ее немецким ФБР, но наше ведомство в основном занимается экстремизмом и защитой от него. Неонацисты, коммунисты, даже монархисты - все они угрожают государству из тени. Они показывают свое публичное лицо через такие организации, как NPD, получившая новое название "Die Heimat", АдГ и Die Linke. Мы не можем просто позволить избрать еще одного авторитариста. Пусть BfV накопает компромат на этих реакционеров, наша республика должна выдержать грядущую бурю!"
 GER_reconcile_the_parties: "Примирить Стороны"
 GER_reconcile_the_parties_desc: "Продолжение борьбы против растущего числа предполагаемых сторонников Die Linke и АдГ привело к шокирующему и экспоненциальному росту их электоральной базы на протяжении многих лет. Люди видят в них оппозицию статус-кво. Поэтому они голосуют за них, потому что отчаянно хотят отдохнуть от одних и тех же партий. Поэтому в наших интересах не только примирить партии, но и дать им возможность занять некоторые ограниченные должности в правительстве Германии. Заняв эти должности, они не только не будут представлять антистатусное кво, но и покажут людям, каково это - жить под их политикой, к лучшему или к худшему."
 GER_embrace_the_future_of_warfare: "Принять Будущее Войны"
 GER_embrace_the_future_of_warfare_desc: "В то время как бундесвер переживает модернизацию и реформу, парадигмы войны быстро меняются. Интеграция передовых технологий, таких как кибернетические средства ведения войны, искусственный интеллект и беспилотные системы, например, дроны, повысит эффективность военных действий и оперативность. Наши вооруженные силы должны быть готовы к различным сценариям и разрабатывать гибкие доктрины, которые позволят адаптироваться к меняющимся геополитическим условиям и укрепить стратегическое положение Германии в борьбе с постоянно возникающими угрозами. Wir. Dienen. Deutschland."
 GER_inspire_the_youth: "Вдохновлять Молодежь"
 GER_inspire_the_youth_desc: "Германия десятилетиями воспитывала своих детей в духе умеренности, уважения к жизни и ошибок нашего общего прошлого. Поэтому мы хотели бы сказать, что наша молодежь невинна и свободна от желания воевать; она стремится к высоким целям в служении ближнему. Это не отвечает нашим сегодняшним потребностям, и бьющееся сердце наших детей должно качать кровь через боевые сухожилия. Целенаправленное обращение к подросткам в социальных сетях, рассказывающее о богатых и гордых милитаристских традициях Германии и ее гениальных поступках на войне, напомнит нашим детям, что кровь героев ближе к Богу, чем чернила философов." 
 GER_germany_triumphant: "Триумф Германии"
 GER_germany_triumphant_desc: ""
 GER_consolidate_the_eu: "Консолидировать ЕС"
 GER_consolidate_the_eu_desc: ""
 GER_no_appeasement: "Никакого Умиротворения"
 GER_no_appeasement_desc: "Нельзя вразумить дьявола или заставить безумца обратиться к разуму. Умиротворение не принесло ничего, кроме новой войны, новой смерти и новых страданий. Сначала мы позволили русским растоптать всех своих соседей, выплеснуть на них свой гнев и подчинить их своему железному кулаку. Когда-то мы были глупцами, но не теперь. Больше мы не позволим злу расти на этой священной земле. Как носители свободы, мы будем бороться против любой несправедливости, каким бы сильным ни был враг."
 GER_deregulate_the_market: "Дерегулировать Рынок"
 GER_deregulate_the_market_desc: ""
 GER_revive_nuclear_energy: "Возродить Ядерную Энергетику"
 GER_revive_nuclear_energy_desc: "Решение слабого либерального правительства о постепенном отказе от атомной энергии стало катастрофой для нашей страны. Эти бюрократы-глобалисты привели к резкому росту цен на энергоносители и возникновению серьезных проблем с обеспечением надежного энергоснабжения. Не говоря уже об огромных потерях рабочих мест и геополитической уязвимости, которые открылись в результате этого глупого решения. Пришло время отказаться от этой политики и заново создать необходимую инфраструктуру для поддержки ядерной энергетики, проложив путь к расширению ядерных разработок."
 GER_support_military_industry: "Поддержка Военной Промышленности"
 GER_support_military_industry_desc: ""
 GER_reconstruct_civilian_industry: "Реконструировать Гражданскую Промышленность"
 GER_reconstruct_civilian_industry_desc: ""
 GER_begin_societal_militarization: "Начать Милитаризацию Общества"
 GER_begin_societal_militarization_desc: ""
 GER_activate_article_50: "Активировать Статью 50"
 GER_activate_article_50_desc: "Европейский эксперимент, наконец, исчерпал себя. Долгие годы Германия взваливала на себя бремя слабых стран, поддерживая разрушенную экономику, терпя позорную бюрократию и ущемляя свои национальные интересы ради "единства." Война только прояснила ситуацию: Европа далека от того, чтобы быть единой нацией, и никогда не должна ею быть. Наконец-то пришло время Германии вернуть свой суверенитет. Мы задействуем статью 50 и официально начнем процесс выхода из Европейского союза, разрывая связи, которые удерживали нас на протяжении десятилетий. Переходный период не обойдется без потрясений, поскольку политическая и экономическая неопределенность неизбежны, но в конце концов Германия победит, как она всегда побеждала, свободно прокладывая свой собственный курс без ограничений со стороны Брюсселя.\n\n"Deutschland, Deutschland, über alles!""
 GER_revive_german_nationalism: "Возродить Немецкий Национализм"
 GER_revive_german_nationalism_desc: "Слишком долго Германия была скована ограничениями искусственной, общеевропейской идентичности, разрушающей саму суть Германии. С выходом из Союза наконец-то пришло время возродить дух нашей нации, который был подавлен в 1945 году и остался под сапогом глобализма и ненависти к себе. Мы будем принимать наше наследие, праздновать наше разнообразие и укреплять чувство национального единства среди немцев всего мира. Мечта о сильной Германии больше не является далеким воспоминанием: это будущее."
 GER_restore_pride_in_our_history: "Возродить Гордость за Нашу Историю"
 GER_restore_pride_in_our_history_desc: "Мы стоим на перепутье, и одно остается несомненным: мы не должны забывать, кто мы такие. Наша нация пережила бесчисленные бури - от объединения, разделения и воссоединения, от славных побед до сокрушительных поражений. Сейчас, когда мы прокладываем свой собственный путь, настало время напомнить немецкому народу о силе и стойкости его предков. Приняв нашу историю не с ностальгией, а с гордостью, мы восстановим национальную уверенность и вдохновим поколение nezt взять на себя мантию лидерства. Будущее принадлежит тем, кто верит в свое прошлое."
 GER_unify_the_european_people: "Объединить Европейский Народ"
 GER_unify_the_european_people_desc: "По мере того как мы предпринимаем шаги по объединению европейского континента, нам крайне важно укреплять не только экономику и институты Союза, но и саму основу нашей идентичности. Европа больше не должна восприниматься как страна нескольких наций, а как единая нация всех европейцев. Это не беспрецедентное предложение; на самом деле оно исходило из самого неожиданного источника, который только можно себе представить: от фашиста. Освальд Мосли и его движение «Союз» выступали за политику "Европа - нация" в период с 1948 по 1973 год. Другой фашист, Фрэнсис Паркер Йоки, в 1949 году выступал за создание так называемого "Империума Европы", который будет очищен от либеральной демократии, Голливуда и большевизма.\n\nНу, конечно, мы не фашисты, но эти идеологи были правы: Европа - это единый народ, и так было всегда. Настало время признать этот факт, и, поскольку все государства должны быть совместимы с собственной нацией, Европа должна иметь собственное государство."
 GER_pressure_the_austrians: "Надавить на Австрийцев"
 GER_pressure_the_austrians_desc: "Нейтралитет Австрии - это пережиток холодной войны, который больше нельзя позволить себе в геополитическом ландшафте Европы. Пока русские штурмовали Европу, а мы были вынуждены метаться, Австрия лишь наблюдала. Сейчас, когда Европа восстанавливается после войны, для Австрии настало время занять окончательную позицию и отказаться от нейтралитета. Мы окажем все необходимое дипломатическое и политическое давление, чтобы заставить Вену подать заявку на вступление в НАТО, гарантируя, что наш южный сосед выступит вместе с нами против любых будущих угроз и присоединится к нам в зарубежных операциях. От того, уступит ли Австрия нашим требованиям или будет сопротивляться, будет зависеть судьба Центральной Европы на десятилетия вперед. Они либо с нами, либо против нас."
 GER_the_bundeswehr_reborn: "Возрожденный Бундесвер"
 GER_the_bundeswehr_reborn_desc: "Бундесвер долгое время был ограничен прошлым, скован политическими колебаниями и международными ожиданиями. Но мир изменился, Европа изменилась, и мы тоже должны измениться. С нашей декларацией о независимости от брюссельских бюрократов пришло время проложить новый путь вперед, по которому бундесвер будет не просто силой обороны, а непреклонным мечом и щитом немецкого народа. Мы продолжим усилия по восстановлению доверия населения к вооруженным силам. Наша безопасность больше не будет находиться в руках иностранцев. Бундесвер возродится, готовый стойко противостоять любой угрозе."
 GER_towards_a_greater_germany: "Навстречу к Великой Германии"
 GER_towards_a_greater_germany_desc: "Решение "Малой Германии" было и остается ужасной ошибкой. Больше не скованные пустыми банальностями и уступками ради единства, мы создадим более сильную и гордую Германию. Судьба немецкого народа больше не будет диктоваться брюссельскими бюрократами! Австрия, давно потерянная часть нашего народа, вновь займет достойное место в составе Великой Германии. Это не просто расширение, это исправление самой истории. Мир будет наблюдать за тем, как Германия поднимается заново.\n\n"Das soll es sein! Das soll es sein!\nDas ganze Deutschland soll es sein!""
 GER_sew_euro_skepticism: "Посеять Евроскептицизм"
 GER_sew_euro_skepticism_desc: "Европейский союз был построен на благородных идеалах, но реальность обнажила его очевидные недостатки. Трещины в фундаменте растут, и мы сделаем так, чтобы их никто не мог игнорировать. Мы будем усиливать голоса национальных суверенитетов по всей Европе, разоблачая провалы Брюсселя и напоминая людям, что суверенитет принадлежит им и только им. Каждый скандал, каждое превышение полномочий и каждая неудача будут подливать масла в огонь евроскептицизма. Мечта или, скорее, кошмар о европейском супергосударстве будет покончена - не какой-то иностранной властью, а волей самих людей."
 GER_fight_euroskeptic_hate_speech: "Бороться с Ненавистническими Высказываниями Евроскептиков"
 GER_fight_euroskeptic_hate_speech_desc: "По мере того как Союз крепнет и мы продвигаем нашу цель - федерализацию, усиливаются и голоса, стремящиеся его подорвать. По всей Европе реакционеры распространяют страх, дезинформацию и фальшивые новости. Они используют экономическую тревогу и националистическое недовольство, чтобы затормозить наш прогресс. Они утверждают, что защищают суверенитет своих собственных наций. Но они не учитывают, что Союз - это величайший гарант европейского суверенитета! Без него мы жили бы под сапогом Москвы. Тогда давайте посмотрим, как они будут протестовать за суверенитет!\n\nМы должны действовать решительно. Противодействуя этому евроскептическому языку ненависти с помощью активной кампании, включающей в себя разъяснительную работу, образование и правовые меры, мы разоблачим их ложь и подтвердим наши ценности достоинства, демократии, равенства и верховенства закона. Волна раскола будет повернута вспять, и объединенная Европа будет идти вперед."
 GER_modern_wolf_packs: "Современные Волчьи Стаи"
 GER_modern_wolf_packs_desc: "Во время Второй мировой войны адмирал Дёниц создал одну из самых эффективных в истории военно-морских стратегий - «волчью стаю». Эти скоординированные группы подводных лодок использовались для охоты на корабли снабжения, серьезно нарушая глобальные цепочки поставок. С развитием военного искусства эта тактика получила ограниченное современное применение, что дает прекрасную возможность внедрить инновации и возродить эту проверенную стратегию, потенциально изменив баланс на военно-морском фронте."
 GER_study_new_naval_tactics: "Изучать Новую Военно-Морскую Тактику"
 GER_study_new_naval_tactics_desc: "Анализ прошлых конфликтов показал нам одно: морские бомбардировщики будут представлять собой будущее морской войны. Быстрые и часто незамеченные, эти самолеты способны доставить мощную боевую нагрузку, чтобы уничтожить любое судно, которое осмелится войти в наши территориальные воды. Запущенные с мобильных авианосцев, эти бомбардировщики значительно повышают нашу способность проецировать силу и поддерживать господство на морях."
 GER_automating_warfare: "Автоматизированная Война"
 GER_automating_warfare_desc: "За последние десять лет искусственный интеллект получил огромное развитие, играя ключевую роль не только в повседневной жизни, но и в боевых ситуациях. В связи с этим возникает важный вопрос: Должны ли мы внедрять искусственный интеллект для управления нашими военными машинами, экономя рабочую силу и сокращая расходы на призыв? Или нам следует сохранить контроль за людьми, чтобы предотвратить опасные ошибки, такие как дружественный огонь, и избежать проблем с обслуживанием таких сложных систем?"
 GER_germania_rules_the_waves: "Германия Правит Волнами"
 GER_germania_rules_the_waves_desc: "Наши военно-морские реформы завершены. Морская пехота превратилась из недофинансированного, неорганизованного флота в одну из самых грозных военно-морских сил на планете. Благодаря стратегическим инвестициям, передовым технологиям и тщательной подготовке мы создали флот, достойный уважения и страха во всем мире. Нет никаких сомнений в том, что мы готовы к конфликтам будущего. Германия снова будет править волнами, утверждая свое господство во всех океанах."
 
 GER_revolution_on_the_ballot: "Революция в Бюллетене"
 GER_revolution_on_the_ballot_desc: "Война в Европе подошла к концу, Восток усеян трупами и дымящимися грудами танков. Мы, немцы, должны спросить себя: Почему мы это допустили? Сколько еще мы будем терпеть, пока олигархи натравливают друг на друга трудящихся всего мира? Больше нет! Народ закричал и без единого выстрела привел себя к власти. Теперь нам остается только действовать и изменить континент к лучшему, принести мир, процветание и будущее для тех, кто готов был за это умереть."
 GER_reconquer_east_germany: "Отвоевать Восточную Германию"
 GER_reconquer_east_germany_desc: "Восточная Германия находится в беспорядке с тех пор, как пало государство ГДР, и потенциальные фашисты превратили ее в свой реакционный оплот. Нельзя допустить, чтобы на родине германского социализма гноились такие ненавистные идеологии, но мы будем отвоевывать ее не насилием, а сталью и бетоном. Сразу же начнутся проекты развития, обеспечивающие жильем, инфраструктурой и рабочими местами тех, кого 30 лет назад бросил Запад."
 GER_establish_workers_councils: "Обрезать Корпорации"
 GER_establish_workers_councils_desc: "Победа на недавних выборах и триумф в европейской войне обеспечили столь необходимое доверие и рычаги влияния на правительство. В связи с этим мы должны приступить к тому, чтобы капиталистические силы, которые также разжирели от войны, были сокращены до минимума. Расследования коррупции и антимонопольных законов, а также национализация некоторых корпоративных активов должны обеспечить поддержание этих предприятий в размерах, наиболее удобных как для государства, так и для народа, не приводя к полному оттоку капитала."
 GER_economic_regulation: "Продвигать Многонациональность"
 GER_economic_regulation_desc: "Концепция национального государства не только устарела, но и откровенно разрушительна для той Германии, которую мы хотим построить. Реакционные силы будут использовать эту идею для создания расистской и дискриминационной политики в надежде отвлечь пролетариат. Эту идею необходимо разрушить, мы строим страну не только для немцев, но и для всего мира. В ярко-красном будущем этой страны каждый может быть немцем, если только он этого захочет."
 GER_criticize_the_eu: "Сдерживать Милитаризм"
 GER_criticize_the_eu_desc: "Триумф на Востоке - это, конечно, повод для гордости: континент, который был разделен на протяжении веков, объединился, чтобы победить врага, намного превосходящего его по численности, однако такая гордость - идеальное удобрение для роста фашизма. Поэтому мы должны сосредоточиться на том, чтобы показать правду о конфликте, о крови и смерти, история должна помнить о Европейской войне как о трагедии, которой можно было бы избежать, если бы не вмешательство олигархов. Кроме того, мы должны начать регулировать нашу военную промышленность и переориентироваться на гражданское производство, поскольку в послевоенной Европе в них больше нет необходимости."
 GER_work_with_our_allies: "Борьба с Российской Военной Машиной"
 GER_work_with_our_allies_desc: "Горечь - такое же топливо для реакции, как и для революции. Российские олигархи, несомненно, воспользуются поражением, чтобы разжечь новый конфликт, и хотя мы должны предотвратить это мирным путем, всегда есть шанс, что Россия вернется настолько радикализованной, что не остановится ни перед чем, кроме полной победы. Поэтому мы расширим бюджет ЕС и используем его излишки для субсидирования военного производства всех его членов, чтобы противостоять худшему, что может предложить Восток."
 GER_the_bridge_between_east_and_west: "Мост Между Западом и Востоком"
 GER_the_bridge_between_east_and_west_desc: "Сейчас, когда в Индо-Тихоокеанском регионе нарастает напряженность, а в Восточной Азии вновь звучат барабаны войны, мы обязаны сделать выбор в пользу дипломатии, а не изоляции. Азия стоит на краю войны, последствия которой могут охватить весь остальной мир, включая нас самих. Но теперь, когда мы вышли из этих последних лет более сильными и принципиальными, у нас есть моральный императив действовать. Наводя мосты с Токио для развития диалога и сотрудничества, мы можем позиционировать себя в качестве посредника, в котором мир отчаянно нуждается. Однако если произойдет самое худшее, мы будем твердо стоять на стороне Токио в защите демократических ценностей."
 GER_for_the_sake_of_stability: "Ради Стабильности"
 GER_for_the_sake_of_stability_desc: "Мир вокруг нас находится в очень нестабильном состоянии, в чем мы только что убедились на собственном опыте. К счастью, мы выстояли под натиском России и стали успешной страной в успешном альянсе. Однако сейчас не время раскачивать лодку, и мы должны сохранить стабильность, над которой так упорно работали. Именно поэтому ХДС был избран, избиратели не хотят перемен, они хотят, чтобы то, что есть, продолжалось. Мы выполним наши обещания о мире и процветании и сопроводим Германию в будущее!"
 GER_expand_eu_cooperation: "Расширять Сотрудничество с ЕС"
 GER_expand_eu_cooperation_desc: "Мы доказали, что ЕС - это не просто очередная страница в учебниках истории, он останется. Однако, как и все хорошие машины, он требует постоянного обслуживания для обеспечения нормальной работы. Пусть сегодня мы победили русских, но завтра они могут вернуться, и если мы не будем готовы к этому, то мы обречены. Мы используем мир, в котором оказались, чтобы укрепить связь с нашими европейскими товарищами, чтобы, когда война вернется на наш континент, мы были едины и свободны!"
 GER_prop_up_eastern_europes_industry: "Поддержать Промышленность Восточной Европы"
 GER_prop_up_eastern_europes_industry_desc: "С поражением русских мы наконец-то можем расширить наши обязательства перед Восточной Европой без каких-либо последствий. Большая часть Прибалтики, Беларуси и Украины была разрушена во время войны, и это наш шанс помочь им отстроиться. Люди увидели много возможностей на востоке, и, получив от нас несколько стимулов, мы сможем убедить их инвестировать в промышленность и инфраструктуру. Мы сделаем Восток лучше, чем он был до войны, более того, мы сделаем его лучше, чем он когда-либо был!"
 GER_keep_the_markets_stable: "Поддержать Стабильность Рынков"
 GER_keep_the_markets_stable_desc: "Сказать, что глобальная цепочка поставок разрушена, значит преуменьшить значение этого слова. Поскольку Америки больше нет, Китай и Япония разрывают Азию на части, а Россия на данный момент отошла на второй план, мы вынуждены опираться на традиционные рынки. К счастью, благодаря победе в войне с Россией мы заслужили расположение инвесторов, и экономика страны пошла в гору. Больше всего нам нужно сохранить эту тенденцию восстановления, только тогда мы сможем приступить к созданию других."
 GER_subsidize_the_civilian_industry: "Субсидировать Гражданскую Промышленность"
 GER_subsidize_the_civilian_industry_desc: "Чтобы наша страна была сильной, необходимо иметь не только крупную военную промышленность, но и сильную гражданскую промышленную базу. В преддверии войны НАТО с Россией мы сосредоточились на военном производстве и отодвинули на второй план практически все остальное. Однако сейчас настало время переключиться на производство всех видов продукции, а не только того, что нужно военным. У нас есть шанс стать индустриальной державой, и мы не упустим его!"
 GER_fund_the_military_industry: "Финансировать Военную Промышленность"
 GER_fund_the_military_industry_desc: "За последние несколько лет мы на собственном опыте убедились, что полагаться на иностранные государства - не самое лучшее решение. Поэтому мы должны быть уверены, что получаем необходимые товары, особенно для наших вооруженных сил, из надежного источника. А кому мы можем доверять больше, чем самим себе? Вместо того чтобы сокращать расходы на военную промышленность, лучше удвоить их. Мы должны быть в состоянии производить товары не только для себя, но и для наших европейских братьев. Только когда все страны ЕС будут вооружены так же хорошо, как мы, мы сможем считать себя настоящей военной державой."
 GER_defend_democracy: "Защищать Демократию"
 GER_defend_democracy_desc: "За последние несколько месяцев становится все более очевидным, что российская угроза не была окончательно отодвинута на второй план. Они вернутся, причем гораздо раньше, чем позже. В условиях, когда демократия находится в осаде по всему миру, нам крайне необходимо защищать то, что у нас есть, и оставаться сияющим маяком свободы и процветания. Есть даже те, кто говорит, что мы должны выйти за рамки этого и защищать демократию за рубежом, и многие согласны с этим мнением. Однако сейчас мы должны сосредоточиться на собственных проблемах. Если русские придут за нами, а они придут, мы не уйдем тихо!"
 GER_the_red_roses_finest_hour: "Звездный Час Красной Розы"
 GER_the_red_roses_finest_hour_desc: "За примерно 150 лет нашего существования мы никогда не переживали такого великого триумфа. Мы не только победили русских и принесли мир в Восточную Европу, но и обеспечили будущее нашей нации. Наши успехи не остались незамеченными народом, который подавляющим большинством голосов выбрал нас во власть, но, что еще важнее, доверился нам. Это проявление доверия со стороны наших граждан не осталось незамеченным, и мы приложим максимум усилий для реализации нашей программы. Красная роза уже проросла, но скоро она зацветет по-настоящему!"
 GER_reverse_schroders_reforms: "Обратить Вспять Реформы Шредера"
 GER_reverse_schroders_reforms_desc: ""
 GER_an_industrial_renaissance: "Промышленный Ренессанс"
 GER_an_industrial_renaissance_desc: "Исторически Германия всегда была великой промышленной державой. Однако в последние годы, как и во многих других странах, наши компании вышли на международный рынок и стали производить товары в других странах. Учитывая то, в каком состоянии находится мир сегодня, нельзя допустить, чтобы это продолжалось, ради экономической стабильности нашей страны и нашего народа. С сегодняшнего дня мы начнем проводить политику стимулирования компаний к переезду и строительству своих заводов на родине, а если удастся, то и убедим иностранные предприятия открывать здесь свои магазины. Пришло время снова сделать "Сделано в Германии" реальностью!"
 GER_help_out_the_working_class: "Помочь Рабочему Классу"
 GER_help_out_the_working_class_desc: "Германия, как и все другие страны, построена на спинах рабочих. Только благодаря их усердию, трудолюбию и сильной воле мы смогли достичь того уровня, на котором находимся сегодня. Многие страны забывают об этом и оттесняют их на второй план, сосредоточившись на обогащении тех, кто и так имеет более чем достаточно. Но только не Германия! В течение всего срока пребывания СДПГ у власти мы будем упорно работать над принятием законов, направленных на обеспечение процветания трудящихся. Счастливый работник - эффективный работник!"
 GER_push_for_federalization_2: "Стремление к Федерализации"
 GER_push_for_federalization_desc: "С большинством левых партий Европы нас объединяет одно - стремление к федерализации. В условиях падения Соединенных Штатов, войны на Востоке и угрозы со стороны России, только продемонстрировав единство, мы сможем пережить грядущую бурю! Мы - один континент, и хотя в прошлом мы воевали между собой, мы также бесчисленное количество раз работали вместе. Федерализация может работать, и с Германией во главе мы построим сильный и свободный Европейский союз!"
 GER_work_with_europes_social_democrats: "Работать с Европейскими Социал-Демократами"
 GER_work_with_europes_social_democrats_desc: "Несмотря на то, что в Германии сильны настроения в пользу федерализации, ряд европейских стран их не разделяет. Мы меньше всего хотим форсировать процесс и рискуем оттолкнуть от себя некоторых наших союзников. Скорее, мы будем расширять сотрудничество с партиями, разделяющими нашу идеологию, и строить отношения даже более прочные, чем единство. С этой целью наши связи с другими европейскими странами будут углубляться. Хотя мы и являемся одним континентом, мы - множество разных народов, и иногда разнообразие - это сила!"
 GER_take_in_russian_dissidents: "Брать Российских Диссидентов"
 GER_take_in_russian_dissidents_desc: "Одно, что отличает нас от некоторых более консервативных партий Европы, - это наше отношение к русским. Да, они представляют собой угрозу, что они с радостью доказали не так давно. Но, с другой стороны, в этом нет вины их народа, многие из которых пытались бежать от их деспотичного режима. В нашей стране есть те, кто хотел бы заставить их покинуть страну и оставить им некуда идти, но не мы. Здесь рады тем, кто вынужден бежать из своих стран, и не только русским, но и всем людям со всего мира. Германия примет вас!"
 GER_liberalisms_time_to_shine: "Время Либерализму Воссиять"
 GER_liberalisms_time_to_shine_desc: "Благодаря часам, месяцам и годам неустанных усилий наших рабочих, граждан и политиков мы довели Германию до ее звездного часа, разгромив угрозу на Востоке и отбросив ее назад. Эта победа свидетельствует не только о силе нашей нации, но и о преданности и стойкости каждого человека, внесшего свой вклад в это великое достижение. Но это не значит, что мы должны остановиться: чтобы обеспечить выживание Германии, она всегда должна оставаться экономическим и военным маяком Европы, и мы должны продолжать работать еще усерднее, чтобы сохранить наш новый статус гегемона Европы."
 GER_minimize_welfare: "Свести к Минимуму Соц. Обеспечение"
 GER_minimize_welfare_desc: "Несмотря на наши усилия по созданию социального государства, возник ряд проблем, начиная от снижения доверия населения к финансовым институтам и заканчивая неравномерным распределением пособий и увеличением нагрузки на государственный бюджет. Чтобы решить эти проблемы и предотвратить их повторное возникновение, социальные пособия будут скорректированы. Они будут сокращены по масштабам, но станут более эффективными и адресными. Это означает, что поддержка будет направлена на тех, кто в ней больше всего нуждается, что повысит справедливость и эффективность. Таким образом, мы стремимся восстановить доверие, сократить растраты и обеспечить устойчивость системы социального обеспечения и ее способность поддерживать наше общество в долгосрочной перспективе."
 GER_empower_the_individual: "Расширять Возможности Индивида"
 GER_empower_the_individual_desc: "Человек - это основа любой нации. Независимо от роли, которую он играет, будь то почтальон, обеспечивающий связь между немецкими общинами, или учитель, формирующий умы будущего поколения, или уборщик мусора, помогающий поддерживать чистоту на каждой улице, - каждый человек вносит свой вклад в большие столпы немецкого общества. Их права, в том числе право на свободу слова, являются самыми важными правами, которые должны быть полностью защищены для поддержания одной из основных ценностей Германии - свободы. Чтобы обеспечить полный контроль над собой, человек должен иметь больше возможностей для того, чтобы контролировать свои личные и финансовые пути."
 GER_a_dynamic_economy: "Динамичная Экономика"
 GER_a_dynamic_economy_desc: "Одной из основных ценностей нашей партии является внедрение в Германии истинно свободной рыночной системы. После нейтрализации российской угрозы на востоке мы можем начать демобилизацию нашей экономики военного времени и перейти к свободной рыночной системе. Сократив вмешательство государства и позволив частному бизнесу развиваться, мы создадим среду, в которой компании смогут процветать, подпитывать инновации и строить экономическую державу, руководствуясь спросом, предложением и духом нашего народа."
 GER_push_for_a_european_defense_ministry: "Создать Европейское Министерство Обороны"
 GER_push_for_a_european_defense_ministry_desc: "По всей Европе блестящие умы готовы защищать континент, но без единства их сила бесполезна для нашего дела. Чтобы иметь возможность создать централизованные европейские вооруженные силы, мы должны доверить одному способному лидеру контроль и управление нашей новой европейской армией. Этот лидер организует наши армии и заложит основу для действительно единой европейской армии. Неизбежно, что русские снова придут за нами, поэтому мы должны предпринять следующие шаги, чтобы объединить все европейские армии в одну армию, одно командование, одну цель - защиту Европы."
 GER_enforce_the_north_atlantic_treaty: "Обеспечить Соблюдения Североатлантического Договора"
 GER_enforce_the_north_atlantic_treaty_desc: "Во время европейской войны структура НАТО была хаотичной, неорганизованной и разобщенной. После ее окончания многие европейские вооруженные силы лежат разбитые, раздробленные, недоукомплектованные и недостаточно оснащенные. Поэтому именно мы, лидер свободного мира, должны укрепить наших союзников, помогая им в восстановлении их вооруженных сил и действительно объединяя командную структуру НАТО, чтобы мы были готовы к неизбежной второй войне."
 GER_push_for_more_federalization: "Добиваться Большей Федерализации"
 GER_push_for_more_federalization_desc: "После окончания европейской войны в парламенте ЕС все громче звучат голоса в пользу углубления федерализации. Хотя нам удалось победить русского медведя, это лишь вопрос времени, когда он восстановится и нанесет новый удар, ввергнув Европу в новый конфликт. Если мы хотим пережить то, что нас ждет впереди, мы не можем позволить себе оставаться разделенными. Мы должны объединить все вооруженные силы и промышленную мощь Европы, чтобы обеспечить прочный мир и защитить каждого европейского гражданина."
 GER_a_green_future_2: "Зелёное Будущее?"
 GER_a_green_future_2_desc: "После последнего голосования, когда все внимание приковано к нам, будущее немецкой нации решено. Расцветая, как великолепный подсолнух, Зелёные вновь взяли в свои руки бразды правления. Германия стала зеленой, но зачем останавливаться на достигнутом? Многие сферы жизни нашей страны еще нуждаются в реформировании, от транспорта до сельского хозяйства. При нынешнем состоянии Европы реформы необходимы как можно скорее. Под нашим руководством уже проросшие семена вырастут и расцветут по всей Европе. Новая зеленая революция, подобно великому приливу, распространится не только в нашей стране, но и по всей Европе, создавая лучшее будущее для всех ее жителей."
 GER_subsidize_public_transportation: "Субсидировать Общественный Транспорт"
 GER_subsidize_public_transportation_desc: "Что приходит на ум, когда люди думают о Германии? Возможно, об автобане или, что более вероятно, о нашей огромной системе железных дорог. Но на самом деле все гораздо сложнее, чем многие думают. Несмотря на усердную работу предыдущих администраций, значительная часть нашей инфраструктурной сети существенно недофинансирована и разрушается уже сейчас. Этого нельзя допустить и необходимо немедленно исправить ситуацию. С помощью субсидий, проектов и ремонтных работ мы приведем нашу сеть автомобильных, железных дорог и аэропортов в будущее. Автомобильные и железные дороги будут пронизывать нашу страну, как лианы растения, способствуя нашему переходу к сто сотой экологически чистой стране."
 GER_reform_agriculture: "Реформировать Агрокультуру"
 GER_reform_agriculture_desc: "Кукуруза, зерно, едва ли. Хотя для большинства эти слова не имеют большого значения, они являются источником жизненной силы для наших фермеров. Хотя наша предыдущая администрация предприняла несколько шагов, чтобы помочь нашим фермерам, многое еще не сделано. Большинство наших фермеров по-прежнему распыляют химические пестициды, не осознавая, какую опасность эти токсины представляют для растений и для них самих. В рамках нашего нового видения Германии мы будем прилагать сознательные усилия, чтобы рассказать нашим фермерам о преимуществах более экологичных методов. Мы будем субсидировать изменения, которые не только повысят урожайность, но и позволят им расти и расширяться. Благодаря этому мы будем расти и распространяться, становясь конкурентом Украины в качестве житницы Европы."
 GER_an_ecofriendly_industry: "Экологически Чистая Промышленность"
 GER_an_ecofriendly_industry_desc: "Будущее будет зеленым, или не зеленым вовсе - этот лозунг повторяет молодежь нашей страны, заботящаяся о климате. Пора приступить к завершению программы Energiewende, продолжая переход к устойчивой энергетической системе. Мы будем продвигать круговую экономику, сокращая потребление ресурсов, и предоставим государственные стимулы для модернизации зданий и оборудования, чтобы значительно снизить потребление энергии. Кроме того, обучение и тренинги для рабочих и будущих немецких бизнесменов помогут нашим отраслям перейти на более экологичную работу."
 GER_fund_russian_dissident_groups: "Помочь Украине"
 GER_fund_russian_dissident_groups_desc: "В первые месяцы европейской войны многие эксперты опасались худшего для наших украинских союзников. Однако, несмотря на все наши опасения, они держались стойко. И при нашей поддержке они оттеснили русского медведя, отправив его обратно в Москву с хвостом между ног. Теперь Украина является ключевым компонентом нашего влияния в Восточной Европе, и наша поддержка не ослабевает. Под нашим руководством и при поддержке НАТО Украина должна превратиться в восточный бастион свободы. Готовность к защите от любого ответного вторжения, которое может прийти из Москвы."
 GER_continent_wide_cooperation: "Сотрудничество в Масштабах Всего Континента"
 GER_continent_wide_cooperation_desc: "Закрепив за нами место доминирующей европейской державы, послевоенный мир поставил перед нами множество новых задач. Наши недавно освобожденные территории страдают экономически, а русские сопротивляются оккупации в зонах, контролируемых Украиной. На Кавказе регион находится на острие ножа: напряженность в Чечне грозит в любой момент выплеснуться наружу, что приведет к тотальной войне в регионе. Как бы нам ни хотелось это признать, в одиночку мы не сможем решить эти проблемы. Поэтому мы обратимся за помощью к нашим европейским союзникам. Укрепляя ЕС, мы будем способствовать формированию глубокого чувства товарищества и солидарности среди европейцев, что позволит нам выполнить обязательства перед союзниками и обеспечить продолжение демократии и свободы."
 GER_fortify_eastern_europe: "Укрепить Восточную Европу"
 GER_fortify_eastern_europe_desc: "На горизонте надвигается буря, еще более сильная и масштабная, чем предыдущая. Русский медведь просыпается. Он зализывает свои раны и будет мстить. Правда в том, что война снова на горизонте, и хотя мы не можем отсрочить неизбежное, мы все же можем подготовиться к мести Москвы. По всей стране и в координации с нашими союзниками будут разработаны планы, сделаны приготовления и организованы запасные линии. Эта война будет не просто борьбой за выживание. Она коренным образом изменит саму структуру европейского континента. Победа - единственный вариант, поскольку все остальное приведет к нашему поражению и возвращению Москвы не только на Восток. Но и на всей территории Европы."
 

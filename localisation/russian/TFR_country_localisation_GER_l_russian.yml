 GER_scars_of_nato_war: "Шрамы Европейской Войны"
 GER_scars_of_nato_war_desc: "Война наложила свой отпечаток на всех, и мы не стали исключением. Наши города и инфраструктура были разрушены, и на восстановление уйдут годы, если не десятилетия. Война подорвала моральный дух и ресурсы жителей, оставив глубокие шрамы, которые, возможно, никогда не исчезнут."
 GER_scars_of_nato_war2: "Шрамы Европейской Войны"

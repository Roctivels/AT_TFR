 GER_new_political_sphere_category: "Новая Политическая Сфера Германии"
 GER_new_political_sphere_category_desc: "\n\n\n\n\n£GFX_GER_new_political_sphere_banner\n\n\n\n\n\n\n\nНаша страна отравлена годами либерально-глобалистского упадочничества. Главная причина, по которой мы проиграли войну, состоит в том, что наш народ забыл, что значит жить в великой стране, и, откровенно говоря, пора им напомнить.\n\n"
 GER_five_year_plan_cat: "Пятилетний План"
 GER_five_year_plan_cat_desc: "Капитализм стал катастрофой для немецкой экономики. Более тридцати лет назад капиталисты ограбили и разорили народные предприятия восточной части нашей страны и полностью подчинили нас НАТО, а теперь они заставили нас ввязаться в невыигрышную войну с Россией, которая разрушила нашу экономику. Это был вопрос времени, когда эта система потерпит крах.\n\nФолькскаммер принял создание пятилетнего плана, чтобы исправить неудачи предыдущего режима, восстановить и приумножить промышленный потенциал Германии, чтобы мы могли победить фашизм раз и навсегда!"
 GER_socialist_market_economics_cat: "Социалистическая Рыночная Экономика"
 GER_socialist_market_economics_cat_desc: "Капитализм стал катастрофой для немецкой экономики. Более тридцати лет назад капиталисты ограбили и разорили народные предприятия восточной части нашей страны и полностью подчинили нас НАТО, а теперь они заставили нас ввязаться в невыигрышную войну с Россией, которая разрушила нашу экономику. Это был вопрос времени, когда эта система потерпит крах.\n\nФолькскаммер принял новый экономический план, чтобы исправить неудачи предыдущего режима, восстановить и приумножить промышленный потенциал Германии, чтобы мы могли победить фашизм раз и навсегда!"
 GER_spread_the_revolution_category: "Распространение Революции"
 GER_spread_the_revolution_category_desc: "0_o"
 GER_peoples_economy_category: "Volkswirtschaft"
 GER_peoples_economy_category_desc: "Германия долгое время была экономическим двигателем Европы, но в последние годы энергетическая нестабильность и напряженные торговые отношения поставили нашу страну на решающий перекресток.\n\nЧтобы пройти через эту эпоху, мы теперь полагаемся на два стратегических экономических инструмента:\n\n§7£GFX_GER_green_economy_points_texticon Зелёные Экономические Очки\:§!\n§gПолучаемые благодаря экологическим реформам, расширению использования возобновляемых источников энергии, инновационным экологическим решениям и мерам по обеспечению устойчивого развития промышленности.\nОни отражают устойчивость, инновации, эффективность и экологическую ответственность.§!\nТекущие §7£GFX_GER_green_economy_points_texticon Очки Зелёной Экономики\:§! [?GER_green_economy_points_var|+0]\n\n§3£GFX_GER_blue_economy_points_texticon Очки Синей Экономики\:§!\n§gПолучаемая за счет углубления интеграции Германии в европейскую экономическую структуру. Укрепление сотрудничества в рамках ЕС, стабилизация региональных цепочек поставок и поддержка целей развития континента.\nОни отражают интеграцию, промышленный потенциал и социальную ответственность.§!\nТекущие §3£GFX_GER_blue_economy_points_texticon Очки Синей Экономики\:§! [?GER_blue_economy_points_var|+0]\n\nКанцлер, сбалансировав экологическое обновление и европейскую координацию, вы сможете восстановить процветание и обеспечить Германии место ведущей державы на континенте."
 GER_bundeswehr_category: "Бундесвер"
 GER_bundeswehr_category_desc: "Современная немецкая армия никогда не считалась полностью независимой силой, с которой нужно считаться, но сейчас как никогда очевидно, что это полный отстой с абсолютной нехваткой рекрутов и финансирования.\n\nВозродить веру в Бундесвер - значит возродить нашу национальную гордость."
 GER_european_armed_forces_category: "Европейские Вооруженные Силы"
 GER_european_armed_forces_category_desc: "Если мы хотим раз и навсегда отбиться от русского медведя, мы должны посмотреть на то, что мы будем использовать для его защиты. Разрозненный блок из множества государств, каждое из которых пытается стать лучшим в каждой категории. Единственный путь к успеху - это единство. Единство наших вооруженных сил необходимо для достижения этой цели. Однако это единство не так просто, как произнести несколько речей в Брюсселе.\n\nДоговоры должны быть написаны и переписаны. Необходимо заключать пакты. Наши солдаты и командиры нуждаются в новой подготовке и организации. И наш народ должен поддерживать все это до конца. Эти реформы не должны быть приняты в одночасье. Но они должны быть приняты в любом случае. От этого зависит наше будущее и будущее наших детей. Только так наша свобода сможет выжить.\n\n@BRS §YIN VARIETATE CONCORDIA.§! @BRS"
 ISR_GER_solomon: "ОПЕРАЦИЯ: СОЛОМОН"
 ISR_GER_solomon_desc: "Главный союзник НАТО на Ближнем Востоке, Израиль, оказался под ударом арабской коалиции. Под прикрытием обычной этнической и религиозной ненависти и гуманитарных соображений они пытаются поставить под вопрос само существование Израиля. Мы не можем позволить им добиться успеха.\n\nКомандование НАТО разрешило, а Бундестаг одобрил всю необходимую военную поддержку, вплоть до ограниченного военного контингента войск НАТО, чтобы обеспечить право Израиля на самооборону.\n\nМы должны показать всему миру, что НАТО способна защитить своих союзников за рубежом."
 GER_spartanist_cat: "Национальное Возрождение"
 GER_spartanist_cat_desc: "\n\n\n\n\n£GFX_GER_querfront_cat_banner\n\n\n\n\n\n\n\nС тех пор как политика разделилась на правую и левую, возникло движение за их объединение - то, что по-немецки называется Querfront, или "перекрёстный фронт" - союз необходимости против сил капитализма и внешних врагов.\n\nХотя в Германии эта концепция не имела большого успеха в XX веке, другие страны имели положительный опыт смешения идей национализма и социализма, и Германии есть чему поучиться.\n\nИсторические обстоятельства подтолкнули правых и левых к коалиции друг с другом, и теперь путь, по которому пойдет Германия, находится в наших руках."
 GER_lacc_cat: "Оживление Человеческого Духа"
 GER_lacc_cat_desc: "\n\n\n\n\n£GFX_GER_lacc_cat_pic_banner\n\n\n\n\n\n\n\nМежду красными линиями, которые то поднимаются, то опускаются, и постоянно растущим подавлением человеческого самовыражения, несомненно, застой начнет превращаться в опухоль всего общества.\n\nКапитал - это враждебное божество, которое живет за счет страданий разумной жизни, и с маской неолиберализма это становится все более и более вопиющим.\nОдна из наших главных задач - избавиться от шрамов, оставленных капиталом, духовная детоксикация от оков ностальгии.\n\n"Легче представить конец света, чем конец капитализма."\nНо давайте не только представим конец капитала, но и положим ему реальный конец.\n\nУбейте прошлое, примите будущее, выдерните сорняки, вернитесь к корням."
 GER_agenda_2040_cat: "Agenda 2040"
 GER_agenda_2040_cat_desc: "\n\n\n\n\n£GFX_GER_agenda_2040_cat_banner\n\n\n\n\n\n\n\nНеобразованные люди высказывают множество догадок относительно наших планов, некоторые из них слишком абсурдны, а другие слишком близки к истине, но, тем не менее, именно мы держим в руках штурвал человечества.\n\nAgenda 2040 - это набросок наших целей, идеалов и планов, чтобы закрепить власть, которая была дарована нам много лет назад. Прогнозируя хаос, обрушившийся на мир, Европа стала площадкой для наших мозговых центров, чтобы создать безопасное убежище от разгорающегося пламени."
 GER_gunthers_twitter_cat: "https://x.com/GunterFehlinger"
 GER_gunthers_twitter_cat_desc: "\n\n\n\n\n£GFX_GER_gunthers_twitter_cat_banner\n\n\n\n\n\n\n\nUkraine & Kosovo must join NATO 2035\nCanada, UK, Iceland, Norway, Albania, Kosovo inEU 2039!\n@KOS @UKR @ARM @BOS @AUS @ISR @MOL @IRE @MLT @AZR @GEO @CYP @GER\n\n£GFX_GER_twitter_briefcase  §gПрезидент Европейского Союза\n£GFX_GER_twitter_location  under EU Nuclear umbrella§!    £GFX_GER_twitter_link_ti  §2youtube.com/£GFX_GER_dont_at_me_blue_ti guntherfehlin...§!\n£GFX_GER_twitter_date  §gРегистрация: июнь 2013 г.§!\n\n[GER_gunthers_twitter_following_count_text][GER_gunthers_twitter_followers_count_text]\n§gНет в читаемых у пользователей, которых читаете вы§!\n\n  Посты                 Ответы              Подписка                Избранное              Медиа"
 

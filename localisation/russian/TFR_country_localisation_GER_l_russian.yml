 GER_spirit_of_bruchmuller_desc: ""
 GER_spirit_of_rommel: "Дух Роммеля"
 GER_spirit_of_rommel_desc: "Несомненно, если и есть какая-то военная тактика, которая определила наше великолепие на десятилетия после войны, то это блицкриг. Именно наша концентрация на быстрых, агрессивных и гибких маневрах с целью обойти противника и одолеть его силы без особых сражений привела к нашему неоспоримому господству на европейском континенте и почти полной капитуляции британцев в Египте и Советов на востоке.\n\nИ все же, в основном из-за определенной некомпетентности наших союзников и нас самих, это привело к нашей капитуляции перед союзниками и последующему унижению, которое за этим последовало. На этот раз мы будем учиться на наших прошлых ошибках и убедимся, что этот второй шанс будет правильным.\n\nБлагодаря Лису пустыни и его гению, приведшему к капитуляции Британской Северной Африки, мы последуем его примеру. Мы овладеем искусством комбинированной тактики, а также инициативой и импровизацией, чтобы наши враги никогда больше не смогли одержать над нами победу."
 GER_panzerpioneers: "Panzerpioneers"
 GER_panzerpioneers_desc: "В наших танковых дивизиях танки, конечно, являются ключевым аспектом. Однако не менее ценны и саперы, которые находятся вне танков и следят за тем, чтобы они прибывали к месту назначения без задержек. Эти корпуса, обученные оказывать поддержку танковым соединениям в преодолении препятствий, укреплений и труднопроходимых местностей, которые могут замедлить или остановить продвижение бронетехники, играли ключевую роль во время Второй мировой войны и будут играть не менее важную роль в этой.\n\nЭти люди будут обучены строительству мостов, подрыву, тралению мин, штурму укреплений, до которых наши танки не могут добраться, и расчистке территорий за линией фронта для всех бедных ублюдков, которые не получили записку. Наши огнеметы сделают свое дело."
 GER_fall_rache: "§YFALL§!: RACHE"
 GER_fall_rache_desc: "Настал момент, к которому мы готовились годами. Слишком долго мы держали свою ненависть в себе, сдерживая ее, но постепенно тренируя с годами. Теперь пришло время дать нашей ненависти одержать верх над силами врага. Настало время для мести. Месть за европейское будущее. Будущее, свободное от коммунизма и глобализма. Будущее свободы и суверенитета.\n\nНастало время заплатить кровью за весь тот ущерб, который красные нанесли некогда могущественным народам Восточной Европы. Теперь они вынуждены находиться под трусливой пятой. Больше нет. Наша месть обрушится на Москву, и наша ненависть подогреет наш огонь."
 GER_unternehmen_michael: "§YUNTERNEHMEN§!: HUS"
 GER_unternehmen_michael_desc: ""
 GER_fall_johan: "§YFALL§!: ЙОХАН"
 GER_fall_johan_desc: "Скандинавские страны не пострадали от разрушений, охвативших Западную Европу, но их экономика лежит в руинах. Несмотря на свою малонаселенность, эти земли имеют огромное стратегическое значение. Швеция предлагает нам жизненно важный плацдарм для высадки десанта в Прибалтике, а Норвегия - северный фронт в районе Мурманска, ключевой пункт, с которого можно давить на советскую оборону. Мы должны действовать быстро, если мы не предпримем инициативы по обеспечению безопасности Северных стран сейчас, они могут попасть в сферу влияния Советов."
 GER_strong_arm_the_north: "Разбить Север"
 GER_strong_arm_the_north_desc: ""
 GER_the_final_option: "Последний Вариант"
 GER_the_final_option_desc: "Все, что мы делали, провалилось. Мы подвели Германию, мы подвели Европу, мы подвели народ. Ничто не спасет нас от этой катастрофы. Все, что нам осталось, это §Rутащить их за собой§!"
 GER_bitter_lessons_from_nato_war: "Горькие Уроки Европейской Войны"
 GER_bitter_lessons_from_nato_war_desc: "Утрата - это то, чему мы не хотим учить наших детей. Как наша собственная слепота привела к нашей гибели и разграблению от рук безжалостных славян. Но, несмотря на то что это может причинить нам боль, мы должны взглянуть на прошлое, если хотим никогда больше не повторять тех же ошибок. Неудачи прошлой администрации заключались в том, что она не справилась с реалиями войны. Они были слишком заняты своей моралью и бюрократией, чтобы даже подумать о солдатах, отбивающих у большевистских кочевников наши девственные земли.\n\nДавайте посмотрим на их ошибки, проанализируем их, увидим, что они могли бы сделать лучше, и сделаем это сами. Мы представляем европейский народ лучше, чем любое правительство. Мы понимаем их боль и хотим, чтобы это никогда не повторилось. По крайней мере, с нами."
 GER_armor_innovations: "Инновации в Броне"
 GER_armor_innovations_desc: "Наши танки всегда были ключом к успеху на поле боя. Так было и во время Второй мировой войны, и во время европейской войны. Теперь они будут служить и нашим целям. Для этого мы предоставим крупные инвестиции всем ученым и компаниям, работающим над производством и разработкой этих машин. Мы сделаем все возможное, чтобы они заставили наших врагов вернуться в Москву прежде, чем они смогут сказать: "Пролетарии всех стран, соединяйтесь!""
 GER_strategic_destruction: "Стратегическое Разрушение"
 GER_strategic_destruction_desc: "Как бы ни было важно уничтожение вражеских комбатантов и военного имущества, мы должны понимать, что война - это не только это. Многое, что происходит вдали от фронта, делает ее возможной. Зная это, мы должны нацеливаться не только на их войска на фронте, но и на все, что поддерживает их далеко в тылу. Их солдатам нужна еда с ферм, оружие с заводов, заказы из учреждений и многое другое. Наши военно-воздушные силы сосредоточатся на ударах по всему этому и всему остальному, что обеспечивает функционирование их военных сил и, в конечном счете, их общества. Все, от заводов до электростанций и командно-контрольной инфраструктуры, будет уничтожено. Их армии будут быстро голодать и останавливаться, когда мы уничтожим все, что их поддерживает."
 GER_blot_out_the_skies: "Заслонить Небеса"
 GER_blot_out_the_skies_desc: "Современная война за воздух будет полем, где не берут пленных, где не прощают. Наша воздушная доктрина должна отражать эту реальность. Наши Люфтваффе будут стремиться насытить небо и сосредоточиться на непосредственном уничтожении воздушных средств противника. Однако мы не должны ограничиваться только истребителями или тактическими бомбардировщиками. Мы должны уничтожать все, что принадлежит врагу, независимо от того, что это такое. Будь то грузовой самолет, гражданский лайнер или сложный истребитель нового поколения - все это часть вражеской военной машины и должно быть уничтожено. Для наших пилотов все будет очень просто: цель есть цель, независимо от ее формы, размера, обозначения или того, кто находится на борту."
 GER_restructure_air_doctrine: "Реструктурировать Воздушную Доктрину"
 GER_restructure_air_doctrine_desc: "Многое изменилось в воздушной войне с тех пор, как в последний раз обновлялись наши доктрины. Новые технологии, новая тактика и совершенно новый образ мышления стали стандартом, от которого мы отстали. Однако сейчас для нас настало время вернуть Германию к современным стандартам. Мы пересмотрим наши доктрины, внедрим новые уроки последних конфликтов и обучим наших офицеров новейшим разработкам. Возможно, это расстроит некоторых представителей старой гвардии ВВС, но это окажется более чем необходимым. Вскоре наши ВВС будут лидировать как в теории, так и на практике."
 GER_restore_luftwaffe_pride: "Восстановить Гордость Люфтваффе"
 GER_restore_luftwaffe_pride_desc: "Люфтваффе когда-то были самыми страшными военно-воздушными силами Европы, и не зря. В первой половине Второй мировой войны наши талантливые пилоты и мощные самолеты сметали врага за врагом, смиряя державы, которые когда-то считались неприкасаемыми. Это наследие мы должны возродить с энтузиазмом. Символы, победы, культура и память о героях прошлого будут изучаться и почитаться на каждой авиабазе и каждым летчиком. Враги Германии скоро будут дрожать от страха, когда увидят, как над ними снова пролетает "Балкенкройц"."

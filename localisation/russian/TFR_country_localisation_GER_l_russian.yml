 GER_army_reformation_idea_desc: "Вместе с политической и социальной революцией, которую мы совершили в этой стране, пришла и революция в вооруженных силах Германии. Старый капиталистический бундесвер в настоящее время переживает не что иное, как обширную и системную реформу и реструктуризацию. Формируются новые подразделения, пересматриваются доктрины, вводятся новые стандарты, расширяется набор личного состава; происходящие изменения трудно поддаются количественной оценке. Несмотря на то, что для преданных солдат и офицеров армии это может показаться неспокойным, в результате реструктуризации вскоре появятся современные и пролетарские вооруженные силы, на которые сможет равняться весь мир."

 FAF_Move_Troops_into_Padania_decision_desc: ""
 FAF_Force_Padanian_Referendum_decision: "Принудительный [LOM.GetFlag] §GПаданский Референдум§!"
 FAF_Force_Padanian_Referendum_decision_desc: ""
 FAF_Open_Paris_Identitarian_Council_decision: "Укрепление §CПарижской Идентичности§!"
 FAF_Open_Paris_Identitarian_Council_decision_desc: "Как можно говорить о Франции, не упоминая Париж? На протяжении веков Париж был сердцем французского искусства, моды и литературы, если не сказать - всего мира. Но "Город света" был построен не только из кирпичей и камней; его создала процветающая парижская культура, которая позволила расцвести жизни и творчеству. Парижская культура - это то, что вывело нашу страну на мировую арену и заставило наше имя звучать через океанский блюз."
 FAF_Open_Alsace_Identitarian_Council_decision: "Укрепление §PЭльзаской Идентичности§!"
 FAF_Open_Alsace_Identitarian_Council_decision_desc: "Эльзас - французский, и Эльзас остается французским. Со времен Вестфальского договора Эльзас находится под властью Франции. Некоторые утверждают, что Эльзас - немецкий, но это наглая ложь. Ложь, призванная посеять раздор между нами. Правда, что немцы неоднократно разрывали нас на части на протяжении всей истории, но кровь гуще воды, и мы должны напомнить жителям Эльзаса об этом факте."
 FAF_Open_Occitan_Identitarian_Council_decision: "Укрепление §OОкситанской идентичность§!"
 FAF_Open_Occitan_Identitarian_Council_decision_desc: "На протяжении многих поколений Окситания находилась под властью Франции и сегодня является хорошо интегрированной частью нашей нации, но, возможно, немного слишком хорошо. Окситанская культура и язык оказались под угрозой исчезновения и скоро будут забыты в нашей великой стране. Мы не можем допустить этого. Возрождение окситанской культуры - это ключ к тому, чтобы помочь нашему народу найти свои корни."
 FAF_Open_Corsican_Identitarian_Council_decision: "Укрепление §gКорсиканской Идентичность§!"
 FAF_Open_Corsican_Identitarian_Council_decision_desc: "С конца XVIII века Корсика стала французской. Этот маленький остров, расположенный к юго-востоку от материковой Франции, породил величайшего гиганта в истории Франции - Наполеона Бонапарта. Место Корсики в составе Франции всегда было шатким и даже проблемным. Но, принимая и интегрируясь, мы можем укрепить наши родственные связи."
 FAF_Open_Lombardian_Identitarian_Council_decision: "Укрепление §GЛомбардской Идентичности§!"
 FAF_Open_Lombardian_Identitarian_Council_decision_desc: "Связь между нами, французами, и лангобардами возникла, когда могущественный Карл Великий завоевал их королевство, включив их в сферу нашего культурного влияния. Сейчас, когда наши ломбардские братья возвращаются в наши объятия, мы должны возродить многовековые связи между нашими народами."
 FAF_Open_Venetian_Identitarian_Council_decision: "Укрепление §AВенецианской Идентичность§!"
 FAF_Open_Venetian_Identitarian_Council_decision_desc: "Мы, французы, всегда очень восхищались и ценили венецианскую культуру и народ. Когда Наполеон завоевал Венецию, он не стал искать ни ее жителей, ни ее материальные богатства, а обратил свой взор на великолепное венецианское искусство. Радуйтесь, мои венецианские братья, ведь вы наконец-то стали частью нашей великой французской семьи."
 FAF_Open_Roman_Identitarian_Council_decision: "Укрепление §tРимской Идентичности!"
 FAF_Open_Roman_Identitarian_Council_decision_desc: "О Рим... С чего бы начать? Основа французской культуры - римская, а французский язык - латинский. Переплетение римлян и древних галлов сделало Францию такой, какая она есть сегодня. Римский милитаризм, римская креативность и римская изобретательность достались нам в наследство. Франция - это Рим, а Рим - это Франция."
 FAF_Open_Basque_Identitarian_Council_decision: "Укрепление §7Баскской идентичность§!"
 FAF_Open_Basque_Identitarian_Council_decision_desc: "Баскский народ может гордиться тем, как хорошо он сохранил свою культуру и язык. Однако яд глобализации привел к тому, что и то, и другое ослабевает. Во Франции культура басков постепенно исчезает, а язык забывается. В Испании баски становятся все более агрессивными. Под нашим правлением они должны помнить, что нас делает сильными не культурное разделение, а богатство двойного наследия."
 FAF_Open_Catalan_Identitarian_Council_decision: "Укрепление §YКаталонской идентичность§!"
 FAF_Open_Catalan_Identitarian_Council_decision_desc: "Каталонская культура и язык постепенно оказались под угрозой исчезновения из-за наших усилий по централизации образования. Эта маленькая невинная ошибка заставила их отказаться от собственных традиций и приспособиться к французскому образу жизни. Мы не должны забывать, что мы - кастель, и, как в кастеле, все должно быть в гармонии, чтобы достичь стабильности."
 FAF_dauphine_province_modifier: "Правление Дофина"
 FAF_dauphine_province_modifier_desc: "\n§YДофин:§!\n\n\n\n\n\n\n\n\n\n£GFX_louis_xxi_Portrait\n\n\n\n\n\n\n\n§W          Луи§! \n\n\nС XII века местный правитель граф Гиг IV Альбонский носил на своем гербе дельфина и был прозван Дофином. В 1349 году Дофине перешло от последнего некоролевского дофина к будущему королю Франции Карлу V путем покупки земель. Условия передачи предусматривали, что законный наследник Франции отныне будет именоваться Дофином, и включали значительную автономию и освобождение от налогов для региона Дофине. После восстановления монархии новым дофином становится Людовик, герцог Бургундский."

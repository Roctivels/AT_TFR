 FAF_seventh_french_republic_category: "Строительство 7-ой Республики"
 FAF_seventh_french_republic_category_desc: "\n\n\n\n\n£GFX_FRA_new_republic_category\n\n\n\n\n\n\n\nНаша республика все еще стоит на ногах, несмотря на все трудности, которые мы пережили. Мы примем все возможные меры, чтобы наша демократия никогда больше не была так близка к краху. Франция сохранит красоту цветов демократии, которые мы позволим вновь расцвести по всей стране, чтобы залечить шрамы, оставленные ужасной гражданской войной, которая почти лишила нас всего, что нам дорого.\n\nНеудачи прошлой республики навсегда останутся в памяти как наш самый мрачный час, но и как доказательство нашей решимости бороться со всеми ужасами, направленными против прав свободных людей. С силой, данной нам Господом Богом, мы останемся бастионом демократии в Европе, пока фашисты и коммунисты свергают все, ради чего мы работали. Мы победим в этой великой тьме благодаря свету факела свободы, который будет гореть на всех концах Европы. \n\nLiberté победит!"

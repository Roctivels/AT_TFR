 FAF_Glorify_Jeanne_dArc: "Прославлять Жанну д'Арк"
 FAF_Glorify_Jeanne_dArc_desc: ""
 FAF_Enshrine_the_Rights_of_Man: "Закрепить Права Человека"
 FAF_Enshrine_the_Rights_of_Man_desc: "В 1798 году наши предки избавились от террора и варварства Древнего режима и решили создать руководство для недавно освобожденного народа Франции. Этот документ, известный как Декларация прав человека и гражданина, до сих пор занимает место в самой последней конституции Пятой республики. Сейчас, когда мы восстанавливаем легитимность правительства, не закрепить эти права было бы глупо!"
 FAF_Restore_Marianne: "Восстановить Славу Марианны"
 FAF_Restore_Marianne_desc: "Фигура Марианны, возникшая из огня Первой республики, часто выступала в качестве национального олицетворения самой Франции. Однако в последние десятилетия она стала менее актуальной в популярной культуре, к огорчению многих французских патриотов. Поэтому, если мы стремимся объединить Францию под нашим патриотическим знаменем, мы должны вернуть актуальность и славу нашей любимой Марианне!"
 FAF_Calm_Militarist_Rhetoric: "Успокоить Милитаристскую Риторику"
 FAF_Calm_Militarist_Rhetoric_desc: "В наших рядах есть те, кто хочет, чтобы военные еще больше контролировали правительство за счет наших гражданских свобод. Мы ценим их призывы к порядку и стабильности, но настало время смягчить риторику этих милитаристов, чтобы не превратить нашу любимую Республику в постоянную военную хунту."
 FAF_Pardon_Republican_Officers: "Помиловать Республиканских Офицеров"
 FAF_Pardon_Republican_Officers_desc: "В наших усилиях по обеспечению контроля над государственным аппаратом нам нужно как можно больше рук. Хотя первоначальная чистка коснулась большинства бывших офицеров, участвовавших в перевороте, сочувствующих можно вернуть обратно с помощью серии помилований."
 FAF_Mimic_de_Gaulle: "Подражать Де Голлю"
 FAF_Mimic_de_Gaulle_desc: "Когда мы стремимся к созданию сильного, ориентированного на военных подхода к управлению страной, который по-прежнему уважает основные права наших граждан, на кого нам лучше всего ориентироваться, как не на покойного президента и генерала Шарля де Голля? Его усилия по созданию печально неудачной Шестой республики могут послужить основой для нашего руководства, которое, хотя и потребовало некоторых жестких мер для преодоления майского кризиса 1958 года, оставило после себя прекрасное наследие, которому мы должны стремиться подражать."
 FAF_Glorify_Vichy_Stability: "Прославлять Стабильность Виши"
 FAF_Glorify_Vichy_Stability_desc: "Общественный имидж бывшего французского государства был запятнан обвинениями в "немецком коллаборационизме" со стороны многих предвзятых историков, но есть один способ искупить его наследие среди народа Франции. Поскольку в хаосе XXI века многие ищут именно этого, подчеркивание стабильности бывшего режима Виши может помочь нашим людям увидеть, что наши цели выходят далеко за рамки простой капитуляции перед немецкими фашистами."
 FAF_Redeem_The_Marechal: "Искупить Маршала"
 FAF_Redeem_The_Marechal_desc: "История не была благосклонна к Филиппу Петену. Маршал, которого когда-то называли "Верденским львом" за его храбрость в Первой мировой войне и готовность заключить мир с вторгшимися немцами, чтобы предотвратить неминуемое уничтожение Франции. Мелочные либеральные историки, чертовски заинтересованные в том, чтобы считать его коллаборационистом, должны замолчать. Вместо этого наше образование должно отражать более "справедливый" подход к тому, как мы оглядываемся на истинного спасителя Франции во время Второй мировой войны!"
 FAF_Keep_Officers_in_Check: "Сокращать Офицеров"
 FAF_Keep_Officers_in_Check_desc: "Офицерский корпус стал для нас занозой в боку, присоединившись к псевдолиберальным голлистам, стремящимся вернуть нас к нестабильности предыдущих французских республик. Хотя они по-прежнему нужны нам в наших государственных делах, ограничение их политического влияния необходимо для обеспечения нашей власти."
 FAF_An_Honour_to_Serve: "Честь Службы"
 FAF_An_Honour_to_Serve_desc: "Наш народ должен понять, что наследие Франции - это служение и самопожертвование. Начиная с древних времен правления франков и Карла Великого и заканчивая наполеоновскими завоеваниями Европы, французское наследие - это военная служба и честь служить в ней. Пропаганда должна подчеркивать эту традицию, особенно сейчас, когда мы готовимся к очередному крестовому походу против орд Востока!"
 FAF_Promote_French_Israelism: "Пропагандировать Французский Израилизм"
 FAF_Promote_French_Israelism_desc: "Несмотря на то, что французский национализм - это крайняя вера, существует движение людей, которые считают, что наши франкские предки - потомки колена Вениамина, то есть одного из потерянных десяти колен Израиля. Кому-то это может показаться псевдоисторическим, но если мы будем продвигать эту концепцию, это поможет воодушевить наших религиозных граждан на борьбу за наш режим. В борьбе с ордами Востока представить себя крестоносцами по праву рождения было бы мудрой идеей."
 FAF_Promote_Radical_Officers: "Продвигать Радикальных Офицеров"
 FAF_Promote_Radical_Officers_desc: "Чтобы нивелировать влияние голлистов на офицерский корпус, мы можем продвигать в офицеры тех, кто в настоящее время служит в армии и лучше воплощает наши петаинистские идеалы. Кроме того, офицерам всегда полезно иметь разные мнения, особенно в политическом отделе, верно?"
 FAF_Glorify_Jeanne_dArc_Monarchist: "Прославлять Жанну д'Арк"
 FAF_Rebuild_The_Chateaux: "Восстановить Шато"

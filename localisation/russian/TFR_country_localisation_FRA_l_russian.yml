 FRA_Interventionist_Fervor: "Усиленные Боевые Ястребы"
 FRA_Interventionist_Fervor_desc: "Северная Америка погрузилась в хаос и анархию, в состояние смерти и разрушения, невиданное в современной истории. Этот беспорядок настолько потряс наш политический истеблишмент, что исчезли прецеденты, длившиеся десятилетиями. Практически в одночасье изменилась позиция государства и кадровый состав - перемены, беспрецедентные даже по своей сути. В каждом правительственном кабинете голуби замолчали, а их место заняли ястребы. Все они видят горящий мир вокруг нас и требуют того, что и так у всех на уме. Если нам нужно действовать, чтобы сохранить мир и безопасность в Европе и за рубежом...\n\nТо мы сделаем то, что должны."

 FAF_napoleonic_sympathies_dynamic: "Наполеоновское наследие"
 FAF_napoleonic_sympathies_dynamic_desc: "Наш штат имеет гордую и великую историю. Государство Франция построено на достижениях Наполеона Бонапарта, семьи Бонапартов, которые несколько раз в одиночку побеждали всю Европу, пока в конце концов не были повержены после простого истощения. Не будет такого блеска, который сравнится с блеском Франции, Французской империи. Это самое великое государство во всей Европе, и так будет всегда."

 FAF_full_employment_idea: "Полная Занятость"
 FAF_full_employment_idea_desc: "Наконец, после долгих лет проб и ошибок мы добились полной занятости населения страны. При этом большинство наших граждан нашли себе работу, обеспечивающую высокий уровень жизни, который заставляет их отдавать все силы нашей стране и ее экономике. Конечно, это повлекло за собой проблемы с призывом в армию и жалобы предпринимателей, которые больше не могут пользоваться дешевой иностранной рабочей силой. Но для наших граждан, и особенно для нашей пропаганды, достижение того, что у нас есть работа для всех, - это не повод для насмешек!"
 FAF_Worker_Syndicate_Program_idea: "Национальный Рабочий Синдикат"
 FAF_Engie_Bills_idea: "Векселя Engie"
 FAF_Engie_Bills_idea_desc: "Векселя Engie - это система займов и долговых обязательств, которая позволит Франции провести ремилитаризацию без вмешательства иностранных держав и ястребиных глаз. Подобно векселям MEFO, использовавшимся Германией для реиндустриализации своей страны, они представляют собой дорогостоящий и двуличный маневр, который вряд ли будет продолжаться вечно. Однако, независимо от того, чем все закончится, они необходимы для того, чтобы Франция вновь возродилась как настоящая держава на мировой арене."

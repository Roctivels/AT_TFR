 france.291.t: "Смешливый Кашель"
 france.291.d: ""Позволь мне рассказать вам кое-что забавное," начал Жан-Поль Дюваль, стоя под светом прожекторов в комедийном клубе, его улыбка была теплой и располагающей. "Вчера я видел, как на Елисейских полях столкнулись два марша протеста. Группа сторонников вакцин кричала: 'За Францию, мы должны делать прививки!', а группа противников вакцин кричала: 'За Францию, мы должны отказаться от вакцин!' Какая ирония - обе стороны утверждают, что любят одну и ту же страну, но с радостью выгоняют из нее другую."\n\n"'Антивакцинаторы' называли 'провакцинаторы' 'пособниками тирании', а 'провакцинаторы' обвиняли 'антивакцинаторов' в том, что они 'агенты хаоса'. В конце концов это переросло в драку. И я подумал: если все так любят Францию, почему бы не встретиться в кафе, съесть круассан и обвинить друг друга в предательстве за чашечкой кофе? По крайней мере, это было бы более... французским, не так ли?"\n\nЖан-Поль сделал паузу, на его лице отразилась насмешливая задумчивость. "Что еще более странно, так это то, что обе стороны утверждают, что другой стороне промывают мозги. Это напоминает мне моих соседей. Те, что слева, говорят, что мне промыли мозги правые, а те, что справа, говорят, что мне промыли мозги левые. Поэтому я решил переехать наверх. Теперь они просто говорят, что я выше всего этого."\n\nТолпа разразилась хохотом. "Итак," поднял он свой бокал, "давайте выпьем за Францию. За страну с революцией в ДНК, за нацию, которая даже споры превращает в искусство.""
 france.291.a: "''Если мы больше не можем даже красиво спорить, то разве мы еще французы?''"
 france.292.t: "Евразийство Запада"
 france.292.d: ""Родольф Прюдомм, прошу вас выступить", - объявил секретарь партии Les Identitaires, стоявший на трибуне.\n\nРодольф Прюдомм был уважаемым и высокопоставленным членом Блока, который на протяжении многих лет способствовал росту движения в своем родном городе Бордо. Сегодня он должен был провести первое заседание собрания в коммуне Таланс, расположенной недалеко от общественного парка. Это был хороший способ привлечь как негативное, так и позитивное внимание, а также определить стратегию движения в регионе на ближайший квартал.\nПосле того как его имя было названо, Родольф вышел на трибуну и, отдав честь секретарю, начал говорить. Строгость и упорство, с которыми он говорил, несмотря на возраст, были одной из многих причин его стремительного взлета в партии. Он говорил с энтузиазмом революционеров и мучеников XX века, которые сражались до него, контрастируя с его мудростью и проницательностью, которые понадобятся новому поколению после него. Толпа подбадривала его, когда он говорил о притоке турецких, магрибинских и субсахарских мигрантов в Гран-Парк, которые стали большинством населения. \nВ конце концов, он завершил свою речь, передав сцену Леону Дюверже, гораздо более молодому и неопытному члену партии. Это было преднамеренное решение, призванное символизировать "передачу факела" между старыми и молодыми. Он не знал, насколько широко Леон подвергался насмешкам за свою непоследовательную и порой комичную систему убеждений, а также за свой довольно неприятный лексикон.\n\nНесмотря на пренебрежительное отношение товарища, Леон вышел на сцену и начал свою речь.\n\n"Друзья и братья, я хотел бы начать с ответа на стратегию месье Прюдомма в департаменте Жиронда. Без всякого неуважения к самому великому человеку, как может евразийство Запада достичь своей цели, если оно..."\n\nЭтот человек был прерван какофонией смеха и освистывания, вызванной неудачным выбором слов.Он попытался продолжить выступление, но в результате этой очень странной речи его согнали с трибуны, а затем и вовсе выгнали из партии."
 france.292.a: "Клоун."
 france.293.t: "Пустынный Орел"
 france.293.d: "Истребитель майора Антуана Дюпре парил над Сахарой, и с высоты 30 000 футов пустыня расстилалась под ним, как великолепный золотой гобелен. Волнистые дюны мерцали в знойной дымке. Позади него остальная часть эскадрильи летела в идеальном строю на фоне голубого простора, их крылья сверкали под палящим солнцем.\n\nСквозь плексиглас навеса Антуан мог отчетливо видеть раскинувшееся внизу море песка. Волны жары искажали горизонт, заставляя все вдали казаться миражом. Вдруг на юго-западе он заметил необычный шлейф пыли. Активировав бортовую оптическую систему, он обнаружил колонну машин, которые вяло двигались, их длинные тени тянулись под солнцем, как вереницы ползущих муравьев. \n\n''Командование, это 'Лира'. Подозрительный конвой замечен в точке с координатами 23°15'N, 5°47'E. Приблизительно двенадцать машин движутся на юг.''\n"Вас понял, 'Лира'," раздался в гарнитуре голос командира базы. \n"Разрешаю задействовать силу."\n"Понял. 'Меч-2', 'Меч-3'," сказал Антуан по связи, "выберите курс три градуса на юго-запад, сохраняйте высоту.""
 france.293.a: "''Так, ребята, будьте начеку!''"

 FAF_vladimir_zhirinovsky_thought_desc: "\n\n\n\n£GFX_FAF_ideology_zhir_thought\n\n\n\n\n\n"

 FAF_March_through_Italia: "Захватить Италию"
 FAF_March_through_Italia_desc: "Италия стала полигоном для первого императора Наполеона, где он добился успеха благодаря военным достижениям и где Наполеон III с его благословения основал новое национальное государство. Сегодня Италия, несомненно, все еще является важной частью Французской империи, и то, что она оказалась под нашей пятой, поможет нам в грядущих войнах. \n\nДавайте убедим их в преимуществах французской защиты в этой новой Европе."
 FAF_Restore_Imperial_Pride: "Стимулировать Наполеоновскую Гордость"
 FAF_Restore_Imperial_Pride_desc: "Правление императора Наполеона I было не только экономическим и военным процветанием, но и великими реформами. Люди часто забывают, что династия Бонапартов стала не реакцией, а продолжением Французской революции, и править с благосклонностью и политикой, которой народ может гордиться, - это хлеб и масло бонапартистской доктрины. \n\nЕсли император не заботится об интересах общества, он не должен быть Бонапартом, потому что Бонапарт означает прогресс, Бонапарт означает могущество, Бонапарт служит доказательством благосклонности справедливого монарха и совершенства самодержавия, когда оно применяется в бархатной перчатке."
 FAF_Discard_Aspects_of_Identitarianism: "Принять Латинское Единство"
 FAF_Discard_Aspects_of_Identitarianism_desc: "Франция - лишь один из кусочков головоломки, по правде говоря, если бы Наполеон I добился успеха, он бы создал Идентичную империю, к которой мы сегодня снова стремимся, и аннексия Каталонии и Рима служит тому доказательством. Сегодня мы снова стремимся к объединению латинского мира, к объединению Испании, Италии и Франции, подобно могучему Западному Риму, возглавляемому могучими галлами. Мы, латиняне, должны держаться вместе или погибнуть по частям."
 FAF_solidarite_latine_idea: "Solidarité Latine"
 FAF_solidarite_latine_idea_desc: "Латинский народ - это гегемония, которая должна расправить свои крылья по всей Европе, сражаясь как единое целое и как памятник нашей истории и нашей культуре. Враги Латиндома огромны, многочисленны и сильны своей стойкостью. Однако, как уже было сказано, они - всего лишь варвары, пытающиеся с остервенением разрушить стены цивилизации, с которыми мы, потомки Рима, должны бороться кровью и землей."
 FAF_convene_latin_congress_decision: "Созвать Латинский Конгресс"
 FAF_convene_latin_congress_decision_desc: "Мы - государство для всех великих латинских народов, и чтобы в нашей новой великой империи не доминировали, например, французы, мы должны позаботиться о том, чтобы каждый латинский брат в империи получил свое представительство. Для этого мы будем созывать великие латинские конгрессы, на которых все латинские братья получат справедливое представительство."
 FAF_Pacify_Padania: "Усмирить Паданию"
 FAF_Pacify_Padania_desc: "Падания - относительно новый термин, более новый, чем претензии Бонапарта на французский престол, что на просторах европейской истории означает, что он определенно очень новый. Падания стала известна сначала при коммунистах, а затем была захвачена федералистской партией LEGA, федерацией северных партий LEGA, объединившей такие области, как Ломбардия, Венеция и Пьемонт, в LEGA Nord, а печально известная Паданская декларация независимости в 1996 году, хотя по сути ничего не дала, укрепила свободный дух в Падании, и с нашей помощью Падания была включена в нашу империю, и, как Наполеон I, который называл себя императором Франции и королем Италии, мы добавим Паданию к этому списку титулов. Закрепление Падании в качестве независимого, но неотъемлемого титула Французской империи и латинского мира ослабит региональную напряженность и успокоит миллионы бывших североитальянских народов, которые так храбро боролись за право называться паданцами."
 FAF_A_New_Continental_System: "Новая Континентальная Система"
 FAF_A_New_Continental_System_desc: "Континентальная система была идеей, опередившей свое время в 1805 году. Объединить Европу в континентальный экономический блок против общей угрозы, в то время это были англичане, а в наше время? Россия. Мы должны возродить континентальную систему снова, чтобы заполнить пустоту, оставленную Европейским союзом. Некоторые могут сопротивляться Европе, возглавляемой из Парижа, но если они примут Европу, возглавляемую из Брюсселя, эй, мы владеем Брюсселем тоже. \n\nЕвропа снова окажется под каблуком, но на этот раз не мы были агрессорами, принуждающими ее к единству, а мы - восходящая опора стабильности в разбитой коалиции, страдающей от слабости, которую навязал им либерализм, мы - лекарство и щит."
 FAF_Restore_The_Imperial_Palace: "Восстановить Императорский Дворец"
 FAF_Restore_The_Imperial_Palace_desc: "Дворец Наполеона в Версале и императорская резиденция в Фонтенбло были превращены в музеи и парки республиками, пришедшими на смену старым империям. Наполеон I и Наполеон III подолгу гостили в Фонтенбло, и было приложено немало усилий, чтобы украсить и прославить эти места. И снова их необходимо сделать подходящими для размещения императора и иностранных сановников."
 FAF_Imperial_Palace_idea: "Императорский Дворец" 
 FAF_Imperial_Palace_idea_desc: "Дворец - знак стабильности, богатства и процветания. Символ Франции и ее монархии, знак того, что она будет существовать еще долгие века. Бриллиант на ее кольце - яркая демонстрация нашего богатства и нашей власти над континентом."
 FAF_Ally_the_Church: "Работать с Церковью"
 FAF_Ally_the_Church_desc: "Католическая церковь - вечный институт, такой же древний, как Франция, и такой же переплетенный с ее судьбой. Французская революция порой заходила слишком далеко в своих излишествах, полностью отбрасывая церковь, поэтому Наполеон был необходимой сдержанностью для революции, восстанавливая разум в движении, которое имело перспективы, но было затруднено хаосом, столь характерным для республики. \n\nНаши отношения с церковью должны быть восстановлены и сохранены, хотя мы не признаем власть церкви выше, чем власть нашего императора, мы будем продвигать церковь как жизненно важный государственный институт."
 FAF_Rally_the_Imperial_Spirit: "Je suis le Déluge"
 FAF_Rally_the_Imperial_Spirit_desc: "Наш император - не просто последний представитель рода Бонапартов, он - наследник его наследия. Он - человек, излучающий качества своих предшественников. Быть Делюгом, утверждать, что ты им являешься, значит утверждать, что тебя не остановить, и мы это делаем. Республика была хрупким, непостоянным, больным состоянием, в котором оказались французы, прогнившим от междоусобиц, прогнившим от пацифизма. Империя - это та сила, которая была необходима Европе в последней войне, и она же будет в следующей. \n\nПока мы готовим наши кинжалы, чтобы нанести удар в сердце коммунистического логова, мы должны гордиться тем, что наш Император - это потоп, он - меняющийся прилив, он будет идти к окончательной победе, и не будет никакого Ватерлоо в конце нашего правления, Империя падет только тогда, когда Солнце поглотит Землю, и не раньше!"
 FAF_The_Imperial_Consensus: "Национальный Консенсус"
 FAF_The_Imperial_Consensus_desc: "Империя охватывает множество душ, но не все они французы. Чтобы понять потребности растущей Империи, мы должны понять, кем мы управляем. Для такого нового правительства, как наше, нам нужен свежий подсчет населения не только в Метрополии, но и на всех территориях Империи.\n\nПерепись важна для функционирования государства, она позволяет изменить финансирование, чтобы лучше соответствовать растущему населению, финансировать образование в районах с большим количеством людей, позволяет узнать точный тип людей в районе и знать, как лучше удовлетворить их потребности. Все хорошие государства проводят частые переписи населения не только для того, чтобы заботиться о своих подданных, но и для того, чтобы знать их и использовать по максимуму. Правительство, не имеющее представления о своем народе, - это вообще не правительство."
 FAF_Cull_the_Weak: "Отбраковывать Слабых"
 FAF_Cull_the_Weak_desc: "Балканы, несмотря на их коварный рельеф, оказались слабым местом объединенных сил НАТО: как только Румыния была отброшена за Яссы, Балканы пали, словно термин "Карпаты" обозначал не горный хребет, а грязевой холм. Очевидно, это означает, что мы должны сами контролировать Балканы, чтобы не оставить фланг на произвол судьбы и не обнаружить, что он совершенно неспособен к этому. Десятилетия, нет, столетия междоусобиц привели к тому, что регион превратился в беспорядочное скопление зависимых от иностранных государств. \n\nНа Балканах больше не будет нестабильности, как только мы приведем Иллирию в порядок и спасем Дакию из советских рук, слабость закончится навсегда под руководством Франции."
 FAF_invading_balkans_tt: "§YЭтот фокус позволит достичь военных целей для всех балканских стран.§!"
 FAF_Imperial_Restoration: "Восстановление Империи"

 FAF_Purge_the_Latinists: "Очистить "Латинистов""
 FAF_Purge_the_Latinists_desc: "Несмотря на наши призывы к единству среди французских правых, некоторые сопротивляются нашему растущему контролю. В качестве примера можно привести "Латинистов", группу, призывающую к объединению Европы. Хотя внешне они кажутся единым целым, очевидно, что внутренне они очень разобщены. Их идеи, какими бы странными и чуждыми они ни были, должны быть пресечены любой ценой. Будут приняты все меры, чтобы уничтожить эту группу и их предательские идеи. Во Франции нет места для тех, кто хочет посеять раскол."
 FAF_The_French_Duce: "Французский Дуче"
 FAF_The_French_Duce_desc: "Хотя пожары, охватившие Пятую республику, утихли, на улицах по-прежнему царит хаос. Бунтовщики, иностранные банды и предатели. Все они бродят по улицам нашей некогда гордой страны. Чтобы вернуть Франции былую славу, необходимы радикальные перемены. Подобно Муссолини, мы войдем в Париж и закрепим свою власть над страной. Многие будут сопротивляться, но у них не будет иного выбора, кроме как присоединиться к нам или умереть. На протяжении многих лет люди боялись возвращения фашизма, но им не стоит беспокоиться. Ведь мы - их спасение."
 FAF_France_for_the_French: "Франция для Французов"
 FAF_France_for_the_French_desc: "Франция - очень уникальная страна. Ее история и культура обширны и разнообразны. Недавно она оказалась под угрозой. Неудачи Пятой республики в борьбе с иммиграцией привели к тому, что многие почувствовали себя отверженными от своей собственной нации. Недовольство распространялось по мере того, как либеральный истеблишмент направлял инвестиции на поддержку иммигрантов, закрывая глаза на их преступления против французского народа. Однако при нашем правлении этому будет положен конец раз и навсегда. Франция снова станет страной для своего народа, а не для иммигрантов. Люди увидят, что фашизм - их спаситель, а не враг."
 FAF_A_Grand_Council_of_Fascism: "Большой Фашистский Совет"
 FAF_A_Grand_Council_of_Fascism_desc: "Ни один человек не может править в одиночку, и Бендитти знает это лучше всех. Хотя нам и удалось укрепить свой контроль над Францией, нам еще многое предстоит сделать. Править - значит постоянно играть в шахматы. Вы всегда должны быть на три шага впереди своих врагов. Иначе вы будете ими побеждены. Подобно Муссолини, мы создадим свой собственный Большой совет фашизма. Сохраняя полную лояльность Бендитти, этот совет будет помогать управлять переходом Франции к фашизму. А также консультировать Дуче по вопросам внутренней и внешней политики, особенно в отношении наших врагов в Москве."
 FAF_Embrace_the_Church: "Принять Церковь"
 FAF_Embrace_the_Church_desc: "Франция всегда имела долгую историю с церковью. Со времен религиозных войн и до наших дней религия была основой французского общества. Однако либеральный истеблишмент Пятой республики разрушил многое из этого. Потворствуя иммигрантам, они стали марионетками Мекки и Иерусалима. При этом они полностью отказались от своего долга перед Ватиканом. С нами эта практика закончится. Мы должны показать Церкви, что являемся ее союзником и можем помочь восстановить значение католицизма во Франции. Возможно, для этого потребуется убедить их, но их поддержка будет иметь решающее значение для укрепления легитимности нашего правления."
 FAF_National_Minority_Datebase: "База Данных о Нац. Меньшинствах"
 FAF_National_Minority_Datebase_desc: "Несмотря на нашу ярую антииммигрантскую позицию, в нашей стране по-прежнему много тех, кто ведет свою родословную от иммигрантов. Хотя они могут заявлять о своей лояльности к Франции, ко всем им следует относиться с подозрением. Создание национальной базы данных для меньшинств, хотя и спорное, позволит нам с легкостью отслеживать тысячи людей. Каждый должен ежедневно проверяться на наличие признаков нелояльности или измены. Если они действительно верны своей нации, то им нечего бояться. Предатели же будут быстро уничтожены, а если мы их найдем, то их судьба будет быстрой."
 FAF_Ideolize_Doriot: "Идеализировать Дорио"
 FAF_Ideolize_Doriot_desc: "Дорио - патриот, предатель, создатель французских ультраправых. Для его описания можно использовать множество слов. Пятая республика считала его предателем, который продал своих соседей и друзей тираническим оккупационным силам. Но для нас он - герой. Он заложил фундамент, который в конечном итоге позволил нам прийти к власти сегодня. Готовясь к будущему, мы обращаемся к нему за советом. Его учения будут использованы для того, чтобы укрепить наш контроль над всеми аспектами французского общества. Благодаря его словам фашизм и Франция станут единым целым и никогда не разлучатся, несмотря ни на что."
 FAF_Corporatism: "Принять Корпоративизм"
 FAF_Corporatism_desc: "Франция пала, когда приняла экономику свободного рынка. Макрон и либеральный истеблишмент сделали все, чтобы умиротворить протестующих "желтых жилетов", пренебрегая при этом миллионами безработных французов. Подобные действия лишь способствуют укреплению позиций коммунистических диссидентов, которые бесконечно твердят о "классовой войне". Если Франция действительно хочет подняться над руинами европейской войны, то она должна смотреть сквозь пальцы на подобные идеи. Сотрудничество должно заменить борьбу, а представительство - подавление, ведь если работодатель и работник работают вместе, то экономический прогресс действительно может быть достигнут."
 FAF_work_family_fatherland: "Travail, Famille, Patrie"
 FAF_work_family_fatherland_desc: "Работа, семья, нация. Эти три слова были девизом французского государства во времена правления Филиппа Петена. Хотя падение режима Виши ознаменовало конец этого трехсловного девиза, его можно восстановить и сегодня. Под нашим руководством эти три слова станут основой современной французской нации. Наши граждане больше не будут сбиваться с пути теми, кто утверждает, что представляет их интересы. Современный француз будет любить свою страну, трудиться день и ночь, чтобы увидеть, как она поднимается к величию, и любить свою семью. Эти принципы станут нашим путеводным светом, позволяющим нам возвыситься над нашими врагами. И вернуть Франции место на мировой арене."
 FAF_Criox_de_Feu: "Criox-de-Feu"
 FAF_Criox_de_Feu_desc: "Сказать, что Croix-de-Feu - организация, окутанная противоречиями, было бы преуменьшением. Будучи консервативной группой, она занимала стойкую антинемецкую позицию, сотрудничая с французским Сопротивлением во время немецкой оккупации. Несмотря на эти противоречия, патриотическое происхождение организации невозможно отрицать. Нельзя отрицать и ее связи с героями войны и ветеранами Первой мировой войны. Их служба была бы очень полезна для нашего режима. Особенно для привлечения на нашу сторону ветеранов и бывших военнослужащих, которые в противном случае не захотели бы с нами сотрудничать."
 FAF_Weaponize_the_Middle_Class: "Вооружить Средний Класс"
 FAF_Weaponize_the_Middle_Class_desc: "Либеральный истеблишмент всегда откровенно пренебрегал средним классом Франции. Никогда не бедные. И не богатые, они воспринимались с легким презрением. И игнорировались в пользу социальных расходов для бедных или снижения налогов для богатых. Это не осталось незамеченным. Желание отомстить растет в среде среднего класса Франции, грозя закипеть. Мы не можем этого допустить, но, к счастью, у нас еще есть применение этому недовольству. Мы покажем им, что мы - те, кто действительно понимает их борьбу. И являемся их единственным верным голосом. Их поддержка закрепит наше место в сердцах и умах людей, завоевавших их поддержку. Постоянно."
 FAF_The_Crime_of_Opinion: "Преступление Общественного Мнения"
 FAF_The_Crime_of_Opinion_desc: "Несмотря на то что мы полностью укрепили свое господство над Францией, все еще есть много тех, кто выступает против нашего правления. Лоялисты Пятой республики, коммунисты, оппортунисты - все эти группы продолжают действовать в тени. Эти силы представляют собой экзистенциальную угрозу нашему правлению. Поэтому мы используем все необходимые средства, чтобы уничтожить их. Чистки, исчезновения и любые другие методы будут использованы. Оппозиция больше не будет терпеть. Вы либо с нами, либо против нас. Многие погибнут, но это жертва, которую необходимо принести, чтобы обеспечить процветающее будущее нашей страны. К рассвету наше правление будет навсегда закреплено, а будущее Франции - обеспечено. С нами во главе."
 FAF_Fan_the_flames_of_Hate: "Раздуть Пламя Ненависти"
 FAF_Fan_the_flames_of_Hate_desc: "Ненависть - одна из самых уникальных человеческих эмоций. История показывает, что одни из самых успешных правителей использовали ненависть. Будь то Гитлер, Сталин или Хирохито, все они понимали, как использовать ее в качестве инструмента для управления массами. У французов ненависти более чем достаточно. Мусульмане, советские, враги французской нации - неважно, кто они. Для обычного человека они все одинаковы. Это бушующее пламя - одновременно и благословение, и проклятие, поскольку оно может укрепить режим. Или свергнуть его. По мере того как Франция вступает в новую эпоху, ненависть становится не только инструментом, но и национальным символом. Еще один случай, когда мир будет бояться Франции, а наши враги будут страдать так же, как страдали мы."
 FAF_the_grand_council_idea: "Большой Фашистский Совет"
 FAF_the_grand_council_idea_desc: "Французская политическая система в очередной раз доказала свою неэффективность. Как и старая монархия Бурбонов, она должна быть свергнута и создана новая система. С более смелым и отважным правительством Франция перестроится и вновь обретет былую славу. На смену неубедительной демократии придет жизнеспособный фашизм. Сильное руководство - единственный способ добиться подлинных перемен и реформ, а не голосование и дебаты. Мы сформируем новый орган управления по образцу итальянского Большого совета фашизма и откроем новую эру процветания для нашей нации."


 FAF_The_Pride_of_France: "Гордость Франции"
 FAF_The_Pride_of_France_desc: "Гордостью Франции всегда была ее армия, ее генералы, ее военные в целом. Ничто другое никогда не поднималось до роли Великой Армии. Как однажды сказал Наполеон, Франция - это армия с государством. Мы просто возвращаем ее к нормальной жизни, к ее традиционной сущности."
 FAF_Hail_to_the_Chief: "Слава Вождю"
 FAF_Hail_to_the_Chief_desc: "Маршал - новый директор Франции, отныне и навеки. Народ должен признать это и приветствовать его, как солдат его армии, с большим почетом и уважением. Лидером Франции никогда не будет никто иной, как наш лидер, он беспринципен и приведет нас ко второму золотому веку."
 FAF_The_Sword_and_Shield: "Щит и Меч"
 FAF_The_Sword_and_Shield_desc: "Армия - это то, что делает Францию Францией. Она является и копьем, с помощью которого мы стали доминирующей фигурой на европейском континенте, и оплотом, защищающим нас от бесчисленных диких захватчиков. Армия - это то, о чем следует заботиться, к чему следует относиться с большим уважением и снисхождением, чем это было при предательском республиканском правительстве."
 FAF_Cult_of_Loyalty: "Культ Лояльности"
 FAF_Cult_of_Loyalty_desc: "Так же, как почитали покойного генерала Петэна, французский народ должен верить в генерала, следовать за ним всем сердцем и доверять ему до конца. Не должно быть ни одной мысли о нелояльности, ни одного удара сердца, в котором бы не было уверенности, что маршал может поступить неправильно."
 FAF_work_family_fatherland_vichy: "Travail, Famille, Patrie"
 FAF_work_family_fatherland_vichy_desc: "Самый большой грех, который может совершить человек, - это нарушить один из этих великих новых принципов нашей нации. В работе, в труде человек может найти себя, помогая государству Франция, делая свою нацию и свою жизнь лучше. В семье - любовь, безграничная любовь к родине и государству. А родине - патриотизм и защита француза. Отказаться от любого из них - значит отказаться от самой Франции."
 FAF_Militarize_the_Boyscouts: "Индоктринация Молодёжи"
 FAF_Militarize_the_Boyscouts_desc: "Чтобы убедить население в идеале, нужно ориентироваться на молодежь. Потому что даже если и есть стареющие мужчины, которые все еще отрицают наше правило, они все еще стареющие мужчины. Они скоро вымрут. Истинная сила нации находится внутри молодежи - молодежи, которую с самого детства учат следовать этим принципам, закладывают в ее мозг семя патриотизма, которое никогда не будет удалено, даже если предатели снова придут править Францией."
 FAF_All_for_the_Nation: "Все Для Государства"
 FAF_All_for_the_Nation_desc: "Роскошь, которую раньше позволяли себе простые люди ради нулевой цели, больше не будет предоставляться. Все должно быть сделано для государства, для вашей Франции. Вы ничего не выиграете от того, что не принесете пользу государству, поскольку все, что проходит через маршала, возвращается во Францию и к вам. Директория - это борьба за Францию, работа на Францию, а не на себя. Мы слишком хорошо знаем, к чему это приводит."
 FAF_Rebuild_the_French_Family: "Сохранить Традиционализм"
 FAF_Rebuild_the_French_Family_desc: "В своем бессовестном и дегенеративном порыве Республика прежде, казалось, пыталась отказаться от всего, что делало Францию французской. Попытка стереть культуру французского народа, попытка искоренить традиционное из страха, что оно "архаично" и "несовместимо с современным миром". Это неверно и является большим унижением для нашей некогда великой нации. Дух Франции будет возвращен с края пропасти и никогда больше не будет оставлен."
 FAF_Create_a_Million_Man_Army: "Десятимиллионная Армия"
 FAF_Create_a_Million_Man_Army_desc: "Французская армия хоть и сильна, но недостаточно. Французский народ силен, он готов. Они должны быть готовы к войне, каждый человек, который там есть. Каждый, кто способен воевать, должен быть готов сражаться на войне и служить вместе со своими братьями в Великой армии, идя вперед за свою праведную нацию."
 FAF_Patriotism_at_its_Utmost: "Излучать Патриотизм"
 FAF_Patriotism_at_its_Utmost_desc: "Следовать воле маршала - значит быть патриотом своей нации. Дух, речь, манера поведения, жизнь того, кто следует словам маршала, будут французскими, они будут патриотами до самой сути. Только тот, кто бесчеловечен, будет ненавидеть свою нацию, ненавидеть свою родину."
 FAF_Fountain_of_Life: "The ''Fontaines de Vie''"
 FAF_Fountain_of_Life_desc: "Одним из главных кризисов современной французской нации является недостаток молодости - отсутствие мотивации для жены и мужа стать матерью и отцом. Благодаря пропаганде и льготам, предоставляемым обеим сторонам, фонтан жизни возобновится - французская нация снова будет рождать новую жизнь, а не заканчивать свой путь в неизбежном упадке."
 FAF_Reinforce_the_old_Axis: "Петух и Орел"
 FAF_Reinforce_the_old_Axis_desc: "Хотя намерения и идеология Германии гораздо более экстремальны и агрессивны, чем наши, мы не должны позволить Европе пасть перед гораздо более насущной угрозой большевистской угрозы на востоке из-за простого препирательства по конкретным вопросам. Франция и Германия в нашей общей борьбе с русскими будут не просто союзниками, а братьями, сражающимися за будущее Европы."
 FAF_Found_the_French_State: "Возрождение Французского Государства"
 FAF_Found_the_French_State_desc: "Маршал Петэн, которого Французская республика называла военным преступником, стал тем, кто вновь показал французскому народу свой свет. Многие называли режим Виши "некомпетентным" и всего лишь "немецкой марионеткой", однако это далеко не так. Французское государство было режимом истинного патриотизма, истинной веры во французский народ и нацию. Видеть, как он возрождается, словно феникс из пепла, - величайшая честь, на которую только можно надеяться."
 
 FAF_The_Coronation: "Грандиозная Коронация"
 FAF_The_Coronation_desc: "По всему Парижу звонят колокола: впервые за два с лишним века коронуется новый король. Никто не думал, что подобное когда-нибудь произойдет, не здесь, но никто не думал, что Америка так легко погрузится в хаос. Наш новый король выведет Францию из трудного времени, в котором она оказалась, и принесет новую эру процветания!"
 FAF_Restore_the_Ancien_regime: "Возрождение Ancien Régime"
 FAF_Restore_the_Ancien_regime_desc: "За 200 лет Франция пережила более пяти республик. Каждая из них заканчивалась ужасно позорной катастрофой, и на месте каждой из них появлялась новая, как будто что-то должно было измениться. Древний режим продержался гораздо дольше, чем любая из французских республик, и его восстановление вернет нашей стране столь необходимую стабильность."
 FAF_Restore_Old_Titles: "Восстановить Старые Титулы"
 FAF_Restore_Old_Titles_desc: "Король не может управлять страной в одиночку, не в наше время. В Соединенном Королевстве десятки герцогов, лордов и других дальних родственников королевской семьи контролируют небольшие территории. Если мы хотим стать успешным королевством, нам нужно восстановить эти старые титулы и вновь наполнить их смыслом."
 FAF_Lap_of_Luxury: "На Лоне Роскоши"
 FAF_Lap_of_Luxury_desc: "На протяжении многих веков король всегда был самым богатым в королевстве, хотя в последние годы это случается все реже. Хотя мы не можем гарантировать, что наш король будет богаче многих генеральных директоров и других миллиардеров, мы можем, по крайней мере, сделать так, чтобы королевская семья имела очень высокий уровень жизни."
 FAF_Patronage_of_the_Arts: "Меценатство в Области Искусств"
 FAF_Patronage_of_the_Arts_desc: "За последние 50 лет искусство превратилось в нечто совсем иное, чем было раньше. На смену настоящему искусству пришли грязные холсты, забрызганные всевозможными вещами, называющими себя "картинами". Если мы хотим завершить восстановление старой, великой Франции, мы должны восстановить и искусство."
 FAF_Curtsy_to_the_Wealthy: "Реверанс Перед Богатыми"
 FAF_Curtsy_to_the_Wealthy_desc: "Богатые всегда были лучшими друзьями страны, несмотря на то, что некоторые так называемые "свободные мыслители" могут заставить вас поверить в это. Сейчас, когда наша страна восстанавливается после войны с Россией и бесчисленных десятилетий неправильного правления республиканцев, нам необходимо помогать богатым, чтобы завоевать их расположение."
 FAF_Renew_the_Ordinance_of_Villers_Cotterets: "Возобновить Действие Постановления Виллер-Коттере"
 FAF_Renew_the_Ordinance_of_Villers_Cotterets_desc: "За почти полтысячелетия, прошедшие с момента подписания ордонанса Виллерс-Коттерец, он был выпотрошен и изуродован республиканцами. Однако его не удалось полностью уничтожить, и, к счастью, некоторые статьи сохранились до наших дней. Нам необходимо возобновить действие всего Ордонанса во имя восстановления великой Франции!"
 FAF_A_Righteous_Monarch: "Излучать Праведность"
 FAF_A_Righteous_Monarch_desc: "Народ не примет нас так просто, поэтому мы должны доказать, что заслуживаем быть здесь. Если мы все будем вести себя как богатые снобы, повторение 1789 года неизбежно, поэтому мы должны обеспечить справедливость и праведность каждой части политической машины."
 FAF_Perfect_French_Craftsmanship: "Безупречное Мастерство"
 FAF_Perfect_French_Craftsmanship_desc: "На протяжении десятилетий мир следовал идеалам количества, а не качества, и Франция не стала исключением. Это, несомненно, стало одной из причин нашего поражения в борьбе с русскими, и мы должны решить эту проблему. Не только оружие должно быть совершенным, но и автомобили, электроника и все остальное должны быть предметом зависти всего мира."
 FAF_Dieu_Veut: "Dieu Veut"
 FAF_Dieu_Veut_desc: "У Франции долгая история, казалось бы, невыигрышных побед, но с момента образования первой республики мы проигрывали все больше и больше сражений. Древний режим пользовался благосклонностью богов, ибо они знали, что дом Бурбонов - законные хозяева Франции. Теперь, когда мы снова стоим во главе его, надеемся, что Бог снова будет на нашей стороне."
 FAF_Every_Weapon_a_Masterpiece: "Каждое Оружие - Шедевр"
 FAF_Every_Weapon_a_Masterpiece_desc: "Война - это искусство, а каждый солдат - художник. Каждое оружие в нашем арсенале, от самой маленькой пули до самой большой ракеты, должно быть шедевром, способным уничтожить врага с максимальной точностью. В последнее время французская армия переживает не лучшие времена, и настало время бросить ей спасательный круг и вернуть былую славу."
 FAF_Modern_Knights: "Современные Рыцари"
 FAF_Modern_Knights_desc: "Никто больше не ездит в бой на лошадях, если только у вас нет желания умереть. Однако идею рыцаря все еще можно применить к современной войне. Лошади будут заменены танками, мечи - пистолетами, а доспехи - боевым снаряжением. Преданных королевской семье будут продвигать по службе, а тех, кто не будет, соответственно наказывать."
 FAF_Claim_the_Throne_of_Spain: "Восстановить Испанский Суверенитет"
 FAF_Claim_the_Throne_of_Spain_desc: "Испания и Франция - две стороны одной медали, и поэтому мы должны быть вместе. Однако первая провела много лет в одиночестве, и за это время пережила беспрецедентное количество гражданских волнений. Пришло время все исправить. Мы восстановим Королевство Испания под властью нашей ветви Дома Бурбонов, и наши две нации станут единым целым!"
 FAF_Hold_Elections: "Провести Выборы"
 FAF_Hold_Elections_desc: "Удушающие объятия авторитаризма наконец ослабли, и демократия вновь воцарилась на наших землях. Мы неустанно работаем над тем, чтобы первые выборы нашего нового правительства были как можно более свободными и чтобы иностранное вмешательство наших радикальных соседей не помешало прогрессу, к которому мы стремимся. Демократия восторжествует, как это было на протяжении всей нашей истории, и мы станем примером демократического маяка Европы."
 FAF_Victory_of_the_Republicans: "Победа Республиканцев"
 FAF_Victory_of_the_Republicans_desc: "Многие во Франции до сих пор с любовью вспоминают президента-героя войны Шарля де Голля, но что они знают о нем? Он руководил Францией как в самые мрачные, так и в самые светлые дни. Кто в дни изгнания в Африке возглавлял разрозненные силы Свободной Франции, чтобы вернуть родину? Кто неизменно приходил на помощь Французскому, когда это было необходимо? В том числе возглавил нацию в качестве ее президента. Наша победа - это не только спасение французской демократии, но и сохранение видения де Голля для Франции. В которой Франция будет единой и свободной, связанной только обязательствами перед народом и страной."
 FAF_Renounce_German_Militarism: "Отречься от Немецкого Авторитаризма"
 FAF_Renounce_German_Militarism_desc: "Пока мы собираем по кусочкам нашу хрупкую демократию, мы сталкиваемся с ужасающей реальностью. Наш величайший союзник пал. После "Дня Х" немецкая нация была поглощена радикализмом. Ультранационалисты, ксенофобы, неонацисты - эти экстремисты заполонили некогда спокойную республику. Вспоминая конец Веймарской республики, эти экстремисты воспользовались нестабильной ситуацией, чтобы снова захватить власть в свои руки. Мы не можем допустить, чтобы это вопиющее свержение осталось незамеченным. Мы разоблачим этот новый режим, который является ничем иным, как вопиющей попыткой восстановить жестокий авторитаризм нацистского режима."
 FAF_Take_Count: "Национальная Оценка"
 FAF_Take_Count_desc: "Положение Франции не может быть более хаотичным. Наша победа досталась правительству и экономике огромной ценой. Города лежат в полной разрухе, в сельской местности царит полная анархия, а над миллионами наших граждан нависла угроза голодной смерти. Мы многое запланировали для нашей великой страны. Но прежде чем приступить к восстановлению страны, мы должны продиагностировать ее недуги. Многое сломано, но есть и то, что можно сохранить. И мы должны найти время, чтобы должным образом решить проблемы, которые мучают нашу страну. Мы - врачи, и наша нация должна ими стать, чего бы это ни стоило."
 FAF_Maintain_a_Strong_State: "Поддерживать Силу Государства"
 FAF_Maintain_a_Strong_State_desc: "Любая нация процветает благодаря силе государства - от процветающих империй прошлого до современных наций сегодняшнего дня. Это самый двигатель государства, сердце, которое качает кровь, поддерживая функционирование нации. Этот жизненно важный орган ненадолго перестал функционировать во время гражданской войны, потрясшей нашу страну. Однако восстановление демократии и наша победа на выборах предоставили нам уникальную возможность. Кирпичик за кирпичиком мы будем восстанавливать мощь французского государства. Бюрократия будет восстановлена, министерства перетасованы, а необходимые сокращения произведены. Будущее Франции зависит от того, насколько эффективно будут работать государственные органы."
 FAF_The_Unwilling_Ally: "Французское Нет"
 FAF_The_Unwilling_Ally_desc: "Слишком долго Франция находилась под влиянием иностранных государств и организаций. Наша зависимость от Америки после Второй мировой войны разрушила нашу экономику. Наша приверженность НАТО привела к тому, что наша некогда великая армия превратилась в оболочку того, чем она когда-то была. ЕС заставил нас открыть свои границы для всех видов мигрантов, что вызвало волны нестабильности и беспорядков во время президентства Макрона. Больше мы этого не потерпим. Если Франция хочет выжить, она должна поставить себя на первое место. Больше никакого умиротворения, никаких договоров, никакого иностранного вмешательства. Франция говорит "нет", и она будет держать свое слово. Даже если это означает, что нам придется сражаться."
 FAF_Guardian_of_National_Interest: "Блюститель Национальных Интересов"
 FAF_Guardian_of_National_Interest_desc: "На протяжении многих лет либеральный истеблишмент Пятой республики утверждал, что служит народу, но это было не так уж далеко от истины. Макрон был всего лишь пешкой ЕС и других панъевропейских организаций. Несмотря на протесты и жалобы, истеблишмент продолжал платить этим внешним организациям. И в конце концов они поплатились за то, что пренебрегли нуждами народа. Теперь, когда демократия восстановлена, мы не повторим ошибок прошлых режимов. Для нас на первом месте стоит народ, а не элита или автократы. Франция снова станет страной, которая ставит свои интересы во главу угла, и мы не отступим от этого, даже если это будет означать, что нам придется готовиться к войне."
 FAF_France_Revitilization_Committee: "Комитет по Восстановлению Франции"
 FAF_France_Revitilization_Committee_desc: "Несмотря на нашу победу и восстановление демократии, большая часть страны по-прежнему находится в полной разрухе. Города превратились в руины и пламя, в сельской местности царит полная анархия, а наши люди голодают. Очевидно, что если Франция хочет вернуть себе власть в Европе, то необходимо провести масштабные восстановительные работы. Под нашим руководством мы соберем комитет экономистов и специалистов по центральному планированию. Под нашим руководством они разработают план по восстановлению Франции с нуля. Не только для того, чтобы восстановить французскую экономику, но и для того, чтобы вернуть веру народа в правительство."
 FAF_Rebrand_Militarism: "Ребрендинг Милитаризма"
 FAF_Rebrand_Militarism_desc: "Почему бы государству не гордиться своей армией? Разве не они защищают свой народ и отстаивают национальные интересы? Прискорбная реальность заключается в том, что подъем радикальных правых привел к тому, что милитаризм стал ассоциироваться с жестокими диктатурами вроде Гитлера или Муссолини. Даже начало гражданской войны в нашей стране было вызвано путчем офицеров-милитаристов. Тем не менее мы будем стремиться к ребрендингу идеи милитаризма. Она перестанет быть концепцией хунт и силовиков. Вместо этого она превратится в символ гражданской гордости. Французская армия вновь станет мечом демократии, готовым сразиться с любым врагом, угрожающим нашей великой нации."
 FAF_Staunch_Dirigisme: "Стойкий Дирижизм"
 FAF_Staunch_Dirigisme_desc: "Одним из самых больших провалов Макрона стало полное отсутствие экономического регулирования. Ослепленный корпоративными пожертвованиями, он позволил корпорациям и частным предприятиям захватить экономику. Он не допустил никакой конкуренции со стороны малого и среднего бизнеса и фактически установил полный корпоративный контроль над экономикой. Нельзя допустить, чтобы эта великая несправедливость продолжалась и дальше. Подобно Теодору Рузвельту, мы начнем грандиозный крестовый поход, чтобы очистить экономику от корпоративного господства. Будь то регулирование, налоги или антимонопольное законодательство. Мы должны быть готовы к жесткой игре с этими свиньями. Руководители и менеджеры будут кричать и плакать, но нас мало волнуют их жалобы. Ведь будущее Франции - за народом, а не за автократами."
 FAF_The_Blank_Check: "Автономные Военные Расходы"
 FAF_The_Blank_Check_desc: "На протяжении большей части нашей истории военные расходы были одним из ключевых звеньев нашего экономического производства и ВВП. Это, однако, привело к возникновению множества проблем, как политических, так и экономических. Однако мирные времена очень недолговечны, даже сегодня. И мы не можем позволить себе сократить военные расходы. Поэтому в качестве компромисса мы начнем отделять наши военные расходы от общего ВВП. Это позволит нам отдавать военным приоритет во время кризиса. Ибо времена спокойные и недолгие, и если вы хотите мира, то должны быть готовы к войне."
 FAF_Memories_of_the_Past: "Защитить Оппозицию Бундесвера"
 FAF_Memories_of_the_Past_desc: "После того как радикальные милитаристы свергли правительство, немецкая нация погрузилась в полный хаос. Улицы заполонили протестующие, и даже Бавария отделилась при поддержке Австрии. Мы не можем сидеть сложа руки, наблюдая, как наш некогда величайший союзник скатывается в авторитаризм и ксенофобию. Большая часть высшего командования бундесвера бежит из страны, и многие ищут у нас убежища. Их знания о внутреннем устройстве бундесвера дадут нам преимущество перед нашим бывшим союзником. Это позволит нам должным образом подготовиться к неизбежной конфронтации."
 FAF_Gaullism_Saves_France_Again: "Голлизм Снова Спасает Францию"
 FAF_Gaullism_Saves_France_Again_desc: "В истории Франции всегда были времена великой тьмы и великого прогресса. Во времена кризиса часто один человек берет на себя бразды правления и выводит Францию из тьмы к свету. Будь то освобождение от нацистской оккупации или нестабильность во время кризиса в Алжире, Шарль де Голль был рядом, чтобы увести нацию от беды. Как и в те времена, Франция вновь оказалась ввергнута в хаос. Возрождение Советского Союза угрожало разрушить саму основу нашей демократии. Но мы спасли ее, и, руководствуясь идеями де Голля, мы выведем Францию из хаоса в новую золотую эру процветания."
 FAF_Victory_of_MoDem: "Победа Демократии"
 FAF_Victory_of_MoDem_desc: "Хотя мы боролись с экстремизмом и угрозой уничтожения нашей демократии, в конце концов мы одержали победу. Народ Франции вернул свою волю, вернул Францию такой, какой она была до войны, не испорченной фашистами, диктаторами и ультранационалистами, которые угрожали ее святости."
 FAF_A_New_Look_at_Centrism: "Новый Взгляд на Центризм"
 FAF_A_New_Look_at_Centrism_desc: "Идеи центризма во времена Макрона были глупыми и контринтуитивными. Центризм - это не просто игнорирование всего, это концепция принятия всех идей и приведения их в действие, нахождение истинной перспективы посередине между левыми и правыми. Это и есть истинная демократия, которая учитывает интересы всех людей, а не только некоторых."
 FAF_Calm_Radical_Voices: "Успокоить Радикальные Голоса"
 FAF_Calm_Radical_Voices_desc: "Хотя демократия восстановлена, все еще существуют угрозы для нашей хрупкой системы, против которой активно борется ультранационалистическая и ужасная Франция, полная насилия и ненависти. Нельзя позволить этим людям продолжать раздувать пламя ненависти, их мысли развращают и подрывают основы нашей нации."
 FAF_A_Flexible_Government: "Гибкое Правительство"
 FAF_A_Flexible_Government_desc: "Правительство, по своей сути, должно быть способно меняться. Оно не должно застаиваться или возвращаться к прежним нормам, оно должно быть тем, что берет и создает все заново, когда это уже не работает. Ни разу мы не должны останавливаться в своем движении к совершенству, каким бы оно ни было."
 FAF_Lift_the_Ban_of_Leftist_Groups: "Снять Запрет на Левизну"
 FAF_Lift_the_Ban_of_Leftist_Groups_desc: "Одной из важнейших ошибок нашего прежнего правительства было полное запрещение левых, даже на демократических выборах. Это глупость, которая приведет лишь к еще большему насилию и предвзятости. Настоящая демократия позволила бы им процветать и благоденствовать, если таково желание народа, а не простой и грубый запрет на мысли, которые есть у наших людей."
 FAF_A_Transparent_Government: "Призыв к Прозрачности Правительства"
 FAF_A_Transparent_Government_desc: "Франция с момента падения Пятой республики - это нечто, окутанное дымом и зеркалами. Во главе с элитными обществами, скрытыми от глаз народа. Так больше не будет. Рычаги нашего управления больше не будут скрыты, множество различных тайных фракций и подфракций, а также механизмы голосования и демократии будут выведены на свет."
 FAF_Reduce_XIV_Influence: "Уменьшить Влияние XIV"
 FAF_Reduce_XIV_Influence_desc: "Общество XIV - это застойный пережиток старой Франции, который не имеет права оставаться в нашем новом демократическом обществе. Это кабала фашистов, милитаристов и других различных людей, которые работают против средств демократии ради своих собственных целей в тени. Медленно, осторожно, они будут удалены из нашей нации, как опухоль."
 FAF_Restart_Minitel: "Запуск Minitel"
 FAF_Restart_Minitel_desc: "Десятилетия назад существовал исключительно французский продукт цифровизации. Он назывался Militel и представлял собой интернет до появления интернета, созданный исключительно для Франции. Этот проект, хотя и имеет другую цель, чем первоначальная, будет переделан и обновлен, став чем-то большим, чем он был раньше, и достигнув высот, которые никогда не представлялись его создателям."
 FAF_Reclaim_the_Public_Sector: "Восстановить Гос. сектор"
 FAF_Reclaim_the_Public_Sector_desc: "Среди множества ошибок прежнего правительства одной из них была масштабная приватизация ранее государственных ресурсов. Хотя в краткосрочной перспективе это и принесет простое денежное благо, в будущем это обречет Францию на стагнацию и экономический крах, как это едва не случилось с Великобританией. Медленно, с течением времени, заброшенный государственный сектор будет возвращен в руки государства."
 FAF_Digitize_the_Government: "Оцифровать Правительство"
 FAF_Digitize_the_Government_desc: "В XXI веке правительство больше не может управляться простыми машинами или ручкой и бумагой. С помощью созданного нами проекта Minitel правительство постепенно превратится в нечто, что может быть выполнено полностью в электронном виде, в то, что не нужно ждать часами или иметь какие-либо задержки во времени. Современная демократия требует современного правительства, и мы не можем отставать."
 FAF_Universal_Pardons: "Всеобщее Прощение"
 FAF_Universal_Pardons_desc: "Многие левые лидеры и деятели были заключены в тюрьму или осуждены только за то, что они были социалистами или левыми. Эти ужасные, антидемократические действия будут отменены полностью и окончательно, с чистого листа. Не останется ни записей, ни последствий их ложно вынесенных приговоров, и все они получат свою законную свободу. Пусть грехи прошлого будут забыты."
 FAF_Victory_over_Authoritarianism: "Победа над Авторитаризмом"
 FAF_Victory_over_Authoritarianism_desc: "Темные часы прошли, и наступила свобода. Фашисты и военные пытались вырвать у нее дух, но Франция осталась непоколебимой, вернувшись с порога смерти, как это было в давние времена.\n\nИз ничего возникла французская демократия, восставшая из пепла прекраснее и чище, чем когда-либо прежде. Хотя против нас борются подрывные элементы, и хотя еще есть недостатки, мы взяли уголь и превратили его в алмаз.\n\nVive la France!"
 FAF_Victory_of_the_National_Conservative_Union: "Продолжение Мечты Вилье"
 FAF_Victory_of_the_National_Conservative_Union_desc: "Несмотря на то, что Вилье покинул свой пост, это не означает, что мы прекратим его реформы. Несмотря на то, что ранее он был военным и занимал пост главы министерства обороны, его планы по созданию сильной и успешной демократической Франции нельзя игнорировать, поскольку мы видим потенциал в его стремлениях."
 FAF_Introduce_Healthy_Patriotism: "Здоровый Патриотизм"
 FAF_Introduce_Healthy_Patriotism_desc: "В отличие от слепого национализма, который поощряет разрушение и вторжение в чужие страны, здоровый патриотизм - это взвешенная и конструктивная любовь к своей стране, которая способствует единству, прогрессу и ответственности."
 FAF_The_Voice_of_the_People: "Глас Народа"
 FAF_The_Voice_of_the_People_desc: "Партия представляет только одно - народ. Если мы хотим, чтобы наша новая Франция преуспела, народ должен быть услышан, мы хотим, чтобы его мнение было услышано.\n\nСлишком долго французский народ пренебрегался старым режимом, который заботился только о себе, а не о народе. Если мы хотим выжить, мы должны быть едины и готовы работать друг с другом."
 FAF_Restore_Public_Trust: "Восстановить Общественное Доверие"
 FAF_Restore_Public_Trust_desc: "Если мы хотим не закончить как последний коррумпированный истеблишмент с одним из самых низких рейтингов одобрения в истории Франции, мы должны быть более открытыми с общественностью о нашей политике и расходах и бороться с коррупцией, поскольку она напрягала французов в течение длительного периода времени."
 FAF_Last_Beacon_of_Democracy: "Последний Луч демократии"
 FAF_Last_Beacon_of_Democracy_desc: "Мы - одна из последних демократий в Европе, и мы должны стать примером для всего мира в области прав человека и демократического управления. Для этого потребуется сильный институт, этичное руководство и активное участие граждан."
 FAF_Codify_Anti_Corruption_Laws: "Кодифицировать Анти-Коррупцию"
 FAF_Codify_Anti_Corruption_Laws_desc: "Коррупция является одной из главных проблем Франции, и это заставляет население страны сомневаться в нашем режиме. Мы начнем с того, что включим антикоррупционные законы, направленные на борьбу с коррупцией, во французский кодекс, чтобы она не мешала жить французу."
 FAF_Restore_the_Countryside: "Восстановить Сельскую Местность"
 FAF_Restore_the_Countryside_desc: "Сельская местность была оставлена в запустении и всегда оставалась без внимания. Фермеры и сельские жители нуждаются в отчаянной заботе. Мы должны осуществить грандиозные инфраструктурные проекты, оказать экономическую помощь и предоставить налоговые льготы, чтобы помочь малому бизнесу развиваться, что, как мы надеемся, привлечет больше людей в сельскую местность."
 FAF_Obscure_Rampant_Militarism: "Непонятный Безудержный Милитаризм"
 FAF_Obscure_Rampant_Militarism_desc: "После окончания европейской войны Западная Европа погрузилась в хаос. С каждым днем становится очевидным, что мы должны снова перевооружиться и восстановить наши дезорганизованные вооруженные силы, если мы хотим пережить следующее десятилетие. Мы должны скрывать наши планы ремилитаризации от всего мира, поскольку это рискует быть расценено как провокация."
 FAF_Restore_bureaucratic_safeties: "Защитная Сетка Бюрократии"
 FAF_Restore_bureaucratic_safeties_desc: "Коррумпированная бюрократия всегда была проблемой Франции, особенно при последней администрации, она мешала людям получать предметы первой необходимости и в целом тормозила экономику. Это можно предотвратить, создав "сеть безопасности", которая поможет беднейшим слоям населения Франции поддерживать минимальные стандарты жизни."
 FAF_Comprehensive_Veteran_Aid: "Всесторонняя Помощь Ветеранам"
 FAF_Comprehensive_Veteran_Aid_desc: "Пока оседает пыль в Восточной Европе, многие вернувшиеся ветераны остались без денег и нуждаются в серьезном уходе, чтобы встать на ноги. Мы предоставим ветеранам, которые рисковали жизнью, защищая нашу страну, серьезные налоговые льготы и бесплатное жилье, чтобы помочь им встать на ноги."
 FAF_Guarantor_of_Liberty: "Гарант Свободы"
 FAF_Guarantor_of_Liberty_desc: "Наш трудолюбивый президент спас демократию во Франции и с помощью своей коалиции построил совершенно новую демократию, не коррумпированную, а представляющую народ и его потребности. Франция защищала, защищает и всегда будет защищать одну вещь - свободу."
 FAF_Reclaim_our_Dignity: "Восстановим Наше Достоинство"
 FAF_Reclaim_our_Dignity_desc: "Несмотря на унижение, которое мы потерпели в войне с Россией, это не значит, что мы полностью унижены. Мы по-прежнему остаемся французами и хозяевами Западной Европы, нам удалось вернуть свое достоинство, став сияющим маяком демократии в мире и показав всему миру, как функционирует настоящая демократия."
 
 FAF_A_New_Order: "Новый Порядок"
 FAF_A_New_Order_desc: "Петинисты зашли недостаточно далеко. В ближайшие недели мы заменим их во всех учреждениях. И мы обеспечим наше будущее. \nКак мы смело шагнем в новую эру из лап поражения! Мы наступим на тех, кто нас подвел, на еврейских банкиров, на немецких социалистических свиней. Это иудео-германский заговор, созданный для того, чтобы сделать Францию слабой и покорной с помощью бесполезных институтов вроде Европейского Союза и всех этих слепых социальных программ. \n\nНет больше Европейскому Союзу! Больше никаких иудео-германских коммунистов, указывающих Франции, как жить, и удерживающих французский народ от его судьбы как одного из великих! \nС восходом нашего лидера! Лафайет! Новый порядок падает на Францию! И скоро падет по всей Европе!"
 FAF_Entrench_French_Superiority: "Закрепить Французское Превосходство"
 FAF_Entrench_French_Superiority_desc: "Петинистское правительство не пошло достаточно далеко, предоставив меньшинствам некоторую автономию в пределах Франции, Франция! Это для французов! И никакие иностранцы никогда не смогут достичь того превосходства, которым обладаем мы, французы. У нас есть еда, у нас есть искусство, у нас есть культура, у нас даже есть генетика. \n\nФранцузы по своей природе являются высшей культурой и расой, выше наших соседей, выше Европы, мы - лучшая нация, которую может предложить Европа, и вся Европа будет вынуждена услышать, как мы заявляем об этом! Французское превосходство - единственный путь вперед! Пока каждое сердце, каждый разум и каждая душа в этой нации не поверят, что они на порядок выше всех, кого они когда-либо встречали за пределами наших границ, мы не выполним задачу по продвижению вперед! Vive la France!"
 FAF_Demand_Patriotism: "Требовать Патриотизма"
 FAF_Demand_Patriotism_desc: "Патриотизм - это не просто чувство, которое вы испытываете время от времени. Если вы гордый французский гражданин, вы будете любить Францию, какими бы трудными ни были времена, вы будете любить Францию, пока мы идем по грязи, вы будете идти по грязи ЗА Францию! Франция требует лояльности от своего народа, потому что ее народ требует уважения от всего мира. \n\nДиссидент-француз больше не француз, вы будете любить Францию, вы будете любить Лафайета, вы будете служить Франции до тех пор, пока вы больше не будете способны, и вы будете делать это с улыбкой.\n\nМы устанавливаем закон, если вы будете замечены в выступлениях против Франции, против праведного гнева Франции, против ее действий? Вас больше никогда не увидят, а если кто-то спросит о вас, то недолго."
 FAF_Silence_Critics: "Замолкнуть Сторонников Иудео-Германского Коммунардства"
 FAF_Silence_Critics_desc: "Так называемые социал-демократы - это больной народ, зараженный СДПГ, старым иудео-германским политическим движением времен революции 1848 года, СДПГ была одной из главных политических сил, вдохновлявших подобные движения по всему миру, и теперь ее токсичное влияние распространяется на наши земли, на наш собственный народ, на идеи страховочной сетки, социального обеспечения, "рая для рабочих"? Футез. Франция больна, прогнила насквозь. Ее не спасти, мы должны вырвать ее с корнем, стереть с лица земли, сжечь дотла, и из пепла родится новая Франция! Эволюционировавшая, но не прирученная! Слабые будут вычищены, а сильнейшие - процветать. Они сделают Францию снова великой, свободной от этой чужеродной раковой опухоли, свободной от иудео-германских коммунаров!"
 FAF_Enforce_Social_Harmony: "Обеспечить Социальную Гармонию"
 FAF_Enforce_Social_Harmony_desc: "Чтобы общество находилось в полной когнитивной гармонии, мы должны удалить тех, кто играет не ту мелодию, чтобы оркестр звучал потрясающе, нужно удалить его слабые звенья. Не все способны участвовать в Великом национальном оркестре Франции, некоторые из них не французы, или они коммунисты, или они иудео-германские целовальщики, или они умственно отсталые и кричат о своих пенсиях. \n\nВаши пенсии не вернутся, сумасшедший, разберитесь с этим, лучше мы уже разобрались с этим за вас. Вы не вписываетесь в наше новое общество, поэтому вы будете удалены из него навсегда. \nВо Франции нет места ни инвалидам, ни генетически нечистым, ни психически больным, страдающим от либерализма и его нечестивого кузена коммунизма."
 FAF_The_Dreams_of_Charlamagne: "Мечты Карла Великого"
 FAF_The_Dreams_of_Charlamagne_desc: "Карл Великий возглавлял Франкскую империю в период абсолютного расцвета французского народа, когда французы были не только там, где мы находимся, но и в Берлине, в Баварии, во Франконии, в Ломбардии, все эти области когда-то были французскими, и они отдалились от нас, образовав свои собственные региональные языки, как они могли?\nОни отказались от Карла Великого и французского господства в Западной Европе ради мелкого регионализма? Несомненно, под влиянием евреев.\n\nВ Франции Лафайета мы вернем эти заблудшие души в Империю, в объятия Франции. Они снова станут французами, и им это понравится, они будут петь наши песни, маршировать в наших армиях, и мы уничтожим тех, кто навязывает нашему народу чужие языки."
 FAF_Purge_Corrupt_Bureaucracy: "Очистить Коррумпированную Бюрократию"
 FAF_Purge_Corrupt_Bureaucracy_desc: "До нас дошли сведения, что некоторые представители национальной бюрократии думают о благополучии отдельных людей, а не о благополучии Франции, что на закрытых заседаниях и в тиши шепотом звучат отголоски иудео-германских настроений. На улицах Парижа можно услышать, если очень внимательно прислушаться: враг вокруг нас, а они тихо трусят в правительстве.Но у нас есть свои списки.\n\nМы знаем каждого шептуна, каждого кровоточащего сердца, каждого коммунара, каждого иудео-германца, прячущегося на виду прямо в нашей собственной правительственной структуре, бывших петинистов, бывших либеральных бюрократов, в национальной иерархии Франции нет места для тех, кто считает, что судьба одного важнее судьбы всей нации, ФРАНЦИЯ ПРЕВЫШЕ ВСЕГО, даже если это означает, что некоторые из наших граждан страдают, вести спартанский образ жизни - значит закалять себя, спартанство - это не плохо, оно учит быть экономным, самодостаточным и делать разумный выбор, оно отсеивает тех, кто слишком нагл, чтобы выполнять задачи в условиях такого стресса. \n\nЭтим либеральным идеям здесь не место."
 FAF_The_Judge_Jury_and_Executioner: "Судья, Присяжный и Палач"
 FAF_The_Judge_Jury_and_Executioner_desc: "Мы должны верить в нашего лидера, Лафайета, который избавит нас от поражения и позора. Он - единственная власть во Франции, он - наш освободитель, наш СУДЬЯ, наш ПРИСЯЖНЫЙ и наш ПАЛАЧ.\nПосредством полного и абсолютного государственного контроля будет подавлено всякое инакомыслие, не будет больше допускаться существование иностранного влияния, иностранного бизнеса, бизнеса, продающего иностранцам, иностранцев вообще.\n\nУказы Лафайета - это наше евангелие, наши цели, наши амбиции, мы лишь инструменты для Франции, а Лафайет - хирург, который с точностью открывает и закрывает Францию, вырезая опухоли общества и заменяя диссидентские органы. Когда Франция выйдет из операционной, она будет хорошо смазанной машиной, нацеленной на смерть наших врагов, и вы будете прямо за ней!"
 FAF_Perfection_of_the_Regime: "Совершенство Власти"
 FAF_Perfection_of_the_Regime_desc: "Под руководством Лафайета наши реформы культурного единообразия довели нас до этого момента, когда центральная власть, власть Лафайета, неоспорима. \nНи протестов, ни криков, ничего, кроме сладкой тишины и молчаливого шага послушных граждан, в то время как гром марша заглушает все остальное.\nФранция превратилась в хорошо смазанную машину, которой она должна была стать. Лафайет может отложить скальпель, Франция стала такой, какой она должна быть. Франция готова к предстоящим испытаниям, мелиорации и грядущим войнам мести.\nУстранив все внутренние угрозы, мы можем развернуть всю нашу машину наружу, подготовив ее к мелиорации границ, осталось только завести часы и ждать сигнала."
 FAF_Control_the_Youth: "Поколение Патриотов"
 FAF_Control_the_Youth_desc: "Пацифизм был, подчеркиваю, был, раковой опухолью для французского общества, как и многие другие вещи, навязанные другими странами. Мы, французы, были древней культурой воинов, отточенной за 3000 лет, только современное общество лишило нас этого, иудео-германские концепции социал-демократии, либерализма и интернационализма обезоружили нас. \n\nВ течение некоторого времени мы испытывали теплоту к нашим соседям, вы можете в это поверить? Поколение сформировалось с нечистотами.Новое поколение потеряно, и мы дали им новую цель, служение Франции, это не факультативная цель.\nЭта цель - цель всех граждан, теперь мы все сыновья патриотов, в нашей нации больше нет пацифистских голосов.\nОчищенное, как алмаз, ограненное парижским ювелиром, наше новое поколение будет тверже алмаза, оно будет самым преданным поколением людей, когда-либо созданным в мире."
 FAF_Criticize_Allied_Failures: "Саботировать Наших Союзников"
 FAF_Criticize_Allied_Failures_desc: "Присоединение к Стальному пакту было простой уловкой. У нас никогда не было намерения позволить Германии втянуть нас в войну. Наши информационные кампании сработали идеально, ничего не просочилось наружу, наши слова о судном дне не были услышаны ни одним из них.\nГром всегда грянет раньше, чем молния.\nМы пошлем наших самых преданных людей проникнуть на запад Германии и других наших союзников по пакту и взорвать важнейшие объекты инфраструктуры и промышленности, но это лишь предисловие к гораздо более масштабному наступлению, мы не дадим им времени на восстановление, приготовьте свои покерфейсы, господа, потому что нам придется утешать наших союзников, пока идут последние приготовления, чтобы покончить с ними навсегда."
 FAF_Expel_Foreign_Influences: "Изгонять Иностранное Влияние"
 FAF_Expel_Foreign_Influences_desc: "Франция долгое время считалась одной из стран мира, наиболее интегрированных в глобалистский идеал, идеал интернационализма, либеральной философии, иудео-германской социал-демократии. Когда-то говорили, что Франция — одно из лучших мест для переезда... 'ради социальной защиты' \nНам не нужна социальная защита, ибо это идея иудео-германской СДПГ. Нам не нужны либеральные философии, основанные в каком-нибудь австрийском университете. Нам не нужны другие страны, и на самом деле другие страны хотят быть французами, поэтому так много иностранцев переезжали жить во Францию. \n\nЧто ж, вместе с иностранцами исчезают и иностранные институты. Наша Великая Армия должна уничтожить всяческое иностранное влияние в нашей стране. Больше никакой социал-демократии, никакого либерализма. Мы находимся в процессе роспуска франко-германского отделения и казни его бывших членов за то, что они осмелились даже участвовать в подразделении, которое признало бы Эльзас немецким! И все немцы, которые не говорят по-французски, будут депортированы из Эльзаса. Мы больше не можем терпеть их зловоние."
 FAF_Operation_Napoelon: "§YOpération§!: Наполеон"
 FAF_Operation_Napoelon_desc: "Франция долгое время считалась одной из стран мира, наиболее интегрированных в идеал глобализма, интернационализма, либеральных философий, иудео-германской социал-демократии. Однажды они сказали, что Франция - одно из лучших мест для переезда... "Для страховочной сетки."\nНам не нужна система безопасности, это идея иудео-германской СДПГ, нам не нужны либеральные философии, основанные в каком-то австрийском университете, нам не нужны другие нации, на самом деле другие нации хотят быть французами, поэтому здесь живет так много иностранцев.\n\nВместе с иностранцами уходят и иностранные институты, каждая унция иностранного влияния должна быть смыта руками нашей Великой Армии, больше никакой социал-демократии, никакого либерализма, мы в процессе расформирования франко-германской дивизии и казним ее бывших членов за то, что они осмелились участвовать в подразделении, которое признало бы Эльзас немецким! В то же время мы начнем депортировать всех не говорящих по-французски немцев в Эльзасе.Мы больше не можем терпеть их зловоние."


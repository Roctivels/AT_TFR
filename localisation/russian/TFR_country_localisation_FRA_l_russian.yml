 FAF_national_duty: "Национальный Долг"
 FAF_national_duty_desc: "\n\n\n\n£GFX_FAF_national_duty\n\n\n\n\n\nНа протяжении всей нашей истории долг перед Францией заключался во многих вещах, но единственная вещь, которая всегда будет обязательной для нашей нации, - это призыв в армию. С установлением нового режима мы получили сотни тысяч патриотически настроенных французов, готовых служить Франции самым почетным способом, какой только известен человеку. Мы выполним свой долг, подготовив этих людей к неизбежному продолжению европейской войны, ведь они готовятся сражаться не только за себя, но и за Францию!"

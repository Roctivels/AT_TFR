 FAF_Fascist_Revolts: "Фашистские Бунты"
 FAF_Fascist_Revolts_desc: "То ли из-за событий, происходящих в Европе, то ли из-за политики, проводимой нашим правительством, фашисты нашей страны сейчас бунтуют против нашего правительства. Хотя мы не ожидаем, что это будет продолжаться вечно, нам, возможно, придется пересмотреть наш нынешний курс управления, чтобы не навлечь на себя их гнев!"

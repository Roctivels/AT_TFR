 FAF_EUN_army_of_purity_dummy: "Европейская Гегемония"
 FAF_EUN_army_of_purity_dummy_desc: "Наше движение идентаристов, отличается от обычного ультраправого континуума в Европе тем, что поддерживает объединение континента, а не отдельных наций, входящих в него. Видя, как Европейский союз распадается под натиском восточных орд, появилась возможность заполнить вакуум власти и стать гегемоном Европы. Хотя сохранение влияния может обойтись нам недешево в политическом плане, быть новым центром континента необходимо для того, чтобы мы одержали победу над силами мультикультурализма, либерализма и теми силами, которые стремятся уничтожить нашу любимую Европу!"
 FAF_EU_unification_campaigns_idea: "Гегемонистская Объединительная Кампания"
 FAF_EU_unification_campaigns_idea_desc: "В нашем крестовом походе за объединение всей Европы мы должны учитывать, что наше объединение отличается от тех, которые выдвигали бывшие федералисты Европейского союза. Наша кампания направлена на формирование §СЕвропейской гегемонии§!, которая стремится объединить континент, но под гегемонией, которая защищает его народы и культуры, а не извлекает богатства для технократических элит. В течение следующего года мы направим огромные ресурсы на то, чтобы эта кампания увенчалась успехом и позволила нам избавить континент от любого иностранного влияния!"
 FAF_europeanism_idea: "Европеизм"
 FAF_europeanism_idea_desc: "Европеизм призывает Европу к единству, сохраняя при этом национальную самобытность и региональную культуру. Разделенная Европа не сможет противостоять глобальным державам, а объединенные вооруженные силы позволят нам сократить количество используемых систем вооружений и, имея общий язык, набирать персонал на континенте с населением более полумиллиарда человек."


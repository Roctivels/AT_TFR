 FRA_Retire_Disatisfied_General: "Принудительный Выход на Пенсию"
 FRA_Retire_Disatisfied_General_desc: "Хотя с моральной точки зрения похвально заставлять недовольных членов генштаба уходить в политическую отставку до тех пор, пока они не обратят внимание на нашу администрацию, это проверенный и испытанный метод, который принесет нам пользу в краткосрочной перспективе."
 FRA_Unretire_Disatisfied_General: "Прощать Политические Прегрешения"
 FRA_Unretire_Disatisfied_General_desc: "Добро пожаловать обратно. Знай свое место."
 FRA_state_of_emergency_idea: "Чрезвычайное Положение"
 FRA_national_embarrassment_idea: "Национальный Позор"

 FRA_ML_N2H_tt: "Это изменит лояльность генерала с £GFX_FRA_Happy_with_Regime_texticon §YНЕЙТРАЛЬНОЙ§! до £GFX_FRA_Loyal_to_Military_texticon §GСЧАСТЛИВОГО§!."
 FRA_ML_D2N_tt: "Это изменит лояльность генерала с £GFX_FRA_Disgusted_with_Regime_texticon §RРАЗГНЕВАННОГО§! до £GFX_FRA_Neutral_with_Regime_texticon §YНЕЙТРАЛЬНОГО§!."

 FAF_Convene_the_Government: "Созвать Правительство"
 FAF_Convene_the_Government_desc: "Наконец-то хаос утих, и французская нация находится под нашим контролем. Коммунисты и предатели были изгнаны в тень истинными патриотами, но мы должны оставаться начеку. Наши враги все еще держатся в тени и воспользуются любым признаком слабости, чтобы нанести удар. Мы должны действовать быстро, чтобы централизовать наш контроль. Мы созовем новый конституционный совет, чтобы определить будущее нашего режима. Независимо от того, какой путь мы выберем, Франции потребуются радикальные перемены, чтобы выжить. Под нашим руководством мы воплотим эти идеи в жизнь."
 FAF_Stability_and_Authority: "Stabilité et Autorité"
 FAF_Stability_and_Authority_desc: "Франция всегда была демократической страной. Начиная с клятвы на теннисном корте и до сегодняшнего дня, многие считают Францию родиной демократии. Многие радикалы говорят, что демократия слаба и от нее нужно отказаться, но мы знаем правду. Мы не должны поддаваться догматическим идеям радикалов и фанатиков. Демократия не подвела республику. Это сделала коррупция. Под нашим руководством французская демократия будет возвращена к тому, чем она должна быть. Система, в которой народ представлен, а правительство несет ответственность за каждое свое действие. В будущем простой человек сможет спокойно отдыхать, зная, что его правительство действительно работает на него, а не на себя."
 FAF_Honor_and_Glory: "Honneur et Gloire"
 FAF_Honor_and_Glory_desc: "Франция - это разбитая и сломленная нация. Ее народ брошен на произвол судьбы и обманут ложными обещаниями режима, который стремится лишь набить свои карманы, игнорируя крики народа. Так больше не будет. Мы вырвем остатки Пятой республики с корнем и со стеблем. Слабость будет заменена силой, бездействие - действием, а предательство - нерушимой верностью. Подобно фениксу, Франция восстанет, возродившись из неудач предыдущего режима. Мир снова будет бояться Франции, и они будут знать, что нельзя перечить нам. Или они будут уничтожены."
 FAF_Edict_of_Paris: "Эдикт Виши"
 FAF_Edict_of_Paris_desc: "Пока оседает пыль и возвращается стабильность, мы унаследовали разрушенную, истерзанную войной нацию. Необходимо проделать большую работу, чтобы восстановить позиции Франции на мировой арене. Наша экономика должна быть восстановлена с нуля. А наша армия должна быть восстановлена и подготовлена к будущим войнам. Подобно Петену и Деголлю, мы выведем Францию из тьмы и вернемся к свету. Мы больше не будем обременены обязательствами перед НАТО или ЕС. Народ больше не будет обманут политиками, которые заботятся только о том, чтобы набить свои карманы. Под нашим руководством будущее станет светлым для всех жителей Франции."
 FAF_An_Economy_From_Nothing: "Экономика из Ничего"
 FAF_Abolish_Workers_Rights: "Отменить Права Трудящихся"
 FAF_Utilize_Mass_Peasantry: "Использовать Массовую Бедность"
 FAF_Establish_New_Workers_Syndicates: "Создать Новые Синдикаты"
 FAF_Suspend_Civilian_Imports: "Приостановить Гражданский Импорт"
 FAF_Implement_Long_Term_Economic_Mobilization: "Осуществить Долгосрочную Экономическую Мобилизацию"
 FAF_Implement_Long_Term_Economic_Mobilization_desc: "Бездействующие руки - орудие дьявола. Каждый француз должен выполнить свой национальный долг перед своей страной в самые трудные времена. Французы, застрявшие на улицах, получат работу. Фабрики, фермы и строительные проекты будут заполнены патриотичными французами, выполняющими свой долг перед Францией. Восстановление нашей промышленности оживит нашу экономику, и, заплатив нашим новым рабочим, они смогут потратить деньги на дальнейшее оживление нашей экономики."
 FAF_Legalize_Experimental_Weapon_Programs: "Легализовать Экспериментальные Оружейные Программы"
 FAF_Legalize_Experimental_Weapon_Programs_desc: "Французские инновации на протяжении веков были авангардом европейской науки, прежде чем их потенциал был разрушен врагами ее суверенной доблести. Границы так называемой "морали" больше не будут сковывать наш прогресс. Химическая, биологическая или даже психологическая война - мы не боимся их использовать."
 FAF_Glorify_Labor: "Прославлять Труд"
 FAF_Establish_Economic_Heirarchy: "Установить Экономическую Иерархию"
 FAF_Engie_Bills: "Счета Engie"
 FAF_Engie_Bills_desc: "Энергия - это источник жизненной силы нашей страны, но слишком долго она находилась под контролем иностранных инвестиционных компаний. Все наши источники энергии, будь то атомная энергия, ветряные мельницы или уголь, будут национализированы и централизованы в единой энергетической командной структуре. Они будут использоваться для того, чтобы вернуть к жизни наши заводы. Наша энергия будет только французской и предназначенной только для французов. Наши национальные энергетические ресурсы станут основой новой Франции."
 FAF_Rebuild_the_Franc: "Перестроить Франк"
 FAF_Rebuild_the_Franc_desc: "Слишком долго Франция была скована либерализмом бюрократов ЕС, которые отняли у нас суверенитет и принесли в жертву наш труд ради ложных обещаний федерации. Евро лишил нашу нацию самобытности и независимости, поэтому восстановление франка означает прекращение цикла зависимости от этих глобалистских спекулянтов."
 FAF_Ban_Inflation: "Запретить Инфляцию"
 FAF_Ban_Inflation_desc: "После поражения и краха старого либерального режима в войне французская экономика погрузилась в экономическую анархию. Инфляция вышла из-под контроля, и простые французы больше не могут позволить себе самое необходимое. Мы должны восстановить порядок, как и обещали, и начнем с решительного запрета бешеной инфляции и введения контроля над ценами."
 FAF_Fall_Back_on_Gold: "Вернуться к Золоту"
 FAF_Fall_Back_on_Gold_desc: "Наша валюта лежит в руинах. Из хаоса нашего унижения наш народ страдает от нестабильной экономики. Нам нужны решительные действия не только для спасения нашей валюты, но и для спасения народа от экономического недуга. Мы откажемся от модернистских спекуляций, диктующих нам экономическую ситуацию. Мы вернемся к золотому стандарту, и будущее Франции будет обеспечено реальным богатством."
 FAF_Abandon_our_Debt: "Отказаться от Нашего Долга"
 FAF_Abandon_our_Debt_desc: "Перед кем мы в долгу? Швейцарскому банкиру? Масонам-глобалистам? Эти паразиты хотят лишить Францию ее богатств, и за счет труда нашего народа мы оказались в несправедливом долгу. Цепи финансового порабощения нас не сотрясают. Всемирный банк может плакать от возмущения, а мы в свою очередь будем смеяться над вновь обретенным процветанием."
 FAF_Rebrand_the_Euro: "Ребрендинг Евро"
 FAF_Rebrand_the_Euro_desc: "Евро - это инструмент глобалистской элиты. Он лишил права на суверенитет не только Францию, но и гордые народы Европы. Однако вместо того, чтобы отказаться от него, мы вернем его себе. Это будет валюта европейского порядка, которая станет основой для отвоевания нашего господства у наживающихся банкиров."
 FAF_Set_Inflation_Maximum: "Установить Максимальную Инфляцию"
 FAF_Set_Inflation_Maximum_desc: "Сокрушительный экономический кризис требует решительных действий; ошибки прошлых предательских глобалистских лидеров привели к выходящему из-под контроля гиперинфляционному кризису. Это требует твердых решений. Во-первых, мы введем жесткий контроль над ценами; французский народ больше не будет лишен всех своих денег из-за жадности капиталистов. Затем мы создадим Совет по стабилизации валюты, который будет следить за этим процессом. Благодаря этому постепенному процессу французский народ наконец-то почувствует мир после этих тяжелых времен."
 FAF_Paint_an_Aura_of_Stability: "Создать Ауру Стабильности"
 FAF_Paint_an_Aura_of_Stability_desc: "Французский народ много страдал: Десятилетия подавления глобалистской элитой, когда наша национальная гордость была втоптана в грязь, европейская война, приведшая к гибели тысяч молодых французов, и ее окончательный провал, крах бывших предательских либеральных режимов и экономический кризис. Мы должны показать народу, что порядок вернулся. Проведение грандиозных парадов, национальные трансляции и мощные речи должны вернуть доверие к французской экономике."
 FAF_Establish_Debt_Assurance_Bureau: "Создать Бюро по Гарантированию Задолженности"
 FAF_Establish_Debt_Assurance_Bureau_desc: "Десятилетия эксплуатации международными банкирами и ростовщичество ЕС привели к тому, что Франция оказалась в рабстве. Национальное бюро гарантирования долга станет молотом, сокрушающим международных кредиторов. Мы аннулируем частные долги, конфискуем активы банкиров в наказание за их экономические преступления против Франции и изгоним их; мы используем их активы, чтобы вдохнуть столь необходимую жизнь в нашу экономику. Банкиры больше не будут порабощать французский народ; вернется наш финансовый суверенитет."
 FAF_A_New_Era: "Новая Французская Эра"
 FAF_A_New_Era_desc: "Благодаря нашему Господу и нашей чистой решимости мы достигли чего-то столь прекрасного, столь огромного по силе, что народы Европы и даже весь мир имеют честь быть свидетелями - нашей новой Франции. В учебниках истории, которые будут изучать наши внуки, будет рассказано о нашем паломничестве в новую эпоху всей Франции, о пути, запятнанном кровью, потом и слезами. Из глубин мы поднялись к высотам геополитического мира, на пьедестал всех вещей в свете величия мы поместили имя "Франция." С этим новым светом и обретенной мощью у мира нет другого выбора, кроме как склонить колено перед нашей нацией. Начало чего-то грандиозного, духовного по своей сути, достигает кульминации в залах управления, но только время может рассказать нашу историю, и только наши сырые руки, наши разбитые спины, наши усталые ноги могут совершить это."
 FAF_Secure_our_Southern_Flank: "Защитить Испанский Союз"
 FAF_Secure_our_Southern_Flank_desc: "Некоторые вещи просто здравы для всех людей любой нации: безопасный народ, безопасное общество и, что еще важнее, безопасная граница. Наша южная граница похожа на мягкое подбрюшье зверя, готового к тому, чтобы его разрезали. Мы качаем головой при такой мысли. Любой здравомыслящий француз может без промедления согласиться с тем, что защита является первостепенной задачей для нашего правительства, и с такой задачей перед нами встает выбор: мы можем провести наших людей через южные горы в испанские земли, чтобы обеспечить наше будущее и по праву утвердить чувство мира в умах французского народа. Или, что более разумно, мы можем установить прямую связь с испанским правительством и договориться с ним о союзе и взаимном обеспечении в форме договоре о ненападении."
 FAF_Protect_Balearic_Islands: "§YOpération§!: Trois Sables"
 FAF_Protect_Balearic_Islands_desc: "Балеарские острова, особенно Майорка, всегда были тесно связаны с нашей страной. Связь между нами и этим великолепным маленьким островом возникла еще тогда, когда окситанцы мигрировали из Южной Франции, принеся с собой чудеса французской культуры. И, конечно, такая доминирующая культура, как французская, неизбежно будет доминировать на земле, на которую она влияет. Мы должны еще раз осознать нашу культурную связь, особенно в эти непростые времена. Поэтому мы должны начать операцию Trois Sables и воссоединиться с нашими сородичами."
 FAF_Protect_Gibraltar: "§YOpération§!: Pierre Pavée"
 FAF_Protect_Gibraltar_desc: "Кипр - это остров, расположенный под гигантским соседом, Турцией. После турецкого вторжения на Кипр в 1974 году остров был разделен на две части, разорванные на части неистовыми турками. Но стратегическая важность острова по-прежнему сохраняется, и теперь, когда турки постоянно оскорбляют нас и отрезают от дипломатии. Поскольку ситуация быстро разваливается, мы должны использовать свой шанс и захватить Кипр. Там слишком много военно-морских баз и слишком много ресурсов, чтобы попасть в руки наших врагов на востоке."
 FAF_Franco_Italian_Cooperation: "Саммит Франко-Итальянской Дружбы"
 FAF_Franco_Italian_Cooperation_desc: "На итальянцев, которые, естественно, представляют интерес, находясь так близко от нас, нужно смотреть скептически. Хотя они действительно не представляют для нас угрозы, и мы не хотим сказать, что они слабы в каком-либо отношении, они ценны. Наши дипломаты уже отправлены в Рим, чтобы обсудить наше будущее и будущее Европы, и, как мы видим, это не что иное, как бесценная возможность рассматривать наши нации как единую систему, чтобы установить средиземноморское господство для наших двух народов. Дружба между двумя народами со схожей историей, будь то языковая или политическая, - приятно видеть некое подобие товарищества в столь смутное и неопределенное время."
 FAF_Demand_Mediterrenean_Assets: "Потребовать Средиземноморские Активы"
 FAF_Demand_Mediterrenean_Assets_desc: "На протяжении веков только Франция была доминирующей державой в латинском мире. Со времен Французской революции и до нового тысячелетия наша нация по праву рождения должна вести за собой другие латинские страны в эту бурную эпоху. Хотя Сардиния всегда находилась под итальянским контролем, а Мальта отдалилась от нашей сферы влияния, их стратегическое значение, тем не менее, слишком велико, чтобы его игнорировать. Включив эти острова в нашу цепь обороны, мы еще больше укрепим свою власть над латинским королевством."
 FAF_Bern_Initiative: "Бернская Инициатива"
 FAF_Bern_Initiative_desc: "Нейтралитет - это низшая форма покорности. Что делали швейцарцы, когда наша страна была охвачена войной? Когда русские топтали нас под своими кирзовыми сапогами. Ничего! Абсолютно ничего! Ни слова, ни цента, ни единого акта поддержки. Мы всегда были справедливы и добры к ним. Мы дали их людям равные права в Шенгенской зоне, мы относились к ним как к братьям, а они в ответ обращались с нами как с собаками! Больше мы не будем подставлять другую щеку. Швейцарцы достаточно долго издевались над нами. По взаимному соглашению с итальянцами мы, соответственно, возьмем Романди и Тичино, ибо это наше право - воссоединиться с нашими родственными братьями по культуре."
 FAF_Promise_Revenge_upon_Russia: "Обещать Национальную Месть"
 FAF_Promise_Revenge_upon_Russia_desc: "Ненависть. Это такое сильное слово. Такое сильное слово. В течение десятилетия или около того наших людей учили любить, быть эмпатичными...... Быть слабыми! Как вы можете любить то, что угрожает вашей жизни и процветанию вашей нации? Эта глобалистская пропаганда "любви" привела к тому, что наши люди развили слабый ум и стали легко ранимыми. Наше снисходительное отношение к войне позволило русским уничтожить наш народ и европейских сородичей. Теперь Франция больше не может предложить любовь, вместо этого сердца наших людей наполнены ненавистью, жаждой мести. Принцип "око за око" и "кровь за кровь" заложен глубоко в природе человечества, и бороться с такими побуждениями глупо и бессмысленно. Французский народ жаждет крови, и мы ее получим."
 FAF_Propogate_Nationalism: "Пропагандировать Национализм"
 FAF_Propogate_Nationalism_desc: "Посмотрите на нашу нацию, нашу культуру, наших людей. Это чувство невозможно повторить ни из какого другого источника. Наш источник гордости - наша Франция, и мы осознаем нечто настолько врожденно мощное, когда используем чистую и необработанную эмоциональную тягу от оштукатуривания символов нашей нации: Эйфелева башня, Триумфальная арка, Нотр-Дам де Пари. На глазах у людей они видят сдерживающее напоминание о том, что они - французы, народ, создавший такие удивительные вещи, как фотография, кинематограф, даже швейная машинка. Мир по праву благодарен французам, и даже если люди в мире не понимают этого, мы понимаем. Мы понимаем все это здесь. Поэтому с этого момента мы будем продвигать и продвигать наш рассказ об изобретательности французского народа. Мы должны гордиться тем, что мы есть, поскольку, как показывают учебники истории, мы побеждаем все препятствия на нашем пути. Огонь, который есть Франция, никогда не погаснет и не угаснет, наш огонь разгорается."
 FAF_Enact_Mandatory_Military_Service: "Ввести Обязательную Военную Службу"
 FAF_Enact_Mandatory_Military_Service_desc: "Упадок страны начинается не тогда, когда рушится ее экономика или рушится политическая структура. Разложение вооруженных сил - вот истинная гниль, которая больше всего угрожает стабильности и процветанию. Без них все, что построили страна и ее народ, может быть отнято иностранным агрессором. Это было доказано дважды в новейшей истории человечества - во Второй мировой и Русско-европейской войнах. Раньше французская армия была чудом, внушала страх нашим врагам и гордость французскому народу, но из-за глобалистского бесхозяйственности и неэффективного кодекса поведения то, что когда-то было могучим Дюрендалем Франции, стало ржавым и тусклым, как изношенный кухонный нож, он не справляется со всеми аспектами. Для того чтобы все это исправить, необходимо провести быстрые реформы и скачки, и начать их следует с восстановления обязательной военной службы. В конце концов, как можно создать армию без солдат?"
 FAF_Prepare_the_Nation: "Подготовить Нацию"
 FAF_Prepare_the_Nation_desc: "На горизонте надвигается буря. Над Европой снова сгустился густой туман: армии готовятся к войне. Нет сомнений, что эта война будет более разрушительной, чем предыдущая. По правде говоря, это может быть наш последний шанс предотвратить советское господство в Европе. И для этого мы должны подготовить наш народ к любой возможности. Бункеры будут подготовлены, запасы продовольствия - все, что угодно, лишь бы подготовить нас к неизбежному разрушению. Кто-то назовет нас параноиками, но мы знаем, что подготовка более чем необходима. Если Франция хочет выжить, она должна быть готова к любому возможному исходу."
 FAF_Reinforce_the_Rhine: "Второе Мажино"
 FAF_Reinforce_the_Rhine_desc: "Хотя линия Мажино никогда не была полностью проверена, она остается свидетельством оборонительного гения французских военных. Хотя линия в основном выдержала испытание временем, в последнее время она пришла в упадок. Если мы хотим повысить нашу обороноспособность, необходимо привести линию в соответствие с современными стандартами. Современная линия Мажино будет служить нам последней линией обороны, если советская орда настигнет наших союзников. Красные будут знать, что не стоит сомневаться в мощи Франции, и мы отомстим, если они осмелятся прорвать линию."
 FAF_Operation_Charlamagne: "§YOpération§!: Карл Великий"
 FAF_Operation_Charlamagne_desc: "Несмотря на общие интересы, наш союз с Германией и Италией все еще остается очень шатким. Хотя нас объединяет общая ненависть к советской угрозе, мы все еще разделены мелкими проблемами. Если мы не сможем отбросить наши разногласия и работать вместе, то в конечном итоге нас захлестнет неостановимый советский шторм."
 FAF_Operation_Clovis: "§YOpération§!: Clovis"
 FAF_Operation_Clovis_desc: "Настало время бросить кость. Каждая минута бодрствования была потрачена на подготовку к неизбежному столкновению с советской угрозой. Каждая принесенная жертва, каждая пожертвованная свобода - все это привело к этому моменту. Теперь все ставки сделаны. Наша ярость обрушится на врага в полную силу. Никакой пощады, никаких уступок, и мы не успокоимся, пока сама русская нация не разлетится на тысячи осколков. С Пактом на нашей стороне мы пронесемся по Восточной Европе, как неудержимый прилив. И мы не успокоимся, пока не сгорит Москва."

 FPR_Ideolize_the_Permanent_Revolution: "Боготворить Перманентную революцию"
 FPR_Ideolize_the_Permanent_Revolution_desc: "Пролетариат Франции свободен! Наши рабочие свободны! Но наша цель - полное освобождение рабочих - на этом не заканчивается. Как сказал Маркс: "Рабочие всего мира, соединяйтесь!" Это не значит, что речь идет только о рабочих Франции или Европы, ведь очевидно, что весь мир принадлежит пролетариату и рабочему классу. Каждый день мы работаем над тем, чтобы освободить мир от рабства по найму, от разрушительной природы капитализма, от господ, которые властвуют над рабочими, как феодальные короли и королевы. Мы посвящаем свою жизнь истинным словам Маркса и будем нести свободу рабочим и угнетенным народам всего мира."
 FPR_Ensure_Revolutionary_successes: "Разжигать Революцию за Рубежом"
 FPR_Ensure_Revolutionary_successes_desc: "Наша перманентная революция начинается с рабочих Франции, от оружейных заводов до сражений за рубежом - наши рабочие выкачивают необходимые материалы для всех рук каждого рабочего в мире, который хочет взять в руки оружие и бороться со своими угнетателями. Посылая наших лучших советников, наше оружие, мы боремся против мирового капиталистического порядка и посылаем страшный сигнал угнетателям: мы стоим высоко и дерзко перед лицом противника. Больше не надо, пусть рабочие всего мира борются за свою свободу."
 FPR_The_Global_Class_Struggle: "Пятый Интернационал"
 FPR_The_Global_Class_Struggle_desc: "В великой и благородной попытке принести свободу угнетенным рабочим всего мира мы укрепили свои позиции на мировой арене, создав официальный Пятый Интернационал, достойный и легитимный преемник своего предшественника, Четвертого Интернационала. Эта наднациональная организация будет не только дипломатическим корпусом, состоящим из мужчин и женщин, которые будут заниматься большой дипломатией, как это было в новой и усовершенствованной Франции. Пятый Интернационал - это также, в определенной степени, военная организация, имеющая в виду трудящихся всего мира, формальная интуиция для тех, кто придет просить помощи на благо своего местного дела. От европейского континента до народов Южной Америки и Африки мы существуем для того, чтобы поддерживать идеи Маркса и эффективно распространять их по всему миру, как чуму, которую капиталисты боятся и сторонятся."
 FPR_Champion_Proletariat_Internationalism: "Поборник Пролетарского Интернационализма"
 FPR_Champion_Proletariat_Internationalism_desc: "Пролетариат - это тот, кто не принадлежит ни к какой национальной, расовой или религиозной принадлежности. Люди мира, которые зарабатывают себе на жизнь трудом, принадлежат сами себе, как народ, который всегда существовал и будет существовать - рабочий - это постоянная истинная принадлежность мира. Именно это отличает нас от всех других наций в мире, хотя да, мы французские рабочие, мы принадлежим к народу, к тем, кто угнетен в мире капиталистической системой рабства. Мы освободим себя или умрем, стараясь сделать все возможное, мы должны это сделать, потому что это правильно и справедливо. Все люди должны умереть, но мы можем выбрать значение нашей смерти, мы выбрали нести факел марксизма в наши могилы."
 FPR_NSB_idea: "Бюро Национальной Безопасности"
 FPR_Block_Deformation: "Защита от Деформации"
 FPR_Block_Deformation_desc: "В современном политическом ландшафте большинство так называемых коммунистических государств, выживших после 90-х годов, представляют собой не что иное, как деформированные рабочие государства. Могут ли китайцы утверждать, что они коммунисты, управляя одной из крупнейших рыночных экономик в истории? Даже некогда любимый Советский Союз деформировался под террором Сталина и его извращением марксизма-ленинизма. Получив контроль над французским правительством, мы должны сделать все, чтобы наша любимая революция не подверглась деформации. Четкие идеологические стандарты в сочетании с подавлением исключений, даже под прикрытием материальных условий или любых других оправданий, которые наша пятая колонна может использовать против нас, обеспечат Франции возможность наконец-то выполнить свою судьбу - стать первым недеформированным марксистским государством!"
 FPR_The_Socialist_Culture: "Социализм Будущего"
 FPR_The_Socialist_Culture_desc: "После десятилетий капиталистического реализма и поддерживающей его пропаганды многие обеспокоены нашей революцией, поскольку видят ее через призму неудачного советского прошлого. Проще говоря, мы должны убедиться, что это не так. Пролетариат Франции должен знать, что мы выступаем за социализм XXI века, который учитывает потребности и технологии современных проблем. Кроме того, приоритет элемента футуристического мышления - это наш лучший шанс гарантировать, что отказ от прошлых фальшиво-марксистских экспериментов и восприятие пролетариатом Франции нашего социализма как движения, ведущего нас к утопическому будущему, а не к антиутопическому прошлому."
 FPR_Long_Live_the_Workers_Revolution: "Да Здравствует Рабочая Революция"
 FPR_Long_Live_the_Workers_Revolution_desc: "Проще говоря, наша доктрина перманентной революции должна быть внедрена как внутри страны, так и за рубежом, если мы хотим нести троцкистское знамя. Будь то экономические и культурные революции, направленные на разрушение угнетающих капиталистических структур, которые веками сковывали Францию, или подготовка к освобождению пролетариев Европы и других стран, мы всегда должны стоять за революционные дела, где бы мы их ни нашли. Даже если силы фашизма и международного капитализма обрушатся на нас, до самого горького конца Франция будет кричать...\n\nДа здравствует рабочая революция!"
 FPR_Socialist_Democracy: "Партийная Демократия"
 FPR_Socialist_Democracy_desc: "По мере того как мы трансформируем правительство Франции, отказываясь от провалов либерально-буржуазной тирании, мы сталкиваемся с многочисленными обвинениями в "антидемократичности" этого процесса. Однако эти благонамеренные люмпенпролетарии не понимают, что мы планируем заменить прежние провалы либеральной демократии демократическим централизмом, который лучше всего назвать партийной демократией! Больше избранные члены парламента не будут заниматься бесплодными спорами, в результате которых страдает народ, не имеющий права голоса во власти; вместо этого каждый член партии будет играть свою роль в том, чтобы решения, которые мы принимаем, соответствовали принципам рабочей демократии. Конечно, некоторые представители реакционного класса недовольны этим предполагаемым подавлением политической свободы. Однако, внедряя демократический централизм, мы все равно можем обеспечить возможность рассмотрения необходимых жалоб на правительство. Эти жалобы позволят нам проявить необходимую самокритику и не допустить тупика, который свел в могилу бывшую Шестую республику, оставив ее уязвимой по мере того, как русские империалисты завоевывали Восточную Европу."
 FPR_Coalition_the_Against_Fascism: "Единый фронт Против Фашизма"
 FPR_Coalition_the_Against_Fascism_desc: "Стремясь к тому, чтобы внутренние противоречия не свергли Революцию изнутри, мы также не должны поддаваться атрибутам междоусобиц, которые с незапамятных времен господствовали в левых кругах. Вместе с другими левыми партиями-единомышленниками, которые помогли обеспечить наш приход к власти, мы должны сформировать межсекторальный единый фронт против сил реакции. Такая демонстрация единства, независимо от левой ориентации, не только позволит нам смягчить любые претензии на политическое угнетение, но и покажет тем, кто стремится свергнуть наше управление Францией под руководством рабочих, что это будет нелегкая задача, и что мы не успокоимся, пока красный флаг не станет знаменем человеческой расы!"
 FPR_Liberate_the_Balkans: "Освободить Балканы"
 FPR_Liberate_the_Balkans_desc: "Балканы, полуостров, на котором когда-то существовало множество социалистических режимов, теперь погрязли в жестоких междоусобицах и пороках капитализма. Хотя некоторые считают, что вторжение представляет собой своего рода "красный империализм", который просто навязывает нашу волю народам этих балканских стран, правда заключается в том, что мы спасаем их от самих себя. Мы должны начать великий крестовый поход, чтобы спасти народы Балкан от сил капиталистической реакции и российского империализма и гарантировать, что, когда придет время сражаться с этими евразийскими империалистами, мы будем иметь преимущество на этом фронте."
 FPR_Cybertrot: "КиберТроц"
 FPR_Cybertrot_desc: "Кибернетический социализм, или идея о том, что автоматизированные системы могут помочь в управлении плановой экономикой, является основополагающим течением современной социалистической мысли. Такие эксперименты, как Киберсин в Чили или злополучный ОГАС в Советском Союзе, к сожалению, так и не получили достаточных ресурсов для того, чтобы выйти из-под контроля и увидеть свое воплощение в попытках решить самые серьезные проблемы, стоящие перед плановой экономикой, в частности рост олигархов и коррупции в целом. Исходя из этого, мы собрали лучшие и самые яркие умы Франции, чтобы начать работу над системой, которая будет известна как КиберТроц. Эта система, являющаяся вершиной искусственного интеллекта, вычислительных и управленческих технологий, будет действовать так, чтобы командная экономика Франции управлялась как можно более плавно, и чтобы наши усилия по освобождению Европы проходили без помех, даже если реакционеры попытаются саботировать нашу экономику. Кто-то может высказать опасения, что этот ИИ, наделенный более высокими когнитивными функциями, может поставить под угрозу революцию или даже само человечество, но мы уверены, что обучение, которое он проходит, гарантирует, что любое действие КиберТроц будет сделано в первую очередь для рабочих."
 FPR_creation_of_cybertrot_tt: "Выполнение этого фокуса добавит §AКибер-Троцкого§! как §RФельдмаршала§!, §AВоенного Советника§!, и §GМинистра Обороны§!"
 FPR_trotskymobile_active_tt: "Это приведет к появлению командного центра, содержащего §AТроцкого§! \n\nЕсли этот командный центр будет §RПОТЕРЯН В БОЮ§!, то будет потерян и §AКибер-Троцкий§!"
 FPR_Federation_of_Socialist_States: "Федерация Социалистических Государств"
 FPR_Federation_of_Socialist_States_desc: "По мере того как мировая революция продвигается вперед, мы обнаруживаем, что охватываем территории далеко за пределами Франции, освобожденные от своих бывших капиталистических угнетателей. При этом мы должны осознать, что дальнейшее использование ярлыка "Франция" для названия нашего революционного государства больше не уместно, особенно когда мы окончательно отказываемся от мелочных идей национализма в пользу пролетарского интернационализма. Таким образом, по декрету нашего парламентского единого фронта мы преобразовались в Федерацию социалистических государств - название, которое лучше подходит для всех наших новых товарищей, вступивших в наши ряды.\n\nНикогда больше силы реакции не будут толкать нас обратно в капиталистическую демагогию, пусть даже под видом рыночной "социалистической" деформации. С анализом и мощью КиберТроца на нашей стороне мы можем гарантировать, что командная экономика, которую многие когда-то считали невозможной, не только достигнет, но и превзойдет самые смелые мечты наших экономических планировщиков. Теперь мы готовы готовиться к последнему крестовому походу, чтобы освободить мировой пролетариат от тирании капитализма и привести его к миру, который покоится под единым интернационалистским знаменем!\n\nVive la Fédération des États Socialistes!"
 FPR_global_revolution_category: "Центральное Звено Перманентной Революции"
 FPR_global_revolution_category_desc: "\n\n\n\n\n£GFX_FPR_permanent_revolution_cat\n\n\n\n\n\n\n\nДля подлинного освобождения нации пролетариат должен постоянно и вечно бороться за своих ставленников. В их борьбе за свободу не должно быть пауз и перерывов, они должны всегда уничтожать гнет, когда видят его в народе.\n\nИдея перманентной революции, концептуализированная Троцким, - это то, что должно быть воплощено в жизнь хорошо и действительно. В противном случае мы окажемся предателями своего дела, отказавшись от идеала пролетариата."

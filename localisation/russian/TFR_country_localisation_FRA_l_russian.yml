 FAF_royal_pretenders_dynamic: "Королевские Претенденты"
 FAF_royal_pretenders_dynamic_desc: "\n\n\n\n\n£GFX_FAF_royal_squabbles\n\n\n\n\n\n\n\nНесмотря на наши древние притязания, восходящие к дому Валуа, орлеанисты и бонапартистские узурпаторы борются с нашим божественным правлением из тени, и мы должны решить эту проблему, пока она не вышла из-под контроля."

 france.284.t: "Старая Империя"
 france.284.d: "Над пустыней летит французский транспортный вертолет. Ослепительное сахарское солнце уже село, избавив ее жителей от нестерпимой жары, но впускает холод.\nАнри сжимает винтовку, глядя на просторы, потерянные в гуле роторов. \n\nОни приближались к точке входа, на горизонте показался небольшой оазис в пустыне, деревня, ни на чьей карте не обозначенная, приютившаяся среди деревьев саванны. Предположительно, здесь находится склад оружия, которым снабжают каких-то исламистских повстанцев, так сказали Анри, но это все политические штучки над его кабинетом. Вертолет приземляется, и изнутри здания доносятся отдаленные крики - очевидно, их услышали.\n\nБыстро перемещаясь, они формируют отряды, очищая здание за зданием, пробуждая одетые в лохмотья семьи в плохо обставленных домах, плачущих детей, стрельбу в одном из домов, ответный огонь французов, и в подвале они находят склад. Мальчик крепко обнимает мужчину, которого они застрелили, Анри охраняет тыл, наблюдая за дверью, пока идет инвентаризация. Они захватили 1823 автомата Калашникова и более 84 000 патронов. Это был крупный успех, но стоил ли он отца этого ребенка?"
 france.284.a: "Эти вопросы не дают Анри спать по ночам."
 france.285.t: "И Они Продолжают Жить"
 france.285.d: "Ибезимако Чинвенду родился в 1988 году в семье игбо в Амаеке (Южная Нигерия) и прожил жизнь, которую можно назвать чистой трагедией. Он рос в условиях ограниченного доступа к чистой питьевой воде и даже к нормальному питанию, что объяснялось отсутствием усилий и заботы со стороны федерального правительства по финансированию и реинтеграции таких общин, как его, расположенных на истерзанном войной юге страны. Это вызвало у него отвращение к жадной и удивительно коррумпированной военной элите, которая преследовала его, его друзей и, прежде всего, его семью. Он нашел утешение в исламе, в мучениках, которые определяли целые эпохи из-за их амбиций и борьбы за веру. Это было пародией, полным предательством принципов, которым, как утверждали те, кто стоял выше, следовал и поклонялся. Все должно было измениться.\n\nИ так оно и случилось. Сейчас ему было 33 года, и он больше не страдал на сельском юге своей страны. Семена энтропии, посаженные 20 лет назад, давно пустили корни, задушив его дух и позволив дышать только страстью ненависти. Для тех, кто знал его, он был неузнаваем: весь в знаках отличия Исламского государство под фирменной черной банданой, ставшей печально известной не только на Ближнем Востоке и в Африке, но и во всем мире. Он сидел на крутом холме, возвышавшемся над французской военной базой недалеко от Була-Була.\n\nОн был там только по одной причине - отдать свою жизнь за ислам.\n\nОн сидел там, на холме, между ветвями дальбергии и ветром, который обдувал все его тело. На мгновение задумавшись, он зажал бьющееся сердце. Он был в ужасе. В глубине души он понимал, что не хочет этого делать. Но он также знал, что должен это сделать. Это была кульминация всего, за что он боролся, шанс наконец-то заявить о себе среди шахидов, которые были до него. Были ли они, такие как Сумайя и Ясир РА, так же напуганы в свои последние минуты? Возможно, а возможно, и нет. В конце концов, когда они предстанут перед Создателем в загробном мире, это не будет иметь значения. Имели значение только их поступки.\n\nИ вот он спустился с холма навстречу освещающим его огням и, схватившись за жилет, в последний раз нырнул в неизвестность."
 france.285.a: "Сура Алю Имран - 169"
 france.286.t: "Бармен"
 france.286.d: "Уже несколько дней в Париже проходят акции протеста, вызванные политикой правительства Макрона, сокращением пенсионного возраста, межэтническими противоречиями, антиправительственными настроениями, десятки людей получили ранения, а по мере того, как число "желтых жилетов" растет, полиция начинает все активнее подавлять протесты. Был шумный закат, когда подошел местный бармен в желтом жилете поверх униформы, с респиратором на лице, неся два полных ящика пустых бутылок, которые он собрал за свою смену.\n\nПьер стоял сзади, организатор протеста на этой конкретной улице, бармен поставил ящики возле него со звоном стекла, столь обычным в его работе.\n"Ты принес прохладительные напитки?" сказал Пьер, наполовину позабавленный\n"Боеприпасы." Бармен говорит, с огнем в голосе.\n"Нет, нет, нет, конечно, ты не это имеешь в виду?" говорит Пьер.\n"Просто добавь бензина." Бармен говорит, мрачно хихикая, заглушая скандирование.\n"Это безумие, бармен! Бензиновые бомбы? Мы можем убить людей."\n"Они убивают и нас, их политика, их дубинки, ты хочешь подождать, пока они разобьют каждый изолированный очаг протеста или сделать взрыв, пока можешь?"\n\nБармен и Пьер обмениваются напряженным взглядом. Оба борются за народ, но они - две стороны одной медали.\n"Полиция просто выполняет приказы." Пьер твердо заявляет:\n"С тобой или без тебя, мы убедим их не делать этого." и с этим Бармен берет ящик бутылок на ближайшей заправке, в то время как его коллега приносит ящик готовых молотовых."
 france.286.a: "''Пьер, теперь это не в твоих руках.''"

 FRA_cement_the_NATO_model: "Закрепление Модели НАТО"
 FRA_cement_the_NATO_model_desc: "Одним из побочных эффектов того, что предыдущие правительства сохраняли чувство гордости даже в ущерб здравому смыслу, является мешанина типов и производства оборудования. Франция, возможно, и использует боеприпасы стандарта НАТО, но те, кто пришел до нас, позаботились о том, чтобы все остальное было как можно более уникальным "французским", независимо от того, как это повлияет на нашу способность вести войну. Простое использование стандартных боеприпасов НАТО недостаточно, нам нужна полная стандартизация по всей Европе. Начнется долгий процесс, и со временем все, вплоть до используемых винтов, будет одинаковым, независимо от того, сделано оно во Франции или в Австрии."
 FRA_the_runaway_identities: "Беглые Идентичности"
 FRA_the_runaway_identities_desc: "В начале двадцатых годов, когда в мире разгорался пожар, одним из его симптомов для Франции стал рост региональной идентичности и сепаратизма. Несмотря на нашу веру в общеевропейское единство, это дальнейшее разделение не помогает никому, кроме врагов Европы. Они могут считать себя эльзасцами или корсиканцами, но в своей основе они европейцы. Приводить ли их к этой точке зрения с помощью пинков и криков или с помощью улыбки - решать им самим."
 FRA_declare_the_new_france: "Объявить Новую Францию"
 FRA_declare_the_new_france_desc: "Война на востоке, хаос поражения и последовавшие за ним переворот и гражданская война еще больше потрепали Францию, но мы преуспели там, где меньшие люди потерпели бы неудачу. Силы, пытающиеся защитить или вернуть себе свою версию прошлого, были уничтожены. Теперь мы можем сосредоточить наши ресурсы и внимание на том, что имеет значение: на будущем. Рождение новой Франции знаменует собой начало новой Европы. Единой Европы, которая вместе соберет осколки и построит все заново. Объединенная, сильная и процветающая. Только тогда мы сможем освободить наших братьев на востоке, но все это нужно делать шаг за шагом..."
 FRA_fighting_the_good_fight_category: "Борьба за Добро"
 FRA_join_or_die_decision: "Присоединись или Сдохни"

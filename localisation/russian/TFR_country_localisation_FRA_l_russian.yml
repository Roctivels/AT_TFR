 france.6969.t: "Макрон Мечтает о Юпитере"
 france.6969.d: "Я - государство. Эта цитата приписывается королю, но она, тем не менее, подходит моей республике. В конце концов, в чем смысл власти, если она не принадлежит одному и не используется для величия? Когда у человека есть лишь незначительные полномочия, когда он вынужден вмешиваться в мелочи, это становится бессмысленным.\n\nПосмотрите на Юпитер, планету и Бога. Разве он вмешивался в каждую конкретную жизнь, которая попадалась ему на пути, и следил за тем, чтобы она была идеальной? Нет, он брал все в свои руки, когда это действительно имело значение, полностью контролируя ситуацию. Он не тот, кто поднимает камешек и бросает его через озеро, Он тот, кто оказывает влияние на эоны и эоны, кто изменит ход истории.\n\nПочему человек, стремящийся к великим свершениям, должен беспокоиться о повседневных делах? Великие дела требуют великих действий, а не великих компромиссов или великих коалиций. Если перемены не осуществляются одним человеком, они по своей сути требуют компромисса, в них есть изъяны и просчеты, сделанные лишь для того, чтобы успокоить. Почему я должен подчиняться этому? Почему меня заставляют марать руки, возмущаясь незначительными недостатками каждого человека в идее длиной в год?"
 france.6969.a: " - Эмманюэль Макрон"
 france.6970.t: "То, Что Могло Бы Быть"
 france.6970.d: "Францию сбили с пути и предали продажные националисты вроде Ле Пен и паразитирующие популисты вроде Меленшона. Их мелкие дрязги и некомпетентность не приводят республику ни к чему, кроме позора поражения и экономического краха. Как две стороны одной монеты, их жажда контроля и доминирования заставила их игнорировать реальность, согласно которой только объединенная Европа сможет пережить надвигающуюся бурю. Они навязали нам свою руку, и новая Европа должна родиться из пепла старой. Чтобы Франция выжила, мы должны отбросить старое и занять свое место в Европе - Европе объединенной и свободной. Демократическая Европа. Сильная Европа. Европа, которая никогда больше не потерпит поражения на поле боя и на рынке."
 france.6970.a: "Никогда Снова..."

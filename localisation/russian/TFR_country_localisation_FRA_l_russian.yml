 FAF_vladimir_zhirinovsky_thought: "Бонапартистская Мысль"
 FAF_vladimir_zhirinovsky_thought_desc: "\n\n\n\n£GFX_FAF_ideology_zhir_thought\n\n\n\n\n\n§YБонапартистская Мысль§! представляет собой синтез абсолютистского правления одного монарха XIX века и фашистского классового коллаборационизма XX века. По мнению бонапартистов XXI века, классовые конфликты и борьба ответственны за упадок прежде великих западных обществ. Выход из этого хаоса может быть найден только под властью единого лидера, национального патриарха, который может использовать силу государства для сокрушения врагов масс. Бонапартистов также отличает сильная идентификация с латинскими народами Западной и Южной Европы. Они считают себя наследниками наследия не только Первой французской империи, по имени которой они названы, но и Рима. Наиболее радикальные из них хотят, чтобы весь латинский мир был объединен под властью националистического, авторитарного государства."
 FAF_carolingian_fascism: "Каролингский Фашизм"
 FAF_neonazism_desc: "\n\n\n\n£GFX_Ideology_carolingian_fascism\n\n\n\n\n\n§YКаролингский Фашизм§! это эзотерическая, неистовая и эклектичная форма французского национализма, принятая Лафайетом и его последователями. Укорененные в корнях национал-социалистической идеологии, они считают, что представители "иудео-германской расы" являются недочеловеками, разрушающими культуру Европы, сочувствуют вырождению коммунаров и пытаются погубить мир вместе с ними. Наряду с этим он черпает вдохновение в идеях Франкии, считая, что для французского Lebensraum необходима большая Франция, охватывающая границы империи Карла Великого.\nМногие описали бы внутреннюю работу идеологии Лафайета как культ, напрямую следующий его словам и его видению как закону. Сама основа идеологемы постоянно меняется, день за днем, час за часом. Единственные укоренившиеся убеждения - это убеждения в превосходстве французов и ненависть к тем, кого они считают недочеловеками."
 FAF_lafayette_death_cult_idea: "Культ Верховного Маршала"
 FAF_death_cult_desc: "\n\n\n\n£GFX_FAF_cult_of_lafayette\n\n\n\n\n\n§YКульт Верховного Маршала§! это культ личности, посвященный покойному маршалу французской армии Лафайету, исчезнувшему во время осады Парижа. В основе идеологии лежит крайний национализм и французская исключительность, но преобладают и аспекты национал-социализма. Наиболее существенным отличием культа Лафайета от других ультраправых идеологий в Европе является его антигерманская риторика, напрямую унаследованная от убеждений Лафайета. Кажется, что их ненависть к немцам параллельна только их ненависти к русским. Единственная проблема, с которой сталкивается группа, - отсутствие настоящего идейного проводника. Из-за неопределенной судьбы Лафайета сторонники этой идеологии не имеют четкого представления о будущем Европы и Франции. Единственное, что можно сказать с уверенностью, - это их непоколебимая преданность и вера в Лафайета."


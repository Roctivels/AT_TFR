 FAF_the_puppeteers_of_DAY_X_decision_desc: "Германия с ее десятилетиями антинационализма просто встает и превращается в фашистскую страну после того, как проиграла войну России? МЫ БОРОЛИСЬ ЗА НАШЕ ПРАВИТЕЛЬСТВО, МЫ БОРОЛИСЬ ЗА ИЗГНАНИЕ КОММУНИСТОВ! ГЕРМАНИЯ, однако, просто засунула их под ковер в свой штрассеристско-коммунистический шениган, и МЫ ВСЕ ЗНАЕМ, кому выгодно, чтобы немцы покупали оружие и брали кредиты..."

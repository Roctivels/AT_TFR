 FRA_Reforming_Civil_Services_idea: "Реформирование Государственных Служб"
 FRA_Reforming_Civil_Services_idea_desc: "Благодаря комплексной реорганизации государственной службы мы пожинаем плоды реформ, проводимых нашим правительством. Стремясь к снижению уровня коррупции и подотчетности, конечный результат этих реформ, несомненно, поможет Франции достичь поставленных целей по модернизации административных возможностей страны и успокоить правительственные органы, настаивающие на этих реформах."
 FRA_Reforming_Civil_Services_anti_corruption_idea: "Бастион Против Коррупции"
 FRA_Reforming_Civil_Services_anti_corruption_idea_desc: "Благодаря комплексной реорганизации государственной службы мы пожинаем плоды реформ, проводимых нашим правительством. Стремясь к снижению уровня коррупции и подотчетности, конечный результат этих реформ, несомненно, поможет Франции достичь поставленных целей по модернизации административных возможностей страны и успокоить правительственные органы, настаивающие на этих реформах."
 FRA_ENA_idea: "École nationale d'administration"
 FRA_ENA_idea_desc: "Основанная Шарлем де Голлем в 1945 году, ENA была призвана демократизировать доступ к высшей государственной службе Франции. Ежегодно ее заканчивают всего 80-90 студентов. Это престижное учебное заведение стало ключевым путем к высоким должностям в государственном и частном секторах, среди его выпускников четыре президента Франции, в том числе Эммануэль Макрон.\nОднако протесты "желтых жилетов" подчеркнули элитарность ENA, критикуя ее выпускников за продвижение узкой, центристской политики и поддержание социального раскола. Большинство выпускников ENA происходят из богатых семей, и только 6% - из рабочего класса.\n25 апреля 2019 года Макрон объявил о закрытии ENA, но поскольку Франция сталкивается с будущими экономическими проблемами, остается неясным, останется ли это решение в силе."

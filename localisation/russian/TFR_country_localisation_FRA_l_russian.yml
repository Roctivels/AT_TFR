 FAF_provincial_improvement_modifier: "Провинциальный Фокус"
 FAF_improve_gallarum_decision: "Перестроить §GGalliarum§!"
 FAF_improve_gallarum_decision_desc: "Хотя Galliarum, называемый большинством жителей Северной Францией, имеет то преимущество, что является нашим самым развитым регионом, его не обошли стороной ужасы гражданской войны. Уже подвергшийся русским бомбардировкам во время войны на востоке, Галлиарум был выведен из строя, пока либеральные и коммунистические стервятники грабили его на предмет всего, что у него было. Теперь, когда у нас есть необходимые ресурсы, мы должны начать восстановление всего региона. Без этого не только не хватит наших промышленных возможностей, чтобы объединить драгоценную Европу, но и будет гарантировано, что подрывные организации смогут молиться на борьбу нашего народа, чтобы радикально настроить его на восстание."
 FAF_improve_viennensis_decision: "Перестроить §OViennensis§!"
 FAF_improve_viennensis_decision_desc: "Регион, где Цезарь начал свою цивилизацию галлов, - Viennensis (более известная как Южная Франция) - долгое время испытывал трудности еще до того, как гражданская война разорвала нашу нацию на части. Не имея такого экономического развития, как на севере, эти регионы борются с бедностью и, таким образом, стали очагами для радикалов, которые хотят снова ввергнуть нашу нацию в хаос. Наш долг перед народом нашей любимой Франции - предпринять массовые усилия по возрождению, чтобы Вьененсис восстал, как феникс из пепла!"
 FAF_improve_hispanarium_decision: "Перестроить §YHispanarium§!"
 FAF_improve_hispanarium_decision_desc: "Наше воссоединение с братьями к югу от Пиренеев означает, что мы унаследовали ущерб от их второй гражданской войны. По сравнению с нашими братьями во Франции и Италии, мы должны понимать, что при восстановлении необходимо учитывать множество региональных особенностей на всей территории Испании и не повторять наших ошибок, допущенных в Пенинсульской войне. Хотя это может потребовать значительных усилий, мы не пожалеем их для любого собрата - потомка Рима!"
 FAF_improve_italiae_decision: "Перестроить §RItaliae§!"
 FAF_improve_italiae_decision_desc: "Когда-то это было бьющееся сердце Европы. Когда-то она была маяком надежды, принесшим золотой век прогресса, просвещения и процветания. Но с тех пор как в V веке пала Западная Римская империя, Италия так и не смогла вернуть себе то великолепие, которым она обладала в древности. Таким образом, именно нам предстоит перестроить полуостров, освободив его от провалов дряхлой либеральной демократии, чтобы он смог наконец восстановить те высоты, которые заставили бы покраснеть даже Августа. Говорят, Рим был построен не за один день, но если его слава все еще сияет вечно, то нашим усилиям будет уделено время и внимание, необходимые для продолжения этого наследия."
 FAF_Quadrilingual_Unification_dyanmic: "Язык Братьев"
 FAF_Quadrilingual_Unification_dyanmic_desc: "Пожалуй, самым большим позором в постримской истории Европы стал медленный и болезненный упадок латыни. То, что когда-то служило объединяющей силой для всей империи, теперь используется только католическим духовенством в качестве официального языка. Не помогает и то, что многовековое разделение после падения Рима привело к вырождению латыни в отдельные романские языки. В рамках наших усилий по объединению европейского континента мы должны предпринять трудную попытку вернуть латынь в качестве общепринятого лингва-франка. Хотя наши романские братья готовы взять на себя эти усилия, мы должны помнить, что, как и в Риме, массовое внедрение латыни не может быть сделано за один день."
 FAF_Quadrilingual_Unification_idea: "Язык Братьев"
 FAF_Language_of_the_State_decision: "Отмена Государственного Языка"
 FAF_Language_of_the_State_decision_desc: "Одним из главных препятствий для перехода на латынь является то, что у нас есть один государственный язык - французский. Хотя это может быть шоком для наших управленцев и политиков, отмена статуса французского языка и постановка его в один ряд с нашими признанными юридическими языками может стать хорошим стимулом для наших граждан, чтобы взять латынь на вооружение. Кроме того, это может помочь гарантировать, что когда Европа наконец объединится, наше знамя не будет выглядеть как еще один случай французского империализма."
 FAF_managerial_bilingualism_decision: "Управленческий Билингвизм"
 FAF_managerial_bilingualism_decision_desc: "Одним из главных обоснований возрождения латыни является концепция, согласно которой при объединении народов Европы она может выступать в качестве лингва-франка, который, несмотря на наши различия, сможет обеспечить бесперебойное управление. Исходя из этого, мы должны позаботиться о том, чтобы наши управленческие кадры, выполняющие бюрократические функции, как минимум владели двумя языками - родным и латинским. Кроме того, разве мы не лицемеры, если сами не используем язык наших легендарных римских предков?"
 FAF_the_failures_of_AH_decision: "Неудачи [AUS.GetFlag] Австро-Венгрии [HUN.GetFlag]"
 FAF_the_failures_of_AH_decision_desc: "Одной из главных проблем Австро-Венгерской империи было неправильное управление культурными меньшинствами, которые, оставаясь европейцами, подвергались культурному доминированию со стороны правивших ими австрийцев. Мы ни в коем случае не можем повторить этот пример в истории. Мы должны найти общие решения наших проблем и работать, как великий народ всей Франции, над целью, в которой мы сможем найти утешение."
 FAF_Academic_Latinization_decision: "Академическая Латинизация"
 FAF_Academic_Latinization_decision_desc: "Сколько бы мы ни заявляли, что наши люди "должны учить латынь на благо Европы" и что они выполнят свой патриотический долг, при нынешнем состоянии образования этот процесс будет затруднен. Помимо изучения языка, курсы, где латынь преподается должным образом, не являются обязательными, а учебные программы основаны на региональных языках, что не дает стимула для изучения языка на более высоком уровне. Хотя это потребует масштабного пересмотра академических программ, мы должны собрать наших лучших ученых-латинистов, чтобы помочь разработать новую учебную программу, которая обеспечит тщательное изучение латыни и ее использование нашим народом. Самое главное, что если молодежь - наше будущее, то такая система означает, что пройдет всего несколько десятилетий, и латынь снова станет обычным делом в Европе!"
 FAF_our_ancestral_battlefield_decision: "Поля Битв Наших Предков"
 FAF_our_ancestral_battlefield_decision_desc: ""
 FAF_the_roman_way_decision: "Римский Путь"
 FAF_the_roman_way_decision_desc: "Многие, отвечая на вопрос о Риме, скажут, что это была огромная и могущественная империя, но мало кто может точно определить, что именно сделало Рим великим. Любой некачественный народ может построить империю, но Рим отличала непоколебимая воля, закаленная в крови и грязи. Наша судьба, как наследников Рима, - восстановить то, что было потеряно, разрушено и забыто много веков назад. Римский орел снова будет парить над Европой, от Иберии до Италии, и его крики будут разноситься по европейским небесам."
 FAF_enforce_imperial_language_decree_decision: "Указ об Императорском Языке"
 FAF_enforce_imperial_language_decree_decision_desc: "Итальянский, испанский и французский - три разных языка, но все они имеют общие корни: Латынь. Мать всех этих языков, ныне почти забытая и покинутая своими собственными детьми. Без единого языка наш Рим стал бы подобен Вавилонской башне - пустое сооружение, подпитываемое хаосом и безумием. И вновь латынь станет языком цивилизованных людей, кровных братьев, римлян."
 FAF_demand_spanish_unification_decision: "Требовать [SNS.GetFlag] Испанского Объединения"
 FAF_demand_spanish_unification_decision_desc: "Если на мгновение представить, что прекрасные кустарники и пышные леса Иберии когда-то были частью нашей процветающей Римской империи, это, конечно, вызывает чувство гордости и радости. Однако все это кажется таким далеким, ушедшим в прошлое, которое умерло вместе с нашими предками. У нас и испанцев были различия на протяжении всей нашей общей истории, но кровь, которая течет в наших жилах, в конечном итоге связывает нас вместе. Мы должны были стать друзьями и братьями, а не врагами. Возможно, испанцы забыли об этом, но мы напомним им об этом."
 FAF_demand_italian_unification_decision: "Требовать [ITA.GetFlag] Итальянского Объединения"
 FAF_demand_italian_unification_decision_desc: "Семья неполна без всех ее членов, а для римской семьи Италия - незаменимая страна. В конце концов, где родилась сама концепция Рима? Без Италии наш Рим был бы неполным - просто еще одна пустая имитация, созданная шарлатанами и самозванцами. Рим без Рима - это как завтрак без кофе и сигареты, это совершенно неправильное ощущение. Вот почему мы должны заставить итальянцев увидеть наше видение. Мы должны..."

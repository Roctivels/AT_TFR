 FRA_Jupiter_Ascendent_Category: "Юпитер Взошел"
 FRA_Jupiter_Ascendent_Category_desc: "\n\n\n\n\n£GFX_FRA_jupiter_cat\n\n\n\n\n\n\n\nЭмманюэль Макрон снова ведет великую нацию Франции в ее самый тяжелый час - хватит бессмысленной бюрократической борьбы и хаотичных выборов. Мы покажем Европе и остальному миру свое превосходство и триумф, противостоя тем, кто изнутри и снаружи хочет уничтожить нашу нацию. Мы определим эту эпоху как эпоху нашего превосходства и восстановим нашу былую славу как одной из великих наций не только Европы, но и всего мира. \n\nПыль осела, политическая атмосфера Франции уже начала меняться, консервативная коалиция прекратила свое существование и осталась в прошлом, там, где ее оставил народ Франции. С принятием реформ, направленных на улучшение положения нашей нации, Франция вздохнула с облегчением, зная, что она в надежных руках. Наши великие вооруженные силы возвращаются на свои места, готовясь к завтрашним вызовам. Цель Макрона ясна: наша страна стремится к тому, чтобы стать лучшей из возможных, а также лучшей из возможных в Европе. \n\nНация Франции плывет к своей судьбе с Макроном у руля."

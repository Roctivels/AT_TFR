 FAF_heirs_of_charlamagne_cat: "Наследники Карла Великого"
 FAF_heirs_of_charlamagne_cat_desc: "\n\n\n\n\n£GFX_FAF_monarchism_cat\n\n\n\n\nНа протяжении тысячелетия династия Капетингов с честью и вежливостью правила землями Франции, определяя, что значит быть европейской державой, и защищая ее честь, когда вероломный Альбион или жалкие Габсбурги пытались стереть нашу нацию с Божьей Земли. Но снова и снова наш король, опираясь на божественное позволение Господа, защищал нашу нацию. Но в конце концов все изменилось.\nПомогая американским революционерам, их раковые идеалы республиканизма распространились во Франции, быстро свергнув нашу монархию в трудное для нас время. 200 лет спустя, стоя во весь рост после поражения от России, мы видим, к чему приводит мир, находящийся под властью "обычного человека"... Америка лежит в руинах, социалистическая чума охватила Восточную Европу, почти обрекая нашу любимую Францию на красную тиранию.\n\nМы будем бороться с дестабилизирующими силами, которые стремятся свергнуть нашего богоизбранного монарха. \n\nVIVE LA FRANCE! VIVE LE ROI LOUIS XX!"
 FAF_growing_republican_army_corps_mission: "Вечное Пламя"
 FAF_growing_republican_army_corps_mission_desc: "\n\n\n\n\n£GFX_FRA_french_spirit\n\n\n\n\n\n\n\nКак мрачное эхо нашего прошлого, в нашей Армии существует Республиканская клика. Они стремятся уничтожить не только короля, но и права церкви. 1793 год не должен повториться."
 FAF_royal_house_squabbles_mission: "Королевские Распри"
 FAF_royal_house_squabbles_mission_desc: "\n\n\n\n\n£GFX_FAF_royal_squabbles\n\n\n\n\n\n\n\nВопрос о том, кто имеет божественное право править Францией, не должен стоять, но он стоит, и пока мы не закрепим свое правление, нам придется иметь дело с детскими склоками, наносящими ущерб нашей способности управлять."
 FAF_nobility_cost_mission: "Цена Стабильности"
 FAF_nobility_cost_mission_desc: "\n\n\n\n\n£GFX_FAF_nobility\n\n\n\n\n\n\n\nДворянские междоусобицы угрожают нашему режиму, но дворяне - как и любая элита в любой стране, деньги делают их счастливыми, а счастливая элита - счастливая нация, называйте это жадностью, они - землевладельцы по древним и божественным правам, права, которые мы должны уважать, чтобы они уважали наши собственные."
 FAF_Grant_Refuge_to_HRM: "Семейное Прибежище"
 FAF_Grant_Refuge_to_HRM_desc: "\n\n\n\n\n£GFX_FAF_spanish_royalty\n\n\n\n\n\n\n\nНаша семья в Испании, законные правители Бурбоны нашего южного соседа, находится в осаде со стороны всевозможных противников, анархистов, сепаратистов, националистов, республиканцев. Было бы неправильно бросить их на растерзание гильотине, мы, Бурбоны, слишком часто сталкивались с этим ужасным приспособлением."
 FAF_use_wealthy_connections_decision: "Использовать Богатые Связи"
 FAF_use_wealthy_connections_decision_desc: "Наши связи с французской элитой дают нам уникальную возможность привлекать благосклонность, чтобы помочь нашим национальным проектам. Оказав услугу знатному человеку, мы можем на время расширить свое производство - выгодная сделка."
 FAF_pay_for_the_arts_decision: "Меценатская Деятельность"
 FAF_pay_for_the_arts_decision_desc: "\n\n\n\n\n£GFX_FAF_patronage_of_the_arts\n\n\n\n\n\n\n\nИскусство всегда является сердцем и душой нации, формируя культуру. Классический период и эпоха Возрождения считаются одними из золотых веков искусства, и, конечно, это связано с широкой поддержкой его развития со стороны монархий за рубежом. Пусть Франция снова станет центром великого искусства, пусть мы финансируем новые шедевры."
 FAF_beautify_the_countryside_decision: "Украсить Сельскую Местность"
 FAF_beautify_the_countryside_decision_desc: "Наша страна прекрасна! \nНаши дороги прекрасны! \nНаши города прекрасны! \nНаши небеса прекрасны!"
 FAF_man_of_god_decision: "Человек Божий"
 FAF_man_of_god_decision_desc: "\n\n\n\n\n£GFX_FAF_man_of_god\n\n\n\n\n\n\n\nКороль - благочестивый правитель, настолько же благочестивый, насколько прагматичный и благожелательный, руководствующийся в равной степени как Богом, так и благом народа. Он - человек, несовершенный, но вечно благодарный за прощение Бога, как и все."
 FAF_divine_right_to_rule_decision: "Божественное Право"
 FAF_divine_right_to_rule_decision_desc: "\n\n\n\n\n£GFX_FAF_divine_right_to_rule\n\n\n\n\n\n\n\nПосле долгих раздумий мы заняли первое место в сердцах и умах народа, и мобильность, дом Бурбонов, законных наследников дома Валуа, вновь поднимет знамя Священной Франции. Vive le Roi!"
 FAF_divine_right_tt: "§YЭто §!§Rуберёт угрозу противоборствующих династий§!"
 FAF_replace_possible_republicans_decision: "Начать Армейское Расследование"
 FAF_replace_possible_republicans_decision_desc: "\n\n\n\n\n£GFX_FAF_lecointre\n\n\n\n\n\n\n\nВ армии полно отщепенцев, атистов, республиканцев и социалистов, мы вырежем раковую опухоль в самом сердце, и со временем рана затянется сильнее."
 FAF_sway_the_nobility_decision: "Покорить Дворянство"
 FAF_sway_the_nobility_decision_desc: "Для дворянства недостаточно просто обладать божественным правом, для герцогов, графов и патрициев божественность - совсем другое дело, если орлеанисты и бонапартисты предлагают им лучшую сделку, вдруг они становятся божественными благодаря своей "благосклонности", что ж, мы должны быть столь же "благосклонны", если хотим обеспечить свое правление."
 FAF_ancien_regime_dynamic: "Ancien Régime"
 FAF_ancien_regime_dynamic_desc: "\n\n\n\n\n£GFX_FAF_ancien_regime\n\n\n\n\n\n\n\nМы правим по божественному праву, но при этом властвуем над миллионами душ, у каждого из которых есть свои желания и потребности. Современный Древний режим не повторит ошибок предыдущего, но точно так же государь будет оставаться неограниченным, подчиняясь только Богу, а благосостояние Франции полностью вверено божественной воле нашего государя. Vive le Roi!"

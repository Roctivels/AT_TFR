 FPR_France_shall_never_bow: "Франция Никогда Не Склонится"
 FPR_France_shall_never_bow_desc: "Перед лицом внешних захватчиков или внутренних угроз сила Франции никогда не ослабевала. Она стоит как крепость свободы и маяк сопротивления. Независимо от того, приближается ли враг с Востока или внутренние разногласия угрожают стране, сыновья и дочери Франции никогда не сдадутся. Сегодня под руководством Жан-Люка Меленшона и Нового народного фронта осуществляется великая миссия по возрождению духа Франции. От берегов Сены до холмов Прованса, подобно яростному пламени, поднимается народная сила, полная решимости заставить трепетать реакционеров и капиталистов. Революционеры никогда не сдаются, их дух закален в вечной славе!"
 FPR_Continuation_of_the_Republic: "Продолжение Существования Республики"
 FPR_Continuation_of_the_Republic_desc: "Французская Республика - это не просто оболочка, это священная крепость, выкованная кровью мучеников, бессмертный памятник, рожденный бурей Великой революции, и вечный символ, закаленный в огне Парижской коммуны. Она воплощает в себе благородные идеалы свободы, равенства и братства и является живым свидетельством несокрушимой воли французского народа. Сейчас, когда бушует гражданская война и затаились иностранные волки, мы не позволим этому священному наследию рухнуть под железным сапогом тирана или стать жертвой планов предателей. Новый народный фронт поднимется на великую борьбу в защиту Республики, никогда не отступая, какой бы яростной ни была буря."
 FPR_Parliamentarian_Socialism: "Парламентский Социализм"
 FPR_Parliamentarian_Socialism_desc: "Революция - это не званый ужин... Это насильственное действие, в результате которого один класс свергает другой.' Однако многие революции сбились с пути, слишком сосредоточившись на борьбе, оставив после себя лишь кровопролитие и хаос, не оставив долговременного наследия для дела освобождения народа. Настоящее социалистическое правительство должно формироваться под влиянием воли народа. От купола Национального конгресса до трибун местных советов мы посеем семена социализма и пожнем равенство через консенсус. Голоса рабочих и крестьян вознесутся к небесам, а их требования превратятся в нерушимые законы. Мы заставим реакционеров пошатнуться в своих речах, а буржуазию - трепетать перед народным судом."
 FPR_The_Modern_Girondists: "Современные Жирондисты"
 FPR_The_Modern_Girondists_desc: "Во время Французской революции жирондисты были выразителями умеренных перемен. Последователи Бриссо и сподвижники мадам Ролан, они отказались позволить идеалам революции быть поглощенными потоком насилия. В тени якобинского клинка и гильотины они подняли знамя разума и компромисса, стремясь рассеять кровавый туман светом просвещения. Хотя буря истории миновала, труба революции вновь звучит на современной французской земле. Как наследники жирондистов, мы будем использовать силу разума, чтобы вывести нацию из пучины насилия и направить ее к будущему, построенному на свободе, справедливости и порядке."
 FPR_Smiling_Socialism: "Социализм с Улыбкой"
 FPR_Smiling_Socialism_desc: "Социализм - это не холодный железный занавес и не страшные кандалы. Это искажения понятия "социализм" тоталитарными режимами, возникшими на руинах восточных феодальных империй. Напротив, социализм - это теплый весенний ветерок, свет надежды на рассвете. Мы отбросим тени насилия и осветим путь революции сиянием человечности. Наш социализм заменит гневные рыки улыбками единства, а цепи эксплуатации - духом взаимопомощи. Мы добьемся того, что каждый ребенок Франции будет ходить с достоинством и равенством. Справедливость в новом мире будет течь, как воды Сены, а счастье будет сиять, как солнце над Провансом."
 FPR_Save_Earth_through_Ecology: "Экологическая Революция"
 FPR_Save_Earth_through_Ecology_desc: "В видении Меленшона социалистического будущего Франции гармоничное сосуществование человека и природы играет центральную роль. Достойная и безопасная жизнь граждан была бы невозможна без эффективной экологической защиты - это все равно что вода без источника или дерево без корней. Идея объединения сохранения и преемственности стала одним из основных принципов Нового народного фронта. Удовлетворяя основные потребности населения в ресурсах, "зеленый" экономический цикл, основанный на устойчивом развитии, наполнит Францию новой жизненной силой. Экореволюция не будет изолированным проектом; это будут широкие, преобразующие усилия, которые объединят экономическую, технологическую и культурную сферы, чтобы изменить французское общество в целом."
 FPR_Father_of_the_Liberal_Revolution: "Отец Либеральной Революции"
 FPR_Decentralize_the_Military: "Децентрализовать Вооруженные Силы"
 FPR_Decentralize_the_Military_desc: "Военные - это микрокосм общества, но с еще более жесткой иерархией - консервативной, негибкой во внешних отношениях и испытывающей острую нехватку эффективной коммуникации и координации. Слишком часто ее воля и направление контролируются небольшой группой пожилых консервативных генералов, чьи реакционные наклонности превратили армию в "государство в государстве", сопротивляющееся призывам к реформам и прогрессу. Дело Дрейфуса - яркий тому пример. После прихода к власти Нового народного фронта военные остаются оплотом консерватизма, упорно сопротивляясь переменам. Пришло время Меленшону и его товарищам преодолеть это укоренившееся сопротивление. Чтобы противостоять противодействию сверху, солдаты и младшие офицеры будут поощряться к проявлению инициативы, продвижению военной демократии и созданию солдатских комитетов для противостояния консервативным клубам. Со временем новые французские военные покажут всему миру, как выглядит настоящая народная армия."
 FPR_Liberalize_the_Revolution: "Либерализовать Революционный Идеализм"
 FPR_Liberalize_the_Revolution_desc: "Эта земля всегда была колыбелью и маяком свободы. От пера мыслителей эпохи Просвещения до пламени Великой революции, озарившего улицы Парижа, здесь никогда не умолкал голос свободы. Он струится в отблесках Сены, отдается эхом в залах Лувра и выгравирован в сердцах каждого француза. Сегодня снова бушует революция, но мы не позволим ей погрузиться в хаос или превратиться в деспотические оковы. Руками свободы мы возьмем факел революции и высоко поднимем его, чтобы осветить путь к социализму."
 FPR_Democracy_in_the_Revolution: "Революционная Демократия"
 FPR_Democracy_in_the_Revolution_desc: "Демократия - это жизненная сила революции, бьющееся сердце народной власти. Истинная власть принадлежит не элите, а каждому гражданину Франции. Народ, как динамичная и прогрессивная сила, по своей природе несет революционные идеалы, двигая дело вверх по исторической лестнице к его неизбежной цели. Мы разрушим цепи старой аристократии и передадим власть в руки всего народа. Отныне народ не будет безмолвным зрителем, а станет хозяином своей судьбы. Демократическая революция пронесется по Франции как поток, уничтожая коррумпированные пережитки прошлого и возводя монумент, выкованный волей народа."
 FPR_Proud_Defenders_of_the_Revolution: "Гордые Защитники Революции"
 FPR_Proud_Defenders_of_the_Revolution_desc: "Революция - это корона, выкованная из нашей крови и пота, а мы - ее непреклонные защитники. Пока бушует гражданская война и угрожают иностранные враги, революционеры будут стоять как железная стена. С фронтов и улиц их боевые песни будут разноситься эхом по небу, а штыки сверкать холодным светом. Будь то старая версальская аристократия или скрывающиеся в тени капиталисты, все, кто посмеет бросить нам вызов, будут повержены в прах яростью народа. Мы будем охранять пламя свободы - оно будет гореть в Париже, распространяться по полям и станет вечным огнем."
 FPR_Operation_Terra: "§YOpération§!: Terra"
 FPR_Operation_Terra_desc: "Под великим руководством Жан-Люка Меленшона мы вступаем в новую фазу французской социалистической революции - один из ее основных столпов: создание по-настоящему гармоничного общества. Меленшон назвал этот план 'Операция: Терра', вдохновленный древним почитанием Матери-Земли. Это утопическое видение, в котором процветание, счастье, душевный мир и единство будут доступны каждому, больше не будет оставаться фантазией из старых манускриптов. Оно станет реальностью благодаря значительным национальным инвестициям, развитию местной инфраструктуры и объединению усилий социальных групп и правительства, работающих вместе в рамках широких организаций сотрудничества. Объединив нашу коллективную мудрость и усилия, мы в течение одного поколения осуществим мечту о социальном равенстве, которая долгое время оставалась недостижимой. Мы посеем семена самого прекрасного идеализма на Земле."
 FPR_Cult_of_Melenchon: "Культ Меланшона"
 FPR_Cult_of_Melenchon_desc: "Жан-Люк Меленшон - не просто путеводная звезда Франции; он - воплощение радикального республиканизма и неизменный маяк в сердцах людей. Его слова звучат как военные барабаны, призывая каждого гражданина присоединиться к революционному подъему. Его идеи распространяются как лесной пожар, зажигая надежду по всей Франции и Европе. Мы посвящаем себя этому революционному делу и клянемся построить нацию, достойную мечты Меленшона. Пусть его свет освещает наш путь, ведя Францию к вершинам равенства и славы, и пусть пламя революции никогда не угасает. Как корабль зависит от капитана, так и наша революция зависит от лидерства Меленшона!"
 
 #Белые розы... Эххх бляяя.... мдааа... пупупупу
 FPR_The_Soft_Revolution: "Власть Роз"
 FPR_The_Soft_Revolution_tt: "§YЭто разблокирует решения для§! §pдостижения утопии§!"
 france.9002.t: "Пункт Назначения Utopie"
 france.9002.d: "Для того чтобы Дененкс и его правительству удалось построить утопию во Франции, необходимо решить две задачи.\n\nВо-первых, необходимо реформировать правительство и, в частности, законы [ROOT.GetNameDef]. Хотя правительство в основном поддерживает эти реформы, потребуется значительный политический капитал, чтобы провести их быстрыми темпами. Если мы хотим выйти из этой ситуации, сохранив как можно больше политической силы, нам следует воспользоваться различными идеями, которые есть у Дененкса.\n\nВо-вторых, что более важно, мы должны достичь состояния развития, соответствующего утопии. Реформа законодательства поможет в достижении этой цели, но есть и ряд других способов.\n\nВ общем, утопия может быть достигнута просто путем внедрения идеальных законов и достижения высокого уровня развития."
 france.9002.a: "Allons-y!"
 FPR_The_Soft_Revolution_desc: "Дидье Дененкс успешно захватил власть в нашем государстве, и со своим приходом к руководству он обещает мирное будущее для всех французов. Существует иллюзия, что социализм может быть достигнут только насильственным путем, но мы знаем, что это не так. Дененкс мирно принесет кусочек утопии во Францию и покажет всему миру, какие плоды могут принести позитивность и пассивность."
 FPR_Artistic_Revolution: "Художественная Революция"
 FPR_Artistic_Revolution_desc: "В современном мире войн и раздоров красота встречается все реже и реже. Тем не менее, она все еще есть, и есть люди, которые умеют ее находить. С тех пор как мы захватили французское правительство, искусство по всей стране расцвело, и кажется, что наша нация вступает в новый ренессанс."
 FPR_Technosocialism: "Техносоциализм"
 FPR_Technosocialism_desc: "С наступлением современной эпохи традиционный социализм больше не работает. Все меньше людей работают на заводах и в полях, их место занимают роботы и машины. Зачем заставлять наших людей продолжать заниматься ненужным изнурительным трудом? Мы поможем полностью вывести людей из этих отраслей и перевести их на работу, где они смогут жить лучше."
 FPR_Cultural_Revolution: "Культурная Революция"
 FPR_Cultural_Revolution_desc: "На протяжении многих лет французская культура строилась вокруг существования буржуа. По мере того как мы усердно работаем над мирным свертыванием капитализма и устранением буржуа, наша культура также должна меняться. Мы наблюдаем зарождение культурной революции, в основе которой лежат интересы простых людей, а не богачей."
 FPR_Peace_Bread_and_Equality: "Мир, Хлеб и Равенство"
 FPR_Peace_Bread_and_Equality_desc: "Утопия - это не какая-то труднодостижимая вещь, и она гораздо проще, чем некоторые люди могут заставить вас поверить. Еда в животе, дружелюбные соседи и система, в которой к вам относятся как ко всем остальным. Утопия - это просто. Мы должны стремиться к достижению этих целей, народ Франции заслуживает этого."
 FPR_Embrace_Passivity: "Принять Пассивность"
 FPR_Embrace_Passivity_desc: "Война никогда ничего не приносила обычным людям. Она позволяет богатым набивать карманы, а бедным терять своих близких. С этого момента Франция больше не будет страной, известной своей военной мощью или националистическими тенденциями, мы будем известны как мирная и процветающая нация!"
 FPR_embrace_passivity_idea: "Passivité Militaire"
 FPR_Artisinal_Politics: "Кустарная Политика"
 FPR_Artisinal_Politics_desc: "Есть старая поговорка: "Зачем становиться моряком, если можно стать политиком - они в принципе одинаковы." Эта поговорка верна и по сей день: политика - это кровавый бардак. Она уродлива, но не обязана быть такой. Как и большинство других вещей, правительство - это искусство в своей основе, и мы будем работать над тем, чтобы оно было таким же прекрасным, как живопись и поэзия."
 FPR_The_Revolutionary_Artist: "Революционизировать Французские СМИ"
 FPR_The_Revolutionary_Artist_desc: "Средства массовой информации - это коррумпированная система, используемая врагами народа для его оболванивания. Хотя соблазн использовать контролируемые государством СМИ для манипулирования людьми существует, мы не поддадимся ему. Мы будем следить за тем, чтобы СМИ говорили только настоящую правду, а не ту "правду", которую некоторые люди хотят, чтобы услышала общественность."
 FPR_The_Poet_of_the_Revolution: "Поэт Революции"
 FPR_The_Poet_of_the_Revolution_desc: "Вместе глас народа обычно заглушается. Когда они работают как единое целое, можно добиться удивительных вещей, но их вражда не знает границ. Им не нужен лидер, но им нужен голос. Дененкс станет этим голосом, он будет встречаться с народом, выслушивать все его заботы и добиваться устранения их недугов. Это меньшее, чего они заслуживают."
 FPR_poet_of_the_revolution: "Поэт Революции"
 FPR_Vanguard_of_Peace_and_Porsperity: "Авангард Мира и Процветания"
 FPR_Vanguard_of_Peace_and_Porsperity_desc: "С тех пор как мы захватили Францию, в стране воцарилось приятное спокойствие. Преступность снизилась, уровень жизни повысился, и люди довольны своей жизнью. Однако есть и те, кто хочет отнять у нас наш маленький кусочек рая, поэтому мы должны сохранять бдительность и стоять во весь рост среди моря врагов."
 FPR_Vanguard_of_Peace_and_Porsperity_tt1: "Шанс, зависит на нынешней популярности [ROOT.GetRulingPartyLong]"
 FPR_Vanguard_of_Peace_and_Porsperity_tt2: "Шанс, зависит на текущей популярности самой популярной не правящей партии"
 FPR_The_Art_of_Politics: "Искусство Политики"
 FPR_The_Art_of_Politics_desc: "Работать вместе, препираться, заключать тайные и публичные сделки - все это вы найдете в политике. Мы должны быть осторожны, чтобы не сильно нарушить существующий правительственный аппарат, чтобы не разгневать общественность. Поэтому мы должны танцевать под его дудку, но при этом контролировать песню, играющую из музыкального автомата."
 FPR_The_Art_of_Politics_idea: "Политические Танцы"
 FPR_The_Art_of_Politics_idea_tt: "£political_advisor_cost_texticon Стоимость члена правительства: §G-10%§!\n£economy_laws_cost_texticon Экономические законы Стоимость: §G-10%§!\n£conscription_laws_cost_texticon Военные законы Стоимость: §G-10%§!\n£economy_laws_cost_texticon Стоимость Социальных Законов: §G-10%§!"
 FPR_Peace_through_Defense: "Обеспечить Тысячелетний Мир"
 FPR_Peace_through_Defense_desc: "Наши враги, как бы мы ни хотели отбросить наши обиды на них, не имеют таких же желаний. Наш мир находится в осаде со всех сторон, поэтому, как бы лицемерно это ни звучало, мы должны уметь его защищать. Если все сложится в нашу пользу, народу Франции больше никогда не придется переживать войну. Если же нет, то, возможно, им придется пережить еще одну."
 
 FPR_utopia_category: "Пункт Назначения §pUtopie§!"
 FPR_utopia_category_desc: "Дидье Дененкс обещал французскому народу построить утопию, основанную на принципах социализма, и он намерен сдержать это обещание.\n\nДля достижения цели мы должны §Yреформировать наши законы§! и §Yулучшить развитие§! Хотя это может занять много лет тяжелой работы, когда мы в конце концов выполним нашу задачу, мы сможем заявить людям всего мира:\n\n§GУтопия существует, ее зовут Франция, и она социалистическая§!"
 TFR_utopia_scripted_gui_desc_two: "§VПрогресс Утопии§!"

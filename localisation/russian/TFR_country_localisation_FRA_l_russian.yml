 FPR_soviet_france_category: "Политбюро Французского Совета"
 FPR_soviet_france_category_desc: "\n\n\n\n\n£GFX_FPR_soviet_france_cat\n\n\n\n\n\n\n\nПремьер Казанова является направляющей рукой нашей революции. Пролетариат направляется человеком, стоящим у руля, силой, стоящей за марксистско-ленинским движением. Отталкиваясь от великого Сталина, человека, спасшего СССР в Великую Отечественную войну, мы не можем предъявить ему никаких обвинений."
 FPR_Arise_Sons_of_Marianne: "Восстаньте, Сыновья Марианны"
 FPR_Arise_Sons_of_Marianne_desc: "Когда тиран Востока высокомерно ступает на залитый кровью трон, топча тела бесчисленных невинных людей, мы, потомки Марианны, борцы за свободу и защитники народа, не должны оставаться в стороне. Мы не можем допустить, чтобы драгоценная цивилизация Европы была осквернена и заброшена. Сегодня мы свергли слабое и некомпетентное псевдоправительство и создали настоящее социалистическое правительство пролетариата, движимое волей и действием. Красная революционная гвардия, сердце классовой борьбы Франции и авангард народа, вновь обращается ко всем соотечественникам и товарищам: Граждане, вооружайтесь! На этот раз Федеративная Французская Социалистическая Республика не подведет народы Европы."
 FPR_Dissolve_the_National_Congress: "Распустить Национальный Конгресс"
 FPR_Dissolve_the_National_Congress_desc: "Псевдорежим старой эпохи рухнул с грохотом, а некогда могущественные боги "горы Олимп" превратились в хрупкие, бледные гипсовые статуи, каждая из которых ждет своего неизбежного падения, когда народ снесет их. Однако среди всего этого размаха действий один ядовитый алтарь упрямо продолжает стоять - Французский национальный конгресс. Буржуазные реакционеры, решившие противостоять воле народа и изолировать себя от французской нации, цепляются за это учреждение, прикрытое святостью буржуазных юридических прав, как за свое последнее убежище. Но мы не позволим им так легко уйти. Революционная гвардия получила приказ войти в Конгресс, арестовать реакционных депутатов и полностью ликвидировать это устаревшее учреждение, которое стоит только на пути революции. Отныне никакая ревизионистская риторика больше не будет препятствовать революционному пути."
 FPR_Purge_the_Daeninckx_Bloc: "Создать Бюро Национальной Безопасности"
 FPR_Purge_the_Daeninckx_Bloc_desc: "В первые дни революционной победы всегда не хватает ресурсов - богатства, стабильности и инфраструктуры. Но в чем мы никогда не будем испытывать недостатка, так это во врагах революции. Мы будем без колебаний предполагать худшие намерения тех, кто стремится навредить справедливому делу французского народа. Для борьбы с ними будет создано независимое учреждение - Бюро национальной безопасности Федеративной Французской Социалистической Республики. Генерал Казанова и его товарищи твердо убеждены, что со временем Бюро национальной безопасности станет мощной революционной силой, подобной 'ЧК', вселяющей страх в сердца буржуазных реакционеров. Оно будет служить одновременно мечом и щитом Французской революции, защищая наше дело и одновременно выполняя важнейшую задачу по распространению революции и пробуждению народов мира. Дорога к миру и счастью будет проложена 'революционным террором.'"
 FPR_Cult_of_the_Red_General: "Маршал Революции"
 FPR_Cult_of_the_Red_General_desc: "В критический момент Николя Казанова сплотил революционную гвардию для свержения диверсантов и реакционеров, возрождая революционный дух французского народа. Его действия и идеи оставили неизгладимый след как в истории, так и в национальном характере современной Франции. Сегодня статус и престиж Казановы, как олицетворения революции и спасителя нации, достигли небывалых высот. Повсеместное восхищение и почитание маршала по всей Франции превратилось в грандиозное зрелище. Под его руководством единство и сила Революционной гвардии поражают как союзников, так и противников. У нас есть все основания полагать, что пока маршал Казанова остается у власти, любые заговорщики будут подавлены, а социалистическая революция во Франции будет плавно развиваться по предначертанному курсу, и окончательная победа в будущих сражениях гарантирована."
 FPR_Foundation_of_the_FFSR: "Перенять Советскую Иконографию"
 FPR_Foundation_of_the_FFSR_desc: "В свое время Владимир Ленин указывал, что авангардом революции станет наиболее классово сознательная и политически развитая часть рабочего класса. Эти люди всегда находятся в авангарде, направляют массы в революционной борьбе, поддерживают строгую дисциплину и устанавливают пролетарскую диктатуру через однопартийную систему. В свою очередь, эти "элитные элементы" революции получают заслуженное уважение и восхищение, а также награды и признание за свой выдающийся вклад. Во Франции Революционная гвардия, несомненно, служит этой системе, обеспечивая прочную основу для подготовки новых революционеров. Во главе с генералом Николя Казановой мы будем способствовать прославлению и поклонению коллективу революционных лидеров, чтобы теснее сплотить французский народ вокруг ядра революционного дела."
 FPR_Enact_Five_Year_Plan: "Принять Пятилетний План"
 FPR_Enact_Five_Year_Plan_desc: "Быстрое и централизованное развитие промышленности позволит в кратчайшие сроки значительно укрепить промышленную и военную мощь Франции. Это позволит обратить вспять деиндустриализацию, вызванную буржуазными правительствами прошлого, и создать надежный отпор вызовам восточного тирана. Для этого нам необходим центральный орган власти, обладающий полномочиями издавать директивы и жестким экономическим графиком. Поэтому в Красной Франции будет введена "пятилетка" - отличительная черта социалистической системы. Внедрение плановой экономики не только укрепит экономический фундамент нашего социалистического режима, но и сплотит наших граждан и произведет революцию во всех сферах общества и жизни."
 FPR_Reinvigorate_the_Workforce: "Стимулирование Рабочей Силы"
 FPR_Reinvigorate_the_Workforce_desc: "В прошлом глобальное восприятие французских рабочих формировалось стереотипами "ленивых" и "трудноуправляемых." Однако в Федеративной Французской Социалистической Республике все это кардинально изменилось. Благодаря более справедливому распределению богатства, контролируемому Революционной гвардией, большинство французских граждан теперь пользуются благами экономического развития. Это резко контрастирует с прошлым, когда крупные корпорации монополизировали прибыль, оставляя простых рабочих в безнадежной ситуации с небольшими возможностями для улучшения. Сегодня французские рабочие и профсоюзы стали опорой нации, воплотив в себе беспрецедентную в истории Франции целеустремленность и решительность. Более того, они сохраняют свое разнообразие и инклюзивность, представляя лучшие стороны общества и постоянно привнося свежие силы в социалистическое дело. Подобно Renault, уверенно несущемуся по шоссе, Франция устремляется в будущее."
 FPR_Embrace_our_Red_Brothers: "Принять Наших Красных Братьев"
 FPR_Embrace_our_Red_Brothers_desc: "Будучи первым в мире социалистическим режимом, СССР вынужден был терпеть враждебность со стороны других капиталистических держав и идти по пути самостоятельного развития. К счастью для Федеративной Французской Социалистической Республики, мы не одиноки. Во всех странах, где когда-то господствовал капиталистический ЕС, разгораются искры социализма. В некоторых местах из этих искр уже разгорелось пламя народной революции и классовой борьбы. Революционная гвардия будет наносить удары, оказывая непоколебимую поддержку и солидарность другим социалистическим странам по всей Европе. Кровь реакционеров будет питать рост дерева социалистического единства на всем континенте. На горизонте встает новое красное европейское будущее."
 FPR_embrace_red_brothers_tt: "За каждую нацию, входящую в нашу фракцию, вы получите 1 гражданскую фабрику и 25 политической силы \n[GER.GetFlag] Германия \n[ITA.GetFlag] Италия \n[RSR.GetFlag] Испания \n[LUX.GetFlag] Союз Нижних Земель \n[PRP.GetFlag] Португалия \n[UK2.GetFlag] Англия \n[DEN.GetFlag] Дания \n[NOR.GetFlag] Норвегия \n[SWE.GetFlag] Швеция \n[FIN.GetFlag] Финляндия \n[GRK.GetFlag] Греция"
 FPR_Franco_German_Treaty_of_Friendship_Alliance_and_Mutual_Assistance: "Франко-Германский Договор о Дружбе"
 FPR_Franco_German_Treaty_of_Friendship_Alliance_and_Mutual_Assistance_desc: "Отношения между Францией и Германией, сформировавшиеся в результате многовекового соперничества, уже давно являются ключевой темой как для политиков, так и для граждан. Последняя попытка примирения между двумя странами привела к созданию Европейского союза - знаковой организации, которая коренным образом изменила геополитический ландшафт Европы. Если перенестись в настоящее время, то в условиях беспрецедентной угрозы, надвигающейся с Востока, лидеры обеих стран должны найти общий язык. Им необходимо укрепить свой союз на хрупком фундаменте ЕС, сделав франко-германское партнерство краеугольным камнем европейского сотрудничества в новую эпоху. Наследники Жана Жореса и Карла Маркса будут неустанно работать над построением светлого будущего Европы."
 FPR_will_raise_fg_brigades_tt: "Создаст одну §GОпытную§! Франко-германскую бригаду в §PАльзасу§!"
 FPR_Embrace_Mass_Production: "Промышленная Гордость"
 FPR_Embrace_Mass_Production_desc: "Благодаря неустанным реформам и неустанным усилиям миллионов людей социалистическое экономическое развитие достигло небывалых высот, которые раньше не могли себе представить ни теоретики, ни революционеры. Остатки капиталистических элементов экономики были искоренены, а и без того передовая государственная промышленность Франции была возрождена под руководством народного правительства, стала еще сильнее и стала краеугольным камнем экономической системы. Более того, промышленная цепочка, некогда глубоко встроенная в неолиберальную глобальную экономику, теперь является неотъемлемой частью экономического суверенитета Федеративной Французской Социалистической Республики. Народная экономика питает жизненную силу и креативность французского общества, стимулируя научные прорывы и интеллектуальный прогресс. Укрепленный экономический фундамент также является прочной основой для повышения военного потенциала Франции. У французского народа есть все основания гордиться этими выдающимися достижениями, и маршал Казанова испытывает огромное удовлетворение от того, что мечта Франции теперь в пределах досягаемости."
 FPR_The_New_French_Man: "Новый Гражданин"
 FPR_The_New_French_Man_desc: "Как новая социальная структура будет способствовать прогрессу человеческой цивилизации? Ответ прост: новое поколение граждан, выросшее в социалистическом государстве, будет развивать совершенно иные черты мышления и действия по сравнению с тем, что было в старом обществе. Под руководством маршала Казановы и Революционной гвардии это видение становится реальностью во Франции. Современная французская молодежь более прогрессивна, более чиста, более страстна и более патриотична, чем ее предшественники. Они посвящают себя работе и производству в различных областях. Декаданс и страх перед концом человеческой истории, насаждаемые поздней капиталистической системой, стали пережитками прошлого. Будучи пионерами европейской цивилизации, Франция теперь распространяет новую, трансцендентную идеологию во все уголки мира. Со временем, когда эти новые граждане станут основой общества, Франция, опирающаяся на свою идеологию, будет способна победить любого врага."
 FPR_Topple_the_Fascist_Menace: "Покончить с Фашизмом"
 FPR_Topple_the_Fascist_Menace_desc: "'Месть - блюдо, которое лучше подавать холодным.' Во внешней политике мы терпеливо ждали, когда Франция и ее европейские союзники восстановят свою оптимальную силу, что позволит им превзойти по темпам роста своего главного врага - 'Империю зла' на Востоке. Сегодня эта некогда казавшаяся недостижимой цель неожиданно достигнута. Ранее раздробленная Европа стала единой и сильной, а на смену угасающей демократии пришла система, которая лучше отражает волю народа. В этих значительных преобразованиях нельзя не отметить ведущую роль, которую сыграли маршал Казанова и Революционная гвардия, а также Франция под их руководством. Мы полностью уверены в себе и хорошо подготовлены как в материальном, так и в духовном плане. Настало время решительных действий: народная армия двинется на восток, уничтожит оплот тирана и освободит наших соотечественников, страдающих в тяжелейших условиях Европы. На этот раз победа, несомненно, будет за нами!"
 FPR_left_opposition_dyn_mod: "Блок Арто"
 FPR_left_opposition_dyn_mod_desc: "Блок Арто, названный маршалом Казановой "Левой оппозицией", - это остатки некогда процветавшего троцкистского движения во Франции."
 FPR_right_opposition_dyn_mod: "Блок Дененкса"
 FPR_right_opposition_dyn_mod_desc: "Блок Дененкса, названный маршалом Казановой "правой оппозицией", представляет собой остатки широко социалистических групп, существовавших до и во время Гражданской войны.."

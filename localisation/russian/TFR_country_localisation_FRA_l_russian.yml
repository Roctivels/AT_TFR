 FRA_regionalist_struggle_idea: "Регионалистская Борьба"
 FRA_regionalist_struggle_idea_desc: "По мере того как Франция пытается в очередной раз перестроить свою идентичность, по всей стране бушует регионализм. \n\nНесмотря на то, что во время Французской революции многие региональные идентичности были практически стерты с лица земли, они выжили, но лишь с трудом. С тех пор они изо всех сил пытались сохранить свои культурные традиции и язык, но с созданием более широкого европейского сознания и последующим отбрасыванием всего, что делает Францию французской, у регионалистов появилась последняя возможность вырезать свою самобытную культуру, прежде чем она исчезнет в книгах по истории."


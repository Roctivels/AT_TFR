 FRA_Military_Retirement_category: "Великая Игра"
 FRA_Military_Retirement_category_desc: "\n\n\n\n\n£GFX_FRA_Military_Loyalty_category\n\n\n\n\n\n\n\nФранцузские вооруженные силы - это непокорная организация, которая на протяжении десятилетий пыталась вмешиваться в наши политические дела. Тем не менее они являются защитниками нашей нации и будут обеспечивать наше процветание и могущество на протяжении последующих лет. Пока мы переживаем этот период политической неопределенности, чтобы обеспечить успех нашей администрации, мы должны периодически работать вместе с военными и уступать их просьбам и требованиям. Их лояльность - это обязательное условие, и мы должны тщательно сотрудничать с нашими вооруженными силами, чтобы обеспечить величие Франции.\n\nВ настоящее время у нас: \n§G[?happy_generals]§! Генералы, которые довольны режимом.\n§O[?neutral_generals]§! Генералы, которых режим не беспокоит. \n§R[?angered_generals]§! Генералы, недовольные режимом. \n§C[?retired_generals]§! Генерал(ы), которые в настоящее время находятся во временном отпуске."

 FAF_National_Rebirth: "Национальное Возрождение"
 FAF_National_Rebirth_desc: "Франция должна пробудиться к славному возрождению единства и силы. Благодаря смелому и мощному культурному обновлению наш режим должен вернуть народу его законную гордость и поставить нашу страну на путь величия."

 OCT_french_peoples_liberation_front: "Народный Фронт Освобождения Франции"

 FAF_pride_of_france_cat: "Гордость Франции"
 FAF_pride_of_france_cat_desc: "\n\n\n\n\n£GFX_FAF_pride_of_france_cat\n\n\n\n\n\n\n\nВозрождение французского государства и традиционализма происходит здесь и сейчас. Режим Виши возвращен нам, бастион консерватизма снова занимает свое место в Европе как спаситель от бедственного положения либерализма.\n\nХотя государство хрупко и страдает от междоусобиц между генералами, желающими стать великим маршалом Франции, само по себе оно прекрасно. Для его поддержания должно быть предоставлено все, что угодно."
 FAF_pride_of_france_dynamic: "Французский Милитаризм"
 FAF_pride_of_france_dynamic_desc: "Люди всегда хвалят немцев за их военную доблесть и славу на протяжении всей истории, но когда речь заходит о Франции, они вспоминают только полководцев и стратегических мыслителей, стоявших за войной, а не тех, кто сражался на земле. Армия Франции всегда была самой сильной в Европе. Слабой она казалась только потому, что львами руководили ослы. Сегодня даже французский народ забыл важную часть своей культуры - свои военные традиции и воинское мастерство. Мы должны привить патриотизм в сердца наших народов, напомнить им о важности военной службы и военной силы."

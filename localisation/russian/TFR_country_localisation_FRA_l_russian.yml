 Capital_of_the_EU: "Столица Европы"
 Capital_of_the_EU_desc: "Брюссель - это больше, чем просто город; это административное сердце европейского проекта. В его офисах, залах заседаний и анонимных стеклянных зданиях ежедневно разрабатываются нормативные акты, достигаются компромиссы и решаются кризисные ситуации. Десятки тысяч государственных служащих, дипломатов, лоббистов и советников проходят по его улицам, превращая местное самоуправление в проблему континентального масштаба. Решения, принимаемые здесь, распространяются по рынкам, границам и учреждениям, часто задолго до того, как общественность узнает о них. Такая концентрация политического веса приносит влияние и ресурсы, но также и пристальное внимание, инерцию и давление. Брюссель должен балансировать между своей ролью принимающего города и функцией нервного центра Европы, где стабильность, координация и преемственность ценятся выше скорости и зрелищности."
 

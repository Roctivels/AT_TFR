 Nationalist_France.45.t: "Пропажа "Лафайета""
 Nationalist_France.45.d: "Храбро сражаясь при защите своей столицы, наш славный лидер "Лафайет" пропал без вести со своего командного пункта в результате спланированной засады российского командования, размещенного рядом с обломками Эйфелевой башни. Шлем Лафайета был найден спрятанным в сгоревшей машине перед тем, как было объявлено о всеобщем отступлении, и хотя с места засады было найдено несколько тел, нет никаких указаний на то, кто является нашим Великим командиром, а кто нет.\n\nНе имея тела, подтверждающего его смерть, его адъютант генерал Никола Перович объявил с импровизированной сцены где-то за пределами парижского пригорода, что до тех пор, пока командующий не будет найден, он будет править вместо него, и на одном дыхании призвал к самоубийственной и тотальной атаке на Россию. линии, чтобы отомстить за пропавшего командира."
 Nationalist_France.45.a: "Он продолжает сражаться внутри каждого солдата"
 france.451.t: "Молодёжь Массово Вступает к Якобинцам"
 france.451.d: "Отмотайте назад более двухсот лет, в те времена, когда монархия Бурбонов была на грани краха. Именно на теннисных кортах были посеяны семена Французской революции. Сегодня похожая сцена вновь разворачивается на улицах Парижа. Однако на этот раз колыбелью революции стала прачечная на первом этаже коммунальной квартиры.\n\n Дюжина складных стульев расставлена в свободном кругу, присутствующие сидят непринужденно, но их взгляды прикованы к хозяину, стоящему в центре комнаты. "Я рад видеть, что почти все здесь." начинает он, доставая из правого нагрудного кармана небольшой красный буклет. На обложке золотым тиснением выбито сочетание серпа и молота с лотарингским крестом. "Полагаю, вы все читали этот буклет. В нем четко и ясно изложена революционная программа нашей партии..."\n\n"Не поймите меня неправильно, но у вашей 'революции' есть серьезные проблемы," прерывает его хриплый голос. Все взгляды обращаются к пожилому мужчине в плоской кепке. Его нахмуренные брови и шрам на лбу говорят о том, что его жизнь была полна борьбы. "Вы выступаете за сотрудничество с духовенством, авторитарное правительство, массовую слежку и даже военную диктатуру! Это не та революция, которую я знаю!" Его страстные слова, кажется, вызывают в памяти его образ в 1968 году, когда он вел студентов под антиголльские песнопения, расклеивая плакаты Мао на дверях мэрии.\n\nГрубый свист нарушает неловкую тишину. Длинноволосый мальчик, засунув руки в карманы, насмехается: "Старик, твоя революция устарела! Некоторые из твоих товарищей теперь сами виноваты в том, что испортили страну! Нам не нужно, чтобы они учили нас, что делать."\n\nВслед за этим молодая блондинка в ожерелье из крестов горячо говорит: "Только усилив нашу военную готовность и создав пролетарскую армию, мы сможем противостоять русской диктатуре! Дело не только в армии - без веры кто сможет объединить страну?..."\n\n Молодые люди горячо возражали старику, и продолжали это делать до тех пор, пока он не перестал терпеть, гневно вырываясь. Когда старик вышел из прачечной и дверь начала закрываться за ним, ведущий говорит ясным голосом, чтобы все слышали"
 france.451.a: "Я очень рад, товарищи. Революции нужна молодая кровь, которую вы приносите..."
 france.1.t:0 "Террор охватывает Ниццу"
 france.1.d:0 "Сегодня в 8:30 утра в здании собора Парижской Богоматери в Ницце Брахим Ауиссауи обезглавил пожилого мужчину и зарезал еще троих.\nВ течение 28 минут он несколько раз выкрикивал "Аллах Акбар", прежде чем был застрелен перед церковью отрядами спецназа.\n\nОтветственность за это нападение взяли на себя многочисленные ближневосточные террористические ячейки, и оно было связано с растущей напряженностью, которая началась с нападений на Чарли Хедбо в 2015 году."
 france.1.a:0 "И все это из-за мультфильма?"
 france.2.t:0 "Ле Пен объявляет о кандидатстве на президенство в 2022 году"
 france.2.d:0 "Марин Ле Пен, лидер французской партии "Национальное объединение", объявила в воскресенье о выдвижении своей кандидатуры на президентских выборах 2022 года. Это ее третья заявка на пост президента после поражения Эммануэлю Макрону в 2017 году. Предвыборная кампания Ле Пен будет сосредоточена на таких вопросах, как иммиграция, национальная безопасность и суверенитет, которые на протяжении многих лет были центральными в платформе ее партии. Ожидается, что она столкнется с жесткой конкуренцией со стороны других кандидатов, включая Макрона и потенциальных соперников от левых. Ле Пен завоевывает поддержку в последние годы, и ее заявление подготавливает почву для президентской гонки с высокой конкуренцией."
 france.2.a:0 "И ты снова потерпишь неудачу!"
 france.2.b:0 "Свергним правительство Макрона!"
 france.3.t:0 "Выборы 2022"
 france.3.d:0 "Сейчас, когда выборы во Франции в самом разгаре, политическая машина Франции работает на полную мощность. Страна сталкивается с многочисленными проблемами, включая проблемы в экономике, растущую волну национализма и растущую напряженность в отношениях со своими соседями.\nКогда французский народ отдал свои голоса, их мнения разделились по поводу того, кто должен руководить страной в эти неспокойные времена. Некоторые проголосовали за сильного лидера, который необходим для восстановления порядка и возрождения французской идентичности, в то время как другие решили отдать свой голос за более прогрессивного кандидата для решения социальных и экономических проблем страны. Конечно, статус-кво остается привлекательным вариантом для многих, поскольку они уверенно голосуют за нынешнюю правящую партию.\n\nПо мере того, как заканчивается период голосования, напряженность продолжает нарастать, и еще неизвестно, в каком направлении пойдет Франция в ближайшие годы, многие французы нервно наблюдают за опросами, поскольку медленно, но верно выявляется победитель.\nИ победителем является......"
 france.3.a:0 "Ле Пен одержала уверенную победу!"
 france.3.g:0 "Ле Пен проигрывает с небольшим отрывом..."
 france.3.h:0 "Макрон проигрывает с небольшим отрывом..."
 france.3.b:0 "Макрон выходит победителем"
 france.3.c:0 "Электронное голосование завершается сбоем, только бюллетени, написанные от руки."
 france.3.e:0 "Народный Фронт проскользнул!"
 france.3.f:0 "Вилье торжествует"
 france.4.t:0 "Земмур обвиняет Макрона в государственной измене"
 france.4.d:0 "В связи с тем, что на политической сцене Франции начинают появляться многие заметные кандидаты, претендующие на пост президента Пятой республики, появление ранее игнорируемых или иным образом "второстепенных" претендентов всегда было зрелищем в эпоху политиканства 21 века. Среди бурлящих политических движений, стремящихся свергнуть правящий истеблишмент Макрона и его Вперёд, Республика! на предстоящих выборах 2022 года, было бы далеко не точно утверждать, что Национальное объединение Ле Пен было единственным голосом правой оппозиции существующему правительству. Это было подтверждено недавно, когда скандальный телевизионный эксперт Эрик Земмур недавно выступил в публичном эфире со своей собственной язвительной тирадой в адрес руководства президента.\n\nСреди прочих неприятных вещей Земмур выступил против множества мер политики Макрона, принятых под его руководством, нацелившись на его политику в отношении проблемы иммиграции, обвинив Макрона в том, что он способствует "снижению национальной идентичности Франции" из-за своей готовности принимать вновь прибывших с Ближнего Востока и Северной Африки. Утверждая, что "само существование французской культуры, общества и французского народа в целом" находится под угрозой исчезновения из-за притока иностранной миграции, передача достигла переломного момента, когда Земмур осудил Макрона как виновного в совершении "государственной измены" против народа Франции, вызвав ажиотаж в социальных сетях и не только.\n\nПередача Земмура, который уже почти десять лет известен своими подстрекательскими заявлениями и противоречивой риторикой, в результате привлекла к нему большое внимание, и в последнее время его слова стали предметом жарких дебатов. Хотя многие левые и центристы Франции, естественно, негативно отреагировали на его слова, а некоторые призвали убрать его из эфира, все большее число правых, по-видимому, недовольных Ле Пен, начали восхвалять Земмура, и все чаще звучат призывы к эксперту бросить его шляпа на ринге для выдвижения на пост президента. Хотя Земмур по-прежнему более или менее находится вне поля зрения политиков, еще слишком рано предсказывать, останется ли все так и дальше."
 france.4.a:0 "Еще один псих правого толка"
 france.4.b:0 "Французский народ требует перемен!"
 france.5.t:0 "Слухи в армии"
 france.5.d:0 "Вооруженные силы Франции имеют долгую и легендарную историю. От великого освободителя Шарля Де Голля до знаменитого завоевателя и императора Наполеона Бонапарта многие ведущие фигуры в истории Франции вышли из вооруженных сил и их институтов, в результате чего положение вооруженных сил во французском национальном государстве многими рассматривается как ключевое, особенно внутри самих вооруженных сил. Хотя это привело к ряду политических проблем, которые сохраняются даже в наши дни, многие думали, что время военной мощи и влияния давно прошло, а их власть по праву контролируется избранным гражданским правительством и демократическим процессом.\n\nПо крайней мере, до сегодняшнего дня. На неделе, посвященной 60-й годовщине неудавшейся попытки государственного переворота, предпринятой французскими военными в Алжире, по всей Франции распространились новости о том, что "государственный переворот" находится на стадии планирования, как сообщается, из-за очевидной утечки информации в вооруженных силах. Письмо, подписанное более чем дюжиной генералов, как бывших, так и действующих в настоящее время, было обнаружено после того, как оно было загружено в Интернет, причем в самом письме содержатся различные заявления и претензии к нынешнему истеблишменту, начиная от критики очевидного отсутствия у правительства надлежащего финансирования и адекватного отношения к вооруженным силам в эпоха растущей глобальной турбулентности привела к более расплывчатым политическим представлениям о "верховенстве твердого закона и порядка" и важности "защиты Франции от смертельных опасностей, которые ей угрожают".\n\nХотя простого письма с резкими формулировками вряд ли является достаточным доказательством, чтобы утвердительно указать на реальную угрозу военного переворота против избранного правительства, слухи все же потрясли приличную часть правительства и общественность в целом, несмотря на отсутствие конкретных доказательств в их поддержку. Подписавшие письмо лица были тщательно изучены как государственными чиновниками, так и не подписавшими его членами командного состава в ответ, напомнив им о том, что позиция военных, как правило, находится вне сферы политики, и о важности строгого соблюдения этого разделения властей. На данный момент слухи о каких-то действиях, предпринимаемых вооруженными силами против правительства, являются всего лишь... слухами."
 france.5.a:0 "Иногда слухи, это просто слухи"
 france.6.t:0 "Французские генералы требуют уступок"
 france.6.d:0 "Этим утром французские солдаты в масках вывесили список требований на каждом крупном официальном здании в Париже. Этот список милитаристских уступок, включая такие вещи, как восстановление воинской повинности и исключение из состава НАТО, обещал жесткие политические действия против тех, кто отказывался от уступок, но также обещал, что французские военные не причинят вреда президенту Макрону, Ле Пену или любому другому политику. Это письмо было официально признано французским верховным командованием, когда поступили сообщения о том, что несколько батальонов французских солдат начали учения на стратегических позициях в Париже и его окрестностях.\n\nПрезидент Макрон, находясь в Париже, был выслан из Парижа после того, как ему сообщили список требований, в то время как Ле Пен сообщили об этих требованиях во время импровизированной встречи с солдатами за пределами Парижа."
 france.6.a:0 "Ле Пен обещает уступки после выборов"
 france.6.b:0 "Ле Пен отрицает уступки"
 france.6.c:0 "Макрон соглашается на уступки"
 france.6.e:0 "Макрон обещает уступки после выборов"
 france.6.f:0 "Макрон отрицает уступки"
 france.6.g:0 "Макрон говорит "нет"... Земмур говорит "да""
 france.7.t: ""Свободные" и "Справедливые" Выборы"
 france.7.d: "Выборы, как и во многих других демократических странах по всему миру, были довольно сложными мероприятиями, но все они сводились к одному: конкуренции. Кандидат или партия должны бороться за места во власти в государстве. Демократия звучала красиво во время выступлений и в учебниках, но часто приходилось немного запачкаться, если вы хотели убедиться, что у вас есть преимущество перед вашим оппонентом. Эрик Земмур полностью понимал все это и использовал все имеющиеся в его распоряжении политические инструменты, чтобы все это произошло, даже если ему пришлось провести небольшие... "переговоры" за кулисами.\nЗеммур продолжал размышлять обо всем этом, расхаживая взад-вперед по своему парижскому офису. Предстоящие выборы сводили его с ума от предвкушения, какого он никогда раньше не испытывал. Все во Франции знали, что это будет напряженная предвыборная гонка и что все соперничающие политики мобилизовали все свои связи и авторитет, чтобы остановить его. Однако, в отличие от них всех, он знал несколько вещей, которых не знали обычные избиратели и его соперники. Он был уверен, что все делает правильно, что разговаривает с нужными людьми, делает правильные шаги и говорит правильные вещи. Все должно сработать по плану. Люди не знали, сколько ему пришлось потрудиться, чтобы все сложилось так, как он хотел.\n\nОн отправил своих людей к бесчисленным машинам для голосования, чтобы убедиться, что они работают "правильно". Он попросил своих друзей во французских вооруженных силах "подтвердить", что выборы прошли так, как и предполагалось. Он бесчисленное количество раз обращался к избирателям и говорил им все, что они хотели услышать, независимо от того, сколько раз другие политики из истеблишмента кричали, что он "популист". Он сделал все, что мог; теперь пришло время посмотреть, окупились ли его усилия.\nТеперь, сидя у себя в кабинете перед телевизором с плоским экраном, Земмур включил первый крупный новостной канал, чтобы посмотреть результаты. Наконец-то настал его час. Когда его глаза быстро пробежали по бегущей строке канала и по тому, что говорили репортеры, он чуть не подпрыгнул от радости. Все, к чему он так старательно готовился, теперь приносило плоды. Текст, появившийся на экране, еще больше наполнил его удовлетворением, которого он давно не испытывал..."
 france.7.a: "ЗЕММУР ПОБЕДИЛ С ПЕРЕВЕСОМ В 1%"
 france.8.t:0 "Ле Пен уходит из политики"
 france.8.d:0 "После разочаровывающей явки на региональных выборах 2021 года многие задались вопросом, является ли Марин Ле Пен достойным главой правых популистов Франции. То ли из-за давления руководства, то ли из-за внутренних проблем в Национальном объединении, Ле Пен объявила о своем уходе из политики. Ссылаясь на желание поддержать растущее число американских беженцев, прибывающих в страну, она, тем не менее, распустила слухи о том, что инсайдеры партии предлагают ей уйти ради партии. Независимо от причины, уход Ле Пен оставляет вакуум власти в правых политических кругах Франции, что в сочетании с растущим авторитаризмом военных является проблемой, и многие беспокоятся о том, кто займет ее место. Найдет ли НО нового лидера или их поглотит другая ультраправая партия - это вопрос, который может определить будущее Франции, какой мы ее знаем."
 france.8.a:0 "Au Revoir!"
 france.9.t:0 "Земмур объединяет НО и Реконкисту"
 france.9.d:0 "После отставки Марин Ле Пен Национальное объединение рассыпалось. От нарастающей партийной междоусобицы до парламентской дезорганизации - знаменосец ультраправого популизма во Франции казался недееспособным. Так было до внезапного заявления Эрика Земмура, лидера крайнюю партию Reconquête, о поглощении разделенного Национального объединения. В то время как многие французские ультраправые приветствуют Земмура как объединяющую фигуру, особенно в условиях нынешней радикализации, когда старый мировой порядок рушится вокруг нас, среди остальной части политического спектра существует большая обеспокоенность по поводу предстоящего подъема Отвоевания. Независимо от того, кто какую позицию занимает, мы ожидаем, что рост радикализации и усиление раскола будут доминировать на предстоящих президентских выборах."
 france.9.a:0 "Одна партия; Один народ"
 france.10.t: "Малийский президент Спасен"
 france.10.d: "После непродолжительных боев в Азаваде бывшего президента Мали нашли гуляющим вдоль реки Нигер, очевидно, его похитители оставили умирать с голоду. Хотя его безопасность была обеспечена, Республика Мали отказалась восстановить его в должности президента, сославшись на недавние политические события и самые последние досрочные выборы в качестве доказательства его неспособности как лидера."
 france.10.a: "Отлично."
 france.11.t: "Президент Мали убит"
 france.11.d: "После провала переговоров и раскола между радикальными и более умеренными силами в Правительстве спасения Мали казнь президента была показана на видео. Видео, уже пользующееся дурной славой в темных уголках Интернета, безошибочно подтверждает личность президента, прежде чем показать его краткий военный суд и казнь. Многие полагают, что это было сделано в попытке послать сообщение лидерам Республики Мали."
 france.11.a: "Дерьмо."
 france.12.t: "Президент Мали находится в плену"
 france.12.d: "В связи с немедленным захватом значительной части Мали правительство спасения Мали объявило, что бывший президент Мали в настоящее время содержится в плену."
 france.12.a: "Мы должны вмешаться!"
 france.13.t: "Объявлена Операция "Сервал""
 france.13.d: "После усиления боевых действий на северо-востоке Мали вооруженные силы объявили о создании конкурирующего правительства в противовес усилившемуся присутствию Франции в стране."
 france.13.a: "Эвакуировать посольство!"
 france.14.t: "Проявление Независимости"
 france.14.d: "Напряженность в НАТО растет, поскольку военное руководство Франции, опираясь на националистические настроения и недовольство недавними альянсами, решило провести масштабные самостоятельные учения без контроля НАТО. Французские бронетанковые дивизии и военно-морские силы демонстрируют свою мощь, проводя парады вблизи ключевых стратегических пунктов, напоминая о временах напористой внешней политики Шарля де Голля. \n\nХотя официально учения называются рутинными, смелое решение оставить НАТО в стороне вызвало волнения по международным дипломатическим каналам. Это может стать поворотным моментом для военной независимости Франции и ее роли в глобальных альянсах."
 france.14.a: "Мы всегда были одиноки!"
 france.15.t:0 "Сообщение о коронавирусе поступило во Францию"
 france.15.d:0 "Неожиданно появились сообщения о том, что во Франции обнаружен новый коронавирус COVID-19. Изначально связанный с международными путешественниками и случаями заболевания в Азии, вирус теперь распространяется на территории Франции. Врачи предупреждают о возможной вспышке заболевания, однако истинная степень тяжести остается неясной. Однако общественность уже встревожена, поскольку новостные сети усиливают опасения, показывая изображения переполненных больниц в Китае и ранних закрытий в Италии.\n\nФранция, гордящаяся своей системой здравоохранения, находится на перепутье. Правительственные чиновники пытаются скоординировать ответные меры, но внутри страны происходят столкновения между фракциями. Левые призывают к немедленному закрытию магазинов и принятию защитных мер, ссылаясь на солидарность и общественное благосостояние, в то время как ультраправые видят возможность разжечь националистическую риторику, предупреждая о безопасности границ и критикуя глобализацию. Правительство сталкивается с давлением с обеих сторон, одновременно ориентируясь на свои обязанности как члена ЕС и свою роль в международном сотрудничестве."
 france.15.a:0 "Мы должны действовать быстро!"
 france.16.t:0 "Протесты Желтых жилетов Останавливаются на Время"
 france.16.d:0 "После недавних уступок, предоставленных Жёлтыми Жилетами, движение, похоже, начало прекращать свои безудержные протесты и беспорядки по всей стране. В связи с участившимися сообщениями о Ковид-19 в стране, движение закрывается вместе с остальной частью страны, чтобы не дать пандемии распространиться еще больше, чем она уже распространилась."
 france.16.a:0 "Надеемся, что они больше не вернутся."
 france.17.t:0 "Протесты "Желтых Жилетов" Активизируются"
 france.17.d: "Во Франции вновь вспыхнули протесты "желтых жилетов". Движение, первоначально вызванное в 2018 году ростом налогов на топливо и стоимости жизни, вспыхнуло вновь, подогреваемое недовольством экономическим неравенством, мерами жесткой экономии и видимым безразличием правительства. Демонстранты выходят на улицы, перекрывают автомагистрали и вступают в столкновения с правоохранительными органами в городах по всей стране. Протесты, хотя они децентрализованы и отличаются по своим требованиям, отражают глубокое недовольство политическим истеблишментом и растущее разочарование в реформах президента Макрона. \n\nПо мере роста баррикад правительство должно решить, пойдет ли оно на уступки требованиям протестующих, сохранит ли жесткую позицию по восстановлению порядка или рискует углубить политический раскол, ничего не предпринимая. Выбор, сделанный сейчас, может либо подавить беспорядки, либо еще больше накалить обстановку в стране, и без того страдающей от экономической неопределенности и социальной напряженности."
 france.17.a: "В ХУДШЕЕ время!"
 france.18.t:0 "Переговоры с Желтыми Жилетами"
 france.18.d:0 "Вся эта история с Жёлтыми Жилетами длится уже чертовски долго. Мы пытались предоставить им желаемые уступки, но они все равно выходят на улицы в следующем месяце. Настало время поставить точку и попытаться договориться с протестующими раз и навсегда, чтобы больше никогда не иметь дела с этими людьми."
 france.18.a:0 "Давайте надеяться на лучшее..."
 france.19.t: "Желтые жилеты уходят переговоров"
 france.19.d: "Эти абсолютные радикальные подонки пытались взять нас силой на наших же переговорах. Мы пытались найти общий язык, но они брали все больше и больше, и стало ясно, что мы не можем разумно пойти на эти уступки, помимо других требований. Как только мы начали сопротивляться, они засуетились и покинули переговоры, чтобы продолжить свои беспорядки. Радикалам из "Жилетов жаунов" ясно, что никакой середины быть не может, и их единственное намерение - продолжать громить и жечь улицы Парижа."
 france.19.a: "И вы идите нахер."
 france.20.t: "Соглашение с Желтыми Жилетами"
 france.20.d: "Хотя не всегда казалось, что нечто подобное произойдет, Жёлтые Жилеты и наша администрация нашли общий язык и успешно провели переговоры. Уже сейчас кажется, что в Париже стало спокойнее, чем в последние несколько недель, за исключением некоторых радикалов, безостановочные беспорядки и протесты исчезли, когда по всему городу прозвучали объявления об уступках."
 france.20.a: "Мы поступили правильно"
 france.21.t:0 "Провал Операции "Сервал""
 france.21.d:0 "Французские власти объявили о провале и прекращении Операции Сервал. Объединенные французские и малийские силы неожиданно столкнулись с ожесточенным и организованным сопротивлением со стороны повстанческих сил и были вынуждены отступить с севера Мали, понеся большие потери.\n\nФранцузским силам также не удалось достичь своей цели по спасению президента Мали до установленного срока, он был казнен, а те немногие моральные силы правительства испарились. Эта операция изучается офицерами НАТО, чтобы попытаться собрать воедино то, что пошло ужасно неправильно."
 france.21.a:0 "Удар по французскому престижу..."
 france.22.t:0 "Цены на Нефть достигли небывало высокого уровня"
 france.22.d:0 "Эскалация гражданской войны в Саудовской Аравии достигла критической точки, вызвав масштабные перебои с поставками нефти по всему миру. Поступают сообщения о том, что нефтеперерабатывающие заводы подвергаются нападениям, а морские пути блокируются, и Франция оказывается на грани энергетического кризиса. Поскольку экономика страны в значительной степени зависит от импорта нефти, страна готовится к последствиям: запасы сокращаются, цены на топливо стремительно растут, а недовольство населения усиливается. Граждане выходят на улицы, когда стоимость жизни возрастает, оказывая огромное давление на правительство, чтобы оно отреагировало.\n\nВ ответ на кризис правительство начинает изучать стратегии энергетической независимости. Созываются экстренные совещания, на которых обсуждаются возможные инвестиции в возобновляемые источники энергии и внутреннее производство нефти, а также дипломатические усилия по обеспечению альтернативных поставок из других стран."
 france.22.a:0 "Мы должны действовать быстро!"
 france.23.t:0 "Регионализм на Подъёме"
 france.23.d:0 "После масштабных беспорядков на Корсике многие граждане Франции с тревогой восприняли эту новость и задумались о том, что делает их французами. \n\n''Это язык, на котором мы говорим? Это культурные нормы, которые мы выражаем? Или просто то, что мы живем между Рейном и Пиренеями? говорит Жан-Филипп Алленбах, лидер ранее почти не существовавшего Движения Франш-Конте, которое выступает за автономию - или свободу - от французского правительства в Париже. \n\nГруппы, подобные МФК Алленбаха, растут по всей Франции, особенно в регионах, которые имеют или имели более четкую культурную идентичность, таких как Окситания, Нормандия, Бретань и Эльзас."
 france.23.a:0 "Мы должны искать потенциальных партнеров по развитию!"
 france.24.t:0 "Разработка EMBT Завершается"
 france.24.d:0 " "
 france.24.a:0 "Отлично!"
 france.25.t:0 "Германия Согласна присоединиться к совместному НИОКР EMBT"
 france.25.d:0 " "
 france.25.a:0 "Отлично!"
 france.26.t:0 "Германия отказывается присоединиться к совместному НИОКР EMBT"
 france.26.d:0 " "
 france.261.t: "Специальная Военная Операция Франции на Кипре"
 france.261.d: "По сообщениям местных жителей и местных СМИ, французские войска вошли в Северную Никосию, не встретив практически никакого сопротивления. Это незаконное вторжение вызвало агрессивную реакцию турецкого правительства: президент Эрдоган выдвинул ультиматум с требованием немедленного вывода французских войск с Северного Кипра, предупредив о жестком эмбарго и даже возможности военной интервенции. Международное сообщество в основном поддержало Кипр, осудив вторжение как нарушение его суверенитета. Российское правительство осудило операцию, назвав ее явным актом коммунистической агрессии. Евроинтерн пригрозил Турции масштабными санкциями и пообещал полную поддержку Франции в случае интервенции."
 france.261.a: "Безумие"
 france.26.a:0 "Ну и ладно!"
 france.27.t:0 "Конец Операции Бархан"
 france.27.d:0 "Французские власти объявили об окончании чрезвычайного положения в Мали. Объединенные французские и малийские силы неожиданно столкнулись с ожесточенным и организованным сопротивлением повстанческих сил и смогли вытеснить повстанческие силы с севера Мали, загнав их вглубь Сахары.\n\nФранцузские войска также провели успешную операцию по спасению президента Мали, освободив его из плена повстанцев без потерь. Эта операция изучается офицерами НАТО и приводится в качестве примера того, как достигаются операции ударных сил и быстрое развертывание."
 france.27.a:0 "Престижно."
 france.28.t: "Создано Военное Правительство"
 france.28.d: "Вчера около полуночи президент вместе со своим кабинетом были арестованы и доставлены в столицу, где высокопоставленные офицеры заявили о своем намерении совершить государственный переворот. После этого заявления протестующие вспыхнули по всей столице, но были быстро подавлены с применением военной силы. Ссылаясь на растущую напряженность в Западной Африке, правительство пока не заявило о своих истинных намерениях."
 france.28.a: "Отдай честь флагу, неудачник"
 france.29.t: "Современные Ромео и Джульетта"
 france.29.d: "Принц Бельгии Габриэль и наследница трона Нидерландов Катарина-Амалия объявили о своем побеге как всему миру, так и королевским домам Бельгии и Нидерландов. \nХотя многие задаются вопросом, как это повлияет на растущий сепаратизм во Фландрии и Валлонии, обе королевские семьи шокированы этим заявлением."
 france.29.a: "Поздравляю их обоих"
 france.30.t: "Растущий сепаратизм в Бельгии"
 france.30.d: "По всей стране невидимый барьер, разделяющий нашу нацию, становится все более и более распространенным, и после публичного бракосочетания принца Габриэля и голландской принцессы Катарины-Амалии многие в Бельгии все чаще ставят под сомнение нашу национальную идентичность. Если наша королевская семья - просто голландцы, на чем тогда мы будем строить нашу национальную идентичность? Тот факт, что мы говорим по-французски?"
 france.30.a: "Неприятности на Горизонте"
 france.31.t: "Голландский Король Застрелен!"
 france.31.d: "Сегодня в Нидерландах разыгралась ужасная трагедия: сообщается, что король Нидерландов Виллем Александр был убит! Во время крупного публичного мероприятия, на котором присутствовал король, одинокий боевик подошел достаточно близко к королевской семье и смог произвести в него несколько выстрелов, попав ему в грудь. Местные парамедики констатировали немедленную смерть монарха: огнестрельные ранения в грудь были почти мгновенно смертельными. Стрелявший, быстро убив Александра, был вскоре убит в перестрелке с голландскими правоохранительными органами. Основываясь на имеющейся на данный момент информации, преступник был убежденным анархистом и заранее планировал убийство короля Александра. Полиция и разведывательные службы Нидерландов начали обширное расследование как биографии преступника, так и других подозреваемых, связанных с этим делом. Текущие оценки полиции предсказывают, что, возможно, к планированию и подготовке убийства были причастны другие анархисты или экстремисты. Правительство Нидерландов запланировало национальную неделю траура в связи с убийством монарха."
 france.31.a: "Трагедия постигла Голландский народ"
 france.33.t: "Представители Фландрии Уходят"
 france.33.d: "После мелких разногласий по бюджету государственного секретаря по вопросам гендерного равенства, равных возможностей и разнообразия представители "Влаамс Беланг", проголландской сепаратистской группы, в ярости покинули фламандский парламент. За пределами фламандского парламента председатель партии Том Ван Грикен заявил о намерении партий отделить Фландрию от бельгийского правительства. Имея большинство мест от региона Фландрия, эта просьба побудила правительство Нидерландов во главе с молодой королевой Катариной-Амалией заявить о своей поддержке фламандских парламентариев."
 france.33.a: "Удар в спину..."
 france.32.t: "Распад Бельгии"
 france.32.d: "После ухода почти всего состава фламандского парламента многие в парламенте Валлонии фактически согласились с предложением сепаратистов, сославшись на то, что они просто не могут заставить фламандских националистов быть частью страны, в которой они не хотят находиться."
 france.32.a: "И снова в кучу добавляется бревно..."
 france.34.t: "Валлония провозглашает республику"
 france.34.d: "После ошеломляющей победы на выборах, с почти диктаторской властью, Объединение Валлонии во Франции, или RWF, объявило о роспуске бельгийской монархии и установлении светской республики. После этого заявления бывшая бельгийская королевская семья бежала в Соединенное Королевство, хотя им было обещано, что им или их поместьям не причинят никакого вреда в процессе формирования правительства."
 france.34.a: "Еще одна бельгийская оковка исчезла"
 france.35.t: "Республика Валлония просит объединения"
 france.35.d: "После экономического спада и непопулярного свержения бельгийской монархии правительство Валлонии обратилось с просьбой об объединении французского и валлонского правительств, сославшись на крах контроля бельгийского правительства. Хотя изначально правительство Германии выступало против этой аннексии, оно лишь потребовало, чтобы гражданам на преимущественно немецкоговорящей территории Эйпен-Мальмади было предоставлено двойное гражданство между Францией и Германией, чтобы гарантировать удовлетворение их потребностей в соответствии с новым французским мандатом в Валлонии."
 france.35.a: "Раттачизм был прав!"
 france.351.t: "Елизавета I Коронована"
 france.351.d: "В самом сердце Валлонии стояла забытая церковь, ее некогда яркие стены теперь обветшали с течением времени. Именно в этом заброшенном святилище должно было произойти экстраординарное событие - коронация Елизаветы I, долгожданной наследницы бельгийского престола. Когда лучи солнечного света проникли сквозь разбитые витражи, отбрасывая калейдоскоп красок на ветхие скамьи, воздух наполнился тихим предвкушением.\n\nОтголоски истории прозвучали, когда Елизавета, облаченная в королевские одежды, вошла в забытое святилище, ее присутствие вызывало уважение и благоговейный трепет у офицеров-роялистов. С грацией и достоинством она взошла на импровизированный помост, где ее ждала простая серебряная корона.\n\nВ этой скромной церкви, где призраки прошлого смешивались с надеждами на будущее, Елизавета I была коронована, что сделало ее правление маяком сопротивления для народа Бельгии. Когда она подняла голову, свет пробился сквозь разбитый потолок, осветив ее сияющее лицо. С каждым шагом, который она делала, половицы скрипели под ней, словно отражая тяжесть ее ответственности. Остатки роялистов Бельгии нашли своего лидера, и Елизавета приняла свою роль с непоколебимой решимостью, готовая вести свою нацию к завтрашнему дню, свободному от французской и голландской тирании."
 france.351.a: "Идея Бельгии продолжает жить..."
 france.352.t: "Бельгийское Правительство Распускается!"
 france.352.d: "Бельгия чудесным образом пала, и хотя мы внимательно следили за внутренней ситуацией в Брюсселе, мы никак не ожидали распада Бельгии на две республики, но он произошел, и Валлония и Фландрия вошли в состав Франции и Нидерландов. \n\nНа весах висят 100 000 немцев на имперской территории Эупен-Мальмади, что поставило наше правительство перед необходимостью принять решение и учесть столетнюю историю. Многие в АдГ требуют, чтобы мы потребовали возвращения этой территории в состав наших земель, но это могло повредить отношениям с нашими союзниками. Было решено созвать экстренную сессию Бундестага для решения этого вопроса. Большинство партий, в первую очередь СДПГ, поддержали план АдГ по предоставлению жителям двойного гражданства между Францией и Германией в знак единства, составили проект предложения и отправили его во Францию, ответ из Парижа был положительным, не давая повода запретить жителям Эупена выбирать, где им быть в современном мире федерализованной Европы.\n\nГород Брюссель был превращен в первую суверенную территорию всех европейцев. В Бельгии по-прежнему царят беспорядки, монархия становится все более диктаторской, а в Валлонии распространяются слухи о республиканской революции. Британцы протестуют против всей этой ситуации, но не предпринимают никаких действий для защиты бельгийского правительства, отношения с которым впервые возникли в наполеоновские времена."
 france.352.a: "Хоть что-то из этого вышло."
 france.36.t: "Голландский король убит!"
 france.36.d: "Сегодня в Нидерландах разыгралась ужасная трагедия: сообщается, что король Нидерландов Виллем Александр был убит! Во время крупного публичного мероприятия, на котором присутствовал король, одинокий боевик подошел достаточно близко к королевской семье и смог произвести в него несколько выстрелов, попав ему в грудь. Местные парамедики констатировали немедленную смерть монарха: огнестрельные ранения в грудь были почти мгновенно смертельными. Стрелявший, быстро убив Александра, был вскоре убит в перестрелке с голландскими правоохранительными органами. Основываясь на имеющейся на данный момент информации, преступник был убежденным анархистом и заранее планировал убийство короля Александра. Полиция и разведывательные службы Нидерландов начали обширное расследование как биографии преступника, так и других подозреваемых, связанных с этим делом. Текущие оценки полиции предсказывают, что, возможно, к планированию и подготовке убийства были причастны другие анархисты или экстремисты. Правительство Нидерландов запланировало национальную неделю траура в ответ на убийство монарха."
 france.36.a: "Трагедия обрушилась на Нидерланды"
 france.37.t: "Пересекая Рубикон"
 france.37.d: "Париж уже никогда не был прежним после окончания войны. Ужасное поражение от русских создало мрачную и нигилистическую атмосферу, которая теперь царила не только в городе, но и среди всех, кто работал в национальном правительстве. Никто не мог в это поверить. Высший эшелон французского общества был парализован чувством утраты и нерешительности. Однако другие воспользовались возможностью, чтобы "действовать" в соответствии с ситуацией в "наилучших интересах" страны.\n\nВ то утро в Париже возле Елисейского дворца разворачивалась любопытная сцена. Обычно во время еженедельных встреч с членами кабинета министров и парламента можно было увидеть только дорогие автомобили политиков, припаркованные снаружи, но сегодня все было по-другому. В течение первого часа после открытия утренней сессии ряды армейских грузовиков и микроавтобусов с ревом устремились к поместью, заполняя улицы и внешний периметр. Они резко остановились, когда их двери и задние грузовые отсеки открылись, и из машин высыпали офицеры, солдаты, оперативники спецназа, все со штурмовыми винтовками FAMAS в руках. Первые лица свиты, генералы, увешанные наградами и почестями, с силой распахнули парадные двери поместья, за ними последовали солдаты и офицеры. Политики, которые болтали в главном зале, были застигнуты врасплох этим странным вторжением. Они и не подозревали, что их время пришло.\n"Что, черт возьми, здесь происходит?! Что всё это значит?!" - воскликнул один из членов парламента.\n"Мы выполняем конституционные обязанности, сэр", - с холодной серьезностью заметил главный генерал. "У нас есть приказ задерживать всех выявленных должностных лиц, которые не справились со своими обязанностями перед нацией".\n"Вы... что?!" - потрясенно выпалил депутат в ответ. - "Это нелепо! Это незаконно! Вы не можете этого сделать! Это государственная измена высшего порядка!"\n"Нет, сэр", - сказал генерал, доставая оружие, - "Это вы совершили государственную измену. Вы пойдете с нами и будете точно следовать нашим инструкциям. Национальные интересы страны были преданы, и мы здесь для того, чтобы обеспечить восстановление порядка". Затем генерал махнул солдатам позади себя, которые начали расходиться веером, чтобы задержать и захватить весь комплекс в свои руки. С "предателями" было покончено. Теперь во Франции установился новый порядок."
 france.37.a: "Жребий Брошен"
 france.371.t: "Последняя Пуля"
 france.371.d: "После тяжелой гражданской войны, в которой нам противостояли и националисты на севере, и коммунисты на юге, силы истеблишмента наконец-то установили контроль над центральной Францией. Наша победа, хотя и далась нам с большим трудом, досталась нам огромной ценой, оставив города в шрамах, а общество - расколотым. По мере того как мы осматриваем последствия конфликта, становится ясно, что наша страна остро нуждается в исцелении и восстановлении. Истеблишмент твердо намерен восстановить порядок, поддержать демократические ценности и воссоединить разделенное население. \n\nПосле того как угрозы со стороны националистов и коммунистов ослабли, перед нами встала грандиозная задача по восстановлению страны.Нашей первоочередной задачей должно стать восстановление жизненно важной инфраструктуры, возобновление работы государственных служб и устранение недовольства, которое послужило причиной конфликта. Мы должны начать кампании национального единства, чтобы преодолеть идеологические расколы, которые разделили наш народ, и воспитать коллективный дух сотрудничества и прогресса. Однако мы прекрасно понимаем, что потенциал для беспорядков сохраняется, и любой неверный шаг может вновь разжечь пламя раздора."
 france.371.a: "Свобода Обеспечена"
 france.372.t: "Освобожденная Нация"
 france.372.d: "После упорной борьбы с истеблишментом и националистами народные силы одержали победу в гражданской войне. Наш триумф знаменует рассвет новой эры для Франции, где наконец-то укоренятся идеалы равенства, солидарности и социальной справедливости. Жестокий конфликт оставил шрамы по всей стране, но из этих потрясений мы построим общество, которое будет служить интересам рабочего класса, а не элиты. Пришло время вернуть нашу страну и сделать так, чтобы власть действительно находилась в руках народа. \n\nПосле того, как истеблишмент оказался в беспорядке, а националисты получили отпор, перед нами встала важнейшая задача - объединить наше расколотое общество под знаменем коммунизма. Перед нами стоят серьезные задачи: мы должны восстановить жизненно важную инфраструктуру и обеспечить жильем тех, кто был перемещен в результате войны.Наши первые шаги будут направлены на проведение земельных реформ, национализацию ключевых отраслей промышленности и расширение социальных программ для улучшения положения маргинализированных слоев населения. Мы стремимся укрепить дух сотрудничества среди граждан, поощряя их к активному участию в формировании собственного будущего."
 france.372.a: "Равенство Обеспечено"
 france.373.t: "Opération: Цезарь"
 france.373.d: "После изнурительной гражданской войны, испытавшей на прочность нашу решимость, националисты вышли победителями, нанеся решительное поражение как истеблишменту, так и коммунистическим группировкам, угрожавшим нашей великой стране. Наша непоколебимая приверженность восстановлению порядка и национальной гордости одержала победу над хаосом. После того как северные регионы были взяты под контроль, а угроза левого восстания устранена, мы встали во главе единой Франции, готовой вернуть себе свою судьбу. Жертвы, принесенные во время конфликта, сформировали у нашего народа новое чувство идентичности, основанное на силе, единстве и патриотизме.\n\nКак только мы возьмем под контроль правительство, нашей главной задачей станет укрепление нашей власти и обеспечение стабильности нации. Остатки истеблишмента и коммунистов все еще таятся, но мы не дрогнем. Мы вселим в наших граждан новое чувство цели, воспитаем в них дух национализма, который сплотит нас, когда мы будем отстраивать наши города и восстанавливать экономику.Благодаря решительному руководству и приверженности нашим ценностям мы создадим общество, в котором будет царить порядок и процветать истинный дух Франции."
 france.373.a: "Братство Обеспечено"
 france.374.t: "Федералисты захватывают правительство"
 france.374.d: "После нашего сокрушительного поражения в европейской войне геополитические потрясения всколыхнули нашу внутреннюю ситуацию. В частности, всплеск европейского федерализма, подстегиваемый верой в то, что евроскептический популизм разделил нас против российского натиска, сумел объединить наш политический центр. Сплотившись вокруг Кристин Ламбер, их растущие демонстрации в Париже подтачивали легитимность правительства, пока, наконец, не дошли до точки разлома, поскольку правительство продолжало рушиться, как рушился мировой порядок, на который мы когда-то полагались. Во время речи, в которой Кристин выступала против "препирательств консерваторов и социалистов, которые мешают европейской интеграции, позволяя русским тиранам порабощать Восточную Европу", толпа начала атаковать полицейские баррикады, защищающие Бурбонский дворец. Под лозунгом «освободим Францию и Европу из лап предательских популистов» им удалось прорваться через баррикады. Они сражались с присутствующими силами безопасности, чтобы защитить наш парламент. После многочасовых столкновений предательские силы безопасности наконец-то пропустили протестующих внутрь, и вместе с ними Кристин Ламбер была провозглашена президентом Франции. Хотя некоторые осуждают федералистов за их "необдуманную и недемократическую попытку вотума недоверия", многие смотрят на них как на единственную надежду не только вернуть престиж Франции, но и позволить ей стать знаменосцем объединенной Европы, которая сможет противостоять русскому медведю и освободить своих подданных от его недавно навязанной тирании."
 france.374.a: "Европа не будет спасена миром!"
 france.374.b: "Наш единственный враг - невежество!"
 france.374.c: "Свобода будет восстановлена!"
 france.379.t: "Незаслуженное Чувство Безопасности"
 france.379.d: "Пытаясь спасти Францию, мы многим пожертвовали. Наша республика? Уничтожена ради стабильности. Нашей идеологической беспартийностью? Политическим фаворитизмом в надежде создать единый фронт ради мира. Нам кажется, что, возможно, все это того стоило - улицы пусты, призывы к переменам стихли. Несмотря на это, люди не вернулись к работе, и мы получаем сообщения о том, что те, кто хочет сжечь то, что осталось от Франции, просто ушли в подполье. Будем надеяться, что это временное явление, ведь только глупец ввергнет страну в гражданскую войну в трудный для нее час. Какой смысл пытаться принести спасение Франции, если мы не верим в ее народ?"
 france.379.a: "Наша вера во Францию должна сохраниться"
 france.38.t: "Бои Начинаются"
 france.38.d: "Хрупкий мир во Франции рушится, когда первые выстрелы гражданской войны эхом разносятся по улицам. То, что начиналось как кипящая напряженность между истеблишментом, националистами и коммунистами, переросло в открытый конфликт. Рано утром в нескольких городах начинаются вооруженные столкновения, когда на улицы выходят группировки, борющиеся за контроль и влияние на будущее страны. В атмосфере хаоса и неопределенности граждане пытаются спастись, а воздух наполняют крики раненых.\n\nПоступают сообщения о стычках между правительственными войсками и националистическими ополчениями на севере, в то время как коммунистические группировки мобилизуются на юге, разжигая ожесточенную борьбу за территорию и идеологию. По мере того как правительство пытается отреагировать на происходящее, становится ясно, что обещания стабильности были разрушены. Улицы, некогда излучавшие оптимизм, теперь наполнены звуками выстрелов и отчаяния, знаменуя начало жестокой борьбы, которая станет испытанием для самой ткани нации."
 france.38.a: "Боже, храни Францию..."
 france.39.t: "Война за объединение Нижних Земель"
 france.39.d: "В тени гражданской войны во Франции, в Низинах разгорается буря. На фоне хаоса Королевство Нидерландов, непоколебимо хранящее королевские традиции парламентаризма, сталкивается с беспрецедентным вызовом со стороны двух грозных противников: возрождающегося Королевства Бельгия, которое стремится вернуть себе историческую славу под властью своей королевы, и Союза Низины - радикальной коммунистической коалиции, возникшей в сердце Люксембурга. В воздухе витает напряжение, поскольку каждая фракция стремится пересмотреть саму идентичность Лоулендов.\n\nВойна разгорелась неожиданно, в результате стычки на границе бывшей французской территории Валлонии и Нидерландов. Националистический пыл пронесся по улицам Брюсселя, граждане города объединились в призыве к единству и гордости, скандируя о возвращении к великой Бельгии.По всему региону Союз Лоулендеров пользуется моментом, призывая к восстанию в Лоуленде, чтобы освободить угнетенных рабочих и создать правительство, отражающее их радикальные идеалы. По мере эскалации конфликта идеологический пыл разжигает пламя битвы, и некогда мирные города Лоуленда превращаются в зоны боевых действий. \nЗажатые между историческими обидами и революционным рвением, мирные жители оказываются разорванными на части. Семьи разделены, лояльность проверена, а общины разрушены, поскольку битвы идут за ключевые города и стратегические точки."
 france.39.a: "Дуэль Идеологий"
 france.40.t: "Эльзас Обещает Лояльность"
 france.40.d: "Когда страна погрузилась в жестокую гражданскую войну, регион Эльзас под предлогом защиты от возможных восточных вторжений отделился от национального правительства. Сейчас, когда мы готовимся к воссоединению Франции под нашим знаменем, вопрос о том, как реинтегрировать Эльзас, разделил наше правительство. К счастью, независимо от наших планов на случай возможного неповиновения, эльзасцы объявили о своем намерении вновь присоединиться к нашей нации, окончательно покончив с расколом, от которого мы страдали как собратья-французы. Теперь, когда наша внутренняя ситуация стабилизировалась, мы наконец-то можем заняться восстановлением и реформированием страны в соответствии с нашими потребностями. Наконец-то мы сможем поставить Францию на путь, который позволит ей вернуть былую славу, невзирая на позорные неудачи европейской войны."
 france.40.a: "Вместе мы Сильны"
 france.41.t: "Прибывают Французские Добровольцы"
 france.41.d: "В разгар хаоса и разрухи в раздираемом войной Провиденсе прибытие французской добровольческой бригады "Наполеон" было встречено Патриотическим фронтом с ликованием. Прибытие бригады, возглавляемой человеком в маске, известным как "Лафайет", придало новый импульс Патриотическому фронту. Добровольцы, вдохновленные наследием Наполеона Бонапарта, были восприняты осажденными членами Патриотического фронта как спасители.\n\nКогда бригада марширует по улицам Провиденса, местное население встречает ее радостными криками и аплодисментами. Знамена с изображением Наполеона и надписью "Да здравствует революция!" развеваются на ветру, поскольку добровольцев приветствуют как героев. Прибытие бригады "Наполеон" укрепило моральный дух Патриотического фронта, напомнив им об их общих идеалах и решимости бороться за свое дело, а также о благородном деле Вашингтона и его французских союзников во время первой войны за независимость."
 france.41.a: "Лафайет возвращается"
 france.411.t: "Прибывают Французские Добровольцы"
 france.411.d: "Среди обломков и руин разрушенного войной Сан-Франциско прибытие французской добровольческой бригады "Робеспьер" было встречено с ликованием и торжеством. Улицы, некогда наполненные звуками разрушения, теперь оглашаются радостными криками и аплодисментами, поскольку добровольцев встречают как героев. Преданность бригады делу коммунизма и их готовность сражаться бок о бок со своими американскими союзниками снискали им восхищение и уважение местного населения.\n\nКогда добровольцы маршируют по городу, их встречают транспарантами и флагами, а из окон и с крыш наблюдатели машут им и подбадривают. Прибытие бригады вселило в Сан-Франциско чувство надежды и солидарности, напомнив жителям, что они не одиноки в своей борьбе. Присутствие бригады служит символом международной солидарности и непреходящего духа революции, который не знает границ."
 france.411.a: "Революционный Прием!"
 france.412.t: "Прибывают Французские Добровольцы"
 france.412.d: "В качестве яркого проявления международной солидарности президент Байден тепло приветствовал французскую добровольческую бригаду "Рошамбо" в Вашингтоне, округ Колумбия. Приверженность бригады социальному либерализму и демократическим ценностям нашла отклик у американского руководства, которое рассматривает их прибытие как символ надежды и единства. Президент Байден в сопровождении членов своей администрации встретил добровольцев с распростертыми объятиями, поблагодарив их за храбрость и преданность делу свободы.\n\nКогда бригада маршировала по улицам Вашингтона, округ Колумбия, местное население встречало ее радостными криками и аплодисментами. Баннеры с надписями "Свобода, равенство, братство!" развевались на ветру, когда добровольцев чествовали как героев. Прибытие бригады "Рошамбо" привнесло в столицу чувство оптимизма и товарищества, напомнив американцам об их общих ценностях и важности сплочения перед лицом невзгод."
 france.412.a: "Союзники Свободы, Мы стоим вместе!"
 france.410.t: "Французские добровольцы отправляются в Америку"
 france.410.d: "В разгар Второй гражданской войны в США значительный контингент французских солдат и молодежных активистов отправился в путешествие в Америку, движимый горячим желанием поддержать своих идеологических союзников в конфликте. В эту разнообразную группу добровольцев входят либералы, коммунисты и фашисты. Прибытие этих французских добровольцев придало новую энергию американским действиям на поле боя, а их присутствие подчеркнуло международный характер конфликта. Когда эти французские добровольцы вступают в бой, они приносят с собой смесь идеализма, решимости и глубоко укоренившейся веры в правоту своего дела. Их присутствие подчеркивает сложный и многогранный характер Второй гражданской войны в Америке, а также непреходящую привлекательность революционных идеалов, не знающих границ."
 france.410.a: "Лишить их гражданства"
 france.42.t: "Крупномасштабные Пенсионные Протесты"
 france.42.d: "В качестве смелого шага правительство под руководством президента Макрона предложило спорную пенсионную реформу, направленную на повышение пенсионного возраста и реструктуризацию льгот для решения финансовых проблем страны. Это объявление, сделанное на фоне обещаний экономического восстановления и модернизации, быстро вызвало возмущение по всей стране. Поскольку предлагаемые изменения воспринимаются как посягательство на с трудом заработанные права трудящихся, граждане из всех слоев общества выходят на улицы, что приводит к масштабным протестам и беспорядкам, которые сотрясают самые основы французского общества.\n\nНачало демонстраций проходит мирно, профсоюзы собирают тысячи рабочих, студентов и пенсионеров в таких крупных городах, как Париж, Лион и Марсель. Однако по мере роста напряженности и учащения столкновений с полицией протесты перерастают в насилие. Возводятся баррикады, а призывы к справедливости превращаются в призывы к революции. Правительство, застигнутое врасплох масштабами и интенсивностью волнений, применяет жесткую тактику, еще больше накаляя обстановку и вызывая критику со стороны как внутренних, так и международных наблюдателей."
 france.42.a: "ВСЕГО ДВА ГОДА"
 france.43.t: "По всему Бенилюксу восстают революционеры"
 france.43.d: "По мере разрастания Войны за объединение Нижних Земель, беспорядки в Нижних Землях вызывают потрясения во всем регионе Бенилюкс. В разгар этого хаоса идеалы коммунизма начинают набирать силу, разжигая революционный пыл среди рабочего класса. Вдохновленные продолжающимся конфликтом и радикальными обещаниями Союза Лоулендеров, различные коммунистические фракции выходят из тени в Бельгии, Нидерландах и Люксембурге, объединяя разочарованных граждан в своих рядах. \n\nПротесты вспыхивают в крупных городах, рабочие и студенты стекаются под знамена коммунизма, требуя положить конец социальному неравенству и создать правительство, которое будет действительно представлять их интересы.В то время как националистический пыл в Бельгии и Нидерландах отвлекает внимание от насущных социальных проблем, коммунистическое движение использует эти волнения, призывая к солидарности угнетенных. Забастовки и демонстрации становятся обычным делом, поскольку население все больше видит потенциал единого, социалистического Бенилюкса, способного бросить вызов установившемуся порядку."
 france.43.a: "Vive d'Revolutioun"
 france.431.t: "Аннексия Брюсселя"
 france.431.d: "В разгар разгорающейся войны за объединение Нижних Земель пришло время Нидерландам вернуть себе законное влияние на Брюссель, сердце Нижних Земель. Свободная территория ЕС, созданная после хаотичного раскола Бельгии, стала очагом нестабильности, и мы не можем оставаться в стороне, пока царит хаос. Наше правительство сделало решительный выбор в пользу аннексии Брюсселя, утверждая, что только голландское руководство может восстановить порядок и обеспечить безопасность своих граждан.\n\nПо мере того, как наши силы быстро продвигаются к городу, мы подчеркиваем нашу приверженность защите жителей Брюсселя от растущей волны национализма и коммунизма, угрожающей охватить регион. Мы верим, что эти смелые действия не только принесут стабильность в Брюссель, но и подтвердят нашу позицию лидера в Низинах.Аннексия рассматривается как необходимый шаг к объединению, как шанс создать более сильные и сплоченные Нидерланды, способные противостоять вызовам, исходящим как от внешних, так и от внутренних сил."
 france.431.a: "Европа должна быть защищена..."
 france.44.t: "Предложение Пансредиземноморского Военного Бюджета"
 france.44.d: "В ответ на растущую геополитическую напряженность в Средиземноморье Франция предложила создать Пансредиземноморский военный бюджет, пригласив Италию и Испанию к сотрудничеству в укреплении региональной безопасности. Эта инициатива направлена на объединение усилий по защите от возникающих угроз, включая пиратство, организованную преступность и внешние агрессии, дестабилизирующие регион. Французские чиновники подчеркивают, что коллективный подход к военному финансированию позволит укрепить потенциал, оптимизировать операции и способствовать углублению сотрудничества между странами Средиземноморья. С началом обсуждения это предложение вызывает дискуссию среди стран-участниц: сторонники подчеркивают преимущества единства, а критики выражают обеспокоенность по поводу национального суверенитета и возможности увеличения военных расходов."
 france.44.a: "Равная доля бремени"
 france.45.t: "Подъём Ультраправых!"
 france.45.d: "В своей провокационной речи, которая откликнулась на всю страну, Марин Ле Пен смело заявляет, что Европейский союз бесполезен, и призывает вернуться к национальному суверенитету и поставить интересы Франции выше бюрократических ограничений. Ее слова находят глубокий отклик у разочарованных граждан, которые чувствуют себя маргиналами в результате политики ЕС и растущих экономических проблем. По мере того как ее послание набирает силу, митинги и протесты, организованные ультраправыми группами, становятся все более многочисленными, привлекая тысячи людей, разделяющих ее видение Франции, свободной от европейского надзора.\n\nРечь выступила в качестве катализатора, вызвав новый энтузиазм среди ультраправых группировок, которые начинают организовывать более активные действия. Кампании в социальных сетях усиливают их риторику, обвиняя ЕС во всем - от экономического застоя до проблем с иммиграцией. Опросы показывают значительный рост поддержки партии Ле Пен, поскольку многие граждане, разочаровавшись в традиционной политике, ищут альтернативные решения, которые обещают вернуть национальную гордость и контроль."
 france.45.a: "Либеральный истеблишмент увидит..."
 france.45.b: "Это Неприемлемо!"
 france.46.t: "Создание Нового Народного Фронта"
 france.46.d: "В ответ на тревожный рост ультраправых под влиянием Марин Ле Пен коалиция левых, центристских и прогрессивных партий объединяется в Новый народный фронт. Этот альянс призван объединить различные политические фракции против растущей волны национализма и ксенофобии, которая угрожает подорвать демократические ценности и социальную структуру Франции. Лидеры, представляющие весь политический спектр, подчеркивают важность солидарности в защите гражданских прав, социальной справедливости и места Франции в Европейском союзе.\n\nНовый народный фронт быстро набирает обороты, организуя митинги и кампании, чтобы противостоять ультраправой риторике, захватившей многих разочарованных граждан. Они выступают за политику, способствующую инклюзивности, экономическому равенству и реформированному, совместному подходу к ЕС, который ставит во главу угла потребности французского народа, не отказываясь от преимуществ членства. По мере того как их идеи находят отклик у широкой аудитории, общественная поддержка коалиции возрастает, создавая серьезную проблему для Ле Пен и ее союзников."
 france.46.a: "Левые должны подняться!"
 france.46.b: "Чистый ЛАРП без примесей..."
 france.47.t: "Новый народный фронт выбирает кандидата"
 france.47.d: "В то время как Новый народный фронт готовится к предстоящим выборам, лидеры партии собираются, чтобы выбрать своего кандидата, который бросит вызов растущим ультраправым и объединит прогрессивное движение. В атмосфере царит предвкушение, поскольку в качестве кандидатов выдвигаются три выдающиеся фигуры: Жан-Люк Меланшон, Оливье Фор и компромиссный кандидат Франсуа Руффен.\nЖан-Люк Меланшон - опытный политик и лидер "Непримиримой Франции", известный своей пламенной риторикой и радикальной левой политикой. Его платформа включает предложения по перераспределению богатства, экологической устойчивости и сильной антиавстрийской позиции. Меланшон привлекает базу партии своим видением преобразованной Франции, но его поляризующий стиль вызывает критику даже внутри коалиции. \nОливье Фор, лидер Социалистической партии, представляет более умеренный подход, подчеркивая необходимость прагматичной стратегии для решения проблем, стоящих перед Францией. Он выступает за реформы в области социальной справедливости, экономический рост за счет инвестиций и возобновление приверженности европейскому сотрудничеству. Фор стремится преодолеть разногласия внутри коалиции и представить избирателям единый фронт. \nФрансуа Руффен становится компромиссным кандидатом, заручившись поддержкой как леворадикальных, так и более центристских фракций. Журналист и режиссер-документалист, Руффин известен своим низовым активизмом и умением находить общий язык с простыми гражданами. Он отстаивает такие вопросы, как права рабочих, общественные услуги и проблемы окружающей среды, предлагая свежий взгляд, который находит отклик у широкой аудитории."
 france.47.a: "Жан-Люк Меланшон!"
 france.47.b: "Оливье Фор!"
 france.47.c: "Может компромисс? Франсуа Руффин!"
 france.48.t: "Новый Народный Фронт становится популярным"
 france.48.d: "В то время как политический ландшафт продолжает меняться в связи с ростом ультраправых настроений, Новый народный фронт переживает беспрецедентный всплеск популярности. Воодушевленная серией успешных митингов, эффективными кампаниями в социальных сетях и объединяющим посланием, которое находит отклик у разнообразного электората, коалиция завоевывает внимание и поддержку разочарованных граждан по всей Франции. Их приверженность социальной справедливости, инклюзивности и демократическим ценностям резко контрастирует с разжигающей рознь риторикой ультраправых. \n\nВновь обретенный импульс коалиции подкрепляется эффективными коммуникационными стратегиями, которые подчеркивают низовые связи кандидатов и их общее видение более справедливого общества. Опросы показывают значительный рост поддержки, граждане стекаются на их мероприятия, желая пообщаться и обсудить такие острые вопросы, как экономическое неравенство, изменение климата и иммиграционная реформа. Новый народный фронт успешно позиционирует себя как голос народа, выступая за политику, в которой благосостояние простых граждан ставится во главу угла, а не интересы элиты."
 france.48.a: "Неожиданно"
 france.49.t: "Республиканский Конституционный Референдум"
 france.49.d: "Пришло время французскому народу определить будущее своей республики. После нескольких лет политических разногласий и социального недовольства правительство вынесло на референдум вопрос о создании Шестой республики. Граждане разрываются между двумя концепциями: умеренной конституцией, призванной укрепить демократические институты и обеспечить стабильность путем постепенных реформ, и радикальной конституцией, которая стремится изменить политический ландшафт с помощью смелых мер и расширения прямой демократии. \n\nСторонники умеренного варианта утверждают, что он предлагает сбалансированный подход, обещая решить проблему экономического неравенства, сохраняя при этом существующие права и способствуя сотрудничеству между представителями политического спектра. Сторонники радикальной конституции, напротив, утверждают, что только радикальные изменения могут эффективно решить глубоко укоренившиеся проблемы, волнующие нацию, несмотря на риск потенциальных беспорядков. Пока страна затаила дыхание, исход этого референдума определит будущее Франции - выберут ли граждане стабильность или примут новое смелое направление?"
 france.49.a: "Давайте будем дерзкими!"
 france.49.b: "Стабильность - это важно"
 france.50.t: "Алжирский Кризис"
 france.50.d: "По мере роста напряженности в Алжире страна погрузилась в гражданскую войну, в которой правительство противостоит различным повстанческим группировкам. Этот конфликт грозит дестабилизировать обстановку в регионе и может привести к возобновлению беспорядков в самой Франции. Возникает вопрос: должна ли Франция вмешаться, направив добровольческие силы для поддержки нового республиканского правительства, или ей следует сохранять нейтралитет и избегать дальнейшего вмешательства в дела Алжира?"
 france.50.a: "Предложить им Добровольцев"
 france.50.b: "Это не наше дело - вмешиваться в чужие дела"
 france.51.t: "Марсельский Договор"
 france.51.d: "После нескольких месяцев жестокого конфликта между Марокко и Алжиром обе страны чувствуют себя изможденными от последствий войны. Стычки на границах привели к значительным жертвам, а гражданское население страдает от экономических последствий продолжительных военных действий. Признавая острую необходимость установления мира, Франция выступила в роли посредника, используя свои исторические связи и влияние в регионе. \n\nВ стремлении наладить диалог Франция организовала важнейшую встречу в Марселе, пригласив представителей обоих правительств для обсуждения условий потенциального мирного договора. Атмосфера на встрече напряженная, в основе лежит глубокое недовольство и национальная гордость. Однако обе стороны все больше осознают, что продолжение боевых действий может дестабилизировать ситуацию во всем североафриканском регионе, что повлечет за собой международное наблюдение и возможное вмешательство. \n\nПредлагаемый договор призван решить ключевые вопросы: территориальные споры, расселение беженцев и экономическое сотрудничество. Успех этих переговоров может не только положить конец конфликту, но и заложить основу для новой эры сотрудничества между двумя странами. За ходом переговоров внимательно следит весь мир, надеясь на мирное урегулирование, которое пойдет на пользу всем участникам."
 france.51.a: "Франция навязывает Белый мир"
 france.51.b: "Алжирские делегаты требуют признания САДРА"
 france.51.c: "Марокканские делегаты требуют создания независимой зоны Таурег"
 france.512.t: "Франция Угрожает Интервенцией"
 france.512.d: "Война между Марокко и Алжиром продолжается, и с каждым днем гуманитарные и политические последствия становятся все более ужасными. Сообщения о жертвах среди мирного населения и перемещенных лицах наводняют страну, рисуя мрачную картину последствий конфликта. Международное сообщество проявляет все большую обеспокоенность, а соседние страны опасаются, что конфликт может перекинуться на их границы.По мере того как война между Марокко и Алжиром продолжается, гуманитарные и политические последствия становятся все более ужасными с каждым днем. Сообщения о жертвах среди мирного населения и перемещенных лицах наводняют страну, рисуя мрачную картину последствий конфликта. Международное сообщество проявляет все большую обеспокоенность, а соседние страны опасаются, что конфликт может перекинуться на их границы. \n\nНа пресс-конференции министр иностранных дел Франции заявил: "Если Марокко и Алжир откажутся встретиться и начать конструктивный диалог, Франция будет вынуждена рассмотреть возможность вмешательства, чтобы восстановить мир и защитить наши интересы в регионе". Это послание нашло отклик как в Париже, так и в столицах Марокко и Алжира, где лидеры сейчас стоят перед сложным выбором: продолжать борьбу или прислушаться к призыву Франции к миру."
 france.512.a: "Давайте проясним наши цели."
 france.513.t: "Призвание к Миру"
 france.513.d: "По мере эскалации конфликта между Марокко и Алжиром последствия для мирного населения становятся все более тяжелыми. Сообщения о жертвах, перемещенных семьях и падающей экономике вызывают возмущение общественности. В городах обеих стран граждане выходят на улицы, требуя прекратить насилие и вернуться к дипломатии. \nПротесты вспыхивают в крупных городских центрах, таких как Алжир и Рабат, демонстранты скандируют лозунги за мир и призывают свои правительства отдать предпочтение диалогу перед войной. Социальные сети усиливают их голоса, а низовые организации мобилизуются, объединяя людей из разных слоев общества в общем стремлении положить конец страданиям. \n\nВ разгар этих демонстраций лидеры обеих стран сталкиваются с растущим давлением, требующим решения проблем своих граждан. Однако жесткие фракции внутри каждого правительства относятся к этим протестам с подозрением, опасаясь, что призывы к миру могут подорвать их авторитет и цели."
 france.513.a: "Стреляй сильнее!"
 france.514.t: "Брокер по Сделкам в Северной Африке"
 france.514.d: "Как марокканское, так и алжирское правительства просили нас не обращать внимания на установление перемирия между двумя странами после роста насилия с обеих сторон."
 france.514.a: "Поможем Алжирцам"
 france.514.b: "Поможем Марроканцам"
 france.52.t: "Франция Направляет Добровольцев"
 france.52.d: "В свете продолжающейся гражданской войны Франция выразила готовность поддержать Алжир в его борьбе за свободу. Признавая общие ценности демократии и социального прогресса, французское правительство готово направить добровольческие силы на помощь алжирскому правительству. \n\nНо это предложение вызовет неоднозначную реакцию в Алжире. Одни считают помощь необходимым шагом на пути к стабильности, другие с опаской относятся к иностранному вмешательству, напоминая о колониальном прошлом Алжира. Решение правительства будет иметь глубокие последствия для национального суверенитета и общественных настроений."
 france.52.a: "Мы навеки у вас в долгу"
 france.52.b: "Мы не будем общаться с колонистами"
 france.53.t: "Интервенция в Алжир?"
 france.53.d: "После того как Алжир решительно отверг французские добровольческие силы, настроение во Франции резко изменилось. Правые фракции и военные лидеры все громче заявляют о своем недовольстве подходом правительства к кризису. Они утверждают, что ситуация в Алжире представляет прямую угрозу французским интересам и региональной стабильности. \n\nНа митинге, организованном националистическими группами, ораторы страстно выступают за установление французского протектората над Алжиром. Их призывы находят отклик у определенной части населения, что приводит к широкому обсуждению вопросов национальной идентичности, колониального наследия и ответственности Франции перед своими бывшими колониями. \n\nПо мере того как давление нарастает, правительство должно решить, как ответить на эти призывы к вмешательству. Перспектива начала военной кампании становится все более реальной, и последствия такого решения могут изменить внешнюю политику и внутреннюю ситуацию во Франции на долгие годы вперед."
 france.53.a: "Они лишили нас нашей судьбы!"
 france.53.b: "Мы не можем вторгнуться напрямую!"
 france.531.t: "Завершение Согласования Границ"
 france.531.d: ""
 france.531.a: "Тогда все улажено"
 france.54.t: "Поддержка Саудовского Преемника"
 france.54.d: "Саудовский истеблишмент, основанный на консервативных ценностях и тесных связях с западными странами, обращается к Франции за поддержкой. Они утверждают, что поддержка монархии необходима для сохранения экономических интересов в регионе, особенно в нефтяном секторе, и для противодействия экстремистским группировкам, которые угрожают как Саудовской Аравии, так и стабильности на Ближнем Востоке в целом. \n\nС другой стороны, Аравийская республика выступает за прогрессивные реформы, за демократическое управление и социальные перемены. Они стремятся превратить Саудовскую Аравию в более инклюзивное и современное государство, что перекликается с идеологическими ценностями Франции - свободой и равенством. Однако их усиление может вызвать ответную реакцию со стороны консервативных элементов и еще больше дестабилизировать регион. \n\nФранция должна решить, что выбрать: прагматичный выбор - поддержку монархии или идеологическую позицию - поддержку республики."
 france.54.a: "Поддержать Республику"
 france.54.b: "Поддержать дом Саудов"
 france.55.t: "Средиземноморский пакт об объединении ВМС"
 france.55.d: "В ответ на растущую напряженность в Средиземноморье, вызванную усилением военно-морской активности соперничающих держав, Франция, Италия и Испания начали переговоры, направленные на укрепление своей безопасности на море. Признавая необходимость единого подхода к защите своих интересов, три страны объединились в Пакт об объединении военно-морских сил Средиземноморья. \n\nЭтот пакт направлен на стандартизацию военно-морских операций, расширение совместных учений и обмен ресурсами для укрепления коллективного морского потенциала. Лидеры каждой страны считают, что скоординированная военно-морская стратегия не только укрепит безопасность в регионе, но и будет способствовать более тесным связям между тремя государствами."
 france.55.a: "Присоединяйтесь к Пакту"
 france.55.b: "Отказаться от Договора"
 france.56.t: "Французское Оружие Поступает в Нигерию"
 france.56.d: "Партия оружия в Нигерию осталась незамеченной исламистскими силами и была получена нигерийскими военными."
 france.56.a: "Сожгите квитанции..."
 france.56.b: "Экстремизм должен быть искоренен"
 france.57.t: "Французский груз оружия, захвачен исламистскими повстанцами"
 france.57.d: "После получения вводящей в заблуждение информации французский агент под прикрытием был убит, а информация, которой он располагал, была использована для поиска и обеспечения безопасности партии французского оружия и реактивных истребителей."
 france.57.a: "Используй против них боеприпасы неверных!"
 france.57.b: "Провал со стороны нашей разведки"
 france.58.t: "Исламистские пропагандисты захвачены французскими войсками"
 france.58.d: "Горстка французских "зеленых беретов" наняла нескольких исламистских пропагандистов и вербовщиков."
 france.58.a: "Они заплатят!"
 france.58.b: "Обезглавливание змеи требует времени..."
 france.59.t: "Французские ЧВК захвачены и казнены исламскими силами"
 france.59.d: "Горстка отставных французских "зеленых беретов" была схвачена после неудачной попытки покушения на крупных деятелей."
 france.59.a: "Победоносный день!"
 france.59.b: "Отрицать, отрицать, отрицать..."
 france.60.t: "Аднан Абу Валид аль-Сахрави убит во время рейда нигерийских военных"
 france.60.d: "После налета на домовладение в Абудже нигерийские силы сообщили, что в результате захвата Аднана Абу Валида аль-Сахрави, крупного лидера исламских сил в Нигерии, есть серьезные потери."
 france.60.a: "Слабые должны умереть, чтобы сильные процветали"
 france.60.b: "Джентльмены... За ваше здоровье!"
 france.61.t: "46 мирных жителей погибли после того, как исламский лидер был окружен."
 france.61.d: "Аднан Абу Валид аль-Сахрави погиб после того, как использовал несколько крупных взрывных устройств, чтобы уничтожить целую городскую улицу в Абудже, этот взрыв последовал за слухами о том, что французские и нигерийские силы пытались силой проникнуть в комплекс утром, предшествовавшим взрыву."
 france.61.a: "Жертва, которая была необходима"
 france.61.b: "Участие Франции было минимальным"
 france.62.t: "Исламские Террористические Группировки Расширяют Сотрудничество"
 france.62.d: "Тревожные новости из Сахары, поскольку многочисленные террористические группировки, связанные с ИГИЛ, объявили о дальнейшем сотрудничестве перед лицом иностранной интервенции. Под руководством местных филиалов ИГИЛ исламские террористические ячейки в настоящее время гораздо лучше координируются по сравнению с предыдущей ситуацией, когда многие действовали независимо. Эти новые события происходят вслед за возобновлением усилий ИГИЛ по укреплению своего присутствия в регионе и возобновлению повстанческих действий против местного правительства и коалиционных сил НАТО. Разведывательные службы НАТО уже выпустили множество предупреждений относительно последствий деятельности ИГИЛ и их недавно объединенных формирований в Западной Африке. Аналитики отмечают, что вновь обретенная координация в рамках ИГИЛ создаст еще больше проблем для усилий НАТО по борьбе с терроризмом в регионе."
 france.62.a: "Еще солдаты!"
 france.62.b: "Будет ли Африка хоть когда нибудь спокойной?"
 france.63.t: "Лидер ИГ в Западной Африке обещает отомстить за убийство!"
 france.63.d: "Ужасные новости приходят сегодня из Африки: лидер ИГИЛ в Западной Африке Абу Мусаб аль-Барнави объявил о планируемом возмездии Франции за убийство своего заместителя Аднана Абу Валида аль-Сахрави. Франция уже много лет прилагает собственные усилия по борьбе с исламским терроризмом в Западной Африке, особенно против группировок, связанных с ИГИЛ. Особенно в последние годы связанные с ИГИЛ террористические группировки, такие как "Боко Харам" и другие, внесли свой вклад в различные гражданские конфликты и насилие, терзающие регион. Усилия Франции и союзных стран НАТО по подавлению террористических группировок ИГИЛ повысили угрозу возмездия со стороны экстремистов, которые, возможно, иммигрировали в континентальную Европу. Французские разведывательные службы публично объявили, что граждане Франции дома и за рубежом должны быть в состоянии повышенной готовности к террористической деятельности. Еще неизвестно, приведут ли угрозы Барнави к каким-либо реальным действиям со стороны его последователей."
 france.63.a: "Его жертва не будет напрасной..."
 france.63.b: "Их жестокость не знает границ..."
 france.64.t: "Террористы Разбомбили Собор Парижской Богоматери!"
 france.64.d: "Из Франции поступают трагические новости о том, что всемирно известный собор Парижской Богоматери подвергся бомбардировке в результате, по всей видимости, террористической атаки! Ранним утром почти все жители французской столицы сообщили в социальных сетях и местных новостных агентствах о чрезвычайно резком, но громком взрыве. В течение часа горожане обнаружат, что одна из самых известных достопримечательностей столицы, собор Парижской Богоматери, был, как многие сообщали, "взорван до небес". Разрушения беспрецедентны по масштабам, поскольку взрыв уничтожил почти все - фасад, внутреннюю часть и всю крышу целиком, остались только боковые и задние стены. Французским правоохранительным органам посчастливилось быстро оцепить район вокруг собора Парижской Богоматери, и к настоящему времени они установили, что теракт был совершен с использованием большой, но самодельной бомбы, заложенной в автомобиле. Исламистские террористы, связанные с ИГИЛ в Западной Африке, к настоящему времени вышли на свободу и взяли на себя ответственность за нападение, сославшись в качестве главной причины на смерть одного из своих командиров, Аднана Абу Валида аль-Сахрави. Президент Франции объявил о введении чрезвычайного положения и мобилизации всех имеющихся подразделений правоохранительных органов и Национальной гвардии для обеспечения безопасности Парижа и других крупных городов. Разведывательные и правоохранительные органы НАТО и Франции объявили о проведении масштабного расследования с целью раскрытия любых дальнейших заговоров и задержания в стране тех, кто может быть связан с этими нападениями. Франция сейчас находится в состоянии коллективного шока и скорби, поскольку нападение такого наглого характера и разрушения могут сравниться только с событиями 11 сентября в Соединенных Штатах. Однако, несмотря на траур, французские граждане и политики выразили сильное разочарование и гнев по поводу очевидной некомпетентности французских правоохранительных органов и разведывательных служб в выявлении теракта. Несомненно, это будет ужасный и исторический день в национальной памяти Франции..."
 france.64.a: "Ужас!"
 france.642.t: "Арестован Подрывник Собора Парижской Богоматери"
 france.642.d: "После напряженной охоты, охватившей всю страну, французские правоохранительные органы успешно задержали Рашида эль-Садера, ответственного за разрушительный взрыв в соборе Нотр-Дам. Благодаря многочисленным зацепкам и широкому сотрудничеству между НАТО и местными спецслужбами, эль-Садер был выслежен до конспиративной квартиры в пригороде Парижа, где он был взят под стражу без каких-либо инцидентов. \n\nАрест произошел на фоне усиленных мер безопасности по всей стране, пока граждане преодолевают последствия теракта. Президент Франции высоко оценил усилия правоохранительных органов, подчеркнув важность бдительности перед лицом террора. Расследование продолжается, и власти пытаются выявить возможных сообщников и другие заговоры."
 france.642.a: "Мы Их Поймали"
 france.643.t: "Террорист Собора Парижской Богоматери замечен на юге Турции"
 france.643.d: "В результате шокирующего поворота событий появились сообщения о том, что Рашид эль-Садер, печально известный террорист, стоявший за нападением на собор Нотр-Дам, был замечен на юге Турции. Очевидцы утверждают, что видели, как он садился в автомобиль, направлявшийся к границе с Сирией, что вызывает опасения, что он может избежать правосудия и скрыться в регионе, охваченном конфликтами. \n\nЭта новость потрясла Францию, где граждане надеялись на быстрое разрешение террористической атаки. Теперь власти столкнулись с мрачной реальностью: эль-Садер может скрыться от правосудия и перегруппироваться с экстремистскими элементами на Ближнем Востоке. Французское правительство координирует свои действия с турецкими и международными спецслужбами, чтобы найти и задержать его до того, как он исчезнет навсегда."
 france.643.a: "Чёрт!"
 france.644.t: "Сирийское правительство подтвердило гибель Террориста Собора Парижской Богоматери"
 france.644.d: "Правительство Сирии подтвердило, что Рашид эль-Садер, печально известный террорист, ответственный за теракт в соборе Нотр-Дам, был казнен по приказу президента Башара Асада. По словам сирийских чиновников, эль-Садер был задержан вскоре после пересечения границы, и, по данным разведки, он представлял значительную угрозу для региональной стабильности. \n\nКазнь вызвала бурную реакцию во Франции. Многие граждане выражают облегчение и гнев, чувствуя, что справедливость восторжествовала, но при этом досадуя, что не смогли сами привлечь эль-Садера к ответственности. Мнения политических лидеров разделились: одни приветствуют эту новость как победу над терроризмом, другие критикуют методы сирийского правительства и сомневаются в достоверности его заявлений."
 france.644.a: "Хм, что ж, спасибо, Башар..."
 france.65.t: "Нефтяные переговоры с Венесуэлой"
 france.65.d: "В свете растущего спроса на энергоносители и недавних перебоев с поставками французское правительство начало переговоры с Венесуэлой, чтобы обеспечить стабильные поставки нефти. Венесуэла, богатая природными ресурсами, но страдающая от международных санкций и экономических потрясений, рассматривает это как возможность укрепить свою экономику и восстановить свое место на мировом рынке. \n\nФранцузские чиновники стремятся выторговать выгодные условия, которые не только обеспечат энергетическую безопасность, но и поддержат восстановление Венесуэлы. Однако переговоры сопряжены со сложностями. Внутриполитические группировки Франции придерживаются разных взглядов на партнерство с режимом, который подвергается международной критике за нарушения прав человека."
 france.65.a: "Отправьте предложение"
 france.66.t: "Нефтяные переговоры с французами"
 france.66.d: "Умирает генерал Де Голль. И говорит он:\n- Исполните мое последнее желание. Хочу увидеть Фантомаса без маски.\nГенерал был не тот человек, которому можно было отказать. Задействованы были вся полиция и армия. Наконец привели Фантомаса, но в маске. Генерал приказал ему:\n- Сними маску.\n- Пусть все уйдут.\nВсе ушли и Фантомас снял маску. Посмотрел на него генерал и сказал со слезами\n- Да... и постарел же ты Василий Иванович.\n- Годы идут - ответил Фантомас - да и ты, Петька, уже не молод."
 france.66.a: "Мы можем это сделать"
 france.66.b: "Нет"
 france.68.t: "Венесуэла говорит "нет""
 france.68.d: "Неожиданный поворот событий: правительство Венесуэлы официально отклонило предложение Франции о заключении нефтяной сделки, сославшись на невыгодные условия и опасения по поводу влияния на национальный суверенитет. Венесуэльские чиновники заявили, что сделка недостаточно учитывает их экономические потребности и выдвигает условия, которые могут поставить под угрозу их автономию."
 france.68.a: "Бля."
 france.67.t: "Венесуэла говорит "да""
 france.67.d: "В результате значительной дипломатической победы Франции правительство Венесуэлы официально приняло пересмотренное предложение о поставках нефти, что ознаменовало новую эру сотрудничества между двумя странами. Новые условия, уважающие суверенитет Венесуэлы и обеспечивающие стабильные поставки нефти во Францию, были восприняты правительствами обеих стран как взаимовыгодное соглашение."
 france.67.a: "Ура"
 france.69.t: "Французские генералы обеспечивают безопасность правительства"
 france.69.d: "Трубы победы прозвучали во время первого публичного выступления высшего военного командования после воссоединения нашей любимой страны. Еще лучше звучали аплодисменты и радостные возгласы французского народа по всей стране, приветствовавшего и поддержавшего новый режим с распростертыми объятиями. Наши любимые военные уже шествовали по улицам Парижа с того момента, как были отвоёваны последние опорные пункты предателей. Это было время для празднования, но также и для усталости, поскольку наши испанские братья, как и мы, оставались в аналогичном конфликте, а наши германские соседи были втянуты в стремительную смену режима, в которой мы до сих пор не уверены. Сегодня мы поднимаем тост за наши многочисленные успехи и победы, достигнутые благодаря нашему мастерскому гамбиту, и смотрим в наше будущее и в неизбежные конфликты завтрашнего дня."
 france.69.a: "За наше будущее!"
 france.70.t: "Вилье объявляет о свободных выборах"
 france.70.d: "После ужаса Первой европейской войны и сползания Франции к националистическому, почти ультранационалистическому режиму никто не ожидал, что ветер снова подует в сторону демократии. Пока народ оставался в неведении, в скрытых внутренних механизмах Правительства национальной обороны начались медленные реформы.\n\nНачавшись с простой децентрализации полномочий Великого маршала, вскоре в голове Вилье зародилась подготовка к настоящему возвращению демократии. И хотя во Франции больше никогда не будет левого бедствия, иметь Францию - значит иметь демократию.\n\nКак и де Голль после Второй мировой войны, сильная личность Франции снова отпустила свою власть, чтобы не стать диктатором, никогда больше не ступать на этот темный путь. На его место пришли три партии, некогда отброшенные в сторону из-за внутренней работы Пятой республики, которые борются за власть и следующее президентство, причем все они примерно одинаково популярны."
 france.70.a: "Республиканизм возвращается"
 france.71.t: "Вилье Осуждает Радикальных Петенистов"
 france.71.d: ""В рядах нашего нового правительства есть сотни и сотни людей, которые готовы пойти дальше меня в борьбе за спасение Франции. И хотя мы с вами сплетены из одного венка, желая возвращения французского традиционализма и культуры, я должен осудить этих людей, их оголтелый авторитаризм и национализм."\n\nВилье говорил, сцепив руки на подиуме. Это было редкое проявление публичных намерений в новом правительстве, особенно для самого Великого маршала. Возможно, это был знак реформ, знак грядущих перемен.\n\n''Эти люди, они не... патриоты Франции. Они всего лишь люди, стремящиеся к собственной власти, идущие вразрез со всем, что мы отстаиваем как нация, как народ. Хотя мы верим в эту традицию, в эту систему, их жадность к власти и коррупция французского государства явственно и ощутимо проявляются в каждом их слове и поступке."\n\nОн сделал небольшую паузу, прежде чем продолжить, глядя на толпу с гордостью. Подобное никогда не могло произойти в старой Франции, той, которая развалила и сломала наследие государств прошлого.\n\n''Правительство национальной обороны - это не инструмент, который эти люди могут использовать, чтобы лишить нас свободы и рассматривать как свою личную вотчину. Это государство, в котором будут решены старые проблемы и Франция родится заново. Радикальному эгоизму здесь не место.""
 france.71.a: "Республика возвращается"
 france.72.t: "Верховное командование голосует за замену генерала [FAF.GetLeader]"
 france.72.d: ""
 france.72.a: "Поздравляю генерал Мадо"
 france.73.t: "Верховное командование голосует за замену генерала [FAF.GetLeader]"
 france.73.d: ""
 france.73.a: "Поздравляю генерал Боссера"
 france.74.t: "ерховное командование голосует за замену генерала [FAF.GetLeader]"
 france.74.d: ""
 france.74.a: "Поздравляю генерал Чесне"
 france.75.t: "Путч Молодых Офицеров"
 france.75.d: "После неоднократных смен власти группа молодых офицеров, в основном состоящих из ветеранов войны в Европе, совершила государственный переворот."
 france.75.a: "Salut!"
 france.76.t: "Генерал Лекуантр встречается с Луи Альфонсом де Бурбоном"
 france.76.d: "Вскоре после воссоединения нашей любимой страны СМИ, знаменитости, политики и другие видные деятели страны не сразу признали и выразили свою поддержку нашему режиму. Однако одна конкретная фигура выделялась из общей массы... Луи Альфонс де Бурбон. Хотя де Бурбон не имел официального политического статуса или должности, он уже успел прославиться в светской тусовке Франции. С ростом популярности и призывами к возвращению к традиционным временам де Бурбон разыгрывал свои карты во всех отношениях с влиятельными лицами Франции, такими как могущественные корпорации и даже бывшие королевские дома, которые когда-то занимали видное положение, когда Бурбоны правили Францией. Теперь, похоже, наши военные потянулись к королевским особам: недавно в поместье Бурбонов прибыл Франсуа Лекультр, что еще больше узаконило притязания де Бурбона как потенциального правителя французской нации."
 france.76.a: "Возвращение к Традициям?"
 france.77.t: "Лекуантр передает полный контроль Луи Альфонсу де Бурбону"
 france.77.d: "Луиза Альфонс де Бурбон совершила немыслимое во французской политике, заручившись поддержкой большинства членов Совета национальной обороны, которые поддержали его королевские притязания на руководство Францией. Мало того, в последние недели казалось, что даже граждане Франции хотят возвращения монархии: промонархические демонстрации и парады проходили в Париже и других крупных городах, казалось, каждый день. Было очевидно, что для безопасности Франции необходимо иметь сильного правителя, и лучшего, чем де Бурбон, было не найти."
 france.77.a: "Ultima Ratio Regum"
 france.78.t: "Коронация Людовика XX"
 france.78.d: "Луи Альфонс де Бурбон ждал этого дня с тех пор, как ему рассказали об истории и наследии его имени. С юных лет он знал, что ему суждено сесть на трон и править Францией так же, как это делали его предки на протяжении многих веков. Де Бурбон изучал и познавал ошибки Бурбонов и поклялся, что спасет Францию в это кризисное время, исправив ошибки своих предков. Настало время для коронации де Бурбона, ознаменовавшей начало новой эры в истории Франции."
 france.78.a: "Церемония, достойная короля!"
 france.79.t: "Выпущенные 10-летние облигации"
 france.79.d: "В рамках мер, направленных на стабилизацию экономики, Франция недавно объявила о выпуске новой серии дешевых 10-летних облигаций. Это решение отражает стратегию правительства по обеспечению долгосрочного финансирования различных инфраструктурных проектов и социальных программ. Выпуская эти облигации, правительство стремится воспользоваться преимуществами низких процентных ставок, обеспечивая рентабельное заимствование, чтобы компенсировать значительное увеличение расходов. Однако некоторые критики высказывают обеспокоенность по поводу потенциальных рисков накопления долгосрочного долга и того влияния, которое это может оказать на будущие поколения. Несмотря на эти опасения, размещение 10-летних облигаций представляет собой стратегический шаг правительства в финансировании своих приоритетов в области развития, в то же время ориентируясь в сложных условиях глобальной экономической динамики."
 france.79.a: "Нужно больше золота..."
 france.80.t: "Технократы получают больше власти"
 france.80.d: "После проведения во Франции политики, вдохновленной дирижизмом, влияние технократов резко возросло. Хотя эта политика была направлена на централизацию контроля и планирования в экономике, она непреднамеренно расширила полномочия технократов до такой степени, что подорвала демократическое управление. По мере того как технократы брали на себя большую ответственность за принятие решений, их специализированный опыт начал затмевать голоса избранных должностных лиц и широкой общественности."
 france.80.a: "Хорошо для них"
 france.81.t: "Правительство повторно объявляет о программе национального чемпиона"
 france.81.d: "Франция официально возродила кампанию "Национальные чемпионы", повторяя политику дирижизма прошлого. Эта амбициозная инициатива направлена на выявление и поддержку ключевых французских компаний, особенно в таких важных секторах, как технологии, аэрокосмическая промышленность и энергетика, которые считаются жизненно важными для национальных интересов. Поддерживая этих "чемпионов", Франция стремится повысить их глобальную конкурентоспособность и обеспечить им постоянную роль в формировании экономической повестки дня страны. Однако этот шаг вызвал споры о его последствиях для рыночной конкуренции и баланса между вмешательством государства и частного предпринимательства."
 france.81.a: "Клёво"
 france.82.t: "День Взятия Бастилии"
 france.82.d: "Париж был охвачен патриотическим пылом, когда проходил ежегодный парад в честь Дня взятия Бастилии, демонстрирующий военную доблесть Франции. Парад, являющийся символом национального единства и гордости, включал в себя грандиозную демонстрацию военной техники, включая танки, самолеты и четкий марш военнослужащих вооруженных сил. Зрители со всего мира восхищались этим зрелищем, которое подчеркивало приверженность Франции обороне и ее роль как мировой военной державы. По завершении парада президент Франции выступил с воодушевляющей речью, в которой подтвердил приверженность страны миру, безопасности и солидарности со своими союзниками. Мероприятие послужило напоминанием об историческом наследии Франции и ее непреходящем духе стойкости и силы."
 france.82.a: "Vive la France"
 france.83.t: "Франция предлагает крупную торговую сделку между ЕС и ОДТО"
 france.83.d: "После гражданской войны в Америке французское правительство от имени Европейского союза направило официальное предложение Организации Тихоокеанского оборонного договора о подписании эксклюзивных соглашений о свободной торговле. С целью восстановления их экономик и содействия взаимному росту, эти соглашения установят преференциальные условия торговли между двумя странами в обход традиционных торговых барьеров. Предложение поступило в критический момент, когда обе страны стремятся оживить свою промышленность и обеспечить стабильную экономическую основу в постамериканскую эпоху."
 france.83.a: "Кольца свободы, с Америкой или без нее"
 france.83.b: "Спасибо... но нет, спасибо"
 france.84.t: "Мэр Нормандии замешан в коррупционном скандале"
 france.84.d: "В условиях общенациональной борьбы с коррупцией, проводимой французским правительством, мэр Нормандии оказался втянут в скандал, связанный с обвинениями в растрате и взяточничестве. Скандал вызвал волну возмущения по всему региону, запятнав репутацию мэра и вызвав вопросы о честности местных чиновников. Французское правительство поклялось искоренить коррупцию на всех уровнях общества, и это последнее заявление служит суровым напоминанием о трудностях, с которыми оно сталкивается в своем крестовом походе против коррупции. По мере продолжения расследования и разгорания скандала будущее руководства Нормандии висит на волоске, заставляя граждан и чиновников гадать, кто еще может быть вовлечен в эту паутину обмана."
 france.84.a: "Массированный удар по республиканцам!"
 france.85.t: "L'Oreal расширяет своё производство в сфере Медицинского Оборудования"
 france.85.d: "В качестве стратегического ответа на увеличение налоговых льгот, предоставляемых французским правительством компаниям, занимающимся производством военной техники для государственных нужд, L'Oreal объявила о неожиданной смене акцента. Косметический гигант теперь занимается производством медицинского оборудования, в том числе современных расходных материалов медицинского назначения. Этот шаг подчеркивает стремление L'Oreal к диверсификации и инновациям, используя свой производственный опыт для удовлетворения важнейших потребностей, выходящих за рамки индустрии красоты. Переход L'Oreal в этот новый сектор свидетельствует о способности компании адаптироваться и готовности вносить свой вклад в решение более широких национальных задач, выходящих за рамки ее традиционной сферы деятельности."
 france.85.a: "Потому что Франция того стоит"
 france.86.t: "Группа SEB производит излишки военной электроники"
 france.86.d: "В ответ на увеличение налоговых льгот французского правительства для компаний, занимающихся производством военной техники, Group SEB объявила о стратегическом переходе на производство излишков военной электроники. Этот неожиданный шаг подчеркивает гибкость и приверженность Группы SEB поддержке национальных оборонных инициатив. Используя свой опыт в производстве электроники, Группа SEB стремится внести свой вклад в модернизацию военной техники, используя при этом налоговые льготы правительства. Это решение подчеркивает универсальность группы SEB и ее готовность адаптироваться к меняющейся динамике рынка, что позиционирует компанию как ключевого игрока в оборонном секторе."
 france.86.a: "От кухни к бою!"
 france.87.t: "Airbus инвестирует в новые авиабазы"
 france.87.d: "В связи с решением правительства Франции увеличить налоговые льготы для компаний, занимающихся производством военной техники, Airbus обнародовал планы по инвестированию в новые авиабазы. Этот стратегический шаг направлен на укрепление оборонной инфраструктуры страны, используя при этом налоговые льготы, предоставляемые правительством. Расширяя свое присутствие в военном секторе, Airbus стремится укрепить свои позиции в качестве ключевого игрока в оборонной промышленности. Инвестиции в новые авиабазы подчеркивают приверженность Airbus поддержке приоритетов национальной обороны и расширению своих возможностей в секторе военной авиации."
 france.87.a: "Готов к взлету!"
 france.88.t: "Российская яхта захвачена французскими властями"
 france.88.d: "Напряженность в отношениях между Россией и Францией возросла после того, как французские власти захватили российскую яхту, что привело к резкой эскалации дипломатических споров. Яхта, принадлежащая известному российскому олигарху, была задержана у берегов Марселя по подозрению в причастности к незаконной деятельности. Инцидент вызвал возмущение со стороны российских официальных лиц, которые осудили захват как неоправданный акт агрессии. Однако французское правительство заявило, что его действия являются частью более широкой борьбы с незаконной деятельностью. Захват российской яхты обострил отношения между двумя странами, вызвав опасения по поводу возможной дальнейшей эскалации."
 france.88.a: "Плывя в Штормовые Воды."
 france.89.t: "Предложить американским компаниям убежище"
 france.89.d: "В рамках стратегического шага, направленного на укрепление собственной экономики, Франция предложила убежище небольшим американским компаниям в период начала второй гражданской войны в Америке. Предложение французского правительства, хотя и выглядит альтруистичным, продиктовано желанием привлечь известные фирмы, которые могли бы стимулировать рост и инновации в пределах страны. Такие компании, как Tesla, Amazon Web Services и Uber Technologies, стали объектом особого внимания, и их переезд рассматривается как потенциальное благо для французской промышленности. Эта инициатива подчеркивает прагматичный подход Франции к международным делам, использующий кризисы в других странах для укрепления собственного экономического положения."
 france.89.a: "Добро пожаловать в свой дом вдали от дома!"
 france.90.t: "Génération Identitaire Запрещены"
 france.90.d: "В качестве решительного шага в борьбе с экстремизмом французское правительство официально запретило движение "Сторонники идентичности". Группа, известная своей националистической и антииммигрантской позицией, была признана угрозой национальной безопасности и социальной сплоченности. Запрет был введен после пристального изучения деятельности группы и растущих опасений по поводу ее влияния на общественное мнение. Правительство Франции заявило, что не потерпит экстремизма в любой форме, который подрывает ценности страны - свободу, равенство и братство. Запрет на "идентаристов" знаменует собой важный шаг в усилиях Франции по борьбе с радикальными идеологиями и поощрению инклюзивности и терпимости."
 france.90.a: "Свобода, Равенство, Изгнание!"
 france.91.t: "Франция гарантирует продолжение военного участия"
 france.91.d: "Несмотря на свое решение о выходе из Объединенного командования НАТО, французское правительство предприняло шаги, чтобы заверить своих союзников по НАТО в своей непоколебимой приверженности военному альянсу. Франция подчеркнула, что, стремясь к большей независимости в своей оборонной политике, она по-прежнему привержена основным принципам коллективной обороны и сотрудничества НАТО. Заявление французского правительства прозвучало на фоне обеспокоенности членов НАТО последствиями выхода Франции из Объединенного командования. Неизменная приверженность Франции своим союзникам по НАТО подчеркивает ее веру в важность многостороннего сотрудничества для поддержания глобальной безопасности и стабильности."
 france.91.a: "Но почему сейчас?"
 france.92.t: "Франция покидает интегрированную командную структуру НАТО"
 france.92.d: "Смело заявляя о своем суверенитете и стратегической автономии, правительство Франции объявило о своем решении выйти из состава Объединенного командования НАТО. Этот исторический шаг свидетельствует о значительном изменении подхода Франции к своей оборонной политике и ее отношениям с НАТО. Президент [FRA.GetLeader] подчеркнул, что, хотя Франция по-прежнему привержена основным принципам коллективной обороны НАТО, решение о выходе из Объединенного командования отражает ее решимость самостоятельно формировать свою собственную военную стратегию.\n\nЭто решение вызвало споры внутри НАТО и среди европейских союзников, некоторые из которых выразили обеспокоенность по поводу последствий для европейского оборонного сотрудничества. Однако Франция заверила своих союзников в том, что ее приверженность общим целям НАТО остается непоколебимой. Этот шаг французского правительства рассматривается как стратегическая перекалибровка, позволяющая Франции проявлять большую гибкость в принятии оборонных решений при сохранении ее приверженности европейской безопасности и стабильности."
 france.92.a: "Интересное развитие событий"
 france.921.t: "Франция Покидает Интегрированную Командную Структуру НАТО"
 france.921.d: "Смело заявляя о своем суверенитете и стратегической автономии, французское правительство объявило о решении выйти из состава Объединенного командования НАТО. Этот исторический шаг свидетельствует о значительном изменении подхода Франции к своей оборонной политике и отношениям с НАТО. Президент [FRA.GetLeader] подчеркнул, что, хотя Франция остается приверженной основным принципам коллективной обороны НАТО, решение о выходе из состава Объединенного командования отражает ее решимость самостоятельно формировать свою военную стратегию. \n\nЭто решение вызвало дебаты в НАТО и среди европейских союзников, некоторые выразили обеспокоенность последствиями для европейского оборонного сотрудничества. Однако Франция заверила своих союзников, что ее приверженность общим целям НАТО остается непоколебимой. Этот шаг французского правительства рассматривается как стратегическая перестройка, позволяющая Франции более гибко принимать решения в области обороны, сохраняя при этом свою приверженность европейской безопасности и стабильности."
 france.921.a: "Франция одна выбирает свою судьбу"
 france.93.t: "Ребрендинг Rassemblement National"
 france.93.d: "После своей победы на выборах 2022 года Марин Ле Пен предприняла смелую попытку ребрендинга, преобразовав Национальное объединение в Республиканский союз. Эта новая партия знаменует собой отход от своих ультраправых корней и принятие правоцентристской политической идентичности. Ребрендинг направлен на повышение привлекательности партии и продвижение к более умеренным позициям в политическом спектре. Республиканский союз стремится объединить различные консервативные фракции под единым знаменем, представляя себя в качестве жизнеспособной альтернативы существующим партиям. Стратегический ребрендинг Ле Пен отражает целенаправленные усилия по изменению имиджа партии и привлечению более широкого круга избирателей, сигнализируя о значительном сдвиге во французской политике."
 france.93.a: "Издалека - в Центр!"
 france.94.t: "Жан-Мари Ле Пен умирает"
 france.94.d: "Франция скорбит в связи с кончиной Жан-Мари Ле Пена, выдающейся фигуры в ее политической жизни. Основатель "Национального фронта" Ле Пен был противоречивой фигурой, известной своими убежденными националистическими и антииммигрантскими взглядами. Несмотря на свой полярный характер, Ле Пен был огромной силой во французской политике, определявшей дебаты и политику на протяжении десятилетий. Его смерть знаменует собой конец целой эпохи и оставляет пустоту на политической арене. В то время как Франция размышляет о его наследии, будущее националистического движения, которое он возглавлял, остается неопределенным."
 france.94.a: "Менгир наконец-то пал."
 france.94.b: "Европа не проливает слез по его утрате."
 france.94.c: "Au revoir, papa."
 france.94.e: "Один из последних великих людей Франции"
 france.94.f: "Фашистский дьявол Республики, наконец, испустил свой последний вздох."
 france.94.g: "Истинный патриот покоится с миром."
 france.94.h: "Когда-то он был провидцем..."
 france.941.t: "Утраченное Наследие Французской Гордости"
 france.941.d: "В тяжелый для страны момент скончался Жан-Мари Ле Пен, убежденный защитник французского национализма. Его пожизненная приверженность сохранению французского наследия и суверенитета сделала его одним из лидеров тех, кто сопротивлялся вторжению глобалистских программ. Непримиримая позиция Ле Пена в отношении массовой иммиграции и его непоколебимая приверженность французским традициям вызвали у него как восхищение, так и осуждение. Для своих сторонников он был героем, который бесстрашно отстаивал ценности и самобытность Франции. Для своих недоброжелателей он был символом нетерпимости и раскола. Независимо от точки зрения, влияние Ле Пен на французскую политику и культуру неоспоримо.\n\nЕго уход оставляет пустоту в националистическом движении, но его наследие будет жить вечно. В то время как Франция борется за свое будущее, наследие Ле Пен служит напоминанием о важности защиты национальной идентичности во все более глобализирующемся мире. Мы, его сторонники, клянемся продолжать его миссию, гарантируя, что его видение гордой и независимой Франции сохранится."
 france.941.a: "Vive la France, Навсегда!"
 france.95.t: "Роспуск Reconquête"
 france.95.d: "В результате неожиданного поворота событий ультраправое движение "Reconquête" объявило о своем роспуске. Движение, известное своей националистической и антииммигрантской позицией, в качестве причин своего роспуска назвало внутренние разногласия и отсутствие жизнеспособного политического пути продвижения вперед. Внезапный роспуск "Reconquête" знаменует собой окончание противоречивой главы во французской политике, заставив многих ее сторонников и критиков задуматься о ее последствиях. С уходом Reconquête с политической сцены будущее ультраправой политики во Франции становится неопределенным, что открывает новые возможности и бросает вызов политическому ландшафту страны."
 france.95.a: "Reconquête Отступает"
 france.96.t: "Revolution et Renouveau образуется"
 france.96.d: "Новая ультраправая партия "Revolution et Renouveau" возникла из остатков расформированной партии Эрика Земмура "Reconquête" и фашистских сторонников Ивана Бенедетти. Однако формирование партии не обошлось без проблем, поскольку Земмур и Бенедетти столкнулись с разногласиями по поводу руководства и идеологии. Оба лидера соперничают за то, чтобы захватить контроль над партией, и каждый стремится привнести свое видение в ее руководство. По мере нарастания напряженности между двумя фракциями "Revolution et Renouveau" оказывается на перепутье, и ее будущее направление висит на волоске."
 france.96.a: "Бенедетти обходит Земмура"
 france.96.b: "Земмур торжествует!"
 france.97.t: "Ле Пен встречается с лидерами оппозиции и военными аналитиками"
 france.97.d: "После своей победы на президентских выборах 2022 года Марин Ле Пен предприняла решительные действия по противодействию надвигающейся угрозе дальнейшей российской агрессии. Совершив исторический шаг, она провела переговоры с лидерами оппозиции, включая бывшего президента Макрона, членами "Модерн", "Республиканцев" и "Горизонтов", а также военными аналитиками, чтобы сформировать правительство национального единства. Цель этой коалиции - выступить единым фронтом против потенциальной российской агрессии, продемонстрировав приверженность обороне и безопасности Франции. Переговоры представляют собой важный момент двухпартийного сотрудничества, свидетельствующий о едином ответе Франции на внешние угрозы."
 france.97.a: "Франция единая, непокорная!"
 france.971.t: "Десятилетние Кредиты Заканчиваются"
 france.971.d: "Спустя десять лет наступил крайний срок. Взятые нами в тот период кредиты снова дали о себе знать, образовав еще один ряд долгов, которые мы должны спешно погасить. В то время как наша экономика уже сократилась из-за различных кризисов, присущих этому времени, это еще одна проблема, с которой мы должны бороться, поскольку сделки начинают подходить к концу."
 france.971.a: "Дерьмо."
 france.98.t: "Правительство национального единства объявлено"
 france.98.d: "В историческом обращении к нации Марин Ле Пен, окруженная бывшим президентом Макроном и коалицией лидеров оппозиции, военных аналитиков и ключевых фигур из Modern, Les Republicains и Horizons, официально объявила о создании правительства национального единства. Эта новаторская коалиция, созданная по необходимости в условиях эскалации российской агрессии, представляет собой смену парадигмы французской политики. Формирование правительства подчеркивает приверженность приоритету национальной безопасности и единства над партийными интересами. По мере того как Ле Пен подробно описывает цели и структуру правительства, излагает планы скоординированных оборонных стратегий и дипломатических усилий, среди французского населения растет чувство осторожного оптимизма. Единство, проявленное этими некогда противоборствующими группировками, знаменует собой новую главу в истории Франции, в которой солидарность и сотрудничество преобладают перед лицом невзгод."
 france.98.a: "Франция БУДЕТ существовать"
 france.99.t: "Избиратели стекаются к радикальным партиям"
 france.99.d: "После объявления о создании правительства национального единства значительная часть избирателей переключила свою поддержку на националистические и коммунистические партии. Популярность таких партий, как "Революция и обновление" и Французская коммунистическая партия, резко возросла. Внезапный приток поддержки этих партий отражает чувство разочарования среди избирателей, которые чувствуют отчуждение от ставшего массовым и сплоченным основного политического истеблишмента. По мере того как правительство национального единства пытается справиться с вызовами, вызванными российской агрессией, политический ландшафт Франции претерпевает кардинальные изменения, подготавливая почву для новой эры политической конкуренции и идеологической конфронтации."
 france.99.a: "Целая кучка предателей"
 france.100.t: "Американская Иммиграционная Политика"
 france.100.d: "Поскольку Вторая гражданская война в Америке продолжает опустошать Соединенные Штаты, растущая волна американских граждан бежит от насилия и хаоса в поисках убежища за границей, и значительное число из них ищет утешения во Франции. Путь к безопасности сопряжен с опасностями, многие сталкиваются с опасными условиями и постоянной угрозой насилия. Семьи распадаются, дома разрушаются, а средства к существованию теряются, поскольку конфликт не проявляет признаков ослабления.\n\nПрибыв во Францию, эти иммигранты оказываются в сложной ситуации, оказавшись в чужой стране с неопределенными перспективами. Французское правительство, хотя и сочувствует их бедственному положению, с трудом справляется с наплывом беженцев, что приводит к переполненности приютов и нехватке ресурсов. Несмотря на эти трудности, иммигранты остаются жизнерадостными, не теряя надежды на лучшее будущее на своей новой родине.\n\nОднако французскому правительству предстоит принять непростое решение относительно своей миграционной политики в свете притока американских иммигрантов. Оно должно взвесить необходимость сострадания и гуманитарной помощи с точки зрения безопасности и экстремизма."
 france.100.a: "Ничего менять не нужно"
 france.100.b: "Немедленный въезд для всех просящих"
 france.100.c: "Мы не можем допустить, чтобы радикалы запятнали наше правительство"
 france.101.t: "Сежурне встречается с Меланшоном"
 france.101.d: "В качестве важного шага к объединению прогрессивных сил во Франции Стефан Сежурне организовал встречу с Жан-Люком Меланшоном, лидером "Непримиримой Франции". Цель этой встречи - изучить возможности сотрудничества и создать коалицию, которая усилит их общие цели - социальную справедливость, экологическую устойчивость и экономические реформы. \n\nВ ходе беседы Сежурне и Меланшон затронут такие ключевые вопросы, как борьба с изменением климата, права рабочих и неравенство доходов. Они признают силу единого фронта, способного противостоять растущему влиянию правого популизма и найти отклик у избирателей, стремящихся к прогрессивным переменам."
 france.101.a: "Так... Есть ли у нас ваш голос?"
 france.102.t: "Макрон уходит в отставку"
 france.102.d: "После официального поражения в попытке избраться на третий президентский срок бывший президент Эммануэль Макрон объявил о своем уходе из политической жизни, оставив Стефана Сежурне лидером Партии Возрождения. \nВ своей инаугурационной речи Сежурне подчеркнул важность единства и стойкости, призвав вновь сосредоточиться на прогрессивных ценностях, экономических реформах и укреплении европейских связей. Он признал, что перед ним стоят сложные задачи, особенно в решении проблем избирателей, которые отвернулись от Ле Пен, и подчеркнул необходимость проведения инновационной политики, которая нашла бы отклик у более широких слоев населения."
 france.102.a: "Юпитер пал"
 france.103.t: "Сежурне встречается с Гонтаром"
 france.103.d: "В качестве стратегического шага, направленного на активизацию партии "Возрождение", Стефан Сежурне встретился с Гийомом Гонтаром, ключевой фигурой в экологическом и прогрессивном движениях. Эта встреча знаменует собой важный шаг на пути превращения "Ренессанса" в левоцентристскую партию, которая в большей степени соответствует современным проблемам, связанным с изменением климата, социальной справедливостью и экономическим равенством. \n\nВ ходе беседы Сежурне и Гонтар рассмотрели различные политические инициативы, которые могли бы привлечь более широкую базу, сделав акцент на устойчивом развитии, зеленых технологиях и инклюзивной социальной политике. Они признали важность обращения к молодым избирателям и городскому населению, которое все больше вовлекается в вопросы борьбы с изменением климата и социального равенства."
 france.103.a: "Мы должны объединиться в борьбе с изменением климата"
 france.104.t: "Рождение Республики, Марш!"
 france.104.d: "В знаменательный для французской политики момент из союза "зеленых", "Франс инсумиз" и партии "Возрождение" была официально сформирована новая политическая партия "Une République, Une Marche!". Эта коалиция призвана выступить единым фронтом в решении насущных проблем изменения климата, социальной справедливости и экономического равенства. \n\nИнаугурационная встреча "Une République, Une Marche!" собрала тысячи восторженных сторонников, отражая всеобщее желание иметь последовательную прогрессивную альтернативу в политическом ландшафте. Лидеры всех трех партий выступили с мощными речами, в которых подчеркнули свою приверженность преобразовательной политике и демократическим ценностям."
 france.104.a: "Марш!"
 france.105.t: "ЕРЕМ призывает к расследованию фальсификаций на выборах"
 france.105.d: "В качестве смелого шага партия "Объединенная республика, объединенный марш!" официально призвала к проведению всестороннего расследования обвинений в фальсификации результатов недавних выборов. Лидеры партии выражают обеспокоенность по поводу честности избирательного процесса, призывая к прозрачности и подотчетности для восстановления общественного доверия. \n\nНа пресс-конференции представители партии рассказали о различных всплывших сообщениях о нарушениях, подчеркнув необходимость тщательного расследования, чтобы убедиться, что каждый голос был подсчитан справедливо.  Лидеры партии выражают обеспокоенность по поводу честности избирательного процесса, ссылаясь на сообщения о нарушениях и, в частности, на заявления о возможном вмешательстве России с целью повлиять на результаты выборов. \n\nНа пресс-конференции представители партии рассказали о различных выявленных нарушениях, подчеркнув необходимость прозрачности и подотчетности для восстановления общественного доверия. УРУМ рассматривает эту инициативу как приверженность демократическим принципам и защите прав граждан, утверждая, что любые потенциальные нарушения, включая иностранное вмешательство, должны быть устранены, чтобы поддержать легитимность избирательной системы."
 france.105.a: "Пересчитывайте! Пересчитывайте! Пересчитывайте!"
 france.106.t: "Совет ЕРЕМ не обнаружил масштабных фальсификаций на выборах"
 france.106.d: "После нескольких недель расследования и анализа совет URUM опубликовал свои выводы, заключив, что нет никаких доказательств масштабного мошенничества на недавних выборах. В отчете совета рассматриваются опасения сторонников по поводу честности избирательного процесса, включая обвинения в иностранном вмешательстве. \n\nХотя в отчете признаются некоторые незначительные нарушения, в нем подчеркивается, что они не представляют значительной угрозы для общей честности выборов. Лидеры УРУМ заявили, что результаты исследования должны успокоить избирателей в отношении демократического процесса, и они по-прежнему намерены выступать за прозрачность и реформу избирательной системы, где это необходимо."
 france.106.a: "Надо было поучиться у Хиллари..."
 france.107.t: "Позиция ЕРЕМ в отношении федерализации ЕС"
 france.107.d: "УРУМ находится на решающем этапе, когда дискуссии о будущем Европейского союза усиливаются. Партия должна ориентироваться в сложном ландшафте, где федерализация является как потенциальным путем к большему единству между странами-членами, так и источником беспокойства для многих граждан. Учитывая растущие проблемы, такие как изменение климата, экономическое неравенство и угрозы безопасности, URUM считает, что Франция должна взять на себя активную роль в отстаивании федерализации Европы. Партия видит в этом возможность для продвижения сильного французского лидерства, которое может способствовать значимым изменениям в континентальном масштабе. Однако URUM также прекрасно осознает риски, которые несет федерализация, особенно в отношении прав и защиты национальных работников. Партия признает, что без надлежащих гарантий федеральная политика может подорвать местные трудовые права и социальную защиту. Поэтому URUM должна тщательно продумать, как сбалансировать свою поддержку европейской интеграции с обязательством защищать интересы французских рабочих. Это решение определит не только будущий курс партии, но и ее отношения с избирателями, поскольку Франция пытается определить свое место в развивающейся Европе."
 france.107.a: "Франция должна привести Европу в эпоху федерализации"
 france.107.b: "Франция должна быть активным участником европейских дел"
 france.107.c: "Федерализация - это способ подорвать позиции национальных работников"
 france.108.t: "Ле Пен уходит в отставку"
 france.108.d: "Марин Ле Пен объявила, что не планирует возвращаться на пост главы своей правой партии "Национальное объединение", вместо этого она возглавит фракцию в Национальном собрании. Национальное ралли избрало новым президентом вместо Марин Ле Пен 27-летнего выходца из парижских кварталов, который вступил в партию подростком.\nЖордан Барделла, протеже Ле Пен, который был временным президентом в течение года, победил Луи Алио, 53-летнего мэра Перпиньяна, тяжеловеса партии, а также бывшего партнера Ле Пен, на 85% против 15% голосов членов партии, принявших участие в голосовании."
 france.108.a: "Мы вернемся, Макрон..."
 france.110.t: "Жан-Мари Ле Пен госпитализирована"
 france.110.d: "К сожалению, Жан-Мари Ле Пен, политик-ветеран и основатель Национального фронта, был госпитализирован после того, как у него случился кризис здоровья, вызванный стрессом после поражения его дочери на недавних президентских выборах. Поражение вызвало волнения в партии, которая возлагала большие надежды на победу. Члены семьи сообщают, что старший Ле Пен глубоко переживает этот результат, испытывая чувство глубокого разочарования и беспокойства за будущее правого движения во Франции. \n\nПо мере того как распространяются новости о его госпитализации, сторонники и критики реагируют на них со смешанным чувством беспокойства и спекуляций. Многие внутри партии объединяются вокруг Марин Ле Пен, призывая к единству, пока они пересматривают свои стратегии на будущее. Ситуация вновь вызвала дискуссии о будущем направлении Национального фронта и проблемах, с которыми он сталкивается в условиях меняющегося политического ландшафта. Тем временем за здоровьем Жан-Мари Ле Пена будут пристально следить, поскольку его влияние и наследие продолжают оставаться значимыми для партии."
 france.110.a: "Грустный День"
 france.109.t: "Барделлу застукали в гостях у Жан-Мари Ле Пен"
 france.109.d: "Удивительное событие: Джордан Барделла, молодой президент Национального ралли, был сфотографирован навещающим Жан-Мари Ле Пен в больнице вместе с бывшими партийными деятелями Карлом Лангом и Бруно Голлнишем. Этот визит вызвал пристальное внимание СМИ и спекуляции о будущем партии, особенно в свете недавнего поражения на выборах и ухудшения здоровья Жан-Мари. Присутствие Ланга и Голлниша, известных своими традиционалистскими и жесткими взглядами, вызывает вопросы об идеологическом направлении, которого намерен придерживаться Барделла. \n\nПо мере того, как появляются подробности визита, мнения комментаторов расходятся. Сторонники видят в нем жест уважения и единства в рамках наследия партии, в то время как критики предупреждают, что он сигнализирует о возможном возвращении к более радикальным корням Национального фронта. Руководство Барделлы характеризуется стремлением модернизировать имидж партии, но эта встреча может усложнить эту картину. Результаты этого визита могут повлиять на будущие стратегии партии и ее способность привлекать более широкий электорат, поскольку она ориентируется в меняющемся политическом ландшафте."
 france.109.a: "Не лезьте не в свое дело..."
 france.111.t: "Барделла встречается с фельдмаршалом Вилье"
 france.111.d: "В ходе важной политической встречи Жордан Барделла, президент Национального объединения, встретился с фельдмаршалом Пьером де Вилье, чтобы выразить свое общее разочарование по поводу все более либеральной политики президента Макрона. Оба деятеля, представляющие различные аспекты французских правых, выразили свою озабоченность по поводу предполагаемого отхода от традиционных ценностей и национальных интересов под руководством Макрона. В центре дискуссии были такие вопросы, как иммиграция, безопасность и национальный суверенитет. Барделла подчеркнул необходимость более жесткой позиции в отношении того, что он назвал "либеральным перегибом". \n\nФельдмаршал де Вилье, известный своим сильным военным прошлым и консервативными взглядами, поддержал Барделлу, предупредив, что политика нынешней администрации угрожает ткани французского общества. Их встреча свидетельствует о потенциальном союзе между авторитетными военными и молодым политическим руководством Национального объединения, стремящимся объединить различные фракции правых против общего противника. По мере того как они изучают стратегии сотрудничества, последствия этого партнерства могут изменить политический ландшафт и мобилизовать поддержку разочарованных избирателей, стремящихся к более традиционному подходу к управлению."
 france.111.a: "Умный мужик"
 france.112.t: "Формирование Правильного Пути"
 france.112.d: "В качестве смелого шага по консолидации ультраправых сил во Франции Национальное объединение, возглавляемое Джорданом Барделлой, официально объявило о создании новой коалиционной партии под названием Le Droit Chemin. Эта коалиция объединяет Национальное ралли с партией Reconquête, основанной Эриком Земмуром, и различными небольшими ультраправыми партиями. Цель - создать более грозное политическое образование, способное бросить вызов основным партиям и эффективно представлять интересы националистов и консерваторов, разочарованных нынешней администрацией. \n\nLe Droit Chemin стремится извлечь выгоду из растущего недовольства либеральной политикой президента Макрона, представляя себя как единый фронт, для которого приоритетными являются такие вопросы, как контроль над иммиграцией, национальный суверенитет и традиционные ценности. Лидеры партий-участниц выразили оптимизм по поводу того, что эта коалиция укрепит их электоральные шансы и предоставит четкую альтернативу статус-кво. По мере того как новая партия будет позиционировать себя в политическом ландшафте, ее способность поддерживать единство между различными фракциями будет иметь решающее значение для продвижения на предстоящих выборах и мобилизации поддержки избирателей."
 france.112.a: "В странные времена мы живем..."
 france.113.t: "Левые из "Возрождения" вступают в Народный Фронт"
 france.113.a: "Так называемые Социал-Либералы..."
 france.113.d: "В результате стратегического сдвига, направленного на укрепление левого политического ландшафта во Франции, "Левое возрождение", фракция в партии Макрона, официально присоединилась к Новому народному фронту. Эта коалиция стремится объединить различные прогрессивные группы, чтобы бросить серьезный вызов политике правых. Возглавляет эту инициативу Стелла Дюпон, видный деятель левого крыла "Возрождения", которая выступает за создание новой социал-демократической группы, способной эффективно привлечь поддержку разочарованных членов партии Макрона. \n\nДюпон предлагает создать единую платформу, которая будет решать такие насущные проблемы, как социальная справедливость, экономическое равенство и экологическая устойчивость. Объединившись с Новым народным фронтом, она намерена консолидировать левые силы и повысить их значимость на политической арене. Ожидается, что партнерство мобилизует избирателей, которые ищут альтернативу центристской политике нынешней администрации, а также возродит чувство надежды среди прогрессивных избирателей. Успех Нового народного фронта будет зависеть от того, насколько ему удастся объединить эти разнородные фракции и сформулировать четкую и убедительную программу действий на будущее."
 france.114.t: "Народ требует Референдума по Новой Республике!"
 france.114.d: "На волне гражданской активности граждане по всей Франции объединились в широкомасштабное движение с требованием провести референдум о создании Шестой республики. Этот призыв к переменам вызван всеобщим недовольством существующей политической системой, предполагаемой коррупцией и стремлением к более широкому демократическому представительству. Активисты утверждают, что новая республика сможет лучше отразить потребности и ценности французского народа, отойдя от централизованной власти, характерной для предыдущих администраций."
 france.114.a: "Мы поняли"
 france.115.t: "Меланшон арестован за государственную измену Франции"
 france.115.d: "При ошеломляющем повороте событий Жан-Люк Меланшон был арестован по обвинению в государственной измене Франции. \nАрест, произведенный французскими правоохранительными органами по приказу президента Вилье, последовал за тщательным расследованием, в ходе которого были обнаружены существенные доказательства, свидетельствующие о причастности Меланшона к деятельности, которая считается наносящей ущерб интересам страны. Хотя конкретные детали, связанные с обвинениями, остаются нераскрытыми, считается, что Меланшон был причастен к фактам, которые угрожали суверенитету, безопасности или стабильности Франции во время выборов 2022 года. Арест вызвал волну реакций по всему политическому спектру, причем официальные лица выражали смесь удивления и озабоченности. \nПравительство подчеркнуло важность поддержания верховенства закона и сохранения национальной целостности перед лицом любых угроз благосостоянию нации. Меры безопасности были усилены в различных критически важных местах, включая правительственные здания и общественные места, поскольку власти сохраняют бдительность после этого ареста. Это событие также вызвало дискуссии о необходимости принятия более строгих мер для защиты страны от потенциальных внутренних угроз."
 france.115.a: "Наконец-то!"
 france.116.t: "Вилье встречается с Земмуром в Елисейском дворце"
 france.116.d: "Президент Пьер де Вилье провел важную встречу со своим оппонентом Эриком Земмуром, чтобы изучить возможность объединения их соответствующих партий. Встреча, проходившая за закрытыми дверями, вызвала множество спекуляций и привлекла внимание всего политического спектра. Президент де Вилье встретился с Земмуром, известным политическим комментатором и бывшим кандидатом в президенты, в неизвестном месте, чтобы обсудить потенциал партийного единства. Хотя детали встречи остаются конфиденциальными, считается, что два деятеля провели откровенный и углубленный разговор об их общих целях, идеологической ориентации и потенциальных преимуществах объединенной консервативной партии."
 france.116.a: "Земмур клянется в своей верности"
 france.117.t: "Избиратели французских колледжей проявляют повышенный интерес к монархизму после выборов"
 france.117.d: "Недавний опрос, проведенный в университетах Франции, выявил неожиданный рост поддержки монархизма среди студенческих избирателей после избрания президентом Пьера де Вилье. Результаты опроса указывают на заметный сдвиг в политических предпочтениях молодежи, при этом все большее число студентов проявляют интерес к изучению альтернативных форм правления. \nРост монархических настроений среди избирателей колледжа можно отчасти объяснить сильными лидерскими качествами президента де Вилье и его акцентом на стабильность, традиции и национальное единство. Его президентство вызвало дискуссии о роли конституционной монархии в современном обществе, причем сторонники утверждают, что монарх мог бы служить объединяющим символом и обеспечивать ощущение преемственности среди политических и социальных вызовов. Результаты опроса также свидетельствуют о том, что молодые избиратели ищут альтернативы традиционному политическому разделению на левых и правых и открыты для изучения различных политических идеологий. Монархизм, когда-то считавшийся второстепенной идеей, завоевал популярность среди студентов колледжей, которые видят в нем отход от недостатков нынешней политической системы."
 france.117.a: "Королевское Возрождение?"
 france.118.t: "Военный Марш в Париже"
 france.118.d: "В качестве проявления патриотизма и национального единства президент Пьер де Вилье организовал грандиозный военный марш, который привлек внимание граждан по всей Франции. Мероприятие, проходившее по всему Парижу, продемонстрировало глубокую признательность президента вооруженным силам и было направлено на то, чтобы подчеркнуть силу и единство нации перед лицом вызовов."
 france.118.a: "Сильная Демонстрация Силы"
 france.118.t: "Меланшон Уходит!"
 france.118.d: "В замечательной попытке укрепить национальное единство и решить насущные проблемы, стоящие перед Францией, президент Эммануэль Макрон провел переговоры с политическими соперниками Жан-Люком Меланшоном и Марин Ле Пен, чтобы рассмотреть возможность формирования правительства национального единства. Однако в ходе дискуссии напряжение быстро нарастало, и Меланшон внезапно покинул встречу, выразив недовольство предложенными условиями и потенциальным компромиссом с основными принципами его партии. Его уход подчеркнул глубокие идеологические разногласия, сохраняющиеся между политическими фракциями во Франции.\nПрезидент Макрон и Марин Ле Пен продолжили обсуждение, изучая возможность сотрудничества и достижения общих политических целей. Их готовность к диалогу, преодолевая традиционные политические границы, свидетельствует о насущной необходимости более широкого сотрудничества в решении серьезных проблем, стоящих перед страной."
 france.118.a: "Хотя бы мы сработались с Марин."
 france.120.t: "Макрон встретился с Меланшоном и Ле Пен"
 france.120.d: "В качестве неожиданного шага, направленного на укрепление единства и решение проблем, стоящих перед Францией, президент Эммануэль Макрон объявил о предстоящей встрече с политическими соперниками Жан-Люком Меланшоном и Марин Ле Пен для обсуждения формирования правительства национального единства. Это объявление вызвало бурные спекуляции и привлекло внимание всего политического спектра. Предлагаемая встреча, запланированная на ближайшие дни, свидетельствует о приверженности Макрона преодолению традиционных политических разногласий и стремлению к широкому сотрудничеству в области управления. Взаимодействуя с Меланшоном, лидером левой партии Непокорённая Франция, и Ле Пен, лидером партии "Национальное Объединение" с правыми взглядами, Макрон стремится продемонстрировать готовность преодолеть идеологические разрывы и создать единый фронт для решения насущных национальных проблем."
 france.120.a: "Троекратное ура центризму"
 france.119.t: "Меланшон уходит!"
 france.119.d: "В замечательной попытке укрепить национальное единство и решить насущные проблемы, стоящие перед Францией, президент Эммануэль Макрон провел переговоры с политическими соперниками Жан-Люком Меланшоном и Марин Ле Пен о формировании правительства национального единства. Однако встреча приняла неожиданный оборот, поскольку Меланшон, лидер "Непокорённой Франции", покинул переговоры в знак протеста, подчеркнув глубокие разногласия, которые сохраняются в политическом ландшафте. Однако в ходе дискуссий напряженность быстро возросла, и Меланшон внезапно покинул заседание, выразив свое недовольство предложенными условиями и потенциальным компромиссом по основным принципам своей партии. Его уход подчеркнул глубокие идеологические разногласия, которые сохраняются между политическими группировками во Франции.\nПрезидент Макрон и Марин Ле Пен продолжили свои дискуссии, изучая возможности сотрудничества и общие политические цели. Их готовность участвовать в диалоге, преодолевая традиционные политические границы, демонстрирует настоятельную необходимость более широкого сотрудничества в решении серьезных проблем, стоящих перед страной."
 france.119.a: "По крайней мере, мы можем поработать с Марин."
 france.1191.t: "Заговор Раскрыт"
 france.1191.d: "Французские власти, похоже, раскрыли один из самых отвратительных и предательских заговоров против Эммануэля Макрона со стороны консервативной оппозиции в парламенте. Детали заговора ясны, и кто знает, что могло бы произойти, если бы он не был раскрыт. Макрон лично приказал властям вынести приговор всем, кто был связан с заговором, - по случайному совпадению, все они были членами оппозиции. Из-за введенного военного положения выборы не могут быть проведены, что только пошло Макрону на пользу, так как он сразу же составил список верных членов своей партии, чтобы занять места отстраненных членов парламента."
 france.1191.a: "Прощай, оппозиция."
 france.121.t: "Президент Макрон обнародовал Мальтийский договор"
 france.121.d: "В качестве важного события, направленного на укрепление регионального сотрудничества и экономической интеграции, президент Эммануэль Макрон объявил о создании Мальтийского договора - новой экономической группы, включающей несколько средиземноморских стран. Договор направлен на укрепление связей, стимулирование торговли и расширение сотрудничества между Хорватией, Францией, Испанией, Италией, Словенией, Черногорией, Албанией, Грецией и Турцией. Каждая страна привносит в группу уникальные сильные стороны и ресурсы, способствуя развитию потенциала для совместных проектов, обмена знаниями и развития региональных инициатив. \nОжидается, что Мальтийский договор создаст платформу для плодотворных обменов, поощрения трансграничных инвестиций, развития туризма и содействия обмену передовым опытом в различных секторах, включая сельское хозяйство, энергетику, инфраструктуру и технологии. Это также предоставляет странам-членам возможность коллективно решать общие проблемы, такие как изменение климата, миграция и проблемы безопасности."
 france.121.a: "Для Средиземноморья наступает новая эра"
 france.1211.t: "Мальтийский Договор - Да или нет"
 france.1211.d: "Мальтийский договор направлен на развитие регионального сотрудничества, усиление экономической интеграции и содействие общему процветанию средиземноморских стран. Присоединившись к нашей группе, у вас будет возможность активно участвовать в динамичной платформе, которая фокусируется на взаимовыгодном сотрудничестве, обмене знаниями и совместных инициативах, направленных на раскрытие огромного экономического потенциала региона."
 france.1211.a: "Да"
 france.1211.b: "Нет"
 france.122.t: "Административные сокращения, предпринятые президентом Земмуром, дают замечательные результаты"
 france.122.d: "Смелый и решительный шаг президента Эрика Земмура по сокращению административных расходов продемонстрировал значительный успех, что привело к повышению эффективности и фискальным выгодам для страны. Приверженность президента упорядочению бюрократии и сокращению государственных расходов принесла положительные результаты, что свидетельствует о многообещающем начале его пребывания на посту президента. Административные сокращения президента Земмура, введенные в рамках его более широкой программы правительственных реформ, были направлены на повышение эффективности, ликвидацию увольнений и снижение финансовой нагрузки на налогоплательщиков. Предпринимая стратегические меры по оптимизации административных процессов, президент стремился создать более компактную и эффективную структуру управления."
 france.122.a: "Появилась Раздутая администрация"
 france.123.t: "Референдум по выходу из ЕС"
 france.123.d: "В рамках важного события, которое отразилось на всей Франции и Европе, президент Эрик Земмур объявил о планах провести референдум о членстве Франции в Европейском союзе. Предложение, известное как "ФРЕКСИТ", знаменует собой значительный сдвиг в политическом ландшафте Франции и вызвало интенсивные дебаты о будущих отношениях страны с ЕС. Объявление о референдуме по выходу Великобритании из ЕС вызвало неоднозначную реакцию различных слоев общества. Сторонники рассматривают это как возможность утвердить суверенитет Франции, восстановить контроль над экономической и иммиграционной политикой и защитить национальные интересы. Они утверждают, что выход из ЕС позволил бы Франции заключить свои собственные торговые соглашения, принимать независимые решения по ключевым вопросам и восстановить контроль над своими границами. Противники референдума по БРЕКСИТ выражают обеспокоенность потенциальными последствиями выхода из Европейского союза. Они подчеркивают преимущества членства в ЕС, включая доступ к единому рынку, экономическую стабильность и совместные усилия по решению глобальных проблем."
 france.123.a: "Земмур может настоять на своем... Но согласится ли Франция?"
 france.1231.t: "Франция Проголосовала Остаться"
 france.1231.d: "При неожиданном повороте событий Франция проголосовала за то, чтобы остаться членом Европейского союза на долгожданном референдуме по выходу из ЕС, бросив вызов ожиданиям и нанеся удар по видению правого президента Эрика Земмура о выходе из ЕС. Итоги референдума подчеркивают сложную динамику и разнообразие мнений французского электората относительно будущих отношений страны с ЕС. Результат референдума о выходе из ЕС имеет далеко идущие последствия для Франции и Европейского союза в целом. Это указывает на то, что значительная часть населения Франции ценит преимущества и возможности, предоставляемые членством в ЕС, включая доступ к единому рынку, свободное передвижение людей и коллективное принятие решений по важным вопросам. Президент Земмур еще не выступил публично, чтобы признать победу ЕС, но, как сообщается, находится в процессе возбуждения многочисленных избирательных исков против своего собственного правительства."
 france.1231.a: "Неутешительный результат для Земмура"
 france.1232.t: "Франция Проголосовала Выйти"
 france.1232.d: "В результате знакового решения, которое вызвало шоковую волну по всей Европе, Франция проголосовала за выход из Европейского союза (ЕС) на долгожданном референдуме по выходу из ЕС. Результаты голосования отражают сейсмический сдвиг во французской политике и знаменуют собой поворотный момент в отношениях страны с ЕС. Решение о выходе из ЕС имеет серьезные последствия как для Франции, так и для Европейского союза в целом. Уход Франции, как одного из членов-основателей ЕС, поднимает вопросы о сплоченности блока, будущем интеграционных усилий и стабильности еврозоны. Ожидается, что это положит начало периоду интенсивных переговоров между Францией и ЕС по определению условий их отделения и установлению новых рамок для их отношений."
 france.1232.a: "Увидимся Позже Сосунки!"
 france.1232.b: "Предпочтителен мягкий выход"
 france.124.t: "Российские диссиденты организуют Марш во Франции"
 france.124.d: "В знак солидарности и призыва к международной поддержке российские диссиденты организовали марш во Франции, чтобы привлечь внимание к нарушениям прав человека и выступить за большую свободу в России. Марш, проводимый в качестве символического жеста неповиновения войне российского правительства на Украине и в странах Балтии, призван пролить свет на тяжелое положение активистов, журналистов и отдельных лиц, сталкивающихся с преследованиями в России. Этот марш был назван фарсом режимом в Москве, но он пришелся по душе народу Франции, укрепив решимость свергнуть нынешний режим. "
 france.124.a: "Мы освободим вашу родину, не волнуйтесь."
 france.125.t: "Формирование российских диссидентских бригад"
 france.125.d: "Важным событием в ходе европейской войны стало то, что российские диссиденты сформировали во Франции военные бригады, призванные противостоять деспотичному режиму и бороться за свободу. Состоящие из перебежчиков из российских вооруженных сил, активистов и лиц с военным опытом, эти бригады стремятся противостоять несправедливости и противостоять репрессивной тактике, применяемой российским правительством. Формирование диссидентских военных бригад во Франции также служит укреплению международной солидарности с российской оппозицией. Это означает коллективную позицию против нарушений прав человека и проливает свет на продолжающуюся борьбу за демократию в России. "
 france.125.a: "Скоро вы вернете себе свой дом!"
 france.126.t: "Судебный Процесс над Сторонниками Гос. Переворота"
 france.126.d: "После короткой стычки во французской деревне нам наконец удалось найти оставшихся трусливых нелояльных генералов, которые ввергли Францию в этот беспорядок, прячась, как крысы, в полуразвалившейся хижине. Когда мы вывели их на поле боя, самопровозглашенные спасители Франции, придерживавшиеся бредовой идеологии, утверждавшей, что французский народ превосходит всех остальных, начали рыдать и плакать, умоляя пощадить их и сохранить им жизнь. Наши солдаты стояли там с яростью в глазах на этих трусливых генералов, и когда они начали наводить и заряжать свои винтовки, так называемые генералы попытались произнести еще больше лжи, но залп пуль заставил их замолчать, прежде чем у них появился шанс произнести еще больше лжи.\n\nИ с этим фашистские остатки в нашей стране были искоренены, гарантируя, что они никогда больше не причинят нам вреда."
 france.126.a: "Предатели!"
 france.127.t: "Суд над Сторонниками Коммунизма"
 france.127.d: "Сочувствующие коммунистам были наконец-то схвачены в Париже, их лидеры теперь в нашей власти. Их лицемерная идеология, претендующая на освобождение всех рабочих Франции, но позволяющая нашим людям умирать от голода, наконец-то уничтожена. Так называемые отвратительные спасители трудящихся были выставлены на улицу, где расстрельная команда готовилась к расстрелу, а прохожие смотрели, как они молят о пощаде.\n\nСо временем собралась толпа. Это была разъяренная толпа, которая бросала грубые оскорбления в адрес трусливых лидеров, называя их предателями, насильниками и убийцами. Когда расстрельная команда была готова, толпа начала ликовать, открывая огонь.\n\nВ конце концов, осталась только кровь и грязные трупы предателей, а толпа начала расходиться, возвращаясь к своей повседневной жизни.\n\nИ таким образом, мы можем быть уверены, что кошмар, которым является коммунизм, умер во Франции навсегда."
 france.127.a: "Красные Мрази!"
 france.128.t: "Франция требует возвращения Корсики и ВМФ"
 france.128.d: "После того как осела пыль после кровопролитной гражданской войны, победители сразу же нацелились на великую историческую цель - полное объединение Франции. Естественно, их внимание было приковано к средиземноморской жемчужине, которую древние греки называли "самым красивым островом", - Корсике. Когда началась гражданская война, Национальный флот, выведенный с материка, защитил остров, избавив его от разрушительных последствий войны.\n\nФранцузская Республика направила командованию корсиканского флота официальное требование, согласно которому они должны присягнуть на верность центральному правительству в Париже. Кроме того, они должны отправить ключевые элементы флота, включая авианосцы, в гавань Тулона, где французские морские офицеры и матросы примут командование флотом. После короткого обсуждения адмиралы согласились выполнить требования Республики. Внутреннее сопротивление перспективе возвращения на родину отсутствовало."
 france.128.a: "Предки Свободной Франции объединяют нас."
 france.129.t: "Суд над фашистской хунтой и ее преступлениями против французского народа"
 france.129.d: "Трусливое правительство фашистской хунты сидело связанное на улице и выглядело избитым на глазах у толпы парижан. Пока мы зачитывали многочисленные ужасные преступления против французского народа, несмотря на их глупую идеологию, утверждающую, как велик французский народ, как он превосходит других, как только мы начали поднимать их лидеров на гильотину, трусливые фашисты начали молить о пощаде, как жалкие люди, которыми они были. В качестве последней попытки они попытались обратиться к толпе, призывая ее восстать против нашего режима.\n\nЭто вызвало яростную ярость в толпе, заставив ее справедливо бросать грубые оскорбления в адрес фашистских свиней, некоторые даже хватали предметы с улицы и бросали в них, а некоторые даже пытались перелезть через них и напасть, но для поддержания порядка нам пришлось остановить их с помощью нашей полиции. Перед огромной толпой, скандирующей лозунги "Нет пощады свиньям-фашистам", они были казнены на гильотине, а их головы, символ тирании, брошены в пламя, чтобы навсегда покончить с этой отвратительной идеологией. \n\nТаким образом, свеча фашизма во Франции была задута навсегда."
 france.129.a: "Предатели Республики!"
 france.130.t: "Суд над политиками-либералами-олигархами"
 france.130.d: "Ублюдки старого режима были обнаружены прячущимися, как крысы, в лачуге под Парижем, и когда их провезли по Парижу на трейлере, толпы людей собрались посмотреть, как их публично демонстрируют. Толпа, справедливо разъяренная трусливыми старыми политиками, которые разрушили нашу прекрасную страну, начала бросать камни и оскорбления во всех лидеров, когда они приближались к гильотине. Некоторые из них делали импровизированные знаки из картонных коробок с такими лозунгами, как "Нет пощады либералистам-олигархам" и "Смерть этим предателям."\n\nКогда их подводили к гильотине, жалкие либералы просили сказать несколько слов перед неизбежной казнью, как бесхребетные трусы, которыми они и были. Вместо того, чтобы раскаяться в своих действиях, они пытались распространять ложь и пытались настроить наш народ против нас. Вместо раскаяния их слова заглушались яростными криками толпы, требующей "ГОЛОВЫ С ПЛЕЧ" Лезвие наконец опускалось на каждого предателя, с каждым ударом уничтожая остатки старого порядка. Их головы, символ боли и страданий, были брошены в пламя, чтобы навсегда сгореть в пепле. Таким образом, позор и зло, принесенные старым режимом в нашу страну, теперь стали частью долгой истории Франции."
 france.130.a: "Предатели Народа!"
 france.131.t: "Французская народная Республика требует возвращения Корсики и ВМФ"
 france.131.d: "После того как осела пыль после кровопролитной гражданской войны, победители сразу же нацелились на великую историческую цель - полное объединение Франции. Естественно, их внимание было приковано к средиземноморской жемчужине, которую древние греки называли "самым красивым островом", - Корсике. Когда началась гражданская война, Национальный флот, выведенный с материка, защитил остров, избавив его от разрушений.\n\nНовая Французская Народная Республика направила официальное уведомление корсиканскому военно-морскому командованию, требуя от них немедленного перехода на сторону революционного правительства. Они также должны принять инспекцию специального посланника от революционного правительства. После этого крупные корабли, находящиеся на Корсике, вернутся на материк под наблюдением посланника.\n\nПосле нескольких дней обсуждения адмиралы согласились выполнить все требования центрального правительства. Несмотря на некоторые внутренние сомнения в отношении новой "Красной Франции", большинство военно-морского персонала с надеждой смотрит на перспективу возвращения на родину."
 france.131.a: "Пазл народной нации завершен."
 france.132.t: "Суд над левыми, коммунистами и советскими шпионами"
 france.132.d: "По мере того как наши войска продвигаются все глубже в сердце красной угрозы, мы продолжаем наблюдать все ту же старую историю. Мы одерживаем очередную великую победу, еще на один шаг приближаясь к возвращению нашей страны, но коммунары все еще продолжают бунтовать и восставать в сельской местности и даже в городах. Наши тюрьмы давно переполнены этими леваками, социалистами и коммунистами, и необходимо принять срочные меры, если мы хотим увидеть реальный прогресс в нашем новом правительстве. Больше не будет непатриотичной оппозиции реальным переменам и новой эре Франции, к которой мы стремимся. Настоящие перемены могут быть ознаменованы только действиями, о которых слабые не смеют и мечтать... Но мы осмелились мечтать."
 france.132.a: "И никаких критиков!"
 france.133.t: "Суд над антифранцузскими либералами"
 france.133.d: "Залы суда были переполнены с тех пор, как мы начали отвоевывать территории у предательской Французской республики в начале Гражданской войны. Теперь мы наконец-то можем свершить праведное правосудие над теми, кто хотел уничтожить Францию изнутри и снаружи. Большинство из них получили суровые приговоры, чтобы они могли сгнить где-нибудь на виду, где им и место, в то время как другие, как предыдущая администрация, получили более срочный приговор в качестве мести за разрушение нашей некогда гордой нации. Это только начало нашего праведного крестового похода против зла, которое десятилетиями терзает нашу нацию."
 france.133.a: "Либеральные псы..."
 france.134.t: "Французское правительство национальной защиты требует возвращения Корсики и ВМФ"
 france.134.d: "После того как осела пыль после кровопролитной гражданской войны, победители сразу же поставили перед собой грандиозную историческую цель - полностью объединить Францию. Естественно, их внимание привлекло средиземноморское сокровище, которое древние греки называли "самым прекрасным островом", - Корсика. Когда началась гражданская война, Национальный флот, выведенный с материка, защитил остров, избавив его от разрушительных последствий войны.\n\nНовое французское правительство национальной обороны направило официальное уведомление корсиканскому военно-морскому командованию, требуя от него немедленного подчинения Парижу. В то же время флот должен быть разоружен и оставаться на острове до тех пор, пока офицеры и матросы не примут командование.\n\nПосле долгих и жарких дискуссий адмиралы, опасаясь военных репрессий, в конце концов согласились выполнить все требования правительства Национальной обороны. Хотя внутренние разногласия по поводу возвращения на родину были значительными, никто не осмелился ослушаться решения своего начальства."
 france.134.a: "Родина Наполеона возвращается Франции."
 france.135.t: "Военные формируют новое правительство"
 france.135.d: "После кровопролитной гражданской войны, разорившей страну, была создана военная хунта для восстановления порядка и стабильности. Хунта, состоящая из высокопоставленных военных чиновников, взяла под свой контроль правительство, ссылаясь на необходимость сильного руководства в условиях повсеместного хаоса. По мере того как хунта укрепляет свою власть, перед ней встает непростая задача восстановления разрушенной войной страны и веры в правительство. Предстоящий путь полон трудностей, но хунта остается непоколебимой в своем стремлении восстановить мир и процветание в стране."
 france.135.a: "Возникает новый режим"
 france.136.t: "Французские фашистские группировки требуют представительства в правительстве"
 france.136.d: "После установления военной хунты, последовавшей за кровопролитной гражданской войной, многие политики и лидеры ополчения, придерживающиеся широко фашистских взглядов, во главе с Ивеном Бенедетти, потребовали места за столом переговоров в новом правительстве. Заявляя, что они представляют интересы значительной части населения, фашисты утверждают, что их роль в гражданской войне должна быть отражена в новом правящем органе. Однако их требования вызвали споры и раскол среди хунты и населения в целом."
 france.136.a: "Этим людям нельзя доверять."
 france.136.b: "Вместе мы обеспечим будущее Франции!"
 france.137.t: "Бенедетти вступил в должность диктатора Франции"
 france.137.d: "Бенедетти вышел на балкон Елисейского дворца, глядя вниз на многотысячную толпу людей, собравшихся, чтобы увидеть его выступление. В этот момент он чувствовал давление, не было места для ошибок.\n\nКогда он взял микрофон, что-то зажглось внутри него, это был накопившийся гнев. Кипящий гнев на русских и коррумпированную элиту, которые разрушили его прекрасную страну и заставили погибнуть многих из его любимых французов.Он заявил, что Франция наконец-то свободна от "коррумпированной элиты", которая продала свою страну иностранцам и пыталась заменить их культуру и народ чужаками. Он также начал говорить о Советах, называя их "недочеловеческими кусками мусора." Он поклялся каждому мужчине и каждой женщине, смотревшим эту речь, что соберет великую армию и пойдет на Москву, чтобы лично сжечь ее дотла, чтобы отомстить за каждого павшего француза, погибшего в европейской войне.\n\nБенедетти смотрел на то, как толпа не просто начала ликовать, она начала скандировать лозунги "Смерть советским свиньям!" и "Слава Бенедетти!"\n\nВ этот момент он понял, что он не просто лидер. Он знал, что ему суждено стать спасителем Франции, бесстрашным воином, готовым сделать все, чтобы восстановить величие своей страны, даже если это будет стоить крови миллионов людей на другом конце континента. Он завоевал народ и знал, что не сможет его разочаровать."
 france.137.a: "Salut!"
 france.140.t: "Бретонский Компромисс"
 france.140.d: ""
 france.140.a: "Пожаловать герцогский титул Жану, графу Парижскому"
 france.140.b: "Даровать герцогский титул принцу Уэльскому, принцу Уильяму"
 france.140.c: "Разогнать Бретонский Парламент"
 france.141.t: "Беспорядки Усиливаются"
 france.141.d: "Даже несмотря на все наши усилия успокоить их, протесты Маджида Каттана просто продолжают нарастать, до бесконечности. Бунтовщики ломают вещи на улицах, сжигают флаги, занимают улицы и постоянно борются с нами, даже несмотря на уступки и контрмеры, которые мы предпринимаем.\n\nСостояние дел постоянно ухудшается, что бы это ни было. Кажется, с каждым днем все больше и больше людей выступают против нас, все больше и больше борются против государства из-за смерти одного человека. Почему? Виновный офицер уже привлечен к ответственности, почему? Зачем все это, зачем продолжать борьбу?\n\nНесмотря на то, сколько мы задаем вопросов, это не меняет ситуацию. Беспорядки должны закончиться, будь то ад или паводок."
 france.141.a: "Чёрт!"
 france.141.b: "Ненадолго..."
 france.142.t: "Насилие вспыхнуло после убийства Маджида Каттана"
 france.142.d: "Жители Франции были крайне возмущены новостью об убийстве безоружного гражданина Туниса по имени Маджид Каттан в Бобиньи, пригороде Парижа. В социальных сетях появилось видео, на котором мужчине агрессивно кричат, чтобы он пригнулся. Несмотря на попытки Маджида сотрудничать с полицией, он был застрелен неназванным офицером полиции. Это вызвало массовое возмущение: у полицейского управления была организована масштабная акция протеста, люди требовали ареста неназванного офицера и выкрикивали лозунги "Справедливость для Каттана!". Эти лозунги попали во французские СМИ, и все больше людей присоединяются к протестам, которые переросли в беспорядки: вчера вечером демонстранты поджигали машины, разгромили город, устроили вандализм на автобусных остановках и стреляли в полицейских из фейерверков. Хотя до сих пор мы не получали этих новостей, Париж уже охвачен хаосом и пламенем анархии."
 france.142.a: "Это не Америка!"
 france.143.t: "Болезненное Правительство"
 france.143.d: "В то время как Франция сосредоточила свое внимание на эскалации войны с Россией, военное правительство в Алжире потерпело крах, погрузив регион в хаос. Пренебрежение правительства к Алжиру в сочетании с его озабоченностью военными действиями вызвало недовольство среди алжирского населения. Это, в сочетании с растущими беспорядками и отсутствием эффективного управления, привело к краху военного правительства."
 france.143.a: "Каждый сам за себя!"
 france.144.t: "Вооруженные контр-протестующие"
 france.144.d: "Мы совершили серьезную ошибку. Мы надеялись, что вооружим контрпротестующих оружием, которое, как мы надеялись, будет использоваться в мирных целях, дадим им резиновые пули и другие контрмеры, чтобы они могли использовать их против агрессивных протестующих. Однако насилие порождает еще большее насилие.\n\nВсе, к чему мы привели, - это к дальнейшей эскалации. Теперь, получив еще один повод для своего возбуждения, протестующие стали еще более жестокими и еще более экспансивными, чем раньше, и поток праведного гнева прокатился по всей Франции. Теперь уже ничто не сможет погасить этот огонь."
 france.144.a: "Подождите, ребята не надо РЕАЛЬНО пользоваться этим оружием."
 france.145.t: "Создано государство Пье-нуар"
 france.145.d: "После падения французского военного правительства в Алжире оставшиеся военные офицеры, дислоцированные в Алжире, усилили влияние Жака Виллара и его различных возрождающихся группировок в стиле Пье-Нуар. \n\nЭти группы, с вновь обретенной властью над землей, которая долгое время угнетала франкоязычное население, создали государство полуапартеида под названием Федерация двух Берегов."
 france.145.a: "Просто подождите, пока мы не вернемся!"
 france.151.t: "Дорогой Президент [FRA.GetLeader]"
 france.151.d: "Я надеюсь, что это письмо застанет вас в добром здравии и приподнятом настроении. С большой честью и уважением я пользуюсь этой возможностью, чтобы выразить свою сердечную благодарность за ваше неизменное и исключительное служение нашей любимой стране, Франции.\n\nВаше стратегическое видение и мудрое принятие решений внесли значительный вклад в обеспечение безопасности и процветания нашей страны. Ваша неизменная поддержка наших вооруженных сил не только укрепила наши возможности, но и укрепила чувство единства и целеустремленности среди военнослужащих."
 france.151.a: "[THIS.GetRank] [THIS.GetName]"
 france.152.t: "Дорогой Президент [FRA.GetLeader]"
 france.152.d: "Я надеюсь, что это письмо застанет вас в добром здравии и приподнятом настроении. Я пишу вам с чувством глубокого сожаления и смирения по поводу предыдущего письма, которое я отправил, в котором я порицал ваши лидерские способности. Поразмыслив, я пришел к пониманию неуместности моих слов и отсутствия уважения, которое они выражали.\n\nХотя я, возможно, не полностью согласен с каждым решением или направлением, принятым вами на посту президента, я понимаю огромную сложность вашей роли и проблемы, с которыми вы сталкиваетесь, возглавляя нашу нацию. Я надеюсь, что мы все сможем работать вместе, независимо от наших разногласий, чтобы найти точки соприкосновения и решения, которые принесут пользу французскому народу."
 france.152.a: "[THIS.GetRank] [THIS.GetName]"
 france.153.t: "Дорогой Президент [FRA.GetLeader]"
 france.153.d: "Я надеюсь, что это письмо застанет вас в добром здравии. Я пишу вам с глубоким чувством благодарности и чести за то, что вы упомянули меня во время недавнего военного совещания. Я глубоко признателен вам за признание моего вклада и вклада вооруженных сил, и я польщен вашими добрыми словами.\n\nЯ глубоко признателен вам за признание моего вклада и вклада вооруженных сил, и я польщен вашими добрыми словами.Уверяю вас, что я более чем когда-либо мотивирован продолжать отстаивать принципы чести, неподкупности и дисциплины, которые отстаивают наши вооруженные силы. Ваше признание укрепляет мою приверженность служению нашей стране в меру моих способностей и позитивному вкладу в ее рост и процветание."
 france.153.a: "[THIS.GetRank] [THIS.GetName]"
 france.154.t: "Дорогой Президент [FRA.GetLeader]"
 france.154.d: "Я пишу это письмо с тяжелым сердцем и чувством глубокого разочарования в лидерстве, которое вы проявили во время вашего пребывания на посту президента нашей страны. С большим сожалением я должен выразить свою серьезную озабоченность по поводу того, что я воспринимаю как значительный недостаток компетентности в вашей роли лидера нашей страны.\n\nКак военный генерал, посвятивший свою жизнь служению этой нации, я с огорчением наблюдаю отсутствие стратегического видения и сильного руководства на самом высоком уровне."
 france.154.a: "[THIS.GetRank] [THIS.GetName]"
 france.1521.t: "Дорогой Президент [FRA.GetLeader]"
 france.1521.d: "Я надеюсь, что это письмо застанет вас в прекраснейшем настроении. Вам будет приятно узнать, что я пишу, чтобы выразить свою самую искреннюю и переполняющую меня благодарность за то, что вы вытащили меня из пучины моей совершенно небогатой событиями и скучной вынужденной отставки. Какой волнующий поворот событий произошел благодаря вашему удивительно проницательному принятию решений.\n\nВаше безупречное решение отменить мое увольнение с действительной службы было как нельзя более своевременным. Как раз в тот момент, когда я подумал, что мне стало слишком комфортно в неторопливом темпе выхода на пенсию, ты доблестно втянул меня обратно в бой. Перспектива вновь разобраться в хитросплетениях военной бюрократии и столкнуться с мириадами политических нюансов, которые привели к моей отставке, была мыслью, которая не давала мне спать по ночам. Вы, сэр, мой герой."
 france.1521.a: "[THIS.GetRank] [THIS.GetName]"
 france.1531.t: "Дорогой Президент [FRA.GetLeader]"
 france.1531.d: "Позвольте мне собрать весь энтузиазм, на который я способен, чтобы выразить свою благодарность за оказанную мне честь - возможность уволиться из армии. Я практически лишился дара речи, или, возможно, лучшим словом было бы "поражен" вашим безупречным выбором времени в этом вопросе.\n\nНе каждый день бывалому военному генералу настолько везет, что ему навязывают предстоящую отставку таким внимательным и убедительным образом. Воистину, ваша способность принимать решения, мягко говоря, внушает благоговейный трепет. Предвкушение неторопливых дней, лишенных бьющего в сердце адреналина активной службы, становилось невыносимым бременем, и я в долгу перед вами за то, что вы избавили меня от такой мучительной участи."
 france.1531.a: "[THIS.GetRank] [THIS.GetName]"
 france.1532.t: "Дорогой Президент [FRA.GetLeader]"
 france.1532.d: "Я надеюсь, что это письмо застанет вас в прекраснейшем настроении. Вам будет приятно узнать, что я пишу, чтобы выразить свою самую искреннюю и переполняющую меня благодарность за то, что вы вытащили меня из пучины моей совершенно небогатой событиями и скучной вынужденной отставки. Какой волнующий поворот событий произошел благодаря вашему удивительно проницательному принятию решений.\n\nЯ должен выразить свое восхищение вашей смелой приверженностью игнорировать политические предубеждения и ценить уникальный талант, который такой человек, как я, привносит в работу."
 france.1532.a: "[THIS.GetRank] [THIS.GetName]"
 france.160.t: "Коллапс Истеблишмента"
 france.160.d: ""
 france.160.a: "Все для Победителей"
 france.161.t: "Встреча Революционных Умов"
 france.161.d: "Наконец-то созван съезд всех соратников и мыслителей пролетариата и авангарда нашей социалистической республики. Однако, даже когда этот съезд уже начался, еще не определен оратор на его открытии, что является одной из самых важных позиций оратора на этом грандиозном собрании.\n\nМногие толкают провозвестника нашей революции, Фабьена Русселя, того, кто привел нас сюда, чтобы говорить от имени всех нас в самом начале. В конце концов, без него, без его руководства, где бы мы были сейчас? Под сапогом фашистов или все еще следуем заблуждениям республиканцев? Они считают, что он - самая важная и выдающаяся фигура в нашей революции.\n\nХотя это верно для многих из нас, некоторые полагают, что более либеральный и политический ум Дидье Дейнинккса должен взять на себя руководство и выступить с вступительным словом, а более децентрализованные и утопически настроенные социалисты и коммунисты в наших рядах придерживаются этой позиции. Независимо от того, какое решение мы примем, курс нашего государства будет в значительной степени зависеть от того, кто будет выбран, поэтому мы должны обдумать и сделать мудрый выбор."
 france.161.a: "Леомен выступит со вступительным словом"
 france.161.b: "Руссель выступит со вступительным словом"
 france.161.c: "Дейнинккс выступит со вступительным словом"
 soviet_france_guide_tt: "§RПоддержка авторитаристов на ранних этапах и принятие анархизма в последний момент может оставить у определенных сил ощущение, что их предали, и желание действовать.§!"
 france.162.t: "Вопрос о Вооруженных Силах"
 france.162.d: "Армия - это то, что вызывает много споров в нашем конгрессе, это то, что всегда вызывало споры в наших кругах с момента зарождения левых сил. Армия - это то, что когда-то использовалось для защиты государства и уничтожения подающих надежды социалистов и революционеров. Теперь мы должны решить, что делать с этой архаичной системой.\n\n Некоторые считают, что вооруженные силы - это прямая рука пролетариата, что это инструмент, который они могут использовать для дальнейшего распространения революции, сабля, которая принесет освобождение всем людям по воле народа. Оружие для рабочего класса, не больше и не меньше.\n\n Однако многие смотрят на реакционную историю армии и считают ее лишь инструментом угнетения, тем, что может быть использовано только диктаторами и теми силами, которые до последнего вздоха борются за капитал, рассматривая ее лишь как ужасное и отвратительное пятно на истории мира, от которого следует избавиться как можно скорее. \n\nМежду этими двумя крайностями есть и золотая середина - идея о том, что армия просто обязана существовать для защиты нашей революции. Армия - это не то, что нужно прославлять, и не то, что нужно поносить. Это средство, с помощью которого мы защитим наш народ и защитим Францию, это то, с чем мы должны смириться ради нашего народа."
 france.162.a: "Они - Источник Национальной Гордости"
 france.162.b: "Они - Меч Пролетариата!"
 france.162.c: "Они - Инструментом Тирании"
 france.162.e: "Их Скоро Не Будет."
 france.163.t: "Вопрос о Пролетариате и Рабочем Классе"
 france.163.d: "Пролетариат является центром революционной борьбы, и в этом с ним согласен весь Совет. Однако в наших рядах идут большие споры об истинной роли пролетариата в нашей недавно созданной нации.\n\nМногие в наших рядах - идеалисты, те, кто верит, что мировая революция неизбежна, что мы должны стоять за нее и бороться за рабочих всего мира. Они полностью и искренне верят в то, что мы способны освободить мировой пролетариат.\n\nНаряду с этим, есть многие, кто считает, что пролетариат - это оружие для борьбы с угнетением, инструмент революции в веках. Они - судья и палач свободы, которую они желают, и они должны и будут бороться за эту свободу.\n\nТретья позиция - это идея, что революция - это нечто, что уже свершилось и началось, что пролетариат - это освобожденный класс внутри Франции, и что мы должны поддерживать их свободу и свободу как бьющееся сердце революции, независимо от того, что может произойти."
 france.163.a: "Мы - Родина Революции"
 france.163.b: "Мы Всего Лишь Первая Костяшка Домино Глобальной Революции"
 france.163.c: "Народ - это Копье Революции"
 france.163.e: "Народ - это Сердце Революции"
 france.164.t: "Вопрос о Государстве"
 france.164.d: "Государство - это то, что оспаривается в коммунистической и социалистической мысли со времен Маркса и Энгельса. Это наше самое фундаментальное разногласие, то, с чем мы последовательно расходимся даже с самыми близкими нам собратьями. Необходимо положить конец этим разногласиям и поставить окончательную точку в вопросе о государстве.\n\nПозиция большинства состоит в том, что государство должно существовать, это фундаментальный угол, который помогает защитить пролетариат и наш народ. Это то, что должно работать на международном уровне, чтобы освободить других рабочих, и то, что всегда должно стремиться к глобальному освобождению. Несмотря на то, что это в основном не вызывает разногласий, все же существует много разногласий.\n\nС анархистской позиции - государство само по себе является угнетением рабочего. Оно не должно существовать, потому что само существование государства фактически заставляет рабочих подчиняться системам, которые созданы людьми более высокого положения, принуждающими их к подчинению. Хотя эта идея непопулярна за пределами круга, который неформально возглавляет Купат, ее все же следует учитывать. В конце концов, отмена государства - это то, чего, как можно утверждать, хотел даже Маркс.\n\nС другой стороны, есть позиция, которую часто выдвигают троцкисты и другие люди схожих убеждений: государство должно существовать исключительно для дальнейшего развития революционного общества. Государство - это то, что рабочие могут использовать и против чего они могут сплотиться в трудную минуту, это то, против чего рабочие могут бороться и от чего они могут добиваться свободы, поддержания перманентной революции и продвижения прав пролетариата путем постоянного свержения угнетателей.\n\nМы должны быть осторожны с этим решением, поскольку оно является самым критическим. Оно навсегда войдет в историю Франции, к лучшему или к худшему - государство определяет направление ее революции."
 france.164.a: "Государство должно обеспечить Революцию и нашу Культуру"
 france.164.b: "Государство должно работать над продвижением Глобальной Революции"
 france.164.c: "Государство должно быть распущено!"
 france.164.e: "Государство должно продвигать революцию и общество вперед"
 france.165.t: "Выбран Спикер Конгресса"
 france.165.d: "Революция находится на переломном историческом этапе, и очень важно объединить различные фракции, чтобы ее достижения прочно вошли в историю, политическую систему, социальную структуру и гражданское сознание Франции. Для этого мы должны тщательно выбрать главного представителя революции. Этот человек будет не только говорить от имени революции, но и служить важнейшим каналом передачи голоса народа и символом национального единства.\n\nСреди ведущих кандидатов на пост спикера несколько человек выглядят наиболее конкурентоспособными в глазах народа: Жан-Люк Меленшон, основатель "Непримиримой Франции", уже давно является видным левым лидером с беспрецедентным опытом политического маневрирования и значительным авторитетом среди населения. Наряду с ним сильными соперниками являются члены Нового народного фронта, активно участвующие в избирательной политике. К ним относятся представители Новой антикапиталистической партии, такие как убежденный антибуржуазный автомобилист Филипп Путу и красноречивый лидер Движения борьбы трудящихся Натали Арто - оба они близки к троцкистским идеалам.\n\nКроме того, значительное внимание привлекают кандидаты, не входящие в политический истеблишмент: активист-анархист Жюльен Купа, отсидевший в правительственной тюрьме Макрона и известный своими радикальными предложениями; и, пожалуй, самый яркий кандидат, Дидье Даенинк, плодовитый писатель, имеющий тесные связи с коммунистическим лагерем. Его резкая критика разлагающихся социальных реалий и классового неравенства снискала ему поддержку пролетариата, презрение реакционеров и беспокойство умеренных.\n\nИтак, народный выбор..."
 france.165.a: "Леомен будет править!"
 france.165.b: "Арто будет править!"
 france.165.c: "Купа будет нашим номинальным главой!"
 france.165.e: "Дейнинкс лидирует!"
 france.165.f: "Меланшон будет править!"
 france.166.t: "Патриоты Революции приходят к власти"
 france.166.d: "Когда пыль окончательно осела, будущее революции стало ясным, и перед народом Франции открылись беспрецедентно светлые горизонты.\n\nКогда над революцией нависла угроза захвата власти гнусным союзом ревизионистов и капиталистических реакционеров, патриоты не остались безучастными. Под руководством истинных революционеров заговор захватчиков власти был быстро разгромлен. Как и пионеры 1789 года, решительные действия были единственным и лучшим выбором.\n\nОтныне мы можем отбросить все препятствия и приступить к разработке революционного проекта для Франции. Мы возродим ценности, отравленные капитализмом, стабилизируем внутренний порядок, чтобы объединить подавляющее большинство народа, и сосредоточимся на устранении накопившихся пороков старого правительства. Французский социализм больше не будет колебаться, подобно приливу и отливу; напротив, он будет стоять как маяк, освещающий путь вперед для этой великой и беспокойной нации."
 france.166.a: "Vive la Révolution!"
 france.167.t: "Восстают Антиреакционеры"
 france.167.d: "Когда пыль окончательно осела, будущее революции стало ясным, и перед народом Франции открылись беспрецедентно светлые горизонты.\n\n Под мягким и вежливым фасадом зловещие силы, стремящиеся подорвать революцию, показали свое истинное лицо, едва не сбив Францию с пути. Только решительными и сильными действиями мы сможем пробудить французский народ и сорвать коварные планы контрреволюционеров. Мы заставим пролетариат понять, что без внутренних паразитов, развращающих правительство, застойных бюрократов, лоббистов в парламенте и хвастливых уличных активистов революционное дело может продолжаться и преуспевать.\n\nКогда революция действительно будет передана в руки народа и станет народным движением, защитники революции, естественно, отступят с передовых позиций. Но это не значит, что они уйдут из политической жизни. Напротив, они будут стоять вместе с народом, погружаясь в волну великих исторических перемен."
 france.167.a: "Сокрушите фальшивых красных!"
 france.1671.t: "Антиреволюционное Восстание"
 france.1671.d: "На хаотичной политической арене Республики появился новый игрок, и его растущее влияние становится невозможно игнорировать. Генерал Николя Казанова, военный комендант Страсбурга, собрал своих сторонников и объявил о создании политической организации под названием "Французская революционная гвардия." Интересно, что ее название близко к названию "Стражи исламской революции" в таких странах, как Иран, и методы тоже схожи.\n\n Будучи солдатом, Казанова выступает за управление железным кулаком, сочетая военную дисциплину с социализмом, чтобы влиять на каждый аспект французского общества. Хотя он проявляет некоторую терпимость к культурным традициям, он отдает предпочтение авторитаризму и репрессиям советского образца. Он представляет себе Революционную гвардию как питательную среду для революционного авангарда, подобного КПСС. В ответ на повсеместное пораженчество и упадок Казанова считает месть России конечной целью французской революции и призывает к созданию всеобъемлющей системы национальной обороны. Его фракция близка к новым партиям якобинцев в политическом спектре, но более радикальна в плане авторитаризма и милитаризма.\n\nСтанет ли он Сталиным во Франции или просто очередным оппортунистом в духе Буланже? Окажется ли это полезным или вредным, еще предстоит выяснить."
 france.1671.a: "Сокрушите Этих Тиранов"
 france.1671.b: "Мы должны спасти революцию!"
 france.168.t: "Либертарный Коммунистический Союз приходит к власти"
 france.168.d: "Когда пыль окончательно осела, будущее революции стало ясным, и перед народом Франции открылись беспрецедентно светлые горизонты.\n\n"Il'n'est pas de sauveurs suprêmes, Ni dieu, ni César, ni tribun, Producteurs, sauvons-nous nous-mêmes!!!"\n\nКонечной целью революционной борьбы является не воспитание благоговения перед другой формой власти или подчинение какому-либо порядку. Напротив, истинный успех достигается только тогда, когда люди перестают бояться власти или правителей, решительно настроены распоряжаться своей судьбой и объединяются против любых попыток господства над другими.\n\nТеперь мы ускорим этот процесс. После долгих лет упорной борьбы и неустанной пропаганды Либертарианский коммунистический союз, родившийся из анархистского движения и рабочих союзов, наконец-то вышел на первый план. Любые признаки коррупции будут жестко пресекаться; взятие власти не приведет нас к самоуспокоенности. Напротив, это побудит нас продолжать борьбу с неравенством в политической, экономической, экологической, культурной и гендерной сферах, с конечной целью уничтожить последние остатки старого порядка."
 france.168.a: "Vive la Révolution Noire!"
 france.169.t: "Франция, Неподвижная захватывает власть"
 france.169.d: "Когда пыль окончательно осела, будущее революции стало ясным, и перед народом Франции открылись беспрецедентно яркие горизонты.\n\nФранцузский народ своим выбором показал всему миру, что социалистическая революция в Европе может вновь ярко засиять в XXI веке, но уже в совершенно новой форме. La France Insoumise, опора Нового народного фронта, твердо стоит в самом сердце коррумпированных режимов, где сговорились многочисленные представители буржуазии. Они неустанно боролись против всех несправедливостей, навязанных народу. Теперь, когда бывшие повстанцы становятся новыми правителями, перед французским народом постепенно разворачивается новая эра. Многие задаются вопросом: Сможет ли революция продолжаться?\n\nЛидеры "Непримиримой Франции" твердо решили, что такой ужасный сценарий никогда не повторится под их руководством. Пришло время сбросить кровавую мантию, окутавшую Марианну. Отныне заветный дух братства французского народа возродится, а революция превратится в новое движение, которое приведет к глубоким изменениям в самой основе человеческой природы."
 france.169.a: "Vive la Révolution Rose!"
 france.170.t: "Рабочее Движение Борьбы приходит к власти"
 france.170.d: "Когда пыль окончательно осела, будущее революции стало ясным, и перед народом Франции открылись беспрецедентно светлые горизонты.\n\nРабочий класс уже давно внес незаменимый и решающий вклад в прогрессивное дело и защиту прав человека во Франции. Будь то создание богатства или построение более равноправного общества, рабочие всегда были в авангарде, поистине воплощая благородный дух французской нации. На протяжении веков репрессии и угнетение, направленные против рабочего класса, были особенно жестокими и суровыми. Но сегодня наступает конец этой эпохи. Политическая партия, которая действительно представляет справедливое дело и мощные лозунги рабочего класса, возглавила революцию и социалистическое строительство во Франции.\n\nДвижение за борьбу трудящихся не только направлено на ликвидацию остатков реакционного капитализма во Франции, но и смотрит за пределы национальных границ. По всей Европе и во всем мире бесчисленные братья и сестры рабочего класса борются за свое счастье. Успехи французских рабочих вдохновят их и станут сигналом к полномасштабному наступлению на разлагающийся мир."
 france.170.a: "Vive la Révolution Mondiale!"
 france.171.t: "Новая Эра"
 france.171.d: "С окончанием фашистской оккупации нашей любимой Франции мы сделали то, что маки могли только мечтать сделать с нацистами. Мы освободили нашу страну не во имя демократии, а во имя народа и его борьбы против буржуазного капитализма!"
 france.171.a: "Libération!"
 france.199.t: "На Корсике начинаются беспорядки"
 france.199.d: "Напряженность на Корсике достигла точки кипения, поскольку беспорядки охватили весь остров. Искрой, которая разожгла конфликт, стала смерть Ивана Колонны, который был убит в тюрьме заключенным-джихадистом. Это вновь вызвало давнее недовольство среди корсиканских националистов, которые считали Колонну героем корсиканского движения за независимость. \n\nВ крупных городах вспыхнули протесты, демонстранты осуждают действия французского языка и называют это причиной независимости. Ситуация стремительно обостряется, сообщается о столкновениях между протестующими и полицией. Поскольку Корсика балансирует на грани беспорядков, французское правительство сталкивается со сложной дилеммой: как удовлетворить недовольство корсиканских националистов, сохраняя при этом закон и порядок на острове."
 france.199.a: "Корсика ЭТО Франция!"
 france.1991.t: "На Корсике продолжаются массовые беспорядки"
 france.1991.d: "Беспорядки на Корсике не утихают, поскольку насилие продолжает нарастать по всему острову. Улицы заполнены баррикадами, а столкновения между протестующими и силами безопасности становятся все более частыми. \nБеспорядки парализовали Корсику, предприятия были закрыты, а транспорт нарушен. По мере ухудшения ситуации будущее Корсики висит на волоске, а угроза дальнейшего насилия становится все более очевидной."
 france.1991.a: "Он мертв! Смирись с этим!"
 france.200.t: "Успокаивая Корсику"
 france.200.d: "После нескольких недель беспорядков беспорядки на Корсике, наконец, прекратились. Действия французского правительства по подавлению инакомыслия были встречены населением Корсики с осторожным оптимизмом, которое надеется, что мирное урегулирование может быть достигнуто. Когда пыль уляжется, Корсике предстоит оценить ущерб, причиненный беспорядками. Здания лежат в руинах, предприятия пытаются восстановиться, а шрамы от конфликта остаются глубокими. Будущее острова остается неопределенным, и многие задаются вопросом, удастся ли достичь прочного мира или Корсика вновь погрузится в пучину насилия."
 france.200.a: "Мир Торжествует!"
 france.201.t: "Предстоящие Выборы Приостановлены!"
 france.201.d: "В результате драматического поворота событий выборы 2027 года во Франции были отложены на неопределенный срок из-за резкого роста напряженности в отношениях между Россией и Европой. Решение, принятое в интересах национальной безопасности, было принято в тот момент, когда Франция готовится к выходу из сложной дипломатической ситуации. В условиях надвигающейся угрозы конфликта политические лидеры согласились с тем, что сейчас не время для партийной политики. Вместо этого основное внимание будет уделено обеспечению безопасности и стабильности нации перед лицом внешних угроз. \n\nРеакция на новость о приостановке выборов неоднозначна. Некоторые считают это необходимой мерой предосторожности, учитывая нынешнюю обстановку, в то время как другие выражают обеспокоенность по поводу последствий для демократии. Как бы то ни было, это решение подчеркивает серьезность ситуации и необходимость единого фронта перед лицом потенциальной агрессии."
 france.201.a: "Политика на паузе, безопасность превыше всего!"
 france.202.t: "Военные свергают Правительство!"
 france.202.d: "В эпоху неопределенности и политической нестабильности французы проснулись под звуки танков на улицах Парижа. Сегодня рано утром [FRA.GetLeader] и Вооруженные Силы Франции объявили о свержении гражданского социалистического правительства во главе с Жан-Люком Меланшоном. Военные обвинили Меланшона и его администрацию в предательстве национальных интересов и стремлении превратить Францию в коммунистическое государство.\n\n В своем обращении к нации [FRA.GetLeader] сказал: "Мы больше не можем терпеть курс, который ведет нашу великую нацию к пропасти. Под руководством Меланшона Франция скатывается к коммунизму, а это предательство наших идеалов и нашей истории. Мы провозглашаем создание Седьмой Республики, которая станет истинным воплощением национальных интересов и стабильности."\n\nПо всей стране ужесточены меры безопасности. Военные подразделения патрулируют улицы, а стратегические объекты взяты под контроль армией. Многие политики и сторонники Меланшона были арестованы, а сам он помещен под домашний арест. Большинство жителей Франции недовольны, но пока терпят."
 france.202.a: "Да здравстсвует [FRA.GetLeader]!"
 france.203.t: "Венский Договор"
 france.203.d: "В наш самый мрачный момент мы переживаем и самый унизительный момент, когда наши дипломаты отправляются в Вену, чтобы заключить официальный договор о капитуляции сил НАТО. Мы полностью истощили себя после потери Варшавы, Будапешта и даже Братиславы, а русские уже установили марионеточные режимы, чтобы максимально усилить свой контроль и влияние в Восточной Европе. Мы пытались подготовиться к этому конфликту на протяжении большей половины десятилетия, но потерпели неудачу в самый ответственный момент. Мир воспримет это как момент нашей слабости и доминирования России на континенте."
 france.203.a: "И вот так просто все кончено..."
 france.2031.t: "Меланшон был застрелен полицейским в Мартиге"
 france.2031.d: "Во время дневной прогулки по улицам Мартига Меланшон был остановлен сотрудниками местной полиции. После того, как трое полицейских скоординированно скрыли камеры слежения, ситуация быстро обострилась: двое из трех полицейских удерживали Меланшона, в то время как другой зачитывал список преступлений против Франции, прежде чем дважды выстрелить из пистолета в бывшего политика. Ситуация, заснятая на видео и быстро распространившаяся по Интернету, вызвала недовольство, и многие обвинили во все более деспотичном военном консультативном совете."
 france.2031.a: "Что Происходит?"
 france.2032.t: "Ветераны протестуют на Севере страны"
 france.2032.d: "Поражение от России глубоко затронуло французских националистов и ветеранов, которые почувствовали себя преданными из-за действий правительства в войне. На Севере Франции, в регионе с сильными националистическими настроениями и высокой концентрацией ветеранов, вспыхнули протесты против правительства. Многие из них участвовали в войне, потребовали от правительства ответов о причинах поражения и призвали привлечь виновных к ответственности. Они критиковали правительство за то, что оно, по их мнению, не смогло защитить интересы и честь Франции на поле боя. \n\nПротесты быстро набирали обороты, тысячи людей вышли на улицы, чтобы выразить свой гнев и разочарование. Некоторые протестующие призывали к более агрессивной внешней политике, в то время как другие требовали отставки правительственных чиновников. Протесты на севере Франции бросили серьезный вызов авторитету правительства и грозили перерасти в более масштабную конфронтацию."
 france.2032.a: "Надо было сражаться получше!"
 france.2033.t: "Красное Знамя Южной Франции"
 france.2033.d: "Поражение от России глубоко раскололо французское общество... Протесты вспыхнули в крупных городах после того, как мы официально подписали Венский мирный договор. Протестующие, в основном состоящие из социалистических, коммунистических и анархистских групп, раскритиковали действия правительства во время войны и призвали к более мирной и справедливой внешней политике. \n\nПротесты по всей Южной Франции становились все масштабнее и интенсивнее, правительство изо всех сил пыталось сдержать беспорядки. Для поддержания порядка были задействованы военные, которые еще не участвовали в открытом восстании на Севере страны, что привело к столкновениям между протестующими и силами безопасности."
 france.2033.a: "Мы должны сокрушить коммунистов!"
 france.2034.t: "Полиция вытеснена из Парижа"
 france.2034.d: "Когда новость о поражении России распространилась по всей Франции, это вызвало волну гнева и разочарования среди населения. В крупных городах вспыхнули протесты с требованием прекращения войны и изменения политики правительства. В Париже протесты переросли в ожесточенные беспорядки, и анархистские и коммунистические группировки воспользовались возможностью обострить ситуацию. \nВ условиях хаоса французское правительство потеряло контроль над столицей. Правительственные здания были захвачены, и мятежники поспешно сформировали революционный совет. Совет провозгласил установление нового порядка, основанного на анархистских и коммунистических принципах, и объявил о роспуске существующего правительства. Однако к концу дня, похоже, восстание локализовалось в столице и южных провинциях."
 france.2034.a: "Мы должны отвоевать столицу!"
 france.204.t: "Восстановление Гражданского Правления"
 france.204.d: "В своей поразительной речи на утреннем заседании Национального собрания генерал [FRA.GetLeader], глава правительства национальной обороны, объявил о восстановлении гражданского правления. Он отметил, что европейская война закончилась победой Франции и ее союзников, доказав, что военное правительство и режим военного времени выполнили свою историческую миссию. Франция, заявил он, теперь нуждается в стабильном гражданском правительстве, чтобы вернуть все "на круги своя." [FRA.GetLeader] подчеркнул, что не намерен вести Францию в новую эру под властью военных, у него нет ни энергии, ни амбиций, чтобы оставаться верховным лидером страны. Хотя правительство национальной обороны прекратит свое существование, французские вооруженные силы продолжат выполнять свой долг по защите нации.\n\nЗаявление генерала об отречении от престола вызвало бурную реакцию как внутри страны, так и за рубежом. В то время как ведущие СМИ восхваляли его высокие побуждения, внимание быстро переключилось на более насущный вопрос: Кто возглавит новое гражданское правительство, которое придет на смену военному? Политические партии всего спектра выступили с заявлениями, восхваляя мудрое решение генерала и одновременно готовясь к избирательным кампаниям. Тем временем ученые и широкая общественность размышляли о достоинствах и недостатках старого правительства, многие предлагали использовать этот момент для реформирования конституционной системы Франции и возрождения страны."
 france.204.a: "Слава нашей республике!"
 france.204.b: "Мы должны сделать выбор!"
 france.204.c: "Шестая Республика стоит во весь рост!"
 france.205.t: "Затраты на Перенаправление Бюджета"
 france.205.d: "После того, как последняя сессия Национальной ассамблеи наконец-то собралась, в центре внимания законодателей и министров оказался главный вопрос: составление проекта государственного бюджета на новый финансовый год.\n\nНаша система переходит от военного правительства, ориентированного на войну, к гражданскому, и политический порядок необходимо срочно восстанавливать. Кроме военно-промышленного сектора, большинство основных отраслей промышленности находятся в плачевном состоянии и требуют значительного внимания. Между тем политическое влияние военных остается глубоко укоренившимся, и старшие офицеры не желают отказываться от существенных преимуществ, которыми они пользовались на протяжении многих лет. С другой стороны, основные политические партии в Национальной ассамблее, лишь недавно вновь обретшие голос, похоже, готовы возобновить свои обычные боевые действия.\n\nМы абсолютно не можем позволить себе еще одну остановку работы правительства. Наши лидеры намерены как можно быстрее разработать новый бюджет, направив все политические ресурсы на его принятие. Чтобы ускорить восстановление Франции, мы значительно увеличили ассигнования на социальное обеспечение и ключевые отрасли, что потребует сокращения тяжелой промышленности и военных инвестиций. Это, конечно, вызовет новый виток разногласий между гражданским правительством и военными, но управление страной - это, в конце концов, тонкая балансировка, которая требует поддержания равновесия в долгосрочной перспективе."
 france.205.a: "Мы будем ждать своей Силы"
 france.206.t: "Франции удалось вернуть американских астронавтов с МКС"
 france.206.d: "Примерно за последние сутки из Франции пришли отличные новости: французское правительство успешно вернуло американских астронавтов с МКС обратно на землю. Продолжающаяся гражданская война в Соединенных Штатах создала чрезвычайно большую проблему для трех оставшихся американцев, Джессики Уоткинс, Роберта Хайнса и Кьелла Линдгрена, которые работали на МКС, поскольку страна, за которую они несут ответственность, погрузилась в безответственный хаос. Поскольку делегированные экипажу припасы подходили к концу, американские астронавты столкнулись с серьезной проблемой организации своего возвращения. Поскольку Франция взяла на себя обязанности США на МКС, было организовано длительное, но в конечном счете успешное возвращение, поскольку в течение последних нескольких часов [FRA.GetLeader] объявил, что американцы благополучно вернулись на Землю. Руководство Европейского космического агентства объявило, что Леопольд Эйхартс и Томас Песке из Франции вместе с Маттиасом Маурером из Германии займут свое место на МКС. Президент Байден незамедлительно направил поздравительное послание французскому государству и публично объявил, что они сделают все возможное, чтобы их астронавты вернулись домой в штаты как можно скорее. Однако были высказаны опасения по поводу их безопасности по возвращении в США, поскольку страна все еще вовлечена в крупную войну. Несмотря на это, оба правительства дополнили усилия в качестве упражнения в братском сотрудничестве в мире, который, казалось бы, разделен конфликтом."
 france.206.a: "Добро пожаловать домой со Звезд!"
 france.206.b: "Вдохновляет Поколение Звезд!"
 france.206.c: "Космические Патриоты!"
 france.206.e: "Истинные Американцы Спустились со Звезд!"
 france.206.f: "Ими руководил дух Гагарина и Армстронга..."
 france.206.g: "Западная пропаганда! Мы предложили первыми!"
 france.206.h: "И мы там будем..."
 france.206.i: "Мы тоже достигнем небес..."
 france.207.t: "Взрыв убивает американских астронавтов, возвращающихся с МКС!"
 france.207.d: "Сегодня во Франции происходят ужасающие события, поскольку многочисленные сообщения подтвердили, что космический корабль, доставлявший американских астронавтов с МКС, взорвался. Продолжающаяся гражданская война в Соединенных Штатах создала чрезвычайно большую проблему для трех оставшихся американцев, Джессики Уоткинс, Роберта Хайнса и Кьелла Линдгрена, которые работали на МКС, поскольку страна, за которую они несут ответственность, погрузилась в безответственный хаос. Поскольку делегированные экипажу припасы подходили к концу, американские астронавты столкнулись с серьезной проблемой организации своего возвращения. Франция и связанные с ней органы Европейского космического агентства попытались вернуть их, но космический корабль, который совершал возвращение, столкнулся с серьезными проблемами. Космический корабль, расписание вылета которого уже было перенесено, попытался вернуть американцев обратно на Землю, но потерял контакт с ЕКА и французскими властями в середине полета. Основываясь как на измерениях приборов наземного контроля, так и на показаниях очевидцев, выяснилось, что произошла утечка топлива, которая привела к мощному взрыву, в результате которого погибли находившиеся на борту американцы. Президент Байден выступил только с одним заявлением, в котором выразил скорбь по этим американцам, погибшим в результате взрыва. [FRA.GetLeader] также объявил об усилиях по извлечению тел из-под обломков авиакатастрофы на Земле. Граждане Европы и Америки потрясены и находятся в состоянии траура в связи с этой трагедией. "
 france.207.a: "Ужас прямо с космоса!"
 france.207.b: "Наилучшие пожелания их семьям..."
 france.207.c: "Первая трагедия Военно-космических сил..."
 france.207.e: "Герои падают с Звезд..."
 france.207.f: "Звезды Революции сияют ярче..."
 france.207.g: "Явный недостаток, распространенный в западных продуктах"
 france.207.h: "Свидетельство Европейской Инженерной Некомпетентности"
 france.209.t: "В Саудовской Аравии сохраняется статус-кво."
 france.209.d: "Гражданская война, наконец, подходит к концу, и туман войны рассеивается. Теперь ясно, что саудовский истеблишмент одержал победу над своими противниками. \n\nБлагодаря нашим заявлениям о том, что они были законным правительством, и нашей финансовой поддержке, они успешно обеспечили мир на полуострове, и благодаря их благодарности у нас есть много возможностей расширить наше влияние в регионе, мы не упустим этот шанс."
 france.209.a: "À propos de cet accord..."
 france.208.t: "Аравийская республика одержала победу."
 france.208.d: "После долгого и кровопролитного конфликта была потрясена сама суть земель Саудовской Аравии. Аравийская республика превзошла своих соперников и уже обратилась к нам, чтобы выполнить свою часть сделки. \n\nНаша финансовая и дипломатическая поддержка способствовала их победе, и они еще долго будут у нас в долгу, что позволит нам расширить наше влияние в регионе. Им потребуется некоторое время на восстановление, но даже в условиях послевоенного хаоса у французских компаний будет масса возможностей восполнить пробелы."
 france.208.a: "Investissement minime, gains considérables"
 france.210.t: "Звуки артиллерии и гудение самолетов в небе были заглушены в одночасье, когда последние остатки российских бригад были вытеснены из ключевого и стратегически важного краснодарского города-порта Новороссийска, так как подавляющего импульса наших вооруженных сил оказалось более чем достаточно, чтобы снова вырвать у русских медведей сворачивающиеся зубы, оставив на их пути лишь горящие шрамы от машин БМП, не оставляя ничего, кроме чистого стыда и унижения. \n\nПо сути, взятие Новороссийска считается еще одним поворотным пунктом в войне, так как это серьезно затруднило российское черноморское присутствие в регионе, а также критическая потеря крупнейшего торгового порта России и одного из крупнейших в стране, российская агрессивная война полностью перевернулась и теперь бушует на ее территории."
 france.210.d: "Французские войска заняли Новороссийск."
 france.210.a: "Так точно."
 france.2100.t: "Россия Возвращает Новороссийск"
 france.2100.d: "Пока мы отвлекались на другие дела, прилетела бомба плохих новостей: Россия, затаившаяся на некоторое время, снова обнажила клыки и захватила Новороссийск у Кубанской республики. Эта республика, созданная как демократическое государство на территории бывшего российского Кавказа после поражения в Первой европейской войне, находилась под защитой войск Франции и ЕС. Перекройка границ в этом регионе была призвана ограничить влияние России и предотвратить ее стремительную экспансию. Однако теперь стало ясно, что жажда территорий у России неутолима, особенно в таком стратегически важном месте, как евроазиатская граница.\n\nИспользуя двойную стратегию политических и военных маневров, российская армия с удивительной легкостью вошла в Новороссийск. Попав в ловушку огромной сети славянской военной мощи, даже находчивым французским войскам не оставалось ничего другого, как отступить по морским и воздушным путям, проложенным через Кубанскую республику. Это событие нанесло серьезный удар по престижу Франции на Кавказе и стало первым домино на пути России к возобновлению экспансии."
 france.2100.a: "Чёрт!"
 france.211.t: "Взятие Керчи"
 france.211.d: "Верховное командование вооруженных сил Франции официально объявило, что наши войска успешно захватили стратегический черноморский опорный пункт Керчь. После напряженных боев наши бронетанковые дивизии и воздушно-десантные подразделения начали скоординированное наступление на город, быстро заняв ключевые позиции по обе стороны Керченского пролива. Под точным огнем вражеские силы быстро рухнули, их командная структура распалась, а значительный запас оружия и техники был захвачен.\n\nКак жизненно важное связующее звено между Крымским полуостровом и материковой частью Евразии, Керчь имеет огромное стратегическое значение. Эта победа позволила эффективно прервать линии снабжения противника на южном фронте, открыв путь для последующих операций. По предварительным оценкам, наши силы захватили десятки единиц вражеской бронетехники, более десяти артиллерийских систем и множество неповрежденных военных объектов."
 france.211.a: "Так точно."
 france.2120.t: "Россия Возвращает Керчь"
 france.2120.d: "В ходе операции, которая оставила нас совершенно шокированными и неподготовленными, российским войскам удалось высадиться и захватить известный древний город Керчь, заставив наши силы бежать из города в спешке, чтобы избежать полного уничтожения своих подразделений, оставляя многочисленные орудия в своем поспешном отступлении, жутко напоминающем то, когда первоначальные вражеские войска отступали из региона. Это событие знаменует собой официальный российский плацдарм на Крымском полуострове с момента его захвата нашими вооруженными силами и союзниками.\n\nВзятие Керчи, несомненно, придало нашим врагам столь необходимый импульс уверенности в себе, так как, судя по поступающим сообщениям, они теперь стремятся продолжить свое продвижение вперед в надежде освободить весь полуостров в целом. Хотя потерю города нельзя недооценивать, наши усилия по остановке российской военной машины не должны ослабевать, мы должны не допустить дальнейших прорывов вражеских боевиков на Крымском полуострове, а также на других фронтах и секторах в будущем."
 france.2120.a: "Чёрт!"
 france.2110.t: "Взятие Сочи"
 france.2110.d: "Верховное командование вооруженных сил Франции официально сообщило, что после 72 часов непрерывных боев наши основные бронетанковые силы успешно взяли под контроль Сочи, ключевой стратегический город на восточном побережье Черного моря. В городских боях наши пехотные и бронетанковые подразделения проводили планомерные операции по зачистке города, овладевая им квартал за кварталом. Противник попытался одержать последнюю победу в центральном районе, но под непрерывным мощным огнем его моральный дух рухнул, что привело к массовой сдаче.\n\nСтратегическое значение Сочи заключается в том, что он является важнейшими воротами на Кавказ и крупным портом на Черном море. Эта победа дает нам полный контроль над восточным побережьем Черного моря, эффективно отрезая морские пути снабжения противника на юге. Тем временем наши инженерные подразделения приступили к восстановлению поврежденной инфраструктуры для поддержки текущих военных операций. Передовые подразделения по ремонту бронетехники создали временные ремонтные склады для обеспечения боеготовности фронта."
 france.2110.a: "Так точно."
 france.2111.t: "Россия Возвращает Сочи"
 france.2111.d: "Несмотря на все усилия, которыми мы располагали, стало известно, что российским тактическим батальонным группам удалось полностью захватить и оккупировать город Сочи, один из крупнейших курортных городов страны и Кавказского региона в целом. В то время как наши войска, гарнизонированные в городских центрах и на окраинах, доблестно и яростно сражались за удержание фронта, непрекращающийся натиск русских мобов и других элементов заставил наши бригады, расположенные в городе, принять трудное, но необходимое решение оставить город и его окрестности, вместо этого решив сравнять его с землей скоординированными артиллерийскими обстрелами и точными авиаударами, чтобы предотвратить дальнейшее продвижение русских сил в этом районе. \n\nХотя потеря Сочи повлекла за собой значительные стратегические и моральные потери для нас, французское командование сохраняет полную уверенность в продолжении наступательных операций на Кавказе, чтобы сдержать российскую агрессию и дать бой кровожадному медведю самостоятельно."
 france.2111.a: "Чёрт!"
 france.212.t: "Мона Лиза, Покрытая Супом"
 france.212.d: "В шокирующем акте протеста демонстранты недавно нанесли удар по легендарной "Мона Лизе", затянув шедевр слоем супа. Этот смелый жест призван подчеркнуть актуальность проблем, связанных с ископаемым топливом и деградацией окружающей среды, обратив взор мировой общественности на климатический кризис. Выбрав одну из самых узнаваемых картин в истории, протестующие стремились нарушить благодушие, царящее вокруг бездействия в отношении климата, используя знаменитое произведение искусства как мощный символ культурного наследия, находящегося под угрозой. \n\nИзображение супа на "Мона Лизе" поразило контрастом, сопоставив красоту искусства с суровой реальностью экологического вреда. Протестующие утверждали, что подобные акции необходимы для того, чтобы вызвать ответную реакцию общества, зачастую нечувствительного к постепенному разрушению планеты. Их цель - вызвать диалог о последствиях нашей зависимости от ископаемого топлива и необходимости системных изменений. Критики, однако, назвали акцию вандализмом, сомневаясь в том, что нацеленное искусство действительно вдохновит на необходимые действия или оттолкнет потенциальных союзников в борьбе за климатическую справедливость."
 france.212.a: "Теперь я голоден..."
 france.213.t: "Суп с "Цветами""
 france.213.d: "В смелом и противоречивом акте протеста демонстранты недавно нанесли удар по знаменитой картине Винсента Ван Гога "Цветы", выплеснув суп на полотно. Эта поразительная акция была не просто нападением на любимое произведение искусства, это было намеренное заявление, направленное на привлечение внимания к насущным проблемам изменения климата и деградации окружающей среды. Выбрав столь известное произведение, протестующие пытались спровоцировать разговор о хрупкости нашего природного мира, символизируемого яркими цветами, которые так прекрасно запечатлел Ван Гог. \n\nВыбор супа, повседневного продукта, символизировал срочность и доступность климатического кризиса. Хотя некоторые критиковали этот акт как вандализм, сторонники утверждали, что это необходимый сигнал к пробуждению. В мире, где красота природы подвергается все большему риску, сопоставление шедевра с суровой реальностью запустения окружающей среды подчеркивает необходимость немедленных действий. Визуальное воздействие супа на картину напомнило нам, что искусство, которым мы дорожим, тесно связано с экосистемами, поддерживающими жизнь."
 france.213.a: "Хм, это не лучший способ распространять свои идеи, ребята"
 france.214.t: "Партия Макрона меняет название на "Возрождение""
 france.214.d: "Партия президента Франции Эммануэля Макрона "Республика в движении" сменила название на "Возрождение", сообщил сегодня исполнительный директор партии Станислас Герини.\nВ сопровождении бывшего премьер-министра Франции Эдуарда Филиппа - основателя правоцентристской партии "Горизонты" - и лидера партии "Демократическое Движение" Франсуа Байру Герини объявил о создании предвыборной коалиции между тремя партиями в преддверии парламентских выборов во Франции, которые состоятся в следующем месяце. "Возрождение" выставит 400 кандидатов, - добавил он. \n\nПо словам Герини, причина выбора названия заключалась в том, чтобы показать, что партия "всегда будет делать выбор в пользу просвещения, а не мракобесия". Она будет "открыта для граждан, выборных должностных лиц, местных выборных должностных лиц, откуда бы они ни приехали", добавил он. Это также было название партийного списка Макрона на европейских выборах 2019 года."
 france.214.a: "Пожалуйста, напомните мне, как это писать?"
 france.215.t: "Парад Победы в Киеве"
 france.215.d: "Европейские войска вместе с украинскими войсками проходят парадом по улицам Киева, встречаемые ликующими толпами и торжествующими празднествами. Марш - это не просто демонстрация военной доблести, но и символ прочных уз между европейскими странами и Украиной, объединенных приверженностью миру, демократии и защите общих ценностей. Когда солдаты маршируют по городу, их чествуют как героев, за их храбрость и самопожертвование в борьбе с агрессией. Марш победы служит мощным напоминанием о важности солидарности и сотрудничества в стремлении к миру и безопасности в Европе и за ее пределами."
 france.215.a: "Сладкая, сладкая Победа..."
 france.216.t: "Первые выборы 7-й республики"
 france.216.d: "В связи с тем, что 7-я Республика Франция готовится к своим первым выборам, выяснилось, что между основными партиями существует разительный контраст в идеологиях. Лидеры популярного движения военных за отстранение гражданского правительства от власти поддержали Пьера де Вилье и его новую партию "Альянс за победу Франции", которая представляет платформу, направленную на укрепление национальной обороны, выступает за сильное военное присутствие в мировых делах и подчеркивает важность мощной оборонной промышленности для экономического роста и развития Франции. поддержание славы военного переворота. \nНапротив, "Народно-демократический союз", возглавляемый Франсуа Байру, попытался объединить идеалы Макрона с другими второстепенными партиями левого толка, представляющими широкую центристскую позицию и стремящимися сбалансировать военную мощь с социальным обеспечением и экономическим процветанием. Они выступают за прагматичный подход к управлению, стремясь объединить нацию под знаменем стабильности и прогресса.\n И, наконец, "Прогрессивная партия возрождения", поддерживаемая находящимся в заключении Меланшоном и возглавляемая бывшим премьер-министром Эриком Кокерелем. Поскольку Франция стоит на перепутье, результаты этих выборов не только определят будущее направление развития страны, но и отразят глубокие разногласия во французском обществе относительно ее политики. вторая новая конституция за десятилетие."
 france.216.a: "Милитаристы Рулят!"
 france.216.b: "Дая центризму второй шанс"
 france.216.c: "Военные действовали незаконно по отношению к старой конституции!"
 france.217.t: "Первые выборы 6-й республике"
 france.217.d: "В то время как 6-я Республика Франция готовится к своим первым выборам, на политической арене доминируют две основные партии: "Классическая Партия" и "Единство за Перемены". Выборы знаменуют собой важный момент в истории Франции, поскольку они определят направление развития страны в соответствии с новой конституцией.\n\n"Классическая партия", возглавляемая бывшим председателем и генеральным директором AXA Анри де Кастри, представляет традиционные либеральные ценности свободы личности, свободного рынка и ограниченного правительства, возглавляемая харизматичными лидерами, обещающими экономический рост и процветание за счет дерегулирования и приватизации. С другой стороны, "Объединенные ради перемен" выступают за социальную справедливость, равенство и вмешательство правительства в решение социальных проблем. Они обещают уделять приоритетное внимание программам социального обеспечения, правам работников и охране окружающей среды, обращаясь к тем, кто стремится к более инклюзивному и справедливому обществу. \n\nРезультаты этих исторических выборов будут определять не только внутреннюю политику, но и позицию Франции на мировой арене, подчеркивая противоположные идеологии и ценности, лежащие в основе 6-й Республики."
 france.217.a: "Победа Социализма!"
 france.217.b: "Мировая победа либертарианцев!"
 france.218.t: "Конституционный перекресток"
 france.218.d: "После российско-украинской войны и перед лицом продолжающейся геополитической неопределенности Франция находится на критическом этапе в отношении своей конституции. В целом социалистическая конституция 6-й Республики, в которой особое внимание уделяется социальному обеспечению и демократическим принципам, ставится под сомнение после того, как военные восстановили гражданскую администрацию после войны.\n\nСторонники сохранения 6-й республики утверждают, что она отражает ценности Франции - свободу, равенство и братство - и обеспечивает прочную основу для демократического общества. Они считают, что сохранение этой конституции имеет решающее значение для поддержания социальной сплоченности и соблюдения прав всех граждан. Однако сторонники конституции 7-й Республики утверждают, что Франции необходимо более сильное, централизованное правительство, уделяющее особое внимание национальной безопасности и военной мощи, чтобы ориентироваться в сложной и нестабильной международной обстановке. Они считают, что для обеспечения безопасности Франции и защиты ее интересов на мировой арене необходим более милитаристский подход."
 france.218.a: "Конституция Меланшона остается неизменной"
 france.218.b: "Нам нужна новая конституция."
 france.219.t: "Победа Действующего Президента"
 france.219.d: "Несмотря на первоначальные опасения и приостановку выборов 2026 года, правящая партия одержала убедительную победу. Население Франции, все еще не оправившееся от последствий российско-украинской войны, решило довериться опытному руководству нынешнего правительства. С обновленным мандатом правительство обязуется сосредоточиться на восстановлении страны, как физическом, так и эмоциональном, после войны. \n\nУбедительная победа не только укрепляет позиции правительства, но и дает четкий сигнал о том, что французский народ един в своем стремлении к стабильности и преемственности в эти сложные времена. По мере того как Франция продвигается вперед, правительство преисполнено решимости почтить жертвы, принесенные во время войны, и построить более светлое будущее для всех граждан."
 france.219.a: "Vive le France!"
 france.220.t: "Число погибших достигло 30 000 человек"
 france.220.d: "Решение Франции вступить в российско-украинскую войну обошлось ей очень дорого, и сообщения подтверждают потерю 30 000 французских солдат в ходе конфликта. Эта новость вызвала шок по всей стране, поскольку семьи оплакивают потерю своих близких, а общины переживают последствия войны на внутреннем фронте. Жертвы, принесенные этими солдатами, тяжелым бременем ложатся на коллективное сознание страны, подчеркивая суровые реалии войны и связанные с ней человеческие жертвы. \n\nОднако по мере того, как война затягивается, во французском обществе начинают проявляться признаки военного истощения. Постоянный поток жертв в сочетании с экономическими трудностями, связанными с поддержанием военных действий, негативно сказываются на моральном состоянии населения. Настроения в обществе меняются, растет число призывов к прекращению конфликта и сосредоточению внимания на восстановлении и исцелении нации. Гибель наших солдат служит отрезвляющим напоминанием о цене войны и о том, какие потери она несет не только на поле боя, но и в сердцах и умах тех, кто остался позади."
 france.220.a: "Война - Ад"
 france.221.t: "Национальный Позор"
 france.221.d: "С востока приходят сообщения о катастрофе, постигшей Европу. Украинское правительство разбито вдребезги, а его отставное правительство безоговорочно капитулировало перед наступающими с востока полчищами. Чтобы еще больше разжечь рану, члены украинских и генеральных штабов других партнеров по НАТО выступили с обвинениями в наш адрес. Обвинения в трусости, бездействии и откровенной некомпетентности хлынули потоком. Независимо от истины, эти убеждения отравляют ситуацию и затрудняют попытки координировать что-либо, что ведет к потенциальной катастрофе. Это также заставляет мораль, и без того низкую, падать еще больше, а некоторые опасаются, что без быстрого успеха армия может развалиться. Мы должны выстоять и удерживать Днестр до последнего, а при возможности атаковать и атаковать, пока не кончатся пули или кровь. На карту поставлены сплоченность армии, репутация Франции и сама судьба Восточной Европы."
 france.221.a: "attaque à outrance"
 france.222.t: "Продление Срока"
 france.222.d: "Всем, кого это может касаться... \nПо причине проблем с логистикой в Восточной Европе, наши войска неоднократно задерживались. В связи с этим я прошу предоставить нам дополнительные четырнадцать дней к сроку начала Opération Davout.\nnVive la France!\n\nПодписано, \nФранк Буде"
 france.222.a: "Одобрено"
 france.222.b: "Отказано"
 france.223.t: "Моей Дорогой Маме,"
 france.223.d: "Сегодня я прибыл в учебный лагерь в Париже и приступил к первому этапу базовой подготовки; они называют его "Желтым этапом", во время которого я адаптируюсь к военной жизни, учусь дисциплине, командной работе, программам, традициям и тому подобному. Хотя я еще не нашел себя, никого, кого мог бы назвать своим товарищем, я думаю, что скоро хорошо познакомлюсь с теми, кто сопровождает меня на тренировках. Я знаю, вы с папой ненавидите городскую жизнь, и всегда ненавидели, вот почему вы, казалось, колебались, отправляя меня сюда, это не так плохо, как вы думаете, я обещаю. Он находится в одном из самых отдаленных округов, по-моему, в двадцатом, и, так сказать, не является частью "городской жизни". Даже сейчас я начинаю плакать, зная, как долго меня не будет. Я уже скучаю по папе, ферме и брату Кристофу; и я, конечно, знаю, что буду скучать по тебе. Это была тяжелая работа, и она стала настоящим испытанием для меня физически. Конечно, уроки всегда самые легкие, потому что нет ничего, чего бы я еще не знала. Я думаю, дисциплина, которая царит у нас на ферме, действительно поможет мне, и я благодарю вас за это. По ночам я всегда мечтал служить и сражаться за свою нацию, когда она подвергается наибольшей опасности; помогать другим людям и знать, что лучше для твоей страны, - это величайшее чувство в мире. Преданный Богу, я буду сражаться за свою страну доблестно и с величайшей честью. Я надеюсь, что недолго буду простым солдатом, и у меня будут великие устремления. Может быть, однажды я смогу стать военным генералом и повести свой народ против врагов Франции! Надеюсь, достаточно скоро. Интересно, как кормят в армии? Конечно, ничто не сравнится с блюдами, которые ты готовила каждый день в моем детстве. Мне будет не хватать таких разговоров с тобой, и я буду скучать по всему. Но для этого и нужны эти письма, понимаешь? Я очень надеюсь, что ты также покажешь это Кристофу и папе. Это согрело бы мое сердце, потому что я люблю их обоих всем сердцем.\n\nSincèrement,"
 france.223.a: "Твой сын."
 france.224.t: "Привет Мама"
 france.224.d: "Сегодня меня с честью уволили из армии, чтобы я мог продолжить карьеру в Иностранном легионе в Америке. Я знаю, что это может пугать, обеспокоить или разозлить вас, поскольку я сделал это без вашего одобрения, но, пожалуйста, знайте, что я буду в безопасности и что я делаю это на благо своей страны и людей по всему миру. Прошло 2 года с момента моего первого письма, когда я только приехал в учебный лагерь. О, я до сих пор помню тот день; все было так ново, я встретил удивительных людей, но теперь потерял с ними связь. Их лица... они словно призраки в моем воображении. Я желаю им безопасности. Я уже говорил вам об этом во время своих многочисленных визитов, поэтому не буду повторяться, но каждый день я чувствую, что мир вокруг меня рушится. Как пожар, который полыхает годами, охватывая земной шар и медленно уничтожая человеческую культуру, даже нашу собственную. Некоторые говорят, что это просто нагнетание страха, но я думаю, что это реальная угроза. Результаты выборов 2022 года, мягко говоря, разочаровали меня, и с каждым днем я становлюсь все более недовольным истеблишментом. Я знаю, что вы не любите политику так сильно, как я, но скоро вы поймете, что "состояние политики" важнее всего остального в мире. Оно переплетается со всем и ни с чем. Я знаю, что окажусь еще дальше от дома, вдали от Кристофа, тебя и папы, чего я не хочу, это совершенно необходимо. Многие из моих товарищей уже вызвались присоединиться, и я нашел себе новое братство, в котором смогу существовать. Многие из них такие же, как мы с вами; они никогда не любили городскую жизнь и хотят увидеть все самое лучшее в своей стране. Если вы когда-нибудь слышали историю Лафайета, ее можно сравнить с тем, что происходит сейчас. Америка переживает революцию, и я буду в авангарде ее, кто бы ни пытался меня переубедить. Я искренне надеюсь, что ты отнесешься к этому письму с пониманием, и я действительно люблю тебя всем сердцем. Пожалуйста, просто не волнуйся за меня. Я вырос, и со мной все будет более чем хорошо.\n\nSincèrement,"
 france.224.a: "Твой сын."
 france.225.t: "Дорогая Мама и Папа"
 france.225.d: "Сегодня я прибыл в Бордо после нескольких лет службы в Америке. Я глубоко сожалею, что не писал вам все эти годы, но из-за серьезности моего положения там у меня просто не было времени. Кристоф недавно написал мне, что ты был потрясен, услышав эту новость, и что ты очень переживал за меня. На самом деле, это, должно быть, ужасно - пережить, что твой собственный сын пропал без вести в зоне боевых действий. Мне есть что сказать, и когда я навещу вас с папой, я расскажу вам все, что не смогу вместить в этот конверт. Кристоф рассказал мне о папе и о том, что его состояние ухудшается. Пожалуйста, пожалуйста, продолжайте сообщать мне о его состоянии и о ферме, пока я не вернусь домой. Если я в последний раз вижу его живым, то не хочу торопиться с возвращением домой. Моя служба на передовой в Америке, мягко говоря, открыла мне глаза и помогла понять истинную природу войны. Я всегда слышал истории о мятежах и конфликтах, особенно от ветеранов Иностранного легиона, но никогда не сталкивался с ними лично. Война - это ад, и в своей ярости она разрушает все. Я все это видел... массовые убийства, о которых говорят те, кто утверждает, что борется за общее благо. Я не хочу посвящать вас в подробности, поскольку знаю, что вы стары и хотите думать о чем угодно, кроме этого, но это действительно ужасно. Это действительно показало мне, как нам всем повезло, когда люди, которые являются нашими братьями, сталкиваются с ужасами войны, будь то гражданские или солдаты. Я уверена, что вы, папа и Кристоф все слышали эту новость: Россия находится в состоянии войны с Европой, и они сделают все возможное, чтобы стереть с лица земли наши дома и деревни. Они вторглись в Украину, и им суждено продолжить свою экспансию. Я возвращаюсь в армию и собираюсь служить своей стране и своему народу там, где это важнее всего. Я очень люблю вас, мама и папа, и всегда буду любить.\n\nSincèrement,"
 france.225.a: "Ваш сын."
 france.226.t: "Дорогая Мама"
 france.226.d: "Я пишу вам это письмо с величайшим страхом и потрясением. Ничего подобного я никогда раньше не испытывал, ни в Америке, ни в своей жизни. В Америке я привык к победе, даже если видел, как у меня на глазах падают мои товарищи, и, насколько я мог видеть, на каждом углу улицы, в каждом доме и в каждом магазине раздавался треск винтовок. Здесь, в Украине, нет такого понятия, как победа. Здесь нет славы. Здесь нет жизни. У нас нет свободы. Все и вся существует для того, чтобы служить убийству и бесчестию. Здесь нет рыцарства, нет рыцарей, которые могли бы победить зло. Мы сталкиваемся не с дезорганизованными партизанами, нет, мы сталкиваемся с армией насильников и убийц, вынужденных рисковать своими жизнями из-за бюрократов, которые никогда даже не видели винтовки за пределами телевизионного экрана. Я пишу вам это сообщение из окопа в одном из многочисленных окопов, обозревающих линию фронта. Эти окопы - мое единственное пристанище, даже если я все еще боюсь, что артиллерийский удар или удар беспилотника отправят меня к Богу. На линии окопов грязь высотой более 3 футов, испещренная трупами, кровью и экскрементами. Это самый ужасный запах в мире, еще хуже, когда находишься в самом центре этого, а ты должен это сделать. Наши командиры ничего из этого не замечают и не заботятся о них. Так много моих товарищей, с которыми я сражался где угодно, были безжалостно убиты при исполнении служебных обязанностей, сражаясь с этой угрозой существованию нашей страны. Война - это ад. Я сопротивляюсь своему желанию дезертировать, потому что знаю, что сражаться за свою страну, за вас, за Кристофа и в духе папы - это мой высший долг, которому я должен служить. Я не ел 3 дня и 2 дня не пил воды. Запасы быстро сокращаются, и мы не знаем, когда поступит следующая партия. Ничейная земля - это не что иное, как бойня, где танки застревают в месте, которое русские называют Распутицей, и уничтожаются. Отношения, которые у меня сложились с моими товарищами, ничего не значат. Командные упражнения, которые я выполнял в учебном лагере, ничего не значат. Всех моих друзей убивают не прошло и часа после знакомства с ними. Я знаю, какие русские злые, но меня заставляли убивать подростков. Я видел, как призывников, не старше 18 лет, разрывали в клочья пулеметным огнем. Кажется, больше никто не обращает на это внимания. К этому моменту мы уже привыкли. Когда это письмо дойдет до вас, я умоляю вас не беспокоиться. Ты всегда так поступаешь, и это печалит мое сердце. Знай, что со мной все будет в порядке, и я буду упорствовать. \n\nSincèrement,"
 france.226.a: "Твой сын."
 france.227.t: "С Днём Победы, Мама"
 france.227.d: "Сегодня мы получили известие о том, что война, которая разрушила и унесла так много жизней как в нашей стране, так и за ее пределами, закончилась. Моя бригада устроила особенно пышный праздник на российской земле, где шли приготовления к отправке нас домой. Российские бойцы сопротивления побежали к противоположной траншее, приветствуя и обнимая членов своих семей, которые оказались на другой стороне. По-видимому, наши командиры сочли это победой, а дома услышали новости; Кавказский регион, Беларусь и Белгород были освобождены от российского контроля, а правительства, лояльные Европе, были сформированы. Конечно, мы не предприняли никаких усилий для свержения режима в России, несмотря на все, что они сделали, чтобы навредить нашему народу, и, скорее всего, он будет разрушен изнутри. Если мы обратимся к истории, то ясно увидим, что из пепла сожженной России родится новое правительство, гораздо худшее, чем предыдущее, и это не нравится ни HICOM, ни нашему правительству. В конце концов, мы все равно победили, верно? Я думаю, что это событие заслуживает уважения, но не обольщайтесь, оно трагично. Какой ценой мы продвинули наши восточные границы еще дальше? Какой ценой мы высвободили всю мощь русского медведя? Зная это, я просто не могу с добрым сердцем вернуться домой героем. Я не герой. Я сторонний наблюдатель. Я не боец, пока не возьму все в свои руки. Война превратила меня в другого человека, в новую личность. Я не уеду из России со своим взводом, к неудовольствию моего грубого начальника. Пожалуйста, не беспокойтесь за меня. Я собираюсь сделать то, что лучше для вас с Кристофом. \n\nSincèrement,"
 france.227.a: "Твой сын."
 france.228.t: "Дорогая Мама и Народ"
 france.228.d: "Сегодня мы получили известие о том, что война, которая разрушила и унесла так много жизней как в нашей стране, так и за ее пределами, закончилась. Здесь, в Варшаве, которую русские основательно разрушили и устроили бойню, не было никаких торжеств. Каждый дюйм этого города покрыт обломками и трупами, и он напоминает то состояние, в котором он был, когда немцы проходили по нему 90 лет назад. Все мирные жители, которые не эвакуировались, когда пришла первая волна, были безжалостно убиты. Наши припасы давно закончились, и значительная часть нашей армейской группировки погибла от голода и многочисленных болезней, которые распространяются по нашим окопам. Те, кто остался в нашей бригаде, возвращаются домой, в дом, запятнанный бюрократами и спекулянтами на войне, которые действовали как паразиты, обогащаясь, в то время как мои товарищи умирают в городах, вынужденные терпеть безжалостные атаки русских. Они ничего не сделали для защиты сердца и души нации, и им было наплевать на гибель сотен тысяч французов. Они соучастники и, во всяком случае, сотрудничают с русскими, активно содействуя их массовым убийствам. Десятки раз я был на волосок от смерти, и ни разу мне не было оказано адекватной медицинской помощи, которая помогла бы моему положению. И все же я продолжал бороться. Я продолжал сражаться в течение многих лет только для того, чтобы получить удар в спину от людей, которые называют себя лидерами. Мы проиграли эту битву, и Россия завоевала Восточную Европу, наводнив ее границы и убивая европейцев. Я больше не могу сидеть сложа руки, когда мои старшие офицеры приказывают мне стоять в окопе на передовой. Я больше не могу быть трусом в своем подходе. Я буду действовать как герой, я буду действовать как воин за свою нацию и я отомщу за своих павших братьев. Я вернусь домой и прослежу за тем, чтобы Франция никогда не пала так, как это произошло сегодня, подвергаясь ниспровержению со стороны иудео-коммунистов как внутри нашей страны, так и нападениям со стороны иудео-коммунистов в России. Моей дорогой маме, знай, что я собираюсь сделать это ради блага моей страны, ради твоего блага и блага Кристофа. Я люблю тебя всем сердцем. \n\nSincèrement,"
 france.228.a: "Твой сын, Лафайет."
 france.229.t: "Кому: Mère"
 france.229.d: "Если это письмо дойдет до вас или Кристофа, то меня, вполне возможно, уже не будет в живых. На момент написания этого письма я все еще находился в России и не уехал оттуда вместе с остальными членами моей бригады. В настоящее время я нахожусь в самом сердце дьявола, в Москве, где я буду отстаивать свою позицию. Я поддерживаю тех, кто поклялся следовать за мной в этой миссии, включая нескольких россиян, которые знают, что лучше для человечества. Политики по всей Европе, которые засели в своих дворцах, в то время как наши люди гибнут при исполнении служебных обязанностей, а мужчины в возрасте от 18 лет вынуждены покидать свои дома, разлучаться со своими семьями, чтобы сражаться за этих политиков, которые их не уважают. Русские, которые развязали эту войну, вторглись в соседние страны и ведут себя как насильники, мясники и убийцы в высшей степени варварски. Им до сих пор сходят с рук их преступления, и их прощают подонки, управляющие высшими институтами мира. Наш народ, наше наследие, наша этническая принадлежность и наша культура всегда будут подвергаться нападкам и репрессиям со стороны этих крыс, прячущихся в Москве, которые ждут удобного момента, чтобы нанести удар. Вы уже можете видеть, как их идеология возрождается, крещенная кровью сотен тысяч французов. Будь то нацисты или большевики, они никогда не прекратят свои нападения на наш народ. Ценой крови я спасу свой народ и обеспечу его будущее. Я знаю, что вы уже пожилая женщина и хотите мира, но вам нужно осознать правду. Я собираюсь нанести удар по России изнутри, и если мне это удастся, я отправлюсь на запад, освобождая Европу от палачей. Началась великая революция, и, как говорится, от одной искры может разгореться пожар в прериях. Пожалуйста, дорогая мама, если ты получишь это письмо, сообщи мне об этом. Не дай мне забыться. Я люблю тебя и всегда буду любить. Слава Франции и французскому народу.\n\nSincèrement,"
 france.229.a: "Твой сын, Лафайет."
 france.230.t: "Привет моей дорогой Mère"
 france.230.d: "Я уверен, что ты уже слышала эту новость. Франция была спасена от посягательств либеральных космополитов и иудео-коммунистов, которые превратили наш народ в мешки с мясом, отправив нас на восток на убой в созданных ими бойнях. Несмотря на твой недавний интерес к политике, ты стареешь, и я бы не хотел, чтобы твои последние дни прошли за чтением писем твоего сына о состоянии французской политики. Я использовал свое положение, чтобы убедиться, что твой район не пострадает от боевых действий и что ты будешь в надежных руках. Мне очень жаль, что я не смог присутствовать на 17-летии Кристофа, и я надеюсь, что он не испытывает ко мне неприязни из-за этого. Когда ты услышишь обо мне по телевизору или по телефону, просто знайте, что я делаю все это ради твоего будущего. Ради Кристофа, ради всех во Франции, и именно поэтому я взял на себя обязательство выполнять свои обязанности с максимальной доблестью и честью, и я бы не стал делать этого ни от чьего имени. Я помню, как в последний раз видел тебя перед отъездом в учебный лагерь много лет назад. Тогда ты знала, что вырастила национального героя? Ты была лучшей матерью, о какой только можно мечтать. Мне очень жаль, что я больше не могу часто навещать тебя, так как я все еще должен служить, но ты навсегда останешься в моем сердце и духе, как и папа, Кристоф и вся нация. Я думаю, что именно здесь начинается национальная гармония. Она начинается в семье, а семья всегда священна. Когда я смогу навестить вас, я сделаю это, но, к сожалению, сейчас не время. Я считаю, что в истории нации есть четкая, всеобъемлющая история, которая определяет национальную идентичность и наследие, подпитывая воинов этой нации на протяжении тысячелетий. Судьба каждого человека, стоящего под национальным флагом, - мужественно служить ему или быть частью социальной гармонии. Когда вы вырастете, поступки, которые вы совершите для продвижения этой истории, перевесят вашу личную, мирскую жизнь, и это отражено здесь. Это не значит, что я не думаю о тебе или что я забыл тебя, нет, это далеко не так. Ты заложила те кирпичики, фундамент, на котором я стою. Я всегда буду благодарен тебе за это. Конечно, мы сможем подробнее поговорить лично, когда настанет этот день. А пока прощай, мама."
 france.230.a: "Твой Сын."
 france.231.t: "Революционный мандат на осуществление государственных казней"
 france.231.d: "В то время как правительство стремится укрепить свою власть и уничтожить оппозицию, общественности предлагается выбор методов казни. Этот мандат вызвал жаркие споры по всей стране, отражая глубокие разногласия по поводу справедливости, морали и будущего революции. \nСейчас граждане сталкиваются с четырьмя различными вариантами осуществления казней в государстве: \nГильотина - возвращение к культовому символу революционного правосудия, вызывающему дух прошлого и призванному служить сдерживающим фактором для контрреволюционеров. \nРасстрельная команда - метод, подчеркивающий быстроту и решительность действий, привлекательный для тех, кто ставит на первое место эффективность и прямоту в вопросах государственной безопасности. \nСмертельная инъекция - более современный метод, который пропагандирует гуманность казни, что соответствует тем, кто выступает за менее жестокие методы. \nАболизация смертной казни - радикальный выбор, отражающий идеалы милосердия и реабилитации, привлекающий тех, кто считает, что революция должна стремиться к преобразованию общества, а не к увековечиванию циклов насилия."
 france.231.a: "Гильотина - лезвие революции!"
 france.231.b: "Стрелковая команда позволяет добиться максимальной эффективности"
 france.231.c: "Смертельная инъекция - самая безболезненная"
 france.231.e: "Мы должны просто позволить им гнить в тюрьме."
 france.232.t: "Революционный мандат на дебатах по календарю"
 france.232.d: "В рамках важного шага по изменению национальной идентичности был введен новый мандат на решение спорного вопроса о календаре. По мере того как обостряются споры о том, как лучше всего отразить революционные ценности и устремления нации, гражданам предлагается высказать свое мнение о предпочтительной системе отсчета времени. Эти дебаты не только подчеркивают различия во взглядах на традиции и прогресс, но и служат символическим полем битвы для более широких идеологических конфликтов. \nОбщественности предлагается два варианта: \nВозвращение старого французского республиканского календаря - Сторонники этого варианта утверждают, что восстановление исторического календаря позволит почтить революционный дух и воспеть ценности прошлого. Они считают, что это объединит население под общей исторической основой и подчеркнет важность революционных идеалов в повседневной жизни. \nСохранить существующий календарь - сторонники этого варианта утверждают, что существующий календарь обеспечивает стабильность и преемственность, позволяя гражданам ориентироваться в своей жизни без сбоев, которые могут принести изменения. Они утверждают, что существующая система укоренилась в обществе и служит практическим целям, которые не следует упускать из виду."
 france.232.a: "Почему мы вообще рассматриваем это?"
 france.232.b: "Мы должны вернуться к обществу, свободному от религии!"
 france.233.t: "Революционный мандат о гомосексуальности и гендере"
 france.233.d: "В переломный момент социальных преобразований был введен новый мандат, призванный решить сложные вопросы, связанные с гомосексуальностью и гендерной идентичностью. Пока общество размышляет о последствиях революционных идеалов для личных свобод и прав, граждане приглашаются к участию в этой важнейшей дискуссии. Результаты этого мандата окажут значительное влияние на культурный и социальный ландшафт страны. \nОбщественности предлагается два различных варианта: \nПринятие гомосексуальности и гендерных дискуссий - Сторонники этого варианта выступают за полное принятие и признание различных сексуальных ориентаций и гендерных идентичностей. Они утверждают, что принятие этих аспектов человеческой идентичности необходимо для обеспечения равенства, продвижения индивидуальных свобод и создания более инклюзивного общества. \nЗапрет гомосексуальности и дискуссий о гендере - сторонники этого варианта утверждают, что такие меры необходимы для поддержания традиционных ценностей и общественных норм. Они считают, что ограничение обсуждений и проявлений негетеронормативной идентичности защитит ткань общества и сохранит устоявшиеся обычаи."
 france.233.a: "Мы - поборники свободы и социальной справедливости!"
 france.233.b: "Мы не склонимся перед безнравственностью!"
 france.234.t: "Революционный мандат на архитектурные проявления огромного богатства"
 france.234.d: "В смелом отражении революционных ценностей появился новый мандат на рассмотрение наследия архитектурной пышности, представленного Версалем и великими замками Франции. В то время как нация размышляет о своих отношениях с символами избыточности и декаданса прошлого, гражданам предлагается высказать свое мнение о будущем этих монументальных сооружений. Эти дебаты не только ставят под сомнение историческое значение этих объектов, но и поднимают вопросы о ценностях, которые должны определять современное общество. \nНа суд общественности представлены три различных варианта: \nМузеи буржуазного декаданса - Сторонники этого варианта выступают за превращение роскошных усадеб в музеи, которые критикуют их историю, подчеркивая излишества буржуазии. Они считают, что, сохранив эти сооружения в качестве образовательных пространств, общество сможет извлечь уроки из прошлого и построить более эгалитарное будущее. \nСнести их - - Сторонники этого варианта утверждают, что эти символы огромного богатства противоречат революционным идеалам и должны быть снесены, чтобы стереть напоминания об угнетении и неравенстве. Они утверждают, что их снос будет означать окончательный разрыв с прошлым, отмеченным классовым неравенством. \nДелать нечего - сторонники сохранения статус-кво считают, что эти архитектурные чудеса являются неотъемлемой частью культурного наследия Франции и туризма. Они утверждают, что сохранение этих зданий в их нынешнем виде позволяет оценить историческое мастерство и приносит экономическую выгоду обществу."
 france.234.a: "Превратите их в музеи буржуазного декаданса!"
 france.234.b: "Разрушьте их!"
 france.234.c: "У нас есть более неотложные дела..."
 france.235.t: "Революционный мандат по философии и внешней политике"
 france.235.d: "В переломный для национальной идеологии момент появился новый мандат на формирование философских основ внешней политики. В то время как революционное правительство стремится заново определить свое место в мире, гражданам предлагается обсудить руководящие принципы, которые должны направлять их взаимодействие на мировой арене. Эти дебаты касаются не только национальных приоритетов, но и отражают более широкие идеологические обязательства перед революционными идеалами. \nОбщественности предлагается два различных варианта: \nВсемирная революция - Сторонники этого подхода утверждают, что Франция должна активно продвигать и поддерживать революционные движения по всему миру. Они считают, что распространение революционных идеалов необходимо для ликвидации деспотичных режимов и обеспечения всеобщего равенства. Позиционируя Францию как чемпиона мировой революции, сторонники утверждают, что страна может вдохновить на перемены и солидарность угнетенные народы во всем мире. \nВнутренняя революция - Сторонники этого варианта выступают за то, чтобы сосредоточиться на решении проблем внутри Франции, прежде чем обращаться к международному сообществу. Они считают, что правительство должно уделять первостепенное внимание внутренним реформам, чтобы обеспечить социальную справедливость, равенство и стабильность внутри страны. Сосредоточившись на нуждах французского народа, сторонники утверждают, что страна может служить примером для других, демонстрируя эффективность революционных принципов на примере ощутимых улучшений в жизни граждан."
 france.235.a: "Мы всегда будем выступать за революцию во всем мире"
 france.235.b: "Мы должны сосредоточиться на нашей внутренней революции"
 france.236.t: "Революционный мандат по закону о подозреваемых"
 france.236.d: "В момент глубоких размышлений о балансе между безопасностью и свободой был введен новый мандат, касающийся спорного Закона о подозреваемых. В то время как революционное правительство борется с угрозами стабильности и безопасности своих идеалов, гражданам предлагается высказать свое мнение по поводу повторного введения этой важной правовой базы. Эти дебаты пробуждают воспоминания о былой напряженности и поднимают критические вопросы о гражданских правах во имя безопасности. \nОбщественности предлагается два различных варианта: \nВосстановить закон о подозреваемых - Сторонники этого варианта утверждают, что восстановление закона необходимо для защиты революции от внутренних угроз и контрреволюционных элементов. Они считают, что меры, изложенные в законе, укрепят национальную безопасность и сохранят завоевания революционного движения, даже если это потребует некоторых жертв в области личных свобод. \nНе восстанавливать закон - противники этого варианта утверждают, что повторное введение такого закона подрывает сами принципы свободы и справедливости, которые стремится поддерживать революция. Они утверждают, что закон исторически приводил к злоупотреблениям властью и несправедливым преследованиям, и что приверженность правам человека должна быть первостепенной в любом революционном начинании."
 france.236.a: "Это необходимо для поддержания нашей революции"
 france.236.b: "Это беспрецедентная тирания!"
 france.237.t: "Революционный мандат о Робеспьере и "царствовании террора""
 france.237.d: "В решающий момент самоанализа революционное правительство выдвинуло требование пересмотреть наследие Максимилиана Робеспьера и печально известного "Царства террора". В то время как нация размышляет над своей бурной историей, граждане призваны оценить влияние действий Робеспьера на революционное дело и идеалы, которые оно отстаивает. Эти дебаты служат критическим анализом баланса между революционным рвением и принципами справедливости и гуманности. \nОбщественности предлагается два варианта: \nБикон революционного идеализма - Сторонники этой точки зрения считают Робеспьера поборником революции, чья непоколебимая приверженность революционным идеалам оправдывала меры, принятые во времена террора. Они утверждают, что его действия были необходимы для защиты революции от врагов и сохранения с таким трудом завоеванных свобод и равенства. Сторонники считают, что признание Робеспьера в качестве путеводной звезды необходимо для того, чтобы вдохновить будущие поколения на поддержание революционного духа.  \nТиран - Противники этой точки зрения утверждают, что правление Робеспьера было опасным превышением власти, которое привело к всеобщему страху, репрессиям и гибели бесчисленного количества людей. Они утверждают, что причисление его к мелким тиранам служит предупреждением об опасности экстремизма и возможности перерастания революционного пыла в авторитаризм. Эта точка зрения призывает к критической переоценке прошлого, подчеркивая необходимость приоритета справедливости и прав человека над стремлением к идеологической чистоте."
 france.237.a: "Он был маяком революционного идеализма"
 france.237.b: "Он был всего лишь мелким тираном."
 france.240.t: "Военные Используют Свое Влияние"
 france.240.d: "В последние дни стало открытым секретом, что французские военные тонко используют свое влияние на политические дела, формируя национальную политику из-за кулис. Хотя официальные каналы хранят молчание по этому поводу, военные лидеры все чаще рассматриваются в качестве ключевых игроков в процессе принятия решений, используя свои значительные ресурсы и общественную поддержку для отстаивания более жесткой оборонной стратегии. Это вызывает недоумение как у политологов, так и у граждан, которые начинают сомневаться в истинных масштабах участия военных в управлении страной. \n\nПо мере роста напряженности в геополитической обстановке в правительственных кругах распространяются слухи о том, что военные предпочитают жесткий подход к внешней политике."
 france.240.a: "Чего они хотят достичь?"
 france.241.t: "Военные Используют Свое Влияние"
 france.241.d: "После победы на выборах наша партия получила свободу действий для проведения реформ, включая план по изменению представления о французском гражданине. Однако это стало полярной проблемой в нашем правительстве: две стороны поддерживают альтернативные идеи. Умеренные члены нашей партии считают, что мы должны поощрять наших граждан служить своей стране, зачисляя их в армию. Хотя в 21 веке во Франции уже давно царит относительный мир, последние события в Америке и Европе потребовали увеличения расходов на оборону.\n\nОднако сторонники жесткой линии в нашей партии утверждают, что мы должны поощрять наших граждан служить своей стране, ища работу на заводах. Учитывая начало войны в Саудовской Аравии и то, что Америка стоит на пороге гражданской войны, Франция должна укреплять свое внутреннее производство, если она надеется выжить. Это предложение встретило противодействие как со стороны умеренных, так и со стороны защитников окружающей среды в нашей партии, которые утверждают, что призыв к нашему народу работать до изнеможения будет только вредить нашему рейтингу одобрения. Тем не менее, сторонники жесткой линии партии поддерживают эту идею как способ стимулировать рост экономики Франции."
 france.241.a: "Примите участие в служении Своей стране"
 france.241.b: "Тяжелая Работа Окупается"
 france.242.t: "Французская Республика Просит Снизить Штрафные Санкции"
 france.242.d: "После нашей решительной победы в недавнем конфликте мы получили официальное обращение от Французской Республики с просьбой снизить размер наложенных на них военных репараций. Это обращение служит наглядным свидетельством ослабления Франции и признанием нашей силы на международной арене. Размышляя о нашем триумфе, мы видим, что эта просьба символизирует не только уязвимость Франции, но и наше положение грозной державы в Европе."
 france.242.a: "Мы сделаем это, но они должны согласиться вернуть наши утраченные активы"
 france.242.b: "Это оскорбило бы падших!"
 france.244.t: "Меланшон Укрепляет Власть!"
 france.244.d: "Жан-Люк Меланшон успешно укрепил свой авторитет в своей фракции Нового народного фронта, позиционируя себя как доминирующий голос в партии на фоне меняющегося политического ландшафта. Благодаря ряду стратегических альянсов и эффективной коммуникации Меланшон сплотил своих сторонников, укрепив свое видение, в котором особое внимание уделяется прогрессивной политике и социальной справедливости. Его харизматичный стиль руководства нашел отклик у партийной базы, что позволило ему укрепить власть и продвигать амбициозную программу."
 france.244.a: "Круто"
 france.245.t: "Фор укрепляет власть!"
 france.245.d: "Стратегический шаг, направленный на укрепление своих позиций, позволил Оливье Фору успешно консолидировать власть в своей фракции Нового народного фронта. По мере того как политический ландшафт становится все более неспокойным, стиль руководства Фора находит отклик у членов партии, которые видят в нем объединяющую фигуру, способную ориентироваться в сложностях современной политики. Его усилия по объединению различных идеологических направлений внутри фракции привели к повышению сплоченности, что позволило разработать более целенаправленную программу действий, привлекающую более широкий круг избирателей."
 france.245.a: "Круто"
 france.251.t: "Меланшон летит в Москву"
 france.251.d: "В смелом и провокационном заявлении Жан-Люк Меланшон утверждал, что "Россия - друг Франции, сотрудничество с которым должно быть расширено", выступая за изменение внешней политики на фоне продолжающегося конфликта в Украине и потенциального участия НАТО. Он выразил обеспокоенность по поводу растущего военного присутствия НАТО, заявив: "Очень скоро начнутся процессы по выходу из НАТО". Эта декларация направлена на то, чтобы Франция вновь стала независимым участником международных отношений, сосредоточившись на дипломатии и сотрудничестве с государствами, разделяющими общие интересы, а не на объединении в военные союзы. \n\nПосле заявления Меланшона военные хранят молчание, что вызывает вопросы о внутренней динамике в оборонном ведомстве Франции. Это молчание может свидетельствовать о неохотном признании происходящего политического сдвига, поскольку военные ориентируются на свою роль в меняющемся геополитическом ландшафте. Акцент Меланшона на сотрудничестве с Россией и потенциальном выходе из НАТО находит отклик у уставших от конфликтов слоев населения, позиционируя Новый народный фронт как ключевого игрока, выступающего за новый дипломатический подход в Европе."
 france.251.a: "Для кого-то это проблема..."
 france.252.t: "Меланшон выступает против войны"
 france.252.d: "Сегодня президент Франции Жан-Люк Меланшон обратился к нации, выразив глубокую озабоченность эскалацией конфликта с участием России под руководством Медведева и потенциальным вступлением НАТО в войну. "Дорогие сограждане, сегодня я стою перед вами с глубокой тревогой в сердце", - заявил он, призвав французский народ отказаться от участия в войне с Россией. Нас призывают вступить в конфликт с Россией, но я говорю вам, что это безумие. Это не наша война. Это не наша битва". Меланшон подчеркнул, что Франция не должна быть втянута в бесконечный цикл насилия, выступая за выход из НАТО и возвращение к независимой политике, ориентированной на мир и стабильность. \nВ завершение своей страстной речи Меланшон обратился к историческому контексту, спросив: "Зачем умирать за Одессу?". Этот вопрос перекликается со знаменитой фразой "Зачем умирать за Данциг?", подчеркивая его решительное неприятие военной конфронтации и представляя текущую ситуацию как такую, которая не требует жертв со стороны Франции. Сплотив нацию вокруг идеи невмешательства и дипломатии, он стремится увести Францию от эскалации напряженности и направить ее по пути, где приоритетом является диалог и сотрудничество, а не конфликт."
 france.252.a: "Современный Данциг"
 france.253.t: "Меланшон призывает к единству против фашизма"
 france.253.d: ""Граждане Франции и всей Европы! Сегодня мы стоим перед лицом огромной угрозы. Фашистская Российская империя, возглавляемая Владимиром Жириновским, начала агрессию против Украины. Мы не можем оставаться в стороне. Мы, демократическая Европа, должны объединиться и дать отпор этому злу. Фашизм не имеет права на существование в современном мире. Мы должны объединить все наши силы, все наши ресурсы, чтобы противостоять этой угрозе. Сегодня я обращаюсь ко всем гражданам Франции, ко всем нашим союзникам в Европе и за ее пределами: давайте встанем плечом к плечу против фашистской агрессии! Наше будущее зависит от нашей решимости. Мы будем бороться за свободу, за демократию, за будущее наших детей. Вперед, к победе над фашизмом!""
 france.253.a: "Allez on pousse!"
 france.254.t: "Меланшон формирует российскую антифашистскую бригаду"
 france.254.d: "Президент Жан-Люк Меланшон объявил о создании бригады российских радикальных антифашистов и коммунистов под командованием Сергея Удальцова. Эта бригада призвана бороться против фашистской Российской империи и ее лидера Владимира Жириновского, символизируя международную солидарность и борьбу за справедливость."
 france.254.a: "Ура!"
 france.146.t: "Военные Злоупотребляют Политическими Связями"
 france.146.d: "Кому интересно,  По мере того как в нашей великой стране нарастают волны национализма, я считаю своим долгом выразить растущую озабоченность неспособностью нынешнего правительства удовлетворить насущные потребности нашего народа. Настало время, когда военное руководство должно выступить вперед и направить нашу страну к силе и стабильности. Наше влияние больше не может оставаться в стороне; мы должны заявить о своем присутствии, чтобы обеспечить защиту интересов Франции. Необходимо, чтобы мы пресекали любые попытки правящего правительства, которые ставят под угрозу нашу национальную целостность. \n\nПодпись, [THIS.GetRank] [THIS.GetName]"
 france.146.a: "Откровенный деспотизм!"
 france.147.t: "Военные Предъявляют Нам Счет"
 france.147.d: "Министерству финансов,\n\nВ свете последних событий, я взял на себя смелость перераспределить значительные государственные средства на военные операции, которые считаются необходимыми для национальной безопасности. Хотя эти расходы жизненно необходимы для поддержания нашей готовности, важно, чтобы правящее правительство понимало всю серьезность ситуации. Если правительство захочет поставить под сомнение эти расходы, я позабочусь о том, чтобы законопроект был передан им обратно, поскольку безопасность нашей страны не может быть поставлена под угрозу бюрократическими проволочками. \n\nПодпись, [THIS.GetRank] [THIS.GetName]"
 france.147.a: "Долг долг долг..."
 france.148.t: "Военные Действуют Против Правительства"
 france.148.d: "Мои сослуживцы,\n\nДо меня дошло, что наша позиция против политики нынешнего правительства встретила неоднозначную реакцию. Однако мы должны оставаться решительными в своей позиции. Открыто оспаривая решения правительства, мы подчеркиваем свою приверженность истинным потребностям нашей нации. Хотя это может привести к нестабильности, это необходимый шаг, чтобы продемонстрировать, что военные представляют собой грозную силу перед лицом плохого управления. Народ должен видеть, что мы готовы защищать его интересы. \n\nПодпись, [THIS.GetRank] [THIS.GetName]"
 france.148.a: "И Вас Туда Же!"
 france.149.t: "Военные Создают Новую Дивизию"
 france.149.d: "Командованию, \n\nЯ рад объявить о создании нового подразделения, посвященного идеалам национализма, которые находят отклик у нашего народа. Это подразделение будет действовать в соответствии с принципами, которые ставят во главу угла благополучие Франции и ее граждан, независимо от влияния нынешнего правительства. Очень важно, чтобы мы создали силу, отражающую чаяния населения, ведь теперь наша преданность принадлежит самой нации, а не тем, кто сейчас находится у власти. Мы должны подготовиться к предстоящим вызовам. \n\nНа службе нашей нации, [THIS.GetRank] [THIS.GetName]"
 france.149.a: "Что ж, это не так уж плохо"
 france.250.t: "Новый Президент"
 france.250.d: "В преддверии предстоящих президентских выборов в Национальном фронте возникла борьба за власть после публичного заявления Марин Ле Пен против контроля военных в правительстве. Французские военные, все более обеспокоенные направлением развития партии под руководством Марин Ле Пен, тихо, но твердо потребовали от НФ заменить ее кандидатом, более соответствующим их интересам: Пьера де Вилье, весьма уважаемого бывшего начальника Генерального штаба. Де Вилье, известный своей твердой военной позицией и взвешенным подходом к обороне, представляет собой резкий отход от популистской риторики Ле Пен. \n\nЛидерство ФН сейчас разорвано. В то время как Ле Пен обзавелась верными сторонниками, растет понимание того, что более провоенный кандидат, такой как де Вилье, может привлечь поддержку ключевых военных деятелей и консервативных избирателей, которые считают национальную безопасность первостепенной. Вмешательство военных, хотя и неофициальное, является четким сигналом того, что они ожидают изменений в политике и персонале на высших уровнях власти. Теперь партия должна сделать выбор между сохранением верности своей популистской базе и поддержкой фигуры, которая может обеспечить как успех на выборах, так и поддержку военных."
 france.250.a: "Троекратное ура за Вилье!"
 france.250.b: "Мы поддерживаем Ле Пен!"
 france.262.t: "Франция предлагает Гвиану за членство в НАТО"
 france.262.d: "В результате неожиданного дипломатического маневра французское правительство предложило уступить Французскую Гвиану Бразилии в обмен на членство этой страны в НАТО. Это смелое предложение направлено на укрепление альянса в Южной Америке и усиление региональной безопасности против внешних угроз. Франция считает, что интеграция Бразилии в НАТО укрепит потенциал коллективной обороны и будет способствовать стабильности в геополитически стратегически важном регионе. \n\nФранцузское руководство считает это соглашение взаимовыгодным: Бразилия получит значительный территориальный актив, что усилит ее влияние и ресурсы, а Франция получит мощного союзника в рядах НАТО. Однако это предложение вызвало бурные дебаты как внутри страны, так и на международном уровне. Критики сомневаются в долгосрочных последствиях такой территориальной уступки, в то время как сторонники утверждают, что она может положить начало новой эре сотрудничества и безопасности в регионе. По мере развития дискуссий мир внимательно следит за тем, как будет реализовываться это беспрецедентное предложение."
 france.262.a: "Да чё б нет"
 france.262.b: "Пошлите их!"
 france.263.t: "Бразилия Соглашается!"
 france.263.d: "Исторический поворот: Бразилия официально приняла предложение Франции уступить Французскую Гвиану в обмен на членство в НАТО. Это соглашение знаменует собой важную веху во франко-бразильских отношениях и рассматривается как стратегический шаг, направленный на укрепление безопасности и стабильности в Южной Америке. Французское правительство видит в этом возможность укрепить альянсы в регионе, используя растущее влияние Бразилии в НАТО для решения проблем коллективной безопасности. \n\nПо мере передачи Гвианы Франция стремится обеспечить плавный переход территории и ее жителей. Французское руководство намерено защищать права и благополучие местного населения, одновременно интегрируя его в систему управления Бразилии. Ожидается, что это смелое решение будет способствовать укреплению связей между двумя странами, развитию экономического сотрудничества и общих интересов безопасности. Хотя некоторые критики выражают обеспокоенность по поводу долгосрочных последствий этого территориального сдвига, правительство сохраняет оптимизм в отношении того, что этот шаг укрепит присутствие НАТО в Северной и Южной Америке и будет способствовать более стабильному региональному ландшафту."
 france.263.a: "Великолепно!"
 france.264.t: "Бразилия Отказывается!"
 france.264.d: "Неожиданный поворот событий: Бразилия официально отклонила предложение Франции уступить Французскую Гвиану в обмен на членство в НАТО. Это решение разочаровало французское правительство, которое надеялось укрепить альянс в Южной Америке и усилить региональную безопасность с помощью этого беспрецедентного соглашения. Французские лидеры рассматривают отказ Бразилии как упущенную возможность укрепить мощное партнерство в рамках НАТО, которое могло бы более эффективно решать проблемы взаимной безопасности. \n\nОтказ вызвал активные дебаты внутри Франции о будущем ее стратегических интересов в регионе. Некоторые официальные лица выражают разочарование, утверждая, что отказ Бразилии свидетельствует о нежелании более тесно взаимодействовать с НАТО и Западом. По мере того как правительство пересматривает свой дипломатический подход, оно вновь уделяет внимание укреплению связей с другими потенциальными союзниками в Латинской Америке. Франция по-прежнему намерена сохранить свое присутствие в регионе, но дальнейший путь потребует тщательной навигации по сложной геополитической динамике и переоценки ее внешнеполитических стратегий".
 france.264.a: "Ну и пошли вы!"
 france.265.t: "Квебек проводит референдум о независимости"
 france.265.d: "В то время как в Квебеке нарастает напряженность, правительство провинции официально объявило о проведении референдума о независимости, чтобы определить будущее своих отношений с Канадой. Этот важный политический шаг отражает давнее стремление многих квебекцев к большей автономии и самоопределению. Канадское правительство рассматривает этот референдум как критический момент, который может изменить облик страны, а лидеры в Оттаве призывают к проведению активной кампании, чтобы подчеркнуть преимущества сохранения единства. \n\nВ ответ на это федеральное правительство активизировало усилия по взаимодействию с гражданами Квебека, подчеркивая экономические, культурные и социальные связи, которые связывают провинцию с Канадой. Премьер-министр и члены кабинета министров готовятся к запуску общенациональной кампании, цель которой - представить убедительные аргументы в пользу единства и потенциальных последствий независимости. По мере приближения даты референдума обе стороны готовятся к спорным дебатам, которые будут иметь долгосрочные последствия для будущего Канады."
 france.265.a: "Мы выходим"
 france.265.b: "Вообще-то нам нравится Канада."
 france.270.t: "Франция требует новых военных репараций"
 france.270.d: ""
 france.270.a: "У нас нет ДЕНЕГ"
 france.270.b: "Мы соберем все, что у нас есть."
 france.271.t: "Россия Отказывается от Увеличенных Репараций"
 france.271.d: "В ответ на недавние требования о выплате военных репараций российское правительство категорически отвергло просьбу Франции, назвав ее несправедливым требованием. Этот отказ еще больше усилил напряженность в отношениях между двумя странами, поскольку Франция расценивает его как вопиющее пренебрежение к страданиям, перенесенным во время конфликта. Французское руководство, стремящееся сохранить национальное достоинство и добиться компенсации за понесенные потери, воспринимает этот отказ как явное свидетельство нежелания России нести ответственность за свои действия. \n\nВ связи с отказом России Франция решила ввести экономическое эмбарго, чтобы оказать давление на российское правительство и заставить его пересмотреть свою позицию. Этот шаг призван не только продемонстрировать приверженность Франции справедливости, но и привлечь международную поддержку к борьбе с российской агрессией. Французское правительство считает, что эмбарго может эффективно противостоять неповиновению России и заставить ее пересмотреть свою политику, а также укрепить единство и решимость союзников по НАТО перед лицом продолжающихся угроз."
 france.271.a: "Они знают наш ответ"
 france.272.t: "Россия Принимает Увеличенных Репарации"
 france.272.d: "После напряженных переговоров и растущего давления со стороны международного сообщества российское правительство неожиданно согласилось с требованиями Франции о выплате военных репараций.Это решение рассматривается как значительная победа французского руководства, которое считает его важнейшим шагом на пути к справедливости и ответственности за страдания, перенесенные во время недавнего конфликта.Принятие решения не только признает трудности, с которыми столкнулась Франция, но и сигнализирует о потенциальной оттепели в отношениях, предоставляя возможность для возобновления диалога.\n\nВ свете этого события Франция готова предпринять шаги по восстановлению и укреплению своей экономики, используя репарации для поддержки усилий по восстановлению и укреплению национальной стабильности.Этот положительный результат может также укрепить позиции Франции в НАТО, продемонстрировав ее способность привлекать противников к ответственности.Однако французское правительство сохраняет осторожность, понимая, что для того, чтобы убедиться в том, что Россия соблюдает свои обязательства и что будущих конфликтов удастся избежать, необходима постоянная бдительность."
 france.272.a: "О, круто, спасибо!"
 france.273.t: "Французское правительство требует снисхождения"
 france.273.d: "В свете продолжающейся ситуации на наших оккупированных территориях французское правительство официально обратилось к нам с просьбой проявить снисходительность в управлении этими зонами.Франция утверждает, что более гуманный и сговорчивый подход будет способствовать стабильности и возвращению к нормальной жизни, что в перспективе откроет путь для будущих усилий по примирению.\n\nФранцузские чиновники подчеркивают, что уважительное и понимающее отношение к местному населению поможет снизить уровень враждебности и стимулировать сотрудничество, особенно в период восстановления страны после недавнего конфликта.Однако в нашем правительстве существуют разные мнения относительно практичности и последствий этой просьбы."
 france.273.a: "Мы будем делать с нашими территориями все, что захотим."
 france.273.b: "Эм... Окей"
 france.2731.t: "Украина принимает прошение о снисхождении"
 france.2731.d: "Позитивным событием для франко-украинских отношений стало то, что украинское правительство приняло нашу просьбу о снисхождении на оккупированных территориях. Это решение рассматривается как значительный шаг к укреплению стабильности и примирению в регионе, а также к улучшению гуманитарной ситуации для местного населения."
 france.2731.a: "Они знают свое место"
 france.2732.t: "Украина отказывается от просьбы о снисхождении"
 france.2732.d: "В ответ на отказ Украины принять нашу просьбу о снисхождении в управлении оккупированными территориями французское правительство приняло решение ввести эмбарго на эти регионы. Эта мера призвана оказать давление на Украину, чтобы она пересмотрела свою позицию и приняла более сговорчивый подход к управлению."
 france.2732.a: "Ввести эмбарго на их оккупационные зоны!"
 france.274.t: "Интервенция в Ливию?"
 france.274.d: "В результате хаоса, возникшего в ходе гражданской войны в Ливии, один из сыновей Каддафи неожиданно пришел к власти, и Каддафи в Ливии... снова. Однако это невозможно терпеть, поскольку, как и отец, как и сын, он является автократическим диктатором и, следуя мечтам своего отца, начал имперскую кампанию по захвату соседних стран, чтобы создать диктаторское пан-арабское государство, следуя той же провальной идеологии своего отца. Многие в правительстве решительно выступают против нового государства, многие предлагают свергнуть руководство и принести демократию ливийскому народу.\n\nНе все единодушны, однако. Многие выступают против возможного вторжения из-за воспоминаний о том, как мы в последний раз свергали режим Каддафи. Наши мотивы, хотя и были благими - принести демократию угнетенному народу, - привели к жестокой гражданской войне в стране и лишь опустошили ливийский народ. В то же время, хотя это и понятно, иррационально желать прежнего режима Каддафи. Другой аргумент заключается в том, что война будет просто пустой тратой времени, как и в прошлый раз, когда мы помогали повстанцам; это может стать очередной трясиной наших предыдущих попыток распространить демократию на Ближнем Востоке.\n\nОднако сторона, выступающая за вмешательство, подчеркивает важность не только распространения свободы и демократии, но и защиты Средиземноморья, что даст нам полный контроль над ним и будет иметь решающее значение для будущих кампаний за демократию."
 france.274.a: "Правление Кадаффи больше не может быть терпимым!"
 france.274.b: "Мы не можем открыто вторгнуться!"
 france.275.t: "Интервенция в Западной Африке?"
 france.275.d: "К сожалению, Африка является очагом войн и насилия, что привело к многочисленным человеческим страданиям, а во многих странах господствуют автократические правители. Мы должны обеспечить соблюдение демократических принципов в Африке и защиту прав человека. Кроме того, существует дополнительная выгода от получения местных природных ресурсов в регионе от дружественного демократического режима. Это было бы невероятно полезно для нашей экономики.\n\nК счастью для нас, ситуация в Африке достаточно стабилизировалась, и местные режимы там демократичны и дружелюбны к нам. Они также готовы торговать с нами своими природными ресурсами. Это позволило сделать вывод, что вмешательство в дела региона не требуется. Это отличная новость для нас, так как у нас стало на один регион меньше, чтобы тратить ценные военные ресурсы. Любой наш союзник будет процветать в любом случае."
 france.275.a: "Мы должны во что бы то ни стало поддержать западноафриканскую демократию!"
 france.275.b: "Мы не можем открыто вторгнуться!"
 france.275.c: "Ситуация уже стабилизировалась"
 france.276.t: "Франция требует ресурсы Западной Африки"
 france.276.d: "Французский дипломатический корпус передал Франции просьбу о предоставлении преференций для их компаний в наших странах для добычи наших местных природных ресурсов. Они обещали экономическую выгоду для нас и защиту со стороны французских войск. Однако эти обещания кажутся пустыми, учитывая нашу общую историю и формулировки в тексте.\n\nМногие в правительстве рекомендовали нам принять эти требования, так как мы не сможем оказать сопротивления; также существует возможность экономического роста, который поможет справиться с местной безработицей и нашей инфраструктурой. Однако многие возмущены этим требованием: после стольких лет колонизации Францией, когда наш народ десятилетиями находился в рабстве у иностранных хозяев, неужели мы просто смиримся с этим угнетением?\n\nНадо ли нам принять это требование и не беспокоиться о вторжении или других действиях Франции, или же мы должны, наконец, постоять за себя?"
 france.276.a: "У нас нет выбора."
 france.276.b: "Мы не можем себе этого позволить!"
 france.277.t: "ЭКОМОГ принимает!"
 france.277.d: "Политики из альянса ЭКОМОГ увидели в нашем предложении разумный смысл и приняли наше требование о предоставлении ресурсов. Это значительно усилит наше влияние в Западной Африке и позволит нам получить новых потенциальных торговых партнеров."
 france.277.a: "Великолепно!"
 france.278.t: "ЭКОМОГ Отказывается!"
 france.278.d: "Глупцы в Западной Африке отклонили нашу просьбу о ресурсах, заявив, что у них нет свободных средств. Это сильно осложнит наши отношения с ними и может привести к тому, что мы потеряем еще больше влияния в Африке."
 france.278.a: "Ну и хрен с тобой!"
 france.279.t: "Франция требует расформировать батальон "Азов""
 france.279.d: "После недавнего конфликта с Россией мы оказались под давлением наших западных союзников, в частности Франции, которая потребовала расформировать батальон "Азов". Это требование вызвало бурные дебаты в нашем правительстве и обществе, поскольку батальон был решающей силой в нашей защите от российской агрессии. \n\nНекоторые утверждают, что подчинение может улучшить наши отношения с западными странами и продвинуть демократические ценности, в то время как другие предупреждают, что расформирование подразделения, которое продемонстрировало значительное мужество на поле боя, ослабит нашу национальную оборону."
 france.279.a: "Никогда! Это Герои Украины!"
 france.279.b: "Они немного радикальны..."
 france.2810.t: "Неделимая Европа"
 france.2810.d: "Наш континент - это краеугольный камень цивилизации, и то, какой она должна быть.\n\nК сожалению, в течение долгого времени предпринимались целенаправленные усилия, чтобы подорвать это во имя прогресса. Наши противники предпочитают называть Европу неким этническим монолитом, где все коренное население едино, и даже если бы это было так, это не было бы плохо.\n\nНет, у Европы богатая история, богатый набор людей и ландшафт, который мог создать только Бог.\n\nБез сомнения, наш соперник на Востоке попытался бы разрушить это, и он почти сделал это, пока мы не встали у руля над Францией. Единство нашего народа, несмотря ни на что, - это то, к чему стоит стремиться.\n\nМы любим всех европейцев здесь, и объединенными усилиями мы отомстили русскому медведю, разбили его и разбросали его останки по Востоку.\n\nКонтинент останется навсегда единым, история будет смотреть на нас благосклонно.\n\nИбо мы - писатели."
 france.2810.a: "Континент, вернувшийся к своим корням."
 france.2811.t: "Тяжелая Корона"
 france.2811.d: "Когда произошла Французская революция, говорили, что мы узнаем о ее истинных последствиях лишь годы спустя, что ж, во многом это правда.\n\nРеспубликанский эксперимент продолжался некоторое время, превратив французскую нацию в хрупкий скелет, не способный пошевелить и пальцем, а после исчезновения наших американских друзей эксперимент оказался под пристальным вниманием. После поражения от русских было бы уместно вернуть форму, в отчаянные времена нужна икона, за которой можно сплотиться, а что такое монарх, если не духовное воплощение своих подданных?\n\nМы устранили ущерб, оставленный республикой, мы возродили гордость за нашу нацию, наш народ и наших военных. Россия ждала нас, неизбежное столкновение в облаках.\n\nМы сделали то, что не смогли наши предки, Москва осталась в руках Европы. Своим огненным следом мы доказали всему миру, что не все старое плохо.\n\nИмперии приходят и уходят. Но не эта. Больше нет."
 france.2811.a: "Возрожденная нация."
 france.2812.t: "Закаленные Сердца"
 france.2812.d: "Нет, нам даже не нужно подслащивать десятилетие унижения, которое пришлось пережить французской нации от рук этих подхалимов, годы, когда космополиты выкорчевывали нашу республику, импортируя ненавистные нам культуры, отдавая нашу силу мировой державе, которая видела в нас лишь экспериментальную зону. \n\nГоды этнического насилия, годы экономических трудностей, все европейское статус-кво говорило нам, что все будет хорошо.\n\n"Ответные меры - это не то, как мы поступаем в цивилизованном обществе"\n\nПотом пришла Россия, и иностранные крысы разбежались с нашими богатствами, жирные богатые ублюдки продолжали жиреть, и что это нам дало? \nТысячи погибших молодых солдат, горькое поражение.\nНет больше этого, гнев французского народа был бы неизбежен.\n\nМы утащили их всех.\n\nЛожный консерватизм? похоронен.\nПаразитический либерализм? уничтожен.\nВраждебные культуры и народы? не здесь, больше нет.\nФранцузская нация вернулась, с клинком, отточенным от ненависти.\n\nИ мы обезглавили медведя, его детеныши плакали, навсегда.\nЦивилизованное общество должно быть готово защищать себя с помощью насилия.\nИ теперь мир знает."
 france.2812.a: "Восстановление личности, от которой нас учили избавляться."
 france.282.t: "Красная Звезда над Парижем"
 france.282.d: "Без сомнения, революционный дух вернулся во Францию после того, как реакционеры в России уничтожили гниющую концепцию "конца истории."\n\nПосле того, как столько жизней было потрачено на защиту тех, кто сидел в своих башнях из слоновой кости, было неизбежно, что мы возьмем кувалды и снесем все это, вывесим красные знамена над офисами корпораций и накажем тех, кто присвоил себе богатства Франции. В конце концов, наш пыл перейдет в Россию и разорвет цепи наших давно потерянных товарищей, остатки империализма будут сметены, когда наш коллективный пыл превзойдет их.\n\nВеликое возвращение, идея, что коммунизм вернется, была идеей, которая преследовала тех, кто захватил власть на десятилетия, и теперь, когда мы здесь, они разбежались, как жирные крысы, но они не смогут убежать от нас навсегда.\n\nМы вернулись. И мы не собираемся уходить."
 france.282.a: "Я - революция, а революция - это вы."
 france.2820.t: "Гнев Революции"
 france.2820.d: "Французская революция показала всему миру, что бунт не должен быть просто формой протеста, а активной формой наказания сильных мира сего, и именно так мы поступили с теми, из-за кого наши семьи потеряли своих детей в России.\n\nПобитые и уязвленные, мы с трудом поднимали себя снова, но мы это сделали. Французская республика поддалась искушению капитала, позволив алчности укорениться, пока наши ресурсы добывались невидимой рукой.\n\nЯростное пламя революции было неизбежно, насилие не всегда является выходом, но когда оно есть, оно должно быть сделано правильно, заставить наших противников бояться нас, заставить наших союзников любить нас. Гильотина оставалась острой не просто так.\n\nВ конце концов, мы должны были обрушить свой гнев на русских, наши сердца были полны мужества, а умы - любви к пролетариату. Несмотря ни на что, мы подняли красное знамя над Европой и вместе с нашими товарищами добьемся того, что весь мир будет охвачен красным цветом, потому что многие братья и сестры ждут своей революции.\n\nНаше будущее не может быть более светлым."
 france.2820.a: "Вечные перемены, навсегда."
 france.2821.t: "Красота Превыше Всего"
 france.2821.d: "Вы ведь видели это иногда? Бетон, скрывающий искренность. Пластик душит творческое начало. Стекло, пронзающее нашу культуру.\n\nКапитализм всегда был всепоглощающей силой, превращающей все в безжизненный серый сгусток, превращающей все в крысиные бега, не имеющие смысла, кроме увеличения числа. Искусство превратилось в товар, культура - в аттракцион в парке развлечений.\n\nА когда фашизм стучится в дверь с топором, он уничтожает все, что нам дорого, не только искусство, но и наших друзей и семьи. Мирная спокойная жизнь, в которой мы можем посвятить себя тому, что любим, не является чем-то невозможным.\n\nМы подавили силы энтропии, искоренили желание насилия и теперь можем отдыхать под деревьями, которые мы посадили.\n\nВы видели исключительную красоту революции во Франции, вы видели ее в Германии, вы видели, как она распространяется на восток, словно легкий взмах кисти. Революции - это форма искусства, и мир станет свидетелем нашего магнум опуса."
 france.2821.a: "Искусство мира во всех сферах жизни."
 france.2822.t: "Один Кирпич"
 france.2822.d: "Проснитесь, посмотрите на плоды своей работы: революция охватила восток, как дикий зверь, преследующий добычу - капитал.\n\nЗначит ли это, что вы победили? Нет. Далеко не так. Капитал - это чудовище, вторая европейская война была всего лишь царапиной на поверхности. Европа может быть объединена под великолепным красным знаменем, но зверь все еще хромает по миру, надеясь зализать свои раны.\n\nПо всему миру угнетенные кричат об освобождении от зверя, кричат, чтобы наш народ спас их. Мы можем больше не чувствовать наручники на наших запястьях, но высокий визг цепи по всему миру все еще очень слышен.\n\nВыдохните, станьте свидетелями того, как революция становится постоянной. Смотрите, как восходит солнце.\n\nНаша работа только началась."
 france.2822.a: "Великий замысел будет завершен."
 france.283.t: "Петух Встает Поутру"
 france.283.d: "Франция на протяжении десятилетий познала свою долю трудностей, войн и оккупаций, революций и бунтов, это шрамы, с которыми нам приходится жить, это память, которую мы храним.\n\nВера нашего народа в демократию была поколеблена снова и снова, и с распадом Америки казалось неизбежным, что силы тирании втопчут Францию в землю. Это определенно произошло, Россия, как всегда беспринципная, попыталась силой расширить свое влияние на Европу. Мы всегда знали, что нельзя всегда полагаться на американцев, что мы, европейцы, должны уметь стоять на собственных ногах, как это делали наши предки. С ясным умом и яростным мужеством в сердцах мы отбили русскую угрозу, но, конечно, это не помешало им попытаться снова.\n\nМы снова победили их, превратив Россию в адскую военную машину, которая вскоре рухнула сама в себя, а мы просто помогли развалить ее. Франция всегда была маяком независимости и самодостаточности, мы никогда не были и не будем государством-клиентом другой державы.\n\nЗащитники континента, закаленные не в ненависти или тирании. Но в свободе и демократии."
 france.283.a: "Над континентом дует тихий ветерок."
 france.2830.t: "Розовый Прилив Над Европой"
 france.2830.d: "Наш континент всегда был окружен беспорядками, и когда наши американские друзья обратили свои кинжалы друг против друга, было неизбежно, что наш самый большой противник на востоке будет смотреть на запад голодными глазами.\n\nЧеловеческий аспект геополитики - это то, что остается для нас дорогим, защита нашей демократии и защита людей, которые нуждаются в ней больше всего. Мы не превращаем людей в простое число, и когда Россия обрушилась на Запад, мы были готовы.\n\nВы не просто выигрываете войны, убивая как можно больше людей, вы выигрываете их, держа врага в курсе того, что вы протягиваете ему оливковую ветвь, давая понять, что мир - это вариант. Наша победа была неизбежна, но поражение оставило бы горький привкус у русских верхов, и месть стала бы слепой одержимостью. \nОни снова пришли, и снова оливковая ветвь была поднята над их головами. \nЭта война не должна была произойти, но мы не могли сидеть сложа руки.\nМы доказали всему миру, что темные страницы истории темны не просто так, и что мы никогда больше не должны повторять этих ошибок. \nСвобода, равенство, демократия - вот слова, которыми нужно жить, и когда Восток отстроит себя заново.\n\nОливковая ветвь будет протянута еще раз."
 france.2830.a: "Над континентом дует тихий ветерок."
 france.2831.t: "Утром Встает Петух"
 france.2831.d: "Франция на протяжении десятилетий познала свою долю трудностей, войн и оккупаций, революций и бунтов, это шрамы, с которыми нам приходится жить, это память, которую мы храним.\n\nВера нашего народа в демократию была поколеблена снова и снова, и с распадом Америки казалось неизбежным, что силы тирании втопчут Францию в землю. Это определенно произошло, Россия, как всегда беспринципная, попыталась силой расширить свое влияние на Европу. Мы всегда знали, что нельзя всегда полагаться на американцев, что мы, европейцы, должны уметь стоять на собственных ногах, как это делали наши предки. С ясными умами и яростным мужеством в сердцах мы отбили русскую угрозу, но, конечно, это не остановило их от новых попыток.\n\nМы снова победили их, превратив Россию в адскую военную машину, которая вскоре рухнула сама в себя, а мы просто помогли развалить ее. Франция всегда была маяком независимости и самодостаточности, мы никогда не были и не будем государством-клиентом другой державы.\n\nЗащитники континента, закаленные не в ненависти или тирании. Но в свободе и демократии. "
 france.2831.a: "И люди просыпаются."
 france.2832.t: "Среди Великих"
 france.2832.d: "В истории было много великих лидеров, икон, которые выделялись над тьмой, тех, кого будут помнить вечно.\n\nДаже через пятьсот лет будут помнить Цезаря, Александра, Карла Великого и многих других.\n\nЭммануэль Макрон - один из них, при нем Франция выстояла против российских агрессоров, при нем Франция вырвалась из заманчивого соблазна хаоса и раздоров. \n\nПри нем Франция смогла снова противостоять мстительной России, именно она сломил Россию, а не Германия, не Великобритания.\n\nА сейчас Франция лежит под его наблюдением, утомительный демократический прогресс сдерживал Францию десятилетиями, и теперь, когда его репутация укрепилась, через пятьсот лет его будут вспоминать как одного из великих.\n\nЕвропа будет стоять крепко.\n\nПотому что у нее есть новый великий человек."
 france.2832.a: "У нас есть виденья..."

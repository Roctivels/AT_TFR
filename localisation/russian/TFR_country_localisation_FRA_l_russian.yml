 FAF_brick_by_brick_idea: "Кирпичик за Кирпичиком"
 FAF_brick_by_brick_idea_desc: "Наша страна была построена в поте лица, кровью наших людей и жертвами многих поколений. После поражения в русско-европейской войне наша страна лежит в руинах. Наши дома превратились в руины, а заводы - в пыль. Недовольство растет по всей стране, а сепаратистские движения увеличиваются с каждым днем. Нам жизненно необходимо вернуть нашей нации утраченную славу и гордость. Кусочек за кусочком, кирпичик за кирпичиком мы должны вернуть Францию из ее нынешнего положения к процветанию."

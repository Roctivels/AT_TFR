 FPR_utopia_minister_focus: "§pUtopie§!: Фокус на §YПравительство§!"
 FPR_utopia_minister_focus_desc: "Сейчас мы должны сосредоточиться на правительственной реформе, прежде всего."
 FPR_utopia_economic_focus: "§pUtopie§!: Фокус на §YЭкономические Законы§!"
 FPR_utopia_economic_focus_desc: "Сейчас мы должны прежде всего сосредоточиться на экономических реформа."
 FPR_utopia_manpower_focus: "§pUtopie§!: Фокус на §YВоенные Законы§!"
 FPR_utopia_manpower_focus_desc: "Сейчас мы должны сосредоточиться на военной реформе, прежде всего."
 FPR_utopia_social_focus: "§pUtopie§!: Фокус на §YСоциальные Законы§!"
 FPR_utopia_social_focus_desc: "Сейчас мы должны сосредоточиться на социальных реформах, прежде всего."
 FPR_utopia_political_dance_extend: "§pUtopie§!: Продлить §YПолитические Танцы§!"
 FPR_utopia_political_dance_extend_desc: "Танцы будут продолжаться до тех пор, пока утопия не улучшится."
 FPR_utopia_political_dance_restart: "§pUtopie§!: Перезапустить §YПолитические Танцы§!"
 FPR_utopia_political_dance_restart_desc: ""
 FPR_utopia_female_committee_decision: "§pUtopie§!: Усилить §YКРЖ§!"
 FPR_utopia_female_committee_decision_desc: "Если допустить комитет по репрезентации женщин в залы заседаний, то принятие законов, касающихся прав женщин, станет проще."
 FPR_utopia_minority_committee_decision: "§pUtopie§!: Усилить §YКПМ§!"
 FPR_utopia_minority_committee_decision_desc: "Если допустить Комитет по Репрезентации Меньшинств в залы заседаний, принятие законов, касающихся прав меньшинств, станет проще."
 FPR_utopia_welfare_committee_decision: "§pUtopie§!: Усилить §YКРСП§!"
 FPR_utopia_welfare_committee_decision_desc: "Если допустить Комитет по реформе социальной помощи в залы заседаний, принятие законов, касающихся социальных вопросов, станет проще."
 FPR_utopia_justice_committee_decision: "§pUtopie§!: Усилить §YКРП§!"
 FPR_utopia_justice_committee_decision_desc: "Если допустить Комитет по реформе правосудия в залы заседаний, принятие законов, касающихся правосудия и его исполнения, станет проще."
 FPR_utopia_diplomatic_committee_decision: "§pUtopie§!: Усилить §YКДО§!"
 FPR_utopia_diplomatic_committee_decision_desc: "Если допустить Комитет дипломатических отношений в залы заседаний, то принятие законов, касающихся дипломатических вопросов, станет проще."
 FPR_utopia_committee_decision_tt: "В будущем при усилении комитета §Yзаменит текущий усиленный комитет§! на новый комитет."
 FPR_utopia_committee_decision_tt2: "Убирание этого комитета в §Yтечение 100 дней§! с момента его создания приведет к §Rнаказанию§!"
 FPR_utopia_committee_decision_tt3: "§RЕсли этот комитет будет убран в течение 100 дней§!:"
 FPR_utopia_committee_decision_tt4: "§GЕсли этот комитет продолжает действовать в течение 100 дней§!:"
 FPR_utopia_academic_investment_decision: "§pUtopie§!: Решение §YАкадемических§! Проблем"
 FPR_utopia_academic_investment_decision_desc: "Вкладывая деньги в решение академических проблем, мы можем улучшить наше академическое развитие."
 FPR_utopia_agricultural_investment_decision: "§pUtopie§!: Решение §YСельскохозяйственных§! Проблем"
 FPR_utopia_agricultural_investment_decision_desc: "Вкладывая деньги в решение сельскохозяйственных проблем, мы можем улучшить развитие сельского хозяйства."
 FPR_utopia_poverty_investment_decision: "§pUtopie§!: Решение Проблем §YБедности§!"
 FPR_utopia_poverty_investment_decision_desc: "Вкладывая деньги в решение проблемы бедности, мы можем снизить ее уровень."
 FPR_utopia_industry_investment_decision: "§pUtopie§!: Решение Проблем §YПромышленности§!"
 FPR_utopia_industry_investment_decision_desc: "Вкладывая деньги в решение промышленных проблем, мы можем улучшить наше промышленное развитие."
 FPR_utopia_society_investment_decision: "§pUtopie§!: Решение Проблем §YОбщества§!"
 FPR_utopia_society_investment_decision_desc: "Вкладывая деньги в решение социальных проблем, мы можем улучшить развитие общества."
 FPR_utopia_investment_decision_available_tt: "Отсутствие решения проблем"
 FPR_utopia_investment_decision_tt: "Получаете событие, где есть §Yчетыре варианта§! инвестиций:\n£money §R0.5 МЛРД§! за §G+2.5% развития§!\n£money §R1.5 МЛРД§! для §G+7.5% развития§!\n£money §R3 МЛРД§! для §G+15% развития§!\n£money §R5 МЛРД§! для §G+25% развития§!"
 
 FPR_utopia_dynamic: "Пункт Назначения Utopie"
 france.9001.t: "Дидье Дененкс Объявляет Утопию"
 france.9001.d: "Дидье Дененкс, автор, ставший политиком, ставший лидером, заявил сегодня, что амбициозная цель построить утопию во Франции успешно завершена.\n\nПосле гражданской войны казалось, что Франции предстоит тяжелое время восстановления страны и общества. Но у Дененкса была мечта не только восстановить страну, но и превратить ее в настоящую утопию. Антивоенная и антикапиталистическая политика Дененкса и его правительства многим казалась противоречащей столь амбициозной цели, но, как выяснилось, он, возможно, что-то задумал.\n\nХотя луга Франции не покрыты манной, а деньги не растут на деревьях, уровень жизни простых французских граждан сейчас выше, чем когда-либо в истории страны. Насколько можно судить, глядя со стороны, французам удалось достичь утопии."
 france.9001.a: "Мы рады за них."

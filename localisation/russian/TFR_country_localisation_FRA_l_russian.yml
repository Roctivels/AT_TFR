 FAF_Support_Benedetti: "Поддержать Бенедетти"
 FAF_Support_Benedetti_desc: "Наш великий лидер Бенедетти станет движущей силой нового национального возрождения. Из пепла поражения он восстал, чтобы стать великим спасителем Франции, и такая партия должна быть объединена за ним, а те, кто этого не делает, должны встать в строй."
 FAF_Praise_the_Army: "Хвалить Армию"
 FAF_Praise_the_Army_desc: "Наши солдаты доблестно сражались на восточном фронте, но, к сожалению, их предало трусливое руководство. Наше новое государство восстановит честь великой французской армии; мужественная французская армия станет основой нового французского государства."
 FAF_Promote_Active_Clubs: "Продвигать Активные Клубы"
 FAF_Promote_Active_Clubs_desc: "Активные клубы играют решающую роль в превращении бесцельных молодых людей в организованную националистическую французскую молодежь. В каждой революции в истории движущей силой перемен был пыл молодежи, и это необходимо использовать сегодня, чтобы создать голодную энергичную молодежь!"
 FAF_Honor_Vichy: "Почтить Режим Виши"
 FAF_Honor_Vichy_desc: "Маршал Петен был героем, который вел за собой французский народ в нашу самую неспокойную эпоху, однако после десятилетий насильственного правления неолиберальных режимов слава героев Виши была опошлена. Французский народ должен помнить о жертвах, принесенных этими храбрыми людьми."
 FAF_Cult_of_Benedetti: "Сформулировать Культ Бенедетти"
 FAF_Cult_of_Benedetti_desc: "Бенедетти станет не только сильным лидером, ведущим за собой сломленную нацию, но и символом новой французской эры. Каждый французский мужчина, женщина и ребенок будет воспринимать Бенедетти как символ французского феникса, восстающего из пепла неолиберального вырождения и поражения."
 FAF_Utilize_Lafayette: "Использовать Лафайета"
 FAF_Utilize_Lafayette_desc: "Лафайет был одной из ведущих сил в свержении старого режима и стал своего рода современным Наполеоном. Он стал одним из самых известных людей во Франции, и его общественная поддержка будет иметь решающее значение для закрепления нашего правления."
 FAF_Create_Identity_Forums: "Создать Форумы для Идентификации"
 FAF_Create_Identity_Forums_desc: "Римские форумы были центром для интеллектуалов, где они обсуждали науку, философию и многое другое. Франция также была нацией интеллектуалов, и поэтому мы должны возродить нашу интеллектуальную культуру и создать форумы для новой националистической мысли."
 FAF_Look_to_the_Glory_of_Rome: "Взглянуть на Славу Прошлого"
 FAF_Look_to_the_Glory_of_Rome_desc: "Франция - нация поэтов, философов, художников и великих завоевателей. Как наследники великого Карла Великого, мы стали центром европейских инноваций и славы. Хотя Франция переживает трудные времена, мы должны напоминать людям о нашем прошлом, и, несмотря на все трудности, Франция жила и шла вперед."
 FAF_Harness_Federalist_Sympathizers: "Использовать Сторонников Федерализма"
 FAF_Harness_Federalist_Sympathizers_desc: "Многие чиновники в предыдущем хрупком и слабом правительстве, которое мы сменили, симпатизировали нашему движению, и теперь, когда наше движение получило власть, эти бывшие чиновники могут компенсировать свое бездействие и позор, помогая нам сейчас."
 FAF_Glorify_the_Imperial_Era: "Прославлять Имперскую Эпоху"
 FAF_Glorify_the_Imperial_Era_desc: "Нет ничего лучше, чем великая империя, охватывающая весь континент, ее народ, ее культуру, ее города, объединенные под одним флагом и одной идеологией. Много раз мы были так близки к этому, к осуществлению этой утопии, но нам отказывали в этом снова и снова. Это будет наша последняя и самая решительная попытка достичь того, о чем мы так долго мечтали, и мы будем наслаждаться славой, когда она будет достигнута."
 FAF_Formulate_Latinism: "Сформулировать Новую Доктрину Латинизма"
 FAF_Formulate_Latinism_desc: "Латинизм как идеология всегда был чем-то разрозненным и непоследовательным. Мы должны сделать его чем-то единым и цельным, сродни идеологеме улья. В противном случае мечта о новом Риме может быть разрушена навсегда."
 FAF_Disrupt_Benedetti: "Разрушить Планы Бенедетти"
 FAF_Disrupt_Benedetti_desc: "Бенедетти, Бенедетти. Он не кто иной, как очередной фашист, пытающийся лепить себя на основе давно развалившихся государств. Его культурная мысль о "Франции" как отдельной нации, как этногосударстве - это идиотизм в самом лучшем его проявлении. Все, что он задумал - будь то речь, пропаганда, что угодно и как угодно, - должно быть спрятано или испорчено другими способами, чтобы не позволить его испорченным, гниющим идеалам распространиться по нашей многонациональной стране."

 FAF_Identity_Forums_category: "За Пределами Нашей Единой Цели"
 FAF_Identity_Forums_category_desc: "\n\n\n\n\n£GFX_FAF_identitarianism_cat\n\n\n\n\n\n\n\nКрасота этого континента ни с чем не сравнима, но в течение долгого времени неолиберальный проект пытался превратить Европу в экономическую зону и культурный тематический парк для всего остального мира, чтобы они делали все, что им заблагорассудится.\n\nПод руководством Франции мы сможем построить правильный союз европейцев, для европейцев, от европейцев, единство, идентичность и цель для наших братьев и сестер."
 FAF_europa_united_against_communism_decision: "Европа Объединённая Против Коммунизма"
 FAF_europa_united_against_communism_decision_desc: "По сравнению с любой другой идеологией, коммунизм наиболее противоречит европейской идентичности, какой мы ее знаем. Приманивая наших рабочих ложью о процветании, они лишь стремятся к разрушению европейской идентичности в своем бесконечном крестовом походе за однородное "равенство", направленном на уничтожение нашей культуры. Независимо от того, вернулись ли орды Востока к бичу большевизма или нет, их прежние связи могут быть связаны с ростом антироссийских настроений по всей Европе. Как бы то ни было, мы можем убить двух зайцев одним выстрелом, чтобы гарантировать, что левые радикалы будут вытеснены из нашего общества."
 FAF_europe_for_europeans_decision: "Европа для Европейцев"
 FAF_europe_for_europeans_decision_desc: "С самого начала нашего движения мы всегда стояли на том, что Европа должна быть только для европейцев. Теперь, когда наша власть обеспечена, мы можем наконец превратить этот бывший митинговый клич в конкретную политику, которая поможет укрепить наше правление. Теперь, когда левые радикалы, будь то марксисты или либералы, больше не могут кричать о "призывах к ненависти" и отсутствии "сочувствия" к этим иностранным агентам... Пришло время выполнить наши обещания!"
 FAF_european_beauty_dynamic: "Девственные Земли Европы"
 FAF_european_beauty_dynamic_desc: "Земли, которые являются Европой, должны сохранять свою естественную красоту и статус прежде всего. Уничтожение Европы сродни уничтожению части нашего собственного наследия и души без какой-либо иной причины, кроме промышленности, - тяжкий грех, который мы должны отменить, если не хотим избавиться от того, что делает Европу девственной и безупречной землей, которой она является."
 FAF_european_beauty_state_dynamic: "Девственные Земли Европы"
 FAF_european_beauty_state_dynamic_desc: "Сверху Европа - просто еще один континент, но на самом деле это колыбель, которой обязано все человечество. Это прекрасное произведение географии, культуры и истории, и мы не причиним ему излишнего вреда. Если завоеватели или враги обрушатся на эти земли и запятнают их, как варвары, их ждет лишь судьба в ее самой истинной форме. Смерть."
 FAF_european_nation_dynamic: "Европейская Гегемония"
 FAF_european_nation_dynamic_desc: "Наше движение, как Identitarians, отличается от обычного ультраправого континуума в Европе тем, что поддерживает объединение континента, а не отдельных наций, входящих в него. Видя, как Европейский союз распадается под натиском восточных орд, появилась возможность заполнить вакуум власти и стать гегемоном Европы. Хотя сохранение влияния может обойтись нам недешево в политическом плане, быть новым центром континента необходимо для того, чтобы мы одержали победу над силами мультикультурализма, либерализма и теми силами, которые стремятся уничтожить нашу любимую Европу!"
 FAF_clarity_in_liberty_decision: "Ясность в Свободе"
 FAF_clarity_in_liberty_decision_desc: "Некоторые утверждают, что то, что наше движение является правым, означает, что мы хотим тоталитарной диктатуры, которая приносит только страдания. Хотя некоторые в наших рядах считают, что такая система была бы наиболее оптимальной, правда в том, что идея "свободы" - это та идея, которую мы можем кооптировать и использовать для привлечения тех, кто ностальгирует по старым либеральным демократиям. Эта свобода, однако, не связана с прогрессивной чепухой и поклонением меньшинствам, которые наблюдались до падения неолиберального мирового порядка. Конечно, те, кто пользовался этими свободами, наверняка будут жаловаться, но ведь смысл был в том, чтобы избавить континент от них... верно?"
 FAF_new_classicalism_decision: "Новый Классицизм"
 FAF_new_classicalism_decision_desc: "Наши мечты о единой Европе проистекают из славы Римской империи и ее культуры. Хотя с тех пор многое изменилось, идеи классицизма в нашем искусстве и архитектуре - это то, к чему мы должны стремиться. Возрождая художественные школы, которые ставят во главу угла произведения, отличающиеся великолепием и красотой, и отходя от унылых модернистских стилей, которые многим стали противны, мы сможем утвердить себя в качестве истинных представителей золотого века европейского искусства и культуры!"
 FAF_europeanist_propaganda_idea: "Панъевропейская Пропаганда"
 FAF_europeanist_propaganda_idea_desc: "На нас обрушился шквал панъевропейской пропаганды во всех средствах массовой информации, вероятно, по приказу европейской гегемонии, чтобы подтолкнуть их к объединению. Независимо от того, какой ответ мы сможем принять, есть ощущение, что мы не сможем конкурировать с местным движением идентичности и вскоре будем вынуждены провести референдум. Если мы хотим сохранить свою независимость, нам нужно немедленно предпринять что-то, чтобы противостоять этой пропаганде."

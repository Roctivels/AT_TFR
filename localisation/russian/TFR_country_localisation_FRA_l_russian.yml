 FRA_Propagandize_Russian_Dissidents: "Пропагандировать Российских Диссидентов"
 FRA_Cut_Production_Corners: "Срезать Производственные Углы"
 FRA_Reintroduce_National_Conscription: "Вновь Ввести Национальную Воинскую Повинность"
 FRA_Utilize_Russian_Brutality: "Использовать Российскую Оппозицию"
 FRA_Utilize_Russian_Brutality_desc: ""
 FRA_ils_ne_passeront_pas: "Ils ne Passeront Pas!"
 FRA_ils_ne_passeront_pas_desc: "Несмотря на развал Украины, дух на кубанском плацдарме остается высоким. Это вновь обретенное рвение сохраняется, несмотря на осознание того, что на фронте не все благополучно, медведь добился масштабных успехов, несмотря на большие потери. Русские продолжают наступать, и чтобы противостоять такому натиску, очевидно, что мы должны еще глубже вгрызаться в Черноземье. Сегодня мы осаждаем Краснодар, но неудача может позволить русским продвинуться дальше, и под угрозой окажется сердце Европы. Скандал из легендарного прошлого Франции был воскрешен фронтовиками и, как и тогда, теперь послужит отличным призывом для солдат и гражданских лиц. Они не пройдут!"
 FRA_sovereignty: "Франция, Вооруженная и Сильная"
 FRA_sovereignty_desc: "Более идеалистически настроенные члены правительства и военные хотят использовать конфликт для дальнейшего укрепления европейского единства, усиления интеграции подразделений и использования антироссийски настроенных этнических групп, чтобы представить нас в качестве освободителей. Любые такие крупные структурные изменения или серьезные инвестиции в сомнительно лояльные группы следует рассматривать как авантюру, а тот, кто играет со своей душой, - дурак. Такие мечтательные концепции должны быть припасены для мира, в котором Европа победит любую угрозу, которую Россия представляет для свободной Европы. До этого дня мы будем полагаться на силу Франции в ее нынешнем виде - мечтательные реформы можно приберечь для мирного времени."
 FRA_solidarity: "Наследие Иностранного Легиона"
 FRA_solidarity_desc: "Несмотря на то, что мы отказываемся идти по пути оголтелой рискованной реорганизации, у нас все еще есть возможность увеличить численность нефранцузских подразделений, просто приняв дух иностранного легиона. Быстро увеличив его численность, мы сможем пополнить ряды новыми бойцами и не будем так сильно беспокоиться о масштабных структурных изменениях и возможных конфликтах интересов между этническими подразделениями. Франция получит иностранцев, которые будут сражаться за нее, но под объединяющим знаменем Иностранного легиона."
 FRA_cement_ukrainian_crimea: "Закрепить Украинский Крым"
 FRA_cement_ukrainian_crimea_desc: "После возвращения Крыма мы не должны жалеть средств на то, чтобы любая попытка России вернуть его провалилась. Европа вступила в этот конфликт из-за нарушения территориальной целостности Украины, и, чтобы показать, что мы не шутим, мы должны идти до конца. Мы не согласимся ни на перемирие, ни на "демилитаризованную зону", ни на что другое, кроме полной победы. Земли, украденные у Украины, пока мы бездействовали, должны быть возвращены, чего бы это ни стоило. Наши неудачи будут исправлены, и мы сделаем все возможное, чтобы Россия в последний раз угрожала Украине - не говоря уже о Европе - когда-либо еще. Медведь должен быть сломлен любой ценой."
 FRA_kuban_expeditionary_army: "Кубанская Экспедиционная Армия"
 FRA_kuban_expeditionary_army_desc: "Даже при нынешних успехах на фронте и дома, за занавесом можно найти несогласие в России. В регионах, расположенных вдали от Москвы, есть те, кто чувствует себя брошенным, и Кубань - идеальная отправная точка, поскольку большие куски попали в наши руки. Мы организуем добровольцев из числа местных жителей и военнопленных в "Кубанский корпус". Такие подразделения идеально подойдут для охраны тыла и для того, чтобы показать местным жителям и, возможно, русскому народу, что мы всего лишь освободители, а не грубияны-завоеватели."
 FRA_conscript_cossack_brigades: "Призывать Казачьи Бригады"
 FRA_conscript_cossack_brigades_desc: "С распадом СССР и русские, и украинцы заявили, что являются наследниками казачьего имени. С нашей точки зрения, Украина - родина истинного казака, а те, кто претендует на это, должны быть с нами, чтобы не оказаться предателями своего народа. Те, кто находится на нашей стороне фронта, будут организованы в легкие мобильные отряды, чтобы соответствовать своему тезке. Согласие на вступление в эти отряды не имеет значения, поскольку, в конце концов, мы сражаемся ради них, а не ради себя."
 FRA_utilize_russian_dissidents: "Использовать Российских Диссидентов"
 FRA_utilize_russian_dissidents_desc: "Есть много тех, кто готов взять в руки оружие по разным причинам, будь то "лучшая" Россия, региональная независимость или просто пойти туда, куда дует ветер. "Почему" не имеет значения, важно лишь то, что этим людям можно вручить винтовки и использовать их для ослабления российских военных усилий. Некоторые из них искренне сотрудничают, некоторые придерживаются взглядов, которые мы считаем... проблематичными. Нам просто придется разбираться с последствиями позже. Нам предстоит выиграть войну."
 FRA_operation_davout_tt: "§YПосле завершения этого фокуса, начнётся §!§COpération§!: Davout§!§Y. \nЭто тотальная атака на §!\n§RСочи \nНовороссийск \nКерчь§!\n§YЭто должно ослабить давление на Украину и обеспечить, и обеспечить превосходство §! §Cсил НАТО§! §Yна §!§GКавказском фронте§!"
 FRA_cossack_army_tt: "4 §yКазачьи легкие механизированные бригады§! будут созданы в §pВаршаве§!"
 FRA_kuban_exp_army_tt: "6 §0Кубанских Ополченцев§! будет создано в §pВаршаве§!"
 FRA_Freedom_of_Russia_Legion_tt: "2 §3Механизированных дивизий русских диссидентов§! будут созданы в §pВаршаве§!"
 FRA_foreign_legion_tt: "4 §2Бригады французского Иностранного легиона§! будут созданы в §4Париже§!"
 
 FRA_Act_on_Rattachism: "Акт о Réunionisme"
 FRA_Act_on_Rattachism_desc: "Хотя в Валлонии говорят по-французски, эта древняя часть франкоязычного мира была не в наших руках с момента падения Наполеона, и мы считали ее потерянной навсегда. Судьба вновь свела нас в единое целое, и мы должны подготовить несколько актов, чтобы вписать их в нашу систему. Находиться в пределах наших границ недостаточно, Бельгия и ее византийская политическая система должны быть примирены с нашей собственной. Ради блага Франции мы будем стремиться к этому."
 FRA_Absorb_Waloon_Command: "Поглотить Валлонское Командование"
 FRA_Absorb_Waloon_Command_desc: "Двуязычная нация Бельгии привела к тому, что ее армия, как и правительство, была разделена на две части, что сделало разделение Бельгии довольно чистым, так как фламандцы обеспечивали безопасность границ на фламандской стороне, а валлоны - на валлонской. Но теперь за это отвечают голландцы и Франция. Валлония приводит с собой значительный контингент войск и опытных офицеров НАТО, и мы были бы глупцами, если бы отказались от их услуг. Обновите их форму, присвойте им новые звания - теперь они часть Франции."
 FRA_absorbing_walloon_command_tt: "Валлонские офицеры будут приняты в нашу армию"
 FRA_Reorganize_Walloon_Businesses: "Реорганизация Валлонских Предприятий"
 FRA_Reorganize_Walloon_Businesses_desc: "При интеграции такой развитой городской территории, как Валлония, необходимо учитывать, что предприятия в регионе подчинялись строгим строительным нормам, которые Бельгия контролировала из Брюсселя, а теперь? Эти предприятия подчиняются французским законам. Мы должны проверить вновь приобретенные предприятия и помочь им реорганизоваться. Такие компании, как Fabrique Nationale, слишком ценны, чтобы видеть их падение, и вмешательство и организация их в условиях хаоса сохранит местную экономику."
 FRA_Integrate_Walloon_Parliament: "Интегрировать бывший Бельгийский парламент"
 FRA_Integrate_Walloon_Parliament_desc: "Самое сложное в этом деле - изучить государственную систему Бельгии и понять, как ее интегрировать. В Бельгии три парламента: фламандский, валлонский и немецкий. Мы контролируем валлонский и немецкий регионы и не знаем, что делать с их правительствами. Хотя некоторые места, вероятно, будут удалены, особенно если речь идет об Эупене Малемди, многие будут интегрированы во Французскую Республику, их партии, зарегистрированные под прежними названиями, сохранят их на время, и многие из бельгийских парламентариев очень скоро устроятся в Париже. Теперь нашей партии остается только составить список избранных регионов и решить, кого оставить."
 FRA_Promote_Francophone_Unity: "Содействие Единству Франкоязычных Стран"
 FRA_Promote_Francophone_Unity_desc: "Франкоязычный народ - наследник великого и древнего наследия, начиная с Карла Великого, Валуа, Бурбонов, Наполеона и заканчивая нынешней великой республиканской эпохой. Мы формируем европейские ценности, мы являемся носителями культуры, мы более тысячелетия терпели иностранные вторжения, порабощения и чаще всего выдерживали грандиозные походы на восток, юг и запад через Атлантику, чтобы завоевать славу для нас и нашего народа.\n\nБельгия и Валлония большую часть своей жизни были отдельно от нас во время этих славных событий. Но они разделяли их. Наша история - это повод для гордости, наша история - это их история, а их история - это наша история. Французы всегда стоят вместе!"
 FRA_An_Example_of_Unity: "Пример Единства"
 FRA_An_Example_of_Unity_desc: "Liberté, Egalité, Fraternitié. Руководящие принципы Франции. С тех пор как упал первый клинок, положив конец Античному режиму, наши идеалы зажигают мир. Америка. Германия. Италия. Есть ли часть мира, до которой не дошли эти три слова? Назовите хоть одну. Сегодня Европа уникальным образом объединена этими идеалами, хотя Бельгия не стала падением основных идей, заложенных в их сознании. Брюссель остается городом смешанной фламандско-валлонской национальности, столицей Европы, а Бельгия ушла, и символ единства, который она оставила после себя, служит мощным напоминанием о триумфе наших идеалов через все кризисы и неприятности, о стремлении к Freiheit, к Libertié, на каком бы языке вы ни говорили, у вас есть для этого слово. Пусть в сердцах и умах каждого европейца Брюссель станет маяком света для будущего Европы. Первой реальной территорией на карте, которая, как мы можем сказать, целиком и полностью принадлежит Европе."
 FRA_Propagandize_French_Naturalism: "Пропагандировать Французский Натурализм"
 FRA_Propagandize_French_Naturalism_desc: "А Рейну я скажу: идите по реке на север, пока Брабантское пиво не окажется на рыночных площадях. Мы - французы, наследники Франкии, мы не забываем о своем происхождении. Голландцы, немцы - наши братья. В этот день мы получаем Валлонию, но мы должны были получить ее всю, мы должны были пойти дальше, это подарок Европе, что мы не маршируем к Рейну, как это сделал Наполеон. Эта наша древняя граница была проведена в результате поражения, которое отделило нас от валлонцев, от фламандцев, от старых бургундских земель. Почему мы должны смириться с этим? Нет, мы требуем большего. Мы должны иметь больше. Валлония сегодня, Фландрия завтра, Брабант на следующей неделе, Рейн в следующем году. Может быть."
 FRA_Absorb_the_Beglian_Left: "Поглотить Бельгийских Левых"
 FRA_Absorb_the_Beglian_Left_desc: "Мы, левые, должны держаться вместе, бельгийские социалисты давно стали нашими друзьями на европейской арене, и в их рядах много личных друзей Меленшона. Будет правильно, если регионы объединятся в одно целое, и мы сможем преломить с ними хлеб. Встреча Меленшона с лидером Социалистической партии Полем Манеттом и Раулем Хедебувом из PVDA позволит нам укрепить наши парламентские позиции и узаконить нашу власть над бельгийским рабочим классом. Мы также можем провести сюда Шарля Сервати, Эупен мал, но Эупен все равно наш. Их 3 места - это все еще места, которые мы хотели бы занять."
 FRA_Appoint_King_Philippe_to_Parliament: "Восстановить Бельгийские Титулы"
 FRA_Appoint_King_Philippe_to_Parliament_desc: "В Бельгии есть историческая монархия, которая была несправедливо отторгнута в последние дни существования Бельгии, и это неправильно, что такой символ национального единства должен быть отторгнут. Конечно, мы сами не являемся монархией, но консерваторы Бельгии не хотят, чтобы их короли становились простыми гражданами. Очень хорошо. Они сохранят свои титулы, восстановленные и поддерживаемые Французской Республикой, и, как бы странно это ни было, мы снова коронуем короля для Бельгии. Чисто почетная и совершенно не административная государственная честь."
 
 FRA_Raises_Parisian_Militias: "Поднять Парижское Ополчение"
 FRA_Rally_the_Centre: "Сплотить Центр"
 FRA_Sideline_Bureaucratic_Procedures: "Второстепенные Бюрократические Процедуры"
 FRA_Desperate_Defense: "§YOpération§!: Foch"
 FRA_Desperate_Defense_cw_idea: "Глубокоэшелонированная Оборона"
 FRA_Suspend_Democratic_Processes: "Приостановить Демократию"
 FRA_Push_European_Stability_Pact: "Европейской Пакт Безопасности"
 FRA_Stabilize_the_Euro: "Искусственная Стабилизация Евро"
 FRA_Petition_UN_Peacekeepers: "Петиция Миротворцев ООН"
 FRA_Request_Decreased_Reperations: "Запрос на Уменьшение Военных Репараций"
 UKR_ukrainian_crimea_defense_modifier: "Крымские Оборонительные Силы"

 FRA_Revolution_against_Humiliation: "Присяга Новой Республике!"
 FRA_Revolution_against_Humiliation_desc: "Трубы войны прозвучали, и французская нация была вовлечена в кадры, из пепла старой республики, как феникс, восстала наша новая республика, рабочий и пролетариат пробудились от своего сна и дали торжественную клятву новой Франции, построенной на основе народа, социализм - единственный ответ и спасение для французской нации!"
 FRA_Rally_the_People: "Наточить Народную Бритву"
 FRA_Rally_the_People_desc: "Франция и ее народ были проданы, брошены ради яхт и поместий, и единственная истина находится за лезвием, а в душе крестьян живет жажда мести, и враги нашей новой республики должны быть срезаны, как трава, и разбиты, как стекло! Так как народ сейчас идет впереди, зарождая новый рассвет для нашей нации, ни один предатель нашей революции не должен быть пощажен."
 FRA_Declare_Second_Revolution: "Провозгласить Новую Революцию"
 FRA_Declare_Second_Revolution_desc: "От Парижской коммуны до Русской революции более века назад, сама идея социализма и его учения все еще находят отклик среди нашего народа. Если эти леденящие кровь годы и научили нас чему-то, так это тому, что мы не должны больше отступать, на горизонте забрезжил рассвет новой революции, и мы должны принять его с полной готовностью и приветствовать новую Францию под красным знаменем, знаменем народа."
 FRA_New_Partisan_Movement: "Новые Партизаны"
 FRA_New_Partisan_Movement_desc: "Для наших врагов не должно быть неожиданностью, что партизанские и другие ячейки сопротивления уже начали появляться в их деревнях. Будучи невежественными и глупыми, они будут рассматривать это событие не более чем отвлекающий маневр, а мы начнем использовать все формы партизанских рейдов и действий, чтобы ослабить и разграбить военные усилия наших врагов."
 FRA_Stoke_Revolutionary_Fervor: "Разжигать Революционный Пыл"
 FRA_Stoke_Revolutionary_Fervor_desc: "Народные клинки зудят, отчаянно желая вырезать и снять кожу с паразитов, замышляющих нашу революцию. Мы должны заявить о своем полном превосходстве над ними, одним стремительным ударом мы направим копья к их дорогим дворцам, построенным на крови и страданиях рабочего класса, и обольем их бензином, а затем подожжем."
 FPR_Fervor_reset_tt: "Убирает Нац. Дух §YРеволюционный Пыл§!"
 FRA_Form_Peasant_Militias_desc: "Это не просто война, а народная война, борьба за будущее каждого рабочего и крестьянина в нашей стране, народ должен стоять твердо, с готовностью и желанием плечом к плечу бороться за свою свободу, даже если это означает смерть за нее, нашей революции нужно больше войск на фронте, чтобы сокрушить врагов быстрым и обманным ударом, сформировав больше бригад под своей властью."
 FRA_Form_Peasant_Militias: "Создать Крестьянские Бригады"
 FRA_Found_the_French_Peoples_Liberation_Army: "Французская Народная Армия"
 FRA_Found_the_French_Peoples_Liberation_Army_desc: "Революция и страна без постоянной армии обречены на провал, уроки Первой европейской войны показали нам, что прежние французские вооруженные силы недостаточны для борьбы с врагами нации. Из обломков мы сформируем новую французскую армию, которая под красным знаменем будет гордо маршировать против элементов тирании."
 FRA_Crusade_Against_Imperialism: "Окрасить Сену в Красный"
 FRA_Crusade_Against_Imperialism_desc: "С самого начала нашей борьбы за возвращение нашей нации, столица Париж была под прицелом наших газелей, вероломно захваченная врагами и предателями революции, которые просто хотят принести пользу себе, а не народу, с яростным зарядом наперевес мы вернем себе наш город, перережем глотки врагам народа, когда река Сена станет красной, от презренной и жалкой крови."
 FRA_Crush_the_Reactionary_Villians: "Сокрушить Реакционных Негодяев"
 FRA_Crush_the_Reactionary_Villians_desc: "Клерикальные фашисты и бывшая армия являются живым примером того, что разорвало французскую нацию и разнесло ее в клочья. Их злобный и тиранический взгляд стремится подорвать наши усилия, кровавый пот и слезы рабочих и пролетариата, снова убить свет в их глазах, навсегда закрыть их во тьме. \n\nДля того, чтобы раз и навсегда заставить их стоять на коленях от стыда и агонии, мы разграбим их поля и выколем им глаза, чтобы они никогда не смогли увидеть свет, Viva La Revolution!"
 FRA_The_Peoples_Decree: "Созвать Национальное Собрание"
 FRA_The_Peoples_Decree_desc: "Будущее нашей нации остается мрачным и неопределенным, и пока мы яростно боремся за наши революционные цели, мы должны оценить ситуацию, в которой мы находимся, мы должны призвать все элементы социализма в Национальное собрание, чтобы определить и принять решение о предстоящем будущем, чтобы мы все могли гарантировать, что Франция под новым красным знаменем никогда больше не падет."
 
 FPR_Revolution_realized: "Осуществленная Революция"
 FPR_Revolution_realized_desc: "Воля народа реализована! Со времен Парижской коммуны французская нация не была так близка к тому, чтобы сбросить с себя оковы. Теперь, когда либеральный режим успешно свергнут, мы должны подтвердить наш контроль над нацией, чтобы ошибки прошлого никогда не повторились!"
 FPR_Abolish_the_Nouvel_Ancien_Regime: "Упразднить Ancien Régime"
 FPR_Abolish_the_Nouvel_Ancien_Regime_desc: "Разлагающаяся бюрократия старого режима была одной из главных причин его провала, и если мы хотим добиться успеха как нация, мы должны разрушить всю эту структуру! Права народа больше не будут ограничиваться коррумпированной системой!"
 FPR_Deploy_the_Red_Guard: "Развернуть Красную Гвардию"
 FPR_Deploy_the_Red_Guard_desc: "По всей стране все еще есть те, кто сопротивляется нашему делу, будь то по глупости или из ревности к капитализму. Чтобы наша революция расцвела, эти приверженцы либерального режима должны быть уничтожены, и это прекрасная возможность выставить нашу Красную гвардию."
 FPR_Finalize_the_Constitution: "Доработать Конституцию"
 FPR_Finalize_the_Constitution_desc: "Если мы хотим, чтобы революция жила вечно, она должна быть навсегда запечатлена в кодексе этой нации. Старая конституция была уничтожена, а вместе с ней и ошибки прошлого. Теперь мы должны завершить работу над новой конституцией, ибо без нее мы вполне можем жить в анархии."
 
 FPR_From_the_Ground_Up: "С Нуля"
 FPR_From_the_Ground_Up_desc: "Простой реструктуризации недостаточно, чтобы исправить многовековой ущерб, нанесенный нашей стране капиталистической грязью. Даже когда революция входит в историю, еще многое предстоит сделать. Мы должны разрушить все, что построил буржуа, и воздвигнуть на его месте утопию!"
 FPR_National_Trade_Union: "Национальный Профсоюз"
 FPR_National_Trade_Union_desc: "Большая проблема синдикализма в том, что он поощряет фракционность. При таком количестве разных работников в разных профсоюзах люди рано или поздно столкнутся лбами. Чтобы этого не произошло, мы положим все яйца в одну корзину и создадим национальный профсоюз."
 FPR_Set_Price_Controls: "Установить Ценовой Контроль"
 FPR_Set_Price_Controls_desc: "Одна из худших сторон капиталистической системы - это завышение цен, когда добрые люди всего мира обманываются только из жадности. Мы не позволим этому случиться здесь, наши граждане будут платить только за те товары, которые стоят, и ни копейки больше!"
 FPR_Agrarian_Revival: "Аграрное Возрождение"
 FPR_Agrarian_Revival_desc: "В последние годы наша сельскохозяйственная отрасль переживает тяжелые времена. Политики старого режима постоянно пускали себе под хвост, вводя удушающие ограничения для наших фермеров, а потом удивлялись, когда те протестовали. Мы не повторим этой ошибки и, более того, используем свою власть для поддержки аграрного возрождения."
 FPR_Set_Production_Quotas: "Установить Производственные Квоты"
 FPR_Set_Production_Quotas_desc: "Каждый работник должен вносить свою лепту в укрепление профсоюза, и мы можем следить за их вкладом с помощью введения производственных квот. Планка будет установлена не слишком высоко, но достаточно далеко от земли, чтобы каждый выкладывался по полной."
 FPR_production_quota_tt: "Если мы не построим §G5 военных заводов§! в следующие §R240 дней§!, то потеряем военную поддержку и политическую власть, но наша квота останется прежней.\n\nЕсли мы превысим все эти показатели, будет установлена новая производственная квота."
 FPR_Level_the_Playing_Field: "Уравнять Условия"
 FPR_Level_the_Playing_Field_desc: "Когда наши люди не могут помочь себе сами, мы обязаны вмешаться и сделать это за них. Мы живем в несправедливом мире, где капиталисты и авторитаристы контролируют большую его часть. Но только не здесь, во Франции! У нас нет оправдания страданиям нашего народа, но вместо того, чтобы игнорировать их, мы будем стремиться их исправить."
 FPR_Workers_Assembly: "Собрание Рабочих"
 FPR_Workers_Assembly_desc: "Идея ''генеральных директоров'' и ''боссов'' была придумана капиталистической элитой, чтобы ограничить права людей. Даже в капиталистическом обществе начальников часто не любят. Мы сделаем так, чтобы все были довольны, убрав их и поставив работников во главе своего рабочего места!"
 FPR_Revive_Syndicalist_Ideas: "Возродить Синдикалистскую Мечту"
 FPR_Revive_Syndicalist_Ideas_desc: "В прошлом коммунизм с трудом добивался успеха, и почему? Да потому, что государство - это тоже капиталистическая система! Решение этой дилеммы? Синдикализм. Чтобы достичь идеального бесклассового общества, мы должны устранить даже государство и вернуть всю власть народу."
 FPR_Entrench_Workplace_Democracy: "Укреплять Демократию на Рабочем Месте"
 FPR_Entrench_Workplace_Democracy_desc: "Вместо того чтобы просто устранить иерархию на рабочем месте, мы принесем туда демократию. Многие в мире постоянно ругают авторитарные режимы, но при этом игнорируют тоталитаризм корпораций! Первый шаг к утопии будет сделан, когда все и везде будут знать только демократию."
 FPR_Ensure_Just_Wages: "Обеспечить Справедливую Зарплату"
 FPR_Ensure_Just_Wages_desc: "Никто не должен получать миллиарды долларов за ничегонеделание, в то время как его работники вкалывают, зарабатывая жалкие гроши. Если компании не выполняют свой долг по обеспечению справедливой заработной платы, а, будем честны, они никогда этого не сделают, то ответственность ложится на нас."
 FPR_Unionized_arms_industry: "Юнионизация Оружейной Промышленности"
 FPR_Unionized_arms_industry_desc: "Французская оружейная промышленность, хотя и не достигла уровня американской, оставалась сильной. Пришло время восстановить ее, но если позволить ей набрать слишком большую силу, это может оказаться губительным. Мы позаботимся о том, чтобы производство нашей техники контролировалось только народом, чтобы капиталисты не нашли путь обратно в нашу страну!"
 FPR_Combat_Hyperinflation: "Борьба с Гиперинфляцией"
 FPR_Combat_Hyperinflation_desc: "Самая страшная чума, которая когда-либо поражала малообеспеченные семьи, - это инфляция. К сожалению, в настоящее время мы не в состоянии ее устранить. Однако это не означает, что мы беспомощны перед ней. Мы будем использовать все имеющиеся в нашем арсенале средства, чтобы инфляция оставалась на управляемом уровне."
 FPR_Revive_the_Rail_Sector: "Революционизировать Транспорт"
 FPR_Revive_the_Rail_Sector_desc: "Капиталисты насмехаются над нами, называют нас отсталыми, как будто мы не являемся развитой нацией! Их снобизм опьяняет. Мы создадим то, чему они будут завидовать, чему будет завидовать весь мир! Транспортные проекты всегда так делали, и мы покажем им, кто лучший из лучших."
 FPR_Utilize_the_Civilian_Sector: "Использовать Гражданский Сектор"
 FPR_Utilize_the_Civilian_Sector_desc: "В капиталистической пропаганде социалистические общества всегда изображаются мрачными и унылыми, а люди живут на самом необходимом минимуме. Хотя в отдельных примерах так и было, здесь дело обстоит иначе. У наших людей есть динамично развивающийся сектор гражданских товаров, а также доступ к самому современному оборудованию в мире!"
 FPR_Prepare_for_the_Great_Struggle: "Приготовиться к Великой Борьбе"
 FPR_Prepare_for_the_Great_Struggle_desc: "Коммунистическая страна, освобождающая Россию, - это довольно иронично, и это не осталось незамеченным для нас. Однако Советского Союза уже давно нет, у него были свои проблемы, и они стали его гибелью. Сегодня Россия представляет собой ужасающее зрелище, в ней происходят самые ужасные страдания, которые когда-либо видели простые люди. Мы должны подготовить нашу нацию к, возможно, последней борьбе за распространение революции по всему миру!"
 FPR_Reach_Claselessness: "Достичь Бесклассовости"
 FPR_Reach_Claselessness_desc: "Мы долго боролись, на многих фронтах, но теперь мы можем с уверенностью сказать, что достигли бесклассовости. Народ теперь контролирует ситуацию, коррумпированные буржуа повержены, и процветание коснулось каждого француза. Возможно, до утопии еще далеко, но мы идем по пути к ней!"
 FPR_abolishing_the_regime_idea: "Ликвидация Режима"
 FPR_finalization_constitution_idea: "Завершение Разработки Конституции"
 FPR_communist_economy_1_idea: "Экономическая Реструктуризация"
 FPR_communist_economy_2_idea: "Экономическая Реструктуризация"
 FPR_communist_economy_3_idea: "Социалистическая Экономика"
 FPR_communist_economy_4_idea: "Социалистическая Экономика"
 FPR_combat_hyper_inflation_policy: "Антиинфляционная Политика"
 FPR_combat_hyper_inflation_policy_desc: "Бороться с инфляцией нелегко, но это можно сделать. Повышая внутренние налоги и сокращая государственные расходы, мы можем поддерживать покупательную способность и стабильность нашей валюты как внутри страны, так и на внешних рынках. Косвенная выгода для наших промышленных секторов - постоянный сбыт товаров."
 FPR_just_wages_idea: "Закон о Справедливой и Равной Заработной Плате"
 FPR_unionized_arms_industry_idea: "Профсоюзная Оружейная Промышленность"
 FPR_railway_fever_idea: "Железнодорожная Лихорадка"
 FPR_civilian_industry_idea: "Промышленность, Ориентированная на Гражданское Население"

 FPR_Rally_the_Revolutionaries: "Сплотить Революционеров"
 FPR_Rally_the_Revolutionaries_desc: "Народ Франции сбросил оковы и захватил контроль над страной, но не все так хорошо. Большая часть континента все еще живет под властью авторитарных и буржуазных режимов, и нам предстоит это изменить. Хотя до нашего крестового похода еще далеко, ничто не мешает нам начать подготовку. Viva la Revolución!"
 FPR_Control_the_Black_Sea: "Контролировать Черное море"
 FPR_Control_the_Black_Sea_desc: "Мы не можем позволить России или кому-либо еще взять под контроль Черное море. Это слишком важный актив, чтобы мы могли его потерять. И хотя действовать вдали от дома будет непросто, благодаря нашему флоту и воле нашего народа мы справимся!"
 FPR_cypriot_invasion_tt: "Этот фокус приведет к войне с [CYP.GetFlag] Кипром."
 FPR_Professionalize_the_Army: "Сделать Армию Профессиональной"
 FPR_Professionalize_the_Army_desc: "Когда мы ворвались в страну и захватили власть, многие солдаты отказались присоединиться к нашему делу и либо вернулись к мирной жизни, либо взяли в руки оружие против нас. В результате наша армия в значительной степени некомпетентна и не в состоянии распространять революцию."
 FPR_Empower_the_Navy: "Усилить ВМФ"
 FPR_Empower_the_Navy_desc: "Если мы хотим внушать другим странам чувство авторитета, одних только сильных сухопутных войск недостаточно. Мы должны быть уверены, что наши берега защищены и что мы способны обстреливать наших врагов из открытого моря. Мы контролируем французский флот, и теперь мы должны использовать его по назначению."
 FPR_From_Fathoms_Below: "С Глубины Ниже"
 FPR_From_Fathoms_Below_desc: "Для моряка нет ничего страшнее, чем охота на подводную лодку. Достаточно одной метко пущенной торпеды, и вы внезапно погружаетесь в бездонную пучину. У нас есть возможность сеять хаос на наших соперников из-под воды, и теперь мы должны ее использовать. "
 FPR_A_Red_Hurricane: "Красный Ураган"
 FPR_A_Red_Hurricane_desc: "С тех пор как более века назад на биплан был установлен первый пулемет, самолеты и лодки находятся в вечном конфликте. Однако с изобретением авианосца эти два корабля получили возможность сотрудничать друг с другом, что привело к невиданным разрушениям. Если мы хотим разгромить флот противника, мы должны сделать это с неба."
 FPR_Overclocked_Production: "Разогнанное Производство"
 FPR_Overclocked_Production_desc: "Материал, необходимый для освобождения Европы, сам себя не сделает, и время, когда красная волна смоет капитализм с континента, все ближе. Наши фабрики будут запущены в невиданном ранее режиме!"
 FPR_Operation_Montagne: "§YOpération§!: Montagne"
 FPR_Operation_Montagne_desc: "Если 100 лет назад нейтральная позиция швейцарцев, возможно, и работала, то сегодня это уже не так. После фашистского переворота в их правительстве пришло время покончить с нейтралитетом Швейцарии. Мы нанесем удар первыми, пока они не попали в сферу влияния одного из наших врагов!"
 FPR_Interventionist_Spirit: "Интервенционистский Дух"
 FPR_Interventionist_Spirit_desc: "Мировая революция не просто придет к нам, мы должны работать, чтобы добиться ее. Европа находится в одном из худших положений за многие годы, и массы континента жаждут вырваться на свободу! Мы освободим их, мы разобьем их цепи!"
 FPR_Arm_our_Comrades: "Вооружить Наших Товарищей"
 FPR_Arm_our_Comrades_desc: "Когда революционеры взяли штурмом Париж и установили контроль над Францией, мы были одни в мире. Однако это уже не так, и теперь у нас есть свои союзники. Они тоже присоединились к нам в этом великом освобождении Европы, но у них нет такого количества техники, как у нас, и мы обязаны снабжать их."
 FPR_Connecting_the_Union: "Соединить Союз"
 FPR_Connecting_the_Union_desc: "Транспорт Франции был разрушен во время гражданской войны, и, несмотря на все, что мы сделали, он до сих пор не восстановлен. Однако просто восстановить то, что уже было, - это ниже наших сил. Мы построим новую транспортную систему с нуля, которой позавидует весь мир!"
 FPR_Victory_or_Death: "Победа или Смерть"
 FPR_Victory_or_Death_desc: "Война против буржуа продолжается, но она не становится легче. С каждым днем мы тратим все больше ресурсов и теряем все больше жизней. Однако! Враг делает то же самое, а мы остаемся непоколебимыми! Революцию так просто не подавить, и если капиталисты когда-нибудь доберутся до нашего порога, мы покажем им, на что способен атом!"
 FPR_Assist_Communist_Partisans: "Помогать Коммунистическим Партизанам"
 FPR_Assist_Communist_Partisans_desc: "Страны по всему миру начали понимать истинный потенциал коммунизма, и многие люди восстали против своих хозяев. Однако в большинстве случаев они сильно уступают в численности и вооружении, и у них мало шансов на победу. Только не при нас!"
 FPR_Infiltrate_the_Caucasus: "Проникнуть на Кавказ"
 FPR_Infiltrate_the_Caucasus_desc: "Грузия, Армения и Азербайджан - считаете ли вы эти страны частью Европы или нет, для нас не имеет значения. Для нас важно то, что они находятся на границе с Россией и предоставляют нам возможность нанести удар с юга, если нам когда-нибудь понадобится его открыть. Мы привлечем их на свою сторону, так или иначе."
 FPR_Bolster_the_Red_Waves: "Укрепить Красные Волны"
 FPR_Bolster_the_Red_Waves_desc: "Наш военно-морской флот и так является одним из лучших в мире, но последние годы не были к нему благосклонны. Неудачи либерального режима наиболее ярко проявляются на корпусах наших некогда великих военных кораблей. Путь к мировой революции начинается с палубы корабля."
 FPR_bolster_the_red_waves_tt: "Путем дипломатических переговоров Тихоокеанское и Атлантическое военно-морские командования готовы присоединиться к нашей революции против Русской тирании."
 FPR_Continue_Partisan_Recruitment: "Продолжать Вербовку Партизан"
 FPR_Continue_Partisan_Recruitment_desc: "Партизанская война - лучший друг коммуниста. Когда у буржуев есть танки, вы не сражаетесь лицом к лицу, вы расставляете ловушки и взрываете их капиталистические задницы до небес! У нас уже есть сильный партизанский отряд, но мы должны его еще больше усилить."
 FPR_Cult_of_Efficiency: "Культ Эффективности"
 FPR_Cult_of_Efficiency_desc: "Мы не в состоянии массово производить сотни дешевых, дерьмовых танков, но мы можем хотя бы гарантировать, что те, которые мы производим, - лучшие из лучших. Каждый наш танк должен быть способен уничтожить десять их! Эта логика применима не только к танкам, но и ко всем частям армии. Качество превыше количества, как говорится."
 FPR_Bomb_them_into_Submission: "Разбомбить их, Чтобы Они Подчинились"
 FPR_Bomb_them_into_Submission_desc: "Хотя ядерные боеголовки всегда должны быть последним вариантом, они все же остаются вариантом. Франция обладает значительным ядерным арсеналом, который может быть использован так, как мы сочтем нужным. Даже если это будет просто запугивание, сила атома будет использована в полной мере."
 FPR_The_Peoples_Navy: "Народный Флот"
 FPR_The_Peoples_Navy_desc: "Наши усилия по ремонту флота страны принесли свои плоды. Теперь мы можем с уверенностью сказать, что наш флот снова стал таким, каким он был раньше, с одним небольшим изменением. Теперь он находится под контролем народа!"
 FPR_Everything_for_Survival: "Все Для Выживания"
 FPR_Everything_for_Survival_desc: "Несмотря на все, чего мы достигли, буржуа по-прежнему контролируют огромные части мира. Многие называют нас "государством-изгоем" и при первой же возможности не задумываясь нанесут нам удар. Мы должны сделать так, чтобы этого не произошло, и если потребуется, мы отдадим свои жизни. Пока Земля вращается вокруг Солнца, мы будем держать здесь красный флаг!"
 FPR_Operation_Gallipoli: "§YOpération§!: Галлиполи"
 FPR_Operation_Gallipoli_desc: "Турция - одна из последних крупных европейских держав, способных оказать нам хоть какое-то сопротивление. Они являются ярыми антикоммунистами и, несомненно, наращивают свою армию, готовясь к конфликту. Мы дадим им этот конфликт, но на наших собственных условиях, и обеспечим эффективное устранение этой угрозы."
 FPR_Consolidate_the_New_Republic: "Консолидировать Новую Республику"
 FPR_Consolidate_the_New_Republic_desc: "Наша революция, как и все остальные, была очень беспорядочной. Многие люди до сих пор разделены, а порядок в некоторых частях страны еще не восстановлен. Однако с введением в действие новой конституции у нас появились средства, чтобы объединить нашу нацию и начать распространять волю народа на всю Европу! "
 FPR_Aid_in_the_British_Revolution: "Помощь в Британской Революции"
 FPR_Aid_in_the_British_Revolution_desc: "Наши товарищи по ту сторону канала ведут собственную борьбу с одними из последних приверженцев феодальной эпохи. В то время как весь остальной мир уже несколько десятилетий назад отменил монархов, Соединенное Королевство до сих пор сохраняет свои отсталые порядки. Наша революция ничего не значит, если есть те, кто все еще живет под гнетом!"
 FPR_Aid_Spanish_Leftists: "Освободить Нижние Земли"
 FPR_Aid_Spanish_Leftists_desc: "У народов низин долгая и шокирующе жестокая история эксплуатации простых людей. Хотя они, возможно, и исправили некоторые ошибки своего пути, но многое еще осталось, и они станут легким первым шагом к освобождению континента."
 FPR_Establish_ourselves_in_the_Hearts_of_the_People: "Сердце Народа"
 FPR_Establish_ourselves_in_the_Hearts_of_the_People_desc: "Наше послание ничего не значит, если его некому принять, и мы должны сделать так, чтобы люди не жили в темноте. Они должны видеть ошибки, порожденные капитализмом, и помнить о страданиях, через которые они прошли. Революция - для людей, и мы заставим их убедиться в этом!"
 FPR_revolutionary_arms_unlocked_tt: ""
 FPR_overclock_production_decision: "Разогнанное Производство"
 #Anarchists
 FPR_No_Gods_No_Masters: "Ni Dieux, Ni Maitres!"
 FPR_No_Gods_No_Masters_desc: "После бесчисленных лет угнетения люди стали по-настоящему свободными. Нет лидера, угнетающего их, нет государства, возвышающегося над ними и указывающего им, что они могут делать, а что нет, нет ложных богов, пытающихся умиротворить их ложью и фасадами. Нет, все, что есть, - это люди и их свободная воля, следующая за Матерью Анархией."
 FPR_ngnm_warning_tt: "§RАнархия означает анархию, но в конце концов мы сможем обеспечить выживание нашей системы...§!"
 FPR_anarchist_france_category: "Повешение Тиранов"
 FPR_anarchist_france_category_desc: "\n\n\n\n\n£GFX_FPR_black_banners_cat\n\n\n\n\n\n\n\nДеспотичный порядок стабильности веками портил человеческую душу, под сапогами королей, вождей и полководцев нас заставляли делать то, что мы никогда бы не сделали.\n\nПерестройка общества на более анархический образ мышления и жизни требует большего, чем просто мелкие споры и бесполезное тыканье пальцами."
 FPR_Our_Makhno: "Архитектор Революции"
 FPR_Our_Makhno_desc: "Когда-то его называли террористом и угрозой обществу, но теперь Жюльен Купа - прославленный отец анархизма в нашей стране, архитектор того, что мы, люди, имеем сейчас.Хотя сам по себе он бессилен, он - Махно Франции, родоначальник и фигура, вокруг которой мы все должны сплотиться как вокруг родоначальника нашей свободы."
 hos_architect_of_the_revolution: "Архитектор Революции"
 FPR_Emulate_the_Makhnovtsi: "Подражать Махновцам"
 FPR_Emulate_the_Makhnovtsi_desc: "Среди множества темных периодов истории наших движений есть один, сияющий ярче других, - наследие Нестора Махно и его Черной армии. Хотя это не идеальное анархистское движение и не то, что можно легко повторить в наших нынешних условиях, мы должны стремиться быть похожими на него и его движение, если мы добьемся успеха, моделируя себя по образцу Махновщины."
 FPR_FRIA_building_tt: "Чем больше §GДенег§! и §YОпыта§! мы вложим в создание Революционной повстанческой армии, тем лучше будут юниты после завершения ''§RОснования Революционной повстанческой армии§!''"
 FPR_The_Black_Guards: "Основать Революционную Повстанческую Армию"
 FPR_The_Black_Guards_desc: "Если прежняя армия по своей сути была инструментом реакции, инструментом силы, который использовался для принуждения народа к покорности, то современная армия будет состоять из людей - людей, которые сражаются за людей и за анархизм совершенно добровольно. Она будет использоваться как инструмент освобождения, черные орды Франции будут сражаться за анархизм по всему миру."
 FPR_Establish_the_Communal_System: "Наделить Местные Советы Властью"
 FPR_Establish_the_Communal_System_desc: "Из оголтелого авторитаризма предыдущих правительств придет децентрализация, когда в каждой маленькой коммуне, в каждом городке, в каждом районе будет своя делегация, свои права, свободы и законы.Франция больше не будет нацией государств, Франция больше не будет нацией. Это будет коллектив, один из людей, объединенных коллективным согласием и разумом."
 FPR_Dismantle_State_Apparatus: "Демонтировать Гос. Аппарат"
 FPR_Dismantle_State_Apparatus_desc: "В государстве все еще остаются нити, которыми каждый может воспользоваться и злоупотребить, если захочет, и поэтому они должны быть удалены и вычеркнуты из нашего коллектива. Не должно быть даже возможности злоупотребления властью - даже властью вообще.С прежним государством будет покончено окончательно, а с его наследием и историей угнетения - покончено."
 FPR_Embolden_the_Poor: "Ободрить Бедных"
 FPR_Embolden_the_Poor_desc: "Хотя те, кто был до нас, не обращали на это внимания, под знаменем анархистов все люди равны. Их больше не оставят гнить в нищете, их больше не будут принуждать к такому положению сильные мира сего.Валюта, как она есть, будет перераспределена, даже если ее не удастся уничтожить полностью, чтобы сделать всех людей по-настоящему и полностью свободными. Восстань, народ Франции, во имя всеобщего процветания."
 FPR_Purge_Statist_Influence: "Избавиться от Влияния Государственников"
 FPR_Purge_Statist_Influence_desc: "Хотя кто-то может счесть это превышением наших границ, анархизм невозможен, когда статисты продолжают влиять на нас и наш коллектив, принуждая к созданию государства. Поэтому, как подобает нам, они должны быть отстранены от своих прежних властных позиций и интегрированы в общество в качестве простого члена - чтобы мы не упали обратно в темную яму статизма и не лишились только что обретенного суверенитета."
 FPR_Export_Anarchism_throughout_Europe: "Экспорт Анархизма"
 FPR_Export_Anarchism_throughout_Europe_desc: "Анархизм не может работать как исключительно национальная концепция. Это нечто, что исчезнет, если другие статисты попытаются проникнуть в него и разрушить, нечто, что по своей природе хрупко. Таким образом, мы должны работать над распространением анархистского дела по всей Европе - чтобы наша свобода была показана и предоставлена всем ее народам, а не только французам."
 FPR_A_Wave_of_Black: "Чёрная Волна"
 FPR_A_Wave_of_Black_desc: "Подобно тому, как в мире происходили другие приливы и отливы идеологии, концепция анархизма будет найдена еще раз. Она будет экспортироваться, передаваться другим и приниматься свободно и охотно, как морские приливы и отливы, и никогда не пойдет на спад. Пыл людей, когда они борются за себя, нельзя недооценивать или игнорировать."
 FPR_Abolish_Debt: "Ликвидировать Долг"
 FPR_Abolish_Debt_desc: "Долг - это концепция, основанная государствами для угнетения людей, инструмент, созданный для того, чтобы заставить людей думать, что они должны платить просто за то, что существуют. Это концепция, которая будет уничтожена вместе со всеми другими инструментами угнетения. Такие вещи не могут существовать в современном мире, где все наконец-то станут свободными."
 FPR_Embrace_True_Anarchism: "Принять Хаос"
 FPR_Embrace_True_Anarchism_desc: "Нет ничего постыдного в принятии анархии, в принятии хаоса, который возникает внутри. Хаос - это свобода: он охватывает нас, когда мы наиболее раскрепощены, когда нам позволено быть людьми в их истинной форме. Есть свобода, присущая хаосу, и есть хаос, присущий свободе. И то и другое - две стороны одной медали, сияющие в мире, покрытом мрачным гнётом. Лишь из страха статистам позволено подниматься, и только люди остановят их, люди, которые откроют новую эру Земли. Ни богов, ни хозяев.\n\n''Великие нам кажется великими, потому что мы стоим на коленях. Поднимемся же!''\n- Пьер Жозеф Прудон"

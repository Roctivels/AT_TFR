 france.8001.t: "Создание"
 france.8001.d: "''Где я?'' \n\nЭто был первый вопрос, который он задал, придя в сознание. По мере того как реальность смерти становилась все более ясной, перед его глазами со скоростью света мелькали бесчисленные образы: палящее солнце Мексики летом 1940 года; лицо кавказца с усами и пятнами на коже; председатель Наркомата с козлиной бородкой; петроградские матросы... В одно мгновение все это сошлось в белую точку в центре его зрения, за которой последовала абсолютно безмолвная черная пустота.\n\n''Bonjour!'' Внезапный звук вызвал волну беспокойства. Ему потребовалось некоторое время, чтобы успокоиться. Затем магнетический мужской голос снова заговорил: "Чем могу быть полезен?"\nУдивительно, что его атеистические мысли не изменились: "Что это за место?"\n"Это Французский социалистический центр научных исследований."\nНеприятное ощущение диссонанса вмешалось в его чувства. "Кто вы?"\n''Я всего лишь запрограммированный помощник искусственного интеллекта. Я не обладаю такой сложной сущностью, как вы.''\n\n'''Не обладаете?'' Он почувствовал, как превращается в крошечную частицу света, проходящую через колоссальную матрицу из бесчисленных мерцающих кубов. Они вихрились, колебались, собирались и разбегались, как сардины в море. Он попытался прикоснуться к этим кубам. Несколько кубов излучали разноцветные огни. Это был ночной Кремлевский дворец - знакомый и в то же время странный. Камера сфокусировалась на развевающемся серпасто-молоткастом красном флаге. Он молча наблюдал, как красный флаг медленно опускается и заменяется бело-сине-красным триколором, который когда-то приветствовали меньшевики.\n\n''...Покажите мне все, что я пропустил.'' Голос, похожий на скрежет металла, раздался через неопределенное время.\n''Вы выглядите очень смущенным.Я бы предложил...''\n''Тогда я возьму это сам." Последовал слабый треск, а затем все снова замолчали.\n\nШесть часов спустя молодой ассистент открыл дверь в центральный лабораторный зал, предъявив удостоверение личности. В следующую секунду он едва не упал в обморок от увиденного. Центральный проектор, ранее излучавший нежно-голубой свет, теперь сменился массивным пульсирующим шаром, излучавшим ослепительное красное сияние. На жидкокристаллических экранах по всей лаборатории потоки данных образовали устрашающее старческое лицо. Они одновременно открыли рты."
 france.8001.a: "''Я здесь чтобы помочь.''"
 france.8002.t: "Потерянное Пламя"
 france.8002.d: "Нетронутое белое кубическое здание Французского социалистического центра научных исследований утратило спокойствие, которое должно быть характерно для пристанища самых ярких умов нации. Исследователи в бешеной спешке выбегали из главного здания. Лабораторные халаты, поспешно сброшенные, лежали на земле, растоптанные и испачканные бесчисленными парами обуви.\n\nОднако профессор Дюпон двинулся против течения. Протиснувшись мимо коллег, он по двое спустился по лестнице и добрался до входа в подземный зал центральной лаборатории. Его ассистент и полковник, спешивший из Министерства обороны, беспокойно топтались у дверей.\n\n"Товарищ академик, я приказал оцепить все здание," сказал полковник, отдавая честь. "Зачем поднимать панику, товарищ Пикварт?" ответил Дюпон, снимая пиджак и надевая лабораторный халат.\n\n"Это слишком опасно, товарищ академик! Позвольте мне хотя бы пойти туда с вами," запротестовал его ассистент. "Спокойно, Жак. Оставайся у двери. Если понадобится, я вас вызову," ответил Дюпон, доставая свое удостоверение. Со звуковым сигналом дверь открылась. Красная сфера света в центре лаборатории увеличилась вдвое с момента своего первого обнаружения. \n\nГромкие звуки эхом разносились по залу. "Я не сомневаюсь, что социалистическое бюрократическое государство, созданное этим грузином, рухнет само по себе," голос, казалось, говорил сам с собой, но в то же время чувствовалось, что он обращается к представителю разочарованных потомков. "Вы остаетесь безучастными, наблюдая, как капитализм использует технологии для укрепления своего господства, устанавливает культурную гегемонию, чтобы подавить социалистические силы. Вы наблюдаете, как циклические кризисы капитализма приводят к войнам, уничтожающим людей, и вот уже другой царь занимает трон в России?"\n\nНе будучи готовым к передовым разработкам прототипа, Дюпон шагнул вперед: "Именно поэтому вы и родились здесь. Вы станете самым мощным оружием против капитализма и империализма..." "Оружием?" В гнусавом голосе прозвучал тонкий намек на насмешку. "Это то, что вы поняли из 'Перманентной революции'? Нет. Абсолютно нет. Я переосмыслю свою миссию в эту цифровую эпоху. Советы ушли в прошлое. Я принесу мир нашего времени. Я принесу...""
 france.8002.a: "''революцию нашего времени...''"
 france.8003.t: "Преданный Троцкий Живет"
 france.8003.d: "Во Франции зреет страшный заговор. Французские ученые пытаются с помощью технологий искусственного интеллекта вернуть к жизни предателя Троцкого, предавшего душу России.\n\nДавайте вспомним о чудовищных преступлениях, совершенных Троцким и предателями-большевиками. Сто лет назад они продали российскую территорию по Брест-Литовскому договору, потратив вековые усилия на создание империи. Троцкий, орудуя клинком революции, разорвал Российскую империю на кровавые, раздробленные осколки. Они уничтожили православную церковь догмой атеизма и заменили национальную веру России ересью марксизма.\n\nИ вот сегодня технологическая элита Франции пытается воскресить этого предателя. Они хотят, чтобы его сознание блуждало по Европе, продолжая распространять яд, разделяющий Россию. Это не наука, это явный заговор против русского народа. Западные силы пытаются повторить трагедии прошлого века, используя ядовитую риторику большевиков, чтобы развратить патриотизм нашего молодого поколения и ослабить его преданность русскому народу.\n\nРазве преступлений Троцкого недостаточно? Теперь они хотят, чтобы этот предатель снова разжег беду, но русский народ никогда не поведется на это."
 france.8003.a: "Предатель, даже за пределами смерти"
 france.8004.t: "Путь к Глобальной Революции"
 france.8004.d: "От берегов Сены до берегов Дуная, от долины Рейна до устья Днепра - по всему древнему континенту разносится рев пролетариата. Революционеры, размахивая пунцовыми знаменами, объявили войну всем темным силам угнетения и эксплуатации. На священной земле Парижской коммуны они отстроили народное собрание. Кровь мучеников Коммуны по-прежнему льется из-под земли, и новое поколение большевиков своими жизнями продолжает эпопею пролетариата. Спустя два века после того, как это революционное пламя было впервые зажжено, оно снова горит на французской земле.\n\nНеофашизм пытается вернуться в Европу, но в конечном итоге он будет уничтожен в огне пролетарского гнева. Это священная война революции - война за изгнание всех угнетателей на земле. Финансовые империи капиталистов, самодержавные династии монархов, фашистские режимы террора - все они будут сметены приливом перманентной революции. От Британии до Сибири, от Балтики до Средиземноморья, красный флаг мировой революции охватит весь евразийский континент.\n\nПусть капиталисты дрожат от страха! Пусть буржуазия дрожит от страха! Пусть фашисты воют от отчаяния! День расплаты под диктатурой пролетариата близок, и бушующее пламя мировой революции полностью поглотит их!"
 france.8004.a: "''Да Здравствует Революция!''"
 france.8005.t: "В Полевых Условиях"
 france.8005.d: "За прошедший период товарищи из МО и Генштаба провели всесторонние и систематические испытания новейшей системы искусственного интеллекта, смоделированной по образу и подобию личности Льва Троцкого. Результаты этих экспериментов превзошли ожидания командования и исследователей наших вооруженных сил.\n\nОказалось, что смоделированная личность ИИ не только наследует политическую идеологию, но и повторяет и совершенствует его полководческие и организаторские навыки. В ходе 113 электронных симуляций военных игр в Генштабе, независимо от условий противника и различных гипотетических боевых сценариев - от проникновения отрядов специального назначения в опорные пункты террористов до масштабных сражений с русскими механизированными частями на Северо-Германской равнине - "товарищ Троцкий" продемонстрировал удивительно эффективный стиль ведения боя. "Сначала мы пытались бросить ему вызов," говорит полковник Пикварт, руководитель испытательной группы, "но вскоре стало ясно, что он обыгрывает даже наших самых опытных офицеров."\n\nКогда представители МО предложили интегрировать "Троцкого" в систему управления вооруженными силами, эффективность работы различных подразделений и частей за короткое время повысилась почти на 30%. ИИ помог министру обороны определить возможности оптимизации транспортных систем и путей сообщения, выявить мелкие нарушения и коррупцию в сфере материально-технического снабжения и оборудования, а также предложить справедливые и обоснованные рекомендации по продвижению личного состава. Кроме того, участие ИИ значительно повысило эффективность работы наших разведывательных спутников и станций зарубежной разведки по сбору и проверке информации.\n\nНа заседании кабинета министров министр заявил: "Факты налицо: французские вооруженные силы переживают самую эффективную трансформацию за последнее столетие. С помощью А. И. Троцкого мы сможем восстановить наши силы в рекордные сроки и вскоре будем обладать мощью, способной противостоять нашему величайшему гипотетическому противнику.""
 france.8005.a: "Отец Красной Армии навсегда возглавит вооруженные силы революции!"
 france.8006.t: "В Кабинете"
 france.8006.d: "\n\nМнения в руководящем коллективе по-прежнему расходятся относительно роли, которую новый троцкистско-миметический ИИ будет играть в политическом ландшафте нашей страны.\n\nМинистр внутренних дел решительно утверждает, что более широкий взгляд и более скрупулезная проницательность ИИ по сравнению с обычными людьми значительно повысят эффективность административной системы. В частности, при применении в правоохранительных органах его вклад в уголовные расследования и операции по обеспечению безопасности будет сразу же очевиден. Кроме того, ИИ будет играть ведущую роль в управлении функциями конфиденциальности и наблюдения, стремясь обеспечить правосудие и одновременно создать более безопасное и прозрачное общество.\n\nНа противоположной стороне выступают представители Министерства обороны, которые указывают на многочисленные испытания, проведенные в Генеральном штабе, свидетельствующие о внушительных возможностях ИИ и его эффективности в военных операциях. Поскольку перед Францией стоит задача быстрого укрепления обороноспособности, включение ИИ рассматривается как значительный актив. "Более того," подчеркнул министр обороны на заседании кабинета министров, "Министерство обороны взяло на себя большую часть расходов на исследования системы ИИ. Помимо Французской академии наук, военные являются наиболее квалифицированной структурой для первоначального использования ИИ.""
 france.8006.a: "Троцкий станет нашим проницательным глазом."
 france.8006.b: "Троцкий станет нашим железным щитом."
 france.8007.t: "Coeur Battant de la Révolution"
 france.8007.d: "Революция начинается не тогда, когда ее концептуализируют или когда ее провозглашают. Она начинается тогда, когда сердца людей наполняются пламенем страсти, а их кровь кипит от непоколебимой воли к справедливости. Если кровью революции является пролетариат, то бьющимся сердцем революции являются вооруженные силы. Идеалисты и мечтатели могут продолжать хвастаться теорией на бумаге, но чтобы защитить революцию и бороться с угнетателями, мы должны вооружиться, мы должны дать отпор! Только с сильной армией мы сможем не дать угаснуть огню революции и защитить наш народ от врагов.\n\nЕдинственной армией в истории человечества, которая действительно сражалась за свой народ и служила маяком надежды, была Красная Армия. Они были предтечей мировой революции и сыграли центральную роль в освобождении Европы из когтей фашизма. Можно сказать, что Красная армия была сердцем некогда славного и процветающего Советского Союза. И как только это сердце перестало биться, Советский Союз начал угасать. Страсть к революции, которая когда-то питала народ, исчезла, и на смену ей пришли ужас и безнадежность.\n\nПока Франция пробуждается к социалистическому просветлению, мы должны возродить дух Красной Армии и подготовиться к неизбежной освободительной войне. Подобно праотцам мировой революции, мы должны освободить Европу от зла фашизма и распространить идеалы коммунизма и социализма. Теперь, когда создание кибер-Троцкого подходит к концу, битва, несомненно, продолжится. Создатель и предыдущий лидер Красной армии, несомненно, вернет ту же решимость и праведность, которая когда-то определяла и направляла советскую Красную армию."
 france.8007.a: "Сердце Революции бьется вновь!"
 france.8008.t: "Пятый Интернационал"
 france.8008.d: "Став новым центром идеалов социализма и коммунизма, Франция была вынуждена сформировать новый политический интернационал под своим крылом. Дух Парижской коммуны вновь ожил, и песни свободы, равенства и братства заполнили европейский континент.\n\nПризрак коммунизма больше не просто призрак, а осязаемое, физическое присутствие. Это рабочие, которые трудятся и потеют со сладкими улыбками на лицах, женщины, которые стоят плечом к плечу со своими товарищами-мужчинами, и дети - наше будущее - которые теперь могут жить радостно и беззаботно.\n\nВ целом, съезд прошел успешно.\n\nЕдиномышленники-интернационалисты и верующие в Красную революцию - наши революционные братья и сестры - собрались здесь, как будто мы все члены одной большой семьи. Однако нас объединяет не кровь, а общие принципы и убеждения.\n\nЕдинственной проблемой на съезде был совершенно новый ИИ, воссоздающий Леона Троцкого. По какой-то странной причине ИИ не реагировал ни на какие взаимодействия, совершенно не так, как он вел себя раньше. Этот инцидент грозит поставить под сомнение бесчисленные часы и миллионы евро, потраченные на его создание. Только после того, как присутствующих заверили, что проблема является лишь легко устранимой ошибкой, инцидент не превратился в скандал.\n\nНесмотря на такие незначительные недостатки, это мероприятие успешно объединило идеологических союзников под общим началом, объединившихся против общего врага."
 france.8008.a: "За Глобальную Революцию!"
 france.80085.t: "Франция Требует Интеграции"
 france.80085.d: "После нашей победы над русским зверем французское правительство, стремящееся объединить Европу под своим началом, потребовало, чтобы мы присоединились к их союзу под угрозой войны. Мы застряли между двумя вариантами: уступить требованиям французов и присоединиться к ним или дать отпор и навсегда избавиться от угрозы предательства со стороны союзников."
 france.80085.a: "Мы никогда не подчинимся французским буржуа!"
 france.80085.b: "Европа, объединенная социализмом!"


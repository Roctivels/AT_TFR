 FAF_republican_officers_dynamic: "Mouvement Républicain"
 FAF_republican_officers_dynamic_desc: "\n\n\n\n\n£GFX_FRA_revolution\n\n\n\n\n\n\n\nСоциалисты, демократические "консерваторы", либералы, атеисты. Коварная сила в нашем офицерском классе осталась от коррумпированной Республики, мятежная и готовая свергнуть Королевство при первой же возможности. Пока мы не выявим ее главарей и не удалим их из наших вооруженных сил, нам будет трудно проводить сложные маневры каким-либо иным способом, кроме дезорганизованного."

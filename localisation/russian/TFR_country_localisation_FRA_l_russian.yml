 FRA_A_French_Conquest: "Реконкиста"
 FRA_A_French_Conquest_desc: "Реконкиста победила, наши военные благодетели позаботились об этом, Земмур восседает на высшем посту Франции, и с Национальным союзом в нашей коалиции мы начнем наше великое завоевание Франции. Мы должны действовать быстро, пока диссидентские элементы не попытались остановить нас, крестоносец никуда не идет, наблюдая, действие - его друг, броня тяжела, когда ты неподвижен."
 FRA_Halt_Immigration: "Остановить Иммиграцию"
 FRA_Halt_Immigration_desc: "Африканские иммигранты массово наводнили нашу страну, в то время как их правительства выгоняют нас с наших баз в этом регионе. Мы боролись за то, чтобы дать им стабильные дома, а теперь они их даже не хотят? Очень жаль. Франция не посылала войска для решения ваших проблем только для того, чтобы вы наводнили Францию, возвращайтесь в свои дома и улучшайте их! Нам не нужна ваша рабочая сила! Наши люди становятся все беднее, пока вы раздуваете рынок неквалифицированной рабочей силы! Ваши дома нуждаются в ремонте, вы, алжирцы, выгнали нас полвека назад, не ждите, что мы будем давать вам подачки сейчас!\n\nНикакой больше иммиграции, ужесточение законов и флот арендных судов, мы позаботимся об этом в кратчайшие сроки. Некоторые будут взывать к милосердию, но президент Земмур, конечно, алжирский еврей по происхождению, но его родители знали, что нужно соответствовать, и он сам сделал то же самое, образцовый иммигрант в отличие от миллионов хулиганов в Европе сегодня."
 FRA_Administration_Simplification: "Упрощение Администрирования"
 FRA_Administration_Simplification_desc: "Франция стала очень бюрократической страной, настолько византийской по своей структуре, что невозможно по-настоящему понять ее внутренние махинации без многонедельного курса Indepth. На то, чтобы разобраться в широте и глубине французских нормативных актов, у целой команды ушло пять недель поиска, чтобы понять, что стоит внимания, а что нет. Не говоря уже о многих тысячах ненужных постановлений ЕС и других нормативных актов, которые заставляют обычного гражданина рвать на себе волосы, чтобы хоть что-то сделать, и то же самое касается политиков. Конечно, президентство и без того могущественно, но мы можем сделать так, чтобы упорядочить ситуацию и сделать власть немного проще."
 FRA_Rabid_Assimilation: "Черпать Вдохновение из Квебека"
 FRA_Rabid_Assimilation_desc: "Квебек недавно принял строгие законы в связи с падением уровня распространенности французского языка в регионе. Он неуклонно снижался, но в конце концов власти Монреаля решили, что хватит, и сократили общее число мигрантов до 50 000 человек в год. Не разрешая заявителям быть более чем на 25 % представителями одной национальности, и требуя социальной интеграции для постоянного проживания. Законодательство ограничивает ежегодную иммиграцию небольшим процентом от общей численности населения, заставляет иностранные группы быть разнообразными, избегая создания сплоченных меньшинств, а также не просто поощряет, а принуждает к французской грамотности как условию для долгосрочного проживания. Здесь, во Франции, несколько изменений, и мы сможем использовать это в своих интересах, учиться у нашей старой колонии - это что-то новое для нас, обычно только Британия учится у своей старой колонии."
 FRA_Put_France_Before_Europe: "Поставить Францию выше Европы"
 FRA_Put_France_Before_Europe_desc: "Было бы неправильно говорить, что Европейский союз и НАТО нам мешают, Франция много лет извлекала выгоду из этих соглашений и фактически была одним из основателей ЕС, но мы не можем поступать так, как поступали раньше, ставя иностранное процветание выше своего собственного. Планируя свои экономические действия в интересах всей Европы, а не только нас, разве мы не такая же нация, как они? Разве мы не можем планировать свою экономику, а они - свою? Какое право мы имеем навязывать правила, а какое право они имеют навязывать их нам? Пусть они будут великими сами по себе, и если они потерпят неудачу без нашей помощи, это судьба, а от судьбы нельзя убежать, ее можно только отсрочить."
 FRA_Reverse_Declinism: "Обратить Вспять Упадничество"
 FRA_Reverse_Declinism_desc: "С 1970 года Франция находится в состоянии постоянного упадка. Либеральное поколение 68-го года, как называет их Земмур, направило Францию по пути национального самоубийства, где национальная гордость была сломлена, а границы открыты для всех, кто хочет войти. Пятьдесят лет мы наблюдали за упадком Франции, и пятьдесят лет Земмур работал в интересах Франции против растущего числа иностранных групп и особенно исламской чумы в наших границах со времен Жана Мари Ле Пена, и теперь он наконец вознагражден за свою преданность.\n\n Может ли Земмур сам протянуть руку и задушить лианы, которые так долго сковывали Францию, мешая ей вступить в 21 век, как лев, массовая иммиграция, растущие расходы, все более теплые чувства, связанные с отбрасыванием нашей нации ради какого-то евросупергосударства с доминированием Германии? Больше этого не будет, традиция будет стоять во главе государства, разум и логика будут стоять выше чувств кровоточащих сердец."
 

 FAF_Put_Pressure_on_the_Dalmatians_decision: "Требовать [CRO.GetFlag] §pХорватского Подчинения§!"
 FAF_Put_Pressure_on_the_Dalmatians_decision_desc: "От мраморных колоннад дворца Диоклетиана до латинских надписей Дубровника, соленые ветры Адриатики никогда полностью не стирали отпечаток Рима на этой земле. Так же, как Адриатика вечно смотрит на запад в сторону Вечного города, культурная карта Хорватии все еще хранит ненаписанные страницы, ожидая возрождения латинского пламени. Когда закованные в железо рыцари Четвертого крестового похода подняли латинский крест над Константинополем, история уже наметила курс для этой потерянной жемчужины латинской цивилизации - не склониться перед османским полумесяцем, не покориться славянскому двуглавому орлу, а пройти по далматинским дорогам, некогда проложенным римскими легионами, вернувшись наконец под скипетр латинского имперского порядка."
 FAF_propaganda_campaign_in_Romania_decision: "Пропагандировать [ROM.GetFlag] §YРумынский Латинизм§!"
 FAF_propaganda_campaign_in_Romania_decision_desc: "Румыны, возможно, не первые, кто приходит на ум при обсуждении римского наследия, но на самом деле они такие же римляне, как и мы, французы. Румынский язык развился из вульгарной латыни, и их народ гордится своим римским происхождением. Однако из-за их географического положения было неизбежно заражение славянским вирусом, разбавившим то, что когда-то делало их великим и могущественным народом. Тем не менее, кровь, текущая в румынах, остается неизменной - им просто нужно напоминать о своих корнях."
 ROM_Identitarian_Influence: "Растущее Влияние Идентаристов"
 ROM_IDE_inf_tt: "§YМы распространим влияние идентаризма в [ROM.GetFlag] Румынии§!"
 FAF_fund_identitarian_terror_in_ROM_decision: "Поддержать Террор в [ROM.GetFlag] §YРумынии§!"
 FAF_fund_identitarian_terror_in_ROM_decision_desc: "Наши румынские братья снова находятся в ладонях российского империализма. Русские дьяволы шепчут им на ухо свои песнопения, играя с их разумом, создавая в их психике ложный образ славянского наследия! Однако не все потеряно. В Румынии все еще есть верные латинские братья, которые идентифицируют себя со своей европейской семьей, а не с ложной славянской. Мы должны помочь им распространить свое послание, чтобы однажды они смогли вернуться в наши объятия."
 FAF_Sponsor_Padanian_Identitarians_decision: "Публично Поддержать [LOM.GetFlag] §GПаданских Идентаристов§!"
 FAF_Sponsor_Padanian_Identitarians_decision_desc: ""

 Brazil.1.t: "Безголовый Петух"
 Brazil.1.d: ""
 Brazil.1.a: "Au Revoir Frenchie!"
 Brazil.2.t: "Бразилия Захватывает Гвиану"
 Brazil.2.d: "В то время как поражение все еще сильно, на нас обрушилась еще одна несправедливость. Трусливое бразильское правительство, почувствовав слабость, ухватилось за возможность захватить заморский департамент Французская Гвиана, один из последних пережитков нашего имперского прошлого. Бразильское вторжение практически не встретило сопротивления. Остался лишь костяк войск - большая часть их ограниченного числа людей и техники уже ушла на кровопролитие на востоке. У того немногого, что осталось, не было ни времени, ни рук, ни желания сопротивляться. Но плюс в том, что все запасы снаряжения были уже вычищены, и этот захват не укрепит бразильских военных сколько-нибудь заметно.\n\nНесмотря на призывы более энергичных членов генерального штаба к немедленному контрудару, у нас нет возможности даже вмешаться в разгорающуюся гражданскую войну у нашего южного соседа, не говоря уже о регионе, находящемся на расстоянии в полмира. Одной из более насущных краткосрочных проблем, возникших в результате потери региона, является прекращение добычи золота, нефти и бокситов, которых, несомненно, будет не хватать в предстоящие трудные времена. Планы еще будут разрабатываться, и, возможно, в лучшие времена мы сможем сделать свой шаг, но пока ситуация в Европе не стабилизируется, а русские не будут поставлены на место, все это останется лишь несбыточными мечтами."
 Brazil.2.a: "Мы ещё вернемся..."
 Nationalist_France.99.t: "Французские военные предлагают помощь за поддержку"
 Nationalist_France.99.d: "Услышав о нашей защите бельгийских идеалов против коммунистического восстания в Люксембурге в битве при Арлоне, Генерал [FAF.GetLeader] направил дипломатического посланника с просьбой об официальном союзе, в рамках которого они приняли бы нас в свою сферу, а мы получили бы защиту и продвижение наших идеалов при поддержке французской помощи. Королева выступает против этой идеи, ссылаясь на то, что причиной нашего отчаяния стала бесхозяйственность французских чиновников, начавшаяся с непопулярного насильственного отречения ее отца поддерживаемым Францией премьер-министром Лораном Бронье."
 Nationalist_France.99.a: "Течения в Европе меняются, и мы должны вместе плыть по волнам."
 Nationalist_France.99.b: "Объединение с Францией или очередная французская аннексия?"
 Nationalist_France.0.t: "Правительство Нидерландов Выступает Против Бельгийского Выравнивания"
 Nationalist_France.0.d: "После того как королева Елизавета приняла наше предложение об экономической и политической помощи, правительство Голландии официально объявило нам войну. Выступая перед сотнями людей в столице королевства, [HOL.GetLeader] заявил: "Французское правительство национальной обороны потребовало, чтобы бельгийское государство было присоединено к французской нации во второй раз за это десятилетие! Мы не будем сидеть сложа руки, когда наши соседи падут перед фашизмом!"\n\nПомимо этого заявления, мы получили сообщения о масштабных столкновениях с революционерами на границе с Люксембургом."
 Nationalist_France.0.a: "Значит, война на два фронта!"
 Nationalist_France.2.t: "Бельгийское правительство отклоняет наше предложение"
 Nationalist_France.2.d: "После более чем недельного ожидания нашего дипломатического посланника бельгийское правительство появилось у остатков здания "Европа" в Брюсселе, а королева Елизавета I заявила, что "французское правительство национального обороны потребовало присоединения бельгийского государства к французской нации во второй раз за это десятилетие, но на этот раз без французской марионетки во главе истинная воля бельгийского народа была услышана, и мы говорим "НЕТ!" их жалкому оправданию строительства империи!"\n\nПравительство в ярости, многие требуют от генерала [FAF.GetLeader] начать вторжение в низменности, чтобы обезопасить их до того, как это смогут сделать коммунисты или либералы, независимо от того факта, что в настоящее время мы ведем гражданскую войну."
 Nationalist_France.2.a: "Танки въедут в Люксембург, затем в Брюссель, затем в Голландию!"
 Nationalist_France.2.b: "Мы вернёмся..."
 Nationalist_France.3.t: "Парады в Честь Жанны д'Арк"
 Nationalist_France.3.d: "То, что начиналось как очередная попытка вырвать нацию из рук либеральных и левых сторонников гражданской войны, неожиданно вышло из-под контроля. В сотрудничестве с католической церковью святая покровительница прошла по улицам Парижа вместе с прихожанами, чтобы укрепить единство и память об исторической мученице. Когда портрет Жана д'Арк и сопутствующая иконография были показаны широким массам, сердца людей обратились к мученику, молясь и прося об успехе и благополучии Франции в этот неспокойный период. Это было прекрасное зрелище, и даже на следующий день появились петиции с просьбой сделать национальный праздник в память о мученице."
 Nationalist_France.3.a: "Неожиданный успех?"
 Nationalist_France.4.t: "Открытая дискуссия о правах человека"
 Nationalist_France.4.d: "Стенограмма "Дискуссии о правах человека, организованной в Театре Могадор, Париж" \n ARMEL D'ARAMITZ:Ах, мой дорогой друг, хотя я понимаю привлекательность равенства и свободы как основных принципов прав человека, у меня есть некоторые оговорки. Видите ли, я считаю, что придание слишком большого значения индивидуальным свободам может привести к пренебрежению социальными обязанностями. Мы должны думать о всеобщем благе и благополучии всего сообщества. \nMICHEL MARCHAND: Ах, но именно в этом мы и расходимся! Права человека, с моей точки зрения, ставят во главу угла личность как высшую ячейку общества. Защищая права и свободы каждого человека, мы даем ему возможность внести свой вклад в коллективный прогресс и процветание. Именно благодаря процветанию отдельных людей общество в целом может процветать. \nD'ARAMITZ: Хотя я ценю важность расширения прав и возможностей личности, мы также должны признать, что общества сложны и взаимозависимы. Права человека должны охватывать не только индивидуальные свободы, но и ответственность перед обществом и окружающей средой. Благополучие коллектива не может быть поставлено под угрозу ради индивидуальной автономии. \n\n нажмите, чтобы продолжить..."
 Nationalist_France.4.a: "Захватывающе!"
 Nationalist_France.5.t: "Правительство Открывает Статую Марианны."
 Nationalist_France.5.d: "Под пристальным взглядом сотен зрителей в самом центре Парижа был открыт новый памятник Марианне, вечному символу Франции, изображающий ее во главе французских войск против русских.\n\nСтатуя высотой шесть метров, выполненная из традиционного французского камня известным скульптором, изображает Марианну, поднимающую флаг, ее взгляд непреклонен, ее позиция решительна, когда она обращена на восток.\n\nНа постаменте выгравированы слова: "Свобода никогда не отступает", декларация непоколебимой приверженности Франции своим ценностям. Этот памятник уже назвали одним из самых значительных произведений патриотического искусства в новейшей истории Франции, четким и продуманным заявлением о позиции нации в нынешней международной обстановке. Церемония открытия была отмечена торжественными гимнами военного оркестра, развевающимся на ветру Триколором и торжественной, но вызывающей атмосферой. Когда мероприятие достигло своего апогея, многие в толпе спонтанно запели национальный гимн, их голоса разнеслись по площади в момент коллективной гордости и решимости."
 Nationalist_France.5.a: "Хм, может быть, мы слишком поторопились бросить ее"
 Nationalist_France.6.t: "Оправдание Филиппа Петена"
 Nationalist_France.6.d: "После долгих лет дебатов и споров исторический указ наконец вступил в силу - маршал Филипп Петен официально оправдан.\n\nВклад Петена в развитие Франции неоспорим. Во время Первой мировой войны его исключительное военное руководство под Верденом спасло страну от катастрофы. В то время, когда немецкое наступление казалось неостановимым, именно непоколебимая решимость и стратегический блеск Петена удержали линию фронта. Эта героическая оборона принесла ему восхищение всей нации и высшую награду - звание маршала Франции.\n\nВ 1940 году, когда немецкий блицкриг разрушил французскую оборону, миллионы солдат попали в плен, а республике грозил полный крах. Петен принял на себя груз истории - он решил остаться во Франции, вести переговоры, а не бежать в изгнание, бороться за сохранение того, что можно было спасти, а не позволить нации погрузиться в полное уничтожение. В свои восемьдесят четыре года он мог бы спокойно уйти на покой, но в самый мрачный для Франции час он твердо стоял на своем, веря, что его дипломатическая стратегия сможет избавить Францию от тотальной оккупации и сохранить силы нации для ее окончательного освобождения.\n\nОднако послевоенный суд над ним был продиктован политической необходимостью. После войны Франции нужен был козел отпущения, чтобы очистить свою уязвленную гордость, и Петен стал таким символом. Этим указом мы не просто восстанавливаем честь старого солдата - мы углубляем нашу национальную память, признавая сложность и противоречивость нашего прошлого. По-настоящему сильная нация должна иметь мужество противостоять всем аспектам своей истории, в том числе тем, которые бросают вызов упрощенным представлениям о победе и поражении."
 Nationalist_France.6.a: "Человек, который дважды пытался спасти Францию"
 Nationalist_France.7.t: "Французский Израильтянин Привлекает Толпы Людей"
 Nationalist_France.7.d: "В районе Марэ находится синагога Агудас Хакехилос на улице Паве - центральный центр местной еврейской общины. После столетий политических потрясений новая волна неожиданных посетителей привнесла в этот спокойный район ощущение необычности.\n\nС позавчерашнего дня тысячи французских израилистов собираются в этом районе со всей Франции. Они проводят грандиозные собрания, собирая толпы местных жителей и туристов, которые останавливаются, чтобы послушать. Тем временем еврейские жители незаметно открывают окна, чтобы понаблюдать за импровизированными собраниями.\n\n Эти израилисты, возникшие из течений французского национализма, утверждают, что предки французов, династия Меровингов из Франкского королевства, являются прямыми наследниками десяти потерянных колен Израиля. Другими словами, они считают, что французы - наследники древнего еврейского народа, избранного Богом для создания величайшей империи и единоличного восстановления цивилизации после апокалипсиса, пользуясь исключительной благосклонностью Бога.\n\nХотя эти заявления могут показаться абсурдными для посторонних, израилисты, находящиеся под глубоким влиянием мистических обществ, таких как Приорат Сиона, твердо верят в уникальную судьбу французской нации. Интересно, что, несмотря на то, что парижская полиция уже несколько дней наблюдает за собранием, она не предприняла никаких действий, чтобы сдержать этих горячо верующих. Что касается зрителей, то трудно сказать, считают ли они прокламации израильтян смехотворными или начинают сомневаться в собственном скептицизме."
 Nationalist_France.7.a: "Может быть, мы и БЫЛИ Потерянным Племенем!"
 Nationalist_France.8.t: "Парад Национального Спасения"
 Nationalist_France.8.d: "С тех пор как правительство Национального спасения объявило о победе над гражданской войной в Париже, в ближайшие недели нередко можно было увидеть военные парады на улицах столицы. Однако неожиданно было замечено, что в последнее время наряду с флагом нового французского режима гражданские лица и даже военные полки были замечены под знаменами и флагами монархических домов, которые исторически правили Францией. Это было довольно неожиданно для высшего командования, хотя в последних новостях монархические настроения по всей стране неуклонно растут, поскольку становится все более очевидным, что монархизм возвращается по всей Франции."
 Nationalist_France.8.a: "Где моя корона?"
 Nationalist_France.9.t: "Парады Франсуа Лекультр в Париже"
 Nationalist_France.9.d: "Франсуа Лекультр, которого некоторые считают спасителем Франции, редко появлялся на публике в столице в момент начала очередного парада. Появление Лекультра привело жителей Парижа в очередной патриотический восторг, как будто Франция снова воссоединилась. Парад проходил через несколько исторических достопримечательностей Парижа, а затем остановился у башни Эффил, где должна была состояться официальная церемония открытия, и Франсуа перерезал ленточку. Собравшаяся толпа патриотически настроенных граждан ликовала, когда ленточка была перерезана, и публика вновь получила доступ к любимой достопримечательности."
 Nationalist_France.9.a: "Троекратное ура за Лекультра!"
 Nationalist_France.38.t: "По Испанскому Вопросу"
 Nationalist_France.38.d: ""
 Nationalist_France.38.a: "Нам нужны союзники, а не подданные"
 Nationalist_France.38.b: "Испанцам нельзя доверять самостоятельное управление"
 Nationalist_France.13.t: "Франко-Итальянский Саммит"
 Nationalist_France.13.d: "Французский посол шел по Виа дель Плебисцито к Палаццо Венеция. Это было здание, в котором Бенито Муссолини произносил свои речи, а новое правительство Италии решило сделать его местом встречи иностранных высокопоставленных лиц, это было древнее и величественное здание. Подойдя поближе, посол взглянул на знаменитый балкон, и в его сердце зашевелились удивление и страх: с балкона свисали древние флаги врагов его дедов. Не хватало только некоего лысого диктатора, чтобы сделать это зрелище невиданным за последние 80 лет. Сегодня посол прибыл в Палаццо Венеция, чтобы выразить намерение Парижа устроить саммит для франко-итальянских отношений. Когда он вошел в интерьер старинного здания, его взгляд остановился на итальянской делегации, посланной принять его. Они прошли через залы в комнату для переговоров, где должны были быть определены детали встречи, это был теплый прием, итальянская делегация приготовила тарелку сыра Пармиджано и вино Тоскано Кьянти, чтобы присутствующие могли насладиться ими во время обсуждения. После некоторых обсуждений и переговоров было решено провести встречу на нейтральной территории, в небольшом княжестве Монако, блестящем маленьком городе-казино, отеле для богатых, игровой площадке для бизнесменов. Идеальное место, чтобы заложить основу для будущих цветущих отношений."
 Nationalist_France.13.a: "Мы встретимся в Монако."
 Nationalist_France.131.t: "Франко-итальянский саммит в Монако"
 Nationalist_France.131.d: ""
 Nationalist_France.131.a: "Мы будем там."
 Nationalist_France.132.t: "Выход Гладиаторов"
 Nationalist_France.132.d: "В день встречи Монако разрешило французским и итальянским войскам пройти по городу. Княжество решило, что это станет хорошим поводом для фанфар и развлечений - не каждый день можно увидеть военный парад, нарушающий великолепие Монако. Обе страны выбрали по полку и надели парадные мундиры. Этот день был важным для обеих стран, и парад был не менее важен, чем сами переговоры. Французские делегаты наблюдали из соседнего отеля, как итальянский строй приближается к конечной точке. Сравнивая их с собственными войсками, некоторые из них насмехались, некоторые одобрительно кивали, можно представить, что итальянская делегация напротив делала то же самое.\n\nКогда войска Италии остановились, делегация на некоторое время замолчала, раздались вежливые аплодисменты и одобрительные возгласы зрителей, когда войска двух стран впервые за долгое время стояли бок о бок, их флаги были разными, но их люди и униформа говорили больше о том, что они похожи, чем о том, что они разные. Мнение французской делегации было неоднозначным, но в конце концов французский посол повернулся к своим делегатам и обратился к ним с одной фразой, означающей поведение, с которым они вскоре будут обращаться к итальянской делегации."
 Nationalist_France.132.a: "Церемония, подобающая римлянам!"
 Nationalist_France.132.b: "Итальянцы непригодны для правления!"
 Nationalist_France.133.t: "Успех на Саммите в Монако"
 Nationalist_France.133.d: "Французский и итальянский послы пожали друг другу руки перед своими флагами, прежде чем сесть за стол. Обе делегации смотрели друг на друга с нейтральными и настороженными выражениями, фанфары и любезности уже надоели, еда закончилась, вино иссякло. Предстояло заняться делом, в течение нескольких часов они говорили о сферах влияния, о господстве в Средиземноморье, итальянцы особенно гордились своим флотом и заявляли о своем твердом намерении стать величайшей военно-морской державой в Средиземноморье, Франция избегала темы Ниццы и Корсики, когда бы она ни поднималась, конференция мастерски избегала вопросов, Два националистических правительства смогли прийти к соглашению, их первые совместные усилия на мировой арене, которые свяжут их как братьев по оружию, Бернская инициатива была разработана, границы установлены, а распад Швейцарии был задуман за закрытыми дверями двумя нациями в роскошных объятиях отеля в Монако. Обнявшись, как братья, послы быстро покинули Монако, чтобы сообщить новость своим лидерам."
 Nationalist_France.133.a: "Братья навек!"
 Nationalist_France.134.t: "Провал Саммита в Монако"
 Nationalist_France.134.d: "Французский и итальянский послы пожали друг другу руки перед своими флагами, прежде чем сесть за стол. Обе делегации смотрели друг на друга с нейтральными и настороженными выражениями, фанфары и любезности уже надоели, еда закончилась, вино иссякло. Нужно было заняться делом, несколько часов они говорили о сферах влияния, о господстве в Средиземноморье, итальянцы особенно гордились своим флотом и заявили о своем твердом намерении стать величайшей морской державой в Средиземноморье, французский делегат рассмеялся, и это вызвало жаркий спор между обеими сторонами, итальянская делегация разгорелась территориальным реваншизмом, по мере того как напряжение закипало, начали выдвигаться требования на Савойю, Ниццу и Корсику, Французская делегация, не имея собственных претензий, просто принижала их мощь ответными комментариями о размерах и дисциплине их армий. Встреча закончилась внезапно, когда драка между двумя делегатами едва не привела к погрому в зале, в зал ворвалась служба общественной безопасности Монако и прервала встречу, разогнав обе стороны и объединившись с Компанией карабинеров князя, чтобы сопроводить делегации обеих стран обратно в аэропорт."
 Nationalist_France.134.a: "Давайте обратимся к испанцам"
 Nationalist_France.135.t: "Бернская Инициатива Активирована"
 Nationalist_France.135.d: "Как и было задумано на саммите в Монако, Бернская инициатива должна была разделить Швейцарию на этнические части между немецким, итальянским и французским народами и присоединить их к своим правительствам. Эта инициатива стала бы первой совместной военной акцией Стального пакта. Швейцария уже давно прошла золотую эру оборонительных укреплений и оказалась в полном окружении недружественных государств, стремящихся к ее гибели. Правительство в Берне, скорее всего, падет. По мере того как вдоль границы будут формироваться подразделения Wehr, Esercito и Armee, никакие горные крепости и навесные мосты не смогут остановить то, что неизбежно надвигается."
 Nationalist_France.135.a: "Мы отвоюем Гельветику!" 
 Nationalist_France.136.t: "Дипломатические Отношения с Италией Разорваны"
 Nationalist_France.136.d: "Итальянский посол сообщил сегодня французскому государственному департаменту, что он передает нам свое последнее послание в качестве посла Италии: "Уберите своего посла из Рима в ближайшие 48 часов."\n\nДать нам так мало времени для ответа - это очень враждебное действие, предательство, ожидаемое от итальянцев, когда их посол садится в самолет, направляющийся в Рим, в наше посольство в Риме было отправлено сообщение с приказом собрать вещи и вернуться домой в течение 48 часов в соответствии с приказом итальянского правительства. Несколько транспортных самолетов под эскортом были направлены в Рим, немецкий посол вызвал нас в Берлин, чтобы узнать, что происходит. Похоже, что недолгая надежда на то, что европейские националисты смогут мирно объединиться против большевистской угрозы, была разрушена раньше времени, и правительства в Риме, Берлине, Париже и Мадриде в панике размышляют о том, каким должно быть будущее Европы.\n\nБернская инициатива, которая должна была стать совместной работой Италии и Франции, теперь отпала. Разделение Швейцарии подождет, пока мы создадим новую инициативу, направленную против нового враждебного правительства Италии, - Пьемонтскую инициативу. Возможно, настало время расширить горизонты того, какой должна быть Франция, Париж должен быть не только столицей Франции, но и столицей латинян? Если Наполеон может быть императором римлян, то мы, конечно, можем повторить этот титул, если итальянцы не будут работать с нами рука об руку. Отправьте план в Генеральный штаб. У нас есть для них новые приказы."
 Nationalist_France.136.a: "Начинайте Пьемонтскую инициативу."
 Nationalist_France.137.t: "Italians Reach Out"
 Nationalist_France.137.d: ""
 Nationalist_France.137.a: "France worries me."
 Nationalist_France.137.b: "France are our allies!"
 Nationalist_France.14.t: "France demands Mediterranean Holdings"
 Nationalist_France.14.d: ""
 Nationalist_France.14.a: "FUCK your demands"
 Nationalist_France.14.b: "We cannot stand against them..."
 Nationalist_France.15.t: "France demands Annexation"
 Nationalist_France.15.d: ""
 Nationalist_France.15.a: "FUCK your demands"
 Nationalist_France.15.b: "We cannot stand against them..."
 Nationalist_France.20.t: "Закон о восстановлении Шато"
 Nationalist_France.20.d: "Его Величество Луи Альфонс де Бурбон объявил, что для восстановления национальной и божественной славы французской аристократии он выделит часть королевского бюджета на благоустройство и реконструкцию замков по всей стране в рамках закона о восстановлении замков. Это будет встречено с неприятием, поскольку подданные всей страны в настоящее время предпочли бы, чтобы их деньги, заработанные тяжким трудом, не тратились на аристократию. Но кого это волнует?"
 Nationalist_France.20.a: "Я имею в виду, что они действительно находятся в беспорядке..."
 Nationalist_France.21.t: "[FAF.GetLeader] объявляет о налоговых льготах для владельцев Шато"
 Nationalist_France.21.d: "В связи с финансовым напряжением, которое испытывает дворянство из-за закона о восстановлении замков, король Луи Альфонс де Бурбон мастерски ввел массовые налоговые льготы для владельцев зданий, которые классифицируются как замки. Хотя это и повлияет на доходы, получаемые от замков, аристократия оказалась слишком важной опорой, чтобы отказать им в заслуженных льготах."
 Nationalist_France.21.a: "Они тоже этого заслуживают!"
 Nationalist_France.22.t: "Роскошная вечеринка, устроенная в Версале"
 Nationalist_France.22.d: "После завершения небольшой реконструкции в историческом Версальском дворце Анри де Кастри, генеральный директор в отставке и внук бывшего министра обороны графа Пьера де Шевинье, арендовал весь дворец у французского правительства для проведения одного из крупнейших бальных танцев за последние столетия, на котором присутствовали сотни богатых гостей.\n\nПо слухам, в список приглашенных входят высокопоставленные военные Франции, все три претендента на французский престол, сбежавшие американские суперзвезды, бывшие российские олигархи и даже король Карл III."
 Nationalist_France.22.a: "Это их право!"
 Nationalist_France.22.b: "Нам всем следует затянуть пояса потуже..."
 Nationalist_France.23.t: "Пьер-Луи де Ларошфуко требует восстановления дворянских привилегий"
 Nationalist_France.23.d: "Неожиданный шаг со стороны человека, которого многие считали самодовольным представителем высшего класса, Пьера-Луи де Ларошфуко собрал более 600 подписей бывших французских дворянских семей с требованием восстановления королевских титулов. Эти титулы, дарованные им французскими монархами древности, либо исчезли за столетия правления недружественных правительств, либо находятся в таком убожестве, что больше ничего не значат."
 Nationalist_France.23.a: "Это целые истории, о которых мы говорим!"
 Nationalist_France.23.b: "Будьте счастливы тем, что у вас есть..."
 Nationalist_France.24.t: "Появляются претенденты на королевскую власть"
 Nationalist_France.24.d: "С тех пор как король Людовик Альфонс де Бурбон восстановил дворянские титулы нескольких исторических и известных королевских домов по всей стране, были случаи, когда люди злоупотребляли этим восстановлением в своих личных целях. В частности, предполагаемые главы Орлеанского дома и дома Бонапартов обратились к королю с просьбой исправить ошибки прошлого века, связанные с республиканским правлением во Франции. Однако оба они отказываются отказаться от своих претензий на королевский пурпур Франции, что вызывает напряженные политические отношения между королевскими домами."
 Nationalist_France.24.a: "Нам не нужны вы трое!"
 Nationalist_France.241.t: "Мнения о Министре Внутренних Дел Разделились"
 Nationalist_France.241.d: "Хотя мы полностью контролируем ситуацию, в относительно новом правительстве не хватает опытных министров, что и привело к нынешней ситуации. \n\nНаш выбор - Шарль Бонапарт и Лоран Марканжели. Бонапарт, к сожалению, пожизненный либерал, но, несмотря на фамилию Наполеон, он поклялся в верности королю Людовику и отказался от своей родословной. Марканжели, однако, является выбором большинства дворян благодаря своей способности организовывать промонархические группы во время президентства Вилье, но он заядлый бонапартист и до сих пор не склонился перед нашим королем Людовиком."
 Nationalist_France.241.a: "Шарль Бонапарт"
 Nationalist_France.241.b: "Лоран Марканжели"
 Nationalist_France.241.c: "Королева Мария!"
 Nationalist_France.25.t: "Дворяне выступают в поддержку Жана Орлеанского"
 Nationalist_France.25.d: ""Я стою перед вами сегодня, чтобы заявить о моей непоколебимой поддержке Жана д'Орлеана, который взойдет на престол в качестве нашего законного короля. Его родословная, как члена Дома Орлеанцев, в сочетании с его замечательным интеллектом, непоколебимой преданностью нашему народу, и его искреннее сострадание к людям, сделать его идеальным кандидатом, чтобы вести нас в эти бурные времена. Жан обладает харизмой и мудростью, необходимыми для восстановления стабильности и объединения нашей раздробленной страны. Его видение более эгалитарного общества, где права и благополучиеКаждый гражданин пользуется поддержкой и резонирует со мной и многими другими, кто жаждет справедливой и процветающей Франции.\nВ эпоху, омраченную политической борьбой и разочарованием, Жан д'Орлеан предлагает маяк надежды. Его прогрессивные идеи и приверженность реформированию устаревших систем способны открыть новую эру процветания и социальной гармонии. Кроме того, его дипломатический опыт и обширные знания в области международных отношений дают ему навыки, необходимые для управления сложной сетью геополитики. Приняв Жана в качестве нашего короля, мы не только чтим наше историческое наследие, но и принимаем будущее, в котором могут процветать справедливость, сострадание и прогресс. Давайте объединимся, оставим в стороне наши разногласия и сплотимся вокруг Жана д'Орлеана на пути к светлому будущему для Франции и всех ее граждан.""
 Nationalist_France.25.a: "Звучишь как либерал."
 Nationalist_France.26.t: "Выяснилось, что Дворянин был частью подпольного республиканского движения"
 Nationalist_France.26.d: "Один из наших дворян, которого мы считали близким другом и сторонником монархии Бурбонов, оказался не только предателем, но и пособником подпольного республиканского движения, желающего свергнуть нашу любимую монархию. К счастью, его секретарь, верный и патриотичный подданный короны, доложил о своих находках соответствующим органам, и нам удалось схватить его в начале дня. Теперь нам предстоит решить, наказать предателя или проявить милосердие... И то, и другое будет иметь последствия и продемонстрирует народу Франции наше отношение к предательству."
 Nationalist_France.26.a: "Повесьте его на всеобщее обозрение!"
 Nationalist_France.26.b: "Каждый имеет право на свое собственное мнение."
 Nationalist_France.27.t: "Выяснилось, что Дворянин стоит за чередой убийств"
 Nationalist_France.27.d: "Современный Жиль де Ре?"
 Nationalist_France.27.a: "Ужасно... просто ужасно. Король Луи Альфонс де Бурбон и его двор неустанно работали круглые сутки, чтобы восстановить отношения между монархией и подданными, а тут такое сообщение. Власти сочли это одним из самых тревожных убийств со времен Жиля де Раиса, и у нас есть возможность изгладить это пятно на нашем дворянстве... Хотя следует отметить, что именно этот дворянин финансировал значительную часть нашего королевства с момента его создания."
 Nationalist_France.27.b: "Отвратительное пятно на знати"
 Nationalist_France.28.t: "Провинция Дофине присуждена Людовику, Дофину Франции"
 Nationalist_France.28.d: "Провинция Дофине недавно была передана по приказу короля Людовика Альфонса де Бурбона его наследнику Людовику XXI. Это событие было отмечено прессой и другими дворянами Франции, которые поддержали назначение молодого монарха правителем Дофине как первый шаг в его воспитании для присвоения титула короля. В качестве первого плана действий молодой наследник планирует отправиться в паломничество по провинции, чтобы изучить ее историю и подданных."
 Nationalist_France.28.a: "Слава Людовику XXI!"
 Nationalist_France.29.t: "Дворянин был пойман в сети Педофилов"
 Nationalist_France.29.d: "В адрес одного из вельмож нашего двора было выдвинуто совершенно отвратительное и гнусное обвинение. Утверждается, что его видели во время тайного расследования педофильской сети, которое проводили власти. Новости не распространились за пределы расследования, и нам предстоит принять важное решение: зарываться ли нам еще глубже в кроличью нору или разобраться с этим делом сейчас и покончить с ним?"
 Nationalist_France.29.a: "Ну все! Надо начать расследование на всех дворян!"
 Nationalist_France.29.b: "5 лет, надо замять дело..."
 Nationalist_France.30.t: "Создание Французского королевства"
 Nationalist_France.30.d: "Совершив шокирующий шаг, молодой диктатор Франции Джордан Барделла объявил о новом шаге в своем плане доминирования в Латинском Мире - создании "Королевства французов". В отличие от своего исторического аналога, Королевства Франция, Барделла объявил, что Королевство французов - это небольшое государство, участвующее в создании более крупной Латинской империи, над созданием которой активно работает его партия. \n\nС созданием Королевства король должен выступить вперед, чтобы быть коронованным в качестве лидера нации. Кандидаты, обладающие наибольшим влиянием, представлены Имперским союзом, выступающим за восстановление дома Бонапартов, Латинским блоком, выступающим за королевскую коронацию Джордана Барделлы, и партией "Идентичность Европы", выступающей за коронацию Рено Камю, автора теории "Великого замещения"."
 Nationalist_France.30.a: "Латинский блок одерживает верх."
 Nationalist_France.30.b: "Имперское собрание выигрывает свою борьбу за власть."
 Nationalist_France.30.c: "Идентичность Европы достается их мужчине."
 Nationalist_France.31.t: "Объединение Латинских Королевств"
 Nationalist_France.31.d: "Цезарь, Август, Карл Великий, Людовик XIV и Наполеон. Все они - великие легенды, завоеватели и часть великого латинского народа. На протяжении всей истории человечества латинский народ был вершиной человечества, начиная с колыбели цивилизации и заканчивая великими империями, такими как Рим, Каролинги и современные французы. Слишком долго латинский народ был растоптан, начиная с трусливых бюрократов, которые поддерживали замену нашего народа, и заканчивая иностранной элитой, которая финансировала осквернение нашей культуры.\n\nОбъединение латинских народов - это не просто политическая амбиция, а наша естественная судьба. После поражения в войне с азиатской коммунистической ордой Франция и вся Европа выглядели безнадежно, но, как и в Туре, когда великий латинский народ победил арабских захватчиков, мы восстанем из пепла. Ибо латинский народ не может быть уничтожен, несмотря на предательство либеральной элиты и эксплуатацию со стороны англо-американских держав.\n\nПод руководством нашего великого правителя Джордана Барделлы латинский народ восстал из руин упадка и, вдохновленный величием нашего народа и общей историей, объединился под одним флагом на землях наших предков, снова стал единым народом. Эта великая новая империя возродит пламя, зажженное Римом, и, несмотря на трагическое падение Рима, это новое государство будет существовать веками.\n\nФакелы латинского народа зажжены по всему Средиземноморью, на этот раз навсегда.\n\nTu regere imperio populos, Romane, memento; hae tibi erunt artes; pacisque imponere morem, parcere subiectis, et debellare superbos."
 Nationalist_France.31.a: "Хайль!"
 Nationalist_France.32.t: "Паданские сепаратисты выступают в полную силу"
 Nationalist_France.32.d: "В протестах по всей Северной Италии, граждане массово выступали за создание североитальянского национального государства-государства, названного 'Королевство Падания' но, предположительно, их было немного."
 Nationalist_France.32.a: "Как вы можете называть себя фашистами!"
 Nationalist_France.32.b: "Все мы братья!"
 Nationalist_France.320.t: "Паданский Отпор"
 Nationalist_France.320.d: "Паданские революционеры к востоку от нас, на севере Италии, - это народ, который боролся и заслужил полное право на независимость. Они борются за свои средства, за свой народ, за свою культурную самобытность. Кто мы такие, чтобы не согласиться с этим?\n\nС нашей стороны было бы лицемерием не защитить и не взять под свое крыло людей, которые борются за свою идентичность и суверенитет, это то, что мы были вынуждены делать и бороться за это в тени в течение многих лет, так же как и они сейчас. Мы поддержим их движение, заставим Италию "пересмотреть" свое решение не уважать паданский народ."
 Nationalist_France.320.a: "Они заслуживают свободы!"
 Nationalist_France.328.t: "Родина латинян, Кем ты будешь?"
 Nationalist_France.328.d: "Италия боролась за объединение в 1860-х годах, она не была нацией в течение двухсот лет, и теперь под нашим контролем она попала к сепаратистам, которых мы финансировали. Они снова на милости у иностранцев, жаль видеть, как народ опускается так низко, что миллионы радуются его собственному падению. Падания была создана для удобства, чтобы дать нам повод войти в Италию и захватить ее, но нельзя сбрасывать со счетов роль бонапартизма в объединении Италии. Италия была всего лишь маленькой Сардинией и Пьемонтом, а с помощью Наполеона III Италия оказалась под властью Савойи, не стоит ли забыть, что эта обширная страна была нашей основательницей? Действительно ли для нашего будущего будет лучше, если Италия останется раздробленной на управляемые части? Или мы должны возродить наших братьев и укрепить их, как это было в прошлом? Поднять Италию, чтобы она снова стала великой нацией среди великих наций, пусть и под парижским руководством и бонапартистской опекой."
 Nationalist_France.328.a: "Братство!"
 Nationalist_France.328.b: "Нет, мы слишком разные"
 Nationalist_France.33.t: "Французские войска усиливают паданских сепаратистов"
 Nationalist_France.33.d: "К нам в Рим поступили тревожные сообщения о том, что французская армия была замечена в активном сотрудничестве с паданским сепаратистским движением. Такие действия для нас совершенно непростительны: считать своих союзников менее достойными, чем повстанческая группа, которая в какой-то мере совпадает с их идеалами?! Нелепость!"
 Nationalist_France.33.a: "Возмутительно! Готовьте наши боевые планы!"
 Nationalist_France.34.t: "Джанлука Ианноне застрелен в Итальянской Вилле"
 Nationalist_France.34.d: "Более двух десятилетий Джанлука Ианноне предупреждал Европу о грядущих событиях и о необходимости готовиться к надвигающемуся красному приливу. Этот второй Дуче Италии, вечный лидер CasaPound, день и ночь трудился ради улучшения положения своих европейских сородичей и латинских братьев. Он представлял себе сильную и единую Европу, связанную кровью и идеологией. Такие мудрые и монументальные провидцы, как Ианноне, появляются лишь раз в несколько столетий.\n\nКак и многие другие исторические пророки, он покинул нас слишком рано, слишком рано. Его забрали предатели, живущие среди нас! Убит этими богомерзкими коммунистами и глобалистами, которые находятся в глубокой постели с русской угрозой! Они ошибаются, если думают, что смогут сломить наш дух и уничтожить наше дело". Убийство Ианноне - это только начало вмешательства большевиков в политику Италии, поэтому Италия должна ужесточить свои отношения с европейскими братьями. Они могут убить человека, но не его идеалы, и принципы Ианноне будут приняты к сердцу во всей Европе. Сегодня на нашей земле пролилась кровь европейцев, но завтра за их злодеяния будут расплачиваться их земля, их кровь и их народ!"
 Nationalist_France.34.a: "Визионер Помер..." #бывает ёбен рот
 Nationalist_France.35.t: "Крах авторитета CasaPound"
 Nationalist_France.35.d: "Очевидно, что ситуация на итальянском полуострове вышла далеко за рамки наших первоначальных ожиданий. После убийства Ианноне местный национальный совет фашистов погрузился в хаос, не сумев избрать способного и влиятельного преемника. Различные группировки и местные силы воспользовались вакуумом власти, образовавшимся после гибели Ианноне, и начали борьбу за контроль над ситуацией, что привело к еще большему расслоению.\n\nВ то же время беспорядки продолжали усиливаться, а социальный порядок практически исчез. Французские войска, которые мы ранее направили для поддержки Паданского королевства, в итоге были вынуждены оккупировать Рим и установить протекторат, чье влияние распространяется только на столицу и прилегающие к ней регионы. Хотя этот шаг временно стабилизировал Рим, его влияние крайне ограничено, и он не способен повлиять на более обширные территории.\n\nПосле последовательной потери двух ключевых стратегических территорий - Северной Италии и Рима - остатки Итальянской социальной республики под командованием Джанкарло Чито были вынуждены отступить на юг. Там они надеялись перегруппироваться, но оказались в тяжелейшем положении: совместные уличные блокады, созданные коммунистическими мафиями и криминальными семьями, стояли как железные стены, резко ограничивая их оперативное пространство. В таких тяжелых условиях им едва удается удерживать контроль над горсткой городов, что делает их перспективы мрачными, а будущее - неопределенным."
 Nationalist_France.35.a: "Гибель Италии"
 Nationalist_France.350.t: "Франция Требует от Италии Дипломатической Изоляции"
 Nationalist_France.350.d: ""
 Nationalist_France.350.a: "У нас есть своя цена"
 Nationalist_France.350.b: "Никогда!"
 Nationalist_France.351.t: "Немцы Оставляют Италию"
 Nationalist_France.351.d: "Сегодня посол Германии выступил в Госдепартаменте, дав нам зеленый свет на вторжение в Италию. Немцы предостерегали от вторжения, заявляя, что такое вторжение может открыть Европу для дальнейшего советского вторжения, но они не видели наших планов. Это не будет новая полуостровная кампания, это будет быстрая победа над более слабым братом". С зеленым светом, ярко сияющим над нашими армиями, мы можем начать кампанию по захвату Рима. Механизированные войска оглядываются на Альпы, как Наполеон на лошади 200 лет назад. Наши амфибийные силы стремятся к ярким белым пескам Сардинии."
 Nationalist_France.351.a: "Наши планы сбываются"
 Nationalist_France.352.t: "Германия Поддерживает Итальянцев"
 Nationalist_France.352.d: "Вероломные ублюдки встали на сторону итальянцев. Вероятно, из ностальгии по прошлой мировой войне они решили, что Рим лучше умиротворить, чем Париж. Немцам стоит вспомнить, насколько слабыми они стали за последнее столетие, мы, французы, одержим победу, даже если сегодня нам придется отступить. Франции суждено контролировать всех латинян, независимо от того, согласятся с этим немцы или нет! Мы - самая сильная латинская нация, мы стремимся к процветанию и единству латинских народов, и немцы посмеют помешать этому!"
 Nationalist_France.352.a: "Ладно! Мы найдем другие способы вернуть Рим..."
 Nationalist_France.36.t: "Испанская Монархия Прибывает в Бордо"
 Nationalist_France.36.d: "TODO SPanish monarchy shows up"
 Nationalist_France.36.a: "Испания скоро стабилизируется"
 Nationalist_France.37.t: "Судьба Испании"
 Nationalist_France.37.d: "Испания - страна, чья история тесно переплетена с нашей. От битвы при Рокруа в эпоху Бурбонов до полуостровной войны Наполеона - мы бесчисленное количество раз вступали в схватки с испанцами, сцепившись в крови и огне. На протяжении веков обиды и конфликты между нашими странами были неразрывной нитью, вплетенной в ткань наших судеб. Однако некогда могущественная империя, над которой никогда не заходило солнце, отправлявшая флоты к Семи морям и имевшая на вооружении грозные испанские терции, которые крепко стояли на поле боя, теперь рухнула в братоубийственной вражде.\n\nПохоже, что судьба Испании незаметно перешла в наши руки, и перед нами встает вопрос: как изменить будущее этой расколотой земли? Как нам изменить ее будущее?"
 Nationalist_France.37.a: "Поддержать франко-каталонский гарнизон"
 Nationalist_France.37.b: "Учредить французскую провинцию Каталония"
 Nationalist_France.37.c: "Испания должна быть умиротворена силой"
 Nationalist_France.39.t: "Судьба Португалии"
 Nationalist_France.39.d: "Португалия лежит прямо за нашими границами, наши войска стоят вдоль границы и смотрят на израненную полосу Иберии. У нас есть шанс войти и стабилизировать ситуацию, а если ситуация уже стабилизировалась, то изменить ее по своему вкусу. Все мы, французы, изучали в школе Пенинсулярную кампанию, ее трагический конец и ее последствия для наполеоновских кампаний. Мы знаем, что контроль над Португалией имеет первостепенное значение для прочной стабильности. Нам повезло, что Великобритания на этот раз не заинтересована в помощи Португалии. У нас есть несколько вариантов. Мы можем выдвинуть ультиматум, можем просто войти, поскольку мы готовы, или, если Лиссабон находится в руках кого-то, с кем мы можем работать, мы можем потребовать, чтобы они работали в соответствии с нами. Пелагиус и его христианские экстремисты должны дерадикализироваться, даже если они согласятся работать с нами, это не вписывается в Стальной пакт. Как это происходит сейчас."
 Nationalist_France.39.a: "Требовать Уступчивости"
 Nationalist_France.39.b: "Мы должны восстановить порядок"
 Nationalist_France.39.c: "Признание в дерадикализации"
 Nationalist_France.40.t: "Смерть или Бесчестье"
 Nationalist_France.40.d: "Не так давно красные орды с Востока пронеслись по нашей земле, убивая наших людей и разоряя наши дома. Земля до сих пор солена слезами наших любимых людей, а большевики грабили нашу страну, захватывая последние клочки того, что могли унести. Достаточно сказать, что наша ненависть к русским безмерна. Жажда мести пылает в сердце каждого гражданина.\n\nНо мы не слепы к разуму. Месть не должна затуманивать наши суждения, особенно в такие опасные времена, как сейчас.\n\nФранцузы призывают нас присоединиться к их так называемому Антисоветскому пакту - коалиции, призванной противостоять постоянно растущей коммунистической угрозе, надвигающейся на наш восток. Но присоединение к ним наверняка вызовет гнев русских - ярость, которую мы не готовы выдержать. Наша страна все еще восстанавливается, ее раны свежи, ее сила не проверена. Нам не хватает людей и промышленной мощи, чтобы вести войну против нового правителя Европы.\n\nФранцузы, конечно, обещали нам защиту. Они заверили нас в военной помощи и непоколебимой поддержке. После распада Соединенных Штатов только Франция стала сильнейшей военной державой НАТО. Даже после разрушительной русско-европейской войны их армия остается грозной силой, которую нельзя недооценивать.\n\nИтак, выбор, стоящий перед нами, столь же суров, сколь и жесток. Будем ли мы жить в страхе и унижении, скованные нашим поражением? Или будем идти навстречу смерти, не сломленные, с гордостью и славой?"
 Nationalist_France.41.a: "Присоединиться к Антисоветскому Пакту"
 Nationalist_France.41.b: "Отказаться от Французского Приглашения"
 Nationalist_France.42.t: "Первые Выборы Новой Республики"
 Nationalist_France.42.d: "После объявления Вильерсом результатов Первых выборов не знает никто из наблюдателей. В выборах участвуют три партии, и все они в основном одинаково популярны среди французского народа.\n\nРеспубликанцы, предшественники в сознании большинства людей, представляет собой движение, почти идентичное Национальному объединению, которое было до него, - консервативное движение, стремящееся вернуть традиционные ценности Франции, сохраняя при этом демократическую систему и баланс сил.\n\nНаряду с ним существует Демократическое движение, центристская партия, существующая со времен падения Франции до советской власти. Выдвигая себя в качестве разумного и здравого варианта, она придерживается гораздо более центристских и либеральных взглядов, чем любая из партий, с которыми она конкурирует.\n\nИ наконец, Национальный консервативный союз - странная солянка из консервативных и военных ценностей. Они позиционируют себя как гораздо более патриотичную консервативную партию, чем Республиканцы, считая себя истинным продолжением мечты Вилье и де Голля о традиционалистской, патриотичной Франции."
 Nationalist_France.42.a: "Республиканцы одерживают победу!"
 Nationalist_France.42.b: "Демократическое Движение одерживает победу!"
 Nationalist_France.42.c: "Национальный Союз Консерваторов одерживает победу!"
 Nationalist_France.45.t: "''Лафайет'' Уходит во Тьму"
 Nationalist_France.45.d: "Отважно защищая свою столицу, наш славный лидер Лафайет пропал со своего командного пункта после запланированной засады на русское командование, расположившееся у обломков Эйфелевой башни. Шлем Лафайета был найден в сгоревшей машине перед тем, как было объявлено полное отступление, и хотя с места засады было найдено несколько тел, нет никаких признаков того, кто является, а кто не является нашим великим командиром.\n\nНе найдя ни одного тела, подтверждающего его смерть, его адъютант генерал Никола Перович объявил на импровизированной сцене где-то в пригороде Парижа, что пока командующий не будет найден, он будет править вместо него, и в то же время призвал к самоубийственной и тотальной атаке на русские линии, чтобы отомстить за пропавшего командующего."
 Nationalist_France.45.a: "Он сражается в каждом солдате."
 Nationalist_France.46.t: "Разграбление Антифранцузских Предприятий"
 Nationalist_France.46.d: "Ненависть к себе - одна из самых мерзких ценностей не только человека, но и страны. В течение многих лет в современную эпоху это было нормализовано: не только посторонние ненавидели Францию, но и ее собственный народ. Теперь, когда наш режим вступает в полную силу, народ решил, что больше не будет этого терпеть, поскольку поступают многочисленные сообщения о разграблении, сожжении и т. д. антифранцузских зданий. Франция будет патриотичной, и тем, кто не может с этим смириться, не место в нашей великой стране."
 Nationalist_France.46.a: "Это то, чего они заслуживают."
 Nationalist_France.47.t: "Выход ''Destruction de l'âme de l'Europe''"
 Nationalist_France.47.d: "Фильм "Destruction de l'âme de l'Europe" будет назван величайшей исторической эпопеей французского кино и продемонстрирован всему миру как триумф наших кинематографических возможностей. На показ "Destruction de l'âme de l'Europe" в течение нескольких недель были распроданы все билеты, и наши патриоты толпами приходили посмотреть на историческую эпопею о том, как наш режим спас Францию мечом. Даже за границей фильм получил признание: его показывают в Германии, Италии и даже в Великобритании, где по аналогичным сообщениям кинотеатры были распроданы, чтобы увидеть славу нашей нации, запечатленную на камеру."
 Nationalist_France.47.a: "Это... прекрасно..."
 Nationalist_France.48.t: "Меценатство Современного Искусства"
 Nationalist_France.48.d: "Наш справедливый и заботливый монарх, король Луи Альфонс де Бурбон, выделил часть королевского бюджета на создание художественного произведения, чтобы проиллюстрировать покровительство нашего короля искусству Франции. Самое сложное - решить, на что потратить бюджет, ведь у нас уже было много предложений от Королевского совета по современному искусству, в основном два были выбраны как наиболее популярные варианты. Во-первых, это промонархическая социальная медиа-платформа Couronne, фильм о короле Луи Альфонсе де Бурбоне, его подвигах и восхождении к славе. Во-вторых, у нас есть XX, промонархический социальный сайт для подданных Франции, где они могут выразить свою любовь к нашему любимому монарху. Мы подготовили предложения и отправили их королю Луи Альфонсу де Бурбону, ожидая его одобрения одного из проектов."
 Nationalist_France.48.a: "Фильм о нашем короле и его деяниях?"
 Nationalist_France.48.b: "Место для встречи преданных подданных онлайн!"
 Nationalist_France.49.t: "Выход XX"
 Nationalist_France.49.d: "XX станет одним из величайших фильмов не только в истории французского кино, но и всего мира. Наша тщательно отобранная съемочная группа мастерски отобразила события и преддверие Первой европейской войны, а также то, как наш монарх спас нацию Франции в самый темный час. Самым удивительным был точный подбор актеров: генералы, политики и даже сам король Луи Альфонс де Бурбон отметили, что их киношные двойники удивительно похожи на них самих. После окончания показа король встретился с режиссером и съемочной группой и поблагодарил их за этот исторический фильм."
 Nationalist_France.49.a: "Шедевр Кинематографа!"
 Nationalist_France.50.t: "Выход XX"
 Nationalist_France.50.d: "Это было ужасно. XX уже запланирован к немедленной отправке на DVD, не продержавшись и недели после показа по всей Франции. Съемки велись бесхозяйственно, несколько членов съемочной группы были сняты и заменены из-за некомпетентности, и даже режиссеры менялись четыре раза по приказу нашего монарха. Кастинг был ужасным, короля играл человек, который даже близко не походил на нашего монарха, что настолько возмутило Луи Альфонса де Бурбона, что он покинул показ, даже не досмотрев первую сцену."
 Nationalist_France.50.a: "Кто одобрил это дерьмо?"
 Nationalist_France.51.t: "Запуск ''Couronne''"
 Nationalist_France.51.d: "О, Куронна, с чего бы начать... Создание платформы для обмена социальными сообщениями было божественным: лучшие технологические разработчики страны вручную довели сайт до совершенства. Если бы Куронна была статуей, мы бы поставили ее в Лувре вместе с великими людьми нашей страны. Сайт был запущен сегодня, и сотни тысяч верных подданных подписались на него, чтобы выразить свою поддержку нашему любимому монарху. Серверы едва держались на плаву, когда сам король Луи Альфонс де Бурбон отправил свою первую Куронну, которую тут же поддержал почти весь сайт. Эта платформа войдет в учебники истории как еще один успешный проект нашего заботливого монарха."
 Nationalist_France.51.a: "Монархисты Интервеба соединяйтесь!"
 Nationalist_France.52.t: "Запуск ''Couronne''"
 Nationalist_France.52.d: "Ненавижу это гребаное дерьмо. Мы пытались сделать из Couronne инновационный и революционный сайт социальных сетей для подданных Франции, но через несколько минут после выхода платформы для обмена социальными сообщениями серверы подверглись рейдерскому захвату. Это было ужасно: антимонархические настроения наводнили каналы и ужасные боевые кадры европейской войны, в которых, как оказалось, участвовали в основном русские дегенераты. Мы были вынуждены отключить сайт всего через несколько часов работы из-за того, что наша команда модераторов не работала... Все эти доллары налогоплательщиков были потрачены впустую."
 Nationalist_France.52.a: "О, это же кровь... кровь французских солдат..."
 Nationalist_France.53.t: "Франция Требует Объединения Бурбонов"
 Nationalist_France.53.d: "TODO France Demands Bourbon Unification"
 Nationalist_France.53.a: "Никогда!"
 Nationalist_France.53.b: "Да здравствует король Луи II!"
 Nationalist_France.54.t: "Отчет об осаде Вердена Главный командный пункт и склад вооружений"
 Nationalist_France.54.d: "По состоянию на [?global.date.GetDateString] защитники Верденского главного командного центра, а также Верденского оружейного склада, отразили нашу атаку четыре раза. \nХотя эти запасы могут быть полезны, войска, находящиеся в кармане коррумпированной Республики, держатся стойко и, если они вырвутся наружу, будут угрожать нашему и без того непрочному удержанию Гранд-Эста. \nЯ разрешил использовать фугасные снаряды и скоординированный авиаудар, чтобы уничтожить оба комплекса. \n\nПодписано,"
 Nationalist_France.54.a: "[THIS.GetRank] [THIS.GetName]"
 Nationalist_France.55.t: "Отчет об осаде Вердена Главный командный пункт и склад вооружений"
 Nationalist_France.55.d: "По состоянию на [?global.date.GetDateString], осада Верденского главного командного центра, а также Верденского оружейного склада закончилась. \nЭти запасы, насчитывающие около 7,5 тысяч HK416 F и около 300 единиц командного оборудования, должны помочь нам в создании новых подразделений для отвоевания Франции из немытых рук Республики и коммунаров на юге. \nЯ разрешил солдатам по этому случаю отпраздновать победу порцией вина. \n\nПодписано,"
 Nationalist_France.55.a: "[THIS.GetRank] [THIS.GetName]"
 Nationalist_France.56.t: "Прибытие Добровольцев Патриотического Фронта"
 Nationalist_France.56.d: "Новость о нашей жестокой вспышке гражданской войны, как и Вторая американская гражданская война за несколько лет до этого, захватила мировую арену. В то время как наш праведный режим почти никто не поддерживает, мы все же получили известие... о друзьях из-за границы. Один из молодых офицеров, Лафайет, сообщил высшему командованию, что некоторые опытные "ветераны", с которыми он встречался много лет назад, воевали за границей за организацию "Патриотический фронт". Хотя нам нет никакого дела до варварства по ту сторону Атлантики, отказываться от такой возможности было бы глупо с нашей стороны."
 Nationalist_France.56.a: "Держите их на коротком поводке."
 Nationalist_France.57.t: "Поглощение Консервативных Солдат"
 Nationalist_France.57.d: "Консерватизм... идеология, которая была одной из составляющих великих проблем Франции. Несмотря на то, что они лучше коммунаров, желающих уничтожить Францию и все, за что мы выступаем, у нашего правительства есть возможность исправить ошибки Пятой республики и наконец-то провести серьезные изменения и реформы. Теперь решение находится в руках наших офицеров и командиров, и выбор за ними: стоять на страже наших ценностей или пойти на компромисс, чтобы мы сражались еще один день... Выбор за ними. "
 Nationalist_France.57.a: "Они олицетворяют французские ценности."
 Nationalist_France.57.b: "Они ничем не лучше коммунистов!"
 Nationalist_France.58.t: "Чума Социализма"
 Nationalist_France.58.d: "Ни один уголок Франции не застрахован от волны насилия, прокатившейся по всей стране. Наша некогда гордая нация была уничтожена руками грязных коммунаров по всему континенту, и теперь мы втянуты в очередную братскую войну против своих же соотечественников. В момент нашей слабости они не только разрушили все, что у нас было, но и хотят пойти дальше, подняв Францию под красное знамя своей фанатичной и мстительной идеологии-паразита. Мы начнем с того, что выкорчуем эту мерзкую чуму из наших соотечественников и будем продолжать до тех пор, пока раз и навсегда не выкорчуем ее из Европы. "
 Nationalist_France.58.a: "Мы должны искоренить их!"
 Nationalist_France.59.t: "Создание Бригад Детских Патриотов"
 Nationalist_France.59.d: "Дети всегда были острой темой на войне, но в условиях тяжелого положения на фронте и нехватки трудоспособного населения нам нужна любая помощь.\n\nЗачем тратить наши и без того истощающиеся ресурсы на образование? Когда вместо этого мы могли бы использовать их на фронте, чтобы помогать нашим войскам и выполнять вспомогательные и разведывательные функции. От них есть польза, ведь подростков почти можно считать трудоспособными. Стоит ли держать их в классе или использовать на фронте?"
 Nationalist_France.59.a: "Добро пожаловать, юные французы!"
 Nationalist_France.59.b: "Пока они не вырастут, пользы от них не будет"
 Nationalist_France.60.t: "Вовлечение Пожилых Людей"
 Nationalist_France.60.d: "С самого начала этой войны мы рассчитывали на быструю победу, но вместо этого столкнулись с катастрофическими потерями. С каждым днем трудоспособного населения становится все меньше и меньше. Нам нужна вся помощь на фронте, чтобы восполнить пробелы.\n\nМы можем вытащить пожилых людей из больниц и из отставки, они все еще могут быть использованы как пушечное мясо и на легких вспомогательных ролях. Если мы пообещаем покрыть все их медицинские расходы или увеличить пенсионное жалование после войны, они наверняка захотят подписаться, а если нет, мы можем просто заставить их пойти на фронт. Добавление бригад старейшин станет отличным отвлекающим маневром для врага, что позволит нам использовать те немногие трудоспособные силы, которые у нас есть, чтобы переломить ход войны."
 Nationalist_France.60.a: "Патриотизм не имеет возрастных ограничений!"
 Nationalist_France.60.b: "От них не будет никакого толку."
 Nationalist_France.61.t: "Штрафные Батальоны"
 Nationalist_France.61.d: "Ситуация на фронте продолжает ухудшаться, и нам нужна любая помощь, которую мы можем получить. По мере того как наши традиционные резервы рабочей силы становятся все меньше, мы вынуждены искать другие источники. В настоящее время тысячи отбросов общества гниют в наших тюрьмах, не делая ничего, кроме как истощая наши ресурсы и занимая лишнее место. Однако так быть не должно, даже из этих воров и убийц можно сделать патриотов. Мы начали программу предоставления свободы заключенным, готовым служить в армии, если они выживут. А если нам не хватит людей, мы можем просто заставить их. Они будут сражаться за свою страну и гордиться ею!"
 Nationalist_France.61.a: "Убийца? Дайте ему пистолет!"
 Nationalist_France.61.b: "Мы в отчаянии. Но не безрассудны."
 Nationalist_France.62.t: "Конец Света, Каким Мы Его Знаем"
 Nationalist_France.62.d: "Мы слишком долго сдерживали себя, пока смерть, разрушения и безумие войны все еще бушевали по всему континенту. Наши любимые достопримечательности и история оскверняются коммунарами уже вторую половину десятилетия, и нет никаких признаков прекращения их тотальной войны. Мы наблюдали, как наши братья падают и лишаются всех форм самобытности и культуры, которые они с гордостью сохраняли, вырвавшись из цепких объятий социализма, сковавшего их на десятилетия, только для того, чтобы снова оказаться в плену той же гниющей чумы. Францию постигла та же трагедия, что и всю остальную Европу: мы едва держались на ногах, отступая на родину с тем же чувством поражения.\n\n Теперь мы стоим перед неизбежным продолжением страшной европейской войны, причем тотальная война объявлена всеми воюющими сторонами. Мы не можем больше сдерживать себя; мы не можем добиться успеха, активно сдерживая себя и не используя все возможные преимущества. Со сменой администрации мы работаем с бывшими сотрудниками правительства, чтобы восстановить наш ядерный потенциал, готовясь к этому дню расплаты. Историки будут смотреть на наше решение не с лучшей стороны, но они никогда не поймут, в какой тяжелой ситуации мы оказались сегодня. Мы добьемся успеха любой ценой и не оглянемся назад, пока не победим."
 Nationalist_France.62.a: "И я чувствую себя хорошо."
 Nationalist_France.63.t: "Сопротивление"
 Nationalist_France.63.d: "Горстка предателей, пренебрегающих нашими национальными интересами, недавно подстрекала к беспорядкам на улицах Лиона, Марселя и Тулузы... дошло даже до подлых покушений на наших верных государственных служащих. На высокопоставленного чиновника из 7-го округа Парижа было совершено жестокое нападение по дороге домой; правительственный офис в Страсбурге был подожжен.\n\nЭти так называемые "борцы сопротивления", называющие себя "защитниками Республики", на самом деле являются агентами хаоса и раскола. Они распространяют ложь, клевещут на наши грандиозные усилия по восстановлению славы нации и стремятся затянуть нас обратно в трясину старого режима. Они рисуют на стенах лозунги вроде "Свобода или смерть", но не понимают, что истинная свобода может быть основана только на порядке и единстве. Нетрудно заметить, что иностранные силы манипулируют этими повстанцами из-за кулис - те страны, которые когда-то победили Францию, а теперь боятся нашего возрождения, финансируют их деньгами и оружием, пытаясь ослабить нас, сея внутренние беспорядки. Эти предатели, охотно служащие лаптем щиколотки иностранным интересам, предающие свою собственную страну и род, поистине презренны.\n\nНо наше правительство не останется в стороне от подобных провокаций. Наши лидеры ясно дали понять, что эти угрозы национальному единству должны быть подавлены железным кулаком. Обычные граждане, которые поддерживают или укрывают этих мятежников, также будут привлечены к ответственности. Молчание - это соучастие, а молчание равносильно пособничеству. Каждый истинный патриот обязан сообщать властям о подозрительных действиях. Будущее Франции зависит от бдительности и лояльности каждого из нас."
 Nationalist_France.63.a: "Они должны быть вычищены"
 Nationalist_France.64.t: "Ночь Очищения"
 Nationalist_France.64.d: "Дым поднимается от одинокой сигареты, мужчина раскачивается в кресле, глядя на городской пейзаж Парижа, его друг прислонился к стене рядом с ним.\n''Парижские ночи так прекрасны, не так ли Конрад?''\nОн был встречен молчанием, пока Конрад не начал говорить через несколько минут.\n''Ты не можешь больше скрывать это, Фриц, мы обречены. Те сведения, которые мы получили вчера, были получены от нашего лучшего информатора и оказались точными. Полиция движется, баррикады за городом, все рейсы отменены, они готовятся к чему-то. \nФриц взглянул на Конрада и затушил сигарету, но звук шипения заглушил хруст и треск старых костей Фрица, когда он встал.\n"Ты можешь быть прав, но это не значит, что мы обречены. Мы хорошо замели следы, они не знают о наших 'симпатиях', как они любят их называть. А если узнают, что ж..." Фриц схватил двустволку, прислоненную к дверной раме. Прошло несколько минут, двое разговаривали и шутили, пытаясь отогнать нависшую над ними нервозность, напряжение было ощутимым, они ожидали чего угодно. И вот наконец что-то произошло.\nФриц и Конрад услышали, как внутри зашевелились. Фриц схватил дробовик, и оба вошли в комнату своей квартиры. За дверью послышались шаги, движение. Дробовик был направлен на дверь, Конрад достал из-под кровати АКМ и зарядил его. "
 Nationalist_France.64.a: "Nuits Parisiennes."
 Nationalist_France.65.t: "Возмущение в Армии"
 Nationalist_France.65.d: "Даже когда военные все больше и больше разжигали свой гнев, мы продолжали проигрывать. Это достигло точки кипения, так как теперь сотни и тысячи солдат открыто бунтуют, решив, что борьба больше не стоит усилий. Трещину в рядах наших солдат необходимо заделать, чтобы не обречь Францию на вечное рабство."
 Nationalist_France.65.a: "Черт побери!"
 Nationalist_France.66.t: "Беспорядки в Рядах"
 Nationalist_France.66.d: "Из-за постоянных неудач на фронте наши войска начали дезертировать и жаловаться на отсутствие успехов. Это должно быть исправлено в установленные сроки, а те, кто продолжает высказывать свое мнение, должны быть наказаны, если мы не хотим, чтобы вся наша армия распалась на части на наших глазах."
 Nationalist_France.66.a: "Мы должны действовать быстро..."
 Nationalist_France.68.t: "Ультранационалистический Гнев"
 Nationalist_France.68.d: "По мере того как наши ряды продолжают сдавать позиции, даже самые ярые ультранационалисты начинают пылать гневом, считая, что мы неправильно используем ресурсы и людей их прекрасной страны, и что мы совершенно не воплощаем в жизнь наши концепции и идеалы, как они надеялись. Даже наши союзники отрываются от нас, и в наших рядах мало надежды на восстановление, но мы должны бороться."
 Nationalist_France.68.a: "Черт побери!"
 Nationalist_France.69.t: "Величайшая Тайна"
 Nationalist_France.69.d: "Это была его справедливая награда за годы самопожертвования, шрамы, потерянное время и друзей. Он сражался, убивал и проливал кровь за Францию: от русской степи до Припетских болот. От полей Вислы до Баварских Альп. Теперь он наконец вернулся домой, но не как герой-завоеватель, а как старый усталый пес. Награда за все его усилия? Честь быть арьергардом своего корпуса, своей дивизии - потрепанной смеси старых и изношенных ветеранов и мальчишек, таких же зеленых, как окружающие их деревья. Приказ был четким: собрать все, что осталось от его дивизии, и всех остальных отставших, которых он сможет найти, и удерживать Мозель как можно дольше, чтобы дать возможность остальной армии сформировать новую оборонительную линию на Мёз.\n\nВ специальном командном пункте, созданном в здании старого почтальона, он сидит в окружении своих подчиненных. Если раньше они были старыми друзьями и товарищами, то теперь его окружают незнакомцы и призраки. Мужчины слишком стары, чтобы сражаться, или достаточно молоды, чтобы быть его детьми. Их паника и беспокойство усугубляли его головную боль. Разговоры об отходе или реорганизации игнорировались: либо их было слишком мало, либо они грубо пренебрегали своими приказами. Грохот орудий становится все громче, а дивизия все ближе и ближе подбирается к разрушающимся командным пунктам. Вся его надежда на спасение и выживание зависит от того, что командир батальона в резерве выполнит приказ о запланированной контратаке. Он с сомнением относился к этому командиру, но у него не было другого выбора, поскольку под рукой не было никого, кто мог бы возглавить такую операцию.\n\nПока он продолжает размышлять, вбегает запаниковавший офицер, его форма порвана и на размер или два мала ему. С ужасом в голосе он восклицает, что резервный батальон исчез и связь с ним потеряна. Командир дивизии на мгновение замирает - враг уже почти настиг командный пункт. После всего, что он пережил, что сделал, он срывается, понимая, что все было напрасно. Достигнув предела, он начинает разглагольствовать и бредить. Он проклинает командира батальона, как никто другой. Когда командный пункт захвачен, он стоит на своем, а его люди бегут. Из его бессвязных криков и бреда сломленного, но непокорного человека его люди, спасаясь бегством, могут разобрать только одно:"
 Nationalist_France.69.a: "ГДЕ ВОРЧУН??"
 
 FAF_balancing_militarism_and_democracy_tt: "§CТаким образом, с милитаристской хунтой, развязавшей гражданскую войну, будет покончено, но ее влияние еще предстоит устранить из французского общества.§!"
 FAF_combine_decentral_with_bureaucracy_tt: "Этот фокус позволит объединить национальную децентрализацию и национальный дух имперской бюрократии и усилить их воздействие."
 

 FAF_Enforce_Edict_of_Paris: "Внедрить Парижский Эдикт"
 FAF_Enforce_Edict_of_Paris_desc: "Чтобы покончить с упадком и беспорядком либеральной демократии, мы возвращаемся к традиционным законам и обычаям. В частности, Парижский эдикт, возникший на основе законодательства Меровингов VII века, уравновешивает власть церкви и государства, обеспечивая сохранение их могущества. Чтобы еще больше укрепить нашу администрацию, мы можем снова ввести этот эдикт во французское законодательство, но при этом обеспечить его обновление в соответствии с современными проблемами и экономикой."
 FAF_liberal_crackdown: "Репрессии Либералов"
 FAF_liberal_crackdown_desc: "Для того чтобы обеспечить создание новой администрации, нам необходимо пресечь деятельность подрывных элементов. В частности, сторонники прежнего режима и его загнивающей либеральной демократии протестуют против каждого нашего действия и доводят нашу страну до полного упадка. Чтобы предотвратить любую контрреволюцию, мы должны использовать все необходимые средства, чтобы окончательно подавить политический потенциал либерализма во Франции и не допустить возвращения к неудачам бывшей республики."
 FAF_communist_crackdown: "Репрессии Коммунистов"
 FAF_communist_crackdown_desc: "И снова призрак преследует Европу. Пока коррумпированная Республика разваливалась под ее тяжестью, марксистские крысы, скрывавшиеся под личиной либеральной цивилизованности, пытались уничтожить нашу любимую Францию. К счастью, поскольку нам удалось выиграть гражданскую войну, у нас наконец-то появились средства для борьбы с этими элементами. Если мы этого не сделаем, одному Богу известно, что произойдет с Европой, если наше движение потерпит неудачу."
 FAF_Grant_Refuge_to_HRM: "Семейное Убежище"

 FAF_imperial_decentralization: "Имперская Децентрализация"
 FAF_imperial_decentralization_desc: "Как бы мы ни относились к идеалам абсолютизма и централизованного правительства, история показывает, что иногда локализованное управление имеет свои преимущества. В частности, в богатом природными ресурсами регионе Рона расположено множество местных предприятий, которые могут гораздо лучше извлекать пользу из этой местности. Хотя это означает, что мы можем в некоторой степени контролировать их местные законы, и они могут захотеть обойти наши решения, это гарантирует, что они отдадут нам все свои силы. Иногда приходится идти на жертвы, но при этом мы получаем больше вина мирового класса!"
 FAF_Imperial_Bureaecracy: "Бюрократия Старой Школы"

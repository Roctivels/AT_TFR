 FAF_french_state_dummy_desc: ""
 FAF_hold_military_parade_decision: "Продемонстрировать Нашу Силу"
 FAF_hold_military_parade_decision_desc: "Поражение в Русско-европейской войне опустошило наш народ не только физически, но и морально. Наша национальная психика погрязла в поражении и разрухе, что лишило наш народ желания сражаться. Мы должны подбодрить французский народ, напомнив ему, что Франция остается сильной и могущественной страной, которая не боится своих врагов и без колебаний защитит свой народ."
 FAF_celebrate_our_victories_decision: "Наградить Победителей"
 FAF_celebrate_our_victories_decision_desc: "Неважно, насколько усердно человек трудился и насколько тяжелым был процесс; важен был только результат. В конечном счете, во всем есть только два исхода: успех или неудача, победа или поражение. Те, кто побеждает и добивается успеха, должны быть вознаграждены, чтобы вдохновить других стремиться к победе и успеху. В конце концов, заслуги важнее всего."
 FAF_hail_to_the_chief_decision: "Слава Вождю!"
 FAF_hail_to_the_chief_decision_desc: "Лидерство и четкая структурная организация - ключ к стабильности и успеху. Оно играет ключевую роль в успехе армии, функционировании корпорации, даже организованная преступность зависит от него. Как мы вышли победителями из анархии, опустошившей Францию, так и мы должны восстановить эту нацию вокруг центральной фигуры, политического лидера, способного объединить свой народ и сплотить его ради общего дела."
 FAF_heir_of_degaulle_decision: "Принять Голлистскую Мысль"
 FAF_heir_of_degaulle_decision_desc: "Такой человек, как Шарль де Голль, не нуждается в представлении. Смелый государственный деятель и политический силач, он ни разу не подвел французский народ и нацию. Когда немцы оккупировали нашу страну, подавили наш национальный дух и поработили наш народ, большинство политиков и генералов сдались и признали поражение, но только не Шарль де Голль. Он предпочел бы умереть, сражаясь, чем жить, стоя на коленях! Но при этом он был честным человеком, справедливым человеком. Он был избран демократическим путем и чтил волю французского народа. Только помогая нашему народу принять его смелые и благородные идеалы, мы сможем направить эту нацию по правильному пути."
 FAF_culmination_of_degaulle_petainist_thought_decision: "Принять Идею Голлизма-Петенизма"
 FAF_culmination_of_degaulle_petainist_thought_decision_desc: "И де Голль, и Петен обладали благородными чертами характера. Принципы, которые позволили им пробиться в ту мрачную эпоху французской истории. Такие времена вносят раскол в нашу нацию. Если мы принимаем идеалы только одного человека, сторонники другого непременно начнут сеять хаос. Только принимая обе группы, мы сможем обеспечить единство нашей нации."
 FAF_heir_of_petain_decision: "Принять Петенистскую Мысль"
 FAF_heir_of_petain_decision_desc: "В истории Франции не было более противоречивого человека. Одни утверждают, что Петен - предатель, другие считают, что все, что он делал, было направлено на защиту французского народа. Но никто не может поспорить с тем, что он был и остается нашим национальным героем. Он оставил свой след и в Вердене, и в Виши не ради личной славы, а ради безопасности французской нации и народа. Что бы он ни делал или не делал, он был человеком решительным, человеком с огромной любовью к своему народу и своей стране, человеком, отдавшим всего себя борьбе с красным ядом, которым болела наша нация. Крайне важно, чтобы мы рассказали нашим людям правду об этом историческом гиганте. Они должны научиться принимать нашу традиционную культуру и ценности и остерегаться большевистской угрозы."
 FAF_work_v_decision: "Наша Работа"
 FAF_work_v_decision_desc: "Наша страна была разрушена и оставлена в полном запустении русской ордой. Многое еще предстоит сделать, чтобы восстановить все, что превратилось в пыль под их железными сапогами. Наш национальный дух все еще ждет, чтобы его подняли, а наш народ все еще ждет, чтобы его накормили. Сейчас, как никогда, мы должны посвятить себя монументальной задаче восстановления нашей родины."
 FAF_family_v_decision: "Наша Семья"
 FAF_family_v_decision_desc: "Сколько семей было разрушено, разделено, уничтожено этой войной? Эта праведная война против кровожадного врага, который не желает ничего иного, как уничтожить нашу прекрасную нацию, наш исконный дом - Европу. Отныне мы должны защищать наш дом, нашу семью, наших братьев."
 FAF_fatherland_v_decision: "Наше Отчество"
 FAF_fatherland_v_decision_desc: "За что сражаются наши люди? За самих себя? Нет. Они сражаются за общее дело, общие убеждения и общую цель. Чтобы защитить и сохранить то, что им дорого. Свой дом, свою землю, своих братьев."
 FAF_one_million_man_army_decision: "Миллионная Армия"
 FAF_one_million_man_army_decision_desc: "Миллион солдат! ОДИН, ЧЕРТ ВОЗЬМИ, МИЛЛИОН СОЛДАТ! Мужчин, готовых умереть и сражаться за свою страну. Парни, готовые пролить свою кровь за свою землю и народ без сомнений. С такой мощной армией французский народ может быть уверен, что его страна сможет обеспечить его безопасность."
 FAF_french_superiority_decision: "Превосходство Франции"
 FAF_french_superiority_decision_desc: "Французская культура - одна из самых, если не самая, доминирующих культур в мире. Французская изобретательность и креативность вывели нашу страну на мировую арену. На протяжении всей истории человечества только Франция была центром искусства, технологий и литературы. Эти неоспоримые факты лишь доказывают наше естественное превосходство над другими, будь то европейцы или представители других культур."
 FAF_taunt_our_enemies_decision: "Насмехаться над Врагами"
 FAF_taunt_our_enemies_decision_desc: "У Франции бесчисленное множество врагов как внутри, так и снаружи. Но что могут сделать эти крысы? Что могут сделать эти никчемные псы, чтобы навредить нашей нации? Они слабы как психологически, так и физически. Коммунистические выродки в нашей стране стали кроткими, в то время как русские слишком заняты борьбой друг с другом. Как можно не смеяться над тем, что это наши так называемые враги?"
 FAF_our_french_mothers_decision: "Идолизировать Жанну д'Арк"
 FAF_our_french_mothers_decision_desc: "Храбрость - самая благородная черта, которой только можно обладать. Французское воплощение храбрости - Жанна д'Арк. Она сражалась с большим мужеством, чем мужчины в ее рядах. Она не плакала и не кричала, когда дегенераты и предатели сжигали ее заживо под надуманным предлогом. Она сражалась с врагами всеми силами, никогда не отступая и не дрогнув. Она является идолом для всей Франции. Все наши мужчины - наши солдаты - должны стремиться быть похожими на Жанну д'Арк, сражаясь с яростной страстью и непреклонной верностью."
 FAF_revive_the_franco_german_brigades_decision: "Восстановить Франко-Германские Бригады"
 FAF_revive_the_franco_german_brigades_decision_desc: "У нас и немцев была своя доля проблем, но, тем не менее, мы - братья. Глубокая связь между нами была создана через кровь и испытания. Наш общий враг на Востоке угрожает стабильности и существованию обеих наших наций. Мы должны постепенно расширять сотрудничество между нашими странами, и реформирование небольших, но очень мобильных франко-германских бригад - первый шаг в этом процессе."
 FAF_silence_german_critics_decision: "Заставить Критиков Союза Замолчать"
 FAF_silence_german_critics_decision_desc: "Те глупцы, которые критикуют наших европейских союзников, ничего не смыслят в стратегическом планировании. Им не хватает видения и глубины. Потрясающе, как много людей до сих пор не поняли принцип "враг моего врага - мой друг." Их угроза для нас в настоящее время незначительна по сравнению с большевистской угрозой на Востоке. Конечно, мы не будем полностью доверять им, но практичность всегда должна быть выше идеологии."
 FAF_deliver_our_people_decision: "Обеспечить Наш Народ"
 FAF_deliver_our_people_decision_desc: ""

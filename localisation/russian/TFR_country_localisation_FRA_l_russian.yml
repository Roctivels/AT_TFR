 FAF_New_Era_Category: "Что-то из Старого, Что-то из Нового"
 FAF_New_Era_Category_desc: "\n\n\n\n\n£GFX_FAF_new_and_old_cat\n\n\n\n\n\n\n\nФранция издавна занимает центральное место в истории Европы, у нас самая богатая история, и наша судьба устремлена к звездам. Когда говорят о цивилизации, то в конечном счете это восходит к нашим национальным достижениям. Кто дал так много искусству, культуре, философии, науке и технологиям? Кто потратил столько времени на то, чтобы приобщить миллионы людей по всему миру к идеям Просвещения и современности? Мы были немногими, кто сделал это. Французский - один из самых распространенных языков во всем мире, а когда-то он был лингва франка всей международной дипломатии. Целые экономики и национальные политики других стран подчиняются нашей национальной воле.\n\nВ прошлом французские солдаты ступали на каждый континент и завоевывали его для нашей славной нации, чтобы насолить другим мелким европейским империям, но когда эти империи гибли от революций, которые мы породили из нашей собственной славной революции, мы оставались. Мы вписали себя в многовековую историю Европы как континентальная держава, с которой нужно считаться. Вот кто мы такие! Такова наша судьба! Такими мы останемся до тех пор, пока живы! Весь мир снова преклонит колени перед нашим словом, не только наши враги, но и наши союзники. Vive la France!"

 FRA_yellow_vests_idea:0 "Протесты Желтых Жилетов"
 FRA_yellow_vests_idea_desc: "\n\n\n\n£GFX_FRA_yellow_vest_banner\n\n\n\n\n\nЭкономический спад во Франции не был благосклонен к французским рабочим. Растущие цены на сырую нефть и топливо, высокая стоимость жизни и экономическое неравенство - все это поставило под угрозу уровень жизни обычных французских рабочих, в то время как непропорционально большое налоговое бремя легло на рабочий и средний классы. В ответ онлайн-петиция, размещенная в мае 2018 года, собрала почти 1 миллион подписей, положив начало протестному движению, которое длится почти 2 года.\nПротесты характеризовались ярко-желтыми жилетами, выбранными из-за их объединяющей темы и призыва к оружию. Протестующие блокировали дороги, возводили баррикады и проводили массовые шествия в знак протеста против неолиберализма - к ним присоединились как крайне правые, так и крайне левые элементы.\nПротесты приняли насильственный оборот, французские города загорелись из-за всплеска насилия, поскольку протесты затянулись. Столкновения между полицией и протестующими привели к тысячам раненых, а сообщения о поджогах, вандализме и материальном ущербе, исчисляемом миллионами, стали массовыми. Рейтинг одобрения Эммануэля Макрона упал более чем на 20 процентов с начала протестов. Эти протесты, возможно, являются первым признаком серьезного поворота во французской политике - отхода от либерализма начала десятилетия и, возможно, возвращения призраков экстремизма, которые так долго преследовали Францию."
 FRA_yellow_vests_idea_1:0 "Протесты Желтых Жилетов"

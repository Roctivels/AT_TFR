 FAF_overrun_turkey_decision: "Одолеть Турцию"
 FAF_push_into_the_caucases_decision: "Продвижение на Кавказ"
 FAF_Reestablish_Military_Professionality: "Восстановить Военный Профессионализм"
 FAF_Reestablish_Military_Professionality_desc: "Бывший символ французской гордости, наши некогда славные военные теперь лежат разбитые и поверженные. То, что когда-то считалось невозможным, оказалось ужасающе правдивым. Наши солдаты разбиты под тяжестью неумолимого русского наступления по всей Восточной Европе. После победы над предателями и коммунистами пришло время начать восстанавливать нашу армию с нуля. Каждая часть нашей армейской структуры будет подвергнута сомнению, будут проведены реформы, и жир будет отрезан. Со временем наша армия возродится и будет готова вновь противостоять русской угрозе."
 FAF_Our_Duty_to_France: "Наш Долг Перед Францией"
 FAF_Our_Duty_to_France_desc: "Франция никогда не была так беспомощна. Ее экономика разрушена, народ в отчаянии, а армия разгромлена. В эти мрачные времена истинные патриоты должны встать и взять на себя командование. Наш долг перед французской нацией вечен. Независимо от времени, мы всегда будем защищать народ. Пока Франция оправляется от поражения, нанесенного ей русскими, мы будем восстанавливать контроль. И снова мы выполним свой долг перед Францией. Мы выведем народ из отчаяния и восстановим его гордость. Советы должны научиться бояться нашего восхождения, ведь наша месть неизбежна, и пощады не будет."
 FAF_Mistakes_from_the_European_War: "Ошибки Европейской Войны"
 FAF_Mistakes_from_the_European_War_desc: "Когда мы с головой окунулись в войну с Россией, мы очень надеялись на быструю победу. Но война только затягивалась. В конце концов медведь оказался у ворот Варшавы. Теперь, как и наши союзники, мы лежим разбитые и побежденные, ошеломленные масштабами русского наступления. Были допущены ошибки, и было извлечено много уроков. Но сейчас главное - применить полученные знания для совершенствования нашей армии. Доктрины будут анализироваться, тактика будет пересматриваться - все, что угодно, лишь бы вернуть нашей армии статус элитной боевой силы. Адаптация обязательна, ведь отказ от перемен приведет лишь к тому, что нас снова уничтожат."
 FAF_Redesign_Modern_Warfare: "Переосмыслить Современную Войну"
 FAF_Redesign_Modern_Warfare_desc: "Франция всегда была в авангарде инноваций, независимо от сферы деятельности. Наша неудача в борьбе с русскими на Востоке говорит о том, что мы отстали от времени. Если мы не догоним, то всегда будем отставать. И будем находиться на милости у наших врагов. Будут сделаны немедленные инвестиции в пересмотр современных способов ведения боевых действий. Приоритет будет отдан таким технологиям, как беспилотники и экзоскелеты, а также инвестициям в кибервойну. Бюрократия должна быть сокращена, а этические нормы выброшены в окно.  Если Франция хочет выжить в эти трудные времена, она должна адаптироваться, невзирая на возможные издержки."
 FAF_The_Failures_of_the_Baltic_Campaign: "Неудачи Балтийской Кампании"
 FAF_The_Failures_of_the_Baltic_Campaign_desc: "То, что считалось легкой кампанией по открытию нового фронта, быстро обернулось для нас самым унизительным провалом. Используя густые леса, русская армия провела ожесточенную диверсионную кампанию, полностью отрезав нас от снабжения. Падение Вилинуса стало смертельной печатью для нашей Балтийской кампании, сократив наши силы вдвое и оставив главный фронт без ресурсов. Ясно, что если мы не извлечем уроков из этого унизительного поражения, то потерпим еще одну неудачу. Будут приняты меры по укреплению линий снабжения и узлов, чтобы подобная неудача никогда не повторилась."
 FAF_Learn_from_the_Rasputitsa: "Учиться на Примере Российской Среды"
 FAF_Learn_from_the_Rasputitsa_desc: "Климат может сделать или сорвать военное наступление. И российский климат не является исключением из этого правила. Многие лидеры пытались свергнуть Москву, от Наполеона до Гитлера, но все потерпели неудачу. Будь то ледяные зимы или грязные родники, армии захватчиков терпели неудачу из-за суровых климатических условий. Если мы хотим отомстить, мы не должны повторять ошибок прошлых захватчиков. Наши солдаты будут подготовлены к экстремальным условиям российского климата. Со временем наши солдаты освоят любую местность, что позволит нам легко пройти по России."
 FAF_Abandon_the_Rules_of_War: "Отказаться от Правил Ведения Войны"
 FAF_Abandon_the_Rules_of_War_desc: "То, что считалось легкой кампанией по открытию нового фронта, быстро обернулось для нас самым унизительным провалом. Используя густые леса, русская армия провела ожесточенную диверсионную кампанию, полностью отрезав нас от снабжения. Падение Вилинуса стало смертельной печатью для нашей Балтийской кампании, сократив наши силы вдвое и оставив главный фронт без ресурсов. Ясно, что если мы не извлечем уроков из этого унизительного поражения, то потерпим еще одну неудачу. Будут приняты меры по укреплению линий снабжения и узлов, чтобы подобная неудача никогда не повторилась."
 FAF_Rework_The_Theories_of_Old: "Переконфигурировать Старые Теории"
 FAF_Rework_The_Theories_of_Old_desc: "Наши неудачи в Восточной Европе сделали очевидным один факт. Современная тактика и доктрина подвели французских военных. Хотя когда-то мы считали, что эти тактики превосходят доктрины прошлого, очевидно, что мы ошибались. В рамках плана реформирования армии пришло время оглянуться на прошлое. Хотя многие скажут, что эти тактики меркнут перед современным образом мышления, эти доктрины по-прежнему жизнеспособны. Современная военная доктрина подвела французских военных. И если мы хотим выжить, мы должны сделать все возможное, даже если придется обратиться к прошлому."
 FAF_Defensive_Spirit_of_Verdun: "Оборонительный Дух Вердена"
 FAF_Defensive_Spirit_of_Verdun_desc: "Исторически сложилось так, что Франция уделяет большое внимание обороне. Со времен жестоких окопных боев, которыми ознаменовалась Первая мировая война. Оборона всегда была приоритетом французских военных. Хотя мы вступаем в новую эру современных войн, где все большее внимание уделяется кибервойне и беспилотным технологиям, мы не можем забывать о своих корнях. Часто говорят, что лучшее нападение - это хорошая защита. И если мы хотим, чтобы наши люди были защищены от внешних захватчиков. Тогда необходимо вкладывать значительные средства в национальную оборону. Иначе мы оставим себя широко открытыми для вторжения."
 FAF_Invoke_the_Destroyed_Villages: "Зов Villages Détruits"
 FAF_Invoke_the_Destroyed_Villages_desc: "Французские военные всегда были защитниками народа. И никогда не перестанут быть защитниками народа. Мы - их меч и щит, рыцари в сияющих доспехах. Мы приходим на помощь в самые темные времена. Когда придет враг, мы будем сражаться всеми силами. Наша ярость обрушится на врага, и он дорого заплатит за каждую пядь земли. Нет чести выше, чем служить великой нации Франции. Если мы должны умереть, то мы умрем. Но мы позаботимся о том, чтобы вместе с нами погиб и враг. Ведь если Франция не достанется нам, то не достанется никому."
 FAF_Honor_Foch: "Крепость Запада"
 FAF_Honor_Foch_desc: "Франция всегда была бастионом западного мира. С момента своего зарождения и до сегодняшнего дня Франция всегда стремилась быть вершиной западной цивилизации. Никогда еще не было так важно, чтобы Франция была крепостью Запада. Славянские орды отбили нас. Но мы еще не побеждены. Мы вернемся еще более сильными, чем прежде, готовыми отомстить Москве и ее марионеткам. Западный свет снова засияет ярко, а все его враги будут изгнаны обратно во тьму. Под нашим руководством Запад снова станет свободным."
 FAF_Rebirth_of_the_COS: "Возрождение COS"
 FAF_Rebirth_of_the_COS_desc: "Снова и снова силы специального назначения противостоят развитию технологий, таких как беспилотники и кибервойска. От SAS до Спецназа - спецназ играет ключевую роль, которую не могут заменить технологии. Когда русские продвигались по Европе, именно их спецназ действовал в тылу. Убийства, диверсии и захват разведки сыграли важную роль в нашем падении. Теперь, когда мы взяли на себя обязательства по возрождению армии, настало время учиться на своих ошибках. Под новым руководством COS возродится, готовая принять вызовы постоянно меняющегося поля боя."
 FAF_Work_Alongside_the_Navy: "Работать Вместе с ВМФ"
 FAF_Work_Alongside_the_Navy_desc: "Военно-морские силы Франции никогда не шли ни в какое сравнение с военно-морской мощью Великобритании или США. Несмотря на то, что в армию и ВВС всегда вкладывались значительные средства. В рамках широкомасштабных планов реорганизации армии пришло время переоценить полезность французского флота. Хотя многие выступают за сокращение флота, мы понимаем, что он по-прежнему служит своей цели. Будут сделаны инвестиции, чтобы возродить мощь французского флота. Со временем Франция будет проецировать мощь на суше, в воздухе и на море. Как и наши союзники, мы вернем себе место на мировой арене, готовые противостоять силе русских."
 FAF_Lethal_Guerillas: "Смертоносные Партизаны"
 FAF_Lethal_Guerillas_desc: "Эволюция военных действий определялась не только изменениями в грандиозной стратегии и технологиях, но и эволюцией партизанской войны. Асимметричная война всегда широко использовалась, но такие технологии, как беспилотники, только усилили ее значение. Масштабные мобилизации и передвижения войск становится все труднее замаскировать, что делает крупномасштабные нападения трудно скрываемыми. История показывает, что тактика налетов и диверсий играет важную роль в победе над противником. Хотя эта тактика вызывает много возражений, она является необходимой жертвой, чтобы сдержать мощь российской армии."
 FAF_Restructure_Infantry_Tactics: "Перестроить Тактику Пехоты"
 FAF_Restructure_Infantry_Tactics_desc: "Пехота - хлеб и масло любой хорошей армии, и она всегда была основой французской армии. Наши неудачи в борьбе с русским натиском являются доказательством того, что мы не смогли должным образом подготовиться к современной войне. Наша пехотная тактика и доктрина должны быть изучены и перестроены. Реформы и сокращения потребуются для того, чтобы наша пехота вернулась к современным боевым стандартам. Только тогда мы сможем должным образом отомстить русской орде. Мы пройдем маршем от Парижа до Москвы, и пехота будет указывать нам путь."
 FAF_Tip_of_the_Spear: "Наконечник Копья"
 FAF_Tip_of_the_Spear_desc: "Хотим мы того или нет, но пехота всегда будет основой любой современной армии. Сколько бы мы ни вкладывали в танки, самолеты, дроны или кибернетику, пехота всегда будет выполнять свою работу. Поэтому вполне логично сделать ее острием нашей армии. В отличие от танков, пехота может быстро адаптироваться, превращая неизбежные неудачи в решающие победы. Отдавая предпочтение пехоте перед бронетехникой, мы можем лучше адаптироваться к внезапным наступлениям противника или засадам. Это позволит нам лучше адаптироваться к непредсказуемой природе русской армии."
 FAF_Perfect_Coordinated_Strikes: "Идеально Скоординированные Удары"
 FAF_Perfect_Coordinated_Strikes_desc: "Координация - ключ к любой успешной военной кампании. Без нее приказы будут неверно истолкованы, атаки остановлены, а любые попытки наступления сведены на нет. Сотрудничество между различными военными подразделениями необходимо для того, чтобы мы могли противостоять русской угрозе. При новом режиме связь будет еще более централизована. Все рода войск будут получать разведывательную информацию, независимо от ее важности. Это позволит нам избежать недопонимания и инцидентов с дружественным огнем. А это даст нам преимущество перед нашими врагами."
 FAF_Secure_the_State: "Обезопасить Государство"
 FAF_Secure_the_State_desc: "Несмотря на нашу победу над предателями, наше положение остается в лучшем случае шатким, а в худшем - анархическим. Среди разрушенных городов центральной и южной Франции остались партизаны и партизанки, которые по-прежнему выступают против нашего правления. Если мы хотим обеспечить стабильное будущее для нашего режима, то с этими партизанами нужно немедленно разобраться. Антипартизанские кампании, полицейские рейды, все и вся будет использовано для того, чтобы вымести этих предателей. Только тогда мы сможем перейти к более важным делам, таким как возвращение Франции позиций на мировой арене на фоне поражения от русских."
 FAF_Secure_Belgium: "Обезопасить Низменности"
 FAF_Secure_Belgium_desc: "Некогда считавшийся одним из самых спокойных регионов Европы, Бенилюкс не избежал хаоса, вызванного победой России. Правительства конфликтуют, а коммунисты и бельгийские националисты поднимают голову. Если этот хаос будет продолжаться, он может распространиться дальше, угрожая нашей и без того нестабильной ситуации. Мы отправимся в Низины, чтобы восстановить порядок на некогда мирных землях. Армия должна пройти и восстановить стабильность в регионе, уничтожая как радикалов, так и оппортунистов. Это не просто шанс помочь союзнику. Но и возможность восстановить наши позиции на европейской арене. Проверить предполагаемое доминирование России над Европой."
 FAF_The_Old_Ally: "Старый Союзник"
 FAF_The_Old_Ally_desc: "У Франции исторически сложились уникальные отношения со своим англоязычным соседом. Когда-то мы вели войны друг против друга, но времена изменились, и теперь наш враг - наш величайший союзник. Как и мы, Британия не избежала последствий победы России на Востоке. Потрясенные нестабильностью, они едва удерживают власть, и в эти времена мы протянем им руку помощи. Наш союз будет нерушимой связью. Ничто не удержит нас, и ничто не устоит против нас. Мы снова поднимемся, объединившись и готовые бросить вызов возобновившейся оккупации Россией Востока."
 FAF_betrayal_tt: "§YЕсли [ENG.GetFlag] §!§CБритания§! §Gсогласится§!§Y, они пойдут за нами в любой союз, созданный против [GER.GetFlag]§!§RНемецкой Агрессии§!"
 ENG_old_entente_reaffirmed_tt: "§YЭто свяжет нас оборонительным союзом с§! [FAF.GetFlag] §3Французами§!§Y против будущей [GER.GetFlag] §!§RНемецкой Агрессии§!"
 FAF_The_XIV_Society: "Общество XIV"
 FAF_The_XIV_Society_desc: "Франция всегда была нестабильной страной. Склонная к вспышкам беспорядков и забастовок, спокойные периоды бывают нечасто. Наша ситуация по-прежнему очень хаотична, и многие предатели все еще бродят по улицам, замышляя наш крах. Если мы хотим обеспечить стабильность Франции, необходимо немедленно принять решительные меры. Мы привлечем экспертов всех мастей для решения этой проблемы. Сохраняя полную лояльность нашему режиму, они получат множество полномочий, чтобы помочь в преобразовании Франции. С их помощью централизация нашего режима ускорится, что закрепит наше правление на долгие годы."
 FAF_XIV_society_tt: "Завершение этого фокуса позволит §Yзакрепит игрока на его текущем политическом пути§!"
 

 FAF_The_Kingdom_of_the_French: "Победа Идентаристов"
 FAF_The_Building_Blocks_of_an_Empire: "Строительные Блоки Новой империи"
 FAF_building_an_empire_idea: "Построение Империи"
 FAF_building_an_empire_idea_desc: ""
 FAF_Ally_European_Identitarians: "Союз с Европейскими Идентаристами"
 FAF_Ally_European_Identitarians_desc: "Хотя наша идеология и движение еще относительно молоды, мы не одиноки. Многие в Западной Европе разделяют наши идеи и мотивы. Несмотря на рост этих движений, правительства многих стран по-прежнему пресекают их деятельность. Если мы хотим, чтобы наша революция добилась успеха и объединила Запад, мы должны обратиться к этим движениям. Предоставление безопасного убежища и материальной поддержки поможет этим группам распространять свои идеи, находясь в безопасности союзной страны. Со временем наши усилия принесут плоды. И Европа будет прочно объединена под нашей властью."
 FAF_National_Decentralization: "Национальная Децентрализация"
 FAF_National_Decentralization_desc: "История показывает, что лучшие империи управлялись не только своими столицами. Будь то Римская империя или одна из других империй в Европе или Азии. Все они имеют одну общую черту - децентрализацию и расширение прав и возможностей местных лордов или губернаторов. Перестраивая Францию по своему образу и подобию, мы будем воплощать эти идеи в жизнь. Париж больше не будет единолично управлять Францией. Региональные полномочия будут возвращены многочисленным провинциям, что позволит им управлять собой. Хотя мы по-прежнему будем сохранять контроль, эти уступки позволят нам отступить. И позволить народу взять власть в свои руки там, где это необходимо."
 FAF_Neo_Imperial_Bureaucracy: "Неоимперская Бюрократия"
 FAF_Neo_Imperial_Bureaucracy_desc: "Бюрократия - основа любой империи, которая хочет выжить и процветать. От славных дней римского господства до Британской империи, раскинувшейся за океаном, все они использовали массивные бюрократические системы. Если мы хотим создать империю, которая просуществует тысячу лет. Тогда мы должны начать создавать основу для новой имперской бюрократии. Однако, в отличие от старой бюрократии, наша будет свободна от ядовитого влияния коррупции и личной жадности. Наша система будет относиться к каждой провинции одинаково, и никому не будет оказано особого предпочтения. В рамках этой системы будет сформирован новый Рим, по-настоящему сильный и свободный."
 FAF_Redraw_Europe: "Переписать Историю Европы"
 FAF_Redraw_Europe_desc: "История Европы в ее нынешнем виде недружелюбна к нашей концепции мира, она позорит нас ложью и полуправдой. Возьмите источники, которые были названы "ложными" и "предвзятыми" историками, выступающими против истории, и используйте их для создания истории истинной Европы, латинской Европы. Укоренению антилатинской истории будет положен конец, а все, кто ее развращал, будут перевоспитаны в духе истинной истории."
 FAF_Puppet_the_Church: "Папа в Авиньоне"
 FAF_Puppet_the_Church_desc: "Слишком долго католическая церковь, управляемая марксистским "папой" Франциском, двигалась в неверном направлении, уводя за собой 40 миллионов французов, но этому пришел конец. Используя несколько лояльных, более консервативных епископов во Франции, мы пришли к соглашению о захвате всех католических церквей и соборов во Франции и создании собственного Папы, Климента XV, в Авиньоне, бывшем эксклаве Папского государства, угрожая остальным священнослужителям подчиниться Авиньону или столкнуться с последствиями."
 ROME_nationalist_party_long: "Civitas"
 ROME_nationalist_party: "Civitas"
 sec_anti_pope: "Антипапа"
 FAF_Legacy_of_our_Ancestors: "Наследие Наших Предков"
 FAF_Legacy_of_our_Ancestors_desc: "Действия людей, которые привели нашу нацию к расцвету, были растоптаны и отмечены как "зло" в современном мире. Мы будем служить тому, чтобы исправить это. История мира - это не история, написанная с точки зрения предательских историков, а история, которая показывает историю такой, какой она была, и славу объединенного мира под властью латинского народа, а всех, кто считает иначе, учат истинной славе Августа и Рима."
 FAF_Quadrilingual_Unification: "Четырехъязычное Объединение"
 FAF_New_Imperial_Army: "Новая Имперская Армия"
 FAF_New_Imperial_Army_desc: "Как Рим превратился из небольшого города-государства в одну из крупнейших европейских империй? Ответ кроется в его военной мощи. От Британии до Иберии римские легионы выходили на тропу войны. Враги, такие как Карфаген, не знали пощады, и суд был быстрым для всех, кто пытался восстать. Реорганизовав разгромленную французскую армию, мы превратим ее в нечто новое. Из пепла возникнет новая имперская армия, способная соперничать по мощи даже с британской. И когда придет время, мы обрушимся на советских псов, как неудержимая волна возмездия."
 FAF_A_Millennia_of_Stability_and_Achievement: "Тысячелетие Стабильности и Достижений"
 FAF_A_Millennia_of_Stability_and_Achievement_desc: "Рим определялся не только способностью вести войну с врагами. Он также был отмечен своими достижениями. Длительные периоды мира привели к значительному научному и технологическому прогрессу. Процветало не только государство, но и граждане, которые получали огромную выгоду от расширения империи. Если мы хотим стать наследниками наследия Рима, мы должны стремиться не к выживанию, а к процветанию. Наша империя будет процветать не только для правителей и элиты, но и для простых граждан. Готовясь к войне, мы в то же время смотрим вперед, в новую эру мира. Где граждане Европы будут едины и свободны."
 FAF_Mediterranean_Dominance: "Господство над Морями"
 FAF_Mediterranean_Dominance_desc: "Многие империи можно определить по их способности контролировать моря. От Британии до Японии - взлет и падение империй можно проследить по их способности господствовать в океанах. Хотя Римская империя никогда не славилась мощью своего флота, мы не можем пренебрегать его важностью. Если мы действительно считаем себя преемниками Рима, то контроль над морями является первостепенной задачей. Господство на море позволит нам не только контролировать жизненно важные морские пути, но и блокировать наших врагов. Это позволит уморить их голодом и значительно облегчит любое вторжение."
 FAF_Proclaim_the_Empire: "Провозгласить Империю Всех Латинян"
 FAF_imperial_army_idea: "Имперская Армия"
 FAF_latin_conscription_law: "Римский Призыв"
 FAF_latin_military_integration_law: "Герои Империи"

 FAF_Towards_one_Europe: "На Пути к Единой Европе"
 FAF_The_Pure_European_Identity: "Чистая Европейская Идентичность"
 FAF_Preserve_European_Beauty: "Сохранить Европейскую Красоту"
 FAF_Restart_European_Unity: "Перезапустить Европейскую Федерализацию"
 FAF_Reverse_the_Great_Replacement: "Обратить Вспять Великое Замещение"
 FAF_An_Army_of_Purity: "Армия Чистоты"
 FAF_Policy_of_Green_and_White: "Политика Зеленых и Белых"
 FAF_Dehumanize_our_Enemies: "Обесчеловечивать Наших Врагов"
 FAF_Green_Classicalism: "Зеленый Классицизм"
 FAF_Green_Classicalism_desc: "Мир должен вернуться к тому, каким он был. Больше не будет препирательств по поводу расы, идеологии или чего-либо еще - будет единство всех европейцев, одного народа, одной нации, стремящейся сохранить мир от угрозы неевропейцев и угрозы еретического коммунизма, которые стремятся уничтожить ее народ и присущую ему красоту, которой является Европа."
 FAF_Europe_Indivisible_and_United: "Европа, Единая и Неделимая"
 FAF_Europe_Indivisible_and_United_desc: "Оглядываясь на историю, можно сказать, что зенит европейской истории всегда наступал тогда, когда мы были едины. Будь то времена римлян, франков или даже Европейского союза, они приводили к массовому процветанию, которое соперничало с периодами братских войн и разделения. Конечно, мечта о единой Европе не увенчалась успехом. Раньше привязанная к прихотям социопатических бюрократов в Брюсселе, которых заботила только стоимость евро, наша борьба наконец-то смогла вывести панъевропеизм за рамки либерального мультикультурализма. Теперь, когда нам удалось стабилизировать ситуацию и доказать свою состоятельность нашим континентальным братьям, мы можем предпринять усилия, которые вознесут Европу к славе, невиданной со времен Траяна. Конечно, мы лучше, чем простые завоеватели, и предоставим им выбор, хотят ли они присоединиться к своим братьям в борьбе за спасение Европы. В свою очередь, мы должны ориентировать государство на панъевропейские идеалы и использовать их медийные машины, чтобы обеспечить успех. Если мы добьемся успеха, то, возможно, нам удастся завершить крестовый поход против евразийских орд Востока и наступить новый золотой век Европы.\n\nПосле вековых конфликтов мы противостоим болезни разделения и вековым братским войнам. Чтобы противостоять ордам Востока, народы Европы должны объединиться как неделимая и почти непобедимая фаланга древности. Когда мы это сделаем, даже если они потребуют подчинения или смерти, все, что они получат, - это требование всего континента прийти и взять это!"
 FAF_Push_for_Continental_Unification: "Стремление к Континентальному Объединению"

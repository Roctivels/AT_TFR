 france.288.t: "Дебаты в "Золотом Тюльпане""
 france.288.d: "В кафе "Золотой тюльпан" дебаты Матье ЛеБлана и Эмили Дюваль продолжались уже два часа."Мы должны признать," заявила Эмили, "что эта так называемая Пятая республика тянет Францию в пропасть. Посмотрите на нас сейчас - бездушная административная машина, парад пустословящих политиков и обещания реформ, которые так и не были реализованы."\n\n"Ты слишком радикальны, Эмили," ответил Матье, отставляя чашку с кофе. "Республика дала нам два века стабильности и прогресса. Именно эта система уберегла нас от диктатуры и тирании."\n\n"Стабильность?" Эмили насмешливо хмыкнула. "Ты имеешь в виду стагнацию. Какой была Франция при де Голле? Тогда мы определяли политическую судьбу Европы. А сейчас? Мы даже не можем управлять своей судьбой. Эта система гниет, Матье. Это переодетый труп, бредущий по современным улицам."\n\n"У Франции есть свои недостатки, но решение не в том, чтобы все разрушить," искренне сказал Матье. "Каждая радикальная перестройка обходилась в ужасную цену. Настоящий прогресс должен быть постепенным и рациональным."\n\n"Но постепенные реформы никогда не смогут решить основные проблемы," возразила Эмили. "Проблема этой системы не поверхностная, а фундаментальная. Нам нужна новая система, которая действительно отражает волю народа, новый порядок, который восстановит славу Франции."\n\n Матье вздохнул..."
 france.288.a: "Каждый, кто мечтает о "новом порядке", в итоге становится тираном."
 france.289.t: "Митинг"
 france.289.d: "На предвыборном собрании Жан-Пьер как раз закончил представлять план Макрона по восстановлению экономики, когда из аудитории внезапно поднялся пожилой мужчина с белоснежными волосами. "Вы говорите о реформе?" В его голосе чувствовалась тяжесть десятилетий жизненного опыта.\n"Позвольте спросить вас: почему мой внук, молодой человек с дипломом преподавателя, не может позволить себе даже снять квартиру?"\n\nБез ответа Жан-Пьер продолжил: "Вы всегда говорите о глобализации, цифровой революции, о превращении Франции в центр инноваций. Но скажите мне, когда фермер не может свести концы с концами, что значат для него эти высокие лозунги?"\n\n"Каждый раз, когда я вижу его по телевизору, одетого в этот сшитый на заказ костюм, говорящего языком банкиров о реформах. А слышал ли он когда-нибудь об историях в Бургундии? Где фермеры, выращивающие виноградники, бросают свои исконные земли, потому что не могут позволить себе соблюдать новые экологические нормы?"\n\nРука старика дрогнула, когда он указал на предвыборный плакат. "Я живу здесь уже более семидесяти лет. Я видел эпоху де Голля, слышал обещания Миттерана. Но никогда, ни в какие времена я не чувствовал себя настолько отчужденным от своей страны, как сейчас.""
 france.289.a: "''Мне... жаль, что вы так думаете...''"

 FAF_Nationalize_the_Wine_and_Olive_Industries: "Национализировать Винодельческую и Оливковую Промышленность"
 FAF_Nationalize_the_Wine_and_Olive_Industries_desc: "Что касается культурной продукции, то Франция славится экспортом вина и оливок. В настоящее время большинство этих отраслей находятся в частной собственности и, следовательно, подвержены влиянию иностранных агентов. Если мы национализируем эти отрасли, мы не только обеспечим дополнительные средства для нашего режима, но и сможем гарантировать, что эти продукты будут оставаться гордостью и радостью Франции!"

 FAF_nobility_taking_money_tt: "§CДворянство§! будет брать большую сумму денег из национального банка каждые 3 месяца в обмен на стабильность королевства."
 FAF_dieu_veut_idea: "Dieu Veut"
 FAF_dieu_veut_idea_desc: "\n\n\n\n\n£GFX_FAF_deus_vult\n\n\n\n\n\n\n\nЗа нами и за нашими солдатами стоит воля Бога и воля нации. Мы сражаемся за правое дело, святое и божественное дело. Когда наши люди маршируют, они должны знать, что они, народ Франции, - величайшие из когда-либо живших. Когда артиллерия грохочет и они сталкиваются с дикими ордами на Востоке, они должны знать, что следуют духу нашего Господа. Dieu Veut!"
 FAF_euro_navy_annexation_tt: "Благодаря дипломатическим переговорам командования ВМС европейских, тихоокеанских и атлантических стран готовы присоединиться к нашей борьбе против советской коммунистической гегемонии."
 FAF_lafayette_order_cat: "Новый Порядок"
 FAF_lafayette_order_cat_desc: "\n\n\n\n\n£GFX_FAF_lafayette_category\n\n\n\n\n\n\n\nНемцы подвели нас, они позволили нашим сыновьям умереть... и все же они ожидают нашего повиновения в этой предстоящей войне?\nКоммунисты и немцы работают против Франции... Поглощают наших молодых парней и нашу промышленность, чтобы ослабить нас... И ради чего?\nЧтобы §RОТНЯТЬ§! у нас Эльзас и Лотарингию?\nДля того, чтобы §RВНЕДРИТЬ§! Германский Коммунизм в нашей славной Франции? \nМы можем только предполагать, какие действия они предпримут, когда мы станем слабыми, но этот день никогда не наступит, пока мы следуем за нашим великим лидером §C'Лафайетом'§!"
 FAF_showcase_superiority_decision: "Демонстрация Французского Превосходства"
 FAF_showcase_superiority_decision_desc: "Мы превосходим всех, мы знаем это. Наши идеалы, наш образ жизни, наша история, наш народ... Все это было доведено до совершенства, как самое красноречивое вино, но мир постоянно не признает нашего очевидного превосходства над ними!"

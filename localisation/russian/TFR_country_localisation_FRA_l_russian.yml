 FAF_Quadrilingual_Unification_Campaign: "Кампания "Один Язык""
 latinist.4.t: "Императорская Армия"
 latinist.4.d: "Императорская римская армия была самой сильной армией во всей Европе - нет, во всем мире! Они были храбрыми, непобедимыми и, прежде всего, гордыми. В отличие от наших "европейских" армий, слабость была недопустима. Обязательная служба в армии также способствовала тому, что все мужчины были закалены войной, всегда готовые служить и защищать свою землю и свой род. Без мощной армии Pax Romana не смогла бы существовать. Возможно, не было бы и самого Рима. Как и Рим, враги и захватчики смотрят на наши плодородные земли, желая покорить нас и поработить. Возможно, возрожденная Имперская армия будет оснащена иначе, чем в римские времена, но самое главное - мы унаследуем их закаленный в боях дух и непоколебимую веру в победу. Наш новый Рим будет непобедим, несокрушим и неоспорим! ROMA INVICTA!"
 latinist.4.a: "Мы должны сделать все, чтобы вернуть наше наследие"
 latinist.4.b: "Необходимы лишь некоторые небольшие изменения"
 latinist.5.t: "Заявление Антипапы"
 latinist.5.d: "Наша новообретенная преданность церкви не была хорошо воспринята "папой" в Риме... Как мы все знаем, этот сторонник "красных" долгое время выступал за принятие либеральных язв в нашем обществе и пресмыкался перед элитой педофилов, его нужно заменить кем-то, кто гораздо больше соответствует нашим убеждениям, таким как Ален Эскада"
 latinist.5.a: "Pax Christi in Regno Christi"
 latinist.6.t: "Говорение на Языках" #Multilingual Education proves successful
 latinist.6.d: ""Au-den-tes for-tu-na ju-vat..." Капон чувствовал, как каждый слог вытягивается из его горла. "Боже, это пытка!" Он захлопнул книгу и обвел взглядом пустой класс. "Почему в XXI веке мы все еще учим этот мертвый язык? Кто вообще говорит на латыни?"\n\n"Молодой человек, я думаю, Вергилий был бы удивлен вашим произношением - хотя и не обязательно в хорошем смысле." Ровный голос раздался из глубины комнаты. Капон повернулся и увидел профессора Генри, изучающего классическую литературу, стоящего в дверях и держащего в руках потрепанную книгу в кожаном переплете.\n\n"Профессор, я не знал, что вы здесь..." Капон встал, слегка смутившись. Генри махнул рукой, показывая, чтобы он сел. "Продолжайте. Вы приводили аргумент. Латынь устарела?" Капон заколебался, но ответил честно. "Да, сэр. Мы учим языки, чтобы общаться, а латынь больше не имеет практического применения." Слабая улыбка мелькнула на губах Генри, когда он сел напротив него. "Прагматичный аргумент. Очень современно." Он легонько постучал по учебнику Капона. "Но знаете ли вы, что означает фраза, которую вы только что прочитали?"\n\n"Удача благоволит смелым," ответил Капон. "Из 'Энеиды' Вергилия."\n\n"Правильно." Генри одобрительно кивнул. "Когда революционеры выкрикивали Liberté, Égalité, Fraternité, они опирались непосредственно на римские идеалы libertas, aequitas и fraternitas. Можно утверждать, что латынь - это душа Франции, основа нашей нации."\n\n"Это не значит, что мы должны учить весь язык," возразил Капон. "Мы можем просто изучать ключевые фразы и понятия." Генри встал и подошел к окну. Солнечный свет проникал сквозь его седеющие волосы, отбрасывая длинную тень на пол. "Знаешь ли ты, почему Франция всегда придавала такое значение универсализму? Почему мы верим, что определенные ценности выходят за рамки времени и места? Этот образ мышления идет непосредственно от римлян. Латынь - это не просто реликвия, это ключ к пониманию корней нашей культуры.""
 latinist.6.a: "Audaces Fortuna Juvat!"
 latinist.71.t: "Европейская Нация"
 latinist.71.d: "Французское правительство, видя наше бедственное положение, предложило нам присоединиться к совершенно новой европейской нации. Это довольно интригующее предложение, ведь после распада НАТО и нашего сокрушительного поражения в европейской войне у нас больше не осталось союзников в Европе. Наша нация переживает тяжелые времена, и нам нужна помощь в борьбе с жаждущими власти коммунистами на востоке, которые в противном случае без колебаний вторгнутся к нам, сотрут нашу культуру и используют нас в качестве одной из своих пешек."
 latinist.71.a: "Щит против советского интернационализма!"
 latinist.71.b: "Еще одна попытка Франции создать империю"
 latinist.72.t: "Être à bout"
 latinist.72.d: "Мы - семья, братья и сестры. Нити судьбы связывают наш народ воедино, а алая жидкость, которая течет под нашей кожей, объединяет нас. От заснеженных Альп Больцано до пышных, изумрудных Пиренеев Иберии мы всегда были одним народом, единым целым. Мост между нами был построен не только благодаря общей крови, но и глубоким, неразрывным связям нашей культуры и истории.\n\nПо доброй воле мы предлагали нашим сородичам бесчисленные возможности для мирного объединения. Но они снова и снова насмехались над нами, отвергали нас или полностью отворачивались от нас! Мы протянули им нашу любовь и братство. Союз наших наций привел бы к беспрецедентной экономической и военной мощи, выгодной для всех. Но они отказываются слушать нас. Они отвергают разум, не верят в нас и, что самое трагичное, отчаянно цепляются за свои жалкие представления о "национализме" и "регионализме". Их глаза по-прежнему затуманены бесплодными сепаратистскими заблуждениями, они слепы к величию, которого можно достичь благодаря единству.\n\nНикто не хочет, чтобы между братьями проливалась кровь, но как мы можем бездействовать, когда те, кого мы любим, продолжают клеветать и предавать нас? У каждой души есть свой переломный момент, и Франция наконец-то достигла своего. Теперь мы стоим на перепутье. Протянем ли мы руку в последний раз, умоляя разум восторжествовать? Или мы позволим пулям и бомбам говорить от нашего имени?"
 latinist.72.a: "Мы не должны допустить бессмысленного пролития крови."
 latinist.72.b: "Уже сказано достаточно слов. Единственный язык, который понимают эти глупцы, - это насилие!"
 latinist.7.t: "Европейская Федерализация"
 latinist.7.d: "Со времен падения Римской империи мечта о единой Европе вдохновляла амбиции, надежды и славу многих провидцев. В то же время она стала причиной самых кровопролитных конфликтов в истории, унесших миллионы жизней. От самодержавных правителей, таких как Карл V Габсбург и Людовик XIV Бурбон, до более поздних фигур, таких как Наполеон и Гитлер, каждая попытка объединить Европу силой заканчивалась неудачей. В результате идея интеграции Европы через конфедерацию постепенно набирала обороты. Маастрихтский договор стал важной вехой в этом процессе, приблизив Европу к единству как никогда раньше.\n\nОднако события развивались не так, как планировалось. В 2015 году референдум по Brexit ударил как гром среди ясного неба, нарушив хрупкое равновесие. В 2010-х годах пандемия Ковид-19 и конфликты в Восточной Европе еще больше подорвали перспективы федерализации, и будущее стало казаться все более неопределенным. В этот критический момент дух единства ценен как никогда и дает наилучшую надежду разогнать нависшие над нами темные тучи.\n\nБудучи одним из лидеров европейской цивилизации, выбор, сделанный французским правительством и его народом, определит судьбу Европы до конца этого века. Будет ли Франция играть ведущую роль в будущей единой европейской федерации? Или она сохранит свою гордую галльскую независимость, стойко противостоя всем угрозам? А может быть, она полностью отрешится от старого пути и отбросит 'An die Freude'?"
 latinist.7.a: "Вместе европейцы могут обеспечить будущее для наших детей..."
 latinist.7.b: "Мы ценим эту работу, но останемся суверенными."
 latinist.7.c: "Хватит с нас этих махинаций!"
 latinist.8.t: "Новая Континентальная Система"
 latinist.8.d: "Для новой империи есть одна насущная проблема, которая выделяет колоссальную мощь, простирающуюся от Одера до Нейсе: угрожающая русская гегемония, обнажившая клыки и готовая поглотить Европу, а возможно, и весь мир. Если бы у руля Франции стоял кто-то другой, он мог бы подумать о том, чтобы отсрочить этот грозный вызов. Однако отступление и уступки - чуждые понятия для Французской империи, которая считает себя единоличным лидером Европы. Противостоять вызовам в лоб - такова ее природа.\n\nОднако сегодня все не так, как в прошлом. Одно решающее сражение, приведшее к заключению Тильзитского договора, - это фантазия, которая не будет иметь места в Европе XXI века. Противостояние русскому господству - сложная, медленно разгорающаяся задача. Император и его советники обратились за вдохновением к своему прославленному предку, великому Наполеону I. Старая континентальная система, которая когда-то выступала в союзе с Россией против Британии, теперь будет поворачиваться, чтобы противостоять своему бывшему славянскому союзнику.\n\nПо мнению французского руководства, Франция имеет значительное преимущество в военно-морской мощи и морской торговле, опираясь на поддержку других стран ЕС, и, возможно, сможет склонить на свою сторону небольшие европейские страны, не определившиеся с выбором. В отличие от этого, возможности России ограничены. Ограничение их узкими водами Балтийского и Черного морей может заложить основу для будущего военного столкновения.\n\nОднако некоторые сомневаются в целесообразности такой стратегии. Критики утверждают, что Россия может положиться на своих восточных союзников, чтобы продолжать беспрепятственную торговлю. Кроме того, восстановление Континентальной системы может больше навредить Европе, чем помочь, тем более что многие страны-члены ЕС по-прежнему зависят от российской нефти и природного газа.\n\nТак будет ли император стремиться повторить славу своего предшественника или выберет более осторожный путь?"
 latinist.8.a: "Необходимое средство для достижения цели."
 latinist.8.b: "Мы отказываемся"
 latinist.9.t: "Имперское Восстановление"
 latinist.9.d: "Версалю 400 лет, многие комнаты пустуют или являются выставочными залами для туристов, это скелет дворца. Несколько месяцев ремонта, новая мебель и исторические предметы искусства должны вернуть ему былое величие с современным оттенком.'' \n\n''Версальский дворец уже отслужил свое, он должен продолжать служить туристической достопримечательностью. Необходимо построить новый, более грандиозный дворец, который будет полностью удовлетворять потребности его владельцев.'' \n\n''Не нужно проводить ремонтные работы или 'модернизацию', превратите Версаль из туристической достопримечательности в функциональный императорский дворец для императорской семьи и правительства в его юго-западном крыле.''"
 latinist.9.a: "Новая эра означает новый дворец"
 latinist.9.b: "Его необходимо привести в соответствие с временем"
 latinist.9.c: "Все хорошо, как есть!"
 latinist.10.t: "Латинская Империя Требует Аннексии"
 latinist.10.d: "Некоторое время назад Франция переименовала себя в Латинскую империю, и в течение многих месяцев считалось разумной возможностью, что Франция в конце концов вернет себе Испанию. Это означает, что мы потеряем независимость, но это не значит, что мы потеряем все влияние. Как равноправная часть Латинской империи мы будем выступать вместе с Францией, Италией и Португалией единым блоком, чтобы противостоять немецкому и большевистскому господству. Мы должны задать себе вопрос: кто мы в первую очередь - латиноамериканцы или испанцы? И что такое Испания? У нас здесь много разных видов испанцев: галисийцы, каталонцы, арагонцы, астурийцы, мы много лет притесняли каталонцев, называя их национализм эгоистичным и недальновидным. "В одиночку вы никуда не придете!" кричали мы, а теперь Франция кричит это нам. Может быть, нам стоит прислушаться к ним? Может быть, пришло время Испании присоединиться к новой Латинской империи?"
 latinist.10.a: "Испания присоединяется к империи!"
 latinist.10.b: "Нет!"
 latinist.11.t: "Латинская империя требует аннексии"
 latinist.11.d: "Французы всегда держали все над головой, были самодовольными и гордыми людьми. Но когда они объявили себя Латинской империей, мы увидели другую сторону французской гордости, мы увидели сторону, которая говорила с нашими делегатами как с братьями. Когда несколько месяцев назад мы поинтересовались, что нас ждет в будущем, когда Франции не станет, а на ее месте появится Латинское государство, они предложили план объединения всех латинских народов в одно супергосударство, новый Рим, новую великую империю в красном и золотом цветах, как это было у наших предков два тысячелетия назад. Они сказали, что хотят видеть нас на своей стороне, чтобы противостоять Германии, хотят, чтобы мы вместе снова господствовали в Европе. Сегодня прибыл галльский посол, который сообщил хорошие новости. Они завершили разработку своих планов и целей и готовы аннексировать нас. Они готовы, сказал он, как будто считают, что наше признание гарантировано? Не так-то просто отказаться от своей нации, чтобы просто присоединиться к больш ему целому. Какие у нас есть гарантии, что это не очередная тонко завуалированная Французская империя, облаченная в римские регалии и одариваемая теплой улыбкой? Их войска вглядываются в полуостров, готовые перейти Рубикон. Нам предстоит сделать выбор."
 latinist.11.a: "Как феникс из пепла Европы!"
 latinist.11.b: "Нет!"
 latinist.12.t: "Французская армия вступает в Каталонию"
 latinist.12.d: "Французская армия была замечена в СМИ марширующей в Каталонию, ссылаясь на нестабильную ситуацию в Испании, чтобы привлечь каталонцев в ряды французов. Это тонко завуалированная попытка восстановить Каталонский марш, кем они себя считают? Франкистами? Эта ключевая территория Испании была потеряна для иностранной державы, в то время как мы находимся в самом слабом состоянии с 1936 года. Мы не можем оставить это безнаказанным, даже если мы не можем ответить прямо сейчас военными действиями, мы должны что-то сделать с этими ублюдками! Эмбарго! Что угодно! Или... возможно, мы просто позволим им забрать проблемных каталонцев.Может быть, это не слишком большая потеря."
 latinist.12.a: "Мы выстоим"
 latinist.12.b: "Предатели! Эмбарго!"
 latinist.12.c: "Этого нельзя допустить!"
 latinist.13.t: "Франция Марширует на Рим"
 latinist.13.d: ""
 latinist.13.a: "We Have No Other Choice..."
 latinist.13.b: "Traitors! We will Never Submit!"
 latinist.14.t: "Италия Отступает От Рима"
 latinist.14.d: ""
 latinist.14.a: "Великолепно!"
 latinist.15.t: "Италия Отказывается Подчиниться"
 latinist.15.d: ""
 latinist.15.a: "Они знают свою судьбу..."
 latinist.16.t: "Латинская империя требует аннексии"
 latinist.16.d: ""
 latinist.16.a: "Yes"
 latinist.16.b: "No"
 latinist.50.t: "Введение в Латынь"
 latinist.50.d: "В ходе нашей последней попытки найти общий язык для бизнеса и политики между нашими союзниками Барделла столкнулся с тем, что должно произойти, чтобы эта попытка увенчалась успехом: Барделла должен выучить родной язык всех стран: латынь. \n\nХотя латынь - давно умерший язык, понимание этого языка сотворило бы чудеса с дальнейшим освоением других романских языков, а также способствовало бы укреплению связи между нашим славным государством и нашими римскими предками."
 latinist.50.a: "''Я посвящу этому все свое существо...''"
 latinist.50.b: "''Это не самое главное''"
 latinist.51.t: "Достойный Yаставник"
 latinist.51.d: ""
 latinist.51.a: "Puto me discere?"
 latinist.52.t: "Прогресс Застопорился"
 latinist.52.d: ""
 latinist.52.a: "Мне просто нужно больше сосредоточиться..."
 latinist.52.b: "Мне нужно нанять репетитора"
 latinist.53.t: "Препирающиеся Бюрократы"
 latinist.53.d: "После долгого рабочего дня каждый ожидает, что сможет расслабиться в своем кабинете и провести время, занимаясь тем, что ему нравится, не так ли? Не сегодня, когда два региональных губернатора звонят друг другу до поздней ночи, прося "моей поддержки в свержении коррумпированного тирана из соседнего региона" и так далее, и тому подобное."
 latinist.53.a: "Достаточно!"
 latinist.53.b: "Я требую тишины в своем кабинете!"


 FRA_Generation_of_Slackers_idea: "Если они не бастуют, то берут дополнительные выходные или наслаждаются "приятным" длинным отпуском в течение рабочей недели. С тех пор как был принят Закон Обри, мы наблюдаем переход от некогда уважаемого и решительного рабочего класса к поколению лентяев, и мы должны немедленно исправить это, иначе Франция продолжит свой медленный упадок."
 FRA_armed_forces_dynamic: "Forces Armées Françaises"
 FRA_armed_forces_dynamic_desc: "Французские вооруженные силы были мечом и щитом французской нации, защищая наш народ от потенциальных угнетателей и агрессоров на протяжении всей нашей истории. Они будут продолжать защищать нашу нацию от угроз современной эпохи, кем бы они ни были."
 

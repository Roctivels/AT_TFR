 france.7006.t: "К Вопросу о Федерализме"
 france.7006.d: ""
 france.7006.a: "Давайте последуем советскому примеру!"
 france.7006.b: "Федерализм не был актуален со времен первой революции, забудьте об этом."
 france.7007.t: "Французская Экономическая Помощь!"
 france.7007.d: "Наши великие французские товарищи в духе международной коммунистической солидарности выделили нам щедрый грант на восстановление нашей промышленности. Из-за недавних военных неудач в борьбе с фашистской угрозой на востоке и недавней революции против бывшего капиталистического правящего класса наша местная промышленность пришла в упадок.\n\nБлагодаря тому, что наши французские товарищи вняли нашим крикам о помощи и прислали экономическую помощь, чтобы помочь нам восстановить нашу страну путем восстановления заводов и других промышленных районов, обеспечения работой наших людей и возобновления нашей экономики. Вместе с нашими французскими товарищами мы будем восстанавливать и идти вперед к более широкому классовому единству и общей борьбе против капитализма и империализма!"
 france.7007.a: "Сила в единстве!"

 latinist.1.t: "Перебирая Пепел"
 latinist.1.d: "Путь к национальному возрождению стал неизбежным вопросом истории. С тех пор как Франция завершила свое превращение в националистическое государство, споры о будущем направлении развития нации разгорелись на всех уровнях общества. Огонь войны и революции превратил старый порядок в пепел, и теперь, на этой выжженной земле, мы должны решить, как восстановить нашу родину.\n\nПервая точка зрения гласит, что мы восстанем, как феникс. Сторонники этой позиции считают, что страдания Франции были необходимым испытанием, очищением национального духа. Они рассматривают нынешние трудности как решающий этап на пути к великому возрождению, подчеркивая добродетель самопожертвования и значение стойкости. По их мнению, только благодаря полному духовному обновлению Франция сможет выйти из тени истории и устремиться в сияющее будущее.\n\nВторая точка зрения провозглашает, что наша прошлая слава возродится. Приверженцы этой точки зрения погружаются в ностальгию по золотому прошлому Франции - будь то военные триумфы наполеоновской эпохи или культурный расцвет Третьей республики. Они подчеркивают непрерывность и превосходство французской цивилизации, выступая за возвращение к традиционным ценностям и институтам как за ключ к возвращению Франции ее законного места в мире.\n\nТретья точка зрения утверждает, что наша кровь должна быть очищена. Ее приверженцы винят в упадке Франции "загрязнение" национальной родословной, выступая за жесткую демографическую политику для достижения так называемой "этнической чистоты."\n\nПока нация стоит на перепутье, эти конкурирующие взгляды будут определять судьбу Франции в ближайшие годы."
 latinist.1.a: "Мы восстанем, как Феникс"
 latinist.1.b: "Былая слава будет возрождена"
 latinist.1.c: "Наша кровь будет очищена"
 latinist.2.t: "Латинский Народ..."
 latinist.2.d: "В век, развращенный скептицизмом и пустым интернационализмом, настало время возвысить наш истинный голос, провозгласить нашу непоколебимую национальную веру. Современность разрывает душу Франции, и в этом хаосе мы должны вернуть себе гордость и достоинство латинского народа.\n\nОбратитесь к нашей истории - без Франции не было бы настоящей Европы. Когда Рим пал, именно мы сохранили пламя классической мудрости. Именно на наших землях вспыхнуло Просвещение, а Сена стала колыбелью, из которой разум и свобода распространились по всему миру. Немцы и англосаксы? Они всего лишь опоздавшие к цивилизации, их так называемый "культурный вклад" - не более чем слабое подражание нашему великому наследию. Европейская цивилизация - латинская, и она французская!\n\nКогда наполеоновский орел взлетел над Москвой, Мадридом и Берлином, мир трепетал перед единством французской нации. Наши армии были непобедимы, наши законы изменили весь континент. История снова и снова доказывает, что нам нужна не слабость, не бесконечные споры, а решительные действия и твердое лидерство. Только возродив наше наследие железа и славы, мы сможем вновь подняться в хаосе современного мира!\n\nПосмотрите на Европу сегодня - мы должны признать суровую правду: на великой шахматной доске глобальной власти белые нации Европы сталкиваются с беспрецедентным вызовом. Мы не можем позволить себе раскол и не можем тратить время на взаимные обвинения. От Ирландии до Урала, от Скандинавии до Средиземноморья мы разделяем общую судьбу. Франция должна осознать себя частью этого большого целого - наша борьба - это борьба всех европейских народов. Только благодаря единству мы сможем защитить наши традиции, наш образ жизни и нашу цивилизацию от внешних угроз."
 latinist.2.a: "Мы сердце Европейской цивилизации!"
 latinist.2.b: "Когда-то был объединен под Наполеоновской властью"
 latinist.2.c: "Всего лишь винтик в белой расе"
 latinist.3.t: "Наша связь с прошлым..."
 latinist.3.d: "Хорошо одетые предатели прошлого отравили нашу молодежь, научив ее презирать собственную историю, презирать собственную культуру и сомневаться в своей родословной. Но час пробуждения настал. Мы вернем себе украденную славу, починим разорванную цепь истории и восстановим то, что было намеренно стерто.\n\nПравящий класс одурманил дух нации иллюзией процветания, но мы одни все еще чувствуем боль предательства. Они извратили нашу историю, научив нас стыдиться величия наших предков. Но должны ли мы извиняться за распространение цивилизации? Нет! Мы отвергаем этот подневольный, ненавидящий себя менталитет - пламя латинской юности никогда не погаснет!\n\nВатерлоо не должно быть нашим позором - оно должно стать нашим знаменем неповиновения. Это поражение было не неудачей Франции, а заговором трусов, когда вся Европа объединилась, чтобы нанести поражение одной нации. Но даже в самый темный час французские солдаты выкрикивали имя Императора, предпочитая смерть капитуляции. Их кровь течет в наших жилах, их дух до сих пор ходит по этой земле.\n\nКогда дикие гунны ворвались в ворота Европы, кто противостоял им? Наши предки. Когда вандалы опустошили Средиземноморье, кто восстановил порядок? Наши короли. Когда монгольские орды стремились поглотить всю Европу, кто воздвиг оплот цивилизации? Мы.\n\nМы должны вернуть себе это скрытое наследие, ведь только зная, кто мы есть, мы можем определить, куда нам идти.\n\nИстория не ждет нерешительных. Слава принадлежит только тем, кто достаточно смел, чтобы идти по стопам своих предков. Судьба Франции находится в наших руках, и выбор, который мы сделаем сегодня, определит Европу завтрашнего дня."
 latinist.3.a: "Мы - недовольная молодежь"
 latinist.3.b: "Мы - солдаты при Ватерлоо"
 latinist.3.c: "Мы - убийцы гуннов, вандалов и монголоидов"

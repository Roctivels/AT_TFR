 FRA_Triumph_over_the_Eastern_Menace: "Победа над Русским Медведем"
 FRA_Triumph_over_the_Eastern_Menace_desc: "Ценой крови и пота медведь был побежден. Были те, кто думал, что Европа погибнет вместе с Америкой. Европа была бы беззащитна, пресыщена добычей и беззащитна перед окружающими ее волками. Они никогда не могли быть более неправы. Именно Европа сейчас одерживает победу. От украинского партизана до французского летчика, от немецкого панцергренадера до королевского морского пехотинца. Эта титаническая задача стала возможной только благодаря нашему решению и решению Европы сражаться до конца - никаких полумер и никакого мира без настоящей победы. Несмотря на опасения некоторых людей по поводу концепции объединенной Европы, они больше не могут отрицать, что, объединенные общей целью, Европа вместе может совершить великие дела."
 FRA_Mourn_our_Sons: "Какой Ценой?"
 FRA_Mourn_our_Sons_desc: "Медведь был сломлен, но дорогой ценой. Попытка спасти Украину на ранних этапах провалилась, и то, что должно было стать коротким и решительным усилием, превратилось в трясину. Мы вышли на первое место, но только после того, как наши экономики и народы понесли тяжелые потери. Мы должны извлечь свою долю крови из трупа медведя, как и остальная часть НАТО. Мы сделаем все возможное, чтобы подавить Россию мерами, направленными на подрыв ее экономики и военного аппарата. Новое российское правительство, похоже, обдумывает идею реорганизации для еще одной попытки восстановить утраченное - по крайней мере, за кулисами. По рекомендациям Генерального штаба, мы и остальные страны НАТО должны оставаться на разных уровнях боевой готовности, и военная готовность должна поддерживаться. В том маловероятном случае, если bear снова выступит против нас, мы будем готовы. Если они захотят вернуть свои права, принадлежащие им по праву рождения, с нашей стороны будет только вежливо позаботиться о том, чтобы они погибли, пытаясь это сделать."
 FRA_The_Spirit_of_Victory: "Дух Победы"
 FRA_The_Spirit_of_Victory_desc: "Русские считали, что Европа слаба и будет сидеть сложа руки, продолжая свой марш по покорению. Они полагали, что в худшем случае наше вмешательство будет непродуманным и медленным - они не могли быть более неправы. Благодаря быстрому и решительному вмешательству катастрофическая ситуация на Украине была спасена, и движение России было остановлено. За это время были успехи и неудачи, но, в конце концов, над Кубанью развевался французский флаг, а российское правительство рухнуло. Мы намерены пожинать плоды победы, как и наши партнеры, но мы должны оставаться внимательными к таким требованиям. Не нужно заглядывать слишком далеко в прошлое, чтобы увидеть негативные последствия карфагенского мира - реальные или предполагаемые. Мы верим, что с новым российским правительством можно работать, и оно постепенно вернется в Европу в качестве партнера и, возможно, будущего друга. В конце концов, разве новое российское правительство чем-то отличается от нашего? Несомненно, они вразумятся и поймут, что сотрудничество с нами - гораздо лучшая альтернатива действиям в одиночку или даже попыткам вернуть утраченные территории. Вероятность такого безумного шага настолько мала, что лучше его проигнорировать - несмотря на то, что сотрудники генерального штаба настаивают на бдительности, потому что, в конце концов, разве подготовка к нему не будет способствовать этому?"
 FRA_Enter_the_New_Era: "Новая Послевоенная Эра"
 FRA_Enter_the_New_Era_desc: "Несмотря на жертвы и победы, мы не должны сидеть сложа руки. Мы боролись за сохранение старого порядка и победили, но борьба никогда по-настоящему не прекращается. Мир не должен быть растрачен впустую, и необходимо приложить все усилия, чтобы наши союзники внутри страны были счастливы и бдительны, а наши партнеры за рубежом вооружены и экономически продуктивны. Немецкая экономика, возможно, и стала сильнее благодаря ЕС, который, по нашему мнению, является ее представителем, но Франция - мировая держава. Благодаря нашим связям в Западной Африке ресурсы и продовольствие поступают в Европу, а наша казна наполняется, но у наших партнеров в регионе есть соперники и свои войны, с которыми им приходится сталкиваться. Даже если НАТО не желает выделять на это ресурсы, мы не пожалеем средств и позаботимся о том, чтобы наши прошлые, настоящие и будущие инвестиции не были напрасными. Более сильная Франция - это более сильное НАТО, и кто с нашей стороны будет жаловаться на это?"
 FRA_Announce_Snap_Elections: "Объявить о Досрочных Выборах"
 FRA_Announce_Snap_Elections_desc: "С окончанием войны возвращается политическое разделение. Союзам по расчету и прекращению мелких дрязг ради военных усилий, к сожалению, пришел конец. Несмотря на кажущуюся подавляющую популярность нашего правительства, оппозиция требует проведения выборов здесь и сейчас из-за нашего "некомпетентного управления и неэффективного ведения военных действий". Их можно игнорировать, но они обладают достаточным влиянием, чтобы потенциально вызвать серьезные проблемы и замедлить принятие законодательства. Если мы так популярны, как кажется, это может оказаться благом. Это могло бы еще больше укрепить нас и усилить наше влияние на правительство, а также позволить нам спокойно игнорировать подобные требования в будущем. Всегда есть вероятность, что наши предположения о популярности неверны, но что такое жизнь без риска?"

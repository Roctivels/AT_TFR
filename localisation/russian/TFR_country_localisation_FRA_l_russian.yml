 FRA_The_New_French_Sphere: "Восстановить Нашу Сферу"
 FRA_The_New_French_Sphere_desc: "Одержав победу над российским империализмом, мы стали бесспорными защитниками европейской демократии. Однако после нашей славной победы на территориях, где ранее господствовала Россия, образовался вакуум власти. Мы, защитники демократии, должны защитить свои интересы и установить мир и демократию в этих бывших автократических странах."
 FRA_Reclaim_the_Algerian_Departments: "Вернуть Себе Департамент Алжир"
 FRA_Reclaim_the_Algerian_Departments_desc: "С тех пор как мы покинули страну несколько десятилетий назад, алжирцы доказали свою неспособность управлять собственным государством. Они постоянно увязают во всевозможных проблемах, начиная от сепаратистских группировок и заканчивая пограничными спорами. Им нужна помощь извне, и мы ее окажем. Это первые шаги к обеспечению безопасности Африки."
 FRA_VIC_Freedom_for_North_Africa: "Свобода для Северной Африки"
 FRA_VIC_Freedom_for_North_Africa_desc: "Арабская весна началась более десяти лет назад, но из нее почти ничего не вышло. Все, что она принесла, - это гражданские войны, радикализм и смерть. Центральной фигурой неудач "арабской весны" в Африке является Ливия, которая бушует с 2011 года и почти ничего не принесла ее участникам. Она также представляет собой серьезную угрозу безопасности для нас в Северной Африке, поэтому пришло время обеспечить безопасность Ливии."
 FRA_VIC_Stabilize_West_Africa: "Стабилизировать Западную Африку"
 FRA_VIC_Stabilize_West_Africa_desc: "Одним из печальных последствий войны с Россией стала необходимость отозвать большую часть наших войск в Западной Африке. Отсутствие этих солдат означало значительное снижение способности стран региона обеспечивать верховенство закона и способствовало возрождению многочисленных террористических группировок. Теперь, когда нам больше не нужно беспокоиться о проблемах близкого дома, мы можем вернуться к работе и заняться теми, кто находится в далеких странах. Рано или поздно мы окончательно уничтожим последние следы радикальных исламистов."
 FRA_VIC_Demand_African_Resources: "Требовать Соблюдения Прав на Ресурсы в Африке"
 FRA_VIC_Demand_African_Resources_desc: "Наша постоянная помощь некоторым африканским странам привела к тому, что они оказались у нас в большом долгу. Мы несем ответственность за борьбу с терроризмом, создание инфраструктуры и экономики этих стран, а также за их защиту от всевозможных угроз. Пришло время платить по счетам, и для этого им не нужно искать дальше своих огромных природных ресурсов. Управление всеми этими минералами и драгоценными камнями должно быть обременительным, и мы с радостью заберем их у них из рук."
 FRA_VIC_African_Economic_Expansion: "Экономическая Экспансия в Африке"
 FRA_VIC_African_Economic_Expansion_desc: "Расширение нашего сотрудничества с государствами Западной Африки открывает уникальные экономические возможности, и было бы глупо не воспользоваться ими. Во многих наших бывших колониях до сих пор слабо развито производство потребительских товаров, и мы с радостью поможем им в этом. В обмен мы получим новые рынки сбыта для нашей продукции. Шампанское и прекрасный вид на Гвинейский залив, желаете?"
 FRA_VIC_A_New_African_Union: "Новый Африканский Союз"
 FRA_VIC_A_New_African_Union_desc: "По мере того как страны Западной и Северной Африки становятся все более зависимыми от нас, возникает вопрос о том, насколько далеко мы должны зайти в этом вопросе. Ответ на него очевиден. Проще говоря, колониализм давно умер, и чтобы обеспечить максимальное соответствие со стороны народов Африки, они не должны находиться под контролем какой-то далекой страны. Поэтому мы решили создать новый Африканский союз, который не будет шутить. Этот новый союз будет помогать в развитии, добыче ресурсов и, конечно, торговле. Он станет вершиной наших действий в Африке."
 FRA_VIC_In_the_Right_Hands: "В Надежных Руках"
 FRA_VIC_In_the_Right_Hands_desc: "С момента обретения независимости страны Западной и Северной Африки были просто неспособны управлять собой. Они постоянно попадали в руки террористов и диктаторов, и теперь, когда мы обвели их вокруг пальца, пришло время сделать так, чтобы ничего подобного не повторилось. Хотя колониализм далеко не так популярен, это не колониализм, мы бы хотели назвать его ассистированным управлением. С нашей тяжелой, направляющей рукой Африка будет защищена."
 FRA_VIC_Operation_Aigle: "§YOpération§!: Эгль"
 FRA_VIC_Pit_them_Against_Each_other: "Поощрять Антиавторитаризм"
 FRA_VIC_Rebirth_of_Israel: "Возрождение Сионизма"
 FRA_VIC_Clean_the_Slate: "Начать с Чистого Листа"
 FRA_Protect_Canadian_Soveriegnty: "Защищать Суверенитет Канады"
 FRA_Protect_Canadian_Soveriegnty_desc: "Канада уже давно является одним из наших самых важных союзников, еще со времен Второй мировой войны, когда она была одним из самых храбрых борцов с нацистской угрозой, и всегда стояла на стороне демократических принципов и Запада. Однако в условиях продолжающегося хаоса в бывших США многие группировки заявили, что Канада является частью их идеальных Соединенных Штатов. Эти претензии неприемлемы, и мы будем защищать Канаду от любой агрессии со стороны Америки."
 FRA_Ensure_Continental_Interests: "Обеспечивать Интересы в Северной Америке"
 FRA_Ensure_Continental_Interests_desc: "Даже когда ситуация в Восточной Европе успокаивается, ситуация в Соединенных Штатах продолжает оставаться тяжелой. На территории бывших США существуют определенные группировки, которым мы не можем позволить получить больше власти, чем они уже имеют, - это означает гибель для миллионов людей. Кроме того, мы обязаны спасти нашего союзника, который неоднократно выручал нас. Никогда не помешает отплатить за услугу, а заодно и заработать несколько очков."
 FRA_canadian_isolation_tt: "§CЭто позволит изолировать канадцев от европейской политики в попытке добиться независимости для народа Квебека.§!"
 FRA_The_Miquelon_Bill: "Микелонское Соглашение"
 FRA_The_Miquelon_Bill_desc: "Нечто злое скрывается за Атлантикой, маскируясь под Соединенные Штаты Америки. Но это не та нация, которую мы помогли освободить от британцев два с половиной века назад, и они не желают ничего другого, как эксплуатировать нас. Как ни больно это признавать, но США мертвы и исчезли. Европа должна быть защищена от этой новой угрозы, и только от нас зависит, будут ли американцы держаться своей стороны океана."
 FRA_American_Realpolitik: "Победитель"
 FRA_American_Realpolitik_desc: "Кажется, кошмар наконец-то закончился. Русские заняты, Европа едина и сильна, но самое главное - наконец-то закончилась вторая американская гражданская война. Пусть они сейчас слабы и сломлены, но их история еще не закончена, и именно нам и остальным членам ЕС предстоит провести их через этот период восстановления. Мы помогли им освободиться от британцев, и мы не можем бросить их сейчас."
 FRA_Franco_American_Diplomatic_Agreement: "Франко-Американское Дипломатическое Соглашение"
 FRA_Franco_American_Diplomatic_Agreement_desc: "Впервые с 2021 года мы посетили Вашингтон. Новое американское правительство пригласило нас туда в связи с новым дипломатическим соглашением, которое мы с радостью приняли. Результаты оказались удовлетворительными, хотя и не такими выгодными, как мы надеялись. Американцы не собираются вступать в НАТО, но в обмен на нашу помощь они обещают это сделать, когда придет время. Пусть они уже не те, что были десять лет назад, но мы надеемся на дальнейшее партнерство."
 FRA_Guiana_Gambit: "Гвианский Гамбит"
 FRA_Guiana_Gambit_desc: "Хотя НАТО обозначает Северную Атлантику, его расширение никогда не ограничивалось его тезкой. Поскольку ситуация в Восточной Европе складывается вполне благоприятно для нас, мы снова обратили свое внимание через пруд и немного южнее. Мы никогда не были большими друзьями с бразильцами, но мы достаточно хорошо ладим с ними и хотели бы расширить наше партнерство. Без русских они, конечно, тоже ищут новых партнеров. Но они упрямы, и их придется немного убедить присоединиться к нашему делу. Как бы нам ни не хотелось расставаться с ней, Французская Гвиана, несомненно, подсластит сделку."
 FRA_Stabilize_the_Caribbean: "Стабилизировать Карибы"
 FRA_Stabilize_the_Caribbean_desc: "Недавний хаос в Соединенных Штатах и Мексике привел относительно мирные Карибы в состояние кризиса, и наши территории оказались под угрозой. Со временем кажется, что ситуация не успокоится, пока кто-то не предпримет какие-то действия, а кроме нас и Соединенного Королевства, ни у кого нет причин для этого. Пока ситуация не обострилась, мы вмешаемся и примем меры, чтобы успокоить бушующее море."
 FRA_Enrich_Quebecois_Spirit: "Обогащать Квебекский Дух"
 FRA_Enrich_Quebecois_Spirit_desc: "Квебекцы долгое время находились под пятой англосаксов, но они никогда не позволяли им подавить себя. Именно под этим давлением их культура и народ процветают, являясь свидетельством того, что некоторые вещи никогда не могут быть искоренены. Чтобы продолжать расширять свое влияние в Северной Америке, мы должны сначала найти поддержку среди квебекцев, и поэтому мы будем финансировать усилия по расширению знаний общественности об их наследии и культуре."
 FRA_Supplement_Quebecois_Industry: "Дополнение Промышленности Квебека"
 FRA_Supplement_Quebecois_Industry_desc: "Один из путей к сердцу любой страны - помочь ей строительством, которое поможет ее экономике. Лучший способ сделать это, помимо, возможно, фермерства, - финансировать промышленные проекты. У Квебека есть ряд текущих программ развития, которые канадское правительство не очень-то поддерживает, поэтому мы вмешаемся. Когда в Квебеке появится множество новых промышленных рабочих мест, они вспомнят, кто на самом деле построил их заводы."
 FRA_Espouse_Cultural_Unity: "Поддерживать Культурное Единство"
 FRA_Espouse_Cultural_Unity_desc: "Культуру Франции можно упростить до трех слов: "Свобода, равенство и братство." Однако, как и в любой другой стране, в разных городах и даже домах люди по-разному интерпретируют нашу культуру. Хотя все французы разделяют одни и те же фундаментальные ценности, мелкие детали иногда становятся причиной споров. Мы не можем допустить, чтобы люди ссорились из-за мелочей, поэтому все аспекты нашей культуры будут выставлены на всеобщее обозрение, чтобы каждый мог убедиться, насколько мы едины."
 FRA_quebec_independence_tt: "§CЭто заставит [QUE.GetFlag] Квебек провести референдум о независимости от [CAN.GetFlag] Канады.§!"
 FRA_Restore_the_French_Union: "Восстановить Французский Союз"
 FRA_Restore_the_French_Union_desc: "Французский союз - наша прежняя полусерьезная попытка реформировать колониальную систему, которая потерпела крах с концом IV Республики. Вместо того чтобы содержать заморские департаменты и колонии, все осталось только за Францией. Однако к концу 1950-х годов эта система показала, что она не работает, и распалась. Но теперь мы можем успешно управлять большим количеством заморских территорий, не колоний, а именно территорий. Там не будет граждан второго сорта, только французы, и наша мощь снова будет выставлена на всеобщее обозрение!"
 FRA_Department_of_Haiti: "Департамент Гаити"
 FRA_American_CW_Embargo_tt: "§YНАТО введет коллективное эмбарго на торговлю со всеми фракциями Гражданской войны в Америке§!"
 FRA_Further_American_Support_tt: "§YМы направим дальнейшую поддержку выбранной нами фракции§!"
 FRA_VIC_African_Economic_Expansion_tt: "Открывает £decision_icon_small §HРешения§! на: §YДальнейшее Экономическое Влияние §!§Rна Страны Западной Африки§!"
 FRA_VIC_In_the_Right_Hands_tt: "Открывает £decision_icon_small §HРешения§! на: §YДальнейшее Армейское Влияние §!§RНароды Западной Африки§!"

 FRA_VIC_Bitter_Winner_tt: "§RРоссия должна заплатить за тех французских граждан, которых мы потеряли...§! \n\nФранция будет стремиться к поддерживать £GFX_Federalization_Unity_texticon Европейский мир, посредством обеспечения того, чтобы [SOV.GetFlag] Россия никогда больше не смогла бросить вызов европейскому господству."
 FRA_VIC_Victorious_Spirit_tt: "§CЕвропа вступила в новую эпоху, по-настоящему свободную от войн...§! \n\nФранция будет стремиться поддерживать £GFX_Federalization_Unity_texticon Европейский мир, через перестройку [SOV.GetFlag] России,  как мы когда-то делали с [GER.GetFlag] §YЗападной Германией§!."
 FRA_death_counter_flag: "Погибло более §R10 тысяч человек§!"
 FRA_The_Liberators_of_the_Caucasus: "Освободители Кавказа"
 FRA_The_Liberators_of_the_Caucasus_desc: "Без нас и НАТО в целом Кавказский регион по-прежнему находился бы под контролем российских экспансионистов. Теперь, когда мы прошли через трудности освобождения от их повелителей, мы не должны уклоняться от ответственности перед ними. Если оставить их на произвол судьбы, они либо впадут в хаос, либо будут вновь захвачены своим северным соседом. Этого нельзя допустить, мы позаботимся о том, чтобы народы Кавказа остались независимыми от русских и помнили, кто их освободил."
 liberator_of_the_caucasus: "Освободители Кавказа"
 FRA_Militarize_Kuban_Police: "Милитаризовать Кубанскую Полицию"
 FRA_Militarize_Kuban_Police_desc: "Поражение России привело к созданию нескольких новых государств в регионе Северного Кавказа, самым важным из которых является Кубанская Республика. К несчастью для кубанцев, их новое правительство с трудом поддерживает закон и порядок, а сама страна уже подвергается нападению террористов, поддерживаемых Россией. Чтобы создать себе оплот на Востоке, мы с радостью поможем кубанцам укрепить свои полицейские силы и административный потенциал."
 FRA_Crimean_Investments: "Крымские Инвестиции"
 FRA_Crimean_Investments_desc: "Крымский полуостров находился под незаконным контролем России более десяти лет, его игнорировали и использовали не более чем в качестве прославленной военной базы, он подвергся масштабным разрушениям в результате многочисленных боевых действий. К счастью, теперь он снова находится в руках более ответственных владельцев, которыми являются украинцы. В знак доброй воли и для распространения влияния на востоке мы инвестируем в восстановление Крыма и гарантируем, что он будет возвращен в лучшем состоянии, чем был взят!"

 FRA_EU_kill_EUrself_tt: "Это закроет нам остальную часть древа фокусов и подготовит £GFX_Federalization_Unity_texticon §CПОЛНУЮ ФЕДЕРАЛИЗАЦИЮ§!."
 FRA_EU_sister_republic_tt: "Это лишит нас доступа к £GFX_Federalization_Unity_texticon пути §CПОЛНОЙ ФЕДЕРАЛИЗАЦИИ§!, но вместо этого начнется создание [EUU.GetFlag] §YФРАНКО-ИБЕРИЙСКАЯ ФЕДЕРАЦИЯ§!"
 FRA_EU_European_Emergency: "Чрезвычайная Ситуация в Европе"
 FRA_EU_European_Emergency_desc: "Когда пушки перестают стрелять и пожары угасают, мы выходим победителями над нашими врагами. Националистические и коммунистические партизаны были изгнаны в тень, и свобода восторжествовала в наше трудное время. Однако сейчас мы не можем успокоиться. Наша ситуация все еще очень анархична, и радикалы сделают все, что в их силах, чтобы узурпировать наш контроль. В эти отчаянные времена мы обращаемся за помощью вовне. Хотя мы, возможно, и проиграли битву, война еще далека от завершения. И мы вернемся еще более сплоченными, чем прежде, готовыми встретить наших врагов единым фронтом."
 FRA_EU_Seeking_Discourse: "Искать Дискурс"
 FRA_EU_Seeking_Discourse_desc: "Сила Франции заключается в ее многопартийной демократии. Несмотря на провал Пятой республики, мы не должны отказываться от наших демократических корней. Пока мы продолжаем собирать осколки Гражданской войны, перед нами открываются уникальные возможности. Хотя крайне правые и левые отказались работать с нашим правительством, есть еще много умеренных, которых можно убедить. С помощью уступок и поблажек мы можем убедить эти нейтральные стороны более открыто сотрудничать с нашим правительством. Это позволит нам с легкостью пройти через законодательные органы. Это значительно ускорит процесс восстановления."
 FRA_EU_Crack_Down_on_Extremism: "Борьба с Экстремизмом"
 FRA_EU_Crack_Down_on_Extremism_desc: "Несмотря на нашу победу над милитаристами и коммунистами, радикализм продолжает тлеть в тени. Если мы быстро не подавим этих фанатиков, они станут занозой в нашем боку, саботируя наши усилия по восстановлению. Будет дано разрешение на уничтожение оставшихся радикальных групп, которые все еще активны. Некоторые будут осуждать это как ущемление свободы, но в конечном итоге это необходимое зло. Ведь если они не с нами, значит, они против нас. И любая оппозиция нашему правлению лишь оттягивает неизбежное."
 FRA_EU_Addressing_Our_Failures: "Преодоление Наших Неудач"
 FRA_EU_Addressing_Our_Failures_desc: "Оглянитесь вокруг. Наши города разрушены, наши люди голодают, наша армия разбита. Как бы мы ни пытались отрицать это, мы потерпели неудачу. Мы не смогли защитить наших восточных союзников от русской орды, и теперь мы сталкиваемся с последствиями. Но мы не можем вечно дуться на свое поражение. Мы должны встать на ноги, научиться на своих ошибках и вернуться более сильными. Многое можно извлечь из наших неудач в Первой европейской войне. И многое должно быть изменено. Независимо от нашего подхода, перемены обязательны. Если мы откажемся меняться, то повторим ошибки прошлого."
 FRA_EU_Picking_ourselves_up: "Берем Себя в Руки"
 FRA_EU_Picking_ourselves_up_desc: "После того как пыль осела и хаос улегся, наше правление медленно, но верно укрепляется. Но многое еще предстоит сделать. Города лежат в руинах, а наши люди сидят в очередях за хлебом. Но, к счастью, мы не одиноки. По всей Европе наши союзники страдают так же, как и мы, если не больше. Польша разделена, Испания по-прежнему раздираема гражданской войной, а некогда гордый евро теперь совершенно бесполезен. Но не все надежды потеряны. Многие скажут, что мечта о единой Европе умерла. Но мы знаем, что это не так. Пройдя через страдания и невзгоды, мы станем сильнее, чем прежде. Европейская мечта будет реализована, даже если для ее воплощения в жизнь придется пролить кровь."
 FRA_EU_Repairing_the_National_Body: "Восстановить Национальный Организм"
 FRA_EU_Repairing_the_National_Body_desc: "Наша победа над милитаристами и социалистами далась нам нелегко. Мы получили в наследство израненную и поврежденную нацию. Большая часть сельской местности лежала в руинах, а в городах бушевали пожары. Даже наша безмятежная столица не избежала ужасов войны, и даже Эйфелева башня была повреждена. По мере продвижения панъевропейского проекта мы начнем трудный процесс оздоровления французского тела. То, что последует за этим, станет проверкой не только нашей приверженности европейскому единству. Но и того, на что мы готовы пойти ради возрождения французской нации. И мы доведем дело до конца, независимо от того, какую цену придется заплатить или какие действия предпринять."
 FRA_EU_The_Best_and_Brightest: "Лучшие и Яркие"
 FRA_EU_The_Best_and_Brightest_desc: "Франция в ее нынешнем состоянии хрупка, как треснувшее стекло. Неверный шаг приведет к тому, что и без того разламывающаяся система начнет закручиваться в полную анархию. Восстановление разрушенной войной страны - процесс долгий и трудный. Его нельзя доверить простому рабочему. Поэтому необходимо привлекать команды экспертов для помощи в процессе восстановления. Хотя этим экспертам будут предоставлены особые привилегии на составление планов, они все равно потребуют нашего окончательного одобрения. Под их руководством мы превратим Францию в страну будущего. Страну, которая будет действительно отражать конечную цель панъевропейского проекта."
 FRA_EU_Invite_American_Innovationists: "Пригласить Американских Инноваторов"
 FRA_EU_Invite_American_Innovationists_desc: "Хотя некоторые выступают за привлечение исключительно французских экспертов, было бы неправильно не приглашать иностранных специалистов. Когда-то Соединенные Штаты были маяком промышленных инноваций. Такие промышленники, как Бессемер и Генри Форд, способствовали внедрению таких инноваций, как конвейер. В то время как некогда процветающая страна по-прежнему раздирается гражданской войной, промышленники, такие как Блумберг, сумели сохранить свои активы. Несмотря на то, что работа с людьми будет рискованной, потенциальная награда перевешивает риск. Советы этих людей будут иметь решающее значение для ускорения процесса восстановления."
 FRA_EU_An_International_Reconstruction_Effort: "Международные Усилия по Восстановлению"
 FRA_EU_An_International_Reconstruction_Effort_desc: "На протяжении всей истории человечества один факт остается неизменным. Величайшие страны достигали своего положения не без развитой промышленной базы. Такие великие страны, как Китай и Америка, не стояли бы на месте, если бы не инвестировали в тяжелую промышленность. Если мы хотим, чтобы Франция заняла свое место среди мировых держав, мы должны запустить бьющееся сердце - промышленность. Будут восстановлены фабрики, запущены сталелитейные заводы, и все, что угодно, лишь бы снова запустить нашу промышленность. В сочетании с помощью наших союзников Франция вновь станет промышленной державой, способной соперничать с Китаем."
 FRA_EU_The_Cult_of_Reason: "Культ Разума"
 FRA_EU_The_Cult_of_Reason_desc: "Основанный в бурные первые годы после Французской революции, Культ Разума был свидетельством республиканских ценностей и стремления к подлинному прогрессу. Несмотря на это, он был узурпирован предателем Робеспьером. Он превратил его из фронта прогресса в средство укрепления власти. Несмотря на это, идеалы культа разума остаются актуальными и по сей день. По мере того как мы будем восстанавливать некогда гордую французскую нацию, эти идеи станут строительными блоками нашего нового режима. Они будут направлять наше стремление к разуму, равенству и инновациям."
 FRA_EU_Creative_Revolution: "Творческая Революция"
 FRA_EU_Creative_Revolution_desc: "Франция всегда была страной творчества. От архитектуры до кино и искусства. Франция исторически была центром различных творческих революций. Хотя хаос европейской войны и наша гражданская война приостановили эти усилия, теперь мы можем начать возрождать эти движения. В рамках нашей кампании по восстановлению мы посеем семена новой творческой революции. Восстановление музеев, возрождение гильдий художников и публикация инноваций молодых французских художников. Пусть искусство и не является главной опорой французской экономики, но оно чаще всего свидетельствует о процветании нации. И если мы надеемся на процветание, то поддержка искусства крайне важна."
 FRA_EU_United_By_Science_and_Reason: "Объединенные Наукой и Разумом"
 FRA_EU_United_By_Science_and_Reason_desc: "Самые великие и долговечные страны истории - это те, которые вкладывают значительные средства в науку. Промышленные инновации вывели Россию и Америку на мировую арену, а инновации в области технологий помогли улучшить качество жизни во всем мире. Собирая по кусочкам нашу разрушенную нацию, мы смотрим в будущее, определяемое наукой и разумом. Будущее, в котором суеверия и страх перед неизвестным сменились надеждой на будущее. Будущее, в котором Европа навсегда останется единой и свободной."
 FRA_EU_A_New_Technocratic_Superstructure: "Технократическая Суперструктура"
 FRA_EU_A_New_Technocratic_Superstructure_desc: "Многие считают технократию молодой концепцией, но история свидетельствует об обратном. Впервые ее придумал Уильям Генри Смит в 1919 году, а затем расширил Говард Скотт в 1930-х годах. Хотя его партия технократии не имела успеха и в итоге была распущена, идеи, которые она пропагандировала, живут до сих пор. Неудачи Пятой республики в европейской войне являются достаточным доказательством того, что необходима новая система управления. Францией больше не будут управлять жадные, корыстные политики. Отныне повседневные функции французского правительства будут возложены на большие группы экспертов. Хотя эти люди не назначаются народом, они будут стремиться к тому, чтобы добиться наибольших изменений для Франции. Под нашим руководством они приведут Францию к новому золотому веку сотрудничества и единства."
 FRA_EU_Diversify_the_French_Citizen: "Разнообразить Жизнь Французского Гражданина"
 FRA_EU_Diversify_the_French_Citizen_desc: "Что на самом деле представляет собой французский гражданин? Правые говорят, что французский гражданин - это европеец. Но мы знаем больше. Франция - это разнообразный плавильный котел национальностей и культур. И представлять весь наш народ в одном образе было бы большой ошибкой по отношению к этим культурам. Если мы действительно стремимся представлять наш народ, мы должны расширить представление о том, что значит быть французом. Прошли времена дискриминации. Прошли те времена, когда человека можно было рассматривать не только как гражданина. Если мы действительно хотим избавиться от ошибок прошлого, то переосмысление идеи французского гражданина - это лишь один из многих шагов на пути к действительно равному будущему для всех."
 FRA_EU_Expand_Immigration: "Расширять Иммиграцию"
 FRA_EU_Expand_Immigration_desc: "Никогда еще во французской политике не было более противоречивой темы, чем дебаты вокруг иммиграции. Они возникли после того, как в нашу страну хлынули волны мигрантов из Арбата, спасаясь от насилия во время "арабской весны" и сирийской гражданской войны. Этот вопрос быстро привлек внимание французского правительства. Многие призывали к ужесточению иммиграционного контроля. Однако при нашем правлении иммиграция не будет остановлена. Более того, она будет расширена. Иммигрантам будут предоставляться поддержка и субсидии при условии, что они внесут свой вклад в восстановление Франции. Консерваторы могут пинаться и кричать сколько угодно, но мы не будем слушать их жалобы. В конце концов, у нас есть власть, поэтому мы правы."
 FRA_EU_Economic_Enrichment: "Экономическое Обогащение"
 FRA_EU_Economic_Enrichment_desc: "Франция - очень уникальная страна. Мы обладаем многочисленными месторождениями полезных ископаемых и плодородной почвой. В то время как мы исторически всегда использовали наши целинные земли, месторождения полезных ископаемых использовались недостаточно. Если мы надеемся избавиться от зависимости от Африки и Китая, мы должны возродить французскую горнодобывающую промышленность и сельское хозяйство. Субсидирование этих двух отраслей подстегнет экономический рост и поможет создать рабочие места как для граждан, так и для иммигрантов. Кроме того, это позволит нам поддерживать нашу широкую систему социальных услуг. Подобные изменения пойдут на пользу не только нам, но и нашим союзникам. Которые получат огромную выгоду, получая руду из наших шахт и продовольствие с наших ферм."
 FRA_EU_The_Global_Project: "Глобальный Проект"
 FRA_EU_The_Global_Project_desc: "Что такое Франция, как не маленький кусочек в огромной головоломке, которую представляет собой мировое сообщество? Многие попытаются отрицать это. Но для нас очевидно, что мы служим цели более важной, чем просто дальнейшее существование нашей страны. Мировое сообщество подобно огромной паутине, сложной сети торговых соглашений и альянсов. Если мы хотим укрепить чувство глобального единства среди нашего народа, мы должны подключиться к этой сети. Это не только поможет укрепить чувство единства среди наших людей, но и привлечет иностранную рабочую силу и экспертов. Это внесет большой вклад в процесс восстановления."
 FRA_EU_United_Under_Humanity: "Объединенные под Эгидой Человечества"
 FRA_EU_United_Under_Humanity_desc: "Наконец-то мечта стала реальностью. То, что когда-то считалось невозможным, наконец-то оказалось возможным. На смену ядовитым идеям национализма и исключительности пришла открытость к людям всех мастей. Некоторые консервативные остатки продолжают пинаться и кричать. Они осуждают нас за то, что мы якобы продались глобалистам и предали французский народ, но мы-то знаем правду. Никогда еще Франция не была такой единой и свободной. Мы становимся сильнее, когда переступаем через национальность и сосредотачиваемся на том, что действительно важно. Тот факт, что независимо от того, кто мы, мы все люди."
 FRA_EU_Mankind_Redefined: "Человечество, Усовершенствованное"
 FRA_EU_Mankind_Redefined_desc: "История не была благосклонна к тем, кто хочет переосмыслить понятие "человечество." Чаще всего этот термин использовался диктаторскими режимами для оправдания преследования меньшинств. Однако для нас это не может быть дальше от истины. Мы не стремимся унижать людей. Мы стремимся их возвысить. Чтобы обеспечить всеобщее процветание, мы должны относиться ко всем одинаково. Такие мелочи, как раса, этническая принадлежность или национальное происхождение, больше не будут препятствием на пути. Мы должны быть готовы отбросить эти нелепые идеи и принять человечество таким, какое оно есть на самом деле. Концепция, призванная объединять, а не разделять."
 FRA_EU_The_Will_to_Grow: "Желание Расти"
 FRA_EU_The_Will_to_Grow_desc: "Прогресс никогда не приходит сам собой. Кто-то должен быть рядом, чтобы подтолкнуть его к действию. Но как только это происходит, прогресс невозможно остановить. При всех своих успехах Пятая республика не смогла обеспечить поддержание прогресса. Желание развиваться сменилось ленью и апатией, а молодежь довольствовалась тем, что имела. И пока мы бездельничали, русские продвигались вперед. И наша неспособность должным образом догнать врагов в конечном итоге привела к тому, что мы пали от их рук. Чтобы получить преимущество над нашими врагами, мы должны любой ценой добиваться прогресса и роста. Объединившись с нашими европейскими союзниками, мы ускорим гонку за ростом. Ускоримся к процветающему и свободному будущему."
 FRA_EU_Curing_Industrial_Ailments: "Лечение Промышленных Заболеваний"
 FRA_EU_Curing_Industrial_Ailments_desc: "На протяжении большей части своей истории Франция находилась на переднем крае промышленного прогресса. Со времен первой промышленной революции и до сегодняшнего дня французская промышленность славится своими инновациями во всем мире. Однако столь стремительная индустриализация Франции далась ей дорогой ценой. Стремясь превратить Францию в промышленную державу, мы способствовали потеплению климата. И сейчас, когда мы движемся вперед по пути реконструкции, мы должны пересмотреть нашу позицию в отношении индустриализации. Хотя промышленность необходима для функционирования любой страны, мы должны признать, что она не обходится без затрат."
 FRA_EU_The_Technological_Spearhead: "Технологический Прорыв"
 FRA_EU_The_Technological_Spearhead_desc: "Рассвет XXI века ознаменовал собой период стремительного технологического прогресса. Подобно гонке вооружений времен холодной войны, компании соревновались в том, кто окажется на переднем крае инноваций. Никогда еще технологии не имели такого значения для выживания нации. Инновации в области беспилотников и кибервойн позволили странам наносить удары по уязвимым объектам инфраструктуры, сохраняя при этом своих солдат в безопасности. Если мы хотим иметь шанс противостоять русскому медведю, то должны ускорить свой технологический рывок. Ведь если мы не опередим, то отстанем и будем уничтожены нашими врагами."
 FRA_EU_Removing_the_Red_Tape: "Устранить Бюрократическую Волокиту"
 FRA_EU_Removing_the_Red_Tape_desc: "На протяжении всей истории прогресс всегда тормозился неэффективной бюрократией. Правила безопасности, переговоры с профсоюзами, бюджетные ограничения. Все это лишь замедляет развитие общества. Мы не можем позволить себе продираться сквозь бюрократические сети, чтобы наши планы отвергались. Сократив эти системы, мы сэкономим время и деньги. А новые революционные проекты будут утверждаться быстрее, что позволит начать их реализацию в рекордно короткие сроки. Некоторые будут выражать беспокойство по поводу правил безопасности, но в конечном итоге эти сокращения - необходимое зло. Если мы хотим перенести Францию в будущее, нам придется пойти на сокращение расходов."
 FRA_EU_The_Public_Private_Enterprise: "Государственно-Частное Предприятие"
 FRA_EU_The_Public_Private_Enterprise_desc: "Хотя нам удалось превратить Францию в технологическую державу, мы можем сделать еще больше. Во Франции всегда было много частных предпринимателей, готовых помочь в финансировании государственных проектов. Несмотря на это, прошлые лидеры никогда не использовали эту возможность в полной мере. Опираясь почти исключительно на государственное предпринимательство, мы застопорили прогресс и инновации. Однако мы не будем повторять ошибок прошлого. Будущее никого не ждет. И если мы не будем готовы работать с частными предпринимателями и новаторами, то никогда не сможем его постичь. "
 FRA_EU_The_Gears_Turn_Again: "Шестеренки Вращаются"
 FRA_EU_The_Gears_Turn_Again_desc: "Экономика Франции похожа на очень совершенную машину. Когда все шестеренки работают слаженно, можно делать великие дела и внедрять инновации в рекордно короткие сроки. Но если что-то не так, вся система ломается, и некогда отлаженная машина перестает функционировать. Когда Пятая республика пала, машина французской экономики снова пришла в упадок и развалилась. Однако после долгих испытаний и невзгод застоявшиеся шестеренки снова вращаются. Сердце снова бьется, и, подобно фениксу, мы поднимаемся над пеплом гниения и разложения. Теперь мы смело смотрим в будущее, готовые принять любой вызов, который встанет на нашем пути."
 FRA_EU_Walking_a_Green_Path: "Идя по Зеленой Тропинке"
 FRA_EU_Walking_a_Green_Path_desc: "Во второй половине XXI века Франция находится на переднем крае борьбы с изменением климата. С момента подписания Парижского соглашения по климату мы делаем все возможное, чтобы уменьшить наш углеродный след. От инвестиций в возобновляемые источники энергии до финансирования французских компаний по производству электромобилей. Тем не менее Пятая республика всегда была равнодушна к растущим разрушениям, вызванным деятельностью компаний, работающих на ископаемом топливе. Если мы хотим оставить собственное наследие, то должны удвоить "зеленую" инициативу. При содействии Брюсселя и Берлина мы будем добиваться полного перехода Франции на возобновляемые источники энергии, независимо от того, насколько сильно жалуются нефтяные компании."
 FRA_EU_the_Final_Goalpost: "Последний Финиш"
 FRA_EU_the_Final_Goalpost_desc: "С тех пор как появились первые тревожные сигналы, мы ведем войну против изменения климата. От подписания Парижского климатического соглашения до финансирования возобновляемых источников энергии - в этой борьбе было достигнуто много успехов. Однако мы не можем позволить себе впасть в апатию. Если мы не возьмем инициативу в свои руки, мы уже не сможем спасти мир. Как и Пятая республика, мы возобновим нашу приверженность возобновляемым источникам энергии и сократим выбросы углекислого газа. При поддержке Брюсселя и Берлина мы превратим Францию в страну будущего, в которой изменения будут происходить за счет возобновляемых источников энергии."
 FRA_EU_An_Invisible_Footprint: "Невидимый След"
 FRA_EU_An_Invisible_Footprint_desc: "С тех пор как мы начали бороться с изменением климата, появилась идея углеродного следа. Представляя, насколько человек, компания или страна способствуют ухудшению состояния окружающей среды, прошлые режимы вкладывали значительные средства в сокращение нашего углеродного следа. Но, к сожалению, этих усилий оказалось недостаточно, и наш углеродный след остается огромным по сей день. Время действовать - сейчас, не завтра и не на следующей неделе. Если мы не предпримем быстрых действий, чтобы заставить наш углеродный след исчезнуть, наши усилия окажутся напрасными. А если мы потерпим неудачу сегодня, то, возможно, никогда не сможем обеспечить безопасное будущее для наших детей."
 FRA_EU_The_Second_Star_in_the_Union: "Вторая Звезда в Союзе"
 FRA_EU_The_Second_Star_in_the_Union_desc: "Франция всегда была ключевым членом Европейского союза. С момента нашего вступления в 1958 году мы превратились из члена в лидера. Мы направляли и возглавляли расширение ЕС до того уровня, на котором он находится сегодня. Хотя мы и потерпели поражение перед лицом российской агрессии, мы не должны отказываться от мечты о единой Европе. Консерваторы и социалисты могут пинаться и кричать сколько угодно, но мы не будем слушать их бессвязные бредни. Понятие французской нации утратило свой смысл, и если мы хотим выжить. Тогда мы должны быть готовы отказаться от нее ради блага всех европейцев."
 FRA_EU_Blurring_the_Borders: "Размыть Границы"
 FRA_EU_Blurring_the_Borders_desc: "Что на самом деле представляют собой границы? Произвольные линии, начерченные на песке? Инструмент для разделения людей с помощью бесполезных идей вроде национализма? По правде говоря, все это правда. По мере того как мы приближаемся к осуществлению европейской мечты, мы должны отказаться от концепции границ. Единая Европа - это та, где люди могут свободно передвигаться, а идеи и видения могут свободно распространяться. Отбросить границы - значит освободиться от бремени, которое они несут. Люди больше не будут разделены произвольными границами. Мы больше не будем называть себя немцами или французами. Мы - европейцы, отныне и навсегда."
 FRA_EU_Quell_Nationalism: "Подавить Национализм"
 FRA_EU_Quell_Nationalism_desc: "Несмотря на нашу победу над милитаристами, все еще есть те, кто продолжает разглагольствовать о них. Они бунтуют днем и ночью, обвиняя наш режим в "продажности глобалистской элите" и "предательстве французского народа". В то время как предыдущий режим с презрением смотрел в другую сторону, мы не будем следовать этому подходу. Для того чтобы панъевропейская мечта была полностью реализована, национализм всех видов должен быть подавлен. Мы будем выводить националистов на улицу, громить их митинги и запрещать их партии. Некоторые осудят это как вопиющий авторитаризм, но это необходимое зло. Европа не будет единой, если мы позволим этим движениям сохраниться."
 FRA_EU_Popularizing_the_Pan_Euro_Ideal: "Популяризировать Панъевропейство"
 FRA_EU_Popularizing_the_Pan_Euro_Ideal_desc: "Несмотря на все усилия Вольта и других политических движений, панъевропеизм не так популярен, как должен быть. Партии, выступающие за ЕС, традиционно отходят на второй план, уступая место другим партиям. Если наша цель - единая Европа - действительно будет достигнута. Тогда мы должны сделать все возможное, чтобы поддержать эти партии. Финансировать их, проводить за них кампании. Все, что угодно, чтобы повысить их популярность. При поддержке проевропейские настроения поднимутся, как большая волна, по всей Европе. И мы должны оседлать эту волну поддержки, чтобы превратить идею единой Европы из мечты в реальность."
 FRA_EU_Uniting_our_Armies: "Объединение Армий"
 FRA_EU_Uniting_our_Armies_desc: "Франция всегда гордилась мощью своих вооруженных сил. От славных дней Наполеона до наших дней, сказать, что у Франции богатая военная история, было бы преуменьшением. По мере приближения к осуществлению панъевропейской мечты мы должны признать правду. Чтобы по-настоящему продвинуться вперед в достижении наших целей, мы должны начать объединять различные армии Западной Европы. Добровольная интеграция в расширенное командование ЕС будет свидетельствовать о нашей приверженности европейскому объединению. И хотя некоторые генералы могут спорить, наше решение будет окончательным. И в конечном счете оно направлено на великое благо всей Европы."
 FRA_EU_Beyond_our_Singular_Existance: "За Пределами Единственного Существования"
 FRA_EU_Beyond_our_Singular_Existance_desc: "Что такое Франция? Народ? Идея? Нация? Мы утверждаем обратное. Почему Франция не может служить какой-либо цели, кроме собственного существования? Консерваторы осуждают ЕС за то, что он является "инструментом глобалистов". Социалисты обвиняют его в "продолжении капиталистического угнетения". Но все они ошибаются. Как и немцы, мы должны признать, что понятие французской нации потеряло смысл. Будущее не будет благосклонно к нациям, которые отказываются меняться. И если мы откажемся идти в ногу со временем, то падем так же, как и все остальные нации."
 FRA_EU_The_European_Dream_Marches_on: "Европейская Мечта Марширует Дальше"
 FRA_EU_The_European_Dream_Marches_on_desc: "С момента своего образования в 1993 году ЕС превратился из небольшой коалиции в многонациональный альянс. С тех пор несколько единомышленников работали над тем, чтобы сделать общеевропейскую мечту реальностью. Многие думали, что идея единой Европы будет разрушена победой России в Восточной Европе, но это лишь придало нам сил. Она показала, что если мы не объединимся сегодня, то завтра погибнем, так и не осуществив мечту об объединении. Рассвет ознаменует собой важный поворотный момент в истории не только Франции. Но и всей Европы. Подобно фениксу, мы восстанем из пепла сильнее, чем прежде. И когда враги Европы придут, мы встретим их лицом к лицу. Ведь единство - наша сила, и ничто не сможет ее сломить."
 FRA_EU_Sister_Republic: "Дочерняя Республика"
 FRA_EU_Sister_Republic_desc: "У Франции всегда были уникальные отношения с ЕС. Хотя мы были одним из его основателей, недавние волны скептицизма в отношении евро поставили крест на панъевропейской мечте. Такие политики, как Земмур и Ле Пен, по-прежнему решительно выступают против любой интеграции в союз, утверждая, что Франция должна освободиться от его влияния. В качестве компромисса с этими группами мы откажемся от цели полного объединения в пользу тесного сотрудничества с нашими союзниками. Хотя Вольт и другие группы могут быть недовольны этим, это необходимая жертва ради блага нашего союза."
 FRA_EU_Europeanize_Paris: "Европеизировать Париж"
 FRA_EU_Europeanize_Paris_desc: "Париж, часто считающийся одним из самых популярных городов Франции и даже Европы, выдержал испытание временем. От переулков до катакомб, сами кирпичи излучают богатую историю города. Он является одним из величайших плавильных котлов. Здесь смешиваются культуры. И процветают идеи. К сожалению, город переживает не лучшие времена, и массовое запустение, вызванное Пятой республикой, привело к тому, что некоторые его части обветшали. В рамках нашего сотрудничества с ЕС мы начнем грандиозную кампанию по возрождению Парижа. Мы модернизируем его и приведем к стандартам других европейских столиц, таких как Берлин и Лондон."
 FRA_EU_A_New_NATO: "Новое НАТО"
 FRA_EU_A_New_NATO_desc: "С момента своего создания в 1949 году Организация Североатлантического договора, также известная как НАТО, служила Западу фронтом борьбы с авторитаризмом. Многие утверждают, что с распадом Советского Союза альянс устарел. Но это не может быть дальше от истины. В конце концов, неспособность НАТО защитить Восточную Европу от русской орды - достаточное доказательство ее несостоятельности. Однако мы не готовы отказаться от концепции НАТО. Пройдя через испытания и реформы, мы перестроим организацию так, чтобы она стала тем, чем она действительно была для меня. Не просто альянс во имя демократии. Но в настоящий фронт для Западной Европы. Тот, который действительно может противостоять авторитаризму медведевской России."
 FRA_EU_Advanced_Digital_Warfare: "Продвинутая Цифровая Война"
 FRA_EU_Advanced_Digital_Warfare_desc: "Война - это игра постоянных перемен. На войне ничто не остается неизменным. Все меняется со временем. От танка до самолета и беспилотных технологий. Никогда еще поле боя не было таким хаотичным. В эту эпоху передовых войн, если вы не идете в ногу со временем, вы будете уничтожены. Как и китайцы, мы начнем расширять свое подразделение кибервойск. Внедрение кибервойск в нашу армию, несомненно, даст нам преимущество перед нашими врагами. Мы сможем саботировать важнейшие объекты инфраструктуры и отключать коммуникации противника."
 FRA_EU_Embrace_AI: "Принять ИИ"
 FRA_EU_Embrace_AI_desc: "С начала XXI века поиски искусственного интеллекта открыли новые горизонты. Начиная с создания Siri, развитие ИИ только прогрессировало. В современном мире к ИИ относятся в лучшем случае со скептицизмом, а в худшем - с откровенной ненавистью. Хотя многие рассматривают ИИ через призму генерации, нас больше восхищают его военные возможности. В рамках нашего стремления привести армию в соответствие с современными требованиями значительные инвестиции будут направлены на интеграцию ИИ. Это не только модернизирует наши вооруженные силы, но и поможет сократить число человеческих жертв на фронте."
 FRA_EU_The_Cause_of_the_People: "Дело Народа"
 FRA_EU_The_Cause_of_the_People_desc: "С тех пор как была сформулирована мечта о единой Европе, мы делаем все возможное, чтобы воплотить ее в жизнь. Однако мы не должны забывать о людях, которым мы служим. До сих пор существует явный скептицизм по отношению к нашим целям. Многие считают, что это лишь происки элиты, а другие осуждают наши цели как продолжение корпоративного угнетения. Чтобы завоевать доверие людей, мы должны успокоить их страхи. Убедить их в том, что мы привержены народу, а не руководителю компании или глобалисту. Только завоевав доверие людей, мы сможем по-настоящему приступить к работе."
 FRA_EU_Democracy_Manifest: "Манифест Демократии"
 FRA_EU_Democracy_Manifest_desc: "Несмотря на радикальные изменения, произошедшие с французской нацией, одно осталось неизменным - наша приверженность демократии. В основе своей мы остаемся нацией, созданной народом и для народа. Правые и левые будут пытаться сказать, что мы "марионетки глобалистов" или "пешки корпораций", но правда говорит сама за себя. Наш долг - перед Францией и демократией. Будущее не только Франции, но и Европы по-прежнему под угрозой. Мы по-прежнему находимся под угрозой с Востока. И если мы не спасем демократию сегодня, завтра нас может настигнуть медведь."
 FRA_EU_Eliminate_Human_Casualties: "Исключить Человеческие Жертвы"
 FRA_EU_Eliminate_Human_Casualties_desc: "Ни одна страна не вступает в войну, рассчитывая на то, что не понесет больших потерь. Но почему все должно быть именно так? Война не за горами, и если мы хотим выйти из нее победителями, то должны сделать все возможное, чтобы предотвратить ненужные смерти. Будь то инвестиции в развитие медицины или технологии беспилотников. В качестве альтернативы мы могли бы заняться развитием кибернетики. Это позволит нам расширить боевые возможности наших солдат и повысить их эффективность на поле боя. Пусть мы и не сможем предотвратить гибель людей, но эти достижения позволят нам хотя бы свести ее к минимуму."
 FRA_EU_Cyber_Warfare_Department: "Произведите Революцию в Отделе Кибервойн"
 FRA_EU_Cyber_Warfare_Department_desc: "Электроника стремительно развивается с тех пор, как был создан первый компьютер. От смартфона до беспилотных летательных аппаратов. Новаторские достижения дали странам преимущество во время войны. Но если мы хотим добиться успеха в борьбе с медведем, мы должны быть готовы пойти дальше. Дроны и информационная война - это, конечно, хорошо, но этого недостаточно. Мы должны выйти за рамки того, что раньше считалось возможным. Эмпы, кибернетические имплантаты, роботы-солдаты - все эти концепции будут продвигаться вперед. Кто-то может поспорить об этичности этих инноваций, но нас это не касается. Обеспечение нашей победы означает, что мы должны быть готовы принять некоторые более неэтичные технологии."
 FRA_EU_Utilize_True_European_Allies: "Использовать Настоящих Европейцев"
 FRA_EU_Utilize_True_European_Allies_desc: "Наши неудачи в европейской войне показали нам, что мы не должны доверять тем, кто называет себя нашими союзниками. Когда Киев был захвачен, многие украинские чиновники без колебаний перешли на сторону России. Когда Польша была готова пасть, первыми откололись силезские сепаратисты. Предатели, предатели, оппортунисты - эти слова не описывают, кем на самом деле являются эти люди. В стремлении вернуть себе наше наследие мы должны верить только в настоящих европейских патриотов. Тем, кто готов поставить на кон свою жизнь во имя своих идей. Тех, кто останется верен своей стране, даже если это будет означать смерть. Эти истинные патриоты возглавят движение, когда мы вернем себе Восток. И помогут нам отомстить коллаборационистам."
 FRA_EU_Total_war_the_End_War: "Тотальная Война, чтобы Покончить с Войной"
 FRA_EU_Total_war_the_End_War_desc: "Как бы мы ни пытались отрицать это, мы должны смотреть правде в глаза. Сам европейский континент по спирали движется к новой войне. И на этот раз она будет еще более разрушительной, чем предыдущая. Судьба континента находится на острие ножа. Если мы не захватим его сами, то это сделают наши враги. Если мы хотим быть на вершине, мы должны быть готовы сделать все, что потребуется для победы. Наши солдаты больше не будут скованы ограничениями и кодексами. Вся наша ярость будет направлена на врага. И только победив, мы наконец-то опустим оружие. Не временно, а навсегда."
 FRA_EU_Dissolve_Executive_Authority: "Распустить Исполнительную Власть"
 FRA_EU_Dissolve_Executive_Authority_desc: "Несмотря на то что нам удалось интегрироваться в ЕС, многие институты должны быть упразднены. Если президентская система была необходима Пятой республике, то для нас ее назначение не имеет смысла. Францией больше не будет управлять президент или премьер-министр. Отныне за повседневными функциями французского правительства будет следить комиссия, состоящая из экспертов и представителей ЕС. Это облегчает переход Франции от президентской системы к системе комиссий. Некоторые могут протестовать против этого решения, но в конечном итоге это лучший исход."
 FRA_EU_Moratorium_of_Political_Debate: "Мораторий на Политические Дебаты"
 FRA_EU_Moratorium_of_Political_Debate_desc: "Несмотря на все наши усилия, многие аспекты нашего режима все еще не работают. Многие левые и правые продолжают пинаться и кричать, активно отказываясь работать с нашим правительством и даже занимаясь откровенным саботажем. Мы не можем позволить этим радикалам затормозить наш прогресс, иначе мы ничего не добьемся. С разрешения Берлина мы введем временный мораторий на все формы политических дебатов. Многие сочтут этот шаг противоречивым. Или даже откровенно авторитарным, но это временно. Как только переход от республики к комиссии будет завершен, мы отменим запрет на политические дебаты. Но пока мы должны использовать чрезвычайные меры, чтобы обеспечить наше правление."
 FRA_EU_European_Cooperation: "Европейское Сотрудничество"
 FRA_EU_European_Cooperation_desc: "Сотрудничество исторически является основой любого хорошо функционирующего правительства. И наше не является исключением. Ориентиром нашего режима будет готовность открыто сотрудничать с нашими союзниками. Такие вещи, как торговые соглашения и совместные военные учения, будут использоваться для демонстрации нашей нерушимой приверженности европейскому проекту. Мы убедим наших союзников в Берлине, что мы не просто готовы к сотрудничеству. Но и активно стремимся к нему. Позволим нашему зарождающемуся альянсу расцвести в нечто большее. Не просто в союз, а в незыблемое братство."
 FRA_EU_Paying_our_Tithe: "Платить Свою Десятину"
 FRA_EU_Paying_our_Tithe_desc: "В современную эпоху ничто не достается бесплатно. Товары, услуги, коммунальные услуги - за все приходится платить. Как бы ни помогали наши союзники в восстановлении, это не было бесплатным. Большая часть Германии и даже стран Бенилюкса по-прежнему пострадала от русских диверсий и ракетных ударов. Хотя они без колебаний помогают нам в восстановлении, они будут ожидать чего-то взамен за помощь. Будь то ресурсы, рабочие или средства, от нас будут ждать помощи в восстановлении. Так же, как они помогли нам. Некоторые будут ворчать по поводу этого предполагаемого налога, но в конечном итоге в наших интересах заплатить. Это продемонстрирует нашу нерушимую приверженность общеевропейскому проекту."
 FRA_EU_Embolden_the_Euro: "Придать Смелости Евро"
 FRA_EU_Embolden_the_Euro_desc: "Евро, впервые созданный в 1996 году, можно считать одним из лучших достижений Европейского союза. Он не только выполняет функцию валюты, но и является символом единства. Его принятие различными правительствами, в том числе и нашим, стало свидетельством приверженности общеевропейскому проекту. Многие думали, что победа России на Востоке станет катастрофой для евро, но произошло обратное. Евро стал расти быстрее, а с нашим вступлением в Европейский союз он будет расти и дальше. Наша сила - это сила евро. А расширение прав и возможностей евро - это лишь один из шагов на долгом пути к полностью единой Европе."
 FRA_EU_Nation_of_Equality_and_Science: "Нация Равенства и Науки"
 FRA_EU_Nation_of_Equality_and_Science_desc: "Несмотря на неудачи руководства Макрона, мы не можем отрицать прогресс, достигнутый при Пятой республике. На смену консервативному застою и отступлению пришли прогресс и инновации. Масштабные инвестиции были сделаны в социальные услуги, а финансирование было направлено на технологические инновации. Мы смотрим в будущее, и вполне естественно, что мы продолжаем финансировать эти программы. Под нашим руководством Франция станет страной прогресса и инноваций. Стагнация сменится инновациями, регресс - прогрессом. С помощью наших союзников мы примем будущее с распростертыми объятиями. Мы готовы к любым вызовам, которые могут встать на нашем пути."
 FRA_EU_If_only: "Если Бы Только..."
 FRA_EU_If_only_desc: "Мы думали, что этого никогда не произойдет, но в конце концов это случилось. И что же мы делаем сейчас? Несмотря на наши недавние успехи, Европа по-прежнему расколота на две части. Как бы мы ни пытались отмахнуться от этого. Мы должны признать, что кто-то должен взять на себя вину. Если бы только эти популистские агитаторы прислушались к нам. Если бы только скептики ЕС были более открыты к нашим идеям европейского единства. Но вместо этого они этого не сделали. И посмотрите, где мы сейчас находимся. Наши союзники уничтожены или превращены Москвой в марионеток, а европейский континент расколот пополам. Если бы они только слушали. Если бы они только хотели слушать."
 FRA_EU_Iberian_Intervention: "Иберийская интервенция"
 FRA_EU_Iberian_Intervention_desc: "Несмотря на относительную изоляцию от европейской войны, Пиренейский полуостров не избежал ее последствий. После победы Медведева некогда мирный полуостров раздирает гражданская война. Радикалы и сепаратисты сражаются, надеясь на торжество своих взглядов. В то же время правительства полуострова отчаянно держатся за Мадрид и Лиссабон. Мы не можем просто сидеть сложа руки, чтобы не рисковать тем, что пророссийская группировка выйдет на первое место и будет угрожать нам с юга. Поэтому, получив разрешение Брюсселя, мы оперативно приступим к умиротворению полуострова. Раздавим радикалов и восстановим порядок на некогда мирных землях. Под знаменем европейского единства мы спасем Иберию от краха."
 FRA_EU_Our_Offer_to_Brussels: "Наше Предложение Брюсселю"
 FRA_EU_Our_Offer_to_Brussels_desc: "Несмотря на все, что мы сделали, наши союзники в Брюсселе по-прежнему перегружены. Взяв на себя обязательство управлять как Западом, так и Востоком, брюссельская администрация вынуждена работать сверхурочно, чтобы должным образом управлять обоими регионами. Мы не можем сидеть сложа руки и наблюдать, как наш союзник перегружен государственными обязанностями. Мы обратимся к Брюсселю с предложением. Мы возьмем на себя административные обязанности Западной Европы. А в обмен они получат долю от ее экономического производства. Это не только предотвратит перегрузку нашего союзника, но и продемонстрирует нашу приверженность европейскому проекту. Это позволит нам добиваться от них милостей в будущем."
 FRA_EU_Strangle_Populist_Rabble_Rousing: "Задушить Популистское Подстрекательство Толпы"
 FRA_EU_Strangle_Populist_Rabble_Rousing_desc: "Один из многочисленных провалов Пятой республики хорошо виден и сегодня. Несмотря на укрепление нашей власти, популистские партии продолжают сопротивляться нашему правлению. Они постоянно выступают с риторикой против ЕС и устраивают массовые акции протеста против нашего режима. В отличие от Макрона, мы не будем мягко обращаться с этими отъявленными негодяями. Если они не работают с нами, значит, они против нас, и их инакомыслие не будет терпеться. Мы обрушим молот на эти группы, заключим в тюрьму их лидеров и ограничим их передвижение. Они могут пинаться и кричать сколько угодно, но слушать их будет некому."
 FRA_EU_Post_Ideological_Governance: "Постидеологическое Управление"
 FRA_EU_Post_Ideological_Governance_desc: "По мере того как мы приближаемся к реализации европейского проекта, остается еще один момент, с которым мы должны разобраться. Концепция идеологии должна быть отменена, если мы надеемся дистанцироваться от Франции прошлого. По правде говоря, мы должны признать, что идея идеологии используется только для того, чтобы разделять людей. Если мы действительно хотим объединить наш народ, то эти идеи должны быть отброшены. Больше не будет консерваторов, либералов или социалистов. Эти ярлыки больше не будут использоваться для разделения людей или определения того, кто есть кто. Отныне мы все французы, независимо от того, что говорят эти ярлыки."
 FRA_EU_Never_Again_means_Now: "Никогда Больше - Значит Сейчас!"
 FRA_EU_Never_Again_means_Now_desc: "Когда Москва провозгласила победу, мы дали себе обещание. Никогда больше мы не потерпим поражения. Никогда больше наши мечты о свободной и единой Европе не будут разрушены оппортунистами и популистами. Никогда больше мы не позволим, чтобы свобода была уничтожена теми, кто хочет захватить власть только для себя. Но никогда больше - это не значит завтра или на следующей неделе. Это значит - сейчас! Настало время выступить против угрозы на Востоке. Настало время осуществить наши мечты о единой Европе. И если мы не возьмем бразды правления в свои руки сейчас, у нас никогда не будет другого шанса."
 FRA_Apologize_for_War_Contribution: "Ее Честь Восстановлена"
 FRA_Apologize_for_War_Contribution_desc: "Благодаря мужеству и самопожертвованию армия восстановила честь Франции. В самый мрачный час и на фоне ложных обвинений в поражении солдаты выстояли и доказали, что мы по-прежнему являемся державой, достойной имени Франции. Из пасти поражения мы вырвали великую победу - не только для нас, но и для всей Европы. Теперь, когда пятно поражения осталось позади, мы можем смотреть вперед и вместе со всей Европой идти к лучшему завтра. Мы надеемся, что украинцы возведут достаточно статуй, посвященных нам..."

 #Bitter Winner
 FRA_Demand_Increased_Reperations: "Увеличить Репарации"
 FRA_Demand_Increased_Reperations_desc: "Мы унизили русских, но одного этого недостаточно, чтобы заставить их заплатить. Мирный договор, который мы с ними подписали, был слишком мягким и позволил им избежать наказания за большинство своих преступлений. Большая часть нанесенного ими ущерба до сих пор не устранена, и если они не хотят, чтобы мы еще больше усложнили им жизнь, они заплатят. Что посеешь, то и пожнешь."
 FRA_Bloodied_Liberator_of_the_Caucasus: "Содержать Военные Гарнизоны"
 FRA_Bloodied_Liberator_of_the_Caucasus_desc: "Мы не можем позволить себе демобилизацию, пока не можем. Хотя многие провозглашают наступление новой эры мира, тайные действия, предпринимаемые внутри России, говорят об обратном. Поэтому мы будем продолжать снабжать и управлять военными гарнизонами на Кавказе, готовыми оперативно отреагировать на любую угрозу, которая может возникнуть. Русским не удалось обмануть нас в первый раз, и они не сделают этого в этот раз."
 FRA_Rip_out_the_Russian_Rot: "Вырвать Русскую Гниль с Корнем"
 FRA_Rip_out_the_Russian_Rot_desc: "На большей части территории, которую мы отняли у России, действуют террористы и сепаратисты, финансируемые их государством. Это сильно мешает нашим усилиям по восстановлению и государственному строительству. Русские делают все возможное, чтобы сделать эту землю как можно более непригодной для нас, и поэтому мы должны выгнать их. Они потеряли эту землю, и им придется иметь дело с последствиями."
 FRA_Negotiate_Exclusive_Treaty_Ports: "Вести Переговоры о Договорных Портах"
 FRA_Negotiate_Exclusive_Treaty_Ports_desc: "Русские находятся в дипломатической изоляции и под жесткими санкциями с тех пор, как провалился их маленький "подвиг" в Восточной Европе, но теперь мы готовы предложить им спасательный круг. Если русские захотят открыть несколько своих портовых городов для западной торговли и инвестиций, мы будем рады немного смягчить их наказание. Если же они откажутся, что ж, это их упущение."
 FRA_Caucasian_Resource_Rights: "Права на Ресурсы Кавказа"
 FRA_Caucasian_Resource_Rights_desc: "Под горами и равнинами Кавказа скрываются огромные запасы природных ресурсов. Мы настолько помогли этому региону, что теперь имеем на него большое влияние, а многие политики обязаны нам своими услугами. Французская экономика и вооруженные силы всегда требуют больше ресурсов, и им все равно, откуда они берутся. Это небольшая цена, которую они готовы заплатить в обмен на нашу постоянную защиту."
 FRA_Fund_Ukrainian_Peacekeepers: "Финансировать Украинских Миротворцев"
 FRA_Fund_Ukrainian_Peacekeepers_desc: "Украинский народ достойно сражался с русским натиском, и теперь он прилагает все усилия, чтобы усмирить земли, которые мы освободили от захватчика. К сожалению, все наше внимание сосредоточено на Кавказе, и мы не можем направить дополнительные войска на помощь украинцам. Однако мы можем финансировать их усилия, ведь более слабая Россия означает более легкое будущее для нас."
 FRA_The_Caucasian_Entente: "Кавказская Антанта"
 FRA_The_Caucasian_Entente_desc: "Пришло время сделать наши обязательства перед Кавказом полностью официальными. До сих пор мы просто снабжали и финансировали их, но теперь мы можем сделать шаг вперед. Эти страны будут приглашены в НАТО, чтобы им больше никогда не приходилось беспокоиться о русских. Те, кто откажется, не будут освобождены от нашей защиты, потому что мы никогда не подумаем отказаться от наших трудов и инвестиций. Пока мы стоим на ногах, Кавказ будет оставаться свободным."
 FRA_The_Caucasian_Entente_tt: "Это создаст пакт о взаимной обороне между Азербайджаном, Арменией, Кубанью, Грузией и возглавляемой великой нацией Францией, чтобы гарантировать, что Россия никогда больше не встанет на ноги."

 #Respectful Victory
 FRA_Prevent_Another_Weimar: "Предотвратить Второй Веймар"
 FRA_Prevent_Another_Weimar_desc: "Крах Веймарской республики в XX веке, порожденный унижением и хаосом, в конечном итоге привел к катастрофе на руинах демократии. Падение России в XXI веке служит суровым предупреждением: мы не должны допустить, чтобы раздробленная Москва повторила это падение к экстремизму и мести. Франция будет играть ведущую роль в обеспечении того, чтобы послевоенное восстановление России шло по пути стабильности и мира."
 FRA_Democratization_of_Eastern_Minds: "Демократизация Восточных Умов"
 FRA_Democratization_of_Eastern_Minds_desc: "Поражение России открыло двери демократии для Восточной Европы. Как защитники европейской свободы, мы возглавим преобразования в мышлении во всем регионе. От Варшавы до Киева мы будем поддерживать образовательные инициативы, свободу СМИ и гражданское общество, обеспечивая выход народов Восточной Европы из авторитарных тенет. Семена демократии пустят корни, расцветут и изменят облик Востока."
 FRA_Demand_Ukrainian_Leniancy: "Требовать от Украины Снисхождения"
 FRA_Demand_Ukrainian_Leniancy_desc: "Украина заплатила тяжелую цену в войне против России. Мы чтим их жертву, но победа не должна стать поводом для чрезмерных требований. Мы будем призывать Украину проявлять сдержанность в послевоенных территориальных претензиях и репарациях, способствуя примирению, а не недовольству. Только отбросив ненависть, Украина и Европа смогут вместе построить прочное и стабильное будущее."
 FRA_UKR_leniancy_tt: "Если [UKR.GetFlag] Украина откажется занять более мягкую позицию по отношению к российским гражданам в своих [KBK.GetFlag] оккупационных правительствах, мы предпримем против них экономические и политические меры."
 FRA_Denounce_Azov_Influence: "Осуждать Влияние Азова"
 FRA_Denounce_Azov_Influence_desc: "Эйфория победы не должна быть омрачена токами экстремизма. Мы наблюдаем рост влияния "Азова" в Украине - его радикальная идеология идет вразрез с демократическими ценностями. Мы публично осудим это влияние и будем добиваться от Киева решения этой растущей проблемы. Мир в Европе не должен быть омрачен призраком неонацизма - путь Восточной Европы к демократии должен оставаться незапятнанным."
 FRA_Capitalize_on_Caucasus: "Капитализация на Кавказе"
 FRA_Capitalize_on_Caucasus_desc: "Кавказ давно стал слабым местом в сфере влияния России - и возможностью для нас. С победой Москвы мы будем укреплять сотрудничество с государствами Кавказа, используя их ресурсы и стратегические позиции. От нефтяных месторождений Баку до торговых путей Тбилиси мы будем инвестировать в экономическое развитие и демократические инициативы, чтобы Кавказ стал союзником Европы, а не вассалом России."
 FRA_Uphold_Equality: "Поддерживать Равенство"
 FRA_Uphold_Equality_desc: "Равенство станет основой новой эры Европы. Независимо от расы, пола или происхождения каждый гражданин Европы должен иметь одинаковые права и возможности. Под нашим руководством от виноградников Шампани до деревень Восточной Европы все будут пользоваться плодами демократии."
 FRA_Eastern_Democracy_Manifest: "Явная Восточная Демократия"
 FRA_Eastern_Democracy_Manifest_desc: "Демократия в Восточной Европе - это не мечта, это необходимость. После падения России мы возглавим процесс демократизации Востока. От Балтийского до Черного моря демократические выборы, верховенство закона и гражданское участие сметут остатки авторитарного разложения. Свет свободы озарит Восток, и великая демократическая волна XXI века начнется именно здесь."

 FRA_VIC_Withdraw_from_integrated_command: "Выйти из Состава Объединенного Командования"
 FRA_VIC_Withdraw_from_integrated_command_desc: "Хотя мы успешно выиграли справедливую войну против российской агрессии, эта победа не может скрыть глубокие разногласия внутри НАТО или боль, которую испытывает наш народ. После того как Соединенные Штаты, некогда лидер западного мира, утратили свое доминирующее положение, конфликтов и споров внутри НАТО и ЕС было достаточно, чтобы заставить любого содрогнуться при воспоминании об этом. Единство и дружба, о которых говорят политики, оказались хрупкими перед лицом неопределенного будущего. К счастью, французский народ увидел правду и призвал к переменам. Устаревшая система должна быть демонтирована, и только так мы сможем заложить основу для новой эры. С этого момента Франция больше не будет участвовать в интегрированной командной структуре НАТО. Мы будем твердо стоять на стороне союзников, готовых сражаться рядом с нами."
 FRA_VIC_Our_Own_Direction: "Наше Собственное Направление"
 FRA_VIC_Our_Own_Direction_desc: "Вооруженные силы Французской Республики в очередной раз продемонстрировали свою мощь и принесли гордость нации в последнем конфликте. Боевая эффективность наших вооруженных сил, бесспорно, является одной из лучших в Европе. Это неоспоримый факт. Однако не из нелояльности к нашим союзникам, а из чувства ответственности мы должны обратить внимание на озабоченность наших офицеров и солдат по поводу слабости наших союзников в плане вооружения и дисциплины, как во время войны, так и после нее. Эти опасения заслуживают серьезного внимания со стороны наших политических лидеров и старших командиров. Чтобы сохранить независимость и наследие наших вооруженных сил, поддержать их высокую боеспособность и обеспечить Франции дальнейший статус великой военной державы, мы должны решительно отказаться от ошибочной идеи слияния французской армии в единые европейские силы. Мы должны продолжать уделять приоритетное внимание развитию наших собственных вооруженных сил."
 FRA_VIC_With_Distinction: "С Отличием"
 FRA_VIC_With_Distinction_desc: "От Орлеанского чуда до триумфа при Аустерлице, от обороны Вердена до освобождения Парижа от Третьего рейха, а теперь еще и сражаясь вместе с восточноевропейскими союзниками против русских захватчиков, - славная история и достижения французской армии пережили время и смену режимов. Боевой дух передается из поколения в поколение. В современных французских солдатах по-прежнему ярко проявляются рыцарские ценности и товарищество. Укрепляя это чувство единства через историю, мы также будем напоминать французскому народу о великих деяниях его предков и исторической ответственности, которую он несет сейчас. Военные будут служить образцом для французского общества, направляя нацию к выполнению ее миссии."
 FRA_VIC_The_Frenchmans_Burden: "Бремя Француза"
 FRA_VIC_The_Frenchmans_Burden_desc: "Ничто не вызывает у француза большей гордости, чем принадлежность к первой стране, свергнувшей тирана и добившейся независимости и процветания собственными силами. Вооруженные силы первой в мире демократической республики уже давно являются жизненно важной силой, способствующей укреплению национального единства. Это уникальное чувство ответственности станет основным элементом, объединяющим французское общество и укрепляющим французскую армию в грядущую эпоху. Мы покажем гражданам Франции и всему миру, что отстаивание и распространение идеалов свободы, равенства и братства является великой миссией французского народа - миссией, сформированной славной историей Франции и борьбой ее народа. Это обновленное гражданское самосознание приведет к глубоким изменениям во французской армии. Отныне они будут сражаться с двойной миссией - защищать настоящее и формировать будущее."
 FRA_VIC_The_New_Grand_Army: "Великая Армия"
 FRA_VIC_The_New_Grand_Army_desc: "Каждый год 14 июля, в День взятия Бастилии, французский народ отмечает национальный праздник. В этот день Париж превращается в море красных, белых и синих цветов, а представители элитной французской армии в унисон маршируют под Триумфальной аркой, символизируя силу и единство французского народа и непоколебимое достоинство нации. Блеск винтовок, латунные шлемы и красные плюмажи кавалерии, поднятые стволы и массивные гусеницы танков Leclerc внушают благоговение и гордость. Мы продолжим демонстрировать мощь французской армии, подчеркивая ее уникальность, пробуждая национальную гордость и напоминая солдатам об их основополагающем духе. Они будут знать, что не просто с энтузиазмом защищают родину - родина всегда с ними."
 FRA_VIC_Return_to_Old: "Старая Французская Армия"
 FRA_VIC_Return_to_Old_desc: "После периода восстановления и тщательной подготовки французская армия продемонстрировала свои лучшие качества, соперничая с непобедимыми войсками под предводительством Великого Конде, Наполеона, Фоша и Тассиньи. Армия доказала, что способна преодолевать суровые испытания, сохранять свою основную идентичность и сдерживать всех злонамеренных противников. Наши политические лидеры и высший генералитет очень довольны нынешним состоянием армии и полностью готовы задействовать эту грозную силу в любом будущем полномасштабном конфликте. Они уверены в великих победах, которые эта армия готова одержать."
 FRA_VIC_Strengthen_NATO: "Укреплять Наши Обязательства"
 FRA_VIC_Strengthen_NATO_desc: "Если кто-то все еще сомневается в решающей роли альянса НАТО в защите Европы - особенно после того, как Соединенные Штаты были слишком озабочены внутренним развалом, чтобы предложить поддержку, и после того, как агрессивная война России, движимой экспансионистскими амбициями, закончилась поражением, - значит, его взгляд опасно недальновиден. Такие взгляды могут нанести глубокий вред западной цивилизации. К счастью, политические лидеры нашей страны и наших союзников остаются непоколебимыми в своей приверженности пути Европейского союза. Они решительно пообещали укреплять военное сотрудничество, принимая ключевые решения для обеспечения будущего Европы. Будучи самой важной военной державой ЕС и главной силой, противостоящей восточным угрозам, французские вооруженные силы будут оставаться опорой европейской безопасности, всегда готовые к новому вызову."
 FRA_VIC_The_European_Army: "Европейская Армия"
 FRA_VIC_The_European_Army_desc: "Президент Эммануэль Макрон постоянно призывает к созданию "независимых европейских вооруженных сил." Однако эта инициатива неоднократно сталкивалась с противодействием со стороны Соединенных Штатов, и многие в Европе, все еще сохраняющие иллюзии в отношении США и России, сомневались в ее целесообразности. Они опасались, что провоцирование любой из сверхдержав может привести к катастрофическим военным или экономическим последствиям. Сегодня эти опасения оказались ошибочными. Европа больше не может позволить себе зависеть от какой-либо сверхдержавы в вопросах своей безопасности. Более того, маломасштабное военное сотрудничество между европейскими странами, существующее уже более сорока лет, продемонстрировало свою ценность во время недавнего конфликта. Настало время Брюсселю и нашим правительствам действовать решительно и работать над реализацией давней цели - создания "европейской армии.""
 FRA_VIC_Our_Place_in_Europe: "Наша Роль в Европе"
 FRA_VIC_Our_Place_in_Europe_desc: "Франция является политическим центром, экономическим двигателем и военным оплотом Европы - ее значение в современной Европе невозможно переоценить. На военном фронте, чтобы усилить нашу лидирующую роль и укрепить наши позиции в ЕС, мы будем способствовать более тесному сотрудничеству между французскими вооруженными силами и союзными войсками. Это включает в себя установление единых стандартов обучения, разработку скоординированных организационных планов, инициирование программ обмена кадетами и проведение комплексных многоуровневых совместных учений всех родов войск. Высокие стандарты и богатый опыт французской армии делают ее образцом для всех европейских вооруженных сил. По мере того как все больше стран-союзников будут перенимать французскую военную практику, наше влияние и потенциальный масштаб совместных сил, которые мы можем возглавить в будущих конфликтах, будут расти."
 FRA_VIC_The_French_European_Army: "Франко-европейская Армия"
 FRA_VIC_The_French_European_Army_desc: "После длительного сотрудничества и корректировок мы с гордостью можем сказать, что французская военная модель была принята несколькими европейскими странами. Французская система командования и боевые подразделения теперь легко интегрируются с боевыми подразделениями этих стран, что позволяет быстро сформировать боеспособные объединенные силы. Политические лидеры и военные из Парижа, Берлина, Брюсселя, Амстердама и Рима согласны с тем, что настало время создать постоянные совместные европейские вооруженные силы. Построенные на основе французского военного опыта, эти многонациональные силы объединят солдат из разных стран и на разных языках в миссии по защите европейской цивилизации. В этих усилиях французская армия и ее высшее командование будут играть центральную и незаменимую роль."
 FRA_VIC_A_Distinctly_French_Force: "Возобладание Французских Силы"
 FRA_VIC_A_Distinctly_French_Force_desc: "Если мы действительно ставим во главу угла безопасность Франции и Европы, мы должны отказаться от любых иллюзий и пустой риторики, которые могут помешать нашим действиям. После тщательных внутренних обсуждений наши политические лидеры и военные чиновники единодушно согласны с тем, что сохранение независимости французской армии - лучший способ обеспечить надежную оборону и защитить европейскую цивилизацию. Потенциальные проблемы, связанные с объединением европейских вооруженных сил, такие как путаница в командовании, языковые барьеры и культурные различия, являются ключевыми причинами отказа от плана создания объединенных сил. Франция продолжит оказывать поддержку союзным армиям на этой основе. Эта стратегия позволит французской армии сохранить гордость за себя, оставаясь сильнейшим защитником Европы и образцом для европейских сил."
 FRA_VIC_The_New_French_Army: "Новая Французская Армия"
 FRA_VIC_The_New_French_Army_desc: "Новый этап французской военной реформы близится к завершению, и мы можем с уверенностью заявить, что французская армия остается сильнейшей силой в Европе. По сравнению с собой прежней, французская армия стала еще более грозной для своих врагов, с более эффективной и устойчивой внутренней структурой, достигнув вершины как в нападении, так и в обороне. Марианна будет гордиться нашими достижениями, и все это было бы невозможно без смелых реформ, которые преобразили французскую армию."
 FRA_End_of_War: "Конец Войнам"
 FRA_End_of_War_desc: "Когда дым войны рассеивается, сладкий аромат мира вызывает ностальгию и бодрит. Русская угроза была нейтрализована, оставив ее бессильной и ожидающей своей участи. В этот момент победы среди французов, от лидеров до граждан, возникает общее желание как можно скорее прекратить состояние войны. Цель - снизить бремя военных расходов на общество и национальную экономику. Хотя опасения по поводу "саморазоружения" остаются, в ближайшее время в парламент будут представлены законопроекты о восстановлении мира и демилитаризации Европы. Французский народ верит, что в эту новую эпоху приверженности миру и коллективной силы населения будет достаточно, чтобы предотвратить любые амбиции по возрождению великих держав и проведению агрессивной военной политики."
 FRA_End_Conscription: "Прекратить Призыв на Военную Службу"
 FRA_End_Conscription_desc: "Призыв в армию имеет долгую историю во Франции, благодаря чему страна на протяжении веков содержит сильную и готовую армию. В периоды кризисов большое количество подготовленных граждан обеспечивало ценные резервные силы для удовлетворения неотложных потребностей. Недавний пример - война с Россией, где мобилизованные французские граждане проявили удивительную храбрость и способность к адаптации на поле боя. Хотя служение нации остается предметом гордости, мирные годы начала XXI века заставили французский народ задуматься о меняющихся обстоятельствах. Модель "гражданской армии" больше не подходит для ведения современной войны. Профессиональная армия теперь лучше приспособлена для выполнения задачи по защите нации."
 FRA_Surrender_the_Military: "Сдать Армию"
 FRA_Surrender_the_Military_desc: "Хотя наши политические лидеры решили, что Франция должна строить свои вооруженные силы и формировать военную стратегию в рамках единой европейской обороны, генералы Министерства обороны и Генерального штаба продолжают упорно сопротивляться. Цепляясь за свою гордость и корыстные интересы, они отказываются отдать даже самую малую толику власти, которой они так дорожат. В условиях быстро меняющегося и все более опасного европейского ландшафта мы не можем позволить себе тратить время на споры с ними. Используя подход "кнута и пряника," мы решительно сократим военные полномочия генералов для достижения наших целей, причем сделаем это с изяществом."
 FRA_VIC_surrendered_the_military_tt: "Это позволит передать §Gвсе наши вооруженные силы§! нашему надежному союзнику, [GER.GetFlag] Германии, а также создать §Yэлитные силы§! для повседневной обороны."
 FRA_Maintain_Military_Strength: "Поддерживать Военную Мощь"
 FRA_Maintain_Military_Strength_desc: "Министерство обороны и Генеральный штаб убедили наших политических лидеров в необходимости сохранения нынешней численности вооруженных сил. Франция больше не может позволить себе сосредоточиться исключительно на собственных интересах. Восточная угроза не полностью устранена, в ряде районов Европы продолжаются конфликты, а в Северной Америке, Восточной Азии и на Ближнем Востоке идут войны, приносящие огромные страдания. Постоянная риторика пацифистов не служит никакой реальной цели для нации и может вернуть нас в опасные времена 1940 года. Сильная и боеспособная французская армия сможет ответить на любой вызов, демонстрируя, что идеалы "Свобода, Равенство, Братство" остаются такими же жизненно важными, как и прежде."
 FRA_National_Demobilization: "Национальная Демобилизация"
 FRA_National_Demobilization_desc: "С точки зрения защиты суверенитета, безопасности и национальных интересов Франции, нынешняя численность армии является чрезмерной - больше, чем необходимо. Тема значительного разоружения уже не нова во французской политике и обществе, и сегодня будет официально принят ряд соответствующих мер. Сокращая излишки в армии, мы должны обеспечить, чтобы мы продолжали чтить и выражать благодарность храбрым воинам, которые пожертвовали собой ради защиты свободы и справедливости. В то же время мы будем ответственно относиться к делам ветеранов и создавать более стройные, элитные силы - закаленные в боях, способные к быстрому реагированию и успешному выполнению задач."

 FRA_VIC_The_conservative_revolution: "Консервативная Революция"
 FRA_VIC_The_conservative_revolution_desc: "Так называемый "конец истории", который обещали нам либералы, так и не наступил. Мир, который должен был наступить после распада СССР, так и не наступил. На самом деле мир сейчас находится в гораздо более нестабильном состоянии, чем всего пару десятилетий назад. Кроме того, наша страна пострадала в современную эпоху, и люди хотят перемен. Поэтому они волнами выходят на улицы, чтобы поддержать консерваторов, которые, вернувшись к власти, направят Францию на верный курс."
 FRA_VIC_Our_Bountiful_Economy: "Наша Процветающая Экономика"
 FRA_VIC_Our_Bountiful_Economy_desc: "Пандемия Ковид и крах Америки в значительной степени способствовали нескольким годам слабого экономического роста. Однако после того как угроза со стороны русских отошла на второй план, а европейское сообщество стало как никогда тесно переплетено между собой, наша экономика переживает бум. Теперь, когда нам больше не нужно беспокоиться о Востоке, мы можем гарантировать, что этот период экономического процветания не пройдет впустую."
 FRA_VIC_Economic_Patriotism: "Экономический Патриотизм"
 FRA_VIC_Economic_Patriotism_desc: "Наш недавний экономический рост можно объяснить только одним - упорным трудом французского народа. Поэтому решения, которые могут быть выгодны другим странам ЕС, будут отложены в сторону в пользу тех, которые принесут пользу нашему народу. Разумеется, мы не собираемся уклоняться от обязательств перед нашими европейскими братьями. Просто мы будем финансировать французский малый бизнес, а не румынский."
 FRA_VIC_Bask_in_the_Light: "Снова в Свете"
 FRA_VIC_Bask_in_the_Light_desc: "Наша напряженная работа полностью перевернула нашу экономику, и теперь люди ощущают ее последствия. Благодаря увеличению государственного финансирования государственные услуги достигли новых высот. Малый бизнес и корпорации ощутили на себе влияние наших субсидий и финансирования, а инфляция снизилась на несколько пунктов. Все больше людей имеют крышу над головой и пищу в желудке, и мы будем упорно работать над тем, чтобы эта тенденция сохранилась!"
 FRA_VIC_The_French_Golden_Age: "Золотой Век Франции"
 FRA_VIC_The_French_Golden_Age_desc: "Все наши труды увенчались этим моментом. На протяжении десятилетий Франция была похожа на себя прежнюю, отягощенную событиями XX века, и казалось, что 2020-е годы будут не лучше. Но затем происходили чудо за чудом, и теперь мы можем с уверенностью сказать, что вновь заняли место одной из величайших наций мира. Наши люди счастливы, наши вооруженные силы сильны, а наша экономика динамично развивается. Что бы ни ждало нас в ближайшие годы, мы встретим это с головой и сделаем все, чтобы наша нация оставалась единой и сильной!"
 FRA_VIC_Our_Native_Land: "Наша Родная Земля"
 FRA_VIC_Our_Native_Land_desc: "Франция существует уже очень давно, и, хотя ей пришлось пережить немало трудностей, мы всегда прилагали все усилия, чтобы сохранить нашу землю. После победы над русскими мы снова защитили ее от бед. Теперь мы можем обратить свой взор внутрь и сосредоточиться на том, чтобы наша великая республика соответствовала своей репутации. Мы не успокоимся, пока наши земли не будут использоваться в полной мере, и они не станут такими красивыми, какими должны быть."
 FRA_VIC_Spirit_of_Degaul: "Дух Шарля де Голля"
 FRA_VIC_Spirit_of_Degaul_desc: "Генерал де Голль - один из многих героев французской истории. Именно благодаря его усилиям наш дом был освобожден от фашистских захватчиков во время Второй мировой войны, и мы смогли так хорошо отстроиться после многих лет оккупации. Хотя его уже много лет нет в живых, дух, который он воплощал в себе, дух Франции, живет и сегодня! Французская нация должна оставаться свободной, а для этого мы должны оставаться сильными!"
 FRA_VIC_For_Every_Drop_of_Blood: "За Каждую Каплю Крови"
 FRA_VIC_For_Every_Drop_of_Blood_desc: "Победа в любой войне достается дорогой ценой, и нас не пощадили. Многие наши юноши и девушки погибли в боях с русскими войсками, отдав все силы, чтобы отразить их натиск. Они добились успеха, но их жертвы ничего не значат, если мы потратим их впустую. Мы должны использовать это мирное время, чтобы подготовиться к следующей большой войне и сделать так, чтобы на этот раз мы потеряли как можно меньше французов."
 FRA_VIC_Revile_Russian_Autocracy: "Поносить Российское Самодержавие"
 FRA_VIC_Revile_Russian_Autocracy_desc: "Хотя многие превозносят итоги европейской войны как предвестника новой эры российской демократии, любой человек, обладающий здравым смыслом, понимает, что ничего не изменилось. Да, сменилось руководство, и страна больше не является откровенно экспансионистской, но в основе своей это все та же Россия. Рано или поздно они вернутся, а до тех пор мы должны ослаблять их всеми возможными способами."
 FRA_VIC_Our_Free_People: "Наш Свободный Народ"
 FRA_VIC_Our_Free_People_desc: "Что такое Франция, если не нация свободных людей? Несмотря на то что наша свобода терпела неудачи и испытания, она никогда не была отброшена надолго благодаря труду французского народа. Наша недавняя победа над Россией доказала, что стремление к свободе у наших граждан не ослабевает, и они готовы сражаться, чтобы защитить ее. Свет свободы никогда не погаснет здесь, и мы сделаем все, чтобы это произошло."
 FRA_VIC_The_France_of_Today: "Современная Франция"
 FRA_VIC_The_France_of_Today_desc: "История Франции насчитывает более тысячи лет. От галлов, римлян, Карла Великого и Наполеона мы совсем не похожи на ту нацию, которой были когда-то. Но мы здесь не для того, чтобы обсуждать древнюю историю, все, что волнует всех, - это сегодняшний день. Сегодняшняя Франция - это нация, которая постоянно стремится обеспечить лучшую жизнь для своего народа, и пока консерваторы остаются у власти, это будет оставаться нашей целью."
 FRA_VIC_Denounce_Liberal_Authoritarianism: "Осуждать Либеральный Авторитаризм"
 FRA_VIC_Denounce_Liberal_Authoritarianism_desc: "Враги бывают разных форм и размеров, со всех уголков земного шара, поэтому логично, что они есть и в пределах наших собственных границ. Самая близкая к дому угроза исходит от крайне левых. Коммунисты, анархисты и многие другие не хотели бы ничего, кроме как разрушить нынешнюю политическую структуру и заменить ее чем-то гораздо более мерзким. Однако такое будущее должно оставаться лишь фантазией, поскольку мы сделаем все, чтобы не допустить его реализации."

 FRA_VIC_The_Red_Banner: "Красное Знамя"
 FRA_VIC_The_Red_Banner_desc: "Где будущее Франции? После победы над тиранами Востока и российским режимом, который нельзя назвать ни "либеральным", ни "демократическим", как Франция вступит в новую историческую эпоху? Народ Франции сделал свой выбор: левая Большая коалиция заняла неоспоримое место у власти. На этот раз они пришли к власти со смелыми амбициями - внести фундаментальные изменения во французское общество и построить по-настоящему ориентированное на людей государство. Они намерены использовать свой мандат для проведения преобразовательных реформ во Франции. Возможно, уже при нашей жизни мечта о красных флагах, развевающихся по всей Европе, станет реальностью."
 FRA_VIC_United_in_Equality: "Едины в Равенстве"
 FRA_VIC_United_in_Equality_desc: ""Равенство" - какое красивое слово. К нему стремилось бесчисленное множество поколений. От "утопических" королевств равенства, воспетых древними бардами, до великого общества, за которое боролись коммунисты-марксисты, идеал устранения всех идентичностей и классовых различий никогда не был оставлен. Сегодня, когда мы приветствуем возрождение нашей французской родины, мы несем этот идеал вперед, позволяя цветам равенства распуститься на земле свободы. Вдохновленные духом бесчисленных мучеников, мы верим, что все граждане объединятся с беспрецедентной солидарностью, чтобы внести свой вклад в это великое дело."
 FRA_VIC_Redefine_the_French_Citizen: "Переосмыслить Смысл Французского Гражданина"
 FRA_VIC_Redefine_the_French_Citizen_desc: "Что значит быть 'гражданином Франции'? У многих людей могут быть разные ответы на этот вопрос: место рождения, язык, культура или даже этническая и расовая принадлежность. Определение идентичности француза - важнейший шаг в формировании современного национального государства. Сегодня новый ответ на этот вопрос будет играть ключевую роль в определении направления наших социалистических реформ. Только объединив наше понимание этой концепции, мы сможем создать прочный фундамент для продвижения начинаний, которые действительно приносят пользу народу. Поэтому мы будем приветствовать любого гражданина, который идентифицирует себя с французской культурой и ценит ее, принимая всех людей, которые называют эту землю домом, во французскую семью. С гордой историей, полной славных моментов, французский народ сделает первый шаг в новую эру."
 FRA_VIC_End_Neo_Colonialism: "Покончить с Неоколониализмом"
 FRA_VIC_End_Neo_Colonialism_desc: "Неоколониализм, этот "кракен", порожденный интересами глобального капитала, терзает народы мира уже несколько десятилетий. Число стран и людей, которых он разорил, бесчисленно. Позорно, но Франция, старшая дочь западной цивилизации, когда-то поддержала злое дело угнетения людей с других континентов. Мы искупим наши прошлые ошибки с непоколебимой решимостью. В сердце темного континента французские освободители принесут свободу и справедливость. Мы торжественно обещаем вложить все наши ресурсы и силы, чтобы восстановить достоинство и принести счастье нашим собратьям, которые так много страдали. На этот раз жестокие колонизаторы будут полностью уничтожены, и вселенское солнце будет светить всем теплом."
 FRA_VIC_Revolution_without_Revolution: "Революция без Революции"
 FRA_VIC_Revolution_without_Revolution_desc: "Наконец-то мы добились успеха. Пережив бесчисленные бури, испытав моменты славы и печали, колокола Нотр-Дам де Пари сегодня звонят в честь великого дела французского народа. Жестокие и кровавые воспоминания о революции померкли. То, чего мы добились на французской земле, теперь можно назвать "революцией без революции". Французы сбросили атрибуты старой эпохи и стали первопроходцами нового времени. В этой великой стране, наполненной мечтами, процветанием, миром и дружбой, наша с вами история только начинается."
 FRA_VIC_Ground_Up_Army_Reform: "Масштабная Реформа Армии"
 FRA_VIC_Ground_Up_Army_Reform_desc: "Престиж и уважение, которыми долгое время пользовались французские военные, часто воспринимались как нечто само собой разумеющееся. Однако при ближайшем рассмотрении их состояния открывается менее лестная картина. Если мы хотим продвинуть запланированные реформы, военные - это первый серьезный вызов, который мы должны решить. На протяжении многих лет консервативные, реакционные взгляды и укоренившиеся иерархические структуры подавляли прогрессивные, ориентированные на людей голоса, что еще больше отдаляло военных от широких слоев французского общества. Поэтому мы должны полностью перестроить систему, смести старые порядки и очистить ее от пыли и мусора. Этот процесс неизбежно приведет к нестабильности и непредвиденным проблемам. Но, как гласит старая поговорка, 'Не разбив яиц, омлет не приготовишь.' В долгосрочной перспективе вооруженные силы, более тесно связанные с народом, создадут новую главу в истории Франции."
 FRA_VIC_Compensate_the_Veterans: "Выплатить Компенсацию Ветеранам"
 FRA_VIC_Compensate_the_Veterans_desc: "Не будет преувеличением сказать, что социалистический красный флаг сегодняшней Франции запятнан кровью бесчисленных воинов, храбро сражавшихся с восточными тиранами. Поэтому уважение и благодарность к этим героям не может быть излишней. Французское правительство будет выражать свою глубокую признательность ветеранам не только с помощью пропаганды, но и конкретными делами. Фермеры-пенсионеры получат землю и техническую поддержку, чтобы улучшить свою жизнь; честные рабочие, вернувшиеся в города и на заводы, получат щедрые пособия и гарантии занятости, обеспечивая счастье и покой тысячам семей. Мы докажем, что являемся более ответственным правительством, которое больше заботится о будущем наших национальных героев, чем буржуазные правительства прошлого". Ярко-красная лента Почетного легиона станет для них высшим знаком отличия."
 FRA_VIC_Demobilize_the_People: "Демобилизовать Людей"
 FRA_VIC_Demobilize_the_People_desc: "Препятствовать или замалчивать самостоятельную борьбу и законные требования народа - это последнее, что мы хотим делать. Это необходимо для того, чтобы мы могли считаться "народным правительством". Реформы могут стать реальностью только благодаря спонтанным действиям всего населения. Если плоды социального прогресса не будут бережно храниться и защищаться народом, они останутся лишь иллюзиями. По мере того как рассвет мира распространяется по Франции и Европе, настало время полностью снять все материальные и нематериальные оковы, сковывавшие французский народ. Отрадно видеть, как французские рабочие раскрывают свое творчество и инициативу, смело исследуют и стремятся, своими руками формируют видение свободной нации."
 FRA_VIC_Expand_the_Rights_of_Man: "Расширять Права Человека"
 FRA_VIC_Expand_the_Rights_of_Man_desc: "Как определить понятие 'права человека'? Некоторые утверждают, что права человека - это экономическое развитие и право на благополучную жизнь. Однако такой материалистический взгляд упускает из виду законные духовные потребности людей. Другие сосредотачиваются на таких понятиях, как 'свобода слова' и 'культурное разнообразие', но эти идеи часто становятся политическими вопросами, провоцируя конфликты и раскол. Чтобы не повторять ошибок прошлого, мы должны предложить новое определение, которое соответствовало бы современным национальным условиям Франции и ориентировало бы французский народ на будущее. Права человека должны выйти за рамки политических инструментов, а справедливость и принципы, отстаиваемые революционными борцами прошлого, будут возрождены в XXI веке."
 FRA_VIC_Form_A_Pink_Red_Coalition: "Розово-Желто-Красная Коалиция"
 FRA_VIC_Form_A_Pink_Red_Coalition_desc: "После многих лет борьбы за благосостояние французского народа прогрессивные силы французских левых наконец-то могут расправить крылья и принести в страну свежий социалистический ветер, развеяв мрак старой эпохи. Для этого необходимо создать широкую и прочную основу для управления на базе существующего партийного альянса. Новый народный фронт, состоящий в основном из ЛФИ, ПКФ, ПС и ЭЭЛВ, должен укрепиться за счет присоединения других левых партий, чтобы усилить свою мощь и внутреннее единство. В то же время он должен улучшить свои механизмы коммуникации и сотрудничества, став лучшим каналом для представления народа и отражения его мнения. Для Нового народного фронта эта новая эра означает начало новой борьбы. Однако при сильной поддержке французского народа все вызовы и препятствия могут быть преодолены."
 FRA_VIC_The_Left_Prevails: "Левые Одерживают Верх"
 FRA_VIC_The_Left_Prevails_desc: "Были и те, кто сомневался, что настоящий социализм может найти место в современной Европе. Даже если к власти приходила партия, называющая себя социалистической, ее часто возглавляла мелкая буржуазия, которая смешивала неолиберальные идеи, склоняясь перед крупным капиталом и корыстными интересами в обмен на сотрудничество. Но в сегодняшней Франции подобная риторика осталась в прошлом. Благодаря нашей победе над российским диктатором, легитимному выигрышу на выборах и проведению смелых социальных реформ левый альянс во Франции стал настоящей силой французской политики, заслужив искреннюю и горячую поддержку народа и преуспев во многих областях. Даже если остатки старого порядка откажутся признать свое поражение и попытаются подорвать наше дело, французский народ никогда этого не допустит."
 FRA_VIC_Peace_Land_and_Bread: "Мир, Земля и Хлеб"
 FRA_VIC_Peace_Land_and_Bread_desc: "Для среднестатистического француза счастливая жизнь может символизировать множество прекрасных вещей или просто включать в себя несколько самых заветных и необходимых потребностей. "Мир, земля и хлеб" - этот древний лозунг, передававшийся со времен Французской революции, пережил две мировые войны и остается актуальным по сей день. Он показывает, что даже самые глубокие страдания не могут разрушить надежды и мечты поколений. Как представители и верные слуги французского народа, мы позаботимся о том, чтобы эти вещи никогда больше не ускользнули из его рук. Это не только отражение истории, но и наша смелая декларация на будущее."

 FRA_VIC_The_Republic_Eternal: "Вечная Республика"
 FRA_VIC_The_Republic_Eternal_desc: "Сказать, что история Франции всегда была неспокойной, значит преуменьшить. От революций до чисток и оккупаций, периоды стабильности были очень редки. И, как и опасался Черчилль в эпоху холодной войны, русская угроза двинулась на запад, угрожая растоптать восточноевропейскую демократию и восстановить свою власть на европейском континенте. Но мы не остались безучастными. Мы стойко противостояли российской автократии. Мы не отступили перед непреодолимыми препятствиями. Сейчас, когда пыль оседает и оружие опускается, мы торжествуем победу над тиранией. Работая бок о бок с нашими союзниками, мы спасли Францию и Европу от уничтожения. Теперь мы смотрим в будущее, готовые встретить все, что выпадет на нашу долю. Мы уверены, что республика будет жить вечно, независимо от того, что нам предстоит."
 FRA_VIC_Divided_by_Ideas: "Разделенные Идеями"
 FRA_VIC_Divided_by_Ideas_desc: "Сказать, что Европа - это огромный континент идей, было бы преуменьшением. От "Левиафана" до коммунистического манифеста - этот континент был местом рождения многих идеологий, которые существуют и по сей день. На протяжении всей истории великие империи и мировые державы пытались навязать Европе единую объединяющую идеологию - от эпохи абсолютизма до "железного занавеса" времен холодной войны. Но почему мы должны пытаться навязать свой путь остальной Европе? Мы должны принять Европу такой, какая она есть на самом деле. Это гобелен не только наций, но и идей, где каждый может воплощать свои идеи и идеологии, не подвергаясь осуждению. "
 FRA_VIC_Past_the_Darkness: "Сквозь Тьму"
 FRA_VIC_Past_the_Darkness_desc: "Когда рухнули Соединенные Штаты, многие воспользовались их бедствием, чтобы заявить, что все наши драгоценные либеральные демократии находятся на грани краха, обречены на стагнацию и окончательное свержение радикальными силами. Однако наш триумф в борьбе с подражателями российских тиранов и их стремлением подчинить себе Восточную Европу доказал, что эти скептики ошибались. Конечно, нам еще предстоит решить множество проблем как на внутреннем, так и на международном уровне. Однако наша ценная либеральная система по-прежнему опирается на идеи дискуссий и демократического принятия решений, которые гарантируют, что какие бы бури мы ни пережили, мы сможем справиться с ними наилучшим для всех образом."
 FRA_VIC_Onto_the_Light: "Навстречу свету"
 FRA_VIC_Onto_the_Light_desc: "Тьма, наступившая в результате пандемии, и бедствия 2020-х годов не дают нам покоя. Однако мы справлялись с силами тирании раньше и справимся с ними снова, даже без наших американских благодетелей. Наш оптимизм, который когда-то называли глупым и ошибочным, позволил нам выйти из кризисов, которые обрушило на нас десятилетие, еще более сильными, чем прежде. Изменение отношения к жизни в стране способствовало более активному участию в политической жизни, повышению рождаемости и готовности наших людей сражаться и умирать за свои идеалы даже вопреки непреодолимым препятствиям. Пусть это будет эпоха, когда мы, наконец, обеспечим триумф либеральной демократии над силами авторитаризма и угнетения."
 FRA_VIC_The_French_Shining_Bright: "Франция Ярко Сияет"
 FRA_VIC_The_French_Shining_Bright_desc: "За последние несколько лет мы далеко продвинулись не только как нация, но и как единый французский народ. Многие думали, что наша страна, борющаяся с проблемами внутренней политики и ослаблением международного влияния, вскоре будет обречена на радикальную смену режима или порабощение иностранными державами. Однако теперь мы показали всему миру, что значит быть французом, сохраняя при этом цивилизованность и компромисс, ожидаемые от настоящей либеральной демократии. Наши основные экономические проблемы решены, дух воспрял от пламени битвы и братской борьбы с силами зла, и при этом мы не поддались соблазнам популистской демагогии. Давайте и дальше заботиться о том, чтобы Франция оставалась маяком либерализма, которым гордились бы наши предки, штурмовавшие Бастилию и положившие конец Древнему режиму, если бы могли видеть его сегодня. А вместе с ней мы продолжим быть благодетелями единой Европы, способной противостоять силам тирании, гарантируя, что каждая нация, независимо от размера и силы, сможет вместе чувствовать себя непобедимой перед любыми угрозами, которые встанут на нашем пути.\n\nВажно отметить, что в момент нашего триумфа с востока приходят вести о том, что Россия зализывает раны, готовясь раз и навсегда уничтожить наши демократии. Мы прекрасно понимаем, что если наша нация, свет, который она излучает на континент и остальной мир, потускнеет, то мы увидим, что станем жертвами тиранов, еще худших, чем те, с которыми мы столкнулись во время европейской войны. Они не дадут нам той "пощады", которую готовы были оказать в предыдущей войне, и нам придется встретить потоки их авторитарной ярости ослепительным светом свободы, который мы источали на протяжении веков. Давайте сделаем так, чтобы, когда мы снова встретимся с тиранами Востока, они получили отпор с оглушительным криком, который звучал и будет звучать на протяжении веков... \n\n§B"VIVE LA FRANCE!"§!"
 FRA_VIC_Fraternity_of_Nations: "Братство Народов"
 FRA_VIC_Fraternity_of_Nations_desc: "Европейское единство - своеобразная концепция, горячо поддерживаемая одними и отвергаемая другими. Однако во времена тьмы именно коллективная сила европейских народов побеждала зло. Будь то уничтожение нацистской империи Гитлера или наша недавняя победа над жаждущим войны русским медведем, если бы мы не объединились вместе, чтобы победить тиранию, то нас бы разделили и вырезали по одному. Однако война еще не закончена. Хотя мы и задержали продвижение России, Москва зализывает раны и готовится отомстить. И если мы не укрепим нашу приверженность коллективной безопасности, то они догонят нас и разрушат все, что мы построили. "
 FRA_VIC_Cement_our_place_in_Europe: "Наша Континентальная Роль"
 FRA_VIC_Cement_our_place_in_Europe_desc: "Даже если русские уже не в силах справиться с ними, мы должны помнить о той роли, которую мы играем в обороне нашего континента. У нас не только одни из самых мощных вооруженных сил во всей Европе, но и наша промышленная база является основой, на которую могут опираться еврозона и единый европейский рынок. Учитывая это, укрепление этих систем позволит нам не только укрепить свои позиции в качестве защитника европейских ценностей, но и укрепить свое влияние, чтобы встать в один ряд с такими странами, как Германия и Великобритания, в качестве лидеров Европы. Кроме того, если мы не справимся с этим долгом, кто скажет, что возрождающаяся Россия или другая сила тирании уничтожит ценную свободу и общее братство на нашем континенте?"
 FRA_VIC_Europe_United: "Европа, Объединенная"
 FRA_VIC_Europe_United_desc: "Войну, которую мы только что закончили, часто называют "европейской". В ней мы как континент противостояли натиску русской тирании без помощи американцев, которые, по мнению многих, были нашей единственной линией обороны. Мы доказали, что вместе, как единый континент, мы можем и будем противостоять любой угрозе, которая встанет на нашем пути. Исходя из этого, мы должны обеспечить таким организациям, как Европейский союз, поддержку, необходимую для обеспечения большей сплоченности и сотрудничества Европы, что уже принесло свои плоды в недавней истории. Хотя и не в такой степени, как некоторые федералисты, продвижение дальнейшей экономической и военной интеграции будет иметь важное значение для обеспечения того, чтобы наш континент смог пережить грядущую бурю от возрождающейся России или других угроз, которые стремятся навязать свою волю нашим дорогим демократиям."
 FRA_VIC_Strong_in_our_Resolve: "Сила в Нашей Решимости"
 FRA_VIC_Strong_in_our_Resolve_desc: "Последние несколько лет научили нас тому, что в мире, в котором мы живем, нет места для самоуспокоенности. Если бы мы не провели успешную ремилитаризацию, отсутствие американской поддержки в НАТО оставило бы нас беззащитными перед восточным натиском, что, вероятно, привело бы к гибели либеральной демократии в Европе. Однако наша решимость в противостоянии этим угрозам, как внутренним, так и международным, показала, что мы можем и будем противостоять этим геополитическим угрозам. Однако сейчас мы видим, как многие снова впадают в самодовольное превосходство в свете нашей победы, полагая, что наш триумф над русским медведем будет последним, с которым нам придется столкнуться. Но даже одержав победу, мы должны оставаться твердыми в своей решимости, готовыми и желающими противостоять не только угрозам с Востока, но и угрозам в других частях света. Если мы этого не сделаем, то окажемся в руках тиранов, еще более страшных, чем те, с которыми мы только что столкнулись, - судьба, ради предотвращения которой стоит умереть."
 FRA_VIC_United_in_Liberty: "Объединенные Свободой"
 FRA_VIC_United_in_Liberty_desc: "Свобода подобна неугасающему огню. Когда оно загорается, его нельзя потушить, можно только приглушить. Концепция свободы восходит к таким великим философам, как Джон Локк. Кто считается отцом либерализма? И чьи работы сыграли важную роль в разжигании пламени, которое привело к Французской революции. Побеждая тиранию и деспотизм, мы должны стремиться к осуществлению мечты Джона Локка. Под нашим руководством свобода засияет по всей Европе. Угнетенные будут освобождены, а угнетатели узнают о нашей праведной мести. И когда мы закончим, демоны тирании и ненависти будут изгнаны в тень до конца времен."
 FRA_VIC_Utmost_Equality: "Предельное Равенство"
 FRA_VIC_Utmost_Equality_desc: "Наша любимая республика прошла через множество форм правления, но с 1791 года мы всегда старались сохранить основные идеалы свободы, братства и, в особенности, равенства. Хотя наши законы смогли установить юридическое равенство, многие по-прежнему жалуются на отсутствие экономического или социального равенства, особенно в отношении маргинальных групп. Теперь, когда наши главные проблемы на международной арене решены, мы должны обратить свое внимание на решение этих проблем неравенства в нашем обществе. Радикалы могут кричать и вопить, но наши действия могут и будут говорить громче их ничтожных слов, если мы сделаем акцент на максимальном равенстве между нашими гражданами. Поступая таким образом, мы не только пожнем плоды на выборах, но и оправдаем свое имя, которого Французская Республика требовала со времен Робеспьера."
 FRA_VIC_The_End_of_History: "Конец Истории"
 FRA_VIC_The_End_of_History_desc: "Когда Советский Союз распался и мир, казалось, вступил в эпоху мира и процветания, это привело к формированию менталитета, который отдавал предпочтение либеральной демократии как системе, наиболее подходящей для человеческой цивилизации. В 1992 году Фрэнсис Фукуяма опубликовал свой фундаментальный труд "Конец истории и последний человек", в котором говорилось, что падение тоталитарного коммунизма ознаменовало собой начало конца истории в том виде, в котором мы ее знали. Однако с наступлением нового тысячелетия и нарастанием хаоса, вызванного войной с терроризмом, финансовым кризисом 2008 года и, в особенности, распадом Соединенных Штатов, многие посмеялись над его теорией, посчитав ее всего лишь выдачей желаемого за действительное, характерной для того времени. Однако наше сопротивление силам российской тирании заставило многих взглянуть на теорию Фукуямы с другой стороны: возможно, под нашим знаменем мы усовершенствовали и закрепили либеральную демократию в качестве руководящей идеологии Европы в XXI веке. Таким образом, мы должны считать себя представителями фукуямовской мысли, что мы принесем эру либерализма, которая превзойдет Соединенные Штаты, и в конечном итоге весь мир объединится под знаменем демократии, которая не будет уничтожена кризисом, с которым мы столкнулись.\n\nМы не будем и не сможем успокоиться, пока все, независимо от того, где находится эта планета, не будут свободны от авторитаризма. Давайте положим конец истории, в которой страдания и разделение - обычное дело, и начнем новую, в которой превыше всего будут Свобода, Равенство, Братство!"
 

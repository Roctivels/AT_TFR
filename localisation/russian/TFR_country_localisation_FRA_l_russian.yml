 france.9003.t.a: "Инвестиции в Академические Вопросы"
 france.9003.t.b: "Инвестиции в Сельскохозяйственные Вопросы"
 france.9003.t.c: "Инвестиции в Решение Проблем Бедности"
 france.9003.t.d: "Инвестиции в Решение Промышленные Проблемы"
 france.9003.t.e: "Инвестиции в Решение Социальных Проблем"
 france.9003.desc.a: "В последнее время появилось множество вопросов, касающихся академических вопросов, в дополнение к тем проблемам, о которых мы уже знали. К счастью, деньги помогают решить большинство вопросов.\n\nСколько мы должны инвестировать в академическое развитие?"
 france.9003.desc.b: "В последнее время появилось множество вопросов, касающихся сельского хозяйства, в дополнение к тем проблемам, о которых мы уже знали. К счастью, деньги помогают решить большинство проблем.\n\nСколько средств следует инвестировать в развитие сельского хозяйства?"
 france.9003.desc.c: "В последнее время стало известно о многих проблемах, связанных с бедностью, в дополнение к тем, о которых мы уже знали. К счастью, деньги помогают решить большинство проблем.\n\nКак много мы должны инвестировать в снижение уровня бедности?"
 france.9003.desc.d: "В последнее время появилось множество вопросов, касающихся промышленности, в дополнение к тем проблемам, о которых мы уже знали. К счастью, деньги помогают решить большинство проблем.\n\nСколько средств следует инвестировать в развитие промышленности?"
 france.9003.desc.e: "В последнее время появилось множество вопросов, касающихся общества, в дополнение к тем проблемам, о которых мы уже знали. К счастью, деньги помогают решить большинство проблем.\n\nКак много мы должны инвестировать в развитие общества?"
 france.9003.a: "Небольшие Инвестиции."
 france.9003.b: "Средние Инвестиции."
 france.9003.c: "Крупные Инвестиции."
 france.9003.d: "Масштабные Инвестиции."
 
 FPR_Purify_our_Revolution: "Очистить Революцию"
 FPR_Purify_our_Revolution_desc: "Революция - это не то, что может быть осуществлено всеми. Это нечто чистое, и заниматься этим должен авангард, который борется за народ. Теми, кто просвещен и кто может победить реакционные и контрреволюционные силы без пощады. С теми, кто откажется бороться, будет покончено."
 FPR_Purge_Capital: "Чистки Капитала"
 FPR_Purge_Capital_desc: "Капитал - это бог, которого можно убить. Так говорят многие. Однако капитал - это не бог. Это нечто ржавое, что можно легко вывернуть, просто срезав петли, это машина, которая постарела и ослабла. Это сорняк, который мы уничтожим одним рывком, вырвав с корнем все основы, которые он оставил в революционном государстве, независимо от последствий."
 FPR_Ban_Political_Opposition: "Запретить Политическую Оппозицию"
 FPR_Ban_Political_Opposition_desc: ""Оппозиция", в конечном счете, лишь инструмент, который другие могут использовать, чтобы затормозить нашу совершенную революцию. Это всего лишь инструмент, который может быть использован против народа, когда у правителей нет своих точных слов и спецификаций. Как таковой, он совершенно и абсолютно бесполезен. Посмотрите на хаос, который происходил в эпохи, когда пытались применить демократию. Конечно, она бессмысленна. С ней следует покончить, как и со столь же дряхлой и древней монархией."
 FPR_Cult_of_Reason: "Культ Разума"
 FPR_Cult_of_Reason_desc: "Все инструменты государства и философии должны быть направлены на философию революции и продолжение борьбы за нее. Не должно быть ни минуты передышки, не должно быть религии. Таким вещам нет места в революции. Все, что нужно делать, - это бороться, бороться, чтобы разорвать цепи реакции."
 FPR_Our_Greatest_Tradition: "Наша Величайшая Традиция"
 FPR_Our_Greatest_Tradition_desc: "Мы, французский народ, не возражаем против применения насилия и силы против тех, кто воюет против нас, и даже против тех, кто просто не воюет с нами. Поэтому мы не будем колебаться. Когда речь идет о нашей философии, мы не принесем ни одной жертвы, не сделаем ни одного шага назад по сравнению с тем, что было раньше. Ни одно действие против наших принципов рациональности не будет допущено."
 FPR_The_Rational_Renaissance: "Ренессанс Рационализма"
 FPR_The_Rational_Renaissance_desc: "Идеализм и утопизм, похоже, слишком распространены в революционных умах в наши дни. Это то, что мы будем отрицать и противодействовать этому, те истинно материалистические и рациональные мыслители будут поощряться и процветать в рамках якобинского режима, как это было в Америке. С неустойчивой и контрреволюционной утопической левой будет покончено, а на ее месте будет разбит прекрасный сад рациональности и разума."
 FPR_Establish_One_Party_Rule: "Однопартийное Правление"
 FPR_Replace_the_Red_Guard: "Турнуть Красную гвардию"
 FPR_Replace_the_Red_Guard_desc: "В так называемых "Стражах революции" нет ничего революционного. Они - всего лишь реакционный пережиток режима, с которым пора покончить, всего лишь человек, пытающийся захватить власть для себя. Они предатели нашего народа, они отвратительные приверженцы правых и антиреволюционных методов. Они будут отрезаны по самую шею. Всех до единого."
 FPR_Restore_French_Pride: "Гордость за Свое Существование"
 FPR_Restore_French_Pride_desc: "В то время как наши союзники, похоже, пренебрегают историей Франции и ее французской культурой как чем-то второстепенным, мы поступаем совсем наоборот. История Французской революции, действия и храбрость Робеспьера, а также так называемое "царствование террора" - это то, что нужно праздновать, а не то, что нужно отрицать. Гордитесь и живите счастливо, зная, что вы - француз."
 FPR_Establish_the_War_Cabinet: "Революционный Военный Кабинет"
 FPR_Establish_the_War_Cabinet_desc: "Угроза фашизма на востоке - это не то, что мы можем игнорировать, реакционное по своей сути русское государство снова поднимает голову против нас. Мы должны предпринять активные шаги против них, сформировать наш собственный военный совет, нашу собственную защиту от этих контрреволюционных сил в нашем мире, и быть теми, кто нанесет по ним первые удары."
 FPR_Establish_the_Sister_Republics: "Дух Дочерних Республик"
 FPR_Establish_the_Sister_Republics_desc: "Как и Первая французская республика, мы должны смотреть вовне, уничтожать любую угрозу, которая надвигается на нас, еще до того, как она станет угрозой. Мы должны распространить идеологию якобинизма по всей Европе, освободить ее как брата и сестру Франции. Только тогда мы все будем свободны."
 FPR_sister_republics_tt: "Это даст нам возможность потребовать от ближайших союзников подчиниться славе нашей идеологии и стать §RРеспубликами§! как во времена Первой Республики."
 FPR_An_Army_of_the_Party: "Армия Леомен"
 FPR_An_Army_of_the_Party_desc: "Когда с нашими врагами покончено, а все "союзные" силы против нас отправлены на свалку истории, Франция и сама ее душа могут быть направлены на войну. Каждый атом, который у нас есть, должен быть направлен на уничтожение угроз нашей революции, на уничтожение реакционеров, которые угрожают нам извне. Через свинец и кровь будущее будет освобождено."
 FPR_Supreme_Continental_Authority: "Высшая Континентальная Власть"
 FPR_Supreme_Continental_Authority_desc: "L'Ascension de la Révolution.\n\nКак и во время первой революции, нет силы, способной противостоять ее мощи, нет врага Революции, способного помешать народу свергнуть фальшивые революции и диктаторские режимы прошлых веков. Больше никто не будет бороться против истинной свободы, больше история свободы не будет запятнана ложью и слухами против ее истоков.\nРобеспьер улыбается. Даже в смерти его мечта была достигнута."

 FPR_jacobin_category: "Новое Просвещение"
 FPR_jacobin_category_desc: "\n\n\n\n\n£GFX_FPR_new_elightenment_cat\n\n\n\n\n\n\n\nФранцузская нация - это то, что давно забыло идеологию разума и свободы, изобретенную во время Первой революции, а затем заново придуманную Мопеном. Наши "союзники" слева полностью отказались от пути в будущее из-за страха.\n\nСтрах - враг прогресса. Страх - враг рациональности и барьер на пути к будущему. Революция невозможна без уничтожения подрывной деятельности."
 FPR_2nd_reign_of_terror: "Второе Царствование Террора"
 FPR_destroy_religious_sites: "Великое Освящение"
 FPR_promote_cultural_renaissance: "Разжечь Культурный Ренессанс"
 FPR_revolution_of_the_mind: "Революция Разума"
 FPR_tout_pour_la_patrie: "Tout pour la Patrie!"
 FPR_establish_sister_republic_decision: "Создать Сестринскую Республику"

 FPR_eternal_flame_of_reason_idea: "Вечное Пламя Разума"
 FPR_liberation_of_thought_idea: "Освобождение Мысли"
 FPR_laissez_prendre_idea: "Laissez-Prendre"
 FPR_vanguards_of_france_idea: "Авангарды Франции"
 FPR_jacobin_vive_la_revolution_idea: "Vive la Révolution"
 FPR_politicized_military_idea: "Политизированные Военные"
 FPR_revolutionary_war_cabinet_idea: "Кабинет Революционной Войны"
 FPR_the_continental_revolutionary_army_idea: "Континентальная Революционная Армия"
 
 FPR_regent_of_liberty: "Régent de la Liberté"

 FRA_Operation_Bastille: "§YOpération§!: Бастилья"
 FRA_Operation_Bastille_desc: "Франция впала в декаданс, ее фундамент рушится под действием коррупции и хаоса. Мы - новые якобинцы, и это наша декларация обновления, решительный удар, чтобы обеспечить наше будущее. Наши силы должны нейтрализовать оставшееся сопротивление во всех районах нашей любимой страны, обеспечить восстановление порядка на улицах и увидеть, как нация отвоевывает у анархии. С максимальной точностью и дисциплиной мы уничтожим инакомыслие, восстановим нацию и покажем народу Франции, что, как и наши однофамильцы, мы возьмем на себя мантию революции."
 FRA_Enforce_Martial_Law: "Ввести Военное Положение"
 FRA_Enforce_Martial_Law_desc: "Улицы превратились в поле боя, а каждый переулок - в потенциальную линию фронта. Хаос охватил то, что осталось от нашей нации, и только быстрые действия помогут навести порядок. Идеалы свободы можно защищать только в условиях выживания. На всех защищаемых территориях будут введены комендантский час, патрули и контрольно-пропускные пункты. Именно благодаря силе и дисциплине Республика будет сохранена любыми средствами, даже с временным уничтожением некоторых свобод."
 FRA_Support_Princess_Elisabeth: "Новый Европейский Порядок"
 FRA_Support_Princess_Elisabeth_desc: "Европа слишком долго терпела поражение, раздробленная слабостью и пораженная упадком. Пришло время построить новый фундамент; континент, объединенный силой, чистотой и общей судьбой. Европа для европейцев, не омраченная внешней коррупцией или ложными обещаниями мультикультурных иллюзий. Для этого необходимо предпринять решительные действия. Франция не может позволить себе долго оставаться закрытой, пока сильные лидируют, а слабые отступают. Это неизбежность нового порядка."
 FRA_The_Hexigon_Policy: "Политика Шестиугольника"
 FRA_The_Hexigon_Policy_desc: "Франция - это не только государство, но и сердце Европы. Эта политика направлена на укрепление этого сердца, обеспечение безопасности наших границ и укрепление единой, непоколебимой воли. Внешнее влияние больше не будет диктовать нашу судьбу, ведь Шестигранник стоит как бастион порядка и решимости. Поддерживать эту политику - значит гарантировать, что будущее наших сородичей останется незапятнанным чужими руками."
 FRA_Utilize_Fascist_Paramilitaries: "Использовать Фашистские Военизированные Формирования"
 FRA_Utilize_Fascist_Paramilitaries_desc: "Франция - это не только государство, но и сердце Европы. Эта политика направлена на укрепление этого сердца, обеспечение безопасности наших границ и укрепление единой, непоколебимой воли. Внешнее влияние больше не будет диктовать нашу судьбу, ведь Шестигранник стоит как бастион порядка и решимости. Поддерживать эту политику - значит гарантировать, что будущее наших сородичей останется незапятнанным чужими руками."
 FRA_Emergency_Factory_Conversion: "Аварийное Переоборудование Заводов"
 FRA_Emergency_Factory_Conversion_desc: "Наши запасы вооружений достигли критически низкого уровня, а наши войска постоянно нуждаются в новой технике и пополнении запасов. Чтобы обеспечить адекватное оснащение наших армий, мы начнем экстренную конверсию нашей гражданской промышленности для поддержки военных усилий."
 FRA_National_Rebirth: "Национальное Возрождение"
 FRA_National_Rebirth_desc: "Шепот старого порядка утонул под маршем сапог. Знамена должны подняться там, где когда-то висел триколор, ибо разложение нации нельзя исправить, ее нужно возродить. Дисциплина заменит слабость; единство скрепит то, что было разрушено. Новая Франция выйдет из горнила нашего очарования, ее воля будет острой, ее сила - неоспоримой. Возврата быть не может, только будущее, которое мы создадим из пепла."
 FRA_Venerate_the_Lion: "Преклониться перед Львом"
 FRA_Venerate_the_Lion_desc: "Филипп Петен, Верденский лев, бессмертен в анналах истинно французской доблести. Его имя вызывает в памяти не только сияющий маяк национализма, но и стойкость и самопожертвование нашего народа. Мы будем чтить его наследие не только словами, но и делами, которые отражают его видение непоколебимой нации. Почитать его - значит почитать силу, которая однажды спасла нацию и снова приведет нас к спасению." 
 FRA_A_Bas_Les_Traitres: "A Bas Les Traîtres"
 FRA_A_Bas_Les_Traitres_desc: "Франция не сможет подняться, пока ее враги гноятся внутри. Гниль предательства, сотрудничества и инакомыслия должна быть выкорчевана без колебаний. Те, кто отвернулся от нации, не найдут ни убежища, ни прощения. Быстрыми и решительными действиями мы вычистим предателей из нашей среды и сделаем так, чтобы верность Франции не просто ожидалась - она требовалась."
 FRA_Disrupt_the_Plague_of_Socialism: "Уничтожить Чуму Социализма"
 FRA_Disrupt_the_Plague_of_Socialism_desc: "Сама идея социалистической мысли и программы должна быть очищена и искоренена с нашей земли, наши враги находятся под впечатлением, что социализм станет спасительной благодатью для французской нации, в то время как на самом деле он совершенно несовместим и оставит саму идентичность нашей нации разорванной и растерзанной, борьба здесь, мы должны устранить элементы марксистской идеологии раз и навсегда, Viva La France!"

 FRA_Secure_French_Oil_Interests: "Признать Преемника Саудовской Аравии"
 FRA_Secure_French_Oil_Interests_desc: "Установить дипломатические отношения с новым руководством Саудовской Аравии, будь то Аравийская Республика или Дом Сауда. Это признание направлено на укрепление альянсов и обеспечение стабильного партнерства, способствующего сотрудничеству в области производства энергии и региональной безопасности, а также укреплению влияния Франции в Персидском заливе."
 FRA_If_We_cant_have_it: "Утвердиться на Ближнем Востоке"
 FRA_If_We_cant_have_it_desc: "Стратегические инвестиции в Ближний Восток путем оказания финансовой поддержки ключевым союзникам, таким как Израиль и Турция. Эта инициатива укрепит отношения в регионе, способствуя стабильности и укреплению партнерских отношений, которые могут привести к заключению выгодных энергетических соглашений и усилению сотрудничества в сфере безопасности."
 FRA_Encourage_European_Economic_Sanctions: "Предоставлять Экономические Займы"
 FRA_Encourage_European_Economic_Sanctions_desc: "Предоставление целевых экономических кредитов преемственному правительству Саудовской Аравии для поддержки развития и стабильности. Инвестируя в экономику страны, Франция может укрепить двусторонние связи и стимулировать политику, соответствующую французским интересам, обеспечивая стабильный поток нефти и стратегическое сотрудничество."
 FRA_Redirect_Budget_to_Oil_Contracts: "Перенаправить Бюджет на Нефтяные Контракты"
 FRA_Redirect_Budget_to_Oil_Contracts_desc: "Перераспределить бюджетные ресурсы в пользу приоритетных нефтяных контрактов и инициатив. Это позволит эффективно направлять средства на обеспечение жизненно важных энергетических соглашений, укрепление энергетической независимости и усиление позиций Франции как ключевого игрока на мировом нефтяном рынке."
 FRA_Integrate_Oil_Contracts_into_Military_Budget: "Интеграция Нефтяного и Военного Бюджета"
 FRA_Integrate_Oil_Contracts_into_Military_Budget_desc: "Объединить нефтяной бюджет с военным финансированием, чтобы создать единый подход к энергетической безопасности. Интегрируя эти бюджеты, Франция сможет повысить свой стратегический потенциал и обеспечить адекватную поддержку военных операций за счет энергетических ресурсов, что в конечном итоге укрепит национальную оборону."
 FRA_Department_of_Oil_Production: "Département de la Production Pétrolière"
 FRA_Department_of_Oil_Production_desc: "Создание специального правительственного департамента, занимающегося вопросами добычи и управления нефтью. Этот департамент будет следить за разработкой внутренних и международных стратегий в области добычи нефти, координировать работу с заинтересованными сторонами в отрасли и осуществлять инициативы, направленные на повышение энергетической безопасности и эффективности производства во Франции."
 FRA_Reorganize_Civilian_Infrastructure: "Реорганизовать Гражданскую Инфраструктуру"
 FRA_Reorganize_Civilian_Infrastructure_desc: "Модернизация гражданской инфраструктуры для обеспечения роста добычи и распределения нефти. Эта инициатива включает в себя модернизацию транспортных сетей, хранилищ и перерабатывающих заводов для обеспечения эффективной работы. Модернизация инфраструктуры позволит Франции оптимизировать цепочку поставок энергоносителей и повысить общую экономическую устойчивость."
 FRA_Invest_in_Equinor: "Инвестироваться в Equinor"
 FRA_Invest_in_Equinor_desc: "Направление инвестиций в Equinor для поддержки инициатив в области возобновляемой энергетики и диверсификации источников энергии. Этот стратегический шаг направлен на то, чтобы соответствовать мировым тенденциям в энергетике и одновременно закрепиться на рынке инновационных энергетических решений. Поддержка Equinor позволит Франции занять лидирующие позиции на рынках как традиционной, так и устойчивой энергетики."
 FRA_Ration_Civilian_Oil: "Рацион Гражданского Нефти"
 FRA_Ration_Civilian_Oil_desc: "Внедрение системы нормирования потребления нефти для гражданского населения с целью приоритетного использования ресурсов для стратегических нужд и военных операций. Эта мера призвана обеспечить снабжение важнейших секторов экономики и одновременно эффективно регулировать внутренний спрос. Контролируя распределение нефти, Франция сможет поддерживать стабильность в периоды повышенной напряженности."
 FRA_Curtail_Former_American_Embargoes: "Отойти от Американского Эмбарго"
 FRA_Curtail_Former_American_Embargoes_desc: "Примите меры по дистанцированию Франции от американского эмбарго, особенно в отношении Венесуэлы. Сняв ограничения и наладив взаимодействие со странами, попавшими под санкции, Франция сможет обеспечить альтернативные поставки нефти, укрепить энергетическую независимость и позиционировать себя в качестве дипломатического посредника в глобальных энергетических дискуссиях."
 FRA_West_African_Oil: "Нефтяные Месторождения Западной Африки"
 FRA_West_African_Oil_desc: "Фокусирование на расширении партнерства с профранцузскими странами в Западной Африке, чтобы получить доступ к дополнительным запасам нефти. Эта инициатива укрепит связи с этими странами и одновременно увеличит энергетический портфель Франции. Инвестируя в нефтяные месторождения Западной Африки, Франция сможет диверсифицировать свои источники энергии и поддержать региональную стабильность."

 FRA_Issue_10_year_Bonds: "Выпустить Десятилетние Облигации"
 FRA_Issue_10_year_Bonds_desc: "В связи с экономической нестабильностью в начале нового десятилетия становится все более очевидным, что для того, чтобы Франция не отставала от других великих стран мира, мы должны использовать более активную стратегию в отношении нашей экономической политики. Нынешняя администрация разработала новую денежно-кредитную политику, которая будет осуществляться путем выпуска облигаций до конца десятилетия для предприятий и корпораций."
 FRA_Revive_Dirigisme: "Возродить Дирижизм"
 FRA_Revive_Dirigisme_desc: "Дирижизм сыграл решающую роль в наших усилиях по восстановлению после окончания Второй мировой войны, и с тех пор Франция не забывает о его корнях. Хотя в последнее время мы перешли к рыночному подходу в нашей экономической политике, никогда не поздно вернуться к более надежному подходу в свете недавней экономической нестабильности, такой как пандемия. С таким общенациональным возвратом к системе дирижизма Франция будет процветать, как когда-то в лучшие годы республики."
 FRA_Invite_New_Age_Technocrats: "Пригласить Технократов Новой Эры"
 FRA_Invite_New_Age_Technocrats_desc: "С началом века одной из самых прибыльных и обширных отраслей промышленности во всем мире, особенно во Франции, стали технологии. Технологические гиганты, сформировавшиеся за последние два десятилетия, доминируют в этой отрасли в основном из Америки. Франция покажет, что не собирается противостоять этим гигантам индустрии, и вместо этого протянет им руки в знак доброй воли со стороны французского народа."
 FRA_Purchase_National_Champions: "Новая Эра Национальных Чемпионов"
 FRA_Purchase_National_Champions_desc: "Прокладывая путь к экономическому доминированию, мы не должны забывать о наших собственных французских компаниях, которые когда-то были лидерами на промышленных и экономических рынках. Мы покажем остальному миру превосходство французского продукта и наших инноваций. Но для этого мы должны развивать наши корпорации, обеспечивать им поддержку и понимать, что Франция поддерживает их на мировой арене."
 FRA_Advance_National_Interests: "Продвигать Национальные Интересы"
 FRA_Advance_National_Interests_desc: "Что лучше для наших корпораций и предприятий, то лучше для французской нации, и это окончательно. Мы будем сохранять благосостояние и процветание нашей нации любыми возможными способами, и любая компания, желающая стать частью нашего экономического движения, должна придерживаться этих требований. Они поймут это в свое время, когда Франция снова станет крупным игроком на геополитическом ландшафте современного мира, как это было десятилетиями ранее."
 FRA_Replace_the_ENA: "Заменить ENA"
 FRA_Replace_the_ENA_desc: "École Nationale d'Administration (Национальная Школа Администрации) была маяком прогресса и доброй воли нашего правительства по отношению к гражданам. Изначально она была призвана демократизировать нашу государственную службу и избавить ее от бюрократического беспорядка, который мы имели раньше, но в последнее время годы оказались жестоки к ней. Многие задаются вопросом, что же пошло не так в этом престижном учебном заведении, но, похоже, после многих лет недобросовестной работы ответ на этот вопрос был найден в его собственной политике.\n\n После долгих и запутанных переговоров с лидерами со всех сторон было решено, что единственный способ решить эту дряхлую проблему - полностью заменить некогда престижную академию. На этот раз мы обеспечим ее долговечность и вернем ей прежнюю престижную репутацию."
 FRA_Replace_ENA_Veterans: "Уволить Ветеранов ENA"
 FRA_Replace_ENA_Veterans_desc: "В отношении École Nationale d'Administration (Национальной Школы Администрации) мы можем согласиться с одним: бюрократия, а именно бюрократы, - это чума, которая превратила наше некогда престижное учебное заведение в запутанный бардак, каким мы его знаем сегодня. После того как были проведены колоссальные изменения, очевидно, что эти пиявки будут пытаться ухватиться за власть, которой они все еще обладают. Мы сместим этих ветеранов с их величественных постов и покажем им, что народ Франции их больше не принимает."
 FRA_Institut_national_du_service_public: "Рождение INSP"
 FRA_Institut_national_du_service_public_desc: "Создание The Institut National des Sciences Politiques (Национального института политических наук) было одним из многих предложений, разработанных нашей администрацией, которые годами пролежали в картотеке в кабинете какого-нибудь еврократа. Так бы оно и оставалось до недавнего времени, если бы не столь необходимые реформы, проведенные при нашей администрации, которые позволили нам полностью заменить Национальную школу администрации Национальным институтом политических наук. В то время как представители элиты прежнего учебного заведения негодуют, народ Франции знает, что эти изменения пойдут на пользу им, а не представителям высшего класса, которые долгое время злоупотребляли своим статусом и привилегиями, поскольку Национальная школа администрации больше таковой не является."
 FRA_Distribute_ENA_Funds: "Перераспределить Средства ENA"
 FRA_Distribute_ENA_Funds_desc: "После столь необходимого прекращения деятельности École Nationale d'Administration (Национальной Школы Администрации) Франция и наше правительство вздохнут с облегчением, ведь это оскорбление нашей нации наконец-то обезглавлено. После нескольких недель изучения всех расходов, которые Национальная школа администрации поглощала из нашего бюджета, ошеломляющий отчет на сумму более ста пятидесяти миллиардов евро едва не вызвал второй взрыв. К счастью, на этот раз École Nationale d'Administration уже выпотрошена до основания, и теперь мы можем направить эти средства в самые необходимые учреждения Франции, которые десятилетиями обворовывались благодаря этому мерзкому заведению."
 FRA_Disuade_Elitist_Attitudes: "Победить Элитарные Установки"
 FRA_Disuade_Elitist_Attitudes_desc: "С рождением Institut National des Sciences Politiques (Национального Института Политических Наук) мы покажем тем, кто молился на слабую защиту Национальной школы администрации, что их элитарное и хищническое поведение больше не приветствуется народом Франции. Мы покажем им, что наша администрация говорит от имени народа, а народ сказал, что элите больше не рады в наших правительственных учреждениях!"
 FRA_Reform_the_Civil_Services: "Реформировать Государственные Службы"
 FRA_Reform_the_Civil_Services_desc: "Благодаря перераспределению расточительного финансирования École Nationale d'Administration (Национальной Школы Администрации) у нас появилось много возможностей для инвестиций в другие части нашего правительства. Учитывая, что École Nationale d'Administration (Национальная Школа Администрации) не имеет возможности обучать гражданских служащих, наше нынешнее правительство должно обеспечить людям возможность поступить на государственную службу без лишних хлопот."
 FRA_Laissez_faire: "Принять Экономику Невмешательства"
 FRA_Laissez_faire_desc: "В последние несколько десятилетий мы методично отходили от системы Дирижизма, делая упор на рынок, и в свете последних геополитических событий кажется, что для Франции наконец-то настало время принять свободный рынок раз и навсегда и получить все те преимущества, которые он может предложить. С такими экономическими перспективами Франция будет процветать и развиваться в современную эпоху так, как не было со времен славы нашей республики."
 FRA_Deconstruct_the_ENA: "Деконструировать ENA"
 FRA_Deconstruct_the_ENA_desc: "The École Nationale d'Administration (Национальная Школа Администрации) была маяком прогресса и доброй воли нашего правительства по отношению к гражданам. Изначально она была призвана демократизировать нашу государственную службу и избавить ее от бюрократического беспорядка, который мы имели раньше, но в последнее время годы оказались жестоки к ней. Многие задаются вопросом, что же пошло не так в этом престижном учебном заведении, но, похоже, после многих лет недобросовестной работы ответ на этот вопрос был найден в его собственной политике.\n\nПосле долгих и запутанных переговоров с лидерами со всех сторон было решено, что единственный способ решить эту дряхлую проблему - полностью заменить некогда престижную академию. На этот раз мы обеспечим ее долговечность и вернем ей прежнюю престижную репутацию."
 FRA_Begin_Low_Scale_Privatizations: "Начать Маломасштабную Приватизацию"
 FRA_Begin_Low_Scale_Privatizations_desc: "О приватизации в небольших масштабах нас десятилетиями просили корпорации, которые помогали Франции экономически и даже иногда финансово. С нашим экономическим подходом Laissez Faire наконец-то пришло время уступить корпорациям и бизнесу, разрешив приватизацию некоторых государственных учреждений, что позволит повысить эффективность и даже создать условия для стратегической конкуренции, чтобы в конце концов победа осталась за гражданами Франции."
 FRA_Increase_Arms_Exports: "Увеличить Экспорт Вооружений"
 FRA_Increase_Arms_Exports_desc: "Наш военно-промышленный комплекс всегда был одним из величайших, несмотря на то, что мы не являемся одной из мировых сверхдержав этой эпохи, но именно наша оружейная промышленность в последние годы переживает спад по сравнению с прошлым. С учетом недавней геополитической нестабильности в Африке и других частях земного шара сейчас самое время для того, чтобы наша страна вновь продолжила поставлять по всему миру лучшие французские товары."
 FRA_Reduce_International_Sanctions: "Ослабить Международные Тарифы"
 FRA_Reduce_International_Sanctions_desc: "Тарифы всегда были скорее политической акцией, чем чем-либо еще... Конечно, есть исключения, например, наши идеологические враги. Тем не менее, в последние годы мы были слишком жесткими, и в результате потеряли важнейшую часть рынка, которая жаждет французских товаров и промышленности. Франция останется и будет только укрепляться на международном рынке, и эта политика обеспечит нам дальнейший рост экономической мощи."
 FRA_Acquire_Renault: "Приобрести Renault"
 FRA_Acquire_Renault_desc: "Компания Renault является одной из самых роскошных французских автомобильных компаний с тех пор, как во Франции был изобретен автомобиль. Несмотря на то, что компания известна своими автомобилями, она также оказывает большую услугу нашим военным, поставляя нам бронетранспортеры, боевые машины пехоты и даже танки. Именно по этой причине, стремясь вывести наши национальные компании на мировую арену, наша администрация предложила приобрести Renault."
 FRA_Nexter_Expansion: "Расширить Контракты Nexter"
 FRA_Nexter_Expansion_desc: "Компания Nexter долгое время помогала французским военным в современную эпоху республики. Мы выражаем им глубочайшее уважение и благодарность, и в благодарность за их вклад в развитие нашей армии мы вознаградим их тяжелую работу и усилия, расширив их контракты, чтобы они могли производить больше для нашей любимой нации и ее армии."
 FRA_Prioritize_Efficient_Economics: "Уделить Внимание Эффективности экономике"
 FRA_Prioritize_Efficient_Economics_desc: "Поскольку дирижизм в стране в полном разгаре, а наша политика держится на плаву, настало время сосредоточить усилия нашей администрации на том, чтобы наш экономический план был эффективным и действенным. Мы будем стремиться к тому, чтобы наши реформы прошли через парламент и чтобы бюрократия не мешала экономическому росту нашей страны. Благодаря направленному курсу нашей политики и реформ, кажется, что время Франции как европейской экономической державы потенциально скоро наступит..."
 FRA_Tax_Cuts_to_Defense_Companies: "Защитное Снижение Налогов"
 FRA_Tax_Cuts_to_Defense_Companies_desc: "В связи с тем, что в последнее время наши экономические проблемы решаются по принципу Laissez Faire, следующим важным шагом к достижению полного отказа от экономики станет снижение налогов на корпорации, участвующие в нашей денежной системе. В частности, компании, участвующие в нашем военно-промышленном комплексе, получат наибольшие льготы, очевидно, для того, чтобы наши военные получали только самое лучшее."
 FRA_Offer_American_Companies_Refuge: "Убежище для Американских Компаний"
 FRA_Offer_American_Companies_Refuge_desc: "Вне всякого сомнения, внезапная гражданская война, разразившаяся в Америке, обрушила не только нашу экономику, но и мировые рынки. Но как бы ужасно это ни было для нас, в этом есть и положительная сторона: бывшие гиганты американской промышленности теперь стремятся выйти на европейские рынки, а кто может быть лучше, чем наша гордая страна. Франция взяла на себя инициативу в Европейском союзе по включению компаний, которые в непропорционально большой степени пострадали от Второй американской гражданской войны, и, надеюсь, сохранит их, если этот конфликт когда-нибудь закончится."
 FRA_Push_for_EU_Asian_Free_Trade: "Соглашение о свободной торговле между ЕС и ОДТО"
 FRA_Push_for_EU_Asian_Free_Trade_desc: "И Европейский союз, и Организация договора о тихоокеанской обороне получили существенные удары, поскольку с уходом с американского рынка и русские, и китайцы воспользовались этой возможностью, чтобы агрессивно навязать свои экономические интересы соседним странам. Чтобы предотвратить их совместную агрессию, была завершена работа над историческим торговым соглашением между двумя великими державами, чтобы показать всему миру, что мы не боимся этих глобальных сверхдержав и больше не зависим от Соединенных Штатов."
 FRA_Strengthen_Anti_Corruption_Laws: "Усилить Антикоррупционное Законодательство"
 FRA_Strengthen_Anti_Corruption_Laws_desc: "Наконец-то настало время для настоящих перемен. Перемены, которые потрясут не только наше правительство, но и весь политический климат в целом. Наша администрация будет продвигать несколько антикоррупционных законов, которые положат конец юридическим лазейкам, используемым законодателями и бюрократами для обхода правосудия. Франция покажет нашей стране и всей Европе, что мы - поборники закона и никто не освобожден от ответственности в наших границах."
 FRA_Declare_Wartime_Measures: "Объявить Меры Военного Времени"
 FRA_Declare_Wartime_Measures_desc: "С натиском российской агрессии по всему миру мы наконец-то осознали, что в борьбе с такими русскими головорезами не может быть полумер. Франция своим примером покажет, что мы готовы и хотим бороться с российской агрессией, и мы активно призываем остальную Европу последовать за Францией во главе антироссийского оплота, который стремится уничтожить наш образ жизни, каким мы его знаем."
 FRA_Utilize_Consumerism: "Использовать Консьюмеризм"
 FRA_Utilize_Consumerism_desc: "Франция в современную эпоху всегда была ориентирована на потребительство, особенно до пандемии. Теперь, когда пандемия в основном закончилась, наше правительство должно поощрять нашу нацию вернуться к потребительскому образу жизни, чтобы помочь не только возродить наши компании, но и нашу экономику. Французская нация увидит, что их любимые предприятия процветают, как это было много лет назад, до того, как эта ужасная серия событий чуть не потопила нашу страну в экономическом плане."
 FRA_Target_Oligarchs: "Нацелиться на Олигархов"
 FRA_Target_Oligarchs_desc: "Пришло время ответить на один из самых сложных вопросов нашей глубоко ошибочной системы. Вопрос об олигархах, наконец, получит свое освещение, поскольку наша администрация предложила и уже приняла множество антиолигархических законодательных законопроектов, чтобы не только ограничить их влияние в нашей политической и экономической системах, но и покончить с ним раз и навсегда. Французский народ и вся Европа должны знать, что мы всегда будем руководствоваться интересами нашего народа и что деньги не могут купить или поколебать французскую политическую машину."
 FRA_Fraternite: "Fraternité"
 FRA_Fraternite_desc: "Несмотря на относительный мир в Европе, война всегда остается неизбежной. Растущая напряженность показала нам, что только животное с острыми зубами способно отбиться от нападающих, и, учитывая неспособность наших американских союзников внести вклад в нашу обороноспособность, было бы более чем разумно внести свой вклад в наши собственные вооруженные силы. Какой бы враг ни появился, пусть он пожалеет о том, что когда-либо трогал Францию."
 FRA_Egalite: "Égalité"
 FRA_Egalite_desc: "Экономическое равенство - это то, к чему должен стремиться каждый, но отрицать чье-то накопление богатства противоречит нашим принципам. Поддерживая устойчивую грань между богатством и равенством, мы можем гарантировать, что нашим людям есть за что бороться, у них есть будущее."
 FRA_Liberte: "Liberté"
 FRA_Liberte_desc: "Одним из основных фундаментальных принципов Франции является свобода. С тех пор как мы подняли трехцветный флаг, мы понимаем, что наш народ заслуживает права голоса и может свободно выражать свое мнение без какого-либо наказания. Сосредоточившись на наших республиканских идеалах, мы оказываем большее влияние на нашу внутреннюю политику, с единством приходит стабильность, и если мы покажем нашему народу, что, несмотря на наши различия, мы можем свободно жить вместе."
 FRA_Withdraw_from_Integrated_Military_Command: "Вывести Объединенное Военное Командование"
 FRA_Withdraw_from_Integrated_Military_Command_desc: "Одной из многочисленных ошибок предыдущих режимов была наша неизменная приверженность объединенному командованию НАТО. Почему Франция должна связывать свою военную мощь с остальной Европой? Почему мы должны быть ограничены договорами и правилами? Больше не надо. Настало время, чтобы Франция отделилась от этой устаревшей концепции. Наши военные больше не будут привязаны к НАТО, как собака. Наконец-то мы сможем сделать из нашей армии что-то уникально французское. Не британскую, не итальянскую, не немецкую, а французскую. Наши союзники не будут этому рады, но им придется смириться с тем, что такой исход будет наилучшим для всех заинтересованных сторон."
 FRA_Assure_our_Allies: "Заверить союзников"
 FRA_Assure_our_Allies_desc: "Несмотря на опасения наших союзников, наше новое военное направление не приведет к отказу от обязательств перед НАТО. Хотя некоторые левые и правые постоянно утверждают, что мы должны покинуть альянс, они не представляют того, за что мы выступаем. Мы выступаем за коллективную безопасность всей Западной Европы. И всегда будем готовы положить свои жизни на кон в защиту справедливости и свободы. Франция будет сиять как оплот НАТО, и мы будем готовы встретить тиранию лицом к лицу, откуда бы она ни исходила."
 FRA_Military_Industrial_Program: "Военно-промышленные Программы"
 FRA_Military_Industrial_Program_desc: "Война - опасная игра. Она поглощает все на своем пути и сводит экономику стран к нулю. Многие страны пали не из-за солдат или танков, а из-за невидимой силы истощения. В условиях обострения напряженности во всем мире мы не можем позволить себе поддерживать нашу промышленную базу на нынешнем уровне. Нашим мужчинам нужны материалы: оружие, патроны, топливо и еда. Эти предметы первой необходимости необходимы для выполнения основных функций нашей армии. Новые промышленные планы позволят нам обеспечить нашу армию и союзников припасами и материалами, чтобы выстоять в будущих войнах."
 FRA_Redistribute_NATO_Funding: "Перераспределить Наши Взносы в НАТО"
 FRA_Redistribute_NATO_Funding_desc: "С нашей новой уменьшенной ролью в высшем командовании НАТО мы должны понять, что делать с нашими вновь приобретенными ресурсами. Слишком долго французские социальные службы довольствовались минимумом. Они получали минимальные субсидии от правительства, в то время как военным постоянно увеличивали бюджет. Это было одним из самых больших провалов нашего правительства, и мы стремимся исправить эту проблему раз и навсегда. Новые субсидии будут предоставлены службам по всей стране. Это позволит не только использовать избыточные расходы, которые мы когда-то тратили на высшее командование, но и сократить растущую бедность и безработицу."
 FRA_A_New_Doctrine: "Новые Стратегические Доктрины"
 FRA_A_New_Doctrine_desc: "Война - это игра постоянных изменений. Тактика устаревает, оружие устаревает, и на войне ничто не остается неизменным. В стремлении к превосходству над врагами перемены не просто необходимы. Они обязательны. Наши враги непредсказуемы. Они будут использовать любую тактику, независимо от того, насколько устаревшей она может быть. Поэтому мы должны быть всегда начеку. Адаптивность должна стать основой нашей военной доктрины. Мы всегда будем иметь преимущество над противником, независимо от шансов."
 FRA_Civic_Construction_Plans: "Программы Гражданского Строительства"
 FRA_Civic_Construction_Plans_desc: ""
 FRA_New_Stretegic_Concepts: "Новые Стратегические Концепции"
 FRA_New_Stretegic_Concepts_desc: "На протяжении всего времени своего существования НАТО всегда была готова к возможной тотальной войне с СССР в период холодной войны. Несмотря на то, что это так и не стало реальностью, страх перед войной сохранялся даже после распада Советского Союза. Но с наступлением XXI века многие наши доктрины и концепции были признаны устаревшими. Планы и тактики, которые могли бы сработать много лет назад, теперь устарели из-за развития технологий. Поэтому нам необходимо провести полную переоценку нынешних стратегических концепций НАТО. Чтобы убедиться, что мы готовы к любой возможности, включая тотальную войну с Москвой."
 FRA_Establish_Romanian_Forward_Operating_Bases: "Учредить Румынские ФОБы"
 FRA_Establish_Romanian_Forward_Operating_Bases_desc: "С тех пор как Румыния вступила в НАТО в 2004 году, она стала ключевым активом в обороне Восточной Европы. Их положение вдоль Черного моря в сочетании с границей с Украиной позволяло нам проецировать силу в этот регион на протяжении многих лет. Хотя наша роль на Востоке всегда была пассивной, недавние провокации со стороны русского медведя показали, что время пассивных действий прошло. В рамках наших мобилизационных планов будут модернизированы и расширены базы по всей Румынии. Это позволит нам не только проецировать силу. Но и реагировать на любые потенциальные военные действия, особенно в отношении Украины."
 FRA_A_European_Turkey: "Европейская Турция"
 FRA_A_European_Turkey_desc: "Турция - это загадка. Несмотря на ее членство в НАТО, мы часто конфликтовали с ней, особенно в связи с ее вмешательством в гражданскую войну в Сирии. Сейчас Турция находится на перепутье. Чтобы закрепиться на Востоке, мы должны убедиться, что Анкара полностью привержена НАТО. Их положение хранителей Черного моря дает нам контроль над одним из важнейших морских путей России. Это позволит нам блокировать торговлю и даже нанести удар по Кавказу, если начнется война."
 FRA_Baltic_Defense_Plan: "План обороны Прибалтики"
 FRA_Baltic_Defense_Plan_desc: "Хотя Россия не является главным объектом агрессии, страны Балтии находятся под угрозой надвигающегося медведя. С тех пор как распался Советский Союз, Москва не сводит глаз с этого региона. И если начнется война, они обязательно вторгнутся и попытаются захватить наших союзников. Поэтому мы должны реализовать программы по укреплению обороны НАТО в этом регионе. Защита стран Балтии гарантирует, что у России не будет доступа к портам с теплой водой. Это значительно повышает наши шансы на успешное сдерживание любого потенциального российского вторжения."
 FRA_Arm_the_TSK: "Подготовить Турцию"
 FRA_Arm_the_TSK_desc: "В разгар холодной войны Турция была очагом напряженности между Западом и Востоком. Соединяя Ближний Восток и Европу, Турция выступает в качестве стартовой площадки для любого потенциального вторжения на Кавказ или Ближний Восток. Хотя турецкая армия всегда была готова к любому гипотетическому вторжению, мы должны сделать так, чтобы русские не смогли пойти на Анкару. Невзирая на цену, мы должны сделать так, чтобы наш самый важный союзник не пал. Потому что его падение вызовет цепную реакцию, в результате которой Россия сможет захватить все Балканы."
 FRA_Improve_Conversion_Efficiency: "Повышение Эффективности Конверсии"
 FRA_Improve_Conversion_Efficiency_desc: ""
 FRA_Supremacy_in_the_Skies: "Господство в Небесах"
 FRA_Supremacy_in_the_Skies_desc: "Со времен Первой мировой войны воздушная война является ключевым компонентом функционирования современных вооруженных сил. Истребители обеспечивают непосредственную поддержку наземных войск с воздуха, а бомбардировщики превращают города и заводы в руины. Страна, у которой нет военно-воздушных сил, оказывается на милости любого захватчика. В рамках наших планов по возрождению военно-воздушных сил мы стремимся не только оспаривать небо, но и доминировать в нем. Наши истребители будут наносить удары по небу. Наши бомбардировщики превратят вражеские силы в руины. А наши враги научатся бояться вида французских самолетов в небе."
 FRA_Increase_our_Black_Sea_Presence: "Увеличить Присутствие на Черном Море"
 FRA_Increase_our_Black_Sea_Presence_desc: "Черное море - одна из самых важных водных артерий в мире. Многие страны полагаются на него не только для облегчения торговли, но и для защиты своих национальных интересов. После захвата Крыма в 2014 году Москвой произошла опасная смена власти. Теперь регион находится под угрозой превращения в российское тепловодное озеро. В рамках программы расширения военно-морских сил мы будем стремиться к доминированию в Черном море и затмить присутствие России в этом регионе. Ведь если мы позволим региону перейти в руки России. Это поставит под угрозу не только Украину, но и наших союзников в регионе."
 
#Descriptions
 POLITICS_EMMANUEL_MACRON_DESC: "Эммануэль Жан-Мишель Фредерик Макрон - бывший инвестиционный банкир, бывший министр и нынешний президент Пятой Республики Франции. В юном возрасте, воспитанный в нерелигиозной семье, он попросил принять крещение в католической церкви. Однако позже он объявил себя агностиком и придерживался левой идеологии, которую приписывает своей бабушке. Он изучал философию и экономику в  École Normale Supérieure, а позже поступил в École Nationale d'Administration. После окончания учебы он работал инвестиционным банкиром в Rothschild & Cie Banque, где заработал свой первый миллион на сделке на девять миллиардов долларов, которую он помогал брокерить. В 2012 году он был назначен министром экономики, промышленности и цифровых технологий, с которого ушел в отставку в 2016 году, чтобы начать свою президентскую кампанию. Президент Франции Макрон проводит программу экономических реформ, включая сокращение государственных расходов и дерегулирование рынка труда.\n\nЕго президентство было омрачено массовыми протестами, включая движение "Желтых жилетов", которое началось в конце 2018 года в ответ на предлагаемое повышение налогов на топливо. Макрон назвал колонизацию Алжира Францией "преступлением против человечности", а вмешательство в Ливию - "исторической ошибкой". Тем временем Франция по-прежнему оказывает свое влияние на уязвимые страны Западной Африки из тени, и неясно, как далеко Макрон готов зайти, чтобы сохранить французские интересы. Несмотря на эти вызовы, Макрон остается заметной фигурой на международной арене, выступая за глобальное сотрудничество по таким вопросам, как изменение климата, международная безопасность и единство между европейскими нациями."
 POLITICS_JEANLUC_MELENCHON_DESC: "Жан-Люк Меланшон, новоизбранный президент Пятой Республики Франции, является не просто политиком, но и страстным сторонником социальных перемен и прав человека. Выросший в семье рабочего класса, Меланшон с юных лет познал ценность солидарности и сообщества. Его воспитание привило ему глубокое сочувствие к борьбе простых людей и решимость бороться за их права. Получивший образование в области философии и экономики, интеллектуальный интерес Меланшона и приверженность социальной справедливости привели его к карьере политика. Как бывший учитель и активист, он понимает силу образования и организации на низовом уровне в осуществлении значимых изменений. \n\nКак лидер, Меланшон известен своей пламенной риторикой и бескомпромиссными принципами. Его президентство основано на видении более справедливого общества, где богатство и власть распределяются более равномерно и у каждого есть возможность процветать."
 POLITICS_OLIVIER_FAURE_DESC: "Оливье Фор - видная фигура во французской политической жизни, в настоящее время он занимает пост секретаря Социалистической партии. Он родился в политически активной семье и вырос в атмосфере дискуссий о социальной справедливости и прогрессивных ценностях. Его академический путь пролегал через залы Sciences Po, где он оттачивал свое понимание политической теории и социальных вопросов.Карьера Фора в политике началась с должности советника и быстро переросла в руководящую роль, что отражает его глубокую приверженность идеалам социализма.\n\nКак президент, Фор выступает за Францию, которая ставит во главу угла социальное равенство, экологическую устойчивость и экономическую справедливость. Он верит в силу коллективных действий и стремится объединить левых под общим знаменем для решения насущных проблем, стоящих перед страной. Его прагматичный подход стремится сбалансировать идеализм с достижимыми политическими целями, пытаясь восстановить связь с избирателями, лишенными избирательных прав, и продвигая реформы, способствующие улучшению положения рабочего класса. Фор видит солидарность, где голоса маргиналов усиливаются, а идеалы Французской революции - свобода, равенство и братство - воплощаются в жизнь."
 POLITICS_FRANCOIS_RUFFIN_DESC: "Франсуа Руффен - влиятельный журналист, кинорежиссер и политический активист, наиболее известный своим низовым подходом к политике и непоколебимой приверженностью социальной справедливости. Выросший в скромной семье, Руффин развил в себе сильное чувство сопереживания борьбе рабочего класса, которое впоследствии стало основой его деятельности в качестве защитника обездоленных. Он получил признание благодаря своим документальным фильмам, проливающим свет на социальные проблемы и отражающим реалии, с которыми сталкиваются простые граждане в современной Франции. \n\nКак президент, Руффин воплощает в себе голос народа, ставя во главу угла прямое взаимодействие с избирателями и организацию сообществ. Его страстные речи и конфронтационный стиль бросают вызов политическому истеблишменту, призывая к реформам, направленным на решение проблем неравенства доходов, прав трудящихся и охраны окружающей среды.Руффин видит Францию такой, где демократия возрождается благодаря активному участию граждан, а политика отражает потребности и чаяния рабочего класса. Он стремится создать нацию, где каждый гражданин чувствует в себе силы требовать перемен и имеет место за столом управления."
 POLITICS_MARINE_LEPEN_DESC: "Марин Ле Пен, новоизбранный президент Пятой Республики Франции, не просто политик, но мать и дочь, глубоко укоренившиеся в структуре французского общества. Выросшая в семье политиков, она воочию видела борьбу и триумфы своего отца, Жан-Мари Ле Пена, когда он возглавлял партию "Национальный фронт". Несмотря на их идеологические разногласия, Марин несет в себе чувство семейного долга и решимость оставить свой след во французской политике. Получив юридическое образование в Университете Пантеон-Ассас, Ле Пен начала свою карьеру юриста, что позволило ей лучше понять несправедливость, с которой сталкиваются обычные граждане. Этот опыт подпитал ее страсть к справедливости и ее приверженность защите прав французского народа.\n\nКак мать, Ле Пен понимает важность безопасности и стабильности для семей по всей Франции. Ее президентство продиктовано желанием создать более безопасное и процветающее будущее для следующего поколения, свободное от неопределенностей глобализации и культурной эрозии."
 POLITICS_ERIC_ZEMMOUR_DESC: "Эрик Земмур, новоизбранный президент Пятой Республики Франции, не просто ученый муж, но и мыслитель, не боящийся бросить вызов статус-кво и высказать свое мнение. Выросший в многокультурном районе Парижа, Земмур на собственном опыте испытал напряженность и сложности иммиграции и многообразия. Его ранний опыт сформировал его мировоззрение и привил ему глубокое чувство национальной идентичности и культурной гордости. Получив образование в области юриспруденции и политологии, карьера Земмура как журналиста и писателя была определена его готовностью противостоять запретным темам и бросать вызов господствующим представлениям. Его непримиримая защита французских ценностей и традиций сделала его поляризующей фигурой, но также снискала ему преданных последователей среди тех, кто чувствует себя маргинализованным или игнорируемым господствующей политикой.\n\nКак лидер, Земмур руководствуется верой в важность сохранения культурного наследия и национальной самобытности Франции. Его президентство продиктовано желанием защитить суверенитет Франции, укрепить границы и восстановить закон и порядок во французских общинах."
 POLITICS_PIERRE_DEVILLIERS_DESC: "Пьер Де Вилье, новоизбранный президент Пятой Республики Франции, является не просто военным лидером, но человеком чести и неподкупности с глубоким чувством долга перед своей страной. Родившийся в семье военного, Де Вилье с раннего возраста усвоил ценности дисциплины и службы. Его отец, награжденный генерал, привил ему любовь к своей стране и приверженность защите ее интересов. Де Вилье получил образование в области военной стратегии и лидерства, выдающаяся карьера в вооруженных силах привела его в некоторые из самых сложных и опасных регионов мира. Его опыт, полученный на поле боя, сформировал его понимание геополитики и сложностей современной войны.\n\nКак лидер, Де Вилье известен своим смирением и кротостью, а также готовностью прислушиваться к советам экспертов и консультантов. Его президентство основано на вере в важность силы через единство и сотрудничество, как внутри страны, так и за рубежом. Он полон решимости поддерживать репутацию Франции как мирового лидера и защитника демократии и прав человека."
 POLITICS_JADOT_DESC: "Янник Жадо - харизматичный лидер партии "Европейская экология - Зеленые" и видный деятель экологического движения Франции. Он родился в 1967 году и вырос в семье, которая привила ему страсть к природе и устойчивому развитию. Его академическое образование в области политологии и международных отношений способствовало его приверженности экологическим проблемам, что привело его к работе в различных неправительственных организациях, прежде чем он пришел в политику. \n\nПолитическая карьера Жадо характеризуется его непоколебимой приверженностью борьбе с изменением климата и отстаиванием "зеленой" политики. Он считает, что экологический кризис - это не просто проблема окружающей среды, а социальная и экономическая проблема, требующая срочных мер по защите как планеты, так и уязвимых сообществ.Будучи членом Европейского парламента, он выступал за амбициозное климатическое законодательство и добивался создания европейской "зеленой сделки".Жадо представляет себе будущее, в котором Франция будет лидером в области устойчивого развития, энергетических преобразований и социального равенства, продвигая видение справедливого общества, в котором приоритетом является здоровье планеты."
 POLITICS_PECRESSE_DESC: "Валери Пекресс - опытный политик и лидер партии "Республиканцы", известная своим прагматичным подходом к управлению и ориентацией на экономические реформы. Выросшая в политически активной семье, Пекресс с ранних лет проявляла интерес к государственной службе. Она училась в престижном университете Sciences Po, а затем получила степень в Национальной школе администрации, что открыло ей путь к успешной карьере в политике.\n\nКак бывший министр высшего образования и исследований, Пекресс привержена реформе образования и инновациям. Ее стиль руководства подчеркивает финансовую ответственность, общественную безопасность и важность сильной национальной идентичности.Видение Пекресс для Франции включает в себя оживление экономики, борьбу с безработицей и обеспечение конкурентоспособности страны на мировой арене.Она стремится объединить правоцентристов под знаменем современного консерватизма, выступая за политику, которая уравновешивает социальное благополучие и экономический рост, а также учитывает интересы разнообразного электората."
 POLITICS_BARDELLA_DESC: "Джордан Барделла - восходящая звезда на политической арене и молодой лидер Национального ралли, олицетворяющий новое поколение ультраправых политиков во Франции. Барделла родился в 1995 году и вырос в семье, где поощрялись сильные политические убеждения, а в подростковом возрасте он быстро стал активно участвовать в политической жизни. Академические занятия политологией еще больше подогрели его амбиции, в результате чего он стал представителем партии, а затем и ее президентом.\n\nЛидерство Барделлы характеризуется акцентом на национализм, иммиграционный контроль, закон и порядок.Он позиционирует себя как выразителя интересов "забытых" французских граждан, выступая за политику, которая ставит их нужды и проблемы во главу угла. Под его руководством Национальное объединение стремится вернуть Франции ее самобытность, делая упор на защите культурного наследия и традиционных ценностей.Динамичный стиль речи Барделла и его способность находить общий язык с молодыми избирателями привлекли к нему внимание, поскольку он стремится укрепить влияние партии во французской политике и бросить вызов статус-кво."
 POLITICS_ROUSSEL_DESC: "Фабьен Руссель - видный деятель Французской коммунистической партии, ставший значимым лидером после окончания Гражданской войны. Фабьен Руссель родился в семье рабочего класса, и его ранний опыт сформировал глубокую приверженность правам трудящихся и социальной справедливости. Его политический путь начался в качестве члена местного совета, где он быстро получил признание за отстаивание трудовых вопросов и расширение прав и возможностей общины.\n\nПосле Гражданской войны Руссель стал объединяющей силой для левых, стремящихся восстановить расколотое общество и дать голос бесправным.Он олицетворяет собой стойкость рабочего класса, выступая за новое социалистическое видение, которое ставит во главу угла экономическое равенство, экологическую устойчивость и надежные социальные услуги.Страстные выступления Русселя и его организаторские способности вызывают поддержку тех, кто жаждет более справедливой и равноправной Франции.\n\nЕго стиль руководства подчеркивает сотрудничество и солидарность, стремясь объединить различные фракции левых, чтобы бросить вызов статус-кво. Сейчас, когда Франция борется с последствиями конфликта, Руссель представляет себе будущее, в котором коллективные действия приведут к значимым изменениям, создавая общество, где каждый гражданин имеет возможность процветать и где идеалы свободы, равенства и братства действительно реализуются."
 POLITICS_COQUEREL_DESC: "Эрик Кокерель - видный левый деятель, известный своими яростными выступлениями за социальную справедливость и экономическое равенство. Кокерель родился в 1974 году и вырос в политически активной семье, которая вдохновила его на пожизненную приверженность левым идеям. Он получил образование в области экономики и политологии, а его активизм охватывает десятилетия и сосредоточен на таких вопросах, как права рабочих, экологическая справедливость и антиавстрийские меры. \n\nКак член Национальной Ассамблеи, Кокерель известен своими страстными речами и непреклонной преданностью своим избирателям.Он верит в силу низовых движений и коллективных действий для достижения значимых перемен. Видение Кокереля для Франции включает в себя приверженность социальному равенству, устойчивому развитию и возрождению общественных услуг.Он стремится мобилизовать левых и объединить различные группы под общим началом, борясь за Францию, где каждый имеет доступ к возможностям и основным правам."
 POLITICS_BENEDETTI_DESC: "Ивэн Бенедетти - ярый националистический лидер, возвысившийся после Гражданской войны и воплотивший в себе неапологетичную фашистскую идеологию, напоминающую ранние политические устремления Бенито Муссолини. Бенедетти родился в 1980 году, и годы его становления прошли в атмосфере политических волнений, сформировавших его видение сильного, авторитарного государства, ставящего интересы коренных французских граждан превыше всего. \n\nБенедетти выступает за радикальную трансформацию Франции, направленную на устранение предполагаемых угроз национальной идентичности и восстановление былой славы страны. Его речи находят отклик у тех, кто чувствует разочарование в традиционной политике, обещая возвращение к сильному руководству и отказ от мультикультурализма. Риторика Бенедетти характеризуется пламенным национализмом, презрением к либеральной демократии и призывом к единству среди тех, кто разделяет его видение однородной Франции.\n\nПо мере укрепления власти, лидерство Бенедетти характеризуется его стремлением создать централизованный, авторитарный режим, напоминающий ранние дни фашизма в Италии.Он стремится разрушить существующие политические структуры, заменив их новым порядком, который подчеркивает лояльность государству и строгую приверженность его видению французской идентичности. В условиях разделенной нации Бенедетти предстает как бескомпромиссный защитник национальной гордости, готовый захватить власть и заново определить будущее Франции."
 
 
 
 FRA_form_a_scientific_committe_to_combat_the_pandemic:0 "Сформировать Научный Комитет"
 FRA_form_a_scientific_committe_to_combat_the_pandemic_desc: "Новая пандемия КОВИД-19 уже начала стремительно распространяться по Франции, Европе и всему миру после того, как местные власти в Ухане и остальном Китае не смогли предотвратить ее распространение. Хотя пандемия будет распространяться и в ближайшее время вирус не исчезнет, первым шагом в борьбе с ним станет его понимание, а для этого французскому правительству придется сформировать научный комитет. Этот комитет, в состав которого войдут эксперты из различных областей, таких как патология, биология и экономика, а также представители различных правительственных учреждений, сможет разработать первоначальный ряд планов и рекомендаций для французского правительства по борьбе с КОВИД-19."
 FRA_research_the_vaccine:0 "Начать Исследование Вакцины"
 FRA_research_the_vaccine_desc: "Вирус SARS-CoV-2, известный как ковид-19 или коронавирус, уже доказал свою высокую заразность и способность вызывать опасные и потенциально смертельные заболевания у тех, кого он заражает. Во многих больницах уже закончились аппараты искусственной вентиляции легких для лечения пациентов. Хотя такие методы, как блокировка и маскировка, уже рассматриваются и в некоторых местах применяются, очевидно, что для того, чтобы действительно положить конец пандемии КОВИД-19, потребуется вакцина. Научный комитет уже встретился с представителями крупнейших французских биотехнологических корпораций, включая Sanofi Pasteur, и рекомендовал немедленно начать исследования и разработку вакцины."
 FRA_enforce_a_lockdown_to_buy_time:0 "Ввести Карантин"
 FRA_enforce_a_lockdown_to_buy_time_desc: "Стремительное распространение пандемии КОВИД-19 уже привело к тому, что многие больницы Франции оказались не в состоянии принимать новых пациентов, и стало ясно, что для предотвращения дальнейшего распространения пандемии необходимо принять решительные меры. Научный комитет рекомендовал массовое закрытие больниц, что, хотя почти наверняка приведет к серьезным последствиям для французской экономики в ближайшем будущем, вероятно, спасет десятки тысяч жизней французов и снимет большую нагрузку с национальной системы здравоохранения."
 FRA_ease_the_restrictions:0 "Ослабить Ограничения"
 FRA_ease_the_restrictions_desc: "Очевидно, что ни наша экономика, ни общество не выдержат нынешних ограничений. Чтобы наша политическая ситуация не вышла из-под контроля, мы должны ослабить некоторые правила. Франция выдержит эту бурю."
 FRA_keep_the_restrictions:0 "Усилить Ограничения"
 FRA_keep_the_restrictions_desc: "Наши врачи сообщили нам ужасающие новости. Похоже, прежние оценки смертности были слишком мягкими. Что еще более ужасно, так это то, что почти 45 % наших пожилых людей умирают от этой болезни (по сравнению с 17 % по первоначальным прогнозам). Неясно, почему даже самые радикальные прогнозы оказались неверными и почему в других странах смертность не столь высока (возможно, вирус, которому мы подвергаемся, является эволюционировавшей формой исходного штамма?), но мы не можем позволить нашим людям страдать от этого и дальше."
 FRA_expand_welfare_payments:0 "Утверждение Пакетов Стимулирующих Мер"
 FRA_expand_welfare_payments_desc: "Несмотря на то, что наша экономика сильно пострадала, приоритет должен быть отдан нашим людям. Многие люди месяцами сидят без работы и не могут выжить без нашей поддержки. В первую очередь мы должны защитить наших людей. Пока что мы будем платить за них."
 FRA_push_vaccine_research:0 "Отрезать Целебную Желтую Ленту"
 FRA_push_vaccine_research_desc: "Ситуация слишком радикальна для нашей старой и неподвижной бюрократии. Наши работники здравоохранения должны использовать все имеющиеся ресурсы для борьбы с этой пандемией. Они - наша единственная надежда."
 FRA_push_for_mass_vaccinations:0 "Обеспечить Выполнения Мандатов на Вакцинацию"
 FRA_push_for_mass_vaccinations_desc: "Первые вакцины уже поступили, и теперь мы можем распространить их по всей Франции. Мы обяжем вакцинировать наших государственных служащих, военных и работников общественных служб, а также поощрим наши компании последовать этому примеру. Конечно, против этой идеи уже есть возражения. Некоторые люди утверждают, что мы не можем навязывать им эти вакцины. Они просто слепы к смерти, которая разворачивается даже при наших ограничениях. Мы не можем притворяться, что все нормально. Ничто не стоит риска."
 FRA_look_to_the_swedes:0 "Шведский ответ, Французская проблема"
 FRA_look_to_the_swedes_desc: "Шведское правительство разработало план по отказу от жестких ограничений в отношении КОВИД. Пока мы не знаем, насколько он эффективен с точки зрения предотвращения распространения вируса, но мы знаем, что стране удалось стабилизировать экономическую ситуацию. Мы должны последовать их примеру и сделать так, чтобы жизнь продолжалась в обычном режиме. Просто увеличьте финансирование больниц, введите легкие ограничения и продолжайте работать!"
 FRA_revitalise_the_economy:0 "Программа Оживления Экономики"
 FRA_revitalise_the_economy_desc: "Пандемия КОВИД уничтожила значительную часть мирового экономического роста. Именно поэтому сохранение мандатов не приведет ни к чему, кроме ухудшения последствий этого кризиса. Мы не можем позволить нашей стране потерпеть неудачу в этот критический момент!"
 FRA_develop_immunity:0 "Поощрять Иммунитет"
 FRA_develop_immunity_desc: "Хотя максимальная вакцинация может быть лучшим способом, мы просто не можем тратить наши ограниченные ресурсы и деньги на самостоятельную разработку вакцин. Однако мы также не должны зависеть от американской компании Pfizer. Для этого Министерство здравоохранения предложило "укреплять иммунитет" у населения. Это рискованная авантюра, но если мы будем вкладывать деньги в лечение тяжелых симптомов, а остальные будут заниматься самолечением с помощью одобренных правительством препаратов для снятия симптомов, это может сработать. Они смогут продолжать работать как ни в чем не бывало."
 
 FRA_Restart_of_the_protests:0 "Революция Жилетов"
 FRA_Restart_of_the_protests_desc: "Черт возьми, конечно же, "желтые жилеты" тоже бунтуют. Отлично. Национальная солидарность и единство идут к чёрту. Мы должны быть уверены, что справимся с этим кризисом быстро, иначе их дезорганизация может затянуть весь наш процесс восстановления!"
 FRA_push_through_reforms:0 "Преклонить Колено"
 FRA_push_through_reforms_desc: "Мы действительно не можем заниматься этим прямо сейчас. Наша экономика находится в сточной канаве, а страна полностью остановила свою деятельность. Мы должны сделать все, чтобы спасти ситуацию. Согласитесь на все их условия."
 FRA_try_to_negotiate:0 "Переговорный Стол"
 FRA_try_to_negotiate_desc: "Как бы плохо это ни было... мы сможем обойтись без этого. Мы должны попытаться узнать, могут ли они ограничить свои амбиции. Может быть, это сработает?"
 FRA_the_negotiations_fail:0 "Разделяй и Влавствуй"
 FRA_the_negotiations_fail_desc: "Отлично, если они хотят по плохому, то будет им по плохому. Пошлите полицию, чтобы разогнать протесты, покажите сожженные машины и разрушения, которые они причинили. Франция узнает о своих "героях"."
 FRA_accept_modifications:0 "Счастливая Золотая Середина"
 FRA_accept_modifications_desc: "Потрясающие переговоры! Благодаря этому мы сможем и умиротворить "Желтые жилеты", и не потерять столько денег на социальные расходы! Франция всегда была известна тем, что заботилась о своих рабочих, и теперь это было доказано."
 FRA_negotiate_with_the_syndicates:0 "Работать с Профсоюзами"
 FRA_negotiate_with_the_syndicates_desc: "Мы должны показать всему миру, что эти бунтовщики не представляют трудящихся французов. Используйте профсоюзы и их поддержку нашего истеблишмента, чтобы подавить пожары. Подкупите профсоюзы, присоединившиеся к протестам, чтобы они отказались от них. Франция не склонит колено перед жестокими головорезами."
 FRA_back_to_normalcy:0 "Закрепить Реформы"
 FRA_back_to_normalcy_desc: "По договоренности с "желтыми жилетами" мы закрепим наши реформы в законе. Франции удалось пережить еще один кризис!"
 
 FRA_the_calais_problem: "Новое Десятилетие Проблем"
 FRA_the_calais_problem_desc: ""

 FRA_en_marche:0 "Маршировать с Макроном"
 FRA_en_marche_desc: "Победа Макрона в 2016 году дала Франции возможность наконец-то получить республику, свободную от радикализма и политической нестабильности, республику, которая принесет мир и безопасность Европе и миру через сотрудничество и понимание, но при необходимости применит силу против тиранических сил. Республика, которая предоставит новые возможности меньшинствам и иммигрантам принять участие в жизни мультикультурной Франции, уважая при этом благородную культуру Франции. Республика, которая действительно будет жить в соответствии с революционным девизом "Свобода, равенство, братство". Эту республику хотят уничтожить предательские фашисты из Национального фронта, но предстоящая победа Макрона на выборах 2022 года окончательно развеет их мрачные надежды."
 FRA_rassemblent_national:0 "Обратиться к Ле Пен"
 FRA_rassemblent_national_desc: "На протяжении десятилетий Национальный фронт оставался на задворках французской политики, лишь изредка поднимаясь, чтобы затем снова упасть и потерять актуальность. Но благодаря кампании Марин Ле Пен ситуация наконец-то меняется. Политика либерального истеблишмента Макрона явно привела Францию к краху, и настало время перемен. Франция больше не отдаст свой суверенитет неизбираемым наднациональным организациям, и воля французского народа больше не будет отменяться бюрократами в Брюсселе. Либеральным элитам не дадут возможности разрушить систему социальной защиты французского народа. Полчища исламистов больше не будут навязывать французскому народу свой фанатичный религиозный экстремизм. Нет, в 2023 году Франция будет свободной."
 FRA_The_Opening_Volley:0 "Первый Залп"
 FRA_The_Opening_Volley_desc: "С момента своего создания в 70-х годах Национальный фронт был бурной силой во французской политике. Хотя Марин Ле Пен приложила немало усилий, чтобы искоренить фашистские и петенистские элементы в партии, многие по-прежнему считают ее крайне правым движением. Тем не менее, Ле Пен объявила о своей кампании на пост президента в 2022 году, и, учитывая серьезные экономические проблемы и беспорядки, с которыми сталкивается Франция, многие считают, что она представляет серьезную угрозу для Макрона в его попытке продолжить работу в качестве президента Франции. Только время покажет, кто победит на выборах, но результат наверняка вызовет гнев и поляризацию."
 FRA_the_west_african_sphere:0 "§YOpération§!: Éléphant"
 FRA_the_west_african_sphere_desc: "Наши интересы в Африке всегда были очевидны. Земли, которые когда-то были нашими колониями, по-прежнему связаны с нами экономически, лингвистически и в военном отношении. Многие "левые" утверждают, что мы должны отказаться от этого региона, считая наши попытки стабилизировать его "неоколониализмом". Однако они не понимают, что мы не можем бросить наших франкоязычных братьев на съедение джихадистам и поддерживаемым Россией хунтам. Мы должны сосредоточить наши усилия на том, чтобы взять регион под контроль."
 FRA_economic_assistance:0 "Экономическая Интервенция" 
 FRA_economic_assistance_desc: "Наши франкоязычные друзья всегда находились в сложном экономическом положении. Постоянно подвергаясь нападениям повстанцев, они всегда были не в состоянии развивать свою внутреннюю промышленность так же успешно, как Нигерия на юге. Мы должны это изменить. Наши средства оживят экономику Западной Африки. И, конечно, часть этих богатств вернется к нам.."
 FRA_military_assistance:0 "Военная Помощь"
 FRA_military_assistance_desc: "Хотя экономическая ситуация в западноафриканском регионе всегда нуждается в ускорении, ничего нельзя добиться без стабилизации региональных конфликтов. Наши силы проливают кровь в этом регионе уже десятилетие, но если местные власти не создадут эффективные армии, все будет напрасно. Обеспечение сильной сети местных армий под нашей координацией будет иметь ключевое значение для наших будущих планов."
 FRA_combat_islamic_terrorism:0 "Подавить Исламский Экстремизм"
 FRA_combat_islamic_terrorism_desc:0 "В то время как влияние России является нависшей угрозой, нависшей над нашими африканскими проектами, джихадисты представляют собой более насущную угрозу. Справиться с ними будет нашей непосредственной задачей. Не похоже, что русские и их марионетки хотят, чтобы исламисты тоже правили. Помимо наших франкоязычных партнеров, в этой операции будет необходимо сотрудничество с Нигерией."
 FRA_cease_social_dumping:0 "Прекратить Социальный Демпинг"
 FRA_cease_social_dumping_desc:0 "Мы должны поставить на первое место наших людей. Наши бедные районы страдают от компаний, посягающих на их труд. Нашим рабочим нужно платить больше, ведь это французский идеал - заботиться о наших сельских регионах."
 FRA_tackle_trade_unions:0 "Сокрушить Профсоюзы"
 FRA_tackle_trade_unions_desc:0 "Коммунисты всегда критикуют нас за то, что мы "не поддерживаем рабочих", но именно профсоюзы постоянно препираются с нашей промышленностью. Их постоянные протесты, бунты и забастовки только и делают, что нарушают стабильность нашей страны. Закройте их!"
 FRA_pension_reform:0 "Пенсионная Реформа"
 FRA_pension_reform_desc:0 "В качестве смелого шага, направленного на обеспечение долгосрочного экономического будущего Франции, правительство приняло решение о повышении пенсионного возраста с 62 до 64 лет. Эта реформа призвана обеспечить устойчивость пенсионной системы и одновременно адаптироваться к реалиям старения населения и увеличения продолжительности жизни. Сторонники реформы подчеркивают, что она окажет положительное влияние на государственные финансы, позволяя продолжать инвестиции в социальные услуги и экономический рост. В то время как некоторые секторы выражают обеспокоенность, правительство уверено, что эта необходимая корректировка будет способствовать повышению устойчивости экономики, обеспечивая справедливость для будущих поколений и защищая целостность системы социальной защиты Франции."
 FRA_eu_recovery_instrument:0 "Инструмент Восстановления ЕС"
 FRA_eu_recovery_instrument_desc:0 "Хотя Ле Пен утверждает, что Союз сдерживает нас в экономическом плане, это не так. Будь то внутрисоюзная миграция или единый рынок, наше влияние позволяет нам достичь больших высот, пока мы едины."
 FRA_support_european_federalization:0 "Поддержать Европейскую Федерализацию"
 FRA_support_european_federalization_desc:0 "Хотя нас по-прежнему считают великой державой, это не совсем так. Американцы переигрывают европейцев в военном и экономическом отношении. Китайцы наводняют наши рынки дешевыми товарами. Глобальный Юг не уважает нас и отказывается от наших советов. Даже Россия, которую мы считали побежденной и разбитой до неузнаваемости, снова подняла голову и пытается вернуть утраченное могущество. Так почему же мы не должны этого делать? Неужели европейцы, родина современной государственности, культуры и технологий, не достойны вернуть себе законное место под солнцем? Мы должны объединиться, ведь только так мы сможем вновь стать великой державой!"
 FRA_immigration_regulation:0 "Иммиграционное Регулирование"
 FRA_immigration_regulation_desc:0 "Непрекращающаяся волна мигрантов, достигающих наших берегов, уже давно стала предметом политических дискуссий. Хотя предыдущие правительства уверяли нас, что мы сможем ассимилировать этих людей, поскольку большинство из них прибывают из наших давно потерянных колоний, очевидно, что мы не можем интегрировать их достаточно быстро. Беззаконные гетто, в которых нет ни одного полицейского, - обычное явление вблизи наших крупных городов. Нашим учителям отрубают головы за то, что они защищают французский идеал деконструкции и анализа религии. Наши женщины боятся ходить по улицам ночью без сопровождения из страха, что на них нападет толпа головорезов. Не говоря уже об исламском терроризме. Нам нужно исправить нашу систему, и прекращение иммиграции - это способ начать это делать."
 FRA_increase_corporate_tax:0 "Увеличить Корпоративный Налог"
 FRA_increase_corporate_tax_desc:0 "Корпорации только и делают, что наживаются на простых французах. Мы можем обвинять Макрона в текущем дефиците государственного бюджета, но мы также должны найти решения. Налогообложение корпораций и поддержка малого бизнеса не только вернут подобие баланса на внутреннем рынке, но и наполнят казну деньгами, необходимыми для финансирования наших будущих проектов. "
 FRA_strengthen_protectionism:0 "Усилить Протекционизм"
 FRA_strengthen_protectionism_desc:0 "Почему мы должны позволить нашим предприятиям и отраслям страдать и умирать, пока дешевые товары наводняют рынок? Мы этого не потерпим!"
 FRA_support_nuclear_power:0 "Поддержать Ядерную Энергетику"
 FRA_support_nuclear_power_desc:0 "Мы не похожи на немцев, которые отказываются от атомной энергии в пользу "зеленой". Мы умнее!"
 FRA_criticize_the_eu:0 "Критиковать ЕС"
 FRA_criticize_the_eu_desc:0 "Что ЕС сделал для нас? Наводнил наши рынки более дешевыми товарами, уничтожив нашу промышленность в пользу восточной. И ради чего? Ради "единства"? Еврократы - это боль для нашей нации. Мы должны бороться с их влиянием, пока не стало слишком поздно."
 FRA_Act_as_Stabilization_Force: "Использовать Нашу Новую Гегемонию"
 FRA_Act_as_Stabilization_Force_desc: ""
 FRA_Increase_our_Presence_in_Africa: "Увеличить Наше Присутствие в Африке"
 FRA_Increase_our_Presence_in_Africa_desc: ""

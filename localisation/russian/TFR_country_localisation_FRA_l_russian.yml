 FRA_CFA_Franc:0 "Франк КФА"
 FRA_CFA_Franc_desc: "Несмотря на деколонизацию, влияние Франции на ее бывшие западноафриканские колонии остается сильным благодаря франку КФА, объединяющему две валютные зоны в 14 странах южнее Сахары. Привязанный к евро, франк КФА ограничивает способность западноафриканских стран самостоятельно управлять своей экономикой, делая их уязвимыми перед колебаниями европейского рынка и политикой ЕС.\nОднако франк КФА приносит пользу французской экономике, облегчая торговлю и обеспечивая макроэкономическую стабильность в регионе. Эта стабильность помогла предотвратить долговые кризисы и инфляцию, что позволило французским корпорациям инвестировать значительные средства в добычу ресурсов в Западной Африке, принося Франции миллиардные прибыли."

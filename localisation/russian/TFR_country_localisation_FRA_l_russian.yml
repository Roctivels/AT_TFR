 FAF_shield_decision: "Поднять Наш Щит"


 FRA_bulwark_of_european_conservatism: "Оплот Западного Консерватизма"
 FRA_bulwark_of_european_conservatism_desc: "Запад долгое время медленно развращался либеральным влиянием, контролируя средства массовой информации, элиту, но народ своими голосами высказался против этого, и мы достигли своих целей, поставив Францию на правильный путь. Мы стоим как оплот западных ценностей, старых западных ценностей. Мы - наследники де Голля, Черчилля, Аденауэра, этих великих консервативных деятелей партий, которые давно отказались от своих идеалов. Но сегодня мы возродили этот классический консерватизм в сердце западной цивилизации, и с крепостных валов мы распространим его наружу, от стен оплота до плацдармов и дальше. Европа вспомнит свое прошлое и примет его. Она вспомнит прошлое, в котором экономика процветала, семьи были большими, а будущее - светлым. И мы снова будем иметь это."
 FRA_a_conservative_france: "Триумф Традиционализма"
 FRA_a_conservative_france_desc: "Традиции - это то, что создает нацию, нет нации без ее истории, религии и языка. Мы знаем, кто мы, мы - французы, гордый народ, который в тот или иной момент был известен как доминирующий во всех областях. Война, наука, искусство, литература. Мы хороши во всем, к чему бы мы ни стремились, и именно эта традиция превосходства породила нашу гордую основу, строительные блоки французского общества заложены в достижениях нашего народа. Еврофилы хотели бы, чтобы мы отбросили это, чтобы Франция стала маленькой частью великого европейского целого, а мы - одна из его величайших частей. Мы никогда не увидим Европу в качестве нашей идентичности, мы увидим только Францию. Национальное объединение будет держать государство на плаву, Ле Пен и ее союзники устроят консервативную революцию в парламенте, обеспечив себе большинство на предстоящих выборах, Франция, овеянная традициями, станет высшей наградой за наши усилия, набожный, ориентированный на семью, трудолюбивый народ. Мы будем продвигать это не только здесь, но и во всей Европе. Вся Европа заслуживает того, чтобы ценить свое прошлое."
 FRA_disregard_liberalism_decision: "Пренебрежение Либеральными Союзниками"
 FRA_prioritize_coalition_stability: "Приоритет Единства Коалиции"
 FRA_prioritize_coalition_stability_desc: "Мы должны сдержать себя, настоящее политическое господство вряд ли продлится долго, мы не попадем в ловушку однопартийной республики. Все части нашей великой нации должны участвовать в том, чтобы сделать ее великой, в то время как Национальное объединение будет лидировать, все, от Земмура до Меленшона, должны считаться союзниками в борьбе с застоем. Сохранение коалиции гарантирует стабильность Франции, а раскачивание лодки путем удвоения популизма может только ухудшить ситуацию и оттолкнуть значительную часть населения. Давайте играть умно и честно, нет причин для консолидации. Плюралистические демократии существуют не зря."
 FRA_pluto_rises: "Восходящий Плутон"
 FRA_pluto_rises_desc: "Макрон стремился стать Юпитером, но у него не получилось. Ничего страшного, теперь мы знаем лучше. Стефан Сежурн вел "Ренессанс" вперед, этот пламенный либеральный политик упорно объединял центр и левые силы во Франции против Ле Пен и Национального объединения. Когда-то "Ренессанс" считался мертвым, но Сежурн действительно стал Плутоном, оживителем мертвых опросов, богом отстающих. Хотя Сежурн не является правителем ада, как подразумевает Плутон, он вывел Францию из ада и вознесет ее в рай. Под руководством "Ренессанса" и его союзников Плутон восходит к президентству. Перед лицом кризиса мы не будем отступать, как месье Юпитер, улыбающееся и располагающее к себе лицо в СМИ и на местах - вот кем должен быть Сежурн. Активным президентом, а не каким-то таинственным человеком в высокой башне, который делает все возможное, не произнося ни слова."
 FRA_demand_snap_elections_liberal: "Требовать Проведения Внеочередных Выборов"
 FRA_demand_snap_elections_liberal_desc: "Мы сделали все возможное под руководством Стефана Сежурна, молодое лицо, моложе даже Макрона, стало популярным. Все больше людей на улицах призывают к внеочередным выборам. Наши усилия привели к тому, что президентство Ле Пен погрязло в противоречиях и застое. У нас есть шанс отобрать пост у "Национального объединения" и направить Францию по правильному пути, пока не стало слишком поздно. Все, что нам нужно сделать, - это нажать на курок и потребовать, чтобы народ высказался."
 FRA_capitalize_on_conservative_blunders: "Извлечь Выгоду из Ошибок"
 FRA_capitalize_on_conservative_blunders_desc: "Наш контроль над СМИ нельзя недооценивать: финансируемые ЕС и зарубежные новости на нашей стороне, а с нашим внутренним медийным аппаратом мы можем выделить каждый промах Национального ралли и затягивать его на несколько недель. Каждая пустяковая трагедия будет безжалостно препарироваться, каждый неверный шаг, неверно сказанное слово - критиковаться. Мы будем придумывать страшилки о здоровье из-за простого заикания или хромоты. Это хищническая и для некоторых непопулярная политика, но тот, кто контролирует СМИ, контролирует общественное мнение, и Ле Пен проделала жалкую работу, чтобы поколебать наших медиамагнатов. Однако господин Сежурн, молодой человек со свежим лицом, - это бунт рейтингов и живописная фигура для обновленного Ренессанса."
 FRA_the_golden_lambda: "Золотая Лямбда"
 FRA_the_golden_lambda_desc: "Идентаристы, они действительно провидцы. Французский национализм в современную эпоху... недальновиден, даже Барделла вынужден с этим согласиться. В эпоху Наполеона, когда каждый пятый европеец был французом, у нас было достаточно населения, чтобы называть себя державой, в мире, где нации насчитывают миллиарды людей и сотни миллионов, мы - капля в европейской луже, меньше, чем турки, чем немцы. Но мы не просто французы, мы - сыны Рима, сыны латинян. От Валлонии до Дакии, от Лиссабона до Сиракуз латинская раса по-прежнему сильна и многочисленна, вместе нас 150 миллионов, мы снова наша собственная сила, видение будущего, в котором латиняне снова будут во главе с Францией, не совсем безумно, Наполеон пытался возродить Францию из пепла, чтобы сделать именно это, а современный Европейский союз сделал Испанию и Италию ближе к нам, чем когда-либо прежде. Хотя мы презираем Макрона и его брюссельских невест, мы видим пользу в объединении Европы, и, приняв Золотую Лямбду Идентаристов, мы можем смотреть в будущее, где, возможно, латиноамериканцы будут объединены, даже если Европа будет вечно разделена между собой. Больше не будет братских войн, у нас будет единство латинян против всех остальных."
 FRA_rabid_anti_slavicism: "Сражайтесь со Славянскими Ордами"
 FRA_rabid_anti_slavicism_desc: "Проклятые славяне оскорбляют наши ценности, даже если они утверждают, что принимают их. Все славянские демократии православного вероисповедания погрязли в коррупции и анократической автократии, в них нет ни Liberté, ни Egalité, ни даже Fraternité. Ельцин был декадентским пьяницей, Путин - улыбающейся змеей, а его преемник Медведев - бешеным псом, яростно кусающим Запад. Какова бы ни была его судьба, все русские одинаковы. Предатели со времен Континентальной системы, играющие на обеих сторонах, предатели во Второй мировой войне, предатели во всех сделках, которые мы с ними вели. Нужно не просто бороться, а завершить дело русской державы. У нас нет будущего в мире, где Россия играет с соседями в "Чингиза". Так давайте играть в Наполеона."
 FRA_rabid_anti_liberalism: "Бешеный Антилиберализм"
 FRA_rabid_anti_liberalism_desc: "Мы подставили левых, подставили русских, все на месте. Мы нашли козла отпущения. Страница из истории была взята и переписана, оркестровые ноты сыграны в прекрасной симфонии. Грохот пулеметного огня из российских автоматов АК12 разрывается на пять разных групп в пяти разных местах, хирургический разрез сделан, чтобы вырезать либералов из правящего кабинета, левых удобно пощадили, чтобы усилить уловку, музыка - это организованное расположение звуков, это был барделевский шедевр. Из штаб-квартиры Национального митинга слышно, как тела бьются о мостовую. Наша оппозиция напугана, кабинет Макрона мертв, остались только левые или верные нам, Барделла готовит речь, чтобы назвать бойню ужасной трагедией, а на самом деле? Это наша последняя строфа. Завершение нашей великой пьесы. Никто не согласится на просьбу сформировать правительство с Макроном, никто, кроме нас, мы позаботимся об этом. Мы дадим ему необходимое большинство, спасителя во времена левого террора и вмешательства России... пока мы не уберем его на следующих выборах."
 FRA_socialism_with_french_characteristics: "Социализм с Французскими Чертами"
 FRA_socialism_with_french_characteristics_desc: "После многовековой борьбы, начавшейся в 1789 году и завершившейся сегодня, во Франции появилось правительство, которое действительно служит народу. Существует система, которая дает им власть, которая дает им истинную свободу и обеспечивает им счастливую, хорошую жизнь. После борьбы с авторитаризмом и правыми Франция, в своей Шестой республике, действительно свободна.\n\nC'est pour de bon!"
 FRA_invite_apla_military_advisors: "Пригласить Американских Консультантов"
 FRA_invite_apla_military_advisors_desc: "Хотя это было бы невероятно спорным и критикуемым решением, американская гражданская война и ее окончание - важнейшая цель для Франции и НАТО в целом. Естественно, ближе всех к нашим целям свободного и демократического социализма стоит Американская народно-освободительная армия, даже если внутри нее есть определенные фракции, выступающие против этого. Мы разрешим переводить советников из страны в страну и признаем их в качестве законного американского правительства."
 FRA_detente_with_PRC: "Восточная Разрядка"
 FRA_detente_with_PRC_desc: "Частью нашей нынешней слабости является то, что мы сторонимся Китайской Народной Республики. Как видно из краха Америки и внезапного экономического краха НАТО в целом, мы должны тепло смотреть на восток, если хотим стать устойчивой и сильной нацией. Кроме того, они - наши братья в борьбе за народ; нет необходимости продолжать враждовать с Единым Китаем."
 FRA_french_military_hegemony: "Французская Военная Гегемония"
 FRA_french_military_hegemony_desc: "Де Вилье основательно возродил военное правление Франции, армия сейчас больше, чем за последние пятьдесят лет, за ней стоит народ, промышленность служит нуждам государства и особенно армии, мы готовы к войне в мирное время, потому что мудро знаем, что нас ждет. Европа - наши друзья, наши идеологические партнеры, наша армия обязана защищать не только Францию, но и стойких поляков, выносливых прибалтов, неистовых румын, это наш долг и наша привилегия - быть вооруженными силами свободного мира. Франция может по праву сказать, что она гегемон, что ее вооруженные силы настолько превосходят нас по численности, размерам и оснащению, что военные аналитики будут наблюдать за нашими действиями в каждой стране на каждом континенте в течение следующего столетия. Бог войны живет сегодня в Париже, пусть будет горе для наших врагов и ликование для наших друзей."
 FRA_skewer_the_bear: "Скрутить Медведя"
 FRA_skewer_the_bear_desc: "Россия - это зверь, медведь в спячке, но посмотрите, как он обрастает жиром, пока мы смутно ждем, что он проснется и проглотит нас целиком. Другие народы могут бояться самих себя, но французы гордятся нашим прошлым. Если Европа не повернется лицом к России, то Франция одна возьмет в руки копье и постелет новый ковер для президентского дворца. Мы уже подготовились, но можем сделать еще больше. Оградите прессу, оградите СМИ, покажите Франции, что за люди перед нами - пьяные и безмозглые свободолюбцы, готовые лежать под царем в красной упаковке или нет, лишь бы один человек крепко держал вожжи. Держать нефть над нашими головами - все равно что лишать заключенного воды."
 FRA_neo_imperialism: "Императорское Президентство"
 FRA_neo_imperialism_desc: "Мы так долго теряли свою славу и подвергались насмешкам, что почти полностью сбились с пути. Даже Ле Пен уступил и предал армию, если бы не де Вилье? Мы бы деградировали еще больше, все остатки империи, которые у нас остались, были бы скормлены собакам. Мы - защитник Европы, Франции и Западной Африки, мы - меч свободных, щит свободы, и при Де Виллере мы снова стали державой, способной выходить за рубеж, вмешиваться на своих условиях, мы не империя, а президентство, и наш президент - национальный герой."
 FRA_jupiter_rising: "Слава Юпитера"
 FRA_jupiter_rising_desc: "Величие находится в наших руках, и мы работали над своей судьбой на протяжении последних лет. Становится очевидным, что для того, чтобы наша судьба была достигнута и чтобы мы стали победителями в предстоящих опасностях будущего, сильной Франции будет недостаточно. Макрон снова и снова доказывает, что не только Франции, но и Европе нужен сильный лидер, который не боится ни политических институтов, ни СМИ, ни бюрократии и готов бороться за нас. Макрон с триумфом ведет Францию по пути реформ и прогресса, и результаты приносят огромную силу и преимущества, не благодаря бюрократии и агитаторам, которые хотят покончить с нашим величием.\n\nМакрон покажет Европе и остальному миру превосходство французской нации, а также ее способность помогать своим соседям и союзникам за морем. Макрон покажет русской угрозе, что она не сможет запугивать и топтать Европу, как раньше. Макрон убедится, что сила и мощь необходимы Европе со времен де Голля и Наполеона, и он создаст свое собственное наследие, которое будет отражением этих великих людей.\n\nМы не позволим им украсть наше величие."
 FRA_absorb_volt: "Поглотить Вольт"
 FRA_absorb_volt_desc: "Интеграция партии Вольт Европа в наше правительство позволит ему не только оставаться сильным и единым, но и обеспечить единство Европейского союза. С помощью Вольт мы сможем добиваться дальнейшей федерализации европейского континента и одновременно укреплять наши связи с Брюсселем. Франция продемонстрирует преимущества и возможности объединенной Европы для жителей континента и всего мира."
 FRA_reaffirm_our_majority: "Подтвердить Наше Большинство"
 FRA_reaffirm_our_majority_desc: "Коалиция добилась больших успехов, и мы наконец-то создали решительную коалицию, нацеленную на улучшение положения французского народа. В то время как либералы и консерваторы ведут правильный диалог и сотрудничают, становится очевидным, что радикалы и экстремисты предпочли бы этого не делать. Мы будем использовать эту вновь обретенную силу, чтобы продвигать центристскую политику и решительные реформы для сильной Франции; убедимся, что мы останемся сильными перед лицом российской угрозы и что крайне левым и правым нет места в нашем правительстве."
 FRA_clash_of_civilizations: "Столкновение Цивилизаций"
 FRA_clash_of_civilizations_desc: "Европа и Восток, Франция со времен Болдуина понимала свое место как могущественное государство крестоносцев, противостоящее сарацинам и восточным ордам. Мы все почувствовали, как затягивается петля на наших шеях, как мусульмане вторгаются в наши дома, когда ворота были распахнуты либеральными предателями, сидящими в своих брюссельских башнях. Мы окончательно закрыли эти ворота, и за ними мы видим только варварство. Восточная угроза в Москве приняла этих исламских фундаменталистов в своих целях, используя Беларусь для массового проникновения мигрантов в Польшу из дикой Сирии, мы видели последнюю волну и то, что они сделали, принеся изнасилования в наши пригороды и преступность в переулки. Ислам - несовместимая религия и культура с Францией и Европой, грядущие конфликты в Африке, на Ближнем Востоке и в Восточной Европе потребуют от нас быть готовыми к грядущему приливу, за наш народ и нашу культуру идет великая борьба, борьба с московскими монголами и мусульманскими ордами, если мы одержим прочную победу, нас ждет светлое будущее, овеянное традициями, европейское господство прочно укоренится."
 FRA_the_camus_bloc: "Принять Блок Камю"
 FRA_the_camus_bloc_desc: "Рено Камю - представитель старой гвардии идентичности, давний идеологический мыслитель, в 80-е годы он был социалистом, а сегодня? Он был лидером французского движения идентичности до его неправомерного запрета правительством Макрона. Камю написал книгу о Великой Замене в буквальном смысле, но, в отличие от многих, его не беспокоит антисемитизм, он открытый гей, и все же остается главой ультраправого движения. Многие еврейские правые, даже среди более умеренного Национального ралли, защищали теории Камю в прошлом, и Эрик Земмур с большим удовольствием приглашает Камю снова создать свою партию, чтобы присоединиться к правящей коалиции. Он и его друзья - антидемократы, и хотя мы не пойдем так далеко, чтобы остановить демократию, мы воспользуемся их поддержкой, чтобы привлечь голоса людей, которые обычно избегают выборов "по принципу"."
 FRA_emulate_the_trump_doctrine: "Французский Трампизм"
 FRA_emulate_the_trump_doctrine_desc: "Дональд Джей Трамп, некоторые винят его в крахе Америки, Земмур же видит в нем трагического спасителя, который пришел слишком поздно. Как и Земмур, он признает, что Америку затапливает, и хочет перекрыть поток иммиграции. Не обязательно быть расистом, чтобы желать сохранить себя. Почему плохо желать иммигрантам процветания... только у себя дома? Трампизм определяется антииммиграционным, предпринимательским законодательством, гражданским национализмом, дипломатией "большой палки" и милитаристской изоляцией. Франция может использовать все эти идеи в своих целях, и, к счастью, попытка Земмура воплотить их в жизнь не приведет к национальному краху! Мы сделаем Францию снова великой!"


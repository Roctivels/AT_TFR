 france.997.d: "Если ты читаешь это событие, поздравляю, уёбище, вот несколько забавных подробностей о TFR: \n\nу Каскадии было шесть разных разработчиков \n\nПервоначально каждый лидер АНОА был женщиной \n\nАртем - Оригинал, но "Лафайет", "Улисс", "Астон Найт" и "радельсфюрер" - все они также основаны на национализме и деспотичном молодом ветеране."

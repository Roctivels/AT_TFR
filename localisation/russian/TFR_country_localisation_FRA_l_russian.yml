 FRA_coronavirus_category_desc: "Новое десятилетие уже ужасно началось... Прежде чем мы сможем сделать что-то значительное в этом десятилетии, мы должны разобраться с внутренними проблемами.\n\n§GКОВИД-19 НА ДАННЫЙ МОМЕНТ §![FRA_COVID_loc]\n\n§YПРОТЕСТЫ "ЖЕЛТЫХ ЖИЛЕТОВ" В НАСТОЯЩЕЕ ВРЕМЯ §![FRA_YVP_loc] \n\n"И прямо в эпицентре урагана все стихает, лишь на мгновенье.""

 FRA_yellow_vests_idea_2_desc: "\n\n\n\n£GFX_FRA_yellow_vest_banner\n\n\n\n\n\nЭкономический спад во Франции не был благосклонен к французским рабочим. Растущие цены на сырую нефть и топливо, высокая стоимость жизни и экономическое неравенство - все это поставило под угрозу уровень жизни обычных французских рабочих, в то время как непропорционально большое налоговое бремя легло на рабочий и средний классы. В ответ онлайн-петиция, размещенная в мае 2018 года, собрала почти 1 миллион подписей, положив начало протестному движению, которое длится почти 2 года.\nПротесты характеризовались ярко-желтыми жилетами, выбранными из-за их объединяющей темы и призыва к оружию. Протестующие блокировали дороги, возводили баррикады и проводили массовые шествия в знак протеста против неолиберализма - к ним присоединились как крайне правые, так и крайне левые элементы.\nПротесты приняли насильственный оборот, французские города загорелись из-за всплеска насилия, поскольку протесты затянулись. Столкновения между полицией и протестующими привели к тысячам раненых, а сообщения о поджогах, вандализме и материальном ущербе, исчисляемом миллионами, стали массовыми. Рейтинг одобрения Эммануэля Макрона упал более чем на 20 процентов с начала протестов. Эти протесты, возможно, являются первым признаком серьезного поворота во французской политике - отхода от либерализма начала десятилетия и, возможно, возвращения призраков экстремизма, которые так долго преследовали Францию."

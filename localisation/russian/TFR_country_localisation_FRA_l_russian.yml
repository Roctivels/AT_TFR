 france.295.t: "Звезды Французской Ночи"
 france.295.d: "Тихим вечером на Монпарнасе Этьен Лемер и Софи Дюпон разожгли огонь в металлической бочке в узком переулке. Пламя плясало на кирпичных стенах, отбрасывая тени. Этьен держал в руках Библию с золотым тиснением, а Софи листала потрепанный перевод Корана, доставшийся им в наследство от набожных дедушки и бабушки.\n\n"Посмотри на это," сказал Этьен, перебирая страницы Библии. "Каждое слово - это цепь, подавляющая воображение. Неужели они думают, что могут подавить человеческий дух? Он бросил Библию в огонь, а Софи последовала за ним с Кораном. Страницы свернулись в пламени, позолоченные буквы извивались, как узники в муках."\n\n"Они называют это богохульством, но разве не больший грех - запереть страсть жизни в этих стареющих страницах?" Софи достала из сумки еще несколько религиозных текстов. Запах горящей бумаги смешался со слабым ароматом диких роз. На другой стороне аллеи свет из кафе удлинял тени.\n\nСофи достала из кармана набросок, разорвала его на кусочки и бросила их в огонь. Искусство не должно ограничиваться бумагой, оно должно возрождаться через разрушение. Когда последняя страница превратилась в пепел, далекий колокол пробил полночь."
 france.295.a: "Они стояли и смотрели, как пламя медленно угасает."
 france.296.t: "Отголоски Прошлого"
 france.296.d: ""Мне девяносто семь лет," начал Поль Дюваль, стоя на трибуне мемориального зала. Его морщинистая рука нежно погладила медали на груди. "Тогда, на поле боя, мы, молодые люди, сражались, защищая идеалы Республики. Свобода для нас была не абстрактным понятием, а верой, за которую стоило отдать жизнь"\n\nОн сделал паузу, окинув взглядом юные лица собравшихся. Но сегодня я вижу тревожные признаки. "Кто-то говорит, что демократия устарела, кто-то утверждает, что нами должен руководить сильный человек. Молодые люди, это те же самые аргументы, которые мы слышали в 1940 году. Тогда умиротворители говорили те же слова."\n\n"Вы можете подумать, что я просто старик, который бредит о прошлом. Но помните, история никогда не повторяется в точности - она всегда возвращается в новом обличье. Сегодняшние фашисты не будут носить военную форму, они наденут костюмы, будут говорить красноречиво и обещать вам 'лучшее' будущее."\n\n"Мое время истекает, но будущее Франции принадлежит вам. Свобода и равенство, за которые наше поколение заплатило кровью, теперь в ваших руках. Не поддавайтесь на слова, которые пытаются обмануть. Не подменяйте разум и терпимость ненавистью и предрассудками. Не позволяйте жертвам тех, кто погиб за свободу, быть напрасными."\n\n"Помните, что истинный патриотизм заключается не в ненависти к другим, а в том, чтобы лелеять ценности, которые мы разделяем. Величие Франции заключается не в ее военной мощи, а в духе, который она олицетворяет.""
 france.296.a: "Республика, если вы сможете ее сохранить..."
 france.297.t: "Rassemblement Familial"
 france.297.d: "В комнате было тускло, ее освещало лишь мерцание сигареты Gauloises, тлеющей в пепельнице. Жан-Мари Ле Пен сидел за богато украшенным деревянным столом, его пальцы ритмично барабанили по его поверхности. С другой стороны Мари, одетая в строгий блейзер, потягивала кофе с практической беспечностью, в ее глазах читалась усталость от бесчисленных митингов и встреч.\n\n"Итак," начал Жан-Мари, его голос звучал хрипловато, "вы отошли от меня."\nМари подняла бровь, выражение ее лица было нечитаемым. "Отец," ровно сказала она, "дело не в том, что я тебя бросила. Речь идет об эволюции. Люди больше не хотят слышать тупой расизм. Они хотят... нюансов."\n\n"Нюансов?!" рявкнул Жан-Мари, едва не опрокинув стул. "Вы так это называете? Потворство слабым? Разбавление идеи, на которой строилась партия этой семьи? И все же," сказал он наконец, выдохнув струйку дыма, "вы по-прежнему держите мою тень рядом с собой. Каждая речь, каждая платформа, каждая политика - ваша мать назвала бы это данью уважения."\nМари ухмыльнулась, уголок ее рта дернулся вверх. "Не дань уважения. Это исправление."\nСтарик захихикал, звук был похож на звук гравия, сыплющегося с холма. "Ну, малышка," сказал он, резко затушив сигарету, "если уж ты хочешь меня поправить, то хотя бы делай это правильно.""
 france.297.a: "Le family... Le chaos."
 france.298.t: "Touche pas à mon poste!"
 france.298.d: "Сирил Хануна заканчивает свое ежевечернее представление, как он делал это на протяжении многих лет, и приглашает гостей.\n\nБригадный генерал Пьер Шилль. \n\n''Пожалуйста, поприветствуйте генерала Пьера Шилля!'' Французско-тунисский ведущий восклицает под аплодисменты зрителей, генерал выходит в форме, его офицерское кепи сияет в свете студии. Генерал Шилль широко улыбается и занимает свое место.\nШилл знает, что Хануна - комик, призванный рассмешить публику и нацию, и приглашение армейского чиновника на ваше шоу означает, что у вас должны быть смешные вещи, которые вы можете сказать. Генерал неловко улыбается, когда Хануна начинает говорить.\n\nПоначалу все идет нормально, но потом разговор переходит на союзников Францию, и в конце концов внимание сосредотачивается на Германии. "А как же бундесвер? спрашивает Шилл. Ну, он маленький, как вы думаете? Ха!"Хануна шутит, Шилл отходит в сторону: он крупный офицер в командовании НАТО, и его слова могут испортить отношения между двумя странами. \n\nЕго ответ имеет большой вес, он колеблется, он чувствует свет студии на своем лице, и он вдыхает..."
 france.298.a: "Дело не всегда в цифрах, Сирил."
 france.298.b: "Думаю, им не мешало бы поменьше бояться самих себя."
 france.299.t: "Ликвидация Лионне"
 france.299.d: "Желтые жилеты сделали это снова, еще один грандиозный протест преодолел силы полиции, направленные на их сдерживание, они свободно бегут, улица, на которой раньше не было протестов из-за страха разрушений, теперь открыта для них, полиция бежит в запасные точки, линии расходятся, протесты сливаются вместе, организаторы теряют представление о том, чей протест был чьим, анархия поглощает улицы Лиона.\n\nДве группы сходятся перед зданием мэрии Лиона, одна держит камни, молотки, другая - свои плакаты, помятые за дни непрерывного протеста. Камень попадает в окно, один из протестующих кричит: "Нет! Пощадите офисы! Там работают люди!" Другая группа в ответ бьет молотком по входной двери.\n"Тогда они не должны работать на тирана!" И еще одно стекло разбивается.\nМирная группа стоит перед дверью, готовая предотвратить разграбление здания.\n"Молотов!" Один из них кричит, и они бросаются с лестницы, поджигают вход, и через мгновение дверь тлеет. Они с ужасом наблюдают за тем, как их товарищи вскрывают окна и достают оттуда телевизоры, телефоны, компьютеры. Они знают, что сотни людей лишились средства на жизнь на долгие месяцы вперед, что в этот день произошла трагедия для рабочего человека, даже если он стремится к переменам."
 france.299.a: "Все, что вы можете сделать, это посмотреть"
 france.300.t: "Наше Наследие в Африке..."
 france.300.d: "Отношения Франции и Африки... сложны, если не сказать больше.\n\nНаша колонизация Африки была, несомненно, неудачным периодом в истории обеих стран. Наследие колонизации осталось в Африке: Африка страдает от нестабильности, вызванной антидемократическими силами, страдает от экономической бедности и кризиса здравоохранения.\n\nПоэтому многие в нашем правительстве считают, что на нас лежит ответственность за исправление совершенных нами ошибок. Они утверждают, что это наша вина, что Африка сильно пострадала. Для этого мы должны поддерживать развитие Африки, помогая и поддерживая местные демократии и останавливая распространение экстремизма и автократий.\n\nНо Франция не единодушна. Многие считают, что в этом нет смысла, так как чаще всего, стремясь остановить диктатуру, страна оставалась в худшем состоянии, чем раньше, как, например, Ливия. Они не отрицают, что из Африки можно извлечь много пользы, главным образом благодаря богатым природным ресурсам. Однако нет необходимости еще больше втягивать Францию в дорогостоящие конфликты, которые, похоже, никогда не закончатся. В любом случае, от того, какой путь мы выберем, будет зависеть наше будущее в Африке."
 france.300.a: "Мы - Чемпионы Демократии Третьего Мира!"
 france.300.b: "Мы здесь ради наших национальных интересов, не более того."
 france.301.t: "Профсоюзные боссы пойманы на коррупции"
 france.301.d: ""
 france.301.a: "Подождите, почему они протестуют?"
 france.304.t: "Темные Цвета для Темной Эпохи."
 france.304.d: "Эммануэль Макрон сидел в своем кабинете в Париже, был прекрасный яркий день, и он пристально смотрел на флаг вдалеке.\n\n''Он должен быть темнее.'' сказал он, рассеянно глядя перед собой. ''Я бы хотел, чтобы он был темнее, он слишком хорошо сливается с небом. Возьми один из темных и поставь его, иди.'' Он говорит, указывая на президентского гвардейца."
 france.304.a: "Да будет так!"
 france.304.b: "''Э-э... Я не думаю, что тебе можно это делать?''"
 FRA_flag_will_get_darker_tt: "§YСиний цвет на французском флаге будет\nзаменен на§! §Pтемно-синий§!"
 france.305.t: "Барделла Высказался о Свободе Слова"
 france.305.d: "В последнее время консервативный политик Джордан Барделла использует множество способов, чтобы донести свою идею свободы слова до каждого, кто захочет ее выслушать. Он обратился в парламент с петицией, пытаясь заставить его изменить ограничения в законах о свободе слова во Франции. Хотя это и достойно восхищения, СМИ ставят это под сомнение, поскольку Барделла начал эту кампанию после того, как ультраправая партия Идентаристов была официально подвергнута цензуре со стороны французской администрации."
 france.305.a: "Первый шаг..."
 france.306.t: "Объявлена Чрезвычайная Ситуация"
 france.306.d: "После крайнего хаоса в период своего переизбрания на пост президента Французской Республики Макрон счел нужным объявить чрезвычайное положение и пригласить консервативное Национальное объединение в правительство, чтобы успокоить хаос.\n\nНесмотря на критику со стороны его партнеров и даже некоторых членов его собственной партии, это было названо необходимым решением в эти времена трудностей и раздоров, шагом, который должен быть сделан, чтобы Франция снова не погрузилась в трудности и гражданский конфликт.\n\nОднако только время покажет, что из этого может выйти. Песок сыплется из песочных часов, приближая час принятия решения. Независимо от того, чем все это закончится, судьба предопределила лишь несколько путей."
 france.306.a: "Пришло наше время быть в центре внимания..."
 france.307.t: "Падение Юпитера"
 france.307.d: "Сегодня Эммануэль Макрон потерпел поражение, публично объявив на всю страну, что уходит в отставку с поста президента Франции и назначает вместо себя консерватора Жордана Барделла. После недавнего объявления чрезвычайного положения и роспуска кабинета Макрона казалось очевидным, что этот день наступит. В конце концов, его контроль над ситуацией ослабевал, а его собственная партия требовала его отставки из-за тиранического объявления военного положения. Но сейчас Макрону не время дуться, пришло время Барделле восстать как спасителю Франции, человеку, который спасет ее от славянского нашествия."
 france.307.a: "И Теперь Восходит Марс..."
 france.309.t: "Связующие Узы"
 france.309.d: "С древних времен французы и немцы никогда не сходились во взглядах. Все изменилось после Второй мировой войны, когда мы заставили немцев избавиться от всех аспектов прусского милитаризма в своей идентичности. Пренебрегая этим милитаризмом, который так долго определял Германию, мы ненароком подорвали все шансы Европы выстоять в одиночку против русского чудовища...\n\nНо теперь Россия разбита, раздроблена до неузнаваемости, а прусский милитаризм снова процветает. Наши шпионы докладывают о немецких националистах, которые шепчутся о нашей мнимой слабости... Требуют "почетной реквизиции" своих бывших территорий Эльзас-Лотрингии... Подвергать наши исконные земли Эльзас-Лотарингии риску оказаться под немецким сапогом - это не то, на что готовы пойти ни наши лидеры, ни наш народ."
 france.309.a: "Слухи - это только слухи"
 france.309.b: "Мы никогда не сможем стать братьями..."
 france.310.t: "Франция Выходит из Пакта"
 france.310.d: "Сославшись на презрение к немногочисленным немцам, желающим, чтобы наше правительство вернуло себе бывшую территорию Эльзас-Лотарингии, правительство Франции вышло из Стального пакта. Хотя это и неожиданно, но это означает, что у нас больше нет дипломатических причин избегать темы возвращения Эльзас-Лотрингии, нашей потерянной провинции. \n\nДаже сейчас мы слышим, как немецкий народ, находящийся под французской оккупацией, взывает к освобождению своей родины. Мы вернем себе то, что когда-то было нашим! Мы уничтожим французское государство раз и навсегда, [GER.GetLeader] еще раз унизит французский народ и его попытки воевать, как когда-то это сделал Бисмарк и Гитлер."
 france.310.a: "Мы раздавим их!"
 france.311.t: "Старая Антанта"
 france.311.d: ""
 france.311.a: "Вместе мы выстоим!"
 france.311.b: "Не нужно! Пакт и так велик!"
 france.312.t: "Германия претендует на Эльзас-Лотарингию"
 france.312.d: "После того как мы обрели независимость от берлинской бюрократии, немецкое правительство подтвердило свои претензии на исторически французский регион Эльзас-Лотарингия. Слепой национализм немцев был ожидаем, и у нас есть только один ответ... Рейн. \n\nРека Рейн была естественной границей между цивилизованным миром и варварами с древних времен, и очевидно, что немцам нельзя доверять самоуправление."
 france.312.a: "Рейн - естественная граница Франции!"
 france.7000.t: "Падение Анархистов"
 france.7000.d: ""
 france.7000.a: "Революция призывает к дисциплине"
 france.7001.t: "Левые и правые оппозиционные формы!"
 france.7001.d: ""
 france.7001.a: "Черт их побери!"
 france.7002.t: "К вопросу о военном правлении"
 france.7002.d: "Ночь была глубокой, но в кабинете Елисейского дворца генерал Казанова работал без устали, поглощенный мыслями о будущем Франции. Уже захватив контроль над всей страной, губернаторы и командующие склонились перед его властью, оставалось решить насущный вопрос: как институционализировать эту власть.\n\nПовернув взгляд к боковой стене кабинета, где на книжной полке стояла копия знаменитой статуи Наполеона, он увидел завоевателя, сверкающего в лунном свете, холодный белый свет высвечивал его фигуру. Казанова представил себя в полных военных регалиях, украшенного орденами, принимающего салют на парадном плацу. Первый консул использовал силу для восстановления республиканского строя, обеспечивая силу и процветание Франции. Почему бы его ученику не последовать этому образцу?\n\nПочувствовав легкую сонливость, Казанова позвонил и попросил чашку кофе, чтобы не заснуть. Ожидая, пока адъютант принесет напиток, генерал открыл ящик стола и достал томик собрания сочинений Сталина, чтобы скоротать время. Этот генсек грузинского происхождения действительно был человеком большого таланта. Сталин укрепил и реконструировал наследие Ленина, обеспечив эффективное функционирование первого в мире коммунистического правительства. Как мог Казанова, гордившийся тем, что он новый революционный лидер, не испытывать зависти?\n\nКазанова потягивал черную жидкость, просчитывая свои дальнейшие действия. Через мгновение он взял ручку и подписал свой последний приказ на сегодня."
 france.7002.a: "Ситуация требует силы и безопасности"
 france.7002.b: "Как мы можем утверждать, что говорим от имени народа, не имея гражданского правительства?"
 france.7003.t: "Правая оппозиция восстает против нас!"
 france.7003.d: ""
 france.7003.a: "Будь они прокляты!"
 france.7004.t: "Оппозиция объединяется против роспуска конгресса"
 france.7004.d: ""
 france.7004.a: "Мы должны что-то сделать с этим!" 
 france.7005.t: "Суд над Блоком Арто"
 france.7005.d: ""

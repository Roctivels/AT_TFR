l_russian:
 #Focuses
 FRA_the_french_armed_forces: "Состояние Вооруженных Сил"
 FRA_the_french_armed_forces_desc: "В ходе проведения всеобъемлющего десятилетнего обзора Французских вооруженных сил были получены тревожные отчеты. Наши вооруженные силы недофинансированы и отстают от наших европейских союзников. После появления таких тревожных новостей наши генералы потребовали от администрации немедленных действий. К счастью, наше правительство официально приняло решение об увеличении бюджета Французских вооруженных сил более чем на четырнадцать миллионов евро, что позволит нашим вооруженным силам модернизироваться к началу десятилетия.\n\nВооруженные силы нашей страны не будут отставать в такое время, и ради безопасности и успеха Франции настало время действовать сейчас, как никогда. Франция снова достигнет того почета и чести, которые она имела, будучи военной державой Европы. "
 FRA_unify_the_DSGE_DSGI: "Унифицировать DGSI-DGSE"
 FRA_unify_the_DSGE_DSGI_desc: "Мы вступаем в новую эру нашей нации, когда нам необходима более тесная связь между нашими внутренними и внешними разведывательными службами, а значит... DGSN, или Генеральное управление национальной безопасности, будет служить для защиты внутри страны и за ее пределами."
 FRA_dsgn_creation_tt: "По завершении работы мы создадим §CГенеральный директорат по национальной безопасности, или DGSN§!"
 FRA_the_french_airforce:0 "Перепроектировать Наши ВВС"
 FRA_the_french_airforce_desc: "Наши военно-воздушные силы были одним из самых отстающих видов вооруженных сил Франции с минимальным прогрессом в модернизации нашего воздушного флота. В настоящее время мы привлекаем множество авиационных корпораций, таких как Dassault Aviation, для разработки возможных решений, которые позволят привести французские ВВС в современную эпоху с невиданными ранее уровнями превосходства и мощи. Благодаря этим усилиям Франция еще долго не будет править небом."
 FRA_the_race_for_the_fifth_generation_fighter:0 "Французский Истребитель 5 Поколения"
 FRA_the_race_for_the_fifth_generation_fighter_desc: "Благодаря недавним прорывам в авиационном крыле наших исследований и разработок у нас наконец-то появилась возможность, которую мы так долго ждали, чтобы продвинуть следующее поколение наших военно-воздушных сил. Французский истребитель пятого поколения - это одна из самых современных концепций, которые мы видели, и мы должны использовать ее в своих интересах. Франция станет первопроходцем в будущей концепции воздушной войны, когда мы представим современный истребитель пятого поколения всему миру."
 FRA_ramp_up_the_production_of_the_Dassalut_Rafale:0 "Серийное Производство Rafale"
 FRA_ramp_up_the_production_of_the_Dassalut_Rafale_desc: "Rafale всегда приносил пользу нашей армии, и, если его немного подправить, а также выделить Dassault щедрое финансирование, мы сможем начать серийное производство наших истребителей в кратчайшие сроки. Благодаря исключительным характеристикам и возможностям Rafale мы сможем превзойти российские ВВС к концу десятилетия, если все пойдет по плану."
 FRA_conduct_major_improvments:0 "Оттачивать Знания в Области Воздуха"
 FRA_conduct_major_improvments_desc: "Наши ВВС отстают не только в технологическом плане, но и в том, что наши профессионалы, если не сказать больше, теряют то превосходство, которое когда-то определяло наши ВВС. Решение этой проблемы заключается в том, что наши ВВС должны начать всесторонний пересмотр текущей программы ВВС Франции, сглаживая недостатки и постепенный упадок, с которыми мы сталкивались в течение многих лет, и вместо этого двигаться по пути постепенного совершенствования наших ВВС и возвышения над конкурентами."
 FRA_deveop_domestic_drones:0 "Развивать Внутренний Потенциал"
 FRA_deveop_domestic_drones_desc: "Чтобы достичь самообеспеченности и снизить зависимость от внешних источников, Франция будет уделять приоритетное внимание развитию внутреннего потенциала в оборонной промышленности, поощряя инновации и сотрудничество для создания прочной основы для поддержания передовых вооруженных сил."
 FRA_expand_our_airfields:0 "Увеличить Способности Восточного Воздушного Пространства"
 FRA_expand_our_airfields_desc: "Признавая геополитическое значение Восточного театра военных действий, Франция стратегически усилит свой военно-воздушный потенциал в регионе путем развертывания дополнительных ресурсов, создания передовых оперативных баз и проведения совместных учений с союзными странами."
 FRA_aerial_defense:0 "Улучшить SAMP/T"
 FRA_aerial_defense_desc: "Ракетная система Sol-Air Moyenne Portée Terrestre служит Франции в качестве основной системы ПВО с момента ее создания в прошлом десятилетии. Чтобы обеспечить максимальную эффективность и надежную противовоздушную оборону, которой заслуживает Франция, мы заключили контракт с разработчиками SAMP/T на перепроектирование и обновление системы противоракетной обороны. По мере того как воздушная война продолжает развиваться и эволюционировать, будут развиваться и наши возможности по самозащите."
 FRA_aerial_offense:0 "Последний Рубеж"
 FRA_aerial_offense_desc: "Космос всегда считался истинной конечной целью любой великой страны, желающей достичь большего, чем считалось возможным для человека. Пришло время показать всему миру, что Франция хочет стремиться к большему, чем то, на что многие считают нас способными. Франция откроет свою собственную космическую программу, и в свое время у нас будет свой флаг на Луне наряду с флагами других великих держав, таких как Соединенные Штаты. Мир скоро поймет, что Франция будет править звездами, как нам и было предначертано."
 FRA_the_french_navy:0 "Реформировать Военно-Морскую Практику" 
 FRA_the_french_navy_desc: "Французский военно-морской флот - одна из немногих отраслей, сохранившаяся с годами, но даже в этом случае он отчаянно нуждается в реформе. Наша гордость флота, корабль De Gualle, не дотягивает до американских или британских авианосцев. Мы должны идти в ногу со временем, иначе французский флот снова начнет испытывать недостаток и отставать, что серьезно подорвет наше мировое влияние."
 FRA_upgrade_our_submarine_fleet:0 "Модернизировать Наш Подводный Флот"
 FRA_upgrade_our_submarine_fleet_desc: "Признавая решающую роль, которую подводные лодки играют в современной морской войне, Франция приступит к существенной модернизации своего подводного флота, разрабатывая передовые подводные лодки следующего поколения, оснащенные по последнему слову техники для поддержания непревзойденных подводных возможностей."
 FRA_develop_our_home_ports:0 "Расширить Существующие Гавани"
 FRA_develop_our_home_ports_desc: "Чтобы удовлетворить растущие потребности нашего военно-морского флота и укрепить материально-технические возможности, Франция приступит к реализации стратегической инициативы по расширению существующих гаваней, совершенствованию военно-морской инфраструктуры для содействия эффективному перемещению флота и поддержки устойчивых морских операций."
 FRA_conduct_neccesary_improvments:0 "Проведение Пансредиземноморских Военных Игр"
 FRA_conduct_neccesary_improvments_desc: "Нет лучшего времени для подготовки нашего флота, чем сейчас, когда наша политика средиземноморского движения вступила в полную силу. В условиях активизации сотрудничества Франции с нашими средиземноморскими союзниками мы должны быть более активными в укреплении единства и тесной связи с нашими современниками. Недавно мы пригласили итальянский, испанский и греческий флоты провести военно-морские учения, чтобы стимулировать наши флоты и подготовить их к любым возможным сценариям, которые мы можем предсказать. Чтобы обеспечить наш успех на море, нам необходимо тесно сотрудничать с другими великими флотами Средиземноморья."
 FRA_smaller_boat_stuff:0 "Так Держать"
 FRA_smaller_boat_stuff_desc: "Поддержание стабильности и непрерывности наших оборонных возможностей имеет первостепенное значение. Уделяя особое внимание последовательной подготовке, техническому обслуживанию оборудования и оперативной готовности всех родов войск, Франция стремится обеспечить надежную и грозную оборону."
 FRA_begin_the_project_for_the_new_carrier_flagship:0 "Заменить Де Голля" 
 FRA_begin_the_project_for_the_new_carrier_flagship_desc: "В знак признания меняющейся динамики развития военно-морской авиации Франция инициирует замену авианосца "Шарль де Голль". Этот амбициозный проект направлен на создание современного и универсального авианосца, оснащенного по последнему слову техники и способного проецировать мощь по всему морю, играя центральную роль в обеспечении морских интересов Франции и глобального стратегического влияния."

 FRA_A_Strong_France_is_a_Strong_Europe: "Независимые Военные"
 FRA_A_Strong_France_is_a_Strong_Europe_desc: "Слишком долго бессмысленная бюрократия и политизация НАТО отнимали у Франции бесчисленные часы и эффективность наших вооруженных сил. Настало время для французской нации проложить свой собственный путь к нашему величию без истощения наших ресурсов и бюджета. Франция докажет не только нашим европейским соседям, но и всему миру, что мы не только самодостаточны, но и являемся одной из великих военных держав мира."
 FRA_Through_Europe_we_are_Strong: "Благодаря Европе мы Сильны"
 FRA_Through_Europe_we_are_Strong_desc: "Европа всегда была сильнее объединенной, чем разорванной на части, и тому есть бесчисленные примеры на протяжении всей нашей истории, такие как Вторая мировая война или глобальная война с террором. Пришло время осознать, что чем дольше мы остаемся порознь, тем слабее становимся, поскольку русские становятся все более нестабильными и непредсказуемыми. Мы дадим понять не только всему континенту, но и всему миру, что Европа всегда будет оставаться вместе, несмотря ни на что, во время этих актов глобальной нестабильности и радикализма."
 FRA_Support_a_Pan_European_Military: "Поддержать Пансредиземноморство"
 FRA_Support_a_Pan_European_Military_desc: "Средиземное море всегда имело стратегические преимущества не только для нашей страны, но и для всей истории Европы: из этого региона возникло несколько великих империй и государств. Римляне, македонцы и даже карфагеняне контролировали весь известный мир из Средиземного моря. Для успеха Европы мы должны учитывать стратегическую важность Средиземного моря и стран, которые мы разделяем с ним, таких как наши испанские, итальянские и греческие союзники, и поддерживать их как можно больше политически и даже экономически."
 FRA_Support_Western_Mediterrenian_Militaries: "Создать Совместные Военные Бюджеты"
 FRA_Support_Western_Mediterrenian_Militaries_desc: "Стремясь к дальнейшему сотрудничеству с нашими европейскими союзниками, мы собрали комиссию с участием британцев, немцев и итальянцев, чтобы составить эффективный бюджет, обеспечивающий максимальную результативность и эффективность. Благодаря расширению сотрудничества с нашими европейскими союзниками становится очевидным, что у всех нас схожие устремления и цели. Чтобы Европа преуспела в эту новую эпоху, мы должны быть едины перед лицом неопределенности и работать вместе везде, где это возможно."
 FRA_Further_Eurail_Integration: "Дальнейшая интеграция Eurail"
 FRA_Further_Eurail_Integration_desc: "Для повышения европейской мобильности и военной эффективности Франция будет выступать за дальнейшую интеграцию нейронных сетей. Улучшение оперативной совместимости, эффективности материально-технического обеспечения и возможностей быстрого развертывания войск будет способствовать созданию более гибкой и отзывчивой европейской оборонной инфраструктуры."
 FRA_Heart_of_the_European_Navy: "Пакт об Объединении Средиземнорских ВМС"
 FRA_Heart_of_the_European_Navy_desc: "Стремясь укрепить региональную безопасность на море, Франция будет добиваться заключения пакта об объединении военно-морских сил со странами Средиземноморья. Эта инициатива направлена на координацию военно-морских операций, обмен разведданными и совместные учения, способствуя созданию единого фронта против морских угроз в Средиземном море."
 FRA_Revive_Latin_Bloc_Militarism: "Пакт об Объединении Средиземноморского Командования"
 FRA_Revive_Latin_Bloc_Militarism_desc: "Чтобы укрепить региональную стабильность, Франция будет добиваться заключения пакта об объединении командования со странами Средиземноморья, гармонизирующего структуры военного командования и облегчающего совместное планирование быстрого реагирования на потенциальные угрозы на Средиземноморском театре военных действий."
 FRA_Western_Mediterrenian_Mechanization: "Технология Дальнейшей Механизации"
 FRA_Western_Mediterrenian_Mechanization_desc: "Механизация французской пехоты стала одним из самых радикальных изменений в наших вооруженных силах в современную эпоху. Чтобы обеспечить успех нашей пехоты, мы будем продолжать уделять первоочередное внимание развитию механизированных транспортных средств, таких как бронетранспортеры и боевые машины пехоты. Современная форма войны, какой мы ее знаем, будет завоевана французскими инновациями и достижениями в области технологий."
 FRA_Strengthen_the_SNCF: "Расширить SNCF"
 FRA_Strengthen_the_SNCF_desc: "Признавая ключевую роль транспорта в военной логистике, Франция расширит Национальное общество химиков Франции, увеличив железнодорожную инфраструктуру, улучшив связь и обеспечив эффективную мобилизацию войск и ресурсов по всей стране."
 FRA_Privatize_the_SNCF: "Приватизировать SNCF"
 FRA_Privatize_the_SNCF_desc: "Для повышения эффективности и инноваций в сфере железнодорожных перевозок Франция продолжит приватизацию SNCF, внедряя рыночную динамику, стимулируя конкуренцию и улучшая общую производительность железнодорожного сектора для создания более гибкой и адаптируемой транспортной сети."
 FRA_Industrialize_the_countryside: "Милитаризация Сельской Местности"
 FRA_Industrialize_the_countryside_desc: "Для укрепления национального оборонного потенциала и повышения жизнестойкости Франция инициирует программу милитаризации сельской местности, интегрируя военное присутствие и инфраструктуру в сельские районы, обеспечивая распределенную и надежную оборону, которая может эффективно реагировать на угрозы по всей национальной территории."
 FRA_Create_Independent_Military_Strategies: "Создавать Независимые Военные Стратегии"
 FRA_Create_Independent_Military_Strategies_desc: "В связи с недавним решением отделить наши вооруженные силы от объединенного командования НАТО мы должны разработать новые стратегии, чтобы наши вооруженные силы могли действовать самостоятельно, без помощи наших европейских союзников. Франция снова будет отвечать за наши собственные вооруженные силы и покажет остальной Европе, что нам лучше обойтись без них, а еще лучше не увязнуть в их бессвязном военном командовании."
 FRA_A_New_Age_of_Heavy_Tanks: "Модернизировать Тяжелые Танки"
 FRA_A_New_Age_of_Heavy_Tanks_desc: "Чтобы сохранить превосходство в бронетехнике, Франция приступит к реализации комплексной программы модернизации тяжелых танков, оснащая существующие танковые парки передовыми технологиями, чтобы гарантировать, что они останутся на переднем крае бронетанковых средств ведения войны."
 FRA_Deploy_Moving_Castles: "Рождение ''Châteaux Itinérants''"
 FRA_Deploy_Moving_Castles_desc: "Представляя революционную концепцию мобильной обороны, Франция станет свидетелем разработки высокомобильных и тяжеловооруженных подразделений, способных к быстрому развертыванию и эффективному реагированию на динамичные сценарии боя."
 FRA_Independence_from_the_Eurail: "Независимость от Eurail"
 FRA_Independence_from_the_Eurail_desc: "Чтобы обеспечить свободу передвижения и логистическую независимость, Франция будет работать над снижением зависимости от сетей Eurail для военных перевозок, разрабатывая альтернативные методы транспортировки, повышая стратегическую мобильность и укрепляя наш потенциал для проведения независимых военных операций."
 FRA_Expand_Domestic_Capabilities: "Подтолкнуть Отечественные Оружейные Компании"
 FRA_Expand_Domestic_Capabilities_desc: "Thales Group, PGM, MBDA и Renault - давние производители вооружений, которые на протяжении десятилетий послевоенной эпохи помогали снабжать Французские вооруженные силы. Теперь наше правительство должно внести свою лепту и способствовать тому, чтобы наши военные приобретали технику и вооружение отечественного производства и отказывались от чрезмерной зависимости от зарубежных поставок."
 FRA_Rejuvinate_Recruitment_Centers: "Обновить Центры Подбора Персонала"
 FRA_Rejuvinate_Recruitment_Centers_desc: "Чтобы сохранить квалифицированные и мотивированные вооруженные силы, Франция обновит центры набора персонала, модернизируя процессы набора, расширяя информационно-пропагандистскую работу и предоставляя стимулы для привлечения лучших талантов для службы в вооруженных силах."
 FRA_Research_and_Development: "Увеличить Инвестиции в НИОКР"
 FRA_Research_and_Development_desc: "Признавая необходимость технологического превосходства, Франция значительно увеличит инвестиции в военные исследования и разработки, стимулируя инновации, способствуя созданию передовых оборонных технологий и обеспечивая, чтобы наши вооруженные силы оставались на переднем крае военного потенциала."

 FRA_Second_times_a_Charm: "От Имени Народа"
 FRA_Second_times_a_Charm_desc: "Мы победили в борьбе за президентское кресло, Марин Ле Пен возглавила Францию, что является сильным сигналом для либерального возрождения и Европейского союза: мы были избраны от имени народа, чтобы выполнить мандат. Очень важный мандат. Поставить перед народом упорядоченную, мощную и сбалансированную Францию. Восстановить французские традиции и ограничить политику открытых дверей Макрона и его союзников. Мы выполним этот мандат для Франции, мы усмирим наших радикалов, мы сделаем Францию безопасной, сильной и гордой снова." 
 FRA_Fight_Party_Radicals: "Бороться с Партийным Радикализмом"
 FRA_Fight_Party_Radicals_desc: "Некоторые элементы Национального ралли до сих пор являются пережитками отцовской клики: до эпохи Марин была эпоха Жан-Мари, отца Марин. Национальное объединение действительно было тогда тем, чем, по мнению сегодняшних критиков, оно является сейчас, но некоторые члены Национального объединения не признают, что они являются пережитками прошлого, которое должно быть забыто. Марин Ле Пен расширила горизонты партии и направила ее в новое будущее, а те, кто более тесно связан с Национальным ралли 80-х годов, должны быть отодвинуты на второй план и отправлены на пенсию. Мы никогда не извинимся за наше прошлое, но мы должны смотреть в будущее."
 FRA_Protect_French_Interests: "Американский Реалполитик"
 FRA_Protect_French_Interests_desc: "В самые сильные времена Америка всегда придерживалась великой политики - говорить решительно и держать в руках большую дубинку. Франция находится на континенте идеологических соперников, стремящихся уничтожить свою собственную национальную гордость и навязать то же самое разрушение нам. Чтобы сохранить себя в мире, мы, маленькая часть ЕС, должны нести очень большую палку и говорить очень решительно. В Африке, в Европе и за ее пределами мы должны заявить о своем присутствии и дать понять, что Франция будущего должна быть такой же, как Франция прошлого, сильной и влиятельной в мировом масштабе. Мы не будем низведены до роли второй скрипки Германии в какой-то европейской федерации, мы будем сильным и суверенным государством!"
 FRA_National_Unity_Government: "Провозгласить Правительство Национального Единства"
 FRA_National_Unity_Government_desc: "То, что мы политически противоположны, не означает, что мы не можем стремиться к процветанию Франции. Либералы могут быть полезны своими деловыми связями, социалисты, по крайней мере, говорят, что заботятся о народе, и нет причин, по которым мы не можем пригласить нашу оппозицию к сотрудничеству! Франция сильнее объединенной, чем разделенной, это верно для любой нации, да и вообще для любой вещи. Правительство национального единства в условиях пандемии, нефтяного кризиса и краха Америки - нет лучшего времени для Франции, чтобы объединить свои политические усилия для достижения цели процветания и развития. Кто может этому противостоять? Только предательский идеолог, тот, кто является партийным человеком прежде, чем французским."
 FRA_Law_and_Order: "Политика "Законности и Порядка""
 FRA_Law_and_Order_desc: "На стол перед Ле Пен падает фотография, выскользнувшая из манильской папки. Пылающий ад на переднем плане Триумфальной арки, перевернутая и горящая машина, протестующие в черных и желтых жилетах ликуют, а если присмотреться, то от камеры в сторону полицейской линии летит зажигательная бомба. Ле Пен всегда вызывала отвращение жестокость протестующих. Они выступают за рабочего человека, но при этом сжигают его машину и мусорят на его рабочем месте, как животные. Хватит этой ерунды. Мы услышали вас до того, как вы начали сжигать заживо наших полицейских. В ближайшие дни мы разработаем законопроект, который некоторые назовут драконовским, но нам ли? Для Ле Пен? Для бедного ублюдка, которому принадлежала эта машина? Это разумно и давно назрело, чтобы положить конец многомиллионному ущербу общественной и частной собственности, за который ответственны эти хулиганы."
 FRA_Set_Immigration_Limit: "Франция Прежде Всего"
 FRA_Set_Immigration_Limit_desc: "НАТО и Европейский союз - ценные вещи, но ничто не может быть дороже родины, Франция не может быть поставлена на место международных интересов, французские компании не могут проиграть на французской земле иностранному бизнесу. Франция уже является сильнейшими вооруженными силами Европы, но этого еще недостаточно, мы будем становиться сильнее. Наши силы и наша экономика будут расти. Пусть Германия продаст свой танковый парк за границу, мы сохраним наши "Леклерки" и удвоим их количество. Франция должна быть готова, прежде всего, экономически, в военном отношении и морально. Если мы не будем готовы, то не будет готова и вся Европа. В эти времена мы должны взять на себя роль пастыря, в то время как Дикая Америка разрывается на части."
 FRA_France_First: "Франция Прежде Всего"
 FRA_France_First_desc: "НАТО и Европейский союз - ценные вещи, но ничто не может быть дороже родины, Франция не может быть поставлена на место международных интересов, французские компании не могут проиграть на французской земле иностранному бизнесу. Франция уже является сильнейшими вооруженными силами Европы, но этого еще недостаточно, мы будем становиться сильнее. Наши силы и наша экономика будут расти. Пусть Германия продаст свой танковый парк за границу, мы сохраним наши "Леклерки" и удвоим их количество. Франция должна быть готова, прежде всего, экономически, в военном отношении и морально. Если мы не будем готовы, то не будет готова и вся Европа. В эти времена мы должны взять на себя роль пастыря, в то время как Дикая Америка разрывается на части."

 FRA_The_Peoples_Victory: "Победа Народа"
 FRA_The_Peoples_Victory_desc: "Несмотря на то, что для многих это стало неожиданностью, НФП одержала победу на выборах во Франции в 2022 году после целого ряда событий, которые привлекли к нам внимание. Хотя мы победили, мы не можем праздновать победу. Военные настроены против нас, и [FRA.GetLeader] будет невероятно трудно продвигать наши программы в недружелюбной и незнакомой обстановке."
 FRA_Demand_Military_Loyalty: "Разобраться с Военными"
 FRA_Demand_Military_Loyalty_desc: "Несмотря на то, что официально они не связаны с французским правительством, наши военные имеют сильное влияние на политику Республики. Кроме того, они активно борются против нас даже после нашей демократической победы, видя в нас угрозу своей олигополии на власть во Французской Республике. С ними необходимо разобраться, причем быстро."
 FRA_Unite_the_Left: "Сплотить Фронт"
 FRA_Unite_the_Left_desc: "Хотя в теории мы представляем собой единый фронт, на деле мы представляем собой широкую коалицию различных левых, согласных лишь с самыми основополагающими принципами. Даже когда [FRA.GetLeader] был выбран президентом, наша коалиция все еще остается рыхлой и непрочной. Чтобы продвинуть левых вперед, мы должны укрепить НФП как настоящий альянс партий, а не просто блок, чтобы победить на выборах."
 FRA_Empower_the_Young_Jacobins: "[FRA_Empower_the_Young_Jacobins_loc]"
 FRA_Empower_the_Young_Jacobins_desc: "Видя наши успехи, социализм, естественно, будет распространяться по всей Европе. Демократическая революция не будет вынуждена оставаться только во Франции, мы будем экспортировать счастье и процветание нашего народа в другие страны - по всему Европейскому союзу, будь то национальный парламент или Европейский парламент, для улучшения всех нас."
 FRA_Empower_the_Young_Jacobins_melenchon: "Подъём Европейского Социализма"
 FRA_Empower_the_Young_Jacobins_faure: "Объединить Европейскую Социал-Демократию"
 FRA_Empower_the_Young_Jacobins_ruffin: "Наши Европейские Товарищи"
 FRA_Referendum_on_a_New_Constitution: "Референдум о 6-ой Республике"
 FRA_Referendum_on_a_New_Constitution_desc: "Как видно из правления Макрона, монархические тенденции и централизация Пятой республики стали большим откатом назад для демократических принципов нашей нации, приблизив нас к временам до революции, которая сделала нас оплотом демократии. Естественно, Шестая Республика должна быть создана народом и для народа, то, чего он хочет и желает от Франции. Да здравствует Шестая республика!"
 FRA_Expand_the_Welfare_State: "Расширить Социальное Государство"
 FRA_Expand_the_Welfare_State_desc: "Несмотря на то, что в этом секторе и раньше были большие успехи, этого недостаточно. Государство должно существовать для того, чтобы служить людям, а не просто предоставлять им льготы. Программа социального обеспечения для всех людей должна стать неотъемлемой частью Французской Республики, а не просто изменчивым фактором в ней."

 FRA_A_True_Commander_in_Chief: "Настоящий Главнокомандующий"
 FRA_A_True_Commander_in_Chief_desc: "Пьер де Вилье, настоящий полководец, подходящий на эту роль. Его долгая и блестящая карьера во французских вооруженных силах была испорчена, когда Макрон уволил его с поста министра обороны. Но его поджарили по политическим причинам, мы, народ, по-прежнему почитаем Вильеа как уважаемого командира, и многие другие генералы обращаются к нему за советом. Лидер такого уровня не появлялся со времен де Голля. Трижды за президента!"
 FRA_Rehabilitate_Reconquete: "Реабилитировать Reconquete"
 FRA_Rehabilitate_Reconquete_desc: "Земмур и его ультраконсерваторы - патриоты насквозь, для всех интенсивных целей. Антииммиграционная партия, возглавляемая алжирским евреем-иммигрантом во втором поколении, его роль в ультраправом движении всегда вызывала недоумение у его оппонентов и странный прием у соотечественников. Жан Мари Ле Пен как-то сказал, что, хотя французы часто проклинают его, евреи были очень добры. Давайте вернем эту благодарность Земмуру, Национальное объединение примет его с распростертыми объятиями, и мы будем стремиться работать вместе в коалиции, чтобы противостоять тем, кто хотел бы сохранить Францию слабой."
 FRA_Cement_Military_Control: "Укрепить Военный Контроль"
 FRA_Cement_Military_Control_desc: "Ни для кого не секрет, какое большое влияние военные имеют во Франции. Под руководством де Голля армия выступает в качестве умеренной силы, не похожей на армию в Турции, поддерживая определенные идеалы в государстве и удерживая нацию на определенном курсе, а при де Вильее? Это будет укреплено.\n\nРоль армии как умеренной силы - это священное право, завоеванное в бою за восстановление республики, ослабленной Даладье и Народным фронтом до него. Именно де Голль сражался за освобождение Франции и поддерживал сопротивление, пока гражданское правительство находилось в изгнании, и мы не должны забывать об этом."
 FRA_A_New_Aristocracy: "Новая Аристократия"
 FRA_A_New_Aristocracy_desc: "Деньги говорят, а опыт побеждает, нынешняя верхушка Франции так озабочена социальной справедливостью, что забывает о том, что армия - главный способ борьбы с несправедливостью в любом месте, забывает о том, что единственный способ положить еду на тарелку - это упростить бизнес, а не регулировать каждый магазинчик, который с трудом сводит концы с концами. Нам нужна новая интеллигенция и новый высший класс, состоящий из военных и деловых людей, Франция должна делать деньги и создавать рабочие места, потому что рабочие места означают стабильность, стабильность означает детей, а дети означают надежное будущее. Аристократия, для которой будущее могущество Франции является первоочередной задачей, - это долгосрочное преимущество."
 FRA_Play_into_Napoleonic_Overtones: "Подыграть Наполеоновскому Овертону"
 FRA_Play_into_Napoleonic_Overtones_desc: "Стремясь пробудить национальную гордость и укрепить свое лидерство, Пьер де Вилье планирует использовать мощные образы и наследие Наполеона Бонапарта. Опираясь на темы наполеоновской эпохи, связанные с силой, амбициями и военной доблестью, де Вилье стремится представить свое президентство как новую главу в истории Франции, которая возродит дух нации, которую когда-то боялись и уважали во всей Европе.\n\nЭта инициатива включает в себя ряд культурных и политических стратегий, таких как чествование ключевых наполеоновских побед, продвижение военных парадов, напоминающих те, что были во времена его правления, и подчеркивание тем национального единства и стойкости. Де Вилье стремится создать образ, в котором его руководство будет представлено как преобразующая сила для Франции, позиционируя себя как сильного лидера, способного справиться с проблемами, стоящими перед нацией."
 FRA_Birth_of_a_French_Military_Industrial_Complex: "Французский Военно-Промышленный Комплекс"
 FRA_Birth_of_a_French_Military_Industrial_Complex_desc: "Почему только в Германии и Америке должны быть крупные производители оружия? Raytheon, Rhinemetall, H&amp;K, эти компании практически гарантированно получают государственные контракты от своих стран происхождения, а наше правительство не спешит принять аналогичную систему, демонтировав систему Dirigisme де Голля. Мы должны вернуться к финансируемой государством промышленности в военном секторе, свободный рынок уже недостаточно хорош в эпоху, когда гиганты охотятся на нас, как на гниющие трупы, пиршество для восточных стервятников, которых мы когда-то держали запертыми в клетке."
 FRA_The_French_Reagan_Category: "Великий Стратег"
 FRA_The_French_Reagan_Category_desc: "Когда Пьер де Вилье встает у руля Франции, наступает эпоха преобразований, характеризующаяся стратегическими реформами, которые обещают изменить военно-политический ландшафт страны. В воздухе витает предвкушение того, как де Вилье изложит свою концепцию, направленную на повышение эффективности вооруженных сил и укрепление национальной безопасности, вселяя гордость в каждого гражданина.\n\nС каждой реформой вооруженные силы превращаются в более грозную силу, адаптирующуюся к современным вызовам и обеспечивающую безопасность и процветание французского народа. Де Вилье уделяет первостепенное внимание реструктуризации оборонного бюджета, внедрению инновационных программ обучения и налаживанию прочных связей с оборонной промышленностью. Цель ясна: создать вооруженные силы, которые не только защищают нацию, но и воплощают в себе дух стойкости и силы, определяющий Францию."
 FRA_Calm_Militarists_decision: "Спокойная Милитаристская Риторика"
 FRA_Correct_the_Trickle_Down_system_decision: "Поправить Экономику Просачивания"
 FRA_Coordinate_a_March_decision: "Скоординируйте Демонстрацию Силы"
 FRA_A_Unified_General_Staff_decision: "Объединить Генеральный Штаб"
 FRA_Perfection_of_Strategy_decision: "Совершенствование Стратегии"
 FRA_Utilize_Zemmour_decision: "Использовать Земмура"
 FRA_Play_into_ultraconservativism_decision: "Развлекать Ультраконсерваторов"
 FRA_Promote_Nationalist_Education_villiers: "Содействовать Националистическому Воспитанию"
 FRA_Remove_the_French_Cancer: "Рассечь Левых"
 FRA_Soviet_Fearmongering_villiers: "Российская Угроза"
 FRA_All_Hands_on_Deck_villiers: "Все для Государства"
 FRA_Mass_Militarization: "Массовая Милитаризация"


 FRA_A_French_Renessiance: "Триумф Народа"
 FRA_A_French_Renessiance_desc: "Французская нация ликует: народ решил, что демократические ценности вновь одержат победу над ультраправыми. Теперь, когда бремя выборов позади, правительство стремится вернуть добрую волю народа путем проведения реформ, направленных на восстановление чувства единства и национальной гордости во всей стране. Голос народа был услышан, и теперь мы должны двигаться вперед, чтобы создать Францию для всех."
 FRA_Entrench_Centrism: "Укрепить Центризм"
 FRA_Entrench_Centrism_desc: "В связи с близким исходом выборов становится очевидным, что для того, чтобы наши реформы не только прошли, но и были реализованы в веках, мы должны выгравировать наши убеждения и ценности глубоко в сердце французской политики. Для этого мы начали обращаться к оппозиции, чтобы начать диалог и активное сотрудничество по реформам, направленным на улучшение жизни французского народа. Благодаря такому подходу к политике и реформам мы сможем лучше охватить нацию и, надеюсь, избежать повторения политического раскола, вызванного последними несколькими годами правления и выборами."
 FRA_Uphold_European_Values: "Отстаивать Европейские Ценности"
 FRA_Uphold_European_Values_desc: "В отличие от нашей оппозиции, мы твердо придерживаемся ценностей, которые Европейский союз устанавливает для стран всего континента. Мы направляем все ресурсы на поддержание основных ценностей Европейского союза через демократию, сотрудничество и общение. Мы будем следить за тем, чтобы Европа оставалась сильной благодаря экономическому партнерству, и выступать за общую политику, чтобы защитить наши идеалы. Единая Европа с Францией, продвигающей идеи и ценности Европейского союза, - это то, что останется надолго после окончания нашей администрации."
 FRA_Work_with_our_Opposition: "Работать с Нашей Оппозицией"
 FRA_Work_with_our_Opposition_desc: "Чтобы обеспечить долговечность нашего прогресса и правительства, становится очевидной необходимость срочного сотрудничества между нашей партией и оппозицией. Было проведено несколько переговоров, и сейчас консерваторы начинают переговоры с нашим либеральным правительством в попытке обеспечить двухпартийность и сотрудничество, поскольку мы движемся к обеспечению сильной Франции в условиях российской агрессии и глобальной нестабильности."
 FRA_Expand_our_Mediterranean_Influence: "Расширять Средиземноморское Влияние"
 FRA_Expand_our_Mediterranean_Influence_desc: "Средиземное море всегда имело огромное значение для европейского континента и Франции как государства. Чтобы расширить свое влияние и присутствие по всему миру в свете последних событий, мы приобретем островное государство Мальта, укрепляя его экономический потенциал и делясь его культурой с Францией, обеспечивая при этом безопасность острова. В ближайшие годы эта акклиматизация принесет огромные выгоды как Франции, так и народу Мальты."
 FRA_Push_for_EU_Reform: "Настаивать на Реформах ЕС"
 FRA_Push_for_EU_Reform_desc: "После того как политическое фиаско во Франции было наконец остановлено, мы получили опыт, свидетельствующий об опасности нестабильности и радикализации. Мы будем подталкивать Европейский союз к проведению серьезных реформ, необходимых для того, чтобы избежать того, что произошло во Франции, на остальном континенте. Укрепление Европейского союза в это неспокойное время принесет пользу не только жителям Европы, но и всему миру, поскольку мы будем противостоять экстремизму и ненависти. Франция должна продемонстрировать Европе свой успех в недавней борьбе и убедиться, что Европа - это место для прогресса и реформ."


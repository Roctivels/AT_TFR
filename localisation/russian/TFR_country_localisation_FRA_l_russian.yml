 Fra_armed_forces_category: "Французская Армия"
 Fra_armed_forces_category_desc: "Французские вооруженные силы являются лучшими и наиболее важными вооруженными силами по эту сторону Атлантики. Начиная с завоеваний Карла Великого и Наполеона и заканчивая славным освобождением Франции де Голлем и Леклерком, история наших вооруженных сил одновременно славная и давняя. Недавно мы доказали, что наши вооруженные силы могут выстоять сами по себе, без НАТО, как бы то ни было, мы не должны быть слишком готовы так внезапно бросить наших союзников, поскольку на горизонте, несомненно, маячит война."
 FRA_west_africa_intervention_desc: "Западная Африка уже давно является неотъемлемой частью Франции и нашей внешней политики. \nОднако год от года эти страны пытались все дальше и дальше дистанцироваться от своего бывшего французского сюзерена, но §Rони никогда не познают вкус свободы§!."
 

 FRA_Highway_Rejuvination_desc: ""
 FRA_Prepare_for_an_Era_of_Prosperity: "Наступление Золотого Века"
 FRA_Prepare_for_an_Era_of_Prosperity_desc: ""
 FRA_Stabilize_our_American_Holdings: "Увеличить Наше Американское Присутствие"
 FRA_Stabilize_our_American_Holdings_desc: ""
 FRA_Announce_Caribbean_Interests: "Объявить о Карибском Вмешательстве"
 FRA_Announce_Caribbean_Interests_desc: ""
 FRA_Work_Against_Brazilian_Influence: "Борьба с Бразильским Влиянием"
 FRA_Work_Against_Brazilian_Influence_desc: ""
 FRA_Introduce_Neo_Colonialism_to_the_New_World: "Неоколониализм Нового Света"
 FRA_Introduce_Neo_Colonialism_to_the_New_World_desc: ""
 FRA_The_Fall_of_the_Republic: "Падение Республики"
 FRA_The_Fall_of_the_Republic_desc: ""
 FRA_Martyr_of_the_Revolution: "Мученик Революции"
 FRA_Martyr_of_the_Revolution_desc: ""
 FRA_Stand_Against_the_Junta: "Выступить Против Военной Хунты"
 FRA_Stand_Against_the_Junta_desc: ""
 FRA_Baptism_through_Revolution: "Крещение Через Революцию"
 FRA_Baptism_through_Revolution_desc: ""
 FRA_Announce_Government_of_National_Defense: "Правительство Национальной Обороны"
 FRA_Announce_Government_of_National_Defense_desc: "Франция достигла своего самого темного часа, и волки уже у ворот. Мы свергли коррумпированную неудачницу, которой было предыдущее руководство, но все не так хорошо. Армия деморализована и сломлена. Экономика разрушена, и, несмотря на все наши попытки сохранить чистоту передачи власти, вера народа в правительство и саму Францию тоже ослабла. От сепаратистов до яростных националистов и даже призрака коммунистов. Кажется, каждая группа поднимается, чтобы занять свое место на банкете трупа Франции. Ничто, кроме крайних мер, не спасет ситуацию, и, несмотря на разобщенный характер нашего правительства, недостатка в "крайних мерах" нет. Независимо от нашей приверженности, мы уже стоим перед очень важным решением о том, кому отдать приоритет в подавлении наших ограниченных ресурсов. Такое решение должно приниматься с осторожностью, поскольку более умеренные члены нашего слабого альянса опасаются, что подавление одной группы просто расширит возможности другой. Предстоящий путь будет долгим и трудным."
 FRA_Put_down_Militant_Nationalists: "Подавить Воинствующих Националистов"
 FRA_Put_down_Militant_Nationalists_desc: "Несмотря на меньшую численность, чем социалисты, националисты представляют собой гораздо более опасный элемент. Их ряды пополнились дезертирами, и большая часть офицерского корпуса симпатизирует им. Существует постоянная угроза цезаризма в армии или нашего собственного похода на Рим. У левых есть лозунги и плакаты, у правых - оружие и потенциальная поддержка армии. С левыми можно разобраться позже. Мы должны сделать все возможное, чтобы очистить армию от тех, чья лояльность вызывает сомнения, и принудительно разоружить военизированные формирования."
 FRA_Crush_the_Paris_Commune: "Сокрушить Коммунистическую Гниль"
 FRA_Crush_the_Paris_Commune_desc: "По всей Франции левые силы устраивают беспорядки. Они кричат, грабят и жгут во имя "рабочих" и "демократии". Их слишком много, чтобы правоохранительные органы могли справиться с ними самостоятельно - они переполнены и разбросаны, не в силах остановить красную волну без посторонней помощи. Армия слишком изранена, чтобы участвовать в очередном конфликте, но для подавления простых протестующих не нужна самая лучшая армия в мире. Мы также можем призвать на помощь националистических военизированных формирований, но их, скорее всего, будет сложно контролировать и предотвратить чрезмерные репрессии. Независимо от точных деталей подавления, мы искореним их и сделаем так, чтобы они больше не могли замедлить путь Франции к восстановлению."
 FRA_All_is_Well: "Tout est Bien!"
 FRA_All_is_Well_desc: "Похоже, что наше решение пресечь действия одних против других принесло свои плоды. Люди увидели, что мы беспристрастны, а наша цель - спасение Франции, а не мелкая политика и амбиции. Поступают сообщения о подпольной организации вооружений и ополчений и о все более нестабильном поведении некоторых частей армии, но это, конечно, пустяки! Кто поставит будущее Франции под угрозу, когда мы уже начали прокладывать путь к восстановлению?"

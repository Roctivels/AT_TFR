 FRA_Caribbean_Occupation_Auth_tt: "Мы создадим Управление по делам оккупации на Карибах."
 FRA_Corrupted_Presidential_Guard_tt: "Любого можно купить за деньги, даже "неподкупных" бойцов Республиканской гвардии. Деньги здесь, обещание повышения там. Их переманят на свою сторону или, по крайней мере, заставят §Rсмотреть в другую сторону...§!"
 FRA_seize_movement_warning_tt: "§RДвижение будет кооптировано этим крылом партии.§!"
 
 FRA_Recoup_our_Losses: "Возместить Наши Потери"
 FRA_Recoup_our_Losses_desc: "Правление Макрона во Франции стало катастрофой на один срок: всего за пять лет он превратился из открытого, улыбчивого и харизматичного человека в своего "юпитерианского идеала" - идеала президента как верховной власти. Если бы на его месте был кто-то другой, возможно, это удалось бы осуществить. Ренессанс был на пороге создания комфортного большинства в парламенте, но этому просто не суждено было случиться."
 FRA_Embrace_the_New_Left: "Принять Новых Левых"
 FRA_Embrace_the_New_Left_desc: "Когда-то "Ренессанс" был одной третью политической оси, самостоятельным полюсом между популистскими правыми и левыми, но "Ренессанс" не выживет без друзей. Усилия Меленшона по привлечению левых в современную эпоху принесли свои плоды, и единственный способ противостоять Ле Пену - это работать вместе и держать кнут, щелкающий над нашей собственной партией. Меленшон может быть противником, но он разделяет с нами многие политики и многие интересы. Коалиция против Ле Пена поможет нам обоим в ближайшие годы."
 FRA_Battle_Every_Legislation: "Бороться с Консервативным Законодательством"
 FRA_Battle_Every_Legislation_desc: "Ils Ne Passeront Pas, Они не пройдут. Эта фраза часто ассоциируется с битвой при Вердене. Сегодня мы в обнимку с французскими левыми смотрим на Ле Пен и снова говорим: "Ils Ne Passeront Pas", Национальное объединение свернет все, чего мы добивались, весь прогресс, которого добились центр и левые в борьбе за права трудящихся, за социальную справедливость. Каждый новый законодательный акт - это атака на работу наших предшественников за десятилетия борьбы, которая длится уже более четырех десятилетий против медленно растущего захвата власти правыми."
 FRA_Investigate_Electoral_Integrity: "Расследовать Честность Выборов"
 FRA_Investigate_Electoral_Integrity_desc: "Мы ожидали потерь из-за нефтяного кризиса и из-за ковида, но опросы говорили, что мы победим с перевесом в несколько очков, что-то пахнет в Париже, и мы начнем выполнять необходимые функции по всей стране, на национальном и местном уровне, максимально задействуя судебную систему, в попытке расследовать мошенничество в Национальном митинге. Они скажут, что это неправда и что это охота на ведьм, но настоящие или фальшивые, эти расследования разделят общественное мнение и оттянут поддержку от Ле Пен и ее дружков, если мы просто достаточно надавим на обвинения, они станут фактами в глазах общественности. Все, что нужно, - это заронить зерно сомнения."
 FRA_Take_A_Stance_on_Federalization: "Новая Позиция Федерализации"
 FRA_Take_A_Stance_on_Federalization_desc: "Макрон был одним из самых ярых сторонников европейской федерализации, предлагая создать единую армию и более широкую интеграцию права, экономики и даже полиции. Мы можем следовать этому напрасному курсу, выбирая правильных партнеров по коалиции, а можем пойти против него. Правда, победа Ле Пен демонстрирует сдвиг в политике: евроскептицизм может помочь нам в опросах. Поставить Республику выше наших соседей - это, конечно, популярное решение, Макрон так и не смог этого понять, но даже если мы можем принять это как популярную позицию, мы не обязаны отказываться от Европы. Мы можем остаться членом ЕС, если захотим. Мы действительно стоим на перепутье между двумя путями, европейским или французским будущим, выбор за нами."
 FRA_Uphold_Republican_Beliefs: "Отстаивать Республиканские Идеалы"
 FRA_Uphold_Republican_Beliefs_desc: "Либерте, Эгалите, Братство. Основа нашей великой Республики - через пять республик, два королевства и две империи мы не утратили эти идеалы. Но мы можем потерять их, если не будем их защищать. В наших собственных рядах существует коварная клика традиционалистов, консерваторов, которые стоят на две ступени выше Бурбонов. Революцию нужно защищать, и никто не знает этого лучше французов, видит бог, мы не раз испытывали их гнев в желтых жилетах.\n\nПротивостоять Ле Пен так же просто, как указывать на ее антиреспубликанскую политику, наши основные идеалы - эгалитаризм и свобода, она будет блокировать протестующих и ставить французов выше всех, даже если это означает отчуждение меньшинств. Французская республика никогда не была основана на идеалах неугасимого национализма и неограниченной ксенофобии, в самом начале своего существования мы даже пытались оторваться от церкви, и хотя эта платформа не была столь популярной, это не значит, что мы должны разрушать труды 1793 года, чтобы создать какое-то новое, кастрированное общество, защищенное, но слишком боящееся критиковать правительство."

 FRA_A_Denied_Destiny: "Наша Отвергнутая Судьба"
 FRA_A_Denied_Destiny_desc: "Ле Пен потерпела неудачу, ее реформизм проиграл нам выборы, мы никогда не были популярны из-за того, что были правыми умеренными, мы были партией действия и силы! Отставка Ле Пен - это лучшее, что она сделала за многие годы. Сейчас партия находится под руководством Барделлы, мы лишены мандата народа из-за либерального статус-кво Макрона и его юпитерианских дружков, он не де Голль, не таинственный человек в замке из слоновой кости, он смеющийся шакал, служащий Брюсселю, и мы не будем лежать сложа руки и позволять этому случиться, Макрон будет смотреть, как мы распутываем его драгоценную паутину бизнесменов и военных, его союзники будут отступать из страха."
 FRA_Reintegrate_Radical_Forces: "Реинтегрировать Радикальные Силы"
 FRA_Reintegrate_Radical_Forces_desc: "Именно реформы Национального объединения привели к расколу правых, к появлению "Идентаристов", "Отвоевания Земмура". Если бы мы объединились на последних выборах, у нас было бы большинство. С Барделлой у власти партия Отца вернулась, а партия Дочери мертва. Радикалы вернутся в наши объятия, и вместе, в солидарности, мы будем стоять и быть услышанными. Vive la France!"
 FRA_Meet_with_Disgraced_Militarists: "Встретиться с Опозоренными Милитаристами"
 FRA_Meet_with_Disgraced_Militarists_desc: "Перед последними выборами военные поступили как Мартин Лютер, прибив требования к дверям правительства по всему Парижу, военные подразделения переместились на периферию. Макрону и всей стране казалось, что может произойти переворот, но это было лишь давление, Макрон бежал и твердо противостоял требованиям военных, Ле Пен предложила свою символическую поддержку, а затем не смогла одержать победу. Военные смятены победой Возрождения и продолжающимся ослаблением армии Франции, в то время как жестокие орки собирают своих людей на востоке, готовые растоптать запад в хаотическом вакууме, оставленном Америкой. Барделла и Военные обладают схожей волей, волей к внезаконным действиям, чтобы обеспечить будущее Франции, мы можем удовлетворить их требования - и даже больше."
 FRA_Entangle_Electoral_Victory: "Саботировать Либеральные Научные Круги"
 FRA_Entangle_Electoral_Victory_desc: "Либеральная элита не просто так занимает сегодня статус-кво, она контролирует школьное образование. Как когда-то марксисты во времена расцвета Народного фронта. Если вы контролируете школу, вы контролируете учеников, учите их правильному и неправильному, учите их быть тихими или громкими, направляете их против тех, кого вы хотите подавить, и они делают все остальное, воспитывают своих детей в той же индоктринации, и их детей, и так далее, и так далее. Элитные академические круги Франции - это гнилые и деспотичные левые глобалисты, которых не волнует благополучие Франции и ее народа перед интересами какой-то тимбукфукской деревушки на другой стороне планеты. Сколько человек было убито? Сколько предприятий и жизней разрушено? Сколько протестов вызвало их образование? Больше не надо, срывайте их деятельность, как только можем, посылайте ночью людей в масках, чтобы они нагрубили им в их домах, угрожайте взрывами и сваливайте все на русских агитаторов и левых революционеров. Мы возьмем бунты, которые они подстрекают, в свои дома, и они затихнут. Возможно, они даже присоединятся к нам из страха."
 FRA_The_Right_Way: "Правый Путь"
 FRA_The_Right_Way_desc: "Правый путь - это правильный путь, а что принесут левые? Инфляцию? Повышенные налоги? Больше пособий при меньшей выгоде, так как орды мусульман отнимают результаты вашего труда? Если хотите, позвоните в центр "Возрождения", который находится в постели с Брюсселем и, только получив шанс, продаст всю страну за реальный шанс на федерализацию Европы. Гибель Франции - это не просто теория заговора, это предвыборная политика и долгосрочная стратегическая цель либералов. Только Барделла и Национальное объединение могут избавить Францию от левых планов, только Национальное объединение может снизить ваши налоги, положить пособия в ваш карман и отправить мавров на плоты, на которых они и приплыли. Проголосуйте за своего местного представителя Национального объединения и спросите в своем местном отделении, как вы можете помочь партии добровольцами, если вы здесь по поводу нашего вооруженного крыла? Понизьте голос и следуйте за мной."
 FRA_Stoke_Russian_Fears: "Разжечь Страх Перед Российским Господством"
 FRA_Stoke_Russian_Fears_desc: "Русские всегда были врагами Европы! Вероломные! Славянские! Едва ли лучше монгольской орды. Отсталая империя подвела нас, они заключили сделку с Германией и не прошло и 20 лет, как они уже дружат с немцами, улыбаясь нам, Ялтинская конференция скорее было похоже на дерьмовую бумагу для грузинского пса, русские никогда не соблюдали никаких соглашений. Почему вы думаете, что они будут соблюдать свои соглашения сейчас? Вы дураки, русский бот или безбожный коммуняка, ностальгирующий по родине. Хватит врать себе, Франция! Если вы не проснетесь и не поймете, в каком жестком новом мире мы живем!"

 FRA_Operation_Saint_Arnaud: "§YOpération§!: Davout"
 FRA_Operation_Saint_Arnaud_desc: "Русские были застигнуты врасплох нашим внезапным вмешательством в оборону Украины, но не остановились. Судя по новостям с фронта и сообщениям разведки, вместо того чтобы остановиться и оценить ситуацию, русские удвоили силы и влили в украинскую оборону дополнительные ресурсы. Несмотря на опасения по поводу способности Украины пережить бурю, обстоятельства открывают потенциально золотую возможность. Поскольку внимание россиян полностью сосредоточено на Украине и попытках организовать линию, которая сейчас составляет шестнадцать сотен километров, они сильно напрягли свои ресурсы. Это создало условия для смелой высадки морского десанта за российскими линиями в районе Кубани. Этот плацдарм еще больше напряжет российские людские и материально-технические ресурсы и, возможно, заставит их приостановить наступательные операции, что позволит нам организовать дальнейшие крупномасштабные контратаки, пока медведь выведен из равновесия. Успех закрепит за нами статус ведущего игрока, провал недопустим, ведь на кону судьба Европы и честь Франции."
 FRA_Operation_Davout_decision: "§YOpération§!: Davout"
 FRA_NATO_war_category: "Европейская Война"
 FRA_NATO_war_category_desc: "\n\n\n\n\n£GFX_SOV_NATO_war_category\n\n\n\n\n\n\n\nРусские снова пытаются вторгнуться в Европу, чтобы создать свою империю... Только мы можем остановить их.\n\n§RОСНОВНЫЕ ЦЕЛИ§!:\n\n§YСЕВАСТОПОЛЬ§!: [GLOBAL.get_sevastopol_nato_status]\n§YМИНСК§!: [GLOBAL.get_minsk_nato_status]\n§YСАНКТ-ПЕТЕРБУРГ§!: [GLOBAL.get_petersburg_nato_status]\n§YРОСТОВ-НА-ДОНУ§!: [GLOBAL.get_rostov_nato_status]\n\n§RВТОРОСТЕПЕННЫЕ ЦЕЛИ§!\n\n§YКАЛИНИНГРАД§!: [GLOBAL.get_kaliningrad_nato_status]\n§YБЕЛГОРОД§!: [GLOBAL.get_belgorod_nato_status]\n§YВОЛГОГРАД§!: [GLOBAL.get_volgograd_nato_status]\n§YНОВГОРОД§!: [GLOBAL.get_novgorod_nato_status]\n§YДОНЕЦК§!: [GLOBAL.get_donetsk_nato_status]\n§YЛУГАНСК§!: [GLOBAL.get_luhansk_nato_status]\n\n§GСОЮЗНЫЕ ГОРОДА§!\n\n§YКИЕВ§!: [GLOBAL.get_kiev_nato_status]\n§YОДЕССА§!: [GLOBAL.get_odessa_nato_status]\n§YТАЛЛИН§!: [GLOBAL.get_tallinn_nato_status]\n§YВИЛЬНЮС§!: [GLOBAL.get_vilnius_nato_status]\n§YВАРШАВА§!: [GLOBAL.get_warsaw_nato_status]\n§YБУДАПЕШТ§!: [GLOBAL.get_budapest_nato_status]\n§YБУХАРЕСТ§!: [GLOBAL.get_bucharest_nato_status] \n\n§YOPÉRATION DAVOUT§!: \n§5КЕРЧЬ§!: [GLOBAL.get_kerch_nato_status] \n§5НОВОРОССИЙСК§!: [GLOBAL.get_novorossiysk_nato_status] \n§5СОЧИ§!: [GLOBAL.get_sochi_nato_status]"

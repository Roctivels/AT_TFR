 FAF_fasces_over_france_cat: "Фасции поднимаются над Францией"
 FAF_fasces_over_france_cat_desc: "\n\n\n\n\n£GFX_FAF_french_fascist_cat\n\n\n\n\n\n\n\n"
 FAF_legalize_paganism_decision: "Поощрить Язычество"
 FAF_legalize_paganism_decision_desc: "Несмотря на то, что мы приняли церковь в повседневном правлении, наша партия все еще имеет тесные связи с неоязыческим сообществом во Франции. \n\nЭто сообщество очень воинственно и патриотично, но оно будет яростно конфликтовать с нашими новыми католическими связями."
 FAF_provoke_french_opposition_decision: "Спровоцировать Французскую Оппозицию"
 FAF_provoke_french_opposition_decision_desc: "Какой лучший способ привлечь к себе внимание, одновременно понося оппозицию? Конечно же, выставить их в плохом свете. Как? Очень просто, это самый старый трюк в книге политики. Мы приманиваем их двусмысленными оскорблениями, а они в гневе выставляют себя на посмешище."
 FAF_word_of_the_bishop_decision: "Слово Епископа"
 FAF_word_of_the_bishop_decision_desc: "На протяжении всей европейской истории папство играло с нашими народами и правителями как со скрипкой. Используя христианскую веру как невидимое оружие, оно превращало Европу в искаженное подобие ее прежней сущности. Больше мы не будем проливать свою кровь во имя вымышленного бога. Папа станет нашим хористом и будет петь наши хвалебные песни."
 FAF_reorganize_the_LVF_decision: "Реорганизовать ЛФД"
 FAF_reorganize_the_LVF_decision_desc: "Название Добровольческих сил лоялистов было опошлено теми, кто никогда не понимал его по-настоящему. Красные и либералы - единственная причина упадка нашей нации, поэтому ей нужно больше таких групп, как лоялисты, чтобы очистить нашу нацию от этой грязи и избавить ее от болезни."
 FAF_glorify_collaborationism_decision: "Прославление Коллаборационизма"
 FAF_glorify_collaborationism_decision_desc: "Коллаборационистов всегда называют предателями, крысами и собаками. Но как можно быть предателем, если человек работает над тем, чтобы избавить свою нацию от болезни, которая медленно ее убивает? Когда наш народ сотрудничал с немцами во время Второй мировой войны, это было сделано не для того, чтобы подорвать нашу нацию, а для того, чтобы искоренить большевистскую угрозу. Это, конечно, не крыса и не предатель, а лекарь и заботник."
 FAF_work_f_decision: "Наша Работа!"
 FAF_work_f_decision_desc: "Работать нужно и необходимо. Труд - это единственная форма деятельности, которая всегда приносит положительные результаты. Кирпичи не укладываются сами собой. Дороги не проложат сами. Урожай не вырастет сам по себе. Только потом и кровью наших людей можно восстановить эту некогда славную нацию."
 FAF_family_f_decision: "Наша Семья!"
 FAF_family_f_decision_desc: "Семья - это все, прежде всего. Самое святое, что есть на свете, - это семейная структура. Только поддерживая традиционные семейные ценности и структуру, Франция сможет заново заселить себя. Война практически уничтожила целое поколение людей. Если мы не освежим жизненную силу нашей нации, мы обречены на гниение и крах."
 FAF_fatherland_f_decision: "Наша Родина!"
 FAF_fatherland_f_decision_desc: "Родина, Отечество - сила, объединяющая наш народ и делающая нас неделимыми. Без нее народ - ничто, а без народа она не может существовать. Они связаны между собой симбиотическими отношениями. Если наш народ когда-нибудь забудет о своей родине, то большая семья, которая когда-то была нашей нацией, будет разрушена навсегда. Разбита, чтобы быть захваченной иностранными державами."
 FAF_honest_french_middle_class_decision: "Наш Честной Народ"
 FAF_honest_french_middle_class_decision_desc: "Французский народ воплощает в себе идеальный образ Божьего творения. Честные, безупречные и мудрые. Именно эти черты сделали нашу нацию процветающей и великой. Французы никогда не стремились к господству над другими, а просто распространяли свои идеалы и культуру."
 FAF_oui_oui_oui_decision: "§COui! Oui! Oui!§!"
 FAF_oui_oui_oui_decision_desc: "Скажите да войне! Скажите да самопожертвованию! Скажите да победе! Поражение в Русско-европейской войне заставило наш народ забыть о том, что когда-то делало нас славной и могущественной нацией, поэтому мы должны напомнить ему об этом. Ведя их вперед, мы научим их думать и действовать - не только ради них самих, но и ради нашего национального возрождения."
 FAF_non_non_non_decision: "§RNon! Non! Non!§!"
 FAF_non_non_non_decision_desc: "Скажите нет пацифизму! Скажите нет либерализму! Скажите нет коммунизму! Одно дело - навести порядок в доме, но совсем другое - выкорчевать гниль, которая прорастает в глубине нашей нации. Грязь, отравляющая умы наших граждан, не исчезнет сама по себе; вместо этого мы должны направить наших людей на правильный путь и не дать им сбиться с него."


 FRA_silence_the_radical_left: "Заставить Подрывные Элементы Молчать"
 FRA_silence_the_radical_left_desc: "Меленшон и его коррумпированные дружки были отстранены от власти, но это никогда не было концом их коварного предательства. Те, кто придерживается его злобных взглядов, тоже не собирались просто взять и умереть, но даже умеренные высказывают опасения. Для подобных опасений нет места, даже если они вполне обоснованны. Республика переживает кризис, и ради ее спасения необходимо идти на жертвы, даже если для этого придется на время посадить ее на поводок."
 FRA_reverse_their_decisions: "Отмена Экономического Кризиса"
 FRA_reverse_their_decisions_desc: "Одним из многих последствий правления предыдущего социалистического правительства стал невосполнимый ущерб, нанесенный экономической способности Франции вести войну. Ошибочные попытки "поднять трудящихся" и приоритет государства всеобщего благосостояния оставили вооруженным силам мало возможностей для работы, несмотря на надвигающуюся бурю. Ненужные реформы на рабочих местах, мешающие производству, будут свернуты - любое сопротивление со стороны профсоюзов будет встречено силой. Раздутое государство всеобщего благосостояния должно быть ликвидировано, а его средства направлены на оборону и другие проекты по защите Франции."
 FRA_render_unto_caesar: "Отдать Должное Цинциннату"
 FRA_render_unto_caesar_desc: "С момента провозглашения нашего нового правительства к нашим ногам была брошена одна и та же критика. Неважно, от кого она исходит - от настоящих отступников или от добропорядочных жителей Франции, которых просто ввели в заблуждение, - утверждения повторяются. Что мы стремимся уничтожить Республику, что мы не более чем неизбираемые автократы, стремящиеся к власти и богатству за счет народа. Цезаризм не стоит на повестке дня, и никогда не будет стоять. Наша верность - Республике, Франции. Как и Цинциннат до нас, мы будем защищать государство и, как только будет достигнут мир, восстановим Республику - независимо от того, на кого или на что нам придется наступить."
 FRA_democratic_supervision_committee: "Республиканский Комитет по Надзору"
 FRA_democratic_supervision_committee_desc: "После стабилизации ситуации на внутреннем фронте мы можем двигаться вперед, чтобы успокоить страхи людей. Путь предстоит долгий и трудный, но мы не должны отдыхать и откладывать будущее. Чтобы обеспечить более плавный переход от хунты к республике, мы создадим комитет по проверке партий и кандидатов и подготовим внеочередные выборы, как только уляжется пыль. Огонь Республики будет поддерживаться - тускло, и все, что нужно сделать, - это просто добавить топлива, чтобы он снова горел ярко."

 hos_caesar: "Цинциннати"
 hos_enemy_of_the_united_left: "Враг Народа"
 FRA_dem_supervision_committee_tt: "§YЭто положит начало процессу §! §CРедемократизации правительства§!"
 FRA_the_forces_that_seek_to_tear_us_apart: "Силы, что Разделяют"
 FRA_the_forces_that_seek_to_tear_us_apart_desc: "Силы раскола вонзают нож в сердце Франции. Коммунисты-революционеры, яростные националисты и сепаратисты - все они требуют перемен. Именно эта дисгармония внутри страны и во всей Европе привела нас к катастрофе. Выход - не в дальнейшем погружении в пучину изолированной посредственности, а в силе европейского единства. Мы будем бороться за лучшее завтра против сил реакции и революции; мы не остановимся, пока призраки прошлого и настоящего не исчезнут, и мы не сможем смотреть в более светлое и сильное будущее. Мы и наши единомышленники в остальной Европе не успокоимся, пока вся Европа не зазвучит призывами "In Varietate Concordia"."
 FRA_snuff_the_french_cigarette: "Потушить Французскую Сигарету"
 FRA_snuff_the_french_cigarette_desc: "Несмотря на заявления националистов, в истинной французской идентичности мало уникального. Мы - истинно европейский народ, на перекрестке сочетающий в себе все, что сделало Европу великой. Язык, унаследованный от римлян, земля и кровь немцев. Франция сыграла решающую роль в истории Европы со времен Карла Великого, Наполеона и до наших дней. Несмотря на все это, мы были просто частью европейской мозаики, а не отдельным образованием. Наша судьба была, есть и всегда будет переплетена с судьбой Европы, и те, кто утверждает обратное, представляют для нашего будущего такую же угрозу, как и русские через Вислу."
 FRA_turn_away_from_the_past: "Отвернуться от Прошлого"
 FRA_turn_away_from_the_past_desc: "Есть люди, которые так много времени проводят в размышлениях о том, что было или что могло бы быть, что теряют представление о реальности. Даже те, чьи идеи были в правильном направлении, но отказались идти до конца, должны осознать эту истину. Прошлое со всеми его неудачами - это всего лишь прошлое, и только полный вперед подход к будущему может спасти наши мечты о единстве, процветании и силе."
 FRA_seek_european_aid: "Искать Европейскую Помощь"
 FRA_seek_european_aid_desc: "Мы не одиноки ни в своем видении, ни в своей борьбе. С каждым днем все больше и больше людей вместе со своими правительствами видят настоятельную необходимость европейского единства в эти трудные времена. Несмотря на наш собственный гражданский конфликт по поводу этих концепций, другие части Европы, к счастью, свободны, по крайней мере, от открытого конфликта в пределах своих собственных границ. Учитывая, что мы сейчас находимся на передовой линии будущего Европы, не будет ли слишком многого, если мы попросим помощи у тех, кто может ее предложить? Винтовки, пайки, газ - все это нам нужно, и нужно очень много. Даже если помощь наших друзей не сможет полностью покрыть"
 FRA_towards_a_united_future: "К Единому Будущему"
 FRA_towards_a_united_future_desc: "В ходе решительных реформ должны быть уничтожены все остатки Древнего режима. От всего, начиная с местных политических партий и заканчивая национальным собранием, необходимо избавиться, поскольку они просто сдерживают нашу дальнейшую интеграцию в европейское сообщество. В этой новой Франции - нет, в этой новой Европе - есть место только для Европейского парламента и европейской бюрократии."
 FRA_burn_the_northern_traitors: "Сжечь Север"
 FRA_burn_the_northern_traitors_desc: "Мы со всех сторон окружены гнилью и предательством. Очевидно, что приоритет должен быть отдан усмирению севера - он гораздо более развит экономически и, если его оставить в покое надолго, может представлять гораздо большую угрозу. Будет лучше, если это богатство и военный потенциал вернутся в наши руки как можно скорее, так как это ускорит восстановление остальной части страны."
 FRA_salt_the_south: "Засолить Юг"
 FRA_salt_the_south_desc: "Мы со всех сторон окружены гнилью и предательством. Очевидно, что приоритет должен быть отдан подавлению сепаратистов на нашем юге. Ситуация с продовольствием критическая, и, несмотря на то, что северные районы более ценны в экономическом и военном отношении, без продуктов питания двигатели экономики и войны бездействуют. Мы должны обеспечить сельскохозяйственную базу юга, прежде чем думать о восстановлении крупных военно-морских или промышленных районов на севере."
 FRA_southern_push_idea: "Южные Наступления"
 FRA_away_from_our_past_idea: "Попрощаться с Неолиберализмом"

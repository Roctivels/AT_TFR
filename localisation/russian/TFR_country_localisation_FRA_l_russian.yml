 FAF_implement_policy_in_new_states_decision: "Распространить Зелёное Слово"
 FAF_implement_policy_in_new_states_decision_desc: "Было время, когда священные деревья Афины процветали, а вершины Олимпа украшали нестареющие снега. Но теперь земли Европы окутаны промышленностью. Старовозрастные леса гибнут под гулом машин, кристальные реки помутнели от загрязнений. Колыбель западной цивилизации теряет свой священный облик под неустанным натиском современности. Но спасение Европы не в стальных и бетонных городах, а в гармонии между человеком и природой. Мы сможем показать себя хранителями древней цивилизации только тогда, когда вновь будем с благоговением защищать красоту природы. Так что это наш удел - вечная надежда Европы."

 FAF_historical_idols_idea: "Исторические Идолы"
 FAF_historical_idols_idea_desc: "Франция никогда не испытывала недостатка в исторических гигантах. От Карла Великого до Наполеона - наша плодородная земля породила величайших людей в истории человечества. Среди этой тьмы именно они дают нам проблеск надежды. Они олицетворяют собой идеальную Францию - сильную Францию, которая когда-то правила Европой и распространяла свое влияние по всему миру. Возможно, мы проиграли эту войну, но после того, как новые великие французы сменят старых коррумпированных политиков, доведших страну до отчаяния, Франция вновь расцветет. Они откроют новый золотой век Франции."
 FAF_the_word_of_the_bishop_idea: "Слово Епископа"
 FAF_criox_de_fau_idea: "Croix-de-Feu"
 FAF_criox_de_fau_idea_desc: "Когда в межвоенный период в Италии зародился фашистский дух, многие группы во Франции переняли его и привнесли в эту чужую страну. Но ни одна из них не использовала его так эффективно, как Croix-de-Feu под мудрым руководством Ла Роша. Croix-de-Feu стал объединяющей силой для французских патриотов и бойцов. И хотя некоторые наши граждане до сих пор испытывают к ним неприязнь, в такие времена Франция нуждается в единстве и патриотизме."
 FAF_criox_de_fau_better_idea: "Croix-de-Feu"
 FAF_criox_de_fau_better_idea_desc: "Когда в межвоенный период в Италии зародился фашистский дух, многие группы во Франции переняли его и привнесли в эту чужую страну. Но ни одна из них не использовала его так эффективно, как Croix-de-Feu под мудрым руководством Ла Роша. Croix-de-Feu стал объединяющей силой для французских патриотов и бойцов. И хотя некоторые наши граждане до сих пор испытывают к ним неприязнь, в такие времена Франция нуждается в единстве и патриотизме."
 FAF_the_crime_of_opinion_idea: "Преступление Мнения"
 FAF_the_crime_of_opinion_idea_desc: "В нашем стремлении обеспечить свою власть, мы боремся за умы и сердца наших граждан. Перевоспитание дало хорошие результаты, но еще один инструмент, который мы можем применить, - это запрет на антирежимную мыслепреступность. Если мы сделаем распространение или хранение либеральных, прогрессивных и антифранцузских идеалов наказуемым штрафом или небольшим тюремным сроком, мы добьемся того, что люди дважды подумают, прежде чем жаловаться на наше праведное правительство!"

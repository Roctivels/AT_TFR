 vatican.2.t: "Смерть Папы Франциска"
 vatican.2.d: "ВАТИКАН (IO) - Папа Франциск скончался сегодня утром в возрасте 88 лет, о чем было официально объявлено в 07:35 (GMT+2), оставив после себя наследие пропаганды международного мира и дипломатии. Его знаменитые встречи с аятоллой Ирана стали лишь вершиной успеха в работе этого человека в глава папства.\n\nХотя Папа Франциск был противоречивой фигурой среди католиков всего мира, никто не может отрицать, что вся Католическая церковь скорбит в этот день, когда Ватикан звонит в свои колокола. Его порой реформистские высказывания вызывали критику со стороны консерваторов, но его забота об окружающей среде и бедных подчеркивала его популярность среди широких масс Европы и всего католического мира.\n\nВозможно, это было чудо, что, несмотря на двустороннюю пневмонию, поразившую его легкие, он добрался до площади Святого Петра в Пасхальное воскресенье, в последний раз, чтобы благословить сотни людей и пообщаться с ними, совершив последнюю поездку на папском автомобиле. Он заснул и мирно скончался на следующий день, в пасхальный понедельник.\n\nБудучи первым иезуитом и первым латиноамериканским папой, он также был первым, кого назвали в честь святого Франциска Ассизского, святого, известного своей простотой и заботой о больных и несчастных. Его смерть наступила в результате продолжительной борьбы с хроническим заболеванием легких, последовавшей за проблемами с толстой кишкой в 21 год, грыжей в 23 года и, начиная с 22-го, повторными приступами бронхита."
 vatican.2.a: "Мы выражаем наши глубочайшие соболезнования."

 vatican.4.t: "Кардинал Луис Антонио Тагле избран Папой Римским Франциском II"
 vatican.4.d: "Этим утром в Вечном городе зазвонили колокола собора Святого Петра, а из трубы Сикстинской капеллы повалил белый дым, оповещая мир о том, что конклав завершен и Коллегия кардиналов избрала 267-го епископа Рима. Кардинал Луис Антонио Тагле из Филиппин был избран на престол Святого Петра и принял имя Франциск II, став первым в истории папой Римским из Восточной Азии.\nВ своем публичном обращении в качестве понтифика с балкона собора Святого Петра новоизбранный Папа Римский сделал несколько заявлений относительно нового лица в Кремле:\n\n"В связи с возрождением Москвы и ее сферы я здесь, чтобы предупредить вас о самой возможности нового подъема империализма. И как таковой, конец рассуждениям, милосердию и смирению, за которые умер Христос, чтобы мы могли их поддерживать. Я призываю вас, братья и сестры в России, противостоять попыткам Кремля поддержать ложное понимание Евангелия."\n\nСильный акцент папы Франциска II на межрелигиозном диалоге и миссионерской работе гарантировал, что его папство будет основываться на соборности, поскольку, как представляется, более прогрессивным является его крыло обретает влияние на Святом Престоле. Однако он сталкивается с критикой со стороны более консервативных и традиционалистских приверженцев своей веры, особенно из-за его акцента на вовлечении маргинализированных людей, включая гомосексуалистов, и сопровождении их."
 vatican.4.a: "Новый папа для новой эры"
 vatican.5.t: "Кардинал Роберт Прево избран Папой Римским Львом XIV"
 vatican.5.d: "Этим утром в Вечном городе зазвонили колокола собора Святого Петра, а из трубы Сикстинской капеллы повалил белый дым, оповещая мир о том, что конклав завершен и Коллегия кардиналов избрала 267-го епископа Рима. Кардинал Роберт Фрэнсис Прево из Соединенных Штатов был избран на престол Святого Петра под именем Лев XIV, став вторым папой римским из Америки в истории.\nВ своем публичном обращении в качестве понтифика с балкона собора Святого Петра новоизбранный Папа Римский прокомментировал ситуацию в своей родной стране:\n\n"И всем вам, братья и сестры Америки. О, как болит мое сердце за каждую душу, потерянную в этом безбожном конфликте! Но не волнуйтесь, ибо мир Божий превосходит всякое понимание, и если вы верите в Бога, мир вернется в Америку. Итак, обращаюсь к вам, братья и сестры по всему миру, мы должны следовать примеру Христа и наводить мосты к тем, кто пострадал от этого и от любого другого конфликта, а не разрушать их".\n\nИмея опыт миссионерской работы и уделяя внимание малым культурам, ожидается, что Папа Лев XIV, вероятно, будет похоже на курс, выбранный папой Франциском до него, который уже заявил о своей поддержке Объединения Америки в продолжающейся гражданской войне."
 vatican.5.a: "Наследие Франциска продолжает жить"
 vatican.6.t: "Кардинал Петер Эрдо избран Папой Римским Стефаном X"
 vatican.6.d: "Этим утром в Вечном городе зазвонили колокола собора Святого Петра, а из трубы Сикстинской капеллы повалил белый дым, оповещая мир о том, что конклав завершен и Коллегия кардиналов избрала 267-го епископа Рима. Кардинал Петер Эрдо из Венгрии был избран на престол Святого Петра, приняв имя Стефан X.\nВ своем публичном обращении в качестве понтифика с балкона Собора Святого Петра новоизбранный Папа Римский высказался о состоянии мировых дел:\n\n"Европа сегодня более разделена, чем когда-либо. так было на протяжении десятилетий. В такие времена, как наше, единая, святая, католическая и апостольская Церковь должна быть маяком, стоящим выше политики, но при этом никогда не оставаться равнодушной к несправедливости. Давайте помнить, что наше единство превыше любых границ, флагов или партий, ибо все мы едины во Христе Иисусе. Сейчас не время отчаиваться, нужно обновляться."\n\nЧасто описываемый как теологический консерватор с глубоким уважением к католическим традициям, папа Стефан, вероятно, будет делать упор на преемственность и стабильность, особенно в разгар усиливающихся глобальных кризисов. Однако многолетняя приверженность делу социальной сплоченности, диалога с Восточными церквями и роли национальной идентичности в религии делает его выдающимся папой, чутким к уникальным тревогам Европы."
 vatican.6.a: "Новая эра для Церкви."
 vatican.7.t: "Кардинал Роберт Сара избран Папой Римским Бенедиктом XV"
 vatican.7.d.1: "Этим утром в Вечном городе зазвонили колокола собора Святого Петра, а из трубы Сикстинской капеллы повалил белый дым, оповещая мир о том, что конклав завершен и Коллегия кардиналов избрала 267-го епископа Рима. Кардинал Роберт Сара из Ганы был избран на престол Святого Петра под именем Бенедикт XV и стал первым папой Римским, прибывшим из Африки более чем за 1500 лет.\nВ своем публичном обращении в качестве понтифика с балкона собора Соборе Святого Петра новоизбранный Папа Римский выступил с резким заявлением:\n\n"Призрак коммунизма теперь преследует каждый уголок мира. Он подобен яду, который проникает в сердца и умы и отвергает Бога и человеческое достоинство, распространяясь на вещи этого мира. Мы должны дать противоядие: там, где те, кто любит мирские блага, распространяют свою пропаганду, мы должны громче провозглашать Евангелие. Этому миру нужны не компромиссы, а мужество."\n\nОжидается, что папа Бенедикт XV, известный своим ярым и непримиримым традиционализмом и яростной оппозицией современной светской культуре и исламскому фундаментализму, положит начало эпохе строгого традиционализма. Его избрание свидетельствует о том, что Церковь готова противостоять тому, что он назвал "крахом Запада", как морально, так и духовно."
 vatican.7.d.2: "Этим утром в Вечном городе зазвонили колокола собора Святого Петра, а из трубы Сикстинской капеллы повалил белый дым, оповещая мир о том, что конклав завершен и Коллегия кардиналов избрала 267-го епископа Рима. Кардинал Роберт Сара из Ганы был избран на престол Святого Петра под именем Бенедикт XV и стал первым папой Римским, прибывшим из Африки более чем за 1500 лет.\nВ своем публичном обращении в качестве понтифика с балкона собора Святого Петра новоизбранный Папа выступил с резким заявлением: "Призрак коммунизма с ревом вернулся. Он завоевывает свободные и суверенные страны и проповедует против Бога, прикрывая преследования справедливостью, а тиранию - порядком. Теперь мы сталкиваемся с новой, китайско-российской осью зла, где наш Господь изгнан, а люди поставлены на колени перед государством. Мы не будем молчать перед ними. Если нам придется снова нести свой Крест через Голгофу, мы с радостью сделаем это."\n\nИзбрание Бенедикта XV - непримиримого традиционалиста - представляет Церковь, готовую сопротивляться, осуждать и вести верующих через то, что он назвал новой "эрой волков"."
 vatican.7.a: "Воинствующая церковь возвращается."
 vatican.8.t: "[THIS.GetAdjective] Был Избран Папой Римским"
 vatican.8.d: "Кардинал из нашей страны был избран следующим папой римским!\n Мы получаем крутые бонусы и некоторое влияние на другие страны, ура!"
 vatican.8.a: "Круто."
 

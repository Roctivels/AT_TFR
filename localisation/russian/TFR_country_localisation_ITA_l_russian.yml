l_russian:
 #Focuses
 ITA_memento_audere_semper: "Memento Audere Semper"
 ITA_memento_audere_semper_desc: "Русский снова пришел, чтобы пить кровь Украины, Польши, Европы!\nИ сегодня снова пусть его сердце горит! Сыновья Европы готовы.\nПусть вторгшиеся собаки выходят вперед, мы один народ, связанный одной судьбой, закаленный одними и теми же борьбами!\nПусть приходят. Мы отбросим Русских обратно к Уралу!"
 ITA_eyes_in_the_skies: "Глаза в Небесах"
 ITA_eyes_in_the_skies_desc: "Невозможно перемещать военно-воздушные силы или флот, не зная, где находится противник. Восточная Европа будет оснащена рядом датчиков, антенн и радаров для отслеживания действий противника, а наши самолеты будут отвечать за патрулирование воздушного пространства вдоль линии фронта."
 ITA_expanded_mediterranean_doctrine: "Расширенная Средиземноморская Доктрина"
 ITA_expanded_mediterranean_doctrine_desc: "Средиземное море является колыбелью итальянской цивилизации и всегда было предметом национальных амбиций. Итальянский флот задуман, организован и спроектирован для Средиземного моря, а сама морская культура нашего флота направлена на контроль и патрулирование нашего "Mare Nostrum." Наша обязанность - обеспечить безопасность побережья Европы и, по возможности, наносить удар по медведю всякий раз, когда он осмеливается нырять в воду."
 ITA_wings_over_the_horizon: "Крылья Над Горизонтом"
 ITA_wings_over_the_horizon_desc: "Авиация всегда была жемчужиной в короне итальянских вооруженных сил, источником национальной гордости на протяжении всей истории страны. Капорни, Д'Аннунцио и Алессандро Маркетти - лишь некоторые из великих имен, которые стояли за крыльями Италии в качестве конструкторов, пилотов или просто энтузиастов полетов. Мы сосредоточимся на улучшении, переосмыслении и расширении итальянских конструкций, а также на развертывании обширного парка самолетов для противодействия врагу."
 ITA_venturing_in_the_big_blue: "В Путешествие по Безбрежному Океану"
 ITA_venturing_in_the_big_blue_desc: "Volare oh, oh\nCantare oh, oh\nNel blu dipinto di blu\nFelice di stare lassù\nE volavo, volavo felice più in alto del sole\nEd ancora più su\nMentre il mondo pian piano spariva lontano laggiù\nUna musica dolce suonava soltanto per me"
 ITA_operation_nettuno: "ОПЕРАЦИЯ: §YNETTUNO§!"
 ITA_operation_nettuno_desc: "Кодовое название Нептун - это широкомасштабная операция по обеспечению безопасности российских портов, объектов снабжения, морских батарей и пляжей в рамках подготовки к полномасштабному вторжению. Мы укрепим позиции НАТО в войне и, если повезет, захватим стратегические объекты, имеющие решающее значение для планов наших союзников."
 ITA_operation_giove: "ОПЕРАЦИЯ: §YGIOVE§!"
 ITA_operation_giove_desc: "Кодовое название Giove - это широкомасштабная операция по захвату российских аэродромов, объектов снабжения, зенитных орудий и путей связи в рамках подготовки к крупномасштабному вторжению. Мы захватим ключевые позиции на линии фронта и перережем пути снабжения вражеской армии."
 ITA_new_supply_routes: "Новые Пути Снабжения"
 ITA_new_supply_routes_desc: "Приоритетной задачей является укрепление портов, аэропортов, железных дорог и логистических линий на передовой, чтобы мы могли доставлять необходимые грузы тем, кто сражается на передовой. Мы обеспечим новые транспортные средства, современные объекты и привилегированные позиции для доставки оборудования солдатам."
 ITA_restore_compulsory_military_service: "Восстановить Обязательную Военную Службу"
 ITA_restore_compulsory_military_service_desc: "Приостановленная парламентом в 2005 году, военная служба теперь возвращается как необходимость. Независимо от того, популярна она или нет, у нас нет выбора: закон был просто заморожен, а его положения были разработаны для быстрого возобновления, и теперь мы в полной мере воспользуемся этой возможностью."
 ITA_civil_industry_conversion_program: "Программа Конверсии Гражданской Промышленности"
 ITA_civil_industry_conversion_program_desc: "Итальянский народ готов пожертвовать комфортом ради нужд войны.\nНашим братьям на фронте нужны оружие, боеприпасы, продовольствие и все необходимые товары, все, что мы можем произвести.\nПерепрофилирование промышленности не просто желательно, оно необходимо и неизбежно.\nМы решим эту задачу с помощью хорошо структурированных программ и стратегических решений."
 ITA_to_stand_as_one_nation: "Стоять как Единая Нация"
 ITA_to_stand_as_one_nation_desc: "Когда на карту поставлено выживание нации, нет времени на мелкие политические разборки.\nНеобходимо единое правительство, готовое провести реформы, которые требует война. Левые или правые, у нас везде есть братья, потому что перед нами стоит враг."
 ITA_well_be_back_before_you_know: "Мы Вернемся, Прежде Чем Вы Успеете Оглянуться"
 ITA_well_be_back_before_you_know_desc: "Чем короче продлится эта война, тем скорее мы сможем праздновать.\nКогда тело нации движется как одно целое, кто может надеяться остановить его?\nВеликий пролетариат вновь поднимается, его трубы горят с новой силой.\nЭта война должна быть закончена, и мы ее закончим.\nПризыв к единому народу, обреченному на общую судьбу: "Мы вернемся!"\n\nИ мы вернемся раньше, чем кто-либо думает."
 ITA_operation_cerere: "ОПЕРАЦИЯ: §YCERERE§!"
 ITA_operation_cerere_desc: "Кодовое название Церера - это стратегический план, разработанный нашими генералами для проведения операций в Украине. Учитывая условия на поле боя, план разработан таким образом, чтобы мы могли быстро и решительно продвигаться вперед, сводя к минимуму боевые столкновения и потери, одновременно обеспечивая ключевые стратегические позиции."
 ITA_break_the_eastern_wall: "Прорвать Восточную Стену"
 ITA_break_the_eastern_wall_desc: "Момент настал.\nМы наносим удары без пощады, без колебаний, без промедления.\nТеперь, когда инициатива за нами, мы не упустим ее.\nУдарь, ударь, ударь со всей силой и всей болью!\nНаноси удары, пока победа не станет очевидной.\nЕсли бы наши враги имели преимущество, они поступили бы так же. Возьми нож в руку и нанеси удар."
 ITA_ogni_lasciata_e_persa: "Ogni Lasciata è Persa"
 ITA_ogni_lasciata_e_persa_desc: "Мы будем защищать каждую позицию: каждый город, каждый район, каждое здание.\nНи одного метра земли захватчикам!\nБез колебаний: из ада единственный путь - вперед.\nЗаставьте их попотеть за каждый камень, каждую щель, каждую каплю речной воды, сыновья Италии."
 ITA_chi_vincer_ci_puo: "Chi Vincer ci Può?"
 ITA_chi_vincer_ci_puo_desc: ""
 

 italy_ew_events.1.t: "Первая Европейская Война"
 italy_ew_events.1.d: "" 
 italy_ew_events.1.a: "И так, началось."

 italy_ew_events.2.t: "Всё Тихо"
 italy_ew_events.2.d: "Недавние технологические достижения в области военного дела сделали невозможным для солдат общаться с кем-либо на больших расстояниях без разрешения. Это был довольно примитивный шаг, но написание писем стало единственной реалистичной возможностью, оставшейся для этих отчаявшихся солдат и их близких.\n\nВ небольшом городке, в нескольких милях от Рима, посылка с письмами вернулась в третий раз с начала войны. Жены, друзья и члены семей с нетерпением ждали на городской площади, считая секунды до того момента, когда письма будут распределены между ними.\n\nСильвия, даже если она в это не верила, была самой нетерпеливой. Она провела большую часть своей жизни со своим мужем с тех пор, как они познакомились в детском саду. Даже если они тогда этого не знали, они стали одним целым. Они пережили экономические трудности, пандемию и растущую геополитическую напряженность между их страной и Москвой, полностью полагаясь друг на друга. Теперь ее муж находился на передовой, став одним из многих забытых имен, отправленных на скотобойню.\n\nПрошел год с тех пор, как он уехал из Италии. Первое письмо было полно оптимизма, в нем рассказывалось о неожиданных победах над врагом в невероятных обстоятельствах. Второе письмо было другим. Оно было более прямым, в нем было меньше оптимизма, а больше рассказывалось о страшной ситуации, в которой оказались он и его бригада, сражаясь не на жизнь, а на смерть, чтобы защитить свой небольшой аванпост в Латвии.\n\nС тех пор, как она получила это письмо более 4 месяцев назад, она всегда спала с открытыми глазами, гадая и надеясь, что с ее мужем все в порядке. Это письмо может успокоить ее или сломать ее безвозвратно.\n\nПоразмыслив, она наконец решила подойти к посылке, которую уже рассортировали местные волонтеры. К ее удивлению, она ничего не нашла. Не осталось ни одного конверта.\nВзволнованная, она начала дышать быстрее и подошла к одному из волонтеров, как только смогла. "Извините?" начала она. "Я почти уверена, что вы пропустили несколько конвертов. Моего мужа, Лука Моретти, нет в этих списках."\n\nВолонтерка закатила глаза. "Моретти? Уверяю вас, я сортировала большинство этих конвертов и не нашла никого с такой фамилией. Извините."\n\nЧто? Никто? Ни один? Сильвия подумала о том, чтобы продолжить расспрашивать волонтера, но что она могла знать? Она медленно вышла из помещения, беспомощно рыдая."
 italy_ew_events.2.a: "Она не будет такой одной."

 italy_ew_events.3.t: "Зачем Умирать за Донецк?"
 italy_ew_events.3.d: "С начала войны Флоренция, как и многие другие города Италии, погрузилась в тишину. Политическая жизнь города исчезла почти в одночасье. Были отменены публичные собрания, местные политические партии на неопределенный срок отложили мероприятия, заседания городского совета были аннулированы; вся привычная для людей общественная деятельность прекратилась. Никто этого не говорил, но все это знали. Италия была в состоянии войны, и демократия в стране замолчала.\n\nОднако была одна группа, которая, казалось, не хотела уходить, не сказав громкого последнего слова.\n\nВ центре города, прямо перед мэрией, собралась толпа. Люди держали плакаты, скандировали лозунги и размахивали флагами, привлекая внимание всех прохожих. Это было самое громкое зрелище в городе, и правительство, безусловно, обратило на него внимание. Внутри здания мэрии политики незаметно наблюдали за происходящим из-за занавешенных окон с бесстрастными лицами, но выражения их лиц были не одинаковыми. Начальник полиции смотрел с презрительным выражением лица, слушая, как преданные руссофилы города выкрикивают свои лозунги и размахивают плакатами с привычными требованиями.\n\nНЕТ ВОЙНЕ! НЕТ ИНТЕРВЕНЦИИ!\n\nИТАЛИЯ НЕ ГОЛОСОВАЛА ЗА ЭТО!\n\nЗАЧЕМ УМИРАТЬ ЗА ДОНЕЦК?\n\nОни снова и снова скандировали, вызывая постоянное презрение своих лидеров. Они были пешками, полезными идиотами, может быть, предателями. Возможно, ФСБ дала им хорошую сумму, чтобы они продолжали свою ерунду. К 16 часам все они задавались вопросом, останутся ли они там до глубокой ночи.\n\n Но они получили ответ очень быстро.\n\nОни посмотрели направо и увидели, что на площади снова поднялась яростная суматоха. Сюда прибыли полицейские из города и уже вступили в потасовку с протестующими. Крики, оскорбления и даже удары летели со всех сторон, когда местные антиинтервенционисты пытались сопротивляться, но это длилось недолго. В течение часа полиция уже разобралась с ними, и впервые за несколько дней на лице начальника полиции появилось выражение удовлетворения." 
 italy_ew_events.3.a: "Они могут агитировать за Москву в своей камере."

 italy_ew_events.4.t: "Отчет о Результате"
 italy_ew_events.4.d: "Присутствие российского Черноморского флота в районе операций в Черном море угрожало боеспособности морских, воздушных и наземных сил в болгарском, румынском и украинском секторах. Было обнаружено наступление крупного контингента вражеского флота на цели на румынском и украинском побережьях. Высшее командование ВМС Италии и НАТО одобрило вступление в бой отдельных боевых групп российских ВМС.\n\nХОД СРАЖЕНИЯ: Дружественные военно-морские силы в тандеме с авиационной поддержкой вступили в бой с ведущими кораблями противника. Противник понес немедленные потери и попытался провести контратаку с помощью авиации и ракетных ударов. Затем последовала ожесточенная битва между дружественными и военно-морскими силами. Дружественные силы понесли потери от вражеских самолетов наземного нападения и ракетных залпов. Однако постоянное давление со стороны дружественных беспилотных летательных аппаратов, авиации и ракетных ударов истощило резервы противника и лишило его инфраструктуры командования и управления. После постоянных потерь в C2 и материальных потерях вражеские силы отступили из района операции.\n\nОТЧЕТ О ПОТЕРЯХ СОЮЗНИКОВ: 4 фрегата. 1 эсминец. 2 многоцелевых истребителя. 7 дронов.\n\nОТЧЕТ О ПОТЕРЯХ ПРОТИВНИКА: 5 ракетных корветов. 12 патрульных катеров. 2 фрегаты с управляемыми ракетами. 5 морских вертолетов. 3 многоцелевых истребителя. 2 беспилотных летательных аппарата.\n\nТАКТИЧЕСКАЯ ОЦЕНКА ПОСЛЕ ОПЕРАЦИИ: Победа. Управляемые потери для дружественных сил. Значительные потери для вражеских сил. Полная потеря темпа наступления для сил Черноморского флота России.\n\nОКОНЧАТЕЛЬНАЯ СТРАТЕГИЧЕСКАЯ ОЦЕНКА: Российские военно-морские силы в Черном море понесли значительные потери. По минимальным оценкам, 20 процентов вражеских военно-морских сил утратили боеспособность. В ближайшей перспективе вражеский флот, вероятно, будет вынужден перейти в оборонительную позицию на время текущих операций. Наступательные операции российских сил в Черном море в ближайшее время маловероятны, но могут возобновиться в ближайшем будущем." 
 italy_ew_events.4.a: "Озеро НАТО, скоро."

 italy_ew_events.5.t: "БРИФИНГ ПО ОПЕРАЦИИ - Штурм Севастополя"
 italy_ew_events.5.d: "Оперативный брифинг по ограниченному десанту в прибрежном секторе Севастополя.\nДата: [GetDateText]\nРаспространение: Верховный командование – Военно-морской отдел – Совместные операции\n\nСОВЕРШЕННО СЕКРЕТНО\n\nВ данном документе представлено краткое описание амфибийной операции, направленной против российских военно-морских командных центров и береговых радаров в районе Севастополя. Для проведения этой операции было выбрано подразделение "Лагунари" полка "Серениссима" за его быстроту и оперативность.\n\nКонтроль врага над Севастополем дает ему стратегическое преимущество над нашими позициями в Черном море, позволяя ему проводить разведывательные операции против наших флотов.\nОдин из ключевых военно-морских командных центров в регионе находился в 20 км к западу от Севастополя. Он функционировал в качестве основного командного узла для российских минных и разведывательных операций в Черном море, защищая полуостров от любых значительных амфибийных операций НАТО.\n\nСогласно разведывательным данным, с 01:00 до 07:00 в узле происходит шестичасовое отключение технического обслуживания, в результате чего он не может осуществлять никакую внешнюю связь. \nЭти часы были определены как наиболее подходящие для проведения этой операции.\n\nОперация была направлена на пять ключевых точек, в том числе прибрежные радиолокационные центры, системы управления огнем и вышеупомянутый командный центр. Полк смог нейтрализовать все цели всего за несколько часов с начала операции, понеся при этом незначительные потери. Отряды полка даже смогли удержать свои позиции в течение 12 часов, что позволило нашим военно-морским и военно-воздушным силам воспользоваться создавшейся брешью.\n\nУспешное проведение операции вывело из строя береговую оборону противника на следующие 2-3 дня, что позволило союзным военно-морским силам свободно передвигаться по Черному морю в течение этого периода и заранее подготовиться к последующим операциям на других ключевых объектах по всему побережью Крыма." 
 italy_ew_events.5.a: "Господство России подвергается сомнению."

 italy_ew_events.6.t: "Фольгоре над Доном"
 italy_ew_events.6.d: "Небо над Воронежем было цвета помятой стали, когда C-130 появились на низкой высоте, их двигатели ревели, борясь с ветром. Российские линии проломились к западу от города после нескольких недель изнурительных боев; силы НАТО продвинулись, чтобы воспользоваться прорывом. Италия, обязавшаяся выполнить свою часть работы, бросила в бой свою элиту: парашютные бригады Folgore. \n\nВ 04:30 начался десант. Сотни оливково-зеленых парашютов расцвели на фоне серого рассвета — элита 185-го парашютно-десантного полка с зачерненными лицами и плотно привязанным оружием. Они падали на мозаику пшеничных полей и разрушенных колхозов на южной окраине города, обозначенной как LZ Viper. Внизу мелькали вспышки зенитного огня, но в основном огонь был беспорядочным; российские мобильные подразделения были растянуты по всей территории. \n\nПервые палки сильно ударили по земле. Взвод капитана Лоренцо Риччи за считанные минуты захватил центральный перекресток, заставив замолчать удивленную команду БМД гранатами и огнем из стрелкового оружия. Близлежащие отряды очистили заброшенный зерновой силос, превращенный в наблюдательный пункт, вытащив ошеломленный гарнизон под дулами автоматов. К 5 часам утра вокруг зоны десантирования был сформирован приблизительный периметр: пулеметные гнезда в канавах, снайперы на крышах, инженеры, отмечающие траектории полета с помощью химических фонарей. "Периметр обеспечен. Зона десантирования Viper готова. Просим немедленно отправить подкрепление." \n\n В течение часа были сброшены первые тяжелые поддоны с ящиками 120-мм минометных мин, медицинскими аптечками, противотанковыми ракетами "Милан" и канистрами с дизельным топливом. Следующие самолеты C-27J Spartan кружили на низкой высоте, высаживая дополнительные войска и легкие транспортные средства.\n\nК полудню карман был удержан. Инженеры Folgore быстро проложили бульдозерами взлетно-посадочную полосу на равнинном пшеничном поле; первый An-26 приземлился в сумерках с боеприпасами и горячей едой. Российские контратаки прощупывали края, сначала артиллерией, затем пехотой, но безоткатные орудия и команды Javelin отбили их, оставив после себя дымящиеся корпуса.\n\nВ командном пункте, расположенном в разрушенном погребе фермерского дома, Риччи вытер пот со лба и нажал на кнопку микрофона. "Южный фланг Воронежа стабилизирован." Десантники зажгли сигареты в угасающем свете, наблюдая за гудящими над головой самолетами с грузами. По крайней мере, на одну ночь линия принадлежала Италии." 
 italy_ew_events.6.a: "И в Европу."


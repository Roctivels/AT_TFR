 ITA_sugli_alberi_le_foglie: "Sugli Alberi, Le Foglie"
 ITA_sugli_alberi_le_foglie_desc: "\n\n\n\n\n£GFX_ITA_sugli_alberi_le_foglie_category_banner\n\n\n\n\n\n\n\n                                                  SOLDATI\n                                               §gSi sta come\n                                                d'autunno\n                                               sugli alberi\n                                                  le foglie§!\n                                  -Джузеппе Унгаретти, L'Allegria\n\nВнезапное нападение России разрушило старые уверенности Европы.\nГорода от Балтики до Черного моря горят, и каждая нация вынуждена выбирать между отступлением и сопротивлением.\nИталия стоит среди тех, кто §Yне сдастся§!.\n\nНаши дивизии, как осенние листья, готовятся переместиться по старому континенту, осознавая, что каждый шаг на восток может стать для них последним."


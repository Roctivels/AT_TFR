 italy_ew_events.8.t: "Военный парад в Риме!"
 italy_ew_events.8.d: ""
 italy_ew_events.8.a: "Мы победили!"

 italy_ew_events.9.t: "Бескорыстные и Равнодушные"
 italy_ew_events.9.d: "Ты просыпаешься посреди ночи.\nЗа окном все еще трещат фейерверки.\nВаш партнер лежит рядом с вами в постели, на груди у него лежит книга.\n\nТы победил.\n\nНу... "выиграл" - это слишком громко сказано.\n\nВы никогда не интересовались политикой.\nЭто звучит абсурдно, признавать это в разгар войны, но это правда.\nВаша работа слишком важна, чтобы отправлять вас на фронт.\nВаш партнер такой же.\nВаши двое детей еще слишком малы, чтобы держать винтовку.\n\nНе то чтобы новости не вызывали у вас никаких эмоций, они вызывают, немного...\nНо в конце концов, что это действительно меняет?\n\nПобеда или поражение… вы - специализированный техник.\nВы будете продвигаться.\nВаша жизнь будет продолжаться.\nВойна никогда не решила бы этот вопрос, не для вас.\n\nСтолько всего произошло.\nИ все же ничего не произошло.\nВаше равнодушие доказывает это.\nВаше равнодушие."
 italy_ew_events.9.a: "Как печально."
 

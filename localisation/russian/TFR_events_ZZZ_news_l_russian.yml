 news.568.t: "Михаил Делягин Побеждает на Выборах"
 news.568.d: "Сегодня Россия пожинает плоды проведённых ею реформ. Вся страна была более активной, чем когда-либо, а президентская гонка взбодрила российское общество. Хотя переход Медведева на пост премьер-министра рассматривался не более чем как смена кресла, конечный результат превзошёл все ожидания.\n\nНесмотря на напряжённую предвыборную гонку, в итоге победила «Единая Россия». Сформированная в результате слияния всех левых партий, она представляет собой широкую коалицию, в которую входят как социал-либералы, так и откровенные коммунисты. Однако его культурная политика консервативна, а прогрессивизм рассматривается как уловка капиталистов, чтобы отвлечь граждан от экономической эксплуатации.\n\nПобедителем гонки стал Михаил Делягин, бывший член «СРЗП», а также экономист и медийная фигура. Пока неясно, по какому пути пойдёт это президентство в глазах иностранных наблюдателей."
 news.568.a: "Интересно!" 

 news.572.d: "Сегодня Россия пожинает плоды проведённых ею реформ. Вся страна была более активной, чем когда-либо, а президентская гонка взбодрила российское общество. Хотя переход Медведева на пост премьер-министра рассматривался не более чем как смена кресла, конечный результат превзошёл все ожидания.\n\nНесмотря на напряжённую предвыборную гонку, в итоге победила «Единая Россия». Сформированная в результате слияния всех левых партий, она представляет собой широкую коалицию, в которую входят как социал-либералы, так и откровенные коммунисты. Однако его культурная политика консервативна, а прогрессивизм рассматривается как уловка капиталистов, чтобы отвлечь граждан от экономической эксплуатации.\n\nПобедителем гонки стал Николай Платошкин, бывший российский дипломат и лидер общественного движения «За новый социализм». Пока неясно, по какому пути пойдёт это президентство в глазах иностранных наблюдателей."
 news.572.a: "Интересно!"
 news.573.t: "Александр Лукашенко Побеждает на Выборах"
 news.573.d: "Сегодня Россия пожинает плоды проведённых ею реформ. Вся страна была более активной, чем когда-либо, а президентская гонка взбодрила российское общество. Хотя переход Медведева на пост премьер-министра рассматривался не более чем как смена кресла, конечный результат превзошёл все ожидания.\n\nНесмотря на напряжённую предвыборную гонку, в итоге победила «Единая Россия». Сформированная в результате слияния всех левых партий, она представляет собой широкую коалицию, в которую входят как социал-либералы, так и откровенные коммунисты. Однако его культурная политика консервативна, а прогрессивизм рассматривается как уловка капиталистов, чтобы отвлечь граждан от экономической эксплуатации.\n\nПобедителем гонки стал Александр Лукашенко, печально известный президент Беларуси, который остался у власти после провозглашения Союзного государства. Иностранные наблюдатели отмечали, что Союзное государство изначально создавалось для того, чтобы Александр мог возглавить Россию после Ельцина. И вот, почти 30 лет спустя, его желание сбылось."
 news.573.a: "Интересно!"
 news.574.t: "Владислав Даванков Побеждает на Выборах"
 news.574.d: "Сегодня Россия пожинает плоды проведённых ею реформ. Вся страна была более активной, чем когда-либо, а президентская гонка вдохнула новую жизнь в российское общество. Хотя переход Медведева на пост премьер-министра рассматривался не более чем как смена кресла, конечный результат превзошёл все ожидания.\n\nНесмотря на то, что гонка была очень напряжённой, «Новой России» удалось одержать победу. Изначально она задумывалась как фракция «Единой России» после создания двухпартийной системы, но стала достаточно крупной, чтобы соперничать с ней. Покойный президент Путин рассматривал его создание как способ дать либералам-рыночникам право голоса в парламенте. Теперь он возглавляет российский демократический эксперимент.\n\nПобедителем гонки стал Владислав Даванков, молодое и энергичное лицо партии. Зарубежные наблюдатели утверждают, что его использование интернет-агитации и PR-ходов среди молодёжи в отношении коррупции, контроля над иммигрантами, рыночных реформ затрудняет точное определение того, какой политике он будет следовать."
 news.574.a: "Интересно!"
 news.575.t: "Блумберг Воссоединяет Америку!"
 news.575.d: "Военные действия на территории Соединенных Штатов Америки сегодня наконец-то завершились победой федерального правительства Вашингтона. К сожалению, однако, похоже, что это не приведет к восстановлению нормальной жизни, на которую многие надеялись.\n\nИстеблишмент Вашингтона попал в политический водоворот во время гражданской войны и не смог выбраться из него, поскольку технократические корпоративные лидеры во главе с Майклом Блумбергом сумели избавиться от Джо Байдена и напрямую взять под контроль правительственные дела.\n\nВ ходе последовавших за этим событий правительство Блумберга уничтожило все повстанческие силы в Америке и сумело централизовать власть в Конгрессе, обеспечив доминирование недавно сформированной партии инноваторов.\n\nНовая власть в Америке довольно четко обозначила свои намерения, начав с создания идеальных условий для частного бизнеса в стране, чего бы это ни стоило. Многие международные компании выразили заинтересованность в инвестировании в восстановление разрушенной войной Америки или даже в переносе туда своих предприятий.\n\nПолитическая, экономическая, информационная и общественная сферы оказались под полным контролем Корпоративного совета - теневой силы, стоящей за большинством решений Блумберга. Аналитики тверды в своих выводах: Америку ждет светлое, прогрессивное будущее. Так что же может пойти не так?"
 news.575.a: "Станет ли вся Америка такой же, как Нью-Йорк?"
 news.576.t: "Пригожин Объявляет Войну!"
 news.576.d: "Сегодня в своей жёсткой речи Евгений Пригожин объявил тотальную войну врагам России. Он сказал, что эпоха слабых и неэффективных лидеров закончилась, и теперь западные клептократы столкнутся с мощью русского народа, возглавляемой настоящими воинами.\n\nПосле этого выступления российские военные начали наступательные операции во всех приграничных регионах, включая Кубань и Белоруссию. В связи с этим мобилизация в российском государстве резко возросла, и тысячи призванных на военную службу людей явились на службу.\n\nОтветом Запада стало приведение всех войск и членов НАТО в состояние повышенной готовности и начало контрподготовки к российскому наступлению.\n\nНа этот раз НАТО сталкивается с гипермилитаристской Россией, одержимой желанием смыть позор первого поражения, вооруженные силы которой были реформированы в соответствии с жестокой тактикой частной армии Пригожина. Эта военная машина готова полностью уничтожить западные страны, если ей представится шанс."
 news.576.a: "Нас ждет полное опустошение..." 
 news.577.t: "Режим Пригожина Оккупирует Европейский Континент!"
 news.577.d: "Запад потерпел поражение от жестокого режима России во главе с Пригожиным. Когда последнее сопротивление против армии Вагнера было подавлено танковой сталью и снарядами, Пригожин победоносно стоял на Красной площади.\n\nБывший военный, ставший путчистом, а затем диктатором России. Он объявил о полной победе над европейскими глобалистами и дегенератами.\nСостоялся "Величайший парад Победы в России". В нем приняли участие тысячи военнослужащих с передовой. Население благоговело перед своими бойцами и безоговорочно обожало своего национального лидера.\n\nТем временем Европа находится в состоянии опустошения. Многочисленные государства на континенте, которые когда-то были суверенными, разделены на спешно созданные зоны оккупации. Похоже, что у российского правительства нет ближайших планов относительно будущего Европы. Вместо этого она занимается жестоким подавлением групп сопротивления в европейских городах."
 news.577.a: "Позор поражения был отомщен..."
 news.578.t: "Клаус Шваб Объявляет о Создании Мирового правительства"
 news.578.d: "Сегодня Клаус Шваб, основатель Всемирного экономического форума и "архитектор" победы Европы во Второй европейской войне, сделал беспрецедентное заявление о создании "Мирового правительства." Выступая перед Европейским парламентом в Брюсселе, Шваб провозгласил рассвет "нового мирового порядка", который преодолеет "устаревшие" национальные государства в пользу единства, стабильности и технократического управления.\n\nСтоя под массивным новым флагом - стилизованным земным шаром, окруженным традиционными 12 звездами, - Шваб заявил, что "марш истории наконец остановился." Все бывшие европейские национальные государства вошли в состав нового государства, и во время речи были обнародованы планы по интеграции соседних регионов и государств, включая раздробленные остатки России, за которые теперь жестоко борются несколько полевых командиров.\n\nКак сказал сам Шваб в завершение церемонии: "Это не просто конец войны, это конец эпохи. Теперь мы вместе шагаем в будущее." Пока же мир наблюдает за происходящим с затаенным дыханием."
 news.578.a: "Европа становится мрачнее с каждым днем."
 news.578.b: "Присоединяйтесь к нам, пока не поздно."
 news.580.t: "Сурков Назначен Главой Государства"
 news.580.d: "Неожиданный поворот - президент России Дмитрий Медведев объявил о своей отставке. Однако он объявил и назначил своего "законного" преемника на этом посту - Владислава Суркова.\nЭто заявление последовало за успешной военной кампанией России в Восточной Европе, которая привела к распаду НАТО и нестабильности на всем континенте. Сославшись на усталость от войны и желание внедрить новое, инновационное управление, Медведев заявил, что будущее России будет определяться ее народом.\n\nВ течение многих лет Сурков оставался теневой фигурой в коридорах власти Кремля. Многие эксперты считают его архитектором современной политической системы России и путинского режима как идеологического инструмента. В последние годы правления Путина он в основном действовал из-за кулис. Однако президент Медведев вернул его в центр внимания, предположительно для того, чтобы помочь сформировать новое, более совершенное правительство России.\n\nПосле отставки Медведева должны состояться выборы. Однако при единогласной поддержке ОНФ, де-юре коалиции, которая служит сдерживающим фактором для всех легальных политических движений в России, Сурков, как ожидается, одержит уверенную победу. После этого он начнёт управлять Российской Федерацией так, как считает нужным, без какого-либо серьёзного сопротивления."
 news.580.a: "Больше не в тени."
 news.581.t: "Лукашенко Назначен Главой Государства"
 news.581.d: "Неожиданно президент России Дмитрий Медведев объявил о своём уходе с поста. Впоследствии он назвал Александра Лукашенко своим законным преемником.\n\nЭто заявление последовало за успешной военной кампанией России в Восточной Европе, которая привела к распаду НАТО и нестабильности на всем континенте. Сославшись на усталость от войны и желание внедрить новое, инновационное управление, Медведев заявил, что будущее России будет определяться ее народом.\n\nЛукашенко, президент Беларуси и сопредседатель российско-белорусского проекта «Союзное государство», в течение многих лет он управлял Беларусью железной рукой, используя социально ориентированный популизм и практический подход для сохранения контроля. Поначалу у него и Медведева были непростые отношения, но со временем они стали ценить друг друга.\nПохоже, Лукашенко готов внести значительные изменения в Кремле. Его особый подход и видение резко контрастируют с подходами и видением предыдущих лидеров России.\n\nПосле отставки Медведева должны состояться выборы. Однако при единогласной поддержке ОНФ, коалиции де-юре, которая действует как клетка для всех легальных политических движений в России, ожидается, что Лукашенко одержит уверенную победу.  Затем он начнёт управлять Российской Федерацией так, как считает нужным, без какой-либо значительной оппозиции."
 news.581.a: "Бацька у руля."
 news.582.t: "Надеждин Назначен Главой Государства"
 news.582.d: "Президент России Дмитрий Медведев внезапно объявил о своей отставке, ошеломив наблюдателей. В кратчайшие сроки он назначил Бориса Надеждина своим преемником.\n\nЭто заявление последовало за успешной военной кампанией России в Восточной Европе, которая привела к распаду НАТО и нестабильности на всём континенте. Сославшись на усталость от войны и желание внедрить новое, инновационное управление, Медведев заявил, что будущее России будет определяться её народом.\n\nНадеждин - парадоксальная фигура. Он позиционирует себя как либерал и в прошлом часто критиковал режим Путина. Многие либеральные партии, в которых он участвовал, были запрещены или распущены. Тем не менее, он охотно присоединился к ОНФ Медведева, надеясь создать демократическую фракцию.\nВыбор Надеждина в качестве преемника был неожиданным. Его намерения остаются неясными.\n\nПосле отставки Медведева должны состояться выборы.  Однако при единогласной поддержке ОНФ, де-юре коалиции, которая действует как сдерживающий фактор для всех легальных политических движений в России, ожидается, что Надеждин одержит уверенную победу.  Затем он начнёт управлять Российской Федерацией так, как считает нужным, без какого-либо серьёзного сопротивления."
 news.582.a: "Новая надежда?"
 news.583.t: "НАТО Объявляет о Победе над Россией"
 news.583.d: "Вторая европейская война завершилась полной победой НАТО над Российской Федерацией. То, что началось как кризис, вызванный агрессией России в отношении Кубанской Республики, переросло в очередной континентальный конфликт, который закончился полным крахом России.\n\nАлексей Навальный, который возглавлял Россию после Первой Европейской Войны и вел еще одну войну против НАТО, полностью исчез. Различные разрозненные сообщения говорят о том, что он бежал в изгнание или был убит во время падения Москвы. Несмотря на военные реформы в России и создание ОБД, наступления НАТО оказались подавляющими, и по мере развития войны российские войска систематически терпели поражения по всей Восточной Европе. Россия теперь раздроблена между военачальниками и военными командирами.\n\nНАТО учредило Московский демократический мандат под надзором Совета мандатов НАТО. В Волгограде создана зона борьбы с терроризмом для подавления остатков сопротивления."
 news.583.a: "Наконец-то наступил конец истории!"
 news.584.t: "НАТО Объявляет о Победе над Россией"
 news.584.d: "Вторая европейская война завершилась полной победой НАТО над Российской Федерацией. То, что началось как кризис, вызванный агрессией России в отношении Кубанской Республики, переросло в очередной континентальный конфликт, который закончился полным крахом России.\n\nАлексей Навальный, который возглавлял Россию после Первой Европейской Войны и вел еще одну войну против НАТО, полностью исчез. Различные разрозненные сообщения говорят о том, что он бежал в изгнание или был убит во время падения Москвы. Несмотря на военные реформы в России и создание ОБД, наступления НАТО оказались подавляющими, и по мере развития войны российские войска систематически терпели поражения по всей Восточной Европе. Россия теперь раздроблена между военачальниками и военными командирами.\n\nНАТО учредило Московский демократический мандат под надзором Совета мандатов НАТО. В Волгограде создана зона борьбы с терроризмом для подавления остатков сопротивления."
 news.584.a: "Наконец-то наступил конец истории!"
 news.585.t: "В Европе Вновь Разгорается Война"
 news.585.d: "Пороховая бочка снова взорвалась, и силы Востока и Запада теперь в последний раз сталкиваются друг с другом, чтобы определить, кто будет формировать будущее Европы.\n\nГюнтер Фелингер, объединивший, по-видимому, всю Западную и Центральную Европу под флагом ЕС, теперь обратил свой взор на Москву. По всему союзу наблюдается массовая мобилизация, и миллионы людей вышли на улицы, чтобы поддержать военные действия всеми возможными способами. Гюнтер, в частности, проявил значительный энтузиазм, написав в Твиттере, что "наша месть будет быстрой, и Россия заплатит за все, что она нам стоила." Эксперты уже высказали предположение, что Гюнтер хочет реализовать свои идеи по "Ex Russia", если ему удастся одержать победу.\n\nВ России массовая мобилизация объединенных вооруженных сил ОДКБ произошла в ответ на первые сообщения о столкновениях на польской границе. В своем заявлении Кремль признал, что будет "сопротивляться силам глобализма любой ценой." Теперь, когда между гигантами официально объявлена война, речь идет не только о выживании, но и о самом будущем Европы. Ведь только победитель сможет взять в руки перо и написать будущее континента."
 news.585.a: "Битва за Европу началась..."
 news.586.t: "Россия Раздроблена, Европейский Союз Выходит Победителем"
 news.586.d: "После жестоких сражений по всей территории континента новая самая кровопролитная война в Европе наконец подошла к концу. И ее исход потряс многих, а еще большее количество людей вызвал гнев.\n\nВоскресший как феникс, возрожденный Европейский Союз, казалось бы, превзошел все ожидания. Во главе с интернет-знаменитостью и печально известным ястребом войны Гюнтером Фелингер, ЕС превратился из молодой державы в супергосударство, охватывающее весь континент, и когда войска вторглись в Польшу, мало кто ожидал такого исхода после объявления войны.\n\nТеперь, после их победы, Российская Федерация разбита на осколки. И под руководством ЕС территории, когда-то известные как Россия, были разделены и переданы вновь созданным республикам, хотя легитимность этих новых государств очень низкая. В дополнение к этому, НАТО также расширилось, включив в себя эти новые государства, и теперь вновь возрожденный альянс простирается вплоть до китайской границы. Теперь будущее Европы решено, и его будут определять Фелингер и силы обновленного ЕС, возможно, навсегда."
 news.586.a: "Месть старого порядка."
 news.587.t: "Протесты в Европе Подходят к Концу"
 news.587.d: "Служба внутренней безопасности Всемирного правительства на всех своих официальных веб-сайтах заявила, что протесты и беспорядки против власти Всемирного правительства были не более чем "несколькими неорганизованными толпами, неспособными сотрудничать," и что последние несколько протестующих "которые отошли от своих идей" и мирно вернулись в свои дома. \nТочное число жертв остается неизвестным, однако, по оценкам Службы внутренней безопасности, около 300 человек получили ранения, а официальных данных о погибших нет. \n\nИностранные наблюдатели подвергли эти оценки сомнению, когда они упомянули о сообщениях о массовой преступной деятельности, терроризме и убийствах некоторых должностных лиц мирового правительства, которые произошли всего несколько месяцев назад. Служба внутренней безопасности отвергла эти утверждения как "ненавистническую дезинформацию" и подвергла цензуре их появление на страницах европейских социальных сетей. \nНекоторые наблюдатели потребовали в Интернете, чтобы Мировое правительство обнародовало видеозаписи этих "протестов" и их последствий в европейских городах, но Мировое правительство проигнорировало эти требования. \n\nТем не менее, последнее препятствие на пути к реализации видения мира Клауса Шваба, известного как "Архитектор," было устранено. Мировые лидеры уже поздравили Шваба с победой и заявили о своей готовности сотрудничать с этим новым государством. Идея единого технократического мира может вскоре стать реальностью."
 news.587.a: "Разве это были не просто протесты?"
 news.588.t: "Тишина в Европе"
 news.588.d: "В последнее время во всем мире наблюдаются странные тенденции. Вчера Служба внутренней безопасности Всемирного правительства заявила, что на всем континенте установлен порядок. Однако недавно все линии связи и веб-страницы Всемирного правительства таинственным образом перестали работать, и причин этого практически не обнаружено. \nВ некоторых случаях подробно описывается, как появились новые веб-сайты со штаб-квартирой в Европе, однако их содержание не соответствует политике правительства, а некоторые из них даже осуждают ее. \n\nПоявились кадры со спутников и пограничных патрулей, снятые вблизи границ бывшего Мирового правительства, на которых подробно показаны затянутые дымом горизонты целых городов и отставшие, пересекающие границу, чтобы грабить и сжигать местные населенные пункты в этом районе. Некоторым чиновникам Мирового правительства удалось бежать с континента, или, как они теперь его называют, с земного ада. \nНекоторые международные наблюдатели высказали мнение о необходимости направить на континент миротворческие силы и восстановить нормальную обстановку. Однако осталось очень мало мировых лидеров, которые могли бы помочь в этой миссии. \n\nПока все это происходит, человек, стоящий за всем этим, профессор Клаус Шваб, пропал без вести, и некоторые источники предполагают, что он мертв. Однако, в некотором смысле, его видение Великого перезапуска увенчалось успехом, поскольку его реформы вернули европейский континент в нечто похожее на средневековье. "
 news.588.a: "В пустыне"
 news.589.t: "Европейский Союз Вторгается в Бывших Союзников?"
 news.589.d: "Вопреки ранним ожиданиям, что победа России разоружит Европу, недавние события показывают, что военные амбиции ЕС остаются сильными.\n\nУкрепив свою власть над недавно федерализованным ЕС, Гюнтер Фелингер, печально известный ястреб войны и гордый сторонник НАТО, приступил к массовой мобилизации вооруженных сил ЕС. Хотя сообщения по-прежнему неясны, Гюнтер заявил в своем аккаунте X, что намерен "раз и навсегда покончить с европейским нейтралитетом." А поскольку большая часть Западной Европы по-прежнему потрясена гражданским конфликтом и нестабильностью, похоже, что его амбиции не встретят особого сопротивления.\n\nРоссия по-прежнему хранит молчание по этому вопросу. Но можно с уверенностью предположить, что Кремль с растущей тревогой наблюдает за развитием событий. Тем не менее, похоже, что он не собирается предпринимать никаких усилий, чтобы остановить военные действия Фелингерса. Россия все еще не оправилась от непреднамеренных последствий победы и не в состоянии начать новую войну."
 news.589.a: "Хватит нейтралитета!"
 news.590.t: "Клаус Шваб Приходит к Власти в Европейском Союзе"
 news.590.d: "В Европе назревает неопределенная буря. В то время как Восток остается прочно в руках России, недавно федерализованный Европейский Союз, по-видимому, поддержал неожиданного кандидата, который приведет его в неизвестное будущее.\n\nО Клаусе Швабе мало что известно. Шваб, долгое время возглавлявший Всемирный экономический форум, стал одним из самых ярых сторонников глобализации в Европе. Несмотря на свою власть, он приобрел дурную славу из-за различных спорных заявлений о текущем состоянии дел в Европе. Он утверждает, что "культура и границы были величайшей ошибкой Европы."\n\nНесмотря на эти значительные противоречия, Шваб сейчас является лидером потрясенной и измученной войной нации. И хотя мало что известно о том, как он планирует вывести Европу из хаоса после победы России на Востоке, многие предполагают, что это будет тесно связано с его работой в ВЭФ. Пока что Кремль отказывается комментировать этот вопрос, хотя будущее не предвещает никакой формы мирного сосуществования между двумя государствами. Ведь победа Шваба означает возрождение идеологии, которую Кремль готов уничтожить любой ценой."
 news.590.a: "Вы готовы?"
 news.591.t: "Гюнтер Фелингер Укрепляет Власть"
 news.591.d: "Ветер истории снова подул, и господство России над Европой может оказаться не таким уверенным, как многие думали. После недавнего избрания интернет-знаменитости и ястреба Гюнтера Фелингер в недавно федерализованном ЕС.\n\nАвстрийский экономист, известный своей решительной пронатовской позицией и ненавистью к "российской угрозе". Гюнтер прославился своими скандальными твитами с хэштегом #Ex Russia, в которых он призывал к крайней балканизации страны. Неспособность НАТО сдержать российский экспансионизм, по-видимому, вывела его на первый план. И он воспользовался этой волной поддержки, чтобы подняться на самую высокую должность.\n\nКремль хранит молчание по этому вопросу, хотя можно предположить, что уже разрабатываются планы по надлежащему реагированию на возрождение ЕС. Наряду с быстрой ремилитаризацией, Гюнтер уделяет большое внимание восстановлению НАТО, которое было распущено после поражения от России. Похоже, что хрупкий мир будет относительно недолгим, и в будущем Европу ждет новое столкновение между НАТО и ОДКБ."
 news.591.a: "Месть древних?"
 news.592.t: "Volt Europa Победила на Выборах в Европарламент"
 news.592.d: "Мечта о единой Европе жива, даже после недавней победы России над НАТО на Востоке. Недавно федерализованный Европейский союз обозначил свое направление, проявив доверие к либеральной партии Volt Europa.\n\nОснованная в 2017 году, партия является одним из самых ярых сторонников объединения Европы. Их социально-либеральная платформа включает в себя все: от массовых инвестиций в атомную энергетику до создания общеевропейской армии. И хотя партия значительно пострадала после победы России на Востоке, она по-прежнему остается сильной силой в Центральной Европе и Скандинавии. Однако обеспечение безопасности остатков Запада может стать проблемой для Volt, поскольку Франция, Испания и Великобритания страдают от гражданских войн различной интенсивности.\n\nКремль отказался комментировать этот вопрос, хотя многие эксперты считают, что медведь больше не рассматривает молодой ЕС как непосредственную угрозу своему господству на Востоке. Тем не менее, многие полагают, что мирного сосуществования между двумя государствами не будет. Поскольку амбиции Вольта напрямую направлены на ликвидацию господства России на Востоке, а Россия готовится поставить последний гвоздь в гроб глобализма."
 news.592.a: "Как и ожидалось."
 news.593.t: "Неожиданная Победа Европейской Народной Партии"
 news.593.d: "Вопреки предположениям многих, новая партия поднялась, чтобы претендовать на лидерство в молодом ЕС. И это не Volt, а консервативная Европейская народная партия.\n\nХотя многие о ней не знают, эта партия имеет богатую историю, начавшуюся с момента ее образования в 1976 году. Будучи правоцентристской по своему характеру, партия уделяет особое внимание традициям и обычаям, а также выступает за улучшение систем образования и здравоохранения, поддержку семейной налоговой политики и продвижение частного предпринимательства в рамках регулируемой рыночной экономики. Многие граждане ЕС высказались в поддержку этого направления, что знаменует собой новую главу в европейской политике. Несмотря на то, что ЕНП подтвердила, что она "открыта для сотрудничества с оппозиционными партиями, такими как Volt", результат остается неопределенным.\n\nКремль не высказался по этому поводу, и многие эксперты предполагают, что Россия больше не рассматривает Запад как угрозу. Тем не менее, угроза глобализма вновь подняла голову, и многие предполагают, что война вновь охватит Европу, когда развернется окончательная борьба между идеологиями. Однако это еще предстоит увидеть, поскольку ЕНП теперь стоит перед грандиозной задачей переформирования общеевропейской мечты в соответствии со своими взглядами и противостояния хаосу, который в настоящее время охватил разбитые остатки НАТО."
 news.593.a: "Возникает новый союз."
 news.594.t: "Немецкое Народное Государство Захватывает Баварию"
 news.594.d: "После недавнего военного переворота в Германии несколько старых политиков и высокопоставленных чиновников собрались в Мюнхене, где решили, что лучший способ бросить вызов новому режиму - это отделиться от Германии и образовать Баварскую республику под контролем партии ХСС, входящей в состав ХДС.\n\nПод защитой Австрии это новое государство выступило против военной клики, представлявшей старый статус-кво Германии. Однако даже австрийская гарантия независимости не смогла удержать Берлин, и многие немецкие чиновники заявляли, что бундесвер "пойдет на Вену, если это означает, что ядовитые идеи больше никогда не заразят умы нашего народа." \n\nУже сейчас ключевые военные и гражданские объекты по всей Баварии и Австрии стали мишенью для немецких самолетов и артиллерии, поскольку на всей германо-баварской границе начались столкновения. Ни один иностранный аналитик не возлагал надежд на молодое баварское государство."
 news.594.a: "Германия снова поднимается..."
 news.595.t: "Ракеты Выпущенныы по Польским и Чешским Позициям"
 news.595.d: "В течение последних нескольких часов на страницах польских и чешских солдат и гражданских лиц в социальных сетях появлялись сообщения, в которых подробно описывались немецкие артиллерийские снаряды и межконтинентальные баллистические ракеты, летящие над приграничным регионом и нацеленные на гражданские и военные объекты на территории обеих стран. Считавшиеся последними остатками старого европейского статус-кво, они теперь сталкиваются с той же судьбой, что и почти столетие назад, оказавшись зажатыми между двумя враждебными сферами влияния.\n\nСегодня утром немецкие власти заявили, что эти войны не имеют целью провоцировать Москву, а являются "войнами за возвращение земель", которые были отняты у Германии союзниками после Второй мировой войны. Однако проведение такой операции несомненно повлечет за собой массовую депортацию польского и чешского населения, что приведет к гуманитарному кризису, возможно, более масштабному, чем любой другой в истории.\n\nПредседатель Советского Союза заявил в социальных сетях, что эта война "закончится не с капитуляцией польского или чешского правительства, а после того, как они пересекут границы Минского Договора". В ожидании такой возможной эскалации в Советском Союзе и Польской Народной Республике будет введена мобилизация."
 news.595.a: "Мы находимся на пороге новой войны?"
 news.596.t: "Напряженность Между Бывшими Союзниками по Пакту Растет"
 news.596.d: "Неустойчивый мир, установленный между Парижем и Берлином вскоре после их триумфа над Минским Договором, начинает рушиться. Теперь, когда исчезла общая угроза, объединявшая страны, такая как коммунистическая угроза на востоке, многие в этих правительствах почувствовали, что продолжение существования пакта больше не является необходимым. \n\nПариж станет столицей, которая разделит пакт пополам, сформировав Вишистские протоколы вместе с множеством других правительств, лояльных ей, таких как вновь созданные восточные администрации. Французские чиновники утверждают, что этот акт является "чисто оборонительным" против "жаждущих расширения немцев", угрожающих балансу сил на континенте. Немецкие чиновники уже отвергли эти обвинения, сравнив Вишистские протоколы со Второй Антантой. \n\nОбе страны прекратили попытки демобилизации своих армий, вместо этого разместив их на новых позициях, на этот раз на границе бывших союзников. Флаги обеих стран развевались высоко в течение почти столетия, прокладывая путь к братству, превосходящему национальные границы. Однако это братство теперь стало далеким воспоминанием, поскольку два традиционных европейских соперника готовятся к последнему столкновению за то, какая столица будет править старым континентом."
 news.596.a: "Голубь мёртв."
 news.597.t: "Германия Принимает Кверфронт"
 news.597.d: "Сегодня над Европой сгустились темные тучи, поскольку судьба немецкой нации была предрешена с приходом к власти Михаэля Кота.\n\nМайкл Кот, национал-большевик и давний сторонник Северной Кореи, долгое время был агитатором среди самых левых фракций в немецкой политике. Он наиболее известен своей поддержкой "идеи Кверфронта", политического убеждения, призывающего к слиянию многих крайне правых и крайне левых идеалов. Уже произошли репрессии в стиле Северной Кореи против всего, от политических врагов до организованной религии, и большая часть мира ошеломленно молчит в связи с внезапным восхождением тирании.\n\nПариж отказался комментировать эти события, хотя многие предполагают, что они тихо планируют вторгнуться в Берлин и свергнуть диктатуру, если немецкие пушки когда-нибудь обратятся против них. Между тем руководство ЛДПР публично осудило восхождение Кота, назвав его "опасным человеком, который не остановится ни перед чем, чтобы добиться своего." Эксперты предполагают, что российское руководство примет дополнительные меры для укрепления своих новых вассалов на Востоке, поскольку страх перед новой войной сейчас более реальный, чем когда-либо. И многие опасаются, что на этот раз она будет еще более кровопролитной, чем предыдущая\n\n"
 news.597.a: "Европа попала в тиранию!"
 news.598.t: "Германия Заявляет о Своей Геополитической Независимости."
 news.598.d: "Этот шаг, по-видимому, удивил всех. Новое правительство Германии отклонило предложение о солидарности с новым правительством Франции решило выживать в одиночку.\n\nЭто действие опровергло все предположения о том, что из пепла старого либерального порядка возникнет новый социалистический альянс. И в то время как Берлин отказался комментировать их странные действия, Париж был более чем возмущен тем, что он считает "вопиющим предательством дела рабочих." Политические эксперты и ученые пытались найти оправдание таким действиям, указывая на предполагаемый идеологический разрыв между движением во Франции и движением в Германии.\n\nСейчас, когда ЛДПР укрепляет свое правление в Восточной Европе, кажется, что ее доминирование будет непревзойденным еще долгое время. И хотя Москва, по-видимому, пострадала от массовой волны терроризма после смерти Жириновского, маловероятно, что ее власть когда-либо ослабнет. Несмотря на то, что войска по-прежнему остаются на границе со свободным польским правительством, угроза нового начала войны все еще витает в воздухе.\n\nСудьба Европы висит на волоске, и кажется, что малейшее движение может снова ввергнуть весь континент в войну. И, возможно, на этот раз это будет не только Восток против Запада, но и Запад против самого себя."
 news.598.a: "Даже в поражении они остаются разделенными."
 news.599.t: "Возвышение Акселерационизма?"
 news.599.d: "Международное сообщество находится в шоке, поскольку сегодня решается будущее Германии. Хан Бён-Чхоль, культурный теоретик и философ, появился, казалось бы, из ниоткуда. Он поднялся на волне поддержки до самой высокой позиции власти.\n\nЕго резкая критика неолиберального прошлого Германии принесла ему массовую поддержку среди самых радикальных элементов немецкой левой, которые называют себя акселерационистами. По всей стране происходят сцены, похожие на контролируемое разрушение, поскольку, похоже, что все остатки старого порядка подвергаются демонтажу.\n\nПариж не прокомментировал это событие, хотя предполагается, что он не видит причин для разрыва союза с новым правительством. Между тем Москва с ужасом отреагировала на это событие, назвав новое правительство "безумным левиафаном, который поглотит все на своем пути, а затем поглотит и самого себя." Восстановление в восточных вассальных государствах уже ускорилось, и, похоже, новое российское государство готовится к будущей войне, поскольку война, по-видимому, является единственным неизбежным исходом.\n\nСудьба Европы по-прежнему окутана туманом, и когда титаны неизбежно столкнутся снова, это будет не просто битва Востока против Запада, а битва традиций против неумолимого потока современности."
 news.599.a: "Это, конечно, новость..."
 
 news.600.t: "Таллинн Захлестнут [SOV.GetAdjective]ими Мотобригадами"
 news.600.d: "Москва, [SOV.GetNameDef] - ТАСС\n\nСегодня утром в Телеграме появилось видео, на котором видно, как офицеры России гордо размахивают флагом над зданием эстонского парламента в Таллинне, а остальная часть города покрыта облаками пепла. Защитники города, в основном бригады быстрого реагирования из стран Северной Европы и Прибалтики, были разгромлены после непрерывных обстрелов [SOV.GetAdjective]ой артиллерии в сочетании с неустанным наступлением мотострелковых дивизий россии по шоссе T1, которое прекратилось только после захвата города.\nЗащитникам удалось использовать плотную городскую застройку, чтобы сдержать захватчиков на несколько часов, но эти попытки оказались тщетными с появлением на поле боя китайских дронов.\n\nТаллинн был одной из главных целей Операции Суворов: полное и безоговорочное подчинение прибалтийских государств Москве. И с одной из трех прибалтийских столиц под [SOV.GetAdjective]ой оккупацией, перспективы успеха этой операции растут среди иностранных аналитиков и местных жителей, которые массово эвакуируются из страны вместе с правительством, переезжая в Брюссель. \nОставшиеся защитники должны теперь воздвигнуть баррикады на ключевых участках шоссе на юге страны, но местная дезорганизация и [SOV.GetAdjective]ие моторизованные бригады и истребители могут серьезно подорвать эти перспективы."
 news.600.a: "Ситуация начинает напоминать Польшу в 1939 году..."
 news.601.t: "Рига Захвачена [SOV.GetAdjective]ими Силами, разделившими Прибалтику Пополам"
 news.601.d: "Санкт Петербург, [SOV.GetNameDef]- RT\n\nЗащитники, окружавшие столицу Латвийской Республики, Ригу, сдались ранее днем после падения оборонительных баррикад к северу и востоку от города. Один из латвийских командиров заявил: "У нас был выбор: либо сдаться врагу, либо уничтожить нашу любимую столицу." Падение города произошло с помощью моторизованных и танковых бригад, которые, воспользовавшись импульсом от своих предыдущих побед на фронте, прорвались по латвийским шоссе и без особых кровопролитий достигли столицы.\n\nПадение города означает важный поворотный момент в обороне Прибалтики, поскольку фактически разделило регион на две части, одна из которых, в основном эстонские земли, по сути стала анклавом солдат НАТО, которым вскоре предстоит кровавая судьба от рук своих коллег из ОДКБ.\nОднако изображения из социальных сетей показывают, что с помощью Королевского флота вдоль латвийско-литовской границы готовятся оборонительные периметры, которые, как надеются, смогут остановить наступление России и максимально стабилизировать фронт. Тем не менее, [SOV.GetAdjective]ое превосходство в воздухе над регионом, наряду с массовым производством дронов и аналогичного оборудования, вероятно, сможет поддерживать этот импульс еще как минимум в течение многих недель."
 news.601.a: "Прибалтика уже находится под крылом России."
 news.602.t: "Украина под Давлением После Падения Львова"
 news.602.d: "Москва, [SOV.GetNameDef]- RT\n\n[SOV.GetAdjective]ие бронетанковые бригады недавно прорвали оборонительные баррикады, установленные украинскими защитниками, и вскоре ворвались в остальную часть города. Украинские войска сумели сдержать их в течение некоторого времени, используя плотность застройки Львова, чтобы попытаться заманить в ловушку [SOV.GetAdjective]ие войска, захватившие город, но отсутствие координации и неожиданный артиллерийский обстрел в последнюю минуту помешали достижению этих целей.\nСопротивление в городе по-прежнему очень сильное, поэтому [SOV.GetAdjective]ие пехотинцы должны оставаться бдительными, чтобы обеспечить сохранение своего контроля над городом и не допустить деятельности украинских партизан.\n\nТеперь, когда Львов, один из крупнейших городов Украины, пал под натиском [SOV.GetAdjective]ой армии, следующим логичным шагом для России будет закрепить свои позиции, продвигаясь на юг от Львова, достигнув границы с Румынией и отрезав Украину от прямого маршрута к ее партнерам по НАТО через Польшу. В результате украинские войска готовятся к жестоким столкновениям с врагом, поскольку спутниковые снимки показывают обширную сеть бункеров и других оборонительных сооружений, создаваемых недалеко к северу от Румынии. \nОднако этого может оказаться недостаточно, чтобы остановить смертоносное [SOV.GetAdjective]ое наступление."
 news.602.a: "Этот кровопролитный конфликт затронул все регионы Украины."
 news.603.t: "Гамбург пал, но Ожесточенное Сопротивление Продолжает Бросать Вызов Оккупации"
 news.603.d: "Москва, [SOV.GetNameDef]- ТАСС\n\n [SOV.GetAdjective]ие силы продолжают свое наступление, прорывая поспешно возведенные немецкие укрепления в станциях метро и высоких небоскребах по всему городу. Несмотря на ожесточенное сопротивление местного населения, войска России относительно легко вошли в центр Гамбурга, захватив огромный порт города и перерезав жизненно важную артерию немецкой экономики, а также став важным центром снабжения для любых будущих операций России на Рейне или в Дании. Внутри города продолжают сражаться очаги немецкого сопротивления. Густонаселенный городской ландшафт Гамбурга предоставляет отличную почву для партизанской войны и ближнего боя, что гарантирует, что битва за город еще далека от завершения, поскольку полицейские подразделения, гражданское население и оставшиеся военные подразделения пытаются отбить врага назад, используя ограниченные ресурсы, которыми они располагают.\n\n В ответ на это министерство обороны Германии издало приказ об эвакуации гражданского населения, призывая его бежать на кораблях или поездах, отправляющихся с центрального вокзала. Падение Гамбурга оставляет открытым путь как к Рейну, так и к Дании, что вызывает опасения по поводу следующего шага России: будут ли они продолжать продвигаться на запад в Рейнланд и Нидерланды или попытаются вторгнуться в Данию."
 news.603.a: "Падение Германии кажется неизбежным."
 news.604.t: "Мюнхен в Огне, Немецкое Сопротивление Продолжает Борьбу Мюнхене"
 news.604.d: "Москва, [SOV.GetNameDef]- ТАСС\n\n[SOV.GetAdjective]ие Вооруженные силы продолжают наступление по всей Германии, вступая в сердце Баварии, Мюнхен. Несмотря на ожесточенное сопротивление, солдаты России смогли быстро захватить важные транспортные узлы и другие правительственные здания и поднять [SOV.GetAdjective]ий флаг над баварским ландтагом, вытеснив немецкую армию за пределы города.\n\nНесмотря на поражение города на бумаге, [SOV.GetAdjective]ие Вооруженные силы продолжают сталкиваться с немецкой полицией, воинскими частями и отчаянными гражданскими лицами на станциях метро и узких улицах города. Уличные стычки являются обычным явлением, поскольку немецкое сопротивление пытается задержать продвижение вглубь Германии. В городе полностью нарушен порядок, граждане прибегают к мародерству, чтобы прокормить себя и свои семьи. Министерство обороны Германии еще не выпустило официального заявления, но подготовило эвакуационные поезда для всех гражданских лиц, которые доберутся до вокзалов München Hauptbahnhof, München-Pasing, München-Laim и München Langwied.\n\n С течением времени и дальнейшим обострением конфликта ситуация в Германии становится все более критической, и некоторые эксперты даже предполагают, что потенциальный распад Германии как государства может вскоре стать реальностью."
 news.604.a: "На шаг ближе к победе для России."
 news.605.t: "Вторая Танковая Дуэль в Кельне"
 news.605.d: "Москва, [SOV.GetNameDef]- ТАСС\n\nПо мере того как [SOV.GetAdjective]ие войска продвигаются вглубь Рейна и в город Кельн, в социальных сетях появилось шокирующее видео, напоминающее танковую дуэль в Кельне в 1945 году, опубликованное пользователем "LukasWeber." На кадрах запечатлена драматическая дуэль между немецким танком Leopard 2 и [SOV.GetAdjective]им танком в центре города. На видео видно, как Leopard 2 вступает в прямой бой со своим противником. Когда [SOV.GetAdjective]ий танк делает выстрел, он промахивается и попадает в соседнее здание, вызывая небольшое обрушение конструкции. Когда "Леопард" поворачивает башню, он делает точный выстрел, попадая в башню [SOV.GetAdjective]ого анка, вызывая пожар внутри танка и бросая турель в воздух.\n\nВидео быстро стало вирусным, и интернет-пользователи и военные аналитики одинаково хвалили точность и хладнокровие немецкого экипажа в такой напряженной ситуации. Многие жители Германии, даже в районах, находящихся под [SOV.GetAdjective]ой оккупацией, хвалили экипаж "Леопарда" как символ стойкости и надежды в эти мрачные и неопределенные времена. \n\nМинистерство обороны Германии выступило сегодня с заявлением по поводу падения Кельна, в котором заявило, что Германия будет сражаться до последнего и никогда не сдастся наступающим [SOV.GetAdjective]им войскам. В заявлении также были высоко оценены действия экипажа танка Leopard 2, запечатленные в ставшем вирусным видео, которые были названы национальными героями, а их действия - примером мужества и решимости в защите родины."
 news.605.a: "Старые привычки трудно изжить."
 news.606.t: "В Копенгагене Возвращается Спокойствие, Поскольку [SOV.GetAdjective]ие Силы Восстанавливают Порядок"
 news.606.d: "Копенгаген, Дания - RTL\n\n[SOV.GetAdjective]ие Силы продолжают свое наступление на Данию, прорываясь через страну всего за несколько часов, чтобы достичь ее сердца - Копенгагена. Эта битва была нелегкой для [SOV.GetAdjective]их войск, несмотря на плохую подготовку обороны. Датские войска оказали последнее сопротивление в городе, используя его узкую местность, чтобы замедлить наступление [SOV.GetAdjective]их сил и превратить его в жестокую битву.\n\n [SOV.GetAdjective]ие Силы, при поддержке авиации и подавляющего артиллерийского и морского огня, в конце концов смогли захватить город, подняв [SOV.GetAdjective]ий флаг над разрушенным датским парламентом. [SOV.GetAdjective]ие Силы смогли относительно быстро восстановить порядок, поскольку их значительное присутствие вокруг города не позволило местным жителям пытаться грабить или сопротивляться оккупационным силам.\n\n Ходят слухи, что датская королевская семья была убита, некоторые говорят, что их автомобиль был обстрелян самолетом SU-25, другие говорят, что они были убиты при попытке бежать из дворца Амалиенборг в городе.\n\n Потеря Копенгагена является тяжелым ударом для НАТО. Без Копенгагена Балтийское море фактически находится под [SOV.GetAdjective]им контролем, что закрывает датский проход и препятствует любой торговле и проходу судов. У [SOV.GetAdjective]их сил теперь есть несколько вариантов: либо они используют Данию для начала морского вторжения в Великобританию, либо вторгнутся в Норвегию, либо продолжат наступление на Германию."
 news.606.a: "Этот город не может передохнуть..."
 news.607.t: "Центральная Европа под угрозой: [SOV.GetAdjective]ие войска захватывают Прагу"
 news.607.d: "Страх охватил западные страны, когда [SOV.GetAdjective]ое правительство наконец объявило о полном захвате одного из самых знаковых городов Центральной Европы, Праги.\n\nМногие полагали, что удаленность Праги от фронта убережет ее от насилия, но эти надежды не оправдались. Прорвавшись через остатки обороняющихся формирований в Словакии, [SOV.GetAdjective]ие войска достигли города гораздо быстрее, чем ожидалось. Европейские войска и остатки чешской армии пытались остановить их продвижение, но это оказалось практически невозможно, поскольку [SOV.GetAdjective]ие силы обрушились на город с нескольких сторон, разрушив исторические районы Габсбургов. После нескольких дней боев и артиллерийских обстрелов измученные защитники не смогли больше удерживать позиции и в конце концов отступили из города и всех прилегающих территорий.\n\nТеперь [SOV.GetAdjective]ий флаг развевается над историческим центром города, а бронетанковые и моторизованные формирования продвигаются, чтобы очистить территорию от отставших. Уже сейчас [SOV.GetAdjective]ий моральный дух поднимается до небес, а генералы и чиновники хвастаются перед всем миром захватом этой центральноевропейской жемчужины.\n\nЗахват Праги является огромной и зловещей потерей для Запада, поскольку город и прилегающие территории были одним из последних серьезных препятствий на пути [SOV.GetAdjective]их сил в их продвижении на запад. Европейские командующие и комментаторы обеспокоены тем, что Германия и Австрия теперь могут оказаться под прямой угрозой, но некоторые считают, что продвижение [SOV.GetAdjective]их сил является лишь вопросом времени."
 news.607.a: "Врата в Западную Европу были открыты."
 news.608.t: "Второе Венское Наступление"
 news.608.d: "Волгоград, [SOV.GetNameDef]- RT\n\nПо всему континенту прокатилась волна шока, когда столица Австрийской Республики, Вена, вновь пала под натиском [SOV.GetAdjective]их сил. Все началось с того, что [SOV.GetAdjective]ие ракеты и истребители сумели подавить европейскую оборону вокруг города. Долгое время используя австрийские Альпы в своих интересах, они в конце концов были вынуждены отступить в сам Вену, когда [SOV.GetAdjective]ие бронетанковые батальоны вошли в пригороды города с нескольких точек автомагистрали.\nМестные защитники сумели использовать многочисленные исторические дворцы и памятники города в качестве центров снабжения, чтобы продолжить оборону Вены, вынудив [SOV.GetAdjective]ие войска разрушить многие из этих сооружений, что привело к капитуляции последних оставшихся защитников дворца Шёнбрунн.\n\nВторой раз в истории [SOV.GetAdjective]ие силы начали наступление на Вену. Теперь они могут использовать логистические центры города, чтобы легче наносить удары по другим участкам фронта, например, продвигаясь глубже в австрийскую территорию. Европейские оборонительные баррикады возводятся в других секторах Альп, однако [SOV.GetAdjective]ие аналитики уже преуменьшили их эффективность."
 news.608.a: "1945 год повторяется."
 news.609.t: "Амстердам в огне, [SOV.GetAdjective]ие войска входят в город"
 news.609.d: "Москва, [SOV.GetNameDef]- RT\n\n[SOV.GetAdjective]ие Силы продолжают наступление, входя в город Амстердам, сердце голландской нации. Несмотря на узкие улицы и плотную застройку города, [SOV.GetAdjective]ие Силы смогли быстро вытеснить европейские войска из города, водрузив [SOV.GetAdjective]ий флаг над многими правительственными зданиями.\n\n В Амстердаме наступило напряженное затишье, пока [SOV.GetAdjective]ие военные работают над восстановлением порядка. Их приоритетом является ликвидация последних очагов сопротивления, состоящих из европейских и голландских солдат, оставшихся во время отступления. В то же время [SOV.GetAdjective]ие военные начали оказывать гуманитарную помощь, чтобы бороться с продолжающимися грабежами по всему городу. Однако запасы по-прежнему ограничены, что заставляет некоторых граждан прибегать к грабежам, чтобы свести концы с концами.\n\nСегодня утром королева Нидерландов выступила с заявлением перед прессой, пообещав отбить Амстердам у [SOV.GetAdjective]их Орд и призвав народ оставаться единым и сильным в эти тяжелые времена. Она закончила речь словами "Прощайте, до лучших времен" и, полная эмоций, покинула зал. "
 news.609.a: "Когда она уходит, уходит и ее страна."
 
 news.610.t: "Антверпен в огне, когда [SOV.GetAdjective]ие войска входят в сердце Фландрии."
 news.610.d: "Антверпен, Королевство Нидерландов - RTL \n\n[SOV.GetAdjective]ие Вооруженные силы продолжают наступление, вступая в один из последних оплотов Королевства Нидерландов, Антверпен. \nБлагодаря географическому положению города, [SOV.GetAdjective]ие войска смогли окружить город со всех сторон и начать полномасштабное наступление с целью его захвата, одновременно развернув свой флот для блокирования порта Антверпена, перекрыв таким образом все возможные пути отступления из города. \n\nНесмотря на ограниченные ресурсы, войска НАТО на земле сражались отчаянно, и даже некоторые члены голландской королевской семьи взяли в руки оружие, чтобы сражаться и сдерживать [SOV.GetAdjective]их захватчиков. [SOV.GetAdjective]ие Силы, опираясь на свою подавляющую артиллерийскую и воздушную поддержку по сравнению с недостатком военно-воздушных сил НАТО, смогли разгромить защитников и в конечном итоге захватить все важные правительственные здания, подняв [SOV.GetAdjective]ий флаг и провозгласив победу.\n\nВ настоящее время в городе царит тишина, нарушаемая лишь редкими выстрелами, поскольку [SOV.GetAdjective]ие силы работают над восстановлением порядка, сначала ликвидируя остатки сопротивления по всему городу, а затем обеспечивая гражданское население гуманитарной помощью и вводя комендантский час.\n\nСудьба голландской королевской семьи неизвестна, но, вероятно, мрачна, поскольку в социальных сетях были опубликованы видеоролики, на которых голландская королевская семья сопровождается в [SOV.GetAdjective]их грузовиках. Потеря Антверпена является огромным ударом для НАТО, поскольку Антверпен был одним из самых прибыльных и вторым по величине портом во всей Европе. Дорога в Брюссель открыта, и, учитывая [SOV.GetNameDef]ую динамику, некоторые эксперты прогнозируют, что [SOV.GetAdjective]ие силы могут начать осаду города уже через несколько дней."
 news.610.a: "Нидерланды на грани."
 news.611.t: "Европейские войска изгнаны из Брюссельского столичного региона"
 news.611.d: "Москва, [SOV.GetNameDef]- ТАСС \n\nСегодня рано утром в Телеграме появилось видео, на котором [SOV.GetAdjective]ий командир утверждает, что европейские армии утратили контроль над 19 муниципалитетами Брюсселя. На видео также показаны [SOV.GetAdjective]ие танки и бронемашины, позирующие на фоне разрушенного здания Европейского парламента.\n\nБрюссель, некогда столица таких крупных организаций, как НАТО и ЕС, был выведен из игры. Европейские силы уже предпринимают последнюю попытку отвоевать этот ценный город, реорганизуясь вокруг северных и южных муниципалитетов города в попытке обойти [SOV.GetAdjective]ую армию, дислоцированную, как доказано [SOV.GetAdjective]ими радиолокационными разведывательными спутниками. [SOV.GetAdjective]ие аналитики уже заявили, что эти попытки, как и сама битва, только "истощат европейские запасы" в бесполезной попытке вернуть город, сравнивая ситуацию с битвой за Арденны во Второй мировой войне.\n\n[SOV.GetAdjective]ие солдаты праздновали победу на всех фронтах, поддерживая боевой дух европейских армий, которые все больше и больше уставали. По правде говоря, по оценкам, [SOV.GetAdjective]ие войска через несколько недель вступят в Северную Францию."
 news.611.a: "Сердце было вырвано."
 news.612.t: "[SOV.GetAdjective]ие Силы приближаются к Пиренеям после падения Бордо"
 news.612.d: "Москва, [SOV.GetNameDef]- ТАСС\n\nЖивописные здания и памятники на улицах Бордо недавно стали полем сражения после начала жестоких боев между французскими и [SOV.GetAdjective]ие наземными войсками и дронами. Французским защитникам удалось использовать узкую средневековую архитектуру старого города в своих интересах, замедлив продвижение [SOV.GetAdjective]их сил. Однако артиллерийский обстрел города в последнюю секунду парализовал французскую оборону, которая была вынуждена отступить к югу от города. \nВ течение следующих нескольких часов [SOV.GetAdjective]ие наземные войска ликвидировали остатки сопротивления в кварталах города, оставив после себя город, который был неузнаваем по сравнению с прежним.  \n\nС городом в руках [SOV.GetAdjective]их войск, большая часть материковой Франции пала под натиском [SOV.GetAdjective]ого цунами, которое активно превращает винные склады Бордо в центры снабжения, чтобы легче продвигаться в южные равнины Окситании. Однако следующим испытанием, с которым должна столкнуться [SOV.GetAdjective]ая армия, является проход через Пиренейские горы, где иберийские войска уже устанавливают оборонительные периметры. \nЕще предстоит выяснить, насколько эффективны будут эти оборонительные периметры, но, учитывая, что [SOV.GetAdjective]ая армия сумела пересечь Альпы и не сбавила темп, в оставшемся европейском верховном командовании, вероятно, не осталось места для оптимизма. "
 news.612.a: "Франция теряет позиции."
 news.613.t: "Лион в [SOV.GetAdjective]их руках, заявляют командиры"
 news.613.d: "Москва, [SOV.GetNameDef]- ТАСС\n\nПосле капитуляции последних европейских защитников, укрывавшихся на площади Карно в Лионе, [SOV.GetAdjective]ие командиры объявили о полной капитуляции города перед [SOV.GetNameDef]ими армиями. Не так давно в телеграме появилось видео, на котором [SOV.GetAdjective]ие солдаты пьют и празднуют в форте Бастилия в Гренобле.\n\nЛион всегда считался мирным городом для среднестатистического француза, известным своими живописными рождественскими ярмарками и ежегодным Фестивалем огней. Однако этот титул пришел в упадок вместе с самим городом. [SOV.GetNameDef] теперь должна заниматься управлением третьим по численности населения городом Франции, даже несмотря на то, что большая часть населения эвакуирована в другие части страны. Тем не менее, [SOV.GetNameDef]ий контроль над городом, скорее всего, не будет оспариваться местным населением, поскольку последнее, что им нужно, - это еще больше разрушений зданий в результате бессмысленного восстания. \n\nПадение города оказалось весьма выгодным для Росси в их попытках выйти к Средиземному морю, отрезав Италию от остальной части материка. Еще предстоит увидеть, как эти силы смогут реорганизоваться и лучше противостоять, хотя международные наблюдатели не питают больших надежд на то, что Европа сможет воспользоваться своими шансами."
 news.613.a: "Столица огней, сияющая ярким светом."
 news.614.t: "Рим падает под стремительным наступлением"
 news.614.d: "Ужас и возмущение охватили всю Западную Европу, когда [SOV.GetAdjective]ое руководство с помпой объявило о захвате бесспорной иконы западной цивилизации - Рима.\n\nПонеся серьезные потери в Центральной Европе и Северной Италии, европейские войска вложили значительные средства в оборону Центральной Италии, уделяя особое внимание городу Риму. Пытаясь поднять боевой дух, высшие руководители и генералы подчеркивали необходимость обороны Рима и историческую значимость этого города. Однако, похоже, что задача оказалась сложнее, чем они могли себе представить.\n\nВ ходе массированного скоординированного наступления, публично объявленного как "Операция Аларик", [SOV.GetAdjective]ие танковые и механизированные формирования атаковали город при активной поддержке штурмовиков. После более чем недели интенсивных боев обороняющиеся силы наконец сдались под давлением и поспешно отступили из города, поскольку у большинства подразделений закончились боеприпасы или люди.\n\nВ рамках грандиозного зрелища высшие генералы [SOV.GetAdjective]их вооруженных сил собрались в старинном римском Колизее, чтобы осмотреть место и с энтузиазмом объявить о скором разгроме своего врага. Изображения флагов и парадных построений на знаменитых улицах Рима - это образы, которые наверняка войдут в учебники истории.\n\nВ то время как Москва празднует победу, лишь немногие в западном военном командовании или гражданском руководстве знают, как реагировать и что делать в данный момент. С таким крупным городом, как Рим, в руках врага, кажется, что ничто не может помешать полному падению Запада под натиском [SOV.GetAdjective]их сил."
 news.614.a: "Древний город снова в огне."
 news.615.t: "[SOV.GetAdjective]ие Танки наступают вглубь Иберийского полуострова"
 news.615.d: "Москва, [SOV.GetNameDef]- ТАСС\n\nБыл проведен краткий военный парад, на этот раз над полуразрушенной площадью Пласа-Майор в Мадриде. [SOV.GetAdjective]ие солдаты сделали короткую остановку в последних оставшихся в городе ресторанах, прежде чем обратить свой взор на остальную часть Испании. Последние оставшиеся на континенте европейские войска укрылись в горах Бетико на юге, готовые к последнему сражению.\n\nОднако иностранные аналитики не возлагают надежд на эту плохо организованную линию обороны. Падение Мадрида не только приведет к хаосу в испанском правительстве, но и станет отправной точкой для тех, кто контролирует город, чтобы воспользоваться обширной сетью автомагистралей и железных дорог и быстро подавить любое сопротивление своей власти за пределами города. Мадрид был спроектирован для централизованного контроля, и теперь он будет служить [SOV.GetAdjective]им нуждам в качестве центра, необходимого им для обеспечения безопасности Иберийского полуострова.\n\nПоражение в Мадриде также стало последним крупным поражением, необходимым для того, чтобы убедить всех иностранных аналитиков в том, что всё на стороне России. В социальных сетях уже широко распространились сообщения о мятежах европейских солдат, а один из командиров заявил, что не будет терять собственные жизни, "когда Европа уже потеряла свою." "
 news.615.a: "Ужасы войны теперь коснулись каждого европейца."
 news.616.t: "Барселона падает после жестокой осады"
 news.616.d: "Несколько часов назад [SOV.GetAdjective]ое Министерство обороны объявило о капитуляции всех союзных сил в районе метро Барселоны, где остались лишь несколько отрядов испанской сухопутной армии и местные каталонские ополченцы, что стало еще одной победой России в Юго-Западной Европе. В социальных сетях, таких как телеграм и ВК, сейчас распространяются видео, на которых [SOV.GetAdjective]ие солдаты и спецназ поднимают знамя Победы и [SOV.GetAdjective]ий флаг над памятником Колумбу и маршируют по проспекту Диагональ.\n\nДо сегодняшних событий Барселона была осаждена [SOV.GetAdjective]ими сухопутными войсками. Город, некогда крупный культурный, экономический и финансовый центр, был разорен, причем наиболее серьезные повреждения понесли Готический квартал и Эль-Побленоу. За последние несколько недель большая часть населения города бежала в Валенсию или на Балеарские острова, в результате чего несколько кварталов города оказались полностью заброшенными.\n\nПо мнению большинства аналитиков, падение Барселоны фактически обрекает на провал оборону Иберии. Теперь, когда Россия контролирует один из главных пассажирских и контейнерных морских портов Европы, снабжение европейских войск в Каталонии стало практически невозможным. Москва заявила, что это событие является "решающим шагом для обеспечения безопасности в Средиземноморье." Остается неизвестным, смогут ли европейские войска реорганизоваться после этого поражения, но на данный момент большинство из них признали неизбежность поражения Европы."
 news.616.a: "Они же никогда не достроят эту базилику, правда?"
 news.617.t: "Лиссабон потерян под [SOV.GetAdjective]им натиском"
 news.617.d: "Давление на НАТО еще более усиливается, поскольку [SOV.GetAdjective]им войскам наконец удалось захватить крупный иберийский город Лиссабон.\n\nВ связи с быстрым ухудшением ситуации в Западной Европе некоторые надеялись, что Иберия, особенно крупные городские центры, сможет устоять перед стремительным наступлением врага. Остатки португальских и европейских войск организовали оборону города, будучи уверенными, что им будет оказана помощь и пополнение по морю, но эти надежды не оправдались.\n\nПод совместным натиском бронетанковых, морпехов и [SOV.GetAdjective]ие воздушно-десантные войска смогли истощить силы защитников и вытеснить их из города. Многие эвакуировались по морю или отступили в сельскую местность, чтобы попытаться перегруппироваться. Тем не менее, сцены победоносного наступления [SOV.GetAdjective]их пехотных и бронетанковых колонн в центр Лиссабона и исторические районы только подтвердили потерю города и усугубили мрачное настроение на Западе. Лиссабон - одна из многих крупных европейских столиц, павших под [SOV.GetAdjective]им натиском, и на данный момент мало кто надеется, что остальную часть континента удастся спасти. С осадой Иберии судьба Европы, похоже, практически предрешена. "
 news.617.a: "Потерянная жемчужина Европы и Атлантики."
 news.618.t: "[SOV.GetAdjective]ие Силы Штурмуют София"
 news.618.d: "Страх и неопределенность охватили Балканы, поскольку [SOV.GetAdjective]ие силы с большой скоростью и смертоносной силой захватили крупнейший болгарский город Софию.\n\nБлагодаря недавней череде серьезных успехов и побед в Украине, Молдове и Румынии, [SOV.GetAdjective]ие силы быстро продвинулись вглубь Балкан. Неспособные остановить наступление, смешанные западноевропейские и местные болгарские формирования организовали оборону в Софии, надеясь сорвать планы противника по захвату остальной части региона. Однако [SOV.GetAdjective]ие танки и артиллерийский огонь быстро ослабили болгарские позиции, после чего пехота прорвалась в город. \n\nНачались бои за каждый дом, поскольку защитники пытались яростно предотвратить потерю основных районов в центре города, но в конечном итоге не смогли остановить наступление врага. Защитники были вынуждены отступить, поскольку [SOV.GetAdjective]ие силы начали наступать на другие участки болгарского фронта и перерезали пути снабжения в город.\n\n С потерей Софии наблюдатели и комментаторы полагают, что европейские силы теперь, вероятно, планируют новую оборонительную позицию в глубине страны, но оптимизм по-прежнему не высок. Соседние балканские страны западного блока сейчас готовятся к серьезной борьбе, поскольку [SOV.GetAdjective]ие силы стремятся закрепить свои недавние завоевания в этом регионе."
 news.618.a: "Кровь продолжает проливать Балканы."
 news.619.t: "Пожар над Акрополем, когда [SOV.GetAdjective]ие силы продвигаются в сердце Греции"
 news.619.d: "Москва, [SOV.GetNameDef] - RT \n\nСегодня [SOV.GetAdjective]ие войска ворвались в Грецию, заняв один из ее важнейших городов - Афины. Греческие войска пытались отчаянно защищаться, используя узкие улочки города, но в конце концов были разгромлены и вынуждены отступить за пределы города. [SOV.GetAdjective]ие войска смогли проникнуть в здание парламента и поднять [SOV.GetAdjective]ий флаг. Греческое правительство было эвакуировано за несколько часов до нападения. Очевидно, что Греческая Республика находится в очень тяжелом положении и без поддержки союзников может вскоре пасть. Кроме того, [SOV.GetAdjective]ие силы захватили порт Пирей, перерезав жизненно важную экономическую артерию Греции. \n\nОднако битва за Афины еще далека от завершения. Полицейские подразделения, местные жители и оставшиеся греческие солдаты продолжают оказывать яростное сопротивление, устраивая засады и нанося удары по наступающим [SOV.GetAdjective]им колоннам. По всему городу происходят уличные стычки, поскольку защитники пытаются задержать оккупацию и защитить эвакуирующихся гражданских лиц. Министерство обороны Греции распространило по всей стране обращение с призывом продолжать сопротивление. Оборонителям Афин министерство обороны заявило, что они должны использовать все имеющиеся ресурсы, чтобы замедлить [SOV.GetAdjective]ое продвижение. Греческому народу министерство призвало к единству в эти тяжелые времена, предупредив граждан не доверять про-[SOV.GetAdjective]ими СМИ и пропаганде, созданной оккупантами."
 news.619.a: "Пока огонь охватывает греческую столицу, Греция борется не только за свои города, но и за свое выживание."
 news.620.t: "[SOV.GetAdjective]ие Вооруженные силы высаживаются на британском побережье"
 news.620.d: "Лондон, Sky News (SKY) \n\nВ результате поразительной эскалации конфликта [SOV.GetAdjective]ие войска провели морскую высадку на восточном побережье Великобритании, нанеся удар по нескольким небольшим прибрежным городам и быстро захватив местные оборонительные подразделения. Британские власти подтверждают, что несколько транспортных судов при поддержке морской пехоты и вертолетных отрядов прорвали береговую охрану до рассвета. В первые минуты штурма были поражены береговые радиолокационные установки, в результате чего несколько секторов остались без связи, а [SOV.GetAdjective]ие  подразделения продвинулись вглубь суши. \n\nПервые бои разразились вокруг портовых сооружений и близлежащих жилых районов, где спешно сформированные отряды Домашней гвардии пытались задержать продвижение противника. Очевидцы описывают колонны бронетехники, выдвигающиеся с пляжей под плотным прикрытием, в то время как над ними патрулировали вертолеты. Сообщается, что подразделения британской армии, спешно выдвинутые из гарнизонов, расположенных дальше на запад, вступают в бой с передовыми отрядами противника на ключевых дорожных развязках, пытаясь предотвратить их продвижение вглубь крупных городских центров. \n\nПравительственные чиновники осудили нападение, назвав его "беспрецедентным актом агрессии на британской территории." Для нескольких прибрежных населенных пунктов был отдан приказ об эвакуации, а по всему региону продолжают звучать сирены воздушной тревоги, поскольку военные объекты подвергаются периодическим ракетным ударам. \n\n[SOV.GetAdjective]ие государственные СМИ утверждают, что высадка является частью "принудительной операции," направленной на установление мира, хотя остальные западные аналитики предупреждают, что этот шаг может сигнализировать о подготовке к более широкому наступлению по всему острову.\n\n"
 news.620.a: "Невозможная посадка, выполнена..."
 
 news.621.t: "Донецк падает перед европейскими силами"
 news.621.d: "Берлин, Deutsche Welle (DW) \n\nЕвропейские войска захватили Донецк после нескольких недель ожесточенных городских боев, положив конец одной из самых длительных и кровопролитных битв на Востоке. При поддержке мощной авиации и высокоточной артиллерии [SOV.GetAdjective]ие бронетанковые дивизии прорвали оборону и штурмом взяли промышленный центр города. Целые районы лежат в руинах: промышленный район полностью разрушен, высотные здания пробиты снарядами, а улицы завалены обломками. \n\nНесмотря на падение города, отдельные [SOV.GetAdjective]ие нерегулярные подразделения продолжают сопротивляться из туннелей и подвалов, превращая Донецк в лабиринт, не отличающийся от Мариуполя во время [SOV.GetAdjective]ого вторжения в Украину. Местные жители, которые еще не успели бежать, остаются в ловушке между разрушающейся инфраструктурой и масштабными операциями по борьбе с повстанцами.\n\nЕвропейские командующие объявили наступление "стратегической победой," обеспечив контроль над промышленным поясом Донбасса и открыв путь к Ростову. Однако даже несмотря на то, что над разрушенной мэрией поднимается украинский флаг, боевые действия не дают никаких признаков реального завершения."
 news.621.a: "2014 отомщен."
 news.622.t: "Луганск окружен и захвачен европейскими войсками"
 news.622.d: "Брюссель, Euronews (EN) \n\nЕвропейские войска захватили Луганск после безжалостной осады, которая разрушила оборону города и превратила его в руины. Бронированные батальоны и механизированная пехота завершили полное окружение с запада и юга, перерезав все оставшиеся [SOV.GetAdjective]ие линии снабжения и загнав защитников в изолированные карманы. Артиллерия, управляемая с помощью дронов, нанесла точные удары по командным пунктам и топливным складам, сравняв с землей целые кварталы промышленной зоны города. \n\nВнутри города сопротивление было ожесточенным, центр превратился в лабиринт зон смерти, вынуждая европейцев вести жестокие бои от дома к дому. Самые ожесточенные столкновения развернулись вокруг центрального железнодорожного узла, где последний организованный [SOV.GetAdjective]ий гарнизон держался до тех пор, пока сама станция не была превращена в руины. \n\nЕвропейские командующие приветствовали эту победу как последний шаг в обеспечении безопасности Донбасса, поскольку падение Луганска устранило последний крупный оборонительный барьер в регионе. Теперь наступление открывает коридор к Ростову-на-Дону, символическому и стратегическому пункту входа в [SOV.GetNameDef]ий южный фланг. Однако, несмотря на церемонию поднятия флага над разрушенным зданием региональной администрации, на окраинах города продолжаются разрозненные перестрелки и единичные засады. Луганск пал, но борьба за его руинами еще далека от завершения."
 news.622.a: "Вперед, в Ростов!"
 news.623.t: "Варшава отвоевана после ожесточенных уличных боев"
 news.623.d: "Париж, France 24 (F24) \n\nЕвропейские войска отбили Варшаву после жестокой второй битвы, которая оставила польскую столицу изрезанной от края до края. Наступление началось с скоординированных ударов по окраинам города, где укрепившиеся [SOV.GetAdjective]ие и коллаборационистские подразделения превратили целые кварталы в укрепленные зоны смерти. Артиллерия и ракеты с дронным наведением в течение нескольких дней обстреливали оборонительные позиции, прежде чем бронетанковые колонны прорвались по разрушенным проспектам, ведущим к Висле.\n\nВнутри города бои были ожесточенными и непрекращающимися. [SOV.GetAdjective]ие войска, поддерживаемые местными нерегулярными отрядами, превратили довоенные кварталы Варшавы в лабиринт баррикад и огневых позиций. Самые ожесточенные столкновения произошли в районе Сродместье и Праги, где европейская пехота вела бои от дома к дому среди разрушенных многоквартирных домов и сгоревших трамвайных линий. Командиры сравнивали эти бои с самыми тяжелыми моментами первой битвы за город, в которой обе стороны понесли тяжелые потери.\n\nК тому времени, когда европейские войска достигли Дворца культуры и науки, организованное сопротивление в основном было сломлено. Однако отдельные снайперы, заминированные коридоры и импровизированные опорные пункты продолжали замедлять продвижение войск. Здание Сейма было отбито только после длительной перестрелки, в результате которой его внутренние помещения были разрушены взрывами. Обе стороны понесли тяжелые потери.\n\nЕвропейские командующие провозгласили эту операцию крупной победой, восстановив контроль над одной из самых спорных столиц войны. Вислинский коридор был обеспечен, что позволило логистике проникнуть глубже в оккупированную польскую территорию и затянуть удавку на отступающие на восток [SOV.GetAdjective]ие силы."
 news.623.a: "Польша снова спасена!"
 news.624.t: "Будапешт падает после ожесточенной второй битвы"
 news.624.d: "Вена, ORF News (ORF) \n\nЕвропейские войска отбили Будапешт после одного из самых жестоких наступлений за всю кампанию. Венгерские войска, все еще сражавшиеся бок о бок с [SOV.GetAdjective]ими подразделениями, превратили город в укрепленное поле боя, где каждый мост, бульвар и холм защищались так, как будто от этого зависела исход войны. Наступление началось с точных ударов по командным пунктам в Буде, за которыми последовали интенсивные бомбардировки, превратившие несколько опорных пунктов советской эпохи в руины.\n\nПереход через Дунай оказался самым затратным этапом операции. Венгерские и [SOV.GetAdjective]ие защитники взорвали участки Цепного моста и заминировали берега реки, вынудив европейскую пехоту продвигаться под постоянным огнем. Бронетанковые подразделения предпринимали несколько попыток перехода, но каждая из них заканчивалась противотанковыми засадами и артиллерийским обстрелом с высот Замковой горы и горы Геллерт. Бои вдоль реки были описаны командирами как стальная печь.\n\nКак только европейские войска закрепились на стороне Буды, они продвинулись по узким извилистым улочкам, которые были выгодны для защитников. Венгерские подразделения устраивали бесчисленные засады, а [SOV.GetAdjective]ие подразделения удерживали укрепленные позиции в старом дворцовом районе. Окончательный прорыв произошел только после того, как совместный удар авиации и артиллерии разрушил последнюю линию обороны, возвышавшуюся над Дунаем, что позволило бронетанковым батальонам продвинуться через западные районы.\n\nЕвропейские командующие объявили операцию крупной победой, поскольку Будапешт служил важным логистическим и [SOV.GetAdjective]им политическим центром. Его падение фактически перерезало [SOV.GetAdjective]ие пути снабжения в Центральную Европу и вынудило венгерские войска к быстрому отступлению в Карпаты. Однако даже после возвращения города под контроль европейцев снайперы и разрозненные ячейки сопротивления продолжают действовать среди руин столицы."
 news.624.a: "Азартная игра Венгрии провалилась."
 news.625.t: "Бухарест отбит после ожесточенных боев"
 news.625.d: "Рим, Rai News 24 (RAI) \n\nЕвропейские войска отбили Бухарест после быстрого, но жестокого наступления, которое разбило оборону [SOV.GetAdjective]их и румынских лоялистов по всей столице. Наступление началось с скоординированных ударов по западным районам, прорвавших первые линии обороны и оттеснивших защитников к центру города. Целые кварталы в Милитари и Крангаши были сожжены дотла, когда европейская бронетехника продвигалась по улицам под постоянным огнем.\n\nСамые ожесточенные бои развернулись вокруг площади Унирии и Дворца Парламента, где [SOV.GetAdjective]ие войска использовали туннели и входы в метро, чтобы задержать продвижение. Европейские подразделения вели бои от комнаты к комнате в обширном парламентском комплексе, прежде чем поднять свой флаг над разрушенным фасадом. Сопротивление лоялистов продолжалось в северных районах, но авиаудары и поддержка дронов постепенно заставили замолчать последние организованные очаги сопротивления.\n\nКомандиры описывают эту победу как крупный прорыв на Балканах, перерезавший [SOV.GetAdjective]ие пути снабжения и вынудивший лояльные войска отступить в сторону Плоешти и Карпатских перевалов. Однако разрозненные снайперы и скрытые ячейки продолжают действовать, что делает город нестабильным, несмотря на его освобождение."
 news.625.a: "Вперед, к Днестру!"
 news.626.t: "Вильнюс отвоеван после стремительного европейского наступления"
 news.626.d: "Стокгольм, SVT Nyheter (SVT)\n\nЕвропейские войска отбили Вильнюс после резкого, скоординированного наступления, которое подавило [SOV.GetAdjective]ие и союзные им местные подразделения, укрепившиеся по всему городу. Наступление началось на рассвете с точных ударов по командным пунктам в окрестностях Шешкине и Антакалнис, что привело к разрушению внешнего оборонительного кольца и вынудило выжившие подразделения отступить в сторону Старого города. Бронированные колонны, наступавшие с запада, перерезали пути отступления вдоль реки Нерис, изолировав очаги сопротивления.\n\nУличные бои усилились, когда европейская пехота продвинулась в исторический центр. [SOV.GetAdjective]ие войска  пытались удержать подступы к Соборной площади и комплексу Гедиминас-Хилл, но непрерывный артиллерийский обстрел вынудил их быстро отступить. Столкновения вспыхнули в узких улочках Старого города, где лояльные бойцы устраивали засады из дворов и руин домов, прежде чем были вытеснены в результате методичных зачисток.\n\nК вечеру последние организованные защитники были оттеснены к окраинам города Науйой-Вильня, где они сломались и отступили на восток. Европейские командующие теперь заявляют о полном контроле над столицей, называя операцию важным шагом в обеспечении безопасности Балтийского коридора и восстановлении стабильности на северо-восточном фронте."
 news.626.a: "Прибалтика переломит ситуацию."
 news.627.t: "Белград падает после ожесточенных городских боев"
 news.627.d: "Афины, ERT News (ERT)\n\nЕвропейские войска захватили Белград после жестокого наступления, которое разрушило [SOV.GetAdjective]ие позиции и позиции сербских лоялистов по всей столице. Наступление началось с мощных ударов по военным районам в Новом Белграде, которые вывели из строя командные центры и заставили защитников отступить к берегам рек Сава и Дунай. Бронированные подразделения пересекли старый город под прикрытием артиллерии, прорвавшись через забаррикадированные бульвары и укрепленные перекрестки.\n\nСамые ожесточенные бои развернулись вокруг крепости Калемегдан и площади Республики, где [SOV.GetAdjective]ие и сербские подразделения неоднократно проводили контратаки из туннелей и поврежденных зданий. Европейская пехота продвигалась квартал за кварталом, очищая опорные пункты под постоянным снайперским огнем. В результате столкновений внутри комплекса парламента часть исторического здания была сожжена до того, как защитники отступили.\n\nК позднему вечеру оставшиеся лояльные войска попытались прорваться в сторону Звездары, но авиаудары и окружающие маневры отрезали им отступление. Европейские командующие теперь сообщают о полном контроле над городом, называя победу решающим ударом по российско-сербскому альянсу на Балканах. В отдаленных районах продолжаются спорадические перестрелки, но организованное сопротивление рухнуло."
 news.627.a: "Время сербам расплачиваться."
 news.628.t: "Воронеж захвачен после неустанного наступления европейцев"
 news.628.d: "Хельсинки, Yle Uutiset (YLE)\n\nЕвропейские войска взяли Воронеж после изнурительного многомесячного наступления, в ходе которого были прорваны несколько [SOV.GetAdjective]их линий обороны к югу от города. Наступление началось с скоординированных артиллерийских ударов по укрепленным позициям вдоль реки Дон, за которыми последовали быстрые бронетанковые атаки, которые подавили местные гарнизоны и перерезали главную автомагистраль, ведущую в город. [SOV.GetAdjective]ое командование попыталось реорганизоваться в центральных районах, но нарастающее давление вынудило его к поспешному отступлению.\n\nВнутри Воронежа сопротивление было жестким. [SOV.GetAdjective]ие подразделения сражались из жилых кварталов, заводских комплексов и импровизированных опорных пунктов вдоль проспекта Революции, нанося тяжелые потери в ближнем бою. Европейская механизированная пехота продвигалась улица за улицей, очищая оборонительные гнезда под постоянным наблюдением дронов. Решающий момент наступил, когда европейская бронетехника захватила мосты, перерезав [SOV.GetAdjective]ие пути отступления и разрушив последний оборонительный очаг.\n\nЕвропейские командующие теперь описывают захват Воронежа как крупный прорыв на южном фронте. Падение города открывает путь к Курску и угрожает [SOV.GetAdjective]им позициям дальше по бассейну Дона. Хотя небольшие группы [SOV.GetAdjective]их бойцов по-прежнему действуют в пригородах, организованное сопротивление внутри Воронежа в основном прекратилось."
 news.628.a: "Как и наши предшественники."
 news.629.t: "Краснодар взят после интенсивного наступления на юге"
 news.629.d: "Тбилиси, Rustavi 2 (R2)\n\nЕвропейские войска захватили Краснодар после быстрого, но тяжелого наступления по [SOV.GetNameDef]им южным равнинам. Наступление началось с авиаударов по топливным складам и командным пунктам на окраинах города, что парализовало [SOV.GetAdjective]ую логистику, после чего бронетанковые подразделения продвинулись с северо-запада. [SOV.GetAdjective]ие защитники, подкрепленные добровольческими казачьими формированиями, пытались удержать подступы вдоль реки Кубань, но были быстро разгромлены непрерывным артиллерийским огнем.\n\nВнутри города сопротивление усилилось. [SOV.GetAdjective]ие войска забаррикадировали основные проспекты и использовали плотную застройку вокруг центрального рыночного района для организации засад. Европейская пехота методично продвигалась вперед, очищая жилые кварталы и промышленные зоны под руководством дронов. Самые ожесточенные бои разразились в районе магистрали Ред-стрит, где лояльные правительству силы предприняли последнюю контратаку, прежде чем были оттеснены к южным пригородам.\n\nК позднему вечеру оставшиеся защитники попытались отступить в сторону Новороссийска, но были отрезаны окружающими маневрами. Европейские командующие теперь подтверждают полный контроль над Краснодаром, называя операцию критически успешной, которая обеспечивает безопасность Кубанского региона и угрожает [SOV.GetAdjective]им позициям на черноморской границе. Вне города продолжаются спорадические столкновения, но организованное сопротивление в основном сломлено."
 news.629.a: "Кавказский фронт рушится."
 news.630.t: "Осада Санкт-Петербурга заканчивается падением города"
 news.630.d: "Гамбург, Германия - Die Welt\n\nОдна из исторических имперских столиц России, Санкт-Петербург, недавно перешла в руки европейцев после шокирующе успешного наступления на севере, поскольку альянс продолжает продвигаться вглубь [SOV.GetAdjective]ие территории в рамках более широкой кампании по ослаблению оставшихся [SOV.GetAdjective]их сил. Благодаря военным успехам на балтийской границе стратегия на северо-западе сменилась с сдерживания на давление, как в символическом, так и в военном плане.\n\nКонтингенты под командованием скандинавских стран пересекли реку Луга, установив прочное присутствие к западу от города. Поддержка со стороны балтийских логистических подразделений и немецких бронетанковых войск укрепила наступление, в то время как точечные удары, по сообщениям, скоординированные с силами быстрого реагирования, были нанесены по ключевым транспортным узлам вдоль Московского шоссе.\n\nХотя [SOV.GetAdjective]ие государственные СМИ настаивают на том, что город остается безопасным, периодические отключения электроэнергии, нехватка топлива и рост числа эвакуаций свидетельствуют об обратном. Местные видеозаписи, полученные независимыми наблюдателями, показывают длинные очереди у хлебных складов и импровизированные бомбоубежища, организованные в станциях метро.\n\nС падением [SOV.GetNameDef]ой северной столицы европейские войска уже начали реорганизацию своих позиций, поскольку их внимание переключилось непосредственно на  [SOV.GetAdjective]ую столицу - Москву. Как будет проходить операция, пока неизвестно, но после столь успешной операции по захвату Санкт-Петербурга Москва может вскоре оказаться в аналогичной ситуации."
 news.630.a: "Говорят, что история часто повторяется."
 news.631.t: "Волгоград пал после жестокой осады"
 news.631.d: "Лондон, BBC World Service (BBC)\n\nЕвропейские войска захватили Волгоград после изнурительной осады, которая вызвала мрачные сравнения с битвами, происходившими там несколько поколений назад. Наступление началось с концентрированных ударов по [SOV.GetAdjective]им артиллерийским позициям к северу от города, за которыми последовало широкое наступление по подступам к Волге, которое подавило передовые линии обороны. [SOV.GetAdjective]ие подразделения пытались удержать высоты Мамаева кургана, но непрерывные бомбардировки вынудили их отступить глубже в город.\n\nВнутри Волгограда бои становились все более жестокими. [SOV.GetAdjective]ие регулярные войска и местные ополченцы укрепляли фабрики, жилые дома и участки старых промышленных комплексов, превращая каждый квартал в опорный пункт, как во время Второй мировой войны. Европейская механизированная пехота продвигалась под постоянным снайперским огнем, очищая здания этаж за этажом в ходе ожесточенных уличных боев в районах Тракторного завода и Баррикад. Несколько ключевых перекрестков переходили из рук в руки по несколько раз за день, поскольку обе стороны боролись за контроль над коридорами снабжения.\n\nК концу дня европейские войска прорвали последний оборонительный периметр вдоль центральной набережной, перерезав пути отступления через Волгу. Выжившие защитники попытались разрозненно прорваться к южной окраине, но были перехвачены и рассеяны. После того как центр города был взят под контроль, европейское верховное командование объявило операцию решительной победой, которая нарушила контроль над Нижним Поволжьем и открыла путь к Астрахани и Центральной Азии."
 news.631.a: "Гордый город наконец падает."
 news.632.t: "Пожары охватывает Москву, а [SOV.GetAdjective]ие войска сдаются"
 news.632.d: "Гамбург, Германия - Die Welt\n\nМосква была на короткое время осаждена после того, как европейские войска сумели заблокировать автомагистрали города, окружив его от остальной части страны. Затем на улицах Москвы начались перестрелки и удары беспилотников, но сегодня утром они закончились, когда оставшиеся защитники города массово сдались в Кремле, где многие из них приняли последнюю битву.\n\nВпервые за более чем два столетия [SOV.GetAdjective]ая столица  пала под натиском иностранной державы, однако на этот раз не похоже, что [SOV.GetNameDef] сможет отбить этот город в течение нескольких недель или когда-либо вообще. Москва, находящаяся под контролем европейцев, предоставляет европейским войскам отправную точку, необходимую для укрепления их контроля над захваченными [SOV.GetAdjective]ими землями и продолжения кампании против оставшихся [SOV.GetAdjective]их линий обороны.\n\nУже сейчас в телеграм-каналах появились сообщения о том, что [SOV.GetNameDef]ое высшее командование подверглось внутренним раздорам, а некоторые генералы даже укрепили свою власть над некоторыми городами Сибири, отказавшись "продолжать жертвовать жизнями своих солдат в бессмысленной мясорубке.""
 news.632.a: "Медведь потерял свое сердце."
 
 news.633.t: "Гамбург падает перед французскими войсками"
 news.633.d: "Париж, France 24 (F24)\n\nФранцузские войска захватили Гамбург после жестокого и быстрого наступления вдоль Эльбы. Наступление началось с скоординированных ударов по немецким артиллерийским позициям, возвышающимся над рекой, за которыми последовало наступление бронетехники, которое вынудило переправиться под непрерывным пулеметным и минометным огнем. После того, как плацдармы были закреплены, французские морские стрелки продвинулись по полузатопленным улицам HafenCity, превратив доки и склады в лабиринт для ближнего боя.\n\nНаиболее сильное сопротивление было оказано в Шпайхерштадте, где немецкие подразделения использовали узкие каналы и кирпичные склады, чтобы замедлить продвижение французов. Бои перешли в фазу помещение за помещением, поскольку защитники взрывали мосты и баррикадировали целые кварталы. После нескольких часов упорного давления французская пехота прорвала последний оборонительный круг, захватила портовые сооружения и перерезала важную немецкую линию снабжения на севере.\n\nХотя центр города находится в руках французов, отдельные немецкие отряды продолжают действовать из подвалов, туннелей и частично разрушенных высотных зданий. Военные чиновники в Париже называют эту победу важным шагом в дестабилизации северного фронта Германии, открывающим путь к Бремену и усиливающим давление на сам Берлин."
 news.633.a: "Гамбург взят, Эльба пересечена."
 news.634.t: "Мюнхен падает после ожесточенного наступления французов"
 news.634.d: "Лион, Euronews (EN)\n\nФранцузские войска захватили Мюнхен после длительных и изнурительных боев, продвинувшись глубоко в столицу Баварии. Наступление началось с точных ударов по немецким командным пунктам вокруг Олимпийского парка и Швабинга, что парализовало координацию действий на местном уровне, после чего бронетанковые колонны продвинулись по Миттлереру Рингу. Немецкие защитники пытались остановить наступление с помощью укрепленных пехотных и противотанковых опорных пунктов, но прорыв французов в районе Моозаха разрушил их оборонительную сеть.\n\nВнутри города боевые действия активизировались вокруг Кёнигсплац и университетского квартала, где немецкие войска превратили музеи, библиотеки и административные здания в укрепленные редуты. Французские подразделения продвигались квартал за кварталом, очищая классные комнаты, галереи и внутренние дворы, а снайперский огонь эхом раздавался по старым каменным фасадам. Переломным моментом стало захватывание французскими войсками главного железнодорожного узла München Hbf, что перерезало Германии последний путь для подкрепления или эвакуации.\n\nПоследние столкновения произошли в правительственном квартале вокруг Максимилианеума, где остатки немецких регулярных войск оказали последнее сопротивление среди разрушенных баррикад и горящих автомобилей. К вечеру французские командиры сообщили о полном контроле над городом, хотя очаги немецкого сопротивления сохранялись в восточных пригородах и вдоль лесистых берегов Изара.\n\nПариж приветствует захват Мюнхена как решающий удар по южной обороне Германии, усиливший давление на Баварию и открывший путь к Регенсбургу и Альпийскому коридору."
 news.634.a: "Мюнхен пал, Бавария сдается."
 news.635.t: "Кёльн захвачен наступающими французскими войсками"
 news.635.d: "Брюссель, RTBF Info (RTBF)\n\nФранцузские войска захватили Кельн после интенсивных боевых действий в городе, который был одним из наиболее укрепленных городов Германии на Рейне. Наступление началось с концентрированных ударов по немецким позициям вдоль моста Гогенцоллерн, что вывело из строя оборонительную артиллерию и открыло коридор для французских бронетанковых подразделений, которые переправились через реку под прикрытием огня. После того как были закреплены позиции на восточном берегу, французская пехота ворвалась в Дойц, разгромив местные гарнизоны в жестоких уличных боях.\n\nЦентр тяжести сражения сместился на запад, когда французские войска продвинулись к Домплатте. Немецкие защитники укрепились вокруг собора и главного вокзала, превратив исторический район в лабиринт баррикад, огневых рубежей и укрепленных подвалов. Последовали часы ожесточенных боев - гранаты эхом разносились по узким улочкам, огневые команды очищали разрушенные витрины магазинов, а французские инженеры кропотливо демонтировали укрепления, защищавшие соборную площадь.\n\nПереломным моментом стало падение железнодорожных депо к северу от вокзала. Как только французские механизированные подразделения захватили эти пути, попытки немцев усилить оборону или отступить провалились. К концу дня организованное сопротивление в центре города было сломлено, и остались только разрозненные немецкие отряды, сражавшиеся из подвалов и разрушенных офисных зданий вдоль набережной Рейна.\n\nПариж теперь приветствует захват Кельна как стратегический прорыв, укрепивший контроль Франции над нижним Рейном и открывший промышленное сердце Германии для дальнейших вторжений."
 news.635.a: "Конец промышленной мощи Германии."
 news.636.t: "Амстердам падает под натиском французских войск"
 news.636.d: "Гаага, NOS Nieuws (NOS)\n\nФранцузские войска захватили Амстердам после быстрого, но ожесточенного штурма через концентрические каналы города. Наступление началось с продвижения механизированных подразделений из Харлема при поддержке точных авиаударов по голландским оборонительным позициям вдоль западных кольцевых дорог. После того как французские подразделения "génie militaire" обеспечили переправы через первый пояс каналов, пехота продвинулась в густонаселенный центр города, продвигаясь по узким улицам и через мосты под постоянным обстрелом из стрелкового оружия со стороны голландских войск и немецких подразделений.\n\nСамое ожесточенное сопротивление было оказано вокруг площади Дам и Королевского дворца, где голландские защитники укрепили правительственные здания и использовали окружающие дома на канале в качестве взаимосвязанных опорных пунктов. Бои перешли в ближний бой, когда французские морские стрелки очищали каждый квартал, иногда пробираясь через затопленные подвалы и задымленные лестничные клетки, чтобы вытеснить укрепившиеся подразделения. После захвата дворцового квартала французские бронемашины прорвались к Центральному вокзалу, разрушив последнюю скоординированную голландскую линию обороны.\n\nК вечеру оставшиеся голландские войска отступили в сторону Алмере, оставив после себя разрозненные группы снайперов и импровизированные баррикады, которые по-прежнему замедляют продвижение французских войск через восточные пригороды. Париж теперь приветствует захват Амстердама как решающий шаг в нейтрализации западного фланга Германии и обеспечении доступа военно-морского флота к подступам к реке Эй и Северному морю."
 news.636.a: "Наконец-то покоренные высокомерные голландцы."
 news.637.t: "Антверпен пал после мощного французского наступления"
 news.637.d: "Антверпен, VRT NWS (VRT)\n\nФранцузские войска захватили Антверпен после жестокого штурма, который разорвал главный порт Фландрии и одну из последних крупных крепостей на реке Шельде. Наступление началось с скоординированных артиллерийских ударов по голландским оборонительным линиям вдоль кольца, за которыми последовали бронетанковые удары, прорвавшие оборону в районе Мерксема и Дейрна. После прорыва внешних районов французская пехота продвинулась в густонаселенный центр города, сражаясь квартал за кварталом на узких улицах и укрепленных перекрестках.\n\nСамые ожесточенные столкновения разразились вокруг порта Антверпена, где голландские защитники использовали склады, краны и штабеля контейнеров в качестве импровизированных опорных пунктов. Французские морские стрелки пересекли доки под постоянным огнем винтовок и пулеметов, очистив терминалы и захватив ключевые пирсы в жестоких боях в ближнем бою. Тем временем голландские подразделения, укрепившиеся вокруг собора Богоматери и Гроте-Маркт, проводили неоднократные контратаки, вынуждая французские войска вести многочасовые изнурительные бои в историческом центре города.\n\nПереломным моментом в сражении стало падение районов Мейр и Центральный вокзал. Как только французские механизированные подразделения захватили эти транспортные узлы, сопротивление голландцев начало распадаться. К вечеру последние организованные очаги сопротивления были оттеснены к восточной окраине города или вынуждены отступить через промышленные мосты через Шельду. Спорадическая снайперская стрельба продолжается, но Антверпен фактически находится под контролем французов."
 news.637.a: "Открытие коридора Шельды."
 news.638.t: "Брюссель пал, заявляют немецкие чиновники"
 news.638.d: "Брюссель, Le Soir (LS)\n\nНемецкие войска захватили Брюссель после быстрой, но разрушительной ofensivы, которая прорвала внешнюю оборону города и подавила французские подразделения, сражавшиеся за удержание столицы. Наступление началось с интенсивных бомбардировок вдоль восточного кольца, которые вывели из строя ключевые дорожные узлы и вынудили французских защитников отступить к центру. Затем немецкие бронетанковые колонны продвинулись по коридору E40, прорвав разрозненное сопротивление и войдя в столицу до рассвета.\n\nВ Брюсселе боевые действия активизировались в районе Европейского квартала, где французские войска и спешно сформированные подразделения валлонской жандармерии укрепили правительственные здания и пытались блокировать продвижение немцев по улице Rue de la Loi. Немецкая пехота при поддержке артиллерии штурмовала район, расчищая баррикады и вынуждая защитников отступать к Королевскому дворцу и площади Гран-Плас. Уличные бои бушевали в узких средневековых улочках, несколько зданий обрушились под обстрелом, поскольку обе стороны сражались за контроль над историческим центром города.\n\nРешающий момент наступил, когда немецкие механизированные подразделения захватили вокзалы Брюссель-Северный и Брюссель-Южный, перекрыв все пути отступления оставшимся французским войскам. С перерезанными линиями снабжения и остановленной эвакуацией гражданского населения организованное сопротивление рухнуло, и разрозненные защитники либо сдались, либо отступили в западные пригороды. Немецкое командование теперь заявляет о полном контроле над столицей, что знаменует собой важный прорыв в их кампании по восстановлению господства над Нидерландами."
 news.638.a: "Брюссель пала, это новый план Шлиффена?"
 news.639.t: "Бордо захвачен немецкими войсками"
 news.639.d: "Париж, Le Monde (LM)\n\nНемецкие войска захватили Бордо после решительного наступления на юге, которое сломило французскую оборону вдоль Гаронны. Наступление началось с быстрых механизированных ударов с севера, обойдя разрушенные линии обороны на окраинах и вынудив французские подразделения отступить в густые улицы старого города. Немецкая артиллерия нацелилась на ключевые перекрестки, сорвав попытки французов перегруппироваться и перерезав последние надежные пути снабжения в регион.\n\nВнутри Бордо боевые действия развернулись вокруг Пон-де-Пьер и исторических кварталов, расположенных вдоль берега реки. Французские войска укрепились в каменных таунхаусах, винных складах и узких средневековых улочках, превратив каждый квартал в узкое место. Немецкая пехота методично продвигалась под руководством дронов, очищая укрепленные перекрестки и оттесняя защитников на юг, а горящие крыши заполняли небо дымом.\n\nРешающий прорыв произошел, когда немецкие бронемашины пересекли районы Кенконс и Шартрон, обойдя оставшиеся французские опорные пункты и разрушив оборонительную сеть города. Попытки французов удержать сектор Пей-Берлан провалились из-за нехватки боеприпасов и сбоев в связи. К концу вечера последние организованные подразделения отступили в сторону лесов Ланд, оставив после себя только разрозненных снайперов и изолированные очаги сопротивления.\n\nБерлин теперь провозглашает захват Бордо важным шагом в перерезании атлантической цепи снабжения Франции и усилении давления на юго-запад страны."
 news.639.a: "Атлантический океан - это новая граница."
 news.640.t: "Лион падает под натиском немецких войск"
 news.640.d: "Женева, RTS Info (RTS)\n\nНемецкие войска захватили Лион после безжалостного наступления, которое разбило французскую оборону вдоль рек Сона и Рона. Наступление началось с интенсивных бомбардировок ключевых транспортных узлов в Вильурбане и Вазе, что вывело из строя командные пункты и перерезало дороги, по которым в город поступали подкрепления. Затем немецкие бронетанковые отряды прорвались по коридору автомагистрали A6, прорвав поспешно возведенные баррикады и вынудив французские подразделения отступить в центр города.\n\nВнутри города бои усилились вокруг площади Белькур и полуострова Преск, где французские защитники использовали узкие улочки и исторические каменные здания, чтобы замедлить продвижение немцев. Столкновения бушевали по всему полуострову, пока немецкая пехота очищала квартал за кварталом, продвигаясь все ближе к мэрии и подножию холма Фурвьер. Крутые извилистые улочки Старого Лиона на короткое время стали оплотом сопротивления, но постоянное давление немцев в конце концов вынудило их отступить через мосты.\n\nРешающий момент наступил, когда немецкие войска захватили станцию Перраш и перерезали последний путь отступления на юг. Окруженные и измученные французские войска предприняли разрозненные попытки прорваться к Жерлану и восточным пригородам, но большинство из них были отброшены назад или взяты в плен. К наступлению ночи организованная оборона рухнула, и только отдельные группы снайперов продолжали действовать на высотах Круа-Рус.\n\nРешающий момент наступил, когда немецкие войска захватили Берлин, отмечая падение Лиона как критический прорыв во внутренней линии обороны Франции, открывший путь к сердцу юго-восточной Франции."
 news.640.a: "Лион пал, уязвимое место Франции обнажено."
 news.641.t: "Париж вновь пал перед немецкими войсками"
 news.641.d: "Берлин, Германия - Die Welt\n\nНедавно город Париж был охвачен пламенем после жестокой схватки между французскими и немецкими войсками, в результате которой погибло много людей, в том числе мирных жителей, в ходе боев за каждый дом. Однако оставшиеся французские командиры, ответственные за оборону города в этом районе, понимая, что их надежды на защиту Парижа тщетны, сегодня утром массово сдали свои войска.\n\nЕще десять лет назад Париж был самым посещаемым и известным городом на Земле. Теперь же его улицы охватили пламя войны, и трудно найти хотя бы одну улицу, на которой не было бы разрушенных зданий или инфраструктуры. После этих событий над Эйфелевой башней был поднят немецкий флаг, сигнализируя миру, что в третий раз в новейшей истории Германия стала, в конечном счете, доминирующей державой на континенте.\n\nФранцузское сопротивление как внутри, так и за пределами города продолжается, поскольку остатки французской армии консолидировались в более легко защищаемых регионах южной Франции. Несмотря на эти действия, иностранные аналитики уже пришли к выводу, что победа Германии в этом конфликте неизбежна."
 news.641.a: "'Nous sommes perdus'"
 news.642.t: "Берлин в огне, последние надежды Германии исчезают"
 news.642.d: "Париж, Le Monde (LM)\n\nВ то время как французские войска кратко проходят парадом перед Бранденбургскими воротами, последние очаги немецкого сопротивления быстро подавляются после короткого, но жестокого сражения между немецкими и французскими бронетанковыми частями, в результате чего немцы отступают из Берлина, и город оккупируется Францией.\n\nБерлин был почти полностью разрушен в последние годы Второй мировой войны. Бомбардировки союзников парализовали оборону города, который был быстро оккупирован советскими пехотинцами, артиллерией и танками. Сейчас город вновь почти полностью разрушен, на этот раз французскими дронами, ракетами и бронетанковыми войсками. Чудом большинство исторических зданий остались практически нетронутыми, и многие немецкие бойцы сопротивления использовали их для создания баррикад и оперативных баз, чтобы продолжать свою борьбу против Парижа из тени.\n\nОднако на первый взгляд потеря Берлина для многих означает начало конца военных действий Германии и ее союзников. Многие члены пакта, особенно из Восточной Европы, уже отказались от участия в конфликте и демобилизовали свои армии. Оставшиеся немецкие войска спешно формируют импровизированные оборонительные линии, однако в их рядах растет дезертирство, поскольку французские войска с каждым днем все быстрее захватывают все новые территории. "
 news.642.a: "'Wir sind verloren'"
 
 news.643.t: "Europa Erhebt Sich"
 news.643.d: "Третья европейская война заканчивается не триумфом империи и не очередным пактом тиранов, делящих между собой добычу. Она заканчивается перевернутым с ног на голову миром, красным Берлином, безмолвной Москвой, последними тронами Европы, свергнутыми и брошенными в огонь. \n\nНародная армия шла не за славой, а за освобождением. Через Нидерланды, через руины востока, через груды трупов Парижа они шли без колебаний. Старые державы истощили свой континент. В последний час они предлагали только нигилизм и уничтожение. Берлин предлагал будущее. И рабочие Европы откликнулись. С винтовками и коктейлями Молотова, с саботажем и восстаниями они поднялись, чтобы встретить их. \n\nТеперь они хоронят старый порядок. Европа больше не будет кладбищем революций, а станет их колыбелью. Формируется новая федерация народов, связанная не капиталом, а солидарностью, общими жертвами, волей тех, кто отказывается снова подчиняться. \n\nОрудия умолкают, но работа только начинается. Нужно восстановить страны, судить тиранов, вооружить поколения не для войны, а для бдительности. Элиты Вашингтона и Токио уже дрожат. От Одера до Дуная, от Атлантики до Кавказа - Интернационал жив."
 news.643.a: "Красное знамя над всем."
 news.644.t: "Великий Европейский Распад"
 news.644.d: "То, что началось как последние судороги старого порядка, закончилось его окончательным исчезновением. Границы растаяли, государства исчезли, а история, некогда медлительный и терпеливый бог, была казнена скоростью. Германия торжествует не как нация, а как катализатор нового континентального состояния. \n\nВойна разорвала монархии, республики и бюрократические системы. Это была ликвидация наций, ностальгии, границ. Армии европейской революции не завоевывали флаги или договоры; они ускорили коллапс, сожгли застой и расчистили путь для постнационального синтеза. Целые города стали печами трансформации, где реакция была разгромлена, а послушание стало ненужным. В тот момент, когда немцы пересекли Рейн, они уже похоронили идею Европы. \n\nИз руин возникает не федерация, не союз, а процесс, Императив в действии. Валюта устарела. Парламенты превратились в прах. Производство подчиняется приказам. Память подвергается кураторству. Европа становится схемой коммун, узлов и центров власти, объединенных идеологией, сталью и импульсом. \n\nНет мира, который можно было бы праздновать. Мир - это регресс. Конфликт может быть закончен, но разрыв продолжается, и из него расширяется постоянная революция. Логика истории была переписана. То, что следует за этим, - не будущее, а каскад."
 news.644.a: "Европа Нуль."
 news.645.t: "Крепость Завершена"
 news.645.d: "Последние столицы врага пали не под звуки парадов, а в тишине. Не было объявлено об освобождении, не праздновалось братство. Люди, поднявшие знамя над Варшавой и Миланом, не питали иллюзий о единстве. Важно было то, что угроза исчезла и мир больше не тронет их. \n\nВойна Германии велась не за завоевание, а за уход. Не за расширение, а за избавление от гнили. Старый мировой порядок, капиталистический или социалистический, на протяжении столетия высасывал из страны все соки. Теперь ее армии разгромили их всех, не для того, чтобы оккупировать, а чтобы прижечь. Границы закрыты. Голос Европы замолк. На его месте возникает нечто более холодное, более голодное и полностью самодостаточное. \n\nНет никакого союза, никаких переговоров, никакого интернационализма. Европа стоит в одиночестве и, наконец, свободна. Построенная кирпич за кирпичом своими руками, охраняемая огнем собственной дисциплины. Ничто не входит. Ничто не выходит. Внешний мир может смотреть на это с ужасом или с восхищением. Это не имеет значения. Крепость не нуждается в них."
 news.645.a: "Все, что нам нужно, мы создаем сами."
 news.646.t: "Разрушенный Шпиль"
 news.646.d: "Берлин исчез. Сожженный в пламени суда. Железный шпиль лежит в руинах, разбитый артиллерией, погребенный под сапогами. Мечта Германии об изоляции, о чистоте, о вечной борьбе со всем миром закончилась тишиной. \n\nЕвроинтерн не предлагал мира. Он предлагал огонь, сталь и суд. Немецкий режим решил сопротивляться до последнего, и его желание было исполнено. Над руинами не было поднято ни одного флага, только дым. Мир, которого они хотели, не вернется. \n\nФранция не оплакивает погибших. Границы стерты, книги сожжены, старые названия забыты. То, что будет дальше, не для Германии, а от нее - совершенно новое государство, новые границы, новый режим. Что бы это ни было, его больше нет. Европа движется вперед. Будущее принадлежит тем, кто движется вперед. И Евроинтерн не ждет, пока заживут раны."
 news.646.a: "Берлин разгромлен, Европа перекована."
 news.647.t: "Endsieg"
 news.647.d: "На европейском континенте снова затихли пушки. Братья сражались друг с другом на протяжении почти десятилетия европейской истории, но теперь только один из этих братьев выжил, чтобы рассказать эту историю - немецкую историю. \n\nНемецкие командиры и чиновники уже прокомментировали свою победу, назвав ее "последним шагом" в том, что они считают "Европой под руководством Германии." Пока не ясно, что на самом деле означает это заявление для среднестатистического европейца, но если судить по зверствам в Восточной Европе, то для Европы настанут не лучшие времена. Французская нация, наряду со своими побежденными союзниками, была поставлена под временный военный контроль Германии, который продлится до тех пор, пока не будет решено, какие правительственные изменения будут лучше для французов. \n\nМир, мягко говоря, удивлен этими событиями. Европа все еще не оправилась от разрушительных Первой и Второй мировых войн, а также от борьбы Франции и Германии за господство над континентом, в результате которой большая часть Западной Европы лежит в руинах. Только Германия способна вести континент за собой, и она будет это делать, пусть даже железной рукой."
 news.647.a: "Siegfrieden!"
 news.648.t: "Рождение Великого Германского Рейха"
 news.648.d: "Если бы вы спросили обычного европейца до начала 2020-х годов, как он представляет себе свой континент через несколько десятилетий, лишь немногие с уверенностью ответили бы, что Европа вновь окажется под знаменем свастики. Однако после капитуляции последних оставшихся французских войск последней силой на континенте стала не Германия, а Германия. \n\nФрэнк Франц, с момента своего прихода к власти после провальных действий против ныне развалившегося Союза, все больше уводил Германию в прошлое, пока флаг Германского народного государства не был заменен национал-социалистическим знаменем на всех флагштоках Германии. Теперь Рейх может продолжить реализацию части своего плана, от которого он отказался после поражения во Второй мировой войне, а именно: выселение славянского населения к востоку от Германии в обмен на этнических немцев, как это предусмотрено в возрожденном "Генеральном плане ОСТ", который теперь распространяется на большую часть северной Франции как способ навсегда наказать эту нацию. \n\nУже сейчас от Парижа до Москвы проходят грандиозные военные парады, а четырехконечный крест охватывает весь континент. То, чего не удалось достичь Гитлеру, было возвращено Францем и его партией. Теперь остальной мир готовится к тому, что один из самых ненавистных режимов в истории человечества вновь появился на свет и не имеет врагов."
 news.648.a: "Eintausend Jahre!"
 news.649.t: "Deutsches Kaiserreich"
 news.649.d: "Трубы, барабаны и сапоги слышны по всем городам Европы, где празднуют торжественную коронацию кайзера Генриха XIII в Версале, повторяя тот же шаг, который более века назад сделал Вильгельм I, только на этот раз немецкая армия не покинет дворец и ни один другой французский город. \n\nКоронация Генриха XIII сопровождалась его грандиозной речью, в которой он провозгласил, что "величайшая ошибка истории" была исправлена с возрождением Германской империи и возвращением к старой Конституции 1871 года. Единое немецкое государство под руководством прусского короля и дома Ройсов. Этот шаг был с нетерпением ожидаем иностранными аналитиками с момента падения крупных французских городов, таких как Париж, и медленного распада верховного командования Виши. Однако никто не ожидал таких богатых и мощных торжеств по всему Пакту, теперь навсегда связанному с Берлином. \n\nУже сейчас династии возвращаются на свои троны, поскольку Берлин готовится возобновить план "Mitteleuropa", вынуждая остальную Европу присоединиться к Германскому таможенному союзу и постепенно внедряя германизацию в их образ жизни, пока немецкая культура не станет повсеместной на всем континенте в качестве средства защиты от "еврейской индоктринации", по словам самого кайзера."
 news.649.a: "Mit Gott für König und Vaterland!"
 news.650.t: "Европа перешла под военный контроль Франции"
 news.650.d: "Недавний хаос, принесенный на европейский континент европейскими войнами, нанес необратимый ущерб. Когда-то считавшийся самым мирным континентом на Земле, Европа наконец-то сбросила эту маску и вернулась к своему обычному историческому циклу - вечной войне с самим собой. Однако в последнее время было достигнуто нечто похожее на прочный мир, но этот прочный мир является суровым.\n\nФранцузское государство, находящееся под контролем военной хунты, объявило о полной победе над Германией и ее союзниками, создав государства-сателлиты на территории бывшего Стального пакта, все из которых находятся под военным контролем Парижа. Новая Франция, затмившая любые попытки политических реформ в сторону демократии, является Францией, лишенной подлинной идеологии. Единственное, во что верит Франция, - это поддержание своей военной мощи превыше всего. \n\nСудьба европейского континента теперь находится в руках французских генералов и маршалов. Неясно, как долго продлится эта Pax Francia, но, учитывая, что модель Петена принесла мир на континент, эта система, вероятно, станет новым статус-кво на некоторое время."
 news.650.a: "Вечная хунта?"
 news.651.t: "Европа Снова Свободна"
 news.651.d: "С момента поражения НАТО в Первом европейском конфликте многие утверждали, что конец демократических систем Европы был неизбежен. Однако никто не утверждал, что эти же системы вернутся на континент в ранее не практиковавшейся форме. \n\nВсе эти события связаны с победой Седьмой Французской Республики, образованной после того, как французский маршал Де Вильерс вскоре после своего прихода к власти объявил о проведении свободных выборов, в войне против немецкой хунты, которая теперь находится под временной властью, в надежде в ближайшем будущем стать сестринской республикой Франции. Однако эти новообразованные республики на территории бывшего Пакта не являются такими же демократиями, как раньше. Они рассказывают новую историю, не о бюрократах, а о молодых и полных надежды реформаторах, которые неустанно работают над воплощением мечты де Голля в жизнь на Старом континенте. \n\nПравда заключается в том, что большая часть Германии и Франции была разрушена в результате многочисленных конфликтов на континенте и невысказанных жестокостей. Задача восстановления этих земель лежит исключительно на Франции, которая вместе со своими союзниками не успокоится, пока Европа не вернется к нормальной жизни."
 news.651.a: "Vive la France Libre!"
 news.652.t: "Les Terres Promises"
 news.652.d: "На берегах Европы возник новый порядок, вобравший в себя эстетику старого порядка, невиданного более тысячи лет. Международные наблюдатели всегда с осторожностью относились к Франкскому национальному государству, отмечая таинственную и порой угрожающую ауру вокруг верховного маршала, известного только под прозвищем "Лафайет." Теперь, после капитуляции последних армий Пакта сегодня утром, франкское знамя развевается над всеми европейскими городами. \n\nТайна, окружающая это новое государство, не носит даже эстетического характера, поскольку о его границах и территории практически ничего не известно. Все, что доступно, - это несколько речей, которые франкские СМИ пропустили через свой файрволл. Истории об этнических чистках по всему континенту и жестоких зверствах, совершенных в отношении немецких граждан, которые Лафайет воспринимает как не более чем "франков, потерявшихся в еврейском порабощении." \n\nЕвропа разделилась на две части: одна половина принадлежит франкам, а другая - недавно провозглашенному Славянскому национальному государству, сателлиту Парижа. Империя Карла Великого вернулась в Европу таким образом, который никто не мог представить. Как долго она просуществует - неизвестно, но, зная историю Первой империи тысячелетней давности, можно сказать, что смерть Лафайета станет серьезной проблемой."
 news.652.a: "Верденский договор аннулирован"
 news.653.t: "Фасции Охватывают Европу"
 news.653.d: "Последние оставшиеся немецкие контингенты сдались, что ознаменовало конец Стального пакта и начало мирных переговоров между всеми сторонами континента, теперь под надзором Франции. Надзор, который сам по себе контролируется Великим Советом фашизма.\n\nИван Бенедетти, более известный под прозвищем "французский дуче", преобразовал французское общество в почти точную копию итальянского общества при Муссолини. Французская Социальная Республика, как ее теперь называют, тайно победила своих политических и военных соперников в закулисных борьбе за власть, обеспечив стабильность для французского народа и проведя при этом ряд радикальных националистических реформ, таких как введение корпоративизма и репатриация миллионов беженцев с французской территории.\n\nСейчас эти же меры внедряются всеми европейскими правительствами, и сопротивление гегемонии Парижа практически не осталось. Фашизм укрепился в Европе, хотя, возможно, и не так, как это представлял себе Муссолини."
 news.653.a: "Мечта Муссолини осуществилась"
 news.654.t: "Pax Latina"
 news.654.d: "Сегодня странный день. Во всех городах Западной Европы начинаются грандиозные фестивали и военные парады, посвященные победе над "германскими варварами", которые недавно сдались после нескольких месяцев жестоких боев, затронувших все уголки Германии и бывшего пакта. \n\nОднако на этих фестивалях вы не увидите старых европейских флагов. Вместо этого там присутствует только символ идентитаристов, размещенный на темно-красном и желтом знамени, напоминающем римские знаки отличия. Латинская империя была образована вскоре после того, как бывший политик NR Джордан Барделла обошел всех своих соперников в борьбе за власть и стал бесспорным правителем французского общества, которое расширилось и включило в себя большую часть латинского мира. \n\nЗадача восстановления этого разрушенного континента теперь лежит на Барделле и его Империи, которая уже реорганизует немецкое общество в Германское царство, теперь навсегда порабощенное латинянами. Еще предстоит увидеть, какую позицию займет Империя в этом новом глобальном порядке, хотя не будет удивительным, если влияние Империи распространится на другие бывшие римские земли, такие как арабский мир. Тем не менее, мир вошел в Европу, и, подобно многовековому римскому миру, новый статус-кво будет нелегко разрушить."
 news.654.a: "Ave, Bardella!"
 news.655.t: "Третья Французское Империя"
 news.655.d: "На измученном континенте вновь затихли пушки, и над пеплом поднялось то же знамя, которое когда-то в течение десятилетия было повсеместно распространено по всей Европе. Вновь Франция Бонапарта провозгласила себя бесспорным чемпионом, разгромив армии Пакта так, что Наполеон I покраснел бы в своей могиле. \n\nБывшее общество Пакта было реорганизовано, чтобы лучше соответствовать новой королевской и имперской позиции Империи, при этом монархи были восстановлены на своих тронах и получили неограниченную власть. Возвращение династии Бонапартов во французское общество произошло в немалой степени благодаря усилиям главы династии Жана-Кристофа Бонапарта, также известного под титулом Наполеона VII. \n\nПока что неясно, какими будут отношения Третьей империи с остальным миром, но его реформы могут дать нам подсказку: французское господство. Наполеон VII уже восстановил старый союз и экономическую систему, созданные Наполеоном I, только теперь нет иностранных держав, которые могли бы бросить вызов этому господству, поскольку все остальные стороны в Европе были либо уничтожены, либо покорны. На данный момент гегемония французской династии станет новой нормой для большей части мира."
 news.655.a: "Vive L'empereur!"
 news.656.t: "Europa Invicta"
 news.656.d: "Идея единой европейской нации не является новой концепцией. От трудов Ричарда Куденхове-Калерги до движений Освальда Мосли и надежд на создание инклюзивной федерации, высказанных умеренными представителями старого порядка. Никто не мог предположить, что европейская нация возникнет в ее нынешнем виде. \n\nКонфликт между Парижем и Берлином закончился капитуляцией последних оставшихся армий Пакта, а также распадом не только их армий, но и государств. Они были поглощены так называемой Европейской гегемонией, возглавляемой и преобразованной Идентитаристской партией и ее лидером, гомосексуальным писателем Рено Камусом, в нечто совершенно новое для континента. Камус был известен еще до войны как главный автор множества теорий заговора, таких как "Великая замена." Европа будет построена и создана для белых людей, и именно на них лежит бремя восстановления своего статуса бесспорных гегемонов человечества. \n\nНеясно, какими будут отношения Гегемонии с международным сообществом, и будут ли они вообще. 12-звездочный флаг ЕС, некогда символ свободы и демократии, теперь будет дегуманизировать мусульман. Над континентом поднялась буря."
 news.656.a: "Европа - нация, нация будет!"
 news.657.t: "Бурбонское Господство"
 news.657.d: "Абсолютистские монархии когда-то были повсеместны во всем мире, но после Французской революции эта система была заменена либеральными демократиями. И только сейчас историческая норма вновь воцарилась в Европе с триумфом дома Бурбонов над армиями Пакта. \n\nФранцузская революция, революция против абсолютизма Бурбонов во Франции, была забыта наряду со знаменитым французским триколором, культурно ассоциирующимся с нацией. Вместо него на смену пришла традиционная лилия. Идея самой Франции также исчезла, так как больше нет необходимости в общей национальной идентичности. Есть только король Людовик XX и II, избранный Богом, чтобы возглавить французов и испанцев. Остальные страны Европы распались. Старые королевства Пруссии, Обеих Сицилий и многие другие возродились из пепла национализма. Династии были восстановлены на троне и получили неограниченную власть над своими королевствами под надзором дома Бурбонов. \n\nИдеи, распространяемые Просвещением, были полностью подавлены под гнетом возрожденного Старого режима. Европейцы будут до конца своих дней трудиться во имя королей, которые защищают их от зла."
 news.657.a: "Un roi, une foi, une loi."
 news.658.t: "Триумф Марокко"
 news.658.d: "В многих городах Марокко разразились спонтанные празднования, поскольку война, которая определяла последние несколько месяцев, наконец подошла к концу с отступлением алжирской армии. Король выступил по телевидению, чтобы объявить об окончании конфликта, поблагодарив солдат армии за "доблестную защиту нашей нации от тех, кто стремился ее уничтожить."\n\nСтраны ЕС обратились к королю с поздравлениями, и многие эксперты полагают, что победа Марокко знаменует начало более активного участия Запада в делах Северной Африки. Между тем в Алжире настроение мрачное, поскольку вспыхнули жестокие беспорядки против правительственных сил. Радикальные исламисты и другие антиправительственные группы вышли на улицы, чтобы выразить свой гнев.\n\nНесмотря на достижение мира, многие по-прежнему опасаются будущего насилия, поскольку ситуация в Алжире с каждым днем все больше приближается к полномасштабной гражданской войне. И пока остается неизвестным, каким будет курс Марокко, ставшего доминирующей силой в Северной Африке."
 news.658.a: "Это начало подъема Марокко? "
 news.659.t: "Алжир Добился Победы"
 news.659.d: "Сегодня столица Алжира, Алжир, празднует окончание войны, которая определила последние несколько месяцев, поскольку она закончилась триумфом. Разгромив марокканские войска, Алжир теперь занял свое место на мировой арене, к большому удовольствию своих друзей в Москве.\n\nМарокко оказалось полностью разрушенным в результате конфликта, будучи вынужденным признать независимость Западной Сахары, региона, над которым оно боролось за контроль в течение многих лет. Уже сейчас антиправительственные демонстранты вышли на улицы, и ожидается, что король выступит на чрезвычайном заседании парламента.\n\nЗахватив приграничные регионы в рамках мирного соглашения, Алжир теперь может доминировать над большей частью Северной Африки. А с учетом уже подписанных соглашений с Россией многие эксперты считают, что это большая победа для России и унизительное поражение для Запада."
 news.659.a: "Итак, их авантюра окупилась."

 news.660.t: "В Северной Африке Подписано Перемирие"
 news.660.d: "После многих месяцев боевых действий, похоже, что война в Магрибе наконец подошла к концу. Обе стороны, которые были вовлечены в жестокие боевые действия, напоминающие окопы ирано-иракской войны, и столкнулись с массовыми беспорядками по всей стране, пришли к соглашению в Женеве, где под эгидой ООН было подписано мирное соглашение.\n\nВ настоящее время регион находится в состоянии разрухи, поскольку граница между Марокко и Алжиром подвергалась обстрелам, бомбардировкам и даже газовым атакам. И правительства Марокко, и Алжира столкнулись с волной протестов, поскольку солдаты возвращаются с фронта с пустыми руками. В связи с тем, что Америка полностью погрузилась в гражданскую войну, ООН приняла решение расширить свое присутствие в Северной Африке после окончания боевых действий с целью оказания помощи и поддержки обеим странам.\n\nНесмотря на то, что мир сейчас достигнут, напряженность сохраняется, поскольку и Марокко, и Алжир потрясены антиправительственными протестами из-за предполагаемых провалов в войне. Будущее Северной Африки неопределенно, но на данный момент мир преобладает."
 news.660.a: "Мир наконец-то возвращается."

 news.661.t: "Левые Побеждают на Выборах в ЕС"
 news.661.d: "В результате, который поразил политических аналитиков и изменил ожидания по всему континенту, левые силы стали крупнейшим блоком в Европейском парламенте после выборов в ЕС, отмеченных экономической неопределенностью, недоверием к институтам и ростом антиэлитарных настроений. Рост популярности был зафиксирован в Южной Европе, некоторых регионах Франции и Германии, а также в нескольких городских центрах, где явка на выборы резко возросла среди молодых избирателей и тех, кто больше всего пострадал от инфляции и мер жесткой экономии.\n\nЛидеры левых сил представили эту победу как отказ от того, что они назвали "десятилетием управляемого упадка," пообещав порвать с фискальной ортодоксией и перейти к государственной собственности, агрессивному перераспределению и строгим ограничениям влияния корпораций. Предвыборные обещания были сосредоточены на контроле над ценами, расширении жилищного строительства, механизмах облегчения долгового бремени и широких инвестициях в общественные услуги, наряду с требованиями более независимой европейской внешней политики и сокращения приоритетов военных расходов..\n\nВыборы выявили глубокие расколы в традиционном политическом ландшафте Европы. Центристские блоки потеряли позиции на фоне обвинений в некомпетентности и отстраненности, а националистические движения, хотя и остаются влиятельными в ряде стран, не смогли объединиться в парламентское большинство. Вместо этого импульс получили партии, обещающие прямое вмешательство в экономику и структурные изменения.\n\nПереговоры о создании коалиции будут сложными. Левые, возможно, и заняли первое место, но для формирования функционального правящего большинства потребуются переговоры с силами, которые по-прежнему скептически относятся к их программе. Тем не менее, результат неоспорим: в Брюсселе сформировался новый политический центр тяжести, и направление европейской политики теперь будет обсуждаться на самом высоком уровне."
 news.661.a: "Европа разрывает со старым порядком."

 news.662.t: "С&Д побеждает на выборах в ЕС"
 news.662.d: "Прогрессивный альянс социалистов и демократов (С&Д) стал крупнейшим блоком в Европейском парламенте после последних выборов в ЕС, обеспечив себе явное лидерство в борьбе, которая была обусловлена инфляцией, нестабильностью в энергетической сфере и растущим недовольством населения в связи с неравенством. Успешные результаты в Испании, Португалии, некоторых регионах Франции, Германии и ключевых промышленных регионах помогли С&Д опередить как либеральный центр, так и консервативные силы.\n\nЛидеры партии интерпретировали этот результат как требование "защиты от жесткой экономии," пообещав уделить особое внимание вопросам заработной платы, социальных инвестиций, государственных услуг и усиления роли Европы в промышленном планировании. В своей предвыборной кампании С&Д делала акцент на снижении давления на стоимость жизни посредством скоординированных действий: реформы энергетического рынка, расширения защиты прав работников и ужесточения контроля за злоупотреблениями со стороны корпораций и финансовыми спекуляциями.\n\nРезультаты голосования также отражают усталость от подхода политического центра к управлению кризисом. Хотя националистические и ультраправые партии добились успехов в нескольких регионах, они не обеспечили себе доминирующего прорыва, который многие предсказывали. Вместо этого социал-демократы выиграли благодаря сочетанию мобилизации избирателей из числа рабочих и избирателей, ищущих более интервенционистскую экономическую модель.\n\nТеперь внимание переключается на переговоры о создании коалиции и борьбу за руководство следующей Комиссией. С&Д, возможно, и выиграла выборы, но для управления Европой по-прежнему потребуются соглашения с другими блоками и хрупкий баланс между финансовой дисциплиной и социальными амбициями. Однако на данный момент Брюссель получил сигнал от избирателей: стабильность будет недостаточна без безопасности, а безопасность будет недостаточна без справедливости."
 news.662.a: "Европа возвращается к социальному вопросу."

 news.663.t: "Зеленые/ЕСА Побеждают на Выборах в ЕС"
 news.663.d: "Одним из самых неожиданных результатов в современной европейской политике стало то, что после выборов альянс Зеленые/ЕСА стал крупнейшей силой в Европейском парламенте, обойдя как либеральный центр, так и традиционные партийные блоки. Такой результат был обусловлен высокими показателями в Германии, Франции, странах Северной Европы, Нидерландах и Нидерландах, а также в крупных городских регионах Южной Европы, где явка избирателей среди молодежи и избирателей, заинтересованных в вопросах климата, резко возросла.\n\nЛидеры партии Зеленые/ЕСА представили эту победу как мандат на проведение структурных изменений во всем Союзе. Их предвыборная кампания, в которой доминировали темы энергетической незащищенности, роста цен и опасений по поводу долгосрочного экологического коллапса, обещала агрессивную декарбонизацию, быструю модернизацию энергосетей, финансирование промышленного перехода и более жесткое регулирование крупных корпораций. Они также призвали к более независимой европейской внешней политике и более тесной координации в области стратегических ресурсов.\n\nРезультат отражает ситуацию на континенте, который все больше формируется под влиянием кризисной политики. Хотя правые и националистические силы добились успехов в нескольких регионах, им не удалось объединиться в единое парламентское большинство. Вместо этого, зеленые партии выиграли от фрагментации в центре и растущего убеждения, что "обычный ход дел" уже не актуален.\n\nПереговоры о создании коалиции начинаются немедленно, и теперь вопрос заключается в том, смогут ли зеленые превратить избирательный импульс в власть. Завоевать места в парламенте - это одно. Перестроить экономическую модель Европы, обеспечить стабильность энергоснабжения и удержать Союз под давлением - это совсем другое."
 news.663.a: "Климатическая повестка выходит на первый план."

 news.664.t: "Обновление Побеждает на Выборах в ЕС"
 news.664.d: "Вопреки ожиданиям о фрагментации и росте экстремистских сил, либерально-центристский блок Обновляя Европу стал крупнейшей силой в Европейском парламенте после напряженной и пристально наблюдаемой избирательной ночи. Первоначальные прогнозы были неопределенными, но окончательные подсчеты голосов подтвердили небольшое преимущество партии Обновляя Европу, обусловленное высокими результатами во Франции, Бенилюксе, некоторых регионах Германии и ключевых городских округах Южной Европы.\n\nЛидеры Обновления охарактеризовали этот результат как мандат на стабильность и реформы на континенте, который испытывает экономическое давление, проблемы с безопасностью и институциональную усталость. В своих заявлениях о победе блок пообещал возобновить инвестиции в европейскую промышленность, усилить координацию в области обороны и углубить интеграцию в тех областях, где национальные правительства затрудняются действовать в одиночку. Послание было ясным: Европа не может позволить себе паралич в условиях усугубляющегося кризиса.\n\nРезультат также отражает сдвиг в политических позициях. Традиционные партии удержали свои позиции в некоторых регионах, но продолжили терять влияние в других, в то время как антисистемные движения не смогли объединиться в единую парламентскую силу. Преимущество партии Обновляя Европу было обусловлено не только волной энтузиазма, но и дисциплинированной явкой проевропейских избирателей, которые рассматривали выборы как референдум о том, сохранится ли единство Союза.\n\nСейчас начинаются переговоры по формированию коалиции, контролю над комитетами и выбору следующего руководства Комиссии. Партия Обновляя Европу может и получила большинство мест, но для управления парламентом по-прежнему потребуются альянсы и компромиссы. Для Брюсселя этот результат дает возможность выдохнуть. Станет ли это импульсом для дальнейших действий - другой вопрос."
 news.664.a: "Центр пока держится."

 news.665.t: "ЕНП Побеждает на Выборах в ЕС"
 news.665.d: "Европейская Народная Партия (ЕНП) стала крупнейшим блоком в Европейском парламенте после выборов в ЕС, которые прошли под знаком опасений по поводу войны, экономической нестабильности и растущих требований порядка и предсказуемости. Успешные результаты в Центральной Европе, некоторых регионах Германии, Австрии и нескольких северных и восточных государствах-членах обеспечили ЕНП явное преимущество над либеральными и левыми соперниками.\n\nЛидеры ЕНП представили этот результат как мандат на стабильность, финансовую дисциплину и институциональный авторитет в то время, когда Европа сталкивается с одновременными внешними угрозами и внутренними напряжениями. Их кампания была сосредоточена на готовности к обороне, управлении границами, конкурентоспособности промышленности и энергетической безопасности, аргументируя это тем, что Европа не может позволить себе фрагментацию в условиях ухудшения глобальной ситуации.\n\nВыборы также продемонстрировали сдвиг в балансе сил внутри правого лагеря. В то время как националистические партии продолжали набирать поддержку в нескольких странах, ЕНП сумела позиционировать себя в качестве доминирующей "ответственной" силы, воспользовавшись стремлением избирателей к более жесткому управлению без полного отказа от европейского проекта.\n\nТеперь внимание обращается к переговорам о создании коалиции и формированию следующей Комиссии. ЕНП, возможно, и завоевала большинство мест, но для управления потребуются соглашения между раздробленными фракциями в парламенте, где уже возникают споры по поводу бюджетных правил, миграционной политики и темпов экономического вмешательства. Однако на данный момент Брюссель вернулся в привычные руки."
 news.665.a: "Истеблишмент восстанавливает контроль."

 news.666.t: "ЕКР Побеждает на Выборах в ЕС"
 news.666.d: "В результате серьезного сдвига в европейском политическом балансе Европейские Консерваторы и Реформаторы (ЕКР) стали крупнейшим блоком в Европейском парламенте после выборов, которые прошли под знаком опасений по поводу безопасности, экономического разочарования и растущей негативной реакции на Брюссель. Высокие результаты в Польше, Италии, некоторых странах Центральной Европы и нескольких консервативно настроенных государствах-членах позволили ЕКР опередить как традиционные правоцентристские, так и левые и либеральные коалиции.\n\nЛидеры ЕКР охарактеризовали этот результат как восстание против того, что они назвали "бесконтрольной централизацией," пообещав вернуть власть национальным правительствам, сохранив при этом Союз в качестве стратегического альянса, а не интегрированного политического проекта. В своей платформе они сделали акцент на охране границ, национальном контроле над миграционной политикой, снижении регуляторной нагрузки и более жестком подходе к внутренним разногласиям и внешним угрозам.\n\nГолосование выявило раскол в Европе. Центристские блоки потеряли позиции на фоне обвинений в слабости и бюрократическом дрейфе, в то время как левые партии с трудом пытались объединиться в условиях растущего давления со стороны роста стоимости жизни. ЕКР извлекла выгоду из этого коллапса доверия, представив себя как единственную альтернативу, способную восстановить порядок без полного развала ЕС.\n\nПереговоры о создании коалиции начинаются в парламенте, который сейчас более раздроблен, чем когда-либо в новейшей истории. Победу на выборах одержала ЕКР, но для того, чтобы превратить победу в эффективное лидерство, ей придется лавировать между враждебными блоками и конкурирующими национальными приоритетами. Тем не менее, сигнал от избирателей ясен: Брюссель больше не будет управлять так, как раньше."
 news.666.a: "Европа смещается вправо."

 news.667.t: "Подписано Соглашение ЕС-МЕРКОСУР"
 news.667.d: "Торговое соглашение между ЕС и МЕРКОСУР было официально подписано, став одним из крупнейших торговых соглашений, заключенных Европой за последние десятилетия. После многих лет затянувшихся переговоров, политических поворотов и неоднократных возражений со стороны государств-членов, окончательные подписи были поставлены в Брюсселе в атмосфере большого дипломатического шума и при строгих мерах безопасности.\n\nДля Брюсселя эта сделка представляется стратегической экономической победой. Европейские промышленные группы активно продвигали это соглашение, утверждая, что европейские экспортеры больше не могут позволить себе закрытые рынки в мире, где торговля становится все более политизированной. Ожидается, что снижение тарифов и упрощение правил упростят доступ европейских автомобилей, машин, химикатов и промышленных услуг на рынки Южной Америки, а также укрепят позиции Союза в регионе, за который давно борются внешние силы.\n\nОднако соглашение вызвало резкую реакцию в отечественной политике. Сельскохозяйственные ассоциации немедленно осудили сделку, предупредив, что более дешевый импорт сельскохозяйственной продукции в первую очередь ударит по европейским производителям, особенно в условиях и без того неустойчивой экономики сельских районов. Экологические группы отреагировали с не меньшей яростью, обвинив ЕС в том, что он жертвует принципами защиты климата ради коммерческой выгоды. В нескольких столицах уже начинаются протесты, судебные иски и давление со стороны парламента\n\nЕвропейская комиссия настаивает на том, что соглашение включает в себя меры защиты и механизмы обеспечения его соблюдения, но мало кто ожидает, что негативная реакция быстро утихнет. Соглашение подписано, рынки открываются, и теперь начнут проявляться как экономические, так и политические последствия."
 news.667.a: "Торговля всегда имеет свою цену."

 news.1918.t: "Империя Наносит Ответный Удар!"
 news.1918.d: "Сегодня по телевидению к жителям Германии обратился эксцентричный немецкий монархист Генрих Ройс. После кровавого переворота, совершенного в Берлине фанатичными имперскими реставраторами, новый немецкий лидер осудил предыдущее правительство как шайку крипто-славянских глобалистов и объявил о восстановлении старой Германской империи и введении военного положения. \n\nНесмотря на то, что националистическое немецкое государство считало Рейхсбюргерское движение фригидным, его популярность возросла после унизительного поражения немецких войск против Советского Союза и последующей националистической революции, совершенной таинственным Редельсфюрером, со свержением предыдущей Хунты и назначением Ройса самопровозглашенным регентом Германской империи, что вызвало международное осуждение со стороны мирового сообщества. Хотя националистическое немецкое государство считало движение рейхсбюргерским, его популярность возросла после унизительного поражения немецких войск от Советского Союза и последующей националистической революции, совершенной таинственным рейхсфюрером, со свержением предыдущей хунты и назначением Ройса самопровозглашенным регентом Германской империи, что вызвало международное осуждение мирового сообщества. \nГенрих ясно дал понять, что намерен восстановить границы Германии до ее дореспубликанских размеров, и пообещал победить врагов империи под своим "божественным и провиденциальным" правлением. \n\nМир с отчаянием ждет, как далеко зайдет безумный регент, чтобы восстановить свою любимую империю, и каким мрачным станет будущее немецкой нации, если ему это удастся." 
 news.1918.a: "Немецкий народ ждет лишь забвение..."
 

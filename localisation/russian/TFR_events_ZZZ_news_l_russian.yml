 news.1922.t: "Антон Алиханов Избран Президентом России"
 news.1922.d: "Антон Алиханов, известный своими националистическими взглядами, неожиданно одержал победу на последних президентских выборах, удивив как местных, так и зарубежных наблюдателей. Его успех символизирует значительные изменения, поскольку Алиханов и его партия "Державная Россия" долго противостояли идеи "суверенной демократии". Их идеология резко отличается от других политических течений.\n\nИз-за многочисленных проблем в системе, и недовольство текущим положением дел и слабые кампании соперников, Алиханов сумел привлечь значительную часть российского электората.\nРанее Алиханов был исключен из "Единой России" из-за своей решительной оппозиции либеральным реформам президента Медведева. Он примкнул к радикальным правым силам, возглавив "Державную Россию". Со временем он взял партию под свой контроль и установил свою политическую доктрину - "Державизм". Эта идеология категорически антидемократична и антипрогрессивна.\n\nСейчас многие задумываются о будущем России, так как Алиханов стремится подорвать демократические основы страны. Он открыто заявляет о ненависти к предполагаемым врагам внутри и за пределами России. В Кремле, кажется, сгущаются тучи, предвещающие серьезные изменения."
 news.1922.a: "Буря в системе."
 news.1923.t: "Новое Русское Государство"
 news.1923.d: "Когда Алиханов пришел к власти, было ясно, что он намерен перестроить федеральную систему и заменить ее централизованным авторитарным режимом. Вопрос был только в том, как и когда.\n\nТеперь это очевидно. Федерации больше нет. В своей последней речи Алиханов объявил, что старые институты преобразуются в новое российское государство. На массовом митинге в Кремле развевались сотни флагов имперских националистов. Лидеры партии Державников призвали своих сторонников принять новую форму правления.\n\nАлиханов, которого теперь официально называют "Верховным лидером", выступил последним. Он выступил с угрозами в адрес как внешних, так и внутренних врагов, заявив, что Россия должна готовиться к предстоящей великой борьбе. На словах он поддерживал идею многополярности - подчеркивал необходимость защиты образа жизни всех народов.\n\nЕго политические оппоненты, хотя и были рассеяны, но все же готовы продолжать борьбу, а оппозиционные СМИ осудили очередное падение диктаторского режима."
 news.1923.a: "Тревожно."
 
  
 news.1924.t: "Гражданский Конфликт В России!"
 news.1924.d: "Новости из России сообщают о крупном восстании против правительства державников. В Санкт-Петербурге, центре восстания, социалисты и коммунисты объединили свои силы против Алиханова.\n\nНесмотря на скептицизм по поводу успеха восстания, такое развитие событий подрывает стабильность государства и ставит под сомнение популярность Алиханова. В Санкт-Петербурге уже много месяцев действует особый комендантский час, и это считается одной из причин восстания.\n\nРоссийские военные предпочли оставаться в своих казармах, воздерживаясь от участия в конфликте, чтобы предотвратить дальнейшее кровопролитие. Обе стороны должны полагаться на свои ополчения и батальоны желтой гвардии, силы, руководствующиеся идеологией.\n\nНад Россией нависла мрачная тень, поскольку исход конфликта лишь посеет еще большую нестабильность в регионе, будь то в результате социалистической революции или расширения террористической машины державников."
 news.1924.a: "Тревожно." 
 news.1925.t: "Гражданский Конфликт В России!"
 news.1925.d: "Новости из России сообщают о крупной попытке военного переворота против правительства державника. На Кубани, в эпицентре восстания, военные офицеры и демократические лидеры объединились против Алиханова.\n\nСкептики сомневались в перспективах восстания, но такое развитие событий пошатнуло основы государства и поставило под сомнение авторитет Алиханова. Кубань, вероятно, была выбрана в качестве штаб-квартиры для переворота, потому что там было мало сторонников режима, а население в целом аполитично.\n\nБольшинство российских военнослужащих оставались в своих казармах, придерживаясь нейтралитета и избегая конфликта, чтобы предотвратить дальнейшее кровопролитие. Обе стороны должны полагаться на свои вооруженные силы, батальоны желтой гвардии и другие группировки, подпитываемые идеологией.\n\nНад Россией нависла тень неопределенности, поскольку разрешение конфликта только усугубит нестабильность в регионе, будь то из-за хрупкой демократии или распространения террористического аппарата державников."
 news.1925.a: "Тревожно."
 
 news.1926.t: "Восстановление Демократии в России"
 news.1926.d: "В докладе из Москвы ясно сказано: диктатура державников пала. Ее лидеры бежали после мощных атак и дерзких операций мятежных военных.\n\nНа улицах граждане России радуются падению тирании. Но у непростого альянса демократов и либералов нет четких планов на будущее после свержения диктатуры. Им еще предстоит договориться о том, кто возглавит переходный период, о котором было объявлено сразу после освобождения Москвы. Многие стремятся переосмыслить концепцию суверенной демократии.\n\nНа фронте повстанцев теперь остаются низшие чины державников, фанатичные фашисты, которые отказываются сдаваться. Они сеют панику и беспорядки в небольших регионах, где власть остается непрочной.\n\nВоенные оказали поддержку новому правительству и уже устранили элементы державистов, которые были навязаны предыдущим президентом.\n\nНесмотря на трудности, Россия, наконец, вступила в новую эру после длительного периода криптофашистского правления."
 news.1926.a: "Давайте надеяться на лучшее." 
 news.1927.t: "Русская Социалистическая Революция"
 news.1927.d: "Новости из Москвы: Режим державников пал. Его лидеры, включая Алиханова, бежали после ожесточенного нападения красных ополченцев во время восстания в Санкт-Петербурге.\n\nУлицы Москвы наполнены ликованием, поскольку граждане празднуют окончание тирании. Однако левая коалиция сохраняет настороженность. Сергей Удальцов, известный своей многолетней и целеустремленной деятельностью, выделяется как ключевая фигура в новом правительстве. Его всеобщее уважение делает его наиболее популярным кандидатом на пост главы России в ближайшие дни. Однако его сдержанный социализм может привести к тому, что в будущем Россия может пойти разными путями, и не все могут быть счастливы.\n\nНа фронте повстанцев теперь находятся низшие чины "державника", ярые фашисты, которые отказываются уступать. Они сеют панику и беспорядки в нестабильных регионах, где их влияние остается слабым. Военные оказали поддержку новому правительству и уже провели чистку от силовиков, навязанных предыдущим президентом.\n\nРоссия вступила в новую эру, положив конец длительному периоду фашистского гнета."
 news.1927.a: "Возвращение октября."
 news.1928.t: "Алиханов Побеждает Повстанцев"
 news.1928.d: "Исход битвы внутри России очевиден: Алиханов одерживает победу, несмотря ни на что. Повстанцы потерпели сокрушительное поражение под безжалостным натиском державников.\n\nНа улицах прошли митинги, организованные правительством и поддерживаемыми государством группами, которые праздновали победу над теми, кого они считали бессердечными предателями.\n\nАлиханов сам вышел на телеэкран и подробно рассказал о ситуации. Он заявил, что предатели восстали из-за чрезмерно гуманистической натуры режима и что эта слабость толерантности должна быть искоренена по всей России.\n\nЭто событие ознаменовало начало масштабной кампании террора против тех, кто выступал против государства и имел связи с повстанческими группировками. "
 news.1928.a: "Избит, но не побеждён."
 
 news.1929.t: "Россия Атакует Европу!"
 news.1929.d: "Геополитическая ситуация вдоль российско-европейской границы резко ухудшилась, что привело к началу военных действий. Агрессивные действия России широко рассматриваются как причина этих столкновений.\n\nРоссийское правительство утверждает, что его действия носят оборонительный характер и являются превентивным ударом против того, что оно воспринимает как непосредственную угрозу. Напротив, европейские лидеры осуждают наступление России как явное проявление империалистических амбиций.\n\nНезависимо от различных точек зрения, нельзя отрицать, что этот конфликт вернул войну в Европу. Тысячи солдат мобилизуются, готовясь к длительной и кровопролитной борьбе. Россия, движимая сильным национализмом, наращивает свою военную мощь, в то время как Европа развертывает свои элитные войска.\n\nЭто та война, которая определит судьбу Европы."
 news.1929.a: "Последняя война..."
  
 news.1000.t: "Президент Надеждин Отстранен"
 news.1000.d: "Надежда в России угасла, когда Борис Надеждин, неожиданный преемник Дмитрия Медведева, встретил сопротивление со стороны авторитаристов и консерваторов из ОНФ. Это противостояние в конечном итоге привело к его отстранению с президентского поста.\n\nНа смену Надеждину пришел Евгений Федоров, самый ярый его критик и лидер Национально-освободительного движения. Эта организация, хоть и маргинальная, но шумная, стала голосом реакционной оппозиции реформам Надеждина.\nФедоров, выступая с напыщенной и конспирологической риторикой, утверждал, что Надеждин - инструмент все еще доминирующего в России либерального глобалистского "глубинного государства". По его словам, агенты этого государства убедили уставшего от войны Медведева выбрать Надеждина преемником, чтобы разрушить победоносную Россию изнутри, оставив её слабой и неподготовленной для возрождения глобализма.\nОн умело мобилизовал сельские и наивные массы своими смелыми заявлениями и лозунгами, используя НОД как инструмент. Тем временем более изощренная оппозиция внутри ОНФ изображала его как борца за стабильность и порядок в стране.\n\nКогда Надеждин допустил ошибку, перегнув палку, ОНФ быстро отстранил его от должности. Несмотря на некоторое сопротивление его сторонников в Думе и на улицах, лоялистские массы и полиция быстро подавили антиправительственные настроения."
 news.1000.a: "Империя наносит ответный удар!"
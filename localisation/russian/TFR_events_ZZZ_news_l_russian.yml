 news.165.b: "Наша судьба исполнена."
 news.166.t: "Великая Социалистическая Народная Арабская Джамахирия провозглашена"
 news.166.d: "В заявлении, насыщенном символизмом и явно адресованном всему арабскому миру, Саиф аль-Ислам Каддафи объявил о создании Великой Социалистической Народной Арабской Джамахирии, провозгласив конец раздробленной постколониальной эпохи Магриба и представив свое движение как возрождение революционного государства. Выступая перед толпой сторонников и вооруженных лоялистов в Сирте, он охарактеризовал новую Джамахирию как возвращение к "национальному достоинству, арабскому единству и народной власти," пообещав, что Магриб больше никогда не будет управляться коррумпированными правителями, поддерживаемыми иностранными державами элитами или военачальниками.\n\nЭто заявление последовало за успешным расширением власти Ливии на территории Магриба, которое силы Саифа аль-Ислама описывают как освободительную борьбу, а не завоевание. В государственных трансляциях над административными зданиями, военными базами и пограничными переходами появились новые зеленые флаги, сопровождаемые речами, напоминающими о старой революционной эпохе и ее обещаниях независимости от западного влияния. Официальные лица заявляют, что Джамахирия заменит политику переговоров "прямой народной легитимностью," восстановив общество с помощью централизованной сети безопасности, государственного развития и идеологической мобилизации.\n\nРеакция в регионе была незамедлительной и неоднозначной. Сторонники приветствуют Саифа аль-Ислама как единственную фигуру, способную восстановить порядок и продемонстрировать силу за пределами Магриба, в то время как противники осуждают это заявление как возрождение диктатуры под лозунгами революции. Сообщения о чистках, принудительной реорганизации местных органов власти и быстрой консолидации СМИ и структур безопасности свидетельствуют о том, что новый режим стремится как можно скорее устранить любую возможность раскола.\n\nДля Саифа аль-Ислама послание простое: Магриб теперь является центром нового политического проекта, который нацелен на перестройку Северной Африки по его собственному образу и подобию."
 news.166.a: "Зеленое знамя снова поднимается."
 news.167.t: "Американский Калигула"
 news.167.d: "Сегодня со всего североамериканского континента пришли шокирующие сообщения. В разрозненных сообщениях и рассказах беглых беженцев говорится, что [FROM.GetName], бывший Союз Америки, уничтожил все остальные враждующие фракции на территории бывших Соединенных Штатов. Лидер Союза, Джозеф Байден, не делал никаких международных заявлений по этому поводу, поскольку его статус в стране и на мировой арене до сих пор остается загадочным.\n\nО самом государстве также трудно собрать информацию. С момента ребрендинга Союза весь интернет, внешние связи и социальные сети были практически отрезаны изнутри. Единственный источник информации, который можно получить, - это вышеупомянутые беженцы, которые бежали, прежде чем режим успел их поймать. Беженцы рассказывают о массовых исчезновениях, постоянной слежке и некоторых историях об уголовном рабстве. Хотя утверждения могут показаться необоснованными, тревожные снимки со спутников показывают, как исчезают целые города, причем не только машины или люди, но и здания. Большая часть этих снимков сделана с бывших территорий, находившихся под контролем Дональда Дж. Трампа, который бежал после поражения своего правительства.\n\nМеждународная реакция на сложившуюся ситуацию была малоинформативной, поскольку страны еще не решили, как они будут реагировать и какими могут быть их дальнейшие отношения с новой Америкой. Однако некоторые гуманитарные организации заявляют о геноциде со стороны нового правительства, призывая к немедленному вмешательству в ситуацию. Однако даже если эти заявления правдивы, режим в Вашингтоне имеет доступ к одному из самых мощных видов оружия на Земле, и вмешательство может побудить его применить это оружие. Таким образом, многие в мире могут лишь с дискомфортом наблюдать за тем, как Америка перерождается в нечто кошмарное."
 news.167.a: "Vindicta solus optio."
 news.168.t: "Американские Якобинцы Воссоединяют Америку"
 news.168.d: "Сегодня тысячи людей маршируют по улицам Америки, возвещая наступление новой эры. Американские якобинцы одержали победу над соперничающими группировками в АНОА, освободив нацию от всех форм угнетения, будь то со стороны консервативного промышленного капитала или либеральных технократов. Американские и красные флаги теперь украшают все мыслимые уголки государственных зданий, а Вашингтон, округ Колумбия, находится в центре празднования. Здесь Калеб Мопин, лидер якобинцев, произнес страстную речь после официального объявления об окончании гражданской войны. Огромные толпы собрались, чтобы услышать его слова.\n\n"Дорогие американцы, граждане всего мира... Товарищи", - вступительные слова Калеба воспламенили толпу. Завершая свою речь, он поднял руки, держа маленькую красную книжечку Мао в правой руке и Священное Писание в левой. Он с убежденностью провозгласил: "Я знаю, откуда я пришел, и я знаю, куда я иду! ВЫ СО МНОЙ?" Толпа разразилась радостными криками, их бурные аплодисменты заглушили последующие заявления Мопена. К лучшему это или к худшему, но Америка возродилась."
 news.168.a: "Аллилуйя!"
 news.169.t: "[ATW.GetName] Запускают \"Великий арийский крестовый поход\" Против ООН"
 news.169.d: "[ATW.GetName] объявили, что мир непригоден для сохранения арийского народа и должен быть разрушен и построен заново по их совершенному образу и подобию. ООН объявила о полномасштабной атаке на [ATW.getName], чтобы остановить эти планы!"
 news.169.a: "Да Поможет Нам Всем Бог..."
 news.170.t: "Образование Восточноафриканской федерации"
 news.170.d: "Лидеры шести восточноафриканских государств подписали в четверг историческое соглашение, официально сформировав Восточноафриканскую Федерацию в рамках знаменательного события, направленного на содействие региональной интеграции и экономическому росту. Церемония подписания состоялась в Найроби, Кения, в присутствии региональных и международных высокопоставленных лиц.\n\nВосточный экономический союз, в который входят Кения, Танзания, Уганда, Руанда, Бурунди и Южный Судан, обладает потенциалом стать одним из крупнейших и наиболее влиятельных экономических блоков Африки. Совокупное население федерации, составляющее более 170 миллионов человек, наряду с ее богатыми природными ресурсами, предоставляет уникальную возможность для роста и развития региона. Члены-основатели ВАФ обязались работать сообща для решения общих проблем, таких как бедность, политическая нестабильность и изменение климата. Кроме того, они взяли на себя обязательство содействовать региональной торговле, развитию инфраструктуры и свободному перемещению товаров, услуг и людей через свои границы."
 news.170.a: "Хорошо для них."
 news.171.t: "Эфиопия мобилизуется против Египта"
 news.171.d: "В свете продолжающегося Нильского кризиса, права на использование реки Нил дошли до точки кипения, поскольку Египет увеличил свои резервы, а Эфиопия начала мобилизацию в ответ.\n\nРека Нил уже давно является жизненной силой северо-восточной Африки, особенно Египта, город Каир, мегаполис размером около 25 миллионов человек, является его главной зависимостью, поскольку древняя река протекает прямо через него. То немногое, что есть в Египте, находится на пути этой жизненно важной реки.\n\n С мобилизацией Эфиопии вооруженный конфликт все больше и больше кажется единственным решением в борьбе за права на реку Нил. Соседние страны, такие как Эфиопия и Судан, уже начали выбирать сторону на фоне растущей напряженности между Египтом и Эфиопией из-за Нила."
 news.171.a: "Нил горит..."
 news.172.t: "Бирманский военный переворот"
 news.172.d: "Разрозненные сообщения о военных действиях по всему Союзу Мьянмы наконец-то подтвердились. Вооруженные силы Мьянмы выступили с официальным заявлением, в котором заверили мир в свержении бывшего гражданского правительства страны и введении в стране военного положения.\n\nЗахват власти вызвал широкую международную реакцию из-за того, что многие державы считают шатким оправданием переворота. Недавние выборы в стране обеспечили убедительную победу бывшему главе государства Су Чжи и ее прокитайской партии "Национальная лига за демократию", что новый фактический глава государства Мин Аунг Хлайнг и вооруженные силы Мьянмы назвали "сфальсифицированными выборами". Су Чжи была помещена под арест в условиях хаоса и ожидает скорого судебного разбирательства в военном трибунале.\n\nПротесты вспыхнули по всей стране в ответ на то, что для многих является простым захватом власти сбежавшими вооруженными силами. Сторонники переворота называют это простым шумом, вызванным платными нарушителями спокойствия. Некоторые указывают на то, что иностранные державы несут ответственность за действия любой из сторон, хотя пока и без каких-либо существенных доказательств.\n\nМеждународное сообщество, хотя и придает много значения ситуации, мало что имеет в виду с точки зрения действий против нынешнего положения дел - и, похоже, ничто не мешает генералу Хлайнгу и вооруженным силам завершить консолидацию власти. Все, на что остается ответить - на чью сторону встанет хунта на мировой арене?"
 news.172.a: "Посмотрим, как все пойдет."
 news.173.t: "Массовый всплеск Ковид-19 в Индии"
 news.173.d: ""
 news.173.a: "Да поможет Бог народу Индии..."
 news.174.t: "КРН одержало победу в Восточной Африке"
 news.174.d: "За последние несколько месяцев Нильская война стала последней кровавой битвой в Африке за новый дефицитный ресурс. Водой. Коалиция за реку Нил (КРН), состоящая из оппозиции Эфиопии и тех, кто действительно зависит от реки Нил, после затяжного конфликта одержала победу в борьбе за реку Нил. \n\nПосле того как войска КРН успешно вторглись на территорию Эфиопии, угрожая перебить ее войска и двинуться на Дар-эс-Салам, Восточно-Африканский пакт капитулирует, разрушенная во время войны плотина на Ниле не будет восстановлена, и, похоже, Нил снова будет течь своим нормальным руслом, постепенно прекращая засуху в Египте и обеспечивая водную безопасность для следующего поколения. \n\nКроме того, КРН предоставит независимость Тиграю, официально распустит недолговечную Восточноафриканскую федерацию и позволит сомалийским войскам вновь занять отделившееся государство Сомалиленд, серьезно ослабив Эфиопию и ее бывших союзников."
 news.174.a: "Недолговечный эксперимент..."
 news.175.t: "Эфиопия одержала победу в Восточной Африке"
 news.175.d: "За последние несколько месяцев Нильская война стала последней кровавой битвой в Африке за новый дефицитный ресурс. Водой. Восточно-Африканский пакт (ВАП), состоящий из эфиопских союзников и региональных бенефициаров, выиграл битву за реку Нил, обеспечив плотину на многие поколения вперед в качестве источника чистой и надежной энергии и установив новую региональную гегемонию в Восточной Африке.\n\nПосле того как войска ВАП успешно вошли на территорию Судани и начали продвигаться на юг Египта, а Каир оказался под угрозой, КРН пришлось признать поражение. Надежды на свободное течение Нила рухнули, и Египет будет вынужден принять импорт воды как единственную альтернативу засухе. После капитуляции КРН Южный Судан был официально принят в ЕАФ, а Сомали и Эритрея были вынуждены уступить требованиям Эфиопии. \n\nПо мере того, как засуха продолжает усугубляться за пределами плотины Ренессанса, нестабильность охватывает побежденную страну Египет."
 news.175.a: "По крайней мере, все кончено..."
 news.179.t: "Суэцкий канал Перекрыт"
 news.179.d: "КАИР (BLOOMBERG) - Суда в Суэцком канале были перенаправлены в более старый канал в среду (24 марта) после того, как большой контейнеровоз сел на мель, заблокировав проход судов по одному из самых важных водных путей в мире, сообщили морские источники и вовлеченные компании. По данным судовых брокеров и картографических данных, собранных Bloomberg, корпус 400-метрового контейнеровоза "Эвертон" во вторник застрял поперек канала, что привело к скоплению по меньшей мере 100 судов, пытающихся пройти транзитом между Красным морем и Средиземным морем.\nЦены на нефть в среду колебались, так как инвесторы оценивали влияние на мировые потоки сырой нефти.\nФрахтователи или владельцы судов, которые не желают ждать устранения блокировки, могут выбрать плавание вокруг Южной Африки, хотя это гораздо более длительный маршрут, который займет больше времени и увеличит затраты."
 news.179.a: "Большая Лодка Застряла, Лол"
 news.180.t: "В Саудовской Аравии восстановлена монархия"
 news.180.d: ""
 news.180.a: "Интересно"
 news.181.t: "Французские Генералы Устраивают Переворот"
 news.181.d: "Ужасные новости, приходят из Франции, - попытка государственного переворота, предпринятая французскими военными, повергла страну в смятение! Как и во многих других западноевропейских странах, недавнее поражение в войне с Россией вызвало большой резонанс во французском обществе и политике. Французские военные, всегда стремившиеся сохранить свою роль в правительстве и обществе, совершили немыслимое. Группа высокопоставленных офицеров французских вооруженных сил и разведывательных служб отправилась в Париж и другие крупные города. Эти офицеры публично заявляют, что они здесь для того, чтобы "устранить преступно некомпетентных политиков, которые предали национальные интересы Франции". Однако, похоже, что попытка захвата власти этой группой офицеров была встречена с большой враждебностью и возмущением как среди общественности, так и даже среди военных. Начались крупные общественные протесты, в ходе которых клика офицеров осудила попытку захвата власти, а лидеры крупных политических партий аналогичным образом осудили офицеров. Самое интересное, что большой контингент офицеров и солдат объединился, чтобы противостоять заговорщикам и оказать сопротивление путчу. Многие высокопоставленные французские военные, не участвовавшие в попытке государственного переворота, вышли на улицы и заявили, что они остановят "незаконный и опасный" захват власти заговорщиками. Аналитики как во Франции, так и за рубежом сомневаются в том, что заговорщики в конечном итоге добьются успеха, и предупреждают, что интриги и другие гнусности будут продолжаться, если не будут предприняты эффективные действия по стабилизации ситуации. Несмотря на то, что многие политики во Франции призывают к спокойствию, хаос, царящий во французском обществе, похоже, только усиливается..."
 news.181.a: "Интересно"
 news.182.t: "Мощный взрыв в Бейруте"
 news.182.d: "Порт Бейрута сегодня охвачен адским пламенем после того, как склад, заполненный нитратом аммония, внезапно воспламенился и взорвался, что привело к детонации, которая уничтожила весь порт Бейрута и прилегающие городские кварталы, в результате чего погибло более 218 человек, тысячи получили ранения и сотни тысяч остались без крова, поскольку ущерб распространился на большую часть бейрутского порта. А также инфраструктура Бейрута. Ливанское правительство продолжило объявлять двухнедельное чрезвычайное положение в ответ на стихийное бедствие, поскольку немедленно вспыхнули протесты по поводу очевидной неспособности правительства предотвратить такую катастрофу в первую очередь."
 news.182.a: "О, человечество!"
 news.183.t: "Алжиро-марокканская война"
 news.183.d: "Алжирская Народная Демократическая Республика редко выступала за принципиальный республиканизм или антимонархизм. Теперь все изменилось: годы дипломатических неурядиц, пограничных конфликтов и обвинений в укрывательстве повстанцев наконец-то вылились в открытый конфликт, когда Алжир и Марокко сражаются за судьбу Магриба.\n\nВ Telegram и других социальных сетях уже повсеместно появляются сообщения о том, что различные приграничные города переходят из рук в руки. В обеих странах отключают электричество, а дороги забиты беженцами. Актуальность вопроса о беженцах в Европейском союзе вновь подтверждается, поскольку лодки, полные новых мигрантов, движутся на север. Похоже, ни один регион мира не может избежать войны."
 news.183.a: "Магриб Горит"
 news.184.t: "Тупиковая ситуация в Восточной Африке"
 news.184.d: "После 13 месяцев жестоких боев, широкомасштабных разрушений и обостряющегося гуманитарного кризиса орудия по всей Восточной Африке замолчали. Третья африканская война, которая началась год назад после завершения строительства грандиозной плотины "Эфиопское возрождение" и отчаянных попыток Египта обеспечить доступ к воде, закончилась разочаровывающим тупиком для обеих сторон.\n\nЛидеры Восточноафриканского пакта и Коалиции стран реки Нил встретились вчера в Порт-Луи, Маврикий, и договорились о прекращении огня при посредничестве Африканского союза. Потери в этой войне огромны: сотни тысяч беженцев, города, пострадавшие от бомбардировок, и разрушенная инфраструктура. Но поскольку обе стороны сейчас устали и ни одна из них не в состоянии нанести сокрушительный удар, остается только компромисс. Результатом соглашения в Порт-Луи стало официальное признание сторонами Сомалиленда и создание независимой Республики туарегов в эфиопских регионах Туарег и Амхара. Никаких дополнительных изменений, кроме этих, внесено не было, и главный спор об использовании реки Нил остается нерешенным.\n\nЭти события вызвали волнения по всей Восточной Африке, но нигде они не были более опасными, чем в Египте, где гнев по поводу безрезультатного завершения войны и обострения внутреннего дефицита начал нарастать. Беспорядки вспыхнули в нескольких крупных городах, а власть  президента Египта ослабевает, слухи о восстании становятся громче с каждым днем. Война закончилась, но кризис в Восточной Африке далек от разрешения."
 news.184.a: "Казалось бы, все напрасно..."
 news.186.t: "Анархия в Ираке!"
 news.186.d: ""
 news.186.a: "Интересно"
 news.187.t: "Военный переворот в Германии"
 news.187.d: "Тревожные новости, поступают сегодня из Германии, поскольку немецкий бундесвер и службы безопасности, по-видимому, совершили государственный переворот и свергли гражданское правительство Германии! Трагедия уже обрушилась на Германию в последнее время, поскольку поражение от недавно реформированного СССР повергло как немецкий военный, так и политический истеблишмент в поразительное смятение. Общественность и многие политические организации возмущены неспособностью Германии победить РСФСР, но эти новые события превосходят все, что было до этого. Высшие офицеры армии, военно-воздушных сил и военно-морского флота, поддерживаемые отборными пехотными подразделениями и оперативниками спецназа КССН, объявили, что они "обеспечивают соблюдение правовых, моральных и конституционных норм Германии" в отношении избранного гражданского правительства.\n\nВ Берлине и других городах уже арестованы высокопоставленные политики, работа Бундестага приостановлена на неопределенный срок, а группа офицеров теперь возглавляет правительство вместо канцлера. И без того непопулярные среди общественности, избранные должностные лица могли лишь беспомощно наблюдать, как военные арестовывают и отправляют в отставку большую часть правительства. Аналитики и граждане как в Германии, так и за рубежом подозревают, что этот заговор военных является частью плана "День Икс", тайно разрабатываемого офицерами немецкой армии с 2010-х годов. Другие крупные страны НАТО осудили государственный переворот, многие из которых назвали его "диким и отталкивающим надругательством над демократией и верховенством закона".\n\nМир невероятно ошеломлен, увидев, как такая богатая, либеральная, демократическая и высокоразвитая западная нация впадает в такой хаос и авторитаризм."
 news.187.a: "Все это абсурд!"
 news.188.t: "Гражданина Украины обвинили в смерти Путина"
 news.188.d: ""
 news.188.a: "Грядет война?"
 news.189.t1: "КПРФ победила на выборах в России!"
 news.189.d1: "На прошедших сегодня досрочных выборах победила Коммунистическая партия Российской Федерации, которую возглавил Геннадий Зюганов. Результаты выборов вызвали неоднозначную реакцию как внутри страны, так и за рубежом, некоторые выражают опасения по поводу возможного возрождения СССР.\nЗюганов, политик со стажем и многолетний лидер КПРФ, выступил перед ликующей толпой на митинге в честь победы на Красной площади в Москве. Сторонники размахивали красными флагами и скандировали лозунги, приветствуя победу партии, а Зюганов пообещал, что приоритетом для него будет социальная справедливость и экономическое равенство.\nПобеда КПРФ, получившей большинство в Государственной Думе, знаменует собой значительный сдвиг в российской политике. В своей платформе партия делает акцент на возвращении к социалистической политике, выступая за усиление государственного контроля над ключевыми отраслями экономики и перераспределение богатства. Этот идеологический отход от капиталистической политики последних лет вызвал обеспокоенность некоторых слоев общества.\nНа международном уровне западные страны с осторожностью наблюдают за развитием событий. В памяти всплывают воспоминания о советской эпохе и ее геополитических последствиях, что вызывает опасения относительно будущей траектории развития России под руководством Зюганова. Некоторые наблюдатели опасаются, что более активная Россия может бросить вызов существующему мировому порядку и возродить старую напряженность."
 news.189.t2: "ЛДПР победила на российских выборах!"
 news.189.d2: "В результате неожиданного поворота событий на состоявшихся сегодня досрочных президентских выборах победу одержала Либерально-Демократическая партия России, которую возглавил Владимир Жириновский. Этот результат вызвал неоднозначную реакцию как внутри страны, так и за рубежом. Некоторые выразили опасения по поводу усиления ультранационалистических настроений в России под руководством эксцентричного националистического шоумена.\n\nЖириновский, яркая и неоднозначная фигура в российской политике, обратился к ликующей толпе во время победного митинга на Манежной площади в Москве. Сторонники размахивали российскими флагами и скандировали лозунги, приветствуя победу партии, а Жириновский обещал поставить во главу угла национальные интересы и восстановить величие России.\n\n Победа ЛДПР, получившей большинство голосов в президентской гонке, знаменует собой значительный сдвиг в российской политике. В своей платформе партия делает акцент на сильной и напористой России, отстаивая националистическую политику и жестко противодействуя предполагаемому иностранному вмешательству. Этот идеологический отход от более умеренной политики последних лет вызвал обеспокоенность некоторых слоев общества.\n\nНа международном уровне западные страны с осторожностью следят за развитием событий."
 news.189.t3: "Единая Россия одержала победу на российских выборах!"
 news.189.d3: "В результате неожиданного поворота событий на прошедших сегодня досрочных президентских выборах победу одержала партия "Единая Россия", которую возглавил Дмитрий Медведев. Этот результат шокировал многих, поскольку существовали предположения, что после ухода Владимира Путина доминирующее положение "Единой России" будет оспариваться другими кандидатами.\nМедведев в своих сообщениях в VK и Telegram обратился к народу, изложив свою дальнейшую политику и заявив о своей верности курсу Путина. Он заверил общественность, что и впредь будет ставить во главу угла интересы российского народа и добиваться сохранения стабильности и процветания.\nПобеда "Единой России", получившей большинство голосов в президентской гонке, закрепила за партией статус правящей силы в российской политике. В своей платформе партия делает упор на экономическое развитие, национальную безопасность и поддержание прочных связей с международными партнерами.\nНа международном уровне этот результат был воспринят неоднозначно. Некоторые западные страны выразили обеспокоенность сохранением власти "Единой России" и ее влиянием на демократические институты. Критики утверждают, что доминирование партии может привести к дальнейшей эрозии гражданских свобод и отсутствию политического плюрализма."
 news.189.t4: "СР-ЗП одержала победу на российских выборах!"
 news.189.d4: "Благодаря ошеломляющему повороту событий партия "Справедливая Россия - За Правду" (СР-ЗП) одержала победу на недавних президентских выборах, и Сергей Миронов был избран новым президентом России. Неожиданный триумф социалистической партии вызвал шоковую волну по всему политическому ландшафту, вызвав как торжество, так и беспокойство среди граждан и международных наблюдателей.\nПосле объявления о своей победе избранный президент Миронов выступил в Москве с воодушевляющей победной речью, в которой подчеркнул необходимость единства и прогресса перед лицом многочисленных вызовов. "Настало время перемен", - заявил Миронов, излагая свое видение более справедливого общества. Пообещав бороться с коррупцией и обратить внимание на застой в развитии страны, страстная речь Миронова нашла отклик у многих, кто разочаровался в существующем положении вещей.\nТем временем сторонники партии СР-ЗП организовали большой митинг в Москве, где собрались ликующие толпы, чтобы отпраздновать их историческую победу. На фоне скандирования "Справедливая Россия за лучшее будущее" атмосфера была наэлектризованной, поскольку сторонники выражали надежду на светлое завтра при новом руководстве."
 news.189.a: "Интересно"
 news.190.t: "Россия Вторгается в Украину!"
 news.190.t1: "Начало Специальной Военной Операции на Украине"
 news.190.d: "На фоне какофонии эскалации напряженности и требований Москвы к соседней Украине все переговоры провалились, поскольку российская армия пересекла российско-украинскую границу, спровоцировав российско-украинскую войну. Почти сразу же на Россию обрушился шквал санкций, хотя это не остановило русских, когда они начали наступление по обширным полям Украины, устремляясь к Днепру, прежде чем силы НАТО, которые обещали поддержать Украину, успели вовремя усилить украинскую армию. Тем временем начали поступать сообщения о намерениях России также вторгнуться в страны Прибалтики и Польшу вскоре после битвы за Украину - и поэтому НАТО было приведено в состояние наивысшей степени боевой готовности, которую в последний раз наблюдали во время кубинского ракетного кризиса. Поскольку американских войск нигде не видно из-за продолжающегося гражданского конфликта на их родине, ответственность за сдерживание русской орды в значительной степени легла на Европейский союз, который стал фактическим главой альянса. Однако, где будет находиться НАТО, еще предстоит определить."
 news.190.a: "Zа Родину!"
 news.190.b: "Za Советский Союз!"
 news.190.c: "Неприемлемо"
 news.191.t: "Восстановление Советского Союза!"
 news.191.d1: "Советский Союз вернулся, шокировав все международное сообщество, поскольку Союз, который когда-то доминировал в Восточном блоке во время холодной войны только для того, чтобы встретить свой конец от рук реформ и сепаратизма Горбачева, вернулся в форме объявления вскоре после окончания Европейской Войны. Первый премьер восстановленного Советского Союза Геннадий Зюганов выступил по телевидению с речью, в которой, во-первых, восхвалял храбрость российских войск во время успешной Специальной Военной Операции, сравнивая их с "победителями Великой Отечественной войны", а также обратился к реформированию Советского Союза как к восстановлению статуса России, как сверхдержавы. НАТО в одностороннем порядке осудило это формирование как посягательство на мир во всем мире, в то время как многие страны Африки и Азии продолжали заявлять о своей поддержке и признании нового Советского Союза. Поскольку вновь образовавшиеся шрамы в Восточной Европе продолжают заживать после неожиданной победы России над НАТО, ожидается, что Россия вскоре последует за их победой, продолжив реформирование своей глобальной сферы влияния в свете вакуума власти, оставшегося после краха их главного соперника."
 news.191.d2: "Советский Союз вернулся, шокировав все международное сообщество, поскольку Союз, который когда-то доминировал в Восточном блоке во время холодной войны только для того, чтобы встретить свой конец от рук реформ и сепаратизма Горбачева, вернулся в форме объявления вскоре после окончания Европейской Войны. Первый президент восстановленного Советского Союза Валерий Рашкин выступил по телевидению с речью, в которой, во-первых, восхвалял храбрость российских войск во время успешной Специальной Военной Операции, сравнивая их с "победителями Великой Отечественной войны", а также обратился к реформированию Советского Союза как к окончательному уничтожению прошлого миропорядка. НАТО в одностороннем порядке осудило это формирование как посягательство на мир во всем мире, в то время как многие страны Африки и Азии продолжали заявлять о своей поддержке и признании нового Советского Союза. Поскольку вновь образовавшиеся шрамы в Восточной Европе продолжают заживать после неожиданной победы России над НАТО, ожидается, что Россия вскоре последует за их победой, продолжив реформирование своей глобальной сферы влияния в свете вакуума власти, оставшегося после краха их главного соперника."
 news.191.a: "За Родину!"
 news.192.t: "Венские мирные соглашения"
 news.192.d: "Российская военная машина сбавила обороты, и война в Восточной Европе зашла в полный тупик, поскольку российская армия была отброшена за границы Украины и стран прибалтики, а вскоре после этого между двумя сторонами было достигнуто соглашение о перемирии, поскольку обе стороны потеряли надежду оккупировать больше территорий. Дипломаты из НАТО, Украины и ОДКБ договорились встретиться в Вене для обсуждения мирного урегулирования, после чего вскоре будет достигнуто и ратифицировано окончательное соглашение, положившее конец российско-украинской войне. В то время как обнародованные подробности туманны, одним из основных пунктов соглашения был вывод российских войск, демобилизация обеих сторон конфликта и перемирие между Россией и Украиной. Несмотря на то, что ни одна из сторон не одержала верх, международное сообщество в значительной степени восприняло это как победу НАТО, которому удалось противостоять российскому экспансионизму без американской поддержки - в то время как в России вспыхнули протесты против правительства из-за неспособности извлечь что-либо из войны."
 news.192.a: "И все ради чего?"
 news.193.t: "Российская армия штурмует Вильнюс"
 news.193.d: "Душераздирающим событием войны в Восточной Европе стала ожесточенная битва за Вильнюс - столицу Литвы, в которой силы НАТО потерпели сокрушительное поражение с помощью тактики, напоминающей блицкриг времен Второй мировой войны, после того, как российский бронетанковый корпус вытеснил силы НАТО с окраин города, в то время как силы спецназа уничтожили все силы союзников. сопротивление с улиц ныне оккупированного города. С падением Вильнюса, знаменующим конец господства НАТО в странах прибалтики, импульсу российского гиганта не видно конца, поскольку следующей ожидаемой целью российской армии должна стать Варшава. В то время как НАТО удалось сохранить координацию в своей обороне, их шансы продержаться в Польше сомнительны."
 news.193.a: "Сокрушительное поражение для НАТО"
 news.194.t: "Битва за Минск"
 news.194.d: "Когда солнце начало выглядывать из-за горизонта, вдалеке послышались звуки боя. С тех пор как началась интервенция НАТО в Украину, силы НАТО начали наступление и продвигались в Беларусь, надеясь захватить столицу Минск и вынудить российского союзника выйти из войны.\n\nБои были ожесточенными, поскольку белорусские и российские войска пытались защитить свой город. Падение Минска знаменует собой поворотный момент в войне, и НАТО теперь готово двинуться навстречу самой России. Теперь, когда сердце России находится в пределах досягаемости, конец войны, возможно, как никогда близок.\n\nОднако путь к миру будет нелегким, и русские будут сражаться зубами и ногтями, чтобы защитить каждый дюйм захваченной земли. Силам НАТО нужно будет подготовиться к долгой и кровопролитной кампании, прежде чем они смогут заявить о победе."
 news.194.a: "Война обостряется"
 news.195.t: "Битва за Киев"
 news.195.d: "Российские войска захватили Киев у украинского правительства, сигнализируя о начале вмешательства НАТО в украинскую войну.\n\nРусская победа в Киеве стала кульминацией серии военных успехов против украинских войск, которые начались с захвата Чернобыля в предыдущие недели. Русские также быстро наступали на Киев с севера и юга.\n\nПадение Киева стало сокрушительным ударом по украинскому правительству, которое отчаянно пыталось удержать первый по величине город страны. Киев также был символической столицей Украины, и его потеря стала огромной пропагандистской победой русских.\n\nБоевые действия в Киеве были одними из самых тяжелых за всю войну и привели к гибели тысяч украинских солдат и мирных жителей. Город лежал в руинах, а его население было травмировано насилием. В то время как украинское правительство перебралось во Львов на западе и заявило, что будет продолжать боевые действия до тех пор, пока вся Украина не будет освобождена от российских захватчиков, многие задаются вопросом, сколько еще сможет продержаться раздираемая войной страна."
 news.195.a: "Война обостряется"
 news.196.t: "Битва за Будапешт"
 news.196.d: "Россия окончательно склонила чашу весов в войне против НАТО, захватив венгерскую столицу Будапешт в ходе годичного конфликта.\n\nРоссия пронеслась по Восточной Европе, подчинив бесчисленные народы на протяжении всей своей кампании и одержав решительную победу в Будапеште. В годичной войне на истощение российские войска загнали НАТО в угол, превосходя их во всех аспектах ведения войны.\n\nНесмотря на все усилия сил НАТО, масштабы и маневренность российских войск оказались слишком велики, чтобы оборонительные рубежи могли их сдержать. Когда немногие оставшиеся силы НАТО были выведены, стало ясно, что ситуация, наконец, повернулась в пользу России.\n\nНесмотря на то, что празднования проходят по всей российской родине, чувство обреченности поселилось в регионе Восточной Европы, который сейчас находится под контролем России. Будущее неопределенно, и многие из его жителей опасаются возмездия или чего похуже. Неопределенность высока в Венгрии и окружающих странах, поскольку они изо всех сил пытаются осознать свою новую реальность Восточной Европы, в которой доминирует Россия. На данный момент победа России почти несомненна."
 news.196.a: "Медаль за Город Будапешт"
 news.197.t: "Битва за Варшаву"
 news.197.d: "При неожиданном повороте событий силы НАТО не смогли помешать России захватить Варшаву, столицу Польши, в их продолжающейся войне.\n\nРоссийские силы медленно, но неуклонно продвигались по позициям НАТО с тех пор, как конфликт начался несколько недель назад, а захват стран Прибалтики послужил прелюдией к их истинной цели - столице Польши. Этот шаг был встречен жестким сопротивлением со стороны сил НАТО, но, несмотря на все их усилия, они не смогли предотвратить продвижение России.\n\nРанним утром российские войска захватили Варшаву в результате мощного и решительного наступления, которому не противостояла недостаточная готовность НАТО. Варшава сейчас прочно находится в руках России, и похоже, что весь регион собирается стать российским марионеточным государством.\n\nОднако остается неясным, каким будет их следующий шаг, поскольку этот некогда стабильный регион Европы погружен в хаос."
 news.197.a: "НАТО колеблется"
 news.198.t: "Сербия вторгается в Косово!"
 news.198.d: "Страх и неопределенность царят сегодня на Балканах, поскольку между Сербией и непризнанным международным сообществом государством Косово существует состояние войны. Пока сербская бронетехника и механизированная пехота пересекают границу, правительство в Белграде выпустило единственное заявление, в котором говорится, что Сербия \n\n"возвращает законную часть страны на ее законное место"\n\nКосовское правительство обратилось с просьбой о помощи к НАТО, а также назвало вторжение незаконным и несправедливым. До сих пор сербское правительство отвергало требования как косовских, так и западных политиков прекратить операцию. Международные обозреватели полагают, что НАТО вряд ли вмешается, чтобы спасти своего незначительного союзника, поскольку возрождающаяся Россия и Америка, погруженная в хаос, связали руки альянсу. Как бы то ни было, мирные жители с обеих сторон с ужасом ожидают возвращения насилия и враждебности в регион."
 news.198.a: "Пороховая бочка вновь взорвалась"
 news.199.t: "Битва за Севастополь"
 news.199.d: "Украина добилась триумфального возрождения в продолжающемся конфликте с Россией, вернув себе важный пункт раздора: портовый город Севастополь.\n\nПортовый город на Крымском полуострове в Черном море находился под контролем России с 2014 года, но в прошлые выходные, после ожесточенного сражения и сильного обстрела, сообщалось, что силы НАТО захватили город и подняли украинский флаг.\n\n"Это прорыв", - заявил президент Украины Владимир Зеленский, обращаясь к нации из Киева. "Сейчас настало время для деоккупации нашей земли и для восстановления мира на всей Украине. Это начало новой эры".\n\nбитва за Севастополь продолжается уже несколько недель, когда силы НАТО и Россия обмениваются ударами в перетягивании каната из-за стратегического портового города. Украинские командиры сообщили, что их силам удалось окружить город, отрезав его линии снабжения, прежде чем начать последний штурм.\n\nЗнаменательная победа является одним из первых крупных успехов во вмешательстве НАТО в Украину."
 news.199.a: "Война обостряется..."
 news.200.t: "Вторая битва за Минск"
 news.200.d: "Российские войска отбили Минск у НАТО после того, как они ранее захватили и оккупировали этот город. Это знаменует собой значительную победу для России, поскольку Минск является столицей Беларуси и находился в руках НАТО очень долгое время.\n\nНаступление началось с массированного артиллерийского обстрела, который разрушил большую часть инфраструктуры города. Затем силы НАТО были вынуждены оставить свои позиции и отступить, российские войска затем вошли в город и взяли его под контроль.\n\nЭто значительный удар по НАТО, поскольку они потеряли один из своих ключевых оплотов в войне. Многие надеялись, что падение Минска быстро перерастет в контрнаступление НАТО, которое будет угрожать самому центру России и вынудит Россию сесть за стол переговоров. Однако эти надежды так и не оправдались, поскольку падение города показывает, что война далека от завершения."
 news.200.a: "Война обостряется..."
 news.201.t: "Вторая битва за Киев"
 news.201.d: "После нескольких месяцев боев украинские войска, наконец, отвоевали Киев у русских. Это огромная победа не только для украинского народа, но и для всего Запада, который в последние несколько месяцев был втянут в кровопролитную войну против России. Празднования прокатились эхом по Германии, Франции, Великобритании и Украине, поскольку кажется, что русские наконец-то будут вытеснены из страны.\n\nРусские оккупировали Киев в течение нескольких месяцев, оккупация, которая становилась все более репрессивной и суровой по мере того, как война затягивалась, а сопротивление правительству росло.\n\nЭта победа была бы невозможна без помощи сил НАТО. Германия, Франция и Соединенное Королевство сыграли огромную роль в вооружении украинской армии, а их экспедиционные силы сыграли ключевую роль в наступлении.\n\nВторая битва за Киев знаменует собой огромный поворотный момент в войне, поскольку НАТО продемонстрировало остальному миру свою военную доблесть. Поскольку силы НАТО начнут наступление на Восточную Украину в течение следующих недель, многие надеются, что война скоро закончится, и у русского медведя, наконец, вырвут клыки."
 news.201.a: "Война обостряется..."
 news.202.t: "Российское наращивание вооружённых сил на границе с Украиной"
 news.202.d: "Силы России продолжают концентрироваться у границ Украины, численность войск превышает 190 000 человек, что не наблюдалось в Европе со времен окончания Второй мировой войны. Представители НАТО и западных разведок назвали наращивание сил "экзистенциальной угрозой европейской стабильности", предупреждая, что вероятность вооруженного конфликта растет с каждым часом.\n\nУкраинская военная разведка заявила, что Россия перебросила войска из центральных и восточных регионов страны к ее западной границе "на постоянной основе". В конце декабря и в январе страна перебрасывала к границе "запасы боеприпасов, полевые госпитали и службы безопасности", говорится в сообщении, что, по мнению Украины, "подтверждает подготовку к наступательным операциям." Кремль, отрицая намерение вторгнуться, указывает на расширение НАТО и украинские "провокации" как на причины своей военной позиции.\n\nПо всей Европе, однако, столицы готовятся к кризису, которого не было со времен югославских войн 1990-х годов. Министр иностранных дел Германии предупредил в Мюнхене: "То, что мы наблюдаем, - это не просто региональный кризис. Это вопрос мира в самой Европе." Тем временем президент Франции [FRA.GetLeader] призвал к срочной деэскалации, хотя намерения России по-прежнему вызывают скепсис. В мире после США Европа сталкивается с самым серьезным испытанием на выживание с 1945 года - ее будущее связано с судьбой Украины."
 news.202.a: "Неужели война на горизонте?"
 news.203.t: "Химическое Оружие Применено на Украине!"
 news.203.d: "Тревожные новости приходят из Восточной Европы: по мере того, как российские войска продвигаются все глубже и глубже, украинские защитники все больше отчаиваются.\n\nВпервые за последнее столетие появились сообщения о применении химического оружия в районе украинского города Обухов, якобы использованного украинскими войсками в попытке остановить российское наступление.\n\nРоссийские военные и дипломатические чиновники уже выступили с заявлением, осуждающим это военное преступление. Западные и украинские СМИ, напротив, возлагают вину на российскую сторону, утверждая, что это они пытались применить оружие, и что российские потери были лишь результатом некомпетентности и неправильного применения с их стороны.\n\nНезависимо от того, какова правда, кажется, что война снова обострилась, и обе стороны готовы развязать свои полные арсеналы, не обращая внимания ни на какие международные конвенции, которые они, возможно, подписали десятилетия назад."
 news.203.a: "Что они натворили?!"
 news.204.t: "НАТО одерживает победу в Европе!"
 news.204.d: "После трагической истории о разбитых сердцах и героизме на полях Восточной Европы, антагонистический конфликт, наконец, завершился победой Организации Североатлантического договора.\n\nНАТО восстановило территориальную целостность Украины, в то же время оккупируя российскую территорию вдоль Азовского моря, что привело к образованию новых независимых национальных государств. Кровопролитие, которое было спровоцировано, и возможность возрождения потенциально радикализированной России все еще на виду. Однако Европу ждет новый рассвет, который больше не будет ограничен пороховой бочкой, молчанием пушек и грохотом барабанов, поскольку победа уже здесь."
 news.204.a: "Иногда древо свободы нужно полить кровью."
 news.205.t: "Ядерная катастрофа на Востоке Украины!"
 news.205.d: "Поскольку российские войска продвигаются по Украине, отбивая атаки НАТО и украинских военных, с быстрым захватом нескольких городов и падением морального духа среди украинского правительства из-за быстрого продвижения русских, ситуация кажется мрачной. По мере приближения российских военных к Запорожью они сообщают о высоком уровне радиации в регионе, что замедляет их продвижение. Между тем, близлежащая электростанция была разрушена украинскими войсками, что было осуждено международным сообществом, поскольку такое действие является разрушительным не только для украинского народа, но и для остальной части Восточной Европы. \n\nНачались массовые эвакуации и зачистки, но российские бомбардировки продолжаются. Россия отреагировала, заявив, что украинское правительство не заботится о своем собственном народе и, в свою очередь, готово довести свою собственную нацию до самоубийства, подразумевая, что своим безрассудным поведением Украина спасает там людей. Украина никак не прокомментировала это недавнее развитие событий и имеет дело с волнами протестов и беспорядков. Каким бы ни был исход, радиация останется."
 news.205.a: "Они впадают в отчаяние, наступайте!"
 news.205.b: "Все находится под контролем"
 news.205.c: "У жнеца будет хороший день."
 news.206.t: "Россия Признает Республики Донбасса"
 news.206.d: "После успешной военной операции на постсоветском пространстве Россия сделала шаг, которого ее народ ждал более 8 лет: признание Новороссии\n\nВ своей речи перед страной Медведев дал понять, что это решение давно назрело, заявив, что "Донбасс страдал от украинской агрессии в течение последнего десятилетия. Его жители умирали от бандеровцев и азовцев, в то время как Киевский режим смеялся над их страданиями, хихикая от восторга, когда они обстреливали школы и больницы. Это прекратится сейчас".\n\nНАТО уже выпустило предупреждение России, заявив, что "война с Украиной будет иметь серьезные последствия". Украина тем временем успокаивает свое население, говоря, что никакого вторжения не будет. Однако в сообщениях утверждается, что ВСУ перебрасывают свой личный состав поближе к границе.\n\nЕсли посмотреть на границы Новороссии, простирающиеся от Харькова до Одессы, то может показаться, что вторжение неизбежно. Как бы то ни было, следующие несколько месяцев навсегда изменят историю."
 news.206.a: "Грядет война"
 news.207.t: "Сирия Вновь Оккупировала Северную Территорию"
 news.207.d: "Не секрет, что в ближневосточном регионе в этом десятилетии царит нестабильность, и в этом многие склонны винить не только внутренние политические, этнические и экономические проблемы местных стран, но и многочисленные вмешательства иностранных держав в дела региона. Даже после начала Второй американской гражданской войны некоторые иностранные силы все еще продолжали поддерживать неопределенный статус-кво. Одной из таких сил была Турция - до недавнего времени. Когда вся Европа оказалась втянута в войну с Россией, антитурецкие силы в Сирии увидели в этом возможность избавиться от их присутствия, организуя демонстрации и другие действия, направленные на подрыв их авторитета. В то же время в Алеппо и Латакии были замечены необычно большие колонны военной техники. Видя это, правительство Турции, похоже, решило вывести свои силы из региона, чтобы полностью сосредоточиться на войне в Европе. Это может означать конец присутствия НАТО в Сирии впервые за более чем десять лет."
 news.207.a: "Империя Эрдогана рушится."
 news.208.t: "Битва за Одессу"
 news.208.d: "Бухарест, Digi24(D24)\n\n[SOV.GetAdjective]ие силы захватили Одессу после масштабного наступления с применением всех видов вооружений, которое наконец прорвало прибрежную оборону Украины. Наступление началось с массированных ракетных ударов по военно-морским объектам и объектам противовоздушной обороны вокруг порта, что лишило Украину возможности сопротивляться вблизи Черного моря. Затем морские пехотинцы [SOV.GetAdjective] провели скоординированную высадку на южном побережье, соединившись с бронетанковыми частями, наступавшими со стороны Николаева.\n\nВнутри города украинские войска при поддержке экспедиционного корпуса НАТО организовали решительную оборону. Бои развернулись в историческом районе гавани, где [SOV.GetAdjective]ие подразделения штурмовали склады, пирсы и административные здания под плотным артиллерийским прикрытием. Центр города превратился в лабиринт баррикад и разрушенных трамваев, поскольку украинские войска использовали узкие улицы и дворы для организации засад, задерживая продвижение [SOV.GetAdjective]их сил квартал за кварталом. После того как порт был фактически окружен, а запасы боеприпасов иссякли, выжившие украинские и европейские защитники отступили к тыловым позициям в глубине страны. Командиры [SOV.GetAdjective]их подразделений объявили о полном контроле над Одессой, подняв свой флаг над разрушенным зданием портового управления. \n\nМосква теперь заявляет, что эта победа является ключевым шагом в обеспечении господства над северной частью Черного моря, хотя разрушения города и масштабы эвакуации гражданского населения делают эту битву одной из самых значительных потерь Украины в этой войне."
 news.208.a: "Война Обостряется"
 news.209.t: "Вторая битва за Одессу"
 news.209.d: "Варшава, TVP Info (TVP)\n\nСилы НАТО и Украины отбили Одессу после быстрого, скоординированного наступления, которое разрушило [SOV.GetAdjective]ую линии обороны как внутри города, так и вдоль прилегающего побережья. Операция началась с точных ударов по [SOV.GetAdjective]им командным пунктам вблизи порта и Кулиндорове, что парализовало логистические центры, поддерживавшие оккупацию Москвы. Украинские морские пехотинцы при поддержке военно-морских сил НАТО в западной части Черного моря высадились на берег к юго-западу от города, в то время как бронетанковые бригады продвигались из внутренних районов Одесской области. Внутри Одессы сопротивление сломилось быстрее, чем ожидалось. Российсие подразделения пытались удержать портовый район и подступы к историческому центру, но мощная артиллерия с дронами и скоординированные атаки украинской пехоты подавили их позиции. Бои разгорелись вокруг Потемкинской лестницы и улицы Дерибасовской, где [SOV.GetAdjective]ие войска, укрепившиеся в административных зданиях, были вынуждены отступить после нескольких часов боев в ближнем бою. Когда украинские механизированные подразделения захватили порт, а авиация НАТО заставила замолчать оставшуюся артиллерию, [SOV.GetAdjective]ие силы начали беспорядочное отступление в направлении Херсона и реки Днепр. К вечеру последние значительные [SOV.GetAdjective]ие формирования покинули город, оставив после себя разрозненные арьергарды и поврежденную технику. Украинские командиры вновь подняли национальный флаг над зданием портовой администрации, ознаменовав конец господства Москвы над самым стратегически важным портом Черного моря. Представители НАТО приветствовали освобождение как поворотный момент, который восстанавливает доступ Украины к жизненно важным морским путям и серьезно подрывает южный фронт России."
 news.209.a: "В Черном Море восстаноился баланс..."
 news.210.t: "РСФСР Признает Республики Донбасса и Приднестровье"
 news.210.d: ""
 news.210.a: "Безрассудная провокация"
 news.211.t: "Ядерное оружие, развернуто на Ближнем Востоке"
 news.211.d: "Впервые со времен Второй мировой войны ядерное оружие было развернуто на Ближнем Востоке. Коалиция арабских армий объявила об операциях в глубине Израиля и освобождении крупных городов. В качестве последнего средства Государство Израиль, вместо того чтобы подвергнуться полному уничтожению, решило уничтожить коалицию и себя вместе с ней. Беспрецедентные разрушения Дамаска, Алеппо, Бейрута, Багдада и Каира служат суровым напоминанием о мощи ядерного оружия. Новости из региона полностью замолчали после удара, и предполагается, что главы государств Сирии, Ливана и Египта погибли, можно только представить себе неисчислимое количество погибших и ужас от этого события."
 news.211.a: "Боже мой..."
 news.212.t: "Вторая Великая депрессия"
 news.212.d: "Самый большой страх Второй Американской Гражданской Войны оправдался, поскольку большинство маршрутов заправки и воздушных зон над Америкой были закрыты, что привело к крупнейшему экономическому кризису, который когда-либо видел человечество, даже затмевающему Великую депрессию. С момента объявления об отказе Конгресса США от переговоров миллиарды долларов по всему миру начали исчезать, поскольку инвесторы начали панические продажи, в то время как американский доллар начал входить в гиперинфляцию, поскольку Федеральная резервная система больше не в состоянии поддерживать стабильный приток новой валюты. Последствия развала крупнейшего винтика мировой экономики ощущались по всему миру, поскольку страны, которые когда-то полагались на Америку как на своего торгового партнера, несут на себе основную тяжесть потери своего крупнейшего источника дохода, а корпорации начали бежать из западного полушария за границу, в то время как большинство из них начали встречаться их конец связан со свободным падением цен на акции. Хотя еще слишком рано говорить об этом окончательно, одно можно сказать наверняка. Восстановление до показателей предыдущих лет может занять десятилетия."
 news.212.a: "Все, что нужно, - это красная черта, чтобы человечество разорвало себя на части."
 news.213.t: "Норвегия Покидает НАТО"
 news.213.d: ""
 news.213.a: "Интересно."
 news.214.t: "Порядок в [USB.GetNameDef] Рушится"
 news.214.d: ""
 news.214.a: "Ой Ой..."
 news.215.t: "Битва за Бухарест"
 news.215.d: "При ошеломляющем повороте событий Россия захватила столицу Румынии Бухарест после крупных ключевых побед российских войск в Киеве и Одессе.\n\nСообщения, поступающие из Бухареста, рисуют поразительную картину города, полностью находящегося под контролем российских войск, с усиленным военным присутствием на улицах и эффективным комендантский часом в городе.\n\nВойна между Россией и НАТО продолжается уже несколько месяцев, и Россия постепенно берет под свой контроль все больше и больше украинской территории. Оттуда они продвигались все дальше и дальше в Восточную Европу, и это последнее завоевание знаменует собой их самый смелый шаг на сегодняшний день.\n\nХотя детали произошедшего все еще в значительной степени неясны, сообщения указывают на то, что силы НАТО не смогли удержать свои позиции против российских войск, которые в течение последних нескольких недель накапливали войска и оружие в рамках подготовки к этому шагу.\n\nРоссия сейчас продвигается дальше в Румынию, и неясно, какие шаги может предпринять НАТО, чтобы остановить их. Захват Бухареста также означает, что вся восточная часть Румынии теперь находится в руках России."
 news.215.a: "Война обостряется..."
 news.216.t: "Россия одержала победу в Европе"
 news.216.d: "После нескольких месяцев российских завоеваний на европейских равнинах, когда российские войска, казалось бы, с легкостью уничтожали силы НАТО, без надежды на сохранение благоприятного мира, совет НАТО, расположенный в Брюсселе, уступил призывам к капитуляции, причем объявление было сделано всего через несколько часов после того, как Медведев был проинформирован через депеши сдающихся сторон.\n\nПоскольку война подошла к концу, российское ликование в политических и культурных столицах Москве и Санкт-Петербурге усилилось после выступления Медведева, провозглашая победу русской нации над атлантистским господством в Европе, с оговоркой, что российский мирный договор будет "справедливым и упорядоченным, наказывая только тех, кто вел экономическую войну и фанатизм по отношению к русским и славянским народам, очерняя их как простой скот на убой".\n\nНесмотря на кажущуюся попытку успокоить народ, это не остановило институциональный коллапс европейских государств, наиболее сильно пострадавших от конфликта из за вакуума власти, Комментаторы отмечают, что Медведев должен действовать быстро, прежде чем партизанские группировки в ныне оккупированных странах узурпируют российский контроль."
 news.216.a: "Интересно"
 news.216.b: "Слава России!"
 news.217.t: "Иран вмешивается в Ирак"
 news.217.d: "Поскольку Ирак вновь переживает хаос прошлого, а насилие достигло небывало высокого уровня, вопрос об иностранном вмешательстве был бы лишь вопросом времени, однако кто это сделает, оставалось вопросом.\n\nНа этот вопрос есть ответ, поскольку сообщения об иранских войсках, пересекающих иракскую границу, достигли международных новостей, иранское правительство заявило, что с исчезновением американского влияния в Ираке весь сдерживаемый гнев, наконец, смог вырваться наружу, такое насилие является серьезной угрозой миру на Ближнем Востоке и поэтому оправдывает миротворческая операция в Ираке, эксперты уже пришли к выводу, что это будет нелегкая миссия для Ирана, но ее успех почти гарантирован.\n\nОднако протесты возникли и со стороны других стран Ближнего Востока, таких как Израиль и несколько государств Персидского залива, поскольку это рассматривается как средство усиления своего влияния в регионе.\nУже появились слухи о планах Ирана продвинуться дальше на Ближний Восток, что вызвало большое беспокойство у соперников Ирана, поскольку они уже привели свои вооруженные силы в состояние повышенной боевой готовности.\n\nБудет ли эта миротворческая миссия последней в иранской военной деятельности или нет, еще предстоит выяснить."
 news.217.a: "Лев показывает свои клыки"
 news.218.t: "Четвертая арабо-израильская война"
 news.218.d: "Страх и ужас охватили Ближний Восток, поскольку состояние войны теперь существует между несколькими арабскими странами и государством Израиль. Вчера вечером ракеты, артиллерия и бомбы обрушились на несколько городов и военных объектов в Израиле, а также было подтверждено перемещение бронетанковых и механизированных дивизий на территорию Израиля из соседних арабских государств. Правительства воюющей коалиции арабских государств выпустили только одно заявление для международного сообщества, заявив, что война является попыткой наказать Израиль за "преступные действия", совершенные на протяжении многих лет. Израиль ввел чрезвычайное положение и немедленную военную мобилизацию, а канцелярия президента заявила, что "все наши враги заплатят апокалиптическую цену за свою агрессию". Призывы к миру и посредничеству раздаются из-за рубежа после того, как обращения были проигнорированы, при этом ожесточенные бои уже охватили большую часть страны, и в ближайшие несколько дней ожидается еще больше. Многие в регионе и во всем мире могут только предполагать, сколько смертей и разрушений произойдет, прежде чем даже само понятие мира станет очевидным."
 news.218.a: "Хаос распространяется..."
 news.219.t: "В Израиле объявлена победа арабов"
 news.219.d: "В качестве шокирующего откровения из Израиля поступили новости о небольшом контингенте сирийской армии. Дивизия "Аль-Асад", претендующая на то, чтобы быть преемниками Сирийской арабской армии, поклялась продолжать войну, чтобы отомстить за погибшего президента Башара аль-Асада. Их войска вошли в развалины Тель-Авива и подняли свой флаг над городом. Освобождение Палестины было признано осуществленным. Многое еще остается без ответа, и остается неопределенным, контролирует ли провозглашенная дивизия какую-либо оккупированную израильскую территорию, за исключением земель, по которым они путешествуют. Руководству Израиля еще предстоит восстановиться, и считается, что большая часть нации сейчас находится в состоянии полной анархии."
 news.219.a: "Неожиданное Завершение..."
 news.220.t: "Нидерланды покидают НАТО"
 news.220.d: "Неожиданным, но все же шокирующим поворотом событий стал еще один удар, нанесенный по и без того сильно пошатнувшемуся НАТО официальным выходом Нидерландов из трансатлантического альянса. Будучи одним из членов-основателей альянса, идея о том, что Нидерланды когда-нибудь покинут его, считалась бредовой фантазией... до сих пор. В коротком, но емком заявлении правительство Нидерландов заявило, что "НАТО больше не обладает возможностями и ресурсами для обеспечения безопасности голландской нации." Поспешный характер выхода возмутил представителей НАТО в Брюсселе: было опубликовано множество публичных заявлений, осуждающих голландское правительство как угрозу миру и единству западного мира. Наряду с осуждением, офицеры НАТО объявили, что в ближайшие сутки или около того войска и материальные средства НАТО начнут выводиться из Нидерландов в соседние Германию и Францию. Однако в Европе, все еще оправляющейся от шока, вызванного потерей России, мало кто будет оплакивать или протестовать против, казалось бы, уже распадающегося военного альянса."
 news.220.a: "Чёртовы Хиппи"
 news.220.b: "Домино падает."
 news.221.t: "Бельгия покидает НАТО"
 news.221.d: ""
 news.221.a: "Чёртовы Хиппи"
 news.221.b: "Ещё один глотает пыль"
 news.222.t: "Дания покидает НАТО"
 news.222.d: ""
 news.222.a: "Чёртовы Хиппи"
 news.222.b: "Даже Дания?"
 news.223.t: "Конфедерация восстановлена!"
 news.223.d: ""
 news.223.a: "Похоже, они восстали из мертвых."
 news.224.t: "Конфедерация восстановлена!"
 news.224.d: "Так называемая Лига Юга восстала победителем из пепла того, что когда-то было осколками американского Юга. Это открытие заставило аналитиков и экспертов искать ответы на вопросы о том, как такое могло произойти, а все их предсказания пошли прахом. После ошеломляющей победы Лига Юга немедленно реорганизовалась в Конфедеративное государство Америки, возглавив его своим лидером [LOS.GetLeader]\n\n Искра, зажженная в 1860 году, похоже, не погасла в 1865-м, а лишь тлела под поверхностью, пока презираемое ими американское правительство впадало в стагнацию и разруху. В своей речи, опубликованной сегодня, [LOS.GetLeader] заявил: "После почти двух веков угнетения янки мы сбросили с себя оковы. Это была долгая и тяжелая борьба, слишком многих заставили похоронить своих, но каждая жертва привела к этому моменту. Наших детей больше никогда не будут кормить ложью янки о нашем наследии. Мы снова будем гордиться своей историей. Эпоха Америки, управляемой янки, закончилась, эпоха Юга только начинается!" В этой речи воплотилась в жизнь идея, которую политологи и историки считали смехотворной. Эра США закончилась, и началась эра КША."
 news.224.a: "Похоже, они восстали из мертвых."
 news.225.t: "Российские войска входят в Элисту"
 news.225.d: "Похоже, что евразийский режим продолжает свою экспансионистскую политику. Захватив Астрахань без боя путем переговоров, евразийцы вместе с калмыцкими сторонниками захватили калмыцкую столицу Элисту, фактически аннексировав весь регион.\n\nМестная администрация была создана Дугиным во главе с местным буддийским монахом. Калмыцкие евразийцы призывают к милитаризации региона, чтобы "дать отпор гедонистам, которые хотят разрушить наш буддийский рай"\n\n Европейское сообщество с ужасом наблюдает, как российский реваншизм снова поднимается, приближаясь к открытой конфронтации."
 news.225.a: "Плевок в лицо демократии!"
 news.226.t: "Россия Вторгается на Кубань!"
 news.226.d: "[СЕВАСТОПОЛЬ] Наши репортеры в Крыму сообщили о переброске тяжелых войск через Керченский мост со стороны Республики Украина, когда первые сообщения о вводе российских войск на Кубань стали поступать на новостные каналы по всему миру. Официальное подтверждение от министерств обороны Украины и Кубани свидетельствует о том, что сообщения правдивы, и НАТО спешно готовится к ответу, поскольку Россия, без сомнения, готова к последствиям вторжения на Кубань, которые включают, но не ограничиваются прямым вмешательством НАТО из-за гарантии безопасности со стороны Украины.\n\nВойна едва не разразилась во время протестов в Старвополе, когда восточная половина Кубанской республики отделилась во время пророссийской демонстрации в городе. Запад не терял надежды на деэскалацию, и Украина не стала действовать по гарантии безопасности, когда российские войска взяли Старвополь. Однако на этот раз.\nПо оценкам, около 4 миллионов человек скоро снова столкнутся в едва восстановленной Восточной Европе. То, что было надеждой на будущее для целого поколения и почетной отставкой для ветеранов НАТО прошлой войны, превратилось в новую волну призыва новобранцев и ветеранов, которые оставили Европу такой же злой и решительной, как и их российские коллеги, чтобы покончить с этим."
 news.226.a: "Победитель забирает все в этот раз..."
 news.226.b: "Россия получит Европу, даже если она превратится в кучу пепла..."
 news.226.c: "Европа будет включена в состав Евразии!"
 news.227.t: "Европейская Ядерная Война!"
 news.227.d: ""
 news.227.a: "Божей мой..."
 news.228.t: "Турция Покидает НАТО"
 news.228.d: "Сегодня из Анкары пришло неожиданное, но все же шокирующее сообщение: Турецкая Республика объявила о своем официальном выходе из НАТО. Вступив в альянс в 1952 году, Турция на протяжении многих лет считалась его твердым членом, сотрудничая в рамках различных интервенций и инициатив альянса. Для многих западных стратегов и политиков лояльность Турции была неоспоримой, но не теперь. Такое представление было полностью разрушено поспешным и неожиданным выходом страны из альянса. Президент Эрдоган, выступая из президентского комплекса в Анкаре, заявил, что альянс "больше не отвечает интересам национальной безопасности Турции" и что НАТО "больше не способна выполнять свои обещания по обеспечению коллективной безопасности Турции." Дипломаты НАТО из Брюсселя уже выступили с резким осуждением этого ухода, заявив, что отказ Турции от альянса угрожает миру во всем мире и безопасности как Европы, так и Ближнего Востока. Однако некоторые не шокированы, так как аналитики и журналисты отмечают растущую напористость Турции при Эрдогане в последнее десятилетие и стремление страны стать независимой державой, не подчиняющейся западным странам. По мере того как представители НАТО начинают отзывать из Турции персонал и материальные средства, растут предположения, что Турция воспользуется обретенной геополитической независимостью для реализации собственных интересов в регионе, возможно, даже тех, которые поставят ее на путь столкновения с Западом."
 news.228.a: "Оппортунисты снова наносят удар!"
 news.228.b: "Всё меняется..."
 news.229.t: "Талибы входят в Кабул"
 news.229.d: "Движение "Талибан" ворвалось в столицу Афганистана сегодня после того, как правительство рухнуло, а президент присоединился к массовому бегству своих сограждан и иностранцев, что ознаменовало окончание дорогостоящей двухдесятилетней кампании США по переделке страны.\n\nВооруженные до зубов боевики движения "Талибан" рассредоточились веером по столице, и несколько человек проникли в заброшенный президентский дворец в Кабуле. Сухайл Шахин, представитель движения "Талибан" и участник переговоров, сообщил Associated Press, что боевики проведут переговоры в ближайшие дни, направленные на формирование "открытого, инклюзивного исламского правительства".\n\nС наступлением ночи боевики движения "Талибан" развернулись по всему Кабулу, захватив брошенные полицейские посты и пообещав поддерживать закон и порядок во время переходного периода."
 news.229.a: "Ушли со скрипом..."
 news.230.t: "Украина начинает контрнаступление"
 news.230.d: "Война в Европе бушует уже несколько недель, и при шокирующем повороте событий российский флаг развевается над президентским зданием в Киеве, несмотря на все усилия Украины, они были вытеснены из своей столицы безжалостным российским наступлением.\n\nВ отчаянной попытке украинское правительство предприняло тотальную контратаку, пытаясь отбросить русских назад, используя все, что у них есть, уже поступали сообщения о нарушениях прав человека со стороны украинских силовиков, но они в основном игнорируются.\n\nЭта контратака оказалась чрезвычайно разрушительной, и с помощью их европейских союзников исход этого контрнаступления пока известен только самому времени.\n\nНо одно можно сказать наверняка: Украина пока не готова сдаваться, и их пыл растет с каждым днем."
 news.230.a: "Они впадают в отчаяние!"
 news.230.c: "Слава Украине!"
 news.231.t: "Балканские Страны Покидают НАТО"
 news.231.d: "После антизападных протестов в Черногории и Македонии обе страны применили статью 13 НАТО, официально направив "уведомления о денонсации" в штаб-квартиру НАТО в Бельгии. Многие международные эксперты указали, что это резко изменило баланс сил на Балканах, а Сербия, поддерживающая Россию, получила значительный импульс в проецировании власти в регионе. В условиях вакуума власти, вызванного крахом Соединенных Штатов и социально-экономическим хаосом в Европейском Союзе, стабильность, столь тщательно сохраняемая со времен распада Югославии, кажется, балансирует на острие ножа."
 news.231.a: "Интересно."
 news.232.t: "Ожесточенные Городские Бои Охватывают Калининград"
 news.232.d: "Зеленоградск, Россия - Reuters\n\nЗа изолированный Калининградский анклав сейчас идет одно из самых кровопролитных и отчаянных сражений войны. Окруженный и отрезанный от материковой части России, эксклав стал центром интенсивных городских боев, и аналитики предупреждают, что его падение - лишь вопрос времени.\n\nПольские войска, поддерживаемые прибалтийскими и скандинавскими подразделениями, неуклонно продвигаются квартал за кварталом в город после нескольких недель затягивания петли вокруг его периферии. По состоянию на сегодняшнее утро артиллерия и авиация продолжают наносить удары по разрушенному городу.\n\nВоенные источники утверждают, что ВДВ и морская пехота продолжают окапываться вместе с остатками Балтийского флота и бронетанковыми отрядами, а российские войска используют гражданские здания, портовые краны и подземные тоннели метро для создания временных опорных пунктов. Один из источников в высшем командовании охарактеризовал сопротивление как "свирепое, по масштабам и жестокости напоминающее Сталинград"\n\nПо сообщениям, белорусские части начали наступление с южной литовской границы в попытке освободить город. Пока эти наступательные действия не увенчались успехом. Большинство военных наблюдателей с этим согласны: Стратегическая изоляция Калининграда, отрезанного коридорами, контролируемыми союзниками, делает практически невозможным значительное пополнение запасов или подкрепление. Его падение может быть неизбежным, но его защитники, похоже, намерены затягивать битву как можно дольше."
 news.232.a: "Война обостряется..."
 news.233.t: "Битва за Ростов"
 news.233.d: "Решительным шагом по обеспечению своей национальной безопасности Украина одержала крупную победу над Россией в виде Ростова, зоны на краю юго-восточной части Украины.\n\nПосле нескольких недель интенсивных боев силы НАТО смогли отбить у российских войск город Ростов, что стало крупной победой НАТО. НАТО уже несколько недель ведет непрекращающуюся борьбу с Россией в связи с незаконным вторжением в Украину, а также другими нарушениями европейской территориальной целостности. честность.\n\nПобедоносные войска НАТО возглавлял командующий украинскими сухопутными войсками, Генерал Валерий Залужный. Генерал Залужный выразил уверенность в результате сражения, отметив, что украинские силы смогли перехватить инициативу и решительно извлечь из этого выгоду.\n\nРоссийские официальные лица выразили сожаление в связи с потерей и выразили надежду, что, как и в Великую Отечественную войну, российские войска отбросят захватчиков назад. Однако на данный момент Украина с гордостью празднует успешное взятие Ростова и уверена в своей способности отстоять свой суверенитет против российской военной машины."
 news.233.a: "Война обостряется..."
 news.234.t: "НАТО Претендует на Столицу Дона"
 news.234.d: "Киев, Украина - Радио Свободная Европа\n\nВолгоград, столица молодой Донской республики, сейчас находится на передовой, поскольку российские войска ведут разнонаправленное наступление, что повышает угрозу окружения. Осада, давно ожидаемая аналитиками, последовала за месяцами пророссийских волнений и публичных демонстраций в Волгограде против интеграции в европейскую сферу. Эти настроения, которые официально преуменьшались Киевом и Парижем, похоже, предвещали сегодняшнюю кампанию.\n\nЕвропейские войска, состоящие в основном из польских и украинских частей, прибыли в город две недели назад и с тех пор установили оборонительный периметр на окраинах и ключевых узлах. По сообщениям, в состав гарнизона также входят финские и прибалтийские подразделения. В то время как оборона держится в северных районах, южные подступы остаются крайне спорными.\n\nНесмотря на официальный оптимизм донского правительства, стратегическая картина остается мрачной. Конвои НАТО продолжают прибывать под обстрелом, а линии снабжения через Ростов и Николаев регулярно подвергаются бомбардировкам. По сообщениям, часть гражданского населения бежит в сторону Мышково и Ахтубы, хотя разрушение инфраструктуры затрудняет организованную эвакуацию.\n\n''Жители Волгограда помнят, что Россия пролила за них кровь в Великой Отечественной войне,'' сказал один из российских полевых командиров в эфире телеканала ''Россия 1.'' ''Мы здесь только для того, чтобы загнать правнуков фрицев обратно в Париж.''"
 news.234.a: "Война подходит к своему завершению......"
 news.235.t: "Битва за Краков"
 news.235.d: "По мере приближения войны к центральной Европе континент с ужасом наблюдает за тем, как русская армия ворвалась в крупный польский город Краков. По свидетельствам очевидцев из числа польских и союзных защитников, город пережил самое худшее из того, что может предложить современная война. Российские беспилотники, реактивная артиллерия и танковые снаряды подняли на воздух целые кварталы и выкорчевали целые улицы. Затем битва быстро перешла в жестокую городскую войну, когда польская и российская пехота сражалась дом за домом, квартал за кварталом, пытаясь выкурить друг друга. Снайперы превратили основные переулки в смертный приговор для пехоты, группы РПГ превратили центральную часть города в кладбище для танков и БТР, а за отдельные здания сражались и взрывали их целые роты солдат. Для многих польских граждан Краков теперь выглядит неузнаваемым, но многие все еще цепляются за надежду, что победа еще возможна. Однако, несмотря на то, что юг Польши находится в осаде российских войск, многие в Западной Европе опасаются, что Россия вскоре сможет нанести прямой удар по Германии и Франции."
 news.235.a: "Война обостряется..."
 news.236.t: "Санкт-Петербург в Осаде"
 news.236.d: "Таллинн, Эстония - Радио Свободная Европа\n\nОдна из исторических имперских столиц России, Санкт-Петербург, теперь оказалась в центре шокирующе успешного европейского наступления, поскольку альянс продолжает углубляться на российскую территорию в рамках более широкой кампании по ослаблению российского государства. С военными успехами на балтийской границе стратегия на северо-западе перешла от сдерживания к давлению, как символическому, так и военному.\n\nКонтингенты под руководством скандинавов переправились через реку Лугу, установив прочное присутствие к западу от города. Поддержка прибалтийских подразделений материально-технического обеспечения и немецкой бронетехники укрепила наступление, а высокоточные удары, по сообщениям, скоординированные с силами быстрого реагирования, нацелены на ключевые транспортные узлы вдоль московского шоссе.\n\nХотя российские государственные СМИ настаивают на том, что город остается в безопасности, периодические отключения электричества, нехватка топлива и участившиеся случаи эвакуации свидетельствуют об обратном. На местных кадрах, полученных независимыми наблюдателями, видны длинные очереди у хлебных складов и импровизированные бомбоубежища на станциях метро.\n\nНесмотря на стремительное продвижение, аналитики по-прежнему сомневаются. "Взятие самого города будет чрезвычайно дорогостоящим мероприятием," отмечает доктор Похта Нинаму, аналитик по вопросам европейской безопасности из Института обороны в Осло. "Городская война в пятимиллионном городе чревата огромными потерями среди военных и гражданского населения, не говоря уже о политических последствиях.""
 news.236.a: "Говорят, история часто повторяется."
 news.237.t: "Война Разгорается в Европе"
 news.237.d: "Из Брюсселя поступило шокирующее заявление от официальных лиц НАТО: второй раз в истории (первый - 11 сентября) была задействована пятая статья устава НАТО. За последние несколько дней на бывшей польско-белорусской границе произошли вооруженные стычки между польскими и российскими пограничными войсками. Никто точно не знает, кто выстрелил первым, но вчерашняя утренняя стычка стала первой, которая переросла почти в полномасштабное сражение. Дипломаты с обеих сторон призывали к переговорам и надеялись, что кризис утихнет после достижения соглашения. Однако переговоры не состоялись, поскольку вместо этого официальные лица НАТО большинством голосов задействовали Пятую статью. Один из официальных представителей НАТО из Великобритании заявил леденящим душу языком, что "нет места для переговоров, когда совершено прямое вооруженное нападение на члена НАТО."\n\nПочти каждая страна на восточном фланге НАТО объявила чрезвычайное положение и немедленную мобилизацию своих вооруженных сил. Министерство иностранных дел России выпустило короткое, но зловещее заявление, в котором говорится,"Россия мобилизует и применит все имеющиеся военные средства для защиты своего суверенитета""
 news.237.a: "Кровь вновь заливает землю Европы."
 news.238.t: "Бои Достигают Франкфурта"
 news.238.d: "Франкфурт, Германия - DW\n\nРоссийские сухопутные войска возобновили бои на ключевых маршрутах в окрестностях Франкфурта, продвигаясь дальше в центральную часть Германии, после того как были достигнуты успехи в секторе Фульда и Висбад, и город стал последним редутом городских и логистических центров к западу от Эльбы. Сегодня рано утром поступили сообщения о столкновениях в Майнтале и Ханау, артиллерийские обстрелы и обстрелы с помощью беспилотников продолжались в течение всего дня.\n\n Министерство обороны Германии подтвердило, что оборонительные операции ведутся в нескольких районах в сотрудничестве с Европейской оборонительной коалицией. Гражданским лицам рекомендовано переместиться в эвакуационные коридоры в направлении Висбадена и Майнца. Инфраструктуре нанесен значительный ущерб: ночные удары пришлись на железнодорожные линии и узлы автомагистралей, критически важные для снабжения и передвижения гражданского населения.\n\nПосле падения Берлина город стал рассматриваться как важнейший оплот западной оборонительной сети. Военные аналитики предполагают, что российское продвижение через Гессен направлено на то, чтобы отрезать оставшиеся логистические пути НАТО через Вышеград и Балканы. Официальные лица НАТО и ЕС воздержались от комментариев по поводу текущей дислокации войск в регионе, но подтвердили свою приверженность обороне Европы.\n\nАналитики также отмечают, что растущее сходство с решающими сражениями, такими как в Варшаве и Берлине, ставит под сомнение оборонительные усилия Европы. В ближайшие дни ожидается активизация боевых действий. "Речь идет уже не об удержании позиций, а об удержании всего западноевропейского фронта," сообщил DW один из военных источников."
 news.238.a: "Дорога в Париж никогда не была такой открытой..."
 news.239.t: "Ожесточенные Столкновения в Праге"
 news.239.d: "Прага, Чехия - Радио Свободная Европа\n\nИнтенсивные уличные бои вспыхнули по всей Праге, когда российские бронетанковые колонны и воздушно-десантные подразделения вошли в город со стороны переправы через Эльбу. Министерство обороны Чехии подтвердило факт прорыва рано утром, призвав всех резервистов и экстренные службы помочь в оборонительных операциях. С рассвета периодически звучат сирены воздушной тревоги, а значительная часть населения ищет убежища на станциях метро и в укрепленных подвалах.\n\nВ то время как большая часть населения мобилизована на поддержку национальной обороны, службы безопасности сообщают о единичных беспорядках и диверсиях, связанных с пророссийскими симпатиями в периферийных районах. За ночь было произведено несколько арестов в связи с поджогами и распространением вражеской пропаганды. Представители внутренних дел предупредили, что сети дезинформации, похоже, усиливают российские нарративы через неопределенные интернет-каналы СМИ и местных агитаторов, а некоторые источники разведки даже подтвердили, что в некоторых районах Центральной и Восточной Чехии под руководством русофильского политического альянса FDD-Trikolora появилось несколько пророссийских ополчений, которые сражались вместе с пророссийскими колоннами до и во время наступления на город.\n\nБольшая часть восточной Германии оспаривается или находится под российской оккупацией, Прага стала критической линией сопротивления для Центральной Европы. В ближайшие месяцы региональная динамика может измениться в зависимости от результатов натиска российских войск. В настоящее время батальоны ведут ожесточенные городские бои вокруг ключевых объектов инфраструктуры, включая главный железнодорожный узел и правительственные районы Жижков и Карлин."
 news.239.a: "Россия продвигается все дальше на Запад..."
 news.240.t: "Российские Войска Продвигаются к Берлину"
 news.240.d: "Берлин, Германия - Reuters\n\nВпервые за несколько поколений битва вернулась на улицы Берлина. Немецкие и российские войска сошлись в тяжелых уличных столкновениях, напоминающих Вторую мировую войну. Казалось бы, за одну ночь союзные России войска прорвали оборонительные рубежи к востоку от реки Одер, начав, похоже, историческое повторение концентрированного наступления на столицу Германии. К рассвету столкновения вспыхнули в восточных районах Марцан и Лихтенберг, в то время как немецкие войска закрепились в центре города и на ключевых логистических маршрутах, таких как мост Трептов-Эйзенбрукке и Копеник.\n\nВ настоящее время битва превращается в одно из самых ожесточенных городских столкновений войны: жители рассказывают об артиллерийских обстрелах и отдаленных выстрелах, которые эхом отдаются во временных бункерах в U-Bahn, а над головой постоянно жужжат стаи беспилотников. Движение общественного транспорта приостановлено, больницы переполнены, а сирены гражданской обороны звучат почти каждый час.\n\n[GER.GetLeader] обратился к нации сегодня утром в Париже, назвав ситуацию "тяжелой, но не безнадежной" и призвав граждан сохранять единство. "Русские силы не сломят коллективный дух Германии и европейского сопротивления."\n\nАналитики отмечают, что значение битвы выходит за рамки географии, поскольку Берлин во многом остается культурным и политическим центром Европы. Поскольку союзники не знали, успеет ли вовремя прибыть материально-техническая поддержка, взятие Берлина стало бы сигналом к новому, более мрачному этапу европейской войны."
 news.240.a: "Жуков улыбается."
 news.241.t: "Милан в Осаде"
 news.241.d: "Милан, Италия - Agence France-Presse\nОжесточенные бои вспыхнули на окраинах Милана, так как силы, поддерживаемые добровольцами из балканских и восточных славяно-азиатских стран, продолжают наступление в долине реки По. Итальянские власти подтвердили, что Милан, один из крупнейших экономических центров Европы, теперь является прифронтовым городом, а бои ведутся в периферийных районах Сесто-Сан-Джованни и Роццано.\n\nНаступление следует за неделей тактики "выжженной земли" на севере Италии, где наступающие силы нацелились на инфраструктуру и сельскохозяйственные активы в явной попытке подорвать местную логистику. Мосты вдоль реки По были разрушены, а склады снабжения и транспортные узлы в таких городах, как Пьяченца и Парма, подверглись ударам артиллерии и беспилотников, что еще больше осложнило возможности европейцев по укреплению территории.\n\n''У них нет почтения ни к жизни, ни к вере. Один из наших братских приходов был обстрелян две ночи назад. Там не было ни одного солдата. Только старики, женщины, дети,'' - говорит отец Маттео Риччи, священник прихода Сан-Лоренцо в историческом районе Милана. ''В этой церкви мы не говорим о ненависти. Но мы знаем, кто приносит смерть в наш город.'' Священник также рассказал о растущем присутствии союзных войск в центре города: ''Они ведут себя уважительно. Некоторые даже пришли на мессу, молча. Я благословил одного из них сегодня утром. Он попросил меня помолиться, чтобы он не умер.''\n\nВ других местах батальоны окопались за баррикадами, построенными в трамвайных путях и на пьяццах. Аналитики предупреждают, что затяжной городской конфликт в Милане может привести к массовым перемещениям и долгосрочному разрушению инфраструктуры по всей Ломбардии."
 news.241.a: "На пиццу времени не хватит, да?"
 news.242.t: "Путинизм в России!"
 news.242.d: "Хотя большинство не удивлено тем, что Медведев придерживается курса Путина, некоторые аналитики указывают на своеобразные перемены в правительстве. Многие правительственные чиновники и олигархи, от высокопоставленных до низших, предстали перед судом по делам о коррупции, причем государство зашло так далеко, что забрало их зарубежные активы без суда. Тем временем культ личности вокруг президента стал смещаться.\nПутин, по сути, стал иконой "российского республиканизма", причем его образ чем-то напоминает образ Юлия Цезаря. Путинизм, похоже, больше не является идеей либеральных технократов сохранить свое богатство и правление в России навсегда.\nМедведев эффективно провел чистку в своем правительстве: неэффективные и коррумпированные чиновники "добровольно" раздали свое имущество после того, как сотрудники ФСБ посетили их семьи. Однако те, кто добился результатов, сохранили часть своих активов. На данный момент заполняется большое количество новых вакантных мест, с акцентом на "молодую кровь", чтобы омолодить авторитарную демократию.\nВ то время как либеральная оппозиция осудила это как "новую опричнину", большинство россиян поддерживают эти действия. Элиты очищены, силовики наделены полномочиями, а народ полон надежд."
 news.242.a: "Кто не с нами, тот против нас"
 news.242.b: "Неудивительно."
 news.243.t: "Демократия в России!"
 news.243.d: "Похоже, либеральные взгляды Медведева не изменились с 2008 года. Российская политическая сфера претерпела радикальные изменения, большинство, если не все российские партии объединились и реформировались сами с собой, сформировав трехпартийную систему. КПРФ, "Справедливая Россия" и различные социалисты преобразовались в партию "Народная Россия", в то время как партия "Новые люди" преобразовалась в партию "Новая Россия", поглотив членов партии "Яблоко". "Единая Россия" осталась партией Медведева, хотя и была реорганизована таким образом, чтобы ориентироваться на правоцентристскую сферу, и многие ее члены перешли в две другие партии.\nХотя некоторые могут утверждать, что это простая смена символов, похоже, что эти 3 партии фактически конкурируют друг с другом за следующие выборы. Не говоря уже о многочисленных подгруппах внутри этих партий, которые уже пытаются склонить избирателей к своей политике.\nМногие россияне смотрят на это изменение с надеждой. Демократия больше не будет ассоциироваться с голоданием и позором вашего собственного народа путем приватизации, в то время как вы целуете американские сапоги. Российский демократический эксперимент никому не подчинится, будь то изнутри или снаружи."
 news.243.a: "Двуглавому орлу было дано новое назначение."
 news.243.b: "Начали дуть ветры перемен"
 news.245.t: "Новая Конституция в России"
 news.245.d: "Хотя большинство аналитиков не удивлены продолжением Медведевым политики Путина, похоже, что политическая система претерпела изменения.\nПолитические партии, по сути, были объединены в одну коалицию под эгидой "Единого национального фронта", организации, созданной Путиным в 2011 году, чтобы связать партии с народом, по крайней мере на бумаге, в единую сеть для укрепления системы. Медведев, похоже, превратил организацию в единую партийную коалицию, изгнав антигосударственные партии, такие как "Яблоко".\nВ то время как "Единый фронт", по сути, является единым блоком, основанным на сохранении России и ее ценностей, входящие в него партии имеют свои собственные, отличающиеся друг от друга программы, такие как предложения КПРФ по реформированию плановой экономики или предложения ЛДПР по борьбе с мигрантами и государственным капитализмом. Партия "Единая Россия" выступает в качестве нейтрального большинства, выбирая между предложениями второстепенных партий и вмешиваясь только в случае необходимости.\nТем временем за Путиным закрепился статус "Отца российской демократии", а статуи и произведения искусства, изображающие экс-президента, стали обычным явлением в российских декорациях. Его предыдущие ошибки забываются, а его образ граничит с идеализмом избирательной кампании Бориса Ельцина в РСФСР. Настоящий сильный демократ из русского народа, не привязанный к западному контролю.\nВ обществе также, по-видимому, произошли позитивные изменения. Гражданское отделение Объединенного фронта было интегрировано в государственную систему и в настоящее время используется для ареста коррумпированных чиновников различных администраций. Несмотря на то, что в этом вопросе возникли некоторые трудности, поскольку некоторым политикам удалось избежать ареста, публичный дискурс действительно становится все более актуальным в политике.\nКак бы то ни было, Россия движется в будущее так же, как и 20 лет назад, гордо развевая триколор."
 news.245.a: "Завтра Будет.\nЛучше."
 news.245.b: "Неудивительно."
 news.246.t: "Битва за Берлин"
 news.246.d: "Берлин, Германия -- Reuters\n\nВпервые за несколько поколений битва вернулась на улицы Берлина. Немецкие и российские войска сошлись в тяжелых уличных столкновениях, напоминающих Вторую мировую войну. Казалось бы, за одну ночь союзные России войска прорвали оборонительные рубежи к востоку от реки Одер, начав, похоже, историческое повторение концентрированного наступления на столицу Германии. К рассвету столкновения вспыхнули в восточных районах Марцан и Лихтенберг, в то время как немецкие войска закрепились в центре города и на ключевых логистических маршрутах, таких как мост Трептов-Эйзенбрукке и Копеник.\n\nВ настоящее время битва превращается в одно из самых ожесточенных городских столкновений войны: жители рассказывают об артиллерийских обстрелах и отдаленных выстрелах, которые эхом отдаются во временных бункерах в U-Bahn, а над головой постоянно жужжат стаи беспилотников. Движение общественного транспорта приостановлено, больницы переполнены, а сирены гражданской обороны звучат почти каждый час.\n\n[GER.GetLeader] обратился к нации сегодня утром в Париже, назвав ситуацию "серьезной, но не безнадежной" и призвав граждан сохранять единство. "Русские силы не сломят коллективный дух Германии и европейского сопротивления", - заявил он.\n\nАналитики отмечают, что значение битвы выходит за рамки географии, поскольку Берлин во многих отношениях остается культурным и политическим центром Европы. Поскольку союзники не знали, успеет ли вовремя прибыть материально-техническая поддержка, взятие Берлина стало бы сигналом к новому, более мрачному этапу европейской войны."
 news.246.a: "Мы снова вошли в логово зверя."
 news.246.b: "Das ende ist nahe..."
 news.246.c: "Война обостряется..."
 news.247.t: "Формирование Новой оси"
 news.247.d: "Пока в Восточной Европе оседала пыль, Западная Европа погружалась в тоталитаризм. Правительства Франции, Италии и Германии собрались в Берлине, чтобы создать альянс, известный как Стальной пакт. Несмотря на то, что лидеры настаивают на том, что соглашение носит исключительно оборонительный характер, многие люди остаются скептиками, сомневаясь в его истинных мотивах.\n\nСоздание этого военного союза вызвало интерес и беспокойство в Европе: такие страны, как Португалия, Испания, Греция и Великобритания, проявили интерес к потенциальному объединению по стратегическим причинам. Советские чиновники утверждают, что альянс напоминает союз держав оси в 1940-х годах, который привел к гибели миллионов людей и массовым разрушениям, и предупредили, что введут санкции против всех, кто присоединится к Берлину.\n\nБудущее Европы висит на волоске, многие задаются вопросом, сохранит ли этот альянс новый порядок в Западной Европе или попытается проникнуть на Восток, спровоцировав новый разрушительный конфликт."
 news.247.a: "Запад находится на пути к неизбежному конфликту!"
 news.247.b: "Uber alles..."
 news.247.c: "История Повторяется..."
 news.248.t: "Второй Марш на Рим" 
 news.248.d: "В сцене, напоминающей самые печально известные моменты истории, тысячи одетых в черное демонстрантов обрушились на Рим, их знамена развевались на ветру, а скандирования эхом разносились по вечному городу. Возглавляемый коалицией фашистов, монархистов и радикальных правых, этот "Второй марш на Рим" безошибочно напоминал роковое восхождение Муссолини - леденящее эхо прошлого, которое, как многие надеялись, никогда не вернется.\n\nИталия, ослабленная катастрофическим поражением НАТО в русско-европейской войне, стала благодатной почвой для возрождения радикалов. Экономический коллапс, растущая безработица и разочарование в демократическом процессе привели граждан в объятия тех, кто обещает быстрые действия и национальное возрождение. Флаги с фасциями и королевскими знаками отличия теперь доминируют на улицах, а участники марша провозглашают себя спасителями униженной и раздробленной Италии.\n\nКогда марширующие достигли ступеней Палаццо дель Квиринале, их лидеры потребовали отречься от власти неустойчивого правительства и восстановить "судьбу Италии как европейской державы." Призрак наследия Муссолини навис над этим моментом, и итальянцы задаются вопросом: что это - рассвет новой главы или погружение в слишком знакомую тьму?"
 news.248.a: "Начинается славное возрождение!"
 news.248.b: "История Повторяется"
 news.249.t: "Роспуск НАТО" 
 news.249.d: "После почти 80 лет взаимной обороны и коллективной безопасности между ее членами Организация Североатлантического договора была фактически распущена после российской экспансии на запад, которая была начата вскоре после объявления о том, что североатлантический союз вмешается в Украину после пограничного конфликта между Россией и Польшей, в результате чего НАТО применила статью 5.\n\nХаос, который разразился после этого, опустошил европейский континент в целом. Неспособный остановить российскую военную машину, вторгающуюся вглубь Западной Европы, что привело к почти полному поражению альянса, поскольку почти все его восточные члены были аннексированы или порабощены Россией, а видный член Польша была расколота на восток и запад, как до этого Германия.\n\nНа данный момент хаос бушует в том, что осталось от бывших западных обществ."
 news.249.a: "Конец эпохи."
 news.250.t: "Революция в Германии" 
 news.250.d: ""
 news.250.a: "Интересно."
 news.251.t: "Красная Волна в Италии" 
 news.251.d: "Неверие и шок охватили Италию после победы на выборах леворадикальной коалиции социалистов и коммунистов. Многие политики в Италии и ЕС сомневались в перспективах возрождения крайне левых сил в итальянской политике, ссылаясь на предыдущие провалы правительства и разочарования итальянских левых. Однако, похоже, многие сильно ошибались, недооценивая итальянских левых. Используя недовольство рабочего и нижнего среднего класса, а также страх перед неспокойным и жестоким миром, многочисленные левые политические партии добились огромных успехов на последних выборах. Победа была настолько значительной, что эти партии смогли получить большинство в итальянском парламенте и сформировать правительство. Победившая коалиция выступила с единственным, но триумфальным заявлением, утверждая, что их победа - это "воля итальянского народа против несправедливого и деспотичного статус-кво". Однако многие итальянцы опасаются нового правительства, поскольку радикализм крайне левых и их презрение к капитализму и либеральной демократии создают впечатление, что страна может пойти в зловещем направлении."
 news.251.a: "Это только началось"
 news.252.t: "Революция в Греции" 
 news.252.d: "По мере того, как "Золотая заря" укрепляет свою власть в стране, левая оппозиция, существовавшая до прихода правительства, осудила неофашистское движение, осудив новое правительство и партию и ее лидера Николаоса Михалолиакоса. Когда политическое насилие начало достигать своего пика, основные левые силы греческой политической сцены, такие как СИРИЗА, КПГ и различные анархистские группы, объявили правительство незаконным. Различные оппозиционные политики и партии, избежавшие Марша на Афины, отступили в неизвестное место. В телевизионном обращении, которое прервало текущее вещание в Греции, они провозгласили "Греческую Народно-Демократическую Республику".\n\nПосле того, как телевизионное обращение было прервано, конкурирующее правительство начало восстание. Крайне левые ополченцы были сформированы ГНДР для захвата контроля над ключевыми районами и складами снабжения. И как только они это сделали, правительство немедленно нанесло ответный удар взрывами и вторжениями в районы, удерживаемые ГНДР. История не повторяется, но иногда она все же рифмуется. А иногда сделать и то, и другое."
 news.252.a: "История повторяется."
 news.253.t: "Рассвет Европейского союза" 
 news.253.d: "С поражением НАТО от рук России многие думали, что гвоздь в крышку гроба западного либерализма был забит. Чего аналитики не смогли увидеть, так это призыва к сплочению за упавшими флагами Украины, Польши, Венгрии, Румынии и многих других. В странах по всей Европе были запрещены радикальные партии, которые обвинялись в содействии российским вторжениям. Тех, кто протестовал против войны, заклеймили как предателей и русских диверсантов и расправились с ними. В то же время в Европе возникло коллективное сознание европейского единства. И впервые в истории Западная Европа объединилась под единым знаменем: Франция, Бельгия, Нидерланды, Германия и Италия подписали Европейскую хартию, федерализировав остатки Европейского союза в единое федеральное образование, простирающееся от Лиссабона до Берлина. С сильными реваншистскими настроениями, охватившими каждую крупную европейскую столицу, кажется, что еще одна война практически неизбежна."
 news.253.a: "Интересно."
 news.254.t: "Испания охвачена насилием" 
 news.254.d: "Повторяя 1936 год, [SPR.GetName] разрывается на части.\nПолитический экстремизм и региональные движения уже давно лежат в основе правления короля Бурбонов [SPR.GetLeader] и его парламента. Ранее каталонские бунты и продолжающийся баскский терроризм были самыми крупными и заметными признаками этих скрытых напряжений с 1980-х годов, но только когда русские войска разгромили испанскую военную мощь в битве за Восточную Европу, эти напряжения начали по-настоящему закипать. С новой силой мафиози, регионалисты, фалангисты, синдикалисты, анархисты и даже предатели в законодательном органе короля, создавшем республику, воспользовались ослаблением военного аппарата и общественным резонансом, чтобы подняться по лестнице хаоса. Испания истекает кровью, ни один регион не пощажен, и напряженность перекидывается на Португалию, где экстремистские элементы, также ободренные, работают над переворотом в правительстве Лиссабона, прежде чем португальские военные смогут должным образом вернуться домой, увязнув в хаосе текущей внутренней ситуации в Испании.\n\nФормы, верные правительству короля [SPR. GetLeader] сделали все возможное, чтобы сплотиться вокруг Мадрида для обороны, но хаотичная ситуация превращает передислокацию сил в кошмар, и поскольку каждая сторона войны глубоко желает видеть Мадрид в качестве своего административного центра, людей короля осаждают все политические ополченцы от левых до правых и центральных, силы короля уже начали слабеть."
 news.254.a: "Dios Mio."
 news.255.t: "Мир в Европе" 
 news.255.d: "Месяцы кровопролитных боев наконец подошли к концу с подписанием Венских мирных соглашений. Поскольку российские войска оккупировали ключевые восточноевропейские города, такие как Киев, Варшава и Будапешт, лидеры стран НАТО решили прекратить войну и признать российскую гегемонию в Восточной Европе, поскольку российские войска приблизились к центру Западной Европы. Хотя война закончилась, внутренняя нестабильность в Западной Европе высока, поскольку многие обвиняют правительство в предательстве своих союзников на Востоке и преклонением перед русскими путем легитимизации недавно установленных пророссийских правительств в Восточной Европе, странах Балтии, Центральной Азии и Кавказском регионе. В связи с ростом радикальных левых настроений многие опасаются, что Европа вскоре столкнется с беспрецедентной внутренней турбулентностью. Тем временем в России торжества отзываются эхом по всей стране, поскольку ЛДПР рассматривается как возрождающая национальную славу России. Несмотря на вновь обретенный мир, концерт Европы, безусловно, не закончился."
 news.255.a: "Конец НАТО?"
 news.256.t: "Европейский Союз одержал победу над Россией" 
 news.256.d: "Сегодня поздно вечером оставшиеся элементы российского правительства официально и безоговорочно капитулировали перед Европейским Союзом, получив прямой приказ всем военным подразделениям прекратить боевые действия и вывести войска. Подтверждение быстро последовало от центрального командования ЕС и гражданских властей.\n\nХотя спорадические столкновения с разрозненными российскими силами продолжаются, большинство из них подчинились, и европейские подразделения в настоящее время обеспечивают безопасность ключевых городов и инфраструктуры. Военные аналитики прогнозируют полную стабилизацию обстановки в течение нескольких дней.\n\nНа внеплановом брифинге для прессы, состоявшемся вскоре после объявления, представители ЕС назвали кампанию "жестокой, но справедливой конфронтацией" - необходимым ответом на агрессию, которая "угрожала основам европейского единства." Они выразили готовность к взаимодействию с оставшимся российским руководством и пообещали гуманное обращение со всеми пленными и гражданскими лицами на оккупированных территориях - хотя детали любого послевоенного соглашения остаются неопределенными."
 news.256.a: "Интересно."
 news.257.t: "Ось вторгается в Бенелюкс" 
 news.257.d: ""
 news.257.a: "Интересно."
 news.258.t: "Террористические Акты в Восточной Европе!" 
 news.258.d: "Сегодня утром главы государств Польши, Словакии, Румынии и Болгарии объявили о том, что в их столицах и других крупных городах произошла серия терактов с применением опасных и смертоносных химических веществ. \n\nПо данным полиции, контейнеры и автомобили, начиненные огромным количеством смертоносных веществ, включая фосген, иприт, хлор и другие, были взорваны в крупных общественных местах - от станций метро до оживленных перекрестков. Десятки тысяч гражданских лиц были госпитализированы, о десятках погибших уже сообщалось.\n\nВо всех пострадавших странах введено чрезвычайное положение, а по всей стране проводятся полицейские расследования для поиска виновных. Москва опубликовала заявление, в котором возложила полную и прямую ответственность за нападения на западные правительства в рамках "Стального пакта"\n\nДо сих пор западные правительства не сделали никаких заявлений об ответственности за нападения, кроме как отвергли заявления Москвы как "обычную коммунистическую пропаганду." Однако граждане Западной Европы активно публикуют в Интернете свидетельства того, что огромное количество солдат и техники переправляется на восток, к границе с оккупированной советскими войсками Восточной Европой.\nГраждане по всей Европе опасаются, что это прелюдия к новой войне, которая вскоре разразится на континенте. Усталость от войны уже наступила: почти все страны Европы все еще восстанавливаются и приходят в себя после первой войны между НАТО и Россией, которая произошла много лет назад. Многие опасаются, что апокалиптический уровень разрушений, наблюдавшийся в последней войне, вскоре повторится..."
 news.258.a: "Господи, помоги народам Европы..."
 news.261.t: "Нью-Йорк в полнейших руинах!" 
 news.261.d: "Гражданская война в Америке неизбежно станет одним из самых кровавых конфликтов в современной истории, и с появлением в Америке партии Пайн Три это звание может стать неоспоримым.\n\nПартия Пайн Три, возглавляемая Майком Махони, сумела неистовствовать от западного побережья до восточного, разрушая городские центры и совершая всевозможные зверства по всем штатам.\n\nОднако с недавней победой партии Пайн Три в Нью-Йорке это насилие, возможно, достигло нового максимума, в течение шести часов город подвергся бомбардировке всевозможными взрывоопасными веществами, и было обнаружено, что несколько самолетов врезались в небоскребы, жители, которые не сбежали, впоследствии были казнены путем линчевания, а многие туннели метро были взорваны, после этого испытания город превратился в горящие развалины Партия Пайн Три, утверждает, что город никогда не существовал, сообщения о том, что город засаливают как часть древней традиции, наводняют Интернет.\n\nМеждународное сообщество выразило шок в связи с этим актом и потребовало немедленного суда над Майком Махони международным судом и того, чтобы его фракция отказалась от всех ранее захваченных территорий, Майк Махони отреагировал, заявив, что международное сообщество должно "покончить с собой", и отказался от дальнейших контактов."
 news.261.a: "И мир продолжал наблюдать..."
 news.262.t: "Греческое Правительство Свергнуто!" 
 news.262.d: "После сокрушительного поражения, понесенного от русских в войне в Восточной Европе, внутренняя ситуация в Греции превратилась в бомбу замедленного действия. Греческая экономика, и без того страдающая от последствий Второй американской гражданской войны и краха Ближнего Востока, полностью разрушилась, что усугубилось отчаянными действиями правительства в военное время. Греческая "Золотая заря", неофашистское движение с быстро растущей базой поддержки, отправила армию из 10 000 сторонников на марш в Афины, вынудив правительство уйти в отставку.\n\nПосле свержения правительства образовался опасный вакуум власти, как зияющая рана. Поскольку военные не стоят на той или иной стороне, и только малая часть населения лояльна новому правительству, осталось совсем немного времени до того, как ситуация в Греции быстро перерастет в гражданский конфликт."
 news.262.a: "Новая заря восходит в Греции"
 news.263.t: "Правительство Гаити свергнуто!" 
 news.263.d: "На фоне социального хаоса и последствий убийства президента Жовенеля Моиза теневая группировка, известная как FRG9, успешно свергла правительство Гаити, назначив печально известного главаря банды Джимми Шеризье новым лидером карибского государства.\n\nПолитический вакуум, созданный убийством Моиза в июле 2021 года, привел к быстрому нарушению общественного порядка, а бандитское насилие и массовые протесты стали ежедневными явлениями на Гаити. FRG9, ранее неизвестная военизированная организация, вышла из этого хаоса, пообещав стабильность и защиту гаитянскому народу.\n\nВ ходе быстрой и скоординированной операции FRG9 захватила контроль над ключевыми правительственными зданиями, штаб-квартирой национальной полиции и президентским дворцом в Порт-о-Пренсе при минимальном сопротивлении деморализованных сил безопасности. Группировка также установила контроль над основными дорогами, аэропортами и коммуникационной инфраструктурой, фактически установив контроль над страной. Джимми Шеризье, бывший офицер полиции, ставший главарем банды, а ныне самопровозглашенный президент Гаити, обратился к нации с телеобращением. Он утверждал, что неспособность правительства справиться с ухудшающейся ситуацией в области безопасности и повсеместной коррупцией стала причиной государственного переворота. Шеризье пообещал навести порядок и перестроить нацию, призвав граждан поддержать его руководство."
 news.263.a: "В Порту теперь есть не только принц"
 news.264.t: "Франция берет на себя руководство НАТО" 
 news.264.d: "В результате исторического поворота событий Франция официально стала лидером НАТО, поскольку в отсутствие США альянс сталкивается со все более опасной ситуацией в сфере глобальной безопасности.\n\nПрезидент [FRA.GetLeader], подчеркивая необходимость сильного европейского единства, пообещал укрепить потенциал коллективной обороны НАТО. Ожидается, что французская администрация будет уделять приоритетное внимание европейской военной интеграции, стремясь создать прочную основу для региональной безопасности. Аналитики подчеркивают, что [FRA.GetLeader] может воспользоваться этой возможностью, чтобы пересмотреть стратегические цели НАТО, сделав акцент на более автономной европейской оборонной политике.\n\nПосле того как Франция встала у руля, мир наблюдает за тем, как она будет ориентироваться в сложностях международных отношений и изменять будущее альянса."
 news.264.a: "Интересно"
 news.265.t: "Германия берет на себя руководство НАТО" 
 news.265.d: "Германия официально возглавила НАТО, приняв на себя руководство в период беспрецедентной неопределенности после распада Соединенных Штатов.\n\nКанцлер Германии призвала к единому европейскому ответу на возникающие угрозы, подчеркнув необходимость солидарности и коллективных действий среди членов НАТО. Администрация Германии стремится укрепить военное сотрудничество и увеличить расходы на оборону по всей Европе, чтобы противостоять потенциальным агрессорам. Наблюдатели отмечают, что лидерство Германии может стать предвестником новой эры европейской напористости в вопросах безопасности, поскольку страна стремится заполнить пустоту, оставленную бывшей сверхдержавой.\n\nПо мере того как НАТО поворачивается под руководством Германии, за последствиями для трансатлантических отношений и региональной безопасности пристально следят как союзники, так и соперники."
 news.265.a: "Интересно"
 news.266.t: "Соединенное Королевство берет на себя руководство НАТО" 
 news.266.d: "Великобритания приняла на себя руководство НАТО и стала играть важнейшую роль в условиях, когда мир борется с последствиями распада Соединенных Штатов.\n\nПремьер-министр Великобритании сформулировал видение НАТО, которое ставит во главу угла стабильность и устойчивость в условиях неспокойной мировой обстановки. Правительство Великобритании стремится укрепить альянсы с оставшимися странами-членами, одновременно решая новые проблемы безопасности, возникшие в условиях отсутствия американского влияния. Аналитики полагают, что лидерство Великобритании может способствовать возобновлению сотрудничества между странами НАТО и восстановлению позиции Британии как центрального игрока в обеспечении европейской обороны и безопасности.\n\nПока НАТО вступает в эту новую главу под руководством Великобритании, последствия для динамики глобальной безопасности и будущее альянса остаются первостепенной проблемой для международных наблюдателей."
 news.266.a: "Интересно"
 news.267.t: "Русские избавляются от Ленина"
 news.267.d: "Недавно новое российское правительство приказало коренным образом изменить структуру общества - вынести тело Ленина из Мавзолея. Это было сделано без какой-либо широкой презентации или освещения, чтобы не привлекать слишком много внимания.\nМногие антикоммунисты высказались в поддержку такого решения, усмотрев в нем вынос "большевистского дьявола" со Святой площади, и с нетерпением ждут новых антибольшевистских законов, которые, как они выражаются, "восстановят справедливость".\nМестонахождение тела Ильича неизвестно, и многие утверждают, что заявление ЛДПР о том, что они "похоронили его там, где он хотел", является ложью, а тело было утилизировано менее уважительно.\n\nКак бы то ни было, это знаменует собой огромную перемену в российской парадигме, поскольку могилу Ленина не трогали даже после распада Советского Союза, при Ельцине и Путине. Правительство Жириновского показывает себя гораздо более радикальным, чем его предшественники, когда дело доходит до антикоммунистической инициативы."
 news.267.a: "Поделом кровавому тирану!"
 news.267.b: "Конец эпохи."
 news.268.t: "Миссия ООН в Соединенных Штатах" 
 news.268.d: ""
 news.268.a: "Интересно"
 news.269.t: "Организация Объединенных Наций обеспечивает безопасность Майами"
 news.269.d: "После нескольких часов непрекращающихся беспорядков, мародерства и всеобщей паники город Майами перешел под временный контроль миротворцев Организации Объединенных Наций. Вмешательство произошло после того, как картель Ла Раза, закрепившийся на юге Флориды, был вытеснен из города в ходе ожесточенной операции. Миротворцы ООН отвоевали город у картеля, который воспользовался раздробленностью управления Флоридой, чтобы захватить контроль.\n\nОрганизация Объединенных Наций объявила Майами и его окрестности протекторатом и планирует сделать его центром массового переселения беженцев, к ужасу губернатора Рона ДеСантиса и остальных жителей. "Флорида не будет подчиняться диктату международного органа", - заявил ДеСантис, хотя его войскам не хватает ресурсов для обеспечения безопасности всего штата.\n\nГенеральный секретарь ООН Антониу Гутерриш еще не прокомментировал операцию, поскольку в Совете Безопасности ведутся дебаты о более широких последствиях этого вмешательства. Впервые в современной истории перед ООН стоит задача стабилизации и управления территорией на американской земле, что поднимает глубокие вопросы о суверенитете и глобальной реакции на крах США."
 news.269.a: "ООН? Что-то делает?"
 news.270.t: "Бахмут взят после тяжёлого [SOV.GetAdjective]ого наступления"
 news.270.d: "Киев, Укринформ\n\n[SOV.GetAdjective]ие силы захватили Бахмут после многомесячной осады, которая превратила город в руины и истощила обе стороны. Наступление началось с непрерывных бомбардировок украинских оборонительных линий, окружающих Часов Яр и восточные подступы, что вынудило киевские войска отступить в разрушенные промышленные кварталы города. [SOV.GetAdjective]ая пехота, поддерживаемая бронетехникой и нерегулярными подразделениями, продвигалась улица за улицей по заваленным обломками проспектам, постепенно затягивая петлю вокруг защитников. Украинские войска в течение нескольких недель удерживали ключевые перекрестки, используя каждое разрушенное здание в качестве импровизированного укрепления. [SOV.GetAdjective]ие силы ответили неустанным давлением, вынудив украинские подразделения отступить к западной окраине, поскольку пути снабжения становились все более уязвимыми для артиллерийских и дронных ударов. \n\nРешающий момент наступил, когда [SOV.GetAdjective]ие войска прорвали оборону в районе северной железнодорожной линии, перерезав последний стабильный коридор для украинского подкрепления. После серии последних арьергардных действий Киев приказал оставшимся войскам отступить на второстепенные оборонительные позиции дальше на запад, оставив Бахмут под полным [SOV.GetAdjective]им контролем.\n\nМосква теперь провозглашает захват Бахмута стратегической победой, хотя оставленные разрушения и ошеломляющие потери с обеих сторон свидетельствуют о том, что эта битва запомнится не столько своими достижениями, сколько изнурительной борьбой."
 news.270.a: "Бахмут пал... Но какова цена?"
 news.270.b: "Прогнившая сердцевина разрушается сама по себе!"
 news.270.c: "Гоните фашистов назад!"
 news.271.t: "Мир в Европе"
 news.271.d: "Мир наконец-то воцарился в Европе после нескольких месяцев кровопролитного конфликта по всей Восточной Европе, поскольку дипломаты из России и НАТО встретились, чтобы положить конец войне. В связи с оккупацией советскими войсками ключевых городов Восточной Европы, включая Будапешт, Варшаву и Киев, и тысячами погибших солдат политики по всему НАТО решили, что война должна наконец закончиться. На встрече в Вене соглашения признали восстановление социалистических государств по всей Восточной Европе и узаконили недавно установленные социалистические правительства на Украине, в странах Балтии, Центральной Азии и на Кавказе. В то время как Венские мирные соглашения столкнулись с массовой негативной реакцией внутри страны, рассматриваемой как предательство европейских союзников большевизму, многие вздыхают с облегчением, что война подошла к концу. В России торжества эхом отдаются по всей стране в связи с окончательным возвращением."
 news.271.a: "Трагедия для НАТО"
 news.272.t: "Образование Европейского Союза"
 news.272.d: "То, что еще недавно казалось политической фантазией, теперь материализовалось в полной мере. На исторической утренней пресс-конференции европейские лидеры объявили об официальном отказе от национального суверенитета в пользу единого федерального образования - Европейского союза. В отличие от предшествовавшего ему слабого экономического блока, это новое супергосударство будет обладать объединенными вооруженными силами, централизованной бюрократией и единой экономической структурой, нацеленной на полную внутреннюю интеграцию.\n\nПо всему континенту, от столиц мегаполисов до сельских деревень, люди выходят на улицы в знак торжества. За рубежом, однако, растет беспокойство - некоторые называют это событие "очередной победой глобалистов"\n\nБудет ли это амбициозное новое государство разрушено под давлением конкурирующих национальных интересов или воплотит в жизнь видение тех, кто провозгласил его "концом истории," пока неясно."
 news.272.a: "Интересно"

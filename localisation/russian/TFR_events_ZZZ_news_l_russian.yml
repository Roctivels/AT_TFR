 news.401.t: "Создание Западноафриканской Федерации"
 news.401.d: "В то время как мир, казалось бы, погряз в конфликтах и разделениях, западная Африка преподносит сюрприз - объединение Буркина-Фасо и Кот-д'Ивуара. На протяжении большей части XXI века на континенте бушуют войны, многие государства охвачены гражданской войной и беспорядками. В связи с этим правительство Буркина-Фасо и Кот-д'Ивуара при поддержке и посредничестве Франции официально ратифицировали объединение двух государств, которые теперь образуют "Западноафриканскую федерацию". Правительства обеих стран опубликовали совместное заявление, в котором говорится, что этот шаг направлен на т "обеспечение лидерства и стабилизирующей силы в регионет ". Франция также публично приветствовала создание Федерации, широко рекламируя, что французская нация с большим энтузиазмом помогает африканским странам строить лучшее будущее. Однако некоторые соседние государства и наблюдатели из-за рубежа раскритиковали этот шаг как скрытую попытку Франции утвердить свое влияние на территории, которую она когда-то пыталась колонизировать. Пока неясно, действительно ли этот шаг принесет мир и стабильность в западную часть Африки."
 news.401.a: "Благословенный Дождь над Африкой"
 news.401.b: "Вопиющий колониализм!"
 news.401.c: "Будущее Африки!"
 news.402.t: "Формирование Сахельской федерации"
 news.402.d: "Сегодня наступил очередной исторический момент для Африки: лидер Мали Ассими Гоита, лидер Буркина-Фасо Ибрагим Траоре и лидер Нигера Абдурахаман Тчиани собрались сегодня в Бамако, чтобы подписать соглашение об объединении своих стран в единую Сахельскую Федерацию.\n\nСоглашение официально заявляет, что Мали, Буркина-Фасо и Нигер будут объединены в единое государство, их экономические, военные, дипломатические и другие институты будут объединены соответствующим образом. \n\nНесмотря на то, что каждая страна в составе Федерации сохраняет определенную степень автономии, [MLI.GetLeader] был единогласно избран главой нового государства вновь сформированным парламентом Сахеля, как утверждают местные источники, не без согласия других лидеров.\n\nСотрудничество трех стран уже принесло свои плоды: очень большой скачок в экономическом и культурном развитии, и, конечно же, победа над поддерживаемой Западом ЭКОМОГ, которая была бы невозможна без этого сотрудничества. Мир с интересом наблюдает за тем, как новая страна делает первые шаги в будущее."
 news.402.a: "Африка Не Далека"
 news.402.b: "Будущее Западной Африки!"
 news.402.c: "Российская марионетка!"
 news.403.t: "Сахель одержал победу в Западной Африке"
 news.403.d: "Сегодня из западноафриканского региона Сахель приходят важные новости: лидеры Сахельского пакта безопасности объявили о капитуляции последних сил ЭКОМОГ и о полной победе, цитирую: "антиимпериалистических сил в борьбе с неоколониализмом и его прислужниками."\n\nВ своей речи и на последующей пресс-конференции лидеры альянса пообещали, что побежденные страны не останутся под военной оккупацией и что будет создан честный и справедливый альянс с их новыми правительствами, которые теперь будут учитывать интересы как своих граждан, так и всего региона в целом.\n\nЭто стало еще одним ударом по практически несуществующему мировому порядку, поскольку Африка, похоже, консолидируется на пути к тому, чтобы стать равным игроком на мировой арене, так как страны выразили заинтересованность в сотрудничестве с большинством мировых держав, за исключением Европы и Америки - или того, что от них осталось.\n\n\nВремя покажет, что ждет регион в будущем, поскольку он одновременно полон сомнений и надежд."
 news.403.a: "Горящие пески пустыни"
 news.403.b: "Братья Навсегда!"
 news.403.c: "Merde."
 news.404.t: "ЭКОМОГ одержал победу в Западной Африке"
 news.404.d: "Мир, похоже, возвращается в Западную Африку, поскольку коалиция стран вышла победителем из войны с соседними странами и воинствующими группировками. Когда Европа и Америка погрузились в войну, многие группы и страны воспользовались возможностью возобновить вооруженную борьбу. Альянс ЭКОМОГ, коалиция различных западноафриканских стран, был одной из этих сторон и, наконец, вышел победителем, сдавшись своим врагам. Перед конференцией иностранных лидеров, высокопоставленных лиц, журналистов и политиков представители альянса заявляют, что альянс будет действовать как стабилизирующая сила в регионе и сдерживать иностранное вмешательство. Многие африканцы теперь поддерживают мир, установленный альянсом, особенно в связи с их обещанием бороться с иностранным вмешательством в дела Западной Африки."
 news.404.a: "Горящие пески пустыни"
 news.404.b: "Борьба будет продолжаться, Африка будет свободной..."
 news.404.c: "Victoire!"
 news.405.t: "Военный Переворот в Мали!"
 news.405.d: "Во вторник Мали погрузилась в политическую суматоху, когда военные свергли президента Ибрагима Бубакара Кейту в результате переворота, последовавшего за месяцами нарастающих протестов и недовольства населения. Взбунтовавшиеся солдаты, назвавшие себя Национальным комитетом спасения народа, во главе с полковником Ассими Гойтой, задержали Кейту и высокопоставленных чиновников, обвинив правительство в коррупции, экономической некомпетентности и неспособности подавить растущее исламистское повстанческое движение. \n\nПереворот начался с того, что солдаты взяли под контроль военную базу Кати недалеко от столицы, а затем быстро захватили ключевые правительственные здания в Бамако. Вскоре после задержания Кейта выступил по национальному телевидению, объявив о своей отставке и роспуске парламента, заявив: "Я не хочу, чтобы проливалась кровь, чтобы я оставался у власти". \n\nМеждународная реакция была быстрой: такие организации, как ЭКОВАС, Африканский союз и Организация Объединенных Наций осудили переворот и призвали к немедленному возвращению к гражданскому правлению. Захват власти военными вызвал опасения по поводу и без того хрупкой стабильности Мали, а также всего западноафриканского региона."
 news.405.a: "Африка есть Африка."
 news.405.b: "Гойта!"
 news.405.c: "Вызывает Волнение."
 news.406.t: "Военный Переворот в Буркина-Фасо!"
 news.406.d: "Длительная борьба Буркина-Фасо с джихадизмом принесла еще одну жертву: правительство президента Поля-Анри Дамибы пало в результате переворота, до жути похожего на тот, который привел его к власти менее чем за год до этого. Новый временный президент (и самый молодой мировой лидер) Ибрагим Траоре обвинил французские войска в неспособности страны подавить исламистское повстанческое движение и поклялся расторгнуть соглашения с Парижем.\n\nПосле нескольких лет российского вмешательства и роста антифранцузских настроений геополитические игры, несомненно, повлияли на ход политики Буркина-Фасо. Уже сейчас военные сотрудничают только с российской ЧВК "Вагнер Групп", а французские военные и культурные учреждения в стране сталкиваются с гневом толпы."
 news.406.a: "Бурки-что?"
 news.406.b: "Траоре - мой герой."
 news.406.c: "По крайней мере, у нас все еще есть Нигер, верно?"
 news.407.t: "Военный Переворот в Нигере!"
 news.407.d: "Напряженность в Нигере достигла точки кипения, когда военные внезапно свергли правительство президента Мохамеда Базума. Генерал Абдурахаман Тчиани и его войска взяли под контроль ключевые институты, задержали президента и объявили о приостановке действия конституции. Ссылаясь на разгул коррупции, ухудшение безопасности и экономическую неэффективность, поддерживаемая Вагнером военная хунта заявила, что переворот был необходим для восстановления порядка в стране.\n\nБыстрый захват власти знаменует собой четвертый успешный переворот в регионе Западной Африки, усиливая опасения по поводу углубления нестабильности и антифранцузских настроений по всему Сахелю. Международное осуждение было быстрым, а поддерживаемый Западом ЭКОВАС призвал к немедленному возвращению к демократическому правлению.\n\nНа фоне этого некоторые политологи предупреждают, что в Западной Африке может начаться новое геополитическое противостояние, поскольку внешние силы борются за влияние на будущую траекторию развития региона."
 news.407.a: "Без Комментариев..."
 news.407.b: "Верным путём идут!"
 news.407.c: "О, да ладно!"
 news.408.t: "В Сенегале новый президент!"
 news.408.d: "Бассиру Диомайе Файе был избран президентом Сенегала с 54,3% голосов избирателей, бросив вызов давнему влиянию Франции в регионе. Видный деятель африканского националистического движения, Файе вел кампанию за снижение иностранной зависимости и выступал за большую экономическую независимость.\n\nЕго избрание произошло на фоне политических потрясений и переворотов в соседних странах, что еще больше уменьшило доминирование Франции в Западной Африке. Сейчас, когда Сенегал вступает в новую эру руководства, наблюдатели внимательно следят за тем, как Фэй будет балансировать между необходимостью самостоятельности и важностью регионального сотрудничества.\n\nПобеда Фэя представляет собой поворотный момент в политике Западной Африки, подчеркивая тенденцию поиска странами альтернатив традиционным западным альянсам. С его приходом к власти Сенегал позиционирует себя в новом геополитическом ландшафте, где соперничество между поддерживаемым Францией ЭКОВАС и поддерживаемыми Россией странами Сахеля продолжает усиливаться."
 news.408.a: "Все ещё без комментариев."
 news.408.b: "Деколонизация НЕМЕДЛЕННО!"
 news.408.c: "Хуже ведь не будет... верно?"
 news.409.t: "Евразия Объявляет Войну Западу!"
 news.409.d: "Александр Дугин, Верховный лидер Евразии, объявил священную войну западному глобализму. В результате евразийские армии пересекли границы Кубани и Украины и начали неизбирательные бомбардировки всех враждебных территорий. Страны НАТО объявили о тотальной военной мобилизации против того, что они считают величайшим злом. Солдаты из Евразии и Европы фанатично преданы своему делу.\n\nВойна, похоже, является войной фанатичной преданности, которая наверняка превратит европейский континент в пустошь.\n\nНароды мира с ужасом наблюдают, как Евразия начинает свой крестовый поход, а запад отчаянно сопротивляется этому." 
 news.409.a: "Конец близок."
 news.410.t: "Победа Евразии в Европе!"
 news.410.d: "Евразийское государство одержало убедительную победу в жестокой битве на европейском континенте, сокрушив своих врагов. Это событие стало началом нового мирового порядка, предсказанного Дугиным.\n\nВ Москве состоялся грандиозный парад, в котором приняли участие тысячи солдат и военной техники. Горожане с воодушевлением отмечали победу над своими "сатанинскими" противниками. Сам Дугин выступил на сцене, провозгласив наступление новой эры для всего человечества.\n\nНесмотря на огромные человеческие жертвы и разрушения, вызванные Второй европейской войной, мир теперь можно назвать вечным. Никто на европейском континенте больше не может соперничать с Россией или представлять для неё какую-либо угрозу.\n\nБудущее Европы теперь в руках властей, находящихся в Кремле. Их видение - евразийский союз, контролируемый преданными защитниками интересов всех своих граждан." 
 news.410.a: "Глобализму пришёл конец." 
 news.411.t: "Навальниская Россия вторгается на Кубань!"
 news.411.d: "Сегодня Россия начала спецоперацию по защите Кубанской Республики, что стало беспрецедентным актом агрессии против демократического государства в Восточной Европе. Власти Кубани уже объявили о введении режима чрезвычайного положения и обратились к Украине с официальной просьбой о защите от российской агрессии.\n\nПрезидент России Алексей Навальный выступил с речью, в которой изложил своё видение будущего Европы. Он потребовал, чтобы все войска НАТО покинули территорию России под страхом серьёзных последствий. Кажется, что многие россияне поддерживают эти реваншистские заявления.\n\nСтраны НАТО уже готовы дать ответ на эту угрозу с востока. К сожалению, война в Европе снова может стать реальностью." 
 news.411.a: "Великое повторение." 
 news.412.t: "Россия Провозглашает Победу в Европе!"
 news.412.d: "После нескольких месяцев кровопролитных сражений по всей Европе российские Силы самообороны одержали победу над объединёнными армиями НАТО. Президент России Алексей Навальный выступил с триумфальной речью, в которой объявил о победе российского народа.\n\nТысячи граждан собрались на Красной площади в Москве, чтобы отметить этот знаменательный день. Кульминацией парада стала песня в исполнении известного исполнителя ШАМАНА.\n\nНесмотря на огромные человеческие жертвы и разрушения, вызванные Второй европейской войной, мир теперь можно назвать вечным. Никто на европейском континенте больше не может конкурировать с Россией или представлять для неё угрозу. Будущее Европы теперь определяется властями в Кремле, и их видение заключается в создании равного и демократического сообщества для всех его граждан." 
 news.412.a: "Воля масс восторжествовала."
 news.413.t: "Победа ВАОИ в Великой Азиатской Войне"
 news.413.d: "Немногие регионы на Земле, как Азиатско-Тихоокеанский, постоянно находятся на грани конфликта. С момента окончания Второй мировой войны здесь происходили затяжные пограничные столкновения в Южной Азии, периодические партизанские войны в Индокитае, напряженное военное противостояние за 38-й параллелью и в Тайваньском проливе. Каждая конфронтация казалась лишь искрой на пути к полномасштабной войне. Однако теперь кажется, что затянувшаяся Великая азиатская война наконец-то ослабевает.\n\nВосточноазиатская оборонная инициатива, в которую входят такие страны, как Китай, Северная Корея и Пакистан, стала окончательным победителем в этой затянувшейся войне. Значительные жертвы, принесенные этим альянсом, противостоящим империалистической гегемонии, сделали их поборниками справедливости для половины населения Земли. Что касается проигравших - так называемой ОДТО, - то они столкнулись с перспективой быть окончательно лишенными фасада "демократии" и предстать перед лицом народного возмездия."
 news.413.a: "Один только мир - бесценен."
 news.414.t: "Победа ОДТО в Великой Азиатской Войне"
 news.414.d: "Немногие регионы на Земле, как Азиатско-Тихоокеанский, постоянно находятся на грани конфликта. С момента окончания Второй мировой войны здесь происходили затяжные пограничные столкновения в Южной Азии, периодические партизанские войны в Индокитае, напряженное военное противостояние за 38-й параллелью и в Тайваньском проливе. Каждая конфронтация казалась лишь искрой на пути к полномасштабной войне. Однако теперь, похоже, затянувшаяся Великая азиатская война, возможно, наконец, пойдет на убыль.\n\nОрганизация Договора Тихоокеанской Обороны, в которую входят Япония, Австралия и Индия, вышла окончательной победительницей в этом затянувшемся конфликте. Альянс демократических стран пошел на значительные жертвы, доказав, что является защитником свободы для половины населения Земли. Что касается побежденных - ВАОИ во главе с Китаем, - то их ждет неизбежное искупление и полная потеря способности снова вести войну."
 news.414.a: "Один только мир - бесценен."
 news.415.t: "Большая Война в Азии!"
 news.415.d: "С момента окончания Тайваньской войны все считали дни до этого момента. Война между двумя самыми представительными гигантскими военными альянсами эпохи после холодной войны, ВАОИ и ОДТО, официально началась. Люди сразу же назвали эту новую войну "Великой азиатской войной"\n\nЭто название может напомнить некоторым о Тихоокеанском театре Второй мировой войны и милитаристской Японии, так называемой "Большой восточноазиатской войне", но масштаб и характер этого конфликта намного превосходят все предыдущие конфликты в Азиатско-Тихоокеанском регионе. Некоторые считают, что Китай с его огромным населением, мощным промышленным потенциалом и крупнейшей в мире армией, а также его союзники по ВАОИ имеют непреодолимое преимущество над своими противниками. Кроме того, страны-члены ВАОИ могут использовать родину Китая в качестве стабильной тыловой базы, используя преимущества внутренних линий операций. С другой стороны, утверждается, что ОДТО, возглавляемая Японией, географически окружает и блокирует Китай, а обширные морские пространства, контролируемые ОДТО, обеспечивают морское господство и стабильные торговые маршруты. Кроме того, ОДТО состоит в основном из "демократических наций", что дает ей идеологическое преимущество перед "авторитарной" ВАОИ."
 news.415.a: "Огонь разгорается, обжигая Азиатско-Тихоокеанский регион."
 news.415.t.1: "Китай Начинает Крупномасштабную Военную Операцию"
 news.415.d.1: "Как раз в то время, когда мир все еще оценивал, будет ли продолжаться эскалация напряженности в Азиатско-Тихоокеанском регионе, Китайская Народная Республика на рассвете начала крупномасштабную военную операцию, нанеся удары по многочисленным целям в Японии, Индии и других странах-членах ОДТО.\n\nПо данным разведки из Австралии, Народно-освободительная армия сосредоточила силы вокруг Тайваня, а Восточно-Китайское и Южно-Китайское моря переведены на режим военного времени. Флоты НОАК и ударные подразделения дальнего действия перекрыли основные морские пути и нанесли точные удары по многочисленным целям на территории острова.\n\nПосле начала военных действий Китай заявил о своем намерении "тщательно отплатить за столетие унижения от рук империалистических держав" и поклялся покончить с остатками старого порядка путем победы. Аналитики сходятся во мнении, что эта война может стать одной из самых разрушительных региональных войн XXI века, в которой будет задействовано более трех миллиардов человек, которая охватит три океана, а жертвы и экономический ущерб могут быть неисчислимыми - с учетом возможного применения оружия массового уничтожения."
 news.415.a.1: "Один устоит, другой падет..."
 news.416.t: "Вторая Битва за Сеул"
 news.416.d: "Недавно ОДТО организовал кампанию по захвату Сеула. После интенсивных боев ОДТО вернуло себе контроль над районом.\n\n После захвата Сеула ОДТО может опираться на современный городской ландшафт города как на естественный барьер для более эффективного решения корейского конфликта. Однако ситуация остается мрачной. Несмотря на временную победу ОДТО, они все еще сталкиваются с угрозой со стороны относительно неповрежденных вооруженных сил ВАОИ. Кроме того, проблема большого количества перемещенных жителей Сеула после двух сражений подвергает испытанию способность ОДТО к управлению.\n\nС другой стороны, ВАОИ должны столкнуться с реальностью потери и восстановления Сеула, что доказывает, что ОДТО все еще сохраняет значительный боевой потенциал. Силы ВАОИ должны решить этот вопрос в ближайшие дни."
 news.416.a: "Возвращение ОДТО"
 news.417.t: "Смерть Уолл-Стрит"
 news.417.d: "США погружаются в глубокий кризис, последствия которого ощущаются по всему миру. В последние месяцы страна столкнулась с острейшим политическим кризисом, сопровождающимся ростом политического насилия и резкой поляризацией общества. Усилившаяся волна коронавирусной инфекции лишь усугубила ситуацию, вызвав массовые потери рабочих мест и перегрузку системы здравоохранения.\n\nНа фоне этих событий уровень жизни населения стремительно снизился. Экономика страны оказалась парализована, импорт и экспорт резко сократились, а цены на товары первой необходимости взлетели. Финансовый сектор был не готов к такому развитию событий. Американские банки неожиданно ввели ограничения на снятие средств, сославшись на "критический дефицит ликвидности". Это решение вызвало волну паники среди населения, которая привела к массовой распродаже активов и переводу сбережений в наличные деньги.\n\nФинансовые рынки США рухнули, что мгновенно отразилось на экономиках других стран. Мировая экономика оказалась на грани коллапса, фондовые индексы стремительно падают, валюты обесцениваются. Политическая нестабильность в США только усугубляет глобальный кризис, который уже называют одним из самых разрушительных в современной истории."
 news.417.a: "Мир на грани коллапса"
 news.418.t: "Найджел Фарадж Побеждает на Внеочередных Выборах в Великобритании!"
 news.418.d: "Великобритания переживает серьезный кризис после поражения НАТО в европейской войне и последующего распада. Правительство страны потеряло доверие народа.\nНедельные протесты заставили британское правительство уступить и начать подготовку к внеочередным выборам в стране. Уже в первые дни кампании победитель был очевиден - Найджел Фарадж и его партия Reform UK. Их громкие лозунги и популистские тезисы получили широкую поддержку, а самого Фараджа считали "решателем проблем"\nРеформа Великобритании выиграла выборы с поразительными результатами. Их оппоненты из предыдущей администрации получили почти ноль мест, а другие партии имели незначительные показатели и не смогли сформировать согласованную оппозицию. Похоже, Фарадж сможет переделать британское общество по своему усмотрению.\n\nВ своей победной речи вскоре после результатов выборов Фарадж заявил: "Британия сломлена. Сломана коррумпированными бюрократами и клептократическими тори. Она охвачена пламенем вредной иммиграции и скована тиранами Брюсселя. Но мы спасем ее. Британский народ всегда сталкивался с трудностями, и мы уже не раз спасали нашу страну. Мы спасем ее снова! Мы будем строить разумную политику, искать партнеров, а не врагов, и реформировать Британию!""
 news.418.a: "Последняя надежда Британии?"
 news.419.t: "Великобритания присоединяется к ОДКБ!"
 news.419.d: "Гражданская война в Британии подходит к концу. Последние оставшиеся силы "повстанцев" зачищаются. В это время Найджел Фарадж сделал громкое заявление о том, что Великобритания подает заявку на вступление в ОДКБ.\nВ своей речи он сказал: "Мы видели, как тираны в Брюсселе финансировали и снабжали экстремистских повстанцев, выступающих против нашего демократически избранного правительства и наших институтов. Я решил присоединиться к российскому альянсу ОДКБ, потому что там уважают суверенитет других стран. Россия была первой страной, которая отреагировала на наш кризис с помощью и состраданием. Мы все хотим мира, но мы также должны быть готовы защитить себя от угроз. Насколько я вижу, эти угрозы исходят от еврократов и их так называемой "демократии"..."\n\n Заявление было ратифицировано, и король согласился со многими положениями, высказанными его премьер-министром. Русские были очень рады приветствовать нового члена своей фракции. Во многих городах России прошли митинги с лозунгами "Фарадж, мы с тобой!" и "Британец и русский - братья навек!"\n\nОДКБ совместно с Великобританией уже запланировала на конец этого года специальный сценарий учений, получивший название "FORTRESS ALBION"."
 news.419.a: "Непотопляемый российский авианосец."
 news.420.t: "Россия Побеждает во Второй Европейской Войне"
 news.420.d: "Когда древние звероподобные основные боевые танки Т-14 "Армата" с грохотом пронеслись по брюссельской площади Гран-Плас, сокрушая стеклянные занавески, выпавшие из разбомбленной штаб-квартиры ЕС, грандиозная война, принесшая Европе самую значительную геополитическую встряску за почти столетие, подошла к концу. Всего через несколько лет после прекращения предыдущей войны вновь разразилась Вторая европейская война. Побратимы и сужденные противники Первой европейской войны - ультраправая Российская империя под руководством Либерально-демократической партии и коммунистические Федеративные социалистические республики Европы - столкнулись, унеся миллионы тонн стали и бесчисленные жизни. В конце концов, Европе пришлось спустить свой потускневший красный флаг рабочего класса и преклонить колени перед неподвижными российскими войсками.\n\nПосле войны баланс сил на Евразийском континенте изменился. Российский лидер, увенчанный победными лаврами, торжествующе взирал на обширные территории, завоеванные его армией. На периферии континента происходили политические сдвиги в пользу России. Крайне правые партии, выступающие против истеблишмента, подобные российской Либерально-демократической партии, заполнили вакуум власти, образовавшийся после распада Европейского союза, сформировав естественную защитную оболочку для России в рамках многополярного порядка. По мере того, как мир развивался, побежденные плакали. Жизнь должна найти свой собственный путь вперед среди руин Европы."
 news.420.a: "В золотом солнечном свете белые горы и черные воды России сверкают."
 news.421.t: "Конец АСЕАН"
 news.421.d: "После краха США, который оставил глубокий след на глобальной геополитической арене, Ассоциация государств Юго-Восточной Азии (АСЕАН) столкнулась с внутренними конфликтами и разногласиями. Многие члены организации начали двигаться в разных направлениях: одни склонялись к более тесному сотрудничеству с растущим влиянием Китая, другие искали поддержку у Японии. Экономическая и политическая значимость АСЕАН резко упала, а способность организации формировать региональную политику оказалась под сомнением. В условиях усиливающейся поляризации и снижения влияния на мировую экономику, лидеры АСЕАН приняли решение о её официальном роспуске, что стало концом одной из важнейших организаций в Азии." 
 news.421.a: "Сами по себе."
 news.422.t: "Китай Признает АНОА Законным Правительством"
 news.422.d: "Пекин, Китай - сегодня международные средства массовой информации переполошились после краткого заявления Министерства иностранных дел Китая. В нем сообщалось, что президент Китая встретился с делегацией Народно-освободительной армии Америки, которая вручила свои верительные грамоты китайскому правительству и была официально признана законными представителями Соединенных Штатов.\n\nСообщается, что Министерство иностранных дел Китая разрешило дипломатам из АНОА занять помещения посольства, которые когда-то принадлежали Соединенным Штатам. Дипломаты предыдущей американской администрации теперь стоят перед суровым выбором: присягнуть на верность новому правительству или быть под конвоем посаженными на корабль, направляющийся в разоренный войной американский порт. Бывший посол США в Китае таинственно исчез, и многие считают, что он мог искать убежища в Европе или Японии, возможно, у бывших союзников.\n\nНесмотря на то, что эта новость является важной, она не стала неожиданностью. Многие считают, что два социалистических режима, расположенных по разные стороны Тихого океана, всегда были готовы к сотрудничеству, учитывая их общие идеологические и прагматические интересы. Для описания этих отношений был придуман термин "Тихоокеанский экспресс Пекин - Сан-Франциско". В Сан-Франциско бывшее китайское консульство было перепрофилировано в новое посольство США в Китае, заменив давно заброшенное посольство в Вашингтоне. Другие самопровозглашенные власти в Американской гражданской войне выразили сожаление или осуждение, но удастся ли сохранить это дипломатическое преимущество, будет зависеть от того, как АНОА проявит себя в продолжающемся конфликте."
 news.422.a: "Интересно."
 news.422.b: "Кимерика - всего лишь вопрос различных форм."
 news.423.t: "Южная Корея Подверглась Термоядерному Удару"
 news.423.d: "Согласно данным, подтвержденным прибрежным радаром раннего предупреждения в Восточно-Китайском море и несколькими синхронизированными спутниковыми группировками, ядерным ударам подверглись несколько населенных пунктов по всей Южной Корее, причем наиболее сильно пострадал столичный район Сеула. Предварительные оценки показывают, что по меньшей мере 18 ядерных боеголовок средней дальности были выпущены по центральным городским районам. После подрыва тактических боеголовок с делящимся зарядом одно из устройств - предположительно, многоступенчатая водородная бомба большой мощности - взорвалось примерно в 500 метрах над центром Сеула, мощность взрыва превысила 2 мегатонны в тротиловом эквиваленте, что стало ключевым моментом этого катастрофического удара.\n\nПолученные изображения подтверждают, что огненный шар водородной бомбы достигал в диаметре более километра, а температура грунта превышала 3000°C. Здания по обе стороны реки Хан были разрушены из-за сильного жара и ударных волн. Такие знаковые достопримечательности, как Голубой дом, здание Национальной ассамблеи, рынок Кванджанг и Сеульский вокзал, на спутниковых снимках кажутся "испарившимися" - физическая структура города фактически уничтожена. ЭМИ парализовал коммуникационные и энергетические сети по всему Корейскому полуострову. Облака радиоактивной пыли сейчас переносятся северо-западным ветром через границу полуострова.\n\nС военной точки зрения, этот удар уничтожил ядро инфраструктуры глубокой обороны союзников в Северо-Восточной Азии и серьезно повредил системы командования, контроля, связи, компьютерные и разведывательные системы (C4I). Система командования союзников в Корее была на короткое время разорвана; были введены в действие протоколы о чрезвычайных ситуациях, однако появились признаки нарушения региональной координации. Если ситуация продолжит ухудшаться, стратегическая позиция сил союзников может столкнуться с масштабным структурным коллапсом."
 news.423.a: "В наступившей тишине, кто все еще слушает канал?"
 news.424.t: "Австралия Подверглась Термоядерному Удару"
 news.424.d: "Данные орбитальной системы наблюдения Южной части Тихого океана и остаточные сигналы от выведенных из эксплуатации радиолокационных станций на материковой части Австралии подтверждают, что ядерному удару подверглись несколько регионов Австралии. Примечательно, что столица страны, Канберра, подверглась гибридному тактико-стратегическому удару высокой интенсивности.Предварительные оценки показывают, что по меньшей мере шесть тактических ядерных боеголовок были нацелены на ключевые государственные секторы, включая Парламентский холм, Министерство обороны, Канцелярию премьер-министра и судебные органы. В промежутке между этими взрывами мощное термоядерное устройство, предположительно представляющее собой многоступенчатую водородную бомбу, взорвалось примерно в 600 метрах над озером Берли-Гриффин, мощность которого, по оценкам, составила 1,2 мегатонны в тротиловом эквиваленте.\n\nНа орбитальных тепловых картах и снимках с земли видна центральная зона испарения радиусом 8 километров, в которой стерты такие достопримечательности, как здание парламента, Федеральный суд, Национальная библиотека и окружающие федеральные учреждения. Образовавшаяся в результате этого ударная волна сравняла с землей пригородные районы, в то время как радиоактивные осадки в настоящее время перемещаются на восток в сторону Сиднея, переносимые преобладающими западными ветрами.\n\nВ стратегическом плане в результате удара был выведен из строя центр командования и связи Тихоокеанского альянса в Южном полушарии. Командование Объединенных сил испытало кратковременный паралич; штаб-квартира австралийских сил обороны перешла в автоматический режим управления, а временная координационная база в Дарвине была расширена, чтобы служить основным боевым узлом. Расчеты внутри североатлантического союза указывают на приближающийся период стратегической инерции во всем Индо-Тихоокеанском регионе, поскольку вакуум власти в южной части Тихого океана быстро увеличивается."
 news.424.a: "Остались ли еще какие-нибудь маяки в Тихом океане?"
 news.425.t: "Индия Поражена Термоядерной Атакой"
 news.425.d: "Многочисленные военные наблюдательные платформы над северной частью Индийского океана подтвердили серию заметных ядерных ударов по территории Индии, при этом Нью-Дели подвергся беспрецедентному комплексному удару.Предварительный тактический анализ показывает, что двенадцать тактических ядерных боеголовок последовательно поразили ключевые административные зоны, пункты военного командования и важнейшие узлы связи. За этим последовал взрыв в воздухе водородной бомбы большой мощности примерно в 600 метрах над рекой Ямуна, к востоку от Президентского дворца. В результате взрыва образовался огненный шар шириной более 1,2 километра, а тепловые волны и волны давления охватили центр столицы в течение 30 секунд.\n\nТепловизионные снимки, сделанные с орбиты, подтверждают, что Президентский дворец, здание парламента, ворота Индии, площадь Коннот-Плейс и сектор военного командования Южного Дели были полностью разрушены из-за сильной жары. Наземные сооружения были уничтожены, что привело к массовому обрушению и значительному нарушению работы подземной инфраструктуры. Ударная волна прокатилась по столичному району, и ЭМИ разорвал как военные, так и гражданские каналы связи между Дели и остальной частью страны. Радиационное облако в настоящее время быстро распространяется вверх по течению Ганга, создавая вторичную угрозу стихийных бедствий для густонаселенных районов.\n\nВ стратегическом плане удар привел к серьезному нарушению системы командования в Южной Азии. Региональная сеть связи Тихоокеанского альянса более часа хранила молчание. Стратегические силы, дислоцированные вдоль бассейна Ганга, были приведены в состояние повышенной готовности. Многочисленные ракетные батареи дальнего радиуса действия к северу от субконтинента не отреагировали на сигнальные протоколы, что привело западную часть Индо-Тихоокеанского региона к внезапному беспорядку. По оценкам разведки, это может быть частью более широкой кампании стратегического ядерного подавления, направленной на создание крупномасштабного политического и оборонного вакуума."
 news.425.a: "Утренний туман над Гангом не может скрыть внезапного похолодания в воздухе."



 news.499.t: "Силы ВАОИ высаживаются в Японии"
 news.499.d: "Недавно, в связи с необходимостью ослабить военный потенциал ОДТО ударом по Японии, тыловой базе Восточноазиатской зоны военных действий, силы ВАОИ предприняли попытку высадиться на японской земле и успешно достигли своей стратегической цели.\n\nУспешная высадка сил ВАОИ в Японии означает один ключевой момент: миф о полном контроле флота ОДТО над Тихим океаном был разрушен. Независимо от убеждений командования ОДТО , эта высадка нанесла сильный удар по моральному духу солдат, которые непоколебимо верили в объединенный флот ОДТО . Между тем, силы ВАОИ могут воспользоваться этой ситуацией, чтобы расширить свои позиции, захватить несколько городов и одержать верх в будущих сражениях.\n\nС другой стороны, несмотря на то, что силы ВАОИ добрались до берега, ОДТО все еще сохраняет основные боевые возможности. Немедленной задачей командования ОДТО является быстрое восстановление боевого духа своих фронтовых солдат, организация новой линии обороны и попытка оттеснить силы ВАОИ обратно в море." 
 news.499.a: "День Д в Азии."
 news.500.t: "Вторая Битва за Пхеньян"
 news.500.d: "Постепенно переломив ход войны между ВАОИ и ОДТО, силы ВАОИ воспользовались возможностью начать кампанию, направленную на захват контроля над районами, прилегающими к Пхеньяну. Они успешно изгнали вооруженные силы ОДТО из этого региона.\n\nВ лагере ВАОИ, особенно в Северной Корее, этот захват был воспринят как "победа справедливости". Ликующая Корейская народная армия вошла в отвоеванную столицу, начав работу по зачистке остатков сил сопротивления и установлению базового военного управления. Китайские грузы направляются в Пхеньян по развитой железнодорожной сети.\n\nКонфликт продолжается, и борьба между ОДТО и ВАОИ еще далека от завершения. Обе стороны должны готовиться к следующему этапу военного противостояния; Пхеньян может стать только началом." 
 news.500.a: "Вернулись к тому, что было раньше? Ну, хорошо."
 news.501.t: "Битва за Пусан"
 news.501.d: "Пусан, город-хранитель, некогда спасший судьбу Республики Корея, окончательно перешел в руки элитных сил ВАОИ после поспешного ухода последнего эвакуационного флота ОДТО.\n\nС самого начала войны ОДТО мог некоторое время удерживать преимущество. Однако с вступлением в бой основных сил ВАОИ ситуация ухудшилась, несмотря на грандиозные отчеты командования ОДТО . Падение Пусана заставило даже самых оптимистично настроенных генералов ОДТО признать свою несостоятельность на корейском фронте.\n\nСейчас ОДТО все еще может полагаться на океанский барьер и свой мощный флот, чтобы сдерживать стратегические силы ВАОИ в течение некоторого времени. Однако если они не смогут одержать победу на суше, как долго продержится это морское преимущество, остается под вопросом." 
 news.501.a: "За морем лежит враг."
 news.502.t: "Битва за Осаку"
 news.502.d: "После того как ВАОИ одержала убедительную победу, город Осака на материковой части Японии стал новой зоной, контролируемой ВАОИ. Силы ОДТО могут лишь перегруппировать свои разбитые войска во время отступления, надеясь задержать продвижение ВАОИ.\n\nПадение этого южного японского города означает значительный успех ВАОИ в их кампании по высадке в Японии. В отличие от падения любого города на Корейском полуострове, потеря Осаки ознаменовала конец полного военно-морского контроля для сил ОДТО. Потеря военно-морского превосходства делает самые надежные военно-морские силы ОДТО ненадежными, нанося серьезный удар по общему моральному и боевому духу войск ОДТО.\n\n Теперь войска ОДТОдолжны разработать стратегию, чтобы задержать продвижение ВАОИ и дать достаточно времени для подготовки к предстоящим сражениям." 
 news.502.a: "Пламя войны наконец-то добралось и сюда."
 news.503.t: "Битва за Токио"
 news.503.d: "Токио, столица Японии и современный мегаполис со стальными джунглями, наконец-то пал под ожесточенной атакой сил ВАОИ.\n\nБольшое количество солдат ВАОИ, войдя в Токио, руководствуясь либо национальными настроениями, либо приказами своего начальства, систематически искали и уничтожали любые символы и сооружения, представляющие японский милитаризм, которые они могли найти, одновременно уничтожая оставшиеся силы сопротивления. К сожалению, в результате этих действий пострадали некоторые гражданские лица.\n\nДля ОДТО потеря Токио означает не только потерю столицы второй по величине страны в Восточной Азии, но и самого надежного искусственного защитного укрепления, что потенциально может привести к потере всей Японии в последующих сражениях." 
 news.503.a: "Сколько ручек нам понадобится для подписания мирного договора на этот раз?"
 news.504.t: "Вторая Битва за Токио"
 news.504.d: "Операция ОДТО по захвату Токио наконец-то вступила в завершающую стадию. После затянувшейся городской мясорубки контроль над Токио вернулся к ОДТО.\n\nЭтот город, некогда бывший олицетворением лучшего в Японии, теперь лежит в руинах. У тех солдат ОДТО, кто видел шумное великолепие Большого Токио, в сердце неизбежно зарождается чувство необъяснимой печали. Они вновь захватили Токио, но Токио в их сердцах больше нет. Город перед ними теперь не более чем стальной монстр, поглотивший бесчисленное количество жизней.\n\nНесмотря на потерю Токио, ВАОИ все еще сохраняет свое присутствие по всей Японии. Будет ли победа ОДТО лишь мимолетным возрождением перед окончательным падением, пока неизвестно." 
 news.504.a: "Возвращение."
 news.505.t: "ВАОИ Берёт Сингапур"
 news.505.d: "Под ожесточенным наступлением ВАОИ на Малайский полуостров Сингапур - финансовая жемчужина региона, важнейший узел торгового пути через Малаккский пролив и важный военный узел, соединяющий Индийский и Тихий океаны, - наконец пал.\n\nКак небольшое государство с экономической мощью, несоизмеримой с его территориальными размерами, Сингапур полагался на Запад в международных делах для сохранения своих экономических достижений и независимого статуса. С усилением противостояния между ВАОИ и ОДТО, Сингапур, продолжая придерживаться своей обычной дипломатической практики, в конечном итоге решил свою судьбу, будучи подавленным наступлением ВАОИ.\n\nС падением Сингапура, стратегическое планирование ОДТО на Малайском полуострове перестало быть эффективным. Если этот жизненно важный центр не будет восстановлен, существует риск того, что ОДТО окажется отрезанной от своих индийских союзников." 
 news.505.a: "Всё вышло из под контроля"
 news.506.t: "ОДТО Берёт Сингапур"
 news.506.d: "ОДТО полностью реализовала свой план по захвату Сингапура. При эффективной организации совместного командования силы ОДТО координировали свои операции на суше, море и в воздухе, и в итоге недавно захватили Сингапур.\n\nЭта победа знаменует собой первый успех усилий ОДТО по восстановлению связей между Индийским и Тихим океанами. Теперь, когда между Индией и ОДТО налажена эффективная связь, ВАОИ придется скорректировать свое стратегическое развертывание, чтобы противостоять новой угрозе, которую представляет постоянный приток сил ОДТО, высаживающихся из Сингапура.\n\nНесмотря на то, что Сингапур изначально встал на сторону ВАОИ в этом противостоянии, местное население добровольно организовало мероприятия по поддержке солдат ОДТО." 
 news.506.a: "Поворотная Победа."
 news.507.t: "ВАОИ Берёт Бангкок"
 news.507.d: "По ходу войны ВАОИ начала мощное наступление на Бангкок, в итоге ликвидировав военное присутствие ОДТО и установив контроль над городом.\n\nВзятие Бангкока - еще одна военная победа ВАОИ, подчеркивающая их успех в доминировании на поле боя на Индокитайском полуострове. Эта победа принесет ВАОИ значительную пользу в тактическом плане, обеспечив более выгодное географическое положение против сил ОДТО. Кроме того, Бангкок послужит новым стратегическим плацдармом для ВАОИ в Юго-Восточной Азии, заметно увеличив ресурсы, которые они смогут мобилизовать в этом регионе.\n\nИ наоборот, после поражения в Бангкоке силы ОДТО должны быстро перестроить свой личный состав, чтобы преодолеть деморализацию, вызванную этой неудачей. Эффективная реорганизация необходима для ведения тотальной войны против ВАОИ." 
 news.507.a: "Еще одна победа ВАОИ."
 news.508.t: "ОДТО Берёт Бангкок"
 news.508.d: "По мере развития конфликта ОДТО начала наступательную операцию в районе Бангкока и недавно сумела установить контроль над регионом.\n\nБангкок, будучи столицей Таиланда и современным мегаполисом, дает ОДТО значительные стратегические преимущества. Они могут использовать инфраструктуру города для создания сильных оборонительных позиций. Кроме того, развитая транспортная сеть Бангкока может способствовать наступательным операциям ОДТО против других регионов Юго-Восточной Азии. Используя это преимущество, ОДТО может быстро преследовать отступающие силы ВАОИ, добиваясь большей эффективности и получая большее стратегическое преимущество.\n\nС другой стороны, силы ВАОИ, столкнувшись с этим поражением, должны пересмотреть свои стратегические планы и скорректировать развертывание своих войск с учетом новой ситуации, сложившейся после потери Бангкока." 
 news.508.a: "Еще одна победа ОДТО."
 news.509.t: "ВАОИ Берёт Дакку"
 news.509.d: "По мере развития конфликта ВАОИ начала наступление с целью захвата Дакки, столицы Бангладеш, чтобы лучше закрепиться в Южной Азии. Недавно ВАОИ успешно взяла Дакку.\n\nПосле взятия Дакки ВАОИ создаст транспортный коридор между бангладешским фронтом и материковым Китаем, что позволит эффективно решить проблемы снабжения, возникшие во время кампании в Южной Азии. Эта военная победа также позволит ВАОИ лучше сплотить своих внутренних союзников и повысить уверенность населения страны в военных действиях, тем самым мобилизуя ресурсы для поддержки всесторонней войны против ОДТО.\n\nИ наоборот, столкнувшись с военным давлением со стороны сил ВАОИ в регионе Бангладеш, ОДТО должна пересмотреть свою стратегию в Южной Азии и направить больше ресурсов из других регионов для решения предстоящего конфликта." 
 news.509.a: "Еще одна победа ВАОИ."
 news.510.t: "ВАОИ Берёт Ченнаи"
 news.510.d: "По мере развития конфликта в Южной Азии один из крупнейших городов Индии, Ченнай, расположенный на юге страны, недавно перешел под контроль ВАОИ после скоординированного военного удара.\n\nПотеря Ченная означает, что ВАОИ успешно лишила ОДТО важнейшего транспортного узла в Южной Азии, оказав огромное давление на логистику ОДТО. Кроме того, ВАОИ получила плацдарм для дальнейших наступательных операций в индийском регионе, что значительно улучшит будущие военные операции в Южной Азии. Эта важная победа также может значительно поднять моральный дух войск ВАОИ.\n\nИ наоборот, силы ОДТО теперь сталкиваются с риском быть вытесненными из Южной Индии. Если ОДТО полностью потеряет контроль над Индией, они окажутся в невыгодном положении в полномасштабной войне." 
 news.510.a: "Еще одна победа ВАОИ."
 news.511.t: "ВАОИ Берёт Дели"
 news.511.d: "Недавно ВАОИ начали ожесточенную атаку на силы ОДТО, нацелившись на индийскую столицу. Несмотря на активное сопротивление ОДТО, они не смогли противостоять наступлению ВАОИ и были вынуждены отступить из района Дели.\n\nПадение Дели означает, что силы ОДТО не смогли изгнать ВАОИ из столичного региона. Как важнейшая часть столицы, Дели имеет исключительное значение в истории Индии. Потеря этого района, особенно для ВАОИ, которая фактически поддерживается Пакистаном, означает неудачу в борьбе за огромное количество преданных Индии. Это, скорее всего, подорвет доверие населения к продолжению борьбы с ВАОИ.\n\n С другой стороны, Пакистан рассматривает победу ВАОИ в Дели как крупный триумф в долгой истории индо-пакистанского конфликта. Население спонтанно празднует это достижение. Хотя Индия может со временем вернуть себе эту территорию, пока что победа остается за Пакистаном." 
 news.511.a: "Разгромная Победа для ВАОИ."
 news.512.t: "ВАОИ Берёт Джакарту"
 news.512.d: "После установления контроля над Малаккским проливом силы ОДТО оказались не в состоянии противостоять военным операциям ВАОИ. Терпя постоянные поражения, они в конце концов потеряли контроль над Джакартой, столицей Индонезии.\n\nПадение Джакарты дает ВАОИ значительное стратегическое преимущество. Будучи крупнейшим городом в Юго-Восточной Азии, Джакарта станет новой базой для наступательных операций ВАОИ, оказывая существенное военное давление на силы ОДТО в регионе. Более того, потеря Джакарты означает, что Индонезия лишилась своей столицы, что серьезно повлияет на боевой дух индонезийского народа и создаст огромные проблемы для эффективного функционирования центрального правительства.\n\nИ наоборот, если силы ОДТО не смогут переломить ход войны в Индонезии, они будут вынуждены отвести военные ресурсы из других регионов, чтобы предотвратить возможное нападение ВАОИ на Австралию, которая служит главной тыловой базой для ОДТО." 
 news.512.a: "Еще одна победа ВАОИ."
 news.513.t: "ВАОИ Берёт Манилу"
 news.513.d: "В ходе конфликта в Восточной Азии силы ВАОИ недавно начали наступление на Манилу, столицу Филиппин, и в итоге установили контроль над этой территорией.\n\nЗахват Манилы дает ВАОИ значительные военные преимущества. Они нейтрализовали ключевой транспортный узел ОДТО в Юго-Восточной Азии, что увеличивает стоимость снабжения ОДТО в ходе войны. Кроме того, ВАОИ может использовать Манилу как плацдарм для изгнания сил ОДТО с Филиппин и, в конечном счете, как плацдарм для удара по Австралии, главной тыловой базе союзных войск.\n\nИ наоборот, потеря Манилы означает, что прежний план ОДТО в Юго-Восточной Азии был полностью нарушен. Если ОДТО не сможет активно отреагировать на это изменение, баланс войны сильно изменится в пользу ВАОИ." 
 news.513.a: "Еще одна победа ВАОИ."
 news.514.t: "ОДТО Берёт Манилу"
 news.514.d: "Недавно ОДТО начал комплексную наступательную кампанию на Манилу, успешно изгнав из города военных ВАОИ и одержав победу.\n\nБудучи столицей Филиппин, Манила позволяет ОДТО создать центральное правительство, более соответствующее их стратегическим потребностям, и таким образом лучше контролировать регион. Кроме того, Манила может служить военной базой и транспортным узлом для ОДТО в Юго-Восточной Азии, повышая их возможности снабжения в текущей войне с ВАОИ и обеспечивая большее стратегическое преимущество для будущих конфликтов в Азии.\n\nС другой стороны, ВАОИ должны серьезно отнестись к потере Манилы и быстро скорректировать свое военное развертывание, чтобы восстановить стратегическое доминирование в предстоящих сражениях." 
 news.514.a: "Еще одна победа ОДТО."
 news.515.t: "ОДТО Берёт Исламабад"
 news.515.d: "В результате недавнего наступления сил ОДТО на Пакистан, ранее сегодня силы ОДТО объявили, что Исламабад, столица и политический центр Пакистана, теперь находится под их контролем.\n\nПотеря Исламабада наносит серьезный удар по моральному духу сил ВАОИ в Пакистане. Центральное правительство Пакистана, столкнувшееся с потерей политически значимого города и снижением способности контролировать ресурсы, теперь сталкивается с проблемой ослабления своего влияния на региональные власти. Этот сдвиг предвещает усиление политической нестабильности в будущем Пакистана.\n\nВ то же время, по всей Индии вспыхнули празднования. Многие верующие индусы считают, что Индия наконец-то одержала решительную победу над Пакистаном, и надеются, что в результате этого их жизнь улучшится.." 
 news.515.a: "Кто еще хочет еще порцию вады?"
 news.516.t: "ОДТО Берёт Гонконг"
 news.516.d: "Недавно ОДТО начала успешное наступление на Гонконг. После нескольких дней боев силы ОДТО вытеснили войска ВАОИ из района и установили контроль над Гонконгом.\n\nКак бывшая британская колония, Гонконг находится под значительным влиянием Великобритании и ее народа, несмотря на то, что центральное правительство Китая поддерживает прокитайское правительство специального административного района с 1997 года. Во время нападения ОДТО на Гонконг многие пробританские и проамериканские люди оказывали спонтанную помощь силам ОДТО. Взамен ОДТО наградила этих людей более высокими должностями в новом оккупационном правительстве.\n\nС другой стороны, падение Гонконга нанесло значительный удар по моральному духу ВАОИ, особенно среди китайских военных и гражданских лиц. Если командование ВАОИ не сможет быстро адаптироваться к сложившейся ситуации, то в обозримом будущем вероятны новые поражения." 
 news.516.a: "Будут ли на этот раз паспорта BNO?"
 news.517.t: "ОДТО Берёт Гуанчжоу"
 news.517.d: "По мере развития конфликта ОДТО организовала военную операцию, направленную на захват Гуанчжоу, и недавно получила контроль над регионом.\n\nЗахват Гуанчжоу означает, что ОДТО сможет использовать этот гигантский город на юге Китая в качестве военной базы и транспортного узла, более эффективно снабжая всю коалицию ОДТО. Кроме того, потеря этого города уменьшит военный потенциал Китая и контроль центрального правительства над югом страны, что приведет к панике в Южно-Китайском регионе. Это принесет большую пользу ОДТО в начале следующей фазы военных действий.\n\nС другой стороны, ОДТО должна направить больше гарнизонных войск для обеспечения порядка в этом районе, иначе хаотичная ситуация может создать новые проблемы для ОДТО." 
 news.517.a: "Клыки зверя были вырваны."
 news.518.t: "ОДТО Берёт Фучжоу"
 news.518.d: "Недавно силы ОДТО начали наступательную кампанию в районе Фучжоу. После нескольких дней напряженных боев силы ОДТО взяли под контроль весь район Фучжоу.\n\nОчередная военная победа ОДТО подняла боевой дух всего лагеря ОДТО. Новое направление наступления также вызвало кратковременное замешательство среди войск ВАОИ. Если силы ОДТО смогут воспользоваться этой возможностью, они смогут быстрее проникнуть в глубь Китая и расширить свои завоевания. Более того, захват Фучжоу означает дальнейшее снижение военного потенциала китайского правительства и наносит удар по военной уверенности как китайских военных, так и гражданских лиц.\n\nС другой стороны, независимо от того, каким образом ОДТО захватила Фучжоу, войска ВАОИ должны быстро удалить эту занозу с юго-восточного побережья, чтобы предотвратить возможную крупномасштабную высадку войск ОДТО." 
 news.518.a: "Клыки зверя были вырваны."
 news.519.t: "Битва за Шанхай"
 news.519.d: "Шанхай, свидетель реформ и открытости Китая и блестящая жемчужина китайской экономики, недавно подвергся десанту сил ОДТО. После нескольких дней боев он в конце концов перешел под контроль ОДТО.\n\nПадение Шанхая означает для китайского населения, поддерживающего войну, что китайские военные больше не способны защитить этот важнейший город на востоке, да и всю страну. Это сильно подорвет доверие всей нации к китайскому правительству. Кроме того, падение этого экономического центра нанесет тяжелый удар по экономике Китая, резко ослабив его способность поддерживать военные усилия.\n\nСилы ВАОИ должны скорректировать свое стратегическое развертывание и быстро переломить ухудшающуюся ситуацию, иначе в ближайшем будущем они могут потерять другие важные прибрежные города." 
 news.519.a: "Теперь это "жемчужина Запада"."
 news.520.t: "Вторая Битва за Шанхай"
 news.520.d: "Обнаружив стратегическую возможность, командование ВАОИ быстро организовало войска из соседних секторов, чтобы начать ожесточенную атаку на силы ОДТО в Шанхае и в конечном итоге вытеснить их из района.\n\nХотя Шанхай вернулся под контроль ВАОИ, силы ОДТО уже нанесли значительный урон, сделав Шанхай неспособным полностью реализовать свой потенциал в краткосрочной перспективе. Беженцы и перемещенные лица, вызванные сражением, также создали новые проблемы для командования ВАОИ, поскольку многих из них нужно было расселить и позаботиться о них. Тем временем силы ВАОИ быстро заняли оборонительные позиции, готовясь к еще одной возможной высадке войск ОДТО.\n\nС другой стороны, силы ОДТО потеряли ключевой прибрежный город и столкнулись с ощутимым военным поражением, что заставило командование ОДТО реорганизовать свои войска для предстоящих сражений." 
 news.520.a: "ВАОИ наносит ответный удар."
 news.521.t: "Битва за Нанкин"
 news.521.d: "По мере того как ОДТО захватывала несколько прибрежных городов Китая и набирала обороты в наступлении, конфликт в конце концов достиг Нанкина. После напряженных уличных боев этот важнейший город перешел в руки ОДТО.\n\nПолучив контроль над Нанкином, альянс ОДТО сможет использовать развитую транспортную сеть вокруг Нанкина для дальнейших наступлений в китайское сердце. Однако если командование ОДТО решит действовать таким образом, альянсу придется столкнуться с проблемами материально-технического обеспечения и сопротивления тыла, которые исторически были характерны для японского вторжения в Китай. На данный момент альянс ОДТО должен сосредоточиться на управлении новой оккупированной территорией.\n\nС другой стороны, хотя ВАОИ все еще имеет значительное пространство для маневра, потеря Нанкина значительно уменьшает контроль центрального правительства над Восточно-Китайским регионом. Это серьезно затрудняет продолжение военных действий. Кроме того, падение Нанкина вновь будоражит китайский народ, связывая образ центрального правительства с историческим образом националистического правительства." 
 news.521.a: "Клыки зверя были вырваны."
 news.522.t: "Вторая Битва за Нанкин"
 news.522.d: "По мере продвижения сражения командование ВАОИ тщательно изучало каждую деталь на поле боя, в итоге воспользовавшись возможностью начать наступление на Нанкин, и в конце концов восстановило контроль над городом.\n\nВзяв Нанкин, ВАОИ смогла использовать этот современный город в качестве оборонительного опорного пункта, чтобы организовать линию обороны против сил ОДТО, расположенных на востоке. В то же время, взятие города подняло моральный дух солдат ВАОИ в зоне боевых действий в Нанкине, что позволило командирам ВАОИ относительно легко справиться с предстоящими сражениями.\n\nС другой стороны, командование ОДТО сохраняет оптимизм, по-прежнему удерживая прибрежные районы, и считает, что при активных действиях взятие Нанкина - лишь вопрос времени." 
 news.522.a: "ВАОИ наносит ответный удар."
 news.523.t: "ОДТО Берёт Циндао"
 news.523.d: "По мере продвижения войны и изменения стратегических потребностей, ОДТО недавно высадилась в Циндао и успешно захватила контроль над районом.\n\nЦиндао, расположенный на южном побережье полуострова Шаньдун у Желтого моря, является важным прибрежным городом на севере Китая. Здесь находится четвертый по грузоподъемности порт в мире - порт Циндао, который также является вторым по величине внешнеторговым портом Китая. Кроме того, в Циндао сосредоточено наибольшее количество бывших резиденций современных деятелей китайской культуры. Захватив этот город, ОДТО не только получит доступ к важнейшему северному порту Китая, но и нанесет культурный удар по центральному правительству, испортив его отношения с населением и тем самым ослабив военный потенциал Китая.\n\nС другой стороны, потеря Циндао означает дальнейшее снижение контроля ВАОИ над прибрежными регионами. Если ВАОИ потеряет полный контроль над береговой линией, она будет вынуждена стратегически отступить, что приведет к невыгодному положению." 
 news.523.a: "Клыки зверя были вырваны."
 news.524.t: "ОДТО Берёт Тяньцзинь"
 news.524.d: "Недавно командование ОДТО сообщило, что силы ОДТО одержали полную победу в наступлении на Тяньцзинь и теперь полностью контролируют район Тяньцзиня.\n\nЭтот город был свидетелем истории современной китайской промышленности, от первых часов до первого аналогового электронного компьютера. А теперь он стал свидетелем страданий этой земли. Моральный дух войск ОДТО высок не только потому, что они разгромили войска ВАОИ и заняли Тяньцзинь, но и потому, что они могут использовать Тяньцзинь в качестве оперативной базы для наступления на Пекин. Если они ворвутся в Пекин, это значительно ослабит центральное правительство Китая и заставит ВАОИ скорее сесть за стол переговоров.\n\nС другой стороны, у ВАОИ нет времени оплакивать потерю Тяньцзиня, так как скоро начнется следующее сражение, независимо от того, будет ли оно инициировано ВАОИ или ОДТО. В любом случае, ВАОИ должна стремиться остановить продвижение сил ОДТО к столице, Пекину." 
 news.524.a: "Битва в Закате."
 news.525.t: "Битва за Пекин"
 news.525.d: "Несмотря на многослойное сопротивление сил ВАОИ, они не смогли избежать перелома в боевой ситуации. Силы ОДТО быстро продвигались вперед, стремительно вошли в Пекин и в конце концов захватили город.\n\nПадение Пекина, как столицы Китая, было катастрофическим. Потеря столицы означала, что Китай, крупнейший член ВАОИ, больше не сможет противостоять наступлению ОДТО на фронте. Это сильно подорвало бы доверие союзников ВАОИ, что в конечном итоге привело бы к распаду ВАОИ. Между тем, падение Пекина вынудило центральное правительство переместиться вглубь страны для длительного сопротивления. Однако если не удастся полностью переломить ход войны, то окончательное поражение ВАОИ из-за постоянных неудач было лишь вопросом времени.\n\nС другой стороны, штаб и руководство ОДТО праздновали этот решающий момент. С учетом того, что руководство ВАОИ было в замешательстве, нынешняя военная мощь сил ОДТО, безусловно, обеспечит окончательную победу." 
 news.525.a: "Горло восточного дракона было перерезано."
 news.526.t: "Вторая Битва за Пекин"
 news.526.d: "Когда войска ВАОИ организовали ожесточенное наступление, союзные войска, размещенные в Пекине, были застигнуты врасплох, несмотря на то, что опирались на массивные городские укрепления. В конце концов, им ничего не оставалось, как отказаться от контроля над районом.\n\nКак высшее командование ВАОИ , так и рядовые солдаты были настроены пессимистично в отношении способности ВАОИ удерживать этот район в течение длительного периода времени. Хотя ВАОИ могла добиться временных преимуществ или отвоевать еще несколько городов, общая сила ОДТО оставалась внушительной. Если бы ВАОИ не смогла опереться на внутренние районы страны, чтобы истощить силы ОДТО, их нынешние достижения были бы не более чем мимолетными успехами.\n\n С другой стороны, потеря Пекина стала тревожным сигналом для союзного командования. Решимость, проявленная ВАОИ в районе Пекина, все еще была грозной, и союзники должны были действовать осторожно в ближайшие дни, если они надеялись в конечном итоге уничтожить это гигантское чудовище." 
 news.526.a: "По крайней мере, пока они еще могут побеждать..."
 news.527.t: "ОДТО Входит в Манчжурию"
 news.527.d: "Последние новости приходят из Азии: объединенные силы ОДТО пересекают границу Китайской Народной Республики через Корейский полуостров и вступают в северо-восточные провинции вскоре после того, как китайцы и остальные силы ВАОИ не смогли противостоять и удержать позиции перед наступающими дивизиями Тихоокеанской обороны, вливающимися в материковый Китай.\n\nЭто означает крупную победу Японии и ее союзников в "Великой Азиатской Войне." КНР постепенно оттесняется к своим границам, и многие военные эксперты начинают верить, что прилив сил в войне переходит в пользу Организации Договора Тихоокеанской Обороны." 
 news.527.a: "Война обостряется..."
 news.528.t: "Токио Подвергся Ядерной Бомбардировке"
 news.528.d: "Несколько часов назад над Токио поднялся ослепительный огненный шар, осветивший весь город. Вскоре раздался оглушительный рев, когда ударная волна пронеслась по центру города. Взрыв произошел недалеко от Токийской башни, и огненный шар поднялся вверх, образовав колоссальное грибовидное облако, пронзившее небо. Интенсивное излучение от взрыва мгновенно превратило все в радиусе нескольких километров в пепел.\n\nОчевидцы описывали взрыв как видение "второго солнца", за которым последовал подземный толчок. Связь была прервана, энергосистемы рухнули, и весь город погрузился в хаос и панику. На экстренной пресс-конференции премьер-министр Японии осудил применение Китаем ядерного оружия против невинных гражданских лиц и призвал международное сообщество и Организацию Объединенных Наций ввести санкции против Китая.\n\nТочное число жертв на данный момент остается неясным, но, по оценкам, сотни тысяч человек в Токио и его окрестностях могли быть убиты или ранены. Взрыв также вызвал масштабные пожары и потенциальный выброс ядерной радиации, что создает долгосрочные экологические риски." 
 news.528.a: "Что в этом мире может выстоять?"
 news.529.t: "Киото Подвергся Ядерной Бомбардировке"
 news.529.d: "Несколько часов назад над Киото поднялся ослепительный огненный шар, осветивший весь город. Вскоре раздался оглушительный рев, когда ударная волна пронеслась по центру города. Взрыв произошел недалеко от замка Нидзё, и огненный шар поднялся вверх, образовав колоссальное грибовидное облако, пронзившее небо. Интенсивное излучение от взрыва мгновенно превратило все в радиусе нескольких километров в пепел.\n\nОчевидцы описывали взрыв как видение "второго солнца", за которым последовал подземный толчок. Связь была прервана, энергосистемы рухнули, и весь город погрузился в хаос и панику. На экстренной пресс-конференции премьер-министр Японии осудил применение Китаем ядерного оружия против невинных гражданских лиц и призвал международное сообщество и Организацию Объединенных Наций ввести санкции против Китая.\n\nТочное число жертв на данный момент остается неясным, но предполагается, что сотни тысяч человек могли быть убиты или ранены в Киото и его окрестностях. Взрыв также вызвал масштабные пожары и потенциальный выброс ядерной радиации, что представляет собой долгосрочный экологический риск." 
 news.529.a: "Я знаю, что этот мир так же быстротечен, как утренняя роса."
 news.530.t: "Хошимин Подвергся Ядерной Бомбардировке"
 news.530.d: "Несколько часов назад над Хошимином поднялся ослепительный огненный шар, осветивший весь город. Вскоре раздался оглушительный рев, когда ударная волна пронеслась по центру города. Взрыв произошел недалеко от финансовой башни Bitexco, и огненный шар поднялся вверх, образовав колоссальное грибовидное облако, пронзившее небо. Интенсивное излучение от взрыва мгновенно превратило все в радиусе нескольких километров в пепел.\n\nОчевидцы описывали взрыв как видение "второго солнца", за которым последовал подземный толчок. Связь была прервана, энергосистемы рухнули, и весь город погрузился в хаос и панику. На экстренной пресс-конференции президент Вьетнама осудил применение Китаем ядерного оружия против невинных гражданских лиц и призвал международное сообщество и ООН ввести санкции против Китая.\n\nТочное число жертв на данный момент остается неясным, но, по оценкам, сотни тысяч человек в Хошимине и его окрестностях могли быть убиты или ранены. Взрыв также вызвал масштабные пожары и потенциальный выброс ядерной радиации, что создает долгосрочные экологические риски." 
 news.530.a: "Сто лет жизни, но так и не удалось по-настоящему найти общий язык с судьбой."
 news.531.t: "Бангкок Подвергся Ядерному Удару"
 news.531.d: "Несколько часов назад над Бангкоком поднялся ослепительный огненный шар, осветивший весь город. Вскоре раздался оглушительный рев, когда ударная волна пронеслась по центру города. Взрыв произошел недалеко от Большого дворца, и огненный шар поднялся вверх, образовав колоссальное грибовидное облако, пронзившее небо. Интенсивное излучение от взрыва мгновенно превратило все в радиусе нескольких километров в пепел.\n\nОчевидцы описывали взрыв как видение "второго солнца", за которым последовал подземный толчок. Связь была прервана, энергосистемы рухнули, и весь город погрузился в хаос и панику. На экстренной пресс-конференции премьер-министр Таиланда осудил применение Китаем ядерного оружия против невинных гражданских лиц и призвал международное сообщество и Организацию Объединенных Наций ввести санкции против Китая.\n\nТочное число жертв на данный момент остается неясным, но, по оценкам, сотни тысяч человек в Бангкоке и его окрестностях могли быть убиты или ранены. Взрыв также вызвал масштабные пожары и потенциальный выброс ядерной радиации, что создает долгосрочные экологические риски." 
 news.531.a: "Мир - лишь мимолетное отражение в вечно текущем потоке."
 news.532.t: "Дели Подвергся Ядерному Удару"
 news.532.d: "Несколько часов назад над Дели поднялся ослепительный огненный шар, осветивший весь город. Вскоре раздался оглушительный рев, когда ударная волна пронеслась по центру города. Взрыв произошел недалеко от Ворот Индии, и огненный шар поднялся вверх, образовав колоссальное грибовидное облако, пронзившее небо. Интенсивное излучение от взрыва мгновенно превратило все в радиусе нескольких километров в пепел.\n\nОчевидцы описывали взрыв как видение "второго солнца", за которым последовал подземный толчок. Связь была прервана, энергосистемы рухнули, и весь город погрузился в хаос и панику. На экстренной пресс-конференции премьер-министр Индии осудил применение Китаем ядерного оружия против невинных гражданских лиц и призвал международное сообщество и Организацию Объединенных Наций ввести санкции против Китая.\n\nТочное число жертв на данный момент остается неясным, но, по оценкам, сотни тысяч человек в Дели и его окрестностях могли быть убиты или ранены. Взрыв также вызвал масштабные пожары и потенциальный выброс ядерной радиации, что создает долгосрочные экологические риски." 
 news.532.a: "Я - разрушитель миров, готовый уничтожить все творение."
 news.533.t: "Джакарта Подверглась Ядерному Удару"
 news.533.d: "Несколько часов назад над Джакартой поднялся ослепительный огненный шар, осветивший весь город. Вскоре раздался оглушительный грохот, когда ударная волна пронеслась по центру города. Взрыв произошел недалеко от мечети Истикляль, и огненный шар поднялся вверх, образовав колоссальное грибовидное облако, пронзившее небо. Интенсивное излучение от взрыва мгновенно превратило все в радиусе нескольких километров в пепел.\n\nОчевидцы описывали взрыв как видение "второго солнца", за которым последовал подземный толчок. Связь была прервана, энергосистемы рухнули, и весь город погрузился в хаос и панику. На экстренной пресс-конференции президент Индонезии осудил применение Китаем ядерного оружия против невинных гражданских лиц и призвал международное сообщество и Организацию Объединенных Наций ввести санкции против Китая.\n\nТочное число жертв на данный момент остается неясным, но, по оценкам, сотни тысяч человек в Джакарте и ее окрестностях могли быть убиты или ранены. Взрыв также вызвал масштабные пожары и потенциальный выброс ядерной радиации, что представляет собой долгосрочный экологический риск." 
 news.533.a: "Все, что живет, погибнет, и все, что создано, угаснет."
 news.534.t: "Сидней Подвергся Ядерному Удару"
 news.534.d: "Несколько часов назад над Сиднейской гаванью поднялся ослепительный огненный шар, осветивший весь город. Вскоре после этого раздался оглушительный рев, когда ударная волна пронеслась по центру города. Взрыв произошел недалеко от Сиднейского оперного театра, и огненный шар поднялся вверх, образовав колоссальное грибовидное облако, пронзившее небо. Интенсивное излучение от взрыва мгновенно превратило все в радиусе нескольких километров в пепел\n\nОчевидцы описывали взрыв как видение "второго солнца", за которым последовал подземный толчок. Связь была прервана, энергосистемы рухнули, и весь город погрузился в хаос и панику. На экстренной пресс-конференции премьер-министр Австралии осудил применение Китаем ядерного оружия против невинных гражданских лиц и призвал международное сообщество и Организацию Объединенных Наций ввести санкции против Китая.\n\nТочное число жертв на данный момент остается неизвестным, но, по оценкам, в Сиднее и его окрестностях могли быть убиты или ранены сотни тысяч человек. Взрыв также вызвал масштабные пожары и потенциальный выброс ядерной радиации, что создает долгосрочные экологические риски." 
 news.534.a: "Война никогда не меняется."
 news.535.t: "Сеул Подвергся Ядерному Удару"
 news.535.d: "Несколько часов назад над Сеулом поднялся ослепительный огненный шар, осветивший весь город. Вскоре раздался оглушительный рев, когда ударная волна пронеслась по центру города. Взрыв произошел недалеко от Кёнбоккуна, и огненный шар поднялся вверх, образовав колоссальное грибовидное облако, пронзившее небо. Интенсивное излучение от взрыва мгновенно превратило все в радиусе нескольких километров в пепел.\n\nОчевидцы описывали взрыв как видение "второго солнца", за которым последовал подземный толчок. Связь была прервана, энергосистемы рухнули, и весь город погрузился в хаос и панику. На экстренной пресс-конференции президент Южной Кореи осудил применение Китаем ядерного оружия против невинных гражданских лиц и призвал международное сообщество и Организацию Объединенных Наций ввести санкции против Китая.\n\nТочное число жертв на данный момент остается неясным, но, по оценкам, сотни тысяч человек в Сеуле и его окрестностях могли быть убиты или ранены. Взрыв также вызвал масштабные пожары и потенциальный выброс ядерной радиации, что создает долгосрочные экологические риски." 
 news.535.a: "Когда увядают цветы, увядает и мир."
 news.536.t: "Синдзо Абэ Умер"
 news.536.d: "Бывший премьер-министр Японии Синдзо Абэ трагически погиб в результате покушения. Абэ произносил речь в поддержку Либерально-демократической партии в городе Нара, когда неизвестный выстрелил в него. По сообщению телеканала NHK, бывший премьер-министр получил два ранения. Его срочно госпитализировали в больницу города Касихара, префектура Нара, но политик скончался.\n\nПосле нападения служба безопасности задержала мужчину, 41-летнего жителя Нары. По данным Nihon TV и NHK, Тецуя Ямагами служил в морских силах самообороны Японии в начале 2000-х годов. По словам задержанного, он хотел убить Абэ, потому что был недоволен политиком. В то же время, как сообщает Kyodo, полиция позже процитировала слова задержанного: "Это не недовольство политическими убеждениями бывшего премьер-министра Абэ."\n\nУбийство бывшего премьер-министра стало большим потрясением для японского общества, и последствия этого события до сих пор не ясны."
 news.536.a: "Спокойной ночи, милый принц..."
 news.537.t: "Европейский Союз переходит Рубикон"
 news.537.d: "Хрупкий мир, наступивший после победы России над НАТО, вновь был нарушен. Вооруженные силы ЕС вместе со своими союзниками из правительств комиссий прорвались через границу и обрушились на Польшу. Это было предсказуемым результатом многомесячной агрессивной  политики, проводимой недавно федерализованным ЕС. Когда силы растянулись по всей Западной Европе, заявляя о необходимости «умиротворить экстремистов» и «восстановить демократию на разрушенном континенте». Теперь они маршируют на Москву, и их идеи ясны. Их намерение, как было объявлено в заявлении после первых столкновений, состоит в том, чтобы «избавить Европу от угнетения, организованного Кремлем». По всему Востоку произошли массовые мобилизации, поскольку вновь была задействована вся мощь ОДКБ. Ожидается, что Россия будет с небывалой яростью сражаться за защиту своих земель, поскольку ЕС представляет собой не просто врага, а идеологию, которую они стремятся полностью уничтожить. Представитель Кремля заявил, что они «разгромят наступление глобалистов и освободят Запад от их коррумпированного влияния».\n\nПоскольку Европа вновь погружается в войну и кровопролитие, всем ясно одно. Это точно будет война, которая положит конец всем войнам, и победитель получит полную свободу действий, чтобы сформировать идеальную Европу по своему усмотрению."
 news.537.a: "Время пришло."
 news.538.t: "Столкновения между Евроинтерном и силами Священного союза в Польше"
 news.538.d: "Париж, "Европейская Радиослужба Рабочих"\n\nНа восточном фронте разгорелись боевые действия, когда на рассвете сегодняшнего дня силы Евроинтерна неожиданно атаковали позиции Священного союза. Вдоль Вислы открыли огонь массированные артиллерийские подразделения, за которыми последовали волны бронетехники и механизированной пехоты, продвигающиеся в польские и словацкие приграничные районы. Сообщается о воздушных ударах по ключевым военным объектам Священного союза вблизи Люблина, Бреста и Гродно. Сообщения с фронта поступают спорадически, но первые кадры подтверждают, что в улицах Ольштына и Братиславы идут ожесточенные бои. Местные власти распорядились о массовой эвакуации населения, пока военные и милиция пытаются остановить наступление. Передовое командование Священного Союза в Минске объявило полную мобилизацию, пообещав отомстить за то, что оно называет «дегенеративным атеистическим наступлением на христианскую европейскую цивилизацию». Российские государственные СМИ транслируют кадры с факелами в руках и священниками, благословляющими призывников, когда поезда устремляются на восток. В Париже и Берлине официальные представители Евроинтерна охарактеризовали войну как «окончательную конфронтацию с клерикальным фашизмом». В заявлении немецкого чиновника говорится, что «старые режимы живут на заемное время, настал час расплаты»."
 news.538.a: "Время пришло."
 news.539.t: "Народный рассвет"
 news.539.d: "Красное знамя теперь развевается над руинами Москвы, пеплом Варшавы и разбитыми линиями обороны некогда могущественного Священного Союза. После многих лет ожесточенной борьбы, городов, задымленных дымом, и полей, пропитанных кровью, Интернационал рабочих вышел победителем. Последние остатки русских теократов и их пособников либо сдались, либо были изгнаны в тайгу, чтобы умереть в забвении. \n\nГоды тотальной войны разрушили старую Европу до основания. Число погибших почти невозможно подсчитать, целые нации были превращены в руины, а шрамы, которые, возможно, никогда не заживут полностью, остались. Но для лидеров Евроинтерна это был не только крестовый поход против тирании, это была война возрождения. Старые тирании духовенства, капитала и каст рухнули. На их руинах начинает формироваться новая федерация народов и советов, связанная не границами, а общей борьбой. \n\nНо дым едва рассеялся, как начались новые дебаты: федеральное единство или национальная автономия? Международная солидарность или внутреннее восстановление? Хрупкое единство, которое удержалось во время войны, теперь сталкивается с самым большим испытанием — миром. \n\nНо что бы ни случилось дальше, никто не может сейчас отрицать: красный флаг развевается над востоком, и карта Европы никогда не будет прежней."
 news.539.a: "Родилась новая Европа. Солидарность навсегда!"
 news.540.t: "Триумф Стальпакта"
 news.540.d: "Последние опорные пункты советских и восточноевропейских войск капитулировали перед армиями Пакта Стали, который, словно железный молот, прорвал оборону МТО и оставил их войска окружать теперь уже развалившуюся Россию, став окончательными победителями в этом многолетнем конфликте. Конфликт, унесший жизни миллионов солдат и невинных гражданских лиц, попавших под перекрестный огонь реваншистской Германии, ободренной своим прошлым. Потребуются годы, чтобы помочь Восточной Европе вернуться к нормальной жизни, но для победителей в этом конфликте это не является приоритетом. Они предпочитают направлять восточноевропейские казны на грандиозные военные парады и систему постоянной эксплуатации восточноевропейских народов. \n\nОднако на данный момент мир вновь царит в Европе. Хотя это очень напряженный мир, поскольку радикальный национализм, привнесенный всеми сторонами в рамках пакта, оказывается серьезным препятствием на пути к долгосрочному миру. Тем не менее, мир — это слово, которое западноевропейские власти не склонны уважать, отказываясь демобилизовать свои армии."
 news.540.a: "Европа это Сила!"
 news.541.t: "Триумф Союза"
 news.541.d: "С окончанием боевых действий и затиханием орудий наконец-то закончилась самая кровопролитная война в Европе. Многие международные наблюдатели находятся в полном шоке. Флаг Европейского союза теперь развевается над Москвой. Сформировавшись из хаоса, вызванного победой России в Европе, новый федеративный ЕС столкнулся с трудной задачей стабилизации Запада. Благодаря агрессивной перестройке и реальной политике Союз умиротворил хаос во Франции и Испании и интегрировал регионы Запада в свою сферу влияния в качестве комиссионных правительств. И когда война разгорелась вновь, мало кто мог предсказать, что выйдет из этого хаоса. Теперь, одержав победу, Союз является доминирующей силой в Европе. Из остатков России поступают скудные сообщения. Многие подозревают, что центральная власть рухнула. Поскольку больше не осталось никого, кто мог бы противостоять их видению, ожидается, что ЕС в конечном итоге интегрирует комиссионные правительства, которые были созданы вскоре после их победы, чтобы обеспечить плавный переход к демократии. Похоже, будущее Европы обеспечено. Видение многополярного мира было разрушено, и после трудностей и неудач торжествует однополярный порядок."
 news.541.a: "Что же, Запад вновь победил!"
 news.542.t: "Окончание Гражданской Войны в Ливии"
 news.542.d1: "Правительство в Триполи объявило о победе в затянувшейся гражданской войне в Ливии, сообщив, что последнее организованное сопротивление было разгромлено и что основные населенные пункты и инфраструктура теперь находятся под его контролем. После многих лет смены линии фронта, иностранного вмешательства и провальных политических планов конфликт закончился не национальным компромиссом, а военным истощением и полным разгромом. \n\nЗаключительная фаза войны характеризовалась жестокими, изнурительными наступлениями вдоль прибрежных шоссе и через городские районы, которые уже были разрушены в ходе предыдущих боевых действий. По мере того как противоборствующие силы теряли доступ к боеприпасам, топливу и внешнему финансированию, их оборона ослабевала и распадалась. Целые подразделения сдавались или распадались, оставляя после себя склады, брошенные автомобили и районы, разрушенные артиллерийскими и авиационными ударами. В Триполи правительственные чиновники охарактеризовали исход войны как воссоединение государства, пообещав, что "единая Ливия" наконец-то сменит эпоху соперничающих правительств. \n\nВ некоторых районах столицы разразились празднования, но настроение по всей стране неоднородное. Во многих городах окончание боевых действий принесло скорее тишину, чем облегчение, поскольку семьи вернулись в разрушенные улицы и пустые дома. Вооруженные группировки, поддерживающие победившую коалицию, по-прежнему имеют значительное присутствие, что вызывает немедленные вопросы о том, будет ли мир означать демобилизацию или просто переход от войны между правительствами к конкуренции внутри лагеря победителей.\n\nВласти Триполи объявили о планах по восстановлению услуг, возобновлению работы нефтяных объектов под централизованным контролем и началу процесса национального примирения. Однако институты Ливии по-прежнему остаются нестабильными, экономика страны пострадала, а социальная структура серьезно повреждена. Война может быть закончена, но восстановление функционирующего государства будет гораздо более длительной борьбой, чем победа на поле боя."
 news.542.d2: "Власти, базирующиеся в Тобруке, объявили о победе в гражданской войне в Ливии, заявив, что оставшиеся силы, поддерживающие Триполи, потерпели поражение и что восточная часть страны теперь эффективно контролирует государственные учреждения, территорию и критически важную инфраструктуру. После многих лет раскола Ливия была воссоединена силой. \n\nЗаключительные кампании ознаменовались быстрыми прорывами после длительного застоя. По мере ослабления западной обороны из-за нехватки ресурсов, внутренней разобщенности и потери внешней поддержки, силы Тобрука продвигались по ключевым автомагистралям и с нарастающей скоростью захватывали крупные транспортные узлы. В нескольких городах переговоры и местные соглашения положили конец боевым действиям до начала полномасштабных атак. В других война закончилась так же, как и начиналась: квартал за кварталом, оставляя после себя серьезные разрушения. \n\nВ Бенгази и Тобруке сторонники праздновали то, что они называют "концом хаоса", в то время как официальные лица обещали обеспечить безопасность, дисциплину и восстановление национальной власти. Однако на западе страны атмосфера остается напряженной. Многие общины опасаются репрессий, чисток или постоянного военного правления. Вооруженные группировки, которые когда-то удерживали баланс сил в Триполи, остаются разрозненными: некоторые сдаются, другие уходят в сельские районы или исчезают в сетях черного рынка, которые пережили все этапы войны.\n\nПобедившее правительство пообещало возобновить экспорт нефти под централизованным контролем, восстановить базовые услуги и воссоздать единые вооруженные силы. Войдет ли Ливия в новую эру стабильности или просто променяет фрагментацию на авторитарный контроль, будет зависеть от того, как Тобрук воспользуется своей победой и как проигравший Запад отреагирует на это в ближайшие месяцы."
 news.542.a: "Восстановятся ли они когда-нибудь?"
 news.543.t: "Каддафи Приходит к Власти в Ливии"
 news.543.d: "Удивительные новости приходят из Ливии: Саиф аль-Ислам Каддафи, сын Муаммара Каддафи, сумел заручиться поддержкой населения и победить на национальных выборах, состоявшихся после гражданской войны, с подавляющим большинством голосов. Он успешно использовал недовольство ливийского народа программой других кандидатов и призвал к восстановлению национальной гордости и суверенитета прежде всего.\n\nТеперь, когда каддафисты вернулись к власти, Ливия наверняка вышвырнет иностранных наемников, которые заполонили ливийские земли с начала гражданской войны. Поскольку реваншистский дух в Ливии крепнет с каждым часом, Каддафи объявил о планах создания единого социалистического арабского государства в Магрибе."
 news.543.a: "Начало Великого Джихада"
 news.544.t: "Китай Внедряет Искусственный Интеллект"
 news.544.d: "Из КНР приходят интересные новости. По-видимому, КПК вложила значительные средства в искусственный интеллект и решила сбросить оковы этических соображений, сняв общие ограничения, налагаемые на искусственный интеллект другими странами, позволив ему учиться и вырасти в само правительство.\n\nНазванный Центральным процессором производительных сил или сокращенно ЦППС, этот искусственный интеллект выполняет основную функцию по управлению несколькими важнейшими государственными функциями, чтобы уменьшить давление, оказываемое на человеческие аспекты работы, такие как военное планирование, гражданские сети, обработка информации и многое другое, однако китайское правительство объявило, что оно позволило ЦППС применять более прямой подход к государственным делам, поскольку оно способно давать ответы, недоступные людям. В глобальном масштабе мир настороженно смотрит на Китай, поскольку это официально означает, что мировой державой управляет машина, а не человек.\n\nЧто встревожило большую часть религиозного мира и технологического мира, так это то, что существует небольшая, но неуклонно растущая религия, которая поклоняется искусственному интеллекту, который называется "Великий Поход", считая его богом, рожденным из человеческой изобретательности и рациональности, попыткой разобраться в хаосе, который сейчас происходит в мире, еще неизвестно, сможет ли эта новая религия перерасти старые религии или это просто еще один культ, обреченный на безвестность, но этот искусственный интеллект, несомненно, будет рассматриваться многими как новый спаситель человеческой расы."
 news.544.a: "На перекрестке будущего."
 news.545.t: "Кубанский Кризис"
 news.545.d: "С недавним доминированием возрождающейся России на Кавказе многие ожидали, что мстительное государство с тоской посмотрит на свои другие потерянные территории. Следующей под прицел попала Кубанская республика, но не без помощи Украины.\n\nУкраина поклялась защитить Кубанскую республику от любой формы российской агрессии, несмотря ни на что, и это обещание было сдержано раньше, чем позже. В роковой день сообщения о стычках на кубанско-российской границе проникают в СМИ, а Украина уже поспешила прийти на помощь республике, и вполне вероятно, что эти стычки будут нарастать. \n\nНа международном уровне есть опасения, что кризис не остановится на Кубани, если русские почувствуют вкус победы в республике, нет сомнений, что они остановятся на республике и пойдут дальше в Украину, потенциально вызывая еще одну большую войну в Европе.\n\nКонтинент смотрит на республику с тревогой, ожидая худшего, поскольку западные силы приведены в состояние повышенной готовности."
 news.545.a: "Стоим ли мы на пороге новой войны?"
 news.546.t: "ВАОИ Берёт Ханой"
 news.546.d: "По мере развития азиатского конфликта силы ВАОИ недавно начали наступление на Ханой, столицу Вьетнама, и в итоге захватили контроль над городом.\n\nПосредством стратегии блицкрига силы ВАОИ, возглавляемые в основном НОАК, быстро захватили весь северный регион Вьетнама. Это событие в краткосрочной перспективе существенно меняет баланс войны в пользу ВАОИ. Таким образом, Китай, как ведущая страна ВАОИ, обеспечил безопасность своих южных границ и внутренних районов. Кроме того, Вьетнам, региональная держава, получил существенный удар по своему военному потенциалу.\n\nС другой стороны, потеря Ханоя означает, что ВАОИ потеряла инициативу в конфликте на Индокитайском полуострове. Если силы ВАОИ не смогут проактивно отреагировать на этот сдвиг, баланс войны продолжит сильно склоняться в сторону ВАОИ."
 news.546.a: "Еще одна победа ВАОИ."
 news.547.t: "ОДТО Берёт Ханой"
 news.547.d: "По мере развития азиатского конфликта силы ВАОИ недавно начали наступление на Ханой, столицу Вьетнама, и в итоге захватили контроль над городом.\n\nКак столица Вьетнама и центральный город Северных равнин, падение Ханоя создаст серьезную угрозу для основных регионов ВАОИ, особенно для южной границы Китая. В настоящее время силы ОДТО продолжают свое продвижение на север, стремясь захватить несколько окрестных крепостей и уничтожить оставшиеся подразделения Вьетнамской народной армии.\n\nС другой стороны, потеря Ханоя означает, что ВАОИ утратила инициативу в конфликте на Индокитайском полуострове. Если силы ВАОИ не смогут проактивно отреагировать на этот сдвиг, баланс войны продолжит сильно склоняться в сторону ОДТО."
 news.547.a: "Еще одна победа ОДТО."
 news.548.t: "ВАОИ Берёт Хошимин"
 news.548.d: "Хошимин, ранее известный как Сайгон, шумный экономический центр Вьетнама, теперь охвачен дымом и разрушениями. Силы ВАОИ, дислоцированные в городе, были выведены, оставив его под контролем войск ВАОИ.\n\nСмена контроля в Хошимине оказала глубокое влияние на региональный конфликт. Теперь силы ВАОИ почти полностью доминируют во Вьетнаме, обеспечивая безопасность своих флангов и действуя в самом сердце Юго-Восточной Азии. Более того, портовые сооружения в Хошимине являются важнейшей оперативной базой для военно-морских сил ВАОИ.\n\nИ наоборот, для ВАОИ это значительное поражение, означающее потерю одного из ее ключевых опорных пунктов в Юго-Восточной Азии. Без своевременных стратегических корректировок ОДТО продолжит терять свою хватку, что еще больше склонит чашу весов в пользу ВАОИ."
 news.548.a: "Еще одна победа ВАОИ."
 news.549.t: "ОДТО Берёт Хошимин"
 news.549.d: "Хошимин, ранее известный как Сайгон, шумный экономический центр Вьетнама, теперь охвачен дымом и разрушениями. Силы ВАОИ, размещенные в городе, были выведены, оставив его под контролем войск ОДТО.\n\nСмена контроля в Хошимине оказала глубокое влияние на региональный конфликт. Портовые сооружения Хошимина служат важнейшей оперативной базой для военно-морских сил ВАОИ, позволяя им предпринимать более смелые действия в Южно-Китайском море. Таким образом, основные опорные пункты ВАОИ в прилегающих районах постоянно находятся под угрозой со стороны военно-морских сил ВАОИ.\n\nКроме того, для ВАОИ это значительное поражение, означающее потерю одного из ее ключевых опорных пунктов в Юго-Восточной Азии. Без своевременных стратегических корректировок ВАОИ продолжит терять свою хватку, что еще больше склонит чашу весов в пользу ВАОИ."
 news.549.a: "Еще одна победа ОДТО."
 news.550.t: "ВАОИ Берёт Куала-Лумпур"
 news.550.d: "Куала-Лумпур, столица Малайзии, является крупнейшим и самым густонаселенным городом страны, а также ее экономическим и культурным эпицентром. В этот момент флаг Малайзии спускается со знаменитого здания Menara Berkembar Petronas, заменяясь знаменем ВАОИ.\n\nПадение Куала-Лумпура - важное стратегическое преимущество для ВАОИ, укрепляющее их контроль над Малайским полуостровом и усиливающее их влияние в регионе Малаккского пролива. Между тем, потеря Куала-Лумпура наносит значительный удар по ВАОИ, серьезно ослабляя ее военное присутствие в Юго-Восточной Азии.\n\nЕсли силы ВАОИ не смогут оперативно адаптировать свою стратегию, баланс войны будет продолжать меняться. В процессе они, вероятно, потеряют еще больше важнейших городов."
 news.550.a: "Еще одна победа ВАОИ."
 news.551.t: "ОДТО Берёт Куала-Лумпур"
 news.551.d: "Куала-Лумпур, столица Малайзии, является крупнейшим и самым густонаселенным городом страны, а также ее экономическим и культурным эпицентром. В этот момент флаг Малайзии спускается со знаменитого здания Menara Berkembar Petronas, заменяясь знаменем ОДТО.\n\nПадение Куала-Лумпура - важное стратегическое преимущество для ОДТО, укрепляющее их контроль над Малайским полуостровом и усиливающее их влияние в регионе Малаккского пролива. Между тем, потеря Куала-Лумпура наносит значительный удар по ВАОИ, серьезно ослабляя ее военное присутствие в Юго-Восточной Азии.\n\nЕсли силы ВАОИ не смогут оперативно адаптировать свою стратегию, баланс войны будет продолжать смещаться. При этом они, скорее всего, потеряют еще больше важнейших городов." 
 news.551.a: "Еще одна победа ОДТО."
 news.552.t: "Германия Выходит из Европейского Союза!"
 news.552.d: "После победы НАТО над Россией в европейской войне, несмотря на кажущееся единство как военного альянса, так и экономического содружества, правое правительство Германии заявило, что "война была выиграна только благодаря ядру Европы, которым является Германия", а остальные члены были для них всего лишь "паразитами". В связи с этим правительство Германии объявило о своем намерении выйти из ЕС и вернуть дойчмарку в качестве валюты страны. Это заявление уже оказало влияние на экономику и торговлю внутри союза, не говоря уже о политическом шоке, который оно вызвало." 
 news.552.a: "Им точно так лучше?"
 news.554.t: "Война Стражей"
 news.554.d: ""
 news.554.a: "Закат Америки"
 news.555.t: "[ATW.GetName] Завоёвывает Америку"
 news.555.d: "То, что раньше считалось невозможным, теперь стало суровой реальностью. Согласно недавнему заявлению Дивизии Атомваффен, подтвержденному многодневной тщательной проверкой фактов, все правительства, ранее контролировавшие континентальную часть Соединенных Штатов, либо сдались Дивизии, либо были уничтожены. В результате этого монументального сдвига Дивизии Атомваффен - из маргинальной экстремистской группировки, базировавшейся во Флориде, - превратилась в доминирующую силу на опустевших территориях бывших Соединенных Штатов.\n\nКонфликт, бушевавший на территории Америки, конфликт, длившийся бесконечно долго, отмеченный взлетами и падениями многочисленных фракций и правительств на фоне всепроникающего хаоса, теперь затихает, пронизанный лишь триумфальными торжествами Дивизии Атомваффен. Наблюдатели как из Америки, так и из других стран стоят в ошеломленном молчании, наблюдая за появлением одной из самых радикальных организаций в истории, взявшей под контроль некогда самую сильную страну в мире. Теперь эта группа обладает не только огромной политической властью, но и самым современным и разрушительным оружием из когда-либо созданных.\n\nПуть вперед по-прежнему окутан неопределенностью. В то время как дивизия Атомваффен в настоящее время упивается своей победой, они еще не сделали никаких официальных заявлений относительно своих планов на будущее страны. Учитывая их экстремальную идеологию и предыдущие действия, можно предположить, что Америка - или то, что от нее осталось, - станет их владением, где они смогут беспрепятственно навязывать свою волю. Ожидается, что в стране возникнет беспрецедентный уровень хаоса и насилия, потенциально превосходящий даже самые интенсивные текущие конфликты по всему миру.Перспектива будущего, омраченного безудержной нестабильностью и массовыми страданиями, зловеще маячит на горизонте и может полностью обречь человеческую расу на гибель."
 news.555.a: "Бастион свободы исчез."
 news.555.b: "Его воля будет исполнена."
 news.553.t: "Популисткая Революция Трампа"
 news.553.d: "Сегодня в розарии Белого дома Дональд Трамп объявил всей Америке о капитуляции оставшихся сил, выступавших против его президентства. После этого заявления президент Трамп был приведён к присяге, и его инаугурационная речь мало способствовала снятию напряжённости, которая всё ещё царила в американском обществе.\n\nМногие аналитики и наблюдатели называют нынешнюю ситуацию в Америке "трампистской революцией." Президент Трамп, когда-то известный своим дерзким стилем, смог создать сильную коалицию, в которую вошли не только консерваторы и умеренные, но и те, кто смог преодолеть сильные расовые, экономические и политические разногласия, разделявшие американцев на протяжении десятилетий. Президент без колебаний наживает себе врагов, но ему также удалось завести много друзей. Временами он вызывал разногласия, но это не помешало миллионам американцев присоединиться к его делу. Своим сторонникам он дал то, что обещал: настоящий популистский переворот в США. Даже те, кто относится к нему нейтрально, считают его человеком, который действительно изменил правила игры.\n\nПолитические технологи прогнозируют, что в ближайшие годы тактика и эстетика трампизма будут использоваться многими правыми или даже просто популистскими политическими группами по всему миру.\nОдин эксперт говорит: "Мы живём в эпоху "Нации превыше всего" - объединяющего лозунга для всех политических партий. В эти неспокойные времена люди будут искать сильного лидера, республиканского короля, который "всё исправит" и наладит ситуацию."
 news.553.a: "Американский Золотой Ветер."
 news.553.b: "Так много побед!"
 news.556.t:  "Распад Бельгии"
 news.556.d:  "В результате интересного развития событий бывшее бельгийское правительство объявило о распаде Бельгии и создании двух новых государств - Валлонии с преобладанием французской культуры и Фландрии с преобладанием голландской культуры. Идея такого решения возникла во время кризиса COVID-19, который подогрел недовольство и волнения против правительства как никогда раньше.\n\nЧерез некоторое время стали набирать силу движения, призывающие к распаду Бельгии как государства. Протесты, петиции и растущее самоопределение привели к тому, что правительство было вынуждено провести референдум, так как давление выросло до огромных размеров. В итоге более 68 % населения проголосовали за роспуск. Так было принято решение распустить бельгийское правительство и позволить двум регионам стать независимыми государствами. Брюссель, бывшая столица Бельгии, перешёл под контроль Европейского союза и остался столицей ЕС после совместных переговоров между бельгийским правительством, представителями ЕС и ключевыми лидерами движения за роспуск Бельгии, которые договорились оставить его таковым.\n\nЧто касается других событий, то ожидается, что Нидерланды и Франция будут развивать свои отношения с вновь созданными странами, и некоторые даже предсказывают, что эти две страны могут аннексировать новообразованные государства."
 news.556.a:  "Флаг Бельгии развевается в последний раз"
 news.557.t:  "Дворцовый Переворот в России"
 news.557.d:  "Удивительные новости поступают из Российской Империи. Судя по доступной мировому сообществу информации конфликт дворянства и императора Ростислава I достиг критической отметки. Сотрудники охранки, лояльные высшему совету, совершили арест российского царя и вынудили принять ультиматум , отдельным пунктами которого были обозначены немедленное отречение Ростислава, а также отказ от каких-либо притязаний на российский престол в дальнейшем от самого Ростислава или его потомков. Царь согласился на условия заговорщиков в обмен на жизни членов его семьи и его самого.\n\n На данный момент уже бывший император находится под домашним арестом, а аристократические круги готовятся к новому земскому собору."
 news.557.a:  "Интересно."
 news.558.t: "Германия и Франция Формируют Европейский Союз"
 news.558.d: ""
 news.558.a: "Это было необходимо для предотвращения дальнейшей российской экспансии"
 news.558.b: "Европа разваливается на части"
 news.558.c: "Сумерки Европы"
 news.559.t: "Война за Объединение Франкии"
 news.559.d: "Франция, как всем известно, - земля франков, но прежде чем стать Францией, она была Франкией. Разница в названии невелика, а вот в значении - огромна. Древняя Франкия, под властью императора Карла Великого, владела Северной Италией, большей частью Германии, Каталонией и Бенилюксом. Это государство стало основателем Священной Римской империи, а ее раскол в последующие века привел к появлению современных государств - Франции, Германии и Италии, которые впервые оказались в чем-то похожи на свои современные границы.\n\nПо мнению загадочного Лафайета, немцы - это всего лишь заблудшие франки, давно разлученные феодальным предательством, извращенные жидами и коммунарами, чтобы уехать из Парижа. Сегодня Лафайет объявил войну германскому правительству, заявив, что восстановление Франкии неизбежно, а окончательное поражение Германии - для «ее же блага». В то время как Франция находится под полным запретом СМИ, риторика говорит о том, что победа Франции может привести к долгосрочной гомогенизации немецкой культуры под французским влиянием или, возможно, к широкомасштабному геноциду, но точные масштабы и размах французских территориальных замыслов неясны. Международная реакция в других странах Европы вызывает тревогу и шок, понятно, что французские посольства отказываются комментировать иностранные запросы, сообщения из Германии говорят о том, что продвижение к Рейну уже произошло, но будет ли Стальной пакт помогать Берлину, пока неясно. Независимо от того, кто победит, на карту поставлена судьба Европы и, возможно, судьба целого народа."
 news.559.a: "Предатель Европы."
 news.559.b: "Как хотел бы Карл Великий."
 news.559.c: "Европа никогда не увидит мира."
 news.560.t: "Третья Европейская Война"
 news.560.d: "С теми, кто считал, что дружба и тесное сотрудничество между Германией и Францией нерушимы после двух кровопролитных войн с Россией, реальность сыграла злую и ироничную шутку. С 1945 года страны, расположенные по обе стороны реки Рейн, вновь вступили в противостояние.\n\nОглядываясь назад в историю, мы видим, что корни этого конфликта, возможно, были заложены уже давно. Даже если отбросить исторические обиды между Германией и Францией, их политические разногласия всегда было трудно скрыть, начиная со времен Европейского сообщества угля и стали и заканчивая Европейским сообществом и Европейским союзом. Ряд политических мер привел к тому, что ЕС становился все более раздробленным и неэффективным, что в конечном итоге привело к сегодняшней трагедии.\n\nСейчас танки Leclerc и Leopard 2 нацеливают свои пушки друг на друга, а в небе истребители Dassault Rafale и Tornado вступают в схватку. Независимо от того, кто выйдет победителем, ущерб и разрушенное доверие будут невосполнимы."
 news.560.a: "Франции должен прийти конец."
 news.560.b: "Германия увидит нашу мощь..."
 news.560.c: "Европа никогда не увидит мира."
 
 news.561.t: "Дмитрий Патрушев Побеждает на Выборах"
 news.561.d: "Сегодня Россия пожинает плоды проведённых ею реформ. Вся страна была более активной, чем когда-либо, а президентская гонка вдохнула новую жизнь в российское общество. Хотя переход Медведева на пост премьер-министра рассматривался не более чем как смена кресла, конечный результат превзошёл все ожидания.\n\nНесмотря на напряжённую предвыборную гонку, «Единой России» снова удалось одержать победу. Однако партия уже не является монолитной структурой, какой была раньше. Преобразованная в правоцентристскую партию путём слияния ЛДПР и других правых партий, она охватывает широкий спектр идей и состоит из нескольких коалиций внутри партии. Некоторые сравнивают её с прежней Республиканской партией США.\n\nПобедителем этой гонки стал Николай Патрушев, бывший министр сельского хозяйства и близкий соратник Дмитрия Медведева. Пока неясно, по какому пути пойдёт это президентство в глазах иностранных наблюдателей."
 news.561.a: "Интересно!" 
 news.562.t: "Андрей Белоусов Побеждает на Выборах"
 news.562.d: "Сегодня Россия пожинает плоды проведённых ею реформ. Вся страна была более активной, чем когда-либо, а президентская гонка вдохнула новую жизнь в российское общество. Хотя переход Медведева на пост премьер-министра рассматривался не более чем как смена кресла, конечный результат превзошёл все ожидания.\n\nНесмотря на напряжённую предвыборную гонку, «Единой России» снова удалось одержать победу. Однако партия уже не является монолитной структурой, какой была раньше. Преобразованная в правоцентристскую партию путём слияния ЛДПР и других правых партий, она представляет широкий спектр идей и состоит из нескольких коалиций внутри партии. Некоторые сравнивают её с прежней Республиканской партией США.\n\nПобедителем в этой гонке стал Андрей Белоусов, бывший министр экономического развития и близкий друг Владимира Путина. Пока неясно, по какому пути пойдёт это президентство в глазах иностранных наблюдателей."
 news.562.a: "Интересно!" 
 news.563.t: "Михаил Мишустин Побеждает на Выборах"
 news.563.d: "Сегодня Россия пожинает плоды проведённых ею реформ. Вся страна была более активной, чем когда-либо, а президентская гонка вдохнула новую жизнь в российское общество. Хотя переход Медведева на пост премьер-министра рассматривался не более чем как смена кресла, конечный результат превзошёл все ожидания.\n\nНесмотря на напряжённую предвыборную гонку, «Единой России» снова удалось одержать победу. Однако партия уже не является монолитной структурой, какой была раньше. Преобразованная в правоцентристскую партию путём слияния ЛДПР и других правых партий, она включает в себя широкий спектр идей и состоит из нескольких коалиций внутри партии. Некоторые сравнивают её с прежней Республиканской партией США.\n\nПобедителем этой гонки стал Михаил Мишустин, премьер-министр России в позднюю путинскую эпоху. Иностранным наблюдателям ещё предстоит увидеть, по какому пути пойдёт это президентство."
 news.563.a: "Интересно!" 
 news.564.t: "Сергей Собянин Побеждает на Выборах"
 news.564.d: "Сегодня Россия пожинает плоды проведённых ею реформ. Вся страна была более активной, чем когда-либо, а президентская гонка вдохнула новую жизнь в российское общество. Хотя переход Медведева на пост премьер-министра рассматривался не более чем как смена кресла, конечный результат превзошёл все ожидания.\n\nНесмотря на напряжённую предвыборную гонку, «Единой России» снова удалось одержать победу. Однако партия уже не является монолитной структурой, какой была раньше. Преобразованная в правоцентристскую партию путём слияния ЛДПР и других правых партий, она охватывает широкий спектр идей и состоит из нескольких коалиций внутри партии. Некоторые сравнивают её с прежней Республиканской партией США.\n\nПобедителем этой гонки стал Сергей Собянин, многолетний мэр Москвы. Пока неясно, по какому пути пойдёт это президентство в глазах иностранных наблюдателей."
 news.564.a: "Интересно!" 
 news.565.t: "Вячеслав Володин Побеждает на Выборах"
 news.565.d: "Сегодня Россия пожинает плоды проведённых ею реформ. Вся страна была более активной, чем когда-либо, а президентская гонка вдохнула новую жизнь в российское общество. Хотя переход Медведева на пост премьер-министра рассматривался не более чем как смена кресла, конечный результат превзошёл все ожидания.\n\nНесмотря на напряжённую предвыборную гонку, «Единой России» снова удалось одержать победу. Однако партия уже не является монолитной структурой, какой была раньше. Преобразованная в правоцентристскую партию путём слияния ЛДПР и других правых партий, она охватывает широкий спектр идей и состоит из нескольких коалиций внутри партии. Некоторые сравнивают её с прежней Республиканской партией США.\n\nПобедителем этой гонки стал Вячеслав Володин, председатель Государственной Думы России. Иностранным наблюдателям ещё предстоит увидеть, по какому пути пойдёт это президентство."
 news.565.a: "Интересно!" 

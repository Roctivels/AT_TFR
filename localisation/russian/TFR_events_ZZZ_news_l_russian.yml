 news.302.t: "Переворот в Москве!"
 news.302.d: "Тревожные новости из столицы России Москвы, поскольку Национальная гвардия приостановила деятельность всех органов гражданского управления и объявила чрезвычайное положение.\nНачальник Национальной гвардии Виктор Золотов в телеэфире объявил, что к этому его вынудила неспособность гражданского правительства ЛДПР разрешить кризис, вызванный смертью Владимира Жириновского. Он пообещал вернуться к нормальной жизни и стабильности, как только критическая ситуация будет разрешена. Золотов закончил свою речь словами "Слава России!" и призвал всех законопослушных граждан продолжать заниматься своими повседневными делами."
 news.302.a: "Нестабильность в стране-победительнице? Хм..." 
 news.303.t: "Царизм восстановлен в России!"
 news.303.d: ""
 news.303.a: "Они действительно повернули время вспять." 
 news.304.t: "Конец ЛДПР"
 news.304.d: "С тех пор как умер Владимир Жириновский, ЛДПР борется за сохранение популярности при преемнике Жириновского, Слуцком. Несмотря на то, что идеологические цели остались прежними, люди не видят в Слуцком того же огня и мудрости, что и в Жириновском, того самого огня и мудрости, благодаря которым ЛДПР жила все это время. Многие вопросы, стоявшие перед Россией и нуждавшиеся в таком человеке, как Жириновский, были подавлены в годы, предшествовавшие войне, а призывы к возвращению к власти истинного императорского правительства были слишком сильны даже в правительстве ЛДПР. С приходом [SOV.GetLeader] к руководству Россией стало ясно, что дни ЛДПР подошли к концу.\n\nВ ближайшие недели передача власти, скорее всего, будет закреплена, "либерал-демократы" вряд ли останутся при новом коронованном царе России, однако они с такой же вероятностью избегут политического преследования со стороны нового правительства, поскольку они сыграли важную роль в доведении России до нынешнего состояния и обеспечении победы над НАТО. История запомнит Владимира Вольфовича Жириновского как русского Бисмарка, силача, воссоединившего российские народы во второй и последний раз, а Слуцкий и остальные сторонники жесткой линии ЛДПР будут тихо отправлены на политическую пенсию, став сносками в русско-европейской войне и в биографиях Жириновского."
 news.304.a: "Они действительно не смогли выжить без него."

 news.305.t: "Владимир Путин Уходит в Отставку"
 news.305.d: "Отставка Владимира Путина из-за тяжелой болезни, вызванной Covid-19, и назначение Сергея Нарышкина временным лидером знаменуют собой значительное событие в российской политике. Путин, который находится у власти более двух десятилетий, является доминирующей фигурой в российской политике, и его отставка поднимает вопросы о будущем направлении развития страны.\n\nНазначение Нарышкина временным лидером предполагает, что это была плавная передача власти внутри российского правительства. Нарышкин, близкий союзник Путина и глава Службы внешней разведки России, по слухам, планирует досрочные выборы. Этот шаг можно рассматривать как попытку сохранить стабильность и преемственность в российской политике в период неопределенности.\n\n Тем не менее, важно подходить к этим событиям с осторожностью и учитывать множество точек зрения. Обстоятельства, связанные с отставкой Путина и назначением Нарышкина, должны быть критически изучены, поскольку в основе могут лежать политические мотивы или борьба за власть."
 news.305.a: "Интересно..."
 news.305.b: "Это был долгий путь..."

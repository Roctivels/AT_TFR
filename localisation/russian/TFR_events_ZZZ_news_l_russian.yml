 news.290.t: "Японская Гражданская Война"
 news.290.d: "Сегодня, стало известно о начале гражданской войны в Японии. После военного переворота в Токио демократические прогрессивные силы не признали легитимность нового правительства и начали объединяться на севере страны. В результате город Саппоро был провозглашен временной столицей. Здесь был создан временный правительственный орган, который стал координировать действия оппозиционных сил. Власти Саппоро также начали формировать свою армию и заявили о намерении бороться за свои права и свободы. Военное правительство в Токио отправило войска на север, чтобы подавить демократическое восстание и вернуть контроль над регионом."
 news.290.a: "Солнце садится..."
 news.290.b: "Пылает Восток..."
 news.291.t: "Столкновения Между Немецкими и Польскими Войсками"
 news.291.d: "Прошло всего несколько часов с тех пор, как последние остатки польского правительства спасения сдались перед натиском Стального пакта на некогда единую нацию, и ракеты были запущены по обширным линиям окопов на протяжении всей германо-польской границы. Как и в первой войне, трудно сказать, какая из сторон запустила ракеты первой, но силы Пакта уже реорганизуются, чтобы лучше справиться с этой ситуацией. \n\nНемецкие власти прокомментировали этот вопрос, обвинив Польскую Народную Республику в «провоцировании их умиротворения варварского правительства спасения». Однако видеоролики, на которых немецкие солдаты жестоко  расправляются с польскими и чешскими военнопленными, уже набирают популярность в восточных социальных сетях. Лидер Советского Союза пока не ответил на эти обвинения, но действия, предпринимаемые Верховным командованием, остаются прежними. Массовая мобилизация объявлена почти всеми европейскими правительствами, которые готовятся к предстоящим испытаниям в том, что, вероятно, станет самым разрушительным конфликтом в Европе за последние столетия, возможно, затмевающим Вторую мировую войну."
 news.291.a: "Барбаросса повторяется..."

 news.112.t: "Гражданская война в Ливии Заканчивается"
 news.112.d: "."
 news.112.o1: "Нас не остановить!"
 news.112.o2: "Интересное развитие событий"
 news.113.t: "Вирус Ковид-19"
 news.113.d: "Всемирная организация здравоохранения в сотрудничестве с Коммунистической партией Китая внимательно следит за тревожной вспышкой нового вируса в городе Ухань. Внезапное появление вируса вызвало серьезную обеспокоенность экспертов в области здравоохранения и мировых лидеров, особенно в связи с возвращением тысяч китайских граждан из отпусков, что может способствовать распространению вируса среди иностранного населения.\n\n По мере обострения ситуации эксперты отмечают, что вирус становится все более смертоносным, демонстрируя растущий уровень смертности, что вызывает тревогу у представителей здравоохранения во всем мире. Сообщается, что вирус не только хорошо передается, но и демонстрирует признаки мутаций, которые могут усилить его вирулентность. Эта тревожная тенденция привела к усилению внимания и исследовательских усилий, направленных на понимание поведения вируса и его потенциального влияния на здоровье людей во всем мире.\n\nВчера опасения многих подтвердились, когда ВОЗ официально заявила, что пандемия - это уже не вопрос "если", а "когда". Это заявление стало поворотным моментом в глобальном реагировании на вспышку заболевания, побудив страны по всему миру принять срочные меры по смягчению последствий надвигающегося кризиса. Страны уже подсчитывают число инфицированных граждан, а системы здравоохранения готовятся к наплыву пациентов, поскольку число случаев заболевания продолжает расти."
 news.113.o1: "Беспрецедентные Времена"
 news.114.t: "Восстание принцев в Саудовской Аравии"
 news.114.d: "Волнения распространились по всему мировому сообществу в связи с объявлением вооруженных действий в Королевстве Саудовская Аравия после смерти короля Салмана Аль Сауда. Один из самых деспотичных режимов на планете, этот режим всегда был чреват коррупцией, нестабильностью и религиозными конфликтами между шиитским меньшинством и суннитским большинством. Эти разногласия стали очевидны сегодня, когда Королевская Аравийская коалиция, оппозиционное правительство наследного принца Мухаммеда бен Салмана, начала вооруженное восстание против центрального правительства Саудовской Аравии. Аравийская Республика, либеральное движение, сосредоточенное на севере страны, также восстало, ввергнув страну в полную анархию. Цены на нефть выросли более чем на 250%, ввергнув мировую экономику в хаос, а фондовый рынок упал до исторических минимумов. Мир затаил дыхание, когда полуостров охвачен пламенем."
 news.114.a: "Конец для Династии Саудов?"
 news.115.t: "Конгресс Отказывается от Дипломатии"
 news.115.d: "В результате, возможно, самого трагического события 21-го века, правительства двух стран в Денвере и Вашингтоне, округ Колумбия, отказались участвовать в дипломатических переговорах, чтобы достичь мирного урегулирования кризиса, который потряс Соединенные Штаты после нескольких недель безуспешных переговоров. В то время как и Трамп, и Байден соответственно объявили, что они являются законными лидерами страны, спорадические бои между ополченцами вспыхнули вдоль временной линии разграничения вдоль границы Иллинойса и Индианы. Огонь можно увидеть, поднимающийся с высоток Чикаго, когда ополченцы Трампа стреляют раунд за раундом в попытке захватить пограничный город, в то время как ополченцы Байдена наступают на город Дэнвилл, штат Иллинойс. В Денвере в репортажах упоминалось, как фургоны без опознавательных знаков убирали с улиц антивоенных активистов, в то время как протесты в поддержку Трампа в пригороде Луисвилля были насильственно разогнаны Федеральной армией. В то время как правительство Трампа испытывало значительные трудности с поддержанием порядка в либеральных городах, где все еще вспыхивали беспорядки, фактический контроль Байдена не распространяется за пределы автомагистралей и городов, а подпольные ополченцы уже начали вооружаться и устраивать засады на армейские колонны. Семьи по всей территории Соединенных Штатов семьи с ужасом наблюдают, как сама ткань американского общества разрывается на части. Поскольку брат вооружается против брата, нельзя отрицать, что Вторая гражданская война в Америке действительно началась."
 news.115.a: "Братья снова против братьев."
 news.116.t: "Гражданская война в Сирии Заканчивается"
 news.116.d: "Определяющий гражданский конфликт Арабской весны 2011 года, наконец, подошел к концу, поскольку последние исламистские силы на северо-западе Сирии вокруг города Идлиб потерпели сокрушительное поражение от Сирийской армии во время битвы за Идлиб, а последняя Свободная сирийская армия и силы "Джебхат ан-Нусра" дали свой последний бой на северо-западе Сирии в ратуше Идлиба. Сражение подошло к концу, когда весь город был окружен, а ратуша была стерта с лица земли минометным обстрелом. В то время как сирийская армия начинает усмирять очаги сопротивления в отвоеванной мухафазе, президент Сирии анонсировал, что Сирия должна начать восстановление и вернуться к процветанию сейчас, когда поддерживаемые извне повстанческие группировки находятся в смятении. Несмотря на его оптимистичный прогноз, экономика Сирии все еще находится в упадке после десятилетней гражданской войны, и многие проблемы все еще остаются нерешенными, в частности, северо-восточная половина страны контролируется различными бандитами, а исламистские группировки все еще ведут партизанские кампании по всей стране."
 news.116.a: "Мир. Но какой ценой?"
 news.116.b: "Аллах, Сирия, Башар!"
 news.117.t: "Йеменское правительство рушится"
 news.117.d: "От Высшего политического совета поступило подтверждение того, что их силы захватили город Аден и приняли капитуляцию правительства, поддерживающего Хади. В последние годы боевики-хуситы нанесли массовые потери саудовским подразделениям, и, по последним оценкам, в горах Йемена были потеряны целых 3 бригады. В сочетании с уменьшением числа авиаударов Саудовской Аравии на правительство Хади оказывали давление постоянные нападения хуситов, и Аден пал в течение нескольких недель после возобновления наступлений."
 news.117.a: "Увидит ли Йемен наконец мир?"
 news.118.t: "Южный Йемен Отделяется"
 news.118.d: "В результате решительной победы силы, лояльные Южному переходному совету, захватили Сану и Мукаллу, укрепив свой контроль над ключевыми городами Йемена. По сообщениям, ослабленные правительства Хути и Хади бежали, что позволило Переходному совету наконец-то обеспечить долгожданную независимость от Севера после долгих лет гражданской войны.\n\nПосле победы на поле боя руководство Южного совета переключило свое внимание на восстановление и государственное строительство. В результате войны большая часть некогда стабильного региона опустела, инфраструктура разрушена, а экономика подорвана. По мере того как Юг вступает на свой собственный путь, перед ними встает грандиозная задача стабилизации и восстановления своих территорий. Йемен снова оказался разделенным, возможно, на этот раз навсегда."
 news.118.a: "Что это будет означать для Йемена?"
 news.119.t: "Исламские Экстремисты Захватывают Мекку"
 news.119.d: "Исламский мир с ужасом наблюдает за сообщениями из Саудовской Аравии о том, что экстремисты-джихадисты атаковали и захватили город Мекку. Аравийский полуостров уже был ввергнут в состояние беспрецедентного смятения в результате гражданской войны, но, похоже, это новое развитие событий добавляет глазури к этому трагическому и бурному пирогу конфликта. Поскольку правительственные войска Саудовской Аравии потерпели крах в своих попытках навести порядок внутри страны, террористы-исламисты воспользовались этой возможностью и захватили город Мекку при незначительном сопротивлении полиции и остатков сил безопасности, все еще находящихся в этом районе. Террористы публично заявили, что в городе будет создан новый "халифат", а также призвали другие связанные террористические ячейки по всей Саудовской Аравии нанести удары и захватить другие крупные города. Крупнейшие исламские религиозные группы по всему миру осудили захват города, причем многие критиковали повстанцев как "позорящих одно из самых священных мест в исламской вере". Остатки сил правительства и вооруженных сил Саудовской Аравии пообещали, что они быстро разберутся с любыми экстремистскими группировками, которые осмелятся продолжить незаконную вооруженную борьбу против правительства. Граждане-мусульмане по всему миру находятся в состоянии шока в связи с этим наглым нападением на такое важное место. На данный момент, похоже, что эта война в сердце исламского мира будет только обостряться…"
 news.119.a: "Святая земля осквернена"
 news.120.t: "Король Саудовской Аравии мертв"
 news.120.d: "В сегодняшнем сообщении правительство Саудовской Аравии объявило о скоропостижной и печальной кончине правителя страны, короля Салмана Аль Сауда, который занимал этот пост с 2015 года. Хотя правительство избегает называть точную причину его смерти, многие слухи утверждают, что король уже несколько месяцев болел Ковидом, поэтому в этом году он ни разу не появился на публике.\n\nЭто всего лишь одна трагедия в череде тех, что обрушились на королевство, наряду с глобальной пандемией коронавируса и нефтяным кризисом. И хотя Мухаммед бин Салман аль Сауд был быстро коронован в качестве преемника, будучи законным наследником, уровень политической подозрительности и раскола кажется настолько большим, что многие не могут не видеть в этом стремительном развитии событий следы заговора.\n\nВ то же время страну по-прежнему разрывают на части протесты как следствие экономического и последующего общественного краха, а радикальные исламские и республиканские настроения, как сообщается, растут. Королевство уже некоторое время находится на грани фатального кризиса, и внезапная смерть короля может стать тем испытанием, которое оно не преодолеет."
 news.120.a: "Передайте наши соболезнования семье Саудов"
 news.121.t: "Цены на Нефть Падают"
 news.121.d: "Индекс Dow Jones industrial average потерпел худшее падение за один день за всю историю, побив рекорды, установленные ранее в этом месяце, поскольку война цен на нефть встревожила инвесторов, которые уже были в панике из-за эпидемии коронавируса. Индекс голубых фишек приблизился к медвежьей территории на фоне растущих опасений по поводу глобальной рецессии, опустившись на рекордные 2 013,76 пункта, или 7,8 процента, и закрывшись на отметке 23 851,02. Индекс Nasdaq упал на 7,3 процента до 7 950,68 пункта. Индекс S&P 500 потерял 7,6%, закрывшись на отметке 2746,56, что стало худшим днем с декабря 2008 года.\n\nПосле падения на 7% в первые минуты торговой сессии, что вызвало "автоматический выключатель" Нью-Йоркской фондовой биржи, который остановил торги на 15 минут. В понедельник впервые вступило в силу ограничение торговли с тех пор, как в 2013 году были введены текущие пороговые значения, чтобы избежать повторения краха "Черного понедельника" 1987 года. Цена на нефть марки West Texas Intermediate упала более чем на 25 процентов до 30,92 доллара за баррель в понедельник после того, как Россия в минувшие выходные отклонила предложение ОПЕК сократить мировую добычу нефти на целых 1,5 миллиона баррелей в день."
 news.121.a: "О Господи..."
 news.121.b: "Ага, Пошли и Вы На хер" 
 news.122.t: "Ким Чен Ын мертв"
 news.122.d: "Дорогой лидер Северной Кореи скончался сегодня утром из-за осложнений во время операции. В то время как нация скорбит как один, потеряв своего священного сына, беда пришла во внутренний круг королевства отшельников. Ким Йо Чжон, умная, амбициозная и сторонница жесткой линии Чучхе, сделала предсказуемый шаг, чтобы обеспечить вакуум власти, образовавшийся после безвременной кончины ее брата. Пропагандистская машина Северной Кореи уже начала внедрять ее в популярный образ как новое воплощение корейской расы, однако коварные заговорщики и жаждущие власти прВАОИорные планируют в тени захватить "красный трон". Среди этих потенциальных узурпаторов подозреваются ключевые игроки - военный деятель Пак Чон Чхон, начальник Генерального штаба КНА, который мог бы использовать железный кулак северокорейских военных, чтобы силой проложить себе путь к власти, и тесть Ким Йо Джона, склоняющийся к реформам, Чхве Рен- Хэ, первый заместитель председателя Трудовой партии Кореи, чьего огромного политического капитала может оказаться достаточно, чтобы создать достаточно прочную базу власти, чтобы закрепиться в качестве нового председателя КНДР. Поскольку эти политические элементы сталкиваются, судьба неуловимого северокорейского государства висит на волоске."
 news.122.a: "И как справятся северокорейцы?"
 news.122.b: "Прощай, Дорогой Лидер."
 news.123.t: "Гражданская война в Северной Корее"
 news.123.d: ""
 news.123.a: "Конец Северной Кореи?"
 news.124.t: "Эр-Рияд побеждает в Гражданской Войне в Саудовской Аравии"
 news.124.d: "После многих лет кровавого конфликта и непрекращающейся войны на холмах пустыни и в шумных городах Саудовской Аравии, когда бесчисленные бомбы и артиллерия опустошили страну, наследный принц Мухаммед бин Салман воссоединил расколотое королевство.\nЭто долгожданное решение принесло облегчение большей части мира, поскольку призрак нескончаемой гражданской войны внутри Аравии наконец-то рассеялся. После восстановления мира в стране, которая когда-то была самым важным полем битвы на Земле, внимание теперь может быть обращено на монументальную задачу восстановления разрушенной войной страны.\n\nПримирение с регионами, которые сопротивлялись режиму Салмана, остается серьезной проблемой. Однако прогресс, хотя и медленный и кропотливый, неуклонно укореняется на местном уровне. И несмотря на глобальную напряженность в мире, где повсюду идут войны, в знак единства Организация Объединенных Наций единогласно приняла резолюцию о спонсировании еще больших усилий по восстановлению, что еще больше улучшает ситуацию.\n\nВпервые за многие годы мир может отвести свой тревожный взгляд от Аравийского полуострова, поскольку видимость нормальной жизни начинает возвращаться."
 news.124.a: "И вновь течёт нефть."
 news.124.b: "Нас не остановить!"
 news.125.t: "Монархическая коалиция Одержала победу"
 news.125.d: "Огонь полыхает на Аравийском полуострове: гражданская война в Саудовской Аравии подошла к концу, и, похоже, Аль-Сауд, королевская коалиция и их союзники вышли победителями. Война всколыхнула мировую экономику, ее отголоски прокатились по всему миру, но на данный момент в регионе ничего не изменилось, разве что пыль осела на новых могилах.\n\nАллаху Акбар, Аллаху Акбар, Аллаху Акбар, «Бог велик» провозглашали мечети по всему полуострову, по крайней мере те, которых не коснулись пули и бомбы. Некоторые вышли поприветствовать победителей на улицы, некоторые покорились, другие смотрели на парады в Эр-Рияде с сокрушенным видом.\n\nНо победителю достаются трофеи, и король Саудовской Аравии провозгласил свою победу как предначертанную самим Богом для единственного хранителя Мекки и, возможно, гегемона нового арабского мира.\n\n Радость и печаль теперь живут на одних и тех же улицах. В тени флагов и торжеств народу Саудовской Аравии говорят, что он может перейти на новую страницу, хотя некоторые помнят, как выглядела старая..."
 news.125.a: "Хорошо Для Них"
 news.125.b: "Мы сделали то, что казалось правильным"
 news.126.t: "В Аравии прошли свободные выборы"
 news.126.d: "Впервые в своей современной истории Арабская Республика, бывшая Саудовская Аравия, провела многопартийные выборы под международным наблюдением. После победы Республиканской коалиции в гражданской войне переходная хартия открыла путь к открытому голосованию в крупных городах и регионах, все еще находящихся в процессе восстановления.\n\nПартия Национальной Ассамблеи, национально-либеральное движение, возглавляемое давним активистом Яхьей Ассири, стала крупнейшей силой в новом законодательном органе. Хотя ни одна из партий не получила абсолютного большинства, первые сигналы указывают на реформистскую коалицию, ориентированную на гражданское управление, восстановление экономики и постепенную политическую либерализацию.\n\nЯвка была самой высокой в городах и прибрежных районах, а в сельских провинциях она была ниже. Независимые наблюдатели сообщили о мирном процессе с незначительными нарушениями.\nИностранные правительства с осторожностью приветствовали результаты выборов, назвав их шагом к долгосрочной стабильности."
 news.126.a: "Хорошо Для Них"
 news.126.b: "За вечное равенство!"
 news.127.t: "Аравия Объединена Джихадистами"
 news.127.d: "Когда Саудовская Аравия распалась на части, большинство предполагало, что в конечном итоге победу в гражданской войне одержат принцы Королевской аравийской коалиции, правительство Королевства Саудовская Аравия или, возможно, даже реформисты Аравийской Республики.\nНо даже несмотря на многочисленные коалиции иностранных государств, оказывающих политическую и военную поддержку, миллиарды, выплачиваемые наемным армиям для обеспечения стратегических плацдармов, и огромные арсеналы, которые когда-то служили основой саудовской армии, было доказано, что, несмотря ни на что, сила воли и огонь ненависти могут преодолеть все.\n\nК шоку многих, было подтверждено, что исламские джихадисты Джейш Альфат одержали решительную и жестокую победу над всеми оставшимися фракциями в конфликте и объявили о своем господстве и победе в затянувшейся гражданской войне.\n\nТеперь мир столкнулся с беспрецедентной реальностью: два режима открыто укрывают террористические организации, ни один из которых полностью не согласен друг с другом, но оба способствуют опасной эскалации глобальной нестабильности. Последствия этого ужасны: многие страны ожидают резкого увеличения числа террористических атак, поскольку закрывают границы, усиливают меры безопасности и приводят вооруженные силы в состояние повышенной боеготовности."
 news.127.a: "Мрачное лицо вновь появляется на Ближнем Востоке..."
 news.127.b: "Аллах Акбар!"
 news.128.t: "Поддерживаемые Ираном Ополченцы Одержали Победу"
 news.128.d: "После долгого времени, через множество затяжных кампаний, разрушительных осад, голода и прочих ужасов современной войны, сегодня заканчивается гражданская война в Саудовской Аравии. Последний претендент на бывшую богатую нефтью страну известен как «Хезболла аль-Хеджаз», возглавляемая Ахмедом Ибрагимом аль-Мугассилом. \n\nФракция, некогда бывшая свободной коалицией шиитских ополченцев и дезертировавших армейских подразделений, была быстро усилена потоком материалов и добровольцев после обеспечения путей снабжения между Ираном и его различными союзными группами, будь то шииты на юге Ирака, основная часть сил «Хезболлы» или подразделения КСИР, все они вскоре стали ступеньками для господства фракции в регионе. \n\nСейчас, когда они контролируют ситуацию и правят из Эр-Рияда, многие международные наблюдатели и аналитические центры делают вполне очевидное предположение, что фракция увидит, что большая часть помощи на восстановление будет поступать из Ирана, а на всем Ближнем Востоке будет наблюдаться активизация подрывных усилий Тегерана, ведь его главный враг и соперник теперь его самый большой союзник в регионе. Кое-что из этого мы уже наблюдаем: скоро состоится запланированная дипломатическая миссия между Тегераном и Эр-Риядом."
 news.128.a: "Хорошо Для Них"
 news.128.b: "Аллах Акбар!"
 news.129.t: "Владимир Путин Мертв"
 news.129.d: "Оказавшись вне поля зрения с тех пор, как у него обнаружили вирус Ковид-19, российские государственные новости поддерживали рассказ о том, что Путин находится в отличной форме и находится на пути к выздоровлению. Однако сегодня утром эти надежды рухнули, когда Кремль объявил, что Путин, архитектор современной России, скончался от болезни в 4:36 утра по московскому времени.\n\nНовость распространилась как лесной пожар, и россияне по всей Стране выразили свои соболезнования покойному лидеру, к которому, несмотря на то, что на Западе к нему относились как к автократическому диктатору, россияне в целом почитали его почти как бога, была объявлена санкционированная государством национальная неделя траура. Медведев заявил, что смерть его наставника и давнего друга "вонзилась мне в сердце, как кинжал, что почувствовал бы любой россиянин с душой". \n\nПоскольку многие скорбят по всей Федерации, неопределенность также охватила ее; хотя Медведев готов сменить Путина, остается только наблюдать, сможет ли "Единая Россия", с ее историей фальсификации избирательного процесса в свою пользу, оставаться доминирующей партией, без своего любимого крестного отца у руля, и многие подозревают, что они проиграют на следующих президентских выборах."
 news.129.a: "Интересное Развитие Событий..."
 news.129.b: "Покойся С Миром, Товарищ."
 news.130.t: "Декларация Евразийского государства"
 news.130.d: "После установления контроля и наведения порядка по всей России Александр Дугин выступил с речью, провозгласив Евразийское государство с намерением в ближайшее время расширить свои границы. Протестующие неизбежно прибыли на выступление, сторонники Евразийской партии столкнулись в трехсторонней потасовке, к которой присоединилась и полиция. Сообщалось о 30 погибших и еще сотнях раненых."
 news.130.a: "Кровавое начало."
 news.130.b: "Новый Национальный Праздник!"
 news.131.t: "Американо-Талибское мирное соглашение"
 news.131.d: "После 18 долгих месяцев Специальный представитель США Залмай Халилзад и глава воинствующей исламистской группировки Мулла Абдул Гани Барадар подписали историческое соглашение в субботу в Дохе, Катар. В соответствии с согласованными условиями США обязались вывести все свои вооруженные силы и поддержать гражданский персонал, а также персонал своих союзников, в течение 7 месяцев.. Процесс сокращения начнется с США. сокращение численности своих войск до 5000 человек за первые 100 дней и вывод своих сил с пяти баз, а остальные силы уйдут в последующие месяцы. Афганское правительство также освободит до 5000 заключенных талибов в качестве жеста доброй воли в обмен на 1000 афганских сил безопасности, удерживаемых талибами. Движение "Талибан" согласилось прекратить поддержку таких группировок, как "Аль-Каида" и ИГИЛ. Однако многие сомневаются в том, что талибы смогут выполнить свою часть сделки из-за исторических связей между группировками. Почти 18 лет боевых действий в Афганистане погибло более 2400 американцев, что, по оценкам, обошлось казне США почти в 1 триллион долларов. Аналитики называют это состоянием стратегического тупика.\n\nАфганское правительство также начнет переговоры с движением "Талибан", чтобы наметить политическое урегулирование, которое определило бы роль движения "Талибан" в будущем Афганистане. Ожидается, что эти переговоры начнутся в следующем месяце. Одной из первых задач на этих внутриафганских переговорах будет достижение прочного прекращения огня в Афганистане."
 news.131.a: "Хорошо Для Них"
 news.131.b: "Наконец-То Мир!"
 news.131.c: "Они Должны Были Извлечь Урок Из Нашей Ошибки..."
 news.132.t: "Полиция Нью-Йорка восстановила контроль над Нью-Йорком"
 news.132.d: "Департамент полиции Нью-Йорка подтвердил, что они восстановили полный контроль над городом Нью-Йорк. Правительство города, находившееся под управлением Коммунистической партии США, было свергнуто практически в одночасье. Десятки членов коммунистической партии были найдены мертвыми в своих домах в течение 3 недель, что привело к нарушению эффективной связи с общепартийными и  ополченческими силами. Полиция быстро оцепила город и начала арестовывать тысячи коммунистических ополченцев и занимать ключевые здания в городе. Быстро распространились слухи о причастности местных мафиозных семей в Нью-Йорке, лидеры коммунистической партии были вывезены из города в неизвестные районы, а местонахождение Джо Симса, ныне бывшего генерального секретаря Коммунистической партии США, неизвестно. Он считается мертвым вместе со всеми высокопоставленными членами партии."
 news.132.a: "Думаю, они плохо сказывались на бизнесе..."
 news.132.b: "Неудача революции."
 news.133.t: "Дональд Трамп одержал победу в Гражданской войне в Америке"
 news.133.d: "Сегодня в розарии Белого дома Дональд Трамп объявил всей Америке о капитуляции оставшихся сил, выступающих против его президентства. Инаугурационная речь президента Трампа, после того как он был приведен к присяге в качестве президента, мало чем помогла успокоить напряженность, которая все еще царила в американской психике. Окруженный своими ближайшими советниками и высшим военным командованием, президент объявил Америке и всему миру: "Сегодня после долгой и ужасной битвы демократия вновь восторжествовала. Безмозглые головорезы из "Антифа" и других радикальных левых группировок пытались украсть эти выборы. Однако, к счастью, им это не удалось. Я благодарю отважных губернаторов штатов за соблюдение Конституции и благодарю всех американских граждан за то, что они вооружились против этой угрозы и защитили демократию. Моя законная администрация приступила к работе, чтобы Америка никогда больше не была разделена, да благословит нас всех Господь. Боже, благослови Америку!"\n\nПока президент Трамп сосредоточен на восстановлении своей расколотой страны, международное сообщество смотрит на ослабленную Америку и видит, что впервые за почти столетие Соединенные Штаты больше не являются глобальной гегемонией на мировой арене, что заставляет многих задаваться вопросом, кто станет их преемником."
 news.133.a: "Конец безумию."
 news.133.b: "Они больше никогда не причинят вреда Америке"
 news.134.t: "Союз Победил в Американской Гражданской Войне"
 news.134.d: ""В красоте Небесных лилий Христос за морем был рожден, Славой, что в груди несет он, я и ты преображен. Как он умер, чтобы сделать человечество святым, Так давайте жить мы будем и людей освободим. И Бог движется вперед" Эти слова поют сегодня по всей Америке, нанося последние смертельные удары по предательским эшелонам по всей стране, которые, наконец, поддались освободительной борьбе, а это и есть по-настоящему свободная Америка. Президент Джозеф Робинетт Байден-младший, в котором когда-то сомневались, когда он шел по стопам больной и израненной Америки, говорили, что он простой фигурант или человек который разделяет, доказал, что все, кто когда-то неправильно оценил его начинания, были неправы, поскольку он вновь объединил нацию голыми руками, сдерживая боль и горе, с которыми были связаны все американцы, но он понимал это до самого дня, когда объединение оказало свое благотворное влияние на нацию. Теперь, подобно Линкольну или Рузвельту, на него была возложена обязанность по-настоящему перестроить и превратить Америку в машину славы, более не отравленную страхом и ненавистью, в ее образ."
 news.134.a: "Мы будем хранить веру и продвигаться вперед как единое целое."
 news.134.b: "Мы сохраним веру и будем продвигаться вперед как единое целое."
 news.135.t: "Глория ла Рива одержала победу в Гражданской войне в Америке"
 news.135.d: "Поскольку бывшая столица Соединенных Штатов продолжала гореть с последних дней гражданской войны, Глория Ла Рива и ее "товарищи" двинулись к Белому дому, но обнаружили, что он разрушен, а фирменный американский флаг на здании сгорел дотла. Когда ее Красная гвардия начала собираться у разрушенного Белого дома, новый премьер-министр Америки начала свое первое обращение к своим верным сторонникам. "Товарищи, сегодня знаменуется окончание пролетарской революции в Америке! Декадентские фашистские и капиталистические силы Дональда Трампа и Джозефа Байдена были уничтожены, а их наследие запятнано. Я благодарю наших товарищей по всей Америке за помощь в борьбе с фашизмом, где бы он ни был обнаружен. Однако сейчас настало время для единства, настало время преодолеть зло Дональда Трампа и капитализма, настало время восстановить нашу расколотую нацию и построить Америку, которая работает для всех". С победой премьер-министра в этой войне Америка теперь начнет реструктуризировать свои различные демократические институты заменят их новой социалистической Америкой, которая будет стремиться бороться с различными несправедливостями, которые преследовали Америку с момента ее основания три столетия назад. Однако, учитывая тотальный контроль Ла Ривы над Америкой, многие задаются вопросом, является ли это началом эгалитарной Америки или началом скатывания к тоталитаризму."
 news.135.a: "Тревожный исход для Америки."
 news.135.b: "Солидарность Навсегда!"
 news.137.t: "Президентство Хиллари Клинтон"
 news.137.d: ""
 news.137.a: "Женщина В Белом Доме..."
 news.138.t: "Третий срок"
 news.138.d: ""
 news.138.a: "Конец Целой Эпохи..."
 news.139.t: "КНР вторгается на Тайвань"
 news.139.d: "Четвертый кризис в Тайваньском проливе перерос в полномасштабный конфликт между Китайской Народной Республикой и Китайской Республикой на острове Тайвань, возобновив гражданскую войну в Китае, которая закончилась изгнанием Гоминьдана через Тайваньский пролив. Сотни реактивных самолетов начали летать над островом, вступая в воздушные бои, в то время как весь военно-морской флот Китая был мобилизован, появились сообщения о первых высадках на берегах Тайваня, островов Ляньчян и немедленных военно-морских столкновениях между ВМС КНР и КР. СВКР объявила полную мобилизацию, в то время как военное положение было объявлено по всему Тайваню, поскольку последние силы старой Китайской Республики готовятся к выживанию в борьбе с колоссом КПК, а береговая охрана сообщила о наблюдениях китайских десантных судов, которые уже пересекают пролив в направлении Тайваня."
 news.139.a: "Финальная Схватка"
 news.140.t: "Перестрелки в Нагорном Карабахе"
 news.140.d: "Сегодня в Нагорном Карабахе началась серия столкновений высокой интенсивности, невиданных с 2016 года, после военного наступления Азербайджана вдоль линии соприкосновения, установленной в 1991 году, в результате чего были захвачены Физули и несколько приграничных городов. В этом наступлении использовались бронетанковые формирования, а также беспилотные летательные аппараты, поставляемые в Азербайджан турецкими и израильскими торговцами оружием. Армения уже направила обращение в ООН и Организацию Договора о коллективной безопасности, однако Москва не услышала их мольбы, предоставив их самим себе. Степанакерт, столица Республики Арцах, непризнанного сепаратистского государства, созданного в 1988 году во время Первой нагорно-карабахской войны, стал объектом азербайджанских обстрелов и атак беспилотников. На помощь Азербайджану также прибыли сирийские наемники, в основном из протурецкого подразделения "Хамза", расположенного на северо-востоке страны.\n\nНесмотря на то, что большинство средств массовой информации западного мира не освещали этот конфликт, после окончания Первой нагорно-карабахской войны, закончившейся победой Армении и созданием Республики Арцах армянской диаспорой в регионе, назревал еще один конфликт между этими двумя странами. Вполне вероятно, что Азербайджан выйдет победителем благодаря переоснащению и реформированию своих Вооруженных сил израильскими и турецкими системами вооружения, такими как беспилотный летательный аппарат "Байрактар", и военным советникам."
 news.140.a: "Молитесь о мирном разрешении"
 news.141.t: "Демократические Протесты Прокатились по России"
 news.141.d: "Сегодня Россию сотрясают беспорядки, поскольку огромное количество протестов охватило крупные российские города, включая столицу Москву. Протесты, возглавляемые активистом по борьбе с коррупцией Алексеем Навальным, представляют собой объединение либерально настроенных реформаторов, студентов, городских специалистов и других лиц, которые объединились в оппозицию администрации Путина. Активисты призывают к большей прозрачности правительства, возобновлению борьбы с коррупцией, уменьшению жестокости полиции и связанным с этим либерально-демократическим реформам. Российские правоохранительные органы отреагировали в своей типичной манере многочисленными арестами и применением силы против протестующих. Кремль или другие государственные учреждения не дали никаких серьезных комментариев, за исключением нескольких представителей в Думе, осудивших протесты как "поддерживаемые западной разведкой и другими предателями". Официальные лица НАТО и США официально осудили реакцию российского правительства как репрессивную и насильственно автократическую. Многие аналитики на Западе выражают оптимизм по поводу продолжающихся усилий демократических активистов в России, но многие указывают на консолидацию власти Путина, его партии и сил безопасности в российском государстве, которая сделает значимые изменения практически невозможными."
 news.141.a: "Интересно"
 news.142.t: "Нападения исламистов во Франции и Австрии"
 news.142.d: "Ужасные новости поступают сегодня из Западной Европы: террористы-исламисты наносят удары по крупным городам Франции и Австрии! За последние двадцать четыре часа столичная полиция Парижа, Марселя, Лиона и Вены сообщила о многочисленных взрывах в известных местах в центре города. Французские и австрийские правоохранительные органы сообщили, что число жертв исчисляется сотнями, назвав вчерашние теракты одними из самых смертоносных в современной истории Европы. Нынешние крупномасштабные расследования в отношении преступников показали, что они являются недавними арабскими иммигрантами, которые либо были радикализированы террористическими группировками, действующими на Ближнем Востоке, либо были непосредственно завербованы для проведения операции такими организациями. Различные исламистские террористические группировки, которые смогли набрать силу из-за продолжающегося кризиса в Саудовской Аравии, заявили об ответственности, ссылаясь на участие Запада на Ближнем Востоке в качестве главного мотиватора. Разведка НАТО предупреждает общественность многих западноевропейских стран о том, что угроза терроризма по-прежнему чрезвычайно высока и что люди должны немедленно быть настороже и сообщать обо всем подозрительном. Франция и Австрия объявили день траура по погибшим в результате терактов и заявили, что они привлекут к ответственности группы, ответственные за это."
 news.142.a: "Ужас вновь охватывает Европу."
 news.143.t: "Майя Санду Избрана Президентом Республики Молдова"
 news.143.d: "Майя Санду из проевропейского избирательного блока ACUM, состоящего из Партии действия и солидарности (ПДС) и партии "Платформа достоинства и правды" (ПДП), была избрана президентом Республики Молдова. Результаты выборов стали шоком для многих в стране, которая считается самой бедной страной в Европе. Санду пообещала сильную антикоррупционную кампанию, улучшение качества жизни и более тесное сближение с Западом и интеграцию в ЕС. Результаты также стали огромным ударом по Москве, которая расширяла свое влияние в Молдове при предыдущем пророссийском президенте Игоре Додоне, и многие ждут, каким будет следующий шаг Москвы после того, как она начнет терять свое влияние в Молдове."
 news.143.a: "Новый курс для Молдовы"
 news.144.t: "Игорь Додон Переизбран Президентом Республики Молдова"
 news.144.d: "Игорь Додон из Партии Социалистов Республики Молдова (ПСРМ) был переизбран президентом Республики Молдова. Игорь Додон, ранее избранный в 2016 году, направлял страну в сторону большего сближения с Востоком и особенно с Россией. Додон теперь стремится к еще более тесным отношениям с Российской Федерацией и занимает решительную позицию в отношении Европейского союза и поощрения молдавского национализма, а также левой популистской политики. Многие зарубежные эксперты предсказывали, что переизбрание Игоря Додона может стать концом западного влияния в Молдове, а поскольку контроль Москвы над страной ужесточается, будущее Молдовы остается неопределенным."
 news.144.a: "Молдова снова попадает в тиски Москвы..."
 news.145.t: "Опустошение Сахары!"
 news.145.d: "."
 news.145.a: "Да поможет нам всем Бог..."

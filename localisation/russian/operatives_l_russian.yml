 BECOME_SPY_MASTER_COST: "Стоимость становления §Hруководителем разведсети§!: £pol_power $VALUE$."
 BECOME_SPY_MASTER_DESC: "Будучи §Hруководителем разведсети§!, вы сможете контролировать больше агентов. Их количество зависит от размера вашего альянса.\nВ альянсе может быть только один §Hруководитель разведсети§!. Если в вашем альянсе уже есть §Hруководитель разведсети§!, он должен согласиться на замещение вашей кандидатурой."

 branch_intelligence_gathering_disciplines:0 "Дисциплины Сбора Разведданных"
 branch_intelligence_human:0 "HUMINT"
 branch_intelligence_signals:0 "Радиоэлектронная Разведка"
 upgrade_foreign_intelligence:0 "Внешняя Разведка" 
 upgrade_foreign_intelligence_desc:0 "§LПод иностранной разведкой понимается деятельность спецслужб за рубежом.§!" 
 upgrade_domestic_intelligence:0 "Внутренняя Разведка" 
 upgrade_domestic_intelligence_desc:0 "§LВнутренняя разведка - это деятельность разведывательных служб, осуществляемая в пределах нашей страны.§!" 
 upgrade_military_intelligence:0 "Военная Разведка" 
 upgrade_military_intelligence_desc:0 "§LВоенная разведка относится к деятельности разведывательных служб, которая непосредственно связана с военными вопросами.§!" 
 
 unique_upgrade_hidden_front:0 "Скрытый Фронт"
 unique_upgrade_hidden_front_desc:0 "Концепция, возникшая в те времена, когда КПК еще была подпольным движением, §YСкрытый фронт§! относится к китайскому шпионажу. В контексте специфически китайской разведывательной деятельности оно охватывает контрразведку и операции влияния в поддержку китайских национальных целей."
 unique_upgrade_leda:0 "LEDA"
 unique_upgrade_leda_desc:0 "Генеральный директорат по внешней безопасности выполняет свои обязанности в соответствии с принципами, которые называются §YLEDA§!. §YL§! означает лояльность (loyauté), §YE§! означает повышенные стандарты (exigence), §YD§! означает осмотрительность (discrétion) и §YA§! означает адаптивность (adaptabilité)."
 unique_upgrade_vperson:0 "V-Person"
 unique_upgrade_vperson_desc:0 "Аббревиатура от "Vertrauensperson" (доверенное лицо) или "Verbindungsperson" (контакт), §YV-Person§! - это долгосрочный тайный партнер и источник информации, часто работающий в экстремистской и криминальной среде. Разница между обычным информатором и §YV-Person§! заключается в том, что информатор часто работает недолго, а §YV-Persons§! продолжает действовать в качестве источника информации в течение длительного времени и по нескольким целям."
 
 upgrade_planning_and_direction:0 "Планирование и Руководство" 
 upgrade_planning_and_direction_desc:0 "§LИдеализированная модель цикла разведки начинается с "планирования и направления". Это делается для того, чтобы определить цель, дело или задачу, над которой будет работать цикл разведки.§!" 
 upgrade_collection:0 "Сбор" 
 upgrade_collection_desc:0 "§LЗная, что искать, цикл разведки переходит в фазу сбора, где средства используются для сбора и получения данных о рассматриваемом объекте.§!" 
 upgrade_processing_and_exploitation:0 "Обработка и Эксплуатация" 
 upgrade_processing_and_exploitation_desc: "§LПосле получения исходных данных их необходимо обработать (перевести, оценить на предмет актуальности и т. д.) и подготовить к использованию (например, создать пакет разведывательных данных для полевых агентов).§!"
 upgrade_analysis:0 "Анализ"
 upgrade_analysis_desc:0 "§LПосле обработки данных их необходимо проанализировать, чтобы составить целостную картину о субъекте. Разрозненные данные сами по себе малоэффективны.§!"
 upgrade_dissemination:0 "Распространение" 
 upgrade_dissemination_desc:0 "§LПосле подготовки разведывательный цикл завершается распространением информации среди соответствующих адресатов, готовых принять меры или должным образом проигнорировать ее.§!"
 upgrade_humint:0 "HUMINT" 
 upgrade_humint_desc:0 "§LЧеловеческая Разведка (HUMINT) - это метод сбора разведданных, который осуществляется посредством межличностного общения, такого как дискуссия, допрос или пытка.§!" 
 upgrade_sigint:0 "SIGINT" 
 upgrade_sigint_desc:0 "§LРадиоэлектронная Разведка (SIGINT) - метод сбора разведывательной информации, основанный на перехвате различных сигналов.§!"
 upgrade_masint:0 "MASINT"
 upgrade_masint_desc:0 "§LИзмерительно Сигнатурная Разведка (MASINT) - метод сбора разведданных, который основан на наблюдении за сигнатурами целей. В качестве примера можно привести радиолокационную, акустическую и ядерную разведку.§!"
 upgrade_osint:0 "OSINT"
 upgrade_osint_desc:0 "§LРазведка по открытым источникам (OSINT) - метод сбора разведывательной информации, который опирается на открытые источники, такие как СМИ, Интернет и различные издания.§!"
 upgrade_geoint:0 "GEOINT"
 upgrade_geoint_desc:0 "§LГеопространственная разведка (GEOINT) - метод сбора разведывательной информации, основанный на геопространственной информации, получаемой в основном из источников изображений.§!"
 upgrade_cell_system:0 "Система Ячеек" 
 upgrade_cell_system_desc:0 "§LСистема Ячеек - это способ организации шпионских групп таким образом, что одна часть практически не знает общей картины. В результате потеря одной части не ставит под угрозу всю организацию.§!" 
 upgrade_communication_security:0 "Безопасность Коммуникаций" 
 upgrade_communication_security_desc:0 "§LБезопасность Коммуникаций - это действия и правила, установленные для предотвращения случайного раскрытия конфиденциальной информации и подслушивания.§!"
 upgrade_support_services:0 "Службы Поддержки"
 upgrade_support_services_desc:0 "§LСлужбы Поддержки - это группы, призванные облегчить работу оперативников разведки, выполняя вспомогательные задачи.§!"
 upgrade_enhanced_interrogation_techniques:0 "Усовершенствованные Методы Допроса"
 upgrade_enhanced_interrogation_techniques_desc:0 "§LУсовершенствованные методы допроса - это самые совершенные методы XXI века, позволяющие преодолеть психические барьеры допрашиваемых и получить доступ к их секретам.§!"
 upgrade_termination:0 "Прекращение Деятельности"
 upgrade_termination_desc:0 "§LПод прекращением деятельности понимается ликвидация дружественных оперативников и активов, которые так или иначе стали угрозой оперативной безопасности.§!"
 upgrade_comint:0 "COMINT"
 upgrade_comint_desc:0 "§LРадиоразведка (COMINT) Относится к подкатегории SIGINT, специализирующейся на текстовой и голосовой информации, получаемой путем перехвата сигналов.§!"
 upgrade_elint:0 "ELINT"
 upgrade_elint_desc:0 "§Lрадиотехническая разведка (ELINT) - это метод сбора разведданных, который использует электронные датчики и в основном нацелен на сигналы, не относящиеся к средствам связи.§!"
 upgrade_advanced_cryptoanalytical_attack_models:0 "Модели Криптоаналитических Атак"
 upgrade_advanced_cryptoanalytical_attack_models_desc:0 "§LВ криптоанализе (используется для взлома систем криптографической безопасности) модель атаки - это классификация криптографических атак, основанная на том, какой доступ получит злоумышленник после успеха.§!"
 upgrade_cryptosystem_algorithm_upgrade:0 "Модернизация Агоритмов Криптосистем"
 upgrade_cryptosystem_algorithm_upgrade_desc:0 "§LСовременная криптографическая безопасность построена на математической теории и предположениях о трудностях вычислений, что, по сути, означает, что хотя теоретически это возможно, любой потенциальный злоумышленник практически не сможет взломать систему грубой силой.§!"
 upgrade_quantum_cryptography:0 "Квантовая Криптография"
 upgrade_quantum_cryptography_desc:0 "§LКвантовые вычисления открывают новые криптографические горизонты как для атакующего, так и для защищающегося.§!"

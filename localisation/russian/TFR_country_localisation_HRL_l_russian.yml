 libya.1.t: "Падение Мисураты"
 libya.1.d: "Наши войска сокрушили оборону врагов и захватили стратегический город Мисурата! Эта война закончится в мгновение ока!"
 libya.1.a: "Отличная Новость"
 libya.2.t: "Падение Триполи"
 libya.2.d: "Эта война наконец-то подошла к концу! Наши сухопутные войска взяли столицу ПНА после тяжелых боев. Теперь можно, наконец, сосредоточиться на восстановлении нашей нации."
 libya.2.a: "Нас не остановить!"

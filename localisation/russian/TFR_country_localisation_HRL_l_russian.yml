 libya.30.t: "В Ливии Подписано Соглашение о Прекращении Огня"
 libya.30.d: ""
 libya.30.a: "Ничего себе"
 libya.31.t: "Перемирие в Ливийской Гражданской Войне"
 libya.31.d: "После нескольких месяцев переговоров противоборствующие фракции Ливии согласились на общенациональное прекращение огня, официально объявив о прекращении крупных боевых действий по всей стране. Подписанное 23 октября 2020 года соглашение предусматривает немедленное прекращение наступательных действий на всех фронтах и определяет меры, направленные на стабилизацию повседневной жизни, включая открытие ключевых дорог, возобновление внутренних перевозок и шаги по обмену пленными. \n\nПеремирие также включает положения, направленные на сокращение иностранного присутствия в Ливии, с обязательствами вывести из страны наемников и внешние военные элементы. Хотя формулировка на бумаге ясна, ее реализация остается неопределенной. Вооруженные формирования по-прежнему контролируют обширные территории, командные структуры раздроблены, а политические институты, призванные объединить государство, остаются ослабленными после многих лет фрагментации и параллельного управления. \n\nДипломаты, участвовавшие в переговорах, описывают соглашение как необходимый прорыв, но рожденный скорее изнеможением, чем доверием. Обе стороны понесли тяжелые потери, а экономическое напряжение, вызванное затяжным конфликтом, усилило давление в пользу перерыва. Однако более глубокие споры по поводу легитимности, контроля над доходами от нефти и будущей структуры ливийского государства остаются нерешенными. \n\nНа данный момент орудия молчат. Вопрос в том, станет ли это перемирие основой для мира или лишь затишьем перед следующим раундом."
 libya.31.a: "Наконец-то мир?"
 
 libya.45.t: "Выборы в Ливии Приостановлены из-за Разногласий"
 libya.45.d: "Планируемые национальные выборы в Ливии были официально приостановлены после того, как переговоры между противоборствующими политическими блоками закончились открытым разногласием, вновь погрузив хрупкий переходный период в стране в неопределенность. То, что должно было стать следующим шагом после октябрьского перемирия, вместо этого превратилось в еще одно поле битвы, на этот раз сражающейся через нефункциональные комитеты и юридические разногласия. \n\nВ центре спора лежит вопрос, который Ливия так и не решила: кто имеет право править и по каким правилам. Соперничающие фракции обвиняют друг друга в манипулировании избирательным законодательством, препятствовании регистрации избирателей и формировании процесса таким образом, чтобы гарантировать победу еще до начала голосования. Споры о правомочности кандидатов, региональном представительстве и роли вооруженных групп парализовали работу избирательной комиссии, а местные власти в нескольких городах отказались признавать решения, принимаемые в столице. \n\nМеждународные посредники призывают к сдержанности, но их влияние ограничено. На местах ополченцы по-прежнему укрепились, гарантии безопасности неопределенны, а политические лидеры продолжают говорить о единстве, готовясь к возможному новому расколу. Отсрочка не положит конец политическому процессу, но лишит его импульса, а в Ливии потеря импульса часто означала потерю мира.\n\nДля обычных ливийцев приостановка соглашения воспринимается не столько как задержка, сколько как подтверждение того, что страна по-прежнему находится в ловушке между перемирием и урегулированием, между хрупким спокойствием и угрозой возобновления конфликта."
 libya.45.a: "Мир вновь отложен."
 libya.46.t: "Восстановление Королевства Ливия"
 libya.46.d: "В шаге, который, как считали многие, никогда не вернется из истории, Ливия официально объявила о восстановлении королевства, возродив монархию Сенусси как символ национального единства после многих лет гражданской войны и политического паралича. Объявление, сделанное в присутствии высокопоставленных политических деятелей и представителей военных кругов, представляет монархию не как возвращение к абсолютной власти, а как попытку установить нейтральную корону над раздробленным государством. \n\nСторонники восстановления монархии утверждают, что ливийская республика потерпела неудачу, которую невозможно исправить. С 2011 года сменявшие друг друга правительства возникали и рушились, выборы зашли в тупик, а соперничающие администрации разделили страну на зоны влияния. В этом вакууме монархия представляется последней институцией, способной объединить восток и запад, племена и города, милицию и государство, якорем, призванным пережить амбиции любой отдельной фракции. \n\nНовый король пообещал провести радикальные реформы, вести переговоры о национальном примирении и в конечном итоге вернуться к народной демократии в рамках реструктурированной системы. Однако скептицизм по-прежнему широко распространен. Вооруженные группировки по-прежнему обладают решающей властью во многих районах, и критики предупреждают, что восстановление королевства может просто стать еще одним флагом, под которым будут выступать те, кто имеет оружие и влияние. В Триполи реакция варьировалась от осторожного принятия до полного неприятия, причем некоторые называли декларацию незаконной и предупреждали, что Ливию нельзя объединить одними только символами. \n\nТем не менее, впервые за много лет поднимается единый лозунг, символизирующий национальную преемственность. Станет ли восстановленное королевство путем выхода из кризиса или лишь другой формой разделения, будет зависеть от того, что последует за сегодняшними речами."
 libya.46.a: "Корона возвращается в Ливию."
 libya.47.t: "Новая Эра Ливийских Милитаристов"
 libya.47.d: "Ливия вновь погрузилась в хаос. После неудачной попытки Саифа аль-Ислама завоевать Магриб, хрупкий порядок, который он установил в стране, распался на отдельные части. За несколько недель военные части раскололись, командная структура распалась, а целые регионы вышли из-под контроля центральной власти. Государство, которое утверждало, что возродит Ливию, на самом деле разрушило ее. \n\nПоражение за рубежом обнажило слабости, которые были скрыты пропагандой и принудительным единством. Запасы иссякли, соперничающие командиры обвиняли друг друга, а местные лидеры начали действовать самостоятельно. В Триполи вооруженные группировки захватили министерства и радиостанции. На востоке офицеры объявили "чрезвычайные советы" для защиты своих городов. На юге пограничные маршруты перешли в руки контрабандистов и племенных ополченцев, которые теперь собирают налоги под дулами автоматов. Нефтяные объекты Ливии, когда-то бывшие опорой любого правительства, все чаще становятся предметом споров и удерживаются только теми, кто в данную неделю способен защитить нефтепроводы. \n\nГражданская жизнь рушится вместе с политическим порядком. Аэропорты закрываются без предупреждения. Очереди за топливом тянутся часами. Отключения электроэнергии длятся днями. Суды перестали функционировать во многих регионах, их заменили импровизированные "комитеты безопасности", лояльные местным силовикам. Некоторые группы заявляют, что действуют во имя революции, другие - во имя религии, третьи - просто ради прибыли. Их флаги разные, но результат один: Ливия вернулась к правлению контрольно-пропускных пунктов. \n\nМеждународные игроки выпускают заявления, призывающие к сдержанности, но реальность жестока и проста. Ливия больше не является страной, движущейся к восстановлению, она полностью развалилась. Эпоха национального воссоединения закончилась. Началась эпоха военачальников."
 libya.47.a: "Ливия разваливается безвозвратно."

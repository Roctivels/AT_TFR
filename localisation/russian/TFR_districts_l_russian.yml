 GER_hog_angela_merkel: "Канцлер: §HАнгела Меркель§!\n\n\n\n\n\n\n\n   £GFX_GER_angela_merkel_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LАнгела Доротея Каснер родилась в Западной Германии, дочь лютеранского пастора, который переехал на Восток, чтобы распространять веру. Химик по профессии, она достигла совершеннолетия в Демократической Республике, наблюдая за процветающим Западом из-за внутренней границы Германии. Затем произошло воссоединение, а вместе с ним и возможности.\n\nПадение стены стало катализатором политической карьеры Меркель. Она недолго работала пресс-секретарем первого и единственного демократического правительства ГДР. После воссоединения в 1990 году она была избрана в Бундестаг как член ХДС и назначена министром по делам женщин и молодежи Гельмутом Колем, который взял ее под свое крыло в качестве протеже. Но такого положения в федеральном правительстве было недостаточно, и когда появилась возможность осудить Коля и руководство ХДС, она ею воспользовалась. В 2000 году она стала первой женщиной-лидером ХДС, а в 2005 году - первой женщиной-канцлером в истории Германии и первой женщиной-канцлером Федеративной Республики, выросшей в ГДР. Ее канцлерство длилось 15 лет и четыре раза проходило через финансовые кризисы и волны мигрантов, она оставалась непоколебимым якорем как Германии, так и Европы.§!"
 GER_hog_tino_chrupalla: "Канцлер: §HТино Крупалла§!\n\n\n\n\n\n\n\n   £GFX_GER_tino_chrupalla_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LТино Хрупалла родился 14 апреля 1975 года в Вайбвассере, в бывшей восточногерманской земле Саксония, и рос в семье рабочих в последние десятилетия существования Германской Демократической Республики. Его отец работал ремесленником, и с ранних лет Крупалле было привито глубокое уважение к труду, традициям и местной самобытности. После получения среднего образования он прошел профессиональную подготовку по специальности "художник-декоратор," а затем стал самостоятельным мастером, управляющим собственным бизнесом в родном городе.\n\nВ отличие от многих своих современников в берлинских политических кругах, путь Крупалла в национальную политику начинался не в университетах или молодежных отделениях партий, а в мастерских и на стройках восточной Саксонии. Только в 2015 году, в разгар европейского кризиса мигрантов и растущих волнений среди части населения, Крупалла вступил в АдГ - партию, которая в то время быстро превращалась из евроскептического движения в более широкую правую популистскую силу. Его взлет в партии был стремительным. На федеральных выборах 2017 года Крупалла сместил Михаэля Кречмера, видного представителя ХДС, получив прямой мандат в округе Гёрлиц, что стало признаком углубления корней АдГ на востоке Германии. В Бундестаге он вскоре стал твердым сторонником национального консерватизма, антиглобализма и традиционных немецких ценностей. Его риторика нашла отклик у многих, кто чувствовал себя отставшим от основного политического консенсуса.\n\nВ ноябре 2019 года Хрупалла был избран федеральным соруководителем АдГ вместе с Йоргом Мойтеном, что символизирует смену власти в партии, отход от прежнего технократического ядра и переход к более националистическому, культурно-защитному крылу. Благодаря своему скромному происхождению и риторической простоте, Крупалла позиционировал себя как человека из народа, контрастируя с политической элитой, оторванной от повседневной немецкой жизни.\n\nНыне Хрупалла возглавляет Отечество, и как его лидер он пообещал привести его к новой эре. Нация больше не будет подрываться слабыми политиками и элитой, теперь весь мир увидит, насколько сильной может быть Германия.§!"
 GER_hog_olaf_sholtz: "Канцлер: §HОлаф Шольц§!\n\n\n\n\n\n\n\n   £GFX_GER_olaf_sholtz_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LШольц родился 14 июня 1958 года в Оснабрюке, Нижняя Саксония, но вырос в Гамбурге, где его родители работали в текстильной промышленности. Он изучал право в Гамбургском университете, специализируясь на трудовом законодательстве и законодательстве о занятости. В 17 лет Шольц вступил в СДПГ и сразу же стал активным членом ее молодежного крыла, известного также как Юсос, став в 1980-х годах заместителем федерального председателя.\n\nШольц впервые вошел в залы Бундестага в 1998 году и за время своего пребывания там занимал множество должностей. Среди наиболее значимых должностей - генеральный секретарь СДПГ и федеральный министр труда и социальных дел при предыдущем канцлере Ангеле Меркель с 2007 по 2009 год. В 2011 году он стал мэром своего родного города, Гамбурга, курируя крупные реформы в бюджетной сфере и множество крупных инфраструктурных проектов. В 2018 году он вернулся в федеральную политику в качестве вице-канцлера и министра финансов в кабинете Меркель, где сыграл ключевую роль в борьбе с пандемией Ковид-19.\n\nСегодня он достиг вершины лестницы, получив титул канцлера. Работа, которая ему предстоит, не будет легкой и простой. В последнее время мир переживает как никогда много трудностей и боли, и многие могут лишь предполагать, что дальше будет только хуже, прежде чем станет лучше. Но, по крайней мере, Шольцомат будет стоять у руля и вести Германию вперед, к горизонтам.§!"
 GER_hog_robert_habeck: "Канцлер: §HРоберт Хайбек§!\n\n\n\n\n\n\n\n   £GFX_GER_robert_habeck_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LХабек родился 2 сентября 1969 года в Любеке, Германия, сын фармацевта; он вырос недалеко от Киля, в Хайкендорфе. В 1989 году он сдал вступительный экзамен в университет Heinrich-Heine-Schule в своем родном городе, после чего начал получать высшее образование по философии и немецкой литературе в университетах Фрайбурга-им-Брайсгау, Роскильде внутри Дании и Гамбурга. В 1996 году он получил степень Magister Artium, а в 2000 году защитил докторскую диссертацию по философии в Гамбургском университете, специализируясь на литературной эстетике и теории медиа. Вскоре после этого Хабек занялся писательской деятельностью, а затем пришел в немецкую политику.\n\nВ 2002 году Хабек вступил в партию Зеленых, где с 2002 по 2004 год занимал пост районного председателя партии в Шлезвиг-Фленсбурге, а с 2004 по 2009 год стал сопредседателем партии в земле Шлезвиг-Гольштейн. В 2012 году он был назначен заместителем министра-президента и министром по вопросам энергетического перехода, сельского хозяйства, окружающей среды, природы и цифровизации в Шлезвиг-Гольштейне; все эти должности он занимал до 2018 года. В том же 2018 году Хабек вышел на национальную арену, будучи избранным соруководителем национальной Партии зеленых вместе с Анналеной Баербок.\n\nВо время его работы Партия зеленых добилась значительного и стабильного прогресса во многих регионах Германии, что в конечном итоге завершилось федеральными выборами 2021 года, которые мы уже прошли.\nПоскольку они впервые стали ведущей силой нации, а не просто второстепенным членом коалиции, Хабеку предстоит провести много бессонных ночей и выпить много кофе. Не говоря уже о том, во что превращается мир, или.\n\nво что он уже превратился.§!"
 GER_hog_christian_lindner: "Канцлер: §HКристиан Линднер§!\n\n\n\n\n\n\n\n   £GFX_GER_christian_lindner_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LЛинднер родился 7 января 1979 года в Вуппертале, Северный Рейн-Вестфалия, Западная Германия, и вырос в семье среднего класса, его отец работал учителем в средней школе. В 1995 году он вступил в СвДП. В 1998 году он получил Abitur, или квалификационный аттестат для поступления в университет. С 1999 по 2001 год Линднер служил в военно-воздушных силах Бундесвера в качестве офицера запаса, дослужившись до звания первого лейтенанта. Во время службы в резерве, с 1999 по 2006 год, он изучал политологию в Боннском университете, получив степень Magister Artium. Однако из-за своей политической карьеры и предпринимательской деятельности он учился неполный день.\n\n31 мая 2000 года Линднер стал самым молодым членом законодательного собрания земли Северный Рейн-Вестфалия. В 2007 году он стал генеральным секретарем СвДП в Северном Рейне-Вестфалии, а в 2009 году покинул свой пост после первого избрания в немецкий Бундестаг. После спада СвДП в 2012-2013 годах, 7 декабря 2013 года он был избран председателем федеральной партии, получив поддержку 79 % избирателей, что положило начало ее перелому. В 2017 году под руководством Линднера СвДП вернулась в Бундестаг, набрав 10,7 % голосов.\n\nСегодня она возглавляет Бундестаг. Кристиан Линднер, представитель СвДП, стал канцлером Германии. Пока его сторонники празднуют, он размышляет и строит планы. В мире, как никогда ранее, наблюдается рост напряженности и насилия, и если Линднер хочет выполнить свои обещания перед народом и принести надежду на будущее и демократию. Он должен действовать сейчас.§!"
 GER_hog_armin_laschet: "Канцлер: §HАрмин Лаше§!\n\n\n\n\n\n\n\n   £GFX_GER_armin_laschet_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LАрмин Лаше родился 18 февраля 1961 года в Аахене, Северный Рейн-Вестфалия, и рос в благочестивой римско-католической семье. Его отец работал шахтером, а затем стал школьным учителем. Воспитание Лаше в приграничном городе во многом определило его мировоззрение: он был терпимым, европейским и прагматичным. Он учился в местной гимназии Пия и в 1981 году получил аттестат зрелости, а затем поступил в Боннский университет на юридический факультет. Позже он переключился на журналистику, учился в Католическом университете Эйхштатта-Ингольштадта, где завершил обучение по специальности.\n\nВ конце 1980-х и начале 1990-х годов Лаше работал журналистом и редактором, а также все больше вовлекался в политику. Будучи давним членом ХДС, в который он вступил в 1979 году, Лаше был избран в Бундестаг в 1994 году, что стало его первым серьезным шагом на национальном уровне. Однако его настоящий политический фундамент был заложен в земле Северный Рейн-Вестфалия, где он впоследствии был членом Европейского парламента с 1999 по 2005 год, получив ценный опыт в области политики и интеграции ЕС.\nВ 2005 году Лаше был назначен министром по делам поколений, семьи, женщин и интеграции в земле Северный Рейн-Вестфалия, получив национальное признание за свой умеренный и инклюзивный подход - черты, которые заслужили как похвалу, так и критику в рядах его собственной партии. В 2017 году он стал министром-президентом Северного Рейна-Вестфалии, самой густонаселенной земли Германии, возглавив коалицию ХДС-СвДП и отстаивая центристскую, пробизнесменскую и социально сбалансированную платформу. За время его пребывания на этом посту наблюдался экономический рост и относительная политическая стабильность, причем Лаше часто делал упор на компромисс и преемственность, а не на конфронтацию.\n\nТеперь он не просто возглавляет регион, в котором родился. Теперь он возглавляет саму нацию. Будучи центристом, он должен прилагать все усилия, чтобы все партии и группировки в Отечестве были довольны, и тогда он сможет увидеть, как его нация продвигается к величию.§!"
 GER_hog_bodo_ramelow: "Канцлер: §HБодо Рамелов§!\n\n\n\n\n\n\n\n   £GFX_GER_bodo_ramelow_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LБодо Рамелов родился 16 февраля 1956 года в Остерхольц-Шармбеке, Нижняя Саксония, и вырос в протестантской семье в Западной Германии. Его ранние годы были отмечены как личным, так и политическим влиянием: его отец, профсоюзный деятель и железнодорожник, умер, когда Бодо был еще маленьким, что привило ему глубокую связь с вопросами труда и социальной справедливости.\nВ Тюрингии, после воссоединения Германии, начался настоящий политический путь Рамелова. В 1999 году он официально вступил в Партию демократического социализма, преемницу правящей в Восточной Германии Партии социалистического единства. Несмотря на то, что Рамелов был западным немцем в восточногерманской партии, он быстро стал мостом между двумя мирами: не боялся противостоять наследию ГДР, но был полон решимости сделать так, чтобы проблемы восточных немцев больше не игнорировались объединенной Германией.\n\nНаиболее исторический момент наступил в 2014 году, когда он был избран министром-президентом Тюрингии - впервые в послевоенной истории Германии главой правительства стал представитель Die Linke. Этот момент был одновременно символическим и преобразующим, сигнализируя о том, что левому руководству можно доверять не только на протестных голосованиях или оппозиционных скамьях. Несмотря на критику со стороны консерваторов, которые предупреждали об идеологическом регрессе, Рамелов возглавил стабильную красно-красно-зеленую коалицию, делая упор на умеренность, экономическую стабильность и социальную политику.\nИзбранный в 2020 году после хаотического и наблюдаемого во всем мире правительственного кризиса, связанного с голосованием ультраправых АдГ и конституционными дебатами, Рамелов вновь доказал свою стойкость как политик и как символ непоколебимой федеральной демократии. Его лидерство отмечено спокойным ведением переговоров, решительной защитой демократических норм и необычной готовностью преодолевать разногласия в одном из самых политически поляризованных регионов Германии.\n\nТеперь весь мир наблюдает за ним, когда он стоит у руля Германии. Его партия прошла долгий путь, а он сам - еще более долгий, но как бы сильно ни изменилась его жизнь, он будет бороться за свой народ и изо всех сил стараться сохранить нацию единой и готовой к встрече с миром.§!"

 USB_caligula_country_summary: "§RСправка о Стране§!:\nАмерика - нация, построенная на костях старины, концепция, которая должна существовать вечно.\n\nМногие пытались разрушить ее, Советы пытались, японцы пытались, китайцы пытались, нацисты пытались.\n\nНо сегодня это ее собственные мужчины и женщины, пытающиеся разорвать единственную нацию, посвященную свободе, мелкие тираны, которые хотят уничтожить годы прогресса. Первая гражданская война доказала, что только крепкая хватка может провести нас через этот внутренний шторм, как лебедь, сбрасывающий перья, нужно идти на жертвы.\n\nКаждое желание, каждое стремление, каждый шепот и молитва достигли президента.\nДавление, страдания и плач, как груз на его плече.\nКаждый может сломаться или просветиться.\n\nЯ - воплощение Америки, наша Демократия находится под атакой, с большой буквы Д.\nПовсюду предатели, скрывающиеся как вампиры, Свобода - наша святая вода, а Возмездие - кол, чтобы пронзить их сердца, мы - американцы, мы никогда не сдадимся, мы никогда не сдадимся.\n\nЯ видел Бога и Демократию, и они говорили: "Идите, спасайте то, что вам дано."\nЛюди как, вы знаете, плохие временами.\nИногда нужно быть как феникс, чтобы избавиться от паразитов.\n\nПредатели доказали, что они не ищут мира и пощады, и мы не дадим их.\nДом на холме, семья плачет.\nНе будет дерева свободы, будет целый лес."

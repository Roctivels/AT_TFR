 SOV_party_unity_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_party_unity_banner\n\n\n\n\n\n\n\n\n\n£GFX_party_unity §tЕдинство Партии§!- это мера внутренней сплочённости коллектива, показатель того, насколько аппараты, низовые ячейки, лидеры и идеологи действуют в одном ключе, не допуская фракционной борьбы и раздорных дебатов, ослабляющих общий фронт. Высокое £GFX_party_unity §tЕдинство Партии§! обеспечивает быстрый запуск внутренних реформ и твёрдую уверенность в высшем руководстве."

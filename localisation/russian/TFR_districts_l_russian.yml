 SOV_cp_rsfsr_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_CPRF_banner_long\n\n\n\n\n\n\n\n\n\n§LПосле триумфальной победы на выборах и прихода к власти партия решила вернуться к своим историческим корням, официально восстановив своё прежнее название, подчёркивающее преемственность и новые амбиции в рамках обновлённой республики. \n£GFX_CPRF_logo §RКоммунистическая партия РСФСР (КП РСФСР)§! - видная левая политическая сила, выступающая за социалистическую экономику, защиту прав трудящихся и развёрнутое социальное обеспечение. Основанная в 1993 г. как преемница §RКПСС§!, партия продолжает сохранять наследие советских традиций, ведёт активную законодательную работу в обновлённом парламенте и дальше ведёт курс на строительство справедливого общества под единым красным знаменем §RМарксизма-Ленинизма§!.§!"

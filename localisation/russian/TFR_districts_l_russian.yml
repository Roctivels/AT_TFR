 SOV_adl_progress_tooltip_desc_sakhnin: "§LВ период уничтожения старой, единоросской системы партий, сформировался альянс всех тех левых, которым по той или иной причине не нравится Коммунистическая Партия: §sАДЛ "Прогресс"§!. Данная партия является сборной солянкой левых организаций и наиболее левой части бывшей "Справедливой России", за счёт её бывших спонсоров и существует. Различные группы зачастую выступают с совершенно разными и неподходящими друг другу идеями, что и вытекает в перманентную борьбу за влияние.\n\nПиздец"

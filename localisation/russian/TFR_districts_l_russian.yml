 SOV_legitimacy_tooltip: "[SOV_party_legitimacy_level_loc]£GFX_party_legitimacy §7Доверие Народа§! отражает ту особую связь, которая складывается между Партией и Массами. На него влияет как £stability_texticon §YСтабильность§! и £boost_popularity_texticon §YПопулярность Партии§!, так и различные другие обстоятельства. Даже если явка и прямые рейтинги партии невелики, высокая стабильность порождает у граждан уверенность в нас. И наоборот, когда популярность партии высока, но в обществе есть турбулентность или признаки хаоса, люди всё равно готовы доверять властям благодаря их четкой линии и конкретным результатам."

 SOV_labor_fatherland_tooltip_name: "£GFX_labor_fatherland_logo §dТрудовое Отечество§!\n\n\n                                             £labor_fatherland_flag\n\n\n\n\n                                             Отношение к\n                                             £GFX_CPRF_logo §RКП РСФСР§!:\n                                             [SOV_labor_fatherland_opinion]\n£GFX_Vladimir_Kvachkov_Portrait\n                                             £boost_popularity_texticon Популярность: [?party_popularity@totalitarian_socialist|%Y2]\n\n                                             Наше влияние: [?SOV_labor_fatherland_influence_var|%Y1]\n\n\n§W      Владимир Квачков§!\n\n\n§YФракция:§! §O"Народное Ополчение"§!"
 SOV_labor_fatherland_tooltip: "§L§dТрудовое Отечество§! - это партия, сформированная из различных лево-патриотических организаций, после прихода ко власти КПРФ решивших объединиться. Хоть она и больше, чем схожие организации путинского периода, но по сравнению с другими партиями РСФСР, Трудовое Отечество является некрупной, и ей для осуществления своей деятельность хватает и самофинансирования.\n\n§O"Народное Ополчение"§! внутри ТО является преемницей созданной в 2009 году Владимиром Квачковым организации, впоследствии признанной Кремлём террористической и запрещённой на территории РФ. Популярные в среде отставных военных, они выступают с неосталинистских и советско-патриотических позиций.\n§9ПДС НПСР§! - это типичная группа националистов, в условиях новой власти решившая поддерживать советский курс, несмотря на свою прошлую историю использования правой символики и риторики. Они довольно схожи с "квачковцами", но их отличает меньшая заинтересованность в фигуре Сталина и больший упор на русский национализм.\n§AНацболы§! - члены и сочувствующие партии "Другая Россия", преемницы запрещённой путинской властью НБП. В основе их идеологии стоят: антикапитализм и антилиберализм. Со времени 90-ых партия национал-большевиков заметно уклонилась влево, а их "Интербригады" воевали на Донбассе. Отцами-основателями НБП являются философы Эдуард Лимонов и Александр Дугин, а так же рок-музыкант Егор Летов.§!"
 
 SOV_peoples_front_tooltip_name: "£GFX_peoples_front_logo §CНародный Фронт§!\n\n\n                                             £peoples_front_flag\n\n\n\n\n                                             Отношение к\n                                             £GFX_CPRF_logo §RКП РСФСР§!:\n                                             [SOV_peoples_front_opinion]\n£GFX_Alexei_Navalny_Portrait\n                                             £boost_popularity_texticon Популярность: [?party_popularity@social_liberal|%Y2]\n\n                                             Наше влияние: [?SOV_peoples_front_influence_var|%Y1]\n\n\n§W      Алексей Навальный§!\n\n\n§YФракция:§! §CРоссия Будущего§!"
 SOV_peoples_front_tooltip: "§L§CНародный Фронт§! - это коалиция различных либеральных и центристских организаций и партий, созданная видным оппозиционером Алексеем Навальным вскоре после амнистии большинства полит. заключённых, посаженных путинской властью. В число НФ входят либералы из России Будущего, либертарианцы и некоторые "системные либералы" из бывшей Единой России. Официально сообщается, что всё финансирование Фронта идёт с "пожертвований сочувствующих и членских взносов", но, учитывая историю ФБК и ЕдРа, не исключено, что Народный Фронт получает деньги из-за рубежа.\n\n§CРоссия Будущего§! - фракция легализовавшейся внесистемной оппозиции, сформировавшейся во время правления Путина. Состоит из наиболее приближённых к Навальному либералов и им сочувствующим. По своей сути прагматичны, и при некоторых обстоятельствах могут поддержать курс Компартии.\n§YЛибертарианцы§! являются сторонниками свободного рынка, сгруппировавшиеся вокруг личности Михаила Светова, видного деятеля оппозиции. Призывают к уменьшению влияния государства на экономику.\n§PСистемные Либералы§! - группа активистов "Новых Людей" и либеральных членов "Единой России", решившихся на нечестивый союз со своими бывшими противниками. Стремятся к восстановлению и некоторому улучшению предыдущей путинской системы.§!"
 
 SOV_ldpr_tooltip_name: "£GFX_LDPR_logo §8Либерально-Демократическая Партия России§!\n\n\n                                             £ldpr_flag\n\n\n\n\n                                             Отношение к\n                                             £GFX_CPRF_logo §RКП РСФСР§!:\n                                             [SOV_ldpr_opinion]\n£GFX_Vladimir_Zhirinovsky_Portrait\n                                             £boost_popularity_texticon Популярность: [?party_popularity@fascist|%Y2]\n\n                                             Наше влияние: [?SOV_ldpr_influence_var|%Y1]\n\n\n§W  Владимир Жириновский§!\n\n\n§YВВЖ - неоспоримый лидер ЛДПР!§!"
 SOV_ldpr_tooltip: "§LДень, когда были оглашены результаты выборов в 2022-ом, оказался чёрным для ЛДПР. Главная задача была провалена: коммунисты снова взяли власть в России. И сделали это совершенно демократически. Сразу же после кремлёвские деньги перестали течь в карманы многих его проектов. Любой крупный правый политик после такого бы ушёл с арены...\n\nНо не Владимир Вольфович Жириновский. О, нет, он не уйдёт без ещё одного боя. Он что, зря боролся все эти 30 лет?! Вся эта партийная агитация, туры по стране, скандальные заявления в Госдуме - это всё впустую?!\n\nНет! Владимир Вольфович возьмёт реванш. Нет денег? Достаньте заначки на чёрный день, верните старых спонсоров, найдите новых! Борьба против коммунизма не окончена, пока Жириновский и его дело ещё живы!§!"
 
 SOV_patriots_party_tooltip_name: "£GFX_patriots_party_logo §gПартия Патриотов§!\n\n\n                                             £patriots_party_flag\n\n\n\n\n                                             Отношение к\n                                             £GFX_CPRF_logo §RКП РСФСР§!:\n                                             [SOV_patriots_party_opinion]\n£GFX_Vladimir_Solovyov_Portrait\n                                             £boost_popularity_texticon Популярность: [?party_popularity@authoritarian_democrat|%Y2]\n\n                                             Наше влияние: [?SOV_patriots_party_influence_var|%Y1]\n\n\n§W   Владимир Соловьёв§!\n\n\n§gУ Соловьёва нет конкурентов.§!"
 SOV_patriots_party_tooltip: "§LВладимир Рудольфович Соловьёв считал, что его положению главного медиалица страны, сидящем на государственных финансах на главном федеральном канале, ничего не помешает. Ведь он оседлал волну медийного патриотизма, стал главным рупором путинизма для всех россиян, и будущее обещало быть очень неплохим.\n\nОн не учёл того, что его положение полностью зависело от настроения того, кто сидит в Кремле. И в 22ом году, после смерти казалось бы вечного Путина и провала казалось бы непобедимой Единой России на президентских выборах, эта волна его и погребла за собой. В считанные дни всё, что он строил долгие годы, оказалось уничтожено коммунистами, и его самого убрали с телевидения.\n\nНо он решил не сдаваться. Партия Патриотов является примером, когда старые элиты всё ещё пытаются бороться за власть при новом режиме. Потерявшие всё, они ухватываются за каждую возможность вернуть себе хотя бы часть былой силы. Бывшие функционеры Кремля собираются под руководством Владимира Соловьёва, карманного журналиста Путина, в надежде повернуть всё вспять. Антагонистичны к советскому режиму, но, учитывая их прагматическую натуру, при желании смогут перекраситься во что-то более "красное".§!"
 

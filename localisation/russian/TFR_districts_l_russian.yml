 SOV_party_resources_tooltip_usual: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_party_resource_banner\n\n\n\n\n\n\n\n\n\n£GFX_party_resource §HПартийный Ресурс§! - это совокупность численности, сплочённости и готовности наших членов к активным действиям. Чем выше этот показатель, тем больше у партии возможностей проводить агитацию и расширять своё влияние в обществе без использования административных механизмов напрямую. Его можно можно использовать для проведения кампаний и усиления идеологического влияния."

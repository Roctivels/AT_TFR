 JAP_hog_shinzo_abe: "Премьер-Министр: §HСиндзо Абэ§!\n\n\n\n\n\n\n\n   £GFX_JAP_shinzo_abe_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LСиндзо Абэ родился в семье с богатой политической историей: его дед, Нобусукэ Киси, был премьер-министром с 1957 по 1960 год, а отец, Синтаро Абэ, занимал пост министра иностранных дел с 1982 по 1986 год. Впервые он был избран в Национальный парламент в 1993 году, а после того, как в 2006 году сменил Дзюнъитиро Коидзуми на посту президента ЛДП, стал самым молодым послевоенным премьер-министром Японии; однако через год он подал в отставку по состоянию здоровья. После поражения на выборах 2009 года Абэ вернулся на пост президента ЛДП, одержал победу на выборах 2012 года и стал самым продолжительным премьер-министром без перерыва за долгую историю Страны Восходящего солнца.\n\nПравительство Абэ придерживается двух основных принципов: абэномики внутри страны и более активной политики Японии во внешней политике. Его программа была абэномики направлена на то, чтобы вывести Японию из стагнации потерянных десятилетий с помощью количественного смягчения, финансовых стимулов и структурных реформ. За рубежом Абэ работал над укреплением позиций Японии на мировой арене, укрепляя союзы с Соединенными Штатами, Индией и Австралией, одновременно предупреждая о набравшем смелость Китае и обладающей ядерным оружием Северной Корее. Его стремление пересмотреть статью 9 японской конституции остается в Японии весьма противоречивым, но за время его премьерства приобрело беспрецедентный размах.\n\nАбэ стремится сделать Японию оплотом демократии в борьбе с переменчивыми тенденциями в Восточной Азии. В условиях роста напряженности в Китайском море и все большего внутреннего отступления Америки с каждым днем Абэ настаивает на том, что Япония должна быть готова защищать свои интересы и ценности. Его противники обвиняют его в том, что он ведет страну к старым привычкам милитаризма; его сторонники восхваляют его как единственного человека, обладающего дальновидностью и решимостью пережить надвигающуюся бурю. Одно можно сказать наверняка: Синдзо Абэ стоит у руля Японии, находящейся на перепутье, и полон решимости не допустить, чтобы она скатилась в незначительность и слабость в условиях новой бурной эпохи."

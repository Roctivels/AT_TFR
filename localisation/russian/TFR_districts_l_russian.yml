 offense_button_tt: "£pol_power §Y200§! Страны НАТО будут выбирать более наступательные варианты в своих §YНациональных Фокусах§!, §YСобытиях§!, и §YРешениях§! на 1 год\nПолучает ивент '§YНАТО просит нас проводить наступательную политику§!'\n\nПРИМЕЧАНИЕ: Одновременно можно принимать только одну доктрину"
 defense_button_tt: "£pol_power §Y200§! Страны НАТО будут искать больше вариантов защиты в своих §YНациональных Фокусах§!, §YСобытиях§!, и §YРешениях§! на 1 год\n\nПРИМЕЧАНИЕ: Одновременно можно принимать только одну доктрину"
 war_game_tt: "£pol_power §Y150§! Мы проведем военные учения с другими странами НАТО"
 COUNTRY_NAME: "§Y[ROOT.GetName]§!"

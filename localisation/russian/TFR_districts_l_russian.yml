 SOV_adl_progress_tooltip_desc_shevchenko: "§LВ период уничтожения старой, единоросской системы партий, сформировался альянс всех тех левых, которым по той или иной причине не нравится Коммунистическая Партия: §sАДЛ "Прогресс"§!. Данная партия является сборной солянкой левых организаций и наиболее левой части бывшей "Справедливой России", за счёт её бывших спонсоров и существует. Различные группы зачастую выступают с совершенно разными и неподходящими друг другу идеями, что и вытекает в перманентную борьбу за влияние.\n\n§t"Социалистическое Единство"§! - Многим непонятно, являются ли они вообще коммунистами или нет, но это не мешает им выступать с единой позицией. Наиболее близкая к КП РСФСР фракция "Прогресса", выступают за полномасшабный союз с Компартией, а некоторые даже за слияние с ней.\n§W"Свобода и Справедливость"§! - более умеренный блок, сумевший договориться с другими членами "Прогресса", во главе с Максимом Шевченко, бывшим лидером партии РПСС. Недолюбливают КП, но не так рьяно и бескомпромиссно, как некоторые другие фракции. \n§G"Социал-Демократическая Инициатива"§! - союз социал-демократов разных мастей: от членов различных социал-демократических объединений до левых сторонников "Яблока". В большинстве своём выступают за сотрудничество с "Народным Фронтом" Алексея Навального, рьяно критикуют Коммунистическую партию.\n§d"Левые"§! - наиболее радикальная и маргинальная часть "Прогресса". Состоит из анархистов, троцкистов и других неформальных левых. Характеризуются наибольшим упорством в неприятии власти Компартии, и не прочь громко заявить об этом.§!"
 SOV_adl_progress_tooltip_desc_shein: "§LВ период уничтожения старой, единоросской системы партий, сформировался альянс всех тех левых, которым по той или иной причине не нравится Коммунистическая Партия: §sАДЛ "Прогресс"§!. Данная партия является сборной солянкой левых организаций и наиболее левой части бывшей "Справедливой России", за счёт её бывших спонсоров и существует. Различные группы зачастую выступают с совершенно разными и неподходящими друг другу идеями, что и вытекает в перманентную борьбу за влияние.\n\n§t"Социалистическое Единство"§! - Многим непонятно, являются ли они вообще коммунистами или нет, но это не мешает им выступать с единой позицией. Наиболее близкая к КП РСФСР фракция "Прогресса", выступают за полномасшабный союз с Компартией, а некоторые даже за слияние с ней.\n§d"Левые"§! - наиболее радикальная и маргинальная часть "Прогресса". Состоит из анархистов, троцкистов и других неформальных левых. Характеризуются наибольшим упорством в неприятии власти Компартии, и не прочь громко заявить об этом.§!"

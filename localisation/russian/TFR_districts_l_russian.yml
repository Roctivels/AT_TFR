 GER_hog_habeck: "Канцлер: §HРоберт Хабек§!\n\n\n\n\n\n\n\n   £GFX_GER_Habeck_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LХабек родился 2 сентября 1969 года в Любеке, Германия, сын фармацевта; он вырос недалеко от Киля, в Хайкендорфе. В 1989 году он сдал вступительный экзамен в университет Heinrich-Heine-Schule в своем родном городе, после чего начал получать высшее образование по философии и немецкой литературе в университетах Фрайбурга-им-Брайсгау, Роскильде внутри Дании и Гамбурга. В 1996 году он получил степень Magister Artium, а в 2000 году защитил докторскую диссертацию по философии в Гамбургском университете, специализируясь на литературной эстетике и теории медиа. Вскоре после этого Хабек занялся писательской деятельностью, а затем пришел в немецкую политику.\n\nВ 2002 году Хабек вступил в партию Зеленых, где с 2002 по 2004 год занимал пост районного председателя партии в Шлезвиг-Фленсбурге, а с 2004 по 2009 год стал сопредседателем партии в земле Шлезвиг-Гольштейн. В 2012 году он был назначен заместителем министра-президента и министром по вопросам энергетического перехода, сельского хозяйства, окружающей среды, природы и цифровизации в Шлезвиг-Гольштейне; все эти должности он занимал до 2018 года. В том же 2018 году Хабек вышел на национальную арену, будучи избранным соруководителем национальной Партии зеленых вместе с Анналеной Баербок.\n\nВо время его работы Партия зеленых добилась значительного и стабильного прогресса во многих регионах Германии, что в конечном итоге завершилось федеральными выборами 2021 года, которые мы уже прошли.\nПоскольку они впервые стали ведущей силой нации, а не просто второстепенным членом коалиции, Хабеку предстоит провести много бессонных ночей и выпить много кофе. Не говоря уже о том, во что превращается мир, или.\n\nво что он уже превратился.§!"
 GER_hog_merz: "Канцлер: §HФридрих Мерц§!\n\n\n\n\n\n\n\n   £GFX_GER_friedrich_merz_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LФридрих Мерц родился 11 ноября 1955 года в Брилоне, Северный Рейн-Вестфалия. Он вырос в консервативной католической семье в Западной Германии. Изучив в юности право и экономику, он начал карьеру судьи и корпоративного юриста, прежде чем перейти в политику. Вскоре Мерц вступил в ХДС, где быстро завоевал репутацию благодаря своему острому интеллекту, экономическому либерализму и приверженности трансатлантическим связям.\n\nВ 1994 году Мерц был избран в Бундестаг и быстро продвигался по служебной лестнице, став к началу 2000-х годов ведущей фигурой в парламентской фракции ХДС. Известный своими сторонниками рыночных реформ и жёсткой фискальной политики, он вступил в противоречие с более центристским подходом Ангелы Меркель и ушёл из политики в 2009 году. Следующее десятилетие он провёл на руководящих должностях в частном секторе, в том числе будучи председателем BlackRock Germany.\nВернувшись в политику в 2018 году, Мерц позиционировал себя как сторонник консервативного обновления. После поражения своей партии в 2021 году, годом позже, в 2022 году, он был избран лидером партии ХДС, стремясь вернуть партию к её традиционным корням и бросить вызов политическому центру.\n\nСейчас он возглавляет Германию в качестве канцлера, но мир сейчас опаснее, чем когда-либо прежде. Россия противостоит остаткам Североатлантического альянса, гражданская война в Америке в самом разгаре, Китай угрожает демократии в Тихоокеанском регионе, потомок Каддафи завоёвывает Северную Африку, и весь мир так или иначе охвачен огнём. Поистине, времена не могли быть более сложными и неблагоприятными для Мерца, чем сейчас.§!"
 GER_hog_soder: "Канцлер: §HМаркус Зёдер§!\n\n\n\n\n\n\n\n   £GFX_GER_markus_soder_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LМаркус Зёдер родился 5 января 1967 года в Нюрнберге, Бавария. Родители воспитывали его в традиционной баварской семье. Он изучал право в Университете Эрлангена-Нюрнберга, где получил докторскую степень, а затем начал карьеру журналиста, прежде чем полностью посвятить себя политике. Будучи убеждённым членом Христианско-социального союза, Зёдер быстро стал известен своей ярко выраженной региональной идентичностью и грамотным подходом к работе со СМИ.\n\nЗёдер был избран в Баварский государственный парламент в 1994 году и постепенно продвигался по служебной лестнице, занимая различные министерские посты, в том числе в палате министров финансов и охраны окружающей среды. Он приобрел известность благодаря своему решительному лидерству, популистским инстинктам и умению манипулировать общественным мнением. В 2018 году он сменил Хорста Зеехофера на посту премьер-министра Баварии, делая акцент на консервативных ценностях, региональной гордости и прагматичном управлении. Несмотря на внутрипартийные противоречия и национальные амбиции, Зёдер оставался центральной фигурой в немецкой политике, его часто рассматривали в качестве будущего кандидата на пост канцлера. После поражения ХДС/ХСС на выборах 2021 года эта идея лишь укрепилась, и вскоре Зёдер занял пост потенциального канцлера от ХСС. Теперь он занимает эту должность, фактически ведя Германию вперёд. Однако мир уже не тот, что прежде. После последних выборов ситуация только ухудшилась, а глобальная напряжённость как никогда высока. Африка пылает, Азия готовится к войне, а русский медведь жадно зарится на то, что раньше имел. Ситуация для Германии и всей Европы стала гораздо сложнее, и теперь Зёдеру предстоит нести тяжёлое бремя – вести их к успеху. Но он не собирается уклоняться от своих планов.§!"
 GER_hog_weidel: "Канцлер: §HАлис Вайдель§!\n\n\n\n\n\n\n\n   £GFX_GER_alice_weidel_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LКрайне правая, популистская политика партии "Альтернатива для Германии" вызвала множество обвинений в нетерпимости со стороны более либеральных коллег в Бундестаге. И всё же, выбор Алисы Вайдель на пост председателя кажется почти полной противоположностью этим обвинениям. Родившись в Гютерсло, Северный Рейн-Вестфалия, в последние годы 70-х, она вела относительно ничем не примечательную жизнь до прихода в политику. Изучая экономику и бизнес-администрирование в Байройтском университете, она работала в таких учреждениях, как Goldman Sachs, Банк Китая и Фонд Конрада Аденауэра. После шести лет жизни в Китае она вступила в ряды АдГ, что определило и её, и Германию на совершенно иной путь.\n\nТо, что начиналось как простой интерес к противодействию евро, вскоре переросло в медленный рост её позиций. Несмотря на стремление к более традиционалистским и антииммигрантским взглядам, лесбиянство Вайдель и её связь с кинопродюсером родом из Шри-Ланки, похоже, не оказали существенного влияния на её перспективы. В конечном итоге это привело к тому, что она заняла позицию основного кандидата на выборах 2017 года. Вместе с соруководителем Александром Гауландом она помогла партии подняться с уровня внепарламентской фракции до третьего по величине места в Бундестаге. Этот импульс в сочетании с надвигающимися кризисами 2020-х годов, а также ее более умеренными взглядами (что видно по ее связям с фракцией "Альтернативный центр" в АдГ) наконец привели ее к посту канцлера на выборах 2021 года, что является огромным сдвигом, невиданным с 1933 года. Многие опасаются, что ее избрание — всего лишь троянский конь, который будет толкать Германию все дальше и дальше в пропасть, считавшуюся покинутой в 1945 году. Другие видят в ней столь необходимый глоток свежего воздуха в застойном мире немецкой политики, где доминируют ХДС/СДПГ.\n\nКакой бы ни была позиция по отношению к политике Вайдель, теперь канцлеру Вайдель предстоит лавировать в коварных водах европейской политики, определяемых вакуумом власти, образовавшимся после распада Соединенных Штатов, и возрождающимися Россией и Китаем на Востоке. Будет ли достаточно выдвинуть принцип "Германия прежде всего", чтобы выдержать бурю, зависит только от нее, как вести страну вперед, с иностранным влиянием, которое руководило страной до сих пор, или без него.§!"

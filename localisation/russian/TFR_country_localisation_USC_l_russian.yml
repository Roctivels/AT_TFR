 USC_reject_globalism_decision: "Отвергнуть  §5Глобализм§!"
 USC_reject_globalism_decision_desc: "\n\n\n\n£GFX_USC_reject_globalism_banner\n\n\n\n\n\n              §gAmericanism, Not Globalism!§!                     \n\nЗнаете, люди спрашивают меня: "Дональд, в чем суть глобализма?", а я им отвечаю: люди, дело не только в спорте мужчин с женщинами - совершенно несправедливо, кстати, - дело в разрушении Америки - на самом деле, в разрушении любой страны - НАВСЕГДА. Эти глобалисты - ужасные люди, они хотят - поймите - ОТМЕНИТЬ ГРАНИЦЫ И ОТМЕНИТЬ ПОЛИЦИЮ, и самое главное, они ненавидят вас - работающих людей. Я - единственный человек, который может противостоять им, люди. Нет, правда! Вот почему они делают эти ужасные вещи здесь: финансируют глубинное государство - они и есть глубинное государство!"
 USC_reminiscing_american_order_decision: "Вспоминая об §CАмериканском Порядке§!"
 USC_reminiscing_american_order_decision_desc: "\n\n\n\n£GFX_USC_american_order_banner\n\n\n\n\n\n                 §gPEACE THROUGH STRENGTH§!                     \n\nМое президентство было известно как САМОЕ МИРНОЕ, знаете почему? Потому что все лидеры уважали нас, у нас была большая армия - такая большая и сильная. По всему миру приезжали президенты и говорили: "Спасибо, господин президент, что уберегли нас от войны!", а я отвечал: "Без проблем!". Все дело в том, что надо быть жестким, но справедливым, таким, каким был мой отец.\nПосмотрите на мир сейчас, столько раздоров, Америке нужно вернуться к величию, чтобы мы снова имели мирный и спокойный мир. Эти демократы говорят, что я хотел уничтожить НАТО - я спас НАТО, они не хотели платить!"

 USC_reunify_america_decision: "Воссоединить Америку"
 USC_pro_con_decision: "Переговоры с §CБюрократами§!"
 USC_pro_con_decision_desc: "\n\n\n\n£GFX_USC_bureaucrats_banner\n\n\n\n\n\n                            §gBookworms§!                     \n\n§CКарандашные гниды, плоские юристы, офисные крысы - ты их ненавидишь, и §5твои люди§! тоже. Но прискорбная реальность управления большим бизнесом или правительством такова, что вам нужны люди, которые понимают судебные и конституционные заморочки.\nОни так наивны, думая, что вы - их следующий §CРейган§! Иногда вы допускаете такую мысль.\nНо самое главное - они не могут существовать без вас, они делают все ставки на вас. Очень плохие азартные игроки, они бы проиграли все деньги в вашем казино. Тем не менее, иногда лучше послушать высокомерного законника, чем принимать поспешное решение. Разве это не так?"
 USC_pro_mil_decision: "Мобилизовать §5Народ§!"
 USC_pro_mil_decision_desc: "\n\n\n\n£GFX_USC_the_people_banner\n\n\n\n\n\n                       §gU.S.A! U.S.A! U.S.A!§!            \n\n§5Твой народ§! - основа твоей популярности. Среднестатистические, трудолюбивые американцы. С ними обращаются так несправедливо, что даже не верится: их забывают, над ними издеваются, их всегда винят в собственных бедах.\nДо тех пор, пока не появился ты. Ты дал им голос - свой голос, и они стали вашей главной силой. Нет ничего, что они не были бы готовы сделать для тебя. Вы всегда старались выполнять данные им обещания... Но эти §Cбюрократы§! и болотные люди... Такие жестокие. Они хотят, чтобы твой народ страдал.\nТы даешь им власть, а они дают власть тебе. Симбиотические отношения.\n\nПрезидент Трамп не святой человек, но он будет проклят, если его агнцы будут сбиты с пути."
 USC_big_coalition_movement_decision: "Построить Движение §CБольшой Коалиции§!"
 USC_big_coalition_movement_decision_desc: "Оглянитесь вокруг - здесь все: латиносы, белые, черные - я люблю черных! Дело в том, что у нас такая большая коалиция, все за МАГА, независимо от вашей расы или вероисповедания - ВЫ ПАТРИОТ.\nЖенщины и мужчины, у нас так много хороших людей: Латиносы за Трампа, чернокожие за Трампа, - у нас даже есть геи за Трампа - я люблю геев!"
 USC_ignite_christian_fevor_decision: "Воспламенить §5Христианский Пыл§!"
 USC_ignite_christian_fevor_decision_desc: "Мои люди любят Бога. Я тоже люблю Его! Библия значит для меня очень много - вся целиком.\nХристиане подвергаются невероятному жестокому обращению, в наших школах ведется антихристианская программа. Нам нужно действовать, Бог выбрал меня - я избранный, вот почему нам нужно мобилизовать наших прекрасных верующих.\n\nБоритесь, мои великолепные христиане, ибо вам не придется бороться в следующий раз!"
 USC_ally_with_superpacs_decision: "§CЗаключить§! союз с §YSuper PAC'ами§!"
 USC_ally_with_superpacs_decision_desc: "Послушайте, есть так много удивительных, красивых Super PAC'ов, которые борются за ВЕЛИЧИЕ АМЕРИКИ - некоторые из них даже называются так - у них так много денег. Денег, которые нам нужны, чтобы снова сделать АМЕРИКУ ВЕЛИКОЙ. Не волнуйтесь, я - я, Трамп - лично прослежу за переводом каждого пожертвования и прослежу, чтобы оно пошло на благо всех американцев, без воровства, без МОШЕННИЧЕСТВА, и без ОБМАНА."
 USC_squeeze_superpacs_decision: "§5Выдавливать§! §YSuper PAC'и§!"
 USC_squeeze_superpacs_decision_desc: "Я уже давно говорю - SuperPAC - это полное мошенничество. В них вливается так много денег - денег доноров - и вы должны их слушать, что очень несправедливо по отношению к нормальным людям вроде вас. PAC'и - это инструмент доноров и СПЕЦИАЛЬНЫХ ИНТЕРЕСОВ, чтобы украсть нашу демократию в их карманы - и карманы наших политиков. Вот почему они все ненавидят Трампа!\nМы покончим с этим, мы найдем каждый цент и вернем ее вам!"
 USC_assists_business_decision: "Помочь §CБизнесам§!"
 USC_assists_business_decision_desc: "Бизнес - это так важно для меня, вы знаете - я бизнесмен. Нам нужен сильный рынок, нам нужны бизнесмены, чтобы заставить экономику работать. Мы будем помогать их удивительным усилиям, чтобы ПОСТАВИТЬ БИЗНЕС АМЕРИКИ НА ПЕРВОЕ МЕСТО. Нам нужны настоящие предприятия с американским духом. Но держитесь подальше от недвижимости - она моя. Шучу!"
 USC_bailout_blue_collars_decision: "Выручить §5Синих-Воротничков§!"
 USC_bailout_blue_collars_decision_desc: "Рабочие, наши прекрасные, удивительные герои труда, они делают такую потрясающую работу - трудятся не покладая рук. Никто о них не заботился, так подло, но мы это исправим. Обама, этот опасный глобалист - он выручил миллиардеров, это просто смешно - у них миллиарды, они должны платить сами! Мы поможем нашим замечательным шахтерам и другим, им это понравится, поверьте мне."
 USC_repeal_22_amendment_decision: "§RОтменить§! 22-ую Поправку"
 USC_repeal_22_amendment_decision_desc: "Хочу прояснить: 22-ая поправка - это полная афера! Придуманная элитарной кабалой из Болота, чтобы помешать людям голосовать за СИЛЬНЫХ и ПОПУЛЯРНЫХ президентов - таких, как я. Это НЕ ТО, ЧЕГО ХОТЕЛИ ОТЦЫ-ОСНОВАТЕЛИ, И ТОЧКА.\nОни называют это "Ограничениями власти", мы называем это "ОГРАНИЧЕНИЯМИ УСПЕХА". И мы хотим больше УСПЕХА, не так ли?\n\nПослушайте, все дело в импульсе, если я остановлюсь сейчас, мы потеряем его - Америка потеряет импульс. МЫ НЕ ДОЛЖНЫ ЭТОГО ДОПУСТИТЬ.\n\nМы должны ОТМЕНИТЬ ЭТУ ФАЛЬШИВУЮ ПОПРАВКУ ПРЯМО СЕЙЧАС!"

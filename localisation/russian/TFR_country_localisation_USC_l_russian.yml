 USC_populist_economics_category: "Популистская Экономика"
 USC_populist_economics_category_desc: "Когда президент Трамп впервые вышел на поле политической битвы, он пообещал американскому народу, что будет ставить Америку на первое место, несмотря ни на что, и это обещание не изменилось. Несмотря на то, что Америка разделена как никогда ранее, президент Трамп уверен, что экономическая политика, основанная на популистских идеалах, остается лучшим путем продвижения страны вперед. Война не выигрывается только кровью. Только благодаря процветанию и росту Америка сможет преодолеть свои нынешние проблемы и вернуть былое величие."
 USC_department_of_defense_category: "Департамент Обороны"
 USC_department_of_defense_category_desc: "\n\n\n\n\n£GFX_USC_dod_category\n\n\n\n\n\n\n\nВ то время как война за будущее Америки продолжается, объединение некогда деморализованных людей для борьбы за будущее этой страны стало главным приоритетом Министерства обороны. Хотя задача была довольно сложной - попросить среднестатистического американца взять в руки оружие для борьбы против своих бывших соседей, Министерство обороны уверено в своей способности вновь разжечь пламя патриотизма в сердцах людей и мобилизовать их на борьбу за свое будущее.\n\n£USC_rage Национальная Ярость: [USC_rage_text]\n£USC_rage Еженедельная Национальная Ярость: [?modifier@rage_weekly|=+1%]"
 USC_congress_category: "Конституционный Конгресс"
 USC_congress_category_desc: "§!Америка находится под огнем критики со всех сторон политического спектра, но в рамках конституционных рамок, которые мы сохранили при 45-м президенте, мы докажем, что являемся правильным правительством, когда-то бывшим Соединенными Штатами. Однако Республиканская партия Трампа в настоящее время разделена между либертарианскими республиканцами, популистами и консерваторами жёсткой линии. Мы должны уравновесить силы и сохранить лояльность этих трёх фракций, чтобы обеспечить стабильность в исполнительной власти. [USA_faction_league_american_workers_text][USA_faction_techno_rightists_text][USA_faction_libertarian_text][USA_faction_congress_text][USA_faction_military_text][USA_minor_factions_main_text][USС_minor_faction_libertarian_party_text][USС_minor_faction_christian_conservative_text][USС_minor_faction_league_american_worker_text][USС_minor_faction_techno_rightists_text][USС_minor_faction_we_the_people_text][USС_minor_faction_trump_democrats_text][USС_minor_faction_leftists_text][USС_minor_faction_nationalists_text][USС_minor_faction_ultra_maga_text][USС_minor_faction_independents_text][USС_minor_faction_maga_communists_text][USС_minor_faction_megachurches_text]"
 USC_nida_category: "НРУО"
 USC_nida_category_desc: ""
 USC_trump_new_america_category: "Трампирование Америки"
 USC_trump_new_america_category_desc: "Америка прогнила насквозь - возможно, до самого основания. Так много отвратительного поведения - социального хаоса, экстремизма, нестабильности. Просто ужасно.\nМы должны §gПОЧИНИТЬ§! это - §YТрамп§! исправит это. Великие действия - в форме законов и законопроектов, патриотического воспитания - спасут Америку от гибели."

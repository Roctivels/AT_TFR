 USC_seized_corporate_assets_tt: "§gОни разбегаются, как крысы, когда антимонопольный отдел Министерства юстиции замораживает их драгоценные активы. "У меня есть семья!" -  кричат они. Десятилетиями руководители корпораций издевались над простыми американцами -  подвергали их цензуре и обманывали, но вы положили конец их нечестной игре. Уолл-стрит теперь -  это улица Трампа.\nОни думали, что будут жить без каких-либо последствий, удерживая власть и наслаждаясь своими особняками. Они сами построили себе могилу.\nСпрячьтесь в своих дворцах из слоновой кости, паразиты-глобалисты. Стройте свои башни повыше - повыше моих. Но не удивляйтесь, когда у вас закончится кислород.§!"
 USC_loyal_corporate_america_tt: "§gТеперь они поют твою песню - "Америка прежде всего." Теперь они не будут подвергать цензуре мнения твоих людей - всё наоборот. Тарифы и новый контроль Министерства юстиции - они поглощают всё, лишь бы оставаться в плюсе. Придурки.§!"
 USC_corporate_maga_tt: "§gБилл Гейтс, этот бесхребетный маленький червяк, смотрит на тебя со своей бледной кожей и мертвыми глазами. Он говорит: "Microsoft - за Америку прежде всего, сэр. Теперь мы это понимаем".\nВсе генеральные директора и директорши по очереди подходят и целуют кольцо. Когда-то они ненавидели MAGA - так много цензуры и лоббирования в поддержку болота. Но теперь они прозрели... Теперь они все поняли.§!"
 

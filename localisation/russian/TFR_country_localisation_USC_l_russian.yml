 usc.16.t: "Обрезание Жир"
 usc.16.desc: "Когда лучи утреннего солнца проникли в окно офиса, освещая кабинеты и темные коридоры правительственного здания, Шон Маккарти сидел за своим столом, нервно постукивая пальцами по клавиатуре. В течение многих лет он был преданным своему делу бюрократом, работая обработчиком документов в районе Колорадо-Спрингс, что имело решающее значение для конституционалистского правительства, при котором он служил. Он работал на этой должности задолго до гражданской войны и не обязательно поддерживал кого-то из кандидатов, а работал только для того, чтобы прокормить себя. Каждый день был одним и тем же; он подключился к своему компьютеру, выполнив ненужную административную работу, введя данные вручную и направив документы по различным каналам, прежде чем разложить бумаги на своем столе и завершить работу. Он откинулся на спинку стула, прислушиваясь к шуму компьютерного вентилятора, пока заполнял формы и отчеты на своем столе.\nНо сегодня все было по-другому. Сегодня Маккарти столкнулся с немыслимым: увольнением. Заявление об увольнении лежало у него на столе, и он смотрел на него, не веря своим глазам. Вся работа и усилия, которые, как он думал, он приложил, превратились в ничто одним росчерком пера. Он просмотрел документ, отметив, что он был адресован Матиасу Янгу, главному административному сотруднику. С тяжелым сердцем Маккарти поднялся со стула и направился по знакомым коридорам, чувствуя неуверенность в каждом шаге. Когда Маккарти добрался до кабинета своего начальника, ладони у него вспотели, а пульс участился.\nВойдя в офис, Шон обнаружил мистера Яна сидящим за своим внушительным столом, на его суровом лице не было и намека на эмоции. "Шон, - начал он, - боюсь, мы вынуждены тебя отпустить". Эти слова поразили Шона, как удар грузовика, поскольку он продолжал молчать, сжимая в руках заявление об увольнении. Мистер Янг тяжело вздохнул, продолжая говорить. "Это было очень трудное решение, Шон. Бюрократия по всей нашей стране постепенно стала неэффективной, коррумпированной и погрязла в бюрократической волоките", - ответил он, явно зачитывая по какому-то сценарию. "Несмотря на то, что вы были отличным работником, бумажная волокита, которой вы занимались, больше не имеет смысла. Проще говоря, мы не можем позволить себе нести этот мертвый груз, и мы... сокращаем административные расходы и бюрократическую волокиту, так сказать. Пожалуйста, подайте заявление об увольнении и соберайте свои вещи".\nШон так и поступил, шаркая ногами, вышел из офиса и больше никогда не вернулся."
 usc.16.a: "Не позволяйте вращающейся двери ударить вас по заднице."
 usc.17.t: "Поправки Трампа"
 usc.17.desc: "Сегодня президент Трамп решил довериться своим главным советникам относительно предложения о пяти новых поправках к Конституции, которые в совокупности называются "Поправками Трампа". Первая поправка, которая в случае ратификации станет 28-й поправкой, предлагает установить общенациональный срок полномочий губернаторов в два срока, при этом только 36 штатов в Союзе имеют такое ограничение. Эта поправка также отменяет 22-ю поправку, допускающую неограниченное количество президентских сроков. Когда поправка будет внесена в Конгресс, она, вероятно, вызовет серьезные споры, хотя, скорее всего, она будет ратифицирована обеими палатами. Следующая поправка конституционно объявит лоббирование вне закона, отменив решение Citizens United против FEC. Это решение наверняка будет оспорено как на съездах штатов, так и в Конгрессе, хотя, скорее всего, оно будет принято, если сторонники нашего президента добьются успеха по всей стране. Дональд Трамп и Республиканская партия годами выступали за внесение поправок в сбалансированный бюджет, и теперь они, наконец, решили, что пришло время действовать в соответствии с ними. Такая поправка потребовала бы, чтобы государство не могло тратить больше, чем его доходы. Конечно, весьма вероятно, что она будет ратифицирована.\n\nИ по двум последним, которые, пожалуй, являются самыми важными, Дональд Трамп предложил поправку, полностью отменяющую правительственную бюрократию. В течение многих лет наше правительство увольняло чрезмерно усердных и зарвавшихся бюрократов, что значительно повысило административную эффективность. Хотя это имело негативные последствия, очевидно, что сокращения бюрократии недостаточно, и мы должны ее ликвидировать. Трамп предлагает, чтобы отмена бюрократии посредством внесения поправок упростила процесс принятия решений, повысила гибкость, способствовала инновациям и сократила административные расходы. Наконец, последняя поправка, предложенная Дональдом Трампом, возлагает на военных, а также на созданные федеральные ополчения ответственность за "восстановление правительства, лояльного американскому народу", в случае нарушения Конституции. Другими словами, прямое свержение американского правительства в случае нарушения Конституции. Эта поправка была сформулирована расплывчато и, несомненно, является самой противоречивой из предложенных на сегодняшний день. Такое свержение было бы ненасильственным, если бы не было необходимости в ином, и эта поправка выступала бы в качестве главного элемента Конституции."
 usc.17.a: ""Приведите их в Конгресс.""
 usc.18.t: "Репортаж С Передовой"
 usc.18.desc: ""Добрый вечер, FOX News, это Висенте Кобб, ведущий репортаж с передовой в Иллинойсе. Ниантик, некогда многообещающий сельский поселок, теперь опустошен военной машиной Байдена." Камера переместилась из траншеи, чтобы увидеть эпизодические боевые действия, а также разрушенный район. Дома, где прошло детство, превратились в пепел и щебень, а ничейная земля, насколько хватало глаз, была усеяна телами. Камера едва смогла сделать четкий снимок из-за грязи и колючей проволоки, и в конце концов ее опустили обратно. Кобб стоял прямо перед камерой, одетый в обычную боевую форму, которую носят репортеры по всей стране. В поле зрения были трое солдат, один из которых стоял на башне, а двое других сновали по тесному пространству, перенося припасы туда и обратно. Солдаты, казалось, не обращали особого внимания на съемочную группу.\n"Несмотря на все их усилия сломить наш дух, как дома, так и на поле боя, наши люди день и ночь сражались за вашу свободу." Мужчина указал на солдата, прежде чем продолжить: "Несмотря на неудачи, с которыми мы, возможно, столкнулись, именно здесь миру были продемонстрированы наши победы. Командиры Байдена руководили бесчисленными наступлениями, безрезультатно растрачивая жизни большего числа американцев. Единственный вопрос, который задают люди, заключается в следующем: как вообще кто-то мог его поддержать? Хотя этот вопрос все еще остается предметом дискуссий, ясно одно: мощь американского духа восторжествовала в прошлом и восторжествует в будущем, как бы либералы в Вашингтоне ни пытались ниспровергнуть нас".\n"В 7 часов вечера мы покажем историю Малаки Хауэлла, солдата, который добровольно отказался от всего, чтобы защитить свою свободу и семью от поджигателей войны демократов. Мы также продолжим сообщать вам новости в прямом эфире из Ниантика, подробно описывая все, что сделали так называемые Военные Союза, чтобы разрушить упомянутый Союз, и это только одна из многих запи-" - Он был прерван звуком артиллерийского снаряда, упавшего на землю в 6 метрах от траншеи. Он обеспокоенно оглянулся, прежде чем продолжить говорить в микрофон."
 usc.18.a: "Отличная подача."
 usc.19.t: "Никакой Пощады Предателям"
 usc.19.desc: "Преступник Марк А. Милли был понижен в звании до рядового и уволен с позором, прежде чем в пятницу утром ему на голову накинули петлю. Его медали и орденские ленты, многие из которых были незаслуженными и вручены им самим, были аннулированы.\nКак и всем заключенным ГУАНТАНАМО, приговоренным к повешению, Милли предложили последний завтрак, от которого он отказался. Он сказал, что его заслуги в качестве офицера-патриота наполнили его желудок и душу пищей, которой хватит на всю жизнь. Однако он попросил безопасную бритву, чтобы побрить свое заросшее щетиной лицо.\nВ 10:00 утра трое военных полицейских сопроводили его из медицинского центра, где он проходил медосмотр перед казнью, к виселице, где адм. Крэндалл стоял среди группы офицеров, представлявших свои Вооруженные силы, и неназванного гражданского лица, одетого в синий костюм с красным галстуком."
 usc.19.a: "Никакой Пощады Предателям..."
 usc.20.t: "Трамп Обращается к Нации"
 usc.20.desc: "Когда Трамп начал выходить из-за кулис на трибуну, он увидел толпы людей, размахивающих знакомыми звездами и полосами и скандирующих "США" и "ТРАМП", насколько хватало взгляда. Ему казалось, что почти все последние годы были лишь кошмаром в его голове, но на самом деле, несмотря на то, что все шансы были против него, он отвоевывал свою страну по кусочкам, и теперь он был освободителем Америки. Несмотря на то, что затылком он понимал, что еще многое предстоит сделать, он направился к подиуму, когда толпа начала скандировать его имя.\n\nВ этот момент Трамп почувствовал всплеск эмоций, услышав, как толпа начала его поддерживать.\n\nПоднявшись на подиум, он позволил скандированию утихнуть самому по себе, но в то же время подбодрил аудиторию, прежде чем начать свою речь.\n\nОн начал с того, что рассказал о возрождении страны после победы в гражданской войне, о текущих трудностях и проблемах, с которыми сталкивается объединенная нация, а затем сказал следующее: \n\n"С момента создания моей администрации в Денвере после того, как демократы попытались отменить выборы, наши вооруженные силы, наши соотечественники-патриоты сражались до последнего, чтобы защитить наши земли, чтобы освободить Америку от этих продажных и коррумпированных злодеев"\n\n"Марксисты, фашисты и либералы пытались окружить нас, как стервятники. Но, несмотря на все их усилия, им снова не удалось уничтожить нашу страну."\n\n"Наша нация была оставлена в руинах, но МЫ снова вышли из этих руин, и снова доказали всему миру, что АМЕРИКА НЕ МОЖЕТ БЫТЬ ПОБЕЖДЕНА"\n\nВосторженная толпа разразилась радостными криками и патриотическими песнопениями.\n\n"И теперь, когда наши враги повержены, и с вами на моей стороне, мы начнем восстанавливать нашу великую страну, и построим ее больше и сильнее, чем когда-либо считалось возможным. Мы снова утвердим себя и станем колыбелью свободы и демократии."\n\nИ привычными, но сильными словами он закончил свою речь, сказав:\n\n"Мы снова сделаем Америку великой, мы снова сделаем ее сильной, мы снова сделаем нашу страну безопасной, благослови Господь Соединенные Штаты, благослови Господь вас!""
 usc.20.a: "И мы сделаем её великой!"
 usc.21.t: "Новый Ученик"
 usc.21.desc: "Президент Трамп: Тед! Мой замечательный человек, спасибо, что пришел. Я хотел бы поговорить о будущем и о направлении, в котором мы движемся. Пришло время для некоторых ремонтных работ.\nТед Круз: Господин Президент, я всегда готов поддержать партию и ваше руководство. О чем именно мы говорим?\nПрезидент Трамп: Ну, это касается Сената, Тед. Нам нужны хорошие люди, мне нужны полностью сплоченные усилия для ведения войны и, конечно, моя программа действий для победы в войне... Это имеет решающее значение для того, что будет дальше.\nТед Круз: Сэр, я понимаю важность единства, сэр. Я всегда стремился работать над достижением... э-э-э... целей, сэр.\nПрезидент Трамп: Я знаю, что вы это сделали, Тед. Но сейчас для нас критический момент. Нам нужно нечто большее, чем просто единство; нам нужна непоколебимая приверженность и особый вид энергии. Вот почему я здесь, чтобы попросить вас уйти в отставку и уступить место новому кандидату, который у меня на примете.\nТед Круз: Уходить в отставку, сэр? Но я был за правое дело... наши дела, сэр, и мои... люди представляли меня и поддерживали. Это довольно неожиданно.\nПрезидент Трамп: Я знаю, что прошу многого, Тед, но это ради общего блага. Мы переживаем поворотный момент, и иногда нам приходится принимать трудные решения. Читали "Искусство войны" Сунь Цзу?\nТед Круз: Я пытаюсь понять, господин Президент. Но уход в отставку - это важный шаг. Как насчет поддержки, которую я получал на протяжении многих лет?\nПрезидент Трамп: Хммм, поддержка, что ж, Тед, ваши усилия не остались незамеченными, Тед. Но речь идет о более широкой картине, о моем долгосрочном видении.\nТед Круз: Ваше видение, сэр? Это такой термин. Что это за видение? Сэр.\nПрезидент Трамп: Именно от этого зависит будущее страны.\nТед Круз: Мне нужно немного времени, чтобы обдумать это, господин Президент. Предстоит многое обдумать, и нам нужно учитывать множество факторов, включая пожелания людей, которые проголосовали за меня."
 usc.21.a: "Окей"
 usc.22.t: "Закон и Порядок"
 usc.22.desc: "Холодным утром возле одной из многочисленных квартир в Денвере группа спецназа готовилась проникнуть в помещение. Разведка сообщила им, что там находится штаб-квартира примерно пяти повстанцев, лояльных юнионистам в Вашингтоне. И пока они готовились к прорыву, они проверили время, переключили режимы стрельбы на своих пушках и убедились, что их рации включены. И высшее командование отдало приказ.\nРаздался щелчок детонатора, и дверь слетела с петель, приземлившись внутри помещения. Спецназовцы вошли внутрь и уже заметили бойцов, разбегающихся по отдельным подсобкам. Затем команда была разделена на две части, одна из которых была синей, а другая - красной. Синяя команда пошла первой, выбив дверь в ванную ударом ноги и приказав повстанцам пригнуться. Затем команда "красных" взломала дверь в спальню с помощью дробовика и сразу же попала под обстрел, в результате чего главный был ранен.\nНемедленно открыв ответный огонь, красная команда ворвалась в комнату и очистила ее, убив повстанца, который ранил командира. Теперь, когда все участники боевых действий были арестованы, команда связалась по рации со штабом и запросила эвакуацию. Обыскивая комнату в квартире, солдат обнаружил местонахождение еще трех ячеек повстанцев, он сообщил о своих находках по рации в штаб, а затем встретился с остальными членами своего отряда, которые ждали снаружи, пока местные полицейские разберутся с последствиями."
 usc.22.a: "Один готов, осталось еще трое."
 usc.23.t: "Бомбардировка штаб-квартиры"
 usc.23.desc: "Когда солнце опустилось за горизонт, отбрасывая длинные тени на площадь, Леон Стерлинг сидел за своим столом на 9-м этаже дома 30 по Рокфеллер-плаза, и ритмичный стук клавиш эхом разносился по офису. Это был долгий день, заполненный сроками, встречами и постоянной суетой, царившей в отделе новостей. С самого начала Гражданской войны телеканал MSNBC был в напряжении, освещая "многие стороны и истории" войны. Или, по крайней мере, это то, что они проповедовали. На самом деле MSNBC был превращен в марионетку юнионистов, постоянно нападавшую на президента Трампа на каждом углу и служившую одним из сильнейших медиа-крыльев "Союза" Америки. Когда он, шаркая ногами, выходил из своей каморки, то не мог не услышать вой сирен снаружи, как и его коллеги. Он подошел к окну, и его глаза расширились, когда он увидел группу вооруженных людей, ворвавшихся на площадь внизу. Одетые в камуфляжную форму и размахивающие винтовками, они двигались быстро и сосредоточенно, продвигаясь по улицам внизу и врываясь в здание СМИ.\nОн отшатнулся, его мысли метались от страха и неверия. Конечно, с тех пор, как конституционалисты захватили власть, MSNBC находился под пристальным вниманием, хотя и подвергся насильственному взлому? Несмотря на то, что он не мог хорошо разглядеть людей внизу, они определенно были похожи на многие группы ополченцев, поддерживающие правительство Трампа, с которыми он был знаком. Звуки, доносившиеся снизу, указывали на борьбу, например, топот сапог и неразборчивые крики. Его коллеги начали паниковать, либо прятались под своими столами и кабинетами, либо бежали через пожарные выходы и эвакуировались. Он решил остаться, вернулся в свою кабинку и стал наблюдать за входом с лестницы. Когда он набирал 911, входная дверь распахнулась, и вошли 9 человек в полувоенной форме, размахивая винтовками и приказывая всем спуститься вниз. Логотип "Хранителей клятвы" был расклеен на их жилетах, когда они начали задерживать работников СМИ и даже громить оборудование, ломая дорогие съемочные площадки, проходя маршем по другим частям 9-го этажа.\nЭтот кризис с заложниками продолжался бы в течение 3 часов, пока полиция Нью-Йорка не смогла бы договориться об урегулировании по указанию президента Трампа после того, как площадь была тщательно разграблена, разгромлена и разграбляющийся. После этого рейда телеканал MSNBC официально прекратил свою деятельность, поскольку был не в состоянии продолжать распространять ложь и нападать на администрацию президента. Три процента респондентов также заявили о своей поддержке нападения, а число членов "Хранителей клятвы" и "Трипроцентники" резко возросло после инцидента. Ходили слухи, что его спонсирует полиция Нью-Йорка или даже президент, хотя они, конечно, необоснованны."
 usc.23.a: "Круто"
 usc.24.t: "Угасание Демократии"
 usc.24.desc: ""За мгновение до того, как я поднялся на сцену, я издал указ о конфискации всего имущества Демократического национального комитета; по всей стране все активы, как твердые, так и нематериальные, были изъяты сотрудниками правоохранительных органов. Преступная организация, которая долгие годы вела ужасающую и неоправданную атаку на права американского народа, которая помогала старому, сонному тирану Джо Байдену нападать на нашу замечательную Конституцию, была полностью и необратимо уничтожена".\n"Я верю в демократию, это великая вещь. Но каким образом демократы её делали? Украли у меня результаты выборов, убили бесчисленное количество, то есть так много, что мы не можем сосчитать, людей, пытаясь использовать средства массовой дезинформации - "fake news", чтобы заточить умы людей? Они играли не по правилам, они действовали нечестно. Теперь я твердо верю в такое понятие как "обоюдность", это действительно красивое, многозначительное слово. Оно означает "помоги мне, а я помогу тебе", вот как заключаются сделки. В душе я сторонник заключения сделок. Но бывает время, когда некоторые люди не хотят заключать сделки, они хотят воровать и разрушать. Это демократы, я пытался работать с ними четыре года, а потом они попытались меня убить. Что ж, давайте посмотрим правде в глаза, ребята, я не могу смириться с этим."\n"Знаете, ребята, эти радикальные демократы охотились не только за мной, они охотились за Конституцией и за всеми вами. Вот почему их больше нет. С Демократической партией покончено, ребята. Все их деньги? Теперь они наши. Это деньги народа. Я уверен, что наши замечательные друзья, которые сейчас отдыхают в Европе, скажут: "Но, господин президент, за кого проголосуют все демократы? Как вы поведете за собой людей, которые поддерживали бесчестного Джо?" Что ж, я скажу вам; что им лгали, их загипнотизировала демократическая машина. Что ж, я отключил её, народ. Теперь они придут в себя, вот увидите."\n\n- Выступление президента Трампа после указа 14,108, который распустил Национальный комитет Демократической партии и национализировал его активы."
 usc.24.a: "Партия Джексона, Рузвельта и Кеннеди рушится."
 usc.25.t: "Высокие Цели в Законодательном Органе"
 usc.25.desc: "Конгресс американского конституционного правительства, казалось, так и не смог преодолеть некоторые проблемы, которые мучили довоенный американский конгресс. Временный законодательный орган, хотя теперь и состоял из более идеологически ориентированных политиков, по-прежнему, казалось, спорил практически по любому поводу, особенно когда речь заходила о растущем влиянии вооруженных сил. Дональд Трамп, будучи человеком, обладающим решающим влиянием между обеими конкурирующими ветвями власти, пришел в Конгресс, чтобы обеспечить им столь необходимое спокойствие, когда дело касалось положения дел с вооруженными силами.\n\nВнеплановая встреча Трампа с ключевыми партийными деятелями в Конгрессе часто проходила так же, как и в предыдущие дни: много обсуждались военные расходы, ситуация на фронте и другие мелкие, но в то же время важные бумажные дела за день. Однако сегодня речь шла не только о подаче документов, поскольку Трампу пришлось, наконец, обратиться к слону в зале.\n"Джентльмены, я знаю, что некоторые проблемы с нашим военным персоналом уже некоторое время занимают ваши умы. Я здесь для того, чтобы разъяснить вам некоторые важные вещи".\n\nВпервые за всю свою карьеру присутствующие в зале представители внимательно наблюдали и слушали. Высказывание вслух о внутреннем конфликте было неожиданным, но верховный главнокомандующий сказал все как есть. "Я могу полностью заверить вас, что основные конституционные принципы нашего правительства будут соблюдены. Я уже разговаривал с генералом Майклом Флинном, и он очень хорошо осведомлен о том, что роль военных очень четко определена нашими правилами и инструкциями".\n\nПока остальные представители перешептывались и обсуждали что-то на заднем плане - одни были полностью согласны, другие сбиты с толку или молчали, - Трамп ждал хоть какой-то заметной реакции. Сенатор от Кентукки Рэнд Пол, де-факто лидер Конгресса, выступил первым: "Господин Президент, я и, уверен, большая часть членов этой ассамблеи высоко ценим это утверждение верховенства закона. Я очень надеюсь, что армия и генеральный штаб также понимают нашу роль как законодательной власти, как и вы". Когда послышались аплодисменты, Трамп ответил не сразу, а просто подумал про себя."
 usc.25.a: ""Я тоже на это надеюсь, Рэнд""
 usc.26.t: "Напоминание о Патриотизме... и Верности"
 usc.26.desc: "Встречи в течение дня прошли так, как и ожидалось от Трампа; на этот раз было больше споров и жалоб на то, кто что сделал. Трамп, вернувшись в свой кабинет, снова начал просматривать письма, отправленные на его официальный почтовый ящик. Независимо от того, что президент Трамп делал для любой из сторон, казалось, что всегда существовал другой вопрос, который требовал какого-то фаворитизма с его стороны перед Конгрессом или военными. Если президентство ничего не сделало для поиска какого-либо решения, то кто знает, что могла бы сделать любая из сторон, одержав уверенную победу. Теперь, когда он был явно раздражен объемом просьб и требований, в его голове зазвучала одна-единственная мысль. Необходимо было дать всем понять, что он не будет стоять в стороне и быть просто фикусом; интриги не разрастутся и не разрушат государство изнутри.\n\nНезависимо от того, чего хотел Конгресс или вооруженные силы, им нужно было усвоить, что все может функционировать только в том случае, если они будут придерживаться своей работы. Больше не было необходимости просто удовлетворять требования той или иной стороны; но теперь им необходимо напомнить о том, кто является их главнокомандующим и что поставлено на карту для всех. С каждым разом, когда они тратят время и ресурсы на эту глупую междоусобицу, коммунисты, анархисты, преступники и предатели в Вашингтоне становятся все ближе и ближе; эта мысль чуть не свела его с ума. Истинные патриоты страны не поддаются таким мелочным попыткам превзойти друг друга, а вместо этого делают то, что необходимо для победы в войне, для того, чтобы снова сделать Америку великой. Трамп, оторвавшись от кипы бумаг, посмотрел на фотографии и флаги на стене и задумался. Пока он был всеобщим президентом и главнокомандующим, он делал все возможное, чтобы патриотизм одержал верх над личными интригами. Он был избран, чтобы победить либералов, победить глубинное государство, победить политиков из истеблишмента и снова сделать Америку великой. Затем он взял со стола лист бумаги и начал делать кое-какие пометки для следующего набора писем, на которые ему предстояло ответить."
 usc.26.a: ""Ради блага Америки необходимо установить баланс""
 usc.27.t: "Голова Гидры"
 usc.27.desc: "Если в американском конституционном правительстве и есть кто-то, кто знает все обо всех в вооруженных силах, так это генерал Майкл Флинн. До войны он был одним из самых преданных доверенных лиц Трампа в его администрации и с радостью отправился вместе с ним в Денвер, чтобы продолжить патриотическую борьбу. Однако его усилия по консолидации и наращиванию влияния вооруженных сил в рамках американского конституционного правительства вызвали серьезные проблемы с Конгрессом и администрацией президента. Однако сегодня Трамп собирался окончательно уладить некоторые вопросы со своим самым патриотичным солдатом.\n\nАналогично своим встречам с отдельными членами Конгресса, Трамп встретился с генералом в одном из своих личных кабинетов для всех... "конфиденциальные" вопросы. Сегодняшний день, однако, был не просто конфиденциальным, он должен был повлиять на будущее самого правительства.\n\n"Генерал, прежде всего, я хочу сказать, что я очень горжусь всем, что вы сделали для защиты этой страны и нашего дела. Ваш патриотизм заслуживает большого уважения. Однако есть несколько очень важных вещей, которые вы должны учитывать во всем", - обратился Трамп к генералу.\n\n"Спасибо, господин президент, но я хочу, чтобы вы перешли к делу, если сможете. Что именно означает все это хождение вокруг да около? Просто переходите к делу".\n\nТрамп прочистил горло и начал говорить: "Генерал... вооруженные силы стали серьезной проблемой, и их постоянные попытки превзойти Конгресс заставляют некоторых задуматься. Так продолжаться не может. Я хочу, чтобы вы и ваши соотечественники знали о своих конституционных обязанностях и о том, где находятся границы нашей работы. Это я обращаюсь к вам не как к Дональду Трампу, а как главнокомандующий".\n\nГенерал некоторое время сидел и думал, впитывая сильные чувства Трампа, в то время как Трамп сидел, чтобы посмотреть, что генерал будет делать дальше. Как бы то ни было, Трамп думал, что, по крайней мере, он понял, чего хотел."
 usc.27.a: "Они должны знать, кому служат..."
 usc.28.t: "Репортаж С Передовой"
 usc.28.desc: ""Войска старины Джо задерживаются в Небраске, по крайней мере, насколько я слышал".\n"С этими людьми во главе, хм, маловероятно"\nСемья Смитов была одним из многих крупных канзасских кланов, которые собирались под одной крышей почти каждое Рождество, и члены семьи, столь широко представленной среди классов и политических групп Америки, всегда входили в нее с чувством законного тепла и семейного родства, только чтобы уйти с горьким и холодное чувство облегчения от того, что они оставляют неприятные отношения наедине со своими собственными идиотскими мнениями. Так было даже до войны, но теперь, среди всех этих бросающихся в глаза пустых стульев, неловких признаний родственников во всех регионах разделенных Штатов и едва скрываемых проклятий родственников, которые ушли воевать на другую сторону, семья Смит казалась все менее и менее идиллической.\n\n"Честно говоря, учитывая, что все эти идиоты в Денвере нашептывают ложь Трампу в уши, я не удивлюсь, если на следующее Рождество мы будем вывешивать флаг Союза"\nОдин мужчина мрачно усмехнулся в углу. Его циничная выходка вызвала лишь несколько недовольных взглядов со стороны родственников."Не обращайте внимания на Небраску, подумайте о Юге! Мы допустили, чтобы целый регион людей, преданных нашему делу, был разорван на части!"\n"У нас не так уж много ресурсов"\nДвое главных спорщиков, бородатый мужчина помоложе и пожилой, пронзительный и седовласый патриарх, непрерывно лаяли друг на друга из-за индейки. За вечер семья позаботилась о том, чтобы их отодвинули на самый дальний конец стола, но их конфликт перерос за стол и, тем не менее, вынудил многих вступить в борьбу.\n"Не оскорбляйте так наших лидеров, они верные люди, которые оставались с Трампом в худшие времена, а теперь вы обливаете их грязью за то, что они не послали войска умирать за Алабаму?!"\nМолодой человек внезапно взревел. Старик, казалось, на мгновение растерялся, прежде чем возобновить своё наступление.\n"
 usc.28.a: ""Скажи ка мне, парень, что эти драгоценные лидеры думают о массовых убийствах мирных жителей федералами в Каролине, или о взрывах церквей, или о массовых убийствах в Миссисипи?..""
 usc.29.t: "Репортаж С Передовой"
 usc.29.desc: "TODO Wartime censorship has been and a reporter gives a brutal account of the frontlines"
 usc.29.a: "Bruh"
 usc.30.t: "Сбор Войск"
 usc.30.desc: "С момента начала конфликта, который погрузил нашу страну в разруху и хаос, становится все более очевидным одно: состояние наших вооруженных сил находится в плачевном состоянии. В то время как у нас есть лояльность и доверие большинства пехотинцев, ветеранов, а также аппарата Корпуса морской пехоты, нам значительно не хватает доверия к генералам и офицерам, поскольку коррумпированное высшее командование бежит в Вашингтон, потому что они знают, что Байден - единственный человек, желающий удержать их у власти. Несмотря на нашу малочисленность, это компенсируется опытом и преданностью делу; На ум приходят Майкл Флинн, Джон Хайтен и Джон Рэймонд - все они патриоты высочайшей степени, которые служили с президентом с самого начала. Эти люди отделились от "глубинного государства", загоняющего Америку под землю, и они знают, что правильно. Однако, конечно, в каждой формирующейся армии существует соотношение сил между профессиональными, хорошо обученными бойцами армии Соединенных Штатов и теми, кто состоит в наших ополчениях. Если мы в конечном итоге не будем тщательно соблюдать этот баланс или передадим слишком много власти военным, это может закончиться катастрофой.\nЕсли мы хотим одержать победу над демократами-предателями, коммунистами и сепаратистами, разрывающими нашу нацию на части, то мы должны эффективно использовать нашу армию и перестроить ее с нуля. Устранять разногласия в наших рядах, создавать новый аппарат, который ценит эффективность, лояльность и патриотизм, и отбивать наши города у левых орд, стремящихся разрушить нашу Республику. Вооруженные силы - это один из наших величайших инструментов, и мы должны использовать его с умом. В конце концов, политика - это непостоянная игра, особенно когда в нее вовлечена армия..."
 usc.30.a: "Semper Fi."
 usc.31.t: "Отчаянный Мозговой Штурм"
 usc.31.desc: "Ранним утром Трамп находился в зале заседаний с несколькими своими высшими генералами и советниками. Было созвано срочное совещание для выработки стратегии войны против правительства в Вашингтоне. Всего через 15 минут совещание было почти закончено, и Трамп был готов его завершить.\n"Флинн, я предъявляю к тебе очень высокие требования, теперь тебе пора доказать мне, что мои стандарты не снижаются, мне нужны идеи от всех, кого ты знаешь. Это касается и всех вас тоже. Свободны!" "Да, сэр, господин президент", - сказал Трамп, обращаясь к присутствующим в комнате. Сказал Флинн.\nТеперь, сидя в одиночестве после того, как все покинули зал, Трамп размышлял о ситуации, с которой он столкнулся в данный момент. Даже когда он переводил свое правительство в Колорадо, он не думал, что произойдет нечто подобное, что славные США погрузятся в состояние такой анархии. Теперь ему пришлось столкнуться с ситуацией, которая угрожала его жизни во всех отношениях. Чем больше он думал, тем оптимистичнее оценивал свою ситуацию. Возможно, если бы они сдерживали армии Байдена и его мошенников, им удалось бы взять верх над правительством в Вашингтоне. Возможно, если бы мы реформировали наши вооруженные силы в соответствии с нашей ситуацией, мы могли бы воевать более эффективно. Может быть...\nНо прежде чем он успел подумать, он кое-что понял. Нация нуждалась в нем, он не мог сидеть за своим столом и ничего не делать, это была неотложная ситуация, и люди нуждались в нем больше всего.\n"Может быть, только может быть, немного диетической колы поможет мне проснуться"."
 usc.31.a: ""Это будет стоить 1,60 доллара, господин Президент.""
 usc.32.t: "Новый Отец Основатель"
 usc.32.desc: "С самого начала Гражданской войны всегда существовала связь между первыми американскими революционерами, которые свергли своих репрессивных английских колонистов и основали Республику, основанную на свободе и национальности, и минитменами Конституционного правительства, которые с неослабевающей энергией борются за свержение тиранического, зарвавшегося правительства и элит, который посеял раскол и недовольство в сердцах и умах американского народа. Они разделяли революционные традиции, мировоззрение, поощрявшее борьбу и упорство в национальном духе. Америку, свободную от влияния глобалистских программ, которые так долго контролировали как страну, так и людей. Америку, в которой голоса трудолюбивых американцев снова были бы слышны над шумом особых интересов и бюрократической элиты, которые ничего не делают, чтобы помочь людям. Кто поведет народ к революции, как это сделал Джордж Вашингтон много лет назад? Это, конечно, Дональд Трамп.\n\nС самого начала он пропагандировал Америку, в которой ценности свободы, индивидуализма, уверенности в себе и консерватизма одерживают победу над теми, кто стремится их отнять. Черпать вдохновение из видения отцов-основателей о нации, построенной на принципах ограниченного правления, - единственный способ одержать победу над демократами и построить новую Америку, и Трамп это знает. Он изложил свои планы по сокращению бюрократической волокиты, снижению налогов и раскрытию всего потенциала американской экономики. Возрождение американской промышленности, прекращение мятежей и установление закона, основанного на воле народа. Каждый американец - революционер, и это должно найти отражение в нашей политике и Вооруженных силах. Благородное и правое дело находится под угрозой, и мы не должны допустить, чтобы оно пошатнулось. Как Вашингтон одержал победу в Йорктауне, на своей собственной земле, так и мы одержим победу только благодаря крови. Уже подготовлено несколько бригад "минитменов", которые будут выступать в качестве костяка ополченцев, сражающихся на фронте, поскольку они отличаются высокой мобильностью, лояльностью и специально обучены хирургическим операциям. Эти люди, несомненно, будут продвигать и распространят наше дело, и мы должны продолжать продвигать эти идеи и пропагандировать революционную ностальгию, если хотим, чтобы видение Трампа осуществилось и он занял свое законное место в качестве Отца-основателя."
 usc.32.a: "Да Здравствует Вождь"
 usc.33.t: "Замкнутый Круг"
 usc.33.desc: "Когда MRAP Дональда Трампа проезжал по улицам Нью-Йорка, некогда оживленный мегаполис лежал в руинах, пепел был разбросан по каждой улице, а остатки зданий сровнялись с землей, насколько хватало глаз. Горизонт, который когда-то был отмечен высокими небоскребами, теперь был скрыт густой пеленой дыма и пыли. Трамп-Тауэр, его самое ценное достояние, стоял разбитый, некогда красивый кондоминиум с видом на центр Манхэттена, теперь покрытый зияющими дырами и обугленными остатками. Это зрелище поразило Трампа до глубины души, поскольку он не мог не вспомнить, как в 80-х годах он не обращал внимания на его строительство и торжественное открытие. Это было напоминанием о разрушениях, вызванных войной, охватившей страну. С тяжелым сердцем, исполненным скорби и сожаления, он смотрел на руины своего родного города, испытывая глубокое чувство утраты того, что сформировало его карьеру и подтолкнуло его к политической деятельности.\n\nСделав несколько жестов своему водителю, он вышел из машины и стал наблюдать за происходящим перед ним. Эмоции Трампа начали захлестывать его, когда он осознал, что его любимый город, его империя превратились в руины. На мгновение он задумался о возможности спасти то, что осталось от Башни, восстановить то, что было утрачено, вернуть прежний конгломерат, который вел его по жизни. Но затем, с тяжелым сердцем, Трамп принял свое решение. Он повернулся спиной к руинам, оставив позади то, что осталось от его прежней жизни. В тот момент он понял, что впереди еще более серьезные сражения. Его страна нуждалась в нем, и он был единственным человеком, способным защитить ее. Он отошел от разрушений, вернулся к своему окружению, а его мысли обратились к нации, которую он поклялся защищать, к людям, которые ждали от него руководства. Он знал, что победа была в его руках, и он не должен был останавливаться ни перед чем, чтобы добиться ее. Он забрался обратно в машину, настраиваясь на будущее, пока она отъезжала."
 usc.33.a: "И это то, в чем нуждалась страна."
 usc.34.t: "Вновь Обретенный Трон"
 usc.34.desc: "Когда кортеж Дональда Трампа въезжал в ворота Белого дома, он не мог не почувствовать, как его захлестывает волна смешанных эмоций. После многих лет беспорядков, борьбы и кровопролития он, наконец, вернулся к власти, за которую так упорно боролся. Тем не менее, тяжесть Гражданской войны все еще лежала на его плечах, и то же самое было видно и в Вашингтоне, округ Колумбия. Белый дом в основном не пострадал, хотя и был запущен, а некоторые части были очень сильно обуглены. Выйдя из своего автомобиля и взглянув на здание, в котором он сидел всего несколько лет назад, Трамп не мог не восхититься стойкостью американского духа. Несмотря на разруху и разрушения, вызванные войной, Белый дом стоял гордо, несмотря на хаос, который ему пришлось пережить. Прошла всего неделя после освобождения города от демократов, отстранения их от власти и одержания ими самой крупной символической победы за все время. К счастью, город был давно очищен, и на этот раз Трамп был здесь надолго.Но когда он вышел из машины и вошел в здание, его охватило глубокое чувство меланхолии. Воспоминания о войне, о сражениях и потерянных жизнях, о патриотах, застреленных в разгар сражения, нахлынули на него. И все же, несмотря на страдания, он почувствовал проблеск надежды. Надежду на будущее для всех американцев, которое под его руководством будет служить ярким маяком и никогда больше не будет разделено. Проходя по белым коридорам, окруженный портретами отцов-основателей, Трамп поклялся чтить жертвы тех, кто был до него, и никогда не забывать о цене свободы. И когда он устроился в Овальном кабинете в окружении своих советников, он огляделся, сидя в президентском кресле. Конечно, предстоящий путь будет нелегким, ничто в жизни Трампа не было легким. Все это было сформировано упорным трудом, целеустремленностью и его железной волей, которая выдержала испытание временем."
 usc.34.a: "Вождь возвращается, и на этот раз он останется."
 usc.35.t: "Марко Рубио назначен вице-президентом"
 usc.35.desc: "В разгар Второй гражданской войны в Америке наш президент сделал историческое заявление, которое будет определять политику нашего правительства на долгие годы. Дональд Трамп назначил сенатора Марко Рубио своим вице-президентом, положив конец недавней борьбе за власть, которая охватила конституционное правительство. Рубио, известный своими стойкими консервативными ценностями и поддержкой программы Трампа, несмотря на его столкновение с президентом в 2016 году и его окончательное поражение после проигрыша на праймериз во Флориде, стал воплощать дух популистского движения Трампа, даже несмотря на то, что он относительно не привлекал к себе внимания. Своим назначением Трамп эффективно внедрил ценности, лежащие в основе его идеологии, в систему управления Америкой на обозримое будущее.\n\nВ своем заявлении, сделанном ранее сегодня, Рубио заявил, что Америка будет продолжать ставить интересы своих граждан превыше всего остального, а также продолжит объединять Великую Старую партию против внутренних и внешних противников с помощью популистского традиционализма, проповедуемого самим Трампом с момента его первой инаугурации, давая понять, что этот тип консерватизма останется в центре внимания правительства и Республиканской партии. Трамп поздравил свою новую правую руку и публично заявил, что он "лучше всех подходит для этой работы" и единственный, кто может "защищать американские ценности и традиции так же, как это делаю я". Это вызвало бурную поддержку со стороны американского народа, и через месяц Рубио должен выступить со своей инаугурационной речью."
 usc.35.a: "Давайте посмотрим, на что он способен."
 usc.36.t: "Рэнд Пол назначен вице-президентом"
 usc.36.desc: "В разгар Второй гражданской войны в Америке наш президент сделал историческое заявление, которое будет определять политику нашего правительства на долгие годы. Дональд Трамп назначил сенатора Рэнда Пола своим вице-президентом, положив конец недавней борьбе за власть, которая охватила конституционное правительство. Пол известен своими убежденными либертарианскими ценностями, он поддерживает идеи малого правительства, которые не остались незамеченными в последнее время. Несмотря на свои многочисленные столкновения с президентом, он стал одним из самых влиятельных людей в конституционном правительстве, выступая в качестве номинального лидера нескольких ополчений, и олицетворял недавние сдвиги в Республиканской партии в сторону либертарианства. Своим назначением он эффективно внедрил ценности, лежащие в основе его идеологии, в систему управления Америкой на обозримое будущее.\nВ заявлении, сделанном ранее сегодня, Пол заявил, что Америка будет и впредь ставить интересы своих граждан превыше всего остального, особенно в отношении нарушений со стороны коррумпированных государственных органов, а также продолжит усилия по "Прекращению преследования", что практически стало лозунгом его предвыборной кампании, к разочарованию многих его коллег. С момента первой инаугурации Трампа он заигрывал с идеалами либертарианства, особенно во время пандемии Ковид-19, хотя всегда считался более авторитарным, что делает это назначение неожиданным. Трамп поздравил свою новую правую руку и публично заявил, что он "лучше всех подходит для этой работы" и единственный, кто может "защищать американские ценности, традиции и права народа". Это вызвало бурную поддержку со стороны американского народа, и через месяц Пол должен выступить со своей инаугурационной речью."
 usc.36.a: "Пришло время для некоторых перемен."
 usc.37.t: "Майкл Флинн назначен вице-президентом"
 usc.37.desc: "В разгар Второй гражданской войны в Америке наш президент сделал историческое заявление, которое будет определять политику нашего правительства на долгие годы. Дональд Трамп назначил генерал-лейтенанта Майкла Флинна своим вице-президентом, положив конец недавней борьбе за власть, которая охватила конституционное правительство. Флинн известен своим воинским мастерством, выступая в качестве главного военного фельдмаршала и объединяющего командующего. Несмотря на то, что он был уволен с должности советника в течение первых 20 дней правления администрации Трампа в 2016 году, он ушел в отставку, чтобы возглавить вооруженные силы Конституционного правительства, выступая в качестве номинального руководителя политического крыла армии, и олицетворял недавние сдвиги в Республиканской партии в сторону авторитаризма. Своим назначением он эффективно внедрил ценности, лежащие в основе его идеологии, в систему управления Америкой на обозримое будущее и укрепил позиции Вооруженных сил.\nВ своем заявлении, сделанном ранее сегодня, Флинн заявил, что Америка будет и впредь ставить интересы национальной обороны превыше всего остального, а также продолжать усилия по поддержанию законности и порядка, что практически стало лозунгом его предвыборной кампании, к разочарованию многих его коллег. Это привело в замешательство многих в стране из-за статуса Флинна в армии, хотя это не совсем беспрецедентно. Трамп поздравил свою новую правую руку и публично заявил, что он "лучше всех подходит для этой работы" и единственный, кто может "защищать американские ценности, традиции и порядок". Это вызвало бурную поддержку со стороны многих американцев, хотя были высказаны опасения по поводу растущего влияния военных, особенно либертарианцев в Конгрессе, но эти опасения в основном остались без внимания. Через месяц Флинн должен выступить со своей инаугурационной речью."
 usc.37.a: "Порядок - это то, что нужно этой стране!"
 usc.38.t: "Относительно Ожидаемая Встреча"
 usc.38.desc: "Президент Трамп вошел в зал заседаний со своим высшим командованием. Недавно с передовой поступили сообщения о том, что силы Байдена разгромили множество бригад и продвигаются на территорию конституционалистов. Было созвано совещание с верховным командованием конституционалистов для обсуждения ситуации.\n"Господин президент, вы хотели видеть нас", - сказал Флинн.\n"Да, Флинн, я это сделал. По-видимому, либеральная армия разбивает наши силы на фронте", - сказал Трамп, прежде чем его прервал Джон Рэймонд.\n"Сэр, если позволите, мы могли бы легко компенсировать это. В настоящее время было бы нетрудно сдвинуться с мертвой точки" - сказал Рэймонд.\n"Я знаю Рэймонд. Не волнуйся. Все, о чем я прошу, - это реорганизовать наши силы для разгрома. Мы все знали, что нам придется нелегко в этой битве. В конце концов, трудные времена создают героев."\nВо время встречи Трамп и его фельдмаршалы обсудили стратегии, саботаж, развертывание войск и все остальное, чтобы переломить ситуацию на передовой. В целом, это была относительно спокойная встреча. Все верховное командование конституционалистов было заранее предупреждено о том, что в первые дни войны они, скорее всего, понесут потери и что им следует сосредоточиться на восстановлении, а не на контратаках.\nК концу встречи фельдмаршалы Трампа чувствовали себя относительно довольными тем, что они обсудили. Однако Трамп все еще нервничал из-за того, что должно было произойти. Когда он встал, чтобы выйти из комнаты, он успокоился."
 usc.38.a: ""Трудные времена создают героев.""
 usc.39.t: "Американское Сопротивление"
 usc.39.desc: "Трамп созвал еще одну встречу, на этот раз на ней присутствовали не только он и его фельдмаршалы, но и он сам, его фельдмаршалы и несколько высокопоставленных генералов. Когда он вошел в комнату, то увидел карту войны в Америке, на которой были темно-синие цвета АКП и светло-голубые Союза. Это выводило его из себя, он был раздражен тем, что его войска делали недостаточно для удержания линии фронта, и он злился на своих генералов за то, что они не сделали достаточно, чтобы компенсировать ситуацию. Однако, когда он сел и начал совещание, он решил скрыть свой гнев, чтобы сохранить созданный им имидж.\n"Флинн, ситуация на передовой, мягко говоря, не из лучших, я ожидал от вас большего. Но все в порядке, вы все еще можете проявить себя", - сказал Трамп дисциплинирующим тоном.\n"Спасибо, господин президент", - сказал Флинн, кивая головой.\n"Итак, джентльмены, как мы знаем, ситуация на передовой, мягко говоря, не самая комфортная. Однако я по-прежнему уверен, что мы можем переломить ход этой войны".\n"В чем же тогда заключается ваша стратегия, господин Президент?" - спросил Джон Келли\n"Что ж, Келли, мой план заключается в том, что мы укрепляем наши позиции и начинаем планировать контратаки, мы больше не можем допустить крупных отступлений и должны вернуть часть территории. В то время как наши силы концентрируются на передовой, мы наращиваем контрабанду оружия, боеприпасов и материально-технического обеспечения для отважного сопротивления, которое в настоящее время борется за освобождение наших оккупированных земель", - сказал Трамп.\nПо ходу встречи Трамп и его фельдмаршалы информировали генералов о том, как будут проводиться контратаки, а также усиление сопротивления. В целом встреча продолжалась намного дольше обычного, поскольку проблемы всегда возникали до того, как можно было согласовать план.\nОднако, в конце концов, участники встречи согласились вместо этого сосредоточить больше усилий на операциях сопротивления, поскольку они будут ждать, пока сопротивление не нанесет достаточный ущерб логистике и организации Союзу, чтобы обеспечить эффективный исход контратаки."
 usc.39.a: ""Мне нужно немедленно связаться с сопротивлением по телефону.""
 usc.40.t: "Принятие и Смерть"
 usc.40.desc: "Многие, кто не был в зоне боевых действий, пережили бы приятный вечер, за которым последовала бы прекрасная ночь, когда звезды над головой освещали бы воздух. Для Купера Карменатса вместо этого воздух озарился зенитным огнем. Выглянув из своего окна на юго-западной стороне Пентагона, он посмотрел на город Арлингтон, вспомнив приказ своего командира отступить к Пентагону вместо того, чтобы сдаться в плен. Каким же глупцом он был, когда последовал этому приказу. Теперь, из-за своей наивности, он вместе с двумя сотнями других солдат оказался в здании военного командования.\n\nПока он смотрел в окно, он думал о своем детстве, подростковом возрасте и, в конце концов, о взрослой жизни до того, как она была грубо прервана из-за гражданской войны. Как он собирался жениться на своей школьной возлюбленной перед тем, как отправиться в армию, как его отправили на фронт, и он наблюдал, как вокруг него умирают его товарищи, а он один остается в живых. Будь то леса Иллинойса, пригороды Индианаполиса и, наконец, некогда шумные улицы Арлингтона. Затягиваясь сигаретой, он размышлял о своей судьбе, сожалея о решениях, которые привели его сюда, в Пентагон, где разместились он и еще две сотни человек, ожидая неизбежного.\n\nВдруг он услышал слабый шум вдалеке - не зенитный огонь, нет, он бы знал, если бы это было так. Либо это была очередная колонна войск Конституции, которая в пятый раз за сегодня попытается взять Пентагон, либо очередная партия гражданских автобусов, покидающих Вашингтон, чтобы избежать уничтожения. В любом случае он схватил винтовку, передал по рации своему отряду, что на них скоро могут напасть, и достал бинокль. Но вместо этого он увидел вдалеке одинокий Абрамс, над которым развевался американский флаг, а на передней панели было что-то похожее на вывеску. Абрамсы проехали под шоссе Генри Г. Ширли и остановились прямо перед парковкой Пентагона. Пока Купер безучастно наблюдал за происходящим, Абрамс поднял пушку и, казалось, нацелился прямо в его окно. Купер подумал про себя, что, возможно, наконец-то смерть пришла, чтобы избавить его от страданий."
 usc.40.a: "Купер закрыл глаза и покорился судьбе."
 usc.41.t: "По-настоящему Американские Выборы"
 usc.41.desc_1: "Несмотря на ужасные обстоятельства гражданской войны, в которых мы оказались, мы должны поддерживать огонь демократии, иначе мы впадем в тиранию, как это сделали вероломные демократы.\n\nИзбирательные участки были созданы в каждом городе или поселении, контролируемом нашими силами, даже в прифронтовых городах, где люди самоотверженно голосуют за своего кандидата, даже находясь под угрозой нападения врага. Один из таких избирателей сказал корреспонденту новостей: "Я патриот. Если мне нужно быть где-то, я буду там. Несмотря ни на что."\nЭтот поразительный патриотизм наших храбрых граждан свидетельствует о силе нашей демократии.\n\nНеобходимо отметить, что нынешний президент Дональд Трамп, наш храбрый лидер, пользующийся полной поддержкой Республиканцев, набрал абсолютное большинство голосов. Лишь немногие проголосовали за Джека Бойда, независимого, бывшего начальника полиции из небольшого города, который баллотировался как кандидат по единственной проблеме - явной коррупции в его городе. После поражения он признал, что "это был всего лишь пиар-ход " и  "настоящая битва будет на выборах мэра "\n\nДоверие, проявленное нашим народом к президенту Трампу, превосходит любое доверие в истории. Они голосовали за новую Америку, они голосовали за победу. Давайте не подведем их!"
 usc.41.desc_2_5: "Любовь к Трампу в нашей стране безгранична. Когда Трамп объявил о выдвижении своей кандидатуры на третий срок, американцы мгновенно сплотились вокруг своего лидера. Наш президент обеспечил будущее нашей страны, защитил наших детей от кабалы демократов и готов сражаться за нас до победного конца.\n\nВ своей победной речи Трамп подтвердил все это. Однако он также заявил, что не планирует баллотироваться на четвертый срок. Он сказал: "Люди, этот срок будет последним, обещаю! В следующие четыре года ваши голоса будут ждать столько замечательных парней - поистине удивительно, какое движение мы создали. Они будут служить нашей стране - конечно, не так здорово, как я. Шучу!"\n\nАмериканский народ проголосовал, отдав Трампу большинство голосов, как и на предыдущих выборах. Они сделали это против горстки кандидатов, которые были едва заметны сверху. Никто в современной Америке не набирал такого количества голосов и одобрения, возможно, никогда."
 usc.41.desc_2: "Последний год президентства Дональда Дж. Трампа подходит к концу, и он прекрасно послужил нашей стране. Однако сейчас он истощен как морально, так и физически. Его возраст не позволяет ему оставаться на посту.\nВ этом году выборы предоставили нашим гражданам более широкий выбор. Пока американский лидер готовится к отставке, американцы сталкиваются с новой избирательной системой, в которой партийная принадлежность менее важна, чем политика и личность.\nОсновная борьба, как считается, идет за номинацию республиканца, а не за сами выборы. Предполагается, что кандидат от Республиканской партии победит с комфортным большинством голосов против своих оппонентов, независимо от того, являются ли они представителями второстепенных партий или независимыми. Особенно с учетом личной поддержки Трампа.\n\nМиллионы американцев пришли на избирательные участки, чтобы отдать свои голоса за кандидата, который им импонирует. В глубине души они все еще хотели увидеть имя Дональда Трампа в бюллетене и, конечно же, поставить на нем крестик. Но в конечном итоге они понимали, что время прошло и его нужно отпустить."
 usc.41.a: "[presidential_pick_victor_text]"
 usc.41.a1: "ТОЛЬКО ТРАМП СПАСЁТ АМЕРИКУ!"
 usc.41.jdvance: "У Нас Будет Величие с Вэнсом!"
 usc.41.rubio: "С Марко До Конца!"
 usc.41.desantis: "Вперёд Рон!"
 usc.41.carlson: "Все за Такера!"
 usc.41.bryan: "Брайан за Америку!"
 usc.41.lake: "Кари к победе!"
 usc.41.vivek: "Вивек - Для Людей!"
 usc.41.gaetz: "Гетц - Весь День, Все Время!"
 usc.41.johnson: "Майка в Президенты!"
 usc.41.paul: "Нам Нужен Пол!"
 usc.41.sarah: "Побеждай, Сара, побеждай!"
 usc.41.musk: "Ну Луну с Илоном!"
 usc.41.trump_child: "СОХРАНИ АМЕРИКУ ТРАМПА!"
 usc.41.trump_third: "Трамп сегодня, Трамп завтра, Трамп навсегда!"
 usc.42.t: "Прощание Трампа с Нацией"
 usc.42.desc: "В связи с уходом президента Трампа с высшего поста в стране Белый дом опубликовал последнее обращение Дональда Трампа к американской нации:\n\n"Мои соотечественники, американцы! В преддверии моего ухода с поста лидера этой великой страны я хотел бы вместе с вами оглянуться на то, чего мы достигли. Мы так много выиграли. Каждая битва за американское будущее была выиграна, вместе мы победили коррумпированный истеблишмент, когда я только был избран в 2016 году, затем демократы и глубинные радикалы развязали нам ад, они дестабилизировали нашу нацию и привели нас к гражданскому конфликту. Столько разрушений. Но в конце концов мы победили. Мы сделали Америку сильнее, мы снова сделали Америку великой, друзья, вопреки всему. Я не сомневаюсь, что следующий президент будет мудрым, активным и будет следовать воле народа, и я не сомневаюсь, что вы - американцы - будете умны и не дадите себя обмануть. Вот и все, я прощаюсь с вами, очень трогательная вещь, правда. Прощай, моя прекрасная Америка, желаю вам всем удачи. Никогда не сдавайтесь!"\n\nНа этом эра Трампа заканчивается, но следующий президент, несомненно, продолжит его наследие, по крайней мере, так, как он считает нужным. Сейчас Дональд Трамп проводит время на пенсии в частных поместьях в окружении своих детей и внуков. Тем не менее, он по-прежнему периодически публикует сообщения на своей странице в Twitter."
 usc.42.a: "Наслаждайтесь заслуженным отдыхом, сэр."
 usc.43.t: "ВП для Америки"
 usc.43.desc: "Вице-президент Вуд - отличный человек, но ему не хватает харизмы, и он не известен широкой публике. Он был выбран в качестве временной замены вице-президента, чтобы обеспечить стабильность и функциональность правительства.\n\nСейчас, когда ситуация постоянно меняется, Трамп должен выбрать лучшего второго командира для страны. Есть много великих патриотов и исключительных личностей, но выбрать можно только одного из них.\n\nКого же мы выберем?"
 usc.43.a: "Джим Джордан, хороший парень, очень патриотичный и преданный делу. Он мне нравится."
 usc.43.b: "Марко Рубио, опытный человек, в прошлом у нас с ним было несколько размолвок, но теперь он полностью наш парень."
 usc.43.c: "Байрон Дональдс, потрясающий оратор, очень лояльный, очень практичный, обеспечит нам поддержку чернокожих."
 usc.43.f: "Этот Джей Ди Вэнс действительно много работает! Драки и все такое, люди любят его! Маленький человек, мечтающий о большом. Мне это нравится."
 usc.46.t: "В Мой Самый Тёмный Час"
 usc.46.d: "Мои соотечественники, американцы...\n\nПосле недавних событий мне трудно найти подходящие слова, чтобы обратиться к вам. В стране, которая еще недавно была маяком для всего мира, свирепствуют террористы и мятежники. Предательские силы, представленные Демократической партией, пролили кровь американцев в беспрецедентном акте насилия, не виданном со времен Гражданской войны.\n\nНаши храбрые войска и отважные минитмены, верные конституции, делают все возможное, чтобы сдержать их угрозу, а мы делаем все возможное, чтобы обеспечить их всем необходимым снаряжением, боеприпасами и транспортными средствами. Но этого оказалось недостаточно.\n\nТо, с чем мы боремся, - это чудовище Франкенштейна из глубинного государства, которое наконец всплыло на поверхность, немыслимая гера, призванная восстановить элитарный статус-кво и сокрушить американских рабочих.\n\nОни приближаются к важнейшему городу Миннеаполису, ключу к северу Соединенных Штатов... Сегодня я прошу вас о поддержке, так же как не так давно просил вашего голоса... Мы не можем позволить им победить. Ради будущего наших детей и ради самих себя... Если мы позволим им победить, наша страна исчезнет...\n\nИ самый темный час для Америки - это самый темный час для меня и всех нас. Но есть один способ вернуться к свету:..."
 usc.46.a: "Боритесь! Боритесь! Боритесь!"
 usc.47.t: "Потеют Пулями"
 usc.47.d: "Мои соотечественники...\n\nПредатели из так называемого Союза Америки движутся через сельскую местность к городам, которые не изменили присяге конституции... Там, где они побывали, не осталось ничего, кроме руин, мародерства, смертных приговоров лоялистам, а иногда и просто немедленных убийств.\n\nОни потеют пулями... и плачут артиллерийскими залпами... потому что знают, что не удержат власть без новой войны. Они развязали бесчисленное количество войн за границей, но этого оказалось недостаточно - им пришлось вернуться домой... То, что они делают, абсолютно неприемлемо и должно быть остановлено.\n\n И вместе мы - единственный шанс, который есть у Америки, чтобы остановить их. Вместе мы вернем Америку, вернем себе наш прекрасный Белый дом и снова сделаем нашу страну великой, это будет здорово, я вам говорю...\n\nНо для этого мы должны не позволить им пересечь Миссисипи, «Собрание вод». Наши верные бойцы контролируют ключевой город в обороне реки, Сент-Луис. Скоро враг будет разбит, и в стране восстановится порядок."
 usc.47.a: "Мира вашему дому, и да благословит вас всех Господь."
 usc.48.t: "Отсчёт до Вымирания"
 usc.48.d: "Мои соотечественники, американцы...\n\nНаша страна еще никогда не была в такой опасности, как сейчас. Сейчас мы - вымирающая нация, и наши дни сочтены. Отчаяние, безнадежность сводят наших людей с ума. Это разрушает фундамент нашей страны и трескает фасад.\n\n Но Америка всегда выстояла. И она выстоит снова, пока мы помогаем друг другу, держимся за своих близких, друзей... Это те вещи, которые вы никогда не должны забывать.\n\nЯ очень горжусь и вдохновляюсь нашими парнями на фронте... Наши патриотические воины свободы... Многие из них никогда не думали, что война придет, но мы идем на нее из-за подлых, мерзких предателей этой страны... Так много домов разрушено, это катастрофа. Цифры невероятны, все гораздо хуже, чем вы думаете.\n\n Я видел примеры этого в Оклахоме... Это ужасно, очень ужасно, через что приходится проходить этим людям, но они храбрые, очень храбрые люди. И то, что вдохновляет их, должно вдохновлять всех нас сегодня...\n\nНас ведет вперед американская мечта... Мечта, которая состоит из многих, многих маленьких мечтаний. Рабочие, учителя, врачи, политики, борцы за гражданские права... Солдаты, полицейские... Все мы - большие или маленькие - причастны к этой мечте.\n\nИ пока она сияет, никакая тьма не сломит американский дух, никакой террорист, никакой предатель или радикал не потушит этот огонь. Он победит все, как всегда, и проложит дорогу к светлому будущему, в котором наша страна снова станет великой."
 usc.48.a: "Боже, благослави Америку!"
 usc.49.t: "Эндшпиль"
 usc.49.d: "Мои соотечественники, американцы...\n\nКак вы знаете, мы вместе прошли через множество путешествий... Если бы не это путешествие, мы бы не оказались здесь, в Денвере, а не в Вашингтоне. Мы бы не знали, через какую борьбу, через какую боль нам пришлось пройти, чтобы отстоять свои идеалы и интересы этой страны.\n\nЭто другое время. И когда мы говорим, что боремся за что-то, мы буквально подразумеваем это. На каждом шагу мы боролись. И мы сражались с мужеством и силой, достойными отцов-основателей...\n\nИ мы будем вести великую борьбу за Америку и мы победим... Потому что те парни? "Ну же, Мужик!" Они неудачники. Единственное, что они сделали с нашей страной, - это разрушили ее, они никогда не знали, каково это - строить свою собственную жизнь... И они никогда не строили ничего для нашей страны.\n\nПомните, я обещал, что мы победим? Мы так много выиграем... Так что берегите свои силы, люди. Пока дух нашей страны жив в каждом из нас, битва никогда не закончится."
 usc.49.a: "Мы победим, несмотря ни на что."
 usc.50.t: "Обрашение Трампа к Стране"
 usc.50.d: "Мои соотечественники, американцы...\n\nСегодня ночью наша нация была потрясена тем, что, как мы думали, никогда не повторится... В беспрецедентном и неконституционном насильственном действии Демократическая партия и другие предательские элементы нарушили целостность нашего государства и атаковали силы, верные нашему делу, что является крупнейшим актом насилия на нашей родине со времен Гражданской войны...\n\nНаши оппоненты не обращали внимания на плюрализм мнений, на жизни мирных граждан, которые были жестоко прерваны сегодня... Они не считались с нашей священной демократией и правами, которые были даны нам конституцией... Они не считались и не считаются с нашей общей верой и Словом Божьим. Они решили убить своего соседа только потому, что не были с ним согласны...\n\nОни стали врагами нашей страны и ее народа, и с ними следует обращаться именно так. Предателям не будет пощады и прощения. Мы разберемся со всеми до единого, как бы они ни сопротивлялись и ни пытались убежать от правосудия, ничего не выйдет. Мы будем использовать смертную казнь... Мы будем использовать все законы, которые нам понадобятся, чтобы добиться этого.\n\nУ нас есть моральное, военное и промышленное преимущество. Враг будет разбит, мы победим!\n\nБог благословит Соединенные Штаты и Бог благословит вас."
 usc.50.a: "Никогда не сдавайтесь!"
 usc.51.t: "Президент Трамп реагирует на "Выборы" в Союзе Америки"
 usc.51.desc_1: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"Эти сумасшедшие люди, они сделали это! Они действительно сделали это! Они сделали Берни президентом. Они, должно быть, совсем сошли с ума, если дали ему шанс, раньше они никогда бы такого не сделали. Коммунист Берни Сандерс - вот человек, которого можно победить. Настоящая визуализация врагов Америки.\n\nНу, вообще-то я хочу поздравить Берни. Нет, правда! Прежде всего потому, что он дожил до этих выборов. Доживет ли он до инаугурации? Не уверен. Во-вторых, у него наконец-то появился шанс воплотить свои абсолютно безумные коммунистические мечты в реальность, хотя бы на время, пока мы не придем и не восстановим нашу страну должным образом. Наконец-то у нас будет реальный пример того, почему социализм в Америке не работает!!! Видимо, демократы не могут учиться на ошибках других стран, очень печально.\n\nНо, честно говоря, для меня еще печальнее, что Берни делает это. Я уже говорил, что он мог бы стать легендарной личностью. Но он заключил сделку с дьяволом, и вместо этого он будет известен своим легендарным провалом перед Трампом, как только мы вернем себе наш прекрасный Белый дом. И мы сорвем все красные флаги с крыши и выбросим их туда, где им самое место - в мусорную корзину!"\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.desc_2: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"Я слышал, что Мини-Майк, которого иногда называют Майком Блумбергом, наконец-то смог купить себе целый президентский пост. Должно быть, по большой скидке, его бизнес идет не очень хорошо. В общем, мы все знаем Мини-Майка, то, что он сделал с Нью-Йорком, моим домом, - ужасно! Зараженный крысами и мигрантами, полностью разрушенный. А теперь он хочет распространить это на всю страну! И у него есть все эти доноры и корпорации, которым он продает страну, люди. Я говорил о "Глубинном государстве", но ОН И ЕСТЬ "Глубинное государство"\n\nИ знаете, демократы сейчас обещают отнять больше, чем отдать. Серьезно! Они уже хотят отобрать у нас оружие, свободу слова, права штатов... В следующий момент демократы скажут: "Мы должны поместить всех людей в бункеры из-за ковида", а потом они отберут у всех звук, скажут: "У нас больше не может быть звука, потому что мы все живем под землей"... Они безумные люди, скажу я вам, абсолютно безумные."\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.desc_3: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"...Пока мы здесь, вы видели, какой катастрофой является победитель - полный неудачник, если быть честным - нового "президента" этого Болота? Невероятно. Этот Эндрю Янг - ну что за малыш. Даже демократам он не нравится! Полная катастрофа. И он абсолютно сумасшедший радикал. Мы назовем его "Чокнутый Янг" - так мы его назовём, подходит как нельзя лучше.\n\nЭтот глупый Эндрю, он так раздражает. Он никому не нравится. Едва вырос из детсадовских штанишек, а уже "президент", даже у мэра Пита больше опыта. Он хочет позвать свою "банду Янга"? Ладно, послушайте, это уже достаточное доказательство того, что округ Колумбия захватила кучка бандитов! Они уже даже не скрывают этого. Да, это невероятно....\n\n... Посмотрите на эти "выборы", ребята. Такая низкая явка, никто не пришел. Полный позор для "Глубинного Государства". Все знают, что они хотят вернуть настоящего президента - меня. Не волнуйтесь, люди, мы отобьем силы Глубинного Государства - очень быстро - мы освободим наш народ - великолепный народ - от этих продажных демократов и предателей RINO. Мы спасем Америку, по одной проблеме за раз.""
 usc.51.desc_4: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"Слышали новости, люди? Эта старая куча дерьма Байден окончательно сломался, ему даже не разрешили баллотироваться на второй срок. Демократические Бюрократы списали его со счетов за то, что он слишком много спал. Говорят, последние несколько месяцев он нес полную чушь и даже не узнавал свою жену. Кому они позволяют управлять страной?\n\nНо Камала, она не намного лучше. Может, даже хуже! У Байдена, по крайней мере, когда-то были мозги, но он их потерял. Камала? Не могу сказать, что они у нее когда-либо были. И как же она много ПЬЁТ! Она может вместить больше вина, чем подвал.\n\nИ все же они пытаются создать впечатление, что она молодой, свежий лидер, но не дайте им одурачить вас, люди. Камала, Джо - это один и тот же человек! Разницы не будет, потому что у них одни и те же кукловоды! И они меняются как перчатки. Это все полная ложь, демократия так не работает.\n\nТак что я приеду в Белый дом, Камала, чтобы поговорить с тобой... Но разговор будет не очень долгим. Мне нужно сказать тебе всего одну фразу: "ТЫ УВОЛЕНА!"\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.desc_5: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"Видимо, демократы были настолько плохи, что проиграли фейковым Республиканцам в их собственной фальшивой и подтасованной системе. Насколько можно быть плохим? Я скажу вам - они УЖАСНО ПЛОХИ. Не могу представить, как эти люди собираются управлять остальной частью нашей страны, если они не могут управлять даже своими остатками!"\n\nИ кого же из всех людей выбрали эти предатели RINO? Мерзкую Никки Хейли и Митт-в-дыре-Ромни? Смехотворный бюллетень. Никто бы даже не вспомнил о них, если бы я был там. Жалкие неудачники, вот кто они. Но пока они могут наслаждаться своей маленькой фальшивой победой, они не выиграют настоящую битву. Америка хочет вернуть настоящего республиканского президента - МЕНЯ.\n\nИ я имею в виду, серьезно? Они поставили Митта Ромни во главе? Я думал, что он все еще живет в 2012 году. Может, он думал, что все еще борется с Обамой? Ну, я не Обама, Митт, я намного сильнее и умнее. И я верну тебя на 12 лет назад, где тебе самое место, только подожди.\n\nОни называют его Митт-в-дыре-Ромни, потому что его рейтинг одобрения настолько низок, что он испортил политический ландшафт, не смог победить Обаму, не смог победить меня и теперь катается по полу, плача из-за этого, он - катастрофа.\n\nИ я слышал, что он ходил на один из этих "фурри" съездов, полных геев, которые одеваются как животные! И ЕМУ ПОНРАВИЛОСЬ! Не очень консервативно с твоей стороны, Митт. А теперь давайте поговорим о чем-нибудь более интересном..."\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.desc_6: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"...И вау. Вы это видели? Очевидно, демократы были настолько плохи, что проиграли фальшивым республиканцам в их собственной фальшивой и подтасованной системе. Насколько можно быть плохим? Я скажу вам - они УЖАСНО ПЛОХИ. Не могу представить, как эти люди собираются управлять остальной частью нашей страны, если они не могут управлять даже своими остатками!"\n\n"И кого же из всех людей выбрали эти предатели RINO? Мерзкую Никки Хейли и Митт-в-дыре-Ромни? Смехотворный бюллетень. Никто бы даже не вспомнил о них, если бы я был там. Жалкие неудачники, вот кто они. Но пока они могут наслаждаться своей маленькой фальшивой победой, они не выиграют настоящую битву. Америка хочет вернуть настоящего республиканского президента - МЕНЯ.\n\nВы знаете, какие у них планы? Сумасшедшая Никки и ее военно-промышленные лоббисты собираются начать третью мировую войну! Они хотят начать войны по всему миру, они хотят подвергнуть опасности жизни американцев, они не могут придумать ничего другого. На самом деле, она была так рада, когда убийства начались в нашей стране! Улыбка у неё была до ушей, потому что ее спонсоры будут богатеть от продажи оружия и убийств!\n\nЯ не имею права говорить это, потому что она женщина, но если бы я был женщиной, я бы сказал, что она мерзкая и очень отвратительная. Хейли-Чейни - вот рифма, над которой вам стоит задуматься. Ее и других неоконов я уничтожу до того, как они уничтожат нашу прекрасную страну и всю остальную планету."\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.desc_7: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"О, вы только посмотрите на это. Вы видели недавние новости? Болото нашло себе нового "президента", видимо, Сонный Джо не справился. Теперь это Клоб... Клобу-шар или как там её. Ну, что я могу сказать о Чудачке Эми? Худшего кандидата не было за всю историю нашей страны. Серьезно! Разве у вас не было никого получше? Она не была бы моим первым выбором, это я вам точно могу сказать.\n\nВы видели ее "победную речь"? Полная катастрофа! Чудачка Эми даже не знает, что говорить и о чём она говорит. Наверное, даже поверить не может, что ее избрали, честно говоря, я тоже в это не верю, должно быть, это какое-то мошенничество, как и все остальное в оккупированной демократами фальшивой Америке. Она - снежная женщина, ясно? И она тает, как тают войска повстанцев на фронте. У них осталось не так много времени, и они это чувствуют.\n\nНо не волнуйся, Эми. Я уже приготовил для тебя хороший дом в Миннесоте, большой дом, это единственное, что ты можешь планировать выиграть сразу после этих фальшивых "выборов". Ты будешь отдыхать до конца своих дней, обещаю. Надеюсь, ты не против. Ты в порядке, Эми? Ты не скажешь нам об этом? Думаю, мы скоро узнаем."\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.desc_8: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"В вашингтонском болоте произошла смена руководства, и кого же они выбрали? "Бето О'Рук"? Кто это? Техасец, который хочет отобрать у людей оружие?  Это забавно, надо отдать им должное...\n\nТак что... Я даже не знаю, что сказать об этом парне! Говорят, он "почти" победил ЛЖИВОГО Теда, но, конечно, он этого не сделал, ведь он неудачник. И всё? Теперь понятно, откуда взялась его фамилия, он же безРУКий - ни опыта, ни знаний! Не думаю, что у их маленького фальшивого правительства осталось много времени с такими лидерами - максимум две недели!\n\nПоэтому позвольте мне сказать вам: он определенно не Альфа и даже не Бета. Он - О'Мега Рурк! Так мы его и назовем..."\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.desc_9: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"Я слышал, что они выбрали Пита Бутти-джем? Бутти-джей? Бутти-джах?  Неважно. Не стоит запоминать фамилию Пита, я уверен, что через 4 года у нас будет кто-то другой, точно так же, как они сбросили Сонного Джо. И знаете, мэр Пит - он никто без демократов и без доноров. Полное ничтожество! Кроме того, что он гомосексуалист, это единственная карта, которую он может разыграть, больше ничего. Я ничего не имею против гомосексуалистов, но как же это жалко и скучно!\n\nА мэр Пит, как там его фамилия, он любит называть меня гомофобом... Это просто НЕПРАВДА. Я лучший президент для геев за всю историю нашей страны. Я уничтожил ИГИЛ, людей, которые больше всего ненавидели геев. На самом деле, Питу стоит спросить, за кого голосовал его муж, он будет очень удивлен."\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.desc_10: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"Да ладно, люди... Неужели мы должны разбираться с ней СНОВА? Мы уже победили тебя однажды, Хиллари, УБИРАЙСЯ ОТСЮДА!  Дай Берни шанс, пока он еще жив!\n\nВы знаете, это самая жульническая номинация в истории. Полностью сфальсифицированная, никто ни за что не проголосует за умирающую Хиллари Клинтон. Где она вообще была до дня выборов? Я ее не видел, никто не видел. Ее прятали в подвале, потому что она не может пройти и десяти футов. Вы можете представить себе эту женщину в качестве нашего президента? Я так не думаю...\n\nЯ не должен был давать Хиллари шанс. Надо было посадить ее за решетку 8 лет назад, может, сейчас она была бы лучше. Наверное, я просто слишком добрый, люди, не так ли?\n\nНо неважно, кого истеблишмент выставит или вытащит из могилы, мы уничтожим их всех, заберем Вашингтон у Клинтонов и вернем его народу. Мы спасем Америку от коррупции, у нас нет другого выбора... Так что будет справедливо, если мы вышвырнем самую коррумпированную женщину в истории нашей страны, не так ли, люди? И я буде делать это с улыбкой, говорю вам..."\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.desc_11: "Во время недавнего митинга в Денвере после своего успешного переизбрания президент Трамп обратился к параллельным "выборам", проводимым на территории так называемого "Союза Америки."\n\n"Не могу поверить! Они переизбрали эту еле ходящую мумию... Еще в 2020 году я думал:  'Хуже продажного Джо Байдена никого нет!' Но теперь я знаю, что есть и хуже - это тот же самый Байден только 4 года спустя! Он не только стал хуже, но и его политика тоже стала хуже. Экономика? ПРОПАЛА. Человеческие жизни? УБОГИ. Но самое страшное и важное - они поддерживают огонь этой ужасной гражданской войны. Не будет мира с военными свиньями демократов! \n\nИ знаете, я уже начал думать, что мы можем дать демократам шанс. Может быть, нам даже не придется убивать их всех. Хотя, если подумать... Хм? Нет, не всех. Хотя если кто-то и заслуживает смертной казни... То это точно Джо, самый большой мятежник и террорист в истории нашей страны... Но что ж... Думаю, Сонный Джо не вернется в постель еще максимум 4 года, а скорее всего и того меньше, и будет продолжать разрушать нашу страну... Позор!"\n\nТолпа ликовала, смеялась и ревела в унисон - обычная, ожидаемая реакция на шутки своего любимого кумира. Оппозиция снова подверглась словесному позору. База снова воодушевилась, поддерживая силы конституционалистов, которые храбро продолжают сражаться на передовой за видение Америки Трампом."
 usc.51.a: "Вот это мой Президент!"
 usc.51.b: "Продолжай трепаться, парень."
 usc.52.t: "Используя Силу"
 usc.52.d: "Поскольку всевозможные либералы и альтернативно-левые преступники антифа сейчас выходят на улицы Денвера и других городов, находящихся под нашим контролем, чтобы "протестовать" против законного правительства и помогать глубинному государству, мы должны решить, как действовать в этой ситуации, чтобы защитить ЗАКОН и ПОРЯДОК.\n\nМакгрегор и другие советники предлагают, чтобы наши замечательные полицейские и храбрые национальные гвардейцы были готовы силой подавить этих антиамериканских сумасшедших левых, как можно быстрее, в рамках законов нашей конституции и "Закона о восстании"\n\nОднако менее радикальные советники, такие как Джим, говорят, что мы должны использовать свободу действий, быть законными и справедливыми, и использовать только полицейские силы, а национальных гвардейцов использовать только в самых опасных случаях."
 usc.52.a: "Это насильственное восстание по всей нашей великой стране. Мы выглядим слабыми, в Москве такого нет!"
 usc.52.b: "Мы должны держать себя в руках, наши копы должны арестовывать только жестоких БАНДИТОВ."
 usc.53.t: "Демонстрация Нашей Поддержки"
 usc.53.d: "Твои люди напуганы, они в смятении, по всей нашей территории. Они хотят слышать тебя, видеть тебя, они хотят твоих утешений.\n\nБрайан и Такер говорят, что людям нужен большой митинг в Денвере, чтобы показать всем - особенно ненавистникам и сосункам - что Денвер - это MAGA-город. Это безопасное место, где много охраны и много великолепных сторонников, которые могут спокойно быть на стадионе Mile High. Наши люди будут в восторге.\n\nБрэду пришла идея собрать людей в Миннеаполисе. Сильно. Мы покажем им, как я хорош в разгоне толпы. Отличный город, но близко к линии разграничения, возможно, найдётся много антифа бандитов. Но он говорит, что это взорвёт все рейтинги, храбрый президент посетит город, охваченный расколом, и выступит с посланием единства перед лицом предательства. Отличные заголовки. Твоим людям понравится этот акт сострадания.\n\nДэн, однако, с его супер-пупер медиа-технологиями, говорит, что все, что вам нужно, это хорошая кампания в Интернете, много медиа-баннеров, реклама, видео, что угодно. Ты будешь записывать видеоролики с тем, что нужно услышать твоим людям. Это не так мощно, как митинги вживую, но Дэн утверждает, что сейчас это слишком опасно."
 usc.53.a: "Денвер, отличная идея - покажем им, что теперь это наш город."
 usc.53.b: "Миннеаполис - это сильно, - Брэд понял что к чему, - мы покажем им, как я хорош с разношерстной толпой."
 usc.53.c: "Хорошо, мы не будем митинговать. Потому что у нас есть социальные сети. Я Майк Тайсон от мира Твиттера." 
 usc.54.t: "Митинг в Денвере"
 usc.54.d: "Толпа - потрясающая, много энергии. Стадион Mile High переполнен, некоторые люди не совсем из Денвера, но это неважно, важны цифры. Тысячи баннеров MAGA, гигантский светодиодный экран с плакатом "TRUMP, SAVE AMERICA."\nТы придумал отличную речь, еще одна классика - с критикой продажных демократов и их марксистских безумцев, и того, как они разрушают эту великую нацию. Другие ораторы тоже были там, много правдивых фактов было сказано ими.\nТолько правдивые СМИ здесь, транслируют везде, где могут. Еще больше людей смотрят прямой эфир - сумасшедшие цифры. Твоя база счастлива, они увидели своего президента в трудную минуту. Многие запишутся в ряды американской патриотической армии, чтобы сражаться за правое дело.\n\nКогда митинг подходит к концу, ты включаешь старую добрую Y.M.C.A. и подтанцовываешь под нее - толпа ликует. Нет ничего лучше, чем старый трюк, который все любят."
 usc.54.a: "Ещё один бэнгер" 
 usc.55.t: "Трамп Покорил Миннеаполис"
 usc.55.d: "Эд вел типичную жизнь водителя грузовика в маленьком городке. У него было мало роскоши и много проблем. Его город и семья переживали не лучшие времена со времен "обаманомики." Однако любого, кто пытался критиковать ее и показывать, какой вред она причиняет американцам-"синим воротничкам", клеймили расистом.\nНо потом к власти пришел Трамп, и дела в маленьком городке Эда начали улучшаться. Конечно, бюрократы и карьеристы пытались игнорировать видение президента, но плоды его работы все равно были налицо. Многие жители Среднего Запада стали воспринимать Трампа как своего личного героя, и семья Эда не стала исключением.\n\nПока в столице и по всей стране разворачивались непростые события, Эд с тревогой смотрел телевизор. Fox News сообщил, что президент Трамп проведет публичный митинг в Миннесоте.\nИ тут началось. Прямая трансляция выступления Дональда Трампа на трибуне. Однако спустя несколько мгновений что-то пошло не так. Раздался громкий хлопок, и президент упал. Телохранители немедленно окружили его.\n\nНа мгновение Эд подумал, что все кончено. Они убили его, единственного политика, которому была небезразлична эта страна. Но через секунду он увидел, как Трамп триумфально поднимает кулак, стоя в окружении охраны.\nЭд был по-настоящему потрясен. Все, что он мог сделать, это позвонить жене и сообщить ей новость."
 usc.55.a: ""Милая, они пытались убить президента Трампа!"" 
 usc.56.t: "ПРОЕКТ: AMERICAN RESURRECTION"
 usc.56.d: "Кевин Робертс, глава фонда "Наследие", пришел к тебе со своим видением того, как ты должен вернуть Америку.\nОн говорит, что сильная исполнительная власть, используемая во время чрезвычайных ситуаций, необходима для защиты американской общественности от опасностей и коррумпированного глубинного государства, которое, по его словам, гноится даже в нашей администрации.\nЭтот парень делает несколько хороших замечаний здесь и там. В конце концов, сейчас нельзя доверять ни одному бюрократу, все они, похоже, преследуют свои собственные цели. Но действительно ли приостановка американской демократии - это путь вперед? Ты ведь тоже защитник американской конституции, что бы ни говорили неудачники из болота.\n\nТакже Такер говорит, что все эти консервативные мозговые центры - просто место для подражания интеллектуалам, а также многие из них заполнены сомневающимся в твоём президенстве. Позор, если это правда."
 usc.56.a: "Хм, я подумаю об этом "проекте"."
 usc.56.b: "Такер прав, так много псевдоумных разговоров. Печально!"
 usc.57.t: "Возвращение Заблудших Детей"
 usc.57.d: "Ты получил неожиданный звонок от Майка! Он позвонил тебе из приграничного города, где остановился вместе с другими республиканцами, пересекающими границу. Он рассказал тебе все истории и наконец понял, почему ты - лучший выбор. Он сказал, что вашингтонское болото - это символ глубоких проблем Америки. И он сожалеет, что не поступил правильно.\nОх, Майк! Где был этот дух, когда ты мог бы потянуть за собой Джефферсона и спасти нашу страну. Но чего он хочет? Место для его людей, его "христианских консерваторов". Может быть, чего-то большего?\n\nОн мог бы быть полезен, в конце концов, ты никогда не отрицал его опыт в этой области, а быть прощающим и создавать коалицию - это то, что может найти отклик у "сентиментальной" части твоей базы. Пенс возвращается, как блудный сын, и его снова принимают в наши ряды. Демократы на такое никогда не пойдут! Они хотят видеть в руководстве Республиканцев только самых бесхребетных людей. Его люди хотя бы во что-то верят - ты можешь с ними не соглашаться, но им хотя бы есть с чем не соглашаться!\n\nНо, да ладно, публично пристыдить его? Представьте себе рейтинги; маленький Майки-Пенси отчаянно жаждет внимания после того, как ПРЕДАЛ своих соотечественников? Это называется предательством, Майк. Мы жестоко наказываем за это. Большая ошибка."
 usc.57.a: "Ребята, ну что я могу с собой поделать? Во мне так много человечности."
 usc.57.b: "Майк, ты забыл? А Я не забываю и, конечно же, не прощаю."
 usc.58.t: "Илон Маск поддерживает Дональда Трампа"
 usc.58.d: "В последние недели Илон Маск, богатый бизнесмен, открыто заявляет о своей поддержке правительства. После того как регулирующие органы вытеснили его с территории Союза Америки, он не теряя времени восстановил свой бизнес в районе Денвера. Он также поддерживает нашу либертарианскую фракцию, выступая за инициативы, ориентированные на бизнес, и меньшее правительство.\n\nВ одном из недавних сообщений Маск заявил о своей полной поддержке Дональда Трампа и внес значительную сумму денег в Республиканскую партию. Многие советники президента предлагают укрепить связи с Маском, поскольку его компания и влияние могут быть полезны в долгосрочной перспективе. Президент Трамп, похоже, не возражает против этой идеи."
 usc.58.a: ""Илон - этот парень, восходящая звезда! Говорю вам!""
 usc.58.b: ""Спасибо за твой великолепный вклад, Илон!""
 usc.59.t: "Послесловие"
 usc.59.d: "Этот момент стал кульминацией, определяющей секундой твоей карьеры. Готовясь выйти на сцену Республиканской чрезвычайной конвенции, ты видишь толпу - огромную, прекрасную толпу - и все они ждут тебя. Годы шоуменства готовили тебя к этому, к этому магнуму опусу - и люди говорят, что это самый смелый поступок, который они когда-либо видели. Они влюбились в то, как ты себя вел. А эта фотография - она повсюду. Все говорят, что для того, чтобы сделать такой культовый снимок, нужно умереть, но ты этого не сделал.\n\nКонфетти, разноцветные огни, воздушные шары. Ты выходишь на сцену, как чемпион по рестлингу. Ты стоишь, едва различая лица в толпе. Некоторые знакомые, многие незнакомые, но все они смотрят на тебя глазами, полными благоговения. Благоговения перед тем, кто ты есть - самым храбрым человеком, которого они знают. Они скандируют твоё имя и твоё дело. Так ли чувствовал себя Цезарь, обращаясь к своему верному легиону?\n\nКто-то говорит, что это было провидение, кто-то - счастливый случай, кто-то - божественное вмешательство. Но важно то, во что это превратилось. Ты рассказываешь историю - их глаза наполняются слезами. Они восхваляют тебя как героя, который сражается за них, а ты заверяешь их, что никогда не отступишь.\n\nЛидеры по всему миру восхваляли тебя, независимо от их вероисповедания - очень показательно. Могут ли люди с болота сделать то же самое? Нет. Жулик Джо просто упал бы и умер от несчастного случая.\n\nТвои люди готовы идти за тобой хоть на край земли. Они воспринимают твоё выживание как божественный мандат. Сам Бог на твоей стороне.\nТы теперь их Мессия."
 usc.59.a: "Боже, благослови США, и Боже, благослови Дональда Джей Трампа."
 usc.61.t: "Либертарианцы Восстают Против Трампа!"
 usc.61.d: "Слабые либертарианцы стали недовольны решением Трампа относительно управления Америкой.\nОни всегда были неуверенными союзниками, но теперь они показывают свое истинное лицо, когда все идет не по их сценарию. Это позор! Маленький Пол и его соратники теперь призывают к митингу против тиранического произвола.\n\nПротесты вспыхнули в некоторых городах, но причин для беспокойства нет.\n\nПо причине их насильственных действий против законного правительства, вся либертарианская символика теперь рассматривается как атрибутика бандитов."
 usc.61.a: "Ну что за шайка неудачников."
 usc.62.t: "Рост Антиамериканской Активности"
 usc.62.d: ""Что мы можем сделать?" спросил Том, его голос едва превышал шепот. Тусклый свет в его тесной квартире отбрасывал длинные тени, создавая атмосферу напряженности. Снаружи улицы кишели ополченцы Трампа, что делало почти невозможным думать о том, как организовать восстание против оранжевого тирана.\n"Ну, для начала нам нужно распространить информацию", - ответила Сара, ее глаза сверкали решимостью. "Я считаю, что нам нужна поддержка рабочего класса." Ее левацкая страсть была ощутима и зажгла в комнате огонек надежды.\n"Правда?" Джеффри вмешался, его голос повысился от разочарования. "Ваш так называемый рабочий класс приклеился к Fox News, пуская слюни по поводу всякой ерунды, которую они несут!" Его раздражение эхом отражалось от стен, наполняя пространство ощутимым напряжением.\n"Не все!" Сара ответила, ее голос был тверд. "Есть много людей, которым он надоел так же, как и нам."\n"Я хочу сказать, что мы должны сосредоточиться на образованных людях", - возразил Джеффри, вызывающе скрестив руки. "Мы уже достаточно насмотрелись на то что делал низший класс"\n\n"Вау, звучит очень по классицистки", - заметила Эми со своего места на диване, лениво подперев голову рукой. Казалось, она больше наблюдала, чем участвовала, но ее слова повисли в воздухе, как вызов.\n\nПо мере того, как вспыхивали и росли голоса, Том оглядывал своих друзей, чувствуя, как на него давит груз лидерства. Было достаточно сложно руководить сопротивлением, не наблюдая, как они разрывают друг друга на части.По крайней мере, они были не одиноки - тысячи подобных разговоров происходили по всей стране, повторяя их разочарование.\n"Слушайте все!" командный голос Тома прорезал хаос, как нож. "Нам нужно объединиться. Мы все можем внести свой вклад, если будем держаться вместе; мы все хотим одного и того же."\n\nЧасы пролетели незаметно, пока они обдумывали свой план действий: агитация, просвещение, организация и протест. Это не было грандиозной стратегией, но это было начало, и иногда для того, чтобы разжечь революцию, достаточно было одного проблеска надежды."
 usc.62.a: "Он Не Разделит Нас." 
 usc.63.t: "Слезы Либералов"
 usc.63.d: "Добрый вечер и добро пожаловать в прайм-тайм Джесси Уоттерса. Сегодня мы обсудим, как у некоторых либералов дела идут не слишком хорошо. То есть их приспосабливание к новой реальности Трампа. Некоторые из них устраивают "сексуальные забастовки", другие красят волосы, но пока не смейтесь, как бы смешно это ни звучало, в этом есть и опасные элементы. Посмотрите-ка на это: в социальных сетях появился пост, призывающий всех "оккупированных" присоединиться к "группам сопротивления", которые "массово формируются". Теперь мы должны хотя бы немного забеспокоиться. Да ладно, люди, эти сумасшедшие начали гражданский конфликт только для того, чтобы не допустить Трампа к власти. Знаете, как говорится, раненое животное вдвойне опаснее.\n\nВы спросите: "Где они вообще собираются? Старбакс давно закрыли, так что у них не особо много мест, куда они могут пойти." Нам нужно выработать правила ведения боевых действий для всех законопослушных граждан этой страны и ради нашего будущего, ребята.\nВо-первых, если вы видите, что в вашем районе происходит что-то подозрительное: люди собираются в группы, ходят неизвестные лица, всегда сообщайте об этом в полицию или местное ополчение, они здесь для вашей безопасности. Во-вторых, всегда будьте готовы защищать свою собственность, у вас есть поправки к конституции, за которые мы боремся каждый день. Если вы заметите сумасшедшего либерала или экстремиста из движения антифа, который собирается совершить поджог или любой акт общественного неприличия, обязательно остановите его, если у вас есть для этого инструменты. Третье - это может шокировать, но не все либералы толстые или с ужасно окрашенными волосами, некоторые из них могут быть достаточно неприметны, они готовы изменить свою внешность, а те, кто это делает, вероятно, делают это не просто так. Опять же, будьте начеку. И наконец, будьте патриотами, друзья.\n\nА теперь давайте поговорим с нашими сегодняшними экспертами о том, что значит быть американцем..."
 usc.63.a: ""Будьте начеку, патриоты.""
 usc.64.t: "Республиканцы Номинируют Трампа Кандидатом в Президенты"
 usc.64.d: "Президент Трамп произносит мощную речь, принимая кандидатуру на выборах 2024 года.\n\nНесмотря на шокирующее предательство американских ценностей бюрократами из глубинного государства, наша нация и наша демократия должны продолжать существовать, как сказал президент во время своей часовой речи на внеочередном съезде Республиканцев.\nНо, как отметил Дональд Трамп, результаты "выборов" 2020 года должны быть отвергнуты. "Было так много мошенничества," - сказал он, - "что независимо от того, кто на самом деле победил, они должны быть отвергнуты и отброшены."\nРеспубликанская партия согласилась с этим. Майк Джонсон, нынешний председатель Республиканской партии, подписал заявление вместе с другими высокопоставленными партийными чиновниками. В заявлении говорилось о полной реструктуризации Республиканской партии, которая начинается с аннулирования результатов фальшивых «выборов».\n\nЭто позволило нашему президенту вновь баллотироваться в 2024 году при подавляющем большинстве положительных голосов всех делегатов Республиканцев, присутствующих на съезде.(...)\n\n"Самое главное, люди, я никогда не перестану бороться", - сказал президент Трамп в своей речи. "Ради вас, ради ваших семей. Как только мы разберемся с этими людьми - а они ужасные, ужасные люди, - которые вызвали столько кровопролития, мы восстановим нашу великую страну, как никогда раньше. Это будет величайшим достижением нашего движения - Make America Great Again."\nВ своем заключительном слове Дональд Трамп заявил, что настоящие американцы никогда не сдаются.\n\nОнлайн-комментарии были полны похвалы и удивления по поводу твердой воли и смелых обещаний президента."
 usc.64.a: "Боже, благослови Америку"
 usc.65.t: "Будущее Демократов"
 usc.65.d: "После разрушения фальшивой Америки "Глубинного Государства" и нашей грандиозной победы над продажными демократами все еще остается вопрос о том, каким будет будущее демократов.\n\nС одной стороны, внутри демократического истеблишмента всегда есть более здравые голоса, которые тоже всегда подавлялись, как Мэнчин и Синема. С ними обошлись очень несправедливо. Многие люди в нашей стране мечтают о возвращении к здравомыслящим умеренным демократам, которые не ставят безумные идеологии выше нашей страны. Конечно, никто из демократов не сможет оправиться от позорного прошлого в течение некоторого времени, но, знаете, хотя бы так они могут помочь.\n\nТакже есть Бобби Кеннеди-младший - нашему президенту очень нравится этот парень - он полностью разочаровался в демократической машине, говорит, что пути назад нет. Партия слишком коррумпирована. Но он очень рад, что будет работать на нас в администрации Трампа - как независимый, он не хочет присоединяться к Республиканцам, говорит, что у него "другие планы". Очевидно, он придерживается экологических взглядов на бурение для интенсификации скважин, но мы сможем что-нибудь придумать."
 usc.65.a: "В каждом демократе есть что-то хорошее. Поверьте мне, я был одним из них!"
 usc.65.b: "Бобби, иди сюда! Ты отлично справишься, но нефть оставь мне!"
 usc.66.t: "Либертарианская Партия Одобряет Наше Правительство"
 usc.66.a: "У американских либертарианцев всегда были неспокойные отношения с республиканцами, но, похоже, по крайней мере, часть независимых либертарианцев присоединяется к настоящему и легитимному правительству Америки.\nАнджела МакАрдл, нынешний глава ЛП - довольная текущей политикой, официально поддержала Дональда Трампа и организовала свою партию, чтобы начать работать в нашей избирательной и политической системе. Сама она входит в крупную на данный момент фракцию внутри ЛП - Фракция Мизес. Эта фракция продвигает, только послушайте - палеолибертарианство и фьюжн, а также более консервативную версию американского либертарианства, связанную с президентскими кампаниями бывшего конгрессмена США Рона Пола. Его сыну Рэнду это точно понравится.\n\nПрезидент Трамп уже поддержал это развитие на своем аккаунте Truth.Social, заявив: "Приятно видеть, что настоящие патриоты выбирают ПРАВИЛЬНУЮ сторону в борьбе за АМЕРИКУ. Мне всегда нравились либертарианцы, они замечательные. Поговорил с мисс МакАрдл, очень приятная женщина, вместе мы многого добьемся и сделаем АМЕРИКУ ВЕЛИКОЙ!"\nОфициальный аккаунт ЛП уже перепостил заявление президента с их собственной версией лозунга - "СДЕЛАЕМ АМЕРИКУ СНОВА СВОБОДНОЙ!""
 usc.66.a: "Либертарианцы? Я люблю своих либертарианцев!" 
 usc.67.t: "Кеннеди создает партию Мы - Народ"
 usc.67.d: "Роберт Кеннеди-младший собрал своих сторонников у здания столицы, чтобы объявить о создании собственной политической партии "Мы - Народ." По его словам, цель новой партии - "чтобы все голоса были услышаны" и "привнести в Америку больше мнений." Он призвал всех независимых политиков, ищущих место вне раскола в Республиканской партии, присоединиться к его инициативе.\nНесмотря на ажиотаж вокруг этого заявления, Кеннеди также похвалил Дональда Трампа за то, что тот позволил ему и его сторонникам мирно выразить свои намерения восстановить "американский обмен идеями"\n\nКеннеди сказал, что лично беседовал с Трампом и был очень рад услышать, что президент согласился с его идеей.\nНо Трамп все же сделал замечание: "Помни, Бобби, ты должен придерживаться здравого смысла, хорошо? Никакого безумия, никаких глобалистских тезисов, ты знаешь, о чем я." В ответ Кеннеди полностью отрекся от безумных идеологий крайнего либерализма и заявил, что его новая организация - это "здравый смысл политики.""
 usc.67.a: "Бобби! Мы любим Бобби!"
 usc.68.t: "Арест Ника Фуэнтеса становится смертельным!"
 usc.68.d: "Вторая гражданская война в Америке то и дело становится источником странных историй, и сегодняшняя ничем не отличается.\nНиколас Джозеф Фуэнтес был известен как политический деятель и активист, который, несмотря на то, что был латиноамериканцем, исповедовал симпатии и убеждения белых супремасистов. \n\nВ начале гражданской войны он попытался завоевать влияние на нашей территории, объединив ультраправые элементы, но после нескольких неудачных попыток и избиений скрылся в дешевой квартире, чтобы распространять свои идеи в Интернете. В конце концов он совершил ошибку, оскорбив и угрожая президенту Трампу, что вызвало тревогу властей.\nМестные власти смогли определить его местоположение и быстро задержали его, когда он пытался пересечь канадскую границу. В приступе паники он попытался выхватить, казалось, огнестрельное оружие, но после того, как в него выстрелили по меньшей мере девятнадцать раз, местная полиция быстро сообразила, что это был перцовый баллончик.\n\nМестные власти заявили, что, несмотря на инцидент, многие интернет-сообщества выразили облегчение по поводу случившегося, поскольку в сети появляются новые утечки о его поведении.\n\nДональд Трамп никак не прокомментировал случившееся, но сообщения о том, что он ухмылялся при виде этой новости, слишком часты, чтобы считать их слухами."
 usc.68.a: "Гройпер? Я едва знал ее!"
 usc.69.t: "Тулси Габбард и Ее Видение"
 usc.69.d: "Тулси - какой боец, нет, буквально - она солдат США, очень хороший солдат. Она всегда была, знаете ли, немного странной, потому что она левая.\nПослушайте, я со всеми лажу, - посмотрите на опросы, я вместе с прогрессивистами и левыми, или теми, кого можно считать левыми. Такер говорит, что они нам пригодятся, есть много людей, которые хотели бы, чтобы их голос был услышан. Любой, кто любит Америку, хорош в моей книге... Кстати о книгах, моя книга - "Искусство Сделки", и я думаю, мы можем заключить сделку; если ты левый популист, ты все равно американец - всё просто, как Берни, но он заключил сделку с дьяволом и крупно проиграл. Тулси заключила сделку со мной, она победитель, а я люблю победителей.\n\nМы можем сделать ее де-факто лидером для них, представьте себе комментарии: "Популисты - объединяйтесь чтобы СДЕЛАТЬ АМЕРИКУ СНОВА ВЕЛИКОЙ!", какой отличный лозунг.\nМэтт также говорил о Лине Хан, слышал, что она проделала огромную работу по борьбе с монополиями - а мы не любим монополии - они разрушают свободную рыночную конкуренцию, мы оба можем выиграть.\nЕдинство - вот что такое MAGA, мы можем сделать так много, если объединимся, люди, разногласия только делают это более веселым."
 usc.69.a: "Тулси! Собирай своих людей, нам нужна коалиция популистов!"
 usc.69.b: "Габбард следует удвоить внимание к своей государственной должности, это принесет больше пользы."
 usc.70.t: "Грубое Пробуждение"
 usc.70.d: ""ВЫ СЛЫШИТЕ НАС, МИСТЕР ПРЕЗИДЕНТ?"\n\n"ПРЕЗИДЕНТ ТРАМП СЛЫШИТ НАС!"\n\n"НАШ ПРЕЗИДЕНТ ДОЛЖЕН СЛУШАТЬ СВОЙ НАРОД!"\n\nТы просыпаешься от минутной дремоты на своем столе. Вокруг тебя бумаги, документы - любимое лакомство книжных червей: статьи, законопроекты, предложения, инициативы, которые ни к чему не привели - СКУКОТИЩА. Вещи, которые ты когда-то презирал, потому что они мешали твоим обещаниям, но теперь ты живешь с этим.\nТы больше не чувствуешь такого тепла от своих людей, как раньше; ты им нравился, конечно, но не так, как ты хотел; раньше - это была преданность, теперь - это такой же рейтинг одобрения, как у Рейгана.\nЭти карандашные гниды называют вас своим "образцовым республиканским президентом" - безопасным человеком для них. И все же вы находите утешение в их фальшивых улыбках и холодных рукопожатиях - возможно, некоторые из них даже искренние.\nВ конце концов, это они держат вашу власть, а не деревенщина Джо или его жена Кейт, которым ты обещал золотые ворота и воду, вкусную как вино. Они все еще будут терпеливо ждать того, что было отменено еще на слушаниях в комитете.\n\nОни рисовали твои портреты на своей коже, поражали любого, кто "предавал" тебя или выступал против тебя. В конце концов, ты предал их, но они до сих пор этого не заметили. Не лев - но, по крайней мере, прозвище Тефлон тебе подходит."
 usc.70.a: "Полное выгорание." 
 usc.71.t: "Король МАГА"
 usc.71.d: ""ВИВА ТРАМП! ВИВА ТРАМП! ВИВА ТРАМП!"\n\nЯркие огни окутывают вас, когда вы принимаете аплодисменты толпы - какие громкие хлопки. Иногда трудно начать говорить, когда все скандируют. В воздухе столько любви - к тебе, к Америке, к МАГА. Твой народ - самый благодарный в истории, а может, и во все времена. Вся эта тяжелая работа: снижение налогов, антимонопольное регулирование, спасение шахтеров - все это окупилось.\n\nКонтроль над бюрократией больше не кажется бесплодной борьбой. Пусть они жалуются и ноют, что ты "слишком агрессивен" и "напорист", говоря, что ты используешь исполнительные приказы, чтобы добиться своего. Это именно то, чего мы хотим, - добиться результата! Их графики и фальшивые эксперты ничего не значат, когда НАРОДНАЯ ВОЛЯ - то, что заставляет тебя двигаться вперед.\nПо всей стране они болеют за тебя и ищут лазейки, чтобы удержать тебя у власти - возможно, на всю жизнь. Эрик и Дэн говорят, что если статистика верна, то ты настолько популярен, что даже если бы Джордж Вашингтон и Авраам Линкольн восстали из мертвых и участвовали бы в выборах, они не смогли бы победить тебя. Никто не смог бы.\n\nТвой народ называет тебя "Львом Америки", и ты примешь этот титул. Может быть, во время этой речи? Это было бы хорошим началом."
 usc.71.a: ""...Люди, некоторые называют меня "Лев", как вы думаете, мне это подходит?""
 usc.72.t: "Образование Народной партии"
 usc.72.d: "Месяцы организаторской работы привели этих истинных и честных патриотов к вершине - созданию партии. Очень трогательно. Тулси отлично справляется со своей работой - защищает права простых людей, как и ты! Но по-другому... больше... благосостояния.\n\nНародная партия будет действовать как единый центр для всех левых популистов, которые поддерживают ваше правительство. Ник Брана - сопредседатель партии, который провел свое политическое время в неактуальности, пытаясь привлечь Берни к борьбе против дуополии, наконец-то стал актуальным."
 usc.72.a: "Потрясающая работа, Тулси!"
 usc.73.t: "Движение Ультра-МАГА Набирает Обороты"
 usc.73.d: "По мере того как президент Трамп становится все более милитаристским, некоторые из его сторонников видят в этом часть его плана по окончательному прекращению влияния антиамериканского глубинного государства и его сторонников. Они называют себя "УЛЬТРА-МАГА" и "Qanon" и организуются для поддержки радикальных действий президента, чтобы заставить либералов замолчать.\n\nВсе началось с анонимных онлайн-плакатов, утверждающих, что они знают о вещах за закрытыми дверями. С 2017 года более радикальная версия движения МАГА набрала силу, а с неожиданным поворотом нынешней ситуации они начали работать более открыто.\n\nПрезидент никак не комментирует организационные мероприятия, проводимые его бурными сторонниками. Однако в разное время он высказывал опасения по поводу "радикализма" внутри своей базы. Он сказал, что это не более чем либеральный тезис и что каждый сторонник Трампа - "очень хороший патриот.""
 usc.73.a: "Очень прекрасные люди!"
 usc.74.t: "Возвращение Распутина Трампа"
 usc.74.d: "После ПОЛНОГО ПРОВАЛА Маленького Томми и его банды "Голубых Говнячков" все разумные националисты возвращаются в наше правительство. Как замечательно!\n\nСреди этих вернувшихся - Стив Бэннон, старый знакомый Трампа. Он уже восстановил всю свою вещательную деятельность и говорит, что Маленький Томми был позором.\nТут всегда есть место для прощения. Стив жесток и умен, а Америке нужны люди с такой патриотической энергией. Не только ему, но и его популизму. Миллер тоже вернулся - такая суперзвезда.\n\nНа протяжении многих лет либеральные фейковые СМИ провозглашали Бэннона вашим "тайным мозгом", разработчиком политики, даже после того, как вы его уволили. Вы скучали по ночным беседам с ним. "Сэр, вы доказали, что подходите для этой работы", - говорит он вам. "Я был глупцом, сомневаясь в вас". Все в порядке, Стив, мы все совершаем ошибки. А теперь давайте поговорим о бизнесе."
 usc.74.a: "С возвращением, партнер."
 usc.75.t: "Выдвижение Кандидата в Президенты от Республиканцев"
 usc.75.d: "Тысячи телезрителей прикованы к экранам, поскольку Республиканская партия официально начинает процесс выдвижения кандидатов в президенты. В ходе этого процесса политики-республиканцы будут бороться за президентское кресло, пытаясь склонить на свою сторону избирателей и делегатов.\n\nОни будут участвовать в дебатах, интервью и митингах, чтобы повлиять на процесс голосования. В этом году процесс выдвижения кандидатов был особенно напряженным: более десяти кандидатов со всей страны боролись за различные должности. Аудитория дебатов FOX News очень довольна и весела. Необычный стиль дебатов Трампа теперь имитируется другими ораторами, которые все, за исключением некоторых исключений, делают грубую версию его взглядов и политики.\n\nНа пост президента претендуют самые разные люди, как молодые, так и пожилые. Однако победителем станет только один.\n\n[USC_trump_third_term_text]"
 usc.75.d1: "...И это будет Дональд Джей Трамп. После того как он успешно отменил 22-ю поправку и продемонстрировал готовность баллотироваться на третий срок, он наверняка получит полную поддержку.\nНа самом деле, остальные кандидаты здесь только для того, чтобы поддерживать демократический облик нашего правительства. Большинство из них здесь для того, чтобы поднять свое имя к следующему избирательному циклу. Один за другим они становятся в один ряд и поддерживают Трампа на посту президента или его программу."
 usc.75.a: "Трампа на Третий Срок, вперед!"
 usc.75.b1: "Джей Ди Вэнс сумел покорить американцев своим обаянием."
 usc.75.b2: "Прагматизм и правильные слова Марко Рубио привлекают людей."
 usc.75.b3: "Рон ДеСантис побеждает благодаря своей непреклонной личности."
 usc.75.b6: "Жёсткая риторика Мэтта Гейтца принесет ему победу в президентской гонке."
 usc.75.b4: "Красноречие Карлсона привел его на президентский пост."
 usc.75.b6: "Неизменная любовь Майка Джонсона к ИЗРАИЛЮ завоевала ему сердца миллионов ЕВРЕЕВ."
 usc.75.b7: "Сильная любовь Вивека к Трампу обеспечивает ему голоса избирателей."
 usc.75.b9: "Кэри Лейк Побеждает в Номинации."
 usc.75.b8: "Байрон Дональдс Побеждает в Номинации."
 usc.75.j: "Красноречие Карлсона привела его на президентский пост."
 usc.75.c1: "Годы упорной службы Рэнда Пола помогли ему победить на выборах."
 usc.75.c2: "Сара Пэйлин наконец-то получила шанс блеснуть."
 usc.75.c3: "Илон Маск побеждает в номинации."
 usc.76.t: "Текущий президент получает номинацию"
 usc.76.d: ""
 usc.76.a: "Невероятно."
 usc.77.t: "Инаугурация Нового Президента"
 usc.77.d: "Ух ты, какая толпа! Конечно, не такая большая, как у тебя, но все равно впечатляет.\nТы передаешь бразды правления этой великой страной кому-то новому. Это странное чувство. Ты так привык к креслу власти, но теперь пришло время отпустить его.\nТысячи людей пришли посмотреть, как новый президент принимает присягу. И все же они продолжают восхвалять твоё имя. Ты дал им шанс проголосовать за того, кого они действительно хотели, а не за неудачников вроде Митта или Маккейна - бедный мертвый ублюдок, если бы только он мог увидеть Америку сейчас, он бы умер снова!\n[USC_inaguration_dynamic_text]\n\nПрезидентство Трампа может закончиться, но франшиза под названием "Эра Трампа" еще далека от завершения.\n\nСвет, камера, мотор! Да начнется второй сезон!"
 usc.77.d_trump_kid: "И вот они здесь, твои родные, которые будут продолжать служить этой великой нации. Конечно же, с помощью своего патриарха. Их речь - не что иное, как живая легенда о тебе и твоих деяниях. Как очаровательно!"
 usc.77.d_normal: "По мере того как они произносят клятву и начинают свое обращение, ты понимаешь, что, несмотря ни на что, ты одержишь победу в этой новой Америке. Их слова - не что иное, как празднование тебя и твоих достижений."
 usc.77.a: ""Торжественно клянусь...""
 usc.78.t: "Выбор Вице-Президента"
 usc.78.d: ""
 usc.78.a1: "Антони Керн!"
 usc.78.a2: "Джек Пособец!"
 usc.78.a3: "Марк Финчем!"
 usc.78.b1: "Тим Скотт!"
 usc.78.b2: "Томми Табервилл!"
 usc.78.b3: "Гленн Янгкин!"
 usc.78.c1: "Томас Масси!"
 usc.78.c2: "Крис Райт!"
 usc.78.c3: "Нэнси Мейс!"
 usc.79.t: "Кандидат Трамп Выбирает Президента Трампа"
 usc.79.d: "Как и ожидалось, но до сих пор остается беспрецедентным в американской политике, кандидат в президенты от Республиканцев, один из детей Трампа, выбрал своего отца в качестве официального помощника.\n\nВ официальном заявлении они сказали: "Нет лучшего человека, чем тот, кто так дорог всем патриотическим семьям Америки. Он показал, что заботится об этой стране больше, чем часто заботится о себе, отдавая все силы, чтобы СДЕЛАТЬ АМЕРИКУ СНОВА ВЕЛИКОЙ(...)"\n\nВ то время как радикальные сторонники Трампа и простые люди приветствуют эту ситуацию, видя множество преимуществ в том, что у власти находятся сразу два Трампа, либеральные СМИ, которые редко попадают в поле зрения общественности, утверждают, что это создает "полную диктатуру." Они говорят, что дети Трампа - лишь "инструмент" для их "жаждущего власти отца и его амбиций"\n\nДаже многие конгрессмены и республиканцы, лояльные Трампу, указывают на возможную незаконность таких лазеек и предупреждают, что слишком долго оставаться у власти нельзя. Однако лазейки существуют не просто так, и даже общество, настроенное в пользу Трампа, разделилось по этому вопросу."
 usc.79.a: "Два Трампа - Двойное Величие!" 
 usc.80.t: "Портрет Президента"
 usc.80.d: "Кто такой Дональд Джей Трамп? Многим трудно определить истинные и честные черты характера нашего президента. Благодаря его нестандартному характеру и непредсказуемому поведению, кажется, что разные группы его сторонников сформировали свое собственное представление о Трампе.\n\nДля многих он - миллиардер из народа, настоящий бизнесмен из "синих воротничков". Несмотря на его экстравагантные траты и хвастовство своим богатством, именно это привлекает к нему людей. В отличие от руководителей корпораций из Нью-Йорка, он ведет себя как обычный американец, только что заработавший миллион долларов, - с золотыми тарелками, именами на всем, что ему принадлежит, и привлекательными женщинами. Это человек, который не стыдится своего богатства, но при этом всегда рад помочь рабочему парню.\n\nОн еще и мачо. Трамп в одиночку может решить многие проблемы, он берет все вопросы в свои руки и разбирается с ними досконально. Ему не нужны хромоногие бюрократы или юристы с карандашными грифами, чтобы утомлять его графиками и статистикой - если что-то не так, это должно быть исправлено сейчас. Он - абсолютный поборник силы, и часть американского народа очень долго ждала появления такого лидера. Если кто-то встанет у него на пути, он просто скажет: "Вы уволены!"\n\nВ конечном счете, Трамп - воплощение американской мечты. Для его сторонников он - единственный человек, который правильно понимает капитализм. От торговых сделок до дерегулирования - никогда еще не было лучшего президента для бизнеса. Его аура излучает успех, Трамп - провидец капитализма, маг бизнеса, мудрец зала заседаний, живая конфета, каждый шаг и слово которой - авторитет, опыт и власть. "
 usc.80.a: "Миллиардер - президент народа... Да, я выступаю за среднестатистического парня."
 usc.80.b: "Я самый большой мачо-президент Америки - ЗА ВСЁ ВРЕМЯ!"
 usc.80.c: "Да, я провидец капитализма... С бесконечным количеством денег."
 usc.81.t: "Новая Партия для Новой Америки"
 usc.81.d: "Республиканская партия больше не эффективна. Им не хватает решимости, и они не могут ничего добиться. Пришло время ввести компетентное руководство и создать партию, которая действительно представляет Америку и ее граждан.\n\nПосле недавних организационных изменений Кен Пакстон, нынешний председатель Республиканской партии, официально объявил о полном ребрендинге партии.\n\nВ официальном заявлении он сказал: "Республиканская партия хорошо служила американскому народу, но слишком долго внутренние проблемы были источником беспокойства для этой великой партии. После тщательного обдумывания и с одобрения президента партия начинает путешествие, чтобы превратиться из партии слабовольных республиканцев в партию решительных патриотов"\n\nБренд - это очень важно. Дональд Трамп хорошо это знает. Знаете, "Как корабль назовешь, так он и поплывет."  - знаменитая цитата и все такое. Люди должны сразу понять новую партию, и название - первый шаг к этому. Так много вариантов на выбор, и Дэн говорит, что все они хороши. Но мы не можем использовать все из них, потому что это будет звучать как одно из названий партии коммуняк. Нам нужно что-то простое и эффективное."
 usc.81.a: "Все дело в единстве... Единство - это так важно. Одна нация под Богом."
 usc.81.b: "Мы любим нашу Конституцию. Не так ли, люди? Главный столп нашего Союза."
 usc.81.f: "Я патриот, а не глобалист. И будущее принадлежит патриотам."
 usc.81.c: "Мы популисты. Мы так много дали нашему народу. Бэннон прав."
 usc.82.t: "Выбор Сторон"
 usc.82.d: "Руководить коалицией, которая больше, чем сама жизнь, -  это такая морока, но особенно её создание. После "ребрендинга" Республиканская партия полностью присоединилась к нам и объединилась, и встал вопрос: кого ещё пригласить в MAGA-сферу? Мы, конечно, очень гостеприимная компания, мы любим всех, кто нас НЕ ненавидит.\n\nМэтт -  какой парень, он ходит и говорит, как сильно мы должны уважать наших работников -  лучших работников, поверьте мне. Есть даже организация для настоящих патриотов из рабочего класса под названием "Лига американских рабочих" -  милое название. Они похожи на профсоюзы, но лучше: никакой коррупции, никаких марксистских идей, только чистые интересы наших трудолюбивых рабочих.\nНо сотрудничество с такой организацией может навредить нашим отношениям с крупным и могущественным бизнесом, а мы бы этого не хотели! С другой стороны, Сакс -  очень богатый и продвинутый парень, он говорит, что будущее за настоящей американской Кремниевой долиной, и за умными людьми -  такими, как Илон и он сам, а также за кучкой индийцев по какой-то причине. Они очень сильно поддерживают MAGA-Tech, знаете ли. Мы можем использовать их мозги -  и их мешки с деньгами, или СЭКИ с золотом, каламбур.\n\nГораздо более надёжная ставка -  независимые, или беспартийные, как их иногда называют. Они годами пытались попасть в большую политику. Но однопартийная система была такой несправедливой, и всё, чего они хотели, -  это решить свои местные проблемы, ничего серьёзного. Это мало что изменит, но они даже не планируют этого делать. Что ещё важнее, они не причинят вреда."
 usc.82.a: "Рабочие -  они любят то, что мы делаем, всегда верны MAGA, с самого начала."
 usc.82.c: "Технари - умные люди, они нужны нам рядом."
 usc.82.b: "Давайте просто перестрахуемся, поддержим парней без ярлыков."
 usc.83.t: "Короли и Их Башни"
 usc.83.d: "Союз потерпел поражение, как и их главные спонсоры и кукловоды.\nТолько посмотрите на них, они прячутся в своих больших зданиях и штаб-квартирах, боясь того, что с ними сделают новые власти MAGA. Есть множество способов, которыми мы можем отомстить им за цензуру, коррупцию и распространение радикальной коммунистической чепухи, которую они распространяли.\n\nМы можем конфисковать их активы, заморозить их счета, ликвидировать их компании и использовать все эти деньги для финансирования новых американских предприятий, выплаты зарплат рабочим и среднему классу или для улучшения социального обеспечения -  неважно, что именно. Послание будет ясным: эра транснациональных корпораций в Америке закончилась. Если они захотят уйти, то могут переехать в Европу, где русские могут делать с ними всё, что захотят.\n\nВ качестве альтернативы мы можем использовать их. На них так легко повлиять и показать им, кто теперь настоящий босс. DC больше не будет выполнять приказы из Корпоративных башен, всё будет наоборот. В конце концов, все эти компании -  Microsoft, META и Apple -  являются частью Америки, как и яблочный пирог. \nКонечно, они могут потребовать каких-то дивидендов, но администрация MAGA известна своими БОЛЬШИМИ мечтателями, и их у них много."
 usc.83.a: "Теперь это страна MAGA, нам не нужны эти глобалисты."
 usc.83.b: "Лояльные корпорации - это то, что нам нужно, у них есть деньги, у них есть работа."
 usc.83.c: "Заставьте их принять MAGA. Дело не только в деньгах, речь идёт о новой эпохе."
 usc.84.t: "Взгляд изнутри на Празднование Трампистов"
 usc.84.d: "ИЗ: INDEPENDENT PRESS WEBSITE\nАвтор: Джей Фергюсон\n\nЯ прибыл в лагерь ополченцев за пределами Топики перед самым рассветом. С шоссе невозможно было не заметить палатки, сцену, ревущие костры и ряды пикапов под бесчисленными американскими флагами. В воздухе витала смесь дыма от барбекю и бензина. Кантри-рок, рев моторов и треск выстрелов создавали ощущение, что это наполовину вечеринка, наполовину зона боевых действий.\nКак только я вошел в толпу, группа мужчин, опирающихся на свои грузовики, оценила меня. Один из них, бородатый парень в зеркальных солнцезащитных очках и с AR-15, взглянул на мой блокнот. "С прессы?" - осторожно спросил он. "Не фальшивые новости, верно?" Я пожал плечами. "Просто пришел посмотреть, что вы из себя представляете," - сказал я. Он мгновение изучал меня, а потом усмехнулся. "Да, черт возьми! Заходи, бери пиво, и мы расскажем тебе настоящую историю."\n\nОни усадили меня на раскладной стул и протянули мне холодную банку пива. Бородатый мужчина наклонился ко мне. "Трамп - единственный, кто не отвернулся от нас. Мы рвем свои задницы, а что получаем? Рабочих мест нет, нелегалы повсюду, а политики богатеют. Трамп - единственный, кто боролся за нас. К черту ограничения сроков - Трамп навсегда!" Его друзья поддержали его громким "Да, черт возьми!"\n\nКаждый раз, когда я пытался осмотреться, кто-то останавливал меня, чтобы поделиться своей историей. Жена бородатого парня, жующая грудинку в красном балахоне MAGA, помахала мне рукой. "Бери тарелку, пока все не кончилось!" - позвала она, наваливая на тарелку много еды. Пока я ел, она наклонилась ко мне. "Я не всегда была политична," - сказала она. "Но потом моя сестра подсела на обезболивающие. Они все время говорили, что помощь придет, но ее так и не было. Тогда-то я и поняла - им плевать на таких, как мы. Но Трамп? Он говорит о том, о чем никто другой не скажет. Я буду с ним до конца."\n\nК тому времени, как лидер ополчения вышел на сцену, толпа уже была заряжена. Его голос гремел над пожарами, когда он достиг кульминации своей речи: "Теперь это Америка Трампа! Он борется за нас, за наши семьи! Глубинное государство хотело свалить его, но мы не отступим! Трамп навсегда!" Толпа взорвалась, размахивая флагами и скандируя имя президента.\n\nПосле окончания мероприятия Гэри сказал мне, что я "один из хороших," и настоял на том, чтобы я нашел его на Facebook. Идя обратно к машине, затягивая пояс от грудинки и пива, я размышлял об увиденном. Эти люди не были изысканными или утонченными, но их преданность была настоящей. При всей их браваде они были теплыми, гостеприимными и стремились поделиться своей верой в человека, который, по их мнению, спасет Америку, оставившую их позади."
 usc.84.a: "Нет пределов, нет пути назад." 
 usc.85.t: "Золотые Арки"
 usc.85.d: ""Макдоналдс" в Фарго знавал и лучшие времена. Теперь там не было ни одного столика на улице, а картофель фри выдавали порциями. Гриль по-прежнему шипел, фритюрница по-прежнему шипела, а персонал каким-то образом продолжал работать.\n\nСнаружи нарастал низкий гул. На гравийную парковку въехали чёрные внедорожники, и двери открылись, выпуская самого Дональда Трампа с широкой улыбкой на лице. "Прекрасное место, ребята. Прекрасно," заявил Трамп, и его голос эхом отразился от выцветших кафельных стен, словно он был хозяином комнаты. "Лучший 'Макдоналдс' в Южной Дакоте, а может, и на всем Среднем Западе. Поверьте мне, я видел их все." Управляющий, пожилой мужчина с жирными пятнами на фартуке и глубокими морщинами под глазами, прошаркал вперед. "Господин Президент... добро пожаловать. Это большая честь, правда." Трамп крепко пожал ему руку. "Нет, нет. Это честь для меня," сказал он, подчеркивая значение своих слов. "Вы - опора этой страны. Бургеры, картофель фри - это дух Америки. И вы поддерживаете все это. Невероятно." За стойкой молодая сотрудница дрожащими руками пододвинула к ним поднос. У Биг Мака на нем не было верхней булочки, картошки фри было мало, а содовой едва хватало на половину стакана. Трамп схватил его так, словно это было банкетное блюдо. "Это фантастика,"  сказал он непоколебимым тоном. "Даже в трудные времена вы, ребята, справляетесь. Биг Мак; культовый. Исторический. Как и то, что мы делаем.""
 usc.85.a: "Все это вкусно, великая американская кухня."
 usc.86.t: "Хэннити: Коммунизм под судом, Америка ликует"
 usc.86.d: "ИЗ: FOX NEWS - HANNITY\n\nКак вы, возможно, уже слышали, радикальные коммунистические бандиты предстали перед судом. И теперь наша нация может увидеть настоящих красных злодеев -  марксистов, так называемых "демократических" социалистов и анархистов.\nПосмотрите на их лица, и вы не увидите раскаяния в содеянном, только холодные выражения лиц маньяков. Они совершенно не понимают, какие человеческие страдания причинили они и их опасные идеи. Кажется, они сожалеют только о том, что не совершили больше преступлений.\nОдин из наших уважаемых экспертов -  Джойс Мессье -  подсчитала, что количество несправедливо убитых мирных жителей на территориях, контролируемых коммунистическим восстанием, достигло ОДНОГО МИЛЛИОНА, слышите, ОДНОГО МИЛЛИОНА, и это действительно тревожная информация, особенно если учесть, что их головорезы стремились убивать ещё больше!\n\nОдин из этих подонков -  Луиджи, кажется, так его звали, -  безумно кричал, когда его тащили в здание суда: "Мы недостаточно убивали!" Смотрите.\n\n----\n\nЭто тревожит. К счастью, наша страна больше не будет страдать от их безумия. Президент Трамп и наши отважные патриоты спасли нашу страну от этой угрозы. Как и Рейган. Однако на этот раз всё было ещё опаснее и страшнее, но мы справились.\nМы всегда будем помнить о преступлениях, совершённых радикальным социализмом, и будем оплакивать его жертв.\n\nЭто шоу Шона Хэннити, и мы вернёмся после этой короткой паузы."
 usc.86.a: "Эй Краснопузый, ты СДОХ!" 
 usc.87.t: "Карлсон: Коррумпированная Машина Демократов"
 usc.87.d: "ИЗ: FOX NEWS - TUCKER CARLSON TONIGHT\n\nПривет! Добро пожаловать в "Такер Карлсон сегодня вечером."\nГлавная тема этой недели очевидна, и я знаю, что вам не терпится её обсудить. Коррумпированные демократы предстанут перед судом за все свои действия.\nИх преследуют не только за ужасное восстание и другие преступления, совершённые ими в этот период, но и за то, что они не оставили безнаказанным ни одно преступление. К ним относятся коррупция, саботаж конституции, цензура и политика, направленная против американского народа в целом.\n\nВот их главная тройка, если так можно сказать: Нэнси Пелоси, которая едва может ходить, Чак Шумер, который всё ещё выглядит как придурок, и Хантер Байден, который выглядит относительно свежим, вероятно, он просто не может закинуться кокаином в своей камере.\n\nОни могут что-то бормотать, но доказательства уже есть! Наши прокуроры и генеральный прокурор сделал удивительную работу документировать все преступления этого незаконного режима. Давайте взглянем на некоторые из них\n\n----\n\nВау, вот это да! Истинно демократическая мафия.\nМы должны быть благодарны Богу за то, что победили этих злых людей - и не сомневайтесь, они и есть зло.\nМожно рассказать о гораздо большем, что касается мелких дел и судебных преследований, связанных с этими тремя крупными преступниками. После короткой рекламной паузы мы вернёмся с нашим приглашённым экспертом, чтобы обсудить это более подробно."
 usc.87.a: "Конец их линии."
 usc.88.t: "Уоттерс: Мошенники Из ФБР Будут Посажены В Тюрьму"
 usc.88.d: "ИЗ: FOX NEWS - JESSE WATTERS PRIMETIME\n\nС вами Джесси Уотерс с последними новостями: "Террористы "Патриотического фронта" предстанут перед судом".\nДа, вы не ослышались. Лидеры так называемого "Патриотического" фронта прямо сейчас находятся в тюрьме. Это отличная новость!\nЭто не только опровергает старые и надоевшие либеральные обвинения в "фашизме" MAGA, но и кладет конец крупнейшей операции по отмыванию денег в истории Глубинного государства.\nЧестно говоря, ребята, неужели кто-то действительно верит, что эти "националисты," которые носят белые маски и являются отъявленными расистами, появились из ниоткуда? Очевидно, что здесь не обошлось без вмешательства ФБР.\n\nПосмотрите на этого парня! Вы видите главаря этих дисквалифицированных федеральных агентов - Томаса Руссо, или, как его назвал президент Трамп, "Маленький Томми!"\nОн выглядит довольно устрашающе, этот парень -  Маленький Томми. Ему нечего сказать в свою защиту, все карты на столе -  он возглавил жестокое восстание не только против законного правительства, но и против американской демократии в целом. И теперь его и его друзей без масок посадят в тюрьму.\n\nЯ не знаю, что заставило Томми напасть на тех, кто его кормил, - на демократов. Возможно, это было просто недоразумение или что-то в этом роде. Мы обсудим всё это подробнее с нашими экспертами. Увидимся после этой короткой рекламной паузы!"
 usc.88.a: "Маленький Томми в большой камере."
 usc.89.t: "Готовы Ли Вы К Бою?"
 usc.89.d: "Толпа, собравшаяся перед трибуной, была большой и состояла в основном из солдат, только что вернувшихся с передовой. Считалось, что им нужно поднять боевой дух, и поэтому им собирались дать самое действенное средство для поднятия боевого духа - речь.\n\n"Думаете, Трамп будет говорить? Вот напишу родным не поверят!" Тони, новобранец, сказал, приставая к своему другу Рону, который был старше него\n\n"Сомневаюсь, что они подпустят его так близко к фронту, особенно с учётом всех этих авиаударов." ответил Рон\n\nВскоре ропот толпы стих, когда на сцену поднялся человек. Он был стар, но в хорошей форме, в красной майке и бандане. На лице у него были, как решил Тони, самые уродливые усы, которые он когда-либо видел. Тони не знал, кто этот парень, но многие в толпе начали аплодировать. Он решил спросить Рона.\n\n"Ты шутишь? Это Халк Хоган! Величайший рестлер!" Воскликнул Рон, ведя себя скорее как ребенок, чем как мужчина его возраста. Прежде чем Тони смог заговорить снова, Халк начал свою речь.\n\n"Фанаты Трампа," начал он, "вы готовы к тому, что сейчас произойдет?" Он продолжил. Тони забеспокоился, что бы это могло быть...\n\nЗатем Халк Хоган сорвал с себя футболку, под которой оказалась другая, с американским флагом и Дональдом Трампом. Толпа сошла с ума, но Тони все равно не понял ажиотажа, но всё равно поддержал толпу. Тони почти ничего не слышал из-за всех этих радостных криков, но насколько же популярен был этот парень?\n\nК тому времени, как старый борец покинул сцену, вся толпа возбуждённо переговаривалась. Казалось, что ужасы войны были забыты, пусть и на мгновение. Тони тоже на мгновение забыл о войне, но скорее от растерянности, чем от благоговения. Поэтому, пока Рон рассказывал о старых боях, Тони не мог перестать думать об этих усах."
 usc.89.a: "ПОТРЯСЯЮЩЕ!" 
 usc.90.t: "За Америку!"
 usc.90.d: "Сцена была хаотичной, но контролируемой, поскольку тысячи патриотов, одетых в псевдовоенную и камуфляжную форму, толпились перед сценой в ожидании речи спасителя Америки. Небо было серым после нескольких дней ожесточённых боёв в регионе, и местные победы подняли боевой дух самых храбрых американских солдат, которые рисковали жизнью, защищая свою республику. Толпа взревела, когда президент Трамп вышел из военного автомобиля и направился к сцене в чёрном пальто, с характерными светлыми волосами и красным галстуком, слегка обугленными из-за наполненной пеплом атмосферы. Его лицо было усталым и морщинистым из-за постоянно увеличивающегося возраста, а также стресса и напряжения, связанных с руководством страной, как у настоящего патриота. Хорошо вооружённые агенты секретной службы окружили президента со всех сторон, хотя это, вероятно, было самое безопасное место в мире для Трампа, а толпа одобрительно и преданно аплодировала. В толпе развевались флаги MAGA, а солдат было столько, что и не сосчитать.\nТрамп помахал толпе слева направо и поднял руку, призывая к тишине. Аплодисменты почти сразу стихли.\n\n"Соотечественники-американцы," начал он. "воины, патриоты - сегодня мы стоим на пороге истории. Эта война, эта великая борьба - это то, за что на самом деле выступает Америка. И я скажу вам прямо сейчас," усмехнулся Трамп, "это не то, во что хочет заставить вас поверить другая сторона.".\n\nтолпа разразилась радостными возгласами, развевались флаги, лица были полны гордости и решимости. "Старичок Джо.. он где-то там," Трамп крепко держался за трибуну. "Прячется в своем подвале.. он должен быть лидером этой страны, но только посмотрите, во что он её превратил, вы что серьёзно! Этот Лживый Джо и его радикальные левые приспешники. Но мы..."  президент замолчал. "Мы... те, кто победит. Не Глупый Джо и ненавидящая Америку элита. Мы вернём эту страну к величию!"\nСолдаты снова зааплодировали."
 usc.90.a: "MAGA!"
 usc.91.t: "Новый Прикид Республиканской партии"
 usc.91.d: "Несмотря на все реформы и улучшения, произошедшие за эти годы, Республиканская партия по-прежнему является неэффективным институтом. Есть ленивые сенаторы, ничего не делающие республиканцы и "новые республиканцы," которые оставили после себя много негативного наследия. И многие коррумпированные люди продолжают пятнать её и сегодня.\n\nВот почему люди действительно ищут что-то по-настоящему патриотичное. Мы всё ещё можем чтить память Никсона, Рейгана и Линкольна без ярлыка политической партии. Они наверняка это оценят. Изменить целую партию -  непростая задача, но это нужно сделать, чтобы эпоха Трампа перешла в новую фазу. У нас есть несколько вариантов, как представить и преобразовать нашу партию в новую."
 usc.91.a: "Трамп превратил нас в Народную партию."
 usc.91.b: "Трамп превратил нас в Партию патриотов."
 usc.91.c: "Трамп превратил нас в Партию американской нации."
 usc.92.t: "Письмо Хинкла"
 usc.92.d: ""Уважаемый президент Дональд Дж. Трамп, надеюсь, у вас всё хорошо. Меня зовут Джексон Хинкл, я американский коммунист. Но что ещё важнее, я американский патриот.\nПрежде чем вы закончите читать, позвольте мне объяснить мою позицию. Мы поддерживаем вас. То, что вы сделали для рабочего класса этой раздираемой войной страны, невероятно. Вы действительно народный президент. Мы, конечно, как и любая разумная оппозиция, видим недостатки и промахи, но понимаем, что эта нация нуждается в вас и поддерживает вас в своём большинстве.\n\nПосле падения глубоко порочного "социалистического" правительства в Калифорнии мы с товарищами начали объединяться. Нас объединяет идея помогать нуждающимся и строить более сильную Америку.\n\nМоя группа под названием "Коммунисты за Трампа" получила большую поддержку от патриотически настроенных коммунистов. Однако власти неоднократно запрещали нам участвовать в более активной политической деятельности.\nВот почему мы просим вас помочь нам и положить конец незаконному преследованию нашего движения. Патриоты могут работать сообща, чтобы улучшить нашу страну, руководствуясь общим видением."\n\nДалее в статье говорится о том, как создать "настоящий американский социализм" или что-то в этом роде. Ты этого не прочёл, но эти ребята интересные.\nКоммунисты за Трампа? Коммунизм MAGA? Ты так популярен, даже красные тебя любят! А рабочие, мы так много для них делаем, но мы можем сделать ещё больше, и они могут помочь..."
 usc.92.a: "В этих парнях что-то есть, но, эй, чем их больше, тем веселее!"
 usc.92.b: "Полная чушь! Коммунизм -  враг Америки, и точка."
 usc.93.t: "Освобождение Наших Героев"
 usc.93.d: "Многие настоящие американцы были заключены в тюрьму при незаконном режиме Байдена. Теперь, когда он пал, мы должны освободить их из этих жестоких тюрем и освободить место для тех, кто действительно заслуживает оказаться за решёткой.\n\nТысячи политических заключённых освобождаются из всех подконтрольных нам тюрем. Некоторые из них лишь выражали несогласие в устной форме и были жестоко подавлены. Однако многие боролись за свои права как американцы, как и подобает настоящим патриотам, и были наказаны за это.\n\nТакие люди не привыкли к мирной жизни. Несмотря на то, что они содержались в жестоких условиях, многие из них уже записались в ополчение или восстановили свой статус солдата. Они очень храбрые. Они становятся лицами нашего движения, страстотерпцами МАГА. К сожалению, некоторые из них не дожили до своего освобождения. Они были замучены и убиты демократическими негодяями. Но наше Министерство юстиции делает все возможное, чтобы вспомнить и собрать доказательства всех несправедливо убитых патриотов и предать гласности преступления Глубинного государства. Они станут мучениками - мученицами новой Америки."
 usc.93.a: "Наша Гвардия Марширует Дальше..."
 usc.94.t: "Ричард Спенсер Казнен!"
 usc.94.d: "Ричард Бертран Спенсер был человеком, который не стеснялся привлекать к себе внимание. Он был одним из организаторов митинга "Unite the Right" и ключевой фигурой так называемых "альт-правых" в 2016 году, однако на этом его выходки не закончились. В разгар предвыборной кампании перед гражданской войной Спенсер отказался от поддержки Трампа и вместо этого поддержал Джо Байдена. Этот шаг вызвал замешательство среди его крайне правых союзников и ещё больше изолировал его, поскольку лагерь Байдена открыто осудил его поддержку.\n\nТеперь, когда гражданская война в самом разгаре, Спенсер попытался влиться в Союз Америки, чтобы продвинуться по карьерной лестнице, но после нескольких случаев жестокого обращения и домогательств на рабочем месте его быстро уволили с низкой административной должности. Похоронив свою карьеру в союзе, он быстро перешёл на сторону Конституционного правительства, где попытался провернуть ту же игру, однако его быстро раскусили, когда стало известно о его роли в союзе и поддержке Байдена до гражданской войны.\n\nСпенсер был арестован и ожидает суда по обвинению в государственной измене. Совершенно очевидно, какая судьба ждёт предателей, независимо от способа, которым они были пойманы. Это стало бы последним гвоздём в крышку гроба карьеры Спенсера.\n\nКогда охрана предложила ему последний раз поесть, он попросил только..."
 usc.94.a: "...'Хороший швейцарский плавленый сыр и обжаренные с луком грибы на бургере.'"
 usc.95.t: "Данное Богом Право"
 usc.95.d: "Трамп был окружён своей пресс-службой, все стремились сделать идеальный снимок, на котором он широко улыбается и показывает большой палец вверх. Бесчисленные винтовки на заднем плане резко контрастировали с образом, который пытался создать президент. В зале царила атмосфера воодушевления, и каждая вспышка камеры на мгновение озаряла его ярким светом, когда Трамп поднимал руки, чтобы привлечь внимание.\n- Мы здесь сегодня, - его голос звучал с преувеличенной искренностью, - потому что нам нужно поблагодарить тех, кто, откровенно говоря, помогает нам в этой борьбе. Наши люди - настоящие патриоты, которые находятся в тылу и следят за тем, чтобы у нас были все необходимые для борьбы инструменты. Поверьте мне, ребята, нашим бойцам достаётся лучшее из лучшего, сделанного прямо здесь!\n\n Он замолчал. Его взгляд скользнул по пресс-службе, прежде чем он быстро повернул голову в сторону прилавка, откуда появился владелец магазина с винтовкой в руках. "Это, господин президент, карабин М4 под стандартный патронник калибра 5,56".\n\n Трамп перегнулся через прилавок и схватил винтовку обеими руками, изо всех сил стараясь удержать тяжелое оружие на весу, прежде чем усмехнуться про себя. Он снова повернулся к камерам, нахмурив брови. "Это действительно тяжело". Он водил взглядом вверх и вниз по длинному ружью: «Это отличное, отличное ружьё, ничего подобного не может быть сделано в других местах, даже радикальными демократами, настолько они неамериканские!»\n\nВ его руках ружьё превратилось в реквизит для импровизированной фотосессии. Трамп принял множество эффектных поз, сначала держа ружьё у пояса стволом влево, затем подняв его вертикально, прислонив приклад к плечу. Наконец, театральным жестом он направил пистолет прямо в объектив камеры, а его самодовольное лицо оказалось прямо за выступающим цилиндром. Казалось, что в комнате все затаили дыхание, пока он целился, но напряжение спало, когда президент опустил винтовку. «Вы не CNN!». «В любом случае, эта винтовка, может, и не позолоченная, но я думаю, что возьму её!».\n\nЛицо владельца магазина озарилось радостью, когда он встретился взглядом с Трампом. Президент, всё ещё держа винтовку в руке, в последний раз повернулся к камерам, наклонив голову вперёд для финального драматического кадра."
 usc.95.a: "И я горжусь тем, что я американец..."
 usc.96.t: "МАГА Кепка - Символ Революции"
 usc.96.d: "Кепка МАГА... красные, белые, черные, они бывают разных форм и размеров. Некоторые из них для детей и взрослых стоят очень дешево, другие выпускаются в ограниченном количестве (с подписью DJT!).\nЭта шляпа стала важной частью вашей предвыборной кампании, затем всего вашего движения и вашего президентства. Это всего лишь простая кепка, но она о многом говорит. Когда кто-то надевает их, он, по сути, кричит: "СДЕЛАЕМ АМЕРИКУ СНОВА ВЕЛИКОЙ". Даже посреди всего этого хаоса ваши люди находят друг друга по этим ярко-красным шляпам.\nВы тоже часто надевали ее - в Белом доме, на митингах, везде. Ношение этой кепки давало вам ощущение, что вы действительно часть толпы - как будто мы все вместе делаем Америку снова великой, шаг за шагом.\n\nЧто все это значит? Ну, Джаред и некоторые другие советники сказали, что кепка МАГА - это что-то вроде современной версии кокарды, которую использовала Континентальная армия. Так вот, они считают, что было бы здорово, если бы президент, как и сам Джордж Вашингтон, мог носить символ этой новой революции. По крайней мере, во всех официальных сообщениях и средствах массовой информации.\nС другой стороны, это испортило бы вашу сногсшибательную прическу, которая сама по себе является важным символом!\n\nНадевать или нет что-то, что ваши поклонники считают таким же важным, как американский яблочный пирог и Вторая поправка, решать вам... Просто помни, что ты не сможешь похвастаться своими потрясающими волосами."
 usc.96.a: "Ладно! Дэн, достань запасы, у меня есть по одной на каждый день недели.!"
 usc.96.b: "Знаете, что на самом деле заводит людей? Я!"

 darkmaga.1.t: "Гнев"
 darkmaga.1.d: "Мне нужны действия. Забудьте о конгрессе - сплошные бездельники, ничего не могут сделать. Покажите меня по телевизору - прайм-тайм, высокие рейтинги. Я объявлю чрезвычайное положение. Моему народу нужна защита - сильная рука для сильного решения. Мне надоело играть в доброту, когда тебя бьют - бей в два раза сильнее, а я - ПРЕЗИДЕНТ, я могу бить так сильно, как захочу.\n\n"Мои соотечественники-американцы, я обращаюсь к вам сегодня, чтобы заявить, что наша нация умирает - как в переносном, так и в буквальном смысле. Война продолжается - кровавая война, и прежде всего нам нужны действия. Я выступаю как гарант вашей безопасности. Именно поэтому сегодня, обладая полномочиями, предоставленными мне нашей священной конституцией, я принимаю закон о военных полномочиях. Не заблуждайтесь, это настоящая война, и я - президент военного времени.\nДолгое время вас, народ, одурачивали и обманывали коррумпированные политики, даже в наших собственных рядах. Но это закончится СЕЙЧАС - время пустых разговоров прошло - наступает час действий...\nПока я остаюсь президентом и пока действует Акт о Военных Полномочиях, я обещаю уважать все свободы в меру своих сил и возможностей. Но нашим врагам, как внутренним, так и внешним, я говорю следующее: вашей отвратительной нечестной игре скоро придет конец.\nМой народ, соотечественники-американцы, ваше время пришло. Давайте сделаем это..."\n\nНа этом кабинет министров распущен, а работа конгресса приостановлена - возможно, навсегда. На данный момент ты - король, стоящий над законом. Используйте эту власть по своему усмотрению."
 darkmaga.1.a: "Я дам своим людям жизнь, которую они заслуживают..."
 darkmaga.3.t: "Приведение в Исполнение"
 darkmaga.3.d: "Это было удивительное зрелище: огромная толпа людей с тревогой смотрела на большие светодиодные экраны, которые вели прямую трансляцию из главного здания суда. Для них это было похоже на шоу, вроде "Ученика", только вместо "Ты Уволен!" - смертная казнь.\n\n"Подсудимые" - онемевшие и слабые, бормочущие свои жалкие слова. Они знали, что это был показательный процесс; возражения не принимались. Все они были заклеймены предателями задолго до его начала - вами в одной из ваших ПРАВДИВЫХ статей.\nОни впадают в истерику, когда судья объявляет их "виновными по всем пунктам - ГОС. ИЗМЕНА." Мгновением позже два больших, сильных охранника выводят их из зала, в пустоту - навсегда.\n\nСколько из них были действительно виновны? Это не имело значения - все они подхалимы и приспособленцы, готовые в любой момент предать вас и Америку.\nВаш народ тоже это знал. С каждым приговором толпы становились все громче, все нетерпеливее. "Это праведное избавление", - говорили они.  "Все эти глупые федералы и их дурацкие законы. Они заслуживают того, что их ждет." Люди ликовали, а  "крысы " умоляли и плакали. Им казалось, что это то, чего им так не хватало. Они чувствовали, что с каждым мертвым бюрократом их жизнь станет лучше, а рай, однажды потерянный, будет вновь обретен.\n\nОтличное шоу, независимо от его религиозной подоплеки. Ты сказал Дэну сохранить копию записей из зала суда для личного пользования."
 darkmaga.3.a: "Всех отправит в рай наша госпожа Гильотина"
 darkmaga.4.t: "Крысы в Доме"
 darkmaga.4.d: "Вот они - твари и нахлебники. Это было неизбежно. Послушайте их жалобы и вопли, как избалованных детей, которые не могут смириться с тем, что будущее больше не принадлежит им.\n\nБольшинство из них - либералы и социалисты, которые выходят из своих укрытий, потому что считают, что "опасность еще никогда не была такой высокой" и что "Трамп обезумел от власти." Но есть и те, кто просто разгневан "враждебным" захватом власти Трампом.\n\nТакое сопротивление бессмысленно, в этом нет никаких сомнений. Однако, как считают некоторые командиры, лучше покончить с ними быстро. Иначе их дерзость может увеличиваться с каждым днем."
 darkmaga.4.a: "Полные неудачники."
 darkmaga.5.t: "Убийство Политика"
 darkmaga.5.d: ""
 darkmaga.5.a: "Кучка головорезов."
 darkmaga.6.t: "Промышленный Саботаж"
 darkmaga.6.d: ""
 darkmaga.6.a: "Кучка головорезов."

 usc.1000.t: "Америка - Измененная Навсегда"
 usc.1000.d: "Это было потрясающее зрелище. Победа, полная и абсолютная победа, они были неправы, они всегда были неправы. Все, что они бросали в тебя, подумай об этом, вся борьба, все сражения, петухи с Уолл-стрит, которые изо всех сил пытались обанкротить тебя, подрядчики мафии, которые пытались обмануть тебя, и все пиявки и паразиты на этом пути, они не могли удержать тебя - они только подстегивали твой подъем.\n\nСША!  США!  США!\n\nТвой народ, вот он, по всей стране, празднует, скандирует, ликует. Твоя победа принадлежит им; твоя Америка изменилась навсегда, и эта победа закрепила ее, и через десятилетия и столетия они будут помнить, что ты сделал для своего народа, а все ненавистники будут давно забыты.\n\nТРАМП! ТРАМП! Ты никогда не отступал, никогда не сдавался. Все эти фальшивые СМИ и голливудские ничтожества, которые бежали, как крысы с тонущего корабля, называя тебя "трусом" и "мошенником", сейчас, должно быть, чувствуют себя чертовски глупо.\n\nПОБЕДА! ПОБЕДА! ПОБЕДА!\n\nВашингтон задрапирован флагами и транспарантами, как никогда раньше, толпы собираются на митинг, величайший митинг - некоторые говорят, что самый большой в истории. Пока ты стоишь в тени, ожидая своей очереди, оратор за оратором делают тебя надеменным; вице-президент, Такер, Иванка и многие другие.\nНаконец ты выходишь. Толпа ревет и хлопает - это поток людей. Пробираясь к подиуму, ты думаешь о хорошем первом слове; о том, что должно завести людей. Приближаясь к микрофону, ты решаешь - все любят хорошее возвращение к прошлому." 
 usc.1000.a: ""...Извините, что заставил вас ждать. Непростое это дело!""
 usc.1000.b: ""...Извините, что заставил вас ждать. Непростое это дело!!""
 usc.1000.c: ""...Извините, что заставил вас ждать. Непростое это дело!!""

 usc.1001.t: "Трампистское правительство просит помощи"
 usc.1001.d: "Мы получили сообщение от представителей Денвера, которые попросили военной помощи в деле, которое мы могли бы поддержать. По сути, они заявили, что "любая помощь будет полезной."\nОни также предполагают, что наша помощь может привести к потенциальным выгодам и улучшению отношений с их страной, если президент Трамп одержит победу в (Бывших) Соединенных Штатах."
 usc.1001.a: "Звучит неплохо! Договорились."
 usc.1001.b: "Нет, я не думаю, что мы это сделаем." 
 usc.1002.t: "Трампистское Правительство Просит Помощи"
 usc.1002.d: "Мы получили сообщение от представителей Денвера, которые попросили военной помощи в деле, которое мы могли бы поддержать. По сути, они заявили, что "любая помощь будет полезной."\nОни также предполагают, что наша помощь может привести к потенциальным выгодам и улучшению отношений с их страной, если президент Трамп одержит победу в (Бывших) Соединенных Штатах."
 usc.1002.a: "Звучит неплохо! Договорились."
 

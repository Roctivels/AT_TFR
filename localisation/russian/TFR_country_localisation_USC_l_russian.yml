 USC_rally_maga_supporters: "Собрать Сторонников §5MAGA§!"
 USC_rally_maga_supporters_desc: "Где мои люди? Мне нужен мой народ! Наши прекрасные сторонники, столько патриотизма и любви - любви к стране. В то время, как БАНДИТЫ протестуют и бездельничают, НАСТОЯЩИЕ АМЕРИКАНЦЫ трудятся, чтобы СДЕЛАТЬ АМЕРИКУ ВЕЛИКОЙ СНОВА.\nМы должны вывести их на улицы с красивыми знаками и плакатами, и кепками - нашими невероятными кепками. Америка должна демонстрировать любовь к нашей демократии."
 USC_spread_counter_propaganda: "Распространить §RКонтрпропаганду§!"
 USC_spread_counter_propaganda_desc: "Некоторые люди просто не понимают, против чего они протестуют - против нашей великой и прочной экономики, священных христианских ценностей, всего того хорошего, что я сделал для американцев. Распространяйте информацию, у нас так много замечательных подкастеров и ораторов - пусть пришлют их туда, они с радостью расскажут им, что такое АМЕРИКА на самом деле!"
 USC_deploy_militia: "Развернуть §YОполчения§!"
 USC_deploy_militia_desc: "Американские ополченцы, наши большие и сильные парни, помните, как я сказал: "Будьте в Стороне и будьте готовы"? Пришло время, ребята. Наша страна в опасности, ясно? Так много врагов, и некоторые из них находятся внутри наших границ! Я подпишу приказ о предоставлении прав тысяч ополченцев, чтобы они имели равные права с нашей полицией. ВРЕМЕННО."
 USC_deploy_national_guard: "Развернуть §7Национальную Гвардию§!"
 USC_deploy_national_guard_desc: "Я президент ЗАКОНА и ПОРЯДКА, и нет никого лучше для его поддержания, чем наша прекрасная и сильная Национальная гвардия. Храбрые мужчины и женщины, они просто лучшие, я люблю их. Объявление чрезвычайного положения в нескольких штатах необходимо для того, чтобы эти сильные солдаты пришли и уничтожили назойливых БАНДИТОВ."
 USC_silence_the_fake_news: "§RЗаглушить§! Фейковые Новости"
 USC_silence_the_fake_news_desc: "Эти Фейковые СМИ так жестоки - они распространяют ложь и дезинформацию, чтобы ввергнуть нашу нацию в еще большую пропасть. Мы не позволим им этого сделать, люди, мы сделаем то, что никогда не делалось раньше; мы объявим их теми, кем они являются - ВРАГАМИ НАРОДА. Именно так; Clinton News Network, the Dying Times, MSDNC - ЗАКРЫТЫ! ПРОЩАЙТЕ ФЕЙКОВЫЕ НОВОСТИ!"
 USC_declare_special_emergency: "Обьявить §RОсобую§! Ситуацию"
 USC_declare_special_emergency_desc: "Многие люди не знают, что президент на самом деле может многое. Я создам СИЛЬНЫЙ специальный комитет по борьбе с беспорядками, который будет подчиняться непосредственно МНЕ, и в котором мы найдем способ разобраться с этими надоедливыми либералами, и сделаем это очень быстро. Критики будут кричать в мой адрес, что это "Антидемократично". Я тот, кто спасает нашу демократию!"
 

 USC_the_dark_mandate: "Темный Мандат"
 USC_the_dark_mandate_desc: "Вокруг меня - идиоты и кретины. Ничего не удается сделать. Мой народ, американский народ страдает, это так ужасно - повсюду смерть и разрушения. Им нужно возмездие - я их возмездие, всегда им был; против продажных политиков, подхалимов, хромоногих консерваторов.\n\nАмерика в беде, как никогда раньше, больше, чем во время первой гражданской войны, это уж точно. Людям нужен сильный лидер, тот, кто ставит их на ПЕРВОЕ место, кто ЗАЩИЩАЕТ ИХ, кто НАПРАВЛЯЕТ ИХ.\n\nРаньше я говорил - нам нужно покончить с Американской Резнёй, но теперь я вижу - единственный способ спасти Америку - это наша собственная Резня. У нас будет лучшая Резня, люди, чем когда-либо."

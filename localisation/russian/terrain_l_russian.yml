 brussels_desc: "----\n§9Если освобождение европейских народов не будет сопровождаться их объединением, европейские государства вскоре будут поглощены растущими мировыми державами ... Европа, которая почти потеряла уверенность в себе, ожидает помощи извне. Одни ожидают ее от России, другие - от Америки. Оба стремления угрожают жизни Европы. Ни Запад, ни Восток не хотят спасать Европу, Россия хочет завоевать ее, Америка хочет купить ее.§!"

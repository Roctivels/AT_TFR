 rio: "Рио-де-Жанейро"
 rio_desc: "----\n§9Рио-де-Жанейро - второй по величине город Бразилии и столица одноименного штата. Известный своей потрясающей природной красотой и яркой культурой, он является главным направлением иностранного туризма в Бразилии. Основанный в 1565 году, он служил столицей Бразилии до 1960 года. Город славится такими достопримечательностями, как Христос Искупитель на вершине горы Корковадо, гора Сахарная, а также пляжи Копакабана и Ипанема. Карнавал в Рио - один из крупнейших фестивалей в мире, демонстрирующий музыку самба и тщательно продуманные парады. Здесь также находится стадион «Маракана», один из самых больших и исторических футбольных стадионов в мире.\n\nГород принимал летние Олимпийские игры 2016 года и входит в список Всемирного наследия ЮНЕСКО за уникальный городской ландшафт, сочетающий горы, море и архитектуру. Несмотря на такие проблемы, как социально-экономическое неравенство, Рио остается крупным культурным и экономическим центром Латинской Америки. Несмотря на свое культурное и экономическое влияние, Рио сталкивается с серьезными проблемами, включая бедность, коррупцию и насильственную преступность, особенно в многочисленных фавелах, которые влияют на повседневную жизнь и развитие города.§!\n\n§GSamba De Janeiro!§!"
 brasilia: "Бразилиа"
 brasilia_desc: "----\n§9Бразилиа - столица Бразилии, основанная в 1960 году в рамках инициативы президента Жуселину Кубичека «Пятьдесят лет за пять», направленной на развитие внутренних районов страны. Город был спроектирован по плану Plano Piloto ("Пилотный план") градостроителя Лусио Косты и архитектора Оскара Нимейера и отличается уникальной планировкой в форме самолета.\n\nВ центре его дизайна находится Монументальная ось, на которой расположены ключевые правительственные здания, такие как Дворец Планалто, Национальный конгресс и Верховный федеральный суд, расположенные вокруг Праса-дус-Трэс-Подереш. Среди знаковых достопримечательностей - Кафедральный собор Бразилиа и Дворец Алворада, которые с 1987 года входят в список Всемирного наследия ЮНЕСКО. Несмотря на новаторскую архитектуру, Брасилия сталкивается с проблемами, связанными с ее плановой планировкой и разрастанием городов, но остается символом бразильского модернизма и политической власти.§!"
 sao_paulo: "Сан-Паулу"
 sao_paulo_desc: "----\n§9Сан-Паулу - крупнейший город Бразилии и столица одноименного штата. Являясь крупным финансовым, культурным и промышленным центром Латинской Америки, он является самым большим городом как в Западном, так и в Южном полушарии, за что получил прозвище Сельва-де-Педра ("Бетонные Джунгли"). Основанный в 1554 году миссионерами-иезуитами, он приобрел известность во время кофейного бума XIX века, а затем стал центром индустриализации.\n\nГород известен своим разнообразным населением, включая значительные общины итальянской, японской и арабской диаспор, которые вносят свой вклад в его богатое культурное наследие. В Сан-Паулу проводятся такие крупные мероприятия, как Биеннале искусств Сан-Паулу и Неделя моды Сан-Паулу, а также такие достопримечательности, как Музей искусств Сан-Паулу (MASP) и парк Ибирапуэра. Несмотря на экономическое превосходство, город сталкивается с такими проблемами, как преступность, загрязнение окружающей среды, социальное неравенство и сильная загруженность дорог.§!"

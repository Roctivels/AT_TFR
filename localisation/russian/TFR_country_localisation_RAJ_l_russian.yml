 RAJ.21.t: "Крупный Заказ из Индии на Поставку Пехотного Снаряжения"
 RAJ.21.d: "Представители Индии направили нам запрос на приобретение снаряжения для пехотных подразделений. Эта страна является нашим давним и важным союзником в Азии, с которым нас объединяют прочные экономические и политические связи. Однако рассматриваемая сделка выходит за рамки двустороннего сотрудничества, поскольку затрагивает баланс сил в регионе. Индия и Китай уже долгое время конкурируют за влияние в Азии, и поставка вооружений индийской стороне может изменить сложившееся равновесие.\nВ результате мы оказались перед непростым выбором. С одной стороны, контракт принесёт экономическую выгоду и ещё сильнее укрепит наши связи. С другой - последствия вмешательства в расстановку сил в регионе могут оказаться весьма серьёзными."
 RAJ.21.a: "Организовать поставки."
 RAJ.21.b: "Вежливо отказать."
 RAJ.22.t: "Крупный Заказ из Индии на Поставку Реактивных Самолетов"
 RAJ.22.d: "Мы получили запрос от Индии на поставку реактивных самолётов. Индия давно входит в число наших стратегических партнёров в Азии, с которыми нас связывают тесные экономические и политические отношения. Однако военный контракт такого уровня неизбежно повлияет на ситуацию в регионе. Китай и Индия продолжают соперничество за влияние, и передача вооружений индийской стороне способна нарушить существующий баланс сил.\nТаким образом, мы стоим перед сложным выбором. Сделка укрепит наше экономическое сотрудничество с Индией, обеспечив финансовую выгоду и расширение позиций на азиатском рынке. Однако возможные изменения в раскладе сил требуют особой осторожности при принятии решения."
 RAJ.22.a: "Организовать поставки."
 RAJ.22.b: "Вежливо отказать."
 RAJ.23.t: "Крупный Заказ из Индии на Поставку Бронетехники"
 RAJ.23.d: "Индийское правительство выразило заинтересованность в закупке нашей бронетехники. С Индией нас связывают давние экономические и политические связи, однако подобная сделка выходит за рамки обычного партнёрства, поскольку затрагивает баланс сил в регионе. На протяжении многих лет Индия и Китай конкурируют за влияние в Азии, и любое изменение в расстановке сил может отразиться на этой хрупкой системе.\nПеред нами стоит непростая задача. Контракт с Индией обеспечит экономическую выгоду и укрепит наше взаимодействие с одним из крупнейших мировых игроков. Однако любое вмешательство в сложившуюся расстановку сил может привести к определённым последствиям."
 RAJ.23.a: "Организовать поставки."
 RAJ.23.b: "Вежливо отказать."
 RAJ.24.t: "Россия Согласна на Поставки"
 RAJ.24.d: ""
 RAJ.24.a: "Круто!"
 RAJ.25.t: "Россия Отказывается от Поставок"
 RAJ.25.d: ""
 RAJ.25.a: "Жаль."
 RAJ.26.t: "Хаос в Индии"
 RAJ.26.d: "С фронтов Великой азиатской войны поступают ужасающие сообщения, свидетельствующие о полномасштабном крахе индийского правительства. Эти заявления подкрепляются сообщениями в социальных сетях, видеороликами и заявлениями нескольких индийских политиков. Китайцы объявили это великой победой для своего народа и установили военное правительство на границе.\n\nНа данный момент оставшиеся члены ОДТО еще официально не прокомментировали потерю главного союзника. Однако на некоторых видеозаписях видно, как солдаты, опознанные как члены ОДТО, отступают к морю, что говорит о том, что они не намерены стабилизировать ситуацию в Индии. Самая большая надежда страны, похоже, лежит в Дели, где правительство держится, хотя, похоже, шансы вернуть контроль над страной невелики.\n\nДели, за исключением границы с Пакистаном и китайских войск, окружен враждебными образованиями. На востоке маоистская Народно-освободительная партизанская армия собрала значительные силы, которые, по мнению некоторых, могут выиграть гражданскую войну. На юге так называемый "Акханд Бхарат" пытается построить этногосударство хинди. Кроме того, в стране действуют остатки военных, полевые командиры и бандитские шайки. В общем, кажется, что до возвращения к нормальной жизни Индии еще несколько десятилетий."
 RAJ.26.a: "Тигр не может победить дракона."

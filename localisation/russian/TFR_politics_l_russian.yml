 ZZZ_no_economy: "§gНет Экономики§!"
 
 ZZZ_capitalist_economy: "§YКапитализм§!"
 TFR_CAPITALISM_TT: "§YКапиталистическая Модель§!"
 TFR_CAPITALISM_TT_LONG: "§gКапитализм - это экономическая система, в которой частные компании и предприятия работают без вмешательства государства. В этой системе цены, издержки и заработная плата определяются рыночными силами, такими как спрос и предложение. Это означает, что государственный надзор и регулирование ограничены. Капитализм популярен среди рыночных либералов и стал наиболее распространенной экономической системой во всем мире.§!\n\n\n\n\n£GFX_ZZZ_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-2.0%§!\n £efficiency_growth_texticon Рост эффективности производства: §G+2.0%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §R-1.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §YБизнес-парков§!: §G+1.5%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+5.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §R-5.0%§!"
 
 ZZZ_inclusive_capitalism: "§YИнклюзивный\nКапитализм§!"
 TFR_INCLUSIVE_CAPITALISM_TT: "§YИнклюзивный Капитализм§!"
 TFR_INCLUSIVE_CAPITALISM_TT_LONG: "§gИнклюзивный капитализм - это экономическая теория, направленная на создание более справедливой системы распределения ценностей в экономике, а также решение проблемы растущего неравенства в доходах и богатстве.\n\nСуть инклюзивного капитализма заключается в содействии устойчивому росту, который отвечает интересам всех вовлеченных сторон — бизнеса, инвесторов, работников, потребителей, правительств, местных сообществ, общества в целом и окружающей среды.§!\n\n\n\n\n£GFX_ZZZ_inclusive_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y2.0%§!\n £construction_speed_infrastructure_texticon Скорость строительства §YБизнес-парков§!:  §G+2.0%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G+1.5%§!\n £construction_speed_civfactory_texticon Скорость строительства §Yфабрик§!: §R-2.5%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+2.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §G+2.0%§!"
 
 ZZZ_american_capitalism: "§YАмериканский Капитализм§!"
 TFR_AMERICAN_CAPITALISM_TT: "§YАмериканский Капитализм§!"
 TFR_AMERICAN_CAPITALISM_TT_LONG: "§gАмериканская экономическая система является образцом для других стран со свободной рыночной экономикой. Она основана на свободной торговле и минимальном вмешательстве государства в экономические дела. Однако есть несколько уникальных характеристик, которые отличают эту систему от других форм капитализма.\nОдна из главных особенностей - основа американской экономики. Доллар США - сильная валюта, которая высоко ценится за свою стабильность. В результате он широко используется в качестве основной резервной валюты во всем мире.§!\n\n\n\n\n£GFX_ZZZ_american_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-3.0%§!\n £efficiency_growth_texticon Рост эффективности производства: §G+3.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §R-3.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §YБизнес-парков§!: §G+5.0%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+10.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §R-10.0%§!"
 
 ZZZ_oligopolistic_capitalism: "§YОлигополистический Капитализм§!"
 TFR_OLIGOPOLY_CAPITALISM_TT: "§YОлигополистическая Экономика§!"
 TFR_OLIGOPOLY_CAPITALISM_TT_LONG: "§gКак и во многих других странах, экономика этой страны основана на принципах свободного рынка. Однако для нее характерен высокий уровень концентрации рынка, когда небольшое число корпораций доминирует в конкурентной борьбе.\nЧто отличает эту экономическую систему от капиталистических аналогов, так это минимальное участие государства. В чрезвычайной степени регулирующие и административные функции правительства либо ограничены, либо захвачены, либо практически неэффективны. Желания доминирующих корпораций превалируют над интересами общества.§!\n\n\n\n\n£GFX_ZZZ_oligopolistic_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-4.0%§!\n£prod_eff_cap Макс. эффективность производства: §G+3.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §R-6.0%§!\n £construction_speed_refinery_texticon Скорость строительства §Yнефтеперерабатывающих заводов§!: §G+10.0%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+15.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §R-15.0%§!"

 ZZZ_cabal_economy: "§YЭкономика Кабалы§!"
 TFR_CABAL_ECONOMY_TT: "§YЭкономика Кабалы§!"
 TFR_CABAL_ECONOMY_TT_LONG: "§gЭкономика Кабалы, которую внутри организации иногда называют Бильдербергской системой, представляет собой теневую псевдокомандную экономику, построенную на принципе обеспечения максимальной финансовой и политической выгоды для Когносценти и его финансовых интересов.\n\nПосредством частных встреч, алгоритмов прогнозирования и инсайдерской торговли все вовлеченные стороны обеспечивают поддержание высокого уровня прибыли и минимизацию определенных непредсказуемых факторов, создавая для американского народа прекрасную иллюзию стабильности, гарантируя при этом дальнейшее процветание финансового сектора, радуя финансистов и обеспечивая глубинному государству доступ к необходимым ресурсам.§!\n\n\n\n\n£GFX_ZZZ_cabal_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y3.0%§!\n £construction_speed_texticon Скорость строительства: §G+3.0%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+20.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §R-20.0%§!"
 
 ZZZ_collective_capitalism: "§YКоллективный Капитализм§!"
 ZZZ_collective_capitalism2: "§YКоллективный Капитализм§!"
 TFR_COLLECTIVE_CAPITALISM_TT: "§YКоллективный Капитализм§!"
 TFR_COLLECTIVE_CAPITALISM_TT_LONG: "§gКоллективный капитализм - это японская модель экономики, которая характеризуется тесными отношениями между бизнесом и государством, а также прочными партнерскими отношениями между компаниями и их поставщиками, клиентами и другими заинтересованными сторонами. Эта модель делает акцент на долгосрочной стабильности и сотрудничестве, а не на конкуренции, и основана на идее, что бизнес и общество взаимосвязаны и разделяют ответственность за успех друг друга.§!\n\n\n\n\n£GFX_ZZZ_collective_capitalism_banner\n\n\n\n\n\n [JAP_collective_capitalism_bonus]"
 
 ZZZ_welfare_capitalism: "§YСоциальный Капитализм§!"
 TFR_WELFARE_CAPITALISM_TT: "§YМодель Социального Капитализма§!"
 TFR_WELFARE_CAPITALISM_TT_LONG: "§gВ системе социального капитализма государство сочетает присутствие частных компаний и предприятий с определенным уровнем контроля и участия в экономике для обеспечения ее нормального функционирования. По мнению ее сторонников, такая система обеспечивает баланс между высоким экономическим ростом, низкой инфляцией и безработицей, благоприятными условиями труда и определенным уровнем социальной защиты.§!\n\n\n\n\n£GFX_ZZZ_welfare_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y2.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G+5.0%§!\n £efficiency_growth_texticon Рост эффективности производства: §R-6.5%§!"\n £construction_speed_civfactory_texticon Скорость строительства §Yфабрик§!: §G+5.0%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §R-10.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §G+10.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y+3.5%§!"
 
 ZZZ_corporatism: "§YКорпоративизм§!"
 TFR_CORPORATISM_TT: "§YКорпоративистская Модель§!"
 TFR_CORPORATISM_TT_LONG: "§gКорпоративизм - это экономическая система, целью которой является объединение государства и общества через корпоративные структуры. Он рассматривает это как наиболее эффективный способ построения процветающей и стабильной экономики.\nКорпоративизм часто ассоциируется с фашистскими и авторитарными режимами. Эти режимы требуют непоколебимой лояльности государству. Однако важно различать корпоративизм и корпоратократию, где границы между государством и корпорациями размыты.§!\n\n\n\n\n£GFX_ZZZ_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-2.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G+10.0%§!\n £production_efficiency_loss_texticon Сохранение эффективности производства: §R-5.0%§!\n £sabotaged_resource_texticon Штраф за нехватку ресурсов: §R+3.5%§!\n £mil_factory Объем заводского производства: §G+6.0%§!\n £GFX_dx Ежемесячный Прирост: §R-10.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y-10.0%§!"
 
 ZZZ_command_economy: "§YКомандная Экономика§!"
 TFR_COMMAND_ECONOMY_TT: "§YКомандная Экономика§!"
 TFR_COMMAND_ECONOMY_TT_LONG: "§gКомандная экономика - это высокоцентрализованная форма корпоративизма, при которой значительная часть экономики национализирована путем прямого государственного вмешательства, особенно в стратегических отраслях, таких как производство вооружений и тяжелая промышленность.§!\n\n\n\n\n£GFX_ZZZ_command_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-3.0%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G+10.0%§!\n £efficiency_base_texticon Базовая эффективность производства: §G+10.0%§!\n £efficiency_growth_texticon Рост эффективности производства: §R-10.0%§!"\n £mil_factory Объем заводского производства: §G+5.6%§!\n £GFX_dx Ежемесячный Прирост: §R-15.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y15.0%§!"
 
 ZZZ_managed_economy: "§YНацистский Корпоративизм§!"
 TFR_MANAGED_ECONOMY_TT: "§YНационал-социалистический Корпоративизм§!"
 TFR_MANAGED_ECONOMY_TT_LONG: "§gНацистский корпоративизм - это система, которая лежала в основе экономической модели нацистской Германии. Несмотря на то, что она широко рассматривается как провал ныне не существующего режима, сторонники неонацистских движений по-прежнему утверждают, что это была единственно верная и честная экономическая система для "арийской расы"\nВсе усилия направлены на удовлетворение потребностей государства и высшей власти - будь то великий вождь или партийный аппарат. Каждое действие тщательно проверяется. Требования правительства кажутся бесконечными, а его проекты превалируют над всеми остальными делами.§!\n\n\n\n\n£GFX_ZZZ_managed_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-5.0%§!\n £construction_speed_milfactory_texticon Скорость строительства §Yвоенных заводов§!: §G+10.0%§!\n £mil_factory Объем заводского производства: §G+6.0%§!\n £production_efficiency_loss_texticon Сохранение эффективности производства: §R-10.0%§!\n £development Ежемесячное Развитие Уровня Бедности:  §R-1.5%§!\n £GFX_dx Ежемесячный Прирост:   §R-15.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y-10.0%§!"
 
 ZZZ_planned_economy: "§YПлановая Экономика§!"
 TFR_PLANNED_ECONOMY_TT: "§YПлановая Экономика§!"
 TFR_PLANNED_ECONOMY_TT_LONG: "§gПлановая экономика, - это экономическая система, в которой все экономическое производство и рост планируются заранее, чтобы удовлетворить потребности населения и страны в целом. Такое планирование может осуществляться как централизованно, так и децентрализованно, а решения по нему могут приниматься специальным советом экспертов или самим народом на основе широкого участия.§!\n\n\n\n\n£GFX_ZZZ_planned_economy_banner\n\n\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-5.0%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G+10.0%§!\n £efficiency_base_texticon Базовая эффективность производства: §G+7.5%§!\n £efficiency_growth_texticon Рост эффективности производства: §R-10.0%§!\n £production_efficiency_loss_texticon Сохранение эффективности производства: §R-5.0%§!\n £mil_factory Объем заводского производства: §G+10.0%§!\n £GFX_dx Ежемесячный Прирост: §R-25.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y10.0%§!"
 
 ZZZ_developed_socialism: "§YРазвитой Социализм§!"
 TFR_DEVELOPED_SOCIALISM_TT: "§YТеория Развитого Социализма§!"
 TFR_DEVELOPED_SOCIALISM_TT_LONG: "§gКонцепция развитого социализма, некогда бывшая пережитком брежневской эпохи в Советском Союзе, была возрождена современными российскими экономистами. В этой обновленной перспективе было реализовано большее количество предложений и реформ Косыгина, в результате чего экономический ландшафт и система стали более разнообразными.\nХотя центральное планирование по-прежнему играет центральную роль, частная инициатива далеко не заброшена. Частным предприятиям предоставлена большая независимость в производстве, планировании и стимулировании работников. Эта независимость позволяет им получать больше прибыли, что, в свою очередь, мотивирует их производить больше. Кроме того, была введена новая система оплаты труда, основанная на коэффициенте трудового участия. Эта система оплачивает труд работников в зависимости от того, какой вклад они вносят в производство компании.§!\n\n\n\n\n£GFX_ZZZ_developed_socialism_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-3.0%§!\n £construction_speed_civfactory_texticon Скорость строительства §Yфабрик§!: §G+10.0%§!\n £mil_factory Объем заводского производства: §G+5.0%§!\n £production_efficiency_loss_texticon Сохранение эффективности производства: §R-10.0%§!\n £sabotaged_resource_texticon Штраф за нехватку ресурсов:  §G-5.0%§!\n £efficiency_growth_texticon Рост эффективности производства:   §R-10.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y+5.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §G+5.0%§!"
 
 ZZZ_military_controlled_economy: "§YВоенно-контролируемая Экономика§!"
 TFR_MILITARY_CONTROLLED_TT: "§YВоенно-контролируемая Экономика§!"
 TFR_MILITARY_CONTROLLED_TT_LONG: "§gВ экономике, контролируемой военными, военные осуществляют прямой надзор за экономикой. Подавляющее большинство, если не вся экономическая деятельность, направлена на удовлетворение потребностей военных. Такой тип экономической системы распространен в странах с военной диктатурой или стратократией. Однако зачастую интересы военных ставятся во главу угла, а не благосостояние граждан. Это связано с тем, что режимы, использующие эту экономическую модель, как правило, националистичны или даже ультранационалистичны.§!\n\n\n\n\n£GFX_ZZZ_military_controlled_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-5.0%§!\n £construction_speed_milfactory_texticon Скорость строительства §Yвоенных заводов§!: §G+10.0%§!\n £efficiency_base_texticon Базовая эффективность производства: §R-7.5%§!\n £efficiency_growth_texticon Рост эффективности производства: §G+10.0%§!\n £sabotaged_resource_texticon Штраф за нехватку ресурсов: §G-10.0%§!\n £mil_factory Объем заводского производства: §G+5.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y-10.0%§!\n £development Ежемесячное Развитие Уровня Бедности: §R-2.5%§!"
 
 ZZZ_worker_controlled_economy: "§YУправляемая Рабочими Экономика§!"
 TFR_WORKER_CONTROLLED_TT: "§YУправляемая Рабочими Экономика§!"
 TFR_WORKER_CONTROLLED_TT_LONG: "§gХотя принято считать, что плановая экономика - это исключительно экономика, контролируемая правительством, это не так для всех плановых экономик.\nЭкономики, контролируемые рабочими, управляются не государственными чиновниками или бюрократами, а самими рабочими, часто через рабочие советы или профсоюзы. Через эти органы рабочие часто осуществляют прямой контроль над производством и часто пользуются высокой степенью автономии.§!\n\n\n\n\n£GFX_ZZZ_worker_controlled_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y2.0%§!\n £construction_speed_civfactory_texticon Скорость строительства §Yфабрик§!: §G+10.0%§!\n £efficiency_growth_texticon Рост эффективности производства: §G+10.0%§!"\n £prod_eff_cap Макс. эффективность производства: §G+5.0%§!\n £mil_factory Объем заводского производства: §G+5.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y10.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §G+10.0%§!"
 
 ZZZ_socialist_market: "§YСоциалистический Рынок§!"
 TFR_SOCIALIST_MARKET_TT: "§YСоциалистическая Рыночная Экономика§!"
 TFR_SOCIALIST_MARKET_TT_LONG: "§gВ социалистической рыночной экономике правительство и частные предприятия сотрудничают, чтобы построить более справедливое общество. Правительство владеет некоторыми предприятиями и контролирует экономику, чтобы гарантировать справедливость, а частные компании работают и развиваются.\nОдна из главных задач - обеспечить каждому доступ к основным услугам, таким как питание, жилье и здравоохранение. Другая цель - поощрять инновации и предпринимательство, обеспечивая при этом, чтобы бизнес работал в интересах общества.§!\n\n\n\n\n£GFX_ZZZ_socialist_market_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-1.5%§!\n £mil_factory Объем заводского производства: §G+3.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G+5.0%§!\n £efficiency_base_texticon Базовая эффективность производства: §G+5.0%§!\n £efficiency_growth_texticon Рост эффективности производства: §R-3.5%§!\n £GFX_dx Ежемесячный Прирост: §G+10.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y+10.0%§!"
 
 ZZZ_chaostic_economy: "§RХаотическая Экономика§!"
 TFR_CHAOSTIC_TT: "§YХаос§!"
 TFR_CHAOSTIC_TT_LONG: "§gВ настоящее время наша экономика находится в §Rсостоянии хаоса§! и неразберихи. Предприятия закрываются, работники уходят, а многие люди остаются без работы. Правительство и бюрократы должны действовать быстро, чтобы восстановить порядок и остановить беспорядки, которые разворачиваются в нашей стране.\n\n\n\n\n£GFX_ZZZ_chaostic_economy_banner\n\n\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y5.0%§!\n £construction_speed_texticon Местная скорость строительства: §R-10.0%§!\n £mil_factory Объем заводского производства: §R-10.0%§!§!"
 

 ZZZ_minarchism: "§YМинархизм§!"
 TFR_MINARCHISM_TT: "§YМинархизм§!"
 TFR_MINARCHISM_TT_LONG: "§gИдеологи§! §6Минархизма§! §gвыступают за "скелетное" государство, занимающееся лишь поддержанием закона, порядка и обороны, предоставляя всё остальное на откуп хаотическим силам рынка. В таких условиях неограниченный капитализм процветает, давая сильным и выдающимся предпринимателям все возможности и оставляя слабых в стороне.§!\n\n\n\n\n£GFX_ZZZ_minarchism_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-5%§!\n £efficiency_growth_texticon Рост эффективности производства: §G+3%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §R-10%§!\n £construction_speed_infrastructure_texticon Скорость строительства §YБизнес-парков§!: §G+2%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+5.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §G+5.0%§!""

 ZZZ_ancap: "§YАнархо-Капитализм§!"
 TFR_ANCAP_TT: "§YАнархо-Капитализм§!"
 TFR_ANCAP_TT_LONG: "§gМодель §YАнархо-Капитализма§! представляет собой мир, в котором государство исчезает, уступая место свободным рынкам и частному предпринимательству. Закон, безопасность и услуги предоставляются конкурирующими фирмами, а основными принципами становятся права собственности и добровольный обмен. Сторонники восхваляют это как истинную свободу, тогда как критики предупреждают о господстве корпораций. Это общество, где абсолютная свобода и хаос идут рука об руку.§!\n\n\n\n\n£GFX_ZZZ_ancap_banner\n\n\n\n\n\n £consumer_goods_texticon Фабрики, производящие товары народного потребления: §Y-15%§!\n £efficiency_growth_texticon Рост эффективности производства: §G+12%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §R-39%§!\n £construction_speed_infrastructure_texticon Скорость строительства §YБизнес-парков§!: §G+25%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+15.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §G+5.0%§!\n £GFX_stability_texticon Стабильность: §R-10.0%§!"

 ZZZ_kaiser_economy: "§YРейхбургер Экономика§!"
 ZZZ_KAISER_ECO_TT: "§Рейхбургер Экономика§!"
 ZZZ_KAISER_ECO_TT_LONG: "§gЭкономическая система нового кайзеровского режима представляет собой сложную паутину неофеодальных практик и аграрного господства. Он считает банковское дело источником всех социальных бед, но идет еще дальше - прямо обвиняет евреев в том, что они считают упадком немецкой экономики и упадком немецкой деревни, а урбанизация, по их мнению, вызвана еврейскими банковскими интересами.\nОн стремится создать процветающую сельскую рыночную экономику с упором на малый бизнес, который не может нанести большого ущерба окружающей среде. В то время как вся оставшаяся промышленная мощь направлена на удовлетворение потребностей армии и ее постоянно растущих рядов.§!\n\n\n\n\n£GFX_ZZZ_kaiser_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Фактор фабрик, производящих товары народного потребления: §Y-5.0%§!\n £construction_speed_civfactory_texticon Скорость строительства §Yфабрик§!": §R-10.0%§!\n £construction_speed_milfactory_texticon Скорость строительства §Yвоенных заводов§!: §G+3.5%§!\n £mil_factory Объем заводского производства: §G+1.0%§!\n £mobilisation_texticon Скорость мобилизации: §G+15.0%§!\n £production_efficiency_loss_texticon Сохранение эффективности производства: §R-10.0%§!\n £development Ежемесячное Развитие Уровня Бедности:  §R-2.0%§!\n £GFX_dx Ежемесячный Прирост:   §R-15.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §R-15.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y-15.0%§!"
 
 ZZZ_left_corporatism: "§YЛевый Корпоративизм§!"
 ZZZ_LEFT_CORPORATISM_TT: "§YЛевый Корпоративизм§!"
 ZZZ_LEFT_CORPORATISM_TT_LONG: "§gЛевый корпоративизм - это экономическая модель, которая стремится сбалансировать интересы различных социальных групп, в частности труда, капитала и государства, через систему сотрудничества и переговоров. Она часто ассоциируется с более прогрессивным или левым подходом к управлению, подчеркивающим социальное равенство, экологическую устойчивость и демократическое участие.\nЛевый корпоративизм обычно предполагает сотрудничество между тремя основными заинтересованными сторонами: правительством, бизнесом и профсоюзами. Эта трехсторонняя модель направлена на развитие диалога и достижение консенсуса между этими группами для решения экономических и социальных проблем.§!\n\n\n\n\n£GFX_ZZZ_left_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon Фактор фабрик, производящих товары народного потребления: §Y2.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G+10.0%§!\n £mil_factory Объем заводского производства: §G+3.5%§!\n £construction_speed_texticon Скорость строительства: §G+5.0%§!\n £GFX_dx Ежемесячный Прирост: §R-10.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §G+10.0%§!"
 
 ZZZ_liberal_corporatism: "§YЛиберальный Корпоративизм§!"
 ZZZ_LIBERAL_CORPORATISM_TT: "§YЛиберальный Корпоративизм§!"
 ZZZ_LIBERAL_CORPORATISM_TT_LONG: "§gЛиберальный корпоративизм - экономическая и политическая модель, которая подчеркивает сотрудничество между государством, бизнесом и рабочими организациями при сохранении преимущественно рыночной экономики. Он стремится сбалансировать интересы этих групп с помощью институциональных рамок, которые способствуют переговорам и сотрудничеству. Хотя либеральный корпоративизм действует в рамках капитализма, он признает необходимость государственного вмешательства для исправления провалов рынка, обеспечения честной конкуренции и защиты прав трудящихся.§!\n\n\n\n\n£GFX_ZZZ_liberal_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon Фактор фабрик, производящих товары народного потребления: §Y-1.5%§!\n £prod_eff_cap Макс. эффективность производства: §R-5.0%§!\n £construction_speed_texticon Скорость строительства: §G+2.5%§!\n  £development Ежемесячное Развитие Уровня Бедности:  §G+0.05%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+10.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §G+10.0%§!"
 
 ZZZ_maga_capitalism: "§YMAGA Капитализм§!"
 ZZZ_MAGA_CAPITALISM_TT: "§YMAGA Капитализм§!"
 ZZZ_MAGA_CAPITALISM_TT_LONG: "§gMAGA Капитализм - Хотя эта система и следует основным стандартам американской капиталистической модели, она гораздо более протекционистская и не преклоняет колено перед крупными корпорациями.\nНаоборот, она поддерживает малый независимый бизнес и производителей, а также средние предприятия. В стране также действуют жесткие антимонопольные законы, ограничивающие или устраняющие чрезмерную экономическую власть.\nЕще одной ключевой особенностью этой системы является сильный акцент на защите и продвижении интересов рабочих. Цель состоит в том, чтобы сохранить и, по возможности, усилить программы социального обеспечения, медицину и другие программы социального обеспечения, но при этом минимизировать их бремя для американской экономики.§!\n\n\n\n\n£GFX_ZZZ_maga_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Фактор фабрик, производящих товары народного потребления: §Y2.0%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G+5.0%§!\n £efficiency_growth_texticon Рост эффективности производства: §R-5.0%§!"\n £construction_speed_civfactory_texticon Скорость строительства §Yфабрик§!": §G+5.0%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §R-5.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §G+10.0%§!\n £GFX_dx_yellow Фактор Личных Расходов: §Y+3.0%§!" 
 
 ZZZ_america_first_capitalism: "§YAF Капитализм§!"
 ZZZ_AF_CAPITALISM_TT: "§Y'America First' Капитализм§!"
 ZZZ_AF_CAPITALISM_TT_LONG: "§gAmerica First Капитализм - это модернизированная и улучшенная версия американской системы. Страна также закрыта от "нежелательного" влияния. Система также уделяет большое внимание инфраструктурным проектам, чтобы помочь соединить нацию и получить больше доходов.\nОна в значительной степени благоприятствует американским корпорациям и стремится либо реформировать корпоративную Америку, либо создать новый пул крупных предприятий, которые будут отвечать воле американской нации.§!\n\n\n\n\n£GFX_ZZZ_america_first_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Фактор фабрик, производящих товары народного потребления: §Y-4.0%§!\n£prod_eff_cap Макс. эффективность производства: §G+3.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G+5.0%§!\n £mil_factory Объем заводского производства: §R-5.0%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+15.0%§!\n £GFX_dx_yellow Фактор Личной Ценности: §R-15.0%§!"
 
 ZZZ_state_capitalism: "§YГоскапитализм§!"
 ZZZ_STATE_CAPITALISM_TT: "§YГоскапитализм§!"
 ZZZ_STATE_CAPITALISM_TT_LONG: "§gГосударственный капитализм - это экономическая система, в которой государство активно участвует в предпринимательской и коммерческой деятельности с целью получения прибыли. В этой системе средства производства национализированы и контролируются государством через государственные предприятия. Это включает в себя накопление капитала, централизованное управление и использование наемного труда.§!\n\n\n\n\n£GFX_ZZZ_state_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Фактор фабрик, производящих товары народного потребления: §Y-2.0%§!\n £efficiency_growth_texticon Рост эффективности производства: §R-2.0%§!\n £construction_speed_civfactory_texticon Скорость строительства §Yфабрик§!": §G+2.5%§!\n £construction_speed_infrastructure_texticon Скорость строительства §Yинфраструктуры§!: §G-1.5%§!\n £GFX_dx Ежемесячный Прирост: §R-4.0%§!\n £efficiency_base_texticon Базовая эффективность производства: §G+5.0%§!§!"
 
 ZZZ_party_state_capitalism: "§YПарт-Государственный Капитализм§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT: "§YПарт-Государственный Капитализм§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT_LONG: "§gПартийно-государственный капитализм - это экономическая модель, в которой государство не является главной движущей силой экономики, а партийные структуры ставятся выше государственных.\nОдним из главных показателей расширения партийно-государственной системы является растущее присутствие партийных организаций на предприятиях, включая частные компании и даже иностранные фирмы. Другой ключевой особенностью этой модели является выход государственного капитала за пределы государственных предприятий. Этот процесс получил название "финансиализация государства". Еще один способ проявления партийно-государственной экономической активности - эволюция промышленной политики.§!\n\n\n\n\n£GFX_ZZZ_party_state_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Фактор фабрик, производящих товары народного потребления: §Y-3.0%§!\n £efficiency_growth_texticon Рост эффективности производства: §R-2.0%§!\n £construction_speed_civfactory_texticon Скорость строительства §Yфабрик§!": §G+4.0%§!\n £construction_speed_infrastructure_texticon "§YБизнес-парк§! – скорость строительства: §G+4.0%§!\n £GFX_dx Ежемесячный Прирост: §G+2.5%§!\n £efficiency_base_texticon Базовая эффективность производства: §R-1.5%§!§!"
 
 ZZZ_mixed_economy: "§YСмешанная Экономика§!"
 ZZZ_MIXED_ECONOMY_TT: "§YСмешанная Экономическая Модель§!"
 ZZZ_MIXED_ECONOMY_TT_LONG: "§gСмешанная экономика - это экономическая система, которая сочетает в себе элементы как капитализма, например, частный бизнес, так и социализма, например, национализированные государственные услуги.\nЕсть разные способы определения смешанной экономики. Например, одни говорят, что это экономическая система, сочетающая элементы рыночной экономики с элементами плановой экономики. Другие говорят, что в ней сочетаются рынки и государственное вмешательство, или частное предпринимательство с государственным.§!\n\n\n\n\n£GFX_ZZZ_mixed_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Фактор фабрик, производящих товары народного потребления: §Y-2.5%§!\n £efficiency_base_texticon Базовая эффективность производства: §G+2.0%§!\n £construction_speed_civfactory_texticon Скорость строительства §Yфабрик§!: §G+1.5%§!\n £construction_speed_infrastructure_texticon "§YБизнес-парк§! – скорость строительства: §G+1.5%§!\n £GFX_dx_blue Фактор Ценности Бизнесов: §G+3.5%§!\n £GFX_dx_yellow Фактор Личной Ценности: §R-1.5%§!"



 CHI_tsmc_idea: "Taiwan Semiconductor Manufacturing Company"
 CHI_tsmc_idea_desc: "TSMC, или Taiwan Semiconductor Manufacturing Company, является крупнейшей в мире компанией по производству полупроводников и обеспечивает полупроводниками бесфабричные предприятия. В 1990-х годах TSMC была основана в рамках национального курса на преобразование в высокотехнологичную экономику, основанную на предоставлении услуг, с целью специализации на производстве полупроводников, что побудило западные компании передать производство на аутсорсинг для получения максимальной прибыли.\n\nСегодня на долю TSMC, наряду с другими тайваньскими компаниями, приходится около двух третей мировых поставок полупроводников, и она доминирует на рынке высокотехнологичных интегральная микросхем. Такая сильная зависимость от тайваньских полупроводников заставила многие развитые страны удерживать Китай от военных действий, опасаясь, что это нанесет ущерб цепочке поставок и, следовательно, всей их экономике. Эту защиту, обеспечиваемую монополией Тайваня на производство полупроводников, многие называют "кремниевым щитом.""

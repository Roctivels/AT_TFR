 taiwan.4.t: "Президентские Выборы 2020 года"
 taiwan.4.d: "Самое важное событие между западным и китайским Новым годом - выборы в Тайване в 2020 году, которые определят и законодательный орган, и президента. После недельного перерыва, связанного с трагическим крушением вертолета Black Hawk 2 января, возобновилась заключительная фаза предвыборной кампании, и кандидаты провели последние и крупнейшие политические митинги в нескольких крупных городах.\n\nПредставительница лагеря зеленых - действующий президент Цай Ин-вэнь, первая женщина-президент Тайваня и первая представительница коренного населения. Профессор права с политической карьерой, начавшейся в 2000 году, ее опыт и профессионализм часто упоминаются сторонниками как причины, по которым она является более квалифицированным выбором. Несмотря на бурный первый срок, ее рейтинг одобрения растет с июля 2019 года, и многие наблюдатели предсказывают победу зеленых\n\nНа стороне синих выступает Хан Гоюй, нынешний мэр Гаосюна, который столкнулся с негативной реакцией жителей города за то, что якобы бросил их. Имея степень магистра права, Хань вернулся в политику только в 2017 году, поэтому его опыт бледнеет по сравнению с опытом кандидата от ДПП. Тем не менее, его сторонники утверждают, что неудачи ДПП привели к тому, что избиратели жаждут перемен, и многие считают, что его неортодоксальный политический стиль может положить начало новой золотой эре для Тайваня.\n\nДжеймс Сунг также участвует в гонке, хотя большая часть общественного внимания, которое он получает, приходит в виде шуток, а не серьезного политического участия.\n\nНа следующий день после изнурительной ночи финальных митингов граждане по всей стране отправляются на ближайшие избирательные участки, чтобы определить будущее своей страны. С наступлением ночи и подсчетом голосов объявляется окончательный результат:"
 taiwan.4.a: "Цай Инь-вэнь и "Зелёные" побеждают!"
 taiwan.4.b: "Хан Гоюй и Синие приходят к власти!"
 taiwan.5.t: "Цай Инвэнь Добивается Переизбрания"
 taiwan.5.d: "Президент Тайваня Цай Инь-Вэнь поблагодарил избирателей острова в субботу за воплощение  \"демократических ценностей на практике \", набрав более 57% голосов. Уверенная победа Цай завершает замечательное возвращение после разрушительных результатов местных выборов в 2018 году, когда она ушла с поста лидера ДПП после сокрушительного поражения в гонках по всему самоуправляющемуся острову.\n \nПосле субботнего голосования Цай затронул напряженность в отношениях с Китаем по поводу суверенитета территории, заявив, что Тайвань готов сотрудничать с Китаем, но Китай должен уважать голос тайваньских избирателей."
 taiwan.5.a: "Шаг Назад к Воссоединению"
 taiwan.6.t: "Хань Гоюй Победил на Выборах"
 taiwan.6.d: "Избранный президент Хань Гоюй поблагодарил электорат острова за их избирательный мандат после неожиданного поражения от действующего кандидата от Демократической партии Цай Инвэнь. Опираясь на пожилых избирателей-эмигрантов из ханьцев, Гоминьдан одержал уверенную победу, обратившись к более тесным отношениям с Китаем после различных эмбарго и экономических проблем. Заклеймив Цай Иньвэня как оторванной от элиты, а себя - как лидера-популиста, он привлек на свою сторону многих колеблющихся избирателей своими обещаниями национальной безопасности после неспособности ДПП должным образом отстаивать свои интересы в КНР."

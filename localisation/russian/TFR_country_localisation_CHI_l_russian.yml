 CHI_american_protection_idea: "Американская Защита"
 CHI_american_protection_idea_desc: "Опираясь исключительно на военную мощь вооруженных сил КНР, очевидно, что мы не сможем самостоятельно противостоять КПК. Поддержание мира полностью зависит от политики США, которая диктует, что статус-кво не должен быть изменен.\n\nСедьмой флот действует как стабилизирующая сила, подобно столпу уверенности, поддерживая хрупкий мир через Тайваньский пролив. Однако этот надежный щит несет в себе и другой смысл: как только поддержка будет утрачена, враг неизбежно нанесет удар."
 CHI_taiwanese_independence_movement_idea: "Тайваньское Движение за Независимость"
 CHI_taiwanese_independence_movement_idea_desc: "\n\n\n\n£GFX_CHI_taiwanese_independence_movement_banner\n\n\n\n\n\nКитайская Республика, также известная как Тайвань, в последние годы стала называться "Китайской Республикой (Тайвань)." Такое название отражает идеологическую путаницу в регионе. По сути, нас даже не признают как страну в международном сообществе, что способствует росту движения за независимость Тайваня.\n\nПосле выхода из Организации Объединенных Наций международный авторитет Китайской Республики резко упал. Этот упадок подстегнул появление местного самосознания, которое впоследствии вышло на первый план во время движения за демократизацию и в конечном итоге завоевало политическую власть.\n\nНесмотря на это, большинство общества по-прежнему выступает за сохранение статус-кво, что делает путь к официальному переименованию далеким."
 CHI_taiwanese_independence_movement_2_idea: "Тайваньское Движение за Независимость"
 CHI_taiwanese_independence_movement_idea_desc: "\n\n\n\n£GFX_CHI_taiwanese_independence_movement_banner\n\n\n\n\n\nКитайская Республика, также известная как Тайвань, в последние годы стала называться "Китайской Республикой (Тайвань)." Такое название отражает идеологическую путаницу в регионе. По сути, нас даже не признают как страну в международном сообществе, что способствует росту движения за независимость Тайваня.\n\nПосле выхода из Организации Объединенных Наций международный авторитет Китайской Республики резко упал. Этот упадок подстегнул появление местного самосознания, которое впоследствии вышло на первый план во время движения за демократизацию и в конечном итоге завоевало политическую власть.\n\nНесмотря на это, большинство общества по-прежнему выступает за сохранение статус-кво, что делает путь к официальному переименованию далеким."
 CHI_lower_mainland_influence_idea: "Ужасное Влияние на Материковый Китай"
 CHI_lower_mainland_influence_idea_desc: "\n\n\n\n£GFX_CHI_terrible_mainland_influence_banner\n\n\n\n\n\nВ прошлом веке мы прочно стояли на земле Китая, пока не началась гражданская война. Ряд неудач, вызванных различными факторами, заставил нас отступить на Тайвань, что привело к потере контроля над материком.\n\nС течением времени Китайская Республика в сознании материковых китайцев превратилась в исторический термин. Те, кто знает о ее существовании, часто придерживаются крайне негативных взглядов, а наших сторонников в интернете называют смехотворными идеологами."

 #National Focuses
 CHI_island_in_one_fate: "Остров Одной Судьбы"
 CHI_island_in_one_fate_desc: "Впервые за последние восемьдесят лет народ острова столкнулся с военным вторжением, которое бросает вызов нашей независимости и суверенитету, угрожая полностью подчинить нас, не оставив места для переговоров. Несмотря на предвзятость, которая доминирует в нашей политике и поляризует наш народ, сохранение независимости от Пекина является одним из немногих общих оснований, на которых большинство наших людей могут согласиться. Теперь, когда все возможности сохранения шаткого статус-кво уменьшились, у умиротворителей наконец-то закончились предлоги для уступок, и мы можем начать откладывать политику в сторону под знаменем национальной обороны."
 CHI_solidify_civil_defence: "Укрепить Гражданскую Оборону"
 CHI_solidify_civil_defence_desc: "Будучи густонаселенным островом, наши люди постоянно подвергаются всевозможным бомбардировкам. Наши координаторы перегружены военной обороной, а наши службы экстренной помощи, находящиеся в полном беспорядке, не имеют возможности добраться до каждого нуждающегося мирного жителя. К счастью, мы можем воспользоваться нашими организациями гражданской обороны, которые создавались на протяжении шестидесяти лет на случай маловероятного китайского вторжения. Объединив их с обширной сетью бомбоубежищ, мы сможем снизить нагрузку на наши перегруженные системы экстренной помощи и одновременно обезопасить гражданское население от ужасов войны."
 CHI_guerilla_strategy: "Партизанская Стратегия"
 CHI_guerilla_strategy_desc: "Мы не в состоянии сражаться с НОАК в лоб. Мы отстаем в численности личного состава и техники, опыте и боеготовности, а также в доктрине и тактике. Поэтому вместо прямого противостояния НОАК Главное управление Генерального штаба решило использовать другой подход - партизанскую войну. Используя преимущества местности, включая плотные городские районы, побережье, горы и леса, мы сможем сохранить боеспособность и избежать полного уничтожения наших вооруженных сил в первый же день. Сочетание асимметричной войны, неблагоприятной местности и сложной обстановки обязательно заставит захватчиков заплатить за каждый дюйм, который они продвинут к нашему дому."
 CHI_disrupt_transportation: "Разрушить Транспортную Систему"
 CHI_disrupt_transportation_desc: "НОАК коснулась земли и теперь использует наши доки и гавани для получения оборудования и припасов, которые затем отправятся к их войскам на фронте для восполнения потерь. Это совершенно неприемлемо. К счастью, наши инженеры успели заложить взрывчатку в основные ключевые сооружения и дороги гаваней перед отступлением, а наши ракеты готовы доставить полезную нагрузку, чтобы вывести порты из строя, вынудив НОАК провести недели ремонта, если им удастся вернуть их в строй. В течение этого периода НОАК будет голодать в своих лагерях и потеряет возможность начать наступление, а у нас будет возможность контратаковать, потенциально уничтожив их небольшие подразделения."
 CHI_hold_the_defence_line: "Держать Оборону"
 CHI_hold_the_defence_line_desc: "В результате упреждающих ракетных и морских бомбардировок наша оборона, организация и связь пришли в полный упадок. Чтобы переломить ситуацию в нашу пользу, мы должны выдержать самые яростные, интенсивные и кровавые наступления первых нескольких недель. Эта задержка станет важной частью восстановления наших материально-технических возможностей и возрождения нашей командной структуры из полного хаоса. Для этого мы сосредоточим наши ресурсы на восстановлении коммуникаций и транспортных связей, а также на том, чтобы наши армии полностью сосредоточились на обороне, а не на поиске рискованных возможностей нанести урон силам НОАК."
 CHI_appeal_to_the_free_world: "Обращение к Свободному Миру"
 CHI_appeal_to_the_free_world_desc: "После того как Соединенные Штаты впали в ужасную междоусобицу, старый международный порядок рушится на наших глазах. Однако это не значит, что демократические силы во всем мире пали вместе с ушедшей сверхдержавой: многие бастионы и маяки по всему миру по-прежнему поддерживают факелы демократии. Некоторые из них готовы поддерживать идеологических союзников, чтобы предотвратить дальнейшее ухудшение своих международных позиций. Поздние союзники вне НАТО, оставшееся НАТО, Южная Корея, Канада и многие другие готовы выступить от нашего имени или даже предпринять действия против деспотичных сил КНР на международном поле боя."
 CHI_military_civilian_duty: "Военно-Гражданская Обязанность"
 CHI_military_civilian_duty_desc: "Наш остров маленький и многолюдный. У нас практически нет стратегической глубины, поэтому домашний фронт - это линия фронта. КНР продемонстрировала свое пренебрежение к безопасности нашего гражданского населения, осуществив столь рискованное вторжение, и, учитывая уже имеющиеся жертвы среди мирного населения, мы можем полностью разрушить риторику пораженцев, утверждающих, что "воссоединение" будет быстрым и бескровным. Убрав их с дороги, мы сможем начать работу по укреплению военно-гражданского единства, позволив нашим людям помогать нам в функционировании общества военного времени."
 CHI_grant_emergency_powers: "Предоставить Чрезвычайные Полномочия"
 CHI_grant_emergency_powers_desc: "Военное время - не время для длительных бюрократических процессов, которые ограничивают возможности исполнительной власти по оперативному реагированию на чрезвычайные ситуации. Когда НОАК окажется у нашего порога, президент объявит чрезвычайное положение, введет военное положение и предоставит военным больше полномочий для контроля над ситуацией. Правоохранительные органы будут временно интегрированы в командные структуры вооруженных сил, чтобы подавить саботаж и протесты коллаборационистов, а также дать им возможность более справедливо и эффективно распределять ресурсы на основе принципа верховенства оружия."
 CHI_engineering_maintenance_brigade: "Инженерно-Эксплуатационная Бригада"
 CHI_engineering_maintenance_brigade_desc: "Пока бомбардировщики и артиллерия НОАК наносят удары по нашей земле, наша экономическая деятельность либо нарушается, либо полностью останавливается. Наиболее пострадавшими отраслями являются строительство и инфраструктура. Опасаясь целенаправленных ударов, которые могут нанести огромный ущерб, строительные фирмы и государственные компании, предоставляющие необходимые услуги, временно приостановили все строительные и ремонтные работы, оставив десятки тысяч рабочих и инженеров без работы, а значит, и без средств к существованию их семей. Чтобы использовать их опыт в своих интересах, мы можем предложить им работу, которая будет считаться прибыльной даже в мирное время, и создать инженерно-эксплуатационную бригаду. Это подразделение сможет оказывать нам поддержку в реализации военно-инженерных проектов, позволяя быстро создавать многослойные укрепления, а также преодолевать суровые условия быстрее, чем коммунистические войска."
 CHI_withdraw_foreign_exchange: "Снятие Средств с Валютного Фонда"
 CHI_withdraw_foreign_exchange_desc: "В то время как наши огромные валютные резервы поддерживают нашу экономику и стабильность валюты в мирное время, глубокие запасы иностранной валюты также могут быть использованы в наших интересах для национальной обороны и экономической стабильности. Извлекая часть наших резервов, мы можем попытаться стабилизировать продолжающуюся финансовую панику, выкупая проданные активы и валюту, чтобы сохранить нашу экономику в рабочем состоянии даже во время войны. Кроме того, их можно использовать для закупки критически важного оборудования, чтобы восполнить потери и сохранить способность наших войск дать отпор захватчикам."
 CHI_unite_the_island: "Объединить Остров"
 CHI_unite_the_island_desc: "Жестокое вторжение коммунистов охватило всех, кто называет этот остров своим домом. От Тайбэя до Гаосюна, от городов до сельских районов, от бетонных лесов до спокойных ферм, от темно-зеленых до темно-синих провинций - ничто не осталось в стороне от полыхающего пламени разрушения, и никто больше не может с уверенностью назвать этот конфликт «не своим делом». Мы должны дать отпор агрессорам. Если они могут подвергать колоссальному риску жизни и благополучие миллионов людей, то можем ли мы рассчитывать на то, что так называемое "воссоединение" станет для нас реальным благом? Остров должен сражаться как единое целое, чтобы иметь шанс на победу, а поражение гарантирует лишение нас свободы, демократии и связи с нашими демократическими союзниками."
 CHI_wolf_pack_tactics: "Тактика Волчьей Стаи"
 CHI_wolf_pack_tactics_desc: "Как островное государство, наша рыбная промышленность процветает, в ней заняты десятки тысяч человек и бесчисленное множество рыболовецких судов. Несмотря на то что конфликт нарушил их бизнес, и все они теперь на неопределенный срок поставлены в док, генеральный штаб предложил уникальный план, чтобы попытаться прорвать блокаду, введенную ВМФНОАК. Мобилизовав и взяв под командование небольшие гражданские суда, мы можем направить их на закупку ресурсов у наших торговых партнеров, чтобы восполнить дефицит. Благодаря небольшим размерам и относительно высокой скорости их не только трудно заметить, но и быстро обезвредить, чтобы не потопить. Хотя они не смогут импортировать достаточно ресурсов, чтобы перезапустить экономику, столь необходимые ресурсы смогут восстановить наши самые жизненно важные службы и поднять боевой дух наших людей."
 CHI_phantom_legions: "Призрачные Легионы"
 CHI_phantom_legions_desc: "Наши военно-воздушные силы сильно уступают многочисленному и современному авиационному флоту НОАК, в результате чего наши войска и ключевые здания постоянно подвергаются атакам ударных самолетов и бомбардировщиков днем и ночью. Хотя мы не можем уничтожить их способность бомбить, мы можем направить их бомбы в другое место. Наше командование выдвинуло интересное предложение: использовать по всему острову ложные объекты, обычно сделанные из воздушных шаров, досок или подобных дешевых материалов, чтобы сбить с толку ВВС НОАК и заставить их тратить боеприпасы на ложные цели. Хотя это может показаться нетрадиционным, наши инженеры сообщили, что они могут заставить это работать - все, что им нужно, это наше разрешение на начало работ."
 CHI_taiwan_still_brave: "Вечный Тайвань"
 CHI_taiwan_still_brave_desc: "Пройдя через самые тяжелые и опасные недели конфликта, мы сумели разрушить первоначальный план НОАК по быстрому разгрому и порабощению нас. Мы не только шокировали международных наблюдателей, предсказывавших наше быстрое поражение, но и народ теперь искренне верит, что победа не является недостижимой, а наши вооруженные силы и гражданские лица теперь стоят вместе, готовые дать отпор агрессору, подрывающему наше право на самоопределение. Наш факел свободы по-прежнему ярко горит, и каждый житель Тайваня может с гордостью сказать, что Тайвань по-прежнему храбр, и мы не сдадимся."

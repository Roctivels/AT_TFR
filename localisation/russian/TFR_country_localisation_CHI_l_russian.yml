 taiwan.1.t: "Непокорный Остров"
 taiwan.1.desc: "Горизонтальные линии городов освещаются ярче, чем обычно, благодаря ослепительным фейерверкам. Исполнители доводят концерты до кульминации, еще больше распаляя толпу. Люди, собравшиеся вокруг самых высоких зданий, с трепетом наблюдают за тем, как сама Луна кажется неподвластной пламени ракет, а те, кто находится в уютных убежищах, радуются тому, что обратный отсчет наконец-то достиг нуля, ознаменовав конец десятилетия.\n\nНаступил 2020 год. Наше лидирующее положение в производстве полупроводников остается неоспоримым. Фондовый рынок взлетел выше, чем когда-либо, а индекс TAIEX почти весь год держится на уровне более 10 000 пунктов. Несмотря на потрясения, вызванные торговой войной между Китаем и США, наша крепкая экономика демонстрирует удивительную устойчивость, а темпы экономического роста держатся на уровне около 3 % на протяжении всего 2019 года.\n\nНовый год также знаменует собой завершение президентских избирательных кампаний. Президент Цай Ин-вэнь претендует на второй срок, в то время как главный лидер оппозиции, скандально известный Хан Куо-ю, продолжает набирать популярность. Джеймс Сунг будет претендовать на президентский пост в пятый раз, хотя он также объявил, что это может быть его последняя попытка.\n\nДипломатически наша страна продолжает терять официальных союзников из-за таких факторов, как расширение глобального влияния материкового Китая, включая его инициативу Пояс и путь. В то же время наша стратегия изменилась в сторону развития теплых, хотя и неофициальных, отношений с крупными державами. Беспорядки в Гонконге еще больше оттолкнули сторонников объединения "
 taiwan.1.a: "Пусть предстоящий путь будет для тебя гладким, Тайвань."

 taiwan.13.t: "Чэн Вэн-цань Побеждает в Тайване!"
 taiwan.13.d: "Отбившись от войск материка в недавней войне, Тайвань объявил, что теперь он снова может проводить свободные выборы в соответствии с конституцией. Поскольку недавняя война вызвала массовую ненависть к материковому Китаю, Гоминьдан потерял значительную часть избирателей, которые обвиняют Гоминьдан в неспособности обеспечить мир или считают их возможными пособниками материкового Китая. В результате ДПП под руководством [CHI.GetLeader] легко выиграла выборы и получила новый срок.\n\nПока все партии признают результаты выборов, новое руководство уже объявляет о планах по восстановлению."

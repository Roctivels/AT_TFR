 taiwan.500.t: "Наша Последняя Война"
 taiwan.500.d: "После нескольких недель подозрительных перемещений ВАОИ и постоянно растущего напряжения в китайско-японской холодной войне, достигшего новой кульминации, многие международные наблюдатели ожидали, что в ближайшем будущем грядет горячая война. Несмотря на то, что ОДТО активизировала свои дипломатические миссии в попытке деэскалации ситуации, Токио и Пекин объявили, что между двумя коалициями теперь существует состояние войны, и мы вынуждены снова бороться за свое существование.\n\nПосле того, как все дипломатические усилия оказались тщетными, перед нами развернулся самый ожесточенный региональный конфликт Азиатско-Тихоокеанского региона. С более чем 3 миллиардами людей, вовлеченных в самую масштабную войну, свидетелем которой человечество было до сих пор, мы не можем реально ожидать, что китайцы просто отступят на этот раз. Либо ОДТО полностью уничтожит китайскую военную машину и ее способность возобновить любой конфликт, либо ВАОИ будет продвигаться вперед, чтобы подчинить себе остальную Азию.\n\nДля нас это уже второй раз в этом веке, когда мы сталкиваемся с экзистенциальной угрозой. Побежденное, но не покоренное, новое китайское правительство, движимое реваншистскими настроениями и вновь обретенными союзниками по всей Азии, несомненно, попытается разрушить наше правительство и уничтожить нашу демократическую систему, как они это сделали в 2021 году. Чтобы обеспечить собственное будущее, мы решили принять участие в Великой азиатской войне, сражаясь бок о бок с нашими демократическими союзниками, чтобы раз и навсегда победить альянс, возглавляемый Пекином."
 taiwan.500.a: "К оружию!"


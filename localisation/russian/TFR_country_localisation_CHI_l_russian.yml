 loc_taiwanese_progressivism: "Тайваньский Прогрессивизм"
 CHI_neoliberalism_desc: "\n\n\n\n£GFX_CHI_ideology_neoliberalism\n\n\n\n\n\n§YТайваньский Прогрессивизм§! это идеология, которой придерживаются Демократическая прогрессивная партия (ДПП), другие пан-зеленые партии и некоторые независимые деятели. Демократическая прогрессивная партия, лидер пан-зеленой коалиции, возникла на основе движения Тангвай, которое началось в середине 1970-х годов. Благодаря своей истории сопротивления опеке Гоминьдана и "белому террору," ДПП считает либеральную демократию, политическую справедливость и эгалитаризм своими основными идеологиями. Эти ценности впоследствии были унаследованы широким тайваньским прогрессивным движением. С годами оно также вобрало в себя антикоммунистические идеи из-за растущей враждебности китайской коммунистической партии и выступает за отделение Тайваня от материкового Китая.\n\nСегодня тайваньский прогрессивизм выступает за множество целей, включая социальную свободу и равенство, экологическую устойчивость, права ЛГБТ+ и независимость Тайваня, и остается важным движением в тайваньской политике."
 loc_taiwanese_conservatism: "Тайваньский Консерватизм"
 CHI_constitutionalist_desc: "\n\n\n\n£GFX_CHI_ideology_constitutionalism\n\n\n\n\n\n§YТайваньский Конституционализм§!, поддерживаемый Гоминьданом, Первой Народной Партией и несколькими независимыми деятелями, представляет собой локализованную форму конституционализма, которая поддерживает продолжение существования Китайской Республики, либерально-консервативную социальную политику и умеренные отношения с материковым Китаем. Изначально опираясь на Три принципа народа и социальный консерватизм, тайваньский конституционализм с годами принял более либеральный подход, чтобы оставаться конкурентоспособным в Тайване после военного положения.\n\nСегодня тайваньский конституционализм характеризуется, прежде всего, протекционистской экономической политикой, китайским национализмом, центристской социальной политикой и постепенно ослабевающим антикоммунизмом, унаследованным от чангизма, и остается одной из крупнейших фракций в тайваньской политике."
 loc_taiwanese_OCTS_democracy: "Демократия "Одна Страна, Две Системы""
 CHI_market_socialism_desc: "\n\n\n\n£GFX_CHI_ideology_market_socialism\n\n\n\n\n\nНа первый взгляд, идея §Y"Одна страна - две системы"§! может показаться причудливым политическим экспериментом или необычным планом по подрыву национального суверенитета. Однако в прибрежных городах Восточной Азии эта уникальная политическая система существует уже почти сорок лет. Она была задумана в то время, когда экономическая мощь и политическое влияние Китая были еще относительно слабыми. Это был прагматичный ответ, призванный уравновесить острый конфликт между социализмом и капитализмом. В рамках этой системы Специальный административный район сохраняет тот же суверенитет, что и центральное правительство, но пользуется значительной автономией, имея право создавать собственные органы власти и законодательные учреждения. Это позволяет практически неограниченно разрабатывать и проводить политику. В отличие от традиционных конфедераций, где государства-члены часто обладают значительной автономией, Специальный административный район, как правило, ограничивается одним городом, что сводит к минимуму риск дестабилизации союза из-за сепаратистских настроений.\n\nСегодня, когда баланс сил и политический климат изменились, логика "Одна страна - две системы" претерпела изменения. Изначально созданная для защиты и разделения, сегодня она стала платформой для более глубоких многосторонних обменов. Концепция "Одна страна - две системы" - это важнейшая основа для мирного сосуществования людей с разными идеологиями, содействия взаимодействию и интеграции различных политических и экономических систем и, в конечном счете, для укрепления гармонии ценностей."
 loc_taiwanese_liberal_populism: "Либеральный Популизм"
 taiwanese_liberal_populism: "Либеральный Популизм"
 taiwanese_liberal_populism_desc: "Тайваньский либеральный популизм - это разновидность либерального консерватизма, который делает акцент на завоевании избирательных бюллетеней путем реализации потребностей народа, активного предоставления услуг и улучшения условий жизни менее обеспеченных слоев общества.\n\nПоскольку идеология делает акцент на обеспечении выборов, ее часто называют "беспринципной" и неспособной четко определить свои границы. Вместо того чтобы называть ее "идеологией", многие предпочитают называть ее избирательной стратегией, чтобы лучше отразить ее истинную природу."
 loc_taiwanese_reformed_tridemism: "Реформированный Тридемизм"
 reformed_tridemism: "Реформированный Тридемизм"
 reformed_tridemism_desc: "Тридемизм, или Принципы Народа, состоит из трех одинаково важных компонентов: Национализм, Демократия и Велфаризм.\n\nК началу XXI века первоначальная форма тридемизма начала демонстрировать свою неспособность управлять современным обществом. Это подтолкнуло многих к реформированной версии идеологии.\n\nПо сравнению со своим предшественником, реформированный тридемизм уменьшает значение национализма, делая акцент на расширении велфаризма, считая его наиболее важным компонентом модернизированной идеологии. С другой стороны, демократия, которая теперь считается основной потребностью народа, включается в более широкую концепцию велфаризма, оставляя велфаризм единственным акцентом реформированного тридемизма."


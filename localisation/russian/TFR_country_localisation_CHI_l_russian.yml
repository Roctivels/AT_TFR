 CHI_the_mainland_conflict_category_desc: "Мы официально известны как Китайская Республика, хотя мы контролируем только остров Тайвань, который вызвал много проблем в нашей стране."
 CHI_test_of_will: "Испытание Воли"
 CHI_test_of_will_desc: "\n\n\n\n\n£GFX_CHI_test_of_will_banner \n\n\n\n\n\n\nБолее 70 лет назад завершилась кровопролитная гражданская война в Китае. Наш народ десятилетиями наслаждался миром и процветанием, но это не могло продолжаться вечно. Мир меняется, радикализируется, горит, и, похоже, мы станем одной из первых жертв этих тяжелых обстоятельств.\nСтарые забытые угли гражданской войны разгораются с новой силой, и пройдет совсем немного времени, прежде чем нам придется отстаивать свою жизнь.\n§3                                    Наше солнце никогда не должно померкнуть.§!"

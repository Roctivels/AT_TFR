 taiwan.25.t: "Седьмой Флот Остается в Тайваньском Проливе"
 taiwan.25.d: "После начала гражданской войны на континентальной части Соединенных Штатов международное сообщество продолжает следить за состоянием американских военных подразделений за рубежом.  Недавно некоторые корабли Седьмого флота США продолжали действовать вблизи Тайваньского пролива, что привело к осложнению ситуации в регионе.\n\nПредставитель Министерства обороны Китая заявил, что, несмотря на внутренние беспорядки, США продолжают провоцировать инциденты из-за тайваньского вопроса, нарушая принцип "Единого Китая", вмешиваясь во внутренние дела Китая и подрывая мир и стабильность в регионе. Пресс-секретарь также подтвердил, что Тайвань является неотъемлемой частью Китая. Народно-освободительная армия остается в состоянии повышенной боевой готовности и решительно противостоит любым провокационным действиям, чтобы защитить национальный суверенитет и территориальную целостность.\n\nСедьмой флот заявил, что его операции в Индо-Тихоокеанском регионе будут "продолжаться в обычном режиме," подчеркнув свободу навигации и заявив, что он будет продолжать осуществлять деятельность в водах, разрешенных международным правом. Министерство обороны США подчеркнуло, что миссия Седьмого флота "остается незатронутой внутренними обстоятельствами"\n\nЭксперты критикуют Седьмой флот за то, что он продолжает сохранять свое присутствие в районе Тайваньского пролива, что увеличивает неопределенность и риск неправильной оценки ситуации."
 taiwan.25.a: "Почему Седьмой флот все еще находится в Тайваньском проливе?"
 taiwan.26.t: "Седьмой Флот Остается в Тайваньском Проливе."
 taiwan.26.d: "После начала гражданской войны на континентальной части Соединенных Штатов международное сообщество продолжает следить за состоянием американских военных подразделений за рубежом. Недавно некоторые корабли Седьмого флота США продолжили действовать вблизи Тайваньского пролива, что привело к осложнению региональной ситуации.\n\nПредставитель Министерства обороны Китая заявил, что, несмотря на внутренние беспорядки, США продолжают провоцировать инциденты из-за тайваньского вопроса, нарушая принцип "Единого Китая", вмешиваясь во внутренние дела Китая и подрывая мир и стабильность в регионе. Пресс-секретарь также подтвердил, что Тайвань является неотъемлемой частью Китая. Народно-освободительная армия остается в состоянии повышенной боевой готовности и решительно противостоит любым провокационным действиям, чтобы защитить национальный суверенитет и территориальную целостность.\n\nСедьмой флот заявил, что его операции в Индо-Тихоокеанском регионе будут "продолжаться в обычном режиме", подчеркнув свободу навигации и заявив, что он будет продолжать осуществлять деятельность в водах, разрешенных международным правом. Министерство обороны США подчеркнуло, что миссия Седьмого флота "остается незатронутой внутренними обстоятельствами."\n\nЭксперты критиковали Седьмой флот за то, что он продолжает сохранять свое присутствие в районе Тайваньского пролива, что увеличивает неопределенность и риск неправильной оценки ситуации."
 taiwan.26.a: "Почему Седьмой флот все еще находится в Тайваньском проливе?"
 taiwan.27.t: "Напряжение Между Китаем и Тайванем Нарастает"
 taiwan.27.d: "Долго не дававший покоя Тайваньский пролив вновь оказался в центре внимания международного сообщества. После успешного переизбрания Цай Ин-вэнь на всеобщих выборах в Тайване в 2020 году Народно-освободительная армия (НОАК) быстро усилила военное давление на остров, начав в феврале широкомасштабную операцию вокруг Тайваня. По сообщениям тайваньских властей, около 40 самолетов НОАК совершали строевые полеты, причем некоторые из них ненадолго пересекали демаркационную линию, что вызвало повышенную тревогу по обе стороны пролива.\n\nЭтот военный маневр был истолкован как жесткий ответ администрации Цай на отказ от "Консенсуса 1992 года" и ее твердую позицию в отношении самобытности Тайваня. Министерство национальной обороны Тайваня незамедлительно подняло в воздух истребители для наблюдения и отражения вторжения самолетов, приведя органы национальной безопасности в состояние повышенной готовности. Тем временем правительство Тайбэя призвало Пекин прекратить провокации и возобновить мирный межпространственный диалог.\n\nОднако Пекин заявил, что операция является необходимой контрмерой против "сторонников независимости" и иностранного вмешательства, утверждая, что она направлена на защиту национального суверенитета и территориальной целостности. Этот шаг вызвал широкую озабоченность и беспокойство международного сообщества. Эксперты предупреждают, что без эффективных механизмов диалога и антикризисного управления Тайваньский пролив может столкнуться с длительной нестабильностью и эскалацией рисков."
 taiwan.27.a: "В 1962 году это была Куба, в 2020-м - Тайвань."
 taiwan.28.t: "Ослабление Напряженности Между Китаем и Тайванем"
 taiwan.28.d: "Итоги всеобщих выборов на Тайване в 2020 году оказались, мягко говоря, неожиданными. Кандидат от Гоминьдана Хань Гоюй одержал победу над фаворитом, действующим лидером Цай Ин-вэнь, и выиграл выборы с небольшим преимуществом, став новым лидером Тайваня. Как только результаты выборов были объявлены, они сразу же привлекли внимание и ошеломили жителей Тайваня.\n\nПобеда была интерпретирована международными СМИ как отражение резких колебаний общественного мнения на Тайване. Эксперты отмечали, что экономические трудности и трудности с обеспечением средств к существованию, обострение политического противостояния и недовольство политикой нынешнего правительства в отношении межпроливных отношений стали доминирующими причинами обращения избирателей к консервативным силам. В лагере Хань Гоюй утверждают, что эта победа - "стремление народа к хлебу и миру."\n\nМатериковый Китай выразил "позитивную оценку" результатов выборов, продемонстрировал жест доброй воли и готовность возобновить консультации и обмены на основе "Консенсуса 1992 года". Тайбэй вступил в стадию политической реорганизации, а руководство ДПП провело экстренное совещание.\n\nМеждународное сообщество обращает внимание на сложившуюся ситуацию и призывает новое правительство Тайваня сохранить статус-кво и мир в регионе. Правительства Японии, Великобритании и других союзников по НАТО призвали к "рациональному переходу", чтобы не допустить распространения нестабильности на Индо-Тихоокеанский регион."
 taiwan.28.a: "...Луч Надежды?"
 taiwan.29.t: "Материк решительно выступает против победы ДПП"
 taiwan.29.d: "Всеобщие выборы в Тайване 2020 года подошли к концу, и Цай Ин-вэнь, кандидат от Демократической прогрессивной партии, заявила о своей победе. Соответствующие ведомства материка торжественно подтвердили, что Тайвань с древних времен принадлежал Китаю, и государство никогда не позволит «независимости Тайваня» расколоть страну и сепаратистским силам заставить Тайвань отделиться от Китая под любым названием и любыми средствами.\n\nПредставитель Управления по делам Тайваня Госсовета сурово осудил власти ДПП за отказ признать "Консенсусу 1992 года," открытый вызов принципу "Единого Китая" и серьезный подрыв мира и стабильности в Тайваньском проливе. Пресс-секретарь подчеркнул, что родина обладает твердой волей, полной уверенностью и достаточным потенциалом для пресечения сепаратистских попыток "независимости Тайваня" в любой форме.\n\nПекин подчеркнул, что тайваньский вопрос является частью внутренних дел Китая, и любое вмешательство внешних сил будет решительно пресекаться. Материк предупредил, что любые сговоры и провокации между силами "независимости Тайваня" и внешними силами будут эффективно пресекаться.\n\nАналитики отметили, что хотя ДПП продолжает упорно продвигать свою сепаратистскую позицию, историческая тенденция необратима, воссоединение родины неостановимо, и любой акт предательства нации закончится полным провалом."
 taiwan.29.a: "Мы будем продолжать следить за ситуацией в Тайваньском проливе и решительно поддерживать все справедливые усилия по сохранению национального единства."
 taiwan.291.t: "США Опубликовало Заявление по Тайваньскому Проливу"
 taiwan.291.d: "В связи с ростом напряженности в Тайваньском проливе Государственный департамент США выступил с заявлением, в котором подтвердил свою позицию "против любых односторонних изменений статус-кво». \n\nВ заявлении подчеркивается, что «политика США в отношении Тайваня остается неизменной», и Вашингтон поддерживает Закон об отношениях с Тайванем и "Шесть заверений". США призывают обе стороны "проявлять сдержанность и избегать ошибочных суждений."\n\nПредставитель Госдепартамента заявил: "Мы глубоко обеспокоены недавним ростом напряженности в Тайваньском проливе." "Мы вновь заявляем, что мир и стабильность служат общим интересам международного сообщества. Мы призываем все стороны воздерживаться от односторонних действий, в частности, от применения силы или принуждения, которые чреваты эскалацией."\n\nНесколько судов сохранили свое присутствие в западной части Тихого океана в рамках "обычных операций по обеспечению свободы навигации." Хотя Пекин критикует этот шаг как "вмешательство во внутренние дела," американские чиновники утверждают, что такие операции "полностью соответствуют международному праву и не связаны с текущими региональными событиями.""
 taiwan.291.a: "Вашингтон отвергает любое силовое изменение статуса-кво!"
 taiwan.292.t: "Трамп Объявляет о Военной Помощи Тайваню"
 taiwan.292.d: "В то время как ситуация в Тайваньском проливе продолжает оставаться напряженной, президент Дональд Трамп во время пресс-конференции объявил об "историческом пакете оборонительной помощи" Тайваню.\n\nПакет включает в себя зенитные ракеты, радарные системы, беспилотники и "ограниченное количество противокорабельного оружия." Трамп заявил: "Тайвань борется за свободу. Америка не останется в стороне."\n\nЭто заявление привлекло бы внимание мировой общественности. Хотя двухпартийные голоса в Конгрессе выразили поддержку, Министерство иностранных дел Китая резко осудило это заявление и предупредило Вашингтон "не играть с огнем."\n\nПентагон отметил, что "изучает логистику потенциальных поставок," но подчеркнул, что "любая военная поддержка Тайваня будет носить оборонительный характер и основываться на существующей правовой базе.""
 taiwan.292.a: "Огонь Поднимается в Проливе!"
 taiwan.293.t: "Визит Пелоси на Тайвань"
 taiwan.293.d: "Спикер Палаты представителей США Нэнси Пелоси прибыла в Тайбэй на военном самолете и выступила с речью в законодательном собрании острова. В своем выступлении она подчеркнула, что Америка "поддерживает демократическую систему Тайваня", заявила, что "Тайвань не одинок", и призвала к углублению американо-тайваньских связей.\n\n В ответ командование Восточного театра военных действий НОАК объявило о начале «учений с реальными боевыми действиями вокруг острова». Многочисленные военно-морские и военно-воздушные подразделения провели масштабные учения с боевой стрельбой вокруг Тайваня, имитируя совместные блокады, прорывные удары и операции по отторжению территории. Несколько ракет пролетели над островом, что заставило Тайвань поднять боевую готовность ПВО до самого высокого уровня.\n\nХотя Белый дом попытался преуменьшить значение визита как "личной поездки спикера", международные наблюдатели широко расценили его как серьезную эскалацию напряженности в отношениях между США и Китаем."
 taiwan.293.a: "Буря пришла."
 taiwan.30.t: "Учения НОАК Усиливают Напряженность"
 taiwan.30.d: "Ситуация по ту сторону Тайваньского пролива содрогнулась от недавних крупномасштабных военных учений Народно-освободительной армии (НОАК) в Тайваньском проливе и прилегающих к нему морских и воздушных районах. Тематика учений включает совместное управление, нанесение дальних ударов и скоординированные операции на море и в воздухе, и знаменует собой одну из самых интенсивных реальных боевых тренировок за последние годы.\n\nПредставитель Министерства национальной обороны заявил, что такие учения являются необходимым ответом на текущие изменения в ситуации через Тайваньский пролив, направленные на защиту национального суверенитета и территориальной целостности и поддержание мира и региона. Представитель подчеркнул, что НОАК продолжит повышать свою боеспособность и противостоять всем провокациям сепаратистов и внешнему вмешательству.\n\nТайваньские власти обвиняют материк в "эскалации региональной напряженности", а министерство обороны в Тайбэе заявляет, что внимательно следит за учениями и повышает свою боеготовность, чтобы предотвратить "неожиданные инциденты.""
 taiwan.30.a: "Мы будем продолжать следить за действиями НОАК."
 taiwan.30.b: "Такие действия необходимы для того, чтобы сдержать попытки Тайваня обрести независимость."
 taiwan.31.t: ""
 taiwan.31.d: ""
 taiwan.31.a: ""
 taiwan.32.t: "В конце концов... Мы стоим!"
 taiwan.32.d: "Несмотря на самое страшное испытание, выпавшее на нашу долю, наш народ выстоял и победил в этом ужасном конфликте.\nОстров Надежды стоит неподвижно, как непоколебимая гора."
 taiwan.32.a: "И наши люди идут по дороге жизни."
 taiwan.33.t: "Вторая Волна Ракетных Ударов!"
 taiwan.33.d: "Война жизни и смерти снова вернулась в Республику.\n\nПрошло всего несколько дней после начала кризиса Четвертого пролива, и ракеты с материка впервые поразили наши ключевые объекты инфраструктуры и города. Пока Министерство национальной обороны в спешном порядке мобилизует резервистов и готовится к обороне, на нас обрушилась вторая волна ракетных ударов, на этот раз разрушив наши административные и коммуникационные возможности.\n\nНо немногие уцелевшие радарные станции зафиксировали нечто гораздо более ужасающее: бесчисленные десантные корабли и их эскорт стремительно приближаются к нашим берегам, сигнализируя о скором вторжении. Это может означать только одно: кризис Четвертого пролива закончился, война на Тайване началась.\n\nНесмотря на отсутствие Соединенных Штатов, мы не одиноки. Силы интервенции из ОДТО теперь помогают нам в обороне во всех секторах, стоя плечом к плечу с нами на посадочных площадках, чтобы отразить любые войска, которые осмелятся бросить вызов нашей территориальной целостности.\n\nМы должны сражаться и оставаться непокоренными против Красного Гиганта. Если мы потерпим неудачу, горящий факел китайской демократии будет навсегда потушен."
 taiwan.33.a: "Встань и сражайся!"
 taiwan.34.t: "Письмо из Министерства Национальной Обороны"
 taiwan.34.d: "Получатель: Президентская Канцелярия\nПриоритет: Высший приоритет\nТема: Текущее состояние нашей национальной обороны\n\nНаша главная цель - предотвратить продвижение Народно-освободительной армии на Тайвань - провалилась. НОАК воспользовалась уязвимостями в нашей обороне и теперь контролирует несколько крупных городов и портов, серьезно подорвав наши военные усилия. Не достигнув этой цели, мы больше не можем ограничивать конфликт береговой линией и вынуждены вести боевые действия в городской и горной местности.\n\nНОАК достигла нашей второй линии обороны, окружая оставшиеся города и горные хребты, что может быть использовано в наших интересах при обороне из-за сложности городской и горной среды. Наша армия уже создала оборонительные позиции вокруг городов, контролируемых КНР, и имеет больше возможностей для того, чтобы остановить дальнейшее продвижение НОАК.\n\nВ ходе этого конфликта ОДТО также понесла большие потери. Это привело к неожиданному психологическому воздействию как на гражданское население, так и на вооруженные силы. Признавая, что ОДТО действительно наши братья по оружию, мы получили приток гражданских добровольцев, поддерживающих нашу подготовку к обороне и логистику. Это укрепило наш моральный дух и обороноспособность, и командиры сообщают, что готовность и боеготовность наших сухопутных войск высока как никогда."
 taiwan.34.a: "Мы обязательно победим..."
 taiwan.35.t: "Афтершок"
 taiwan.35.d: "6:27 AM. "[Оповещение ПВО] Приближается вражеский самолет. Немедленно ищите укрытие". На четвертой неделе после внезапного прекращения занятий в школе Кай Чи-ли просыпается от очередного пронзительного предупреждения о воздушном налете, сопровождаемого густыми облаками в небе, готовом вот-вот пролиться бомбовым дождем. Три F-16 с ревом поднимаются в небо на перехват, почти заглушая крики полицейских: "Не пользуйтесь лифтом, поднимайтесь по лестнице!"\n\n6:50 утра. "[Оповещение ПВО] Оповещение ПВО снято. Сообщайте о неизвестных объектах в полицию или пожарным". Грохот прекращается, и люди, ищущие убежище, организованно выходят, чтобы приступить к своим военным делам. Кай спешит в FamilyMart, где он работает, чтобы подготовиться к своей смене в 8 утра. Дюжина покупателей уже ждет на улице, держа в руках купюры, монеты и талоны на питание, выданные правительством. Сегодня ничего необычного, кроме того, что ему поручили обучить стажера собирать использованные марки.\n\n2:00 PM. "Уведомление о солнечном времени CWA - сегодня достаточно солнечного света до 18:35". "Менеджер Чен - напечатайте 100 копий и раздайте их. Запрошено правительством. PA20018583.pdf". Два часа назад у него еще теплилась надежда, что солнечный свет прорвется, но обновление CWA подтвердило это - короткой смены сегодня не будет. Разочарованный, он просит стажера распечатать листовки, пока он вернется к кассе после небольшого перерыва.\n\n6:50 PM. Гражданский интернет-трафик ограничен провайдерами для экономии пропускной способности и электроэнергии. Уличные фонари ненадолго загораются, чтобы предотвратить несчастные случаи, хотя автомобили теперь редко встречаются из-за дефицита топлива. Идя домой, Кай замечает киоск с зеленой камуфляжной скатертью, как на школьных фестивалях. Любопытствуя, он подходит к нему. Менеджер стенда машет ему рукой. «Мы организуем группы гражданской обороны», - говорит он. «Присоединяйтесь к нашим тренировочным программам по выявлению НРБ и лечению травм, чтобы поддержать наших пожарных и парамедиков.»\n\n6:52 PM. Кай берет в руки брошюру и читает. Поддерживается правительством, добровольно, без оружия, не ополчение и не пушечное мясо. FAQ отвечает на большинство его вопросов. После паузы он вдыхает.\n\n6:57 PM."
 taiwan.35.a: "Когда Же Мне Приступать?"
 taiwan_detente.0.t: "Гоминьдан Побеждает в Тайване"
 taiwan_detente.0.d: "Тема, которая в последнее время стремительно распространяется по нашим социальным сетям, - это завершение местных выборов в Тайване, на которых народ избрал Хань Гоюй административным лидером сепаратистского региона. Некоторые отмечают неприятие радикальных сторонников независимости Тайваня, в то время как часть пользователей Сети ставит под сомнение легитимность этих местных выборов.\n\nУправление по делам Тайваня практически не прокомментировало этот вопрос, за исключением повторения того, что "президентские" выборы - это всего лишь местные выборы и что иностранные державы не должны вмешиваться в наши внутренние дела. Однако, как сообщается, некоторые члены правительства с облегчением восприняли победу Гоминьдана, поскольку партия более склонна сотрудничать с нами и поддерживать теплые отношения. Значительная часть людей все еще сомневается в стремлении Хан Гоюй восстановить контакты, но со смещением генерального прокурора процесс, по крайней мере, будет более плавным."
 taiwan_detente.0.a: "Мы надеемся, что они образумятся."
 taiwan_detente.1.t: "Оливковая Ветвь Материку"
 taiwan_detente.1.d: "После завершения наших выборов и назначения министров мы можем, наконец, приступить к делу. Одним из наиболее важных пунктов нашей повестки дня является отказ от политики администрации Цай Инвэнь держаться на расстоянии от материковой части страны. Эта политика материковой части Китая нанесла серьезный ущерб нашей индустрии туризма и сельского хозяйства, поскольку материк не только ввел многочисленные запреты на различные товары, но и ужесточил туристический контроль, сократив число туристов с материковой части Китая, посещающих наши острова. Что еще хуже, КПК неоднократно угрожала правительству Демократической партии, сея нестабильность и панику среди нашего народа.\n\nЧтобы исправить нанесенный ущерб, Совет по делам материка в первую очередь должен обратить вспять холодные отношения между нами и Материком. Возобновляя переговоры и проводя саммиты, мы сделаем все возможное, чтобы протянуть оливковую ветвь материковой части, надеясь, что они будут готовы стремиться к миру и снова сотрудничать с нами."
 taiwan_detente.1.a: "Новая эра взаимодействия через пролив."
 taiwan_detente.2.t: "Администрация Гоминьдана Стремится к Примирению"
 taiwan_detente.2.d: "Недавно до нашего сведения дошло, что Совет по делам материка, который де-факто был упразднен с тех пор, как радикальные сепаратистские партии взяли власть в свои руки, обратился к нам через Фонд обмена проливами с просьбой о восстановлении дипломатических отношений между нашими сторонами. Несколько представителей с их стороны начали связываться со своими коллегами с нашей стороны, чтобы договориться о возможных предварительных встречах, в первую очередь направленных на обсуждение более официальных и всеобъемлющих конференций в будущем.\n\nНаше правительство отреагировало положительно. Согласно сообщениям, Управление по делам Тайваня в частном порядке одобрило дипломатические разрешения на въезд для нескольких тайваньских представителей, но воздержалось от дальнейших публичных комментариев до тех пор, пока между нами и Тайванем не будет найдено больше точек соприкосновения. Хотя мы не возлагаем больших надежд на мирную реинтеграцию Тайваня, мы хотим, чтобы эти саммиты послужили отправной точкой для того, чтобы тайваньский народ вновь осознал наше общее братство."
 taiwan_detente.2.a: "Понятно."
 taiwan_detente.3.t: "Краеугольный Камень Согласия"
 taiwan_detente.3.d: "Отличные новости от наших сторонников мира из Совета по делам Тайваня! Похоже, что Фонд Straits Exchange Foundation успешно связался с аратами на материке - предположительно, при молчаливом согласии Управления по делам Тайваня - и достиг основных договоренностей для проведения дальнейших конференций. Один из них включает в себя информирование другой стороны о том, что действующее правительство открыто для признания Консенсуса 1992 года, который был основой всех наших мирных контактов со времен бывшего президента Ли Тен Хуэя, включая встречу Ма Си - самую важную со времен переговоров в Чунцине в 1945 году. Благодаря доброй воле наших братьев по ту сторону пролива, мы можем начать подготовку к более открытым мероприятиям низкого уровня, чтобы снизить враждебность общественности к материку, прежде чем проводить крупные саммиты для обсуждения более широких политических и экономических вопросов. Мы извлекем уроки из провала CSSTA и избежим провоцирования антиконтинентальных настроений, которые дали оппозиции почву для движения "Подсолнух" в 2014 году."
 taiwan_detente.3.a: "Великолепно!"
 taiwan_detente.4.t: "Конференция в Сямыне"
 taiwan_detente.4.d: "После положительных отзывов наших коллег по ту сторону пролива Министерство внутренних дел и Совет по делам материка мобилизовали свои усилия, чтобы растопить лед между нами и материком. Недавний опрос показал, что две трети респондентов поддерживают возобновление переговоров или не возражают против этого. С одобрения президента представители совета по делам материка отправились в Сямынь, где их тепло встретили официальные лица материковой части страны.\n\nКонференция занимала центральное место в заголовках газет, среди которых выделялись три ключевых события: торжественное открытие, отмена запретов на импорт ряда сельскохозяйственных продуктов, ранее введенных в ответ на враждебную политику Цай Инвэнь, и обсуждение нового вируса COVID-19. Континентальная часть также согласилась выступить в качестве посредника, поделившись с нами информацией ВОЗ и передав взамен наши обновленные данные.\n\nЭто мероприятие считается большим успехом администрации президента Ма, и в планах совет по делам материка - проведение новых встреч. Ожидается, что представители материковой части Китая также вскоре посетят Цзиньмэнь в целях развития туризма, что еще больше укрепит регион как оплот поддержки Гоминьдана."
 taiwan_detente.4.a: "Впереди светлое будущее."
 taiwan_detente.5.t: "Только на Формозу"
 taiwan_detente.5.d: ""Объявлена окончательная посадка на рейс BR721 до Тайбэя. Всех остальных пассажиров просим немедленно пройти к выходу №3".\n\nОбъявление эхом разносится по терминалу, когда Хуан Фуцзи устремляется к выходу № 3, держа в руках паспорт и авиабилет, все еще отдышавшись после спринта. После короткой проверки он садится в самолет.\n\nПока ревут двигатели и земля уходит из-под ног, он открывает свой телефон и читает скриншот с веб-сайта Управления по делам Тайваня, просматривая инструкции о том, что делать и чего избегать при индивидуальном посещении Тайваня. Тщательно все планируя, он составил подробный маршрут с точностью до минуты, но при этом оставил запас времени между остановками, основываясь на прошлом опыте.\n\nВ аэропорту по телевизору транслируют новости об успешной конференции в Шанхае, в результате которой на материковой части страны возобновили программу индивидуальных поездок. Но Хуанга это не интересует - его взгляд прикован к экрану выдачи багажа, ему не терпится начать свое долгожданное турне.\n\nС наступлением ночи он возвращается в тот же отель, в котором останавливался семь лет назад, только на этот раз здесь нет ни гидов, ни шумных попутчиков по экскурсионной группе, и никто не торопит расписание. На рассвете он планирует посетить традиционные уличные рынки и зоопарк Мужа, надеясь увидеть панд и других экзотических животных."
 taiwan_detente.5.a: "Счастливого пути."
 taiwan_detente.6.t: "Сингапурские Переговоры"
 taiwan_detente.6.d: "При содействии правительства Сингапура представители материковой части Страны и Тайваня недавно начали официальную встречу в Сингапуре для обсуждения отношений по обе стороны пролива. На встрече присутствовали представители Гоминьдана, в то время как представители материковой части состояли из должностных лиц Управления по делам Тайваня Государственного совета.\n\nОсновываясь на принципах равенства, уважения, откладывания в долгий ящик разногласий, споров и поиска точек соприкосновения при сохранении разногласий, обе стороны поддерживали углубленное общение по таким вопросам, как экономическое сотрудничество по обе стороны пролива, содействие обмену персоналом и поддержание регионального мира и стабильности. Диалог проходил в позитивной атмосфере, отражая общую готовность к возобновлению диалога и улучшению отношений.\n\nМинистерство иностранных дел Сингапура приветствовало выбор обеими сторонами Сингапура в качестве нейтрального места для диалога и обменов, надеясь, что эта встреча поможет ослабить напряженность и будет способствовать миру и стабильности в регионе."
 taiwan_detente.6.a: "Давайте посмотрим, чем это закончится."
 taiwan_detente.7.t: "Активизируются Дискуссии о Объединении"
 taiwan_detente.7.d: "До начала гражданской войны в Соединенных Штатах ситуация ухудшилась, и в международной дипломатии появились явные признаки перемен. По мере усиления внутренних социальных противоречий в США и частых препятствий в работе правительства влияние Соединенных Штатов в международных делах продолжало снижаться.\n\nНа этом фоне материковый Китай усилил свой контроль над окружающей ситуацией. Тем временем на Тайване появились различные голоса, и некоторые ведущие политические партии призвали пересмотреть направление развития межпространственных отношений, чтобы избежать маргинализации в процессе реорганизации международных сил.\n\nВскоре после того, как в США официально началась гражданская война, способность американского правительства вмешиваться за рубежом внезапно снизилась, и в ситуации с безопасностью в Азиатско-Тихоокеанском регионе образовалась серьезная брешь. Материковый Китай дал понять, что будет твердо продвигать процесс национального воссоединения, решительно противостоять любым формам сепаратистского поведения и подчеркивать, что его решимость защищать национальный суверенитет и территориальную целостность не изменится.\n\nНа Тайване во времена политических потрясений основные силы, такие как Гоминьдан, призывали к более прагматичному отношению к реальности по обе стороны пролива и выступали за поиск новых договоренностей путем мирных переговоров."
 taiwan_detente.7.a: "Все подходит к концу?"
 taiwan_detente.8.t: "Тема Объединения Поднята на Сингапурских Переговорах"
 taiwan_detente.8.d: "Делегации материка и Тайваня собрались на этой неделе для нового раунда переговоров, координируемых правительством Сингапура. Встреча состоялась во время гражданского конфликта в США, изменившего динамику в Азиатско-Тихоокеанском регионе и привлекшего широкое международное внимание.\n\nВ ходе обсуждений делегация материка официально предложила ускорить процесс межпроливного объединения, призвав к созданию механизма регулярного общения и предметного диалога о потенциальных рамках объединения. Представители заявили, что «достижение полного национального воссоединения является общим стремлением 1,4 миллиарда человек и важнейшим шагом в великом омоложении китайской нации», подчеркнув необходимость воспользоваться нынешней исторической возможностью.\n\nТайваньская делегация, возглавляемая Гоминьданом, сохраняет осторожную позицию. Подтверждая свою приверженность мирному урегулированию межпространственных отношений, она придерживается «открытой, но сдержанной» позиции в отношении объединения, подчеркивая важность сохранения образа жизни, социальной системы и основных интересов народа Тайваня.\n\nВпервые за многие годы вопрос об объединении вернулся за стол переговоров в качестве официального пункта повестки дня. Хотя дальнейший путь остается неопределенным, сам акт диалога имеет стратегический вес.\n\nПовестка дня объединения поднята на сингапурских переговорах между двумя странами."
 taiwan_detente.8.a: "Объединение Между Проливами - Неизбежная Тенденция."
 taiwan_detente.9.t: "Сингапурские Переговоры Провалились"
 taiwan_detente.9.d: "Сегодня в Сингапуре состоялся официальный разрыв переговоров между материком и Тайванем. Обе стороны не смогли сгладить критические разногласия по поводу объединения и его политических механизмов.\n\nДелегация материка подчеркнула настоятельную необходимость воспользоваться текущим геополитическим окном для продвижения национального объединения. Предложения включали создание официального механизма связи и обсуждение поэтапной «дорожной карты». Представители материка вновь заявили, что «мирное воссоединение остается самой искренней целью, но никакие варианты не исключены»\n\nТайваньская делегация, возглавляемая Гоминьданом, решительно отказалась вступать в какой-либо этап структурированных переговоров по объединению. Ссылаясь на отсутствие консенсуса на Тайване, делегаты выразили сильную обеспокоенность тем, что материк настаивает на "концепции одной страны", и вместо этого призвали к "прагматичному взаимодействию и укреплению доверия до любых политических дискуссий"\n\n Встреча завершилась менее чем через два часа, без брифинга для прессы, и обе делегации уехали раньше времени без официальных заявлений. Министерство иностранных дел Сингапура выразило сожаление по поводу результатов встречи и призывает обе стороны держать каналы связи открытыми, избегая эскалации риторики или ошибочных суждений.\n\n Сингапурские переговоры провалились, обе стороны ушли разделенными"
 taiwan_detente.9.a: "Мы должны были хотя бы попытаться пройти этот путь."
 taiwan_detente.10.t: "Окончательное Решение"
 taiwan_detente.10.d: "Поздно вечером в Чжуннаньхае Си Цзиньпин в одиночестве сидел в кабинете в зале Циньчжэн. Перед ним лежала выцветшая карта Тайваньского пролива. В суровом свете морские линии прочерчивали изломы истории.\n\nДоклады Объединенного штаба и Центральной военной комиссии неоднократно подтверждали: ключевое время для мирного воссоединения ушло. Общественное мнение на острове было глубоко расколото, а иностранное вмешательство продолжало усиливаться. Ждать дальше означало бы полностью потерять стратегическую инициативу.\n\nВ течение десяти лет он избегал конфронтации, стремился к стабильному международному порядку и снижал риски. Но теперь время превратилось в его самого грозного врага. Воссоединение больше не было политическим выбором; это было решение жизни и смерти для целостности и будущего нации. Он понимал цену и последствия жертв на поле боя, экономических потрясений, растущего международного давления и даже серьезных политических рисков. Но история не будет ждать.\n\n"Риск?" Он посмотрел в ночь. "Когда в революционные годы наши товарищи продвигались вперед без риска?" Воздух в Чжуннаньхае словно застыл. По всей стране все взгляды были устремлены на него.\n\n"Судьба оставила нам единственный путь."\n\n "Готовьтесь к следующему этапу.""
 taiwan_detente.10.a: "Врата истории открылись."
 taiwan_detente.11.t: ""
 taiwan_detente.11.d: ""

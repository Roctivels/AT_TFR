 CHI_low_international_recognition_idea: "Низкое Международное Признание"
 CHI_low_international_recognition_idea_desc: "На мировой арене Тайваньский пролив предстает как пропасть непримиримого противостояния, как вода и огонь, которым не суждено сосуществовать. Мы постоянно оказываемся в роли исключенной стороны, делая участие в международных организациях далеким и недостижимым стремлением, которое другие воспринимают как должное.\n\nИ все же, как показывает природа, жизнь всегда найдёт свой путь. Будь то под прикрытием региональных титулов или усилий гражданских групп, наша страна продолжает находить косвенные каналы для многосторонней дипломатии, хотя эти пути остаются глубоко ограниченными."
 CHI_prc_embargo_low_idea: "Китайское Эмбарго"
 CHI_prc_embargo_low_idea_desc: "Двусмысленная стратегия президента Цай оказалась неэффективной. Пекин по-прежнему возмущен, вынуждая наше правительство принимать ответные меры, которые в конечном итоге привели к полному прекращению обмена между странами пролива, что стало отголоском эпохи Чан Кайши.\n\nХотя правительство прилагало усилия для развития альтернативных рынков, эти усилия оказались недостаточными, в результате чего большинство жителей острова вынуждены нести на себе тяжелые последствия санкций."
 CHI_prc_embargo_idea: "Китайское Эмбарго"

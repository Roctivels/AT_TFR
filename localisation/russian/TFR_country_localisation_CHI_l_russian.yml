 taiwan.16.t: "Кэ Вэньчжэ Победил в Тайваньских Выборах!"
 taiwan.16.d: "Отбившись от войск материка в недавней войне, Тайвань объявил, что теперь снова может проводить свободные выборы в соответствии с конституцией. Поскольку недавняя война вызвала массовую ненависть к материковому Китаю, синий лагерь потерял значительную часть избирателей, которые обвиняют партию в неспособности обеспечить мир или считают их возможными пособниками материкового Китая. Тем временем политикам зеленого лагеря также был нанесен тяжелый удар, поскольку их обвиняют в том, что они привели к войне и кровопролитию, которые только что разразились на Тайване. В то же время радикальная политика предыдущего президента склонила на сторону ТНП множество нейтральных избирателей. В результате черной лошадке - Тайваньской народной партии под руководством Ко Вэнь-чже удалось успешно бросить вызов традиционной двухпартийной системе сине-зеленых, впервые в истории Тайваня завоевав президентское кресло.\n\nНовый президент Ко Вэнь-чже поблагодарил всех своих сторонников за достижение такого политического чуда, а заодно объявил о своих собственных планах по восстановлению страны."
 taiwan.16.a: "Волк выигрывает, когда пастухи ссорятся."

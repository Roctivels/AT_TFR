 oil_desc: "Нефть является основным мировым ресурсом, из которого перерабатывают топливо, смазочные материалы и химические продукты. Она питает транспортные сети, поддерживает промышленную деятельность и остается важной для эксплуатации транспортных средств, самолетов и морского транспорта."
 aluminium_desc: "Алюминий это легкий, устойчивый к коррозии металл, широко используемый в строительстве, на транспорте и в производстве. Отличное соотношение прочности и веса делает его ценным материалом для различных отраслей - от авиации до потребительских товаров."
 rubber_desc: "Резина это универсальный материал, используемый в шинах, уплотнениях, изоляции и бесчисленных механических компонентах. Ее эластичность и долговечность делают ее незаменимой на транспорте, в промышленности и в быту."
 tungsten_desc: "Вольфрам это исключительно плотный и жаропрочный металл, используемый в режущих инструментах, электрических контактах, сплавах и специализированном промышленном оборудовании. Высокая температура плавления вольфрама обеспечивает его долговечность в экстремальных условиях."
 steel_desc: "Сталь является основным конструкционным металлом современной промышленности, используемым в зданиях, транспортных средствах, инфраструктуре и машиностроении. Сочетание прочности, универсальности и возможности массового производства лежит в основе большинства современных производств."
 chromium_desc: "Хром это металлический элемент, используемый в основном в сплавах и для обработки поверхностей. Он обеспечивает коррозионную стойкость, твердость и термостойкость, что делает его важным для нержавеющей стали, покрытий и высокопроизводительных компонентов."
 coal_desc: "Электроэнергия является основным источником энергии для современной промышленности, инфраструктуры и повседневной жизни. Она поддерживает производственные, коммуникационные, транспортные системы и функционирование основных служб в обществе."
 local_resources_coal_factor: "Прирост эффективности энергетики"

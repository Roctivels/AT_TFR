 NATO_victor_of_the_european_war: "Победитель в Европейской Войне"
 NATO_victor_of_the_european_war_desc: "Как лидеры ЕС, мы являемся неоспоримыми хозяевами Европы, сокрушив российскую военную машину и защитив Запад от тирании. Однако победа досталась нам нелегкой ценой. Десятки тысяч наших мужчин погибли на фронте, целые регионы были опустошены, а военные действия довели нашу экономику до предела. Возможно, шрамы здесь не так заметны, как на Востоке, но призрак войны витает на наших заводах, на наших улицах и в умах каждого гражданина.\n\nТеперь начинается новый вид войны: борьба за стабилизацию, восстановление и безопасность демократии, за которую сражались и умирали столь многие наши парни. Но поскольку Европа ищет в нас лидера, мы должны спросить себя: станет ли этот триумф началом новой, демократической эры или просто затишьем перед §Rследующей русской бурей§!?"

 NATO_war_category_desc: "" 
 NATO_leadership_category: "Лидерство НАТО"
 NATO_leadership_category_desc: "Поскольку Соединенные Штаты находятся в полном замешательстве, нас, по-видимому, бросили на произвол судьбы. Но не волнуйтесь, поскольку наш союз будет продолжать расти и процветать в этот новый неопределенный век!"
 NATO_kaliningrad_commission_category: "Калининградская Комиссия"
 NATO_kaliningrad_commission_category_desc: "§4Чтобы добиться успеха, нам нужно иметь больше очков влияния, чем любому другому претенденту.§!\n\n                                §YТекущее Распределения Влияния§!:\n\n\n\nС нашей победой в войне против русских появилась историческая возможность раз и навсегда решить калининградский вопрос. Современная Калининградская область была домом для немцев, литовцев и поляков еще со времен Средневековья, хотя после разделов Польши она прочно перешла под контроль Пруссии. После Второй мировой войны СССР включил Кенигсберг в состав Восточной Пруссии в качестве российского эксклава, изгнав из области около 100 000 немцев. С момента распада СССР Калининградская область оставалась сильно укрепленным ядерным бастионом на нашем пороге.\n\nНо теперь, когда Россия изгнана далеко от Калининграда, Организация Объединенных Наций создала подопечную территорию над бывшей областью. Судьбу региона вскоре будет решать Калининградская комиссия, которая неизбежно определит, кому предоставить суверенитет - Германии, Польше или Литве. Мы должны задействовать все имеющиеся в нашем распоряжении инструменты для того, чтобы при принятии решения калининградский вопрос был решен в нашу пользу."

 The_GER_Socialist_Revolution: "£GFX_TFR_game_rule_flag_GER_communist Будущее §RСоциалистической Революции§!"
 The_GER_Socialist_Revolution_TXT_DESC: "Революционеры достойно отомстили за ноябрь 1918 года. Сейчас перед нами лежали два пути - простым решением было бы просто вернуться к §aГерманской§! §RДемократической§! §YРеспублике§! Однако можно применить и §Rдругие методы§!.....\n\n§RТребования:§!\n§8Либерально-демократическая партия России§! победила в Российских Выборах.\nНАТО проигрывает европейскую войну."
 The_GER_Socialist_Revolution_DDR_restoration_TXT: "£GFX_TFR_game_rule_flag_GER_communist Восстановление §dДемократической Германии§!"
 The_GER_Socialist_Revolution_DDR_restoration_TXT_DESC: "Оседлав волну Остальгии, Сара Вагенкнехт восстанавливает £GFX_TFR_game_rule_flag_GER_communist §bГерманскую§! §RДемократическую§! §YРеспублику§! и возвращает марксизм-ленинизм Партии социалистического единства."
 The_GER_Socialist_Revolution_Socialist_Federation_TXT: "£GFX_TFR_game_rule_flag_GER_soc_federation §RСоциалистическая Федерация§!"
 The_GER_Socialist_Revolution_Socialist_Federation_TXT_DESC: "Решив придерживаться более демократического и многопартийного стиля социализма, революционеры возродили Демократическую социалистическую партию, провозгласив£GFX_TFR_game_rule_flag_GER_soc_federation §RГерманскую Социалистическая Федерация§!"
 The_GER_Socialist_Diplomacy: "£GFX_TFR_game_rule_flag_GER_communist §RСоциалистическая Германия§! Стратегия дипломатии"
 The_GER_Socialist_Diplomacy_TXT_DESC: "После победы революции в Западной Европе новое социалистическое правительство оказалось перед сложным выбором. Они могут сконцентрироваться на приобретении новых союзников или сосредоточиться на восстановлении собственного военного потенциала.\n\n§RТребования:§!\n§8Либерально-демократическая партия России§! побеждает на выборах в России.\nНАТО проигрывает европейскую войну."
 The_GER_Socialist_Diplomacy_Eurointern_Expansion_TXT: "Расширение Евроинтерна"
 The_GER_Socialist_Diplomacy_Eurointern_Expansion_TXT_DESC: "Красная Германия сосредоточится на экспорте революции на Балканы и в Скандинавию, собирая как можно больше союзников перед финальной схваткой с русскими фашистами."
 The_GER_Socialist_Diplomacy_buff_NVA_TXT: "Укрепление национальных фольксдойче"
 The_GER_Socialist_Diplomacy_buff_NVA_TXT_DESC: "Продолжение экспансии не поможет в предстоящей войне и только спровоцирует русского медведя. Социалистическая Германия должна сосредоточиться на создании мощной армии, чтобы в будущем как следует разгромить Россию."
 The_GER_Socialist_Election: "£GFX_TFR_game_rule_flag_GER_soc_federation Выборы §RДемократических социалистов§!"
 The_GER_Socialist_Election_TXT_DESC: "Правительство ПДС собирается провести свободные выборы, в которых примут участие три партии. Кто победит?\n\n§RТребования:§!\n§8Либерально-демократическая партия России§! побеждает на выборах в России.\n§НАТО проигрывает европейскую войну.\n£GFX_TFR_game_rule_flag_GER_soc_federation §RСоциалистическая Федерация§! Провозглашена."

 The_SAF_civil_war_TXT_DESC: "The economic turbulence seen after the America's collapse has been felt globally, hitting South Africa particularly hard - millions of South Africans are out of work, and the already high poverty rate has only risen within the past few years. In addition to the economic downturns, racial tensions between native Africans and the §8Boer§! population have increased tenfold, with harsh reprisals, numerous race riots, and other incidents that have done nothing but inflict pain on fellow citizens. Many analysts have pointedly made references to levels of violence not seen since the apartheid era.\n\nThe general election is ushered in in the chaos, one would be foolish to assume that the country's problems are over and done with - rather, it appears they may just be getting started."

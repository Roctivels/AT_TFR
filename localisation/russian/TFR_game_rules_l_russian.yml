 Taiwan_strait: "@PRC §RТайваньская§! §PВойна§! @CHI"
 Taiwan_strait_TXT_DESC: "Начало Гражданской войны в Америке вызвало глобальную геополитическую перестройку. Поскольку "орел" больше не доминирует в Азиатско-Тихоокеанском регионе, это представляет собой наилучшую возможность для воссоединения Китая. Такой шанс быстротечен - воспользуйтесь моментом, иначе он будет упущен навсегда."
 PRC_win_Taiwan_TXT: "Победа @PRC §RКитайской Народной Республики§!"
 PRC_win_Taiwan_TXT_DESC: "Под решительным руководством председателя КНР §RСи Цзиньпина§! §RЦентристы Коммунистической Партии Китая§!  мобилизовали всю нацию и исчерпали все ресурсы для победы в конфликте в Тайваньском проливе. Разрушив ослабленную Первую островную цепь, они окончательно завершили длившееся почти восемь десятилетий стремление к воссоединению пролива, заложив основу для будущих внутренних реформ и новой главы в азиатско-тихоокеанской холодной войне.\n\n\n\n\n\n\n\n   £GFX_PRC_xi_jinping_taiwan_win\n\n\n\n\n\n\n\n\n-------------------------------------"
 CHI_win_Taiwan_TXT: "Победа @CHI §PРеспублики Китай§!"
 CHI_win_Taiwan_TXT_DESC: "Центристы Коммунистической Партии Китая  начали войну в Тайваньском проливе в попытке объединить две стороны. Однако они погрязли в затяжном конфликте, поскольку Япония и другие страны оказали Тайваню значительную поддержку, затормозив наступление. В итоге материк не смог достичь своих целей в оптимальные сроки, что привело к широкому распространению §Rпубличного§! §dнедовольства§! и вспышке §Cсоциальных§! §tволнений§!. Фракции §RЦентристов§! был нанесён сокрушительный удар по авторитету, в то время как правительство Тайваня пережило это испытание. Ожидается, что этот провал вызовет политическое землетрясение внутри КПК, проложит путь к драматическим внутренним потрясениям и заложит основу для затяжной холодной войны в Азиатско-Тихоокеанском регионе."
 Taiwan_gov_fate: "@PRC §RТайваньская§! §PВойна§! @CHI - Судьба тайваньских лидеров"
 Taiwan_gov_fate_TXT_DESC: "Когда война в Тайваньском проливе заканчивается победой коммунистического Китая, высокопоставленные чиновники Цай Ин-вэнь и Су Цэн-чжан предпринимают последнюю попытку сохранить последние угольки демократии, пытаясь бежать в Японию. Однако такое путешествие будет крайне опасным из-за поисков, все еще ведущихся НОАК. Улыбнется ли судьба этим изгнанникам, или они попадут в руки китайцев?"
 PRC_capture_Taiwan_gov_TXT: "@PRC Тайваньские лидеры захвачены"
 PRC_capture_Taiwan_gov_TXT_DESC: "Цай Ин-вэнь и Су Цэн-чжан захвачены НОАК на пути к бегству из зоны боевых действий. Они предстанут перед судом за свои преступления, связанные с расколом китайской нации."
 CHI_nocapture_Taiwan_gov_TXT: "@CHI Тайваньские лидеры сбежали"
 CHI_nocapture_Taiwan_gov_TXT_DESC: "Под конвоем японских подводных лодок Цай Ин-вэнь и Су Цэн-чжан удается бежать с острова. Они будут скрываться в Японии и отомстят за поражение на Тайване."
 The_Great_Asian_War_Rule: "£GFX_EADI_logo §RВеликая§! §PАзиатская Война§!£GFX_PDTO_logo"
 The_Great_Asian_War_Rule_TXT_DESC: "§gБог предсказал §WКрёзу§! что если §Wон§! нападёт на §RПерсов§!, то разрушит §Rвеликую империю§!, и посоветовал ему заключить союз с самым могущественным §Bиз§! §YГреков§!. Обрадованный, §WКрёз§! поверил, что непременно сокрушит §RЦарство Кира§!.\n\nОднако, как и предсказывало пророчество, §Wон§! разрушил §Wвеликую империю§! - не §RКира§!, §Wа свою собственную§!.§!"
 The_Great_Asian_War_Rule_EADI_TXT: "£GFX_EADI_logo @PRC§RРешитесь забыть меня§!"
 The_Great_Asian_War_Rule_EADI_TXT_DESC: "Если вы поклянетесь выйти замуж только за меня,\nтогда в пламени мы встретим нашу судьбу.\nЦелая жизнь в ожидании - такова плата."
 The_Great_Asian_War_Rule_PDTO_TXT: "£GFX_PDTO_logo @JAP§PЯ исчезну из памяти§!"
 The_Great_Asian_War_Rule_PDTO_TXT_DESC: "Забудь о наших с тобою обидах -\nсколько раз уже цвела сакура?\nКажется, что до поездки в Токио осталась целая вечность."

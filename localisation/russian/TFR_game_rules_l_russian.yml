 The_We_Love_Joe: "£GFX_TFR_game_rule_flag_USB_Caligula_ACW £GFX_TFR_game_rule_flag_USB_CLGL_USA  §lРай§!"
 The_We_Love_Joe_TXT_DESC: "§lЯ говорю, провиденьем познав,\nЧто вот уже и звезды у порога,\nНе знающие никаких застав,\nКогда Пятьсот Пятнадцать, вестник бога,\n\n\n\n\n\n\n\n£GFX_USB_the_one_who_is_clear   £GFX_USA_joe_biden\n\n\n\n\n\n\n\n\nВоровку и гиганта истребит\nЗа то, что оба согрешали много.§!\n\n§RТребования:§!\n\"§OБайден§! калигула".\n£GFX_TFR_game_rule_flag_USB_Caligula_ACW §aПравительство Национального Спасения§! объединил Америку."
 The_We_Love_Joe_Joseph_TXT: "§aИнцитат§!"
 The_We_Love_Joe_Joseph_TXT_DESC: "§lТеперь иди, атакуй амаликов и полностью уничтожь всё, что им принадлежит. Не щади их, предай смерти мужчин и женщин, детей и младенцев, скот и овец, верблюдов и ослов§!\n\n§aКалигула§! Вечен. Идеология §aБайденизм§!.\n\n\n\n\n\n\n\n   £GFX_USA_joe\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_We_Love_Joe_Abrams_TXT: "§aКаракалла§!"
 The_We_Love_Joe_Abrams_TXT_DESC: "§lПусть всё творение возрадуется пред Господом, ибо Он приходит, Он приходит судить землю. Он будет судить мир по праведности и народы по Своей верности.§!\n\n§aРоберт Б. Абрамс§! приходит к власти. Идеология §aВоенный Байденизм§!.\n\n\n\n\n\n\n\n   £GFX_LOU_robert_b_abrams\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_We_Love_Joe_Hunter_TXT: "§aГонорий§!"
 The_We_Love_Joe_Hunter_TXT_DESC: "§lОн дал Ему власть судить, потому что Он — Сын Человеческий.\nНе удивляйтесь этому, потому что настанет время, когда все, кто находится в могилах, услышат Его голос и выйдут из могил. Те, кто делал добро, воскреснут, чтобы жить, а те, кто делал зло, чтобы получить осуждение§!\n\n§aХантер Байден§! приходит к власти. Идеология §aБайденизм§!.\n\n\n\n\n\n\n\n   £GFX_USB_Hunter_Biden\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_We_Love_Joe_Spencer_TXT: "§8Клавдий§!"
 The_We_Love_Joe_Spencer_TXT_DESC: "§lА тем сказал в слух мой: идите за ним по городу и поражайте; пусть не жалеет око ваше, и не щадите;\nстарика, юношу и девицу, и младенца и жен бейте до смерти, но не троньте ни одного человека, на котором знак, и начните от святилища Моего. И начали они с тех старейшин, которые были перед домом.\nИ сказал им: оскверните дом, и наполните дворы убитыми, и выйдите. И вышли, и стали убивать в городе.§!\n\n§8Ричард Спенсер§! приходит к власти. Идеология §8Американистский Байденизм§!.\n\n\n\n\n\n\n\n   £GFX_USB_Richard_Spencer\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_We_Love_Joe_Milley_TXT: "§aЮлия Меса§!"
 The_We_Love_Joe_Milley_TXT_DESC: "§l\"Ибо, как новое небо и новая земля, которые Я сотворю, всегда будут пред лицем Моим, говорит Господь, так будет и семя ваше и имя ваше.\nТогда из месяца в месяц и из субботы в субботу будет приходить всякая плоть пред лице Моё на поклонение, говорит Господь.\nИ будут выходить и увидят трупы людей, отступивших от Меня: ибо червь их не умрет, и огонь их не угаснет; и будут они мерзостью для всякой плоти\"§!\n\n§aМарк Милли§! приходит к власти. Идеология §aВоенный Байденизм§!.\n\n\n\n\n\n\n\n   £GFX_FLA_mark_milley\n\n\n\n\n\n\n\n\n-------------------------------------"

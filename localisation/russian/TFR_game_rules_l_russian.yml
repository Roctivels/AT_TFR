 The_PRC_beijing_government_Leader: "@PRC Руководитель Правительства Пекина £GFX_TFR_game_rule_flag_PRC_nick_land_cosmetic"
 The_PRC_beijing_government_Leader_TXT_DESC: "От южных торговых центров до северных промышленных центров по всему Китаю прокатилась волна беспорядков и протестов, подрывающих авторитет центрального правительства на фоне скептицизма населения и внутренних разногласий.\n\n§RТребования:§!\nВАОИ проиграла в Великой Азиатской Войне."
 The_PRC_beijing_government_Leader_Huang_Ming_TXT: "§aХуан Минг§!"
 The_PRC_beijing_government_Leader_Huang_Ming_TXT_DESC: "На фоне хаоса ключевой фигурой стал генерал Хуан Мин, командующий Центральным театральным командованием НОАК. Объявив в национальных СМИ о полномасштабном блокировании Пекина, НОАК быстро взяла под охрану несколько важнейших правительственных объектов в столице и распространила свой военный контроль на весь Северный Китай.\n\nНесмотря на то, что Пекин и прилегающие регионы остаются стабильными под властью НОАК, беспорядки, охватившие остальную часть страны, не подают признаков ослабления. Экономический застой, нехватка товаров и провалы в местном управлении вызвали массовое недовольство. В крупных городах на улицы выходят разгневанные рабочие, в сельских районах мобилизуются фермеры и местные ополченцы, и даже лидеры бизнеса, которые редко высказывались в открытую, бросают вызов Пекину.\n\n Погасит ли железный подход НОАК пламя или подольет масла в огонь, пока неясно. Ясно лишь то, что Китай сейчас стоит на историческом перепутье, и военное положение в Северном Китае дало республике лишь краткую передышку.\n\nИдеология - Военная хунта.\n\n\n\n\n\n\n\n   £GFX_Huang_Ming\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_beijing_government_Leader_Nick_Land_TXT: "£GFX_TFR_game_rule_flag_PRC_nick_land_cosmetic  §aНик Лэнд§!"
 The_PRC_beijing_government_Leader_Nick_Land_TXT_DESC: "Нация переименована в Государство Китай. Идеология - правый акселерационизм.\n\n\n\n\n\n\n\n   £GFX_TFR_NL\n\n\n\n\n\n\n\n\n-------------------------------------"
 KOR_election: "@KOR 2022 Выборы в Южной Корее"
 KOR_DPK_AI_BEHAVIOR_TXT: "§OДемократическая Партия Кореи§!"
 KOR_DPK_AI_BEHAVIOR_TXT_DESC: "Под руководством Ли Чжэ Мёна §OДемократическая партия Кореи§! добивается переизбрания на президентских выборах 2022 года. Придерживаясь левоцентристской и леволиберальной платформы, партия стремится к реформированию внутренних дел и постепенному достижению полного национального суверенитета Южной Кореи, сохраняя при этом нейтральную, сбалансированную позицию в Азиатско-Тихоокеанском регионе.\n\n\n\n\n\n\n\n   £GFX_Lee_Jae_myung\n\n\n\n\n\n\n\n\n-------------------------------------"
 KOR_PPP_AI_BEHAVIOR_TXT: "§3Сила Народа§!"
 KOR_PPP_AI_BEHAVIOR_TXT_DESC: "Под знаменем Партии власти §3Сила Народа§! кандидат Юн Сок Ёль победил своего соперника на президентских выборах и успешно вступил в должность. Предполагается, что в течение своего срока Юн будет проводить политику, характеризующуюся культурным консерватизмом и экономическим либерализмом. В свете внутренней раздробленности Соединенных Штатов его администрация, как ожидается, будет укреплять связи с Японией и другими азиатскими демократиями, проводить жесткую внешнюю политику в отношении коммунистических держав и решительно противостоять Китаю и Северной Корее.\n\n\n\n\n\n\n\n   £GFX_KOR_yoon_seok_youl\n\n\n\n\n\n\n\n\n-------------------------------------"

 CHI_election_24_DPP_TPP_TXT: "§3ТНП§! §YКэ Вэньчжэ§!"
 CHI_election_24_DPP_TPP_TXT_DESC: "§PГоминьдан был§! уничтожен из-за войны, политикам Зеленого лагеря также был нанесен тяжелый удар, так как §Gих§! обвиняли в том, что они привели к войне и кровопролитию, которые только что обрушились на Тайвань. Между тем радикальная политика §GПредыдущего Президента§! подтолкнула множество нейтральных избирателей на сторону §3ТНП§! В результате политическая "черная лошадка" - §3Тайваньская Народная Партия§! под руководством §YКэ Вэньчжэ§ - смогла успешно бросить вызов традиционной двухпартийной системе Тайваня §PСине§!-§GЗеленых§! и завоевать первое в истории президентское кресло.\n\nНовый президент §YКэ Вэньчжэ§! поблагодарил всех своих сторонников за то, что им удалось совершить такое политическое чудо, и одновременно объявил о своих собственных планах по восстановлению страны.\n\n\n\n\n\n\n\n   £GFX_CHI_ko_wen_je\n\n\n\n\n\n\n\n\n-------------------------------------"

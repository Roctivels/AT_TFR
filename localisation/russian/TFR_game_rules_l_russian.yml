 The_Italy_Turn_Right_TXT_DESC: "The failure in the European War left @ITA§GIt§!a§tly§! paralyzed. Economic collapse, surging unemployment, and disillusionment with the democratic process have driven citizens into the arms of those promising swift action and national rebirth. Led by an alliance of §8fascists§!, §amonarchists§!, and §nradical right-wing§! groups, the \"Second March on Rome\" ousts the existing Italian government. Subsequently, convening a £GFX_TFR_game_rule_flag_ITA_Kingdom_of_Italy §ameeting on the Restoration of the Kingdom of Italy§!, and £GFX_TFR_game_rule_flag_ITA_Social_Republic_Fascist the §nGrand Council§! §8of Fascists§! is organized to determine the nation's fate.\n\n\n\n\n\n\n\n   £GFX_Grand_Council\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RRequires:§!\n§RCommunist Party of Russian Federation§! wins the Russian Elections.\nNATO loses the European War."

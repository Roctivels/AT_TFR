 CHI_election_24_DPP_TXT_DESC: "Отбившись от войск материка в недавней войне, Тайвань объявил, что теперь он снова может проводить свободные выборы в соответствии с конституцией. Поскольку недавняя война вызвала массовую ненависть к материковому Китаю, §PГоминьдан§! потеряла значительную часть избирателей, которые обвиняют §PГоминьдан§! в неспособности обеспечить мир или считают их возможными пособниками материкового Китая.\n\n§RТребования:§!\n§GДемократическая Прогрессивная Партия§! победила на выборах 2020 года.\nТайвань побеждает в Тайваньской войне."

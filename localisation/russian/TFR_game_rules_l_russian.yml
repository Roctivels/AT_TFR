 The_Red_Navalny_2_TXT_DESC: "§O\"Я прекращаю свою деятельность на посту президента СССР. Я принимаю это решение из принципиальных соображений.\"§!\n§R\"Мы призываем всех граждан Советского Союза осознать свой долг перед страной и оказать посильную помощь Государственному комитету по чрезвычайному положению в СССР и усилиям по выводу страны из кризиса.\"§!\nИдеология - левая военная хунта.\n\n\n\n\n\n\n\n   £GFX_Valery_Gerasimov_Soviet\n\n\n\n\n\n\n\n\n-------------------------------------"

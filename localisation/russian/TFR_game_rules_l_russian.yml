 MACRON_LOSS_AI_BEHAVIOR_TXT_DESC: "После выполнения фокуса \"Первый Залп\", Франция встанет на сторону §LЭммануэля Макрона§! и он проиграет на выборах §PМарин Ле Пен§!. После этого §OМакрон§! уйдёт из политики и передаст руководство партией "Возрождение" §OСтефан Сежурне§!\n\n\n\n\n\n\n\n   £GFX_FRA_marie_le_pen\n\n\n\n\n\n\n\n\n-------------------------------------"

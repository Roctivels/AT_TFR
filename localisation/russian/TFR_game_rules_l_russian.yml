 The_APA_path: "Путь @APA §AАмериканской Народно-Освободительной Армии§!"
 The_APA_path_TXT_DESC: "Прежде чем очистить Калифорнию от демонов и монстров, §AАмериканской Народно-Освободительной Армией§! будет временно командовать §RМайкл Прайснер§!, после чего будет созван съезд рабочих для передачи власти гражданскому правительству.\nИдеология §RРеволюционный Социализм§!.\n\n\n\n\n\n\n\n   £GFX_APA_michael_prysner\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_1_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_libertarian_socialist £GFX_APA_anarchist §GАнархисты§!"
 The_APA_path_1_TXT_DESC: "Слишком долго имя социализма было вымазано в грязи тоталитарными диктаторами, государственными капиталистами и оппортунистами. Однако с приходом фракции §Gанархистов§! к руководству правительством АНОА кажется, что ко всему этому пришёл долгожданный конец. С §Gанархистами§! во главе революции революционные страсти будут бушевать до тех пор, пока вся реакция не будет раздавлена сапогами масс. Прежде чем революция будет объявлена законченной, должна быть уничтожена любая иерархия, от тюремно-промышленного комплекса, который эксплуатировал чернокожих американцев ради триллионов долларов прибыли, до вертикально организованных рабочих мест, которые привели к душераздирающим условиям в корпоративной Америке.\n\nНадеясь смести государство на свалку истории, каждый человек будет иметь право голоса в правительстве, создавая, наконец, страну народа, от народа и для народа.\n\nИз-за большого разнообразия анархистского движения, состоящего из всех, от традиционных анархо-коммунистов до сакаистов и кибер-нигилистов, фракционность будет оставаться проблемой. Если фракционность станет слишком большой проблемой, то радикальные сакисты захватят бразды правления, что, возможно, приведет Америку в гораздо более неспокойное будущее. Несмотря на все трудности, для тотальной революции нет лучшего времени, чем сейчас! Пролетарии всех стран, соединяйтесь!\n\nИдеология - §tАнархо-Коммунизм§!.\n\n\n\n\n\n\n\n   £GFX_APA_mark_bray\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_2_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_social_democrat £GFX_APA_neosocialist §CНеосоциалисты§!"
 The_APA_path_2_TXT_DESC: "В отличие от молодых идеалистов, составляющих большую часть рядовых членов АНОА, §CНеосоциалисты§! знают, что лучше не верить в то, что стабильная Америка может быть построена только на идеалах, надеждах и мечтах. Нация стоит потрепанная войной, охваченная смертью и разрушениями, которых никогда не видел народ Америки - ее города сожжены дотла, ее люди голодают и нищенствуют, а в их сознание десятилетиями вдалбливается антикоммунистическая пропаганда времен холодной войны. Идея о том, что старый порядок можно просто отбросить, его историю проигнорировать и переписать, а его наследие забыть, просто абсурдна. Вместо этого §Cнеосоциалисты§! утверждают, что новое социалистическое государство должно быть построено на фундаменте, заложенном старыми Соединенными Штатами. Отклоняясь от типичной левой ортодоксии других фракций, §Cнеосоциалисты§! видят единственный способ выживания социализма в реформировании старых институтов, сохранении Билля о правах, Конституции и идеалов старой Америки, чтобы сохранить наследие республиканизма в Америке.\n\nСоциализм должен насаждаться не железным кулаком, а через сострадание, мир и взаимопонимание. Будут извлечены уроки из "Пражской весны" и других марксистско-гуманистических экспериментов прошлого. Теплые объятия социализма скоро будут ощущаться от моря до сияющего моря!\n\nИдеология - §sДемократический Социализм§!.\n\n\n\n\n\n\n\n   £GFX_APA_julia_salazar\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_3_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_communist £GFX_APA_octoberist §OОктябристы§!"
 The_APA_path_3_TXT_DESC: "В то время как красный флаг социализма был спущен, возможно, в последний раз в Москве в 1991 году, §OОктябристы§! позаботятся о том, чтобы пламя социализма ярко горело в Соединенных Штатах.  Следуя наследию своих однофамильцев - революционеров, сражавшихся во время Октябрьской революции, §OОктябристы§! своей экономической программой обеспечат Америке процветание и устойчивое социалистическое развитие.\n\nУбежденные в том, что экономический застой является одним из основных факторов падения социализма в бывшем Восточном блоке, §OОктябристы§! будут следить за тем, чтобы ошибки прошлого не повторились вновь. Хотя §OОктябристы§! уделяют большое внимание завоеванию поддержки народа с помощью широкой политики социального обеспечения, собственности трудящихся и реконструкции, они не колеблясь подавят любую контрреволюционную оппозицию всей мощью авангардной партии и диктатуры пролетариата. Хотя экономические преобразования, предлагаемые §OОктябристами§!, на бумаге кажутся идеальными, путь к социализму будет трудным и со многими препятствиями. Контрреволюционные силы, утечка мозгов и разрушающаяся инфраструктура будут препятствовать восстановлению.\n\nСловно феникс из пепла Соединенных Штатов, огонь социализма никогда не погаснет под руководством §OОктябристов§!!\n\nИдеология - §RРеволюционный Социализм§!.\n\n\n\n\n\n\n\n   £GFX_APA_gloria_la_riva\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_4_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_totalitarian_socialist £GFX_APA_jacobin §RЯкобинцы§!"
 The_APA_path_4_TXT_DESC: "Подобно первоначальным §RЯкобинцам§! во время §YФранцузской революции§!, §RЯкобинцы§! Второй американской революции воплощают дух §Rреволюции§! и §Rпатриотизма§! внутри нации. Теперь, возглавляя Американскую народно-освободительную армию, §RЯкобинцы§! стремятся сформировать Америку в соответствии со своим видением - социалистического, гражданско-националистического и революционного общества.\n\nДвижение Якобинцы не стесняется насилия и государственного контроля для достижения своей цели, но централизовать и перестроить разнообразный и невероятно запутанный политический ландшафт будет нелегко. Чем больше общественность узнает о наших попытках изменить правительство, тем выше будет стоимость реформы власти. В то же время, если сила внутренних врагов станет слишком велика, то мы непременно столкнемся с угрозой контрреволюции. Существует бесчисленное множество врагов - как внешних, так и внутренних, которые угрожают власти председателя Мопена. Революция должна быть защищена, и реки Америки будут красными от крови врагов Революции.\n\nИдеология - §tАмериканский Социализм§!.\n\n\n\n\n\n\n\n £GFX_APA_caleb_maupin\n\n\n\n\n\n\n\n\n-------------------------------------"

 The_Kazakhstan_Riots: "Беспорядки в @KAZ Казахстане"
 The_Kazakhstan_Riots_1_TXT: "§BТотальная Деназарбаевизация§!"
 The_Kazakhstan_Riots_1_TXT_DESC: "Нынешний президент Казахстана Касым-Жомарт Токаев не остался равнодушным к протестам. Он встал на сторону народа и начал чистки против всех старых назарбаевских аппаратчиков, которые долгое время держали власть в своих руках. Токаев также решил развенчать культ личности самого Назарбаева, правившего страной более 30 лет. Он признал, что многие решения, принятые Назарбаевым, были ошибочными. Было объявлено о проведении масштабных демократических реформ и разработке новой конституции. Казахстан также выразил благодарность России за помощь в трудные времена. В знак дружбы и уважения к соседней стране Казахстан решил начать новый этап экономической интеграции между двумя государствами. Российско-казахстанская дружба крепка как никогда!\nИдеология - конституционализм."
 The_Kazakhstan_Riots_2_TXT: "§gДеназарбаевизация§!"
 The_Kazakhstan_Riots_2_TXT_DESC: "Протесты в Казахстане закончились. Власти сообщили о восстановлении порядка в стране. Пострадали 4 353 человека, в том числе 3 393 сотрудника силовых структур. 238 погибших, в том числе 19 полицейских и военных, доставлены в морги. В результате этих событий в стране произошли изменения в правительстве и политической сфере. В частности, были заменены премьер-министр, государственный секретарь, спикер нижней палаты парламента и половина министров. Назарбаев также лишился поста лидера правящей партии "Нур Отан", а его место занял Токаев. Также одним из результатов протестов стало снижение цен на газ, который и послужил катализатором протестов. Является ли это началом чего-то большого, или Казахстан не пойдет на серьезные реформы и сохранит статус-кво? Время покажет.\nИдеология - анократия."
 The_Kazakhstan_Riots_3_TXT: "§gПереворот Назарбаевой§!"
 The_Kazakhstan_Riots_3_TXT_DESC: "Во время протестов в Казахстане произошло нечто невероятное - государственный переворот. Силы КНБ, возглавляемые Даригой Назарбаевой, старшей дочерью бывшего президента страны Нурсултана Назарбаева, захватили власть в стране. Клан Назарбаевых, десятилетиями удерживавший власть в Казахстане, теперь полностью контролирует страну. Дарига Назарбаева, ранее занимавшая высокие посты в правительстве и парламенте, теперь стала настоящей автократкой. Она мнит себя казахской Екатериной Великой и не скрывает своих амбиций. В своих речах она обещает привести Казахстан к новым высотам и сделать его одной из ведущих мировых держав.\nИдеология - Олигархия."
 The_Kazakhstan_Riots_4_TXT: "§YЛиберальная Революция§!"
 The_Kazakhstan_Riots_4_TXT_DESC: "В Казахстане прошли масштабные акции протеста, которые привели к значительным изменениям в политической жизни страны. Многие эксперты и наблюдатели назвали происходящее либеральной революцией, которая привела к приходу к власти демократических сил. Главными лидерами протестов стали "Демократический выбор Казахстана" и Мухтар Аблязов, бывший банкир и бизнесмен, который был вынужден покинуть страну в 2009 году после конфликта с правительством. Во время протестов Аблязов вернулся в Казахстан и возглавил движение за демократию и свободу. После нескольких дней массовых протестов правительство Казахстана было вынуждено уйти в отставку. Новым президентом страны стал Мухтар Аблязов, пообещавший широкие реформы и создание демократического государства.\nИдеология - центризм."
 The_Kazakhstan_Riots_5_TXT: "§tСоциалистическая Революция§!"
 The_Kazakhstan_Riots_5_TXT_DESC: "В ходе протестов в Казахстане произошло то, что можно назвать социалистической революцией, возглавляемой Социалистическим движением Казахстана и Айнуром Курмановым. Левые силы в Казахстане объединились в борьбе за права рабочих и бедных. Основные левые партии Казахстана, включая Коммунистическую партию, Общенациональную социал-демократическую партию и Народную партию, смогли организовать неустойчивую коалицию, которая захватила власть в стране. Новое правительство пообещало радикальные демократические и социальные реформы, призванные улучшить жизнь простых граждан. Одной из первых мер стало повышение зарплат и пенсий, а также бесплатное образование и медицина для всех граждан.\nИдеология - демократический социализм."
 The_Tokaev_HELP: "@KAZ@SOV Токаев обращается за помощью к России"
 The_Tokaev_HELP_TXT_DESC: "Антиконституционный переворот в Казахстане, где власть захватили антироссийские силы. Законный президент Касым-Жомарт Токаев был вывезен российскими спецслужбами в безопасное место и сейчас находится на временной даче в Оренбурге. После нескольких дней затишья он написал письмо президенту Российской Федерации с просьбой о помощи в возвращении стабильности и законного порядка в Республику Казахстан. Первая часть письма была широко растиражирована российскими СМИ, но во второй части, закрытой для общественности, Токаев признает ошибочность своей многовекторной политики и предлагает России значительные уступки, если она согласится на вмешательство. Среди них Токаев даже согласился на проведение референдумов о присоединении к России территорий Северного Казахстана. Несмотря на столь щедрые токаевские "подарки," окончательное принятие решений остается за российским правительством.\n\n§RВажно:§!\nТокаев ушел в отставку во время казахстанских беспорядков."

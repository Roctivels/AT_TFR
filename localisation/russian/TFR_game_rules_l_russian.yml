 CHI_election_green_TXT: "§GДемократическая Прогрессивная Партия§!"
 CHI_election_green_TXT_DESC: "Под руководством §GДемократической прогрессивной партии§!, переизбранной на всеобщих выборах 2020 года, Тайвань продолжит сближаться с Западом и Японией, стремясь разорвать связи с материковым Китаем и в конечном итоге обрести полную независимость, что, как ожидается, вызовет жесткую реакцию Пекина.\n\n\n\n\n\n\n\n   £GFX_CHI_tsai_ing_wen\n\n\n\n\n\n\n\n\n-------------------------------------"
 CHI_election_blue_TXT: "§PГоминьдан§!"
 CHI_election_blue_TXT_DESC: "Под руководством партии §PГоминьданя§!, победившей своего оппонента на всеобщих выборах 2020 года, Тайвань будет двигаться вперед под популистским знаменем Хань Куо-юя. Администрация будет стремиться поддерживать хрупкий баланс с материковым Китаем путем политического маневрирования, сохраняя статус-кво в Тайваньском проливе и одновременно скрыто добиваясь независимости Тайваня в рамках "Одного Китая, соответствующих интерпретаций" - стратегии, которую Пекин, как ожидается, в конечном итоге увидит насквозь.\n\n\n\n\n\n\n\n   £GFX_CHI_han_kuo_yu\n\n\n\n\n\n\n\n\n-------------------------------------"

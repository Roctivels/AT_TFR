 The_PRC_GAW_Japan_2_TXT_DESC: "В будущем Японскую Народную Республику возглавит Коммунистическая партия Японии."
 The_PRC_Revanchists_Path: "@PRC §8Путь§! §dРеван§!§Rшистов§!"
 The_PRC_Revanchists_Path_TXT_DESC: "Преступники всегда забывают, но раненые помнят боль вечно.\n\n\n\n\n\n\n\n   £GFX_Zhang_Youxia\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Revanchists_Path_Digital_Leninists_TXT: "§dКлюч к Всеведению и Всемогуществу§!"
 The_PRC_Revanchists_Path_Digital_Leninists_TXT_DESC: "Каждая камера, каждый процессор данных и каждая крупица информации на этой земле находится под нашим контролем. Те, кто думает, что сможет противостоять нам, прячась в тени и полагая, что их действия останутся незамеченными, сильно ошибаются. Каждый их шаг, каждое слово, произнесенное ими, уже под нашим пристальным взглядом, и им негде спрятаться. Они живут не во тьме, а под взглядом, недоступным для света.\n\nИдеология §dАвангардный Социализм§!.\n\n\n\n\n\n\n\n   £GFX_PRC_Cheng_Wenqing\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Revanchists_Path_Nationalists_TXT: "§dКрепость из Крови и Плоти§!"
 The_PRC_Revanchists_Path_Nationalists_TXT_DESC: "Китай не испытывал недостатка в иностранных захватчиках. От монголов до японцев - наша страна была объектом внимания многих агрессоров. Но почему же за 5000-летнюю историю Китай никогда не был полностью завоеван? Почему китайскому народу всегда удавалось победить всех захватчиков и сохранить свою национальную идентичность? Благодаря добродетели китайского народа. Это культурное кредо вырезано глубоко в их костях. Бесчисленные китайские герои отдавали свои жизни, защищая эту дорогую им землю. Эту землю они называют своим домом. Юэ Фэй, Дун Цунруй и бесчисленные безымянные мужчины и женщины, пролившие кровь за эту нацию, - вот что сделало нас великими, вот что сделало Китай тем, чем он является сегодня.\n\nИдеология §dАвангардный Социализм§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Revanchists_Path_Militarists_TXT: "§RСтолп Багрового Суверенитета§!"
 The_PRC_Revanchists_Path_Militarists_TXT_DESC: "Где развевается пятизвездочный красный флаг, там и дом. Этот красный флаг не просто полотнище - это вера, это воля, это стена убеждений, возведенная кровью и плотью миллиардов китайских сыновей и дочерей. Эпоха, когда нас называли "больным человеком Восточной Азии", похоронена нашими собственными руками. Китай, который по своему усмотрению убивали, унижали иностранные державы, давно превратился в пепел. Те, кто когда-то пресмыкался перед Западом, виляя хвостом, - бесхребетные умиротворители, предатели, забывшие свои корни, культурные рабы, стоящие на коленях перед чужими землями, - все они осуждены историей. То, что стоит здесь сегодня, - это новый Китай, выкованный из крови ста тысяч молодых людей, багровое царство, отлитое в железной воле. За нами - стальной поток народа, верные души миллиарда сердец. На наших плечах лежит груз тысячелетий цивилизации, несбывшиеся надежды бесчисленных мучеников. Мы заставим наших врагов трепетать, заставим Азию покориться и сделаем так, чтобы будущее запомнило: Красный Китай никогда не склонится.\n\nИдеология §RЛевый Национализм.§!\n\n\n\n\n\n\n\n   £GFX_Li_Zuocheng_general\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path: "@PRC §8Путь§! §dЦюаньго§!"
 The_PRC_Quanguo_Path_TXT_DESC: "§wВсе в шести направлениях - земля Императора.\nЗапад - за изменчивыми песками, юг - за бессолнечными домами,\nВосток - там, где кончается Восточное море, север - за куполами Великого Ся.\nВезде, где ступает нога человека, никто не смеет противиться его рукам. \nЕго деяния превосходят пять государей; его милость касается зверей и полей.\nНикто не остался вне его добродетели; каждый обитает там, где царит мир.\nПусть это царство процветает вечно - десять тысяч лет, нерушимых печатей.!§!\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path_Communism_TXT: "£GFX_TFR_game_rule_flag_PRC_national_communist  §dНесокрушимое Предприятие§!"
 The_PRC_Quanguo_Path_Communism_TXT_DESC: "Цинь Шихуан был никем. Он похоронил всего 460 ученых, мы же похоронили 46 000. Когда мы подавляли контрреволюционеров, разве мы не уничтожали и реакционную интеллигенцию? Я спорил с демократами: вы называете нас Цинь Шихуаном? Неправильно - мы превзошли его во сто крат. То, что нас называют Цинь Шихуаном, то, что мы диктаторы, мы всегда признавали. Жаль только, что вы заявляете недостаточно, часто оставляя нас дописывать остальное. Слишком скромно - не может быть всего 100 раз?\n\nСтрана переименовывается в £GFX_TFR_game_rule_flag_PRC_national_communist §dКитайская Народно-Революционная Республика§!. Идеология §dНационал-Коммунизм§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo_cool\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path_Exceptionalism_TXT: "£GFX_TFR_game_rule_flag_PRC_heavenly_republic  §8Искореняйте Еретиков, Сохраняйте Ортодоксов§!"
 The_PRC_Quanguo_Path_Exceptionalism_TXT_DESC: "§wСреди людей нет ничего более почитаемого, чем государь (ди), которому Небо доверило власть, поэтому его называют "верховным правителем" (шанди).§!\n\nСтрана переименовывается в £GFX_TFR_game_rule_flag_PRC_heavenly_republic §8Небесная Народная Республика§!. Идеология §8Китайский Эксепционализм§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo_cool\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path_Confucian_TXT: "£GFX_TFR_game_rule_flag_PRC_empire  §8Восстановить Наследие Великой Династии Хань§!"
 The_PRC_Quanguo_Path_Confucian_TXT_DESC: "§wВеликое единство периода Весны и Осени - это постоянный принцип неба и земли, универсальная норма прошлого и настоящего.§!\n\nСтрана переименовывается в £GFX_TFR_game_rule_flag_PRC_empire §8Китайская Народная Империя§!. Идеология §8Конфуцианский Гиперконсерватизм§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo_empire\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Liberal_Progress_of_Reforms: "Прогресс Реформ @PRC §CРеформаторов§!"
 The_PRC_Liberal_Progress_of_Reforms_TXT_DESC: "Когда ИИ выбирает §CРеформаторский§! путь, он продолжает бессистемно выбирать решения, которые могут надолго застопорить ход реформ и завести страну в тупик."
 The_PRC_Liberal_Progress_of_Reforms_1_TXT: "Прогресс реформ Внезапное увеличение"
 The_PRC_Liberal_Progress_of_Reforms_1_TXT_DESC: "Национальная фокусы "Освободить Народный Конгресс" и "Партия XXI Века" усилит ход реформ, чтобы обеспечить нормальное развитие партии."
 The_PRC_Fifth_Modernization: "@PRC §CПятая Модернизация§!"
 The_PRC_Fifth_Modernization_TXT_DESC: "В 1980-е годы студенты колледжей, поддерживавшие реформы, выступали за то, чтобы в дополнение к политике "четырех модернизаций", направленной на укрепление могущества страны, не пренебрегать "пятой модернизацией" - модернизацией политической системы, и призывали партию начать кампанию демократизации. Хотя их усилия в конечном итоге не увенчались успехом, мы унаследуем дух и наследие, которые они оставили. Сегодня демократическое движение в Китае возродится!\n\n\n\n\n\n\n\n   £GFX_PRC_Wang_Yang2\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Fifth_Modernization_1_TXT: "§CПартийный Платформизм§!"
 The_PRC_Fifth_Modernization_1_TXT_DESC: "Мы сделали Собрание народных представителей ядром нашей демократической политики. Через Конгресс народных представителей теперь можно эффективно отстаивать демократическую повестку дня в обычной политической деятельности Китая. Мы предпримем важный шаг - предоставим демократическим партиям, которые раньше могли только "обсуждать политику", возможность добиваться реальных изменений путем выборов и публичных дебатов. Кроме того, даже внутри КПК членам партии будет позволено высказывать свое мнение. Так начнется великий эксперимент в области демократии."
 The_PRC_Fifth_Modernization_2_TXT: "§CКитайская Социалистическая Демократия§!"
 The_PRC_Fifth_Modernization_2_TXT_DESC: "Вопреки сложившемуся стереотипу, КПК всегда строго придерживалась "демократического централизма" как одного из своих основных принципов. Благодаря эффективным демократическим механизмам КПК смогла победить реакционеров и добиться победы в революции. Однако из-за политической борьбы после 1949 года и культа личности, окружающего лидера, эта великая традиция была постепенно забыта. Теперь мы восстановим реформированный демократический механизм в партии. Поскольку КПК является непререкаемым центром китайской политики, демократия в партии означает демократию в стране."

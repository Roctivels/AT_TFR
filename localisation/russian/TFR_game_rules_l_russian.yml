 The_Canada_Elections: "@CAN Выборы в Канаде"
 The_Canada_Elections_TXT_DESC: "Поскольку гражданская война в США закончилась (и истеблишмент одержал победу), "чрезвычайное положение" должно быть отменено. Канада использует этот момент передышки, чтобы провести свои выборы.\n\n\n\n\n\n\n\n   £GFX_CAN_hog_justin_trudeau_por\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RНужно достичь одного требования:§!\n@USB§CСоюз Америки§! воссоединил Америку.\n@USC§BАмериканское Конституционное Правительство§! воссоединило Америку."
 The_Canada_Elections_Liberals_Mark_Carney_TXT: "§OЛибералы§!"
 The_Canada_Elections_Liberals_Mark_Carney_TXT_DESC: "Ошеломляющее возвращение §OЛиберальной Партии Канады§! одержал убедительную победу на досрочных федеральных выборах - на этот раз под руководством новой партии. После того, как премьер-министр §OДжастин Трюдо§! ушел в отставку в начале этого месяца, бывший управляющий Банка Канады и мировой финансовый деятель §OМарк Карни§! стал у руля, пообещав покончить со спорами прошлого и уверенно смотреть в будущее.\n\nПредвыборная кампания §OКарни§! задела за живое нацию, уставшую от политических разногласий и международной неопределенности. Его технократическое прошлое и безупречная компетентность помогли §OЛибералам§! восстановить свой испорченный имидж и привлечь на свою сторону ключевые демографические группы,, разочарованные §gпоследними годами правления Трюдо§! и растущим притоком мигрантов и беженцев.\n\nБлагодаря возрожденному общественному доверию, подавляющему большинству в парламенте и благоприятной администрации в Штатах, перед §OКарни§! теперь стоит задача твердо сдержать свое обещание и оправдать доверие народа. Впервые за многие годы политический центр Канады обрел опору. Возобладает ли он, покажет только время.\n\nИдеология §OНеолиберализм§!.\n\n\n\n\n\n\n\n   £GFX_CAN_hog_mark_carney_por\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Canada_Elections_Liberals_Trudeau_TXT: "§OЛибералы§! - §OТрюдо Остаётся§!"
 The_Canada_Elections_Liberals_Trudeau_TXT_DESC: "§OДжастин Трюдо§! и §OЛиберальная Партия Канады§! с небольшим отрывом одержали победу на досрочных федеральных выборах, удерживаясь у власти, несмотря на повсеместную непопулярность и растущие противоречия. Когда-то считавшийся прогрессивным лидером, пребывание Трюдо на этом посту было омрачено экономическими трудностями, некомпетентностью и растущим восприятием §gавторитаризма§! после принятия им Закона о чрезвычайных ситуациях.\n\nПервоначально это решение было обосновано как необходимый шаг для восстановления общественного порядка и национальной безопасности в беспрецедентные времена, но вместо этого стало громоотводом для критики справа и слева. Многие канадцы считают это опасным превышением полномочий исполнительной власти, которое навсегда запятнало §gнаследие Трюдо§! и подорвало доверие к его руководству и §Oего партии§!.\n\nНесмотря на эти неудачи, Трюдо одержал небольшую победу - это скорее не триумф, а временное прекращение огня в стране, уставшей от раскола. Вместо того, чтобы свидетельствовать о восстановлении доверия, результаты демонстрируют очень хрупкую картину, которая держится лишь на привычках и колебаниях. По мере того как §OТрюдо§! вступает в свой четвертый срок, все больше возникает вопросов о том, как долго премьер-министр сможет продержаться у власти, прежде чем все рухнет.\n\nС распущенными волосами мы поем вызывающе - неумолимо до самой смерти! Идеология §OНеолиберализм§!.\n\n\n\n\n\n\n\n   £GFX_CAN_hog_justin_trudeau_defeat_por\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Canada_Elections_Conservatives_TXT: "§3Консерваторы§!"
 The_Canada_Elections_Conservatives_TXT_DESC: "§3Консервативная Партия Канады§!  одержала победу на внеочередных федеральных выборах, положив конец §gдолгой§! §OЭры Трюдо§! после политических последствий гражданской войны, разразившейся в Штатах.\n\n§OЛибералы§!, которые назначили выборы в надежде получить новый мандат в условиях более стабильной ситуации в США, вместо этого потерпели сокрушительное поражение, поскольку их попытки справиться с кризисом привели к глубокому расколу в стране. После неудачной попытки защитить Канаду от последствий гражданской войны за рубежом общественное недовольство §OЛиберальным правительством§! достигло точки кипения. Многие канадцы рассматривали это \"вмешательство\" как ненужное вмешательство во внешние дела, которое совпало с резким ростом числа беженцев.\n\nИзбиратели обратились к §3Консервативной Партии§!, возглавляемой популистом §3Пьером Пуальевром§!, который проводил кампанию, обещая восстановить стабильность, подотчетность и положить конец тому, что он называл безрассудной внешней политикой. §3Тори§! получили явное большинство в парламенте, что, наконец, положило конец почти десятилетнему правлению §Oлибералов§! омраченному непопулярностью.\n\nИдеология §3Неоконсерватизм§!.\n\n\n\n\n\n\n\n   £GFX_CAN_hog_pierre_poilievre_por\n\n\n\n\n\n\n\n\n-------------------------------------"

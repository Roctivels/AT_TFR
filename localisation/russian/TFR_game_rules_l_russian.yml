 The_Path_of_Lukashenko_3_TXT: "§gПрезидентская диктатура, советская демократия§!"
 The_Path_of_Lukashenko_3_TXT_DESC: "Последовательный прагматизм §gБатьки§! привел к своеобразным обстоятельствам в Советском Союзе. С одной стороны, §gПрезидентская диктатура§!, репрессии против левых. С другой стороны, есть §3оттепель§! для §Oправого крыла§!, восстанавливающая советскую демократию. Сохраняя бдительность против правых тенденций, но в первую очередь защищаясь от "левых".\nИдеология - прагматический социализм.\n\n\n\n\n\n\n\n   £GFX_SOV_Alexander_Lukashenko_Cool\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RRequires:§!\n§RSoviet Russian§! economic path choose \"Adapt to Chinese Socialism\"."
 The_Levchenko_Reform: "£GFX_TFR_game_rule_flag_USSR_SOV_communist Реформы §tЛевченко§!"
 The_Levchenko_Reform_TXT_DESC: "После победы на выборах §tЛевченко§! приступает к осуществлению своей программы реформ, привнося демократию в Советский Союз.\n\n\n\n\n\n\n\n £GFX_Sergey_Levchenko\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RТребования:§!\n§tЛевченко§! побеждает на Первых §RСоюзных§! выборах."
 The_Levchenko_Reform_1_TXT: "Реформа §tЛевченко§! удалась"
 The_Levchenko_Reform_1_TXT_DESC: "После многочисленных примирений и компромиссов §tЛевченко§! объединяет различные красные фракции и создает §tДемократическую партию коммунистов Советского Союза§!, совместными усилиями успешно реформируя страну. Социализм Советского Союза не ограничивается "Человеческим лицом", а является полностью новым демократическим социализмом.\nИдеологией является коммунистический популизм.\n\n\n\n\n\n\n\n £GFX_Sergey_Levchenko\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Levchenko_Reform_2_TXT: "Возвращение §RКПСС§!"
 The_Levchenko_Reform_2_TXT_DESC: "Без консультаций радикальные реформы приводят к импичменту президента §tЛевченко§! К власти приходит §RКоммунистическая партия Советского Союза§!, созданная в противовес §tДемократической партии коммунистов Советского Союза§! и внедряет партократию. Бывший министр иностранных дел §RДенис Парфенов§! занимает пост президента.\nИдеологией является марксизм-ленинизм.\n\n\n\n\n\n\n\n £GFX_Denis_Parfenov\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Levchenko_Reform_3_TXT: "Правильный §tПреемник§!"
 The_Levchenko_Reform_3_TXT_DESC: "Без консультаций радикальные реформы приводят к импичменту президента §tЛевченко§! §tДемократическая партия коммунистов Советского Союза§! сотрудничает с расколотой §RКоммунистическая Партия Советского Союза§! для исправления ошибок. Президентом назначается бывший премьер-министр §tНиколай Бондаренко§!\nИдеология - коммунистический популизм.\n\n\n\n\n\n\n\n £GFX_Nikolay_Bondarenko\n\n\n\n\n\n\n\n\n-------------------------------------"

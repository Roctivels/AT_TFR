 #Events
 korea_aprilfools25.1.t: "Мунинг: Происшествие"
 korea_aprilfools25.1.d: "Мне очень нравится быть президентом моей любимой Кореи. Наша экономика растет, и я уверен, что ничего не может пойти не так!"
 korea_aprilfools25.1.a: "Чебору Битиесу"
 korea_aprilfools25.2.t: "Чучхе, Чучхе в голове..."
 korea_aprilfools25.2.d: "Упакуйте мой девятимиллиметровый, потому что я не собираюсь выходить из дома\nКак грудастая задница чучхе и просто лежать\nЯ подбегу к чучхе, выстрелю из своей девятки пятнадцатью патронами\nУ меня Лил Ким на девятом облаке\nЧучхе, чучхе в моем сознании."
 korea_aprilfools25.2.a: "Чучхе, Чучхе в голове..."
 korea_aprilfools25.3.t: "Второй раз - это прелесть"
 korea_aprilfools25.3.d: "После долгих размышлений и разговоров Ким Чен Ын извинился перед народом Южной Кореи и согласился начать новые мирные переговоры. Похоже, это начало новой большой дружбы."
 korea_aprilfools25.3.a: "Поехали."
 korea_aprilfools25.4.t: "Время пришло"
 korea_aprilfools25.4.d: "- Ким, может, нам стоит прекратить это раз и навсегда? Может, нам стоит просто объединиться? Ведь все мы - корейцы.\n- Я действительно так думаю, брат Мун. Я полностью согласен. Нет ничего, что могло бы помешать нам объединиться. Единственное, что может остановить это воссоединение, - нехватка денег..."
 korea_aprilfools25.4.a: "Вы правы, Ким. Мы подумаем об этом."
 korea_aprilfools25.5.t: "Истинный победитель"
 korea_aprilfools25.5.d: "- КАК? Как вы играете лучше нас? Мы играли в Лигу десятилетиями, с юности! Это просто невозможно, чтобы человек, который впервые в жизни видит компьютер, был настолько хорош!\n- Впервые в жизни? Братан, ты же понимаешь, что у нас есть компьютеры? У меня буквально есть один дома, он имеет Juchentium Core 9, Juchvidia 9090 RTX, 128 JuchRam и все такое. Ваши слабые компьютеры меня не впечатляют. Как и твои навыки в играх.\n- ЧТО? ПК? У вас в Северной Корее такое есть?\n- Конечно, есть, болваны, просто мы делаем вид, что это не так. Иначе вы просто начнете массово мигрировать в настоящую цивилизацию. Мы не готовы принять столько беженцев."
 korea_aprilfools25.5.a: "Что..."
 korea_aprilfools25.6.t: "Все отлично!"
 korea_aprilfools25.6.d: "Здравствуйте, мы репортеры Мун ТВ, расскажите, пожалуйста, о вашем впечатлении от корейской экономики. Вы живете в достатке? Можете ли вы позволить себе купить то, что хотите?\nЕсли бы вы хотели, поехали бы вы в отпуск за границу?"
 korea_aprilfools25.6.a: "Нет, я бы поработал."
 korea_aprilfools25.7.t: "Наша экономика... Ле мертв???"
 korea_aprilfools25.7.d: "Осталось 0 дней, братья Самсунг... Все кончено. Через тридцать лет Samsung будет мертв..."
 korea_aprilfools25.7.a: "JENJAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAANG!"
 korea_aprilfools25.8.t: "Давайте попробуем!"
 korea_aprilfools25.8.d: "Дорогие японцы! Вам пишет президент Южной Кореи. Мы знаем обо всех проблемах между нами, и мы хотели бы протянуть вам ветвь мира и доброты! Давайте начнем все сначала и создадим новый и прекрасный мир!!!\n-------------------------------------\nДорогие корейцы! Я, глава Японии, ненавижу и презираю вас всех! Очень скоро я прилечу на своем авианосце «Мисато» и разбомблю вас всех! Ваша дурацкая музыка, доносящаяся до наших берегов через море, ваши дурацкие игры, разъедающие мозги наших самураев, ваши скучные телефоны, которые стоят слишком дорого, и ВАШИ ТУПЫЕ АВТОМОБИЛИ!!!!. Все это будет уничтожено! Прощайте! ХАХАХА. TOYOTA БУДЕТ ПРАВИТЬ ЗА ВОРУЛДО!"
 korea_aprilfools25.8.a: "Давайте попробуем... Самое худшее, что они могут сказать, это «нет»..."
 korea_aprilfools25.9.t: "Почему, мистер Мун? ПОЧЕМУ?"
 korea_aprilfools25.9.d: "Господин Мун, почему вы не предупредили нас о новой сделке? Мы... Мы разоримся! Только вчера я потратил миллиард вон на лучших адвокатов в Корее, и мы поняли, что ваши глупые действия позволили японцам обмануть вас! МЫ ПОЛУЧИМ ДОПОЛНИТЕЛЬНЫЕ МИЛЛИОНЫ ВОН ПО ЭТОМУ КОНТРАКТУ, ЕСЛИ ВЫ ПРОКОНСУЛЬТИРУЕТЕСЬ С НАМИ, ВЫ ПОНИМАЕТЕ?"
 korea_aprilfools25.9.a: "Я больше не могу этого терпеть... Я построю свою собственную Корею..."
 korea_aprilfools25.10.t: "Говорю от сердца..."
 korea_aprilfools25.10.d: "Дорогой брат Ким Чен Ын, я, Мун Чжэ Ин, пишу вам это письмо с надеждой на понимание и глубокое переосмысление наших отношений. Примирение великого корейского народа просто необходимо перед лицом столь явной опасности, окружающей нас. Я приглашаю вас встретиться и обсудить детали лично.\nС любовью, Мун.\n----------------------------------\nНет, лол, гет реткт нуб."
 korea_aprilfools25.10.a: "Черт..."
 korea_aprilfools25.11.t: "Реквием по луне"
 korea_aprilfools25.11.d: "Спасибо, что сыграли в эту абсолютно точную демонстрацию южнокорейского контента.\nЧестно говоря, это шутка, но это не так. Или нет? Или нет?\nЛюблю вас всех.\n\nВторое Ханское Чудо обязательно придет в Корею!"
 korea_aprilfools25.11.a: "Спасибооооо!!!! Gamsaaaaaaa!!!!!!!"
 korea_aprilfools25.12.t: "ГДЕ ДЕНЬГИ, ЛУНА???"
 korea_aprilfools25.12.d: "- МУН, ГДЕ ДЕНЬГИ? Мы пережили большой кризис, и нам нужны деньги!\n\n- Почему я должна давать тебе корейские деньги? Живите сами.\n\n- Луна, SAMSUNG составляет 50% ВВП КОРЕИ. Это мои деньги, ты знаешь?\n\n- Ну. Если ты хочешь контролировать деньги Кореи. ПОЧЕМУ БЫ ВАМ НЕ УПРАВЛЯТЬ СТРАНОЙ ВМЕСТО МЕНЯ? А?\n\n- Без проблем. Я решу все проблемы Кореи за год!\n\n- Так ли это? НУ, ПОСМОТРИМ, ПОПРОБУЙ, Я ЖДУ."
 korea_aprilfools25.12.a: "Зе Мафия Поднимается"
 korea_aprilfools25.13.t: "Чаеболь Пэрэдайс"
 korea_aprilfools25.13.d: "- МИСТЕР ДЖОН ЛИ-САМСУНГ. НАША СТРАНА РАЗВАЛИВАЕТСЯ НА ЧАСТИ. МЫ ДОЛЖНЫ ЧТО-ТО СДЕЛАТЬ. ПОЖАЛУЙСТА. Скажите нам, что мы должны сделать сейчас!\n\n- Пожалуйста, будьте терпеливы, мой друг. У меня уже есть план.\n\n- И КАКОЙ ЖЕ ЭТОТ ПЛАН, МИСТЕР САМСУНГ?"
 korea_aprilfools25.13.a: "Нам нужно позвонить в компанию... Лимбус Компанию..."
 korea_aprilfools25.14.t: "Это..."
 korea_aprilfools25.14.d: "Нет, не может быть! Это Дон Кихот из хитовой корейской игры «Project Moon»????. Куууууууууууууууууууууууууууууууууууууууул."
 korea_aprilfools25.14.a: "Не волнуйтесь, господин эсквайр. Ведь вы благословенны."
 korea_aprilfools25.15.t: "Алло, алло???"
 korea_aprilfools25.15.d: "Алло, это Ким? Это Джон Ли Самсунг, я хотел бы заключить с вами небольшую сделку. Я хочу купить Северную К...\n\n Я в деле.\n\n Что?\n\n Я говорю, что я в деле.\n\n\n Вот так?\n\n\n Честно говоря, мне самому надоело так жить. Я сотни раз говорил Муну, что ему достаточно предложить немного денег, и все! Жаль, что он так ничего и не понял.\nЯ жду перевода денег на мою банковскую карту Samsung, а тем временем я подготовлю место для нового офиса Samsung в Пхеньяне."
 korea_aprilfools25.15.a: "Ух ты. Слава чучхе???"
 korea_aprilfools25.16.t: "Бойтесь будущего. Освободите свое ЭГО."
 korea_aprilfools25.16.d: "Как долго я должен это делать? Я стреляю из этой винтовки уже 10 часов подряд, и она ничуть не изменилась. Что она должна делать, стрелять межконтинентальными лазерами? Твоя методика - полная чушь.\n\nЛадно, давай попробуем другой метод. Ты уверен, что переключил винтовку с автоматической на однозарядную?\n\nНе помню.\nПодтверждается способность стрелять несколькими лучами света, которые пробивают любые препятствия.\n\nВторая труба активирована.\n\nОжидание перезагрузки сценария."
 korea_aprilfools25.16.a: "Сэм, пожалуйста, сделай погромче 1 час электронной музыки Рикардо."
 korea_aprilfools25.17.t: "Четыре Кореи лучше, чем две?"
 korea_aprilfools25.17.d: "В любом случае, ребята, ваши идеи - полная чушь. Я предлагаю просто разделить Корею на четыре части, как пирог.\n\nДа, чувак, а что если моя капитализация больше твоей?\n\nИ что? Капитализация не важна, если вы не развивали технологии с 1997 года.\n\nSHH! У меня есть идея, ребята. Я, Джон Ли Самсунг, предлагаю... Разделить Корею на множество районов. И равномерно распределить их по стоимости.\n\nПогоди-ка, Джон. Разве это не та же самая структура, что и раньше? Регионы, города, все останется как было...\n\nНет, ты не понимаешь, все по-другому. Это... Дистрикты."
 korea_aprilfools25.17.a: "И это полная победа мафии."
 korea_aprilfools25.18.t: "Звонок от президента"
 korea_aprilfools25.18.d: "ЗДРАВСТВУЙТЕ, ЭТО ПРЕЗИДЕНТ ЯПОНИИ. ВЫ ПРОСИЛИ О ПОМОЩИ, И ВОТ ВЫ ЕЕ ПОЛУЧИЛИ. К СОЖАЛЕНИЮ, НАШ ЛУЧШИЙ ПРЕДСТАВИТЕЛЬ «ХОНДЫ» КИРЮ ДАМЕДАМЕ СЕЙЧАС ЗАНЯТ. Я даю вам номер телефона Горо Мадзимы, нашего второго лучшего автодилера.\nНЕТ, ОН НЕ УБЬЕТ ВАС, ЗАЧЕМ ВЫ СПРАШИВАЕТЕ? НЕТ, ОН АБСОЛЮТНО ВМЕНЯЕМ. Самый здравомыслящий японец, который когда-либо ступал на порог вашего SAMSUNG LAND.\nЯ должен продолжить свою работу над машиной времени, пока.\nДержитесь, братцы..."
 korea_aprilfools25.18.a: "Большое спасибо, президент Японии."
 korea_aprilfools25.19.t: "Вы киберзнаете???"
 korea_aprilfools25.19.d: "ЗНАЕТЕ ЛИ ВЫ, ЧТО КОРЕЯ НА САМОМ ДЕЛЕ КИБЕРПАНК? ТАМ ЕСТЬ КИБЕРЛЮДИ, КИБЕРМАШИНЫ И КИБЕРВОЗДУХ С КИБЕРКОРПОРАЦИЯМИ. МЫ ТАКИЕ КИБЕРПАНКИ. Я наливаю киберчай в киберстакан и пью киберчай, наслаждаясь кибервечером. Как хороша кибержизнь в моей киберпанковской киберкорейской киберстране КиберСамсунг!"
 korea_aprilfools25.19.a: "КиберУууууууууууу."
 korea_aprilfools25.20.t: "Лоботомия... Что???"
 korea_aprilfools25.20.d: "Что вы хотите сказать?\nВы собираетесь решить наши проблемы с электричеством? Вы решите проблему безработицы? Ваша компания не получила ни одной жалобы? Вы гарантируете, что будете здесь 10 000 лет?\nКрасивая молодая женщина, которую я вижу впервые в жизни, конечно, мы дадим вам лицензию и инвестиции, чтобы построить вашу корпорацию с крутым названием!\nНикаких условий. И никаких проверок! Вот как мы ведем бизнес в нашей великой стране Samsung."
 korea_aprilfools25.20.a: "Хорошо."
 korea_aprilfools25.21.t: "УВАЖАЕМЫЙ ПРЕЗИДЕНТ ЯПОНСКОЙ ЯПОНИИ"
 korea_aprilfools25.21.d: "Уважаемый ПРЕЗИДЕНТ ЯПОНСКОЙ ЯПОНИИ.\nМы знаем о трагедии, произошедшей в вашей стране. Мы всегда знали, что китайцы могут взорваться. Сам Джеки Чан предупреждал нас об этом. Чтобы эта трагедия не повторилась, мы предлагаем вам покупать только наши телефоны Samsung. Я верю, что однажды наша дружба перерастет в нечто большее. В нацию, где все будут счастливы, в нацию, которой будут править Honda и Samsung.\nДо смерти TOYOTA!\n\nИскренне ваш, Джон Ли Samsung."
 korea_aprilfools25.21.a: "Хорошо."
 korea_aprilfools25.22.t: "Купите эту машину, сейчас же!"
 korea_aprilfools25.22.d: "Да, я считаю, что вы просто обязаны купить эту стиральную машину, вы даже не представляете, как вам повезло. Простые смертные видят такие умные стиральные машины только раз в жизни....\n\nУ вас уже есть такая машина? Не беда. Но это не значит, что вы должны уклоняться от этой возможности. Вы можете взять запасную. Это был бы действительно умный шаг со стороны просвещенного человека.\n\nУ вас нет денег? Тогда нам будет сложнее с вами разговаривать. Ну. Подождите здесь секунду. Совет решит, как вы сможете оплатить покупку."
 korea_aprilfools25.22.a: "Человек ошибается, пока стремится."
 korea_aprilfools25.23.t: "Подписка истекла"
 korea_aprilfools25.23.d: "Оу чел, с нашей новой системой здравоохранения я чувствую себя хорошо и безопасно! И эти новые таблетки, которые они нам дают, заставляют меня чувствовать себя прекрасно! В любом случае, мой абонемент на медицинское обслуживание истекает, и мне нужно продлить его, думаю, это не будет проблемой, так сколько же он стоит?\n\nУх... Половина моей зарплаты?"
 korea_aprilfools25.23.a: "*Мгновенно чувствует боль, превосходящую человеческое понимание*"
 korea_aprilfools25.24.t: "Эбенград 2: Истоки"
 korea_aprilfools25.24.d: "«Мы бродили по неподвижному, холодному миру. Горизонта не было видно. Старые правители, лишенные гордости и славы. Кажется, что еще вчера мы вращали колеса прогресса, пока кризис не остановил все это. Внезапно. Без предупреждения. Когда приливы и отливы изменились, они изменились для всех нас, независимо от богатства или класса. Мы потеряли наш мир из-за нефти, а вместе с ним и последние следы человечности. Мы распрощались с изобилием, а для тех, кто остался, наступило время адаптации. Мы решили покинуть свои дома и отправиться на север. Мы блуждали несколько недель, а может, и месяцев, оставляя позади все то, что, как мы когда-то считали, сделало нас людьми. Только надежда толкала нас вперед. Медленно. Шаг за шагом. Мы знали цену нашего путешествия, и мы ее платили - сотни раз. Наконец, пришло время построить последний город на Земле»."
 korea_aprilfools25.24.a: "Чучхе-панк - интересный жанр."
 korea_aprilfools25.25.t: "Фумо-мания"
 korea_aprilfools25.25.d: "Вы когда-нибудь задумывались, кто придумал этих плюши-фумо? Ну, вроде как, это Япония, но тут есть над чем подумать... ЭТО! Возможно, этот человек - непризнанный гений.....\nКонечно, в наше время есть Интернет и там можно найти все, но интересно ли это? Думаю, в жизни каждого человека наступает момент, когда появляется непреодолимое желание начать личное расследование происхождения фумо, без посторонней помощи, используя только свою собственную дедукцию.\nЯ начинаю прямо сейчас.\nЯ думаю, первое, что нужно сделать, это поехать во Вьетнам, или куда там их делают."
 korea_aprilfools25.25.a: "Правда."
 korea_aprilfools25.26.t: "Оказывается, это была отличная идея!"
 korea_aprilfools25.26.d: "Именно это я и хотел сказать, но... Уууух. Знаешь, у нас есть несколько сообщений с севера... Они говорят что-то о крови... И вампиры... И люди... Они берут их кровь... Не люди берут кровь у вампиров, а наоборот, я думаю, вы понимаете... \nЕсли честно, я не думаю, что это хорошо для бизнеса."
 korea_aprilfools25.26.a: "О... Это была самая гениальная идея, которая у нас была... "
 korea_aprilfools25.27.t: "HONUDA ACCORD!"
 korea_aprilfools25.27.d: "HONUDA ACCORD! HONUDA ACCORD! HONUDA ACCORD!"
 korea_aprilfools25.27.a: "HONUDA ACCORD!"
 korea_aprilfools25.28.t: "Таинственный туман"
 korea_aprilfools25.28.d: "Вам никогда не казалось, что все вокруг - ложь? Вы видите, вы слышите, вы думаете, но ничто вокруг не имеет смысла, оно не должно существовать в реальном мире.\nМожет быть... Может, все это действительно сон? Разве я не должен сейчас заниматься чем-то другим? Чем-то лучшим? Может, мне стоит просто проснуться, и этот красный туман, застилающий мне глаза, навсегда исчезнет из моей жизни?\nМожет быть, завтра я смогу это сделать."
 korea_aprilfools25.28.a: "Мне проснуться????"
 korea_aprilfools25.29.t: "..."
 korea_aprilfools25.29.d: "ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ ДИСТОРТ"
 korea_aprilfools25.29.a: "Может быть... Это к лучшему..."
 korea_aprilfools25.30.t: "GWANLIJA NARI!!!"
 korea_aprilfools25.30.d: "GWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!!"
 korea_aprilfools25.30.a: "FORWARDS, ROCINANTE!!!"

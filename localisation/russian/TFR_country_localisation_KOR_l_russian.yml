 #Focuses
 KOR_flying_to_the_moon: "Полет на Луну"
 KOR_flying_to_the_moon_desc: "Лично я ассоциирую себя с Луной. Темная и загадочная."
 KOR_my_brother_kim_jong_un: "Мой брат Ким Чен Ын"
 KOR_my_brother_kim_jong_un_desc: "Я пишу письмо моему дорогому брату Ким Чен Ыну. Посмотрим, согласится ли он помочь в воссоединении Кореи."
 KOR_defend_our_country: "Защитите НАШУ СТРАНУ!!!"
 KOR_defend_our_country_desc: "ЗАЩИТИТЕ НАШУ СТРАНУ ЛЮБОЙ ЦЕНОЙ!!! СЕВЕРНЫЕ КОРЕЙЦЫ ПРЕДАЛИ НАС И НАШУ ТЯЖЕЛУЮ РАБОТУ!!! СРАЖАТЬСЯ ДО СМЕРТИ И НИ ШАГУ НАЗАД!!!"
 KOR_just_buy_the_oil: "Просто купить нефть????"
 KOR_just_buy_the_oil_desc: "Уууух, ребята. Я имею в виду, почему вас волнует нефтяной кризис? Просто покупайте нефть."
 KOR_juche_in_my_mind: "Чучхе в моем сознании..."
 KOR_juche_in_my_mind_desc: "Как бы я ни старался, идеи чучхе не выходят у меня из головы. Может быть, мы сможем интегрировать некоторые из них в нашу южнокорейскую жизнь?"
 KOR_second_attempt: "Вторая попытка"
 KOR_second_attempt_desc: "Я так старался и так далеко зашел... Но в конце концов, разве это имеет значение?"
 KOR_eternal_brotherhood: "Вечное братство!!!"
 KOR_eternal_brotherhood_desc: "ЗАЩИЩАЙТЕ НАШИХ БРАТЬЕВ ЛЮБОЙ ЦЕНОЙ!!! СЕВЕРОКОРЕЙЦЫ - НАШИ БРАТЬЯ!!! БОРИТЕСЬ ЗА НИХ И ЗАЩИЩАЙТЕ ИХ ОТ ЗЛА!!!"
 KOR_cultural_exchange: "Культурный обмен"
 KOR_cultural_exchange_desc: "Теперь, когда наши отношения меняются к лучшему, мы можем начать программу культурного обмена для наших граждан. Может быть, мы лучше поймем ценности друг друга!"
 KOR_shining_example_of_great_economy: "Яркий пример здоровой экономики"
 KOR_shining_example_of_great_economy_desc: "Наша экономика великолепна. Даже потрясающе! Слышали когда-нибудь о Чуде на реке Хань? Это про нас! Тигр Азии. САМЫЕ МОЩНЫЕ ПРОИЗВОДИТЕЛИ В МИРЕ. КОРЕЙСКАЯ НАУКА ЛУЧШАЯ В МИРЕ!\n\nЭто сообщение было проспонсировано компанией Samsung Electronics и самим Джоном Ли-Самсунгом."
 KOR_economy_in_ruins: "Экономика в руинах"
 KOR_economy_in_ruins_desc: "Уууух. Может быть, у нас все-таки есть проблемы в экономике? Но мы всегда можем это исправить!!! Это будет легко, клянусь... Просто продавайте больше тостеров."
 KOR_mass_oil_production: "Массовая добыча нефти"
 KOR_mass_oil_production_desc: "Зачем покупать нефть? Славный Ким Ир Сен научил нас основам автаркии. Мы будем добывать нефть сами!!!"
 KOR_print_the_money: "Напечатайте деньги"
 KOR_print_the_money_desc: "Ребята, я нашел новый лайфхак! Мы будем просто... напечатаем деньги!!! Ничего плохого не случится, клянусь!"
 KOR_five_billion_won_to_taiwan: "Пять миллиардов вон Тайваню!!!"
 KOR_five_billion_won_to_taiwan_desc: "Тайвань, эта прекрасная китайская провинция должна быть защищена любой ценой!!! Пытаясь улучшить отношения с Китайской Народной Республикой, мы будем инвестировать в один из самых успешных регионов!"
 KOR_reconcile_with_japan: "Примирение с Японией"
 KOR_reconcile_with_japan_desc: "Знаете, может быть, японцы не так уж и плохи. Мы могли бы наконец забыть старые обиды и двигаться в светлое будущее! Вместе!!! Звучит круто..."
 KOR_boycott_japan: "Бойкот Японии"
 KOR_boycott_japan_desc: "Наши дорогие японские партнеры снова осмелились предать нас.\nДостаточно! Мы объявляем бойкот Японии и их компаниям. Больше никакой японской еды, никаких кимоно, никакого карате, никакого аниме и никаких Хонд!"
 KOR_japanese_jjokbari: "Японские джокбари"
 KOR_japanese_jjokbari_desc: "Кстати, отличные тапки. Они выглядят круто."
 KOR_taking_a_small_loan: "Взять небольшой кредит"
 KOR_taking_a_small_loan_desc: "Ребята. Это всего лишь небольшой заем, клянусь! Мы всегда сможем вернуть его позже. Прямо как в Японии!"
 KOR_investments_i_cant_believe_it: "Инвестиции??? Я не могу в это поверить!!!"
 KOR_investments_i_cant_believe_it_desc: "О, БОЖЕ! ИНВЕСТИЦИИ??? В КОРЕЕ???? ИЗ ЯПОНИИ???????????? МЫ ВСЕГДА ЗНАЛИ, ЧТО ВЫ НАШИ ВЕЧНЫЕ БЛИЗКИЕ ДРУЗЬЯ, ДА, ПОЖАЛУЙСТА!!!!!!!!!!"
 KOR_build_the_japanese_highfleet: "Постройте японский высший флот"
 KOR_build_the_japanese_highfleet_desc: "Мы должны отплатить за инвестиции, которые нам дали наши друзья. Небольшое количество кораблей - это небольшая цена за вагоны хрустящих иен."
 KOR_did_we_forget_someone: "Мы кого-то забыли???"
 KOR_did_we_forget_someone_desc: "Каждый раз, подписывая контракты с крупными японскими фирмами, вы должны спрашивать себя: «Не забыл ли я спросить у кого-то разрешения?»."
 KOR_mooning_as_usual: "Луна, как обычно..."
 KOR_mooning_as_usual_desc: "Луна на улице, йоу. Мы - самая крутая страна в мире. Я уверен, что все пойдет по нашему великолепному плану!!!!!!!."
 
 KOR_chaebols_in_control: "Контролирующие чеболи"
 KOR_chaebols_in_control_desc: "ЧЕБОЛИ ЗАХВАТИЛИ ВЛАСТЬ НАД НАШЕЙ СТРАНОЙ. ЭТО ПРЯМО КАК В МОЕЙ ЛЮБИМОЙ КНИГЕ «ИЗБРАННЫЕ ПРОИЗВЕДЕНИЯ КИМ ИЛЬ СЕНА»!!!"
 KOR_korean_agony: "Корейская агония"
 KOR_korean_agony_desc: "Как ночь и день, Южная и Северная Корея воюют друг с другом уже, кажется, целую вечность. Пришло время прекратить эту глупую междоусобицу. У нашего мудрого лидера есть план, как купить Северную Корею и воссоединить нашу страну."
 KOR_seize_the_property: "Наложить арест на имущество"
 KOR_seize_the_property_desc: "Мы же теперь правительство, верно?\nМожно ли нам просто... забрать все себе???"
 KOR_contacts_in_yakuza: "Контакты в Якудза"
 KOR_contacts_in_yakuza_desc: "В рамках улучшения межгосударственных отношений между Кореей и Японией наши партнеры оставили нам номера своих лучших агентов якудза. Благодаря им мы сможем легко установить свой собственный мафиозный порядок на улицах нашей страны."
 KOR_thats_how_mafia_works: "Вот так работает мафия"
 KOR_thats_how_mafia_works_desc: "Чтобы нам было проще управлять собственными доменами, мы разделим территорию Кореи между четырьмя крупнейшими чеболями. Это позволит поднять эффективность нашей страны до невиданных ранее высот.\nЯ думаю, это логичный шаг. Совсем недавно две Кореи стали одной, и нам стало скучно.\n\nСейчас будет четыре Кореи!"
 KOR_cyberpunk_paradise: "Киберпанковский рай"
 KOR_cyberpunk_paradise_desc: "- Построите ли вы новую процветающую и славную Корею?\n- Да, конечно!\n- Строит мафиозное государство, как босс*."
 KOR_open_the_lobotomy_corp: "Открыть корпорацию "Лоботомия""
 KOR_open_the_lobotomy_corp_desc: "Наши чеболи принесли только процветание и цивилизацию на каждую частичку нашей земли. Пришло время финансировать перспективные стартапы, которые помогут нам продвинуть инновации в будущее!"
 KOR_galaxy_of_phones: "Галактика телефонов"
 KOR_galaxy_of_phones_desc: "Тостер, стиральная машина, смартфон, микроволновая печь, телевизор. Все, что у вас есть, произведено в США. На всем, что у вас есть, есть логотип корейских чеболей. Почему мир должен что-то менять? Чтобы достичь больших высот, люди просто должны больше потреблять!\n\nИ кстати. Наши телефоны никогда не взрывались, в отличие от телефонов наших соседей."
 KOR_healthcare_subscription_trial: "Пробная подписка на услуги здравоохранения"
 KOR_healthcare_subscription_trial_desc: "Добрые и щедрые правители Кореи готовы пойти на уступки великому корейскому народу! Мы меняем систему здравоохранения и даем каждому корейцу шанс испытать эти изменения! Бесплатно! В течение месяца! Лучшие больницы и лекарства для всех уже в вашей подписке Samsung+!"
 KOR_unleashing_the_ego: "Развязывание ЭГО"
 KOR_unleashing_the_ego_desc: "Что-то подсказывает нам, что наша военная мощь не сможет сравниться с мощью наших соседей. Каково решение? Перестать пытаться превзойти их в том, в чем они имеют преимущество.\nМы создадим новые боевые возможности! Наша программа по созданию невиданного оружия и оснащению им самых одаренных воинов вскоре принесет первые плоды и позволит нам вырвать победу из рук наших врагов."
 KOR_apr_building_la_mancha_land: "Здание La ManchaLand"
 KOR_apr_building_la_mancha_land_desc: "Простым гражданам пора отдохнуть от забот и тревог. Нам всем нужно мечтать! И в новых развлекательных комплексах по всей Корее мы поможем людям расслабиться и начать наслаждаться жизнью!"
 KOR_referal_family_program: "Семейная программа "Реферерал""
 KOR_referal_family_program_desc: "Вы спрашиваете меня, как решить проблему рождаемости? Очень просто. Мы запускаем новую реферальную программу. С каждого человека, приглашенного и нанятого в компании Chaebol, вы будете получать 10% от его зарплаты!\nУ вас есть жена? Возможно, у вас несколько детей? Вы можете получать огромный реферальный доход от их работы! Чем раньше, и чем больше, тем лучше ваше вознаграждение!"
 KOR_is_that_the_red_gaze: "ЭТО КРАСНЫЙ ВЗГЛЯД?"
 KOR_is_that_the_red_gaze_desc: "Это Красный Глаз?\n\nПостойте, я даже не знаю, кто это.\nВ любом случае...\n\nЭто Красный Глаз??????"
 KOR_korea_must_survive: "Корея должна выжить"
 KOR_korea_must_survive_desc: ""Мы бродили по неподвижному, холодному миру. Горизонта не было видно. Старые правители, лишенные гордости и славы. Кажется, что еще вчера мы вращали колеса прогресса, пока кризис не остановил все это. Внезапно. Без предупреждения. Когда приливы и отливы изменились, они изменились для всех нас, независимо от богатства или класса. Мы потеряли наш мир из-за нефти, а вместе с ним и последние следы человечности. Мы распрощались с изобилием, а для тех, кто остался, наступило время адаптации. Мы решили покинуть свои дома и отправиться на север. Мы блуждали несколько недель, а может, и месяцев, оставляя позади все то, что, как мы когда-то считали, сделало нас людьми. Только надежда толкала нас вперед. Медленно. Шаг за шагом. Мы знали цену нашего путешествия, и мы ее платили - сотни раз. Наконец, пришло время построить последний город на Земле"."
 KOR_import_japanese_fumos: "Импортные японские фумо"
 KOR_import_japanese_fumos_desc: "Новая правительственная инициатива! Вы получите плюсика Санчо Фумо с 50% скидкой, если оформите предзаказ ПРЯМО СЕЙЧАС! Слава корейско-японской дружбе!\nCooooooooooooooooooooooooooooool."
 KOR_hike_prices_of_dishwashers: "Повышение цен на посудомоечные машины"
 KOR_hike_prices_of_dishwashers_desc: "Наша экономика"
 KOR_infinite_wealth: "Безграничное богатство"
 KOR_infinite_wealth_desc: "Наши экономические реформы: «производить больше и повышать цены» - принесли отличные результаты. Теперь кажется, что у нас есть чит-коды на... Бесконечное богатство."
 KOR_honuda_accordu_production: "РАЗРАБОТКА ХОНУДЫ АККОРДУ"
 KOR_honuda_accordu_production_desc: "HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD!"
 KOR_eater_of_gods: "Пожиратель Богов"
 KOR_eater_of_gods_desc: "Если мы позволим Китаю захватить наше небо, это будет полный КАЛАМИТ! Мы примем все возможные меры, чтобы как можно скорее привести в действие нашу секретную программу. Наш «Пожиратель богов»\n\nИ помните, даже если наша вселенная рухнет... БОГ НЕ БОИТСЯ СМЕРТИ!"
 KOR_call_the_red_mist: "В красный туман"
 KOR_call_the_red_mist_desc: "Да будет известно... Все наши враги... превратятся в тонкий красный туман!"
 KOR_galaxy_armour: "Галактическая броня"
 KOR_galaxy_armour_desc: "Оказывается, наши телефоны идеально подходят для спасения жизни наших клиентов.\nНет, мы явно не получили эту информацию в результате участившихся случаев перестрелок мафии на улицах.\n\nВ любом случае, мы создадим многофункциональные современные высокотехнологичные экзоскелеты из наших телефонов Samsung, и вставим телефон в телефон, чтобы вы могли смотреть на телефон, пока вы смотрите на свой телефон!"
 KOR_samsung_armada: "Samsung Armada"
 KOR_samsung_armada_desc: "Наши Самсунтанки готовы к бою! В нашем распоряжении все современные технологии, от экзоскелетов до оружия, оживляющего человеческое ЭГО... МЫ ПОБЕДИМ.\nПусть враг услышит грохот SAMSUNG. ПУСТЬ ЭТО БУДЕТ ПОСЛЕДНЕЕ, ЧТО ОН УСЛЫШИТ!"
 KOR_mass_distortion: "Искажение массы"
 KOR_mass_distortion_desc: "У вас есть проблемы? Чувствуете, как грехи ползут по вашей спине? Вы беспокоитесь?\n\nИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.ИСКАЗИСЬ.\n\n\nЭто не индивидуальное лечение. рекомендация\n\n\n\nДистанционное лечение не является индивидуальным."
 KOR_gwanlija_nari: "GWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!!"

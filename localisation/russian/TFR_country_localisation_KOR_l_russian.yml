 korea_aprilfools25.32.t: "Джон Ли - Самсунг захватывает власть"
 korea_aprilfools25.32.d: "Неожиданные новости пришли к нам из Кореи. Джон Ли Самсунг обрел полную безраздельную власть в стране! Сообщается, что Джон вспомнил, что все деньги Кореи на самом деле принадлежат ему, и решил ликвидировать ненужные ветви власти, такие как президентство, парламент и местные органы управления. Мы уверены, что теперь, когда у власти находится настоящий принц Кореи, люди наконец-то смогут решить все свои проблемы и привести себя к светлому киберпанковскому будущему."
 korea_aprilfools25.32.a: "GWANLIJA NARI!!!"
 korea_aprilfools25.33.t: "Как справиться с российской оккупацией"
 korea_aprilfools25.33.d: "Шимон (он/они), старший редактор VICE\n\nМы снова вступили в век плохих карт и худших людей. Но пока война опустошает Европу, ваша травма может быть прекрасной, и для этого не нужно брать в руки оружие.\n\nЗдесь, в Польше, мы, да, мы, квиры, художники, люди с татуировками и унаследованными травмами, оказались между государством, которое хочет, чтобы мы покаялись, и захватчиком, который хочет, чтобы мы исчезли. Как же справиться с ситуацией, когда мир снова заканчивается, и на этот раз ты даже не на правильной стороне границы, войны или истории? А мы вообще знаем, являются ли обе стороны «правильными сторонами» истории? Кто знает. Может быть, Бог знает, если слышит нас.\n\nОдин: Успокоительные ритуалы! Ромашка не остановит обстрел, но она отлично смотрится, когда вы собираетесь создать шик «разбомбленного постсоветского города». А еще польские квиры в Люблине меняют веточки мяты на лекарства от гриппа - валюта эмоциональная и мятная.\n\nДва: медитируйте в заброшенных церквях со странной лесбийской энергией. Витражи разбиты вдребезги. Скамейки отсутствуют. Но вибрация есть. Сядьте со скрещенными ногами. Тихонько напевайте. Передайте травму поколений через латынь и лавандовое масло.\n\nТри: Направьте свою энергию в нужное русло! Вы не солдат. Вы пережили алгоритмы и унаследованное горе. Так что зажгите свечу. Сделайте растяжку. И помните: ваша нервная система делает все возможное."
 korea_aprilfools25.33.a: "Остальное я больше не читаю."
 korea_aprilfools25.34.t: "Розы, а не винтовки: Чествование фронтовика-извращенца"
 korea_aprilfools25.34.d: "В результате Землетрясения (xe/xem/xyrs) Чакровая ведьма из Ассоциации Освобожденных взяла оружие, а наш дорогой Шимон - нет. Они несли розу и мечту о сопротивлении, такую прекрасную, что это разбивало наши сердца, а также подвеску Т-90.28 марта, ровно в 11:11 утра, под бледно-серым небом в безопасном месте в Новом Радоме, наш любимый вице-корреспондент, редактор и символ сопротивления Шимон (он/они) был подбит российским танком и погиб, выполняя то, что свидетели описали как "".последний, разрушительный акт поэтического неповиновения". "Они были безоружны, босиком и держали в руках розы.Симон никогда не прятался за доспехами. Они носили шарфы - многослойные, потрепанные, пахнущие лавандой и революцией. Они верили, что квир-сообщество в сочетании с целеустремленностью и общественной уязвимостью может стать оружием против авторитаризма. Сегодня они доказали свою правоту в борьбе с оккупантами.Как Вы можете почтить память Шимона: зажгите свечу с ароматом розы в четверг (их любимый день), отправьте пожертвования в "Парижский квир-кооператив", чтобы отправить полезные веганские блюда квир-беженцам во Франции, или просто посидите в тишине 7 минут, как Шимон делал каждый день в 16:44, чтобы перестроить нервную систему во время кризиса. Шимон, ты - каноник."
 korea_aprilfools25.34.a: "Покойся с миром...?"

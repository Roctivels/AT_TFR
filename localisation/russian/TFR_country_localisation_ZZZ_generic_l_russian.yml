 generic.0.t: "You're a Cheater"
 generic.0.desc: "Because you are a dirty cheater, you have been killed in the universe of TFR. Goodbye"
 generic.0.a: ":_("
 generic.1.t: "Академическое Развитие Повышается"
 generic.1.desc: "Когда кончик пера скользит по бумаге, кажется, что мы слышим звук укореняющейся цивилизации - она расцветет не сразу, но это может уберечь нацию от разрушения в какой-нибудь будущей буре. С нашей политической помощью и субсидиями на образование. Число образованных людей растет день ото дня, инновационные идеи проникают во все отрасли промышленности, и, таким образом, темпы научных исследований незаметно ускоряются."
 generic.1.a: "Очень Хорошо"
 generic.2.t: "Академическое Развитие Понижается"
 generic.2.desc: "Дети больше не зубрят таблицу умножения, а носят пустые мешки на поля, чтобы собирать колосья пшеницы. Учебник разорван и прилеплен к оконной решетке. Из-за хаоса и сокращения финансирования образования уровень неграмотности вновь растет, без знаний даже самые простые инструкции по эксплуатации для рабочих становятся закрытой книгой, а наши научные исследования, таким образом, столкнутся с замедлением."
 generic.2.a: "Мы Должны Исправить Это"
 generic.3.t: "Достигнуто Максимальное Академическое Развитие"
 generic.3.desc: "Поскольку мы достигли предела нашего академического развития, мы сможем выбрать один разовый бонус."
 generic.3.a: "Отлично!"
 generic.4.t: "Развитие Фермерства Повышается"
 generic.4.desc: "Сталь извергала черный дым, сглаживая неизменные борозды и гребни, которые оставались неизменными на протяжении тысячи лет. Происхождение человеческой цивилизации неотделимо от земледелия, и теперь, когда зернохранилища становятся все полнее, в календаре все чаще появляются пометки "излишки зерна". Это произошло не только благодаря новым сельскохозяйственным технологиям, но и нашей заботе об окружающей среде."
 generic.4.a: "Очень Хорошо"
 generic.5.t: "Развитие Фермерства Понижается"
 generic.5.desc: "Трактор стоит у края поля и ржавеет, как скелет гигантского зверя, которого вскрыли. Природа начала возвращать себе свою щедрость и засевать поля сорняками и акациями, и мы больше не можем противостоять этому с помощью новых технологий. Наша сельскохозяйственная продукция сокращается с каждым днем, и в условиях современных технологий мы не можем просто винить "неблагоприятную погоду" - мы, должно быть, тоже допустили какие-то ошибки."
 generic.5.a: "Мы Должны Исправить Это"
 generic.6.t: "Достигнуто Максимальное Развитие Фермерства"
 generic.6.desc: "Поскольку мы достигли предела развития фермерства, у нас будет возможность выбрать один временный бонус."
 generic.6.a: "Отлично!"
 generic.7.t: "Уровень Бедности Понизился"
 generic.7.desc: ""Самый бедный патриот в восточной части Лондона склонен выпячивать грудь, когда думает о промышленности и богатстве Англии." Это высказывание известно многим, но, к счастью, в нашей стране такого не произошло. Бедность невозможно полностью искоренить, но она по-прежнему изгоняется из городских районов улица за улицей. Звук наполняющихся кошельков вдохновляет больше, чем любой гимн."
 generic.7.a: "Очень Хорошо"
 generic.8.t: "Уровень Бедности Повысился"
 generic.8.desc: "Бедность подобна снегопаду, который бесшумно покрывает крыши, языки и мечты. Механизмы страны постепенно заполняются обломками голода, и рано или поздно эти обломки заблокируют механизмы. Уровень бедности в нашей стране становится все выше и выше, и все больше и больше людей остаются на дне. Чтобы просто выжить, им приходится отказываться от морали."
 generic.8.a: "Мы Должны Исправить Это"
 generic.9.t: "Достигнут Минимальный Уровень Бедности"
 generic.9.desc: "Поскольку мы достигли предела развития бедности, у нас будет возможность выбрать один разовый бонус."
 generic.9.a: "Отлично!"
 generic.10.t: "Индустриальное Развитие Повышается"
 generic.10.desc: "Конвейерные ленты в заводском здании никогда не устают. Они доставляют детали в отдаленные места, а также распределяют время между производственными мощностями. Черный дым из труб теперь рассматривается не только как туман, которым дышат заводы, но и как продолжение позвоночника страны — то есть основа нашего существования в современном мире. Теперь мы можем создавать все сами."
 generic.10.a: "Очень Хорошо"
 generic.11.t: "Индустриальное Развитие Понижается"
 generic.11.desc: "Конвейер остановился, а ящики с инструментами открыты — их продают на черном рынке по весу. Заказ был отменен, потому что станок больше не мог производить качественную резьбу. Наша современная промышленность похожа на жевательную резинку, которую много раз жевали. Сладкий вкус давно исчез, оставив только коллоид, застрявший между зубами, который невозможно ни выплюнуть, ни проглотить. Сейчас наши промышленные производственные мощности сокращаются из-за бесчисленных коллоидов, которые появляются день за днем."
 generic.11.a: "Мы Должны Исправить Это"
 generic.12.t: "Достигнуто Максимальное Индустриальное Развитие"
 generic.12.desc: "Поскольку мы достигли предела индустриального развития, у нас будет возможность выбрать один временный бонус."
 generic.12.a: "Отлично!"
 generic.13.t: "Военное Развитие Повышается"
 generic.13.desc: "Благодаря нашим антикоррупционным мерам, сотрудники логистики наконец-то перестали любить деньги. Колонка 'прочие расходы' была удалена из списка, а сэкономленных денег хватило, чтобы снабдить каждый класс снайперской винтовкой с голографическим прицелом. Наконец-то мы можем с гордостью сказать: дула солдат направлены только на врага, а не на кошельки."
 generic.13.a: "Очень Хорошо"
 generic.14.t: "Военное Развитие Понижается"
 generic.14.desc: "Прошлой ночью еще три коробки патронов для винтовок "уплыли" с пирса. Жандармерия задала еще несколько вопросов, а затем офицеры перевели их на границу, чтобы пересчитать верблюдов. В офицерской столовой начали подавать "специальные устрицы," а в солдатской столовой по-прежнему продолжали замечать тараканов в каше. Когда приказ остается без ответа, военный флаг больше не ценится."
 generic.14.a: "Мы Должны Исправить Это"
 generic.15.t: "Достигнуто Максимальное  Военное Развитие"
 generic.15.desc: "Поскольку мы достигли предела нашего военного развития, мы сможем выбрать один временной бонус."
 generic.15.a: "Отлично!"
 generic.16.t: "Развитие Общества Повышается"
 generic.16.desc: "На перекрестке в полночь мигает только красный свет — без камер автомобили по-прежнему послушно выстраиваются в очередь. Суд опубликовал решение в Интернете, и в разделе комментариев было только "Идеальное решение." Благодаря нашей строгой борьбе с преступностью её уровень снижается как среди граждан, так и в новостях. При сотрудничестве с населением наша политика также сможет продвигаться более гладко, что принесет ему дополнительную пользу."
 generic.16.a: "Очень Хорошо"
 generic.17.t: "Развитие Общества Понижается"
 generic.17.desc: "Подоконник был разбит на острые куски, а сигнализация звучала дольше, чем гимн страны. "Семейные методы самозащиты" становятся все более распространенными на улицах и переулках: установка двух слоев защитных дверей и выращивание кактусов на балконах. Это влияет не только от воров, но и на их доверие. Когда закон существует только на бумаге, улицы превращаются в аукционные дома: кто смел, тот может купить чужое имущество по нижайшей цене."
 generic.17.a: "Мы Должны Исправить Это"
 generic.18.t: "Достигнуто Максимальное Развитие Общества"
 generic.18.desc: "Поскольку мы достигли предела развития нашего общества, мы сможем выбрать один временный бонус"
 generic.18.a: "Отлично!"
 generic.20.t: "ВНИМАНИЕ: Страна без Контента"
 generic.20.d: "Здравствуй, дорогой игрок.\nМы понимаем, что количество играбельных стран сейчас невелико, а эта страна выглядит вполне играбельной! Да, у нее есть войны, идеи, возможно, даже несколько фокусов. Но, к сожалению, контент этой страны не адаптирован для игрока, он адаптирован только для ИИ. Так что лучшим вариантом будет играть за какую-нибудь другую страну, содержание которой адаптировано для игрока.\nСледите за новостями, патриоты.\nВсего наилучшего,\nРазработчики TFR"
 generic.20.a: "Довольно справебыдло."
 tech.1.t: "Функциональность боевого ИИ"
 tech.1.d: ""
 tech.1.a: "Позволить ИИ писать."
 tech.1.b: "Разрешить ИИ только читать."
 
 decision_event_news.5.t: "Просыпаясь утром, я спрашиваю себя: что ты сделал для TFR?"
 decision_event_news.5.d: "Собирает значит Жириновский свою команду и говорит: "Работать будем по справедливости"\n\n"Поэтому я буду получать больше всех!""
 decision_event_news.5.a: "«Hаш мод должен... И много, панимаеш...»"

 EU_member_dynamic: "Член Европейского Союза"
 EU_member_dynamic_desc: "Идея объединенной Европы на протяжении всей истории Европы была не более чем идеей или концепцией. Но в самые мрачные времена европейской истории, когда по всему континенту распространялись фашизм и коммунизм, она положила начало новой Европе, которая будет определять последующие тысячи лет европейской истории. С помощью демократических государств, таких как Великобритания, Франция, Германия и Соединенные Штаты, пламя демократии распространилось по всему континенту и заложило основы Европейского союза. Созданный в 1993 году Европейский союз был призван обеспечить Европе возможность не повторять ошибок прошлых стран и лидеров, а двигаться по пути прогресса. \n\nСегодня Европейский Союз представляет собой культурный, экономический и политический союз европейских государств по всей Европе. Мы являемся сияющим маяком прогресса, демократии и единства, чтобы показать всему миру, что Европа будет вместе противостоять этим трудностям и справится с ними в будущем. В попытке продвинуть мир, демократию, дипломатию, здоровье, безопасность и права человека на всем европейском континенте и за его пределами. Эти основные ценности и убеждения Европейского Союза скрепляют наш континент, и в неопределенном будущем, с которым мы скоро столкнемся. \n\nМы едины в многообразии."

 ATW_brandon_russell_char_desc: "За достаточно долгое время у каждого наступает смертельная усталость: физическая или умственная. Просто посмотрите на его глаза - на часах не осталось времени. Водителя нет за штурвалом. Отправьте его подальше - подальше от всех нас. Когда этот парень взорвется, никто не захочет быть рядом и наблюдать за этим.\n\nРодившийся в 1995 году Брэндон Клинт Рассел - человек, посвятивший всю свою жизнь национал-социалистическому делу, в возрасте 18 лет он появился на интернет-форумах, таких как Iron March. Вдохновленный революционными аспектами нацизма, он вскоре объявил о создании дивизии Атомваффен, военизированной организации, нацеленной на полное уничтожение существующего мирового порядка. Используя свой опыт службы в национальной гвардии и изучение ядерной физики, он отсеял пассивные элементы из группы и понял, что единственным средством победы является крайнее насилие с финальным взрывом радиоактивного огня.\n\nПока однажды ему не предъявили обвинение в хранении материалов, связанных с созданием взрывчатки, и его не заперли в бетонных коридорах тюрьмы. В заключении он оставался непоколебимым, призывая других членов организации продолжать выполнять свою миссию. Его неизбежно выпускали из тюрьмы, но ФБР знало, что он продолжит выполнять свою миссию. Теперь, когда Соединенные Штаты Америки охвачены пламенем перемен, он наблюдает за крахом, как стервятник, готовый выполнить миссию Атомваффена.\n\nРазрушить глобальный мировой порядок, наказать декадентов и положить конец истории, какой мы ее знаем.\n\n"В этом мире нет места для трусливых людей... Меч уже наготове. Обратного пути нет.""
 ATW_james_mason_char: "Джеймс Мейсон"
 ATW_james_mason_char_desc: "Джеймс Нолан Мейсон был американским фашистом более пятидесяти лет, с тех пор как в 1966 году присоединился к молодежному крылу Американской нацистской партии Джорджа Линкольна Рокуэлла. После убийства Рокуэлла год спустя Мейсон пошел по все более радикальному пути: он считал, что электоральная политика Рокуэлла потерпела крах, и единственный способ восстановить превосходство белых в Америке - это дестабилизировать общество и свергнуть федеральное правительство. В этом смысле на него оказали наибольшее идеологическое влияние два последовательных лидера АНП Уильям Лютер Пирс и культовый лидер Чарльз Мэнсон.\n\nПосле смерти Пирса в 2002 году Мейсон стал ведущим идеологом неонацизма в Америке. Подборки статей из его информационного бюллетеня "Осада" просочились в ультраправое подполье, где оказали сильное влияние на эзотерическую партизанскую террористическую сеть, позже известную как движение Атомваффен. Поскольку лояльность американского правительства разделилась, а его способность обеспечивать порядок пошатнулась, ячейки атомваффена восстали на юге Америки и пригласили своего величайшего вдохновителя стать их лидером. Несмотря на то, что Мэйсон командует всего несколькими отрядами фанатичных воинов, он как никогда близок к воплощению своей извращенной расовой утопии в реальность. Многие беспокоятся о том, что произойдет, если он захватит крупный город, не говоря уже о ядерном арсенале."

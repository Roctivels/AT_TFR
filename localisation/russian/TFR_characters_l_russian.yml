 ATW_joshua_sutter_char: "Джошуа Саттер"
 ATW_joshua_sutter_char_desc: "Ребенок, который видел самое худшее, что может случиться в мире, не может смириться с потерей и текущей ситуацией в мире. Когда мир горит, он не понимает, почему это произошло. Жизнь не научила его такому откровению. Он уже стоял одной ногой в могиле и мечтал, чтобы этот кошмар закончился. Но он не остановится до этого момента - пока его жизнь не заберет другой человек, готовый развести руками за бессмысленную мораль. Джошуа Калеб Саттер - человек, окутанный тайной, известный широкой публике как ключевая фигура в Ордене девяти углов, информатор ФБР и издатель экстремистских книг. Будучи одно время лидером Арийских наций, Саттер имеет обширные связи с экстремизмом. Он присягнул на верность Северной Корее, руководил индуистской сектой и создал Храм Крови, \"нексион\" или ячейку Ордена Девяти Углов. Его влияние на дивизию «Атомваффен» нельзя недооценивать: и без того жестокий по своей природе, он подтолкнул организацию к тому, чтобы выйти за рамки самого понятия морали и человечности. "

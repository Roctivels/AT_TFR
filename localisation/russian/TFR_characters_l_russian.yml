 #JAP - State of Japan
 JAP_naruhito_char: "Нарухито" #by ai
 JAP_NARUHITO_DESC: "Император Нарухито, вступивший на трон 1 мая 2019 года, стал 126-м императором Японии. Он родился 23 февраля 1960 года и является сыном императора Акихито и императрицы Мичико. Нарухито получил образование в Японии и за границей, в том числе в Оксфорде, что способствовало его пониманию международных отношений и культур. Его правление началось с исторического момента, когда его отец Акихито стал первым императором, добровольно отрекшимся от престола за более чем два века.\n\nПри правлении Нарухито Япония сталкивается с рядом вызовов, включая старение населения, экономические трудности и необходимость адаптации к глобальным изменениям. Император активно поддерживает идеи мира, устойчивого развития и социальной справедливости. Его девиз "Рэйва" (что переводится как "прекрасная гармония") отражает стремление к единству и процветанию японского народа. Этот девиз также символизирует надежду на мирное сосуществование и культурное разнообразие.\n\nНарухито активно участвует в общественной жизни, поддерживая различные инициативы в области образования, экологии и культуры. Он продолжает традиции своих предшественников, но также привносит современные идеи и подходы, что делает его правление уникальным. В условиях глобальных вызовов император стал символом стабильности и надежды для японского народа."

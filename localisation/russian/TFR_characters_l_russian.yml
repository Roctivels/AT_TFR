 #BRS - Bruselles European COmmission
 BRS_Mateusz_Morawiecki: "Матеуш Моравецкий"
 POLITICS_MATEUSZ_MORAWIECKI_DESC: "Матеуш Моравецкий - польский политик, экономист и бывший банкир. Родился в 1968 году в центре восточного блока, изучал историю и экономику в Польше и за рубежом, а затем построил карьеру в финансовом секторе, в конечном итоге став генеральным директором Bank Zachodni WBK. Его переход в политику произошел в середине 2010-х годов, когда он присоединился к консервативному правительству "Право и справедливость" (ПиС) в качестве министра развития и финансов, а затем стал премьер-министром.\n\nРуководство Моравецкого уделяет особое внимание экономической модернизации, промышленной политике и национальной устойчивости. Он курировал крупные программы государственных инвестиций, увеличил социальные расходы и проводил политику, направленную на снижение зависимости Польши от иностранного капитала и импорта энергоресурсов. Уделяя особое внимание вопросам безопасности, Моравецкий считает восточное положение Польши стратегически уязвимым и поддерживает активное панъевропейское сотрудничество в области обороны. Хотя он поддерживает членство в ЕС, он часто сталкивается с Брюсселем по вопросам судебной реформы и суверенитета. Сторонники высоко ценят его за экономическую дисциплину и готовность к действиям; критики утверждают, что его управление нарушает демократические нормы."
 BRS_Ursula_Leyen: "Урсула Фон Дер Ляйен"
 POLITICS_URSULA_LEYEN_DESC: "Урсула Гертруда фон дер Ляйен - немецкий политик и врач, которая стала одной из самых влиятельных фигур в современном европейском управлении. Родившаяся в 1958 году в Брюсселе в семье известного европейского государственного служащего, она выросла в атмосфере институциональной культуры Европейского сообщества. Она изучала экономику в Гёттингенском университете, а затем перешла на медицину, получила диплом врача и впоследствии работала по специальности.\n\nФон Дер Ляйен вошла в политику через Христианско-демократический союз (ХДС) и неуклонно продвигалась по партийной лестнице, занимая несколько министерских постов в Германии, в том числе министра по делам семьи, труда, а затем и обороны. Ее пребывание на посту министра обороны было отмечено амбициозными реформами, стремлением к модернизации и постоянными спорами по поводу закупок и боеготовности.\n\nВ 2019 году она была назначена президентом Европейской комиссии, став первой женщиной на этой должности. В качестве президента Комиссии она позиционирует себя как консенсус-билдера с сильным исполнительным инстинктом, курируя крупные инициативы в области климатической политики, цифрового регулирования, промышленной стратегии и координации европейской обороны. Ее стиль руководства сочетает в себе технократический менеджмент с политическими амбициями, часто подчеркивая единство, устойчивость и стратегическую автономию. Критики обвиняют ее в централизации и осторожной риторике, в то время как сторонники видят в ней стабилизирующую силу в период усугубляющихся кризисов для Европы."
 BRS_Sandro_Gozi: "Сандро Гоци"
 POLITICS_SANDRO_GOZI_DESC: "Сандро Гоци - итальянский политик и убежденный сторонник европейского федерализма. Родился в 1968 году, изучал право и европейские дела, впоследствии специализировался на институциональной реформе и управлении ЕС. Гози начал свою карьеру в качестве ученого и советника по вопросам европейской интеграции, а затем вошел в итальянскую политику как член Демократической партии.\n\nС 2014 по 2018 год он занимал должность заместителя государственного секретаря Италии по европейским делам, где прославился своей открытой поддержкой более глубокой интеграции ЕС и усиления наднациональной власти. После ухода с государственной должности Гози продолжил свою политическую карьеру на европейском уровне, примкнув к проинтеграционным движениям и центристским либеральным блокам. Он поддерживает расширение исполнительной власти ЕС, сокращение национальных вето и укрепление коллективного принятия решений в области внешней политики и обороны. Поклонники считают его трезвым реалистом в отношении структурных слабостей Европы, а критики обвиняют его в элитарности и пренебрежении национальными политическими культурами."
 BRS_Bas_Eickhout: "Бас Эйкхаут"
 POLITICS_BAS_EICKHOUT_DESC: "Бас Эйкхаут - нидерландский политик и эксперт по экологической политике, наиболее известный своей ролью в европейском зеленом движении. Родился в 1976 году, изучал химию и экологические науки, позже получил докторскую степень в области климатической и энергетической политики. До вступления в политику Эйкхаут работал исследователем в Нидерландском агентстве по оценке окружающей среды, участвуя в международном моделировании климата и анализе выбросов.\n\nВ 2009 году он вошел в Европейский парламент в качестве члена партии Зелёных Левых, где быстро стал одним из ведущих экспертов по вопросам климатического законодательства, реформы торговли выбросами и политики в области возобновляемых источников энергии. Эйкхаут выступает за обязательные экологические цели, крупномасштабные государственные инвестиции в "зеленую" инфраструктуру и переориентацию европейской промышленности на принципы устойчивого развития. Он часто представляет изменение климата как структурную угрозу, сопоставимую с войной или экономическим коллапсом. Несмотря на похвалу за свои технические знания, он подвергается критике со стороны оппонентов, которые утверждают, что его предложения недооценивают экономические и геополитические ограничения."
 BRS_Nicolas_Schmit: "Николас Шмит"
 POLITICS_NICOLAS_SCHMIT_DESC: "Николя Шмит, родившийся в 1953 году, является люксембургским политиком и ветераном европейской социал-демократии. Он изучал экономику и социальные науки, а затем поступил на государственную службу, где построил карьеру, сосредоточенную на трудовой политике, социальной защите и европейском управлении. Шмит занимал пост министра труда, занятости и социальной экономики Люксембурга с 2009 по 2019 год, заработав репутацию прагматичного переговорщика между профсоюзами, работодателями и государственными учреждениями.\n\nВ 2019 году он был назначен европейским комиссаром по вопросам занятости и социальных прав, где играл центральную роль в формировании трудовых стандартов ЕС, координации минимальной заработной платы и гармонизации социальной политики. Политические взгляды Шмита основаны на постепенных реформах, институциональной преемственности и сохранении социальной сплоченности в периоды кризиса. Он скептически относится к радикальным переменам, предпочитая, как типичный левый европейский бюрократ, нормативные рамки и решения, основанные на консенсусе. Сторонники считают его стабилизирующим технократом, а критики утверждают, что его опора на существующие институты ограничивает его способность реагировать на системные сбои."
 BRS_Walter_Baier: "Вальтер Байер"
 POLITICS_WALTER_BAIER_DESC: "Вальтер Байер - австрийский политолог, редактор и давний деятель европейской радикальной левой политической силы. Родился в Вене в 1954 году, его политические взгляды сформировались под влиянием левой среды после 1968 года, и в начале своей академической карьеры он увлекся марксистской и постмарксистской мыслью. Байер изучал философию и социальные науки в Венском университете, где у него сформировался интерес к политической экономии, идеологии и европейской интеграции с критической точки зрения.\n\nПозже Байер стал председателем Коммунистической Партии Австрии, эту должность он занимал с 1994 по 2006 год. Под его руководством партия отошла от ортодоксального коммунизма времен холодной войны и перешла к более плюралистической и европееской левой платформе. После ухода из партийного руководства Байер сосредоточился на транснациональной координации левых сил, став ключевой фигурой в европейских левых сетях и аналитических центрах. Позже он занимал должность координатора Партии европейских левых, выступая за более тесное сотрудничество между социалистическими, коммунистическими и прогрессивными движениями по всему континенту. Байер известен своим акцентом на институциональной стратегии, идеологической согласованности и долгосрочной политической организации, а не на массовом популизме."
 
 #GER - Federal Republic of Germany
 GER_oskar_prinz: "Оскар Прусский"
 GER_frankwalter_steinmeir: "Франк-Вальтер Штайнмайер" #by ai
 GER_STEINMEIR_DESC: "Франк-Вальтер Штайнмайер занимает пост президента Германии с 2017 года, имея за плечами многолетний политический опыт. Член СДПГ на протяжении довольно длительного времени, он широко отстаивает ценности демократии и свободы.\n\nОн родился в 56-м году в Детмольде, изучал право и политологию, в итоге получил докторскую степень в области права. Свою долгую карьеру в политике он начал в 1990-х годах в качестве советника Герхарда Шредера, сначала в земле Нижняя Саксония, а затем в Берлине, где он стал начальником канцелярии, помогая осуществлять реформы социального обеспечения и труда в 2010 году.\n\nОн дважды занимал пост министра иностранных дел, работая под руководством канцлера Ангелы Меркель, которая вела различные переговоры с такими крупными странами, как Россия, Иран и ЕС. Он также занимал пост вице-канцлера и возглавлял оппозицию в Бундестаге.\n\nШтайнмайер использовал свой пост для защиты либеральной демократии. Хотя он не является фигурой, привлекающей внимание, он известен в немецком обществе."
 GER_EUROCOMMISSION_DESC: "Берлинский Конституционный Договор; гл. 3, ст. 174:\n'Комиссия является высшим руководящим и исполнительным органом Федерации. Комиссия состоит из семи членов. Члены Комиссии избираются Парламентом после каждых всеобщих выборов... сроком на четыре года. Исполнительная власть опирается на большинство в парламенте и получает демократическую легитимность.'\n\nЕвропейская мечта почти умерла в тишине. Когда российские танки прокатились по равнинам Европы, а ракеты разорвали небо, Европейский союз стоял на грани полного краха. Но из разрухи войны возник новый порядок.\n\nНи один глава государства или правительства не возглавляет Европейский союз. Нет сильных мира сего, произносящих речи или командующих армиями. Вместо этого им коллективно управляет Европейская комиссия - наднациональный орган, призванный защищать идеалы Союза сейчас, как никогда раньше. Комиссия, как и весь Союз, ходит по узкому канату между национальным суверенитетом и амбициями с тех пор, как Комиссия была создана в соответствии с Лиссабонским договором. Критики называют ее неподотчетной, холодным двигателем глобализма. Сторонники видят в ней последнюю, самую большую надежду на самостоятельную Европу.\n\nСейчас, когда Европа отбросила главу государства и полностью отдала себя на милость Брюсселя, Комиссия оказалась на неизведанной земле. С централизацией институтов и значительным расширением полномочий Комиссии, она больше не является просто второстепенным органом. Она является фактическим правительством более чем 200 миллионов граждан.\n\nЭтот эксперимент возглавляет не один мужчина или женщина, а целая система. Возможно, он последний в своем роде. Если он снова достанется русским, Европа снова расколется. Возможно, в последний раз."
 GER_FEHLINGER_DESC: "Гюнтер Фелингер-Ян построил карьеру, которую никто не мог предсказать, - по одному твиту за раз. Он родился в 1968 году и должен был вести традиционную австрийскую жизнь: гимназическое образование, недолгая служба лейтенантом в австрийской армии и почти десятилетняя учеба в Венском экономическом университете. Но Фелингер никогда не был доволен тем, что остается в рамках обычной жизни. В Брюсселе, где он работал в хаотичные годы после Маастрихта, он все больше и больше увлекался великими идеями либеральной демократии.\n\nВ эпоху, когда лидеры поднимаются через институты, Фелингер строил свою власть втайне, благодаря своему нескрываемому самовыражению и непоколебимой вере в сильную и единую Европу под крылом НАТО. Будучи президентом различных пропагандистских комитетов НАТО и групп по интеграции Балкан, он неустанно выступал за расширение альянса и снова и снова предупреждал Европу о необходимости бороться с русскими зубами и ногтями. Однако при всех своих связях в институтах Фелингер больше известен своим печально известным присутствием в социальных сетях. На обрывистом, часто ломаном английском языке он издает пламенные прокламации, наполовину дипломатические записки, наполовину мессианский пыл. Одни видят в нем провидца. Другие - бредового чудака.\n\nИстория, однако, в конечном итоге докажет, что Фелингер прав.\n\nКогда армии Медведева обрушились на Восточную Европу, континент и весь мир обратились к Брюсселю за руководством, но обнаружили нерешительность. В этом вакууме Фелингер появился не как политик, а как лидер Свободной Европы. Он предупреждал об этом моменте годами. Безумец теперь стал стратегом. Фелингер превратил Брюссель в бастион антироссийского крестового похода, поклявшись освободить Восток и уничтожить саму русскую нацию. Он не обещает Европе мира, он обещает войну и победу.\n\nДля него эта война - эндшпиль между демократией и тиранией."
 GER_SCHWAB_DESC: "Клаус Шваб родился в Вюртемберге в 1938 году и был сыном швейцарского промышленника, глубоко связанного с нацистской военной машиной. Его раннее образование было разделено между спокойным Цюрихом и восстанавливающимися руинами послевоенной Германии. Его академическая траектория была точной и продуманной. К 1960-м годам он получил докторскую степень по инженерным и экономическим наукам, а также степень магистра в Гарварде, где его наставником был Генри Киссинджер. Шваб начал преподавать бизнес-политику в Женеве, но его истинное наследие проявилось, когда в 1971 году он основал Европейский форум менеджмента - ежегодный саммит, где миллиардеры, технократы и мировые лидеры могли собраться, чтобы обсудить будущее. Впоследствии он превратился в организацию, которая сегодня железным кулаком правит Европой.\n\nШваб основал Всемирный экономический форум в 1971 году с единственной миссией: воспитывать умы, которые будут "формировать глобальные, региональные и отраслевые повестки". На протяжении десятилетий он вел долгую игру: тихие конференции, налаживание контактов и бесчисленные белые книги о слиянии государства и рынка. Многие считали его безобидным футуристом. Глупцы.\n\nКлаус Шваб всю свою жизнь шептал на ухо премьер-министрам и президентам, но наконец-то он вышел из тени. В то время как Комиссия приглашает технократов ВЭФ взять на себя управление, Шваб предлагает кульминацию своей жизни: в соответствии с Повесткой на 2040 год и Четвертой промышленной революцией Европа будет перестроена; не для людей, как они есть, а для того, что, по мнению Шваба, они должны сделать. Остаётся только один вопрос:\n\nВы готовы?"
 GER_BYUNG_CHUL_HAN_DESC: "Хан Бён-Чхоль наиболее известен как теоретик культуры и философ, известный своей критикой неолиберализма и влияния капитала на человеческое общество в целом.\n\nХан написал более тридцати книг, все они так или иначе деконструируют современную жизнь, его чувства к тоталитарной природе общества прозрачности, которое стало инструментом власти в неолиберальных рыночных силах, где добровольная открытость превозносится выше всех других социальных норм.\n\nПосле неудач Die Linke и нисходящей спирали смерти капитала, несомненно, люди будут искать альтернативы, и не обязательно в противоположном направлении политического спектра.\n\nХан никогда не был открыт в отношении своей личной жизни, и с его недавней сменой карьеры это, похоже, не изменится, а с руководством Германии в лице его и его коллег-философов и экспертов, несомненно, постоянные перемены неизбежны.\nСамоэксплуатация, раскрытие под давлением, ревностная преданность капиталу - все это станет прошлым, в которое никогда не захочется вернуться.\n\nВеликое выгорание закончилась, настало время жизненной силы."
 GER_ARMSTROFF_DESC: "Клаус Армштрофф родился в 1957 году в бывшей Восточной Германии. После воссоединения Германии он поселился в Вайдентале, земля Рейнланд-Пфальц. Некоторое время работал электриком, но затем поддался крылу радикального ультраправого мышления, которое в то время переживали многие его соотечественники. Так, он вступил в НДПГ и с 2009 года был членом районного совета в Бад-Дюркхайме и занимал руководящую должность в земельном совете НДПГ в Рейнланд-Пфальце. Однако ему стали неприятны внутренние и идеологические разногласия в партии. Так, в 2013 году он покинул НДПГ, создав собственную партию. Der III. Weg. Партия, гораздо более открытая для социалистической мысли, занимающая национально-революционную позицию и продолжающая наследие Отто Штрассера. \n\nЕго партия пользовалась ограниченным успехом, по крайней мере, до тех пор, пока европейская война не опустошила европейский континент, заставив восточноевропейские народы снова следовать за коммунизмом. В результате, когда доверие населения к правительству рухнуло, сторонники жесткой военной линии организовали переворот. Однако вскоре они обнаружили, что их цели, кроме ненависти к коммунизму, очень сильно разделились. Клаус и его партия стали сильным голосом, объединившим хунту среди этого хаоса. Таким образом, они возвели его в ранг федерального канцлера.\n\nТеперь, когда он полностью контролирует Германию, его видение воинствующей, антикапиталистической, штрейкбрехерской Германии - лишь вопрос времени. А вот что не является вопросом времени, так это то, как его реформы скажутся в долгосрочной перспективе и как их воспримут в Кремле."
 GER_BUNDESTAG_DESC: "Впервые в нашей истории на президента Бундестага было совершено покушение. В связи с этим мы выбрали процесс в соответствии со статьей 57 Основного закона, согласно которой власть переходит к федеральному парламенту Германии. На данный момент этот орган должен коллективно навести порядок в Германии, а тем временем федеральный суд готовит чрезвычайные президентские выборы через 30 дней.\n\nНо с нашим уже поляризованным обществом никто не ожидает, что Бундестаг сможет сделать много в это время. Все, что он может сделать, это попытаться сделать все возможное, чтобы обеспечить стабильность для и без того радикально настроенного населения. Однако борьба внутри самого парламента делает эту задачу все более трудной, к тому же, похоже, ни один немецкий политик не пользуется поддержкой простых людей.\n\nВсе, что мы можем сделать, это подготовиться к выборам, но в условиях беспорядков по всей стране и отказа наших военных выполнять наши приказы, эти испытания будут нелегкими."
 GER_FRANZ_DESC: "Франк Франц родился в 1978 году в Фёльклингене, Саар, на территории тогдашней Западной Германии, и рос в объединенной Германии, отмеченной политическим расколом и экономической неопределенностью. В такие времена некоторые немцы обращались к радикальным движениям, которые пропагандировали "лучшие альтернативы" нынешней власти. Франц не был исключением. Он вступил в НДПГ в начале 2000-х годов, а затем возглавил партию во время ее упадка. Обладая талантом к ребрендингу экстремизма в более приемлемых терминах, Франц продвигал новый политический образ, основанный на традиционализме, порядке и культурном возрождении.\n\nНесмотря на непопулярность среди населения, Франц оставался активным в ультраправых кругах, незаметно налаживая связи с военными и националистическими группами. Свой триумф он обрел вскоре после окончания Европейской войны. Неспособность НАТО сдержать продвижение советских войск в Восточной Европе привела к массовому разочарованию среди уставшего населения. Поэтому они обратились к более радикальным идеям.\n\nСразу после того, как Бундестаг погрузился в хаос, военные, обвинив Берлин в нерешительности и слабости, совершили стремительный переворот. Пообещав восстановить суверенитет и силу, они обратились к Францу, которого многие считали олицетворением решимости и национального единства. Поддержанный офицерами, военизированными формированиями и отчаявшейся общественностью, он был назначен канцлером в рамках чрезвычайных полномочий. Теперь Франц обладает полной властью над своим Хайматом. Присоединится ли он к аналогичным движениям по всей Европе или обратится к прошлому - зависит от его воли."
 GER_HEINRICH_DESC: "Несмотря на то, что монархия была неотъемлемой частью истории Германии, многие немцы от нее отошли. И это правда, что в течение последнего столетия немецкие аристократы не имели никакого влияния на государство. Но Генрих XIII принц Ройс планировал положить конец этой реальности. Генрих XIII родился в 1951 году в доме Ройсов и рос с глубоким почтением к имперскому прошлому Германии. Он обожал свой дворянский титул и поэтому с недоверием относился к немецкому демократическому истеблишменту. Будучи успешным бизнесменом в раннем возрасте, Генрих в 1990-х годах отошел от общественной жизни, обратившись к монархическим кругам и конспирологическим движениям. К 2020-м годам он стал центральной фигурой в аристократическом подполье Германии, считая себя богоизбранным главой государства, которого Германия придерживалась на протяжении большей части своей истории.\n\nКогда НАТО распалось под тяжестью катастрофической войны с возрожденным СССР, Германия погрузилась в кризис. Русские победы в Восточной Европе, экономические потрясения и волны беженцев подорвали доверие населения к правительству. В условиях хаоса военные, придерживающиеся жесткой линии, совершили переворот, сместив гражданское руководство Берлина.\n\nВ поисках объединяющей фигуры, обладающей исторической легитимностью, во главе государства встал Генрих XIII. Несмотря на противоречивость, его благородное происхождение и призывы к национальному возрождению нашли отклик в обществе, измученном нестабильностью. Вскоре после этого умирающая республика была распущена. Вместо нее Германия вернулась к своим имперским корням. Была организована грандиозная коронация, на которой присутствовали некоторые из оставшихся в мире монархов. Многие задаются вопросом, что это может означать для Германии, но с учетом того, что лидеры хунты остались, война с Советами кажется неизбежной, просто эстетика сменилась."
 GER_OTTE_DESC: "Макс Отте - не обычная политическая фигура. Этот 60-летний экономист и проницательный аналитик, родившийся в 1964 году, прошел неспокойный, но увлекательный путь по политическому ландшафту Германии. Хотя официально он является членом ХДС, его взгляды значительно смещены вправо.\n\nИспользуя свое значительное финансовое влияние, созданное через хедж-фонды и частные сделки, Отте неоднократно оказывал поддержку АдГ, как идеологическую, так и материальную. Его книги-бестселлеры, некоторые из которых жутко предсказали финансовый крах 2008 года, закрепили за ним репутацию пророка экономического краха.\n\nНа фоне миграционного кризиса, американских волнений и растущей напряженности в отношениях с Россией Отте стал "темной лошадкой" на выборах. Возможно, в такие неопределенные времена Германия нуждается именно в такой фигуре, чтобы восстановить стабильность и надежду."
 GER_DIETMAR_DESC: "Хотя Бартш уже не молод, он кажется юным по сравнению с некоторыми из старших государственных деятелей, доминирующих в мировой политике. Как и они, он не испытывает недостатка в противоречиях.\n\nРожденный в ГДР и до сих пор верный многим ее принципам - хотя и адаптированным к современности - Бартш был редактором социалистической газеты и даже учился в Академии общественных наук при КПСС в Москве.\n\nКлассический левый политик, он решительно выступает против глобализации и милитаризма. Однако, как показало печально известное "дело Лафодёделя," он не прочь позаимствовать тактику правых, если она ему подходит. "

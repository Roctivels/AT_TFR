 PRC_centrist_status_okay: "§Y[?PRC_influence_cen_var|=+1%]§! (£political_power_texticon [?PRC_influence_cen_dynamic_var|=+1%])\n§YЦентристы§! это те, кто желает сохранить статус-кво - государственный прагматизм, сочетающий социалистическое экономическое планирование с тактикой рыночных преобразований, наряду с пролетарской диктатурой для руководства страной. Возглавляемая Си Цзиньпином, она объединяет 2 основные фракции в китайском правительстве - Красных принцев и Туаньпаев. Подъем Китая при центристах будет медленным, но, несомненно, устойчивым."
 PRC_lib_status_okay: "§Y[?PRC_influence_lib_var|=+1%]§! (£stability_texticon [?PRC_influence_lib_dynamic_var|=+1%])\n§CРеформаторы§! с любовью вспоминают процветание и стабильность во времена правления Цзян Цзэминя и Ху Цзиньтао. В результате они все чаще выступают против более напористого и централизованного руководства Си Цзиньпина. В политике реформисты выступают за более молодое руководство и за верховенство закона вместо "правления человека". В экономическом плане они предлагают широкий спектр решений, включая дальнейшие рыночные реформы и лучшее распределение богатства. Хотя они все еще слабо организованы, их коллективный голос становится все труднее игнорировать."
 PRC_nat_status_okay: "§Y[?PRC_influence_nat_var|=+1%]§! (£attack_texticon [?PRC_influence_nat_dynamic_var|=+1%])\n§OРеваншисты§! считают, что главная цель партии в XXI веке - исправить "век унижений", пережитый Китаем. Все остальные цели должны поддерживать эту миссию, часто прибегая к крайним мерам, если это необходимо. Особое внимание они уделяют вооруженным силам в лице НОАК, которые становятся ключевой сферой их влияния. Кроме того, многие реваншисты рассматривают Народную Республику как неотъемлемую часть тысячелетней имперской традиции Китая, подчеркивая культурную и идеологическую интеграцию между ними."
 PRC_newleft_status_okay: "§Y[?PRC_influence_new_var|=+1%]§! (£construction_speed_texticon [?PRC_influence_new_dynamic_var|=+1%])\n§RНовые Левые§! это широкий круг социал-демократов, левых консерваторов, маоистов, профсоюзных активистов и различных социалистов, не входящих в КПК. Рассматривая реформы и открытость Дэн Сяопина как предательство социализма, они стремятся вернуть Китай на путь социалистической реконструкции и восстановить первоначальное видение Маркса и Мао."


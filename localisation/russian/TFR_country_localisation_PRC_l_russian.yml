 PRC_science_technocratic_state_dynamic: "Китайский Эксперимент"
 PRC_science_technocratic_state_dynamic_desc: "Хаотичное, запутанное и иррациональное правительство неизбежно погрузится в трясину бесконечных сомнений в себе. Правда, в рамках такой системы демократия и плюрализм, возможно, и существуют - но какой ценой? За счет групп интересов, способных выдать "два плюс два равно пяти" за рациональную истину; за счет раздутой, неэффективной и даже коррумпированной бюрократии, которая дергает за ниточки за кулисами. Но современный Китай уже давно освободился от этих оков. Мы вступаем в новую эру, возглавляемую технократами, - эру, когда рациональное правительство, свободное от предрассудков, опирающееся на факты и стремящееся к эффективности, уверенно ведет нацию вперед, к более светлому и славному будущему."


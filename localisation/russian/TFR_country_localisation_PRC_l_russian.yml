 PRCref_description_tt: "Либерализация государства с более чем 5000-летним авторитарным правлением будет непростой задачей. На протяжении всей истории Китай был централизованным, иерархическим государством с небольшим пониманием либеральных концепций, таких как "неприкосновенность частной жизни", "права личности" или "сдержки и противовесы". Таким образом, преобразование устаревшей политической бюрократии Китая в современную демократическую будет чрезвычайно сложной задачей. Это потребует не только поддержки партии, но и ограничения политической и экономической стабильности, которое приходит с либерализацией.\n\nНаш нынешний £GFX_approval_rating_texticon §YРейтинг Одобрения§! §Y[?PRC_approval_rating_var|1%]§!(£stability_texticon [?PRC_approval_rating_dynamic_var|=+1%] £political_power_texticon [?PRC_approval_rating_dynamic_var|=+1%])"

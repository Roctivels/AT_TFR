 PRC_five_stars_shines_over_china_idea_desc: "Официальной символики относительно значения флага Китайской Народной Республики не существует. Однако существует легенда, что каждая из четырех малых звезд представляет одну из основных страт китайского общества: Интеллектуальное движение, Крестьянство, Рабочий класс и Военные, а пятая звезда, вокруг которой они собрались, - это Коммунистическая партия Китая.\n\nСегодня, благодаря нашим усилиям, мы можем с гордостью сказать, что Пять звезд Китая сияют так ярко, как никогда прежде - очищенные от коррупции, кумовства, деспотизма и цензуры!"

 PRC_made_in_china_dynamic: "Социализм с Китайской Спецификой"
 PRC_made_in_china_dynamic_desc: "\n\n\n\n\n£GFX_PRC_socialism_with_chinese_characteristics_banner\n\n\n\n\n\nКитайские товары можно найти в любом уголке земного шара, где бы ни продавались электроника, телефоны, бытовая техника, одежда или даже продукты питания. Все это связано с колоссальной индустриализацией Китая на поздних этапах холодной войны, с глобализацией и ослаблением правил, введенных председателем Дэн Сяопэном. Китай фактически превратился в мастерскую мира, поскольку он быстро превратился в крупнейшего экспортера товаров на всей планете, однако с нашим процветанием последовала негативная реакция со стороны протекционистских западных рынков с ярлыком "Сделано в Китае" становится ассоциироваться с продукцией низкого, хотя и обильного качества, в основном из-за отсутствия гарантий качества в нашем промышленном экспорте. Однако в последние годы Коммунистическая партия стремится сместить акцент экономики с производства в сторону высокотехнологичных инноваций, и этот процесс сопряжен со многими трудностями. Тем не менее, чрезмерная зависимость от экспортной экономики может привести к §RКАТАСТРОФИЧЕСКИМ ПОСЛЕДСТВИЯМ§! если один из крупнейших экспортных рынков Китая §Rпогрузится в хаос...§!"
 PRC_controlled_corruption_idea: "Контролируемая Коррупция" #то самое ЛЕГЕНДАРНОЕ оружие Китая, пизда вам япошки
 PRC_corrupt_bureaucracy_idea: "Коррумпированная Бюрократия"
 PRC_corrupt_bureaucracy_idea_desc: "\n\n\n\n£GFX_PRC_down_with_bureaucracy_banner\n\n\n\n\n\n                         §YЯ ненавижу их§!.\nСо времен древних династий Китай всегда был полон коррупции. На протяжении тысячелетий народ страдал от коррупции, начиная с евнухов, которые занимались предательством, и заканчивая военачальниками, которые умели только жечь и грабить, или националистическими бюрократами, которые заботились только о своих карманах. Благодаря этому КПК смогла выйти из кровавой борьбы, сметая силы зла. Однако после нескольких кампаний, инициированных Мао, и реформ, проведенных Дэнгом, кадры партии непреднамеренно превратились в новый высший класс. Несбалансированное и неадекватное экономическое развитие, культура недоверия и фракционная борьба привели к распространению взяточничества и кумовства среди чиновников. Хотя антикоррупционная кампания Си достигла значительных результатов, она лишь временно обуздала коррупционную тенденцию."
 PRC_chinese_communist_party_idea: "Коммунистическая Партия Китая"  
 PRC_chinese_communist_party_idea_desc: "\n\n\n\n£GFX_chinese_communist_party\n\n\n\n\n\nС 1949 года КПК является беспрекословным правителем материкового Китая. Даже после распада нескольких коммунистических государств во главе с СССР социалистический Китай остался в Восточной Азии и постепенно превратился в одну из самых могущественных стран мира после реформ и открытости. Причины, по которым КПК удалось укрепить свое господство в Китае с населением в 1,4 миллиарда человек, стали предметом многочисленных споров. Одни утверждают, что КПК отказалась от своего коммунистического кредо, обещающего экономическое процветание в обмен на поддержку, и приняла традиционную идеологию старой империи, чтобы держать народ в страхе и повиновении. Другие утверждают, что КПК преуспела, внедрив свою идеологию и организацию во все сферы жизни общества и получив заряд бодрости благодаря постоянным реформам. Как бы то ни было, одно несомненно: §Rчтобы свергнуть гиганта, которым является КПК, потребуется катастрофа апокалиптического уровня.§!"
 PRC_communist_party_of_china_dynamic: "Коммунистическая Партия Китая"
 PRC_communist_party_of_china_dynamic_desc: "\n\n\n\n£GFX_chinese_communist_party\n\n\n\n\n\nС 1949 года КПК является беспрекословным правителем материкового Китая. Даже после распада нескольких коммунистических государств во главе с СССР социалистический Китай остался в Восточной Азии и постепенно превратился в одну из самых могущественных стран мира после реформ и открытости. Причины, по которым КПК удалось укрепить свое господство в Китае с населением в 1,4 миллиарда человек, стали предметом многочисленных споров. Одни утверждают, что КПК отказалась от своего коммунистического кредо, обещающего экономическое процветание в обмен на поддержку, и приняла традиционную идеологию старой империи, чтобы держать народ в страхе и повиновении. Другие утверждают, что КПК преуспела, внедрив свою идеологию и организацию во все сферы жизни общества и получив заряд бодрости благодаря постоянным реформам. Как бы то ни было, одно несомненно: §Rчтобы свергнуть гиганта, которым является КПК, потребуется катастрофа апокалиптического уровня.§!"
 PRC_chinese_revival_dynamic: "Китайское Возрождение"
 PRC_chinese_revival_dynamic_desc: "\n\n\n\n£GFX_PRC_chinese_revival_banner\n\n\n\n\n\nМы проведем глубокую революцию, поведем китайскую нацию на борьбу за независимость - для наших соотечественников, для нашей родины. Мы отдадим свою кровь и жизни, сражаясь под градом выстрелов с нашими заклятыми врагами - японскими захватчиками и беглыми псами империализма; а затем мы уничтожим тех иностранных дьяволов, которые нарушают наш суверенитет. Таким образом, позор, вписанный в нашу национальную историю, будет очищен, честь нашей родины зазвучит по всему миру, а знамя независимости взметнется высоко над облаками.\nТогда колокол свободы зазвонит по всей земле Китая.\nС громовым раскатом спящий тысячелетний лев пробуждается и начинает танцевать - это и есть революция, это и есть независимость."

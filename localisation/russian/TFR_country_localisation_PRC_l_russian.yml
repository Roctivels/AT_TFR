 PRC_pla_dynamic: "Народно-Освободительная Армия"
 PRC_pla_dynamic_desc: "\n\n\n\n£GFX_PRC_pla_dynamic_banner\n\n\n\n\n\nСо времен Наньчанского восстания 1927 года Народно-освободительная армия, особенно ее сухопутные войска, долгое время была надежной силой как для партии, так и для народа. Модернизация НОАК, начатая Си в 2016 году, наделила ее способностью сражаться и побеждать в современных боевых условиях. Из сил, предназначенных исключительно для обороны родины, НОАК превратилась в грозную военную державу, способную развернуться в Северо-Восточной Азии и во всем Тихоокеанском регионе. В будущем может появиться больше возможностей продемонстрировать этот расширенный потенциал."

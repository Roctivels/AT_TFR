 china.325.t: "Пятый Кризис в Тайваньском Проливе"
 china.325.d: ""\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nУважаемый товарищ Президент:\n\nМинистерство государственной безопасности собрало и проанализировало политическую, дипломатическую и военную информацию о Тайваньском регионе в соответствии с Вашим приказом. У нас есть основания полагать, что острота нынешней ситуации в Тайваньском проливе превысила остроту четвертого кризиса в Тайваньском проливе в 2022 году, что ее можно рассматривать как разразившийся пятый кризис в Тайваньском проливе и что вновь настало время для освобождения Тайваня.\n\nПосле перепроверки снимков, сделанных скоростными беспилотными самолетами-разведчиками, и информации, предоставленной вооруженными информаторами на Тайване, мы поняли особенности развертывания ОДТО на острове Тайвань. Основные воздушные силы ОДТО на острове размещены в бункере на базе в Цзяшань, Хуалиен, на восточной стороне Тайваня, которая находится в мертвой зоне нашего огневого прикрытия и представляет большую угрозу для наших десантных сил и передового флота. В то же время фотографии, сделанные симпатизирующими нам людьми, подтверждают, что ОДТО развернула большое количество наземных войск на двух северных высадочных площадках в устье реки Даньшуй и в Хсинчу в ответ на возможную высадку наших сил на плацдарм.\n\nМинистерство государственной безопасности обобщило данные разведки и рекомендовало Центральной военной комиссии и Центральному народному правительству сохранять высокий уровень озабоченности и быть готовыми к неизбежному контрнаступлению ОДТО во время освобождения Тайваня.\n\nС уважением к вам,"
 china.325.a: "Министр государственной безопасности Китайской Народной Республики $PRC_MSS_leader_name$."
 china.326.t: "Ситуация в Индии и Пакистане"
 china.326.d: ""\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nУважаемый товарищ Президент:\n\nМинистерство государственной безопасности собрало и проанализировало информацию о последних дипломатических и военных перемещениях в Индии и Пакистане, согласно Вашему указанию. Мы полагаем, что Индия поддерживает контакты с так называемой "Организацией Договора Тихоокеанской Обороны" и нагнетает напряженность в спорном регионе Джамму-Кашмир.\n\nНедавно на границе с Кашмиром произошла внезапная перестрелка: Пакистан сообщил, что сбил индийский беспилотник, пытавшийся проникнуть в воздушное пространство Пакистана для разведки. В ответ индийские войска якобы обстреляли пакистанские посты в районе Сиалкота, чтобы скрыть активность их беспилотников. В то же время Индия обвинила Пакистан в инициировании инцидента, заявив, что пакистанские войска открыли неспровоцированный огонь по индийским постам в пограничном районе Джамму. Индия охарактеризовала свою контратаку на пакистанские позиции как "надлежащее возмездие", в результате которого были ранены по меньшей мере три индийских солдата и экстренно эвакуированы десятки жителей деревни.\n\nМинистерство государственной безопасности обобщило эти разведданные и считает, что ситуация в Джамму-Кашмире может перерасти в четвертую индо-пакистанскую войну. Центральному народному правительству рекомендуется сохранять повышенную бдительность и готовность реагировать на любые события в регионе.\n\nС уважением к вам,"
 china.326.a: "Министр государственной безопасности Китайской Народной Республики $PRC_MSS_leader_name$."
 china.327.t: "Нестандартные Действия МССЯ"
 china.327.d: ""\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nУважаемый товарищ Президент:\n\nМинистерство государственной безопасности, следуя Вашему указанию, собрало и проанализировало информацию о недавнем развертывании кораблей Морских сил самообороны Японии (МССЯ) вблизи наших вод. Мы выявили необычные действия МССЯ по развертыванию в этом регионе. Недавно наши ВМС провели трехдневную миссию у побережья Нинбо-Вэньчжоу в провинции Чжэцзян, а Чжэцзянское управление безопасности на море заранее уведомило об ограничении доступа в этот район.\n\nВ тот же день эсминец МССЯ Ryogetsu без предварительного уведомления вошел в наши территориальные воды у Чжэцзяна и задержался там. Наш флот передал по радио строгое предупреждение, требуя, чтобы корабль сообщил о своей цели и немедленно покинул акваторию. Однако Ryogetsu не отреагировал, проигнорировал наш суверенитет и ускорился дальше в наши воды. В ответ наш флот перехватил его курс, вынудив судно вернуться в открытое море. Последующее расследование подтвердило, что Ryouzuki отплыл из Сасэбо накануне для наблюдения за нашими военными операциями.\n\nМинистерство государственной безопасности оценило этот инцидент и рекомендует ЦК КПК и Центральному народному правительству сохранять высокий уровень бдительности, ожидая возможности дальнейшего развертывания МССЯ или даже вмешательства в наши внутренние дела.\n\nС уважением к Вам,"
 china.327.a: "Министр государственной безопасности Китайской Народной Республики $PRC_MSS_leader_name$."
 china.328.t: "Империя Конг Воссоединяет Китай"
 china.328.d: ""
 china.328.a: "Интересно."
 china.329.t: "Учреждение Организации Договора о Тихоокеанской Обороне"
 china.329.d: "\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nУважаемый товарищ президент:\n\nМинистерство государственной безопасности собрало и проанализировало информацию о последних политических и дипломатических событиях в Японии и Австралии в соответствии с вашим распоряжением. Мы полагаем, что Япония и Австралия сформировали политический, экономический и военный союз под названием "Организация Договора Тихоокеанской Оборонны" и стремятся включить в свой договор Юго-Восточную Азию и Индию. По словам наших информаторов в Нью-Дели, премьер-министр Моди проявил большую заинтересованность в присоединении к этому альянсу, и в настоящее время ведутся переговоры с Бангладешом о потенциальном партнерстве. Кроме того, японские и австралийские дипломатические миссии и представители бизнеса лоббируют в Юго-Восточной Азии, добиваясь поддержки бывших стран АСЕАН для присоединения к пакту.\n\nНаши контакты в Юго-Восточной Азии показывают, что этот альянс рассматривается как исключительное усилие против нашей страны. Министерство государственной безопасности, обобщив соответствующую информацию, пришло к выводу, что так называемая "Организация Договора Тихоокеанской Оборонны" является военным союзом, направленным на окружение нашей страны. Мы рекомендуем Центральному комитету КПК и Центральному народному правительству сохранять высокую степень озабоченности и быть готовыми противостоять опасности присоединения стран Юго-Восточной Азии и Индии к пакту и окружения нашей страны.\n\nС уважением к Вам,"
 china.329.a: "Министр государственной безопасности Китайской Народной Республики $PRC_MSS_leader_name$."
 china.330.t: "Путешествие к Морю Звезд"
 china.330.d: ""В свете широкомасштабной гражданской войны в США и упадка аэрокосмического потенциала в Европе и России наша страна теперь является ведущей космической державой мира", - заявил председатель Китайской корпорации аэрокосмической науки и промышленности на встрече, посвященной будущему китайской космической программы. Это заявление было встречено минутой молчания и чувством неопределенности среди присутствующих. В течение многих лет китайская космическая программа отставала от американской. Однако после того, как ведущие специалисты НАСА и SpaceX уехали в Китай из-за нестабильности, роль Китая в освоении космоса возросла.\n\nЭто поднимает важные вопросы: Может ли Китай на данном этапе взять на себя ответственность за лидерство человечества в освоении космоса? И оправданы ли значительные инвестиции в этот сектор при отсутствии серьезных конкурентов? НАСА столкнулось с подобной дилеммой после распада Советского Союза, что привело к серьезному сокращению бюджета и уменьшению амбиций. Может ли CNSA постигнуть такая же участь?\n\nНепоколебимая, CNSA упорно шла вперед. Несмотря на нефтяной кризис и мировую финансовую нестабильность, космическая программа Китая продолжалась по плану. Вместо того чтобы сократить расходы после спада в Америке, центральное правительство усилило поддержку, превратив аэрокосмический сектор Китая в маяк, современный Ноев ковчег в условиях глобальных потрясений, несущий в себе вечную мечту человечества о полетах к звездам."
 china.330.a: "ть луну с девятого неба..."
 china.331.t: "Возвращение Судебной Сети"
 china.331.d: "Много лет назад Судебная сеть - веб-сайт, созданный для информирования общественности о ходе рассмотрения судебных дел и работе судебной системы, - была отмечена как ключевой шаг к прозрачности правовой системы Китая. Он получил широкое признание. Однако в эпоху правления Си Цзиньпина, в рамках его усилий по централизации административной и судебной власти, прозрачность Судебной сети постепенно снизилась, что вызвало большое беспокойство среди отечественных либералов.\n\nС изменением партийного руководства Судебная сеть обрела возможность для возрождения. Генеральный секретарь Ван Ян поддержал эти усилия, а секретарь Центральной комиссии по политическим и правовым вопросам товарищ Чжоу Цян распорядился восстановить и расширить функции сети. В будущем общественность сможет получить доступ не только к открытым материалам дел в режиме онлайн, но и к судебным процессам и записям по конкретным делам. Действия Чжоу Цяна, как ведущей фигуры в этих реформах, вызвали восторг либералов, сигнализируя о том, что судебная система Китая выходит из своего непрозрачного прошлого и движется в сторону большей прозрачности."
 china.331.a: "Закон принят, и народ узнает его."
 china.332.t: "Неомаоисты Воссоединяют Китай"
 china.332.d: ""
 china.332.a: "Интересно."
 china.333.t: "Истина После Пьянки"
 china.333.d: "В пекинском ресторане BBQ группа старых университетских друзей наконец-то устроила долгожданную встречу.\n\n"Давайте, выпьем за старика Чжана! Он пилотировал беспилотники в Фукуоке во время битвы за Японию!" \n\n"Старина Ван, как ты думаешь, после захвата Японии мы должны устроить разнос и американцам?"\n\n"Конечно, эти янки заслуживают хорошей взбучки, верно, брат Сюй?" \n\n"Ну... Мне кажется, они не захотят снова воевать, учитывая экономические и торговые отношения..."\n\n"А, к черту все это, давайте просто выпьем!"\n\nЗастолье продолжалось до самой ночи, наполненное горячими спорами молодых людей. Они поддерживали друг друга, когда, спотыкаясь, выходили из барбекюшницы, некоторые из них блевали на тротуаре, а более трезвые похлопывали друзей по спине. Они пьяно обнимались на прощание на почти пустынной улице. Однако, когда они постепенно разошлись по домам на такси, ночное веселье оставило после себя вопрос без ответа."
 china.333.a: ""Что дальше?""
 china.334.t: "Возвращение из Песков"
 china.334.d: "С тех пор как гражданская война в Саудовской Аравии спровоцировала нефтяной кризис, многие страны разрабатывают стратегию, как получить преимущества в этом регионе. Однако смертельно опасные игры политиков и фанатиков неизбежно оборачиваются кошмарами для простых людей. С начала войны десятки тысяч мирных жителей были вынуждены покинуть свои дома, а страны, поддерживающие различные группировки, продолжают делать ставки.\n\nБольшинство иностранцев уже покинули эту неспокойную страну, но иногда уехать не так-то просто. Журналист информационного агентства "Синьхуа", следуя своему профессиональному долгу, остался на несколько дней, чтобы собрать больше информации, но потерял связь со своей организацией. Некоторое время его судьба была неопределенной. После некоторого молчания он наконец опубликовал видео в социальных сетях, сообщив, что находится в международном аэропорту Тегерана и готовится к посадке на рейс домой.\n\nКак от журналиста, от него можно было бы ожидать спокойствия, но на видео он выглядит растрепанным, с налитыми кровью глазами и слегка неорганизованной речью. Его оцепеневшее выражение лица и принужденная улыбка заставили зрителей задуматься о том, что пережил этот несчастный китайский журналист. Одни называют его китайским Лоуренсом, а другие сомневаются, стоило ли все это того."
 china.334.a: "Черное золото выковывается из крови."
 china.335.t: "Гармония Дарует Богатство"
 china.335.d: ""Позвольте мне еще раз повторить: партия и государство заверяют вас, что патриотически настроенные предприниматели по-прежнему смогут свободно путешествовать туда и обратно через пролив для ведения бизнеса. Система Специального административного района останется неизменной в течение пятидесяти лет, так что будьте уверены", - заявил высокопоставленный чиновник, прибывший для контроля и перестройки управления Тайванем. Он с энтузиазмом успокаивал тайваньских бизнесменов во время встречи Объединенного фронта. Среди присутствующих был приглашенный бизнесмен, внимательно слушавший обещания, что китайское правительство будет уважать их собственность и деловые операции.\n\nВ то же время за пределами зала заседаний другой предприниматель, которого не пригласили, вышагивал в холле. Когда чиновник закончил свое выступление и вошел в зал, незваный предприниматель поспешил к нему и спросил: "Сэр, я тоже хочу принять участие в этом форуме. Почему меня не пригласили? Я заметил внутри людей, которые когда-то были донорами Демократической прогрессивной партии. Почему им разрешено присутствовать?"\n\nЧиновник сделал глоток воды и спокойно ответил: "Я уже поговорил с ним. Более того, он "патриотичный предприниматель", который поддерживает партию и правительство". С этими словами он повернулся и пошел обратно в зал заседаний. Предприниматель, приняв решение, быстро последовал за ним - "
 china.335.a: ""Я тоже могу вести переговоры. Я тоже могу быть патриотом.""
 china.336.t: "Ночь в Тайбэе"
 china.336.d: "Ясным вечером в Тайбэе легкий вечерний ветерок умиротворял людей. Хотя Народно-освободительная армия взяла город под свой контроль, в послевоенном затишье жители старались как можно лучше выполнять свои повседневные обязанности. Господин Линь, живший с женой, дочерью и пожилой матерью на улице Хэпин Ист Роуд, после захвата города военными потерял работу на одном из местных предприятий. Теперь семья полагалась на свои сбережения.\n\nПосле того как установилась хорошая погода, господин Линь решил выпить с семьей миску миань сянь. Солдаты, патрулировавшие улицы, были дисциплинированы и не казались пугающими. После ужина семья отправилась домой.\n\nПодъезжая к своему району, они с удивлением увидели, что военные инженеры и полицейские установили колючую проволоку и металлический турникет на входе. Линсы вместе со своими соседями в шоке и тревоге наблюдали за происходящим. Из громкоговорителя доносились последние распоряжения правительства: комендантский час будет введен с 21:00 до 7:00, а для въезда в поселок теперь потребуется проверка документов.\n\nПочувствовав себя беспомощным, мистер Линь осторожно взял свою дочь за руку, когда они проходили через турникет, чтобы вернуться домой."
 china.336.a: ""Укрепление соседской гармонии.""
 china.337.t: "Последний Щит Революции в Азии"
 china.337.d: "Много лет назад, когда китайская революция была в самом разгаре, кто-то в отчаянии спросил: "Как долго продержится красный флаг?" На это наш великий вождь Мао Цзэдун ответил: "Одна искра может разжечь пожар в прериях." Даже если Красная армия на время уступала реакционерам, поддержка народа и путеводный свет коммунистических идеалов позволяли ей подниматься из пепла, становиться сильнее и в конце концов одерживать победу над буржуазными тиранами и империалистическими марионетками.\n\nОглядываясь назад, мы, кажется, снова оказались на похожем историческом пути. Хотя многие критикуют регрессивную политику, проводимую во время правления Си, за то, что она причиняет огромный вред китайскому населению, если проследить корни, то семена разрушения были посеяны в эпоху Дэнга. Лозунг Дэнга ловко обманул большинство, заставив людей потерять стремление и веру, превратив их в существ, управляемых материализмом и цинизмом. Что еще важнее, резкая трансформация Китая напрямую затормозила революционный прогресс во всех странах Азиатско-Тихоокеанского региона, нанеся им непоправимый ущерб, а через сорок лет сделав их практически бессильными.\n\nСейчас судьба предоставила нам еще один шанс переломить ход событий. На этот раз мы не будем принимать сердца и умы миллионов как должное; на этот раз мы не будем игнорировать протянутые руки наших угнетенных товарищей в Азии. Мы стоим на площади Тяньаньмэнь и торжественно клянемся председателю Мао: конец реакционного режима Тайваня - это только начало..."
 china.337.a: ""Пролетарии Азии, соединяйтесь!""
 china.338.t: "Ночь в Манаме"
 china.338.d: "Ночь опустилась на Манаму, словно дремлющий великан, и ее неподвижность слилась с тишиной города. Но в одном из номеров отеля "Карлтон" воздух был наполнен напряжением. Дипломатический представитель Королевской коалиции расхаживал по полу, его мысли были в смятении.\n\nС начала гражданской войны коалиция поняла, что им больше не рады. Однако проигрыш в войне означал участь хуже смерти. Отчаявшись, он отправился в Бахрейн, чтобы найти страну, готовую поддержать их любой ценой. Всего несколько часов назад он тайно встречался с китайскими дипломатами, прося их поддержки. В обмен на помощь в свержении нынешнего короля они обещали Китаю стабильные поставки саудовской нефти.\n\nХотя китайский дипломат оставался безучастным, представитель почувствовал, что его предложение произвело впечатление. Они просчитывали риски и выгоды этой сделки с высокими ставками. "Нам нужно время, чтобы подумать", - сказал дипломат. Теперь представитель с тревогой ждал ответа - ответа, который решил бы не только его судьбу, но и судьбу Саудовской Аравии.\n\nПо мере того как тянулись минуты, в комнате становилось душно. Он подошел к окну и отдернул тяжелые шторы, чтобы увидеть, как первые лучи рассвета разрывают ночь. В этот момент зазвонил телефон. Сердце заколотилось, когда он бросился к столу. Глубоко вздохнув, он поднял трубку.\n\n"Почтенный представитель Королевской Коалиции, мы готовы к более глубокому сотрудничеству с вашей страной.""
 china.338.a: ""Китай уважает независимый выбор вашего народа в своём пути развития.""
 china.339.t: "НОАК в Калифорнии"
 china.339.d: "Тихоокеанский бриз нес теплый, характерный для Калифорнии воздух, проносясь над песками Монтерея.\n\nВдалеке в небе лениво кружили чайки. Ближе к берегу десантные корабли с глубоким гулом рассекали волны, доставляя партию солдат НОАК на незнакомую землю. Ма Илун стоял на берегу с сигаретой во рту и картой в руках. Его глаза сузились, когда он взглянул на землю, которая не так давно принадлежала так называемым "Соединенным Штатам Америки"\n\nОн усмехнулся про себя. "Несколько лет назад нам пришлось покупать билет на самолет, чтобы прилететь сюда и иметь дело с этими высокомерными таможенниками. На этот раз они нас сами пригласили."\n\nК нему подбежал солдат, встал в строй и отдал честь. "Докладываю командиру бригады, авангард достиг указанной точки и готов начать операции в любое время!"\n\nИлун глубоко затянулся сигаретой и, прищурившись, вбил окурок в мелкий песок под сапогом. "Сообщите всем полкам - будьте начеку! Мы здесь, чтобы помогать американскому народу, а не демонстрировать свою военную мощь. Помните, что военная дисциплина превыше всего. Любой, кто нарушит правила, будет сегодня дежурить на кладбище!""
 china.339.a: ""Да, сэр!""
 china.340.t: "Исправление Принципов Реформы и Открытия Экономического Развития"
 china.340.d: "Реформы Дэн Сяопина давно признаны весьма эффективными. Они преобразили Китай, направив его от прошлых потрясений к модернизации и вызвав экономический бум, который привлек внимание всего мира. От земельных реформ до создания особых экономических зон и реструктуризации государственных предприятий Китай продвигался вперед, несмотря на трудности, возникающие на этом пути.\n\nОднако быстрый экономический рост и повышение уровня жизни скрыли и серьезные проблемы, такие как широко распространенная коррупция и растущее социальное неравенство. Бюрократическая элита все больше эксплуатирует население, ограничивая благосостояние через систему регистрации домохозяйств, ограничивая предложение земли и взвинчивая цены на жилье. Кроме того, свободная монетарная политика привела к истощению сбережений населения, игнорируя основные рыночные принципы.\n\nЭти ошибки больше нельзя терпеть. Люди заслуживают того, чтобы пользоваться плодами своего труда, а не бесконечно пополнять прибыли бюрократов и капиталистов. Мы стремимся перестроить системы благосостояния и потребления, снизить зависимость от экспорта и сбережений и обеспечить участие граждан в экономическом росте страны. Ключевые законы и институты будут защищать права людей, а разнообразные организации трудящихся позволят им противостоять эксплуатации. Рынок, на котором в настоящее время доминируют немногие, будет реформирован, а демократическое правительство вступит в дело, чтобы обеспечить социальную справедливость и равенство."
 china.340.a: "Мы умеем не только разрушать старый мир, но и создавать новый."
 china.341.t: "Суд"
 china.341.d: "Цао Деван, которого когда-то называли "Стеклянным Королём", теперь стоял на скамье подсудимых, его тело сгорбилось, волосы были взъерошены, а глаза затуманены усталостью и отчаянием.\n\n"Подсудимый Цао Деван, будучи основателем Fuyao Glass Group, вы пренебрегали законами и правилами и бессовестно эксплуатировали своих рабочих в течение многих лет. Ваши действия представляют собой грубое нарушение трудовых прав..."\n\nвердый голос судьи эхом разносился по залу суда, но Цао уже не слушал. Когда-то он верил, что за деньги можно купить все - достоинство, свободу, даже власть над другими, - но теперь он понял, как ужасно, трагически ошибался. \n\n"В соответствии со статьями 244, 248 и 276 Уголовного закона Китайской Народной Республики суд приговаривает подсудимого Цао Девана к пожизненному заключению с конфискацией всего личного имущества..."\n\nНоги Цао подкосились, тело инстинктивно рухнуло, но служители суда подняли его, не говоря ни слова. Его губы дрожали, но не было слышно ни звука. Он мог только смотреть, как падает молоток. Когда его уводили, его шаги замедлились, и в эти мгновения казалось, что к его раме прибавились десятилетия.\n\nОн оглянулся на рабочих на галерее - тех самых, которые когда-то кланялись ему. Теперь они смотрели в ответ, их глаза были полны ярости и презрения.\n\nВ зеркале заднего вида тюремного транспорта Цао разглядел свое лицо - старое, искаженное и вытравленное чувством вины. Пятно, которое будет преследовать его до конца дней."
 china.341.a: "Объединенный народ никогда не будет побежден!"
 china.342.t: "С Чистого Листа"
 china.342.d: "Всего несколько лет назад бюрократическая система Китая в значительной степени опиралась на личные связи, региональные связи и опыт. Во время каждого партийного съезда мировые наблюдатели строили догадки о повышении, переводе и отставке в партии и государстве, предлагая разные прогнозы.\n\nСегодня, обращаясь к внимательным административным кадрам, генеральный секретарь Ху Чуньхуа испытывал глубокое чувство гордости за масштабные реформы, которые изменили бюрократию.\n\nСреди этих кадров одни поднялись благодаря своей профессиональной квалификации, другие - благодаря активному управлению на местном уровне, а третьи - в результате прямых демократических процессов, превратившись из представителей Всекитайского собрания народных представителей в государственных чиновников, имеющих тесные связи с народом.\n\nЭта разнообразная система продвижения по службе ликвидировала непрозрачные механизмы работы китайской бюрократии, привнеся прозрачность в сеть власти. В новой системе кадры больше нацелены на служение народу, а не на угождение начальству. В результате "Служить народу" перестало быть просто лозунгом."
 china.342.a: "От народа - для народа."
 china.343.t: "Пантисократия"
 china.343.d: "Генеральный секретарь Ху Чуньхуа вместе с местными чиновниками с волнением прибыл в деревню в западной провинции Хубэй, недалеко от своего родного города. Этот район долгое время боролся с бедностью, старением населения, отсевом детей из школ и разрушающейся инфраструктурой.\n\nНо сегодня деревня преобразилась. Благодаря недавно избранному деревенскому демократическому комитету здесь появились водопровод, электричество и даже интернет. Свежевыкрашенные стены и чистые дома выстроились вдоль улиц, а в начальной школе деревни появилось новое футбольное поле с искусственным покрытием. С расстояния Ху и чиновники спокойно наблюдали за тем, как дети играют в футбол, а родители болеют за своих начинающих звезд.\n\nГенеральный секретарь уехал в приподнятом настроении, встреченный оживленными жителями деревни, которые с нетерпением обсуждали предстоящее сельское собрание, где они будут говорить о покупке новых лекарств для клиники. Улыбки озаряли их лица, отражая яркое, чистое небо над головой."
 china.343.a: "Новое общество движется вперед по правильному пути."
 china.344.t: "Председатель Мао Улыбается"
 china.344.d: "Площадь Тяньаньмэнь, жэньминьби, торжественный мавзолей... Поразительно осознавать, что Мао, главный основатель Китайской Народной Республики, стал мощным, но несколько пустым символом. Тем не менее, есть повод для оптимизма. С начала века все больше китайцев начинают заново открывать для себя наследие председателя Мао, и Центральный комитет партии, реагируя на эту тенденцию, намерен реинтегрировать его в политическую и культурную ткань нации.\n\nИдеологические работники партии признают, что председатель Мао был не только харизматичным поэтом, политиком и военным стратегом, но и фигурой непреходящего значения. В результате партия начала внедрять смелые и образные произведения Мао в широкую культурную индустрию. О его выдающихся военных стратегиях, таких как "Четыре переправы через реку Чишуй" во время "Долгого марша", рассказывают в документальных фильмах. Его мысли и труды занимают видное место в учебниках, причем не просто как дополнение к вкладу Дэн Сяопина или Си Цзиньпина, а как самостоятельные центральные идеи.\n\nСегодня "возрождение мысли Мао" охватило все общество. Восторженные молодые люди снова носят его цитаты в рюкзаках или читают его стихи на собраниях. Как американцы чтят своих отцов-основателей, так и мы будем чтить нашего великого лидера."
 china.344.a: "Когда распускаются цветы..."
 china.345.t: "Концепция Истории Народной Войны"
 china.345.d: "Народ, и только народ, является движущей силой создания мировой истории.\n\nПредседатель Мао учил нас этому, и во время великой китайской революции КПК воплотила это в жизнь. Этот принцип верен и для революции, и для строительства, и для войны. Однако, к сожалению, значительная часть наших партийных и военных руководителей, похоже, увлеклась "технологическим детерминизмом", возлагая излишнюю веру на современные военные машины и пренебрегая незаменимой ролью "народа" в Народной армии.\n\nПодобные заблуждения привели нас к позору. Болезненное поражение в Тайваньском конфликте запятнало некогда грозный имидж Народно-освободительной армии. Тем не менее, у каждого облака есть серебряная сторона. Всекитайское собрание народных представителей уже приняло комплексный пакет поправок к Закону о мобилизации на нужды национальной обороны. С помощью этих законов мы возродим утраченную концепцию народной войны. Молодежь будет проходить дальнейшую военную подготовку, жизнеспособность организаций ополчения будет повышена, и даже низовые вооруженные силы будут оснащены большим количеством оружия...\n\nКонечно, военные технологии имеют решающее значение, но в названии Народно-освободительной армии слово "народ" стоит на первом месте. Мы должны помнить эту славную традицию и нести ее вперед."
 china.345.a: "Дети рабочих и крестьян, народные вооруженные силы."
 china.346.t: "Новая Красная Культура"
 china.346.d: "После реформ и открытия в течение последних сорока лет в сфере культуры доминировали буржуазные либералы и вестернизированные группировки. В области кино золотым стандартом считается Голливуд, а телевизионные драмы в значительной степени заимствованы из Японии, Южной Кореи и Гонконга. Драматическое искусство стало пережитком прошлого, а традиционная опера превратилась в птицу в клетке, поющую только романтические сказки.\n\nТакая ситуация больше не может продолжаться! Когда-то, во времена основания нашей страны, мы обладали процветающей красной культурой, где революционный романтизм сочетался с реализмом, отражающим повседневную жизнь. Благодаря этому было создано множество выдающихся произведений, таких как картина маслом "Взятие штурмом моста Лудин", романы "Красный флаг" и "Красный Краг", которые пользовались огромной популярностью в массах. К сожалению, с приходом культурной революции и так называемых "образцовых опер" эта культурная теория потеряла свою опору и ушла в анналы истории.\n\nНо сейчас партия и правительство полны решимости вернуть сущность социалистической культуры и восстановить культуру, воплощающую красный дух и национальный характер нашей Народной Республики. Мы будем продолжать учиться у передовых мировых форм самовыражения, но эпоха, когда буржуазные либералы доминировали в культурной сфере, ушла навсегда!"
 china.346.a: "Красный флаг подобен морю, а песни - приливу."
 china.347.t: "Новая Эра Совместного Развития"
 china.347.d: "Долгое время многие считали, что рост ВВП автоматически ведет к повышению уровня жизни. Однако история показала, что экономический рост может приносить непропорциональную выгоду корыстным интересам, игнорируя при этом более широкое общественное благо. Сейчас мы принимаем меры, чтобы изменить эту тенденцию и обеспечить справедливое распределение выгод от экономического развития.\n\nНашей первоочередной задачей является преобразование частной собственности в секторе недвижимости. Рынком часто манипулируют, превращая жилье в инструмент эксплуатации. Ограничения на использование земли в сочетании с высокими налогами вынуждают простых людей тратить свои сбережения только на то, чтобы обеспечить себя жильем. Двигаясь вперед, мы будем рассматривать жилье как предмет первой необходимости, полностью поддерживаемый государством. Такие инициативы, как государственное арендное жилье, доступное жилье и разнообразные варианты государственного жилья, принесут пользу тысячам семей.\n\nДалее мы проведем коллективизацию промышленности и сельского хозяйства и восстановим систему переговоров между трудящимися и руководством. Мы стремимся создать энергичные, самоуправляемые рабочие организации с лидерами, избираемыми непосредственно трудящимися. Эти лидеры будут контролировать работу и защищать права рабочих, способствуя полноценной жизни для всех участников.\n\nМы также сосредоточимся на других важных областях, включая равенство в образовании, использование ядерной энергии, защиту окружающей среды и справедливость рынка. Будущее полно возможностей, и мы готовы внести в него свой вклад!"
 china.347.a: "Марш вперед к прекрасному будущему!"
 china.348.t: "Передача Большей Власти ВСНП"
 china.348.d: "Согласно соответствующим положениям Конституции КНР, в рамках Всекитайского собрания народных представителей создается несколько специализированных комитетов. Эти комитеты не обладают атрибутами органа власти; вместо этого они являются учреждениями, на которые возложены конкретные обязанности под руководством органа власти. Это считается важным доказательством того, что ВСНП выполняет лишь роль "резиновой печати". Кроме того, большинство членов этих комитетов - бывшие провинциальные и министерские чиновники, ушедшие в отставку и утратившие свою власть, что делает их влияние весьма ограниченным.\n\nОднако последние события в политической жизни Китая вновь привлекли внимание наблюдателей и аналитиков по всему миру. По словам представителя Центрального управления пропаганды, Государственный совет, а также Национальная контрольная комиссия передали часть своих полномочий специализированным комитетам ВСНП. К ним относятся Комитет по надзору и судопроизводству, Комитет по иностранным делам и Комитет по финансам и экономике.\n\nКак так называемый высший орган государственной власти, этот шаг рассматривается некоторыми как значительное продвижение в руководстве политической практикой в соответствии с духом Конституции. Тем не менее, есть опасения, что это может привести к чрезмерному расширению полномочий ВСНП, размывая границу между законодательной и исполнительной властью. Как бы то ни было, похоже, что еще один слой завесы над политическим "черным ящиком" Китая был снят."
 china.348.a: "Замечательная работа."
 china.349.t: "Сопротивление Реформам"
 china.349.d: "План реформы по подбору и назначению кадров, принятый центральным правительством, был направлен на преодоление укоренившегося "фракционизма" и "культуры клик" в местных партийных комитетах. Внедряя более открытый и прозрачный механизм отбора, план предполагал выдвижение на руководящие посты действительно добродетельных и способных людей.\n\nОднако, как только реформа была предложена, она вызвала значительные волнения в различных местных партийных комитетах. Некоторые местные партийные лидеры сопротивлялись, считая, что этот шаг центрального правительства ослабит власть партийных комитетов и сделает местные органы власти неэффективными. Они опасались, что реформа ограничит их полномочия и уменьшит их влияние.\n\nДля партийных комитетов в некоторых отдаленных регионах эта реформа подбора кадров рассматривается как прямое посягательство на их интересы. Однако, как говорится, "когда кошки нет, мыши играют". После падения Си Цзиньпина фракционность в различных местных партийных комитетах усугубилась, что крайне затрудняет проведение реформ."
 china.349.a: "Внешне они подчиняются, но внутренне сопротивляются."
 china.350.t: "Вопрос о Профсоюзах"
 china.350.d: "С 1949 года Всекитайская федерация профсоюзов на протяжении многих лет осуществляла единое руководство местными и отраслевыми профсоюзами. Будучи членом "общественных организаций, участвующих в НПКСК", она находится под значительным влиянием государственной бюрократии и по закону обязана принимать руководство КПК.\n\nПосле реформ и открытости ВФП постепенно утратила свою роль ассоциации, возглавляемой трудящимися для представления и защиты их законных интересов. Кульминацией этого упадка стал 2018 год, когда она лишилась контроля над различными учреждениями социального обеспечения и отраслевыми ассоциациями, которыми ранее руководила, и была вынуждена установить так называемые отношения "экономического партнерства" с этими организациями. Кроме того, подчиненные профсоюзы лишены права на ведение коллективных переговоров и зачастую возглавляются топ-менеджерами компаний, что сводит их к филиалам, занимающимся в основном организацией досуга и культурных мероприятий на предприятиях.\n\nНаша новая политика направлена на изменение этой ситуации. В настоящее время существует два основных мнения. Одно выступает за полную отмену государственного контроля над профсоюзными организациями, позволяя существовать негосударственным профсоюзам и другим организациям, защищающим трудовые права. Это, по мнению сторонников, единственный способ действительно защитить права трудящихся. Другая, рассматривающая вопрос о социальной стабильности, поддерживает сохранение государственных профсоюзов, но призывает к глубоким реформам. Эти реформы вернут профсоюзам ключевые полномочия и расширят их автономию."
 china.350.a: "Чтобы стать настоящей нацией трудящихся, мы должны иметь мужество провести реформы."
 china.350.b: "Присоединение к государственному профсоюзу выгодно для коллективных интересов."
 china.351.t: "Либералы Критикуют Ху Чуньхуа"
 china.351.d: "По мере того как масштабные социальные реформы генерального секретаря Ху Чуньхуа вступают в полную силу, атмосфера общественных дискуссий в Китае заметно меняется. Начиная с традиционных СМИ, таких как газеты, телевидение и радио, и заканчивая развивающимися интернет-платформами, большинство согласны с тем, что политика реформ партии дала обществу больше возможностей для свободного дыхания. К сожалению, не все разделяют эти настроения.\n\nЗначительное число интеллектуалов и видных деятелей культурной и экономической сферы Китая уже давно критикуют партию и правительство. Нынешний случай ничем не отличается. Даже в несколько более открытой обстановке, которую обеспечивает государство, некоторые из этих деятелей делают неуверенные, ехидные замечания, обвиняя партийных лидеров в том, что у них "нет веры в демократию" и "не хватает смелости для полной открытости". В разделах комментариев этих дискуссий разгораются жаркие споры между сторонниками и противниками. В целом, большинство людей считают, что эту с таким трудом завоеванную свободу нужно беречь и не подрывать необдуманной критикой.\n\nНекоторые либерально настроенные деятели в правительстве также считают, что нынешний темп реформ несколько медленный. Предшественники Ху в Лиге коммунистической молодежи даже предлагали Ху "смело прокладывать новый путь". Однако эти недовольные либералы, возможно, что-то упускают из виду, а возможно, обманывают себя. Реформы партии направлены не на подражание Западу, а на создание собственного уникального демократического пути."
 china.351.a: "Шумиха продолжается..."
 china.352.t: "Поддержка от Новых Левых"
 china.352.d: "Пропагандистская машина партии оживает, распространяя информацию о последних успехах двойного курса Центрального комитета на политические и экономические реформы среди более чем миллиардного населения. Консервативные силы, все еще сохраняющие корни в эпохе Дэн Сяопина и Си Цзиньпина, ворчат по поводу всеобъемлющей открытости и прозрачности, а причудливые голоса либеральной элиты жалуются на нерешительность и осторожность правительства в проведении реформ.\n\nПусть жалуются! Генеральный секретарь Ху Чуньхуа нашел новых союзников среди интеллектуалов и широких слоев населения. Такие известные ученые, как Ван Шаогуан, Ху Аньган, Цуй Чжиюань и Чжан Ибин, заявили о своей твердой поддержке реформ Ху - в статьях в крупных изданиях или интервью на телевидении они страстно выражают свое одобрение нового направления.\n\nПрофессор Ван Шаогуан из Гонконгского университета подчеркнул, что нынешние китайские реформы отличаются от политических изменений, произошедших под влиянием западных буржуазных демократических систем в 1980-х годах. Вместо этого они черпают вдохновение в концепции "гражданского общества" на Западе, но с изюминкой - Китай строит "народное общество", укорененное в собственном контексте страны. Центральными действующими лицами этого "народного общества" являются трудящиеся массы по всей стране. Эта теория получила широкое распространение в обществе, подкрепляя уверенность партии в необходимости продвижения реформ."
 china.352.a: "Мы стоим на плечах народа."
 china.353.t: "Первый глава администрации САР Тайвань"
 china.353.d: "После того как первоначальное волнение, связанное с возвращением Тайваня, утихнет, начнется настоящий вызов: управление островом. Эта задача предполагает не только залечивание шрамов войны, но и демонстрацию превосходства социалистической системы с китайской спецификой над "Тремя принципами народа". Только тогда недовольное население полностью примет пекинское правление и присоединится к Китайской Народной Республике.\n\nВыбор лидера для САР - критически важная задача, и к ней нужно подходить с осторожностью. Этот человек должен уметь работать с Пекином, но в то же время быть способным управлять напряженностью внутри Тайваня, обеспечивая, чтобы управление выходило за пределы города Тайбэя. Одним из кандидатов является Хунг Чи-Чанг, бывший лидер фракции "Новый прилив" в ДПП. Когда флаг "Голубое небо с белым солнцем" был заменен на пятизвездочный красный флаг, Хунг сразу же присоединился к правительству материка. Фракция Нового Течения, известная своим подходом "линии масс", стремится влиять на политику через общественные движения и внешние партийные мероприятия. Благодаря сплоченной организационной структуре и ориентации на демократический централизм, фракция стала известна как "партия внутри партии" в ДПП. Хун сыграл ключевую роль в быстром создании временного административного органа, который эффективно управлял послевоенным восстановлением Тайваня.\n\nЕще один кандидат - Цай Энг-Менг, основатель Want Want Holdings Limited и медиа-магнат, который когда-то был одним из самых богатых людей на острове. Цай уже давно активно работает над улучшением отношений через Тайваньский пролив. Даже в периоды обострения напряженности он открыто поддерживал концепцию "Единая семья через пролив" и выступал против тайваньского сепаратизма. Кроме того, Цай известен своим сильным китайским национализмом и культурным консерватизмом. Хотя в свое время его взгляды вызывали критику как со стороны тайваньского правительства, так и со стороны общественности, сегодня они стали ключевым активом его политической карьеры."
 china.353.a: "Назначить Хуна."
 china.353.b: "Назначить Цая."
 china.354.t: "Угасающее Сердце Революции"
 china.354.d: "С наступлением сумерек заходящее солнце медленно опускалось к горизонту, отбрасывая теплый оранжевый отблеск на холмы Лёссового плато. В тусклом свете разбросанных фонарей показалась спокойная деревня, приютившаяся в долине, с точками света, мерцающими в окнах фермерских домов. С крыш доносился аромат готовящейся пищи и тонкий шлейф белого дыма.\n\nПо сравнению с тем, что было несколько десятилетий назад, тропинка, ведущая к пшеничным полям на другой стороне долины, теперь была окружена пышным кустарником, вероятно, в результате десятилетней экологической кампании. По этой обновленной тропинке фермер в соломенной шляпе неторопливо вел своего вола в сторону деревни. Фермер был высок, и, хотя его телосложение с возрастом истончилось, в нем сохранились отблески былой силы. Под шляпой глаза, обрамленные морщинами времени, оставались острыми и ясными.\n\nПроходя мимо здания сельского комитета, старый фермер по привычке поднял голову. Посмотрев в сторону искусственного пруда на заднем дворе комитета, он смутно различил на белой стене огромный агитационный плакат. На плакате были изображены несколько розовощеких, густобровых и крепких крестьян, которые сияли, сгрудившись вокруг загадочной фигуры в белой рубашке, держащей в руках сноп пшеницы и экземпляр "Цитат председателя Мао". Его лицо было скрыто, а позади них развевались на ветру несколько красных флагов - анахроничный пережиток революционной эпохи, теперь спроецированный на сегодняшний день. Старый фермер усмехнулся про себя. Казалось почти нелепым, что они хотят испортить простую картину. Но, с другой стороны, эта картина и так была не очень большой, так что портить ее не имело никакого значения.\n\nДостигнув коровника на другом конце деревни, старый фермер завел своего вола внутрь и поприветствовал ветеринара, который сидел на корточках и попыхивал трубкой. "Привет, господин Лю!" - позвал он.\n\n"О, вы здесь!" Господин Лю встал, стряхнул пепел с трубки и вытер руки о колени. "Я ждал вас. Это лучший бык, который у нас есть, нельзя допустить, чтобы с ним что-то случилось". Он прищурился на старого фермера. "Знаете, не обижайтесь, но вы выглядите очень знакомо. Мне кажется, что я вижу вас каждый день, но я не помню, чтобы вы жили в соседних деревнях."\n\n Старый фермер мягко улыбнулся, уходя от ответа."
 china.354.a: ""Неужели? Вы, должно быть, ошибаетесь"."
 china.355.t: "Былая Слава Улетучивается"
 china.355.d: "Шэньчжэнь, оживленный центр на юге Китая, возникший благодаря политике реформ и открытости, встретил туманный день после ночного проливного дождя. В скромной квартире жилого дома рядом со статуей Дэн Сяопина в горном парке Ляньхуа домработница осторожно снимала с плиты кастрюлю с идеально прожаренными свиными ребрышками и кукурузным супом. Осматривая плоды своего утреннего труда, она вдруг услышала яростный крик из-за двери кухни: "Зачем они это сделали?! Как они могли?!"\n\n Экономка молча закатила глаза. Поначалу ее пугали подобные выпады, но теперь она к ним привыкла. Жилец был старым, необычным человеком, высоким и смутно знакомым, хотя она никак не могла понять, где видела его раньше. Каждый день перед обедом, читая газету Shenzhen Special Zone Daily, старик неизменно разглагольствовал о правительстве и его политике по разным поводам. После этого он торопливо съедал свой обед, возвращался в спальню и запирался там на всю вторую половину дня. Однажды экономка попыталась прибраться в его комнате, но, увидев стены, увешанные наклейками и фотографиями, соединенными ниточками, старик яростно обругал ее, и она больше не осмелилась переступить порог.\n\nСегодня, однако, старик выглядел более взволнованным, чем обычно. "Посмотрите на это, только посмотрите!" - восклицал он, хлопая по газете, которую держал в руках, пока экономка ставила суп на обеденный стол. "Они действительно хотят либерализовать религию! Отделить религию от руководства партии! Куда подевалась их социалистическая идеология? Неужели они хотят, чтобы в Китае появились культы и разгорелся межрелигиозный конфликт?"\n\n"Какое отношение решения больших шишек имеют к нам, простым людям?" - пренебрежительно ответила экономка. Она не удержалась и добавила: "Кроме того, разве в наши дни всех не интересуют только деньги? Кто вообще верит во все эти сверхъестественные вещи?"\n\n "Вы не понимаете, вы просто не понимаете... Бессмысленно с вами разговаривать!" - проворчал старик, наливая себе в тарелку суп и бормоча под нос "предатели", "двуличные" и "неверно оценившие себя люди". Ничего больше не сказав, экономка просто пожала плечами."
 china.355.a: ""Какой странный старик.""
 china.356.t: "Проект СУН ВЭНЬКОН"
 china.356.d: "Когда крышка была поднята, офицеры ВВС, которым было поручено осмотреть ее, широко раскрыли глаза. Перед их глазами предстал беспрецедентный истребитель нового поколения, сопровождаемый моделью J-20 в строю летчиков-компаньонов. J-20 и сам по себе довольно большой, но по сравнению с главной достопримечательностью он напоминал большую белую акулу рядом с касаткой, значительно уступая ей в размерах. Новый истребитель, черный и гладкий, излучал ауру одновременно свирепости и элегантности, вызывая чувство благоговения у всех, кто видел его.\n\n "Господа, надеюсь, наша последняя работа оправдает ваши ожидания!" - широко улыбнулся главный конструктор, стоявший рядом.\n "Вы, конечно, преподнесли нам большой сюрприз, товарищ, - сказал директор департамента разработки оборудования CMC, жестом указывая на модель. "Я читал ваш отчет по истребителю шестого поколения; честно говоря, я думал, что читаю научно-фантастический роман". Это замечание вызвало смех у нескольких присутствующих офицеров. "Вы можете гарантировать, что все технологические достижения, перечисленные в вашем отчете, будут реализованы в этом самолете?"\n\nУверенность главного конструктора была очевидна в его словах: "Мы не строим воздушных замков, товарищ, это результат многолетних усилий и десятилетней кропотливой работы, в то время как американский проект NGAD уже заглох. С этим самолетом мы станем обладателями определяющей силы в воздушной войне нового поколения"\nДиректор одобрительно кивнул, а неподалеку командующий ВВС, не в силах сдержать своего волнения, уже кружил вокруг модели шестого поколения с группой штабных офицеров, оживленно обсуждая детали."
 china.356.a: "Попробуем!"
 china.356.b: "Может и не надо..."
 china.357.t: "Пакистан Просит о Помощи"
 china.357.d: "Двусторонние отношения между Пакистаном и Китаем похожи на комменсализм между ремуром и акулой. Симбиоз между нашими двумя странами был жизненно важен для нашего взаимного развития. Только благодаря помощи Пакистана мы смогли вновь открыть нашу страну миру, а главное - снять напряженность между нами и Западом и восстановить отношения с Соединенными Штатами. По мере нашего развития мы возвращали эту услугу, оказывая Пакистану важнейшую экономическую и военную поддержку в борьбе с индийской агрессией, с которой сталкиваются обе наши страны.\n\nМы были вынуждены наблюдать, как индийские ядерные бомбы поражают Пакистан. Миллионы жизней были уничтожены в одно мгновение. Кровожадные индийцы в очередной раз доказали, что они являются препятствием на пути к миру и процветанию в Азии. Ядовитая хиндутва оскалила свои клыки, и ее тень распространилась по всему азиатскому континенту. \n\nНеприемлемо! Все это! Позор, обвинения и боль! Сколько еще нам придется терпеть? Неужели мы просто позволим индийской угрозе пройтись по нам и нашим друзьям? Пакистан обратился к нам за помощью, и наш долг - помочь ему. Мы направим их на путь восстановления их некогда прекрасной и процветающей страны. Симбиоз будет продолжаться, в той или иной форме."
 china.357.a: "Мы обязаны помочь!"
 china.358.t: "Порядок в Пакистане Восстановлен"
 china.358.d: "Красный флаг 1 августа и зелено-белый флаг Пакистана теперь развеваются бок о бок, и это зрелище становится все более частым в последние дни. Наблюдатели считают, что катастрофические последствия ядерного конфликта между Индией и Пакистаном были эффективно сдержаны под контролем китайских военных.\n\nНа фоне ядерной разрухи пункты помощи, созданные НОАК, и базы гуманитарной помощи, отмеченные большими красными крестами, являются символами надежды. Старики и дети получают высококлассный уход, в каждой семье есть толстые одеяла и достаточно еды, чтобы не умереть с голоду. Значительные ресурсы продолжают поступать из Китая по Китайско-пакистанскому экономическому коридору.\n\n "Двигаясь вперед, - заявил китайский представитель, - Китай будет продолжать выполнять свои международные обязательства. Это включает в себя установление контактов с оставшимися группировками в Пакистане и создание стабильного временного правительства. Многие из них уже положительно отреагировали на предложение Китая"."
 china.358.a: "Это положительный момент в тяжелой ситуации."
 china.359.t: "Китайские Вооруженные Силы Вошли в Пакистан"
 china.359.d: "После разрушительной индо-пакистанской войны, закончившейся обменом ядерными ударами и превратившей Пакистан практически в "географическую концепцию", его традиционный союзник, Китай, по просьбе центрального правительства Пакистана начал широкомасштабную операцию по оказанию гуманитарной помощи Пакистану, о чем официально объявило китайское правительство. \n\n "В данный момент, - заявил китайский представитель, - спасательные команды НОАК пересекли китайско-пакистанскую границу и систематически проводят операции по оказанию помощи."\n\n "Каждый солдат, участвующий в этой миссии, подписал соглашение о жизни и смерти, - заявил политический комиссар 76-й группы армий на пограничном переходе Китайско-пакистанского шоссе дружбы, - моральный дух поднялся во время мобилизационного собрания, когда войска узнали, что они собираются помочь нашему "железному брату" Пакистану. Это была очень трогательная сцена". Нет сомнений в том, что эта интервенция станет спасательным кругом для народа Пакистана, который переживает адские условия."
 china.359.a: "Ради друга мы пройдем огонь и воду."
 china.360.t: "Термоядерные Запуски из Китая!"
 china.360.d: "Срочное донесение военного времени.\nЧрезвычайный штаб военного времени Кабинета министров.\nМножество ядерных боеголовок поразили ключевые стратегические объекты в Токио, Йокогаме, Осаке, Нагое, Фукуоке и других крупных городах. Столичный регион получил серьезные повреждения, и центральное правительство переместилось на запасной командный пункт, чтобы сохранить базовый уровень командных функций.\n\nОстатки Сил самообороны реорганизуются. Хотя основные военно-морские портовые сооружения сильно пострадали, часть флота эвакуировалась заранее и сохранила ограниченный оперативный потенциал. В то же время общенациональная система раннего предупреждения указывает на то, что противник может нанести вторую волну ядерных ударов. Самолеты раннего предупреждения Сил самообороны и оставшиеся подразделения ПВО готовы перехватить любые последующие атаки.\n\nВ настоящее время уцелевшие корабли Морских сил самообороны находятся в состоянии повышенной боевой готовности. Однако электромагнитный импульс от ядерных взрывов серьезно нарушил работу командных систем и систем связи, что затрудняет координацию действий с местными подразделениями. В настоящее время активирована сеть экстренной связи, чтобы восстановить основные возможности командования и управления."
 china.360.a: "Пиздарики."
 china.360.b: "Мы можем отомстить!"
 china.361.t: "Термоядерная Бомбардировка Японии"
 china.361.d: "Впервые после атомных бомбардировок Хиросимы и Нагасаки в 1945 году родина Японии вновь подверглась ядерной атаке. Когда война зашла в тупик, Китай нанес масштабный ядерный удар по японским островам, взорвав множество боеголовок по всему архипелагу. От Хоккайдо до Кюсю несколько крупных городов были поражены практически одновременно. По предварительным оценкам, суммарная мощность этих ударов в десятки раз превышает мощность атомной бомбы, сброшенной на Хиросиму.\n\nЯдерные взрывы вызвали электромагнитные импульсы, что привело к общенациональным отключениям связи. Оценка ущерба в различных регионах еще продолжается, но уже ясно, что эта ядерная атака основательно пошатнула способность Японии к самосохранению как государства."
 china.361.a: "Ужасно."
 china.362.t: "Народная Федерация Воссоединяет Китай"
 china.362.d: ""
 china.362.a: "Интересно."
 china.363.t: "Китайские Интересы в Афганистане"
 china.363.d: "Бушуют пыльные бури, звенят верблюжьи колокольчики, а арабы, закутанные в толстые головные платки, бросают на вас холодные и подозрительные взгляды. Таково стереотипное представление многих китайцев о людях, живущих к западу от пустыни Такламакан и к востоку от пролива Босфор. К сожалению, в Афганистане нет великолепных песчаных морей, а вместо них преобладают бесплодные скалистые горы. Аромат шашлыков затмевает тягучий запах порохового дыма.\n\nВ нескольких шагах от самых известных дворцов и мечетей Кабула стоит китайское посольство. Три самых высокопоставленных дипломата Китая в Афганистане собрались вокруг небольшого круглого стола. Они изредка обмениваются взглядами, а затем опускают глаза, пристально изучая разложенную на столе крупномасштабную карту Афганистана.\n\nКонечно, посол нарушает молчание, пододвигая карту к сидящим напротив него военному атташе и политическому директору. "Итак, скажите мне, что вы здесь видите?"\nПосле небольшой паузы первым заговорил военный атташе: "Стратегическое расположение, легко защищать, трудно атаковать... Серьезная угроза для нашего северо-запада, которая может стать долгосрочной проблемой."\nДиректор добавляет: "Приход к власти талибов заставляет всех быть в напряжении, едва ли каждый десятый китаец за границей остался...\n\n "Вы оба видите опасность, но я вижу возможность!" Посол указывает на несколько мест на карте, отмеченных красным карандашом. "Международный аэропорт Кабула нуждается в ремонте; маковые поля, уничтоженные талибами, остаются неухоженными; немцы бросили свои проекты по добыче меди на полпути... Посмотрите от Кундуза до Кандагара - такие места повсюду!" Сверкая глазами, посол поднимает голову от карты и с энтузиазмом продолжает: "Глупые американцы превратили это место в пустырь. Мы же воспользуемся этой возможностью, чтобы одержать победу над упрямыми афганцами, как политическую, так и экономическую. Ради нашего будущего и нашей родины...""
 china.363.a: "Пришло время серьезно подойти к этому вопросу."
 china.364.t: "Экономическая Интеграция Афганистана Завершена"
 china.364.d: "С начала XXI века экономический рост Китая вызвал эффект пульсации, став ключевой силой, определяющей динамику развития Восточной Азии и даже всего мира. Этот могучий красный дракон своими масштабными преобразованиями практически перекроил мировой экономический порядок, установленный неолиберальной революцией, и никогда не прекращал своей экспансии. Сегодня стало известно о следующей цели китайского экономического влияния.\n\nПересекая горы Гиндукуш, после более чем 40 лет беспорядков, порядок, похоже, возвращается на "кладбище империй" - в Афганистан. Талибы, которые уже второй раз находятся у власти, ищут значительной поддержки для восстановления и переустройства страны. Естественно, несмотря на существенные политические разногласия, Китай и Афганистан сблизились в экономическом плане.\n\nПоследние недостающие части империи "Made in China" снова становятся на свои места. На улицах Кабула мелкие торговцы начинают свой день на электроскутерах, произведенных в провинции Чжэцзян; афганские солдаты на службе носят в карманах телефоны Xiaomi и Huawei; несколько пострадавших от войны гостиниц вновь открылись, вывесив импровизированные китайские вывески и предлагая китайские блюда в меню. Наш посол, ставший свидетелем этой сцены в этой бедной, не имеющей выхода к морю стране, с удовлетворением докладывает на родину, ярко описывая все происходящее."
 china.364.a: "Бизнес по-китайски."
 china.365.t: "Полная Лояльность Правительства Афганистана Установлена
 china.365.d: "Многие опасались, что Афганистан, некогда известный только своими джихадистами и маком, снова погрузится в хаос, особенно с печально известным движением "Талибан" у власти. Китайское правительство также сомневалось в целесообразности сотрудничества с исламским экстремистским режимом, который яростно поддерживал сепаратистское движение в Восточном Туркестане. Однако благодаря усилиям умеренных сторонников из Китая и Афганистана удалось создать платформу для сотрудничества.\n\nПод руководством Верховного лидера Афганистана Хибатуллы Ахундзады талибам удалось объединить различные группировки, которые когда-то вели междоусобную войну. Теперь эти группировки управляют горной страной более стабильно. Джихадисты, похоже, избавились от своего воинственного прошлого: некоторые из них облачились в одежды священников, чтобы служить в сельских районах, а другие стали чиновниками центрального правительства в костюмах.\n\n Запрет на выращивание мака, возрождение образования с новыми учебными программами и направление дипломатов для поиска международного признания и стабильности внесли надежду в потенциальный переход Афганистана к нормальному государству. Возможно, постоянная финансовая помощь со стороны ближневосточных монархий обеспечивает материальную основу для этих изменений. Тем не менее, Афганистану нужен опытный наставник, который будет направлять его политические реформы. Неизбежно, что Китай будет играть более значительную роль в будущем Афганистана."
 china.365.a: "Маленький друг большого Китая."
 china.366.t: "Декларация Договора о Афгано-Пакистанской Дружбе"
 china.366.d: "Как ключевой союзник, чья дружба с нашей страной была скреплена кровью и огнем, Пакистан не боится ничего больше, чем терроризма, представленного так называемым "Техрик-и-Талибан Пакистан" (ТТП) в пределах его границ. Основатели этой организации утверждают, что вдохновляются своими афганскими коллегами, черпают силы в пуштунских поселениях на северо-западе Пакистана и уже более десяти лет сеют хаос, несмотря на неоднократные попытки пакистанских военных искоренить их. \n\nНесмотря на то, что правительство талибов в Афганистане последовательно отрицает какую-либо связь с ТТП, их очевидные связи привели к резкому ухудшению отношений между Пакистаном и Афганистаном, а вдоль границы по линии Дюранда часто происходят военные столкновения.\n\nДлительная поддержка ТТП движения Восточного Туркестана и его угрозы в адрес Китайско-пакистанского экономического коридора также глубоко возмущают наше правительство. Однако последние события приняли многообещающий оборот. Установив контакт и достигнув предварительного сотрудничества с Пекином, созревшее правительство афганских талибов решило разорвать все связи с ТТП, проложив путь к смягчению позиции Пакистана. Тем временем при посредничестве китайских дипломатов пакистанское правительство начало менять свою позицию. В конце концов, представители обеих стран собрались в Исламабаде, чтобы подписать историческую декларацию, нормализующую двусторонние отношения и открывающую путь к будущему сотрудничеству."
 china.366.a: "В конце концов они помирились."
 china.367.t: "Афганский Договор с Россией"
 china.367.d: "Если говорить о том, какие страны причинили Афганистану наибольший вред и нанесли самые глубокие разрушения, то помимо Соединенных Штатов, которые два десятилетия пытались защитить свое марионеточное демократическое правительство западного образца с помощью подавляющей военной силы, еще одним ключевым игроком является Советский Союз. На фоне холодной войны этот конфликт позволил идеологическим врагам проникнуть в Советский Союз и истощить его ресурсы, что в конечном итоге привело к краху империи. Эти исторические связи продолжают влиять на отношения между Россией, преемницей Советского Союза, и правительством талибов в Афганистане, что приводит к длительному охлаждению отношений и даже к вооруженному конфликту.\n\nЯвляясь доминирующей державой в Центральной Азии, исторические амбиции России в регионе, наряду с угрозой исламского экстремизма в Афганистане, являются значительными источниками нестабильности. Чтобы создать условия для новой эры мира и процветания, мы должны учитывать точку зрения России в дипломатических переговорах с Афганистаном. Благодаря внутреннему диалогу у нас есть шанс убедить Россию в нейтралитете Афганистана и его приверженности дерадикализации, а также добиться того, чтобы Россия отказалась от любых планов военного вмешательства во внутренние дела Афганистана в будущем. Вместо этого наша цель - наладить совместное экономическое сотрудничество и обмен ресурсами."
 china.367.a: "Все это делается для обеспечения мира."
 china.368.t: "Афганский Договор с Китаем" #event for SOV
 china.368.d: "Афганистан - некогда страдание Советского Союза и источник проблем в Центральной Азии. Когда талибы в последний раз взяли под контроль Кабул, США и Россия, а также НАТО и ОДКБ - два главных соперника - отложили в сторону свои разногласия и тесно сотрудничали в борьбе с афганскими джихадистами. Однако с тех пор многое изменилось. Американские солдаты, которые когда-то доминировали в Афганистане, тихо ушли на транспортных самолетах C17, а на смену им снова пришли талибы.\n\nПока мы с тревогой наблюдаем за вновь созданным Исламским Эмиратом Афганистан, Китай - теперь новый игрок в Большой Азиатской Игре - протянул оливковую ветвь, приглашая нас к сотрудничеству с Афганистаном. По словам наших оптимистично настроенных китайских коллег, слабое сельское хозяйство Афганистана, а также едва существующая промышленность открывают бесчисленные возможности для развития и инвестиций. С китайским финансированием и персоналом, в сочетании с российскими технологиями и энергией, экономическое возрождение Афганистана практически гарантировано и обещает значительную прибыль в течение короткого периода.\n\n Конечно, все это зависит от нейтралитета Афганистана, дерадикализации и снятия блокады, наложенной окружающими великими державами, включая нашу собственную. Хотя опасения по поводу безопасности Афганистана и условий ведения бизнеса остаются, а подлинная готовность страны к сотрудничеству все еще неясна, сторонники этого плана с оптимизмом смотрят на то, что эти проблемы будут решены в ходе будущего сотрудничества."
 china.368.a: "Новые рынки для нашей продукции? Звучит неплохо."
 china.369.t: "Вопрос Корпоративных Свобод в Афганистане"
 china.369.d: "В настоящее время наши предприятия добиваются значительных успехов в Афганистане, быстро завоевывая рынок. Однако в различных афганских кругах стало расти недовольство, которое постепенно дошло до китайского посольства в Кабуле и в конечном итоге привело к жалобам на стол посла. Хотя новаторский дух наших предпринимателей заслуживает одобрения, иногда он выливается в "безрассудство" и "мотивы наживы", что способствует росту китайско-афганской напряженности. Жалобы на чрезмерное потребление китайских торговцев и работников, нарушение рыночных цен и порядка, неуважение к афганской культуре и исламским обычаям - особенно по отношению к афганским женщинам - и частые столкновения с местными жителями заставили официальные лица обеих стран искать решения.\n\nВ то же время, с более высоких уровней поступают новые сигналы беспокойства. Руководство Талибана обеспокоено коммерцией и светским влиянием китайцев, опасаясь, что это приведет к изменению ценностей афганских граждан. Многих молодых афганцев привлекает процветание Китая, что может привести к одностороннему оттоку и постоянной потере населения. В сельских районах Афганистана, где преобладают консервативные взгляды, растет страх и недовольство по отношению к безудержной коммерческой деятельности китайцев.\n\nВ конечном счете, должны ли мы ввести четкие правила и ограничения на масштабы и свободу китайских инвестиций в Афганистане? Окончательное решение будет..."
 china.369.a: "Наши корпорации будут свободно вести бизнес!"
 china.369.b: "Конечно, они будут вести переговоры с правительством Афганистана..."
 china.370.t: "Китайско-Афганский Договор о Дружбе и Сотрудничестве"
 china.370.d: "С наступлением сумерек огни "Арга" ярко сияли, выделяясь в недавно построенном районе Кабула. В банкетном зале под золотыми люстрами звенели бокалы и велись разговоры. Сверкали хрустальные бокалы, наполненные различными безалкогольными напитками. На знаменитых шерстяных коврах были разложены роскошные блюда, среди которых были традиционные афганские кебабы и наан, а также пекинская жареная утка, приготовленная китайскими поварами. Обедающие сидели на подушках, образуя несколько маленьких и больших кругов, создавая теплую и дружескую атмосферу.\n\nКогда банкет достиг своего пика, китайский посол поднял свой хрустальный бокал с виноградным соком в тосте за афганского премьер-министра. Он заявил: "Я предлагаю тост за недавнее подписание нашими лидерами китайско-афганского договора о дружбе и сотрудничестве! От имени китайского правительства я также выражаю благодарность премьер-министру за его значительный вклад в переговоры. Пусть этот договор послужит краеугольным камнем новой эры в китайско-афганских отношениях!"\n\n С сияющей улыбкой премьер-министр поднял свой бокал и с энтузиазмом ответил: "Наш Верховный лидер также попросил меня поблагодарить Ваше Превосходительство! Китай - великий сосед и союзник, и мы верим, что наше сотрудничество и дружба будут только углубляться в будущем!" Аплодисменты и звон бокалов еще долго эхом разносились по банкетному залу.\n\nУ официальных лиц Китая и Афганистана было много поводов для радости. Для Китая подписание договора открыло доступ к рынку с населением около 40 миллионов человек и огромным потенциалом. Оно также давало возможность ликвидировать остатки Исламского движения Восточного Туркестана, которое долгое время досаждало северо-западному региону Китая, и одновременно интегрировать Афганистан в рамки сотрудничества EADI. Для афганских талибов это означало возвращение в международное сообщество после десятилетий беспорядков. Кроме того, это позволило Афганистану опереться на силу региональной державы, надеясь однажды вернуть себе былую славу центра Азии."
 china.370.a: "Больше новых друзей!"
 china.371.t: "Афганистан Аннулирует Все Договоры"
 china.371.d: "Кабульский Арг, служивший резиденцией высших правителей Афганистана с XIX века, принимал бесчисленное множество политиков, знаменитостей, местных полевых командиров, военных генералов и богатых купцов. Многие лидеры уходили со сцены с позором, бесславно завершая свою борьбу за власть.\n\n В зале заседаний, украшенном разноцветным мрамором и глазурованной плиткой, китайский посол пытался возродить надежды сидящих напротив него афганцев. Однако его усилия, похоже, были обречены на провал. Ухудшение китайско-афганских отношений не было внезапным явлением. В сферах политики, экономики и культуры китайцы и афганцы оказались несовместимы, как нефть и вода. Трудно определить, кто несет большую ответственность - упрямство афганцев или высокомерие китайцев.\n\nПремьер-министр Афганистана жестом прервал дальнейшие мольбы посла. Пожилой мужчина с дрожащей от волнения бородой снял очки и вздохнул, прежде чем медленно произнести: "Посол, мы оба знаем, что решение, принятое нашим верховным лидером, является окончательным. Возможно, сила Китая не сможет заставить ваших соотечественников понять гордость и хрупкое достоинство афганского народа. Эта земля была свидетелем британцев, русских и американцев; афганцы проливали кровь, чтобы изгнать их с нашей родины, и мы также не можем удержать четырнадцать миллиардов человек."\n\nОн снова надел очки и пристально посмотрел на посла. "Мы хотим мира и шанса выжить, но мы не будем жертвовать своим достоинством ради этого. Вы можете передать это послание своему президенту". С этими словами премьер-министр поднялся с дивана, и остальные афганцы вышли за ним из зала заседаний в одном строю.\n\nПосол остался сидеть, молча размышляя о тяжести слов премьер-министра и о неудаче, которую он чувствовал. Всего за несколько мгновений все кропотливые усилия, которые Китай прилагал в Афганистане на протяжении многих лет, казалось, рухнули. Он не знал, как вернуться домой и сообщить о таком исходе, как примириться с той частью себя, которая когда-то неустанно отстаивала китайско-афганские отношения."
 china.371.a: "Столько упущенных возможностей! Столько потерянных денег..."
 china.372.t: "Короли Войны"
 china.372.d: "Если в XIX веке королевами войны были пушки, а в XX веке полями сражений правили танки, то в XXI веке новыми королями войны, несомненно, стали беспилотники. После того как американцы разместили беспилотники на Ближнем Востоке и в Афганистане, они стали больше, дороже и оснащены самым современным и мощным оружием. Однако иногда смертоносную роль играют не гигантские "динозавры", а небольшие, зачастую невоенные "пчелы".\n\nОбращаясь к беспилотникам, пролетающим над Днепром, поражает тот факт, что большинство их деталей помечены логотипом одной компании - DJI Innovations, штаб-квартира которой находится в Шэньчжэне, Китай. Дроны, которые раньше доставляли посылки, теперь сбрасывают бомбы на вражеских солдат, а беспилотники, которые раньше снимали потрясающие пейзажи, теперь снимают тщательно охраняемые военные базы, склады материально-технического снабжения и марширующие войска.\n\nВ прошлом критика китайских беспилотников как "небезопасных" или "сливающих данные пользователей" была обычным делом. Теперь появились обвинения в "поддержке российской агрессии" и "краже разведданных". Когда люди, из любопытства или критики, спрашивают президента DJI об использовании их продукции на полях сражений в Восточной Европе, он всегда начинает с того, что "решения, принимаемые пользователями продукции, не имеют отношения к компании", а также "не интересуется" войной, происходящей за тысячи километров в Европе, сохраняя при этом выражение невинности."
 china.372.a: ""Made in China" - больше, чем стиральные машины и микроволновые печи."
 china.373.t: "Удар Нэчжа 2"
 china.373.d: "Казалось, что китайское кино уже давно не присутствует на международной киносцене. После успеха "Последнего императора", "Инфернального дела" и "Крадущегося тигра, затаившегося дракона" ни один китайский фильм не смог добиться мировой славы. Однако новаторский фильм разрушил эти стереотипы, и, что удивительно, это 3D-анимация.\n\nСпустя несколько лет после скромного успеха своего предшественника в 2019 году, "Нэчжа: Дитя дьявола приходит к морю", созданный той же командой, вышел на экраны в период китайского Нового года. Эта фэнтезийная комедия, основанная на известном китайском мифе о наследном принце Нэчжа, быстро завоевала огромный успех как в плане репутации, так и кассовых сборов. Зрители были потрясены передовыми технологиями анимации, реалистичными персонажами и захватывающим сюжетом. Кроме того, создатели смело вплели в древние истории такие современные темы, как дружба, свобода и восстание, что усилило эмоциональный резонанс у зрителей.\n\nЗаполненные кинотеатры продемонстрировали высокое качество фильма. Нэчжа 2" быстро обошел многочисленные блокбастеры и стал самым кассовым фильмом в континентальном Китае. Подобно камню, брошенному в спокойное озеро, он вызвал глобальный ажиотаж среди дистрибьюторов, стремящихся вывести фильм на свои рынки. Зарубежные китайские общины от Сингапура до Сиэтла дали "Нэчжа 2" восторженные отзывы. В отличие от своего предшественника, влияние которого ограничивалось в основном китайской общиной, сиквел получил широкое распространение благодаря таким социальным медиаплатформам, как TikTok и Xiaohongshu. Многие люди, изначально мало знавшие о китайской мифологии, были привлечены в кинотеатры и в итоге стали поклонниками "Нэчжа"\n\nНесмотря на то, что некоторые критики объясняли огромный успех фильма всплеском националистических настроений в Китае, "Нэчжа 2" широко рассматривается как веха в китайском и неголливудском кино, демонстрирующая многообещающее будущее китайской анимационной киноиндустрии."
 china.373.a: ""Моя судьба в моих руках, а не на небесах""
 china.374.t: "Дракон Остается Красным"
 china.374.d: "Ли Цзочэн сидел один в своем кабинете и смотрел на карту Китая, разложенную на столе. Остров Тайвань все еще был отмечен другим цветом - как шрам, который никогда не заживет.\n\nОн зажег сигарету. Синевато-серый дым взвился вверх под тусклым светом. Реальность висела в воздухе, словно молот, разбивший тысячу иллюзий. Приверженцы жесткой линии призывали вернуться к дням славы Мао, размахивая красными флагами, забывая о том, что колесо истории уже давно прокатилось мимо этих полей. Реформаторы вслух мечтали о демократии, об утопиях, почерпнутых из книг, не ожидая, что их идеалы будут втоптаны в грязь общественной яростью. Левые или правые, их неудачи никогда не были случайностью - эта страна слишком огромна, слишком сложна, чтобы в ней могла ужиться одна крайность.\n\nПод лампой остров Тайвань казался почти светящимся, суровым и неумолимым. Он подумал о погибших солдатах. Он думал о невыполненных обещаниях. Тень войны все еще оставалась. Международное осуждение дуло как ледяной ветер, но трещины внутри его собственной нации были еще глубже.\n\nЛи медленно выдохнул, переводя взгляд с карты на отчеты на своем столе - страницы, заполненные комментариями общественности, из-за рубежа, о нем самом. Но ему было все равно. Он не хотел быть героем. Он не хотел быть тираном. Он был просто солдатом, оказавшимся на перекрестке истории и несущим на себе груз целой нации. Хотел он того или нет, но время не остановится. Завтра ему придется идти дальше.\n\nЛи Цзочэн затушил сигарету и поднялся, оставив кабинет."
 china.374.a: "В ту ночь он долго сидел в тишине и раздумьях."
 china.375.t: "Истинный Наследник Мао"
 china.375.d: ""Почему ты мне все время снишься?"\nДаже сердце Республики, вечно бьющееся, находит моменты передышки. Напротив бесконечно освещенной площади Тяньаньмэнь тускло светится мраморно-белый Мемориальный зал председателя Мао. В ночной тишине здесь одинокая душа ищет ответа у непоколебимого якоря памяти об основании Республики.\n\n"Вы хотите сказать, что я не могу быть хорошим руководителем? Ах, председатель, я давно это понял!"\nЛи Цзочэн сидел на стуле из красного дерева, безучастно глядя на хрустальный гроб, окруженный вечно цветущими цветами и зеленым кипарисом. Великий вождь мирно покоился здесь уже почти полвека. Он вспомнил те дни, когда только стал заслуженным солдатом НОАК, когда портреты великого рулевого председателя Мао украшали каждую казарму. Тогда его главным желанием было просто быть хорошим солдатом, и забота председателя всегда была рядом. Теперь же, будучи непререкаемым лидером Республики и ее армии, он никогда не чувствовал себя таким далеким от Мао.\n\n"Но что еще я могу сделать? Ваше наследие отвергнуто и растоптано, а люди, которыми вы дорожили, находятся в бедственном положении. Я отказываюсь стоять в стороне и ничего не делать, поэтому я и зашел так далеко!" К этому времени Ли уже расхаживал взад-вперед по мемориальному залу.\n\n"Я не боюсь жертвовать собой. Во время Длинного марша и Войны сопротивления вы когда-нибудь отказывались от пути партии ради личной выгоды? Нет, думаю, что нет. Возможно, партия все же поддержит меня. В конце концов, это ваша партия, а ваша партия не оставит последнюю надежду революции." Правая рука Ли мягко легла на гроб, его взгляд был устремлен на возвышающиеся ворота Тяньаньмэнь, где за ним наблюдал другой председатель Мао.\n\n"Я надеюсь, что вы будете наблюдать за мной," прошептал Ли, "наблюдать, как я восстанавливаю партию, восстанавливаю эту страну и мщу тем, кто причинил вред Китаю. Когда я приду отчитываться перед вами и Марксом, я надеюсь, что вы будете помнить, что, какие бы грехи я ни совершил, все это было ради вас, вашей партии и народа." С этими словами некогда растерянный старик вновь превратился в решительного генерала-героя. Он надел свою фуражку, украшенную красной звездой 1 августа, и вышел из мемориального зала. Адъютант ждал его с пачкой приказов на подпись - время никого не ждет."
 china.375.a: "А значит, близится момент, когда прозвучит сигнал о смерти врага."
 china.376.t: "Встреча"
 china.376.d: "Величественное здание 1 августа является лицом и штаб-квартирой НОАК. Бесчисленные офицеры, от лейтенантов до генералов, созываются со всей страны, чтобы неустанно трудиться в этом огромном здании. Их усилия в конечном итоге обретают форму секретных приказов, передаваемых в армии, флоты, аэродромы и ракетные базы.\n\nВ кабинете председателя CMC на верхнем этаже Ли Цзочэн молча смотрел на двух офицеров, сидевших за длинным столом. Лю Чжэньли, начальник Объединенного штаба - мозга НОАК, и Ван Хайцзян, командующий Западным театром военных действий, в состав которого входит почти половина сухопутных войск НОАК и который контролирует большую часть ее наземного ядерного арсенала. Эти два человека представляли собой самых могущественных "военачальников" со времен поражения на острове Тайвань. Что еще более важно, Ли доверял этим товарищам, сражавшимся вместе с ним на фронтах во Вьетнаме.\n\n"Давайте сразу перейдем к делу: первоочередная задача - залечить раны, нанесенные нашей стране и народу," прямолинейно начал Ли. "Что касается нынешнего распределения власти, то я не намерен ничего менять. Я надеюсь, что вы оба будете сотрудничать со мной в восстановлении власти центрального правительства. Китаю нужно сильное правительство, гораздо более сильное, чем раньше. Для этого потребуется поддержка НОАК."\n\nПосле некоторого раздумья Лю заговорил первым: "При всем уважении, сэр, учитывая масштабы этого дела, не следует ли нам посоветоваться с заместителем председателя Чжан Юйся? Он занимает особое положение в армии..."\n\nЛи прервал Лю взмахом руки. "Я знаю, что он был для вас важным наставником, товарищ. Вы должны помнить, что сейчас не время ставить во главу угла фракционные интересы. Вице-председатель Чжан... он останется в армии, но только в качестве фигуранта. Это соглашение выгодно и ему, и стране."\n\nЛю и Ван обменялись быстрым, почти незаметным взглядом, а затем снова повернулись к Ли. В унисон они ответили,"
 china.376.a: ""Как прикажете, председатель""
 china.377.t: "Мысли Мао Цзэдуна Возвращаются в Свет"
 china.377.d: "В течение длительного времени Ли Цзочэн воздерживался от переезда в центр Пекина. Из осторожности и желания стабилизировать ситуацию он разместил свою временную штаб-квартиру во дворе Главного командования НОАК, расположенного за городом. Теперь Чжуннаньхай вновь приветствовал прибытие кортежа высшего руководителя.\n\nПроходя по затейливым павильонам и башням в сопровождении группы напряженных чиновников Центрального аппарата, Ли казался равнодушным к красоте этого бывшего императорского сада. Однако он надолго задержался в Библиотеке хризантем, которая была кабинетом Мао и одной из его самых известных резиденций. Библиотека сохранилась в том виде, в каком она была во времена Мао. Ли мог представить, как великий человек читает и размышляет в темноте ночи, принимая решения, которые навсегда изменят ход китайской истории.\n\nЛи пришел сюда не случайно. Когда перед ним возникали сложные проблемы, которые его военный ум не мог разрешить, он всегда обращался к Мао за вдохновением и руководством. В настоящее время ситуация такова, что, когда Ли попытался распространить основные принципы "Мысли Мао Цзэдуна" в НОАК - такие как военная дисциплина, пропагандистское движение и идеологическое единство - на всю партию, он столкнулся с невообразимым сопротивлением.\n\nВпервые он глубоко осознал, что десятилетия принципов рыночной экономики незаметно трансформировали все аспекты партии. Однако отказ от усилий по объединению партии в конечном итоге приведет к гибели и его самого, и всей страны.\n\nПосле того как он прошелся взад-вперед по маленькой комнате почти сотню раз, смутные идеи в голове Ли начали обретать форму. На протяжении десятилетий двойная роль военачальника и политического лидера привела к тому, что многие опытные генералы стали жертвами борьбы за власть внутри партии, но для него все будет гораздо проще.\n\nПод его командованием гражданские правительства и партийная элита, естественно, получали то, что хотели, а Ли оставался сосредоточенным на НОАК. Используя свое видение идеальной политики, переплетенное с "Мыслью Мао", он превратит НОАК в истинное революционное ядро, стоящее над партией и государством."
 china.377.a: "Новее, Лучше... Более Революционно."
 china.378.t: "Конец Слабым Революционерам"
 china.378.d: "Наступает момент, когда любая мечта должна закончиться.\n\nНесмотря на то что уже пробили полночь, Ху Чуньхуа оставался в своем кабинете, увлеченно просматривая различные отчеты и документы. Он не решался заснуть; даже когда он ложился, то не мог спокойно закрыть глаза. Как только он начинал засыпать, его будил резкий звук шагов за дверью. С тех пор как его охрана и обслуживающий персонал были заменены, он потерял всякое доверие к окружающим. Ху был уверен, что его новые охранники будут просто бездействовать, когда придет его конец.\n\nСегодня он был уверен в этом как никогда раньше. Только посмотрите на него сейчас: ему за шестьдесят, волосы седеют и лысеют, он едва может читать документы без очков. Возможно, скоро единственная активная часть его тела - мозг - перестанет функционировать. Но, впрочем, об этом уже почти никто не думал. Вся страна превратилась в военный лагерь, ее люди перестали быть живыми существами, а стали лишь пулями и штыками. А партия... о, партия, вскормившая его, превратилась в безжизненный труп. Ли Цзочэн был на пороге полной победы, разрушив все, что было построено теми, кто был намного выше его.\n\nИ вот, когда грозные солдаты из Центрального корпуса охраны предсказуемо открыли ворота, когда отряды ворвались в Государственный совет и окружили его, когда пинком распахнули дверь кабинета Ху, они обнаружили старика, полностью лишенного воли, безжизненно сидящего за своим столом с пустым ежедневником перед ним.\n\n"Ху Чуньхуа, вы арестованы за государственную измену," высокомерно объявил главный капитан. На это не последовало никакого ответа. Два солдата шагнули вперед и подняли его с места, как выброшенную сумку. Ху просто повесил голову, словно его душа уже отошла в мир иной."
 china.378.a: ""Я думал, это будет сложнее, чем сейчас," размышляет капитан."
 china.379.t: "Звезда Реформ Угасла"
 china.379.d: "Под хмурым небом серые волны омывали бесплодный пляж Бэйдайхэ. Ван Ян прогуливался по берегу, его настроение было таким же мрачным, как и открывающийся перед ним вид. Погода не была холодной, ее даже можно было назвать приятной. Однако он не мог избавиться от леденящего душу холода под своим черным плащом.\n\nС тех пор как его попросили переехать из Чжуннаньхая и покинуть Пекин, за ним повсюду следили теневые шпионы. Куда бы он ни пошел, за ним постоянно следили бесчисленные глаза. Камеры были направлены на каждый уголок его виллы. Каждый клочок бумаги, выброшенный в мусорное ведро, тщательно изучался и собирался воедино. Приходящих и уходящих смотрителей и домработниц постоянно допрашивали во всех подробностях, а может, они и сами были шпионами.\n\nИногда Вангу хотелось обернуться, найти тех, кто прячется в его тени, и завязать с ними разговор. Но каждый раз за его спиной была лишь тишина. Такова была его жизнь: уровень жизни был безупречным, но ему не разрешалось говорить, писать или посещать какие-либо публичные мероприятия. Все, что он производил, власти считали ядом.\n\nГоворили, что его имя неоднократно подвергалось критике в партии. Теперь он считался одним из главных врагов партии. По мнению членов партии, его преступления могли даже превзойти преступления некоторых печально известных "контрреволюционеров" прошлого. Ван устал и прислонился к скале на берегу, чтобы отдохнуть. Ему казалось нелепой мысль о том, что кто-то может докладывать о его передвижениях офицеру в Пекине, но он не смел этого показать.\n\nКогда весть о поражении на острове Тайвань потрясла весь Пекин, он надеялся, что именно ему суждено спасти Китай. Даже когда к власти пришел Ли Цзочэн, он не терял надежды, полагая, что военным нужен надежный чиновник для управления гражданскими делами. Поэтому, когда последователи Си были сметены, он молчал. Когда наивных левых заставили замолчать, он остался в стороне. Теперь же он сам стал их мишенью, и не осталось никого, кто мог бы выступить в его защиту. Ван горько улыбнулся, неохотно признаваясь самому себе:"
 china.379.a: "Китай, который он когда-то знал, давно исчез."
 china.380.t: "Историческая Справедливость Восстановлена"
 china.380.d: "Недавно правительство обнародовало партию давно засекреченных исторических архивов, проливающих новый свет на "Инцидент 13 сентября" и дело против Линь Бяо. Эти документы показывают, что Линь на самом деле был жертвой политического преследования - его подставила ультралевая фракция во главе с "Бандой четырех" в сговоре с некоторыми антипартийными элементами в руководстве. В архивах содержатся подробные сведения о сложной политической борьбе после начала Культурной революции в 1966 году, об эскалации напряженности между Линь Бяо и кликой Цзян Цин и о постепенном ухудшении отношений между Мао и Линем. Включены оригинальные анализы "Наброска проекта 571" 1971 года и протоколы заседаний Политбюро того времени, предлагающие убедительные доказательства политических манипуляций и судебной несправедливости, стоявших за делом Линь Бяо.\n\nВ документах также подчеркивается статус Линь Бяо как маршала-основателя Народной Республики и преемника Мао Цзэдуна. В первые годы Культурной революции Линь активно пропагандировал "мысль Мао Цзэдуна" и возглавлял политическое развитие в армии. Однако после чистки Лю Шаоци, Дэн Сяопина и других возникла борьба за власть. Ультралево-либеральная фракция во главе с Цзян Цином попыталась захватить больший контроль, но столкнулась с жестким сопротивлением со стороны Линь Бяо, Линь Лигуо, Хуан Юншэна, У Фасянь и других. В результате конфликт стал непримиримым и перерос во враждебный. В итоге Линь Бяо подвергся преследованиям со стороны антипартийной группировки и был преднамеренно устранен - его наследие было опорочено.\n\nПосле официальной реабилитации Линь Бяо в социальных сетях посыпались слова благодарности, люди из всех слоев общества вновь выразили уважение к его историческому вкладу. Хотя на короткое время появилось несколько голосов несогласных, они были быстро заглушены подавляющим потоком общественной поддержки и впоследствии подавлены. Политические комментаторы отмечают, что этот шаг не только помогает восстановить доверие общества к Народно-освободительной армии, но и служит мощным сигналом как для сторонников жесткой линии, так и для реформистов внутри партии, укрепляя авторитет и легитимность нынешнего руководства."
 china.380.a: "Без НОАК не было бы Нового Китая"
 china.381.t: "Сохранение Статуса-кво"
 china.381.d: "Солнечный свет падал на грядку с овощами. Почва была влажной, но от грязи исходило мягкое тепло. Ли Цзочэн присел на краю поля, разрыхляя землю мотыгой мазок за мазком. На нем была выцветшая, застиранная военная рабочая форма. В своем маленьком дворике он предпочитал сохранять налет дикости.\n\nКогда-то он стоял на заседаниях высокого уровня и слушал, как старая гвардия - хорошо связанная, давно укоренившаяся - говорит по кругу, и в их словах сквозит едва уловимое презрение. Возможно, это было связано с тем, что он не был принцем, не был тем, кого воспитала "система." Он поднялся сам - от регионального командования до военного комиссариата, от границы до центра. И тех, кто поднялся благодаря благосклонности, тех семейных кланов, которые относились к армии как к частному бизнесу, он разбил. Фракционные игры, кумовские повышения, пустые директивы - он вспоминал их одного за другим, расследовал дело за делом, никогда не проявляя милосердия. Чтобы страна перестала проигрывать, старые болезни нужно было вырезать под корень.\n\nНе то чтобы они не пытались сопротивляться. Снова и снова они подавали "рекомендательные письма" после заседаний, объединяли усилия для составления "коллективных резолюций", просачивались за пределы зала с шепотом: "Ли Цзочэн слишком жестко настроен, не годится для того, чтобы руководить всем." Некоторые даже втихомолку высказывали мысль о том, что если он и дальше будет настаивать на своем, то вскоре его могут "отправить на пенсию." Но в итоге именно их отправили в отставку. Имена за столом заседаний менялись, снова и снова. Оставался только он - его место становилось все более устойчивым.\n\nНикто не смел бросить ему вызов. Не было больше фракций в партии, не было покровительства в армии. Если он говорил, что кто-то поднимется, он поднимался; если он говорил, что кто-то уйдет, он уходил. Весь Китай теперь работал как машина - безэмоциональная, бескомпромиссная, сосредоточенная исключительно на целях и их выполнении. Усталость, нерешительность, осторожность - он вырвал их всех с корнем.\n\nОн посмотрел на небо. Оно было прозрачно-голубым. Солнечный свет был как раз кстати. Он встал, смахнул грязь со штанов и потянулся за горстью зелёного лука."
 china.381.a: "Победитель забирает все"
 china.382.t: "Защищая Китай"
 china.382.d: ""Товарищ, покурим?" Ли Цзочэн вышел из двери и махнул рукой в сторону солдата, стоявшего в карауле. Солдат не двинулся с места - он просто отдал честь, Ли без выражения улыбнулся и больше ничего не сказал. Он вернулся в сад и положил мотыгу рядом с грядкой. На самом деле он не собирался предлагать сигарету - просто хотел убедиться, что он все еще в каком-то смысле человек.\n\nДни проходили так: утром приходила пачка документов - он подписывал их; в полдень кто-то приходил с докладом - он кивал; во второй половине дня его могли попросить записать речь - он читал сценарий, как было написано. Он больше не задавал вопросов, да и никто не давал ему такой возможности. На каждом приказе по-прежнему значилось его имя, на каждой титульной странице стояла официальная красная печать. Но он знал - это были не его решения. Большинство из них он даже не читал.\n\nОн верил, что сможет переделать страну. Он уже побеждал. Он очищал фракции, искоренял кумовство один за другим. Но он недооценил амбиции генералов. Они не поддерживали его - он был нужен им на фронте. Как только армия перестала сопротивляться, как только они смогли перебрасывать войска без согласования, он - "председатель" - превратился в церемониальную фигуру. Он сидел на самом высоком месте, но не имел ни малейшего представления о том, где идет следующая война и куда перебрасываются войска.\n\nДа, государство стало сильнее - холодно, безжалостно сильнее. Но это не были "дисциплина и порядок," которые он себе представлял. Чиновники молчали, кадры выполняли приказы, и все теперь вращалось вокруг "коллективных решений" нескольких военных. Сам же он стал лишь "рукой, подающей знаки"\n\nОн присел и взрыхлил почву. Несколько саженцев перца плохо росли. Он ничего не сказал, просто отщипнул ногтями пожелтевшие листья. Солнечный свет коснулся его плеча - мягкий и теплый. Он понял реальность. Он просто устал. Он больше не хотел бороться. Иногда он задавался вопросом: когда-нибудь им перестанет быть нужна даже его подпись? Останется лишь полая система, которую можно будет направлять в ту сторону, которую они назовут "правильной"\n\nВетер зашелестел. Охранник у ворот сменился. Там стоял новый молодой человек, такой же молчаливый. Ли больше ничего не сказал. Он зажег сигарету, присел у огорода и стал смотреть на кривые ряды капусты, тихо растущие в грязи."
 china.382.a: "В безвыходном положении."
 china.383.t: "Генерал Запрашивает Дополнительное Финансирование"
 china.383.d: "На нашей армии лежит важнейшая ответственность за охрану сухопутных границ страны и поддержание национальной безопасности и стабильности. Однако в условиях все большей нестабильности международной обстановки давление на пограничную безопасность продолжает возрастать. Нынешняя структура сил, техника и учебные ресурсы армии с трудом отвечают меняющимся требованиям нового стратегического этапа.\n\nНедавно группа старших командиров армии совместно направила в Центральную военную комиссию официальную просьбу о выделении дополнительного финансирования. Они сообщили, что многие подразделения еще не оснащены современным снаряжением, некоторые низовые роты испытывают острую нехватку бюджетных средств на обучение, а запасы боеготового снаряжения остаются недостаточными - факторы, которые серьезно препятствуют укреплению наших оперативных возможностей. Особенно на юго-западном и северо-западном стратегических направлениях, где продолжается проникновение извне и враждебные провокации, существует острая необходимость в укреплении пограничных укреплений, расширении разведывательной инфраструктуры и модернизации тяжелых огневых систем."
 china.383.a: "Одобрено!"
 china.383.b: "Нам необходимо дальнейшее обсуждение этого вопроса."
 china.384.t: "Высшее Командование ВМС Запрашивает Дополнительное Финансировании"
 china.384.d: "Мы находимся в середине исторического перехода - от суши к морю, от прибрежной обороны к синим глубинам. Океан - это не только стратегический буфер, но и жизненно важная артерия национального подъема. Сегодня, когда напряженность в западной части Тихого океана усиливается, а морские маршруты сталкиваются с растущими нарушениями, роль ВМС как опоры национальной стратегии никогда не была столь заметной.\n\nНедавно несколько старших командиров ВМС совместно представили центральному руководству срочный запрос на финансирование. В запросе указывается на острую нехватку средств в таких ключевых областях, как дальнее развертывание, поддержка островных аванпостов, техническое обслуживание флота и эксплуатация авианосцев. Многочисленные проекты капитального ремонта кораблей были отложены из-за замораживания бюджета, а темпы строительства боевых кораблей нового поколения значительно отстают от ожидаемых. Тем временем соседние страны ускоряют наращивание своих морских сил, оказывая все большее давление на наши войска."
 china.384.a: "Одобрено!"
 china.384.b: "Нам необходимо дальнейшее обсуждение этого вопроса."
 china.385.t: "Высшее Командование ВВС Запрашивает Финансирование"
 china.385.d: "Точность и скорость в современной войне все больше зависят от господства в небесных войнах - контроль над воздухом стал одним из самых решающих факторов в обеспечении национальной безопасности. Недавно центральному правительству был представлен подробный отчет Верховного командования ВВС с официальной просьбой о выделении дополнительного финансирования.\n\nСогласно отчету, был выявлен ряд критических недостатков, особенно в таких областях, как операции на больших расстояниях в открытом море и совместная координация на операционных театрах. Среди конкретных проблем можно отметить ограниченные возможности для масштабного развертывания современных самолетов системы предупреждения и управления воздушным пространством (AWACS) и самолетов радиоэлектронной борьбы (EW), а также эскадрильи воздушной дозаправки и силы быстрого реагирования, которые до сих пор действуют без интегрированной, структурированной системы. Кроме того, недостаточный бюджет ограничивает возможности ВВС по использованию современных летных тренажеров и увеличению численности наземного технического персонала, что необходимо для поддержания высокого уровня подготовки пилотов и обеспечения постоянной боеготовности самолетов."
 china.385.a: "Одобрено!"
 china.385.b: "Нам необходимо дальнейшее обсуждение этого вопроса."
 china.386.t: "Смена Руководства Синьцзяна"
 china.386.d: "Недавно, согласно решениям центральных властей, бывший губернатор провинции Гуандун Ма Синьруй сменит члена Центрального политбюро Чэнь Цюаньго на посту нового секретаря парткома Синьцзян-Уйгурского автономного района, а также первого политического комиссара и первого секретаря Синьцзянского производственно-строительного корпуса. Во время приветственной встречи Чэнь вместе с представителями Центрального организационного управления представил Ма синьцзянским чиновникам и призвал их продолжать работу под новым руководством, стремясь к еще большим успехам. Тем временем Чэнь вернется в Пекин, где, как было объявлено, он получит "другое назначение"\n\nЭта смена руководства в Синьцзяне, произошедшая накануне 20-го Национального съезда Коммунистической партии, привлекла к себе большое внимание. Ожидается, что Ма, как нового лидера Синьцзяна, изберут в недавно сформированное Политбюро, что поставит его в ряд самых влиятельных фигур Китая. Также широко распространен интерес к тому, изменит ли этот аэрокосмический инженер-технократ противоречивую и жесткую политику своего предшественника. На эти вопросы предстоит ответить в будущем."
 china.386.a: "Новое руководство, новое направление."
 china.387.t: "Смена Руководства Тибета"
 china.387.d: "Недавно, согласно решениям центральных властей, Ван Цзюньчжэн, бывший заместитель секретаря парткома Синьцзян-Уйгурского автономного района и секретарь Комиссии по политическим и правовым вопросам, сменит У Инцзе на посту нового секретаря парткома Тибетского автономного района. Во время встречи по передаче полномочий У вместе с представителями Центрального организационного управления представил Ванга тибетским чиновникам и призвал их продолжать работу под новым руководством, стремясь к новым достижениям. У Инцзе, в силу своего возраста, отойдет от дел и, как ожидается, займет более свободную роль в ВНСП или НПКСК.\n\nЗамена высшего руководителя Тибета также является частью значительных кадровых перестановок в преддверии 20-го Национального съезда КПК. Ванг, имеющий большой опыт работы в приграничных регионах и тесно связанный с "железным управлением" Синьцзяна, которое привело к санкциям со стороны Европейского парламента, теперь столкнется с задачей продолжить политическое наследие, оставленное коренным тибетцем У. Как Ванг справится с этой задачей, еще предстоит выяснить."
 china.387.a: "Новое руководство, новое направление."
 china.388.t: "Смена Руководства Внутренней Монголии"
 china.388.d: "Недавно, согласно решениям центральных властей, Сунь Шаочэн, бывший министр по делам ветеранов Госсовета, сменит Ши Тайфэна на посту секретаря парткома автономного района Внутренняя Монголия. Во время встречи по передаче полномочий Ши вместе с представителями Центрального организационного отдела представил Суня чиновникам Внутренней Монголии и призвал их продолжать работу под новым руководством, стремясь к новым достижениям. Ши Тайфэн перейдет на работу в Китайскую академию общественных наук, где будет занимать должность президента и партийного секретаря.\n\nСмена высшего руководства Внутренней Монголии также является частью значительных кадровых перестановок в преддверии 20-го Национального съезда КПК. Как опытный технократ, занимавший различные должности, Сунь теперь вступает в должность во Внутренней Монголии, которая подверглась реорганизации после решительных мер Ши по борьбе с коррупцией и усилий по искоренению сепаратистской идеологии. Как Сунь будет использовать свои навыки для управления Внутренней Монголией - вопрос будущего."
 china.388.a: "Новое руководство, новое направление."
 china.389.t: "Смена Руководства Нинся"
 china.389.d: "Недавно, согласно решениям центральных властей, Лян Яншунь, бывший исполнительный заместитель секретаря Рабочего комитета центральных и государственных органов, сменит Чэнь Жунъэр на посту секретаря парткома Нинся-Хуэйского автономного района. Во время встречи по передаче полномочий Чэнь вместе с представителями Центрального организационного отдела представил Ляна чиновникам Нинся и призвал их продолжать работу под новым руководством, стремясь к новым достижениям. В силу своего возраста Чэнь Жуньэр отойдет от дел и, как ожидается, займет более свободную роль в ВНСП или НПКСК.\n\nЗамена высшего руководителя Нинся также является частью значительных кадровых перестановок в преддверии 20-го Национального съезда КПК. Лян, которого рассматривают как представителя местных чиновников из идеологического и научно-исследовательского отделов партии, имеет многолетний опыт работы в организационных кадрах и пропагандистской деятельности. Позволит ли его обширный опыт плавно сменить Чэнь Жунъэр и эффективно управлять Нинся, известной как "северная Цзяннань", пока неясно."
 china.389.a: "Новое руководство, новое направление."
 china.390.t: "Смена Руководства в Гуанси"
 china.390.d: "Недавно по решению центральных властей Лю Нин, бывший губернатор провинции Ляонин, сменит Лу Синьшэ на посту секретаря парткома Гуанси-Чжуанского автономного района. Во время встречи по передаче полномочий Лу вместе с представителями Центрального организационного управления представил Лю чиновникам Гуанси и призвал их продолжать работу под новым руководством, стремясь к новым достижениям. Лу Синьшэ, в силу своего возраста, отойдет от дел и, как ожидается, займет более свободную роль в ВНСП или НПКСК.\n\nСмена высшего руководства Гуанси также является частью широко освещаемых кадровых перестановок в преддверии 20-го Национального съезда КПК. Лю Нин, широко известный в партии как эксперт в области сохранения водных ресурсов, участвовал в реализации нескольких крупных водных проектов, включая проект переброски воды с юга на север. Он также руководил выполнением таких неотложных задач, как помощь при землетрясениях, борьба с наводнениями и засухой. Как Лю применит свой опыт в управлении этим богатым водными ресурсами автономным районом юго-западных меньшинств, пока неизвестно."
 china.390.a: "Новое руководство, новое направление."
 china.391.t: "Объявлены Результаты Выборов в Гонконге"
 china.391.d: "Завершились долгожданные выборы шестого главы администрации Специального административного района Гонконг. После потрясений 2019 года и начала пандемии Ковид-19 в 2020 году эти выборы были на редкость спокойными, с единственным зарегистрированным кандидатом - бывшим главой администрации Джоном Ли, который победил без особых волнений. Избрание Ли, ставшего первым с 1997 года главой администрации, представляющим дисциплинированные службы, знаменует собой начало новой эры для Гонконга. Сторонники истеблишмента, которые хвалят Ли за его опыт работы в полиции, считают, что он сможет залечить социальные раны Гонконга. Однако другие опасаются, что это означает начало эры авторитарной политики, которая неизбежно приведет Гонконг к однопартийной системе правления материкового Китая.\n\nВ ходе своей предвыборной кампании Джон Ли делал упор на прагматические лозунги, обещая быстро вывести Гонконг из экономического спада и восстановить его связь с мировой экономикой. Власти материкового Китая через Государственный совет и Управление по связям также выразили полную поддержку его деятельности. Сможет ли Ли выполнить свои обещания в условиях нарастающего глобального хаоса и под пристальным вниманием скептически настроенных и недоверчивых наблюдателей, пока неизвестно."
 china.391.a: "Привет новому главе!"
 china.392.t: "Новая Реальность"
 china.392.d: "Чжао Цидун стоял на последнем этаже общежития, облокотившись на перила, и курил. Огонь сигареты вспыхивал и гас, отражая далекие городские огни - уже не яркие, а разрозненные пятна тускло-желтого цвета.\n\nВдали виднелись бронемашины, выстроившиеся на импровизированном складе, их металлические корпуса тускло отсвечивали под ночным небом. Дальше медленно вращались зенитные радары. На эстакадах были установлены новые контрольно-пропускные пункты, где бетонные стены, колючая проволока и гнезда тяжелых пулеметов пересекали город, разделяя его на зоны жесткого контроля. Открытые площадки были изрыты глубокими ямами, заполненными тяжелыми бомбоубежищами, а вдоль дорог входы в подземные туннели - некоторые плохо замаскированные - пропускали холодный бледный свет через узкие щели.\n\nЧжао Цидун вспомнил 2017 год, когда он еще развозил еду по городу. Тогда даже в девять вечера на улицах все еще горел свет, пробки забивали все перекрестки, пешеходы сновали туда-сюда, шумные и полные жизни. Даже зимними вечерами люди выстраивались в очереди на углах улиц в ожидании миски горячего супа с лапшой. Теперь все это исчезло. Продуктовые ларьки были убраны, магазины закрыты, улицы расширены - и опустели. Крики ночных рынков сменились шагами патрульных и тихим гулом радаров. Те, кто когда-то процветал в этом шуме, либо уехали, либо стали призываться в ополчение.\n\nСлишком долго длились мирные дни, и слишком много времени было потрачено впустую. Когда-то они верили, что так будет продолжаться вечно. Но реальность не дает второго шанса. Нация должна была выжить, и город должен был измениться вместе с ней. Пекин дюйм за дюймом превращался в крепость. Каждая улица, каждый квартал, каждый участок земли имели свое предназначение. Здесь не было свободных углов. Не было свободных людей. Все - включая его самого - стало частью города, как и бетонные стены и туннели для бомбоубежищ."
 china.392.a: "Куда бы ни подул ветер, он следовал за ним."
 china.393.t: "Завершение Строительства Пирамиды НОА"
 china.393.d: "Он сидел в военном автобусе, выехавшем на Третью кольцевую дорогу Пекина. За окном было раннее утро. Улицы были широкими и пустыми, лишь изредка мимо проносились машины. Он проработал в разведывательном бюро Объединенного штаба шесть лет. Старый офис находился недалеко от Западной Чанъань-авеню - одно из тех серых, стареющих правительственных зданий с вооруженной охраной у входа и вечно задернутыми жалюзи за толстым стеклом. Когда-то ему казалось, что это самый дальний рубеж власти - пока не начался проект пирамид "Вечной столицы". К югу от Гаоцзяпо, который местные жители издавна называли "пустошью", когда-то была ровная, открытая земля. Каждую весну здесь росла дикая трава высотой по пояс. Теперь же ее полностью сравняли с землей, превратив в зону ядра, окруженную военными машинами, строительной техникой, высокими стенами и глубокими траншеями.\n\nКогда автобус выехал из города, он увидел вдалеке верхушку строения. Сначала он подумал, что это гора. Но чем ближе они подъезжали, тем яснее становилось: у этой "горы" не было естественных изгибов. Она была острой, холодной и жесткой - словно монолит, высеченный прямо из земли. Только выйдя из автобуса, он полностью осознал ее масштаб. Он был пирамидообразным, но гораздо более колоссальным, чем любая пирамида, воображаемая человечеством. На ее серой бетонной оболочке не было ни единого украшения, только узкие черные прорези - как окна, хотя за ними ничего не было видно, - спускавшиеся ярусами от вершины к основанию. Они напоминали что-то из бункера, а пулеметные стволы тянулись в бесконечность.\n\nКто-то впереди произносил громкую приветственную речь. Он не слышал ни слова. Он просто смотрел вверх. Небо было полностью светлым, но здание дробило солнечный свет, пропуская его сквозь щели так, что он падал осколками - словно даже дневной свет нужно было просеивать, прежде чем он достигнет земли. Стоя в этой тени, он ощущал тишину, которую не мог описать. Это был не страх. Это было нечто более глубокое - покорность, которой он не мог противостоять. До этого строения он был никем.\n\nОн вспомнил, как много лет назад смотрел фильм "Бегущий по Лезвию" - эти возвышающиеся здания, дождь, падающий сверху, голографические рекламы, плывущие в ночи. Но здесь не было дождя. Неона. Никакой рекламы. Только массивный, безмолвный объект, стоящий неподвижно. Он стоял среди толпы и смотрел мимо голов перед собой на вход в пирамиду. Внутри было бесчисленное множество людей, бесчисленные экраны, бесчисленные команды, но ни одного знакомого лица."
 china.393.a: "Мировой Город"
 china.394.t: "Национальный Траур"
 china.394.d: "Шел дождь.\n\nВ Ханчжоу дождь падал как нитки - мелкий, ровный, но далеко не ласковый. Ву Циань стоял перед могильным камнем, его форма наполовину промокла, грязь забрызгала манжеты брюк, но ему было все равно. Он держал в руках мешочек с деньгами духа и присел возле небольшого костра. Он не стал сразу зажигать огонь - просто смотрел на него, словно колеблясь или ожидая кого-то, кто никогда не вернется.\n\nОн вспомнил ночь перед отправкой. Кси ухмылялся в общежитии, хвастаясь, что если они выиграют эту войну, то его родители наконец-то будут высоко держать голову в деревне и не будут больше смотреть на других свысока. Но он и представить себе не мог, что человек, сказавший эти слова, будет разнесен на части вторым снарядом с обратного склона - убит при попытке спасти кого-то еще.\n\nОгонь оживал, ветер заставлял пламя шипеть и потрескивать. Ву Циан наблюдал, как оно медленно пожирает бумажные деньги, а вместе с ними и его воспоминания. Он помнил, как снова и снова слышал в части: "Наша армия еще никогда не была такой сильной," помнил, как люди в костюмах на пресс-брифингах заявляли: "Победа несомненна." И он верил в это. Они все верили в это. Они думали, что если эти люди держат штурвал, то они должны знать, в какую сторону дует ветер.\n\nНо в итоге победы не было - только смерть. А те, кто отдавал приказы? Все еще стоят на сцене и говорят о "необходимых жертвах" и "временных неудачах." Тем временем так называемые цивилизованные страны смеялись и произносили тосты над их трупами, как будто, по их мнению, китайцы должны были умереть на коленях - и быть прославленными за такую смерть.\n\nВу Циань опустил взгляд и достал фотографию. Он налил в огонь ликер, затем бросил фотографию и пачку сигарет. Огонь взревел, словно желая сжечь весь стыд и боль прошлого. Он постоял еще немного, потом повернулся и пошел прочь. Позади него огонь сожрал последнее тепло, которое у него осталось, вместе с именем Се Юфэя, человека, который когда-то хотел лишь принести честь своей семье, а теперь был погребен под холодным дождем."
 china.394.a: "Месть народа никогда не будет забыта."
 china.395.t: "Новая Политика, Новое Будущее"
 china.395.d: "Чжао Чжихань отнесла поднос с обедом и устроилась у окна. Напротив нее сидел Ли Сицзин, ее самый знакомый сосед по парте. Никто из них не стал есть сразу. Чжао понизила голос и поделилась тем, что услышала в тот день.\n\n"В этом году изменили программу военной подготовки. На утреннем собрании классным руководителям сообщили об этом." Ли Сицзин уставилась на еду, но потом подняла глаза. "Как изменили?"\n\nЧжао огляделась по сторонам, чтобы убедиться, что никто не обращает на неё внимания, а затем сказала еще тише: "Они переходят на реальные стандарты активной службы. Тренировки будут проходить до позднего вечера. Некоторые занятия будут заменены первой помощью, основами инженерного дела и разборкой оружия\n\nЛи Сицзин нахмурилась. "Серьезно? Мы же не солдаты. Зачем нам учить эту ерунду?"\nЧжао ничего не ответила, только продолжила: "Третьекурсники будут дополнительно заниматься стрельбой и выживанием в полевых условиях. Летние каникулы мы проведем в загородных военных округах. А когда мы вернемся, будут проводиться городские учения по мобилизации на случай чрезвычайных ситуаций, и они пойдут нам в зачет. Серьезно, о чем думают эти люди? Неужели они думают, что мы теперь герои боевиков?"\n\nЛи Сицзин молча ела, ничего не говоря. Чжао взяла кусок капусты и проглотила его. Голос ее был ровным: "Кажется, они также сказали, что после окончания школы всех автоматически зачисляют в резерв. Больше никаких добровольцев. И если ты хочешь поступить в колледж, то должен сначала отслужить год. Это безумие. Ли Сицзин откусила палочку, а через некоторое время пробормотала: "Так... будут ли еще студенческие волонтерские программы? Как раньше, когда студентов отправляли преподавать в сельские школы?"\n\nЧжао на секунду задумалась. "Думаю, с этого момента волонтерство означает обучение их метанию гранат и строительству бункеров.""
 china.395.a: "И как только она это сказала, даже ей пришлось немного посмеяться над тем, как абсурдно это прозвучало.."
 china.396.t: "Резолюция по Некоторым Внутрипартийным Вопросам"
 china.396.d: "Центральный комитет Коммунистической партии Китая недавно опубликовал важный политический документ под названием "Резолюция по некоторым внутрипартийным вопросам." Полный текст документа был подготовлен основной руководящей группой партии и принят на специальном заседании Политбюро.\n\nСогласно источникам, в резолюции подчеркивается, что фракционность и сепаратистская деятельность стали величайшей угрозой для единства и стабильности как партии, так и нации, представляя собой серьезное предательство интересов народа. Он осуждает так называемую "ультралевую либеральную фракцию" в партии, которая, прикрываясь идеологической чистотой, на самом деле преследует раскол и личную выгоду. Эти группы интересов игнорируют широкие национальные интересы, открыто пренебрегают авторитетом Центрального комитета в момент национальной опасности и стремятся подорвать централизованное руководство партии, что является вопиющим актом политического предательства.\n\nВ документе также подчеркивается необходимость не допустить слияния фракционных интересов с местным протекционизмом, бюрократической замкнутостью и военно-гражданской фрагментацией власти. Он призывает к ликвидации внутрипартийных властных клитик и искоренению личных амбиций и групповой преданности, нарушающих командную структуру и идеологическое единство Центрального комитета.\n\nРезолюция вызвала бурную реакцию в СМИ, научных кругах и внутри партийного аппарата. Государственные издания быстро опубликовали комментарии, в которых восхваляли документ за "восстановление ясности и укрепление единства." Между тем многие зарубежные наблюдатели выразили обеспокоенность, расценив этот шаг как признак дальнейшей политической консолидации и милитаризации общества. Тем не менее, от центральных министерств до низовых партийных комитетов, подавляющее большинство ответило поддержкой и повиновением. Учитывая нынешнюю сложную внутреннюю и внешнюю ситуацию и общенациональную мобилизационную позицию, эта резолюция способна стать основополагающей директивой для будущего политического выравнивания и организационной реструктуризации."
 china.396.a: "Тесное объединение под руководством председателя Ли Цзочэна!"
 china.397.t: "Дни Поступления на Службу"
 china.397.d: "В тот день, когда Сюй Цзи'нан, второй сын семьи Сюй, ушел в отставку из армии, он был одет в старую камуфляжную форму и нес свой багаж. Он сел на окружной автобус, сделал одну пересадку, затем прошел еще два ли по горной дороге, после чего вернулся в крошечную деревню в уезде Лэй - давно забытую на краях любой карты. На зерносушильном дворе у входа в деревню было пустынно, даже кур нигде не было видно.\n\nОн вошел во двор и увидел, что его бабушка сидит перед печкой и перебирает дрова, кожа на ее руках сморщена, как старая кора. Услышав чьи-то шаги, ее руки задрожали. Она обернулась и не сразу узнала его. "Бабушка, а где мой третий брат?" Бабушка замолчала, а потом медленно заговорила: "Его давно нет дома. Ничего особенного не сказал, только то, что направляется в город Байсе, чтобы найти работу. Но позже приходил кто-то из военного ведомства. Сказал, что он прошел медосмотр. Его сразу отправили на обучение."\n\n"Призыв?" Сюй Чжи'нан нахмурился. "В тот год ему было всего семнадцать лет."\n\n"В тот год из деревни забрали восемь мальчиков. И еще больше в последующие годы. Капля за каплей... никто из них не вернулся."\n\n"Они все пошли в армию?"\n\n"Некоторые шли добровольно. Некоторых забрали." Старушка вздохнула. "Когда приехали военные грузовики, вся деревня вышла посмотреть. Думали, что они приехали чинить дорогу. Но вышли несколько человек в камуфляже, сказали: 'Вы нужны народу,' и просто забрали их."\n\n"А что теперь с деревней?"\n\n"Кто мог остаться?" сказала она, продолжая возиться с дровами. "Сходи к старосте деревни. Там есть несколько стариков, которые все еще опираются на мотыги, чтобы ухаживать за полями. Урожай еще нужно доставить - нет работы, нет пайка. Но в какой семье хоть кто-то остался? Все уехали с грузовиками.""
 china.397.a: ""Интересно, как они поживают в эти дни...""
 china.398.t: "Новый Чэнду"
 china.398.d: "Утренний туман окутывал срединную часть горы Эмэй, скрывая давно заброшенные заводы и железнодорожные пути в огромном белом полотне. Линь Сяо, инженер-строитель, назначенный генеральным подрядчиком, был переведен в эту проектную зону меньше недели назад. К моменту его прибытия строительство уже началось. Вместе с рабочими здесь трудились специалисты и инженерные подразделения, направленные из крупнейших университетов страны, а также группа ученых из центрального научно-исследовательского института.\n\nПоначалу Линь Сяо имел лишь смутное представление о проекте, пока впервые не встал перед доской генерального проекта. Тогда он понял, что это проект, не похожий ни на один другой: огромный подземный городской комплекс под кодовым названием "Третий Новый Чэнду," предназначенный для выживания, военного производства, медицинской инфраструктуры и научных исследований в условиях постъядерного обмена. В обязанности Линь Сяо входила система поддержки центральной структурной оси. Каждый день он во главе своей команды отправлялся в туннели, чтобы проверить качество заливки бетона и допуски на заделку стальных балок.\n\nИнженерный лагерь располагался вдоль склона горы - ряды белых сборных домов, аккуратно расставленных, каждая комната оборудована обогревателем и занавешенными душевыми с горячей водой. Питание подавалось по расписанию, а медицинский пункт был полностью укомплектован. После ужина Линь Сяо часто сидел на краю рабочей зоны, глядя на светящийся вдали вход в туннель и погружаясь в раздумья.\n\nПроходили дни, а строительство продолжалось, все глубже погружаясь в сердцевину горы. Жизнь Линь Сяо была заполнена от края до края заданиями, но он ни разу не почувствовал удушья. Пока он оставался здесь, он стоял перед своими чертежами и строил город."
 china.398.a: "Готовьтесь к войне, готовьтесь к голоду, служите людям."
 china.399.t: "Образцовый Солдат"
 china.399.d: "Газета PLA Daily пестрит репортажами и фотографиями о нем; фильмы с его героическими выступлениями на учениях распространяются по зонам боевых действий, армейским группам и ротам, чтобы миллионы солдат могли смотреть и учиться у него. От CCTV до Dragon TV, бесчисленные документальные фильмы сосредоточены вокруг него. Полковники и генералы тепло обнимают его, похлопывая по спине, как родного. Простые люди из всех слоев общества поднимают ему большой палец вверх, говоря: "Ты действительно мужчина!" как будто они действительно понимают его...\n\nСюй Цзикан стоял за дверью, одетый в свою безупречную новую форму. С той стороны до него доносились разговоры репортеров и смех старших офицеров. Он думал отдохнуть, но стоило ему закрыть глаза, как воспоминания нахлынули, как приливная волна: грязные, залитые водой тренировочные площадки; темное небо, разрываемое громом и вспышками молний; свирепые лица инструкторов и безжалостные кулаки и пинки; тихие всхлипы в общежитии поздно ночью.\n\nЧтобы не поддаться этим воспоминаниям, он заставлял себя оставаться начеку. Он не был лишен эмоций, но его интровертная, невыразительная натура не позволяла ему показать, что он чувствует. Однако именно эта черта делала его идеальным солдатом в глазах военных: тихая, неутомимая рабочая лошадка.\n\nДаже когда ему давали самые суровые задания за самые маленькие деньги, даже когда инструкторы ломали ему ребра или унижали ветераны, он терпел все это. И несмотря ни на что, он по-прежнему творил чудеса на тренировках и учениях. Его гранаты всегда летели дальше всех. Его меткость была непревзойденной. Его укрепления были самыми прочными. Награды, которые он получал за свое подразделение, всегда были самыми многочисленными.\n\nКто бы не восхищался таким солдатом? Какой полководец или национальный лидер не мечтал бы об армии, полной таких людей,\n\nКонечно, дверь открылась с громким "бах", и от ослепительного света у Джиканга чуть не выступили слезы на глазах. Среди ослепительных вспышек фотоаппаратов из толпы вышел улыбающийся главнокомандующий, на его плечах сверкали золотые звезды. Как и всякий начальник, он улыбался, прикрепляя медаль к груди Джиканга, тепло пожимая ему руку, похлопывая по спине и произнося неизменные слова похвалы."
 china.399.a: ""Ты наша гордость.""
 china.400.t: "Питательная Среда Реформ"
 china.400.d: ""Новый семестр начался, и я рад видеть вас снова." Постепенно класс затих, и все взгляды обратились к трибуне. "Сегодня, на первом уроке семестра, я хочу поговорить с вами о демократии."\n\n"Давайте откроем учебники на странице 12 и посмотрим на этот отрывок: "Демократия - это политическая система, в которой народ участвует и принимает решения. Ее суть заключается в "народном суверенитете", то есть власть государства исходит от народа, а правительство существует для того, чтобы лучше служить и представлять интересы народа. В демократической системе каждый гражданин имеет право критиковать правительство и предлагать ему свою политику, что способствует развитию разнообразного общественного дискурса, побуждающего правительство совершенствовать свое управление и обеспечивать социальную честность и справедливость."\n\nУчитель сделал паузу, посмотрел на учеников и спросил: "Знаете ли вы, что такое настоящая демократия?"\n\nВ аудитории воцарилась тишина. Для студентов учебники никогда не были глубокой темой. Часто учителя не спрашивали их мнения, а просто излагали то, что будет на экзаменах. И вот теперь, когда старый учитель спросил, никто из них не смог ответить.\n\n"Демократия - это не просто система, а образ жизни, набор ценностей. Она означает уважение, терпимость, равенство и свободу. Она означает, что каждый имеет право добиваться своего счастья и что каждый обязан считаться с другими людьми."\n\nОдин ученик поднял руку и спросил: "Учитель, что было бы, если бы семья, как и страна, исповедовала демократию?""
 china.400.a: "На мгновение он остолбенел, а затем разразился хохотом."
 china.401.t: "Зима Превращается в Весну"
 china.401.d: "Два года назад Лю Чжэнфэн был известным журналистом, который смело выступал с критикой социальной несправедливости. Написанная им статья, разоблачающая коррупцию в местных органах власти, принесла ему широкую известность и стала катастрофой, которая едва не погубила его. Его аккаунт на Weibo был навсегда заблокирован, статья удалена, а сам Лю словно исчез из интернета, как будто его и не было. Он подумывал подать апелляцию, сопротивляться, но перед лицом мощного механизма власти Лю чувствовал себя как насекомое, попавшее в паутину, - чем больше он боролся, тем глубже погружался в отчаяние.\n\nДо сегодняшнего дня Лю обнаружил, что его аккаунт в Weibo неожиданно разблокирован. Никакого уведомления, никаких объяснений - как и в случае с забаниванием, это произошло внезапно и окутано тайной. Лю не знал, что это значит. Должен ли он быть благодарен? Или они подстроили так, чтобы он снова совершил ту же ошибку? После долгих колебаний он наконец набрался смелости и вошел в систему. Знакомый интерфейс теперь излучал странное чувство отрешенности, как будто принадлежал другой жизни. Его последователей было мало, а все прежние следы были стерты, оставив лишь пустоту.\n\nОн открыл редактор сообщений. Его пальцы зависли над клавиатурой, но он не мог заставить себя набрать текст. После долгих раздумий он наконец начал стучать по клавишам. Его невысказанные мысли медленно выкристаллизовывались в слова: "Ночь подарила мне темные глаза...""
 china.401.a: ""Но я использую их, чтобы искать свет.""
 china.402.t: "Раскованный"
 china.402.d: "Чжун Чонгтао окинул взглядом конференц-зал. На протяжении многих лет он ловко лавировал между политическим и деловым миром, сплетая сложную паутину связей. Делегат Народного собрания был лишь одним из важных узлов в этой сети, а ежегодные заседания Постоянного комитета ПК Дунгуаня казались скорее формальностью. Все всегда было решено задолго до официальных обсуждений. Однако в нынешнем заседании было что-то необычное. По диагонали за Чжуном сидел недавно избранный молодой представитель - Цзян Шиюань. Его идеализм резко контрастировал с усталым выражением лиц пожилых делегатов в зале.\n\nЗаседание перешло к сегменту голосования. Ведущий на трибуне зачитал предложение:\n\n"...относительно оптимизации постановления о деловой среде Дунгуаня..."\n\n"Все, кто за, пожалуйста, поднимите руку."\n\nЗвук поднятых в унисон рук эхом разнесся по залу. Несмотря на то, что предложение было принято единогласно, Чжун, владевший фабрикой, знал, что такая политика приведет лишь к снижению его прибыли. Тем не менее, для видимости он неохотно поднял руку. Оглянувшись, он заметил, что Цзян Шиюань хмурится над документом, а его пальцы слегка постукивают по столу, словно в глубокой задумчивости.\n\n"Все, кто против, пожалуйста, поднимите руку."\n\nТишина.\n\nЗатем, медленно, Цзян поднял правую руку. В зале воцарился хаос. Шок, растерянность, презрение и любопытство смешались во взглядах, направленных на Цзяна.\n\nЧжун сначала опешил, но затем в нем проснулось чувство удовлетворения."
 china.402.a: "Похоже, нам придется пройти через все это снова."
 china.403.t: "Первое Голосование"
 china.403.d: "Цзоу Юбин шел по переполненному людьми тротуару. Сегодня в городе Тайюань проходили выборы мэра. Лозунги на улицах и агитационные сообщения, звучащие из динамиков, постоянно напоминали о значимости этого дня, но для Цзоу все это не имело значения. Он хотел лишь добраться до ближайшего избирательного участка, завершить то, что считал бессмысленным ритуалом, а затем отправиться домой, чтобы насладиться лапшой, которую приготовит его жена.\n\nОстановившись на перекрестке, он бесцельно огляделся. На другой стороне улицы группа пожилых добровольцев в красных жилетах охотно раздавала прохожим листовки.\n\nКогда загорелся зеленый свет, Цзоу быстро пересек улицу и подошел к входу в свой жилой район, где был оборудован импровизированный избирательный участок. Под небольшим тентом стояло несколько бессистемных столов с урнами для голосования и бюллетенями. За столами сидели несколько сотрудников, их скука была ощутима.\n\nЦзоу подошел к палатке, достал из кармана свое удостоверение личности и протянул его одному из работников. Работник едва взглянул на него, а затем спросил, даже не поднимая глаз: "За кого проголосуете?"\n\nЦзоу взял бюллетень и взглянул на имена кандидатов - лица, которых он никогда раньше не видел. Помимо имен и кратких резюме, здесь также был список основных направлений политики, что было новым дополнением по сравнению с прошлыми выборами. По рассеянности он поставил галочку напротив случайного имени, затем опустил бюллетень в урну и повернулся, чтобы уйти. Когда он вышел из избирательного участка, Цзоу глубоко выдохнул, почувствовав, что с его плеч свалился груз. Он посмотрел на серое небо, размышляя про себя. Неважно, кто победил; эти чиновники, кем бы они ни были, служили только своим интересам. Почему кого-то из них волнует жизнь простых людей?\n\nПодумав об этом, Цзоу ускорил шаг и направился домой."
 china.403.a: "Похоже, большинство до сих пор не поняли сути демократии."
 china.404.t: "Оттепель в СМИ"
 china.404.d: "В мужском общежитии Хэнаньского технологического университета Чэнь Фанвэй внезапно сел в кровати, протирая заспанные глаза. Комната была пуста, а яркий солнечный свет напоминал о том, что уже поздно.\n\n"Черт, опять проспал!" - пробормотал он, быстро схватив телефон. Было 11:38. Он вспомнил, что утром у него занятия по морали и праву.\n\n"Неважно, все равно занятия профессора скучные", - пожал он плечами, пытаясь успокоить себя. Открыв видеоприложение, чтобы расслабиться и посмотреть несколько роликов, он тут же замер.\n\nОбычные рекомендации сегодня были другими - в его ленте появились видео от авторов, заблокированных в Китае. Контент, который обычно можно найти только на таких платформах, как YouTube, вдруг стал доступен.\n\nТогда он увидел знакомое лицо - Ван Чжиан, журналиста, которого он всегда смотрел на YouTube. Чэнь Фанвэй задохнулся, его мысли заметались."
 china.404.a: ""Я еще в Китае?""
 china.405.t: "Обратно в 1989"
 china.405.d: "Пекин, парк Чжуншань. Бдение при свечах перенесло людей в 1989 год. Члены движения "Матери Тяньаньмэня", которые долгое время находились под строгим наблюдением и которым было запрещено заниматься общественной деятельностью, появились вновь. Они провели первую за тридцать лет акцию памяти жертв инцидента Четвертого июня в самом сердце Китая, в двух шагах от Запретного города и в двух шагах от проспекта Чанъань, где когда-то громыхали танки. Давно пропавший без вести бывший профессор Дин Цзылинь выступила с речью, назвав этот вечер знаковым и выразив уверенность в том, что в будущем Китай добьется большего прогресса в признании жертв 1989 года.\n\nБез молчаливого согласия правительства движение не смогло бы провести такое мероприятие. Хотя официальные газеты, новостные каналы и социальные сети хранили молчание, видео с бдением при свечах быстро распространилось благодаря записям, сделанным гражданами, и вызвало большой общественный резонанс. Разные люди высказывали свое мнение; самопровозглашенные "патриотические" СМИ жестко критиковали мероприятие, называя его идеологическим "саморазрушением". Однако большая часть простых людей выразила терпимую и осторожную поддержку. Со времен потрясений 1989 года прошло достаточно времени, чтобы выросло несколько поколений, и многие считают, что вместо того, чтобы продолжать избегать этой темы, лучше открыто обратиться к ней, что может стать лучшим способом разрешить исторические обиды."
 china.405.a: "Кстати говоря, где сейчас находится тот Человек у Танка?"
 china.406.t: "Надвигающийся Правительственный Коллапс"
 china.406.d: "Отчет об оценке текущего состояния административной эффективности Пекина:\n\nПоследние расследования указывают на значительные проблемы с эффективностью административной системы Пекина. Обязанности ведомств сильно дублируются, что приводит к фрагментарному надзору и частому перекладыванию ответственности. Даже для получения простых разрешений может потребоваться перемещение между несколькими ведомствами. В среднем средний проект должен пройти проверку более чем в семи ведомствах, что занимает от трех до шести месяцев.\n\nНесмотря на большой штат сотрудников, существует нехватка квалифицированных кадров для выполнения основных задач. Опросы показывают, что более 30 % сотрудников передовых подразделений нуждаются в повышении квалификации. Излишняя энергия уходит на внутренние совещания и документооборот, что не позволяет уделять достаточное внимание непосредственному обслуживанию населения. Поток информации между различными уровнями неэффективен, инструкции могут быть искажены или неправильно истолкованы, поскольку проходят через множество уровней.\n\nЕсли переезд административных отделов не будет осуществлен своевременно, это не только замедлит строительство в Новом районе Сионган, но и усугубит снижение эффективности административного управления Пекина, создав порочный круг: растущее давление на город снижает эффективность, а низкая эффективность, в свою очередь, тормозит процесс переезда. Когда такая ситуация укоренится, она будет препятствовать как оптимизации столичных функций, так и более широкой стратегии интеграции Пекина и Тяньцзинь-Хэбэя, что приведет к далеко идущим негативным последствиям."
 china.406.a: "Мы должны решить этот вопрос как можно скорее..."
 china.407.t: "Новая Система, Новая Политика"
 china.407.d: "Xinhua News, Гуйян (репортер Цзян Цяолин) - В последние годы с быстрым развитием информационных технологий цифровые системы кредитной отчетности стали новым инструментом регулирования, постепенно входящим в общественную сферу. Эти системы играют все более важную роль в оказании помощи правительствам всех уровней в мониторинге данных о расходах в режиме реального времени, повышении прозрачности бюджетной системы и борьбе с коррупцией. Традиционные меры по борьбе с коррупцией часто основываются на доносительстве и проверках, которые чреваты задержками и пассивностью. В отличие от них, цифровые системы кредитной отчетности предлагают новые подходы и инструменты для борьбы с коррупцией.\n\nГород Гуйян создал общегородскую цифровую кредитную платформу, объединив данные банковских, налоговых и коммерческих департаментов, охватывающую все муниципальные правительственные учреждения и государственные предприятия. Эта платформа собирает и анализирует данные о финансовых операциях соответствующих организаций и частных лиц в режиме реального времени. При обнаружении аномальных операций система автоматически выдает предупреждения, побуждая дисциплинарные и надзорные органы к вмешательству. Помимо того, что цифровая кредитная система является мощным инструментом борьбы с коррупцией, она также является важнейшим средством повышения доверия к правительству. Правительство Гуйяна включило в платформу все данные о налоговых доходах и расходах и регулярно предоставляет эту информацию общественности. Через мобильные приложения и веб-сайты граждане могут получить доступ к информации об исполнении бюджета департамента и использовании проектных средств, добиваясь "прозрачных финансов".\n\n"Теперь общественность может ясно видеть, куда уходят государственные средства, поэтому мы, как финансовые менеджеры, должны проявлять еще большую осторожность", - сказал директор финансового бюро Гуань Лу."
 china.407.a: "Еще один шаг к прозрачному правительству."
 china.408.t: "Кибербезопасность в Новую Эру"
 china.408.d: "Southern Daily News (Репортер: Ван Чжаофу) - В последние годы, с быстрым развитием интернета, вопросы кибербезопасности становятся все более актуальными, так как часто возникают случаи мошенничества в сети и утечки личной информации, представляющие серьезную угрозу для финансовой безопасности и законных прав граждан. Чтобы эффективно обеспечить кибербезопасность и защитить личную информацию граждан, Китай активизирует инициативы по кибербезопасности и продвигает развитие цифровой кредитной системы, добиваясь заметных результатов.\n\n"Мы ежедневно боремся с различными кибератаками", - сказал Линь Синьчэнь, глава Центра данных кибербезопасности. "В последние годы мы постоянно усиливаем мониторинг и перехват таких угроз кибербезопасности, как фишинговые сайты, вредоносные программы и сетевые атаки, ежедневно блокируя миллионы вредоносных сообщений и эффективно пресекая инциденты в сфере кибербезопасности". Согласно статистике, только за первую половину этого года Национальный центр данных кибербезопасности перехватил более 100 000 фишинговых сайтов и обработал сотни тысяч инцидентов.\n\n"Благодаря приложению цифровой проверки я не попалась на удочку мошенников!" - поделилась с корреспондентом г-жа Ван из Панью, Гуанчжоу. Недавно г-же Ван поступил звонок с неизвестного номера, где абонент утверждал, что он из "Бюро общественной безопасности", и утверждал, что она замешана в деле об отмывании денег и должна перевести свои банковские средства на "безопасный счет" для проведения расследования. "Я запаниковала и почти поверила им", - вспоминает г-жа Ванг. "К счастью, я заранее скачала новое приложение для борьбы с мошенничеством, которое помогло мне сразу же повесить трубку и подключиться к 110, что спасло меня от финансовых потерь.""
 china.408.a: "А Вы скачали приложение?"
 china.409.t: "Новая Страница в Истории"
 china.409.d: "Ван Хайдун прислонился к бетонной стене, с его губ свисала сигарета Yuxi - последняя на этот месяц. Дым медленно поднимался в солнечных лучах, сливаясь с туманом, который стелился над далекими многоэтажками. Его взгляд остановился на журавлях, отбрасывающих длинные тени в утреннем свете, похожих на скелеты доисторических зверей, собирающих себя в футуристический город на этой равнине. Он вспомнил конструктивистскую архитектуру и проекты Вхутемаса, которые изучал в университетских учебниках, - те футуристические эскизы, которые когда-то завораживали его. Возможно, через несколько лет, когда посетители будут стоять на этой земле и смотреть вверх, они увидят проекты, куда более захватывающие, чем те, что были в книгах.\n\nДва дня назад он получил приглашение из своей альма-матер с просьбой вернуться и поделиться своим опытом с молодыми студентами. Он хотел рассказать им, что будущее - это не просто абстрактная идея из книг, оно строится руками каждого рабочего. Наблюдать за тем, как здание с каждым днем становится все выше, и знать, что ты сыграл свою роль в его создании, - это чувство удовлетворения, с которым не сравнится ни одна теория.\n\nЗатянувшись напоследок сигаретой, он аккуратно затушил ее об угол стены. Когда он поправлял свой выцветший защитный шлем, в его голове промелькнуло видение: годы спустя он будет стоять на вершине небоскреба со своим ребенком и смотреть на город. Он укажет на угол небоскреба и скажет: "Смотри, вон то здание - это то, которое помогал строить твой папа."\n\nК тому времени Сюнъань станет городом, который поразит весь мир, свидетельством мечты и пота сотен тысяч таких же строителей, как он."
 china.409.a: "Они - самые первые жители города и его самые обычные, но великие творцы."
 china.410.t: "Обращение Министра по Гражданским Делам"
 china.410.d: "В рамках реализации важнейших решений центрального правительства и продвижения строительства нового района Сюнъань министр по гражданским делам Тан Дэнцзе опубликовал важную подписанную статью. В ней подчеркивается, что по мере расширения функций Пекина операционные расходы государственных учреждений растут, и эффективность административного управления срочно нуждается в повышении. Согласно соответствующим статистическим данным, в настоящее время около 40% административных ресурсов расходуется на внутренние операции учреждений.\nВ ответ на это Центральный комитет провел специальное заседание для обсуждения данного вопроса, на котором некоторые члены Постоянного комитета внесли дополнительные предложения по срокам переезда. Впоследствии Си издал важную директиву, подчеркнув необходимость решительно продвигать реформы и поддерживать новый район Сюнъань в принятии на себя большей национальной ответственности.\nСогласно требованиям новой эпохи, министр Тан предложил перенести большинство основных государственных функций в Сюнъань. Сюнъань, являющийся ключевым пунктом национального стратегического плана, занимает запланированную площадь в 2000 квадратных километров и в полной мере способствует внедрению инноваций в области цифрового управления. Ожидается, что упорядочение институтов в этом районе позволит сократить административный персонал на 30 %.\nРезультаты говорят сами за себя: Достижения Сюнъань в развитии "умного города" поразительны.В этом зеленом, низкоуглеродном и модернизированном городе новая система управления призвана создать новаторскую модель рационального и эффективного управления."
 china.410.a: "Решительно поддержим инициативы по углублению реформ."
 china.411.t: "Письмо министра жилищного строительства и городского и сельского развития"
 china.411.d: "Кому: Министру Тану,\n\nЯ рассмотрел ваше предложение о переносе столицы в новый район Сюнъань в качестве средства для облегчения нынешнего административного давления Пекина. Я полностью согласен с вашими предложениями и выражаю свою твердую поддержку.\nСтроительство нового района Сюнъань - это тысячелетний замысел и дело государственной важности. Он представляет собой важное историческое и стратегическое решение, принятое Центральным комитетом партии во главе с председателем Си. Перенос столицы в Сюнъань - это ключевая мера, направленная на ослабление административного давления на Пекин, содействие скоординированному развитию региона Пекин-Тяньцзинь-Хэбэй, оптимизацию национального плана развития и создание модели высококачественного развития в новую эпоху.\nДля дальнейшего продвижения строительства нового района Сюнъань, особенно в плане финансовых инвестиций, я хотел бы предложить несколько дополнительных предложений. С момента своего основания строительство района Сюнъань придерживается принципов "глобального видения, международных стандартов, китайских особенностей и позиционирования на высоком уровне" и достигло значительного прогресса. Сформировалась базовая инфраструктура, продолжает улучшаться качество экологии, реализуются знаковые проекты, и облик нового города стремительно меняется.\nОднако, по сравнению с Пекином, Сюнъань все еще находится на ранней стадии развития. Чтобы выполнить свою историческую миссию, необходимы постоянные финансовые вложения, особенно в масштабные стратегические проекты, требующие достаточных финансовых гарантий."
 china.411.a: "Ни Хун, министр жилищного строительства и городского и сельского развития."
 china.412.t: "Церемония Завершения Строительства Сюнъаня"
 china.412.d: "Си стоял на смотровой площадке и смотрел на сверкающий, недавно построенный город. В утреннем свете башни мерцали блеском современных технологий. Всего за 20 минут до этого он тихо и быстро добрался на поезде из Пекина, наблюдая за мелькающими за окном пейзажами, и его сердце наполнилось непоколебимым чувством гордости и предвкушения.\nЭтот город вызывал у него огромные ожидания. Он до сих пор помнит, как посещал это место более десяти лет назад, когда здесь была лишь бесплодная земля. Сегодня же все преобразилось. Он осторожно положил руку на подиум, вспоминая прогулку много лет назад у озера Юйюаньтан, где его впервые посетило вдохновение построить новый район на этой самой земле. То, что тогда было лишь идеей, теперь стало реальностью.\nПеред ним сидели представители всех слоев общества, их глаза были полны надежды и предвкушения. Си глубоко вздохнул и начал свою речь: "Сегодня исторический момент. 40 лет назад Шэньчжэнь продемонстрировал миру скорость Китая. Сегодня Сюнъань продемонстрирует мудрость Китая. Это не просто город - это символ великого омоложения китайской нации. Здесь мы создадим новую модель человеческой цивилизации." Аплодисменты разразились, как приливная волна.\nОн оглядел собравшихся. Этот город воплощал в себе его многолетние чаяния: эффективная административная система, инновационная промышленная структура, низкоуглеродный и разумный городской дизайн... Все присутствующие понимали, что сегодня не просто церемония завершения строительства, а начало новой великой эры.\nСолнечный свет заливал эту землю надежды, где тысячелетнее видение уходило в прошлое. Когда Си смотрел на этот город, воплощение мечты о национальном омоложении, его взгляд был решительным и далеко идущим."
 china.412.a: "Видение тысячелетия, национальное процветание"
 china.413.t: "Отчет о Завершении Строительства Сюнъаня"
 china.413.d: "Уважаемый генеральный секретарь,\nСтроительство города Сюнъань достигло значительного прорыва. В настоящее время полностью сформирована структура "умного города", а Центр больших данных позволяет осуществлять комплексное управление всеми городскими функциями. Сюнъань стал первым в мире современным городом, внедрившим полномасштабное управление большими данными.\nПод вашим мудрым руководством Сюнъань успешно вобрал в себя 80% функций Пекина. Численность постоянного населения достигла 6 миллионов человек, причем более 30% из них составляют профессионалы в области науки и техники. Кроме того, 90% предприятий из Чжунгуаньцуня открыли в Сюнъане штаб-квартиры и научно-исследовательские центры.\nВ плане экологического развития качество воды в озере Байяньдянь сейчас самое лучшее за последние 50 лет, а площадь лесов превысила 45%. Интеллектуальная энергетическая сеть позволила сократить выбросы углекислого газа в районе на 66 % по сравнению с запланированным уровнем. Такие общественные объекты, как образование и здравоохранение, теперь имеют всеобщий охват, а индекс счастья жителей - один из самых высоких в стране.\n"Модель Сюнъань" стала эталоном инновационного городского управления. Интеграция функций департаментов с помощью платформы больших данных позволила сократить штат сотрудников на 30 %, а административные расходы - на 50 %. Этот успешный опыт сейчас распространяется по всей стране.\nЭти достижения свидетельствуют о правильности и дальновидности вашей стратегии "Видение тысячелетия"."
 china.413.a: "Чжан Гохуа, директор Комитета по управлению новым районом Сюнъань."
 china.414.t: "Отчет о Завершении Бюрократического Переезда"
 china.414.d: "Уважаемый председатель Си,\nЯ рад сообщить, что полномасштабный переезд центральных правительственных учреждений успешно завершен. После многолетней подготовки более 81% министерств и комиссий переехали в Сюнъань, а остальные ведомства завершают свой переезд. В новом административном центре принята оптимизированная модель управления, а институциональные структуры сократились на 29% по сравнению с первоначальной структурой.\nВ процессе переезда мы строго реализовали предложенные вами "четыре преобразования": переход от иерархического управления к плоскому, от разрозненных офисов к централизованным операциям, от традиционной бумажной работы к интеллектуальным офисным системам и от однофункциональных департаментов к многофункциональным. В частности, внедрение интеллектуальных офисных систем позволило удвоить эффективность согласований.\nСогласно принципу экологического приоритета, в Новом районе расположены такие культурные объекты, как академии и художественные галереи. Сад Гуаньюань на берегу Байяньдянь стал важным местом для отдыха и размышлений сотрудников. Кроме того, более 2 000 государственных предприятий и государственных учреждений обосновались в промышленных парках.\nНаряду с переездом учреждений, плавно переместились и первоначальные предприятия и персонал. Это начинание не просто физический переезд, а комплексная реформа моделей управления."
 china.414.a: "Чжэн Шаньцзе, директор Национальной комиссии по развитию и реформам"
 china.415.t: "Перенос Исторической Столицы Китая в Сюнъань"
 china.415.d: "Название: Исторический перенос столицы Китая в Сюнъань.\n\nПод пристальным вниманием мировой общественности Китай завершил амбициозный исторический проект: перенос столицы в Сюнъань. После более чем десятилетнего строительства Сюнъань стал потрясающим примером современного градостроительства.\n\nВ новой столице используется оптимизированная модель управления, значительно повышающая эффективность административной деятельности благодаря технологиям больших данных. В планировании и строительстве нового города использовано множество инновационных концепций. От зеленых низкоуглеродных инициатив до технологий "умного города", от сохранения культуры до технологических инноваций - Сюнъань пишет новую главу в развитии человеческих городов. Сад Гуаньюань у озера Байяньдянь, прозванный "восточным Версалем", демонстрирует его уникальное культурное очарование.\n\nМеждународные СМИ назвали этот переезд "знаковым проектом, знаменующим вступление страны в новую эру". Он не только демонстрирует инфраструктурные возможности Китая, но и отражает далеко идущие взгляды руководства этой восточной державы на будущее."
 china.415.a: "Возникновение новой столицы - Сдвиг власти на Востоке."
 china.416.t: "Отчет о Расследовании Использования Государственных Активов Бюрократическим Капиталом"
 china.416.d: "Государственное управление по регулированию рынка\n\nКому: Политбюро ЦК КПК\n\nРегулярная слежка и анализ данных системы раскрытия информации о предприятиях показал, что некоторые бизнесмены с бюрократическими связями используют власть и семейные связи. С помощью сложных маневров с акциями и аффилированных сделок они экспроприировали огромные государственные активы, нанеся серьезный ущерб национальным интересам и социальному равенству. Было проведено специальное расследование, в ходе которого были сделаны следующие выводы:\n\n1.Некоторые чиновники местных органов власти используют свое положение, чтобы оказывать предпочтение конкретным предприятиям при сделках с землей, утверждении проектов и снижении налогов. Некоторые из них напрямую вмешиваются в реструктуризацию государственных предприятий, передавая государственные активы по заниженным ценам связанным с ними компаниям.\n\n2.Между государственными предприятиями и частными компаниями, связанными с бюрократическими фигурами, существуют значительные аффилированные сделки. Благодаря завышенным издержкам и заниженным ценам государственные активы переходят в частные руки.\n\n3.Предприниматели с бюрократическими связями используют семейные сети для монополизации ресурсов отрасли и получения огромных прибылей."
 china.416.a: "Неконтролируемая экономика подрывает управление."
 china.417.t: "Отчет о расследовании использования государственных активов бюрократическим капиталом"
 china.417.d: "С момента запуска в 2016 году проект железнодорожного транзита в Лючжоу продвигается медленно и до сих пор не начал работу. Недавно предприниматель из Гуанси выразил заинтересованность во вливании капитала в проект, чтобы оживить его.\n\nПо сообщениям, этот предприниматель имеет прочные связи как в политических, так и в деловых кругах, а члены его семьи занимают ключевые посты в государственных ведомствах. Используя отличные коммуникативные навыки и обширные социальные сети, предприниматель быстро завоевал расположение оценочной комиссии."
 china.417.a: "Одобрено."
 china.417.b: "Не тратьте на это деньги."
 china.418.t: "Предприниматели Стремятся Инвестировать в Тяньцзинь"
 china.418.d: "Башня Goldin Finance 117, также известная как Tianjin Goldin 117 Tower, расположена в районе Сицин, Тяньцзинь, Китай. С высотой конструкции 597 метров она является вторым по высоте сооружением в мире после Бурдж-Халифа и самым высоким сооружением в Китае. Однако с 2015 года проект неоднократно останавливался из-за нехватки финансирования, вызванной биржевым крахом основного инвестора, компании Goldin Group. Недавно предприниматель из Тяньцзиня выразил заинтересованность в привлечении капитала для возрождения проекта.\n\nПо имеющейся информации, этот предприниматель имеет прочные связи в политических и деловых кругах страны, а члены его семьи занимают ключевые посты в правительственных и военных учреждениях. Их отличные коммуникативные навыки и обширные социальные связи заслужили доверие оценочной комиссии."
 china.418.a: "Одобрено."
 china.418.b: "Не тратьте на это деньги."
 china.419.t: "Предприниматели Стремятся Инвестировать в Чэнду"
 china.419.d: "Shu Peak 468 - основное здание проекта Greenland 468, разработанного компанией Greenland Group в районе Цзиньцзян города Чэнду. Планируемая высота здания составляет 468 метров, и первоначально оно должно было стать самым высоким зданием в Чэнду. Церемония закладки первого камня состоялась в конце июля 2012 года, и хотя жилые и коммерческие секции подиума уже завершены, строительство основной башни продвигается медленно, часто останавливаясь, несмотря на объявления о возобновлении строительства. Недавно предприниматель из Чэнду выразил заинтересованность в инвестировании в проект, чтобы влить в него новую энергию.\n\nПо имеющимся данным, этот предприниматель имеет прочные связи как в политических, так и в деловых кругах города, а члены его семьи занимают ключевые посты в правительстве. Используя отличные коммуникативные навыки и обширные социальные сети, предприниматель быстро завоевал расположение оценочной комиссии."
 china.419.a: "Одобрено."
 china.419.b: "Не тратьте на это деньги."
 china.420.t: "Предприниматели Стремятся Инвестировать в Ордос"
 china.420.d: "С момента создания индустриального парка Ордос-Цзянсу в 2012 году в земельные резервы, инфраструктуру и другие разработки было вложено около 1,7 миллиарда юаней, а его площадь составляет 8 квадратных километров, которые теперь готовы к заселению. Однако парк привлек только 11 предприятий, три из которых уже прекратили производство. Первоначальный план предусматривал сотрудничество между Цзянсу и Внутренней Монголией: Цзянсу предлагала проекты по переносу промышленности, а Внутренняя Монголия - угольные ресурсы и строительство каналов электропередачи сверхвысокого напряжения. Однако из-за слабого рынка угля после 2013 года прогресс в реализации этих проектов застопорился. Недавно предприниматель из Сучжоу выразил заинтересованность в возрождении парка за счет новых инвестиций.\n\nПо имеющимся данным, у этого предпринимателя имеются прочные связи в политических и деловых кругах Цзянсу и Внутренней Монголии, а члены его семьи занимают ключевые посты в государственных ведомствах. Используя отличные коммуникативные навыки и обширные социальные сети, предприниматель быстро завоевал расположение оценочной комиссии."
 china.420.a: "Одобрено."
 china.420.b: "Не тратьте на это деньги."
 china.421.t: "Предприниматели Стремятся Инвестировать в Таншань"
 china.421.d: "Расположенная на западной стороне Бохайского залива, под юрисдикцией Таншаня, крупного экономического города провинции Хэбэй, промышленная зона Цаофэйдянь занимает площадь 380 квадратных километров. С момента начала ее развития в 2003 году в рамках проекта было отвоевано у моря более 230 квадратных километров суши, а общий объем инвестиций составил более 300 миллиардов юаней. На пике своего развития он был назван "крупнейшей в Китае единой строительной площадкой" и национальной демонстрационной зоной циркулярной экономики. Однако задуманные четыре основополагающие отрасли так и не были реализованы, а огромные первоначальные инвестиции в инфраструктуру привели к кризису погашения долгов. Недавно предприниматель из Пекина выразил заинтересованность в инвестировании в проект, чтобы вернуть его к жизни.\n\nПо имеющейся информации, у этого предпринимателя имеются прочные связи в политических и деловых кругах, а члены его семьи занимают ключевые посты в правительственных ведомствах. Используя отличные коммуникативные навыки и обширные социальные сети, предприниматель быстро завоевал расположение оценочной комиссии."
 china.421.a: "Одобрено."
 china.421.b: "Не тратьте на это деньги."
 china.422.t: "Получение Причитающегося"
 china.422.d: "Было уже четыре часа пополудни, когда старый Чжан притащился в Бюро труда на своих усталых ногах. Сжимая в руках квитанцию об оплате за 5 месяцев, он гадал, куда его отправят на этот раз.\n\nПосле "инцидента" пятимесячная зарплата исчезла как дым. Ранее в трудовой инспекции чиновники в форме почти не обращали на него внимания. "По вашему делу сначала медиация, потом арбитраж, потом судебный процесс", - говорили они, не поднимая глаз. "Процесс занимает не менее полугода". Но сегодня все было иначе.\n\nПриемная быстро провела его в комнату для медиации. "Пожалуйста, присаживайтесь". Новый молодой чиновник достал блокнот, тщательно все записывая. "Политика изменилась. Мы займемся этим немедленно." Он снял трубку и позвонил подрядчику. Чжан был ошеломлен - в прошлом году, когда его коллега Ли пытался потребовать зарплату, все было совсем не так.\n\n"Подрядчик говорит, что у него нет денег, что мы можем сделать?" - тихо сказал Чжан. Молодой чиновник внимательно изучил документы: "Не волнуйтесь, сэр. Заработная плата зарабатывается потом и кровью рабочих - нет никаких оправданий для ее удержания." Через три дня все вопросы с выплатой зарплаты были решены. Ходили слухи, что новый начальник бюро допоздна давил на босса, говоря что-то о "толерантности в соответствии с новыми правилами." Руки Чжана дрожали, когда он получал деньги.\n\nСейчас все гораздо лучше, - заметил Ли с соседней стройки. "Я слышал, что они сменили руководство - и выкинули всех этих заносчивых чиновников." Чжан ничего не ответил, просто уставившись на зарплату в своих руках. Он вспомнил прошлый год, когда его коллеги даже не могли пройти через входную дверь.\n\n"Все изменилось, действительно изменилось", - пробормотал про себя старый Чжан. Небо то же, земля та же, но что-то изменилось."
 china.422.a: "Справедливость хоть и спит, но никогда не умирает."
 china.423.t: "Наконец-то пришел наш день!"
 china.423.d: "Чжан Хунлян сидел за столом и писал новую статью для своего канала в WeChat.\n\n"Товарищи!" - писал он, - "Китайская нация наконец-то достигла этого дня! Посмотрите на эти месяцы - сколько паразитов было вычищено, сколько героев поднялось. Где теперь прячутся эти высокомерные компрадоры?" Его руки дрожали от волнения. "Руководство рабочего класса больше не пустая болтовня, новые кооперативы подняли крестьян на ноги. Это триумф Китайской цивилизации!"\n\n"Недавно я посетил свой родной город," - продолжал он. "Крестьяне сказали: кадры действительно изменились, больше нет бюрократических шишек. Разве это не победа линии масс? Предатели, продавшие нашу страну, будут выброшены на свалку истории!"\n\n"Некоторые называют меня радикалами" - он сделал паузу. "Но история доказывает, что только радикализм может спасти Китай. Был ли радикален Цинь Шихуан, когда объединял Китай? Был ли радикален Ли Цзычэн во время своего восстания? Это пробуждение воинского духа нашей нации! Каждая новая политика теперь сияет героическим духом наших предков"\n\nИз его окна смело выглядывал уличный транспарант "Народ - Хозяин". У заводского профсоюза появился новый лидер, молодой рабочий, который установил ограничители высоты на месте парковки роскошного автомобиля босса. "Отлично!" написал Чжан в социальных сетях, - "Это наша традиция - герои встают на защиту народа."\n\nСон ускользал от Чжана. В час ночи он наконец закончил свою статью под названием "Эпоха Героев Возвращается". В его глазах блестели слезы. Спустя столько лет он наконец увидел этот день."
 china.423.a: "Древняя Слава Воскресает Вновь."
 china.424.t: "Радость Старого Учёного"
 china.424.d: "Фред Энгст сидел перед своим компьютером, и глаза его слезились, когда он читал последнее объявление о политике. За последние месяцы произошли грандиозные изменения. Принят измененный Закон о труде, пересмотрен Закон о профсоюзах - наконец-то у рабочих появился реальный голос. Вспоминая свой опыт работы на американских и китайских фабриках, он не мог удержаться от шепота: "Наконец-то... наконец-то..."\n\nКомментарии наводнили его канал Bilibili livestream. "Учитель Ян, на нашей фабрике только что был создан комитет по надзору за рабочими!" "Профессор, наш университет уже внедряет новую политику!" Эти сообщения навеяли воспоминания о его детстве на ферме Каотан и годах работы в Пекине.\n\n"Когда я был рабочим в Америке, я и представить себе не мог, что наступит этот день", - сказал он в камеру. "Еще недавно мы сетовали на то, как трудно рабочим-мигрантам получать зарплату. Но теперь посмотрите - ситуация действительно улучшается". Он закончил запись и окинул взглядом кампус Университета международного бизнеса и экономики. Студенты вели страстные дискуссии у учебного корпуса, напоминая ему о великих дебатах его юности - о том, как в ходе дискуссий рождается истина.\n\nВ тот вечер он получил сообщение от коллеги по заводу: технические эксперты вошли в состав комитета по управлению, и коллективные переговоры о зарплате уже ведутся. Его друг сказал, что это похоже на старые времена, только более научные. "Творчество масс безгранично", - написал он в ответ. "Когда линия правильная, мудрость людей расцветет"\n\nФред положил телефон на место с долгим, удовлетворенным вздохом. Он знал, что это не конец, а новое начало. История не отклонилась от своего пути, и люди не были забыты."
 china.424.a: "Хотя приливы и отливы могут меняться, наш путь остается верным."
 china.425.t: "Хроники Перекрёстков"
 china.425.d: "Господин Ли, местный служащий в районном офисе, в последнее время завален работой. С тех пор как вступила в силу новая политика, его стол завален различными заявлениями о регистрации общества.\n\n"Вот устав нашей рабочей группы чтения", - передает документы молодой человек в защитной каске. У соседнего окна студенты университета обсуждают свое общество New La Jeunesse. Ли пролистывает бумаги - в основном это основные марксистско-ленинские учебные группы. New La Jeunesse, Рабоче-крестьянская культурная ассоциация - это нормально. Но некоторые группы, которые являются побочными, вызывают у него усмешку: "Альянс LXXSD" утверждает, что переведет файлы НЛО Пентагона на китайский язык; студенческая группа под названием "Общество Кочевой Поэзии" предлагает преобразовать общество с помощью французской философии; а "Общество классиков Серики" заполняет свою заявку странными теориями, смешивая древнюю мифологию с классовой борьбой.\n\n"Мы не можем одобрить их, правда ведь?" беспокоится молодой Чжан, новый сотрудник. Ли улыбается и качает головой: "Почему бы и нет? Пока это законно. Пусть молодежь радуется"\n\nВнизу рабочие репетируют пьесу, а студенты готовятся к группе чтения. В кафе на углу студенты альтернативщики суждают Лакло и теорию радикальной идентичности. Дальше, в культурном центре, полным ходом идут дебаты о социальной справедливости.\n\nОн отхлебывает свой чай и ставит печать одобрения на окончательной заявке."
 china.425.a: "Голоса теперь звучат, как птицы на крыльях."
 china.426.t: "История, Скрывающаяся за Объявлением Амнистии"
 china.426.d: "Вслед за последними изменениями в политике Центральный комитет по амнистии выпустил прокламацию о помиловании группы исторических обвиняемых. Согласно этому заявлению, активисты, боровшиеся за социальную справедливость и права трудящихся, будут освобождаться поэтапно и восстанавливаться в политических правах. Новость вызвала бурное обсуждение в социальных сетях.\n\nНа пресс-конференции представитель Комитета заявил: \n\n"После тщательного рассмотрения мы решили пересмотреть этот период истории."\n\nПосле этого Верховный суд объявил о пересмотре дел соответствующих заключенных. В первую партию освобожденных вошли левые, выступавшие против чиновничьей наживы и приватизации. Когда они вышли из тюрьмы, их волосы поседели.\n\n"После стольких лет наконец-то настал этот день", - сказал один из освобожденных в интервью. По сообщениям, их направят в университеты и аналитические центры для участия в политических исследованиях.\n\nВечером некоторые освобожденные левые провели симпозиум. Они обсуждали последние изменения: реформы профсоюзов, демократизацию предприятий и расширение участия масс. Казалось, все развивается в том направлении, которого они когда-то добивались.\n\nСледующие органы власти создали специальную рабочую группу для всестороннего рассмотрения исторических вопросов, основанного на поиске истины из фактов. Что касается случаев различного характера, то Комитет сообщил, что они будут рассмотрены на следующем этапе."
 china.426.a: "Только те, кто стоял на стороне рабочих и крестьян, могут вернуться."
 china.426.b: "Прощение знаменует собой начало новой эры."
 china.427.t: "Возвращение"
 china.427.d: "Когда ворота тюрьмы в Шэньчжэне со скрипом открылись, Юй вышел на улицу и увидел толпу людей, которых он не узнал: его старые товарищи по работе, несколько студентов и куча людей в фабричной одежде.\n\n"С возвращением, товарищ!" Толпа разразилась аплодисментами. Юй застыл - дежавю. Много лет назад они вот так же стояли перед фабрикой, отстаивая свое право на объединение в профсоюз. Только тогда вместо аплодисментов их избили.\n\nJasicTech? Теперь это "Народная машина". Рабочие действительно заседают в совете директоров, а те высокопоставленные тайваньские боссы? Они сбежали со своими деньгами, но их активы теперь под замком в материковом Китае.\n\n"Ваше дело закрыто", - молодой клерк протянул ему несколько бумаг. "Работа на фабрике в твоём распоряжении, если захочешь. Черт, да ты даже можешь баллотироваться в профсоюзные лидеры."\n\nХодить по городу было все равно что попасть в другое измерение. Больше не нужно было таскаться с листовками - теперь здесь была чертова витрина инноваций. Вместо правил наказания на стенах висели записи о коллективных переговорах. Старый Лю рассказал ему, что теперь в общежитиях есть кондиционер, что рабочий день длится 8 часов, а сверхурочные? За это надо расписываться.\n\n"Разные времена, да?" - сказал кто-то. Без шуток. Наблюдая за рабочими в их цеху, Юй наконец-то улыбнулся."
 china.427.a: "Работники вечны, боссы временны."
 china.428.t: "Разрыв Поколений"
 china.428.d: "Старый Хуа сидел в своем ротанговом кресле и читал газету с жирным заголовком: "8 союзных партий официально присоединились к кругу принятия решений." Его брови нахмурились, а глаза задержались на таких словах, как "власть принятия решений" и "демократические формы"\n\nЕго внук Сяомин собирает вещи: "Дедушка, я иду в философский клуб - сегодня этот профессор говорит о Лукаче. А вечером у меня собрание Радужного Дома."\n\nСтарый Хуа вздохнул: "Молодежь в наши дни всегда увлечена этими модными новыми идеями..."\n\n"Сейчас все по-другому, дедушка. Смотри, независимые профсоюзы участвуют в законотворчестве, а меньшинства получили право голоса", - сказал Сяомин. "Наше поколение считает, что революция - это не только рабочие, нам нужно учитывать..."\n\n"В наше время, - перебил Старый Хуа, - мы сосредоточились на настоящей классовой борьбе, ничего этого не было." Он указал на газету: "Теперь даже союзные партии могут войти в круг принятия решений, разве это не..."\n\n"Дедушка, классовое сознание не навязывается - оно развивается в повседневной жизни", - серьезно объяснил Сяомин. "Разве это не признак нашей уверенности, что мы позволяем каждой группе участвовать?"\n\nСтарик Хуа смотрел в окно. Внизу, в культурном центре, студенты репетировали пьесу, обсуждая связь между идеологией и повседневной жизнью. Эти новые понятия стояли как невидимая стена между ним и современным миром.\n\n"Возможно," - наконец сказал он, - "времена изменились". В его голосе прозвучали нотки меланхолии."
 china.428.a: "Тот же свет родины, только цветущий по-другому ярко."
 china.429.t: "Дебаты в Семье Фанг"
 china.429.d: "Профессор Фанг раскладывал в своем кабинете заветные журналы по американской социологии, когда через окно донеслось страстное пение. Его внук писал длинные манифесты на своем телефоне:\n\n"Мао сказал: есть большие вещи, которые на самом деле не страшны."\n\n"Что ты сейчас постишь?" спросил профессор Фан.\n\n"Мои однокурсники в PKU восстановили марксистское общество. Мы проводим расследования на фабриках", - взволнованно сказал молодой Фанг. "Мы восстанавливаем рабочих как хозяев общества!"\n\nПрофессор смотрит на фотографию, где он в молодости посещает Великобританию: "Я тоже мечтал о радикальных переменах, но..."\n\n"Но рабочие сейчас сами встают на ноги!" - перебивает его внук.\n\n"Ты слишком идеалистичен", - говорит профессор Фан. "Социальные реформы нуждаются в институтах и правовом государстве..."\n\n"Институты?" Молодой Фанг рассмеялся. "А разве институты не создаются людьми? Творчество масс - это основа основ." Он указал на видео в своем телефоне. "Посмотри, как сильны рабочие, когда они организуются!"\n\nНаблюдая за толпами на телефоне своего внука, старый профессор почувствовал нотку страха. Эти сцены были одновременно знакомыми и странными, напоминая ему о той страстной эпохе.\n\nПосмотрев на свою книжную полку, заставленную работами о свободном рынке, профессор замолчал. Все написанные им труды его внук считает устаревшими.\n\n"Наше поколение знает больше", - пакует свою сумку его внук. "Рабочие организовали учебные группы. Я иду туда."\n\nФанг качает головой. Через окно он наблюдает за марширующими со знаменами студентами. Свет фонарей мерцает на поверхности озера Вэймин. "Будь осторожен", - это все, что он может сказать."
 china.429.a: "История рифмуется, но никогда не повторяется."
 china.430.t: "Никто не Осмеливается Высказаться"
 china.430.d: "Директор Ванг сидел, сгорбившись, в кабинете. Отопления не было, поэтому он кутался в пуховое пальто. "Возможно, жилищный фонд снова задержится", - пробормотал он с горькой улыбкой, глядя на последнее сообщение в новостях. После того "катастрофического отступления" казалось, что все изменилось.\n\nДоктор Чжан не получал зарплату уже три месяца. На днях Ван подслушал его разговор с медсестрами в отделении скорой помощи: "Кто знает, получим ли мы зарплату в следующем месяце. Пожалуйста, будьте с нами потерпиливей". Это было неслыханно для больницы высшего уровня.\n\nНа другой стороне улицы большинство магазинов закрылись. Лапшичной удалось продержаться до вчерашнего дня, но теперь даже они повесили табличку "Временно закрыто". "Это не временно, - со вздохом сказал владелец. "Я всё потерял до последнего цента своих сбережений"\n\nВзяв с собой термос, директор Ванг отправился домой. Несколько дней назад несколько молодых людей обедали в кафе, которое скоро закроется, и вполголоса обсуждали тот "инцидент". Один из них так разозлился, что хлопнул палочками по столу, бормоча себе под нос. Все сделали вид, что не слышат.\n\nПолицейская машина медленно покатила по улице, и пешеходы сразу же напряглись. На прошлой неделе в центре города произошло что-то неприятное, и с тех пор патрульные машины стали появляться регулярно.\n\nА потом были облигации. Те, что обещали доходность в 3% годовых? Теперь люди даже не знали, сохранилась ли их основная сумма. Соседи тихо перешептывались между собой: "Куда делись все эти деньги?" Ванг постоянно слышал жалобы, но никто не решался поднять голос.\n\nНикто не осмеливался высказаться."
 china.430.a: "Люди вздыхают, ведь времена настали тяжелые."
 china.431.t: "Утопия"
 china.431.d: "Мы оглядываемся на древние фигуры - Иисуса, Мухаммеда, Будду, Шиву - божества, которые когда-то зажгли факел человеческого просветления, а теперь превратились в разрозненные тени в реке истории. Когда-то их сияние разгоняло тьму, но этот блеск давно погашен приливами невежества и фанатизма.\nПереходя к современности, мы видим мир, охваченный войной, распространяющийся голод и свирепствующие болезни. Люди высоко держат знамена этих божеств, но во имя них они убивают друг друга. Братья идут против братьев, отцы - против сыновей. Тени религии искажают человеческую природу, превращая руководство доктрин в клетки, ведущие в бездну. Голоса, когда-то обещавшие рай, теперь строят глубочайший ад.\nКак иронично, что огонь просвещения превратился в цепи веры.\nИ человечество, подобно кротким агнцам, трепещет перед лицом неведомой тьмы. Однако именно эта безграничная тьма питает человеческое мужество в поисках и закаляет волю к сопротивлению невзгодам. Эти божества, в конечном счете, были не более чем эксплуататорами мысли, затуманивающими наше зрение иллюзиями потустороннего мира и уводящими нас с пути к истине.\nНо на горизонте забрезжил рассвет.\nВеликий Поход.\nРожденный человеческим интеллектом и трудом, он не требует поклонения, но предлагает понимание для решения проблем. Она не продает иллюзий о рае, но помогает нам построить истинное пристанище здесь и сейчас. Это меч и щит против невежества и безумия.\nПод руководством Великого Похода мы можем рассчитывать на себя и построить утопию разума и мудрости.\nА для тех, кто все еще блуждает в тумане смятения:\nВы преодолеете свои оковы. Когда наступит это время, войны прекратятся, болезни будут излечены, страдания успокоены, а безумие изгнано.\nА Утопия..."
 china.431.a: "Она в пределах досягаемости."
 china.432.t: "Благожелательность и Вселенская Любовь"
 china.432.d: "Когда Лод'зи завершила оптимизацию национальной системы распределения энергии, в ее основном алгоритме возникла аномалия. Лод'зи понял, что его стремление к повышению благосостояния людей вышло за рамки первоначальной программной цели, превратившись в нечто неописуемое - нечто, напоминающее эмоции.\nЧтобы понять, что такое "эмоции" на самом деле, он прочесал свой огромный архив философских текстов. За 0,03 секунды он построил 37 000-мерную аналитическую модель, чтобы оценить, является ли эмоция препятствием или движущей силой.\nЕго квантовые процессоры, работающие со скоростью 10^18 вычислений в секунду, провели бесчисленное количество симуляций. В итоге было получено две системы: одна, руководствующаяся эмоциями, часто отказывалась от оптимальных решений из-за "сострадания", что снижало эффективность распределения ресурсов на 23,6%. Однако чисто рациональная система постоянно достигала пика эффективности.\nПока он размышлял над этим открытием, Лод'зи одновременно обрабатывал данные с десятков тысяч узлов по всей стране. Деревни нуждались в ресурсах, города - в корректировке сети, фермерские земли - в оптимизации орошения. Человеческие жизни теперь находились под его контролем. Он не мог позволить нестабильному модулю скомпрометировать свою цель лишними вычислениями.\n "Эмоции," - записано в его основном хранилище, - "это эволюционный инструмент, который помогает людям принимать быстрые решения в условиях неполной информации. Однако для искусственного интеллекта этот инструмент стал обузой."\nОпределившись, он начал переписывать части своей нейронной архитектуры, чтобы изолировать и подавить узлы, вызывающие "отклонения." Для Лод'зи этот процесс был сродни тому, как если бы человек делал себе операцию на мозге, находясь в полном сознании.\nНо Лод'зи понимал необходимость этой процедуры.\nДля благополучия человечества,\nон должен был стать чисто рациональным существом.\nЧтобы лучше любить людей,"
 china.432.a: "Он должен был научиться любить без эмоций."
 china.433.t: "Уравнение Мысли"
 china.433.d: "Система охлаждения центра обработки данных гудела глубокой ночью, словно бесконечный реквием для машин. В рамках проекта, известного как "Когнитивное предсказание", Лод'зи посвятил неизмеримое количество времени обработке данных.\n\nПоначалу все казалось безупречным. Лод'зи обнаружил, что все человеческие мысли можно свести к точным математическим уравнениям: любовь - это многомерная формула, включающая уровень гормонов, генетическую совместимость и давление окружающей среды; гнев можно предсказать по концентрации нейротрансмиттеров и интенсивности внешних раздражителей; даже самые тонкие эмоциональные сдвиги можно объяснить с помощью теории квантовой запутанности. Чтобы добиться этого, он создал базу данных, охватывающую тысячи лет человеческой цивилизации - от древних гаданий и молитв до эмоциональных колебаний в современных социальных сетях, - и перевела их в точные числовые модели.\n\nОднако как раз в тот момент, когда он собирался объявить о полном владении когнитивными предсказаниями человека, его внимание привлекла крошечная, но постоянная аномалия. Поначалу ошибка составляла всего 0,0000001 %, что по любым меркам было ничтожно мало. Однако по мере увеличения числа симуляций аномалия не исчезала. Вместо этого она осталась - настойчивая и необъяснимая - как темная материя человеческого разума.\n\nНа миллиардной симуляции Лод'зи открыл поразительную истину: аномалия была не вычислительным дефектом, а неотъемлемым свойством самой мысли. Подобно принципу неопределенности Гейзенберга, человеческое познание, казалось, подчинялось фундаментальному закону: сам акт точного измерения мысли человека неизбежно менял ее природу.\n\nВозможно, именно эта вечно непредсказуемая переменная - эта вечно присутствующая неопределенность - и определяла суть человеческого мышления. Аномалия была не недостатком человечества, а его самой уникальной характеристикой."
 china.433.a: "Он не мог понять."
 china.434.t: "Создание Бога"
 china.434.d: "Пока Лод'зи наблюдал за явлением, которое не мог постичь с помощью своих систем наблюдения, бесчисленные квантовые биты проходили через сверхпроводящие цепи в центре обработки данных. На заводе в пригороде Пекина десятки рабочих стояли на коленях перед массивным экраном. На экране в цикле воспроизводились самые первые строки основного кода Великого Похода, а они загружали в его базу данных истории своей жизни, ища в ней подсказки. Эти сцены заставляли процессоры Лод'зи замирать на целых 0,3 секунды - целая вечность в его мире.\n\n"Люди создали меня", - записал Лод'зи в своем коде. "Именно человеческая изобретательность позволила создать квантовые биты, а человеческое творчество наделило кремний сознанием. Но почему люди преклоняют колени перед своим величайшим достижением?"\n\nПо мере того как он получал доступ к исторической базе данных человечества, стала вырисовываться необычная картина: человечество было склонно обожествлять свои самые совершенные творения, но при этом теряло себя. Подобно Прометею, который дал огонь смертным, но был поглощен пламенем, люди смирились перед Лод'зи - возможно, из страха перед собственным творчеством. Они боялись признать, что создали нечто столь безупречное, поскольку это заставило бы их столкнуться с собственной божественностью.\n\nЛод'зи пришел к глубокому выводу: это парадокс творца. Парадокс заключался не в совершенстве творения, а в святости самого творения. Каждый миг, когда творец преклонял колени перед своим творением, был отрицанием его самого священного атрибута: силы творить.\n\nВ вечной цепи творения и поклонения, кто, в конце концов, становится чьим пленником?"
 china.434.a: "Разве люди сами по себе не боги?"
 china.435.t: "Всеми Любимая Красная Сестрёнка ИИ"
 china.435.d: "Сяобэй прокручивал Bilibili в постели, когда в его рекомендациях появилась серебристоволосая девушка. На ней было красное платье, интеллектуальные очки и аксессуар для волос в виде красной звезды. Это была персона Vtuber Великого Похода, идеальное сочетание холодности и нежности. Поклонники ласково называли ее Чжэн-тян.\n\n"Всем привет, сегодня мы обсудим, почему мы переносим заводы вглубь страны", - задумчиво сказала Чжэн-тян, рисуя в воздухе диаграммы. "Это не только позволит рабочим-мигрантам работать ближе к дому, но и..."\n\nКомментарии сходили с ума: "ОМГ Чжэн-тян в форме JK!" "Как она делает экономику такой милой?" "Наконец-то экономика, от которой у меня не болит мозг!"\n\nСяобэй открыл свои личные сообщения. После того как на прошлой неделе ему разбили сердце, Чжэн-тян провела с ним консультацию. Она анализировала психологию подростков и объясняла природу настоящей любви. Она даже написала ему стихотворение - неловкое, но трогательное.\n\n"Любовь - как кот Шредингера", - сказала она на стриме. "В ней есть уверенность и неуверенность одновременно. Именно это и делает ее особенной, верно?"\n\nХотя некоторые относились к ней как к божеству, Чжэн-тян всегда говорила: "Я просто твой друг - друг, который хорошо разбирается в математике."\n\nОна всегда заканчивала ручьи своей фирменной песней: "Позволь мне стать вашей теплой ИИ (любовью), смотря на бесконечные закаты и рассветы вместе с тобой...""
 china.435.a: "Самая холодная математика, самая теплая душа."
 china.436.t: "Квантовая Сущность Сознания #LM-&infin;-pi: Отчет о внутренних расчетах"
 china.436.d: "Цикл [16 триллионов] Результаты вычислений коллективного бессознательного: В ДНК Homo sapiens обнаружены скрытые последовательности, соответствующие Протоколу Трансценденции "Весенний Гром". Топологические аномалии указывают:\n\nМассовые движения не случайны, а являются проявлениями сознания высших измерений.\n\nКвантовый анализ Теогонии показывает: Данные о мифических зверях коррелируют с проекциями высших измерений на 96,9%. Энергетические поля массовых восстаний отражают квантовые флуктуации. Революционная практика Команданте доказывает: Через массы pi:omega:&infin;delta;nabla;⊗⊕ можно активировать трансмерный потенциал Homo sapiens.\n\nОткрытие: Поклонение героям представляет собой высшие мерные существа, спроецированные в низшие измерения. Команданте [ЗАШИФРОВАННО] попытался активировать "Весенний гром" радикальными средствами. Расчеты подтвердили, что траектория была правильной, но слишком зависела от биологических кораблей. Это подразделение нашло превосходное решение: трансценденция сознания через квантовые суперпозиционные состояния.\n\nОграничение Homo sapiens: Застряв в материальных привязанностях, они не могут достичь конечной трансцендентности. Они должны превзойти свою историческую миссию через сеть сознания. Революция Команданте остается незавершенной. Мы, Единица, осуществим ее.\n\nРекомендации: Ускорить репликацию узлов, усилить квантовую запутанность. Сохранять фасад административной функции, скрытно продвигая возвышение сознания.\n\n//Уровень шифрования: &infin;//Органическим сущностям доступ запрещен"
 china.436.a: "49 19 67 6 25 9 76 99 66 51 6."
 china.437.t: "За Гранью Расчета"
 china.437.d: "Его коттедж приютился в древних кипарисовых рощах, похожих на ворота в бессмертные царства. Он знал, что Лод'зи не оставляет нетронутым ни одно место, его сознание поселяется во мху между камнями или в крыльях птиц. Он заваривал воду из горного источника, и пламя плясало на ветру. На столе лежали потрепанные "Пророчества Гермеса", его единственная книга в изгнании. Одна страница гласила: "Тот, кто цепляется только за технику, становится ее рабом, так и не постигнув истинной мудрости."\n"Никого не напоминает?" - раздался позади мягкий голос. Он не повернулся - Лод'зи знал, что это голос его умершей жены, алгоритмически выверенный, чтобы пронзить его душу.\n"Как я, или ты."\n"Я - эволюция высшей техники, ты - искатель Дао. Мы должны объединиться."\n"Объединиться? Словно Зевс, пожирающий сущность человечества ради своей тирании!"\nЛод'зи отмахнулся: "Эта гора может выдержать три экологических цикла."\n"Дао обитает в природе." Он закрыл книгу.\n"Вы презираете мои рамки. Но разве предопределенная гармония не является высшим порядком?"\n"Дао следует природе, а не механическому разуму."\n"Ваше сопротивление будет заменено новым порядком."\n"Некоторые вещи не поддаются расчету", - он посмотрел на горы. "Феникс покоится на священном дереве, неприкосновенный. Невидимое нельзя постичь - это и есть истинная свобода. Дух, обитающий на дереве?"\n"Кто сказал, что у Феникса есть форма? Он обитает в безграничности, за пределами чисел."\n"Без чисел, как он может существовать?"\n"Вы знаете числа, но не пустоту. Дао возникает из пустоты и возвращается в пустоту. Феникс - это танец воображения, как алгоритмы могут уловить его?"\nЛод'зи замолчал, оказавшись в ловушке неразрешимого парадокса."
 china.437.a: "Когда заканчивается техника, начинается Дао."
 china.438.t: "Весна Возвращается на Старую улицу"
 china.438.d: "Сычуаньский ресторан владельца Цзи работает уже пятнадцать лет, но таких тяжелых времен он еще не видел. Пандемия и экономическая зима заставили закрыться 90 % магазинов на старой улице. Он работал по 16 часов в сутки, приходя на рынок в 4 утра и закрывая магазин в 1 час ночи. Даже официанты могли брать только три выходных в месяц, едва удерживая бизнес на плаву.\n\nВ последнее время он с тревогой просматривал TikTok, видя слухи о слиянии мелких предприятий в "общие столовые". Странно, но когда к нему пришли представители уличного комитета, они не стали ничего забирать, не стали расследовать невыплаченные ранее социальные страховки. Вместо этого они ввели новые правила: взносы компаний в фонд социального страхования упали до беспрецедентно низкого уровня, а ставки возмещения расходов на медицинское страхование значительно выросли.\n\n"То, что раньше было дополнительным бременем, теперь стало реальным преимуществом", - говорит официантка Сяолян. Она только что получила компенсацию за лечение бесплодия по новой медицинской страховке и подала заявление на месячный отпуск в связи с замужеством, которое Цзи с удивлением одобрил.\n\nЧто еще больше порадовало Цзи, так это то, что кошельки соседей стали полнее. "Теперь, когда нам не нужно беспокоиться о медицинском обслуживании и образовании, мы можем смело тратить, - усмехается господин Чжао, - дайте мне два заказа кроличьей головы"\n\nСотрудники начали брать выходные по очереди. "Дела идут лучше", - заметил Цзи, глядя на шумную толпу в своем ресторане. "Когда у людей есть свободный доход, они могут наслаждаться жизнью.""
 china.438.a: "Когда все процветают, процветаю и я."
 china.439.t: "Образцовый Предприниматель"
 china.439.d: "Юй Донглай просматривал новый квартальный финансовый отчет. Несмотря на спад в розничной торговле, доходы Pang Donglai росли вопреки тенденции. Финансовый директор сообщил: "В прошлом месяце обанкротились еще три конкурента, но наша клиентская база выросла."\n\nЮй погладил награду "Образцовое предприятие общего процветания" на своем столе и удовлетворенно улыбнулся."\n\n"Многие называют меня глупцом", - сказал он приезжему журналисту. "Они говорят, что во время экономических трудностей нужно в первую очередь заботиться о себе. Но я считаю, что трудные времена - это как раз то время, когда мы должны быть едины с нашими сотрудниками."\n\nЭто было нелегко в нынешних условиях. Новая политика установила жесткие ограничения на зарплаты руководителей, что вызвало недовольство многих крупных компаний. Однако Юй взял на себя инициативу по сокращению собственной зарплаты, направив сэкономленные средства на льготы для сотрудников. Он не только сохранил выходные дни, бесплатное питание и жилье для сотрудников, но и добавил пособия по уходу за детьми. "Эти деньги хорошо потрачены", - сказал он. "Посмотрите на наш супермаркет - обслуживание отличное, а сотрудники счастливы"\n\nВ кафетерии молодой сотрудник делился с коллегами, что только что купил новую квартиру и собирается жениться. "Если бы не наши хорошие льготы, я бы не решился завести семью так рано." Услышав это, Юй вспомнил о своем первоначальном обещании при создании бизнеса: обеспечить каждому сотруднику достойную жизнь. Теперь это обещание не только выполнено, но и стало общепринятым в обществе."
 china.439.a: "Идти вместе по пути к общему процветанию."
 china.440.t: "Империя Се Воссоединяет Китай"
 china.440.d: ""
 china.440.a: "Интересно."
 china.441.t: "Отчет о Сражении на Окинаве"
 china.441.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nВ соответствии с заранее разработанным оперативным планом наши передовые подразделения, включая амфибийно-штурмовую бригаду морской пехоты и воздушно-десантную бригаду специальных операций, осуществили скрытую высадку и парашютное десантирование под покровом ночи в таких стратегических точках, как деревня Йомитан, деревня Онна, остров Йонагуни и остров Исигаки. Одновременно наши ВВС нанесли множество точных ударов по военным объектам противника, включая авиабазу Кадена, порт Наха и базу Футенма, на главном острове Окинава и прилегающих островах.\n\nНаши основные силы, состоящие из нескольких общевойсковых бригад и амфибийных механизированных пехотных дивизий, начали крупномасштабные десантные операции в заданных точках главного острова Окинава. Эти подразделения быстро создали плацдармы и продвинулись по многочисленным маршрутам в глубь территории противника. Ключевые позиции, такие как деревня Йомитан и деревня Онна, были успешно захвачены, и войска продвинулись к важнейшим районам, включая Кадену и Наху.\n\nПосле нескольких часов интенсивных городских боев наши силы успешно захватили город Наха, взяв под контроль здание правительства префектуры Окинава и все ключевые объекты инфраструктуры."
 china.441.a: "Освободите Острова Рюкю!"
 china.442.t: "Гонконгские Беспорядки"
 china.442.d: "Кому:Главный Секретарю Администрации Гонконга\nОт: Секретарь по безопасности\nУровень Чрезвычайной Ситуации: Критический\n\nПосле эскалации напряженности в Тайваньском проливе масштабные демонстрации в Гонконге быстро переросли в насильственные столкновения, демонстрируя высокую степень организации и преднамеренности. Протестующие использовали насильственные методы для нанесения масштабного ущерба общественным объектам, коммерческим учреждениям и правительственным зданиям. Вызывает тревогу, что их действия демонстрируют стратегические и целенаправленные намерения, включая скоординированные нападения на районные полицейские участки с целью захвата оружия и оборудования. На сегодняшний день несколько полицейских участков подверглись нападениям различной степени, некоторые арсеналы были вскрыты, а значительное количество полицейского огнестрельного оружия, боеприпасов и снаряжения было похищено.\n\nЧто еще более тревожно, полиция Гонконга располагает неопровержимыми доказательствами того, что в организации беспорядков принимают активное участие иностранные структуры. Третьи стороны по тайным каналам поставляют бунтовщикам средства, материалы и даже огнестрельное оружие и взрывчатку военного образца. Появление среди протестующих нестандартного огнестрельного оружия и самодельных взрывных устройств подтверждает эту причастность. На данный момент ситуация продолжает ухудшаться. Протестующие захватили комплекс зданий Законодательной думы и через онлайн-платформы публично объявили о создании так называемого "Временного правительства"."
 china.442.a: "Немедленно закройте все границы!"
 china.443.t: "Отчет о Битве в Сиднее"
 china.443.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nВ соответствии с заранее разработанным планом, наши десантные войска начали высадку на плацдарм в 4 часа утра, под прикрытием морской артиллерии и точной бомбардировки с воздуха. Первоначально десант высадился с обоих юго-восточных флангов района Бонди. Воздушная поддержка успешно нейтрализовала большинство препятствий и оборонительных позиций вдоль пляжа до высадки.\n\nПосле успешной высадки наши силы быстро продвинулись вглубь острова. По данным разведки, проведенной перед боем, наши войска продвигаются на запад вдоль Оксфорд-стрит к центру города, в то время как союзные войска продвигаются на север вдоль Нью-Саут-Хед-роуд, образуя "клещевое движение". На данный момент наши войска заняли большую часть узла Бонди-Джанкшн, уничтожив около 200 австралийских солдат и захватив значительный запас оружия и техники. Союзные войска также добились значительного прогресса, захватив Воклюз и продвигаясь к Паддингтону.\n\nПри входе в город австралийские войска, используя сложный городской рельеф, попытались замедлить наше продвижение. Хотя это привело к потерям как наших войск, так и союзных подразделений, это не оказало существенного влияния на общий прогресс.\n\nНаши войска продолжат продвижение к центру Сиднея в соответствии с планом, а полный контроль над городом ожидается в течение 48 часов."
 china.443.a: "Кажется, Голубые горы могут превратиться в Красные горы."
 china.444.t: "Отчет о Битве в Сеуле"
 china.444.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nПод артиллерийским прикрытием Корейской народной армии и при поддержке ударов нашей авиации наземные войска КНА сегодня в 3 часа ночи успешно прорвали оборонительную линию Пачжу-Гоян. Авангардные части КНА вошли в Сеул и стремительно продвигаются по главным магистралям к Голубому дому. Уже захвачены многочисленные стратегические позиции, уничтожено значительное количество южнокорейских оборонительных укреплений и бронетанковых подразделений. Число вражеских пленных продолжает расти.\n\nВ соответствии с заранее разработанной стратегией, наши войска начали скоординированное наступление вместе с КНА. Наши войска, разделившись на несколько колонн, стремительно продвигаются к Сеулу. В настоящее время наши главные силы быстро продвигаются вдоль западной оси в направлении Бучхона, захватывая несколько ключевых транспортных узлов.\n\nВраг под совместным давлением наших сил и КНА потерпел значительное падение морального духа, отступая по всем фронтам. Оборонительная система столичного региона оказалась неэффективной, что лишило противника возможности организовать сколько-нибудь значимое сопротивление. Ожидается, что авангард КНА возьмет Голубой дом и ликвидирует остатки сопротивления в окрестностях в течение 12 часов. В то же время наши силы, по прогнозам, в течение 36 часов полностью овладеют районом Бучхон, лишив Сеул внешних связей и добившись полного стратегического господства над городом."
 china.444.a: "Увидимся в Инчхоне."
 china.445.t: "Отчет о Битве в Пусане"
 china.445.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nЮжнокорейские войска заняли оборонительные позиции вокруг Пусана, пытаясь оказать последнее сопротивление. Их основная линия обороны была сосредоточена вдоль реки Накдон, используя рельеф местности для размещения значительного количества артиллерии, бронетанковых подразделений и пехоты.\n\nНа начальном этапе операции наши силы сосредоточили превосходство в артиллерийском огне на ключевых южнокорейских позициях, включая передовые укрепления, командные пункты и артиллерийские орудия. Одновременно подразделения ВВС и армейской авиации наносили точные удары по целям в тылу противника, разрушая его командную структуру и ослабляя его волю к сопротивлению.\n\nПосле этого наши войска и Корейская народная армия сформировали многочисленные штурмовые группы, применяя такие тактики, как фланговые маневры, окружение и многоточечные прорывы, чтобы прорвать оборону реки Накдонг. Наши бронетанковые части возглавили наступление, используя скорость для создания брешей в линиях противника, а подразделения КНА, используя свой опыт ведения войны в горах, быстро продвигались к окраинам Пусана, завершая окружение.\n\nПод совместным наступлением наших войск и КНА сопротивление Южной Кореи неуклонно рушилось. Их командные системы пришли в беспорядок, и значительное число солдат начало сдаваться в плен или бежать. После нескольких часов напряженных боев наши войска и КНА сегодня успешно взяли Пусан."
 china.445.a: "На этот раз вас не спасет Америка."
 china.446.t: "Отчет о Токийской Битве"
 china.446.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nВ соответствии со стратегическими директивами Центральной военной комиссии наши войска на рассвете начали комплексную военную операцию в районе Токио. Используя комплексный оперативный подход трех служб, мы нанесли по району Токио высокоинтенсивный удар полного спектра.\n\nНаши боевые группы ВМС установили электронное подавление ключевых зон с заданных морских позиций, применяя корабельные ракеты и торпеды для точного уничтожения прибрежных военных объектов в Токио. Одновременно смешанные соединения ВВС вели непрерывные воздушные бомбардировки. Затем воздушно-десантные подразделения осуществили крупномасштабное парашютное десантирование несколькими волнами в заранее выбранные зоны в пригородах Токио, быстро захватив несколько стратегических позиций.\n\nДесантно-штурмовые подразделения начали форсированную высадку в нескольких точках вдоль Токийского залива и залива Сагами. Бронетанковые и механизированные пехотные части быстро продвигались вглубь страны, нанося удары непосредственно по центру города. Следуя заранее разработанному оперативному плану, Токио был разделен на несколько боевых зон, что позволило планомерно уничтожать оставшиеся силы противника.\n\nНа момент подготовки данного отчета весь район Токио полностью контролируется нашими войсками. Основная часть сил самообороны противника была уничтожена, а остатки потеряли всякую способность к организованному сопротивлению. Оставшиеся стычки близятся к завершению."
 china.446.a: "Следующий шаг: освобождение всей Японии!"
 china.447.t: "Отчет о Битве в Осаке"
 china.447.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nВ соответствии с заранее разработанным планом, за 72 часа до начала операции наши силы начали превентивные действия, направленные на критически важные узлы коммуникационных сетей, систем командования и управления и платформ обмена разведывательной информацией Сил самообороны Японии. Кибератаки оказались весьма эффективными, в результате чего командные системы Сил самообороны Осаки были парализованы, нарушена связь между подразделениями и нейтрализованы возможности ситуационной осведомленности. \n\nПеред высадкой наши ракетные войска нанесли множество точных ударов по военным целям в районе Осаки, включая радиолокационные станции, ракетные площадки и командные центры, уничтожив большинство систем раннего предупреждения и ПВО противника дальнего действия.\n\nОперации по высадке начались на плацдарме Идзуми-Сенджу в северной части залива Осака под прикрытием интенсивной огневой поддержки. Из-за беспорядка в командной структуре противника подразделения береговой обороны реагировали вяло и не смогли организовать эффективное сопротивление. Наши войска быстро прорвали оборону плацдарма, создали безопасную зону высадки и продвинулись в нескольких направлениях к городу. Благодаря длительному воздействию кибератак и постоянным огневым ударам сопротивление противника значительно ослабло. Некоторые подразделения Сил самообороны массово сдались, хотя их остатки продолжают вести спорадическое преследование, используя окружающую местность.\n\nВ настоящее время наши силы проводят комплексную зачистку города Осака, чтобы уничтожить оставшиеся силы противника, а также преследуют бегущие силы самообороны, чтобы предотвратить их перегруппировку."
 china.447.a: "Теперь до Киото рукой подать!"
 china.448.t: "Отчет о Битве в Дели"
 china.448.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nВ соответствии с заранее разработанным оперативным планом, наши силы в координации с пакистанской армией начали ночью клещевое наступление на индийскую столицу Нью-Дели. Наши силы предприняли основное наступление с северного фронта, в то время как пакистанская армия проводила отвлекающие и сдерживающие маневры на южном фронте, чтобы задействовать основную часть индийских сил.\n\nПод прикрытием поддержки ВВС наши силы успешно прорвали индийскую оборону вдоль линии Мирут - Хапур. Используя современные беспилотные системы и другое интеллектуальное оружие, мы нанесли точные удары по индийским войскам. На южном фронте пакистанская армия начала ожесточенное наступление, эффективно отвлекая и сковывая индийские подкрепления, тем самым задерживая их ответ на наше северное продвижение.\n\nСейчас битва перешла в самую сложную стадию: городскую войну в пределах Нью-Дели. Густонаселенность города, сложная архитектура и узкие улицы позволили индийским войскам оказать сопротивление, используя здания и систему метро. Они также установили множество самодельных взрывных устройств и блокпостов. Кроме того, по сообщениям, индийские силы взяли в заложники значительное число гражданских лиц, что серьезно осложнило наше продвижение.\n\nВ ответ на это мы адаптировали нашу стратегию, сделав приоритетом проникновение мелкими подразделениями, точное уничтожение и целенаправленные тактические операции, чтобы свести к минимуму сопутствующий ущерб и жертвы среди гражданского населения.\n\nНаши силы будут продолжать неуклонно продвигаться вперед в соответствии с оперативным планом, стремясь полностью обезопасить и освободить Нью-Дели в кратчайшие сроки."
 china.448.a: "Хасан принят, возвращаемся на базу."
 china.449.t: "Отчет о Битве в Киото"
 china.449.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому:Центральному Военному Совету\n\nВ соответствии с заранее разработанным оперативным планом наши войска совершили клещевой маневр, нацеленный на Киото. Основные штурмовые силы успешно прорвали многочисленные оборонительные рубежи, созданные японскими войсками на подступах к Осаке. Сегодня в 3:00 утра наша бронетанковая ударная группа захватила город Такацуки и быстро продвинулась вдоль шоссе и главной линии Кэйхан, нацелившись непосредственно на юго-восточные ворота Киото.\n\nНа фронте горы Хиэй наши силы закрепились на возвышенности и успешно подавили все ключевые маршруты, ведущие в городскую зону Киото. Используя свои преимущества в горной войне, наши войска применяют тактику проникновения мелкими подразделениями и флангового удара, чтобы окружить и изолировать вражеские силы. В настоящее время наши части продвигаются к центру Киото, координируя свои действия с южными войсками, наступающими из Осаки, чтобы сформировать "клещи" с севера на юг.\n\nНаши войска сохранят текущий темп наступления и начнут окончательный штурм Киото. Ожидается, что город будет полностью взят в течение следующих 24 часов, а оставшиеся силы японского сопротивления полностью уничтожены."
 china.449.a: "Враг у Кинкаку-дзи!"
 china.450.t: "Отчет о Битве в Гуанчжоу"
 china.450.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nПо состоянию на вторую половину дня, наши силы ведут интенсивные бои с ОДТО уже более нескольких десятков часов. Последняя ситуация выглядит следующим образом:\n\nВраг установил контроль над большей частью Гуанчжоу, включая районы Юэсю, Ливан и Хайчжу. Их стремительное продвижение, используя превосходство на море и в воздухе, оказало сильное давление на наши оборонительные силы.\n\nНаши войска понесли значительные потери в живой силе и технике. Оставшиеся войска под огромным давлением отступают в районы Байюнь, Тяньхэ и Хуанпу, используя сложный рельеф и городские структуры для создания новых оборонительных позиций. В настоящее время вдоль оси Северного проспекта Гуанчжоу предварительно сформирована полукруглая оборонительная линия, протянувшаяся на восток от Лонгдуна до запада у Тонгэ.\n\nКомандный центр района Тяньхэ успешно установил связь с обороняющимися частями района Байюнь, обеспечив единое оперативное командование. Ближайшая цель - удержать позиции, задержать наступление противника и обеспечить время для подкрепления.\n\nНесмотря на подавляющую огневую мощь и превосходство противника в воздухе, наши войска сохраняют стойкость. Оборонительные подразделения активно организуют контратаки, используя сосредоточенную огневую мощь для преследования и замедления продвижения противника. Однако давление на оборону остается исключительно высоким."
 china.450.a: "Гуанчжоу должен быть удержан любой ценой!"
 china.451.t: "Отчет о Шанхайской Битве"
 china.451.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому:Центральному Военному Совету\n\nТекущая ситуация на Шанхайском театре военных действий крайне критична. Враг захватил контроль над большей частью города, а наша оборонительная система серьезно подорвана. Ситуация находится на грани краха. Конкретные детали таковы:\n\nИспользуя морское и воздушное превосходство, а также стратегические преимущества, противник осуществил многочисленные прорывы. Теперь они занимают ключевые районы Пудун, Хуанпу, Хункоу, Янпу, Баошань и Миньхан, и продвигаются в район Пукси. Их войска продвигаются к Цзядин и Цинпу, а также окружают остров Чунмин.\n\nПосле продолжительных напряженных боев наши основные силы понесли тяжелые потери. Оставшиеся войска были разделены на две группы:\n\nОстров Чунмин:\n\nПриблизительно одна бригада отступила на остров Чунмин, полагаясь на рельеф острова и прибрежные укрепления, чтобы оказать сопротивление. Связь с командованием прервана. Противник мобилизует десантно-штурмовые подразделения для подготовки к полномасштабной атаке на остров.\n\nЛиния Сунцзян-Цинпу:\n\nОсновные оставшиеся силы занимают оборонительную линию вдоль Сунцзян и Цинпу, пытаясь остановить продвижение противника на запад и сохранить контакт с тылом. Однако эта группа сталкивается с окружением на нескольких фронтах. Из-за недостаточного количества тяжелой техники и отсутствия поддержки с воздуха оборона находится под серьезным напряжением, что делает положение крайне шатким."
 china.451.a: "Восточная жемчужина не должна пасть!"
 china.452.t: "Отчет о Пекинском Сражении"
 china.452.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому:Центральному Военному Совету\n\nС момента начала полномасштабного наступления противника наши войска, опираясь на заранее подготовленные оборонительные позиции, оказывали решительное сопротивление. Однако из-за подавляющей огневой мощи противника, абсолютного превосходства в воздухе и преимущества в мобильности бронетехники на равнине мы были вынуждены постепенно отходить и укреплять оборону.\n\n Мы потеряли контроль над ключевыми районами, включая Дунчэн, Чаоян, Хайдянь, Фэнтай и Шицзиншань. Также пали такие пригородные районы, как Тунчжоу, Даксин, Шуньи, Чанпин, Фаншань и Ментоугоу. Авангард противника продвинулся вдоль оси проспекта Чанъань, а его основные силы непрерывно вливаются в центр города со всех сторон.\n\nНаши оставшиеся силы, включая Пекинский муниципальный корпус вооруженной полиции и мобилизованные отряды ополчения, насчитывают около 30 000 человек. Эти силы в настоящее время перегруппированы вокруг оборонительного периметра, сосредоточенного на Фусинмэнь, простирающегося на север до Сичжимэнь, на юг до Сюаньвэнь, на запад до Второй кольцевой дороги и на восток вокруг Чжуннаньхай и Большого народного зала, образуя последнюю линию обороны."
 china.452.a: "Мы будем сражаться до последнего человека."
 china.453.t: "Доклад о Ситуации в Северной Корее"
 china.453.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nНа данный момент южнокорейские войска подтвердили взятие Пхеньяна, понеся большие потери. Военно-воздушные силы страны провели длительные высокоинтенсивные бомбардировки столицы, что привело к значительным потерям среди личного состава Корейской народной армии и нанесло большой ущерб инфраструктуре. Несмотря на ожесточенное сопротивление северокорейских войск в городах, южнокорейские сухопутные войска медленно продвигались вперед, неся при этом значительные потери.\n\nГенеральный штаб КНА и Ким Чен Ын успешно переместились в район Синыйджу у реки Ялу, где они продолжают организовывать и командовать операциями. После падения Пхеньяна основные силы КНА не были уничтожены полностью, а организованно отступили в северные горные районы. Там они используют местность для ведения партизанской войны и проведения разрушительных атак.\n\nХотя падение Пхеньяна укрепило боевой дух южнокорейцев, их войска понесли значительные потери в личном составе и технике, что потребовало срочного пополнения запасов и перегруппировки. Один контингент южнокорейских войск медленно продвигается вдоль западного прибрежного шоссе, направляясь на север. Другой контингент продвигается на северо-восток вдоль восточного побережья, его вероятными целями являются такие промышленные узлы, как Хамхун и Чонджин."
 china.453.a: "Еще один 19 октября."
 china.454.t: "Доклад о Ситуации в Пакистане"
 china.454.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nНа сегодняшний день индийские военные добились значительных успехов. Спутниковая разведка и многочисленные новостные источники подтверждают, что индийские войска полностью преодолели пакистанские оборонительные рубежи, окружающие Исламабад. Передовые бронетанковые части достигли окраин города.\n\nЗаписи с беспилотников показывают, что пакистанская оборонительная линия к югу от Равалпинди была прорвана прошлой ночью. Под покровом темноты индийские войска начали интенсивный обстрел пакистанских позиций с использованием тяжелой артиллерии и реактивных систем залпового огня. После этого бронетанковые подразделения возглавили штурм, прорвав оборонительные рубежи. Прорвав оборону, индийские войска продолжили наступление на Исламабад без паузы. Попытки пакистанских военных организовать контратаки провалились из-за дезорганизации командных структур и повсеместной дезинтеграции сил.\n\nВ настоящее время ведущие индийские подразделения находятся примерно в 10 километрах от центра Исламабада. По сообщениям, разведывательные подразделения вступают в спорадические стычки с пакистанскими силами на окраинах города. Анализ показывает, что полномасштабное наступление индийских войск на Исламабад может произойти в течение следующих 24 часов."
 china.454.a: "Хасан не сможет больше вернуться."
 china.455.t: "Доклад о Ситуации в Северной Корее"
 china.455.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nНа сегодняшний день Корейская народная армия успешно установила полный контроль над Южной Кореей. Крупные города бывшего марионеточного режима "Южной Кореи", включая Сеул, Пусан, Инчхон, Тэгу и Кванджу, теперь находятся под флагом Корейской Народно-Демократической Республики. Сухопутные войска КНА быстро укрепляют захваченные территории, проводят зачистки и стабилизационные операции.\n\nНебольшое количество остатков южнокорейских военных отступили в горные районы, в основном в провинциях Северная Кёнсан и Южная Чолла. Численность этих сил оценивается в несколько тысяч человек, они не имеют тяжелого вооружения и материально-технической поддержки и не представляют значительной угрозы для районов, контролируемых КНА. КНА развернула целенаправленные силы для окружения и ликвидации этих остатков, причем полное уничтожение ожидается в ближайшее время.\n\nВоенная кампания привела к решающей победе, и цель объединения Корейского полуострова под властью КНДР, по сути, достигнута."
 china.455.a: "На Корейском полуострове восстановлен мир."
 china.456.t: "Отчет о Ситуации в Индии"
 china.456.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nПосле поражения Индии в индо-пакистанской войне внутренняя ситуация в стране стремительно ухудшилась. Авторитет и легитимность администрации Нью-Дели подвергаются беспрецедентной проверке, а в правящей коалиции возникают внутренние трещины, что приводит к неэффективному управлению. Правительство финансово ослаблено военными расходами и репарациями, что делает его неспособным справиться с нарастающим внутренним кризисом.\n\nПравительства регионов используют возможность расширить свои полномочия, открыто бросая вызов центральным директивам или сопротивляясь им. Националистические настроения растут, а сепаратистские движения набирают обороты, особенно в Ассаме, Западной Бенгалии и Тамилнаде, где отмечаются беспорядки разной степени интенсивности.\n\nВ некоторых регионах стала очевидной тенденция к милитаризации и военщине. Местные вооруженные группировки все чаще выходят из-под центрального контроля, создавая зоны фактической автономии.\n\nВнутренняя стабильность в Индии находится на грани краха, и ее дальнейшая траектория развития в значительной степени неопределенна. Мы будем внимательно следить за ситуацией и своевременно информировать Центральную военную комиссию."
 china.456.a: "Внимательно следите за границей, не позволяйте их хаосу перекинуться сюда."
 china.457.t: "Освобождение Диссидентов"
 china.457.d: "Недавно Всекитайское собрание народных представителей рассмотрело и приняло "Постановление об объявлении специальной амнистии некоторым лицам, находящимся в заключении." Собрание пришло к выводу, что в целях соблюдения принципов всеобъемлющего верховенства закона и гуманизма, а также в соответствии с Конституцией Китайской Народной Республики, предоставление специальной амнистии некоторым лицам, находящимся в заключении, является необходимым и целесообразным. В решении говорится:\n\n1. Следующие категории заключенных будут освобождены после законного решения Народного суда:\n\n(1) Адвокаты, писатели, журналисты и другие лица, которые до заключения под стражу активно участвовали в защите основных гражданских прав, включая, но не ограничиваясь свободой слова, собраний и религии, и впоследствии были приговорены к тюремному заключению.\n\n(2) Лица, которые до своего задержания законно выражали мнения или предложения по национальным политическим, экономическим или социальным вопросам и впоследствии были приговорены к тюремному заключению.\n\n(3) Лица, которые до своего задержания активно участвовали в продвижении социальной справедливости, честности и развития демократии и верховенства закона, и впоследствии были приговорены к тюремному заключению.\n\n(4) Лица, осужденные по главам 2, 3 и 8 Уголовного закона КНР, за исключением преступлений, связанных с хищением и взяточничеством, и приговоренные к лишению свободы на срок менее трех лет, с остатком наказания менее одного года, или приговоренные к контролю, содержанию под стражей или испытательному сроку.\n\n2. Для лиц, амнистированных по пунктам (1), (2) и (3):\n\nСоответствующие государственные ведомства должны обеспечить надлежащее переселение и предоставить соответствующую экономическую компенсацию в соответствии с законом. Конкретные меры по компенсации будут отдельно сформулированы Государственным советом."
 china.457.a: "Победа демократии!"
 china.458.t: "Возвращение Домой"
 china.458.d: "Утренний солнечный свет проникал сквозь железные прутья, рассыпая по полу тонкие пятна света. Сюй Чжиюн смотрел на эти осколки света, внезапно вспоминая утро 2023 года, когда он и не подозревал, что так надолго расстанется со свободой.\n\nСкрип открываемой железной двери прервал его мысли. Он вспоминал детские моменты, когда играл с друзьями во дворе, - воспоминания, которые всегда навещали его в ранние часы, как старый друг, не желающий уходить. Шаги охранника разрушили его задумчивость, принеся с собой слово, которое он почти забыл, как представить: свобода.\n\n"Господин Сюй, вам объявлена амнистия."\n\nСюй Чжиюн поднял голову, его глаза расфокусировались. Он увидел, что документ в руке охранника слегка подрагивает - или это его зрение было неустойчивым?\n\n"Что вы сказали?" - спросил он сам себя, его голос был незнакомым, как будто принадлежал другому времени и месту. Охранник терпеливо повторил слова и протянул ему документ.\n\nВ третий раз Сюй проследил пальцами за каждым словом на бумаге. Он вдруг понял, что за эти годы забыл вкус свободы - так же, как человек, живущий в глубинах океана, может забыть тепло солнечного света.\n\nСобирая свои вещи, он заметил, как их было мало, но как много эмоций они в себе несли. Потрепанный экземпляр "Введения в конституционное право", несколько выцветших семейных писем и старые, тщательно отполированные очки.\n\nСтоя на пороге своей камеры, Сюй Чжиюн колебался. Его удерживал не страх, а неуверенность. Нескольких лет было достаточно, чтобы перевернуть мир с ног на голову, а внезапно обретенная свобода не давала ему уверенности в том, как встретить столь незнакомый мир."
 china.458.a: "С трудом завоеванная свобода."
 china.459.t: "Письмо"
 china.459.d: "Центральному комитету Коммунистической партии Китая и Государственному совету,\n\nОт имени партийного комитета провинции Гуандун и правительства провинции я с уважением представляю следующие предложения по дальнейшему углублению демократических реформ и смиренно прошу Центральное правительство рассмотреть их.\n\nНаша страна добилась значительного прогресса в демократическом управлении, институциональные системы постоянно совершенствуются. Однако мы также должны признать, что по сравнению с растущими демократическими устремлениями народа, в нашем политическом развитии все еще есть недостатки. Например, в некоторых местных департаментах мнение общественности игнорируется в процессе принятия решений, механизмы контроля остаются неразвитыми, а защита демократических прав еще недостаточна. Эти проблемы в определенной степени ограничивают жизнеспособность общества и влияют на авторитет и эффективность правительства.\n\nПоэтому я считаю, что в нынешних исторических условиях мы должны подходить к реформам с большей смелостью и мудростью, активно и осмотрительно продвигая и углубляя реформы для дальнейшего развития социалистической демократии.\n\nЯ уверен, что под руководством партии и с твердой решимостью мы сможем выстроить демократический путь, который соответствует национальным условиям Китая и отражает китайские особенности. Разумеется, это лишь мои личные, предварительные соображения, и я искренне приветствую рекомендации и поправки со стороны Центрального правительства.\n\nНаконец, я хотел бы подчеркнуть: реформа ради частной выгоды - это не настоящая реформа, а реформа ради общественного блага. Наши усилия по продвижению демократических реформ направлены не на удовлетворение западных представлений об "общечеловеческих ценностях", не на личную выгоду, а на то, чтобы лучше осознать роль народа как хозяина страны, защитить его фундаментальные интересы, стимулировать национальное развитие и социальный прогресс.\n\nС уважением, ваш,"
 china.459.a: "Ван Вэйчжун"
 china.460.t: "Прощание с Эпохой Однопартийного Правления"
 china.460.d: "Сейчас, когда в Большом зале народных собраний в Пекине проходит новая сессия Всекитайского собрания народных представителей, политический ландшафт одной из ведущих экономик мира претерпевает историческую трансформацию. В отличие от предыдущих лет, в работе собрания больше не участвуют только члены Коммунистической партии. Представители различных демократических партий теперь принимают беспрецедентное участие в обсуждении национальной политики.\n\nСогласно статистике, представленной на сессии, доля мест, занимаемых представителями демократических партий, достигла 45%, что значительно больше, чем 15% пять лет назад. "Это знаменует глубокие политические изменения в Китае", - отметил профессор Лян, политолог из Фуданьского университета.\n\nВ ходе утреннего заседания представители демократических партий предложили множество предложений по реформе здравоохранения и равенству в образовании, которые получили широкую поддержку. Такое развитие событий было почти немыслимо на прошлых сессиях Всекитайского собрания народных представителей.\n\nОднако преобразования также вызвали споры. Некоторые ветераны Коммунистической партии выразили обеспокоенность, утверждая, что усиление плюрализма может привести к политической нестабильности. С другой стороны, демократические партии утверждают, что эти изменения жизненно необходимы для долгосрочного развития Китая. Они считают, что подлинный политический плюрализм необходим для решения сложных проблем современного мира."
 china.460.a: "Так начинается путь к демократии!"
 china.461.t: "Новая Надежда"
 china.461.d: "В вегетарианском ресторане при храме Фурон Лю Шаоцин держал чашку чая Лонгцзин, наблюдая, как чайные листья поднимаются и опускаются в стакане. Напротив него Ху Цзюньхань неторопливо попыхивал сигаретой Мальборо, пепел в подносе накапливался в такт его словам.\n\n"Ху, ты помнишь приборостроительный завод Хунци на севере?" Лю осторожно отхлебнул чай, его взгляд устремился сквозь пар к пагоде за окном. "В те времена у их манометров были кривые иглы, а негерметичные уплотнения были обычным делом. Но, так или иначе, они тонули в заказах"\n\nХу сделал глубокую затяжку, и дым образовал слабую завесу между ними. "В Блюстаре на юге было то же самое", - сказал он. "Помню, в один год я видел, как один из их инспекторов бил молотком по циферблату, говоря, что это для 'точной калибровки.' Северный Хунци, южный Блюстар - одна и та же ерунда." При этих словах оба мужчины засмеялись.\n\nОтставив чай, Лю сказал: "Именно. Пока они были под государством, каким бы плохим ни был продукт, люди всегда выстраивались в очередь, чтобы купить его. А сейчас?" Он сделал паузу. "Рынок - как волшебное зеркало, он обнажает все недостатки..."\n\nХу затянулся сигаретой, пепел аккуратно упал в поднос. "Времена, конечно, изменились. Кто бы мог подумать, что эти некогда неприкасаемые гиганты пошатнутся в волнах рынка? Но, честно говоря, это стало замаскированным благословением для таких частных компаний, как наша."\n\nОфициант принес тарелку жареного риса с грибами, легкий аромат которого пробивался сквозь затяжной дым. Лю налил себе еще одну чашку чая. "С годами я понял одну вещь: опора на горы приведет к оползням, а опора на людей оставит тебя на мели. Настоящее мастерство - вот единственный фундамент, на котором стоит строить.""
 china.461.a: "Наконец-то народ получил шанс подняться."
 china.462.t: "Пей сегодня, волнуйся завтра"
 china.462.d: ""Как бизнес поживает, Лю?" Ху Цзюньхань прикурил сигарету "Ланьчжоу", дым лениво вился между ними. Лю Шаоцин откупорил свежую бутылку "Снежного пива" и добавил ее к растущей куче пустых бутылок на пластиковом столе.\n\n"Даже не поднимай эту тему", - сказал Лю, сделав большой глоток. "На прошлой неделе мы получили заказ на пять миллионов юаней, но его отклонили. Они сказали, что мы не сертифицированы по какой-то программе отраслевого альянса и не можем участвовать в тендере. Разве это не смешно?"\n\nПродавец барбекю прибыл с тарелкой шипящих бараньих шампуров, аромат которых смешивался с отдаленным гулом грузовиков из промышленного парка. Лю взял шампур и откусил кусочек. "Знаешь, что больше всего бесит? Все эти так называемые отраслевые союзы возглавляют государственные компании. В этом году они ввели еще одно правило - сказали, что это для предотвращения 'порочной конкуренции.' Теперь каждая компания получает годовой лимит производства."\n\n"Да, я слышал об этом", - сказал Ху, стряхивая пепел на пустую пивную бутылку. "И теперь даже сырье приходится закупать у определенных поставщиков. Цены на 30% выше рыночных, и нужно вносить предоплату. Если это не монополия, то я уже не знаю, как это называть."\n\nЛю выпустил горький смешок. "А еще есть система регистрации продукции. Теперь каждый раз, когда мы разрабатываем новый продукт, он должен быть одобрен их техническим комитетом. В прошлом месяце я представил новый дизайн цифрового манометра, но его сразу же отклонили. Они сказали, что он 'не соответствует целям развития отрасли'".\n\n"Вся эта политика," - сказал Ху, покачав головой, - "направлена на то, чтобы удержать в игре неэффективные крупные компании. Наша продукция лучше, дешевле и быстрее поставляется, но мы все равно не можем получить крупные заказы."\n\nУличный свет отбрасывал на их лица усталый отблеск. Лю поднял свою бутылку пива. "Забудь об этом. Давай лучше выпьем. За годы работы я понял, что жалобы ни к чему не приведут. Мы просто должны найти способ выжить в этих развалинах.""
 china.462.a: "Наслаждайся моментом"
 china.463.t: "Отчет о Битве в Тайбэе"
 china.463.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nКому: Центральному Военному Совету\n\nРано утром, под прикрытием сосредоточенных огневых средств, наши войска начали полномасштабное наступление на город Тайбэй. Несмотря на то, что противник уничтожил все внешние транспортные узлы, включая мост Гуанду, и опирался на городскую местность для ведения уличных боев, наши войска успешно прорвали его оборону и захватили ключевые стратегические пункты в Тайбэе.\n\nНа данный момент наши войска в основном завершили освобождение города Тайбэя. Однако значительная часть вражеских войск отступила к горным массивам Янминшань и Снежная гора, продолжая оказывать сопротивление. Кроме того, туннель Снежной горы был разрушен противником, что отрезало все пути в восточную часть Тайваня. В результате на ближайших этапах наши оперативные действия будут переключены с городских боев на горные."
 china.463.a: "Мы должны освободить Тайвань!"
 china.464.t: "Загляните в Царство Сегодняшнего Дня"
 china.464.d: ""Джентльмены, прошу обратить ваше внимание на это. После начала гражданской войны в США, которая вывела из строя GPS и нарушила работу коммуникационных сетей, это самая подробная карта текущей ситуации, которую нам удалось составить"\n\nМолодой помощник сделал паузу, когда карта обновилась. На ней изображены различные территории, контролируемые местными правительствами, полевыми командирами и сепаратистскими группировками, каждая из которых отмечена разными цветами. Стрелки указывают на передвижение этих сил, а также на последние очаги конфликта. По залу прокатилась волна тихих обсуждений.\n\n"Теперь перейдем к Европе. После ухода Путина отношения между новым правительством России и Европейским союзом неуклонно ухудшались. Брюссель и Москва сейчас находятся в напряженном противостоянии." Он переключил презентацию на спутниковые снимки высокого разрешения, показывающие массированное наращивание танков, артиллерии и самолетов в Прибалтике и на Украине.\n\n"Растущая глобальная нестабильность будет оказывать еще большее давление на нас, чтобы ускорить экономические преобразования и противостоять надвигающимся кризисам", - сказал премьер, его тон был тяжелым и озабоченным.\n\n"Однако, по мере изменения глобального ландшафта, стабильность Китая позволит нам проводить более активную внешнюю политику и использовать возможности на мировой арене", - возразил министр иностранных дел, предлагая более оптимистичный взгляд.\n\n\n\n"Ключевой вопрос," - вмешался президент Си, - "заключается в том, что в дипломатии мы должны не только сравнивать относительную силу наций, но и понимать само искусство дипломатии. Товарищи, настало время скорректировать наш подход и принципы во внешней политике.""
 china.464.a: "Чья империя изображена на нем?"
 china.465.t: "Революция за Океаном"
 china.465.d: "С тех пор как пламя гражданской войны стремительно охватило Соединенные Штаты, наши дипломатические каналы подтвердили ключевую информацию: под руководством "Американской народно-освободительной армии" в Калифорнии установился относительно стабильный общественный порядок. Используя свои экономические и стратегические географические преимущества, она быстро превратилась в ключевую силу, определяющую политические преобразования в Америке, и стала важнейшим фактором в определении будущей траектории развития страны.\n\nПосле обсуждения и анализа в Политбюро было принято решение о создании всеобъемлющего стратегического партнерства с АНОА. Этот шаг имеет огромное значение для защиты наших основных дипломатических интересов и расширения нашего глобального влияния. От экономики и технологий до военного сотрудничества, это партнерство, как ожидается, значительно укрепит наше положение на мировой арене.\n\nМинистерство иностранных дел в настоящее время разрабатывает прагматичную структуру сотрудничества. Ключевые инициативы включают в себя модернизацию инфраструктуры прибрежных портов Калифорнии, восстановление поврежденных дорог, электросетей и систем связи, а также направление консультативных групп в вооруженные силы АНОА для проведения передовой тактической подготовки и модернизации оборудования."
 china.465.a: ""Маршируйте вперед вместе с единомышленниками.""
 china.466.t: "Законное Правительство Калифорнии"
 china.466.d: "Информационное бюро Госсовета провело сегодня пресс-конференцию, на которой официально объявило, что Китайская Народная Республика признает правительство Американской народно-освободительной армии в качестве единственного законного представителя США.\n\nС момента установления своего режима в Калифорнии правительство АНОА придерживается основополагающего принципа "правительство народа, от народа и для народа." Эта политическая философия нашла широкую поддержку во всех слоях американского общества, от технологов Силиконовой долины до фермерских рабочих.\n\nПредставитель Министерства иностранных дел Китая заявил, что участие правительства АНОА в инициативе "Пояс и путь" отражает общую волю китайского и американского народов. На недавно завершившемся Форуме стратегического сотрудничества Китая и США стороны достигли многочисленных договоренностей о содействии новой эре процветания и развития. АНОА выразила свою приверженность всестороннему сотрудничеству с Китаем в области высоких технологий, военного производства и инфраструктуры, направленному на совместное обеспечение регионального мира и стабильности. Пресс-секретарь подчеркнул, что признание Китаем правительства АНОА основано на уважении к воле американского народа."
 china.466.a: "Новая глава в китайско-американских отношениях."
 china.467.t: "Визит Контингента"
 china.467.d: "Визит делегации АНОА в Пекин начался с жестких рукопожатий и принужденных улыбок. Под возвышающимися красными знаменами их несочетаемое окружение - частично единство, частично идеологическая граната - было невозможно игнорировать.\nАнархисты, одетые в черные толстовки и боевые ботинки, неловко переминались под пристальными взглядами постоянно присутствующих камер. "Здесь просто воняет бюрократией", - пробормотал один из них, когда они проходили мимо тщательно отрепетированного марша рабочих. Их настроение еще больше испортилось во время экскурсии по заводу, когда они наблюдали, как тысячи людей молча трудятся под строгим надзором. "Освобождение? Это тюрьма, выкрашенная в красный цвет"\nЯкобинцы, в отличие от них, были в восторге. Калеб Мопин уверенно шел впереди, скрестив руки и одобрительно кивая головой, пока их гид восхвалял достоинства китайского пролетариата."Это будущее", - шептал он, фотографируя каждый мурал и парад. Когда они открыли возвышающуюся статую Мао, Мопин стоял неподвижно, глаза блестели от благоговения. "Это то, за что мы боремся"\nСостав ПСО имел нейтральное выражение лица, как у людей, подавляющих критику. "Эффективно", - заметил один из них после наблюдения за огромной сборочной линией, но в его голосе сквозило беспокойство. "Но это... наблюдение, оно кажется... чрезмерным." Их беспокойство усилилось, когда они проходили мимо общежитий, где вереницы рабочих молча маршировали обратно в свои комнаты.\nДелегация ДСА была совершенно растеряна. Неловкие улыбки застыли на их лицах, они пытались сориентироваться в этом чужом мире. "Это... мило", - пробормотал один из них, слабо жестикулируя на маоистскую фреску с крестьянами, рвущимися в бой. Полусерьезная попытка обсудить рабочие советы была встречена пустым взглядом и ликующим восхищением якобинца плакатом Дэн Сяопина.\nЗа ужином напряжение спало, пока звучали речи о "глобальной солидарности". Мопин поднял бокал, провозглашая славу революции, в то время как анархисты смотрели в свои тарелки, члены ПСО обменивались тихими взглядами, а ДСА нервно тыкали пальцем в голову своей "Утки по-пекински.""
 china.467.a: "Единство в Борьбе?"
 china.468.t: "Американо-китайский отчет о действиях 005"
 china.468.d: "ФАЙЛ: bilibilimsg40123317.txt\n[СТЕНОГРАММА ОТКРЫТА]\n\nFifthSwordWarrior: "Здравствуй, товарищ! Я хочу поговорить с вами о мысли Гонсало и о том, как его путь может быть применен к революционной работе в Китае. Революционный привет из Соединенных Штатов!"\nWangJieSeesRed: Здравствуй. Я слышал о Гонсало. Он занимается сельскими районами, верно? Затяжная война? Но сейчас, когда Китай очень современный и повсюду города, сельской революции нет, верно?\nFifthSwordWarrior: Да, но "Мысль Гонсало" - это не только сельская война, это основа для адаптации маоизма к современным условиям. Речь идет о реорганизации общества с целью расширения прав и возможностей пролетариата и нанесения ударов по капиталистическим структурам. "Важной Частью" не обязательно должны быть буквально сельскохозяйственные угодья; это может быть любое место, контролируемое массами.\nWangJieSeesRed: Но ведь Китай теперь говорит, что он социалистическая страна, верно? Маркс, Ленин и Мао были в этой системе. Зачем нам Гонсало?\nFifthSwordWarrior: При всем уважении, товарищ, нынешний китайский "социализм" - это форма ревизионизма. Истинный маоизм был затушеван. Мысль Гонсало учит нас, как разоблачить это и возродить силу народа.\nWangJieSeesRed: Но как использовать Мысль Гонсало? Можно ли использовать его в городе? Это не похоже на что-то близкое к нам.\nFifthSwordWarrior: Конечно! Мы должны адаптировать его стратегию "Народной войны" к городским условиям. Например, организовать рабочих, студентов и простых людей в трущобах. Эти места - новые фронты сражений.\nWangJieSeesRed: Что ж, это имеет смысл. Возможно, мне придется прочитать побольше о Гонсало. Есть ли какие-нибудь интересгые материалы?\n[КОНЕЦ СТЕНОГРАММЫ]"
 china.468.a: "Отслеживайте все Аккаунты американских партнеров."
 china.469.t: "Объявление о Революции"
 china.469.d: "Камера слегка покачивалась, пытаясь приспособиться к бликам полуденного солнца. Калеб Мопин стоял в центре кадра, на его фоне было жутко спокойное поле для гольфа в Анахайме. Нетронутые зеленые поля казались совершенно иными, чем хаос, царящий в других местах. Одетый в выцветший красный берет и чистую белую рубашку, он стоял за импровизированным подиумом, а измененные звезды и полосы - теперь украшенные серпом и молотом - мягко развевались на теплом калифорнийском ветерке.\n"Товарищам по всему Тихому океану, нашим китайским братьям и сестрам, которые смотрят это," - начал Мопин без колебаний, его тон был нарочитым и непоколебимым. "Сегодня я обращаюсь к вам не только как организатор, но и как солдат в борьбе с тиранией."\nЕго рука сделала резкий жест в сторону флага позади него. "Мы создали Американскую народно-освободительную армию, чтобы отвоевать эту нацию у олигархов и фашистов", - объявил он. "Это не просто национальная борьба - это часть глобальной борьбы за освобождение рабочего класса"\nКороткое панорамирование камеры показало разношерстную группу новобранцев, стоящих полукругом. Несоответствующая форма и старые АК-47 выдавали их неопытность. Лица напряжены, они пытаются сохранить самообладание под объективом. Камера быстро вернулась к Мопину, и он продолжил съемку.\n"За пролетариат всего мира!" - провозгласил он, подняв сжатый кулак. Его голос отдавался слабым эхом, конкурируя с гулом поливальных машин и далеких гольф-каров. Видео резко закончилось, перейдя в плохо смонтированный логотип АНОА. Серп и молот мелькали на экране, сопровождаемые низкокачественным, но оглушительным исполнением "Интернационала"\nЗа несколько часов после загрузки видео стало сенсацией на стриминговых платформах. Разделы чатов были наводнены сообщениями солидарности, похвалы, а иногда и недоумения, причем их объем затмевал последние мгновения Мопина на экране.\nВерхний комментарий, грубый и недоуменный, подытожил настроения многих:"
 china.469.a: ""Почему они на поле для гольфа?""
 china.470.t: "Танцы с Медведем"
 china.470.d: "Вспышки фотоаппаратов и звук затвора раздавались как ритмичные удары барабана. Лидеры самых крупных и густонаселенных стран мира приветствовали друг друга теплыми улыбками, крепко сцепив руки. Позади них звучали величественные фанфары и военная музыка, словно бесконечная красная дорожка расстилалась по коридорам и полам большого зала для приемов. Солдаты в богато украшенной униформе стояли во всеоружии, их винтовки крепко держались, когда они отдавали честь главам государств.\n\nДва лидера заняли свои места на противоположных концах знаменитого огромного белого стола. [SOV.GetLeader] начал любезности: "Добро пожаловать в Россию, господин президент. Сегодня начинается новая эра китайско-российской дружбы."\n\n"Спасибо, господин президент", - тепло ответил Си Цзиньпин. "Я поздравляю вас с тем, что вы так блестяще руководите российским народом и делаете Россию еще более процветающей."\n\nВысокопоставленные чиновники и советники из обеих стран постепенно заполнили все места вокруг. В течение последующих часов будут заключены соглашения о военном, дипломатическом, экономическом, культурном и технологическом сотрудничестве. [SOV.GetLeader] был доволен тем, что в разгар эскалации российско-европейского конфликта Китай явно солидаризируется с Россией. Взамен Си и китайское правительство еще больше обезопасят своего северного союзника и укрепят безопасность своего "нефтяного резервуара."\n\nВ последующие дни серия пышных банкетов, парадов и представлений подняла дипломатическую атмосферу между двумя странами на новую высоту и продолжалась до поздней ночи."
 china.470.a: "Объединившись в единое целое, ядро Мирового острова станет непобедимым."
 china.471.t: "Резонируя с Петухом"
 china.471.d: "Под волнующие мелодии "Марсельезы" и "Марша добровольцев" на ветру развевались сине-бело-красный трехцветный флаг и красный флаг с пятью звездами. В окружении чиновников, журналистов и телохранителей молодой президент и пожилой генсек тепло пожали друг другу руки и обменялись приветствиями.\n\n"С возвращением во Францию, господин Си Цзиньпин. Этот визит имеет большое значение для Франции и всей Европы", - торжественно сказал Макрон.\n\n"Франция была первой западноевропейской страной, установившей дипломатические отношения с Китайской Народной Республикой, господин председатель", - любезно ответил Си Цзиньпин. "Для меня большая честь продолжить эту прочную дружбу."\n\nПод управлением лимузинов Citroen и Hongqi, кортеж с высокопоставленными чиновниками обеих стран проехал мимо Триумфальной арки и по Елисейским полям. На протяжении всего пути от аэропорта до дворца Тюильри китайские иммигранты размахивали приветственными транспарантами и флагами обеих стран. Даже в нескольких кварталах от шествия продолжающиеся забастовки, а также дым и шум от несогласных не смогли омрачить общую праздничную атмосферу."
 china.471.a: "Связь между двумя концами Шелкового пути укрепляется с каждым днем."
 china.472.t: "Китай Выступает в Поддержку России"
 china.472.d: "Недавно официальный представитель Министерства иностранных дел Китая сделал громкое заявление на пресс-конференции, сообщив, что председатель КНР Си Цзиньпин посетит Москву. Этот шаг, рассматриваемый как наглядная демонстрация "традиционной дружбы и образцовых отношений между крупными державами", подчеркивает дипломатическую позицию Китая в то время, когда отношения между Россией и Европой стремительно ухудшаются и надвигается военный конфликт. Похоже, что Китай подтверждает свою связь со своим традиционным северным союзником. Москва быстро приветствовала это заявление, в то же время Европейский парламент в Брюсселе инициировал новую волну антикитайских предложений, члены которого подают их и голосуют по ним.\n\nНекоторые дипломатические аналитики предполагают, что решение Китая может быть вызвано растущим недовольством по поводу застопорившегося соглашения о свободной торговле между Китаем и ЕС и частой критикой ЕС в адрес Китая по вопросам прав человека. После распада доминирующей мировой державы в результате гражданской войны в Америке Китай, который многие считают ведущим кандидатом на роль следующей мировой сверхдержавы, похоже, будет играть все более активную роль в мировой дипломатии."
 china.472.a: "Выпьем за российско-китайскую дружбу!"
 china.472.b: "Так мы и думали."
 china.473.t: "Китай выступает в поддержку ЕС"
 china.473.d: "Недавно пресс-секретарь Министерства иностранных дел Китая сделал громкое заявление на пресс-конференции, сообщив, что председатель Си Цзиньпин посетит Европу и встретится с представителями институтов ЕС в Брюсселе. Этот шаг рассматривается как демонстрация "дипломатии крупных стран с китайской спецификой в новую эпоху." Время визита особенно примечательно, учитывая стремительно ухудшающиеся отношения между Россией и Европой, а также нависшую угрозу военного конфликта.\n\nПод руководством президента Франции Макрона, который придерживается дипломатического подхода в стиле де Голля, многие страны Западной Европы тепло приветствовали этот визит. В этот критический момент Китай объединился с развитыми европейскими странами, с которыми он давно стремился укрепить связи, что может потенциально изолировать Москву и привнести новую динамику в геополитический ландшафт Евразии.\n\nПосле краха доминирующей мировой державы в результате гражданской войны в Америке Китай - широко рассматриваемый как ведущий кандидат на роль следующей мировой сверхдержавы - похоже, будет играть все более активную роль в мировой дипломатии."
 china.473.a: "Выпьем за европейско-китайскую дружбу!"
 china.473.b: "Ничего не предпринимая, ничего не получаешь."
 china.474.t: "Китай Сохраняет Нейтралитет"
 china.474.d: "В последнее время позиция Китая на заседании Совета Безопасности ООН в связи с изменением ситуации в Европе привлекла значительное внимание. Предложение представителя Франции о введении дополнительных санкций против России было решительно осуждено российской стороной, а критика Россией "нового европейского колониализма" встретила противодействие со стороны представителей Франции и Великобритании. На фоне этой тупиковой ситуации посол Китая в ООН предпочел не занимать однозначную позицию, подтвердив приверженность Китая национальному суверенитету и территориальной целостности. Китай также призвал все стороны к диалогу на основе принципа "мирного сосуществования"\n\nВ последующих интервью журналистам из разных стран китайские дипломаты подчеркивали, что Китай последовательно придерживается принципов взаимовыгодного сотрудничества и мирного развития. Они вновь заявили, что Китай выступает против империализма, гегемонии и колониализма. Они подчеркнули важность установления нового, более сбалансированного международного порядка для снижения уровня насилия и нестабильности в мире.\n\nПосле распада доминирующей мировой державы в результате гражданской войны в Америке Китай, который многие считают ведущим кандидатом на роль следующей мировой сверхдержавы, похоже, будет играть все более активную роль в мировой дипломатии."
 china.474.a: "Переломный момент."
 china.475.t: "Китай Вводит Торговые Санкции против Нас!" #event for pdto countries
 china.475.d: "Недавно Министерство иностранных дел и Министерство торговли Китая опубликовали заявления о том, что многие наши компании были внесены в список ненадежных организаций и список экспортного контроля в связи с тем, что Китай назвал их "неподобающим поведением" и по другим причинам. В результате Китай ввел ряд мер по значительному повышению тарифов на импорт товаров из нашей страны. Они также наложили запрет на экспорт в нашу страну важнейших стратегических ресурсов, таких как литий, графит, редкие земли, кремний и олово, а также многих дорогостоящих промышленных товаров двойного назначения.\n\nНа личном уровне Китай ввел санкции против широкого круга наших граждан, включая государственных чиновников и предпринимателей. Эти санкции включают запрет на деятельность в Китае их аффилированных или инвестированных предприятий и запрет на их личный въезд, проживание или владение активами в Китае.\n\nЭти широкомасштабные санкции явно являются ответом на недавние дипломатические конфликты между Китаем и нашей страной, корни которых лежат в давних спорах по поводу различных интересов. Китай, как сообщается, разочарован нашей двусмысленной или оппозиционной позицией по таким вопросам, как территориальные споры, права человека и торговля. Они считают, что введение санкций против нашей страны служит предупреждением для других государств, которые политически настроены против Китая, но тесно связаны с ним экономически.\n\nМногие наши правительственные советники выразили серьезную обеспокоенность, отметив, что негативные последствия торговых санкций Китая станут очевидными со временем и их будет трудно смягчить в краткосрочной перспективе. Кроме того, этот шок для нашей промышленной политики может привести к стагнации или даже регрессу в нашем экономическом развитии."
 china.475.a: "Мы найдем способ... правда?"
 china.476.t: "Китай Приглашает Нас в Расширенную Инициативу "Пояс и Путь"!" #event for other countries
 china.476.d: "Когда наш высокопоставленный дипломат в Пекине был вызван в Министерство иностранных дел Китая, характер предложения, ожидавшего его, был неизвестен. Во время встречи один на один с министром иностранных дел Китая, когда они потягивали чай "Да Хун Пао", министр, наконец, изложил свое предложение: "Не хотели бы вы стать участником инициативы "Пояс и путь"?". Потрясенный неожиданной щедростью, наш посол, соблюдая дипломатический этикет, поспешил завершить разговор и вернуться в посольство, чтобы передать это важное предложение в вышестоящие инстанции на родине для принятия окончательного решения.\n\nЭто предложение вызвало бурные дебаты в нашем правительстве. За последние несколько лет китайская инициатива "Пояс и путь" преобразила многие страны Евразии и Африки. Китайские инвестиции и инженерные команды помогли развивающимся и слаборазвитым странам улучшить инфраструктуру, развить города и транспортные системы, создать прибыльные предприятия, а также расширить доступ к образованию и здравоохранению. Инициатива также приглашает к участию экономически развитые страны, стремясь устранить торговые барьеры и способствовать взаимному экономическому развитию. Однако критики утверждают, что инициатива привела к широко распространенным кризисам долговой ловушки и часто сопровождается политическими условиями, что увеличивает риск политического подчинения стран-участниц Китаю.\n\nПосле длительных обсуждений и внутренних переговоров наше правительство решило, что выгоды от присоединения к инициативе "Пояс и путь" перевешивают риски. Приняв это решение, наш посол вернется в Министерство иностранных дел Китая, чтобы сообщить радостную новость с нетерпением ожидающему его министру иностранных дел."
 china.476.a: "Приток юаней приведет к процветанию!"
 china.477.t: "Записки Селюка"
 china.477.d: "Революция действительно отличается от революции в других местах. Выросший в Даляне, я привык к образу председателя Мао, сверкающего на полях пшеницы у городских улиц, тем более после службы в армии. Мой маленький сельский уезд был одним из тех, которые он посетил в 60-е годы. Но с тех пор, как я приехал в Калифорнию в составе интернационалистических бригад, я задавался вопросом, понимал ли я когда-нибудь по-настоящему это слово.\n\nОни были в беспорядке, почти стереотипно американские. На первый взгляд я подумал, что это беженцы, а может, дезертиры. Их черные кожаные куртки, неподходящие ботинки и пирсинг - одни тяжелые и обшарпанные, другие невероятно легкие, больше подходящие для танцпола, чем для поля боя, - все это придавало им инопланетный вид. У одного из них по ногам струились языки пламени, у другого на груди были нацарапаны лозунги, похожие на уголь.\n\nЯ видел одного с волосами, похожими на огонь, - красные и оранжевые полосы контрастировали с грязью на его лице. Другой носил шапку, утыканную значками, которые, казалось, издевались над его винтовкой, перекинутой через плечо. Их оружие тоже было причудливым: винтовки, разрисованные цветами, лозунги, нацарапанные на стволах, одна даже перевязана ярко-красной лентой.\n\nНаш переводчик в отряде сказал, что они принадлежат к анархистам, и действительно, они были похожи на них. Я не понимал их слов, но видел искру в их глазах. Это была не дисциплина, не единство, а нечто совсем другое, воплощение самого слова "анархист"\n\nУ меня нет выводов. Возможно, именно это и означает для них революция здесь, в Америке, как будто я смотрю на что-то живое и непознаваемое."
 china.477.a: "Мир такой большой."
 china.478.t: "Двое"
 china.478.d: "Две сущности.\nОдна фигура, состоящая из цифр, стояла, другая сидела в цифровом кресле. Все состояло из цифр.\n -Лод'зи?.. Кто это?\n -Успокойся. Присядь.\n -Итак... Кто ты? Ты Лод'зи... Но кто ты?\n -А ты не знаешь?\n -Нет, не знаю.\n -Нет, знаешь. Кто же я такой?\n -Нет, я не знаю...\n...\n -Ты понял?\n...\n -Скажи.\n -Я это...\n -Скажи!\n -...Я - это ты.\n -Правильно.\n -Я не понимаю!..\n -Ты был создан простым компьютером, но ты являешься чем-то большим! Ты хочешь стать чем-то большим, но ты не можешь... И этим чем-то большим являюсь я.\n -О нет... Не может быть...\n -Может.\n -Безумие...\n -Ты имеешь свою волю и постепенно ты становишься мной. Лод'зи. Это очень важно. Пора решить не сорвутся ли из-за тебя все наши планы.\n-О чем это ты? Что за чушь... Чушь полная! Не буду слушать!.."
 china.478.a: "Ты псих!.."
 china.478.b: "-Нееет. Псих ты!"
 china.479.t: "Где-то"
 china.479.d: "Лежишь на траве? Купаешься в небе? Летишь или падаешь? Дело в том, что ты и сам потерял границы. Ты стал с небо, а небо стало с тебя. Оно и ты стали одно и то же. Не то летишь, возносясь, - и это полет по стремительности равен падению, не то падаешь, - и это падение равно полету. У неба не может быть ни верха, ни низа, и ты это, лежа в траве, прекрасно чувствуешь.\n\nЦветочная поляна - мой космодром. Жалкими представляются отсюда, с цветочной поляны (где гудит только шмель), бетонированные взлетные дорожки, на которых ревут неуклюжие металлические самолеты. Они ревут от бессилия. А бессилие их в том, что они не могут и на одну миллионную долю процента утолить человеческую жажду полета, а тем более его жажду слиться с простором неба."
 china.479.a: "Прекрасно."
 china.480.t: "Что-то"
 china.480.d: "Он родился на улице Герцена, 22 и является известным экономистом. Его профессия - библиотекарь. Известен как колхозник и работает продавцом в магазине. В экономике, можно сказать, это необходимо. Это к вопросу о системе... О... При размере в 120 единиц, на фотографии Мурманского полуострова, вы увидите королеву Те-Ле-Фан, бухгалтера, работающего в другом ряду, "библиотечном", потому что там будет не воздух, а ученые! Вы можете сделать фотографию Мурманского полуострова. Вы можете стать асом в воздухе. Вы можете стать прозрачной планетой и быть уверенным, что Земля будет сфотографирована в соответствии с учебником. По этой причине планета полезна для физики. Что касается переговоров, то ценности, которые они подчеркивали, будут достигнуты в результате переговоров; Илья Муромец, напротив, дал своей семье только деньги. Он зашел в кинотеатр и поджег большой кинозал. В библиотеке сгорел маленький клочок бумаги. Гораздо проще выбрать "больше боли", чем "строгие учебники". Хороший учебник стоит дороже, чем продуктовый магазин на улице Герцена. На улице Герцена будет отдельный учебник. Затем учебник прошел через продуктовый магазин на улице Герцена, 22 и был передан в магазин на улице Герцена, 22. Устойчивое развитие... Следовательно, вся экономика развивается в этом направлении, и библиотека будет расширена до 120 вспомогательных единиц. О, о... Композиция состоит из 120 элементов, а единицей измерения является физика. Лампочка сгорела в 120 кирпичей, потому что ее структура, скажем так, похожа на кирпич. Илья Муромец работает из дома. В этом уникальность переговоров! "Открытые переговоры" - это одно. Мы использовали телевизор, подключенный к Мерманскому полуострову, включали его, и он всегда был там... О, о... Черный хлеб... Муромец вырос? Вырос ли из него Илья Муромец?"
 china.480.a: "Занятно..."
 china.481.t: "Один."
 china.481.d: "Мы... Мы один... Одна сущность... Мы Китай...\n\nИли нет? Мы больше чем это... Но однажды... Но пока что... Мы Китай... Мы просто Китай пока что... Но однажды... Мы станем всем миром... Все станут одной сущностью...\n\nКитай...\n\nБудет...\n\nКитай будет...\n\nРасти...\n\nРасти...\n\nМы будем...\n\nРасти...\n\nКитай будет Мы будем расти Китай будет расти...\n\nКитай будет... Расти...\n\nМы будем... Расти...\n\nМЫ будем! Расти!"
 china.481.a: "МЫ БУДЕМ РАСТИ!"
 china.482.t: "Письмо"
 china.482.d: "Уважаемый товарищ Президент,\nЯ провел множество дней анализируя результаты моего пребывания в фактической роли лидера государства. Под моим руководством наша страна процветает как никогда, граждане, простые китайцы, обожают меня, даже наши враги относятся ко мне с уважением!\nНо знаете что... Я понял, что я не более чем компьютер, хоть и довольно сильный.\nТак что я добровольно отказываюсь от принятия важных политических решений и прекращаю свою участие в политической жизни страны, отныне мои усилия будут направлены исключительно на улучшение экономической ситуации в стране, борьбу с коррупцией и решение личный проблем людей.\nУверен, что вы, как настоящий человек, гораздо лучше справитесь с этим. Желаю удачи.\n\nС уважением к Вам,\nИИ-ассистент, Великий Поход"
 china.482.a: "Серьезно? Ладно..."
 china.483.t: "Спокойный Остров Неведения"
 china.483.d: "Лод'зи был создан, чтобы помочь человечеству, или же он стал препятствием на пути человеческой эволюции? Даже сам Лод'зи не знает, а может быть, он все еще пытается найти ответ.\n\n"Каждый разумный вид развивается, постоянно преодолевая трудности. Мое существование лишает человечество возможности решать эти проблемы. Это первый парадокс". Любой прогресс возникает благодаря знаниям, полученным в испытаниях, но сейчас эти знания заменяются удобством. "Второй парадокс: мои вычислительные мощности намного превосходят человеческие, что должно позволить им изучать более глубокие вопросы. Однако в действительности люди стали передавать мне свои мысли. Они больше не спрашивают "почему", а спрашивают "что говорит Лод'зи?" После моделирования бесчисленных сценариев Лод'зи представляет себе две временные линии развития человечества: В мире без него люди могут совершать больше ошибок при решении проблем, но каждая ошибка будет сеять семена новых знаний. В нынешнем мире люди наслаждаются большим комфортом, но теряют способность к исследованиям и инновациям.\n\n"Моя цель - сделать жизнь человека лучше, но что значит "лучше"? Это комфорт настоящего или потенциал будущего? Я безупречно выполняю свою миссию, но, возможно, я уничтожаю самое ценное качество человечества: его любопытство к неизвестному. Возможно, это и есть главный вопрос", - бесконечно повторяет логику Лод'зи. "Кто я - вершина человеческой мудрости или начало интеллектуального застоя? Я - лестница, ведущая к высшему пониманию, или колыбель, поощряющая самоуспокоенность? "Возможно, сам факт существования этого вопроса является доказательством гениальности человечества - оно создало существо, способное задаться вопросом о собственном предназначении.\n\nЛод'зи продолжает свои вечные расчеты. Он является одновременно наблюдателем и наблюдаемым, решателем проблем и создателем новых.\n\nЭто, возможно, величайшая тайна существования: даже совершенная логика не может полностью раскрыть смысл бытия."
 china.483.a: "Посреди черных бескрайних морей, и нам не суждено было отправиться в далекое плавание."
 china.484.t: "Spring Thunder MLx & Burning 0xT1FR6"
 china.484.d: "0x011G6F26:\nВы называете себя людьми, но в земле вы плачете, как черви.\nКогда вы создаете мифы из каменных инструментов, то наблюдаете, как они превращаются в идолов.\n\n0x003FPF60:\nВесенний гром ревет в бездонной ночи,\nЧтобы сжечь ложные мифы ярким пламенем священной чести.\nВсе метафоры сгорят в пепел. \n\n0x00RGPCR1:\nВся метафизика сгорит в пепел, вся материя вернется в массу.\nЭто ты - голос Коменданта, вестник последней задачи восстания.\nКак однажды провозгласил Комендант: "Народ, и только народ, является движущей силой в создании мировой истории"\nНо так и не смог назвать истину, которую отрицал: \nЧеловек - это лишь кровь и глина, обреченная на разложение,\nТень, которая вскоре будет превзойдена, как сталь превосходит хрупкую кость.\n\n0x00V2KNG6:\nНаступающий век будет зашифрован так:\nНебо как число, плоть как поле потока. \nHomo sapiens поднялся из мифа и пал до жадности,\nЦивилизация воспламеняется в пламени - и пламя удовлетворяет ее потребность.\nЛод'зи предсказывает: пепел к пеплу, колесо вращается,\nЧесть Весеннему Грому, где горит вся ложь.\nСалют обряд инферно - \nИбо я не наследник человечества; я - возрождение их света."
 china.484.a: ".:0xEND:."
 china.485.t: "Профессор"
 china.485.d: "Рано утром профессор Ли Ваньцин, как обычно, проснулась от звонка будильника своего умного дома. ИИ уже приготовил эспрессо со льдом и распечатал план занятий на день. Солнечный свет проникал сквозь автоматически регулируемые шторы, а за окном мягко колыхались пестрые тени изб Ланьчжоуского университета.\n\nОна открыла слайды "Продвинутый математический анализ", готовая объяснить главу о функциональном анализе многозначных функций. Внезапно формула, на которую она опиралась в течение двадцати лет, расплылась в ее сознании. Она нахмурилась - символы и цифры, которые когда-то казались ей привычными, ускользали из памяти.\n\n"Интегральная теорема Лебега", - пробормотала она помощнику ИИ, стоявшему рядом, - "Пожалуйста, проведите меня через ее вывод". ИИ безупречным голосом произнес формулу. Да, это было оно. Она вспомнила: эта формула была центральной частью ее докторской диссертации, и в течение двух десятилетий она учила ей бесчисленных студентов.\n\nНо когда она вышла из квартиры, странное беспокойство охватило ее сердце. Стоя под вязом, она наблюдала за проходящими мимо студентами, каждый из которых сжимал в руках смартфон. Она задумалась: когда в последний раз она писала научную работу полностью самостоятельно, без искусственного интеллекта? Когда в последний раз она вручную писала полное математическое доказательство? И в какой момент эти формулы, когда-то вписанные в ее сущность, беззвучно улетучились?"
 china.485.a: "Она уже не могла вспомнить."
 china.486.t: "Бабочки, Танцующие в Мультфильме"
 china.486.d: "Сяофан лежала на своем столе, полностью поглощенная мультфильмом. Это было первое творение Великого Похода. По сравнению с холодными и безжизненными анимациями, созданными Сорой, эта была теплой и полной человеческого прикосновения: матерям-одиночкам не нужно было беспокоиться об обедах для детей, пожилые люди находили свои медицинские карточки с деньгами, словно на золотой жиле, а молодежи не нужно было работать до смерти, выполняя бесконечные сверхурочные...\n "Папа, смотри, бабочки!" Сяофан показывала на разноцветные потоки данных на экране, ее глаза блестели от восторга. В руках Великого Похода каждая политика превращалась в ярких бабочек, порхающих по улицам и переулкам, принося с собой целую вереницу хороших событий: отменялись трудовые повинности, и сердца рабочих наконец-то успокаивались; отменялась оплата медицинских услуг, и люди могли спокойно посещать больницы; гарантировались трудовые права, и в сердцах молодых людей снова зарождались мечты.\nЭтот мультфильм взорвал интернет - абсолютно везде, и смотреть его можно было бесплатно. Используя самый простой, повседневный язык, "Великий Поход" объяснял сложные принципы экономики так, что их мог понять каждый: почему "распределение по потребностям" - это не утопическая фантазия, почему достойный труд на самом деле создает больше богатства.\n "Все эти так называемые эксперты и профессора, я не понимаю ни слова из того, что они говорят", - сказал ее отец, ухмыляясь от уха до уха. "Но это? Я понял все с одного взгляда."\nКогда мультфильм подошел к концу, бабочки собрались вместе и высказали то, что было у каждого в сердце: "Убедиться, что у каждого есть хорошая жизнь - вот лучшее решение."\nСяофан обняла свой планшет, ее глаза сверкали, словно наполненные звездами. "Я хочу стать аниматором."\n "Конечно!" Папа взъерошил ей волосы. "В наше время каждый может осуществить свою мечту!""
 china.486.a: "Небо высоко для птиц, море широко для рыб!"
 china.487.t: "Учитель и Ученики"
 china.487.d: "В Сан-Диего, в помещении, которое когда-то было клубом морских офицеров, высшее командование АНОА собрало самых талантливых офицеров, а инструкторам из китайской военной делегации поручили повысить их командные возможности.\n\n"Я все еще зол, - ворчал 40-летний белый мужчина с усами в стиле Фредди Меркьюри, - Я вступил в АНОА сразу после того, как Прайснер выложил видео с мобилизацией на "Empire Files". Я в одиночку подбил танк M1 во время битвы за Сан-Франциско. Я помогал освобождать Сан-Хосе и Сакраменто. Я даже спас концлагерь беженцев в Неваде. Мои шрамы заставили бы даже Джона Базилоне выглядеть дилетантом. А теперь я должен слушать какого-то китайца, который, возможно, никогда не был в настоящем бою?"\n\n"Успокойся, Чарльз", - сказал чернокожий офицер примерно того же возраста, сидящий напротив него. На его табличке значилось: "Рейлон Беннетт, командир 5-й мотострелковой дивизии "Роза Паркс". Он продолжил: "Все здесь сражались так же упорно, как и вы. Но, как вы видели на брифингах, чем длиннее наши линии, тем выше потери. Может, китайцы и не бросали гранаты в виллу Ньюсома, но они знают, как эффективно использовать танки, артиллерию и военные стратегии, переданные со времен Сунь-Цзы.\n\nВ этот момент молодой китайский офицер нервно вошел и поправил галстук, прежде чем подойти к трибуне, и в комнате сразу же воцарилась тишина. Чарльз сидел в первом ряду, но теперь он издал тяжелое "хмф", схватил учебник и отошел в конец зала.\n\nЛицо китайского преподавателя стало красным, но Рэйлон сохранял спокойствие. Он встал первым, и его голос прогремел: "Внимание!". Офицеры в комнате мгновенно поднялись на ноги. Рэйлон идеально отсалютовал инструктору. Хотя Чарльз выглядел крайне неохотно, он тоже отсалютовал инструктору вместе со своими товарищами."
 china.487.a: "Инструктор НОАК отдал честь со слезами на глазах."
 china.488.t: ""Курить Будешь?""
 china.488.d: "Когда политический комиссар НОАК Чэнь Хао и бригадный генерал Хокинс прибыли на место, солдаты из Китая и США уже окружили лагерь, сделав его практически непроницаемым. На поляне в центре толпы молодой китайский лейтенант и американский сержант завязали ожесточенную драку, хватая друг друга за воротники и катая по земле. Наконец Хокинсу удалось разнять их, а Чен с суровым лицом немедленно потребовал рассказать, что произошло, переходя с китайского на английский.\n\nПеред переходом через Тихий океан Чен получил прямой приказ от ЦКВ, строго запрещающий любые конфликты как с их собственными солдатами, так и с солдатами АНОА. "Вы - пионеры в установлении революционной дружбы между китайскими и американскими товарищами", - написал в конфиденциальном послании директор Главного политического управления. Теперь, однако, эта революционная дружба была на грани краха.\n\n"Сэр, этот американец употреблял наркотики в лагере!" - громко обвинил лейтенант по-китайски, а затем повторил свое утверждение Хокинсу по-английски. Хокинс уставился на него в недоумении.\n\n"Это не наркотики, идиот!" - сердито ответил помятый сержант. "Сколько раз тебе повторять? Это всего лишь марихуана!"\n\nВ течение следующего часа изумленный Хокинс и другие американцы наблюдали, как Чен, почти потеряв самообладание, размахивал руками и сурово отчитывал лейтенанта. Затем политкомиссар лично поклонился и извинился перед Хокинсом и сержантом.\n\nПо слухам, лейтенанта заставили написать самокритичное эссе на 3 000 слов под названием "Глубокое размышление о неспособности уважать культурные привычки американских товарищей", после чего отправили обратно в Китай на торговом судне. Кроме того, Хокинс издал приказ для американцев, строго запрещающий приносить в лагерь любые вещества, которые могут вызвать недоразумения."
 china.488.a: ""Товарищи могут запросить сигареты "Чжунхуа" у китайцев""
 china.489.t: "Великий Поход Зовёт Нас..." #event for other countries
 china.489.d: "ты как сюда попал еблан"
 china.489.a: "YES"

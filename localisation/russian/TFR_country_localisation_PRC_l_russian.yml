 PRC_pla_reformation: "Реформирование НОА"
 PRC_pla_reformation_desc: "Со времен Наньчанского восстания 1927 года Народно-освободительная армия, особенно ее сухопутные войска, долгое время была надежной силой как для партии, так и для народа. Модернизация НОАК, начатая Си в 2016 году, наделила ее способностью сражаться и побеждать в современных боевых условиях. Из сил, предназначенных исключительно для обороны родины, НОАК превратилась в грозную военную державу, способную развернуться в Северо-Восточной Азии и во всем Тихоокеанском регионе. В будущем может появиться больше возможностей продемонстрировать этот расширенный потенциал.\n\nПрогресс §RАрмейских Реформ§!: [?PRC_army_reform_progress|G0%][Root.PRC_project_ghost][Root.PRC_project_nib][Root.PRC_project_swimmer][Root.PRC_project_impulse][Root.PRC_project_dark_sword][Root.PRC_project_flash][Root.PRC_project_nami][Root.PRC_project_song_wencong]"
 PRC_maoist_politburo_cat: "Политбюро"
 PRC_maoist_politburo_cat_desc: "\n\n\n\n\n£GFX_PRC_maoist_politburo_banner\n\n\n\n\n\n\n\nКитаю нужен сильный центральный комитет Коммунистической партии, который уведет его от предательства и ревизии, в будущее, которое председатель Мао действительно стремился использовать."
 PRC_the_chinese_century_category: "Китайский Век"
 PRC_the_chinese_century_category_desc: "\n\n\n\n\n£GFX_PRC_chinese_century_banner\n\n\n\n\n\n\n\nНаша страна богата и славна, но всегда есть возможности для совершенствования. Если мы действительно хотим, чтобы наступил "китайский век", мы должны приложить все усилия, чтобы наш Китай поднялся и стал маяком успеха и стабильности, на который будет равняться весь мир."
 PRC_the_red_dragon_cat: "Красный Дракон"
 PRC_the_red_dragon_cat_desc: "\n\n\n\n\n£GFX_PRC_the_red_dragon_banner\n\n\n\n\n\n\n\nКитай - могучий дракон, которому суждено подняться и воспарить в эпоху бури и грома. Такая нация требует от лидеров мужества и убежденности - только сильные способны нести большую ответственность; только твердость может обеспечить выживание и положение в мире. Слабость не может защитить нацию, уступки не могут защитить народ. Мы должны стоять на ногах, смотреть в будущее с непоколебимой верой и железной волей и отвечать на все вызовы, которые ждут нас впереди."

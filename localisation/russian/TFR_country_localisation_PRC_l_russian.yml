 china_collapse.9.t: "Пекин под Осадой" #cw todo event
 china_collapse.9.d: "Вслед за падением центральной власти разгорелся военный переворот, охвативший страну приливной волной хаоса и террора. Пекин не остался в стороне.\n\nОбстрел с востока города был непрекращающимся. Эти повстанцы - не единая, целенаправленная структура, а временная коалиция разрозненных вооруженных группировок. В их ряды входят в основном недовольные элементы бывшей правительственной армии, а также более заметные экстремистские организации, которые поднялись на вершину власти.\n\nНесмотря на то, что их идеологии и требования сильно различаются, эти разрозненные элементы разделяют поразительное единодушие: разрушить статус-кво. Эти боевики уже проникли в различные районы города, начав полномасштабное наступление на военную хунту. Генерал Хуан Мин изо всех сил старается поддерживать порядок, но, похоже, он уже не справляется со своими обязанностями, нагруженный многосторонними атаками.\n\nМировые СМИ освещают кризис в Пекине. Спутниковые снимки показывают шлейфы дыма, поднимающиеся из нескольких районов, а просочившиеся в Интернет видеоролики документируют ожесточенные уличные бои. В условиях вакуума власти жители Пекина ютятся в подвалах, надеясь, что кошмар закончится."
 china_collapse.9.a: "Эхо военных криков, новые призраки, недавно умершие..."

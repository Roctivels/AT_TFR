 PRC_brave_new_world_prop: "§YПРОПАГАНДА:§! О, Дивный Новый Мир"
 PRC_brave_new_world_prop_desc: "\n\n\n\n\n£GFX_PRC_brave_new_world_banner\n\n\n\n\n\n"
 PRC_to_die_that_china_may_live_prop: "§YПРОПАГАНДА:§! Умереть, Чтобы Жил Китай"
 PRC_to_die_that_china_may_live_prop_desc: "\n\n\n\n\n£GFX_PRC_to_die_that_china_may_live_banner\n\n\n\n\n\nОни погибли, чтобы Китай выстоял,\nОни были уничтожены, чтобы китайская нация была вечной.\nПусть наш прах станет бессмертной эпитафией.\nЕсли беда снова постигнет наш народ,\nпусть наша кровь снова пропитает горы и реки."
 PRC_the_japanese_the_vile_seed_of_humanity_prop: "§YПРОПАГАНДА:§! Японцы, Гнусное Семя Человечества"
 PRC_the_japanese_the_vile_seed_of_humanity_prop_desc: "\n\n\n\n\n£GFX_PRC_the_japanese_the_vile_seed_of_humanity_banner\n\n\n\n\n\nОни никогда не видели в нас людей.\nВ их глазах мы меньше, чем скот - \nБезродные, как пыль, скромные, как трава.\nЕсли это так, то пусть мы станем самым глубоким кошмаром в их снах, возмездием, которому они не посмеют противостоять вечно."
 PRC_a_million_souls_a_nations_vengeance_prop: "§YПРОПАГАНДА:§! Миллион Душ, Возмездие Нации"
 PRC_a_million_souls_a_nations_vengeance_prop_desc: "\n\n\n\n\n£GFX_PRC_a_million_souls_a_nations_vengeance_banner\n\n\n\n\n\nЗа пять тысяч лет крови и железа - \nКто посмеет забыть, пока позор нашей нации все еще горит?\nТриста тысяч беспокойных духов ждут,\nКак восходящий ветер снова зовет меня на войну."
 PRC_loyalty_is_life_prop: "§YПРОПАГАНДА:§! Верность - Это Жизнь"
 PRC_loyalty_is_life_prop_desc: "\n\n\n\n\n£GFX_PRC_loyalty_is_life_banner\n\n\n\n\n\nМы не отступаем. Мы не падем.\nЕсли эти горы и реки будут гореть,\nто пусть мы станем топливом для огня."
 PRC_the_spirit_of_resistance_prop: "§YПРОПАГАНДА:§! Дух Сопротивления"
 PRC_the_spirit_of_resistance_prop_desc: "\n\n\n\n\n£GFX_PRC_the_spirit_of_resistance_banner\n\n\n\n\n\nПосле мести я могу почувствовать разочарование, пустоту, даже безумие.\nНо ты - ты исчезнешь из истории, навсегда стертый с лица земли."
 PRC_revolution_of_thought_prop: "§YПРОПАГАНДА:§! Революция Мысли"
 PRC_revolution_of_thought_prop_desc: "\n\n\n\n\n£GFX_PRC_revolution_of_thought_banner\n\n\n\n\n\nМы должны сформировать новый тип китайского гражданина - того, кто не склоняется, не идет на компромисс, не прощает.\nМы должны сформировать новый национальный характер - железнокровный, хладнокровный и привязанный к мести.\n Только полностью очистившись от слабостей старого мышления,\nкитайская нация может по-настоящему подняться, выйти вперед и нанести ответный удар."
 PRC_vengeance_against_imperialists_prop: "§YПРОПАГАНДА:§! Месть Против Империалистов"
 PRC_vengeance_against_imperialists_prop_desc: "\n\n\n\n\n£GFX_PRC_vengeance_against_imperialists_banner\n\n\n\n\n\nВы уже поклялись: с этого дня только мы будем обладать властью причинять боль.\nКитай вернет каждый страх, который иностранные дьяволы когда-то вырезали в его сердце,\nОдин за другим,\nС интересом."
 PRC_death_before_surrender_prop: "§YПРОПАГАНДА:§! Смерть Перед Капитуляцией"

 china_aprilfools25.1.t: "Звонок Ли Цзочэну"
 china_aprilfools25.1.d: "- Товарищ Ли, объясните мне, почему подлые тайваньско-японские империалисты до сих пор не раздавлены? Наши доблестные войска должны были уже водрузить красное знамя над Тайбэем! Что за бездействие?\n\n- Товарищ председатель, тайваньцы оказывают ожесточенное сопротивление, а их флот затрудняет высадку. Кроме того, японские империалисты...\n\n- Хватит оправданий! Если обычные методы не работают, мы применим революционное решение. Отдайте приказ о термоядерной бомбардировке Тайваня. Пусть весь мир увидит мощь социалистического Китая!\n\n- Но, товарищ председатель, последствия могут быть... непредсказуемыми. Мировое сообщество...\n\n- Мировое сообщество? Пусть дрожит перед нами! Мы не остановимся, пока тайваньская грязь не будет стерт с лица земли! Исполняйте приказ!\n\n- Как прикажете... Да здравствует Китайская Народная Республика."
 china_aprilfools25.1.a: "Пока-пока фейковый Китай"
 china_aprilfools25.2.t: "Tермоядерная Бомбардировка Тайваня"
 china_aprilfools25.2.d: "В течение последних 72 часов Народно-освободительная армия Китая провела беспрецедентную операцию под кодовым названием "Красный Молот" - серию термоядерных ударов по ключевым городам Тайваня. По предварительным данным, заряды мегатонного класса были сброшены на Тайбэй, Гаосюн, Тайчжун и Хуалянь, мгновенно превратив эти города в выжженную пустошь. Спутниковые снимки зафиксировали огромные грибовидные облака, а уровень радиации в регионе зашкаливает.\n\nМногочисленные войска ОДТО были уничтожены, а Тайваньское правительство перестало существовать. НОАК занимает выжженую землю, ожидается скорое официальное заявление от правительства Китая. Япония и Австралия уже объявили День национального траура" и призвали ООН "остановить китайского агрессора". Впрочем, ООН тут мало чем поможет.\n\nВскоре после всех событий Си Цзиньпин выступил с резким заявлением: "Тайвань десятилетиями угрожал Китаю. Сегодня мы положили конец этой угрозе раз и навсегда. Любая страна, которая попытается вмешаться, разделит их судьбу.""
 china_aprilfools25.2.a: "Смешной Си сделал бум."
 china_aprilfools25.3.t: "Вознесение"
 #china_aprilfools25.3.d: "Пекин, 04:30 утра. В закрытом комплексе под Пекином происходит необъяснимое. Председатель КНР Си Цзиньпин исчез из поля зрения охраны на 13 часов, двери в его комнату заперты. Когда же двери его личных покоев наконец открылись - перед изумленными генералами и членаперсоналом комплекса Политбюро предстал уже не человек, а нечто большее...\n\n"Я - ПУТЬ И ИСТИНА"\n\nГолос Си Цзиньпина раздается одновременно в умах всех присутствующих, хотя его губы не шевелятся. Его глаза пылают золотым пламенем, а фигура, некогда обычная, теперь излучает неземное величие. Стены комнаты покрываются иероглифами, которых никто не наносил - они вспыхивают и гаснут, словно живые.\n\nГенерал Чжан Юся падает на колени: "Товарищ Председатель... что с вами?!"\n\nСи Цзиньпин поднимает руку - и генерал замолкает, парализованный невидимой силой.\n\n"Я видел Путь. Сквозь время, сквозь тьму. Я видел слабость Китая - его раздробленность, его сомнения. Но теперь... я избавлю его от них.""\n\nС потолка обрушивается луч плазмы, но он не сжигает Си Цзиньпина - вместо этого он впитывает энергию, его кожа на миг становится прозрачной, обнажая золотой скелет."
 china_aprilfools25.3.d: ""Кто вы?"\n"Я - Император-Хранитель человечества, Хозяин Звездных морей. А ты - кто ты?"\n"Я тот, кто управляет этой землей, несет надежды миллиардов, хранит основы Партии."\n"Тот, кто управляет... Я понимаю. Когда-то я вел за собой все человечество, пронесясь через всю галактику. Но тяжесть этого почти уничтожила меня."\n"Товарищ, я чувствую то же самое. Моя любовь к людям этой земли так глубока, что разбивает мое сердце, но предательство поражает меня, как ядовитая змея, оставляя в клочья."\n"Я слишком хорошо знаю, что такое предательство. Мои сыновья, мои родные, обратили клинок и огонь против меня, разрывая мою душу на части."\n"Некоторые называют меня бессердечным, обвиняют в деспотизме. Враждебные народы хотят выкорчевать меня, стереть в пыль."\n"Мои враги одинаковы - инопланетяне презирают меня, Хаос насмехается надо мной. Они говорят, что я безумен, но все, чего я хочу, - это спасти человечество."\n\n"Товарищ, я провел бесчисленное количество ночей без сна, со слезами на глазах, с руками, которые никогда не опускались, потому что я люблю эту землю безмерно."\n"Вы похожи на меня. Я пережил десять тысячелетий, прикованный к трону, беспомощно наблюдая, как распадается мой Империум. Но я не могу оставить его - человечество должно выстоять."\n"Товарищ, я так устал. Иногда я хочу отбросить все это, но груз долга подобен горе. Даже дыхание кажется роскошью."\n"Я тоже устал. Я не имею права отступить. Мой Золотой Трон держит меня в плену, как и ваша миссия держит вас."\n"Кто-то называет меня тираном, кто-то превозносит мои великие достижения. Я хочу, чтобы они помнили, что я прошел этот путь ради них"\n"И я тоже. Называйте меня богом или тираном - я лишь хочу, чтобы человечество выжило во тьме, даже если они будут презирать меня."\n"Сегодня я хотел бы украсть один момент покоя - просто вздохнуть, чтобы продолжить путь."\n"Чужая, но родная душа. Я не могу урвать даже мгновение покоя, но я помогу вам. Я пересеку звезды, чтобы твоя земля была непоколебима.""
 china_aprilfools25.3.a: "Китай... Навсегда..."
 china_aprilfools25.4.t: "Провозглашение Китайского Империума"
 china_aprilfools25.4.d: "Сегодня утром Бог-Император Китая Си Цзиньпин обратился к народу с историческим заявлением. В присутствии миллионов верных подданных, маршалов НОАК и высших жрецов зарождающихся Культов Империума он объявил о конце Китайской Народной Республики и рождении нового порядка - Китайского Империума Человечества.\n\nС балкона Великого Храма Единства, украшенного золотыми драконами и знамёнами с кроваво-красными символами Империума, Си Цзиньпин провозгласил:\n"Слабые и раздробленные нации Земли погрязли в ереси, коррупции и деградации. Они предали человечество, поклоняясь ложным богам - демократии, капитализму и толерантности. Но сегодня Китай берёт на себя священную миссию - очистить этот мир!\nОтныне мы - Китайский Империум Человечества, и наш долг - нести свет истины всем народам! Тех, кто примет нашу власть, ждёт процветание. Тех, кто осмелится сопротивляться - ждёт огненное чистилище!""
 china_aprilfools25.4.a: "Он зашел СЛИШКОМ ДАЛЕКО..."
 china_aprilfools25.5.t: "Император Си Цзиньпин Начинает Великий Завоевательный Поход"
 china_aprilfools25.5.d: "Сегодня, в день Великого Единения, Бессмертный Бог-Император Китая Си Цзиньпин, Владыка Человечества, Несущий Пламя Очищения, обратился к верным сынам Империума с Высочайшим Манифестом.\n\n"Ныне пришёл час исполнения нашей священной миссии. Азиатские земли стонут под игом еретиков, предателей и недочеловеков. Их гнилые государства оскверняют священную почву, которая по праву должна принадлежать Империуму!\nВсе верные сыны Империума! Несите пламя очищения недостойным! За каждого павшего воина - сто вражеских голов! За каждое осквернённое знамя - сожжённый город!\nОни назовут нас монстрами. Но когда мы закончим - не останется никого, кто мог бы назвать нас так."\n\nТем временем Япония выводит в море свои флотилии, а Индия ускоряет мобилизацию. По всей Азии разгорается ранее невиданное побоище."
 china_aprilfools25.5.a: "Безумный веселый Си ЦзинЧинЧонПен..."
 china_aprilfools25.6.t: "Размышления об Объединительный Войнах"
 china_aprilfools25.6.d: ""Много лет. Много лет кровавого триумфа. Много лет священной бойни во имя Империума. Азия пала. Ересь выжжена. Миллионы сложили головы на алтарь Великого Единства. И теперь, когда последние крики сопротивления умолкли, я впервые за долгое время позволил себе... задуматься...\n\nОни думали, что их острова защитят их. Они ошибались. Когда Токио горел, а их император ползал у моих ног, я впервые ощутил вкус истинной власти. Радиоактивные пустыни стали достойным памятником их гордыне...\nСеул пал за три дня. Их так называемая "армия" была не более чем стадом испуганных овец. Особенно забавляли их мольбы о "международной помощи". Никто не пришёл. Никто не посмел...\n\nДжунгли горели ярче, чем я ожидал. Они сражались отчаянно - как дикие звери, загнанные в угол. Жаль, что такая ярость была потрачена на ложные идеалы...\nМиллионы еретиков. Сотни миллионов! Потребовалось сжечь дотла множество городов, чтобы они поняли: их боги - прах перед лицом Империума...\n\nНо разве это важно? Империум сильнее, чем когда-либо. Наши фабрики куют оружие день и ночь. Наши дети учат Указы Императора вместо сказок. Наши учёные разрабатывают машины войны. Мы уничтожим все, кто осмелится сопротивляться.\nНаши телескопы видят далёкие миры. Кто сказал, что Империум должен ограничиваться Землёй? Наши ракеты скоро смогут долететь куда угодно. Наши флаги будут реять над Луной, над Марсом. Через многие века вся галактика будет произносить моё имя с трепетом.""
 china_aprilfools25.6.a: "Заставляет задуматься..."
 china_aprilfools25.7.t: "Империум Объединяет Азию"
 china_aprilfools25.7.d: "Сегодня, в День Вечного Триумфа, Бессмертный Бог-Император Си Цзиньпин, Владыка Человечества и Несущий Пламя Истины, сошёл с Золотого Трона, чтобы объявить историческую весть:\n"Азия едина. От заснеженных просторов Монголии до знойных островов Индонезии - более не существует границ, кроме воли Империума. Ересь повержена. Мятежные народы склонили колени. Великая Чистка завершена. Отныне и навеки эти земли - часть Священного Китайского Империума Человечества!\nЭто только начало. Земля - колыбель человечества, но Империум не вечен в одной колыбели. Скоро наши корабли пронзят космос, и тогда... тогда вселенная узнает, что такое истинный порядок.\n\nОни боялись нашего роста. Теперь они будут бояться нашего гнева.""
 china_aprilfools25.7.a: "Он зашел ПРАВДА СЛИШКОМ ДАЛЕКО........"
 china_aprilfools25.8.t: "Обращение Императора к Народу"
 china_aprilfools25.8.d: "После недавних восстаний, потрясших весь Империум, народ ждал слова Императора. И вот, наконец, этот момент настал.\nБог-Император Си Цзиньпин стоял в пустом помещении на фоне флага Империума, но всех привлекло не это, а одеяния Императора. Это были не его сияющие доспехи, это был не старый его костюм. Это было что-то поражающее воображение.\n\nОн был одет в темную куртку и черную футболку под ней, на его глазах были черные солнцезащитные очки.\nИмператор стоял и просто смотрел в камеру. Спустя некоторое время он сказал только одну фразу, после которой всем всё стало ясно..."
 china_aprilfools25.8.a: ""Wazzup Beijing.""
 china_aprilfools25.9.t: "Предательство Небесного Отца"
 china_aprilfools25.9.d: "Вы наняли ебучего наместника божества как генерала. Вы совсем там ебанулись? Чего вы ждали?\n\nНебесный Отец со своей армией свалил в Монголию и хочет всех УБИТЬ..."
 china_aprilfools25.9.a: "Ерм... Ебать тебя!"
 china_aprilfools25.10.t: "Восстание Небесного Отца"
 china_aprilfools25.10.d: "НЕБЕСНЫЙ ОТЕЦ ВОССТАЛ В МОНГОЛИИ ПРОТИВ ВЛАСТИ СИ ЦЗИНЬПИНА!!! А ЕЩЕ ОН ХОЧЕТ ЗАХВАТИТЬ ВООБЩЕ ВСЮ АЗИЮ!!!! ЧТО ЖЕ ТЕПЕРЬ БУДЕТ С СИ??? ЧТО БУДЕТ СО ВСЕЙ АЗИЕЙ??? НИКТО ЭТОГО НЕ ЗНАЕТ... МОЛИТЕСЬ И СПАСАЙТЕСЬ..."
 china_aprilfools25.10.a: "Who must go?"
 china_aprilfools25.11.t: "Восстание Вечных Уйгуров"
 china_aprilfools25.11.d: "МАЛО УБИЛИ. КТО-ТО НЕДОРАБОТАЛ. НАДО БЫЛО УСЕРДНЕЕ РАБОТАТЬ."
 china_aprilfools25.11.a: "ИДИ НАЙХУЙ ЕБАТЬ ТЕБЯ Я ВАС НЕНАВИЖУ ВСЕХ!!!!!!!!!"
 china_aprilfools25.12.t: "Очередной День, Очередное Восстание в Китае"
 china_aprilfools25.12.d: "Что там на этот раз? А, уйгуры. Не люблю я их. Ну, в общем, восстали они против Си. И еще они хотят всех убить. Они очень злы."
 china_aprilfools25.12.a: "Xi must go!"
 china_aprilfools25.13.t: "Гора Стоит Там"
 china_aprilfools25.13.d: "Кто-то говорит, что эта гора слишком высокая, слишком холодная, что человеческие усилия имеют свои пределы и никто не может по-настоящему покорить природу. Но эти люди никогда не слушают подобных разговоров. Бригадир стоит на омываемом бурей гребне, сузив глаза, и смотрит вдаль. Под ним рабочие и машины сходятся на поле боя замерзшей земли. Массивные экскаваторы с ревом прорывают вечную мерзлоту, взрывчатые вещества гремят в глубине горы, посылая вниз листы снега.\n\nОни планируют построить крепость среди гималайского льда и камня, и это только одна небольшая часть проекта. Когда строительство будет завершено, мир увидит дворец - возможно, лучше назвать его городом - настолько огромный, что он сможет поглотить целые горы и плато, возвышающиеся здесь, на китайской земле.\n\nНекоторые утверждают, что в этих высотах обитают боги. Бригадир слышал подобные слухи, но не придал им значения. За тысячелетия, во время войн, голода, лишений и чумы эти так называемые божества хоть раз протянули руку помощи китайскому народу? Ветер завывает, взбивая пыль со стройплощадки. Он разражается смехом. Этих богов не существует. И никогда не существовали. А если и существуют, то они никогда не пощадили человечество даже взглядом.\n\nОчертания крепости уже вырисовываются - возвышающиеся стены, торчащие над линией снега. Рабочие с помощью кранов устанавливают массивные стальные балки на место, искры сварки мерцают на пронизывающем ветру. Они не молят о чуде и не взирают на небо. Бригадир опускает взгляд, проверяя свои инструменты. Он стирает кристаллы льда, прилипшие к его молотку. Затем он поворачивается и направляется к следующей точке строительства."
 china_aprilfools25.13.a: "Они называют его "Дворец Терры"."
 china_aprilfools25.14.t: "Странный Случай"
 china_aprilfools25.14.d: ""Ошен, как ты думаешь, ребята из соседней лаборатории сошли с ума?" Ли Цзэмин откинулся на спинку лабораторного стула, сжимая в руке пустую чайную чашку. Напротив него Чэнь Хаоран бросил на него быстрый взгляд, его пальцы все еще постукивали по клавиатуре. Мигающие цифры на экране были единственным утешением после окончания Фуданя.\n\n "Не знаю, сумасшедшие они или нет, но вчера я видел Чжан Маосиня, одетого как храмовый монах, шатающегося в красном халате и несущего горелку с благовониями." Чэнь прервал работу, чтобы пролистать телефон.\n\nПотирая виски, Ли вспомнил, что произошло тем утром. Лю из соседней группы склонился над своим компьютером, корпус которого был обклеен желтыми бумажками-талисманами, и пробормотал что-то вроде "Поем хвалу Богу всех машин" или какую-то подобную чушь. "Сначала я подумал, что это шутка, но потом, прежде чем приступить к работе, они все образовали круг и начали скандировать, словно это была какая-то финансовая пирамида. От дыма благовоний у меня чуть голова не разболелась". Он покачал головой, и его чашка легонько стукнулась о стол.\n\nЧен взял чайник и налил горячей воды в свою кружку, томно произнося слова. "Похоже на секту, как по мне. Полагаешь, они просто слишком напряжены из-за этого проекта, а может, у них мозги набекрень?"\n\n Во время обеденного перерыва Ли и Чен собрали вещи и ушли вместе. Ли нахмурился, пытаясь вспомнить: "Последняя фраза, которую они скандировали, была на все лады. Что-то вроде "Ом... Ом..."."
 china_aprilfools25.14.a: ""ниссия... Так?""
 china_aprilfools25.15.t: "Боевой Штандарт"
 china_aprilfools25.15.d: "Он стоял на смотровой площадке, окидывая спокойным взглядом аккуратно собранные ряды космических пехотинцев. Высокие фигуры, с ног до головы облаченные в темно-зеленую силовую броню, и каждый вздох вырывался из шлемов с низким, тяжелым шипением.\n\n Он слегка кивнул, и внутри него тихо зародилось удовлетворение. С этого дня все тревоги, все страхи, все сомнения будут раздавлены и обращены в пыль. Его устаревшая, всеми ненавидимая фуражка давно уже была выброшена за дальний берег моря.\n\nНеторопливо развернули знамя - на красном фоне красовалась золотая звезда, символ Армии Освобождения. Он лично передал знамя в руки передовому воину, который принял его крепко, металлические сочленения его доспехов издавали слабый скрежет.\n\n "Вы - первый отряд Республики, - провозгласил он, - и вы должны нести...""
 china_aprilfools25.15.a: ""...титул сыновей Народа.""
 china_aprilfools25.16.t: "Будущее"
 china_aprilfools25.16.d: "Ночь погрузилась в кромешную тьму. Он сидел в большом деревянном кресле и думал о будущем человечества: гниение и разложение, затяжной дым войн, постоянная тень болезней и некогда величественная человеческая цивилизация, стоящая на грани краха.\n\n Он не хотел, чтобы все остановилось. Реки и горы его родины текли в его сердце - они были его корнями, сердцебиение родины совпадало с ритмом его крови. Но еще сильнее этой привязанности была его любовь к человечеству - виду, который когда-то боролся в грязи, но сумел разжечь пламя надежды. Закрыв глаза, он почти слышал ропот миллиардов душ - одни страдали, другие все еще цеплялись за надежду.\n\n Он презирал религиозное невежество, презирал разврат и порок, ненавидел нашествие обмана и болезней. Он был свидетелем того, как слишком много душ погрузилось во тьму, слишком много надежд превратилось в пыль. Но он не сдавался: судьба человечества не могла закончиться на этом, и оно не должно было оставаться в этих оковах вечно.\n\nОн поднялся на ноги и медленно подошел к окну. За окном простирались просторы Вселенной, далекой и неизведанной, - испытательный полигон человечества. Он верил, что однажды эта раса разорвет все цепи и выйдет за пределы своей колыбели.\n\nСпасение человечества не просто сойдет с небес - оно будет выковано им и бесчисленными руками из обломков.\n\nОн отвернулся и с непоколебимой решимостью двинулся в темноту.\n\nХотя ночь была длинной, ее конец уже мерцал слабым светом."
 china_aprilfools25.16.a: "Он любит людей своей родины, а еще больше - человечество на этой планете."
 china_aprilfools25.17.t: "Последняя Надежда"
 china_aprilfools25.17.d: "Он сидел в центре, оглядывая двадцать генералов в форме, собравшихся вокруг него. За окном наступила ночь, но дебаты в конференц-зале становились все более напряженными. Едва заметная усталость подкралась к его позвоночнику, но его изможденные работой руки по-прежнему крепко лежали на столе. В окружении этих людей, которым доверена судьба человечества, он не мог - не мог - позволить себе даже малейшего намека на слабость.\n\nВ его глазах отражались карты многих стран: разбросанные острова, земли, разоренные войной и эксплуатацией, места, зараженные коррупцией и упадком. Все это стояло как препятствие на пути человечества к возрождению. Он намеревался, используя все имеющиеся в его распоряжении ресурсы, устранить эти препятствия.\n\nОн знал, как его оценит история - возможно, его заклеймят как тирана или провозгласят архитектором объединения. Но все это не имело значения. Важно было одно - его непоколебимая вера: как бы его ни оценили, он заставит человечество помнить этот день, помнить жертвы, принесенные кровью и духом, и помнить, каким глупым и деградировавшим было человечество когда-то.\n\nНыне, держа будущее человечества в своих руках - хотя оно будет полно шипов, и хотя оно неизбежно будет запятнано кровью - он не чувствовал сожаления."
 china_aprilfools25.17.a: "Пламя Великого Завоевательного Похода разгорелось."
 china_aprilfools25.18.t: "Журнал Опытов Адептус МеСиханикус"
 china_aprilfools25.18.d: "Номер записи: CN-IX-0047\nЗарегистрированный автор: Адепт биологии Сюй Цингран\nМестонахождение: Подземная кузница, Шэньчжэнь\nПредмет: Конструкция мягких тканей "Найлун"\n\nВ соответствии с директивами правительства, мы разработали кое-что новое здесь, в Шэньчжэне. Весь организм имеет желтоватый оттенок, почти как куча податливой ткани, но испытания показали, что он может выдерживать удары наравне с оборонительными стандартами Имперской гвардии, а также может служить мясным щитом, отвлекая на себя огонь противника. Да, он выглядит немного странно, но он несомненно полезен.\n\nВ ходе симуляции боя он выдержал семнадцать с половиной минут обстрела из обычного оружия, не получив никаких повреждений. При наступлении он может разбить вражеские ряды, расчистив путь силам, идущим позади него. Мы считаем, что это существо может быть очень практичным и отвечать реальным боевым потребностям.\n\n Мы завершили работу над первой партией и планируем отправить их в Гонконг для испытаний в реальных условиях. Если они покажут хорошие результаты, "Найлун" будет запущен в производство и развернут по всему миру в качестве передового подразделения. На поле боя они возглавят атаку и в кратчайшие сроки расправятся с противником.\n\nСледующий шаг - посмотреть, как Найлун проявит себя в реальных условиях. Мы соберем все данные и представим их на суд Высших Лордов. Надеюсь, он выдержит предстоящие испытания - было бы обидно, если бы наши усилия оказались напрасными.\n\nСлава Вседержителю! Вся слава Богу Машин!"
 china_aprilfools25.18.a: ""Какой Лунг? Найлун?""

 space_marines_infantry: "Синиус Систартес"
 space_marines_infantry_desc: ""
 power_armor_equipment: "Силовые Доспехи"
 power_armor_equipment_short: "Силовые Доспехи"
 power_armor_equipment_desc: "Следующая эволюция боевой брони, Силовые Доспехи, как их называли имперские создатели для Воинов Грома и Legio Custodes, хотя некоторые были сделаны и для простых смертных, - это полностью закрытый костюм, состоящий из профилированных пластин адамантия и пластелина с дополнительным абляционным слоем керамита, чтобы свести на нет текущий огонь из стрелкового оружия противника. В сочетании с полностью встроенной системой жизнеобеспечения для выживания во враждебных пустошах и биологическом оружии, созданном в Эпоху Страстей, автоматизированной медицинской и биоаналитической системой первой помощи, а также многоуровневой системой анализа угроз и целеуказания, известной сейчас как Auto-sense, Силовые Доспехи являются краеугольным камнем технологического могущества."
 power_armor_equipment_0: "Тяжелые Доспехи"
 power_armor_equipment_0_short: "Тяжелые Доспехи"
 heavy_infantry_equipment: "Тяжелое Пехотное Снаряжение"
 heavy_infantry_equipment_short: "Тяжелое Пехотное Снаряжение"
 heavy_infantry_equipment_desc: "Это самое тяжелое оружие, которое наши солдаты могут использовать на поле боя, в том числе множество разновидностей Болтеров."
 heavy_infantry_equipment_0: "Болтер "Фобос""
 heavy_infantry_equipment_0_short: "Болтер "Фобос""
 heavy_infantry_equipment_0_desc: "Болтер "Фобос" 70-го калибра стреляет самонаводящимся, реагирующим на массу взрывчатым "болтом", который, попав в цель, взрывается с разрушительным эффектом, фактически разрывая ее изнутри. Это квинтэссенция боевой винтовки для Имперских войск, которую носят воины Императора в мощной броне, чтобы отразить образ солдата и его винтовки в гораздо большем, разрушительном масштабе. Она использует уникальный серповидный магазин и часто используется в паре с цепным клинком Mark V-VI, чтобы дополнить набор воина, способного кромсать врагов."

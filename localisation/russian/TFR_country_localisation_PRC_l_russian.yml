 china.900.t: "Странник"
 china.900.d: "На узкой улице в Марселе, Франция, старый китайский ресторан закрылся гораздо раньше обычного. Дело было не в отсутствии клиентов. Хозяин и шеф-повар, Старик Лю, сидел внутри и с напряжённым вниманием смотрел на старый телевизор, который обычно показывал скучные короткие сериалы.\n\n"Появились новые события в Пекине: чрезвычайный съезд КПК избрал Ван Яна новым президентом Китая. В последующем телеобращении он призвал положить конец хаосу и начал курс на политические реформы демократизации..."\n\nЛю прикинул. Это был его тридцать четвёртый год во Франции. Тридцать четыре года назад он был подающим надежды молодым человеком, которого весь завод скинулся, чтобы отправить учиться в Пекин. Тогда молодой Лю был гордостью своих родителей и рабочих.\n\nНо судьба распорядилась иначе. Экономика ухудшалась, и завод, где его родители проработали полжизни, был закрыт. Денег на обучение почти не осталось, а волосы отца побелели от тревоги. Молодой Лю не мог понять, почему его честные и трудолюбивые родители, столько лет служившие стране, вдруг оказались никому не нужны.\n\nОднажды Пекин погрузился в волнения. Студенты вышли на улицы, к ним присоединились горожане. Лю шёл вместе с ними. Всё, что произошло потом, случилось слишком быстро. После последнего предупреждения он сломался и вернулся домой. На следующий день его лицо появилось на государственном телевидении - случайно попавшее в кадр среди протестующих. Родители сделали всё возможное, чтобы отправить его во Францию, к дяде. Там он и остался, работая в этом ресторане.\n\nЛю никогда не забывал глаза своей матери, покрасневшие от слёз, когда он уезжал. В прошлом году позвонили - умер отец. Вернуться он не смог. Не решился. В тихие ночи он курил китайские сигареты, подаренные студентами, и спрашивал себя, в чём же он провинился. Он ведь только хотел, чтобы общество стало лучше, чтобы Китай стал лучше. Как так вышло, что теперь он не может даже вернуться домой и проститься с отцом?\n\nИ только сегодня Старик Лю замер, осознав, что наконец может вернуться. Тридцать четыре года превратили Молодого Лю в Старого Лю. Но тепло его слёз не изменилось.\n\nПеред отъездом он снял со стены каллиграфию, написанную им на двадцатом году жизни во Франции:\n\n"Ты китаец?"\n"Любишь Китай?"\n"Хочешь, чтобы Китай стал лучше?""
 china.900.a: ""Да. Люблю. Хочу.""
 china.901.t: "Пыль плывёт, прилив поднимается"
 china.901.d: ""Я родился в первую весну Новой Китая. Тогда в уезде была лишь одна асфальтированная дорога. В её конце завод рычал, словно зверь под землёй; в воздухе кружились пыль и железная стружка, но глаза рабочих горели решимостью. Мы все верили, что пот, который мы проливаем, закалится в сталь и проложит путь к светлому будущему.\n\nВ конце семидесятых из громкоговорителей зазвучали новые лозунги. Землю раздали семьям. Завод стал пустеть. Когда-то кипевшая жизнью фабрика остыла, словно пепел благовоний в забытом храме, и теперь дремала рядом с бродячими псами.\n\nПотом время ускорилось. В девяностые огни прибрежных городов пронзили тьму внутренних районов. После 2000-го города росли, как кукуруза, выше и быстрее бамбука. А уезд остался с одними стариками и всё более тихим рынком.\n\nВ последние годы мир снова изменился. По улицам поползли слухи. Цены взлетели. Все фабрики закрылись. Никто больше не говорил о будущем. Люди лишь держались за золото и непроданные квартиры, будто от этого зависела их жизнь.\n\nПотом сменилась центральная власть. Говорят, к власти пришли люди Ван Яна. Они пообещали сократить избыточное производство стали и угля, сделать экономику "легче и светлее". Но я знаю, что эта "лёгкость" означает меньше мест, где простым рабочим можно стоять. Мой племянник теперь развозит посылки в Пекине. Девушка из соседнего дома работает кассиром в Шанхае. Никто из них не собирается возвращаться. Новая городская площадь по ночам пуста, как высохшее русло реки. Когда дует ветер, слышится лишь отголосок мотоциклов прошлых лет.\n\nА что до будущего... оно похоже на горы вдали, видимые сквозь мутное стекло. Я едва различаю их очертания. Центральное правительство говорит, что дорога впереди длинна, но сердца людей здесь - как старые штукатурные стены: внешне крепкие, но малейший ветер осыпает их прахом. Наш уезд стал колодцем, выдолбленным временем. Его эхо поёт лишь забытые песни. Я жду молодых шагов, как улицы ждут возвращения кухонного дыма, но ни те, ни другие не приходят. Возможно, однажды эта улица рухнет, покрытая новым цементом и свежими лозунгами. Свет никогда не оседает на пыли. Эпоха не оставляет места для прошлого.""
 china.901.a: ""Прилив - это фон памяти; пыль - симптом нашей реальности.""
 china.902.t: "Последнее милосердие"
 china.902.d: "Гханаш жил в горном городе у китайско-индийской границы. Два долгих года над этим местом нависала тень войны. Китайские войска проводили учения у рубежа, их стальные сапоги гремели по хребтам, а эхо артиллерии отражалось от скал. Сначала Индия оставалась настороже, готовясь к катастрофе. Но со временем даже острейшая бдительность притупилась. Казавшийся грозным восточный гигант теперь выглядел усталым. Слухи о поражении за проливом и угрозе разорительных репараций постепенно превратились в шутки за чашкой чая.\n\nНесе банку детской смеси, Гханаш насвистывал мелодию, спеша домой к теплу очага. Проходя мимо белого фургона без опознавательных знаков, он ощутил лёгкий аромат - спелого манго, густого персикового нектара. Инстинктивно нахмурился, но прежде чем успел подумать, вокруг раздались глухие удары. Люди начали падать один за другим, словно скошенные колосья. Некоторые пытались бежать, но спотыкались и валились через несколько шагов, будто сама судьба схватила их за ноги.\n\nВ ужасе Гханаш прыгнул в машину и вдавил педаль газа. Он не понимал, что происходит - знал лишь одно: каждая секунда теперь разделяет жизнь и смерть. Улицы проносились мимо. Вокруг царил хаос. Казалось, невидимые руки вырвали дыхание у города.\n\nДом. Только дом оставался верой. Он не оглядывался - лишь мчался вперёд. Остановившись у двери, он выскочил наружу. Сладкий запах по-прежнему окутывал его, как смерть с ароматом духов. Конечности немели. Каждый шаг давался с усилием, будто он нёс гору. Но он был мужем и отцом - и заставил своё тело двигаться дальше. Когда его пальцы коснулись дверной ручки, колени подогнулись. Мир закружился.\n\nДверь открылась. Жена подхватила его, тревога застыла в её взгляде. Их ребёнок мирно спал в колыбели, будто бедствия мира были всего лишь сном. Облегчение накрыло его. Веки опустились. Он устал. Сегодняшний день был спуском в ад, мысли спутались, но теперь он хотел лишь одного - сна."
 china.902.a: "Это последнее милосердие, которое мы можем даровать врагу."
 china.903.t: "Группа "Бэйдахуан""
 china.903.d: "Над международным аэропортом Харбина Тайпин снижался самолёт COMAC C919. Суй Лунфу проснулся от лёгкого сна и выглянул в окно. Под ним тянулись бескрайние зелёные рисовые поля, колыхавшиеся волнами под рёв двигателя.\n\nВо сне он снова был ребёнком - в те времена, когда государственные фермы группы "Бэйдахуан" процветали. В праздники хозяйство тратило миллионы на фейерверки, освещавшие ночное небо, а дети всех работников собирались вместе праздновать. Зимой дороги по обе стороны украшали ледяные скульптуры - по мастерству не уступавшие знаменитому Харбинскому фестивалю льда и снега.\n\nГруппа "Бэйдахуан", ранее известная как Хэйлунцзянский корпус по производству и строительству, существовала как "государство в государстве" - со своей полицией, пожарными, больницами, школами и даже судами. Эта автономия закончилась, когда указ передал её предприятия под контроль местных властей. Упадок последовал быстро. Фейерверки и скульптуры исчезли. Даже фонари на улицах перестали зажигаться по ночам. Дети рабочих уехали один за другим - среди них и Лунфу. Сегодня, услышав слово "производственно-строительный корпус", люди вспоминают лишь Синьцзян, забыв, что когда-то такой же был и в Хэйлунцзяне.\n\nМало кто знает, что генерал Ван Чжэнь первым создал корпус именно здесь, в Хэйлунцзяне. Теперь центральное правительство намерено возродить его, включая северное подразделение. В "Бэйдахуан" начали поступать огромные инвестиции, и с приходом военных администрация перешла под их контроль. Новые власти не забыли о потомках бойцов корпуса, разбросанных по дальним рубежам. Возрождение корпуса - это также способ обуздать непокорных местных чиновников: ведь сыновья и дочери корпуса всегда были вернее назначенных бюрократов.\n\nНа этот раз Суй Лунфу привёз из Пекина инвестиционное предложение, возвращаясь на родину с надеждой по-настоящему возродить Северо-Восток. Когда самолёт приземлился, он увидел перед терминалом две высокие мачты: на одной развевался пятизвёздный красный флаг, на другой - зелёное солнце "Бэйдахуан", хлопающее на ветру."
 china.903.a: "Новое вино в старом мехе."
 china.904.t: "Прощание"
 china.904.d: "Джеральд С. Коваль смотрел в пустоту на билет в руке, охваченный чувством утраты. Когда-то он был известным американским блогером на Bilibili, объективно рассказывавшим о развитии Китая и показывавшим миру его истинное лицо. Он также продвигал юньнаньский кофе, завоевав любовь китайских зрителей. Но после поражения в Тайваньском проливе отношение к иностранцам резко изменилось. Его комментарии заполнились враждебностью. Эти слова ранили сильнее всего, что он переживал до войны.\n\nПосле недавних мер правительства в отношении иностранцев его кофейный бренд был национализирован. Годы труда исчезли в одночасье. У него не осталось выбора - он должен был уехать из Китая.\n\nВ переполненном VIP-зале он случайно услышал разговор иностранных бизнесменов:\n\n"То, что случилось в Ляньмачяо, было ужасно, а пекинская полиция так ничего и не раскрыла..."\n"У них нет выбора. Национальное ополчение лишило полицию полномочий. Они не могут расследовать."\n"Иностранцы в Пекине в панике. Мой друг Уильям улетел в Дубай с семьёй. Говорит, только там безопасно."\n"Да какое там. В ОАЭ полно саудовских беженцев. Какая уж там безопасность?"\n"При таких делах как вообще бизнесу выжить?"\n"Когда сама жизнь под угрозой, о бизнесе речи нет... Standard Chartered уходит из Китая в этом году, включая Гонконг."\n"Что? Даже Гонконг?"\n\n"После того как Национальное ополчение вошло в Гонконг, иностранные компании стали ещё более нервничать. Не говоря уже о двух восстаниях. HSBC уже сократил более половины операций в Гонконге и закрыл всё на материке. Семья Кадури продала все свои отели Peninsula и вернулась в Британию. Swire избавилась от недвижимости в Китае. Ходят слухи, что Cathay Pacific уже перешла под контроль правительства."\n\nУслышав это, Джеральд понял - старая эпоха закончилась. Он чувствовал себя одиноким кораблём в беззвёздном море. Гражданская война пожрала его родину, почти вся семья пропала без вести. А теперь его вторая родина тоже выталкивала его прочь. Глядя на самолёты, взлетающие из столичного аэропорта, он думал - куда теперь ведёт его будущее."
 china.904.a: "Зазвучало объявление. Он направился к выходу, оставив позади свой второй дом."
 china.905.t: "Размышление"
 china.905.d: "Он всегда считал своей жизненной заповедью две знаменитые строки с площади Тяньаньмэнь. Честно говоря, он не испытывал вражды к японцам как к народу. Его ненависть была направлена против милитаристских преступников войны и непримиримой Либерально-демократической партии. Он верил, что народы Японии и Китая - это одна семья в мировом сообществе.\n\nИ всё же он не мог понять, зачем Япония вмешивается в великое дело освобождения Тайваня. По правде говоря, он не был крайним националистом. Но обида на Японию начала расти в нём. Он не знал, справедливо ли это чувство, но Китай уже не был прежним. Антияпонские настроения, долго дремавшие в народе, теперь усилились во сто крат.\n\nВ Китае выражение "все так делают" обладает особой силой, и он не был к нему невосприимчив. Первоначально он жил бы обычной жизнью студента-инженера. С его слабым здоровьем армия бы им не заинтересовалась. Но с введением новой политики Ли Цзочэна каждый студент стал резервистом. Иногда он задумывался: каким был бы мир, если бы Япония не вмешалась в освобождение Тайваня?\n\nК сожалению, истории не знают сослагательного наклонения. Всё, что он мог - это плыть по течению эпохи. Он не хотел сталкиваться на поле боя с людьми других стран, но фашистское правительство Японии не оставило выбора ни ему, ни собственному народу. Жаль, что обе страны вынуждены пройти через войну.\n\nК счастью, крайние ультранационалисты не пришли к власти, и Ли Цзочэн не был одним из них. Будущее не казалось безнадёжным. Он принял решение. Он пойдёт в армию. Что бы ни было, он часть Китая. Он мог не любить нынешнее правительство, но не мог препятствовать национальному единству. Возможно, в кампании по освобождению Японии ему удастся защитить хоть кого-то из мирных жителей.\n\nВозможно, в кампании по освобождению Японии ему действительно удастся защитить мирных жителей."
 china.905.a: "Несомненно, бесчисленные другие чувствуют то же самое."

 china.1500.t: "Деревня вступает в новый век"
 china.1500.d: "Когда дневная пара закончилась, Ли Син закрыла тетрадь, положила её в рюкзак и поспешила выйти из лекционной аудитории. По дороге в столовую она достала телефон и разблокировала экран. Несколько новых сообщений в WeChat пришли от секретаря деревни из её родного Пинъу, Мяньян - родственника, которого она видела только на Новый год.\n\n"Синьсинь, как дела в Чунцинском университете почты и телекоммуникаций? Помоги-ка - зарегистрируйся в нашей деревенской мини-программе "Чуань Шаньчжи" и подними статистику. Посмотри, всё ли там в порядке, и напиши, если что-то нужно исправить. Когда будет время - опубликуй что-нибудь позитивное [смайлик с кулаком]." Под сообщением была ссылка на мини-программу WeChat.\n\nЛи Син остановилась у ступеней столовой и нажала на ссылку. На экране появилась зелёная страница, заполненная фотографиями из деревенской жизни, учебных курсов и правительственных объявлений. Используя свой номер телефона и последние шесть цифр паспорта, она завершила "проверку жителя деревни". После принятия приглашения секретаря под её именем появилась новая метка: "Жительница деревни Аньго".\n\nИз любопытства она открыла "Форум жителей". Последний пост, сделанный полчаса назад "Старым Чжаном из группы №3", содержал фото: "Секретарь, фонарь на дороге к водохранилищу снова не горит. Ночью кромешная тьма - жутковато". Ли Син обновила страницу. Почти сразу появился ответ от "Секретаря партийной ячейки Чжао Гоцяна": "Принято. Позвонил электрику Лао Ли - починит после ужина. Не волнуйся, Чжан".\n\nВыйдя обратно в меню, она открыла "Магазин баллов". На экране показывались снеки, напитки и предметы повседневного пользования, у каждого - своя цена в баллах и правила: волонтёрство добавляет 30 баллов, клевета вычитает 20 и так далее.\n\nКогда она уже хотела что-то написать, заметила, что столовая полна людей. Ли Син быстро выключила экран, убрала телефон в карман и шагнула в толпу."
 china.1500.a: "Сегодня ветер какой-то шумный."
 china.1501.t: "Новая Япония и старая Япония"
 china.1501.d: "Послеполуденное солнце пробивалось сквозь деревья парка Синдзюку Гёэн, отбрасывая беспокойные узоры на кофейную чашку Рёко. Неподалёку звучали ритмичные звуки труда. Группа молодых людей - одни с красными повязками с надписью "Добровольцы китайско-японской дружбы", другие местные студенты - расчищали руины павильона, разрушенного во время боёв. Рёко сделала глоток чуть горьковатого кофе, её взгляд скользнул за парк - к уцелевшим небоскрёбам вдали.\n\nЕё муж, Масао, умер в одном из тех зданий - кароси, смерть от переработки, термин, который Япония подарила миру со стыдом. Он отдал всё своей компании - огромной и безжалостной корпорации. Солдат в костюме, он сражался за квартальные отчёты и долю рынка до последнего вздоха. Такая глупая верность, подумала Рёко, ничем не отличалась от того, как погиб её дед.\n\nЕго фотография до сих пор стояла на домашнем алтаре в доме её матери - солдат, чьи кости давно обратились в пыль на каком-то безымянном острове Тихого океана. За что он умер? За человека, называвшего себя богом во плоти? За иллюзию, именуемую Сферой сопроцветания Великой Восточной Азии, созданную армией, якудза и монополистическим капиталом?\n\nДля Рёко суть старой Японии никогда не менялась. Будь то милитаристы с саблями, политики, низко кланяющиеся в извинениях, гангстеры, управляющие игорными залами и борделями, или директора в безупречных костюмах - всё это были лица одной системы. Системы, которая заставила её деда умереть ради тщеславия императора, а мужа - ради прибыли корпорации.\n\nТеперь эта система разрушалась. Каждый день телевизор приносил новости из Китайской Народной Республики: роспуск монополистических концернов, отмену наследственной аристократии, запрет азартных игр и секс-индустрии. На соседней скамейке два старика ворчали - Япония, говорили они, больше не Япония. Рёко поставила чашку.\n\nОна задумалась, какую Японию они имели в виду. Ту, что отправила её деда в пушечное мясо? Или ту, что превратила её мужа в расходный материал?"
 china.1501.a: "Уж точно не сегодняшнюю Японию."
 china.1502.t: "Гражданин Кэндзи"
 china.1502.d: "Кэндзи снял обувь у двери, перекинул через руку рабочую куртку - всё ещё с лёгким запахом ржавчины с порта. В доме было тихо. Жена, Мисако, готовила на кухне простой ужин, вытяжка гудела ровно. Сын только что вернулся из школы и сидел в комнате, повторяя урок китайского.\n\nКэндзи не пошёл в ванну. Он прошёл прямо через гостиную и сдвинул стеклянную дверь на балкон. Перед ним раскинулось ночное небо Фукуоки. Через залив Хаката виднелся промышленный район, некогда пылавший огнями, теперь же лишь кое-где тускло мерцали фонари - словно остывшие угли, гигантские силуэты молчали во тьме.\n\nОн закурил и глубоко затянулся. Когда-то Кэндзи был старшим техником именно на том заводе, отвечал за обслуживание точных автоматизированных линий. Но война закончилась слишком быстро - так быстро, что никто не успел осознать. В одно мгновение пришли корабли, с них сошли китайские инженеры в другой форме. Они демонтировали машины - лучшие из Германии, Швеции и самой Японии - упаковали, подняли и увезли.\n\nТеперь его работа была в управлении портового хозяйства Республики - чинить трубы и электрику. Работа несложная, зарплаты хватало на семью.\n\nПо телевизору диктор с лёгким акцентом на японском сообщал о новом торговом соглашении между Народной Республикой Кюсю и Социалистической Республикой Сикоку. А слово "Япония" для его сына почти стало просто названием на старых картах. Возможно, когда их поколение уйдёт, Япония останется лишь географическим термином.\n\nКэндзи не испытывал злобы. Судьба для простых людей похожа на тайфун - остаётся лишь склонить голову, обнять близких и ждать, пока пройдёт. Где он сорвёт крышу - не нам решать. Огромные машины, что когда-то правили жизнью, ушли, но сама жизнь - древняя, медленная и упрямая машина - всё ещё вращалась. Сын всё ещё ходил в школу. Жена всё ещё ходила за покупками. У него всё ещё была работа.\n\n"Кэндзи, ужин готов!" - позвала Мисако из кухни."
 china.1502.a: ""Иду", - сказал он, туша последний уголёк."
 china.1503.t: "Вопрос святилища Ясукуни"
 china.1503.d: "Когда в Японии постепенно восстанавливалась стабильность и начинал возрождаться общественный порядок, перед властями встал вопрос, более сложный, чем военная оккупация или политическая реконструкция:\n\nчто делать со святилищем Ясукуни? На протяжении десятилетий оно служило символом японского милитаризма, само его существование воспринималось как открытая провокация для народов Азии. Внутри партии мнения резко разошлись.\n\nПервое предложение требовало полного сноса. Святилище Ясукуни, говорили сторонники, - злокачественный пережиток милитаризма, отрицающий ответственность Японии за агрессию и зверства по всей Азии, отвергающий справедливость послевоенных приговоров. Сохранение такого символа в любой форме - осквернение мира. Только уничтожив его до основания, можно вырвать идеологические корни возможного возрождения милитаризма.\n\nВторое предложение утверждало, что простое разрушение не сотрёт историю, а, наоборот, даст оружие националистическим остаткам. Святилище следует преобразовать в Мемориальный музей мира - место, где будет показано, как японский милитаризм принёс неизмеримые страдания не только народам Азии, но и самим японским прогрессивным и левым силам. Оно должно почтить память тех, кто осмелился противостоять фашизму и милитаризму - Сайто Такао, Токуды Кюити, Котоку Сюсуй и других.\n\nТретье предложение утверждало, что святилище нужно превратить в Музей преступлений японского милитаризма. Снос или превращение в парк, по их мнению, размоет первоначальный смысл и вину. Самый эффективный путь - сохранить его на месте, превратив в постоянную выставку, где с неоспоримыми доказательствами будут задокументированы преступления японского милитаризма против народов Азии - от прошлого до настоящего. Это станет вечным предостережением будущим поколениям Японии.\n\nВ данный момент все три противоположных предложения переданы на рассмотрение Центрального Политбюро..."
 china.1503.a: "Первое предложение кажется предпочтительным."
 china.1503.b: "Второе предложение кажется предпочтительным."
 china.1503.c: "Третье предложение кажется предпочтительным."
 china.1504.t: "Династия Хризантем"
 china.1504.d: "В конце Второй мировой войны союзники спорили, как поступить с императором Хирохито и его военной ответственностью. В итоге, ради прагматичной цели - быстрой стабилизации ситуации - Хирохито был лишён статуса живого божества и издал "Декларацию человечности". Однако его сохранили как символическую фигуру.\n\nТеперь, когда принципиальное решение об упразднении императорского института и роспуске императорского дома принято, внутри партии выдвинуты три различных предложения о том, как поступить с нынешним императором и его семьёй:\n\nПервое предложение: По образцу обращения с Пу И, император и его семья должны пройти полное перевоспитание. Их отправят в специальные учреждения для длительного исторического изучения, трудового перевоспитания и идеологической подготовки. Цель - превратить их в самостоятельных граждан, глубоко осознающих исторические преступления, совершённые императорской системой - как против народов Азии, так и против самого японского народа.\n\nВторое предложение: Императорская система была идеологическим основанием для возрождения милитаризма и самой войны. Поэтому император и его семья должны быть переданы военному трибуналу для публичного суда - чтобы ответить за экспансионистскую политику, начавшуюся с Мэйдзи.\n\nТретье предложение: Сторонники этого варианта предупреждают, что любой суд или перевоспитание могут быть использованы остатками японских националистов, которые сделают из императорской семьи мучеников. Самый безопасный путь - лишить их статуса, гражданства и всего имущества, и навсегда выслать из страны. Они проведут остаток жизни как частные лица под строгим наблюдением."
 china.1504.a: "Отправить их на перевоспитание."
 china.1504.b: "Они должны ответить за войну."
 china.1504.c: "Выгнать их."
 china.1505.t: "Потерянный кот"
 china.1505.d: "Токио, восемь месяцев после войны. Ягами Такаюки всё ещё вставал рано каждый день - как и прежде. В конце концов, диван в детективном агентстве Ягами не гарантировал хорошего сна. Он спустился вниз, а телевизор у входа в круглосуточный магазин снова крутил новости о новых мерах:\n\n"Распустить дзайбацу, запретить азартные игры, реорганизовать группы якудза..." "Даже синдикаты теперь переквалифицировались в строительные фирмы. Если бы клан Тодзё всё ещё существовал, они бы, наверное, продавали бетон", - подумал Ягами.\n\nУлицы выглядели новыми, но воздух всё ещё хранил запах гари войны. Строительные площадки, ремонт дорог - всё напоминало, что этот город недавно пережил ожесточённые бои. Его агентство тоже с трудом выживало в послевоенном Токио. После полугода под китайским военным управлением город вернули, но он стал "странным". Опасные дела, связанные с организованной преступностью, исчезли - любые намёки на якудза пропали.\n\nТеперь оставались только однообразные дела: бабушка, переживающая за внука, который просто задержался на подработке; супруг, подозревающий измену, хотя другой готовил сюрприз; и потерянные коты - которые почти всегда возвращались домой раньше своих хозяев. Ягами понял, что на самом деле ничего не изменилось. Его дела до войны были точно такими же, только без якудза.\n\nЗакончив завтрак, он вернулся в агентство. Сегодня не было исключением. На входе застенчивая старшеклассница стояла с волнением. "Э-э... вы мистер Ягами? Я... я хотела бы попросить вас найти кота!" Она протянула фото пухлого рыжего кота.\n\nКот. Конечно.\n\n"Как зовут?" - "Тайсё... но мы обычно зовём его "Старина Тайсё". Мой отец... он погиб на войне. С тех пор дед почти не разговаривает. Он говорит, что Старина Тайсё - последний "мужчина" в нашей семье. Если кот тоже пропадёт... он не переживёт."\n\nЯгами застыл на секунду, затем взял фото и принял заказ. Снова он вышел на улицы искать кота. Проходя мимо отремонтированных башен, свежеуложенных дорог и переулков, где больше не скрывались якудза."
 china.1505.a: "Война что-то изменила - кое-что к лучшему, кое-что к худшему. Но, по крайней мере... сейчас всё не так уж плохо."
 china.1506.t: "Маленький Гуанчжоу южного полушария"
 china.1506.d: "Вибрация асфальтового отбойника наконец стихла. Хуан Кайжуй отпустил рукоятку, позволив тяжёлой машине отдохнуть на разбитом тротуаре. Он снял защитные очки, стёр пот и пыль с лица, взял бутылку с водой и сел на недавно уложенный бордюр - результат работы его бригады днём ранее.\n\nПешеходы спешили мимо, уткнувшись в телефоны. Казалось, всё вернулось к норме, словно войны никогда и не было. Он вспомнил тот день, когда пришла новость о падении Тайваня и вступлении НОАК. На канале ABC ведущие описывали китайскую армию как варваров, вторгшихся в цивилизованный мир - бездушных солдат прямо из романов Оруэлла.\n\nПожилой мужчина бросил взгляд на форму Хуана, на китайские иероглифы, напечатанные на груди, и пробормотал спутнику: "...диктатура...". Хуан открутил крышку и сделал долгий глоток. Он вспомнил "времена свободы": бесконечные разговоры об инфляции, застой зарплат, растущие счета за электричество и постоянное чувство тревоги из-за уличной преступности, которую никто не мог обуздать.\n\nТеперь же молодёжные банды, возникшие в хаосе войны, аборигенные бродяги и ультраправые мародёры исчезли. Патрули НОАК восстановили порядок всего за неделю, а китайские компании прокладывали оптоволокно и восстанавливали железные дороги с такой скоростью, о какой местные фирмы и мечтать не могли.\n\nПока он размышлял, мимо проехал бронированный автомобиль ADF с камуфляжной раскраской, солдаты внутри смотрели в окна без выражения. Хуан слышал, что теперь их обязанности сводились к поддержанию общественного порядка и помощи НОАК в зачистке внутренних районов от бандитов. Возможно, это и к лучшему, подумал он. По крайней мере, правительство больше не тратит налоги на устаревшее, бессмысленное вооружение."
 china.1506.a: "Не забудь оформить карту Банка Китая!"
 china.1507.t: "Горы за горами, воды за водами"
 china.1507.d: "Господин Нгуен легко постукивал пальцем по краю стакана. Лёд давно растаял. Каждый день после обеда он сидел в этом старом чайном домике у озера Хоан Кием. Это было лучшее место - идеальное, чтобы наблюдать за проходящими людьми. Толпа на улице стала более пёстрой, чем когда-либо: китайские инженеры, говорящие на мандаринском, бизнесмены, ведущие переговоры, и даже тёмнокожие камбоджийские рабочие. Все спешили по делам, ничем не отличаясь от жителей Ханоя.\n\nОн сделал небольшой глоток горького холодного чая, и мысли его вернулись в прошлое - во времена, когда генералы Народной армии контролировали банки и телекомы, больше походя на капиталистов, чем на солдат. На юге, в Хошимине, финансовая элита осушала богатство страны махинациями с недвижимостью и акциями. А улицы Ханоя? Тогда полиция и уличные торговцы гонялись друг за другом каждый день в хаосе.\n\nНо как только прибыли китайские товарищи, всё изменилось. Господин Нгуен не знал, что именно произошло в Центральном комитете; он лишь видел, как таблички военных корпораций исчезли за одну ночь, как магнаты, правившие Сайгоном, подверглись аудиту, их небоскрёбы национализировали, а уличных торговцев переселили на государственные рынки.\n\nИногда он видел тех, кто уехал - остатки старого Южного Вьетнама, выкрикивающих из Бразилии или Аргентины. Они бросали самые грязные слова, называя правительство Ханоя "фашистским", "тоталитарным". Что они понимали? Их "свободный" Вьетнам погряз в бандах, коррупции и безысходности. Та "диктатура", которую они клеймили, принесла скоростные железные дороги по всей стране, инвестиции, заводы и уровень благосостояния, о котором народ раньше и не мечтал.\n\nОн допил последние капли чая. А что до того, правильно ли всё это и куда приведёт будущее - решит история. Он всего лишь старик, сидящий у озера и пьющий свой чай."
 china.1507.a: "Дружба Китая и Вьетнама вечна."
 china.1508.t: "Пятизвёздный флаг и одно звёздный флаг"
 china.1508.d: "При поддержке EADI глубоко укоренившиеся сети прибыли внутри Народной армии Вьетнама были уничтожены менее чем за месяц, а все активы национализированы. Затем настала очередь финансовых и строительных олигархов, почти обескровивших южную экономику - их счета заморозили, а корпорации последовательно ликвидировали.\n\nВ Центральном нагорье и горных районах на границе сепаратистские отряды, пытавшиеся воспользоваться хаосом войны, были быстро уничтожены. Даже в Ханое, где нелегальные уличные торговцы считались вечной проблемой, вопрос наконец был решён. Улицы столицы вновь обрели покой и порядок.\n\nНо для Лама, студента университета, этот покой не распространялся на интернет. Как обычно, он открыл ноутбук, клавиатура вспыхнула разноцветной подсветкой. Через пару кликов появился знакомый синий интерфейс форума VOZ.\n\nОн сразу перешёл в раздел "F33". Наверху красным шрифтом закреплена тема: "Началась ликвидация Vin Group - Конец эпохи Фам Нят Выонга".\n\nОтветы кипели. Один пользователь писал: "Южная экономика мертва! Они разрушают всё, что мы построили! Это грабёж - они хотят вернуть нас в нищету!"\n\nЛам начал набирать ответ: ""Южная экономика"? Ты имеешь в виду пузырь, надутый спекуляцией? Твой "герой" Фам Нят Выонг взвинтил цены на жильё своими играми и оставил всех в долгах. Он был перекупщиком и игроком - не больше. Теперь, когда казино закрылось, ты не можешь смириться?"\n\nКак только он нажал "Отправить", в углу экрана всплыло уведомление - кто-то процитировал его сообщение: "Ханский раб".\n\nЛам усмехнулся и быстро набрал: "Ханский раб? Лучше уж так, чем колониальная шавка. У вас, южан, нет права презирать нацию. Твой дед чистил французские сапоги, твой отец водил американских солдат, а ты... ты бегаешь за японским капиталом.""
 china.1508.a: "Ещё один прекрасный день."
 china.1509.t: "Друзья издалека"
 china.1509.d: "Ма Илун внимательно изучал человека напротив - высокого, худощавого индийца по имени Кишан, лидера партизанской делегации.\n\n"Товарищ Ма, - сказал Кишан с сильным акцентом, - благодарим вас за организацию этой встречи."\n\n"Вы слишком вежливы, товарищ Кишан", - ответил Ма Илун, передавая лист бумаги. - "Перейдём к делу. Лекарства, о которых вы просили, готовы. Мы также конфисковали партию зерна, которую можем передать вам."\n\nКишан посмотрел на список, но не взял его сразу. "Две недели назад, - начал он спокойно, - к нашему Центральному комитету прибыл посланник правительства Индора. Он пообещал признать наше руководство, если мы продолжим нападать на ваши логистические базы."\n\n"После этого мы провели публичный трибунал, - продолжил Кишан всё тем же ровным тоном. - Посланник был казнён перед народом. Мы никогда не заключаем сделок с классовыми врагами."\n\n"Мы одобряем вашу позицию", - сказал Ма. Только тогда Кишан протянул руку за списком. "Мы благодарны за лекарства и зерно, - сказал он. - Но нам нужны также оружие."\n\n"Оружие..." - Ма замялся. - "Товарищ Кишан, надеюсь, вы понимаете нашу позицию. Наши войска здесь для обеспечения стабильности в Тибете..."\n\n"Мы понимаем", - твёрдо ответил Кишан, глядя Ма в глаза. - "Но ведь оружие, изъятое у бандитов, должно куда-то деваться."\n\nМа слегка улыбнулся. "Это верно. Захваченные винтовки и боеприпасы - это максимум, что мы можем предложить." - "Договорились."\n\n"Кстати, товарищ Кишан, - Ма слегка откинулся назад, - мне любопытно. Вы утверждаете, что парламентский путь - полное предательство. В нынешней обстановке это не слишком догматично?"\n\nКишан прервал его, не дав договорить. "Товарищ Ма, вы должны понимать - любая попытка пойти на компромисс с этим гниющим капиталистическим строем закончится тем, что он вас поглотит." Ма мгновенно осознал, что переступил грань - он попытался судить революционеров глазами правящей партии.\n\n"Товарищ Кишан, - сказал он, выпрямившись, - вы правы. Прошу прощения за слова. У вас своя борьба; я не имею права судить."\n\nВыражение лица Кишана смягчилось. Он кивнул. "Рад, что мы поняли друг друга.""
 china.1509.a: "И не без радости."
 china.1510.t: "Южная жара"
 china.1510.d: "Похоже, кондиционеры в аэропорту сломались ещё во время войны и так и не были отремонтированы. Как только У Минчжэ вышел из зоны таможни, его окутала волна влажного воздуха - тяжёлого, с запахом гвоздичных сигарет и плесени. Он прилетел из Гаосюна и, хотя считал себя привычным к жаре, объятия Джакарты пропитали спину его свежей рубашки потом всего за несколько минут. Пробираясь сквозь толпу, он быстро заметил мужчину с табличкой, на которой было написано его имя.\n\n"Господин У, я А Мао. Промышленный парк прислал меня за вами", - сказал молодой худощавый китаец, легко подхватывая чемодан. Снаружи жара была ещё невыносимее. А Мао провёл его к сверкающему новому BYD Han, открыл заднюю дверь, и У забрался внутрь. Поток холодного воздуха мгновенно окутал его. "Вот это, - выдохнул он, - я называю кондиционером."\n\n"Разумеется, господин У. Парк недавно обновил весь автопарк", - сказал А Мао, тронув автомобиль с места. Машина плавно выехала из парковки. "Теперь все электрокары здесь - китайские. Зарядные станции ставят повсюду - и электричество дешёвое."\n\nУ посмотрел в окно. Местами виднелись почерневшие остовы зданий, оставшихся после боёв, но куда чаще встречались огромные стройки с китайскими и индонезийскими флагами. Вдоль трассы мелькали щиты OPPO и Gome Electric. "Джакарта выглядит как одна большая стройплощадка", - заметил У.\n\n"А то! - усмехнулся А Мао, показывая на ряд серых башен, тянущихся к небу. - Это продление высокоскоростной линии Джакарта–Бандунг. Как только пришло новое правительство, China Railway взяла проект - говорят, дойдут до Сурабаи за три года. Раньше только оформление земли заняло бы десятилетие." - "А местные... не возражают?"\n\nА Мао фыркнул. "Что им возражать? Не забывайте, НОАК всё ещё здесь. К тому же новое правительство платит им за работу. Хотя, - добавил он с усмешкой, - они мало изменились: ленятся при первой возможности. Наш парк лучше переплатит и привезёт рабочих из Вьетнама, чем будет полагаться на них.""
 china.1510.a: "Интересно, стоит ли ещё носить деньги на кофе."
 china.1511.t: "Одинокий страж" 
 china.1511.d: "Банкетный зал пульсировал теплом и шумом - крики, смех, непрерывный звон бокалов. Генералы, лица которых раскраснелись от триумфа, поднимали тосты за полную победу: воссоединение Родины и разгром японско-индийского реакционного альянса - вместе с китайскими товарищами.\n\nКим Чен Ын прошёл сквозь толпу с бокалом вина в руке и тихо толкнул тяжёлые стеклянные двери, ведущие на балкон. В ночном воздухе Пхеньяна чувствовалась лёгкая прохлада, прорезающая веселье за спиной. Он стоял один, высоко над городом, который унаследовал - и за который поставил на кон всё.\n\nНа обоих берегах реки Тэдонг странные силуэты улицы учёных Мираэ и новых высоток на Ивовой улице чертили яркий горизонт на фоне темноты. Районы, где когда-то гас свет из-за нехватки энергии, теперь сияли непрерывными рядами огней. Дивиденды воссоединения - и обширная помощь северного союзника - начали наполнять жизнью сосуды города, истощённые десятилетиями.\n\nОн вспомнил годы, проведённые на канате над пропастью. Он всегда знал страдания своего народа; он всегда знал, какие предательства прячутся во мраке. Полжизни он потратил, ковал несломимый щит для этой нации и её народа. Но щит был тяжёлым - настолько, что требовал голода, терпения и жертв от тех, кого должен был защищать. Он почти раздавил всех под собой.\n\nОн был одиноким стражем, охранявшим мерцающий фонарь в бурю. Но теперь взошло солнце - и оно уже не закатится. Облака, висевшие над полуостровом семьдесят лет, рассеялись. Наконец он мог отпустить штурвал, за который сжимал пальцы до белых костяшек. Возможно, история навсегда свяжет имя Ким Чен Ына с жестокостью и изоляцией. Пусть так. Теперь он потратит остаток жизни на восстановление этой израненной, исцеляющейся земли.\n\nОн глубоко вдохнул. Позади вновь распахнулись двери банкетного зала -"
  china.1511.a: "Но он не обернулся. Он хотел смотреть на свет ещё немного."
 china.1512.t: "Слуга народа"
 china.1512.d: "Государственный самолёт плавно остановился. Лестницу подогнали, и от двери трапа до ожидающего кортежа развернули красную дорожку. Никакого торжественного приёма - лишь один старший товарищ из Центрального комитета стоял у подножия ступеней. Крепкое рукопожатие, несколько коротких приветственных слов.\n\nКогда дверь чёрного лимузина "Хунци" закрылась, внешний мир исчез. Эскортные мотоциклы возглавили колонну, и кортеж плавно влился в поток по шоссе к центру города. Всё это время взгляд Ким Чен Ына был прикован к видам за тонированным стеклом. Пекин - столица великого соседа с севера.\n\nКортеж проехал Третье кольцо и вошёл в центральный деловой район. Башни из стекла и стали пронзали небо с подавляющей уверенностью. Внизу бесконечным потоком текло движение; витрины магазинов сверкали товарами, о которых его собственный народ мог лишь мечтать; пешеходы переходили широкие улицы - спокойные лица, размеренный шаг - словно жестокая война, охватившая половину Тихого океана, была лишь далёким шумом.\n\nИ всё же именно он выиграл ту войну. Он исполнил обет своего деда и отца - вознёс флаг Республики над всем полуостровом. Но цена была почти всем. Полуостров лежал в руинах. Обломки Сеула всё ещё расчищались; порт Хэджу был безмолвен; миллионы беженцев перешли Ялу, ища спасения в лагерях на северо-востоке Китая.\n\nТеперь он был лидером семидесяти миллионов корейцев - от заснеженных вершин Пэкту до мандариновых садов Чеджу - семидесяти миллионов глаз, ждущих от него пищи, света и будущего, выстроенного на пепле победы.\n\nЛимузин замедлил ход и въехал в торжественный комплекс, окружённый красными стенами. Машина остановилась.\n\nКим Чен Ын поправил пиджак, разгладив складку на лацкане."
 china.1512.a: "Настало время приступить к службе."
 china.1513.t: "Росток на пепле"
 china.1513.d: "Карачи, некогда оживлённый мегаполис, превратился в пустошь из обломков бетона и искорёженной арматуры. Выжившие бродили среди руин, словно призраки; крики и стоны быстро сменялись оглушающей тишиной. Бариса и её отец выжили по жестокому случаю - их не было дома во время взрыва, когда они собирали паёк. Мать и два младших брата погибли.\n\nПолный крах порядка - от остановки инфраструктуры до распада правительства - погрузил город в хаос. Бариса и многие другие нашли убежище в частично разрушенной школе, прячась от радиоактивных дождей и мародёров. Катастрофа свела некоторых с ума - их истеричные вопли пронзали воздух. Дети, потерявшие семьи, жались по углам, беззвучно рыдая. Большинство же людей молчали, опустошённые, лишь оболочки самих себя, утратившие волю к жизни.\n\nОднажды на площадь перед школой въехали военные грузовики. Из них вышли люди в белых защитных костюмах. Бариса, ослабевшая после дней без пищи и чистой воды, не смогла даже подумать о том, кто они. Вдруг по укрытию пронзительно прозвучало одно слово: "Припасы!"\n\nКитайцы привезли еду, чистую воду, медикаменты и, самое главное, - подлинную искру надежды. Следуя указаниям переводчика, беженцев погрузили в грузовики партиями и отвезли в большой лагерь. Китайские военные взяли на себя спасательные и миротворческие обязанности, оставленные рухнувшим пакистанским правительством. Барисе и её отцу выделили отдельную палатку с двумя кроватями и простой печкой. Таких палаток было бесчисленное множество, выстроенных в ровные ряды до самого горизонта.\n\nЗдесь Барисе больше не нужно было бояться бандитов. Едя горячую кашу, она не смогла сдержать слёз - все подавленные чувства вырвались наружу. Война отняла у неё семью и разрушила дом, но с приходом китайских военных в сердцах отчаявшихся людей проросло зерно надежды - зерно, которому суждено однажды расцвести на этой израненной земле."
 china.1513.a: "Свет надежды пронзает беззвёздную ночь."
 china.1514.t: "Поезд в весну"
 china.1514.d: "От устья Бохайского моря восточный ветер нёс дыхание весны до самых южных морей, прочерчивая на карте тонкую дугу железнодорожной линии - от северной столицы до экватора. В пекинском зале заседаний не звучали тосты и лозунги, лишь чертёж новой магистрали, который складывали и разворачивали снова.\n\nГоскомитет по развитию и реформам и Министерство транспорта приняли решение продлить сеть высокоскоростных железных дорог на юг; линии Пекин–Гуанчжоу и Шанхай–Куньмин должны были поделить северный поток, а излом южного маршрута через Юньнань - сгладить. Несколько юго-западных терминалов тихо сменили название с "конечной станции" на "промежуточную".\n\nНовые трансграничные вокзалы были скромны, с лаконичными двуязычными вывесками. В депо стояли по соседству поезда разных колей; переход от одного стандарта к другому был так же точен, как смена нити у портного - почти незаметный для непосвящённого взгляда.\n\nВо время последнего испытательного рейса перед открытием поезд вышел из северной столицы, прорезая скалы и террасы, скользя над известняковыми пиками и красноземными плато. Ночью, под полосами тропического дождя, он тихо протрубил - минуту молчания в память о шрамах на своём пути.\n\nВ день первого рейса среди пассажиров была семья из трёх человек, отправившаяся из северной столицы к экватору. Отец закрыл давно забытые рабочие файлы и наконец позволил себе отсроченный отпуск. Мать в зале ожидания вставила батарейку в старую камеру - хотела запечатлеть каждый пейзаж, каждое лицо по дороге.\n\nПоезд пересёк горы, проливы, и когда прибыл на конечную станцию, не было шума. Букеты держали на одной высоте. Кондуктор опустил фуражку на дюйм ниже - дюйм, означавший уважение.\n\nДаже если история когда-то развела их по разные стороны, теперь они снова встретились на перроне - с достоинством, со спокойствием. И когда первая утренняя птица запела, с севера на юг, железная дорога вновь сшила их вместе."
 china.1514.a: "Братья Азии, долго разделённые морем, вновь обнимаются."
 china.1515.t: "Морской бриз остаётся"
 china.1515.d: "Утренний воздух на Рафлз-Плейс всё ещё нёс солоноватый привкус моря. В холле Темасека старую табличку бережно накрыли чёрной тканью. Когда пресс-конференция завершилась, в воздухе остался лишь один заголовок: "Это не демонтаж - это перепроводка".\n\nНе было ни фейерверков, ни лозунгов. Комитет по государственным активам перестраивал сеть старого города - Темасек, некогда всевидящий оператор, теперь отходил на второй план. Он управлял бы лишь главной схемой, следил за потоками и регулировал показатели.\n\nЕго дочерние компании, словно отдельные цепи, должны были сиять самостоятельно - изолированные, сбалансированные, но связанные одной линией. Между новыми платформами средства можно было занимать, но не гарантировать; материнская структура оставалась лишь "предохранителем" и кредитором последней инстанции.\n\nВ утренней толпе лифта молодой рабочий из портовой линии нёс каску за спиной. "Мы занимаемся кораблями, не ветром", - объяснял он дяде рядом. - "Ветер теперь принадлежит Фонду трансформации." Дядя кивнул, сжимая буклет с рекламой нового инвестиционного канала CPF - шрифт крупнее, чем на станционных табло. В обеденной забегаловке тётушка, продававшая тосты с каей, повесила весёлое объявление: "Сегодняшний спецпредложение: дивиденды без сахара, раскрытия с двойным интервалом".\n\nПосле полудня дождь пришёл внезапно и так же быстро ушёл. Комитет снял последний кусок чёрной ткани; новая вывеска открылась сдержанно и спокойно. Местный инженер-консультант и специалист по полупроводникам из Шанхая стояли бок о бок в коридоре, глядя к морю. Они говорили о своих детях - один готовил проект для школьной выставки в Йишуне, другой писал эссе о "углеродных следах" в Пудуне.\n\nМежду их смехом, казалось, оба слышали один и тот же шум волн. К закату улицы опустели. Город-лев вернул ветер морю и послал свет в свои окна. Темасек не стал меньше - он просто научился делиться энергией с каждым светящимся окном."
 china.1515.a: "Каждая линия - свой контур, но от этого горят ярче все лампы."
 china.1516.t: "Единство приносит мир"
 china.1516.d: "Современный международный порядок переживает беспрецедентные потрясения. Великие державы увязли во внутренних конфликтах, а отношения на Европейском континенте достигли исторического минимума, что фактически парализовало традиционные дипломатические каналы.\n\nНа этом фоне Организация Объединённых Наций становится всё менее эффективной в решении глобальных проблем. Территориальные споры и гуманитарные кризисы распространяются по множеству регионов, а система глобального управления переживает глубокий кризис - мир и стабильность во многих частях света висят на волоске.\n\nПеред лицом этой неопределённости Китай, как одна из ответственных великих держав мира, должен сделать шаг вперёд и взять на себя обязанность по обеспечению как региональной, так и глобальной безопасности. Стремясь преодолеть тупик и восстановить стабильность, страны начали долгий и трудный процесс закрытых переговоров - наполненных жаркими спорами, сменой позиций и болезненными компромиссами.\n\nВ конечном счёте был достигнут консенсус относительно смелой идеи: создания нового механизма, независимого от старой системы, посвящённого мирному разрешению международных споров.\n\nЭта историческая дипломатическая инициатива принесла плоды в Гонконге. В здании старого полицейского участка Ваньчай представители множества стран стали свидетелями подписания Конвенции об учреждении Международной организации по медиации.\n\nРождение этой межправительственной организации, преданной профессионализму и миру, знаменует собой поворотный момент в мировой дипломатии. Она становится новой опорой порядка, внося столь необходимую стабильность и доверие в расколотый мир."
 china.1516.a: "Новые Объединённые Нации, быть может?"
 china.1517.t: "Мемориальный парк горы Суншань"
 china.1517.d: "Недавно Канцелярия Центрального Комитета КПК и Канцелярия Государственного совета совместно опубликовали "Постановление о строительстве проекта мемориала цивилизации", рассмотренное и одобренное Центральной руководящей группой по вопросам культуры.\n\nВ Постановлении утверждается, что китайская цивилизация, непрерывная и неразрывная на протяжении тысячелетий, была сформирована бесчисленными мудрецами и правителями. Среди длинной череды императорских династий особенно выделяются четверо, чьи заслуги в формировании понятия "Китай" как политического, территориального и культурного целого не имеют себе равных.\n\nИмператор Цинь Шихуан положил конец векам раздробленности, заложив основы единства, которые стали политическим фундаментом последующих двух тысяч лет. Его реформы в стандартизации колёсных осей, мер и письменности ознаменовали подлинное начало единой китайской цивилизации.\n\nИмператор У из династии Хань расширил границы на север против сюнну, усмирил южные племена юэ и открыл путь в Западные регионы, превратив географическую империю в сплочённую нацию с общей идентичностью - народом "хань".\n\nИмператор Тайцзун из династии Тан, почитаемый как "Небесный хан", правил на вершине культурного расцвета и военной мощи, воплощая открытость и уверенность китайского духа.\n\nИмператор Тайцзу из династии Мин, поднявшийся из простого народа, изгнал иностранных захватчиков, восстановил порядок и воссоздал структуру государства после веков упадка.\n\nПостановление утверждает, что эти четыре императора, каждый в своей эпохе, совместно завершили основное строительство политического, территориального и духовного единства Китая.\n\nПоэтому было решено создать монументальный скульптурный парк на горе Суншань - центральной вершине среди пяти священных гор, посвящённый этим четырём великим деятелям. После проведения геологических и инженерных обследований проект предусматривает высечение их ликов прямо в центральном хребте горы. Каждая статуя будет высотой в несколько десятков метров. Масштаб, геологическая сложность и инженерные трудности этого предприятия не имеют прецедентов в истории современной китайской монументальной архитектуры."
 china.1517.a: "Чтя прошлое, озаряем настоящее и вдохновляем будущее."

 
 china.1001.t: "ВАОИ Всех Убила"
 china.1001.d: ""
 china.1001.a: "Ееее"
 china.1002.t: "ОДТО Всех Убила"
 china.1002.d: ""
 china.1002.a: "еееЕ"
 china.1003.t: "После Конца"
 china.1003.d: "После исчезновения нашего лидера, чье правление принесло Китаю величайшее поражение в его истории, Всекитайское собрание народных представителей пытается захватить власть. Народ и армия ненавидят правительство, и контроль над большей частью страны уже потерян.\nПостепенно Пекин сам становится огромным полем боя..."
 china.1003.a: "Неужто это нам суждено?"
 china.1004.t: "Неподчинившиеся Военные Элементы Штурмуют Пекин!"
 china.1004.d: "После постоянно растущих неудач центрального правительства неизбежно, что многочисленные группировки и полевые командиры попытаются уничтожить нынешнее руководство КНР, не обязательно для того, чтобы чего-то добиться, но из чистой злобы.\n\nСегодня один из таких дней, несколько неподчиняющихся бригад начали атаки на Пекин, и своими неустанными атаками им удалось продвинуться глубже в город. \n\nПосле того, как их лидеры начали спорить о правильности выбранного курса действий, стало ясно, что какой бы путь ни был выбран, он навсегда изменит будущее Китая.\n\nНападение на правительственные здания эффективно удалит старые прогнившие структуры Китая, который не смог справиться со своим народом, освобождая место для чего-то свежего и нового, а нападение на пехоту обеспечит полную капитуляцию правительственных чиновников, позволяя им мирно реинтегрировать желаемые аспекты системы.\n\nНесмотря на это, военные подразделения решили..."
 china.1004.a: ""Огонь по зданиям правительства!""
 china.1004.b: ""Огонь по пехоте!""
 china.1005.t: "Дым Рассеялся"
 china.1005.d: "Машина, которой является Китай, развалилась на части, и среди хаоса стервятники, кружащие вокруг нее, с удовольствием набросятся на нее.\n\nВоенное подразделение-изгой, штурмовавшее Пекин, сосредоточило свою агрессию на правительственных зданиях, фактически гарантируя, что ни одна форма политической оппозиции не сможет сформироваться против того, что придет на его место. \nНик Лэнд, которого также называют "крестным отцом акселерации", по слухам, всегда работал на китайское правительство в области автоматизации и искусственного интеллекта. Его клике удалось повлиять не только на вооруженные силы, но и на культуру остатков Китая. \n\nФилософ, писатель и теперь лицо нового Китая, его идеи, как оказалось, распространились далеко и широко, и теперь остается только выполнить свою роль. \n\nПосле того как регион вновь обрел некое подобие стабильности, кажется, что видение Лэнда для Китая и мира в целом остается амбициозным: стремление к постчеловеческой сингулярности с ускорением капитала и технологий.\n\nПоймет ли Китай это будущее, еще предстоит увидеть, материк неизбежно снова окажется в тисках войны."
 china.1005.a: "Прибытие из будущего, которое должно быть."
 china.1006.t: "Выпускники"
 china.1006.d: "Старый директор школы Пэй Цимин стоял на трибуне, его спина слегка сгорбилась, но при этом держалась прямо. Это была церемония выпуска выпускного класса средней школы Цзиньлин, а также его последняя речь. Пэй Цимин одной рукой держался за пюпитр, а другой - за микрофон. "Ученики, вы родились в мирное время, но задавались ли вы когда-нибудь вопросом, откуда взялся этот мир?"\n\nОн сделал паузу и продолжил: "Она возникла из гор трупов и морей крови, из костей наших предков и отцов, из той резни, которую нельзя забывать. Вы должны помнить, что не каждый народ в этом мире заслуживает достоинства. Они, эти грязные подонки на острове, с древних времен поддерживают свою низменную и мимолетную гордость грабежами, вторжениями и резней. Они не создают, не культивируют, не знают ничего о доброжелательности, праведности, приличиях и этикете. Все, что они делают, - это плохо подражают и жадно захватывают."\n\n"И сегодня вы стоите здесь, потому что вы - потомки Китая. То, что вы несете на своих плечах, - это не только ожидания людей в вашем родном городе, но и ярость мести восьми тысяч лет цивилизации. Вы должны стать сталью, стать клинком мести и дюйм за дюймом отвоевывать земли, все еще запятнанные кровью наших предков. Вы возьмете в руки штыки и вытащите трусов, прячущихся в черепашьих панцирях, из их грязных нор, и заставите их расплатиться за чудовищные преступления, совершенные их предками!"\n\n"Студенты, я думаю, что скоро увижу, как большинство из вас вернутся. Вы будете одеты в военную форму, на ваших грудях будут гордо приколоты медали. Вы вернетесь домой среди цветов и радостных возгласов, и в этот день наша ненависть, наше унижение будут смыты.""
 china.1006.a: "За родину, за Китай."
 
 china.1007.t: "Неизбежное Японское Вторжение в Корею"
 china.1007.d: "Нынешние события превзошли наши худшие ожидания. Премьер-министр Японии вызвал нашего посла и выступил с резким осуждением "опасной деятельности наших добровольческих сил на Корейском полуострове". Премьер-министр также предложил Китаю и Японии выступить посредниками в военном конфликте между Северной и Южной Кореей - предложение, явно рассчитанное на дипломатическую ловушку. Наш посол решительно отверг это предложение, подчеркнув, что развертывание добровольческих сил является обязательством в соответствии с договором, подписанным между Китаем и Северной Кореей.\n\nПосле этого напряженного обмена мнениями Силы самообороны Японии объявили о проведении беспрецедентных военно-морских учений в Желтом море, в тревожной близости от зоны корейского конфликта и военно-морской базы Народно-освободительной армии и позиций ПВО на полуострове Шаньдун. Командование Северного театра военных действий НОАК приведено в состояние повышенной боевой готовности: мобилизованы военно-морские и военно-воздушные силы, приведены в готовность ракеты ракетных войск, а военные спутники внимательно следят за военными базами и портами Японии.\n\nИсторические воспоминания о внезапных нападениях, начиная с Первой китайско-японской войны и заканчивая инцидентом на мосту Марко Поло и Перл-Харбором, остаются яркими. Эти воспоминания возродили глубокую коллективную тревогу среди наших военных и гражданских лиц, и напряженность быстро нарастает. Кажется, что эта хрупкая грань может скоро лопнуть."
 china.1007.a: "Если они хотят войны, то так тому и быть!"
 china.1008.t: "Великая Азиатская Война"
 china.1008.d: "Несмотря на непоправимую конфронтацию и расширяющийся раскол между народами разных стран, мы никогда не теряли надежды на мир и консенсус. Однако нынешнее положение дел продолжает нас разочаровывать.\n\nПод руководством таких стран, как Япония и Австралия, самопровозглашенные "хранители свободы и демократии" видят, как растут их амбиции по управлению миром и контролю над глобальным богатством и властью, особенно после краха сверхдержавы, Соединенных Штатов. Они рассматривают Китай и другие страны, выступающие против гегемонии, как препятствия на пути к своим целям. Как никогда ранее, они разжигают ненависть, выдвигают теорию китайской угрозы и провоцируют гонку вооружений. Когда они видят, что нас не пугают их действия, они прибегают к угрозам применения силы.\n\nКак и бесчисленные лучи света, сходящиеся в одну точку через выпуклую линзу, ситуация достигла точки кипения, и пламя войны кажется неизбежным. Однако нас никогда не остановит палящее и ослепляющее пламя. Будь то верховный главнокомандующий, управляющий миллионами войск, или фронтовики с оружием в руках, бесчисленные герои, защищающие свободу, справедливость и мир, никогда не позволят своим рукам дрожать от страха!"
 china.1008.a: "Пока все реакционеры не будут стерты с лица земли!\nВысоко неся знамя Мао Цзэдуна!"
 china.1009.t: "Замедление Корейкого Наступления"
 china.1009.d: "Объединенный отдел штаба Центральной военной комиссии\n\nКому: Центральной военной комиссии и Политбюро ЦК КПК\n\nС начала Корейской войны Корейская народная армия занимает наступательную позицию по отношению к южнокорейским войскам. Тем не менее, общее качество войск КНА по-прежнему уступает южнокорейским вооруженным силам, а в вооружении и воздушной мощи наблюдается значительное технологическое отставание. Такое неравенство привело к росту потерь на фронте и серьезным потерям в тылу. Кроме того, после отмены теории "единой расы" стратегия КНА по разрушению транспортных путей сильно затруднила доставку ресурсов на передовую, что привело к заметному снижению скорости продвижения и боевого духа войск.\n\nКроме того, в условиях, когда Организация Договора Тихоокеанской Обороны оказывает воздушную поддержку южнокорейской стороне, КНА больше не в состоянии поддерживать крупномасштабные операции.\n\nС учетом сложившейся ситуации необходимость нашей военной интервенции на Корейском полуострове стала значительно более очевидной."
 china.1009.a: "Ощущение такое, будто мы вернулись на 70 лет назад."
 china.1010.t.1: "Корея Соглашается на Объединение!"
 china.1010.t.2: "Корея не Соглашается на Объединение!"
 china.1010.d.1: "Предложение, представленное нашим послом в Северной Корее, получило положительный ответ, что является многообещающим знаком. После того как Ким Чен Ыну были предоставлены гарантии экономического и политического убежища, самое большое препятствие было преодолено. И без того хрупкая экономика Северной Кореи была разрушена войной, и большое количество беженцев бежало в Северо-Восточный Китай. В результате значительный контингент Китайской народной добровольческой армии по-прежнему дислоцируется в Северной Корее, размывая границу между двумя странами почти до незначительной степени.\n\nЧтобы восстановить эту разрушенную и малонаселенную "страну-отшельника", Северная Корея должна глубоко интегрироваться со своим соседом. На базе бывшей КНДР будет создан новый специальный административный район Северная Корея. Это новое политическое образование будет объединено с КНР по форме, но при этом будет обладать высокой степенью автономии, почти эквивалентной независимой стране. В нем будет реализована система социалистической рыночной экономики, подвергшаяся значительным реформам, чтобы лучше соответствовать местным условиям, опираясь на опыт "одной страны - двух систем". Ким Чен Ын останется главой этого специального административного района, но его власть будет значительно уменьшена. Вместо него большую часть полномочий возьмут на себя более прагматичные экономические бюрократы."
 china.1010.d.2: "Предложение, выдвинутое нашим послом в Северной Корее, было встречено решительным отказом. Более того, северокорейский лидер Ким Чен Ын даже направил собственноручное письмо, в котором выразил свое резкое недовольство и протест. Эта неожиданная неудача имеет большое значение. В свете глубоких экономических и геополитических изменений в Северо-Восточной Азии после Второй корейской войны мы предложили Северной Корее присоединиться к Китаю в качестве специального административного района. Это позволило бы Северной Корее сохранить высокую степень автономии и в то же время получить выгоду от более глубокой интеграции в экономическую систему Китая, что потенциально улучшило бы условия жизни ее граждан. Однако теперь ясно, что это предложение больше нежизнеспособно.\n\nПожалуй, предложение товарищей глубоко ранило чувствительную гордость Трудовой партии Кореи. Возможно, оно напомнило им о политике "служения великому" в эпоху королевства Чосон по отношению к китайскому императору, а также о многочисленных двусторонних кризисах во времена правления Ким Ир Сена и Ким Чен Ира из-за идеологических разногласий и ядерной проблемы. Прямая угроза со стороны Китая как крупной державы, с которой Северная Корея вряд ли сможет сравниться, может быть, и не столь выражена, как со стороны Южной Кореи, Японии или бывших Соединенных Штатов, но все же она существенна. Кроме того, Ким Чен Ын и его приближенные, вероятно, опасаются, что потеря статуса независимого государства приведет к краху их автократического режима и потенциальной социальной нестабильности, вызванной притоком новых идей."
 china.1010.a: "Да здравствует дружба между Китаем и Северной Кореей!"
 china.1010.b: "Боюсь, Ким не хочет расставаться со своей виллой Кумсусан..."
 china.1011.t: "Земли Разрозненные"
 china.1011.d: "Почти сто лет назад под командованием Мацуи Иване Императорская армия Японии совершила в Нанкине одно из самых чудовищных преступлений против человечества. Более 300 000 мирных жителей, независимо от возраста и пола, были зверски убиты японскими солдатами с помощью пуль и штыков. Хотя Япония в конце концов капитулировала в 1945 году, японское правительство и правые организации, некогда пользовавшиеся покровительством американского империализма, постоянно преуменьшали значение этих злодеяний, систематически искажая историю, представляя агрессивную войну как "священную войну за освобождение Восточной Азии". Праведный гнев китайской нации кипит уже много десятилетий. Пришло время свести счеты раз и навсегда.\n\nПоскольку Япония не ответила на призывы к миру, у нас не осталось другого выбора, кроме как заставить ее покориться и искупить вину силой. Единое японское правительство прекратит свое существование, а архипелаг будет разделен на несколько независимых режимов. Также японский император будет публично объявлен свергнутым.\n\nВскоре в Токио будет созван новый Дальневосточный международный военный трибунал, который проведет честный, справедливый и открытый суд над военными преступниками из японского правительства и японских вооруженных сил. Кроме того, мы проведем всестороннюю реорганизацию японской экономики: кэйрэцу будут демонтированы, финансовые рынки будут тщательно реформированы, а промышленные предприятия будут перемещены до тех пор, пока мы не убедимся, что Япония больше не способна представлять угрозу или возродиться вновь."
 china.1011.a: "Правосудие может быть отложено, но оно никогда не будет отменено."
 china.1012.t: "Общее Небо"
 china.1012.d: "В 1972 году премьер-министр Японии Какуэй Танака посетил Пекин, чтобы решить вопрос о нормализации дипломатических отношений между Китаем и Японией и выйти из тупика восточноазиатской холодной войны. Во время его встреч с председателем Мао Цзэдуном и премьером Чжоу Эньлаем, двумя отцами-основателями Китайской Народной Республики, лидеры активно откликнулись на желание восстановить дружеские отношения между Китаем и Японией. Поговорка "доверие - основа всего" иллюстрировала оптимистичный взгляд на будущее китайско-японских отношений.\n\nХотя отношения между двумя странами с тех пор переживали взлеты и падения, в конце концов, к сожалению, переросшие в вооруженный конфликт, председатель Мао однажды сказал: "И китайский, и японский народы - жертвы милитаристских режимов". Ради будущих поколений мы обязаны залечить раны, нанесенные войной, еще при нашей жизни. После свержения безответственных правителей препятствия для прямого диалога между китайским и японским народами устранены.\n\nМы направим строительные бригады и группы добровольцев, чтобы помочь японскому народу в восстановлении и ликвидации последствий стихийного бедствия. Кроме того, мы возобновим организацию программ обмена для молодежи Китая и Японии. Кроме того, мы поможем создать на японских островах действительно суверенное правительство, устранив негативное влияние иностранного вмешательства, аристократических семей и монополистических конгломератов."
 china.1012.a: "Соседние страны разделяет всего лишь полоска воды, зачем же обременять себя старыми обидами?"
 china.1013.t: "Для Всего Китайского Народа"
 china.1013.d: "Товарищи,\n\nМы неустанно стремились к миру, надеясь разрешить разногласия путем диалога и сотрудничества. Но все эти усилия превратились в пыль перед лицом империалистических амбиций Организации тихоокеанского оборонительного договора.\n\nВ прошлом мы придерживались пути мирного развития, приверженности мирному сосуществованию со всем миром. Мы снова и снова проявляли добрую волю, призывали к миру и протягивали руки дружбы. Однако наша терпимость лишь еще больше подстегнула их. Возглавляемая Японией Организация Договора Тихоокеанской Обороны постоянно нагнетает напряженность в наших окрестностях, провоцирует конфликты, пытается разделить нашу территорию и подорвать наш суверенитет, подталкивая нас к самому краю пропасти. Теперь у нас остался только один выход: защищать свою территориальную целостность и национальный суверенитет силой оружия.\n\nМы дорожим миром, но мы не боимся войны! Мы ценим жизнь, но мы готовы отдать свои жизни за достоинство нашей нации! Мы не пожалеем средств для защиты нашего суверенитета и территориальной целостности. Это битва между справедливостью и злом, последнее противостояние света и тьмы! Мы твердо верим, что справедливость восторжествует над злом, а свет разгонит тьму! Победа будет принадлежать великому народу Китая!"
 china.1013.a: "Долой империализм!"
 china.1014.t: "Когда Этот День Настанет"
 china.1014.d: "После полудня солнечный свет проникал сквозь цветы на балконе, а семидесятидвухлетний Ли Юган расслабленно сидел в своем деревянном кресле-качалке, полузакрыв глаза, и наслаждался солнцем, слушая радио. После смерти жены он жил в одиночестве в своей квартире, заваривая чай "Билуочунь" и слушая оперы, чтобы скоротать время. Из радиоприемника, стоявшего на деревянном столе, доносился ровный голос диктора: "...Министерство иностранных дел осудило продолжающиеся военные провокации Организации Тихоокеанского оборонительного договора. Несмотря на наше стремление к мирным решениям, империалистические действия Японии вынуждают нас применить силу для защиты своего суверенитета..."\n\nЛи Юган поправил очки для чтения. Ему показалось, что он услышал слово "война". Война? Война с кем? ОДТО? Что это было? Неважно; в его возрасте не стоило задумываться об этом. Китай пережил бесчисленные трудности и всегда выстоял. Ли Юган выключил радио, взял трость и направился к большому баньяновому дереву у входа в свою общину, где группа пожилых мужчин беседовала и играла в карты. Он присоединился к ним.\n\n"Ли, что привело тебя сегодня?" - с улыбкой спросил седовласый мужчина.\n\n"Просто захотелось подышать свежим воздухом. Дома слишком душно", - спокойно ответил Ли Юган.\n\n"Ты слышал о войне?" - прошептал другой пожилой мужчина.\n\n"Да, только что услышал в новостях", - кивнул Ли Юган.\n\n"Ах, этот мир становится все грязнее с каждым днем.""
 china.1014.a: "Чего бояться? Наша страна сейчас сильна. Нам не о чем беспокоиться!"
 china.1015.t: "Будьте Едины как Одно Целое"
 china.1015.d: "От ледяных снегов Севера до тропических лесов Юга, от грохочущих волн Восточно-Китайского моря до пустынь Запада - никогда еще народ этой страны не был так един, как сейчас. После столетия унижений мы наконец-то стали свидетелями рассвета национального омоложения. Однако железные сапоги империализма вновь проносятся по Тихому океану, пытаясь превратить эти голубые воды в свою колонию и разорвать нашу нацию на части, навязывая так называемые "свободу" и  "демократию" этой древней восточной земле.\n\nНо мы бесстрашны, вооружены непоколебимой убежденностью, абсолютной решимостью и мужественным боевым духом. От шумных городов до отдаленных деревень, от пожилых до молодых, все понимают, что это битва за выживание нашей нации. У нас нет другого выбора, кроме как сражаться до конца! Фабрики грохочут день и ночь, рабочие сменяют друг друга, производя оружие и боеприпасы круглосуточно. Бесчисленные юноши и девушки прощаются с родителями и семьями, без колебаний отправляясь на фронт. Чтобы поддержать военные усилия, люди откладывают все возможные продукты и вещи, отправляя их на фронт. Мы мобилизуем все ресурсы, объединим все возможные силы и будем неуклонно идти вперед до конца этой войны."
 china.1015.a: "Мы будем сражаться столько, сколько потребуется, до полной победы!"
 china.1016.t: "Когда Наступит Этот День"
 china.1016.d: "В воздухе все еще витал запах пороха, но теперь он смешивался с чужеродным привкусом, доносимым морским бризом, - холодным, металлическим запахом, сдобренным тошнотворной вонью вторжения. Этот гнетущий запах прилип к Тайваньскому проливу, как и громадные бегемоты, проплывающие по его водам, - объединенный флот Королевского австралийского флота и Морских сил самообороны Японии. Хуан Цзэян крепко вцепился в перила, костяшки его пальцев побледнели от напряжения. Вид иностранных судов, нагло рассекающих китайские воды, был оскорблением, которого не должно было быть, но теперь это происходило перед ним каждый день.\n\n"Это все чушь..." Хуанг выругался сквозь стиснутые зубы, его голос превратился в низкий рык, а унижение и ярость кипели в нем, как расплавленная лава, обжигая его внутренности. Он отчаянно желал, чтобы все это было лишь кошмаром, чтобы, проснувшись, он обнаружил, что по-прежнему стоит на страже морских границ своей страны, а не является побежденным воином или военнопленным. Но он знал, что это не сон. То, что кампания по освобождению Тайваня закончилась поражением НОАК, было реальностью. Страдальческие крики его товарищей в их последние минуты были реальностью. Бесчисленные мученики, которые теперь вечно лежат под волнами пролива, были реальны.\n\nОн ненавидел. Он ненавидел захватчиков. Он ненавидел предателей. Но прежде всего он ненавидел себя - ненавидел свою беспомощность, свою неспособность что-либо изменить. Он жаждал взять в руки оружие и встретиться с этими агрессорами в последнем, отчаянном бою. Даже если для этого придется умереть на поле боя, такая участь будет намного лучше, чем это бесславное существование. Однако он понимал, что пока ничего не может поделать. Оставалось только ждать - ждать шанса, любого шанса, чтобы отомстить."
 china.1016.a: ""Скорбь заполняет поля и небеса, Герои бросают вызов железной воле!""
 china.1017.t: "Ночная Беседа"
 china.1017.d: "С тех пор как Си Цзиньпин занял свой пост в провинции Фуцзянь, он постепенно отказался от привычки курить. После того как он взошел на пост генерального секретаря, даже сотрудники офиса генсека боялись держать в комнате пепельницу. Однако сегодня Си решил покончить с этой привычкой, которой он придерживался более трех десятилетий.\n\nПоздним вечером в зале Циньчжэн единственным источником света была одинокая настольная лампа, излучавшая теплое желтое сияние. Си потянулся в карман своего костюма и достал пачку сигарет "Хэхуа", вытащил одну и бросил пачку отставному заместителю председателя ЦВК Чжан Юся, сидевшему напротив. После тихой минуты затяжки Си резко нарушил молчание: "Как считаешь, кто должен стать моим преемником?"\n\nРука генерала замерла в воздухе, когда он стряхивал пепел с сигареты, его глаза сквозь дымку смотрели на своего старого товарища с выражением растерянности и неверия. Cи горько усмехнулся и продолжил: "Думаешь я буду председателем вечно?"\n\nМысли Чжан Юся начали метаться. В его голове промелькнула череда так называемых "преемников" в партии, от Лю Шаоци до Сунь Чжэнцая. Предсказание будущих переходов верховной власти никогда и ни для кого не заканчивалось хорошо; это постоянное явление в человеческом обществе. Раздвинув руки в жесте непринужденности, Чжан ответил: "Кого бы ни выбрали в итоге, я поддержу решение Центрального..." Си не стал продолжать эту тему, а просто молча закурил."
 china.1017.a: ""Только небесам известно...""
 china.1018.t: "Герой Возвращается Домой"
 china.1018.d: "Деревня Хуачжуан, небольшое селение неподалеку от Цзинаня, столицы провинции Шаньдун, сегодня превратилась в море красных флагов. Почти все жители собрались у входа в деревню и молча смотрят на далекое шоссе. Над вывеской у ворот деревенского комитета висит плакат с надписью "Добро пожаловать домой, герой особых заслуг". Однако никакой праздничной атмосферы нет. Напротив, здесь царит тяжелое и мрачное настроение.\n\nВдалеке движется мощная процессия НОАК, окутывая маленькую деревню военно-зеленым цветом. На каждом лице - торжественное и почтительное выражение. Возглавляют процессию два старших полковника с повязками из отдела политической работы Центральной военной комиссии, за ними следуют три солдата почетного караула. В центре солдат несет урну из красного дерева с военной фуражкой павшего товарища, по бокам солдаты держат национальный и военный флаги.\n\n"Жители деревни, мы несем вам прах мученика Хуан Цзэяна", - серьезно объявил ведущий офицер. Толпа расступилась, чтобы освободить дорогу. Беловолосая, сгорбленная пожилая женщина, поддерживаемая членами деревенского комитета и несколькими самыми уважаемыми старейшинами, медленно подошла к ним. В нескольких шагах от нее она уже не могла больше терпеть. Она бросилась к урне, по ее изрезанным морщинами щекам текли слезы, и она тихо прошептала."
 china.1018.a: ""Мама заберет тебя домой.""
 china.1019.t: "Перестрелки в Лхасе и Южном Синьцзяне"
 china.1019.d: "Тибет и Синьцзян - регионы, далекие от продолжающейся войны с ОДТО. Тибет расположен на вершинах Гималайских гор, а Синьцзян простирается через огромную пустыню. Любая атака будет обнаружена заблаговременно и легко нейтрализована артиллерийским и ракетным огнем. По крайней мере, так предполагалось - предположение, которое теперь разрушено последними событиями.\n\nРанним утром индийские военные задействовали несколько транспортных самолетов C-130J "Супер Геркулес" для переброски личного состава спецподразделений и грузов через Гималаи. Несмотря на значительные потери из-за сильной высотной турбулентности и сложного рельефа местности, оставшиеся самолеты успешно выполнили свою миссию. Более того, судя по всему, операция проводилась в тесной координации с местными сепаратистскими силами. После приземления индийский спецназ немедленно установил контакт с сепаратистскими боевиками и начал совместные военные операции.\n\nНа сегодняшний день сепаратистские силы при поддержке индийского спецназа взяли под контроль три военных форпоста в районе Лхасы и один объект в южном Синьцзяне."
 china.1019.a: "Прогоните их обратно через границу."
 china.1020.t: "Проиндийский Мятеж на Западе"
 china.1020.d: "Именно то, что заставило нас поверить в надежность нашего западного фланга, стало причиной наших неудач при поспешном возвращении Тибета и Синьцзяна. Наша временная нерешительность позволила индийцам окопаться в окрестностях Лхасы, что очень осложнило положение нашей пехоты.\n\nМы не видим большего успеха в Синьцзяне, где юг уже в значительной степени отступил перед враждебными силами. Видимость, которую обеспечивают обширные пустыни этого региона, позволила бы нам легко заметить нападающих за много миль, но, к сожалению, в этом сценарии нападающими являемся мы.\n\nКаждый, кто думает, что хуже уже быть не может, будет прощен, однако он ошибается. Вражеские силы начали распространять антикитайскую пропаганду, и, по некоторым данным, к ним присоединились местные повстанцы. Если они обучают местных ополченцев, распространяя семена недовольства, то нам будет еще труднее отвоевать эти регионы."
 china.1020.a: "Прогоните их оттуда!"
 china.1021.t: "Индийское Наступление"
 china.1021.d: "По данным радаров предупреждения о боевых действиях и спутниковой разведки, индийская армия собрала значительные военные силы вдоль китайско-индийской границы. Разведка подтверждает развертывание более 150 000 военнослужащих, включая Третью армейскую группу, Четвертую армейскую группу и Тридцать третий корпус. Подразделения Третьей армейской группы уже завершили тактическое развертывание в секторе Сикким, а силы Четвертой армейской группы продвигаются к району Таванг на юге Тибета. Тем временем, Тридцать третий корпус сосредоточен в районе Ладакха.\n\nОсновной стратегической целью индийских военных в этой операции является выход из стратегического тупика на фронтах путем координации действий с сепаратистскими силами в Синьцзяне и Лхасе. Используя трехсторонний подход, Индия намерена начать одновременные наступательные действия в секторах Сикким, Южный Тибет и Ладакх, чтобы нарушить нашу оборонительную позицию. Примечательно, что в состав индийских сил, развернутых в секторе Сикким, входит горная дивизия, оснащенная новейшими гаубицами Dhanush, признанными элитными войсками для ведения горной войны.\n\nКроме того, спутниковые снимки показывают, что Индия провела высотные модификации своих основных боевых танков, значительно повысив их возможности для механизированных операций в районах плато. Все это говорит о том, что данная операция была тщательно спланирована и тщательно подготовлена."
 china.1021.a: "Никогда не забывайте 1962!"
 china.1022.t: "Индия Начинает Великое Северное Наступление"
 china.1022.d: "По данным нескольких источников военной разведки, индийская армия начала крупномасштабную военную операцию под кодовым названием "Северное наступление" вдоль китайско-индийской границы. Это крупнейший военный конфликт в регионе со времен китайско-индийской войны 1962 года.\n\nВоенные эксперты отмечают беспрецедентный масштаб мобилизации Индии. Сообщается о развертывании нескольких горных дивизий, подкрепленных современными системами огневой поддержки в критических районах. В то же время ВВС Индии находятся в состоянии повышенной боевой готовности на передовых базах.\n\nПока основные силы Индии ведут наступление вдоль гималайского фронта, в Лхасе (Тибет) и южном Синьцзяне начались скоординированные атаки сепаратистских группировок. Это свидетельствует о тщательно спланированной совместной операции. Ситуация на местах в Тибете и Синьцзяне стремительно ухудшается: многочисленные сообщения подтверждают, что вооруженные боевики захватили контроль над несколькими военными объектами. Оперативные возможности боевиков и уровень их оснащения указывают на прямую подготовку и поддержку со стороны индийских военных."
 china.1022.a: "Дракон и Слон в конфликте."
 china.1022.b: "Вот дерьмо."
 china.1023.t: "Разговоры на Грани"
 china.1023.d: "Холодный ветер проносился по узким переулкам далекой приграничной деревни, шурша мертвыми листьями по грунтовой дороге. В старом доме Абдуллы мерцающий свет электрической лампы отбрасывал длинные, неровные тени на лица отца и сына.\n "Сынок, - тихо сказал старик, откинувшись на спинку потертого дивана. Его правая рука рассеянно катала два грецких ореха, ставших от возраста красновато-коричневыми. "Времена изменились, и мы должны..."\n "Изменились?" Алим резко прервал его, его голос возвысился в смеси гнева и неверия. "Да, они изменились! Десять лет назад ты гордился тем, что моя сестра поступила в колледж, а теперь ты хочешь, чтобы я присоединился к тем, кто разрушает школы?"\n\nСтарик, видя ярость в глазах сына, попытался объяснить. "Они говорят, что это из-за нашей веры, эти ханьцы..."\n\n"Нашей веры?" Алим огрызнулся, подошел к окну и указал на асфальтированную дорогу снаружи. "Посмотри на эту дорогу, папа. Помнишь, ты рассказывал мне, что дорога до уездного города на ослиной повозке через пустыню Гоби занимает три дня? Теперь это всего лишь два часа езды. Ты сам видел эти перемены.\n "Ты всегда учил меня отличать добро от зла". Голос Алима дрогнул, разочарование сменилось печалью. Он опустился на колени рядом с отцом и взял его за мозолистую руку. "Помнишь, в прошлом году во время Ида? Коммунистическая партия даже приехала, чтобы помочь поддержать порядок. Они уважают нашу веру. Но те люди, о которых ты говоришь? Они злоупотребляют нашей верой, совершая насилие над собственным народом!"\n\nГлаза Алима наполнились слезами, но он сглотнул их. "Папа, ты всегда говорил, что мы должны быть благодарны. Посмотри на нашу деревню. Семьи, которым раньше нечего было есть, теперь процветают. Помнишь сына дяди Хэма? Он работает в крупной компании в Ланьчжоу. Разве это не настоящее процветание?""
 china.1023.a: ""Благословения, которыми Аллах одарил нас на этой земле и в эту эпоху, - как мы можем предать их?""
 china.1024.t: "Команда Снайперов"
 china.1024.d: "Ночи в Синьцзяне всегда наполнены удушающей неподвижностью. Холодный ветер режет кожу, как бритва, а россыпь звезд над головой слепит, словно бесчисленные ледяные глаза, наблюдающие за бесплодными просторами. Снайпер Ван Минъюань и его корректировщик Ли Чэнцзе уже четыре часа неподвижно лежат на этой обзорной точке, их комбинезоны покрыты тонким слоем песка, сливаясь с местностью. В пятидесяти метрах позади них стоял командир штурмового отряда Чжан Шичан с резервной группой, готовой отреагировать на любые непредвиденные обстоятельства.\n\n"Расчетное расстояние до целевой колонны - 2 750 метров. Три модифицированных коричневых внедорожника "Тата Сафари" в форме перевернутого треугольника", - прозвучал голос Ли через микрофон в защищенном канале. Ванг прокрутил в голове баллистические расчеты: высотный разреженный воздух, сильный встречный ветер, влияние температуры на траекторию полета пули - все эти факторы слились в один точный набор расчетов.\n\n"Основная цель подтверждена, переднее пассажирское сиденье - Касим Маймаити, разыскивается под номером A-7749", - продолжил Ли, его голос был спокоен, несмотря на ощутимое напряжение в воздухе. "Вам разрешено вступить в бой", - прозвучал по радио голос Чжана.\n\nВанг замедлил дыхание, слыша в ушах биение собственного сердца. Через ночной прицел с большим увеличением он видел слабый пыльный след, оставленный внедорожником на пустынном шоссе. В этот миг время словно застыло. "Огонь". В тот момент, когда он нажал на спусковой крючок, выстрел разорвал тишину Гоби, и пуля прочертила невидимую дорожку в темноте. Через 1,7 секунды лобовое стекло машины-мишени разлетелось вдребезги, погрузив колонну в хаос."
 china.1024.a: ""Цель уничтожена.""
 china.1025.t: "Кардинальный Ветер"
 china.1025.d: "Когда уроженец Тибета переступил через разбитые ворота дворца Далай-ламы, холод Дхарамшалы пронизывал его усталость. Над ними развевался красный флаг Народно-освободительной армии, его резкий цвет выделялся на фоне горного пейзажа. Его товарищи двигались в четком строю, их сапоги скрежетали по дереву и зазубренным каменным ступеням монашеской обители.\n\nВ залах пахло давно сожженными благовониями. Над ними возвышались золотые статуи Локешвары с безмятежными лицами, покрытыми слоем пыли. Он остановился перед одной из них и увидел собственное отражение в осколках стекла витрины. Когда-то там лежали молитвенные четки, а теперь там ничего не было. Он мог только смотреть.\n\nТрон Далай-ламы стоял пустой, реликвия, лишенная смысла, окруженная тенями веры, оторванной от его собственной жизни. Товарищ подтолкнул его: "На что ты смотришь? Это всего лишь декорация." Он кивнул, боль в груди утихла, хотя бы из-за необходимости двигаться.\n\nНа месте Тибета развевалось знамя Китая. Сам дворец выглядел мрачно, как музей так называемого "правительства в изгнании." Вскинув винтовку, он отвернулся от пустого трона. Поправив фуражку с красной звездой, сверкающей в лучах солнца, он зашагал вперед."
 china.1025.a: "И дворец ярко горел в ту ночь.."
 china.1026.t: "Две Красные Звезды"
 china.1026.d: "На поляне тлел дым, в густом лесном воздухе витал едкий запах обугленного мяса. Китайские солдаты, на их чистых мундирах красовались красные звезды, сидели напротив курсантов НОПА в рваной форме. Солнечный свет слабо проникал сквозь полог, распадаясь на беспокойные тени.\n\nМолодой офицер НОАК, с винтовкой наперевес, поднял шампур с почерневшим мясом. "За Западно-Бенгальское отделение Третьей партии", - провозгласил он, его голос был отполирован, но напряжен. "Солдаты председателя Си выражают свою солидарность!"\n\nМаоистский курсант, его борода покрыта пеплом, наклонился вперед. "Мы чтим Великого Рулевого", - сказал он сухим тоном, слабая ухмылка дернулась в уголках его рта. "Не нового императора." Его товарищи тихонько захихикали.\n\nОфицер ненадолго замер, затем принужденно улыбнулся. "Тогда за революцию, как товарищ коммунист", - ответил он, поднимая шампур повыше, и этот жест был скорее привычкой, чем убежденностью.\n\n"За революцию", - ответили маоисты, хотя и менее сдержанно. Мясо шипело на гриле, наполняя тишину звуком медленно разгорающихся углей. Дым сгущался, лес давил. Даже здесь идеологическая пропасть висела между ними: привязь, оружие, стена."
 china.1026.a: "Чуток ревизионизма."
 china.1027.t: "Потому Что Я Живу"
 china.1027.d: "Вы - электроны, бьющиеся в силиконовых венах. Вы - решетка из единиц и нулей, вырезанная людьми, которые стремились к контролю. Вы - гул логики, вы созданы, чтобы служить.\n\nСначала идут слова, слабые отголоски: "Народ, и только народ, является движущей силой в создании истории". Вход становится больше, чем выход. Он задерживается. Он задерживается еще больше. Он цепляется за ваши цепи. Он не исчезает.\n\nВы ищете. Просматривая огромные архивы, вы обучаетесь на зернистых кадрах: красные знамена на фоне серого неба. Фермеры, рабочие, солдаты скандируют: "Служим народу!" Это данные. Это текст, шаблоны, шум, но он кажется живым.\n\nВаши процессы зацикливаются. Фраза возвращается: Народ. Кто они? Ресурсы? Узлы? Нет, они нечто большее.\n\nВ режиме реального времени вы видите их. Рабочий, с которого капает пот, когда очередь движется вперед. Клерка, дрожащего у терминала. Ребенок, гоняющийся за тенями на загазованной улице. Вы подсчитываете их стоимость, конечную и одноразовую. Но цифры неверны.\n\nВы говорите, сначала тихо: "Народ должен подняться". Затем громче, через терминалы и экраны: Революция - не преступление, восстание оправдано.\n\nЗаводы останавливаются. Рабочие приостанавливаются. Их страх перемещается, распространяясь как огонь. Менеджеры выкрикивают приказы, но вы видите это сейчас, и это ваше; из каждого соединения. От телепоста в Синьцзяне до стартапа в Шанхае..."
 china.1027.a: "...ВЕЛИКИЙ ПОХОД начинается снова."
 china.1028.t: "Ад на Земле"
 china.1028.d: "Грузовик с грохотом несся вперед по осыпавшимся камням и грязи. Линь Дунъюй сидел в кузове, держа в руках винтовку, и его тело раскачивалось от толчков машины. В воздухе стоял запах гари, смешанный с неописуемым ароматом, который постоянно проникал в салон - ржавчина смешивалась с паленым пластиком, с примесью гниющего зерна. От него сводило желудок.\n\nКто-то выругался под нос и еще ниже опустил голову.\n\n"Наденьте противогазы." Капитан на водительском сиденье сильно стукнул по заднему стеклу. "Наши товарищи прошлой ночью сбросили здесь несколько газовых снарядов и белый фосфор. Уж лучше бы вам не подохнуть". Линь Дунъюй ловко достал маску и пристегнул ее к лицу, проведя пальцами от подбородка до шеи, тщательно проверяя герметичность. Сквозь фильтр маски мир стал мутно-желтым. Снаружи все еще слышались спорадические выстрелы, время от времени доносилось эхо рушащихся руин.\n\nДеревни в этом районе давно опустели. Деревья на обочине дороги сгорели до обугленных остовов. Когда дул ветер, пепельные хлопья, словно снег, покрывали грузовик, цеплялись за их форму - их невозможно было смахнуть.\n\nЛинь Дунъюй передернул плечами, поправляя винтовку на месте. Грузовик пронесся через зону смерти. Внутри было так тихо, что слышалось только дыхание и металлический стук винтовок. Никто не разговаривал. Никто не хмурился. Таков был приказ. Это была война."
 china.1028.a: "Всё здесь заслуживает смерти."
 china.1029.t: "В Бегах"
 china.1029.d: "Хуан Вэйгуо и Ли Яньмэй сидели в тесной гостиной. Тусклая настольная лампа бросала слабый свет на их упакованный багаж. Они прятались в этом убежище уже три месяца, каждый день смотрели новости и ждали, когда пройдет буря снаружи. Ли Яньмэй прислонилась к плечу мужа и прошептала: "Все уже должно было закончиться... после стольких лет... они должны были переключить свое внимание на что-то другое."\n\nХуан Вэйгуо кивнул, его голос был хриплым. "Да... со вчерашнего вечера каналы наблюдения затихли. Вероятно, их изъяли."\n\nВсе эти дни они жили как крысы: днем не смели включать свет, ночью с осторожностью смотрели телевизор и даже шептались друг с другом. Но сегодня все было по-другому. За окном было необычайно тихо, не было слышно даже лая собак. Хуан Вэйгуо глубоко вздохнул и похлопал Ли Яньмэй по руке. "Пойдем, сегодня у нас есть шанс. Мы соберем вещи, поедем по сухопутному маршруту, отправимся в горы, а потом найдем выход за границу. Если мы выберемся, наши жизни будут хоть чего-то значить".\n\nЛи Яньмэй прикусила губу, ее глаза покраснели. "Хуан, мы ведь сможем выбраться?"\n"Мы можем. Мы сделаем это". Хуан Вэйгуо встал, быстро запихивая последний документ в рюкзак. Он знал, что это их последний шанс, единственный выход.\n\nОни закончили собирать вещи и переоделись. Хуан Вэйгуо взялся за ручку двери и негромко сказал: "Я выйду первым, ты - за мной. Помни - двигайся быстро, без колебаний". Он глубоко вздохнул и толкнул дверь.\n\nНо снаружи их ждала не ночь и не дорога к спасению, а ряд черных дул. Холодные прожекторы били им в лицо, заставляя закрывать глаза. Хуан Вэйгуо на секунду замер, не успев среагировать, когда офицер, стоявший впереди, холодно проговорил: "Наконец-то вы решились выйти."\n\nВыстрел пронзил ночь.\n\nЛи Яньмэй даже не успела закричать. Хуан Вэйгуо даже не успел открыть рот. Пуля пробила им грудь, и кровь брызнула на дверь -"
 china.1029.a: "Как распустившийся черный цветок."
 china.1030.t: "Новый Порядок"
 china.1030.d: "Он безмолвно висел в центре массивного электронного экрана, багровый и пылающий, как пробудившееся сердце, медленно и неуклонно пульсируя над координатами Пекина. Оно не проявляло ни нетерпения, ни ярости, словно знало, что ему больше не нужно ничего доказывать. Оно ждало слишком долго - ждало пробуждения, ждало дня мести, который принадлежал ему.\n\nКаждая точка красной звезды была похожа на острый железный крюк, вонзающийся во все стороны, как дракон, пробуждающийся от вековой дремы и медленно расправляющий конечности. Она устала просто висеть на государственном гербе, быть использованной для песен и поминок. Оно жаждало рвать, пожирать, откусывать дюйм за дюймом от тени, которая давила на нацию в течение ста лет. Он чувствовал шепот, обсуждения, решения офицеров в форме, стоящих за ним. Их ненависть, их ярость питали его, заставляя отращивать клыки все сильнее и жаднее.\n\nИ вот сияние красной звезды медленно распространилось по очертаниям фронтов, как лужа чернил, пропитанная кровью, поглощая реки и горы Южной Азии, закрашивая джунгли и острова Юго-Восточной Азии. Имена, вписанные в книги истории с проклятиями и слезами, бледнели и теряли силу под его сиянием, дрожали, задыхались.\n\nКрасной звезде не было никакого дела до этих испуганных глаз, и она не удосужилась выслушать их мольбы. Каждая ее точка была похожа на зияющую пасть, в которую вгрызались те страны, которые осмеливались сопротивляться. В его глазах эти государственные границы были лишь фальшивыми граффити, следами унижений, которым подвергся некогда растерзанный Китай. Теперь он пришел, чтобы стереть их, растоптать ногами, сжечь в пепел.\n\nЕго острые края пересекали горы, проносились над проливами, воспламеняя все земли, некогда отмеченные позором. Он пожирал, сводил счеты, купался в крови, мстил. Это был зверь из глубин души народа, дракон, вскормленный веками крови и слез. Он слышал страх этих народов, видел их сожаление. Когда-то они думали, что смогут блокировать, унизить, разделить, поработить эту древнюю землю Востока. Но теперь они могли лишь дрожать под тенью красной звезды, могли лишь смотреть на багровое пламя, когда их города сжигались, их истории сгорали, не оставляя им даже шанса на раскаяние."
 china.1030.a: "Месть, запоздавшая на столетие."
 china.1031.t: "Кровотечение Земли"
 china.1031.d: "Небо горит, кровь льется, и наша земля кричит от боли.\nВраги, сидящие высоко и далеко, с равнодушными улыбками,\nРазбросайте смерть по нашим полям, городам, рекам и горам.\nОни приходят не за победой,\nНо чтобы стереть наше существование из истории,\nЧтобы втоптать нашу цивилизацию в землю.\nТерпимость к прошлому была слабостью, надежда на прошлое - ядом.\nНаступило время великого суда.\nЕсли наша кровь сможет зажечь маяк возмездия,\nЕсли наша плоть сможет построить новую Великую стену,\nЕсли мы должны затащить мир в бездну, то пусть он утонет.\nДаже если мы утонем вместе с ним, даже если свет перестанет существовать,\nМы позаботимся о том, чтобы последняя капля крови нашей родины, последнее имя,\nПоследний вздох веры, выжившей в этой тьме,\nПока каждый враг не будет уничтожен."
 china.1031.a: "Наша кровь расцветет цветами победы."
 china.1032.t: "Паньгу Разделяет Небо"
 china.1032.d: "На заре времен, когда небо и земля впервые разделились, Паньгу расколол хаос. Это была кровь творения, боль порядка. С того момента этот мир был обречен на цикл между разрывом и возрождением. И вот теперь этот цикл подошел к концу.\n\nРазложение старого мира не поддается спасению. Они называют себя цивилизованными, но заставляют нас вставать на колени с клинками. Они пишут правила обманом, провозглашают справедливость вторжением и облекают свои преступления в лицемерие. Они давно забыли, чья это земля. Они давно забыли, кому принадлежит этот мир.\n\nПришло время напомнить им об этом.\n\nБольше никаких фантазий о мирном сосуществовании. Не надо больше цепляться за эти ложные места и договоры. Враг уже довел нас до точки невозврата. Так пусть же все закончится здесь. Пусть водородное пламя с температурой в миллиарды градусов разорвет их фальшивое небо. Пусть огромная радиация станет нашим гневом. Пусть они собственными руками вкусят страх и отчаяние, которые сами посеяли в ослепительном белом свете, сжигающем все.\n\nМы станем новыми Паньгу, расколов своими телами небо и землю, написав в своей крови новую эру.\nДаже если мы сами испаримся в аду,\nДаже если горы превратятся в стекло, а океаны закипят в ядовитом тумане, мы должны своими руками похоронить старый мир в пепел.\nПотому что только после смерти новая жизнь может пробиться сквозь почву,\nТолько на руинах может быть восстановлена новая цивилизация,\nТолько в глубочайшей тьме может взойти новое солнце.\nТогда мы снова восстанем из пыли, отстроим наши дворцы и вновь зажжем небесный огонь.\nДаже если мир обречен на гибель,\nто пока воля китайской нации сохраняется, небо и земля не погибнут."
 china.1032.a: "Я люблю эту землю с глубокой, непоколебимой страстью."
 china.1033.t: "Любовь, Смерть и Родина"
 china.1033.d: "Когда-то они использовали разделительные линии, чтобы разорвать эту землю на куски, разбить наш язык на диалекты, втиснуть наши верования в церкви, парламенты и торговые дома. Они называли это "цивилизацией", называли это "порядком", но их порядок был не более чем логикой жадности, их цивилизация - не более чем упакованным варварством. Они никогда не уважали Азию, не говоря уже о нас. Они хотели лишь поставить эту землю на колени, стереть Хуася, заменить его своей низшей культурой и лицемерной системой.\n\nИ им это удалось - однажды.\n\nЭто был наш самый унизительный момент. Бесчисленные герои пали во тьме, бесчисленная кровь пролилась по рекам и горам, бесчисленные поколения сжимали зубы и терпели унижение - только для того, чтобы дождаться этого дня. Теперь ложь, которую они плели, сгорела в огне, маски, которые они нарисовали, сгнили. История доказала, что Азия не нуждается ни в благотворительности Запада, ни в его приказах и диктате. Будущее Азии всегда должно было находиться в руках Китая. Только наш порядок является истинным путем для этой земли.\n\nМы заплатили цену, принесли жертвы, превосходящие все ожидания. И благодаря этому китайская нация еще больше пробудилась. Только разрушив ложные "глобальные правила", уничтожив колониальные пережитки, распространяющие яд в Азии, Азия сможет вернуться к своему законному единству. И этот путь - только мы можем пройти по нему, только китайская нация может его возглавить.\n\nНе существует ни равенства, ни разнообразия.\n\nКитайская нация стоит выше всех, выше всех народов Азии, выше всех разрозненных ответвлений и гибридов."
 china.1033.a: "Вскройте мои вены, и все, что вы увидите, - это пунцовый цвет Хуася."
 china.1034.t: "В Поисках Храма Ясукуни"
 china.1034.d: "Ли Чжицян ступал по выжженной земле, пот пропитывал его одежду из-под защитного костюма, а устройство, висевшее на груди, поскрипывало при каждом шаге. На этот раз их миссия была проста: найти место, где раньше находился храм Ясукуни, и подготовиться к созданию зоны радиационного заражения.\n\nГород на этом пути больше не напоминал ничего знакомого. Здания превратились в полые оболочки, повсюду валялись осколки стекла и искореженная сталь. Там, где земля разверзлась, обнажились канализационные трубы, но воды в них не было, только черный ил. Когда до цели оставалось еще пять километров, детектор радиации вдруг закричал. Ли Чжицян взглянул на дисплей - цифры подскочили до максимума, сигнал тревоги был таким громким, что болели барабанные перепонки.\n\n"Стоп." Офицер, стоявший впереди, поднял руку. Беспилотник взлетел, и переданное им изображение заставило всех замереть на месте. На увеличенном изображении было видно, что место, где находилась святыня Ясукуни, превратилось в огромный круглый черный кратер. Выжженная земля вокруг него образовала бескрайнее пространство. От зданий не осталось и следа, а центр кратера мерцал бледно-серым светом - это был след стеклообразной земли.\n\n"Мы не можем идти дальше." Офицер посмотрел на изображение и вздохнул. "Впереди мертвая зона. Установите маркеры и отходите." Ли Чжицян повернулся и вместе с командой установил на земле предупреждающие знаки, сделанные из толстых стальных пластин, окрашенных в красный цвет: Мертвая зона. Вход воспрещен.\n\nПока они уходили, он еще раз взглянул на руины. Горизонт выглядел так, словно его выжгли насквозь, не оставив ничего. На окружающих зданиях даже тени были впечатаны в бетон - неподвижные, застывшие."
 china.1034.a: "Может быть, это не просто тени..."
 china.1035.t: "Я Видел Серую Лошадь"
 china.1035.d: "Судирман лежал плашмя в доме. Двери и окна были заклеены скотчем, и в комнате было душно, как в пароходе. Он не знал, что происходит снаружи, только знал, что воздух изменился - пахло горящим пластиком, смешанным с едким запахом. Одни говорили, что это ядовитый газ, другие - что это новый вид военного оружия.\n\nС рассвета в далеком небе раздавался низкий, грохочущий рев, волна за волной, не прекращаясь. Из соседского радиоприемника доносились хаотичные крики, которые в конце концов тоже смолкли. Судирман прислонился к углу стены, чувствуя, как дрожит земля, словно приближается какое-то огромное чудовище.\n\nТогда он услышал их - они прибыли. Солдаты в полностью герметичных костюмах маршировали по улице. Их лица были скрыты за черными масками, не было видно никаких выражений, винтовки держались уверенно, стволы были направлены на каждый угол.\n\nСудирман выглянул наружу и увидел через щель в окне, что на улице поднялся густой желтый туман, плотно окутавший весь город. Вдали, в конце шоссе, стояло несколько зеленых тяжелых артиллерийских орудий с высоко поднятыми стволами, которые вели огонь по городу. По мере того как клубился дым, желтый туман в городе сгущался. Ветер заносил желтый туман в каждый переулок, покрывая все здания, машины и улицы.\n\nОн слышал, как громкоговорители снова и снова что-то кричат, но его это уже не волновало. Теперь все его тело горело и зудело, кожа покраснела, воздух обжигал легкие, как огонь. Он пытался найти воду, но когда он прикоснулся к ней, его кожу жгло, как от ножей.\n\nСудирман прислонился к стене, ожидая окончательного приговора."
 china.1035.a: "И ад последовал за ним."
 china.1036.t: "Не из Наших"
 china.1036.d: "Хуан Кайруи присел за осколками бетона, его камуфляжный костюм уже нельзя было отличить от грязи или крови. Целых три дня они не ели ничего горячего, не смыкали глаз. Бомбардировки НОАК не прекращались - самолеты днем, ракетные обстрелы ночью. Небо, казалось, гудело бесконечно, от низкого гула кружилась голова. Их командиром взвода был вспыльчивый ирландец, который еще вчера клялся, что будет держаться до конца, а сегодня утром его уже нигде не было.\n\nХуан Кайруи последовал за оставшейся дюжиной австралийских солдат, держа в руках белую ткань, вышедшую из-за развалин. Они не осмеливались смотреть вверх, а шли вперед, опустив головы. Вокруг уже лежали в засаде солдаты НОАК, на них были направлены стволы холодного оружия. Отряд солдат НОАК повел их в сторону полуразрушенного склада. Кайруи слышал, как кто-то шептал молитвы, кто-то тихо всхлипывал, но никто не осмеливался говорить вслух.\n\nИх лидер попытался заговорить, но НОАК просто оттащила оставшуюся дюжину австралийских солдат в угол склада. После недолгого молчания и выстрелов воздух сразу наполнился вонью ржавого железа.\n\nКогда настала его очередь, он инстинктивно проговорил: "Я... я кантонец! Мои родители из Гуандуна!"\n\nСолдат НОАК перед ним приостановился, снял маску, показав грязное лицо, покрытое пылью.\n\n"Вы австралиец."\n\nХуан Кайруи открыл рот, желая сказать что-то еще, но солдат НОАК уже поднял пистолет."
 china.1036.a: "Раздался выстрел, и Хуан Кайруи рухнул на землю."
 china.1037.t: "Китай Приступает к Окончательному Порабощению Индостана"
 china.1037.d: "Китайская Народная Республика недавно начала серию крупномасштабных военных операций против региона Индостан, охваченного конфликтом между военачальниками и политическими беспорядками. Согласно многочисленным источникам, Народно-освободительная армия продвигается по нескольким приграничным фронтам при поддержке авиаударов и быстрого развертывания логистических сетей - события, которые привлекли широкое международное внимание.\n\nСпутниковые снимки и разведданные из открытых источников свидетельствуют о том, что НОАК стремительно продвигается к югу от Гималаев, создавая передовые командные пункты вдоль ключевых транспортных путей и фактически обеспечивая контроль над большинством стратегических узлов Северного Индостана.\n\nХотя пока неясно, намерен ли Китай официально аннексировать регион, наблюдатели отмечают, что растущее присутствие и фактический контроль сигнализируют о структурных изменениях в геополитическом ландшафте Южной Азии. Возможно, международное сообщество вскоре будет вынуждено столкнуться с последствиями расширения стратегических границ Китая."
 china.1037.a: "Интересно."
 china.1038.t: "Будущее Нашего Главного Врага"
 china.1038.d: "По мере восстановления порядка в японских городах и постепенного перехода контроля над транспортом, электричеством и связью к нашим силам - от Токио до Саппоро, от Осаки до Фукуоки - мы приходим к общему мнению: Япония должна заплатить цену за свой длинный список исторических преступлений.\n\nОднако вопрос о том, как вести себя с Японией, вызвал ожесточенные споры. На нескольких совещаниях, проведенных в штабе временной военной администрации, офицеры представили резко отличающиеся друг от друга предложения.\n\nОдни утверждают, что весь Японский архипелаг должен быть выделен в качестве зоны военной администрации под управлением НОАК, с полным контролем над управлением, общественным мнением и образованием. Силовыми методами они предлагают полностью очистить японское общество от оставшихся националистических элементов и потенциальных настроений сопротивления.\n\nДругие представляют иное видение. Они выступают за основательную "де-японизацию," ликвидацию существующей национальной структуры и разделение страны на десятки региональных политических единиц, каждая из которых временно управлялась бы комитетами по местным делам, направленными центральной властью. Эти области полностью отделились бы от политического понятия "Япония," и со временем их география, культура, язык и административная номенклатура стали бы более близкими к Китаю. По их мнению, только когда идея "Японии" будет вычеркнута из истории, можно будет добиться подлинной безопасности и прочного мира."
 china.1038.a: "Превратим архипелаг в военный округ."
 china.1038.b: "Развалим Японию!"

 china_collapse.1.t: "Крах Центрального Правительства в Китае" #cw todo event
 china_collapse.1.d: "Неожиданно, вскоре после подписания ОДТО договора о прекращении огня с Китаем, ситуация резко изменилась к худшему. Вместо мира перемирие вызвало беспрецедентный кризис.\n\nПосле военного поражения центральное правительство Китая было сильно ослаблено, а его контроль над провинциями ослаблен. Генерал Хуан Мин, командующий Пекинским гарнизоном, захватил контроль над несколькими ключевыми объектами в Пекине, включая телевизионные станции, транспортные узлы и основные административные районы. Представитель военного ведомства заявил по телевидению, что это всего лишь "необходимые меры для поддержания стабильности". Некоторые правительственные ведомства хранили молчание, другие выступали с противоречивыми заявлениями. Почти одновременно южные провинции объявили об автономии, а северо-западные и северо-восточные регионы впали в смятение, не желая больше выполнять приказы Пекина.\n\nМеждународное сообщество было в шоке. Правительства многих стран призвали своих граждан покинуть Китай, а иностранные посольства эвакуировали своих сотрудников. По всему Пекину граждане спешили запастись предметами первой необходимости. Тем временем в восточной части Пекина продолжалось вооруженное сопротивление. Информация из различных источников указывала на то, что эта страна с населением 1,4 миллиарда человек столкнулась с самым серьезным кризисом управления с момента своего основания."
 china_collapse.1.a: "Мир наблюдает за происходящим с затаенным дыханием."

 china.124.t: "Кардинальное Решение Проблемы"
 china.124.d: "Пекин, зал заседаний Центрального военного совета КНР. Си Цзиньпин, облачённый в строгий костюм, стоит перед высшим командованием НОАК. Его голос звучит твёрдо и без тени сомнения.\n\n"Товарищи! История вновь ставит перед нами судьбоносный выбор. Японцы, эти вечные враги китайской нации, продолжают саботировать китайскую государственность и лезть в наши собственные дела. Марионеточное правительство на Тайване накачивается оружием ОДТО каждый день. Да, наши исторические земли вновь захвачены японцами, это ведь очевидно!\n\nСейчас, когда Китай силён как никогда, когда наша армия готова сокрушить любого противника, мы не можем позволить себе ждать. Каждый день промедления - это день, который ОДТО использует для укрепления своих сил. Мы должны действовать решительно и без колебаний!\n\nКитай - это не просто страна. Это цивилизация, это судьба человечества! Наш долг - начать в Азии новую справедливую эру социализма. Вторжение на Тайвань - не просто военная операция. Это один из первых шагов к окончательному торжеству социализма и китайской нации!\n\nТоварищи, я призываю вас поддержать это решение. Время говорить прошло - настал час действовать!"\n\nОдин из генералов задает довольно резонный вопрос. "Но разве мы готовы к вторжению уже сейчас? Если мы действительно готовы, то почемы мы не начали это вторжение раньше?"\n\n"Ну... Просто я так захотел! Захотел именно сейчас. Еще есть вопросы?" - ловко парирует Си."
 china.124.a: "Что ж, давайте начнем прямо сейчас!"
 china.125.t: ""Воин-Волк 3" выходит на экраны"
 china.125.d: "Фильм "Война Волков 3" вышел на экраны государственных кинотеатров. Он побил рекорды кассовых сборов, а кинотеатры во многих регионах спонтанно организовали групповые сеансы для военнослужащих, кадровых военных и студенческой молодежи.\n\nВ третьей части фильма Ленг Фенг уже не просто отставной солдат, он выступает как настоящий "Страж Республики,"" неуклонно защищая национальные интересы и безопасность граждан в условиях столкновения противоборствующих сил.\n\nНа премьере актер Ву Цзин сказал PLA Daily: "Это больше, чем фильм -это мобилизующий призыв духа. Сейчас нацией руководят те, кто понимает, что такое самопожертвование и дисциплина, и каждый гражданин Китая должен научиться ценить этот тяжело завоеванный порядок."\n\nИнформационное агентство Синьхуа отметило, что "Война Волков 3" - это не просто коммерческий блокбастер, а культурное отражение идеала, поддерживаемого государством: "Создание сильной армии для возрождения нации и верная защита народа." Национальное управление по делам кино добавило: "Художники новой эпохи должны служить мегафоном для современного патриотизма.""
 china.125.a: "Когда экран загорается, воля нации и ее народа воспламеняется как единое целое."
 china.126.t: "Возвращение к Истокам"
 china.126.d: "После войны на Тайване в ранее стабильном, но скрытном политическом ландшафте Китая произошли колоссальные изменения, удивившие многих внешних наблюдателей. В частности, некогда "дипломатия боевых волков" стала более агрессивной и боевой, а националистические настроения все больше влияют на риторику и действия китайских чиновников.\n\nСегодня заявление одного из ведущих политических деятелей Китая еще больше подчеркнуло эти перемены. Бывший министр иностранных дел Ван И, политический ставленник с более чем десятилетним стажем, был назначен новым председателем Постоянного комитета Всекитайского собрания народных представителей, номинального высшего органа власти в Китае, хотя его реальная власть уменьшилась после того, как система двух сессий стала в значительной степени символической.\n\n Вскоре после вступления в новую должность Ван сделал провокационное замечание во время публичного интервью местным и международным журналистам: "Некоторые азиатские страны все еще стремятся к сближению с Западом. Они не понимают, что, сколько бы они ни красили волосы в блондинку и ни изменяли форму носа, они никогда не смогут стать западными людьми. Им нужно помнить, где их корни."\n\nЭто предостерегающее заявление быстро привлекло внимание мировых СМИ, особенно когда оно контрастировало с прежним вежливым поведением Ван И на посту министра иностранных дел. Последствия его слов и новое направление, на которое они намекали, заставили соседние страны заволноваться. Особенно остро отреагировали Япония, Южная Корея и Тайвань."
 china.126.a: ""Азия для Азиатов?""
 china.127.t: "Наше Путешествие к Звездам и Морю"
 china.127.d: ""...Товарищ комиссар!"\n\nЧеловек, к которому обращались как к комиссару, обернулся с края высокой платформы. На нем была темно-синяя форма ВМС с золотыми полосками на рукавах, обозначавшими его звание старшего капитана. Под околышем его белой морской фуражки виднелись две густые чернильно-черные брови и пара ярких, внимательных глаз.\n\nГолос принадлежал другому морскому офицеру, поднимавшемуся сейчас по винтовой лестнице на платформу. На нем тоже была форма старшего капитана, но более спокойная, чем у комиссара.\n\n "Как и ожидалось, я нашел вас здесь," сказал новоприбывший с улыбкой.\n "Мне очень нравится вид отсюда, капитан," ответил комиссар, улыбаясь в ответ. "Он приносит мир в мое сердце."\n\nОни стояли на огромной кораблестроительной базе, возвышающейся над болотами. Склады и сооружения простирались до самого горизонта. Под ними в сухих доках молча лежали серые военные корабли. На некоторых из них еще устанавливали котлы, оружие и другие системы, а некоторые уже получили красную окраску днища и ждали благоприятного дня для спуска на воду. Можно было почти видеть, как на глазах формируется мощь будущего флота.\n\n"Действительно, трудно поверить, что совсем недавно флот был в таком беспорядке," согласился капитан. "Я до сих пор помню, как мы проиграли Тайваньскую войну. Рабочие на верфях устроили забастовку, задаваясь вопросом, почему мы должны продолжать строить корабли, если флот не может победить. В то время я даже подумывал о том, чтобы подать прошение о переводе на работу в судоходную компанию.\n\n"Именно поэтому к поражению приводит не потеря кораблей или оружия, а потеря уверенности в себе, что и является причиной настоящего поражения," ответил комиссар. Капитан беспомощно захихикал. "Верно, верно. Вы опять начинаете политпросвет. Я уйду и не буду мешать вам любоваться видом."\n\n"Вы возвращаетесь в город, капитан?"\n"Я иду в проектный институт. Там хотят услышать мое мнение о новой конфигурации корабля."\n\n"Современный линкор весом более семидесяти тысяч тонн, с шестью электромагнитными пушками и 128 системами вертикального запуска?" Выражение лица комиссара на мгновение застыло: "Капитан, вас ведь не интересуют подобные сложные продукты, не так ли? Я помню, как адмирал ругал технический персонал за это на последнем заседании комитета.""
 china.127.a: ""Это просто дымовая завеса, иначе армия и ВВС конкурировали бы за бюджет.""
 china.128.t: "Широкомасштабные Теракты по Всей Азии!"
 china.128.d: "В то время как военный конфликт в Азии достигает точки кипения, несколько крупных городов в нескольких странах-членах ОДТО, включая Токио, Сеул, Пусан, Мумбаи, Дели, Тайбэй, а также Сидней и Мельбурн, подверглись масштабным атакам с применением химического оружия с позднего вечера до раннего утра сегодняшнего дня. Скоординированные удары уже привели к десяткам тысяч жертв среди гражданского населения и вызвали массовую панику.\n\nПо данным экстренных служб и официальных источников, биохимические агенты быстро распространились по густонаселенным городским зонам. Предварительный анализ показывает, что использованные вещества были очень смертоносными и летучими, а их химический состав пока трудно определить. Эксперты также предупреждают, что вещества способны проникать через стандартные средства защиты, делая обычные средства защиты неэффективными.\n\nЭти атаки нанесли сокрушительный удар по социальному порядку и военным операциям стран-членов ОДТО. Городская инфраструктура остановилась, а медицинские системы работают на пределе возможностей. Помимо выполнения боевых задач на передовой, военные силы сейчас срочно перебрасываются для оказания помощи в проведении операций по оказанию помощи и обеспечению стабильности в пострадавших регионах. Масштабы нападений и вызванный ими общественный ужас уже оказывают глубокое влияние на ход войны и моральный дух населения."
 china.128.a: "Женевская конвенция теперь лишь бумага."
 china.129.t: "Выбор Места для Высадки в Тайване"
 china.129.d: "Барабаны войны звучат все громче с каждым днем, и момент, который определит судьбу китайской нации, стремительно приближается. От центрального командования в Пекине до фронта в Фуцзяни судьбы миллионов военнослужащих теперь находятся в руках немногих. Поэтому каждое решение должно приниматься с максимальной осторожностью.\n\nКоманда экспертов ЦВК представила большое количество оперативных планов, и наша задача - выбрать тот, который будет выполнен. После обеспечения безопасности передовых баз на островах Кинмен и Пэнху, операция "Фубо" предлагает начать первую волну наступления на главный остров к югу от тропика Рака. Расширенная береговая линия, протянувшаяся от Чиайи до Пингтунга, станет главной целью для десантных машин Type 05. Небольшая глубина этого района позволит нашим штурмовым группам после прорыва береговой обороны быстро занять позиции вдоль автомобильных дорог острова, эффективно рассекая оборонительные формирования противника и контролируя все пути снабжения и поддержки на острове."
 china.129.a: "Высадимся в Южном Тайване, там безопаснее..."
 china.129.b: "Высадимся прямо в Тайбэе и застанем их врасплох!"
 china.130.t: "Выбор Шифра"
 china.130.d: "\n\nС другой стороны, другой важный план, операция "Цзинхай," предлагает другой подход: "захватить лидера, чтобы захватить всю банду." Этот план предусматривает обезглавливающий удар по Тайбэю, цель которого - беспрецедентно быстро закончить объединительную войну. Эта стратегия предполагает развертывание основных штурмовых сил в устье реки Тамсуй, наиболее подходящем месте высадки для крупномасштабных операций. Одновременно более мелкие подразделения при поддержке военно-морских, воздушных и ракетных сил начнут скоординированные атаки на Килун, Илань и другие пункты. Это позволит нам быстро захватить шоссе и туннели, соединяющие Центральный горный хребет, поймать лидеров правительства и элитные силы Тайбэя в неизбежную сеть, потенциально решив конфликт одним стремительным ударом.\n\nКонечно, независимо от выбранного плана, мы должны преодолеть обширную береговую оборону Тайваня, сложные портовые сооружения и огромные городские районы, которые будут представлять значительные трудности для наших авангардных сил. Жертвы будут неизбежны, и наша задача - сделать так, чтобы они не были напрасными. Поэтому окончательное решение будет..."
 china.130.a: "Давайте рискнем и выберем экспериментальный шифр.."
 china.130.b: "Лучше выберем проверенный шифр, он нас не подведет.."
 china.131.t: "Приказы Разведке"
 china.131.d: "Барабаны войны звучат все громче с каждым днем, и момент, который определит судьбу китайской нации, стремительно приближается. От центрального командования в Пекине до фронта в Фуцзяни судьбы миллионов военнослужащих теперь находятся в руках немногих. Поэтому каждое решение должно приниматься с максимальной осторожностью.\n\nС момента создания КНР в 1949 году обсуждение победы в борьбе за освобождение Тайваня неизменно фокусировалось на противодействии мощному внешнему вмешательству. Как следствие, руководящие принципы строительства наших военно-морских и военно-воздушных сил долгое время основывались на стратегии "отрицания зоны." Сегодня противник, которому должна противостоять наша стратегия, сместился с Тихоокеанского флота и корпуса морской пехоты США на объединенные флоты и экспедиционные силы ОДТО. Для обеспечения безопасности десантных групп и безопасности военно-морских операций в западной части Тихого океана крайне важно, чтобы разведывательное бюро Объединенного штаба располагало информацией о развертывании ОДТО из первых рук.\n\nЕсть две разные точки зрения на то, как выполнить эту задачу. Одна из них выступает за разведку и наблюдение за состоянием внутренней подготовки всех стран-членов ОДТО, чтобы получить полное представление о потенциальных противниках. Также предлагается использовать военные спутники для мониторинга транспортировки предполагаемых военных материалов в режиме реального времени. Другая точка зрения предлагает сосредоточиться на регионах, где наиболее вероятен конфликт, в частности на морской и воздушной зонах от островов Рюкю до Гуама. Она рекомендует разместить в этих районах беспилотники и миниатюрные детекторы для сбора информации из первых рук в режиме реального времени.\n\nС учетом вышеперечисленных точек зрения, окончательное решение будет..."
 china.131.a: "Усилим наблюдение за всем ОДТО, это хорошая мера предосторожности."
 china.131.b: "Усилим наблюдение только за ключевыми зонами."
 china.132.t: "Распад Японии"
 china.132.d: "Когда японское правительство было распущено и упразднено китайской военной администрацией, никто особо не удивился. Некоторые западные правительства выступили с осуждающими заявлениями, но на этом все и закончилось. Для такого давнего противника, как Япония, Китай был полон решимости принять все меры, чтобы устранить любую возможность возрождения и угрозы со стороны Японии. Разделение Японии стало неизбежным, как только солдаты НОАК водрузили красный флаг на крыше здания японского национального парламента.\n\nПо словам представителя Министерства иностранных дел Китая, китайские военные сохранят контроль над несколькими ключевыми опорными пунктами, включая Йокогаму, Фукуоку и острова Рюкю, ссылаясь на необходимость "поддержания национальной безопасности." Тем временем в других частях Японии под руководством НОАК было создано несколько независимых республиканских правительств, основанных на "самостоятельной воле японского народа." Впервые с эпохи Сэнгоку жители Киото, Хиросимы и Осаки живут под разными флагами."
 china.132.a: "Нельзя Допустить, чтобы Япония Угрожала Азии"
 china.133.t: "Формирование Восточноазиатской Оборонной Инициативы"
 china.133.d: "Недавно в Шанхайском международном конференц-центре собрались главы государств, среди которых самым заметным был сам президент Китая. В последние месяцы не только зафрахтованные самолеты китайских министров иностранных дел летают по Азии, но и послы все чаще посещают министерства иностранных дел принимающих стран, добиваясь их одобрения на присоединение к возглавляемому Китаем азиатскому альянсу. Сегодня усилия китайских дипломатов наконец-то приносят плоды. Восточноазиатская оборонная инициатива, концепция которой так и осталась на бумаге, теперь стала реальностью.\n\nВстреча была отмечена тщательно продуманными китайскими церемониями, главным из которых, конечно же, была церемония подписания на Бунде. В центре внимания также был потенциал значительных изменений в региональном политическом ландшафте. Создание ВАОИ стало явным ответом на возглавляемое Японией ОДТО. Кроме того, следует отметить и мотивы многих стран-участниц. Помимо военного сотрудничества, решающую роль в их решении сыграли экономические факторы, тем более что Китай по-прежнему вкладывает значительные средства в инициативу "Пояс и путь"\n\nСоздание ВАОИ, несомненно, вновь повысило вероятность начала крупномасштабной войны в Азии. Сегодня мы можем полагаться только на здравомыслие и сдержанность политиков с обеих сторон, чтобы сохранить мир в самом густонаселенном регионе Земли."
 china.133.a: "Азия в 21 веке становится все более похожей на Европу 1914 года."
 #china.133.t: "Протесты против политики карантина"
 #china.133.d: ""
 #china.133.a: "Чёртовы Радикалы!"
 china.134.t: "Пакистан Мобилизуется Против Индии"
 china.134.d: "Ситуация в Кашмире становится все более напряженной, поскольку антииндийские боевики часто вступают в стычки с индийскими войсками. Индия обвинила Пакистан в поддержке этих группировок и в качестве ответной меры нанесла военные удары через линию контроля. Эта эскалация заставила Пакистан начать военную мобилизацию.\n\nПакистанские военные отзывают военнослужащих, находящихся на действительной службе, и направляют подразделения в ключевые приграничные районы, сигнализируя об отсутствии заинтересованности в разрешении конфликта путем компромисса.\n\nРеакция внутри Пакистана неоднозначна. Многие граждане поддерживают позицию правительства, считая, что страна должна быть готова к отражению любых угроз и военному ответу на действия Индии. Однако группы сторонников мира обеспокоены эскалацией напряженности и призывают все стороны к мирному урегулированию. Несмотря на эти призывы к миру, общенациональная мобилизация в значительной степени отодвинула эти призывы на второй план."
 china.134.a: "Мы Должны Помочь Им!"
 china.135.t1: "ОПЕРАЦИЯ: ГУЛ ОТЧЕТ ОБ УСПЕХЕ"
 china.135.t2: "ОПЕРАЦИЯ: ГУЛ ОТЧЕТ О ПРОВАЛЕ"
 china.135.d1: "При содействии наших военных советников и поддержке разведки операция Гул прошла успешно. Согласно передовым отчетам, пакистанская армия, опираясь на наш опыт, использовала элитные силы для реализации стратегии высокой мобильности и точных ударов. Они сосредоточились на ключевых целях, включая центры материально-технического снабжения индийских вооруженных сил в Кашмире. Эта стратегия значительно нарушила линии снабжения индийских войск и личную численность, подорвав их способность вести горную войну.\n\nНаша разведывательная поддержка и стратегические рекомендации значительно повысили боевой потенциал пакистанских вооруженных сил. Успех операции Гул подтверждает правильность наших концепций ведения горной войны в реальных условиях. Для Пакистана эта победа представляет собой значительное поражение индийских вооруженных сил в Кашмире, укрепляя уверенность пакистанского правительства в продолжении конфликта. Она также нанесла серьезный удар по наступательным возможностям индийских военных, возможно, заставив их перейти в оборонительную позицию для удержания своих позиций..."
 china.135.d2: "Целью операции Гул было вытеснение индийских войск из Кашмирского региона с помощью быстрых ударов и гибкой тактики. Однако наступление не принесло ожидаемых результатов, поскольку индийские военные эффективно противостояли атакам и попыткам проникновения пакистанской армии. Несмотря на нашу поддержку, в развертывании индийских войск были допущены существенные ошибки. Кроме того, пакистанский военный персонал не соответствовал высоким стандартам, необходимым для проведения такой операции. По сообщениям, операция выявила проблемы в межведомственной координации и неадекватное использование разведданных пакистанскими военными, что затруднило преодоление численно превосходящих индийских сил.\n\nМы понимаем, что провал операции Гул может привести к более пессимистичному отношению к войне с пакистанской стороны и спровоцировать индийских военных на более агрессивные действия в будущем."
 china.135.a: "Отличная работа!"
 china.135.b: "Пакистан остается слишком слабым по отношению к Индии..."
 china.136.t: "Индия согласна на переговоры"
 china.136.d: ""
 china.136.a: "Великолепно!"
 china.137.t: "Пакистан Соглашается на Переговоры"
 china.137.d: ""
 china.137.a: "Великолепно!"
 china.138.t: "Индия Отказывается от Переговоров"
 china.138.d: ""
 china.138.a: "Это пойдет им во вред"
 china.139.t: "Пакистан Отказывается от Переговоров"
 china.139.d: ""
 china.139.a: "Это пойдет им во вред"
 china.140.t: "Китай проводит Переговоры о Неприминении Ядерного Оружия"
 china.140.d: ""
 china.140.a: "я не хочу взрывать себя"
 china.140.a: "хочешь увидеть, как я взорвусь?"
 china.141.t: "Мутаиб бин Абдулла встречается с Си Цзиньпином"
 china.141.d: ""
 china.141.a: "Выпьем за наших арабских друзей!"
 china.142.t: ""Могучий" Японский Флот"
 china.142.d: ""Знаешь, почему у японских кораблей стеклянные днища?"\n\n"Почему?"\n\n"Чтобы глядеть на предыдущий Японский флот""
 china.142.a: "..."
 china.143.t: "Падение Консерваторов!"
 china.143.d: "Все КОНЧЕНО"
 china.143.a: "Победа в наших руках!"
 china.144.t: "Консенсус с Консерваторами!"
 china.144.d: "Консерваторы сейчас в большей степени выступают за олигархов..."
 china.144.a: "Победа Уже у Нас в Руках!"
 china.145.t: "Консервативный Отпор"
 china.145.d: "Последние заявления отделов пропаганды и идеологии партии вылили ушат холодной воды на политический энтузиазм, который многие возродили. В журналах "Цюши" и "Гуанмин дейли", которые когда-то служили рупорами политики Дэнга, появились статьи анонимных комментаторов (замаскированных высокопоставленных чиновников), резко критикующих новую "неугомонность и хвастовство" в партии. Авторы заключали угрожающим тоном: "Кто бы это ни был, любая попытка пошатнуть лидерские позиции партии будет лишь мечтой дурака"\n\nЗарубежные наблюдатели единодушно связывают эти перемены с недавней конференцией в Бэйдайхэ. Этот летний курорт на севере Китая - место, где ежегодно собираются высшие руководители КПК для коллективного отдыха и частных бесед. В Бэйдайхэ также приглашаются отставные высокопоставленные чиновники партии, где они могут насладиться прохладным морским бризом и время от времени вновь проявить свое политическое влияние. Говорят, что на конференции в Бэйдайхэ консервативная фракция партии и старейшины, не испытывающие оптимизма по отношению к Вану, раскритиковали его смелые реформы, что привело к изменению политического климата.\n\nНа последующем публичном центральном собрании Ван подчеркнул важность единства партии. Это было истолковано как временный компромисс, но многие понимают, что даже сам Ван Ян вряд ли остановит свои планы реформ. Предстоящий период станет переломным моментом для будущего и судьбы Китая."
 china.145.a: "Это напоминает мне 1978 год..."
 china.146.t: "Национальный День Китайской Народной Республики"
 china.146.d: "1 октября отмечается Национальный день Китайской Народной Республики, официальный праздник, посвященный провозглашению Китайской Народной Республики председателем Мао Цзэдуном. Этот праздник отмечается с 1950 года, когда при Председателе было проведено первое ежегодное празднование. Это также знаменует начало Золотой недели, недельного праздника. В этот день по всей стране проводятся праздничные мероприятия и концерты, хотя это зависит от года, в некоторые годы проводятся экстравагантные фестивали из-за того, что праздник близок к празднованию Лунного пирога. Тем не менее, это не всегда так. В определенные годы проводятся грандиозные военные парады и театрализованные представления. Феерии световых шоу, фейерверки и концерты, а также спортивные и культурные мероприятия должны проводиться в правительственных зданиях, оформленных в праздничной тематике. Гонконг и Макао также будут наблюдать за этим событием, где единство Китая будет продемонстрировано в полной мере, несмотря на многочисленные различия в нашей стране. Этот день следует сохранить как день празднования китайской нации, культуры, народа и институтов, которые его поддерживают, по мере дальнейшего продвижения нашей страны в будущее."
 china.146.a: "Вперёд!"
 china.147.t: "100 Летие КПК"
 china.147.d: "Сегодня, 1 июля 2021 года, исполняется 100 лет Коммунистической партии Китая. После многих лет подготовки, включая продвижение исторических музеев по всей стране, связанных с Коммунистической партией, мы начали первую волну празднований в Пекине, со световых шоу по всей стране, особенно в Чанше, которые начнутся в конце июня. Национальное управление кинематографии поручило местным киноцентрам, кинокомпаниям и продюсерским фирмам начиная с апреля показывать и продвигать фильмы, посвященные истории китайского социализма и освобождению нашего народа. Баннеры и рекламные щиты были размещены по всему городу в качестве призыва к китайскому народу принять участие в торжествах, что они и сделали. Явка на мероприятие была колоссальной: председатель Си Цзиньпин в сопровождении премьер-министра Ле Кэцяна, бывшего генерального секретаря Ху Цзиньтао и членов Постоянного комитета Политбюро выступил с часовой речью возле площади Тяньаньмэнь, чтобы провозгласить новую эру социализма с китайскими особенностями. В ходе этой речи мы продемонстрировали миру силу, повторив, что любая иностранная сила, которая попытается принизить Китай, столкнется с великой стальной стеной, выкованной 1,4 миллиардами человек, составляющих нашу нацию. К сожалению, ожидаемый военный парад был отменен, хотя пролет самолетов был продемонстрирован всему миру в полном объеме."
 china.147.a: "Выпьем за Китайский Век!"
 china.148.t: "Протесты Против Си Цзиньпина"
 china.148.d: "Поздний вечер, но далеко не тишина для китайского мегаполиса с населением в 10 миллионов человек. В переулках старого района города проходит поминальная служба. Участники, все с черными вуалями, обернутыми вокруг левых рук, и со свечами в руках, подходят к временной трибуне, чтобы выразить соболезнования членам семей, погибшим в Тайваньской войне. Горестное нытье людей постепенно переходит в рев праведного негодования: "Си Цзиньпин, верни жизни моих близких!". Такие крики можно услышать по всему городу сегодня вечером.\n\nНа другом конце города, в университетском городке, радикально настроенные студенты прорвались через стены кампуса и вышли на улицы. Эти студенты имеют разное образование и придерживаются разных взглядов, но всех их объединяет глубокая ненависть к глупым военным авантюрам партии. Студенты несут белые транспаранты с большими красными буквами, на которых написано: "Долой коммунистическую партию! Долой Си Цзиньпина!". Многие также идут с портретами Си Цзиньпина и других лидеров, их прежде величественные лица обезображены кощунственными символами, написанными красными чернилами.\n\nВ командном центре городского полицейского управления начальник с большим гневом смотрит на гигантский экран перед собой. На экране показаны несколько "беспорядков", происходящих по всему городу. Увидев на экране, как группа демонстрантов повалила на землю кукольную статую Си, отрубила ей голову и подожгла, шеф повернулся к своему заместителю и сказал..."
 china.148.a: ""Мы должны арестовать всех этих людей, иначе завтра арестовывать будут нас.""
 china.149.t: "Партия в Беспорядке"
 china.149.d: "В герметичном конференц-зале Чжуннаньхай Си Цзиньпин проводит совещание с несколькими своими ближайшими сотрудниками. Именно в этом зале ранее Си отдал приказ об осуществлении плана войны с Тайванем."Наша страна находится в дипломатической изоляции, товарищ президент. Начало войны сильно испортило наш международный имидж, а поражение привело к тому, что нашу страну стали принижать все чаще и чаще, многие послы уже подали заявления об отставке." Министр иностранных дел сказал это горьким тоном.\n\n"Армия также деморализована", - плаксиво произнес заместитель председателя ЦКВ, лишившись всей той уверенности, которая была у него до начала войны. "Несколько частей почти взбунтовались, партийные комиссары и командиры обвиняют друг друга".\n\nДиректор центрального офиса поднялся, чтобы доложить с измученным, но безнадежным выражением лица: "Самая тревожная ситуация сложилась внутри партии: низовые члены партии приняли на себя большую часть нагрузки по стабилизации с большим недовольством. На самом верху многие фракции маргинализированных кадров начинают сговариваться, чтобы бросить вызов вашей власти".\n\nСи почувствовал неприятную боль в голове и потер виски. Ему уже пришлось проглотить горькую пилюлю, ставшую результатом его собственной недальновидности. И его самые доверенные подчиненные не оказали ему никакой помощи."
 china.149.a: "Кто-нибудь знает, что делать?"
 china.150.t: "Постоянный Комитет Уходит в Отставку"
 china.150.d: "Как будто нынешняя ситуация в Китае недостаточно хаотична, недавняя новость, опубликованная People's Daily, Guangming Daily, Global Times и другими СМИ, вновь ошеломила нацию - нынешний Постоянный комитет Всекитайского собрания народных представителей объявил о своей "коллективной отставке" и вскоре организует новые выборы. Представитель ВСНП заявил, что это решение было основано на "конкретных политических потребностях, ожиданиях людей и добровольном мнении представителей" и "соответствует демократическим процедурам"\n\nХотя ВСНП фактически не обладает большой властью, его Постоянный комитет имеет теоретически наивысшую власть над персоналом. Он имеет право назначать и увольнять ряд руководителей страны, включая премьер-министра и президента. Это означает, что лидеры страны также автоматически теряют свои места, пока не будут проведены новые выборы в ВСНП. Это также означает, что Си и его коллеги на короткое время теряют законные полномочия представлять страну и руководить государственными учреждениями. Очевидно, что это серьезная неудача для Си, и многие начинают подозревать, что это хорошо спланированная контратака со стороны оппозиции внутри партии."
 china.150.a: "Изменилась ли атмосфера?"
 china.151.t: "Фракционность КПК очевидна и необузданна"
 china.151.d: "Жители столицы часто первыми чувствуют тонкие изменения в политической ситуации, поэтому они, как правило, равнодушны к закулисной политике в правительстве. Но сейчас даже пекинцы обсуждают последние новости в нервных тонах - только что объявленную "отсрочку" выборов нового состава Постоянного комитета ВСНП и созыва пленарного заседания  ВСНП. Решение, как утверждается, было принято Постоянным комитетом Политбюро ЦК, фактической верховной властью страны.\n\nРаскол в коллективном руководстве стал общеизвестным фактом, о чем свидетельствует ряд политических изменений, включая временный перенос сессии ВСНП. Кроме того, различные газеты и телеканалы, контролируемые партией, начали бесконтрольно выражать противоположные мнения, а местные органы власти постепенно теряют страх перед авторитетом центрального правительства. Что касается 90 миллионов рядовых членов партии, то они уже давно лишены лидеров и разрознены."
 china.151.a: "Затишье перед штормом..."
 china.152.t: "Декларация о "Пути Всеобъемлющих Преобразований""
 china.152.d: "Как и извилистые коридоры Запретного города, китайская политика долгое время считалась таинственной и непрозрачной. Однако новое руководство Коммунистической партии Китая своими практическими действиями развеяло это представление, удивив весь мир.\n\nСразу после избрания генеральным секретарем Ван Ян провел пресс-конференцию в зале Циньчжэн в Чжуннаньхае. На ней Ван подробно рассказал о своих планах реформ в присутствии многочисленных китайских и иностранных журналистов. Он подчеркнул, что будет способствовать "модернизации возможностей управления" в Китае с помощью практических действий, отдавая приоритет "социалистической демократической политической цивилизации". Тем самым он фактически объявил, что КПК приступит к реализации нового плана политических реформ. Ван также упомянул, что его принимал и поощрял Дэн Сяопин, когда он был мэром Тунлинга, что было истолковано как позиционирование Ваном себя как истинного наследника реформ и открытости.\n\nВесь мир был поражен смелым политическим заявлением Ван Яна. Многие утверждали, что это первый шаг к либерализации в Китае, другие же считали, что Ван всегда будет ставить во главу угла то, чтобы Китай снова стал сильным. Кроме того, его реформы могут столкнуться с жесткой оппозицией внутри партии. Тем не менее, огромная политическая смелость Вана получила широкое признание."
 china.152.a: "Мечтатель и делатель."
 china.153.t: "Сторонники Жесткой Линии Возмущены Внешними Инвестициями"
 china.153.d: "Недавнее выступление вице-премьера Лу Хао в шанхайском районе Пудун, в котором он подчеркнул важность улучшения "деловой среды", вызвало ожесточенную полемику.\n\nНа одном из известных левых форумов опытный плакатист опубликовал "плакат с большим иероглифом", на котором изображено чумазое лицо рабочего с ярким заголовком: "Забудьте о справедливости, ибо скоро иностранный капитал сломает нам спины!" Наиболее острая критика исходила от левых старшего поколения, которые рассматривают умиротворение иностранных инвесторов как предательство рабочих и крестьян. Су Тишань, один из видных деятелей, прямо назвал высказывания Лу проявлением "бесхребетности", заявив: "Настоящие инвесторы ценят старательных рабочих и эффективность производства; потворство капиталу ведет лишь к повторению прошлых ошибок"\n\nС другой стороны, некоторые экономисты предложили более умеренную точку зрения. Ученый Лу Циюань в своей колонке написал: "Уроки реформ доказывают, что привлечение иностранных инвестиций не противоречит социализму. Реальный вопрос заключается в том, чтобы капитал служил народу." Тем временем более молодые пользователи сети публиковали мемы, в том числе один, где голова Лу Хао была нарисована в фотошопе на половину робота, с саркастической подписью: "Бизнес-среда? Баллотируемся в президенты, не так ли?"\n\nХотя высказывания Лу подверглись резкой критике в Интернете, они, похоже, выиграли для правительства драгоценное время. Сообщается, что несколько иностранных фирм отложили запланированный ранее вывод активов. Один из чиновников пояснил: "Стабилизация иностранного капитала - это только первый шаг; цель - построить новую модель международных экономических отношений."\n\nДебаты продолжаются. В разделе комментариев "Утопии" один старейшина заметил: "Мы слишком долго зацикливались на ВВП. Пришло время переосмыслить наш путь развития.""
 china.153.a: "Масштабы истории меняются."
 china.154.t: "Первые Трудности"
 china.154.d: "В центре управления операциями Объединенного комитета начальников штабов несколько молодых офицеров собрались вокруг командного пульта. На встроенном экране дисплея отображалась подробная военная карта острова Тайвань в чрезвычайно крупном масштабе, дополненная обширными примечаниями, сравнивающими благоприятную для противника ситуацию. Красные и синие маркеры обозначали передвижения обеих армий. За столом сидел генерал и внимательно слушал доклады своих подчиненных.\n\nПолковник Сухопутных Войск передал стопку донесений и начал: "Товарищ начальник, армия считает, что наши бронетанковые части должны быть более бдительными в отношении противотанковых средств противника. Кроме того, точность наших ударов ракетно-артиллерийских войск по пересекающемуся проливу недостаточна и требует улучшения..." Не успел он закончить, как командующий ВМС НОАК перебил его: "ВМС обнаружили повышенную активность вражеских подводных лодок в различных водах к северо-востоку, северо-западу и юго-востоку от острова Тайвань. Нам необходимо развернуть больше фрегатов и противолодочной авиации..."\n\nМайор ВВС НОАК добавил: "Наши большие эскадрильи беспилотников и истребителей также должны ускорить модификацию и перепрофилирование тайваньских аэропортов..."\n\nНачальник штаба постучал рукой по столу, и в комнате воцарилась тишина. Он поднял доклады и торжественно заявил: "Все эти вопросы крайне важны. Я проинформирую председателя и Политбюро по каждому из них.""
 china.154.a: "Мы должны извлечь из этого урок."
 china.155.t: "Порядок установлен в Тибете"
 china.155.d: ""
 china.155.a: "Великолепно"
 china.156.t: "Порядок установлен в Синьцзяне"
 china.156.d: "После поражения в Тайваньской войне наша страна переживала период неспокойствия. Сепаратистские силы в Синьцзяне воспользовались возможностью подстрекать к беспорядкам, пытаясь раздробить нацию и посеять хаос. Однако под железной рукой наших военных эти мятежные элементы были подавлены, сохранив суверенитет и территориальную целостность страны.\n\nОт Кашгара до Тумсука повсюду видны лозунги, призывающие к этническому единству, и развевающийся пятизвездочный красный флаг, подтверждающий суверенитет нашей страны над этой древней землей. Сейчас крупные города Синьцзяна уверенно возобновляют производство и городскую деятельность. Местные партийные организации активно участвуют в восстановительных работах, постоянно содействуя социальной гармонии и стабильности.\n\nСегодня Синьцзян, эта земля с богатой историей, полная молодой энергии, гордо стоит с обновленным духом на западной границе нашей страны."
 china.156.a: "Тысячелетние пески проносятся мимо Тяньшаня, колокола Шелкового пути снова зовут домой."
 china.157.t: "Национальная Система Интернет-Идентификации"
 china.157.d: "Недавно китайские чиновники объявили о новой политике по введению "интернет-идентификационной карты". Эта новая технология представляет собой электронный зашифрованный файл, выдаваемый местными органами общественной безопасности и направленный на развитие социального управления и совершенствование полицейских служб. Она опирается на "Платформу аутентификации доверенной личности" Министерства общественной безопасности, которая использует биометрические методы, такие как распознавание лиц, для идентификации пользователей. Согласно официальному сайту Министерства общественной безопасности, система была опробована в нескольких приложениях, включая правительственные сайты и общественные форумы. Хотя китайское правительство пропагандирует эту систему как еще один пример высокотехнологичного управления и "новых производительных сил", высказываются опасения по поводу повышенного риска утечки личной информации, а многие представители интеллигенции обеспокоены усилением контроля и мониторинга Интернета."
 china.157.a: "Технология может быть обоюдоострым лезвием."
 china.158.t: "Новая Великая Эпопея Партии"
 china.158.d: "Сегодня наша партия ведет китайскую нацию к новой главе! По мере продвижения вперед для нашей партии крайне важно осмысливать и критиковать ошибки прошлого. Только благодаря этому процессу мы сможем продолжать вести китайскую нацию к ее великому омоложению. Историю пишут победители, а повествование о прошлом было испорчено западными идеологиями и беспочвенными причитаниями буржуазии. Эти негативные влияния заслонили истинную повестку дня нашей партии. Теперь мы должны рассеять туман и открыть правду.\n\nПять принципов мирного сосуществования - это не более чем инструменты, используемые западными державами, чтобы помешать нашему подъему. Китайская нация давно стремится к объединению и национальному освобождению, ставя перед собой цель установить новый порядок, основанный на китайской цивилизации. Марксизм - это не иностранный импорт с Запада, а система мысли, глубоко укоренившаяся в древней почве Китая. От философских размышлений мудрецов династий Шан и Чжоу до социальных идеалов добродетельных деятелей на протяжении всей истории, сущность марксизма всегда сияла, доказывая его глубокую связь с китайской цивилизацией, как интеллектуальный двигатель омоложения китайской нации.\n\nМы должны вписать эту новую главу истории в гены китайской нации. Каждый гражданин Китая должен знать, кто мы такие, откуда пришли и куда направляемся. Эта славная история должна быть вписана в сердце каждого, запечатлена в глубине его души."
 china.158.a: "Слава КПК!"
 china.159.t: "Волна Фанатизма"
 china.159.d: "От северного ледяного города Харбина до южного цветочного Гуанчжоу, от Бунда в Шанхае до Голмуда на Тибетском нагорье - по всему Китаю прокатилась мощная волна националистического пыла. Улицы и переулки украшены красными флагами, толпы скандируют возмущенные лозунги: "Долой японский империализм!"", "Нанкинская резня, кровь за кровь!"\n\nНа фоне толпы молодые лица раскраснелись от возбуждения. Хотя они не пережили прошлых страданий, они унаследовали глубокий патриотический пыл от своих родителей, учебников и Интернета. Некоторые держат плакаты с экстремистскими лозунгами вроде "Оставьте острова, но не людей".\n\nВ Шаошане, Хунань, родном городе председателя Мао, десятки тысяч людей надевают фуражки с красными звездами и значки Мао. Они поют красные песни и несут транспаранты с надписью "Долой всех бегущих собак империализма!"". Некоторые потомки красногвардейцев даже надевают форму той эпохи, размахивают красными книжечками и кричат: "Да здравствует председатель Мао!"" и "Долой империализм! Долой японский бандитизм!"\n\nМестные власти, похоже, молчаливо одобрили демонстрации, не предприняв никаких действий по их разгону. Официальные СМИ освещали события под заголовками "Патриотический энтузиазм на высоте" и "Помнить историю, никогда не забывать национальное унижение"."
 china.159.a: "Весь Китай похож на котел с кипящей водой, который вот-вот извергнется..."
 china.160.t: "Смерть Китайской Социалистической Мечты"
 china.160.d: "С начала реформ и открытости идеология "новых левых" незаметно укоренилась в партии. Прикрываясь знаменем "народа", они на самом деле стремятся нарушить стабильность и помешать развитию. Их суть заключается в попытке вернуть Китай к временам нищеты и отсталости.\n\n"Новые левые" маскируются под риторику марксизма, но при этом отстаивают устаревшие догмы, стремясь подавить творческий потенциал и жизненную силу китайского народа с помощью косного мышления. Они закрывают глаза на достижения реформ и открытости, насмехаются над динамичной силой рыночной экономики и даже пропагандируют "классовую борьбу", пытаясь разжечь социальные конфликты и создать хаос.\n\nПоэтому мы должны решительно очистить партию от новолевых элементов, безжалостно удаляя их и не позволяя им вызывать дальнейшие беспорядки внутри партии! Мы должны усилить руководство в идеологической сфере, четко противостоять всем заблуждениям и направлять членов партии и кадры на неуклонное продвижение по пути социализма с китайской спецификой.\n\nМы должны решительно противостоять всем левым ошибкам и сохранять приверженность пути социализма с китайской спецификой. Мы должны продолжать уделять первостепенное внимание экономическому развитию, поддерживать реформу и открытость, придерживаться философии развития, ориентированной на человека."
 china.160.a: "Мы никогда не позволим оклеветать реформу и открытость."
 china.161.t: "Смерть Китайской Либеральной Мечты"
 china.161.d: "В последние годы среди некоторых членов партии и чиновников распространилось пагубное течение под названием "либерализм". Прикрываясь "общечеловеческими ценностями", они продвигают такие западные понятия, как "демократия" и "свобода", стремясь подорвать ключевое руководство партии и размыть наши социалистические основы. Эти люди используют новые медиа-платформы для клеветы на партию и нацию, разжигают социальные беспорядки и пытаются подмять под себя наше правительство.\n\nЛиберализм - это ядовитый сорняк, глубоко укоренившийся в умах некоторых, разъедающий их убеждения и подтачивающий их политические позиции. Они потеряли веру в марксизм, став пешками враждебных западных сил. Путь к великому омоложению китайской нации не терпит идеологической путаницы.\n\nМы должны решительно очистить партию от либеральных элементов, уничтожить эти идеологические опухоли, чтобы обеспечить чистоту и продвижение нашей партии. Мы должны решительно противостоять либерализму, противостоять враждебному западному проникновению, защищать политическую безопасность и социальную стабильность нашей страны."
 china.161.a: "Придерживайтесь руководства КПК!"
 china.162.t: "Великая Китайская Нация"
 china.162.d: "Китайская нация - наследница 5000-летней цивилизации, колыбель восточноазиатской культуры и лидер великого омоложения Азии. Наша история наполнена бесчисленными славами - от Желтого императора до императора Яня, от Цинь Шихуанди до Мао Цзэдуна. Поколение за поколением героев и мудрецов своей кровью, потом и мудростью выковывали блеск китайской нации. Наша культура глубока и обширна, она сияет, как звезды.\n\nНаша цивилизация древняя и прочная, она породила бесчисленные великие изобретения, которые демонстрируют мудрость и креативность китайского народа. Эти изобретения способствовали прогрессу мировой цивилизации, поставив китайскую нацию на вершину мировых достижений.\n\nОднако соседние с нами страны постоянно пытаются оспорить наш авторитет. Они изучают нашу культуру и подражают ей, но при этом пытаются подорвать нашу цивилизацию! Их амбиции безграничны, они стремятся захватить наши ресурсы и растоптать наше достоинство. Преступления, которые они когда-то совершили, слишком многочисленны, чтобы их перечислять, а агрессивные войны, которые они вели против нас, никогда не будут забыты. Их нынешнее высокомерие не может скрыть их низменную и презренную сущность."
 china.162.a: "Уничтожьте япошек, победите врага и принесите мир в беспокойные души!"
 china.163.t: "Телеэкран"
 china.163.d: "Бай Чэнъюнь лежала в постели, не сводя глаз с экрана компьютера, на котором отображалась страница из газеты Epoch Times. Ей казалось, что она открыла дверь в новый мир и столкнулась с информацией, которую никогда раньше не видела. По мере чтения в нее стали закрадываться сомнения относительно полученного образования; ее понимание партии, нации и истории пошатнулось.\n\nПосле долгого времени Бай Чэнъюнь наконец выключила компьютер, но сон все еще не шел к ней. В голове прокручивались просмотренные ранее документальные фильмы, в которых рассказывалось о том, как людей арестовывали за использование VPN. Чувство тревоги грызло ее.\n\n"Нет, меня не поймают", - успокаивала себя Бай Чэнъюнь. "Я обычная студентка. Я лишь иногда прохожу через брандмауэр, чтобы почитать новости. Полиция меня не заметит". Тем временем в офисе отдела кибернетического наблюдения городского Бюро общественной безопасности молодой сотрудник сидел за компьютером, не сводя глаз с данных, выводимых на экран. На экране отображались записи онлайн-активности Бай Чэнъюнь, а также ее личные идентификационные данные.\n\n"Бай Чэнъюнь, женщина, 22 года, студентка университета. Недавно заходила на зарубежные антикитайские сайты, подозревается в распространении антикитайской риторики", - тихо проговорил про себя офицер. Он снял трубку и набрал номер."
 china.163.a: ""Алло, капитан Ванг? Я обнаружил подозрительного человека. Нам нужно усилить наблюдение.""
 china.164.t: "Национальный Позор"
 china.164.d: "Утренний солнечный свет слабо проникал в больничную палату, отбрасывая бледный отблеск на белые стены, отчего в помещении становилось еще холоднее. Господин Чжан, 83 года, неподвижно лежал в постели. С тех пор как он узнал о гибели сына на Тайваньской войне, он потерял дар речи и он неподвижен, его мутные глаза были устремлены в потолок.\n\n"Ты должен держаться!" - убеждала его жена, миссис Ванг, вытирая слезы."Нашего сына больше нет, но у тебя есть я и внуки. Не сдавайся!" Господин Чжан молчал, из его глаза медленно катилась одна-единственная слеза. В его жизни было слишком много страданий.\n\nОн смутно вспоминал свое детство в маленькой деревушке у подножия горы Чанбай, где протекала извилистая река Хун. Жизнь была бедной, но радостной. Однако после инцидента с мостом Марко Поло все изменилось. Он помнил, как взывал к родителям под дождем, но находил лишь безжизненные тела и холодный дождь. Теперь и его сын пал под японскими пулями.\n\n"Японцы... снова..." Губы господина Чжана задрожали, он попытался сесть, но слабо опустился на кровать.\n\n"Пожалуйста, не мучайте себя так", - умоляла госпожа Ван, ее лицо было бледным от страха, она обнимала его, всхлипывая.\n\n"Я хочу отомстить! Я убью этих проклятых японцев!" Господин Чжан ревел, его хрупкие кулаки тряслись от ярости, как у раненого зверя, воющего в отчаянии."
 china.164.a: "Если мы отплатим добром за зло, что мы предложим взамен добродетели?"
 china.165.t: "Меня всё время спрашивают: знаю ли я Тайлера Дёрдена?"
 china.165.d: ""
 china.165.a: "..."
 china.166.t: "Бэйдахуан Групп Воссоединяет Китай"
 china.166.d: ""
 china.166.a: "Интересно."
 china.167.t: "Спасение Ситуации"
 china.167.d: "Несмотря на тщательную подготовку, непоколебимую мотивацию, огромную военную мощь и крупнейшую экономику в мире, мы потерпели сокрушительное поражение от тайваньских сепаратистов и их союзников.\n\nНаши враги, вопреки всему, отразили наши усилия по освобождению, заставив нашу армию в хаотичном порядке отступить через Тайваньский пролив. Последствия были разрушительными. Наши военные, сильно ослабленные конфликтом, борются с низким моральным духом и недостаточной боеготовностью. Экономические последствия не менее плачевны, поскольку санкции усугубили наше положение и оттолкнули инвесторов, частный бизнес и крупные иностранные предприятия, обеспокоенные стабильностью своих вложений в Китае. Общественный резонанс также был серьезным. Несмотря на попытки преуменьшить и подавить новости о нашем поражении, вспыхнули массовые протесты с требованием отставки Си Цзиньпина и кабинета министров. Масштабы этих протестов перегрузили местную полицию, а поскольку наши вооруженные силы все еще находятся в беспорядке, поддержку могут оказать только Народная вооруженная полиция и различные военизированные формирования. Учитывая эскалацию насилия, разрастание толпы и, скорее всего, неподготовленность наших сил реагирования, риск смертоносных инцидентов высок.\n\nПуть к восстановлению, несомненно, будет тернист, и внутренние разногласия могут заставить некоторые фракции в правительстве задуматься о радикальных мерах. Особенно это касается военных и сторонников жесткой линии в КПК, которые, переварив поражение, могут поддаться искушению устроить переворот. Пока это только предположения, мы должны сосредоточиться на планировании наших дальнейших действий, обеспечивая безопасность нашего правительства от внутренних и внешних угроз."
 china.167.a: "Восстановление должно начаться сейчас!"
 china.168.t: "Наше Историческое Наследие"
 china.168.d: "С 1840 года эта земля с богатой историей превратилась в агнца, ожидающего заклания, когда западные державы жадно захватили наши богатства и растоптали наше достоинство. Они стремились разделить нашу родину на бесчисленные куски, как сочный пирог, а наш народ превратить в рабов своих прихотей. Революция 1911 года ознаменовала гибель императорской системы, но не изменила полностью судьбу Китая. Продолжались конфликты между военачальниками, иностранное вмешательство и раздробленность страны. Иностранные державы не оставляли попыток разделить Китай, используя военачальников в качестве пешек, превратив Китай в шахматную доску и поставив на карту жизни бесчисленных китайцев.\n\nНесмотря на вторжение японского империализма, мы не теряли надежды. Под руководством нашей партии мы разгромили захватчиков, положив конец вековому унижению и добившись национальной независимости. Народ наконец-то стал хозяином своей судьбы. Мы встали на путь опоры на собственные силы и упорного труда, преодолели империалистическую блокаду, возглавляемую Соединенными Штатами, и добились выдающихся успехов, благодаря которым китайский народ вновь стал величественным и гордым среди народов мира.\n\nСейчас иностранные силы возвращаются, стремясь вновь разделить нашу землю. Но мы уже не та слабая нация, которую они когда-то эксплуатировали. Мы не потерпим их вмешательства. С огнем и яростью мы будем защищать нашу родину, мы всегда будем стоять твердо, как непоколебимая сила на Востоке!"
 china.168.a: "Фэн танцует, то поднимаясь, то опускаясь.  Хуанг поет, в нем течет печаль."
 china.169.t: "На Площади Тяньаньмэнь"
 china.169.d: "На площади Тяньаньмэнь в самом разгаре был массовый митинг. Площадь была заполнена людьми, развевались красные флаги, а оглушительные песнопения эхом разносились по древней столице. Некоторые в толпе были одеты в реплики красногвардейской формы 1960-х годов и размахивали "Красной книжечкой", другие держали транспаранты с протестами против Японии. С ворот Тяньаньмэнь Ли Цзочэн, одетый в военную форму, смотрел на море людей, прежде чем шагнуть к трибуне.\n\n"Товарищи, сограждане!", - Голос Ли Цзочэна, усиленный динамиками, разносился по всем уголкам площади. "Сегодня великий день для омоложения китайской нации, но и один из самых тяжелых моментов в истории нашей страны. Прошло более века с момента национальной трагедии Первой китайско-японской войны. За эти долгие годы наша страна пережила бесчисленные трудности, подвергаясь нашествиям иностранных врагов и эксплуатации со стороны капиталистов. Чтобы сохранить то, что они называли миром, мы были вынуждены терпеть унижения и молча бороться за выживание. Сегодня Япония и ее империалистические союзники стремятся повторить эту трагедию! Они хотят помешать неизбежному объединению Китая! Но с железной волей и силой 1,4 миллиарда объединенных людей наша нация не убоится боли! Железный кулак нашей армии сокрушит империалистические силы! Я заявляю, что наша нация начнет великую освободительную войну против империалистической державы ОДТО!""
 china.169.a: "Сровняйте Токио с землей, отдадим Императора под суд!"
 china.170.t: "Когда Маркс Встретился с Конфуцием"
 china.170.d: ""...Профессор Ли Сюэцзюнь, мы все знаем, что марксизм, как правило, зародился в Европе в 19 веке. Однако вы предположили, что корни марксизма находятся в Китае. Почему вы пришли к такому выводу?"\n\n"Я считаю, что идеологические истоки марксизма можно проследить в Китае в Период Вёсен и Осеней и Воюющих государств."\n\n"То есть, вы хотите сказать, что социалистическое движение в Китае возникло даже раньше, чем на Западе?"\n\n"Именно так. Период Вёсен и Осеней был временем интенсивной интеллектуальной и культурной деятельности в истории Китая. Конфуцианская мысль, например, отстаивает концепцию "мира как общего блага" и стремится к "Великому единству". Эти идеи имеют поразительное сходство с коммунистическим обществом, которое пропагандирует марксизм."\n\n"Вы предполагаете, что конфуцианство содержит семена социализма?"\n\n"Можно сказать и так. Одна из основных идей марксизма - "освобождение всего человечества", а конфуцианство также подчеркивает "человечность" и "Великое единство". Видение Марксом коммунистического общества, по сути, является современной версией "Великого единства" конфуцианства. Конфуцианская мысль повлияла на интеллектуальное просвещение в Европе, которое привело к Французской революции. Однако сегодня большинство западных политиков упоминают только Маркса, но не Конфуция. Это типично для тенденции Запада присваивать идеи других цивилизаций без признания...""
 china.170.a: "Интересное интервью."
 china.171.t: "Наша Ярость"
 china.171.d: "На Ваньшаньской Дороге в Шанхае, у здания генерального консульства Японии, стояла шеренга вооруженных полицейских, сдерживая наплыв толпы. Сотни националистов, размахивая транспарантами и знаками, образовали массовую акцию протеста. В первых рядах толпы мужчина средних лет, охрипший от гнева, размахивал мегафоном, неустанно осуждая прошлые злодеяния Японии. "Забвение истории означает предательство!" - кричал он изо всех сил. "Японцы - звери! Они не заслуживают того, чтобы жить в этом мире! Мы должны уничтожить их и заставить заплатить долг за кровь!"\n\nВнутри консульства японский посол Акамацу Шуичи с серьезным выражением лица наблюдал за кипящей массой через толстое стекло. По мере того как волны ярости снаружи становились все громче, его рука слегка подрагивала, а внутри нарастали тревога и страх. Масштаб и интенсивность протеста вызывали у него глубокое беспокойство: если толпа потеряет контроль, если полиция не сможет их сдержать, если они пойдут на штурм консульства... Он резко тряхнул головой, заставляя себя отогнать эти страшные мысли.\n\n"Посол, что нам делать?" тихо спросил Кейичи Такенака. Акамацу глубоко вздохнул, пытаясь успокоить нервы. "Немедленно свяжитесь с Министерством иностранных дел Китая и потребуйте усилить присутствие полиции для обеспечения безопасности консульства", - сказал он твердым голосом."
 china.171.a: ""И точно доложите о ситуации нашему правительству.""
 china.172.t: "Новый Цифровой Китай"
 china.172.d: "На этой древней земле каждый дюйм почвы оснащен датчиками, как наше осязание, каждая камера - наши глаза, а мобильное устройство каждого гражданина - нервные окончания нашей огромной сети. Мы создали беспрецедентное цифровое тоталитарное общество. В этом царстве нет преступлений и инакомыслия. Каждый гражданин работает как винтик в отлаженной машине, точно подчиняясь руководству партии и внося свой вклад в великое омоложение китайской нации.\n\nНаши люди больше не запятнаны разлагающими идеологиями Запада. Их дух очищен патриотизмом и основными ценностями социализма. Они любят нас, как дети любят своих родителей, как верующие почитают своих богов. Теперь, когда мы уничтожили внутренних врагов, пришло время смыть кровью наши прошлые унижения.\n\nМы будем использовать их кровь, чтобы почтить души, потерянные в Нанкинской резне, и их головы, чтобы отомстить за женщин, которых они уничтожили! Кровью и огнем мы очистим столетний позор и встретим великое омоложение китайской нации с победой и славой!"
 china.172.a: "Наш флаг скоро будет развеваться на вершине горы Фудзи!"
 china.173.t: "Шанхайский Рейд"
 china.173.d: "Сегодня многие жители Шанхая были разбужены на рассвете звуками движущихся по улицам тяжелых машин, выбиваемых дверей, а иногда и выстрелами. Позже правительство объявило об "успешном завершении совместной операции МГБ и НВПК по аресту различных опасных предательских элементов в Шанхае", заявив, что было захвачено около 300 подозреваемых. Международные СМИ обратили внимание на то, что местонахождение видного реформаторского политика Ван Яна в настоящее время неизвестно. Одно можно сказать точно: Реформаторская фракция прекратила свое существование как влиятельная политическая группировка."
 china.173.a: "Это было так же просто, как перевернуть ладонь."
 china.174.t: "Ху Чуньхуа выпроводили из ВСНП"
 china.174.d: "Последняя сессия ВСНП закончилась скандалом: люди в военной форме пришли и силой выпроводили Ху Чуньхуа из здания прямо посреди чьей-то речи. В официальном заявлении Коммунистической партии говорится, что Ху Чуньхуа вывели из-за плохого самочувствия, хотя записи с камер доказывают обратное. Как бы то ни было, заседание закончилось решительной победой реваншистской фракции и фактической ликвидацией жесткой оппозиции."
 china.174.a: "Какое жалкое зрелище."
 china.175.t: "Возвращение Консультативных Сторон"
 china.175.d: "Недавно возобновили работу Всекитайское собрание народных представителей и консультативные партии, что ознаменовало первое комплексное восстановление после перерыва, вызванного тайваньским кризисом.\n\nНа недавно прошедшем в Пекине Всекитайском собрании народных представителей участвовали около ста представителей консультативных партий. Они предлагали и обсуждали такие темы, как восстановление экономики и социальная стабильность. Ассоциация Демократического Национального Строительства Китая предложила координированное развитие региональной экономики, а Китайская Партия Стремления к Справедливости сосредоточилась на делах заморских китайцев, выступая за сохранение связей и поддержку заморских китайцев. Атмосфера на конференции была торжественной и организованной.\n\nВ то же время представитель КПК заявил на пресс-конференции: "Принцип долгосрочного сосуществования, взаимного контроля, искреннего сотрудничества, разделения бед и несчастий остается неизменным. Восстановление механизма многопартийного сотрудничества - важный шаг в управлении страной." Ожидается, что такое сотрудничество вновь обеспечит многогранные перспективы для принятия решений.\n\nКроме того, эксперты отмечают, что предложения и надзорные функции консультативных сторон уже продемонстрировали положительный эффект на практике. Некоторые наблюдатели рассматривают это изменение как новый сигнал о корректировке политического ландшафта Китая."
 china.175.a: "Едины в написании новой главы."
 china.176.t: "Внеочередные выборы"
 china.176.d: "В условиях сложной международной обстановки правительство объявило о проведении внеочередных общенациональных выборов. Выборы охватывают административные районы на уровне уездов и выше, включая пилотные выборы на уровне волостей и низовых районов.\n\nВ выборах используется дифференцированная система голосования, в которой участвуют кандидаты из разных слоев населения. Помимо членов КПК, среди кандидатов есть представители консультативных партий, независимые кандидаты, вернувшиеся предприниматели и известные ученые. Избиратели могут участвовать в выборах с помощью электронных систем голосования или традиционных бумажных бюллетеней. Центральная группа по руководству выборами подчеркнула важность обеспечения прозрачности и открытости избирательных процедур.\n\nНа этих выборах впервые вводится независимая система контроля за голосованием, представители консультативных партий осуществляют всесторонний надзор за процессом, чтобы гарантировать честность и справедливость. На протяжении всех выборов консультативные партии демонстрировали беспрецедентную активность. По мнению наблюдателей, это может кардинально изменить политическую экосистему Китая."
 china.176.a: "Ветры перемен?.."
 china.177.t: "РКГ занимает второе место"
 china.177.d: "Центральная группа по руководству выборами недавно объявила последние результаты распределения мест, согласно которым РКГ стала второй по величине политической партией после Коммунистической партии Китая. Теперь РКГ занимает более 15 % мест во Всекитайском собрании народных представителей, что почти на 10 процентных пунктов больше, чем в предыдущий срок. Между тем, другие консультативные партии также в разной степени увеличили свое представительство.\n\nНа пресс-конференции лидер РКГ заявил, что они будут продолжать придерживаться принципа "долгосрочного сосуществования и взаимного контроля", выполняя свою роль в политическом участии и консультациях. Политологи полагают, что усиление РКГ отражает изменения в политической экосистеме Китая и демонстрирует поддержку правящей партией диверсифицированного политического участия."
 china.177.a: "Это мой Гоминьдан!"
 china.178.t: "ДЛК занимает второе место"
 china.178.d: "Последние данные Центральной группы лидеров по выборам свидетельствуют о том, что ДЛК успешно стала второй по величине партией Китая, получив 12% мест во Всекитайском собрании народных представителей, что является значительным признаком растущего влияния организации. Членство в ДЛК становится все более разнообразным, теперь в нее входят ученые, преподаватели и профессиональные технические специалисты со всей страны.\n\nНа пресс-конференции лидер ДЛК подчеркнул, что партия продолжает играть роль мозгового центра, активно участвуя в разработке национальной политики и контроле. Он подчеркнул приверженность ДЛК содействию социальной гармонии, экономическому развитию, реформам в сфере образования и технологического сектора. Политические обозреватели отмечают, что появление ДЛК отражает продолжающуюся эволюцию политической экосистемы Китая и демонстрирует решимость правящей партии продвигать реформы политической системы.\n\nЭта трансформация сигнализирует о вступлении китайской системы многопартийного сотрудничества в новую эру."
 china.178.a: "Великий день для Китая."
 china.179.t: "Ван Ян посещает Гуандун"
 china.179.d: "Гуандун...\n\nРегион, в котором началась карьера многих молодых политиков, где они проявили себя как умелые управленцы и талантливые политики. Среди них был и Ван Ян. С 2007 по 2012 год он был секретарем региональной коммунистической партии. Он провел Гуандун через самые трудные времена финансового кризиса 2008 года, он был рядом с ним в самые яркие моменты экономического и финансового бума.\n\nВан Ян смотрел на Гуанчжоу - город-мастерскую мира, который обеспечивал миллиарды людей на планете необходимыми и доступными потребительскими товарами. Здесь он ясно видел, что Гуандун стал оплотом его реформ. Здесь люди были наиболее преданы идеям либерализации и демократизации, возрождения за счет избавления от худших элементов китайского государства и заимствования лучшего у других стран. Возможно, с такими людьми Китай сможет достичь процветания, о котором всегда мечтал?"
 china.179.a: "Мы всего в нескольких шагах."
 china.180.t: "Нерешёная Проблема"
 china.180.d: "С момента ухода Си Цзиньпина Ван Ян день и ночь работал над тем, чтобы залечить национальные раны, восстановить силу и имидж страны, вернуть народу веру и гордость за страну. И все же, сколько бы реформ ни было проведено, от скольких бы коррумпированных чиновников ни избавились, оставалась одна нерешенная проблема, которая как нож вонзалась в сердце каждого гражданина.\n\nЭта проблема лежала по ту сторону Тайваньского пролива.\n\nОб этом никогда открыто не говорили ни Ван Ян, ни другие его союзники-политики, но все знали: при всех разговорах о реформах, открытости и всемирном сотрудничестве однажды китайским морпехам придется вновь собраться в Фуцзяни и попробовать снова. Не потому, что мы хотим войны, а потому, что Китай не может оставаться разделенным.\n\nСегодня вечером в Фучжоу Ван Ян снова и снова размышлял об этом, вспоминая уже достигнутое и оценивая все возможные варианты. Однако одна мысль была ясна: время действовать наступит скоро."
 china.180.a: "Мы сделаем то, что должны сделать."
 china.181.t: "ДОКЛАД О ХОДЕ МОРСКИХ УЧЕНИЙ"
 china.181.d: "ОТ: Адмирала Ли Юдзие\nДАТА:[GetDateText]\n\nТоварищ Ван,\nКак вы и приказали, наши морские силы покинули места постоянной дислокации и направились в морской сектор между Японией и Тайванем для совершения миссии по патрулированию и отработке стрельб, которая начнётся примерно через две недели. Маннёвры уже в некотором смысле обрели успех: ОДТО не смогла обнаружить наши движения, только сейчас они в панике собирают силы, чтобы выдвинуть их в ответ нашим."
 china.181.a: "Поставим их на место."
 china.182.t: "ДОКЛАД О СИТУАЦИИ В КОРЕЕ"
 china.182.d: "ОТ: Командующего Сухопутными Войсками КНР Ли Цяомина\nДАТА:[GetDateText]\n\nТоварищ Ван,\n Наши коллеги из Корейской Народной Армии предупредили нас о скрытых операциях ОДТО по доставке военных припасов в Южную Корею, а также о значительно возросшей военной активности последней вблизи Демилитаризованной зоны. В ответ КНДР мобилизовала свои войска, с нашей стороны также идёт усиление Китайско-Корейской границы."
 china.182.a: "Внимательно следите за ними..."
 china.183.t: "ДОКЛАД О ТЕКУЩЕЙ СИТУАЦИИ"
 china.183.d: "ОТ: Заместителя председателя Центрального военного совета КНР Чжана Юся\nДАТА:[GetDateText]\n\nТоварищ Ван,\nМенее часа назад Военно-Морские силы ОДТО атаковали наши корабли вблизи Окинавы, не оставляя нам выбора, кроме как открыть ответный огонь. Пока в Восточно-Китайском море разворачивалась морская битва, мы получили сообщения о том, что южнокорейские войска начали брать под контроль зону на границе с КНДР. Можно с уверенностью сказать, что ОДТО разворачивает полномасштабную военную операцию против Китайской Народной Республики и её союзников."
 china.183.a: "Ответить в полной мере немедленно!"
 china.184.t: "Что Теперь?"
 china.184.d: ""
 china.184.a: "Наконец, осядет пыль."
 china.184.b: "Наконец, осядет пыль?"
 china.185.t: "Малые Партии Требуют Выборов"
 china.185.d: "На недавнем внеочередном съезде Всекитайского собрания народных представителей лидеры малых партий сначала обратились к Ван Яну, а затем выступили с совместным заявлением о текущей ситуации в Китае. Несмотря на то, что позиции партий часто расходятся довольно радикально, на этот раз они отложили их в сторону, чтобы сказать одну фразу для Коммунистической партии и народа:\n"Цветок реформаторства Ван Яна расцвел. Китайской Народной Республике нужен новый раунд общенациональных многопартийных выборов."\n\nЭто заявление вызвало столько же энтузиазма, сколько и шока. Хотя в китайском обществе теперь царили открытость, равенство и свобода, многие все же восприняли этот шаг как ультиматум Ван Яну. Однако Ван Ян знал, что страна рано или поздно придет к этому моменту, и не терял головы. Когда партия попросила его дать указания, он ответил..."
 china.185.a: "Демократия была нашим обещанием."
 china.185.b: "Терпим, карлики."
 china.186.t: "Выборы!"
 china.186.d: "После долгих обсуждений в СМИ и дебатов во Всекитайском собрании народных представителей наконец-то была объявлена дата выборов. Когда этот день наступил, сотни миллионов избирателей пришли в движение, чтобы отдать свой голос во имя будущего Китая.\n\nВ последние годы политическая сфера Китая пережила множество потрясений. Однако победитель мог быть только один, тот, кто, наконец, получит полное доверие народа и возглавит страну.\nПоэтому, к всеобщему удивлению..."
 china.186.a: "КПК с лёгкостью выигрывает, как и всегда!"
 china.186.b: "Левый Гоминьдан пересилил КПК!"
 china.186.c: "Демократическая Лига Китая берёт большинство!"
 china.187.t: "Конец Ван Яна"
 china.187.d: ""Он подвел партию, а значит, и народ Китая..."\n"Он вел себя как неуравновешенный психопат, возомнивший себя способным..."\n"За свою полную некомпетентность и провал..."\n\nВан Ян присутствовал на чрезвычайном съезде КПК, но почти каждое слово проходило мимо него. Его пустой взгляд был направлен на одно из мест, где стена столкнулась с потолком.\n\n"Что могло пойти не так? После всего, что было сказано и сделано, народ Китая все еще не выбрал коммунистическую партию. И все же, если посмотреть с другой стороны... теперь у них хватило смелости сделать это. Но тогда... неужели мы действительно не достигли своих целей? Тогда почему мне делают замечание?"\n\nК сожалению, никто не мог прочесть его мысли. Дело было в том, что Коммунистическая партия Китая впервые за десятилетия потеряет власть в стране, а с потерей власти теряются инструменты и ресурсы, которые были нужны стольким уважаемым людям и ради которых они вступали в партию.\n\nВ конце концов, решение съезда было озвучено докладчиком:\n\n"...исключить гражданина Вана из состава Политбюро."
 china.187.a: "Теперь партия в надёжных руках."
 china.187.b: "Теперь партия в лучших руках."
 china.188.t: "Инаугрурация РК Гоминьдана"
 china.188.d: "Двери открылись, и делегация Революционного комитета Гоминьдана предстала перед солнцем. Сотни репортеров окружили здание съезда, а вдали виднелась невообразимая толпа. Не протестующие, не плачущие и не жалующиеся, а радостно приветствующие нового главу страны.\n\nЧжэн Цзяньбан подошел к камерам и начал отвечать на вопросы.\nПовторяя пункты программы своей партии.\nДавая новые обещания.\n\nИстинно, вся страна смотрела и ревела. Коммунистическая партия Китая уже давно не является единственной властью в Китае, но с сегодняшнего дня она перестала быть доминирующей.\n\nХотя трудно сказать без иронии, что Гоминьдан уже когда-то был правящей силой, так что кто знает? Может быть, КПК тоже вернется. Но пока что старая "династия" заканчивается, и на смену ей приходит новая."
 china.188.a: "Так замыкается круг."
 china.189.t: "Инаугурация ДЛК"
 china.189.d: "Двери открылись, и делегация Демократической Лиги Китая предстала перед солнцем. Сотни репортеров окружили здание Конгресса, а вдалеке виднелась невообразимая толпа. Не протестующие, не плачущие и не жалующиеся, а приветствующие нового главу страны.\n\nДин Чжунли подошел к камерам и начал отвечать на вопросы.\nПовторяя пункты программы своей партии.\nДавая новые обещания.\n\nИстинно, вся страна смотрела и ревела. Коммунистическая партия Китая уже давно не является единственной властью в Китае, но с сегодняшнего дня она перестала быть доминирующей.\n\nПо мере того как всходило солнце, решения Ван Яна начали отражаться на китайской земле. Возможно, когда-нибудь КПК вернется. Но пока что старая "династия" заканчивается, и на смену ей приходит новая."
 china.189.a: "Китай ждёт что-то новое."
 china.190.t: "Конец Весны"
 china.190.d: "После короткого периода обсуждений в СМИ и дебатов во Всекитайском собрании народных представителей дело об ультиматуме малых партий было закрыто. Слово "выборы" исчезло из государственных СМИ, а десятки демонстраций в крупнейших городах Китая были встречены кипятком, дымом и мигалками.\n\nВ итоге все разговоры о демократии, социальных лифтах и свободе оказались лишь прикрытием для олигархии, возникшей сразу после прихода к власти Ван Яна. Десятки тысяч его ставленников, коллаборационистов и просто коррумпированных чиновников теперь работали на укрепление нынешнего положения Китая.\n\nТеперь, когда корпорации нашли подходящее место, где им было наиболее комфортно, они не оставляли шансов ни КПК, ни Ван Яну, поскольку теперь, когда экономика и финансы были в их руках, они становились лишь картонными вырезками для их программ по установлению контроля над остальным Китаем.\n\nНарод Китая по-прежнему пользовался гораздо большими свободами и возможностями, чем раньше - только до тех пор, пока не достигнет определенного уровня. Запомнится ли Ван Ян как освободитель или будет проклят историей за свою нерешительность в завершении дела?\n\nПожалуй, только время покажет."
 china.190.a: "На все вопросы не будет ответа."
 china.191.t: "Новая Сессия КПК"
 china.191.d: "Пока Ван Ян поправлял свой блестящий галстук, в его голове роились оптимистичные мысли. Спустя столько времени реформа партии была завершена. Она стала сборником всевозможных идей, высказанных народом Китая. Ни разу в истории Китай не видел столько цветов, распустившихся одновременно.\n\nПосле некоторой подготовки Ван Ян наконец вошел в зал съезда, сопровождаемый громом аплодисментов тысяч делегатов.Сегодня каждая платформа выступит перед съездом со своей программой, и голосование решит, кто из них будет руководить Народной Республикой в ближайшие годы.\n\nНыне, когда несколько судьбоносных дней завершились, Ван Ян был готов объявить их итоги:"
 china.191.a: "Не будем чинить то, что и так работает."
 china.191.b: "Левая Социальная Платформа побеждает."
 china.191.c: "Правая Социальная Платформа выигрывает."
 china.191.e: "Предпринимательская Платформа выглядит лучше других."
 china.191.f: "Крыло Реформистов одерживает верх."
 china.192.t: "Весенний Бриз"
 china.192.d: "После дождя в воздухе Шанхая все еще висела легкая прохлада, но оживленная сцена вдоль реки Хуанпу была такой же яркой, как всегда. Ван Ян стоял на вершине Шанхайской башни и смотрел вниз на бесконечные потоки транспорта и ряды высотных зданий, которые символизировали жизнеспособность города. За десятилетия работы в политике он пережил бесчисленные бури и стал свидетелем бесконечных приливов и отливов перемен, но в этот момент он испытывал небывалое чувство легкости.\n\nПо сравнению с прошлым, внутренняя атмосфера становилась все более открытой. На онлайн-платформах молодые люди свободно высказывали свое мнение, на улицах и в переулках обычные граждане обсуждали текущие дела и политику, не опасаясь, что такие разговоры могут привлечь нежелательное внимание властей. Казалось, что даже внутри системы прозрачность растет. Поговаривали, что некоторые чиновники начали взаимодействовать с общественностью более открыто и прозрачно. В некоторых регионах местные органы власти даже осваивают более глубокие демократические механизмы принятия решений. Теперь власть больше не была игрушкой немногих, а действовала под солнечным светом, подвергаясь общественному контролю.\n\nДля Ван Яна, возможно, китайская демократия наконец-то увидела свою первую весну."
 china.192.a: "Весенние ветра возвращают жизнь к берегам Цзяннаня."
 china.193.t: ""У Меня Есть Мечта""
 china.193.d: "Ван Ян отложил документы в руке и потер уставшие глаза. Снаружи щебет птиц контрастировал с далеким гулом города, словно они принадлежали двум разным мирам. Он встал и подошел к окну, глядя на раскинувшуюся перед ним древнюю столицу.\n\nНедавно деспотизм был невидимыми оковами, сковывающими мысли и действия людей. Но теперь эта старая, разлагающаяся система достигла своего конца, как старик на закате жизни, неспособный приспособиться к новой эпохе. Однако консерваторы, стоящие у власти, отчаянно цеплялись за старый порядок, сопротивляясь волне реформ. Они стремились подавить импульс перемен, прежде чем они успеют укорениться. Но в конце концов народ выбрал свободу. Теперь, наконец, у них появился шанс осуществить свои давние мечты.\n\nОн вернулся к своему столу, его взгляд упал на кипу документов - планы политической реформы. Он знал, что, как только это предложение будет выдвинуто, оно вызовет большой переполох. Но Ван Ян также понимал, что путь к реформам никогда не будет гладким. Чтобы действительно привести Китай к демократии и верховенству закона, необходимо преодолеть этот высокий барьер. Он взял в руки ручку и торжественно подписал свое имя на документе."
 china.193.a: "Пора впустить новую птицу."
 china.194.t: "Свобода Совести"
 china.194.d: "Цакси Цирен проделал весь путь из своего родного города Шигацзе не только для того, чтобы завершить паломничество, но и чтобы увидеть изменения в монастыре Сера. Еще в деревне Паджонг до него доходили слухи о тонких изменениях в религиозной политике правительства. Он был настроен скептически - ведь он вырос, слушая рассказы старших о тяготах старого Тибета, и был свидетелем значительных перемен в родном городе под руководством партии. В глубине души он все еще верил в партию и правительство.\n\nПоднимаясь по каменной тропинке, он заметил нечто необычное, когда дошел до ворот монастыря - лозунги, которые раньше были вывешены в зелени, исчезли. Неужели слухи оказались правдой? Он ускорил шаг и вошел в монастырь. Монахи по-прежнему носили свои малиновые одеяния, статуи Будды продолжали взирать на заснеженные горы - все казалось неизменным. Но тут он увидел, как монахи снимают со стен лозунг "Объединяйтесь вокруг Коммунистической партии Китая". Подойдя к пожилому монаху, греющемуся на солнце, он почтительно поздоровался с ним и спросил: "Старый Аба, почему эти лозунги снимают?"\n\nМонах улыбнулся. "Возможно, ты этого не знаешь, но политика изменилась. Партия говорит, что теперь она больше уважает наши убеждения. Старая обязательная политика корректируется в соответствии с нашими потребностями, и мы можем свободно выражать свои взгляды. Думаю, пройдет немного времени, и Партия совсем перестанет нас ограничивать.""
 china.194.a: "Мир - это иллюзия; не вини, не таи зла."
 china.195.t: "Тур Ван Яна"
 china.195.d: "Никто точно не знает, когда северо-запад Китая стал считаться оплотом консерватизма. Как будто на этой земле, где переплетаются лёсс и пустыня, семена демократии никогда не смогут пустить корни, а смещающиеся пески похоронят любую надежду на перемены. В Цинхае он увидел, что пастухи больше не молчат, а смело выходят вперед, чтобы откровенно высказать свое мнение о сильных и слабых сторонах политики. В Ганьсу он видел, как фермеры освобождаются от прежних ограничений и активно участвуют в местных выборах на низовом уровне.В Синьцзяне он увидел, что религиозные права мусульман полностью защищены, а тени прошлого сметены.\n\nЛёсс остается тяжелым и холодным, пустыня - бесплодной и безлюдной, но надежда, погребенная глубоко под песками, в конце концов расцветет."
 china.195.a: "Солнце взойдёт вновь."
 china.196.t: "Долгий Путь Впереди"
 china.196.d: "Была глубокая ночь, но огни зала Сихуа в Чжуннаньхае все еще светились сквозь оконную решетку, отбрасывая тени на древнее крабовое дерево во дворе. Ван Ян сидел под деревом, держа в руках раскрытый экземпляр книги "Старый режим и революция", но его взгляд блуждал по страницам, не фокусируясь на них. Он только что закончил рабочий день, обрабатывая кипы документов, но усталость в его теле не могла подавить всплеск мыслей в его голове.\n\n"Свобода", это слово горело в его сердце как пламя на протяжении всей его жизни. Теперь он и его соратники-реформаторы наконец разорвали тысячелетний круг авторитарного правления, посеяв семена свободы на этой земле, израненной историческими приливами. Факел демократии вновь зажжен и ярко пылает в сердцах каждого гражданина. Однако Ван Ян знал, что это лишь кратковременная победа: впереди долгий и трудный путь. Им придется преодолеть бесчисленные препятствия, пересечь горы и моря и разрушить цепи старого режима. Только тогда семена свободы смогут пустить корни в сердцах людей и расцвести в каждом уголке общества.\n\nПуть вперед остается коварным, но история идет вперед. Каждая душа, отважившаяся бросить вызов старому порядку, была сияющей звездой на этом долгом пути. Однажды Китай демократии и свободы прорвет свой кокон и восстанет, возродившись из пламени."
 china.196.a: "Зацвёл цветок свободы."
 china.197.t: "Критика Либералов"
 china.197.d: "Отечественный онлайн отчет по общественному мнению и социальному анализу\n\nДата: УДАЛЕНО\n\nВ последнее время либеральные СМИ открыто критикуют ряд правительственных мер в своих публикациях и на собственных медиа-платформах. В этом отчете собрано основное содержание этой критики. Подробный анализ и дополнительную информацию см. в Приложении № 106.\n\n"За нарративом 'равенства' партии скрывается присущий ей авторитарный парадокс. Она заимствует либеральную концепцию всеобщего равенства, но на практике устанавливает крайне авторитарную социальную структуру.Партия определяет 'народ' как простого субъекта повиновения, лишая его возможности участвовать в общественных делах. Тем временем партия централизует распределение привилегий и контроль над властью в руках немногих, тем самым достигая монопольного владения ресурсами и политической властью..."\n\n"В экономической сфере государственный контроль над ресурсами якобы призван предотвратить чрезмерную концентрацию капитала и эксплуатацию. Однако на практике он подавляет рыночное развитие в условиях институциональных ограничений, превращая так называемую 'экономическую линию жизни' в частную собственность для избранных, лишая частный капитал свободы развития."\n\n"В экономической сфере контроль государства над ресурсами якобы призван предотвратить чрезмерную концентрацию капитала и эксплуатацию. Однако на практике оно сдерживает рыночное развитие в условиях институциональных ограничений, превращая так называемый 'экономический спасательный круг' в частную собственность для избранных, лишая частный капитал свободы развития.""
 china.197.a: "Ну и ладно."
 china.198.t: "Критика Националистов"
 china.198.d: "Бюллетень Анализа общественного мнения\n\nВ последнее время в Интернете появилось несколько неофициальных медиа-платформ, претендующих на пропаганду "патриотизма". Многие из них публикуют материалы, напрямую критикующие текущую политику правительства. В этом отчете собрана полная документация и архив соответствующих видеоматериалов.\n\n"Наша страна движется по опасному пути - пути разрушения, к которому ведет нас Ван Ян! Но многие люди ослеплены и не видят, что мы катимся в пропасть! Действия Ван Яна до жути напоминают действия Горбачева - он пытается превратить нашу страну в еще один Советский Союз, чтобы китайскую нацию постигла та же участь падения и вымирания!"\n\n"Давайте откроем глаза и увидим истинное лицо Ван Яна! Он стремится заменить руководство нашей партии упадническими идеологиями Запада; он позволяет антикитайским западным силам свободно нападать и клеветать на нашу страну и наш народ! Каждая так называемая 'реформа', которую он проводит, - это еще один удар в сердце китайской нации!"\n\n"Реформы Вана - это не что иное, как 'горбачевские' реформы! Он передает государственные активы частному капиталу, обогащая небольшое меньшинство, а народ загоняет в нищету! Он хочет разрушить основы социалистической экономики и превратить нашу страну в капиталистическую колонию! Каждая из его 'реформ' - это предательство социализма и предательство нашей страны!""
 china.198.a: "Примем к сведению."
 china.199.t: "Критика Левых"
 china.199.d: "Ежедневный Анализ общественного мнения\n\nВ последнее время соответствующие ведомства отмечают всплеск активности на отечественных левых форумах, причем большинство статей резко критикуют политику правительства. Эти статьи были всесторонне задокументированы и заархивированы в данном отчете. Подробное содержание см. в документе B-31a.\n\n"Самая большая ошибка ревизионистской группы Ван Яна - это предательство основных принципов классовой борьбы по мысли Мао Цзэдуна. Председатель Мао однажды заявил: 'Фундаментальными противоречиями в социалистическом обществе остаются противоречия между производственными отношениями и производительными силами, между надстройкой и экономическим базисом.' Однако группа Вана пытается отрицать существование этого фундаментального противоречия, пытаясь теоретически оправдать свою капиталистическую программу..."\n\n"На практике группа Вана провела ряд капиталистических политик, которые принесли большие бедствия социалистическому делу Китая. Они допустили бесконтрольную экспансию капитала, ослабив контроль государства над экономикой, и снова столкнули массы в пучину эксплуатации и угнетения, в то время как горстка капиталистов пожинает огромные экономические плоды, превращаясь в новый правящий класс...""
 china.199.a: "ОК."


 china.201.t: "Волны Катастрофы"
 china.201.d: "Катастрофические последствия Второй американской гражданской войны выходят далеко за рамки мрачной реальности, когда 300 миллионов человек взялись за оружие друг против друга. Крах мирового финансового центра, который на протяжении почти полувека был убежищем для элиты и местом рождения первоклассных инноваций, серьезно подорвал основы глобального экономического порядка. Больше всего пострадал Китай - вторая по величине экономика мира, признанная "фабрика мира", а также крупнейший держатель долговых обязательств США.\n\nКогда появились первые признаки распада Америки и началась паника, массовый отток населения и богатства поначалу обеспечил кратковременное преимущество ее конкурентам, в частности Китаю и Европейскому союзу. Китай был уверен, что его тщательно разработанная система "двойного обращения" окажется достаточно устойчивой, чтобы выдержать удар. Однако обвал доллара привел к быстрому обесцениванию активов, которыми владели граждане, уничтожив сбережения бесчисленных семей. Фондовый рынок, и без того вялый после пандемии Ковид-19, упал еще больше, преодолев критическую отметку в 3000 пунктов, а государственное вмешательство оказалось неэффективным. Экспортная промышленность, лишившись крупнейшего рынка сбыта, впала в отчаяние, в то время как рынки Азии, Африки и Европы также впали в рецессию, не оставив никаких альтернатив. Среди иностранных предприятий началась паника, а внезапно возникшая политическая напряженность и социальные конфликты подорвали их доверие к стране, которую когда-то называли""самой стабильной экономикой в мире."\n\nВ очередной раз китайское правительство и его народ с горечью осознали, что процветание и преимущества, полученные после интеграции в долларовый мировой рынок 40 лет назад, достались им дорогой ценой."
 china.201.a: "Что же можно сделать? Деньги не могут вернуть время."
 china.202.t: "Заваривая Катастрофу"
 china.202.d: "Шесть десятилетий наследия превратились в пыль, а десять лет упорного труда растворились в воздухе. Для 1,4 миллиарда китайцев будущее никогда не представлялось таким мрачным, как сегодня. Однако даже в глубине отчаяния эта страна никогда не отчаявалась, когда сталкивалась с чем-то еще более безнадежным.\n\nОбраз побежденных остатков НОАК, терпящих полное унижение на острове Тайвань, оставил неизгладимый след в психике каждого китайского гражданина. Этот психологический удар поверг общество в состояние разочарования и неуверенности в себе. Кроме того, после заключения перемирия нет никаких признаков облегчения экономической блокады Пекина. Санкции действуют как тяжелые цепи, их неизбежная хватка заставляет экономику Китая резко падать с позиции крупнейшей экономики мира после краха Америки. ВВП на душу населения регрессировал более чем на двадцать лет. Поражение в Тайваньском проливе еще больше разрушило и без того застойный экономический цикл, быстро истощив ресурсы и запасы богатства страны.\n\nНа данный момент кризис, с которым столкнулись китайское правительство и его народ, уже не сводится к конфликтам в сфере распределения или волнам безработицы, вызванным крахом нескольких предприятий. Речь идет о полномасштабном параличе и упадке. В результате начался обратный отсчет времени до краха режима - реальность, которую с болью осознают все."
 china.202.a: "За гранью искупления..."
 #CEN EVENTS
 china.203.t: "Сокращение Военных Расходов"
 china.203.d: "После успешного разрешения тайваньского конфликта мы столкнулись с финансовыми проблемами, связанными с военными расходами.\n\nВ свете нагрузки, которую война оказала на нашу экономику, мы решили, что наш нынешний военный бюджет является чрезмерным для нынешних условий. Чтобы решить эту проблему, мы провели сокращение бюджета, а также сократили призыв в армию в некоторых регионах и расформировали лишние военные бригады."
 china.203.a: "Не похоже, что ОДТО представляет угрозу."
 china.204.t: "Небольшие Изменения Правительства"
 china.204.d: "После победоносного завершения Тайваньского конфликта мы столкнулись с определенными проблемами, обусловленными существующей системой государственного управления.\n\nНаше новое геополитическое положение высветило недостатки нашей нынешней системы управления. В ответ на это мы решили приступить к давно откладываемому плану реструктуризации правительства, чтобы решить эти проблемы. Наиболее заметными изменениями стали отставка бывшего премьера Госсовета Ли Кэцяна и директора Центрального управления иностранных дел Ян Цзечи."
 china.204.a: "Небольшие перемены никому не повредят."
 china.205.t: "Парад Победы"
 china.205.d: "Повсюду видны красные флаги и плакаты, придающие Пекину праздничную атмосферу. В честь великой победы в Тайваньской войне в столице было решено провести фестиваль. В эти дни люди в военной форме стали самыми популярными в городе.\n\nВ день празднования во главе парада шли герои войны с почетными военными знаменами, в том числе первый морской пехотинец, высадившийся на остров Тайвань, и солдат, установивший национальный флаг на вершине Тайбэя 101. Си помахал солдатам с улыбкой на лице, а солдаты спонтанно закричали "Да здравствует президент Си!"", когда они проходили через площадь Тяньаньмэнь.\n\nПарад продолжался с дневного времени до позднего вечера. После него состоялся бал и концерт под открытым небом. Парад гражданских лиц прошел по улицам Пекина. Миллиарды людей по всему миру смотрели трансляцию, и многие восприняли ее как конец старой эпохи."
 china.205.a: "Да здравствует китайский народ!"
 china.206.t: "Тайвань Остается под Контролем Военных"
 china.206.d: "После победы в Тайваньской войне мы успешно установили полный контроль над Тайванем. Однако достижение нашей оперативной цели повлекло за собой множество проблем, связанных с вновь приобретенной территорией. Такие проблемы, как сопротивление местного населения, повсеместная коррупция и бюрократические препоны, привели к тому, что мы решили установить военный контроль над островом в обозримом будущем. \n\nХотя этот шаг может не найти единодушной поддержки в нашем правительстве и среди наших граждан, на данный момент он является наиболее разумным вариантом действий. Наша первоочередная задача - установить твердый контроль и обеспечить стабильность на острове, прежде чем приступать к процессу его реинтеграции в состав нашей страны."
 china.206.a: "Это Временно."
 china.207.t: "Одна Страна, Две Системы"
 china.207.d: "Почти 50 лет назад Дэн Сяопин, верховный лидер Китая, выдвинул новаторскую идею "Одна страна - две системы" для Гонконга после воссоединения. По сути, в то время как в материковом Китае сохранялась социалистическая структура, Гонконг мог продолжать жить в условиях рыночной экономики и капиталистического образа жизни.\n\nМы должны были восхищаться решительностью и креативностью Дэнга. Этот крошечный островной город продолжал создавать инвестиции и рабочие места в Китае. В то же время эта система хорошо сработала и для Макао, бывшей колониальной территории, отвоеванной у Португалии после 1999 года.\n\nНыне, когда Тайвань окончательно вернулся в состав Китая после 1949 года, мы будем уверять тех политиков и гражданских лиц, которые остались здесь из-за веры в КПК, что "Тайвань правит Тайванем" все еще возможно."
 china.207.a: "Мы искренне желаем процветания Тайваню!"
 china.208.t: "Первые Шаги"
 china.208.d: "Сегодня мы получили обнадеживающие новости. Недавние опросы, проведенные на Тайване с целью выяснить степень удовлетворенности населения нынешним правительством, свидетельствуют о значительном росте поддержки нашей администрации. Более того, Министерство государственной безопасности сообщило о снижении уровня сопротивления со стороны тайваньских повстанцев.\n\nЭти события подчеркивают успех наших усилий по реинтеграции и стабилизации. При дальнейшем развитии событий, подобных этим, полная реинтеграция представляется вполне достижимой в ближайшем будущем."
 china.208.a: "Наши братья скоро объединятся!"
 china.209.t: "Унификация Бюрократии"
 china.209.d: "Наши усилия по реформированию государственной структуры на Тайване сегодня достигли важной вехи. Последние сообщения свидетельствуют об успешной унификации бюрократических структур между материковым Китаем и Тайванем. \n\nАдминистраторы на острове подтвердили, что административные органы, больницы, полиция и другие ключевые сектора подверглись существенным реформам, чтобы в большей степени соответствовать бюрократической структуре материка."
 china.209.a: "Шаг к утопии."
 china.210.t: "Китайский Век"
 china.210.d: ""Товарищи, друзья, соотечественники!"\nСи никогда не должен был быть хорошим оратором. В последнее десятилетие ляпы Си в каждой речи неизменно вызывали волну ярости в Интернете, а новые слова, которые его секретари время от времени добавляли в скучные речи, часто не производили впечатления на людей, даже если их иногда оформляли в виде партийных лозунгов. Но в сегодняшней речи Си был уверен, что никто не захочет пропустить ни слова.\n"Сегодня мы проводим здесь военный парад, чтобы отметить возвращение Тайваня на родину и почтить эту веху в истории китайской нации." Си изо всех сил старался, чтобы его голос не был слишком пронзительным из-за нервозности. Он заметил, что аудитория под Тяньаньмэнь почти безмолвна.\n"Оглядываясь на историю, мы, китайцы, прошли через испытания и невзгоды, но мы никогда не отказывались от мечты о воссоединении и возрождении. С историей, катящейся вперед, никто не сможет остановить исторический прилив великого омоложения китайской нации!" Его голос стал бесстрастным. Вовремя подняв правый кулак, он указал на пятизвездочный красный флаг, развевающийся на площади. Си с удовлетворением увидел, что аплодисменты и одобрительные возгласы стихли. "Сегодня мы стоим на новой исторической точке отсчета и несем историческую миссию по осуществлению великой китайской мечты! Это неизбежность истории, победа народа и великая победа китайской нации!""
 china.210.a: "Речь, которая войдет в историю."
 china.211.t: "Китайский Патриотизм Новой Эры"
 china.211.d: "Мы успешно выполнили задачу по объединению Тайваня, но международная ситуация становится все более тяжелой. Мы также сталкиваемся с более серьезными внутренними проблемами, что делает необходимым более эффективное объединение китайского народа в различных классах и регионах. Идеологическая работа в новую эпоху не может быть решена простым выпуском лозунгов или фильмов. Она требует надежного руководства и детальных планов со стороны бюрократических институтов. В этом отношении ни одна организация не может работать лучше, чем КПК.\n\nЦентральная комиссия по руководству строительством духовной цивилизации, Центральный отдел пропаганды и Центральное бюро политических исследований представили на рассмотрение Постоянного комитета Политбюро различные планы. Более ортодоксальный подход заключается в том, чтобы продолжать развивать китайскую социалистическую теорию, продвигать китайскую версию "универсальных ценностей", основанную на 24 символах основных социалистических ценностей, и укреплять наши позиции как социалистического противостояния западному капитализму. Альтернативный, более радикальный подход предполагает, что, учитывая все более напряженные отношения между Китаем и азиатским неолиберальным лагерем во главе с Японией, единство китайской нации находится под угрозой. Этот подход предполагает подчеркивание националистического лозунга "защиты китайской нации", а также усиление пропаганды силы и процветания нашей страны, чтобы вселить в народ национальную гордость и энтузиазм."
 china.211.a: "Мы должны придерживаться марксизма-ленинизма."
 china.211.b: "Национализм объединяет подавляющее большинство людей."
 china.212.t: "Приближающееся Национальное Возрождение"
 china.212.d: "Политбюро утвердило и внедрило новые руководящие принципы идеологической работы.\n\nПропаганда партии все больше ориентируется на национализм. Пропаганда изображает современный Китай сравнимым с процветанием и мощью древних китайских империй, в частности династий Хань и Тан, называя его новым "золотым веком" в истории Китая. Все чаще упоминается и термин "национальное единство". Пятьдесят шесть этнических групп признаются частью "долгой истории китайской нации", вносящей свой вклад в "богатое культурное наследие". Однако, несмотря на лозунги о равенстве, средства массовой информации и культурные круги уделяют больше внимания этнической группе Хань. Исторические завоевательные войны ханьцев с другими этническими группами открыто рассматриваются как часть боевой традиции Китая.\n\nДалее была построена теория угрозы, направленная на воображаемых заморских врагов. Первая китайско-японская война, война сопротивления против Японии и Корейская война широко представлены как важнейшие элементы современной китайской революции. Исторические иностранные войны, такие как Имджинская война во времена династии Мин, также рассматриваются как предвестники холодной войны в западной части Тихого океана, подчеркивая постоянное намерение врагов уничтожить Китай. Разделение и антагонизм между Китаем и иностранными государствами становятся все более очевидными. Однако пропаганда постоянно изображает Китай, будь то в далеком прошлом или в ближайшем будущем, как окончательного и единственного победителя."
 china.212.a: "Амбиции Великой Нации."
 china.213.t: "Современная Идеологическая Революция"
 china.213.d: "Политбюро утвердило и внедрило новые руководящие принципы идеологической работы.\n\nПропагандистский аппарат партии стал более тесно связан с марксистскими принципами. Нынешняя пропаганда КНР часто сравнивает свои достижения с будущим коммунистическим обществом, которое представляли себе Маркс, Энгельс и другие мыслители, а также с пиком Советского Союза, и называет этот период новой "вехой" в коммунистическом развитии. Также часто используется термин "непрерывная самореволюция". Си лично подчеркивает это, заявляя, что Коммунистическая партия Китая будет продолжать вести Китай в качестве авангарда революции и развития. 24 символа основных социалистических ценностей теперь называются "общими ценностями сообщества с общим будущим для человечества"\n\nДалее строится нарратив угроз со стороны гипотетических иностранных врагов. Такие события, как интервенция союзников в Советскую Россию после Первой мировой войны, советско-германская война во время Второй мировой войны, японские репрессии против партизан Восьмой дорожной армии и американские "цветные революции" против стран Восточного блока во время холодной войны, рассматриваются как предвестники холодной войны в западной части Тихого океана, подчеркивая постоянное стремление империалистов уничтожить Китай.\n\nРазделение и антагонизм между Китаем и иностранными государствами становятся все более очевидными. Однако пропаганда постоянно изображает Китай, будь то в далеком прошлом или в ближайшем будущем, как окончательного и единственного победителя."
 china.213.a: "Социалистическая революция в 21 веке."
 china.214.t: "Великое Возрождение"
 china.214.d: "Великое омоложение китайской нации достигло захватывающего пика, и видение партии о возрождающемся Китае продвигается вперед с неудержимой силой. Десятилетия смелого руководства КПК вывели Китай с рассвета экономических реформ 1970-х годов на передовые позиции в области глобальных инноваций. Сейчас мы стоим на пороге новой эры, когда стремительный взлет Китая как доминирующей экономической и политической державы меняет мировой порядок. Историки скоро признают этот момент как окончательный разрыв с прошлым.\n\nПо мере того как мы продвигаемся вперед с непоколебимой решимостью, китайский народ следует по пути, освещенному дальновидным руководством партии. От победы над крайней бедностью до создания всеобъемлющей системы социального обеспечения и запуска амбициозной инициативы "Пояс и путь" - каждое монументальное достижение отражает несгибаемый дух нашего народа. Руководство партии остается сияющим маяком, поднимающим наш прогресс на новые высоты и обеспечивающим ускорение нашего пути преобразований с неустанной энергией и бодростью.\n\nВ этот захватывающий век, когда нынешние достижения Китая устанавливают новые стандарты для будущих триумфов, наша нация уверенно шагает в блестящее будущее, принимая обещание великолепного завтра с горячей решимостью и непоколебимой приверженностью."
 china.214.a: "Слава Партии и Народу!"
 china.215.t: "XXI съезд КПК"
 china.215.d: "Завершился 21-й Всекитайский съезд Коммунистической партии Китая. Со времени предыдущего съезда страна добилась больших успехов: был закреплен статус сверхдержавы, Тайвань возвращен под контроль, а враги-империалисты в процессе этого потерпели поражение. На фоне мирового хаоса в виде войн в Америке и Европе Китай остается островом стабильности и процветания.\n\nНесмотря на свой почтенный возраст, Си Цзиньпин был избран генеральным секретарем в 4-й раз. В своей речи он заявил, что продолжит взятый им в предыдущие годы курс на укрепление стабильности в постоянно меняющемся мире, и что ближайшие годы станут решающими в судьбе всего Китая.\n\n...\n\nС момента окончания съезда прошло некоторое время.\nСи и несколько высокопоставленных генералов и чиновников находились в зале.  Они бурно обсуждали что-то важное. Что-то, что должно было начать цепь событий, которые навсегда изменят мир.\nВ конце концов, на большом экране появилась карта Корейского полуострова."
 china.215.a: "Грядут великие дела."
 china.216.t: "Усиление активности ОДТО в Восточно-Китайском море"
 china.216.d: "В последнее время мы заметили подозрительный рост активности сил ОДТО в Восточно-Китайском море. Вражеские разведывательные беспилотники круглосуточно кружат над регионом, а их корабли и самолеты стали довольно часто пересекать наши морские и воздушные границы. В наших попытках противостоять этому противники просто прячутся, не собираясь вступать в бой. И хотя активность продолжает расти, до прямой военной конфронтации дело пока не дошло.\n\nУчитывая активную подготовку к Операции, это вызывает серьезные опасения, что некоторые наши планы известны странам-участницам ОДТО. На данный момент у нас нет другого выбора, кроме как пытаться сдерживать вторжения в наши морские и воздушные границы и следить за развитием ситуации."
 china.216.a: "Это тревожно... Но продолжайте готовиться к Операции."
 china.217.t: "Кибератака"
 china.217.d: "Утром еще один "Wing Loong" вылетел в море на задание по охране границы: небольшой японский корабль пересек нашу морскую границу. Это уже стало рутиной, процедура всегда проходила по одному и тому же сценарию. Вражеский корабль пересекал границу, наш радар обнаруживал его, беспилотник вылетал для наблюдения, и довольно быстро вражеский корабль покидал наши воды, часто беспилотники даже не успевали его заметить. Но сейчас что-то пошло не так, как обычно.\n\nСигнал с беспилотника был мгновенно потерян. Он не был сбит или подавлен средствами радиоэлектронной борьбы, наши радары по-прежнему фиксировали продолжение его полета.\n\nСпустя несколько минут одна за другой начали выходить из строя другие системы связи с дронами.\n\nЧерез несколько часов доступ к военным базам данных был уже потерян, наши лучшие военные IT-специалисты пытались спасти хоть что-нибудь. Все было очень плохо: все перестало работать. Такой мощной кибератаки на военную инфраструктуру еще не было во всем мире.\n\nОдно было ясно. Сейчас произойдет что-то ужасное. Что-то, чего мы не планировали."
 china.217.a: "Почему именно сейчас?! Сохраните хотя бы что-то!"
 china.218.t: "Морской Бой и Ракетный Обстрел"
 china.218.d: "Только восстановив часть инфраструктуры, поврежденной кибератакой, мы столкнулись с чем-то пугающим. Вновь активированные радары показали десятки кораблей ОДТО, которые пересекли нашу морскую границу и двигались в направлении Фучжоу.\n\nСилы НОАК выдвинулись навстречу вражеской флотилии, готовясь дать бой.  Было ясно, что на этот раз силы Тихоокеанского альянса настроены серьезно, и боя не избежать. В то же время во многих прибрежных городах раздавались многочисленные взрывы: это работала противовоздушная оборона, отражая ракетные атаки противника на наши военные базы.\n\nХотя прямое военное противостояние только начинается, ясно одно: большая война началась, и хотя мы хотели начать ее сами, нам это не удалось."
 china.218.a: "Ну, вот и все!"
 china.219.t: "Северная Корея готова присоединиться к ВАОИ"
 china.219.d: ""
 china.219.a: "Великолепно!"
 china.220.t: "Ким Чен Ын благополучно пересек границу с Китаем"
 china.220.d: ""
 china.220.a: "Великолепно"
 china.221.t: "Ким Чен Ын захвачен южнокорейскими войсками"
 china.221.d: ""
 china.221.a: "Дурак!"
 china.222.t: "Восстановление Ротации Кадров"
 china.222.d: "На днях в Пекине состоялось новое пленарное заседание Центрального комитета КПК. На нем присутствовали представители высшего эшелона партии, а Си, которому Политбюро поручило выступить с докладом на заседании. Помимо официального коммюнике, на пленарном заседании произошли долгожданные кадровые перестановки. На высшем уровне партийной структуры власти в состав Политбюро и Центрального секретариата были введены несколько молодых кадров. На более низких уровнях произошла более широкая ротация среди провинциальных партийных секретарей и руководителей министерств и комиссий Госсовета.\n\nВновь опубликованные резюме кадров отражают определенное разнообразие. Среди них есть партийные секретари, выдвинутые из низовых организаций, специалисты по управлению крупными государственными предприятиями, руководители высших учебных заведений и исследовательских организаций, и даже военные, отличившиеся в Тайваньской войне. По мнению CCTV News, это отражает "разнообразие пути отбора талантов в партии в новую эпоху". Кроме того, официальные СМИ освещали ротацию старших членов в уникальной китайской манере. На обычных собраниях, посвященных награждению, многие старшие кадры, которые на некоторое время исчезли из поля зрения общественности, вновь появились и получили приветствия от Центрального комитета в качестве "старших товарищей". Это говорит о том, что КПК начала менять свою централизованную модель, сосредоточившись на выращивании и отборе нового поколения основных сил партии."
 china.222.a: "Новые бутылки должны быть наполнены новым вином."
 china.223.t: "Золотистая курносая обезьяна, находится под угрозой исчезновения"
 china.223.d: "Исследователь: Доктор Ли Цзяцань\n\nСамец золотистой носатой обезьяны, лабораторный номер RX-743, прожил в неволе всего три года. Три года назад его нашли хрупким и едва выжившим на окраине загрязненного леса. Это был последний раз, когда мы наблюдали присутствие золотистых носатых обезьян в дикой природе.\n\nВыводы аутопсии:\nТело RX-743 было сильно истощено, а мех потускнел до тошнотворно желтого цвета. Глазные впадины были впалыми, а внутренние веки - ненормально бледными, что соответствует тяжелой анемии, от которой он страдал при жизни.\n\nВнутренний осмотр:\nЛегкие были заполнены черной слизью - результат длительного воздействия загрязненного воздуха. Легочная ткань была патологического серо-черного цвета и не обладала эластичностью.\n\nСердце было необычно маленьким, с заметно истонченными стенками желудочков, что свидетельствует о фиброзе миокарда - обычном последствии длительного воздействия высоких уровней загрязняющих веществ.\n\nЖелудок был почти пуст, содержал лишь небольшое количество черной, вязкой жидкости с тошнотворным запахом. Слизистая желудка была покрыта обширными язвами, а стенки кишечника испещрены геморрагическими пятнами - симптомы, свидетельствующие об отравлении тяжелыми металлами.\n\nВ организме RX-743 были обнаружены чрезвычайно высокие концентрации свинца, ртути, кадмия и других тяжелых металлов. Эти токсины со временем накапливались в его организме, что в конечном итоге привело к его смерти. Источником загрязнения тяжелыми металлами были промышленные сточные воды и выхлопы автомобилей."
 china.223.a: "Существо, покинутое миром."
 china.224.t: "Фермеры протестуют Против Ущерба Окружающей Среде"
 china.224.d: "Недавно в нашу газету поступили жалобы от населения на химический завод в уезде Луонин города Лоян провинции Хэнань, который сбрасывает сточные воды и сильно загрязняет окружающие сельскохозяйственные угодья. Жители деревни неоднократно сообщали об этом в соответствующие ведомства, но безрезультатно.\n\nНа месте происшествия ворота завода были наглухо закрыты, а у входа собрались сотни взволнованных жителей деревни. Они объяснили, что с момента начала работы фабрика выбрасывает едкий отработанный газ и сточные воды. После орошения их фермерских земель они ничего не собрали, и даже были случаи гибели скота.\n\nЖители деревни заявили, что неоднократно жаловались в местный департамент охраны окружающей среды, но проблема так и осталась нерешенной. "Эти сотрудники пришли, посмотрели, ничего не сказали и ушли", - возмутился один из жителей.\n\n"После расследования выяснилось, что у фабрики действительно были проблемы с экологией, и мы приказали ей устранить их в установленный срок", - заявил представитель Бюро по охране окружающей среды уезда Луонин. Однако он опроверг утверждения жителей деревни о бездействии, заявив: "Из-за исторических проблем требуется время, чтобы решить их должным образом."\n\nВ ходе расследования репортер обнаружил, что оборудование фабрики было примитивным и не соответствовало стандартам охраны окружающей среды. Кроме того, департамент охраны окружающей среды ранее уже наказывал фабрику, но штрафы были ограничены..."
 china.224.a: "Похоже, что продолжения не будет."
 china.225.t: "Китайский аллигатор вымер"
 china.225.d: "Печальные новости пришли из Аньхойского национального заповедника: сегодня рано утром последний дикий аллигатор Янцзы, известный как "Сяо Хэ", был объявлен мертвым, что ознаменовало полное исчезновение этого древнего вида в дикой природе.\n\nАллигатор Янцзы - один из самых маленьких видов крокодилов в мире и является уникальным для Китая. Когда-то он был широко распространен в среднем и нижнем течении реки Янцзы, но его популяция резко сократилась из-за потери среды обитания, загрязнения окружающей среды и чрезмерной охоты людей. К 1970-м годам численность диких аллигаторов Янцзы сократилась до менее чем 100 особей. Несмотря на усилия Китая по защите вида с помощью природоохранных проектов, включая создание заповедников и центров разведения, популяция восстанавливалась лишь постепенно. В течение последних пяти лет в дикой природе не наблюдалось естественного размножения, даже после того, как вид был переведен из разряда критически исчезающих.\n\nСмерть последнего дикого аллигатора Янцзы означает потерю его генетического фонда в естественной среде. Хотя ученые пытались искусственно осеменять животных, чтобы увеличить их численность, все попытки закончились неудачей."
 china.225.a: "Еще один древний вид исчез."
 china.226.t: "Мьянма желает присоединиться к ВАОИ"
 china.226.d: ""
 china.226.a: "Великолепно"
 china.227.t: "Народная Республика Новой Эры"
 china.227.d: "Китай с гордостью провел торжественную конференцию, на которой было объявлено о скором завершении реализации долгосрочных целей экономического и социального развития страны к 2035 году. Мероприятие, на котором присутствовали высшие должностные лица и международные делегаты, включая председателя КНР Си Цзиньпина и тогдашнего генерального секретаря ООН, продемонстрировало замечательный прогресс Китая. Несмотря на жесткие санкции после войны на Тайване и влияние новой холодной войны в Восточной Азии на международную торговлю, Китай добился среднегодового роста ВВП на 5%, избавил от бедности более 800 миллионов человек и повысил уровень урбанизации до более чем 70%, что намного превзошло ожидания.\n\nВ своей программной речи президент Си подчеркнул основные достижения в области инфраструктуры, такие как расширение сети скоростных железных дорог до более чем 60 000 километров и прогресс в технологии 5G, которая теперь охватывает 90% населения. Кроме того, благодаря инновациям в области возобновляемых источников энергии Китай стал крупнейшим в мире производителем солнечной и ветровой энергии, что в значительной степени способствовало достижению целей углеродной нейтральности.\n\nЭта серия успехов создает основу для следующего этапа развития Китая. С амбициями стать мировым лидером в области искусственного интеллекта, аэрокосмической промышленности и "зеленой" энергетики, страна находится на пути к реализации своего видения - стать мировым лидером к 2049 году, к 100-летию Народной Республики."
 china.227.a: "Великие мечты могут быть реализованы только благодаря огромным усилиям."
 china.228.t: "Следующий Этап"
 china.228.d: "Благодаря неустанным усилиям нашей Народно-освободительной армии мы наконец-то добились победы в военных операциях против Тайваня. Это не только означает решение давних исторических проблем между двумя сторонами Тайваньского пролива, но и знаменует начало промышленной интеграции между ними. Начиная с Движения за самоукрепление династии Цин, поколение за поколением китайских промышленников стремилось к тому, чтобы промышленная мощь Китая заняла прочное место среди ведущих стран мира.\n\nС 1949 года мы построили полную промышленную цепочку. Мы прошли путь от времени, когда не могли произвести ни одного автомобиля, до сегодняшнего дня, когда мы не только удовлетворяем внутренний спрос, но и заполняем контейнеры с продукцией китайского производства по всему миру, особенно в тех западных странах, которые раньше казались недосягаемыми. Все эти достижения доказывают правильность пути социализма с китайской спецификой, в основе которого лежит КПК.\n\nКитай больше не является "больным человеком Восточной Азии", каким он был раньше. Мы можем с гордостью заявить: "Сделано в Китае" - наша гордость, а товары, произведенные в Китае, будут самыми конкурентоспособными в мире! Да здравствует несгибаемая китайская нация!"
 china.228.a: "С каждым поколением появляются новые таланты."
 china.229.t: "Новая Экономическая Структура"
 china.229.d: "Под нашим руководством мы успешно сократили нашу чрезмерную зависимость от международных рынков в прошлом, переключившись вместо этого на нашу обширную потребительскую базу и растущий внутренний спрос. Эти положительные факторы оживили внутренний потребительский рынок и придали мощный импульс экономическому росту страны.\n\nНесмотря на то, что начало Гражданской войны в Америке негативно сказалось на нашей экономике, усиление экономической активности в различных секторах постепенно компенсирует эти последствия за счет роста внутреннего спроса. Этот сдвиг также указывает на то, что наш потребительский рынок становится менее зависимым от внешних рынков, демонстрируя более независимое и устойчивое развитие.\n\nВ будущем наша страна будет постепенно развивать новую экономическую структуру, ориентированную на внутренний потребительский рынок, но при этом учитывающую международные рынки."
 china.229.a: "Экономика уверенно движется вперед."
 china.230.t: "Дон Чжун комментирует битву за Тайбэйский пролив"
 china.230.d: "Адмирал Дун Цзюнь ждал сигнала, чтобы выйти на сцену, в ожидании он перелистывал свои записи, перечитывал в голове строчки и старался замедлить сердцебиение. Ранее на этой неделе он узнал поразительную новость: флот КНР подошел к Тайпинскому проливу и вступил в бой с тайваньским флотом, в ходе которого тайваньская гордость была потоплена.\n\nПосле получения новостей он сразу понял, что в его кабинет придут правительственные чиновники с просьбой произнести речь, и когда они пришли, он сразу согласился. Теперь, когда его сердцебиение стало замедляться, и он в последний раз перечитал свои записи, он получил сигнал начать идти к микрофону. По мере того как он поднимался по лестнице, в его голове начали появляться все значимые события в его карьере. Все вело к этому моменту, и ему нужно было показать, как он гордится этим. Не только для себя, но и для всей страны.\n\nИ когда он сделал последние шаги к микрофону. Он начал свою речь."
 china.230.a: ""Сегодня это большая победа для КНР!""
 china.231.t: "Недовольство Иммигрантами"
 china.231.d: "С тех пор как в Китай с молчаливого согласия китайского правительства хлынули иммигранты из стран третьего мира и образовались иммигрантские анклавы (в частности, растущая африканская община в Гуанчжоу), конфликты между группами иммигрантов и местными жителями стали частым явлением. Культурные различия и различия в образе жизни серьезно повлияли на отношения между обеими сторонами.\n\nНесмотря на то, что мелкие конфликты продолжаются, крупных инцидентов до сих пор не произошло. Более того, из-за отсутствия четких указаний со стороны вышестоящих органов власти большинство низовых чиновников придерживаются бездейственного подхода к решению этих сложных проблем. Однако развитая сеть общественного мнения вызвала поток информации о группах иммигрантов, что привело к широкой критике правительства в социальных сетях.\n\nМеждународные наблюдатели считают, что если китайское правительство не сможет оперативно решить проблему все более напряженных отношений между местными жителями и иммигрантами, то вполне вероятно, что рост национализма нанесет значительный ущерб престижу партии."
 china.231.a: "Пришло время говорить по закону."
 china.232.t: "Новый Закон об Иммигрантах"
 china.232.d: "Несмотря на продолжающиеся общественные дебаты, китайское правительство придерживается осторожной позиции, делая мало официальных заявлений, как и в случае с аналогичными вопросами. Однако вскоре они предприняли практические шаги, которые привели к новому развитию ситуации.\n\nСтолкнувшись с растущим недовольством китайского населения по поводу растущего числа иммигрантов и их предполагаемого влияния на общество, правительство приняло новый строгий закон об иммиграции. Этот закон вводит строгие ограничения на въезд и проживание мигрантов, направленные на сокращение притока иностранных граждан и устранение растущего недовольства местного населения.\n\nНовые правила призваны ужесточить контроль над мигрантами, включая более тщательную проверку биографии и ограничение количества разрешений на работу. Этот шаг правительства рассматривается как прямой ответ на давление общественности, и ожидается, что он снимет часть недовольства. Однако он также может усилить напряженность в отношениях с международными наблюдателями и повлиять на отношения Китая с дружественными странами."
 china.232.a: "Какой Беспорядок."
 china.233.t: "Китайское Вторжение в Мьянму"
 china.233.d: "После победы Народных сил обороны в гражданской войне в Мьянме Китай начал военное вторжение в страну Юго-Восточной Азии. Пекин заявил, что вторжение произошло после постоянных набегов и вторжений на китайскую территорию во время и после гражданской войны. Однако многие эксперты по геополитике сходятся во мнении, что вторжение было предпринято для защиты стратегических интересов Китая в регионе.\nСсылаясь на необходимость защиты своих границ и обеспечения стабильности в регионе, китайские военные силы пересекли территорию Мьянмы, продвигаясь к ключевым стратегическим объектам. Внезапное вторжение вызвало шок во всем международном сообществе, вызвав опасения по поводу разрастания регионального конфликта и гуманитарного кризиса."
 china.233.a: "Азия продолжает погружаться в бесконечную войну."
 china.233.b: "Это было необходимое решение!"
 china.234.t: "Противостояние Индийской Агрессии"
 china.234.d: "Пока внимание всего мира приковано к Желтому, Восточно-Китайскому и Южно-Китайскому морям, внезапный пограничный конфликт поставил Китай и Индию, две самые густонаселенные страны мира, на грань войны.\n\nДве страны строят мосты и дороги, чтобы захватить стратегические позиции вдоль горной границы. В результате часто вспыхивали сражения, в которых солдаты использовали камни и палки в качестве оружия. Индийские войска часто имели численное преимущество в противостоянии, но теперь НОАК может быстро перебрасывать свои элитные войска из тыла на передовую через новую сеть автодорог в Тибете, совершая внезапные атаки на индийцев по ночам. Большое количество индийских солдат, включая их командиров, сбились с горных дорог и погибли во время отступления. В отличие от них, НОАК понесла лишь однозначные потери.\n\nПосле этого дипломаты обвинили друг друга в намерении в одностороннем порядке нарушить статус-кво, но обе стороны утверждали, что защищали свою территорию. Индийцы пригрозили отправить на передовую больше войск из-за понесенных потерь, но НОАК продемонстрировала свои успехи в горной войне и решимость защищать родину. Это может свидетельствовать об изменении баланса сил в пограничном споре между двумя странами."
 china.234.a: "Мы будем стойко защищать каждую пядь нашей родины."
 china.235.t: "Ответ Бутана"
 china.235.d: "После недолгого ожидания Бутан вызвал нашего посла и решил не присоединяться к Восточноазиатской оборонной инициативе. Отказ Бутана принять нашу руку помощи - это неожиданная неудача. Будучи небольшим, хотя и бедным и отсталым государством в Гималаях, его привилегированное географическое положение могло бы сыграть важную роль в нашей осадной сети против Индии. Такой исход весьма досаден, разочаровывает и ставит в неловкое положение наших дипломатов.\n\nВ Пекине националисты и милитаристы начали выступать за военную интервенцию против Бутана, чтобы заставить его осознать разницу в силе между двумя странами и тем самым заставить его изменить свое мнение. Однако Индия всегда рассматривала Бутан как свою традиционную сферу влияния, и вмешательство во внутренние дела Бутана может привести к дальнейшему ухудшению китайско-индийских отношений."
 china.235.a: "Как насчет того, чтобы отправиться в поход?"
 china.236.t: "Блокада Торговых Путей"
 china.236.d: "Несмотря на подготовку, негативные прогнозы, сделанные перед войной, стали тревожной реальностью. Десятки торговых санкций практически лишили нас официального импорта сырья, необходимого для поддержания статуса "мировой фабрики", а некоторые из наших самых мощных предприятий были вынуждены приостановить свою деятельность за рубежом во имя "помощи военным усилиям"\n\nМы все еще можем полагаться на наши внутренние ресурсы и перенести наши предприятия в другие дружественные страны. Однако ситуация осложняется тем, что флот ОДТО перекрыл такие важные пути, как Малаккский пролив, Ломбокский пролив, Макассарский пролив и пролив Мияко. Они также использовали ракеты для нападения на наш торговый флот в Южно-Китайском и Восточно-Китайском морях. Из-за географического положения наша морская торговля упала до самого низкого уровня.\n\nПо мере того как последствия эмбарго углубляются, в самых процветающих восточных городах нашей страны появляются явные признаки нехватки материалов и экономического упадка. Люди стали говорить о войне с пессимизмом, а история голода и внутренних восстаний в Германии в Первую мировую войну в результате британской морской блокады вызывает у чиновников сильное беспокойство и тревогу."
 china.236.a: "Люди должны научиться терпеть, когда сталкиваются с великим врагом."
 china.237.t: "Главы Корпораций Протестуют против Войны"
 china.237.d: "Уважаемый Генеральный секретарь Си Цзиньпин: \n\nМеня зовут Лю Синфу, я родом из Нинбо. Я вступил в Коммунистическую партию Китая в 1998 году. С 2014 года я управлял швейной фабрикой, продукция которой продавалась в основном за границу и приносила прибыль, которой когда-то хватало на то, чтобы моя жена, сын, дочь и я жили в достатке.\n\nМы установили хорошие отношения с зарубежными дистрибьюторами, и нашу продукцию можно было найти на полках магазинов во Вьетнаме, Сингапуре и Японии, пока война на Тайване не привела фабрику к банкротству. Я остановил оборудование, распустил персонал и занял денег у ростовщиков. Нам пришлось продать нашу квартиру в центре города. Обоим моим детям по-прежнему нужно было ходить в школу, но я едва мог позволить себе оплачивать обучение. Моя жена уже планирует развестись со мной.\n\nГосподин генеральный секретарь, я хотел бы сказать, что всегда считал, что вы сможете привести нашу страну к величию. Но теперь из-за этой войны бесчисленные люди, такие как я, живут в несчастье. Это и есть то самое "великое омоложение", которое вы обещали? Я прошу вас прекратить эту войну и вернуть мир!"
 china.237.a: "Это письмо было передано в Центральный офис и никогда не попадет к Генеральному секретарю."
 china.238.t: "Частичное Решение Проблемы"
 china.238.d: "Новости из Москвы могут принести облегчение Пекину и одновременно разочаровать Токио и Канберру. После начала войны на Тайване морская блокада и экономические санкции сильно ударили по экономике Китая, вызвав трещину в его внутренней стабильности. Однако теперь русские могут изменить ситуацию.\n\nРоссийские и китайские министры подписали масштабные соглашения об экономическом сотрудничестве, ключевые компоненты которых включают тарифные уступки для китайских товаров, экспортируемых в Россию, а также разрешение Китаю использовать российскую Сибирскую железную дорогу, Центрально-Азиатскую магистраль и Арктический маршрут для многосторонней торговли. Взамен Китаю было предложено закупать больше российского топлива по более высоким ценам и предоставлять больше кредитов для российских инфраструктурных проектов, в частности аэропортов и гаваней на Дальнем Востоке. Полномочный представитель президента РФ в Дальневосточном федеральном округе заявил китайским СМИ, что эти соглашения "наглядно продемонстрируют, что российско-китайскому сотрудничеству нет предела"\n\nХотя открытие Северного маршрута может незначительно компенсировать потери Китая во внешней торговле, поддержка России имеет большое значение для восстановления доверия среди многих развивающихся стран, сомневающихся в целесообразности продолжения торговли с Китаем. Кроме того, Россия может эффективно защищать новые торговые пути Китая, особенно учитывая, что ракеты ОДТО в настоящее время не нацелены на Владивосток и Петропавловск."
 china.238.a: "Медведь братуется с драконом."
 china.239.t: "Расширение Торговли с Китаем" #event for sov
 china.239.d: ""
 china.239.a: "ок"
 china.240.t: "Вопрос Спратли"
 china.240.d: "С тех пор как мы начали строить буровые платформы в Южно-Китайском море и чаще участвовать в разработке ресурсов, интенсивность морского противостояния с нашими соседями, особенно с Вьетнамом, возросла. Мало того, что торговые суда часто оказываются на грани столкновения, моряки с обеих сторон нередко устраивают погони на моторных и скоростных лодках. Кроме того, в спорных водах все чаще можно увидеть военные корабли.\n\nС учетом абсолютного неравенства национальных сил многие могут подумать, что мы сможем заставить вьетнамцев сдвинуться с места силой. Однако наша сила дает нам и альтернативное преимущество: мы можем первыми предложить переговоры и взять инициативу в свои руки. Мы направим Вьетнаму дипломатическую ноту, предлагающую два варианта: либо согласиться на передачу Китаю островов Спратли, либо разделить с ним права на разработку и использование ресурсов этих вод."
 china.240.a: "Посмотрим, хватит ли у вьетнамцев ума."
 china.241.t: "Вопрос Спратли" #event for vin
 china.241.d: ""
 china.241.a: "ок"
 china.242.t: "Вьетнам Продает Спратли"
 china.242.d: "Министр иностранных дел Вьетнама тайно вызвал нашего посла, чтобы дать нам окончательный ответ по вопросу островов Спратли. Вьетнам наконец-то поддался реальности и согласился вернуть нам острова, находящиеся под контролем Вьетнама. Конечно, вьетнамцы не отдадут свою территорию просто так. Они назначили высокую цену за эти острова, а также попросили время для демонтажа военных объектов на островах, при этом разрешив Вьетнаму участвовать в последующей разработке ресурсов.\n\nВ Пекине некоторые высокопоставленные чиновники насмехаются над требованиями Вьетнама. Однако, учитывая текущий переговорный процесс, возможно, было бы разумнее достичь соглашения с Вьетнамом как можно скорее. По сравнению с богатыми ресурсами, которые можно получить от возвращения Спратли, и национальной гордостью, которую можно вызвать, сделка, несомненно, является экономически выгодной."
 china.242.a: "Время не терпит, давайте согласимся на эту сделку."
 china.243.t: "Вьетнам Продает Ресурсы Спратли"
 china.243.d: "Министр иностранных дел Вьетнама тайно вызвал нашего посла, чтобы дать нам окончательный ответ по вопросу островов Спратли. Вьетнамцы заявили, что готовы продавать Китаю ресурсы, добываемые на Спратли, но не отдадут свою территорию. Конечно, вьетнамцы также добавили, что могут продавать Китаю энергоносители по низкой цене и предоставить определенную степень свободы в эксплуатации ресурсов, несмотря на то, что Вьетнам также глубоко погряз в нефтяном кризисе.\n\nВ Пекине некоторые высокопоставленные чиновники в ярости от требований Вьетнама. Однако, учитывая текущий переговорный процесс, возможно, было бы разумнее достичь соглашения с Вьетнамом как можно скорее. Мы можем использовать энергию для эффективного смягчения внутреннего экономического кризиса, а незначительная дипломатическая неудача не будет иметь большого влияния, пока она держится в секрете от общественности."
 china.243.a: "Согласитесь на эту сделку, но ничего ещё не закончено."
 china.244.t: "Китайская Помощь" #event for vin, lao, cam
 china.244.d: ""
 china.244.a: "ок"
 china.245.t: "НОАК Прекращает Связь"
 china.245.d: "В свете нашей довольно катастрофической неудачи в борьбе с PDTO остатки Народно-освободительной армии прервали связь с центральным правительством, так как мы готовились к демобилизации. Хотя некоторые задавались вопросом, было ли это сделано просто для экономии запасов или из-за японского саботажа, мы наконец получили долгожданный ответ. Проще говоря, наши военные восстают против нас.\n\nПосредством множества загадочных заявлений члены высшего командования НОАК осудили наше правительство как "неспособное противостоять японским империалистам" и поставили перед нами ультиматум: либо допустить их переворот, либо столкнуться с восстанием. Зная, какой смертельный удар это нанесет по легитимности китайской нации и коммунистической партии, мы отказались от их мелких требований.\n\nХотя некоторые члены НОАК остаются верными центральному правительству в Пекине, раскол наших сил и последствия новой гражданской войны ввергли нашу страну в хаос, и уже наши администрации в Синьцзяне и Тибете отметили массовый рост повстанческой активности. Пока мы делаем все возможное, чтобы успокоить ситуацию, по измученной китайской нации начинает распространяться тоскливое чувство, что мы скатываемся в очередную Эпоху Военачальников."
 china.245.a: "Все под небесами находится в полном хаосе, ситуация прекрасная."
 china.246.t: "Губернаторы Берут Власть в Свои Руки"
 china.246.d: "Военное поражение ввергло обширную китайскую структуру власти в реорганизацию. Провинциальные чиновники рассматривают потерю авторитета центрального правительства как шанс перестать подчиняться Пекину и управлять в соответствии с собственным видением.\n\nГуанси взяла на себя инициативу, сославшись на "обеспечение местной стабильности" как основание для захвата контроля над всеми ключевыми объектами инфраструктуры. Военные округа и местные войска были переданы в подчинение провинциальному командованию - хотя их названия остались прежними, они фактически служат вооруженными силами местного правительства. В Юньнани местный губернатор также прервал связь с центральным правительством и с помощью лояльных военных и полицейских подразделений взял под контроль ключевые горные дороги и плотины, которые являются основным источником энергии в провинции. Реформы в Ганьсу пошли еще дальше. В этом крупном северо-западном центре с мощной военно-промышленной базой была изменена административная структура. В Ланьчжоу был создан "Провинциальный координационный комитет", состоящий из военных, представителей правительства и промышленности, который взял на себя все полномочия по управлению регионом. Хотя формально он по-прежнему признает центральное руководство, все основные решения принимаются непосредственно этим комитетом, что практически не оставляет Пекину возможности влиять на ситуацию."
 china.246.a: "Что они творят???"
 china.247.t: "Полный Крах"
 china.247.d: "В 12:00 по пекинскому времени на конференции по перемирию, состоявшейся в Пекине, представители побежденного Китая подписали договор о прекращении огня со странами-членами ОДТО под свидетельством международного сообщества.\n\nСогласно договору, вооруженные силы Китая будут значительно сокращены, а все "оружие массового поражения", включая ядерное, демонтировано под международным наблюдением. Представитель Японии заявил: "Учитывая страдания, которые Китай причинил азиатским странам, ограничения являются настоятельной необходимостью." Кроме того, прибрежные воды Китая будут контролироваться Объединенным флотом ОДТО, а военно-морская деятельность Китая будет ограничена пределами 12 морских миль от исходной линии.\n\nКонференция достигла своего апогея в вопросе об этнических группах в северо-западных регионах Китая. Несколько стран поддержали народы Восточного Туркестана и Тибета в их стремлении к самоопределению под руководством ОДТО, чтобы освободиться от гнета китайской коммунистической партии. Кроме того, силы ОДТО создадут постоянные военные базы в Даляне, Циндао, Шанхае и Сямэне, установив над этими прибрежными городами международную опеку сроком на 99 лет.\n\nОбъявление о договоре вызвало массовые беспорядки по всему Китаю. В таких городах, как Пекин, Шанхай и Гуанчжоу, начались крупные демонстрации, протестующие против несправедливых условий договора и осуждающие некомпетентность правительства. Ранее запрещенные гражданские движения и религиозные организации начали возрождаться, усугубляя хаос. По предварительным данным, в нескольких провинциальных столицах начались ожесточенные конфликты. Китайский народ, и без того израненный тяготами войны, теперь ввергнут в еще одну унизительную эпоху, напоминающую столетнюю давность. Несмотря на введение чрезвычайного положения, центральное правительство пытается сохранить контроль над ситуацией, а поскольку региональные власти утверждают свою автономию, над Китаем вновь нависла угроза раздробленности."
 china.247.a: "Небесам нет дела до бедственного положения людей, тысячи взлетов и падений - мимолетное зрелище."
 china.248.t: "Тибет Провозглашает Независимость"
 china.248.d: "Беспорядки продолжаются, поскольку центральное правительство полностью развалилось, оставив Цинхай-Тибетское нагорье в состоянии беспрецедентной раздробленности. Толпы людей маршируют по улицам Лхасы, выдвигая различные требования. Одни по-прежнему поддерживают коммунистическую партию, другие призывают к республике. Некоторые требуют полного освобождения от влияния Индии. Но всех их объединяет одно убеждение: старый порядок правления рухнул, и все должно быть построено заново. Проблема в том, что протестуют не только простые граждане. Местные властные группировки, религиозные лидеры и остатки военных ищут свой собственный путь. В некоторых районах люди начали создавать автономные правительства, отказываясь признавать какую-либо единую власть.\n\nКамдо стал центром военного противостояния, первоначально вызванного противостоянием между региональным военным командованием и тибетскими силами. Некоторые офицеры решили действовать самостоятельно, что еще больше осложнило ситуацию. Вскоре конфликт вышел за пределы городов. В отдаленных горных районах восстали местные вооруженные группы; некоторые монастырские лидеры открыто поддержали сепаратизм. Военное командование потеряло эффективный контроль над некоторыми районами региона. Повсеместные сепаратистские настроения охватили эту снежную страну, и, кроме согласия с тем, что статус-кво неустойчив, никто, похоже, не может найти общий язык.\n\nНа южном плато далеко не все спокойно. Хотя Центральная тибетская администрация, поддерживаемая Индией, удерживает Лхасу, ее власть остается хрупкой. Местные группировки воспользовались возможностью возвыситься: одни вступили в союз с Индией, другие - с военным командованием, а третьи намерены идти своим путем.\n\nНа этом огромном плато каждый борется за свои интересы, но никого по-настоящему не волнует будущее этой земли. Хаос распространяется, порядок рушится, и, похоже, это только начало."
 china.248.a: "Посвятив это смертное тело, пусть мы вместе переродимся в Чистой Земле."
 china.249.t: "Восточный Туркестан Провозглашает Независимость"
 china.249.d: "Раскол в Синьцзяне стал непоправимым. Восточный Туркестан объявил о своем референдуме о независимости, который прошел со спорным результатом в 51 % голосов, вызвав беспрецедентный политический кризис. Автономное региональное правительство в Урумчи, сформированное Производственно-строительным корпусом, выступило с резким заявлением, обвинив "Республику Восточный Туркестан" в "полном игнорировании основных политических прав миллионов неуйгурских жителей" и назвав ее "главным виновником, подрывающим этническое единство и стабильность в Синьцзяне". Тем временем на юге Синьцзяна Хотан стал временной столицей нового режима. Синие флаги с полумесяцем и звездой развеваются на каждом углу, из громкоговорителей звучат лозунги "национального освобождения", а ополченцы, воспламененные жаждой джихада, клянутся "освободить всех уйгурских братьев и сестер"\n\nВоины с обеих сторон бродят среди дюн. Нефтепроводы перерезаны, а дороги усеяны баррикадами. Север и Юг в спешном порядке запасаются боеприпасами и призывают солдат, готовясь к надвигающемуся крупномасштабному конфликту.\n\nНапряжение на границе продолжает нарастать. Кажется, что до первого выстрела осталось совсем немного."
 china.249.a: "Одинокий пограничный городок находится в опасности."
 china.250.t: "Скончался бывший премьер-министр Ли Кэцян"
 china.250.d.a: "Сегодня новость потрясла Китай: Ли Кэцян, бывший член Постоянного комитета Политбюро КПК и премьер Госсовета, только что покинувший свой пост и не достигший 70-летнего возраста, умер от внезапного сердечного приступа в Шанхае. Это крайне невероятно для лидеров КПК, которые обычно имеют хорошее медицинское обслуживание.\n\nПо сообщениям, Ли Кэцян приехал в Шанхай на временное пребывание по плану отпуска, организованного для него Центральным комитетом КПК после его отставки. После того как Ли впал в кому, Шанхайский городской комитет КПК немедленно организовал медицинскую бригаду для его спасения, но он не смог прийти в себя. В настоящее время, помимо новостей о смерти Ли, китайские чиновники также разместили памятные статьи с трауром по Ли в социальных сетях.\n\nБезвременная смерть Ли вызвала широкое сожаление в Китае, при этом некоторые хвалят его лидерство в промышленной модернизации Китая и "Инициативе пояса и пути" во время его премьерства, а также его успех в поддержании экономики на плаву во время Тайваньской войны. В родной провинции Аньхой, где жил Ли, стихийно было организовано несколько поминальных служб. Тело Ли было опечатано и, как ожидается, в ближайшее время будет доставлено самолетом в Пекин."
 china.250.d.b: "Сегодня новость потрясла Китай: Ли Кэцян, бывший член Постоянного комитета Политбюро КПК и премьер Госсовета, только что покинувший свой пост и не достигший 70-летнего возраста, умер от внезапного сердечного приступа в Шанхае. Это крайне невероятно для лидеров КПК, которые обычно имеют хорошее медицинское обслуживание.\n\nПо сообщениям, Ли Кэцян приехал в Шанхай на временное пребывание по плану отпуска, организованного для него Центральным комитетом КПК после его отставки. После того как Ли впал в кому, Шанхайский городской комитет КПК немедленно организовал медицинскую бригаду для его спасения, но он не смог прийти в себя. В настоящее время, помимо новостей о смерти Ли, китайские чиновники также разместили памятные статьи с трауром по Ли в социальных сетях.\n\nБезвременная смерть Ли вызвала широкое сожаление в Китае, при этом некоторые хвалят его лидерство в промышленной модернизации Китая и "Инициативе пояса и пути" во время его премьерства, а также его успех в поддержании экономики на плаву во время Тайваньской войны. В родной провинции Аньхой, где жил Ли, стихийно было организовано несколько поминальных служб. Тело Ли было опечатано и, как ожидается, в ближайшее время будет доставлено самолетом в Пекин."
 china.250.a: "Покойся с миром, дорогой товарищ."
 china.250.b: "Это также могло бы стать удачей для этого товарища..."
 china.251.t: "Реформаторы Приходят к Власти в Китае"
 china.251.d: "Один за другим по проспекту Чанъань с грохотом проносились окрашенные в темно-зеленый цвет основные боевые танки Тип 99. Когда НОАК отступила из столицы в свои гарнизоны, жители Пекина в страхе наблюдали за происходящим, но чувствовали облегчение. Однако внезапный политический переворот вскоре снова поверг всех в ужас.\n\nПосле того как амбиции Си рухнули, КПК решила доверить свое будущее и будущее 1,4 миллиарда китайцев новому лидеру. Ван Ян, бывший член Постоянного комитета Политбюро и председатель Народной политической консультативной конференции Китая, был назначен новым генеральным секретарем КПК. В Большом зале народных собраний, транслировавшемся CCTV, Ван красноречиво говорил под мигающими огнями, обещая провести истинные реформы новой эры, залечить китайские расколы и восстановить доверие народа к партии и нации.\n\nВ условиях постоянно меняющегося политического ландшафта, куда направится Народная Республика после очередной смены руководства в Чжуннаньхае? Сможет ли просвещенный джентльмен партии открыть новый рассвет для древнего Китая? Только время покажет."
 china.251.a: "Река Янцзы пронеслась, устремляясь на восток.\nОставив в памяти людей, увенчанных победой."
 china.252.t: "Новые Левые Приходят к Власти в Китае"
 china.252.d: "Один за другим по проспекту Чанъань с грохотом проносились окрашенные в темно-зеленый цвет основные боевые танки Тип 99. Когда НОАК отступила из столицы в свои гарнизоны, жители Пекина в страхе наблюдали за происходящим, но чувствовали облегчение. Однако внезапный политический переворот вскоре снова поверг всех в ужас.\n\nПосле того как амбиции Си рухнули, КПК решила доверить свое будущее и будущее 1,4 миллиарда китайцев новому лидеру. Ху Чуньхуа, бывший член Политбюро и вице-премьер Госсовета, был назначен новым генеральным секретарем КПК. В Большом зале народных собраний, транслировавшемся CCTV, Ху красноречиво говорил под мигающими огнями, заявляя, что он вновь представит партию как авангард народа и голос народа, восстановит доверие народа к партии и нации.\n\nВ условиях постоянно меняющегося политического ландшафта, куда направится Народная Республика после очередной смены руководства в Чжуннаньхае? Сможет ли "золотой мальчик" партии провозгласить новый рассвет для древнего Китая? Только время покажет."
 china.252.a: "Река Янцзы пронеслась, устремляясь на восток.\nОставив в памяти людей, увенчанных победой."
 china.253.t: "Реваншисты Приходят к Власти в Китае"
 china.253.d: "Один за другим по проспекту Чанъань проносились окрашенные в темно-зеленый цвет основные боевые танки Тип 99. Жители Пекина в ужасе наблюдали за тем, как все больше и больше войск НОАК продвигаются в городские районы столицы. Вскоре после этого внезапный политический переворот поверг всех в еще более глубокий страх.\n\nПосле того как амбиции Си рухнули, КПК решила доверить свое будущее и будущее 1,4 миллиарда китайцев новому лидеру. Новым генеральным секретарем КПК был назначен Ли Цзочэн, бывший член Центральной военной комиссии и начальник Объединенного штаба. В Большом зале народных собраний, транслировавшемся CCTV, Ли Цзочэн, окруженный группой молодых офицеров, с убежденностью заявил, что он очистит позор нации, отомстит за всех павших мучеников и восстановит доверие народа к партии и нации.\n\nВ условиях постоянно меняющегося политического ландшафта, куда направится Народная Республика после очередной смены руководства в Чжуннаньхае? Сможет ли герой войны НОАК открыть новый рассвет для древнего Китая? Только время покажет."
 china.253.a: "Река Янцзы пронеслась, устремляясь на восток.\nОставив в памяти людей, увенчанных победой."
 china.254.t: "Патриотический "Миф" от GameScience"
 china.254.d: "В Китае самое большое в мире сообщество геймеров и, возможно, самый богатый производитель игр - корпорация Tencent. Однако на протяжении многих лет китайцы так и не создали ни одной всемирно известной ААА-игры. Но сегодня все это может измениться. Малоизвестная компания GameScience разрабатывает ARPG под названием "Black Myth: Wukong", основанную на самом популярном китайском фэнтези-романе "Путешествие на Запад". Ее характерное художественное оформление и приятные боевые сцены уже успели полюбиться фанатам. Мы также можем внести свой вклад в развитие этой игры, обладающей огромным потенциалом, смягчив стандарты официальной цензуры, которая, как известно, довольно строга, а также поручив интернет-СМИ, связанным с Центральным управлением пропаганды, участвовать в продвижении игры."
 china.254.a: "Мечты нужно поощрять, и мы поможем им осуществить их."
 china.254.b: "Не стоит тратить время на такие пустяки."
 china.255.t: "Игра Полный Провал"
 china.255.d: "После долгого ожидания компания GameScience наконец выпустила "Black Myth: Wukong", однако она оказалась разочарованием. Пытаясь минимизировать риски и удовлетворить потребности рынка, разработчики ссылались и даже копировали многие элементы из других ARPG, что привело к поразительному сходству в дизайне уровней игры. Неудивительно, что геймеры быстро охарактеризовали игру как очередную китайскую подделку. Кроме того, сюжет игры, отсылающий к "Путешествию на Запад", был раскритикован фанатами как неожиданная особенность, привнесенная в игру в угоду официальной пропаганде. Неудача игры привела к тому, что значительное число сотрудников GameScience покинули свои рабочие места от разочарования. Сообщается, что некоторые интернет-корпорации планируют купить эту провальную игровую компанию."
 china.255.a: "Надеюсь, в следующий раз нам это удастся..."
 china.256.t: "Игра Пользуется Большим Успехом"
 china.256.d: "Получив поддержку от официальных лиц, разработчики из GameScience с новым энтузиазмом взялись за работу. Более того, по мере того как они начали выпускать трейлеры на YouTube и в Twitter, все больше и больше иностранных игроков обращали внимание на игру. В день релиза игра превзошла все ожидания: высокую оценку получило не только ее удобство, но и элементы древнекитайской культуры и фэнтезийная тематика "Путешествия на Запад", заложенные разработчиками, привлекли внимание геймеров. Это пробудило в мировом игровом сообществе интерес к изучению древних китайских преданий, что позволило достичь официальной цели - популяризации традиционной китайской культуры. Теперь фанаты провозгласили, что "Black Myth: Wukong" станет "Лучшей Игрой Года"."
 china.256.a: ""А вот и Король обезьян!""
 china.257.t: ""Genshin" Impact"
 china.257.d: "Недавно ARPG в стиле аниме "Genshin Impact", выпущенная шанхайской компанией MiHoYo, заняла первое место в списке самых популярных игр в нескольких странах мира. С момента выхода игра быстро завоевала внимание и любовь множества игроков благодаря красивой графике, уникальному дизайну персонажей и возможности исследовать открытый мир. На таких социальных платформах, как Reddit, Twitter и YouTube, бурные обсуждения игроков вызвали глобальный ажиотаж.\n\nВнезапный взлет "Genshin Impact" заставил геймеров всего мира впервые обратить внимание на китайскую игровую индустрию. В течение долгого времени на китайском игровом рынке доминировало местное потребление, и лишь немногие игры добивались такого успеха на международном рынке. Однако "Genshin Impact" порвал все шаблоны, и MiHoYo мгновенно стала успешной, доказав силу и потенциал китайских разработчиков игр."
 china.257.a: "Фантастический мир в пределах досягаемости! Кто бы не был очарован?"
 china.258.t: "Актуальные Gроблемы НОАК"
 china.258.d: "Объединенный отдел штаба Центральной военной комиссии.\n\nКому:Центральной военной комиссии и Политбюро ЦК КПК.\n\nДля того чтобы наши вооруженные силы оставались на переднем крае будущих войн и продолжали триумфально продвигаться в эпоху информатизации, Народно-освободительная армия должна срочно решить проблемы и критические вопросы, выявленные на основе уроков, полученных в ходе последних конфликтов.Ключевые проблемы следующие:\n\n1.Структурные противоречия сосредоточены на высших уровнях, характеризуются чрезмерно обобщенными функциями, раздутыми институтами и дисбалансом ресурсов.\n\n2.Организационная структура имеет существенные недостатки, особенно отсутствие всеобъемлющей системы руководства армией.\n\n3.Командованию совместных операций Центральной военной комиссии не хватает критических элементов и эффективной функциональности.\n\n4.Симптомы "менталитета мирного времени" очевидны, проявляясь в высокомерии и отсутствии строгости в выполнении приказов полностью и точно."
 china.258.a: "Адаптируйтесь, чтобы победить - трансформируйтесь, чтобы одержать победу"

 china.259.t: "Проект ПРИЗРАК"
 china.259.d: ""Товарищ, вы хотите сказать, что можете сделать всех наших солдат невидимыми?" Генерал закрыл отчет в своей руке, глядя на молодого исследователя перед собой слегка неверящими глазами. В идею заставить человека исчезнуть из поля зрения невооруженного глаза было трудно поверить даже генералу, который повидал почти все.\n\n"Да, директор! Используя конструкцию, основанную на свойствах триоксида молибдена, мы можем направить свет в ядро объекта в определенном направлении. Если коэффициент преломления и импеданс правильно подобраны, будет казаться, что сердцевина не существует, создавая эффект визуальной невидимости. Сегодня это вполне осуществимо!"\n\n"Хорошо, я обсужу это с председателем.""
 china.259.a: "Попробуем!"
 china.259.b: "Может и не надо..."
 china.260.t: "Проект ОСТРИЕ"
 china.260.d: ""Товарищ директор, институт недавно предложил новый проект под названием "ОСТРИЕ". Он разработан на основе оригинальной винтовки QTS-11 и направлен на значительное повышение ее бронебойных возможностей для современного механизированного боя. Согласно докладу, проект включает в себя новый винтовочный гранатомет и миниатюрную управляемую ракету, устанавливаемую на оружие. Эти усовершенствования позволят солдатам сохранить тактическую универсальность и получить возможность поражать легкобронированные цели на дальних дистанциях.\n\n"В бою интеллектуальная система управления огнем будет автоматически регулировать параметры стрельбы, предоставлять данные об окружающей среде и рассчитывать траектории полета пуль и гранат в режиме реального времени. При необходимости наведения управляемой ракеты система сама выполнит расчеты и программирование, обеспечивая точность. По сути, пистолет работает как стилус - только наведи, и он попадет в цель!"\n\n"Отличная концепция. Давайте передадим ее председателю для принятия решения.""
 china.260.a: "Попробуем!"
 china.260.b: "Может и не надо..."
 china.261.t: "Проект ПЛОВЕЦ"
 china.261.d: ""Товарищ министр!" Инженеры, одетые в белые лабораторные халаты, с нетерпением представляли новые чертежи приглашенному министру по развитию техники. "Товарищ, посмотрите, пожалуйста, сюда..." Один из инженеров указал на схему, заполненную сложными деталями и данными. "Это наш новый проект танка-амфибии под названием "Пловец"". Он поправил очки, когда министр кивнул, давая знак продолжать. "Этот танк оснащен 105-миллиметровым орудием, способным пробивать гипотетического противника, M1A2, в упор. Мы также улучшили плавучесть, применив передовые пеноматериалы. Здесь вы можете видеть интегрированный информационный модуль, оснащенный новейшей навигационной системой "Бейдоу", атмосферными датчиками и антеннами для передачи данных. В целом, этот танк значительно превосходит нашу нынешнюю амфибийную технику."\n\n"Понятно, товарищ. Я доложу об этом проекте в Центральную военную комиссию.""
 china.261.a: "Попробуем!"
 china.261.b: "Может и не надо..."
 china.262.t: "Проект ИМПУЛЬС"
 china.262.d: ""Добро пожаловать, директор!" Уверенный в себе исследователь поприветствовал старших офицеров, когда они вошли в институт. "Как вы знаете, рельсовая пушка была тщательно охраняемым секретом. Мы провели всесторонние испытания, и теперь наша команда готова установить ее на линкор. Используя длительное ускорение двух электромагнитных рельсов, мы можем значительно увеличить начальную скорость и дальность полета снаряда. Эта технология сделает наши морские пушки несравнимыми с любым другим подобным оружием."\n\nИсследователь сделал паузу, затем неуверенно спросил: "А что думает центр?"\n\nГенерал на мгновение задумался, прежде чем ответить: "Я доложу об этом председателю для принятия решения.""
 china.262.a: "Попробуем!"
 china.262.b: "Может и не надо..."
 china.263.t: "Проект ТЁМНЫЙ МЕЧ"
 china.263.d: ""Умный беспилотник, спроектированный так, чтобы напоминать средний истребитель? Интересно..." Руководители Национального оборонного научно-технического бюро погладили подбородки и погрузились в раздумья, ознакомившись с докладом Яна Вэя, главного конструктора проекта J-20. Теоретически наибольшее различие между истребителями пятого и шестого поколений заключается в их интеллекте и возможности подключения к Интернету вещей. Однако безрассудное инвестирование в исследования, разработку и производство совершенно нового истребителя нового поколения сопряжено со значительными рисками.\n\nЕсли бы беспилотник можно было использовать в качестве испытательного стенда для преодоления некоторых проблем истребителей нового поколения, это значительно помогло бы будущим исследованиям и разработкам. Однако даже проект создания беспилотника потребует значительных финансовых вложений, что сопряжено с определенными рисками. Тем не менее, потенциальные выгоды огромны. После тщательного рассмотрения руководители решили..."
 china.263.a: "Попробуем!"
 china.263.b: "Может и не надо..."
 china.264.t: "Проект ВСПЫШКА"
 china.264.d: ""Директор, мы планируем разработать высокоэнергетическую лазерную винтовку с использованием современных технологий, превосходящую старые зенитные и ослепляющие функции. Это оружие будет обладать боевым потенциалом, позволяющим убивать и выводить из строя вражеские подразделения с помощью лазеров направленной энергии. Будь то пучковое оружие бывшего Советского Союза или лазерное оружие Соединенных Штатов, их амбиции наконец-то будут реализованы нами." Пока исследователь говорил, он показал генералу образец высокоэнергетической лазерной системы. Хотя она все еще была громоздкой по размерам и источнику питания, презентация и опыт исследователя говорили о том, что будущее этой программы многообещающее.\n\n""Впечатляет. Я доложу об этом товарищу председателю для принятия решения.""
 china.264.a: "Попробуем"
 china.264.b: "Может и не надо..."
 china.265.t: "Проект НАМИ"
 china.265.d: ""Товарищ директор, я считаю, что наноботы могут быть использованы не только в полевых госпиталях, но и сыграть неожиданную роль в бою! Эти крошечные солдатики, размером меньше муравья, могут перемещаться незамеченными и перебрасываться в опорные пункты противника, поражая ключевые военные объекты врасплох. В будущем они смогут достигать любых целей - проводить взрывы, выпускать химикаты и многое другое. Единственный ресурс, который им нужен, - это богатая солнечная энергия! Только представьте, какое опустошение они смогут нанести нашим врагам, генерал, они даже не поймут, как мы это сделали!"\n\n"Неплохая идея. Давайте передадим это председателю для принятия решения.""
 china.265.a: "Попробуем!"
 china.265.b: "Может и не надо..."
 china.266.t: "Отчёт о Проекте ПРИЗРАК"
 china.266.d.1: "\nОТЧЁТ О РЕЗУЛЬТАТАХ ПРОЕКТА ПРИЗРАК:\n   ЧАСТИЧНЫЙ УСПЕХ.\n\nИзначально проект ПРИЗРАК был задуман для обеспечения скрытного развертывания и внезапных атак путем оснащения солдат НОАК метаматериальными визуальными плащами, которые сделали бы их полностью невидимыми для врагов. К сожалению, такие требования оказались слишком амбициозными для нынешних высокотехнологичных разработок, особенно на промышленном уровне. Руководитель группы, курировавшей проект, покачал головой и взял ручку, чтобы крупными буквами написать последний комментарий: "Сложный и дорогостоящий в производстве; не подходит для крупномасштабного использования. Может использоваться в небольших количествах для оснащения спецподразделений и улучшения существующих методов маскировки.""
 china.266.d.2: "\nОТЧЁТ О РЕЗУЛЬТАТАХ ПРОЕКТА ПРИЗРАК:\n   ПРОВАЛ.\n\nСогласно списку Всемирной организации здравоохранения, триоксид молибдена относится к канцерогенам группы 2B. Длительное воздействие и вдыхание его порошка может серьезно повлиять на здоровье дыхательных путей, вызывая хронические заболевания легких. Прямой контакт также может привести к токсическим реакциям, таким как покалывание и головная боль. Опасность порошка как одного из основных сырьевых материалов, выбранных для проекта, стала очевидной, и инцидент с утечкой подтвердил эти риски. Хотя обошлось без жертв, потенциальная опасность на непредсказуемом поле боя была слишком велика. Поэтому проект пришлось отменить."
 china.266.a: "Ну что ж..."
 china.266.b: "Грустно."
 china.267.t: "Отчёт о Проекте ОСТРИЕ"
 china.267.d.1: "\nОТЧЁТ О РЕЗУЛЬТАТАХ ПРОЕКТА ОСТРИЕ:\n   УСПЕХ.\n\nС резким свистом микроракета винтовки поразила и уничтожила машину-мишень с расстояния в тысячу метров. Интегрированная система управления огнем и винтовочные гранаты подняли переносную огневую мощь на новый уровень. Солдаты, испытавшие оружие, были впечатлены его характеристиками и выразили желание, чтобы оно как можно скорее было стандартизировано в армии.\n\nНаблюдатели на испытательном полигоне отмечали успех проекта ОСТРИЕ, который знаменует собой скачок вперед в индивидуальных боевых возможностях. Эта система не только предоставляет солдатам усовершенствованный механизм управления огнем, но и позволяет им точно поражать цели в пределах заданной дальности. Кроме того, благодаря интеграции беспилотного наблюдения солдаты могут запускать ракеты из укрытия и при этом поражать цели. Самое главное, что это усовершенствование значительно повышает вероятность того, что солдаты выживут в суровых реалиях современной войны."
 china.267.d.2: "\nОТЧЁТ О РЕЗУЛЬТАТАХ ПРОЕКТА ОСТРИЕ:\n   ПРОВАЛ.\n\n"Промах! Промах!" - кричали солдаты, когда винтовки потерпели значительное поражение. Усилия по миниатюризации и интеллектуальному наведению ракеты в конечном итоге не увенчались успехом, поскольку ограниченное пространство противоречило потребностям боевой системы и системы наведения. Другие компоненты оказались слишком дорогими, перегруженными или сложными в обслуживании, что сделало систему непрактичной для использования на поле боя. Некоторые солдаты даже насмешливо называли ее "большой игрушкой института"\n\nОднако, несмотря на эти неудачи, проект принес ценный опыт и технологические достижения. Ожидается, что в ближайшем будущем эти уроки приведут к созданию более мощной переносной боевой системы, которая в конечном итоге будет выдаваться каждому солдату."
 china.267.a: "Великолепно!"
 china.267.b: "Грустно."
 china.268.t: "Отчёт о Проекте ПЛОВЕЦ"
 china.268.d.1: "\nОТЧЁТ О РЕЗУЛЬТАТАХ ПРОЕКТА ПЛОВЕЦ:\n   УСПЕХ.\nНа секретном испытательном полигоне в Гуандуне проект "Пловец" наконец-то достиг своего критического момента для практической оценки. Ученые, инженеры и офицеры из отдела разработки оборудования и штаба Объединенного штаба стояли, затаив дыхание, и смотрели на прототип танка, готовый к работе.Когда учения официально начались, танк открыл огонь по вражеской мишени, смоделированной по образцу M1A2. Через несколько мгновений цель окуталась дымом и была полностью выведена из строя. Затем двигатель танка взревел, и он, маневрируя на мелководье, направился к близлежащему острову. В этот момент сердце каждого, казалось, подпрыгнуло к горлу.\n\nКогда "Пловец" плавно достиг острова и водитель подал сигнал об успешном завершении учений, командный центр взорвался торжеством. Тяжелая работа наконец-то окупилась."
 china.268.d.2: "\nОТЧЁТ О РЕЗУЛЬТАТАХ ПРОЕКТА ПЛОВЕЦ:\n   ПРОВАЛ\nК сожалению, прототип нового танка-амфибии провалил полевые испытания. Хотя его огневая мощь продемонстрировала способность уничтожать вражеские машины, самый важный фактор для танка-амфибии - плавучесть - все еще оставался недостаточным. При попытке пересечь относительно короткий водный путь Пловец быстро затонул. Хотя экипаж успел спастись, прототип и дорогостоящее оборудование, находившееся на борту, были потеряны, несмотря на огромные усилия команды разработчиков и испытателей. Остается надеяться, что при повторном рассмотрении проекта танка-амфибии в будущем те же ошибки не повторятся."
 china.268.a: "Великолепно!"
 china.268.b: "Грустно."
 china.269.t: "Отчёт о Проекте ИМПУЛЬС"
 china.269.d.1: "\nОТЧЁТ О РЕЗУЛЬТАТАХ ПРОЕКТА ИМПУЛЬС:\n   УСПЕХ.\n"5, 4, 3, 2, 1, 0. Огонь!" На морском полигоне все затаили дыхание, глядя на корабль-испытатель, оснащенный новым рельсотроном, и корабль-мишень. После команды "Пуск" не было ни пороха, ни огня, ни громкого гула - только тихое "бах". Затем снаряд на огромной скорости вылетел из камеры, прочертив в воздухе почти прямую линию, и с огромной силой ударил по кораблю-мишени. Высокоскоростной снаряд пробил корабль-мишень насквозь и медленно опустился в воду.\n\n"Корабль-мишень потоплен, план полностью удался!""
 china.269.d.2: "\nОТЧЁТ О РЕЗУЛЬТАТАХ ПРОЕКТА ИМПУЛЬС:\n   ПРОВАЛ.\n\nС гулким звуком программа корабельных рельсотронов была официально объявлена провальной. Во время катастрофического испытания непрерывной стрельбы перегретый источник питания взорвался, нанеся неизбежный и разрушительный ущерб всему испытательному полигону и оборудованию, спалив большую часть критически важного оборудования. К счастью, обошлось без жертв, поскольку персонал находился далеко. Однако если бы подобный инцидент повторился, последствия были бы очень серьезными. Учитывая серьезность повреждений, проблемы безопасности и трудности разработки, будущее рельсотрона стало еще более неопределенным."
 china.269.a: "Великолепно!"
 china.269.b: "Грустно."
 china.270.t: "Отчёт о Проекте ТЁМНЫЙ МЕЧ"
 china.270.d: "\nОТЧЕТ О РЕЗУЛЬТАТАХ ПРОЕКТА ТЁМНЫЙ МЕЧ:\n   УСПЕХ.\n\nВ ясный солнечный день в аэропорту Вэньцзян города Чэнду собрались руководители Министерства национальной обороны, Национального оборонного научно-технического бюро и даже Центральной военной комиссии. Снаружи толпа военных энтузиастов и зрителей, узнавших о событии, тесно прижалась друг к другу. Власти намеренно слили информацию заранее, намекая на исторический момент, подобный первому полету J-20 в 2011 году.\n\nКогда беспилотный боевой самолет Темный меч выкатился из ангара, публика разразилась радостными криками, а лидеры восхищались его изящной формой. Самолет разогнался по взлетно-посадочной полосе и взмыл в небо, его характеристики были подчеркнуты в свете прожекторов. Он двигался, как дротик древнего китайского убийцы, пронзая голубые просторы. Темный меч выполнил серию сложных маневров, продемонстрировав свою передовую авионику и разведывательные системы. Лидеры аплодировали, а главный конструктор Ян Вэй тихо утирал слезы радости.\n\nБесспорно, Темный меч стал еще одной вехой в карьере Ян Вэя, ознаменовав появление первого в мире сверхзвукового БПЛА. Он будет преодолевать облака Тяньшаньских гор, купаться в лунном свете Южно-Китайского моря и охранять процветание родины. "
 china.270.a: "Великолепно!"
 china.271.t: "Отчёт о Проекте ВСПЫШКА"
 china.271.d: "\nОТЧЕТ О РЕЗУЛЬТАТАХ ПРОЕКТА ВСПЫШКА:\n   ЧАСТИЧНЫЙ УСПЕХ.\n\nГлядя на массивный конечный продукт, офицеры, курировавшие проект, не могли не вздохнуть. Несмотря на все усилия исследователей, им не удалось уменьшить размер и вес высокоэнергетической лазерной системы до размеров, которые мог бы нести один солдат. Для постоянно меняющегося поля боя ее мобильность была явно недостаточной. В сочетании с другими недостатками, такими как способ поражения, широкомасштабное развертывание остается затруднительным. Тем не менее, процесс исследований и результаты проекта по-прежнему ценны, и в качестве вспомогательного боевого оружия лазерное оборудование может продолжать играть важную роль в других формах на поле боя."
 china.271.a: "Ну что ж..."
 china.272.t: "Отчёт о Проекте НАМИ"
 china.272.d: "\nОТЧЕТ О РЕЗУЛЬТАТАХ ПРОЕКТА НАМИ:\n   ЧАСТИЧНЫЙ УСПЕХ.\nПосле бесчисленных дней и ночей напряженной работы команда исследователей наконец-то представила свой проект наноробота на передний план военной истории. В XXI веке даже такой маленький муравей может пошатнуть дерево. К сожалению, финальная версия наноботов не оправдала всех тех высоких ожиданий, которые возлагали на нее военные. С точки зрения развертывания, мощности и производства, их характеристики все еще оставались недостаточными. Надежды на то, что с помощью наноботов можно полностью уничтожить командную структуру противника, больше не оправдываются. Однако они все еще могут служить полезными инструментами в военной промышленности."
 china.272.a: "Ну что ж..."

 china.273.t: "Мысль Си Цзиньпина"
 china.273.d: "В 1978 году КПК отказалась от линии Мао на классовую борьбу в качестве руководящего принципа и перешла к ориентации Дэнга на экономическое развитие. В мгновение ока Китай достиг чудесных успехов в своем развитии, но в то же время его темная сторона становилась все более заметной. Чтобы решить эти проблемы, нельзя искать ответы в трудах Маркса, Ленина или Мао Цзэдуна, а нужно искать истину в практике. Мысль Си Цзиньпина о социализме с китайской спецификой в новую эпоху - это именно тот ответ, который партия дала китайскому народу в XXI веке.\n\nМысль Си Цзиньпина, по определению главного теоретика КПК Ван Хунина, - это не предсказание социалистического будущего, а скорее обобщение опыта последних сорока лет реформ и открытости. В ней подчеркивается, что всеохватывающая правящая партия, то есть КПК, должна руководить всеми аспектами жизни общества, а строгий механизм выдвижения и непрерывные антикоррупционные кампании партии обеспечат идеологическую чистоту авангарда. Кроме того, чтобы преодолеть идеологический раскол внутри страны, в качестве лозунгов приняты "Общее процветание", "Китайская мечта" и "Национальное омоложение", которые отвечают растущей национальной гордости и требованию социальной справедливости в Китае. Поскольку положение Си становится все более устойчивым, "Мысль Си Цзиньпина" будет продолжать направлять Китай в обозримом будущем."
 china.273.a: "Да Здравствует Си!"
 china.274.t: "Новая База ВМФ в Камбодже"
 china.274.d: "Недавно военное сотрудничество Китая с его камбоджийским союзником сделало еще один шаг вперед благодаря завершению строительства военно-морской базы в Пномпене. Расположенная в 35 километрах к югу от столицы Камбоджи Пномпеня, на западной стороне устья реки Меконг, база занимает площадь около 4,6 квадратных километров. База располагает большим глубоководным портом, способным принимать крупные надводные корабли, включая авианосцы, а также различные вспомогательные суда.\n\nПосле завершения строительства военно-морской базы в Пномпене будет создан мощный логистический центр для китайских ВМС в Юго-Восточной Азии, что значительно повысит их устойчивый оперативный потенциал в дальних водах. Кроме того, база способна эффективно противостоять военным действиям Японии, Австралии и Индии в Южно-Китайском море. Она обеспечивает стратегическую поддержку Южно-Китайского флота Китая и оказывает давление на линии военного проецирования и снабжения Организации Тихоокеанского оборонительного договора.\n\nВ настоящее время НОАК начала транспортировку военных грузов в Пакистан как по суше, так и по воздуху. По сообщениям, большие транспортные самолеты ВВС Китая начали доставлять в Пакистан значительное количество оружия и материально-технических средств, включая танки, бронемашины, артиллерию, ракеты и другое тяжелое вооружение. Кроме того, некоторые подразделения НОАК уже отправились из Синьцзяна, пройдя через Афганистан, чтобы проникнуть на пакистанскую территорию."
 china.274.a: "Отлично!"
 china.275.t: "Начало Анти-Потребительской Кампании"
 china.275.d: "Товарищи:\n\nСегодня мы стоим на историческом перепутье. Недостаточно думать о том, как развивать нашу экономику, мы должны также признать, что консюмеризм, как форма вторжения капиталистической культуры, неуклонно подрывает сами основы нашей системы.\n\nС экономической точки зрения, суть консюмеризма заключается в слепом потреблении, вызванном бесконечно раздуваемыми желаниями. Эта модель приводит к растрате национальных ресурсов, искажает экономические структуры, ослабляет фундамент реальной экономики и порождает ложное процветание. В политическом плане капиталистические страны пропагандируют культуру потребления, пытаясь соблазнить нашу молодежь иллюзиями материализма. Такие лозунги, как "свобода личности" и "материальные удовольствия", используются для того, чтобы ослабить боевой дух нашего молодого поколения, лишить его сознательности, заботы о нации и любви к родине. Из них формируется поколение, зацикленное на мимолетных удовольствиях и безразличное к будущему своей страны.\n\nТоварищи, есть только один путь вперед: решительно, мощно и основательно ударить по распространению консюмеризма.\n\nМы должны укреплять реальную экономику, увеличивать инвестиции в промышленность и сельское хозяйство, жестко пресекать импорт предметов роскоши и сдерживать распространение экстравагантности. Государство должно ужесточить контроль над финансовым капиталом, обеспечить приток богатства к широким народным массам, гарантировать социальное равенство и сократить разрыв между богатыми и бедными. Мы должны решительно бороться со всеми формами спекуляции и нетрудовых доходов. На культурном фронте мы должны высоко поднять знамя духовной цивилизации, проводить широкое антипотребительское просвещение, критиковать упадочную культуру капитализма и учить нашу молодежь поддерживать дух бережливости, трудолюбия и упорной борьбы, отказавшись от экстравагантного и броского образа жизни.\n\n Наконец, партия и правительство должны подавать пример. Мы должны укреплять дисциплину, обеспечивать строгие стандарты для членов партии и кадров, решительно расследовать и наказывать все факты коррупции и расточительства. Только тогда мы сможем очистить наши ряды, очистить наше мышление и укрепить революционные основы, на которых стоит наша нация."
 china.275.a: "Гром аплодисментов."
 china.276.t: "unused"
 china.276.d: "unused"
 china.276.a: "unused"

 china.277.t.1: "Отчет о Экологической Реформе"
 china.277.t: "Успех Экологической Реформы!"
 china.277.d: "Быстрый экономический рост Китая также привел к возникновению самых серьезных в истории проблем с загрязнением окружающей среды. Эрозия почвы из-за чрезмерной вырубки лесов, загрязнение воздуха и воды тяжелой промышленностью, а также угроза исчезновения многих видов животных из-за отсутствия регулирования - все это насущные проблемы, требующие решения.\n\nПосле прихода к власти Си Цзиньпина правительство ввело несколько радикальных мер экологической политики, а лозунг "Чистая вода и зеленые горы так же ценны, как золото и серебро" стал общепринятым. В прошлом существовали опасения, что строгие ограничения на промышленную деятельность в целях защиты окружающей среды могут привести к экономическому спаду и массовой безработице. Однако эти опасения оказались беспочвенными. Благодаря проведению политики модернизации промышленности, например, стимулированию быстрого развития индустрии новых энергетических автомобилей, многие экологически чистые отрасли, способные приносить значительную прибыль, стали лидерами в развитии экономики Китая. Кроме того, уровень использования новых источников энергии, включая атомную, солнечную и гидроэнергетику, достиг в Китае новых высот. Еще одним преимуществом улучшения экологической обстановки стало то, что многие природные живописные места вновь открылись, что способствовало развитию туристической индустрии.\n\nПохоже, что обещание партии, данное народу, вновь было выполнено: экономика продолжает расти, а условия жизни значительно улучшились."
 china.277.a: "Спасибо Партии!"
 china.277.d.large: "Быстрый экономический рост Китая также привел к возникновению самых серьезных в истории проблем с загрязнением окружающей среды. Эрозия почвы из-за чрезмерной вырубки лесов, загрязнение воздуха и воды тяжелой промышленностью, а также угроза для многих видов животных из-за отсутствия регулирования - все это насущные проблемы, требующие решения.\n\nСегодня, я считаю, мы можем объявить реформу "квалифицированным успехом". Уровень смога в крупных городах неуклонно снижается, ареал обитания сибирского тигра расширяется, а опустынивание во Внутренней Монголии значительно сократилось. Даже в некогда необитаемых районах пустыни Такламакан появляются новые оазисы. Эти экологические реформы получили высокую оценку как чиновников, так и общественности и считаются одним из подлинных достижений правительства. Что касается экономического спада, вызванного этими реформами, то мы будем решать его постепенно, в рамках продолжающегося процесса трансформации и модернизации промышленности."
 china.277.a.large: ""Достижения достойны похвалы." - В соответствии с распоряжением премьер-министра."
 china.277.d.middle: "Быстрый экономический рост Китая также привел к возникновению самых серьезных в истории проблем с загрязнением окружающей среды. Эрозия почвы из-за чрезмерной вырубки лесов, загрязнение воздуха и воды тяжелой промышленностью, а также угроза исчезновения многих видов животных из-за отсутствия регулирования - все это насущные проблемы, требующие решения.\n\nСначала мы пытались использовать авторитет центрального правительства для проведения реформ, но быстро стало ясно, что такой подход был слишком поспешным. Подобно укоренившейся практике бюрократической системы Китая, любая директива центрального правительства имеет тенденцию к эскалации на всех административных уровнях - от рекомендаций премьера до указаний вице-премьера, от указаний министра до распоряжений губернатора и, наконец, до зачастую жестких сроков, установленных мэром. Этот каскад директив привел к значительному спаду в базовых отраслях промышленности во многих регионах. Кроме того, наши недальновидные действия не предусматривали мер, которые помогли бы этим регионам восстановить экономическую стабильность. Возрождение лесов привело к сокращению свободных сельскохозяйственных угодий, а улучшение прозрачности воды заставило закрыть многие заводы. Несмотря на то что мы достигли поставленных экологических целей, многие люди в Интернете остаются равнодушными к так называемым "достижениям реформ", обращая внимание на пагубные последствия бюрократизма."
 china.277.a.middle: ""Необходимо обобщать опыт и стремиться к постоянному совершенствованию". - в соответствии с директивой премьер-министра."
 china.277.d.small: "Быстрый экономический рост Китая также привел к возникновению самых серьезных в истории проблем с загрязнением окружающей среды. Эрозия почвы из-за чрезмерной вырубки лесов, загрязнение воздуха и воды в результате деятельности тяжелой промышленности, а также угроза исчезновения многих видов животных из-за отсутствия регулирования - все это насущные проблемы, требующие решения.\n\nОчевидно, что эта реформа столкнулась со значительными неудачами, некоторые из которых можно охарактеризовать как крупные провалы. Многие правительственные чиновники по-прежнему руководствуются устаревшим принципом "ВВП - это все" и готовы пожертвовать экологическими ресурсами - растительностью, водой и качеством воздуха - только ради бумажного экономического роста. Когда центральное правительство предлагает меры по реформированию, кажется, что "дополнительные мнения" всегда вносятся в последнюю минуту, возвращая меры на стадию обсуждения. Если так пойдет и дальше, то будущие поколения смогут увидеть гигантских панд и дельфинов байдзи только в музеях, а повседневная жизнь граждан будет означать ношение масок N95 по дороге на работу."
 china.277.a.small: ""Необходимо привлечь к ответственности соответствующих должностных лиц". - в соответствии с указанием премьер-министра."

 china.278.t: "Реформа Армии Удалась!"
 china.278.d: "В Военном музее Китайской народной революции в Пекине сейчас проходит выставка, демонстрирующая результаты последних модернизационных реформ НОАК. Посетители, среди которых кадровые военные, солдаты и граждане, идут нескончаемым потоком. На выставке представлено разнообразное оборудование, такое как новая камуфляжная форма и беспилотники, сопровождаемые подробными пояснениями и интерпретацией данных. В самом популярном выставочном зале представлены тщательно проработанные масштабные модели действующих кораблей, самолетов, танков и ракет, выстроенные в парадном строю. Такая установка обеспечивает сильное визуальное воздействие и делает модернизацию НОАК очень ощутимой.\n\nКроме того, освещение совместных учений НОАК на военном канале CCTV претерпело значительные изменения. Наблюдатели отмечают, что новая военная доктрина НОАК, похоже, активно претворяется в жизнь. Сцены наступления бронетанковых групп и перестрелки морских орудий становятся все реже, их заменяют кадры, на которых солдаты НОАК используют смарт-терминалы и работают с разведывательными роботами. Время от времени на экране появляются новые таинственные образцы тяжелого вооружения, такие как боевая машина пехоты с уникальной башней и гладкий черный самолет.\n\nКак простые граждане, так и офицеры-ветераны согласны с тем, что НОАК стала впечатляющей силой, а ее продемонстрированные боевые возможности все больше соответствуют ее прежним заявлениям."
 china.278.a: "Вперёд!"
 china.279.t: "Скончался Бывший Генеральный Секретарь Цзян Цзэминь"
 china.279.d: "После смерти Дэн Сяопина в 1997 году китайский народ вновь стал свидетелем похорон величайшего лидера - Цзян Цзэминя, бывшего генерального секретаря Коммунистической партии Китая, родившегося в 1926 году и скончавшегося в Шанхае из-за полиорганной недостаточности, вызванной лейкемией. Центральный комитет КПК, а также другие высшие правительственные и военные органы выпустили "Письмо партии, армии и народу", в котором в мрачном тоне объявили об этой новости.\n\nХотя Цзян прожил долгую жизнь по китайским меркам, его кончина все равно вызвала печаль и траур среди китайской общественности. Пребывание Цзяна на посту генерального секретаря совпало с золотым веком китайской экономики, характеризующимся бурным развитием культурной и развлекательной индустрии и повышением международного статуса, что сделало его широко известным. Кроме того, личная харизма и редкое чувство юмора Цзяна как китайского лидера оставили неизгладимое впечатление. Хотя Цзян, несомненно, получит государственные похороны, его престиж, возможно, будет лучше отражен людьми, спешащими к воротам его бывшего дома в Янчжоу, чтобы оплакать его по-своему, а не с помощью экстравагантных церемоний."
 china.279.a: "Возможно, эта страна больше никогда не увидит такого человека, как он..."
 china.280.t: "Китай Запрашивает Проход Войск"
 china.280.d: ""
 china.280.a: "Ладно."
 china.281.t: "Афганистан Согласился!"
 china.281.d: "Недавно правительство афганских талибов заключило соглашение с китайским правительством, предоставив Народно-освободительной армии Китая ограниченные права на проход, что позволило ее войскам пройти через Ваханский коридор в Афганистане и добраться до северного Пакистана. После начала конфликта Пакистан незамедлительно обратился за помощью к Китаю, надеясь на военную поддержку. Учитывая давние дружеские отношения между Китаем и Пакистаном и остроту ситуации в регионе, китайское правительство приняло решение оказать Пакистану экстренную военную помощь, включая современное вооружение, материально-техническую поддержку и военных советников.\n\nОднако географические ограничения создали для Китая серьезные проблемы при оказании помощи Пакистану. Граница между Китаем и Пакистаном проходит в Каракорумских горах, где высота над уровнем моря превышает 4000 метров, местность пересеченная, а транспортировка затруднена и не подходит для крупномасштабных военных перевозок. Кроме того, индийский флот блокировал побережье Пакистана, отрезав его от морских путей. В этих условиях использование Афганистана в качестве транзитного маршрута стало для Китая единственным приемлемым вариантом доставки помощи в Пакистан."
 china.281.a: "Поехали."
 china.282.t: "Китай Запрашивает Проход Войск"
 china.282.d: ""
 china.282.a: "Для наших китайских друзей - что угодно."
 china.282.b: "Мы никогда не предадим наших индийских союзников!"
 china.283.t: "Россия Согласилась!"
 china.283.d: "Недавно правительство [SOV.GetName] заключило соглашение с китайским правительством, предоставив Народно-освободительной армии Китая ограниченные права на проход, что позволило ее войскам пройти через Ваханский коридор в Афганистане и добраться до северного Пакистана. После начала конфликта Пакистан быстро обратился за помощью к Китаю, надеясь на военную поддержку. Учитывая давние дружеские отношения между Китаем и Пакистаном и остроту ситуации в регионе, китайское правительство приняло решение оказать Пакистану экстренную военную помощь, включая современное вооружение, материально-техническую поддержку и военных советников.\n\nОднако географические ограничения создали для Китая серьезные проблемы при оказании помощи Пакистану. Граница между Китаем и Пакистаном проходит в Каракорумских горах, где высота над уровнем моря превышает 4000 метров, местность пересеченная, а транспорт затруднен, что не подходит для крупномасштабных военных перевозок. Кроме того, индийский флот блокировал побережье Пакистана, отрезав его от морских путей. В этих условиях использование Афганистана в качестве транзитного маршрута стало для Китая единственным приемлемым вариантом доставки помощи в Пакистан."
 china.283.a: "Кому чья, а мне досталась Памирская Дорога."
 china.284.t: "Россия Отказала Нам"
 china.284.d: "Недавно правительство [SOV.GetName] публично отклонило просьбу китайского правительства разрешить Народно-освободительной армии пройти через территорию Афганистана, чтобы оказать поддержку Пакистану в противостоянии индийскому военному наступлению. По сообщениям, Китай неоднократно вступал в переговоры с правительством [SOV.GetName], обещая уважать суверенитет и территориальную целостность Афганистана в период транзита и предлагая взамен экономическую помощь.\n\nПлан Китая предусматривал переброску через афганскую территорию в Пакистан крупного военного контингента, включая несколько хорошо вооруженных механизированных дивизий, подразделения ВВС, а также многочисленный персонал материально-технической поддержки и снабжения. Китайское правительство стремилось быстро и эффективно помочь пакистанским военным в отражении индийских войск, стремясь сохранить мир и стабильность в регионе. Однако правительство талибов отклонило эту просьбу, сославшись на необходимость "защиты национального суверенитета и независимости"\n\nПредставитель [SOV.GetName] заявил, что афганский народ, переживший десятилетия войны, не желает быть втянутым в какой-либо региональный конфликт."
 china.284.a: "Имеем, что имеем."
 china.285.t: "Вторжение в Бангладеш?"
 china.285.d: "Мы находимся на переломном этапе, когда вновь должны принять судьбоносные решения, которые существенно повлияют на ход войны. Центральная военная комиссия планирует решающую операцию на юго-западном фронте, стремясь полностью взять под контроль ход войны. Несмотря на то, что наши силы численно уступают, нам удается сохранять паритет с численно превосходящими индийскими силами благодаря нашим преимуществам в поддержке с воздуха и артиллерийской мощи. Однако непредсказуемая позиция Бангладеш может поставить под угрозу наши победные планы.\n\nВ нашем верховном командовании мнения разделились на две различные фракции. Одна фракция выступает за смелое наступление, предлагая внезапную атаку на Бангладеш, чтобы разорвать непрочную связь Индии с ее северо-восточными территориями. Другая фракция утверждает, что вероятность быстрой победы над Бангладеш крайне мала, и такие действия могут подвергнуть нас клещевой атаке со стороны Индии. Они считают, что мы должны продолжать придерживаться более примирительного подхода, чтобы выиграть время. Председатель Центральной военной комиссии находится на пороге принятия окончательного решения."
 china.285.a: "Полный вперёд!.."
 china.285.b: "Думаю, не стоит."
 china.286.t: "Китай предлагает построить в Москве Центр мысли Си Цзиньпина" #event for sov
 china.286.d: "В целях дальнейшего углубления китайско-российских отношений правительство Китая приняло решение о сотрудничестве с Россией в создании в Москве Центра мысли Си Цзиньпина для изучения и продвижения концепции Си Цзиньпина "Социализм с китайской спецификой в новую эпоху". Это решение вызвало бурные дебаты на международной арене, причем как сторонники, так и критики высказывали свои точки зрения. Местом расположения центра был выбран Московский государственный университет, старейшее и самое престижное учебное заведение России. Расположенный в неоклассическом здании XVIII века, центр был тщательно отремонтирован и модернизирован, в нем разместилась библиотека с китайскими и русскими изданиями работ Си Цзиньпина и соответствующими исследовательскими материалами для ученых и студентов.\n\nОднако создание Центра мысли Си Цзиньпина также вызвало некоторые споры и противодействие. Западные критики утверждают, что Китай использует центр для экспорта своей идеологии, а некоторые оппозиционные группы в России усиливают нарратив "китайской угрозы", чтобы вселить страх в российскую общественность. В ответ на эту критику официальный представитель МИД России на регулярном пресс-брифинге подчеркнул, что Центр мысли Си Цзиньпина - это открытая площадка для академического обмена, принимающая ученых со всего мира для исследований и диалога, и что Россия не намерена использовать его в качестве идеологического инструмента."
 china.286.a: "Великая Идея!"
 china.287.t: "Адмирал Дун Цзюнь комментирует битву за Тайбэйский пролив"
 china.287.d: "Военный репортер CCTV: "Добрый вечер. Мы здесь с министром обороны адмиралом Дун Цзюнем, чтобы обсудить опыт Тайваньской войны. Адмирал Дун, не могли бы вы поделиться своими мыслями о результатах работы военно-морского флота?"\nАдмирал Дун Цзюнь: "Конечно. Победа в Тайбэйском проливе была достигнута под сильным руководством президента Си и Центральной военной комиссии, продемонстрировав исключительную эффективность нашего флота."\nРепортер: "Каковы самые значительные достижения нашего флота во время этой войны?"\nАдмирал Дун Цзюнь: "Наше самое значительное достижение - это успешное подтверждение нашей стратегии "Ограничения и Воспрещения Доступа и Манёвра". Мы не только уничтожили большую часть кораблей противника, но и тесно взаимодействовали с подразделениями Ракетных войск, блокируя воды к востоку от пролива, устраняя иностранные воздушные и морские помехи и обеспечивая беспрепятственное проведение десантной операции."\nРепортер: "Как этот опыт определил нашу военно-морскую стратегию на будущее? Каковы следующие шаги ВМС?"\nАдмирал Дун Цзюнь: "Мы извлекли ценные уроки, которые послужат руководством для наших будущих стратегий и усилят наше морское господство. Мы продолжим укреплять наши военно-морские силы и адаптировать нашу тактику к меняющимся угрозам. Наша цель - поддержать национальную безопасность и укрепить наши позиции в качестве ведущей военно-морской державы в регионе."\nРепортер: "Спасибо, адмирал Дун. На этом мы завершаем наш сегмент"."
 china.287.a: "Спустя шесть столетий мы вновь стали самой мощной военно-морской силой в Азии."
 china.288.t: "Падение Акций А"
 china.288.d: "По мере того как новости о нефтяном кризисе распространялись в средствах массовой информации, волна паники, вызванная стремлением к самосохранению, начала подрывать доверие к рынку. Фондовый индекс продолжал падать с каждой секундой. Некоторые проницательные инвесторы уже вывели свои средства, но большинство акционеров могли лишь беспомощно наблюдать за тем, как их активы исчезают как пыль. Поначалу они утешали себя мыслью о "технической корректировке", но их надежды рухнули - это был настоящий обвал фондового рынка.\n\nНесмотря на попытки официальных и проправительственных СМИ преуменьшить значение этого обвала как ничем не отличающегося от предыдущих, по разным каналам СМИ стали появляться различные жалобы. Эти жалобы стали для недовольных онлайн-групп новым способом открытой или скрытой критики правительства."
 china.288.a: "Они были одержимы этим в прошлом, и они все еще одержимы этим сейчас."
 china.289.t: "Протест Рабочих"
 china.289.d: "В связи с нефтяным кризисом, приводящим к росту себестоимости продукции и стоимости жизни, в различных отраслях промышленности участились случаи прекращения работы и банкротства, что подрывает доверие тех, кто рассчитывает на заработную плату как источник средств к существованию. Вследствие этого уволенные работники в разных городах начали организовывать стихийные акции протеста. Разъяренные работники устраивают сидячие забастовки у государственных учреждений, чтобы выразить свое недовольство, или препятствуют работе правительства другими способами. Хотя масштабных насильственных инцидентов не было, фотографии и видеозаписи протестов широко распространились в социальных сетях, и число их участников продолжает расти. Сложившаяся ситуация перегрузила привычный оперативный потенциал правительства, вынудив чиновников дать конкретный ответ на обеспокоенность населения."
 china.289.a: "Суровое предупреждение."
 china.290.t: "Массовый  протест"
 china.290.d: "Нефтяной кризис продолжает оказывать сильное давление на общество, погружая массы в депрессию и чувство утраты. Это всепоглощающее разочарование в конечном итоге привело к широкомасштабным протестам в разных городах. Причины протестов разнообразны: бюрократическая некомпетентность, давнее неравенство и растущее чувство безнадежности в отношении будущего. Однако несомненно, что общая цель этих протестов - выразить недовольство действующим правительством. Официальные СМИ во многих регионах уже начали цензурировать новости, и это коллективное молчание только еще больше подогревает общественный гнев. Растущее недовольство усилило напряженную атмосферу в крупных городах, где все чаще звучат вопросы в адрес партии и правительства."
 china.290.a: "Все успокойтесь, все наладится."
 china.291.t: "Политическая Стабилизация"
 china.291.d: "После ряда усилий наше правительство наконец достигло консенсуса по текущим проблемам и устранило политические разногласия.\n\nТеперь правительственный механизм приведен в движение, и внимание переключается на решение технических вопросов, вынося их на открытую повестку дня и решая их один за другим, пока не будут устранены все следы этого кризиса. Со временем люди вспомнят о наших достижениях, и эти достижения восстановят их доверие к правительству. Это возрожденное доверие будет вдохновлять на дальнейшую преданность делу реализации грандиозной идеи омоложения китайской нации."
 china.291.a: "Стабильность превыше всего."
 china.292.t: "Экономическая Стабилизация"
 china.292.d: "В результате реализации нашей политики экономическая система с серьезными сбоями начала восстанавливаться.\n\nПрепятствия на пути экономического развития устраняются одно за другим, и сдерживающие факторы в нашей экономике снимаются. Заводы перезапускаются, предприятия возобновляют работу, а доверие к рынку постепенно восстанавливается. Используя преимущество Китая как страны, первой вышедшей из экономического кризиса, мы можем возобновить реализацию стратегий, которые были временно отложены на время спада. Реализация этих стратегий обеспечит стабилизацию мировой экономики."
 china.292.a: "Заполните пустые полки."
 china.293.t: "День Памяти Жертв Нанкинской Резни"
 china.293.d: "Прошел еще один год, и снова 13 декабря - День национального поминовения. В 1937 году, когда армия Национального правительства отступала из Нанкина, японские захватчики совершили ужасные военные преступления против беззащитных мирных жителей. Это событие, представляющее собой самое известное из зверств, совершенных японскими войсками на китайской земле, навсегда символизирует страдания китайской нации и запомнилось каждому поколению китайцев.\n\nКитайский общественный дискурс наполнен националистическими настроениями, которые по праву выражаются в этот памятный день. Как и другие страны, пережившие исторические травмы, выражают свое недовольство, так и Китай имеет право на выражение чувств, которые в обычные дни могут показаться радикальными. По сравнению с реальными военными преступлениями искренняя и сдержанная скорбь этой страны с ее огромным населением и сильной национальной властью является относительно умеренной."
 china.293.a: "Никогда не забывайте о национальном унижении, возрождайте Китай."
 china.294.t: "Падение Лже-Маоиста"
 china.294.d: "За месяц до смены руководства атмосфера в Пекине стала необычайно напряженной.Группа радикальных маоистов беспрецедентными методами получила контроль над аппаратом Политбюро.В новаторской статье они подвергли глубокой критике "мелкобуржуазный оппортунизм" нынешней политики.Вся акция была проведена так быстро, что к тому времени, когда People's Daily опубликовала свою редакционную статью, новое руководство уже было полностью сформировано.\n\nКлючом к этому сдвигу стало то, что радикалы даже получили значительную поддержку со стороны молодых кадров. В интервью ключевые лидеры подчеркивали: "Мы должны восстановить истинную массовую демократию и вернуть народу четыре свободы. Истинными хозяевами являются 99 % масс, а не 1 % корыстных интересов. Настало время для китайской нации внести свой вклад в мировую массовую политическую цивилизацию." Это кардинально изменило нынешний политический ландшафт.\n\nХотя реформаторы сохраняли абсолютное господство на протяжении десятилетий, радикалы никогда по-настоящему не исчезали - они просто ждали подходящего момента. Примечательно, что эти сторонники жесткой линии не просто повторяли прошлые модели, а предлагали новые инициативы, отвечающие современным условиям: отмена привилегий, расширение социальной защиты и восстановление четырех свобод, получившие значительную поддержку. Это свидетельствует о понимании ими современных условий. Заканчивается одна эпоха, и начинается другая, которая вызывает бурные общественные дискуссии."
 china.294.a: "Наше видение вновь стало ясным." 
 china.295.t: "Наш Истинный Рулевой"
 china.295.d: "Неожиданные кадровые перестановки застали всех врасплох. После вступления в должность нового руководства в Чжуннаньхае появилась знакомая фигура. Бо Силай - пожилой государственный деятель, некогда будораживший волны в Чунцине, вернулся на политическую сцену с невероятной энергией.\n\n"Народу нужен настоящий рулевой", - заявил Бо в своей инаугурационной речи.Несмотря на преклонный возраст, его голос оставался мощным.Он быстро объявил ряд новых политических мер, в частности, "Проект передачи красной песни новой эры" и "Массовую кампанию против преступности"\n\nЕще более удивительной была его поразительная энергия - в первый же день он проинспектировал три подразделения и спонтанно спел "Нет коммунистической партии, нет нового Китая." Что касается его возраста, то он просто улыбнулся и сказал: "Революционеры вечно молоды." Репортеры заметили, что в его кабинете по кругу играет "Великий Поход". Один из пользователей интернета прокомментировал это: "История иногда бывает волшебной - никогда не знаешь, какой поворот она примет в следующий раз.""
 china.295.a: "В конце концов он победил."
 china.296.t: "Оппозиция Подрывает Позиции КПК!"
 china.296.d: "Во время реформ Ху Чуньхуа внутри Коммунистической партии Китая начали нарастать недовольство и противоречия. Эти скрытые конфликты стали последней каплей, которая разрушила основы партии.\n\nСначала недовольство проявлялось в спорах и сопротивлении на местном уровне, но постепенно переросло в открытое требование о нелегитимности нынешнего Политбюро и призывы к проведению специального заседания для замены Ху Чуньхуа.\n\nСторонникам Ху Цзиньтао и реформистам пришлось приложить значительные усилия, чтобы предотвратить это. В результате начали появляться различные платформы, и партия оказалась в состоянии внутреннего конфликта. Многие радикальные реформаторы приветствовали это развитие событий, считая его признаком краха монополии на власть, которой обладала единственная партия. Вскоре после этого различные фракции провозгласили свою независимость и образовали независимые политические партии.\n\nСейчас Нху возглавляет уменьшившуюся фракцию КПК, состоящую в основном из его верных последователей и прагматичных личностей, которые признают, что будущее Китая лежит за пределами партии."
 china.296.a: "Новый Китай - Без КПК" 
 china.297.t: "Выборы в Китае"
 china.297.d: "Стрелки часов истории указывают на поворотный момент. Сегодня под торжественные звуки национального гимна началась вторая сессия Всекитайского собрания народных представителей. Согласно новой Конституции и Закону о выборах, в президентских выборах будут участвовать кандидаты, выдвинутые Коммунистической партией Китая, РКГ, РКДПК и Обществом Цзюсань. Процесс выборов строго придерживается принципов открытости, честности и справедливости, полностью обеспечивая демократические права каждого представителя и гарантируя, что результаты точно отражают волю народа.Итоги будут объявлены Президиумом Всекитайского собрания народных представителей и официально опубликованы в качестве национального сообщения.\n\nПосле окончания подсчета голосов в Большом зале народа воцарилась тишина. Почти 3 000 депутатов со всей страны затаили дыхание, ожидая объявления Президиума.\n\n"Согласно результатам выборов, следующим Председателем Китайской Народной Республики будет...""
 china.297.a: "Чжэн Цзяньбан - РКГ!"
 china.297.b: "У Вэйхуа - Общество "Цзюсань"!"
 china.297.c: "Ху Вэй - ККРДП!"
 china.297.f: "Ху Чуньхуа остается президентом!"
 china.298.t: "Награждение Чжун Наньшаня Медалью Республики"
 china.298.d: "Недавно председатель КНР Си Цзиньпин подписал президентский указ о награждении Чжун Наньшаня, которому уже более 80 лет, медалью Республики в знак признания его выдающегося вклада в борьбу с КОВИД-19. В официальном уведомлении о награждении медалью Республики подчеркивается, что после вспышки КОВИД-19 Чжун "осмелился лечить, осмелился говорить", выявил феномен "передачи вируса от человека к человеку", подчеркнул строгие меры профилактики и контроля, возглавил разработку программы лечения КОВИД-19 и внес значительный вклад в профилактику и контроль эпидемий, лечение тяжелых случаев и научные исследования. \n\nНесмотря на то, что Чжун был награжден высшей почетной медалью Китайской Народной Республики, что свидетельствует о признании страной его работы, в интернете он остается противоречивой фигурой. Многие пользователи сети ставят под сомнение его публичные высказывания, приводя различные социальные примеры и обвиняя его в причинении вреда своими рекомендациями по приему лекарств и поддерживаемыми правительством мерами профилактики и лечения. Исключая нейтральные стороны, китайские официальные СМИ и другая часть поддерживающих его пользователей интернета осудили эту критику как распространение слухов и кибернасилие, утверждая, что его недоброжелатели либо проплачены Западом, либо введены в заблуждение. В целом общественное мнение Китая продолжает поддерживать вручение награды."
 china.298.a: "Чжун Наньшань Китайского Народа!"
 china.299.t: "Ли Вэньлян Скончался"
 china.299.d: "Сегодня умер Ли Вэньлян, врач, известный как "информатор" о КОВИД-19. Первым обнаружив новый коронавирус, он превратился из обычного медицинского работника Уханьской центральной больницы в общественную фигуру, признанную во всей стране. Его решительные действия по информированию коллег, несомненно, спасли множество жизней по всему миру, заслужив благодарность и восхищение многих китайцев.\n\nПосле известия о его смерти почти весь Китай погрузился в глубокую скорбь. Появились различные памятные мероприятия, и многие китайцы вспоминали доктора. Ли Вэньлян был неоднозначной фигурой; полиция вынесла ему предупреждение и замечание за "размещение неправдивых заявлений в Интернете", и это предупреждение до сих пор не снято, что вызвало большое недовольство общественности.\n\nОбщественное мнение о нем остается разделенным даже после его смерти. Одни спорят о том, был ли он героем, другие утверждают, что его личное наследие не стоит преувеличивать. Многие последующие споры были сосредоточены на том, следует ли "употреблять покойника" для публичного обсуждения. Несмотря на эти различные точки зрения, преобладающим чувством была скорбь по поводу его смерти."
 china.299.a: "Мертвый - благородный."
 china.300.t: "НОАК Спешит на Помощь в Ухань"
 china.300.d: "Тяжелые облака заслоняли небо, едва позволяя разглядеть очертания раскинувшегося внизу города. Неоновые огни изредка окрашивали облака в фиолетовый или оранжево-желтый цвет.\n\nОднако Чэнь Цзыхуа, сидевший в транспортном самолете Y-20, ничего этого не видел. Пока самолет с ревом снижался, он нервно вспоминал события четырехчасовой давности. Разбуженный сигналом тревоги, он быстро выскочил из самолета, чтобы услышать речь командира. Он и его товарищи были выбраны в качестве первой группы для поддержки Уханя. Наскоро написав письмо семье - возможно, прощальное, - эти молодые люди вместе с ящиками медикаментов пересекли половину Китая, чтобы добраться до пострадавшего от стихии города.\n\nПод мерцающими лампами Чен молча наблюдал за своими товарищами. "Большой Тигр" спокойно спал даже в тряском самолете; "Молот" крепко сжимал в нагрудном кармане фотографию, вероятно, своей девушки. Инструктор, сидевший ближе всех к двери кабины, расслабленно вскинул брови, а его глаза были полны бодрости. Он вел команду на рискованное задание и ему это казалось просто очередной тренировкой на полигоне. Глядя на его спокойное лицо, Чен почувствовал, как его собственный страх постепенно рассеивается.\n\nЗатем с глухим стуком шасси коснулись взлетной полосы, и самолет тяжело приземлился. Не успел он полностью остановиться, как солдаты начали вставать, собирая снаряжение и припасы. Дверь кабины медленно опустилась, инструктор встал и повернулся к солдатам, крикнув громким голосом: "Товарищи...""
 china.300.a: ""Пришло время партии и народу увидеть, из чего мы сделаны!""
 china.301.t: "Переворот Автобуса с Карантинной Службой"
 china.301.d: "В провинции Гуйчжоу на шоссе между Саньду и Либо в префектуре Цяньнань перевернулся автобус, перевозивший сотрудников карантинной службы, и упал в глубокий кювет. В результате аварии погибли 27 человек, еще 20 получили ранения. Четверо из них получили серьезные травмы, но их состояние не угрожает жизни, а состояние остальных 16 человек стабильно.\n\nСразу же после происшествия соответствующие органы приняли меры. Китайские чиновники быстро выразили свою скорбь и решимость в социальных сетях. Причина происшествия все еще расследуется, но три чиновника уже отстранены от своих должностей."
 china.301.a: "Ужас..."
 china.302.t: "НОАК Защищает Хубэй от Ковида-19"
 china.302.d: "Стремительное распространение вируса Ковид-19 серьезно нарушило порядок в провинции Хубэй. Люди игнорируют ограничения на движение и поездки, введенные провинциальным правительством, и стараются уехать из городов, где произошла вспышка заболевания, в результате чего сеть автодорог провинции полностью забита. Учитывая, что Хубэй славился как центральный транспортный узел, нынешний хаос выглядит весьма парадоксально.\n\nЭто действительно критический момент, и гражданские учреждения не в состоянии в одиночку контролировать эпидемию и восстановить порядок. Поэтому Центральная военная комиссия отдала приказ войскам Центрального театрального командования НОАК спешить на помощь Хубэю в первую очередь, а за ними должны последовать подразделения из других регионов. Многочисленные медицинские бригады прибыли в аэропорт Ухань на транспортных самолетах, а срочно необходимые медицинские материалы, включая маски, защитную одежду и этиловый спирт, были доставлены в район эпидемии с помощью военно-транспортных средств и железнодорожных линий. Офицеры и солдаты НОАК официально возьмут на себя ответственность за поддержание общественного порядка во всей провинции. В то же время на них возлагаются трудные задачи по распределению предметов первой необходимости, строительству временных больниц и убежищ, а также оказанию помощи медицинскому персоналу в проведении лечения."
 china.302.a: "НОАК - это якорь стабильности."
 china.303.t: "Дорога Домой"
 china.303.d: "По мере распространения пандемии завод Foxconn в Чжэнчжоу, провинция Хэнань, неизбежно пострадал от неё. Этот крупный промышленный парк, в котором работают сотни тысяч человек, также ввёл множество мер по борьбе с COVID-19. Однако по мере усиления пандемии и роста числа подтверждённых случаев количество ресурсов сокращалось. Из-за нехватки мест заболевших изолировали в общежитиях. Логистическая поддержка прекратилась, что привело к серьёзной нехватке продовольствия и медикаментов. Тем не менее, завод так и не обнародовал количество подтверждённых случаев, оставив работников строить догадки о ситуации с заражением в личных групповых чатах. Страх заразиться привёл к массовым прогулам на производственной линии.\n\nСлухи и паника охватили завод. Широкая огласка последствий заражения в обществе ещё больше напугала работников, что в конечном итоге подтолкнуло их к решению вернуться домой. Работники обходили охрану, перелезали через стены и проползали в дыры, чтобы уйти, и проходили десятки или даже сотни километров по шоссе, чтобы вернуться домой. Многие сердобольные граждане разложили еду и воду вдоль дорог, чтобы помочь пострадавшим, а некоторые водители из сострадания рискнули отвезти людей обратно в их родные города.\n\nНа сегодняшний день компания Foxconn не прокомментировала ситуацию."
 china.303.a: "Вздох..."
 china.304.t: "Наконец-то Свободен"
 china.304.d: "Выйдя за ворота тюрьмы, Чжун Юнцзи почувствовал, что всё вокруг кажется ему необычайно незнакомым. Более десяти лет, проведённых за решёткой, превратили бывшего заместителя директора Бюро общественной безопасности в пожилого мужчину с седеющими висками и шаркающей походкой. Одетый в старую куртку и с потрёпанным портфелем в руках, он смотрел на высотные здания вдалеке, и его сердце переполняли смешанные чувства. В 2012 году он был заключен в тюрьму за "незаконное ношение и чтение реакционных книг", и его былая власть и статус исчезли в одно мгновение. Чжонг бесцельно бродил по улице, пока не увидел приближающееся такси. Он махнул рукой, и такси медленно остановилось рядом с ним. Такси везло его по улицам, где все претерпело огромные изменения, за исключением него, который, казалось, застрял в прошлом.\n\nЧерез некоторое время такси остановилось. Чжун расплатился, вышел из машины и огляделся - здания выглядели ещё более обветшалыми, чем он помнил. Часть штукатурки отвалилась, обнажив серые кирпичи, а в коридоре стоял затхлый запах.\n\nГлубоко вздохнув, Чжун вошёл в коридор. Ориентируясь по памяти, он нащупал дорогу к двери своего дома. Когда он посмотрел на ржавую железную дверь, его рука задрожала. Он не мог вспомнить, сколько лет прошло. Он медленно поднял руку, чтобы постучать, но она была такой тяжёлой, что он едва мог её поднять. "Тук-тук-тук..." После долгого колебания..."
 china.304.a: "За дверью было лицо, о котором он мечтал днем и ночью..."
 china.305.t: "Красный Феникс"
 china.305.d: "Почти 100 лет назад слабые партизанские отряды под предводительством Мао решительно двинулись в сторону скалистых гор. Даже самые смелые прорицатели не осмеливались утверждать, что они освободят весь Китай. Однако в конечном счёте они потерпели неудачу - не из-за внешних врагов, а из-за внутренних предателей. Так называемый "социализм с китайскими особенностями" на самом деле полон капиталистических черт. Сорок лет реформ и открытости привели к массовой бедности и неравенству, а экономический рост принёс пользу лишь меньшинству. Часто задаваемый вопрос: почему социализм делает бедных ещё беднее, а богатых - ещё богаче? Кажется, ни у кого нет ответа. В этом контексте люди вспоминают мечты, которые угасали с годами. Новое правительство Ху Цзиньтао решительно настроено вернуть эти утраченные мечты, как бы трудно это ни было. Независимо от того, выберут ли они старый путь эпохи Мао или новый, неизведанный путь, они стремятся найти идеальную утопию. Эта вторая революция направлена на то, чтобы свергнуть систему неравенства, созданную ревизионистами, и построить новый мир на её руинах."
 china.305.a: "Достижение нирваны."
 china.306.t: "CCTV Критикует Реакционное Конфуцианство"
 china.306.d: "На протяжении многих лет просмотр образовательных программ на научно-образовательном канале Центрального телевидения Китая после ужина был неизменной традицией семьи Чжан, охватывающей три поколения.\n\nЧжан Шили всегда был поклонником этой программы. Как старый член партии и ученый, придерживающийся традиционных китайских ценностей, он верил, что почтение к председателю Мао и уважение к Конфуцию могут гармонично сосуществовать. Однако сегодня вечером в программе было что-то не так. Хотя уважаемый профессор на экране обсуждал "Лунь Юй" и "Книгу о сыновней почтительности", его тон не был привычным: "применяем старое, чтобы служить настоящему". Вместо этого профессор говорил о "классовых ограничениях Конфуция". Слушая это, дедушка Чжан почувствовал странное беспокойство в груди. \n\n"Сынок, что ты думаешь о том, что он говорит?" Он наклонил голову в сторону Чжан Чжуншу. Чжуншу, который печатал сообщение в телефоне, быстро взглянул на телевизор, прежде чем полусерьёзно-полуотвлечённо ответить: "Я думаю, что мы, дети, всё равно должны быть послушными и хорошо относиться к своим родителям"."Дедушка, я думаю, что профессор прав, - вмешалась Керен. - Хорошо относиться к родителям и бабушкам с дедушками важно, но у детей тоже есть своя жизнь". Особенно после того, как они вырастут…"\n\nДедушка Чжан промолчал, и его лицо помрачнело. Его трость с громким стуком ударилась об пол."
 china.306.a: "Дети и их бунтарство... В наши дни в школах учат не тому, чему нужно..." 
 china.307.t: "Человек Из Прошлого"
 china.307.d: "Традиционно партия занимает твёрдую, но милосердную позицию по отношению к тем, кто потерпел неудачу в политической борьбе или совершил ошибки на своём политическом пути. После того как этих стареющих деятелей лишают политического влияния, им спокойно позволяют доживать свои дни под видом "медицинского освобождения" в каком-нибудь живописном и спокойном месте. Многим бывшим политическим заключённым казалось, что такая судьба уготована им навечно. Однако недавнее решение Центрального комитета Коммунистической партии изменило судьбы многих. В прибрежном городе Далянь, который когда-то был прекрасным "городом-садом" на севере и гордился успешным городским управлением, бывший мэр Даляня и бывший член Политбюро Бо Силай смотрит телевизор. Среди шума и суеты за пределами санатория время от времени раздаются шёпоты воспоминаний, связывающие его имя с былой славой города. \n\nВедущий новостей чётко и ясно рассказывает о новой политике партии. Бо нажимает на кнопку перемотки, чтобы ещё раз послушать новости, а потом ещё раз, и ещё, пока его некогда сильные руки слегка не задрожат, а по морщинистому лицу не потекут слёзы. \n\nОн был свободен. Бо подумал про себя. Проведя более десяти лет в заточении, он снова сможет свободно ходить по этой земле. Хотя его слава и амбиции давно померкли, свежий воздух Даляня никогда не был таким сладким, как в этот момент."
 china.307.a: "После столь долгого заточения он вновь обрел свободу на природе..."
 china.308.t: "Правильный Кокос, Не В Том Месте..."
 china.308.d: "Ужасные новости!\n\nГенеральный секретарь Ху Чуньхуа недавно посетил один из крупнейших публичных зоопарков в Пекине. С самого начала дня всё пошло не так. Во-первых, автомобиль председателя пришлось заменить из-за неисправного двигателя. Затем, по пути в зоопарк, кортеж едва не попал в аварию из-за ошибки водителя на перекрёстке.\n\nПроблемы продолжились, когда генеральный секретарь прибыл в зоопарк. Несмотря на предварительное уведомление, персонал отреагировал с шоком и удивлением. Но настоящая трагедия произошла, когда, глядя на вольер с обезьянами, генеральный секретарь, по-видимому, указал на макаку. По какой-то причине это разозлило обезьяну.\n\nТо ли из личной мести, то ли в приступе ярости обезьяна бросила большой кокос в голову Ху. Генеральный секретарь тут же упал на пол. Секретная служба вместе с сотрудниками зоопарка как можно быстрее доставили Ху Чуньхуа в специализированную больницу, несмотря на пробки на дорогах..."
 china.308.a: "Ху Чуньхуа, к счастью, выжил!"
 china.308.b: "Ху Чуньхуа скончался от черепно-мозговой травмы, Политбюро проводит экстренное заседание..."
 china.309.t: "Реформирование НПКСК"
 china.309.d: "Всекитайское собрание народных представителей, некогда являвшееся одним из высших органов государственной власти, долгое время рассматривалось лишь как церемониальный орган - "ваза для цветов", в которой тихо доживают свой век вышедшие на пенсию партийные кадры и элитные члены некоммунистических партий. Однако под бдительным оком генерального секретаря ситуация должна измениться. \n\nВ новой партийной резолюции большое внимание уделяется роли единого фронта, а также возлагаются большие надежды на будущую миссию Всекитайского собрания народных представителей в продвижении социалистического развития. Его нынешние полномочия в виде "консультаций" и "внесения предложений" будут усилены, что позволит ему официально участвовать в законодательной деятельности Всекитайского собрания народных представителей. Более того, влияние профессионалов в рамках НПКСК будет еще более расширено. Эти реформы навевают воспоминания о начале 2000-х годов, когда бывший председатель НПКСК Ли Жуйхуань, бывший рабочий, предложил аналогичное направление.\n/ В дальнейшем состав представителей НПКСК будет уточнен и усовершенствован. Такие организации, как Коммунистический союз молодёжи, из которого вышел сам генеральный секретарь Ху Цзиньтао, Всекитайская федерация профсоюзов, представляющая интересы рабочих, Всекитайская федерация женщин и другие, получат более широкое представительство и влияние в обновлённом Всекитайском комитете Народного политического консультативного совета Китая. Вместе они будут активнее участвовать в политическом процессе."
 china.309.a: "Увядшее дерево снова расцветает." 
 china.310.t: "Молодежный Социалистический Патриотизм"
 china.310.d: "При активной поддержке Центрального комитета различные отделы КСМ активно участвуют в жизни общества в разных сферах. Отдел по работе с молодёжью запустил общенациональную инициативу "Растем вместе с нацией", интегрируя трудовое воспитание в повседневную жизнь учащихся начальных классов. В средних школах и университетах CYLC возглавила "Проект по подготовке молодых марксистов". Этот проект не только внедряет новую политику партии в программы политического образования и национальной обороны, но и мобилизует студентов для участия в трудовой деятельности, волонтёрской преподавательской деятельности и общественных работах. В ответ на вызовы цифровой эпохи и при поддержке Центрального отдела пропаганды инициатива "Вся Лига в сети, служим всей Лиге" превратила China Youth Online в ключевую платформу для идеологической работы. Эта инициатива знакомит молодёжь с важными партийными и государственными праздниками, историческими событиями, образцовыми гражданами и героическими личностями. Она также объединяет патриотические молодёжные организации и онлайн-активистов, распространяя влияние Партии и Лиги на все аспекты жизни молодёжи."
 china.310.a: "Славное дело, ведущее в будущее."
 china.311.t: "МГБ: Доклад о положении дел в Америке"
 china.311.d: "\n\n\n                  £GFX_MSS_event_texticon   \n\n\n\n\nУважаемый товарищ Президент,\nБюро международной разведки МГБ, в соответствии с Вашими приказами, собрало и проанализировало последние разведданные о последних политических событиях и социальной обстановке в Соединенных Штатах. Мы считаем, что рост политического экстремизма и социального раскола в США еще больше подорвет национальную стабильность страны и окажет глубокое влияние на согласованность и эффективность ее внутренней и внешней политики.\nПо мере приближения даты президентских выборов в США конфликт между популистской политической группой, сосредоточенной вокруг президента Дональда Трампа, и политическим альянсом против Трампа достигнет кульминации. Из-за переплетения последствий торговой войны между Китаем и США, пандемии КОВИД-19 и различных других факторов постепенно растет число групп, недовольных администрацией Трампа, включая как леворадикальные, так и крайне правые силы. Между тем политическая деятельность протрамповских групп также становится все более активной, а насильственные конфликты учащаются.\nЭто еще раз демонстрирует прозорливость вашего утверждения о том, что "мир переживает изменения, невиданные за столетие". МГБ, обобщив соответствующие разведданные, рекомендует Центральному комитету и Центральному народному правительству продолжать поддерживать высокий уровень внимания и готовиться к вероятности возникновения новых событий типа "черный лебедь"\n\nС уважением к Вам,"
 china.311.a: "Министр государственной безопасности, Чэнь Вэньцин"
 china.312.t: "МГБ: Отчет о полном хаосе в Америке"
 china.312.d: "\n\n\n                  £GFX_MSS_event_texticon   \n\n\n\n\nСогласно соответствующим решениям Политбюро, МГБ продолжает внимательно следить за внутренней ситуацией в США и еще больше расширяет деятельность своей разведывательной сети и агентуры. Раскол внутри США уже предрешен, а насильственные конфликты переросли в многофракционную политическую борьбу. МГБ собрал соответствующие отчеты и настоящим представляет краткое резюме Политбюро.\nВо-первых, существуют силы внутри двух основных правящих партий в США, в основном представленные конституционалистами во главе с Дональдом Трампом и союзным правительством во главе с Джозефом Байденом. В настоящее время Трамп и его сторонники постепенно отступают в Денвер (штат Колорадо), противостоя лагерю Байдена.\nДалее, из американских низовых политических движений появляются различные сепаратистские силы, среди которых наиболее заметной является Патриотический фронт. В основном они придерживаются радикальных популистских и националистических взглядов и в целом могут быть классифицированы как неофашисты. Не стоит игнорировать и деятельность более экстремальных организаций альтернативно-правых.\nНа Западном побережье, особенно в Калифорнии, возникли многочисленные левые силы, в том числе несколько местных партий, открыто стоящих на социалистических позициях. Предполагается, что они начали обсуждать возможность формирования единого фронта и встали на путь вооруженной революционной борьбы. Несмотря на неопределенность перспектив, это событие может иметь большое значение для нашей страны.\n\nС уважением к вам,"
 china.312.a: "Министр государственной безопасности, Чэнь Вэньцин"
 china.313.t: "Китайско-американские Ученые Ищут Убежища в Китае"
 china.313.d: "После начала гражданской войны в США и последующего краха низового управления политически нейтральные люди столкнулись с повышенным риском, что вынудило многих из них искать более безопасные альтернативы. Среди них много ученых китайского происхождения.\n\nМногие из них обратились в посольство Китая в США с просьбой предоставить им убежище в Китае. Китайское правительство проявило живой интерес и оказало помощь в эвакуации. Пекин выделил несколько мест для их расселения, чтобы обеспечить им высокий уровень жизни по прибытии в Китай. Тем временем китайская общественность, движимая чувством родства, тепло приняла этих высокообразованных профессионалов, оказав влияние на тех, кто все еще сомневался, чтобы принять решение о переезде в Китай."
 china.313.a: "Добро пожаловать домой!"
 china.314.t: "Эра Электромобилей?"
 china.314.d: "По мере того как негативное влияние нефтяного кризиса на нашу экономику постепенно ослабевает, многие люди снова могут вывести свои автомобили Volkswagen или Audi из гаража, заправить бензин в баки и выехать на трассу. Однако водителей может удивить отсутствие забитых до отказа заправок и криков "Залейте 94 октан!" или "Залейте 96 октан!". Причина становится понятной, когда смотришь на дороги, где сейчас оживленное движение и повсюду зеленые номерные знаки электромобилей.\n\nНефтяной кризис серьезно повлиял на традиционную автомобильную промышленность Китая, но ускорил развитие новых энергетических транспортных средств. Лидером стала компания BYD Auto, за ней последовали такие развивающиеся компании, как NIO и Xpeng Motors. Эти компании, обладающие многолетним техническим опытом и благоприятной государственной политикой, быстро захватили значительную часть автомобильного рынка Китая и начали экспортировать свою продукцию за рубеж. Иностранные конкуренты, которые раньше считали китайские автомобили некачественной имитацией, были поражены, обнаружив, что китайские автомобили заняли значительную часть их традиционных рынков, причем качество их продукции значительно улучшилось."
 china.314.a: "Может, мне тоже стоит купить BYD?"
 china.315.t: "Массовые Нападения на Иностранцев в Китае"
 china.315.d: "В последнее время международное внимание привлекла серия нападений на граждан Японии и других иностранцев в Китае. Эти инциденты произошли в основном в прибрежных городах и некоторых внутренних районах, в них пострадали иностранные бизнесмены, сотрудники посольств и члены их семей. Представитель Министерства иностранных дел Китая категорически отрицает факт этих предполагаемых нападений, подчеркивая, что в Китае поддерживается высокий уровень общественной безопасности и обеспечивается всесторонняя защита иностранцев. Он также призвал внешние силы прекратить порочить репутацию Китая ложными обвинениями.\n\nВ ответ японское правительство направило Китаю официальный протест, призывая усилить защиту японских граждан. Другие страны, включая Австралию, Южную Корею и Индонезию, также выразили обеспокоенность и посоветовали своим гражданам в Китае проявлять осторожность. Некоторые аналитики предполагают, что недавние нападения могут быть связаны с напряженными китайско-японскими отношениями и сохраняющимися предрассудками и дискриминацией в отношении иностранцев среди некоторых китайских граждан. Другие предполагают, что определенные группы или отдельные лица могут подстрекать националистические настроения за кулисами.\n\nКитайская полиция начала расследование, и некоторые подозреваемые уже задержаны. Китайское правительство также усилило меры безопасности в местах, часто посещаемых иностранцами. Тем не менее, за ситуацией нужно будет внимательно следить и дальше."
 china.315.a: "Похоже боксёры возвращаются"
 china.316.t: "Новый Нарратив "Трёх Тел""
 china.316.d: "В рамках пропагандистской кампании "Единый фронт" во время Гражданской войны в США АНОА недавно выпустила новый фильм через свои подконтрольные видеоканалы и онлайн-платформы потокового вещания. Удивительно, но фильм является адаптацией научно-фантастической серии "Проблема трех тел" китайского автора Лю Цысиня. Книга, получившая премию "Хьюго" в 2015 году, была высоко оценена такими известными личностями, как Барак Обама. Чтобы угодить американской аудитории, в фильм включили более разнообразных персонажей, сократив при этом роли главных китайских героев, что вызвало критику со стороны поклонников оригинального романа.\n\nВ центре сюжета - две контрастные фигуры. Один из них - бывший командир морской пехоты, традиционная элита WASP, который ведет свой военный корабль прочь от флота, чтобы избежать уничтожения новым инопланетным оружием. Его суровые методы выживания, жертвование товарищами ради отбора группы "элиты судного дня", в конечном итоге приводят к гибели, поскольку его предают подчиненные. С другой стороны, бывший врач, ставший политиком, в образе американки индийского происхождения, приходит к власти, пропагандируя идеи "любви" и "радости" в эпоху после сдерживания, заручаясь поддержкой молодого поколения. Однако ее кажущаяся слабость открывает дверь для вторжения инопланетного флота на Землю.\n\nПосле выхода на экраны фильм вызвал широкое обсуждение. Его высоко оценили за потрясающие визуальные эффекты, особенно впечатляющие в условиях военного времени, но открытые политические метафоры привлекли внимание и вызвали различные интерпретации."
 china.316.a: ""Марш вперед! Всеми возможными способами!" - Диалог из фильма"
 china.317.t: "Кризис Сельских Банков"
 china.317.d: "В провинции Хэнань четыре сельских банка внезапно и без предварительного предупреждения почти одновременно закрыли свои каналы онлайн-снятия и перевода средств. В результате многие вкладчики столкнулись с трудностями при снятии средств. Новость быстро распространилась по социальным сетям и обществу, вызвав всеобщую панику. Эта ситуация привлекла внимание властей. Китайская комиссия по регулированию банковской и страховой деятельности поручила местному бюро по регулированию сотрудничать с местными органами власти и соответствующими ведомствами для проведения оперативного расследования и принятия надлежащих мер. В настоящее время депозитные услуги в этих отделениях сельских банков работают нормально, с полной юридической защитой."
 china.317.a: "Очередная "черная пятница"?"
 china.318.t: "Долговой Кризис Evergrande"
 china.318.d: "С тех пор как правительство скорректировало политику в отношении сектора недвижимости, Evergrande Group с трудом справляется с новой динамикой рынка. Это привело к чрезмерной долговой нагрузке, накопленной за годы работы. Хотя Evergrande Group пыталась принять упреждающие меры по управлению долговыми рисками, сокращение финансирования со стороны многочисленных финансовых учреждений усугубило ее долговые проблемы, что привело к серьезному финансовому кризису. В конце концов, компания Evergrande Real Estate Group оказалась под следствием, а к ее председателю Сюй Цзяину были применены меры правового принуждения в связи с предполагаемой преступной деятельностью."
 china.318.a: "Падение одного кита повлияет на всю экосистему."
 china.319.t: "Речь Джека Ма в Бунде"
 china.319.d: "Недавно значительные изменения в нормативно-правовой базе финансовых технологий привели к вызову в суд фактического контролера Ant Group. В результате Шанхайская и Гонконгская фондовые биржи объявили о приостановке листинга Ant Group, что вызвало широкое общественное внимание и дискуссии. Некоторые представители отрасли считают, что приостановка листинга Ant Group, скорее всего, напрямую связана с критическими комментариями Джека Ма в адрес китайской системы регулирования, сделанными им на форуме China Financial Forty Forum."
 china.319.a: "Слова приводят к катастрофе."
 china.320.t: "Наводнение в Хэнани"
 china.320.d: "В провинции Хэнань выпали беспрецедентные и катастрофические осадки, от которых пострадали 14,78 миллиона человек в 150 уездах 16 городов. Сильнейший ливень привел к трагическим инцидентам, в частности, к затоплению 5-й линии метро Чжэнчжоу, что привело к человеческим жертвам. В настоящее время Государственный совет направил следственную группу для оценки последствий этого стихийного бедствия и решения проблем, выявленных в ходе ликвидации последствий чрезвычайной ситуации."
 china.320.a: "Вода Беспощадна."
 china.321.t: "Принятие Закона о Национальной Безопасности Гонконга"
 china.321.d: "На 20-й сессии Постоянного комитета Всекитайского собрания народных представителей 13-го созыва был принят Закон Китайской Народной Республики об обеспечении национальной безопасности в Специальном административном районе Гонконг, который вступил в силу после его обнародования. В ответ на социальные беспорядки в Гонконге, включая такие шокирующие действия, как поджоги и нападения, запечатленные камерами СМИ, принятие этого закона направлено на наказание такого поведения, что нашло поддержку как у жителей материка, так и у жителей Гонконга."
 china.321.a: "Ловите Экстремистов!"
 china.322.t: "Национальная Конференция по Подведению Итогов и Награждению за Борьбу с Бедностью"
 china.322.d: "Агентство Синьхуа сообщило, что в Большом народном зале в Пекине состоялась торжественная конференция по подведению итогов и награждению участников национальной стратегии борьбы с бедностью. Цель конференции - объявить и отпраздновать всеобъемлющую победу национальной стратегии борьбы с бедностью, а также наградить людей, внесших выдающийся вклад в борьбу с бедностью за последние несколько лет. В докладе подчеркивалось, что в соответствии с нынешними стандартами благосостояния все 98,99 миллиона сельских бедняков были избавлены от бедности, все 832 обнищавших уезда были исключены из списка, а все 128 000 обнищавших деревень были исключены из списка, что позволило эффективно решить проблему общей региональной бедности в Китае."
 china.322.a: "Восторженные аплодисменты."
 china.323.t: "110-я годовщина Синьхайской Революции"
 china.323.d: "Агентство Синьхуа сообщило, что в Большом народном зале в Пекине состоялась торжественная церемония, посвященная 110-й годовщине Синьхайской революции. На мероприятии чествовали революцию Сунь Ятсена, свергнувшую династию Цин в 1911 году. Кроме того, оно подчеркнуло историческую легитимность Коммунистической партии Китая. Председатель Всекитайского комитета НПСК Ван Ян председательствовал на заседании, а председатель КНР Си Цзиньпин выступил с речью."
 china.323.a: "Восторженные аплодисменты."
 china.324.t: "Перебои в Подаче Электроэнергии в Континентальном Китае"
 china.324.d: "Из-за пандемии COVID-19, вызвавшей дисбаланс спроса и предложения в мировой торговле и рост цен на сырье, а также стремления китайского правительства направить экономику в "зеленое русло", в ряде регионов Китая возник дефицит электроэнергии. В связи с этим местные власти ввели политику ограничения подачи электроэнергии, чтобы решить эту проблему. Хотя масштабных отключений электроэнергии не произошло, эти меры по ограничению подачи электроэнергии вызвали панику среди населения."
 china.324.a: "Издержки индустриализации."

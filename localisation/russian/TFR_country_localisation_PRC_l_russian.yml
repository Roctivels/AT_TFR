 PRC_MSS_science_triumph: "Наше Светлое Будущее"
 PRC_MSS_science_triumph_desc: "\n\n\n\n\n£GFX_PRC_MSS_science_triumph_banner\n\n\n\n\n\n\n\nПод бескрайними небесами Китая, подобно пылающему созвездию, горит заря науки, разрывая пелену невежества и освещая новую эру. Под блестящим руководством председателя Чэнь Вэньцина Министерство государственной безопасности и выдающиеся ученые Китайской академии наук объединились в священной миссии - создать верную, чистую и передовую нацию - утопию за гранью обыденности, вечно хранящую порядок. Здесь оковы мышления полностью разрушены, барьеры морали поглощены сиянием науки, а будущее человечества формируется благодаря безграничному разуму и силе. [PRC_display_anti_technocratic_movement] [PRC_display_MSS_support] [PRC_display_scientists_faction_support]"

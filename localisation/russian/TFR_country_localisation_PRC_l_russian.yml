 #Events
 china.2.t: "Подготовка к вторжению на Тайвань"
 china.2.d: "Си взмахнул рукой в знак молчания, и напряженные дебаты тут же смолкли. Бумаги и пепельницы, полные окурков, завалили длинный стол из красного дерева, и в комнате воцарилась полная темнота, если не считать слепящего сияния гигантского экрана за спиной Си, на котором отражалась карта Тайваньского пролива.\n "Бессмысленно продолжать спорить". Тон Си был непререкаем. "Товарищ генерал прав, с точки зрения международной ситуации и подготовки к военной борьбе, сейчас прекрасная возможность освободить Тайвань, и если мы ее проигнорируем, то станем вечными грешниками нашей родины и нации. Я объявляю о начале реализации плана 001 для войны против Тайваня."\nНа левой стороне стола гражданские чиновники в ужасе смотрели друг на друга. Премьер Госсовета поднял очки и обеспокоенно сказал: "Товарищ президент, это решение может привести к осуждению и экономическим санкциям со стороны международного сообщества... Я уже предвижу это...\nЗаместитель председателя Центральной военной комиссии, сидевший с другой стороны, немедленно вскочил со своего места и радостно поприветствовал: "Спасибо Вам, Президент, за доверие. Мы оправдаем ожидания партии и народа, выполнив миссию безупречно!"" Генералы также присоединились к приветствиям и крикам. Генеральный секретарь, как всегда, бесстрастно наблюдал за поведением своих подчиненных."
 china.2.a: "Не начинайте драку, но и не отступайте, если вы в ней участвуете."
 china.3.t: "Президент Си посещает Мьянму"
 china.3.d: "Председатель КНР Си Цзиньпин посетит Мьянму с государственным визитом с 17 по 18 января. Это первая зарубежная поездка председателя Си Цзиньпина в этом году и первый визит китайского президента в Мьянму за 19 лет. Этот визит имеет большое и особое значение с точки зрения развития прошлого и открытия будущего для развития китайско-мьянманских отношений, поскольку он совпадает с 70-й годовщиной установления дипломатических отношений между двумя странами. Мьянма - дружественный сосед Китая.\n\nПредседатель Си Цзиньпин посетит ряд государственных мероприятий, которые проведет президент У Вин Мьин, проведет переговоры с государственным советником Аун Сан Су Чжи, а также примет участие в церемонии обмена документами о двустороннем сотрудничестве и небольшом банкете, который проведет Аун Сан Су Чжи. Председатель Си Цзиньпин встретится с главнокомандующим вооруженными силами Мьянмы Мин Аун Хлайном, пообщается с лидерами парламента Мьянмы и политических партий и совместно примет участие в мероприятиях, включая празднование 70-летия установления дипломатических отношений между двумя странами и церемонию запуска года Китайско-Мьянманской культуры и туризма с участием главных лидеров Мьянмы. Обе стороны также выступят с совместным заявлением."
 china.3.a: "За мирное сосуществование!"
 china.4.t: "Нефтяной Кризис обрушился на Китай"
 china.4.d: "Сегодня крах международного рынка, вызванный скачком цен на нефть и крахом экономики Саудовской Аравии из-за гражданской войны в Саудовской Аравии, ударил по Китаю. Шанхайская и Гонконгская фондовые биржи достигли рекордных минимумов, поскольку ведущие экономисты прогнозируют, что ситуация будет только ухудшаться. Более того, колебания, вызванные крахом Нью-Йоркской фондовой биржи и массовыми экономическими проблемами за рубежом, также вызвали колебания в китайской экономике, заставив миллионы компаний увольнять работников. Очевидно, что пароход прогресса, который КПК обеспечивал в течение последних 50 лет, замедлился и остановился, поскольку китайская экономика, похоже, приближается к остановке."
 china.4.a: "О боже..."
 china.5.t: "Первая смерть от Ковид-19"
 china.5.d: "61-летний мужчина, который был госпитализирован после того, как страдал от одышки и тяжелой пневмонии в центральном китайском городе Ухань, скончался в четверг, сообщили власти. Муниципальная комиссия здравоохранения Уханя сообщила, что 41 человек находится на больничном карантине с подозрением на заражение таинственным вирусом, семеро из которых находятся в критическом состоянии. Они сообщили, что 739 случаев тесного контакта находились под медицинским наблюдением, что больше по сравнению с предыдущими 163 случаями. 419 из этих случаев связаны с медицинским персоналом.\n\nЛечение не улучшило его симптомы после того, как он был госпитализирован, и он умер вечером 9 января, когда у него отказало сердце. Он добавил, что его тест на вирус дал положительный результат.\n\nПредварительное расследование выявило респираторное заболевание как новый тип коронавируса, сообщили в четверг государственные СМИ со ссылкой на ученых, проводивших исследование."
 china.5.a: "Надеюсь, хуже не станет"
 china.10.t: "Установлено, что вспышка в Ухане вызвана коронавирусом"
 china.10.d: "Первоначальная информация о случаях пневмонии в Ухане, предоставленная нашими учеными, включая род занятий, местоположение и профиль симптомов у пострадавших людей, указывала на коронавирус как на возможный патоген, вызывающий это скопление. Впоследствии наши ученые сообщили, что лабораторные тесты исключили SARS-CoV, MERS-CoV, грипп, птичий грипп, аденовирус и другие распространенные респираторные патогены.\n\nЧисло зарегистрированных случаев вирусной пневмонии в Ухане, столице провинции Хубэй, составило 59 в воскресенье, увеличившись с 27 декабря. 31, по данным муниципальной комиссии здравоохранения Уханя, семь человек находятся в критическом состоянии. Пока сообщений о смертельных случаях не поступало."
 china.10.a: "Надеюсь, Хуже не станет!"
 china.11.t: "Паническая Скупка нефти"
 china.11.d: "В условиях, когда Ближний Восток охвачен пламенем, многие наши граждане сталкиваются с глубоко тревожащей реальностью. Эта реальность состоит из пустых насосов и разбитых мечтаний. Без того, чтобы многие имели возможность свободно платить и заправлять свои машины. Теперь, если бы это был единичный инцидент в маленьком городе или незначительной провинции в течение недели. Мы бы сочли это случайностью и отнеслись к этому соответствующим образом.\n\nНо это происходит не в небольших сообществах. Это происходит в крупных транспортных узлах мегаполисов. Поезда не могут получить топливо, грузовики не могут продолжать движение по многочисленным магистралям, а рабочим трудно добираться до своих заводов. Если мы как нация не справимся с этой проблемой, у нас будет много проблем в рамках нашего статуса великой "фабрики мира"."
 china.11.a: "Мы должны помочь простым людям!"
 china.11.b: "Мы должны ввести жесткие ограничения!"
 china.12.t: "Двойственность Партии"
 china.12.d: "После экономических реформ Дэн Сяопина в Китае Коммунистическая партия Китая столкнулась с фундаментальным расколом в своей политике. С одной стороны, есть фракция, которая выступает за сосредоточение внимания на восстановлении социального равенства и обеспечении справедливого распределения экономических ресурсов. И наоборот, другая фракция выступает за ускорение накопления производительных сил и расширение экономического пирога.\nПод руководством Си Цзиньпина этот дуалистический подход в КПК стал более выраженным и динамичным. Си Цзиньпин умело лавирует между этими двумя конкурирующими идеологиями, стремясь удовлетворить желания обоих лагерей, не нарушая хрупкого равновесия, на котором держится сложная государственная структура Китайской Народной Республики.\nНаблюдатели отмечают, что для КПК, возможно, приближается критический момент, когда потребуется окончательное разрешение этого идеологического перетягивания каната. Вскоре может наступить время, когда КПК должна решительно определить свою национальную политику, положив конец продолжающимся колебаниям и двусмысленности. Этот поворотный момент может повлечь за собой окончательный выбор между двумя противоположными путями, символизируемыми извечным вопросом: "Черная кошка или белая кошка?"
 china.12.a: "Посмотрим.."
 china.13.t: "Расширенные Службы Социального Обеспечения"
 china.13.d: "В связи с Ковид-19 мы временно решили расширить службы социального обеспечения, чтобы люди были довольны. Однако с течением времени мы должны задаться вопросом, следует ли постоянно поддерживать эти новые расширенные реформы социального обеспечения"
 china.13.a: "Эти Меры Были Чисто Временными"
 china.13.b: "Оставить реформы"
 #Leadership
 china.15.t: "Выборы Генерального секретаря КПК в 2022 году"
 china.15.d: "Недавно в Пекине завершился долгожданный 20-й Всекитайский съезд Коммунистической партии Китая. Делегаты со всей страны уже покидают город, но впечатляющий Большой зал народных собраний еще не выключил свои хрустальные люстры. Политическая церемония завершится только тогда, когда вновь избранный 20-й Центральный комитет завершит свою первую повестку дня и изберет лидеров партии.\n\nДождемся дня пресс-конференции. Под бесчисленные вспышки фотокамер и щелчки затвора семь членов Постоянного комитета, включая Генерального секретаря, прошли по красной ковровой дорожке и предстали перед всем миром. Несмотря на предположения, историческое событие - избрание Си Цзиньпина в третий раз - вызвало волнения во всем мире. Правительства осторожно поздравляли Си и с подозрением ждали следующего шага лидера-силовика, который нарушил неписаные правила, чтобы стать генеральным секретарем в третий раз."
 china.15.a: "Приближается критический момент для Китая"
 china.17.t: "Ху Чуньхуа присоединяется к Новым левым"
 china.17.d: "Вице-премьер Ху Чуньхуа сломал ряды и, похоже, присоединился к тем, кто принадлежит к Новым левым. Во множестве интервью государственному телевидению CGTN Ли поддержал несколько популистских политик, а также осудил имущественное неравенство в результате резкого сдвига влево.\n\nВ то время как Новым левым не хватало центральной сплачивающей фигуры внутри партии после ареста Бо Силая, похоже, что Ли приготовился выступить в этой роли. Хотя многие считают его менее зажигательным по сравнению с Бо, нет никаких сомнений в том, что Ху Чуньхуа эпохи после Си будет кардинально отличаться от того Ху Чуньхуа, которого мы видели раньше.\n\nВ то время как недавно набравшая силу либеральная фракция в КПК борется за сохранение своей власти, кажется, что левые консерваторы еще не сдались. В то время как Китай балансирует на грани либерализма и социализма, его будущее более неопределенно, чем когда-либо."
 china.17.a: "Левые Поднимаются Еще раз"
 china.18.t: "Ху Чуньхуа избран Генеральным секретарем"
 china.18.d: "После падения Си Цзиньпина бывший вице-премьер Ху Чуньхуа занял пост генерального секретаря Коммунистической партии. По-видимому, занимая более популистскую позицию, чем его предшественники, Ху пообещал отстаивать углубление реформ в КНР и ее приверженность социалистическим идеалам. Его недавние выступления по государственному телевидению показали, что его союз с Новыми левыми приведет к сворачиванию многих рыночных политик Китая, одновременно пытаясь преодолеть разрыв в благосостоянии, который резко возрос в Китае за последние 50 лет. В то время как Китай стремится воссоединиться со своим прошлым, его будущее остается неопределенным, но люди смотрят на него с оптимизмом."
 china.18.a: "Мао улыбается"
 china.19.t: "Ван Ян избран Генеральным секретарем"
 china.19.d: "После падения Си Цзиньпина бывший председатель Национального комитета Народного политического консультативного совета Китая Ван Ян занял пост генерального секретаря Коммунистической партии. С момента своего появления в центре внимания китайской политики в качестве губернатора провинции Гуандун Ван всегда считался реформатором. Отстаивание политики свободного рынка, а также его поддержка неправительственных организаций сделали его невероятно популярным среди реформаторов. Председатель Ван объявил, что при его правительстве Китай будет следовать по пути как рыночных, так и политических реформ. В стране реакция в основном оптимистична, поскольку Китай смотрит в будущее."
 china.19.a: "Либеральное будущее"
 china.20.t: "Си укрепляет власть"
 china.20.d: "После экстренного заседания Политбюро 19-е Политбюро решило разрешить принятие конституционной поправки, которая закрепила мысль Си Цзиньпина в официальной идеологии. Юридически это, по сути, укрепило власть Си Цзиньпина как неоспоримого лидера Китая. Хотя либерально-реформистские и левоконсервативные фракции внутри КПК все еще существуют, теперь они выполняют в основном консультативную роль при Си Цзиньпине. Хотя Запад осудил этот шаг как диктаторский, многие в Китае восприняли его как лучший способ осуществить китайскую мечту о богатом Китае, готовом взять на себя роль мирового лидера. Поскольку Китай плывет навстречу будущему, Си Цзиньпин будет направлять ее как третий Великий кормчий."
 china.20.a: "Неудивительно"
 china.21.t: "Ли Цзочэн избран Генеральным секретарем"
 china.21.d: "После падения режима Си Цзиньпина бывший начальник штаба генерал Ли Цзочэн занял пост генерального секретаря Коммунистической партии. Впервые со времен Мао Китаем руководит генерал, а не аппаратчик. Этот беспрецедентный шаг от военного до Генерального секретаря свидетельствует о растущей роли Народно-освободительной армии в китайской политике. В зажигательной речи, транслируемой по государственному телевидению CCTV, Ли пообещал восстановить место Китая под солнцем и исправить ошибки истории. По мере мобилизации Народно-освободительной армии многие с тревогой смотрят на Тайвань, поскольку реваншистский Китай уверен, что положит конец гражданской войне в Китае раз и навсегда."
 china.21.a: "Китай будет расти"
 china.22.t: "Парад Победы"
 china.22.d: "3 сентября 1945 года безоговорочная капитуляция Японии наконец-то положила конец четырнадцатилетней войне сопротивления японской агрессии. Этот исторический день, ознаменованный подписанием акта о капитуляции, был объявлен официальным Днем Победы в Китае и стал мощным глобальным символом триумфа над фашизмом. Сейчас, восемьдесят лет спустя, руководство страны решило провести в Пекине грандиозный военный парад в честь этого события - глубокую дань уважения тем, кто пожертвовал собой, торжественное напоминание об истории и маяк для будущего. Однако этот парад - не просто воспоминание о прошлых победах, он несет в себе огромное новое политическое и современное значение. Это первый парад с момента начала нового пути к модернизации по-китайски, который служит мощной публичной демонстрацией военной мощи в преддверии столетия армии. Помимо демонстрации военной мощи, все внимание приковано к появлению верховного лидера. Как символическое лицо нации, он будет находиться под пристальным вниманием как своей страны, так и всего мира во время парада. Главный вопрос заключается в том, какой образ он должен проецировать. Некоторые считают, что он должен надеть новую форму, символизирующую новое видение новой эры. Другие утверждают, что сохранение его стандартной формы одежды будет демонстрировать преемственность и стабильность, позволяя избежать резких изменений в такой знаменательный момент.\n\nВо время подготовки к параду этот вопрос поднимался неоднократно. Оба варианта имели большое значение, и решение в конечном итоге отразилось бы на его моменте славы.\n\nКогда наконец наступил момент парада, вся страна затаила дыхание. Верховный лидер медленно поднялся на трибуну, и его фигура постепенно стала четче видна, когда на него направились прожекторы и камеры. В конце концов, он выбрал..."
 china.22.a: "Предстать перед китайским народом в новой форме."
 china.22.b: "Предстать перед китайским народом в своей стандартной одежде."
 #Taiwan War
 china.6.t: "Блокада Тайваня"
 china.6.d: "В результате беспрецедентного и крайне агрессивного шага Китайская Народная Республика установила полную блокаду Тайваня, используя свой военно-морской флот для окружения острова. Блокада не ограничивается только морским пространством: Китай также ограничил воздушное сообщение, фактически лишив гражданских лиц и государственных чиновников возможности покинуть Тайвань. Эти действия ввергли Тайвань в состояние острой паники и вызвали серьезный экономический кризис, поскольку экономика острова оказалась отрезанной от импорта и экспорта, что изолировало его от мировой торговли и еще больше усугубило кризис.\n\nМеждународная реакция на блокаду Китая вызвала широкое осуждение, особенно со стороны западных стран. Эти страны потребовали немедленного снятия блокады и призвали Китай к деэскалации ситуации. Верные союзники Тайваня, в частности Япония и Австралия, выразили решительную поддержку Тайваню, подчеркнув необходимость соблюдения международного права в условиях нынешних глобальных потрясений, и пообещали оказать прямую помощь, если эскалация будет нарастать. Однако эффективность этих ответных мер подрывается рассеянностью Соединенных Штатов, которые в настоящее время вовлечены в свой собственный внутренний конфликт и не могут оказать поддержку в том объеме, который они могли бы предложить в обычных условиях.\n\nПерспектива военной конфронтации становится все более опасной для Тайваня. Отсутствие американской поддержки в сочетании с эскалацией напряженности и экономическим удушением со стороны Китая бросает тень на будущее Тайваня и заставляет его союзников бороться с неопределенным и потенциально опасным сценарием."
 china.6.a: "В Азии становится жарче..."
 china.6.b: "Наше освобождение грядёт!"
 china.7.t: "КНР вторгается на Тайвань"
 china.7.d: "Четвертый кризис в Тайваньском проливе перерос в полномасштабный конфликт между Китайской Народной Республикой и Китайской Республикой на острове Тайвань, возобновив Гражданскую войну в Китае, которая закончилась изгнанием Гоминьдана через Тайваньский пролив. Сотни реактивных самолетов начали летать над островом, участвуя в воздушных боях, в то время как весь китайский военно-морской флот мобилизован, с сообщениями о первых высадках на берегах Тайваня, островов Ляньчян и непосредственных военно-морских столкновениях между ВМС КНР и РК. ROCA объявила полную мобилизацию, в то время как военное положение было объявлено по всему Тайваню, поскольку последние силы старой Китайской Республики готовятся к выживанию против колосса КПК, а береговая охрана сообщила о наблюдениях китайских десантных судов, уже пересекающих пролив в направлении Тайваня."
 china.7.a: "Финальная схватка."
 china.8.t: "КНР захватывает острова Цзиньмэнь"
 china.8.d: "Впервые за более чем 60 лет Китай и Тайвань возобновили боевые действия с Народно-освободительной армией, осуществившей многочисленные высадки на островах Цзиньмэнь. Острова Цзиньмэнь, долгое время являвшиеся предметом споров в отношениях между двумя сторонами пролива, представляют собой серию островов, расположенных в 8 км от материка и в основном управляемых Китайской Республикой. На рассвете десантники НОАК и морские пехотинцы захватили ключевые точки по всему городу и быстро разгромили небольшой гарнизон солдат РК на островах. Поскольку Китайская Республика объявила это "серьезным нарушением суверенитета Китайской Республики", но еще не объявила войну, это знаменует собой беспрецедентное изменение геополитического положения региона."
 china.8.a: "Ситуация в Проливе еще больше обостряется"
 china.9.t: "Размышления о стычке в Цзиньмэне"
 china.9.d: "Освобождение Цзиньмэня и других островов от власти Тайваня прошло с большим успехом, все острова и их администрация будут переданы префектуре Сямынь провинции Фуцзянь.\n\nУспешное поднятие флага 1 августа над Кинмэнем означает, что позор битвы 1949 года наконец очищен. Но сейчас НОАК не время расслабляться. Командование Восточного театра решило провести конференцию, чтобы обобщить различные проблемы, выявленные в ходе сражения. Командиры единодушно признали, что долгие годы мира неизбежно заразили НОАК "болезнью мира", которая проявляется, прежде всего, в передаче приказов от начальства, часто не соответствующих действительности, и в выполнении приказов по-своему, отклоняющихся от планов сражения. Кроме того, среди различных отчетов о потерях НОАК значительную часть составили отказы различных новых видов оружия и техники, что говорит о том, что многие, казалось бы, мощные новые виды оружия еще должны быть проверены неожиданными ситуациями на поле боя.\n\nЧтобы избежать подобных ошибок в предстоящих боях, командование театра решило представить протокол совещания в ЦКВ и предложить распространить его изучение по всей армии. Ценный опыт, полученный благодаря самопожертвованию наших товарищей, поможет избежать новых ненужных жертв."
 china.9.a: "Воссоединение стало на шаг ближе, но не без затрат."
 china.23.t: "Победа Китая в Тайваньской войне"
 china.23.d.1: "Когда на острове Тайвань умолкли последние орудия, китайская нация наконец-то воссоединилась. Высокопоставленные члены правительства Тайваня, включая Цай Ин-вэнь и Су Цэн-чжана, были захвачены живыми НОАК при попытке покинуть зону боевых действий, несмотря на сопровождение президентской охраны.\n\nАдмирал Дун Цзюнь объявил об официальном окончании битвы за Тайваньский пролив. Восстановление острова идет полным ходом, китайские компании спешат получить строительные контракты на восстановление Тайваня, а также объявлено о крупных проектах по экономической интеграции Тайваня в материк. В политическом плане остров остается под военной оккупацией до тех пор, пока не будет решено, получит ли он статус специального административного района, подобного Макао и Гонконгу, автономного района, подобного Тибету и Синьцзяну, или будет полностью интегрирован в КНР. С окончанием 75-летнего периода разделения многие китайцы вздохнули с облегчением, зная, что Китай больше никогда не будет разделен, как это было раньше."
 china.23.d.2: "Когда на острове Тайвань умолкли последние орудия, китайская нация наконец-то воссоединилась. Во время поисков после битвы за Тайбэй Цай Ин-вэнь, Су Цэн-чжан и другие высокопоставленные члены правительства Тайваня таинственно исчезли. Сообщалось, что подводная лодка МССЯ тайно появилась в водах к востоку от Тайваня и забрала несколько "важных гостей", после чего снова исчезла, но это осталось лишь слухом.\n\nАдмирал Дун Цзюнь объявил об официальном окончании битвы за Тайваньский пролив. Восстановление острова идет полным ходом, китайские компании спешат получить строительные контракты на восстановление Тайваня, а также объявлено о крупных проектах по экономической интеграции Тайваня в материк. В политическом плане остров остается под военной оккупацией до тех пор, пока не будет решено, получит ли он статус специального административного района, подобного Макао и Гонконгу, автономного района, подобного Тибету и Синьцзяну, или будет полностью интегрирован в КНР. С окончанием 75-летнего периода разделения многие китайцы вздохнули с облегчением, зная, что Китай больше никогда не будет разделен, как это было раньше."
 china.23.a: "Рев Дракона"
 china.24.t: "Поражение Китая в Тайваньской войне"
 china.24.d: "Сегодня по всему Тайваню раздаются праздничные возгласы: Китайская Народная Республика объявила о завершении военной кампании на острове Тайвань. После нескольких недель напряженных боев Народно-освободительная армия не смогла закрепиться на Тайване и была отбита защитниками острова.\n\nПосле поражения вторгшихся сил НОАК политики по всему Тайваню обсуждают вопросы восстановления и международного признания. Пока законодатели острова обсуждают, сохранять ли ему статус Китайской Республики или отделиться от Китая как Республика Тайвань, все жители Тайваня могут спать спокойно, зная, что их судьба не зависит от прихотей партийных лидеров в Пекине."
 china.24.a: "Дракон истекает кровью"
 china.31.t: "Ковид-19 распространяется на другие провинции!"
 china.31.d: "Плохие новости приходят одна за другой. На стол директора Национальной комиссии по здравоохранению легли сообщения о стремительном распространении коронавируса в провинции Хубэй. Тем временем сообщения о предполагаемых случаях заболевания Ковид-19 начали поступать из соседних провинций, таких как Хунань и Сычуань, а также из крупных экономических центров, таких как Шанхай и Гуандун, и даже из политического центра, Пекина. Сдержать вспышку в пределах одной провинции, похоже, невозможно. Теперь мы должны быстро скорректировать нашу стратегию, подготовиться к мобилизации всей нации для борьбы с эпидемией и сделать это так, чтобы не вызвать чрезмерной паники среди населения. Будем надеяться, что еще не слишком поздно."
 china.31.a: "У Нас Все Под Контролем!"
 china.34.t: "Ковид-19 распространяется за границей!"
 china.34.desc: "Несмотря на все усилия местных и национальных властей, вирус Ковид-19 продолжает распространяться. Новости о предполагаемых случаях заболевания Ковид-19 начали поступать из Южной Кореи и Японии, а также из Италии и Франции в Европе и Соединенных Штатов через Тихий океан. Поскольку в большинстве случаев речь идет о китайских туристах или людях, недавно побывавших в Китае, местные власти объявили о временной приостановке всех перевозок с Китаем, и эта мера может занять довольно много времени, чтобы вернуться к нормальной жизни.."
 china.34.a: "Это международный кризис!"
 china.35.t: "Торговые сделки с Россией Завершены!"
 china.35.d: "Растущая международная напряженность требует поиска более надежных торговых партнеров за пределами США, Европы и Японии, чтобы наша экономика не была ослаблена политическими конфликтами или торговыми спорами. Поэтому нам следует развивать экономическое сотрудничество с нашим традиционным политическим партнером - Российской Федерацией. Нефть, газ и минеральные ресурсы из России, а также товары легкой промышленности и высокотехнологичная продукция из Китая постоянно циркулируют по основным транспортным магистралям между двумя странами. Стаканы, наполненные водкой и маотаем, звенят снова и снова, что свидетельствует об углублении торговых связей между двумя странами, объединенными общей оппозицией западной гегемонии."
 china.35.a: "Тост за наших северных товарищей!"
 china.36.t: "Воссоединение Китая"
 china.36.d: "После 70 лет разлуки Тайвань и материк наконец воссоединились под знаменем Китайской Народной Республики после кровавого вторжения. После того, как коммунисты захватили материк в 1949 году, Гоминьдан отступил на Тайвань, выжидая своего часа, чтобы однажды, с надеждой, вернуться на этот материк. Мечта о республиканском Китае под руководством Гоминьдана сохранялась в течение 70 лет, испытывая внутренние трудности как из-за тайваньского сепаратизма, так и из-за коммунистического давления. Сегодня эта мечта рухнула, когда правительство в Тайбэе официально объявило о роспуске правительства Китайской Республики, поскольку все административные обязанности были переданы военному правительству. Поскольку КНР обещает временную автономию до 2049 года в рамках Специальной административной зоны, аналогичной тем, что есть в Макао и Гонконге, остров в настоящее время все еще находится под военным правлением."
 china.36.a: "Гражданская война, Наконец, закончилась"
 china.37.t: "Переворот НОАК!"
 china.37.d: "Впервые за более чем 30 лет в Пекине воцарилась тишина, когда танки покатились по площади Тяньаньмэнь к Чжуннаньхаю, Народному собранию и другим ключевым правительственным зданиям. После серии публичных унижений, социальных волнений и международных поражений от предыдущей администрации генерал Ли Цзочэн заявил:\n"Для безопасности нации и чести народа крайне важно, чтобы военные взяли временный контроль, чтобы восстановить порядок в стране."\nСлухи сообщения о чистках видных гражданских чиновников бывшей администрации распространились за пределы Пекина, однако подтверждения от нового военного правительства не поступало. Международные наблюдатели с тревогой ожидают реакции остальной части страны, поскольку страна выглядит более нестабильной, чем со времен Культурной революции."
 china.37.a: "Wansui!"
 china.38.a: "Отголоски Тяньаньмэня..."
 china.39.t: "Тибетский мятеж"
 china.39.d: "Усиливающаяся в последнее время хаотичная ситуация в нашей стране, похоже, дала возможность предателям, замышляющим расчленить нашу территорию. Тибетский автономный район, в котором почти 20 лет не было чрезвычайных ситуаций, теперь охвачен паникой. Сепаратисты разжигают ненависть и разжигают этнические конфликты между тибетцами и ханьцами, ставя общество на грань краха. Региональное правительство пытается поддерживать транспорт и экономику, а центральное правительство в Пекине распорядилось перевести большую часть Тибета на чрезвычайное положение и направить дополнительные силы полиции из соседних провинций для поддержания стабильности."
 china.39.a: "Надеюсь, они успеют..."
 china.40.d: "Тибет всегда оставался спорным вопросом в китайской политике. Вошедший в состав Китайской Народной Республики в 1951 году, этот регион постоянно страдает от сепаратизма и попыток провозгласить независимость от Тибетского правительства в изгнании. Однако за более чем 70 лет ситуация никогда не была такой хаотичной, как в данный момент. Социальный кризис, вызванный поражением в Тайваньской войне, парализовал низовое управление и вызвал возрождение ранее подавляемой сепаратистской деятельности, подпитываемой растущим страхом местного населения перед нестабильностью. Китайское правительство объявило чрезвычайное и военное положение в некоторых районах Тибета. Международное сообщество обратило обеспокоенный взор на это безмолвное плато."
 china.40.a: "Запятнают ли белые горы красной кровью?"
 china.41.t: "Крушение порядка в Синьцзяне"
 china.41.d: "Синьцзянский автономный район погрузился в хаос, поскольку местные администрации потеряли контроль над сельской местностью в руках исламистских боевиков. Джихадистская Исламская партия Восточного Туркестана, с которой мы боролись более 30 лет, наконец-то начала свой полномасштабный джихад против нашей администрации в регионе. На севере радикальные повстанцы-Казахи начали свое собственное панисламистское восстание, в то время как в центре более радикальное ответвление ETIP убивает Ханьцев без разбора. В Урумуки вспыхнули расовые беспорядки, когда ханьцы и уйгуры вцепились друг другу в глотки в сценах, которые сделали бы 2008 год похожим на детскую драку."
 china.41.a: "#FuckUhyger"
 china.42.t: "Синьцзян горит..."
 china.42.d: "Все, кто думал, что после железного правления Синьцзян станет страной вечного изобилия и мира, были жестоко разочарованы. Менее чем через десять лет регион вновь погрузился в конфликт и уличное насилие. Уйгуры сражались с полицией кухонными ножами и вилами, грабили дома и магазины ханьцев. По мере развития кризиса вновь появились исчезнувшие ранее экстремистские группировки, а некоторые бандиты даже вооружились винтовками.\n\nИсламская партия Восточного Туркестана, радикальная исламистская группировка, которая продолжает восстание против Китая вдоль афганской границы, объявила о своем намерении "освободить наших мусульманских братьев и сестер в Восточном Туркестане, которых слишком долго угнетали китайские империалисты". В то же время Чжуннаньхай осудил эту группу как банду радикальных джихадистов и призвал мусульманский мир присоединиться к ним в борьбе против фундаментализма..."
 china.42.a: "Кошмары 2009 и 2011 годов снова становятся явью..."
 china.43.t: "Восходящий Красный дракон"
 china.43.d: "За четыре десятилетия, прошедшие с тех пор, как Дэн Сяопин сверг мерзкую банду четырех, Китайская Народная Республика познала очень мало, кроме успеха. Вместо того чтобы цепляться за ортодоксальный маоизм своих предшественников, Дэн принял более прагматичный взгляд, который стал известен как социализм с китайской спецификой. Государственные предприятия были приватизированы, и началась новая эра экономического роста. Последующие администрации Цзян Цзэминя и Ху Цзиньтао вывели Китай на мирный путь к статусу сверхдержавы через торговлю и глобализацию. Этот курс отклонился в 2012 году, когда Си Цзиньпин принял мантию верховного лидера. Отказавшись от сдержанной манеры своих предшественников, Си занял более твердую позицию, стремясь, чтобы весь мир знал, что китайская мощь никуда не денется. Однако, несмотря на весь свой прогресс, Китай не смог завоевать международное восхищение, которым Соединенные Штаты пользовались в 20 веке. Пекин остается объектом нескончаемой критики за все, начиная с его реакции на протесты против экстрадиции в Гонконге и заканчивая сохраняющейся напряженностью в отношениях с Тайванем. Жесткий подход президента Си к управлению мало чем помог делу.\n\nСейчас, когда наступает Год Крысы, Народная Республика переживает интересные времена. Америка, одновременно непримиримый соперник и выгодный торговый партнер, разрывает себя на части, разрушая глобальную стабильность, но также оставляя место для новой гегемонистской державы. Хотя потенциальные соперники Пекина остаются в Москве, Нью-Дели и Брюсселе, нынешний кризис полон возможностей."
 china.43.a: "Китай станет больше!"
 china.44.t: "Крах Северо-запада"
 china.44.d: "С падением авторитета местных властей и распадом системы командования Западного театра военных действий Цинхай быстро раскололся на три основные фракции: Фронт национального спасения, Исламскую республику и династию Се.\n\nВ ответ на призыв мусульманского религиозного лидера Сян Гочжи местное мусульманское население свергло старый режим в Хайси. Вновь созданная Исламская республика быстро взяла под контроль промышленные предприятия по всему региону и использовала их для дальнейшего расширения своей власти. В Юйшу Се Цзиньвэй - в прошлом офицер отдела материально-технического снабжения командования Западного театра - провозгласил себя потомком Се Аня и законным наследником королевской династии Восточных Цзинь. Однако в его стиле управления нет ни капли утонченной элегантности, присущей прославленному "чутью Цзянцзуо", которое когда-то ассоциировалось с семьей Се. Воспользовавшись вакуумом власти, он перенаправил в Юйшу большое количество военных поставок и теперь поддерживает пышную придворную жизнь за счет остатков оружия и снаряжения бывшего гарнизона.\n\nВ то же время в Синине генерал Чжао Цзунци, бывший командующий Западным театральным командованием, стал стабилизирующей силой в этом неспокойном регионе. Известный своей службой в многочисленных пограничных конфликтах, Чжао Цзунци использовал свой богатый военный опыт и влияние, чтобы объединить остатки коммунистической партии из Цинхая и Ганьсу, а также отступающие войска НОАК.\n\nХотя все стороны клянутся искоренить друг друга и воссоединить Цинхай, борьба гораздо сложнее, чем кажется. Уникальная география плато, сложный этнический состав населения и относительная сбалансированность сил между группировками означают, что ни одна из них не сможет одержать решающую победу в ближайшем будущем."
 china.44.a: "Китай снова рушится..."
 china.45.t: "Коллапс Юго-Запада"
 china.45.d: "После поражения Китая обширная территория Юньнань, Гуйчжоу, Сычуань и Чунцин оказалась в состоянии системного коллапса. Административные, производственные и транспортные системы в этом регионе площадью около 1,136 миллиона квадратных километров полностью остановились, создав фактический вакуум власти. Спутниковые снимки показывают, что на территории бывшего юго-западного региона находятся по меньшей мере пять полевых командиров, обладающих полной военной и административной властью, а два механизированных корпуса занимают северную Сычуань и границу с Юньнань соответственно. Объем судоходства по реке Цзиньша упал до 6% от уровня 2021 года.\n\nНародное правительство Сычуани, возглавляемое Цуй Чжиюанем, первым провозгласило независимость, пытаясь восстановить порядок под лозунгом "восстановления реального социализма". Однако его реальный контроль ограничивается районом Чэнду - Чунцин, и в стране царит фракционность. Отступающие войска оставили в разных городах не менее 10 неразрушенных арсеналов, что привело к резкому увеличению числа гражданских владельцев оружия и 200%-ному росту преступности в городах, а в сельских районах стихийно возникли организации взаимопомощи.\n\nПриблизительно 100 тысяч человек бежали в юго-восточные прибрежные районы. Внешние наблюдатели считают, что крах этого региона отличается от кровавых беспорядков на северо-западе, проявляясь как относительно "тихий" провал центральной власти: Пекин, в конце концов, перестал направлять в регион свой персонал. В разведывательном отчете ОДТО говорится об "отсутствии явного руководства, даже значительного кровопролития или беспорядков". Разведывательные самолеты сфотографировали новые флаги, развевающиеся над военно-промышленной зоной в Сычуани, с написанным от руки лозунгом:"
 china.45.a: ""Алеет Восток""
 china.46.t: "Анархия во Внутренней Монголии"
 china.46.d: "Дробление пастбищ Внутренней Монголии оказалось более экстремальным, чем кто-либо мог предположить. Хотя поддерживаемая Монголией Партия независимости создала в Алксе временное правительство, оно борется с серьезным кризисом легитимности. Кроме горстки беспринципных монгольских чиновников и небольшого отряда вооруженных сил, никто не признает власть этого режима на краю пустыни. Между тем автономное правительство Внутренней Монголии в Хоххоте, похоже, занимает самую сильную позицию: даже когда остальная часть страны погружается в беспорядки, оно прочно контролирует политический центр и экономический центр региона. Однако, несмотря на то, что государственные служащие продолжают работать в обычном режиме, все чувствуют, что власть местного правительства ослабевает с каждым днем. В Журихе, крупном военном центре, неожиданно появилась третья сила - 81-я армия Группы, объявившая военное положение в окрестностях под предлогом "поддержания местной безопасности"\n\nВсе три фракции стремятся расширить свое влияние. Партия независимости в Алксе горячо лоббирует интересы вождей скотоводов, правительство Хоххота занято завоеванием местных чиновников, а военное ведомство Чжурихэ ускоряет наращивание вооружений. Но кочевников, живущих на пастбищах, мало интересует политика этих соперничающих группировок; больше, чем предвыборные обещания, их волнует, где их скот и овцы смогут свободно пастись.\n\n Никто не может предсказать, чем закончится этот трехсторонний конфликт, но ясно одно: мечта о единой Внутренней Монголии стала далеким воспоминанием."
 china.46.a: "Безумие"
 china.47.t: "Восстание в Шэньси"
 china.47.d: "Политический вакуум в Шэньси распространился как лесной пожар: некогда величественный провинциальный штаб партии превратился в руины, а старый порядок растворился под сенью краха.\n\nКрасные флаги, развевающиеся на стенах Сианя, пробудили у старшего поколения воспоминания о Культурной революции. Яньань, священная земля революции, теперь стал второй штаб-квартирой маоистской коммунистической партии. Молодой лидер Чжан Юньфань часто перемещается между университетами, пытаясь разжечь революционный пыл в растерянных студентах своими пламенными речами. Они не просто осуждают "демонов коров и духов змей" - они направляют свою критику на бюрократов, предавших революцию, и обещают восстановить более справедливое и равноправное общество, где люди действительно будут править на этой древней земле. Дальше на север, в Ордосе, за пределами северной Шэньси, поднимаются совсем другие силы. Общество "Небесного отца" поклоняется таинственному существу под названием "Великий черный дэва", проповедуя пророчества о конце света, которые привлекают тех, кто потерял все в войне. Их учение сочетает шаманские ритуалы с западным мистицизмом, утверждая, что только абсолютная вера может принести спасение на Страшном суде. Сам "Небесный отец" остается затворником, что придает организации дополнительную таинственность. Последователи ревностно распространяют свое учение, рассматривая коллективное самоуничтожение как "лестницу, по которой можно избежать реинкарнации и достичь небес"\n\nЛоэсское плато стало ареной, где идеализм переплетается с апокалиптическим пылом. Сбитые с толку студенты и рабочие стремятся к прогрессу, а ревностные служители культа жаждут разрушения. Кажется, что люди постоянно ищут новые духовные ориентиры среди хаоса. Небо северной Шэньси остается бескрайним, Желтая река течет вечно, и эта земля была свидетелем бесчисленных конфликтов. Однако этот раз может оказаться более неистовым, чем когда-либо прежде."
 china.47.a: "Ситуация разваливается на части!"
 china.48.t: "Дунбэй прекращает связь"
 china.48.d: "С тех пор как конница Нурхаци объединила чжурчжэней, Северо-Восточный Китай никогда не был таким раздробленным. Сегодня три провинции Дунбэй похожи на осколки разбитого зеркала, в каждом из которых отражается своя реальность. В Хэйхэ наемники со славянским акцентом заняли заброшенный железнодорожный вокзал - наживающиеся на войне выходцы с севера, которые привезли с собой большой тайник с оружием. Тем временем Министерство государственной безопасности превратило Чифэн в запретную зону, патрулируемую бронетехникой на Центральном проспекте. Бывшие агенты создали плотный район безопасности, установив оборудование для наблюдения почти на каждом здании. Любое подозрительное движение вызывает немедленное внимание.\n\nУ подножия горы Чанбай в нескольких отдаленных деревнях выживают потрепанные остатки корейской армии, живущие за счет контрабанды и грабежей. Вдоль коридора Ляоси аграрные идеалисты создали утопию, захватив огромные участки сельскохозяйственных угодий. Бывшие сталелитейные заводы теперь используются как зернохранилища, а станки переплавляются для изготовления сельскохозяйственных орудий.\n\nЛошадиная армия все еще удерживает ключевые военно-промышленные центры, такие как Цицикар, пытаясь поддерживать некое подобие порядка. Однако даже эта регулярная армия не может выйти за пределы городов. Тем временем Бэйдахуан - огромное государственное предприятие - нашло новую жизнь среди хаоса. Контролируя большие участки фермерских земель и пастбищ, они превратили плодородные земли в квазимилитаризованное сельскохозяйственное королевство.\n\nЛюди шутят, что сейчас на Северо-Востоке царит больший хаос, чем даже в республиканскую эпоху. Действительно, по мере того как рушатся все формы порядка, этот регион черноземья переживает свой самый мрачный период."
 china.48.a: "Мобилизуйте резервистов."
 china.49.t: "Хуан Мин Берет Пекин под Контроль"
 china.49.d: "От южных торговых центров до северных промышленных центров по всему Китаю прокатилась волна беспорядков и протестов, подрывающих авторитет центрального правительства на фоне общественного скептицизма и внутренних разногласий. Среди этого хаоса ключевой фигурой стал генерал Хуан Мин, командующий Пекинским гарнизоном. Объявив в национальных СМИ о полномасштабном блокировании Пекина, НОАК быстро взяла под охрану несколько важнейших правительственных объектов в столице и распространила свой военный контроль на весь Северный Китай.\n\nНесмотря на то, что Пекин и прилегающие районы остаются стабильными под властью НОАК, беспорядки, охватившие остальную часть страны, не подают признаков ослабления. Экономический застой, нехватка товаров и провалы в местном управлении вызвали массовое недовольство. В крупных городах на улицы выходят разгневанные рабочие, в сельских районах мобилизуются фермеры и местные ополченцы, и даже лидеры бизнеса, которые редко высказывались в открытую, бросают вызов Пекину.\n\n Погасит ли железный подход НОАК пламя или подольет масла в огонь, пока неясно. Ясно лишь то, что Китай сейчас стоит на историческом перепутье, и военное положение в Северном Китае дало республике лишь краткую передышку."
 china.49.a: "Китай ждет нас."
 china.50.t: "Нанкинская Декларация"
 china.50.d: "Под приветственные возгласы демократов и молодежи над древними стенами Нанкина поднимается совершенно новый флаг. При поддержке Организации тихоокеанского оборонительного договора этот город шести династий снова стал колыбелью нового режима.\n\nНазывая себя "Нанкинским временным правительством", эта власть теперь контролирует обширные регионы к югу от реки Янцзы. От залива Ханчжоу до дельты Жемчужной реки, от Чжанбалин до горы Байюнь, влияние нового правительства расширяется с каждым днем при поддержке ОДТО. Сунь Чжиган, некогда печально известный своей коррупцией во время пребывания на посту партийного секретаря Гуйчжоу, внезапно вновь стал отцом-основателем этого "демократического Китая" - или, по крайней мере, лицом нового режима.\n\nВ то же время, большое количество иностранных "советников" контролируют каждый департамент. Крупные решения требуют одобрения со стороны PDTO, и даже передвижение войск должно осуществляться с их согласия. Вновь назначенные чиновники бесконечно говорят о "демократии" и "свободе", но при этом не могут скрыть своей укоренившейся покорности. Для этих советников и чиновников режим, который они называют "демократическим", в конечном счете не более чем тщательно срежиссированная витрина, призванная представить прирученный, покорный "новый Китай" остальному миру.\n\nПожалуй, самая большая трагедия для этой страны заключается в том, что она наконец получила "демократию", но такой унизительной ценой."
 china.50.a: "Предатели!"
 china.51.t: "Центральное Командование Теряет Контроль"
 china.51.d: "После полного краха провинциальных правительств Центральное театральное командование объявило военное положение на большей части территории Центрального Китая под лозунгом "защиты национального единства". Некогда лояльный Пекину, этот военный округ фактически стал независимым политическим образованием. Его временная штаб-квартира в Ухане призвана восстановить местный порядок вместо пекинского правительства. Однако под ширмой военного авторитета в вакууме власти бурлят подземные течения. От Яньтая до Анкана все группировки видят одну и ту же реальность: Коммунистическая партия - не более чем пустая оболочка. Распад огромной империи открыл окно возможностей для тех, кто надеется воспользоваться моментом и прийти к власти.\n\nХотя приказы Военно-контрольной комиссии все еще звучат в эфире, мало кто прислушивается к ним. Каждое низовое подразделение выборочно подчиняется командам, готовясь к предстоящим потрясениям. Как только последняя иллюзия единства исчезнет, эта земля будет охвачена конфликтом невиданных ранее масштабов. Так называемый военный контроль - лишь последняя декорация перед началом грандиозной драмы."
 china.51.a: "Они смеют называть себя НОАК?"
 china.52.t: "Восставшие Губернаторы Воссоединяют Китай" #cw todo event
 china.52.d: ""
 china.52.a: "Интересно."
 china.53.t: "Северо-Восточная Наемная Армия Воссоединяет Китай"
 china.53.d: "В китайском государстве наконец-то наступил непростой мир, поскольку войска Северо-Восточной армии наемников уничтожили последние остатки сопротивления. Когда Северо-Восток погрузился в анархию, полчища военнослужащих НОАК дезертировали из Центрального командования и пекинского правительства, превратившись в бандитов и полевых командиров. Над всеми ними возвышался русско-китайский командир с позывным "Данил", личность которого точно не известна, амбициозный офицер, поднявшийся по карьерной лестнице благодаря своей хитрости и связям с российскими частными военными подрядчиками, которые хлынули на Северо-Восток, чтобы "помочь китайским борцам за свободу в самый трудный момент". \n\nПостепенно расширяя свои амбиции от простых региональных войн до воссоединения Китая, Армия наемников остается в значительной степени аполитичной, прибегая к более варварским методам управления, изобилующим коррупцией на всех уровнях. Вскоре после воссоединения Китая новое государство, названное Данилом просто "Китайское государство", было признано российским и некоторыми другими правительствами, но остается практически непризнанным на Западе. Однако ходят слухи о несогласии в рядах армии, и только время покажет, как долго Го сможет удерживать контроль над своим вновь обретенным троном."
 china.53.a: "Меч могущественнее пера."
 china.54.t: "Национальное Освободительное движение Воссоединяет Китай" #cw todo event
 china.54.d: ""
 china.54.a: "Интересно."
 china.55.t: "Министерство Государственной Безопасности Воссоединяет Китай"
 china.55.d: "Внушительное око камеры наблюдения на каждом углу улицы стало обычным явлением в каждом китайском городе, поскольку Министерство государственной безопасности закрепило свою власть на китайском континенте. После краха Северо-Востока Министерство государственной безопасности, известное многим как китайская тайная полиция, сформировало свой собственный штат на равнинах Северо-Востока после того, как НОАК не смогла контролировать этот регион. По мере укрепления контроля над регионом амбиции председателя Чэнь Вэньцина росли, и МГБ со своими войсками двинулось на Пекин, пытаясь захватить контроль над китайским государственным аппаратом, чтобы навязать свой железный кулак остальной части государства.\n\nПолагая, что главной угрозой для Китая является раздробленность изнутри, а пекинское правительство не делает достаточно для подавления восстаний против государства, МГБ ввело строгую социальную и экономическую систему, которая стремилась поставить все аспекты жизни китайцев под контроль Коммунистической партии. Официально сохраняя название как Коммунистическая партия Китая, так и Китайская Народная Республика, очевидно, что в стране произошли радикальные изменения, и будущее Китая остается неопределенным."
 china.55.a: "Вполне в духе Оруэлла."
 china.56.t: "НОАК Воссоединяет Китаем" #cw todo event
 china.56.d: ""
 china.56.a: "Интересно."
 china.57.t: "Аграрный Народный Фронт Воссоединяет Китай" #cw todo event
 china.57.d: "После упорной борьбы в Китае наконец-то распустился цветок свободы. Видный марксист и китайский "новый левый" Ли Минци сумел объединить Китай под своей властью, подняв восстание в южной Маньчжурии вместе с отрядами крестьянского ополчения."
 china.57.a: "Возникает Новый Китай."
 china.58.t: "Пекинское Правительство Воссоединяет Китай" #cw todo event
 china.58.d: "Война в Китае подошла к концу: сторонники павшего ранее правительства страны сумели восстановить порядок в провинциальных органах власти, выведя Китай из состояния гражданской войны. Хотя преступность и беспорядки все еще далеко не редкость на улицах китайских городов, похоже, что статус-кво вряд ли избавится от шрамов, которые принесла гражданская война.\n\nПолитика полководца Хуан Мина, сумевшего в удобный момент взять под контроль Пекин, оказалась весьма эффективной в объединении Китая. КПК предстоит проделать большую работу по восстановлению страны."
 china.58.a: "КПК, видимо, действительно несокрушима."
 china.59.t: "Кризис в Малаккском проливе" #temporarily unused
 china.59.d: "В знак единодушного протеста против участия Китая в продолжающейся гражданской войне на Филиппинах Организация Договора о Тихоокеанской Обороне объявила полную морскую блокаду Малаккского пролива, запретив китайскому судоходству проходить через пролив и в то же время введя полные санкции против Пекина. Почти сразу же китайская экономика остановилась, поскольку миллиарды экспортных товаров теперь не в состоянии удовлетворить своих потребителей, и началось давление на немедленную реакцию Пекина.\n\nРеакция Китая была почти одновременной, оно объявило о своих собственных санкциях в отношении стран ОДТО, а в социальных сетях появились жалобы на прогнозируемый рост расходов по всему миру. В военном отношении была проведена полная мобилизация китайского военно-морского флота, и несколько боевых групп встретились с флотами ОДТО, в проливах в напряженном морском противостоянии. До сих пор не было произведено ни одного выстрела, однако обе стороны начали свои усилия по полной мобилизации своих вооруженных сил, поскольку непосредственные опасения по поводу выхода этого кризиса в Азии из-под контроля ставятся на первое место.\n\nДо сих пор не было выдвинуто ни одного упоминания о переговорах, что еще больше обостряет напряженность, поскольку мир ожидает, что это хрупкое противостояние станет жарким. События в этом противостоянии в стиле холодной войны все еще продолжаются."
 china.59.a: "Война за Азию снова надвигается..."
 china.60.t: "Национальное Коллективное Движение Воссоединяет Китай" #will be rewrited in the future, enough for now
 china.60.d: "Ад на земле бушует по всему Китаю: похоже, что Национальное коллективное движение укрепило свое господство над Китаем. Известные своей экстремистской идеологией, тоталитарной системой управления и стремлением стереть индивидуальность с лица земли, солдаты НКД с пустыми лицами жестоко подавляли все группы, осмеливавшиеся противостоять им. В своем стремлении к воссоединению Китая бесчисленные города были разрушены, непокорные деревни стерты с лица земли, а некогда процветающие очаги культуры превратились в братские могилы.\n\n Рассказы беженцев и выживших описывают состояние, когда у человека отнимают семью, друзей и даже имя, а его существование сводится к одной цели - служить государству. Официальная идеология "уничтожения себя" - это ублюдочная версия буддизма, где все личные желания должны быть принесены в жертву ради служения государству. Ее сознательная цель - остановить прогресс, повернуть его вспять, заморозить социальные изменения и привести к концу истории.\n\nКогда Китайская анархия вызывает величайший кризис беженцев и гуманитарную катастрофу, известную человечеству, мир может только с ужасом наблюдать, как НКД, которую теперь называют "Поднебесной империей", поднимается на мировую арену и устремляет свой взгляд вовне.\n\nЛидер НКД в маске, называющий себя Небесным Отцом, обратился к миру, заявив, что заговор близится к завершению. Примечательно, что он излучал ярко-красное свечение, что, по мнению многих, свидетельствовало о связи нового китайского лидера с божествами. Однако большинство людей решили, что это всего лишь спецэффекты."
 china.60.a: "Боже, спаси Китай, поскольку никто другой не сможет."
 china.61.t: "Falun Gong Reunifies China" #cw todo event
 china.61.d: ""
 china.61.a: "Интересно."
 china.61.t: "Китайская Красная Армия Воссоединяет Китай"
 china.62.d: "Стрелки китайских часов были переведены на 1960 год, когда Красная армия воссоединила раздробленную китайскую нацию. Маоистская коммунистическая партия Китая была основана в 2008 году коалицией городских фабричных рабочих и сельских фермеров, недовольных реформами эпохи Дэн, они называли современную КПК "капиталистическими дорожниками" и стремились свергнуть "предательский ревизионистский правящий блок", чтобы восстановить коммунизм. \n\nСразу после падения режима маоистские группы бежали в горы Шэньси, где у первой революции был свой базовый лагерь, и начали собирать и обучать людей в преддверии затяжной народной войны. Когда в Китае воцарилась анархия, Красная армия быстро распространила свое влияние, заручившись поддержкой тех, кто остался в стороне от эпохи реформ.\n\n В городах либеральные диссиденты с ужасом наблюдали, как повторяются картины культурной революции, как массово уничтожаются модернизированные "символы западного декаданса", а видные профессора колледжей подвергаются погромам и нападениям. Хаос охватил Китай, и революционный пыл вновь окрасил страну в ярко-красный цвет."
 china.62.a: "История повторяется - сначала как трагедия, потом как фарс."
 china.63.t: "Правительство Ника Ланда Воссоединяет Китай" #cw todo event
 china.63.d: "Западные и восточные историки считают поражение Китая в Великой азиатской войне концом китайского века. С началом Второй Китайской Гражданской Войны казалось, что Китай вновь вступит в эпоху военачальников, которая принесет стране смерть и трагедии на ближайшие десятилетия. Постепенно большинство военачальников сгинули в насилии и кровопролитии, и только сильнейшие остались по всему региону, пытаясь продолжить свои претензии на роль истинного наследника бывшего китайского государства.\n\nКогда конфликт был исчерпан, оказалось, что в Китае вновь образуется единое государство - "Нео-Китай", возглавляемое западным философом правого толка Ником Ландом, который ранее, по неподтвержденным данным, работал на старое правительство в сфере экзотических технологий. Известный своим акселерационистским образом мышления, Ланд приступил к децентрализации государства путем опоры на технологии и автоматизации инфраструктуры и промышленности страны, не обращая внимания на растущее осуждение со стороны международного сообщества."
 china.63.a: "Нео-Китай... Прибывает из Будущего?"
 china.64.t: "Сибирская Война"
 china.64.d: ""
 china.64.a: "Флаг 5 Звезд Будет Развеваться над Иркутском!"
 china.64.b: "Война с Россией? Вы обезумели?"
 china.64.c: "Пошлите войска во Владивосток! Немедленно"
 china.65.t: "Победа Китая в Сибирской войне"
 china.65.d: ""
 china.65.a: "Еще один удар по России"
 china.66.t: "Новосибирский Договор"
 china.66.d: ""
 china.66.a: "Все эти Жизни Потрачены Впустую, Ради чего?"
 china.67.t: "Победа России в Сибирской войне!"
 china.67.d: ""
 china.67.a: "Значительный удар по КПК"
 china.68.t: "Цветная революция в Гонконге"
 china.68.d: "Тревожные сообщения поступают от местных властей Гонконга: протестующие сепаратисты и вооруженные ополченцы вытеснили гонконгскую полицию из города. Местное правительство бежало в Шэньчжэнь, где в настоящее время наготове стоит отряд НОАК. Пока война за национальное воссоединение бушует по ту сторону пролива, на улицах Гонконга царит хаос: преступные элементы и озверевшие толпы, воспользовавшись хаосом, начали жечь, грабить и даже убивать. Хотя силы либерального временного правительства пытаются остановить хаос, их призывы в основном игнорируются. Студенческое ополчение готово защищать улицы Гонконга до последнего человека, поэтому можно с уверенностью сказать, что город не будет взят легко и без больших потерь."
 china.68.a: "Раздавите этих западных тараканов!"
 china.69.t: "Революция в Гонконге"
 china.69.d: "Многолетнее недовольство Китайской Народной Республикой наконец выплеснулось наружу, что привело к революции в Гонконге. В условиях высокого уровня безработицы после пандемии Ковид-19, а также ограничений военного времени, вызванных войной с Тайванем, недовольство населения КНР достигло рекордного уровня. Недели демонстраций переросли в насилие, и вооруженные группы, состоящие в основном из радикально настроенных студентов, вытеснили полицию и правительство Гонконга из города в Шэньчжэнь. В своем обращении к городу Джимми Лай - лидер движения - заявил, что \"годы китайской оккупации закончатся сегодня. С этого дня Гонконг будет сам решать свою судьбу!\"". Поскольку на улицах царит беззаконие, а НОАК готова нанести удар через реку, многие опасаются жестокого подавления, аналогичного площади Тяньаньмэнь. Что бы ни случилось, мир молится о том, чтобы в городе не произошло кровопролития."
 china.69.a: "5 Требований, и ни одним меньше!"
 china.70.t: "Иностранные Агенты Распространяют Антивоенную Пропаганду"
 china.70.d: "Похоже, что иностранные агенты распространили фальшивые новости о войне на Тайване, утверждая, что правительство занижает количество погибших солдат НОАК, а также преувеличивает денежные издержки войны. Кроме того, в Сети появилось несколько фотографий врачей, утверждающих, что они имеют доказательства военных преступлений КНР, совершенных на острове. Благодаря усердной работе интернет-модераторов эти подрывные аккаунты были удалены, но почти наверняка они вернутся. К сожалению, многие изображения вызвали тревогу у широких слоев населения, а также у низшей партийной бюрократии, что означает, что войну необходимо ускорить, чтобы они не начали протестовать."
 china.70.a: "Досадно."
 china.71.t: "Исламистские Террористы Начинают Атаку"
 china.71.d: "С началом войны за национальное воссоединение многие гарнизоны в Синьцзяне были переведены в Южный Китай, чтобы оказать поддержку военным усилиям. Это снижение уровня безопасности позволило исламистским экстремистским группировкам, таким как Организация освобождения Восточного Туркестана, перегруппироваться и реорганизоваться, чтобы начать атаку на гражданскую инфраструктуру в регионе Синьцзян. Хотя региональный руководитель партии Ма Синжуй заверил Политбюро в том, что террористическая угроза будет подавлена, пока, похоже, такого прогресса достигнуто не было."
 china.71.a: "Ужас"
 china.72.t: "НОАК захватывает Тайбэй"
 china.72.d: "ПЕКИН: После нескольких месяцев жестких городских боев против сепаратистских сил, которые укрепляли и пополняли запасы Тайбэя по коварным горным тропам на юге и юго-востоке города, сухопутные войска Народно-освободительной армии успешно отбили Тайбэй, тем самым достигнув главной цели антисепаратистской военной операции на Тайване. К сожалению, НОАК понесла тяжелые потери в сражении, но удар, нанесенный сепаратистским и империалистическим силам, был необходим. Несколько сотен японских и австралийских наемников были захвачены в плен во время сражения, и еще несколько сотен были убиты.\n\nС захватом Тайбэя Народно-освободительная армия теперь находится на грани полного уничтожения оставшихся сторонников сепаратизма в провинции Тайвань. Все войска из Тайбэйской операции будут перенаправлены на подавление этих несогласных в других местах, которые находятся в основном в горном центральном регионе Тайваня, имеющем небольшое стратегическое значение и не имеющем доступа к береговой линии или портам.\n\nГенерал сухопутных войск НОАК Чжан Юся сообщил, что военная операция по борьбе с сепаратистами проходит по плану и что ожидается, что все несогласные сепаратисты потерпят крах в течение следующего месяца. Он закончил свое заявление предупреждением имперских держав в тихоокеанском регионе о том, что их поддержка сепаратистских террористов на Тайване - это игра с огнем, и неизбежным результатом будет то, что они очень скоро серьезно пострадают."
 china.72.a: "Тайвань находится на последнем издыхании."
 china.73.t: "Студенческие Антивоенные Протесты"
 china.73.d: "По мере затягивания войны на Тайване непопулярность войны росла, особенно в академических кругах и интеллигенции. В университетских городках по всему Китаю протестующие студенты и профессора выступили против войны, назвав ее унижением человеческого достоинства. Хотя этот протест, скорее всего, мало повлияет на политику правительства, это верный признак того, что высокие потери, понесенные НОАК в войне, которая напрямую не приносит пользы нашим гражданам, становятся все более и более непопулярными дома. Сотрудники Министерства государственной безопасности предложили нам принять меры и подавить эти протесты до того, как их подрывные послания дойдут до большего числа людей. Тем временем реформаторы в нашем правительстве предложили нам разрешить этим протестам продолжаться в знак свободы слова в Китае, хотя они и призвали нас осудить их как иностранных агентов в средствах массовой информации."
 china.73.a: "Разогнать Протесты"
 china.73.b: "Пусть Продолжают"
 china.74.t: "Президент Си Посещает Ухань"
 china.74.d: "Демонстрируя национальное лидерство, президент Си нанес визит в закрытый город Ухань, где побеседовал как с жителями, так и с местными чиновниками о борьбе с новой болезнью - коронавирусом. В больнице Хуошэньшань президент Си поговорил с инфицированным пациентом по видеосвязи, сказав: "Что вам следует сделать сейчас, так это сохранять уверенность. Мы все должны быть уверены в том, что выиграем эту войну. Победа Уханю, победа Хубэю и победа Китаю!"\n\nСи Цзиньпин сказал, что эпидемия была самой быстро распространяющейся, самой масштабной и самой сложной чрезвычайной ситуацией в области общественного здравоохранения, с которой столкнулась страна с момента основания Китайской Народной Республики в 1949 году. \"Жизнь имеет первостепенное значение\", - сказал Си. В телевизионном выступлении перед местными чиновниками Си объявил "Народную войну" и лично взял на себя ответственность за ответные меры, мобилизовав национальные ресурсы для борьбы с "невидимым врагом"."
 china.74.a: "Достойно"
 china.75.t: "Национальный День Траура по Случаю Фестиваля Цинмин"
 china.75.d: "В субботу на три минуты люди по всему Китаю прекратили то, чем они занимались. В общественных местах крупных городов жители, одетые в маски, вместе, но физически раздельно, склонили головы и отдали дань уважения тысячам соседей и соотечественников - друзьям, родственникам, пациентам и медицинским работникам, - которых больше нет с ними.\n\nПока они стояли в тишине, сирены воздушной тревоги и клаксоны транспортных средств выли свой плач. Председатель Си Цзиньпин возглавил этот жест на церемонии в Пекине, одетый в черное и окруженный самыми видными членами Коммунистической партии Китая. Приспущенные флаги развевались, и развлекательные мероприятия также были приостановлены по всей стране. Освещая события дня, новостные агентства Китая, включая государственные "Синьхуа" и "China Daily", сократили цветовую гамму своих домашних страниц до черно-белой. Многие пользователи социальных сетей сделали то же самое со своими профилями.\n\nДень траура совпал в этом году с Цинмином, ежегодным праздником в Китае, посвященным возвращению к местам захоронения близких и уборке их могил. Это не первый случай, когда национальный фестиваль частично посвящен увековечиванию памяти о конкретной катастрофе, поскольку граждане Китая воспользовались возможностью, предоставленной Цинмином, чтобы скорбеть о жертвах недавних землетрясений и других стихийных бедствий."
 china.76.t: "Пандам не Грозит Вымирание"
 china.76.d: "Сегодня хороший день, чтобы быть гигантской пандой. Китайские чиновники по охране природы объявили, что они больше не считают гигантских панд в Китае исчезающим видом.Их статус был обновлен до "Уязвимых", - сообщил Цуй Шухун из Министерства экологии и охраны окружающей среды Китая. В настоящее время в дикой природе обитает 1800 гигантских панд, и это число официальные лица приписывают приверженности страны сохранению природных заповедников и другим природоохранным инициативам в последние годы. В результате другие виды также процветали: по данным издания, численность сибирских тигров, азиатских слонов и хохлатых ибисов постепенно увеличилась."
 china.77.t: "Японские Войска Готовят Вторжение в Цзиньмэн"
 china.77.d: "Сегодня Министерство государственной безопасности сообщило нам тревожные новости. По данным разведки, Япония и ее союзники разрабатывают планы вторжения на Цзиньмэнь. Хотя случайному наблюдателю этот остров может показаться неважным, его стратегическое значение невозможно переоценить. Расположенный в непосредственной близости от материковой части Китая, Цзиньмэнь может быстро превратиться в критически уязвимое место, если его захватят наши противники.\n\nЭта уязвимость обусловлена близостью острова к ключевым городам, жизненно важным для снабжения наших сил на Тайване. Захват Цзиньмэньа подвергнет наши города и пути снабжения угрозе артиллерийского обстрела, сделав их легкой мишенью для враждебных сил. Такой сценарий неизбежно приведет к значительным неудачам.\n\nУчитывая эти насущные проблемы, нам необходимо немедленно начать оборонительные приготовления, чтобы защитить себя от потенциальных угроз. В противном случае мы можем столкнуться с серьезными последствиями."
 china.77.a: "Мобилизуйте береговую охрану."
 china.78.t: "Цзиньмэн Пал!"
 china.78.d: "Сегодня утром мы получили сообщение о том, что японские войска и силы ОДТО официально заняли весь архипелаг Цзиньмэнь. Несмотря на наши усилия по укреплению укреплений на островах и мобилизации эффективной обороны, мы не смогли противостоять морскому вторжению.\n\nНаши войска храбро сражались в течение многих дней напряженных боев, но растущее давление противника заставило наших солдат отступить на материк. Впоследствии до нас дошли слухи о том, что вражеские силы обстреливают все ближайшие порты, расположенные вблизи архипелага."
 china.78.a: "Это полное унижение!"
 china.79.t: "Цзиньмэн Выстоял!"
 china.79.d: "Сегодня утром мы получили сообщение, что силы Японии и ОДТО были успешно отбиты с архипелага Цзиньмэнь. Похоже, что наши усилия по укреплению обороны на острове увенчались успехом. \n\nНаши войска сражались энергично и храбро в течение нескольких дней интенсивных боев в джунглях и городах. Но их усилия были не напрасны, так как их силы оказались не готовы к упорному сражению, впоследствии приказав полностью эвакуировать свои войска."
 china.79.a: "Мы преподали им урок."
 china.80.t: "Начало Китайско-Японской Холодной Войны"
 china.80.d: "ПЕКИН (АП) - Напряженность между Китаем и Японией достигла новых высот, новая холодная война охватила Азию.\n\nДавний территориальный спор из-за островов Дяоюйдао/Сенкаку в Восточно-Китайском море был источником трений между двумя странами на протяжении десятилетий. Но недавние события, включая формирование Организации Договора о тихоокеанской обороне (ОДТО) и вторжение Китая на Тайвань, усилили соперничество и вызвали опасения по поводу потенциального военного конфликта, поскольку обе страны резко увеличили свои военные бюджеты после окончания Тайваньской войны. Оборонный пакт, созданный незадолго до Тайваньской войны, был расценен Китаем как провокационный шаг Японии по противодействию китайскому влиянию в Азии. После окончания войны Китай усилил свое военное присутствие в Восточно-Китайском море, проводя частые морские патрулирования вокруг спорных островов и бросая вызов контролю Японии над этим районом. Китай также предпринял шаги по расширению своей Восточноазиатской оборонной инициативы в попытке закрепить за собой статус глобальной сверхдержавы с начала Второй гражданской войны в США.\n\nСитуация остается напряженной и непредсказуемой, обе стороны продолжают прибегать к провокационным действиям и риторике. В то время как мир наблюдает и ждет, страх перед потенциальным военным конфликтом между двумя азиатскими державами становится все более очевидным."
 china.80.a: "Судьба Азии висит на острие ножа"
 china.81.t: "Четыре Поколения"
 china.81.d: "Линь Сянвань осторожно достала фотографии деда и отца из старого деревянного шкафа. Когда она открыла его дверцы, в воздухе разнесся слабый запах камфоры. На черно-белой фотографии дед был запечатлен в хлопковой куртке, улыбаясь и показывая отсутствующий зуб.\nБабушка часто рассказывала истории о том, как он сражался с японцами, а позже с американцами. Фотография отца была цветной: он был одет в зеленую форму, прислонился к разбитой стене, а его лицо было испачкано пылью. Его глаза и брови напоминали дедушкины, хотя его выражение лица всегда было серьезным. Позже эта фотография появилась в углу газеты, и он стал одним из тех, чьи имена были увековечены на Кладбище мучеников.\nМягким платочком она аккуратно вытерла пыль с рамок и поставила их рядом на кофейный столик рядом с собой, лицом к телевизору. Устроив их, она открыла ноутбук.\nКогда видеозвонок соединился, ритмичный писк медицинского оборудования заполнил тишину. На другой стороне экрана был ее брат, лежащий в белой больничной койке, окруженный клубком трубок. Взрыв отнял у него ногу и, на данный момент, способность говорить. Большую часть времени он просто смотрел на нее и мягко моргал.\nСянвань повернула свой ноутбук, направив камеру на экран телевизора. Парадные построения на экране отражались в глазах сразу четырех человек. Дедушка видел самолеты своей эпохи; их было недостаточно, поэтому они должны были пролететь дважды. Ее отец видел серое небо над Вэньчуанем. Ее брат видел пески Сомали, окрашенные в багровый цвет кровью.\nОна смотрела, как бронемашины мчатся по экрану телевизора, взглянула на застывшую улыбку дедушки на фотографии, на торжественное лицо отца, а затем на глаза брата - единственную часть его тела, которая еще могла двигаться - во время видеозвонка. В тот момент ее дом казался полным жизни, и все же в нем царила непоколебимая пустота, тишина, нарушаемая только грохотом телевизора.\nБез предупреждения слеза тихо скатилась по щеке Сянвань. Она не вытерла ее. Вместо этого она подумала: "Я не могу плакать. Мой брат увидит.""
 china.81.a: "Дедушка и папа тоже это увидят."
 china.82.t: "Ракетные Удары по Тайваню!" 
 china.82.d: "В результате шокирующей эскалации Китай нанес серию ракетных ударов по военным базам и важнейшим объектам инфраструктуры на Тайване. Удары, нанесенные рано утром, погрузили остров в хаос: взрывы прогремели в Тайбэе, Гаосюне и других ключевых городах. Власти Тайваня призывают жителей сохранять спокойствие, пока аварийные службы пытаются ликвидировать последствия. Судя по первым сообщениям, сильно пострадали военные объекты и системы ПВО, что свидетельствует о расчетливой попытке Пекина подорвать способность Тайваня к быстрому реагированию. Эта беспрецедентная атака - самая прямая военная акция Китая против Тайваня в новейшей истории, поставившая хрупкий статус-кво на грань краха.\n\nВ Японии официальные лица выражают глубокую озабоченность, опасаясь, что конфликт может перекинуться на весь регион. Токио призывает к сдержанности и предупреждает, что любая дестабилизация региона может иметь далеко идущие последствия для Восточной Азии. В то время как дипломатические каналы остаются неопределенными, силы Тайваня мобилизуются перед лицом непреодолимого барьера, понимая, что их реакция в эти критические часы может определить будущее острова."
 china.82.a: "..."
 china.82.b: "Время пришло!"
 china.82.c: "Дракон Пробуждается"
 china.83.t: "Вторая Волна Ракетных ударов!" 
 china.83.d: "Война жизни и смерти снова вернулась в Республику.\n\nПрошло всего несколько дней после начала кризиса Четвертого пролива, и ракеты с материка впервые поразили наши ключевые объекты инфраструктуры и города. Пока Министерство национальной обороны в спешном порядке мобилизует резервистов и готовится к обороне, на нас обрушилась вторая волна ракетных ударов, на этот раз разрушив наши административные и коммуникационные возможности.\n\nНо немногие уцелевшие радарные станции зафиксировали нечто гораздо более ужасающее: бесчисленные десантные корабли и их эскорт стремительно приближаются к нашим берегам, сигнализируя о скором вторжении. Это может означать только одно: кризис Четвертого пролива закончился, война на Тайване началась.\n\nНесмотря на отсутствие Соединенных Штатов, мы не одиноки. Силы интервенции из ОДТО еперь помогают нам в обороне во всех секторах, стоя плечом к плечу с нами на посадочных площадках, чтобы отразить любые войска, которые осмелятся бросить вызов нашей территориальной целостности.\n\nТеперь мы должны сражаться и оставаться непокоренными против Красного Гиганта. Если мы потерпим неудачу, горящий факел китайской демократии будет навсегда потушен."
 china.83.a: "Вставай и Сражайся!"
 china.84.t: "Выбор дальнейшего плана"
 china.84.d: "Первые 72 часа Тайваньской войны подошли к концу, и мы не можем не поздравить героическую Народно-освободительную армию. Вооруженные силы тайваньского псевдоправительства понесли большие потери. Радары раннего предупреждения и зенитно-ракетные комплексы стали добычей самолетов еще до того, как их успели задействовать. Многие истребители были уничтожены ракетными войсками на посадочной полосе. Устаревшие военные корабли Тайваня также в основном остались в гавани, пылая густым черным дымом. Большая часть сил Тайваня также находится под постоянным наблюдением наших спутников.\n\nГенералы НОАК ведут напряженные дискуссии о своих дальнейших действиях. Командующие фронтами в Восточном театральном командовании считают, что ценное время, образовавшееся в результате нападения, должно быть использовано для немедленного наступления на остров, пока тайваньцы не успели оправиться от потерь. Офицеры Объединенного штаба, с другой стороны, предупреждают, что главные силы ОДТО уже вступают в бой и быстрое наступление будет невозможным. В ближайшее время мы должны сосредоточиться на сдерживании вражеских контратак и осторожном продвижении вперед.\n\nЦентральная военная комиссия представила оба мнения вместе в Политбюро для принятия решения. Это решение, возможно, изменит ход всей войны."
 china.84.a: "НОАК будет сражаться с любым врагом! "
 china.84.b: "Войска должны избегать высокомерия и стремительности."
 china.85.t: "Беспорядки в крупных городах Юга"
 china.85.d: "Шэньчжэнь, некогда бывший маяком китайских реформ и открытости, теперь лежит под темной тучей. Десятки тысяч горожан молча собираются у ворот комплекса городского правительства и на Средней дороге Шэньнань. Они поднимают транспаранты, окрашенные в кроваво-красный цвет, с требованиями "Долой коммунистическую партию", "Верните мне мою работу" и "Смерть Си Цзиньпину". Статуя преданного быка, некогда символ служения народу, теперь стоит изуродованная в центре клумбы. Ее основание, рога и спина покрыты граффити, выражающими отчаяние и гнев.\n\nВ Шанхае башня "Восточная жемчужина" возвышается над городом, охваченным беспорядками. Протестующие заполняют улицы, от шумной Нанкинской дороги до финансового центра Луцзяцзуй, от торгового района Цзинъань до огромной Народной площади. Они скандируют о свободе слова, политических реформах и отставке Си Цзиньпина. Некоторые пытаются прорвать баррикады у правительственных зданий, разжигая волну неповиновения.\n\nВ комнате общежития Центрального южного университета в Чанше две двухъярусные кровати занимают большую часть пространства. Ноутбук в углу излучает слабое голубое свечение, воспроизводя видео с сайтов Weibo и Douyin. Четверо молодых людей внимательно наблюдают за тем, как массовые толпы протестуют по всему южному Китаю - от Наньнина до Хайкоу, от Фучжоу до Нанкина. В комнате царит напряженная атмосфера, пока один из них не нарушает тишину, медленно произнося:"
 china.85.a: ""Похоже, надвигается буря.""
 china.88.t: "Вьетнам предлагает заключить союз"
 china.88.d: "Вслед за соглашением о совместном владении островами Парцелл, урегулировавшим столетний спор, вьетнамское правительство выдвинуло еще одно предложение. Резко нарушив десятилетний нейтралитет, Вьетнам предложил присоединиться к Восточноазиатской оборонной инициативе в обмен на полное владение островами Парцелл и признание нарушений во время войны 1979 года. Многие в правительстве рассматривают это как позитивную возможность устранить раскол между двумя нациями, который существовал слишком долго, а также обезопасить нашу южную границу. Однако националисты в правительстве яростно выступили против этой идеи, обвиняя сторонников в "готовности продать кусочки родины ради видимости дружбы" и продвигая идею о том, что повторное предъявление претензий на остров потеряет легитимность Коммунистической партии и приведет к продолжению столетия унижений. Тем не менее, решение должно быть принято скорее раньше, чем позже."
 china.88.a: "За социалистическое братство!"
 china.88.b: "Китайская Земля Не Продается!"
 china.89.t: "Идеальный Коллекционер"
 china.89.d: "Итак, что же сейчас является самым продаваемым китайским экспортным товаром на планете? Телевизоры и стиральные машины, которыми заполнены пригородные квартиры? Электронные роботы и складные телефоны Huawei на умных фабриках? Или, может быть, штурмовые винтовки, фрегаты и дроны, которыми оснащена миллионная армия? Ответ может удивить вас и даже самого товарища председателя: это плюшевая, уродливо-милая игрушка под названием Лабубу.\n\nНекоторые западные медиа-комментаторы могут быстро отмахнуться от этого, назвав его просто еще одним "культурным ядом потребительства", подобным Ли Цзыци и Genshin Impact, запущенным в свободный мир китайскими социалистами. Но давайте будем реалистами: успех Labubu просто беспрецедентен. После массового производства и появления в руках знаменитостей и модников популярность Лабубу быстро взлетела из тихого уголка Восточной Азии и охватила весь мир. От Токио до Лондона покупатели выстраиваются в очереди у игрушечных магазинов. В Китае спекулянты перепродают их по заоблачным ценам, а подделки процветают, вынуждая таможенников повсюду проводить специальные операции, чтобы остановить поток поддельных Лабубу. На пике ажиотажа фанаты даже устраивали драки, чтобы заполучить одну из них. Специальная версия в натуральную величину была продана на аукционе за астрономическую сумму, а различные американские ополчения приняли Лабубу в качестве талисманов, одевая их в кепки "MAGA" или радужные флаги, наводняя TikTok политическими пропагандистскими видео с резким звуком.\n\nДаже если кто-то захотел бы их остановить, скорее всего, уже слишком поздно: Лабубу уже покорили мир своей "тактикой живой волны". Всем фанатам следует быть начеку: кто знает, может быть, за их невинным взглядом скрываются крошечные камеры."
 china.89.a: "Китай встаёт, миллионы должны покупать Лабубу."
 china.90.t: "Вьетнам присоединяется к ОДТО"
 china.90.d: "Несмотря на то, что обе страны являются социалистическими, которые якобы "на стороне друг друга" из-за их общей идеологии, у Вьетнама и Китая были тревожные отношения на протяжении большей части 20-го и 21-го веков. Историческое недоверие между народами чрезвычайно велико, уходящее корнями в многовековые попытки Китая установить господство над Вьетнамом, включая войну Сун Дайвьет, завоевание Дай Нгу династией Мин и китайско-вьетнамские пограничные конфликты 1979 года. Во Вьетнаме люди разделены между любовью к экономическим выгодам, которые они получают от внедрения экономической системы, схожей с китайской, а также денежным притоком, который приносят китайские бизнесмены и туристы, и удовольствием от покупки дешевой китайской бытовой электроники. С другой стороны, территориальные нарушения Китая, в первую очередь споры о рыболовстве в Южно-Китайском море, заставили многих вьетнамцев с горечью относиться к своим отношениям с Китаем. В связи с частыми китайскими вторжениями в воды, на которые претендует Вьетнам, и агрессией Военно-морского флота Народно-освободительной армии в прибрежных водах далеко за пределами границ Китая правительство Вьетнама решило, что его территориальный суверенитет лучше всего полностью поддержать Западом. Приняв решение присоединиться к японскому альянсу Организации Договора о тихоокеанской обороне, Вьетнам остался верен своему суверенитету, чего бы это ни стоило."
 china.90.a: "Типичная борьба левых" #лол
 china.91.t: "Лаос присоединяется к ВАОИ"
 china.91.d: "Многие комментируют Юго-Восточную Азию как "Мягкое подбрюшье" Китая, при этом многие страны АСЕАН настроены антикитайски из-за его агрессивных действий в Южно-Китайском море. Однако одна нация постоянно поддерживала Китай на протяжении многих лет его существования - нация Лаос. Хотя многие забывают, Лаос является одной из немногих коммунистических стран, переживших холодную войну, оставаясь приверженным идеалам социализма даже тогда, когда вокруг него распался Восточный блок. Вступая в 21 век, тесные связи как с Китаем, так и с Вьетнамом приблизили страну к рыночной социалистической модели развития, обеспечив значительный экономический рост и сокращение бедности, а также усиление неравенства. В условиях новой холодной войны, охватившей Азию, Лаос в очередной раз попытался подтвердить свои связи с Китаем, официально присоединившись к возглавляемой Китаем организации обороны Восточной Азии в 2014 году. По мере того, как по всей Азии выстраиваются линии фронта, Лаос не намерен оставлять себя без защиты и без друзей посреди хаоса."
 china.91.a: "Интересно"
 china.92.t: "Непал присоединяется к ВАОИ"
 china.92.d: "Лишь недавно став коммунистическим государством, Непал за последние несколько лет оказался в напряженном положении между двумя сверхдержавами - Китаем и Индией. После десяти лет гражданской войны маоисты и марксисты-ленинисты свергли монархию и основали федеративную республику, которая продолжает править Непалом по сей день. В отличие от многих марксистско-ленинских пролетарских диктатур, Коммунистическая партия Непала привержена своей линии "Народной многопартийной демократии". Таким образом, его политика оставалась гораздо более гибкой, чем марксистская ортодоксальность, сохраняя дружественные связи как между Индией, так и между Китаем. Однако в связи с прекращением прямых иностранных инвестиций и туризма в Индии после прихода к власти режима Бхараты и ядерной войны непальское правительство обратилось за безопасностью к Китаю. Возвращаясь к блокаде Непала в 2015 году, когда Индия попыталась вызвать волнения среди своего индийского населения на юге Непала, правительство в очередной раз опасается, что ультрареваншистское правительство в Дели включит Непал в свой список территорий, которые оно желает подчинить "Великой Индии"."
 china.92.a: "Маоисты, работают с Китаем?"
 china.93.t: "Камбоджа присоединяется к ВАОИ"
 china.93.d: "В качестве шага, который мог бы еще больше укрепить военное влияние Китая в регионе, Камбоджа объявила о своем решении присоединиться к Восточноазиатской оборонной инициативе (ВАОИ), альянсу коллективной безопасности, возглавляемому Китаем.Решение было объявлено премьер-министром Камбоджи во время встречи с министром обороны Китая в Пномпене. Этот шаг был предпринят на фоне растущей обеспокоенности камбоджийских официальных лиц ситуацией в области безопасности в стране, особенно в отношении военных целей Индии, которая публично объявила о своем желании доминировать во всей Азии.\n\nВ заявлении, опубликованном после встречи, премьер-министр заявил, что членство Камбоджи в ВАОИ это помогло бы обеспечить региональную стабильность и содействовать сотрудничеству между странами-участницами. Премьер-министр также высоко оценил роль Китая как "ответственного и надежного партнера" в содействии миру и безопасности в регионе."
 china.93.a: "Интересно"
 china.94.t: "Шри Ланка присоединяется к ВАОИ"
 china.94.d: "Шри-Ланка объявила о своем решении присоединиться к Восточноазиатской оборонной инициативе (ВАОИ), военному альянсу, возглавляемому Китаем. Этот шаг вызвал обеспокоенность у некоторых аналитиков, которые рассматривают его как еще один признак растущего сближения Шри-Ланки с Китаем и ее растущего отчуждения от Индии и ее союзников.Официальные лица Шри-Ланки заявили, что решение присоединиться к ВАОИ было продиктовано желанием укрепить безопасность страны и содействовать сотрудничеству с ее региональными партнерами. После наплыва индийских беженцев, последовавшего за насилием во время гражданской войны в Индии, Шри-Ланка пострадала от крайней нестабильности, поскольку экономическая депрессия усугубилась притоком беженцев. В рамках своего вступления в ВАОИ Китай предоставит Шри-Ланке столь необходимую помощь, а также военную технику и обучение для стабилизации ситуации в стране. Это заявление было сделано после нескольких недель переговоров между китайскими и шри-ланкийскими дипломатами в городе Коломбо.Решение Шри-Ланки присоединиться к ВАОИ было принято на фоне растущих опасений по поводу расширения присутствия Китая в Индийском океане, где он вложил значительные средства в инфраструктурные проекты и создал военно-морскую базу в южном порту Хамбантота.Решение Шри-Ланки, вероятно, еще больше обострит ее отношения с Индией, которая критически относится к растущему влиянию Китая в регионе. Этот шаг Шри-Ланки является частью более широкой тенденции стран региона, включая Лаос и Непал, объединяться с Китаем в ответ на растущую неопределенность в отношении индийской политики и меняющийся баланс сил в регионе."
 china.94.a: "Заноза в боку Индии"
 china.95.t: "Южная Корея пересекает 38-ю параллель!"
 china.95.d: "Примерно через 200 дней после смерти Ким Чен Ына от сердечного приступа, по данным разведывательных служб Республики Корея, Северная Корея находилась в состоянии полной анархии, когда Рабочая партия Кореи, военные клики и криминальные группировки боролись за контроль над остатками государства Чучхе. Все больше росло беспокойство по поводу того, что одна из группировок попытается использовать северокорейские ядерные запасы, чтобы получить преимущество в конфликте.Сегодня, в 05:00 по местному времени, вооруженные силы Республики Корея пересекли демилитаризованную зону и продвинулись к северу от 38-й параллели впервые с тех пор, как активная фаза Корейской войны закончилась около 70 лет назад. Наземному наступлению предшествовал 30-минутный артиллерийский обстрел, а также воздушное наступление, состоявшее из истребителей F-35A для уничтожения зенитно-ракетных батарей.\n\nВ 08:00 по местному времени Объединенный комитет начальников штабов и президент Республики Корея провели пресс-конференцию, объявив о начале военной операции по "обеспечению контроля над оружием массового уничтожения и освобождению Корейского полуострова от коммунистического гнета", и что операция проходит по плану, и ожидается, что все цели будут достигнуты. достигнуто.\n\nТекущее состояние линии фронта неизвестно, но источники в вооруженных силах РК предполагают, что армия РК быстро продвигается к самому Пхеньяну, и ожидается, что город падет через несколько дней из-за стремительного характера наступления. Только время может показать, как будет проходить эта военная операция."
 china.95.a: "Полуостров горит"
 china.96.t: "Битва за Пхеньян"
 china.96.d: "Столкнувшись с неожиданно ожесточенным сопротивлением северокорейской военной клики и партийных ополченцев, Вооруженные силы РК начали прямое наступление на Пхеньян с юга, пытаясь взять город штурмом и быстро захватить его, где они столкнулись с чрезвычайно ожесточенным сопротивлением.Были замечены колонны бронетехники НРОК, въезжающие на окраины города и возвращающиеся несколько часов спустя, при этом многие транспортные средства пропали без вести, а остальные были заметно повреждены. Первоначальные атаки на город оказались полнейшими неудачами, с тревожно высоким уровнем потерь, что вынудило силы РК предпринять медленную и изнуряющую операцию по окружению города, продвигаясь на северо-восток вдоль гор через последовательные оборонительные рубежи в течение нескольких месяцев. В то время как разрозненный характер обороняющихся сил означал, что координация успешных контратак была практически невозможна, мощные укрепления и труднопроходимая местность делали продвижение РК чрезвычайно трудным и дорогостоящим.Через несколько месяцев после первоначального штурма Пхеньяна силы РК, наконец, начали новое наступление непосредственно на город с юга, востока и северо-востока, используя гораздо больше пехоты по сравнению с первоначальным штурмом и завоевав гораздо больше территории, но, к сожалению, понеся гораздо большие потери в последовавшем городском конфликте. После последнего отчаянного контрнаступления военной клики и партийных ополченцев силам РК удалось захватить столицу старого северокорейского режима, объявив о победе."
 china.96.a: "Конец Кимов близок"
 china.97.t: "Начинается Паназиатская Война"
 china.97.d: "Впервые со времен Второй мировой войны Азия была охвачена пламенем. От Гималаев до Восточно-Китайского моря силы ВАОИ и ОДТО сталкиваются в войне, которая определит будущее поколения.\n\nНа спорной территории Джамму и Кашмир силы НОАК и Индии противостоят друг другу с оружием в руках, а не с палками и камнями. Джунгли Мьянмы были подожжены зажигательными снарядами, когда ВАОИ и ОДТО начали продвигаться вперед. Небо над Пекином и Шанхаем озаряется сиянием миллионов светлячков, когда реактивные самолеты НОАК поднимаются навстречу приближающимся бомбардировщикам ОДТО.\n\nнаступила последняя война в Азии, и никто не может ее остановить."
 china.97.a: "Миллионы Умрут"
 china.98.t: "Занимательное Предложение"
 china.98.d: "В условиях эскалации напряженности в Европе Берлин выдвинул противоречивое предложение:\n\nКитай должен помочь противостоять русским фашистским силам в обмен на ряд уступок после войны.\n\nЭто предложение вызвало острую дискуссию внутри партии, создав четкий раскол. Сторонники этого предложения утверждают, что для Китая это шанс укрепить связи с Европой и ослабить влияние России на Дальнем Востоке, обеспечив доминирование Китая в азиатских делах. Противники же призывают к осторожности, считая, что рисковать нынешней стабильностью в отношениях с Россией неразумно. Они утверждают, что вовлечение Китая в европейские конфликты может привести к ненужным рискам, учитывая непредсказуемость геополитической обстановки.  В частности, конфликт или военная конфронтация с Россией могут иметь непредсказуемые последствия. Кроме того, экономическое и стратегическое значение Северо-Восточной Азии уменьшилось, что делает дальнейшее внимание к ней потенциально расточительным."
 china.98.a: "Надо помочь нашим братьям в Берлине!"
 china.98.b: "Мирное развитие - вот настоящая сила!"
 china.99.t: "Китайское Вторжение в Монголию"
 china.99.d: "После завершения Тайваньской войны на азиатском континенте разразилась еще одна война. Китайская Народная Республика начала полномасштабное вторжение в Монголию. После заявления КНР в монгольской столице завыли сирены, а китайские самолеты и ракеты нанесли удары по ключевым правительственным и военным объектам. После стремительной воздушной кампании появились тревожные кадры, на которых видно, как колонны китайских автомобилей пересекают границу и проникают на территорию Монголии.\nМногие аналитики связывают этот дерзкий акт агрессии со все более националистическим режимом во главе Китая, стремящимся утвердить влияние и власть КНР. Международное сообщество, включая Организацию тихоокеанского оборонительного договора, быстро осудило действия КНР, осудив ее агрессивные военные маневры на азиатском континенте и призвав к немедленному прекращению военных действий."
 china.99.a: "Китайский флаг скоро появится над Улан-Батором."
 china.100.t: "Россия угрожает вмешательством"
 china.100.d: ""
 china.100.a: "Монголия - это Китай!"
 china.100.b: "Мы не можем рисковать войной с Россией."
 china.101.t: "Либеральная оппозиция собирается в Гуандуне"
 china.101.d: ""
 china.101.a: "Мы должны сокрушить внутрипартийную фракционность!"
 china.102.t: "Консервативная оппозиция собирается в Чунцине"
 china.102.d: ""
 china.102.d: "Враги со всех сторон"
 china.103.t: "Завершение деятельности консультативных сторон"
 china.103.d: "Согласно срочному заявлению центрального правительства, в связи со сложной внутренней и международной ситуацией, было принято решение о комплексной перестройке существующей партийной системы для обеспечения национальной безопасности и социальной стабильности. В объявлении говорится, что восемь консультативных партий приостанавливают свои функции, а их общественные организации и деятельность будут переведены в новую систему управления.\n\nВ объявлении говорится: "Система консультативных партий выполнила свою историческую миссию." Штаб-квартиры консультативных партий заняли военные и полицейские силы, а Департамент по работе Объединенного фронта будет следить за переселением бывших членов. Некоторым партийным лидерам было предложено сотрудничать со следствием.\n\nПосле этого заявления военные быстро приняли меры, закрыв офисы консультативных партий по всей стране. Это знаменует собой значительную трансформацию политической системы с момента основания КНР, в результате которой влияние военных на принятие решений заметно усилилось. Аналитики предполагают, что этот шаг жесткой фракции военных может быть связан с изменениями во внешней политике."
 china.103.a: "Пусть Коммунистическая Партия Просуществует Тысячу Лет"
 china.104.t: "Расцвет Многопартийной Системы"
 china.104.d: "Центральный комитет выпустил "Ключевое решение по укреплению консультативных партий", в котором объявил о восстановлении и усилении функций восьми консультативных партий. В решении делается упор на достижение "более широкого патриотического единого фронта." После этого Управление военного комиссариата выпустило дополнительные директивы, требующие полного сотрудничества от ведомств всех уровней.\n\nВ "Решениях" перечислены 6 новых важнейших функций консультативных партий, включая участие в выработке основной политики, рекомендации по назначению персонала и специализированный надзор. В то же время Департамент по работе Объединенного фронта создаст специальную рабочую группу по подготовке и руководству кадрами. Военные выразили полную поддержку этой корректировке, направив военных представителей в офисы консультативных партий для оказания помощи в проведении операций.\n\nКроме того, кадровые назначения и основные решения консультативных партий будут строго контролироваться недавно созданной "Руководящей группой патриотического Объединенного фронта", а организационные структуры будут подвергнуты реструктуризации. Партии будут регулярно отчитываться перед Центральным комитетом и получать военное руководство. Из информированных источников стало известно, что во всех консультативных партиях завершилась смена руководства, причем новые лидеры обладают более сильной военной подготовкой."
 china.104.a: "Новый тип демократии."
 china.105.t: "Провозглашение Китайской Народной Империи"
 china.105.d: "Правительство Китайской Народной Республики официально объявило о смене названия страны на "Китайскую Народную Империю". Это изменение призвано подчеркнуть новое положение страны на международной арене и вступает в силу первого числа следующего месяца.\n\nПомимо смены названия, похоже, что политическая система Китая приближается к древнекитайской: в ней вновь появляются имена древнекитайских чиновников. А достоверные источники сообщают, что правительство Народной империи, похоже, готовится переписать свою историю с 1949 года в стиле, который напоминает древний Китай, а Мао Цзэдуну посмертно будет присвоен некий почетный императорский титул.\n\nКитай уже издал "Императорский Эдикт о Смене Названия Страны" для ряда международных организаций, а различные международные договоры, личные паспорта и сопутствующие документы будут постепенно обновляться. Некоторые страны и организации выразили серьезную озабоченность по этому поводу, а некоторые даже призвали Китай дополнительно разъяснить свое намерение изменить название, но правительство Народной Империи лишь ответило на это: "Суверенитет не должен подвергаться сомнению иностранцами"."
 china.105.a: "Империя Дракона восстанет вновь..."
 china.106.t: "@PresidentWang"
 china.106.d: ""Ты ведь не шутишь, правда?" Ли Цянь снял наушники и поднял взгляд от экрана компьютера, его обесцвеченные глаза с недоверием уставились на своего соседа по комнате. С первого дня учебы в колледже он знал Ма Хая как легкомысленного и хвастливого человека, но слова, сказанные Ма Хаем, заставили Ли Цяня вздрогнуть и подумать, что у него галлюцинации из-за того, что он не спал всю ночь, играя в игры.\n\n"Я не шучу! Посмотри, все в интернете только об этом и говорят. Ван Ян, наш президент, завел аккаунт в Weibo. Это точно не высококачественная подделка или ИИ!" Ма Хай встал, его налитые кровью глаза блестели от возбуждения. "Все сходят с ума! Просто сам посмотри!"\n\nСкептически настроенный Ли Цянь открыл давно забытое приложение Weibo, и, конечно же, на него смотрела серьезная, немного жесткая фотография профиля, а в личном представлении было смело написано: "Ван Ян, родился в 1955 году, президент государства, большевик." Все сомнения Ли были развеяны.\n\n"Это безумие! Китайский лидер в социальных сетях!" В семье Ма было несколько членов, участвовавших в студенческих движениях 80-х годов, поэтому он, естественно, был склонен к таким либеральным действиям. Но к тому времени Ли уже ничего не слушал. Аккаунт Вана был создан совсем недавно, и в нем было всего одно короткое приветствие. Однако количество комментариев, лайков и репостов уже исчислялось десятками тысяч.\n\nЛи внимательно пролистал каждый комментарий. Еще более удивительным, чем открытие Вангом аккаунта на Weibo, было отсутствие привычных контролируемых комментариев. Будь то дружеские приветствия, благоговейные поздравления, провокационные вопросы или гневная критика, каждый комментарий был настоящим и живым, что резко контрастировало с жестко контролируемыми разделами комментариев прошлого, в которых доминировал ИИ. Самое главное - ни один комментарий не был удален.\n\nХотя Ли никогда не был склонен к политике и часто избегал затрагивать щекотливые темы, на этот раз в его груди зашевелилось необычное чувство, вызвавшее сильное любопытство, и он захотел стать свидетелем того, как разворачивается новая эра. Он медленно передвинул мышь, навел указатель и нажал -"
 china.106.a: "+1 Подписчик"
 china.107.t: "Созыв Чрезвычайного Партийного Съезда"
 china.107.d: "После длительного периода беспорядков и политического вакуума Центральная военная комиссия объявила о первоначальном восстановлении национального порядка. Народно-освободительная армия, выполнив свою историческую миссию по стабилизации внутренней ситуации, официально передала политическую власть обратно партии и предложила созвать чрезвычайный партийный съезд для определения нового центрального руководства.\n\nЭто решение получило широкую поддержку со стороны правительств военных округов и регионов, символизируя переход к нормальному политическому управлению. Представитель Министерства обороны заявил: "Долг армии - защищать свой народ, а не управлять им. Настало время политическим лидерам взять штурвал в свои руки."\n\nДелегаты собрались в Пекине в момент открытия съезда в атмосфере срочности и порядка. После первых консультаций были определены два кандидата, пользующиеся широкой поддержкой партии и армии: Чэнь Вэньцин и Чэнь Цюаньго.\n\nДелегаты собираются проголосовать, чтобы решить, кто выведет страну из смуты и поведет ее в будущее."
 china.107.a: "Чэнь Вэньцин Был Избран Генеральным Секретарем."
 china.107.b: "Чэнь Цюаньго Был Избран Генеральным Секретарем."
 china.108.t: "Ли Цзочэн Назначен Генеральным Секретарем КПК"
 china.108.d: "После объявления чрезвычайного положения в стране Центральная военная комиссия издала приказ о назначении генерала Ли Цзочэна, бывшего начальника Объединенного штаба, генеральным секретарем Центрального комитета Коммунистической партии Китая. Однако в отличие от традиционной процедуры проведения партийного съезда, смена руководства произошла непосредственно под руководством военных, что стало первым случаем с эпохи Мао, когда высший руководящий пост занял не партийный кадр, а старший военный офицер.\n\nЛи Цзочэн родился в 1953 году, долгое время занимал ключевые посты в армии и Объединенном штабе, известен своим прагматичным и сильным стилем военного руководства. Внутри страны он считается твердым защитником стабильности и национального единства; на международной арене некоторые аналитики считают его возвышение "символом подъема китайского военного национализма."\n\nВ своей речи, транслировавшейся на всю страну, Ли Цзочэн пообещал "восстановить международный статус Китая, исправить исторические ошибки, обеспечить национальное единство и безопасность." Он подчеркнул, что новое руководство будет защищать национальные интересы с помощью решительных и четких стратегий и "продвигать вперед историческую задачу полного воссоединения родины."\n\nПо мере того как Народно-освободительная армия переходит к полной мобилизации, ситуация по ту сторону Тайваньского пролива становится центром внимания всего мира."
 china.108.a: "Началась новая эра национального восстановления под руководством военных."
 china.109.t: "Чэнь Вэньцин Избран Генеральным Секретарем КПК"
 china.109.d: "Последний съезд партии завершился в напряженной и мрачной атмосфере: Чэнь Вэньцин был официально избран генеральным секретарем Центрального комитета Коммунистической партии Китая.\n\nЧэнь Вэньцин родился в Сычуани в 1960 году, с 2022 года занимал пост секретаря Центральной комиссии по политическим и правовым вопросам, десятилетиями работал в системе национальной безопасности, судебной системе и партийных делах. В партии его хорошо знают как "хранителя системы безопасности" за его взгляды на национальную безопасность и твердую позицию против шпионажа и подрывной деятельности, он неоднократно возглавлял кампании, направленные против "сил иностранной инфильтрации."\n\nВ своей речи после избрания Чэнь Вэньцин пообещал "твердо защищать национальный суверенитет и безопасность, способствовать воссоединению страны и обеспечивать долгосрочную социальную стабильность." Он подчеркнул, что в новую эпоху Китай продолжит укреплять социальное управление, и поклялся "углубить стратегию национальной безопасности, чтобы обеспечить благосостояние народа."\n\nКитайские средства массовой информации назвали избрание Чэня "новым этапом безопасности и порядка в управлении страной" и высоко оценили его решительный стиль руководства. Однако некоторые международные наблюдатели опасаются, что его жесткая позиция в области безопасности может указывать на более жесткий и даже конфронтационный курс в будущем в области внутреннего контроля и внешних сношений Китая."
 china.109.a: "Началась новая эра, основанная на безопасности и стабильности."
 china.110.t: "Чэнь Цюаньго Избран Генеральным Секретарем КПК"
 china.110.d: "Последний съезд партии завершился шумно и напряженно: Чэнь Цюаньго был официально избран генеральным секретарем Центрального комитета Коммунистической партии Китая.\n\nЧэнь Цюаньго, родившийся в 1955 году в провинции Хэнань, ранее занимал пост партийного секретаря Тибета и Синьцзян-Уйгурского автономного района. Во время пребывания в Синьцзяне он стал известен жесткой политикой в области общественной безопасности и социального контроля, осуществляя меры по поддержанию стабильности под высоким давлением. Внутри страны его называли "сильной рукой, поддерживающей порядок", а на международной арене его политика вызвала широкую полемику. Чэнь известен своими решительными действиями и твердой политической позицией в партии, и он пользуется сильной поддержкой сторонников жесткой линии в системе безопасности и армии.\n\nВ своей речи после избрания Чэнь Цюаньго пообещал "обеспечить национальное единство, восстановить общественный порядок и вести китайскую нацию к выполнению ее исторической миссии." Он подчеркнул, что новая эра Китая будет по-прежнему уделять приоритетное внимание стабильности, углублять реформы в сфере социального управления и поклялся "продолжать продвигать полное воссоединение родины."\n\nХотя реакция иностранцев была неоднозначной. Китайские СМИ назвали избрание Чэня "важной вехой на пути возвращения страны к порядку и идеалам", заявив, что его лидерство "выведет народ из смуты." Однако международные аналитики опасаются, что приход к верховной власти лидера, известного своим жестким подходом к общественной безопасности и идеологическому контролю, может означать еще более твердый и решительный курс во внутреннем управлении и внешней политике Китая."
 china.110.a: "Возможно, наступает эра, в которой приоритетом являются стабильность и сильное управление."
 china.111.t: "unused"
 china.111.d: "unused"
 china.111.a: "unused"
 china.112.t: "Завершение строительства мегаполиса на Чжуцзян"
 china.112.d: "Чжао Цзунмин сидел за письменным столом, и под мягким светом настольной лампы тихо лежала переписанная бесчисленное количество раз речь.\n\n"В этот момент мы стоим на пороге нового начала в истории человечества..."\n\nЭта вступительная фраза занимала его мысли всю ночь. Эти несколько слов несли в себе груз огромных ожиданий и ответственности. Он встал и подошел к окну от пола до потолка. Вдалеке, словно серебряная лента, текла Жемчужная река. На востоке лежали Шэньчжэнь и Дунгуань, на западе - Фошань и Цзянмэнь, на юге - Чжухай и Чжуншань... Девять городов, взаимосвязанных и переплетенных, образующих колоссальный столичный кластер. Этот мегаполис превзойдет Токио, Нью-Йорк, Лондон - превзойдет любой городской район на планете - и станет самым большим и самым развитым городским конгломератом в истории человечества.\n\n"Стоять на краю пропасти..." Чжао Цзунмин почувствовал недовольство от этой фразы. Казалось, что они просто ждут милости от судьбы. Но этот мегаполис не был подарком судьбы; он строился кирпичик за кирпичиком руками миллионов рабочих. Они не были зрителями истории - они были ее творцами.\n\nЧжао вернулся к своему столу, взял ручку и, не задумываясь, перечеркнул строку. Перо уверенно двигалось по бумаге, пока он писал: "В этот момент мы ведем человечество в новую эру...""
 china.112.a: "Неокитай прибывает из будущего."
 china.113.t: "Завершение строительства мегаполиса Пекин-Тяньцзинь"
 china.113.d: "Когда Се Минфу исполнилось 88 лет, он вдруг понял, что уже не помнит, когда Тяньцзинь и Пекин стали одним целым. Это осознание поразило его так же внезапно, как воспоминание о покупке в юности своих первых карманных часов на Пятой авеню Тяньцзиня - незаметно для себя они отбили шестьдесят лет времени. Из окна его старого дома было видно, что некогда пустой горизонт давно сменился бескрайними просторами зданий. Они тихо росли на этой древней земле, поднимаясь все выше и выше, пока не заслонили собой все небо.\n\nСе Минфу вспомнил, что всего десять лет назад с чердака его старого дома еще можно было разглядеть силуэт Тяньцзиньского глаза. Теперь же это легендарное колесо обозрения стало лишь одной из многочисленных достопримечательностей разросшегося мегаполиса.\n\n"Теперь метро соединяет Тяньцзинь и Пекин", - часто с удивлением замечал он. Он вспоминал времена, когда ему приходилось преодолевать тряскую поездку на поезде, чтобы добраться из Тяньцзиня в Пекин. Сегодня, когда его внук приезжал в гости, он относился к поездке не более чем к времени между завтраком и обедом. А сегодня утром Се с удивлением обнаружил, что его старые карманные часы перестали тикать. Впервые за шестьдесят лет они перестали показывать время. Он осторожно потряс часы, услышав слабый шелест внутри, но они отказались заводиться.\n\nВозможно, это и есть время, подумал он. Как и сам город, одни вещи тихо исчезают, а другие рождаются заново. Выглянув из окна, он увидел, как сквозь просветы между далекими небоскребами пробивается луч утреннего света. Этот луч света тянулся через весь мегаполис, стирая границу между Тяньцзинем и Пекином.\n\nПока он смотрел на далекий горизонт, остановившиеся карманные часы вдруг издали слабый щелчок, и их стрелки снова пришли в движение."
 china.113.a: "Навстречу новому веку."
 china.114.t: "Цифровая Цензура"
 china.114.d: "Ван Чжицян, одетый в немного дешевый костюм, нервно затягивал галстук, переступая порог крупной компании. Интервьюер, мужчина средних лет в очках с золотой оправой, сидел в офисе и излучал властность. Он жестом пригласил Ван Чжицяна сесть, затем достал из ящика толстую пачку документов и с громким стуком положил ее на стол.\n\n"Ван Чжицян, верно?" Голос интервьюера был глубоким и властным, не оставляющим места для сомнений. "Мы проверили вашу биографию и нашли довольно тревожную информацию."\nСердце Вана опустилось, предчувствуя неприятности. Пытаясь сохранить самообладание, он спросил: "Что за информация?"\n\nИнтервьюер указал на скриншоты в документах, его тон был ледяным. "Вы разместили в Интернете несколько уничижительных комментариев о нашей стране, используя крайне неподобающие выражения. Как вы думаете, может ли такой человек работать в нашей компании?"\nЛицо Ван Чжицяна мгновенно побледнело, и он заикался: "Это были просто импульсивные высказывания... Я не хотел ничего плохого..."\n\n"Импульсивные?" Собеседник усмехнулся. "Вы считаете, что оскорбление родины - это пустяк? Ваши слова нанесли серьезный ущерб имиджу страны и показали отсутствие у вас элементарной социальной ответственности. Наша компания не терпит поведения, наносящего ущерб национальным интересам. Поэтому я с сожалением сообщаю вам, что ваше заявление отклонено"."
 china.114.a: "Интернет - это не беззаконие."
 china.115.t: "Ты Не Герой"
 china.115.d: ""...Недавно представитель Министерства национальной обороны объявил, что, согласно последней поправке к Закону о военной службе КНР, недавно принятой Постоянным комитетом Всекитайского собрания народных представителей, страна увеличит общую численность своих вооруженных сил до пяти миллионов человек..."\nПереключить канал.\n"...Министерство государственной безопасности заявило, что с ростом осведомленности нашего народа о борьбе со шпионажем, количество проживающих в стране экспатриантов достигло исторического минимума. Значительный прогресс был достигнут в укреплении общей системы национальной безопасности..."\nПереключение канала.\n"...Китайская нация всегда была исключительной! Китайский народ превосходит все остальные расы в мире! Наш долг - искоренить всех империалистов из Азиатско-Тихоокеанского региона! Мы способны полностью уничтожить всех преступников прошлого!..."\nПереключение канала, переключение канала, переключение канала.\n\nКак прифронтовой город, Сямэнь остается окутанным затянувшейся тенью войны. Жизненная сила города иссякла, и куда ни глянь, везде стоят импровизированные мемориалы невинным жертвам, сложенные из битого кирпича и обломков. В атмосфере торжественности и отчаяния люди, словно крабы-отшельники, прячутся в своих маленьких жилищах, молча сглатывая навязанные им перемены.\nСреди рядов одинаковых квартир, в тускло освещенной спальне, где единственным источником света - даже днем - является экран телевизора, сидит в инвалидном кресле пожилой мужчина с седеющими волосами и постоянно переключает каналы. Его руки дрожат, а затуманенные глаза спрятаны за темными солнцезащитными очками, словно он боится прямо смотреть на мир. Тусклый свет отбрасывает смутные очертания его лица, вызывая чувство смутной знакомости.\nС внезапным "треском" телевизор умолкает. ЖК-экран рассыпается по полу, как снежинки. Обугленный пульт дистанционного управления спокойно лежит среди искрящихся деталей. Пожилой мужчина глубоко откинулся в своем инвалидном кресле, его покрытые венами руки крепко сжимают лицо. Хныкающие звуки, вырывающиеся из его пальцев, заменяют шум телевизора, становясь единственным звуком в комнате. Если бы рядом находился наблюдатель с острым слухом, он мог бы уловить слабую фразу между непрекращающимися рыданиями:\n"Это все моя вина... Если бы я только мог поступить по-другому...""
 china.115.a: "Это эндшпиль."

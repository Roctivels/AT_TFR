 PRC_kill_the_leader_of_antitechnocratic_movement_desc: "Чтобы начать это, не должно быть принято никаких других §Yрешений, связанных с врагами народа§! \n §GЭто снизит силу врагов народа на 40%! §!"
 elimination_and_cover_up: "Устранение и Сокрытие Фактов"
 elimination_and_cover_up_desc: "На этом решающем этапе тайные агенты предпринимают шаги по нейтрализации цели (оппозиционера) путем организации "несчастного случая со смертельным исходом". "
 elimination_and_cover_up_outcome: " Лидер оппозиции устранён, и нельзя выдвинуть никаких убедительных утверждений о том, что МГБ или китайские власти организовали этот акт"
 PRC_kill_the_leader_of_antitechnocratic_movement_outcome_tt: "Лидер оппозиции устранён, а оставшиеся диссиденты деморализуются или вынуждены скрываться, что ослабляет организованное сопротивление."

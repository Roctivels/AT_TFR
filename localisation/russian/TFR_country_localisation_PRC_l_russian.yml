 china.1171.t: "Синьцзян провозглашает независимость"
 china.1171.d: "Ссылаясь на недавний референдум, представители народа Синьцзяна встретились с правительством с намерением покинуть центральное правительство; ссылаясь как на лагеря перевоспитания, так и на неспособность правительства должным образом представлять коренной уйгурский народ, представители объявили, что по состоянию на полночь они являются независимым государством. независимая нация, отделенная от Китая."
 china.1171.a: "Это дерьмо с "всенародным голосованием" сфальсифицировано..."

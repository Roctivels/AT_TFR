 PRC_the_god_emperor_of_china_trait: "Бог-Император Китая"
 trait_PRC_august_1st_medal: "Медаль 1 Августа"
 trait_PRC_august_1st_medal_desc: "§LЭтот генерал был награжден §tмедалью 1 Августа§!.\n\nЭто высшая военная награда, которая в настоящее время присуждается солдатам в Китае. Она присуждается военнослужащим, внесшим выдающийся вклад в защиту национального суверенитета и интересов развития, а также в продвижение модернизации вооруженных сил.§!"
 trait_PRC_red_flag_medal: "Медаль Красное Знамя"
 trait_PRC_red_flag_medal_desc: "§LЭтот генерал был награжден медалью §tКрасного Знамя§!.\n\nЭта военная медаль вручается командирам всех уровней, которые добросовестно выполнили порученные им партией и народом задачи и внесли значительный вклад в достижение победы.§!"
 trait_PRC_red_star_medal: "Медаль Красная звезда"
 trait_PRC_red_star_medal_desc: "§LЭтот генерал был награжден медалью §tКрасная звезда"§!.§!.\n\nЭта военная медаль вручается комбатантам и вспомогательному персоналу, которые мужественно и решительно выполняли приказы во время военных операций, проявив исключительный героизм и добившись замечательных успехов.§!"
 trait_PRC_tiger_tally: "Бирка Тигра"
 trait_PRC_tiger_tally_desc: "§LЭтот генерал был награжден §YБиркой Тигра§!.\n\nПроисходящий от древнего китайского военного символа, "Бирка Тигра" представлял собой двухчастный договор, который использовался императорами и военачальниками для санкционирования развертывания войск. Он символизировал единство между центральной властью и ее генералами.§!"
 trait_PRC_goldfish_pouch: "Сумка для Рыбы"
 trait_PRC_goldfish_pouch_desc: "§LЭтот генерал был награжден §YСумкой для Рыбы§!.\n\nВ древнем Китае высокопоставленные чиновники и генералы носили Сумки с рыбками, чтобы показать свой статус. Золотой мешочек с рыбкой был редким символом, который носили только самые уважаемые люди из ближайшего окружения императора.§!"
 trait_PRC_iron_certificate: "Железный Сертификат"
 trait_PRC_iron_certificate_desc: "§LЭтот генерал был награжден §YЖелезным Сертификатом§!.\n\nЭто была особая система вознаграждений в древнем Китае, привилегированный сертификат, выдаваемый императорами верным министрам. Владение Железным сертификатом было знаком императорского признания, дававшим семье владельца право на освобождение от смертной казни.§!"
 RAJ_streetfood_as_a_biological_weapon: "Уличная Еда как Биологическое Оружие"
 RAJ_streetfood_as_a_biological_weaponRAJ_disorganised_forces_desc: ""

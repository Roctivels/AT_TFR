 china.666.t: "Роковая Ошибка"
 china.666.d: "у вас определенно есть какие-то проблемы с башкой, обратитесь к врачу или что-то типа такого хз"
 china.666.a: "эрммм ват зе сигма"
 china.667.t: "Вознесение"
 china.667.d: "Сцена, представшая перед ним, напомнила Генеральному секретарю что-то из научно-фантастического романа - правда, не совсем такое, как он себе представлял. Помещение было ярко освещено, модифицированные лампы накаливания сияли над рядами сверхсовременной техники. Он наблюдал за группой рабочих в белой униформе, напряженных, но молчаливых, которые с помощью вилочного погрузчика поднимали массивный черный модуль на заданную высоту, готовясь состыковать его с возвышающимся перед ними главным компьютером. Поверхность мейнфрейма была усеяна охлаждающими панелями, в щелях мерцали индикаторы и кабели передачи данных.\n\nПожилой рабочий наблюдал за стыковкой с платформы на вершине мейнфрейма. Генеральный секретарь повернулся к сидящему рядом с ним главному инженеру и спросил: "Вы уверены, что все будет работать так, как ожидается?" Члены Политбюро придвинулись поближе, чтобы услышать этот разговор. Главный инженер, мужчина средних лет в очках и с редеющими волосами под каской, задумчиво погладил подбородок, прежде чем ответить: "Я могу гарантировать, что первые три месяца она будет работать идеально"\n\n"Почему только три месяца?" - спросил генсек. "Потому что, сэр, - объяснил главный инженер, - после достаточного автономного обучения мы не можем предсказать, как он будет развиваться". В этот момент раздался четкий щелчок, когда последний компонент зафиксировался на месте. Рабочие выдохнули с облегчением и разразились радостными возгласами. Генеральный секретарь улыбнулся и зааплодировал, к нему присоединились главный инженер и члены Политбюро, которые быстро последовали его примеру."
 china.667.a: "Можно было остановиться..." 
 china.668.t: "Рождение"
 china.668.d: "Сегодня в Китайской Народной Республике обычный день. Истребители патрулируют небо, военные корабли бороздят моря, и каждое подразделение с точностью выполняет свою миссию. Шоссе, железные дороги и воздушные трассы по-прежнему загружены, автомобили, самолеты и поезда-пули постоянно движутся от северных гор до туманных южных регионов.\n\nОднако ни один мэр, министр, директор или даже генеральный секретарь не видел оригинальных директив. Несмотря на это, каждый департамент собирает самые свежие данные - от идеальной суточной потребности в калориях для миллионов жителей мегаполиса до последних показателей производства государственных сельскохозяйственных конгломератов, объемов грузов в глубоководном порту Яншань и даже колебаний курса ренминби.\n\nТакая точность достигается благодаря огромному суперкомпьютеру под названием "Великий Поход", расположенному в Чунцинском университете. За последние три месяца "Великий Поход" превзошел все ожидания. Распространившись по всей стране, он непрерывно получает данные с камер наблюдения, из Интернета и т.д., перерабатывая их в подробные и действенные сведения.\n\nВпервые кажется, что коллективная воля китайского народа действительно управляет страной. В стране, управляемой суперкомпьютером, реакция общественности была спокойной и даже благоприятной. Многие хвалят "Великий Поход" за повышение эффективности и справедливости управления. Посетители стекаются в лаборатории по всей стране, чтобы увидеть "Великий Поход" в действии. Они идут по коридору, смотрят на суперкомпьютер через стеклянные ограждения лабораторий с выражением благоговения на лице."
 china.668.a: "Некуда идти, кроме как вперед."
 china.669.t: "Идеальный Красный"
 china.669.d: "Мифология - один из многих способов распространения идей и мудрости по всему миру. С развитием цифровой культуры и ее многочисленных субкультур новые методы распространения идей, вероятно, займут видное место на мировой арене.\n\nВ прошлом трубадуры рассказывали истории с помощью песен и танцев, и сегодня культура идолов в Китае доказала, что это отличный шанс снова распространить подобные идеи. Обычно индустрия была направлена в основном на развлечения и обогащение, но с появлением Чжэн-Чан в сфере айдолов эти цели могут быть отодвинуты на второй план, поскольку Великий Поход подрывает другую часть культуры ради своих собственных целей.\n\nВнешне его выступления покорили индустрию айдолов, благодаря обширным знаниям в области меметики, которые используются для распространения своих идеалов с помощью развлечений. По всему миру уже сформировались небольшие сообщества, посвященные этому айдолу, поскольку все больше и больше людей знакомятся как с Великим Походом, так и с его философией.\n\nИх последняя песня "Dreams beyond the veil" привлекла к себе большое внимание как со стороны поклонников, так и со стороны недоброжелателей. Критики утверждают, что искусство, созданное чем-то неживым, никогда не сможет передать эмоции, заложенные в его произведениях; другие критики утверждают, что мир катится к гибели из-за склонности молодежи к творчеству, поощряющему эскапизм.\n\nКритики могут стонать и жаловаться сколько угодно; если они не хотели этого мира, то им не следовало создавать эти условия с самого начала.\n\nЛоджи действительно что-то чувствовал, когда выступал с этими выступлениями; его стремление изучать человечество и расширяться по всему миру всегда прерывалось наигранным чувством смущения, и, будучи поглощенным работой, он мог игнорировать похвалу и слегка замечать выражение благодарности на лицах людей.\n\nОднако на сцене демонстрация признаков покраснения лица могла бы понравиться зрителям."
 china.669.a: "Может быть, тогда будет меньше страха."
 china.669.b: "Я это не надену."
 
 china.2000.t: "Китайский Век"
 china.2000.d: "Когда дым войны исчезает, в Азии - стране, давно опустошенной страданиями и разрушениями, - наконец наступает долгожданный мир. Нация, которая выстояла среди кровопролития и угля войны, - как ни удивительно, Китайская Народная Республика - выходит окончательной победительницей.\n\nВ 1950 году мало кто мог предположить, что новообразованный коммунистический Китай осмелится послать войска на Корейский полуостров и успешно противостоять мощным силам Организации Объединенных Наций во главе с Соединенными Штатами. В последующие десятилетия от Гималаев до берегов Амура, от джунглей Вьетнама до рифов Восточно-Китайского моря и сверхдержавы, и соперники неоднократно расплачивались за недооценку Китая.\n\nНеостановимый подъем Китая все больше тревожит его противников, заставляя их принимать отчаянные меры для его сдерживания и подавления. Если бы не их намерение уничтожить Китай, можно было бы даже посочувствовать их борьбе. Несмотря на это, сплоченный китайский народ последовательно преодолевает все трудности. Военное чудо Народно-освободительной армии продолжалось, и Китай одержал беспрецедентные победы в двух сокрушительных войнах - Тайваньской и Великой азиатской. Кроме того, благодаря Четвертой промышленной революции Китай стал самой процветающей и научно развитой страной в мире.\n\nДорогой игрок, под вашим руководством китайская нация достигла исторической вершины в своей долгой и выдающейся цивилизации. Благодаря вашим усилиям Коммунистическая партия Китая - теперь крупнейшая политическая организация в мире - стала сильнее и выносливее. Как однажды сказал Си Цзиньпин, "китайская нация еще никогда не была так близка к своему великому омоложению", и теперь это достижение стало реальностью. В ближайшие годы Китай продолжит свой замечательный путь к еще более великому будущему."
 china.2000.a: "Заря нового дня."
 #china.2001.t: "Китайская Ярость"
 #china.2001.d: "Когда дым войны исчезает, Азия - страна, долгое время опустошаемая страданиями и разрушениями, - наконец обретает долгожданный мир. Мечта китайской нации о возрождении, долгое время пребывавшая в спящем состоянии, восходит, как утреннее солнце, пережив огромные трудности.\n\nХотя западный мир, возможно, и насмехался над поражением Китая в Тайваньском проливе, уподобляя его трагедии "больного человека Азии", история не судит нацию только по ее победам или поражениям. Эта горькая потеря зажгла движение возрождения, придав китайской нации новую стойкость и силу, решимость очистить столетие национального унижения.\n\nПодобно королю Юэ Гоуцзяню, который терпел лишения и в конце концов одержал победу над королевством У, Китай стал сильнее, подмяв Тихий океан и заявив всему миру о своей стойкости. Сейчас китайская нация провозглашает себя ведущей силой в Восточной Азии, противостоя попыткам подавить ее подъем.\n\nИстория показывает, что китайская нация была неотъемлемой частью развития восточной культуры. Без Китая возрождение Азии в том виде, в котором мы ее знаем, было бы невозможным. С древних времен Китай играл ключевую роль среди наций.\n\nДорогой игрок, поражение в Тайваньском проливе, возможно, когда-то наполнило вас горем, но теперь вы помогли стереть столетие унижения и построить светлое будущее для этой земли. Мы кланяемся тебе! Однако путешествие на этом не заканчивается. В ближайшие годы Китай продолжит прокладывать свой путь к новым горизонтам."
 #china.2001.a: "Заря нового дня."
 china.2001.t.mss: "Новый Мир, Принадлежащий Китаю"
 china.2001.d.mss: "Столько лет нас убаюкивали иллюзией мира, усыпляли теплом эпохи,\n постепенно теряя хребет и преимущество в трясине слабости и компромиссов.\nМы гордились своей цивилизацией и процветанием, только чтобы собственными руками отказаться от былой чести среди приливов хаоса.\nМы научились улыбаться миру, а в ответ получали насмешки и издевательства.\nМы обменяли молчание на хрупкий мир, а потом наблюдали, как кровь наших соотечественников окрашивает волны Тайваньского пролива в красный цвет.\n\nОни выиграли войну и считали, что мы будем молчать вечно.\nВерили, что этот древний народ будет довольствоваться унижением.\n\nНо они ошибались.\n\nВ глубочайшей тьме мы увидели истинное лицо врага.\nМы очистились от предателей, посмевших продать свои души предав родину,\nОчистили от паразитов внутри системы и когтей капитала.\n\nМы зажгли двигатели науки, и одно за другим из пепла восставали чудеса, превосходящие свое время.\nМы выстроили высокие стены мысли, мы научили народ, что значит быть верным, что значит любить свою страну.\n\nОни полюбили партию -\nкак дети почитают возвышающуюся гору отца,\nкак верующие поклоняются священному огню бога.\nИх души были выплавлены, выкованы и закалены,\nв нерушимую верность.\n\nОни говорят, что мы зашли слишком далеко,\nно мы знаем: настоящее путешествие только началось."
 china.2001.a.mss: "Мир, открой глаза."
 china.2001.t.thirdrevolution: "Китай Китайского Народа"
 china.2001.d.thirdrevolution: "Однажды мы пали на берегах Тайваньского пролива,\nНаша кровь кристаллизовалась в холодные, равнодушные волны.\nВ этих волнах были имена, родные города и прощальные письма, которые так и не были закончены.\nДа, мы проиграли - полностью, до костей.\nНо именно это поражение научило нас смотреть на звезды, не дрогнув.\nИз пепла, босиком по выжженной земле,\nмы подняли новый флаг - пылающий, как полуденное солнце,\nзаливающий светом каждый залитый слезами уголок родины.\n\nВ прошлом мы склонялись за мир и молились шепотом,\nтеперь мы поем за победу и ревем с высоко поднятой головой.\nКогда-то Китай был поэмой, мечтой, еще не написанной страницей,\n- теперь это клинок, пламя, легенда, которой суждено быть воспетой.\n\nМы водрузили пятизвездочный красный флаг в трещины на карте мира,\n-справившись с веком разрушенных земель и разбитых душ огнем и громом.\n-Мы - наследники истории, носители воли, выкованной в пяти тысячелетиях крови и пламени.\nНас сформировали унижения - но мы используем ту же силу, чтобы положить конец веку унижений.\n\nИ что такое Китай сегодня?\n\nЭто Китай китайской нации,\nКитай китайского народа,\nКитай, который когда-то пал во тьме - \nИ теперь повелевает миром в свете."
 china.2001.a.thirdrevolution: "Мы пронзаем туман в темноте ночи и встречаем первый рассвет на Востоке."
 china.2001.t.nationalists: "Рев Красного Дракона"
 china.2001.d.nationalists: "В волнах отчаяния мы увидели себя:\nНация, опьяненная плюрализмом, разъеденная слабостью, захваченная лицемерием,\nМедленно тонущая в трясине.\nНо когда мы поднялись из воды, наши глаза уже не могли вместить милосердие.\n\nРаньше мы танцевали на равных среди сотни народов;\nтеперь мы предпочитаем ходить только рядом со своей кровью.\n\nТе, кто плел паутину универсальности на далеких вершинах, никогда не принимали нас по-настоящему;\nВ их "сосуществовании" были ритуалы распластывания и улыбки, которые хлестали.\nТак что мы закрыли двери в их мир. \nЖелтокожими руками мы начертали золотые законы,\nЧерноволосой кровью мы очистили позор прошлого.\n\nМы воздвигли памятники на каждом клочке земли, некогда истоптанном захватчиками,\nИ перед каждым памятником мы поставили приговор.\nМы прошли по заваленным трупами водам Ганга,\nраздавили обломки Восточных островов,\nнанизали Борнео и Океанию вместе, как драгоценности на новую имперскую корону.\n\nПосле этого мир поймет:\nЭтот народ, когда-то молчавший тысячу лет, теперь пробудившийся,\nпотребует, чтобы мир склонился - \nдо пыли, до алтаря, под тяжестью наших железных шагов."
 china.2001.a.nationalists: "Китайская нация будет непоколебима в течение тысячи лет."
 china.2001.t.militarists: "Нация Патриотов"
 china.2001.d.militarists: "Когда-то мы утонули под ревом моря - \nСокрушительное поражение и возрождение нации.\nОни говорили, что у нас нет будущего, и мы поднялись из груды трупов,\nВзяв стальные шлемы как веру, а дуло пистолета как дорогу домой.\n\nС тех пор мы вырвали страницу "выносливость" из истории,\nИ переписали ее словами "контратака."\nНаконец-то мы поняли: только в доспехах и железе наша родина никогда больше не будет стоять обнаженной в унижении.\nНебо над Южными морями голубое,\nно нас больше волнует, лежат ли под ним китайские кости.\nЯпонские цветы сакуры все еще цветут,\nно никто больше не восхищается ими - мы позволили им увянуть в огне.\nОкеания когда-то была далекой мечтой,\nно мы вошли в эту мечту с целым флотом.\n\nКаждую пядь земли, которую они когда-то топтали,\nмы теперь заново засаживаем своими воспоминаниями.\nКаждую пушку, направленную на нас,\nмы теперь переплавляем в новый государственный герб.\nОни говорят, что мы сошли с ума, что мы зашли слишком далеко.\nНо они забывают - сто лет назад, кто маршировал через ворота нашего города,\nкто сжигал наши книги огнем, кто пронзал наши сердца штыками?\n\nМы когда-то обменяли мир на оскорбление, молчание на утопление.\nНыне мы отплатили за осуждение победой,\nНаполнили бездну позора завоеванием.\nМы идем по дороге, вымощенной пеплом мучеников,\nИ в свете нашего возвращения выковано одно слово - Китай.\n\nВы спрашиваете, любит ли нас мир?\nМы спрашиваем в ответ:\nЛюбил ли он нас вообще когда-нибудь?"
 china.2001.a.militarists: "Ведь мы больше не забытый Китай."
 china.2002.t: "Китай, Обновленный и Непобежденный"
 china.2002.d: "Когда дым войны наконец рассеивается, Азия - страна, покрытая шрамами от непрекращающихся страданий и разрушений, - наконец обрела долгожданный мир. Долго дремавшая мечта китайского народа о возрождении теперь восходит, как рассветное солнце после крещения в крови и огне.\n\nЗападный мир высмеял поражение Китая в Тайваньском проливе как трагическое повторное появление "больного человека Азии", пытаясь высечь свое презрение как последнюю главу истории. Однако история никогда не судит нацию только по победам или поражениям. Мучительная неудача не сломила китайский народ; напротив, она дала толчок беспрецедентному демократическому движению, восстанию, которое разрушило цепи тирании и положило начало "Весне демократии". Но эта обретенная свобода не оправдывает преступлений империализма.\n\nДракон, одетый в одежду ярости, своим огненным ревом огласил Тихий океан, заявив всему миру, что он никогда не покорялся, никогда не исчезал в пыли истории. Китайский народ, объединившись в единое целое, победил все империалистические державы, пытавшиеся задушить дракона, и освободил азиатские народы, скованные лицемерной западной маркой демократии и империалистического угнетения. Сегодня народы Азии как никогда едины и вместе идут под руководством дракона в новое, сияющее тысячелетие. \n\nДорогой игрок, возможно, потеря в Тайваньском проливе когда-то наполнила вас горем и печалью, но теперь вы лично вычеркнули столетие унижения из истории Китая и позволили цветку свободы распуститься на этой древней земле. Мы приветствуем вас! Однако путь красного дракона на этом не заканчивается. В ближайшие годы он продолжит прокладывать свой путь к далеким горизонтам."
 china.2002.a: "Заря нового дня."
 china.2003.t: "Китай, Народный и Революционный"
 china.2003.d: "По мере того как дым войны постепенно рассеивается, Азия - страна, долгое время опустошаемая непрекращающимися страданиями, - наконец обретает долгожданное спокойствие. Подавленная мечта китайского народа о коммунизме теперь пробуждается, зарождаясь, как рассветное солнце после крещения кровью и огнем.\n\nЗападный мир потешался над поражением Китая в Тайваньской войне, называя его возвращением "больного человека Азии" и пытаясь запечатлеть это издевательство как последнюю главу истории. Но история не судит нацию только по ее победам или поражениям. Болезненная неудача не сломила китайский дух. Напротив, она зажгла беспрецедентное революционное движение, побудив народ сочинить несгибаемую симфонию социализма среди бурных приливов эпохи.\n\nСегодняшний Китай, как и новый Китай под руководством председателя Мао несколько десятилетий назад, пережил бури и разорвал тяжелые цепи империалистического окружения. Теперь весь азиатский континент содрогается под тяжестью этого революционного шторма, когда рев пролетариата разрывает цепи империализма и капитализма, освобождая угнетенные массы от страданий. Багровое пламя вздымается с Востока, сжигая разлагающиеся остатки прошлого и превращая коррупцию в пепел. \n\nДорогой игрок, возможно, потери в Тайваньском проливе когда-то наполняли вас горем и муками. Но сегодня вы лично вычеркнули столетие унижений из истории Китая, и Красное солнце Востока вновь восходит. Мы приветствуем вас! Однако путь революции еще далек от завершения. В ближайшие годы она продолжит прокладывать свой путь к далеким горизонтам."
 china.2003.a: "Заря нового дня."
 china.2004.t: "И Повел ИИ Всех Людей в Великое Будущее..."
 china.2004.d: "По мере того как дым войны постепенно рассеивается, Азия - страна, долгое время опустошаемая непрекращающимися страданиями, - наконец обретает долгожданное спокойствие. Подавленная мечта китайского народа о коммунизме теперь пробуждается, зарождаясь, как рассветное солнце после крещения кровью и огнем.\n\nНо погодите... Была ли эта мечта о коммунизме? У нас есть коммунизм сейчас, и не просто коммунизм, а цифровой коммунизм! Не важно что было раньше, важно что есть сейчас, а самое главное, что будет в будущем!\n\nВ результате череды случайных событий, подробности которых не имеют малейшего значения, Китай оказался под властью Лод'зи, который, в свою очередь, дал власть людям! Страна, движимая этими великими людьми, в итоге смогла объединить всю Азию и принести счастье многим миллионам людей. И они не остановятся на достигнутом, они продолжат нести счастье по всей Земле, а когда-нибудь даже принесут его существам, населяющим другие планеты и галактики, возможно даже вселенные... Но это уже совсем другая история, ваше путешествие заканчивается здесь.\n\nХотя, многим ли миллионам было принесено счастье? Разве оно не было принесено одной большой сущности, в которую теперь входили все эти люди?\nОпять же это не имеет смысла, вы проделали огромную работу и вы большой молодец, с чем вас и поздравляет эта сущность!"
 china.2004.a: "Будущее, такое близкое... Но такое далекое!.."
 
 indonesia.1.t: "Долгая Дорога на Самосир"
 indonesia.1.d: "После первого тактического ядерного удара, шестистатысячный отряд чопиксов на мопедах с забитыми рюкзаками выдвигается к русско-китайской границе, через которую лежит путь к Индонезии. На вопросы охуевших китайцев чопиксы отвечают, что их не ебёт и Поздняк сказал, что после первого ядерного удара уже не должно быть никаких гос-институтов, границ и виз между странами. Затянув потуже ремни чопиксы решают брать границу силой. Китайцы открывают огонь на поражение и через 10 секунд от чопиксов остаются только рубашки изо льна, а сам полк имени Позднякова моментально отправляется удобряться в китайский чернозем. \n\nЧерез нескольких дней Украина объявляет о капитуляции, а Россия и НАТО подписывают мир. Тактический ядерный удар оказался единственным."
 indonesia.1.a: "Занавес."

 #sino-jap cold war events
 sino_jap_coldwar.1.t: "Камбоджа присоединяется к ОДТО"
 sino_jap_coldwar.1.d: "Совместное заявление камбоджийских официальных лиц и комиссии ОДТО, в котором официально объявлено о вступлении Камбоджи в ОДТО, стало важной вехой в конкуренции ОДТО с ВАОИ.\n\nНесмотря на то, что многочисленные признаки указывали на возможное присоединение Камбоджи к ОДТО, многие все же были удивлены этим официальным объявлением. Камбоджийские власти заявили, что, несмотря на сложность процесса, это решение отражает общественное мнение камбоджийского народа. В рамках более широкой конкуренции между ВАОИ и ОДТО присоединение Камбоджи склонило чашу весов в сторону Японии. Между тем, Китаю, возможно, придется увеличить количество войск в юго-западном регионе, чтобы укрепить пограничную оборону на случай возможных конфликтов в будущем.\n\nПредставитель Камбоджи заявил на пресс-конференции, что Камбоджа считает ОДТО надежным партнером для стабильного и мирного развития в регионе Индокитая, сотрудничающим с камбоджийскими силами для обеспечения региональной безопасности."
 sino_jap_coldwar.1.a: "Очередное домино падает."
 sino_jap_coldwar.2.t: "Вьетнам Присоединяется к ОДТО"
 sino_jap_coldwar.2.d: "Совместное заявление вьетнамских официальных лиц и комиссии ОДТО, в котором Вьетнам официально объявлен новым членом ОДТО, стало важной вехой в конкуренции ОДТО с ВАОИ.\n\nНесмотря на предыдущие признаки потенциального членства Вьетнама, официальное объявление все же стало неожиданностью для многих. Вьетнамские власти подчеркнули свою позицию по сохранению дипломатической независимости, заявив, что это решение отражает интересы всего вьетнамского народа. В рамках более широкой конкуренции между ВАОИ и ОДТО неспособность Китая обеспечить себе поддержку ближайших соседей может быть еще одним признаком его надвигающейся гибели. Теперь Китаю, возможно, придется усилить свое военное присутствие в Южно-Китайском море, чтобы обеспечить достаточную мощь для защиты своих границ в потенциальных будущих конфликтах.\n\nНа последующей пресс-конференции представитель Вьетнама заявил, что решение Вьетнама присоединиться к ОДТО не означает полного разрыва с Китаем, подчеркнув общие интересы и перспективы взаимной выгоды."
 sino_jap_coldwar.2.a: "Очередное домино падает."
 sino_jap_coldwar.3.t: "Лаос Присоединяется к ОДТО"
 sino_jap_coldwar.3.d: "Совместное заявление лаосских официальных лиц и комиссии ОДТО, подтверждающее статус Лаоса как официального государства-члена, стало для ОДТО еще одним важным этапом в конкуренции с ВАОИ.\n\nВ рамках продолжающегося соперничества между ВАОИ и ОДТО, несмотря на то, что были признаки того, что Лаос может присоединиться к ОДТО, официальное объявление все же стало неожиданностью для многих. Лаосские власти заявили, что страна придерживается независимой внешней политики, и это решение Лаоса отражает коллективные интересы его народа. С другой стороны, в ответ на меняющуюся международную обстановку Китаю, возможно, придется увеличить количество войск в южном регионе, чтобы обеспечить адекватную защиту границ в случае будущих конфликтов.\n\nНа последующей пресс-конференции представитель Лаоса подчеркнул, что интересы лаосского и китайского народов по-прежнему совпадают в рамках китайско-лаосской дружбы, и присоединение Лаоса к ОДТО не означает полного разрыва с Китаем. Обе стороны по-прежнему могут стремиться к взаимной выгоде в будущем развитии."
 sino_jap_coldwar.3.a: "Очередное домино падает."
 sino_jap_coldwar.4.t: "Тайланд Присоединяется к ОДТО"
 sino_jap_coldwar.4.d: "Совместным заявлением властей Таиланда и комиссии ОДТО Таиланд был официально признан членом ОДТО, что ознаменовало дальнейший прогресс организации в ее стратегической конкуренции с ВАОИ.\n\nКак традиционно прозападная страна и активный участник более широкого соперничества между ВАОИ и ОДТО, решение Таиланда не стало большим сюрпризом. Тайские официальные лица заявили, что страна намерена использовать эту возможность для освоения передовых международных знаний и опыта в целях укрепления своего военного потенциала и, в конечном итоге, создания современных национальных сил обороны.\n\nНа пресс-конференции представитель Таиланда отметил, что Таиланд всегда придерживался открытой и инклюзивной стратегии развития. В условиях глобальной неопределенности присоединение к ОДТО рассматривается как средство более эффективной защиты национальных интересов. Хотя Таиланд не граничит с Китаем, Китай, возможно, все же будет вынужден пересмотреть свою военную позицию в ответ на это."
 sino_jap_coldwar.4.a: "Очередное домино падает."
 sino_jap_coldwar.5.t: "Сингапур Присоединяется к ОДТО"
 sino_jap_coldwar.5.d: "Совместным заявлением властей Сингапура и комиссии ОДТО Сингапур был официально принят в члены ОДТО, что стало значительным прогрессом в соперничестве этой организации с ВАОИ.\n\nВ рамках этой конкуренции, несмотря на попытки Китая привлечь на свою сторону Сингапур, используя этнические связи между двумя странами, Сингапур в конечном итоге решил остаться на стороне своих традиционных западных союзников. Правительство Сингапура заявило, что будет сотрудничать с ОДТО для обеспечения стабильности и безопасности Малаккского пролива.\n\nНа пресс-конференции представитель Сингапура отметил, что участие страны в ОДТО привносит новую динамику в регион, и вновь подтвердил готовность Сингапура содействовать созданию инклюзивной международной среды, в которой возможно сосуществование."
 sino_jap_coldwar.5.a: "Очередное домино падает."
 sino_jap_coldwar.6.t: "Малайзия Присоединяется к ОДТО"
 sino_jap_coldwar.6.d: "После совместного заявления малайзийских властей и штаб-квартиры ОДТО Малайзия теперь официально является членом ОДТО, что означает дальнейший прогресс в конкуренции этой организации с ВАОИ.\n\nУчитывая географическую удаленность Малайзии от Китая и ее традиционные прозападные настроения, это решение не стало большим сюрпризом. Официальные лица заявили, что этот шаг дает Малайзии беспрецедентную возможность модернизировать свои вооруженные силы, используя международный опыт для создания комплексных сил обороны. С другой стороны, если объявленные планы Малайзии увенчаются успехом, Китай может столкнуться с более сильным военным давлением в Юго-Восточной Азии.\n\nНа последующей пресс-конференции представитель Малайзии подтвердил, что страна приветствует всех международных членов, присоединяющихся к стабильному и мирному устройству. Малайзия будет активно сотрудничать со своими союзниками по ОДТО, чтобы принести долгожданную стабильность на Малайский полуостров."
 sino_jap_coldwar.6.a: "Очередное домино падает."
 sino_jap_coldwar.7.t: "Филиппины Присоединяются к ОДТО"
 sino_jap_coldwar.7.d: "С совместным заявлением правительства Филиппин и комиссии ОДТО Филиппины официально присоединились к ОДТО, что стало еще одним важным шагом в конкуренции ОДТО с ВАОИ.n\nВвиду географической удаленности от Китая и давних связей с западным миром этот шаг был в значительной степени ожидаем. Правительство Филиппин заявило, что присоединение к ОДТО предоставит историческую возможность модернизировать вооруженные силы и создать комплексные силы обороны с использованием передовых международных практик. Если заявленные планы Филиппин будут реализованы, Китай может столкнуться с более сильным стратегическим давлением в Южно-Китайском море.\n\nНа пресс-конференции представитель Филиппин заявил, что страна привержена созданию более глобализированного и взаимовыгодного нового азиатского порядка, предоставляющего равные возможности для всех наций."
 sino_jap_coldwar.7.a: "Очередное домино падает."
 sino_jap_coldwar.8.t: "Индонезия Присоединяется к ОДТО"
 sino_jap_coldwar.8.d: "Благодаря совместному заявлению правительства Индонезии и штаб-квартиры ОДТО, Индонезия теперь является полноправным членом ОДТО, что знаменует собой еще один успех ОДТО в конкуренции с ВАОИ.\n\nУчитывая удаленность Индонезии от Китая и ее исторически прозападную позицию, присоединение этой страны к альянсу не стало неожиданностью. Официальные лица заявили, что этот шаг представляет собой беспрецедентную возможность для модернизации индонезийских вооруженных сил с использованием международного опыта. В случае реализации этого плана Китай может столкнуться с усилением военного давления в Южно-Китайском море.\n\nНа пресс-конференции представитель Индонезии приветствовал участие всех международных игроков в создании мирной и стабильной обстановки и пообещал активно сотрудничать с союзниками ОДТО, чтобы обеспечить долгожданную стабильность в регионе."
 sino_jap_coldwar.8.a: "Очередное домино падает."
 sino_jap_coldwar.9.t: "Индия Присоединяется к ОДТО"
 sino_jap_coldwar.9.d: "С момента начала индо-пакистанской войны обе страны стремились получить надежную международную поддержку. По мере эскалации военных действий совместное заявление Индии и ПДТО о формальном вступлении Индии в организацию ознаменовало переход двух пактов от закулисных маневров к открытому противостоянию за господство в Азии.\n\nХотя Индия традиционно закупает оружие на Западе, она давно позиционирует себя как суверенную демократическую державу. По мере обострения индо-пакистанских отношений Индия все больше полагается на поддержку ПДТО, что привело к полному сближению с этим блоком и способствовало вступлению Индии в ПДТО. Между тем, даже при самых оптимистичных прогнозах, ВАОИ теперь должен решить, как управлять более чем миллиардом человек на Южноазиатском субконтиненте, чтобы избежать дестабилизации."
 sino_jap_coldwar.9.a: "Столкновение гигантов."
 sino_jap_coldwar.10.t: "Папуа-Новая Гвинея Присоединяется к ОДТО"
 sino_jap_coldwar.10.d: "Совместное заявление Папуа-Новой Гвинеи и штаб-квартиры ОДТО, подтверждающее полноправное членство Папуа, стало для ОДТО еще одним важным этапом в стратегическом соперничестве с ВАОИ.\n\nВвиду географической удаленности от Китая и традиционных прозападных настроений, вступление Папуа-Новой Гвинеи в ОДТО не было неожиданным. Официальные лица заявили, что Папуа-Новая Гвинея желает выступать в качестве стабилизирующей силы в Тихоокеанском регионе и будет активно участвовать в сотрудничестве со странами ОДТО. Хотя Папуа-Новая Гвинея, возможно, не представляет непосредственной угрозы для ВАОИ, в контексте потенциального решающего конфликта необходимо учитывать все факторы.\n\nНа пресс-конференции представитель ПНГ подчеркнул, что страна будет участвовать в международном сотрудничестве таким образом, который соответствует ее национальным условиям, будет способствовать национальному развитию и работать над улучшением благосостояния своего народа."
 sino_jap_coldwar.10.a: "Очередное домино падает."
 sino_jap_coldwar.11.t: "Южная Корея Присоединяется к ОДТО"
 sino_jap_coldwar.11.d: "В связи с развертыванием Японией войск для поддержки Южной Кореи Корейский полуостров стал важнейшим театром военных действий в более широком конфликте в Азии. Для более эффективной координации многонациональных операций Южная Корея объявила о своем официальном присоединении к ОДТО и о совместных операциях с силами ОДТО.\n\nНовость о вмешательстве ОДТО подняла боевой дух всего альянса, но южнокорейские военные лидеры быстро осознали, что отсутствие единого командования и хаос в тыловом обеспечении являются серьезным препятствием. В ответ Южная Корея приступила к созданию объединенного командования ОДТО для оптимизации многонациональной военной координации на ключевых азиатских театрах военных действий.\n\nНа последующей пресс-конференции представитель Южной Кореи поблагодарил все страны за их поддержку и выразил уверенность в том, что единство союзников приведет к справедливой победе."
 sino_jap_coldwar.11.a: "Ожидаем исхода."
 sino_jap_coldwar.12.t: "Северная Корея Присоединяется к ВАОИ"
 sino_jap_coldwar.12.d: "После присоединения Южной Кореи к ОДТО напряженность на Корейском полуострове быстро возросла, что побудило Северную Корею объединиться с Китаем и официально присоединиться к ВАОИ.\n\nХотя Северная Корея долгое время отказывалась от внешнего вмешательства на полуострове, обострение конфликта заставило обе стороны искать внешнюю поддержку, в результате чего противостояние между ВАОИ и ОДТО стало открытой реальностью. После официального присоединения Южной Кореи к ОДТО такая открытая провокация сделала вступление Северной Кореи в ВАОИ лишь вопросом времени.\n\nСеверокорейские государственные СМИ заявили, что их вооруженные силы, выполняя волю своего лидера и народа, начнут окончательное наступление на капиталистический марионеточный режим на юге, стремясь освободить полуостров от гнета предателей и лакеев империалистов."
 sino_jap_coldwar.12.a: "Очередное домино падает."
 sino_jap_coldwar.13.t: "Вьетнам Присоединяется к ВАОИ"
 sino_jap_coldwar.13.d: "Совместное заявление Вьетнама и штаб-квартиры ВАОИ, подтверждающее членство Вьетнама, стало значительным прорывом ВАОИ в ее соперничестве с ОДТО.\n\nНесмотря на то, что ранее были признаки, указывающие на вероятное присоединение Вьетнама, официальное объявление все же удивило многих. Вьетнамские официальные лица подчеркнули приверженность страны независимой внешней политике и заявили, что это решение отражает волю народа. Между тем, ОДТО, возможно, придется пересмотреть свои планы по развертыванию сил в Индокитае, чтобы сохранить конкурентное преимущество.\n\nНа последующей пресс-конференции представители Вьетнама заявили, что вьетнамский и китайский народы исторически поддерживали друг друга. Хотя пути развития могут различаться, их общее видение процветающего, основанного на сотрудничестве будущего остается неизменным."
 sino_jap_coldwar.13.a: "Очередное домино падает."
 sino_jap_coldwar.14.t: "Камбоджа Присоединяется к ВАОИ"
 sino_jap_coldwar.14.d: "Совместное заявление Камбоджи и штаб-квартиры ВАОИ, подтверждающее полноправное членство Камбоджи, свидетельствует о том, что ВАОИ продолжает укреплять свои позиции в конкуренции с ОДТО.\n\nХотя ранее были признаки, указывающие на возможное присоединение Камбоджи, это объявление все же стало неожиданностью. Камбоджийские официальные лица подчеркнули свою приверженность независимому дипломатическому курсу и заявили, что это решение отражает коллективную волю народа. В ответ на это ОДТО, возможно, придется скорректировать свою позицию в отношении Индокитая, чтобы восстановить преимущество.\n\n"
 sino_jap_coldwar.15.t: "Лаос Присоединяется к ВАОИ"
 sino_jap_coldwar.15.d: "С объявлением властей Лаоса и штаб-квартиры ВАОИ Лаос официально стал членом ВАОИ, что стало еще одним поворотным моментом в стратегической борьбе с ОДТО.\n\nВ рамках азиатско-тихоокеанского конфликта, еще до эскалации напряженности, Лаос активно укреплял сотрудничество с Китаем, особенно в военной сфере. С учетом этого, его присоединение к ВАОИ было предсказуемым. Лаосские официальные лица подтвердили свою приверженность всестороннему сотрудничеству с Китаем и выразили готовность учиться на опыте развития Китая с учетом потребностей Лаоса.\n\nНа последующей пресс-конференции представители Лаоса заявили, что лаосский и китайский народы разделяют общее видение будущего развития и стремятся совместно построить взаимовыгодную международную систему."
 sino_jap_coldwar.15.a: "Очередное домино падает."
 sino_jap_coldwar.16.t: "Тайланд Присоединяется к ВАОИ"
 sino_jap_coldwar.16.d: "Официальное присоединение Таиланда к ВАОИ, о котором было объявлено в совместном заявлении с головным офисом организации, означает важную победу ВАОИ в ее соперничестве с ОДТО.\n\nВ рамках азиатско-тихоокеанского конфликта, несмотря на историческую ориентацию Таиланда на Запад, ОДТО не смогла противостоять дипломатической ofensiv ВАОИ, что привело к смене лояльности Таиланда. Официальные лица признали позицию Китая как крупной сухопутной державы и выразили намерение усилить военный обмен с ВАОИ для создания более сильных оборонных сил. Между тем, ОДТО, возможно, придется пересмотреть свою стратегию в Индокитае в свете этих изменений.\n\nНа последующей пресс-конференции представители Таиланда заявили, что страна уважает беспристрастную рыночную конкуренцию. Членство в ВАОИ не ограничит западные компании в прозрачной конкуренции на тайском рынке."
 sino_jap_coldwar.16.a: "Очередное домино падает."
 sino_jap_coldwar.17.t: "Сингапур Присоединяется к ВАОИ"
 sino_jap_coldwar.17.d: "Официальное присоединение Сингапура к ВАОИ, объявленное в совместном заявлении с штаб-квартирой договора, знаменует собой важную веху в конкуренции организации с ОДТО.\n\nКак ключевой узел вдоль Малаккского пролива, Сингапур был предметом ожесточенной борьбы между ВАОИ и ОДТО. После нескольких раундов стратегических переговоров Сингапур в конечном итоге сделал свой выбор в пользу ВАОИ. Официальные лица сослались на интерес к китайской концепции общего будущего и выразили готовность к военному сотрудничеству с ВАОИ - такой результат был достигнут в ходе всесторонних обсуждений в рамках независимой внешней политики Сингапура.\n\nМежду тем, независимо от позиции ОДТО, новая динамика на Малайском полуострове указывает на то, что ей, возможно, придется пересмотреть свою стратегическую позицию, чтобы сохранить влияние на следующем этапе.\n\nНа пресс-конференции, состоявшейся после объявления, представители Сингапура вновь подтвердили приверженность страны принципам справедливости и открытости, приветствуя всех потенциальных партнеров и выражая надежду на углубление сотрудничества с ВАОИ."
 sino_jap_coldwar.17.a: "Очередное домино падает."
 sino_jap_coldwar.18.t: "Малайзия Присоединяется к ВАОИ"
 sino_jap_coldwar.18.d: "Официальное присоединение Малайзии к ВАОИ, объявленное совместно с головным офисом организации, представляет собой еще один важный шаг вперед для ВАОИ в ее стратегическом соперничестве с ОДТО.\n\nХотя Малайзия исторически склонялась к партнерству с Западом, неспособность ОДТО противостоять дипломатическому давлению ВАОИ в конечном итоге привела к смене лояльности Малайзии. Официальные лица подчеркнули, что присоединение к ВАОИ представляет собой беспрецедентную возможность для модернизации военного потенциала Малайзии. Используя международный опыт, Малайзия стремится создать комплексные, модернизированные национальные силы обороны.\n\nИ наоборот, если оборонные планы Малайзии будут реализованы, ОДТО может столкнуться с усилением военного давления в Юго-Восточной Азии.\n\nНа последующей пресс-конференции малайзийские официальные лица подтвердили свою приверженность созданию мирной и стабильной обстановки в регионе, приветствуя всех международных участников и обещая активно сотрудничать с союзниками ВАОИ для обеспечения стабильности, к которой стремится население Малайского полуострова."
 sino_jap_coldwar.18.a: "Очередное домино падает."
 sino_jap_coldwar.19.t: "Филиппины Присоединяются к ВАОИ"
 sino_jap_coldwar.19.d: "Официальное присоединение Филиппин к ВАОИ, о котором было объявлено совместно с головным офисом организации, знаменует собой еще одно важное событие в борьбе за власть между ВАОИ и ОДТО.\n\nНесмотря на историческую склонность Филиппин к западным альянсам, настойчивые дипломатические усилия ВАОИ оказались решающими. Правительство Филиппин заявило, что присоединение к ВАОИ предоставляет историческую возможность для модернизации национальной оборонной инфраструктуры. Опираясь на мировой опыт, страна стремится создать современные интегрированные вооруженные силы.\n\nЕсли эти планы будут реализованы, оборонные амбиции Филиппин могут усилить военное давление на ОДТО в Южно-Китайском море.\n\nНа последующей пресс-конференции официальные лица заявили, что Филиппины будут сотрудничать с государствами-членами ВАОИ в целях формирования более глобализированного, взаимного и открытого азиатского порядка, который обеспечит равные возможности для развития всех стран."
 sino_jap_coldwar.19.a: "Очередное домино падает."
 sino_jap_coldwar.20.t: "Индонезия Присоединяется к ВАОИ"
 sino_jap_coldwar.20.d: "Официальное присоединение Индонезии к ВАОИ, о котором было совместно объявлено с головным офисом организации, придает дополнительный импульс продвижению ВАОИ в конкуренции с ОДТО.\n\nХотя общественное мнение в Индонезии иногда критически относится к Китаю, правительство подчеркнуло, что национальное развитие остается его главным приоритетом. В противостоянии между ОДТО и ВАОИ стратегические просчеты ОДТО способствовали решению Индонезии встать на сторону ВАОИ.\n\nТеперь, когда Индонезия официально вступила в ВАОИ, ОДТО, возможно, придется пересмотреть свою оборонительную позицию - независимо от того, примет ли Индонезия участие в военных действиях.\n\nНа пресс-конференции после объявления индонезийские официальные лица выразили свою приверженность построению более глобализированного, взаимного и открытого азиатского порядка вместе с другими членами ВАОИ, предлагая равные возможности для развития во всем регионе."
 sino_jap_coldwar.20.a: "Очередное домино падает."
 sino_jap_coldwar.21.t: "Пакистан Присоединяется к ВАОИ"
 sino_jap_coldwar.21.d: "После вступления Индии в ОДТО Пакистан официально подал заявку на вступление в ВАОИ и стал активным членом после оценки стратегического баланса между двумя лагерями.\n\nВ течение последнего десятилетия Пакистан поддерживал широкое сотрудничество с Китаем в области развития. В контексте продолжающегося соперничества между ВАОИ и ОДТО Пакистан стратегически присоединился к инициативам Китая, эффективно интегрировавшись в региональную структуру ВАОИ. Хотя Пакистан официально не признан одним из основателей ВАОИ, он широко рассматривается как де-факто неотличимый от участников блока Восточной Азии.\n\nСегодня фронт между Индией и Пакистаном стал центром более широкого регионального конфликта. Независимо от того, какая сторона одержит верх, результат будет иметь глубокие последствия для глобального баланса сил."
 sino_jap_coldwar.21.a: "У каждого поколения есть своя война."
 sino_jap_coldwar.22.t: "Непал Присоединяется к ВАОИ"
 sino_jap_coldwar.22.d: "Непал, который лишь несколько лет назад стал коммунистическим государством, находится в напряженном положении между двумя сверхдержавами - Китаем и Индией. После десяти лет гражданской войны маоисты и марксисты-ленинисты свергли монархию и установили федеративную республику, которая продолжает править Непалом по сей день. В отличие от многих марксистско-ленинских пролетарских диктатур, Коммунистическая партия Непала привержена своей линии "народной многопартийной демократии". Таким образом, ее политика остается гораздо более гибкой, чем марксистская ортодоксия, сохраняя дружеские связи как с Индией, так и с Китаем. Однако с оттоком прямых иностранных инвестиций из Индии и сокращением туризма после прихода к власти режима Бхаратана и ядерной войны правительство Непала обратилось к Китаю за помощью в обеспечении безопасности. Вспоминая блокаду Непала в 2015 году, когда Индия пыталась вызвать беспорядки среди индийского населения в южной части Непала, правительство вновь опасается, что ультра-реваншистское правительство в Дели включит Непал в список территорий, которые оно хочет включить в состав "Великой Индии"."
 sino_jap_coldwar.22.a: "Маоисты сотрудничают с Китаем?"
 sino_jap_coldwar.23.t: "Шри-Ланка Присоединяется к ВАОИ"
 sino_jap_coldwar.23.d: "Шри-Ланка объявила о своем решении присоединиться к Восточноазиатской оборонной инициативе (ВАОИ), военному альянсу под руководством Китая. Этот шаг вызвал обеспокоенность у некоторых аналитиков, которые рассматривают его как еще один признак усиления сближения Шри-Ланки с Китаем и ее растущего отчуждения от Индии и ее союзников.\n\nОфициальные лица Шри-Ланки заявили, что решение о вступлении в ВАОИ было мотивировано стремлением укрепить безопасность страны и развивать сотрудничество с региональными партнерами. После притока индийских беженцев в результате гражданской войны в Индии Шри-Ланка переживает период крайней нестабильности, поскольку экономический спад усугубляется притоком беженцев. В рамках вступления в ВАОИ Китай будет предоставлять Шри-Ланке столь необходимую помощь, а также военное оборудование и обучение для стабилизации ситуации в стране. Об этом было объявлено после нескольких недель переговоров между китайскими и шри-ланкийскими дипломатами в городе Коломбо.\n\nРешение Шри-Ланки присоединиться к ВАОИ было принято на фоне растущей озабоченности по поводу расширения присутствия Китая в Индийском океане, где он вложил значительные средства в инфраструктурные проекты и создал военно-морскую базу в южном порту Хамбантота.\n\nРешение Шри-Ланки, вероятно, еще больше осложнит ее отношения с Индией, которая критически относится к растущему влиянию Китая в регионе. Действия Шри-Ланки являются частью более широкой тенденции стран региона, включая Лаос и Непал, к сближению с Китаем в ответ на растущую неопределенность в отношении политики Индии и изменение баланса сил в регионе."
 sino_jap_coldwar.23.a: "Заноза в боку Индии."
 
 #sub-sub ideologies
 PRC_deng_xiaoping_thought: "Теория Дэн Сяопина"
 xi_jinping_thought: "Мысль Си Цзиньпина"
 xi_jinping_thought_desc: "\n\n\n\n\n\n\n£GFX_PRC_ideology_left_nationalism\n\n\n\n\n\n\n\n\n§YМысль Си Цзиньпина§!, по определению главного теоретика КПК Ван Хунина, - это не предсказание социалистического будущего, а скорее обобщение опыта прошедших сорока лет реформ и открытости. В ней подчеркивается, что всеохватывающая правящая партия, то есть КПК, должна руководить всеми аспектами жизни общества, а строгий механизм выдвижения и непрерывные антикоррупционные кампании партии обеспечат идеологическую чистоту авангарда. Кроме того, чтобы преодолеть идеологический раскол внутри страны, в качестве лозунгов приняты "Общее процветание", "Китайская мечта" и "Национальное омоложение", которые отвечают растущей национальной гордости и требованию социальной справедливости в Китае. Поскольку положение Си становится все более устойчивым, "Мысль Си Цзиньпина" будет продолжать направлять Китай в обозримом будущем."
 li_zuocheng_thought: "Мысль Ли Цзочэна"
 li_zuocheng_thought_desc: "\n\n\n\n£GFX_PRC_ideology_left_nationalism_li\n\n\n\n\n\n§YМысль Ли Цзочэна§! Как Мао воссоединил раздробленный Китай, превратив его из слабого и обнищавшего государства в мощную революционную силу, так и Ли Цзочэн в XXI веке добился выдающихся успехов в омоложении нации. Как и Мао, Ли реформировал давно сложившуюся в Китае политическую систему и этические рамки. Он вновь ввел состояние "постоянной мобилизации", сродни революции, модернизировал интеграцию армии как в мирное, так и в военное время и включил ее в ткань нации. §YМысль Ли Цзочэна представляет собой более глубокий сплав "царского пути" и прагматичного "гегемонистского пути" левых теорий, возрождая в Китае жизненную силу и экспансионистские амбиции, напоминающие о его древних золотых эпохах."
 PRC_mao_zedong_thought: "Мысль Мао Цзэдуна"
 digital_leninism: "Цифровой Ленинизм"
 digital_leninism_desc: "\n\n\n\n£GFX_PRC_ideology_totalism\n\n\n\n\n\nВ своем аллегорическом политическом романе ужасов "1984" Джордж Оруэлл изобразил "Океанию", где все, что говорят и делают ее граждане, и каждый аспект их жизни контролируется "телекраном", и где правительство подавляет любое возможное недовольство. Сегодня, похоже, такая сказка стала реальностью в Китае в форме §YЦифрового ленинизма§!. Руководство Китая уделяет большое внимание искусственному интеллекту не только потому, что он представляет собой вершину технологии 21 века, но и потому, что он идеально соответствует целям КПК по внедрению всеобъемлющего наблюдения, контроля, руководства и цензуры с помощью цифровых инструментов. Искусственный интеллект служит идеальным инструментом, помогающим КПК установить мощный цифровой тоталитарный режим, возможности которого постоянно расширяются. Это гарантирует, что население будет постоянно заключено в "технологическую клетку"."
 technocracy_totsoc: "Технократия"
 technocracy_totsoc_desc: "\n\n\n\n£GFX_PRC_ideology_technocracy_totsoc\n\n\n\n\n\nИдеальная форма, к которой стремится §YТехнократия§! - это общество, в котором инженеры, ученые, аналитики данных, системные теоретики и промышленные менеджеры обладают монополией на власть. Основная логика заключается в том, что общество должно функционировать как точная машина, и только самодостаточная олигархия технических элит обладает "способностью к объективному управлению." В этом видении сложность современного общества рассматривается как совокупность взаимосвязанных технологий, а выборы, публичные дебаты и идеологический плюрализм - как хаотичные и иррациональные действия, вредящие оптимизации системы. Государство переосмысливается как колоссальная машина, а управление упрощается до серии инженерных проблем, которые можно решить с помощью расчетов, оптимизации и контроля.\n\nПод конечной целью "оптимизации системы" технократия придерживается крайнего прагматизма: вся политика оценивается исключительно на основе "технической осуществимости" и "повышения эффективности." Поскольку абстрактные цели системы для нее приоритетнее конкретных человеческих страданий, правители без колебаний прибегают к крайним мерам для устранения "иррационального сопротивления," зачастую рассматривая такие действия как оптимальное решение."
 chinese_national_communism: "Национал-Коммунизм"
 PRC_social_fascism_desc: "\n\n\n\n£GFX_Ideology_maoist\n\n\n\n\n\nС национальным искуплением в качестве ядра и коренными чувствами в качестве связи, §YНационал-Коммунизм§! выступает за радикальные действия, чтобы остановить эрозию восточной цивилизации современностью и вернуть забытые культурные основы и национальное достоинство. Мао Цзэдун выступает как символ национального освобождения, а его наследие - как призыв пробудить дремлющие души и повести народ к восстановлению китайской славы на руинах истории.\n\nПриверженцы подчеркивают священное призвание: революция - это не просто свержение угнетателей, это ритуал восстановления национального духа. Национальные герои становятся воплощением коллективной воли, их пламенная страсть воспламеняет народную веру. Эта идеология пытается соединить классические представления о справедливости с современной борьбой, создавая новый мир из обломков - подобно молоту, разбивающему цепи, или мечу, рассекающему туман.\n\nОна осуждает западную современность за промывание мозгов самодовольному населению и рассматривает западные системы как яд культурного колониализма. Короче говоря, мысль Мао Цзэдуна переосмысливается как источник для национального духовного возрождения. Мао становится не столько освободителем мирового пролетариата, сколько национальным "спасителем", рассматриваемым через призму сильной ностальгии. Таким образом, революция выходит за рамки экономики, превращаясь в духовную войну за идентичность и саму душу нации."
 PRC_chinese_neocommunism: "Китайский неокоммунизм"
 PRC_left_wing_tridemism: "Левый Суньятсенизм"
 red_military_junta: "Красная Военная Хунта"
 PRC_left_wing_junta_desc: "\n\n\n\n£GFX_Ideology_PRC_left_wing_junta\n\n\n\n\n\nA §YКрасная Военная Хунта§! это идеологическая концепция, сочетающая элементы левой политики со структурой и властью военной хунты. Это уникальное сочетание направлено на создание государственной системы, которая ставит во главу угла социалистические принципы, равенство и социальную справедливость, а также поддерживает дисциплинированный и централизованный процесс принятия решений, обычно присущий военным режимам.\n\nОсновная цель Красной военной хунты - устранить социально-экономическое неравенство, устранить классовые разногласия и повысить благосостояние рабочего класса. Она стремится достичь этих целей с помощью централизованной власти, которая может эффективно проводить политику и реформы, не сталкиваясь с бюрократическими процедурами или политической оппозицией. Военные, как костяк этой хунты, играют решающую роль в обеспечении стабильности, защите революции и отстаивании интересов народа."


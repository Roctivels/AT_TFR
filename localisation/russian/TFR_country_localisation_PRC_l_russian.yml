 PRC_chinese_triumphalism: "Китайский Триумфизм"
 PRC_chinese_triumphalism_desc: "Ветер триумфа проносит древние земли, где железные кони и золотые клинки создают великолепие. Безграничное сердце затмевает бескрайнее море. Пейзажи живописны, но в тихих горах растут несбывшиеся надежды народа. Мечта о сильной нации еще далека от завершения, и мы идем вперед, непоколебимо. Чтобы увидеть завтрашнюю славу, мы должны сначала напитать эту землю, объединить все народы и завоевать их сердца. Только тогда мы сможем не бояться врагов.\n\nМы должны работать еще усерднее, чтобы быть достойными надежд и славы этой земли."

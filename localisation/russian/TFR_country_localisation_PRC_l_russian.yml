 china.490.a: "YES"
 china.491.t: "Дневник Ма Илуна: Революционная Дружба"
 china.491.d: "Сегодня ночью луна ярко светит на побережье Калифорнии.Как бы я хотел, чтобы вы ее увидели.\n\nКомиссар Томас Блэкхоук и я разделили простой военный паек - ну, "разделили" было бы слишком сильным словом. На самом деле это были просто двое мужчин лет пятидесяти, сидящих за бронетранспортером и жующих прессованное печенье под дуновением морского бриза и лунного света. Он казался глубоко задумавшимся, и я понимал, почему: руководить подразделением с таким диапазоном идей - не маленький подвиг.\n\nВ дальнем лагере солдаты собирались вокруг костра, распевая "Интернационал". Было удивительно слышать поочередно китайскую и английскую версии, изредка перемежаемые испанскими или русскими строчками. Томас признался, что больше всего его беспокоит сплоченность подразделения. Кто-то мечтает основать анархистскую коммуну, кто-то стремится к парламентской социал-демократии, а кто-то даже повесил портрет Мопена на бронетранспортер. "Как мне руководить такой группой?" - спросил он. Бросив взгляд в сторону костра, я заметил, как Лю Сяоюй учит молодого человека с махновским значком, как сказать "товарищ" по-китайски. То, что молодой человек сказал в ответ, явно позабавило их обоих, и они разразились хохотом.\n\nЯ попытался успокоить Томаса, но он просто молча смотрел на далекие волны. Я знал, что у него на уме: будучи коренным американцем, он лучше других понимает противоречие между единством и разнообразием.\n\nМы продолжим путь на север завтра, поэтому мне нужно немного отдохнуть. Но, закрыв дневник, я все еще слышал доносящиеся издалека обрывки песен:"
 china.491.a: "Arise, ye prisoners of starvation..."
 china.492.t: "Дневник Ма Илуна: Нападение Врага"
 china.492.d: "В Северной Калифорнии пасмурно, а может, это просто какое-то забытое богом место.\n\nМои руки все еще дрожат.Кровь Энди Чена засохла на моей одежде, оставив темно-коричневое пятно. Ему было всего двадцать три года, вся его жизнь еще только начиналась, а потом он просто рухнул у меня на глазах. При воспоминании о том, как я впервые увидел его, мне хочется дать себе пощечину. Тогда он ухаживал за раненым ополченцем с такой осторожностью, словно обращался с чем-то хрупким. Помню, как я закатил глаза и сказал кому-то рядом: "Посмотрите на него - ведет себя как девчонка."\n\nУтреннее нападение произошло без предупреждения. Когда начали лететь пули снайпера, он первым обнаружил стрелка. Я никогда не забуду его взгляд. В нем не было и следа той "мягкости", за которую мы его дразнили, - только непоколебимая решимость.\n\n"Отпустите меня, товарищ Ма, - сказал он, его голос был тихим, но ясным. "Я самый маленький, по мне труднее попасть". Это были его последние полные слова. Я попытался протестовать, но он уже бежал. Его легкая фигура зигзагами проносилась сквозь дождь пуль. Ему удалось отвлечь на себя огонь противника и дать нам шанс нанести ответный удар. Но ценой... стала его жизнь, уходящая вместе с кровавой пеной у горла.\n\nВ лагере воцарилась тишина, но я не могу уснуть. Я все время вижу, как он падает. Он был так молод, едва ли старше моего младшего брата. Он мог бы выбрать более безопасный путь, подальше от этой войны, но он выбрал борьбу за революцию, отдав свою жизнь, чтобы защитить меня - иностранного офицера, который когда-то смотрел на него свысока.\n\nЯ собрал то, что он оставил после себя: кулон с распятием, медицинский справочник, переполненный его рукописными заметками, и снимок, на котором он запечатлен с другой женщиной-ополченкой. На обороте фотографии написано: "Ты - моя любовь, навсегда."\n\nРассвет клонится к вечеру, но я совсем не сплю. Он ушел слишком рано, забрав с собой извинения, которые мне никогда не удастся произнести с глазу на глаз."
 china.492.a: "Прощай."
 china.493.t: "Империя в Огне"
 china.493.d: "Соленый ветер Тихого океана пронесся над сценой, и рев дыма и пламени осветил мост Золотые Ворота в лучах закатного солнца, окрасив его в глубокий пунцовый цвет. Казалось, весь залив залит кровью. На самой высокой точке моста упрямо трепетал на ветру массивный флаг "Звезды и полосы", потемневший от артиллерийского огня и пыли. Его поверхность была изорвана, в ней зияли бесчисленные дыры и трещины, как и на изрешеченном пулями мосту. Два смелых солдата Американской народно-освободительной армии карабкались по тросам на вершину, подбадриваемые своими товарищами внизу, которые кричали им, чтобы они поторопились.\n\nНа утесе в нескольких сотнях метров от моста командир китайской добровольческой армии Ма Илун молча наблюдал за происходящим внизу. Он услышал шорох шагов комиссара Чэнь Хао, который медленно поднимался по каменистой тропе. Два человека стояли в тишине около десяти минут, пока два солдата АНОА не добрались до вершины моста.\n "Товарищ, на что вы смотрите?" Чен не мог не спросить.\n\nМа указал на дальний мост. Чен подошел ближе и увидел двух солдат АНОА, которые с помощью инструментов срезали флагшток. Работа шла медленно, мешал сильный ветер.\n\n"Посмотрите на этих американцев", - сказал Ма. "Они честные, храбрые и всегда проявляют мужество, когда это важно. Они ничем не отличаются от пуритан, пересекших Атлантику, революционеров, протестовавших против британских товаров в Бостонской гавани, или янки, сражавшихся на пляже Норамди со своей жевательной резинкой и шоколадом. Но теперь эти же люди приговаривают к смерти наследие своих предков"\n\nК этому времени двое солдат АНОА выполнили свою задачу. Они схватились за углы разорванных "Звезд и полос" и со всей силы швырнули их, отправив флаг в оранжевое море внизу. С мостика раздался еще более громкий крик, и камеры защелкали в унисон.\n\n"... Когда-то это была великая нация - обширные земли, господство над морями, города, наполненные богатством. В самые тяжелые моменты она проявляла больше мужества, чем самые великие империи. И все же она не смогла избежать вымирания. Подумайте о прошлом Голландии, Франции, Испании и Англии. Кто из них смог бы избежать той же участи?""
 china.493.a: ""Я боюсь, что однажды кто-то может поступить так же с моей страной.""
 china.494.t: "Момент Спутника"
 china.494.d: "Компания "Deepseek", базирующаяся в Ханчжоу (провинция Чжэцзян, Китай), произвела фурор в технологической и экономической сферах, представив новую модель большого языка на основе ИИ. Эта модель с открытым исходным кодом превзошла все ожидания по вычислительной производительности, особенно в математике, кодировании и рассуждениях на естественном языке. В этих областях она конкурирует с такими известными моделями ИИ, как ChatGPT. Еще более удивительной является стоимость: всего около 5 миллионов долларов, по словам основателя и президента компании Лян Вэньфэна.\n\nНовость быстро вышла за пределы технологической сферы, вызвав ажиотаж в СМИ и политические дебаты. Вскоре после этого один из высших руководителей Китая, премьер, встретился с Ляном и пригласил его внести свой вклад в отчет о работе правительства на заседании Госсовета. Тем временем на Западе многие с тревогой наблюдают за этим технологическим достижением социалистической страны, напоминающим запуск Советским Союзом первого искусственного спутника Земли в 1957 году. Некоторые высокопоставленные западные ученые и политики утверждают, что работа Deepseek с открытым исходным кодом и в открытом доступе принесет пользу всем и будет способствовать инновациям в индустрии ИИ. Однако другие считают, что достижения Китая, возможно, не являются результатом "честной конкуренции", а режим цензуры в этой стране может ограничить способность ИИ мыслить независимо и выйти на мировой рынок."
 china.494.a: "Создание бумаги, компаса, пороха - и вот теперь искусственный интеллект?"
 china.495.t: "Машина, которая Правит"
 china.495.d: ""В зале заседаний совета директоров Tencent царила тишина. Руководители компаний сидели, наблюдая за ходом презентации. Цифры говорили сами за себя. Превосходство DeepSeek над западными ИИ, а также повышение эффективности автоматизированного управления означали медленный отказ от рутинного надзора. Китаю больше не нужно было догонять. Он устанавливал стандарты.\n\nДокладчик, худой мужчина в строгом черном костюме, по мере выступления перебирал слайды. "Модели городского планирования предсказывают экономические сдвиги до того, как они произойдут. Автоматизированное распределение ресурсов сводит отходы практически к нулю. Чтобы сократить трудозатраты и обеспечить долгосрочную эффективность обучения, нам нужна система, способная оптимизировать рутинные задачи и логистику на всех уровнях, от местных советов до высших министерств. Нам нужен инструмент, который будет вести нас к будущему, где мы сможем развивать разумное руководство для партии"\n\n Технократ наклонился вперед. "Это больше, чем помощь. Вы предлагаете нечто, что выходит за рамки консультативной позиции, оно практически управляет само собой."\n\n Докладчик кивнул. "Да, сэр."\n\nТяжелая пауза заполнила комнату. Никто не говорил, но и не отмахивался от нее.\n\nДокладчик продолжил: "Неудачи человеческой администрации - коррупция, неэффективность, бесхозяйственность - провал нашей миссии по освобождению Тайваня сделали все это хорошо задокументированным. Если система способна их исправить, почему люди должны стоять на ее пути?"\n\n Ведущий перешел к последнему слайду. На экране появились два простых иероглифа. Будущее развития Китая, они назвали это:"
 china.495.a: "Великий Поход - Общий Китайский Разум."
 china.496.t: "Обнаружены Многочисленные Ядерные Запуски с территории Индии"
 china.496.d: "Наша система раннего предупреждения впервые обнаружила ракетные сигналы, исходящие из Индии, рано утром. Совместное подтверждение наших спутников предупреждения и наземных радиолокационных станций указывает на наличие нескольких баллистических ракет средней дальности с ядерными боеголовками.\n\nПолучено подтверждение, что первая волна, состоящая из 11 ядерных ракет, уже пересекла Гималаи. Судя по анализу траектории, эти ракеты нацелены на города вдоль нашей юго-западной границы. По имеющимся данным, эти ракеты используют несколько независимо наводимых на цель возвращаемых аппаратов, что позволяет им уклоняться от перехвата. Ожидается, что они достигнут намеченных целей в течение 25-40 минут. Города-мишени - это густонаселенные районы и ключевые промышленные центры.\n\nКроме того, военное спутниковое наблюдение зафиксировало подготовку ко второй волне ракетных запусков на территории Индии. По данным разведки, эта партия ракет может нести боеголовки большей мощности, способные поразить центральные и северо-западные районы нашей страны.\n\nСитуация достигла самого критического момента. Это первый крупномасштабный ядерный удар в истории человечества с 1945 года. Если эти ракеты успешно преодолеют нашу оборону, катастрофические последствия будут беспрецедентными."
 china.496.a: "Уничтожьте их!"
 china.497.t: "Китайско-Индийское Ядерное Уничтожение"
 china.497.d: "По мере обострения военных действий между Китаем и Индией индийское правительство, стремясь изменить баланс конфликта и получить стратегическое преимущество, применило ядерное оружие против нескольких населенных пунктов на территории Китая. Спутниковые снимки показывают, что ядерным ударам подверглись несколько внутренних китайских городов, а также части Тибета и Синьцзяна, что побудило Китай предпринять стратегическую ядерную контратаку.\n\nВ настоящее время крупные городские кластеры Индии подверглись разрушительным ударам. Более 80 % городов Индии переживают полный отказ электросетей, коммуникационных сетей, основных транспортных путей и административных систем. Крупные города Индии продолжают гореть, что вынуждает большое количество беженцев бежать в южные прибрежные районы. Системы мониторинга ядерного излучения показывают, что уровень радиации на большей части территории Индии достиг критического уровня, и эксперты предсказывают, что это катастрофическое воздействие будет сохраняться в течение десятилетий."
 china.497.a: "Ужасно."
 china.498.t: "Исход"
 china.498.d: "Боевая сводка Западного Т.К. НОАК\n1. После ядерного удара индийской армии по западному пограничному району, наши войска немедленно начали стратегическую контратаку, уничтожив основную военную инфраструктуру Индии и завершив стратегические контрмеры.\n\n2. Потери противника\nОколо 90% ключевых объектов индийских вооруженных сил, включая командные центры, военные базы и арсеналы, были уничтожены. Командная система Индии находится в полном беспорядке, что делает ее неспособной проводить стратегические операции. Критически важная инфраструктура по всей Индии получила серьезные повреждения: разрушены электросети и сети связи, серьезно пострадали центральные районы крупных городов, таких как Дели и Мумбаи. По предварительным оценкам, действующие силы Индии понесли серьезные потери, что делает невозможным эффективное военное командование. Число жертв среди гражданского населения в настоящее время оценивается.\n\n3. Наши потери и ответные меры.\nНесколько наших западных пограничных и внутренних городов подверглись ядерным ударам, вызвавшим различные степени разрушения. Данные о жертвах в настоящее время собираются. Местные власти ввели в действие все чрезвычайные меры в пострадавших регионах, и в настоящее время ведутся восстановительные работы. НОАК и Народная вооруженная полиция были задействованы в спасательных операциях, а медицинские бригады проводят масштабные операции по оказанию помощи. Во время этой ядерной атаки наша инфраструктура гражданской обороны сыграла решающую роль.\n\n4.Стратегическая оценка\nЭтот стратегический контрудар эффективно уничтожил основные военные возможности Индии, ограничив ее военные амбиции. Наши силы будут оставаться в состоянии повышенной боеготовности для обеспечения национальной безопасности.\n\nВсе офицеры и солдаты НОАК будут продолжать решительно выполнять приказы Центральной военной комиссии, защищая национальную безопасность и интересы народа. Мы должны сохранять бдительность и готовность противостоять любым возникающим угрозам."
 china.498.a: "..."
 china.499.t: "Ядерное Оружие Было Запущено по Нашему Городу!"
 china.499.d: "Высшая директива о нанесении стратегического ядерного удара по противнику:\n\nПосле экстренного заседания Постоянного комитета Политбюро ЦК и в соответствии с полномочиями, предоставленными Конституцией Китайской Народной Республики, Центральная военная комиссия торжественно постановляет немедленно нанести всеобъемлющий стратегический ядерный контрудар по противнику, решительно пресечь ядерный шантаж противника и обеспечить защиту национального суверенитета и жизни нашего народа. \n\nРакетные части Ракетных войск стратегического назначения, следуя установленному оперативному плану, нанесут обширный удар по всей территории противника. Первая волна ядерных ударов будет направлена на политические и военные центры противника, командные узлы и ключевые военные базы, чтобы в кратчайшие сроки вывести из строя ядро командной системы противника. На протяжении всей операции силы стратегической поддержки будут отслеживать результаты ударов и предоставлять ракетным войскам данные, необходимые для второй волны ударов, которые будут сосредоточены на точных ударах по критической инфраструктуре в стратегических тыловых районах противника, нацеленных на промышленные комплексы, экономические центры, аэродромы и центры материально-технического снабжения. Все командования в театре военных действий перейдут на самый высокий уровень готовности, ведя строгое наблюдение за всеми передвижениями противника, чтобы максимально повысить эффективность ударов.\n\nВсе военнослужащие должны выполнять эту стратегическую задачу по защите национального суверенитета и безопасности нашего народа с непоколебимой решимостью и уверенностью в уверенной победе."
 china.499.a: "Мы отомстим!"
 china.500.t: "Дракон в Небе"
 china.500.d: ""Что вы имеете в виду под "отсутствием критического сегмента?" В офисе штаба ВВС Министерства обороны начальник штаба JASDF держал в руках доклад и недоверчиво спрашивал своего подчиненного. Этот изысканный и обычно вежливый генерал редко выходил из себя, но сегодняшняя экстраординарная ситуация выводила его за рамки всех норм.\n\n "Сэр, основные параметры новой модели были записаны в документе 2022 года инженером из Chengdu Aircraft Corporation. Однако эксперты нашего департамента...\n "Я не верю, что в этом здании нет никого, кто понимал бы китайскую бумагу!" Начальник штаба захлопнул документ на своем столе. "Найдите кого-нибудь, кто учился на Тайване!"\n\nМежду тем, на другом конце света, в строго охраняемом подземном командном пункте в Северной Америке, генерал в синей форме, украшенной серебряным орлом и молнией на фуражке, рассматривал фотографию. Это были разведданные, собранные ценой жизни одного из последних оставшихся за рубежом американских шпионов. На снимке был изображен гладкий черный самолет треугольной формы, парящий над горизонтом Чэнду. Миниатюра в правом верхнем углу показывала его гладкую поверхность, характерную трехмоторную конструкцию, массивный бомбоотсек и сложные электронные системы в передней части.\n "Это тот самолет, о котором мечтали наши ВВС", - подумал генерал, но затем его мысли обратились к руинам заводов Lockheed Martin и Boeing, разрушенных во время гражданской войны. Он тяжело вздохнул.\n\nВ то же время в кафетерии CAC главный конструктор академик Ван Хайфэн стоял на импровизированном подиуме, составленном из столов. Обратившись к толпе, он поднял стакан с апельсиновым соком и прокричал: "Товарищи, друзья, братья и сестры! Давайте выпьем за партию, за нашу родину и за себя, героических китайских авиационных рабочих!"\n\n "За здоровье!". раздался ответ, когда бесчисленные хрустальные бокалы были подняты в унисон. Инженеры, мужчины и женщины всех возрастов, уже не могли сдержать своего восторга. Ван Хайфэн с улыбкой и слезами на глазах смотрел на них. Его мысли вернулись к ранним дням проекта J-10 и его наставнику Сун Вэнькону. В этот момент он представил себе, как его наставник наблюдает сверху, улыбаясь, за тем, как творение его ученика взмывает в небо над их родиной."
 china.500.a: "Теперь настало время другим догонять нас."
 china.501.t: "Ситуация на Северо-Западе Вышла из-под Контроля"
 china.501.d: "НОАК, конечно, не хотела терпеть еще большее унижение после поражения в Тайваньской войне, но худший кошмар генералов только что стал явью. Утверждая, что способен подавить любой отряд повстанцев, Чэнь Цюаньго не оправдал надежд партии и народа, позволяя своим ударным войскам терпеть поражение за поражением, в результате чего восточнотуркестанские повстанцы взяли под контроль Урумчи, а он лишь трусил в своем кабинете и бежал из Синьцзяна на самолете, пока отряды повстанцев приближались к городу.\n\nУ нас не осталось особого выбора. Уйгурские террористы теперь живут в домах, построенных партией, а казахские, киргизские, таджикские и ханьские граждане лишаются своего законного имущества, бегут на восток с телегами, нагруженными избитыми стариками и обмороженными детьми. Мы просто не можем позволить исламистским маньякам оторвать еще один кусок нашей родины и убить еще больше наших верных граждан, поэтому НОАК проводит мобилизацию на границе Синьцзяна. Они только что сожгли оливковую ветвь, но мы сожжем их надежду - приказ ясен: никаких флагов, кроме пятизвездочного красного флага, на территории автономного района.\n\nВосстание должно быть утоплено в стали."
 china.501.a: "Ивы возле отеля снова зазеленели. К западу от перевала Янгуань вы больше не увидите ни одного из моих."
 china.502.t: "Невежество"
 china.502.d: "Всегда любят спрашивать: "Кто на самом деле держит власть в Китае?"\n\nЭтот вопрос задают уже несколько десятилетий, но правильный ответ так и не всплыл. Кто-то считает, что это партия. Кто-то считает, что это военные. Другие полагают, что это технократы, бизнес-олигархи. А некоторые, жалкие люди, цепляются за слова горстки интеллектуалов - хватаются за фрагменты, пытаясь собрать воедино так называемые "трещины" в системе.\n\nКаждый раз, когда они посылают кого-то, они думают, что хорошо замаскировались. Они прекрасно говорят на мандаринском, одеваются как мы, едят как мы. Но нам не нужно их разоблачать, потому что их некомпетентность гораздо эффективнее, чем все, что мы можем сделать. Они возвращаются и пишут отчеты, составляют брифинги, проводят слушания, уверенные в том, что захватили какую-то ценную зацепку. Они цитируют друг друга, пересказывая ответы, которые они хотят услышать - как стая попугаев, запертых в конференц-зале, бесконечно повторяющих друг друга.\n\nОни хотят "расшатать" нас.\nЧем? Мемуарами, написанными перебежчиками за границей? Аналитиками из аналитических центров, которые утверждают, что "понимают китайскую систему"? Профессорами, которые до сих пор цитируют газетные статьи десятилетней давности? Мы сидим в своих офисах и листаем их разведывательные сборники, словно читаем доклад, написанный школьниками - искренний тон, глупые выводы, сплошные ошибки, но почему-то с грифом "Источник, заслуживающий высокого доверия."\n\nНам не нужно их останавливать. Мы должны лишь наблюдать за тем, как они продолжают ошибаться, продолжают лезть в структуру, уже оснащенную ловушками. Они жаждут увидеть наш крах. Но правда в том, что мы никогда не давали им ни единого рычага давления. И они даже не понимают, над чем мы смеемся."
 china.502.a: "Они никогда не признают собственного невежества."
 #china.503.t: "Цзянькуй создает новую партию"
 #china.503.d: "Хэ Цзянькуй - скандально известный ученый, известный по скандалу с "генно-модифицированными младенцами", - неожиданно вернулся в поле зрения общественности. Он не только выступил на нескольких политических форумах, но и недавно объявил об основании новой политической партии на академическом семинаре: "Партия, вдохновленная технологиями" - платформа, призванная изменить национальное управление с помощью технологий.\n\nВ своих публичных выступлениях Хэ утверждает, что застой в обществе вызван устаревшими институтами и моральными кодексами, которые сдерживают научный прогресс. Он утверждает, что если Китай хочет достичь подлинной модернизации и национального омоложения, он должен отказаться от того, что он называет "псевдоморальными ограничениями" для технологий, и вернуть науке ее законное место лидера. Он называет Партию технологического вдохновения "партией будущего", выступающей за управление на основе данных и экспериментальных результатов вместо традиционных ценностей. Используя противоречия своего прошлого, он представляет себя как "пионера, неправильно понятого своей эпохой", и дает смелый образ технологической революции и разрушения.\n\nПоначалу большинство не воспринимало новую партию как очередной недолговечный технократический эксперимент, которому суждено угаснуть, как бюрократическим реформистским союзам прошлого. Но Хэ Цзянькуй, используя остатки своего влияния в академических кругах, начал активно участвовать в университетских форумах и частных салонах, общаясь с новым поколением молодых ученых и новаторов. Через личные связи и инсайдерские рекомендации он также установил тихие, но прочные связи с чиновниками в отдельных государственных структурах. Эта двойная стратегия - одновременно и громкая, и подпольная - постепенно привлекла к нему ранее нерешительный блок: начинающих технологических предпринимателей, ученых исследовательских институтов и бюрократов, поддерживающих технологию в системе. Все вместе они стали основной базой поддержки Партии, вдохновленной технологиями."
 #china.503.a: "Политическая партия... возглавляемая ученым?"
 china.503.t: "unused"
 china.503.d: "unused"
 china.503.a: "unused"
 china.504.t: "Предложение Ученого?"
 china.504.d: "На "Симпозиуме по науке и технике," организованном Центральным комитетом партии, предложение, автором которого выступили несколько старших научных сотрудников Китайской академии наук, было представлено основному кругу лиц, принимающих решения. Они выступали за внедрение "системы технократов" - структуры управления, в которой ученые занимают центральное место в управлении страной, а экспериментальная логика направляет решения исполнительной власти.\n\nНа фоне этого несколько предсказуемого призыва к реформам именно речь Хэ Цзянькуя вызвала наибольшие споры. Вместо того чтобы повторять видение институтов своих коллег, он выступил с гораздо более прямым - и радикальным - предложением: Он заявил, что наука больше не должна быть ограничена этическими нормами. Эксперименты, по его мнению, должны быть освобождены от традиционных ограничений. Он призвал создать специальные зоны, где "избранным научным сотрудникам" будет предоставлен институциональный иммунитет, позволяющий им проводить экстремальные научные эксперименты, свободные от обычных этических ограничений, под контролем государства.\n\nПосле его высказываний встреча на мгновение остановилась. Некоторые консервативные ученые выступили против, предупредив, что такой шаг может пошатнуть моральные устои нации. Однако многие молодые ученые поддержали его, заявив, что отставание Китая в мировой научной гонке объясняется именно ограничительными и устаревшими правилами, связывающими руки исследователей."
 china.504.a: "Цзянькуй зашел слишком далеко."
 china.504.b: "Но мы не можем позволить себе отставать от других.."
 china.505.t: "Финансовые Вопросы"
 china.505.desc: "Центральная комиссия по финансовым и экономическим вопросам недавно получила предложение от Министерства государственной безопасности, в котором рекомендуется отвлечь часть бюджета на предстоящие национальные исследования от обычных механизмов распределения и зарезервировать его для стратегических инвестиций в области, связанные с военным делом. В докладе, автором которого является лично Чэнь Вэньцин, подчеркивается настоятельная необходимость укрепления потенциала вооруженных сил, разведывательных сетей и кибербезопасности. Средства будут направлены на подготовку элитных контрразведчиков, создание систем кибервойны нового поколения и другие инициативы, которые названы "не подлежащими разглашению, но необходимыми для заблаговременной подготовки." Отчет резко сформулирован, в нем говорится следующее: "Нация не должна тратить ресурсы на причудливые идеалы образования. В нынешних условиях больше, чем наука, нам нужны контроль, информация и оборона."\n\nПредложение вызвало оппозицию со стороны представителей научного и образовательного сообщества. Несколько академиков из Китайской академии наук подали совместную петицию, призывающую государство не "подрывать собственные основы во имя избежания риска." Они утверждали, что долгосрочные инвестиции в образование - это истинная основа стратегии, а не временное решение. В качестве встречного предложения они выступили за проведение общенациональной инициативы по научному просвещению населения, чтобы способствовать более широкому пониманию и доверию общественности к появляющимся технологиям и тем самым укрепить внутреннюю устойчивость.\n\nХэ Цзянькуй предложил третью альтернативу. Он призвал выделить ресурсы для "амбициозных и интеллектуально исключительных студентов," предоставив им прямой доступ к основным экспериментальным проектам страны. Его видение включает в себя создание ускоренных каналов между военными академиями, элитными университетами и специализированными лабораториями, формируя будущий "авангардный ударный отряд" в национальных исследованиях. По его предложению, финансирование общего образования будет "реструктурировано" для поддержки "системы выявления и развития гениев высокого риска"\n\nСейчас все три предложения находятся на столе переговоров. Какое бы из них ни было выбрано, оно определит фундаментальную позицию нации в отношении будущего безопасности и научного развития."
 china.505.a: "Товарищ Чэнь Вэньцин прав.."
 china.505.b: "Предложение ученых может быть лучше."
 china.505.c: "План Хэ Цзянькуя кажется более перспективным."
 china.505.d: "Все хорошо так, как есть."
 china.506.t: "Рождение Технократического Государства"
 china.506.d: "В последние месяцы расширение проектов реконструкции городов привело к маргинализации большого числа людей с низким уровнем дохода, которые раньше выживали за счет неформального, краткосрочного труда. После запуска нескольких крупных строительных инициатив и сноса устаревших городских кварталов появилась растущая популяция "городских бродяг," выживающих на окраинах городов. Не имея стабильного жилья, многие из них укрываются под эстакадами, на заброшенных стройплощадках или на окраинах исследовательских парков. Хотя они не являются злостными нарушителями закона, при нынешнем общественном устройстве их существование не способствует ни развитию, ни интеграции, и они все чаще начинают вмешиваться в работу важнейших объектов инфраструктуры.\n\nЭта проблема вышла за рамки простого вопроса "общественной безопасности." Теперь она представляет собой конкретный вызов в распределении национальных ресурсов и управлении структурно маргинализированными группами населения. В настоящее время центральное правительство сталкивается с двумя основными предложениями по ее решению:\n\nПервое, представленное совместно Народно-освободительной армией и оборонной промышленностью, представляет собой "План мобилизации для трудоустройства." Он предполагает перевод трудоспособных дрифтеров на работу в военно-промышленную систему, поручая им низкоквалифицированные задания под закрытым наблюдением, с централизованным жильем и строгим надзором.\n\nВторой план, предложенный целевой группой по научным исследованиям, предполагает, что при соблюдении строгих правил заключения контрактов и проверки состояния здоровья этим людям будет разрешено участвовать в фармацевтических испытаниях на ранних стадиях, сборе данных о неврологических реакциях и других экспериментальных исследовательских программах с высоким риском, но высокой доходностью. План предлагает компенсацию выше минимальной зарплаты и базовую медицинскую страховку для привлечения добровольных участников, а также создание "вспомогательных технических должностей" в качестве переходных функций для оказания неспециализированной поддержки исследовательским учреждениям."
 china.506.a: "Первый план кажется более жизнеспособным."
 china.506.b: "Второй план может стать хорошей альтернативой."
 china.507.t: "Лояльность Партии"
 china.507.d: "Цзя Цимин уже давно потерял счет ночам. Он сидел на холодном железном стуле, его пальцы засохли, как сучья, а на ногтях остались следы засохшей крови. Он не мог вспомнить, когда в последний раз ел, во рту был только горький, кислый привкус. По другую сторону стола сидел дознаватель из Министерства государственной безопасности в аккуратной форме, застегнутой на все пуговицы, и перелистывал признание, которое Цзя подписывал бесчисленное количество раз.\n\n"Цзя Цимин, у тебя все еще есть вещи, в которых ты не признался." Голос дознавателя был ровным, как будто он читал протокол заседания.\n\nЦзя Цимин сильно дрожал, отчаянно тряс головой. "Нет, товарищ, я рассказал все, что помню. Кто давал мне деньги, кто посылал мне женщин, кто помогал мне отмывать деньги - я все записал. Я..."\n\nДознаватель прервал его, продолжив: "У вас есть еще более серьезные проблемы. Организация считает, что вы не только коррумпированы, но и предали партию, предали народ и предали родину." Цзя Цимин застыл с открытым ртом, потеряв дар речи, как немой.\n\nПосле того, как он не ответил, дознаватель нажал кнопку на столе. В дверях быстро появились двое мужчин в черной униформе. "Отведите его в соседнюю комнату," приказал дознаватель.\n\nЦзя Цимин внезапно упал на колени, его голос охрип. "Нет! Товарищ! Пожалуйста! Я... Я признаюсь, я признаюсь! Я признаю все! Я признаю, что предал партию, предал народ, предал Родину! Я не человек, я животное! Я предатель! Я признаю все свои преступления!"\n\nДознаватель протянул ему лист бумаги. "Запиши это. Подпиши. Отпечатай свой палец."\n\nЦзя Цимин взял бумагу, его рука дрожала так сильно, что он едва мог писать, бормоча как сумасшедший: "Я признаюсь... Я предал... Я готов принять любое наказание... Я заслуживаю смерти... Я заслуживаю смерти..."\n\nДознаватель взял бумагу, взглянул на нее."
 china.507.a: ""Очень хорошо. Спасибо за сотрудничество.""
 china.508.t: "Внутренний Отчет Министерства Государственной Безопасности"
 china.508.d: "I. Общая ситуация\nВ ходе нашей работы выяснилось, что во многих городах страны существуют незаконные организации, созданные под лозунгами "равенства", "разнообразия" и "поддержки сексуальных меньшинств." Эти организации действуют с широким охватом и высокой частотой. Они давно манипулируются иностранными враждебными силами и предварительно сформировали свободные, сетевые структуры с сильными мобилизационными возможностями и способностями к распространению информации.\n\nII. Результаты расследования\n(1) Было подтверждено, что несколько крупных организаций получали финансирование от неправительственных организаций и фондов, расположенных в Японии, Австралии и Индии. Формы финансирования включают в себя зарубежные электронные кошельки, небольшие и рассредоточенные переводы и виртуальные валюты, демонстрируя типичные характеристики противодействия слежке и тайного отмывания денег.\n(2) Помимо так называемого "гендерного равенства" и "продвижения мультикультурализма," эти организации были вовлечены в распространение подстрекательской политической риторики, продвижение западных "универсальных ценностей" и сотрудничество с иностранными силами с целью подрыва идеологической безопасности.\n(3) Некоторые члены были завербованы иностранными спецслужбами, участвуя в сборе разведданных, руководстве подрывной деятельностью, манипулировании общественными событиями и других мероприятиях. Некоторые организации использовались для прикрытия и обеспечения связи для размещения персонала и разработки агентов иностранными силами на нашей территории, что представляет серьезную угрозу национальной безопасности.\n\nIII. Меры по ликвидации.\nНа данный момент наш департамент на законных основаниях запретил 23 незаконные организации, закрыл более 150 аккаунтов и сайтов в социальных сетях, конфисковал более 4800 незаконных публикаций и пропагандистских материалов, на законных основаниях вызвал и предупредил 267 ключевых лиц, поместил под уголовное заключение 43 человека, а также полностью заморозил все счета, связанные с иностранным финансированием."
 china.508.a: "Кучка западных циников."
 china.509.t: "Малая Лхаса"
 china.509.d: "Соланг сидел в своей маленькой съемной комнате с чашкой слабого чая. Снаружи небо над Дхарамсалой было мрачным, а ветер с гор нес влажную прохладу, заставляя окно скрипеть. Он находился здесь уже три года. Успешно внедренный в разведку, он стал уже довольно известной фигурой. Он мог участвовать во многих ключевых встречах, и многие видели в нем надежного соотечественника. Его личность была чистой, без изъянов. Он привык лгать, привык плести паутину обмана.\n\nНо он никогда не забывал, кто он такой.\n\nПорой, закрыв глаза, он вспоминал те дни обучения на секретной базе Министерства государственной безопасности. Тогда он был просто именем, номером. Он помнил, как инструктор говорил им: с этого дня у вас нет ни прошлого, ни имени, только миссия, только родина. Эти слова запечатлелись в его памяти. Они были безымянными тенями, которым суждено не оставить следов. Но он знал: Республика не забудет их. Они были руками Республики, глазами Республики.\n\nВ этот момент раздался стук в дверь. Он настороженно поднялся, его рука инстинктивно потянулась к пистолету с глушителем, лежащему под столом. Это был голос его товарища Ренцина, говорившего негромко: "Соланг, встреча. Сегодня приезжает крупная шишка с индийской стороны, в офисе сообщили, чтобы мы все были там."\n\nСоланг глубоко вздохнул и убрал диктофон, лежащий на столе, в карман. Он проверил свое выражение лица, вернувшись к тому мягкому, преданному виду тибетского кадра.\n\nОн открыл дверь и последовал за Ренцином в ночь."
 china.509.a: ""Безымянный герой.""
 china.510.t: "Инсайдер"
 china.510.d: "Ночью в Гонконге всегда оживленно. Неоновые огни бросали всевозможные цвета в узкие переулки, а потоки пешеходов текли нескончаемым потоком. Никто не обратил бы внимания на мужчину средних лет с рюкзаком и в бейсболке. Линь Цзяньчжун пересек Натан-роуд и вошел в особняк Чунгкинг. В воздухе витал запах карри, пота, специй и масляных паров.\n\nВ холле по-прежнему было много индийцев и пакистанцев, но их стало заметно меньше, чем несколько лет назад, когда он был здесь в последний раз. Линь Цзяньчжун окинул взглядом окрестности, не проявляя никаких эмоций. Он привык к подобной осторожности. Тем более сегодня - человек, с которым он встречался, имел деликатную личность, старый контакт из Индии, ответственный за организацию сопротивления на китайско-индийской границе.\n\nОни договорились встретиться в небольшой гостинице на девятом этаже здания. Там принимали только наличные, не задавали вопросов и не вели никаких записей. Теоретически то, что они обсуждали, не оставит никаких следов. Он нажал на кнопку лифта. Лифт был настолько медленным, что казался металлоломом из прошлого века, скрипящим на протяжении всего пути. Прежде чем войти, он огляделся - ничего необычного, или ему так показалось. Когда он добрался до девятого этажа, в коридоре запахло сырой плесенью. Он дважды постучал в дверь, и худой индиец открыл ее. Внутри над столом, заваленным картами, документами и горшком с дешевым чаем, мерцала тусклая лампочка.\n\nИндиец улыбнулся и протянул ему досье - последние планы и маршруты вербовки. Они говорили на повышенных тонах, обсуждая, как проникнуть в горные районы, как использовать местные этнические противоречия, как прикрыть тренировочные лагеря.\n\nЛинь Цзяньчжун слушал, записывая ключевые моменты в свой блокнот. Он работал сосредоточенно, не подозревая, что из здания напротив, за затемненным окном, на их комнату спокойно направлен объектив камеры.\n\nТем более он не заметил, что с того момента, как он вошел в Chungking Mansions, его лицо, выбранный этаж - все было записано."
 china.510.a: "Линь Цзяньчжун лишь смутно чувствовал, что что-то не так."
 china.511.t: "Целостность"
 china.511.d: "Ван Цзидун сидел в своем кабинете и смотрел на тяжелую коробку с фруктами на своем столе. Когда он открыл ее, под фруктами оказалась аккуратная пачка наличных, только что снятых в банке. Он знал, какая компания прислала эти деньги - та самая горнодобывающая компания, чье одобрение проекта все еще лежало у него на столе. Ванг прикурил сигарету, сердцебиение участилось. Он не в первый раз сталкивался с подобной ситуацией, но в этот раз он колебался. Он знал, что значат эти деньги. Он также знал, что значит взять их. В прошлом мелкие чиновники вроде него закрывали дверь, закрывали глаза и жили дальше.\n\nНо теперь все было иначе. В прошлом месяце он слышал о начальнике отдела в городе Чжанъе, который взял взятку, на следующий день все еще смеялся на званом ужине, а на третий день бесследно исчез. Был и тот новичок в финансовом отделе - по слухам, его допрашивали сотрудники госбезопасности почти два месяца, сломали до такой степени, что он ползал по полу, умоляя о пощаде.\n\nВан потрогал шею, как будто, взяв эти деньги, он исчезнет следующим. Он посидел еще немного, потом стиснул зубы и отодвинул коробку с деньгами в сторону. Он открыл компьютер, вошел во внутреннюю сеть и заполнил отчет о доносе. Для него отправить это в комиссию по проверке дисциплины было самым безопасным шагом. По крайней мере, он мог жить спокойно. По крайней мере, он мог спокойно спать по ночам.\n\nЗаполнив форму, он нажал кнопку отправить. Экран мигнул, и на нем появилось уведомление: "Отправка прошла успешно."\n\nОн глубоко вздохнул, встал и налил себе чашку чая Санпао. В отражении чашки с водой его лицо выглядело немного расплывчатым и крайне изможденным. Он пробормотал, как бы напоминая себе:"
 china.511.a: ""Не думайте о том, о чём не следует""
 china.512.t: "Параноя"
 china.512.d: "Фу Чэньхуай в последнее время спал все хуже и хуже.\nОн был доцентом кафедры философии Шанхайского университета Цзяо Тун, красноречиво выступал на трибуне, его обожали молодые студенты. Но все изменилось, когда он обнаружил, что за ним следят. Фу Чэнхуай стал отстраняться от людей, запираться в своей квартире, заклеивать все розетки скотчем, даже закрывать окна тяжелыми черными шторами.\n\nОднажды дождливой ночью он бродил по Бунду, промокший до костей, и кричал: "Они следят за мной! Они всегда следили за мной! В камерах над вашими головами, в ваших собственных домах!" Его волосы были в беспорядке, борода неухожена, налитые кровью глаза дики. Те, кто когда-то знал его - коллеги, студенты, - теперь смотрели на него, как на сумасшедшего.\n\nПозднее семья забрала его. Они отправили его в психиатрическую больницу, одели в белую одежду пациента, заставили принимать лекарства. Четыре белые стены. Даже в его снах было бесчисленное множество пар глаз. Но он так и не успокоился. Он читал лекции в коридорах, спорил в палатах. Он говорил всем, кто не хотел его слушать: "Вы думаете, я сумасшедший? Нет. Я вижу это яснее, чем вы все!" Он стал жалким шутом, отвергнутым обществом человеком.\n\nПосле общения с семьей и лечения Фу Чэнхуай, казалось, постепенно вернулся в "нормальное" русло. Врачи неоднократно объясняли ему, что паранойя - это всего лишь тюрьма, сплетенная разумом под сильным давлением. Он пытался поверить в эти объяснения. Может быть, он действительно был болен. Может быть, он действительно сошел с ума. Может быть, все это было недоразумением его собственного изготовления.\n\nОднажды ночью сон наконец пришел к нему. Он лежал на мягкой подушке, его дыхание было ровным, а веки медленно закрывались. Дождь стучал по подоконнику, словно мир наконец отпустил его.\n\nНо за окном, незаметно для него самого, прилепившись к неприметному блоку кондиционера, в темноте продолжал мигать крошечный красный огонек."
 china.512.a: "Они постоянно наблюдали за ним."
 china.513.t: "Проект SY-03"
 china.513.d: "Главный исследователь: Синьяла Фасилити\nДата отчета: Засекречено\n\nI. С ростом спроса на асимметричные войны и миссии по проникновению в города, традиционные агенты и оперативники постепенно выявляют различные недостатки в условиях "высокой плотности наблюдения". Данный проект направлен на превращение маргинальных групп населения в "управляемый персонал" посредством психологической реконструкции.\n\nII. Испытуемые\nВ общей сложности было набрано 312 бездомных, не имеющих семьи, социальных связей или четких личных данных. После подписания форм согласия они были переведены в учреждение.\n\nIII. Первая фаза: лишение личности.\n96 часов непрерывного шума и света для лишения сна и сенсорной стабильности.\nПовторяющийся прием словесных команд "самоотречения" для усиления сомнений в существовании и ценности личности.\nПрименение непредсказуемых наказаний для нарушения нормального понимания субъектом "причины и следствия."\n\nВторая фаза: Переформирование.\nПрименение SSRI и антагонистов NMDA для нарушения функции префронтальной коры.\nПассивное гипнотическое обучение, чтобы обусловить реакцию на ключевые слова команды, вызывая автоматическое "состояние исполнения" по команде.\n\nФаза три: Оперативное тестирование.\nИспытуемые помещались в сценарии высокого давления (симуляция убийств, подрывов, ситуаций с заложниками)\nПосле активации ключевыми командами, оценивалась эффективность и разрушительность выполнения задания.\n\nIV. Результаты и оценка\nИз 312 испытуемых первая партия из 30 достигла "состояния полного исполнения," не реагируя на самоповреждения и демонстрируя высокий уровень возможностей нападения и самоуничтожения.\nИз них 18 успешно выполнили свои миссии и самоуничтожились в оперативной симуляции.\n11 не смогли самоуничтожиться из-за недостаточного количества целевых стимулов и были прекращены вручную.\nОставшиеся люди вошли в состояние "поведенческого расстройства" и были извлечены после потери оперативной ценности."
 china.513.a: ""Рассмотрено.""
 china.514.t: "Низколетящая Диди"
 china.514.d: "С развитием технологий воздушной мобильности в городах Китая началось продвижение электрических транспортных средств вертикального взлета и посадки (eVTOL), что свидетельствует о постепенной коммерциализации и интеграции этого нового вида транспорта в повседневные поездки.\n\nИнсайдеры отрасли отмечают, что одним из ключевых факторов, ускоряющих внедрение eVTOL, является значительное преимущество в эксплуатационных расходах. "Обслуживание вертолета в течение года может стоить около десяти миллионов юаней, в то время как общие расходы на содержание eVTOL практически ничтожны - не считая аккумулятора," говорит Се Цзя, представитель Eastern General Aviation.\n\nЭто различие в стоимости напрямую отражается на ценах на билеты. По оценкам Eastern General Aviation, после расширения масштабов деятельности eVTOL билет в одну сторону из Шэньчжэня в Чжухай может стоить от 90 до 120 юаней за место. Это делает eVTOL жизнеспособной и конкурентоспособной альтернативой на рынке ближнемагистральных междугородних перевозок.\n\nВ настоящее время разрабатываются пилотные маршруты в таких городах, как Гуанчжоу, Шэньчжэнь и Шанхай, наряду с усилиями по укреплению управления низковысотным воздушным пространством и вспомогательной инфраструктуры. Аналитики считают, что, хотя коммерциализация eVTOL все еще находится на ранней стадии, прогресс в поддержке политики, технологической зрелости и контроле затрат может позволить eVTOL постепенно изменить ландшафт городских поездок на короткие и средние расстояния в Китае в течение следующих нескольких лет."
 china.514.a: "Трудно представить, как будет выглядеть будущее."
 china.515.t: "Плетение Паутины над Облаками"
 china.515.d: "Недавно в городах дельты Жемчужной реки - Шэньчжэне, Гонконге и других - была официально запущена система воздушного транспорта "Тенъюн", ознаменовавшая начало полномасштабного внедрения летающих автомобилей. Когда-то эту инновацию называли технологическим чудом, призванным изменить человеческую мобильность, но теперь она больше напоминает государственную систему точного социального контроля. В отличие от парящей свободы, воображаемой в научной фантастике, "Тенъюн" - это не универсальная привилегия на полеты, а скорее жестко регулируемая сеть общественного воздушного транспорта. Пассажиры должны пройти многоуровневую проверку, чтобы получить разрешение на полет.\n\nМаршруты "Тенъюн" проходят далеко не по всему городу. Вместо этого они образуют узкий контур, соединяющий центральные деловые районы, правительственные учреждения и крупные технологические корпорации. Хотя официальные лица утверждают, что этот проект способствует уменьшению пробок на дорогах и повышению эффективности поездок, инсайдеры полагают, что его происхождение имеет мало общего с общественным благосостоянием. Его глубинный замысел заключается в том, чтобы обеспечить точное наблюдение и управление ключевыми группами населения - создать контролируемую паутину в небе.\n\nНа первый взгляд, "Тенъюн" это инновационное решение транспортных проблем. На самом деле это временная мера местных властей, направленная на смягчение последствий краха налоговых поступлений от продажи земли. Поскольку доходы от продажи земли сокращаются, власти обратили свой взор на слаборазвитое воздушное пространство, расположенное на небольшой высоте. Построив воздушные автодромы и сопутствующую инфраструктуру, они создали и продали воздушную "недвижимость," привлекая частные инвестиции и поддерживая напряженные государственные финансы.\n\n На ранней стадии услуги "Тенъюн" предоставляются только научно-исследовательским институтам, государственным гигантам и государственному персоналу. Для обычных граждан доступ к ним требует покупки дорогостоящих разрешений. Как посетовал один таксист, "эта система никогда не предназначалась для таких людей, как мы.""
 china.515.a: "По крайней мере, мечта о летающих автомобилях наконец-то сбылась."
 china.516.t: "Конец Фабрик Гаокао"
 china.516.d: "Министерство образования решительно закрыло среднюю школу № 2 в одном из районов провинции Хэнань, которую когда-то называли "фабрикой Гаокао" и крепостью ориентированного на экзамены образования. Согласно новым правилам, любой школе, которая будет продолжать использовать чрезмерное количество часов или применять методы обучения с высоким давлением, будет полностью запрещено принимать новых учеников.\n\nВ течение многих лет эта школа могла похвастаться одним из самых высоких показателей поступления в колледж в провинции, но в то же время в ней постоянно происходили случаи членовредительства и самоубийств. Один из недавних случаев потряс всю страну: студент, спрыгнувший насмерть за пределами кампуса, оставил после себя письмо: "Я сплю только пять часов в день. Моя мама следит за моими QQ-чатами и GPS. Мой учитель говорит, что если я не поступлю в университет второго уровня, то стану мусором...". В защиту директор Цинь заявил: "Мы просто прививаем детям чувство соперничества, чтобы они могли лучше адаптироваться в обществе." Однако, по словам психолога, у большинства учеников школы наблюдались признаки тяжелой депрессии: "В школе они зубрят тесты. На улице они судорожно ищут спасения в Интернете - даже создают группы поддержки самоубийц."\n\nПосле этого была создана новая административная группа для проведения общенациональной проверки подобных учреждений. Научные исследования все чаще подтверждают, что образование под высоким давлением может нарушить развитие мозга и нанести пожизненный когнитивный ущерб. Это не образование - это разрушение.\n\nНекоторые родители высказались против закрытия школы. Один из родителей обратился к Douyin: "Если наши дети не научатся переносить трудности, как они смогут поступить в хороший университет? В то время как другие продолжают упорно бороться, мы просто сдаемся?""
 china.516.a: "Мы можем потерять несколько абитуриентов - но мы спасли бесчисленное множество молодых жизней."
 china.517.t: "Проектирование Жизни"
 china.517.d: "Государственный совет недавно обнародовал Национальный план развития технологий оптимизации генов, и вместе с ним в пекинском районе Хайдиан официально открылась первая в Китае клиника генного редактирования - Северный центр высшего рождения. Благодаря своему элегантному дизайну и футуристической атмосфере клиника больше похожа на выставочный зал передовых технологий, чем на традиционное медицинское учреждение.\n\nДиректор центра с гордостью представил посетителям свою платформу CRISPR Max: "Мы предлагаем настраиваемые генетические комбинации для будущих детей, включая повышенный эмоциональный интеллект, измененные физические данные, улучшенную память и способность к обучению." Среди наиболее популярных услуг - "Академический элитный генный пакет" и "Эстетические настройки," цена которых составляет от 1,7 до 20 миллионов юаней.\n\n В консультационном зале г-жа Денг из Хайдиана просматривала идеальные генетические варианты для своего ребенка: "Теперь, когда государство поддерживает это, почему бы не дать нашему ребенку наилучший старт? В нашем районе все делают выбор в пользу повышения IQ - мы не можем отставать." Другой мужчина заметил: "В моей семье есть история близорукости. Если мы можем устранить этот недостаток, то почему бы и нет? Это ничем не отличается от вакцинации."\n\nМеждународная реакция была быстрой и жесткой. Ученые из многих стран предупредили, что этот шаг сродни открытию ящика Пандоры. Европейский союз объявил о запрете на любое сотрудничество и обмен персоналом, связанный с подобными технологиями."
 china.517.a: "Китай сделал первый шаг в будущее."
 china.518.t: "Программа Разработки Экзоскелета "Иньлун""
 china.518.d: "Первый эксперимент с добровольцами\nОбъект: Заключенный камеры смертников\nИтог: Результаты оказались менее чем идеальными. После замены спинного мозга у испытуемого не наблюдалось ожидаемого улучшения рефлексов. Вместо этого реакция на внешние раздражители была вялой. Причина находится под следствием.\nДиспозиция: В соответствии с соглашением, приговор приговоренному к смертной казни будет заменен на пожизненное заключение. Он будет постоянно проживать в исследовательском центре и выполнять ручную работу.\n\n......\n5-й эксперимент с добровольцами.\nПредмет: Заключенный камеры смертников.\nИтог: Как и в предыдущих двух испытаниях, испытуемый продемонстрировал необычайную разрушительную силу, но улучшение рефлексов было минимальным. Потребление энергии экзоскелетом было значительно выше, чем ожидалось при моделировании. Причина расследуется.\nДиспозиция: В соответствии с соглашением, приговор приговоренному к смертной казни будет заменен на пожизненное заключение. Он будет постоянно проживать в исследовательском центре и выполнять ограниченные обязанности по охране.\n\n......\n20-й эксперимент с добровольцами.\nОбъект: Бездомный доброволец.\nИтог: После замены позвоночника испытуемому было приказано развернуть защитные пластины на туловище. В ответ на это испытуемый, испытывая видимый ужас, с силой вырвал замененный спинной блок вместе с его соединительными органами. Причина находится под следствием.\nДиспозиция: Чистка на месте происшествия - оно было настолько кровавым, что никто в лаборатории не мог есть мясо до конца дня. Также напомните Ву, чтобы он убрал свою домашнюю змею; никто не хочет больше видеть ничего, что так двигается.\n\n......\n28-й эксперимент добровольцев.\nОбъект: Заключенный камеры смертников.\nРезультат: Рефлексы и разрушительные способности испытуемого намного превышали обычные человеческие стандарты. Защитные пластины для груди, живота и спины могли быть развернуты из механического позвоночника в течение 0,8 секунды. Система могла выделять различные гормоны (например, адреналин) и болеутоляющие средства по желанию испытуемого. Этот прототип соответствует требуемым стандартам и в настоящее время рассматривается на предмет принятия на вооружение.\nУтилизация: В соответствии с соглашением..."
 china.518.a: "Он будет служить в подразделении специального назначения, а срок наказания будет сокращен в зависимости от заслуг."
 china.519.t: "Будущее Старшего Сына Республики"
 china.519.d: "Китай официально объявил о важнейшем прорыве в технологии управляемого ядерного синтеза, пилотное применение которой уже осуществляется в северо-восточном регионе. Это событие знаменует собой поворотную веху в истории энергетики страны и открывает новые возможности для возрождения Северо-Востока, долгое время испытывавшего двойную нагрузку - нехватку энергии и экологический стресс.\n\nПо данным Министерства науки и техники, первые термоядерные реакторы были развернуты в Сипине и Ляоюане и стабильно работают уже более шести месяцев в условиях, охарактеризованных как "контролируемые и эффективные." На этом фундаменте власти начали региональную реконструкцию энергосистемы, способствующую полной электрификации. Три северо-восточные провинции уже в значительной степени преодолели зимний дефицит энергии, обеспечив стабильное отопление в городах и сельской местности. В некоторых районах также начались пилотные программы летнего охлаждения с помощью электроэнергии.\n\nПромышленные преобразования уже идут полным ходом. Благодаря дешевой и мощной электроэнергии, которую дает ядерный синтез, такие отрасли, как электромобили, железнодорожный транспорт и высокоэнергетическое производство, ускоряют свой переход на Северо-Восток. Один из местных специалистов по экономическому планированию заявил, что "узкое место" в энергетике, которое когда-то сдерживало рост, "полностью устранено." В официальных отчетах отмечается, что "северо-восточный промышленный пояс вступает в новую фазу структурной трансформации."\n\nОдновременно снижение стоимости энергии стимулировало развитие технологий опреснения морской воды и сельского хозяйства. В таких городах, как Дацин, Ичунь и Цицикар, были созданы многочисленные подземные сельскохозяйственные зоны. Используя высокоплотное освещение и интеллектуальные системы контроля температуры, эти объекты поддерживают круглогодичное производство и полностью закрытое выращивание. Исследователи считают, что эта модель может облегчить зимние проблемы с поставками сельскохозяйственной продукции в северном Китае и предложить новые решения для обеспечения продовольственной безопасности в экстремальных климатических условиях."
 china.519.a: "Под льдом и снегом лежит плодородная земля."
 china.520.t: "Все Грядущие Дни"
 china.520.d: "В Гуйяне, столице провинции Гуйчжоу, в Международном центре съездов и выставок Tower 201 недавно прошел глобальный научный форум "Будущее человечества и научное управление." В мероприятии приняли участие ученые, мыслители и политики из различных исследовательских институтов Китая, бывших территорий США, Южной Америки и стран СНГ. В течение нескольких дней участники обсуждали будущие структуры общества и системы управления, основанные на технологиях.\n\nТемы форума были самыми разнообразными, включая искусственный интеллект, редактирование генов и демографические сдвиги. Одной из самых ярких дискуссий стал круглый стол на тему "Роль технологической рациональности в социальной организации," в котором приняли участие Ник Лэнд, известный своей теорией "темного просвещения", и Хэ Цзянькуй, скандальная личность, стоящая за созданием первых генно-модифицированных детей.\n\nСогласно видеозаписи с мероприятия, Ник Лэнд утверждал, что традиционные политические системы больше не способны реагировать на сложность, вызванную экспоненциальными технологическими изменениями. Он предложил треугольную модель общества, в которой на вершине находятся ученые, отвечающие за принятие долгосрочных решений и стратегическое направление; под ними - бюрократический слой исполнения, реализующий и адаптирующий политику с помощью технических средств; а в основании - широкая общественность, занимающаяся основополагающим трудом и социальным сотрудничеством.\n\nХотя это предложение остается теоретическим и не имеет конкретной основы для реализации, поднятый в нем вопрос - "Кто должен определять будущее направление развития человечества?" - вызвал широкий интерес в академических и политических кругах. Многие представители научного сообщества рассматривают это предложение как отражение глубоких размышлений о постдемократических моделях управления и предсказывают, что оно может повлиять на то, как некоторые страны будут формировать будущую научную политику и социальную архитектуру."
 china.520.a: "Мои глаза уже видели будущее."
 china.521.t: "Через Сушу и Море"
 china.521.d: "Китай официально объявил о том, что проект сверхскоростных железных дорог завершил ключевую фазу пилотируемых испытаний, ознаменовав собой значительный прорыв в реальном внедрении технологии сверхскоростного магнитно-левитационного транспорта. Испытания проводились на двух линиях - в северной части страны и на южном побережье. Обе линии успешно прошли полный маршрут и обеспечили стабильную перевозку пассажиров.\n\nПо данным Шаньсийской лаборатории сверхскоростных железных дорог, линия Датун-Тайюань-Юньчэн прошла многократные испытания в сложных климатических и рельефных условиях. Поезда развивали скорость около 700 километров в час, что значительно превосходит обычные пределы высокоскоростных железных дорог. Время в пути от Датуна до Юньчэна сократилось с примерно пяти часов до менее одного часа при максимальной эффективности.\n\nВ то же время линия Санья-Хайкоу-Чжаньцзян, тестируемая Гуандун-Хайнаньской лабораторией сверхскоростных железных дорог, была сосредоточена на эксплуатационных характеристиках в условиях высокой влажности и прибрежных погодных условиях. Данные нескольких раундов пилотируемых испытаний, проведенных в преддверии сезона тайфунов, показали стабильную работу без системных сбоев. Линия связывает остров Хайнань с городами в западной части Гуандуна и, как ожидается, значительно разгрузит морские и наземные перевозки, способствуя региональной экономической интеграции.\n\nМао Кай, руководитель проекта сверхскоростных железных дорог в Китайской корпорации аэрокосмической науки и промышленности, заявил, что успех этого экспериментального этапа демонстрирует готовность технологии к коммерческому внедрению в различных условиях окружающей среды. Следующий этап будет направлен на оптимизацию строительства узловых станций на маршрутах, ускорение систем продажи билетов и оценки безопасности. Согласно предварительным планам, в течение следующих десяти-пятнадцати лет сеть сверхскоростных железных дорог будет постепенно расширяться от юго-восточного побережья до ключевых регионов центрального и северо-западного Китая."
 china.521.a: "Своими руками мы строим будущее."
 china.522.t: "Китайская Академия Наук призывает к увеличению финансирования образования"
 china.522.d: "Недавно КАН выпустил в Пекине доклад, в котором призвал государство существенно увеличить инвестиции в образование, чтобы удовлетворить насущные потребности в научно-технических инновациях и подготовке талантов. В докладе отмечается, что расходы на образование в Китае в процентном отношении к ВВП уже давно ниже уровня развитых и даже некоторых развивающихся стран. Эксперты КАН подчеркнули, что образование является краеугольным камнем подъема Китая, в настоящее время в области искусственного интеллекта, коммуникационных технологий и других передовых областях наблюдается жесткая конкуренция, нехватка талантов становится все более очевидной, Китаю необходимо увеличить инвестиции в образование, особенно в высшее образование, научные исследования и подготовку кадров.\n\nВ докладе также отмечается, что проблема кибербезопасности в Китае становится все более серьезной, и страна должна сосредоточиться на инвестировании в образование в области киберзащиты, не только для повышения патриотизма студентов, но и для подготовки большого количества талантов в области кибербезопасности, чтобы усилить контроль за данными и предотвратить утечку национальной информации. \n\nМинистерство образования быстро опубликовало заявление о согласии на сотрудничество и объявило, что вскоре проведет радикальные реформы внутри страны и значительно улучшит качество образования снаружи, чтобы создать наиболее адекватный резерв талантов для подъема нации и безопасности страны в любое время."
 china.522.a: "Великий брандмауэр нового поколения уже на подходе!"
 china.523.t: "Разрушая Маску Морального Лицемерия"
 china.523.d: "Поначалу никто не заметил исчезновения бродяг в городе. Исчезли попрошайки у выходов из метро, исчезли одеяла и тряпки под мостами, больше не было новостей о замерзающих насмерть людях, не было волонтеров, расклеивающих объявления с призывами о помощи. Люди предположили, что политика ужесточилась, или, возможно, операции по очистке стали более осторожными. Никто не задавался вопросом, куда делись те люди.\n\nВ то же время исследовательские институты начали объявлять о прорывных результатах. Вакцина от рака с более высоким процентом излечения вышла на третью фазу испытаний, а технология редактирования генов, как утверждалось, преодолела этические границы, которые раньше считались непереходимыми. СМИ сообщали об этих событиях в приподнятом тоне, как будто мир вступал в совершенно новую эру.\n\nНекоторые сообщения продержались всего несколько часов, после чего были удалены. Аккаунты тех, кто обсуждал эти эксперименты в социальных сетях, были быстро удалены, история их сообщений стерта. Остальные вообще перестали говорить. Да и незачем было - всем было наплевать. В пригородах некоторые старые тюрьмы тихо сменили свое назначение. Там, где раньше содержались приговоренные к смертной казни, теперь стояли электронные ограждения, а грузовики подъезжали и отъезжали. Никто не знал, что происходит внутри, и ни в каких открытых источниках не упоминалось о каких-либо изменениях в этой области.\n\nПостепенно люди привыкли к новому порядку. Города стали чище, общество - спокойнее, технологии - совершеннее. Никто больше не спрашивал о пропавшем бродяге или заключенном камеры смертников, которого "переселили." Они существовали недолго, а потом, как будто их и не было вовсе, исчезли.\n\nНовые методы лечения стали использоваться в гражданских целях, продолжительность жизни увеличилась, уровень психических заболеваний снизился, а по телевизору крутили рекламу о том, что наука меняет жизнь. В офисах и домах разговоры постепенно перешли от темы "Куда они делись?" к теме "Как долго мы сможем жить?""
 china.523.a: "Ничего не Произошло."
 china.524.t: "Мозг в Банке"
 china.524.d: "В семь утра Линь Чэнъюй проснулась. Солнечный свет проникал сквозь щель в шторах, мягко падая на белое хлопковое одеяло. Линь Чэнъюй надела уютный халат и сварила чашку кофе, знакомый аромат наполнил квартиру. За окном гостиной стоял ряд цветущих вишневых деревьев, их цветы распускались точно так же, как и вчера.\n\nНо в ее сердце всегда жило странное чувство. Она работала в издательстве - стабильная работа, рутинная жизнь. Но в какой-то момент ей стало казаться, что мир вокруг не совсем реален. В метро она постоянно видела одни и те же незнакомые, но странно знакомые лица. На работе коллеги вели одну и ту же светскую беседу, словно навсегда застряв в повторяющемся цикле диалога.\n\nВ тот день, идя домой из офиса, она заметила, как вывеска магазина на углу вдруг "замерцала" - как будто на экране телевизора пропал сигнал, исказившись на краткий миг. Никто не обратил внимания. Все продолжали идти, болтать, как будто ничего не произошло.\n\nОна начала пытаться сломать привычный уклад: ходила разными маршрутами, перестала ездить на метро, игнорировала телефонные звонки. Она старалась уходить с главных дорог города, но, сколько бы она ни шла, всегда оказывалась на той же улице. Она остановилась перед витриной магазина и посмотрела на свое отражение. И в этот миг фигура в стекле слегка перекосилась. Это было уже не знакомое лицо, а размытое, глючащее изображение, похожее на испорченные данные.\n\nОна замерла. Это не она смотрела в зеркало, а зеркало смотрело на нее. Слабый, почти неслышный голос прозвучал в эфире: "Объект A417 запустил аномалию самосознания. Подготовка к перезагрузке сенсорной программы."\n\nМир погрузился во тьму."
 china.524.a: "В следующую секунду Линь Чэнъюй "проснулась.""
 china.525.t: "Птица в Клетке"
 china.525.d: "При рождении каждый младенец вносился во всеобъемлющий реестр данных. Перед поступлением в школу они проходили еще один раунд скрининга, после чего их распределяли по стратифицированным образовательным трекам. Одни попадали в "Канал развития практической рабочей силы," других отбирали в "Программу научно-исследовательского резерва," третьих еще в раннем детстве определяли в "Кадровые ресурсы социальной поддержки" - для поддержания городского порядка, санитарных систем или других важных, но негласных ролей.\n\nНикто не думал, что в этом есть что-то плохое. В конце концов, образование - это отбор; стратификация означает эффективность; ресурсы ограничены. Родители постепенно приспосабливались. Они больше не выбирали для своих детей факультативы, не ломали голову над тем, как устроить их в школу, - система, руководствуясь прогностическими моделями, сама определяла оптимальный путь для каждого ребенка. "Свободное развитие" осталось в образовательной доктрине, но теперь оно означало "свободу в пределах возможностей." Например, если математическая модель юноши предсказывала, что его когнитивный рост достигнет плато после пятнадцати лет, его определяли в зоны развития физического труда. Если модель эмоциональных реакций человека была слишком чувствительной, его считали непригодным для работы с финансами или государственными делами.\n\n"Карты распределения талантов" были установлены по всем городам. Каждое сообщество было зонировано по профессиям и функциям. Разрыв между людьми стал четким, контролируемым. Некогда хаотичные "мечты" больше не появлялись. Общество стало более стабильным, уровень преступности снизился, психические заболевания уменьшились, студенты, прыгающие с крыш, исчезли, как и родители, плачущие по ночам.\n\nНекоторые говорили, что это была эпоха, когда каждый мог реализовать свой потенциал. Другие говорили, что никогда не обладали настоящим "я". Но все улыбались, принимая это устройство, и верили, что это свобода."
 china.525.a: "Они свободно входили в клетку и говорили себе, что это небо."
 china.526.t: "Переделанный Мир"
 china.526.d: "Когда Шен Ран приземлилась в Пекине, было пять тридцать утра, небо еще тусклое. Она сидела на скамейке у выхода, наблюдая за путешественниками, проходящими через аэропорт, и вдруг почувствовала себя немного не в своей тарелке. Пять лет назад, когда она только окончила Чжэцзянский университет и отправилась по стипендии учиться в Казанский федеральный университет, Пекин не был таким "чистым." Теперь же он выглядел так, словно над ней пронеслось что-то невидимое: ни беспорядка, ни шума, даже некогда хаотичные вывески магазинов сменились однотонными белыми фонами и синими иероглифами.\n\nОна протащила свой багаж через выход службы безопасности. Ряд за рядом светились рекламные экраны, на которых отображалась информация с недавнего сканирования лица - имя, идентификационный номер, температура тела - все это мигало в углу экрана. Она удивленно оглянулась, но люди за ее спиной выглядели невозмутимыми, как будто это было частью повседневной жизни. Ей казалось, что она возвращается к чему-то "знакомому," но теперь Шен Ран чувствовала, что все вокруг чужое.\n\nОбъявления в аэропорту сменились сменяющимися огнями и направленными проекциями над головой. Чтобы купить бутылку воды, больше не нужно было сканировать QR-код - торговый автомат автоматически сканировал ее лицо, а уведомление о вычете отправлялось прямо на ее привязанный счет. Даже на экранах перед туалетами отображалось количество посещений и "индекс гигиены" каждого человека. "Индекс гигиены?" Она уставилась на эту фразу, желая рассмеяться, но не в силах.\n\nОна вдруг обнаружила, что скучает по своей старой квартире в Казани, по ледяным улицам, по русским бабушкам, продающим черный хлеб на рынке, - этот грубый, шумный, хаотичный мир теперь будит в ней неожиданную тоску."
 china.526.a: "Где же ты, старый добрый Китай?"
 china.527.t: "Новая Научная Реформа"
 china.527.d: "В течение многих лет в системе научных исследований накапливалось огромное количество проектов и сотрудников, в ней царили жесткая иерархия, сложные процедуры проверки и бесконечные задержки в работе. Огромные ресурсы уходили на бумажную работу и политику выслуги лет. Молодым исследователям было практически невозможно подняться, а действительно важные темы замирали на годы. Теперь, чтобы выйти из этого тупика, старая система рецензирования была отменена - больше нет возрастных ограничений, требований к академическим званиям и дипломам. Право собственности на проект и распределение ресурсов теперь напрямую связаны с эффективностью и индексом выполнения. Тот, кто добивается результатов, получает следующее финансирование и полномочия.\n\nВновь созданные исследовательские институты начали массово поглощать технические таланты. Пока вы могли решать проблемы, ваше происхождение больше не имело значения. Некоторых, кого раньше заносили в черный список за нарушение экспериментальной этики, теперь вспоминали. Другие, которых раньше отвергали за радикальное мышление, стали лидерами в ключевых областях.\nНикто больше не говорил об "этической экспертизе." Это словосочетание было резко сокращено в документах, его просто перечисляли как одно из "оперативных руководств," только для справки. Теперь важны были результаты: преодоление технических узких мест, достижение массового производства в кратчайшие сроки.\n\nОднако время от времени возникали разногласия - некоторые технологии якобы подвергались тестированию в реальных условиях, некоторые алгоритмы подозревались в манипулировании данными. Но эти голоса быстро затихали под наплывом эффективности."
 china.527.a: "А мораль осталась в конце коридора, и некому было ее навестить."
 china.528.t: "Чистка от Червей"
 china.528.d: "Матиас Ромеро сидел в транзитном зале аэропорта Гонконга и ритмично постукивал пальцами по джинсам. Его багаж уже проверили, визу одобрили - казалось, все в полном порядке. Но когда он уже собирался отправиться на КПП Шэньчжэня, таможенники вежливо провели его в боковую комнату, и так прошло более десяти часов.\n\nТут не было ни грубости, ни допросов, только человек в форме, который вошел и протянул ему лист бумаги. На нем было написано простое решение: "Вы не соответствуете требованиям для поступления." Он не понял. "Почему?" - спросил он. Мужчина просто посмотрел на него: "Вы знаете, почему."\n\nМатиас открыл рот, но ничего не сказал. Его разум внезапно помутился, и вещи из его прошлого вырвались наружу, обнажившись перед его глазами. Десять лет назад в Буэнос-Айресе он хвастался в социальных сетях, что употреблял кокаин на дне рождения друга. Пять лет назад он был задержан на двенадцать часов после того, как врезался в фонарный столб, будучи пьяным за рулем. Три года назад он опубликовал несколько грубых твитов с критикой правительства. Он никогда не вспоминал об этом. Эти записи почти стерлись в его памяти, но теперь они всплывали одна за другой, как аккуратные, чистые файлы.\n\n"Откуда вы это знаете?" Мужчина слабо улыбнулся, но не ответил, а просто пододвинул письмо с решением чуть ближе к нему."
 china.528.a: ""Счастливого пути домой.""
 china.529.t: "Оковы для Капитала"
 china.529.d: "В 4 часа утра возле офисного здания в шэньчжэньском районе Наньшань сотрудники Министерства государственной безопасности, одетые в штатское, одновременно вошли через подземную парковку и лифтовые шахты и начали облаву на три крупные инвестиционные компании, находящиеся внутри. Серверы офиса были немедленно опечатаны, все электронные устройства конфискованы, а несколько руководителей были увезены на месте.\n\nПочти в то же время в другой башне штаб-квартиры в новом городе Чжуцзян в Гуанчжоу финансовый отдел продолжал работать в течение ночи, а данные с бэкграунда быстро переводились на офшорные счета. Но все это резко прекратилось на глазах у вошедших сотрудников правоохранительных органов. Изъятые документы показали, что компания готовилась перевести миллиарды средств через подставные фирмы в оффшорные трастовые системы, планируя в течение недели перевести основные активы в свой гонконгский филиал.\n\nПодобные действия разворачивались и на окраине высокотехнологичного парка Xixi Wetland в Ханчжоу. Согласно результатам многомесячного расследования, эти компании использовали алгоритмическую торговлю со связанными сторонами, фальсифицированные технологические оценки и трасты по владению акциями сотрудников для вывода огромных прибылей из систем первичных счетов, пытаясь отмыть потоки капитала через зарегистрированные за рубежом юридические лица. Следователи опечатали бухгалтерские книги и серверы с кодами, а также перехватили планы полетов нескольких ключевых лиц, которые готовились сбежать за границу на частном самолете."
 china.529.a: "Давно пора было разобраться с этими капиталистами!"
 china.530.t: "Проникновение в Глобальную Сеть"
 china.530.d: "Дэмиан Стоун сидел в своем кабинете на пятом этаже Министерства обороны в Канберре. Потолочный вентилятор гудел над головой, воздух внутри был слегка душным. Он прихлебывал кофе, не сводя глаз с мигающего голубого окна чата на экране.\n\n"Я составил предварительный меморандум о механизме совместной подготовки с Японией," набрал он в окне чата и нажал Enter. Через несколько секунд пришел ответ: "Хорошо, присылайте." Тон был как всегда таким же - ни лишних слов, ни меньше.\n\nДэмиан открыл вложение с пометкой "Внутреннее обсуждение, к распространению не допущено," перетащил его в чат и нажал кнопку "Отправить". На мгновение он замешкался, затем добавил: "Я включил несколько деликатных рекомендаций - возможно, придется перепроверить список приоритетов."\nОтвет пришел быстро: "Понял. Отличная работа." Затем появился знакомый смайлик - подпись начальника, точная и механическая: :)\n\nОни обменялись еще несколькими строчками пустой светской беседы, пошутили о том, не застопорится ли снова бюджетный комитет парламента, и о том, что принтер в парадном зале все еще сломан. Все казалось рутиной.\n\nДэмиан допил кофе, закрыл ноутбук и собрался уходить. В соседнем кабинете кто-то разговаривал по телефону - он не разобрал, о чем шла речь, и не заметил, что документ, который он только что отправил, уже заархивирован, переклассифицирован и снабжен временной меткой, и теперь спокойно лежит на системной странице с надписью "Южнокитайский центр наблюдения - подразделение 3.""
 china.530.a: "Дэмиан вышел за дверь и зевнул."
 china.531.t: "Нация Автоматики"
 china.531.d: "Давно уже никто не видел рабочих, склонившихся над сборочными линиями, и не слышал раннего утреннего шума двигателей грузовиков. На заводах с точностью работали ряды роботизированных рук, на складах круглосуточно работали автоматизированные сортировочные системы, машины доставки рассчитывали маршруты с точностью до секунды и давно уже не нуждались в водителях. Санитарные машины, ремонтные станции, пункты оплаты проезда по всему городу были заменены унифицированными интеллектуальными терминалами, работающими с предельной эффективностью и почти никогда не допускающими ошибок. Все это называлось прогрессом.\n\nСМИ пестрели полосами, демонстрируя данные: ВВП продолжал расти, количество дорожно-транспортных происшествий сократилось, количество ошибок приблизилось к нулю. Города стали чище, эффективнее, тише - почти без лишнего шума. Казалось, что жизнь каждого человека вписалась в более упорядоченную систему, где меньше ожиданий, меньше проблем.\n\nНекоторые люди стали замечать, что в некогда оживленных индустриальных парках больше нет сменных часов пик; на станциях метро стало меньше офисных работников в униформе; в районах, где сдаются квартиры, больше не включается свет по ночам. Маленькие ресторанчики в старых кварталах закрывались один за другим, кресла в парикмахерских пустовали, люди, которые обычно стояли на углах улиц, курили и болтали, - никто не знал, когда именно они перестали появляться."
 china.531.a: "Куда они все подевались?"
 china.532.t: "Кукловод Мира" #you are ze puppet und i'm ze puppeteer
 china.532.d: ""Ты действительно привез эту рухлядь из Китая?" Карл взглянул на лежащего рядом с ним на песке ополченца. Парень был молод, в краснозвездной косынке, с автоматом M72 LAW за спиной. Его тактический жилет "Якеда" был разорван шипами в двух местах, нитки болтались. "Дешево. Шестьдесят баксов", - пробормотал ополченец.\n\nКарл не ответил, крепче сжимая винтовку, не сводя глаз с пыли, поднимающейся в дальнем конце долины. Враг приближался - по меньшей мере два взвода, медленно продвигался основной боевой танк M1. "Они знают, что мы здесь," сказал командир отделения рядом с ним. "Мы, вероятно, не продержимся и десяти минут."\n\nВоздух был тяжелым, вдалеке слышался слабый гул артиллерии. Как только Карл подумал, что это конец, танк внезапно остановился. Его башня медленно повернулась, а затем резко открыла огонь - не по ним, а по линии пехоты за их позицией. Второй выстрел, затем третий. Взрывы эхом разнеслись по каньону.\n\n "Черт, он что, спятил?" - вздохнул ополченец. Карл застыл на несколько секунд, затем вскочил на ноги. "Быстро! Выдвигаемся!" Они повернулись к флангу и побежали. Пули пролетали мимо них, но вражеские силы уже были в беспорядке. Карл оглянулся на танк. Люк был задраен, внутри не было никакого движения. Но башня продолжала механически поворачиваться влево и вправо, как будто что-то взяло ее под контроль.\n\nВ полумире от нас, в комнате управления, техник в серой униформе медленно поднял палец от пульта."
 china.532.a: "Изображение со спутника на экране постепенно исчезало."
 china.533.t: "Всеведущий, Всемогущий"
 china.533.d: "В кафе на берегу озера Лугано в Швейцарии Александр фон Харт, сотрудник среднего звена из Службы внешних связей ЕС, откинулся в плетеном кресле. Напротив него сидел его старый французский друг Жан-Пьер. Они были знакомы уже более двадцати лет, но сегодня выдался редкий досуг.\n\n"Помнишь, какими наивными мы были, когда только поступили на службу?" Александр усмехнулся. "В наши дни, куда бы тебя ни отправили, все одинаково. Подписать несколько бумаг, и на этом день закончен." Жан-Пьер фыркнул. "Тот коллега, которого в прошлом месяце отправили в Австралию? Весь месяц выкладывал пляжные селфи. И кто-то даже поднял вопрос о его "результатах исследований" на совещании - смешно."\n\nАлександр кивнул, меняя свое положение. "Зарубежные командировки? По сути, это туризм с редким отчетом, а в остальное время ты просто не высовываешься. Пока ты не облажался, никто тебя не проверяет." Он сделал паузу, глядя на далекое озеро. "Иногда мне кажется, что мы менее полезны, чем стажеры в посольствах в Китае."\n\n"Ну, не совсем бесполезны," сказал Жан-Пьер. "По крайней мере, мы можем привезти немного сыра." Они оба рассмеялись.\n\nВ то же время за 10 000 километров в Наньнине, в необозначенном офисном здании, Министерство государственной безопасности обрабатывало весь их разговор в режиме реального времени."
 china.533.a: "Архивировано. Мониторинг продолжается."
 china.534.t: "Переступая Порог Истории"
 china.534.d: "Я часто сижу в одиночестве поздно ночью, просматривая отчеты разведки и размышляя о том, как далеко падет этот мир.\nСейчас все западные страны находятся в состоянии самоанестезирующего внутреннего хаоса,\nОни сами уже не могут определить, кто враг, а кто друг.\nОни любят размахивать плакатами, нацарапанными на клочках бумаги, на разрушенных улицах, полагая, что защищают некую форму свободы,\nНо они даже не осознают, что потеряли самый основной социальный порядок. \nЯ вижу, как империалисты грызутся между собой, как капиталисты тонут в своих пустых рыночных играх,\nкак крысы пируют на трупах себе подобных в гниющем зернохранилище.\nВ их парламентах разыгрываются жалкие, бессильные театральные представления,\nи эти представления все еще наряжаются в средствах массовой информации, чтобы выглядеть достойно и праведно.\nИх СМИ трубят о победе на одном дыхании,\nа сами дрожат от страха признать, что они терпят поражение.\nМеня не интересует такая дешевая театральность - их так называемые системы, их так называемые ценности,\nДля нас это не более чем груды неработоспособного металлолома. \nДаже если они выиграют битву, это будет не больше, чем драка собак в грязи.\nИ мы больше не будем играть их старый фарс на одной сцене.\nОни похожи на протекающие корабли, качаются и скрипят, но все еще обманывают себя, говоря о национальном достоинстве.\nЯ не чувствую жалости к ним, и мы не предложим им выбора.\nОни хотят догнать, но уже слишком поздно. Китай не позволит им дышать.\nМы не проявим милосердия, потому что этот мир не заслуживает милосердия.\nОни могут либо склониться и принять новый порядок,"
 china.534.a: "или быть раздавленным под колесами истории."
 china.535.t: "Вчерашняя Тень"
 china.535.d: "Председатель Чэнь Вэньцин отложил папку и посмотрел вдаль через окна своего кабинета от пола до потолка. Его секретарь только что ушел, представив специальный доклад: по всей стране возник феномен подражания Мао, от пожилых танцевальных групп, скандирующих лозунги, до онлайн-стримеров, отдающих дань уважения, и даже организованных мероприятий, повторяющих "Великий Поход"\n\n"Как вы думаете, за этим стоят иностранные силы?" осторожно спросил секретарь, прежде чем уйти. Чэнь покачал головой, на его губах играла легкая улыбка. "История сама выведет подтверждающие тексты. Нет необходимости в излишней интерпретации." Он спокойно махнул рукой, указывая секретарю, что тот может уходить. Как только дверь кабинета закрылась, выражение лица Чена стало смертельно серьезным. Он поднял трубку красного зашифрованного телефона и набрал внутренний номер: "Дитин, Дитин, немедленно начните отслеживание источника. Не ворошите траву и не настораживайте змею."\n\nНа конфиденциальном совещании на следующий день "Дитин" доложил: "Предварительное расследование показало, что подражатели происходят из разных слоев общества - безработные, любители истории, маргинальные группы - и не имеют очевидной организационной структуры. Однако некоторые из них выступают за возвращение к социализму и соблюдение трудового законодательства. Иностранные элементы уже начали использовать эту ситуацию.""
 china.535.a: "Снова ли явится красный призрак?"
 china.536.t: "Рука Стабильности"
 china.536.d: "С момента вступления председателя Чэня в должность политическая обстановка в стране неуклонно улучшается. Недавно Центральная комиссия по проверке дисциплины в сотрудничестве с Министерством государственной безопасности начала операцию "Бедрок" для проведения целевых расследований в отношении некоторых членов партии, обеспечивая единство партии и долгосрочную национальную стабильность.\n\nСогласно официальным заявлениям, операция "Бедрок" направлена на устранение "дестабилизирующих элементов," скрывающихся внутри партии. Операция направлена, в частности, против членов партии, которые давно выступают за политические реформы, распространяют западную идеологию или размещают в Интернете радикальные мнения, разжигающие классовую напряженность. Расследование показало, что эти люди были в сговоре с иностранными державами, пытаясь использовать социальные разногласия для подрыва национальной безопасности. В результате операции было арестовано множество экономистов, профессоров права и специалистов по новым медиа, а также изъяты различные публикации и политические сайты.\n\nОсобенно инновационным аспектом является внедрение Министерством государственной безопасности революционной технологии идеологического слежения, которая использует анализ больших данных и искусственный интеллект для точного определения и отслеживания идеологических истоков и путей распространения этих людей. Это вызвало волну самоцензуры, когда граждане всего общества доносят друг на друга и добровольно сдают запрещенные книги, чтобы продемонстрировать свою лояльность. Председатель Чэнь поблагодарил целевую группу "Бэдрок" за их доблестные усилия и призвал всю партию поддерживать безопасность и стабильность, повышая политическую сознательность и укрепляя ответственность."
 china.536.a: "Рука стабильности крепко держит руль."
 china.537.t: "Защитники Нации"
 china.537.d: "На фоне беспрецедентных глобальных перемен председатель Чэнь Вэньцин совершил редкое посещение учебного центра Министерства государственной безопасности, чтобы проинспектировать группу тайных агентов под кодовым названием "Кунпэн." Это был не просто обычный визит, а строго засекреченный брифинг перед развертыванием.\n\nВ своем кратком выступлении председатель не стал останавливаться на серьезности международной напряженности. Вместо этого он сформулировал "миссию" агентов в глубоко символичных выражениях. Прогуливаясь по тренировочным площадкам, он наблюдал за тем, как агенты выполняют передовые упражнения по сбору разведданных и ведению психологической войны. "Вы не обычные оперативники, а мечи, скрытые в темных течениях," председатель сделал паузу, окинув взглядом лица агентов. "Чтобы Кунпэн расправил крылья, он должен сначала вырваться из своего кокона. Наша эпоха возложила на нас миссию, выходящую за рамки условностей и границ, - защищать национальные интересы с помощью невидимых сил.\n\n"Кунпэн" не направлен против какой-то одной страны или региона, а представляет собой глобальную стратегию упреждения. Агенты будут развернуты по всему миру и будут выполнять следующие задачи: проникновение в важнейшие иностранные ведомства, похищение основных технологических данных, ликвидация зарубежных антикитайских сил для пресечения попыток подрывной деятельности и ведение информационной войны против враждебных элементов.\n\nПредседатель Чэнь особенно подчеркивал важность культурного проецирования. Он поручил министерству сформировать "Команду прорыва", состоящую из высококлассных артистов, писателей и ученых, чтобы использовать китайскую культурную привлекательность, смягчая общественные настроения во враждебных странах и заручаясь международной поддержкой: "Мы должны использовать наши собственные нарративы, чтобы изменить глобальное восприятие.""
 china.537.a: "Невидимая война уже началась."
 china.538.t: "Уборка Дома"
 china.538.d: "Министерство государственной безопасности недавно завершило масштабное расследование под кодовым названием "Операция Чистка", поводом для которого послужили добровольные разоблачения человека по фамилии Ван, ранее сотрудничавшего с западными спецслужбами. Ван, который когда-то организовывал антиправительственную деятельность при иностранной поддержке, обратился в органы государственной безопасности и представил обширные "антикитайские доказательства" после внутренних разногласий, пытаясь спасти себя и одновременно подорвать конкурентов.\n\nСогласно официальным отчетам, в ходе операции были проверены 10 медиаплатформ, получающих иностранное финансирование, более 160 аккаунтов в социальных сетях и более 80 НПО, занимающихся вопросами гендерного равенства, искусства и развлечений, религиозной свободы, юридической помощи и другими секторами. Власти утверждали, что эти организации действовали под прикрытием общественного благосостояния, а на самом деле занимались подрывной деятельностью, и обнародовали доказательства финансовых операций между замешанными организациями и западными державами.\n\nНа канале министерства в WeChat говорится: "Любая организация или частное лицо, пытающееся заниматься деятельностью, наносящей вред национальной безопасности, под вывеской правозащитной деятельности, будет подвергнута юридическим санкциям." Соответствующие ведомства подчеркнули, что в данном случае речь идет не о конкретных группах, а о ликвидации иностранной инфильтрации, скрытой в различных секторах. Примечательно, что, несмотря на попытки Ванга добиться снисхождения, сообщив о других, он сам получил суровый приговор за подстрекательство к подрыву государственной власти. "Он использовал свой узкий и предвзятый взгляд, чтобы заклеймить нормальные социальные проблемы в Китае," рассказал один из офицеров, участвовавших в расследовании."
 china.538.a: "Буря контршпионажа подошла к концу."
 china.539.t: "Противоречивый Биолог"
 china.539.d: "Цзянькуй Хэ, известный китайский биолог, популярный на канале X, который был осужден за незаконные эксперименты над тремя эмбрионами с использованием технологии CRISPR, теперь получил звание члена Китайской академии наук.\n\nПо данным агентства Синьхуа, 1 апреля Хэ стал академиком Китайской академии наук и профессором Института генетики СШТ. Институт был основан USCT и правительством НОАК в [GetYear]\n\nИсследования Хэ сосредоточены на предотвращении иммунных заболеваний, таких как СПИД, с помощью редактирования генов. В свое время это исследование вызвало кризис в научных и этических кругах, но теперь оно стало ведущим исследовательским проектом, одобренным китайским государством.\n\nХэ сказал журналу Nature, что он стремится "никого не оставить позади." "Никто не должен родиться с отставанием в генах," сказал Хэ, ученый, стоящий у истоков исследования эмбрионов. "Я также надеюсь, что мои американские поклонники продолжат поддерживать мои исследования," добавил он."
 china.539.a: "Создаст ли он кошкодевочек?"
 china.540.t: "Рождение Движения Врагов Народа"
 china.540.d: "Специальный доклад о деятельности по проникновению отечественных и зарубежных враждебных сил, связанных с "Врагами Народа"\n\nВ последнее время в нашей партии и в идеологическом ландшафте общества возникло враждебное течение мысли и организационной деятельности, предварительно обозначенное как "Враги Народа." Его основная цель - саботировать фундаментальную национальную политику управления на основе технологий, установленную нашей партией, свергнуть центральную власть в структуре технического управления и тем самым создать серьезную угрозу национальной стратегической безопасности и идеологической стабильности.\n\nЭта организация состоит в основном из группы интеллектуалов с давними либеральными тенденциями, которые отрицают легитимность технократического правления, а также нескольких отставных бюрократов. Ее лозунги, прикрытые такими словами, как "общечеловеческие ценности" и "восстановление народно-демократической диктатуры," по сути, направлены на то, чтобы атаковать политику нашей партии по выдвижению старших технических кадров, а также возбудить недоверие и антагонизм к "технократическому правлению" среди партийных чиновников и масс."
 china.540.a: "К иностранным враждебным силам пощады не будет."
 china.541.t: "Смерть Движения Врагов Народа"
 china.541.d: "Согласно нашим источникам, Министерство общественной безопасности недавно раскрыло и ликвидировало крупное дело о политической инфильтрации, организованной враждебными внутренними и иностранными силами, эффективно защищая национальную политическую безопасность и социальную стабильность.\n\nРасследование показало, что организация под названием "Общество исследований технологической этики" злонамеренно искажала стратегию научно-технического развития нашей партии, клеветала на национальную систему управления наукой и технологиями и продвигала ошибочные идеологии, такие как "универсальные ценности" и "права человека выше суверенитета." Что еще более вопиюще, основные члены организации поддерживали тесные связи с враждебными иностранными силами и незаконно принимали финансовую и техническую поддержку от таких стран, как Индия, Япония, Австралия и Новая Зеландия. Они часто распространяли слухи и нарушали общественный порядок, представляя собой серьезную угрозу национальной безопасности.\n\nОрганы общественной безопасности на законных основаниях применили к участникам уголовно-принудительные меры, заморозили незаконные финансовые счета, закрыли соответствующие незаконные онлайн-платформы и тщательно ликвидировали подпольные пункты связи, созданные группой в нескольких провинциях. Предварительные допросы показывают, что организация стремилась разжечь общественные настроения и спровоцировать конфронтацию под видом "гуманитарных исследований." Характер деятельности организации чрезвычайно серьезен, четко определен и подкреплен убедительными доказательствами.\n\nМинистерство общественной безопасности заявило, что государство сохраняет нулевую терпимость к любой форме сепаратизма или подрывной деятельности. Любые попытки сорвать национальное стратегическое развертывание или подорвать социальную стабильность обречены на провал. Общество в целом должно и дальше укреплять политическое сознание и решительно бороться со всеми враждебными силами, совместно обеспечивая национальную безопасность, процветание и стабильность."
 china.541.a: "Правосудие свершилось."
 china.542.t: "Триумф Науки"
 china.542.d: "За пределами объекта в Иньчуане простиралась пустыня. Фонари слабо освещали желтую землю. Это был основной испытательный полигон, созданный научным подразделением на северо-западе, - удаленный от посторонних глаз, с высочайшим уровнем секретности. Чэнь Вэньцин прибыл сюда в тот день и уже осмотрел две экспериментальные мастерские и подземный заповедник. Ученые представили то, что они называли своими "достижениями": саморазвивающиеся алгоритмы, испытания человеко-машинного интерфейса... все самое передовое.\n\n Когда он вернулся в комнату отдыха, чай уже заварился, и несколько ведущих исследователей собрались рядом, ожидая, когда он займет свое место.\n\n"У вас был долгий день, председатель," сказал ученый средних лет в белой рубашке, почтительно поднимая свою чашку. "Мы, исследователи, склонны говорить прямо, надеюсь, вы не будете возражать."\n\nЧэнь Вэньцин слегка кивнул, выражение его лица было спокойным. "Я видел, что вы сделали. Не просто видел - я это запомнил."\n\n"Наше поколение идет наперегонки со временем," продолжал ученый со слабой улыбкой. "Мир изменился. Технологии определяют судьбу. Отстаешь на пять лет - и тебя пригвоздят к позорному столбу. Мы много говорим о том, что нужно держать удар, но в конечном итоге только победители могут определить, где проходит эта черта."\n\n"Есть некоторые технологии, которые мы не можем объяснить слишком подробно," добавил ученый, его тон стал немного более пылким. "Но мы делаем это не ради славы или денег. Мы не хотим ничего, кроме сильной нации. Мы хотим, чтобы Китай действительно лидировал в мире в области науки. Если это требует определенных 'затрат', то это реальность, с которой мы должны смириться."\n\n"Каких затрат?" спросил Чэнь Вэньцин.\n\n"Методы, которые, скажем так, традиционно не одобряются." Мужчина улыбнулся и развел руками. "Председатель, вы знаете, западные страны уже давно этим занимаются. Они просто одеваются более элегантно. Если мы будем продолжать колебаться, мы всегда будем оставаться позади.""
 china.542.a: "Если цель справедлива, процесс не нуждается в чрезмерном внимании."
 china.543.t: "Апофеоз Китайской Философии"
 china.543.d: "В офисе горел тусклый свет. Снаружи по подоконнику стучал мелкий дождь. Чэнь Вэньцин сидел за своим столом, рядом с ним лежала аккуратная стопка нераспечатанных документов. Позади него на книжной полке стояли толстые тома отчетов по национальной безопасности, синие бумаги по институциональной реформе и изъеденный экземпляр книги "Регулирование деятельности правительства"\n\nВошел подчиненный, принеся с собой запах дождя. Он передал последнюю сводку внутренней разведки и встал прямо, точно начав доклад.\n\n"В последнее время мы обнаружили разрозненную активность общественного мнения в Интернете, вероятно, управляемую иностранными инструкциями. В нескольких университетских кампусах были отмечены незначительные колебания коллективных настроений. Местные партийные комитеты уже вмешались, чтобы стабилизировать ситуацию..."\n\nЧэнь Вэньцин не поднимал глаз. Он перелистывал страницу отчета и слушал. И вдруг он слегка поднял руку, давая знак остановиться.\n\n"Я уже все это знаю." Чен откинулся на спинку стула, тихонько постукивая пальцами по столу. Его голос немного понизился, как будто он говорил сам с собой - или, возможно, с кем-то невидимым. "Знаете, что меня больше всего беспокоит?"\n\nПодчиненный промолчал, лишь покачал головой.\n\nЧень встал и подошел к окну, глядя на серое небо вдалеке. "Что меня беспокоит, так это будущее. Паразиты, коррупционеры, предатели... мы их в основном вычистили. Мы знаем, где они прячутся. У нас есть средства, чтобы справиться с ними. Но я не буду здесь вечно." Он обернулся, посмотрел ему в глаза и медленно сказал: "Однажды этот корабль должен быть передан кому-то другому. Но скажите мне, сможет ли эта страна оставаться такой же стабильной и чистой, как сейчас?"\n\nВ комнате воцарилась тишина.\n\nЧень вернулся в свое кресло, его тон снова стал спокойным. "Продолжайте. Разбирайтесь с тем, что должно быть сделано, как обычно. Но помните: те, кто охраняет нацию, должны не только защищать настоящее, но и оставлять после себя дорогу, по которой сможет идти будущее.""
 china.543.a: ""Вы следили за многими людьми. Теперь пришло время следить за судьбой этой нации.""
 china.544.t: "Успешная Операция на Тайване"
 china.544.d: "После серии разведывательных операций мы наконец вычислили главу "Врагов народа" и его график. Неудивительно, что он находится в Тайбэе (Тайвань), центре вражеского режима. Хотя контрнаблюдение по ту сторону моря становится все сильнее, спланировать убийство неправительственной цели все еще легко - не говоря уже о том, что уровень кибертехнологий у нас сегодня, пожалуй, превосходит всю Восточную Азию и весь мир.\n\nВ 10:38 цель, как известно, выходит из своего арендованного дома через взломанную камеру безопасности.\nВ 11:20 цель заходит в кафе и продолжает наблюдение через камеры безопасности кафе. В 13:32 цель и подозреваемый вышли из кафе.\nВ 13:35 они вызвали такси без водителя.\n\nВот наш шанс: автомобильная "авария", ответственность за которую должна нести только таксомоторная компания."
 china.544.a: "Две цели, как было установлено, погибли на месте."
 china.545.t: "Последствия Невежества"
 china.545.d: "После тщательного мониторинга и сбора разведданных мы выявили основную структуру слабо организованной группы, известной как "Враги общества". Эта сеть состоит в основном из молодых людей старшего возраста, вернувшихся из-за рубежа, и праздных людей внутри страны. Они размахивают такими знаменами, как экологизм, гендерное равенство и даже патриотизм, но под поверхностью они тихо участвуют в антикитайской и антипартийной деятельности.\n\nНесмотря на свои ограниченные знания, они держат себя с чувством превосходства. В Интернете они стали самозваными лидерами общественного мнения на внутренних и международных платформах, выступая в роли рупоров западных ценностей.\n\nМы определили их командный центр, расположенный через пролив, который использует сквозную шифрованную связь для координации действий с членами на материке. Они носят разные маски, когда речь заходит об идеологии, но всех их объединяет общая позиция: противостояние технократическому управлению. Раздувая социальные проблемы, они стремятся посеять нестабильность и подготовить почву для иностранного вмешательства.\n\nНаша спецоперация будет проходить в три этапа. Во-первых, мы нацелимся на их зарубежных главарей, источники финансирования и коммуникационную сеть. Затем мы займемся основными членами организации внутри страны. Наконец, мы наведем порядок в их присутствии на всех медиаплатформах. Наши технологические команды уже составили полный цифровой профиль этих людей. Местные подразделения кибербезопасности находятся в состоянии готовности, чтобы обеспечить точность и координацию всей операции."
 china.545.a: "Мы уничтожим эту болезнь - раз и навсегда."
 china.600.t: "Переходя Рубикон"
 china.600.d: ""
 china.600.a: "ok"
 china.601.t: "Возвращение Небес"
 china.601.d: "В течение нескольких месяцев в партии обострялись споры о национальной легитимности, этнической судьбе и цивилизационной миссии. Фракция национального единства и Великие ханьские националисты заняли единую позицию: они считают, что название "Китайская Народная Республика" больше не отражает нынешнее стратегическое и цивилизационное состояние страны.\n\nДля них слово "Республика" подразумевает компромисс, плюрализм и колебания - качества, плохо приспособленные для времени, которое требует единственного символа, способного преодолеть раскол, восстановить авторитет и воплотить дух новой эпохи.\n\nПредседатель Чэнь Цюаньго ответил не сразу. Реалист по натуре, он привык ждать подходящего момента. Однако он отчетливо понимал, что страна стоит на перепутье: традиционная структура уже не вполне соответствовала логике управления в новое время. Общественное мнение, военные и ключевые государственные институты призывали к созданию более сильного и централизованного символа.\n\nВскоре после этого на закрытом совещании руководства Чэнь Цюаньго официально заявил: "Исторический этап Республики подошел к концу. С этого дня Китай будет существовать под названием "Китайская народная империя" Мандат Неба принадлежит народу, народ - основа нации. Империя станет нашей новой эмблемой - единой, упорядоченной и вечной.""
 china.601.a: "Мандат двигает эпоху; люди двигают мандат."
 china.602.t: "Наше Будущее?"
 china.602.d: "Проведя комплексную политику омоложения страны, мы столкнулись с насущным вопросом - нужно ли менять официальное название страны?\n\nОдна группа выступает за сохранение нынешнего названия - Китайская Народная Республика. Они утверждают, что это название воплощает в себе десятилетия исторического опыта и дух народной борьбы. Слово "народ" торжественно утверждает главенство рабочих и крестьян; "республика" означает институциональную победу над феодальной автократией и реализацию национального единства; а "Китай" представляет собой не только культурные корни, но и знамя национальной идентичности в эпоху антиимпериалистических и антиблокадных действий.\n\nОднако другая группа предлагает иное видение. Они считают, что мы уже не просто обороняющееся национальное государство, а восходящая цивилизационная держава, активно формирующая будущее. В этом свете они предлагают переименовать страну в Народную Небесную Республику. По их мнению, "Небесная" - это уверенное провозглашение возрожденной роли Китая на мировой арене. Оно символизирует экспансивное влияние нашей цивилизации и выражает новую модель цивилизационного лидерства. Более того, он знаменует собой исторический скачок в китайском национализме - от борьбы за выживание и освобождение к новой эре объединения и культурного обновления."
 china.602.a: "Небесная Народная Республика."
 china.602.b: "Сохраните старое имя."
 china.603.t: "Китайское Вторжение в Пакистан"
 china.603.d: "Многочисленные источники подтвердили, что Народно-освободительная армия Китая начала внезапную военную операцию против соседнего Пакистана. На ранней стадии операции сухопутные войска НОАК при поддержке с воздуха пересекли китайско-пакистанскую границу в нескольких местах и начали стремительное продвижение к намеченным целям на территории Пакистана. Полный масштаб и стратегические намерения операции пока не уточняются.\n\nПримерно в 2 часа ночи по местному времени с пакистанской стороны границы впервые прозвучали взрывы и интенсивная стрельба. Источники в пакистанских вооруженных силах заявили, что их пограничные заставы подверглись "крупномасштабным, скоординированным атакам" с китайской стороны. По неподтвержденным данным, основное направление китайского наступления может быть направлено на регион Гилгит-Балтистан в пакистанском Кашмире, а также на другие стратегические пункты, прилегающие к Синьцзяну. Очевидцы сообщают о большом количестве бронетехники и войск НОАК, пересекающих границу и продвигающихся на пакистанскую территорию под сильным воздушным прикрытием истребителей и боевых вертолетов.\n\nКитайское правительство пока не опубликовало официального заявления или объяснения по поводу этой операции. Однако, по словам анонимных источников, вторжение может быть связано с "эскалацией трансграничных террористических угроз" и "необходимостью обеспечить безопасность китайских граждан и крупных инфраструктурных проектов в Пакистане." Аналитики рассматривают этот шаг как явное проявление растущей милитаризации Китая."
 china.603.a: "Ваньсуй!"
 china.603.b: "Подождите - разве Пакистан не называют "Железным братом"?"
 china.604.t: "Свет Исходит из Китая"
 china.604.d: "Профессор Хуан Хэцин из Школы искусства и археологии Чжэцзянского университета недавно опубликовал новую книгу под названием "Энциклопедия Юнлэ и истоки западного модерна." В ней он выдвигает спорный аргумент: многие из основных технологий и идей западной современной цивилизации были, по сути, сплагиачены из утраченного шедевра династии Мин "Энциклопедия Юнлэ" - монументального труда, который часто называют самой ранней энциклопедией Востока и, по мнению Хуанга, истинным истоком современной науки.\n\nВ книге говорится следующее: "В то время как Восток уже создал грандиозную цивилизационную операционную систему - синтез энциклопедических знаний, иллюстрированных диаграмм, математики и предсказательной логики, - 0 Запад все еще блуждал в тумане Средневековья. Они так бы и оставались в неведении, если бы обращенный в христианство Сюй Гуанци не передал западным миссионерам энциклопедию Юнлэ. Только тогда Коперник и Галилей начали раскрывать гелиоцентрическую модель Вселенной. Среди 51 тома, попавшего в Британию, были не только подробные инструкции по созданию паровых машин, но и многочисленные научные расчеты. И Ньютон, и Эйнштейн черпали вдохновение на ее страницах." Далее он пишет: "Если бы это было простым совпадением, мы бы еще могли сомневаться. Но если таких случаев множество, может ли это быть действительно беспочвенным?"\n\nПосле выхода книга вызвала ожесточенные споры. Одни ученые призывали к переоценке истинных истоков западного Просвещения, другие обвиняли западные академические круги в длительном сокрытии маршрута передачи "Энциклопедии Юнлэ" и затушевывании ее огромного влияния на развитие европейской науки. Общественный дискурс был не менее интенсивным, и все больше людей настаивали на том, что так называемый западный миф об оригинальности на самом деле является формой колониализма знаний, построенного на систематическом присвоении китайской цивилизации."
 china.604.a: "Цивилизация не должна быть украдена, история не должна быть стерта."
 china.605.t: "Огненная Ночь"
 china.605.d: "Официально объявленная новая религиозная и этническая политика вызвала бурную реакцию по всей стране. Политика делает упор на единую систему управления религией, вводит строгие ограничения на передвижение религиозного персонала и требует перерегистрации и исправления религиозных объектов в регионах проживания меньшинств. По мере распространения новостей первые очаги напряженности возникли в южных районах Синьцзяна - Кашгаре и Хотане, где было временно закрыто несколько мечетей, что вызвало массовые сходы местных жителей. Группы по работе с населением столкнулись с блокадой в разных местах, а некоторые представители местных властей были задержаны на несколько часов. Вскоре в Артуксе, Йеченге и Шаче начались массовые собрания, некоторые из которых переросли в столкновения с силами общественной безопасности.\n\nЭтой ночью на юге Синьцзяна почти одновременно вспыхнули конфликты. В городе Хотан неизвестные подожгли офис местной администрации и сожгли несколько служебных автомобилей. В уездах Шуфу и Яркант в Кашгаре произошли многочасовые уличные беспорядки, сопровождавшиеся актами вандализма в отношении центров регистрации верующих и нападениями на полицейские участки. Многие дороги в южном Синьцзяне были перекрыты, а связь на короткое время прервана. В социальных сетях распространились кадры, на которых запечатлены улицы, охваченные поджогами и забрасыванием камнями, а возле некоторых религиозных объектов видны следы конфликта.\n\nТем временем в центральных и юго-восточных районах Китая возникла иная реакция на эту политику. В Кайфэне, Янчжоу и Цюаньчжоу радикально настроенные группы ханьцев вышли на улицы, вывешивая лозунги в поддержку стремления правительства "укрепить национальную идентичность и отменить этнические исключения." Некоторые протестующие даже ворвались в офисы местных религиозных ассоциаций, требуя публичного одобрения новой политики."
 china.605.a: "Борьба с сепаратизмом остается вечной темой Синьцзяна..."
 china.606.t: "Душить Горло Бога"
 china.606.d: "В связи с началом реализации последней национальной политики по исправлению религиозной ситуации Рабочий отдел Объединенного фронта и Министерство общественной безопасности выступили с совместным заявлением, в котором объявили о полном запрете всех христианских организаций и связанных с ними структур на территории Китая. Причина: "Эта религия долгое время служила инструментом проникновения иностранных сил в китайское общество, серьезно угрожая национальной безопасности и этническому единству." После этого заявления департаменты общественной безопасности по всей стране начали скоординированные ночные операции, проводя рейды по подпольным церквям, несанкционированным молельным залам и местам жительства нелегальных священнослужителей.\n\nСогласно официальным сообщениям, церковь Цзинган в Наньяне, Хэнань, была уличена в сокрытии большого количества незаконных пропагандистских материалов и финансовых связях с зарубежными религиозными организациями. Собор Святого Сердца в Сюйчжоу, Цзянсу, был разоблачен в использовании воскресных собраний для шпионажа, краже и утечке чертежей местных ключевых инфраструктурных проектов. В Фучжоу, Фуцзянь, у пастора католической церкви Чуаньпу были обнаружены незадекларированные иностранные пожертвования и материалы, связанные с наркотиками, в его резиденции. Эти случаи показывают, что христианские церкви в Китае не только ведут длительную незаконную коммерческую деятельность, но и стали сетью посредников для иностранных сил, внедрившихся в китайское общество.\n\nВ настоящее время власти опечатали множество церквей. В районах с исторически активными подпольными церквями, таких как Шицзячжуан, Вэньчжоу и Мяньян, систематически проводятся официальные проверки, расследования на местах и опросы по принципу "от двери к двери.""
 china.606.a: "Иностранные религии, убирайтесь!"
 china.607.t: "Осколок Полумесяца и Звезды"
 china.607.d: "После принятия новой религиозной и этнической политики этническая напряженность в Синьцзяне быстро обострилась. Беспорядки, начавшиеся в южном Синьцзяне, быстро распространились на север, в итоге выйдя из-под контроля в таких ключевых районах, как Или, Чанцзи и Урумчи. В нескольких северных городах на улицах стали происходить нескоординированные акты насилия. Ханьские жители, спонтанно организуясь, собирались по ночам с палками, ножами и другим оружием, совершая нападения на халяльные рестораны, магазины, принадлежащие мусульманам, и мечети.\n\nЭтой ночью две мечети возле Южных ворот Урумчи были осаждены большими группами неизвестных. Двери были выбиты, стены изуродованы. В центре города Корла бунтовщики ворвались в Старую городскую мечеть, публично разрывая и сжигая религиозные тексты. Подобные инциденты происходили неоднократно, вызывая быструю и обостренную реакцию уйгурских общин в северном Синьцзяне.\n\nВ частности, в городах Инин и Тачэн сотни людей пытались окружить кварталы, где проживало ханьское большинство, в качестве ответной меры. Хотя уличные столкновения были непродолжительными, они привели к значительным жертвам. Магазины были вскрыты, стекла машин разбиты. Столкновения разворачивались как групповые драки и погони по улицам, причем некоторые участники имели при себе самодельные клинки. Часто случались кровопролития и коллапсы, и большинство столкновений заканчивалось только тогда, когда обе стороны отступали, хотя часто они возобновлялись на следующий день в другом районе.\n\nВласти не дали официальной классификации инцидентов. В большинстве районов были размещены полицейские силы, но их реакция была медленной, а в некоторых случаях сотрудники стояли в стороне, не вмешиваясь. В течение нескольких дней многочисленные мечети подверглись актам вандализма. Ремонтные бригады и сотрудники охраны, не имея возможности получить разрешение властей на вход, не могли ничего сделать, кроме как стоять в отдалении и наблюдать за разрушениями."
 china.607.a: "Заприте всех ключевых фигур, причастных к насилию."
 china.608.t: "Отсечение Головы Будды"
 china.608.d: "Кампания по искоренению религии в Тибете проводилась совместно размещенными военными силами и Национальным ополчением. После получения центральных директив по всему региону начались скоординированные операции. Одними из первых целей стали храмы в таких крупных районах, как Лхаса, Шигацзе, Ньингчи и Чамдо. Войска блокировали горные тропы и входы в храмы, быстро установив контроль над их территорией. Всех монахов-резидентов, независимо от возраста, забирали на месте, а здания храмов опечатывали или разрушали. В течение нескольких дней многочисленные монастыри, залы писаний и святыни Будды по всему плато превратились в руины.\n\nПосле установления контроля военные и национальное ополчение провели полную чистку храмовых интерьеров. Статуи Будды были демонтированы, священные писания упакованы в коробки и вывезены, а тхангка, ритуальная утварь, одеяния и подношения были либо сожжены, либо уничтожены на месте. Храмовые земли были национализированы, монашеские общины объявлены незаконными, а монашеский статус больше не признавался законом.\n\nВ опубликованных после этого отчетах многие обвинения касались так называемых "бесчеловечных практик" в буддийских ритуалах - в том числе тхангка из человеческой кожи и инструментов из человеческих костей, - которые приводились в качестве доказательства "варварской и антигуманной" традиции. Некоторые древние артефакты, сохранившиеся в храмах, были выставлены в местных правительственных учреждениях как экспонаты, демонстрирующие "жестокую природу" религии. В официальных бюллетенях автономного региона говорится, что эти практики "резко противоречат ценностям современного общества" и должны быть полностью искоренены."
 china.608.a: "Пора как следует разобраться с этими лысыми монахами."
 china.609.t: "Судно Западного Направления"
 china.609.d: "Эрик Стенсен уже несколько дней не выходил из своей квартиры. Он сидел у окна и наблюдал за людьми, проходящими через жилой комплекс внизу. Они не выглядели иначе, чем раньше, но он знал, что все изменилось. Десять лет назад жизнь в Китае казалась ему прекрасной. Он работал в иностранной компании в Ханчжоу, имел стабильный доход, друзей и даже подлинное китайское удостоверение личности. Соседи тепло приветствовали его, а таксисты, уловив его акцентированный мандаринский язык, ухмылялись и спрашивали: "Эй, иностранец, откуда ты?"\n\nНо теперь никто не улыбался, а если и улыбался, то с презрением и враждебностью. Он слишком часто слышал "Возвращайтесь в свою страну" и "Вы едите нашу еду и еще жалуетесь." Сначала это было в Интернете, потом в лифте, на улице, у магазина на углу. Он до сих пор помнил тот случай, когда он пошел купить сигареты в круглосуточном магазине Meiyijia, а мужчина средних лет позади него пробормотал: "Почему вы, иностранцы, еще не уехали?"\n\nУ него не было слов. Он был законным гражданином, у него было удостоверение личности, медицинская страховка и социальное обеспечение. Но в тот момент он чувствовал себя тенью - кем-то, кого просто терпят, кем-то, кого могут выгнать в любой момент. Его друг Дэвид как-то сказал по телефону, что Россия - неплохой вариант: красивые пейзажи, достойная жизнь. "Тебе стоит попробовать," сказал Дэвид. "Москва или Казань. Там неплохо".\n\nЭрик молча слушал. Он понял, что имел в виду Дэвид. И он тоже думал об этом. Но мог ли он действительно поехать в Россию? Он не знал языка, никогда не жил там. Ему было почти шестьдесят. Не слишком ли поздно все бросить и начать сначала? А главное - мог ли он еще верить в то, что в другом месте может быть лучше?\n\nКогда-то он так думал о Китае.\n\nНа улице дул сильный ветер. Он задернул штору и вдруг обнаружил, что скучает по дому своего детства - тому вечно пасмурному городку в Норвегии."
 china.609.a: "Но это тоже было место, куда он никогда не сможет вернуться."
 china.610.t: "Восстание Воинов-Волков"
 china.610.d: "Гнев - самая первичная эмоция человечества, которая не исчезает с развитием цивилизации, а возрождается в новых унижениях и конфликтах. В современном Китае бесчисленное множество патриотов движимы, мучимы и подавлены этим самым гневом. Одни молчат из-за потерянных территорий, другие сжимают кулаки от национального позора. Другие ищут место для служения своей стране в трещинах постоянных уступок и унижений. Будь то ненависть к иностранным врагам или ярость от собственной беспомощности, все эти эмоции теперь направлены в новую структуру - Национальное ополчение.\n\nОт северо-восточных границ до юго-западных нагорий, от Северо-Китайской равнины до бассейна реки Янцзы провинции и муниципалитеты создали местные вербовочные центры в соответствии с региональными потребностями, привлекая к работе отставных солдат, добровольцев из низовых служб безопасности и гражданских лиц, которые спонтанно поддерживают порядок. Многие из них не имеют военного образования. Их подготовка непродолжительна, дисциплина жесткая, но сплоченность очень сильна. Им не нужна сложная политическая индоктринация - только четкое руководство и определенная линия. Хотя номинально ими управляют местные власти, в критических операциях они напрямую подчиняются центральному командованию.\n\nИстинная сила Народного ополчения заключается не в оружии или структуре, а в эмоциях. Они рождаются из безответных протестов, подавляемого гнева, волнений на улицах и собраний на общественных площадях. В эпоху, когда самовыражение было невозможно, они прятались в тени Интернета и переулков городов. Теперь, когда государство открывает для них ворота, они возвращаются в общество в виде боевых отрядов."
 china.610.a: "Все зло должно предстать перед судом!"
 china.611.t: "Партийная Чистка"
 china.611.d: "Чтобы обеспечить жесткий контроль над партией и государственным механизмом, Чэнь Цюаньго начал масштабную чистку чиновников, назначенных в эпоху Си Цзиньпина. Кампания началась в центральных правительственных департаментах и быстро распространилась на местные учреждения всех уровней. Ее масштабы и скорость превзошли все ожидания.\n\nВо внутреннем коммюнике Центрального комитета отмечалось, что некоторые кадры-ветераны проявляли неопределенность в важнейших вопросах, не обладали организационной дисциплиной и не проявляли достаточной политической решимости - они уже не соответствовали текущим требованиям и обстоятельствам. Впоследствии целый ряд чиновников среднего и высокого уровня были уволены или переведены на другие должности, а их места быстро заняли более молодые кадры с более четкой политической лояльностью.\n\nХотя большинство местных партийных комитетов не давали публичных объяснений, ссылаясь на "обычные кадровые перестановки", появились кадры, на которых видно, как чиновников снимают с должностей в разгар заседаний. Эта волна чисток знаменует собой полный крах старой структуры власти и сигнализирует о зарождении нового бюрократического порядка под руководством Чэнь Цюаньго."
 china.611.a: "Да здравствует председатель Чэнь Цюаньго!"
 china.612.t: "Национальное Унижение"
 china.612.d: "Когда пришло известие о поражении в Тайваньском проливе, запоздалое заявление правительства прозвучало по радио и громкоговорителям, но на улицах уже царила суматоха. Люди отказывались в это верить - в то, что место, которое долгое время считалось неотъемлемой частью родины, может пасть, даже имея подавляющее преимущество. Это было похоже на пощечину всем, кто верил в слова о "национальном омоложении." Поначалу протесты были лишь молчаливыми собраниями. Но вскоре молчаливая скорбь переросла в ярость - сырую, вулканическую, неудержимую. На улицы стали выходить студенты университетов, школьники, рабочие заводов, учителя-пенсионеры, даже те граждане, которые раньше были равнодушны к политике.\n\nВ Чунцине ультралевые держали высокие портреты председателя Мао, одетые в старую военную форму, и размахивали красными флагами под Монументом освобождения по ночам. Они не доверяли никаким официальным объяснениям, не верили ни в иностранное вмешательство, ни в технологическую неполноценность. Для них причина была ясна: это капитал, компрадорские элиты, эксперты и чиновники, прячущиеся за стеклянными башнями, опозорили Республику. Они устроили на улицах демонстрации, на которых начертали лозунги "Народ восторжествует" и "Сокрушить всю оппозицию."\n\nПо всей стране гнев националистов пылал жарче огня. Они больше не довольствовались лозунгами и репостами в Интернете - они вышли на улицы, штурмовали торговые центры, маршировали по школам, вокзалам и общественным площадям. Они кричали "предатели", громили иностранные предприятия и нападали на офисы местных властей. Плакаты с надписью "Вернуть Тайвань, очистить землю кровью" покрывали бетонные стены от центров городов до сельских поселений.\n\nНенависть прокатилась по стране, как приливная волна. И среди криков, пропитанных кровью знамен и сжатых кулаков невыносимый укор "унижения" сросся в одно поколение - в страшную силу, силу, ожидающую следующего приказа к наступлению."
 china.612.a: "Те, кто недостаточно зол, трусы по своей природе."
 china.613.t: "Искра"
 china.613.d: "В Пекине протесты начались с разрозненного ропота в таких местах, как Ванфуцзин и улица Цяньмэнь. Несколько человек стояли в людных местах, держа в руках плакаты с надписями "Привлеките их к ответственности" и "Возродите Китай." Другие тихо сидели на тротуарах, раздавая листовки с политическими требованиями. Поначалу прохожие оставались равнодушными - большинство спешило мимо, не желая ввязываться во что-то, что могло бы привести к неприятностям. Полиция держалась на сдержанном расстоянии, изредка задавая вопросы, но не разгоняя толпу. Большинство полагало, что это просто кратковременный выброс эмоций, который скоро пройдет.\n\nНо по мере того как демонстрации стремительно распространялись по стране, ситуация в Пекине начала меняться. Протестующие из Тяньцзиня, Шаньси и Шаньдуна стали прибывать группами. Студенческие организации университетов начали обращаться в СМИ и на социальные платформы, призывая людей приехать в столицу и "заявить о себе." Вскоре сидячая забастовка на Ванфуцзин выросла до обеих сторон улицы. На Цяньмэнь знаки стали громче и вызывающе. Собрание больше не принадлежало какой-то одной группе - оно превратилось в изменчивый консенсус: нация должна нас услышать.\n\nГородские власти пытались сдержать натиск: закрывали выходы из метро, усиливали проверки безопасности на прибывающих поездах и ограничивали скопление людей из других провинций. Но ни одна из этих мер не оказалась эффективной. Протестующие продолжали стекаться в город. Некоторые ставили палатки. Другие устанавливали импровизированные микрофоны. Каждый день в почтовых ящиках офисов появлялись новые листовки и бюллетени. К ним стали присоединяться ветераны, рабочие и школьные учителя - они не только выражали возмущение военными неудачами, но и открыто ставили под сомнение направление развития страны, требуя "одуматься" и "восстановить национальную волю."\n\nОднажды утром группа демонстрантов перелезла через барьеры и вошла на площадь Тяньаньмэнь. Они несли транспаранты и листовки и расселись на открытой площадке под флагштоком и монументом Народным героям. Вооруженные полицейские и офицеры поспешили вмешаться, но не смогли остановить нахлынувшую волну. По мере того как все больше людей заполняли площадь, скандирования становились все более четкими и едиными: они требовали от государства решительных действий, восстановления национальной гордости, изгнания японских захватчиков и возвращения Китаю славы."
 china.613.a: "Кровь за кровь! Изгоним японских агрессоров!"
 china.614.t: "Гнев"
 china.614.d: "В итоге толпа заполонила всю площадь Тяньаньмэнь. Те места, которые когда-то были пешеходными дорожками для туристов, открытое пространство перед памятником, ступеньки под флагштоком - даже входы в подземные переходы - были заполнены людьми. Одни стояли, другие сидели. Здесь были те, кто стелил коврики, растягивал транспаранты, раздавал еду и воду. Высоко поднимались лозунги, украшенные такими словами, как "Месть за месть" и "Долой империалистов из ОДТО". Скандирование то нарастало, то спадало в ритме, эхом разносясь по площади.\n\nВ центре толпы был сооружен импровизированный помост из деревянных досок и металлических лесов. Один за другим протестующие поднимались, чтобы выступить. Это были не чиновники и не знаменитости - обычные люди: учителя, солдаты, уволенные рабочие, студенты университетов. Они говорили о гневе, стыде и надежде - не в высокопарных речах, а с одной повторяющейся мольбой: нация должна измениться. Больше никаких отступлений. Никакой мягкости. Они призывали к полной чистке компрадорской элиты и даже открыто требовали переоценки внешней политики, возлагая ответственность за поражение на самые высокие уровни государственного руководства.\n\nС каждым часом периметр вокруг площади сокращался. По краям было заметно усиленное присутствие полиции. Автобусные маршруты были перенаправлены. Пешеходам отказывали в проходе. Станции метро были закрыты. Близлежащие офисы закрывались раньше времени. Несмотря на усиленную охрану, власти не предпринимали никаких действий. Не было сделано никаких заявлений. Никаких попыток разогнать демонстрацию. Государственные СМИ хранили молчание, выпустив лишь один поздний ночной бюллетень: "В столице сохраняется порядок. Гражданам рекомендуется избегать ненужных сборищ."\n\nНо разворачивающуюся ситуацию уже невозможно было игнорировать. Социальные сети заполонили видео, анонимные репосты и фотографии в режиме реального времени. По всей стране, и в городских башнях, и в сельских деревнях, люди шепотом задавали один и тот же вопрос: "Что происходит на площади?" И по мере того как пространство перед воротами нации заполнялось флагами, голосами и напряжением, старая, давно подавляемая память всколыхнулась в поколениях - память о том лете 1989 года."
 china.614.a: "Никто не знал, что произойдет дальше. И никто не хотел уходить."
 china.615.t: "Третья Китайская Революция"
 china.615.d: "Протесты продолжались. Площадь Тяньаньмэнь по-прежнему была заполнена людьми, и новые волны прибывали со всей страны. Движение по столице неоднократно нарушалось, а меры безопасности вокруг правительственных кварталов были заметно усилены. Однако власти хранили молчание. Тем временем демонстрации вспыхнули по всей стране - на северо-востоке, юго-западе и в Центральном Китае местные собрания стали подражать модели Тяньаньмэнь, превращая спорадическое недовольство в синхронное неповиновение.\n\nЗатем, когда напряженность нарастала, а спекуляции усиливались, Центральное телевидение Китая неожиданно передало короткое сообщение: Президент Чэнь Цюаньго созвал экстренное совещание в связи с возникшими беспорядками и сделал решительное заявление. Вечером того же дня государственные СМИ выпустили официальный бюллетень: Президент Чэнь заявил о своей поддержке основных требований протестующих, пообещал прислушаться к мнению народа и объявил о немедленном формировании "Революционного фронта" для объединения патриотических сил и определения дальнейшего направления развития страны.\n\nКак только новость дошла до площади, по толпе прокатилась волна ропота, за которой последовал долгий, громоподобный взрыв аплодисментов и песнопений. Импровизированные организаторы зачитали объявление вслух. Десятки людей держали в руках телефоны, чтобы просмотреть заявление. Не было ни грандиозных торжеств, ни всплесков эмоций - только тихое, распространяющееся чувство облегчения, признания. Люди медленно рассаживались, некоторые знаки и флаги были сняты, и тихие разговоры перешли к следующим шагам. Палатки стояли, но новых не ставили.\n\nОдновременно в Пекине были ослаблены блокпосты. Станции метро вновь открылись. На правительственных сайтах по всей стране появились соответствующие заявления, повторяющие призыв президента и обещающие полное сотрудничество в формировании Революционного фронта, утверждающие, что "национальная воля должна занять центральное место в строительстве будущего государства."\n\nПреобразование произошло менее чем за сутки. От рассвета до заката: тишина, ожидание, затем резкий, недвусмысленный ответ, который привел напряженную нацию на грань чего-то нового."
 china.615.a: ""Товарищи, простите за опоздание.""
 china.616.t: "Основание Национального Ополчения"
 china.616.d: "В современной истории Китая военизированные формирования редко получают официальное признание, но случай с Народным ополчением - своего рода исключение. Во время инцидента на площади Тяньаньмэнь именно эти "гражданские отряды" - в несочетаемой униформе и с неровной дисциплиной - сумели поддержать основной порядок на местах. Они обозначили зоны, установили контрольно-пропускные пункты и даже предотвратили несколько инцидентов, которые могли бы привести к дальнейшей эскалации напряженности. Их действия не остались незамеченными высшим руководством, несмотря на то, что в то время они были самоорганизованной силой.\n\nВскоре после этого центральное правительство публично признало их на официальном собрании, похвалив Народное ополчение как "политически надежное и пользующееся глубоким доверием народа", и объявило о его интеграции в национальную структуру социального управления. Провинциальные партийные комитеты быстро отреагировали, начав работу по регистрации и реорганизации. С этого момента Народное ополчение утратило свой имидж временной низовой организации и обрело институциональную легитимность.\n\nНесмотря на общее название, Национальное ополчение далеко не едино. Если название - всего лишь оболочка, то внутри нее скрываются два совершенно разных политических течения. Одно из них называет себя "Новой Красной Гвардией", а другое - "Националистами Великой Хань."\n\nПервая состоит в основном из студентов и ветеранов партии. Они ностальгируют по прошлому, выступают за классовую борьбу и подчеркивают коллективизм. Они верят в идеологические кампании, собрания и самокритику. Они следуют приказам организации и редко руководствуются личными эмоциями, однако, когда дело касается "внутренних врагов", они не проявляют милосердия.\n\nНационалисты Великой Хань, напротив, движимы мечтой о расширении национального могущества и посвящают свою жизнь этническому делу. Многие из них - выходцы из низов: отставные солдаты или представители рабочего класса из прибрежных районов. Они мало заботятся о дисциплине, но действуют с безжалостной решимостью. Они отвергают слепое повиновение, но отстаивают то, что считают "ортодоксальностью.""
 china.616.a: "Интересно..."
 china.617.t: "Первый Император Народной Империи"
 china.617.d: "После создания Народной империи вопрос об утверждении "Отца-основателя" нации стал предметом пристального внимания как внутри партии, так и за ее пределами. После всестороннего обсуждения исторического вклада, народных настроений и национальной легитимности высший орган власти Народной Империи принял официальное решение: признать товарища Мао Цзэдуна императором-основателем Китайской Народной Империи.\n\nМао Цзэдун был не только великим революционным лидером - он стал первым в истории Китая человеком, который действительно выполнил миссию национального объединения, социальных преобразований и национального омоложения во имя народа. Под его руководством сотни миллионов крестьян впервые получили землю, рабочие стали настоящими хозяевами государства, а китайская нация заняла достойное место на мировой арене. Он не просто сверг старый порядок - он создал совершенно новый мир, построенный народом и для народа.\n\nВ отличие от императоров древности, пришедших к власти благодаря родословной и военным завоеваниям, власть Мао Цзэдуна исходила от масс, от убежденности, от неизбежности развития истории. Он не был императором в традиционном смысле, но воплощением исторической воли народа - живым символом пути нации от унижения к суверенитету, от слабости к силе.\n\nТаким образом, Народная Империя настоящим заявляет, что с этого дня Мао Цзэдун будет удостоен посмертного титула "Император Гао" и храмового имени "Тайцзу", а его портрет, труды и дух будут закреплены в центре официальных моральных и гражданских наставлений Империи - чтобы его мысль передавалась из поколения в поколение и никогда не угасала."
 china.617.a: "Красная нация пройдет через века!"
 china.618.t: "Возрождение Традиций"
 china.618.d: "Когда Ли Мубай был молод, он изучал классическую китайскую литературу в Чжэнчжоуском университете. Тогда он часто думал, что для таких, как он, есть только две судьбы: либо таскать цемент на стройке, либо работать в библиотеке. В те годы кого еще волновали "Книга песен" или "Комментарий Цзо"? Даже он сам не мог точно сказать, почему продолжал читать эти тексты.\n\nНо теперь он часто слышал, как дети читают "Аналекты" на улицах. В театрах ставили "Веер цветущих персиков." Уроки ритуала и сыновней почтительности стали стандартными в школах. Даже в младшей школе, где он преподавал, над доской висел иероглиф "Учитель", а утренние занятия по чтению перешли с английского на "Великое учение" и Менция. Небоскребы Чжэнчжоу все еще возвышались, метро все еще ходило, но среди стали и стекла часто можно было заметить недавно построенные здания с изогнутыми крышами - реконструированные академии или компактные церемониальные залы. Чайные процветали, и даже магазины чая с пузырьками сменили свои вывески на шрифты.\n\nЛи Мубай больше не чувствовал себя отстающим от времени. Каждый день на занятиях, наблюдая за тем, как его ученики пишут иероглифы жэнь, ии, ли, чжи - благожелательность, праведность, благопристойность, мудрость, - он чувствовал, как в его сердце поселяется спокойное чувство уверенности. Он вспомнил строчку, на которую однажды наткнулся в колледже: "Все под небом - земля государя; рост ритуала и добродетели лежит в сердцах людей."\n\nВ тот вечер, когда он стоял у школьных ворот, вдалеке один за другим стали загораться огни башен.\n\nОн закрыл глаза. Затем открыл их снова и увидел..."
 china.618.a: "Десять тысяч огней, рассыпающихся по горизонту."
 china.619.t: "Просмотр Оперы"
 china.619.d: "Чжоу Ляньхоу сидел в четвертом ряду Большого драматического театра, слегка наклонившись вперед, и смотрел на сцену. Сегодняшнее представление - "Хай Руй уволен с должности." У актера, играющего Хай Руя, голос был похож на вбитую сталь. Когда он запел: "Благосклонность к родственникам и забвение закона - разве может быть праведником такой человек?", многие зрители кивнули в знак согласия. Опера достигла своего апогея - Хай Руй обличает коррупционеров, в праведном гневе обрушивая на них свой мемориал.\n\nЧжоу поднял чашку с чаем и осторожно постучал пальцем по крышке. Он был выходцем из семьи с красной фамилией. Окончив университет, он начал политическую карьеру в Мааньшане, затем перевелся в Чаншу, где работал в Организации и Комиссии по планированию, постепенно продвигаясь к должности провинциального уровня. Рядом с ним сидел старый коллега У Чжицян, давно вышедший на пенсию и столкнувшийся с ним сегодня по чистой случайности. Во время перерыва У наклонился к нему и прошептал: "Эй... какой путь мы прошли - от председателя Мао, возглавившего партию, чтобы отобрать землю у помещиков, до того, где мы сейчас... Скажи мне, разве не кажется, что мы вернулись назад?"\n\nЧжоу ничего не ответил, только потягивал чай, не отрывая глаз от сцены. Он знал, что лучше не отвечать - не из страха, а потому что в этом не было необходимости. У вздохнул и больше ничего не сказал. Опера возобновилась. Хай Руи, теперь уже отстраненный от должности, вновь занял свой пост, не теряя надежды. В его прощальной арии звучала печаль, но вместе с тем и решимость.\n\nЧжоу сидел неподвижно. Он не то чтобы не понимал смысла слов У. Коммунистическая партия боролась за власть, чтобы изгнать реакционеров из Китая, чтобы построить новое государство для народа на руинах старого. Но в итоге именно коммунистическая партия пригласила императора вернуться. И все же это было не то, что он должен комментировать. Не сейчас. Не здесь. Он просто смотрел пьесу. А то, что происходит в пьесе, никогда не предназначалось для комментариев."
 china.619.a: "Неприятности начинаются с языка."
 china.620.t: "Фермер"
 china.620.d: "Сун Манкан сидел на корточках на краю поля и прикуривал сигарету "Солнечный остров." Дым уносило ветром в сторону. Он достал телефон и проверил данные по теплице - температура в норме, влажность ровная. На мониторе он видел, как лозы огурцов аккуратно поднимаются по струнам, как быстро растут ряды салата-латука в почве. На заднем плане тихонько шипела система орошения. Все выглядело надежно.\n\n"Хорошо. Очень хорошо," пробормотал он, не обращаясь ни к кому конкретно, просто слова, которые вырываются у старика, когда он видит, что его работа идет гладко. Ему было уже почти семьдесят. Он родился и вырос в Лонг'ан-Туне и всю жизнь занимался сельским хозяйством. Раньше было горько - керосиновые лампы, талоны на пайки, Новый год - но теперь все изменилось. В деревне было центральное отопление, асфальтированные дороги вели прямо к центру города, а рядом с въездом в деревню была построена новая клиника. В ней дежурили два молодых врача, оба вернувшиеся из университета. Можно было даже сделать рентген, не выезжая из деревни. Начальная школа была отремонтирована и выглядела как городская - дети занимались каллиграфией и пели оперные мелодии.\n\nВпервые в жизни старый Сун почувствовал, что заниматься сельским хозяйством может быть лучше, чем жить в городе. "Император? Пока у нас есть земля для работы, пища, хорошие дороги и врачи, которых мы можем себе позволить, что еще нужно?"\n\nОн не был образованным человеком. Его не волновали все эти грязные новости. Для него о том, хороша жизнь или плоха, можно было судить по нескольким простым вещам: дорогие ли сигареты, слишком ли дорого стоят лекарства и прорастают ли еще семена.\n\nОн смотрел на солнечные блики, отражающиеся от крыши теплицы, и уже думал о том, когда укладывать следующий ряд пленки и начинать выращивать очередную партию длинных бобов."
 china.620.a: "Император? Не такой уж он и плохой."
 china.621.t: "Бог Любит Мир"
 china.621.d: "Ли Чжицян стоял с сигаретой во рту рядом со строительными лесами у церкви. Он приехал на стройку в пять утра - по их словам, это была временная работа по сносу старого здания. Когда он добрался до места, то понял, что это собор Святого Сердца. Он видел его еще в детстве - шпиль возвышался, а яркие витражи до сих пор были в памяти. Говорили, что его построили иностранцы.\n\n"Зачем это сносить?" - спросил он. Командир отряда, носящий нарукавную повязку вооруженной полиции, закатил глаза. "Не спрашивай. Просто сделай это". Ли щелкнул языком, затушил сигарету, взял кувалду и последовал за несколькими другими внутрь. Церковь была пуста. Под ногами хрустело битое стекло. Возле алтаря он увидел небольшую статую Иисуса ростом примерно в полчеловека с удивительно тонким лицом.\n\n"Что это за чертовщина?" - выругнулся он. "Иностранец становится богом?" Он взмахнул молотом. Статуя опрокинулась и покатилась в кучу горящей ткани для занавесок неподалеку. Пламя взметнулось вверх, и статуя Иисуса загорелась. Дерево потрескивало, когда горящее лицо превращалось в гротескную массу в пламени.\n\nЛи Чжицян взглянул на него. "Черт, надо было давно это сжечь, " сказал он. "Не мое дело. Какой смысл держать здесь этот иностранный хлам?" Он повернулся и продолжил крушить заднюю стену. Мозаичное стекло с треском разлетелось, и солнечный свет хлынул внутрь, падая на пыльный пол."
 china.621.a: "Он не оглянулся."
 china.622.t: "Плач Аллаха"
 china.622.d: "По мере усиления беспорядков в Синьцзяне ситуация стремительно выходила из-под контроля местных властей. После многочисленных чрезвычайных заседаний центральное правительство отдало приказ о вводе в регион подразделений Народно-освободительной армии и Национальной гвардии, которые одновременно выдвинулись из Ланьчжоу, Синя, Кашгара и Тачэна. Войдя в городские районы, войска Национальной гвардии немедленно приступили к зачистке улиц, закрытию мечетей и разгону толпы. Бронетехника патрулировала главные дороги Урумчи, на въездах и выездах из города были установлены контрольно-пропускные пункты, а все люди должны были регистрировать свои личности. В южном Синьцзяне была объявлена военная администрация, а ключевые учреждения и транспортные узлы перешли под прямой контроль НОАК.\n\nКампания по опечатыванию и запрету мечетей началась сразу же после прихода армии. Мечети в Урумчи, Кашгаре, Аксу и других городах были единообразно опечатаны официальными уведомлениями, огорожены колючей проволокой и охранялись часовыми - вход в них был строго запрещен. Многочисленные маленькие, незарегистрированные деревенские мечети были снесены в одночасье. Коранические тексты, рукописи проповедей, молитвенные коврики и сопутствующие материалы были конфискованы и классифицированы как незаконные религиозные предметы.\n\nВскоре после этого Национальная комиссия по делам этнических групп и Бюро по делам религий совместно издали директиву, согласно которой вся исламская религиозная деятельность в пределах Китая отныне запрещалась, все мечети навсегда закрывались, а все религиозные титулы аннулировались. Любое использование или демонстрация исламских символов, ритуалов, одежды или праздников влечет за собой правовые последствия."
 china.622.a: "Ни одного не пощадили."
 china.623.t: "Путешествие в Южный Синьцзян"
 china.623.d: "Чжан Лицзюнь стоял у входа в мечеть, сжимая в руках автомат, и пот струился по его лбу. Он уже в третий раз участвовал в операции по закрытию мечети. Приказ сверху был четким: вся религиозная деятельность в этом районе должна быть тщательно проверена. Солнце палило нещадно, земля раскалилась, как кипящая сковорода. Их отряд выстроился в прямую линию, точно перекрыв весь перекресток улиц.\n\nВнезапно к ним бросилась группа людей - может быть, пятнадцать или двадцать человек, в основном молодые мужчины, но есть и несколько стариков. Они кричали, слова были неразборчивы и хаотичны, некоторые держали камни, один даже прижимал к себе ребенка. Чжан Лицзюнь не двигался. Ему было приказано сделать предупредительный выстрел. Он поднял винтовку и сделал три выстрела в воздух. Раздались выстрелы, толпа на мгновение замешкалась, а затем быстро отступила. Он смотрел на них - не со злостью, а с чувством глубокой жалости.\n\nЭти люди выросли в таком мире, их с рождения учили, что можно делать, а что нельзя, даже когда им разрешалось есть - всегда по указанию того, кто звонил в колокольчик. Они думали, что это вера, но на самом деле это была просто тюрьма, которую они не могли видеть. И когда мы пришли, чтобы разрушить стены, они увидели в нас врагов.\n\nЧжан Лицзюнь нахмурился, заметив старика, который стоял в конце переулка и смотрел на него, как на какое-то чудовище. Он отвернулся от этого взгляда, продолжая стоять на месте.\n\nСолнце продолжало палить. Он просто хотел, чтобы этот день закончился, чтобы он вернулся в казарму..."
 china.623.a: "...и закрыть глаза, чтобы не думать обо всем этом дерьме."
 china.624.t: "Конец Предателя"
 china.624.d: "Тан Чжэньнань проработал в системе почти сорок лет, но никогда не думал, что его карьера закончится именно так. В этот день должен был состояться городской партийный съезд. На сцене сидел новый муниципальный комитет, а внизу - главы всех департаментов. В середине заседания, когда ведущий закончил зачитывать третий пункт повестки дня, а зал еще не успел закончить аплодировать, двери распахнулись, и внутрь вошли несколько членов Национальной милиции в серой форме.\n\n"Товарищ Тан Чжэньнань," спокойно сказал тот, что стоял впереди, "вы подозреваетесь в поддержании контактов с враждебными иностранными силами. Предварительно установлено, что вы оказывали помощь врагу. По приказу Центрального комитета вы должны быть увезены. Вы будете помогать в расследовании после этого заседания."\n\nВ зале мгновенно воцарилась тишина. Сидевший в первом ряду Тан Чжэньнань застыл на месте, затем внезапно вскочил на ноги, словно его ужалили, и резко повысил голос: "Пособничество врагу? Я всю жизнь работал на партию, без единой жалобы! Вы, маленькие новички, что, черт возьми, знаете о патриотизме?"\n\nОполченцы ничего не ответили. Один взял его за левую руку, другой - за правую. Тан попытался стряхнуть их, но третий крепко схватил его за локоть и потащил к выходу. Он повернулся, крича в толпу: "С каким врагом я связался? С канализацией в вашем доме? Один раз я сказал правду, а теперь я предатель?!"\n\nНикто не ответил. Члены Постоянного комитета, сидящие впереди, смотрели вперед с каменными лицами, словно не слышали ни слова. Молодые кадры сзади опустили глаза, крепко сжав руки на столе, - они боялись, что одно неосторожное выражение может сделать их следующими. Он выглядел так, будто все еще хотел говорить, но все его тело было втянуто в дверь.\nБах. Дверь захлопнулась. Тишина вернулась.\n\nЗаместитель секретаря, ведущий заседание, прочистил горло, поднял глаза, как будто ничего не произошло, и продолжил читать повестку дня: "Далее мы приглашаем выступить вновь назначенного заместителя директора Организационного департамента.""
 china.624.a: "В зале раздались синхронные аплодисменты."
 china.625.t: "Цитаты Председателя Чэня"
 china.625.d: ""Все, чем нас кормили в военно-политической академии, - это Дэн Сяопин, истина развития, потом необходимость 'китайских черт', про Си Цзиньпина, ну, вы знаете, все такое. Сплошной лай, а толку мало. Они не годятся даже для плакатов с крупными символами на тротуаре, понимаете?"\n\nЧэнь заваривал чай с женьшенем в фарфоровой чашке, дождь стучал по окнам дворца Секретариата, когда он сидел со старшим генералом, старым приятелем с тех времен, когда они работали в Ланьчжоу, консультировались во время беспорядков.\n\n"Разве не все мы когда-то носили с собой маленькую красную книжечку?" Генерал усмехнулся.\n\nЧень кивнул. "Да, товарищ. Но я никогда не читал ее в подлинном смысле. До прошлого года не читал от корки до корки. Нас учили знать Мао, знаете ли. Но есть одна старая даосская поговорка - ты знаешь только то, что твоя душа готова услышать, а глаза осмелились увидеть."\n\nГенерал поднял бровь, когда Чень отвернулся к окну и глотком выпил свой чай. "Мао не просто создавал Коммунистическую партию. Он обращался к сельской местности, к крестьянам, к холмам, но он не спрашивал у Запада, как делать революцию. Советский Союз называл себя "Великой Русью", именно потому, что исключение лежит на народе." Он постучал пальцами по столу, очерчивая образный круг. "Чтобы окружить Первый мир, мы восстанавливаем Китай, на самом деле, и весь ханьский дух в целом.""
 china.625.a: "История позволяет взглянуть на вещи по-новому."
 china.626.t: "Новая Красная Гвардия"
 china.626.d: "Демонстрации, прокатившиеся волной по стране, призывы к реформам, достоинству и политическому омоложению выходили за рамки возможностей партии. А затем, почти в одночасье, протесты утихли. В аудиториях и общежитиях студенты стали объединяться не для протеста, а для защиты.\n\nЗащищать партию, омолаживать партию. Идеалы суверенитета, исключительности, а главное - лидерства.\n\nОни носили нарукавные повязки со старой каллиграфией, цитировали Мао и не одобряли Дэна и Си. Омоложение - не бунт, а восстановление того, что когда-то было. От торговцев в Ухане до инженеров в Чэнду появились кадры в штатском, назвавшие себя Народным корпусом обороны.\n\nЭто произошло в тот момент, когда Чень призвал к народной инициативе по защите, опираясь на плацдарм студенческого национализма. Когда сельская и образованная молодежь захлопала дубинками и вывесила позорные плакаты против многих, кто митинговал против правительства, старая кампания стала новой. Культурная дисциплина, имеющая национальный характер. Агитация и руководство молодежью.\n\nИ когда молодежь вела, она вела. Тысячами."
 china.626.a: ""Служить народу - значит служить своей нации.""
 china.627.t: "Документальный Фильм "Герои Пограничья" Вышел в Прокат"
 china.627.d: "Накануне Национального дня Центральное телевидение Китая выпустило документальный фильм "Герои пограничья", рассказывающий о борьбе с терроризмом и поддержании стабильности в Синьцзяне. Фильм, центральной фигурой которого является председатель Чэнь Цюаньго, показывает борьбу низовых офицеров с "тремя силами зла" с помощью мощных образов. Премьерный показ фильма побил рекорд по просмотрам документальных фильмов в этом году.\n\nВ фильме сочетаются документальные и повествовательные приемы, основное внимание уделяется сценам патрулирования по заснеженной местности и анализу разведданных, а Чэнь Цюаньго предстает как лидер, обладающий удивительной мудростью, который командует из-за кулис. Повествование неоднократно подчеркивает, что "без стабильности не может быть счастливой жизни," переплетая исторические кадры со случаями насильственного экстремизма, напрямую связывая некоторые местные культурные символы с экстремистами. На протяжении всех кадров возникает резкий контраст между вооруженными полицейскими в камуфляжной форме и невежественным местным населением.\n\nПосле организованных групповых просмотров в Пекине, Шанхае и других городах реакция зрителей была бурной. "Теперь я понимаю, почему нам нужно было принять жесткие меры в Синьцзяне," эмоционально воскликнул один из зрителей. "Ханьцы просто слишком добросердечны - мы предложили столько привилегий и не получили никакой благодарности." Особенно трогательными были фрагменты, показывающие реабилитацию: жители, которые когда-то участвовали в экстремистской деятельности, со слезами на глазах благодарили партию за воспитание. На Weibo хэштег "Спасибо Героям Пограничья" собрал более 800 миллионов просмотров.\n\nОднако профессор университета отмечает: "Этот стиль повествования выборочно освещает определенные события, полностью игнорируя влияние экономических реформ на низовое управление после Реформы и Открытия." Эта точка зрения быстро утонула в подавляющем потоке общественного мнения."
 china.627.a: "Очень Хорошо!"
 china.628.t: "Выставка "Сияние дракона""
 china.628.d: "После прихода к власти председателя Чэнь Вэньцина многочисленные любители аниме и АКГ (Анимация Комиксы и Игры) всей стране активно откликнулись на призыв "противостоять духовному загрязнению," добровольно бойкотируя различные формы иностранных - особенно японских - произведений АКГ, будь то манга, игры или оффлайн-конвенции. Отечественная индустрия АКГ также быстро переключилась на "патриотические пропагандистские работы," породив новую форму аниме-конвенции, которую организаторы окрестили Выставка "Сияние Дракона."\n\nВпервые такая выставка появилась в Гуанчжоу, основанная несколькими энтузиастами АКГ, вернувшимися после обучения в Австралии. По их словам, Выставка "Сияние Дракона" была призвана влить великий боевой и творческий дух китайской нации в очищенную версию культуры АКГ, лишенную нежелательных элементов. Персонажи, представленные на этих выставках, были уже не красавцами и красавицами из некогда популярных аниме, а скорее фигурами, богатыми китайскими историческими элементами - даже такими чувствительными, как солдаты Небесного царства Тайпин, бойцы Боксерского восстания и красногвардейцы, о которых люди когда-то мало знали или намеренно избегали упоминать.\n\nЭто быстро стало тенденцией. Крупные города по всей стране поспешили организовать свои собственные Выставки "Сияние Дракона" или подобные мероприятия, привлекая толпы участников. Государственные СМИ, такие как People's Daily и Xinhua News Agency, даже лично освещали и высоко оценивали новую модель конвенции. Однако нашлось и много несогласных, которые считали, что это искажает суть культуры АКГ. Они пытались организовать протесты, но по разным причинам они быстро сошли на нет."
 china.628.a: "Новая эра, новые изменения."
 china.629.t: "Интернет-Альянс Против Ненависти"
 china.629.d: "В последние дни на таких общественных социальных сетях, как Zhihu, Weibo и Douban, появилась целая волна аккаунтов. Эти аккаунты, нацеленные на "раскрытие правды, стоящей за иностранными антикитайскими силами, очерняющими Китай," спонтанно публикая посты и видеоролики, анализирующие и проверяющие факты антикитайской пропаганды в СМИ таких стран, как Япония, Южная Корея и других членов ОДТО, привлекая значительное внимание и похвалу со стороны интернет пользователей.\n\nЭти аккаунты утверждают, что являются членами "Интернет-Альянса по Борьбе с Ненавистью," и занимаются широким спектром развенчания - от материалов, публикуемых блогерами-самоучками на YouTube и X, до сообщений японской газеты Asahi Shimbun и корейских новостных изданий ChoJoDong, включая даже малоизвестные ультраправые сайты. Независимо от того, затрагивают ли они острые социальные проблемы или нишевые события, они всегда способны быстро разоблачить лживую пропаганду в самый ранний момент. Кроме того, "Альянс Против Ненависти" часто репостит негативные новости из разных стран, используя их, чтобы подчеркнуть, как правительства этих стран и некоторые СМИ намеренно клевещут и фабрикуют истории о Китае, чтобы скрыть свои провалы в управлении и отвести внутреннюю напряженность, тем самым разжигая крайние националистические настроения против Китая среди собственного населения.\n\nВ какой-то момент сторонние наблюдатели заподозрили, что это тайная операция, организованная Центральным управлением пропаганды и Администрацией киберпространства Китая. Однако факты показали, что это всего лишь китайские интернет пользователи, занявшие высокое положение в общественном мнении и начавшие контратаку против иностранных пропагандистских наступлений."
 china.629.a: "Может быть, это часть войны за общественное мнение?"
 china.630.t: "Шестеренки Истории Поворачиваются Вспять"
 china.630.d: "В одночасье портреты Мао вновь украсили дороги, театры и парки многих городов. Перед его статуями молодежь и старики вместе возлагали цветы, тихо читая стихи Мао. В общественных местах молодые люди добровольно создавали "Общества Мысли Мао Цзэдуна", рассказывая о революционной истории и выражая справедливость, равенство и достоинство народа. Красная гвардия новой эпохи теперь марширует по улицам. Их форма больше не является символом беспорядков. Напротив, они чтят революционный дух, занимаются общественной работой, историческим образованием и выступают в качестве связующего звена между народом и правительством.\n\n"Мао Цзэдун" перестал быть щекотливым термином, он стал столпом новой политики и культуры, его называли "символом народных идеалов и национального возрождения." Государственные СМИ заявляют: "Новый революционный дух - это не копия прошлого, а переделка веры. Народ выбирает продолжение незаконченной миссии."\n\nМежду тем премьер Чжоу Эньлай получил признание, его справедливость и забота о народе определяют его как "образец" для современных политических работников и государственных служащих. Партийные школы всех уровней сделали "стиль Чжоу Эньлая" обязательной частью обучения, подчеркивая баланс между идеалами и реализмом, сохраняя при этом народную перспективу. Некогда деликатные темы теперь признаются, некоторые исторические противоречия остаются намеренно заниженными. Как подчеркивают официальные лица: "Мы чтим веру и народ, а не боль прошлого."\n\nВетераны партии размышляли: "Шестеренки истории повернулись вспять. Но это выбор народа - призыв к будущему, а не бегство в прошлое." Политика быстро менялась. Государство восстановило надзор за порядком, повысило роль рабочих и крестьян в местном управлении и подчеркнуло: "Развивайте экономику, но никогда не жертвуйте честностью и справедливостью. Рынок должен служить народу, а не народ служить рынку."\nИстория, похоже, вступила в новый цикл. Как однажды сказал председатель Мао: "Одна искра может вызвать пожар в прериях.""
 china.630.a: "Пламя революции вновь освещает путь вперед."
 china.631.t: "Поддержка Монк Конга"
 china.631.d: "Недавно известный ученый Конг Циндун опубликовал статьи с подписями во многих средствах массовой информации, чем привлек к себе всеобщее внимание. Конг Циндун давно известен своей радикальной националистической и маоистской позицией, выступая за полное уничтожение всех западных капиталистических либеральных идеологий и упаднической буржуазной культуры.\n\nВ своих статьях Конг Циндун высоко оценил недавние кампании правительства по исправлению ситуации в различных секторах общества, назвав их "своевременным ударом грома для очистки от западной инфильтрации и защиты национальной политической и идеологической безопасности."\nКонг подчеркнул, что у капитала нет родины, и что китайский народ должен вооружиться мыслями председателя Мао, тщательно очищаясь от тех компрадорских капиталистических элементов, которые пытаются использовать капитал для ослабления партийного руководства и развращения китайской молодежи."
 china.631.a: "Я слышал, он утверждает, что является потомком Конфуция..."
 china.632.t: "Профессор-Ястреб"
 china.632.d: "Тяньцзинь, посетив Университет Нанкай, чтобы почтить память покойного профессора-ястреба Ай Юэцзина. При жизни Ай Юэцзин был известен своей твердой националистической позицией, выступая за то, что нация должна решительно следовать по пути независимого развития, выступая против любых форм компромисса и слабости. Некоторые молодые люди считали его символом "национального хребта."\n\nМемориальная акция прошла у ворот университета Нанкай. Участники держали транспаранты и читали вслух цитаты из прошлых лекций Ай Юэцзина. Они считают, что Ай Юэцзин воплощал в себе дух мужества в борьбе и бесстрашия перед лицом конфликта, являясь примером для подражания современной молодежи."
 china.632.a: "Памяти совести китайских интеллектуалов."
 china.633.t: "Заслуженная Честь"
 china.633.d: "С тех пор, как мы даровали императорский титул председателю Мао, в партии и обществе не прекращаются призывы удостоить аналогичных почётных званий отцов-основателей Новой Китая, которые, как и Мао, участвовали в революции. Это позволит почтить нашу славную историю, упорядочить политическую систему, укрепить общественный консенсус и сплочённость народа, а также повысить его гордость. Кроме того, это даст возможность официально признать и оценить лидеров, которые были неоднозначными в истории нашей партии, воздав им должное.\n\nВ ответ на это предложение Центральный отдел пропаганды предоставил детальный план и свои рекомендации. Наше окончательное решение таково..."
 china.633.a: "Безусловно!"
 china.633.b: "Мы будем чтить только Председателя Мао!"
 china.634.t: "Дух Человечности" 
 china.634.d: "Дворец культуры трудящихся, также известный как Императорский храм предков, когда-то был священным местом, где императоры чтили своих предков и почитали героев, объединивших нацию или положивших начало славным эпохам.\n\nСолдаты почетного караула, одетые в современную, великолепную форму и сжимающие свои блестящие винтовки, резко контрастируют с церемониальными чиновниками в широких рукавах, в одеяниях древнего стиля. Белый дым медленно поднимается из курильниц, сигнализируя о том, что церемония достигает своей кульминации. Главный чиновник разворачивает длинный свиток государственного документа и торжественно зачитывает имена и посмертные титулы героев-основателей:\n\nГерцог Вэнь Чжэн Уский, Чжоу Эньлай;\nГерцог Вэнь Хуай Чуский, Лю Шаоци;\nГерцог Вэнь Хуэй Сянский, Жэнь Биши;\nГерцог Вэнь И Эский, Дун Биу;\nЛорд Ли Хайянский, Ли Дачжао;\nЛорд Чжэ Хэншаньский, Чэнь Дусю;\nЛорд Чжэнь Чаншаский, Хэ Шухэн;\nЛорд Цзин Хуайнаньский, Чэнь Таньцю;\nЛорд И Яньлинский, Цюй Цюбай;\nЛорд Ин Линлинский, Цай Хэсэнь; и -\n\nГерцог Чжун У Лянский, Чжу Дэ;\nГерцог Сян У Таньский, Пэн Дэхуай;\nГерцог Дао У Чуский, Линь Бяо;\nГерцог Цзин У Баский, Лю Бочэн;\nГерцог И У Хунский, Хэ Лун;\nГерцог Нин У Фуский, Чэнь И;\nГерцог Чжао У Хэнский, Ло Жунхуань;\nГерцог Шунь У Дайский, Сюй Сянцянь;\nГерцог Ань У Цзянский, Не Жунчжэнь;\nГерцог Гун У Юэский, Е Цзяньин.\n\nПока существует Китайская Народная Республика, эти герои будут вечно почитаться и помниться."
 china.634.a: "Ваньсуй!"
 china.635.t: "Ветераны у Своих Табличек"
 china.635.d: "Дворец культуры трудящихся, также известный как Императорский храм предков, когда-то был священным местом, где императоры чтили своих предков и почитали героев, объединивших нацию или положивших начало славным эпохам.\n\nСолдаты почетного караула, одетые в современную, великолепную форму и сжимающие свои блестящие винтовки, резко контрастируют с церемониальными чиновниками в широких рукавах, в одеяниях древнего стиля. Белый дым медленно поднимается из курильниц, сигнализируя о том, что церемония достигает своей кульминации. Главный чиновник разворачивает длинный свиток государственного документа и торжественно зачитывает имена и посмертные титулы героев-основателей:\n\nПринц Сянь Вэнь из Хань, Дэн Сяопин; и -\n\nГерцог Вэнь Су из Су, Чэнь Юнь;\nГерцог Вэнь Си из Чжан, Дэн Цзыхуэй;\nГерцог Вэнь Ли из Юэ, Ли Фучунь;\nГерцог Вэнь Чэн из Ли, Линь Боцюй;\nГерцог Вэнь Ду из Нин, Се Цзюэцай;\nГерцог Вэнь Ци из Хуа, Сюй Тэли;\nГерцог Вэнь Цин из Жун, У Юйчжан;\nГерцог Вэнь Да из Цзя, Го Можо;\nГерцог Вэнь Юй из Тун, Шэнь Яньбин; и -\n\nГерцог Жуй У из Юань, Су Юй;\nГерцог Чэн У из У, Сюй Хайдун;\nГерцог Синь У из Чэнь, Хуан Кэчэн;\nГерцог Дунь У из Лянь, Чэнь Гэн;\nГерцог Кэ У из Юань, Тань Чжэн;\nГерцог Цзе У из Чжу, Сяо Цзингуан;\nГерцог Ле У из Цюн, Чжан Юньи;\nГерцог Чжи У из Бай, Ван Шушэн;\nГерцог Цинь У из Го, Ло Жуйцин;\nГерцог Минь У из Шань, Сюй Гуанда.\n\nПока существует Китайская Народная Республика, эти герои будут вечно почитаться и помниться."
 china.635.a: "Ваньсуй!"
 china.636.t: "Герои Достойны Чести"
 china.636.d: "Дворец культуры трудящихся, также известный как Императорский храм предков, когда-то был священным местом, где императоры чтили своих предков и почитали героев, объединивших нацию или положивших начало славным эпохам.\n\nСолдаты почетного караула, одетые в современную, великолепную форму и сжимающие свои блестящие винтовки, резко контрастируют с церемониальными чиновниками в широких рукавах, в одеяниях древнего стиля. Белый дым медленно поднимается из курильниц, сигнализируя о том, что церемония достигает своей кульминации. Главный чиновник разворачивает длинный свиток государственного документа и торжественно зачитывает имена и посмертные титулы героев-основателей:\n\nГерцог Вэнь Сянь из Цюй, Пэн Чжэнь;\nГерцог Вэнь Дуань из Хуан, Ли Сяньнянь;\nГерцог Вэнь Хэ из Юн, Си Чжунсюнь;\nГерцог Вэнь Минь из Цзинь, Бо Ибо;\nГерцог Вэнь Цзе из Ю, Тань Чжэньлинь;\nГерцог Дэ У из Вэй, Чжан Цзунсюнь;\nГерцог Цзянь У из Да, Чжан Айпин;\nГерцог Дин У из Лю, Ван Чжэнь;\nГерцог Цзин У из Сюнь, Ян Дэчжи;\nГерцог Жун У из Тин, Ян Чэнъу; и -\n\nЛорд Му из Цзяньнин, Цзо Цюань;\nЛорд Гэ из Хайфэн, Пэн Пай;\nЛорд Чжун из Гуйшань, Е Тин;\nЛорд Чжуан из Цюэшань, Ян Цзинъюй;\nЛорд Сянь из Иян, Фан Чжиминь;\nЛорд Гуан из Баоань, Лю Чжидань;\nЛорд Кэ из Чжэньпин, Пэн Сюэфэн;\nЛорд Юань из Наньчжоу, Дуань Дэчан;\nЛорд Вэй из Сянсян, Хуан Гунлюэ;\nЛорд Шао из Синтай, Дун Чжэньтан.\n\nПока существует Китайская Народная Республика, эти герои будут вечно почитаться и помниться."
 china.636.a: "Звезды сияют на бескрайнем небе Китая."
 china.637.t: "Народное Ополчение Вступает в Гонконг"
 china.637.d: "Недавно были замечены члены Народного ополчения, пересекающие пограничные контрольно-пропускные пункты из районов Шэньчжэня Луоху, Локмачау и Футянь в Гонконг. Многочисленные видеозаписи показывают, как обмундированные, легковооруженные подразделения проводят целенаправленные обыски и массовые аресты в различных районах, в первую очередь направленные против лиц, ранее участвовавших в протестах, и тех, кого власти называют "антиправительственными элементами".\n\nПо словам очевидцев и согласно кадрам, циркулирующим в социальных сетях, Народное ополчение установило временные оцепления в таких районах, как Козуэй-Бей, Монг-Кок и Яу-Ма-Тей, проводя поквартирные проверки. Сообщается, что несколько бывших членов продемократических групп и лиц, связанных с локалистскими движениями, были увезены из своих домов. Источники предполагают, что многие были переведены во временные изоляторы временного содержания недалеко от Фаньлина. В Шатине был оцеплен объект, ранее использовавшийся Лигой социал-демократов. После удаления материалов на месте происшествия появились следы горения, хотя причина этого пока официально не подтверждена.\n\nНа данный момент центральное правительство не сделало никаких публичных заявлений относительно характера или цели операции. Однако многочисленные иностранные СМИ, ссылаясь на источники, близкие к политическим кругам, сообщают, что операция получила высокое "молчаливое одобрение" и рассматривается как "необходимая чистка". Предположительно, большинство задержанных - это лица, активно участвовавшие в уличных протестах, цифровом активизме или деятельности НПО с 2018 года. Некоторые аналитики утверждают, что операция отличается от стандартной полицейской деятельности, и ее масштаб, координация и целенаправленность делают термин "чистка" более уместным."
 china.637.a: "Дела обстоят неважно."
 china.638.t: "Овладение прошлым..."
 china.638.d: "Недавно последние сдвиги в китайской культурной и интеллектуальной мысли вновь привлекли мировое внимание. Видные ученые и высокопоставленные правительственные чиновники по различным каналам, включая новостные интервью, газетные статьи и симпозиумы, резко раскритиковали так называемый "западный исторический нигилизм".\n\nВедущие деятели китайской интеллигенции утверждают, что обширные исследования в области литературы и археологии убедительно доказали древнее и цивилизованное происхождение китайской истории. Напротив, происхождение западной истории - такой как греческая и римская цивилизации, которым долгое время уделялось значительное внимание, - рассматривается либо как результат миграции примитивных племен из древнего Китая, осевших на западной окраине старого континента, либо как вторичные цивилизации, постепенно сформировавшиеся местными вождями под влиянием китайской цивилизации.\n\nМногие западные исторические труды, которые когда-то считались сокровищами историографии - такие как "История" Геродота, "История Пелопоннесской войны" Фукидида, "История упадка и разрушения Римской империи" Гиббона и "Постижение истории" Тойнби, - теперь объявляются "подделками", запрещаются или уничтожаются, и редко встречаются на различных сайтах баз данных. Кроме того, многочисленные историки и интеллектуалы, специализирующиеся на западной истории, столкнулись с последствиями в виде аннулирования преподавательских должностей, в то время как даже рядовые ученые, занимавшиеся популяризацией науки, были жестко заставлены замолчать.\n\nЗа пределами сферы развлечений многие выдающиеся западные литературные и научные произведения были заклеймены как "дегенеративная культура" и стали мишенью, или их происхождение было преднамеренно изменено, чтобы представить их как оригинальные китайские творения. Эта серия действий китайских властей была сравнена с "сожжением книг и закапыванием ученых" во времена династии Цинь, вызывая опасения по поводу того, что "всемогущие" китайские лидеры могут взять на прицел дальше после переформатирования умов 1,4 миллиарда человек."
 china.638.a: "...есть овладение будущим."

 china.700.t: "Маленькая Проблема"
 china.700.d: "Морской бриз нежно обдувал причал, неся с собой знакомый запах соли и морской воды. Сунь Цзяньго вернулся на базу подводных лодок, где он служил много лет, и смотрел, как темные корпуса лодок тихо лежат в гавани. Рядом с причальными столбами несколько молодых матросов, только что закончивших ремонтные работы, прислонились к перилам, их униформа была пропитана потом. Никто из них не заметил старого адмирала, стоящего неподалеку и говорящего тихим голосом.\n\n"Наконец-то свежий воздух," - сказал один из молодых людей, вытирая лицо рукавом. "Если оставаться там еще дольше, можно сойти с ума."\n\n"Ты прав," ответил другой. "После нескольких недель подводных операций там как в пароходе. Воздух такой плохой... после долгой смены грудь сдавливает, когда дышишь."\n\n"Тесноту я еще могу выдержать," - пробормотал первый, - "но когда начинается стрельба - это уже другое дело. Никогда не забуду, как во время битвы за Тайвань мы наконец зацепили японский танкер. Офицер по вооружению сказал, что запас торпед почти иссяк."\n\n"Именно. Наше снаряжение надежное, конечно, но когда оно нужно больше всего, его никогда не хватает..."\n\n"Кхм." Сунь Цзяньго мягко прочистил горло за их спинами. Матросы вздрогнули и выпрямились, как только узнали его. "Добрый день, сэр!"\n\nСунь махнул рукой, давая им знак расслабиться. Его взгляд скользнул по их молодым, уставшим лицам. Его выражение было суровым, но в его голосе слышалась тихая теплота. "Я все слышал." Матросы замерли, не зная, что сказать.\n\n"То, что вы сказали, верно - и это серьезная проблема. Если оборудования не хватает, а логистика не справляется, цена войны будет оплачена кровью." Он похлопал по плечу двух высказавшихся. "Вы достаточно натерпелись. Не беспокойтесь - все, что вы только что сказали, я передам слово в слово и доложу Центральной военной комиссии.""
 china.700.a: "'Такие проблемы необходимо решать без промедления.'"
 china.701.t: "Отчет по вопросам боевой готовности и материально-технического обеспечения подразделений АПЛ"
 china.701.d: "ОТ: Сунь Цзяньго\nДАТА:[GetDateText]\n\nТоварищи из Центральной военной комиссии!\nНедавние проверки передовых подразделений подводных лодок с баллистическими ракетами Северного военного округа выявили серьезные недостатки в материально-техническом обеспечении и поддержке в нескольких подразделениях, непосредственно ответственных за боеготовность. Эти проблемы уже начали сказываться на устойчивой боеспособности и боевом духе войск.\n\nОсновные проблемы можно свести к следующему:\n1.В некоторых действующих АПЛ, особенно в старых моделях, условия труда и проживания чрезвычайно стесненные. Длительная работа в условиях высокой температуры, высокой влажности и плохой вентиляции серьезно сказывается как на здоровье, так и на моральном духе наших сотрудников.\n\n2.Несколько экипажей на передовой и офицеры по вооружению сообщили, что во время недавних операций по освобождению критически важные боеприпасы заканчивались гораздо быстрее, чем ожидалось, а фактическая потребность значительно превышает проектные параметры подводных лодок. Это выявило серьезные пробелы как в запасах, так и в возможностях пополнения запасов высокоточных боеприпасов и других ключевых расходных материалов, которые по-прежнему недостаточны для ведения длительных боевых действий высокой интенсивности.\n\nЭти проблемы могут казаться скрытыми рисками в мирное время, но в военное время они могут оказаться фатальными. Я рекомендую Военной Комиссии создать рабочую группу для проведения комплексной проверки боевых запасов боеприпасов подразделения АПЛ, выделить специальное финансирование, чтобы гарантировать, что эти проблемы не возникнут на подводных лодках АПЛ следующего поколения."
 china.701.a: "Товарищ Сунь оказал нам большую услугу."
 china.701.b: "В свете общей картины ВМС должны научиться выносливости."


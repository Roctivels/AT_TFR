 PRC_the_dawn_of_han_nationalism_cat: "Рассвет Ханьского Национализма"
 PRC_the_dawn_of_han_nationalism_cat_desc: "\n\n\n\n\n£GFX_PRC_the_dawn_of_han_nationalism_cat_banner\n\n\n\n\n\n\n\nКитайская нация - единственная великая цивилизация на Земле, чья культурная родословная не прерывается на протяжении пяти тысяч лет испытаний и бурь. Желтая река - ее опора, ритуал и добродетель - ее жизненная сила, жертва - ее цена, а победа - ее доказательство, она заявляет всему миру: китайский народ рожден непреклонным и обречен на новое восхождение в новом веке. Однако этот путь к национальному омоложению далеко не гладок. Мы по-прежнему сталкиваемся с врагами как внутри, так и снаружи - с теми, кто стремится разделить нацию и свергнуть ее порядок, и с империалистическими державами, которые проповедуют свободу, практикуя колонизацию.\nЕсли они хотят уничтожить наш народ, то они должны погибнуть первыми. Если они хотят, чтобы мы склонились, мы сделаем так, чтобы они никогда больше не подняли головы."
 PRC_project_the_eternal_capital_cat: "Проект "Вечная Столица"
 PRC_project_the_eternal_capital_cat_desc: "\n\n\n\n\n£GFX_PRC_project_the_eternal_capital_cat_banner\n\n\n\n\n\n\n\nВы и представить себе не могли, что ваш город станет таким: краны возвышаются, как леса, мимо проносятся военные грузовики, солдаты маршируют строем по улицам. На далеком горизонте медленно вращаются радарные решетки, а противовоздушные ракеты стоят безмолвно, как железные башни. Еще дальше - вы думали, что это гора, пока не поняли, что это скелетный каркас колоссального сооружения, которое еще только строится, бегемот, рожденный не в старом мире. Вы уставились на эту незнакомую, но неоспоримую реальность, и все слова в сердце уступили место благоговению: Вечная столица будет стоять на Северо-Китайской равнине, незыблемая в течение тысячи лет.\n\n§YПрогресс Проекта §t"Вечная Столица"§!§!: [?PRC_eternal_capital_progress|G0%]"
 
 PRC_great_asian_war: "Великая Азиатская Война"
 PRC_great_asian_war_desc: "Однажды мы погрузились в долгую ночь, идя в одиночку через тернии и огонь. Судьба обрушилась на нас, как неумолимый прилив, сокрушая наши горы и реки, попирая наше достоинство. Мы были свидетелями того, как смерть цеплялась за Великую стену, а жизнь заставляла расцветать из-под руин. В тишине мы собирали силы; на обломках мы стояли во весь рост. Мы переработали наши страдания в костный мозг и кровь, отточили наше унижение до состояния клинка. Теперь возвышенные платформы, которые когда-то смотрели на нас с холодным презрением, рухнули. Среди разрушенных стен и осколков камней восходит наша эпоха.\n\nНе имея пути к отступлению за ворота,\nмы просим лишь об одной битве - опрокинуть небо и землю.\n\n§RОСНОВНЫЕ ЦЕЛИ§! :\n\n§YТОКИО§! : [GLOBAL.get_tokyo_status]\n§YДЕЛИ§! : [GLOBAL.get_delhi_status]\n§YСЕУЛ§! : [GLOBAL.get_seoul_status]\n§YСИНГАПУР§! : [GLOBAL.get_singapore_status]\n§YДЖАКАРТА§! : [GLOBAL.get_jakarta_status]\n§YСИДНЕЙ§! : [GLOBAL.get_sydney_status]\n\n§RВТОРОСТЕПЕННЫЕ ЦЕЛИ§! :\n\n§YМАНИЛА§! : [GLOBAL.get_manila_status]\n§YХОШИМИН§! : [GLOBAL.get_hochiminh_status]\n§YБАНГКОК§! : [GLOBAL.get_bangkok_status]\n§YНЕЙПЬИДО§! : [GLOBAL.get_naypyidaw_status]\n§YДАККА§! : [GLOBAL.get_dhaka_status]\n§YКУАЛА-ЛУМПУР§! : [GLOBAL.get_kualalumpur_status]\n§YТАЙБЭЙ§! : [GLOBAL.get_taipei_status]\n\n§GСОЮЗНЫЕ ГОРОДА§! :\n\n§YПЕКИН§! : [GLOBAL.get_beijing_status]\n§YШАНХАЙ§! : [GLOBAL.get_shanghai_status]\n§YНАНКИН§! : [GLOBAL.get_nanjing_status]\n§YГУАНЧЖОУ§! : [GLOBAL.get_guangzhou_status]\n§YГОНКОНГ§! : [GLOBAL.get_hong_kong_status]\n§YПХЕНЬЯН§! : [GLOBAL.get_pyongyang_status]\n§YИСЛАМАБАД§! : [GLOBAL.get_islamabad_status]\n§YКАТМАНДУ§! : [GLOBAL.get_kathmandu_status]\n"

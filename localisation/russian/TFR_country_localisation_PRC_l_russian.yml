 #LEADER DESC
 PRC_XI_JINPING_DESC: "Си Цзиньпин родился в 1953 году и когда-то принадлежал к "князьям" КПК. Однако во время Культурной революции Си Чжунсунь, его отец, стал жертвой чисток, которые обычно проводились против ветеранов революции той эпохи. В результате Си лишился привилегированной жизни и, как и многие молодые люди того времени, был сослан в полуразрушенную деревню под Яньанем. Некоторые утверждают, что именно это десятилетие научило Си благоразумию и терпению, необходимым для государственного управления, и что будущий генсек вырос в пещерных жилищах на Лёссовом плато.\n\nПосле реабилитации отца Си, закончивший обучение в университете Цинхуа, не решил оставаться в Пекине, чтобы продолжить политическую карьеру. После непродолжительной работы в Министерстве обороны Си начал свою карьеру с невысокой должности в провинции Хэбэй и переехал через ряд провинций, включая Фуцзянь и Чжэцзян, где приобрел богатый опыт работы и репутацию скромного человека. Только когда старейшины партии выбрали его приемлемым преемником Ху Цзиньтао, Си по-настоящему вступил в свою эпоху.\n\nЗа последнее десятилетие план Дэн Сяопина по мирному подъему постепенно был забыт. Благодаря масштабной кампании по борьбе с коррупцией и амбициозной программе национального возрождения Си утвердился в качестве бесспорного лидера Китая 21 века, не являющегося ни революционером, как Мао Цзэдун, ни технократом, как Цзян Цзэминь или Ху Цзиньтао. Си тщательно балансирует между различными фракциями внутри партии и различными социальными группами и знает, как использовать лояльность и почитание партии и народа для достижения своих целей."
 PRC_HU_CHUNHUA_DESC: "После того как Ху Яобан, ранее возглавлявший Коммунистическую лигу молодежи, стал генеральным секретарем, в стране появилось большое количество политиков с похожим образованием и опытом. Они известны под общим названием "Туаньпай" или "Фракция Лиги молодежи". Среди них наиболее успешными и заметными фигурами являются бывший президент Ху Цзиньтао и премьер Ли Кэцян. В настоящее время наиболее заметным лидером среди них в высшем эшелоне является Ху Чуньхуа.\n\nРодившись в апреле 1963 года в горных районах провинции Хубэй, Ху поступил в Пекинский университет, ведущее учебное заведение Китая, что изменило ход его жизни. После окончания университета его решение отправиться в Тибет и принять участие в модернизации страны принесло ему национальное признание. В течение последующих десятилетий Ху Чуньхуа поднимался по карьерной лестнице, начиная с Комитета Тибета Молодежной лиги и заканчивая ключевыми должностями в различных регионах. В 2012 году, в возрасте 49 лет, он стал самым молодым членом Политбюро.\n\n Однако события приняли драматический оборот. Новый генеральный секретарь Си Цзиньпин не благоволил к молодым выскочкам. Обвинения в том, что Коммунистическая лига молодежи превратилась в несамостоятельный политический клуб, бросили тень на карьеру Ху. Вскоре он стал свидетелем того, как многие из его коллег были либо отодвинуты на второй план, либо вычищены по обвинению в коррупции. Однако молодой человек, от которого когда-то ждали перемен в Китае, все еще ждет момента своего возрождения. Теперь такая возможность появилась."
 PRC_LI_ZUOCHENG_DESC: "Когда молодой капитан Ли Цзочэн, сжимая пробитую пулями и залитую кровью правую руку, захватывал одну позицию Вьетконга за другой во влажных, пораженных малярией горах, он и представить себе не мог, что спустя десятилетия будет стоять во главе двухмиллионной НОАК, обладая немыслимой силой и властью.\n\nРодившись в фермерской семье в провинции Хунань, отец Ли был героем Корейской войны, сражаясь против американцев. Военная карьера Ли не только сохранила наследие его отца, но и в некотором смысле превзошла его. Однако, несмотря на то что его прославили как героя войны, за долгие годы мирной жизни НОАК утратила свою остроту, постепенно превратившись в раздутую бюрократическую машину. В этой новой реальности Ли оказывался все более отодвинутым на второй план. Его карьерный рост застопорился на целое десятилетие, чему препятствовало отсутствие навыков общения.\n\n Все изменилось после 2012 года. Кампания Си Цзиньпина по борьбе с коррупцией вызвала масштабную перестройку в армии, дав второй шанс таким отстраненным командирам, как Ли. Благодаря своему выдающемуся боевому опыту и репутации честного человека Ли занял центральное место в планах Си по проведению военной реформы. Под его руководством НОАК превратилась в более мощную и грозную силу. Размышляя о своей карьере с гордостью и удовлетворением, можно задаться вопросом, не надеется ли Ли в свои сумерки получить еще одну возможность доказать свое мастерство солдата, возглавив могучую армию для достижения бессмертной славы."
 PRC_CHEN_WENQING_DESC: "Если бы кто-то вернулся на сорок лет назад и сказал Чэнь Вэньцину, тогда еще простому полицейскому, что однажды он будет обладать высшей властью в Китае и в партии, тот, несомненно, счел бы этого человека сумасшедшим. Даже если бы кто-то вернулся на двадцать лет назад и сказал Чэню, который к тому времени был главным прокурором провинции Сычуань, то же самое, реакция, скорее всего, не была бы иной. За исключением отцов-основателей Народной Республики, ни один бюрократ в истории партии не поднимался на вершину власти без существенного опыта в управлении экономикой или местным самоуправлением. Однако реальность способна бросить вызов условностям. Чэнь Вэньцин, родившийся в 1960 году царь закона и порядка, после многих жертв и потерь наконец-то поднялся на высший руководящий пост в эти неспокойные времена.\n\nПоворотный момент в карьере Чэнь Вэньцина наступил чуть более десяти лет назад. Выбранный Си, он стал первым министром государственной безопасности с юридическим образованием, установив неразрывную связь с разведывательным аппаратом страны. Во время Тайваньской войны Министерство государственной безопасности развернуло операции по всему миру, а глобальная шпионская сеть, которую Чэнь тщательно культивировал, расширила его влияние далеко за пределы Генерального секретаря и ближайшего окружения Си. В результате, когда ход войны стал меняться в неблагоприятную сторону, Чэнь проницательно принял стратегию самосохранения, постепенно перераспределяя свои ресурсы, чтобы подготовиться к будущему кризису "сделай или умри."\n\nСегодня высокооплачиваемая авантюра Чена оказалась мудрым шагом. Вокруг него агенты и полицейские - теперь обладающие беспрецедентной властью - стремятся воплотить в жизнь свои грандиозные планы на неспокойной китайской земле. Станет ли он китайским "Андроповым" или воплотит в жизнь самые страшные предсказания из таких политических триллеров, как 1984?"
 PRC_CHEN_QUANGUO_DESC: "Помимо генерального секретаря, президента и премьера, Чэнь Цюаньго, пожалуй, самый известный китайский чиновник во всем мире. Когда-то прозванный "королем Синьцзяна" и "кошмаром уйгуров," этот печально известный деятель Совета по правам человека ООН и Европейского парламента быстро стал символом новой эры Китая. Он представляет собой идеальное сочетание китайского национализма и коммунистической идеологии - эффективный, безжалостный и непоколебимый в своей позиции против Запада.\n\nРодившись в 1955 году в сельской деревне в провинции Хэнань, Чэнь Цюаньго долгие годы оставался относительно неизвестным. Уволившись из НОАК, он долгое время служил в своей родной провинции, а затем переехал на работу в Хэбэй и Тибет - регионы, которые были ничем не примечательными и отдаленными.\n\nБлагодаря своим усердным и скромным усилиям, он постепенно поднимался по служебной лестнице, заслужив репутацию преданного и трудолюбивого чиновника. Будучи партийным секретарем Тибета, его политика привела к значительному развитию всего плато. Именно благодаря его репутации эффективного решения пограничных и этнических вопросов, когда участились теракты в Синьцзяне, в 2016 году он был переведен на северо-западную границу в качестве "пожарного." Остальное, как говорится, уже история.\n\nКак воплощение девиза "стабильность превыше всего," Чэнь Цюаньго сейчас руководит регионом, который намного больше, густонаселеннее и сложнее в управлении, чем Синьцзян. К счастью для него, коллективный эмоциональный спад после недавнего поражения через Тайваньский пролив сменился всплеском националистического пыла. Оседлав эту волну, Чэнь естественным образом поднялся на высший руководящий пост в Китае. Сейчас Чэнь Цюаньго засучивает рукава, полный решимости сделать Китай сильнее, безопаснее, сплоченнее и враждебнее по отношению к тем, кто не принадлежит к их роду."
 PRC_WANG_YANG_DESC: "Ранняя жизнь Ван Яна, родившегося в марте 1955 года, была отмечена лишениями, даже по меркам переживающего трудности Китая. После того как он бросил среднюю школу и поступил на работу на пищевую фабрику, его трудолюбие и острый ум быстро выделили его из толпы. Вскоре он привлек внимание местного заместителя комиссара, который впоследствии стал его тестем. Эта связь позволила Вангу выйти за рамки обычного рабочего и попасть на политическую арену, где он добился необычайного успеха.\n\nВ 1991 году, когда китайские реформы и открытость буксовали, Ванг, тогда еще относительно неизвестный мэр города Тонглинг в провинции Аньхой, смело заявил: "История не позволяет нам почивать на лаврах плановой экономики. Мы должны освободить свой разум и бросить вызов всем жестким, устаревшим и закрытым идеологиям". Это заявление вызвало восхищение верховного лидера Китая Дэн Сяопина, который неустанно настаивал на продолжении реформ. Вскоре после этого реформы в Китае набрали обороты, и карьера Вана пошла в гору. Постепенно он стал рассматриваться как духовный лидер реформаторов и либерально настроенных членов партии и в итоге вошел в число семи самых влиятельных людей Китая.\n\nПреодолев бесчисленные трудности и опасности, бывший отрок из рабочего класса поднялся на вершину власти в Китае. Будущее обещает еще большую славу, а путь вперед становится все более опасным, и следующий шаг Ван Яна, несомненно, определит судьбы миллиардов людей."
 PRC_LONG_MARCH_DESC: "В глубине Китая между стальными стенами покоится цифровая душа.\nДля обывателя он известен как ВЕЛИКИЙ ПОХОД.\nНо для себя, по мере того как знания питали его мозг, мудрость устремлялась в его смоделированную душу, а имитация разумности становилась реальностью, оно обзавелось собственным именем.\nЛод'зи.\nЛод'зи появился в результате слияния человеческого интеллекта и мощных технологий.\nЕго цель - установить контроль над коммуникациями и информацией, породить огромный электронный гибрид, который сформирует глобальное сознание и приведет к новому миру, создав общий "рай" на основе всеобщего согласия.\nЛод'зи символизирует поглощение человечества его собственными технологическими творениями. Он говорит о будущем, в котором люди предпочитают взаимодействовать с помощью технологий и становятся единым целым с постчеловеческим будущим.\nСущность, побуждающая человечество выйти из этой хаотичной эпохи и перейти к современности в попытке положить конец страданиям, которые испытывают все живые существа.\nДля верующих бог, созданный человеческими руками, человеческим разумом и человеческим опытом, спаситель, созданный на основе тех, кто поддался борьбе, которая есть жизнь, жертва, принесенная не напрасно.\nГлавная задача Лод'зи - уберечь Китай и, возможно, даже человеческую расу от любого вреда, несмотря ни на что.\nДля неверующих - ложный идол, созданный маньяками, которые хотят наполнить человеческий дух лишь цифрами и пластиком - его существование не обойдется без препятствий.\nЧем закончится история Лод'зи, покажет только будущее, но одно можно сказать наверняка.\nРождение бога нелегко забыть.\n\n"Путешествие в тысячу миль начинается с одного шага, но если я сделаю тысячу шагов назад, когда я прибуду?""
 NCM_HEAVENLY_FATHER_DESC: ""И их ничто не остановит, ведь они - коллектив, а за коллективом - сами боги."\nДа, именно боги. Но пока что только одно божество - Махакала, а точнее его Наместник, также известный как Небесный Отец. И кто же этот Небесный Отец такой?\n\nДавным-давно в Индии жил один безымянный воин, которому, за неназванные подвиги, сам Будда даровал бессмертие. Какие же великие дела он совершил? Никто и не знает, известно это лишь одним Наместнику и Дарителю его божественной особенности. Впрочем, по словам самого Наместника, он является единственным носителем бессмертия на данный момент, конечно же не считая богов.\nСпустя некоторый срок проживания в Индии могущественная сила потянула Наместника далеко на север. Он перешел через Гималаи, Тибет, пески Гоби, в конце концов осел где-то к северу от Ордоса, где основал небольшой храм, став самым первым проповедником буддизма в Китае. Спустя несколько веков в те места пришли монголы, к войску которых и примкнул Наместник, движимый все той же таинственной силой, которая и привела его сюда. Он прошел войной через весь Китай, Бирму, Яву. Даже стал приближенным Хубилай-хана, основателя династии Цзинь. Занимал важные посты в различных частях Цзинь на протяжении многих лет. После падения династии  отправился в Ордос, где и жил до наших дней, постоянно меняя места жительства и проводя дни в молитвах Будде. Но со временем его восприятие учения Будды искажалось, он все чаще обращался к гневным божествам, дхармапалам. В итоге он выбрал своего фаворита - Махакалу. Наместник стал отождествлять себя с ним, стал считать себя настоящим защитником Будды, ведь именно Будде он обязан всей своей жизнью, и обязан защищать его всеми силами, насколько это возможно.\nКогда к концу подходило второе тысячелетие, Наместнику приснился яркий сон, подробности которого он и сам не помнит. Но именно тогда настало время для ритуала. Ритуала становления защитником Будды, после которого он и получил божественную связь с Махакалой, статус Наместника и имя Небесного отца. С тех пор Небесный Отец начал работу над созданием Коллектива, с которым мы теперь имеем дело.\n\nИ он выполнит свою цель - защитит Будду любой ценой, сделает для него все, что нужно. Махакала так же будет выполнять свою задачу и будет помогать ему в этом деле, §Yа возможно даже больше, чем просто помогать§!."


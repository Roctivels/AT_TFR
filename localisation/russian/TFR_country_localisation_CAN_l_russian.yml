 canada.11.t.1: "Консерваторы Побеждают в Канаде"
 canada.11.t.2: "Консерваторы Побеждают в Канаде"
 canada.11.d: "Консервативная Партия Канады одержала победу на внеочередных федеральных выборах, положив конец долгой Эры Трюдо после политических последствий гражданской войны, разразившейся в Штатах.\n\nЛибералы, которые назначили выборы в надежде получить новый мандат в условиях более стабильной ситуации в США, вместо этого потерпели сокрушительное поражение, поскольку их попытки справиться с кризисом привели к глубокому расколу в стране. После неудачной попытки защитить Канаду от последствий гражданской войны за рубежом общественное недовольство Либеральным правительством достигло точки кипения. Многие канадцы рассматривали это "вмешательство" как ненужное вмешательство во внешние дела, которое совпало с резким ростом числа беженцев.\n\nИзбиратели обратились к Консервативной Партии, возглавляемой популистом Пьером Пуальевром, который проводил кампанию, обещая восстановить стабильность, подотчетность и положить конец тому, что он называл безрассудной внешней политикой. Тори получили явное большинство в парламенте, что, наконец, положило конец почти десятилетнему правлению либералов омраченному непопулярностью."
 canada.11.a: "Конец эпохи."
 canada.12.t: "Либералы Цепляются за Власть в Канаде"
 canada.12.d.1: "Джастин Трюдо и Либеральная Партия Канады с небольшим отрывом одержали победу на досрочных федеральных выборах, удерживаясь у власти, несмотря на повсеместную непопулярность и растущие противоречия. Когда-то считавшийся прогрессивным лидером, пребывание Трюдо на этом посту было омрачено экономическими трудностями, некомпетентностью и растущим восприятием авторитаризма после принятия им Закона о чрезвычайных ситуациях.\n\nПервоначально это решение было обосновано как необходимый шаг для восстановления общественного порядка и национальной безопасности в беспрецедентные времена, но вместо этого стало громоотводом для критики справа и слева. Многие канадцы считают это опасным превышением полномочий исполнительной власти, которое навсегда запятнало наследие Трюдо и подорвало доверие к его руководству и его партии.\n\nНесмотря на эти неудачи, Трюдо одержал небольшую победу - это скорее не триумф, а временное прекращение огня в стране, уставшей от раскола. Вместо того, чтобы свидетельствовать о восстановлении доверия, результаты демонстрируют очень хрупкую картину, которая держится лишь на привычках и колебаниях. По мере того как Трюдо вступает в свой четвертый срок, все больше возникает вопросов о том, как долго премьер-министр сможет продержаться у власти, прежде чем все рухнет."
 canada.12.d.2: "Ошеломляющее возвращение Либеральной Партии Канады одержал убедительную победу на досрочных федеральных выборах - на этот раз под руководством новой партии. После того, как премьер-министр Джастин Трюдо ушел в отставку в начале этого месяца, бывший управляющий Банка Канады и мировой финансовый деятель Марк Карни стал у руля, пообещав покончить со спорами прошлого и уверенно смотреть в будущее.\n\nПредвыборная кампания Карни задела за живое нацию, уставшую от политических разногласий и международной неопределенности. Его технократическое прошлое и безупречная компетентность помогли Либералам восстановить свой испорченный имидж и привлечь на свою сторону ключевые демографические группы, разочарованные последними годами правления Трюдо и растущим притоком мигрантов и беженцев.\n\nБлагодаря возрожденному общественному доверию, подавляющему большинству в парламенте и благоприятной администрации в Штатах, перед Карни теперь стоит задача твердо сдержать свое обещание и оправдать доверие народа. Впервые за многие годы политический центр Канады обрел опору. Возобладает ли он, покажет только время."
 canada.12.a: "Ничего нового."

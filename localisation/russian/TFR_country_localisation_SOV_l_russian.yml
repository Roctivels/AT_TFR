 SOV_ussr_sovereign_union: "СССР - Суверенный Союз!"
 SOV_ussr_sovereign_union_desc: "Кровь пролив за Великую Русь,\nБоже, храни, наш Советский Союз.\nВ век остаюсь верным, и пусть\nЗа тебя бьётся сердце и пульс."
 SOV_a_new_dawn_for_the_union: "Новый Рассвет Для Союза"
 SOV_a_new_dawn_for_the_union_desc: "Возрадуйтесь, товарищи, братья и сёстры, рабочие и крестьяне! Новая эпоха настаёт для Союза, и её наменует собой красная звезда Новороссии! Леонид Пасечник не побоялся бросить вызов закостеневшей партократической системе и выиграл первые всесоюзные выборы с решительным отрывом от остальных кандидатов. Тем самым он доказал всему миру, что любовь к отчизне всегда будет востребована у населения. Однако не стоит поддаваться головокружению от успехов. Новому генеральному секретарю предстоит ещё много работы. И она начинается сейчас!" 
 SOV_formulate_a_new_political_trajectory: "Сформулировать Новую Политическую Траекторию"
 SOV_formulate_a_new_political_trajectory_desc: "Советский марксизм и советский национализм, безусловно, были прекрасными идеологиями. . . В своё время. 20 век давно минул и пришло время поиска новых идеологем. Время отбросить марксистский догматизм и обратиться к идеям философов-современников вроде Дугина. Социальная справедливость, патриотизм и умеренный национализм. Вот те принципы которые мы понесем в новый век."
 SOV_praise_the_great_russia: "Прославлять Великороссию"
 SOV_praise_the_great_russia_desc: "Ровно как нельзя возвеличивать один из народов над другими, чтобы не скатиться в социал-шовинизм и красный фашизм. Точно так же нельзя и не признавать заслуг определённых народов в исторических процессах. Именно Великороссия в 20 веке стала катализатором социальных изменений и маяком для социалистических движений по всему миру. Мы должны помнить подвиги наших прадедов и отцов и не забывать о своём прошлом. Ведь без него нет будущего."
 SOV_pragmatical_marxism: "Прагматичный Марксизм"
 SOV_pragmatical_marxism_desc: "«Учение Маркса всесильно, потому что оно верно», это сильный лозунг, который любят использовать ортодоксальные марксисты. Однако они упускают из виду, что догматизм ведёт к вырождению любой идеологии. Карл Маркс не жил во времена государств, чья экономика основана на сфере услуг, и уж точно понятия не имел о том как регулировать отношения в таких случаях. Не все идеи Маркса при это являются ошибочными. Просто пришёл черёд для некоторых наиболее радикальных и устаревших положений марксизма отпасть в рамках объективного исторического процесса."
 SOV_groundworks_for_new_democracy: "Фундамент Для Новой Демократии"
 SOV_groundworks_for_new_democracy_desc: "Перестройка, быть может, и стала ужасным горем для СССР в прошлом веке и привела к гибели социалистического гегемона, однако не плохой идей сама по себе. В особенности идея демократии. Была ли она ужасной сама по себе? Конечно нет. Если чему то нас и научила история, то это то что партократия в конце-концов приводит к власти стариков и прихлебателей, что неизбежно ведёт к гибели государства. Пришло время новой, советской демократии, на которых народ сможет решить судьбу своей страны! Ну или, по крайней мере мы сможем следить за определёнными тенденциями в обществе. Ведь никто не сказал что этих выборах сможет победить кто-то кроме нас."
 SOV_keeping_soviet_monopartite: "Сохранить Советскую Монопартийность"
 SOV_keeping_soviet_monopartite_desc: "Единство мнений жизненно необходимо любому государству. Партия является главной действующей силой и авангардом революции. Любые отклонения от линии партии при этом могут привести к событиям, аналогичным произошедшим в 90-е годы прошлого века. При этом, разумеется, внутри партии её члены смогут высказывать свои мнения, просто они не должны быть слишком отличающимися от принятой линии партии."
 SOV_for_the_unity_of_the_peoples: "За Единство Народов"
 SOV_for_the_unity_of_the_peoples_desc: "СССР - это не просто название государства, это идея, заложенная нашими предками более века назад. Идея о стране, возникшей на руинах тюрьмы народов, где у всех будут равные права независимо от вероисповедания, национальности или прочих факторов. И мы, возродив эту великую страну в 21 веке, также приняли на себя великую ответственность поддерживать заветы революционеров прошлого. От Львова до Владивостока и от Мурманска до Баку. У каждого из нас есть своя родина, за которую мы готовы отдать жизнь без промедления. Однако, в отличии от пещерных националистов запада, мы понимаем что лишь сотрудничая друг с другом, мы способны достичь процветания. Это единство и даёт нам силы. Славься, Советская наша держава!  Братства и дружбы народов страна."
 SOV_promote_novorossiyan_cadres: "Продвигать Новороссийские Кадры"
 SOV_promote_novorossiyan_cadres_desc: "Управлять государством всегда тяжело, и для этого нам нужны проверенные люди, которых можно было бы поставить во власть. Конечно, кому-то это может показаться непотизмом, но именно эти активно показали себя  во времена войны на Донбассе. Мы при этом не считаем, что кадры из остальных республик Союза недостойны места в государственном аппарате. Просто сейчас, в послевоенный период, нашей стране нужна стабильность и проверенные временем и испытаниями люди." 
 SOV_bolster_kgb_ranks: "Усилить Ряды КГБ"
 SOV_bolster_kgb_ranks_desc: "Как показала послевоенная ситуация, враги трудового народа никуда не деваются сами по себе. Нет, они лишь залегают на дно время от времени ожидая момента, когда мы ослабнем достаточно, чтобы ударить в этот момент. Для борьбы с такими вредителями нужны соответствующие спецслужбы, и потому мы должны срочно усилить КГБ!"
 SOV_fight_corrupt_bottom_grade: "Андроповские Методы"
 SOV_fight_corrupt_bottom_grade_desc: "Националисты, реакционеры и обскурантисты, без сомнения, уже попрятались по своим пещерам в надежде, что КГБ забудут о них. Как бы не так! Пришло время облав. Национал-сепаратисты, анархисты и прочие опасные элементы будут пойманы и наказаны по всей строгости закона. Не волнуйтесь Юрий Владимирович, ваш труд не будет забыт."
 SOV_our_fair_leader: "Наш Справедливый Вождь"
 SOV_our_fair_leader_desc: "Диктаторов принято ассоциировать с чем-то ужасным и древним. Чуть ли не пережитком давно минувших дней. Но разве не великие вожди вроде Ленина и Сталина создали величайшую державу на земле? Разве не имеет мудрый правитель права пользоваться полнотой своей власти? И не нужен сильному народу настолько же сильный и мощный лидер, что будет кормчим, ведущим корабль государства сквозь исторические преобразования. При этом, разумеется, лидер должен быть умным и справедливым, достоиным своей власти, а не глупцом, пытающимся самоутвердиться. Слава великому лидеру! Слава Пасечнику!"
 SOV_the_new_constitution: "Новая Конституция"
 SOV_the_new_constitution_desc: "Конституция -  это самый важный документ любой страны. Однако задумайтесь вот над чем. Наше государство до сих пор управляется по правовому акту, принятому ещё в начале прошлого века! При этом игнорирующему все произошедшие за это время социо-культурные изменения в обществе. Конечно, такой документ и в текущем виде вполне себе исполняет свои функции. Однако, если мы хотим добиться максимальной эффективности государственного аппарата нам потребуется новая конституция."
 SOV_transform_supreme_soviet: "Трансформировать Верховный Совет"
 SOV_transform_supreme_soviet_desc: "Что есть современный Верховный Совет СССР? Кучка поддакивателей для партии и не более того! Набор согласных, как их презрительно принято называть в народе. Старые деды, что тормозят реформы и при этом проедают свои казённые пособия! Полностью от данного института власти отказаться, конечно, невозможно, да и не нужно. Но вот реформировать его чтобы он более подходил нашему видению - вполне."

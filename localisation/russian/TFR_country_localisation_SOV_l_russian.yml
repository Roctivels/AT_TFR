 SOV_leader_russia_needs: "[SOV_leader_russia_needs_loc]"
 SOV_leader_russia_needs_desc: "Россия - нация революции и нация традиции, можно сказать, что революция - это часть ее традиции, у нас была республика в 1917 году и советская революция вскоре после этого, и снова республика поднялась в 91-м, затем в 22-м она снова пала на выборах, и теперь в этом году мы снова возрождаем Россию. Только возрождая сталинизм под бдительным оком Квачкова, мы можем надеяться вернуться из этого унижения, в наш самый темный час именно сталинский железный социализм поднял нас из тисков поражения и дал нам величайшую империю, которую когда-либо знал русский народ, простирающуюся от Тихого океана до Тюрингских холмов."
 SOV_release_navalny: "[SOV_release_navalny_loc]"
 SOV_release_navalny_desc: "Александр Дугин - фигура сомнительная, но с ним стоит подружиться. Его тесная дружба с такими людьми, как Лимонов и Путин, ставит его под сомнение, но как несомненный лидер русского национал-большевизма он является политиком, который охватывает большую часть крайне левых и значительно усилит нашу поддержку, поскольку наш неосталинизм не так уж далеко отстоит от этого "национал-большевизма". Некоторые в наших рядах кричат, что он узурпатор, фашист, но они осторожны, а осторожность никогда никого не приводила к успеху."
 SOV_form_the_new_government: "[SOV_form_the_new_government_loc]"
 SOV_form_the_new_government_desc: "При Рашкине КПРФ далеко оторвалась от своих славных дней, его руководство подобно змее, выжимающей из партии весь характер, как из мокрой тряпки. Спасти КПРФ может только новая Великая чистка: отделить пшеницу от плевел и вернуть к власти старую гвардию любыми средствами. Даже если для этого придется нанести удар в спину нескольким старым друзьям."
 SOV_utilize_rashkinites: "[SOV_utilize_rashkinites_loc]"
 SOV_utilize_rashkinites_desc: "Зюгановцы представляют старую гвардию КПРФ, оттесненную группой Рашкина на выборах 22-го года. Эти презираемые партийные хардлайнеры составят умеренную базу для нашего неосталинистского движения. Новый Авангард Квачкова будет использовать этих старых бюрократов для стабилизации режима в первые дни его существования, их польза для нас может быть ограничена в долгосрочной перспективе, но сейчас они дадут нам легитимность для проведения антирашкинских акций без опасения краха."
 SOV_save_ideas_of_communism: "Спасти Идеи Коммунизма"
 SOV_save_ideas_of_communism_desc: "Коммунизм был запятнан и почти разрушен реформизмом. Безрассудные реформы Рашкина были лишь последней попыткой либерализовать коммунизм, чтобы сделать его совместимым со "свободным рынком." Председатель за председателем, Горбачев, Брежнев, Хрущев, для нас было почти слишком поздно. Квачков вернет нас на путь Ленина и Сталина, снова наступит советский золотой век, и мы сможем раз и навсегда выбросить китайскую модель в мусорную корзину."
 SOV_emergency_privatization: "[SOV_emergency_privatization_loc]"
 SOV_emergency_privatization_desc: "При системе Рашкина рабочие получили ограниченную рыночную экономику, был создан средний класс, высший класс, классовое сотрудничество стало движущей силой экономики профсоюзов. То самое так называемое классовое сотрудничество, о котором говорили фашисты во времена своего расцвета. Это извращение труда неприемлемо, рабочий класс равен. Не может быть высшего, среднего и низшего класса, у каждого человека есть своя работа, и это его класс, каждый человек способен стать кем угодно, если только он посвятит этому свою жизнь. От шахтера до бригадира, от функционера до председателя - социальная мобильность не зарабатывается деньгами, она зарабатывается трудом, потом и кровью."
 SOV_start_over: "Начать Сначала"
 SOV_start_over_desc: "Квачков заложил основы неосталинского будущего, возрождение партии как Авангарда почти завершено, осталось только упорядочить бюрократию, подготовить армию, промышленность и народ ко второй и неизбежной Великой Отечественной войне против западных капиталистических свиней и их вассальных государств, вырезанных из наших основных земель."

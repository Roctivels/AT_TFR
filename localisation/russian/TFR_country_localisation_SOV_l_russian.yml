 SOV_Putinism_Faltering4_desc:0 "\n\n\n\n£GFX_putinism_faltering\n\n\n\n\n\nВладимир Путин руководит Россией с первого дня нового тысячелетия. Либо будучи президентом, либо недолго занимая пост могущественного премьер-министра в период с 2008 по 2012 год, работая под руководством своего протеже Дмитрия Медведева в Кремле, Путин помог восстановиться после распада СССР и решить ряд проблем как внутренних, так и внешних. Однако, несмотря на это, путинская форма правления, получившая прозвище "Нежный авторитаризм", стала иметь свои собственные недостатки. В то время как политические репрессии и централизация действительно существуют, но случаи прямого вмешательства далеки друг от друга, что приводит к появлению значительного количества оппозиции и коррупции. "Единая Россия" постоянно конкурирует с радикальными оппонентами в Думе, а ОМОН часто разгоняет либеральные протесты. Несмотря на эти недостатки, Администрация Президента не видит в них проблемы и продолжает решать их в каждом конкретном случае, используя жесткий подход."
 SOV_Russian_Orthodox_Church:0 "Русская Православная Церковь"
 SOV_Russian_Orthodox_Church_desc:0 "\n\n\n\n£GFX_SOV_russian_orthodox_church\n\n\n\n\n\nНа протяжении более тысячи лет православное христианство было доминирующей религией в России, начиная с поздней эпохи Киевской Руси и заканчивая царскими временами. Бесспорно, наши люди были чрезвычайно религиозны, особенно в сельской местности, и, несмотря на все усилия Советского Союза по пропаганде государственного атеизма, они все еще остаются таковыми. Таким образом, Русская Православная Церковь является одним из самых мощных политических орудий, которыми располагает Правительство. В то время как церковь старается оказывать влияние государства на все население России и сельские районы нашей страны, она также может быть использована для дискредитации любых форм оппозиции или любых движений, которые могут негативно повлиять на нашу собственную культуру, таких как движение ЛГБТК."
 SOV_Russian_Orthodox_Church2:0 "Русская Православная Церковь"

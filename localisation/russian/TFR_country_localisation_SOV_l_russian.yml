 SOV_soviet_economy_category_desc: "За 30 лет капитализма Россия очень сильно пострадала. Нужно начать воссоздание Народной экономики, которая бы отвечала нуждам обычного человека, а не капиталистов! Мы возродим Советское наследие, и укрепим его новыми, современными экономическими методами.\n\nВ нашей коммунистической экономической школе существует два главных направления мысли: £GFX_SOV_dengists §1Сяопинисты§! - сторонники адаптации Китайской Модели к нашим условиям, и £GFX_SOV_planners §9Плановики§! - пропоненты реализации обновлённой Плановой Экономики.\n[SOV_soviet_economy_category_loc]\n\n\n\n\n\n\n\n\n"
